    gold_added: '---

      alwaysApply: true

      description: Use ESLint autofix (yarn) only for issues that ESLint can automatically fix, like import sorting; never sort imports manually.

      ---


      # ESLint Autofix Workflow


      - **Use ESLint auto-fix only for issues that ESLint can automatically resolve**, such as import sorting. Do not sort imports manually.

      - **Check lint errors first** - only run autofix when ESLint indicates the issues are auto-fixable.

      - For issues that require manual fixes, address them directly in the code rather than relying on autofix.


      ## Single file fixes


      Run from the repository root:


      ```bash

      yarn eslint <path-to-file> --fix

      ```


      ## Multiple files


      If your changes affect multiple files, run from the repository root:


      ```bash

      yarn lint:fix

      ```'
    gold_removed: ''
  - path: .cursor/rules/functions.mdc
    tier: 1
    gold_added: "\n\n- Functions with more than 1 parameter should generally use an object parameter pattern\n## Exceptions\n\nDirect multiple arguments are acceptable in these cases:\n\n1. **Two obvious arguments**: When the function has exactly two parameters that are very clear from context and it's unlikely a third parameter will be added\n2. **Required + optional props**: When the first argument is required and the second is optional configuration/props\n3. **Well-established patterns**: Functions following established API patterns (like DOM APIs, standard library functions)\n\n## When to Use Object Parameters\n\nUse object parameters when:\n\n- Function has 3+ parameters\n- Parameters are related configuration options\n- Function signature is likely to evolve with more parameters\n- Parameters have similar types that could be confused\n- The function is part of a public API\n\n\nid,\nnewName\n// ...\n// Bad: Multiple direct parameters (when object parameters would be better)\n</example>\n\n<example>\n// Acceptable: Two obvious arguments with clear context\nconst setTimeout = (callback: () => void, delay: number) => {\n  // Very clear what callback and delay are, unlikely to add more params\n}\n\nconst arrayIndexOf = (array: any[], item: any) => {\n// Clear relationship between array and item, unlikely to change\n}\n</example>\n\n<example>\n// Acceptable: Required argument + optional configuration\nconst createElement = (tagName: string, options?: { className?: string; id?: string }) => {\n  // First arg required, second is optional configuration object\n}\n\nconst fetchData = (url: string, config?: RequestInit) => {\n// URL is required, config is optional standard pattern\n}\n</example>"
    gold_removed: ''
