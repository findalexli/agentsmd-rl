    gold_added: "# AGENTS.md\n\n> Tool-agnostic project conventions for AI coding assistants.\n> For Claude Code-specific instructions, see [CLAUDE.md](./CLAUDE.md).\n\n## Project Overview\n\nReact utility hooks/components library. Monorepo with two packages:\n\n- `react-simplikit` (`packages/core`) ‚Äî Platform-independent React hooks & components\n- `@react-simplikit/mobile` (`packages/mobile`) ‚Äî Mobile web utilities (viewport, keyboard, layout)\n\n## Architecture\n\nLayer dependency is **unidirectional** ‚Äî no upward or circular imports:\n\n```\ncomponents ‚Üí hooks ‚Üí utils ‚Üí _internal\n```\n\n- Components may use hooks, utils, \\_internal\n- Hooks may use utils, \\_internal\n- Utils may use \\_internal only\n- Core and mobile are independent packages ‚Äî no cross-package dependencies\n\n## File Structure\n\nEach hook/component/util lives in its own folder with co-located docs:\n\n```\nsrc/hooks/useHookName/\n‚îú‚îÄ‚îÄ index.ts               # Re-export\n‚îú‚îÄ‚îÄ useHookName.ts         # Implementation\n‚îú‚îÄ‚îÄ useHookName.spec.ts    # Tests (core) / useHookName.test.ts (mobile)\n‚îú‚îÄ‚îÄ useHookName.ssr.test.ts # SSR safety tests\n‚îú‚îÄ‚îÄ useHookName.md         # English docs\n‚îî‚îÄ‚îÄ ko/\n    ‚îî‚îÄ‚îÄ useHookName.md     # Korean docs\n```\n\n## Coding Standards\n\n- **`type` over `interface`** ‚Äî Always use `type` for type aliases\n- **Named functions in useEffect** ‚Äî `useEffect(function handleResize() { ... }, [])` not arrow functions\n- **No implicit boolean coercion** ‚Äî `if (value)` ‚Üí `if (value != null)` (enforced by `strict-boolean-expressions`)\n- **Import extensions** ‚Äî Use `.ts`/`.tsx` extensions in source imports (tsup converts to `.js` for ESM output)\n- **Named exports only** ‚Äî No default exports\n- **No `any` types** ‚Äî Full TypeScript strict mode\n- **Zero runtime dependencies**\n\n### Nullish Checks and Control Flow\n\n**Use `== null` for nullish checks** ‚Äî checks both null and undefined:\n\n```ts\n// ‚úÖ Good\nif (ref == null) {\n  continue;\n}\nitems.filter(item => item != null);\n\n// ‚úÖ Use !== undefined only when null/undefined distinction matters\nconst controlled = valueProp !== undefined;\n```\n\n**Prefer early returns (guard clauses)** over nested if-else:\n\n```ts\n// ‚úÖ Good ‚Äî guard clause\nfunction process(value: string | null) {\n  if (value == null) {\n    return DEFAULT;\n  }\n  return transform(value);\n}\n\n// ‚ùå Bad ‚Äî nested if-else\nfunction process(value: string | null) {\n  if (value != null) {\n    return transform(value);\n  } else {\n    return DEFAULT;\n  }\n}\n```\n\n**Function declarations use `function` keyword**, arrow functions only for short inline callbacks:\n\n```ts\n// ‚úÖ Good ‚Äî function keyword for declarations\nfunction toggle(state: boolean) {\n  return !state;\n}\n\n// ‚úÖ Good ‚Äî arrow for inline callbacks\nitems.filter(item => item != null);\n\n// ‚ùå Bad ‚Äî arrow for function declarations\nconst toggle = (state: boolean) => !state;\n```\n\n### SSR-Safe Pattern\n\nAll hooks/utils accessing browser APIs must be SSR-safe:\n\n```ts\nconst [state, setState] = useState(FIXED_INITIAL_VALUE);\nuseEffect(function syncBrowserState() {\n  if (isServer()) return;\n  setState(getBrowserAPI());\n}, []);\n```\n\nNever initialize state with browser API calls (causes hydration mismatch).\n\n### Hook Return Value Convention\n\n- **Single value**: `useDebounce<T>(value, delay): T`\n- **Tuple** (2 items): `useToggle(init): [boolean, () => void]`\n- **Object** (3+ items): `usePagination(): { page, nextPage, prevPage }`\n\n## Testing\n\n- **100% coverage mandatory** ‚Äî Enforced by Vitest coverage threshold\n- **SSR tests required** ‚Äî All hooks accessing browser APIs need `.ssr.test.ts`\n- **useEffect cleanup** ‚Äî Always return cleanup in useEffect to remove listeners\n- **SSR test pattern**:\n  ```ts\n  import { renderHookSSR } from '../../_internal/test-utils/renderHookSSR.tsx';\n  it('is safe on server side rendering', () => {\n    const result = renderHookSSR.serverOnly(() => useHookName());\n    expect(result.current).toBeDefined();\n  });\n  ```\n\n### Performance Patterns\n\n- Throttle subscriptions at ~16ms (60fps)\n- Deduplicate to skip unchanged updates\n- Use `startTransition` for non-urgent state updates (React 18+)\n\n## Documentation\n\n- **Bilingual**: English + Korean (co-located in hook folders)\n- **JSDoc required**: Every public API must have `@description` + `@example` + `@param` + `@returns`\n\n## Commit Convention\n\nFormat: `<type>(<scope>): <description>`\n\nTypes: `feat`, `fix`, `docs`, `chore`, `refactor`, `test`\nScope: `core`, `mobile`, or area name\n\n## Commands\n\n```bash\nyarn build          # Build all packages (tsup)\nyarn test           # Run tests (Vitest)\nyarn fix            # Auto-fix lint + format\nyarn typecheck      # Type check (tsc --noEmit)\n```"
    gold_removed: ''
