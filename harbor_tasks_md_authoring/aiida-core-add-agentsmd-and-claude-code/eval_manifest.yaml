    tier: 1
    gold_added: "---\nname: commit-conventions\ndescription: Use when making commits, creating branches, or preparing pull requests for aiida-core.\n---\n\n# Commit and PR conventions for aiida-core\n\n## Branching and versioning\n\n- All development happens on `main` through pull requests.\n- Recommended branch naming convention: `<prefix>/<issue>/<short_description>`\n  - Prefixes: `feature/`, `fix/`, `docs/`, `ci/`, `refactor/`\n  - Example: `fix/1234/querybuilder-improvements`\n- The `main` branch uses a `.post0` version suffix to indicate development after the last release (e.g., `2.6.0.post0` = development after `2.6.0`).\n- Versioning follows [SemVer](https://semver.org/) (major.minor.patch).\n\n## Commit style (not enforced)\n\nFollow the **50/72 rule**:\n\n- Subject line: max 50 characters, imperative mood (\"Add feature\", not \"Added feature\"), capitalized, no period\n- Body: wrap at 72 characters, explain *what* and *why* (the code shows *how*)\n- Merged PRs (via squash) append the PR number: `Fix bug in QueryBuilder (#1234)` (GH web UI automatically appends on squash-merge)\n- Some contributors use emoji prefixes as a semantic type indicator (see below)\n\n```\nShort summary in imperative mood (50 chars)\n\nMore detailed explanation wrapped at 72 characters. Focus on\nwhy the change was made, not how.\n```\n\nGuidelines:\n\n- One issue per commit, self-contained changes: makes bisecting and reverting safe\n- Link GitHub issues either via the PR description or the GH web UI.\n\n## Emoji prefixes (up for discussion)\n\nThe following practices are used by some contributors but not consistently adopted.\nThey may be formalized or dropped in the future.\n\nSome contributors use emojis as a one-character semantic type prefix.\nThe emoji *is* the type indicator, so the message after it should be just the description: write `\U0001F41B QueryBuilder crashes on empty filter`, not `\U0001F41B Fix: QueryBuilder crashes on empty filter`.\nEmoji selection is adapted from [MyST-Parser](https://github.com/executablebooks/MyST-Parser/blob/master/AGENTS.md#commit-message-format):\n\n| Emoji | Meaning | Branch Prefix |\n|-------|---------|---------------|\n| `✨` | New feature | `feature/` |\n| `\U0001F41B` | Bug fix | `fix/` |\n| `\U0001F691` | Hotfix (urgent production fix) | `hotfix/` |\n| `\U0001F44C` | Improvement (no breaking changes) | `improve/` |\n| `‼️` | Breaking change | `breaking/` |\n| `\U0001F4DA` | Documentation | `docs/` |\n| `\U0001F527` | Maintenance (typos, etc.) | `chore/` |\n| `\U0001F9EA` | Tests or CI changes only | `test/` |\n| `♻️` | Refactoring | `refactor/` |\n| `⬆️` | Dependency upgrade | `deps/` |\n| `\U0001F516` | Release | `release/` |\n\n## Pull request requirements\n\nWhen submitting changes:\n\n1. **Description**: Include a meaningful description explaining the change and link to related issues\n2. **Tests**: Include test cases for new functionality or bug fixes\n3. **Documentation**: Update docs if behavior changes or new features are added\n4. **Code quality**: Ensure `uv run pre-commit` passes\n\nMerging (maintainers): **Squash and merge** for single-issue PRs, **rebase and merge** for multi-commit PRs with individually significant commits.\n\n## Git tooling\n\nThe `.git-blame-ignore-revs` file lists commits that should be ignored by `git blame` (e.g., bulk reformatting).\nWhen landing a large-scale formatting-only commit, add its SHA to this file."
    gold_removed: ''
  - path: .claude/skills/debugging-processes/SKILL.md
    tier: 1
    gold_added: '---

      name: debugging-processes

      description: Use when diagnosing failed, stuck, or misbehaving AiiDA processes or the daemon.

      ---


      # Debugging processes and the daemon


      ## Inspecting a single process


      ```bash

      verdi process status <PK>       # call stack and where execution stopped

      verdi process report <PK>       # log messages emitted during execution

      verdi process show <PK>         # inputs, outputs, exit code

      verdi node show <PK>            # node attributes and extras

      ```


      For a full provenance dump including input/output files:


      ```bash

      verdi process dump <PK>         # dump a process and its provenance

      ```


      For CalcJobs specifically, jump to the remote working directory on the HPC (requires SSH access, which may not be available for sandboxed agents):


      ```bash

      verdi calcjob gotocomputer <PK>

      ```


      ## Inspecting the daemon


      ```bash

      # storage (PostgreSQL or SQLite) + daemon & broker (RabbitMQ, if configured):

      verdi status

      # tail daemon logs in real-time

      # best with a single daemon worker, multiple workers garble output:

      verdi daemon logshow

      # requeue processes stuck after a daemon crash (stop the daemon first):

      verdi process repair

      ```


      ## Common failure modes


      - **Process stuck in `waiting`** : usually means the daemon lost track of it after a crash or restart. Run `verdi process repair` to requeue.

      - **Process state inconsistent with node attributes** : check whether `seal()` has been called; only `_updatable_attributes` can change on a stored `ProcessNode` before sealing.

      - **`presto`-marked test failures** : these use an in-memory `SqliteTempBackend`, so the bug is in the code, not in service configuration.

      - **Daemon subprocess killed on shutdown** : daemon-launched subprocesses must pass `start_new_session=True` or they inherit the daemon''s signal handling and die with it.


      ## Interactive inspection


      ```bash

      verdi shell                       # interactive IPython shell with AiiDA loaded

      verdi devel run-sql "SELECT ..."  # run raw SQL against the profile database (USE WITH CAUTION)

      ```


      Useful patterns inside `verdi shell`:


      ```python

      from aiida.orm import QueryBuilder, Node, load_node


      # Find nodes by type

      qb = QueryBuilder().append(Node, filters={''node_type'': {''like'': ''data.core.dict.%''}})


      # Inspect a specific node

      node = load_node(<PK>)

      node.base.attributes.all   # all stored attributes

      node.base.extras.all        # all extras (mutable even after storing)

      node.base.repository.list_object_names()  # files in the node''s repository

      ```


      ## Related source


      - Process runner: `src/aiida/engine/runners.py`

      - Daemon client: `src/aiida/engine/daemon/client.py`

      - CalcJob exec manager (file copying, job submission, retrieval): `src/aiida/engine/daemon/execmanager.py`

      - Transport tasks (submit, update, retrieve): `src/aiida/engine/processes/calcjobs/tasks.py`'
    gold_removed: ''
  - path: .claude/skills/deprecating-api/SKILL.md
    tier: 1
    gold_added: "---\nname: deprecating-api\ndescription: Use when deprecating a public Python API or `verdi` CLI command in aiida-core.\n---\n\n# Deprecating API in aiida-core\n\nPublic API is anything importable from a second-level package (`from aiida.orm import ...`, `from aiida.engine import ...`).\nPublic API must go through a deprecation cycle before removal.\nData created with older AiiDA versions is guaranteed to work with newer versions (database migrations are applied automatically), so backwards compatibility matters.\n\n## Python API\n\nUse the `warn_deprecation` helper, which handles `stacklevel=2` and respects the user's deprecation-visibility config:\n\n```python\nfrom aiida.common.warnings import warn_deprecation\n\ndef old_function(x):\n    warn_deprecation('`old_function` is deprecated, use `new_function` instead.', version=3)\n    return new_function(x)\n```\n\nAdd a `.. deprecated::` note to the docstring with replacement guidance:\n\n```python\ndef old_function(x):\n    \"\"\"Do the thing.\n\n    .. deprecated:: 2.7\n       Use :func:`new_function` instead. Will be removed in 3.0.\n    \"\"\"\n```\n\n## CLI commands\n\nUse `@decorators.deprecated_command()` from `aiida.cmdline.utils.decorators`:\n\n```python\nfrom aiida.cmdline.utils import decorators\n\n@verdi_group.command('old-command')\n@decorators.deprecated_command('Use `verdi new-command` instead.')\ndef old_command():\n    ...\n```\n\n## Removal timeline\n\n- Minor release: add the deprecation warning, update docstrings and user-facing docs.\n- Next major release: remove the deprecated API.\n- Users can surface all pending deprecation warnings by setting `AIIDA_WARN_v3=1`.\n\n## Relevant source\n\n- Warning classes: `src/aiida/common/warnings.py`\n- CLI deprecation decorator: `src/aiida/cmdline/utils/decorators.py`"
