      ## 图文卡片


      含图片的画板用图文卡片布局（vertical frame：图上文下）：


      - image 宽度 = 卡片宽度，height 按 3:2 比例（如 240×160）

      - 卡片间 gap: 24（比纯文字间距大）

      - 多卡片一行超过 3 张时，换行用嵌套 horizontal frame

      - 详见 `scenes/photo-showcase.md`'
