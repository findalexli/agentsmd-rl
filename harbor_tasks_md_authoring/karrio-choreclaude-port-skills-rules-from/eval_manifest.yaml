      - [ ] Uses `import karrio.lib as lib` — no legacy `DP`/`SF`/`NF`/`DF`/`XP`

      - [ ] Functional style (list comprehensions, `map`/`filter`) rather than imperative loops

      - [ ] No bare `except:` / `except Exception:` — specific exceptions only

