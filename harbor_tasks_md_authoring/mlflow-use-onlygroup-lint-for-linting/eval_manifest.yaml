version: "2.0"

task:
  name: mlflow-use-onlygroup-lint-for-linting
  kind: markdown_authoring
  difficulty: easy

source:
  repo: mlflow/mlflow
  pr: 17753
  base_commit: "ade534a811be0c4904bc0915946740cd1ad7f3af"
  merge_commit: "6bfb0dc6ceef16ca0478e36650124ff2ea3f20ca"

checks:
  - id: signal_00
    type: fail_to_pass
    origin: pr_diff
    description: "Distinctive line from gold patch must appear in CLAUDE.md."
  - id: signal_01
    type: fail_to_pass
    origin: pr_diff
    description: "Distinctive line from gold patch must appear in CLAUDE.md."
  - id: signal_02
    type: fail_to_pass
    origin: pr_diff
    description: "Distinctive line from gold patch must appear in CLAUDE.md."

config_edits:
  - path: CLAUDE.md
    tier: 1
    gold_added: 'uv run --only-group lint ruff check . --fix         # Lint with auto-fix

      uv run --only-group lint ruff format .              # Format code

      uv run --only-group lint clint .                    # Run MLflow custom linter

      uv run --only-group lint bash dev/mlflow-typo.sh .

      uv run --only-group lint pre-commit run --from-ref origin/master --to-ref HEAD

      uv run --only-group lint pre-commit run --from-ref origin/master --to-ref HEAD

      uv run --only-group lint pre-commit install --install-hooks

      uv run --only-group lint pre-commit run --all-files

      SKIP=taplo,typos,conftest uv run --only-group lint pre-commit run --all-files

      uv run --only-group lint pre-commit run --files path/to/file.py

      uv run --only-group lint pre-commit run ruff --all-files

      uv run --only-group lint bin/install.py'
    gold_removed: ''
