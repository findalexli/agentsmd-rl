config_edits:
  - path: ".claude/skills/pr-automation/SKILL.md"
    tier: 1
    gold_added: |-
      git fetch origin "$BASE_REF"
      # Create worktree on the PR's head branch; fetch base branch for accurate rebase
      git fetch origin <base_branch>
      git fetch origin "$BASE_REF"
    gold_removed: ""
  - path: ".claude/skills/pr-review/SKILL.md"
    tier: 1
    gold_added: |-
      # Fetch PR head AND base branch so the three-dot diff is accurate
      BASE_REF=$(gh pr view ${PR_NUMBER} --json baseRefName --jq '.baseRefName')
      git fetch origin "$BASE_REF"
    gold_removed: ""
