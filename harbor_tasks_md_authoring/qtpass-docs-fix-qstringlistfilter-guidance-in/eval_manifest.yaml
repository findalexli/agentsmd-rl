    gold_added: 'When the goal is to drop env vars by name prefix, use `std::remove_if` with `startsWith`. Don''t reach for `QStringList::filter()` — it does the opposite (keeps matching entries) and matches substrings anywhere in the string, so even as a selection it would over-match:

      // Bad — filter() returns entries containing key, also matching "FOOBAR=value"

      // when key is "FOO". And it selects, not removes; the assignment then drops

      // every entry that didn''t match — opposite of the intent.

      // Good — explicit prefix-based removal'
