    gold_added: "# Global Development Guidelines for LangChain Projects\n\n## Core Development Principles\n\n### 1. Maintain Stable Public Interfaces ⚠️ CRITICAL\n\n**Always attempt to preserve function signatures, argument positions, and names for exported/public methods.**\n\n❌ **Bad - Breaking Change:**\n\n```python\ndef get_user(id, verbose=False):  # Changed from `user_id`\n    pass\n```\n\n✅ **Good - Stable Interface:**\n\n```python\ndef get_user(user_id: str, verbose: bool = False) -> User:\n    \"\"\"Retrieve user by ID with optional verbose output.\"\"\"\n    pass\n```\n\n**Before making ANY changes to public APIs:**\n\n- Check if the function/class is exported in `__init__.py`\n- Look for existing usage patterns in tests and examples\n- Use keyword-only arguments for new parameters: `*, new_param: str = \"default\"`\n- Mark experimental features clearly with docstring warnings (using reStructuredText, like `.. warning::`)\n\n\U0001F9E0 *Ask yourself:* \"Would this change break someone's code if they used it last week?\"\n\n### 2. Code Quality Standards\n\n**All Python code MUST include type hints and return types.**\n\n❌ **Bad:**\n\n```python\ndef p(u, d):\n    return [x for x in u if x not in d]\n```\n\n✅ **Good:**\n\n```python\ndef filter_unknown_users(users: list[str], known_users: set[str]) -> list[str]:\n    \"\"\"Filter out users that are not in the known users set.\n\n    Args:\n        users: List of user identifiers to filter.\n        known_users: Set of known/valid user identifiers.\n\n    Returns:\n        List of users that are not in the known_users set.\n    \"\"\"\n    return [user for user in users if user not in known_users]\n```\n\n**Style Requirements:**\n\n- Use descriptive, **self-explanatory variable names**. Avoid overly short or cryptic identifiers.\n- Attempt to break up complex functions (>20 lines) into smaller, focused functions where it makes sense\n- Avoid unnecessary abstraction or premature optimization\n- Follow existing patterns in the codebase you're modifying\n\n### 3. Testing Requirements\n\n**Every new feature or bugfix MUST be covered by unit tests.**\n\n**Test Organization:**\n\n- Unit tests: `tests/unit_tests/` (no network calls allowed)\n- Integration tests: `tests/integration_tests/` (network calls permitted)\n- Use `pytest` as the testing framework\n\n**Test Quality Checklist:**\n\n- [ ] Tests fail when your new logic is broken\n- [ ] Happy path is covered\n- [ ] Edge cases and error conditions are tested\n- [ ] Use fixtures/mocks for external dependencies\n- [ ] Tests are deterministic (no flaky tests)\n\nChecklist questions:\n\n- [ ] Does the test suite fail if your new logic is broken?\n- [ ] Are all expected behaviors exercised (happy path, invalid input, etc)?\n- [ ] Do tests use fixtures or mocks where needed?\n\n```python\ndef test_filter_unknown_users():\n    \"\"\"Test filtering unknown users from a list.\"\"\"\n    users = [\"alice\", \"bob\", \"charlie\"]\n    known_users = {\"alice\", \"bob\"}\n\n    result = filter_unknown_users(users, known_users)\n\n    assert result == [\"charlie\"]\n    assert len(result) == 1\n```\n\n### 4. Security and Risk Assessment\n\n**Security Checklist:**\n\n- No `eval()`, `exec()`, or `pickle` on user-controlled input\n- Proper exception handling (no bare `except:`) and use a `msg` variable for error messages\n- Remove unreachable/commented code before committing\n- Race conditions or resource leaks (file handles, sockets, threads).\n- Ensure proper resource cleanup (file handles, connections)\n\n❌ **Bad:**\n\n```python\ndef load_config(path):\n    with open(path) as f:\n        return eval(f.read())  # ⚠️ Never eval config\n```\n\n✅ **Good:**\n\n```python\nimport json\n\ndef load_config(path: str) -> dict:\n    with open(path) as f:\n        return json.load(f)\n```\n\n### 5. Documentation Standards\n\n**Use Google-style docstrings with Args section for all public functions.**\n\n❌ **Insufficient Documentation:**\n\n```python\ndef send_email(to, msg):\n    \"\"\"Send an email to a recipient.\"\"\"\n```\n\n✅ **Complete Documentation:**\n\n```python\ndef send_email(to: str, msg: str, *, priority: str = \"normal\") -> bool:\n    \"\"\"\n    Send an email to a recipient with specified priority.\n\n    Args:\n        to: The email address of the recipient.\n        msg: The message body to send.\n        priority: Email priority level (``'low'``, ``'normal'``, ``'high'``).\n\n    Returns:\n        True if email was sent successfully, False otherwise.\n\n    Raises:\n        InvalidEmailError: If the email address format is invalid.\n        SMTPConnectionError: If unable to connect to email server.\n    \"\"\"\n```\n\n**Documentation Guidelines:**\n\n- Types go in function signatures, NOT in docstrings\n- Focus on \"why\" rather than \"what\" in descriptions\n- Document all parameters, return values, and exceptions\n- Keep descriptions concise but clear\n- Use reStructuredText for docstrings to enable rich formatting\n\n\U0001F4CC *Tip:* Keep descriptions concise but clear. Only document return values if non-obvious.\n\n### 6. Architectural Improvements\n\n**When you encounter code that could be improved, suggest better designs:**\n\n❌ **Poor Design:**\n\n```python\ndef process_data(data, db_conn, email_client, logger):\n    # Function doing too many things\n    validated = validate_data(data)\n    result = db_conn.save(validated)\n    email_client.send_notification(result)\n    logger.log(f\"Processed {len(data)} items\")\n    return result\n```\n\n✅ **Better Design:**\n\n```python\n@dataclass\nclass ProcessingResult:\n    \"\"\"Result of data processing operation.\"\"\"\n    items_processed: int\n    success: bool\n    errors: List[str] = field(default_factory=list)\n\nclass DataProcessor:\n    \"\"\"Handles data validation, storage, and notification.\"\"\"\n\n    def __init__(self, db_conn: Database, email_client: EmailClient):\n        self.db = db_conn\n        self.email = email_client\n\n    def process(self, data: List[dict]) -> ProcessingResult:\n        \"\"\"Process and store data with notifications.\"\"\"\n        validated = self._validate_data(data)\n        result = self.db.save(validated)\n        self._notify_completion(result)\n        return result\n```\n\n**Design Improvement Areas:**\n\nIf there's a **cleaner**, **more scalable**, or **simpler** design, highlight it and suggest improvements that would:\n\n- Reduce code duplication through shared utilities\n- Make unit testing easier\n- Improve separation of concerns (single responsibility)\n- Make unit testing easier through dependency injection\n- Add clarity without adding complexity\n- Prefer dataclasses for structured data\n\n## Development Tools & Commands\n\n### Package Management\n\n```bash\n# Add package\nuv add package-name\n\n# Sync project dependencies\nuv sync\nuv lock\n```\n\n### Testing\n\n```bash\n# Run unit tests (no network)\nmake test\n\n# Don't run integration tests, as API keys must be set\n\n# Run specific test file\nuv run --group test pytest tests/unit_tests/test_specific.py\n```\n\n### Code Quality\n\n```bash\n# Lint code\nmake lint\n\n# Format code\nmake format\n\n# Type checking\nuv run --group lint mypy .\n```\n\n### Dependency Management Patterns\n\n**Local Development Dependencies:**\n\n```toml\n[tool.uv.sources]\nlangchain-core = { path = \"../core\", editable = true }\nlangchain-tests = { path = \"../standard-tests\", editable = true }\n```\n\n**For tools, use the `@tool` decorator from `langchain_core.tools`:**\n\n```python\nfrom langchain_core.tools import tool\n\n@tool\ndef search_database(query: str) -> str:\n    \"\"\"Search the database for relevant information.\n\n    Args:\n        query: The search query string.\n    \"\"\"\n    # Implementation here\n    return results\n```\n\n## Commit Standards\n\n**Use Conventional Commits format for PR titles:**\n\n- `feat(core): add multi-tenant support`\n- `fix(cli): resolve flag parsing error`\n- `docs: update API usage examples`\n- `docs(openai): update API usage examples`\n\n## Framework-Specific Guidelines\n\n- Follow the existing patterns in `langchain-core` for base abstractions\n- Use `langchain_core.callbacks` for execution tracking\n- Implement proper streaming support where applicable\n- Avoid deprecated components like legacy `LLMChain`\n\n### Partner Integrations\n\n- Follow the established patterns in existing partner libraries\n- Implement standard interfaces (`BaseChatModel`, `BaseEmbeddings`, etc.)\n- Include comprehensive integration tests\n- Document API key requirements and authentication\n\n---\n\n## Quick Reference Checklist\n\nBefore submitting code changes:\n\n- [ ] **Breaking Changes**: Verified no public API changes\n- [ ] **Type Hints**: All functions have complete type annotations\n- [ ] **Tests**: New functionality is fully tested\n- [ ] **Security**: No dangerous patterns (eval, silent failures, etc.)\n- [ ] **Documentation**: Google-style docstrings for public functions\n- [ ] **Code Quality**: `make lint` and `make format` pass\n- [ ] **Architecture**: Suggested improvements where applicable\n- [ ] **Commit Message**: Follows Conventional Commits format"
