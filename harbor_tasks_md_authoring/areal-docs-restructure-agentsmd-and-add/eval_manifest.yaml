        - `areal/dataset/` — Stateful dataset loaders (GSM8K, Geometry3K, CLEVR, HH-RLHF,
          TORL, etc.) and utilities that feed rollout jobs safely.
        - `areal/engine/` — Training backends (FSDP2, Megatron, PPO, SFT, reward modeling) and
