    gold_added: "# Payload CMS Collections Reference\n\nComplete reference for collection configurations and patterns.\n\n## Basic Collection\n\n```ts\nimport type { CollectionConfig } from 'payload'\n\nexport const Posts: CollectionConfig = {\n  slug: 'posts',\n  labels: {\n    singular: 'Post',\n    plural: 'Posts',\n  },\n  admin: {\n    useAsTitle: 'title',\n    defaultColumns: ['title', 'author', 'status', 'createdAt'],\n    group: 'Content', // Organize in admin sidebar\n    description: 'Blog posts and articles',\n    listSearchableFields: ['title', 'slug'],\n  },\n  fields: [\n    {\n      name: 'title',\n      type: 'text',\n      required: true,\n      index: true,\n    },\n    {\n      name: 'slug',\n      type: 'text',\n      unique: true,\n      index: true,\n      admin: { position: 'sidebar' },\n    },\n    {\n      name: 'status',\n      type: 'select',\n      options: ['draft', 'published'],\n      defaultValue: 'draft',\n    },\n  ],\n  defaultSort: '-createdAt',\n  timestamps: true,\n}\n```\n\n## Auth Collection\n\n```ts\nexport const Users: CollectionConfig = {\n  slug: 'users',\n  auth: {\n    tokenExpiration: 7200, // 2 hours\n    verify: true,\n    maxLoginAttempts: 5,\n    lockTime: 600000, // 10 minutes\n    useAPIKey: true,\n  },\n  admin: {\n    useAsTitle: 'email',\n  },\n  fields: [\n    {\n      name: 'roles',\n      type: 'select',\n      hasMany: true,\n      options: ['admin', 'editor', 'user'],\n      required: true,\n      defaultValue: ['user'],\n      saveToJWT: true,\n    },\n    {\n      name: 'name',\n      type: 'text',\n      required: true,\n    },\n  ],\n}\n```\n\n## Upload Collection\n\n```ts\nexport const Media: CollectionConfig = {\n  slug: 'media',\n  upload: {\n    staticDir: 'media',\n    mimeTypes: ['image/*'],\n    imageSizes: [\n      {\n        name: 'thumbnail',\n        width: 400,\n        height: 300,\n        position: 'centre',\n      },\n      {\n        name: 'card',\n        width: 768,\n        height: 1024,\n      },\n    ],\n    adminThumbnail: 'thumbnail',\n    focalPoint: true,\n    crop: true,\n  },\n  access: {\n    read: () => true,\n  },\n  fields: [\n    {\n      name: 'alt',\n      type: 'text',\n      required: true,\n    },\n    {\n      name: 'caption',\n      type: 'text',\n      localized: true,\n    },\n  ],\n}\n```\n\n## Live Preview\n\nEnable real-time content preview during editing.\n\n```ts\nimport type { CollectionConfig } from 'payload'\n\nconst generatePreviewPath = ({\n  slug,\n  collection,\n  req,\n}: {\n  slug: string\n  collection: string\n  req: any\n}) => {\n  const baseUrl = process.env.NEXT_PUBLIC_SERVER_URL\n  return `${baseUrl}/api/preview?slug=${slug}&collection=${collection}`\n}\n\nexport const Pages: CollectionConfig = {\n  slug: 'pages',\n  admin: {\n    useAsTitle: 'title',\n    // Live preview during editing\n    livePreview: {\n      url: ({ data, req }) =>\n        generatePreviewPath({\n          slug: data?.slug as string,\n          collection: 'pages',\n          req,\n        }),\n    },\n    // Static preview button\n    preview: (data, { req }) =>\n      generatePreviewPath({\n        slug: data?.slug as string,\n        collection: 'pages',\n        req,\n      }),\n  },\n  fields: [\n    { name: 'title', type: 'text' },\n    { name: 'slug', type: 'text' },\n  ],\n}\n```\n\n## Versioning & Drafts\n\nPayload maintains version history and supports draft/publish workflows.\n\n```ts\nimport type { CollectionConfig } from 'payload'\n\n// Basic versioning (audit log only)\nexport const Users: CollectionConfig = {\n  slug: 'users',\n  versions: true, // or { maxPerDoc: 100 }\n  fields: [{ name: 'name', type: 'text' }],\n}\n\n// Drafts enabled (draft/publish workflow)\nexport const Posts: CollectionConfig = {\n  slug: 'posts',\n  versions: {\n    drafts: true, // Enables _status field\n    maxPerDoc: 50,\n  },\n  fields: [{ name: 'title', type: 'text' }],\n}\n\n// Full configuration with autosave and scheduled publish\nexport const Pages: CollectionConfig = {\n  slug: 'pages',\n  versions: {\n    drafts: {\n      autosave: true, // Auto-save while editing\n      schedulePublish: true, // Schedule future publish/unpublish\n      validate: false, // Don't validate drafts (default)\n    },\n    maxPerDoc: 100, // Keep last 100 versions (0 = unlimited)\n  },\n  fields: [{ name: 'title', type: 'text' }],\n}\n```\n\n### Draft API Usage\n\n```ts\n// Create draft\nawait payload.create({\n  collection: 'posts',\n  data: { title: 'Draft Post' },\n  draft: true, // Saves as draft, skips required field validation\n})\n\n// Update as draft\nawait payload.update({\n  collection: 'posts',\n  id: '123',\n  data: { title: 'Updated Draft' },\n  draft: true,\n})\n\n// Read with drafts (returns newest draft if available)\nconst post = await payload.findByID({\n  collection: 'posts',\n  id: '123',\n  draft: true, // Returns draft version if exists\n})\n\n// Query only published (REST API)\n// GET /api/posts (returns only _status: 'published')\n\n// Access control for drafts\nexport const Posts: CollectionConfig = {\n  slug: 'posts',\n  versions: { drafts: true },\n  access: {\n    read: ({ req: { user } }) => {\n      // Public can only see published\n      if (!user) return { _status: { equals: 'published' } }\n      // Authenticated can see all\n      return true\n    },\n  },\n  fields: [{ name: 'title', type: 'text' }],\n}\n```\n\n### Document Status\n\nThe `_status` field is auto-injected when drafts are enabled:\n\n- `draft` - Never published\n- `published` - Published with no newer drafts\n- `changed` - Published but has newer unpublished drafts\n\n## Globals\n\nGlobals are single-instance documents (not collections).\n\n```ts\nimport type { GlobalConfig } from 'payload'\n\nexport const Header: GlobalConfig = {\n  slug: 'header',\n  label: 'Header',\n  admin: {\n    group: 'Settings',\n  },\n  fields: [\n    {\n      name: 'logo',\n      type: 'upload',\n      relationTo: 'media',\n      required: true,\n    },\n    {\n      name: 'nav',\n      type: 'array',\n      maxRows: 8,\n      fields: [\n        {\n          name: 'link',\n          type: 'relationship',\n          relationTo: 'pages',\n        },\n        {\n          name: 'label',\n          type: 'text',\n        },\n      ],\n    },\n  ],\n}\n```"
