  - path: .cursor/rules/development-commands.mdc
    tier: 1
    gold_added: '---

      description: Common development commands and workflows

      globs: []

      alwaysApply: false

      ---


      # Development Commands & Workflows


      ## Daily Development


      ```bash

      # Start development server

      yarn start                    # Start console app

      yarn storybook               # Start Storybook


      # Code quality

      yarn test                    # Run all tests

      npx nx format:write          # Format code

      npx nx run-many --all --target=lint --parallel  # Lint all projects


      # Build

      yarn build                   # Production build

      ```


      ## Nx Commands


      ```bash

      # Generate new components/libs

      npx nx generate @nx/react:component MyComponent

      npx nx generate @nx/react:library my-lib


      # Run specific project commands

      npx nx test my-project

      npx nx lint my-project

      npx nx build my-project


      # Dependency graph

      npx nx graph

      ```


      ## Package Management


      - **Package Manager**: Yarn (lockfile present)

      - Always use `yarn` instead of `npm`

      - Run `yarn install` after pulling changes

      - Update dependencies carefully and test thoroughly


      ## Git Workflow


      - Conventional commits recommended

      - Create feature branches from `staging`

      - Use descriptive commit messages

      - Squash commits when merging PRs


      ## Environment Setup


      - Node.js version defined in `.nvmrc` (if present)

      - Use `nvm use` to switch to correct Node version

      - IDE configurations for ESLint and Prettier are included'
    gold_removed: ''
  - path: .cursor/rules/naming-conventions.mdc
    tier: 1
    gold_added: '---

      description: Naming conventions for files, components, and variables

      globs: [''**/*'']

      alwaysApply: true

      ---


      # Naming Conventions


      ## File Naming


      - **Components**: Snake case (`user-profile.tsx`)

      - **Hooks**: Snake case with `use` prefix (`use-user.ts`)

      - **Utilities**: Snake case (`format-date.ts`)

      - **Types/Interfaces**: PascalCase with `Props` suffix for interfaces if needed

      - **Types**: PascalCase with `Type` suffix

      - **Enums**: PascalCase

      - **Constants**: UPPER_SNAKE_CASE


      ## Variable Naming


      - **Variables**: camelCase

      - **Functions**: camelCase

      - **Classes**: PascalCase

      - **Constants**: UPPER_SNAKE_CASE

      - **Private members**: prefix with underscore `_privateMember`


      ## Component Structure


      - Export components as named exports

      - Props interface should match component name + `Props`

      - Use descriptive, self-documenting names

      - Avoid abbreviations unless commonly understood


      ## Comments


      - Avoid comments unless absolutely necessary

      - Comments in English only'
    gold_removed: ''
  - path: .cursor/rules/pre-commit-workflow.mdc
    tier: 1
    gold_added: "---\ndescription: Pre-commit verification workflow and quality checks\nglobs: []\nalwaysApply: false\n---\n\n# Pre-commit Verification Workflow\n\n## Commit Message Format\n\nThis project uses **semantic-release** with conventional commit format:\n\n### Format Structure\n\n```\n<type>(<scope>): <description>\n\n[optional body]\n\n[optional footer(s)]\n```\n\n### Examples\n\n```bash\n# Features\nfeat(button): add loading state animation\nfeat(auth): implement OAuth2 login flow\n\n# Bug fixes\nfix(modal): prevent background scroll when open\nfix(api): handle network timeout errors\n\n# Other types\ndocs(readme): update installation instructions\nstyle(header): improve responsive layout\nrefactor(utils): simplify date formatting function\ntest(user-service): add integration tests\nchore(deps): update react to v18.2.0\n```\n\n### Required Types\n\n- **feat**: New feature\n- **fix**: Bug fix\n- **docs**: Documentation changes\n- **style**: Code style changes (formatting, etc.)\n- **refactor**: Code refactoring\n- **test**: Adding or updating tests\n- **chore**: Maintenance tasks, dependency updates\n\n### Scope Guidelines\n\n- Use component name: `button`, `modal`, `header`\n- Use feature area: `auth`, `api`, `routing`\n- Use domain: `user-management`, `billing`\n\n## Required Checks Before Commit\n\n### 1. Format Check\n\n```bash\nnpx nx format:check\n```\n\nIf failed: Run `npx nx format:write` to fix formatting\n\n### 2. Tests\n\n```bash\nyarn test --passWithNoTests\n```\n\nAll tests must pass before committing\n\n### 3. Snapshot Verification\n\n```bash\ngit diff --name-only --cached | grep -E '\\.snap$'\n```\n\nReview any snapshot changes carefully\n\n### 4. Lint Check\n\n```bash\nnpx nx run-many --all --target=lint --parallel\n```\n\nFix all linting errors before committing\n\n## Complete Pre-commit Script\n\n```bash\n#!/bin/bash\n\n# 1. Format check\nnpx nx format:check\nif [ $? -ne 0 ]; then\n  echo \"❌ Format check failed. Run 'npx nx format:write' to fix.\"\n  exit 1\nfi\n\n# 2. Tests\nyarn test --passWithNoTests\nif [ $? -ne 0 ]; then\n  echo \"❌ Tests failed. Fix failing tests before committing.\"\n  exit 1\nfi\n\n# 3. Snapshot check\ngit diff --name-only --cached | grep -E '\\.snap$'\nif [ $? -eq 0 ]; then\n  echo \"⚠️  Snapshot files detected. Review changes carefully.\"\n  echo \"Updated snapshots:\"\n  git diff --name-only --cached | grep -E '\\.snap$'\nfi\n\n# 4. Lint check\nnpx nx run-many --all --target=lint --parallel\nif [ $? -ne 0 ]; then\n  echo \"❌ Lint failed. Fix linting errors before committing.\"\n  exit 1\nfi\n\necho \"✅ All pre-commit checks passed!\"\n```\n\n## Quality Standards\n\n- No linting errors allowed\n- All tests must pass\n- Code must be properly formatted\n- Snapshot changes must be intentional and reviewed"
    gold_removed: ''
  - path: .cursor/rules/project-architecture.mdc
    tier: 1
    gold_added: '---

      description: Qovery Console project architecture and structure guidelines

      globs: [''**/*'']

      alwaysApply: true

      ---


      # Qovery Console Architecture


      ## Project Structure


      This project uses:


      - **Nx monorepo** with apps/ and libs/

      - **React 18** with TypeScript

      - **TailwindCSS** for styling

      - **React Query** for state management

      - **Jest** for testing

      - **ESLint** with strict rules


      ## Directory Organization


      ```

      libs/

      ├── domains/         # Business logic by domain

      ├── pages/           # Application pages/routes

      ├── shared/          # Shared code

      │   ├── ui/          # Reusable UI components

      │   ├── util-*/      # Specialized utilities

      │   └── interfaces/  # Shared types

      ```


      ## Important Notes


      - Respect Nx architecture (no circular imports)

      - Use Nx generators to create new components/libs

      - `data-access` libs contain API logic

      - `feature` libs contain business components

      - `ui` libs contain reusable components'
    gold_removed: ''
  - path: .cursor/rules/react-typescript-standards.mdc
    tier: 1
    gold_added: '---

      description: React and TypeScript coding standards for Qovery Console

      globs: [''**/*.tsx'', ''**/*.ts'']

      alwaysApply: false

      ---


      # React & TypeScript Standards


      ## Import Rules


      - ALWAYS use inline type imports: `import { type MyType, myFunction } from ''./module''`

      - Respect import order according to `.eslintrc.json`

      - Use `@qovery/*` aliases defined in `tsconfig.base.json`

      - DO NOT import directly from `react` (destructure React)

      - Use `@qovery/shared/util-tests` instead of `@testing-library/react`


      ## React Components


      - Functional components only

      - No explicit `React.FC`

      - Destructure props directly in parameters

      - Use `clsx` or `twMerge` from `@qovery/shared/util-js` for conditional classes

      - Prefer Radix UI components when available


      ## State Management


      - Use React Query for API calls


      ## Performance


      - Use `React.memo()` for expensive components

      - `useCallback` and `useMemo` only when necessary'
    gold_removed: ''
  - path: .cursor/rules/styling-standards.mdc
    tier: 1
    gold_added: '---

      description: Styling and design standards using TailwindCSS

      globs: [''**/*.tsx'']

      alwaysApply: false

      ---


      # Styling Standards


      ## TailwindCSS Usage


      - TailwindCSS only (no CSS modules or styled-components in new code)

      - Use utilities from `@qovery/shared/ui` when available

      - Mobile-first responsive design

      - Use `clsx` or `twMerge` from `@qovery/shared/util-js` for conditional classes


      ## Component Styling


      - Prefer Radix UI components for accessibility

      - Consistent spacing using Tailwind scale

      - Use CSS variables for theme colors

      - Avoid inline styles


      ## Responsive Design


      - Mobile-first approach

      - Use Tailwind breakpoints: `sm:`, `md:`, `lg:`, `xl:`

      - Test on multiple screen sizes

      - Ensure touch-friendly interfaces


      ## Accessibility


      - Follow `jsx-a11y` rules

      - Use semantic HTML elements

      - Provide proper ARIA labels

      - Test with screen readers

      - Ensure keyboard navigation works'
    gold_removed: ''
  - path: .cursor/rules/testing-standards.mdc
    tier: 1
    gold_added: '---

      description: Testing standards and practices for Qovery Console

      globs: [''**/*.spec.ts'', ''**/*.spec.tsx'', ''**/*.test.ts'', ''**/*.test.tsx'']

      alwaysApply: false

      ---


      # Testing Standards


      ## Test Setup


      - Use `renderWithProviders` from `@qovery/shared/util-tests`

      - Prefer `userEvent` over `fireEvent`

      - Unit tests are mandatory for business logic

      - Snapshots for complex UI components


      ## Test Structure


      - Arrange-Act-Assert pattern

      - Descriptive test names

      - Group related tests with `describe` blocks

      - Use `beforeEach` for common setup


      ## Mocking


      - Mock external dependencies appropriately

      - Avoid over-mocking - test real behavior when possible


      ## Coverage


      - Focus on critical paths and edge cases

      - Test user interactions, not implementation details

      - Ensure error states are covered'
    gold_removed: ''
