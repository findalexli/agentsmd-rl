    gold_added: '**If you''re on `main` or `master`, you MUST create a feature branch first** — unless the user explicitly asked to commit to main. Do not ask the user whether to create a branch; just proceed with branch creation, then re-check the current branch before committing. If still on `main` or `master`, stop — do not commit.'
    gold_removed: ''
  - path: skills/pr-writer/SKILL.md
    tier: 1
    gold_added: 'Before creating a PR, ensure all changes are committed **to a feature branch**, not to the default branch.

      # Check current branch and for uncommitted changes

      git branch --show-current

      If on `main` or `master`, create a feature branch and move any uncommitted changes onto it before committing — a PR cannot be opened from the default branch against itself. If there are uncommitted changes, commit them on the feature branch before proceeding.'
    gold_removed: ''
  - path: skills/skill-writer/EVAL.md
