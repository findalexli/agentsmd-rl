    tier: 1
    gold_added: "> **Check before installing**: The tool may already be available (e.g., inside a `pixi` / `conda` env). Always run `command -v plink2` first and skip the install block if it returns a path. When executing tools inside a pixi project, prefer `pixi run <tool>` over plain `<tool>`.\n\n# Skip install if already present\nif command -v plink2 >/dev/null 2>&1; then\n    echo \"plink2 already installed: $(plink2 --version)\"\nelse\n    # Download PLINK2 pre-compiled binary (Linux)\n    wget https://s3.amazonaws.com/plink2-assets/alpha6/plink2_linux_avx2_20241112.zip\n    unzip plink2_linux_avx2_20241112.zip\n    chmod +x plink2\n    export PATH=\"$PWD:$PATH\"\n\n    # macOS\n    # wget https://s3.amazonaws.com/plink2-assets/alpha6/plink2_mac_20241112.zip\n    # unzip plink2_mac_20241112.zip\n\n    plink2 --version\n    # PLINK v2.00a6LM\nfi"
