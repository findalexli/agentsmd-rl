  - path: .claude/rules/api-stability.md
    tier: 1
    gold_added: "---\npaths:\n  - \"Sources/KSCrashRecording/include/*.h\"\n  - \"Sources/KSCrashFilters/include/*.h\"\n  - \"Sources/KSCrashSinks/include/*.h\"\n  - \"Sources/KSCrashInstallations/include/*.h\"\n  - \"Sources/KSCrashDiscSpaceMonitor/include/*.h\"\n  - \"Sources/KSCrashBootTimeMonitor/include/*.h\"\n  - \"Sources/KSCrashDemangleFilter/include/*.h\"\n---\n\n## Public Modules\n\nThe public API surface consists of: **KSCrashRecording**, **KSCrashFilters**, **KSCrashSinks**, **KSCrashInstallations**, **KSCrashDiscSpaceMonitor**, **KSCrashBootTimeMonitor**, and **KSCrashDemangleFilter**. Only files in `Sources/[ModuleName]/include/*.h` are public headers.\n\n## API Stability\n\nKSCrash prioritizes API stability. The following changes to public headers are **breaking** and need strong justification plus migration guidance:\n\n- **Method parameter changes**: Any addition, removal, type change, or reordering. ObjC has no default parameters, so even adding a nullable parameter breaks all call sites.\n- **Callback/function pointer signature changes**: Parameter or return type changes.\n- **Property changes**: Type changes, nullability changes in either direction, attribute changes (e.g., atomic → nonatomic is an ABI break).\n- **NS_SWIFT_NAME changes**: Adding, modifying, or removing on existing types/methods changes the Swift API.\n- **Struct/enum layout changes**: Field reordering, removal, type changes, or enum value changes break binary compatibility.\n- **Protocol requirement changes**: Adding required methods or making optional methods required.\n- **C function signature changes**: Parameter or return type changes.\n- **Superclass changes**: Changing inheritance hierarchy.\n- **Private module leaks**: Private/internal types must not appear in public headers.\n\n### Safe Changes\n\n- Adding deprecation attributes\n- Adding completely new methods, properties, or classes with new names\n- Adding `NS_SWIFT_NAME` to brand new APIs only\n- Adding `@optional` methods to protocols"
    gold_removed: ''
  - path: .claude/rules/async-signal-safety.md
    tier: 1
    gold_added: "---\npaths:\n  - \"Sources/KSCrashRecording/**/*.{c,h,m}\"\n  - \"Sources/KSCrashRecordingCore/**/*.{c,h}\"\n  - \"Sources/KSCrashBootTimeMonitor/**\"\n  - \"Sources/KSCrashDiscSpaceMonitor/**\"\n  - \"Tests/KSCrashRecordingTests/**\"\n  - \"Tests/KSCrashRecordingCoreTests/**\"\n---\n\n## Startup Performance\n\n**IMPORTANT**: Apple recommends apps launch in under 400ms. KSCrash initializes during `kscrash_install`, which is on the startup path. All code in `kscrash_install` and `kscrs_initialize` must be as fast as possible — avoid JSON parsing, ObjC messaging, or reading large files. Prefer lightweight C-only operations (e.g., `strstr` over `KSJSONCodec`, partial file reads over full reads). Any heavy housekeeping should either be made lightweight or deferred to a background queue.\n\n## Async Signal Safety\n\n**IMPORTANT**: Much of KSCrash's core code runs inside crash handlers (signal handlers, Mach exception handlers). This code must be async-signal-safe, meaning it can only call functions that are safe to call from a signal handler context.\n\n**What this means in practice:**\n- **No heap allocation**: Do not use `malloc`, `calloc`, `free`, `new`, or any function that allocates memory. Use pre-allocated buffers or stack allocation instead.\n- **No locks**: Do not use mutexes, semaphores, or other synchronization primitives that could deadlock if the crash occurred while holding a lock.\n- **No Objective-C**: Do not call Objective-C methods or use `@synchronized`. The Objective-C runtime is not async-signal-safe.\n- **Limited C library functions**: Many standard C functions are not safe. Safe functions include `memcpy`, `memset`, `strlen`, and similar simple operations.\n- **`getsectiondata()` is async-signal-safe on Apple platforms**: Its only non-trivial call is `strncmp`, which is async-signal-safe on Apple platforms. The open-source dyld code confirms this. Do not add comments claiming it is unsafe.\n- **Use atomic operations**: For thread safety, use C11 atomics (`<stdatomic.h>`) which are lock-free and signal-safe.\n\n**However, the same code also runs outside of crash handlers** (during normal operation, initialization, background threads). This dual-use means:\n- Code must be correct in both contexts\n- You cannot assume \"it's fine because it only runs in crash handlers\" - that's often false\n- Thread safety must be considered alongside signal safety\n- Use patterns like atomic exchange (see `KSThreadCache.c`, `KSBinaryImageCache.c`) for lock-free synchronization that works in both contexts\n\nWhen in doubt, check the POSIX list of async-signal-safe functions and follow the patterns established in existing crash handling code."
    gold_removed: ''
  - path: .claude/rules/code-style.md
    tier: 1
    gold_added: "## Inline Comments\n\nComment for your future self — the person who has to change this code safely without re-deriving the scary parts. Focus on:\n\n- **Invariants that would break silently**: lock ordering, why a field is atomic (or isn't), why something is intentionally *not* guarded.\n- **Non-obvious \"why\"**: if the reason for a choice isn't clear from the code alone, say why. \"Load enterTime once — a second load could see a newer value if the main thread briefly woke\" is useful. \"Loads enterTime\" is not.\n- **Threading contracts**: which thread runs a function, and what's safe to touch from it.\n- **Simulated or fake values**: when code produces synthetic data (e.g., faking a SIGKILL for watchdog reports), say what it's mimicking and who undoes it.\n- **Crash-time constraints**: if code runs in a signal handler or with all threads suspended, say so and say what that means (no lock, no ObjC, etc.).\n\nDo **not** comment:\n- What a function does when the name already says it (`monotonicUptime`, `currentTaskRole`).\n- Every struct field — only the ones with non-obvious lifetimes, ownership, or threading rules.\n- Obvious control flow or standard patterns.\n\nA good test: if removing the comment would make a future change risky, keep it. If the code reads fine without it, skip it.\n\n## Formatting\n\n- C/C++/Objective-C: Follow clang-format style defined in the project\n- Swift: Follow Swift standard conventions and Xcode's recommended settings\n- Formatting applies to files with extensions: .c, .cpp, .h, .m, .mm\n- Use consistent naming patterns:\n  - Classes: `KSCrashMonitor_*`, `KSCrash*` (prefix with KS)\n  - Methods: descriptive, camelCase\n  - **Swift SPM modules**: Do **not** use the `KSCrash` prefix. Use plain names (e.g., `SwiftCore`, `Monitors`, `Profiler`, `Report`). The `KSCrash` prefix is only for C/ObjC targets.\n- Error handling: Use proper error handling conventions for Objective-C/Swift\n- Module organization: Maintain the existing module structure\n- API design: Keep public APIs clean and well-documented\n- **Testing**: Always run sanitizers (ASan, TSan, UBSan) after changes to catch issues early\n\n## File Headers\n\nEvery source file must include a header with the following components:\n\n1. **Filename**: The name of the file as a comment\n2. **Created by**: Author name and creation date\n3. **Copyright**: Original copyright year (2012) and copyright holder (Karl Stenerud)\n4. **License**: The MIT license text\n\n**Standard header format:**\n```c\n//\n//  KSExample.c\n//\n//  Created by Your Name on YYYY-MM-DD.\n//\n//  Copyright (c) 2012 Karl Stenerud. All rights reserved.\n//\n// Permission is hereby granted, free of charge, to any person obtaining a copy\n// of this software and associated documentation files (the \"Software\"), to deal\n// in the Software without restriction, including without limitation the rights\n// to use, copy, modify, merge, publish, distribute, sublicense, and/or sell\n// copies of the Software, and to permit persons to whom the Software is\n// furnished to do so, subject to the following conditions:\n//\n// The above copyright notice and this permission notice shall remain in place\n// in this source code.\n//\n// THE SOFTWARE IS PROVIDED \"AS IS\", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR\n// IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY,\n// FITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE\n// AUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER\n// LIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM,\n// OUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN\n// THE SOFTWARE.\n//\n```\n\n**For files derived from or inspired by other projects:**\nIf a file is based on code from another project, include the original copyright and license after the KSCrash license:\n\n```c\n//\n//  KSExample.c\n//\n//  Created by Your Name on YYYY-MM-DD.\n//\n//  Copyright (c) 2012 Karl Stenerud. All rights reserved.\n//\n// [KSCrash MIT license text...]\n//\n// Inspired by original-project/original-file\n// https://github.com/original/project\n//\n// [Original project's copyright and license text...]\n//\n```"
    gold_removed: ''
  - path: .claude/rules/monitor-sidecars.md
    tier: 1
    gold_added: "---\npaths:\n  - \"Sources/KSCrashRecording/KSCrashReportStoreC.c\"\n  - \"Sources/KSCrashRecording/KSCrashReportStoreC+Private.h\"\n  - \"Sources/KSCrashRecording/KSCrashReportStore.m\"\n  - \"Sources/KSCrashRecording/include/KSCrashReportStore*.h\"\n  - \"Sources/KSCrashRecording/include/KSCrashCConfiguration.h\"\n  - \"Sources/KSCrashRecordingCore/include/KSCrashMonitorContext.h\"\n  - \"Sources/KSCrashRecordingCore/include/KSCrashMonitorAPI.h\"\n  - \"Sources/KSCrashRecording/Monitors/*Sidecar*\"\n  - \"Sources/KSCrashRecording/Monitors/*Stitch*\"\n  - \"Sources/KSCrashRecording/KSCrashC.c\"\n  - \"Sources/KSCrashRecording/include/KSCrashC.h\"\n---\n\n## Monitor Sidecar Files\n\nSidecars allow monitors to store auxiliary data alongside crash reports without modifying the main report. This is important for monitors (like the Watchdog) that need to update report data after initial writing — doing so with ObjC JSON parsing during a hang would risk deadlocking on the same runtime locks being monitored.\n\n### How Sidecars Work\n\n1. **Writing**: A monitor can request a sidecar path at any time and write auxiliary data there. For example, a monitor might write the initial sidecar during event handling and update it periodically afterwards as conditions change.\n\n2. **At report delivery time** (next app launch): When the report store reads a report via `kscrs_readReport`, it scans the sidecar directories for matching files and calls each monitor's `stitchReport` callback to merge sidecar data into the report before delivery.\n\n3. **Cleanup**: Sidecars are automatically deleted when their associated report is deleted (via `kscrs_deleteReportWithID` or `kscrs_deleteAllReports`).\n\n### Directory Layout\n\n```\n<installPath>/\n├── Reports/\n│   └── myapp-report-00789abc00000001.json\n├── Sidecars/                                          (per-report)\n│   ├── Watchdog/\n│   │   └── 00789abc00000001.ksscr\n│   └── AnotherMonitor/\n│       └── 00789abc00000001.ksscr\n└── RunSidecars/                                       (per-run)\n    └── a1b2c3d4-e5f6-7890-abcd-ef1234567890/\n        └── Watchdog.ksscr\n```\n\nPer-report sidecars: `Sidecars/<monitorId>/<reportID>.ksscr` — one file per report per monitor. Per-run sidecars: `RunSidecars/<runID>/<monitorId>.ksscr` — one file per process run per monitor, shared across all reports from that run.\n\n### Requesting a Sidecar Path (Monitor Side)\n\nMonitors receive a `KSCrash_ExceptionHandlerCallbacks` struct during `init()`. Two path callbacks are available:\n\n- `getReportSidecarPath` (`KSCrashReportSidecarPathProviderFunc`) — per-report sidecar, tied to a specific crash report ID.\n- `getRunSidecarPath` (`KSCrashSidecarRunPathProviderFunc`) — per-run sidecar, shared across all reports from the current process run.\n\nUsage from within a monitor:\n\n```c\nstatic KSCrash_ExceptionHandlerCallbacks *g_callbacks;\n\nstatic void monitorInit(KSCrash_ExceptionHandlerCallbacks *callbacks) {\n    g_callbacks = callbacks;\n}\n\n// Per-report sidecar (when you have a reportID):\nchar sidecarPath[KSCRS_MAX_PATH_LENGTH];\nif (g_callbacks->getReportSidecarPath &&\n    g_callbacks->getReportSidecarPath(\"MyMonitor\", reportID, sidecarPath, sizeof(sidecarPath))) {\n    // Write sidecar data to sidecarPath using C file I/O\n}\n\n// Per-run sidecar (no reportID needed):\nchar runSidecarPath[KSCRS_MAX_PATH_LENGTH];\nif (g_callbacks->getRunSidecarPath &&\n    g_callbacks->getRunSidecarPath(\"MyMonitor\", runSidecarPath, sizeof(runSidecarPath))) {\n    // Write per-run data to runSidecarPath using C file I/O\n}\n```\n\nBoth callbacks create the necessary subdirectories automatically and return `false` if sidecars are not configured or the path is too long.\n\n### Stitching Sidecars into Reports (Monitor Side)\n\nTo merge sidecar data into reports at delivery time, implement the `stitchReport` field in `KSCrashMonitorAPI`:\n\n```c\nchar *(*stitchReport)(const char *report, const char *sidecarPath, KSCrashSidecarScope scope, void *context);\n```\n\n- `report`: NULL-terminated JSON string of the full crash report.\n- `sidecarPath`: Path to this monitor's sidecar file for the given report.\n- `scope`: `KSCrashSidecarScopeReport` for per-report sidecars, `KSCrashSidecarScopeRun` for per-run sidecars.\n- `context`: The monitor's opaque context pointer (same as `api->context`).\n- Returns: A `malloc`'d NULL-terminated string with the modified report, or `NULL` to leave the report unchanged. The caller frees the returned buffer.\n\nRun sidecars are stitched first, then per-report sidecars, so per-report data can override per-run data.\n\nThis runs at normal app startup time (not during crash handling), so ObjC and heap allocation are safe here.\n\n### Configuration\n\nThe sidecars directories are configured via `KSCrashReportStoreCConfiguration.reportSidecarsPath` and `runSidecarsPath`. If left `NULL` (the default), they are automatically set to `<installPath>/Sidecars` and `<installPath>/RunSidecars` during `kscrash_install`. The report store creates these directories at initialization. Orphaned run sidecar directories (those with no matching reports) are cleaned up automatically during `kscrs_initialize`.\n\n### Key Files\n\n- `KSCrashMonitorContext.h`: `KSCrashReportSidecarPathProviderFunc`, `KSCrashSidecarRunPathProviderFunc` typedefs and `getReportSidecarPath`, `getRunSidecarPath` callback fields\n- `KSCrashMonitorAPI.h`: `stitchReport` callback field on `KSCrashMonitorAPI`\n- `KSCrashMonitor.h/.c`: `kscm_setReportSidecarPathProvider()` and `kscm_setRunSidecarPathProvider()` to register path providers\n- `KSCrashReportStoreC.c`: Internal sidecar path generation, cleanup, stitching, and orphan cleanup logic\n- `KSCrashReportStoreC+Private.h`: `kscrs_getReportSidecarFilePathForReport()` and `kscrs_getRunSidecarFilePath()` exported for use by path providers\n- `KSCrashCConfiguration.h`: `reportSidecarsPath` and `runSidecarsPath` fields on `KSCrashReportStoreCConfiguration`\n- `KSCrashC.c`: Wires up the sidecar path provider callbacks during install"
    gold_removed: ''
  - path: .claude/rules/monitors.md
    tier: 1
    gold_added: "---\npaths:\n  - \"Sources/KSCrashRecording/Monitors/**\"\n  - \"Sources/KSCrashRecordingCore/**/KSCrashMonitor*.{c,h}\"\n  - \"Sources/KSCrashBootTimeMonitor/**\"\n  - \"Sources/KSCrashDiscSpaceMonitor/**\"\n  - \"Sources/Monitors/**\"\n  - \"Sources/KSCrashRecording/include/KSCrashMonitorType.h\"\n  - \"Sources/KSCrashRecording/include/KSCrashMonitorPlugin.h\"\n---\n\n## Monitors\n\nBuilt-in monitors are registered via `KSCrashMonitorType` flags. External monitors can be added as plugins via `KSCrashConfiguration.plugins` (Swift: `MonitorPlugin`, ObjC: `KSCrashMonitorPlugin`), which wrap a `KSCrashMonitorAPI` and are registered at install time via `kscm_addMonitor()`. The `Monitors` Swift module provides ready-made plugins (e.g., `Monitors.metricKit`).\n\n### Watchdog Monitor\n\nThe watchdog monitor uses a fixed 250ms threshold to detect hangs on the main thread. This threshold is intentionally not configurable — it aligns with Apple's definition of a \"hang\" (250ms+) and should not be changed. See `KSCrashMonitor_Watchdog.h` for the rationale.\n\n### KSCrashMonitorFlagAsyncSafe\n\nEach monitor declares flags via its `monitorFlags()` callback. If a monitor's `setEnabled()` implementation is async-signal-safe (no ObjC, no locks, no heap allocation), it should declare `KSCrashMonitorFlagAsyncSafe`. Currently only Signal and MachException do this. The crash handling path uses `kscmr_disableAsyncSafeMonitors()` to disable only these monitors (to restore original handlers for other crash reporters). Monitors that do not declare this flag (e.g., Memory, Deadlock, Watchdog) are skipped during crash-time disable because their `setEnabled()` uses ObjC messaging or other non-signal-safe operations, and they don't need cleanup since the process is terminating. If you write a new monitor whose `setEnabled()` uses ObjC or locks, do **not** set `KSCrashMonitorFlagAsyncSafe`."
    gold_removed: ''
  - path: .claude/rules/packaging.md
    tier: 1
    gold_added: "---\npaths:\n  - \"Package.swift\"\n  - \"KSCrash.podspec\"\n---\n\n## Package.swift / Podspec Sync\n\n`KSCrash.podspec` must stay in sync with `Package.swift`. When adding a new target or dependency in Package.swift, always add the corresponding subspec and dependency in the podspec. CI lint jobs will fail otherwise.\n\n## Public Modules\n\nThe public API surface consists of these modules: **KSCrashRecording**, **KSCrashFilters**, **KSCrashSinks**, **KSCrashInstallations**, **KSCrashDiscSpaceMonitor**, **KSCrashBootTimeMonitor**, and **KSCrashDemangleFilter**. Public headers live in `Sources/[ModuleName]/include/*.h`.\n\n## Swift SPM Module Naming\n\nSwift SPM modules should **not** use the `KSCrash` prefix. Use plain names (e.g., `SwiftCore`, `Monitors`, `Profiler`, `Report`). The `KSCrash` prefix is only for C/ObjC targets."
