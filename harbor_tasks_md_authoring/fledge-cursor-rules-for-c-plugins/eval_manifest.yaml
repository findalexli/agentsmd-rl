    gold_added: "# Fledge Notification Service - Feature Development Rules (MDC Format)\n\n---\nmetadata:\n  version: \"1.0.0\"\n  last_updated: \"2024-01-01\"\n  author: \"Fledge Development Team\"\n  service: \"notification-service\"\n  language: \"cpp\"\n  framework: \"custom\"\n  license: \"MIT\"\n---\n\n## Configuration\n\n### Development Environment\n```yaml\ndevelopment:\n  language: \"cpp\"\n  standard: \"c++11\"\n  compiler: \"gcc-11\"\n  build_system: \"cmake\"\n  testing_framework: \"gtest\"\n  linting: \"clang-tidy\"\n  formatting: \"clang-format\"\n  documentation: \"doxygen\"\n```\n\n### Project Structure\n```yaml\nproject_structure:\n  root: \"fledge-service-notification\"\n  directories:\n    src:\n      - core/           # Core business logic\n      - api/            # API endpoints and handlers\n      - storage/        # Data persistence layer\n      - utils/          # Utility functions\n      - tests/          # Unit and integration tests\n    include:            # Header files\n    docs:              # Documentation\n    scripts:           # Build and deployment scripts\n    config:            # Configuration files\n```\n\n### Naming Conventions\n```yaml\nnaming_conventions:\n  classes: \"PascalCase\"\n  methods: \"camelCase\"\n  member_variables: \"m_camelCase\"\n  constants: \"UPPER_SNAKE_CASE\"\n  namespaces: \"lowercase\"\n  files: \"snake_case\"\n  examples:\n    classes: [\"NotificationManager\", \"EmailService\"]\n    methods: [\"sendNotification\", \"validateRecipient\"]\n    member_variables: [\"m_notificationQueue\", \"m_config\"]\n    constants: [\"MAX_RETRY_ATTEMPTS\", \"DEFAULT_TIMEOUT\"]\n```\n\n## Development Rules\n\n### Pre-Development Checklist\n```yaml\npre_development_checklist:\n  architecture:\n    - \"Review existing architecture and module boundaries\"\n    - \"Identify affected components and dependencies\"\n    - \"Plan integration points with existing services\"\n  requirements:\n    - \"Define clear acceptance criteria\"\n    - \"Consider backward compatibility requirements\"\n    - \"Plan error handling and edge cases\"\n  observability:\n    - \"Design logging and observability strategy\"\n    - \"Plan metrics collection\"\n    - \"Define monitoring alerts\"\n```\n\n### Code Quality Standards\n```yaml\ncode_quality:\n  complexity:\n    max_function_lines: 50\n    max_nesting_levels: 3\n    max_cyclomatic_complexity: 10\n  memory_management:\n    required: \"raw_pointers\"\n  thread_safety:\n    required: \"mutex_protection\"\n    patterns: [\"lock_guard\", \"unique_lock\", \"atomic_operations\"]\n  error_handling:\n    required: \"exception_based\"\n    forbidden: [\"silent_failures\", \"error_ignoring\"]\n    patterns: [\"try_catch\", \"custom_exceptions\", \"error_logging\"]\n```\n\n### C++ Development Standards\n```yaml\ncpp_standards:\n  memory_management:\n    preferred:\n      - \"Notification* notification = new Notification()\"\n      - \"delete notification\"\n  \n  error_handling:\n    preferred:\n      - \"class NotificationException : public std::runtime_error\"\n      - \"throw NotificationException(\\\"Invalid recipient: \\\" + recipient)\"\n    patterns:\n      - \"exception_based\"\n      - \"meaningful_error_messages\"\n      - \"proper_logging\"\n  \n  thread_safety:\n    required:\n      - \"mutex_protection_for_shared_resources\"\n      - \"atomic_operations_where_appropriate\"\n    patterns:\n      - \"std::lock_guard<std::mutex> lock(m_mutex)\"\n      - \"std::atomic<int> counter\"\n```\n\n### API Design Standards\n```yaml\napi_design:\n  restful_endpoints:\n    base_path: \"/api/v1\"\n    patterns:\n      - \"GET /notifications\"\n      - \"POST /notifications\"\n      - \"GET /notifications/{id}\"\n      - \"PUT /notifications/{id}\"\n      - \"DELETE /notifications/{id}\"\n  \n  request_models:\n    required_fields:\n      - \"recipient\"\n      - \"subject\"\n      - \"message\"\n      - \"type\"\n    optional_fields:\n      - \"templateId\"\n      - \"metadata\"\n    validation:\n      - \"recipient_format\"\n      - \"message_length\"\n      - \"type_enumeration\"\n  \n  response_models:\n    standard_fields:\n      - \"id\"\n      - \"status\"\n      - \"createdAt\"\n      - \"updatedAt\"\n    error_response:\n      - \"error_code\"\n      - \"error_message\"\n      - \"timestamp\"\n```\n\n### Testing Standards\n```yaml\ntesting_standards:\n  unit_tests:\n    required:\n      - \"success_paths\"\n      - \"failure_paths\"\n      - \"edge_cases\"\n      - \"boundary_conditions\"\n    patterns:\n      - \"Arrange-Act-Assert\"\n      - \"Given-When-Then\"\n    naming: \"MethodName_Scenario_ExpectedResult\"\n  \n  integration_tests:\n    required:\n      - \"end_to_end_flows\"\n      - \"api_endpoints\"\n      - \"database_operations\"\n    patterns:\n      - \"TestHttpClient\"\n      - \"TestDatabase\"\n      - \"MockServices\"\n  \n  test_coverage:\n    minimum: 80\n    critical_paths: 100\n    new_features: 90\n```\n\n### Logging and Observability\n```yaml\nlogging_standards:\n  levels:\n    - \"TRACE\"\n    - \"DEBUG\"\n    - \"INFO\"\n    - \"WARN\"\n    - \"ERROR\"\n    - \"FATAL\"\n  \n  structured_logging:\n    required_fields:\n      - \"timestamp\"\n      - \"level\"\n      - \"service\"\n      - \"operation\"\n    optional_fields:\n      - \"request_id\"\n      - \"user_id\"\n      - \"duration\"\n      - \"metadata\"\n  \n  sensitive_data:\n    forbidden_in_logs:\n      - \"passwords\"\n      - \"api_keys\"\n      - \"personal_identifiers\"\n      - \"credit_card_numbers\"\n    redaction_patterns:\n      - \"password=***\"\n      - \"key=***\"\n```\n\n### Security Standards\n```yaml\nsecurity_standards:\n  input_validation:\n    required:\n      - \"recipient_format\"\n      - \"message_length\"\n      - \"type_enumeration\"\n      - \"sql_injection_prevention\"\n    patterns:\n      - \"whitelist_validation\"\n      - \"regex_validation\"\n      - \"length_limits\"\n  \n  authentication:\n    required:\n      - \"token_validation\"\n      - \"permission_checks\"\n      - \"session_management\"\n    patterns:\n      - \"JWT_tokens\"\n      - \"OAuth2\"\n      - \"API_keys\"\n  \n  authorization:\n    required:\n      - \"role_based_access\"\n      - \"resource_permissions\"\n      - \"audit_logging\"\n    patterns:\n      - \"RBAC\"\n      - \"ABAC\"\n      - \"Permission_matrix\"\n```\n\n### Performance Guidelines\n```yaml\nperformance_guidelines:\n  memory_management:\n    preferred:\n      - \"RAII_principles\"\n      - \"smart_pointers\"\n      - \"move_semantics\"\n    avoid:\n      - \"unnecessary_copies\"\n      - \"memory_leaks\"\n      - \"fragmentation\"\n  \n  async_processing:\n    patterns:\n      - \"thread_pools\"\n      - \"async_await\"\n      - \"future_promise\"\n    use_cases:\n      - \"notification_sending\"\n      - \"batch_processing\"\n      - \"external_api_calls\"\n  \n  caching:\n    strategies:\n      - \"in_memory_cache\"\n      - \"distributed_cache\"\n      - \"cache_invalidation\"\n    patterns:\n      - \"LRU_cache\"\n      - \"TTL_expiration\"\n      - \"cache_warming\"\n```\n\n### Configuration Management\n```yaml\nconfiguration_management:\n  structure:\n    required_sections:\n      - \"database\"\n      - \"email\"\n      - \"logging\"\n      - \"security\"\n    optional_sections:\n      - \"caching\"\n      - \"monitoring\"\n      - \"external_services\"\n  \n  validation:\n    required:\n      - \"type_safety\"\n      - \"value_ranges\"\n      - \"required_fields\"\n    patterns:\n      - \"schema_validation\"\n      - \"environment_validation\"\n      - \"dependency_validation\"\n  \n  environment_specific:\n    development:\n      - \"debug_logging\"\n      - \"mock_services\"\n      - \"local_database\"\n    production:\n      - \"error_logging_only\"\n      - \"real_services\"\n      - \"clustered_database\"\n```\n\n### Documentation Standards\n```yaml\ndocumentation_standards:\n  code_documentation:\n    required:\n      - \"public_apis\"\n      - \"complex_algorithms\"\n      - \"business_logic\"\n    format: \"doxygen\"\n    tags:\n      - \"@brief\"\n      - \"@param\"\n      - \"@return\"\n      - \"@throws\"\n      - \"@example\"\n  \n  api_documentation:\n    required:\n      - \"endpoint_descriptions\"\n      - \"request_response_examples\"\n      - \"error_codes\"\n    format: \"OpenAPI_3.0\"\n  \n  deployment_documentation:\n    required:\n      - \"build_instructions\"\n      - \"deployment_steps\"\n      - \"configuration_guide\"\n      - \"troubleshooting\"\n```\n\n### Deployment and DevOps\n```yaml\ndeployment_standards:\n  build_system:\n    tool: \"cmake\"\n    minimum_version: \"3.16\"\n    cpp_standard: \"17\"\n    dependencies:\n      - \"gtest\"\n      - \"spdlog\"\n      - \"nlohmann_json\"\n  \n  containerization:\n    base_image: \"gcc:11\"\n    runtime_image: \"debian:bullseye-slim\"\n    multi_stage: true\n    security_scanning: true\n  \n  ci_cd:\n    required_stages:\n      - \"build\"\n      - \"test\"\n      - \"lint\"\n      - \"security_scan\"\n      - \"deploy\"\n    quality_gates:\n      - \"test_coverage >= 80%\"\n      - \"no_critical_vulnerabilities\"\n      - \"build_success\"\n```\n\n## Code Review Checklist\n\n### Architecture & Design\n```yaml\narchitecture_checklist:\n  - \"Code follows established architectural patterns\"\n  - \"No unnecessary coupling between modules\"\n  - \"Clear separation of concerns\"\n  - \"Proper use of inheritance vs composition\"\n  - \"Module boundaries respected\"\n```\n\n### Code Quality\n```yaml\ncode_quality_checklist:\n  - \"All functions are under 50 lines\"\n  - \"No more than 4 levels of nesting\"\n  - \"No code duplication (DRY principle)\"\n  - \"Meaningful variable and function names\"\n  - \"Consistent coding style\"\n  - \"No magic numbers without constants\"\n```\n\n### Testing\n```yaml\ntesting_checklist:\n  - \"Unit tests cover all new functionality\"\n  - \"Integration tests for API endpoints\"\n\
      \  - \"Edge cases and error conditions tested\"\n  - \"Test names clearly describe behavior\"\n  - \"Mock objects used appropriately\"\n  - \"Test coverage meets minimum requirements\"\n```\n\n### Security\n```yaml\nsecurity_checklist:\n  - \"Input validation implemented\"\n  - \"Authentication/authorization checks\"\n  - \"No sensitive data in logs\"\n  - \"Secure error handling\"\n  - \"No SQL injection vulnerabilities\"\n  - \"Proper secrets management\"\n```\n\n### Performance\n```yaml\nperformance_checklist:\n  - \"No N+1 query patterns\"\n  - \"Efficient algorithms used\"\n  - \"Memory management follows RAII\"\n  - \"Async operations where appropriate\"\n  - \"No blocking operations in hot paths\"\n  - \"Resource cleanup implemented\"\n```\n\n### Documentation\n```yaml\ndocumentation_checklist:\n  - \"Public APIs documented with Doxygen\"\n  - \"README updated if needed\"\n  - \"Code comments explain 'why' not 'what'\"\n  - \"Configuration documented\"\n  - \"Deployment instructions updated\"\n  - \"API documentation current\"\n```\n\n## Anti-Patterns\n\n### Memory Management Anti-Patterns\n```yaml\nmemory_anti_patterns:\n  - \"Missing cleanup in destructors\"\n  - \"Resource leaks in error paths\"\n  - \"Improper ownership semantics\"\n```\n\n### Thread Safety Anti-Patterns\n```yaml\nthread_safety_anti_patterns:\n  - \"Shared mutable state without protection\"\n  - \"Missing mutex locks\"\n  - \"Race conditions in concurrent access\"\n  - \"Improper atomic operation usage\"\n  - \"Deadlock scenarios\"\n```\n\n### Error Handling Anti-Patterns\n```yaml\nerror_handling_anti_patterns:\n  - \"Silent failures\"\n  - \"Catching all exceptions without handling\"\n  - \"Incomplete error recovery\"\n  - \"Insufficient error logging\"\n  - \"Error swallowing\"\n```\n\n### Performance Anti-Patterns\n```yaml\nperformance_anti_patterns:\n  - \"Unnecessary object copying\"\n  - \"Inefficient algorithms\"\n  - \"Blocking operations in hot paths\"\n  - \"Memory allocation in performance-critical code\"\n  - \"N+1 query patterns\"\n```\n\n## Feature Development Template\n\n### Template Structure\n```yaml\nfeature_template:\n  interface_definition:\n    - \"Define the feature interface\"\n    - \"Specify public API methods\"\n    - \"Document method signatures\"\n  \n  implementation:\n    - \"Implement the feature class\"\n    - \"Add proper error handling\"\n    - \"Include logging and metrics\"\n    - \"Follow thread safety patterns\"\n  \n  testing:\n    - \"Create unit tests\"\n    - \"Add integration tests\"\n    - \"Test edge cases\"\n    - \"Verify error conditions\"\n  \n  documentation:\n    - \"Document public APIs\"\n    - \"Add usage examples\"\n    - \"Update README if needed\"\n    - \"Include configuration docs\"\n```\n\n### Template Code Structure\n```yaml\ntemplate_code:\n  header_file: \"include/[FeatureName]Service.h\"\n  implementation_file: \"src/core/[FeatureName]Service.cpp\"\n  test_file: \"src/tests/[FeatureName]ServiceTest.cpp\"\n  documentation_file: \"docs/[FeatureName]Service.md\"\n  \n  class_structure:\n    - \"Public interface methods\"\n    - \"Private helper methods\"\n    - \"Member variables\"\n    - \"Constructor and destructor\"\n  \n  test_structure:\n    - \"Setup and teardown\"\n    - \"Success path tests\"\n    - \"Failure path tests\"\n    - \"Edge case tests\"\n```\n\n## Validation Rules\n\n### Code Validation\n```yaml\ncode_validation:\n  static_analysis:\n    - \"clang-tidy\"\n    - \"cppcheck\"\n    - \"sonarqube\"\n  \n  dynamic_analysis:\n    - \"valgrind\"\n    - \"asan\"\n    - \"tsan\"\n  \n  style_checking:\n    - \"clang-format\"\n    - \"cpplint\"\n    - \"custom_style_rules\"\n```\n\n### Test Validation\n```yaml\ntest_validation:\n  coverage_requirements:\n    line_coverage: 80\n    branch_coverage: 70\n    function_coverage: 90\n  \n  test_quality:\n    - \"No flaky tests\"\n    - \"Fast execution\"\n    - \"Clear assertions\"\n    - \"Proper mocking\"\n```\n\n### Security Validation\n```yaml\nsecurity_validation:\n  static_analysis:\n    - \"semgrep\"\n    - \"bandit\"\n    - \"custom_security_rules\"\n  \n  dependency_checking:\n    - \"safety\"\n    - \"snyk\"\n    - \"vulnerability_scanning\"\n```\n\n## Compliance\n\n### Standards Compliance\n```yaml\ncompliance:\n  coding_standards:\n    - \"C++11 standard\"\n    - \"MISRA C++ guidelines\"\n    - \"Google C++ Style Guide\"\n    - \"Project-specific conventions\"\n  \n  security_standards:\n    - \"OWASP guidelines\"\n    - \"CWE/SANS Top 25\"\n    - \"Industry best practices\"\n  \n  performance_standards:\n    - \"Response time requirements\"\n    - \"Throughput requirements\"\n    - \"Resource utilization limits\"\n```\n\n### Quality Gates\n```yaml\nquality_gates:\n  build:\n    - \"Successful compilation\"\n    - \"No warnings\"\n    - \"Static analysis passed\"\n  \n  test:\n    - \"All tests passing\"\n    - \"Coverage requirements met\"\n    - \"No flaky tests\"\n  \n  security:\n    - \"No critical vulnerabilities\"\n    - \"Security scan passed\"\n    - \"Dependency audit clean\"\n  \n  performance:\n    - \"Performance benchmarks passed\"\n    - \"Memory usage within limits\"\n    - \"Response time requirements met\"\n```\n\n---\n# End of MDC Configuration\ndescription:\nglobs:\nalwaysApply: false\n---"
