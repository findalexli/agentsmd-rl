    tier: 1
    gold_added: "# HardwareVisualizer – Copilot Coding Agent Instructions\n\n## Big picture\n- Cross-platform hardware monitoring app (React/Vite + Tauri/Rust).\n- Frontend ↔ backend calls go through **Tauri commands**. `src/rspc/bindings.ts` is **generated by tauri-specta** (do not edit).\n- Rust backend follows strict one-way dependencies: **Commands → Services → Platform (Factory) → OS APIs** (see `docs/ARCHITECTURE/BACKEND_ARCHITECTURE.md`).\n\n## Where to change code\n- UI/features: `src/features/**` (e.g. `src/features/settings/hooks/useSettingsAtom.ts`). Shared UI lives in `src/components/ui/**` (shadcn/Radix).\n- State management uses **Jotai**: define with `atom(...)`, consume with `useAtom(...)` (e.g. `src/features/hardware/hooks/useHardwareInfoAtom.ts`).\n- Lightweight persisted UI settings: Tauri Store plugin.\n  - Store instance: `src/lib/tauriStore.ts`\n  - Hook: `src/hooks/useTauriStore.ts` (returns a union of `[value|null, setValue, isPending]`)\n\n## Backend/Frontend integration\n- Call commands via `import { commands } from \"@/rspc/bindings\"`.\n- Check `Result` with `isError(...)` (e.g. `src/features/hardware/hooks/useHardwareInfoAtom.ts`). On failure, notify via `useTauriDialog().error(...)`.\n- When adding a new backend command:\n  - Add code in `src-tauri/src/commands/*.rs` (UI boundary) → `src-tauri/src/services/*.rs` (business logic) → `src-tauri/src/platform/**` (OS-specific)\n  - If OS APIs / DB / external I/O are involved, also add/change `src-tauri/src/infrastructure/**` (e.g. `infrastructure/providers/**`, `infrastructure/database/**`)\n  - Register it in `collect_commands![ ... ]` inside `src-tauri/src/lib.rs` (this drives TS bindings generation)\n  - `src/rspc/bindings.ts` is exported from `src-tauri/src/lib.rs` in debug builds; regenerate via `npm run tauri dev`\n\n## Error/event conventions\n- Backend emits `error_event`; frontend shows a modal via `useErrorModalListener` (see `src/hooks/useTauriEventListener.ts`).\n\n## Dev workflows (repo-specific)\n- Prereqs: Node.js v22 (per README) + Rust (toolchain in `rust-toolchain.toml`).\n- Linux build deps: `libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf` (see CI/README). Some metrics require sudo.\n- Web UI only: `npm run dev` (React DevTools + Vite). Vite port is fixed to `1520` (`vite.config.ts`).\n- Desktop (Tauri): `npm run tauri dev`\n- Frontend lint/format: `npm run lint` / `npm run format` (Biome; primarily targets `./src`)\n- Frontend tests: `npm test` (Vitest; config in `vitest.config.ts` / setup in `src/test/setup.ts`)\n- Rust checks (CI parity):\n  - `cargo fmt --manifest-path src-tauri/Cargo.toml -- --check`\n  - `cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings`\n  - `cargo test --manifest-path src-tauri/Cargo.toml -- --test-threads=1 --nocapture`\n\n## Project conventions\n- Import alias: `@` → `src` (`vite.config.ts` / `vitest.config.ts`).\n- i18n: `src/lib/i18n.ts` with `src/lang/en.json` and `src/lang/ja.json`. Add UI strings to JSON and reference via `useTranslation()` (e.g. `src/App.tsx`).\n- Avoid editing generated/vendor outputs: do not edit `src/rspc/bindings.ts`.\n\n## Communication\n- Write code comments and git commit messages in English.\n- In chat, match the language used in the user prompt."
    gold_removed: ''
  - path: AGENTS.md
    tier: 1
    gold_added: 'Frontend ↔ backend communication is done via **Tauri commands**; TypeScript bindings are generated (see `src/rspc/bindings.ts`, do not edit manually).


      │   │   ├── models/       # Data type definitions

      │   │   ├── enums/        # Type definitions (including error types)

      │   │   ├── infrastructure/ # External resources (providers, database)

      │   │   ├── workers/      # Background tasks (monitoring, archive, updater)

      ## Communication


      - Write code comments and git commit messages in English.

      - In chat, match the language used in the user prompt.


      - **Test Location**: `src/test/unit/` for frontend, `src-tauri/src/_tests/` for Rust

      If OS APIs / DB / external I/O are involved, services typically also rely on `src-tauri/src/infrastructure/**`.


      1. **Commands Layer** (`src-tauri/src/commands/`)

      2. **Services Layer** (`src-tauri/src/services/`)

      3. **Platform Layer** (`src-tauri/src/platform/`)

      ## Frontend conventions worth knowing


      - Generated bindings: `src/rspc/bindings.ts` is generated by tauri-specta; edit Rust commands and re-run `npm run tauri dev` to regenerate.

      - Persistent UI settings: Tauri Store plugin via `src/lib/tauriStore.ts` + `src/hooks/useTauriStore.ts`.

      - Error events: backend emits `error_event`; frontend listens via `useErrorModalListener` in `src/hooks/useTauriEventListener.ts`.

      '
