    gold_added: "description: Creates Dockerfiles, configures CI/CD pipelines, writes Kubernetes manifests, and generates Terraform/Pulumi infrastructure templates. Handles deployment automation, GitOps configuration, incident response runbooks, and internal developer platform tooling. Use when setting up CI/CD pipelines, containerizing applications, managing infrastructure as code, deploying to Kubernetes clusters, configuring cloud platforms, automating releases, or responding to production incidents. Invoke for pipelines, Docker, Kubernetes, GitOps, Terraform, GitHub Actions, on-call, or platform engineering.\n4. **Validate** - Run `terraform plan`, lint configs, execute unit/integration tests; confirm no destructive changes before proceeding\n5. **Deploy** - Roll out with verification; run smoke tests post-deployment\n6. **Monitor** - Set up observability, alerts; confirm rollback procedure is ready before going live\n### Minimal GitHub Actions Example\n\n```yaml\nname: CI\non:\n  push:\n    branches: [main]\njobs:\n  build-test-push:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - name: Build image\n        run: docker build -t myapp:${{ github.sha }} .\n      - name: Run tests\n        run: docker run --rm myapp:${{ github.sha }} pytest\n      - name: Scan image\n        uses: aquasecurity/trivy-action@master\n        with:\n          image-ref: myapp:${{ github.sha }}\n      - name: Push to registry\n        run: |\n          docker tag myapp:${{ github.sha }} ghcr.io/org/myapp:${{ github.sha }}\n          docker push ghcr.io/org/myapp:${{ github.sha }}\n```\n\n### Minimal Dockerfile Example\n\n```dockerfile\nFROM python:3.12-slim AS builder\nWORKDIR /app\nCOPY requirements.txt .\nRUN pip install --no-cache-dir -r requirements.txt\n\nFROM python:3.12-slim\nWORKDIR /app\nCOPY --from=builder /usr/local/lib/python3.12/site-packages /usr/local/lib/python3.12/site-packages\nCOPY . .\nUSER nonroot\nHEALTHCHECK --interval=30s --timeout=5s CMD curl -f http://localhost:8080/health || exit 1\nCMD [\"python\", \"main.py\"]\n```\n\n### Rollback Procedure Example\n\n```bash\n# Kubernetes: roll back to previous deployment revision\nkubectl rollout undo deployment/myapp -n production\nkubectl rollout status deployment/myapp -n production\n\n# Verify rollback succeeded\nkubectl get pods -n production -l app=myapp\ncurl -f https://myapp.example.com/health\n```\n\nAlways document the rollback command and verification step in the PR or change ticket before deploying.\n"
