    gold_added: "description: Use when building React 18+ applications in .jsx or .tsx files, Next.js App Router projects, or create-react-app setups. Creates components, implements custom hooks, debugs rendering issues, migrates class components to functional, and implements state management. Invoke for Server Components, Suspense boundaries, useActionState forms, performance optimization, or React 19 features.\n4. **Validate** - Run `tsc --noEmit`; if it fails, review reported errors, fix all type issues, and re-run until clean before proceeding\n5. **Optimize** - Apply memoization where needed, ensure accessibility; if new type errors are introduced, return to step 4\n6. **Test** - Write tests with React Testing Library; if any assertions fail, debug and fix before submitting\n## Key Patterns\n\n### Server Component (Next.js App Router)\n```tsx\n// app/users/page.tsx — Server Component, no \"use client\"\nimport { db } from '@/lib/db';\n\ninterface User {\n  id: string;\n  name: string;\n}\n\nexport default async function UsersPage() {\n  const users: User[] = await db.user.findMany();\n\n  return (\n    <ul>\n      {users.map((user) => (\n        <li key={user.id}>{user.name}</li>\n      ))}\n    </ul>\n  );\n}\n```\n\n### React 19 Form with `useActionState`\n```tsx\n'use client';\nimport { useActionState } from 'react';\n\nasync function submitForm(_prev: string, formData: FormData): Promise<string> {\n  const name = formData.get('name') as string;\n  // perform server action or fetch\n  return `Hello, ${name}!`;\n}\n\nexport function GreetForm() {\n  const [message, action, isPending] = useActionState(submitForm, '');\n\n  return (\n    <form action={action}>\n      <input name=\"name\" required />\n      <button type=\"submit\" disabled={isPending}>\n        {isPending ? 'Submitting…' : 'Submit'}\n      </button>\n      {message && <p>{message}</p>}\n    </form>\n  );\n}\n```\n\n### Custom Hook with Cleanup\n```tsx\nimport { useState, useEffect } from 'react';\n\nfunction useWindowWidth(): number {\n  const [width, setWidth] = useState(() => window.innerWidth);\n\n  useEffect(() => {\n    const handler = () => setWidth(window.innerWidth);\n    window.addEventListener('resize', handler);\n    return () => window.removeEventListener('resize', handler); // cleanup\n  }, []);\n\n  return width;\n}\n```\n"
