    gold_added: "description: Use when deploying or managing Kubernetes workloads. Invoke to create deployment manifests, configure pod security policies, set up service accounts, define network isolation rules, debug pod crashes, analyze resource limits, inspect container logs, or right-size workloads. Use for Helm charts, RBAC policies, NetworkPolicies, storage configuration, performance optimization, GitOps pipelines, and multi-cluster management.\n1. **Analyze requirements** — Understand workload characteristics, scaling needs, security requirements\n2. **Design architecture** — Choose workload types, networking patterns, storage solutions\n3. **Implement manifests** — Create declarative YAML with proper resource limits, health checks\n4. **Secure** — Apply RBAC, NetworkPolicies, Pod Security Standards, least privilege\n5. **Validate** — Run `kubectl rollout status`, `kubectl get pods -w`, and `kubectl describe pod <name>` to confirm health; roll back with `kubectl rollout undo` if needed\n## Common YAML Patterns\n\n### Deployment with resource limits, probes, and security context\n\n```yaml\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: my-app\n  namespace: my-namespace\n  labels:\n    app: my-app\n    version: \"1.2.3\"\nspec:\n  replicas: 3\n  selector:\n    matchLabels:\n      app: my-app\n  template:\n    metadata:\n      labels:\n        app: my-app\n        version: \"1.2.3\"\n    spec:\n      serviceAccountName: my-app-sa   # never use default SA\n      securityContext:\n        runAsNonRoot: true\n        runAsUser: 1000\n        fsGroup: 2000\n      containers:\n        - name: my-app\n          image: my-registry/my-app:1.2.3   # never use latest\n          ports:\n            - containerPort: 8080\n          resources:\n            requests:\n              cpu: \"100m\"\n              memory: \"128Mi\"\n            limits:\n              cpu: \"500m\"\n              memory: \"512Mi\"\n          livenessProbe:\n            httpGet:\n              path: /healthz\n              port: 8080\n            initialDelaySeconds: 15\n            periodSeconds: 20\n          readinessProbe:\n            httpGet:\n              path: /ready\n              port: 8080\n            initialDelaySeconds: 5\n            periodSeconds: 10\n          securityContext:\n            allowPrivilegeEscalation: false\n            readOnlyRootFilesystem: true\n            capabilities:\n              drop: [\"ALL\"]\n          envFrom:\n            - secretRef:\n                name: my-app-secret   # pull credentials from Secret, not ConfigMap\n```\n\n### Minimal RBAC (least privilege)\n\n```yaml\napiVersion: v1\nkind: ServiceAccount\nmetadata:\n  name: my-app-sa\n  namespace: my-namespace\n---\napiVersion: rbac.authorization.k8s.io/v1\nkind: Role\nmetadata:\n  name: my-app-role\n  namespace: my-namespace\nrules:\n  - apiGroups: [\"\"]\n    resources: [\"configmaps\"]\n    verbs: [\"get\", \"list\"]   # grant only what is needed\n---\napiVersion: rbac.authorization.k8s.io/v1\nkind: RoleBinding\nmetadata:\n  name: my-app-rolebinding\n  namespace: my-namespace\nsubjects:\n  - kind: ServiceAccount\n    name: my-app-sa\n    namespace: my-namespace\nroleRef:\n  kind: Role\n  name: my-app-role\n  apiGroup: rbac.authorization.k8s.io\n```\n\n### NetworkPolicy (default-deny + explicit allow)\n\n```yaml\n# Deny all ingress and egress by default\napiVersion: networking.k8s.io/v1\nkind: NetworkPolicy\nmetadata:\n  name: default-deny-all\n  namespace: my-namespace\nspec:\n  podSelector: {}\n  policyTypes: [\"Ingress\", \"Egress\"]\n---\n# Allow only specific traffic\napiVersion: networking.k8s.io/v1\nkind: NetworkPolicy\nmetadata:\n  name: allow-my-app\n  namespace: my-namespace\nspec:\n  podSelector:\n    matchLabels:\n      app: my-app\n  policyTypes: [\"Ingress\"]\n  ingress:\n    - from:\n        - podSelector:\n            matchLabels:\n              app: frontend\n      ports:\n        - protocol: TCP\n          port: 8080\n```\n\n## Validation Commands\n\nAfter deploying, verify health and security posture:\n\n```bash\n# Watch rollout complete\nkubectl rollout status deployment/my-app -n my-namespace\n\n# Stream pod events to catch crash loops or image pull errors\nkubectl get pods -n my-namespace -w\n\n# Inspect a specific pod for failures\nkubectl describe pod <pod-name> -n my-namespace\n\n# Check container logs\nkubectl logs <pod-name> -n my-namespace --previous   # use --previous for crashed containers\n\n# Verify resource usage vs. limits\nkubectl top pods -n my-namespace\n\n# Audit RBAC permissions for a service account\nkubectl auth can-i --list --as=system:serviceaccount:my-namespace:my-app-sa\n\n# Roll back a failed deployment\nkubectl rollout undo deployment/my-app -n my-namespace\n```\n"
