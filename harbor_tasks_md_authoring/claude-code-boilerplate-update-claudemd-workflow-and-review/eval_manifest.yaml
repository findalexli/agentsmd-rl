    gold_added: "15. [AI Agent Workflow](#15-ai-agent-workflow) - *\"No Code, No Problem\"*\n    - [15.4 Review Requirements (Score вүҘ 9.5 to Merge)](#154-review-requirements-score-based-approval)\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ                                                             в”Ӯ\nв”Ӯ              \"NO CODE, NO PROBLEM\"                          в”Ӯ\nв”Ӯ                                                             в”Ӯ\nв”Ӯ   The best code is no code. The best fix is prevention.     в”Ӯ\nв”Ӯ   Write only what's necessary. Delete what's not.           в”Ӯ\nв”Ӯ   Simplicity is the ultimate sophistication.                в”Ӯ\nв”Ӯ                                                             в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n| 11 | All Review Agents | **Team Review** - Each agent scores (1-10) + provides feedback |\n| 12 | - | **Calculate average score** across all reviewers |\n| 13 | Fullstack Agent | If avg < 9.5: **Fix ALL issues** from ALL reviewers |\n| 14 | - | **Repeat steps 11-13** until average score вүҘ 9.5 |\n| 15 | - | **APPROVED** - Ready to merge when score вүҘ 9.5 |\n**CRITICAL:** Steps 3-4 (TDD), Steps 7-9 (Impact Verification), and Steps 11-15 (Score вүҘ 9.5) are NON-NEGOTIABLE.\n### 15.4 Review Requirements (Score-Based Approval)\n**PRs are approved when average team review score reaches 9.5+/10.**\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  REVIEW CYCLE - ITERATE UNTIL SCORE 9.5+                    в”Ӯ\nв”Ӯ                                                             в”Ӯ\nв”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ                                        в”Ӯ\nв”Ӯ  в”Ӯ  TEAM REVIEW    в”Ӯ  All agents review the PR              в”Ӯ\nв”Ӯ  в”Ӯ  (Score 1-10)   в”Ӯ  Each provides score + feedback        в”Ӯ\nв”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ                                        в”Ӯ\nв”Ӯ           в”Ӯ                                                 в”Ӯ\nв”Ӯ           в–ј                                                 в”Ӯ\nв”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ                                        в”Ӯ\nв”Ӯ  в”Ӯ CALCULATE AVG   в”Ӯ  Average all agent scores              в”Ӯ\nв”Ӯ  в”Ӯ    SCORE        в”Ӯ                                        в”Ӯ\nв”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ                                        в”Ӯ\nв”Ӯ           в”Ӯ                                                 в”Ӯ\nв”Ӯ           в–ј                                                 в”Ӯ\nв”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ      NO     в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ        в”Ӯ\nв”Ӯ  в”Ӯ  Score вүҘ 9.5?   в”Ӯв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–әв”Ӯ  FIX ALL ISSUES в”Ӯ        в”Ӯ\nв”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ             в”Ӯ  from feedback  в”Ӯ        в”Ӯ\nв”Ӯ           в”Ӯ YES                  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ        в”Ӯ\nв”Ӯ           в”Ӯ                               в”Ӯ                 в”Ӯ\nв”Ӯ           в–ј                               в”Ӯ                 в”Ӯ\nв”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ                      в”Ӯ                 в”Ӯ\nв”Ӯ  в”Ӯ    APPROVED     в”Ӯв—„в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ                 в”Ӯ\nв”Ӯ  в”Ӯ  Ready to merge в”Ӯ      (repeat review cycle)             в”Ӯ\nв”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ                                        в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n#### Review Scoring Criteria\n\n| Score | Meaning | Action Required |\n|-------|---------|-----------------|\n| 10 | Perfect - No issues | Ready to merge |\n| 9 | Excellent - Minor suggestions only | Optional improvements |\n| 8 | Good - Small issues exist | Must fix before merge |\n| 7 | Acceptable - Notable issues | Fix required |\n| 6 | Below Standard - Multiple issues | Significant rework needed |\n| вүӨ5 | Unacceptable - Major problems | Complete revision required |\n\n#### Review Process\n\n| Step | Action | Outcome |\n|------|--------|---------|\n| 1 | Submit PR | Team review begins |\n| 2 | Each agent reviews | Provides score (1-10) + detailed feedback |\n| 3 | Calculate average | Sum of scores / number of reviewers |\n| 4 | If avg < 9.5 | Fix ALL issues identified by ALL reviewers |\n| 5 | Re-submit for review | Repeat steps 2-4 |\n| 6 | If avg вүҘ 9.5 | **APPROVED** - Ready to merge |\n\n#### Review Focus by Agent\n\n| Agent | Review Focus | Scoring Weight |\n|-------|--------------|----------------|\n| Principal Agent | Code quality, architecture, security, best practices | Equal |\n| QA Agent | Test coverage, test quality, edge cases, regression | Equal |\n| UI/UX Agent | User experience, accessibility, design consistency | Equal |\n| Solution Architect | Scalability, system design, integration patterns | Equal |\n\n#### Important Rules\n\n- **ALL issues must be fixed** - No \"will fix later\" or \"minor, can skip\"\n- **ALL reviewers must re-review** after fixes\n- **Score MUST reach 9.5+** - No exceptions, no shortcuts\n- **Each cycle is fresh** - Previous scores don't carry over\n- **Detailed feedback required** - Scores without justification are invalid\nв”Ӯ  8. TEAM REVIEW (All Agents)                в”Ӯ\nв”Ӯ     - Each agent scores 1-10                в”Ӯ\nв”Ӯ     - Each provides detailed feedback       в”Ӯ\nв”Ӯ     - Calculate average score               в”Ӯ\n                    в”Ӯ\n                    в–ј\n           в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n           в”Ӯ Avg Score     в”Ӯ\n           в”Ӯ   вүҘ 9.5?      в”Ӯ\n           в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n                   в”Ӯ\n         NO в—„в”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв–ә YES\n          в”Ӯ                  в”Ӯ\n          в–ј                  в–ј\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  FIX ALL ISSUES     в”Ӯ  в”Ӯ     APPROVED        в”Ӯ\nв”Ӯ  from ALL reviewers в”Ӯ  в”Ӯ  Ready to merge     в”Ӯ\nв”Ӯ  (follow TDD cycle) в”Ӯ  в”Ӯ                     в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n           в”Ӯ\n           в””в”Җв”Җв”Җв”Җв”Җв”Җв–ә REPEAT (back to step 8)\n```\n\n**\"NO CODE, NO PROBLEM\"** - Iterate until excellence. No shortcuts."
