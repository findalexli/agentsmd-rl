      Document persists   Other connected
        to SQLite         clients see edits
        |
        v
      User shares doc
        -> generates link
        |
        v
      Recipient opens
        in browser client
      Skip both for simple projects (single-purpose libraries, CLI tools) where the directory tree already tells the whole story.
