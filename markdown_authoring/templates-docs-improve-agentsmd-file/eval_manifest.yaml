      ## Commit Message Format


      When committing template changes, use the following format for the subject line:


      - **New template:** `add <providerName>, <serviceName>` (e.g., `add Example Domain Connect Service, Stateless Hosting Primary`)

      - **Modified template:** `modify <providerName>, <serviceName>`

      - **Deleted template:** `delete <providerName>, <serviceName>`

      - **Multiple templates:** `<providerName>, <num> templates` (e.g., `Example Domain Connect Service, 3 templates`)


      ### Commit Body


      The commit body should follow the structure defined in [`.github/pull_request_template.md`](.github/pull_request_template.md). When creating commit messages, AI tools may:


      - Assist with checking `[ ]` checkboxes from the PR template

      - Help verify template quality rules


      **IMPORTANT:** AI tools **MUST NEVER** fabricate or hallucinate "Online Editor test results" links. These must be generated by actually using the [Online Editor](https://domainconnect.paulonet.eu/dc/free/templateedit).

