config_edits:
  - path: skills/skillpack-creator/SKILL.md
    tier: 1
    gold_added: "Reduce the finished task into a clean execution spec:\n- Capture the user goal, concrete deliverable, and the final successful workflow (not the full exploratory transcript).\n- Separate deterministic steps from heuristic steps; remove dead ends and debugging noise.\n- If the task is still too broad, narrow the scope instead of writing a vague mega-skill. If key success conditions depend on hidden human judgment, mark the pack as a best-effort assistant workflow.\nAsk for missing stable facts or infer only the low-risk pieces.\n- **Local skill** (`skills/`): reusable procedural knowledge. Keep scripts minimal unless reproducibility depends on exact file generation or repetitive shell steps.\n- **Scripts** (`scripts/`): repeated shell or file-generation logic where reliability matters.\n- **References** (`references/`): detailed schemas, API notes, or conventions that should not bloat `SKILL.md`.\n- **Prompts** (`skillpack.json`): 1–3 pack-level starter inputs for the UI — not a DAG or state machine. See `references/skillpack-format.md` for exact pack semantics.\nBefore writing files, define the pack spec. Prefer one local orchestrator skill plus a small number of external skills. Example minimal manifest:\n\n```json\n{\n  \"name\": \"company-research\",\n  \"description\": \"Research a company and produce a summary report\",\n  \"version\": \"1.0.0\",\n  \"prompts\": [\"Research {company} and create a report with financials and competitors\"],\n  \"skills\": [\n    { \"name\": \"research-orchestrator\", \"source\": \"./skills/research-orchestrator\", \"description\": \"Orchestrate company research across multiple sources\" }\n  ]\n}\n```\nCreate `skills/<skill-name>/SKILL.md` with frontmatter and imperative workflow instructions:\n```yaml\n---\nname: research-orchestrator\ndescription: \"Orchestrate multi-source company research. Use when the user wants a structured company report covering financials, competitors, and market position.\"\n---\n```\n- Write the stable workflow as imperative steps in the body.\n- Add `scripts/` only for fragile or repeated operations; add `references/` only for detailed information.\nUse `scripts/scaffold_skillpack.py` when you have the pack spec:\n# Basic\n# With zip\nThe script validates the manifest, writes `skillpack.json`, creates `skills/`, copies `start.sh`/`start.bat` from `templates/`, and optionally runs `npx -y @cremini/skillpack zip`.\n### 6. Validate the result\nBefore handing the pack back, confirm:\n- The manifest matches the intended pack scope\n- Every declared skill has a valid `name`, `source`, and `description`\n- Local skills are present under the target pack's `skills/`\n- Starter prompts are concrete enough to reproduce the workflow\n- Zip only after the pack runs as a directory\nProduce:"
    gold_removed: ''
  - path: templates/builtin-skills/skill-creator/SKILL.md
    tier: 1
    gold_added: 'Create new skills and iteratively improve them inside this SkillPack. Determine where the user is in the create → draft → test → improve cycle and help them move forward.

      All skills live under `{{SKILLS_PATH}}/<skill-name>/SKILL.md` and config is at `{{PACK_CONFIG_PATH}}`. These paths override any generic advice. Never create skills in the current workspace directory — always use `{{SKILLS_PATH}}`.

      Extract answers from the current conversation first, then fill gaps with targeted questions. Confirm before writing the first draft:

      Clarify edge cases, input/output formats, success criteria, and dependencies as needed before writing test prompts.

      Create the skill at `{{SKILLS_PATH}}/<skill-name>/SKILL.md`. Example template:

      ```yaml

      ---

      name: example-skill

      description: "Analyze competitor pricing pages and generate a comparison matrix. Use when the user wants to benchmark pricing tiers, feature gaps, or positioning against specific competitors."

      ---

      # Example Skill

      ## Workflow

      1. Collect the target URLs from the user.

      2. Extract pricing tiers, features, and limits from each page.

      3. Generate a comparison matrix as a markdown table.

      ## Output

      Return a markdown table with one column per competitor and one row per feature.

      The `description` is the primary triggering mechanism — make it concrete with both what the skill does and when to use it. Keep the body focused on workflow, decisions, and output expectations. Place deterministic helpers under `scripts/` and long reference material under `references/`.

      Preserve the existing skill name when improving unless the user explicitly requests a rename.

      ### Sync skillpack.json

      After creating or updating a skill, sync `{{PACK_CONFIG_PATH}}`. Read the final `SKILL.md`, parse the YAML frontmatter, and upsert into the `skills` array:

      All three fields must come from frontmatter — do not guess from memory. Update existing entries instead of creating duplicates.

      Prefer imperative instructions. Structure skills as: purpose, trigger guidance, required inputs, step-by-step workflow, output format, edge cases. For multi-domain skills, organize references by variant and tell the model how to choose.

      After drafting the skill, propose 2–3 realistic test prompts phrased as a real user would.

      If the user wants evaluation, run the prompts, compare outputs against expectations, note failures, and revise. Otherwise, do at least a lightweight sanity check before calling the skill complete.'
