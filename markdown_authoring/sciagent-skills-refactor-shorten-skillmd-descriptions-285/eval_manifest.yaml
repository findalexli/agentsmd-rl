config_edits:
  - path: skills/biostatistics/clinical-decision-support-documents/SKILL.md
    tier: 1
    gold_added: 'description: "Guidelines for clinical decision support (CDS) documents: biomarker-stratified cohort analyses and GRADE-graded treatment reports. Covers structure, executive summaries, evidence grading (1A–2C), stats (HR, CI, survival), and biomarker integration. Use for pharma research docs, clinical guidelines, regulatory submissions."'
    gold_removed: ''
  - path: skills/biostatistics/degenerate-input-filtering/SKILL.md
    tier: 1
    gold_added: 'description: "Filter degenerate, uninformative inputs before statistical tests: single-sequence alignments, empty files, constant features, zero-variance inputs, all-NaN columns. See nan-safe-correlation for NaN-aware correlation; statistical-analysis for test guidance."'
    gold_removed: ''
  - path: skills/biostatistics/hypothesis-generation/SKILL.md
    tier: 1
    gold_added: 'description: "Structured hypothesis formulation: turn observations into testable hypotheses with predictions, propose mechanisms, design experiments. Follows the scientific method. Use scientific-brainstorming for open ideation; hypogenic for automated LLM hypothesis testing on datasets."'
    gold_removed: ''
  - path: skills/biostatistics/matplotlib-scientific-plotting/SKILL.md
    tier: 1
    gold_added: 'description: "Low-level Python plotting for scientific figures: publication-quality line, scatter, bar, heatmap, contour, 3D; multi-panel layouts; fine control of every element. PNG/PDF/SVG export. Use seaborn for quick stats, plotly for interactive."'
    gold_removed: ''
  - path: skills/biostatistics/nan-safe-correlation/SKILL.md
    tier: 1
    gold_added: 'description: "Per-feature NaN-safe Spearman/Pearson correlation across many features (genes, proteins, variants) with missing values. Covers why bulk matrix shortcuts fail, correct pairwise deletion, degenerate input filtering, and large-dataset performance. Use statistical-analysis for test choice; shap-model-explainability for interpretability."'
    gold_removed: ''
  - path: skills/biostatistics/pyhealth/SKILL.md
    tier: 1
    gold_added: 'description: "Python library for healthcare ML on EHR data: process MIMIC-III/IV, eICU, OMOP-CDM; encode medical codes (ICD, ATC, NDC); build patient-level datasets; train Transformer, RETAIN, GRASP, MedBERT for mortality, drug recommendation, readmission, diagnosis prediction. Alternatives: FIDDLE (preprocessing), clinical-longformer (clinical NLP), ehr-ml (embeddings)."'
    gold_removed: ''
  - path: skills/biostatistics/pymc-bayesian-modeling/SKILL.md
    tier: 1
    gold_added: 'description: "Bayesian modeling with PyMC 5: priors, likelihood, NUTS/ADVI sampling, diagnostics (R-hat, ESS), LOO/WAIC comparison, prediction. Hierarchical, logistic, GP variants; predictive checks."'
    gold_removed: ''
  - path: skills/biostatistics/scikit-learn-machine-learning/SKILL.md
    tier: 1
    gold_added: 'description: "Classical ML in Python: classification, regression, clustering, dim reduction, evaluation, tuning, preprocessing pipelines. Linear models, tree ensembles, SVMs, K-Means, PCA, t-SNE. Use PyTorch/TF for deep learning; XGBoost/LightGBM for scale."'
    gold_removed: ''
  - path: skills/biostatistics/scikit-survival-analysis/SKILL.md
    tier: 1
    gold_added: 'description: "Time-to-event modeling with scikit-survival: Cox PH (elastic net), Random Survival Forests, Boosting, SVMs for censored data. C-index, Brier, time-dependent AUC; Kaplan-Meier, Nelson-Aalen, competing risks. Pipeline/GridSearchCV compatible. Use statsmodels for frequentist, pymc for Bayesian, lifelines for parametric."'
    gold_removed: ''
  - path: skills/biostatistics/shap-model-explainability/SKILL.md
    tier: 1
    gold_added: "  Model interpretability via SHAP (Shapley values from game theory).\n  Covers explainer choice (Tree, Deep, Linear, Kernel, Gradient,\n  Permutation), feature attribution, and plots (waterfall, beeswarm,\n  bar, scatter, force, heatmap). Use to explain ML predictions, rank\n  features, debug models, audit fairness, or compare models. Works\n  with tree, deep, linear, and black-box models."
    gold_removed: ''
  - path: skills/biostatistics/statistical-analysis/SKILL.md
    tier: 1
    gold_added: "  Guided statistical analysis: test choice, assumption checks, effect\n  sizes, power, APA reporting. Pick tests, verify assumptions, or\n  format results for publication. Covers frequentist (t-test, ANOVA,\n  chi-square, regression, correlation, survival, count, reliability)\n  and Bayesian. Use statsmodels or pymc-bayesian-modeling to fit."
    gold_removed: ''
  - path: skills/biostatistics/statsmodels-statistical-modeling/SKILL.md
    tier: 1
    gold_added: 'description: "Python statistical modeling: regression (OLS, WLS, GLM), discrete (Logit, Poisson, NegBin), time series (ARIMA, SARIMAX, VAR), with rigorous inference, diagnostics, and hypothesis tests. Use scikit-learn for ML; statistical-analysis for test choice."'
    gold_removed: ''
  - path: skills/cell-biology/cellpose-cell-segmentation/SKILL.md
    tier: 1
    gold_added: 'description: "DL cell/nucleus segmentation for fluorescence and brightfield microscopy. Pre-trained models (cyto3, nuclei, tissuenet) and a generalist flow-based algorithm segment cells without retraining. Outputs label masks for morphology and tracking. Use scikit-image watershed for rule-based; Cellpose when DL generalization across staining is needed."'
    gold_removed: ''
  - path: skills/cell-biology/flowio-flow-cytometry/SKILL.md
    tier: 1
    gold_added: 'description: "Parse/write FCS (Flow Cytometry) files v2.0-3.1. Events as NumPy, channel metadata, multi-dataset files, CSV/FCS export. Use FlowKit for gating/compensation."'
    gold_removed: ''
  - path: skills/cell-biology/histolab-wsi-processing/SKILL.md
    tier: 1
    gold_added: 'description: "WSI processing for digital pathology. Tissue detection, tile extraction (random, grid, score-based), filter pipelines for H&E/IHC. For dataset prep, tile-based DL, slide QC. Use pathml for multiplexed imaging."'
    gold_removed: ''
  - path: skills/cell-biology/imaging-data-commons/SKILL.md
    tier: 1
    gold_added: 'description: "Query NCI Imaging Data Commons (IDC) for cancer radiology and pathology datasets on Google Cloud. Search DICOM by modality, anatomical site, or cancer type; download via GCS or IDAT. 50TB+ public DICOM. GCS account needed for large downloads; metadata queries free. Use pydicom-medical-imaging for local DICOM; histolab for WSI."'
    gold_removed: ''
  - path: skills/cell-biology/napari-image-viewer/SKILL.md
    tier: 1
    gold_added: 'description: "Interactive viewer for microscopy. Displays 2D/3D/4D arrays as Image, Labels, Points, Shapes, Tracks layers; supports annotation, plugin analysis, headless screenshots. Core visualization for Python bioimage workflows. Use ImageJ/FIJI for macro processing; napari for Python-native interactive visualization and DL segmentation review."'
    gold_removed: ''
