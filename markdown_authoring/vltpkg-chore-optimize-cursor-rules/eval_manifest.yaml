config_edits:
  - path: .cursor/rules/cli-sdk-workspace.mdc
    tier: 1
    gold_added: "description: CLI SDK architecture, commands, and config system\nglobs: src/cli-sdk/src/**/*,src/cli-sdk/test/**/*\n# CLI SDK Workspace\n## Architecture\n- `src/cli-sdk/src/config/definition.ts` — **Central file**: all CLI options, flags, commands defined here (jackspeak)\n- `src/cli-sdk/src/config/index.ts` — Config parsing, option resolution\n- `src/cli-sdk/src/config/usage.ts` — Help text generation\n- `src/cli-sdk/src/commands/` — Command implementations\n- `src/cli-sdk/src/exec-command.ts` — Shared run/exec logic\n## Adding CLI Options\nDefine in `definition.ts`, access via `conf.values['option-name']` or `conf.get('option-name')`:\n```typescript\n.opt({\n  'your-option': {\n    hint: 'value', short: 'y',\n    description: 'Description', default: 'default-value',\n  },\n})\n```\n## Command Structure\nEvery command exports: `usage` (CommandUsage), `views` (Views), `command` (CommandFn). Pattern:\n```typescript\nconst usageDef = { command: 'name', usage: '<args>', description: '...' } as const satisfies CommandUsageDefinition\nexport const usage: CommandUsage = () => commandUsage(usageDef)\nexport const views: Views<ReturnType> = { human: ViewClass, json: result => result }\nexport const command: CommandFn<ReturnType> = async conf => { /* impl */ }\n```\n## Adding Commands\n1. Add to `canonicalCommands` in `definition.ts`\n2. Create `src/cli-sdk/src/commands/your-command.ts`\n3. Add tests in `src/cli-sdk/test/commands/your-command.ts`\n## Config Precedence\nCLI args → project vlt.json → user vlt.json → defaults. Command-specific: `command.{name}` in vlt.json.\n## Testing\nUses `t.mockImport` for mocking. Config objects typed as `LoadedConfig`."
    gold_removed: ''
  - path: .cursor/rules/code-validation-workflow.mdc
    tier: 1
    gold_added: 'description: Code validation workflow (format, lint, test, coverage, typecheck)

      globs: src/*/src/**/*.ts,src/*/test/**/*.ts

      Run from the workspace dir (e.g., `cd src/semver`). If `package.json` deps changed, run `pnpm install` from repo root first.

      ## Steps (run in order, stop on failure)

      1. **Format:** `pnpm format`

      2. **Lint:** `pnpm lint` — see `@linting-error-handler.mdc` for common fixes

      3. **Test:** `pnpm test -Rtap --disable-coverage` (single file: append `test/foo.ts`)

      4. **Coverage:** `pnpm test -Rsilent --coverage-report=text-lcov` (single file: append `test/foo.ts`)

      5. **Types:** `pnpm posttest`

      ## Snapshots

      Update only when changes are intentional: `pnpm snap -Rtap --disable-coverage test/foo.ts`

      ## Test Quality

      - Never use `as any` to bypass types in tests — respect type contracts

      - Use existing test fixtures from `test/` dirs

      - Study similar tests in the module for patterns

      - Ensure 100% coverage'
