  - path: experiments/src/skills/scienceworld/scienceworld-object-selector/SKILL.md
    tier: 1
    gold_added: 'description: Use when the agent needs to choose a specific object from multiple candidates in the environment based on task criteria such as object type (non-living thing, electrical component, container), properties, or category. This skill surveys visible objects with "look around", evaluates each against the task requirements, selects the most suitable candidate, and signals intent with "focus on [OBJECT]".

      # Skill: scienceworld-object-selector

      ## Purpose

      Identify and select the correct object from visible candidates in the ScienceWorld environment based on task-defined criteria (e.g., "non-living thing", "electrical component", "container"), then signal intent with a `focus on` action.

      ## When to Use


      - When a task requires choosing a specific type of object from multiple visible options

      - When the agent must classify objects by property (living/non-living, material type, function) to select one

      - When the task instructs finding and interacting with a particular category of object


      ## Workflow


      1. **Survey the environment** -- Use `look around` to list all visible objects in the current location.

      2. **Evaluate candidates** -- For each visible object, determine if it matches the task criteria. Exclude target containers (e.g., destination boxes) and fixed furniture from candidates.

      3. **Select the best match** -- Choose the first suitable, portable object unless the task specifies a preference (e.g., "largest", "closest").

      4. **Signal intent** -- Execute `focus on [OBJECT]` to confirm selection.

      5. **Execute the task action** -- Proceed with the required action (e.g., `pick up`, `move`, `use`).


      ## Examples


      ### Example 1: Find a non-living thing and move it


      ```

      > look around

      You see: purple box, table, battery, black wire, blue light bulb, red light bulb, red wire, switch, violet light bulb, yellow wire, ultra low temperature freezer.

      ```


      **Evaluation:** Purple box is the destination. Table and freezer are fixed furniture. Remaining items (battery, wires, bulbs, switch) are all non-living and portable.


      ```

      > focus on black wire

      You focus on the black wire.


      > move black wire to purple box

      You move the black wire to the purple box.

      ```


      ### Example 2: Find an electrical component


      **Task:** "Find an electrical component and place it on the workbench."


      ```

      > look around

      You see: workbench, chair, battery, glass cup, red wire, notebook.


      > focus on battery

      You focus on the battery.


      > move battery to workbench

      You move the battery to the workbench.

      ```


      ## Key Principles


      - **Exclude destinations** -- Never select the target container or destination as the candidate object.

      - **Verify if uncertain** -- Use `examine [OBJECT]` for more detail about an object''s properties before selecting.

      - **Task alignment** -- The selection should enable the next action in the task sequence.'
    gold_removed: ''
  - path: experiments/src/skills/scienceworld/scienceworld-process-monitor/SKILL.md
    tier: 1
    gold_added: "description: This skill observes the state of an active apparatus and its contents to track progress. Use when you need to periodically check for state changes (e.g., solid to liquid) during a heating or reaction process. The skill uses 'look at' or 'examine' actions on the apparatus and substance.\n## When to Use\nActivate when an apparatus (stove, burner) is active and you need to check whether a substance has undergone a state change (e.g., solid to liquid, liquid to gas).\n## Procedure\n1. `look at <APPARATUS>` — verify it is active and contains the target substance.\n   - If apparatus is not active, use `activate <APPARATUS>` first.\n   - If substance is missing, check inventory or nearby containers.\n2. `examine <SUBSTANCE>` — check its current state description.\n3. Compare the observed state to the previous state. If changed (e.g., \"chocolate\" to \"liquid chocolate\"), proceed to the next task step.\n4. If no change, use `wait` then repeat from step 1.\nRun every few steps during an active process. This skill only observes — it does not modify the apparatus or handle substances.\n## Example\n**Task:** Monitor chocolate melting on a stove.\n1. `look at stove` — observation: \"a stove (activated), containing: chocolate\"\n2. `examine chocolate` — observation: \"chocolate\"\n3. No change yet. `wait`\n4. `examine chocolate` — observation: \"liquid chocolate\"\n5. State change detected. Proceed to take a temperature measurement."
