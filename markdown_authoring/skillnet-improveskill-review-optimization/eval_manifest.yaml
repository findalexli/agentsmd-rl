  - path: experiments/src/skills/scienceworld/scienceworld-liquid-pourer/SKILL.md
    tier: 1
    gold_added: 'description: Transfers the contents of a source liquid container into a target container for mixing or preparation. Use this skill when you need to combine multiple substances (such as paints or chemicals) into a single vessel, or when a liquid must be moved from one container to another before processing.

      # Skill: Liquid Pourer

      ## Purpose

      Transfer a liquid from a source container to a target container, typically as a preparatory step for mixing or chemical combination.

      ## When to Use

      - Combining multiple liquids or substances into one vessel for mixing.

      - Moving a liquid to a more suitable container before heating or processing.

      - Preparing ingredients for a recipe that requires pouring.

      ## Core Workflow

      1. **Identify Containers:** Use `look around` to locate the source container (with the liquid) and the target container (destination vessel).

      2. **Perform Transfer:** `pour OBJ into OBJ` with precise object identifiers.

      3. **Verify:** `look at OBJ` on the target container to confirm the transfer succeeded.

      ## Key Actions

      | Action | Purpose |

      |--------|---------|

      | `look around` | Locate source and target containers |

      | `pour OBJ into OBJ` | Transfer liquid contents |

      | `look at OBJ` | Verify transfer success |

      | `mix OBJ` | Combine contents (separate skill, used after pouring) |

      ## Example

      **Task:** Create orange paint by mixing red and yellow paint.


      1. `look around` — find `wood cup (containing red paint)`, `wood cup (containing yellow paint)`, and `jug`

      2. `pour wood cup (containing red paint) into jug`

      3. `pour wood cup (containing yellow paint) into jug`

      4. `mix jug` — produces orange paint


      ## Important Notes

      * Object identifiers must be precise (e.g., `wood cup (containing red paint)`). Use `look around` or `examine` to confirm exact names.

      * Ensure the target container can receive the substance without contamination.

      * Pouring only transfers contents — use `mix` as a separate step to combine them.'
    gold_removed: ''
  - path: experiments/src/skills/scienceworld/scienceworld-living-entity-identifier/SKILL.md
    tier: 1
    gold_added: "description: Analyzes room observations to identify potential living things (e.g., eggs, plants, animals) among listed objects. Use this skill when a task involves finding, focusing on, or interacting with a living thing, biological entity, or organism. Processes observation text, flags candidate living items based on domain knowledge, and outputs a focused target for subsequent actions like focus on or pick up.\nIdentify living things (eggs, plants, animals) from room observations and focus on them for task progression.\n## Core Workflow\n1. **Survey Room:** `look around` to get the observation text listing all objects.\n2. **Identify Candidates:** Scan the object list for living entity indicators:\n   - **Animals:** dove, giant tortoise, bee, frog, fish\n   - **Eggs:** dove egg, chicken egg, turtle egg\n   - **Plants:** flower, tree, moss, fern, algae\n   - **Other biological:** mushroom, seed, pollen\n3. **Focus on Target:** `focus on [IDENTIFIED_OBJECT]` to signal task progress.\n4. **Transport (if needed):** `pick up [OBJECT]` then `move [OBJECT] to [CONTAINER]`.\n## Key Actions\n| Action | Purpose |\n|--------|---------|\n| `look around` | Survey room for objects |\n| `teleport to LOC` | Move to rooms with biological likelihood |\n| `focus on OBJ` | Signal identification to task system |\n| `pick up OBJ` | Acquire entity for transport |\n## Example\n**Task:** \"Find a living thing in the environment.\"\n\n1. `teleport to outside`\n2. `look around` — observation lists: \"a dove egg\", \"a rock\", \"soil\"\n3. Identify \"dove egg\" as the living entity candidate\n4. `focus on dove egg`\n5. If transport required: `pick up dove egg` then `move dove egg to blue box`\n\n## Important Notes\n* Prioritize explicit living things (e.g., \"dove egg,\" \"giant tortoise\") over ambiguous substances (e.g., \"air,\" \"water\").\n* If the current room lacks candidates, `teleport to` rooms with higher biological likelihood: `outside`, `greenhouse`, `bedroom`.\n* Always use `focus on` immediately after identification — it signals task progress."
