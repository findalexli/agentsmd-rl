  - path: experiments/src/skills/scienceworld/scienceworld-growth-focuser/SKILL.md
    tier: 1
    gold_added: 'description: Use when you have planted a seed or need to track a plant''s growth stage (sprouting, flowering, reproduction). Applies the ''focus on'' action to a specific plant or biological entity to signal intent and monitor its development. Trigger after planting or when you need to observe life cycle progression in the ScienceWorld environment.

      ## Example


