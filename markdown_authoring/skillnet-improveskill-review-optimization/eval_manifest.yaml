  - path: experiments/src/skills/alfworld/alfworld-search-verifier/SKILL.md
    tier: 1
    gold_added: 'description: Re-examines previously visited locations to confirm the absence of a target object or to check for overlooked items. Use when an initial search fails to find enough objects or when double-checking is required before concluding task failure. Systematically revisits receptacles, re-opens closed containers, and re-inspects contents to ensure no viable location was missed.

