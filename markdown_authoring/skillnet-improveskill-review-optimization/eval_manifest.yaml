  - path: experiments/src/skills/scienceworld/scienceworld-container-transfer/SKILL.md
    tier: 1
    gold_added: 'description: Moves a substance or object from one container to another (e.g., moving lead to a metal pot). Use this skill when you need to prepare materials for processing, such as transferring a substance into a heat-resistant container before heating, or reorganizing materials between vessels for mixing or measurement.

      Transfer a target substance or object from a source container to a destination container. This is a foundational step for preparing materials for heating, mixing, or measurement.

      ## Core Workflow

