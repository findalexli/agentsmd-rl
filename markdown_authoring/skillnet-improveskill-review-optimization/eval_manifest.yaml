  - path: experiments/src/skills/alfworld/alfworld-object-heater/SKILL.md
    tier: 1
    gold_added: 'description: Heats a specified object using an available heating appliance (e.g., microwave, stoveburner). Use when you are holding an object that requires heating and need to navigate to and operate the heating appliance. Takes the object and appliance as inputs and results in the object being in a heated state.

      # Instructions

      Heat an object you are holding using a compatible heating appliance (microwave or stoveburner).

      - The target object must be in your inventory

      - A heating appliance (microwave, stoveburner) must exist in the environment


      ## Workflow

      1. **Navigate:** `go to {appliance}` (e.g., `go to microwave 1`)

      2. **Check state:** If observation says appliance is closed, execute `open {appliance}` -- verify observation confirms it is now open

      3. **Heat:** `heat {object} with {appliance}` -- verify observation confirms "You heat the {object}"

      4. **(Optional) Place:** If the task requires it, navigate to the destination and place the heated object


      ## Action Format

      - `go to microwave 1` / `go to stoveburner 1`

      - `open microwave 1`

      - `heat {object} with {appliance}` (e.g., `heat potato 1 with microwave 1`)


      ## Error Recovery

      - "Nothing happened" on heat: Check (1) you are holding the object, (2) appliance is open, (3) appliance name is correct

      - Appliance occupied: Take the existing item out first, then retry


      ## Example


      **Scenario:** You are holding `potato 1` and need to heat it.


      ```

      Thought: I need to heat the potato. I''ll go to the microwave.

      Action: go to microwave 1

      Observation: The microwave 1 is closed.

      Action: open microwave 1

      Observation: You open the microwave 1. The microwave 1 is open. In it, you see nothing.

      Action: heat potato 1 with microwave 1

      Observation: You heat the potato 1 using the microwave 1.

      ```


      **Result:** The potato is now heated. Proceed to place it at the destination if required by the task.'
    gold_removed: ''
  - path: experiments/src/skills/alfworld/alfworld-object-locator/SKILL.md
    tier: 1
    gold_added: "description: Use when the agent needs to find a specific object in ALFWorld that is not currently in inventory and whose location is unknown. This skill parses the environment observation, ranks receptacles by likelihood of containing the target object using common-sense reasoning, and outputs a navigation action to the most promising location.\n1. Your goal requires a specific object (e.g., `knife`, `cellphone`, `apple`)\n## Core Workflow\n### 1. Parse the Environment\nExtract all visible receptacles from the observation text. Typical ALFWorld receptacles include:\n- **Surfaces**: countertop, desk, dresser, bed, shelf, sidetable, coffeetable, diningtable\n- **Containers**: drawer, cabinet, safe, fridge, microwave, garbagecan\n- **Appliances**: sinkbasin, bathtub, stoveburner, toaster\n### 2. Rank by Likelihood\nUse common-sense reasoning to prioritize where the target object is most likely found:\n\n| Object Type | High-Probability Receptacles |\n|-------------|------------------------------|\n| Kitchen items (knife, spatula, pan) | countertop, drawer, diningtable, stoveburner |\n| Food (apple, potato, tomato, bread) | fridge, countertop, diningtable, microwave |\n| Bathroom items (sponge, cloth, soap) | sinkbasin, bathtub, cart, shelf |\n| Electronics (cellphone, laptop, remote) | desk, sidetable, dresser, bed, coffeetable |\n| Stationery (pen, pencil, book) | desk, shelf, drawer, sidetable |\n| Lighting (candle, desklamp) | sidetable, shelf, desk, dresser |\n\n### 3. Navigate and Search\nFor each candidate receptacle (in priority order):\n1. `go to {receptacle}`\n2. Read the observation — does it mention the target object?\n   - **YES**: `take {object} from {receptacle}` — object found\n   - **NO**: If the receptacle is closed, `open {receptacle}` and re-check\n   - **Still NO**: Move to the next candidate receptacle\n\n### 4. Track Searched Locations\nMaintain a list of already-searched receptacles to avoid revisiting them. If all high-probability locations are exhausted, expand the search to remaining receptacles.\n\n## Example\n\n**Task:** \"Clean the knife and put it in drawer.\"\n**Observation:** \"You are in the middle of a room. Looking quickly around you, you see a countertop 1, a drawer 1, a drawer 2, a fridge 1, a sinkbasin 1, a stoveburner 1.\"\n\n```\n> go to countertop 1\nOn the countertop 1, you see a knife 1, a saltshaker 2, a bread 1.\n> take knife 1 from countertop 1\nYou pick up the knife 1 from the countertop 1.\n```\n\n**Result:** Target object `knife 1` located and acquired from `countertop 1`.\n\n**Example — Object not at first location:**\n\n```\n> go to countertop 1\nOn the countertop 1, you see a saltshaker 2, a bread 1.\n> go to drawer 1\nThe drawer 1 is closed.\n> open drawer 1\nYou open the drawer 1. The drawer 1 is open. In it, you see a knife 1.\n> take knife 1 from drawer 1\nYou pick up the knife 1 from the drawer 1.\n```\n\n## Error Handling\n- **Object not found in any receptacle**: Re-check closed containers that may not have been opened. Some objects are only visible after opening.\n- **Multiple instances**: If the task requires a specific instance (e.g., `knife 1` vs `knife 2`), verify the object identifier matches before taking it.\n- **\"Nothing happened\"**: The `take` command may fail if the agent is not at the receptacle. Ensure navigation was successful before attempting to take."
    gold_removed: ''
  - path: experiments/src/skills/alfworld/alfworld-object-state-inspector/SKILL.md
    tier: 1
    gold_added: "description: Inspects a receptacle's contents by navigating to it and reading the observation. Use when you need to check what is on or inside a receptacle (e.g., \"what's on the shelf\", \"is the holder empty\", \"check the table for items\"). Executes `go to {receptacle}`, parses the observation listing items present, and decides whether to take an item, search elsewhere, or proceed.\nInspect the state or contents of a target receptacle by navigating to it and parsing the environment's observation feedback.\n## Workflow\n1. **Navigate:** Execute `go to {target_receptacle}`\n2. **Read observation:** The environment automatically reports what is on/in the receptacle -- no additional inspection action is needed\n3. **Parse contents:** Look for patterns:\n   - `\"On the {receptacle}, you see nothing.\"` -- receptacle is empty\n   - `\"On the {receptacle}, you see a {item1}, and a {item2}.\"` -- items are present\n4. **Decide next action** based on the observation:\n   - Empty: search elsewhere for the needed item\n   - Item found: `take {item} from {receptacle}`\n   - Wrong items: move on to the next receptacle\n## Error Recovery\n- \"Nothing happened\": the `go to` target name is invalid -- verify the receptacle name from your environment scan\n- This skill uses only `go to` for navigation; it does not use `open`, `close`, or `toggle`\n## Example\n**Scenario 1:** Check if a toiletpaperhanger has toilet paper.\n```\nAction: go to toiletpaperhanger 1\nObservation: On the toiletpaperhanger 1, you see nothing.\n```\n\n**Decision:** Holder is empty. Find a toiletpaper roll elsewhere and bring it here.\n\n**Scenario 2:** Check a toilet for available items.\n\n```\nAction: go to toilet 1\nObservation: On the toilet 1, you see a soapbottle 1, and a toiletpaper 1.\n```\n\n**Decision:** toiletpaper 1 is available. Execute `take toiletpaper 1 from toilet 1`."
    gold_removed: ''
  - path: experiments/src/skills/alfworld/alfworld-object-state-modifier/SKILL.md
    tier: 1
    gold_added: 'description: Uses an appliance to change the state of an object (cooling, heating, or cleaning). Use when the task requires altering an object''s temperature or cleanliness using a specific device (e.g., cooling with a fridge, heating with a microwave, cleaning with a sinkbasin). Takes the object, target state, and appliance as inputs and executes the corresponding modifier action.

      Change an object''s state (cool, heat, or clean) using a household appliance. You must be holding the target object before executing the state change.


      ## Workflow

      1. **Navigate to appliance:** `go to {appliance}` (e.g., `go to fridge 1`)

      2. **Prepare if closed:** If observation says appliance is closed, execute `open {appliance}` -- verify it opens

      3. **Execute state change:** `{action} {obj} with {appliance}` -- verify observation confirms the change

      4. **Proceed:** Continue with the next task step (e.g., placing the modified object)


      ## Action Mapping

      | State Change | Action | Typical Appliance |

      |---|---|---|

      | Cool | `cool {obj} with {appliance}` | `fridge 1` |

      | Heat | `heat {obj} with {appliance}` | `microwave 1`, `stoveburner 1` |

      | Clean | `clean {obj} with {appliance}` | `sinkbasin 1` |


      ## Error Recovery

      - "Nothing happened": Check (1) you are holding the object, (2) appliance is open/ready, (3) object and appliance names are correct

      - Appliance occupied: remove existing items first with `take {item} from {appliance}`


      ## Example


      **Scenario:** You need to cool a tomato using the fridge.


      ```

      Thought: I''m holding tomato 1 and need to cool it. I''ll go to the fridge.

      Action: go to fridge 1

      Observation: The fridge 1 is closed.

      Action: open fridge 1

      Observation: You open the fridge 1. The fridge 1 is open. In it, you see a lettuce 1.

      Action: cool tomato 1 with fridge 1

      Observation: You cool the tomato 1 using the fridge 1.

      ```


      **Result:** The tomato is now in a cooled state. Proceed with the next task step (e.g., placing it on a countertop).'
