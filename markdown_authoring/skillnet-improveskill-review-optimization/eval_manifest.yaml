  - path: experiments/src/skills/alfworld/alfworld-storage-explorer/SKILL.md
    tier: 1
    gold_added: 'description: Systematically explores storage receptacles (drawers, cabinets, shelves) to find an appropriate placement location for an object. Use when the agent needs to store an item but the exact target receptacle is unknown or ambiguous. Opens, inspects, and closes candidate receptacles to assess suitability, then places the object in the best match.

      ## Example


      **Task:** "Put a clean sponge in drawer."


      **Input:** Holding `sponge 1` (already cleaned). Target type: drawer.


      **Sequence:**

