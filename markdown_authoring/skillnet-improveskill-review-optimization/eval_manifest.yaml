  - path: experiments/src/skills/scienceworld/scienceworld-conditional-focus-executor/SKILL.md
    tier: 1
    gold_added: 'description: Executes a ''focus on OBJ'' action on a specific object based on the outcome of a prior conditional evaluation. Use when you have a measurement result and task instructions specify focusing on different objects (e.g., colored boxes) depending on whether the result meets a threshold.

      Use after completing a measurement (temperature, pH, mass) when the task specifies a conditional rule like "If result > X, focus on A; otherwise, focus on B."


