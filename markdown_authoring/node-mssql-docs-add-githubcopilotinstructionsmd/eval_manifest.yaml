    gold_added: "# Copilot Instructions for node-mssql\n\n## Build, Test, and Lint\n\n```bash\nnpm test              # Lint (standard) + unit tests\nnpm run lint          # StandardJS linter only (no config file ‚Äî uses standard directly)\nnpm run test-unit     # Unit tests only (no database required)\nnpm run test-tedious  # Integration tests against a live SQL Server (tedious driver)\nnpm run test-cli      # CLI tool tests\n```\n\nRun a single unit test:\n\n```bash\nnpx mocha --exit -t 15000 --grep \"test name\" test/common/unit.js\n```\n\nIntegration tests require a running SQL Server instance configured in `test/.mssql.json` (see `.devcontainer/.mssql.json` for the expected shape). The devcontainer sets up both Node.js and SQL Server via Docker Compose.\n\n## Architecture\n\nThis is a **driver-agnostic SQL Server client** for Node.js. The core abstraction is:\n\n- **`lib/base/`** ‚Äî Abstract base classes (`ConnectionPool`, `Request`, `Transaction`, `PreparedStatement`) that define the public API. All extend `EventEmitter`.\n- **`lib/tedious/`** ‚Äî Tedious driver implementation. Each file extends the corresponding base class and overrides private methods like `_poolCreate()`, `_executeQuery()`, etc.\n- **`lib/msnodesqlv8/`** ‚Äî MSNodeSQLv8 (native ODBC) driver implementation. Same pattern.\n- **Entry points**: `index.js` and `tedious.js` both export `lib/tedious`; `msnodesqlv8.js` exports `lib/msnodesqlv8`.\n\nDriver index files use `Object.assign()` to merge base exports with driver-specific class overrides, then register the driver on the shared `driver` object in `lib/shared.js`.\n\n### Other key modules\n\n- **`lib/shared.js`** ‚Äî Global mutable state: the active `driver`, configurable `Promise` library, and `map` (JS type ‚Üí SQL type registry with `getTypeByValue()` auto-detection).\n- **`lib/global-connection.js`** ‚Äî Singleton global connection pool with pre-connect handler registration.\n- **`lib/datatypes.js`** ‚Äî SQL type definitions. Parameterized types are factory functions: `sql.VarChar(50)`, `sql.Numeric(18, 4)`.\n- **`lib/table.js`** ‚Äî `Table` class for bulk inserts and TVPs. Parses qualified names like `[db].[schema].[table]`.\n- **`lib/error/`** ‚Äî Error hierarchy: `MSSQLError` ‚Üí `ConnectionError`, `RequestError`, `TransactionError`, `PreparedStatementError`. Each has a `code` property (e.g., `EINJECT`, `EARGS`, `EREQINPROG`).\n\n## Conventions\n\n- **Private methods** use a leading underscore (`_poolCreate`, `_executeQuery`). These are the driver-specific hooks that implementations override.\n- **Dual API**: All async methods support both Promises and callbacks.\n- **Streaming**: `Request` supports a `stream` mode where results are emitted as `row`, `recordset`, and `done` events.\n- **Linting**: StandardJS ‚Äî no semicolons, 2-space indent, single quotes. No config overrides.\n- **Commit messages:** Follow [Conventional Commits](https://www.conventionalcommits.org/) enforced by commitlint. Semantic-release uses these to generate automated releases and changelogs, so correct commit types are critical.\n  - `fix` ‚Äî Bug fixes or behavioural corrections that don't change public interfaces. Triggers a **patch** release.\n  - `feat` ‚Äî New backwards-compatible functionality. Triggers a **minor** release.\n  - `feat!` (or any type with `!`) ‚Äî Breaking changes where consumers would need to update their code. Triggers a **major** release.\n  - `chore` ‚Äî Dependency updates, tooling changes, or housekeeping. **Does not trigger a release.**\n  - `ci` ‚Äî Changes to CI pipelines or workflow configuration. **Does not trigger a release.**\n  - `style` ‚Äî Refactoring or stylistic changes that do not change functionality. **Does not trigger a release.**\n  - `test` ‚Äî Changes that only touch test files. **Does not trigger a release.**\n  - Only `fix` and `feat` trigger releases. If a change doesn't neatly fit `fix` or `feat` but still needs to be released, use whichever is most appropriate to ensure a release is created.\n- **Commits and merges:**\n  - Commits should be atomic and ideally deployable in isolation ‚Äî all tests, linting, and commitlinting should pass on each individual commit.\n  - PRs are merged using a **merge commit** (no squash-merge or rebase-merge). Each commit in the PR history is preserved.\n  - To keep branches up to date with the base branch, **rebase** onto it rather than merging it in.\n  - All changes must go through a **pull request** ‚Äî no direct commits to master.\n- **Debug logging**: Uses the `debug` library with `mssql:*` namespaces (`mssql:base`, `mssql:tedi`, etc.).\n- **Instance tracking**: `lib/utils.js` uses a `WeakMap` (`IDS`) to assign unique IDs to class instances.\n- **SQL injection guard**: Parameter names are validated against patterns like `--`, `/*`, `'` ‚Äî throws `RequestError` with code `EINJECT`.\n\n### Test patterns\n\n- **Unit tests** (`test/common/unit.js`): No database needed. Tests type mapping, table parsing, error construction.\n- **Integration tests** (`test/common/tests.js`): Exported as a factory `(sql, driver) => { ... }` ‚Äî called by each driver's test file. Many tests exercise three execution styles: callback, promise, and streaming.\n- **Framework**: Mocha + Node.js built-in `assert` (no chai/sinon).\n- **Keeping this file up to date:** If a change affects the architecture, conventions, build process, or any other information documented here, update this file as part of the same PR."
