      ## PR / CI rule
      
      -   Before opening or updating a PR, always run this baseline locally.
          -   `cargo fmt --all`
          -   `cargo clippy --all --all-targets -- -D warnings`
      -   For each touched Rust crate, run crate-level verification locally.
          -   `cargo test -p <crate>`
