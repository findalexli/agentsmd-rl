  - path: .claude/rules/app-state.md
    tier: 1
    gold_added: "---\npaths:\n  - \"**/src/app/state.rs\"\n  - \"**/src/app/reducers/**/*.rs\"\n---\n\n# AppState 不変条件\n\n## 派生状態パターン（必須）\n\n`AppState` のフィールドが他フィールドから派生する場合（例: `connection_list_items` は `connections` + `service_entries` から派生）、**ソースフィールドはすべて private** にし、派生フィールドを自動再構築する setter 経由でのみ変更すること。\n\n| パターン | 可否 |\n|---------|------|\n| 派生グループへの直接代入（`state.foo = x`） | **禁止** |\n| 自動再構築付き setter（`state.set_foo(x)`） | **必須** |\n| `rebuild_*()` を公開APIとして提供 | **禁止**（private にして setter 内部から呼ぶ） |\n\n### 既存の適用例\n\n- **Connection グループ**: `connections`, `service_entries` → `connection_list_items`\n  - Setter: `set_connections`, `set_service_entries`, `set_connections_and_services`, `retain_connections`\n  - Getter: `connections()`, `service_entries()`, `connection_list_items()`\n\n新しい派生フィールドを追加する場合も同じパターンを適用すること。\n\n## State/View 分離（必須）\n\n- カーソル位置をコンテンツ `String` の一部としてエンコードしてはならない（例: テキスト中にカーソル文字を挿入する）\n- カーソル位置は View 層の関心事であり、State 内では独立した数値インデックスとして保持すること"
    gold_removed: ''
  - path: .claude/rules/architecture.md
    tier: 1
    gold_added: '# アーキテクチャルール

      ## レイヤ構造（ヘキサゴナル / Ports & Adapters）

      ├── ui/          # プレゼンテーション層 + UI Adapters

      ├── app/         # アプリケーション層（State, Reducers, Ports）

      ├── infra/       # インフラストラクチャ Adapters

      └── domain/      # ドメインモデル（純粋なデータ構造）

      ## 依存ルール

      **許可:**

      - `infra/adapters/` → `app/ports/`（trait を実装）

      - `ui/adapters/` → `app/ports/`（trait を実装）

      ## 禁止依存（違反不可）

      - `app/` → `ui/` — 代わりに Renderer port を使う

      - `app/` → `infra/` — MetadataProvider, ConfigWriter 等の port を使う

      app→infra の通信が必要な場合、`app/ports/` に port trait を定義し `infra/adapters/` で実装すること。


      ## Ports & Adapters パターン


      Port は `app/ports/` に定義された **trait** で、外部依存を抽象化する:


      | Port | 用途 | Adapter の場所 |

      |------|------|---------------|

      | `MetadataProvider` | DBメタデータ取得 | `infra/adapters/` |

      | `QueryExecutor` | SQL実行 | `infra/adapters/` |

      | `ConfigWriter` | キャッシュディレクトリ | `infra/adapters/` |

      | `Renderer` | TUI描画 | `ui/adapters/` |


      ## 新規コードの配置先


      | やりたいこと | 配置先 |

      |-------------|--------|

      | UIコンポーネント追加 | `ui/components/` |

      | ビジネスロジック追加 | `app/`（純粋関数、I/Oなし） |

      | 外部I/O追加 | `app/ports/` に port 定義 → `infra/adapters/` or `ui/adapters/` で実装 |

      | DB固有のSQL・接続文字列ロジック追加 | `app/ports/` に port 定義 → `infra/adapters/` で実装 |

      | ドメインモデル追加 | `domain/` |

      | app層の純粋計算追加 | `app/`（例: `viewport.rs`, `ddl.rs`） |

      | キーマッピング追加（simpleモード） | `app/keybindings/` の該当サブモジュールにエントリ追加; `keymap::resolve()` が自動処理 |

      | キーマッピング追加（Normalモード） | `app/keybindings/normal.rs` + `mod.rs` に predicate fn + `handler.rs` で配線 |

      | DB固有SQL・方言ロジック追加 | `infra/adapters/{postgres,mysql}/`（`app/ports/` には絶対に置かない） |


      ## 副作用境界（必須）


      - `app/` は I/O 禁止。ファイルシステム、ネットワーク、プロセス起動は不可

      - `domain/` は構造体とデータ変換のみ定義する

      - 副作用が許可される場所: `infra/adapters/`, `ui/adapters/`, `main.rs` のみ

      - Reducer は副作用を `Vec<Effect>` として返すこと。インラインで実行してはならない

      - UI adapter（描画の抽象化）は `ui/adapters/` に置く（`infra/` ではない）

      - Port による依存性逆転: app が必要なものを定義し、adapter が実装を提供'
    gold_removed: ''
  - path: .claude/rules/config-migration.md
    tier: 1
    gold_added: '# 設定マイグレーションルール

      ## 後方互換性（必須）

      - `connections.toml` スキーマの変更は既存の設定ファイルを壊してはならない

      - 新しいフィールドには適切なデフォルト値を設定し、古い設定がエラーなくロードできるようにする

      - 削除されたフィールドはデシリアライズ時にサイレントに無視すること

      ## スキーマバージョニング

      - 破壊的なスキーマ変更がやむを得ない場合、設定に `version` フィールドを追加する

      - 前バージョンからのマイグレーションパスを提供する

      - 古い設定を自動マイグレーションする際は明確な警告をログに出すこと'
    gold_removed: ''
  - path: .claude/rules/db-agnostic.md
    tier: 1
    gold_added: '# DB 非依存ルール

      ## Port レベルの中立性（必須）

      - `app/ports/` の port trait は RDBMS 非依存の汎用型・構文のみ使用する

      - port メソッドのシグネチャは汎用型を使うこと（`PgType` や PG 固有 enum は不可）

      - port のドキュメントは RDBMS 非依存の振る舞いとして記述する

      ## Adapter の分離（必須）

      - DB 固有の SQL、クォート、接続文字列ロジックはすべて `infra/adapters/{postgres,mysql}/` に配置すること

      - Adapter は方言固有の型を port の戻り値型に漏洩させてはならない

      - 一方の adapter に機能を追加したら、もう一方の adapter 用にトラッキング Issue を作成すること

      ## 拡張準備チェックリスト

      port trait を変更する際:

      1. 新しいメソッドシグネチャが方言中立であることを確認

      2. 既存の PG adapter 実装が抽象化すべき PG 固有構文を使っていないかチェック

      3. MySQL adapter スタブが存在する場合、コンパイルが通ることを確認（`#[ignore]` テストでも可）

      ## Adapter 内部サブモジュール規約

      各 adapter ディレクトリは `mod.rs`（オーケストレーション）+ CLI ディレクトリ（プロセス実行・パース）+ `sql/`（純粋SQL生成）の3層構造に従う。PG 固有の詳細は `postgres-adapter.md` を参照。

      **MySQL adapter を追加する場合**、PG adapter の構造をミラーすること: `mysql/mod.rs`, `mysql/mysql_cli/`, `mysql/sql/` 等。

      ## 現在の Adapter 状況

      - PostgreSQL: メイン、完全実装済み

      - MySQL: 計画中、未実装'
    gold_removed: ''
  - path: .claude/rules/interaction-contract.md
    tier: 1
    gold_added: "  - \"**/src/app/keymap.rs\"\n# インタラクション契約\n## 唯一の信頼できる情報源（必須）\n- `app/keybindings/` がすべてのキーバインドの **SSOT**\n- フッターヒント、ヘルプオーバーレイ、コマンドパレットはキーバインドデータから派生させること\n- `keybindings/` で宣言されていないキーコンボを `handler.rs` に定義してはならない\n## 整合性の不変条件（必須）\n1. `KeyBinding` / `ModeRow` エントリに表示ラベルがあれば、ヘルプオーバーレイに必ず表示する\n2. フッターに表示するキーバインドは `handler.rs` のアクションに必ず解決できる\n3. コマンドパレットのエントリはキーバインドと同じアクション名にマッピングする\n## キー変換フロー\n```\ncrossterm::KeyEvent\n  → ui/event/key_translator::translate()\n  → app::keybindings::KeyCombo\n  → app::keymap::resolve(combo, bindings)   (simple modes)\n     OR keybindings::is_quit(&combo) 等     (Normal mode predicates)\n  → Action\n```\n**責務分担:**\n- `app/keybindings/`: SSOT モジュール — `KeyBinding`（simple modes）と `ModeRow`（mixed modes）。サブモジュール: `normal.rs`, `overlays.rs`, `connections.rs`, `editors.rs`, `types.rs`。Mixed modes は `ModeBindings { rows: &[ModeRow] }` を使い `.resolve()` で解決\n- `app/keymap.rs`: `KeyBinding` スライス用の `resolve(combo, bindings)` と `ModeRow` スライス用の `resolve_mode(combo, rows)`\n- `ui/event/key_translator.rs`: UI adapter — `crossterm::KeyEvent` → app 層の `KeyCombo` に変換\n- `ui/event/handler.rs`: モードディスパッチ — `ModeBindings::resolve()` または predicate fn を呼び出し、コンテキストロジックを適用\n**Char フォールバックルール**: フリーテキスト入力のあるモード（TablePicker, ErTablePicker, CommandLine, CellEdit）は `keymap::resolve()` を先に試し、その後 `Char(c)` にフォールスルーする。これらのモードにコマンドキーとして `KeyCombo::plain(Key::Char(x))` を追加してはならない。非 Char キー（Up/Down/Esc/Enter）を使うこと。\n\n## 新規キーバインド追加チェックリスト\n\n1. `app/keybindings/{normal,overlays,connections,editors}.rs` にエントリ追加\n2. Normal mode の場合: `keybindings/mod.rs` に predicate fn を追加 + `handler.rs` で配線\n3. ModeBindings mode の場合: `ModeRow` エントリを追加（ディスパッチは自動）\n4. バインドをフッターに表示する場合: `display_hint` を更新\n5. 該当モードのヘルプオーバーレイセクションを更新\n6. パレットに表示すべきアクションなら `app/palette.rs` に追加\n7. スナップショットテストを実行してフッター/ヘルプの描画を確認\n\n## アンチパターン（禁止）\n\n- `keybindings/` エントリなしに `handler.rs` にハードコードしたキーチェック\n- キーバインドの表示ラベルと一致しないフッターヒントテキスト\n- 対応するキーバインドエントリがないキーをヘルプオーバーレイに記載"
    gold_removed: ''
  - path: .claude/rules/postgres-adapter.md
    tier: 1
    gold_added: "---\npaths:\n  - \"**/src/infra/adapters/postgres/**/*.rs\"\n---\n\n# Postgres Adapter 内部構造\n\n## ディレクトリ構成\n\n```\nsrc/infra/adapters/postgres/\n├── mod.rs              # PostgresAdapter構造体 + MetadataProvider / QueryExecutor impl\n│                       # （オーケストレーション: sql/ でSQL生成 → psql/ で実行・パース）\n├── psql/               # psql プロセス操作\n│   ├── mod.rs          #   re-exports\n│   ├── executor.rs     #   プロセス起動（I/O、副作用あり）\n│   └── parser.rs       #   stdout → ドメイン型への変換（純粋関数）\n├── sql/                # SQL文字列生成（すべて純粋関数）\n│   ├── mod.rs          #   re-exports\n│   ├── query.rs        #   メタデータクエリ + プレビュー\n│   ├── ddl.rs          #   DDL生成（CREATE TABLE）\n│   └── dialect.rs      #   DML生成（UPDATE/DELETE）\n├── select_guard.rs     # SELECT安全チェック（純粋関数）\n└── dsn.rs              # DSN構築\n```\n\n## データフロー\n\n`mod.rs` がオーケストレーション → `sql/` でSQL生成 → `psql/executor.rs` で psql 実行 → `psql/parser.rs` で出力パース\n\n## 可視性ルール\n\n- 関数はデフォルト private\n- サブモジュール間アクセスには `pub(in crate::infra::adapters::postgres)` を使う\n- テストは各サブモジュール内に `#[cfg(test)]` で配置\n\n## クォート関数\n\n`crate::infra::utils::{quote_ident, quote_literal}` を使うこと。`pg_quote_*` のような重複関数を作ってはならない。"
    gold_removed: ''
  - path: .claude/rules/rendering-strategy.md
    tier: 1
    gold_added: "---\npaths:\n  - \"**/src/app/render_schedule.rs\"\n  - \"**/src/main.rs\"\n---\n\n# レンダリング戦略\n\nRatatui は明示的な描画制御が必要。本アプリは**イベント駆動レンダリング**（固定FPSではない）を採用。\n\n## レンダリングトリガー\n\n| トリガー | レンダリングタイミング |\n|---------|---------------------|\n| 状態変更 | Reducer が `render_dirty = true` にセット → main loop が `Effect::Render` を追加 |\n| アニメーション deadline | Spinner(150ms)、カーソル点滅(500ms)、メッセージタイムアウト、結果ハイライト |\n| 無操作時 | 入力またはdeadlineまで無期限スリープ |\n\n## アーキテクチャ分離\n\n- `app/render_schedule.rs`: 次のdeadlineを計算する純粋関数（I/Oなし）\n- `main.rs`: UI層が `tokio::select!` + `sleep_until(deadline)` を処理"
    gold_removed: ''
  - path: .claude/rules/rstest-patterns.md
    tier: 1
    gold_added: "---\npaths:\n  - \"**/src/domain/**/*.rs\"\n  - \"**/src/infra/adapters/**/parser*.rs\"\n  - \"**/src/infra/adapters/**/sql/**/*.rs\"\n---\n\n# rstest パターンガイド\n\n## rstest の凝集度ルール\n\n既存の `#[rstest]` 関数にケースを追加する前に、すべてのケースが同じ**振る舞いカテゴリ**に属しているか確認すること。\n\n- 複数カテゴリが混在している場合はカテゴリごとに分割する\n  - 例: `ErrorKind` 別 / valid-invalid 別 / キーの役割別\n- vim/矢印キーのエイリアスペアは**同じ関数内**に置く（分割しない）\n- **目安**: 1関数が8ケースを超えたら分割を検討する\n\n```rust\n// ✅ 各関数が単一の振る舞いカテゴリをテスト\n#[rstest]\n#[case(\"psql: command not found\")]\n#[case(\"not found: mysql\")]\nfn classify_stderr_as_cli_not_found(#[case] stderr: &str) { ... }\n\n#[rstest]\n#[case(\"Connection refused\")]\n#[case(\"Some random error\")]\n#[case(\"\")]\nfn classify_stderr_as_unknown_fallback(#[case] stderr: &str) { ... }\n\n// ✅ vim/矢印エイリアスはまとめて良い\n#[rstest]\n#[case(Key::Up, Action::ScrollUp)]\n#[case(Key::Char('k'), Action::ScrollUp)]\n#[case(Key::Down, Action::ScrollDown)]\n#[case(Key::Char('j'), Action::ScrollDown)]\nfn scroll_keys(#[case] code: Key, #[case] expected: Action) { ... }\n```\n\n## rstest を使うべきとき\n\n- テストが入力→期待出力の純粋なマッピングで、類似ケースが多い場合\n- 複数のエイリアス、キーバリアント、境界値パターンがテーブルに収まる場合\n\n## 個別 #[test] を使うべきとき\n\n- 仕様上重要な振る舞いで、テスト名から読み取れることが大事な場合\n- 特殊な分岐やリグレッションシナリオで、専用テストに値する場合"
    gold_removed: ''
  - path: .claude/rules/rust-testing-style.md
    tier: 1
    gold_added: '# Rust テストスタイルガイド

      ## 基本原則

      - 標準の `#[test]` + `rstest` を使う

      - モック必要時は `mockall` を使う

      - 非同期テストには `#[tokio::test]` を使う

      ## テスト構造

      - ユニットテストは `#[cfg(test)] mod tests` でモジュール内に配置

      - インテグレーションテストは `tests/` ディレクトリに配置

      ## 命名規約

      - `<条件>_returns_<結果>`

      - `<条件>_<動作>s_<結果>`

      例:

      ## テスト構造（given/when/then）

      ## まとめ

      | テスト種別 | スタイル |

      |-----------|---------|

      | VO / 単純ロジック | `#[test]` フラット |

      | 境界値 / パターン | `rstest` + `#[case]` |

      | 機能グループ | `mod` でネスト |

      | インテグレーション / E2E | `tests/` ディレクトリ |'
    gold_removed: ''
  - path: .claude/rules/test-organization.md
    tier: 1
    gold_added: "---\npaths:\n  - \"**/src/app/**/*.rs\"\n  - \"**/src/ui/event/**/*.rs\"\n---\n\n# テスト構成ルール\n\n## mod 構造ルール\n\n- 1ファイル内の `#[test]` 関数が **20個を超えたら**、`mod` ブロックでグループ化する\n- `mod` 名は振る舞いドメインを表す名詞にする（例: `connection_error`, `result_pane`）\n- フラットなテストリストは「どこに何があるか」が分かりにくくなる\n\n```rust\n// ✅ 振る舞いドメインでグループ化\nmod connection_flow { ... }\nmod overlays { ... }\nmod result_pane { ... }\n```\n\n## フィクスチャ抽出ルール\n\n- 同じ構造体リテラルが **2つ以上** のテストに出現したら、ヘルパー関数に抽出する\n- インライン構造体が **15行を超えたら**、フィクスチャとして抽出を検討する\n- 同じヘルパー関数が **2つの子 mod** で定義されていたら、親の `mod tests` スコープに移動する\n\n```rust\n// ✅ 親 mod tests スコープに抽出\nfn create_test_profile(name: &str) -> ConnectionProfile { ... }\nfn minimal_users_table() -> Table { ... }\nfn create_table(schema: &str, name: &str, columns: &[&str]) -> Table { ... }\n```"
    gold_removed: ''
  - path: .claude/rules/testing-obligations.md
    tier: 1
    gold_added: '# テスト義務

      ## レイヤ別の必須テスト対象

      | レイヤ | 必須テストシナリオ | 例 |

      |--------|-------------------|-----|

      | **Domain** | すべての public コンストラクタ / バリデーション | `ConnectionConfig::new()` の境界値 |

      | **App (reducers)** | `AppState` を変更するすべての状態遷移 | Action ディスパッチ → state diff |

      | **App (ports)** | port trait のデフォルト実装メソッド | `DdlGenerator::ddl_line_count()` |

      | **Infra (parsers)** | 各 adapter の CLI 出力パース | `psql` テーブル出力 → `QueryResult` |

      | **Infra (adapters)** | SQL 生成（方言固有） | PG 用 `build_update_sql`（MySQL 実装時はそちらも） |

      | **UI (components)** | 描画の境界条件 | 空テーブル、オーバーフロー、エラー状態 |

      | **Integration** | レイヤ横断のラウンドトリップ | `tests/render_snapshots.rs` |

      ## `#[ignore]` トラッキングルール（必須）

      - すべての `#[ignore]` テストにトラッキング Issue へのリンクコメントが必要

      - 形式: `#[ignore] // tracked: #<issue番号> — <理由>`

      - リンク先 Issue を解決したら `#[ignore]` を削除または更新すること

      #[ignore] // tracked: #42 — MySQL adapter 待ち

      ## スナップショットテスト義務

      - 新しい `InputMode` バリアントには `tests/render_snapshots.rs` に最低1つのスナップショットが必要

      - 詳細なカバレッジ基準は `visual-regression.md` を参照

      ## PR セルフチェック（Claude 向け）

      PR を ready にする前に:

      - [ ] 新しい public 関数にユニットテストがある

      - [ ] adapter の SQL 生成がサポート対象の全方言でテストされている

      - [ ] トラッキング Issue なしの `#[ignore]` がない

      - [ ] 新しい `InputMode` バリアントにスナップショットテストがある'
    gold_removed: ''
  - path: .claude/rules/ui-design.md
    tier: 1
    gold_added: "# UI設計ルール\n## コンポーネント構造（Atomic Design）\nUIコンポーネントは Atomic Design パターンに従う:\n├── atoms/       # 最小の再利用単位（spinner, key_chip, panel_border）\n├── molecules/   # atoms の組み合わせ（modal_frame, hint_bar）\n└── *.rs         # Organisms: 画面レベルのコンポーネント（explorer, inspector 等）\n| レイヤ | 用途 | 例 |\n|--------|------|-----|\n| atoms | 単一目的のプリミティブ | `spinner_char()`, `key_chip()`, `panel_block()`, `text_cursor_spans()` |\n| molecules | atoms を組み合わせた再利用パターン | `render_modal()`, `hint_line()` |\n| organisms | 画面セクション。molecules/atoms を使う | `Explorer`, `SqlModal`, `Footer` |\nUIコンポーネント追加時:\n- 繰り返し出現するビジュアルパターンは atoms/molecules に切り出す\n- `Color::*` 直指定ではなく `Theme::*` トークンを使う\n- Organisms は molecules/atoms を合成し、ロジックを複製しない\n## 単一行テキスト入力\n- **新規の**単一行テキスト入力フィールドはすべて `TextInputState`（`app/text_input.rs`）で状態管理すること\n  - 既知の例外: `ConnectionSetupState` は現在独自に `cursor_position` / `viewport_offset` を管理している（マイグレーションは別途追跡）\n- カーソル描画は `text_cursor_spans()`（`ui/components/atoms/text_cursor.rs`）を使うこと。インラインでカーソル描画ロジックを複製してはならない\n## フッターヒント順序\nすべての InputMode で以下の順序に従うこと:\nアクション → ナビゲーション → ヘルプ → 閉じる/キャンセル → 終了\n## インタラクション契約\nキーバインドの整合性ルールと追加チェックリストは `interaction-contract.md` を参照。"
    gold_removed: ''
  - path: .claude/rules/visual-regression.md
    tier: 1
    gold_added: '# ビジュアルリグレッションテスト

      ## 概要

      - **ライブラリ**: [insta](https://insta.rs) - Rust スナップショットテスト

      - **スコープ**: `AppState` → `MainLayout::render()` の統合テスト

      - **バックエンド**: Ratatui `TestBackend`（インメモリターミナル 80x24）

      ## ディレクトリ構成

      │   ├── mod.rs       # テストユーティリティ（render_to_string, create_test_*）

      │   └── fixtures.rs  # サンプルデータビルダー（metadata, table detail, query result）

      ├── render_snapshots.rs  # スナップショットテストシナリオ

      └── snapshots/           # 生成された .snap ファイル（insta が自動作成）

      ## コマンド

      mise run test                      # 全テスト実行

      mise exec -- cargo insta review    # 保留中のスナップショットを対話的にレビュー

      mise exec -- cargo insta accept    # 保留中のスナップショットをすべて承認

      mise exec -- cargo insta reject    # 保留中のスナップショットをすべて拒否

      ## 新しいシナリオの追加方法

      1. `tests/render_snapshots.rs` にテスト関数を追加

      2. `mise run test` を実行（新しいスナップショットで失敗する）

      3. 生成された `.snap.new` ファイルをレビュー

      4. `mise exec -- cargo insta accept` を実行

      ## カバレッジ基準

      ### モードカバレッジ義務（必須）

      - すべての `InputMode` バリアントに最低1つのスナップショットテストが必要（`testing-obligations.md` 参照）

      ### スナップショットテストを追加すべきとき

      - **各 InputMode** — モードごとに最低1シナリオ

      - **主要な UI 状態変更** — フォーカスペイン切り替え、メッセージ表示

      - **境界条件** — 空の結果、初期ロード状態、エラー状態

      - **テキスト入力コンポーネント** — カーソルが先頭、中間、末尾の3状態（最低3つ）

      ### 追加不要なケース

      - **データバリエーション** — 同じ画面内での行数・列数の違い

      - **網羅的な組み合わせ** — すべての状態の順列

      - **一時的な状態** — 短時間のローディングインジケータ（ER 進捗表示のような永続的なものは除く）

      ## スナップショット更新ポリシー

      ### 許可

      - **意図的な UI 変更** — レイアウト、スタイリング、新機能

      - **表示バグの修正で出力が変わる場合** — バグ修正後

      ### 不許可

      - **リグレッションによるテスト失敗** — スナップショットではなくコードを修正する

      - **意図しない変更** — まず diff を調査すること'
    gold_removed: ''
