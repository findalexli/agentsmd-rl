    gold_added: '- **Use uv exclusively**: All packaging, environment, and script execution via [uv](https://github.com/astral-sh/uv)

      - **No pip/venv/conda**: Do not use `pip`, `python3 -m venv`, or `conda` ‚Äî `uv` handles all of this

      - **pyproject.toml is the source of truth**: Define all dependencies in `pyproject.toml` (not `requirements.txt`)

      # Install dependencies from pyproject.toml

      uv sync


      # Install with optional dev dependencies

      uv sync --extra dev


      # Run a script (no activation needed)

      uv run python script.py


      # Run pytest

      uv run pytest


      # Add a new dependency

      uv add requests


      # Remove a dependency

      uv remove requests

      ```


      ### Running Python Code

      - Use `uv run` to execute scripts ‚Äî no manual venv activation needed

      - Use `uv run <tool>` for dev tools (pytest, ruff, etc.)

      - Dependencies are defined in `pyproject.toml` (not requirements.txt)


      ### Linting & Formatting (Ruff)

      - **Ruff**: Use Ruff for linting AND formatting (replaces flake8, black, isort)


      ```bash

      # Lint code

      uv run ruff check .


      # Lint and auto-fix

      uv run ruff check --fix .


      # Format code

      uv run ruff format .


      # Check formatting without changes

      uv run ruff format --check .

      ```


      ### Type Checking (Pyright)


      ```bash

      # Check types

      uv run pyright

      Note: Use `pyright` for type checking ‚Äî do not use `mypy`.

