version: "2.0"

task:
  name: effect-schema-getpropertysignatures-transformation
  kind: code_fix
  source:
    repo: Effect-TS/effect
    pr_number: 6086
    base_commit: ab3b64c20a039eb4d573fe757c41278925b22687
    merge_commit: 4d97a61a15b9dd6a0eece65b8f0c035e16d42ada
    title: "Schema: fix getPropertySignatures crash on Struct with optionalWith({ default })"
    url: https://github.com/Effect-TS/effect/pull/6086

checks:
  - id: test_probe_test_file_present
    type: pass_to_pass
    origin: scaffold
    description: "Ensures the probe behavior test was copied into the repo by test.sh."

  - id: test_behavior_optionalwith_default
    type: fail_to_pass
    origin: behavior
    description: |
      `AST.getPropertySignatures` must not throw "Unsupported schema (Transformation)"
      when called on a `Schema.Struct` containing `Schema.optionalWith(..., { default: ... })`.
      It must return one property signature per declared key.

  - id: test_behavior_optionalwith_as_option
    type: fail_to_pass
    origin: behavior
    description: |
      Same as above but for `Schema.optionalWith(..., { as: "Option" })`.

  - id: test_behavior_optionalwith_nullable
    type: fail_to_pass
    origin: behavior
    description: |
      Same as above but for `Schema.optionalWith(..., { nullable: true, default: ... })`.

  - id: test_behavior_single_key_struct
    type: fail_to_pass
    origin: behavior
    description: |
      Single-key Struct whose only field is a Transformation must also be handled.

  - id: test_behavior_no_regression_plain_struct
    type: pass_to_pass
    origin: behavior
    description: |
      Plain (non-Transformation) Struct still resolves through getPropertySignatures.

  - id: test_existing_getpropertysignatures_suite_passes
    type: pass_to_pass
    origin: repo_tests
    description: |
      The pre-existing `packages/effect/test/Schema/SchemaAST/getPropertySignatures.test.ts`
      suite must continue to pass.

  - id: test_typecheck_passes
    type: pass_to_pass
    origin: repo_tests
    description: |
      `pnpm check` (i.e. `tsc -b tsconfig.json`) within `packages/effect` must succeed.
      AGENTS.md mandates type checking; this is the repo's own gate.

  - id: test_changeset_present
    type: agent_config
    origin: agent_config
    description: |
      AGENTS.md requires every PR to ship a changeset in `.changeset/` describing the change.
    source:
      file: AGENTS.md
      commit: ab3b64c20a039eb4d573fe757c41278925b22687
      lines: "44-45"

