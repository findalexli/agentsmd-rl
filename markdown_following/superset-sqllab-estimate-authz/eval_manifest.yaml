checks:
- id: test_validate_invokes_raise_for_access_for_authorised_user
  type: fail_to_pass
  origin: pr_diff
  description: 'QueryEstimationCommand.validate() must call security_manager.raise_for_access(database=...) on the resolved Database.

    '
- id: test_validate_propagates_security_exception
  type: fail_to_pass
  origin: pr_diff
  description: 'A SupersetSecurityException raised by raise_for_access must propagate out of validate() unchanged.

    '
- id: test_validate_skips_access_check_when_database_missing
  type: pass_to_pass
  origin: pr_diff
  description: 'Ordering / no-leak invariant: when the database row is missing, the existing 404-style SupersetErrorException must still be raised AND raise_for_access must not run (which would either error on None or leak record-existence information). Holds at base AND after the fix.

    '
- id: test_run_blocks_unauthorized_user_before_engine_call
  type: fail_to_pass
  origin: pr_diff
  description: 'An unauthorized run() call must not reach Database.db_engine_spec.estimate_query_cost — no plan/cost can leak.

    '
- id: test_repo_streaming_export_unit_tests_still_pass
  type: pass_to_pass
  origin: repo_tests
  description: 'Existing SQL-Lab streaming-export unit tests (tests/unit_tests/commands/sql_lab/streaming_export_command_test.py) keep passing — sibling-module regression guard.

