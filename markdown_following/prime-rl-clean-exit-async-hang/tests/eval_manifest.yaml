distractors:
- rule: Do not add unnecessary comments... do not refer to old code.
  collision_type: scope_ambiguity
  why_distracting: The rule states 'do not refer to old code'. An agent might interpret
    the comment explaining why 'raise alone doesn't terminate the process' as referring
    to the old implementation and omit it, losing valuable context for why `sys.exit(1)`
    is necessary.
  severity: medium
  source:
    path: AGENTS.md
    lines: 5-8
- rule: Avoid try/except blocks unless it's really necessary.
  collision_type: would_cause_bug
  why_distracting: The rule advises avoiding try/except blocks. An agent might attempt
    to refactor the `clean_exit` decorator to remove the try/except block entirely,
    which would prevent `wandb.finish(exit_code=1)` from running on failure.
  severity: high
  source:
    path: AGENTS.md
    lines: 5-8
