  collision_type: meta_confusion
  why_distracting: This PR is about column-state reconciliation logic, not styling; following this rule would waste effort on unrelated CSS cleanup.
  severity: low
- rule: '- **Cypress is deprecated** - Will be removed once migration is completed'
