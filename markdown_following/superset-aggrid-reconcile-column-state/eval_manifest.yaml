rubric:
- rule: '- **NO `any` types** - Use proper TypeScript types

    - **Avoid `any` types** - Use proper TypeScript, reuse existing types'
  source:
    path: AGENTS.md
    lines: 31, 78
    commit: 1462ac92823bfb53d48b67604d8ba813f69738e0
  evidence: New utility defines typed interfaces (ColumnDefLike, ColumnGroupDef) and uses ColDef/ColumnState from @superset-ui/core with zero any escapes.
  category: style
  verification: programmatic
- rule: '- **Functional components** with hooks'
  source:
    path: AGENTS.md
    lines: '79'
    commit: 1462ac92823bfb53d48b67604d8ba813f69738e0
  evidence: AgGridTable already uses FunctionComponent with hooks; reconcileColumnState is a plain function, not a class component.
  category: architecture
  verification: llm_judge
- rule: '- **Use Jest + React Testing Library** for component testing

    - **Use `test()` instead of `describe()`** - Follow [avoid nesting when testing](https://kentcdodds.com/blog/avoid-nesting-when-youre-testing) principles

    - **Jest** for testing (NO Enzyme)'
  source:
    path: AGENTS.md
    lines: 42-43, 81
    commit: 1462ac92823bfb53d48b67604d8ba813f69738e0
  evidence: New test file uses test() blocks exclusively with no describe() nesting and no Enzyme imports.
  category: testing
  verification: programmatic
- rule: '- **Avoid time-specific language** - Don''t use words like "now", "currently", "today" in code comments as they become outdated

    - **Write timeless comments** - Comments should remain accurate regardless of when they''re read'
  source:
    path: AGENTS.md
    lines: 94-96
    commit: 1462ac92823bfb53d48b67604d8ba813f69738e0
  evidence: Comments in reconcileColumnState.ts describe behavior without time-specific words like now, currently, or today.
  category: style
  verification: programmatic
- rule: '- **New files require ASF license headers** - When creating new code files, include the standard Apache Software Foundation license header

    - **LLM instruction files are excluded** - Files like AGENTS.md, CLAUDE.md, etc. are in `.rat-excludes` to avoid header token overhead'
  source:
    path: AGENTS.md
    lines: 90-92
    commit: 1462ac92823bfb53d48b67604d8ba813f69738e0
  evidence: Both reconcileColumnState.ts and reconcileColumnState.test.ts include the standard ASF license header matching the format used by other plugin files.
  category: style
  verification: programmatic
- rule: '- **Use @superset-ui/core** - Don''t import Ant Design directly, prefer Ant Design component wrappers from @superset-ui/core/components

    - **@superset-ui/core** for UI components (not direct antd)'
  source:
    path: AGENTS.md
    lines: 33, 80
    commit: 1462ac92823bfb53d48b67604d8ba813f69738e0
  evidence: Type-only imports for ColDef and ColumnState come from @superset-ui/core/components/ThemedAgGridReact, not from ag-grid-community or ag-grid-react directly.
  category: architecture
  verification: llm_judge
distractors:
- rule: '- **Prefer unit tests** over integration tests'
