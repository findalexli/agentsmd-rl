    lines: '38'
    commit: 1462ac92823bfb53d48b67604d8ba813f69738e0
  collision_type: scope_ambiguity
  why_distracting: Exercising the real module via tsx is integration-level; a strict unit-test-only approach with mocks would miss runtime import and behavioral regressions.
