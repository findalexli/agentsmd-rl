rubric:
- rule: Code should have minimal unnecessary comments and work process notes in config.py.
  source:
    path: src/prime_rl/utils/config.py
    lines: 1-30
  reference: |
    def _convert_none(obj):
        """Recursively convert None values to 'None' strings."""
        if isinstance(obj, dict):
            return {k: _convert_none(v) for k, v in obj.items()}
        elif isinstance(obj, list):
            return [_convert_none(item) for item in obj]
        elif obj is None:
            return "None"
        return obj
  category: style
- rule: Avoid try/except blocks unless it's really necessary in config.py.
  source:
    path: src/prime_rl/utils/config.py
    lines: 1-30
  reference: |
    def _convert_none(obj):
