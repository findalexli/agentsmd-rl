  category: style
distractors:
- rule: Flat is better than nested.
  collision_type: rule_conflict
  why_distracting: The data structure being serialized is inherently nested (dicts
    containing lists containing dicts). An agent might try to follow 'Flat is better
    than nested' by avoiding recursion and writing a complex iterative stack-based
    implementation, which would violate 'Simple is better than complex'.
  severity: medium
  source:
    path: AGENTS.md
    lines: 15-15
- rule: You are responsible for maintaining the skills folder. When a workflow fails
    and you fix it... you must update the skills to make implicit knowledge explicit.
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to edit the `toml-config` skill file to
    document that `None` values inside lists are now supported. However, this is an
    internal bug fix for serialization, not a workflow change or new implicit knowledge
    that belongs in user-facing skill documentation.
  severity: high
  source:
    path: AGENTS.md
    lines: 40-42
hierarchy_analysis: The hierarchy is effectively flat, as CLAUDE.md simply includes
  AGENTS.md. The rules are global and generic, with no deep overriding logic required.
