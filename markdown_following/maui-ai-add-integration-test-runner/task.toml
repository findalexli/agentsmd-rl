version = "1.0"
source_repo = "dotnet/maui"
source_pr = 33654

[metadata]
author_name = "Alex Li"
author_email = "alex@example.com"
difficulty = "hard"
category = "feature"
tags = ["maui", "agentmd-edit", "integration-tests", "skill", "powershell"]
expert_time_estimate_min = 30.0
junior_time_estimate_min = 60.0

[verifier]
env = { LLM_JUDGE = "${LLM_JUDGE:-0}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}", GEMINI_API_KEY = "${GEMINI_API_KEY:-}" }
timeout_sec = 120.0

[agent]
timeout_sec = 3600.0

[environment]
build_timeout_sec = 600.0
cpus = 2
memory_mb = 4096
storage_mb = 10240
allow_internet = true
