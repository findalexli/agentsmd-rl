task_id: clickhouse-s3queue-processing-nodes-cleanup
name: ClickHouse S3Queue Processing Nodes Cleanup Fix
source_pr: https://github.com/ClickHouse/ClickHouse/pull/101930
base_commit: c71831a6b0df9e6b69eaba0e4cf83801c1fb3832
merge_commit: dae8318c5ed52baecd784a85a67c45d985b20d6a

# Scoring weights
weights:
  correctness: 1.0

# List of checks to verify the fix
checks:
  # Fail-to-pass tests (verify the fix works)
  - id: test_version_in_nodes_to_remove
    type: fail_to_pass
    origin: behavioral
    description: Verify nodes_to_remove stores version information

  - id: test_tryremove_with_version
    type: fail_to_pass
    origin: behavioral
    description: Verify tryRemove uses version for optimistic concurrency

  - id: test_zbadversion_handling
    type: fail_to_pass
    origin: behavioral
    description: Verify ZBADVERSION error is handled gracefully

  - id: test_removal_tracking
    type: fail_to_pass
    origin: behavioral
    description: Verify accurate tracking of removed vs skipped nodes

  # Pass-to-pass tests (verify existing functionality still works)
  - id: test_compilation_syntax
    type: pass_to_pass
    origin: static
    description: Basic syntax check - balanced braces in target file

  - id: test_git_file_exists
    type: pass_to_pass
    origin: repo_tests
    description: Verify target file exists in the repo

  - id: test_cpp_syntax_balanced
    type: pass_to_pass
    origin: repo_tests
    description: Verify C++ syntax - balanced braces and parentheses

  - id: test_no_trailing_whitespace
    type: pass_to_pass
    origin: repo_tests
    description: Verify no trailing whitespace in target file

  - id: test_function_signature_exists
    type: pass_to_pass
    origin: repo_tests
    description: Verify cleanupPersistentProcessingNodes function exists

  - id: test_zookeeper_includes
    type: pass_to_pass
    origin: repo_tests
    description: Verify ZooKeeper-related code is present

# Rubric for subjective rules from agent configs
rubric:
  - rule: "All ZooKeeper/Keeper data deletion events must be logged at appropriate level"
    source: "copilot-instructions.md: Deletion logging requirement"
    description: "The fix adds LOG_TRACE for node removal attempts and results"

  - rule: "Handle concurrency issues with proper error codes (ZNONODE, ZBADVERSION)"
    source: "copilot-instructions.md: Concurrency & robustness"
    description: "The fix handles ZBADVERSION in addition to ZNONODE for race conditions"

  - rule: "When writing log messages, wrap literal names from code in backticks"
    source: "CLAUDE.md: Code formatting in documentation"
    description: "Check log messages follow ClickHouse conventions"
