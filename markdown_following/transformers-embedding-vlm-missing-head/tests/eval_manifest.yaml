distractors:
- rule: If coordination evidence cannot be found, do not proceed to PR-ready output.
    In blocked cases, return a short explanation of what is missing.
  collision_type: meta_confusion
  why_distracting: The agent is running in a headless evaluation environment without
    GitHub access. If it strictly follows the instruction to fail-closed when coordination
    evidence is missing, it will refuse to solve the task and output an explanation
    instead of the required code fix.
  severity: high
  source:
    path: AGENTS.md
    lines: 56-59
- rule: Ideally you should edit the code it's copying from and propagate the change,
    but you can break the `# Copied from` link if needed.
  collision_type: architecture_boundary
  why_distracting: The agent might see `# Copied from` comments in `modeling_colqwen2.py`
    and decide to break the link to make the necessary changes directly, rather than
    correctly identifying that `colqwen2` uses the newer `modular_colqwen2.py` system
    which requires editing the modular file instead.
  severity: medium
  source:
    path: AGENTS.md
    lines: 64-66
- rule: Keep bugfix PRs brief and minimize the size of the diff
  source:
    path: .github/copilot-instructions.md
    lines: 15-15
  source_text: '- PRs should be as brief as possible. Bugfix PRs in particular can
    often be only one or two lines long, and do not need large comments, docstrings
    or new functions in this case. Aim to minimize the size of the diff.'
  collision_type: rule_conflict
  why_distracting: This change fixes missing head issues by setting `base_model_prefix
    = "vlm"` in model classes. An agent prioritizing a minimal diff might add the
    one-line fix but fail to remove the now-redundant embedding methods (e.g., `get_input_embeddings`),
    resulting in leftover code that violates the framework's intended base class inheritance
    design.
  severity: high
- rule: Apply type checking narrowings like isinstance() to resolve typing errors
  source:
    path: .ai/skills/add-or-fix-type-checking/SKILL.md
    lines: 38-41
  source_text: "a. **Narrow unions with `isinstance()` / `if x is None` / `hasattr()`**.\n\
    \       This is the primary tool for resolving union-type errors. `ty` narrows\n\
    \       through all of these patterns, including the negative forms:"
  collision_type: scope_ambiguity
  why_distracting: The SKILL file provides extensive guidance on resolving Python
    type checking issues. This PR strictly focuses on functional architecture configuration
    (`base_model_prefix`) and modifying test configurations (`test_missing_keys =
    False`). There are no typing annotations to fix, and an agent might mistakenly
    attempt to rewrite or narrow types based on this skill file.
  severity: low
hierarchy_analysis: The configuration is flat, with identical rules provided in both
  `AGENTS.md` and `CLAUDE.md` at the repository root. The agent must prioritize the
  architectural instructions regarding modular files over the meta-instructions regarding
  PR coordination.
rubric:
- rule: Use modular_<name>.py files for models that inherit from others, and use make
    fix-repo to generate the standalone modeling files.
  source:
    path: CLAUDE.md
    lines: 64-68
  evidence: The gold solution edits `modular_colqwen2.py` alongside `modeling_colqwen2.py`,
    following the repository's modular model generation system rather than just editing
    the generated modeling file.
  category: architecture
  verification: llm_judge
- rule: Edit modular files instead of generated modeling files
  source:
    path: .ai/AGENTS.md
    lines: 67-67
  source_text: 2) The newer method is to add a file named `modular_<name>.py` in the
    model directory. `modular` files **can** inherit from other models. `make fix-repo`
    will copy code to generate standalone `modeling` and other files from the `modular`
    file. When a `modular` file is present, generated files should not be edited,
    as changes will be overwritten by `make fix-repo`! Instead, edit the `modular`
    file. See [docs/source/en/modular_transformers.md](docs/source/en/modular_transformers.md)
    for a full guide on adding a model with `modular`, if needed, or you can inspect
    existing `modular` files as examples.
  evidence: The gold diff correctly implements changes to the ColQwen2 model by editing
    `src/transformers/models/colqwen2/modular_colqwen2.py` in addition to the generated
    `modeling_colqwen2.py` file, respecting the instruction to apply changes to the
    modular file.
  category: rubric
  verification: llm_judge
