rubric:
- rule: Documentation update is consistent with the tone and format of the existing
    README
  source:
    path: sdks/python/apache_beam/examples/inference/README.md
    lines: 1-50
    commit: c8e45e79c699ef6df8847824833aeefab3b5767a
- rule: README.md documents GPU memory constraints and vLLM tuning flags
  source:
    path: sdks/python/apache_beam/examples/inference/README.md
    lines: 933-937
    commit: f7bdf517ccb9d7ff9a1a71f6850ceeaa3f4085ef
  reference: 'On GPUs with about 16GiB of memory (for example NVIDIA T4), vLLM''s
    defaults can fail

    during engine startup with CUDA out of memory. The example therefore passes conservative

    ``--max-num-seqs`` and ``--gpu-memory-utilization`` values by default (overridable
    with

    ``--vllm_max_num_seqs`` and ``--vllm_gpu_memory_utilization``) via

    `vllm_server_kwargs`, matching the pattern used in other vLLM examples.'
