distractors:
- rule: 'Adding changes: Create `packages/*/.changes/[major|minor|patch].short-description.md` files.'
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to create a changeset file in `packages/*/.changes/` because it is making a significant change to the build process. However, this PR only modifies root-level CI workflows, scripts, and documentation, not the actual packages, making a changeset file out of scope.
  severity: high
  source:
    path: AGENTS.md
    lines: 40-41
hierarchy_analysis: The configuration is a flat single file (`AGENTS.md`). The agent must apply the style rules to the TypeScript script modifications while correctly scoping the changeset rule to realize it does not apply to root-level infrastructure changes.
