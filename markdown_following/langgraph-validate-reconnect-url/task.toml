name = "langgraph-validate-reconnect-url"
description = "Add security validation for reconnect URL Location headers to prevent credential leakage to cross-origin servers"

# Difficulty: 2 = straightforward fix, requires understanding of URL validation
difficulty = 2

# Time estimates in minutes
estimated_time = 15
time_limit = 60

# Tags
tags = ["python", "security", "url-validation", "http"]

# Source info
source_repo = "https://github.com/langchain-ai/langgraph"
source_pr = 7434

[environment]
# Docker context is the task root
dockerfile = "environment/Dockerfile"

[solution]
# Script to apply the gold patch
apply_patch = "solution/solve.sh"

[tests]
# Test runner script
runner = "tests/test.sh"

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
