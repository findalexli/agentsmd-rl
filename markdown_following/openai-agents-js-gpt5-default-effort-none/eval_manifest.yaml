- id: changeset_added_for_packages_change
  source:
    quote: When you change anything under packages/ or touch .changeset/, use $changeset-validation to create and validate the changeset
    path: AGENTS.md
    commit: 720a7071780b059f3f98b9cbd7be37cbda0a638a
  rule: 'A `.changeset/*.md` file must be added covering the change to

    `@openai/agents-core` with an appropriate bump level (minor for the

    added type members + new default-effort behavior).

    '
- id: comments_end_with_period
  source:
    quote: Comments must end with a period.
    path: AGENTS.md
    commit: 720a7071780b059f3f98b9cbd7be37cbda0a638a
  rule: 'Any new or modified TypeScript comments end with a period

    (per the repo style rule in AGENTS.md).

    '
- id: unit_tests_added_or_updated
  source:
    quote: Add or update unit tests for any code change unless it is truly infeasible
    path: AGENTS.md
    commit: 720a7071780b059f3f98b9cbd7be37cbda0a638a
  rule: 'Unit tests for the new default behavior of `getDefaultModelSettings`

    and the type extension are added/updated under

    `packages/agents-core/test/`. Skipping is only acceptable with an

    explicit justification.

    '
- id: public_api_doc_comments_kept
  source:
    quote: Public APIs have doc comments.
    path: AGENTS.md
    commit: 720a7071780b059f3f98b9cbd7be37cbda0a638a
  rule: 'Public exported types/functions changed by this PR retain their

    JSDoc/TSDoc comments and stay in sync with the new accepted values

