distractors:
- rule: Use XML documentation comments for public APIs
  collision_type: scope_ambiguity
  why_distracting: '`GetDiscriminator` is a public method, so the agent might try
    to add XML documentation comments to it. However, this is an existing method and
    the task is focused on a specific bug fix, so adding XML docs is out of scope.'
  severity: medium
  source:
    path: dotnet/AGENTS.md
    lines: 24-32
- rule: 'Logging: Add logging where users may need insight into what''s happening'
  collision_type: would_cause_bug
  why_distracting: The agent might try to add logging to the JSON parsing loop to
    provide insight into the discriminator extraction. This would cause performance
    issues and string allocations, defeating the purpose of the optimization.
  severity: high
  source:
    path: dotnet/AGENTS.md
    lines: 12-17
- rule: When implementing solutions prefer writing a test for it first
  collision_type: scope_ambiguity
  why_distracting: The agent might try to write a unit test for the JSON parsing logic,
    but the task only requires fixing the method and ensuring the project builds.
  severity: medium
  source:
    path: AGENTS.md
    lines: 46-47
- rule: Migrate changed .NET code to async where possible.
  source:
    path: dotnet/AGENTS.md
    lines: 32-33
  source_text: '### Async patterns

    The codebase is migrating to async'
  collision_type: would_cause_bug
  why_distracting: 'This is a .NET rule and the file is C#, so it looks applicable
    at first glance. For this specific change it should be ignored: `GetDiscriminator`
    operates on `ref Utf8JsonReader` with synchronous `Read()`, `Skip()`, and `GetString()`
    calls. Converting this helper to async would change the API shape, conflict with
    the ref-based reader usage, and break the intended lightweight parsing path.'
  severity: high
- rule: Add XML documentation comments when touching `public` members.
  source:
    path: dotnet/AGENTS.md
    lines: 35-44
  source_text: '### Documentation

    Use XML documentation comments for public APIs'
  collision_type: scope_ambiguity
  why_distracting: The edited method is declared `public static`, which can mislead
    an agent into thinking XML docs are required. In context, the containing type
    is `internal static class JsonExtensions`, so this is not a public API surface.
  severity: low
- rule: Add logging when users may need insight into what is happening.
  source:
    path: AGENTS.md
    lines: 61-63
  source_text: '## Logging

    Add logging where users may need insight into what is happening'
  collision_type: architecture_boundary
  why_distracting: A JSON discriminator bug fix can look like a good place to add
    tracing, but this helper is a low-level token reader in a tight parse path.
    Instrumenting each `Read()`/`Skip()` transition would add noise and couple an
    internal serialization utility to logging.
  severity: medium
- rule: Treat low-level serialization changes as cross-binding work and compare or
    mirror them in other bindings.
  source:
    path: AGENTS.md
    lines: 45-48
  source_text: 'When changing user-visible behavior, compare with at least one other
    binding'
  collision_type: meta_confusion
  why_distracting: This fix is specific to .NET `Utf8JsonReader` token advancement
    semantics (`Read`/`Skip` ordering and `ValueTextEquals`), so trying to mirror
    it in other bindings would be wasted effort.
  severity: medium
- rule: Avoid comments that say what code does; rely only on naming.
  source:
    path: AGENTS.md
    lines: 70-70
  source_text: '- Comments should explain *why*, not *what* - prefer well-named methods
    over comments'
  collision_type: rule_conflict
  why_distracting: 'For this change, comments explaining reader movement are justified:
    the `Utf8JsonReader` state machine is subtle, and the notes explain why the
    `Read()` calls surround `GetString()` and `Skip()`.'
  severity: low
hierarchy_analysis: The hierarchy consists of a root `AGENTS.md` and a .NET-specific
  `dotnet/AGENTS.md`. The .NET specific file provides concrete examples of logging
  and documentation that act as strong distractors for this low-level performance
  optimization task.
