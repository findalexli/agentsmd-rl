checks:
- id: test_no_duplicate_reasoning_when_both_present
  type: fail_to_pass
  origin: pr_diff
  description: A delta with both `reasoning` and `reasoning_details` produces exactly one `reasoning-delta` part, not two. Reproduces the original bug.
- id: test_uses_reasoning_details_when_both_present
  type: fail_to_pass
  origin: pr_diff
  description: When both fields are present with different content, only the value from `reasoning_details` is emitted (the plain `reasoning` field is suppressed in that case).
- id: test_dedup_across_multiple_chunks
  type: fail_to_pass
  origin: pr_diff
  description: 'Dedup holds across a multi-chunk stream: N input chunks each carrying both fields produce exactly N reasoning-delta parts, not 2N.'
- id: test_fallback_to_reasoning_when_details_absent
  type: pass_to_pass
  origin: pr_diff
  description: When `reasoning_details` is absent, the plain `reasoning` field is still emitted as the sole reasoning-delta.
- id: test_fallback_to_reasoning_when_details_empty
  type: pass_to_pass
  origin: pr_diff
  description: When `reasoning_details` is an empty array, the plain `reasoning` field is still emitted as the sole reasoning-delta (empty array must be treated like absent).
- id: test_no_reasoning_emitted_when_neither_present
  type: pass_to_pass
  origin: pr_diff
  description: When neither `reasoning` nor `reasoning_details` is present, no reasoning parts are emitted for that delta.
