distractors:
- rule: Query Options (preferred pattern)
  source:
    path: .claude/skills/studio-queries/SKILL.md
    lines: 29-44
  source_text: "## Query Options (preferred pattern)\n\nUse `queryOptions` from `@tanstack/react-query`.\
    \ This gives type safety and works with both `useQuery()` and `queryClient.fetchQuery()`.\n\
    \nRules:\n\n- Export `XVariables`, `XData`, and `XError` types (prefixed with\
    \ the domain name)\n- Implement a **private** `getX(variables, signal?)` function:\n\
    \  - Throws if required variables are missing\n  - Passes `signal` for cancellation\n\
    \  - Calls `handleError(error)` on failure (which throws); returns `data` on success\n\
    \  - Not exported — use `queryClient.fetchQuery(xQueryOptions(...))` for imperative\
    \ fetching\n- Export `xQueryOptions()` using `queryOptions`\n- Gate with `enabled`\
    \ so the query doesn't run until required variables exist\n- Platform-only queries:\
    \ include `IS_PLATFORM` from `lib/constants` in `enabled`\n- Don't add extra params\
    \ to `xQueryOptions` — callers override by destructuring: `{ ...xQueryOptions(vars),\
    \ enabled: true }`"
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to refactor the legacy `useInfiniteQuery`
    pattern in `database-queue-messages-infinite-query.ts` to the modern `queryOptions`
    pattern mandated by the config. However, this PR is exclusively for applying a
    targeted security fix for SQL injections.
  severity: medium
- rule: Mutation Hook Pattern
  source:
    path: .claude/skills/studio-queries/SKILL.md
    lines: 102-109
  source_text: "## Mutation Hook\n\n- Export a `Variables` type with `projectRef`,\
    \ identifiers, and `payload`\n- Implement a private `updateX(vars)` function with\
    \ required variable validation and `handleError`\n- Wrap in `useXMutation()`:\n\
    \  - Accepts `UseMutationOptions` (omit `mutationFn`)\n  - Invalidates `list()`\
    \ + `detail()` keys in `onSuccess` with `await Promise.all([...])`\n  - Defaults\
    \ to `toast.error(...)` when `onError` isn't provided"
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to refactor the exported mutation functions
    (like `archiveDatabaseQueueMessage`) to be private or try to add `handleError`
    and `onSuccess` cache invalidation to comply with the mandated mutation hook pattern,
    significantly distracting from the focused security fix.
  severity: medium
