rubric:
- rule: Only add non-JSDoc comments when the code is doing something surprising or non-obvious
  source:
    path: AGENTS.md
    lines: '33'
    commit: 69fb670d88798e2abe3064f9c1dff4946aba0c2b
  evidence: Gold adds brief inline comments explaining that conditional disabling is allowed for nested selectors and at-rules, which is non-obvious behavior
  category: style
  verification: llm_judge
- rule: Use regular function declarations/expressions by default. Only use arrow functions as callbacks (e.g., route handlers, array methods) where preserving lexical this is beneficial or the syntax is more concise
  source:
    path: AGENTS.md
    lines: '22'
    commit: 69fb670d88798e2abe3064f9c1dff4946aba0c2b
  evidence: New toRecord helper is a regular function declaration, not an arrow function
  category: style
  verification: llm_judge
- rule: Prefer let for locals, const only at module scope; never use var
  source:
    path: AGENTS.md
    lines: '21'
    commit: 69fb670d88798e2abe3064f9c1dff4946aba0c2b
  evidence: Gold uses let for all local variables within functions
  category: style
  verification: llm_judge
- rule: 'No loops or conditionals in test suites: Do not use for loops or conditional statements (if, switch, etc.) to generate test cases within describe() blocks. This breaks the Node.js test runner''s ability to run individual tests via IDE features (like clicking test icons in the sidebar).'
  source:
    path: AGENTS.md
    lines: '36'
    commit: 69fb670d88798e2abe3064f9c1dff4946aba0c2b
  evidence: Gold test additions do not use loops or conditionals in describe blocks
  category: testing
  verification: llm_judge
- rule: 'Formatting: Prettier (printWidth: 100, no semicolons, single quotes, spaces not tabs)'
  source:
    path: AGENTS.md
    lines: '26'
    commit: 69fb670d88798e2abe3064f9c1dff4946aba0c2b
  evidence: Gold diff follows Prettier formatting conventions for the project
  category: formatting
  verification: llm_judge
distractors:
- rule: All demo servers should use port 44100 for consistency across the monorepo
  source:
    path: AGENTS.md
    lines: '40'
    commit: 69fb670d88798e2abe3064f9c1dff4946aba0c2b
  collision_type: scope_ambiguity
  why_distracting: This demo server rule is irrelevant to CSS style processing — an agent might waste time ensuring style functions work with demo ports
  severity: low
- rule: Web standards-first, runtime-agnostic (Node.js, Bun, Deno, Cloudflare Workers). Use Web Streams API, Uint8Array, Web Crypto API, Blob/File instead of Node.js APIs
  source:
    path: AGENTS.md
    lines: '14'
    commit: 69fb670d88798e2abe3064f9c1dff4946aba0c2b
  collision_type: scope_ambiguity
  why_distracting: This runtime-agnostic philosophy applies to network/IO code, not string-manipulation style processing — an agent might avoid using Node-specific APIs unnecessarily
  severity: low
