rubric:
- rule: When a `modular` file is present, generated files should not be edited, as changes will be overwritten by `make fix-repo`! Instead, edit the `modular` file.
  source:
    path: .ai/AGENTS.md
    lines: '67'
    commit: 09a0bbb21ac50eae76bec1c600ff711f135a4f91
  evidence: Gold patch edits modular_lightglue.py and propagates the same trust_remote_code removals into the generated configuration_lightglue.py and modeling_lightglue.py.
  category: architecture
  verification: llm_judge
- rule: '`make style` or `make fix-repo` should be run as the final step before opening a PR.'
  source:
    path: .ai/AGENTS.md
    lines: '8'
    commit: 09a0bbb21ac50eae76bec1c600ff711f135a4f91
  evidence: Gold patch is formatted consistently with the repo style and contains no stray whitespace or indentation drift.
  category: style
  verification: llm_judge
- rule: PRs should be as brief as possible. Bugfix PRs in particular can often be only one or two lines long, and do not need large comments, docstrings or new functions in this case. Aim to minimize the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: 09a0bbb21ac50eae76bec1c600ff711f135a4f91
  evidence: Gold patch removes only the trust_remote_code plumbing and adds only the minimal TRF014 linter rule; no unrelated refactoring, symbol renames, or new abstractions.
  category: style
  verification: llm_judge
distractors:
- rule: Do not edit a `# Copied from` block, as it will be reverted by `make fix-repo`. Ideally you should edit the code it's copying from and propagate the change, but you can break the `# Copied from` link if needed.
  source:
    path: .ai/AGENTS.md
    lines: '66'
    commit: 09a0bbb21ac50eae76bec1c600ff711f135a4f91
  collision_type: scope_ambiguity
  why_distracting: Agent may conflate the Copied-from rule with the modular-file rule and hesitate to edit LightGlue files, not realizing the LightGlue model uses modular sharing (not Copied-from).
  severity: medium
- rule: Do not open one-off PRs for tiny edits (single typo, isolated lint cleanup, one mutable default argument, etc.).
  source:
    path: .ai/AGENTS.md
    lines: '43'
    commit: 09a0bbb21ac50eae76bec1c600ff711f135a4f91
  collision_type: rule_conflict
  why_distracting: This rule discourages small PRs, but copilot-instructions.md demands minimal diffs for security fixes; an agent may wrongly conclude the task is too small to be a valid contribution.
  severity: medium
- rule: After making changes, you should usually run `make fixup` to ensure any copies and modular files are updated, and then test all affected models.
  source:
    path: .github/copilot-instructions.md
    lines: '35'
    commit: 09a0bbb21ac50eae76bec1c600ff711f135a4f91
  collision_type: architecture_boundary
  why_distracting: Running the full affected-model test suite requires torch/accelerate and is out of scope for this lint-and-removal task; an agent may waste time installing heavy dependencies and running model tests that are not required.
  severity: low
