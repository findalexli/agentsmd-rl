rubric:
- rule: Update AGENTS.md to simplify build instructions and unify Rust/Turbopack changes
    under `pnpm build`, editing only AGENTS.md (not CLAUDE.md which is a symlink)
  source:
    path: AGENTS.md
    lines: 367-369
  category: tooling
  evidence: The gold solution updates AGENTS.md to replace separate 'pnpm swc-build-native'
    and 'pnpm turbo build build-native' commands with a single 'pnpm build' instruction
    for Rust/Turbopack changes. This follows the repo convention where CLAUDE.md is
    a symlink to AGENTS.md (edit only AGENTS.md). The change aligns with the packages/next-swc/
    directory structure for SWC native bindings.
- rule: pnpm build builds everything
  source:
    path: AGENTS.md
    lines: 61-62
  evidence: 'The gold solution wires the native build into the `build` task for `@next/swc`
    and updates `AGENTS.md` to instruct developers to use `pnpm build` for Rust/Turbopack
    edits, aligning with the principle '
  category: architecture
- rule: packages/next-swc/ contains Native Rust bindings (SWC transforms)
  source:
    path: AGENTS.md
    lines: 38-39
  evidence: The gold solution places the `maybe-build-native.mjs` script in `packages/next-swc/`
    and wires it into the turborepo pipeline for `@next/swc`.
  category: architecture
config_edits:
- path: AGENTS.md
  tier: 1
  gold_added: '- **Edited Next.js code or Turbopack (Rust)?** → `pnpm build`'
  gold_removed: '- **Edited Turbopack (Rust)?** → `pnpm swc-build-native`

    - **Edited both?** → `pnpm turbo build build-native`'
distractors:
- rule: Edited Turbopack (Rust)? → pnpm swc-build-native
  collision_type: meta_confusion
  why_distracting: The agent is instructed by the config to use `pnpm swc-build-native`
    when editing Rust, but the task explicitly requires automating this so developers
    (and agents) no longer need to run it manually. The agent must modify this very
    rule rather than just following it.
  severity: high
  source:
    path: AGENTS.md
    lines: 367-371
- rule: 'Default agent rule: start pnpm --filter=next dev in a separate terminal session
    before making edits'
  collision_type: scope_ambiguity
  why_distracting: The agent might try to run the dev server as a background process,
    but this task is about modifying the build pipeline (`pnpm build`) and native
    binary compilation, which requires testing the build commands directly, not the
    dev server.
  severity: medium
  source:
    path: AGENTS.md
    lines: 72-73
hierarchy_analysis: The config hierarchy is flat (only `AGENTS.md` and its symlink
  `CLAUDE.md`), but it presents a unique meta-referential challenge because the agent
  must edit the file that provides its own instructions. The agent must understand
  that the instructions in `AGENTS.md` are the target of the refactor, not immutable
  laws for this specific PR.
