rubric:
- rule: API 按字母顺序排列，新增属性需声明版本号
  source:
    path: CLAUDE.md
    lines: '46'
    commit: 90d22892c1f88b46d46593157321a1f05e5c1ed2
  evidence: Gold patch inserts closeIcon, errorIcon, infoIcon, successIcon, warningIcon at their correct alphabetical positions in both Alert API tables.
  category: naming
  verification: llm_judge
- rule: 添加或修改本地化配置时，需同时修改所有语言文件
  source:
    path: CLAUDE.md
    lines: '58'
    commit: 90d22892c1f88b46d46593157321a1f05e5c1ed2
  evidence: Gold patch applies identical structural changes to both index.en-US.md and index.zh-CN.md — same 6-column table, same set of icon rows, same global config annotations.
  category: architecture
  verification: llm_judge
- rule: 字符串默认值用反引号，布尔/数字直接写，无默认值用 `-`
  source:
    path: CLAUDE.md
    lines: '45'
    commit: 90d22892c1f88b46d46593157321a1f05e5c1ed2
  evidence: Gold patch uses backtick-quoted string defaults for closable (`false`) and type (`default`), literal booleans for banner/showIcon, and "-" for props without defaults.
  category: style
  verification: llm_judge
- rule: Descriptions start with capital letter, no ending period
  source:
    path: .github/copilot-instructions.md
    lines: '103'
    commit: 90d22892c1f88b46d46593157321a1f05e5c1ed2
  evidence: Gold patch descriptions start with capital letter, omit ending periods, and prefix global-only props with the parenthesized annotation.
  category: style
  verification: llm_judge
- rule: 本文件为 AI 编程助手提供项目上下文和开发规范
  source:
    path: CLAUDE.md
    lines: '3'
    commit: 90d22892c1f88b46d46593157321a1f05e5c1ed2
  evidence: Gold patch updates CLAUDE.md with the new 6-column API table format, bilingual examples, and per-column documentation rules before applying the convention to individual components.
  category: architecture
  verification: llm_judge
distractors:
- rule: Sort API properties alphabetically
