rubric:
- id: traced_effect_handlers
  source:
    anchor: Use `Effect.fn("Domain.method")` for named/traced effects
    path: packages/opencode/AGENTS.md
    commit: f5dce6d960ea44d3a77cfe868b8209b44a866edb
  rule: 'HttpApi handlers should be wrapped with `Effect.fn("Domain.method")` so they show up correctly in tracing, per the package `AGENTS.md` Effect rules.

    '
- id: schema_struct_for_plain_objects
  source:
    anchor: Use `Schema.Class` for multi-field data
    path: packages/opencode/AGENTS.md
    commit: f5dce6d960ea44d3a77cfe868b8209b44a866edb
  rule: 'Multi-field DTOs returned as plain objects should use `Schema.Struct`, not `Schema.Class`. The package `AGENTS.md` reserves `Schema.Class` for handlers that genuinely return class instances.

    '
- id: instance_state_not_als
  source:
    anchor: Use `InstanceState`
    path: packages/opencode/AGENTS.md
    commit: f5dce6d960ea44d3a77cfe868b8209b44a866edb
  rule: 'Per-instance reads inside HttpApi handlers must go through `InstanceState.context`, not the `Instance.directory` / `Instance.worktree` ALS globals. The package `AGENTS.md` calls this out explicitly under "Runtime vs InstanceState".

    '
- id: avoid_else_and_destructuring
  source:
    anchor: Avoid `else` statements
    path: AGENTS.md
    commit: f5dce6d960ea44d3a77cfe868b8209b44a866edb
  rule: 'Codebase style: prefer early returns over `else`, avoid unnecessary destructuring, prefer `const` and ternaries over `let`.

    '
- id: no_try_catch
  source:
    anchor: Avoid `try`/`catch` where possible
    path: AGENTS.md
    commit: f5dce6d960ea44d3a77cfe868b8209b44a866edb
  rule: 'Avoid `try`/`catch` where possible (root-level style guide).

    '
- id: preserve_zod_compat_for_legacy_route
  source:
    anchor: Keep `.zod` only as compatibility
    path: packages/opencode/specs/effect/http-api.md
    commit: f5dce6d960ea44d3a77cfe868b8209b44a866edb
  rule: 'Migrated schemas keep the legacy zod surface available so the existing Hono `describeRoute`/`resolver` SDK pipeline still generates correct OpenAPI/SDK output. The spec says "Keep `.zod` only as compatibility for remaining Hono/OpenAPI surfaces."

    '
- id: gate_behind_experimental_flag
  source:
    anchor: '`OPENCODE_EXPERIMENTAL_HTTPAPI` gates the bridge'
    path: packages/opencode/specs/effect/http-api.md
    commit: f5dce6d960ea44d3a77cfe868b8209b44a866edb
  rule: 'The new HttpApi paths must only be reachable when `OPENCODE_EXPERIMENTAL_HTTPAPI` is on; existing Hono routes remain the default surface. The spec describes this gating in "Current State".

    '
