version: '2.0'
source:
  repo: astral-sh/uv
  pr: 18389
  base_commit: 5dc986d367b881e3e8f2a7b2560f78b6b1cbb1c1
  merge_commit: 5fca951e26383d30f38ce96f141ef7a9018a4327
task:
  kind: code_fix
checks:
- id: test_warning_fires_for_workspace_member
  type: fail_to_pass
  origin: pr_diff
  description: A workspace member with `[project.scripts]` and no `[build-system]` must emit the entry-points-skipped warning when synced via `uv sync --all-packages`. At the base commit the warning is silently omitted because the check only inspects the workspace root.
- id: test_warning_names_workspace_member_package
  type: fail_to_pass
  origin: pr_diff
  description: The warning emitted for an unpackaged workspace member must identify the offending member by name in the format `` for package `<name>` ``.
- id: test_warning_names_single_project
  type: fail_to_pass
  origin: pr_diff
  description: Even for a non-workspace project, the warning must include the package name. At base, the single-project warning fires but lacks the `for package <name>` segment.
- id: test_no_warning_for_packaged_member
  type: pass_to_pass
  origin: pr_diff
  description: A workspace member with `tool.uv.package = true` is properly packaged and must not produce the warning. Guards against the fix over-firing.
- id: test_no_warning_for_unsynced_member
  type: pass_to_pass
  origin: pr_diff
  description: Running `uv sync` (without `--all-packages`) from the workspace root must not emit a member-named warning, because the unpackaged member is not in the sync target. Guards against the fix iterating members outside the sync scope.
- id: test_uv_compiles
  type: pass_to_pass
  origin: repo_tests
  description: '`cargo check -p uv --bin uv` must succeed on the agent''s modified source. Compilation regression guard.'
rubric:
- rule: AVOID using `panic!`, `unreachable!`, `.unwrap()`, unsafe code, and clippy rule ignores
  source:
    path: CLAUDE.md
    lines: '7'
    commit: 5dc986d367b881e3e8f2a7b2560f78b6b1cbb1c1
  evidence: Gold patch removes the old warning block and moves it into an `if let` guard with explicit membership checks; no unwrap or unsafe introduced.
  category: safety
  verification: llm_judge
- rule: PREFER patterns like `if let` to handle fallibility
  source:
    path: CLAUDE.md
    lines: '8'
    commit: 5dc986d367b881e3e8f2a7b2560f78b6b1cbb1c1
  evidence: Gold patch uses `if let SyncTarget::Project(project) = &target` to gate the new warning logic.
  category: style
  verification: llm_judge
- rule: AVOID shortening variable names, e.g., use `version` instead of `ver`, and `requires_python` instead of `rp`
  source:
    path: CLAUDE.md
    lines: '17'
    commit: 5dc986d367b881e3e8f2a7b2560f78b6b1cbb1c1
  evidence: 'Gold patch uses descriptive names: `roots`, `name`, `member` — no abbreviations introduced.'
  category: naming
  verification: llm_judge
- rule: PREFER top-level imports over local imports or fully qualified names
  source:
    path: CLAUDE.md
    lines: '16'
    commit: 5dc986d367b881e3e8f2a7b2560f78b6b1cbb1c1
  evidence: Gold patch adds `use rustc_hash::FxHashSet;` as a top-level import.
  category: style
  verification: llm_judge
- rule: ALWAYS read and copy the style of similar tests when adding new cases
  source:
    path: CLAUDE.md
    lines: '15'
    commit: 5dc986d367b881e3e8f2a7b2560f78b6b1cbb1c1
  evidence: Gold patch modifies only sync.rs and does not add new tests; this rule applies if the agent writes test cases following existing patterns in sync.rs.
  category: testing
  verification: llm_judge
- rule: NEVER assume clippy warnings are pre-existing, it is very rare that `main` has warnings
  source:
    path: CLAUDE.md
    lines: '14'
    commit: 5dc986d367b881e3e8f2a7b2560f78b6b1cbb1c1
  evidence: 'Gold patch''s additions are structured to avoid new clippy warnings: if-let chains, no unwrap, clean top-level import.'
  category: style
  verification: llm_judge
distractors:
- rule: ALWAYS write `SAFETY` comments following our usual style when writing `unsafe` code
  source:
    path: CLAUDE.md
    lines: '9'
    commit: 5dc986d367b881e3e8f2a7b2560f78b6b1cbb1c1
  collision_type: rule_conflict
  why_distracting: Line 7 forbids unsafe code entirely, but line 9 implies unsafe is sometimes acceptable with SAFETY comments. An agent might incorrectly introduce unsafe blocks when this fix needs none.
  severity: low
- rule: PREFER let chains (`if let` combined with `&&`) over nested `if let` statements
  source:
    path: CLAUDE.md
    lines: '11'
    commit: 5dc986d367b881e3e8f2a7b2560f78b6b1cbb1c1
  collision_type: scope_ambiguity
  why_distracting: This rule could lead an agent to over-chain conditions into a single `if let` when the gold fix requires a separate guard check (`roots.contains(name)`) inside the `if let` body rather than chained.
  severity: medium
- rule: PREFER `#[expect()]` over `[allow()]` if clippy must be disabled
  source:
    path: CLAUDE.md
    lines: '10'
    commit: 5dc986d367b881e3e8f2a7b2560f78b6b1cbb1c1
  collision_type: meta_confusion
  why_distracting: This rule about clippy attribute syntax is irrelevant to the current fix. An agent might waste effort on clippy attribute style when the fix should focus on the warning logic in sync.rs.
  severity: low
config_edits: []
