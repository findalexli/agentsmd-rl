[task]
name = "workers-sdk-workflow-fixture"
title = "Add Workflow example to worker-with-resources fixture"
description = """
The worker-with-resources fixture in Cloudflare's workers-sdk demonstrates various
Cloudflare Workers features (KV, R2, D1, DurableObjects). This task adds a basic
Workflow example to the same fixture by implementing a MyWorkflow class, updating
the wrangler configuration, and adding the corresponding type declarations.
"""

difficulty = "medium"
estimated_time_seconds = 600

[tags]
languages = ["typescript"]
ecosystem = "cloudflare-workers"
domain = "infrastructure-config"

[scoring]
pass_to_pass_weight = 0.3
fail_to_pass_weight = 0.7
