rubric:
  - rule: "Use `import type { X }` for type-only imports (`@typescript-eslint/consistent-type-imports`)"
    source:
      path: "AGENTS.md"
      lines: "91"
      commit: "e200179d8dbdb36d716e5df9e981b3219c93d974"
    evidence: "Gold PR imports WorkflowEvent and WorkflowStep with `import type { WorkflowEvent, WorkflowStep }`"
    category: "style"
    verification: llm_judge

  - rule: "TypeScript with strict mode"
    source:
      path: "AGENTS.md"
      lines: "90"
      commit: "e200179d8dbdb36d716e5df9e981b3219c93d974"
    evidence: "Gold PR adds proper TypeScript types for WorkflowParams interface and MyWorkflow generic parameters"
    category: "style"
    verification: llm_judge

  - rule: "No `any` (`@typescript-eslint/no-explicit-any`)"
    source:
      path: "AGENTS.md"
      lines: "92"
      commit: "e200179d8dbdb36d716e5df9e981b3219c93d974"
    evidence: "Gold PR uses explicit types (WorkflowParams, Env, WorkflowEvent<WorkflowParams>) with no `any`"
    category: "style"
    verification: llm_judge

  - rule: "No non-null assertions (`!`)"
    source:
      path: "AGENTS.md"
      lines: "93"
      commit: "e200179d8dbdb36d716e5df9e981b3219c93d974"
    evidence: "Gold PR uses nullish coalescing (??) instead of non-null assertion for event.payload.name"
    category: "style"
    verification: llm_judge

  - rule: "No floating promises - must be awaited or explicitly voided (`@typescript-eslint/no-floating-promises`)"
    source:
      path: "AGENTS.md"
      lines: "94"
      commit: "e200179d8dbdb36d716e5df9e981b3219c93d974"
    evidence: "Gold PR awaits all step.do() and step.sleep() calls"
    category: "style"
    verification: llm_judge

  - rule: "Prefix unused variables with `_`"
    source:
      path: "AGENTS.md"
      lines: "97"
      commit: "e200179d8dbdb36d716e5df9e981b3219c93d974"
    evidence: "Gold PR's existing code uses `_request: Request` prefix for unused parameters - new code may also need this"
    category: "naming"
    verification: llm_judge

distractors:
  - rule: "All changes to published packages require a changeset (see below)"
    source:
      path: "AGENTS.md"
      lines: "100"
      commit: "e200179d8dbdb36d716e5df9e981b3219c93d974"
    collision_type: scope_ambiguity
    why_distracting: "Fixture directories are not published packages and do not require changesets - the PR was labeled 'no-changeset-required'"
    severity: medium

  - rule: "Use `node:` prefix for Node.js imports (`import/enforce-node-protocol-usage`)"
    source:
      path: "AGENTS.md"
      lines: "96"
      commit: "e200179d8dbdb36d716e5df9e981b3219c93d974"
    collision_type: scope_ambiguity
    why_distracting: "This rule applies to Node.js tooling code, not Workers runtime code that imports from cloudflare:workers"
    severity: medium

  - rule: "Format with oxfmt - run `pnpm prettify` in the workspace root before committing"
    source:
      path: "AGENTS.md"
      lines: "99"
      commit: "e200179d8dbdb36d716e5df9e981b3219c93d974"
    collision_type: rule_conflict
    why_distracting: "The agent cannot run pnpm/oxfmt in this environment - formatting is a process rule, not a code-correctness rule"
    severity: low
