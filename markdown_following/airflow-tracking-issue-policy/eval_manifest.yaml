version: '2.0'
task:
  name: airflow-tracking-issue-policy
  kind: markdown_authoring
  title: 'AGENTS: require tracking issue for PRs that apply a workaround'
  description: Add a policy section to AGENTS.md (apache/airflow) requiring that every PR which applies a workaround/version cap/mitigation/partial fix opens a GitHub tracking issue first, links it in the PR body, and embeds the full tracking-issue URL as a code-level comment at the workaround site.
