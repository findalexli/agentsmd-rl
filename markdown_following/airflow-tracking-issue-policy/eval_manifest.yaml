  owner: apache
  repo: apache/airflow
  pr: 65612
  base_commit: 136d2ae31d2a6c36884d83d820ffcfc4e2b2abae
  merge_commit: 098b9d4d1da0a70c39a1dd3d9c0d736b88603ea6
  url: https://github.com/apache/airflow/pull/65612
target_files:
