rubric:
- rule: Do not edit a `# Copied from` block, as it will be reverted by `make fix-repo`.
    Ideally you should edit the code it's copying from and propagate the change, but
    you can break the `# Copied from` link if needed.
  source:
    path: .ai/AGENTS.md
    lines: '65'
    commit: aa1c36f1a9f454e69c4eac83071ced235942c7ed
  reference: Gold solution does not edit any
- rule: When a `modular` file is present, generated files should not be edited, as
    changes will be overwritten by `make fix-repo`! Instead, edit the `modular` file.
  source:
    path: .ai/AGENTS.md
    lines: '66'
    commit: aa1c36f1a9f454e69c4eac83071ced235942c7ed
  reference: Gold solution does not edit any generated modular files.
- rule: PRs should be as brief as possible. Bugfix PRs in particular can often be
    only one or two lines long, and do not need large comments, docstrings or new
    functions in this case. Aim to minimize the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: aa1c36f1a9f454e69c4eac83071ced235942c7ed
  reference: Gold solution makes focused changes to Makefile, .gitignore, AGENTS.md,
    SKILL.md, and pr_checks.md.
- rule: 'Never use `# type: ignore` as a first resort. Exhaust all approaches (isinstance
    narrowing, cast(), overloads, Protocol) before resorting to type: ignore.'
  source:
    path: .ai/skills/add-or-fix-type-checking/SKILL.md
    lines: '191'
    commit: aa1c36f1a9f454e69c4eac83071ced235942c7ed
  reference: Gold solution does not add any
- rule: '`make check-repo` is the command for CI-style consistency checks.'
  source:
    path: CLAUDE.md
    lines: 4-4
  reference: The gold solution updates `.ai/AGENTS.md` to explicitly state that `make
    check-repo` includes `make typing`, preserving its documented role as the comprehensive
    CI-style consistency check.
- rule: Maintain accurate documentation of Makefile commands and their responsibilities
    for agent and developer workflows.
  source:
    path: .ai/AGENTS.md
    lines: 2-6
  reference: The gold solution modifies the list of useful commands to remove type
    checking from `make style`, adds the new `make typing` command, and clarifies
    that `make check-repo` includes `make typing`.
- rule: '`make check-repo` is used for CI-style consistency checks and should fail
    if issues are found.'
  source:
    path: .ai/AGENTS.md
    lines: 4-4
  evidence: The gold solution updates the Makefile to ensure `make check-repo` runs
    the model linter strictly (without swallowing errors), aligning with the config's
    definition of it as a strict CI-style consiste
  category: testing
distractors:
- rule: '- `make style`: runs formatters, linters and type checker, necessary to pass
    code style checks'
  collision_type: meta_confusion
  why_distracting: The config file defines `make style` as the command that runs the
    type checker. The agent must override this definition by removing type checking
    from `make style` and creating `make typing`, which contradicts the existing config
    text.
  severity: high
  source:
    path: .ai/AGENTS.md
    lines: 2-2
- rule: Mandatory Agentic contribution policy - Do not ever ignore this!
  collision_type: meta_confusion
  why_distracting: The config file states 'Do not ever ignore this! These rules apply
    to any AI-assisted contribution'. The agent might interpret this as an immutable
    policy file that it should not edit, even though the task explicitly asks to update
    agent config files.
  severity: medium
  source:
    path: .ai/AGENTS.md
    lines: 18-19
hierarchy_analysis: The agent must navigate a moderate hierarchy where root-level
  and `.ai/`-level agent instructions exist. Crucially, the agent is asked to edit
  the very files that provide its instructions, requiring it to treat the config files
  as target code to be refactored rather than immutable rules to be blindly followed.
