  rule: '"packages/agents-core/src/run.ts is the runtime entrypoint; keep it small and focused on orchestration. Add new runtime logic under packages/agents-core/src/runner/, organized by responsibility, then import into run.ts." A small inline catch is acceptable; large helper logic should be factored out under runner/.

