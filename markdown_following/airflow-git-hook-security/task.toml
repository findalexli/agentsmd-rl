name = "airflow-git-hook-security"
version = "1.0.0"
description = "Harden GitHook SSH command building and URL construction"
category = "security"
difficulty = "medium"
estimated_time = "45m"

[repository]
owner = "apache"
repo = "airflow"
base_commit = "b5dae4e72df868004b53006bb995256ef88d9c0b"
merge_commit = "8ad491d0de3ed3753a1bf3135084dc37e108faf0"
pr_number = 64756

[environment]
base_image = "python:3.12-slim"

[timeouts]
agent = 1800
verifier = 120

[tags]
primary = "python"
secondary = ["security", "ssh", "git", "injection"]

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
