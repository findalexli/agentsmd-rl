rubric:
- rule: Document how to run the linter with e2e tags in CLAUDE.md (golangci-lint run --build-tags "e2e" ./...)
  source:
    path: CLAUDE.md
    lines: '14'
    commit: 27d9d506306e808965d99b70c1f59308dcabca13
  reference: '- Run: `golangci-lint run --build-tags "e2e" ./...`'
- rule: Document forbidden packages in CLAUDE.md (e.g., io/ioutil, github.com/pkg/errors, gopkg.in/yaml.v2, golang.org/x/exp/maps, golang.org/x/exp/slices)
  source:
    path: CLAUDE.md
    lines: 23-24
    commit: 27d9d506306e808965d99b70c1f59308dcabca13
  reference: '- No `io/ioutil`, `github.com/pkg/errors`, `gopkg.in/yaml.v2`, `golang.org/x/exp/maps`, `golang.org/x/exp/slices`'
- rule: Document the correct errdefs package in CLAUDE.md (Use github.com/containerd/errdefs instead of github.com/docker/docker/errdefs)
  source:
    path: CLAUDE.md
    lines: '25'
    commit: 27d9d506306e808965d99b70c1f59308dcabca13
  reference: '- Use `github.com/containerd/errdefs` instead of `github.com/docker/docker/errdefs`'
- rule: In Go tests, use t.Context() instead of context.Background() or context.TODO()
  source:
    path: CLAUDE.md
    lines: '26'
    commit: 27d9d506306e808965d99b70c1f59308dcabca13
  reference: '- In tests: use `t.Context()` instead of `context.Background()` or `context.TODO()`'
- rule: When writing to strings.Builder or other io.Writer, prefer fmt.Fprintf over WriteString(fmt.Sprintf(...)) for efficiency
  source:
    path: CLAUDE.md
    lines: '27'
    commit: 27d9d506306e808965d99b70c1f59308dcabca13
  reference: '- Prefer `fmt.Fprintf` over `WriteString(fmt.Sprintf(...))`'
- rule: Prefer `fmt.Fprintf` over `WriteString(fmt.Sprintf(...))`.
  source:
    path: CLAUDE.md
    lines: '27'
  source_text: '- Prefer `fmt.Fprintf` over `WriteString(fmt.Sprintf(...))`'
  evidence: '`pkg/compose/publish.go` applies this rule in all three touched builder writes: `b.WriteString(fmt.Sprintf("%q: %s\n", val.Key, val.Value))` becomes `fmt.Fprintf(&b, "%q: %s\n", val.Key, val.Value)`, `errorMsg.WriteString(fmt.Sprintf("%s\n", err))` becomes `fmt.Fprintf(&errorMsg, "%s\n", err)`, and `errMsg.WriteString(fmt.Sprintf("- %q\n", serviceInError))` becomes `fmt.Fprintf(&errMsg, "- %q\n", serviceInError)`.'
  category: style
  verification: llm_judge
config_edits:
- path: CLAUDE.md
  tier: 1
  gold_added: '# Project: Docker Compose


    ## Build & Test


    - Build: `make build`

    - Test all: `make test`

    - Test unit: `go test ./pkg/...`

    - Test single: `go test ./pkg/compose/ -run TestFunctionName`

    - E2E tests: `go test -tags e2e ./pkg/e2e/ -run TestName`


    ## Lint


    - Linter: golangci-lint v2 (config in `.golangci.yml`)

    - Run: `golangci-lint run --build-tags "e2e" ./...`

    - **After modifying any Go code, ALWAYS run the linter and fix all reported issues before considering the task complete.**

    - Lint is also run via Docker: `docker buildx bake lint` (uses version pinned in `Dockerfile`)


    ## Code Style


    - Formatting is enforced by golangci-lint (gofumpt + gci)

    - Import order: stdlib, third-party, local module (enforced by gci)

    - Max line length: 200 chars

    - Max cyclomatic complexity: 16

    - No `io/ioutil`, `github.com/pkg/errors`, `gopkg.in/yaml.v2`, `golang.org/x/exp/maps`, `golang.org/x/exp/slices`

    - Use `github.com/containerd/errdefs` instead of `github.com/docker/docker/errdefs`

    - In tests: use `t.Context()` instead of `context.Background()` or `context.TODO()`

    - Prefer `fmt.Fprintf` over `WriteString(fmt.Sprintf(...))`'
  gold_removed: ''
distractors:
- rule: Use `github.com/containerd/errdefs` instead of `github.com/docker/docker/errdefs`.
  source:
    path: CLAUDE.md
    lines: '25'
  source_text: '- Use `github.com/containerd/errdefs` instead of `github.com/docker/docker/errdefs`'
  collision_type: scope_ambiguity
  why_distracting: '`pkg/compose/publish.go` is error-handling-heavy, so an agent could mistakenly hunt for `errdefs` changes here. The gold diff does not add or modify either import; it only rewrites string-builder formatting calls, so following this rule in this change would create unrelated refactoring noise.'
  severity: low
- rule: Do not use the listed banned packages.
  source:
    path: CLAUDE.md
    lines: '24'
  source_text: '- No `io/ioutil`, `github.com/pkg/errors`, `gopkg.in/yaml.v2`, `golang.org/x/exp/maps`, `golang.org/x/exp/slices`'
  collision_type: meta_confusion
  why_distracting: Because the gold diff also bumps the linter version, an agent might overread this as a prompt for broader dependency cleanup. None of the touched hunks introduce or modify any of these packages, so applying the rule here would waste effort outside the scope of the change.
  severity: medium
