rubric:
- rule: Add or update unit tests for any code change unless it is truly infeasible; if something prevents adding tests, explain why in the PR.
  source:
    path: AGENTS.md
    lines: '115'
    commit: 4a53e998a2cd27eb004c4c25d6d178bfe371b72e
  evidence: Gold diff adds a comprehensive test for all error subclass names in errors.test.ts.
  category: testing
  verification: llm_judge
- rule: Code is readable and maintainable.
  source:
    path: AGENTS.md
    lines: '237'
    commit: 4a53e998a2cd27eb004c4c25d6d178bfe371b72e
  evidence: 'Gold fix is a single clear line: this.name = new.target.name; placed right after super(message) in the constructor.'
  category: style
  verification: llm_judge
- rule: Commit using Conventional Commits.
  source:
    path: AGENTS.md
    lines: '219'
    commit: 4a53e998a2cd27eb004c4c25d6d178bfe371b72e
  evidence: 'Gold commit uses fix(agents-core): prefix matching Conventional Commits format.'
  category: naming
  verification: llm_judge
- rule: Comments must end with a period.
  source:
    path: AGENTS.md
    lines: '145'
    commit: 4a53e998a2cd27eb004c4c25d6d178bfe371b72e
  evidence: Not directly relevant to this PR but is a repo-level style rule agents must follow.
  category: style
  verification: llm_judge
distractors:
- rule: 'Treat review feedback critically: reviewers can be wrong. Reproduce or verify each comment, cross-check with source docs, and only make changes when the feedback remains valid after your own validation.'
  source:
    path: AGENTS.md
    lines: '249'
    commit: 4a53e998a2cd27eb004c4c25d6d178bfe371b72e
  collision_type: meta_confusion
  why_distracting: This rule about review process could distract agents into second-guessing the bug report instead of fixing the clear behavioral issue.
  severity: low
- rule: If your change affects the public API, add a Changeset.
  source:
    path: AGENTS.md
    lines: '231'
    commit: 4a53e998a2cd27eb004c4c25d6d178bfe371b72e
  collision_type: scope_ambiguity
  why_distracting: Agents might focus on creating a changeset file instead of the core fix, but the task scope is the behavioral fix itself.
  severity: medium
