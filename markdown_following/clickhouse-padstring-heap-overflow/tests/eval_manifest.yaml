version: '2.0'
checks:
  - id: test_memory_safe_pad_storage
    type: fail_to_pass
    origin: pr_diff
    description: 'Core fix: pad_string storage must not use String type (lacks 15-byte
      padding guarantee for memcpySmallAllowReadWriteOverflow15)'
  - id: test_no_unsafe_string_expansion
    type: fail_to_pass
    origin: pr_diff
    description: 'Core fix: pad string expansion must not use += string concatenation
      which causes heap-buffer-overflow'
  - id: test_argument_validation_modernized
    type: fail_to_pass
    origin: pr_diff
    description: 'Refactoring: argument validation uses validateFunctionArguments helper
      with FunctionArgumentDescriptors'
  - id: test_init_method_restructured
    type: fail_to_pass
    origin: pr_diff
    description: 'Refactoring: init() method removed, logic moved into constructor
      and executeImpl'
  - id: test_repo_git_initialized
    type: pass_to_pass
    origin: repo_tests
    description: 'CI: Git repository is properly initialized'
  - id: test_repo_no_duplicate_includes
    type: pass_to_pass
    origin: repo_tests
    description: 'CI: No duplicate #include statements in source file'
  - id: test_repo_no_trailing_whitespace
    type: pass_to_pass
    origin: repo_tests
    description: 'CI: Source file has no trailing whitespace'
  - id: test_repo_no_tabs
    type: pass_to_pass
    origin: repo_tests
    description: 'CI: Source file uses spaces not tabs'
  - id: test_repo_balanced_braces
    type: pass_to_pass
    origin: repo_tests
    description: 'CI: C++ source has balanced braces and parentheses'
  - id: test_repo_file_ends_with_newline
    type: pass_to_pass
    origin: repo_tests
    description: 'CI: Source file ends with newline'
  - id: test_repo_shell_scripts_executable
    type: pass_to_pass
    origin: repo_tests
    description: 'CI: Shell scripts pass bash -n syntax check'
  - id: test_repo_no_crlf
    type: pass_to_pass
    origin: repo_tests
    description: 'CI: Source file has no CRLF line endings'
  - id: test_repo_no_multiple_empty_lines
    type: pass_to_pass
    origin: repo_tests
    description: 'CI: No more than 2 consecutive empty lines'
rubric:
  - rule: When writing C++ code, always use Allman-style braces (opening brace on a
      new line). This is enforced by the style check in CI.
    source:
      path: .claude/CLAUDE.md
      lines: '52'
      commit: 73ad233a01a81190b2a45b820878e54c36a9a22c
    reference: "FunctionPadString(const char * name_, bool is_right_pad_, bool is_utf8_)\n\
      \    : function_name(name_)\n    , is_right_pad(is_right_pad_)\n    , is_utf8(is_utf8_)\n\
      {\n"
  - rule: 'When writing messages, say ASan, not ASAN, and similar (because there are
      two words: Address Sanitizer).'
    source:
      path: .claude/CLAUDE.md
      lines: '54'
      commit: 73ad233a01a81190b2a45b820878e54c36a9a22c
    reference: '/// This is a requirement of `memcpySmallAllowReadWriteOverflow15`
      which is called by `writeSlice` in `appendTo`.

      '
  - rule: Use C++14 digit separators (e.g., 1'000'000) for large numeric literals
      to improve readability.
    source:
      path: AGENTS.md
      lines: '52'
      commit: 73ad233a01a81190b2a45b820878e54c36a9a22c
    reference: 'constexpr ssize_t MAX_NEW_LENGTH = 1''000''000;

      '
  - rule: Use validateFunctionArguments helper with FunctionArgumentDescriptors instead
      of manual argument validation for cleaner, more maintainable code.
    source:
      path: .claude/CLAUDE.md
      lines: '52'
      commit: 73ad233a01a81190b2a45b820878e54c36a9a22c
    reference: "FunctionArgumentDescriptors mandatory_args{\n    {\"string\", static_cast<FunctionArgumentDescriptor::TypeValidator>(&isStringOrFixedString),\
      \ nullptr, \"Array\"},\n    {\"length\", static_cast<FunctionArgumentDescriptor::TypeValidator>(&isInteger),\
      \ nullptr, \"const UInt*\"},\n};\nFunctionArgumentDescriptors optional_args{\n\
      \    {\"pad_string\", static_cast<FunctionArgumentDescriptor::TypeValidator>(&isString),\
      \ isColumnConst, \"Array\"}\n};\nvalidateFunctionArguments(*this, arguments,\
      \ mandatory_args, optional_args);\n"
  - rule: For memory safety with PaddedPODArray, use insertFromItself instead of +=
      for expanding container content to avoid heap-buffer-overflow.
    source:
      path: .claude/CLAUDE.md
      lines: '52'
      commit: 73ad233a01a81190b2a45b820878e54c36a9a22c
    reference: "while (numCharsInPadString() < 16)\n{\n    pad_string.insertFromItself(pad_string.begin(),\
      \ pad_string.end());\n"
