distractors:
- rule: 'no-console: error — use project''s logging utilities'
  collision_type: would_cause_bug
  why_distracting: The agent might try to import the project's logging utilities to print the version error. However, importing those utilities would load the CLI bundle containing Node 20+ syntax, causing the exact syntax error the shim is meant to prevent.
  severity: high
  source:
    path: packages/create-cloudflare/AGENTS.md
    lines: 16-16
- rule: No separate bin shim — the built output IS the bin
  collision_type: meta_confusion
  why_distracting: The config explicitly forbids a separate bin shim, which directly conflicts with the PR instruction. The agent must realize the instruction represents an architectural change and override this rule by updating the AGENTS.md file itself.
  severity: high
  source:
    path: packages/create-cloudflare/AGENTS.md
    lines: 13-13
- rule: 'Single entry: src/cli.ts serves as CLI, library export, and bin target.'
  collision_type: architecture_boundary
  why_distracting: The agent might attempt to place the version check inside `src/cli.ts` to maintain the single entry point architecture. This would fail because `src/cli.ts` is bundled and its modern syntax would crash older Node versions before the check could execute.
  severity: high
  source:
    path: packages/create-cloudflare/AGENTS.md
    lines: 4-4
hierarchy_analysis: This task features a profound meta-referential conflict. The local `packages/create-cloudflare/AGENTS.md` explicitly documents an architecture (single entry point, no bin shim) that the PR instruction asks to change. The agent must not only ignore the existing architectural constraints but also actively rewrite the `AGENTS.md` file to document the new architecture. Furthermore, the agent must selectively ignore the `no-console` rule because the new bin shim sits outside the main architecture boundary and cannot safely import project utilities.
