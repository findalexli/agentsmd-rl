version = "1.0"
source_repo = "block/goose"
source_pr = 7064

[metadata]
author_name = "Alex Li"
author_email = "alex@example.com"
difficulty = "medium"
category = "refactor"
tags = ["goose", "rust", "clippy", "agentmd-edit"]
