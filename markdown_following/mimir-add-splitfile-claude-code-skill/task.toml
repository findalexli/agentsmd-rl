version = "1.0"
source_repo = "grafana/mimir"
source_pr = 14847

[metadata]
author_name = "Alex Li"
author_email = "alex@example.com"
difficulty = "medium"
category = "feature"
tags = ["mimir", "go", "cli-tool", "claude-skill", "agentmd-edit"]
expert_time_estimate_min = 15.0
junior_time_estimate_min = 45.0

[verifier]
env = { LLM_JUDGE = "${LLM_JUDGE:-0}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}", GEMINI_API_KEY = "${GEMINI_API_KEY:-}" }
timeout_sec = 180.0

[agent]
timeout_sec = 1800.0

[environment]
build_timeout_sec = 600.0
cpus = 2
memory_mb = 4096
storage_mb = 10240
allow_internet = true
