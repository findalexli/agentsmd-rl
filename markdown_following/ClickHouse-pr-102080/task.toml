name = "shichaopei/clickhouse-large-file-check"
description = "Add a CI style check that flags any git-tracked file larger than 5 MB unless explicitly whitelisted. This prevents accidentally committing binary blobs."
version = "1.0.0"
source_pr_url = "https://github.com/ClickHouse/ClickHouse/pull/102080"
source_base_commit = "cf5fb461472203d56bb0c169a61d194dd97fc2f2"
source_merge_commit = "d037e27f19e1ac3bc99d027a328d646853bc6b8e"
difficulty = "easy"
tags = ["bash", "shell-script", "git", "ci", "style-check"]

# Time estimates (in minutes)
estimated_time = "15m"

# PR reference
[repository]
owner = "ClickHouse"
name = "shichaopei/ClickHouse"
short_name = "ClickHouse"

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
