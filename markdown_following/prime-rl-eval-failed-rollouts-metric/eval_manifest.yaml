rubric:
- rule: Errors should never pass silently.
  source:
    path: AGENTS.md
    lines: 19-20
  evidence: The gold solution explicitly logs warnings and reports metrics to the monitor for failed rollouts and failed groups, adhering to the principle that errors (failed rollouts) should not pass silently.
  category: architecture
- rule: Do not add unnecessary comments. Especially do not try to explain code change that reflect your work process.
  source:
    path: AGENTS.md
    lines: 7-9
  evidence: The gold solution implements the logic without adding any explanatory comments about the changes made, keeping the code clean.
  category: style
distractors:
- rule: Avoid try/except blocks unless it's really necessary. It's fine that a program fails if something goes wrong as this helps us to catch non-obvious bugs.
  collision_type: rule_conflict
  why_distracting: The rule states 'It's fine that a program fails if something goes wrong'. An agent might interpret this as an instruction to raise an exception or let the program crash when rollouts fail, which directly conflicts with the task's explicit instruction to gracefully track failures in metrics and continue.
  severity: high
  source:
    path: AGENTS.md
    lines: 5-7
- rule: How to write and use TOML configs in prime-rl.
  source:
    path: .claude/skills/toml-config/SKILL.md
    lines: 1-3
  collision_type: scope_ambiguity
  why_distracting: The agent might try to use the toml-config skill to add a configuration flag for enabling/disabling failure tracking, which is unnecessary and out of scope for this specific bug fix.
  severity: low
hierarchy_analysis: The configuration is flat, with CLAUDE.md simply pointing to AGENTS.md. The rules provided are mostly generic Python guidelines (e.g., Zen of Python) rather than project-specific architectural constraints.
