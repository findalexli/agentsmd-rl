  gold_added: "### Test Strategy\n\n**Prefer small inline `insta` snapshot tests**\
    \ over full integration tests:\n\n- **Use inline tests** for most bug fixes and\
    \ small features\n  - Add `#[test]` functions in a `#[cfg(test)]` module at the\
    \ end of the file\n  - Use `insta::assert_snapshot!` for compact, readable test\
    \ assertions\n  - Fast to run, easy to review in PRs\n\n- **Use integration tests**\
    \ (`prqlc/tests/integration/queries/*.prql`) only\n  when:\n  - Developing large,\
    \ complex features that need comprehensive testing\n  - Testing end-to-end behavior\
    \ across multiple compilation stages\n  - The test requires external resources\
    \ or multi-file scenarios\n\nExample of a good inline test:\n\n```rust\n#[cfg(test)]\n\
    mod test {\n    use insta::assert_snapshot;\n\n    #[test]\n    fn test_my_feature()\
    \ {\n        let query = \"from employees | filter country == 'USA'\";\n     \
    \   assert_snapshot!(crate::tests::compile(query).unwrap(), @\"\");\n    }\n}\n\
    ```"
  gold_removed: ''
distractors:
- rule: 'Initialize tests with empty snapshots, then run with `--accept`: `insta::assert_snapshot!(result,
    @"");`'
  collision_type: meta_confusion
  why_distracting: The rule instructs to initialize tests with empty snapshots `(@"")`
    and run with `--accept`. An agent might literally leave the snapshot empty in
    the final patch, failing to realize that the final committed code must contain
    the populated snapshot output.
  severity: high
  source:
    path: CLAUDE.md
    lines: 43-48
hierarchy_analysis: The configuration is a flat single file (`CLAUDE.md`), but the
  task is highly meta-referential. The agent must read `CLAUDE.md` to understand the
  testing conventions, apply them to fix the bug, and then modify `CLAUDE.md` itself
  to expand the documentation on those very testing conventions.
