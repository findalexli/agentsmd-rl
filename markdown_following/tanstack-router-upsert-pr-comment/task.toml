name = "tanstack-router-upsert-pr-comment"
title = "Add upsert-pr-comment.mjs script for PR bundle-size comments"
description = "Create a Node.js script that manages PR comments on GitHub for bundle-size benchmarks. The script should support creating new comments or updating existing ones based on a marker, with proper CLI argument parsing and environment variable support."

[code]
repository = "https://github.com/TanStack/router.git"
base_commit = "13ef4c2e7c92e276185c112d486248b7447535de"
merge_commit = "97dc9f66f3a0e48719f9a167d7e707e432371506"
pr_number = 6948

[metadata]
difficulty = "easy"
tags = ["javascript", "nodejs", "cli", "github-api", "automation"]
time_estimate = "15m"

[environment]
image = "node:22-slim"

[execution]
agent_timeout = 1800
verifier_timeout = 120

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
