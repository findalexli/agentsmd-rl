rubric:
- rule: When documenting breaking changes in CHANGELOG.md, do not add explanatory
    comments about the removal process or reference old code patterns.
  source:
    path: CHANGELOG.md
    lines: 1-50
  reference: The CHANGELOG entry states the removal fact without explaining the work
    process or referencing how the code used to work.
- rule: Document breaking configuration changes in CHANGELOG.md using exact field
    names verified against the actual code.
  source:
    path: CHANGELOG.md
    lines: 1-50
  evidence: The changelog entry explicitly references the exact TOML config field
    `model.tp` and the python class `ModelConfig`, adhering to the rule to verify
    exact field names rather than guessing.
  category: documentation
  reference: 'CHANGELOG.md entry: `**`model.tp` (trainer `ModelConfig`)**: Removed
    from the trainer model config.'
distractors:
- rule: 'When preparing release notes: ... organize notes into numbered highlight
    sections (# 1., # 2., ...), then # Breaking Changes, # Bug Fixes, and # Misc.'
  collision_type: scope_ambiguity
  why_distracting: The instruction asks to document the breaking change in CHANGELOG.md.
    The agent might confuse this with 'preparing release notes' and attempt to restructure
    the changelog into numbered highlight sections and a '# Breaking Changes' header,
    breaking the existing simple bulleted format.
  severity: medium
  source:
    path: AGENTS.md
    lines: 48-53
- rule: Do not refer to old code. 'The code used to do that but now we are doing this'
    is not a pattern we want.
  collision_type: scope_ambiguity
  why_distracting: The rule forbids referring to old code ('The code used to do that
    but now we are doing this'). If applied to the CHANGELOG.md, the agent might fail
    to write a helpful migration note explaining that the `tp` field was removed and
    is no longer accepted.
  severity: medium
  source:
    path: AGENTS.md
    lines: 6-8
hierarchy_analysis: The configuration is flat, with rules defined in AGENTS.md and
  included via CLAUDE.md. The primary challenge is scope discrimination, ensuring
  rules meant for code comments or GitHub releases are not incorrectly applied to
  the CHANGELOG.md file.

