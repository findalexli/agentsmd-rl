name = "kotlin-swift-export-nullable-flow"
title = "Support Flow with nullable elements in Swift Export"
description = "Add support for Kotlin Flow with nullable elements when exported to Swift async sequences. The fix requires changing the interop layer to distinguish between null values emitted by the flow and null returned when the flow completes."
pr_url = "https://github.com/JetBrains/kotlin/pull/5760"
difficulty = "hard"
estimated_time = "45-60 min"
tags = ["kotlin", "swift", "interop", "coroutines", "nullability", "flow"]

[repository]
owner = "JetBrains"
repo = "kotlin"
base_commit = "e3b4d7fe1cccf74f80f8ea53d9332a2c6e657f8f"
merge_commit = "ff5b404654967af3cacad508051312c08e92be12"
pr_number = 5760

[environment]
base_image = "ubuntu:24.04"
language = "kotlin"
build_system = "gradle"

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
