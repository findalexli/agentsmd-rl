rubric:
- id: deprecation_uses_for_removal
  source:
    commit: 89a97b7a7c901ce0d9ef561c531678baaa547a37
    lines: 26-30
    path: java/AGENTS.md
  rule: Deprecation must use @Deprecated(forRemoval = true) — the standard form shown in java/AGENTS.md's Deprecation example block.
- id: javadoc_for_public_apis
  source:
    commit: 89a97b7a7c901ce0d9ef561c531678baaa547a37
    lines: 32-42
    path: java/AGENTS.md
  rule: Public API methods carry Javadoc — the @deprecated tag should accompany the @Deprecated annotation, naming the recommended replacement.
- id: deprecate_before_remove
  source:
    commit: 89a97b7a7c901ce0d9ef561c531678baaa547a37
    lines: 53-55
    path: AGENTS.md
  rule: Public functionality must be marked deprecated with a pointer to the alternative before any removal — the project does not follow semver.
- id: small_reversible_diff
  source:
    commit: 89a97b7a7c901ce0d9ef561c531678baaa547a37
    lines: 11-13
    path: AGENTS.md
  rule: Avoid repo-wide refactors/formatting; prefer small, reversible diffs. The PR should touch only the three named files and not bulk-reformat surrounding code.
- id: comments_explain_why
  source:
    commit: 89a97b7a7c901ce0d9ef561c531678baaa547a37
    lines: 59-60
    path: AGENTS.md
  rule: Comments should explain *why*, not *what* — the new accessor's Javadoc should justify the escape hatch, not narrate the field assignment.
