distractors:
- rule: Store PR-specific artifacts like design documents or analysis notes in a `.pr/`
    directory.
  collision_type: scope_ambiguity
  why_distracting: The agent might interpret the instruction to modify complex routing
    logic as requiring a design document or analysis notes, leading it to create unnecessary
    files in a `.pr/` directory instead of just implementing the code changes.
  severity: low
  source:
    path: AGENTS.md
    lines: 65-80
- rule: Use cross-repo-testing skill when testing a cross-repo feature, deploying
    to staging, or testing SDK against OH Cloud.
  source:
    path: .agents/skills/cross-repo-testing/SKILL.md
    lines: 1-5
  collision_type: scope_ambiguity
  why_distracting: The task involves Slack integration, OpenHands organizations, and
    SaaS conversation stores, which might sound like a cloud or cross-repo feature
    requiring the cross-repo-testing skill. However, this is a purely local backend
    logic change in `slack_view.py`.
  severity: medium
hierarchy_analysis: There is only a single, flat config file (`AGENTS.md`) at the
  root level. No hierarchy traversal or conflict resolution between multiple config
  files is required.
