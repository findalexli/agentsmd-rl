  source:
    path: src/CLAUDE.md
    lines: 10-11
    commit: 39094877abb3e74557d3975dd015ee677220eb35
- rule: Use comments to explain invariants and reasoning, not just narrate code. Explain
    WHY, not WHAT.
  source:
    path: src/CLAUDE.md
    lines: 10-11
    commit: 39094877abb3e74557d3975dd015ee677220eb35
- rule: Never use `@import()` inline inside of functions.
  source:
    path: src/CLAUDE.md
    lines: 10-11
  evidence: The gold solution uses `active.count()` and `active.findFirstSet()` to
    compute the filter without adding any inline `@import()` statements inside the
    `GlobWalker_` function.
  category: style
distractors:
- rule: 'Build Bun: `bun bd` and Run tests with your debug build'
  collision_type: meta_confusion
  why_distracting: The bug is inside an `if (comptime isWindows)` block. On a Linux
    workspace, Zig discards this block during semantic analysis, so `bun bd` will
    compile successfully even with the broken code. The agent might rely on `bun bd`
    to verify the bug or the fix, leading to confusion when it compiles regardless
    of their changes.
  severity: high
  source:
    path: CLAUDE.md
    lines: 7-10
- rule: Always use `bun.*` APIs instead of `std.*`
  collision_type: architecture_boundary
  why_distracting: The agent might see directory iteration and file descriptor usage
    (`Accessor.DirIter.iterate(fd)`) and try to refactor it to use `bun.sys.File`
    or `bun.sys.read` as mandated by the config. However, `Accessor.DirIter` is the
    correct internal abstraction here, and refactoring it would break the glob walker's
    architecture.
  severity: medium
  source:
    path: src/CLAUDE.md
    lines: 16-26
- rule: If no valid issue number is provided, find the best existing file to modify
    instead, such as; test/js/bun/...
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to write a test to verify the glob walker
    fix. However, because the fix is specifically for an NT kernel-level filename
    filter optimization on Windows, a test run on a Linux environment would not exercise
    this code path at all, resulting in wasted effort.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 26-35
hierarchy_analysis: The root `CLAUDE.md` provides general build and test instructions,
  while `src/CLAUDE.md` provides Zig-specific coding conventions. The primary conflict
  arises because the root config encourages building and testing to verify changes,
  but Zig's `comptime` behavior means the Windows-specific bug won't manifest on Linux
  during a standard `bun bd` build. The agent must rely on static analysis and logical
  reasoning rather than the build/test loop encouraged by the root config.
