rubric:
- rule: Documentation update in AGENTS.md should be consistent with the existing style
    of the Useful commands section
  source:
    path: .ai/AGENTS.md
    lines: 1-10
    commit: 28af8184fb00a0e9bc778c3defdec39bbe7e8839
- rule: Hosted review agents should discover this guidance from the committed root
    AGENTS.md / CLAUDE.md files.
  source:
    path: .ai/AGENTS.md
    lines: '12'
  evidence: The gold solution updates the command descriptions in `.ai/AGENTS.md`
    to reflect the new unified runner structure, ensuring that the guidance discovered
    by hosted review agents remains accurate.
  category: documentation
- rule: Update the documentation to reflect the simplified command structure and remove
    outdated claims about CI behavior.
  source:
    path: .ai/AGENTS.md
    lines: 5-9
  evidence: The gold solution modifies the description of `make check-repo` and removes
    the sentence 'The CI will run `make check-repo` and fail if any issues are found.'
  category: documentation
config_edits:
- path: .ai/AGENTS.md
  tier: 1
  gold_added: "- `make check-repo` \u2014 runs `make typing` and consistency checks.\n\
    \n    `make style` or `make fix-repo` should be run as the final step before opening\n\
    \    a PR."
  gold_removed: "- `make check-repo` \u2014 CI-style consistency checks (includes\
    \ `make typing`)\n\n    `make style` or `make fix-repo` should be run as the final\
    \ step before opening\n    a PR. The CI will run `make check-repo` and fail if\
    \ any issues are found."
distractors:
- rule: The CI will run `make check-repo` and fail if any issues are found.
  collision_type: rule_conflict
  why_distracting: The existing documentation states that CI runs `make check-repo`.
    The agent might configure `.circleci/config.yml` to run `make check-repo` instead
    of the newly requested `check-repository-consistency` target.
  severity: high
  source:
    path: .ai/AGENTS.md
    lines: 8-9
- rule: Do not ever ignore this! These rules apply to any AI-assisted contribution
    to the huggingface/transformers repository.
  collision_type: meta_confusion
  why_distracting: The file contains strict policy warnings ('Do not ever ignore this!').
    The agent might interpret this as making the file immutable or read-only, failing
    to update the outdated CI claims as requested.
  severity: medium
  source:
    path: .ai/AGENTS.md
    lines: 18-19
hierarchy_analysis: The agent is instructed to edit `.ai/AGENTS.md`, which is the
  very file providing its context and rules. It must recognize that the task instructions
  supersede the existing state of the agent instruction file.
