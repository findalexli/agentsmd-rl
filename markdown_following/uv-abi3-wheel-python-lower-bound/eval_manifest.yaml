task:
  kind: code_fix
checks:
- id: test_abi3_cp39_lower_bound_pure_any
  type: fail_to_pass
  origin: pr_diff
  description: For an abi3 wheel like `example-1.0-cp39-abi3-any.whl`, the implied Python marker MUST be `python_full_version >= '3.9'` (a lower bound) and MUST NOT include an upper cap such as `< '3.10'`.
- id: test_abi3_cp312_lower_bound_pure_any
  type: fail_to_pass
  origin: pr_diff
  description: For `example-1.0-cp312-abi3-any.whl`, the implied marker MUST be `python_full_version >= '3.12'` with no upper cap.
- id: test_abi3_cp3_major_only_lower_bound
  type: fail_to_pass
  origin: pr_diff
  description: For a major-only abi3 wheel like `example-1.0-cp3-abi3-any.whl`, the implied marker MUST be `python_full_version >= '3'` with no `< '4'` upper cap.
- id: test_abi3_combines_with_manylinux_platform_markers
  type: fail_to_pass
  origin: pr_diff
  description: For `example-1.0-cp39-abi3-manylinux_2_28_x86_64.whl`, the abi3 lower-bound rule MUST combine correctly with the platform markers (sys_platform, platform_machine, platform_python_implementation).
- id: test_non_abi3_cp39_remains_exact_version
  type: pass_to_pass
  origin: pr_diff
  description: Non-abi3 cp39-cp39 wheels MUST still produce an exact-version match (`>= '3.9' AND < '3.10'`). Behaviour for non-abi3 wheels must not regress.
- id: test_py3_none_any_unchanged
  type: pass_to_pass
  origin: pr_diff
  description: '`py3-none-any` wheels MUST keep their existing behaviour (`>= ''3'' AND < ''4''`).'
- id: test_upstream_test_implied_python_markers
  type: pass_to_pass
  origin: repo_tests
  description: Upstream `prioritized_distribution::tests::test_implied_python_markers` unit test must continue to pass.
- id: test_upstream_test_implied_markers
  type: pass_to_pass
  origin: repo_tests
  description: Upstream `prioritized_distribution::tests::test_implied_markers` unit test must continue to pass.
- id: test_upstream_test_implied_platform_markers
  type: pass_to_pass
  origin: repo_tests
  description: Upstream `prioritized_distribution::tests::test_implied_platform_markers` unit test must continue to pass (regression guard for platform marker logic that the change is adjacent to).
config_edits: []
rubric:
- rule: AVOID using `panic!`, `unreachable!`, `.unwrap()`, unsafe code, and clippy rule ignores
  source:
    path: CLAUDE.md
    lines: '7'
    commit: 17afca33e9d7d678a1e00df280247eed39d8231d
  evidence: gold patch uses a plain `if is_abi3` boolean check and `u64::from()` conversions; no `panic!`, `unreachable!`, `.unwrap()`, unsafe blocks, or clippy ignores are introduced in non-test code.
  category: architecture
  verification: llm_judge
- rule: PREFER integration tests, e.g., at `it/...` over unit tests
  source:
    path: CLAUDE.md
    lines: '3'
    commit: 17afca33e9d7d678a1e00df280247eed39d8231d
  evidence: gold patch adds tests in the existing unit test module of `prioritized_distribution.rs`; the scope of the fix is narrow enough that unit tests adequately exercise the changed behavior.
  category: testing
  verification: llm_judge
- rule: ALWAYS attempt to add a test case for changed behavior
  source:
    path: CLAUDE.md
    lines: '2'
    commit: 17afca33e9d7d678a1e00df280247eed39d8231d
  evidence: gold patch adds 4 new test cases covering cp39-abi3, cp312-abi3, cp3-abi3 lower bounds, and cp39-abi3 combined with platform markers.
  category: testing
  verification: llm_judge
- rule: ALWAYS read and copy the style of similar tests when adding new cases
  source:
    path: CLAUDE.md
    lines: '15'
    commit: 17afca33e9d7d678a1e00df280247eed39d8231d
  evidence: gold patch uses the existing `assert_python_markers` and `assert_implied_markers` helper functions, matching the pattern of surrounding test cases.
  category: style
  verification: llm_judge
- rule: PREFER top-level imports over local imports or fully qualified names
  source:
    path: CLAUDE.md
    lines: '16'
    commit: 17afca33e9d7d678a1e00df280247eed39d8231d
  evidence: gold patch references `AbiTag::Abi3` which is already imported at the top of the file via existing imports; no new fully-qualified paths or inline imports are introduced.
  category: style
  verification: llm_judge
- rule: AVOID shortening variable names, e.g., use `version` instead of `ver`, and `requires_python` instead of `rp`
  source:
    path: CLAUDE.md
    lines: '17'
    commit: 17afca33e9d7d678a1e00df280247eed39d8231d
  evidence: gold patch introduces the variable `is_abi3`, which is descriptive and unabbreviated.
  category: naming
  verification: llm_judge
- rule: PREFER `#[expect()]` over `[allow()]` if clippy must be disabled
  source:
    path: CLAUDE.md
    lines: '10'
    commit: 17afca33e9d7d678a1e00df280247eed39d8231d
  evidence: gold patch does not introduce any clippy suppression annotations; no `#[allow(...)]` or `#[expect(...)]` is added.
  category: style
  verification: llm_judge
distractors:
- rule: PREFER let chains (`if let` combined with `&&`) over nested `if let` statements
  source:
    path: CLAUDE.md
    lines: '11'
    commit: 17afca33e9d7d678a1e00df280247eed39d8231d
  collision_type: would_cause_bug
  why_distracting: The fix requires a plain boolean check `if is_abi3` inside match arms, not pattern matching; attempting to refactor the match into `if let` chains would break exhaustive pattern matching on `LanguageTag` variants.
  severity: high
- rule: PREFER patterns like `if let` to handle fallibility
  source:
    path: CLAUDE.md
    lines: '8'
    commit: 17afca33e9d7d678a1e00df280247eed39d8231d
  collision_type: would_cause_bug
  why_distracting: The abi3 check `filename.abi_tags().contains(&AbiTag::Abi3)` is a simple boolean, not a fallible operation; over-applying `if let` would complicate or break the logic unnecessarily.
  severity: medium
- rule: NEVER assume clippy warnings are pre-existing, it is very rare that `main` has warnings
  source:
    path: CLAUDE.md
    lines: '14'
    commit: 17afca33e9d7d678a1e00df280247eed39d8231d
  collision_type: meta_confusion
  why_distracting: Could lead an agent to fix unrelated pre-existing clippy warnings in the file, expanding scope beyond the abi3 lower-bound fix.
  severity: low
