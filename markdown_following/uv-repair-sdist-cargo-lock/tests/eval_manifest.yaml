rubric:
- rule: PREFER top-level imports over local imports or fully qualified names
  source:
    path: AGENTS.md
    lines: 15-15
  evidence: The Python script `scripts/repair-sdist-cargo-lock.py` uses top-level
    imports (`import argparse`, `import os`, `import subprocess`, etc.) rather than
    local imports.
  category: style
  verification: llm_judge
- rule: AVOID shortening variable names, e.g., use `version` instead of `ver`
  source:
    path: AGENTS.md
    lines: 16-17
  evidence: The script uses descriptive, unshortened variable names like `sdist_path`,
    `extracted_dir`, and `top_level_name`.
  category: naming
  verification: llm_judge
distractors:
- rule: NEVER update all dependencies in the lockfile and ALWAYS use `cargo update
    --precise` to make lockfile changes
  collision_type: scope_ambiguity
  why_distracting: The task requires pruning a Cargo.lock file inside an extracted
    sdist tarball, which is best achieved by running `cargo update --workspace` (as
    noted in the gold solution's docstring). The rule forbids updating all dependencies
    and mandates `--precise`, but this rule is intended for the main repository's
    lockfile, not a temporary lockfile being repaired for a distribution.
  severity: high
  source:
    path: AGENTS.md
    lines: 12-13
- rule: ALWAYS attempt to add a test case for changed behavior and PREFER integration
    tests, e.g., at `it/...`
  collision_type: architecture_boundary
  why_distracting: The agent might attempt to write a Rust integration test in `it/...`
    to test the lockfile repair behavior. However, this is a Python packaging script
    invoked during the GitHub Actions release workflow, and testing it requires a
    full sdist build environment, which is already handled by the CI workflow modifications
    in the gold solution.
  severity: medium
  source:
    path: AGENTS.md
    lines: 2-3
hierarchy_analysis: The configuration is effectively a flat single file, as `CLAUDE.md`
  simply includes `AGENTS.md`. The primary challenge is discerning which Rust-centric
  rules apply to a Python script operating on Rust artifacts (Cargo.lock).
