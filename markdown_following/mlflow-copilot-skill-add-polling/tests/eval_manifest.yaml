distractors:
- rule: Run Python tests using pytest
  collision_type: scope_ambiguity
  why_distracting: The config file heavily emphasizes Python testing with pytest for
    the MLflow backend. An agent might attempt to write Python tests for the new polling
    script, but this is a simple bash script for a Claude skill where the MLflow Python
    testing framework does not apply.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 63-75
- rule: Use top-level imports (only use lazy imports when necessary)
  collision_type: rule_conflict
  why_distracting: The rule mandates top-level imports, which is a Python-specific
    instruction. An agent might be confused and attempt to implement the polling mechanism
    in Python to adhere to the repository's primary language conventions, conflicting
    with the explicit instruction to write a shell script.
  severity: low
  source:
    path: CLAUDE.md
    lines: 8-8
- rule: Use ubuntu-latest for long-running jobs (e.g., polling)
  source:
    path: .claude/rules/github-actions.md
    lines: 7-19
  source_text: '## Use `ubuntu-slim` for Lightweight Tasks


    Prefer `ubuntu-slim` over `ubuntu-latest` for simple jobs (e.g., labeling, commenting,
    notifications).


    Note: `ubuntu-slim` has a 15-minute timeout limit. Use `ubuntu-latest` for long-running
    jobs (e.g., polling).


    ```yaml

    # Bad

    runs-on: ubuntu-latest


    # Good

    runs-on: ubuntu-slim

    ```'
  collision_type: scope_ambiguity
  why_distracting: 'The gold diff adds a bash script to poll in the background within
    a Claude Skill definition file (.md). This rule mentions using ''ubuntu-latest''
    specifically for ''long-running jobs (e.g., polling)''. An agent might mistakenly
    think this rule applies and attempt to add GitHub Actions configurations (like
    `runs-on: ubuntu-latest`) to the Markdown file, even though this rule is strictly
    for `.github/workflows/**/*.yml` files.'
  severity: high
hierarchy_analysis: The repository has a flat, single-file configuration (`CLAUDE.md`)
  at the root level. The rules in `CLAUDE.md` are heavily tailored towards the MLflow
  Python backend and Databricks integration, which are largely out of scope for this
  meta-referential task of updating a Claude skill's bash script and markdown definition.
