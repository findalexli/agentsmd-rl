version: "2.0"

source_pr:
  owner: electric-sql
  repo: electric
  number: 3961
  merge_commit: 0031e81777c0a93ab90161be5e6d0e9c999e00d2
  base_commit: deb2a61614678fac029773a56b618382fe5b70f2
  title: "fix(typescript-client): prevent handle -next suffix accumulation on repeated 409s"

description: |
  Fix unbounded URL growth on 409 retries when a proxy strips the handle header.
  Previously, the client appended '-next' to the handle when a 409 response lacked
  the electric-handle header, causing handle-next-next-next... accumulation and
  414 URI Too Long errors.

  The fix introduces a random cache-buster query param instead of mutating the
  handle, ensuring unique retry URLs without unbounded growth.

