- id: streaming_nonstreaming_alignment
  weight: 1
  source:
    ref: '## Project Structure Guide > Agents Core Runtime Guidelines'
    commit: 4f1824fa1c63c8f7d84dc1a614a77fbd85fbd298
    path: AGENTS.md
