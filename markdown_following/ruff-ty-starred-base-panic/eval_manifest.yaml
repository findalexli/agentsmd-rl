version: '2.0'
task:
  name: ruff-ty-starred-base-panic
  kind: code_fix
  title: ty panics on starred fixed-length-tuple class bases
  description: 'The per-base lint loop in `check_static_class_definitions` panics with

    `index out of bounds` whenever a starred class base unpacks a

    fixed-length tuple with more than one element. The fix is to iterate

    over `expanded_class_base_entries` (one entry per unpacked element,

    each carrying its own source AST node) instead of indexing into

    `class_node.bases()` by the enumerated position of the expanded list.

    '
source:
  repo: astral-sh/ruff
  pr: 24699
  pr_url: https://github.com/astral-sh/ruff/pull/24699
  base_commit: 65d768e4e2a7133b7bcddc4de3027259b4578d8a
  merge_commit: 742aa29c919198ac133610c5aee97774bcf6dfcb
checks:
- id: test_starred_final_tuple_does_not_panic
  type: fail_to_pass
  origin: pr_diff
  description: '`class X(*(int, bool)): ...` must not panic in the per-base lint loop.

    On base ty exits 101 with `error[panic]`; after the fix it exits 1

    with normal lint diagnostics.

    '
- id: test_starred_final_tuple_emits_subclass_of_final_class
  type: fail_to_pass
  origin: pr_diff
  description: 'With the expanded base list, the `subclass-of-final-class` lint must

    fire on the unpacked `bool` element of `*(int, bool)`.

    '
- id: test_starred_named_tuple_inheritance_no_panic
  type: fail_to_pass
  origin: pr_diff
  description: '`NamedTuple` class with starred bases must not panic and must report

    `invalid-named-tuple` for each unpacked non-Generic base.

    '
- id: test_starred_protocol_inheritance_no_panic
  type: fail_to_pass
  origin: pr_diff
  description: 'Protocol class with starred bases must not panic and must report

    `invalid-protocol` for each unpacked non-protocol base.

    '
- id: test_starred_named_variable_no_panic
  type: fail_to_pass
  origin: pr_diff
  description: 'Starred bases sourced from a named tuple variable (not an inline

    tuple literal) must also be expanded and lint-checked without

    panicking.

    '
- id: test_starred_bare_generic_emits_invalid_base
  type: fail_to_pass
  origin: pr_diff
  description: 'Unpacked plain `Generic` must hit the per-base `invalid-base` arm.

    '
- id: test_plain_subclass_of_final_class_still_reported
  type: pass_to_pass
  origin: repo_tests
  description: 'Non-starred direct inheritance from a `@final` class must still emit

    `subclass-of-final-class` (guards against the fix dropping the

    diagnostic for the simple case).

    '
- id: test_simple_module_typechecks_clean
  type: pass_to_pass
  origin: repo_tests
  description: 'A module without any class-definition issues must still type-check

    cleanly (exit 0, no panic).

    '
- id: test_static_class_crate_compiles
  type: pass_to_pass
  origin: repo_tests
  description: '`cargo build --bin ty` from the repo root must succeed (catches

    malformed fixes such as broken let-chains or missing imports).

    '
