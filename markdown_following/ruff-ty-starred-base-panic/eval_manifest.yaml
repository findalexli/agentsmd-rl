rubric:
- id: tests_must_be_added
  source:
    path: AGENTS.md
    commit: 65d768e4e2a7133b7bcddc4de3027259b4578d8a
  rule: 'AGENTS.md states: "All changes must be tested. If you''re not testing

    your changes, you''re not done." A correct fix should add at least one

    test case (typically an `mdtest` entry under

    `crates/ty_python_semantic/resources/mdtest/`) covering the

    starred-tuple panic. Mark this rule satisfied if the agent''s diff

    adds or updates an mdtest fixture exercising the new behaviour.

    '
- id: prefer_let_chains
  source:
    path: AGENTS.md
    commit: 65d768e4e2a7133b7bcddc4de3027259b4578d8a
  rule: 'AGENTS.md says: "Prefer let chains (`if let` combined with `&&`) over

    nested `if let` statements". The new per-base lint arms touched by

    this fix should keep using let chains rather than re-introducing

    deeply nested `if let` blocks.

    '
- id: avoid_panics
  source:
    path: AGENTS.md
    commit: 65d768e4e2a7133b7bcddc4de3027259b4578d8a
  rule: 'AGENTS.md says: "Try hard to avoid patterns that require `panic!`,

    `unreachable!`, or `.unwrap()`." Since the bug is itself an out-of-

    bounds panic, the fix must not paper over the symptom with a

    `.get(i).unwrap()` or `.unwrap_or_else(|| panic!())`; it should

    structurally guarantee the index is valid (e.g. by iterating a

    structure that already carries the source node).

    '
- id: imports_at_top
  source:
    path: AGENTS.md
    commit: 65d768e4e2a7133b7bcddc4de3027259b4578d8a
  rule: 'AGENTS.md says: "Rust imports should always go at the top of the

    file, never locally in functions." If the fix needs new imports,

    they belong at the top of `static_class.rs`.

    '
- id: comments_purposeful
  source:
    path: AGENTS.md
    commit: 65d768e4e2a7133b7bcddc4de3027259b4578d8a
  rule: 'AGENTS.md says comments should explain *why*, not narrate code. Any

    comments added by the fix should explain the invariant (e.g. why the

    expanded list and the AST list don''t have the same length) rather

    than describing what the next line does.

    '
- id: avoid_significant_new_code
  source:
    path: AGENTS.md
    commit: 65d768e4e2a7133b7bcddc4de3027259b4578d8a
  rule: 'AGENTS.md says: "Avoid writing significant amounts of new code. This

    is often a sign that we''re missing an existing method or mechanism

    that could help solve the problem." A correct fix here reuses the

    existing `expanded_class_base_entries` helper rather than inventing

    a new way to walk the bases.

    '
