  description: An assistant whose array index lands BEFORE the user (clock skew) is still returned for that user.
- id: test_skewed_assistant_with_other_users_present
  type: fail_to_pass
  origin: pr_diff
  description: With a prior turn present, the skewed assistant for the current user is included and prior-turn assistants are excluded.
- id: test_no_user_break_short_circuit
  type: fail_to_pass
  origin: pr_diff
  description: A different user message between the queried user and its own assistants does not short-circuit the lookup.
- id: test_no_skew_normal_order
  type: pass_to_pass
  origin: pr_diff
  description: Regression — the normal case (user first, then its assistants) still returns those assistants.
- id: test_assistants_filtered_by_parentid
  type: pass_to_pass
  origin: pr_diff
  description: Only assistants whose parentID matches the queried user are returned; other users' assistants are excluded.
- id: test_negative_index_returns_empty
