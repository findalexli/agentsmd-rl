config_edits:
- path: AGENTS.md
  tier: 1
  gold_added: "- **Prerelease mode**: An optional `.changes/prerelease.json` file denotes that the package is in prerelease mode. The `channel` field (e.g. alpha, beta, rc) determines the version suffix, while the npm dist-tag is always next. **This is only supported for the `remix` package.** - **Transitioning between prerelease channels** (e.g. alpha -> beta): Update `prerelease.json` channel and add a change file. Version resets to new channel (e.g. 3.0.0-alpha.7 -> 3.0.0-beta.0). The bump type is for changelog categorization only—by convention, use `patch`."
  gold_removed: "- **Prelease mode**: An optional `.changes/prerelease.json` file denotes that the package is in prerelease mode and what the npm dist-tag is. **This is only supported for the `remix` package.** - **Transitioning between prerelease tags** (e.g. alpha -> beta): Update `prerelease.json` tag and add a change file. Version resets to new tag (e.g. 3.0.0-alpha.7 -> 3.0.0-beta.0). The bump type is for changelog categorization only—by convention, use `patch`."
- path: CONTRIBUTING.md
  tier: 2
  gold_added: '"channel": "alpha" The `channel` field determines the version suffix (e.g. alpha, beta, rc), while prereleases are always published to npm with the `next` tag. This is only supported for `remix` because it is the only package that needs to publish prereleases alongside an existing stable version on npm. All other packages in this monorepo are new and publish directly as `latest`. Transitioning between channels (e.g. alpha -> beta): Update `.changes/prerelease.json` to the new channel. Version resets to the new channel (e.g. 3.0.0-alpha.7 -> 3.0.0-beta.0). The bump type is for changelog categorization only—by convention, use `patch`.'
  gold_removed: '"tag": "alpha" This is only supported for `remix` because it is the only package that needs to publish prereleases alongside an existing stable version on npm. All other packages in this monorepo are new and publish directly as `latest`. Transitioning between tags (e.g. alpha -> beta): Update `.changes/prerelease.json` to the new tag. Version resets to the new tag (e.g. 3.0.0-alpha.7 -> 3.0.0-beta.0). The bump type is for changelog categorization only—by convention, use `patch`.'
distractors:
- rule: 'Prelease mode: An optional `.changes/prerelease.json` file denotes that the
    package is in prerelease mode and what the npm dist-tag is.'
  collision_type: meta_confusion
  why_distracting: The config file explicitly states the old behavior (that prerelease.json
    denotes what the npm dist-tag is). The agent must recognize that it needs to modify
    this very rule to reflect the new behavior (dist-tag is always 'next'), rather
    than treating the config file as an immutable source of truth.
  severity: high
  source:
    path: AGENTS.md
    lines: 51-52
- rule: 'Adding changes: Create `packages/*/.changes/[major|minor|patch].short-description.md`
    files.'
  collision_type: scope_ambiguity
  why_distracting: The
