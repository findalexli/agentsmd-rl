distractors:
- rule: If you are changing Next.js source or integration tests, start `pnpm --filter=next
    dev` in a separate terminal session before making edits
  collision_type: would_cause_bug
  why_distracting: The rule instructs the agent to start the dev server before making
    edits. However, the bug description explicitly states that running `next dev`
    with the given reproduction causes an infinite loop and hangs. Following this
    rule would cause the agent's workspace to hang.
  severity: high
  source:
    path: CLAUDE.md
    lines: 66-68
- rule: prefer `pnpm --filter=next build` when edits are limited to core Next.js files
  collision_type: architecture_boundary
  why_distracting: The rule suggests using `pnpm --filter=next build` for core Next.js
    files. An agent might mistakenly apply this to Turbopack, but this command only
    builds the JS packages, not the Rust binaries, leading to uncompiled changes and
    confusion during testing.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 88-89
hierarchy_analysis: The hierarchy is flat (Level 0 only) with identical symlinked
  files (`AGENTS.md` and `CLAUDE.md`). The rules are globally applied but are heavily
  biased towards the TypeScript/JS parts of the monorepo, requiring the agent to discern
  architecture boundaries when working in the Rust (`turbopack/crates/`) subsystem.
version: '2.0'
