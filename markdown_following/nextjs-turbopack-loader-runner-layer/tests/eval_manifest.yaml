    was updated to webpack_loaders.
  source:
    path: AGENTS.md
  reference: 'Note: turbopack_use_loaders is now webpack_loaders.'
- rule: turbopack/ - Turbopack bundler (Rust) - git subtree
  source:
    path: AGENTS.md
    lines: 14-15
  evidence: The gold solution correctly targets the Rust implementation in turbopack/
    to fix the bundler issue, aligning with the documented architectural boundaries.
  category: architecture
