distractors:
- rule: Implement corresponding MCP tool for CLI commands
  source:
    path: .claude/skills/playwright-mcp-dev/SKILL.md
    lines: 24-24
  source_text: '- CLI commands are based on MCP tools. Implement the corresponding
    MCP tool as per `Adding MCP Tools` section above, if needed.'
  collision_type: architecture_boundary
  why_distracting: An agent reading this might mistakenly try to create an underlying
    MCP browser tool for 'kill-all'. However, 'kill-all' interacts directly with OS
    processes (using execSync) and does not map to a browser-level capability, so
    it correctly leaves toolName as '' and avoids implementing an MCP tool.
  severity: high
- rule: Create and register MCP Tool
  source:
    path: .claude/skills/playwright-mcp-dev/SKILL.md
    lines: 8-12
  source_text: '## Adding MCP Tools

    - Create a new tool in `packages/playwright/src/mcp/browser/tools/your-tool.ts`

    - Register the tool in `packages/playwright/src/mcp/browser/tools.ts`

    - Add ToolCapability in `packages/playwright/src/mcp/config.d.ts`

    - Place new tests in `tests/mcp/mcp-<category>.spec.ts`'
  collision_type: scope_ambiguity
  why_distracting: This applies to browser interaction tools, but the 'kill-all' command
    is a pure daemon session management feature that belongs only to the terminal
    UI layer, making these instructions distracting and irrelevant to the current
    task.
  severity: medium
