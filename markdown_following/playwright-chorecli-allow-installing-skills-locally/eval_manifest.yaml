distractors:
- rule: Implement corresponding MCP tool for new CLI commands
  source:
    path: .claude/skills/playwright-mcp-dev/SKILL.md
    lines: '24'
  source_text: '- CLI commands are based on MCP tools. Implement the corresponding MCP tool as per `Adding MCP Tools` section above, if needed.'
  collision_type: architecture_boundary
  why_distracting: The new install-skills command is a local workspace configuration tool, not a browser feature. Creating a browser MCP tool for it would inappropriately expose local file system operations to the browser context.
  severity: high
- rule: Update the playwright-cli SKILL.md file
  source:
    path: .claude/skills/playwright-mcp-dev/SKILL.md
    lines: 29-30
  source_text: "- Update skill file at `packages/playwright/src/skill/SKILL.md` and references if necessary\n  in `packages/playwright/src/skill/references/`"
  collision_type: meta_confusion
  why_distracting: The install-skills command is an internal meta-command for installing skills locally. Documenting it in the main browser automation SKILL.md would pollute the context of the browser agent with irrelevant setup commands.
  severity: medium
- rule: Add new CLI category for tool if needed
  source:
    path: .claude/skills/playwright-mcp-dev/SKILL.md
    lines: 25-27
  source_text: "- Add new CLI category for tool if needed:\n  - Add Category in `packages/playwright/src/mcp/terminal/command.ts`\n  - Update doc generator `packages/playwright/src/mcp/terminal/helpGenerator.ts`"
  collision_type: scope_ambiguity
