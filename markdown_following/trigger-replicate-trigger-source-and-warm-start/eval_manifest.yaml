rubric:
- rule: ClickHouse migrations MUST use Goose format with explicit `-- +goose Up` and `-- +goose Down` sections, per the ClickHouse package's CLAUDE.md guidance. Both directions must be provided so the migration can be rolled back.
  source:
    path: internal-packages/clickhouse/CLAUDE.md
    lines: ''
    commit: efcafdf388344487681ea388ed6fcfd4e953aa98
  evidence: Gold patch creates migration 028_*.sql with both -- +goose Up and -- +goose Down sections.
  category: style
  verification: semantic_diff
- rule: New Goose-format ClickHouse migrations live under `internal-packages/clickhouse/schema/` and follow the existing `NNN_description.sql` naming convention (e.g. `028_*`).
  source:
    path: internal-packages/clickhouse/CLAUDE.md
    lines: ''
    commit: efcafdf388344487681ea388ed6fcfd4e953aa98
  evidence: Gold patch names the migration 028_add_trigger_source_and_warm_start_to_task_runs_v2.sql.
  category: naming
  verification: semantic_diff
- rule: Schema changes to Postgres MUST come with a corresponding Prisma migration (a directory under `internal-packages/database/prisma/migrations/` containing `migration.sql`). Editing only `schema.prisma` is not sufficient.
  source:
    path: internal-packages/database/CLAUDE.md
    lines: ''
    commit: efcafdf388344487681ea388ed6fcfd4e953aa98
  evidence: Gold patch includes a Prisma migration directory with migration.sql.
  category: style
  verification: semantic_diff
- rule: '"No default exports, use function declarations." New TypeScript code in this repo must not introduce `export default` and should prefer named exports / function declarations.'
  source:
    path: .github/copilot-instructions.md
    lines: ''
    commit: efcafdf388344487681ea388ed6fcfd4e953aa98
  evidence: New code in the patch uses named exports and function declarations, not export default.
  category: style
  verification: semantic_diff
- rule: Validation should use Zod schemas (which are heavily used in `packages/core` and the webapp). Parsing untyped input from Postgres `Json?` fields like `annotations` should go through a Zod schema rather than ad-hoc property access.
  source:
    path: .cursor/rules/webapp.mdc
    lines: ''
    commit: efcafdf388344487681ea388ed6fcfd4e953aa98
  evidence: Gold patch uses RunAnnotations.safeParse() via Zod to parse annotations JSON.
  category: style
  verification: semantic_diff
- rule: '"When importing from `@trigger.dev/core` in the webapp, we never import the root `@trigger.dev/core` path, instead we favor one of the subpath exports". New imports must continue to use a subpath (e.g. `@trigger.dev/core/v3`).'
  source:
    path: .cursor/rules/webapp.mdc
    lines: ''
    commit: efcafdf388344487681ea388ed6fcfd4e953aa98
  evidence: Gold patch imports RunAnnotations from @trigger.dev/core/v3 subpath.
  category: naming
  verification: semantic_diff
- rule: The `TASK_RUN_COLUMNS` array, the `TaskRunV2` Zod schema, the `TaskRunFieldTypes` mapping, and the `TaskRunInsertArray` positional tuple type must all be kept in lockstep — additions to one require additions to the others, in the same order. The file's own comment ("Column order for compact format - must match ClickHouse table schema") makes this explicit.
  source:
    path: internal-packages/clickhouse/src/taskRuns.ts
    lines: ''
    commit: efcafdf388344487681ea388ed6fcfd4e953aa98
  evidence: Gold patch extends all four structures with three new fields in matching order.
  category: architecture
  verification: semantic_diff
