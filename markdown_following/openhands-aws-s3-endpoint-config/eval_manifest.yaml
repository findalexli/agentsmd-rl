distractors:
- rule: Store design documents, debugging notes, or temporary artifacts in a `.pr/` directory.
  collision_type: scope_ambiguity
  why_distracting: The agent might interpret this bug fix as a 'debugging session' or 'complex refactoring' and create a `.pr/analysis.md` or `.pr/design.md` file to document the S3 endpoint logic. This is unnecessary for a straightforward, well-specified bug fix and wastes effort.
  severity: low
  source:
    path: AGENTS.md
    lines: 38-45
- rule: Run `make build` to set up the entire repo including frontend and backend.
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to run `make build` to set up the repository before making changes, which is time-consuming and explicitly discouraged unless requested by the user.
  severity: low
  source:
    path: AGENTS.md
    lines: 6-8
- rule: Use cross-repo-testing skill when deploying a feature branch to staging or testing cross-repo features.
  source:
    path: .agents/skills/cross-repo-testing/SKILL.md
    lines: 1-3
  collision_type: scope_ambiguity
  why_distracting: The issue mentions 'custom S3/Minio endpoint URLs for feature branches'. An agent might mistakenly activate this skill to 'deploy a feature branch to staging' or perform cross-repo testing, but this task only requires a local code fix in the backend.
  severity: medium
