rubric:
- rule: In edge builds, force feature flags that gate Node-only imports to false in define-env.ts.
  source:
    path: AGENTS.md
    lines: '405'
    commit: 15d9b4d7f923e637d1661b109df639a918f59c8a
- rule: Use if/else (not two independent if blocks) when assigning a variable conditionally on process.env.X. TypeScript cannot prove exhaustiveness across if (flag) { x = a }; if (!flag) { x = b } and will error with 'variable used before being assigned'. The if/else pattern satisfies both TypeScript (definite assignment) and webpack DCE.
  source:
    path: .agents/skills/dce-edge/SKILL.md
    lines: '38'
    commit: 15d9b4d7f923e637d1661b109df639a918f59c8a
