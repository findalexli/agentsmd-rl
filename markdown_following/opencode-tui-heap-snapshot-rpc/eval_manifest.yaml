distractors:
- rule: Use Effect.gen(function* () { ... }) for composition.
  collision_type: scope_ambiguity
  why_distracting: The TUI RPC worker and thread use standard async/await and Promises. Trying to effectify the new `snapshot` method using `Effect.gen` would break the existing RPC interface or require unnecessary refactoring.
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: 14-15
- rule: Prefer FileSystem.FileSystem instead of raw fs/promises for effectful file I/O.
  collision_type: architecture_boundary
  why_distracting: The agent might try to use Effect's FileSystem to handle the file writing, but `writeHeapSnapshot` from `node:v8` is a native API that writes directly to disk and only accepts a string path. Wrapping it in FileSystem is unnecessary and architecturally incorrect.
  severity: medium
  source:
    path: packages/opencode/AGENTS.md
    lines: 38-39
hierarchy_analysis: The project has a root `AGENTS.md` and a package-specific `packages/opencode/AGENTS.md`. The package-specific config introduces strict Effect rules. The agent must realize that despite being in the `opencode` package, the specific TUI RPC code being edited uses standard Promises, so the Effect rules should be ignored for this specific scope.
