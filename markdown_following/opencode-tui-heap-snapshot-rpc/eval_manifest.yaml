rubric:
- rule: Config update follows the structure and style of existing .opencode command files
  source:
    path: .opencode/command/changelog.md
    lines: 1-5
    commit: 1398674e531acc845e062b219f718cac1cd89a44
- rule: Avoid unnecessary destructuring. Use dot notation to preserve context.
  source:
    path: AGENTS.md
    lines: 60-67
  evidence: In `packages/opencode/src/cli/cmd/tui/app.tsx`, the `App` component is updated to accept a `props` object and accesses `props.onSnapshot` using dot notation rather than destructuring the props.
  category: style
- rule: Prefer single word names for variables and functions.
  source:
    path: AGENTS.md
    lines: 26-44
  evidence: In `packages/opencode/src/cli/cmd/tui/thread.ts`, the variables storing the snapshot file paths are named `tui` and `server` instead of multi-word names like `tuiSnapshotPath` or `serverPath`.
  category: naming
- rule: Prefer single word variable names where possible. Use single word names by default for new locals, params, and helper functions.
  source:
    path: AGENTS.md
    lines: 18-32
  evidence: The gold solution uses single-word variable names like `tui`, `server`, `result`, and `files` instead of multi-word names like `tuiSnapshotPath` or `snapshotFiles`.
  category: naming
- rule: Prefer `const` over `let`.
  source:
    path: AGENTS.md
    lines: 74-82
  evidence: In `thread.ts` and `worker.ts`, the gold solution uses `const` for all new variables (`tui`, `server`, `result`, `files`).
  category: style
