distractors:
- rule: '- Use keyword-only arguments for new parameters: `*, new_param: str = "default"`'
  source:
    path: CLAUDE.md
    lines: '111'
    commit: 050b779d97d4c72dfea1c46bfc12b1049be3ab63
  collision_type: rule_conflict
  why_distracting: This rule applies to function parameters, but `dimensions` is a Pydantic model field — agents may incorrectly try to use keyword-only syntax in the class definition.
  severity: medium
- rule: 'CRITICAL: Always attempt to preserve function signatures, argument positions, and names for exported/public methods. Do not make breaking changes.'
  source:
    path: CLAUDE.md
    lines: '104'
    commit: 050b779d97d4c72dfea1c46bfc12b1049be3ab63
  collision_type: scope_ambiguity
  why_distracting: Adding a new optional field to a Pydantic model is not a breaking change, but an overly conservative agent might avoid adding it.
  severity: low
