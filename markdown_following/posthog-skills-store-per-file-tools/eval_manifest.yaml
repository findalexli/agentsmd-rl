config_edits:
- path: products/llm_analytics/skills/skills-store/SKILL.md
  tier: 2
  gold_added: 'Available tools table: three new rows for `posthog:skill-file-create`, `posthog:skill-file-delete`, `posthog:skill-file-rename`; `posthog:skill-update` purpose updated to "body, `edits`, or `file_edits`".

    Updating a skill section rewritten into four subsections:

    - Editing the body: full replacement (`body`) and incremental find/replace (`edits`) with worked JSON examples, mutual exclusivity note.

    - Editing one bundled file: `file_edits` payload with worked JSON example, constraint that it cannot add/remove/rename files.

    - Adding, removing, or renaming a file: atomic per-file CRUD tools with three worked JSON examples and version-chaining note.

    - Replacing the whole bundle (rare): `files` replace-all reframed as opt-in for intentional bundle wipes.

    Bridge skill `allowed-tools` line updated to include `mcp__posthog__skill-file-create`, `mcp__posthog__skill-file-delete`, `mcp__posthog__skill-file-rename`. New "Edit one part of an existing skill" section appended to bridge body with surgical-primitive routing hints.

    '
  gold_removed: 'Original `posthog:skill-update` purpose blurb ("Publish a new version (with `base_version` for concurrency)").

    Original "Updating a skill" section: "Each `skill-update` publishes a new immutable version..." changed to "Each write publishes a new immutable version...". Legacy paragraph "Publish a new version. Fields you don''t provide are carried forward... If you pass `files`, they replace the previous version''s file set; if you omit `files`, they''re carried forward" replaced with surgical-primitive framing.

    Old bridge `allowed-tools` line without the three new MCP tools.

    '
