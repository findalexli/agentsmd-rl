distractors:
- rule: The codebase is migrating to async
  collision_type: rule_conflict
  why_distracting: The agent might try to change the properties to async methods (e.g.,
    `GetNetworkAsync()`) or use an async lazy initialization pattern, which would
    break the public API and violate the explicit instruction to use standard `Lazy<T>`.
  severity: high
  source:
    path: dotnet/AGENTS.md
    lines: 25-26
- rule: Comments should explain *why*, not *what* - prefer well-named methods over
    comments
  collision_type: scope_ambiguity
  why_distracting: The agent might delete the existing XML documentation comments
    on the properties (e.g., `/// Gets the object used for manipulating network information...`)
    because they describe 'what' the property does rather than 'why', but doing so
    would violate documentation standards and create unnecessary diffs.
  severity: medium
  source:
    path: AGENTS.md
    lines: 63-64
hierarchy_analysis: The hierarchy is moderate (root `AGENTS.md` -> `dotnet/AGENTS.md`).
  The root file emphasizes API compatibility and small diffs, while the .NET specific
  file mentions migrating to async. The root rule 'Maintain API/ABI compatibility'
  must override the .NET rule 'migrating to async' to prevent breaking the public
  properties.
