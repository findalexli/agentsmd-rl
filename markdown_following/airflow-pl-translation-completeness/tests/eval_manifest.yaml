version: "2.0"

task:
  name: airflow-pl-translation-completeness
  kind: code_with_config
  source:
    repo: apache/airflow
    pr: 65272
    base_commit: 01c404679384d3ca654e44e7243266f508921aac
    merge_commit: dba43f3bf4531bdb01106d7f2318ea6ed79f95fb

description: >
  Backports the Polish translation completeness work from main to v3-2-test:
  fills 17 missing PL translation keys, removes 3 unused dagWarnings plural
  entries, applies the new "grupowy"/"Deaktywowany" terminology to existing
  toaster strings, and adds a Terminology Glossary section to the locale
  guideline (.github/skills/airflow-translations/locales/pl.md).

