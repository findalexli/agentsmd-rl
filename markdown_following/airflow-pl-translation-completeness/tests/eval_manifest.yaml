config_edits:
  - file: .github/skills/airflow-translations/locales/pl.md
    description: >
      Adds a "## Terminology Glossary" section with three preferred-term
      entries and notes about declension/gender agreement. The agent's
      diff will be compared semantically to the gold diff.
    gold_diff: |
      +## Terminology Glossary
      +
      +Preferred wording for specific UI terms. Apply these to new translations and
      +prefer them when reviewing existing ones.
      +
      +| English / context | Preferred Polish | Avoid |
      +|---|---|---|
      +| Consuming Asset (asset consumed by a Dag run) | **Zabierający zasób** | ~~Konsumujący zasób~~ |
      +| Bulk clear / delete / update (toaster and button labels) | **grupowy / grupowego / grupowej / grupowe …** | ~~masowy / masowego / masowej / masowe~~ |
      +| Deactivated (Dag header status) | **Deaktywowany** / Deaktywowana / Deaktywowane | ~~Dezaktywowany~~ |
      +
      +Notes:
      +
      +- For "bulk <verb>" always use "grupowy" with the grammatical form that
      +  matches the noun — e.g. "żądanie grupowego wyczyszczenia", "żądanie
      +  grupowej aktualizacji". Never use "masowy".
      +- "Deactivated" / "Deaktywowany" must agree in gender with the noun it
      +  describes (e.g. neuter "zadanie" → "Deaktywowane").

rubric:
  - id: glossary_consuming_asset
    description: >
      The new pl.md glossary specifies that "Consuming Asset" should be
      translated as "Zabierający zasób", NOT "Konsumujący zasób".
      Any place in the agent's PL translations that translates "consuming"
      in this context must follow this rule.
    weight: 1
    source:
      file: .github/skills/airflow-translations/locales/pl.md
      commit: dba43f3bf4531bdb01106d7f2318ea6ed79f95fb
      anchor: "Consuming Asset"

  - id: glossary_bulk_grupowy
    description: >
      The new pl.md glossary mandates "grupowy" (with appropriate
      grammatical form: grupowego/grupowej/grupowe…) for "bulk
      clear/delete/update" toaster and button labels — never "masowy".
      All bulk-action PL strings must follow this.
    weight: 2
    source:
      file: .github/skills/airflow-translations/locales/pl.md
      commit: dba43f3bf4531bdb01106d7f2318ea6ed79f95fb
      anchor: "Bulk clear / delete / update"

  - id: glossary_deactivated_deaktywowany
    description: >
      The new pl.md glossary mandates "Deaktywowany / Deaktywowana /
      Deaktywowane" (with gender agreement) for "Deactivated" — never
      "Dezaktywowany".
    weight: 1
    source:
      file: .github/skills/airflow-translations/locales/pl.md
      commit: dba43f3bf4531bdb01106d7f2318ea6ed79f95fb
      anchor: "Deactivated (Dag header status)"

  - id: skill_consistency_with_existing_terminology
    description: >
      Per .github/skills/airflow-translations/SKILL.md "Updating an Existing
      Translation": when translating, the agent must reuse established
      Polish terminology found in existing locale files. New translations
      should be consistent with words like "zasób" (asset), "wykonanie"
      (run), "Dag" (kept in English), etc., already present in pl/.
    weight: 1
    source:
      file: .github/skills/airflow-translations/SKILL.md
      commit: dba43f3bf4531bdb01106d7f2318ea6ed79f95fb
      anchor: "Updating an Existing Translation"

  - id: pl_md_diacritics_preserved
    description: >
      pl.md emphasizes that Polish diacritics (ą, ć, ę, ł, ń, ó, ś, ź, ż)
      must be preserved. Any new translations the agent adds must use
      proper diacritics (not ASCII transliterations).
    weight: 1
    source:
      file: .github/skills/airflow-translations/locales/pl.md
      commit: dba43f3bf4531bdb01106d7f2318ea6ed79f95fb
      anchor: "Diacritics"

  - id: pl_md_placeholders_preserved
    description: >
      Per pl.md "Variables and Placeholders" section, all `{{variable}}`
      placeholders must be preserved verbatim — variable names must not be
      translated. New translations with placeholders (e.g.
      tokenGeneration.tokenExpiresIn with {{duration}}) must keep them.
    weight: 1
    source:
      file: .github/skills/airflow-translations/locales/pl.md
      commit: dba43f3bf4531bdb01106d7f2318ea6ed79f95fb
      anchor: "Variable and Placeholder Examples"

  - id: skill_keep_alphabetical_ordering
    description: >
      Per SKILL.md, configuration files should keep existing alphabetical
      ordering. New keys added to JSON locale files should be placed in
      alphabetical positions consistent with the existing structure.
    weight: 1
    source:
      file: .github/skills/airflow-translations/SKILL.md
      commit: dba43f3bf4531bdb01106d7f2318ea6ed79f95fb
      anchor: "Setting up the locale"
