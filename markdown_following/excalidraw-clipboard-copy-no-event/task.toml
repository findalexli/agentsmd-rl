name = "excalidraw-clipboard-copy-no-event"
version = "1.0.0"
  source_pr = "https://github.com/excalidraw/excalidraw/pull/10729"
  source_base_commit = "d29fd62e417b8cb73d1d5dc3e207735046401491"
  source_merge_commit = "54a98268177c19cee7a49d05ce56e64f7a424db1"
description = "Fix clipboard copying when no ClipboardEvent is provided"
category = "code-repair"
difficulty = "medium"
tags = ["typescript", "clipboard", "bugfix", "control-flow"]

[requirements]
  cpu = 1
  memory = "2Gi"
  storage = "1Gi"

[time]
  # Agent timeout in seconds (30 minutes)
  agent = 1800
  # Verifier timeout in seconds (2 minutes)
  verifier = 120

[repository]
  owner = "excalidraw"
  name = "excalidraw"
  type = "git"
  url = "https://github.com/excalidraw/excalidraw.git"

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
