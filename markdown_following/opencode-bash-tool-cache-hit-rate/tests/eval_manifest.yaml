rubric:
- rule: Update AGENTS.md to document that tool descriptions should not use project-specific
    paths like ${directory} to ensure prompt caching works correctly.
  source:
    path: AGENTS.md
  reference: Do not inject project-specific paths like ${directory} into tool descriptions,
    as this breaks LLM prompt caching. Use static text (e.g., 'current working directory')
    instead.
- rule: Reduce total variable count by inlining when a value is only used once.
  source:
    path: AGENTS.md
    lines: 42-51
  evidence: The gold solution modifies the `description` property in `bash.ts` by
    chaining `.replaceAll` calls directly on the `DESCRIPTION` constant, keeping the
    value inlined rather than extracting the modified
  category: style
distractors:
- rule: Use `InstanceState` (from `src/effect/instance-state.ts`) for per-directory
    or per-project state that needs per-instance cleanup.
  collision_type: would_cause_bug
  why_distracting: The prompt mentions that `Instance.directory` is causing issues
    because it makes the tool description project-specific. An agent might misinterpret
    this as a state management issue and try to wrap the tool description or the bash
    tool itself in `InstanceState` to handle per-directory scoping, which completely
    misses the goal of making the string globally cacheable.
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: 23-28
- rule: Reduce total variable count by inlining when a value is only used once.
  collision_type: architecture_boundary
  why_distracting: The agent might take the 'inlining' rule too far and attempt to
    inline the entire contents of `bash.txt` directly into `bash.ts` to eliminate
    the `DESCRIPTION` variable entirely, violating the project's architecture of keeping
    prompt templates in separate text files.
  severity: medium
  source:
    path: AGENTS.md
    lines: 46-55
hierarchy_analysis: The hierarchy consists of a root `AGENTS.md` and a package-specific
  `packages/opencode/AGENTS.md`. The package-specific config introduces complex Effect-based
  state management rules (`InstanceState`) that act as a strong distractor for a problem
  that actually requires a simple string manipulation to fix an LLM caching issue.
