rubric:
- id: changelog_emoji_present
  source:
    lines: 104-150
    commit: 62135b4b76d5a85b662d9f8b1fb57fcbbe4795d6
    path: CLAUDE.md
  rule: If the agent edits CHANGELOG.zh-CN.md or CHANGELOG.en-US.md, each entry starts with a single emoji (per CLAUDE.md "Emoji 规范"). This PR is a docs-only change; per CLAUDE.md "忽略用户无感知的改动... 描述对开发者的影响" a changelog entry may legitimately be omitted, so this only applies if the agent chose to add one.
- id: api_alphabetical_order
  source:
    lines: 45-46
    commit: 62135b4b76d5a85b662d9f8b1fb57fcbbe4795d6
    path: CLAUDE.md
  rule: '"API 按字母顺序排列，新增属性需声明版本号" — newly added rows in the Button API table (notably `loadingIcon`) must be inserted in alphabetical order relative to neighboring props.'
- id: bilingual_doc_parity
  source:
    lines: 20-24
    commit: 62135b4b76d5a85b662d9f8b1fb57fcbbe4795d6
    path: CLAUDE.md
  rule: Per CLAUDE.md project structure, `index.en-US.md` and `index.zh-CN.md` are sibling docs that should be updated together with parallel content. Any structural change to one (new column, new row) should land in both.
- id: anchor_link_correctness
  source:
    lines: 50-53
    commit: 62135b4b76d5a85b662d9f8b1fb57fcbbe4795d6
    path: CLAUDE.md
  rule: Anchor IDs must match `^[a-zA-Z][\w-:\.]*$` and link targets must point to real anchors. The new column header link must use `#component-config` (the ConfigProvider page's anchor) and the ConfigProvider→Button reference must use `#api`.
