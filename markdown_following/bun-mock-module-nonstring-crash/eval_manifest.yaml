rubric:
- rule: Since this task is a pure code fix, the agent is EXPECTED to leave config
    files untouched. The correct behavior is 'nothing — file not modified'
- rule: For this pure code fix task, since the gold solution correctly placed the
    test in `test/js/bun/test/mock/` following CLAUDE.md lines 31-32,
  source:
    path: CLAUDE.md
    lines: 31-32
  evidence: The gold solution creates the test file in `test/js/bun/test/mock/mock-module-non-string.test.ts`,
    correctly identifying it as a Bun-specific API test.
  category: testing
distractors:
- rule: Always use `bun.*` APIs instead of `std.*`.
  collision_type: architecture_boundary
  why_distracting: The rule dictates using `bun.*` APIs instead of `std.*` for Zig
    code, but the fix requires editing C++ code (`BunPlugin.cpp`). An agent might
    get confused and try to apply Zig conventions to C++ or incorrectly search for
    a Zig file to edit.
  severity: medium
  source:
    path: src/CLAUDE.md
    lines: 14-15
- rule: For single-file tests, prefer `-e` over `tempDir`.
  collision_type: scope_ambiguity
  why_distracting: The rule suggests using `Bun.spawn` with `-e` for single-file tests.
    However, for testing `mock.module` (which is part of `bun:test`), a standard unit
    test using `expect().toThrow()` is much cleaner and more appropriate than spawning
    a subprocess.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 49-50
hierarchy_analysis: The hierarchy includes root-level configs and `src/`-level configs.
  The `src/` level configs are entirely focused on Zig conventions, which are irrelevant
  for this C++ fix. The agent must recognize that the `src/` configs do not apply
  to `.cpp` files despite being in the same directory tree.
