source:
  repo: langchain-ai/langchain
  pr_number: 36462
  base_commit: e89afedfecad9b49bae977130f28995b064dd0a2
  merge_commit: d1529dd0bcd3a95bbfcd784eb8f11b3afb70f922
  target_file: libs/core/langchain_core/messages/utils.py
  task_name: langchain-filter-messages-docstring-fix

checks:
  - id: test_docstring_example_runs
    type: fail_to_pass
    origin: task_tests
    description: Docstring example for filter_messages executes without TypeError

  - id: test_docstring_example_with_correct_params_runs
    type: pass_to_pass
    origin: task_tests
    description: Docstring example code with correct params executes without TypeError

  - id: test_old_params_cause_typeerror
    type: fail_to_pass
    origin: task_tests
    description: Old parameter names cause TypeError (verifies bug exists)

  - id: test_ruff_check
    type: pass_to_pass
    origin: repo_tests
    description: Ruff linter passes on modified file

  - id: test_syntax_valid
    type: pass_to_pass
    origin: task_tests
    description: Modified file has valid Python syntax

  - id: test_repo_filter_messages_unit
    type: pass_to_pass
    origin: repo_tests
    description: Repo unit tests for filter_messages function pass

  - id: test_repo_messages_utils_unit
    type: pass_to_pass
    origin: repo_tests
    description: Repo unit tests for messages utils module pass

  - id: test_repo_messages_imports
    type: pass_to_pass
    origin: repo_tests
    description: Repo unit tests for messages imports pass

rubric:
  - id: docstring_single_backticks
    description: Docstrings use single backticks for inline code references
    source: CLAUDE.md#Documentation standards

  - id: google_style_docstrings
    description: Use Google-style docstrings with Args section for public functions
    source: CLAUDE.md#Documentation standards

  - id: test_coverage
    description: Bugfix should have test coverage (the fix should be verifiable)
    source: CLAUDE.md#Testing requirements
