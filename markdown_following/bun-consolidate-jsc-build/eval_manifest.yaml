version: "2.0"

source:
  repo: "oven-sh/bun"
  pr: 28863
  base_commit: "a14a89ca953910e89697895dfdfb4cdf4c90a151"

# Track 1: Hard tests (binary pass/fail via test.sh)
checks:
  # Pass-to-pass: file existence
  - id: setup_webkit_cmake_exists
    type: pass_to_pass
    origin: static
    description: "cmake/tools/SetupWebKit.cmake exists and references WEBKIT_LOCAL"

  - id: build_bun_cmake_exists
    type: pass_to_pass
    origin: static
    description: "cmake/targets/BuildBun.cmake exists and references WEBKIT_LIB_PATH"

  - id: contributing_docs_exist
    type: pass_to_pass
    origin: static
    description: "CONTRIBUTING.md and docs/project/contributing.mdx exist"

  # Fail-to-pass: cmake behavior changes
  - id: setup_webkit_build_type_option
    type: fail_to_pass
    origin: pr_diff
    description: "SetupWebKit.cmake defines WEBKIT_BUILD_TYPE option for independent JSC build type"

  - id: setup_webkit_auto_configures_jsc
    type: fail_to_pass
    origin: pr_diff
    description: "SetupWebKit.cmake auto-configures JSC via execute_process when WEBKIT_LOCAL is set"

  - id: setup_webkit_jsc_build_target
    type: fail_to_pass
    origin: pr_diff
    description: "SetupWebKit.cmake creates a jsc build target via add_custom_target"

  - id: setup_webkit_no_vcpkg
    type: fail_to_pass
    origin: pr_diff
    description: "SetupWebKit.cmake no longer uses vcpkg for ICU (builds from source on Windows)"

  - id: buildbun_jsc_build_dependency
    type: fail_to_pass
    origin: pr_diff
    description: "BuildBun.cmake adds build dependency to ensure JSC is built before Bun"

  - id: buildbun_system_icu_for_local
    type: fail_to_pass
    origin: pr_diff
    description: "BuildBun.cmake uses find_package(ICU) for local builds on Linux"

  - id: contributing_no_manual_jsc_build
    type: fail_to_pass
    origin: pr_diff
    description: "CONTRIBUTING.md removes old multi-step manual JSC build commands and fixes typo"

  - id: contributing_mdx_no_manual_jsc_build
    type: fail_to_pass
    origin: pr_diff
    description: "docs/project/contributing.mdx removes old manual commands and fixes typo"

# Track 3: Positive rubric
rubric:
  - rule: "Local WebKit builds should auto-configure JSC instead of requiring manual steps"
    source:
      path: "cmake/tools/SetupWebKit.cmake"
      lines: "1-50"
      commit: "a14a89ca953910e89697895dfdfb4cdf4c90a151"
    evidence: "Gold adds execute_process to invoke cmake on WebKit source and add_custom_target(jsc) for automatic building"
    category: build_system
    verification: programmatic

  - rule: "Build type for JSC should be independently configurable"
    source:
      path: "cmake/tools/SetupWebKit.cmake"
      lines: "1-10"
      commit: "a14a89ca953910e89697895dfdfb4cdf4c90a151"
    evidence: "Gold adds option(WEBKIT_BUILD_TYPE) that defaults to CMAKE_BUILD_TYPE"
    category: build_system
    verification: programmatic

  - rule: "Windows ICU should be built from source rather than depending on vcpkg"
    source:
      path: "cmake/tools/SetupWebKit.cmake"
      lines: "30-70"
      commit: "a14a89ca953910e89697895dfdfb4cdf4c90a151"
    evidence: "Gold removes vcpkg detection and adds ICU build from WebKit source tree"
    category: build_system
    verification: programmatic

  - rule: "Local builds on Linux should use system ICU via find_package"
    source:
      path: "cmake/targets/BuildBun.cmake"
      lines: "1320-1340"
      commit: "a14a89ca953910e89697895dfdfb4cdf4c90a151"
    evidence: "Gold adds find_package(ICU REQUIRED COMPONENTS data i18n uc) for WEBKIT_LOCAL on Linux"
    category: build_system
    verification: programmatic

  - rule: "Contributing docs should describe simplified build process"
    source:
      path: "CONTRIBUTING.md"
      lines: "250-290"
      commit: "a14a89ca953910e89697895dfdfb4cdf4c90a151"
    evidence: "Gold simplifies multi-step instructions to single bun run build:local command"
    category: documentation
    verification: llm_judge

# Track 4: Distractors
distractors:
  - rule: "All build output should go to vendor/ directories for consistency"
    source:
      path: "CONTRIBUTING.md"
      lines: "250-270"
      commit: "a14a89ca953910e89697895dfdfb4cdf4c90a151"
    collision_type: architecture_boundary
    why_distracting: "The build uses vendor/WebKit as source but outputs to build/<profile>/deps/WebKit/"
    severity: medium

  - rule: "External dependencies should be pre-installed, not built from source during cmake configure"
    source:
      path: "cmake/tools/SetupWebKit.cmake"
      lines: "30-70"
      commit: "a14a89ca953910e89697895dfdfb4cdf4c90a151"
    collision_type: rule_conflict
    why_distracting: "Gold builds ICU from source on Windows during cmake configure for self-contained local builds"
    severity: low
