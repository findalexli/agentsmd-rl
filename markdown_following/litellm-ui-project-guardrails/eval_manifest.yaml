rubric:
- id: ui_no_new_tremor_components
  source:
    commit: a292add9bd53a87e919a79aaeae8bbcb542cd033
    lines: 60-62
    path: AGENTS.md
  rule: 'Per AGENTS.md, Tremor is deprecated. Do not introduce new Tremor components in this change; use the existing common components and Ant Design primitives the rest of the form uses.

    '
- id: ui_test_query_priority_order
  source:
    commit: a292add9bd53a87e919a79aaeae8bbcb542cd033
    lines: 67-77
    path: AGENTS.md
  rule: 'Per AGENTS.md, any UI tests added/modified should use query methods in this order: getByRole, getByLabelText, getByPlaceholderText, getByText, getByTestId. Always use `screen` rather than destructuring from render(). Test names start with "should ...".

    '
- id: imports_at_module_top
  source:
    commit: a292add9bd53a87e919a79aaeae8bbcb542cd033
    lines: 76-77
    path: CLAUDE.md
  rule: 'Per CLAUDE.md, place all imports at the top of the file (module-level). Avoid imports inside function bodies except when strictly required to break circular imports.

    '
- id: ui_backend_contract_match
  source:
    commit: a292add9bd53a87e919a79aaeae8bbcb542cd033
    lines: 92-94
    path: CLAUDE.md
  rule: 'Per CLAUDE.md "UI / Backend Consistency" and AGENTS.md "Common Pitfalls": when wiring a UI control to an existing backend endpoint, match the API contract (single value vs. array, required vs. optional). Here the backend takes a top-level `guardrails: string[]`, so the UI must use a multi-select that produces a top-level array, not a nested metadata field.

    '
- id: existing_tests_must_remain_passing
  source:
    commit: a292add9bd53a87e919a79aaeae8bbcb542cd033
    lines: 78-83
    path: CLAUDE.md
  rule: 'Per CLAUDE.md and AGENTS.md, when modifying UI components that have existing tests, those tests must continue to pass after the change.

    '
