version = "1.0"

[metadata]
author_name = "Alex Li"
author_email = "alex@example.com"
difficulty = "easy"
category = "feature"
tags = ["angular", "agent-config", "symlink"]
expert_time_estimate_min = 5.0
junior_time_estimate_min = 15.0
source_repo = "angular/angular"
source_pr = 67018

[verifier]
env = { LLM_JUDGE = "${LLM_JUDGE:-0}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}", GEMINI_API_KEY = "${GEMINI_API_KEY:-}" }
timeout_sec = 120.0

[agent]
timeout_sec = 1800.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 4096
storage_mb = 10240
allow_internet = true
