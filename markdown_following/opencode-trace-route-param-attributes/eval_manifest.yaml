checks:
- id: test_method_and_path_basic
  type: fail_to_pass
  origin: pr_diff
  description: requestAttributes returns http.method and http.path for a simple GET.
- id: test_path_strips_query_string
  type: fail_to_pass
  origin: pr_diff
  description: http.path is the URL pathname only — query string is dropped.
- id: test_route_params_get_opencode_prefix
  type: fail_to_pass
  origin: pr_diff
  description: Each matched route param k=v becomes attribute opencode.k=v with the exact key name.
- id: test_multiple_nested_route_params
  type: fail_to_pass
  origin: pr_diff
  description: Multiple route params (sessionID + messageID + partID) all surface as opencode.* attributes.
- id: test_no_params_no_opencode_attrs
  type: fail_to_pass
  origin: pr_diff
  description: A request whose route has no matched params produces no opencode.* keys.
- id: test_non_id_param_name_is_preserved
  type: fail_to_pass
  origin: pr_diff
  description: A non-ID param name (e.g. mcp's :name) is tagged verbatim as opencode.name.
- id: test_method_value_is_request_method_not_constant
  type: fail_to_pass
  origin: pr_diff
  description: http.method reflects the actual request method (GET / POST / PATCH / DELETE), not a hardcoded constant.
- id: test_runRequest_delegates_to_requestAttributes
  type: fail_to_pass
  origin: pr_diff
  description: runRequest delegates to requestAttributes(c) instead of building the attribute map inline — without this, real request spans never get tagged.
