- id: test_post_rest_index_drift_fails_at_index_4
  type: fail_to_pass
  origin: pr_diff
  description: Decoding ["a", true, "b", "1", "x"] against Tuple([String], Boolean, String, NumberFromString, NumberFromString) must report a ParseError localised to index [4] mentioning the offending value "x".
- id: test_post_rest_index_drift_succeeds_with_full_arity
  type: fail_to_pass
  origin: pr_diff
  description: Decoding ["a", true, "b", "1", "2"] against the same schema must yield every element of the post-rest tail (output ["a", true, "b", 1, 2]), not silently drop the last position.
- id: test_post_rest_index_drift_long_tail_succeeds
  type: fail_to_pass
  origin: pr_diff
  description: A different shape — Tuple([NumberFromString], String, NumberFromString, NumberFromString, NumberFromString) — must decode ["1", "a", "b", "2", "3", "4"] in full to [1, "a", "b", 2, 3, 4] regardless of how many elements occupy the rest section.
- id: test_post_rest_index_drift_long_tail_fails_at_last_index
  type: fail_to_pass
  origin: pr_diff
  description: The same shape with an invalid trailing element ("z" at index 5) must surface a ParseError localised to [5]; the offending position must not be skipped.
