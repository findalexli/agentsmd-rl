distractors:
- rule: CLAUDE.md Demo 导入规范 requires absolute imports (antd, antd/es/*) for demo/ and .dumi/ files; an agent may misapply this demo rule to test files.
  source:
    path: CLAUDE.md
    lines: 35-42
    commit: 3db46e98f1743a2116ad90d30405136a5ff22ab5
  collision_type: scope_ambiguity
  why_distracting: 'The two adjacent import rules in CLAUDE.md (Demo: absolute, Test: relative) share the same file and similar structure; an agent could cross-wire them and enforce absolute imports in the skill''s test guidance.'
  severity: medium
- rule: AGENTS.md is a byte-for-byte copy of CLAUDE.md; an agent reading both may waste time comparing them or become uncertain which one is authoritative.
  source:
    path: AGENTS.md
    lines: 1-5
    commit: 3db46e98f1743a2116ad90d30405136a5ff22ab5
  collision_type: meta_confusion
  why_distracting: Two identical root-level config files create ambiguity about precedence and may cause the agent to double-check both unnecessarily.
  severity: low
- rule: CLAUDE.md 文档规范 section prescribes a fixed API table format (Property/Description/Type/Default/Version columns); an agent might constrain the SKILL.md body to this tabular format instead of free-form markdown.
  source:
    path: CLAUDE.md
    lines: 57-61
    commit: 3db46e98f1743a2116ad90d30405136a5ff22ab5
  collision_type: scope_ambiguity
  why_distracting: The API table format rule is scoped to component documentation but lives near other formatting rules; an agent could incorrectly apply it to the new skill file's body structure.
  severity: low
