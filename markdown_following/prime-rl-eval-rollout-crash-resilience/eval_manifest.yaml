rubric:
- rule: Errors should never pass silently. Unless explicitly silenced. Code must log warnings for failures.
  source:
    path: src/prime_rl/orchestrator/vf_utils.py
    lines: 181-183
    commit: 60f01a04681df563044cf3cb7c64ec480b608451
  reference: "except Exception as e:\n            get_logger().warning(f\"Group failed:\\  {e}\")"
- rule: Simple is better than complex. Code should be straightforward without over-engineering.
  source:
    path: src/prime_rl/orchestrator/vf_utils.py
    lines: 166-185
    commit: 60f01a04681df563044cf3cb7c64ec480b608451
  reference: Simple try/except wrapper around run_group with logging and progress update, returns None on failure
- rule: Explicit is better than implicit. Use explicit exception types, not bare except.
  source:
    path: src/prime_rl/orchestrator/vf_utils.py
    lines: '181'
    commit: 60f01a04681df563044cf3cb7c64ec480b608451
  reference: 'except Exception as e:'
- rule: Try/except blocks should only be used for intentional fault tolerance with logging.
  source:
    path: src/prime_rl/orchestrator/vf_utils.py
    lines: 180-185
    commit: 60f01a04681df563044cf3cb7c64ec480b608451
  reference: Try/except in run_group_with_progress for intentional per-group fault tolerance with warning log
- rule: Do not add unnecessary comments explaining code changes or referring to old code.
  source:
    path: src/prime_rl/orchestrator/eval_utils.py
    lines: 128-130
    commit: 60f01a04681df563044cf3cb7c64ec480b608451
  reference: Clean code without process-explanatory comments - see test_no_process_comments
- rule: You can add try catch on code that explicitly aims to be fault tolerant like adding retry mechanisms or explicit and intentional robustness.
  source:
    path: AGENTS.md
    lines: 5-7
  evidence: The gold solution adds a `try/except Exception as e:` block inside `run_group_with_progress` in `vf_utils.py` to isolate failures and prevent `asyncio.gather` from crashing, which aligns with the exce
  category: architecture
distractors:
- rule: Avoid try/except blocks unless it's really necessary. It's fine that a program fails if something goes wrong as this helps us to catch non-obvious bugs and unforeseen side-effects earlier.
  collision_type: rule_conflict
  why_distracting: The agent might strictly follow the first sentence and avoid adding a try/except block, failing to implement the requested fault tolerance for rollout groups.
  severity: high
  source:
    path: AGENTS.md
    lines: 3-5
hierarchy_analysis: The rules are defined in a single AGENTS.md file. The agent must read the full paragraph about try/except blocks to understand that while they are generally discouraged, they are permitted for explicit fault tolerance, which is exactly what the task requires.
