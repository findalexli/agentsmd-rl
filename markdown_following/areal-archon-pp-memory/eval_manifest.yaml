  type: fail_to_pass
  origin: pr_diff
  description: '``is_moe_model_config`` must be defined in ``areal/experimental/models/archon/utils.py`` and listed in ``__all__``.'
- id: test_is_moe_model_config_true_for_moe_configs
  type: fail_to_pass
  origin: pr_diff
  description: '``is_moe_model_config(cfg)`` returns ``True`` whenever ``cfg.num_experts > 1`` or ``cfg.num_local_experts > 1``.'
- id: test_is_moe_model_config_false_for_dense_or_missing
  type: fail_to_pass
  origin: pr_diff
  description: '``is_moe_model_config(cfg)`` returns ``False`` for configs missing the expert attrs, or where the value is ``None`` or ``<= 1``.'
- id: test_null_output_chunks_class_exists
  type: fail_to_pass
  origin: pr_diff
  description: A ``_NullOutputChunks`` class must exist in ``areal/experimental/engine/archon_runner.py``.
- id: test_null_output_chunks_subclass_of_list
  type: fail_to_pass
  origin: pr_diff
  description: '``_NullOutputChunks`` must subclass ``list`` so PyTorch''s pipelining stage code that types its ``output_chunks`` as a list keeps working.'
- id: test_null_output_chunks_append_is_noop_and_stays_empty
  type: fail_to_pass
  origin: pr_diff
  description: '``_NullOutputChunks.append(item)`` is a no-op (the container stays empty) so per-microbatch logits get freed instead of accumulating.'
- id: test_null_output_chunks_other_list_ops_still_work
  type: fail_to_pass
  origin: pr_diff
  description: Non-append list operations (len, iter, list()) on ``_NullOutputChunks`` continue to work as on a regular list.
- id: test_reshard_policy_field_default_value
  type: fail_to_pass
  origin: pr_diff
  description: '``ArchonEngineConfig`` exposes a ``reshard_after_forward_policy`` field defaulting to the string ``"default"``.'
- id: test_reshard_policy_accepts_all_documented_values
  type: fail_to_pass
  origin: pr_diff
  description: '``reshard_after_forward_policy`` accepts the three values ``"default"``, ``"always"``, ``"never"`` without raising.'
- id: test_reshard_policy_rejects_invalid_value
  type: fail_to_pass
  origin: pr_diff
  description: Constructing ``ArchonEngineConfig`` with an unsupported ``reshard_after_forward_policy`` value raises ``ValueError`` with a message that names the field and lists the valid choices.
