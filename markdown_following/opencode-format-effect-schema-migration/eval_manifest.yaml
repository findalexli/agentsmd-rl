rubric:
- id: schema_class_pattern
  source:
    lines: 88-94
    path: packages/opencode/AGENTS.md
    commit: caaddf096424193ef3cba4bf2a8f9ae6876915bc
  rule: 'OutputFormatText and OutputFormatJsonSchema use Schema.Class with a static readonly zod = zod(this) accessor, matching the established convention in src/session/schema.ts.

    '
- id: branded_or_class_for_data
  source:
    lines: 88-94
    path: packages/opencode/AGENTS.md
    commit: caaddf096424193ef3cba4bf2a8f9ae6876915bc
  rule: 'Multi-field session-domain shapes are defined with Schema.Class, not as anonymous Schema.Struct or as ad-hoc Zod objects retained alongside.

    '
- id: avoid_any
  source:
    lines: '13'
    path: AGENTS.md
    commit: caaddf096424193ef3cba4bf2a8f9ae6876915bc
  rule: 'Implementation files do not introduce new `any` types beyond what was present before the migration. Cast points should be limited to the Object.assign expression that attaches `.zod` to the union schema.

    '
- id: prefer_const_no_else
  source:
    lines: 44-73
    path: AGENTS.md
    commit: caaddf096424193ef3cba4bf2a8f9ae6876915bc
  rule: 'Diff uses `const` declarations and avoids `let` / `else` reassignment patterns where possible (root AGENTS.md style guide).

    '
- id: avoid_unnecessary_destructuring
  source:
    lines: 30-41
    path: AGENTS.md
    commit: caaddf096424193ef3cba4bf2a8f9ae6876915bc
  rule: 'Touched code does not introduce new destructuring of single-use values (root AGENTS.md "Destructuring" section).

    '
- id: zod_bridge_accessor
  source:
    lines: 1-200
    path: packages/opencode/specs/effect/schema.md
    commit: caaddf096424193ef3cba4bf2a8f9ae6876915bc
  rule: 'Each migrated schema exposes a `.zod` accessor produced via the project-local `zod()` helper (`src/util/effect-zod.ts`). The exported `Format` value is wrapped so that `Format.zod` is the derived Zod schema.

    '
