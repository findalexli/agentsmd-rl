rubric:
- id: spec_md_markmustrefetch_invariant
  severity: warn
  source:
    lines: 165-175
    commit: deb2a61614678fac029773a56b618382fe5b70f2
    path: packages/typescript-client/SPEC.md
  rule: 'The fix should respect SPEC.md invariant I10: `markMustRefetch(handle?)` produces an InitialState with `offset === ''-1''`, `schema === undefined`, `liveCacheBuster === ''''`, and `lastSyncedAt` preserved. Resetting the stream when the 409 lacks a handle header should drive the state machine via `markMustRefetch` (or an equivalent reset path) rather than mutating the existing handle in place.'
- id: handles_are_identities_not_cache_busters
  severity: warn
  rule: Handles must be opaque server-issued identities, not synthesized cache-busters. The fix must not introduce a new code path that fabricates a handle value (e.g. concatenating `-next`, `-retry`, a counter, or `undefined`) onto an existing handle to force URL uniqueness. URL uniqueness should be achieved through query parameters (e.g. `cache-buster`, `expired_handle`) rather than mutated handles.
- id: unit_tests_use_vi_fn_fetch_client
  severity: warn
  source:
    lines: 220-228
    commit: deb2a61614678fac029773a56b618382fe5b70f2
    path: AGENTS.md
  rule: Per AGENTS.md > Testing > Unit testing (mocked), unit tests for the typescript-client should mock `fetchClient` via `vi.fn()` rather than patching globals or hitting real network endpoints. Any new tests added alongside the fix should follow this convention.
