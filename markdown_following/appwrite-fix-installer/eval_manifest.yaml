config_edits:
- change_type: rewrite
  description: 'The agent-instruction file is restructured. The old narrative "Project Overview / Development Commands / Code Style Guidelines / Performance Patterns / Security Considerations" layout is replaced with: a tagline, a `## Commands` table, a `## Stack` bullet list, a `## Project layout` directory map, a `## Module structure` section with the canonical Module.php / Services / Http / Workers / Tasks breakdown and naming rules (Get/Create/Update/Delete/XList, property-update modeling for non-CRUD), an `## Action pattern` example, a `## Conventions` block (PSR-12 + plural resourceType + sparse-Document update guidance + utopia-php-only deps + no hardcoded credentials), and a `## Cross-repo context` note about appwrite/cloud and feat-dedicated-db.'
  signal_phrases_added:
  - Self-hosted Backend-as-a-Service platform
  - '## Commands'
  - '## Stack'
  - '## Project layout'
  - '## Module structure'
  - '## Action pattern (HTTP endpoints)'
  - '## Conventions'
  - '## Cross-repo context'
  - PHPUnit 12, Pint (PSR-12), PHPStan level 3
  - Get.php`, `Create.php`, `Update.php`, `Delete.php`, or `XList.php
  - appwrite/cloud
  - feat-dedicated-db
  signal_phrases_removed:
  - '## Project Overview'
  - '## Development Commands'
  - '## Code Style Guidelines'
  - '## Performance Patterns'
  - '## Security Considerations'
  - '## Pull Request Guidelines'
  - '## Known Issues and Gotchas'
  path: AGENTS.md
  gold_added: ''
  gold_removed: ''
rubric:
- id: psr12_formatting
  source:
    quote: Follow [PSR-12](https://www.php-fig.org/psr/psr-12/) coding standard
    path: AGENTS.md
    commit: ea032c28046c9f6cb1c2801fa80a9111f7e5fcd1
  rule: All modified PHP files conform to PSR-12 formatting (the project's Pint config enforces this; reviewers should not introduce trailing whitespace, mismatched braces, or non-PSR-12 indentation in Tasks/Install.php, Installer/Http/Installer/Install.php, or Installer/Server.php).
- id: strict_type_declarations
  source:
    quote: Strict type declarations where applicable
    path: AGENTS.md
    commit: ea032c28046c9f6cb1c2801fa80a9111f7e5fcd1
  rule: 'New methods (e.g. hasExplicitCliParams) and the modified performInstallation signature use strict type declarations (`: bool`, `?callable`, etc.) consistent with the surrounding code.'
- id: no_hardcoded_credentials
  source:
    quote: Never hardcode credentials - Use environment variables
    path: AGENTS.md
    commit: ea032c28046c9f6cb1c2801fa80a9111f7e5fcd1
  rule: No hardcoded credentials, API keys, or secrets are added in the installer changes; the GROWTH_API_URL analytics call must continue to use the existing environment-driven configuration.
- id: no_new_external_dependencies
  source:
    quote: Avoid introducing new dependencies other than utopia-php
    path: AGENTS.md
    commit: ea032c28046c9f6cb1c2801fa80a9111f7e5fcd1
  rule: No new composer packages are added outside the utopia-php ecosystem. The fix should be implementable using only PHP stdlib (Swoole\\Coroutine, Swoole\\Runtime), classes already imported in these files, and existing utopia-php helpers.
- id: docs_rewrite_keeps_actionable_rules
  source:
    quote: When a collection has a combination of resourceType ... MUST always be plural
    path: AGENTS.md
    commit: ea032c28046c9f6cb1c2801fa80a9111f7e5fcd1
  rule: The AGENTS.md rewrite must preserve the actionable rules from the old version (resourceType plural rule, sparse-Document update pattern, no-hardcoded-credentials, utopia-php-only deps) — they may move to a `## Conventions` block but must not be deleted.
