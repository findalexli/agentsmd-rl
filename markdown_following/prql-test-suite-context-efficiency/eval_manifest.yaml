    lines: 5-15
    commit: c3853a866993b199f92f6bd6bd0060a4f187e4e8
  evidence: Gold's inner-loop and outer-loop examples both use `cargo insta test` (and `task test-all`, which calls cargo insta).
  category: testing
  verification: llm_judge
- rule: When running all tests, the canonical command is `task test-all`.
  source:
