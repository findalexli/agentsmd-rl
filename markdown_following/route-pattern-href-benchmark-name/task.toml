name = "route-pattern-href-benchmark-name"
title = "route-pattern: href benchmark shows branch and commit info"
description = """
The href benchmark in @remix-run/route-pattern uses a hardcoded benchmark name 'bench'.
When comparing benchmarks across branches with --compare, all names are identical,
making it impossible to tell which results belong to which branch.
The fix derives the benchmark name from git branch and short commit hash.
"""

