rubric:
- rule: Memory management - In Zig code, be careful with allocators and use defer
    for cleanup
  source:
    path: CLAUDE.md
    lines: '40'
    commit: 686eda3cb4773bb1ffe77cbdef6d0507d8fc2314
- rule: "Prefer bun.* APIs over std.* for cross-platform error handling, but std.heap.stackFallback is explicitly required for the DNS buffer overflow fix since no bun.heap.stackFallback exists in the codebase at this commit."
  source:
    path: src/CLAUDE.md
    lines: 10-29
    commit: 686eda3cb4773bb1ffe77cbdef6d0507d8fc2314
- rule: "Never use `@import()` inline inside of functions. Always put them at the bottom of the file or containing struct. Imports in Zig are free of side-effects."
  source:
    path: src/CLAUDE.md
    lines: 10-11
    commit: 686eda3cb4773bb1ffe77cbdef6d0507d8fc2314
