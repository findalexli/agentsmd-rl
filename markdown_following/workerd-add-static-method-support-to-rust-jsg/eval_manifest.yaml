- path: src/rust/jsg-macros/README.md
  tier: 2
  gold_added: 'The macro automatically detects whether a method is an instance method     or a static method based on the presence of a receiver (`&self` or `&mut self`):

    - **Instance methods** (with `&self`/`&mut self`) are placed on the prototype,     called on instances (e.g., `obj.getName()`). - **Static methods** (without     a receiver) are placed on the constructor, called on the class itself (e.g.,     `MyClass.create()`).

    // Instance method: called as obj.parseCaaRecord(...)     // Instance method: called as obj.getName() // Instance method: void     methods return undefined in JavaScript }

    // Static method: called     as DnsUtil.create(...) #[jsg_method] pub fn create(name: String) ->     Result<String, jsg::Error> { Ok(name) // Instance method on     the prototype }

    #[jsg_method] pub fn create(name: String) ->     Result<String, jsg::Error> { // Static method on the constructor (no     &self) On struct definitions, generates `jsg::Type`, wrapper struct, and `ResourceTemplate`     implementations. On impl blocks, scans for `#[jsg_method]` attributes and generates     the `Resource` trait implementation. Methods with a receiver (`&self`/`&mut     self`) are registered as instance methods; methods without a receiver are registered     as static methods.'
  gold_removed: // Void methods return undefined in JavaScript // implementation On struct definitions, generates `jsg::Type`, wrapper struct, and `ResourceTemplate`     implementations. On impl blocks, scans for `#[jsg_method]` attributes and generates     the `Resource` trait implementation.
distractors:
- rule: Suggest updates to AGENTS.md when you find new high-level information.
  collision_type: scope_ambiguity
  why_distracting: The generic instruction to 'Suggest updates to AGENTS.md' might lead the agent to update the root `AGENTS.md` file, even though the prompt specifically requests updating `src/rust/AGENTS.md`.
  severity: medium
  source:
    path: AGENTS.md
    lines: 10-12
- rule: 'CXX bridge: `#[cxx::bridge(namespace = "workerd::rust::<crate>")]` with companion `ffi.c++`/`ffi.h` files'
  collision_type: scope_ambiguity
  why_distracting: The agent is modifying `jsg/ffi.c++` and `jsg/ffi.h`. The rule about CXX bridges might cause the task agent to try to create new companion files or alter namespaces unnecessarily, rather than just extending the existing FFI declarations.
  severity: low
  source:
    path: src/rust/AGENTS.md
    lines: 24-25
- rule: Use the C++ JSG macro pattern (`JSG_RESOURCE_TYPE`, `JSG_STRUCT`, `js.alloc<T>()`) when modifying JavaScript APIs.
  source:
    path: AGENTS.md
    lines: 233-236
  source_text: 'C++ classes are exposed to JavaScript via JSG macros in `src/workerd/jsg/`. See the comprehensive guide at `src/workerd/jsg/README.md` for details. When adding or modifying JavaScript APIs, find a similar existing API and follow its pattern.


    - `JSG_RESOURCE_TYPE` for reference types, `JSG_STRUCT` for value types

    - `js.alloc<T>()` for resource allocation'
  collision_type: architecture_boundary
  why_distracting: The change clearly affects JS binding behavior, so this C++ JSG guidance looks relevant at first glance. But the gold diff fixes Rust proc-macro generation and Rust/C++ bridge plumbing in `src/rust/jsg-macros/` and `src/rust/jsg/`; switching to C++ `JSG_RESOURCE_TYPE` patterns would bypass the broken Rust path instead of fixing it.
  severity: medium
- rule: Prefer `JSG_PROTOTYPE_PROPERTY` over `JSG_INSTANCE_PROPERTY`.
  source:
    path: src/workerd/jsg/AGENTS.md
    lines: 93-94
  source_text: "10. **Prefer `JSG_PROTOTYPE_PROPERTY`** over `JSG_INSTANCE_PROPERTY` unless there's a\n    specific reason — instance properties break GC optimization"
  collision_type: would_cause_bug
  why_distracting: This rule mentions prototype placement, which is superficially close to the bug being fixed. But it is specifically about properties, not method registration. Applying it here would encourage keeping receiver-less `#[jsg_method]` entries on the prototype instead of moving them to `Member::StaticMethod` on the constructor, preserving the wrong API surface.
  severity: high
hierarchy_analysis: The root `AGENTS.md` provides a general directive to update `AGENTS.md` files with new information. The `src/rust/AGENTS.md` file contains the specific rule about `#[jsg_method]` that needs to be updated. The agent must navigate this hierarchy to update the correct file and the correct line within that file, avoiding the temptation to update the root file.
