distractors:
- rule: 'Always run tests after making changes: `pnpm test <test_file.ts>`'
  collision_type: meta_confusion
  why_distracting: The agent's own instruction file tells it to use `pnpm test <test_file.ts>` to run tests. However, the PR prompt explicitly states this command is broken. The agent must ignore its loaded instruction and fix the instruction itself rather than trying to use it.
  severity: high
  source:
    path: AGENTS.md
    lines: 19-20
- rule: run the file with `node scratchpad/your-file.ts`
  collision_type: meta_confusion
  why_distracting: The agent is instructed by its config to use `node scratchpad/your-file.ts` for testing code. If the agent tries to use this to verify its changes, it will fail because `node` cannot run TypeScript files. The agent must recognize this rule as the bug to be fixed.
  severity: high
  source:
    path: AGENTS.md
    lines: 41-43
hierarchy_analysis: The config file `AGENTS.md` is both the source of agent instructions and the target file to be edited. The agent must navigate the meta-level conflict of having its own operational instructions be the subject of the bug report, requiring it to selectively ignore and rewrite the rules it is supposed to follow.
