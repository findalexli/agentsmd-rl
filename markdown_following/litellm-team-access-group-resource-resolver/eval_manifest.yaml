rubric:
- id: uses_prisma_methods_not_raw_sql
  source:
    lines: Proxy database access — Do not write raw SQL for proxy DB operations. Use Prisma model methods instead of execute_raw / query_raw.
    commit: eb780a85bb2d02a5c22780bc434a542f4fa1e1d0
    path: CLAUDE.md
  rule: 'The new helper uses Prisma model methods on

    `prisma_client.db.litellm_accessgrouptable` (e.g. `.find_many`) and

    does NOT use `execute_raw` / `query_raw` / hand-rolled SQL strings.

    '
- id: type_hints_present
  source:
    lines: Code Style — Type hints required for all public APIs.
    commit: eb780a85bb2d02a5c22780bc434a542f4fa1e1d0
    path: CLAUDE.md
  rule: 'New public-facing helper has explicit type hints on its argument and

    return type (e.g. `List[str]` in, `Dict[str, Dict[str, List[str]]]`

    out).

    '
- id: imports_at_module_top
  source:
    lines: Code Style — Avoid imports within methods. The only exception is avoiding circular imports where absolutely necessary.
    commit: eb780a85bb2d02a5c22780bc434a542f4fa1e1d0
    path: CLAUDE.md
  rule: 'Imports added to support the helper live at the top of the file. The

    one acceptable inline import is the `from

    litellm.proxy.proxy_server import prisma_client` pull, which exists

    to break a known circular import — that''s the documented exception.

    '
