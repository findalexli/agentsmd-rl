name = "hugo-permalink-deprecation-fix"
title = "Fix deprecated permalink tokens in Hugo tests"
owner = "gohugoio"
repo = "hugo"
base_commit = "fa8658111f9c79b3f6381273fe822854a759fe1a"
merge_commit = "eb11c3d0bc4642ed454521135810ed0ea7cf48b9"
pr_number = 14645

# Difficulty and categorization
difficulty = "easy"
estimated_time = "15 minutes"
tags = ["go", "hugo", "deprecated", "permalink", "tests"]

# Timeouts (in seconds)
agent_timeout = 1800
verifier_timeout = 120

[environment]
# The dockerfile to use for this task
dockerfile = "./environment/Dockerfile"

[solution]
# The solve script to apply the gold patch
script = "./solution/solve.sh"

[evaluation]
# The manifest for evaluation
manifest = "./eval_manifest.yaml"

[tests]
# The test script to run
script = "./tests/test.sh"
# The Python test file
test_file = "./tests/test_outputs.py"

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
