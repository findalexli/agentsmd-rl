  category: architecture
- rule: Run with JavaScript exception scope verification
  source:
    path: CLAUDE.md
    lines: 13-14
  evidence: The gold solution adds `RETURN_IF_EXCEPTION(throwScope, {});` immediately after `toJSNewlyCreated`, which is the exact C++ pattern required to properly handle exceptions and pass the project's JavaScr
  category: architecture
distractors:
- rule: Always use bun.* APIs instead of std.*
  collision_type: architecture_boundary
  why_distracting: The rule mandates using bun.* APIs instead of std.* for system calls, but this applies exclusively to Zig code. The agent is editing a C++ file (BunString.cpp) where standard C++ or WebCore/JSC APIs must be used. Attempting to apply Zig conventions here would cause syntax errors or hallucinated C++ APIs.
  severity: high
  source:
    path: src/AGENTS.md
    lines: 16-20
- rule: If a test is for a specific numbered GitHub Issue, it should be placed in test/regression/issue/${issueNumber}.test.ts
  collision_type: scope_ambiguity
  why_distracting: The rule specifies test placement for numbered GitHub issues. The prompt does not provide an issue number, which might lead the agent to create a placeholder issue file (violating the 'REAL issue number' rule) or waste effort trying to satisfy test organization rules when the gold solution only requires a one-line C++ exception check.
  severity: medium
  source:
    path: AGENTS.md
    lines: 26-28
hierarchy_analysis: The hierarchy includes root-level testing/build rules and src-level Zig rules. The agent must recognize that the src-level Zig rules do not apply to the C++ files in src/bun.js/bindings/, requiring it to filter instructions based on the target file's language and subsystem.
