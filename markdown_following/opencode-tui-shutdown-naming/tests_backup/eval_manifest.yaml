distractors:
- rule: Avoid `try`/`catch` where possible
  collision_type: rule_conflict
  why_distracting: The PR instruction explicitly requires adding a `try/finally` block
    around the TUI invocation to guarantee cleanup. An agent strictly following the
    style guide might attempt to avoid `try/finally` or refactor existing `try/catch`
    blocks, violating the explicit PR requirement.
  severity: high
  source:
    path: AGENTS.md
    lines: 11-11
- rule: Keep things in one function unless composable or reusable / Reduce total variable
    count by inlining when a value is only used once.
  collision_type: rule_conflict
  why_distracting: The PR instruction explicitly asks to extract inline logic into
    standalone helper functions (`target` and `input`). The style guide tells the
    agent to keep things in one function and inline single-use values, which directly
    conflicts with the extraction requirement.
  severity: high
  source:
    path: AGENTS.md
    lines: 10-10
hierarchy_analysis: The agent must navigate a moderate hierarchy (root `AGENTS.md`
  and package-level `AGENTS.md`). The task is highly meta-referential because the
  agent is instructed to modify the root `AGENTS.md` to strengthen the very naming
  rules it is supposed to follow. The agent must also recognize that specific PR instructions
  (extracting helpers, using try/finally) override the general style guide rules (inlining,
  avoiding try/catch).
