config_edits:
- path: CLAUDE.md
  tier: 1
  gold_added: '4. Create PR if needed

    5. **IMMEDIATELY** update issue status to **"In Review"** (NOT "Done"): `mcp__linear-server__update_issue`

    6. **IMMEDIATELY** add completion comment: `mcp__linear-server__create_comment`

    7. Only then move on to the next issue


    **Note:** Issue status should be set to **"In Review"** when PR is created. The
    status will be updated to **"Done"** only after the PR is merged (usually handled
    by Linear-GitHub integration or manually).

    - Mark issue as "Done" immediately after creating PR

    - Complete Issue A → Create PR → Update A status to "In Review" → Add A comment
    → Complete Issue B → ...'
  gold_removed: '4. **IMMEDIATELY** update issue status to "Done": `mcp__linear-server__update_issue`

    5. **IMMEDIATELY** add completion comment: `mcp__linear-server__create_comment`

    6. Only then move on to the next issue

    - Complete Issue A → Update A status → Add A comment → Complete Issue B → Update
    B status → Add B comment → ...'
distractors:
- rule: 'IMMEDIATELY update issue status to ''Done'': `mcp__linear-server__update_issue`'
  collision_type: meta_confusion
  why_distracting: The existing rule explicitly commands the agent to IMMEDIATELY
    update the issue status to 'Done' using an MCP tool. The prompt asks the agent
    to *update the documentation* to say 'In Review' instead. An agent might get confused
    between executing the existing rule via MCP versus modifying the rule in the markdown
    file.
  severity: high
  source:
    path: CLAUDE.md
    lines: 84-85
- rule: 'Correct approach: Complete Issue A → Update A status → Add A comment'
  collision_type: scope_ambiguity
  why_distracting: The 'Correct approach' example reinforces setting the status to
    'Done' implicitly ('Update A status'). The agent might leave this example as-is,
    creating a contradiction in the documentation after updating the steps above it.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 92-93
- rule: Avoid testing specific error texts
  source:
    path: .cursor/rules/testing-guide/testing-guide.mdc
    lines: 378-379
  source_text: '// ❌ 避免测试具体错误文本

    expect(() => processUser({})).toThrow(''用户数据不能为空，请检查输入参数'');'
  collision_type: would_cause_bug
  why_distracting: An agent might refuse to write tests verifying specific error strings,
    but the diff involves testing a string-matching utility (isNonRetryableError)
    where evaluating exact error strings is the core business logic.
  severity: high
- rule: Use comments to group tests
  source:
    path: packages/prompts/CLAUDE.md
    lines: '555'
  source_text: 7. **分组测试用例**：使用注释将相关测试分组（如按语言、边界情况）
  collision_type: scope_ambiguity
  why_distracting: An agent might think it should use inline comments to group tests
    instead of describe blocks. However, this rule applies specifically to the promptfoo
    testing framework used in packages/prompts, not Vitest unit tests.
  severity: medium
- rule: Use English for prompts
  source:
    path: packages/prompts/CLAUDE.md
    lines: '223'
  source_text: '#### 使用英文提示词'
  collision_type: scope_ambiguity
  why_distracting: The gold diff translates Chinese test comments to English. An agent
    might think it's applying this rule, but this rule is strictly about the content
    of LLM system prompts for better task performance, not standard code documentation.
  severity: low
- rule: Default to realistic test data
  source:
    path: .cursor/rules/testing-guide/testing-guide.mdc
    lines: '232'
  source_text: '**核心原则**: 测试数据应默认追求真实性，只有在引入"高昂的测试成本"时才进行简化。'
  collision_type: meta_confusion
  why_distracting: An agent might over-engineer the test setup by generating real
    UUIDs/JWTs instead of using simple 'test-id' strings (as the diff does), misinterpreting
    the rule's threshold for when simplified data is appropriate.
  severity: medium
hierarchy_analysis: 'Both CLAUDE.md and AGENTS.md contain overlapping instructions
  regarding package management and testing. However, the primary conflict in this
  PR is meta-referential: the prompt asks the agent to modify the very instructions
  (CLAUDE.md) that govern its own behavior regarding issue management. The agent must
  recognize that the prompt''s instruction to change the workflow overrides the existing
  written rule to mark issues as ''Done''.'
