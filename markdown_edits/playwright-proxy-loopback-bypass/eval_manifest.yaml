distractors:
- rule: When adding a new config option, update type definitions in mcp/config.d.ts,
    mcp/config.ts, and add environment variable mapping in configFromEnv().
  source:
    path: .claude/skills/playwright-dev/mcp-dev.md
    lines: 315-395
  source_text: "## Adding Config Options\n\nWhen you need to add a new config option,\
    \ update these files in order:\n\n### 1. Type definition: `packages/playwright/src/mcp/config.d.ts`\n\
    \nAdd the option to the `Config` type with JSDoc:\n\n```typescript\nexport type\
    \ Config = {\n  // ... existing ...\n\n  /**\n   * Description of the new option.\n\
    \   */\n  myOption?: string;\n};\n```\n\n### 2. CLI options type: `packages/playwright/src/mcp/config.ts`\n\
    \nAdd to `CLIOptions` type:\n\n```typescript\nexport type CLIOptions = {\n  //\
    \ ... existing ...\n  myOption?: string;\n};\n```\n\nIf the option needs to be\
    \ in `FullConfig` (with required/resolved values), update `FullConfig` and `defaultConfig`:\n\
    \n```typescript\nexport type FullConfig = Config & {\n  // ... existing ...\n\
    \  myOption: string;  // required in resolved config\n};\n\nexport const defaultConfig:\
    \ FullConfig = {\n  // ... existing ...\n  myOption: 'default-value',\n};\n```\n\
    \n### 3. Config from CLI: `configFromCLIOptions()` in `config.ts`\n\nMap CLI option\
    \ to config:\n\n```typescript\nconst config: Config = {\n  // ... existing ...\n\
    \  myOption: cliOptions.myOption,\n};\n```\n\n### 4. Config from env: `configFromEnv()`\
    \ in `config.ts`\n\nAdd environment variable mapping:\n\n```typescript\noptions.myOption\
    \ = envToString(process.env.PLAYWRIGHT_MCP_MY_OPTION);\n// For booleans: envToBoolean(process.env.PLAYWRIGHT_MCP_MY_OPTION)\n\
    // For numbers: numberParser(process.env.PLAYWRIGHT_MCP_MY_OPTION)\n// For comma\
    \ lists: commaSeparatedList(process.env.PLAYWRIGHT_MCP_MY_OPTION)\n// For semicolon\
    \ lists: semicolonSeparatedList(process.env.PLAYWRIGHT_MCP_MY_OPTION)\n```\n\n\
    ### 5. MCP server CLI: `packages/playwright/src/mcp/program.ts`\n\nAdd CLI flag:\n\
    \n```typescript\ncommand\n  .option('--my-option <value>', 'description of option')\n\
    ```\n\n### 6. Merge config (if nested)\n\nIf the option is nested, update `mergeConfig()`\
    \ in `config.ts` to deep-merge it.\n\n**Config resolution order:** `defaultConfig`\
    \ → config file → env vars → CLI args (last wins)."
  collision_type: architecture_boundary
  why_distracting: The diff involves adding logic to read an internal core environment
    variable (`PLAYWRIGHT_DISABLE_FORCED_CHROMIUM_PROXIED_LOOPBACK`) in `chromium.ts`.
    An agent might mistakenly classify this variable as a new 'config option' and
    attempt to implement it according to this rule in the MCP config system (`packages/playwright/src/mcp/`),
    which violates architecture boundaries.
  severity: high
