rubric:
- rule: Prefer `let` for locals, `const` only at module scope; never use `var`
  source:
    path: AGENTS.md
    lines: 20-21
  category: style
  evidence: The idempotent check in the gold script specifically looks for `let prTitle
    = 'Release'`, indicating the use of `let` for a local variable instead of `const`
    when updating the PR title variable.
- rule: Use regular function declarations/expressions by default. Only use arrow functions
    as callbacks
  source:
    path: AGENTS.md
    lines: 21-22
  category: style
  evidence: The prompt requires adding new utility functions (`getPackageShortName`,
    `getGitTag`, `getGitHubReleaseUrl`, etc.) which should be implemented as regular
    function declarations rather than arrow functi
config_edits:
- path: AGENTS.md
  tier: 1
  gold_added: '- **Automated releases**: When changes are pushed to `main`, the [release-pr
    workflow](/.github/workflows/release-pr.yaml) automatically opens/updates a "Release"
    PR. The [publish workflow](/.github/workflows/publish.yaml) runs on every push
    to `main` and publishes when no change files are present (i.e., after merging
    the Release PR).

    - **Test change/release code with preview scripts**: When modifying any change/release
    code, run `pnpm changes:preview` to test locally. For the release PR script, run
    `node ./scripts/release-pr.ts --preview`. For the publish script, run `node ./scripts/publish.ts
    --dry-run` to see what commands would be executed without actually publishing.'
  gold_removed: '- **Automated releases**: When changes are pushed to `main`, the
    [changes-version-pr workflow](/.github/workflows/changes-version-pr.yaml) automatically
    opens/updates a "Version Packages" PR. The [publish workflow](/.github/workflows/publish.yaml)
    runs on every push to `main` and publishes when no change files are present (i.e.,
    after merging the Version Packages PR).

    - **Test change/release code with preview scripts**: When modifying any change/release
    code, run `pnpm changes:preview` to test locally. For the version PR script, run
    `node ./scripts/changes-version-pr.ts --preview`. For the publish script, run
    `node ./scripts/publish.ts --dry-run` to see what commands would be executed without
    actually publishing.'
- path: CONTRIBUTING.md
  tier: 2
  gold_added: 'Releases are automated via the [release-pr workflow](/.github/workflows/release-pr.yaml)
    and [publish workflow](/.github/workflows/publish.yaml).

    2. **A "Release" PR is automatically opened** (or updated if one exists)

    The "Release" PR simply automates the `pnpm changes:version` command. If needed,
    you can run this command manually. This will update the `package.json` versions,
    `CHANGELOG.md` files, and delete the change files. It will then commit the result.'
  gold_removed: 'Releases are automated via the [changes-version-pr workflow](/.github/workflows/changes-version-pr.yaml)
    and [publish workflow](/.github/workflows/publish.yaml).

    2. **A "Version Packages" PR is automatically opened** (or updated if one exists)

    The "Version Packages" PR simply automates the `pnpm changes:version` command.
    If needed, you can run this command manually. This will update the `package.json`
    versions, `CHANGELOG.md` files, and delete the change files. It will then commit
    the result.'
distractors:
- rule: 'Adding changes: Create `packages/*/.changes/[major|minor|patch].short-description.md`
    files.'
  source:
    path: AGENTS.md
    lines: 48-49
  collision_type: scope_ambiguity
  why_distracting: The agent might try to create a change file for this PR because
    it is making significant changes to the repository. However, change files are
    only meant for published packages in the `packages/` directory, not for internal
    release tooling, scripts, or GitHub workflows.
  severity: medium
- rule: 'Test change/release code with preview scripts: When modifying any change/release
    code, run `pnpm changes:preview` to test locally.'
  source:
    path: AGENTS.md
    lines: 59-60
  collision_type: meta_confusion
  why_distracting: The agent might attempt to run these preview commands to validate
    its work. However, since the agent is actively rewriting the release tooling and
    renaming the scripts themselves, running these commands mid-modification may fail
    or lead the agent down a rabbit hole of debugging the test environment rather
    than completing the code changes.
  severity: low
hierarchy_analysis: The AGENTS.md file provides the foundational rules for code style
  and architecture, while CONTRIBUTING.md provides higher-level guidelines for contributors.
  In this PR, the agent must apply the code style rules from AGENTS.md to the internal
  scripts while simultaneously updating the documentation in both AGENTS.md and CONTRIBUTING.md
  to reflect the new release terminology. The documentation updates must accurately
  describe the new state of the tooling.
