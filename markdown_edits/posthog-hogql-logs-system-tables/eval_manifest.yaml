distractors:
- rule: API views should declare request/response schemas — prefer @validated_request
    or @extend_schema
  collision_type: architecture_boundary
  why_distracting: The task asks to expose Django models (`LogsView` and `LogsAlertConfiguration`)
    so they are queryable. An agent might mistakenly think it needs to expose them
    via the REST API (views/serializers) and add `@extend_schema`, rather than adding
    them as HogQL system tables.
  severity: high
  source:
    path: AGENTS.md
    lines: 49-49
- rule: Django migration patterns and safety workflow for PostHog. Use when creating,
    adjusting, or reviewing Django/Postgres migrations
  collision_type: would_cause_bug
  why_distracting: The task involves adding tables to HogQL that are backed by existing
    PostgreSQL Django models. The agent might mistakenly think it needs to create
    a Django migration to create these tables in the database, which would fail or
    cause issues since the tables already exist.
  severity: high
  source:
    path: .claude/skills/django-migrations
    lines: 1-2
- rule: Guide for exposing PostHog product endpoints as MCP tools.
  collision_type: meta_confusion
  why_distracting: The task mentions updating skill documentation so agents can discover
    the tables. The agent might think it needs to create a new MCP tool for logs using
    this skill, but it only needs to update the `query-examples` skill documentation.
  severity: medium
  source:
    path: .claude/skills/implementing-mcp-tools
    lines: 1-3
hierarchy_analysis: The `.cursorrules` file provides general behavioral guidelines,
  while `AGENTS.md` provides specific architectural and tooling rules. The agent must
  carefully distinguish between exposing models via the REST API (covered in `AGENTS.md`)
  and exposing them via HogQL system tables (the actual task). The presence of MCP
  tool and Django migration skills in the environment could also confuse the agent
  into building a new tool or migration instead of just updating the `query-examples`
  skill docs and `system.py`.
