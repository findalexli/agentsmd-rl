hierarchy_analysis: 'The AGENTS.md file serves a dual purpose in this task: it is
  both the system configuration providing rules to the agent AND a target file that
  must be modified. This creates a meta-level interaction where the agent must override
  and rewrite its own instructions regarding prerelease behavior rather than strictly
  following them.'
