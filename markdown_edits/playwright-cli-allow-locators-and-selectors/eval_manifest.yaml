# Config edits extracted from the PR (SKILL.md update)
config_edits:
  - path: "packages/playwright-core/src/tools/cli-client/skill/SKILL.md"
    tier: 1
    gold_added: |
      You can also use css selectors or Playwright locators.

      ```bash
      # css selector
      playwright-cli click "#main > button.submit"

      # role locator
      playwright-cli click "getByRole('button', { name: 'Submit' })"

      # test id
      playwright-cli click "getByTestId('submit-button')"
      ```
    gold_removed: |
      You can also use css or role selectors, for example when explicitly asked for it.

      ```bash
      # css selector
      playwright-cli click "#main > button.submit"

      # role selector
      playwright-cli click "role=button[name=Submit]"

      # chaining css and role selectors
      playwright-cli click "#footer >> role=button[name=Submit]"
      ```

