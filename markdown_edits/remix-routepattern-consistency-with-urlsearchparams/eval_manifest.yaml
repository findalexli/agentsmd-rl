config_edits:
- path: packages/route-pattern/README.md
  tier: 2
  gold_added: '**Search params** narrow matches using "?key", "?key=", or "?key=value".

    Parsing and serialization follow "URLSearchParams" ():

    "?key" and "?key=" are the same constraint (stored as an empty "Set" in "ast":

    key must be present; empty value is OK), and spaces use "+" / "%20" like in real

    query strings.


    new RoutePattern(''search?q'') // same constraint as ?q= — key must be present


    // More constrained search params = more specific ( and  tie)

    '
  gold_removed: '**Search params** narrow matches using "?key" or "?key=value":


    new RoutePattern(''search?q'') // requires ?q in URL


    new RoutePattern(''search?q='') // requires ?q with any value


    router.add(''search?q='', "has-q-with-value'')


    // More constrained search params = more specific

    '
distractors:
- rule: 'Documentation imports/install: In package READMEs, documentation, and pull
    request code examples, installation instructions should always include `npm i
    remix`'
  collision_type: scope_ambiguity
  why_distracting: The agent is editing `README.md` to update the search param documentation.
    It might see this rule and try to inject installation instructions (`npm i remix`)
    or change imports in the `README.md` examples, which is out of scope for this
    specific bug fix and would clutter the PR.
  severity: medium
  source:
    path: AGENTS.md
    lines: 17-17
- rule: 'Other files: Organize by feature (not by pattern part)'
  collision_type: architecture_boundary
  why_distracting: The agent might interpret 'Organize by feature' to mean that all
    search parameter logic should be extracted into a new `search.ts` file. However,
    the existing architecture splits by operation (`parse.ts`, `match.ts`, `serialize.ts`),
    and the agent should modify the logic within those existing operation-based files
    rather than restructuring the directory.
  severity: high
  source:
    path: packages/route-pattern/src/lib/route-pattern/AGENTS.md
    lines: 6-13
hierarchy_analysis: The hierarchy consists of a root `AGENTS.md` providing general
  monorepo guidelines (standards, formatting, documentation) and a leaf `AGENTS.md`
  in `route-pattern/src/lib/route-pattern/` detailing the file organization. The root
  guidelines strongly support the use of `URLSearchParams` (web standards), while
  the leaf guidelines could cause confusion if 'feature' is misinterpreted as 'search
  params' rather than 'parsing/matching/serializing'.
