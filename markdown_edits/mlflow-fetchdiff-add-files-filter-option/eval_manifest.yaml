rubric:
- rule: Use top-level imports (only use lazy imports when necessary)
  source:
    path: CLAUDE.md
    lines: 10-10
  category: style
  evidence: The `import fnmatch` statement is added at the top of `fetch_diff.py`
    alongside other standard library imports, rather than being lazily imported inside
    the `filter_diff` function.
