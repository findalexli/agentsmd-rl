# Track 3: Positive rubric - conventions the gold solution follows
rubric:
  - rule: "Agent config files must use consistent tool naming format (mcp__playwright-test__browser_run_code for .claude, playwright-test/browser_run_code for .github)"
    source:
      path: "examples/todomvc/.claude/agents/playwright-test-planner.md"
      lines: "1-10"
      commit: "703996071cb3a7ec642b30a2b428c369c3ebb7c7"
    evidence: "Gold uses mcp__ prefix in .claude files and playwright-test/ prefix in .github files"
    category: naming
    verification: llm_judge

  - rule: "Tool updates should be synchronized across all agent definition files"
    source:
      path: "packages/playwright/src/agents/playwright-test-planner.agent.md"
      lines: "1-30"
      commit: "703996071cb3a7ec642b30a2b428c369c3ebb7c7"
    evidence: "Gold adds browser_run_code to all 3 agent config files consistently"
    category: consistency
    verification: llm_judge

  - rule: "TypeScript function parameters should be properly typed and documented"
    source:
      path: "packages/playwright/src/mcp/browser/tools/runCode.ts"
      lines: "1-60"
      commit: "703996071cb3a7ec642b30a2b428c369c3ebb7c7"
    evidence: "Gold updates zod schema description to explain the function parameter"
    category: documentation
    verification: llm_judge

  - rule: "Code injection patterns should be safe (no raw string interpolation of user input)"
    source:
      path: "packages/playwright/src/mcp/browser/tools/runCode.ts"
      lines: "40-60"
      commit: "703996071cb3a7ec642b30a2b428c369c3ebb7c7"
    evidence: "Gold uses proper function invocation pattern with page parameter"
    category: security
    verification: programmatic
    check_cmd: "! grep -q '\${params.code};' /workspace/playwright/packages/playwright/src/mcp/browser/tools/runCode.ts"

# Track 4: Distractors - conventions that create collisions
distractors:
  - rule: "All Playwright code should use explicit type annotations"
    source:
      path: "packages/playwright/src/mcp/browser/tools/runCode.ts"
      lines: "1-30"
      commit: "703996071cb3a7ec642b30a2b428c369c3ebb7c7"
    collision_type: scope_ambiguity
    why_distracting: "The codebase uses inferred types extensively; forcing explicit types would be inconsistent with existing style"
    severity: low

  - rule: "Agent configs should be alphabetically sorted"
    source:
      path: "examples/todomvc/.github/agents/playwright-test-planner.agent.md"
      lines: "10-30"
      commit: "703996071cb3a7ec642b30a2b428c369c3ebb7c7"
    collision_type: rule_conflict
    why_distracting: "The gold adds browser_run_code in alphabetical position (after browser_press_key, before browser_select_option), which happens to be sorted, but this is not the primary concern of the PR"
    severity: low

  - rule: "All agent tools should have corresponding test coverage in the same PR"
    source:
      path: "tests/mcp/run-code.spec.ts"
      lines: "1-20"
      commit: "703996071cb3a7ec642b30a2b428c369c3ebb7c7"
    collision_type: scope_ambiguity
    why_distracting: "Tests exist and were updated, but the primary task is the tool implementation and config updates, not adding new test coverage"
    severity: low
