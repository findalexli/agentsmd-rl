distractors:
- rule: 'Comments: Only add non-JSDoc comments when the code is doing something surprising
    or non-obvious'
  collision_type: scope_ambiguity
  why_distracting: The rule states to 'Only add non-JSDoc comments when the code is
    doing something surprising or non-obvious'. An agent might strictly interpret
    this and omit inline comments explaining the XML exclusion or the text-based type
    matching, but the gold solution includes these comments because the XML spec behavior
    is genuinely non-obvious to most developers.
  severity: medium
  source:
    path: AGENTS.md
    lines: 25-25
- rule: 'Test Structure: No loops or conditionals in test suites'
  collision_type: scope_ambiguity
  why_distracting: The agent might see the detailed test structure guidelines and
    assume it needs to write tests for the new functions. However, the prompt only
    asks for code changes and documentation updates, making test creation a waste
    of effort for this specific task.
  severity: low
  source:
    path: AGENTS.md
    lines: 27-28
- rule: 'Philosophy: Web standards-first, runtime-agnostic. Use Web Streams API, Uint8Array,
    Web Crypto API, Blob/File instead of Node.js APIs'
  collision_type: architecture_boundary
  why_distracting: The rule encourages using Web standards like `Blob/File` instead
    of Node.js APIs. An agent might try to instantiate a `File` or `Blob` object to
    read its `.type` property to handle MIME types, but the task requires pure string
    manipulation of the MIME type string itself.
  severity: medium
  source:
    path: AGENTS.md
    lines: 14-14
hierarchy_analysis: The `AGENTS.md` file provides comprehensive monorepo guidelines.
  The most critical and counter-intuitive rule is the preference for `let` over `const`
  for local variables, which directly contradicts standard JavaScript/TypeScript conventions
  but is strictly followed in the gold solution. The versioning rules for v0.x packages
  (minor for features, patch for fixes) are also crucial for correctly generating
  the `.changes` files.
