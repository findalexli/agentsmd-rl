config_edits:
- path: CONTRIBUTING.md
  tier: 2
  gold_added: '# Build bun with the local JSC build — this automatically configures
    and builds JSC

    `bun run build:local` handles everything: configuring JSC, building JSC, and building
    Bun. On subsequent runs, JSC will incrementally rebuild if any WebKit sources
    changed. `ninja -Cbuild/debug-local` also works after the first build, and will
    build Bun+JSC.


    The build output goes to `./build/debug-local` (instead of `./build/debug`), so
    you''ll need to update a couple of places:

    Note that if you make changes to our [WebKit fork](https://github.com/oven-sh/WebKit),
    you will also have to change [`SetupWebKit.cmake`](/cmake/tools/SetupWebKit.cmake)
    to point to the commit hash.'
  gold_removed: '# Make a debug build of JSC. This will output build artifacts in
    ./vendor/WebKit/WebKitBuild/Debug

    # Optionally, you can use `bun run jsc:build` for a release build

    $ bun run jsc:build:debug && rm vendor/WebKit/WebKitBuild/Debug/JavaScriptCore/DerivedSources/inspector/InspectorProtocolObjects.h


    # After an initial run of `make jsc-debug`, you can rebuild JSC with:

    $ cmake --build vendor/WebKit/WebKitBuild/Debug --target jsc && rm vendor/WebKit/WebKitBuild/Debug/JavaScriptCore/DerivedSources/inspector/InspectorProtocolObjects.h


    # Build bun with the local JSC build

    Using `bun run build:local` will build Bun in the `./build/debug-local` directory
    (instead of `./build/debug`), you''ll have to change a couple of places to use
    this new directory:

    Note that if you change make changes to our [WebKit fork](https://github.com/oven-sh/WebKit),
    you will also have to change [`SetupWebKit.cmake`](/cmake/tools/SetupWebKit.cmake)
    to point to the commit hash.'
distractors:
- rule: 'Build Bun: `bun bd` - Creates a debug build at `./build/debug/bun-debug`'
  collision_type: scope_ambiguity
  why_distracting: The rule states that building Bun is done via `bun bd` and outputs
    to `./build/debug/bun-debug`. An agent might try to modify the `bun bd` script
    or document `bun bd` instead of `bun run build:local`, or incorrectly document
    the output directory as `./build/debug` instead of `./build/debug-local`.
  severity: high
  source:
    path: CLAUDE.md
    lines: 8-9
- rule: 'Run tests with your debug build: `bun bd test <test-file>`'
  collision_type: would_cause_bug
  why_distracting: The rule instructs to run tests using `bun bd test`. If an agent
    adds testing instructions to the local WebKit build documentation, it might incorrectly
    suggest `bun bd test`, which uses the standard debug build rather than the `debug-local`
    build created by `bun run build:local`.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 11-12
hierarchy_analysis: CLAUDE.md and AGENTS.md provide identical guidance focused on
  standard development workflows (`bun bd`). This PR specifically targets the local
  WebKit/JSC build workflow (`bun run build:local`), which has different output directories
  and commands. The agent must recognize that the standard build rules do not strictly
  apply to this specialized build configuration.
