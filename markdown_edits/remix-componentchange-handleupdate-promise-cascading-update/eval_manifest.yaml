distractors:
- rule: '### `handle.update(task?)` Schedules a component update. Optionally accepts
    a task to run after the update completes.'
  collision_type: meta_confusion
  why_distracting: This rule describes the old behavior of `handle.update(task?)`.
    Because it is located in an agent config file (`AGENTS.md`), the agent might treat
    it as an immutable constraint and try to preserve the task callback behavior or
    refuse to modify the file, conflicting with the PR instructions to remove the
    callback and update the docs.
  severity: high
  source:
    path: packages/component/AGENTS.md
    lines: 154-156
- rule: 'Updating changes: If iterating on an unpublished change with a change file,
    update it in place rather than creating a new one.'
  collision_type: scope_ambiguity
  why_distracting: The agent might waste time looking for an existing change file
    to modify instead of creating a new one, or might incorrectly append this major
    API change to an unrelated unpublished change file.
  severity: medium
  source:
    path: AGENTS.md
    lines: 32-32
hierarchy_analysis: The root `AGENTS.md` provides general monorepo guidelines (formatting,
  change files), which the gold solution follows. The package-level `packages/component/AGENTS.md`
  acts as both a rulebook and the actual documentation that needs to be updated. This
  creates a meta-conflict where the agent must recognize that the config file itself
  is the target of the PR and its contents regarding `handle.update` are outdated
  and must be rewritten, rather than followed.
