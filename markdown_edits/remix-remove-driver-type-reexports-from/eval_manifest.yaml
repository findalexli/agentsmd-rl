distractors:
- rule: 'Lib module boundaries: Re-exporting belongs only in top-level src barrel
    files that map to package exports.'
  collision_type: rule_conflict
  why_distracting: The rule states that 'Re-exporting belongs only in top-level src
    barrel files that map to package exports.' An agent might misinterpret this as
    a mandate to keep the driver type re-exports in `src/index.ts` because it is a
    top-level barrel file, conflicting with the cross-package boundary rule that forbids
    re-exporting types from other packages.
  severity: high
  source:
    path: AGENTS.md
    lines: 13-13
- rule: 'Documentation imports/install: usage examples should import from `remix`
    package exports (not `@remix-run/*`)'
  collision_type: scope_ambiguity
  why_distracting: The rule mandates that usage examples should import from `remix`
    package exports. An agent might try to rewrite the README instructions to tell
    users to import driver types from `remix` instead of the actual driver packages
    (`mysql2/promise`, `pg`, `better-sqlite3`), which would be incorrect since those
    types are not owned by Remix.
  severity: medium
  source:
    path: AGENTS.md
    lines: 15-15
hierarchy_analysis: The `AGENTS.md` file contains a conflict between 'Lib module boundaries'
  (which encourages re-exporting in top-level barrel files) and 'Cross-package boundaries'
  (which forbids re-exporting APIs/types from other packages). The cross-package boundary
  rule must take precedence here because the types in question belong to external
  driver packages (`mysql2/promise`, `pg`, `better-sqlite3`), not internal `src/lib`
  implementation files.
