distractors:
- rule: Common Commands include `yarn stop-only` and `yarn stop-only-all`
  collision_type: rule_conflict
  why_distracting: The agent might see these commands documented as 'Common Commands'
    and either try to use them to verify its work, or fail to remove them from `AGENTS.md`
    because they appear to be standard, required project tooling.
  severity: high
  source:
    path: AGENTS.md
    lines: 71-75
- rule: 'Self-Improvement Loop: After ANY correction from the user: update the closest
    relevant `CLAUDE.md` file'
  collision_type: meta_confusion
  why_distracting: The prompt explicitly asks to update `AGENTS.md` with the new enforcement
    mechanism. The agent might read this rule and incorrectly update `CLAUDE.md` as
    well, thinking it's a required meta-step for any instruction update.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 18-20
hierarchy_analysis: '`CLAUDE.md` provides general agent behavior and meta-instructions,
  while `AGENTS.md` provides project-specific commands and architecture. The PR requires
  modifying the project-specific documentation (`AGENTS.md`) to reflect the removal
  of `stop-only`, which directly conflicts with the existing ''Common Commands'' in
  `AGENTS.md`. The agent must prioritize the PR instructions over the existing documentation
  in `AGENTS.md` and avoid the meta-instruction in `CLAUDE.md` to update itself.'
