config_edits:
- path: AGENTS.md
  tier: 1
  gold_added: '9. **Never close HTTP/SDK clients on cache eviction**: Do not add `close()`,
    `aclose()`, or `create_task(close_fn())` inside `LLMClientCache._remove_key()`
    or any cache eviction path. Evicted clients may still be held by in-flight requests;
    closing them causes `RuntimeError: Cannot send a request, as the client has been
    closed.` in production after the cache TTL (1 hour) expires. Connection cleanup
    is handled at shutdown by `close_litellm_async_clients()`. See PR #22247 for the
    full incident history.'
  gold_removed: ''
- path: CLAUDE.md
  tier: 1
  gold_added: '### HTTP Client Cache Safety

    - **Never close HTTP/SDK clients on cache eviction.** `LLMClientCache._remove_key()`
    must not call `close()`/`aclose()` on evicted clients — they may still be used
    by in-flight requests. Doing so causes `RuntimeError: Cannot send a request, as
    the client has been closed.` after the 1-hour TTL expires. Cleanup happens at
    shutdown via `close_litellm_async_clients()`.'
  gold_removed: ''
distractors:
- rule: Add at least 1 test in `tests/litellm/`
  collision_type: scope_ambiguity
  why_distracting: The bug involves a 1-hour TTL cache eviction during an in-flight
    streaming request, which is highly complex to simulate in a unit test. The gold
    solution omits tests. An agent trying to follow this rule might get stuck writing
    a complex, flaky mock test.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 26-27
- rule: Async/await patterns throughout
  collision_type: would_cause_bug
  why_distracting: The original buggy code uses `asyncio.get_running_loop().create_task(close_fn())`
    to close the client asynchronously. An agent might misinterpret the `RuntimeError`
    as an issue with how the async task is created or awaited, and attempt to fix
    the async pattern instead of removing the client closure logic entirely.
  severity: high
  source:
    path: CLAUDE.md
    lines: 63-63
- rule: Include proper error handling with provider-specific exceptions
  collision_type: would_cause_bug
  why_distracting: The issue describes a `RuntimeError` during streaming requests.
    An agent might try to add a `try/except` block to catch this error in the streaming
    code and wrap it in a provider-specific exception, rather than fixing the root
    cause (the eager client closure in the cache eviction).
  severity: high
  source:
    path: AGENTS.md
    lines: 34-35
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` mandate adding tests for PRs.
  However, for this specific concurrency/TTL bug, the gold solution bypasses these
  testing rules, indicating that for highly complex production race conditions, fixing
  the root cause takes precedence over mandatory test coverage if the test would be
  excessively complex. Additionally, `CLAUDE.md`'s emphasis on async/await patterns
  could mislead an agent into fixing the async task rather than removing the invalid
  logic.
