config_edits:
- path: apps/cli/README.md
  tier: 2
  gold_added: '# @lobehub/cli


    LobeHub command-line interface.


    ## Local Development


    | Task                                       | Command                    |

    | ------------------------------------------ | -------------------------- |

    | Run in dev mode                            | `bun run dev -- <command>` |

    | Build the CLI                              | `bun run build`            |

    | Link `lh`/`lobe`/`lobehub` into your shell | `bun run cli:link`         |

    | Remove the global link                     | `bun run cli:unlink`       |


    - `bun run build` only generates `dist/index.js`.

    - To make `lh` available in your shell, run `bun run cli:link`.

    - After linking, if your shell still cannot find `lh`, run `rehash` in `zsh`.


    ## Shell Completion


    ### Install completion for a linked CLI


    | Shell  | Command                        |

    | ------ | ------------------------------ |

    | `zsh`  | `source <(lh completion zsh)`  |

    | `bash` | `source <(lh completion bash)` |


    ### Use completion during local development


    | Shell  | Command                                      |

    | ------ | -------------------------------------------- |

    | `zsh`  | `source <(bun src/index.ts completion zsh)`  |

    | `bash` | `source <(bun src/index.ts completion bash)` |


    - Completion is context-aware. For example, `lh agent <Tab>` shows agent subcommands
    instead of top-level commands.

    - If you update completion logic locally, re-run the corresponding `source <(...)`
    command to reload it in the current shell session.

    - Completion only registers shell functions. It does not install the `lh` binary
    by itself.


    ## Quick Check


    ```bash

    which lh

    lh --help

    lh agent <TAB>

    ```'
  gold_removed: ''
distractors:
- rule: Place business components and domain logic in `src/features/`
  collision_type: architecture_boundary
  why_distracting: The agent might try to place the completion logic inside `src/features/completion`
    or `src/features/cli` instead of the requested `apps/cli/src/commands/` and `apps/cli/src/utils/`
    directories, misunderstanding that the CLI is a separate Node.js app and not part
    of the SPA.
  severity: high
  source:
    path: CLAUDE.md
    lines: 38-42
- rule: Use `pnpm` as the primary package manager
  collision_type: rule_conflict
  why_distracting: The agent might document the CLI commands using `pnpm run build`
    or `pnpm run dev` in the README, conflicting with the specific instruction to
    use `bun` for running scripts.
  severity: medium
  source:
    path: AGENTS.md
    lines: 35-36
- rule: Add i18n keys to `src/locales/default/namespace.ts`
  collision_type: architecture_boundary
  why_distracting: The agent might try to extract the CLI completion descriptions
    or help text into the global i18n namespace (`src/locales/default/namespace.ts`),
    which is only meant for the frontend SPA.
  severity: medium
  source:
    path: AGENTS.md
    lines: 56-57
hierarchy_analysis: '`CLAUDE.md` and `AGENTS.md` provide global rules that are heavily
  biased towards the Next.js/React frontend SPA. The `apps/cli` package is a separate
  Node.js CLI tool that does not follow the SPA architecture (routes/features) or
  the frontend i18n system. Agents must recognize the architectural boundary between
  the web app and the CLI package to avoid applying frontend-specific rules to the
  CLI codebase. There is also a direct rule conflict in `AGENTS.md` between using
  `pnpm` as the primary package manager and using `bun` to run scripts, where the
  latter takes precedence for documentation in the CLI README.'
