metadata:
  title: Fix duplicate payment toast by stabilizing React useEffect dependencies
  description: >
    Fixes a bug where the "Payment successful" toast was displayed multiple times
    after Stripe checkout. The root cause was that the `searchParams` object and
    `trackCreditsPurchased` function in the useEffect dependency array had unstable
    references, causing the effect to re-fire on every re-render.
  bug_type: stale_closure
  category: frontend
  language: typescript
  framework: react

