    commit: 722e235a37e4a9f3e288e54629179befa494156b
- rule: Run `pre-commit run --all-files` before committing
  source:
    path: CLAUDE.md
    lines: 46-46
  evidence: 'The gold solution reformats the `mbridge.AutoBridge.from_pretrained`
    call on lines 356-358 to comply with line length limits, demonstrating that a
