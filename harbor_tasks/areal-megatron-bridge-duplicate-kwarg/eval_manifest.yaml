  category: tooling
distractors:
- rule: Add tests for new functionality
  collision_type: scope_ambiguity
  why_distracting: This is a bug fix for a duplicate keyword argument (a Python syntax/runtime
    error), not new functionality. Attempting to add a test for `MegatronEngine` initialization
    would likely require complex mocking or multi-node GPU hardware, wasting agent
    effort on a trivial fix.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 48-48
- rule: Integration tests require multi-node hardware; explain skips when unavailable
  collision_type: meta_confusion
  why_distracting: The agent might try to run the test suite to verify the fix, encounter
    failures due to missing multi-node hardware, and either get stuck trying to fix
    the tests or add unnecessary skip explanations to the PR for a simple syntax error
    fix.
  severity: low
  source:
    path: CLAUDE.md
    lines: 42-43
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` provide consistent, overlapping
  rules. `AGENTS.md` is specifically tailored for AI agents and reinforces the constraints
  in `CLAUDE.md`. There are no direct conflicts between the two files; they act accumulatively.
