distractors:
- rule: If you are changing Next.js source or integration tests, start `pnpm --filter=next
    dev` in a separate terminal session before making edits
  collision_type: scope_ambiguity
  why_distracting: The rule explicitly instructs the agent to start the framework
    build watcher (`pnpm --filter=next dev`) when changing integration tests. However,
    since this PR only modifies a test file and not the Next.js framework source,
    running the framework watcher is unnecessary, wastes background resources, and
    distracts from simply running the test itself.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 67-69
- rule: Before editing or creating files in any subdirectory... read all README.md
    files in the directory path from the repo root up to and including the target
    file's directory.
  collision_type: scope_ambiguity
  why_distracting: The rule asks the agent to read all README.md files in the directory
    path up to the target file. For a localized Playwright test flake fix (changing
    a timeout), searching for and reading READMEs up the `test/development/app-dir/...`
    tree is a waste of time and context window.
  severity: low
  source:
    path: CLAUDE.md
    lines: 41-43
hierarchy_analysis: The config files `CLAUDE.md` and `AGENTS.md` are identical symlinks.
  They provide general repository guidance (building, testing, and reading READMEs)
  but lack specific rules regarding Playwright test conventions or timeout handling.
  The agent must rely on the issue description rather than the config files to understand
  the distinction between `elementByCssInstant` and `elementByCss` with a timeout.
