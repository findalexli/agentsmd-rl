source_pr:
  owner: TanStack
  repo: router
  number: 6887
  title: "refactor(vue-router): Link 'from' default is handled by buildLocation like solid & react"
  merge_commit: d5622bb413a2d1ac99c546c5336be949dfb351d9
  base_commit: fb1e8b20f9f157ad46aeade73b69c2b409d9c662

checks:
  # Structural / Fail-to-pass tests
  - id: test_last_match_id_removed_from_stores_ts
    type: fail_to_pass
    origin: agent_config
    description: "lastMatchId store should be removed from stores.ts"
    source:
      file: packages/router-core/src/stores.ts
      reason: "PR removes lastMatchId from RouterStores interface and implementation"

  - id: test_last_import_removed_from_stores_ts
    type: fail_to_pass
    origin: agent_config
    description: "'last' import should be removed from stores.ts"
    source:
      file: packages/router-core/src/stores.ts
      reason: "last() is no longer used in stores.ts after removing lastMatchId"

  - id: test_last_match_route_full_path_removed
    type: fail_to_pass
    origin: agent_config
    description: "lastMatchRouteFullPath should be removed from vue-router"
    source:
      file: packages/vue-router/src/routerStores.ts
      reason: "PR removes lastMatchRouteFullPath store entirely"

  - id: test_router_ts_uses_last_on_matches_id
    type: fail_to_pass
    origin: agent_config
    description: "router.ts should use last(this.stores.matchesId.state)"
    source:
      file: packages/router-core/src/router.ts
      reason: "PR changes router.ts to use last(matchesId.state) instead of lastMatchId.state"

  - id: test_vue_link_no_manual_from_computed
    type: fail_to_pass
    origin: agent_config
    description: "vue-router link.tsx should not manually compute 'from'"
    source:
      file: packages/vue-router/src/link.tsx
      reason: "PR removes manual from computation and _options wrapper"

  - id: test_vue_link_uses_options_directly
    type: fail_to_pass
    origin: agent_config
    description: "vue-router link.tsx should use options directly"
    source:
      file: packages/vue-router/src/link.tsx
      reason: "PR passes options directly to buildLocation instead of _options.value"

  # Repo CI/CD / Pass-to-pass tests
  - id: test_router_core_typescript_types
    type: pass_to_pass
    origin: repo_tests
    description: "router-core TypeScript types compile"

  - id: test_vue_router_typescript_types
    type: pass_to_pass
    origin: repo_tests
    description: "vue-router TypeScript types compile"

  - id: test_router_core_build
    type: pass_to_pass
    origin: repo_tests
    description: "router-core builds successfully"

  - id: test_vue_router_build
    type: pass_to_pass
    origin: repo_tests
    description: "vue-router builds successfully"

  - id: test_router_core_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: "router-core unit tests pass (1052 tests)"

  - id: test_vue_router_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: "vue-router unit tests pass (759 tests)"

  - id: test_router_core_lint
    type: pass_to_pass
    origin: repo_tests
    description: "router-core ESLint checks pass"

  - id: test_vue_router_lint
    type: pass_to_pass
    origin: repo_tests
    description: "vue-router ESLint checks pass"

  - id: test_router_core_build_check
    type: pass_to_pass
    origin: repo_tests
    description: "router-core package exports validation passes"

rubric:
  - criterion: "Framework-agnostic core logic"
    description: "The lastMatchId store was removed from router-core as it was Vue/React-specific"
    applies: true
  - criterion: "Consistent implementation across frameworks"
    description: "Vue-router now handles 'from' default like solid & react implementations"
    applies: true
  - criterion: "TypeScript strict mode compliance"
