rubric:
- rule: When adding area documentation to AGENTS.md, new sections must use the same
    header format as existing sections (e.g., '## FIR (K2 Frontend)')
  source:
    path: compiler/AGENTS.md
    lines: 25-29
    commit: base
- rule: AGENTS.md documentation for compiler areas must include the location/directory
    path for the component
  source:
    path: compiler/AGENTS.md
    lines: 9-11
    commit: base
- rule: AGENTS.md documentation should reference key types/classes used in the component
    (e.g., FirElement for FIR frontend)
  source:
    path: .ai/guidelines.md
    lines: '40'
    commit: base
