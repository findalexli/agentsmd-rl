rubric:
- rule: 'The fix should be minimal and only touch configuration_utils.py without modifying
    any # Copied from blocks or generated files.'
  reference: Add model_type override logic to _get_config_dict method in configuration_utils.py
- rule: No low-value busywork PRs
  source:
    path: CLAUDE.md
    lines: 42-44
  evidence: The gold solution implements a functional bug fix to allow `model_type`
    overrides for inference frameworks, which is a substantive behavioral change rather
    than a mechanical cleanup or typo fix.
  category: architecture
distractors:
- rule: 'Fail-closed behavior for agents: If coordination evidence cannot be found,
    do not proceed to PR-ready output.'
  collision_type: meta_confusion
  why_distracting: The task prompt does not provide coordination evidence (issue links,
    approval). Following this rule would cause the agent to refuse to generate the
    patch, failing the benchmark task.
  severity: high
  source:
    path: AGENTS.md
    lines: 64-68
- rule: 'Avoid direct inheritance between model-specific files in src/transformers/models/
    by using # Copied from or modular_<name>.py files.'
  collision_type: scope_ambiguity
  why_distracting: The rule applies to model-specific files in `src/transformers/models/`,
    but the agent might mistakenly apply it to `configuration_utils.py` and look for
    `# Copied from` blocks or try to create a modular file.
  severity: low
  source:
    path: AGENTS.md
    lines: 70-76
hierarchy_analysis: The config files AGENTS.md and CLAUDE.md are identical and sit
  at the root level. They contain meta-instructions for agent behavior (coordination,
  fail-closed) that conflict with the standard benchmark evaluation paradigm where
  the agent must output code regardless of missing issue links.
