    file: "tests/test_outputs.py"
    test_function: "test_resolved_location_set_after_hydration"
    type: "fail_to_pass"
    points: 50

  - id: "fix_location_correct"
    name: "Fix is in correct location"
    description: "Verify the fix is placed after dehydrated flag cleanup"
    file: "tests/test_outputs.py"
    test_function: "test_fix_is_in_hydrate_function_path"
    type: "pass_to_pass"
    points: 15

  - id: "typescript_compiles"
    name: "TypeScript compiles"
    description: "Verify the modified TypeScript compiles without errors"
    file: "tests/test_outputs.py"
    test_function: "test_typescript_compiles"
