source_pr:
  owner: TanStack
  repo: router
  number: 7066
  merge_commit: 6ee0e795b085651beb2f1ac6503cdbd7eaffedd1
  base_commit: a556afa0f07c551cc0edaf17fa7d0de7014a1c68

title: "Fix SSR hash scroll preservation after hydration"

description: |
  TanStack Router has an SSR hydration bug where the scroll position anchored to a
  URL hash (e.g., /page#section) gets reset when preloading another route or
  invalidating router data. The fix sets `router.stores.resolvedLocation` after
  SSR hydration to prevent re-running hash scroll on subsequent load cycles.

repository:
  url: https://github.com/TanStack/router.git
  base_commit: a556afa0f07c551cc0edaf17fa7d0de7014a1c68
  language: typescript
  framework: tanstack-router

# For each test_* function in test_outputs.py, define a check
checks:
  - id: "solve_sh_exists"
    name: "solve.sh exists"
    description: "Verify the solve.sh patch script exists"
    file: "tests/test_outputs.py"
    test_function: "test_solve_sh_exists"
    type: "existence"
    points: 5

  - id: "ssr_client_exists"
    name: "SSR client file exists"
    description: "Verify the target ssr-client.ts file exists"
    file: "tests/test_outputs.py"
    test_function: "test_ssr_client_file_exists"
    type: "existence"
    points: 5

  - id: "hydrate_function_exists"
    name: "hydrate function exists"
    description: "Verify the hydrate function exists in ssr-client.ts"
    file: "tests/test_outputs.py"
    test_function: "test_hydrate_function_exists"
