title: Fix SSR hash scroll preservation after hydration
description: 'TanStack Router has an SSR hydration bug where the scroll position anchored
  to a

  URL hash (e.g., /page#section) gets reset when preloading another route or

  invalidating router data. The fix sets `router.stores.resolvedLocation` after

  SSR hydration to prevent re-running hash scroll on subsequent load cycles.

  '
