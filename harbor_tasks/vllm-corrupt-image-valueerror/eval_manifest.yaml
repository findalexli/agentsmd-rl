  merge_commit: "7e76af14fabfc72144c627331b87d581df361158"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified source file must be valid Python"

  - id: load_bytes_valid_png
    type: pass_to_pass
    origin: pr_diff
    description: "load_bytes returns correctly-sized image for valid PNG data"

  - id: load_bytes_valid_jpeg
    type: pass_to_pass
    origin: pr_diff
    description: "load_bytes returns correctly-sized image for valid JPEG data"

  - id: load_file_valid
    type: pass_to_pass
    origin: pr_diff
    description: "load_file returns correctly-sized image for a valid PNG file"

  - id: load_bytes_garbage_raises_valueerror
    type: fail_to_pass
    origin: pr_diff
    description: "load_bytes raises ValueError for random non-image bytes"

  - id: load_bytes_truncated_png_raises_valueerror
    type: fail_to_pass
    origin: pr_diff
    description: "load_bytes raises ValueError for a truncated PNG"

  - id: load_bytes_truncated_jpeg_raises_valueerror
    type: fail_to_pass
    origin: pr_diff
    description: "load_bytes raises ValueError for a truncated JPEG"

  - id: load_bytes_empty_raises_valueerror
    type: fail_to_pass
    origin: pr_diff
    description: "load_bytes raises ValueError for empty bytes"

  - id: load_file_garbage_raises_valueerror
    type: fail_to_pass
    origin: pr_diff
    description: "load_file raises ValueError for a file with garbage data"

  - id: load_file_truncated_raises_valueerror
    type: fail_to_pass
    origin: pr_diff
    description: "load_file raises ValueError for a file with truncated image data"

rubric: []
  # No subjective rules — AGENTS.md at base commit contains only
