version: "2.0"

source:
  repo: "oven-sh/bun"
  pr: 28829
  base_commit: "686eda3cb4773bb1ffe77cbdef6d0507d8fc2314"
  merge_commit: "de10885151f54491daaa9352b4ff07db002a7339"

checks:
  # Existing pass_to_pass checks
  - id: zig_file_parses
    type: pass_to_pass
    origin: static
    description: "Modified Zig file must be readable and have expected structure"

  - id: lookup_function_has_real_logic
    type: pass_to_pass
    origin: static
    description: "LibInfo.lookup function must have substantial implementation"

  # Repo CI checks (pass_to_pass) - from package.json and .github/workflows/format.yml
  - id: zig_file_formatted
    type: pass_to_pass
    origin: repo_tests
    description: "Modified Zig file must pass zig fmt --check (from package.json fmt:zig)"

  - id: no_banned_patterns
    type: pass_to_pass
    origin: repo_tests
    description: "Modified code must not contain banned patterns from test/internal/ban-words.test.ts (from package.json banned)"

  - id: zig_syntax_basic
    type: pass_to_pass
    origin: repo_tests
    description: "Basic Zig syntax validation - balanced braces, valid function declarations"

  # Fail-to-pass checks
  - id: no_fixed_buffer_used
    type: fail_to_pass
    origin: pr_diff
    description: "The vulnerable fixed 1024-byte buffer pattern must be removed"

  - id: stack_fallback_pattern_present
    type: fail_to_pass
    origin: pr_diff
    description: "The safe stackFallback allocator pattern must be present"

  - id: dynamic_allocation_with_dupeZ
    type: fail_to_pass
    origin: pr_diff
    description: "The fix must use dupeZ for dynamic allocation of the hostname"

  - id: proper_cleanup_with_defer_free
    type: fail_to_pass
    origin: pr_diff
    description: "The fix must properly free the allocated memory with defer"

rubric: []
