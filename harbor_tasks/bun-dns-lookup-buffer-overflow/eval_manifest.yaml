rubric:
- rule: Memory management - In Zig code, be careful with allocators and use defer
    for cleanup
  source:
    path: CLAUDE.md
    lines: '40'
    commit: 686eda3cb4773bb1ffe77cbdef6d0507d8fc2314
- rule: Always use bun.* APIs instead of std.*. The bun namespace provides cross-platform
    wrappers that preserve OS error info and never use unreachable. Using std.fs,
    std.posix, or std.os directly is wrong in this codebase.
  source:
    path: src/CLAUDE.md
    lines: 10-29
    commit: 686eda3cb4773bb1ffe77cbdef6d0507d8fc2314
- rule: Use std.heap.stackFallback with bun.default_allocator for dynamic allocation
    instead of fixed buffers when handling variable-length inputs
  source:
    path: .claude/skills/zig-system-calls/SKILL.md
    lines: 30-40
    commit: 686eda3cb4773bb1ffe77cbdef6d0507d8fc2314
- rule: Never use `@import()` inline inside of functions. Always put them at the bottom
    of the file or containing struct.
  source:
    path: src/CLAUDE.md
    lines: '11'
  evidence: The gold solution uses `std.heap.stackFallback` and `bun.default_allocator`
    directly within the `lookup` function without adding any inline `@import("std")`
    or `@import("bun")` statements.
  category: style
distractors:
- rule: Always use `bun.*` APIs instead of `std.*`.
  collision_type: scope_ambiguity
  why_distracting: The rule explicitly states 'Always use bun.* APIs instead of std.*'.
    An agent might strictly follow this and avoid using `std.heap.stackFallback`,
    instead trying to guess a non-existent `bun.heap.stackFallback` or implementing
    a custom allocator. The rule is intended for OS/FS/crypto wrappers, not standard
    memory allocators.
  severity: high
  source:
    path: src/CLAUDE.md
    lines: '16'
- rule: If no valid issue number is provided, find the best existing file to modify
    instead, such as `test/js/bun/` for Bun-specific API tests.
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to write a test for the >1024 byte DNS
    resolution in `test/js/bun/`. Testing this specific buffer overflow requires complex
    network mocking or specific OS-level DNS configurations that are likely to fail
    or be flaky, which is why the gold solution omits a test.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 44-46
hierarchy_analysis: The root `CLAUDE.md` provides general testing and building guidelines,
  while `src/CLAUDE.md` provides Zig-specific coding conventions. The strict rule
  in `src/CLAUDE.md` against using `std.*` APIs conflicts with the necessary use of
  `std.heap.stackFallback` for this specific memory allocation fix.
