rubric:
- rule: Memory management - In Zig code, be careful with allocators and use defer
    for cleanup
  source:
    path: CLAUDE.md
    lines: '40'
    commit: 686eda3cb4773bb1ffe77cbdef6d0507d8fc2314
- rule: Always use bun.* APIs instead of std.*. The bun namespace provides cross-platform
    wrappers that preserve OS error info and never use unreachable. Using std.fs,
    std.posix, or std.os directly is wrong in this codebase.
  source:
    path: src/CLAUDE.md
    lines: 10-29
    commit: 686eda3cb4773bb1ffe77cbdef6d0507d8fc2314
- rule: Use std.heap.stackFallback with bun.default_allocator for dynamic allocation
    instead of fixed buffers when handling variable-length inputs
  source:
    path: .claude/skills/zig-system-calls/SKILL.md
    lines: 30-40
    commit: 686eda3cb4773bb1ffe77cbdef6d0507d8fc2314
- rule: Never use `@import()` inline inside of functions.
  source:
    path: src/AGENTS.md
    lines: 10-11
  evidence: The gold solution uses `std.heap.stackFallback` without adding an inline
    `@import("std")` inside the `lookup` function, adhering to the rule against inline
    imports.
  category: style
distractors:
- rule: Always use `bun.*` APIs instead of `std.*`.
  collision_type: rule_conflict
  why_distracting: The config explicitly states 'Always use `bun.*` APIs instead of
    `std.*`'. An overzealous agent might try to modify the provided `std.heap.stackFallback`
    snippet to use a non-existent `bun.heap.stackFallback` or `bun.stackFallback`
    to comply with this strict repository rule.
  severity: high
  source:
    path: src/AGENTS.md
    lines: 15-16
hierarchy_analysis: The repository contains duplicated config files at the root (`AGENTS.md`,
  `CLAUDE.md`) and in `src/` (`src/AGENTS.md`, `src/CLAUDE.md`). The agent must navigate
  this moderate hierarchy and recognize that the specific PR instruction to use `std.heap.stackFallback`
  overrides the general repository rule against `std.*` APIs.
