# eval_manifest.yaml for continue#11836
# fix: lazy-load Ollama /api/show to reduce unnecessary requests

pr_metadata:
  owner: continuedev
  repo: continue
  pr_number: 11836
  base_commit: 2f52b46ec2c59bb3bf2f5df1c4630b001676e08d
  merge_commit: 8b9f4ab625519ef1fce5077c01493836f7120959
  title: "fix: lazy-load Ollama /api/show to reduce unnecessary requests"
  description: |
    This PR fixes an issue where using AUTODETECT with many Ollama models caused ~600
    /api/show POST requests in 5 seconds with 59 models. The problem occurred because
    the Ollama constructor fired an HTTP request to /api/show on every model instantiation.

    Key changes:
    - Moved /api/show call from constructor to lazy ensureModelInfo() method
    - Caches the response promise per instance
    - Fixed null-check regex for model parameters parsing
    - Respects explicitly configured contextLength

