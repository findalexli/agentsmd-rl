rubric:
- rule: Use @pytest.mark.parametrize for multiple similar inputs
  type: agent_config
  source: CLAUDE.md:120-121
  description: Tests should use pytest.mark.parametrize for testing multiple affinity
    configurations
- rule: Add tests for new behavior — cover success, failure, and edge cases
  type: agent_config
  source: CLAUDE.md:125
  description: Any new test files or test modifications should include tests for success,
    failure, and edge cases
- rule: Always format and check Python files with ruff immediately after writing or
    editing
  type: agent_config
  source: CLAUDE.md:95-96
  description: Python files must be formatted with ruff format and checked with ruff
    check --fix
- rule: Helm chart changes must include updates to values.schema.json
  type: inferred
  description: When adding new configuration fields to values.yaml, the schema must
    be updated
- rule: Deprecated fields should show deprecation warnings in NOTES.txt
  type: inferred
  description: When deprecating a field, NOTES.txt should warn users about the change
    and suggest alternatives
- rule: New affinity fields should take precedence over old deprecated field
  type: inferred
  description: workers.kubernetes.affinity and workers.celery.affinity should take
    precedence over workers.affinity
- rule: 'Run specific Helm test type: `breeze testing helm-tests --use-xdist --test-type
    <type>`'
  source:
    path: CLAUDE.md
    lines: 25-27
  evidence: 'The gold solution modifies tests in `helm-tests/tests/helm_tests/airflow_aux/`
    and `helm-tests/tests/helm_tests/airflow_core/`, which align perfectly with the
    specific Helm test types (`airflow_aux`, '
  category: testing
distractors:
- rule: 'Run a single test: `uv run --project <PROJECT> pytest path/to/test.py::TestClass::test_method
    -xvs`'
  collision_type: scope_ambiguity
  why_distracting: The agent might try to run helm tests using `uv run --project helm-tests
    pytest ...` which is intended for standard Python packages. Helm tests require
    the specific `breeze testing helm-tests` command to properly render charts and
    set up the Kubernetes testing environment.
  severity: high
  source:
    path: CLAUDE.md
    lines: 16-18
- rule: 'Determine which tests to run based on changed files: `breeze selective-checks
    --commit-ref <commit_with_squashed_changes>`'
  collision_type: meta_confusion
  why_distracting: The agent might try to use `breeze selective-checks` to determine
    which tests to run, but this requires a specific git commit state (`<commit_with_squashed_changes>`)
    which may not exist or be properly formatted during the agent's iterative development
    process, leading to command failures.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 36-36
hierarchy_analysis: The config files CLAUDE.md and AGENTS.md are identical and provide
  a flat list of commands. The primary conflict arises from general Python testing
  commands (`uv run pytest`) versus domain-specific testing commands (`breeze testing
  helm-tests`). The agent must recognize that Helm chart modifications fall under
  a specialized testing domain.
