version: "2.0"

source:
  repo: "huggingface/transformers"
  pr: 44886
  base_commit: "b94fee049373eb2e140d4866847559c4c42b3d7e"
  merge_commit: "18f88de7f575410f3ad8a64418abf2572fecb259"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Both modified loss files must parse without errors"

  - id: lwdetr_loss_labels_float16_pow_promotion
    type: fail_to_pass
    origin: pr_diff
    description: "LwDetrImageLoss.loss_labels must not crash when pow promotes to float32 under float16 autocast"

  - id: rtdetr_loss_labels_vfl_float16_pow_promotion
    type: fail_to_pass
    origin: pr_diff
    description: "RTDetrLoss.loss_labels_vfl must not crash when pow promotes to float32 under float16 autocast"

  - id: lwdetr_loss_labels_float32
    type: pass_to_pass
    origin: pr_diff
    description: "LwDetrImageLoss.loss_labels still works with default float32 inputs"

  - id: rtdetr_loss_labels_vfl_float32
    type: pass_to_pass
    origin: pr_diff
    description: "RTDetrLoss.loss_labels_vfl still works with default float32 inputs"

  - id: no_bare_type_ignore
    type: pass_to_pass
    origin: agent_config
    description: "type: ignore comments must include specific error codes, not bare"
    source:
      path: ".ai/skills/add-or-fix-type-checking/SKILL.md"
      lines: "185-186"
      commit: "b94fee049373eb2e140d4866847559c4c42b3d7e"

  - id: test_repo_import_lw_detr_loss
    type: pass_to_pass
    origin: repo_tests
    description: "LwDetrImageLoss can be imported from loss_lw_detr"

  - id: test_repo_import_rt_detr_loss
    type: pass_to_pass
    origin: repo_tests
    description: "RTDetrLoss can be imported from loss_rt_detr"

  - id: test_repo_py_compile_loss_files
    type: pass_to_pass
    origin: repo_tests
    description: "Both modified loss files compile with py_compile"

  - id: test_repo_transformers_package_imports
    type: pass_to_pass
    origin: repo_tests
    description: "transformers package imports correctly from source"

rubric:
  - rule: "Bugfix PRs in particular can often be only one or two lines long, and do not need large comments, docstrings or new functions in this case. Aim to minimize the size of the diff."
    source:
      path: ".github/copilot-instructions.md"
      lines: "15"
      commit: "b94fee049373eb2e140d4866847559c4c42b3d7e"
