rubric:
- rule: Bugfix PRs in particular can often be only one or two lines long, and do not
    need large comments, docstrings or new functions in this case. Aim to minimize
    the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: b94fee049373eb2e140d4866847559c4c42b3d7e
- rule: We try to avoid direct inheritance between model-specific files
  source:
    path: CLAUDE.md
    lines: 60-62
  evidence: The gold solution implements the exact same autocast dtype fix (`.to(dtype)`)
    independently in both `loss_lw_detr.py` and `loss_rt_detr.py` rather than attempting
    to refactor them to inherit from a co
  category: architecture
distractors:
- rule: Do not edit a `# Copied from` block... Ideally you should edit the code it's
    copying from and propagate the change
  collision_type: scope_ambiguity
  why_distracting: The agent might assume that because `loss_lw_detr.py` and `loss_rt_detr.py`
    require nearly identical fixes, one is copied from the other, and thus might try
    to only edit one file and run `make fix-repo` to propagate the change. However,
    these files do not use the `# Copied from` mechanism, so both must be edited manually.
  severity: high
  source:
    path: CLAUDE.md
    lines: 63-65
- rule: Do not open one-off PRs for tiny edits (single typo, isolated lint cleanup,
    one mutable default argument, etc.).
  collision_type: rule_conflict
  why_distracting: The issue description mentions a 'related deprecation warning...
    where a list is used for advanced indexing'. An agent might refuse to fix this,
    citing the rule against 'tiny edits' or 'isolated lint cleanup'. However, the
    rule only forbids *one-off* PRs for these; bundling the fix with the main AMP
    crash fix is correct and expected.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 38-39
hierarchy_analysis: Both CLAUDE.md and AGENTS.md contain identical rules. The rules
  primarily focus on PR submission policies and the `# Copied from` mechanism for
  model files.
