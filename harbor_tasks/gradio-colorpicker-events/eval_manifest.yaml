version: "2.0"

source:
  repo: "gradio-app/gradio"
  pr: 12862
  base_commit: "3f835cf9c6cdf570a107233e2a87e0dc5cd751cb"
  merge_commit: "a8e6b7ba1e6af793b6a200d4cc6b07f3151f229e"

checks:
  # --------------------------------------------------------------------------
  # Pass-to-pass (static - original)
  # --------------------------------------------------------------------------
  - id: svelte_structure_valid
    type: pass_to_pass
    origin: static
    description: "File exists and has basic Svelte structure (script + template)"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "Component is a real implementation, not a stub"

  # --------------------------------------------------------------------------
  # Pass-to-pass (static file analysis - added during p2p enrichment)
  # These use Python-based static analysis (Node.js/pnpm unavailable in Docker)
  # --------------------------------------------------------------------------
  - id: test_repo_svelte_syntax_valid
    type: pass_to_pass
    origin: static
    description: "Svelte file has valid syntax (balanced braces, no malformed tags). Mirrors: pnpm lint / ts:check"

  - id: test_repo_colorpicker_package_structure
    type: pass_to_pass
    origin: static
    description: "Colorpicker package has valid structure for build. Mirrors: pnpm build validation"

  - id: test_repo_svelte_5_event_handlers
    type: pass_to_pass
    origin: static
    description: "Component has proper Svelte 5 event handler structure. Mirrors: lint/typecheck for Svelte 5 migration compliance"

  # --------------------------------------------------------------------------
  # Fail-to-pass (pr_diff - original)
  # --------------------------------------------------------------------------
  - id: no_legacy_event_directives
    type: fail_to_pass
    origin: pr_diff
    description: "Template must not use Svelte 4 on:event directives"

  - id: dialog_button_focus_and_blur
    type: fail_to_pass
    origin: pr_diff
    description: "Dialog button must have onfocus/onblur handlers calling on_focus/on_blur props"

  - id: enter_key_triggers_submit
    type: fail_to_pass
    origin: pr_diff
    description: "Text input must fire on_submit when Enter is pressed"

  - id: native_click_handlers
    type: fail_to_pass
    origin: pr_diff
    description: "Buttons use native onclick instead of on:click"

  - id: svelte_window_native_handlers
    type: fail_to_pass
    origin: pr_diff
    description: "svelte:window uses native onmousemove/onmouseup"

rubric: []
