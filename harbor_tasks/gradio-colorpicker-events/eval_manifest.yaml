    description: "Buttons use native onclick instead of on:click"

  - id: svelte_window_native_handlers
    type: fail_to_pass
    origin: pr_diff
    description: "svelte:window uses native onmousemove/onmouseup"

  - id: not_stub
    type: pass_to_pass
