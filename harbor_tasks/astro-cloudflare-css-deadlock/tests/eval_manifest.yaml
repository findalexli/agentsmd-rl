source_pr:
  repo: withastro/astro
  number: 16011
  title: "Prevent dev server hang on first request with Cloudflare adapter"
  merge_commit: e752170b64f436ccb4acef9612951c50927afa0c
  base_commit: 6d182fe267586e2ee57113ad559912a456019306

checks:
  # Fail-to-pass tests (verify the bug is fixed)
  - id: test_typescript_compiles
    type: fail_to_pass
    origin: pr_diff
    description: "TypeScript must compile without errors - fix must not introduce syntax errors"

  - id: test_constants_defined_and_exported
    type: fail_to_pass
    origin: pr_diff
    description: "RESOLVED_MODULE_DEV_CSS* constants must be defined and exported for the guard to work"

  - id: test_virtual_css_guard_present
    type: fail_to_pass
    origin: pr_diff
    description: "ensureModulesLoaded must have the virtual CSS guard with all three checks"

  - id: test_guard_positioned_before_fetchmodule
    type: fail_to_pass
    origin: pr_diff
    description: "Guard must be placed BEFORE fetchModule call to prevent deadlock"

  # Pass-to-pass tests (verify the fix doesn't break existing functionality)
  - id: test_constants_imported
    type: pass_to_pass
    origin: repo_tests
    description: "RESOLVED_MODULE_DEV_CSS* constants must be imported in index.ts"

  - id: test_ensureModulesLoaded_structure_preserved
    type: pass_to_pass
    origin: repo_tests
    description: "Overall structure of ensureModulesLoaded is preserved with loop and recursion"

  - id: test_package_builds
    type: pass_to_pass
    origin: repo_tests
    description: "astro package builds without errors after the fix"

  - id: test_lint_passes
    type: pass_to_pass
    origin: repo_tests
    description: "Lint passes on the modified file following code style guidelines"

# Rubric - code quality rules for the gold PR fix
# These rules check the actual code changes, not agent workflow
rubric:
  - rule: "The guard for RESOLVED_MODULE_DEV_CSS must be placed before fetchModule call"
    source: packages/astro/src/vite-plugin-css/index.ts
    category: correctness

  - rule: "The code must use the RESOLVED_MODULE_DEV_CSS* constants imported from const.js"
    source: packages/astro/src/vite-plugin-css/index.ts
    category: correctness

  - rule: "The fix must skip all three virtual CSS module types: RESOLVED_MODULE_DEV_CSS, RESOLVED_MODULE_DEV_CSS_ALL, and RESOLVED_MODULE_DEV_CSS_PREFIX"
    source: packages/astro/src/vite-plugin-css/index.ts
    category: completeness

  - rule: "The guard condition must use 'continue' to skip processing, not return or break"
    source: packages/astro/src/vite-plugin-css/index.ts
    category: correctness

  - rule: "The fix must preserve the existing structure of ensureModulesLoaded (loop, seen set, recursion)"
    source: packages/astro/src/vite-plugin-css/index.ts
    category: structure

  - rule: "Code comments must explain the deadlock prevention rationale"
    source: packages/astro/src/vite-plugin-css/index.ts
    category: documentation

# Agent config files present at base commit
agent_configs:
  - path: AGENTS.md
    applies: true
  - path: .agents/skills/astro-developer/SKILL.md
    applies: true
  - path: .flue/sandbox/AGENTS.md
    applies: false  # CI-specific, not relevant to code changes

# Validation results (populated after running tests)
validation:
  nop_reward: 0  # Base commit - tests fail as expected
  gold_reward: 1  # With fix applied - all tests pass
  tests_count: 8
  f2p_tests: 4
  p2p_tests: 4
