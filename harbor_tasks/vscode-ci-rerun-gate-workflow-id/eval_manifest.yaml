    description: "Both modified TypeScript files are present in the workspace"

  - id: repo_tsfmt_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's TypeScript formatter check (tsfmt --dry) passes on modified files"

  - id: repo_tsfmt_check_widget
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's TypeScript formatter check passes on ciStatusWidget.ts"

  - id: model_file_parses
    type: pass_to_pass
    origin: repo_tests
    description: "GitHubPullRequestCIModel.ts is valid TypeScript that parses without errors"

  - id: widget_file_parses
    type: pass_to_pass
    origin: repo_tests
    description: "ciStatusWidget.ts is valid TypeScript that parses without errors"

  - id: parse_workflow_run_id_exported
    type: fail_to_pass
    origin: pr_diff
    description: "parseWorkflowRunId must be exported and callable from external modules"

  - id: widget_imports_and_uses_parse_workflow_run_id
    type: fail_to_pass
    origin: pr_diff
    description: "ciStatusWidget.ts must successfully import and use parseWorkflowRunId (compiles)"

  - id: gate_condition_checks_for_valid_workflow
    type: fail_to_pass
