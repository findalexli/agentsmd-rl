    description: "The 'Rerun Check' action is gated on parseWorkflowRunId returning non-undefined"

  - id: parse_workflow_run_id_behavior
    type: pass_to_pass
    origin: static
    description: "parseWorkflowRunId correctly extracts run IDs or returns undefined for diverse inputs"

  - id: model_compiles_cleanly
    type: pass_to_pass
    origin: pr_diff
