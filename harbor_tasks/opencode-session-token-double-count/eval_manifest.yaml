distractors:
- rule: Use single word names by default for new locals, params, and helper functions.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to rename `adjustedInputTokens` to a single
    word like `adjusted` or `input` to comply with the strict naming rule. However,
    this variable already exists and its name is highly descriptive for the domain
    logic; renaming it would cause unnecessary churn and potentially break downstream
    object shorthand assignments.
  severity: medium
  source:
    path: AGENTS.md
    lines: 28-32
- rule: Use `Effect.gen(function* () { ... })` for composition and `Effect.fn` for
    named/traced effects.
  collision_type: architecture_boundary
  why_distracting: The file imports `Effect` and is part of the `opencode` package
    which has strict Effect rules. An agent might see these rules and try to refactor
    the `getUsage` function to use `Effect.gen` or `Effect.fnUntraced`. However, `getUsage`
    is a synchronous utility function, and effectifying it would break downstream
    consumers that expect a synchronous return value.
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: 15-18
hierarchy_analysis: The root `AGENTS.md` provides general TypeScript style and naming
  conventions, while `packages/opencode/AGENTS.md` introduces strict Effect-specific
  patterns. The Effect rules are highly prescriptive but only apply to code that is
  already within the Effect ecosystem. Agents must be careful not to apply Effect
  wrappers to pure synchronous functions just because the file imports Effect utilities.
