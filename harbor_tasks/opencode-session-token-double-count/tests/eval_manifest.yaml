  category: style
distractors:
- rule: Prefer single word names for variables and functions. Before finishing edits,
    review touched lines and shorten newly introduced identifiers where possible.
  collision_type: scope_ambiguity
  why_distracting: The rule mandates single-word variable names and explicitly instructs
    the agent to 'review touched lines and shorten newly introduced identifiers'.
    An agent might aggressively rename `adjustedInputTokens`, `cacheReadInputTokens`,
    or `cacheWriteInputTokens` to single words (e.g., `adjusted`, `read`, `write`),
    which would cause unnecessary diff churn and potentially break downstream references.
  severity: high
  source:
    path: AGENTS.md
    lines: 28-48
- rule: Reduce total variable count by inlining when a value is only used once.
  collision_type: rule_conflict
  why_distracting: The rule instructs to reduce variable count by inlining values
    used only once. An agent might try to inline `adjustedInputTokens` or `total`
    directly into the return object. However, keeping them as named variables maintains
    readability and consistency with the surrounding code structure, which the gold
    solution preserves.
  severity: medium
  source:
    path: AGENTS.md
    lines: 54-63
hierarchy_analysis: The configuration is a flat, single-file `AGENTS.md` at the root
