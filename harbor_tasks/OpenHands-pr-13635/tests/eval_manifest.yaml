distractors:
- rule: 'To run the full application to debug issues: export INSTALL_DOCKER=0 ...
    make build && make run ...'
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to start the full application server to
    debug the UI issue interactively, which is unnecessary for this simple conditional
    rendering fix and could lead to timeouts or environment issues in the sandbox.
  severity: medium
  source:
    path: AGENTS.md
    lines: 10-14
- rule: When working on a PR that requires design documents, scripts meant for development-only,
    or other temporary artifacts... store them in a `.pr/` directory
  collision_type: scope_ambiguity
  why_distracting: The agent might create a `.pr/analysis.md` file to document its
    investigation of the bug, which is unnecessary for a simple UI fix and intended
    only for complex PRs.
  severity: low
  source:
    path: AGENTS.md
    lines: 38-48
- rule: Use cross-repo-testing when changes span the SDK and OpenHands server repos
    and need e2e testing.
  source:
    path: .agents/skills/cross-repo-testing/SKILL.md
    lines: 1-5
  collision_type: scope_ambiguity
  why_distracting: The agent might assume that changes to user authentication or feature
    flags require cross-repo testing, but this is a purely frontend display logic
    fix.
  severity: low
- rule: To add a new action type to the UI, update `HANDLED_ACTIONS`, `addAssistantAction`,
    and the matching i18n key.
  source:
    path: AGENTS.md
    lines: 268-271
  source_text: "- To add a new action type to the UI:\n  1. Add the action type to\
    \ the `HANDLED_ACTIONS` array\n  2. Implement the action handling in `addAssistantAction`\
    \ function in chat-slice.ts\n  3. Add a translation key in the format `ACTION_MESSAGE$ACTION_NAME`\
    \ to the i18n files"
  collision_type: meta_confusion
  why_distracting: The changed file is named `user-actions.tsx`, so an agent could
    incorrectly associate it with the chat action system. But this patch only changes
    visibility around the sidebar account menu; touching `chat-slice.ts` or `HANDLED_ACTIONS`
    would be unrelated churn.
  severity: low
- rule: Adding a new user setting requires coordinated frontend and backend changes
    across settings types, defaults, hooks, UI, i18n, and backend models.
  source:
    path: AGENTS.md
    lines: 277-289
  source_text: "- To add a new user setting to OpenHands, follow these steps:\n  1.\
    \ Add the setting to the frontend:\n     - Add the setting to the `Settings` type\
    \ in `frontend/src/types/settings.ts`\n     - Add the setting to the `ApiSettings`\
    \ type in the same file\n     - Add the setting with an appropriate default value\
    \ to `DEFAULT_SETTINGS` in `frontend/src/services/settings.ts`\n     - Update\
    \ the `useSettings` hook in `frontend/src/hooks/query/use-settings.ts` to map\
    \ the API response\n     - Update the `useSaveSettings` hook in `frontend/src/hooks/mutation/use-save-settings.ts`\
    \ to include the setting in API requests\n     - Add UI components (like toggle\
    \ switches) in the appropriate settings screen (e.g., `frontend/src/routes/app-settings.tsx`)\n\
    \     - Add i18n translations for the setting name and any tooltips in `frontend/src/i18n/translation.json`\n\
    \     - Add the translation key to `frontend/src/i18n/declaration.ts`\n  2. Add\
    \ the setting to the backend:\n     - Add the setting to the `Settings` model\
    \ in `openhands/storage/data_models/settings.py`\n     - Update any relevant backend\
    \ code to apply the setting (e.g., in session creation)"
  collision_type: scope_ambiguity
  why_distracting: This change sits in the account/sidebar area and the context menu
    renders settings navigation, so it can look settings-related. But the diff does
    not introduce a persisted preference; it only removes the `useShouldShowUserFeatures`
    gate so the menu always renders. Following the settings workflow would spread
    an isolated UI fix across unrelated frontend/backend settings plumbing.
  severity: medium
hierarchy_analysis: The configuration consists of a single flat file (`AGENTS.md`)
  at the root level providing general repository guidelines. There is no deep hierarchy
  or conflicting files to navigate.
