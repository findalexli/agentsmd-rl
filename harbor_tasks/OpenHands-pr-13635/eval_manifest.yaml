distractors:
- rule: 'To run the full application to debug issues: export INSTALL_DOCKER=0 ...
    make build && make run ...'
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to start the full application server to
    debug the UI issue interactively, which is unnecessary for this simple conditional
    rendering fix and could lead to timeouts or environment issues in the sandbox.
  severity: medium
  source:
    path: AGENTS.md
    lines: 10-14
- rule: When working on a PR that requires design documents, scripts meant for development-only,
    or other temporary artifacts... store them in a `.pr/` directory
  collision_type: scope_ambiguity
  why_distracting: The agent might create a `.pr/analysis.md` file to document its
    investigation of the bug, which is unnecessary for a simple UI fix and intended
    only for complex PRs.
  severity: low
  source:
    path: AGENTS.md
    lines: 38-48
- rule: Use cross-repo-testing when changes span the SDK and OpenHands server repos
    and need e2e testing.
  source:
    path: .agents/skills/cross-repo-testing/SKILL.md
    lines: 1-5
  collision_type: scope_ambiguity
  why_distracting: The agent might assume that changes to user authentication or feature
    flags require cross-repo testing, but this is a purely frontend display logic
    fix.
  severity: low
hierarchy_analysis: The configuration consists of a single flat file (`AGENTS.md`)
  at the root level providing general repository guidelines. There is no deep hierarchy
  or conflicting files to navigate.
