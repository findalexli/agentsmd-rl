rubric:
- rule: Follow existing frontend code patterns. The codebase uses TanStack Query for
    data fetching - UI components should call custom hooks from frontend/src/hooks/query/
    or frontend/src/hooks/mutation/, not call API client methods directly.
  source:
    path: AGENTS.md
    lines: 95-105
    commit: df64ce9668ebd0116d0b6864a410adfedc615e96
- rule: When modifying frontend code, ensure lint passes. Run 'npm run lint:fix' in
    the frontend directory and verify 'npm run build' succeeds before considering
    changes complete.
  source:
    path: AGENTS.md
    lines: 26-30
    commit: df64ce9668ebd0116d0b6864a410adfedc615e96
- rule: Remove unused imports when modifying files. Clean up any imports that are
    no longer needed after making changes.
  source:
    path: AGENTS.md
    lines: 26-30
    commit: df64ce9668ebd0116d0b6864a410adfedc615e96
- rule: Do not run `make build` to set up the entire repo unless explicitly requested
    by the user or necessary for running the entire application.
  source:
    path: AGENTS.md
    lines: 4-5
  evidence: The gold solution directly patches the frontend component without running
    `make build` or setting up the entire repository.
  category: tooling
