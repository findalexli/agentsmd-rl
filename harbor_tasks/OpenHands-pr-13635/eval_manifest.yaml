distractors:
- rule: To run the full application to debug issues, use `make build && make run FRONTEND_PORT=12000...`
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to start the full application (frontend
    and backend) to debug the missing popup menu, which is unnecessary for a simple
    React conditional rendering fix and would waste significant time.
  severity: medium
  source:
    path: AGENTS.md
    lines: 8-13
- rule: Store design documents, analysis, or debugging notes in a `.pr/` directory
    at the repository root.
  collision_type: scope_ambiguity
  why_distracting: The agent might create a `.pr/analysis.md` file to document why
    the unauthenticated user check was removed, but this is a trivial fix that does
    not warrant temporary PR artifacts.
  severity: low
  source:
    path: AGENTS.md
    lines: 40-50
hierarchy_analysis: The `AGENTS.md` file provides general repository guidelines. Since
  this is a simple frontend fix, the agent should focus on the specific file modification
  and avoid heavy repository-wide commands like `make build` or full application startup,
  which are documented but intended for more complex debugging scenarios.
