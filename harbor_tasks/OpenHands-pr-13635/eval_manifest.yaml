rubric:
  - rule: "Follow existing frontend code patterns. The codebase uses TanStack Query for data fetching - UI components should call custom hooks from frontend/src/hooks/query/ or frontend/src/hooks/mutation/, not call API client methods directly."
    source:
      path: "AGENTS.md"
      lines: "95-105"
      commit: "df64ce9668ebd0116d0b6864a410adfedc615e96"

  - rule: "When modifying frontend code, ensure lint passes. Run 'npm run lint:fix' in the frontend directory and verify 'npm run build' succeeds before considering changes complete."
    source:
      path: "AGENTS.md"
      lines: "26-30"
      commit: "df64ce9668ebd0116d0b6864a410adfedc615e96"

  - rule: "Remove unused imports when modifying files. Clean up any imports that are no longer needed after making changes."
    source:
      path: "AGENTS.md"
      lines: "26-30"
      commit: "df64ce9668ebd0116d0b6864a410adfedc615e96"

checks:
  # Fail-to-Pass Tests: Verify the fix works
  - id: test_use_should_show_user_features_hook_removed
    type: fail_to_pass
    origin: agent
    description: useShouldShowUserFeatures hook is removed from user-actions.tsx

  - id: test_context_menu_always_rendered
    type: fail_to_pass
    origin: agent
    description: UserContextMenu is always rendered unconditionally

  - id: test_context_menu_div_always_present
    type: fail_to_pass
    origin: agent
    description: Context menu wrapper div with opacity classes is always present

  # Pass-to-Pass Tests: Existing verification tests
  - id: test_typescript_user_actions_no_errors
    type: pass_to_pass
    origin: agent
    description: user-actions.tsx has no TypeScript errors

  - id: test_frontend_lint_user_actions_clean
    type: pass_to_pass
    origin: agent
    description: Frontend lint passes on user-actions.tsx

  - id: test_user_actions_file_exists
    type: pass_to_pass
    origin: agent
    description: Target file exists sanity check

  - id: test_component_imports_clean
    type: pass_to_pass
    origin: agent
    description: No unused imports remain after fix

  # Pass-to-Pass Tests: Repo CI/CD checks
  - id: test_repo_typecheck
    type: pass_to_pass
    origin: repo_tests
    description: Repo's TypeScript typecheck passes (react-router typegen && tsc)

  - id: test_repo_build
    type: pass_to_pass
    origin: repo_tests
    description: Repo's frontend build passes

  - id: test_repo_lint
    type: pass_to_pass
    origin: repo_tests
    description: Repo's frontend lint passes (typecheck + eslint + prettier)

  - id: test_repo_unit_tests_user_context_menu
    type: pass_to_pass
    origin: repo_tests
    description: Repo's UserContextMenu component unit tests pass (vitest)

  - id: test_repo_unit_tests_sidebar
    type: pass_to_pass
    origin: repo_tests
    description: Repo's Sidebar component unit tests pass (vitest)
