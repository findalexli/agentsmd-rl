rubric:
- rule: Do not write flaky tests. Unless explicitly asked, never wait for time to
    pass in tests. Always wait for the condition to be met instead of waiting for
    an arbitrary amount of time.
  source:
    path: test/CLAUDE.md
    lines: '21'
    commit: af24e281ebacd6ac77c0f14b4206599cf4ae1c9f
- rule: Generally, await using or using is a good idea to ensure proper resource cleanup.
  source:
    path: test/CLAUDE.md
    lines: '100'
    commit: af24e281ebacd6ac77c0f14b4206599cf4ae1c9f
- rule: Prefer async/await over callbacks.
  source:
    path: test/CLAUDE.md
    lines: '104'
    commit: af24e281ebacd6ac77c0f14b4206599cf4ae1c9f
distractors:
- rule: Prefer concurrent tests over sequential tests
  collision_type: would_cause_bug
  why_distracting: The tests in `hot.test.ts` share global state (`hotRunnerRoot`,
    `cwd`) which is modified in `beforeEach`. Making these tests concurrent would
    cause race conditions and test failures.
  severity: high
  source:
    path: test/CLAUDE.md
    lines: 18-20
- rule: For multi-file tests, prefer tempDir and Bun.spawn.
  collision_type: scope_ambiguity
  why_distracting: The test file already has an established setup using `beforeEach`
    to manage `hotRunnerRoot`. Refactoring the tests to use `tempDir` from `harness`
    would be a massive scope creep and unnecessary for fixing the stderr hang.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 44-45
- rule: Do not set a timeout on tests
  collision_type: scope_ambiguity
  why_distracting: 'The file already defines and uses `timeout` and `longTimeout`
    variables (e.g., `const timeout = isDebug ? Infinity : 10_000;`). An agent might
    try to remove these to comply with the rule, which is out of scope and alters
    existing test behavior.'
  severity: low
  source:
    path: test/CLAUDE.md
    lines: 112-114
- rule: Use `await using` or `using` for resource cleanup
  collision_type: would_cause_bug
  why_distracting: The `driveErrorReloadCycle` helper explicitly manages the process
    lifecycle by calling `runner.kill()` when the target count is reached. Refactoring
    the existing `spawn` to use `await using` might interfere with this manual lifecycle
    management required for testing hot reloads.
  severity: medium
  source:
    path: test/CLAUDE.md
    lines: 95-96
hierarchy_analysis: The hierarchy consists of root-level `CLAUDE.md`/`AGENTS.md` and
  test-specific `test/CLAUDE.md`/`test/AGENTS.md`. The test-specific configs provide
  more detailed guidance on test writing (e.g., `tempDir`, `bunExe`, `await using`).
  However, many of these rules conflict with the existing patterns in `test/cli/hot/hot.test.ts`,
  which uses shared global state and manual process management. Agents must be careful
  not to blindly apply test refactoring rules (like concurrency or `tempDir`) when
  fixing a specific bug in an established test file.
