version: "2.0"

source:
  repo: astral-sh/uv
  pr: 18657
  base_commit: 1b6b7befb1b7160ff32c8692bbf24ef98aae3fa7
  merge_commit: 9d45e7f8177e6f60e084ba52b2a32a56edf237c7

checks:
  - id: compilation
    type: pass_to_pass
    origin: static
    description: "Modified crates (uv-distribution-types, uv-client) must compile"

  - id: invalid_api_cache_control_rejected
    type: fail_to_pass
    origin: pr_diff
    description: "Invalid HTTP header values (newline, CR, null, DEL) in cache-control.api are rejected during deserialization"

  - id: invalid_files_cache_control_rejected
    type: fail_to_pass
    origin: pr_diff
    description: "Invalid HTTP header values in cache-control.files are also rejected during deserialization"

  - id: valid_cache_control_accepted
    type: pass_to_pass
    origin: pr_diff
    description: "Valid cache-control values (various directives, api-only, files-only) are still accepted"

  - id: cache_control_roundtrip
    type: pass_to_pass
    origin: pr_diff
    description: "Cache-control values survive serialize/deserialize round-trip"

  - id: existing_upstream_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Existing cache-control unit tests in the repo still pass"

  - id: no_expect_on_header_conversion
    type: fail_to_pass
    origin: agent_config
    description: "No panicking .expect()/.unwrap() on cache-control header value conversion"
    source:
      path: CLAUDE.md
      lines: "7"
      commit: 1b6b7befb1b7160ff32c8692bbf24ef98aae3fa7

rubric:
  - rule: "ALWAYS attempt to add a test case for changed behavior"
    source:
      path: CLAUDE.md
      lines: "2"
      commit: 1b6b7befb1b7160ff32c8692bbf24ef98aae3fa7

  - rule: "PREFER patterns like `if let` to handle fallibility"
    source:
      path: CLAUDE.md
      lines: "8"
      commit: 1b6b7befb1b7160ff32c8692bbf24ef98aae3fa7

  - rule: "PREFER `#[expect()]` over `#[allow()]` if clippy must be disabled"
    source:
      path: CLAUDE.md
      lines: "10"
      commit: 1b6b7befb1b7160ff32c8692bbf24ef98aae3fa7

  - rule: "AVOID shortening variable names, e.g., use `version` instead of `ver`, and `requires_python` instead of `rp`"
    source:
      path: CLAUDE.md
      lines: "17"
      commit: 1b6b7befb1b7160ff32c8692bbf24ef98aae3fa7

  - rule: "PREFER top-level imports over local imports or fully qualified names"
    source:
      path: CLAUDE.md
      lines: "16"
      commit: 1b6b7befb1b7160ff32c8692bbf24ef98aae3fa7
