version: "2.0"

source:
  repo: "openclaw/openclaw"
  pr: 57773
  base_commit: "ae703ab0e7528ae215b6dd8e20dfa9b64f05a11e"
  merge_commit: "29cb1e3c7edd54a3d060419ffa153eecbd19c133"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified TS files must transpile without errors"

  - id: deny_list_blocks_execution_tools
    type: fail_to_pass
    origin: pr_diff
    description: "exec, spawn, shell must be in DEFAULT_GATEWAY_HTTP_TOOL_DENY"

  - id: deny_list_blocks_fs_mutation_tools
    type: fail_to_pass
    origin: pr_diff
    description: "fs_write, fs_delete, fs_move, apply_patch must be in HTTP deny list"

  - id: deny_list_blocks_node_relay
    type: fail_to_pass
    origin: pr_diff
    description: "nodes tool must be in HTTP deny list"

  - id: deny_list_sufficient_entries
    type: fail_to_pass
    origin: pr_diff
    description: "Deny list must have at least 10 entries after adding high-risk tools"

  - id: scope_authorization_in_handler
    type: fail_to_pass
    origin: pr_diff
    description: "Handler must import+call authorizeOperatorScopesForMethod('agent') and return 403"

  - id: owner_only_filtering_in_handler
    type: fail_to_pass
    origin: pr_diff
    description: "Handler must filter owner-only tools from HTTP surface"

  - id: existing_deny_entries_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "Original deny list entries (sessions_spawn, sessions_send, cron, gateway, whatsapp_login) preserved"

  - id: no_ts_nocheck
    type: pass_to_pass
    origin: agent_config
    description: "Modified files must not contain @ts-nocheck directive"
    source:
      path: "CLAUDE.md"
      lines: "146"
      commit: "ae703ab0e7528ae215b6dd8e20dfa9b64f05a11e"

  - id: no_any_type
    type: pass_to_pass
    origin: agent_config
    description: "Modified files must not introduce bare 'any' type annotations"
    source:
      path: "CLAUDE.md"
      lines: "144,147"
      commit: "ae703ab0e7528ae215b6dd8e20dfa9b64f05a11e"

  - id: no_lint_suppression
    type: pass_to_pass
    origin: agent_config
    description: "Modified files must not add eslint-disable or oxlint-ignore comments"
    source:
      path: "CLAUDE.md"
      lines: "146"
      commit: "ae703ab0e7528ae215b6dd8e20dfa9b64f05a11e"

  - id: no_magic_sentinels
    type: pass_to_pass
    origin: agent_config
    description: "New code must not use ?? 0, ?? '', or ?? {} magic sentinels"
    source:
      path: "CLAUDE.md"
      lines: "152"
      commit: "ae703ab0e7528ae215b6dd8e20dfa9b64f05a11e"

rubric:
  - rule: "Add brief code comments for tricky or non-obvious logic."
    source:
      path: "CLAUDE.md"
      lines: "163"
      commit: "ae703ab0e7528ae215b6dd8e20dfa9b64f05a11e"
  - rule: "Prefer Result<T, E>-style outcomes and closed error-code unions for recoverable runtime decisions."
    source:
      path: "CLAUDE.md"
      lines: "150"
      commit: "ae703ab0e7528ae215b6dd8e20dfa9b64f05a11e"
  - rule: "Keep files concise; extract helpers instead of V2 copies. Use existing patterns for CLI options and dependency injection."
    source:
      path: "CLAUDE.md"
      lines: "164"
      commit: "ae703ab0e7528ae215b6dd8e20dfa9b64f05a11e"
  - rule: "Prefer discriminated unions when parameter shape changes runtime behavior."
    source:
      path: "CLAUDE.md"
      lines: "149"
      commit: "ae703ab0e7528ae215b6dd8e20dfa9b64f05a11e"
  - rule: "Prefer zod or existing schema helpers at external boundaries such as config, webhook payloads, CLI/JSON output, persisted JSON, and third-party API responses."
    source:
      path: "CLAUDE.md"
      lines: "148"
      commit: "ae703ab0e7528ae215b6dd8e20dfa9b64f05a11e"
  - rule: "If introducing a new optional field or nullable semantic in core logic, prefer an explicit union or dedicated type when the value changes behavior."
    source:
      path: "CLAUDE.md"
      lines: "153"
      commit: "ae703ab0e7528ae215b6dd8e20dfa9b64f05a11e"
