distractors:
- rule: Do not edit files covered by security-focused CODEOWNERS rules unless a listed
    owner explicitly asked for the change or is already reviewing it with you.
  collision_type: rule_conflict
  why_distracting: The bug report explicitly asks to fix security gaps in `src/security/dangerous-tools.ts`
    and `src/gateway/tools-invoke-http.ts`. An agent might refuse to edit these files
    citing the security-focused CODEOWNERS rule, failing the task.
  severity: high
  source:
    path: AGENTS.md
    lines: 5-5
- rule: 'Import boundaries: extension production code should treat openclaw/plugin-sdk/*
    as the public surface. Do not import core src/** directly.'
  collision_type: scope_ambiguity
  why_distracting: An agent might mistakenly apply the extension-only import boundary
    rule to `src/gateway/tools-invoke-http.ts` and try to avoid importing `applyOwnerOnlyToolPolicy`
    from `src/agents/tool-policy-pipeline.js`, leading to duplicated code or incorrect
    imports.
  severity: medium
  source:
    path: AGENTS.md
    lines: 16-16
hierarchy_analysis: The config files AGENTS.md and CLAUDE.md contain identical rules.
  The agent must distinguish between core code (src/) and extension code to correctly
  apply import boundaries, and must weigh the security CODEOWNERS restriction against
  the explicit bug report instructions.
rubric:
- rule: Core code in src/gateway/ must use direct relative imports (../) to import
    from other core modules, not the plugin-sdk.
  reference: 'src/gateway/tools-invoke-http.ts imports: ../agents/tool-policy-pipeline.js,
    ../security/dangerous-tools.js, ./http-auth-helpers.js, ./method-scopes.js'
- rule: Security-sensitive tools (exec, spawn, shell, fs_write, fs_delete, fs_move,
    apply_patch, nodes) must be added to DEFAULT_GATEWAY_HTTP_TOOL_DENY.
