version: "1.0"

task:
  name: airflow-helm-celery-wait-migrations
  description: Add workers.celery.waitForMigrations config section to Airflow Helm chart

source:
  type: github_pr
  repo: apache/airflow
  pr_number: 64857
  base_commit: a78f51911f028d795344d9ce2fbda49bffede563
  merge_commit: b112a72c88b053b40768ae57e4e16c10dd4f603b

checks:
  # Schema tests
  - id: test_celery_wait_for_migrations_enabled_in_schema
    type: fail_to_pass
    origin: pr_behavior
    description: Schema supports workers.celery.waitForMigrations.enabled

  - id: test_celery_wait_for_migrations_env_in_schema
    type: fail_to_pass
    origin: pr_behavior
    description: Schema supports workers.celery.waitForMigrations.env

  - id: test_celery_wait_for_migrations_security_contexts_in_schema
    type: fail_to_pass
    origin: pr_behavior
    description: Schema supports workers.celery.waitForMigrations.securityContexts

  - id: test_celery_wait_for_migrations_in_values_yaml
    type: fail_to_pass
    origin: pr_behavior
    description: values.yaml contains workers.celery.waitForMigrations section

  - id: test_deprecation_notice_in_schema_description
    type: fail_to_pass
    origin: pr_behavior
    description: Old config paths have deprecation notices in schema

  # Deprecation warning tests
  - id: test_notes_has_wait_for_migrations_deprecation_warning
    type: fail_to_pass
    origin: pr_behavior
    description: NOTES.txt has deprecation warning for waitForMigrations.enabled

  - id: test_notes_has_env_deprecation_warning
    type: fail_to_pass
    origin: pr_behavior
    description: NOTES.txt has deprecation warning for waitForMigrations.env

  # Newsfragment tests
  - id: test_newsfragment_exists
    type: fail_to_pass
    origin: pr_behavior
    description: Newsfragment for PR 62054 exists

  - id: test_newsfragment_content
    type: fail_to_pass
    origin: pr_behavior
    description: Newsfragment describes the deprecation

  # Helm template rendering tests (pass on both base and gold - Helm ignores invalid config)
  - id: test_celery_wait_for_migrations_disables_init_container
    type: pass_to_pass
    origin: repo_tests
    description: Helm template rendering works with celery waitForMigrations config

  - id: test_celery_wait_for_migrations_env_applied
    type: pass_to_pass
    origin: repo_tests
    description: Helm template rendering works with env config

  # Pass-to-pass regression tests
  - id: test_helm_lint_passes
    type: pass_to_pass
    origin: repo_tests
    description: Helm lint passes on the chart

  - id: test_values_yaml_is_valid_yaml
    type: pass_to_pass
    origin: static
    description: values.yaml is valid YAML

  - id: test_values_schema_is_valid_json
    type: pass_to_pass
    origin: static
    description: values.schema.json is valid JSON

  - id: test_old_wait_for_migrations_still_works
    type: pass_to_pass
    origin: repo_tests
    description: Old workers.waitForMigrations config still works

  # Repo CI checks via subprocess
  - id: test_repo_jsonschema_validates_values
    type: pass_to_pass
    origin: repo_tests
    description: values.yaml validates against values.schema.json

  - id: test_repo_schema_is_valid_jsonschema
    type: pass_to_pass
    origin: repo_tests
    description: values.schema.json is a valid JSON Schema Draft7

  - id: test_repo_helm_template_default_values
    type: pass_to_pass
    origin: repo_tests
    description: Helm template renders with default values

  - id: test_repo_helm_template_celery_executor
    type: pass_to_pass
    origin: repo_tests
    description: Helm template renders with CeleryExecutor

rubric:
  - id: helm_chart_change_no_config_edits_needed
    description: "Helm chart configuration change - no agent config file (CLAUDE.md/AGENTS.md) edits required"
