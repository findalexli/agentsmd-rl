rubric:
- rule: Use tabs for indentation (Prettier config). Check that the code follows the
    repo's formatting conventions.
  source:
    path: .config/.prettierrc.json
    lines: '2'
    commit: d720b25b575fb9817311212e1c0afa82abf27468
- rule: Use the 'in' operator for property existence checks, following existing code
    style.
  source:
    path: js/core/src/init.svelte.ts
    lines: '719'
    commit: d720b25b575fb9817311212e1c0afa82abf27468
- rule: Use TypeScript to provide static types to javascript code
  source:
    path: js/README.md
    lines: 81-81
  source_text: We use [TypeScript](https://www.typescriptlang.org/) to provide static
    types to javascript code.
  evidence: 'The gold diff strictly adheres to static typing by casting `node.props.props.i18n`
    to `((str: string) => string) | undefined` and `node.props.shared_props.label`
    to `string`.'
  category: coding_conventions
  verification: llm_judge
distractors:
- rule: Create a new json file to add language translations
  source:
    path: js/core/src/lang/README.md
    lines: 5-9
  source_text: 'To add your language, do the following steps:


    1. Create a new json file in this directory

    2. Name the file after the language code (Here''s a list: http://4umi.com/web/html/languagecodes.php)

    3. Please provide clear and complete translations. Take a look at the [`en.json`](https://github.com/gradio-app/gradio/blob/master/js/core/public/lang/en.json)
    file for the corresponding English text.'
  collision_type: scope_ambiguity
  why_distracting: Since the issue description talks about English vs. Spanish translations
    not working for Tab labels, an agent might wrongly assume it needs to add the
    missing localized strings to the `.json` language files described here, rather
    than fixing the underlying TypeScript logic that applies the `i18n` formatting
    function.
  severity: high
- rule: Shorten the imported gradio name to gr
  source:
    path: README.md
    lines: 84-85
  source_text: "> [!TIP]\n > We shorten the imported name from <code>gradio</code>\
    \ to <code>gr</code>. This is a widely adopted convention for better readability\
    \ of code."
  collision_type: architecture_boundary
  why_distracting: The PR fixes a bug in the TypeScript codebase. An agent might see
    this rule and look for Python files to edit or be confused about whether the change
    should be made in the Python backend or the JS frontend.
  severity: low
