    origin: code_structure
    description: PaddedPODArray is used instead of String for pad_string member
    source: "PR diff changes pad_string from String to PaddedPODArray<UInt8>"

  - id: test_empty_pad_string_handling_moved
    type: fail_to_pass
    origin: code_structure
    description: Empty pad string handling is moved from init() to executeImpl
    source: "PR diff moves empty string check to executeImpl function"

  - id: test_init_method_removed
    type: fail_to_pass
    origin: code_structure
    description: Old init() method is removed from PaddingChars class
    source: "PR diff removes init() method, logic moved to constructor"

  - id: test_memcpySmallAllowReadWriteOverflow15_comment
    type: fail_to_pass
    origin: code_structure
    description: Comment explains the 15-byte read padding requirement
    source: "PR diff adds comment explaining memcpySmallAllowReadWriteOverflow15 requirement"

  - id: test_insertFromItself_used
    type: fail_to_pass
    origin: code_structure
    description: insertFromItself is used instead of operator+= for padding
    source: "PR diff uses insertFromItself for PaddedPODArray operations"

  - id: test_validateFunctionArguments_usage
    type: fail_to_pass
    origin: code_structure
    description: validateFunctionArguments is used for argument validation
    source: "PR diff replaces manual validation with validateFunctionArguments helper"

  - id: test_constructor_initialization_list
    type: fail_to_pass
    origin: agent_config
    description: Constructor uses Allman-style brace formatting per CLAUDE.md
    source: "CLAUDE.md: When writing C++ code, always use Allman-style braces (opening brace on a new line)"

  - id: test_cpp_syntax_valid
    type: fail_to_pass
    origin: code_structure
    description: C++ code has valid syntax
    source: "Basic requirement - code must compile"

  - id: test_new_headers_included
    type: fail_to_pass
    origin: code_structure
    description: New required headers (<memory>, IDataType.h) are included
    source: "PR diff adds necessary includes"

  - id: test_error_codes_updated
    type: fail_to_pass
    origin: code_structure
    description: Error codes are updated (removed ones handled by validateFunctionArguments)
    source: "PR diff removes error codes now handled by validateFunctionArguments"

  - id: test_chassert_for_column_check
    type: fail_to_pass
    origin: code_structure
    description: chassert is used for column_pad_const check
    source: "PR diff replaces exception with chassert after validation"

  # Pass-to-pass tests - These verify repo CI checks pass on the base commit
  - id: test_repo_style_cpp
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's C++ style check script runs without errors"
    source: "ci/jobs/scripts/check_style/check_cpp.sh - validates C++ code style using grep patterns"

  - id: test_repo_git_status
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's git status check passes"
    source: "git status --porcelain - validates repo is in clean state"

  - id: test_repo_padstring_tests_exist
    type: pass_to_pass
    origin: repo_tests
    description: "Test files for padString functions exist and are non-empty"
    source: "test -s on SQL test files - validates test file existence and content"

rubric:
  - rule: Code includes proper fix for heap-buffer-overflow security issue
    source: "The diff shows addition of PaddedPODArray and proper memory handling"
