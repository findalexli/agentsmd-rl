rubric:
- rule: Processor classes must accept their multimodal components as explicit constructor
    parameters for Transformers v5 compatibility
  source:
    path: vllm/transformers_utils/processors/pixtral.py
    lines: 50-70
  reference: Pixtral and Voxtral processors now accept image_processor and feature_extractor
    as explicit __init__ parameters, enabling external control over these components.
- rule: Model classes must pass pre-constructed components to processors rather than
    letting processors create them internally
  source:
    path: vllm/model_executor/models/pixtral.py
    lines: 130-145
  reference: Pixtral and Voxtral models now create image_processor and feature_extractor
    in separate helper methods, then pass them to processor constructors.
distractors:
- rule: Pure code-agent PRs are not allowed. A human submitter must understand and
