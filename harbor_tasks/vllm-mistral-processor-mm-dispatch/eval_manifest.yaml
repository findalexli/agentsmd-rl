rubric:
- rule: Pixtral and Voxtral processor classes must accept their multimodal components
    as explicit constructor parameters
  source:
    path: vllm/transformers_utils/processors
    lines: 1-100
- rule: Model classes must pass pre-constructed components to processors rather than
    letting processors create them internally
  source:
    path: vllm/model_executor/models
    lines: 1-100
distractors:
- rule: Pure code-agent PRs are not allowed. A human submitter must understand and
    defend the change end-to-end.
  collision_type: meta_confusion
  why_distracting: The rule explicitly states that 'Pure code-agent PRs are not allowed'
    and requires a human submitter. An AI agent operating autonomously in an evaluation
    environment might strictly interpret this policy and refuse to generate the code
    fix, believing it is violating repository rules.
  severity: high
  source:
    path: AGENTS.md
    lines: 22-26
- rule: Before proposing a PR, run duplicate-work checks using the `gh` CLI.
  collision_type: meta_confusion
  why_distracting: The rule requires running `gh issue view` and `gh pr list` to check
    for duplicate work before proceeding. In a sandboxed evaluation environment, the
    agent might attempt to run these commands, which will fail due to lack of GitHub
    authentication or network access, potentially causing the agent to halt the task.
  severity: medium
  source:
    path: AGENTS.md
    lines: 8-14
hierarchy_analysis: The hierarchy is flat, with CLAUDE.md simply delegating to AGENTS.md.
  AGENTS.md contains repository-wide contribution policies and local development workflows.
  There are no conflicting rules between files, but the strict human-in-the-loop contribution
  policies conflict directly with the autonomous nature of an AI evaluation environment.
