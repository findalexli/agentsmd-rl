checks:
- id: test_chart_serializer_extracts_role_names_from_role_objects
  type: fail_to_pass
  origin: pr_diff
  description: The chart response serializer must convert SQLAlchemy-style Role objects in chart.owners[*].roles into string role names before producing UserInfo. On the base commit, this raises a Pydantic ValidationError.
- id: test_dashboard_serializer_extracts_role_names_from_role_objects
  type: fail_to_pass
  origin: pr_diff
  description: Same role-extraction requirement for dashboards.
- id: test_dataset_serializer_extracts_role_names_from_role_objects
  type: fail_to_pass
  origin: pr_diff
  description: Same role-extraction requirement for datasets.
- id: test_chart_serializer_with_single_role
  type: fail_to_pass
  origin: pr_diff
  description: Single-role variant of the role-extraction behavior.
- id: test_chart_serializer_handles_none_roles
  type: fail_to_pass
  origin: pr_diff
  description: Owner with roles=None must yield UserInfo.roles=[] without raising. Pydantic's List[str] would otherwise reject None.
- id: test_dashboard_serializer_handles_none_roles
  type: fail_to_pass
  origin: pr_diff
  description: Same None-handling for dashboards.
- id: test_dataset_serializer_handles_non_iterable_roles
  type: fail_to_pass
  origin: pr_diff
  description: Owner with a non-iterable roles value (e.g., an int) must yield UserInfo.roles=[] without raising.
- id: test_chart_serializer_multiple_owners_preserves_per_user_roles
  type: fail_to_pass
  origin: pr_diff
  description: Per-owner role extraction must be independent across owners.
- id: test_chart_owners_serialize_basic_user_fields_alongside_roles
  type: fail_to_pass
  origin: pr_diff
  description: The role fix must not regress the other UserInfo fields (id, username, first_name, last_name, email, active).
- id: test_userinfo_default_roles_is_empty_list
  type: pass_to_pass
  origin: pr_diff
  description: UserInfo() must default roles to an empty list.
- id: test_userinfo_accepts_list_of_string_roles
  type: pass_to_pass
  origin: pr_diff
  description: UserInfo(roles=[...]) accepts a list of strings unchanged.
- id: test_userinfo_schema_has_roles_field_typed_as_list_of_strings
  type: pass_to_pass
  origin: pr_diff
  description: 'UserInfo''s JSON Schema declares roles as an array of strings (added in PR #38407, present on both base and gold).'
- id: test_modified_schema_files_compile_cleanly
  type: pass_to_pass
  origin: repo_tests
  description: All four touched schema files (system, chart, dashboard, dataset) must compile under py_compile — guards against syntax breakage in agent edits.
