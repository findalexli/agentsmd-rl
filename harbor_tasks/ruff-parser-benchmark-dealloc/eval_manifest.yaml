version: "2.0"

source:
  repo: "astral-sh/ruff"
  pr: 24301
  base_commit: "bd477d9535b5b83795e7eb42675faa8aa4fb954f"
  merge_commit: "1572534db3e3c8d999423b3d47edd1ae88772c7d"

checks:
  - id: compiles
    type: pass_to_pass
    origin: pr_diff
    description: "Benchmark crate must compile (valid Rust)"

  - id: benchmarks_run
    type: pass_to_pass
    origin: pr_diff
    description: "Benchmarks execute successfully in test mode"

  - id: dealloc_excluded
    type: fail_to_pass
    origin: pr_diff
    description: "Deallocation excluded from benchmark measurement (iter_with_large_drop or equivalent)"

  - id: count_visitor_removed
    type: fail_to_pass
    origin: pr_diff
    description: "CountVisitor dead code removed"

  - id: unused_visitor_imports_removed
    type: fail_to_pass
    origin: pr_diff
    description: "Unused StatementVisitor/walk_stmt imports cleaned up"

  - id: benchmark_parser_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "benchmark_parser function still exists"

  - id: parse_module_called
    type: pass_to_pass
    origin: pr_diff
    description: "parse_module still invoked in benchmark"

  - id: criterion_macros_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "criterion_group! and criterion_main! macros preserved"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "File has meaningful content (not gutted/stubbed)"

  - id: imports_at_top
    type: pass_to_pass
    origin: agent_config
    description: "Rust imports at top of file, not locally in functions"
    source:
      path: "AGENTS.md"
      lines: "76"
      commit: "bd477d9535b5b83795e7eb42675faa8aa4fb954f"

  - id: no_unwrap
    type: pass_to_pass
    origin: agent_config
    description: "No .unwrap() calls — use .expect() or proper error handling"
    source:
      path: "AGENTS.md"
      lines: "79"
      commit: "bd477d9535b5b83795e7eb42675faa8aa4fb954f"

  - id: clippy_passes
    type: pass_to_pass
    origin: agent_config
    description: "Clippy must pass on the benchmark crate without warnings"
    source:
      path: "AGENTS.md"
      lines: "33-37"
      commit: "bd477d9535b5b83795e7eb42675faa8aa4fb954f"

rubric:
  - rule: "Follow existing code style. Check neighboring files for patterns."
    source:
      path: "AGENTS.md"
      lines: "75"
      commit: "bd477d9535b5b83795e7eb42675faa8aa4fb954f"

  - rule: "Use comments purposefully. Don't use comments to narrate code, but do use them to explain invariants and why something unusual was done a particular way."
    source:
      path: "AGENTS.md"
      lines: "82"
      commit: "bd477d9535b5b83795e7eb42675faa8aa4fb954f"

  - rule: "Prefer let chains (if let combined with &&) over nested if let statements to reduce indentation and improve readability."
    source:
      path: "AGENTS.md"
      lines: "80"
      commit: "bd477d9535b5b83795e7eb42675faa8aa4fb954f"

  - rule: "Avoid writing significant amounts of new code. Look for existing utilities and methods that could help solve the problem."
    source:
      path: "AGENTS.md"
      lines: "78"
      commit: "bd477d9535b5b83795e7eb42675faa8aa4fb954f"
