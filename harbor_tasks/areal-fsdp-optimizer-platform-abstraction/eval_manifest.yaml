      path: "AGENTS.md"
      lines: "98"
      commit: "cbe35f5a4b866596d996d5690085eda0577708f5"
  - rule: "Batch ops over Python loops on tensor elements."
    source:
      path: "AGENTS.md"
      lines: "97"
      commit: "cbe35f5a4b866596d996d5690085eda0577708f5"
  - rule: "Composition over inheritance -- keep class hierarchies <= 2 levels; prefer delegation."
