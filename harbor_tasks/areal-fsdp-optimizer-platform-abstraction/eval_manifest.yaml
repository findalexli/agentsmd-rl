distractors:
- rule: Add tests for new functionality
  collision_type: scope_ambiguity
  why_distracting: The PR is a refactoring task to use an existing abstraction (`current_platform`)
    instead of hardcoded CUDA calls. It does not add new functionality, so attempting
    to add new unit tests would be out of scope and waste effort.
  severity: medium
  source:
    path: AGENTS.md
    lines: 30-30
- rule: No GPU-CPU sync in hot paths (`.item()`, `.tolist()`, `print(t`
  collision_type: would_cause_bug
  why_distracting: The code contains necessary stream synchronization (`wait_event`,
    `record_event`). An agent might misinterpret these as GPU-CPU syncs in a hot path
    and attempt to remove them, which would break the asynchronous prefetch pipeline.
  severity: high
  source:
    path: AGENTS.md
    lines: 66-66
- rule: GPU Test Constraints
  source:
    path: .claude/rules/testing.md
    lines: 38-48
  source_text: "## GPU Test Constraints\n\n- **Always skip gracefully** when GPU unavailable:\n\
    \  ```python\n  CUDA_AVAILABLE = torch.cuda.is_available()\n\n  @pytest.mark.skipif(not\
    \ CUDA_AVAILABLE, reason=\"CUDA not available\")\n  def test_gpu_feature():\n\
    \      ...\n  ```\n- Clean up GPU memory: `torch.cuda.empty_cache()` in fixtures"
  collision_type: scope_ambiguity
  why_distracting: The rule explicitly instructs the use of `torch.cuda.empty_cache()`
    and `torch.cuda.is_available()`. An AI might see this and assume CUDA-specific
    calls are standard across the codebase, thus resisting the change to `current_platform.empty_cache()`.
    However, this rule only applies to test files, whereas the gold diff is modifying
    core engine code to be platform-agnostic.
  severity: medium
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` are at Level 0 and contain overlapping
  rules (e.g., no wildcard imports, add tests for new functionality). They reinforce
  each other without conflict, providing a consistent set of constraints for the agent.
