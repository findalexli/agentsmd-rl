- path: CLAUDE.md
  tier: 1
  gold_added: '- **Always add tests when adding new entity types or features** — if
    the existing test file covers other entity types, add corresponding tests for
    the new one


    ### UI / Backend Consistency

    - When wiring a new UI entity type to an existing backend endpoint, verify the
    backend API contract (single value vs. array, required vs. optional params) and
    ensure the UI controls match — e.g., use a single-select dropdown when the backend
    accepts a single value, not a multi-select'
  gold_removed: ''
distractors:
- rule: Add at least 1 test in `tests/litellm/`
  collision_type: architecture_boundary
  why_distracting: The instruction to add tests in `tests/litellm/` applies to the
    Python backend. This PR is strictly for the React UI dashboard (`ui/litellm-dashboard`).
    An agent might erroneously try to create Python tests for a UI feature, crossing
    the boundary between the proxy server and the frontend.
  severity: high
  source:
    path: CLAUDE.md
    lines: 27-28
- rule: Tremor is DEPRECATED, do not use Tremor components in new features/changes
  collision_type: scope_ambiguity
  why_distracting: The agent might notice Tremor components in the existing UI files
    being modified and attempt to refactor them to another library. While Tremor is
    deprecated for new features, refactoring existing usages is out of scope and would
    bloat the PR.
  severity: medium
  source:
    path: AGENTS.md
    lines: 50-51
- rule: First test should verify the component renders successfully
  collision_type: scope_ambiguity
  why_distracting: The agent is adding a new entity type to an existing component's
    tests. They do not need to write a new 'renders successfully' test for the whole
    component, just add the specific case for the 'user' entity type. Trying to enforce
    this rule could lead to redundant test creation.
  severity: low
  source:
    path: AGENTS.md
    lines: 68-69
hierarchy_analysis: The repository contains a clear split between the Python backend
  (Core/Proxy) and the React UI (`ui/litellm-dashboard`). `CLAUDE.md` primarily focuses
  on the Python backend, while `AGENTS.md` contains a specific section for UI development.
  Agents must be careful not to apply backend testing rules (like adding tests to
  `tests/litellm/`) to UI changes, as this crosses a major architecture boundary.
