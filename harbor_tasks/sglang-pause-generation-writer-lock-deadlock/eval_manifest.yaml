version: "2.0"

source:
  repo: "sgl-project/sglang"
  pr: 22290
  base_commit: "8c3d80eabec2d2a41ccff4d15b5fc81e59d24fbe"
  merge_commit: "6c2a759a04232ef4cb0c845528d75516ddbd9fe2"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified files must parse without errors"

  - id: test_repo_syntax_compile
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's Python syntax is valid (byte-compile check)"

  - id: test_repo_ruff_checks
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ruff lint checks pass (F401, F821)"

  - id: test_repo_isort_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's isort import ordering check passes on modified file"

  - id: test_repo_black_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's black formatting check passes on modified file"

  - id: test_repo_codespell_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's codespell check passes on modified file"

  - id: test_repo_precommit_ast
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's pre-commit check-ast hook passes on modified file"

  - id: update_weights_from_ipc_uses_pause_check
    type: fail_to_pass
    origin: pr_diff
    description: "update_weights_from_ipc must check is_pause before acquiring writer_lock to avoid deadlock"

  - id: pattern_matches_reference_implementation
    type: fail_to_pass
    origin: pr_diff
    description: "Fix must match the established pause-aware locking pattern in update_weights_from_distributed"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "Modified function has real logic, not just pass/return"

  - id: function_structure_preserved
    type: pass_to_pass
    origin: static
    description: "Function maintains proper async structure and exception handling"

rubric:
  - rule: "Add a short trailing comment explaining why that header is included (for example `// For TensorMatcher, SymbolicSize, SymbolicDevice`). This matches the current JIT kernel style and keeps include usage self-documenting."
    source:
      path: ".claude/skills/add-jit-kernel/SKILL.md"
      lines: "29-30"
      commit: "8c3d80eabec2d2a41ccff4d15b5fc81e59d24fbe"

  - rule: "Use comments to explain invariants and the reasoning behind non-obvious logic, not to narrate what the code does. Explanatory comments should answer 'why' rather than 'what'."
    source:
      path: ".claude/skills/add-jit-kernel/SKILL.md"
      lines: "297-298"
      commit: "8c3d80eabec2d2a41ccff4d15b5fc81e59d24fbe"

  - rule: "Follow existing code patterns and conventions in neighboring functions. When fixing a bug or adding a feature, check similar functions in the same file for established patterns (e.g., conditional lock acquisition, nullcontext usage, error handling)."
    source:
      path: ".claude/skills/write-sglang-test/SKILL.md"
      lines: "1-4"
      commit: "8c3d80eabec2d2a41ccff4d15b5fc81e59d24fbe"
