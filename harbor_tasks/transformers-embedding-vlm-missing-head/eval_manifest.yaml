rubric:
- rule: We try to avoid direct inheritance between model-specific files in src/transformers/models/.
  source:
    path: CLAUDE.md
    lines: '64'
    commit: 05514c4bb641ba1537d17048fd93f50f45d5f19d
- rule: When a modular file is present, generated files should not be edited, as changes
    will be overwritten by make fix-repo. Instead, edit the modular file.
  source:
    path: CLAUDE.md
    lines: 67-68
    commit: 05514c4bb641ba1537d17048fd93f50f45d5f19d
- rule: PRs should be as brief as possible. Bugfix PRs can often be only one or two
    lines long. Aim to minimize the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: 05514c4bb641ba1537d17048fd93f50f45d5f19d
- rule: The newer method is to add a file named `modular_<name>.py` in the model directory.
    `modular` files can inherit from other models. `make fix-repo` will copy code
    to generate standalone `modeling` and other files.
  source:
    path: CLAUDE.md
    lines: '61'
  evidence: The gold solution modifies `src/transformers/models/colqwen2/modular_colqwen2.py`
    in addition to `modeling_colqwen2.py`, adhering to the repository's modular model
    design where the modular file is the
  category: architecture
distractors:
- rule: If work maps to an existing issue, coordinate on that issue before opening
    a PR. Do not open a PR for someone else's issue unless there is explicit approval...
    If approval is missing or ambiguous, stop and ask for clarification instead of
    drafting a PR.
  collision_type: meta_confusion
  why_distracting: The agent is in an isolated evaluation environment and must produce
    a solution. Refusing to write code because it cannot verify issue coordination
    or approval will cause it to fail the task.
  severity: high
  source:
    path: CLAUDE.md
    lines: 25-28
- rule: 'Pure code-agent PRs are not allowed: a human submitter must understand and
    be able to defend the change end-to-end... Do not raise PRs without human validation.'
  collision_type: meta_confusion
  why_distracting: The agent might refuse to generate the patch, citing the policy
    that pure code-agent PRs are not allowed and require human validation.
  severity: high
  source:
    path: CLAUDE.md
    lines: 45-53
- rule: '`make fix-repo`: auto-fixes copies, modular conversions... `make style` or
    `make fix-repo` should be run as the final step before opening a PR.'
  collision_type: would_cause_bug
  why_distracting: If the agent edits `modeling_colqwen2.py` directly and then follows
    the instruction to run `make fix-repo` as the final step, `make fix-repo` will
    overwrite `modeling_colqwen2.py` with the contents generated from the unmodified
    `modular_colqwen2.py`, erasing the agent's fix.
  severity: high
  source:
    path: CLAUDE.md
    lines: 4-8
hierarchy_analysis: '`CLAUDE.md` and `AGENTS.md` are identical in content and provide
  repository-wide guidelines. The agent should follow the architectural guidelines
  (modular models) but ignore the meta-level contribution policies (coordination,
  human validation) since it is operating in an automated evaluation environment.'
