rubric:
- id: new_ui_in_common_components
  source:
    commit: 50a52f62e3ad8c903068fdd580b98eb7adc30918
    excerpt: Use Common Components as much as possible — usually defined in the common_components directory
    path: AGENTS.md
  rule: New shared UI components are placed under src/components/common_components/ per AGENTS.md.
- id: no_tremor_in_new_ui
  source:
    commit: 50a52f62e3ad8c903068fdd580b98eb7adc30918
    excerpt: Tremor is DEPRECATED, do not use Tremor components in new features/changes
    path: AGENTS.md
  rule: Any new component file must not import from @tremor/.
- id: ui_backend_contract_match
  source:
    commit: 50a52f62e3ad8c903068fdd580b98eb7adc30918
    excerpt: When wiring a new UI entity type to an existing backend endpoint, verify the backend API contract (single value vs. array, required vs. optional params) and ensure the UI controls match
    path: CLAUDE.md
  rule: Multi-select control matches the backend contract that accepts an array of team IDs (selectedTags is string[]).
- id: prefer_paginated_v2_endpoint
  source:
    commit: 50a52f62e3ad8c903068fdd580b98eb7adc30918
    excerpt: Use Common Components as much as possible — usually defined in the common_components directory
    path: AGENTS.md
  rule: Server-side search/pagination uses the existing useInfiniteTeams hook (paginated v2 list) rather than a new ad-hoc fetch.
