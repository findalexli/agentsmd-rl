rubric:
  - rule: "cargo fmt uses ASCII order (uppercase before lowercase) - just run `cargo fmt`"
    source:
      path: "AGENTS.md"
      lines: "414"
      commit: "cbf12d18457cbe62cbb8f57f4e485110b6630e42"

  - rule: "Tasks affected by a read inconsistency can return errors. These errors will be discarded by the strongly consistent root task."
    source:
      path: "turbopack/crates/turbo-tasks/src/vc/README.md"
      lines: "127"
      commit: "cbf12d18457cbe62cbb8f57f4e485110b6630e42"
