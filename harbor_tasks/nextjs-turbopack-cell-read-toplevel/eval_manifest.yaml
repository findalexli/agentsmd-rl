rubric:
- rule: cargo fmt uses ASCII order (uppercase before lowercase) - just run `cargo
    fmt`
  source:
    path: AGENTS.md
    lines: '414'
    commit: cbf12d18457cbe62cbb8f57f4e485110b6630e42
- rule: Tasks affected by a read inconsistency can return errors. These errors will
    be discarded by the strongly consistent root task.
  source:
    path: turbopack/crates/turbo-tasks/src/vc/README.md
    lines: '127'
    commit: cbf12d18457cbe62cbb8f57f4e485110b6630e42
distractors:
- rule: 'Run tests fast (no isolation, no packing): NEXT_SKIP_ISOLATE=1 NEXT_TEST_MODE=<dev|start>
    pnpm testheadless test/path/to/test.ts'
  collision_type: architecture_boundary
  why_distracting: The agent might try to run the modified Rust test (`top_level_task_consistency.rs`)
    using `pnpm testheadless`, which is meant for Next.js JS/TS tests, not Cargo/Rust
    tests. This will fail and waste time.
  severity: high
  source:
    path: CLAUDE.md
    lines: 71-78
- rule: 'Default agent rule: If you are changing Next.js source or integration tests,
    start `pnpm --filter=next dev` in a separate terminal session before making edits'
  collision_type: architecture_boundary
  why_distracting: The agent might start the Next.js dev server in the background
    (`pnpm --filter=next dev`), which is unnecessary and wastes resources since the
    bug is entirely within the Turbopack Rust crates and their isolated Cargo tests.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 61-68
- rule: 'For type errors only: Use `pnpm --filter=next types` (~10s) instead of `pnpm
    --filter=next build` (~60s).'
  collision_type: architecture_boundary
  why_distracting: The agent might try to use `pnpm --filter=next types` to check
    for Rust compilation errors after modifying the Rust code, but this command runs
    TypeScript type checking, not `cargo check`.
  severity: medium
  source:
    path: CLAUDE.md
    lines: '82'
hierarchy_analysis: The config files (`CLAUDE.md` and `AGENTS.md` are identical) are
  heavily focused on the Next.js JS/TS ecosystem. However, the bug and the gold solution
  are entirely within the Turbopack Rust crates (`turbopack/crates/turbo-tasks`).
  The agent must recognize the architectural boundary between the JS/TS Next.js code
  and the Rust Turbopack code, and ignore the JS-specific tooling rules (like `pnpm
  testheadless` or `pnpm --filter=next dev`) in favor of standard Rust/Cargo tooling.
