distractors:
- rule: 'Repository Structure: `gradio/components/` — all Gradio components'
  collision_type: architecture_boundary
  why_distracting: The issue mentions `gr.Image`, which might lead the agent to search
    and attempt fixes in the Python backend `gradio/components/` directory. However,
    the bug is a JavaScript error in the frontend Svelte component.
  severity: high
  source:
    path: AGENTS.md
    lines: 7-8
- rule: Run backend tests locally with `bash scripts/run_backend_tests.sh`.
  collision_type: architecture_boundary
  why_distracting: The agent might try to run backend tests to verify the fix, but
    the fix is purely in the frontend Svelte code. Running backend tests would waste
    time and compute.
  severity: medium
  source:
    path: AGENTS.md
    lines: 34-34
- rule: Frontend code is formatted with `prettier`. Run `bash scripts/format_frontend.sh`.
  collision_type: scope_ambiguity
  why_distracting: The agent might run the global frontend formatting script, which
    could format unrelated files and create a massive diff, cluttering the PR with
    out-of-scope changes.
  severity: medium
  source:
    path: AGENTS.md
    lines: 43-43
hierarchy_analysis: The repository has a single AGENTS.md config file at the root
  level. It clearly separates the backend (Python) and frontend (Svelte/JS) architectures,
  which is crucial for agents to understand when debugging a frontend issue on a component
  that has both Python and Svelte representations.
