checks:
- id: test_parses_declare_export_default_interface_basic
  type: fail_to_pass
  origin: pr_diff
  description: '`declare export default interface Foo { x: number; }` parses to a TsInterfaceDeclaration with `declare = true`, no parser errors.'
- id: test_parses_declare_export_default_interface_with_extends
  type: fail_to_pass
  origin: pr_diff
  description: 'Extended interface form `declare export default interface Bar extends Base { y: string; }` parses with the same interface-declaration shape, with non-empty extends.'
- id: test_existing_declare_export_default_class_unaffected
  type: pass_to_pass
  origin: pr_diff
  description: Pre-existing `declare export default class C { ... }` form still parses to a class declaration with `declare = true`.
- id: test_existing_declare_export_default_type_unaffected
  type: pass_to_pass
  origin: pr_diff
  description: Pre-existing `declare export default <type>;` falls through to the synthetic-type-alias path and stays parseable.
- id: test_repo_cargo_check_parser
  type: pass_to_pass
  origin: repo_tests
  description: '`cargo check -p swc_ecma_parser --features flow --tests` succeeds — the change must not break compilation.'
- id: test_repo_cargo_fmt_clean
  type: pass_to_pass
  origin: repo_tests
  description: The touched parser source passes `cargo fmt -- --check` (rustfmt clean).
rubric:
- rule: Write performant code. Always prefer performance over other things.
  source:
    path: AGENTS.md
    lines: '7'
    commit: 99e61c4cc172b772437dcabcf8f937a8f24dc4bd
  evidence: The gold fix adds the interface branch inline in the existing declare-export-default parsing ladder without restructuring, cloning, or extra allocations.
  category: architecture
  verification: llm_judge
- rule: Write comments and documentations in English.
  source:
    path: AGENTS.md
    lines: '13'
    commit: 99e61c4cc172b772437dcabcf8f937a8f24dc4bd
  evidence: Any Rust documentation or comments in the gold patch (parser branch, fixture comments) are written in English.
  category: style
  verification: llm_judge
- rule: When creating Atom instances, it's better to use `Cow<str>` or `&str` instead of `String`. Note that `&str` is better than `Cow<str>` here.
  source:
    path: AGENTS.md
    lines: '21'
    commit: 99e61c4cc172b772437dcabcf8f937a8f24dc4bd
  evidence: The gold patch avoids introducing new String allocations in the parser hot path; the new branch uses existing token and parse-decl machinery that takes borrowed inputs.
  category: naming
  verification: llm_judge
- rule: Prefer fixture tests over inline (`#[test]`) tests.
  source:
    path: AGENTS.md
    lines: '44'
    commit: 99e61c4cc172b772437dcabcf8f937a8f24dc4bd
  evidence: The gold solution adds a new fixture at crates/swc_ecma_parser/tests/flow/declare-export-default-interface/basic.js with a matching .json snapshot, following the project's fixture convention.
  category: testing
  verification: llm_judge
- rule: Do not use unstable, nightly only features of rustc.
  source:
    path: AGENTS.md
    lines: '74'
    commit: 99e61c4cc172b772437dcabcf8f937a8f24dc4bd
  evidence: 'The gold diff uses only stable Rust constructs; no #![feature(...)] opt-ins or nightly-only syntax appear.'
  category: style
  verification: programmatic
distractors:
- rule: Prefer multiple small files over single large file.
  source:
    path: AGENTS.md
    lines: '16'
    commit: 99e61c4cc172b772437dcabcf8f937a8f24dc4bd
  collision_type: scope_ambiguity
  why_distracting: This encourages splitting the fix across files, but the PR is intentionally narrow — a single inline branch in the existing parser ladder.
  severity: medium
- rule: Prefer enum (or dedicated type) based modeling over raw string literals whenever possible.
  source:
    path: AGENTS.md
    lines: '17'
    commit: 99e61c4cc172b772437dcabcf8f937a8f24dc4bd
  collision_type: rule_conflict
  why_distracting: Parser branches match on Token enum variants, not raw strings. An agent might misinterpret this as requiring a new enum type, over-engineering the fix.
  severity: medium
- rule: Write unit tests for your code.
  source:
    path: AGENTS.md
    lines: '43'
    commit: 99e61c4cc172b772437dcabcf8f937a8f24dc4bd
  collision_type: rule_conflict
  why_distracting: 'Contradicts the fixture-test preference on line 44. An agent following this rule might add inline #[test] functions instead of fixture snapshots.'
  severity: high
