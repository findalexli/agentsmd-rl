rubric:
- rule: Helm chart changes follow the existing schema patterns in helm/dagster/schema/
distractors:
- rule: ALWAYS check this before writing data structures - use @record instead of
    @dataclass.
  collision_type: would_cause_bug
  why_distracting: The instructions explicitly require adding an `InitContainerImage`
    Pydantic model. Pydantic models must inherit from `BaseModel`. Using Dagster's
    `@record` decorator instead of a Pydantic model would break the Helm schema generation
    which relies on Pydantic's specific features.
  severity: high
  source:
    path: CLAUDE.md
    lines: 10-11
- rule: 'Python: Core framework in python_modules/dagster/, libraries in python_modules/libraries/'
  collision_type: architecture_boundary
  why_distracting: The agent might restrict its search for Python files to the `python_modules/`
    directory, but the Helm schema Python files required for this task are located
    in `helm/dagster/schema/`.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 38-38
hierarchy_analysis: The CLAUDE.md file provides general Python and UI development
  guidelines, but lacks specific instructions for Helm chart development. The rules
  are heavily biased towards the core Python framework and React UI, which can mislead
  an agent working on the Helm schema generation scripts located in the `helm/` directory.
version: '2.0'
