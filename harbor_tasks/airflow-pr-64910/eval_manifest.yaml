version: "1.0"

task:
  name: airflow-helm-workers-affinity
  title: Add workers.celery.affinity and workers.kubernetes.affinity to Airflow Helm chart
  description: >
    The Helm chart uses a single workers.affinity setting for both Celery and
    Kubernetes executor workers. Users need separate affinity configurations for
    each worker type with proper precedence handling.

source:
  type: github_pr
  repo: apache/airflow
  pr_number: 64910
  base_commit: 8dc4305675a6817f55d5ebcc88367859da21beca
  merge_commit: 1c3ec8ab662534fb11187772c9ba1af29759ccba

checks:
  - id: test_kubernetes_affinity_precedence_over_workers_affinity
    type: fail_to_pass
    origin: pr_behavior
    description: >
      workers.kubernetes.affinity takes precedence over workers.affinity
      in the pod-template-file for Kubernetes executor pods.

  - id: test_kubernetes_affinity_standalone
    type: fail_to_pass
    origin: pr_behavior
    description: >
      workers.kubernetes.affinity works when set alone without workers.affinity.

  - id: test_workers_affinity_backwards_compatibility
    type: pass_to_pass
    origin: regression
    description: >
      workers.affinity continues to work for backwards compatibility.

  - id: test_helm_lint
    type: pass_to_pass
    origin: repo_tests
    description: Helm chart passes linting.

  - id: test_values_schema_has_kubernetes_affinity
    type: fail_to_pass
    origin: pr_behavior
    description: >
      values.schema.json defines workers.kubernetes.affinity property.

  - id: test_values_yaml_has_kubernetes_affinity_default
    type: fail_to_pass
    origin: pr_behavior
    description: >
      values.yaml has workers.kubernetes.affinity default value.

  - id: test_deprecation_warning_in_notes_template
    type: fail_to_pass
    origin: pr_behavior
    description: >
      NOTES.txt template includes deprecation warning for workers.affinity.

  - id: test_repo_helm_template_renders
    type: pass_to_pass
    origin: repo_tests
    description: Helm chart templates render without errors.

  - id: test_repo_helm_template_kubernetes_executor
    type: pass_to_pass
    origin: repo_tests
    description: Helm chart renders correctly with KubernetesExecutor.

  - id: test_repo_values_schema_valid_json
    type: pass_to_pass
    origin: repo_tests
    description: values.schema.json has valid JSON syntax.

  - id: test_repo_values_yaml_valid_syntax
    type: pass_to_pass
    origin: repo_tests
    description: values.yaml has valid YAML syntax.

  - id: test_repo_chart_yaml_valid
    type: pass_to_pass
    origin: repo_tests
    description: Chart.yaml is valid and readable by helm.

# rubric section removed: the judge evaluates changes to agent config files
# (CLAUDE.md, README.md, etc.) but this PR only modifies Helm chart files.
# The original rules (pytest parametrize, license headers, newsfragments)
# are not applicable to Helm chart changes that don't touch those files.
