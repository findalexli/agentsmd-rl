task_info:
  name: cline-cli-mcp-add-shortcuts
  title: "Add MCP server shortcuts to CLI (stdio and HTTP)"
  difficulty: medium
  tags: ["cli", "mcp", "typescript", "commander", "config"]
  estimated_time: 30m

# Test checks mapping to test_outputs.py functions
checks:
  # Fail-to-pass: Core functionality tests
  - id: test_mcp_utility_module_exists
    type: fail_to_pass
    origin: functional
    description: "MCP utility module (mcp.ts) must exist"

  - id: test_mcp_test_file_exists
    type: fail_to_pass
    origin: functional
    description: "MCP test file (mcp.test.ts) must exist"

  - id: test_mcp_exports_addMcpServerShortcut
    type: fail_to_pass
    origin: functional
    description: "mcp.ts must export addMcpServerShortcut function"

  - id: test_mcp_exports_McpAddOptions
    type: fail_to_pass
    origin: functional
    description: "mcp.ts must export McpAddOptions interface"

  - id: test_mcp_exports_AddMcpServerResult
    type: fail_to_pass
    origin: functional
    description: "mcp.ts must export AddMcpServerResult interface"

  - id: test_index_imports_mcp_module
    type: fail_to_pass
    origin: functional
    description: "index.ts must import from mcp module"

  - id: test_index_has_mcp_command
    type: fail_to_pass
    origin: functional
    description: "CLI must have mcp command registered"

  - id: test_index_has_mcp_add_subcommand
    type: fail_to_pass
    origin: functional
    description: "mcp command must have add subcommand"

  - id: test_addMcpServer_function_exists_in_index
    type: fail_to_pass
    origin: functional
    description: "addMcpServer function must be defined in index.ts"

  - id: test_mcp_stdio_writes_type_stdio
    type: fail_to_pass
    origin: functional
    description: "mcp.ts must write type=stdio for stdio transport"

  - id: test_mcp_http_maps_to_streamableHttp
    type: fail_to_pass
    origin: functional
    description: "mcp.ts must map http type to streamableHttp"

  - id: test_mcp_validates_url_without_type
    type: fail_to_pass
    origin: functional
    description: "mcp.ts must error when URL provided without --type http"

  - id: test_mcp_uses_ServerConfigSchema
    type: fail_to_pass
    origin: agent_config
    source: ".clinerules/storage.md"
    description: "mcp.ts must use ServerConfigSchema for validation"

  - id: test_mcp_checks_duplicate_names
    type: fail_to_pass
    origin: functional
    description: "mcp.ts must check for duplicate server names"

  - id: test_mcp_stdio_config_structure
    type: fail_to_pass
    origin: functional
    description: "mcp.ts must create correct stdio config structure (command, args, type)"

  - id: test_mcp_remote_config_structure
    type: fail_to_pass
    origin: functional
    description: "mcp.ts must create correct remote config structure (url, type)"

  - id: test_mcp_uses_initializeCliContext
    type: fail_to_pass
    origin: agent_config
    source: ".clinerules/storage.md"
    description: "mcp.ts must use initializeCliContext for config resolution"

  - id: test_mcp_reads_existing_settings
    type: fail_to_pass
    origin: functional
    description: "mcp.ts must read existing MCP settings file"

  - id: test_mcp_writes_settings
    type: fail_to_pass
    origin: functional
    description: "mcp.ts must write updated settings to file"

  - id: test_mcp_command_parsing_test_exists
    type: fail_to_pass
    origin: functional
    description: "Test for mcp command parsing must exist in index.test.ts"

  # Pass-to-pass: Quality/CI tests
  - id: test_syntax_valid
    type: pass_to_pass
    origin: static
    description: "TypeScript files have valid syntax structure"

  - id: test_unit_tests_exist
    type: pass_to_pass
    origin: static
    description: "Unit test files exist with valid test structure"

  - id: test_repo_cli_utils_tests
    type: pass_to_pass
    origin: repo_tests
    description: "CLI utility tests pass (piped, display, parser, mode-selection)"

  - id: test_repo_cli_agent_tests
    type: pass_to_pass
    origin: repo_tests
    description: "CLI agent tests pass (ClineSessionEmitter, messageTranslator)"

  - id: test_repo_cli_constants_tests
    type: pass_to_pass
    origin: repo_tests
    description: "CLI constants tests pass (featured-models)"

  - id: test_repo_cli_task_tests
    type: pass_to_pass
    origin: repo_tests
    description: "CLI task-related tests pass (plain-text-task)"

# Rubric: Agent config rules that are soft/subjective
rubric:
  - rule: "CLI code should use React Ink for terminal UI when appropriate"
    source: ".clinerules/cli.md"
    weight: optional

  - rule: "Never use dimColor with gray - use color='gray' for secondary text"
    source: ".clinerules/cli.md"
    weight: optional

  - rule: "When updating CLI, consider updating TUI for similar experience"
    source: ".clinerules/cli.md"
    weight: optional

  - rule: "Use StateManager for persistent data, NOT VSCode's ExtensionContext"
    source: ".clinerules/storage.md"
    weight: required

  - rule: "All storage keys must be defined in state-keys.ts"
    source: ".clinerules/storage.md"
    weight: required

  - rule: "Storage data may be read by different clients (VSCode, CLI, JetBrains)"
    source: ".clinerules/storage.md"
    weight: optional
