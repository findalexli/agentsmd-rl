  - id: test_artifact_card_routes_to_key_page_when_key_present
    type: fail_to_pass
    origin: code_analysis
    description: ArtifactCard links to /artifacts/key/$key when key is present

  - id: test_artifact_card_routes_to_id_page_when_key_missing
    type: fail_to_pass
    origin: code_analysis
    description: ArtifactCard links to /artifacts/artifact/$id when key is null/undefined/empty

  - id: test_artifact_card_does_not_use_old_fallback
    type: fail_to_pass
