source_pr:
  owner: prefecthq
  repo: prefect
  number: 21454
  title: "fix(ui-v2): handle null-key artifacts in ArtifactCard to prevent broken empty-key routes"
  merge_commit: 07def35b007ae4270a9ee843e3e70e3228477e55
  base_commit: c588fc30dc5a8bc136d411f37bfc7dda9e17cd78

