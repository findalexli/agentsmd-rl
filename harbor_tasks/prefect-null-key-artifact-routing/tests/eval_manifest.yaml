  - id: test_artifact_card_has_getartifactid_function
    type: fail_to_pass
    origin: agent_config
    source: "ui-v2/src/components/AGENTS.md: NEVER use as unknown"
    description: ArtifactCard has getArtifactId helper function for duck-typing Artifact vs ArtifactCollection

  - id: test_artifact_card_has_haskey_check
