notes:
  - The fix involves changing how ArtifactCard generates Link props based on whether artifact.key is truthy
  - For null/undefined/empty keys, link to /artifacts/artifact/$id using either latest_id (for ArtifactCollection) or id (for Artifact)
  - For present keys, link to /artifacts/key/$key as before
  - The getArtifactId helper uses duck-typing via "latest_id" in artifact to distinguish types
