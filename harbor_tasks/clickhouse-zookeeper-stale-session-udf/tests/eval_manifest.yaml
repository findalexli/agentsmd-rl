source_pr:
  owner: ClickHouse
  repo: ClickHouse
  number: 102170
  title: "Fix crash caused by stale ZooKeeper session in UDF retry loop"
  base_commit: 6f01023e78a9e84c588068560fda778a7c11a665
  merge_commit: 863e3d33498f075a84659eb2c8948de69b8bc88e
  target_file: src/Functions/UserDefined/UserDefinedSQLObjectsZooKeeperStorage.cpp

checks:
  # Pass-to-pass test (repo CI/CD - syntax check)
  - id: test_file_compiles
    type: pass_to_pass
    origin: repo_tests
    description: "Target C++ file compiles without syntax errors"

  # Fail-to-pass tests (core bug fix verification)
  - id: test_zookeeper_session_renewal_in_retry_loop
    type: fail_to_pass
    origin: behavioral
    description: "Session renewal via zookeeper_getter.getZooKeeper().first must be present"

  - id: test_object_names_fetched_inside_retry_loop
    type: fail_to_pass
    origin: behavioral
    description: "object_names must be fetched inside retryLoop, not before it"

  - id: test_no_stale_zookeeper_parameter_in_loop
    type: fail_to_pass
    origin: behavioral
    description: "Original zookeeper parameter should not be used inside retry loop after fix"

  - id: test_session_renewal_timing
    type: fail_to_pass
    origin: behavioral
    description: "Session renewal must happen before getObjectNamesAndSetWatch"

  # Pass-to-pass tests (quality/code style)
  - id: test_comments_reflect_fix
    type: pass_to_pass
    origin: static
    description: "Comments should explain the session renewal behavior"

  - id: test_repo_code_style
    type: pass_to_pass
    origin: static
    source: ".github/copilot-instructions.md - ClickHouse naming conventions"
    description: "Code follows ClickHouse naming conventions (snake_case)"

  # Pass-to-pass tests (actual CI/repo tests)
  - id: test_repo_cpp_style_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo C++ style check passes (ci/jobs/scripts/check_style/check_cpp.sh)"

  - id: test_repo_submodules_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo submodules validation passes (ci/jobs/scripts/check_style/check_submodules.sh)"

  - id: test_target_file_no_tabs
    type: pass_to_pass
    origin: static
    description: "Target file has no tab characters (ClickHouse uses 4-space indentation)"

  - id: test_git_working_tree_clean
    type: pass_to_pass
    origin: repo_tests
    description: "Git working tree is clean with no unexpected modifications"

