source:
  pr: prisma/prisma#29285
  title: "fix: use mysql binary protocol to avoid a lossy conversion"
  merge_commit: bee450265aaa2e8bab7320fdbe4ce83d11289ac0
  base_commit: 9fa295d70ff0497e0f0e4f06bdd5df76f6a9501a

checks:
  - id: test_adapter_uses_execute_for_queries
    type: fail_to_pass
    description: |
      The MariaDB adapter must use execute() (binary protocol) for queries
      instead of query() (text protocol) to avoid precision loss with large decimal values.
    origin: agent_config
    source_ref:
      config_file: AGENTS.md
      lines: "Coding conventions section"
      commit: 9fa295d70ff0497e0f0e4f06bdd5df76f6a9501a

  - id: test_lint_adapter
    type: pass_to_pass
    description: Lint checks must pass for the adapter
    origin: repo_tests

  - id: test_repo_adapter_errors_test
    type: pass_to_pass
    description: Repo's error-mapping unit tests pass for adapter-mariadb
    origin: repo_tests

rubric:
