source_pr: "withastro/astro#16002"
title: "Fix file descriptor leaks from read streams"
base_commit: "47694d0db98ef899dd5e0d337964f476d01d7904"
merge_commit: "846f27f4be8508f728d237e93fcac7c6ec8227b2"

# Estimated difficulty and metadata
difficulty: "medium"
estimated_time: "15-30 minutes"
tags: ["nodejs", "streams", "file-descriptors", "error-handling", "integrations"]

# List of all checks to run
checks:
  # Fail-to-pass tests: verify the fix is present
  - id: test_partytown_stream_cleanup
    type: fail_to_pass
    origin: agent_config
    description: "Partytown sirv.ts has stream.destroy() on response close to prevent fd leak"
    source:
      file: "packages/integrations/partytown/src/sirv.ts"
      lines: [129-131]
      commit: "846f27f4be8508f728d237e93fcac7c6ec8227b2"

  - id: test_node_serve_app_stream_cleanup
    type: fail_to_pass
    origin: agent_config
    description: "Node serve-app.ts destroys streams in catch block to prevent fd leak across retries"
    source:
      file: "packages/integrations/node/src/serve-app.ts"
      lines: [23, 26, 35-37]
      commit: "846f27f4be8508f728d237e93fcac7c6ec8227b2"

  # Pass-to-pass tests: repo CI/CD verification
  - id: test_typescript_compiles
    type: pass_to_pass
    origin: repo_tests
    description: "Node integration TypeScript compiles without errors"

  - id: test_partytown_typescript_compiles
    type: pass_to_pass
    origin: repo_tests
    description: "Partytown integration TypeScript compiles without errors"

  - id: test_biome_lint
    type: pass_to_pass
    origin: repo_tests
    description: "Biome linting passes for node integration"

  - id: test_partytown_biome_lint
    type: pass_to_pass
    origin: repo_tests
    description: "Biome linting passes for partytown sirv.ts"

  - id: test_node_build_ci
    type: pass_to_pass
    origin: repo_tests
    description: "Node integration builds successfully with pnpm run build:ci"

  - id: test_partytown_build_ci
    type: pass_to_pass
    origin: repo_tests
    description: "Partytown integration builds successfully with pnpm run build:ci"

  - id: test_node_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Node integration unit tests pass"

  - id: test_node_unit_tests_serve_static
    type: pass_to_pass
    origin: repo_tests
    description: "Node integration serve-static-path unit tests pass"

  - id: test_biome_lint_modified_files
    type: pass_to_pass
    origin: repo_tests
    description: "Biome linting passes on both modified source files"

