version: "2.0"

source:
  repo: "astral-sh/ruff"
  pr: 24242
  base_commit: "6505b079d7b7eddbf27c8a2e60a647a085d1b8ff"
  merge_commit: "a943836bc36ba0960701eea2822733aa230928ff"

checks:
  - id: cargo_check
    type: pass_to_pass
    origin: static
    description: "Rust code must compile (cargo check -p ty_python_semantic)"

  - id: classvar_rejected_in_pep695_alias
    type: fail_to_pass
    origin: pr_diff
    description: "ClassVar (subscripted, bare, both import paths) must produce invalid-type-form in PEP 695 type aliases"

  - id: final_rejected_in_pep695_alias
    type: fail_to_pass
    origin: pr_diff
    description: "Final (subscripted and bare) must produce invalid-type-form in PEP 695 type aliases"

  - id: required_notreq_readonly_rejected
    type: fail_to_pass
    origin: pr_diff
    description: "Required, NotRequired, ReadOnly must each produce invalid-type-form in PEP 695 type aliases"

  - id: initvar_rejected_in_pep695_alias
    type: fail_to_pass
    origin: pr_diff
    description: "InitVar (subscripted, bare, multiple arg types) must produce invalid-type-form in PEP 695 type aliases"

  - id: all_nine_qualifiers_flagged
    type: fail_to_pass
    origin: pr_diff
    description: "All 9 type qualifier uses in PEP 695 aliases produce invalid-type-form diagnostics"

  - id: valid_pep695_aliases_accepted
    type: pass_to_pass
    origin: pr_diff
    description: "Valid PEP 695 type aliases (int|str, generics) must not produce invalid-type-form errors"

  - id: classvar_in_annotation_still_valid
    type: pass_to_pass
    origin: pr_diff
    description: "ClassVar in class annotations must not regress"

  - id: final_in_annotation_still_valid
    type: pass_to_pass
    origin: pr_diff
    description: "Final in variable annotations must not regress"

  - id: pep613_aliases_still_flagged
    type: pass_to_pass
    origin: pr_diff
    description: "PEP 613 TypeAlias form must still flag qualifiers (regression check)"

  - id: error_messages_concise
    type: fail_to_pass
    origin: agent_config
    description: "Error messages for type qualifier violations must be concise (<150 chars per message)"
    source:
      path: "AGENTS.md"
      lines: "83"
      commit: "6505b079d7b7eddbf27c8a2e60a647a085d1b8ff"

  - id: no_unwrap_in_diff
    type: pass_to_pass
    origin: agent_config
    description: "Changed code must not introduce .unwrap() / panic!() calls"
    source:
      path: "AGENTS.md"
      lines: "79"
      commit: "6505b079d7b7eddbf27c8a2e60a647a085d1b8ff"

  - id: no_local_imports
    type: pass_to_pass
    origin: agent_config
    description: "Rust imports must be at the top of the file, not locally in functions"
    source:
      path: "AGENTS.md"
      lines: "76"
      commit: "6505b079d7b7eddbf27c8a2e60a647a085d1b8ff"

rubric:
  - rule: "Prefer let chains (`if let` combined with `&&`) over nested `if let` statements to reduce indentation and improve readability."
    source:
      path: "AGENTS.md"
      lines: "80"
      commit: "6505b079d7b7eddbf27c8a2e60a647a085d1b8ff"

  - rule: "Try hard to avoid patterns that require `panic!`, `unreachable!`, or `.unwrap()`. Instead, try to encode those constraints in the type system."
    source:
      path: "AGENTS.md"
      lines: "79"
      commit: "6505b079d7b7eddbf27c8a2e60a647a085d1b8ff"

  - rule: "Avoid writing significant amounts of new code. This is often a sign that we're missing an existing method or mechanism that could help solve the problem. Look for existing utilities first."
    source:
      path: "AGENTS.md"
      lines: "78"
      commit: "6505b079d7b7eddbf27c8a2e60a647a085d1b8ff"

  - rule: "Use comments purposefully. Don't use comments to narrate code, but do use them to explain invariants and why something unusual was done a particular way."
    source:
      path: "AGENTS.md"
      lines: "82"
      commit: "6505b079d7b7eddbf27c8a2e60a647a085d1b8ff"

  - rule: "Rust imports should always go at the top of the file, never locally in functions."
    source:
      path: "AGENTS.md"
      lines: "76"
      commit: "6505b079d7b7eddbf27c8a2e60a647a085d1b8ff"

  - rule: "Any method that accesses `.node()` must be `#[salsa::tracked]`, or it will break incrementality. Prefer higher-level semantic APIs over raw AST access."
    source:
      path: "AGENTS.md"
      lines: "84"
      commit: "6505b079d7b7eddbf27c8a2e60a647a085d1b8ff"
