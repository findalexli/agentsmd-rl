[task]
name = "payload-trash-draft-localized"
title = "fix: use latest draft version data when trashing unpublished documents"
difficulty = "medium"
estimated_minutes = 30
tags = ["payloadcms", "draft", "trash", "localization", "bugfix"]

[agent]
instructions = [
    "packages/payload/src/collections/operations/update.ts",
    "test/trash/config.ts",
    "test/trash/collections/Posts/index.ts",
    "test/trash/int.spec.ts"
]

[benchmark]
cleanup = ["node_modules", ".turbo", ".next"]

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
