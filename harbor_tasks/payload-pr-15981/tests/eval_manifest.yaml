version: 1

PR:
  owner: payloadcms
  repo: payload
  number: 15981
  base_commit: 944a889d
  merge_commit: 57a0edc6ffe5d814147bbed46a041294247eb1f5
  title: "fix: use latest draft version data when trashing unpublished documents"

  description: |
    Fixes a bug where localized field data was silently lost when bulk-trashing
    draft-only documents on collections with `trash: true` and `versions.drafts` enabled.
    The root cause was that bulk-trash operations read stale data from the main collection
    table instead of the versions table. The fix ensures the versions table is queried
    when trashing unpublished documents, similar to how single-document trash already works.

    The change is minimal:
    - In `packages/payload/src/collections/operations/update.ts`: Changed condition from
      `shouldSaveDraft` to `(shouldSaveDraft || isTrashAttempt)` when deciding whether
      to query the versions table for draft data.

    Bug: #15980

