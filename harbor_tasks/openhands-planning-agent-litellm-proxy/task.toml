name = "openhands-planning-agent-litellm-proxy"
title = "Fix planning agent auth error with litellm_proxy model prefix"
description = "The _configure_llm method only checked for 'openhands/' prefix to set base_url, but sub-conversations inherit SDK-transformed model names like 'litellm_proxy/model'. This caused auth errors when using the planning agent with the OpenHands provider."

# Difficulty and classification
difficulty = "easy"
tags = ["python", "bugfix", "auth", "llm", "prefix-matching"]

# Time estimates (in minutes)
estimated_time = 15

# Source PR
source_pr = "All-Hands-AI/OpenHands#13638"

# Repository info
[repository]
url = "https://github.com/All-Hands-AI/OpenHands.git"
base_commit = "e1afc95b6c76b7493deb5d7f7dd4ecc2a8cb719b"
merge_commit = "ed5ab11fccd75b5b98c9f51ebc536713dc519275"

# Primary file being modified
[[modified_files]]
path = "openhands/app_server/app_conversation/live_status_app_conversation_service.py"
change_type = "modified"

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
