rubric:
- rule: 'Documentation updates: PR correctly does NOT modify AGENTS.md (code-only
    change)'
  source:
    path: AGENTS.md
    commit: 682d5640a3497dd69e6ea2b98d2a0f45f34df578
  reference: "(no changes to AGENTS.md - this is a code-only change that follows existing\n\
    \    conventions)"
  category: style
- rule: Follow existing code patterns in the same module.
  source:
    path: AGENTS.md
    lines: '34'
  evidence: The `set_numa_affinity` method is implemented as a `@classmethod` in `CudaPlatform`,
    matching the existing pattern of other methods in the class.
  category: style
- rule: 'Logging: ... never `print`'
  source:
    path: AGENTS.md
    lines: 62-64
  evidence: The gold solution uses `logger.info` and `logger.warning` to report the
    affinity status and errors, strictly avoiding the use of `print`.
  category: tooling
distractors:
- rule: Add tests for new functionality.
  collision_type: scope_ambiguity
  why_distracting: The rule requires adding tests for new functionality, but testing
    NUMA affinity and NVML requires specific multi-GPU hardware. Writing unit tests
    would require extensive mocking of `pynvml` and `os.sched_getaffinity`, which
    is not requested and likely to be brittle.
  severity: medium
  source:
    path: AGENTS.md
    lines: '35'
- rule: 'Ask first before: Adding new dependencies.'
  collision_type: rule_conflict
  why_distracting: The rule says to ask first before adding new dependencies, but
    the PR instructions explicitly mandate using the `pynvml` package. Asking for
    permission would unnecessarily block the agent.
  severity: high
  source:
    path: AGENTS.md
    lines: '38'
hierarchy_analysis: Both `AGENTS.md` and `CLAUDE.md` are flat, level 0 config files
  that contain overlapping rules (e.g., 'Add tests for new functionality', 'Ask first
  before adding new dependencies'). The agent must prioritize the explicit PR instructions
  over the general 'Ask first' rule for dependencies, and recognize that hardware-specific
  features like NVML/NUMA affinity are practically exempt from the general unit testing
  mandate.
