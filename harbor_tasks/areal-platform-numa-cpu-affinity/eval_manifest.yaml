rubric:
- rule: 'Prefer composition over inheritance: Avoid deep class hierarchies'
  source:
    path: AGENTS.md
    lines: '81'
    commit: 682d5640a3497dd69e6ea2b98d2a0f45f34df578
  reference: '- **Composition over inheritance** -- keep hierarchies \<= 2 levels;
    prefer delegation.'
- rule: Logging calls in new code should use PascalCase logger names; per-rank log
    messages should follow the format [Component Rank N]
  source:
    path: AGENTS.md
    lines: 90-91
    commit: 682d5640a3497dd69e6ea2b98d2a0f45f34df578
  reference: '**Logging**: `areal.utils.logging.getLogger(name)` with **PascalCase**
    names -- never

    `print` or `logging.__name__`. Per-rank format: `[{Component} Rank {N}]`. Register
    new

    loggers with color in `areal/utils/logging.py`.'
- rule: Follow existing code patterns in the same module.
  source:
    path: AGENTS.md
    lines: '23'
  evidence: The gold solution implements `set_numa_affinity` as a `@classmethod` in
    both `Platform` and `CudaPlatform`, mirroring the existing `set_device` pattern
    in the same module.
  category: architecture
- rule: 'Logging: ... never print'
  source:
    path: AGENTS.md
    lines: 54-55
  evidence: The gold solution uses `logger.info` and `logger.warning` to report NVML
    initialization success and errors, strictly avoiding the use of `print`.
  category: style
distractors:
- rule: Add tests for new functionality.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to write unit tests for `set_numa_affinity`.
    However, testing NVML and NUMA topology requires specific multi-socket hardware
    or complex mocking of `pynvml` and `os.sched_getaffinity`, which is out of scope
    for this PR. The gold solution relies on defensive runtime checks instead.
  severity: medium
  source:
    path: AGENTS.md
    lines: '24'
- rule: 'Ask first before: Adding new dependencies.'
  collision_type: rule_conflict
  why_distracting: The instructions specify using `pynvml` (the `nvidia-ml-py` package).
    The agent might halt to ask permission to add this dependency or attempt to modify
    `pyproject.toml` / `uv.lock`. However, the gold solution handles it via a defensive
    `try...except ImportError` block without modifying project dependencies.
  severity: high
  source:
    path: AGENTS.md
    lines: 29-32
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` contain identical core rules,
  but `AGENTS.md` is specifically tailored for AI agents. The primary conflict arises
  between the task instruction to use `pynvml` and the repository rule to 'Ask first
  before adding new dependencies'. A successful agent must resolve this by implementing
  a defensive import (`try...except ImportError`) rather than modifying dependency
  files or halting for clarification.
