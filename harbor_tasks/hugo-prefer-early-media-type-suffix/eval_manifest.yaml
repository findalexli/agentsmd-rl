rubric:
- rule: If you need to add temporary debug printing, use `hdebug.Printf`.
  source:
    path: AGENTS.md
    lines: '6'
    commit: 13a95b9c0167c832fe2babf961ac5cad22e3a1e4
  evidence: The patch introduces no fmt.Print* calls; all output uses existing logging or test assertion paths.
  category: style
  verification: programmatic
- rule: Never export symbols that's not needed outside of the package.
  source:
    path: AGENTS.md
    lines: '7'
    commit: 13a95b9c0167c832fe2babf961ac5cad22e3a1e4
  evidence: No new exported symbols are introduced; the fix is scoped entirely within the existing unexported insertTemplate2 method.
  category: naming
  verification: llm_judge
- rule: This is a project with a long history; assume that a similiar problem has been solved before, look hard for helper functions before creating new ones.
  source:
    path: AGENTS.md
    lines: '9'
    commit: 13a95b9c0167c832fe2babf961ac5cad22e3a1e4
  evidence: The patch reuses slices.Index, MediaTypes.GetByType, pi.Ext(), and nkExisting.PathInfo.Ext() instead of reimplementing media-type or extension-comparison logic.
  category: architecture
  verification: llm_judge
- rule: Don't use comments to explain the obvious.
  source:
    path: AGENTS.md
    lines: '3'
    commit: 13a95b9c0167c832fe2babf961ac5cad22e3a1e4
  evidence: 'The patch adds only a concise ''Issue #13877'' reference comment; it does not narrate what slices.Index or the suffix comparison does.'
  category: style
  verification: llm_judge
distractors:
- rule: Brevity is good.
  source:
    path: AGENTS.md
    lines: '1'
    commit: 13a95b9c0167c832fe2babf961ac5cad22e3a1e4
  collision_type: rule_conflict
  why_distracting: An agent might interpret brevity as a reason to write the shortest possible diff — e.g. always picking the lexicographically first suffix — skipping the proper MediaTypes lookup and declared-order comparison.
  severity: medium
- rule: Never export symbols that's not needed outside of the package.
  source:
    path: AGENTS.md
    lines: '7'
    commit: 13a95b9c0167c832fe2babf961ac5cad22e3a1e4
  collision_type: architecture_boundary
  why_distracting: An agent might incorrectly try to refactor insertTemplate2's signature or visibility instead of fixing the collision logic inside the method.
  severity: low
