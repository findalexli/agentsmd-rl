- id: test_first_suffix_c_among_four
  type: fail_to_pass
  origin: pr_diff
  description: With suffixes=['c','d','a','b'] and layouts page.html.{a,b,c,d}, the output must come from page.html.c — the first declared suffix wins, not the alphabetically-last template.
- id: test_middle_declared_suffix_wins
  type: fail_to_pass
  origin: pr_diff
  description: With suffixes=['m','a','z'], the layout with extension 'm' wins because it is declared first. Guards against lexicographic shortcuts.
