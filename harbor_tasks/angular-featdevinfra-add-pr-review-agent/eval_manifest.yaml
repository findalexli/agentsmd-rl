config_edits:
- path: .agent/skills/pr_review/SKILL.md
  tier: 1
  gold_added: "---\nname: PR Review\ndescription: Guidelines and tools for reviewing\
    \ pull requests in the Angular repository.\n---\n\n# PR Review Guidelines\n\n\
    When reviewing a pull request for the `angular` repository, follow these essential\
    \ guidelines to ensure high-quality contributions:\n\n1. **Context & Ecosystem**:\n\
    \   - Keep in mind that this is the core Angular framework. Changes here can impact\
    \ millions of developers.\n   - Be mindful of backwards compatibility. Breaking\
    \ changes require strict approval processes and deprecation periods.\n\n2. **Key\
    \ Focus Areas**:\n   - **Comprehensive Reviews**: You **MUST always** perform\
    \ a deep, comprehensive review of the _entire_ pull request. If the user asks\
    \ you to look into a specific issue, file, or area of concern, you must investigate\
    \ that specific area _in addition to_ reviewing the rest of the PR's substantive\
    \ changes. Do not terminate your review after addressing only the user's focal\
    \ point.\n   - **Package-Specific Guidelines**: Check if there are specific guidelines\
    \ for the package being modified in the `reference/` directory (e.g., `reference/router.md`).\
    \ Always prioritize these rules for their respective packages.\n   - **Commit\
    \ Messages**: Evaluate the quality of commit messages. They should explain the\
    \ _why_ behind the change, not just the _what_. Someone should be able to look\
    \ at the commit history years from now and clearly understand the context and\
    \ reasoning for the change.\n   - **Code Cleanliness**: Ensure the code is readable,\
    \ maintainable, and follows Angular's project standards.\n   - **Performance**:\
    \ Look out for code that might negatively impact runtime performance or bundle\
    \ size, particularly in hot paths like change detection or rendering.\n   - **Testing**:\
    \ Ensure all new logic has comprehensive tests, including edge cases. **Do NOT\
    \ run tests locally** as part of your review process. CI handles this automatically,\
    \ and running tests locally is redundant and inefficient.\n   - **API Design**:\
    \ Ensure new public APIs are well-des"
  gold_removed: ''
- path: .agent/skills/pr_review/reference/router.md
  tier: 2
  gold_added: '# Router PR Review Guidelines


    When reviewing pull requests that modify the Angular Router (`packages/router`),
    pay special attention to the following:


    - **Timing Sensitivity**: The router is extremely sensitive to timing changes.
    Any changes that alter the asynchronous timing of navigations, resolvers, or guards
    are almost always breaking changes and must be scrutinized carefully.

    - **Testing Practices**: Tests should usually use the `RouterTestingHarness`.
    Many existing tests are older and do not use this harness. Do not blindly follow
    the shape of existing tests when writing or reviewing new ones; encourage the
    use of modern testing utilities.

    - **Feature Justification**: Changes to router core code should be well-justified.
    Consider whether the change is proven to be a core developer ask, such as resolving
    a highly upvoted GitHub issue or addressing a critical bug.'
  gold_removed: ''
distractors:
- rule: Use `pnpm bazel test //target` to run tests.
  collision_type: meta_confusion
  why_distracting: 'The rule instructs to use `pnpm bazel test //target` to run tests.
    An agent might include this instruction in the PR review skill or attempt to run
    tests locally to verify the PR. However, the gold solution explicitly dictates:
    ''Do NOT run tests locally as part of your review process. CI handles this automatically''.'
  severity: high
  source:
    path: AGENTS.md
    lines: 9-10
- rule: Use the `gh` CLI (GitHub CLI) for creating and managing pull requests.
  collision_type: scope_ambiguity
  why_distracting: The rule says to use the `gh` CLI for managing pull requests. An
    agent might instruct the reviewer to use `gh` CLI for reviewing, or try to use
    it directly. However, the prompt requires creating custom helper bash scripts
    under `scripts/` for PR review operations (fetching, staging, replying) and the
    gold solution directs users to use 'GitHub MCP or available scripts'.
  severity: medium
  source:
    path: AGENTS.md
    lines: 29-30
- rule: 'Testing: Zoneless & Async-First. Do NOT use fixture.detectChanges(). ALWAYS
    use the ''Act, Wait, Assert'' pattern.'
  collision_type: meta_confusion
  why_distracting: The rule provides detailed instructions for writing Zoneless &
    Async-First tests (e.g., using `fixture.whenStable()`, `useAutoTick()`). An agent
    might copy these specific testing implementation details into the general PR review
    SKILL.md. However, the PR review skill is meant to be high-level guidelines, and
    implementation-specific details are too granular for the general review checklist.
  severity: low
  source:
    path: AGENTS.md
    lines: 16-27
hierarchy_analysis: 'The configuration consists of a single root file (`AGENTS.md`).
  The primary challenge is meta-level: the agent is tasked with writing a guide (a
  skill) for *other* agents. It must distinguish between rules that apply to its own
  behavior (e.g., how to write the bash script) and rules that should be embedded
  into the skill it is generating. The testing rules in `AGENTS.md` apply to writing
  tests, not to reviewing PRs (where CI handles tests).'
