version: "2.0"

source:
  repo: "oven-sh/bun"
  pr: 28200
  base_commit: "5693fc1a98116743f16a7db2952d6e436bf9ec98"
  merge_commit: "1d50d640f8fec6ce2d144f0cfd204e30da373c64"

checks:
  # Fail-to-pass: core behavioral fixes
  - id: macos_headless_shell_mode
    type: fail_to_pass
    origin: pr_diff
    description: "On macOS, headless mode must be 'shell' (not true) to avoid Gatekeeper blocking Chrome .app bundle"

  - id: executable_path_excluded_on_macos
    type: fail_to_pass
    origin: pr_diff
    description: "On macOS with shell mode, executablePath must not be set (it would point to full Chrome, not headless-shell)"

  - id: finite_timeouts
    type: fail_to_pass
    origin: pr_diff
    description: "Launch timeout and protocolTimeout must be finite (>0), not 0/infinite"

  - id: retry_delay_increased
    type: fail_to_pass
    origin: pr_diff
    description: "Retry delay between browser launch attempts must be > 1000ms"

  - id: chmod_cached_binaries
    type: fail_to_pass
    origin: pr_diff
    description: "Downloaded browser binaries in Puppeteer cache must be chmod'd executable"

  # Pass-to-pass: regression + structural
  - id: retry_loop_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "Browser retry loop (for/while + catch + launch) must still exist"

  - id: core_launch_args_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "Core Puppeteer launch args (--no-sandbox, --disable-setuid-sandbox, --disable-dev-shm-usage) preserved"

  - id: puppeteer_launch_with_options
    type: pass_to_pass
    origin: pr_diff
    description: "File has Puppeteer import, launch() call with headless and args config"

  - id: xattr_quarantine_removal
    type: pass_to_pass
    origin: pr_diff
    description: "xattr quarantine removal for macOS Gatekeeper must be preserved"

  - id: test_repo_typescript_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "TypeScript file must have valid syntax"

  - id: test_repo_oxlint
    type: pass_to_pass
    origin: repo_tests
    description: "Repo oxlint check passes on target file"

# Note on rubric: The general Bun testing guidelines in test/CLAUDE.md advise
# against setting timeouts on tests and waiting for time to pass. However, for
# this specific integration test file (dev-server-puppeteer.ts), the fixes are
# about Puppeteer browser launch configuration - not Bun test timeouts. The
# timeout values (30_000, 60_000) are for Puppeteer's launch() function, and the
# retry delay (3000ms) handles transient macOS launch issues. These are appropriate
# fixes for macOS Gatekeeper issues that cause browser launch failures.
#
# The rubric is intentionally left empty because:
# 1. The "no timeouts" rule refers to Bun's test runner timeouts, not Puppeteer launch timeouts
# 2. The "no waiting for time" rule refers to test assertions, not retry delays for system calls
# 3. The gold solution intentionally adds these values to fix the macOS headless shell issues

rubric: []
