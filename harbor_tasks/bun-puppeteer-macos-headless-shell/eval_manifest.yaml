rubric:
- rule: Prefer async/await over callbacks.
  source:
    path: test/CLAUDE.md
    lines: 100-101
  evidence: The gold solution uses `await new Promise(r => setTimeout(r, 3000));`
    for the retry delay, adhering to the preference for async/await over callbacks.
  category: style
  verification: llm_judge
distractors:
- rule: Unless explicitly asked, never wait for time to pass in tests. Always wait
    for the condition to be met instead of waiting for an arbitrary amount of time.
  collision_type: rule_conflict
  why_distracting: The rule forbids waiting for time to pass in tests, but the PR
    instruction explicitly requires increasing the retry delay (using setTimeout)
    to handle transient macOS launch issues.
  severity: high
  source:
    path: test/AGENTS.md
    lines: 16-18
- rule: 'CRITICAL: Do not set a timeout on tests. Bun already has timeouts.'
  collision_type: rule_conflict
  why_distracting: The rule explicitly forbids setting timeouts on tests, marking
    it as CRITICAL. However, the PR instruction specifically identifies infinite timeouts
    (0) in Puppeteer launch options as a bug that causes indefinite hangs, requiring
    the agent to set explicit timeouts.
  severity: high
  source:
    path: test/AGENTS.md
    lines: 108-110
hierarchy_analysis: The repository contains strict testing guidelines in `test/AGENTS.md`
  that forbid setting timeouts and waiting for time to pass. However, this specific
  PR is about fixing a Puppeteer browser launch issue where infinite timeouts cause
  hangs and short retry delays cause flakiness. The agent must recognize that the
  specific PR instructions override the general 'CRITICAL' testing rules.
