rubric:
- rule: Follow existing code style. Check neighboring files for patterns.
  source:
    path: CLAUDE.md
    lines: '139'
    commit: 5693fc1a98116743f16a7db2952d6e436bf9ec98
- rule: Avoid dynamic import & require. Only use dynamic import or require when specifically
    testing dynamic import behavior. Otherwise, always use module-scope import statements.
  source:
    path: test/CLAUDE.md
    lines: 156-175
    commit: 5693fc1a98116743f16a7db2952d6e436bf9ec98
- rule: Prefer async/await over callbacks. When callbacks must be used and it's just
    a single callback, use Promise.withResolvers.
  source:
    path: test/CLAUDE.md
    lines: 102-110
    commit: 5693fc1a98116743f16a7db2952d6e436bf9ec98
- rule: Modify existing files in appropriate directories (like `test/integration/`
    for end-to-end tests) when fixing issues without a specific issue number.
  source:
    path: CLAUDE.md
    lines: 30-36
  evidence: The fix is applied directly to the existing integration test utility `test/integration/next-pages/test/dev-server-puppeteer.ts`
    rather than creating a new test file.
  category: architecture
distractors:
- rule: 'CRITICAL: Do not set a timeout on tests. Bun already has timeouts.'
  collision_type: scope_ambiguity
  why_distracting: The rule strictly forbids setting timeouts on tests because Bun
    has its own timeouts. However, the gold solution changes Puppeteer's `timeout`
    and `protocolTimeout` from 0 (infinite) to 30_000 and 60_000. An agent following
    this rule might leave them at 0 or remove them, causing the CI to hang indefinitely
    when Puppeteer fails to launch.
  severity: high
  source:
    path: test/CLAUDE.md
    lines: 101-102
- rule: never wait for time to pass in tests. Always wait for the condition to be
    met instead of waiting for an arbitrary amount of time.
  collision_type: scope_ambiguity
  why_distracting: The rule forbids waiting for time to pass in tests, but the gold
    solution explicitly increases a `setTimeout` from 1000ms to 3000ms. An agent might
    try to implement complex polling instead of a simple retry delay, overcomplicating
    the Puppeteer launch retry logic.
  severity: medium
  source:
    path: test/CLAUDE.md
    lines: 15-16
hierarchy_analysis: The hierarchy includes root `CLAUDE.md` and `test/CLAUDE.md`.
  The rules in `test/CLAUDE.md` are highly specific to Bun's test runner (`bun:test`),
  but this specific file (`dev-server-puppeteer.ts`) is a Puppeteer script used within
  the integration tests. The agent must distinguish between Bun test runner configuration
  (where timeouts are forbidden) and external tool configuration like Puppeteer (where
  timeouts are necessary to prevent hangs).
