distractors:
- rule: Keep list[list[Sample]] structure intact and do not flatten sample groups
  source:
    path: .claude/skills/add-dynamic-filter/SKILL.md
    lines: 68-69
  source_text: '- Keep `list[list[Sample]]` structure intact where required.

    - Do not flatten sample groups unless downstream path expects flattened samples.'
  collision_type: scope_ambiguity
  why_distracting: The rule warns against flattening sample groups, but the gold diff
    explicitly removes a list (`multimodal_num_items`) and flattens/concatenates multimodal
    tensors in the Megatron data loader. An agent might mistakenly apply this rule
    outside the dynamic filter context and refuse to flatten the tensors.
  severity: medium
- rule: Avoid returning raw Python lists/dicts with mismatched schema in custom paths
  source:
    path: .claude/skills/add-rollout-function/SKILL.md
    lines: '96'
  source_text: '- Returning raw Python lists/dicts with mismatched schema in custom
    path'
  collision_type: scope_ambiguity
  why_distracting: The rule discourages returning raw Python lists/dicts for custom
    rollout functions. The gold diff modifies data processors and utilities (`data.py`,
    `processing_utils.py`) that correctly construct and return raw dictionaries. An
    agent might mistakenly attempt to refactor these to use typed dataclasses.
  severity: low
- rule: Do not flatten sample groups unless downstream path expects flattened samples.
  source:
    path: .claude/skills/add-dynamic-filter/SKILL.md
    lines: '69'
  source_text: '- Do not flatten sample groups unless downstream path expects flattened
    samples.'
  collision_type: scope_ambiguity
  why_distracting: The diff concatenates (`torch.cat`) `mm_tensor` into `multimodal_data`
    along dim=0 (effectively flattening the tensor inputs) and explicitly removes
    `multimodal_num_items` (which tracked sequence counts) in `data.py`. An agent
    might mistakenly think this flattening violates the rule, but the rule applies
    to `Sample` groups in the rollout pipeline, not multimodal tensors in the Megatron
    data backend.
  severity: medium
- rule: Keep list[list[Sample]] structure intact where required.
  source:
    path: .claude/skills/add-dynamic-filter/SKILL.md
    lines: '68'
  source_text: '- Keep `list[list[Sample]]` structure intact where required.'
  collision_type: scope_ambiguity
  why_distracting: The diff removes `multimodal_num_items`, which is a dict of lists
    tracking items per sequence (representing a grouped sequence structure). An agent
    might confuse this structure with the `list[list[Sample]]` structure and avoid
    removing it, but the rule refers to rollout samples, not multimodal data batch
    properties.
  severity: low
- rule: For sample removal, prefer sample.remove_sample=True over deleting objects.
  source:
    path: .claude/skills/add-dynamic-filter/SKILL.md
    lines: '70'
  source_text: '- For sample removal, prefer `sample.remove_sample=True` over deleting
    objects.'
  collision_type: scope_ambiguity
  why_distracting: The PR completely deletes the dictionary key and variable `multimodal_num_items`.
    An agent might think it should not delete objects due to this rule, but the rule
    strictly governs rollout sample masking, not variables in the Megatron data loader.
  severity: low
