source:
  type: github_pr
  repo: apache/airflow
  pr_number: 64739
  base_commit: 27258d567887a93f43af25a9d79d773198751bd9
  merge_commit: 636213e7d33d8ed2a69a6ba9e6b286c43e2008d9
  title: "Add workers.celery.extraContainers & workers.kubernetes.extraContainers"

checks:
  # Fail-to-pass tests - these should fail on base commit and pass after fix
  - id: test_kubernetes_extra_containers_in_pod_template
    type: fail_to_pass
    origin: pr_behavior
    description: "workers.kubernetes.extraContainers adds containers to pod-template-file"

  - id: test_kubernetes_extra_containers_priority_over_legacy
    type: fail_to_pass
    origin: pr_behavior
    description: "workers.kubernetes.extraContainers takes priority over workers.extraContainers"

  - id: test_values_schema_has_kubernetes_extra_containers
    type: fail_to_pass
    origin: pr_behavior
    description: "values.schema.json defines workers.kubernetes.extraContainers"

  - id: test_values_schema_has_celery_extra_containers
    type: fail_to_pass
    origin: pr_behavior
    description: "values.schema.json defines workers.celery.extraContainers"

  - id: test_deprecation_warning_for_legacy_extra_containers
    type: fail_to_pass
    origin: pr_behavior
    description: "NOTES.txt has deprecation warning for workers.extraContainers"

  - id: test_values_yaml_has_kubernetes_extra_containers_default
    type: fail_to_pass
    origin: pr_behavior
    description: "values.yaml includes workers.kubernetes.extraContainers default"

  - id: test_values_yaml_has_celery_extra_containers_default
    type: fail_to_pass
    origin: pr_behavior
    description: "values.yaml includes workers.celery.extraContainers default"

  # Pass-to-pass tests - these should pass both before and after
  - id: test_legacy_extra_containers_still_works
    type: pass_to_pass
    origin: repo_tests
    description: "Backward compatibility - workers.extraContainers still works"

  - id: test_helm_template_renders_successfully
    type: pass_to_pass
    origin: repo_tests
    description: "Helm chart renders without errors"

  - id: test_pod_template_file_renders
    type: pass_to_pass
    origin: repo_tests
    description: "pod-template-file.yaml template renders"

  - id: test_values_schema_valid_json
    type: pass_to_pass
    origin: static
    description: "values.schema.json is valid JSON"

  - id: test_repo_helm_lint
    type: pass_to_pass
    origin: repo_tests
    description: "Helm lint passes on the chart (pre-commit hook)"

  - id: test_repo_helm_lint_strict
    type: pass_to_pass
    origin: repo_tests
    description: "Helm lint passes in strict mode"

  - id: test_repo_chart_yaml_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Chart.yaml is valid and parseable by helm"

  - id: test_repo_helm_template_all_executors
    type: pass_to_pass
    origin: repo_tests
    description: "Helm template renders for all executor types"

rubric:
  # This PR modifies Helm chart files only - no CLAUDE.md/AGENTS.md/README.md changes needed.
  - id: no_agent_config_changes_needed
    rule: "This task is a Helm chart feature addition that does not require changes to agent configuration files (CLAUDE.md, AGENTS.md, README.md). The absence of such changes is expected and correct."
    weight: 1

  - id: helm_chart_changes_only
    rule: "The gold solution correctly modifies only Helm chart files (values.yaml, values.schema.json, templates/, etc.) without touching agent instruction files, as appropriate for this task type."
    weight: 1

  - id: no_readme_modification_required
    rule: "Root-level README.md modification is not required for this Helm chart feature - the changes are self-contained within the chart directory structure and documented via the newsfragment changelog entry."
    weight: 1
