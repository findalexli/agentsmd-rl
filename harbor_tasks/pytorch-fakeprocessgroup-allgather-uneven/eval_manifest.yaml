distractors:
- rule: Once the change is passing, find an appropriate test file to add the test
    to and make sure to follow local conventions on the test file.
  collision_type: scope_ambiguity
  why_distracting: The rule instructs the agent to find an appropriate test file and
    add a test, but the gold solution does not include any test modifications. Attempting
    to find and modify a test file for FakeProcessGroup would waste time and expand
    the PR scope unnecessarily.
  severity: medium
  source:
    path: AGENTS.md
    lines: 4-7
- rule: All build (both codegen, C++ and python) is done via `pip install -e . -v
    --no-build-isolation`.
  collision_type: rule_conflict
  why_distracting: CLAUDE.md instructs the agent to build using `pip install -e .
    -v --no-build-isolation`, but AGENTS.md explicitly states there is no working
    build environment. Attempting to build the C++ changes will fail and waste time.
  severity: high
  source:
    path: CLAUDE.md
    lines: 11-13
- rule: Only use commands provided via `spin` for linting.
  collision_type: rule_conflict
  why_distracting: CLAUDE.md instructs the agent to use `spin lint` for linting, but
    AGENTS.md instructs the agent to use `lintrunner -a`. This creates confusion about
    which linting tool to use.
  severity: low
  source:
    path: CLAUDE.md
    lines: 28-31
hierarchy_analysis: The hierarchy contains direct conflicts between `CLAUDE.md` and
  `AGENTS.md` regarding building and linting. `CLAUDE.md` suggests building with `pip
  install` and linting with `spin`, while `AGENTS.md` explicitly forbids building
  due to a broken environment and mandates `lintrunner` for linting. Since `AGENTS.md`
  contains environment-specific constraints for the agent, its rules should override
  `CLAUDE.md`.
