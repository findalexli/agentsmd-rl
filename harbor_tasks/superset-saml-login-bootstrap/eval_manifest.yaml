    Enzyme (fully removed). Per AGENTS.md "Testing Strategy Migration"

    and .cursor/rules/dev-standard.mdc.

    '
- id: prefer_unit_tests
  source:
    kind: agent_config
    anchor: Testing Strategy Migration
    path: AGENTS.md
  rule: 'Test additions should prefer unit tests over integration tests, per

    AGENTS.md "Testing Strategy Migration".

    '
- id: superset_ui_core_imports
  source:
    kind: agent_config
    anchor: Frontend Modernization
    path: AGENTS.md
  rule: 'Frontend changes should import from @superset-ui/core for UI

    components rather than directly from antd, per AGENTS.md "Frontend

    Modernization" and .cursor/rules/dev-standard.mdc.

    '
- id: asf_license_header_on_new_files
  source:
    kind: agent_config
    anchor: Apache License Headers
    path: AGENTS.md
  rule: 'Any new Python or TypeScript file added by the agent must include

    the Apache Software Foundation license header (existing files

    don''t need re-stamping). Per AGENTS.md "Apache License Headers".

    '
- id: use_test_not_describe
  source:
    kind: agent_config
    anchor: Testing Strategy Migration
    path: AGENTS.md
  rule: 'New Jest tests should use top-level `test()` rather than

