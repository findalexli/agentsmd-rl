    hints required for all new code" and "MyPy compliant - run

    `pre-commit run mypy`". The added saml_providers loop in

    cached_common_bootstrap_data should follow the existing typing.

    '
- id: no_typescript_any
  source:
    kind: agent_config
    anchor: Frontend Modernization
    path: AGENTS.md
  rule: 'The Login component changes must not introduce `any` types. The repo

    is actively migrating away from `any`. AGENTS.md and

    .cursor/rules/dev-standard.mdc both list this as a critical rule.

    '
- id: timeless_comments
  source:
    kind: agent_config
    anchor: Code Comments
    path: AGENTS.md
  rule: 'Code comments must avoid time-specific language like "now",

    "currently", "today", per AGENTS.md "Code Comments" section.

    '
- id: jest_no_enzyme
  source:
    kind: agent_config
    anchor: Testing Strategy Migration
    path: AGENTS.md
