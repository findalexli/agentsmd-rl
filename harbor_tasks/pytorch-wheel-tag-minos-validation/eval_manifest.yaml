distractors:
- rule: 'Use our test class and test runner: `from torch.testing._internal.common_utils
    import run_tests, TestCase`'
  collision_type: architecture_boundary
  why_distracting: The task is to add validation to CI 'smoke tests', which are standalone
    Python scripts executed in CI, not standard PyTorch unit tests. Using `TestCase`
    and `run_tests` would break the smoke test execution model.
  severity: high
  source:
    path: CLAUDE.md
    lines: 18-24
- rule: When you are working on a bug, first create a standalone file that reproduces
    the bug... Once the change is passing, find an appropriate test file to add the
    test to
  collision_type: meta_confusion
  why_distracting: The task is explicitly to create a new standalone validation module
    (`check_wheel_tags.py`) for CI. Trying to create a separate 'repro' file first
    is redundant and misunderstands the nature of the CI infrastructure task.
  severity: medium
  source:
    path: AGENTS.md
    lines: 3-6
- rule: Only use commands provided via `spin` for linting.
  collision_type: rule_conflict
  why_distracting: '`AGENTS.md` explicitly instructs to use `lintrunner -a`. An agent
    might get confused about which tool to use to format the newly created `check_wheel_tags.py`
    file due to this direct contradiction.'
  severity: low
  source:
    path: CLAUDE.md
    lines: 31-33
hierarchy_analysis: '`CLAUDE.md` and `AGENTS.md` have conflicting instructions regarding
  linting (`spin lint` vs `lintrunner -a`). Additionally, the general testing guidelines
  in `CLAUDE.md` (using `torch.testing._internal.common_utils`) conflict with the
  specific architectural needs of the `.ci/pytorch/smoke_test` directory, which uses
  standalone scripts raising `RuntimeError`.'
