distractors:
- rule: 'Use our test class and test runner: `from torch.testing._internal.common_utils
    import run_tests, TestCase`'
  collision_type: architecture_boundary
  why_distracting: The global config mandates using `torch.testing._internal.common_utils.TestCase`
    for tests. However, this task involves adding a validation module to the CI smoke
    tests, which are standalone scripts that run against built wheels in a separate
    environment. Using the standard unit test framework here would be architecturally
    incorrect and overcomplicate the CI script.
  severity: high
  source:
    path: CLAUDE.md
    lines: 18-24
- rule: When you are working on a bug, first create a standalone file that reproduces
    the bug and verify it fails in the expected way.
  collision_type: scope_ambiguity
  why_distracting: The agent might interpret this feature addition as a bug and attempt
    to create a standalone reproduction script before implementing the validation
    module, wasting time and potentially creating unnecessary files in the repository.
  severity: medium
  source:
    path: AGENTS.md
    lines: 3-6
- rule: All build (both codegen, C++ and python) is done via `pip install -e . -v
    --no-build-isolation`.
  collision_type: meta_confusion
  why_distracting: The task involves checking built wheels (`.whl` files). The agent
    might attempt to build PyTorch from source using the provided command to test
    its changes, which would take a massive amount of time and is completely unnecessary
    for testing a Python CI script.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 13-14
hierarchy_analysis: The configuration is flat, consisting of two root-level files
  (`AGENTS.md` and `CLAUDE.md`). The primary challenge is recognizing that the general
  testing guidelines in `CLAUDE.md` do not apply to the specific architectural domain
  of CI smoke tests, requiring the agent to prioritize local context over global rules.
