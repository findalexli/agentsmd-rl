distractors:
- rule: Use `agent-browser` for web automation.
  collision_type: meta_confusion
  why_distracting: The agent might confuse the instructions for its own tool usage
    with the Playwright e2e test code it needs to write, attempting to use `agent-browser`
    commands or concepts in the `.spec.ts` files instead of Playwright's `page.locator()`.
  severity: high
  source:
    path: packages/app/AGENTS.md
    lines: 15-21
- rule: Avoid using the `any` type.
  collision_type: scope_ambiguity
  why_distracting: 'The existing `setAutoAccept` function in `session-composer-dock.spec.ts`
    uses `page: any`. If the agent tries to fix this by importing Playwright''s `Page`
    type, it might violate the rule ''Always import from `../fixtures`, not `@playwright/test`''
    or waste effort refactoring out-of-scope code.'
  severity: medium
  source:
    path: AGENTS.md
    lines: 10-12
- rule: Always prefer `createStore` over multiple `createSignal` calls.
  collision_type: scope_ambiguity
  why_distracting: When moving the toggle state to `settings-general.tsx`, the agent
    might see multiple `createSignal` calls and attempt to refactor the entire settings
    component to use `createStore`, which is out of scope for simply moving a toggle.
  severity: low
  source:
    path: packages/app/AGENTS.md
    lines: 11-12
hierarchy_analysis: The hierarchy progresses from general TypeScript/project rules
  (`AGENTS.md`) to app-specific rules (`packages/app/AGENTS.md`) to e2e-specific rules
  (`packages/app/e2e/AGENTS.md`). The e2e rules provide specific helpers (`openSettings`,
  `closeDialog`) that should be prioritized over manually writing Playwright locators.
  The `agent-browser` rule in the app-level config creates a significant meta-confusion
  risk when writing e2e tests, as it describes the agent's own automation tool rather
  than the Playwright framework used in the tests.
