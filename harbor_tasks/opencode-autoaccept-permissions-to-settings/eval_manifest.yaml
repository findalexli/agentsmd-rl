distractors:
- rule: Use `agent-browser` for web automation.
  collision_type: meta_confusion
  why_distracting: The rule instructs the use of `agent-browser` for 'web automation'. An agent might get confused between its own tool usage (using agent-browser to navigate the web during the task) and the objective of writing Playwright e2e tests (which is also web automation), potentially trying to insert agent-browser commands into the test files.
  severity: high
  source:
    path: packages/app/AGENTS.md
    lines: 16-23
- rule: Always prefer `createStore` over multiple `createSignal` calls in SolidJS.
  collision_type: architecture_boundary
  why_distracting: The rule mandates preferring `createStore` over `createSignal`. An agent moving the toggle state to the settings page might attempt to refactor the permission state management to use `createStore`, but the instructions explicitly state to 'Read the current auto-accept state via the permission context'.
  severity: medium
  source:
    path: packages/app/AGENTS.md
    lines: 10-11
hierarchy_analysis: The agent must navigate a 3-level deep hierarchy. The root `AGENTS.md` provides general TypeScript and naming conventions. The `packages/app/AGENTS.md` provides SolidJS rules and a distracting meta-instruction about web automation. Crucially, the agent must discover `packages/app/e2e/AGENTS.md` to find the specific Playwright action helpers (`openSettings`, `closeDialog`) required to cleanly update the e2e tests without hardcoding DOM interactions.
