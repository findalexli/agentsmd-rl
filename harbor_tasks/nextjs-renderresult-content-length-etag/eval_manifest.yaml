    lines: 370-373
    commit: fb85660ab1f70e294465af0074dc7c941e3540ca
- rule: The main Next.js framework lives in `packages/next/` and its source code is
    in `packages/next/src/`.
  source:
    path: AGENTS.md
    lines: 28-32
  evidence: The gold solution correctly modifies the Pages Router handler within the
    core package's source directory at `packages/next/src/server/route-modules/pages/pages-handler.ts`.
  category: architecture
config_edits:
- path: AGENTS.md
  tier: 1
  gold_added: "# Use --args for non-interactive mode (forward args to the script using\
    \ `--`)\n# Format: pnpm new-test -- --args <appDir> <name> <type>\n# appDir: true/false\
    \ (is this for app directory?)\n# name: test name (e.g. \"my-feature\")\n# type:\
    \ e2e | production | development | unit\n\n# When editing core Next.js files (packages/next/**),\
    \ run the build first:\npnpm --filter=next build\n\n# Then create the test\npnpm\
    \ new-test -- --args true my-feature e2e\n```\n\n**Analyzing test output efficiently:**\n\
    \nNever re-run the same test suite with different grep filters. Capture output\
    \ once to a file, then read from it:\n\n```bash\n# Run once, save everything\n\
    pnpm test-dev-turbo test/development/ 2>&1 | tee /tmp/test.log\n  -- **Quick smoke\
    \ testing with toy apps**: For fast feedback, generate a minimal test fixture\
    \ with `pnpm new-test -- --args true <name> e2e`, then run the dev server directly\
    \ with `node packages/next/dist/bin/next dev --port <port>` and `curl --max-time\
    \ 10`. This avoids the overhead of the full test harness and gives immediate feedback\
    \ on hangs/crashes."
  gold_removed: '# Use --args for non-interactive mode

