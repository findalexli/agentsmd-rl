distractors:
- rule: Generating tests using `pnpm new-test` is mandatory.
  collision_type: scope_ambiguity
  why_distracting: The rule explicitly states that generating tests is mandatory,
    which would lead an agent to create a new test file for the Content-Length fix.
    However, the gold solution does not include any tests, making this rule a distractor
    that causes wasted effort.
  severity: high
  source:
    path: AGENTS.md
    lines: 148-148
- rule: For fast feedback, generate a minimal test fixture with `pnpm new-test --args
    true <name> e2e`.
  collision_type: meta_confusion
  why_distracting: The rule suggests using `pnpm new-test --args true <name> e2e`
    for quick smoke testing. However, this command syntax is broken (missing the `--`
    separator), which is exactly what this PR is supposed to fix. An agent trying
    to follow this advice to test its changes would encounter errors.
  severity: medium
  source:
    path: AGENTS.md
    lines: 403-403
hierarchy_analysis: The repository uses `AGENTS.md` (symlinked to `CLAUDE.md`) as
  the primary configuration file. The agent must navigate a conflict between the explicit
  instruction in `AGENTS.md` that 'Generating tests using pnpm new-test is mandatory'
  and the scope of the PR, which in the gold solution does not include any tests.
  Furthermore, the PR instructions require modifying the `AGENTS.md` file itself to
  fix the syntax of the very command used for test generation, creating a meta-level
  confusion if the agent attempts to use the command before fixing it.
