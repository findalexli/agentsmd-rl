rubric:
- rule: 'PR 标题始终使用英文，格式：类型: 简短描述'
  source:
    path: CLAUDE.md
    lines: '44'
    commit: fc13ea35e8245637a071f525484c9ffdedcdd4b7
  evidence: 'SKILL.md section on basic rules explicitly states PR titles are always English regardless of template language choice, and the title format section specifies the type: subject format.'
  category: naming
  verification: llm_judge
- rule: 英文模板：.github/PULL_REQUEST_TEMPLATE.md / 中文模板：.github/PULL_REQUEST_TEMPLATE_CN.md
  source:
    path: CLAUDE.md
    lines: 50-51
    commit: fc13ea35e8245637a071f525484c9ffdedcdd4b7
  evidence: SKILL.md section on basic rules requires using the official templates at the exact paths and forbids inventing custom PR sections.
  category: style
  verification: llm_judge
- rule: 描述对开发者的影响，而非具体的实现细节
  source:
    path: CLAUDE.md
    lines: '85'
    commit: fc13ea35e8245637a071f525484c9ffdedcdd4b7
  evidence: SKILL.md Change Log section instructs describing impact on developers/users rather than listing implementation details, matching the changelog rule.
  category: style
  verification: llm_judge
- rule: 不要编造 message。
  source:
    path: .claude/skills/commit-msg/SKILL.md
    lines: '67'
    commit: fc13ea35e8245637a071f525484c9ffdedcdd4b7
  evidence: SKILL.md forbidden section explicitly prohibits fabricating issue numbers, test results, or release impact, and the Related Issues guidance says to use None when no issue exists.
  category: style
  verification: llm_judge
- rule: 'YAML frontmatter with name and description fields matching the pattern of existing skills (name: antd-issue-reply, description: Help maintainers reply to Ant Design GitHub issues).'
  source:
    path: .claude/skills/issue-reply/SKILL.md
    lines: 1-3
    commit: fc13ea35e8245637a071f525484c9ffdedcdd4b7
  evidence: 'SKILL.md begins with YAML frontmatter delimited by --- containing name: antd-create-pr and a real, descriptive description field explaining when the skill should be used.'
  category: style
  verification: llm_judge
distractors:
- rule: PR 内容默认使用英文 / 可以视需要在英文描述后附上中文说明
  source:
    path: AGENTS.md
    lines: 954-956
    commit: fc13ea35e8245637a071f525484c9ffdedcdd4b7
  collision_type: rule_conflict
  why_distracting: AGENTS.md says PR content defaults to English but allows appending Chinese descriptions. An agent might infer the same flexibility applies to PR titles, conflicting with CLAUDE.md strict English-only title rule.
  severity: medium
- rule: PULL_REQUEST_TEMPLATE.md / PULL_REQUEST_TEMPLATE_CN.md
  source:
    path: AGENTS.md
    lines: 962-963
    commit: fc13ea35e8245637a071f525484c9ffdedcdd4b7
  collision_type: scope_ambiguity
  why_distracting: AGENTS.md lists PR template paths without the .github/ prefix, while CLAUDE.md uses the full paths. An agent reading AGENTS.md might look for templates at the wrong location.
  severity: low
- rule: 使用 gh pr create 创建 PR 时，必须手动填充模板内容
  source:
    path: CLAUDE.md
    lines: '52'
    commit: fc13ea35e8245637a071f525484c9ffdedcdd4b7
  collision_type: architecture_boundary
  why_distracting: CLAUDE.md says the human must manually fill in the PR template, but the create-pr skill is designed for Claude to auto-fill it. An agent might refuse to fill the template, believing only humans should do so.
  severity: medium
