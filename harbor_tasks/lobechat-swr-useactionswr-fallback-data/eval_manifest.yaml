distractors:
- rule: Follow [Linear rules in CLAUDE.md](CLAUDE.md#linear-issue-management-ignore-if-not-installed-linear-mcp)
    when working with Linear issues.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to update the hardcoded link to CLAUDE.md's
    Linear section to point to the new .mdc file, expanding the scope of the PR unnecessarily
    since the gold solution leaves AGENTS.md untouched.
  severity: medium
  source:
    path: AGENTS.md
    lines: 61-63
- rule: Retrieve issue details before starting work using mcp__linear-server__get_issue...
    MUST add completion comment
  collision_type: meta_confusion
  why_distracting: The agent might interpret these instructions as active commands
    to execute for the current task (e.g., calling mcp__linear-server__get_issue or
    adding completion comments) rather than just text content that needs to be extracted
    to a new file.
  severity: high
  source:
    path: CLAUDE.md
    lines: 66-93
