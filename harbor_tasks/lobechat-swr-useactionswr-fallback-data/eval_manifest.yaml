config_edits:
- path: .cursor/rules/linear.mdc
  tier: 1
  gold_added: '---

    alwaysApply: true

    ---


    # Linear Issue Management


    When working with Linear issues:


    1. **Retrieve issue details** before starting work using `mcp__linear-server__get_issue`

    2. **Check for sub-issues**: If the issue has sub-issues, retrieve and review
    ALL sub-issues using `mcp__linear-server__list_issues` with `parentId` filter
    before starting work

    3. **Update issue status** when completing tasks using `mcp__linear-server__update_issue`

    4. **MUST add completion comment** using `mcp__linear-server__create_comment`


    ## Creating Issues


    When creating new Linear issues using `mcp__linear-server__create_issue`, **MUST
    add the `claude code` label** to indicate the issue was created by Claude Code.


    ## Completion Comment (REQUIRED)


    **Every time you complete an issue, you MUST add a comment summarizing the work
    done.** This is critical for:


    - Team visibility and knowledge sharing

    - Code review context

    - Future reference and debugging


    ## PR Linear Issue Association (REQUIRED)


    **When creating PRs for Linear issues, MUST include magic keywords in PR body:**
    `Fixes LOBE-123`, `Closes LOBE-123`, or `Resolves LOBE-123`, and summarize the
    work done in the linear issue comment and update the issue status to "In Review".


    ## IMPORTANT: Per-Issue Completion Rule


    **When working with multiple issues (e.g., parent issue with sub-issues), you
    MUST update status and add comment for EACH issue IMMEDIATELY after completing
    it.** Do NOT wait until all issues are done to update them in batch.


    **Workflow for EACH individual issue:**


    1. Complete the implementation for this specific issue

    2. Run type check: `bun run type-check`

    3. Run related tests if applicable

    4. Create PR if needed

    5. **IMMEDIATELY** update issue status to **"In Review"** (NOT "Done"): `mcp__linear-server__update_issue`

    6. **IMMEDIATELY** add completion comment: `mcp__linear-server__create_comment`

    7. Only then move on to the next issue


    **Note:** Issue status should be set to **"In Review"** when PR is created. The
    status will be updated to **"Done"** only after the PR is merged (usually handled
    by Linear-GitHub integration or manually).


    **Wrong approach:**


    - Complete Issue A -> Complete Issue B -> Complete Issue C -> Update all statuses
    -> Add all comments

    - Mark issue as "Done" immediately after creating PR


    **Correct approach:**


    - Complete Issue A -> Create PR -> Update A status to "In Review" -> Add A comment
    -> Complete Issue B -> ...'
