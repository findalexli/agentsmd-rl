distractors:
- rule: Retrieve issue details before starting work using mcp__linear-server__get_issue
  collision_type: meta_confusion
  why_distracting: The agent is instructed to extract the Linear issue management
    rules. Because the text itself contains commands like `mcp__linear-server__get_issue`,
    the agent might get confused and attempt to actually invoke these MCP tools to
    find an issue for the current task, rather than just treating the text as string
    content to be moved.
  severity: high
  source:
    path: CLAUDE.md
    lines: 55-60
- rule: 'i18n Keys: Add to src/locales/default/namespace.ts'
  collision_type: scope_ambiguity
  why_distracting: The prompt asks the agent to translate non-English comments in
    the SWR module. The agent might mistakenly apply the project's i18n rules and
    attempt to extract these code comments into `src/locales/default/namespace.ts`,
    which is meant for UI text, not inline code comments.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 50-52
hierarchy_analysis: The agent must read `CLAUDE.md` to locate the inline rules, extract
  them to a new file in the `.cursor/rules/` directory (as established by the pattern
  in `AGENTS.md` and `CLAUDE.md`), and update `CLAUDE.md` to reference the new file
  using the project's specific `@.cursor/rules/...` syntax.
