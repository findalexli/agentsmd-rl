    origin: repo_tests
    description: "Repo's TypeScript typecheck passes (tsgo --noEmit)"

  - id: test_repo_format_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's format test suite passes"

  - id: format_test_suite_passes
    type: pass_to_pass
    origin: pr_diff
    description: "Upstream format test suite must pass after refactor (both index.ts and test layer wiring)"

  - id: module_imports_cleanly
    type: pass_to_pass
    origin: pr_diff
    description: "format/index.ts must be importable without errors"

  - id: format_exports_preserved
    type: pass_to_pass
    origin: static
    description: "Format namespace must still export Service, layer, defaultLayer, runPromise"

  - id: no_any_type_introduced
    type: pass_to_pass
    origin: agent_config
    description: "No any type annotations introduced in format/index.ts"
