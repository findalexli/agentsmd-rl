- rule: Prefer `ChildProcessSpawner.ChildProcessSpawner` with `ChildProcess.make(...)`
    instead of custom process wrappers.
  source:
    path: packages/opencode/AGENTS.md
    lines: 47-47
  evidence: The gold solution replaces the raw `Process.spawn` call with `ChildProcessSpawner`
    and `ChildProcess.make(...)` as requested in the problem description.
  category: architecture
- rule: Avoid `try`/`catch` where possible
  source:
    path: AGENTS.md
    lines: 12-12
  evidence: The gold solution removes the `try`/`catch` block in `formatFile` and
    replaces it with Effect's error combinators.
  category: style
- rule: Use `Effect.gen(function* () { ... })` for composition.
  source:
    path: packages/opencode/AGENTS.md
    lines: 20-20
  evidence: The gold solution refactors `formatFile` from an `async function` returning
    a `Promise` to an Effect using `Effect.gen(function* () { ... })`.
  category: architecture
distractors:
- rule: Use Bun APIs when possible, like `Bun.file()`
  collision_type: rule_conflict
  why_distracting: The agent might try to use `Bun.spawn` instead of `ChildProcessSpawner`
    because of the rule to use Bun APIs, which conflicts with the specific Effect
    migration strategy.
  severity: high
  source:
    path: AGENTS.md
    lines: 15-15
- rule: Prefer `FileSystem.FileSystem` instead of raw `fs/promises` for effectful
    file I/O.
  collision_type: scope_ambiguity
  why_distracting: The agent might see file operations in `format/index.ts` and try
    to migrate them to `FileSystem.FileSystem` as well, expanding the scope of the
    PR unnecessarily.
  severity: medium
  source:
    path: packages/opencode/AGENTS.md
    lines: 46-46
- rule: Use `InstanceState` (from `src/effect/instance-state.ts`) for per-directory
    or per-project state that needs per-instance cleanup.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to wrap the `ChildProcessSpawner` or `Format`
    service in `InstanceState`, but `ChildProcessSpawner` is a standard service and
    `Format` doesn't necessarily need per-directory state if it's just a stateless
    function.
  severity: medium
  source:
    path: packages/opencode/AGENTS.md
    lines: 37-37
hierarchy_analysis: The hierarchy shows a clear progression from general TypeScript/Bun
  rules in the root `AGENTS.md` to specific Effect migration rules in `packages/opencode/AGENTS.md`.
  The specific Effect rules (like using `ChildProcessSpawner`) override the general
  rules (like using Bun APIs). The agent must prioritize the Effect-specific guidelines
  in the package-level config over the general guidelines in the root config.
