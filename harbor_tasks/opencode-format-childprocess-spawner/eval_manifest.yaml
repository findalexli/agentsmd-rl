  - id: no_process_util_import
    type: fail_to_pass
    origin: pr_diff
    description: "Process utility import from util/process must be removed"

  - id: no_try_catch_in_format_file
    type: fail_to_pass
    origin: agent_config
    description: "formatFile must not use try/catch — use Effect error combinators"
