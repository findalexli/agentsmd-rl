version: "2.0"
source:
  repo: "taskforge/sample"
  pr: 1
  base_commit: "abc123"
  merge_commit: "def456"

checks:
  # Fail-to-pass tests (the actual PR fix)
  - id: test_edge_case_handling
    type: fail_to_pass
    origin: pr_diff
    description: "is_code_file correctly handles files without extensions"

  - id: test_no_regression
    type: fail_to_pass
    origin: pr_diff
    description: "Existing is_code_file tests still work (sanity check)"

  # Pass-to-pass tests (repo CI/CD tests)
  - id: test_repo_python_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "Python syntax check passes on all taskforge modules"

  - id: test_repo_import_config
    type: pass_to_pass
    origin: repo_tests
    description: "taskforge.config module imports successfully"

  - id: test_repo_is_code_file_logic
    type: pass_to_pass
    origin: repo_tests
    description: "is_code_file logic works correctly"
