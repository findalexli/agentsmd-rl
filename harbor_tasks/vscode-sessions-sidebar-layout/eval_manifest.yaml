      lines: "70-72"
      commit: "837894c2410fb23371e591be89f64f9a89f73efe"

  - rule: "Open curly braces always go on the same line as whatever necessitates them."
    source:
      path: ".github/copilot-instructions.md"
      lines: "114"
      commit: "837894c2410fb23371e591be89f64f9a89f73efe"

  - rule: "You MUST deal with disposables by registering them immediately after creation. Use this._register() to register disposables."
    source:
      path: ".github/copilot-instructions.md"
      lines: "144"
      commit: "837894c2410fb23371e591be89f64f9a89f73efe"

