checks:
  - id: toolbar_listens_for_menu_item_changes
    type: fail_to_pass
    origin: pr_diff
    description: "Widget subscribes to toolbar.onDidChangeMenuItems to re-layout when items appear/disappear at runtime"

  - id: toolbar_stored_in_variable
    type: fail_to_pass
    origin: pr_diff
    description: "MenuWorkbenchToolBar instance stored in a const variable so event subscription is possible"

  - id: interface_option_renamed_to_on_did_change_layout
    type: fail_to_pass
    origin: pr_diff
    description: "Interface option renamed from onDidToggleCollapse to onDidChangeLayout in widget, old name removed"

  - id: sessions_view_passes_on_did_change_layout
    type: fail_to_pass
    origin: pr_diff
    description: "SessionsView passes onDidChangeLayout callback (not old onDidToggleCollapse) to widget constructor"

  - id: css_margin_bottom_reduced
    type: fail_to_pass
    origin: pr_diff
    description: "sessionsViewPane.css margin-bottom reduced from 12px to 6px for sessions list container"

  - id: sidebar_customizations_menu_preserved
    type: pass_to_pass
    origin: static
    description: "Menus.SidebarCustomizations menu ID unchanged — toolbar menu identifier not accidentally removed"

  - id: test_repo_package_json_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Root package.json is valid JSON - repository integrity check via Node.js subprocess"

  - id: test_repo_modified_typescript_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "Modified TypeScript files have balanced braces/parens via Node.js syntax check"

  - id: test_repo_copyright_headers
    type: pass_to_pass
    origin: repo_tests
    description: "Modified source files have Microsoft copyright header - repository hygiene check"

  - id: test_repo_css_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "CSS files have valid syntax (balanced braces, closed comments) via Node.js check"

  - id: test_repo_node_version
    type: pass_to_pass
    origin: repo_tests
    description: "Node.js is available and meets minimum version requirement (18+)"

  - id: test_repo_file_structure
    type: pass_to_pass
    origin: repo_tests
    description: "Modified files exist at expected paths in repository"

rubric:
  - rule: "Use tabs, not spaces, for indentation."
