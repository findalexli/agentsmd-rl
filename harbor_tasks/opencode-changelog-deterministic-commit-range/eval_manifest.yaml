version: "2.0"

source:
  repo: "anomalyco/opencode"
  pr: 19987
  base_commit: "ee018d5c82a593907bae9011bc074766e670d593"
  merge_commit: "6926fe1c7455f4cd075d374b188850c14cda0fb2"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "All modified files exist and are non-trivial"

  - id: changelog_help_deterministic
    type: fail_to_pass
    origin: pr_diff
    description: "Running --help must show 'non-draft' release behavior (behavioral: bun execution)"

  - id: changelog_transpile_no_llm_sdk
    type: fail_to_pass
    origin: pr_diff
    description: "Transpiling changelog.ts with Bun must not contain LLM SDK references (behavioral: Bun.Transpiler)"

  - id: version_pins_upper_bound
    type: fail_to_pass
    origin: pr_diff
    description: "version.ts passes --to flag when invoking changelog command"

  - id: command_prompt_consumes_structured_data
    type: fail_to_pass
    origin: pr_diff
    description: "Command prompt consumes pre-computed data instead of instructing LLM to fetch releases"

  - id: gitignore_upcoming_changelog
    type: fail_to_pass
    origin: pr_diff
    description: "UPCOMING_CHANGELOG.md is listed in .gitignore"

  - id: no_try_catch
    type: fail_to_pass
    origin: agent_config
    description: "Changed files must not use try/catch blocks"
    source:
      path: "AGENTS.md"
      lines: "12"
      commit: "ee018d5c82a593907bae9011bc074766e670d593"

  - id: single_word_function_names
    type: fail_to_pass
    origin: agent_config
    description: "Declared functions in changelog.ts must use single-word names, not multi-word camelCase"
    source:
      path: "AGENTS.md"
      lines: "27-32"
      commit: "ee018d5c82a593907bae9011bc074766e670d593"

  - id: no_any_type
    type: pass_to_pass
    origin: agent_config
    description: "Changed files must not use the any type"
    source:
      path: "AGENTS.md"
      lines: "13"
      commit: "ee018d5c82a593907bae9011bc074766e670d593"

  - id: no_camelcase_locals
    type: fail_to_pass
    origin: agent_config
    description: "Local variable declarations in changelog.ts must not use multi-word camelCase names"
    source:
      path: "AGENTS.md"
      lines: "27-32"
      commit: "ee018d5c82a593907bae9011bc074766e670d593"

  - id: test_repo_typecheck
    type: pass_to_pass
    origin: repo_tests
    description: "Repo TypeScript typecheck passes via bun turbo typecheck"

  - id: test_repo_prettier_check
    type: pass_to_pass
    origin: repo_tests
    description: "Modified files pass Prettier formatting check"

