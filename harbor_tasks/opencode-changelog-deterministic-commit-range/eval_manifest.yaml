rubric:
- rule: Use Bun APIs when possible, like `Bun.file()`
  source:
    path: AGENTS.md
    lines: 15-15
  evidence: The gold solution imports `{ $ } from "bun"` in `script/changelog.ts`
    to execute shell commands deterministically, replacing the `@opencode-ai/sdk`
    usage.
  category: tooling
distractors:
- rule: ALWAYS USE PARALLEL TOOLS WHEN APPLICABLE.
  collision_type: architecture_boundary
  why_distracting: The original `.opencode/command/changelog.md` instructed the LLM
    to 'spawn a subagent' for each PR. An agent reading 'ALWAYS USE PARALLEL TOOLS'
    might try to preserve this parallel subagent architecture or implement parallel
    LLM tool calls in `script/changelog.ts`. However, the architectural fix is to
    remove the LLM's responsibility for gathering/fetching entirely, replacing it
    with deterministic shell commands and a single LLM summarization pass.
  severity: high
  source:
    path: AGENTS.md
    lines: 2-2
- rule: The default branch in this repo is `dev`. Local `main` ref may not exist;
    use `dev` or `origin/dev` for diffs.
  collision_type: would_cause_bug
  why_distracting: The bug is caused by a missing upper bound in the commit range,
    allowing commits after the release cut to leak into the changelog. The rule states
    to use `dev` or `origin/dev` for diffs. If an agent uses `dev` as the upper bound
    for the commit range instead of pinning it to the current `GITHUB_SHA` or `HEAD`
    at the time of the release cut, it will reproduce the exact bug being fixed.
  severity: high
  source:
    path: AGENTS.md
    lines: 3-4
hierarchy_analysis: The `AGENTS.md` file provides general guidelines for the repository.
  There are no conflicting child configs, but the general rules about parallel tools
  and default branches create significant distractors for this specific bug fix, which
  requires deterministic, linear script execution and precise commit range bounds
  rather than branch-based diffs.
