# Fail-to-pass: Tests that must fail on base commit and pass after fix
checks:
  - id: test_v1_returns_details_not_fallback
    type: fail_to_pass
    origin: behavioral
    description: "V1 getEventContent returns details as-is without 'Unknown event' fallback"

  - id: test_features_returns_details_not_fallback
    type: fail_to_pass
    origin: behavioral
    description: "Features getEventContent returns details as-is without 'Unknown event' fallback"

  - id: test_v1_has_lenient_fallback
    type: fail_to_pass
    origin: behavioral
    description: "V1 getEventContent has lenient fallback for action-like events with action.kind"

  - id: test_get_event_content_empty_details
    type: fail_to_pass
    origin: repo_tests
    description: "File view action returns empty details instead of 'Unknown event'"

  - id: test_get_event_content_malformed_event
    type: fail_to_pass
    origin: repo_tests
    description: "Malformed action events show action kind instead of 'Unknown event'"

# Pass-to-pass: Tests that must pass on both base and fix commits
checks:
  - id: test_base_commit_check
    type: pass_to_pass
    origin: sanity
    description: "Repository is at expected commit"

  - id: test_v1_get_event_content_file_exists
    type: pass_to_pass
    origin: sanity
    description: "V1 get-event-content.tsx exists"

  - id: test_features_get_event_content_file_exists
    type: pass_to_pass
    origin: sanity
    description: "Features get-event-content.tsx exists"

  - id: test_repo_get_event_content_tests_pass
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's own get-event-content tests pass"

  - id: test_frontend_lint
    type: pass_to_pass
    origin: repo_tests
    description: "Frontend linting passes"

  - id: test_frontend_build
    type: pass_to_pass
    origin: repo_tests
    description: "Frontend build succeeds"

  - id: test_frontend_typecheck
    type: pass_to_pass
    origin: repo_tests
    description: "Frontend TypeScript typecheck passes"

  - id: test_frontend_translation_completeness
    type: pass_to_pass
    origin: repo_tests
    description: "Frontend translation completeness check passes"

# Agent config rules from AGENTS.md applicable to this task
agent_config:
  - source: AGENTS.md
    rules:
      - "If you've made changes to the frontend, you should run cd frontend && npm run lint:fix && npm run build"
      - "Frontend testing uses vitest - run npm run test"
