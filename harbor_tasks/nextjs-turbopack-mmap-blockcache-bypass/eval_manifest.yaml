version: "2.0"

source:
  repo: "vercel/next.js"
  pr: 92390
  base_commit: "16dd58fa25abf87ae891628ce018114a4c333db6"
  merge_commit: "d75f07b3518a69691d3190f055ca2d30d700c56c"

checks:
  - id: test_source_file_valid
    type: pass_to_pass
    origin: static
    description: "Source file exists with StaticSortedFile struct and core structure"

  - id: test_verified_blocks_field
    type: fail_to_pass
    origin: pr_diff
    description: "Behavioral check: StaticSortedFile struct has verified_blocks: Box<[AtomicU64]> field for CRC bitmap"

  - id: test_arc_block_cache_reader_struct
    type: fail_to_pass
    origin: pr_diff
    description: "Behavioral check: ArcBlockCacheReader struct bundles cache + verified_blocks bitmap"

  - id: test_get_or_cache_block_function
    type: fail_to_pass
    origin: pr_diff
    description: "Behavioral check: get_or_cache_block free function is available"

  - id: test_verify_checksum_once_function
    type: fail_to_pass
    origin: pr_diff
    description: "Behavioral check: verify_checksum_once function is available"

  - id: test_block_weighter_debug_assert
    type: fail_to_pass
    origin: pr_diff
    description: "Behavioral check: BlockWeighter::weight has debug_assert"

  - id: test_core_api_intact
    type: pass_to_pass
    origin: static
    description: "Core types and methods (StaticSortedFile, BlockCache, verify_checksum) still exist"

  - id: test_imports_include_atomic
    type: pass_to_pass
    origin: static
    description: "Source file imports AtomicU64 from std::sync::atomic (added in PR)"

  - id: test_repo_rust_syntax_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's Rust syntax is valid (cargo check -p turbo-persistence passes)"

  - id: test_repo_rust_clippy
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's Rust code passes clippy lints (cargo clippy -p turbo-persistence passes)"

rubric:
  - rule: "Read all README.md files in the directory path from repo root up to and including the target file's directory before editing. This identifies local patterns and conventions."
    source:
      path: "CLAUDE.md"
      lines: "46-47"
      commit: "16dd58fa25abf87ae891628ce018114a4c333db6"

  - rule: "Use comments to explain invariants, not narrate code. Comments should explain WHY, not WHAT the code does."
    source:
      path: "CLAUDE.md"
      lines: "46-47"
      commit: "16dd58fa25abf87ae891628ce018114a4c333db6"

  - rule: "For Rust code in turbopack/crates/turbo-persistence, follow the block format conventions: uncompressed blocks (header=0) bypass cache, compressed blocks use cache with CRC verification via bitmap."
    source:
      path: "turbopack/crates/turbo-persistence/README.md"
      lines: "1-50"
      commit: "16dd58fa25abf87ae891628ce018114a4c333db6"
