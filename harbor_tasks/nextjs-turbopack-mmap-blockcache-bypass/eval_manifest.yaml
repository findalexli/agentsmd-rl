rubric:
- rule: Read all README.md files in the directory path from repo root up to and including
    the target file's directory before editing. This identifies local patterns and
    conventions.
  source:
    path: CLAUDE.md
    lines: 46-47
    commit: 16dd58fa25abf87ae891628ce018114a4c333db6
- rule: Use comments to explain invariants, not narrate code. Comments should explain
    WHY, not WHAT the code does.
  source:
    path: CLAUDE.md
    lines: 46-47
    commit: 16dd58fa25abf87ae891628ce018114a4c333db6
- rule: 'For Rust code in turbopack/crates/turbo-persistence, follow the block format
    conventions: uncompressed blocks (header=0) bypass cache, compressed blocks use
    cache with CRC verification via bitmap.'
  source:
    path: turbopack/crates/turbo-persistence/README.md
    lines: 1-50
    commit: 16dd58fa25abf87ae891628ce018114a4c333db6
distractors:
- rule: If you are changing Next.js source or integration tests, start `pnpm --filter=next
    dev` in a separate terminal session before making edits
  collision_type: scope_ambiguity
  why_distracting: The agent might try to run `pnpm --filter=next dev` to watch for
    changes, but this command is for the Next.js TypeScript/JavaScript source, not
    the Turbopack Rust crates. Running it would waste time and not provide feedback
    on the Rust changes.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 65-69
- rule: 'Run tests fast (no isolation, no packing): NEXT_SKIP_ISOLATE=1 NEXT_TEST_MODE=<dev|start>
    pnpm testheadless test/path/to/test.ts'
  collision_type: scope_ambiguity
  why_distracting: The agent might try to run tests using `pnpm testheadless`, but
    this is for Next.js integration tests, whereas Turbopack Rust crates use `cargo
    test`.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 74-78
- rule: 'For type errors only: Use `pnpm --filter=next types` (~10s) instead of `pnpm
    --filter=next build` (~60s).'
  collision_type: scope_ambiguity
  why_distracting: The agent might try to run `pnpm --filter=next types` to check
    for compilation errors, but this only checks TypeScript types, not Rust compilation
    errors.
  severity: low
  source:
    path: CLAUDE.md
    lines: 82-83
hierarchy_analysis: The config files `CLAUDE.md` and `AGENTS.md` are identical. They
  provide guidance heavily skewed towards the TypeScript/JavaScript parts of the Next.js
  monorepo (`packages/next`). For a PR modifying the Turbopack Rust crates (`turbopack/crates/*`),
  many of the JS-centric build and test commands are inapplicable and could distract
  the agent from using standard Rust tooling (`cargo`).
