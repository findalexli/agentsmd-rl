agent_config: []
rubric:
- rule: external-crates/ contains the Move compiler and VM
  source:
    path: CLAUDE.md
    lines: 65-66
  evidence: The fix correctly targets `external-crates/move/crates/move-unit-test/src/test_runner.rs`,
    aligning with the architectural definition that the Move compiler and VM reside
    in `external-crates/`.
  category: architecture
total_points: 13
min_reward_threshold: 0.7
distractors:
- rule: Always consult CLAUDE.md files in sub-crates.
  collision_type: meta_confusion
  why_distracting: The agent might waste time trying to read or find a `CLAUDE.md`
    file in `external-crates/move/crates/move-unit-test/` which doesn't exist in the
    provided context.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 10-11
- rule: Run e2e tests. simtests must be run with `cargo simtest` to avoid false negatives
  collision_type: scope_ambiguity
  why_distracting: The agent might try to run the Sui e2e simtests (`cargo simtest
    -p sui-e2e-tests`) to verify its changes. However, the modified code is in the
    standalone Move unit test runner, making Sui e2e simtests out of scope and a massive
    waste of time.
  severity: high
  source:
    path: CLAUDE.md
    lines: 28-29
- rule: Use -p to select only the most relevant packages for testing... e.g. `cargo
    nextest run -p sui-types -p sui-core`
  collision_type: scope_ambiguity
  why_distracting: The agent might blindly copy the example command `cargo nextest
    run -p sui-types -p sui-core` to run tests, which would test the wrong crates
    instead of the modified `move-unit-test` crate.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 38-39
hierarchy_analysis: The hierarchy consists of a root `CLAUDE.md` and a root `AGENTS.md`.
  Both emphasize checking local crate-specific `CLAUDE.md` files, which creates a
  potential wild goose chase since none are provided for the `external-crates/move`
  directory. The root `CLAUDE.md` provides heavy guidance on Sui-specific testing
  (`sui-e2e-tests`, `sui-core`), which is architecturally distinct from the `external-crates/move`
  upstream repository code being modified here.
