- rule: All new files must start with the following license in comments at the top
    of the file
  collision_type: scope_ambiguity
  why_distracting: The agent might try to add a license header to test_runner.rs,
    but the rule explicitly states it only applies to new files.
  severity: low
  source:
    path: CLAUDE.md
    lines: 19-22
- rule: Always consult CLAUDE.md files in sub-crates.
  collision_type: meta_confusion
  why_distracting: The agent might waste time trying to find or read a local CLAUDE.md
