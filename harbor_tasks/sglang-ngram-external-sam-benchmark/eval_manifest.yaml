    description: "Core test base classes should be preserved"

  - id: test_repo_ruff_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ruff linting passes on test file (F401, F821)"

  - id: test_repo_isort_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's isort formatting passes on test file"

  - id: test_repo_black_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's black formatting passes on test file"

  - id: test_repo_codespell_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's codespell passes on test file"

  - id: no_undefined_names
    type: pass_to_pass
    origin: repo_tests
    description: "Test file has no undefined name references (ruff F821 equivalent)"

