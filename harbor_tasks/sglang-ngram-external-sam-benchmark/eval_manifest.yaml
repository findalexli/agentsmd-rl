  - id: file_imports_cleanly
    type: pass_to_pass
    origin: static
    description: "Test file must have valid imports and structure"

  # ---------------------------------------------------------------------------
  # Pass-to-pass (repo_tests) — CI/CD verification
  # ---------------------------------------------------------------------------
  - id: base_classes_still_present
    type: pass_to_pass
