version: "2.0"

source:
  repo: "dummy/template"
  pr: 1
  base_commit: "initial"
  merge_commit: "fixed"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified files must parse without errors"

  - id: core_bug_fixed
    type: fail_to_pass
    origin: pr_diff
    description: "The broken_add function returns correct result after fix"

  - id: edge_case
    type: fail_to_pass
    origin: pr_diff
    description: "Test edge case with zero values"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "Modified function has real logic, not just pass/return"

  - id: repo_ruff_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo code passes ruff linter check"

  - id: repo_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's existing unit tests for working functions pass"

rubric:
  - rule: "Follow existing code style and patterns in the codebase."
    source:
      path: "general"
      lines: "N/A"
      commit: "initial"
