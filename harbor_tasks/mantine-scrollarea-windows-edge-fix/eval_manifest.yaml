  - id: test_repo_eslint
    type: pass_to_pass
    origin: repo_tests
    description: Repo ESLint passes on the modified file

  - id: test_repo_prettier
    type: pass_to_pass
    origin: repo_tests
    description: Repo Prettier formatting check passes

  - id: test_repo_syncpack
    type: pass_to_pass
    origin: repo_tests
    description: Repo syncpack version consistency check passes

  - id: test_repo_jest_scrollarea
    type: pass_to_pass
    origin: repo_tests
    description: Repo Jest tests for ScrollArea pass

  # Fail-to-pass tests
