rubric:
- id: factory_di_pattern
  source:
    lines: 56-58
    commit: d85308913a5fa4bf81d946dd2c69d9298242d90f
    path: CLAUDE.md
  rule: The new keyStore dependency must be added to TTotpServiceFactoryDep and destructured in the factory signature, matching the project's manual DI pattern.
- id: backend_factory_di_pick_narrowing
  source:
    lines: 54-64
    commit: d85308913a5fa4bf81d946dd2c69d9298242d90f
    path: backend/CLAUDE.md
  rule: Service factories receive explicit dependencies as a typed object with TypeScript ``Pick`` narrowing to a minimal contract. The keyStore dep should be typed ``Pick<TKeyStoreFactory, "setItemWithExpiryNX">`` rather than the full keystore interface.
- id: error_handling_uses_custom_classes
  source:
    lines: 181-194
    commit: d85308913a5fa4bf81d946dd2c69d9298242d90f
    path: backend/CLAUDE.md
  rule: Replay rejection must use the project's ``ForbiddenRequestError`` from ``@app/lib/errors`` rather than a plain Error or other class.
- id: import_ordering
  source:
    lines: 41-50
    commit: d85308913a5fa4bf81d946dd2c69d9298242d90f
    path: backend/CLAUDE.md
  rule: Imports added to totp-service.ts must respect the simple-import-sort group order (side-effect → node builtins → third-party → ``@app/`` → ``@lib/`` → ``@server/`` → relatives) and use the ``@app/`` alias rather than relative paths to cross-package modules.
- id: no_new_supplychain_risk
  source:
    lines: 44-48
    commit: d85308913a5fa4bf81d946dd2c69d9298242d90f
    path: CLAUDE.md
  rule: No new third-party dependencies should be added — the keystore is already in the dependency graph and the backend has a deliberate supply-chain policy (`min-release-age` in `.npmrc`).
- id: keystore_wiring_in_routes_index
  source:
    lines: 58-62
    commit: d85308913a5fa4bf81d946dd2c69d9298242d90f
    path: backend/CLAUDE.md
  rule: The dependency graph is manually wired in ``src/server/routes/index.ts``; the ``totpServiceFactory`` call site there must pass the existing ``keyStore`` instance, not a newly-constructed one.
