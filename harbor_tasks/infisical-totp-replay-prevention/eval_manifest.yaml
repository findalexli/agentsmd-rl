checks:
- id: test_replay_blocked
  type: fail_to_pass
  origin: pr_diff
  description: Submitting the same valid TOTP twice in succession is rejected on the second call with ForbiddenRequestError.
- id: test_keystore_claim_uses_documented_prefix_and_ttl
  type: fail_to_pass
  origin: pr_diff
  description: The replay-prevention claim is written under ``used-totp-code:<userId>:<code>`` with TTL of 120 seconds.
- id: test_replay_protection_is_per_user
  type: fail_to_pass
  origin: pr_diff
  description: Two distinct users submitting the same code value do not collide; the claim key includes the userId.
- id: test_used_totp_code_prefix_factory_shape
  type: fail_to_pass
  origin: pr_diff
  description: KeyStorePrefixes.UsedTotpCode produces ``used-totp-code:<userId>:<code>``.
- id: test_used_totp_code_ttl_in_window
  type: fail_to_pass
  origin: pr_diff
  description: KeyStoreTtls.UsedTotpCodeInSeconds is between 90 and 300 seconds (covers the full ±30s acceptance window with margin).
- id: test_p2p_no_config_throws_not_found
  type: pass_to_pass
  origin: pr_diff
  description: verifyUserTotp still throws NotFoundError when the user has no TOTP config (preserved error contract).
- id: test_p2p_unverified_config_throws_bad_request
  type: pass_to_pass
  origin: pr_diff
  description: verifyUserTotp still throws BadRequestError when the user's TOTP config is unverified (preserved error contract).
- id: test_p2p_invalid_totp_throws_forbidden_without_claim
  type: pass_to_pass
  origin: pr_diff
  description: An invalid TOTP still throws ForbiddenRequestError and does not consume a claim slot in the keystore.
