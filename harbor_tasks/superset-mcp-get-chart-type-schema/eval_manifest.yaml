task_description: |
  Add a new MCP tool called `get_chart_type_schema` that returns the full JSON Schema
  and working examples for a specific chart type. The tool should:
  1. Accept a `chart_type` parameter (one of: xy, table, pie, pivot_table, mixed_timeseries, handlebars, big_number)
  2. Accept an `include_examples` boolean parameter (default True)
  3. Return a JSON Schema for the requested chart type
  4. Return examples when include_examples=True
  5. Return an error with valid_chart_types list for invalid chart_type values

  The tool must follow MCP service conventions:
  - Use @tool decorator with appropriate tags and annotations
  - Include Apache license header
  - Be imported and exported in the appropriate __init__.py files
  - Be imported in app.py for auto-registration

