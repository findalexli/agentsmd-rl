rubric:
  - source:
      file: .continue/rules/no-any-types.md
    description: |
      Code should avoid `any` types and use `unknown` or the correct type instead.
      The PR introduces a new code path; it should follow the project's TypeScript
      typing standards.
    weight: 1

  - source:
      file: .continue/rules/programming-principles.md
    description: |
      Use functional programming paradigms. The parameter-mapping logic should be
      a pure transformation (body max_tokens → max_completion_tokens) with no
      side effects, consistent with the existing o-series model handling nearby.
    weight: 1

  - source:
      file: .continue/rules/pure-function-unit-tests.md
    description: |
      New pure functions should have comprehensive unit tests covering normal
      cases, edge cases, and boundary conditions. The fix adds conditional
      logic that warrants tests for both true and false branches.
    weight: 1

  - source:
      file: .continue/rules/unit-testing-rules.md
    description: |
      Tests should be written as top-level test() functions without describe()
      blocks, and test descriptions should include the function name being tested.
      Tests should run with Vitest from the package directory.
    weight: 1
