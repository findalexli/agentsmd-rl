distractors:
- rule: Do not take screenshots unless absolutely necessary
  source:
    path: packages/playwright/src/agents/playwright-test-planner.agent.md
    lines: '39'
  source_text: '   - Do not take screenshots unless absolutely necessary'
  collision_type: rule_conflict
  why_distracting: The PR explicitly adds a snapshot via `response.setIncludeSnapshot();`
    when pressing Enter. An AI might follow this planner agent rule and avoid implementing
    the snapshot feature.
  severity: high
- rule: For inherently dynamic data, utilize regular expressions to produce resilient
    locators
  source:
    path: packages/playwright/src/agents/playwright-test-healer.agent.md
    lines: '39'
  source_text: '   - For inherently dynamic data, utilize regular expressions to produce
    resilient locators'
  collision_type: scope_ambiguity
  why_distracting: This rule applies to writing reliable Playwright tests. The PR
    modifies the core `keyboard.ts` framework code which relies on internal element
    abstractions, not test locators.
  severity: low
- rule: Never wait for networkidle or use other discouraged or deprecated apis
  source:
    path: packages/playwright/src/agents/playwright-test-healer.agent.md
    lines: '55'
  source_text: '- Never wait for networkidle or use other discouraged or deprecated
    apis'
  collision_type: scope_ambiguity
  why_distracting: Intended for end-users writing tests. Framework code often needs
    to handle waits inherently (e.g., the PR uses `waitForCompletion`). An AI might
    mistakenly avoid adding waiting logic.
  severity: medium
- rule: File should contain single test
  source:
    path: packages/playwright/src/agents/playwright-test-generator.agent.md
    lines: '41'
  source_text: '  - File should contain single test'
  collision_type: scope_ambiguity
  why_distracting: This dictates test file structure for generated test code. An AI
    modifying TypeScript files in the framework repository might assume this applies
    to all files.
  severity: medium
- rule: Includes a comment with the step text before each step execution. Do not duplicate
    comments if step requires multiple actions.
  source:
    path: packages/playwright/src/agents/playwright-test-generator.agent.md
    lines: 45-46
  source_text: "  - Includes a comment with the step text before each step execution.\
    \ Do not duplicate comments if step requires\n    multiple actions."
  collision_type: scope_ambiguity
  why_distracting: This rule enforces a specific commenting style for generated Playwright
    tests. An AI might erroneously apply this style to the framework's internal tools.
  severity: low
