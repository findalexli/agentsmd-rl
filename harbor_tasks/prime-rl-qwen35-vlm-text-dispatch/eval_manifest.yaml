  category: style
distractors:
- rule: Avoid try/except blocks unless it's really necessary. It's fine that a program
    fails if something goes wrong.
  collision_type: would_cause_bug
  why_distracting: The bug description mentions that the code fails with a `ValueError`
    when trying to load the model. An agent might be tempted to wrap the model loading
    in a `try...except ValueError:` block to catch the error and fallback to the VLM
    model class. This would violate the rule against unnecessary try/except blocks
    and result in a hacky workaround rather than fixing the root cause of the overloaded
    boolean flag.
  severity: high
  source:
    path: AGENTS.md
    lines: 3-4
- rule: You are responsible for maintaining the skills folder. When a workflow fails
    and you fix it... you must update the skills to make implicit knowledge explicit.
  collision_type: scope_ambiguity
  why_distracting: Because the bug involves how the TOML config (`[model.vlm]`) interacts
    with model loading, an agent might believe it needs to update the `toml-config`
    skill to document this edge case for Qwen3.5 MoE models. However, this is purely
    an internal code logic bug, and the user-facing TOML workflow remains unchanged,
    making skill updates out of scope.
  severity: medium
  source:
    path: AGENTS.md
    lines: 40-42
hierarchy_analysis: The hierarchy is flat, with `CLAUDE.md` simply pointing to `AGENTS.md`.
  The rules in `AGENTS.md` provide general Python and repository guidelines. The most
  relevant rules for this PR are the Zen of Python principles (explicit over implicit)
  and the strict guidance against unnecessary comments and try/except blocks.
