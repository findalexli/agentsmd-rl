rubric:
  - rule: "Co-locate sub-components with parent. Avoid barrel re-export files."
    source:
      path: ".claude/CLAUDE.md"
      lines: "36"
      commit: "cccae29569c129e52178837d6d4662baa11f5986"

  - rule: "Keep components under 200-300 lines. Split when you see multiple distinct UI sections, complex conditional rendering, multiple unrelated useState calls."
    source:
      path: ".claude/skills/studio-best-practices/SKILL.md"
      lines: "55-60"
      commit: "cccae29569c129e52178837d6d4662baa11f5986"

  - rule: "Use descriptive boolean prefixes: is (state/identity), has (possession), can (capability), should (conditional behavior). Derive booleans from existing state rather than storing separately."
    source:
      path: ".claude/skills/studio-best-practices/SKILL.md"
      lines: "13-20"
      commit: "cccae29569c129e52178837d6d4662baa11f5986"

  - rule: "Prop callbacks use on prefix (onClose, onSave). Internal handlers use handle prefix (handleSubmit, handleCancel)."
    source:
      path: ".claude/skills/studio-best-practices/SKILL.md"
      lines: "123-126"
      commit: "cccae29569c129e52178837d6d4662baa11f5986"
