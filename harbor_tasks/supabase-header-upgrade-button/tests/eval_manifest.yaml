- rule: Exception for Experiment Exposure Tracking
  source:
    path: .claude/skills/telemetry-standards/SKILL.md
    lines: 59-59
  source_text: '**Exception:** `_exposed` events for A/B experiment exposure tracking
    are valid even though they fire on render.'
  evidence: The code calls `useTrackExperimentExposure(EXPERIMENT_ID, variant)` which
    tracks an exposure event directly on render without requiring user interaction.
  category: rubric
  verification: llm_judge
- rule: Event Definitions Pattern
  source:
    path: .claude/skills/telemetry-standards/SKILL.md
    lines: 87-107
  source_text: "All events must be defined as TypeScript interfaces in `packages/common/telemetry-constants.ts`:\n\
    \n```typescript\n/**\n * [Event description]\n *\n * @group Events\n * @source\
    \ [what triggers this event]\n */\nexport interface MyFeatureClickedEvent {\n\
    \  action: 'my_feature_clicked'\n  properties: {\n    /** Description of property\
    \ */\n    featureType: string\n  }\n  groups: TelemetryGroups\n}\n```\n\nAdd the\
    \ new interface to the `TelemetryEvent` union type so `useTrack` picks it up.\n\
    `@group Events` and `@source` must be accurate."
  evidence: The diff adds `HeaderUpgradeCtaClickedEvent` to `telemetry-constants.ts`
    with the correct JSDoc tags (`@group Events` and `@source studio`), interface
    name, and appends it to the `TelemetryEvent` union type.
  category: rubric
  verification: llm_judge
- rule: Required Telemetry Pattern
  source:
    path: .claude/skills/telemetry-standards/SKILL.md
    lines: 65-83
  source_text: "Import `useTrack` from `lib/telemetry/track` (within `apps/studio/`).\
    \ Never use `useSendEventMutation` (deprecated).\n\n```typescript\nimport { useTrack\
    \ } from 'lib/telemetry/track'\n\nconst MyComponent = () => {\n  const track =\
    \ useTrack()\n\n  const handleClick = () => {\n    track('product_card_clicked',\
    \ {\n      productType: 'database',\n      planTier: 'pro',\n      source: 'dashboard',\n\
    \    })\n  }\n\n  return <button onClick={handleClick}>Click me</button>\n}\n\
    ```"
  evidence: The code imports `useTrack` from `@/lib/telemetry/track`, calls `const
    track = useTrack()`, and executes `track('header_upgrade_cta_clicked')` inside
    `handleClick`.
  category: rubric
  verification: llm_judge
- rule: Conditional Rendering Early Returns
  source:
    path: .claude/skills/studio-best-practices/SKILL.md
    lines: 139-142
  source_text: '// Multiple conditions — use early returns, not nested ternaries

    if (isLoading) return <Spinner />

    if (isError) return <Error />

    return <Content />'
  evidence: The code uses early returns `if (!isFreePlan) return null` and `if (!showButton)
    return null` instead of wrapping the return statement in a complex boolean condition.
  category: rubric
  verification: llm_judge
- rule: Event Handlers Prefixing
  source:
    path: .claude/skills/studio-best-practices/SKILL.md
    lines: 123-126
  source_text: '## Event Handlers


    - Prop callbacks: `on` prefix (`onClose`, `onSave`)

    - Internal handlers: `handle` prefix (`handleSubmit`, `handleCancel`)'
  evidence: The internal function is named `handleClick` and is passed to the prop
    `onClick` in UpgradePlanButton.
  category: rubric
  verification: llm_judge
distractors:
- rule: Extract Logic Into Utility Files
  source:
    path: .claude/skills/studio-testing/SKILL.md
    lines: 71-80
  source_text: '## 1. Extract Logic Into Utility Files (CRITICAL)


    Remove as much logic from components as possible. Put it in co-located

    `.utils.ts` files as pure functions: arguments in, return value out.


    **File naming:**


    - Utility: `ComponentName.utils.ts` next to the component

    - Test: `tests/components/.../ComponentName.utils.test.ts` mirroring the source
    path'
  collision_type: wasted_effort
  why_distracting: An agent might see the logic determining whether to show the button
    (`isFreePlan && isInExperiment`, etc.) and unnecessarily extract these trivial
    variable assignments into a separate `.utils.ts` file to test exhaustively, leading
    to over-engineering.
  severity: medium
- rule: What NOT to Track
  source:
    path: .claude/skills/telemetry-standards/SKILL.md
    lines: 51-55
  source_text: '## What NOT to Track


    - Passive views/renders on page load (`dashboard_viewed`, `sidebar_appeared`,
    `page_loaded`)

    - Component appearances without user interaction

    - Generic "viewed" or "seen" events — already captured by pageview events'
  collision_type: rule_conflict
  why_distracting: An agent reviewing the PR might reject the `useTrackExperimentExposure`
    hook because it fires on component render without user interaction, incorrectly
    applying this general rule while missing the specific exception for experiment
    exposure (`_exposed`) immediately below it.
  severity: high
- rule: Component Tests for Complex UI Only
  source:
    path: .claude/skills/studio-testing/SKILL.md
    lines: 135-144
  source_text: '## 3. Component Tests for Complex UI Only (HIGH)


    Only write component tests when there is complex UI interaction logic that

    cannot be captured by testing utility functions alone.


    **Valid reasons:** conditional rendering from user interaction sequences,

    popover open/close with keyboard/mouse, multi-step form transitions.


    **Not valid:** testing a calculation or transformation that happens to live

    in a component — extract to `.utils.ts` and unit test instead.'
  collision_type: scope_ambiguity
  why_distracting: An agent might see the conditional rendering based on A/B testing
    feature flags and mistakenly interpret it as "complex UI interaction logic" that
    requires a full component test using `customRender`, significantly expanding the
    scope of a simple PR.
  severity: medium
