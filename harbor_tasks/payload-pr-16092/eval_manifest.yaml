rubric:
  - id: types_over_interfaces
    description: |
      Prefer types over interfaces (except when extending external types).
      The PR adds `trash?: boolean` to the OperationArgs type.
    source: packages/sdk/src/utilities/buildSearchParams.ts
    source_ref: "Prefer types over interfaces (except when extending external types)"
    reference: |
      Added to OperationArgs type: `trash?: boolean`
      Consistent with existing fields `draft?: boolean` and `pagination?: boolean` which are also types

  - id: single_object_parameters
    description: |
      Prefer single object parameters (improves backwards-compatibility).
      The fix uses buildSearchParams({ trash: true }) with an object argument.
    source: packages/sdk/src/utilities/buildSearchParams.ts
    source_ref: "Prefer single object parameters (improves backwards-compatibility)"
    reference: |
      buildSearchParams({ trash: true }) - single object parameter
      Not buildSearchParams(true) - positional argument

  - id: boolean_prefixes
    description: |
      Prefix booleans with is/has/can/should for clarity.
      The trash parameter is named without prefix following existing pattern.
    source: packages/sdk/src/utilities/buildSearchParams.ts
    source_ref: "Prefix booleans with is/has/can/should (e.g., isValid, hasData) for clarity"
    reference: |
      Property named `trash` - bare boolean without is/has/should prefix
      Consistent with existing bare booleans: `draft`, `pagination`
