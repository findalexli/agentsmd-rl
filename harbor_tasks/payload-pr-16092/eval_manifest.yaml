title: "fix(sdk): pass trash to request"
description: |
  The REST SDK documents a `trash` option on `find`, `findVersions`, and `findVersionByID`,
  but that flag was never added to the request URL. The Local API and REST handlers already
  support `trash` via query params. This PR extends `buildSearchParams` to serialize the
  `trash` boolean into the query string.

target_file: packages/sdk/src/utilities/buildSearchParams.ts
distinctive_line: "if (typeof args.trash === 'boolean')"

