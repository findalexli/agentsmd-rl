  - id: pp_setter_handles_none
    type: fail_to_pass
    origin: pr_diff
    description: "pp_plan setter converts None to empty dict instead of storing None"

  - id: pipeline_parallel_enum_removed
    type: fail_to_pass
    origin: pr_diff
