  - id: supports_pp_plan_nonempty_true
    type: pass_to_pass
    origin: pr_diff
    description: "supports_pp_plan returns True for non-empty plans from model, base, or config"

  - id: pp_setter_accepts_valid_dict
    type: pass_to_pass
