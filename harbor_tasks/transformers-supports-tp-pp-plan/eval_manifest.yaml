  - id: supports_pp_plan_empty_dict_false
    type: fail_to_pass
    origin: pr_diff
    description: "supports_pp_plan returns False when _pp_plan is empty dict (multiple combos)"

  - id: supports_pp_plan_checks_config
    type: fail_to_pass
