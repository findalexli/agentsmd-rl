rubric:
- rule: Keep demo code concise and copy-pasteable
  source:
    path: CLAUDE.md
    lines: '153'
    commit: a120c05faf259ef45d23ab689bde5e9e5f7630fb
- rule: 'Follow import order: React → dependencies → antd components → custom components
    → types → styles'
  source:
    path: CLAUDE.md
    lines: 144-145
    commit: a120c05faf259ef45d23ab689bde5e9e5f7630fb
- rule: Focus each demo on a single feature
  source:
    path: .github/copilot-instructions.md
    lines: '93'
    commit: a120c05faf259ef45d23ab689bde5e9e5f7630fb
- rule: 如果需要复用少量逻辑，优先内联 (If you need to reuse a small amount of logic, prefer inlining)
  source:
    path: CLAUDE.md
    lines: 42-42
  evidence: The gold solution duplicates the `const currentYear = new Date().getFullYear();`
    line inside each of the 6 demo components instead of extracting it to a shared
    utility file.
  category: architecture
- rule: demo 与 .dumi 文件之间不要互相相对引用；如果需要复用少量逻辑，优先内联 (No relative imports between demos
    and .dumi files; prefer inlining for small reused logic)
  source:
    path: AGENTS.md
    lines: 27-28
  evidence: The gold solution keeps the `currentYear` variable initialization duplicated
    across all 6 demo files rather than extracting it into a shared utility file,
    adhering to the rule to prefer inlining for small amounts of reused logic.
  category: architecture
