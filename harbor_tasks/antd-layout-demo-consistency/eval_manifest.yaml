distractors:
- rule: Changelog core principles require providing both English and Chinese versions
    for changes.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to add a changelog entry for this demo code
    consistency fix, thinking it's a required step for PRs. However, this is an internal
    refactor of demo code that is imperceptible to users, so adding a changelog entry
    would violate the rule to ignore such changes.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 110-112
- rule: Demo import conventions require using absolute paths and strictly forbid relative
    paths for importing shared variables or methods.
  collision_type: architecture_boundary
  why_distracting: The agent might try to DRY up the duplicated `currentYear` logic
    by extracting it to a shared file (e.g., `utils.ts`) and importing it. This would
    lead to confusion over whether to use relative or absolute paths, as the rules
    strictly forbid relative paths for shared logic in demos.
  severity: high
  source:
    path: CLAUDE.md
    lines: 39-41
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` contain identical rules. The
  agent should follow the demo import conventions and changelog rules defined in these
  files. The primary challenge is recognizing that this is a minor demo refactor where
  logic should be inlined rather than extracted, and that it doesn't warrant a changelog
  entry.
