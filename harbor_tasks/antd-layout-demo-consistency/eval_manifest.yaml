distractors:
- rule: 'Changelog 规范: 必须同时提供中英文两个版本 / 忽略用户无感知的改动'
  collision_type: scope_ambiguity
  why_distracting: An agent might attempt to document this refactoring in the changelog
    files because it modifies component demo files. However, this is an internal consistency
    fix (user unperceivable), so adding a changelog entry would violate the rule to
    ignore internal refactoring.
  severity: medium
  source:
    path: AGENTS.md
    lines: 106-108
- rule: Help maintainers reply to Ant Design GitHub issues following official guidelines.
  source:
    path: .claude/skills/issue-reply/SKILL.md
    lines: 1-5
  collision_type: scope_ambiguity
  why_distracting: The skill is for replying to GitHub issues, which is irrelevant
    to fixing code consistency in demo files. An agent might get confused by the 'issue'
    terminology if it misinterprets the task as resolving an issue ticket rather than
    writing code.
  severity: low
hierarchy_analysis: The repository contains identical `AGENTS.md` and `CLAUDE.md`
  files at the root level. There is no complex hierarchy or overriding required, as
  the rules are flat and consistent across both files.
version: '2.0'
