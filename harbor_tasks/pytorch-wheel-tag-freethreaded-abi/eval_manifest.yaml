    lines: '72'
    commit: 8eaba043803b82549bf4fb42d5e03099be2eb1d9
distractors:
- rule: 'Use our test class and test runner: from torch.testing._internal.common_utils
    import run_tests, TestCase'
  collision_type: scope_ambiguity
  why_distracting: The bug is in a CI script (`.ci/pytorch/smoke_test/check_wheel_tags.py`),
    not the main PyTorch library. Writing a test using `torch.testing._internal.common_utils`
    for a CI script is inappropriate and out of scope.
  severity: high
  source:
    path: CLAUDE.md
    lines: 18-24
- rule: Once the change is passing, find an appropriate test file to add the test
    to and make sure to follow local conventions on the test file.
  collision_type: scope_ambiguity
  why_distracting: CI scripts in this repository typically do not have unit tests
    in the main test suite. The agent might waste time looking for a test file or
    creating one for `check_wheel_tags.py`.
  severity: high
  source:
    path: AGENTS.md
    lines: 4-6
- rule: Only use commands provided via `spin` for linting.
  collision_type: rule_conflict
  why_distracting: This rule directly conflicts with AGENTS.md which instructs the
    agent to use `lintrunner -a`. The agent might get confused about which linting
    tool to use or fail if `spin` is not configured in the environment.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 33-35
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` provide instructions on testing
  and linting. There is a direct conflict regarding linting tools (`spin` in CLAUDE.md
  vs `lintrunner` in AGENTS.md). Additionally, the testing instructions in both files
  assume the agent is modifying the core PyTorch library, which creates scope ambiguity
  when modifying CI scripts.
