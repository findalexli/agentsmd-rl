version: "2.0"

source:
  repo: "pytorch/pytorch"
  pr: 177993
  base_commit: "8eaba043803b82549bf4fb42d5e03099be2eb1d9"
  merge_commit: "549e5c77bb09262be27b441ee27eeaebffcc7905"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Source file must parse without syntax errors"

  - id: freethreaded_abi_tag_accepted
    type: fail_to_pass
    origin: pr_diff
    description: "Free-threaded Python wheel with 't' ABI suffix must pass validation"

  - id: freethreaded_abi_via_env_var
    type: fail_to_pass
    origin: pr_diff
    description: "Free-threaded detection via MATRIX_PYTHON_VERSION ending in 't'"

  - id: freethreaded_abi_via_sysconfig
    type: fail_to_pass
    origin: pr_diff
    description: "Free-threaded detection via sysconfig Py_GIL_DISABLED flag"

  - id: freethreaded_wrong_tag_rejected
    type: fail_to_pass
    origin: pr_diff
    description: "Wheel WITHOUT 't' suffix must fail under free-threaded Python"

  - id: mac_minos_mode2_attempted
    type: fail_to_pass
    origin: pr_diff
    description: "check_mac_wheel_minos attempts Mode 2 when no wheel dir is set"

  - id: dead_code_removed
    type: fail_to_pass
    origin: pr_diff
    description: "No unreachable 'continue' after 'raise' in tag validation loop"

  - id: standard_wheel_validation
    type: pass_to_pass
    origin: pr_diff
    description: "Standard non-free-threaded wheels still validate correctly"

  - id: extract_wheel_tags
    type: pass_to_pass
    origin: pr_diff
    description: "_extract_wheel_tags correctly parses multi-tag WHEEL metadata"

  - id: core_functions_importable
    type: pass_to_pass
    origin: pr_diff
    description: "All core public functions exist and are callable"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "Core functions have real implementations, not stubs"

rubric:
  - rule: "Minimize comments; be concise; code should be self-explanatory and self-documenting."
    source:
      path: "CLAUDE.md"
      lines: "58"
      commit: "8eaba043803b82549bf4fb42d5e03099be2eb1d9"

  - rule: "Don't make trivial (1-2 LOC) helper functions that are only used once unless it significantly improves code readability."
    source:
      path: "CLAUDE.md"
      lines: "61-62"
      commit: "8eaba043803b82549bf4fb42d5e03099be2eb1d9"

  - rule: "If uncertain, choose the simpler, more concise implementation."
    source:
      path: "CLAUDE.md"
      lines: "72"
      commit: "8eaba043803b82549bf4fb42d5e03099be2eb1d9"
