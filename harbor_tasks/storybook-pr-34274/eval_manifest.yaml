rubric:
  - source:
      file: code/builders/builder-vite/src/codegen-project-annotations.ts
      commit: db1ddc8e390e80df62a3cf2a92d0b92faab2c3f4
      lines: "function hash(value: string)"
    description: |
      The hash function must use the djb2 algorithm with seed 5381 and
      position-sensitive hashing to prevent anagram collisions. The algorithm
      uses: acc = ((acc << 5) + acc + charCode) >>> 0 for each character.
    reference: "let acc = 5381;\\n  for (let i = 0; i < value.length; i++) {\\n    acc = ((acc << 5) + acc + value.charCodeAt(i)) >>> 0;\\n  }\\n  return acc;"
    weight: 1
