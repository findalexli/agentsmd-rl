  - id: test_hash_anagrams_distinct_djb2
    type: fail_to_pass
    origin: agent_config
    description: djb2 hash produces different values for anagrams
    source:
      - file: AGENTS.md
        lines: "Testing Expectations: Test real behavior, not just syntax patterns"
      - file: AGENTS.md
