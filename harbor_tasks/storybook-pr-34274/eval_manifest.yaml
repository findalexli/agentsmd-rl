version: 1

source:
  owner: storybookjs
  repo: storybook
  pr_number: 34274
  base_commit: db1ddc8e390e80df62a3cf2a92d0b92faab2c3f4
  merge_commit: 1c38a364f36ed149a33ddbc61e8e545a4898d8ff
  title: "Builder-Vite: Use djb2 hash to prevent variable name collisions in builder-vite"
  description: |
    Replaced the naive character-code-sum hash function in codegen-project-annotations.ts
    with the djb2 hash algorithm. The old function produced identical hashes for anagrams,
    causing variable name collisions ("preview_XXXX") when pnpm's peer dependency paths
    include hex suffixes.

