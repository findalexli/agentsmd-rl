  category: architecture
  verification: llm_judge
config_edits:
- path: packages/playwright/src/skill/SKILL.md
  tier: 1
  gold_added: '# Close the browser

    playwright-cli close

    # Delete user data for the default session

    playwright-cli delete-data

    # Close all browsers

    playwright-cli session-close-all

    # Forcefully kill all browser processes

    playwright-cli session-kill-all'
  gold_removed: 'playwright-cli close                      # stop the default session

    playwright-cli session-close-all          # stop all sessions

    playwright-cli delete-data                # delete user data for default session

    playwright-cli kill-all                   # forcefully kill all daemon processes (for stale/zombie processes)'
distractors:
- rule: Add MCP Tool capability and register it
  source:
    path: .claude/skills/playwright-mcp-dev/SKILL.md
    lines: 9-11
  source_text: '- Create a new tool in `packages/playwright/src/mcp/browser/tools/your-tool.ts`

    - Register the tool in `packages/playwright/src/mcp/browser/tools.ts`

    - Add ToolCapability in `packages/playwright/src/mcp/config.d.ts`'
  collision_type: architecture_boundary
  why_distracting: An agent tasked with adding the new `install` command might blindly follow these steps to create an MCP tool for it. However, the `install` command is an internal workspace initialization tool that should not be exposed via MCP. Following these rules would lead to implementing an unnecessary and architecturally incorrect tool.
  severity: high
- rule: Preserve existing documented commands
  source:
    path: packages/playwright/src/skill/SKILL.md
    lines: 156-157
  source_text: 'playwright-cli install-browser

    playwright-cli install-skills'
  collision_type: meta_confusion
  why_distracting: This file is the documentation for the tool being developed, not a constraint for the developer. An agent might treat these documented commands as an immutable API contract and refuse to refactor them, whereas the PR explicitly renames `install-browser` and changes `install-skills` logic.
  severity: medium
- rule: Preserve kill-all command
  source:
    path: packages/playwright/src/skill/SKILL.md
    lines: 192-192
  source_text: 'playwright-cli kill-all                   # forcefully kill all daemon processes (for stale/zombie processes)'
  collision_type: scope_ambiguity
  why_distracting: Similar to the install commands, an agent might see `kill-all` in the documentation and believe it must not be altered, conflicting with the diff which intentionally renames it to `session-kill-all` to match other session command naming conventions.
  severity: medium
