  title: "[@mantine/core] use-popover: reorder middlewares to apply flip before shift"
  description: "Reorder floating-ui middlewares from shift-before-flip to flip-before-shift in use-popover. When a Menu is at screen edge, SubMenu overlaps parent instead of flipping because shift runs first and pushes element into viewport, preventing flip from triggering. The fix ensures flip repositions element to opposite side before shift adjusts it within viewport bounds."
  target_file: "packages/@mantine/core/src/components/Popover/use-popover.ts"
  distinctive_line: "typeof middlewaresOptions.flip === 'boolean' ? flip() : flip(middlewaresOptions.flip)"

