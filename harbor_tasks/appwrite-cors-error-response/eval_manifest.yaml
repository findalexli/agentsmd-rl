    type: fail_to_pass
    origin: behavior
    points: 20

  - id: cors_headers_added_before_error_response
    description: "CORS headers are fetched and added to the response"
    type: fail_to_pass
    origin: behavior
    points: 20

  - id: cors_in_error_response_uses_try_catch
    description: "CORS header addition is wrapped in try-catch for graceful degradation"
    type: fail_to_pass
    origin: behavior
    points: 20

  # Pass-to-pass tests (quality verification)
  - id: override_flag_on_cors_headers
    description: "CORS headers use override flag to avoid duplicates"
    type: pass_to_pass
    origin: behavior
    points: 10

  - id: error_handler_follows_injection_pattern
    description: "Error handler follows the Action injection pattern from AGENTS.md"
    type: agent_config
    source:
      file: AGENTS.md
      lines: "Action pattern section showing ->inject() usage"
      commit: 9ac686ae318e63d7a159d7a4021e8a786ee4972b
    points: 10

  - id: comments_document_cors_fix
    description: "Fix includes explanatory comments"
    type: pass_to_pass
    origin: behavior
    points: 5

  - id: error_response_header_ordering
    description: "CORS headers are added before cache headers"
    type: pass_to_pass
    origin: behavior
    points: 5

  - id: request_origin_used_for_cors
    description: "Request origin is passed to cors.headers()"
    type: pass_to_pass
    origin: behavior
    points: 5

  - id: throwable_catch_not_exception
    description: "Catch block uses Throwable, not just Exception"
    type: pass_to_pass
    origin: behavior
    points: 5

  # Repo CI tests (pass_to_pass gates)
  - id: test_repo_composer_validate
    description: "Composer validation passes on the repo"
    type: pass_to_pass
    origin: repo_tests
    points: 5

  - id: test_repo_composer_lint
    description: "Composer lint (Pint code style check) passes on the repo"
    type: pass_to_pass
    origin: repo_tests
    points: 5

  - id: test_repo_php_syntax
    description: "PHP syntax check passes on the target file"
