name = "appwrite-cors-error-response"
title = "Add CORS headers to error responses in Appwrite"
difficulty = "easy"
tags = ["php", "cors", "http", "headers", "web"]
pr_number = 11797
owner = "appwrite"
repo = "appwrite"
base_commit = "9ac686ae318e63d7a159d7a4021e8a786ee4972b"
merge_commit = "d421b5ff3091f4013e707e0b1b8f8c71de11ed3c"

timeout = { agent = 1800, verifier = 120 }

[description]
brief = "Fix missing CORS headers on error responses in Appwrite HTTP handlers"
detail = """
The Http::error() handler in Appwrite was missing CORS headers, causing browsers to
block error responses (e.g., HTTP 403) with a generic CORS error instead of showing
the actual error message to client SDKs.

This task requires adding the 'cors' resource injection to the error handler and
injecting CORS headers before sending the error response, following the same pattern
used in Http::init().
"""

[files]
target = ["app/controllers/general.php"]
