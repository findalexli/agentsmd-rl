version: "2.0"

source:
  repo: "huggingface/transformers"
  pr: 44880
  base_commit: "a48a63c27d1cdb7845d2c3acc4f11f580917b69b"
  merge_commit: "bc8c80e0288fd369ad06bff5b480d3c51f97a95e"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified files must parse without syntax errors"

  - id: key_missing_models_present
    type: fail_to_pass
    origin: pr_diff
    description: "Key model types (h2ovl_chat, internvl_chat, molmo, phi3_v, openvla, kimi_k25) must be in MODELS_WITH_INCORRECT_HUB_TOKENIZER_CLASS"

  - id: remaining_missing_models_present
    type: fail_to_pass
    origin: pr_diff
    description: "Remaining model types (chatlm, minimax_m2, molmo2, nemotron, nvfp4, phimoe, minicpmv) must be in the set"

  - id: layer_types_accepts_strings
    type: pass_to_pass
    origin: pr_diff
    description: "Llama4TextConfig.layer_types must accept and store string values"

  - id: layer_types_type_annotation
    type: fail_to_pass
    origin: pr_diff
    description: "Type annotation for layer_types must declare str, not int"

  - id: preexisting_models_retained
    type: pass_to_pass
    origin: pr_diff
    description: "Pre-existing entries must not be removed from the set"

  - id: llama4_config_attributes_intact
    type: pass_to_pass
    origin: pr_diff
    description: "Other Llama4TextConfig attributes must remain intact"

  - id: set_entries_sorted
    type: fail_to_pass
    origin: agent_config
    description: "Set entries in source must be sorted alphabetically (make check-repo)"
    source:
      path: "CLAUDE.md"
      lines: "5"
      commit: "a48a63c27d1cdb7845d2c3acc4f11f580917b69b"

  - id: ruff_lint_clean
    type: pass_to_pass
    origin: agent_config
    description: "Changed files must pass ruff lint (make style)"
    source:
      path: "CLAUDE.md"
      lines: "2"
      commit: "a48a63c27d1cdb7845d2c3acc4f11f580917b69b"

  - id: set_has_sufficient_entries
    type: pass_to_pass
    origin: static
    description: "Set must contain >= 25 entries (anti-stub)"

rubric:
  - rule: "PRs should be as brief as possible. Bugfix PRs in particular can often be only one or two lines long, and do not need large comments, docstrings or new functions in this case. Aim to minimize the size of the diff."
    source:
      path: ".github/copilot-instructions.md"
      lines: "15"
      commit: "a48a63c27d1cdb7845d2c3acc4f11f580917b69b"
