  category: testing
distractors:
- rule: never wait for time to pass in tests. Always wait for the condition to be
    met instead of waiting for an arbitrary amount of time.
  collision_type: rule_conflict
  why_distracting: The rule forbids waiting for time to pass in tests, but the client
    fixture needs a `setTimeout` backoff to retry fetching when the dev server port
    isn't ready yet. An agent strictly following this might omit the delay, causing
    retries to exhaust instantly, or attempt complex IPC that overcomplicates the
    fixture.
  severity: high
  source:
    path: test/CLAUDE.md
    lines: 16-18
- rule: 'CRITICAL: Do not set a timeout on tests. Bun already has timeouts.'
  collision_type: meta_confusion
  why_distracting: The agent might confuse the instruction 'Do not set a timeout on
    tests' with the use of `setTimeout` for the retry backoff, leading it to avoid
    adding the necessary delay between fetch attempts.
  severity: medium
  source:
    path: test/CLAUDE.md
    lines: 98-99
hierarchy_analysis: The hierarchy includes root-level `CLAUDE.md` and `AGENTS.md`,
  as well as `test/CLAUDE.md` and `test/AGENTS.md`. The test-specific configs provide
  more granular guidance on testing style, such as avoiding flaky tests and preferring
  async/await. The conflict arises because the general rule against waiting for time
  to pass in tests (from `test/CLAUDE.md`) conflicts with the specific need for a
  retry backoff in a network client fixture. The agent must recognize that a retry
  backoff is an exception to the 'no arbitrary waits' rule because the condition (server
  ready) can only be checked by polling.
