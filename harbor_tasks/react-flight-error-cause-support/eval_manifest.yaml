checks:
  - id: can_transport_error_cause
    type: fail_to_pass
    origin: pr_diff
    description: "Error.cause property is serialized by Flight server and revived on the client"

  - id: error_cause_in_thrown_errors
    type: fail_to_pass
    origin: pr_diff
    description: "Error.cause is preserved when a Server Component throws"

  - id: jsonvalue_exported_from_shared
    type: fail_to_pass
    origin: pr_diff
    description: "JSONValue type is consolidated and exported from packages/shared/ReactTypes.js"

  - id: cause_field_in_error_info_type
    type: fail_to_pass
    origin: pr_diff
    description: "ReactErrorInfoDev type in ReactTypes.js includes an optional cause field"

  - id: jsonvalue_not_locally_defined_in_client
    type: fail_to_pass
    origin: pr_diff
    description: "JSONValue local definition is removed from ReactFlightClient.js (imported from shared)"

  - id: existing_flight_cyclic_transport
    type: pass_to_pass
    origin: repo_tests
    description: "Pre-existing ReactFlight cyclic-object transport test still passes"

  - id: test_flight_error_objects
    type: pass_to_pass
    origin: repo_tests
    description: "ReactFlight Error object transport test passes (no regression in Error serialization)"

  - id: test_flight_replays_logs_cyclic
    type: pass_to_pass
    origin: repo_tests
    description: "ReactFlight cyclic object logging test passes (no regression)"

  - id: test_flight_formdata
    type: pass_to_pass
    origin: repo_tests
    description: "ReactFlight FormData transport test passes (no regression)"

