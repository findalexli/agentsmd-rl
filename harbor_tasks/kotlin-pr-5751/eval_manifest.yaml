source_pr:
  owner: JetBrains
  repo: kotlin
  number: 5751
  title: "KT-85149: Fix Klib dump parsing qualified names adjacent to vararg symbol"
  merge_commit: 7bf5fd6811ac1f00ebf03b980a9a7e4954f5455c
  base_commit: 731ea08ab113c6d87abdb9d5d6f10299d4547395

files:
  target: compiler/util-klib-abi/src/org/jetbrains/kotlin/library/abi/parser/Cursor.kt
  test: compiler/util-klib-abi/test/org/jetbrains/kotlin/library/abi/parser/KlibParsingCursorExtensionsTest.kt

checks:
  # Fail-to-pass: These tests fail on base commit and pass on correct fix
  - id: "f2p_regex_lookahead_pattern"
    test: test_regex_lookahead_pattern_present
    type: behavioral
    description: "The fixed regex must have negative lookahead for '...' vararg symbol"

  - id: "f2p_qualified_name_parsing_behavior"
    test: test_qualified_name_vararg_parsing_behavior
    type: behavioral
    description: "Regex correctly splits qualified name from vararg symbol"

  - id: "f2p_new_test_compiles"
    test: test_vararg_without_type_params_compiles
    type: behavioral
    description: "New test case for vararg without type params exists"

  # Pass-to-pass: These tests pass on both base and fix
  - id: "p2p_original_test_exists"
    test: test_original_vararg_with_type_params_still_works
    type: behavioral
    description: "Original vararg test with type params still exists"

  - id: "p2p_base_regex_unchanged"
    test: test_regex_valid_identifier_base_pattern_unchanged
    type: behavioral
    description: "Base validIdentifierRegex pattern preserved"

  - id: "p2p_file_compiles"
    test: test_file_compiles
    type: behavioral
    description: "Kotlin source file compiles without errors"

  - id: "p2p_unit_tests_pass"
    test: test_unit_tests_pass
    type: behavioral
    description: "Unit tests pass (with exception for new F2P test on base commit)"

  # Additional pass-to-pass tests from repo CI/CD
  - id: "p2p_compile_test_kotlin"
    test: test_repo_compile_test_kotlin
    type: pass_to_pass
    origin: repo_tests
    description: "Repo CI - Compile test Kotlin sources passes"

  - id: "p2p_module_check"
    test: test_repo_module_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo CI - Module check task (compile + test) passes"

  # Agent config checks
  - id: "agent_fix_location"
    test: test_fix_applied_in_correct_location
    type: structural
    gated_by: "f2p_regex_lookahead_pattern"
    source:
      file: .ai/guidelines.md
      lines: "Testing section"
    description: "Fix applied to validIdentifierWithDotRegex specifically"

  - id: "agent_no_overly_broad_changes"
    test: test_no_overly_broad_regex_changes
    type: structural
    gated_by: "p2p_file_compiles"
    source:
      file: .ai/guidelines.md
      lines: "Identify the area and READ its docs"
    description: "Regex changes are focused, not overly broad"

rubric: []
