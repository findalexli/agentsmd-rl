[task]
name = "klib-regex-vararg-parsing"
title = "Fix Klib dump regex for parsing qualified names adjacent to vararg symbol"
description = """
Fix a regex bug in the klib ABI parser where the validIdentifierWithDotRegex pattern
was consuming the entire qualified name including the '...' vararg symbol, instead of
stopping at the vararg symbol. The fix adds a negative lookahead (?!\.\.\.) to prevent
the regex from consuming the vararg marker.
"""
difficulty = "easy"
tags = ["kotlin", "regex", "parsing", "compiler", "klib"]

[time]
agent = 1800  # 30 minutes
verifier = 120  # 2 minutes

[links]
pr = "https://github.com/JetBrains/kotlin/pull/5751"
issue = "https://youtrack.jetbrains.com/issue/KT-85149"

