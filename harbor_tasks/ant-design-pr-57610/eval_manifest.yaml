    type: fail_to_pass
    origin: behavioral
    description: Style file imports genFocusOutline and genFocusStyle utilities

  - id: test_image_cover_has_focus_visible_selector
    type: fail_to_pass
    origin: behavioral
    description: Image cover shows on focus-visible, not just hover

