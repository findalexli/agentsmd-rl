# Note: Rubric rules removed as they cannot be evaluated for this task type.
# The rubric judge only evaluates config file modifications (CLAUDE.md, README.md, etc.)
# but this task modifies code files and component documentation (index.en-US.md, etc.)
# which don't match the CONFIG_RE pattern. The gold solution DOES follow all repo
# conventions (cssinjs, design tokens, bilingual docs, table format, absolute imports)
# but the judge mechanism cannot verify this for non-config file changes.
