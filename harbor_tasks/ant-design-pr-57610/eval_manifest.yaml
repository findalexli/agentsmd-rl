task:
  name: antd-image-focus-visible-a11y
  title: Add focus-visible styles and focusTrap prop to Image component
  description: |
    Enhance Image component accessibility by adding focus-visible styles
    for keyboard navigation and exposing a focusTrap prop to control
    focus trapping in preview mode.

source:
  repo: ant-design/ant-design
  pr_number: 57610
  base_commit: c87f6a960d604b2237c24c3cd233cf9286ab11e3
  merge_commit: 853528ee93702fa919de71c996ce3a774b1c7ab6

