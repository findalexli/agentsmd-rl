    attempt to apply Rust idioms or syntax to the Python code.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 11-11
hierarchy_analysis: The repository has a single `CLAUDE.md` configuration file at
  the root. The primary challenge is that the rules are heavily tailored towards a
  Rust codebase (mentioning `cargo`, `clippy`, `panic!`, `if let`), but the bug and
  gold solution are entirely within a Python tooling script. This creates a significant
  scope ambiguity where the agent must recognize that most of the repository-level
  rules do not apply to this specific file.
