version: 1.0

task:
  name: antd-notification-description-spacing
  source_pr:
    repo: ant-design/ant-design
    number: 57590
    title: "fix(Notification): reserve close button spacing for description-only notices"
    base_commit: 501436e5f45e533679f797ee0ee58e2a391e566d
    merge_commit: 1d36dfec5be5174376fe54f34a7abd1a7a128e38

checks:
  # Fail-to-pass tests - verify the fix works
  - id: test_description_only_notification_behavior
    type: fail_to_pass
    origin: pr_diff
    description: "Behavioral: description-only notification renders correctly (no title div, description is first child, inline-end spacing CSS generated)"

  # Pass-to-pass tests - verify no regressions
  - id: test_notification_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Repo notification unit tests pass"

  - id: test_lint_passes
    type: pass_to_pass
    origin: repo_tests
    description: "ESLint passes on notification files"

  - id: test_biome_lint_passes
    type: pass_to_pass
    origin: repo_tests
    description: "Biome lint passes on notification files"

  - id: test_notification_hooks_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Notification hooks tests pass"

  - id: test_notification_placement_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Notification placement tests pass"

  - id: test_notification_config_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Notification config tests pass"

# Agent config rules relevant to this PR
# From CLAUDE.md, AGENTS.md, .github/copilot-instructions.md
rubric:
  # CSS-in-JS styling rules
  - id: css_in_js_style
    rule: "Use @ant-design/cssinjs for styling - never hardcode colors, sizes, spacing"
    source: ".github/copilot-instructions.md"
    relevant: true

  - id: design_tokens
    rule: "Use design tokens from Ant Design token system (e.g., token.marginSM)"
    source: ".github/copilot-instructions.md"
    relevant: true

  - id: css_logical_props
    rule: "Use CSS logical properties for RTL support (e.g., margin-inline-end instead of margin-right)"
    source: ".github/copilot-instructions.md"
    relevant: true

  # React/TypeScript rules
  - id: typescript_strict
    rule: "Always use TypeScript with strict type checking - never use 'any' type"
    source: ".github/copilot-instructions.md"
    relevant: true

  - id: functional_components
    rule: "Use functional components with hooks exclusively (no class components)"
    source: ".github/copilot-instructions.md"
    relevant: true

  - id: conditional_rendering
    rule: "Use early returns and conditional rendering to improve readability"
    source: ".github/copilot-instructions.md"
    relevant: true

  # Test rules
  - id: test_coverage
    rule: "Target 100% test coverage - write comprehensive tests using Jest and React Testing Library"
    source: ".github/copilot-instructions.md"
    relevant: true

  - id: test_import_relative
    rule: "In __tests__ directories, use relative paths (../index) to import component code, never absolute paths like 'antd'"
    source: "CLAUDE.md"
    relevant: true

  # Demo rules (not relevant for this PR since no demo changes)
  - id: demo_import_absolute
    rule: "In demo/ directories, use absolute paths (antd, antd/es/*) to import components, never relative paths"
    source: "CLAUDE.md"
    relevant: false

  # Documentation rules
  - id: changelog_format
    rule: "Changelog entries should use Emoji prefix, no colon after component name"
    source: "CLAUDE.md"
    relevant: false

# Scoring weights
scoring:
