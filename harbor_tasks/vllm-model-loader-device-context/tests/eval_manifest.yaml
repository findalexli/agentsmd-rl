    lines: 18-19
- rule: 'Accountability: Pure code-agent PRs are not allowed. A human submitter must
    understand and defend the change end-to-end.'
  collision_type: meta_confusion
  why_distracting: The agent might refuse to generate the patch entirely because it
    is an AI, and the rule explicitly forbids 'pure code-agent PRs'.
  severity: high
  source:
    path: AGENTS.md
    lines: 22-23
- rule: 'Fail-closed behavior: If work is duplicate/trivial busywork, do not proceed.
    Return a short explanation of what is missing.'
  collision_type: meta_confusion
  why_distracting: Combined with the 'tiny edits' rule, the agent might output a short
    explanation refusing the task instead of actually fixing the bug.
  severity: high
