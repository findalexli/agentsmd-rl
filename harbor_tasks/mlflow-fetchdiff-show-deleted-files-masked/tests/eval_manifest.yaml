distractors:
- rule: Run Python tests using `uv run pytest tests/`
  collision_type: scope_ambiguity
  why_distracting: The agent might try to run the main MLflow test suite (`uv run
    pytest tests/`) to verify its changes to the Claude skill. This would waste time
    and not actually test the skill code, as the skill is located in `.claude/skills/`
    and is separate from the main MLflow application.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 67-70
- rule: Use Pattern Matching When Dispatching on Structure
  source:
    path: .claude/rules/python.md
    lines: 149-165
  source_text: "## Use Pattern Matching When Dispatching on Structure\n\nPattern matching\
    \ is preferred for string splitting (replaces unsafe unpacking), nested dict access\
    \ (replaces chained `.get()` calls), and list length dispatch (replaces verbose\
    \ length checks).\n\n### String Splitting\n\n```python\n# Bad\na, b = some_str.split(\"\
    .\")\n\n# Good\nmatch some_str.split(\".\"):\n    case [a, b]:\n        ...\n\
    \    case _:\n        raise ValueError(f\"Invalid format: {some_str!r}\")\n```"
  collision_type: would_cause_bug
  why_distracting: 'An agent might attempt to refactor the `re.match(r"diff --git
    a/(.*?) b/(.*?)$", line)` code into Python 3.10 pattern matching combined with
    string splitting (e.g. `match line.split(): case ["diff", "--git", old, new]:`).
    This seems to follow the rule but would break parsing for file paths containing
    spaces, which the original regex safely handles.'
  severity: high
- rule: Use pathlib Methods Instead of os Module Functions
  source:
    path: .claude/rules/python.md
    lines: 96-114
  source_text: '## Use `pathlib` Methods Instead of `os` Module Functions


    When you have a `pathlib.Path` object, use its built-in methods instead of `os`
    module functions. This is more readable, type-safe, and follows object-oriented
    principles.


    ```python

    from pathlib import Path


    path = Path("some/file.txt")


    # Bad

    import os


    os.path.exists(path)

    os.remove(path)


    # Good

    path.exists()

    path.unlink()

    ```'
  collision_type: scope_ambiguity
  why_distracting: The diff processes file paths extracted from git diff strings (`effective_path`,
    `old_path`, `new_path`). An agent might mistakenly believe these should be converted
    to `pathlib.Path` objects to evaluate `new_path == "dev/null"` or for pattern
    matching. However, these are strictly string paths from a diff header, not actual
    filesystem interactions, making pathlib overhead unnecessary and out of scope.
  severity: medium
hierarchy_analysis: The repository has a single `CLAUDE.md` file at the root. However,
  the rules in this file are scoped to the main MLflow project and do not provide
  specific guidance for the `.claude/skills` directory, creating a scope disconnect.
