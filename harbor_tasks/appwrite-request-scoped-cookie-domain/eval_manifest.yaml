rubric:
- rule: Use dependency injection via inject() method instead of global Config::getParam()
    for accessing request-scoped values like domainVerification and cookieDomain.
  source:
    path: AGENTS.md
    lines: 45-57
    commit: 2dce141d1747e95e50d8d9575baae1d8ac42699b
- rule: When updating documents, pass only changed attributes as a sparse Document
    rather than passing the full document.
  source:
    path: AGENTS.md
    lines: 83-93
    commit: 2dce141d1747e95e50d8d9575baae1d8ac42699b
- rule: HTTP endpoint action files must only be named Get.php, Create.php, Update.php,
    Delete.php, or XList.php. For non-CRUD operations, model as property updates (e.g.,
    Status/Update.php instead of Block.php).
  source:
    path: src/Appwrite/Platform/AGENTS.md
    lines: 40-42
    commit: 2dce141d1747e95e50d8d9575baae1d8ac42699b
- rule: Use Utopia PHP's dependency injection system (`->inject()`) to pass request-scoped
    resources to HTTP endpoint actions.
  source:
    path: AGENTS.md
    lines: 56-75
  evidence: In `app/controllers/api/account.php`, the gold solution adds `->inject('domainVerification')`
    and `->inject('cookieDomain')` to the action chain and updates the callback signature
    to accept these inje
  category: architecture
- rule: Define and register resources in the `app/init/` directory (specifically `resources.php`).
  source:
    path: AGENTS.md
    lines: 26-27
  evidence: The gold solution defines the new `domainVerification` and `cookieDomain`
    resources in `app/init/resources.php`.
  category: architecture
- rule: Use Utopia PHP's DI system by chaining `->inject()` and adding the injected
    resource to the action callback signature.
  source:
    path: AGENTS.md
    lines: 46-65
  evidence: The gold solution adds `->inject('domainVerification')` and `->inject('cookieDomain')`
    to the route definitions and adds `bool $domainVerification, ?string $cookieDomain`
    to the action closure paramet
  category: architecture
distractors:
- rule: File names in Http directories can only be Get.php, Update.php, Create.php,
    Delete.php or XList.php.
  collision_type: architecture_boundary
  why_distracting: The strict file naming rules (`Get.php`, `Create.php`, etc.) apply
    to the new Modules architecture. An agent might try to apply these rules to the
    legacy `app/controllers/api/account.php` file and split it into multiple files,
    which is out of scope for this DI migration PR.
  severity: high
  source:
    path: src/Appwrite/Platform/AGENTS.md
    lines: 28-35
- rule: HTTP endpoints should be placed in the module's Http directory under src/Appwrite/Platform/Modules.
  source:
    path: src/Appwrite/Platform/AGENTS.md
    lines: 13-18
  source_text: 'A module consists of:


    - `Module.php` - Simple register class registering all module''s services (from
    `Services` directory)

    - `Workers` directory - Contains behavior for module-specific workers

    - `Tasks` directory - Contains behavior for module-specific CLI tasks

    - `Http` directory - Contains HTTP endpoints for the module'
  collision_type: architecture_boundary
  why_distracting: The agent might attempt to refactor the modified `app/controllers/api/account.php`
    file into the new `src/Appwrite/Platform/Modules` structure described in the config,
    but the gold diff correctly leaves the file in its current legacy location and
    only updates dependency injection.
  severity: high
hierarchy_analysis: The root `AGENTS.md` defines the general Action pattern for DI
  injection which applies globally. The leaf `src/Appwrite/Platform/AGENTS.md` defines
  strict naming and structural conventions for the new Modules architecture. The agent
  must recognize that `app/controllers/api/account.php` is legacy and should only
  receive the DI updates, not a structural refactor to match the leaf config's rules.
