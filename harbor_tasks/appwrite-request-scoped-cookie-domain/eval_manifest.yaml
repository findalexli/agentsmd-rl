rubric:
- rule: Use dependency injection via inject() method instead of global Config::getParam()
    for accessing request-scoped values like domainVerification and cookieDomain.
  source:
    path: AGENTS.md
    lines: 45-57
    commit: 2dce141d1747e95e50d8d9575baae1d8ac42699b
- rule: When updating documents, pass only changed attributes as a sparse Document
    rather than passing the full document.
  source:
    path: AGENTS.md
    lines: 83-93
    commit: 2dce141d1747e95e50d8d9575baae1d8ac42699b
- rule: HTTP endpoint action files must only be named Get.php, Create.php, Update.php,
    Delete.php, or XList.php. For non-CRUD operations, model as property updates (e.g.,
    Status/Update.php instead of Block.php).
  source:
    path: src/Appwrite/Platform/AGENTS.md
    lines: 40-42
    commit: 2dce141d1747e95e50d8d9575baae1d8ac42699b
- rule: Use Utopia PHP's dependency injection system (`->inject()`) to pass request-scoped
    resources to HTTP endpoint actions.
  source:
    path: AGENTS.md
    lines: 56-75
  evidence: In `app/controllers/api/account.php`, the gold solution adds `->inject('domainVerification')`
    and `->inject('cookieDomain')` to the action chain and updates the callback signature
    to accept these inje
  category: architecture
- rule: Define and register resources in the `app/init/` directory (specifically `resources.php`).
  source:
    path: AGENTS.md
    lines: 26-27
  evidence: The gold solution defines the new `domainVerification` and `cookieDomain`
    resources in `app/init/resources.php`.
  category: architecture
distractors:
- rule: Inside Http directories for services, file names can only be Get.php, Update.php,
    Create.php, Delete.php or XList.php. For non-CRUD operations, model the endpoint
    as a property update.
  collision_type: scope_ambiguity
  why_distracting: The agent is modifying `src/Appwrite/Platform/Modules/Teams/Http/Memberships/Status/Update.php`
    to update DI injections. Reading the strict naming conventions for HTTP endpoints
    might distract the agent into thinking it needs to rename files, restructure the
    endpoint, or create a new endpoint for domain verification, rather than just updating
    the existing file's injections.
  severity: low
  source:
    path: src/Appwrite/Platform/AGENTS.md
    lines: 29-35
- rule: PHP 8.3+, Swoole 6.x (async runtime, replaces PHP-FPM)
  collision_type: architecture_boundary
  why_distracting: Knowing that the application runs on Swoole (an async runtime)
    might lead an agent to attempt storing request-scoped variables in Swoole coroutine
    contexts or using Swoole-specific request objects, bypassing the Utopia PHP dependency
    injection system entirely.
  severity: medium
  source:
    path: AGENTS.md
    lines: 16-16
hierarchy_analysis: The root `AGENTS.md` provides the foundational architecture rules
  (Utopia PHP DI, `app/init/` structure) which are directly applicable to this refactoring
  task. The leaf `src/Appwrite/Platform/AGENTS.md` provides strict naming conventions
  for module endpoints, which applies to the files being edited but is out of scope
  for the actual changes required, potentially causing scope ambiguity.
