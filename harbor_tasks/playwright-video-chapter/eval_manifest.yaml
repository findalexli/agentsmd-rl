rubric:
- rule: CLI commands should use kebab-case naming (video-chapter, not videoChapter)
  source:
    path: packages/playwright-core/src/tools/cli-client/skill/SKILL.md
    lines: 1-50
    commit: a8ea6558c5f28f3e7a7d8a39d52c732053eee6a1
  evidence: Gold uses 'video-chapter' with hyphens matching existing commands like 'tracing-start'
  category: naming
  verification: programmatic
  check_cmd: 'grep -q "name: ''video-chapter''" /workspace/playwright/packages/playwright-core/src/tools/cli-daemon/commands.ts'
- rule: Tool schema must include title, description, and inputSchema with zod validation
  source:
    path: CLAUDE.md
    lines: 1-50
    commit: a8ea6558c5f28f3e7a7d8a39d52c732053eee6a1
  evidence: Gold videoChapter tool has title, description, inputSchema with z.object, and type field
  category: api_design
  verification: llm_judge
- rule: DevTools commands should be categorized as 'devtools'
  source:
    path: packages/playwright-core/src/tools/cli-daemon/commands.ts
    lines: 800-850
    commit: a8ea6558c5f28f3e7a7d8a39d52c732053eee6a1
  evidence: 'Gold uses category: ''devtools'' for videoChapter, matching videoStart and videoStop'
  category: organization
  verification: programmatic
  check_cmd: 'grep -A5 ''const videoChapter = declareCommand'' /workspace/playwright/packages/playwright-core/src/tools/cli-daemon/commands.ts | grep -q "category: ''devtools''"'
- rule: CLI examples in SKILL.md should show all available options for complex commands
  source:
    path: packages/playwright-core/src/tools/cli-client/skill/SKILL.md
    lines: 150-160
    commit: a8ea6558c5f28f3e7a7d8a39d52c732053eee6a1
  evidence: 'Gold includes full example: video-chapter ''Title'' --description=''Details'' --duration=2000'
  category: documentation
  verification: programmatic
  check_cmd: grep -q 'video-chapter.*--description.*--duration' /workspace/playwright/packages/playwright-core/src/tools/cli-client/skill/SKILL.md
- rule: Tool handlers should use response.addTextResult() for success messages
  source:
    path: packages/playwright-core/src/tools/backend/video.ts
    lines: 35-45
    commit: a8ea6558c5f28f3e7a7d8a39d52c732053eee6a1
  evidence: 'Gold uses response.addTextResult with formatted message: "Chapter ''Title'' added."'
  category: patterns
  verification: llm_judge
distractors:
- rule: TypeScript types should use PascalCase for interfaces
  source:
    path: CLAUDE.md
    lines: 1-30
    commit: a8ea6558c5f28f3e7a7d8a39d52c732053eee6a1
  collision_type: scope_ambiguity
  why_distracting: This is a general TS convention but the codebase uses defineTool()/defineCommand() patterns which handle types internally; the PR doesn't define new interfaces
  severity: low
- rule: All new features need corresponding Playwright test specs in tests/page/
  source:
    path: CLAUDE.md
    lines: 70-90
    commit: a8ea6558c5f28f3e7a7d8a39d52c732053eee6a1
  collision_type: scope_ambiguity
  why_distracting: This PR only adds MCP/CLI tooling, not page APIs. Tests go in tests/mcp/, not tests/page/
  severity: medium
- rule: Tool names should follow browser_<verb>_<noun> pattern (browser_start_video not browser_video_chapter)
  source:
    path: packages/playwright-core/src/tools/backend/video.ts
    lines: 20-50
    commit: a8ea6558c5f28f3e7a7d8a39d52c732053eee6a1
  collision_type: rule_conflict
  why_distracting: The PR uses browser_video_chapter matching the semantic naming (video is the domain, chapter is the action). The existing browser_start_video follows a different pattern. The gold solution chose semantic clarity over rigid pattern adherence.
  severity: low
