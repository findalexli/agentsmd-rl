checks:
  - id: model_chunk_clears_reason
    type: fail_to_pass
    origin: pr_diff
    description: >
      initializeModelChunk sets initializedChunk.reason = null after successful
      initialization, preventing a stale reentrant error from crashing the
      stream-close handler

  - id: module_chunk_clears_reason
    type: fail_to_pass
    origin: pr_diff
    description: >
      initializeModuleChunk sets initializedChunk.reason = null after successful
      initialization, mirroring the model-chunk fix for the same reentrancy bug

  - id: reply_server_clears_reason
    type: fail_to_pass
    origin: pr_diff
    description: >
      loadServerReference in ReactFlightReplyServer.js sets
      initializedPromise.reason = null after successfully resolving a bound
      server reference

  - id: functions_not_removed
    type: pass_to_pass
    origin: static
    description: >
      initializeModelChunk, initializeModuleChunk, and loadServerReference
      still exist in their respective files after the fix

