rubric:
  - source: "packages/adapter-ppg/src/conversion.ts"
    rule: "Add null checks to type parser functions to handle nullable column values gracefully"
    description: "Functions that parse database types should return null for null inputs instead of crashing"
    reference: "if (time === null) return null added to normalize_timestamp, normalize_timestamptz, normalize_timez, normalize_money, normalizeByteaArray, and convertBytes functions"

  - source: "packages/adapter-ppg/src/conversion.ts"
    rule: "Update function signatures to accept null for nullable column types"
    description: "Type signatures should include | null for columns that can contain null values"
    reference: "Function signatures updated to accept string | null and return string | null or Buffer | null for nullable types"