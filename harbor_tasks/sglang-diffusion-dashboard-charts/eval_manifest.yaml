version: "2.0"

source:
  repo: "sgl-project/sglang"
  pr: 21653
  base_commit: "9b4dd274787ce4a778b7688c65c33598282a6559"
  merge_commit: "db5d9eb8ce88f917b4ce3cbc91768c0506f6ec65"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "generate_diffusion_dashboard.py must parse without errors"

  - id: yaxis_scales_to_data_range
    type: fail_to_pass
    origin: pr_diff
    description: "Y-axis uses data-range-based limits instead of bottom=0"

  - id: yaxis_scales_high_values
    type: fail_to_pass
    origin: pr_diff
    description: "Y-axis adapts to higher value ranges (90-100), not pinned at 0"

  - id: yaxis_never_negative
    type: pass_to_pass
    origin: pr_diff
    description: "Y-axis bottom stays >= 0 even with low latency values near zero"

  - id: legend_not_upper_right
    type: fail_to_pass
    origin: pr_diff
    description: "Legend moved away from upper-right to reduce data overlap"

  - id: history_window_extended
    type: fail_to_pass
    origin: pr_diff
    description: "MAX_HISTORY_RUNS increased beyond 7 to cover ~2 weeks"

  - id: section_header_reflects_actual_count
    type: fail_to_pass
    origin: pr_diff
    description: "Section header says actual run count, not hardcoded 7"

  - id: dashboard_generates_valid_markdown
    type: pass_to_pass
    origin: pr_diff
    description: "generate_dashboard returns valid markdown with tables and case IDs"

  - id: chart_png_files_generated
    type: pass_to_pass
    origin: pr_diff
    description: "Charts saved to disk as PNG when charts_dir provided"

  - id: multiple_cases_produce_multiple_charts
    type: pass_to_pass
    origin: pr_diff
    description: "Each case gets its own chart file"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "generate_dashboard produces real markdown and charts, not a stub"

  - id: test_repo_black_formatting
    type: pass_to_pass
    origin: repo_tests
    description: "Diffusion script passes Black formatting check"

  - id: test_repo_isort_imports
    type: pass_to_pass
    origin: repo_tests
    description: "Diffusion script passes isort import order check"

  - id: test_repo_script_imports
    type: pass_to_pass
    origin: repo_tests
    description: "Diffusion script imports without errors"

rubric:
  - rule: "New code must match surrounding style (f-strings, type hints, error handling patterns)"
    source:
      path: "python/sglang/multimodal_gen/.claude/CLAUDE.md"
      lines: "1"
      commit: "9b4dd274787ce4a778b7688c65c33598282a6559"
