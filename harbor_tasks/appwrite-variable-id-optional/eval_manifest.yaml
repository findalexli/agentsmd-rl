distractors:
- rule: Action pattern example defines ID parameters with an empty string default
    and no optional flag.
  collision_type: would_cause_bug
  why_distracting: The Action pattern example shows an ID parameter defined as `->param('teamId',
    '', new CustomId(), 'Team ID.')` (which defaults to required with an empty string).
    If the agent strictly copies this pattern for the ID parameter, it will fail to
    make the parameter optional and default to `'unique()'`, leaving the bug unresolved.
  severity: high
  source:
    path: AGENTS.md
    lines: 67-67
hierarchy_analysis: The configuration hierarchy is moderate, with a root `AGENTS.md`
  defining the Action pattern and a module-level `AGENTS.md` defining directory structures.
  The agent must apply the general Action pattern from the root config while explicitly
  deviating from the specific parameter configuration shown in its example.
