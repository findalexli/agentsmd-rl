    lines: 79-96
    commit: 20f80ac067e0042ea05ac9566f0a9ff1624bf3b2
- rule: Optional parameters should have appropriate defaults. For ID fields that should
    be auto-generated, use 'unique()' as the default value.
  source:
    path: AGENTS.md
    lines: 93-96
    commit: 20f80ac067e0042ea05ac9566f0a9ff1624bf3b2
- rule: 'HTTP endpoint files must follow strict naming: only Create.php, Get.php,
