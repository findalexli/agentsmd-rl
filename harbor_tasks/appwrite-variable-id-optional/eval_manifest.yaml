    lines: 30-34
  evidence: The file being modified is `src/Appwrite/Platform/Modules/Project/Http/Project/Variables/Create.php`,
    adhering to the strict naming convention that HTTP endpoint files must be named
    `Create.php`, `Get
  category: naming
- rule: Action pattern (HTTP endpoints) uses a fluent interface in the constructor
    to define HTTP method, path, description, and parameters.
  source:
    path: AGENTS.md
    lines: 48-66
  evidence: The gold solution modifies the `->param()` definition inside the `__construct()`
    method of the `Create` action class, preserving the fluent builder pattern used
    for defining endpoint parameters.
  category: architecture
distractors:
- rule: Action pattern example showing ID parameters as required with an empty string
    default.
  collision_type: would_cause_bug
  why_distracting: The Action pattern example demonstrates an ID parameter defined
    as `->param('teamId', '', new CustomId(), 'Team ID.')`. This uses an empty string
    `''` as the default value and omits the 5th argument (making it required by default).
    If the agent strictly follows this pattern for `variableId`, it will fail to make
    the parameter optional and fail to set the default to `'unique()'`, which is the
    exact fix required for the bug.
  severity: high
  source:
    path: AGENTS.md
    lines: 48-66
hierarchy_analysis: The hierarchy consists of `AGENTS.md` at the root and `src/Appwrite/Platform/AGENTS.md`
  at the module level. Both reinforce the same architectural patterns for HTTP endpoints
  (Action classes, specific file names). The root `AGENTS.md` provides a code example
  for the Action pattern that could be misleading for this specific bug, as the bug
  requires deviating from the standard required ID parameter shown in the example
  to an optional one with a `'unique()'` default.
