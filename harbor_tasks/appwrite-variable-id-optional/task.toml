name = "appwrite-variable-id-optional"
title = "Make variableId optional in createProjectVariable endpoint"
description = """
Fix a bug where creating a global project variable always fails with
"Param 'variableId' is not optional" because the endpoint incorrectly requires
variableId as a mandatory parameter. The Console UI does not send this parameter,
so the request fails. Other similar endpoints (createVariable for Functions and
Sites) generate the ID internally using ID::unique(). This fix makes variableId
optional with a default of 'unique()'.
"""

