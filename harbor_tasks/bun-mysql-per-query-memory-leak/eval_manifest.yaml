rubric:
- rule: 'Decl literals in Zig are recommended. `const decl: Decl = .{ .binding = 0,
    .value = 0 };`'
  source:
    path: src/CLAUDE.md
    lines: '6'
    commit: 9a27ef75697d713dba18b7a9762308197014ecca
- rule: Always use `bun.*` APIs instead of `std.*`
  source:
    path: src/CLAUDE.md
    lines: 17-18
  evidence: The gold solution uses `bun.default_allocator.free(this.params)` and `bun.default_allocator.alloc`
    instead of reaching for `std.heap` allocators.
  category: style
- rule: Decl literals in Zig are recommended.
  source:
    path: src/CLAUDE.md
    lines: 6-7
  evidence: The gold solution uses anonymous struct literals `.{}` to zero-initialize
    `ColumnDefinition41` structs (`col.* = .{};`) in `MySQLConnection.zig`.
  category: style
- rule: Decl literals in Zig are recommended (using `.{ ... }`).
  source:
    path: src/AGENTS.md
    lines: 6-7
  evidence: The gold solution initializes the allocated `ColumnDefinition41` structs
    using the anonymous struct literal `.{}` (`col.* = .{};`) instead of explicitly
    naming the type.
  category: style
- rule: Decl literals in Zig are recommended (e.g., `.{ ... }`).
  source:
    path: src/AGENTS.md
    lines: 6-7
  evidence: The gold solution uses anonymous struct literals `.{}` to zero-initialize
    the `ColumnDefinition41` structs in `MySQLConnection.zig` (`for (statement.columns)
    |*col| col.* = .{};`).
  category: style
distractors:
- rule: Write tests using Bun's Jest-compatible test runner with proper test fixtures
    (Bun.spawn, tempDir).
  collision_type: scope_ambiguity
  why_distracting: The config provides detailed instructions for writing tests using
    Bun.spawn and tempDir. An agent might waste significant effort trying to write
    a reliable memory leak test (e.g., measuring RSS after 5000 queries), which is
    notoriously flaky in CI environments and is omitted from the gold solution.
  severity: medium
  source:
    path: AGENTS.md
    lines: 50-80
- rule: Always use bun.* APIs instead of std.*
  collision_type: scope_ambiguity
  why_distracting: The rule mandates replacing std.* APIs with bun.* APIs. An agent
    might get distracted trying to refactor existing standard library usage in the
    MySQL adapter files instead of focusing strictly on the memory leak fix.
  severity: low
  source:
    path: src/AGENTS.md
    lines: 15-26
hierarchy_analysis: The hierarchy consists of root-level general guidelines (AGENTS.md/CLAUDE.md)
  and src-level Zig-specific guidelines (src/AGENTS.md/src/CLAUDE.md). They are accumulative
  and do not conflict, but neither provides direct guidance for native memory management
  or allocator usage beyond a general preference for bun.* APIs.
