rubric:
- rule: 'Decl literals in Zig are recommended. `const decl: Decl = .{ .binding = 0,
    .value = 0 };`'
  source:
    path: src/CLAUDE.md
    lines: '6'
    commit: 9a27ef75697d713dba18b7a9762308197014ecca
- rule: Always use `bun.*` APIs instead of `std.*`
  source:
    path: src/CLAUDE.md
    lines: 17-18
  evidence: The gold solution uses `bun.default_allocator.free(this.params)` and `bun.default_allocator.alloc`
    instead of reaching for `std.heap` allocators.
  category: style
- rule: Decl literals in Zig are recommended.
  source:
    path: src/CLAUDE.md
    lines: 6-7
  evidence: The gold solution uses anonymous struct literals `.{}` to zero-initialize
    `ColumnDefinition41` structs (`col.* = .{};`) in `MySQLConnection.zig`.
  category: style
distractors:
- rule: Writing Tests and Test Organization
  collision_type: scope_ambiguity
  why_distracting: The config provides extensive instructions on writing and organizing
    tests. However, testing a native Zig memory leak (RSS growth without JS heap growth)
    from JavaScript is highly flaky, complex, and often unreliable in CI. The gold
    solution correctly omits a test, but an agent might waste significant time trying
    to write one.
  severity: high
  source:
    path: CLAUDE.md
    lines: 43-78
hierarchy_analysis: The hierarchy consists of root-level `CLAUDE.md`/`AGENTS.md` focusing
  on build and test instructions, and `src/CLAUDE.md`/`src/AGENTS.md` focusing on
  Zig-specific coding conventions. The root-level testing rules create a strong distraction
  because native memory leaks are exceptionally hard to test reliably in CI, conflicting
  with the general expectation to add tests for bug fixes.
