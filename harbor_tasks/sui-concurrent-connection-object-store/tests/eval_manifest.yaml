rubric:
- rule: ALWAYS run `cargo xclippy` after finishing development to ensure code passes
    all linting checks
  source:
    path: CLAUDE.md
    lines: '111'
    commit: ffbf699bc89e0d16fbcdefdd9d459b1ca0ddb88a
- rule: NEVER use `#[allow(dead_code)]`, `#[allow(unused)]`, or any other linting
    suppressions - fix the underlying issues instead
  source:
    path: CLAUDE.md
    lines: '113'
    commit: ffbf699bc89e0d16fbcdefdd9d459b1ca0ddb88a
- rule: All unit tests must work properly - use `#[tokio::test]` for async tests,
    not `#[test]`
  source:
    path: CLAUDE.md
    lines: '114'
    commit: ffbf699bc89e0d16fbcdefdd9d459b1ca0ddb88a
- rule: Do NOT comment the obvious - comments should not simply repeat what the code
    does. Comment non-obvious algorithms, business logic, temporary exclusions, complex
    calculations, and subtle race conditions. Do NOT comment simple variable assignments,
    standard library usage, or basic control flow.
  source:
    path: CLAUDE.md
    lines: 116-131
    commit: ffbf699bc89e0d16fbcdefdd9d459b1ca0ddb88a
distractors:
- rule: 'All new files must start with the following license in comments at the top
    of the file: Copyright (c) Mysten Labs, Inc. SPDX-License-Identifier: Apache-2.0'
  collision_type: scope_ambiguity
  why_distracting: The instruction mandates a specific license header for 'All new
    files'. An agent might decide to extract the new `ObjectStoreWatermark` and `LegacyObjectStoreWatermark`
    structs into a new file (e.g., `watermark.rs`) to follow modularity practices
    and apply this license, whereas the gold solution simply appends them to the existing
    `lib.rs`.
  severity: low
  source:
    path: CLAUDE.md
    lines: 18-21
hierarchy_analysis: The configuration consists of generic repository guidelines at
  the root level (`CLAUDE.md` and `AGENTS.md`). No crate-specific configuration files
  are provided to override or extend these defaults.
