rubric:
- rule: ALWAYS run `cargo xclippy` after finishing development to ensure code passes
    all linting checks
  source:
    path: CLAUDE.md
    lines: '111'
    commit: ffbf699bc89e0d16fbcdefdd9d459b1ca0ddb88a
- rule: NEVER use `#[allow(dead_code)]`, `#[allow(unused)]`, or any other linting
    suppressions - fix the underlying issues instead
  source:
    path: CLAUDE.md
    lines: '113'
    commit: ffbf699bc89e0d16fbcdefdd9d459b1ca0ddb88a
- rule: All unit tests must work properly - use `#[tokio::test]` for async tests,
    not `#[test]`
  source:
    path: CLAUDE.md
    lines: '114'
    commit: ffbf699bc89e0d16fbcdefdd9d459b1ca0ddb88a
- rule: Do NOT comment the obvious - comments should not simply repeat what the code
    does. Comment non-obvious algorithms, business logic, temporary exclusions, complex
    calculations, and subtle race conditions. Do NOT comment simple variable assignments,
    standard library usage, or basic control flow.
  source:
    path: CLAUDE.md
    lines: 116-131
    commit: ffbf699bc89e0d16fbcdefdd9d459b1ca0ddb88a
distractors:
- rule: 'Storage Layer: Uses RocksDB for persistent storage'
  collision_type: architecture_boundary
  why_distracting: The config states that the storage layer 'Uses RocksDB for persistent
    storage'. An agent might read this and attempt to implement the watermark storage
    using RocksDB or look for a RocksDB connection. However, this specific crate (`sui-indexer-alt-object-store`)
    is designed to interact with cloud object stores (like S3/GCS) via the `object_store`
    crate, and watermarks must be stored as JSON objects/files in the object store
    itself.
  severity: high
  source:
    path: CLAUDE.md
    lines: 76-79
- rule: All new files must start with the following license in comments at the top
    of the file
  collision_type: scope_ambiguity
  why_distracting: The agent might decide to extract the new `ObjectStoreWatermark`
    and `LegacyObjectStoreWatermark` structs into a new file (e.g., `watermark.rs`)
    to keep `lib.rs` clean, and subsequently apply the required license header. However,
    the gold solution keeps these structs inline within `lib.rs`, making a new file
    unnecessary and out of scope for this specific fix.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 15-18
- rule: simtests must be run with `cargo simtest` to avoid false negatives... skip
    simulation tests as they may cause false negatives with `cargo nextest`
  collision_type: meta_confusion
  why_distracting: The agent might try to run standard `cargo test` to verify its
    implementation of the watermark methods, which could lead to false negatives or
    hangs due to simulation tests. The agent must use the specific `SUI_SKIP_SIMTESTS=1
    cargo nextest run` or `cargo simtest` commands as instructed.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 28-33
hierarchy_analysis: The root `CLAUDE.md` provides general architectural guidelines
  (such as using RocksDB for storage) that apply primarily to the core validator node
  (`sui-core`). These guidelines conflict with the specific purpose of the `sui-indexer-alt-object-store`
  crate, which is designed to use cloud object storage. The agent must recognize that
  the indexer's object store implementation operates under different architectural
  constraints than the core node.
version: '2.0'
