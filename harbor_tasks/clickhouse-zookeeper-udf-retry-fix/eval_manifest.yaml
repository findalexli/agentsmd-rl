source_pr:
  owner: ClickHouse
  repo: ClickHouse
  number: 102171
  title: "Cherry pick #102059 to 26.2: Fix crash caused by stale ZooKeeper session in UDF retry loop"
  merge_commit: 23c8e6b613f72896b0f092f6df38188c9b9852ee
  base_commit: a3c77899d3f826cfdc879ce9c276dd5f019cb46d

files:
  primary:
    - src/Functions/UserDefined/UserDefinedSQLObjectsZooKeeperStorage.cpp

agent_config:
  sources:
    - path: .claude/CLAUDE.md
      commit: a3c77899d3f826cfdc879ce9c276dd5f019cb46d
      applies: true
    - path: .github/copilot-instructions.md
      commit: a3c77899d3f826cfdc879ce9c276dd5f019cb46d
      applies: true

  # Relevant rules from agent configs
  checks:
    - id: "code_style"
      description: "C++ code uses Allman-style braces (opening brace on new line)"
      origin: "agent_config"
      source: ".github/copilot-instructions.md"
      severity: "major"

    - id: "lifetime_safety"
      description: "Proper handling of object lifetimes and session management"
      origin: "agent_config"
      source: ".github/copilot-instructions.md"
      severity: "blocker"

    - id: "error_handling"
      description: "Error handling paths and exception safety in retry logic"
      origin: "agent_config"
      source: ".github/copilot-instructions.md"
      severity: "major"

    - id: "concurrency_safety"
      description: "Safe handling of ZooKeeper sessions in retry loop context"
      origin: "agent_config"
      source: ".github/copilot-instructions.md"
      severity: "blocker"

test_strategy:
  description: |
    Tests verify the structural correctness of the fix using code analysis.
    The fix ensures that when ZooKeeper operations are retried, a fresh session
    is obtained and object names are re-fetched with the new session.

checks:
  # ============================================================================
  # FAIL-TO-PASS TESTS (Structural verification of the fix)
  # ============================================================================
  - id: "test_current_zookeeper_variable"
    test: "test_current_zookeeper_variable_exists"
    description: "current_zookeeper variable is declared and used instead of the parameter"
    type: "structural"

  - id: "test_session_renewal"
    test: "test_session_renewal_on_retry"
    description: "Fresh ZooKeeper session is obtained when retrying"
    type: "structural"

  - id: "test_object_names_in_loop"
    test: "test_object_names_inside_retry_loop"
    description: "Object names are fetched inside the retry loop, not before"
    type: "structural"

  - id: "test_no_prefetch"
    test: "test_no_object_names_before_retry_loop"
    description: "Object names are not fetched before the retry loop (the bug)"
    type: "structural"

  - id: "test_comment_explains"
    test: "test_updated_comment_explains_fix"
    description: "Code comments explain the session renewal behavior"
    type: "documentation"

  - id: "test_distinctive_line"
    test: "test_distinctive_line_pattern"
    description: "Key distinctive fix lines are present"
    type: "structural"

  # ============================================================================
  # PASS-TO-PASS TESTS (Repo CI/CD checks using subprocess.run)
  # These run actual ClickHouse CI style check commands
  # ============================================================================
  - id: "test_repo_cpp_style_no_tabs"
    test: "test_repo_cpp_style_no_tabs"
    description: "Repo C++ files have no tabs (ClickHouse CI style check)"
    type: "pass_to_pass"
    origin: "repo_tests"

  - id: "test_repo_cpp_style_no_dos_newlines"
    test: "test_repo_cpp_style_no_dos_newlines"
    description: "Repo C++ files have no DOS newlines (ClickHouse CI style check)"
    type: "pass_to_pass"
    origin: "repo_tests"

  - id: "test_repo_no_conflict_markers"
    test: "test_repo_no_conflict_markers"
    description: "Repo files have no git conflict markers (ClickHouse CI check)"
    type: "pass_to_pass"
    origin: "repo_tests"

  - id: "test_repo_no_utf8_bom"
    test: "test_repo_no_utf8_bom"
    description: "Repo files have no UTF-8 BOM (ClickHouse CI check)"
    type: "pass_to_pass"
    origin: "repo_tests"

  - id: "test_repo_no_trailing_whitespace"
    test: "test_repo_no_trailing_whitespace"
    description: "Repo C++ files have no trailing whitespace (ClickHouse CI style check)"
    type: "pass_to_pass"
    origin: "repo_tests"

  - id: "test_repo_target_file_exists"
    test: "test_repo_target_file_exists"
    description: "Target file exists and is readable"
    type: "pass_to_pass"
    origin: "repo_tests"

  - id: "test_repo_git_track_branch"
    test: "test_repo_git_track_branch"
    description: "Repo is on correct base commit"
    type: "pass_to_pass"
    origin: "repo_tests"

  - id: "test_repo_no_executable_source_files"
    test: "test_repo_no_executable_source_files"
    description: "Repo source files are not executable (ClickHouse CI check)"
    type: "pass_to_pass"
    origin: "repo_tests"

rubric:
  - rule: "When writing text such as documentation, comments, or commit messages, write names of functions and methods as `f` instead of `f()` - we prefer it for mathematical purity when it refers a function itself rather than its application."
    source:
      path: ".claude/CLAUDE.md"
      lines: "5"
      commit: "a3c77899d3f826cfdc879ce9c276dd5f019cb46d"

  - rule: "When mentioning logical errors, say 'exception' instead of 'crash', because they don't crash the server in the release build."
    source:
      path: ".claude/CLAUDE.md"
      lines: "7"
      commit: "a3c77899d3f826cfdc879ce9c276dd5f019cb46d"

  - rule: "Comments should explain invariants and complex logic, not narrate what the code does. Complex retry logic and session management should have clear comments that future maintainers must understand."
    source:
      path: ".github/copilot-instructions.md"
      lines: "148"
      commit: "a3c77899d3f826cfdc879ce9c276dd5f019cb46d"
