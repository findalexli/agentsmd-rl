    in `server.ts` by chaining `.catch(() => null)` instead of wrapping the import
    in a `try/catch` block.
  category: style
distractors:
- rule: Use single word names by default for new locals, params, and helper functions
  collision_type: rule_conflict
  why_distracting: The PR introduces specific concepts like 'embedded web UI' and
    'skip embed web UI'. Forcing single-word names like `skip`, `bundle`, `map`, or
    `promise` would make the build script and server logic highly ambiguous and unreadable,
    despite the rule being marked as mandatory.
  severity: high
  source:
    path: AGENTS.md
    lines: 23-30
- rule: Prefer Effect services (FileSystem, ChildProcessSpawner) over platform APIs
  collision_type: architecture_boundary
  why_distracting: The agent might attempt to use Effect's `FileSystem` or `ChildProcessSpawner`
    to run the build command or scan files. However, `build.ts` is a standard Bun
    script using `$` and `Bun.Glob`, and the PR does not involve migrating these files
    to Effect. Using Effect here would be an unnecessary architectural shift.
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: 38-42
- rule: Keep things in one function unless composable or reusable
  collision_type: scope_ambiguity
  why_distracting: The `createEmbeddedWebUIBundle` function in `build.ts` is only
    used once. An agent strictly following this rule might inline the entire 15-line
    bundle generation logic directly into the `embeddedFileMap` ternary or top-level
    script, severely degrading readability.
  severity: medium
  source:
    path: AGENTS.md
    lines: 9-10
hierarchy_analysis: The root `AGENTS.md` provides general TypeScript/Bun guidelines
  (naming, const, ternaries, Bun APIs), which are highly applicable to this PR. The
  `packages/opencode/AGENTS.md` provides Effect-specific rules. Since the files being
  edited (`build.ts`, `server.ts`) are not currently effectified in the scope of this
  PR's changes, the Effect rules in the child config act as a trap/distractor. The
  agent must recognize the architectural boundary and stick to the root config's Bun
  API recommendations instead of the child config's Effect recommendations.
