source:
  repo: apache/airflow
  pr_number: 64737
  base_commit: 7346de5eb65ca9ba66e7d9c5b2ad9413f6b6a2c2
  merge_commit: 87d35caaf993d60b86f483f216b74638c9e70ec3
  title: "Fix duplicate deadline callbacks with HA scheduler replicas"

checks:
  - id: test_scheduler_file_syntax
    type: pass_to_pass
    origin: verification
    description: Scheduler module has valid Python syntax

  - id: test_deadline_query_uses_row_locks
    type: fail_to_pass
    origin: behavioral
    description: Deadline query is wrapped with with_row_locks to prevent concurrent processing

  - id: test_deadline_row_locks_skip_locked
    type: fail_to_pass
    origin: behavioral
    description: with_row_locks uses skip_locked=True for SKIP LOCKED behavior

  - id: test_deadline_row_locks_key_share_false
    type: fail_to_pass
    origin: behavioral
    description: with_row_locks uses key_share=False to use exclusive locks

  - id: test_deadline_row_locks_specifies_model
    type: fail_to_pass
    origin: behavioral
    description: with_row_locks specifies of=Deadline for explicit row targeting

  - id: test_deadline_query_extracted_to_variable
    type: fail_to_pass
    origin: behavioral
    description: Deadline query is extracted into a variable for clarity

  - id: test_deadline_code_has_explanatory_comment
    type: fail_to_pass
    origin: behavioral
    description: Code includes comment explaining the locking purpose

  - id: test_deadline_session_passed_to_row_locks
    type: fail_to_pass
    origin: behavioral
    description: with_row_locks receives session parameter for dialect detection

  - id: test_deadline_query_not_inline
    type: fail_to_pass
    origin: behavioral
    description: Deadline query is not inline in session.scalars (must use row locks)

  - id: test_repo_ruff_lint_scheduler
    type: pass_to_pass
    origin: repo_tests
    description: Repo's ruff linter passes on scheduler_job_runner.py

  - id: test_repo_ruff_lint_sqlalchemy_utils
    type: pass_to_pass
    origin: repo_tests
    description: Repo's ruff linter passes on utils/sqlalchemy.py (with_row_locks source)

  - id: test_repo_ruff_lint_jobs_module
    type: pass_to_pass
    origin: repo_tests
    description: Repo's ruff linter passes on entire jobs module

  - id: test_no_assert_in_deadline_fix
    type: pass_to_pass
    origin: convention
    description: The deadline fix does not introduce assert statements

  - id: test_no_session_commit_in_deadline_fix
    type: pass_to_pass
    origin: convention
    description: The deadline fix does not call session.commit()

# rubric: This is a code-only fix (no config/documentation file edits). The original PR
# (apache/airflow#64737) only modified scheduler_job_runner.py and test_scheduler_job.py.
