distractors:
- rule: If no valid issue number is provided, find the best existing file to modify
    instead, such as; test/js/web/ - Web API tests
  collision_type: scope_ambiguity
  why_distracting: The testing guidelines suggest adding tests for Web APIs in test/js/web/.
