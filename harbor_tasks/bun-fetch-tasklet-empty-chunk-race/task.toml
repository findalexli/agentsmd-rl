version = "1.0"

[metadata]
author_name = "Alex Li"
author_email = "alex@example.com"
difficulty = "hard"  # Race condition in Zig core, requires understanding concurrency
category = "bugfix"
tags = ["bun", "zig", "fetch", "streams", "race-condition", "http"]
expert_time_estimate_min = 45.0
junior_time_estimate_min = 120.0

[verifier]
env = { LLM_JUDGE = "${LLM_JUDGE:-0}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}", GEMINI_API_KEY = "${GEMINI_API_KEY:-}" }
timeout_sec = 180.0  # Need time for zig fmt check and bun stream test

[agent]
timeout_sec = 3600.0  # Building Bun takes time

[environment]
build_timeout_sec = 1800.0  # 30 min for potential build
cpus = 4
memory_mb = 8192
storage_mb = 20480
allow_internet = false
