    agent to investigate or modify the backend V1 application server instead of restricting
    changes to the frontend.
  severity: medium
  source:
    path: AGENTS.md
    lines: 62-64
- rule: Store design documents and temporary artifacts in a .pr/ directory.
  collision_type: scope_ambiguity
  why_distracting: The agent might create a .pr/ directory to document its design
    for the new slash command, wasting time on temporary artifacts for a simple feature.
  severity: low
  source:
    path: AGENTS.md
    lines: 35-37
- rule: Use cross-repo-testing skill for testing features that span SDK and OpenHands
    server repos.
  source:
    path: .agents/skills/cross-repo-testing/SKILL.md
    lines: 1-5
  collision_type: scope_ambiguity
  why_distracting: The agent might think adding a new command requires cross-repo
    testing since it interacts with the backend, but this is purely a frontend UI
    change.
  severity: low
