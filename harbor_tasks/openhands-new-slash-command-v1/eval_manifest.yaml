distractors:
- rule: When working on a PR that requires design documents, scripts meant for development-only,
    or other temporary artifacts that should NOT be merged to main, store them in
    a `.pr/` directory at the repository root.
  collision_type: scope_ambiguity
  why_distracting: The agent might create a `.pr/` directory to document its plan
    for adding the `/new` command, but this is a straightforward UI/hook change that
    doesn't need temporary artifacts or design docs.
  severity: medium
  source:
    path: AGENTS.md
    lines: 34-34
- rule: 'To run the full application to debug issues: export INSTALL_DOCKER=0 ...
    make build && make run ...'
  collision_type: scope_ambiguity
  why_distracting: The agent might try to start the full application using `make build
    && make run` to manually test the `/new` command in the UI, but the instructions
    specify to verify via unit tests (`npm run test`). Starting the full app is unnecessary
    and time-consuming.
  severity: medium
  source:
    path: AGENTS.md
    lines: 9-13
hierarchy_analysis: The repository has a single root-level `AGENTS.md` file containing
