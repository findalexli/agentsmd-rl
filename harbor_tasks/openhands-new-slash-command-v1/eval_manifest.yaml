rubric:
- rule: Use TanStack Query (React Query) for data fetching and cache management. Data
    Access Layer API client methods in frontend/src/api must never be called directly
    from UI components - always wrap with TanStack Query hooks in frontend/src/hooks/query/.
  source:
    path: AGENTS.md
    lines: 117-122
    commit: c7190ddb308de5a8c00b790049c5027d122159f7
- rule: Query hooks should follow the pattern use[Resource] (e.g., useConversationSkills)
    and must be placed in frontend/src/hooks/query/.
  source:
    path: AGENTS.md
    lines: 119-120
    commit: c7190ddb308de5a8c00b790049c5027d122159f7
- rule: 'Follow the existing hook patterns when adding new TanStack Query hooks: use
    the useQuery pattern with proper typing and consistent naming conventions.'
  source:
    path: AGENTS.md
    lines: 117-122
    commit: c7190ddb308de5a8c00b790049c5027d122159f7
- rule: Frontend changes must pass linting. Run npm run lint:fix and npm run build
    in the frontend directory before submitting.
  source:
    path: AGENTS.md
    lines: 42-44
    commit: c7190ddb308de5a8c00b790049c5027d122159f7
- rule: If you've made changes to the frontend, you should run `cd frontend && npm
    run lint:fix && npm run build ; cd ..`
  source:
    path: AGENTS.md
    lines: 21-21
  evidence: The gold solution modifies frontend files (`frontend/src/hooks/chat/use-slash-command.ts`
    and `frontend/src/utils/constants.ts`), which triggers the rule to run frontend
    linting and building.
  category: tooling
- rule: Before pushing any changes, you MUST ensure that any lint errors or simple
    test errors have been fixed.
  source:
    path: AGENTS.md
    lines: 18-18
  evidence: The gold solution includes a comprehensive test file `frontend/__tests__/hooks/chat/use-slash-command.test.ts`
    to verify the new `/new` command logic, ensuring tests pass before pushing.
  category: testing
