name = "openhands-new-slash-command-v1"
description = "Add /new to the slash command menu for V1 conversations in OpenHands frontend"
category = "frontend"
difficulty = "easy"
tags = ["react", "typescript", "vitest", "frontend", "ui"]

[estimated_time]
min_minutes = 20
max_minutes = 45

[agents.baseline]
model = "claude-opus-4-6"
max_iterations = 20

[agents.budget]
model = "claude-haiku-4-5"
max_iterations = 40

[agents.hybrid]
model = "claude-opus-4-6"
max_iterations = 15
routing_threshold = 0.7

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
