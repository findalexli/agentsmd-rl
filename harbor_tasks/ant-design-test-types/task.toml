name = "ant-design-test-types"
difficulty = "easy"
time_limit_minutes = 15
tags = ["typescript", "testing", "typesafety", "react"]

source_repo = "ant-design/ant-design"
source_base_commit = "227f2ba440c36ccec4afe7487c7b2b946b83de4e"
source_merge_commit = "011bbcc07e7a6d05aae52a7ac0555f5986bf1b48"
source_pr_number = 57543
[description]
short = "Add TypeScript type safety to test utilities"
detailed = """
The ant-design test utilities in tests/setupAfterEnv.ts and tests/shared/focusTest.tsx
use 'any' types which reduces type safety. Add proper TypeScript types by:
1. Creating a SnapshotTarget type for DOM elements in setupAfterEnv.ts
2. Creating a FocusableRef type for focusable component refs in focusTest.tsx
3. Replacing all 'any' type annotations with proper types
4. Adding proper generic type parameters to querySelector calls
"""

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
