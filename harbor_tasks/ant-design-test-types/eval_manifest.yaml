source:
  repo: "ant-design/ant-design"
  pr_number: 57543
  base_commit: "227f2ba440c36ccec4afe7487c7b2b946b83de4e"
  merge_commit: "011bbcc07e7a6d05aae52a7ac0555f5986bf1b48"
  task_name: "ant-design-test-types"
  description: "Add TypeScript type safety to test utilities by replacing 'any' types with proper type definitions"

checks:
  # Fail-to-pass tests for setupAfterEnv.ts changes
  - id: test_snapshot_target_type_exists
    type: fail_to_pass
    origin: agent_config
    source: "CLAUDE.md (TypeScript Requirements: Never use 'any' type - define precise types instead)"
    description: "SnapshotTarget type must be defined with proper union type"

  - id: test_format_html_uses_proper_types
    type: fail_to_pass
    origin: agent_config
    source: "CLAUDE.md (TypeScript Requirements: Never use 'any' type - define precise types instead)"
    description: "formatHTML function must use SnapshotTarget type instead of any"

  - id: test_print_uses_type_assertion
    type: fail_to_pass
    origin: agent_config
    source: "CLAUDE.md (TypeScript Requirements: Define precise types)"
    description: "print functions must use SnapshotTarget type assertion"

  # Fail-to-pass tests for focusTest.tsx changes
  - id: test_focusable_ref_type_exists
    type: fail_to_pass
    origin: agent_config
    source: "CLAUDE.md (TypeScript Requirements: Component ref types should use proper types)"
    description: "FocusableRef type must be defined with focus/blur methods"

  - id: test_focus_test_ref_uses_proper_type
    type: fail_to_pass
    origin: agent_config
    source: "CLAUDE.md (TypeScript Requirements: Never use 'any' type)"
    description: "React.createRef must use FocusableRef instead of any"

  - id: test_get_element_returns_typed_element
    type: fail_to_pass
    origin: agent_config
    source: "CLAUDE.md (TypeScript Requirements: Use proper generic types)"
    description: "getElement must return HTMLElement and use generic querySelector"

  - id: test_fire_event_calls_without_nonnull_assertion
    type: fail_to_pass
    origin: agent_config
    source: "CLAUDE.md (TypeScript Requirements: Use precise types)"
    description: "fireEvent calls should not need non-null assertion after proper typing"

  # Pass-to-pass tests (repo CI/CD)
  - id: test_typescript_compiles
    type: pass_to_pass
    origin: repo_tests
    description: "TypeScript compilation passes (tsc --noEmit)"

  - id: test_focus_test_runs
    type: pass_to_pass
    origin: repo_tests
    description: "Jest tests for focus utilities pass"

  - id: test_lint_passes
    type: pass_to_pass
    origin: repo_tests
    description: "ESLint passes without @typescript-eslint/no-explicit-any errors"

  - id: test_lint_biome_passes
    type: pass_to_pass
    origin: repo_tests
    description: "Biome lint passes (npm run lint:biome)"

  - id: test_full_lint_suite_passes
    type: pass_to_pass
    origin: repo_tests
    description: "Full lint suite passes (npm run lint - version, tsc, eslint, biome, md, changelog)"

  # New pass-to-pass tests for repo CI/CD commands
  - id: test_repo_tsc_lint_passes
    type: pass_to_pass
    origin: repo_tests
    description: "Repo CI TypeScript check passes (npm run tsc)"

  - id: test_repo_lint_script_passes
    type: pass_to_pass
    origin: repo_tests
    description: "Repo CI ESLint check passes on test files (npm run lint:script equivalent)"

  - id: test_repo_biome_lint_passes
    type: pass_to_pass
    origin: repo_tests
    description: "Repo CI Biome lint check passes (npm run lint:biome)"

  - id: test_repo_test_node_passes
    type: pass_to_pass
    origin: repo_tests
    description: "Repo CI Node.js tests pass for relevant subset (npm run test:node equivalent)"

# Config edits for Track 2 evaluation (code changes, not config files)
config_edits:
  - path: "tests/setupAfterEnv.ts"
    tier: 1
    gold_added: "type SnapshotTarget = HTMLElement | DocumentFragment | HTMLCollection | NodeList | Node[]; function formatHTML(nodes: SnapshotTarget); let cloneNodes: Node | Node[]; as HTMLElement"
    gold_removed: "function formatHTML(nodes: any); let cloneNodes: any; as any"

  - path: "tests/shared/focusTest.tsx"
    tier: 1
    gold_added: "type FocusableRef = { focus: () => void; blur: () => void; }; React.createRef<FocusableRef>(); const getElement = (container: HTMLElement): HTMLElement; querySelector<HTMLElement>; expect(element).not.toBeNull()"
    gold_removed: "React.createRef<any>(); getElement(container)!"

# Rubric for soft/subjective requirements from agent configs
rubric:
  - id: no_explicit_any
    text: "Never use 'any' type - define precise types instead in tests/setupAfterEnv.ts"
    source: "tests/setupAfterEnv.ts"

  - id: use_generic_queryselector
    text: "Use generic type parameters for querySelector (e.g., querySelector<HTMLElement>) in tests/shared/focusTest.tsx"
    source: "tests/shared/focusTest.tsx"

  - id: proper_ref_types
    text: "Component ref types should use proper interface types, not 'any' in tests/shared/focusTest.tsx"
    source: "tests/shared/focusTest.tsx"

  - id: type_assertions_proper
    text: "Use proper type assertions (e.g., 'as HTMLElement') instead of 'as any' in tests/setupAfterEnv.ts"
    source: "tests/setupAfterEnv.ts"
