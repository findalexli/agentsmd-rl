config_edits:
- path: tests/setupAfterEnv.ts
  tier: 1
  gold_added: 'type SnapshotTarget = HTMLElement | DocumentFragment | HTMLCollection
    | NodeList | Node[]; function formatHTML(nodes: SnapshotTarget); let cloneNodes:
    Node | Node[]; as HTMLElement'
  gold_removed: 'function formatHTML(nodes: any); let cloneNodes: any; as any'
- path: tests/shared/focusTest.tsx
  tier: 1
  gold_added: 'type FocusableRef = { focus: () => void; blur: () => void; }; React.createRef<FocusableRef>();
    const getElement = (container: HTMLElement): HTMLElement; querySelector<HTMLElement>;
    expect(element).not.toBeNull()'
  gold_removed: React.createRef<any>(); getElement(container)!
rubric:
- rule: 使用 TypeScript 和 React 开发 (Develop using TypeScript and React)
  source:
    path: CLAUDE.md
    lines: 7-8
  evidence: The gold solution defines explicit TypeScript types (`SnapshotTarget`,
    `FocusableRef`) and uses generics (`querySelector<HTMLElement>`) to replace `any`
    types, aligning with the project's core TypeScr
  category: style
distractors:
- rule: 忽略用户无感知的改动（内部重构、纯测试更新、工具链优化等） (Ignore changes imperceptible to users like
    pure test updates)
  collision_type: meta_confusion
  why_distracting: The agent might try to document this TypeScript fix in the Changelog
    since it's a codebase improvement. However, the rule explicitly states to ignore
    '纯测试更新' (pure test updates) and '内部重构' (internal refactoring). Adding a changelog
    entry for test utility type fixes would violate this rule.
  severity: high
  source:
    path: CLAUDE.md
    lines: 111-114
- rule: Test 导入规范 - 本规范适用于 components/**/__tests__/ 下的测试文件 (Test import rules apply
    to components/**/__tests__/)
  collision_type: scope_ambiguity
  why_distracting: The agent might see it is editing files in the `tests/` directory
    and try to apply the 'Test 导入规范' (Test import rules) to refactor existing imports.
    However, the rule explicitly states it only applies to `components/**/__tests__/`.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 40-45
hierarchy_analysis: 'CLAUDE.md and AGENTS.md are identical and provide project-wide
  guidelines. The rules focus heavily on PRs, Changelogs, and Imports. For this specific
  task, the most critical interaction with the config is negative: the agent must
  recognize that test utility updates fall under the ''ignored'' category for Changelogs
  and that root `tests/` files are exempt from component test import rules.'
version: '2.0'
