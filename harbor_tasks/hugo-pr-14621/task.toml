name = "hugo-css-loader-resolution"
title = "Hugo CSS loader resolution fix"
description = """
Fix CSS bundling so that url() references to static files behave consistently
whether resolved by Hugo or ESBuild's native resolver. Before this fix,
ESBuild-fallback paths would not get file loader treatment for static assets
like images and fonts.
"""

# Task metadata
difficulty = "medium"
tags = ["go", "hugo", "css", "esbuild", "bundling"]

# Time estimates (in minutes)
estimated_time = {understand = 15, implement = 20, validate = 10}

# Source information
source = "gohugoio/hugo"
source_pr_number = 14621
source_merge_commit = "a7cbcf15f0c5ef04b45350390e00e584e4d635b9"
source_base_commit = "59e0446fe5c7cb8080a3f0736c4453110b89f732"

# Files that are modified by this task
modified_files = [
    "internal/js/esbuild/options.go",
    "internal/js/esbuild/resolve.go",
    "tpl/css/build_integration_test.go"
]

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
