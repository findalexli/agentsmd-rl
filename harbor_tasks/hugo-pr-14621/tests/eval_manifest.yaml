source_pr:
  owner: gohugoio
  repo: hugo
  number: 14621
  merge_commit: a7cbcf15f0c5ef04b45350390e00e584e4d635b9
  base_commit: 59e0446fe5c7cb8080a3f0736c4453110b89f732

task:
  name: hugo-css-loader-resolution
  title: "Hugo CSS loader resolution fix"
  description: |
    Fix CSS bundling so that url() references to static files behave
    consistently whether resolved by Hugo or ESBuild's native resolver.
    Before this fix, ESBuild-fallback paths would not get file loader
    treatment for static assets.

files:
  primary:
    - internal/js/esbuild/options.go
    - internal/js/esbuild/resolve.go
    - tpl/css/build_integration_test.go

# Test checks - one per test function in test_outputs.py
checks:
  # Fail-to-pass: These test the actual fix behavior
  - id: test_css_loader_extension_constant_exists
    type: fail_to_pass
    origin: behavior
    description: "defaultCSSFileLoaderExts constant exists with expected extensions"

  - id: test_css_loader_default_in_options
    type: fail_to_pass
    origin: behavior
    description: "CSS builds get default file loaders for static assets"

  - id: test_loader_from_filename_returns_default
    type: fail_to_pass
    origin: behavior
    description: "loaderFromFilename returns LoaderDefault for unknown extensions"

  - id: test_no_regression_in_loaderFromFilename
    type: fail_to_pass
    origin: behavior
    description: "Old unconditional LoaderFile return is removed"

  - id: test_repo_css_integration_test
    type: fail_to_pass
    origin: behavior
    description: "Hugo's TestCSSBuildLoadersDefault integration test passes"

  # Pass-to-pass: These verify repo health
  - id: test_esbuild_package_compiles
    type: pass_to_pass
    origin: repo_tests
    description: "esbuild package compiles without errors"

  - id: test_css_package_compiles
    type: pass_to_pass
    origin: repo_tests
    description: "CSS package compiles without errors"

  - id: test_go_vet
    type: pass_to_pass
    origin: repo_tests
    description: "go vet passes on modified packages"

  - id: test_repo_esbuild_resolve
    type: pass_to_pass
    origin: repo_tests
    description: "Hugo's TestResolveComponentInAssets esbuild test passes"

  - id: test_repo_esbuild_build_options
    type: pass_to_pass
    origin: repo_tests
    description: "Hugo's TestToBuildOptions esbuild test passes"

  - id: test_repo_css_build
    type: pass_to_pass
    origin: repo_tests
    description: "Hugo's TestCSSBuild test passes"

  - id: test_repo_go_fmt
    type: pass_to_pass
    origin: repo_tests
    description: "gofmt passes on modified packages"

# Agent config rules (from AGENTS.md) - soft/subjective guidelines
rubric:
  - rule: "Use self-explanatory variable and function names (Go experts assumed)"
    source: "AGENTS.md"
    applies_to: ["internal/js/esbuild/options.go", "internal/js/esbuild/resolve.go"]

  - rule: "Use short variable names when context is clear (Go idiomatic)"
    source: "AGENTS.md"
    applies_to: ["internal/js/esbuild/options.go", "internal/js/esbuild/resolve.go"]

  - rule: "Never export symbols that are not needed outside the package"
    source: "AGENTS.md"
    applies_to: ["internal/js/esbuild/options.go", "internal/js/esbuild/resolve.go"]

  - rule: "Avoid global state at (almost) all cost"
    source: "AGENTS.md"
    applies_to: ["internal/js/esbuild/options.go", "internal/js/esbuild/resolve.go"]

  - rule: "In tests, use qt matchers instead of raw if/t.Fatal checks"
    source: "AGENTS.md"
    applies_to: ["tpl/css/build_integration_test.go"]

  - rule: "Brevity is good - applies to code, comments, and commit messages"
    source: "AGENTS.md"
    applies_to: ["internal/js/esbuild/options.go", "internal/js/esbuild/resolve.go", "tpl/css/build_integration_test.go"]

  - rule: "Assume maintainers are Go experts - don't comment the obvious"
    source: "AGENTS.md"
    applies_to: ["internal/js/esbuild/options.go", "internal/js/esbuild/resolve.go"]
