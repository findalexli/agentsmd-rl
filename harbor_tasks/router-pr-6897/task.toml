[task]
name = "router-improve-release-changelog"
description = "Improve GitHub release changelog to use changeset-generated CHANGELOG.md files instead of parsing git commits, only include actually bumped packages, and add author attribution"
difficulty = "medium"
tags = ["javascript", "nodejs", "release-automation", "changelog", "monorepo"]

[task.time_estimates]
human_minutes = 45
agent_minutes = 30

[task.source]
type = "github_pr"
repo = "TanStack/router"
pr_number = 6897
base_commit = "3a2d74227f878ffd904b980c47341b4a901125f3"
merge_commit = "bb291c68aaf63cd57406f14d382abc4d1c5456f3"

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
