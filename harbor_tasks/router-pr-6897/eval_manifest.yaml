source:
  repo: TanStack/router
  pr_number: 6897
  base_commit: 3a2d74227f878ffd904b980c47341b4a901125f3
  merge_commit: bb291c68aaf63cd57406f14d382abc4d1c5456f3
  title: "improve github release changelog"

checks:
  # Fail-to-pass tests - must fail on base commit, pass after fix
  - id: test_resolve_author_for_commit_function_exists
    type: fail_to_pass
    origin: pr_diff
    description: New resolveAuthorForCommit function must be added

  - id: test_append_authors_function_exists
    type: fail_to_pass
    origin: pr_diff
    description: New appendAuthors function must be added

  - id: test_reads_changelog_files
    type: fail_to_pass
    origin: pr_diff
    description: Script must read from CHANGELOG.md files

  - id: test_detects_bumped_packages
    type: fail_to_pass
    origin: pr_diff
    description: Script must track bumpedPackages variable

  - id: test_version_comparison_logic
    type: fail_to_pass
    origin: pr_diff
    description: Script must compare package versions between releases

  - id: test_extracts_version_section
    type: fail_to_pass
    origin: pr_diff
    description: Script must extract version-specific changelog sections

  - id: test_empty_changelog_message
    type: fail_to_pass
    origin: pr_diff
    description: Empty changelog message must be 'No changelog entries'

  - id: test_author_cache_variable
    type: fail_to_pass
    origin: pr_diff
    description: Script must have authorCache for caching

  - id: test_commit_hash_regex
    type: fail_to_pass
    origin: pr_diff
    description: Script must parse commit hashes from changelog links

  - id: test_package_header_format
    type: fail_to_pass
    origin: pr_diff
    description: Changelog must use package-based headers (#### pkg.name)

  # Pass-to-pass tests - must pass on both base and fixed versions
  - id: test_script_is_valid_esm
    type: pass_to_pass
    origin: repo_tests
    description: Script must be valid ESM JavaScript (node --check)

  - id: test_script_has_required_imports
    type: pass_to_pass
    origin: static
    description: Script must import required modules

  - id: test_script_uses_gh_token
    type: pass_to_pass
    origin: static
    description: Script must reference GitHub token

  - id: test_resolve_username_function_exists
    type: pass_to_pass
    origin: static
    description: resolveUsername helper must exist

  - id: test_creates_github_release
    type: pass_to_pass
    origin: static
    description: Script must have release creation logic

  - id: test_eslint_passes
    type: pass_to_pass
    origin: repo_tests
    description: Script must pass ESLint checks (npx eslint)

  - id: test_repo_prettier_format
    type: pass_to_pass
    origin: repo_tests
    description: Script must pass Prettier format checks (npx prettier --check)

rubric:
  - id: code_only_change
    description: "This is a code-only change to scripts/create-github-release.mjs - no documentation or config file updates are required. The code changes are verified by ESLint and Prettier tests."
    reference: "No config file changes expected - this PR modifies only scripts/create-github-release.mjs"
    weight: 1
