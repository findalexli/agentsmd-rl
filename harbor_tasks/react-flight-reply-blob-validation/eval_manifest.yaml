rubric:
- rule: Per `.claude/skills/fix/SKILL.md` and `.claude/skills/verify/SKILL.md`, changed files must pass `yarn linc` (and ideally `yarn prettier`). Lint failures block CI in the React repo.
  source:
    path: .claude/skills/fix/SKILL.md
    lines: 10-11
    commit: c80a07509582daadf275f36ffe7a88c3b12e9db4
  evidence: Gold patch passes yarn linc on the changed source files.
  category: testing
  verification: programmatic
- rule: Per `.claude/skills/extract-errors/SKILL.md`, every new user-visible `new Error('...')` message in production code must be registered in `scripts/error-codes/codes.json` with a fresh numeric id, so that production builds can minify the message while preserving the lookup. Run `yarn extract-errors` and ensure no "unknown error code" warnings remain.
  source:
    path: .claude/skills/extract-errors/SKILL.md
    lines: 10-12
    commit: c80a07509582daadf275f36ffe7a88c3b12e9db4
  evidence: Gold patch registers error code 582 in scripts/error-codes/codes.json.
  category: style
  verification: programmatic
- rule: The fix should be a focused validation in the 'B' branch of the Flight Reply decoder and must not weaken or alter unrelated decoding paths (string, BigInt, ReadableStream, etc.). The React repo's culture (root CLAUDE.md, CONTRIBUTING.md) favours tightly-scoped, behaviour-preserving changes.
  source:
    path: CLAUDE.md
    lines: 1-8
    commit: c80a07509582daadf275f36ffe7a88c3b12e9db4
  evidence: Gold patch adds only a Blob type check in the B branch of parseModelString, plus the required error code registration.
  category: architecture
  verification: llm_judge
