    lines: '22'
    commit: c80a07509582daadf275f36ffe7a88c3b12e9db4
  collision_type: meta_confusion
  why_distracting: Could lead agent to run broad test suites rather than narrowing the fix to the specific Blob validation path.
  severity: medium
- rule: 'React Compiler: `/compiler/` directory (has its own instructions)'
