    `sys.path.append(...)`, the directive is necessa'
  category: style
distractors:
- rule: 'Fail-closed behavior for agents: If coordination evidence cannot be found,
    do not proceed to PR-ready output.'
  collision_type: meta_confusion
  why_distracting: The agent might refuse to generate the code because it cannot verify
    coordination or approval in the issue thread from the prompt context, outputting
    a refusal instead of the requested optimization.
  severity: high
  source:
    path: CLAUDE.md
    lines: 54-57
- rule: 'Copies and Modular Models: mark classes or functions with `# Copied from
    ...` to manage code duplication.'
  collision_type: architecture_boundary
  why_distracting: The agent might try to use `# Copied from` comments when refactoring
    or extracting AST parsing logic to avoid duplication, but this rule strictly applies
    to model-specific files in `src/transformers/models/`, not utility scripts in
    `utils/`.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 59-63
- rule: 'No low-value busywork PRs: Do not open one-off PRs for tiny edits or mechanical
    cleanups.'
  collision_type: scope_ambiguity
  why_distracting: The agent might misclassify this performance optimization as a
    'mechanical cleanup' or 'tiny edit' and refuse to proceed, even though fixing
    a 2-3x slowdown via AST caching is a substantial algorithmic improvement.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 38-40
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` contain identical rules regarding
  agent contribution policies and repository management. The rules are consistent,
  but the strict fail-closed policies for agents require careful handling to ensure
  the agent actually attempts the coding task rather than refusing due to missing
  meta-context.
