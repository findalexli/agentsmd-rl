version: "1"
origin:
  owner: prisma
  repo: prisma
  pr_number: 29287
  title: "feat(adapter-pg): accept connection string URL in PrismaPg constructor"
  base_commit: a98aff2ede1598a7718f07cde9204b435ae4b5b4
  merge_commit: e97b3e0401b234912490852cc10529ff1f83c44b

description: |
  PrismaPgAdapterFactory must accept a plain connection string URL (e.g.,
  "postgresql://user:pass@localhost:5432/db") as its first argument, in addition
  to the existing pg.Pool and pg.PoolConfig overloads.

checks:
  - id: test_adapter_factory_accepts_string_url
    description: |
      PrismaPgAdapterFactory accepts a connection string URL as its first argument
      and sets config.connectionString correctly. On the buggy base commit, passing
      a string causes TypeError because the string is treated as a PoolConfig object
      and the 'in' operator fails.
    type: fail_to_pass
    origin: agent_config
    source:
      file: AGENTS.md
      lines: "constructor parameter handling"
      note: TypeScript constructor must handle string argument and normalize to PoolConfig shape

  - id: test_factory_produces_adapter_with_correct_url
    description: |
      After construction with a string URL, connect() returns a valid adapter whose
      underlyingDriver().options.connectionString matches the input string.
    type: fail_to_pass
    origin: agent_config
    source:
      file: AGENTS.md
      lines: "constructor parameter handling"
      note: Factory pattern must produce a fully initialized adapter from string input

  - id: test_string_url_not_treated_as_pool_config
    description: |
      A plain string is routed to its own handling branch, not treated as a PoolConfig.
      PoolConfig objects have properties like 'password'; strings do not.
    type: fail_to_pass
    origin: agent_config
    source:
      file: AGENTS.md
      lines: "constructor parameter handling"
      note: Type branching on typeof prevents string from reaching PoolConfig path

  - id: test_repo_tests_pass
    description: All 35 existing adapter-pg tests pass — the string URL handling does not break existing behavior.
    type: pass_to_pass
    origin: repo_tests

  - id: test_repo_build
    description: Repo build for adapter-pg completes successfully.
    type: pass_to_pass
    origin: repo_tests

  - id: test_repo_lint
    description: ESLint passes on adapter-pg source (warnings only, no errors).
    type: pass_to_pass
    origin: repo_tests

# Rubric removed: The original rubric rules described code conventions that ARE
# correctly implemented in the gold solution (verified by tests), but the rubric
# judge implementation expects config file edits (AGENTS.md, CLAUDE.md) which are
# not applicable for pure code bug fixes. The judge call_judge function uses
# extract_config_hunks() which only extracts config file changes - it cannot
# evaluate code conventions. Since this is a pure code fix with no config file
# modifications, the rubric is structurally incompatible and would always return 0.
# All code conventions (typescript-type-coverage, no-stale-comments, config-normalization,
# adapter-contract) are verified by the fail_to_pass and pass_to_pass tests.