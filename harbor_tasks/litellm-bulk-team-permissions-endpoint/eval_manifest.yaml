rubric:
- id: imports_at_module_top
  weight: medium
  source:
    section: Code Style
    path: CLAUDE.md
    commit: d132b1bf51cb7c3e6932bae9984216d4f622f945
  rule: '"Avoid imports within methods - place all imports at the top of the file

    (module-level). Inline imports inside functions/methods make dependencies

    harder to trace and hurt readability. The only exception is avoiding

    circular imports where absolutely necessary."

    '
- id: prisma_no_raw_sql
  weight: high
  source:
    section: Proxy database access
    path: CLAUDE.md
    commit: d132b1bf51cb7c3e6932bae9984216d4f622f945
  rule: '"Do not write raw SQL for proxy DB operations. Use Prisma model methods

    instead of execute_raw / query_raw."

    The bulk-update implementation must use prisma_client.db.litellm_teamtable

    methods (find_many, batch_, update), NOT execute_raw / query_raw.

    '
- id: prisma_batch_writes
  weight: high
  source:
    section: Proxy database access
    path: CLAUDE.md
    commit: d132b1bf51cb7c3e6932bae9984216d4f622f945
  rule: '"Batch writes. Use create_many/update_many/delete_many instead of

    individual calls. When multiple separate writes target the same table

    (e.g. in batch_()), order by primary key to avoid deadlocks."

    Per-team updates must be issued through prisma_client.db.batch_(), not

    a Python loop of individual .update() calls each awaited separately.

    '
- id: prisma_bound_large_results
  weight: high
  source:
    section: Proxy database access
    path: CLAUDE.md
    commit: d132b1bf51cb7c3e6932bae9984216d4f622f945
  rule: '"Bound large result sets. Prisma materializes full results in memory.

    For results over ~10 MB, paginate with take/skip or cursor/take, always

    with an explicit order. Prefer cursor-based pagination (skip is O(n))."

    The apply_to_all_teams branch reads every team in the table, which can

    be arbitrarily large; it must page rather than load all teams at once.

    '
- id: prisma_no_n_plus_one
  weight: medium
  source:
    section: Proxy database access
    path: CLAUDE.md
    commit: d132b1bf51cb7c3e6932bae9984216d4f622f945
  rule: '"No N+1 queries. Never query the DB inside a loop. Batch-fetch with

    {"in": ids} and distribute in-memory."

    The team_ids branch must fetch all requested teams in a single

    find_many call using {"team_id": {"in": team_ids}}.

    '
- id: type_hints_required
  weight: medium
  source:
    section: Code Style
    path: CLAUDE.md
    commit: d132b1bf51cb7c3e6932bae9984216d4f622f945
  rule: '"Type hints required for all public APIs."

    The endpoint handler and helper functions should be typed; request and

    response models must be Pydantic v2 BaseModels with explicit field types.

    '
- id: validate_proxy_inputs
  weight: high
  source:
    section: Security Considerations
    path: AGENTS.md
    commit: d132b1bf51cb7c3e6932bae9984216d4f622f945
  rule: '"Always validate all inputs, especially for proxy endpoints."

    The endpoint must reject permission values outside KeyManagementRoutes,

    reject conflicting flags (team_ids with apply_to_all_teams=True), and

    authorize only proxy admins.

    '
- id: black_formatting
  weight: low
  source:
    section: Code Quality
    path: CLAUDE.md
    commit: d132b1bf51cb7c3e6932bae9984216d4f622f945
  rule: '"Before committing, always run `poetry run black .` to format your code.

    Black formatting is enforced in CI."

    New code added by the agent should be Black-formatted (24 line length 88).

    Note: the existing files in the repo at base may have minor pre-existing

    formatting drift; only the new additions are evaluated.

    '
- id: pr_test_coverage
  weight: medium
  source:
    section: GitHub Issue & PR Templates
    path: CLAUDE.md
    commit: d132b1bf51cb7c3e6932bae9984216d4f622f945
  rule: '"Pull Requests: Add at least 1 test in tests/litellm/. Ensure

    `make test-unit` passes."

    A new endpoint of this size should have unit tests covering: append

    preserves existing, skip-when-already-has, empty input no-op, non-admin

    403, invalid permission 400, and the team_ids vs. apply_to_all_teams

    branches.

    '
