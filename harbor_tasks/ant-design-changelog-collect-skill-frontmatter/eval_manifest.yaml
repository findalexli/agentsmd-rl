  type: fail_to_pass
  origin: pr_diff
  description: SKILL.md must begin with a YAML frontmatter block delimited by `---`
- id: test_frontmatter_name_field_correct
  type: fail_to_pass
  origin: pr_diff
  description: Frontmatter `name` field must equal `changelog-collect`
- id: test_frontmatter_description_present_and_substantive
  type: fail_to_pass
