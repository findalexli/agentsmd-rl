# eval_manifest.yaml for continuedev/continue PR #11915
# fix: ensure config.yaml exists and is populated when accessed

id: continue-config-yaml-empty-fix
version: "1.0"

source:
  pr: "https://github.com/continuedev/continue/pull/11915"
  pr_number: 11915
  base_commit: 16a540c3378b833931429db9bcb3ce7c98bd7a36
  merge_commit: fd7ade8f3fe8c1ae51190d714fef9821bfb14b59

description: >
  Fix for two bugs in Continue core's config loading:
  1. getConfigYamlPath() in paths.ts did not populate an empty config.yaml
     with defaults — it only handled the "file missing" case.
  2. ConfigHandler did not call getConfigYamlPath() before opening a local
     config profile, so opening a profile with a missing/empty config failed.

checks:
  - id: test_empty_config_yaml_populated
    type: fail_to_pass
    origin: programmatic
    description: >
      When config.yaml exists but is empty, getConfigYamlPath() must
      populate it with the default config (name, version, schema, models keys).
      On the base commit this test fails because the empty-file case is
      not handled.

  - id: test_valid_config_yaml_untouched
    type: pass_to_pass
    origin: programmatic
    description: >
      When config.yaml already has valid content, getConfigYamlPath()
      must not modify it.

  - id: test_missing_both_configs_created
    type: pass_to_pass
    origin: programmatic
    description: >
      When neither config.yaml nor config.json exists,
      getConfigYamlPath() creates config.yaml with defaults.

  - id: test_idempotent_empty_file
    type: fail_to_pass
    origin: programmatic
    description: >
      Calling getConfigYamlPath() twice with an empty config.yaml
      must not crash and must result in valid default config.

  - id: test_repo_format_check
    type: pass_to_pass
    origin: repo_tests
    description: >
      Repo-wide prettier format check passes on the base commit.

  - id: test_repo_core_lint
    type: pass_to_pass
    origin: repo_tests
    description: >
      Core package eslint passes with no errors on the base commit.

rubric:
  - rule: >
      When creating or updating tests, run them to confirm they pass
      before considering the work complete.
    source:
      file: extensions/cli/AGENTS.md
      commit: 16a540c3378b833931429db9bcb3ce7c98bd7a36
      lines: "97-99"
    relevance: high
    weight: 1

  - rule: >
      Before submitting a PR, run formatting and linting checks
      (`npm run format` and `npm run lint`) and fix any issues.
    source:
      file: extensions/cli/AGENTS.md
      commit: 16a540c3378b833931429db9bcb3ce7c98bd7a36
      lines: "99-101"
    relevance: medium
    weight: 1
