rubric:
  - rule: "Code changes should be focused and minimal - only modify files necessary for the fix."
    reference: |
      The gold solution modifies 5 files:
      - TypeBridging.kt (main fix with AsOptionalVoid bridge)
      - Test golden results (main.h, main.kt, main.swift)
      - Test data (nullable_type.kt)
      These are all necessary changes for the fix.
  - rule: "Bridge implementation must include proper type conversions for both Kotlin and Swift sources."
    reference: |
      The AsOptionalVoid bridge has correct conversions:
      - Kotlin: (if (x) Unit else null) and (x != null)
      - Swift: (x != nil) and (x ? () : nil)
  - rule: "Error messages should be descriptive and guide developers to correct usage."
    reference: |
      The error message 'AsOptionalVoid must be used for AsVoid' guides developers.

agent_config_rules:
  - source: AGENTS.md
    file: compiler/AGENTS.md
    rules:
      - "FIR prefix: When changes are mostly related to FIR compiler/fir/, use FIR prefix in the commit subject line."
      - "Test-before-fix: When fixing an issue and adding a test, commit the test data as a separate commit before the fix."
  - source: CLAUDE.md
    file: .ai/guidelines.md
    rules:
      - "BEFORE running tests, modifying, or investigating code - identify the area and READ its docs."
      - "Use -q quiet flag to reduce output noise when running tests."
      - "Reference YouTrack issues KT-XXXXX in commit messages when applicable."
      - "Use KT-XXXXX Fixed in body to auto-close issues."
