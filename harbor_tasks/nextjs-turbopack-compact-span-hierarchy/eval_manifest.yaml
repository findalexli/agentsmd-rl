rubric:
- rule: Code modifications must pass cargo fmt check (no tabs, no trailing whitespace).
  reference: The gold solution changes to turbopack/crates/turbo-persistence/src/db.rs
    and turbopack/crates/turbo-tasks-backend/src/backend/mod.rs pass cargo fmt --check
- rule: Code modifications must pass cargo check and cargo clippy for affected crates.
  reference: The gold solution passes cargo check and cargo clippy for turbo-persistence
    and turbo-tasks-backend crates
- rule: turbopack/ contains the Turbopack bundler (Rust)
  source:
    path: CLAUDE.md
    lines: 11-18
  evidence: The gold solution correctly targets `.rs` files in the `turbopack/` directory
    for bundler-related tracing span fixes, aligning with the documented codebase
    structure.
  category: architecture
distractors:
- rule: Start `pnpm --filter=next dev` in a separate terminal session before making
    edits to Next.js source.
  collision_type: scope_ambiguity
  why_distracting: The rule mandates starting `pnpm --filter=next dev` for 'Next.js
    source' changes. An agent might interpret Turbopack as Next.js source and try
    to use the JS dev server to test Rust tracing span changes, which is inefficient
    and won't hot-reload Rust code.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 66-70
- rule: Prefer `pnpm --filter=next build` when edits are limited to core Next.js files.
  collision_type: scope_ambiguity
  why_distracting: The rule suggests using `pnpm --filter=next build` when edits are
    limited to 'core Next.js files'. An agent might run this to compile the Turbopack
    Rust changes, but this command primarily builds the JS packages. Rust changes
    require `pnpm build-all` or direct `cargo` commands.
  severity: high
  source:
    path: CLAUDE.md
    lines: 82-84
hierarchy_analysis: The config files `CLAUDE.md` and `AGENTS.md` are identical symlinks
  providing general Next.js repository guidance. The primary conflict arises from
  the repository's hybrid nature (JS/TS vs Rust). The instructions heavily optimize
  for the JS/TS inner loop (`pnpm --filter=next dev`, `pnpm --filter=next build`),
  which creates scope ambiguity when working on the Rust-based Turbopack subsystem.
  Agents must recognize the architecture boundary between the Next.js JS core and
  the Turbopack Rust crates to avoid using JS-centric build tooling for Rust changes.
