rubric: []
distractors:
- rule: Avoid forcing model-specific logic into shared stages
  source:
    path: python/sglang/multimodal_gen/.claude/skills/sglang-diffusion-add-model/SKILL.md
    lines: '585'
  source_text: '6. **Avoid forcing model-specific logic into shared stages**: If your
    model''s pre-processing doesn''t naturally fit the existing standard stages, prefer
    the Hybrid pattern with a dedicated BeforeDenoisingStage rather than adding conditional
    branches to shared stages.'
  collision_type: architecture_boundary
  why_distracting: The gold diff adds model-specific checks (e.g. `isinstance(module,
    FusedMoE)`) to a shared utility `auto_detect_lora_target_modules` in the LLM (`srt`)
    subsystem. An agent might apply this diffusion rule to the LLM code and incorrectly
    suggest abstracting these checks into separate model-specific stages.
  severity: high
- rule: Add logger.warning_once(...) only when falling back due to a known hardware
    limitation
  source:
    path: python/sglang/multimodal_gen/.claude/skills/sglang-diffusion-triton-kernel/SKILL.md
    lines: '229'
  source_text: '- Add `logger.warning_once(...)` only when falling back due to a **known
    hardware limitation** (e.g., unsupported SM compute capability), not for wrong-input
    errors.'
  collision_type: scope_ambiguity
  why_distracting: The gold diff adds a standard `logger.info` call to `lora_manager.py`.
    An agent might read this logging rule from the diffusion triton kernel skill and
    mistakenly apply it to the LLM's `lora_manager`, incorrectly restricting or flagging
    the legitimate use of the standard logger.
  severity: low
- rule: Keep Python launchers thin, but still validate the basic invariants (is_cuda,
    supported dtype, out metadata).
  source:
    path: .claude/skills/add-jit-kernel/SKILL.md
    lines: '384'
  source_text: '- Keep Python launchers thin, but still validate the basic invariants
    (`is_cuda`, supported dtype, `out` metadata). In the current JIT/FFI path, invalid
    tensors are not always rejected safely before launch'
  collision_type: scope_ambiguity
  why_distracting: 'The gold diff adds `auto_detect_lora_target_modules` which takes
    a `model: "torch.nn.Module"`. An agent might see this tensor/module validation
    rule for JIT launchers and think it applies here, needlessly adding invariant
    checks (`is_cuda`, `dtype`) to a function that only inspects string class names
    and module configurations.'
  severity: medium
- rule: Use '"RMSNorm" in type(m).__name__' instead of 'isinstance(m, torch.nn.RMSNorm)'
    to avoid missing diffusers variants.
  source:
    path: python/sglang/multimodal_gen/.claude/skills/sglang-diffusion-cuda-kernel/SKILL.md
    lines: '458'
  source_text: '| `isinstance(m, torch.nn.RMSNorm)` misses diffusers variants | Use
    `"RMSNorm" in type(m).__name__` |'
  collision_type: architecture_boundary
  why_distracting: The PR uses `isinstance` to check for `FusedMoE`, `ParallelLMHead`,
    and `LinearBase` module types. The `multimodal_gen` subsystem explicitly avoids
    `isinstance` for layers like `RMSNorm` because it needs to support external HuggingFace
    diffusers variants. However, the PR is making changes to the `srt` (LLM runtime)
    subsystem, which uses native `sglang.srt.layers` implementations. Thus, standard
    Python `isinstance` checks are perfectly valid and correct. An agent might mistakenly
    apply the `multimodal_gen` rule across the architecture boundary.
  severity: medium
