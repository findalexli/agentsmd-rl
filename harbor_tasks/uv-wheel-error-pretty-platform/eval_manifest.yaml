version: "2.0"

source:
  repo: "astral-sh/uv"
  pr: 18738
  base_commit: "202e0f083180c36907ee7fbb5bdf7707722a9521"
  merge_commit: "dd717a6073e9244f34a43be4665c0f162ae1a425"

checks:
  - id: cargo_check
    type: pass_to_pass
    origin: static
    description: "Modified crates (uv-platform-tags, uv-distribution) must compile"

  - id: host_error_macos_pretty
    type: fail_to_pass
    origin: pr_diff
    description: "Host platform error shows 'macOS' (capitalized) instead of raw 'macos'"

  - id: target_error_linux_pretty
    type: fail_to_pass
    origin: pr_diff
    description: "Target platform error shows 'Linux' instead of raw 'manylinux'"

  - id: host_error_musllinux_pretty
    type: fail_to_pass
    origin: pr_diff
    description: "Host platform error shows 'Linux' for musllinux, not raw 'musllinux'"

  - id: host_error_windows_pretty
    type: fail_to_pass
    origin: pr_diff
    description: "Host platform error shows 'Windows' (capitalized) instead of raw 'windows'"

  - id: existing_platform_tags_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Upstream uv-platform-tags test suite still passes"

  - id: no_unwrap_panic_in_new_code
    type: pass_to_pass
    origin: agent_config
    description: "New non-test code in platform.rs avoids unwrap/panic/unreachable/unsafe"
    source:
      path: "CLAUDE.md"
      lines: "7"
      commit: "202e0f083180c36907ee7fbb5bdf7707722a9521"

  - id: no_allow_in_new_code
    type: pass_to_pass
    origin: agent_config
    description: "New non-test code prefers #[expect()] over #[allow()]"
    source:
      path: "CLAUDE.md"
      lines: "10"
      commit: "202e0f083180c36907ee7fbb5bdf7707722a9521"

rubric:
  - rule: "ALWAYS attempt to add a test case for changed behavior"
    source:
      path: "CLAUDE.md"
      lines: "2"
      commit: "202e0f083180c36907ee7fbb5bdf7707722a9521"

  - rule: "PREFER patterns like `if let` to handle fallibility"
    source:
      path: "CLAUDE.md"
      lines: "8"
      commit: "202e0f083180c36907ee7fbb5bdf7707722a9521"

  - rule: "PREFER let chains (`if let` combined with `&&`) over nested `if let` statements"
    source:
      path: "CLAUDE.md"
      lines: "11"
      commit: "202e0f083180c36907ee7fbb5bdf7707722a9521"

  - rule: "ALWAYS read and copy the style of similar tests when adding new cases"
    source:
      path: "CLAUDE.md"
      lines: "15"
      commit: "202e0f083180c36907ee7fbb5bdf7707722a9521"

  - rule: "AVOID shortening variable names, e.g., use `version` instead of `ver`, and `requires_python` instead of `rp`"
    source:
      path: "CLAUDE.md"
      lines: "17-18"
      commit: "202e0f083180c36907ee7fbb5bdf7707722a9521"

  - rule: "PREFER [`TypeName`] references when writing Rust doc comments"
    source:
      path: "CLAUDE.md"
      lines: "19"
      commit: "202e0f083180c36907ee7fbb5bdf7707722a9521"
