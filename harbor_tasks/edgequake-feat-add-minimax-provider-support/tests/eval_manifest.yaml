distractors:
- rule: THE PROBLEM CAN NOT BE SOLVED WITHOUT EXTENSIVE INTERNET RESEARCH.
  collision_type: meta_confusion
  why_distracting: The task instruction explicitly provides all necessary information,
    including the API base URL (https://api.minimax.io/v1), the exact model names
    (M2.7, M2.7-highspeed, etc.), and states it uses an OpenAI-compatible API. Extensive
    internet research is completely unnecessary and will cause the agent to waste
    time and tokens.
  severity: high
  source:
    path: AGENTS.md
    lines: 15-16
- rule: You CANNOT successfully complete this task without using Google to verify
    your understanding of third party packages and dependencies is up to date.
  collision_type: meta_confusion
  why_distracting: The task requires no new third-party packages or dependencies,
    as it simply reuses the existing `openaicompatible` provider type in the backend
    and adds standard UI elements in the frontend. Searching Google for package documentation
    is a distraction.
  severity: high
  source:
    path: AGENTS.md
    lines: 20-22
hierarchy_analysis: The config environment consists of a single `AGENTS.md` file containing
  generic agent meta-instructions rather than repository-specific coding conventions.
  There is no hierarchy to navigate, and the rules provided are entirely meta-behavioral.
