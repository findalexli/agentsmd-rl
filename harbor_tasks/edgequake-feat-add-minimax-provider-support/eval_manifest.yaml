distractors:
- rule: THE PROBLEM CAN NOT BE SOLVED WITHOUT EXTENSIVE INTERNET RESEARCH.
  collision_type: meta_confusion
  why_distracting: The prompt provides all the necessary details to implement the
    MiniMax provider (API URL `https://api.minimax.io/v1`, model names `MiniMax-M2.7`,
    etc., and the fact that it uses the `openaicompatible` type). Extensive internet
    research is unnecessary and will waste the agent's time or lead to hallucinations.
  severity: high
  source:
    path: AGENTS.md
    lines: 11-11
- rule: You CANNOT successfully complete this task without using Google to verify
    your understanding of third party packages and dependencies is up to date.
  collision_type: scope_ambiguity
  why_distracting: The PR does not require installing or implementing any new third-party
    packages or dependencies. It simply adds configuration for a new provider using
    the existing `openaicompatible` implementation. Searching Google for packages
    would be a complete waste of time and distract from the actual task.
  severity: high
  source:
    path: AGENTS.md
    lines: 17-17
- rule: At the end, you must test your code rigorously using the tools provided, and
    do it many times, to catch all edge cases. If it is not robust, iterate more and
    make it perfect.
  collision_type: would_cause_bug
  why_distracting: The agent cannot fully test the MiniMax integration because it
    requires a valid `MINIMAX_API_KEY`, which is not provided (the `.env.example`
    uses a placeholder). Attempting to rigorously test the API connection will fail,
    potentially causing the agent to get stuck in an infinite loop trying to fix a
    'bug' that is actually just a missing API key.
  severity: high
  source:
    path: AGENTS.md
    lines: 23-23
- rule: You must use the fetch_webpage tool to recursively gather all information
    from URL's provided to you by the user, as well as any links you find in the content
    of those pages.
  collision_type: would_cause_bug
  why_distracting: The user prompt mentions `https://api.minimax.io/v1` as the API
    endpoint. If the agent tries to recursively fetch this URL and its links, it will
    likely hit API endpoints, get 401 Unauthorized errors, or parse irrelevant JSON/HTML,
    wasting time and context window.
  severity: medium
  source:
    path: AGENTS.md
    lines: 13-13
hierarchy_analysis: The `AGENTS.md` file contains generic, highly aggressive agent
  instructions that conflict with the specific, self-contained nature of this PR.
  The prompt provides all necessary technical details (API URL, model names, configuration
  files to edit), making the instructions for 'extensive internet research' and 'recursively
  gathering information from URLs' actively harmful. Furthermore, the instruction
  to 'test your code rigorously... and do it many times' will cause the agent to fail
  or loop infinitely because it lacks a valid `MINIMAX_API_KEY` to perform actual
  API tests.
