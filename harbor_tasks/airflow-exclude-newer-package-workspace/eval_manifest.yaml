distractors:
- rule: Never run pytest, python, or airflow commands directly on the host — always
    use `breeze`.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to run the `update_airflow_pyproject_toml.py`
    script via `breeze` or `breeze shell` to regenerate the `pyproject.toml` file.
    However, pre-commit scripts that don't explicitly require breeze (like this one)
    are designed to be run on the host (e.g., via `prek run` or directly with `python`).
    Forcing it through breeze could cause path resolution issues or be unnecessarily
    complex.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 9-9
- rule: Import and use `run_command_via_breeze_shell` from `common_prek_utils` — do
    not shell out to `breeze` directly.
  collision_type: scope_ambiguity
  why_distracting: The agent might think the `update_airflow_pyproject_toml.py` script
    needs to be executed inside Breeze and try to wrap its execution or internal logic
    with `run_command_via_breeze_shell`. However, this script just parses and updates
    a local TOML file and doesn't require the Breeze CI image.
  severity: medium
  source:
    path: scripts/ci/prek/AGENTS.md
    lines: 10-16
hierarchy_analysis: The hierarchy defines general rules in `CLAUDE.md` and `AGENTS.md`
  (Level 0) and specific pre-commit hook rules in `scripts/ci/prek/AGENTS.md` (Level
  3). The Level 0 rule to 'Never run python directly on the host' conflicts with the
  nature of fast, local pre-commit hooks which are designed to run on the host. The
  Level 3 config clarifies that only *some* prek scripts require Breeze, implying
  others run locally, which overrides the strict Level 0 prohibition for this specific
  context.
