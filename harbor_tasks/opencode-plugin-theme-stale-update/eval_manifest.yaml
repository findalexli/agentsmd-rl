version: "2.0"

source:
  repo: "anomalyco/opencode"
  pr: 20052
  base_commit: "3c32013eb122d794089e011d2ec7077395d6f1c4"
  merge_commit: "8e4bab51812fccf3b69713904159a4394b3a29ab"

checks:
  - id: changed_files_exist
    type: pass_to_pass
    origin: static
    description: "All four modified files must exist and not be empty"

  - id: stat_async_existing_file
    type: fail_to_pass
    origin: pr_diff
    description: "Filesystem.statAsync returns stat object for existing files with correct size"

  - id: stat_async_missing_file
    type: fail_to_pass
    origin: pr_diff
    description: "Filesystem.statAsync returns undefined for missing files instead of throwing"

  - id: upsert_theme_add_and_update
    type: fail_to_pass
    origin: pr_diff
    description: "upsertTheme adds new themes AND updates already-registered ones"

  - id: upsert_theme_rejects_invalid
    type: fail_to_pass
    origin: pr_diff
    description: "upsertTheme returns false for empty name and non-theme data"

  - id: set_theme_callable
    type: fail_to_pass
    origin: pr_diff
    description: "PluginMeta.setTheme is exported and handles missing plugin IDs gracefully"

  - id: theme_entry_has_themes_field
    type: fail_to_pass
    origin: pr_diff
    description: "PluginMeta.Entry includes themes tracking and setTheme accepts Theme shape"

  - id: plugin_loader_tests_pass
    type: pass_to_pass
    origin: repo_tests
    description: "Existing plugin-loader test suite still passes"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "Modified files have substantial content (not stubbed or truncated)"

  - id: no_any_type
    type: pass_to_pass
    origin: agent_config
    description: "No explicit 'any' type annotations in changed files"
    source:
      path: "AGENTS.md"
      lines: "13"
      commit: "3c32013eb122d794089e011d2ec7077395d6f1c4"

  - id: prefer_const_over_let
    type: pass_to_pass
    origin: agent_config
    description: "Changed lines prefer const over let"
    source:
      path: "AGENTS.md"
      lines: "70"
      commit: "3c32013eb122d794089e011d2ec7077395d6f1c4"

rubric:
  - rule: "Keep things in one function unless composable or reusable"
    source:
      path: "AGENTS.md"
      lines: "11"
      commit: "3c32013eb122d794089e011d2ec7077395d6f1c4"

  - rule: "Avoid `try`/`catch` where possible"
    source:
      path: "AGENTS.md"
      lines: "12"
      commit: "3c32013eb122d794089e011d2ec7077395d6f1c4"

  - rule: "Prefer single word variable names where possible"
    source:
      path: "AGENTS.md"
      lines: "14"
      commit: "3c32013eb122d794089e011d2ec7077395d6f1c4"

  - rule: "Rely on type inference when possible; avoid explicit type annotations or interfaces unless necessary for exports or clarity"
    source:
      path: "AGENTS.md"
      lines: "16"
      commit: "3c32013eb122d794089e011d2ec7077395d6f1c4"

  - rule: "Prefer functional array methods (flatMap, filter, map) over for loops; use type guards on filter to maintain type inference downstream"
    source:
      path: "AGENTS.md"
      lines: "17"
      commit: "3c32013eb122d794089e011d2ec7077395d6f1c4"

  - rule: "Reduce total variable count by inlining when a value is only used once"
    source:
      path: "AGENTS.md"
      lines: "44"
      commit: "3c32013eb122d794089e011d2ec7077395d6f1c4"

  - rule: "Avoid unnecessary destructuring. Use dot notation to preserve context."
    source:
      path: "AGENTS.md"
      lines: "57"
      commit: "3c32013eb122d794089e011d2ec7077395d6f1c4"

  - rule: "Avoid `else` statements. Prefer early returns."
    source:
      path: "AGENTS.md"
      lines: "84"
      commit: "3c32013eb122d794089e011d2ec7077395d6f1c4"

  - rule: "Use Bun APIs when possible, like `Bun.file()`"
    source:
      path: "AGENTS.md"
      lines: "15"
      commit: "3c32013eb122d794089e011d2ec7077395d6f1c4"
