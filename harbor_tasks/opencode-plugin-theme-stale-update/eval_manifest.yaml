rubric:
- rule: Avoid `else` statements. Prefer early returns.
  source:
    path: AGENTS.md
    lines: 79-88
  evidence: The `upsertTheme` function uses early returns for validation (`if (!name)
    return false` and `if (!isTheme(theme)) return false`) instead of wrapping the
    rest of the function in an `if` block.
  category: style
- rule: Rely on type inference when possible; avoid explicit type annotations or interfaces
    unless necessary for exports or clarity
  source:
    path: AGENTS.md
    lines: 16-16
  evidence: The `upsertTheme` function does not explicitly declare its return type,
    relying on TypeScript to infer `boolean` from the `return false` and `return true`
    statements.
  category: style
distractors:
- rule: Prefer `FileSystem.FileSystem` instead of raw `fs/promises` for effectful
    file I/O.
  collision_type: architecture_boundary
  why_distracting: The prompt requires adding a `statAsync` utility to `packages/opencode/src/util/filesystem.ts`
    to replace a synchronous `statSync` call in `meta.ts`. An agent might try to use
    Effect's `FileSystem.FileSystem` to perform this I/O. However, `meta.ts` and `filesystem.ts`
    are standard async/await utility files, not Effectified services. Attempting to
    use Effect here would require rewriting the caller to be an Effect, causing a
    cascading refactor that crosses architectural boundaries.
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: 35-36
- rule: Avoid `else` statements. Prefer early returns.
  collision_type: rule_conflict
  why_distracting: While the agent should use early returns for validation, applying
    'Avoid `else` statements' strictly to the dictionary assignment in `upsertTheme`
    (`if (customThemes[name] !== undefined) { ... } else { ... }`) would require duplicating
    the subsequent `syncThemes()` and `return true` calls in both branches, leading
    to less maintainable code.
  severity: medium
  source:
    path: AGENTS.md
    lines: 79-88
hierarchy_analysis: The root `AGENTS.md` provides general TypeScript and Node/Bun
  conventions (early returns, type inference, naming), while `packages/opencode/AGENTS.md`
  introduces highly specific rules for the Effect ecosystem. The primary conflict
  arises because the codebase contains a mix of standard async/await code and Effectified
  services. Agents must recognize that Effect rules (like using `FileSystem.FileSystem`)
  only apply within Effect contexts, and should not be forced onto standard utility
  files like `filesystem.ts` or `meta.ts`.
