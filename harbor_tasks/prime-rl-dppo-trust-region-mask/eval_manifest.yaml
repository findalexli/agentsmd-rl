      commit: "09293f3e3eb8bd0fc643bac2d2b80014f0529641"

  - rule: "Incompatible option combinations should raise in model_validator at config resolution time, not at runtime."
    source:
      path: "skills/config/SKILL.md"
      lines: "72"
      commit: "09293f3e3eb8bd0fc643bac2d2b80014f0529641"

