rubric:
- rule: Update AGENTS.md to document that tool descriptions should not use project-specific
    paths like ${directory} to ensure prompt caching works correctly.
  source:
    path: AGENTS.md
  reference: Do not inject project-specific paths like ${directory} into tool descriptions,
    as this breaks LLM prompt caching. Use static text (e.g., 'current working directory')
    instead.
- rule: Reduce total variable count by inlining when a value is only used once.
  source:
    path: AGENTS.md
    lines: 42-51
  evidence: The gold solution modifies the `description` property in `bash.ts` by
    chaining `.replaceAll` calls directly on the `DESCRIPTION` constant, keeping the
    value inlined rather than extracting the modified
  category: style
distractors:
- rule: Use `InstanceState` (from `src/effect/instance-state.ts`) for per-directory
    or per-project state that needs per-instance cleanup.
  collision_type: architecture_boundary
  why_distracting: The problem mentions that project-specific state (`Instance.directory`)
    is breaking caching. An agent might try to refactor the tool to use `InstanceState`
    to manage the directory context per-project, which is a massive overcomplication
    when the fix is simply to remove the directory from the static tool description.
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: 25-26
- rule: '`Instance.bind(fn)` captures the current Instance AsyncLocalStorage context...
    Use it for native addon callbacks... that need to call `Bus.publish` or anything
    that reads `Instance.directory`.'
  collision_type: scope_ambiguity
  why_distracting: The problem explicitly mentions `Instance.directory`. The rule
    states that `Instance.bind` is needed for anything that reads `Instance.directory`.
    An agent might mistakenly try to wrap the tool description generation in `Instance.bind`
    to handle the directory context, rather than removing the directory from the description
    entirely.
  severity: medium
  source:
    path: packages/opencode/AGENTS.md
    lines: 48-52
hierarchy_analysis: The root `AGENTS.md` provides general TypeScript style guidelines
  (like inlining variables), while `packages/opencode/AGENTS.md` provides highly specific
  Effect and state management rules (`InstanceState`, `Instance.bind`). The specific
  rules in the child config are dangerous distractors here because the problem mentions
  `Instance.directory`, which triggers keywords in the child config, but the actual
  solution requires a simple string manipulation following the root config's simplicity
  guidelines.
