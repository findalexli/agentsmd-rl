distractors:
- rule: All new files must start with the following license in comments at the top
    of the file
  collision_type: scope_ambiguity
  why_distracting: The rule specifies adding a license header to 'All new files'.
    An agent might misinterpret this and prepend the license header to the existing
    files it modifies (e.g., interpreter.rs or mod.rs), creating unnecessary diffs
    and potential linting issues.
  severity: low
  source:
    path: CLAUDE.md
    lines: 16-19
- rule: simtests must be run with `cargo simtest` to avoid false negatives
  collision_type: scope_ambiguity
  why_distracting: The config emphasizes running simtests to avoid false negatives.
    An agent might waste time trying to run `cargo simtest` for the `sui-display`
    crate, which is a standard library crate where `cargo nextest` is sufficient and
    faster.
  severity: low
  source:
    path: CLAUDE.md
    lines: 30-31
- rule: Use simtest for testing blockchain interactions and debugging.
  source:
    path: .claude/skills/simtest-debug/SKILL.md
    lines: 1-10
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to write a simtest for this display formatting
    feature, but sui-display is a local utility that only requires standard tokio
    tests.
  severity: medium
- rule: Update protocol config when introducing new features or changing behavior.
  source:
    path: .claude/skills/protocol-config/SKILL.md
    lines: 1-10
  collision_type: scope_ambiguity
  why_distracting: The agent might think changing how values are displayed requires
    a protocol config update, but this is purely a client-side/display change.
  severity: low
hierarchy_analysis: The hierarchy consists of two root-level files (`AGENTS.md` and
  `CLAUDE.md`). `AGENTS.md` simply points to `CLAUDE.md` and suggests looking for
  crate-specific files, but none exist for `sui-display` in this context. The guidance
  is entirely generic repository defaults.
