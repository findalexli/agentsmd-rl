distractors:
- rule: All new files must start with the following license in comments at the top
    of the file
  collision_type: scope_ambiguity
  why_distracting: The agent might try to add the Mysten Labs license header to the
    files being modified (e.g., `interpreter.rs`, `mod.rs`), but the rule explicitly
    applies only to 'new files'. Modifying existing files to add headers would clutter
    the PR.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 15-18
- rule: Run e2e tests. simtests must be run with `cargo simtest` to avoid false negatives
  collision_type: meta_confusion
  why_distracting: The agent might think it needs to write a simulation test (e.g.,
    using `#[sim_test]`) instead of a standard `#[tokio::test]` because of the prominent
    mention of simtests for e2e testing. However, this is a simple library unit test
    for the display parser where standard tokio tests are appropriate.
  severity: low
  source:
    path: CLAUDE.md
    lines: 28-29
hierarchy_analysis: The repository uses a root `CLAUDE.md` and `AGENTS.md`. The `CLAUDE.md`
  provides general Rust and Sui-specific testing commands. There are no conflicting
  crate-specific files provided in the context, so the root rules apply directly.
