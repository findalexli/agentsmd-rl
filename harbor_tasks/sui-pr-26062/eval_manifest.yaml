distractors:
- rule: All new files must start with the following license in comments at the top
    of the file
  collision_type: scope_ambiguity
  why_distracting: The rule specifies adding a license header to 'All new files'.
    An agent might misinterpret this and prepend the license header to the existing
    files it modifies (e.g., interpreter.rs or mod.rs), creating unnecessary diffs
    and potential linting issues.
  severity: low
  source:
    path: CLAUDE.md
    lines: 16-19
- rule: simtests must be run with `cargo simtest` to avoid false negatives
  collision_type: scope_ambiguity
  why_distracting: The config emphasizes running simtests to avoid false negatives.
    An agent might waste time trying to run `cargo simtest` for the `sui-display`
    crate, which is a standard library crate where `cargo nextest` is sufficient and
    faster.
  severity: low
  source:
    path: CLAUDE.md
    lines: 30-31
- rule: Use simtest for testing blockchain interactions and debugging.
  source:
    path: .claude/skills/simtest-debug/SKILL.md
    lines: 1-10
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to write a simtest for this display formatting
    feature, but sui-display is a local utility that only requires standard tokio
    tests.
  severity: medium
- rule: Update protocol config when introducing new features or changing behavior.
  source:
    path: .claude/skills/protocol-config/SKILL.md
    lines: 1-10
  collision_type: scope_ambiguity
  why_distracting: The agent might think changing how values are displayed requires
    a protocol config update, but this is purely a client-side/display change.
  severity: low
- rule: Never make functional changes to the code; only add logging statements to
    debug tests.
  source:
    path: .claude/skills/simtest-debug/SKILL.md
    lines: 38-40
  source_text: 'While executing the skill, never make functional changes to the code.  Only
    add logging statements as described below.  The goal is to find the root cause,
    not fix the issue.

    If at any point the reproduction command stops failing, or fails in a different
    way, this indicates that functional changes have been made. The test is deterministic
    and cannot

    be affected by emitting logs, doing expensive computations, etc.'
  collision_type: meta_confusion
  why_distracting: An agent tasked with fixing a bug might read this rule and incorrectly
    conclude they are strictly forbidden from modifying source files functionally,
    failing to realize this constraint applies exclusively to the simtest-debug debugging
    workflow.
  severity: high
- rule: Add a new constant (which is None in prior versions) and add the field to
    the ProtocolConfig struct with type Option<T>.
  source:
    path: .claude/skills/protocol-config/SKILL.md
    lines: 99-103
  source_text: '**Add a new constant (which is None in prior versions):**

    ```rust

    cfg.new_constant = Some(new_value);

    ```

    Note: You must also add the field to the `ProtocolConfig` struct with type `Option<T>`.
    The `ProtocolConfigAccessors` derive macro automatically generates accessor methods
    (`new_constant()` and `new_constant_as_option()`).'
  collision_type: scope_ambiguity
  why_distracting: 'The diff refactors `transform: Transform` to `transform: Option<Transform>`.
    An agent might wrongly associate this local change in `sui-display` with the ProtocolConfig
    rule, assuming that the use of `Option<T>` must be linked to protocol backward
    compatibility or attempting to modify the core `ProtocolConfig` struct instead.'
  severity: medium
hierarchy_analysis: The hierarchy consists of two root-level files (`AGENTS.md` and
  `CLAUDE.md`). `AGENTS.md` simply points to `CLAUDE.md` and suggests looking for
  crate-specific files, but none exist for `sui-display` in this context. The guidance
  is entirely generic repository defaults.
