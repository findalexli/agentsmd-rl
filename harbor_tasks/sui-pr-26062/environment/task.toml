[description]
summary = "Implement implicit :json transform for bare aggregate expressions in Display v2"
details = """
When a format string contains just '{...}' with no explicit transform, and the expression
evaluates to an aggregate type (struct, enum, or vector), the display formatter should
implicitly apply the :json transform instead of :str. Simple scalar values should still
use :str formatting when no transform is specified.
"""
