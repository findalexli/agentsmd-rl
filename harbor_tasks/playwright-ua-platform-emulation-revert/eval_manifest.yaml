version: "2.0"

source:
  repo: "microsoft/playwright"
  pr: 40016
  base_commit: "346b39c7895a7df03b50b087d503e9f2997fe2e0"
  merge_commit: "93f6b4e158337e2f4a78045a815c7595bf60a931"

checks:
  - id: flint_passes
    type: pass_to_pass
    origin: agent_config
    description: "npm run flint must pass (tsc + lint + DEPS.list import boundaries)"
    source:
      path: "CLAUDE.md"
      lines: "57"
      commit: "346b39c7895a7df03b50b087d503e9f2997fe2e0"

  - id: shared_function_not_exported
    type: fail_to_pass
    origin: pr_diff
    description: "calculateUserAgentEmulation must no longer be exported from browserContext.ts"

  - id: firefox_no_platform_override
    type: fail_to_pass
    origin: pr_diff
    description: "Firefox must not call setPlatformOverride when setting user agent"

  - id: webkit_no_platform_override
    type: fail_to_pass
    origin: pr_diff
    description: "WebKit must not override navigator.platform in updateUserAgent"

  - id: chromium_no_platform_in_ua_override
    type: fail_to_pass
    origin: pr_diff
    description: "Chromium _updateUserAgent must not pass platform key to setUserAgentOverride"

  - id: chromium_still_sends_ua_metadata
    type: pass_to_pass
    origin: static
    description: "Chromium must still send userAgentMetadata for client hints"

  - id: chromium_metadata_has_platform_parsing
    type: pass_to_pass
    origin: static
    description: "Chromium must still parse UA string for platform metadata (anti-stub)"

  - id: firefox_no_import_calculate_emulation
    type: fail_to_pass
    origin: pr_diff
    description: "Firefox must not import or reference calculateUserAgentEmulation"

  - id: webkit_no_import_calculate_emulation
    type: fail_to_pass
    origin: pr_diff
    description: "WebKit must not import or reference calculateUserAgentEmulation"

rubric:
  - rule: "For exported classes: private _method() — only used within the class itself; _method() (no private) — used by other code in the same file, but not outside the file; method() (public) — used in other files"
    source:
      path: "CLAUDE.md"
      lines: "99-104"
      commit: "346b39c7895a7df03b50b087d503e9f2997fe2e0"
