manifest_version: "1"

task:
  name: mlflow-gemini-bytes-repr-extraction
  title: "Handle Gemini SDK bytes repr format in inline_data extraction"
  difficulty: medium
  time_estimate_minutes: 30
  tags:
    - mlflow
    - tracing
    - gemini
    - bytes
    - pydantic

pr:
  owner: mlflow
  repo: mlflow
  number: 22453
  base_commit: "44600fe263c57bc94b663ff483f6583345e1b101"
  merge_commit: "53f3ede8a60c5d67febd729710610bcd522b8e70"

patch:
  distinctive_line: "if data.startswith((\"b'\", 'b\"')):"

checks:
  - id: test_gemini_inline_data_bytes_repr_extracted
    type: fail_to_pass
    description: |
      Gemini inline_data with bytes repr string (e.g., "b'\\x89PNG...'")
      is extracted as an attachment and original bytes are recoverable.
    origin: test_outputs
    command: python -m pytest /tests/test_outputs.py::test_gemini_inline_data_bytes_repr_extracted -v

  - id: test_gemini_inline_data_bytes_repr_via_set_inputs
    type: fail_to_pass
    description: |
      Same bytes repr handling works via set_inputs (not just set_outputs).
    origin: test_outputs
    command: python -m pytest /tests/test_outputs.py::test_gemini_inline_data_bytes_repr_via_set_inputs -v

  - id: test_gemini_inline_data_bytes_repr_wav_audio
    type: fail_to_pass
    description: |
      Bytes repr format also works for audio mime types (wav).
    origin: test_outputs
    command: python -m pytest /tests/test_outputs.py::test_gemini_inline_data_bytes_repr_wav_audio -v

  - id: test_gemini_inline_data_base64_still_works
    type: pass_to_pass
    description: |
      Normal base64-encoded inline_data (non-repr) continues to work.
    origin: test_outputs
    command: python -m pytest /tests/test_outputs.py::test_gemini_inline_data_base64_still_works -v

  - id: test_gemini_inline_data_invalid_base64_rejected
    type: pass_to_pass
    description: |
      Malformed base64 data is rejected gracefully (no attachment created).
    origin: test_outputs
    command: python -m pytest /tests/test_outputs.py::test_gemini_inline_data_invalid_base64_rejected -v

  - id: test_gemini_inline_data_invalid_bytes_repr_rejected
    type: pass_to_pass
    description: |
      Invalid bytes repr falls back gracefully (data left unchanged).
    origin: test_outputs
    command: python -m pytest /tests/test_outputs.py::test_gemini_inline_data_invalid_bytes_repr_rejected -v

  - id: test_repo_span_entity_tests
    type: pass_to_pass
    description: |
      Repo's span entity tests pass (pass_to_pass).
    origin: repo_tests
    command: python -m pytest /tests/test_outputs.py::test_repo_span_entity_tests -v

  - id: test_repo_span_attachment_extraction_tests
    type: pass_to_pass
    description: |
      Repo's span attachment extraction tests pass (pass_to_pass).
    origin: repo_tests
    command: python -m pytest /tests/test_outputs.py::test_repo_span_attachment_extraction_tests -v

  - id: test_repo_tracing_export_tests
    type: pass_to_pass
    description: |
      Repo's tracing export tests pass (pass_to_pass).
    origin: repo_tests
    command: python -m pytest /tests/test_outputs.py::test_repo_tracing_export_tests -v

rubric:
  - id: code_quality_top_level_imports
    description: |
      Use top-level imports (only use lazy imports when necessary).
      [CLAUDE.md: Code Style Principles]
    origin: agent_config
    source: mlflow/entities/span.py
    reference: "Added top-level import of ast module for safe bytes repr parsing"
    max_points: 1

  - id: code_quality_no_useless_comments
    description: |
      Only add comments that explain non-obvious logic or provide additional context.
      [CLAUDE.md: Code Style Principles]
    origin: agent_config
    source: mlflow/entities/span.py
    reference: "Added comment explaining Gemini SDK Pydantic serialization produces bytes repr instead of base64"
    max_points: 1

  - id: code_quality_docstrings_only_when_helpful
    description: |
      Only add docstrings in tests when they provide additional context.
      [CLAUDE.md: Code Style Principles]
    origin: agent_config
    source: tests/entities/test_span_auto_extract_attachments.py
    reference: "Added docstring explaining test validates Gemini SDK bytes repr extraction"
    max_points: 1
