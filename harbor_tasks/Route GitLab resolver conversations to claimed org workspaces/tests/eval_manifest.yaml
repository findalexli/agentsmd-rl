distractors:
- rule: Store design documents or temporary artifacts in a `.pr/` directory.
  collision_type: scope_ambiguity
  why_distracting: The agent might create a `.pr/design.md` file to document the new
    organization routing architecture, but this is a standard feature implementation
    that doesn't require temporary PR artifacts.
  severity: low
  source:
    path: AGENTS.md
    lines: 58-65
- rule: To run the full application to debug issues, use `make build && make run ...`
  collision_type: scope_ambiguity
  why_distracting: The agent might try to run the full application using `make build
    && make run ...` to manually test the GitLab webhook routing, which is unnecessary
    and complex for a backend-only integration change.
  severity: medium
  source:
    path: AGENTS.md
    lines: 8-11
- rule: This skill should be used when the user asks to 'test a cross-repo feature',
    'deploy a feature branch to staging', 'test SDK against OH Cloud', 'e2e test a
    cloud workspace feature'
  source:
    path: .agents/skills/cross-repo-testing/SKILL.md
    lines: 1-5
  collision_type: scope_ambiguity
  why_distracting: The task involves enterprise/SaaS features (resolver org routing)
    which might seem like a cloud workspace feature requiring cross-repo testing,
    but the task is strictly a backend implementation in the enterprise module.
  severity: medium
hierarchy_analysis: The repository has a single root-level AGENTS.md file providing
