id = "openhands-gitlab-resolver-org-routing"
name = "Route GitLab resolver conversations to claimed org workspaces"
difficulty = "medium"
tags = ["python", "async", "enterprise", "gitlab", "routing"]

[env]
image = "Dockerfile"
context = "environment"

[timeouts]
agent = 1800  # 30 minutes for agent to solve
verifier = 120  # 2 minutes for tests

[repo]
owner = "All-Hands-AI"
name = "OpenHands"
base_commit = "7d04cffe4ec3e723fee04d89a8ba0e19d910c049"
merge_commit = "d058323a8725d45086e9d5a44a6ad55247c3a69d"
pr_number = 13755

[paths]
repo_dir = "/workspace/openhands"
test_output = "/workspace/test_output.json"
log_dir = "/logs"

# No secrets required for this task

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
