source:
  repo: electron/electron
  pr_number: 50739
  base_commit: abfc0ade63a0f43f3458496b365ab04f68754b84
  merge_commit: eb871f7eeecc2ca53dca61c487a428d152696f49
  title: "build: derive patches upstream-head ref from script path (40-x-y)"

agent_config:
  - source: .github/copilot-instructions.md
    origin: agent_config
    rule: |
      Python code should follow existing patterns in the repo - use `import` at top
      of file, constants in UPPER_CASE with underscores, and functions in
      snake_case.

rubric:
  - rule: "Follow existing code style and patterns. Check neighboring Python files for conventions like import order (stdlib first), UPPER_CASE constants, and snake_case functions."
    source:
      path: ".github/copilot-instructions.md"
      lines: "132-136"
      commit: "abfc0ade63a0f43f3458496b365ab04f68754b84"

  - rule: "Preserve original authorship in TODO comments — never change TODO(name) assignees in existing patches."
    source:
      path: ".github/copilot-instructions.md"
      lines: "81-86"
      commit: "abfc0ade63a0f43f3458496b365ab04f68754b84"

  - rule: "Python constants should be in UPPER_CASE with underscores, functions in snake_case."
    source:
      path: ".github/copilot-instructions.md"
      lines: "134-136"
      commit: "abfc0ade63a0f43f3458496b365ab04f68754b84"

checks:
  - id: test_upstream_head_contains_hash_suffix
    description: "UPSTREAM_HEAD should end with an 8-character MD5 hash suffix"
    type: pytest
    file: tests/test_outputs.py

  - id: test_upstream_head_derived_from_script_dir
    description: "UPSTREAM_HEAD should be derived from SCRIPT_DIR using MD5"
    type: pytest
    file: tests/test_outputs.py

  - id: test_legacy_upstream_head_constant
    description: "_LEGACY_UPSTREAM_HEAD should remain the original ref name"
    type: pytest
    file: tests/test_outputs.py

  - id: test_upstream_head_not_equal_to_legacy
    description: "UPSTREAM_HEAD should be different from _LEGACY_UPSTREAM_HEAD"
    type: pytest
    file: tests/test_outputs.py

  - id: test_import_patches_updates_both_refs
    description: "import_patches should update both the new ref and legacy ref"
    type: pytest
    file: tests/test_outputs.py

  - id: test_guess_base_commit_tries_both_refs
    description: "guess_base_commit should try both the new ref and legacy ref"
    type: pytest
    file: tests/test_outputs.py

  - id: test_guess_base_commit_has_loop_for_candidates
    description: "guess_base_commit should use a for loop to try multiple candidate refs"
    type: pytest
    file: tests/test_outputs.py

  - id: test_hashlib_imported
    description: "hashlib module should be imported for MD5 hashing"
    type: pytest
    file: tests/test_outputs.py

  - id: test_module_loads_without_error
    description: "The git module should load without import errors"
    type: pytest
    file: tests/test_outputs.py

  - id: test_upstream_head_format
    description: "UPSTREAM_HEAD should follow the expected format"
    type: pytest
    file: tests/test_outputs.py

  # Pass-to-pass checks: repo CI/CD gates that must pass on both base and fixed commits
  - id: test_git_py_syntax_valid
    type: pass_to_pass
    origin: repo_tests
    description: "script/lib/git.py compiles without syntax errors"

  - id: test_patches_py_syntax_valid
    type: pass_to_pass
    origin: repo_tests
    description: "script/lib/patches.py compiles without syntax errors"

  - id: test_all_script_lib_syntax_valid
    type: pass_to_pass
    origin: repo_tests
    description: "All Python files in script/lib/ compile without syntax errors"

  - id: test_git_module_imports_successfully
    type: pass_to_pass
    origin: repo_tests
    description: "The git module can be imported without errors"

  - id: test_git_module_exports_upstream_head
    type: pass_to_pass
    origin: repo_tests
    description: "The git module exports UPSTREAM_HEAD constant starting with refs/patches/upstream-head"

  - id: test_split_patches
    type: pass_to_pass
    origin: repo_tests
    description: "split_patches correctly splits concatenated patch data"

  - id: test_munge_subject_to_filename
    type: pass_to_pass
    origin: repo_tests
    description: "munge_subject_to_filename generates valid filenames"

  - id: test_filter_patches
    type: pass_to_pass
    origin: repo_tests
    description: "filter_patches correctly filters patches by key"
