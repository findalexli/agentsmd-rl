    type: pass_to_pass
    origin: static
    description: "post_grad.py must parse without syntax errors"

  - id: bfloat16_not_unfused
    type: fail_to_pass
    origin: pr_diff
    description: "bfloat16 addmm must not be unfused (guard prevents replacement)"

  - id: float16_not_unfused
    type: fail_to_pass
    origin: pr_diff
    description: "float16 addmm must not be unfused (guard prevents replacement)"

  - id: guard_returns_early
    type: fail_to_pass
    origin: pr_diff
    description: "Guard returns early (None) before replacement logic for both half dtypes"

  - id: float32_still_unfused
    type: pass_to_pass
    origin: pr_diff
    description: "float32 addmm must still be unfused (guard is not overbroad)"

  - id: float64_still_unfused
    type: pass_to_pass
    origin: pr_diff
    description: "float64 addmm must still be unfused (guard is not overbroad)"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "unfuse_bias_add_to_pointwise has real logic (>= 3 top-level statements)"

  - id: no_trivial_single_use_helpers
    type: pass_to_pass
    origin: agent_config
    description: "No trivial 1-2 LOC helper functions introduced that are only used once"
    source:
      path: "CLAUDE.md"
      lines: "51"
      commit: "bac7b59c6fe3241bb6d6cca89cb4bf1da0662788"

  - id: python310_compat
    type: pass_to_pass
    origin: agent_config
    description: "Modified function must be Python 3.10 compatible"
    source:
      path: ".claude/skills/pr-review/bc-guidelines.md"
      lines: "46-48"
      commit: "bac7b59c6fe3241bb6d6cca89cb4bf1da0662788"

  - id: no_dynamic_attr_access
    type: pass_to_pass
    origin: agent_config
    description: "unfuse_bias_add_to_pointwise must not use dynamic setattr/getattr for state management"
    source:
      path: "CLAUDE.md"
      lines: "53-56"
      commit: "bac7b59c6fe3241bb6d6cca89cb4bf1da0662788"

  - id: test_repo_flake8
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's Python linting (flake8) passes on modified file"

  - id: test_repo_ruff
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's Python linting (ruff) passes on modified file"

  - id: test_repo_python_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "Modified file compiles without syntax errors (py_compile)"

  - id: test_repo_bandit
    type: pass_to_pass
    origin: repo_tests
    description: "Security linting (bandit) passes on modified file"

