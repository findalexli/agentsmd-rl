distractors:
- rule: When working on a bug, first create a standalone file that reproduces the
    bug and verify it fails in the expected way.
  collision_type: scope_ambiguity
  why_distracting: The bug involves a compounding accuracy regression (RMSE > 3.0x)
    specifically observed on Whisper (openai/whisper-tiny) running on an H100 GPU.
    Instructing the agent to first create a standalone reproduction file is highly
    distracting because reproducing a deep model's compounding floating-point truncation
    error on specific hardware is extremely difficult and time-consuming for an agent
    environment, likely leading to wasted effort or hallucinated reproduction scripts.
  severity: high
  source:
    path: AGENTS.md
    lines: 2-6
- rule: Use our test class and test runner... To test Tensor equality, use assertEqual.
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to write a standard unit test using `assertEqual`
    to verify the fix. However, the issue is a subtle numerical precision degradation
    that only exceeds thresholds after compounding through multiple layers (e.g.,
    8 attention layers). A simple unit test checking tensor equality would likely
    fail to capture the essence of the bug, and writing a full model-level test is
    out of scope for this PR.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 13-22
hierarchy_analysis: The config hierarchy consists of CLAUDE.md and AGENTS.md at the
  root level. There are no direct conflicts between the files, but both heavily emphasize
  testing and reproduction (AGENTS.md requires a standalone repro, CLAUDE.md dictates
  the test framework). In the context of this specific issue (a hardware-specific,
  deep-model compounding accuracy regression), these testing rules act as strong distractors
  because a minimal, targeted fix to the compiler pass is required without the overhead
  of a complex model-level reproduction.
