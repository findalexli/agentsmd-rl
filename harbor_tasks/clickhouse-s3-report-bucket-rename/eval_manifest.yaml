rubric:
- rule: 'When writing text such as documentation, comments, or commit messages, wrap
    literal names from classes and functions inside inline code blocks, such as: `ClassName`
    or `function_name`.'
  source:
    path: AGENTS.md
    lines: 5-6
    commit: d0432097aed783bd35054dce2edcefe0c4e5122c
- rule: When writing text such as documentation, comments, or commit messages, write
    names of functions and methods as `f` instead of `f()` - prefer it for mathematical
    purity when it refers to a function itself rather than its application.
  source:
    path: AGENTS.md
    lines: 9-10
    commit: d0432097aed783bd35054dce2edcefe0c4e5122c
- rule: When mentioning logical errors in comments or messages, say 'exception' instead
    of 'crash', because they don't crash the server in the release build.
  source:
    path: AGENTS.md
    lines: '11'
    commit: d0432097aed783bd35054dce2edcefe0c4e5122c
- rule: Scan all changed lines for typos in comments, variable names, string literals,
    log messages, error messages, and documentation. Error messages should be clear,
    informative, and help the user understand what went wrong.
  source:
    path: .claude/skills/review/SKILL.md
    lines: 96-99
    commit: d0432097aed783bd35054dce2edcefe0c4e5122c
- rule: When creating or updating a pull request, use `.github/PULL_REQUEST_TEMPLATE.md`
    as the PR body template. Follow the template exactly. The 'Bug Fix' category should
    be used only for real bug fixes, while for fixing CI reports use the 'CI Fix or
    Improvement' category.
  source:
    path: AGENTS.md
    lines: '161'
    commit: d0432097aed783bd35054dce2edcefe0c4e5122c
distractors:
- rule: Links to ClickHouse CI should be analyzed using the tool at `.claude/tools/fetch_ci_report.js`
  collision_type: scope_ambiguity
  why_distracting: The task involves modifying CI scripts that handle S3 paths and
    HTML reports. An agent might see 'CI reports' in the task description and think
    it needs to fetch and analyze CI reports using the provided tool to understand
    the current behavior or verify the changes. However, this is a pure codebase refactoring
    and feature addition task. Running the tool would be a waste of time and might
    lead the agent down a rabbit hole of analyzing specific test failures instead
    of updating the Python scripts.
  severity: medium
  source:
    path: AGENTS.md
    lines: 14-33
- rule: When writing text such as documentation, comments, or commit messages, write
    names of functions and methods as `f` instead of `f()`
  collision_type: meta_confusion
  why_distracting: 'The task instructions explicitly use `f()` notation: `TestCaseIssueCatalog.from_s3()`
    and `_download_catalog(cls, bucket, suffix="")`. An agent might try to ''correct''
    the task instructions or overthink how to format these names in the code, but
    the rule applies strictly to text/comments, not the actual Python method definitions
    or calls.'
  severity: low
  source:
    path: AGENTS.md
    lines: 10-11
hierarchy_analysis: The AGENTS.md file contains general repository guidelines, mostly
  focused on documentation, git workflow, and specific debugging tools. Since this
  task is a straightforward Python refactoring and feature addition in the `ci/` directory,
  most of these rules are not directly applicable and serve as potential distractors.
