version: "2.0"

source:
  repo: "vercel/next.js"
  pr: 92135
  base_commit: "cb0d88f6e3e340216d478e0ba0c201ec23f7c15c"
  merge_commit: "35f26a2fac583b84baee785d680e4acf0a217b34"

checks:
  - id: remove_event_handler
    type: fail_to_pass
    origin: pr_diff
    description: "Watchpack 'remove' handler exists and triggers process exit on directory deletion"

  - id: missing_option_in_watchpack
    type: fail_to_pass
    origin: pr_diff
    description: "Watchpack watch call includes 'missing' option for directory deletion detection"

  - id: distdir_ancestor_walking
    type: fail_to_pass
    origin: pr_diff
    description: "Ancestor directories of absDistDir inside dir are collected for watching"

  - id: change_handler_guards_config_files
    type: fail_to_pass
    origin: pr_diff
    description: "Change handler only responds to config file changes, not directory changes"

  - id: file_syntax_valid
    type: pass_to_pass
    origin: static
    description: "start-server.ts has balanced braces and no obvious syntax issues"

  - id: restart_exit_code_in_remove
    type: pass_to_pass
    origin: static
    description: "Remove handler uses RESTART_EXIT_CODE for process exit"

  - id: dev_only_code_guard
    type: pass_to_pass
    origin: agent_config
    description: "File watching code is inside the if (isDev) guard"
    source:
      path: "AGENTS.md"
      lines: "300"
      commit: "cb0d88f6e3e340216d478e0ba0c201ec23f7c15c"

  - id: repo_start_server_syntax
    type: pass_to_pass
    origin: static
    description: "Repo's start-server.ts has balanced braces and valid syntax"

  - id: repo_valid_imports_in_start_server
    type: pass_to_pass
    origin: static
    description: "start-server.ts imports are well-formed"

  - id: repo_no_debugger_in_start_server
    type: pass_to_pass
    origin: static
    description: "start-server.ts has no debugger statements or console.log left behind"

  - id: repo_node_syntax_check
    type: pass_to_pass
    origin: repo_tests
    description: "Node.js can parse start-server.ts without major syntax errors"

  - id: repo_git_status
    type: pass_to_pass
    origin: repo_tests
    description: "Git repository has clean status at base commit"

  - id: repo_package_json_valid
    type: pass_to_pass
    origin: repo_tests
    description: "package.json is valid JSON"

  - id: repo_critical_files_exist
    type: pass_to_pass
    origin: repo_tests
    description: "Critical source files exist and are readable"

rubric:
  - rule: "File watching with directory deletion detection should be inside an isDev or __NEXT_DEV_SERVER guard (dev-server-only behavior)"
    source:
      path: "AGENTS.md"
      lines: "265-270"
      commit: "cb0d88f6e3e340216d478e0ba0c201ec23f7c15c"

  - rule: "File watching code for config changes should be inside the if (isDev) guard and use process.exit(RESTART_EXIT_CODE) for restarts"
    source:
      path: "AGENTS.md"
      lines: "428-432"
      commit: "cb0d88f6e3e340216d478e0ba0c201ec23f7c15c"

  - rule: "Use Log.warn() for config change warnings and Log.error() for directory deletion errors, not console.log"
    source:
      path: "packages/next/src/server/lib/start-server.ts"
      lines: "73-86"
      commit: "cb0d88f6e3e340216d478e0ba0c201ec23f7c15c"
