source:
  repository: ant-design/ant-design
  pr_number: 57511
  pr_title: "fix: adapt shadow tokens for dark theme"
  base_commit: 9702dbb57d3cb8ce4346b96c895e6fd6f43e56d3
  merge_commit: c046f6e502de0ca1197c71b770a3bdf2e35c2a88

checks:
  - id: test_shadow_tokens_adapt_to_dark_theme
    type: fail_to_pass
    origin: pr_behavior
    description: Shadow tokens should adapt to dark theme using white-based colors

  - id: test_dark_theme_box_shadow_values
    type: fail_to_pass
    origin: pr_behavior
    description: Dark theme boxShadow should use dynamic shadow colors from theme

  - id: test_dark_theme_box_shadow_card_values
    type: fail_to_pass
    origin: pr_behavior
    description: Dark theme boxShadowCard should use dynamic shadow colors

  - id: test_color_shadow_token_defined
    type: fail_to_pass
    origin: pr_behavior
    description: colorShadow token should be defined in ColorNeutralMapToken interface

  - id: test_dark_theme_color_shadow_white
    type: fail_to_pass
    origin: pr_behavior
    description: Dark theme should define colorShadow as white-based color

  - id: test_default_theme_color_shadow_black
    type: fail_to_pass
    origin: pr_behavior
    description: Default theme should define colorShadow as black-based color

  - id: test_theme_jest_tests_pass
    type: pass_to_pass
    origin: repo_tests
    description: Repo's theme tests should pass

  - id: test_alias_module_valid_typescript
    type: pass_to_pass
    origin: repo_tests
    description: alias.ts module should be valid TypeScript

  - id: test_theme_module_structure
    type: pass_to_pass
    origin: static
    description: Theme module structure should be intact

  - id: test_repo_eslint_theme_files
    type: pass_to_pass
    origin: repo_tests
    description: ESLint passes on theme files modified by PR

  - id: test_repo_biome_ci_theme_files
    type: pass_to_pass
    origin: repo_tests
    description: Biome CI checks pass on theme files modified by PR

# Note: This is a code-only PR (no config/doc file changes).
# The rubric judge evaluates config file edits, which are not applicable here.
# Keeping minimal rubric rules per instructions, but they cannot be evaluated by the judge.
rubric:
  - id: code_uses_design_tokens
    description: "Code changes should use design tokens from the theme system"
    rule: "Shadow colors derived from colorShadow token using getShadowColor helper"
    reference: "This PR adds getShadowColor() function that uses colorShadow token - a code change, not a config file edit"
