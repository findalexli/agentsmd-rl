      file: "CLAUDE.md"
      section: "Code quality standards"

  - rule: "Use descriptive, self-explanatory variable names"
    type: soft
    description: "Variable and function names should be clear and descriptive"
    source:
      file: "CLAUDE.md"
      section: "Code quality standards"

  - rule: "Follow existing patterns in the codebase"
    type: soft
    description: "Changes should follow existing patterns in the codebase being modified"
    source:
      file: "CLAUDE.md"
      section: "Code quality standards"

  - rule: "Maintain stable public interfaces"
    type: soft
    description: "Preserve function signatures, argument positions, and names for exported/public methods"
    source:
      file: "CLAUDE.md"
      section: "Core development principles"

  - rule: "Use Google-style docstrings with Args section"
    type: soft
    description: "All public functions should use Google-style docstrings"
    source:
      file: "CLAUDE.md"
      section: "Documentation standards"

  - rule: "Focus on why rather than what in descriptions"
    type: soft
    description: "Documentation should explain why, not just what"
    source:
      file: "CLAUDE.md"
      section: "Documentation standards"

  - rule: "Types go in function signatures, NOT in docstrings"
    type: soft
    description: "Do not repeat type information in docstrings"
    source:
      file: "CLAUDE.md"
      section: "Documentation standards"

  - rule: "Ensure American English spelling"
    type: soft
    description: "Use American English spelling (behavior, not behaviour)"
    source:
      file: "CLAUDE.md"
