rubric:
- rule: When adding new types or changing core data structures in complex algorithms,
    add doc comments explaining the purpose and behavior
  source:
    path: CLAUDE.md
    lines: '228'
    commit: 639bc4351cd7b5daa38b99d47a506dec68e95353
  reference: '+        /// Set of active component indices during traversal. At `**/X`

    +        /// boundaries the walker needs to both advance past X and keep the

    +        /// outer `**` alive; rather than visiting the directory twice, both

    +        /// states are tracked in one set and evaluated in a single readdir.'
- rule: Always use `bun.*` APIs instead of `std.*`.
  source:
    path: src/CLAUDE.md
    lines: 18-20
  evidence: The gold solution uses `bun.bit_set.AutoBitSet` instead of `std.bit_set`
    to implement the `ComponentSet` for tracking active component indices.
  category: architecture
distractors:
- rule: 'When multi-file tests are required: ... await using proc = Bun.spawn(...)'
  collision_type: scope_ambiguity
  why_distracting: Testing `Bun.Glob.scan()` requires creating a multi-file directory
    structure (e.g., `node_modules/**/*.js`) to reproduce the bug. The agent might
    interpret this as a 'multi-file test' and use `Bun.spawn` to run the test in a
    separate process. However, `Bun.Glob.scan()` is a JS API that should be tested
    directly in the same process using `tempDir` to create the files, rather than
    spawning a new process just to call the API.
  severity: medium
  source:
    path: test/CLAUDE.md
    lines: 44-62
- rule: Never use `@import()` inline inside of functions. Always put them at the bottom
    of the file or containing struct.
  collision_type: rule_conflict
  why_distracting: The gold solution defines `const ComponentSet = bun.bit_set.AutoBitSet;`
    inside the `GlobWalker_` function. An agent might mistakenly think this violates
    the rule against inline imports and try to move it to the bottom of the file or
    add an `@import` at the bottom. However, `bun` is already available and type aliases
    inside functions are perfectly valid Zig as long as they aren't inline `@import()`s.
  severity: low
  source:
    path: src/CLAUDE.md
    lines: 13-14
hierarchy_analysis: The hierarchy consists of root-level `CLAUDE.md` and `AGENTS.md`
  files, with specific overrides in `src/` and `test/` directories. The `src/CLAUDE.md`
  file provides Zig-specific guidelines, emphasizing the use of `bun.*` APIs over
  `std.*`, which is crucial for the `GlobWalker.zig` changes. The `test/CLAUDE.md`
  file provides testing guidelines, but its distinction between single-file and multi-file
  tests can be ambiguous for API tests that require multi-file fixtures but don't
  need to spawn a separate Bun process.
