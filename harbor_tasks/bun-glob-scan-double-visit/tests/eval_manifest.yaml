rubric:
- rule: When adding new types or changing core data structures in complex algorithms,
    add doc comments explaining the purpose and behavior
  source:
    path: CLAUDE.md
    lines: '228'
    commit: 639bc4351cd7b5daa38b99d47a506dec68e95353
  reference: '+        /// Set of active component indices during traversal. At `**/X`

    +        /// boundaries the walker needs to both advance past X and keep the

    +        /// outer `**` alive; rather than visiting the directory twice, both

    +        /// states are tracked in one set and evaluated in a single readdir.'
- rule: Always use `bun.*` APIs instead of `std.*`.
  source:
    path: src/CLAUDE.md
    lines: 18-20
  evidence: The gold solution uses `bun.bit_set.AutoBitSet` instead of `std.bit_set`
    to implement the `ComponentSet` for tracking active component indices.
  category: architecture
- rule: Always use bun.* APIs instead of std.*
  source:
    path: src/AGENTS.md
    lines: 15-28
  evidence: The gold solution uses `bun.bit_set.AutoBitSet` in `GlobWalker.zig` instead
    of reaching for `std.bit_set`, adhering to the rule to prefer Bun APIs over the
    standard library.
  category: architecture
- rule: 'Decl literals in Zig are recommended. const decl: Decl = .{ .binding = 0,
    .value = 0 };'
  source:
    path: src/AGENTS.md
    lines: 6-7
  evidence: In `src/collections/bit_set.zig`, the `iterator` method returns `.{ .static
    = s.iterator(options) }` and `.{ .dynamic = d.iterator(options) }`, correctly
    using the recommended decl literal syntax inst
  category: style
distractors:
- rule: "bun.sys \u2014 System Calls (src/sys.zig) ... Key functions: openat, read,\
    \ etc."
  collision_type: architecture_boundary
  why_distracting: The bug description explicitly complains about 'redundant openat
    + readdir + close syscalls'. The config file provides a large section detailing
    how to use `bun.sys.openat`, `bun.sys.read`, and `bun.sys.File`. An agent might
    be tempted to implement a directory caching mechanism at the `bun.sys` level or
    modify the I/O calls directly, missing that the correct fix is algorithmic (fixing
    the NFA state duplication in `GlobWalker.zig`).
  severity: high
  source:
    path: src/AGENTS.md
    lines: 30-70
- rule: Do not write flaky tests. Unless explicitly asked, never wait for time to
    pass in tests.
  collision_type: would_cause_bug
  why_distracting: The bug is described as a performance issue where the scan 'takes
    roughly 2x longer'. An agent writing a regression test might try to measure execution
    time (e.g., using `performance.now()`) to assert the fix, which directly violates
    the rule against writing flaky tests.
  severity: medium
  source:
    path: test/AGENTS.md
    lines: 15-17
hierarchy_analysis: The config hierarchy requires the agent to apply domain-specific
  rules based on the file being edited. `src/AGENTS.md` governs the Zig implementation
  (enforcing `bun.*` APIs and decl literals), while `test/AGENTS.md` governs the test
  file. The root `AGENTS.md` provides the overarching build commands. The agent must
  synthesize these separate domain rules without letting the extensive `bun.sys` documentation
  distract from the algorithmic nature of the bug.
