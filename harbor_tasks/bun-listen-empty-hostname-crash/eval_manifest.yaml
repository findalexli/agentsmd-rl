distractors:
- rule: When spawning Bun processes, use `bunExe` and `bunEnv` from `harness`.
  collision_type: scope_ambiguity
  why_distracting: The bug report mentions a 'panic/crash', which might lead an agent to think it needs to spawn a separate process using `Bun.spawn` to catch the crash. However, the fix changes the crash to a synchronous JS exception, so a simple `expect().toThrow()` in the same process is correct. Spawning a process would overcomplicate the test and violate the rule against checking output for panics.
  severity: medium
  source:
    path: test/AGENTS.md
    lines: 40-58
- rule: 'Prefer concurrent tests over sequential tests: When multiple tests in the same file spawn processes or write files, make them concurrent'
  collision_type: scope_ambiguity
  why_distracting: The agent might try to use `it.concurrent` for the new tests. However, the rule specifically applies when tests 'spawn processes or write files'. Since these tests only check synchronous validation logic, concurrency is unnecessary.
  severity: low
  source:
    path: test/AGENTS.md
    lines: 21-22
