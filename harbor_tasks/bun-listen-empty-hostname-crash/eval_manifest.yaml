rubric:
- rule: Code changes in src/bun.js/api/bun/socket/Handlers.zig and test/js/bun/net/socket.test.ts
    follow repository conventions.
- rule: 'Never use hardcoded port numbers. Always use `port: 0` to get a random port.'
  source:
    path: test/CLAUDE.md
    lines: 17-18
  evidence: 'The test explicitly passes `port: 0` in the `Bun.listen` and `Bun.connect`
    calls.'
  category: testing
- rule: NEVER write tests that check for no "panic" or "uncaught exception" or similar
    in the test output.
  source:
    path: CLAUDE.md
    lines: 86-87
  evidence: The test asserts that a specific error is thrown (`expect(...).toThrow('Expected
    a non-empty "hostname"')`) rather than checking process output for panics.
  category: testing
distractors:
- rule: Prefer concurrent tests over sequential tests
  collision_type: scope_ambiguity
  why_distracting: The test only performs synchronous validation checks that throw
    immediately. It does not spawn processes or write files, so concurrency is not
    needed and the gold solution uses standard `it()` instead of `it.concurrent()`.
  severity: medium
  source:
    path: test/CLAUDE.md
    lines: 18-20
- rule: For single-file tests, prefer `-e` over `tempDir`... When spawning processes,
    tests should expect(stdout).toBe(...)
  collision_type: meta_confusion
  why_distracting: Because the original bug was a panic/crash, an agent might think
    it needs to spawn a separate process using `Bun.spawn` to test the crash behavior.
    However, the fix converts the panic into a standard JS `TypeError` which can be
    caught synchronously with `expect().toThrow()`. Spawning a process is unnecessary
    and inefficient.
  severity: high
  source:
    path: CLAUDE.md
    lines: 44-45
hierarchy_analysis: 'The hierarchy includes root-level CLAUDE.md and AGENTS.md, as
  well as test-specific and src-specific config files. The test-specific config reinforces
  the root config''s rule about using `port: 0`. The src-specific config focuses on
  Zig system calls, which is not highly relevant here since the fix only involves
  throwing a JS error via `global.throwInvalidArguments`.'
