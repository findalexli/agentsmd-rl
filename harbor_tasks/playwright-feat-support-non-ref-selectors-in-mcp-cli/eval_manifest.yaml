config_edits: []
distractors:
- rule: docs/src/ API documentation — source of truth for public TypeScript types
  collision_type: scope_ambiguity
  why_distracting: The config states that `docs/src/` is the source of truth for API documentation. An agent might mistakenly try to document the new CLI/MCP selector feature in the public API docs, but this is an internal tool feature and the instruction explicitly requests updating the agent's own `SKILL.md` file.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 34-35
- rule: Define API in Documentation
  source:
    path: .claude/skills/playwright-dev/api.md
    lines: 7-7
  source_text: Define (or update) API in `docs/src/api/class-xxx.md`. For the new methods, params and options use the version from package.json (without `-next`).
  collision_type: scope_ambiguity
  why_distracting: An agent working on adding a selector option to MCP tools might mistake it for a public API change and attempt to update the Playwright docs in docs/src/api/class-xxx.md. However, MCP tools are an internal CLI capability, not part of the public Playwright class API.
  severity: medium
- rule: Implement Client API
  source:
    path: .claude/skills/playwright-dev/api.md
    lines: 71-71
  source_text: Implement the new API in `packages/playwright-core/src/client/xxx.ts`.
  collision_type: architecture_boundary
  why_distracting: The agent might assume modifying tool arguments requires modifying the Node.js client SDK in packages/playwright-core/src/client. However, MCP tools run atop the Playwright library and operate without needing changes to core client interfaces.
  severity: high
- rule: Define Protocol Channel
  source:
    path: .claude/skills/playwright-dev/api.md
    lines: 100-100
  source_text: Define (or update) channel for the API in `packages/protocol/src/protocol.yml` as needed.
  collision_type: architecture_boundary
  why_distracting: Since arguments flow from the CLI to the daemon, an agent might incorrectly believe it needs to update the core RPC protocol in protocol.yml. But MCP tools communicate via MCP over standard streams or WebSockets using JSON-RPC, completely separate from Playwright's internal page/context protocol.
  severity: high
hierarchy_analysis: The configuration consists of a single root CLAUDE.md file. The primary challenge is not hierarchy resolution, but rather distinguishing between public documentation rules in the config and the explicit instruction to update the agent's internal skill documentation.
