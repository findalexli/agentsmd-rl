  evidence: 'The gold diff correctly modifies tool schemas in multiple tools like evaluate.ts and form.ts following the inputSchema pattern (e.g. extending it to z.object({ ref: ..., selector: z.string().optional().describe(''...'') })).'
  category: schema_definition
  verification: llm_judge
- rule: Command Declaration Pattern
  source:
    path: .claude/skills/playwright-dev/mcp-dev.md
    lines: 207-236
  source_text: "const myCommand = declareCommand({\n  name: 'my-command',           // CLI command name (kebab-case)\n  description: 'Does something', // Shown in help\n  category: 'core',             // Category for help grouping\n\n  // Positional arguments (ordered, parsed from CLI positional args)\n  args: z.object({\n    url: z.string().describe('The URL to navigate to'),\n    ref: z.string().optional().describe('Optional element reference'),\n  }),\n\n  // Named options (parsed from --flag or --flag=value)\n  options: z.object({\n    submit: z.boolean().optional().describe('Whether to submit'),\n    filename: z.string().optional().describe('Output filename'),\n  }),\n\n  // MCP tool name — string or function for dynamic routing\n  toolName: 'browser_my_tool',\n  // OR dynamic:\n  // toolName: ({ submit }) => submit ? 'browser_submit' : 'browser_type',\n\n  // Map CLI args/options to MCP tool params\n  toolParams: ({ url, ref, submit, filename }) => ({\n    url,\n    ref,\n    submit,\n    filename,\n  }),\n});"
  evidence: The gold diff strictly follows this structure when modifying commands in commands.ts, keeping args, toolName, and updating toolParams mappings cleanly (e.g. the drag command mapping startElement/endElement to the complex params object using the asRef helper).
  category: command_declaration
  verification: llm_judge
