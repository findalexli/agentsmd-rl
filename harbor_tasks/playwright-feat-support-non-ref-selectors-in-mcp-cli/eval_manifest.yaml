config_edits:
- path: packages/playwright-core/src/skill/SKILL.md
  tier: 1
  gold_added: '## Targeting elements


    By default, use refs from the snapshot to interact with page elements.


    ```bash

    # get snapshot with refs

    playwright-cli snapshot


    # interact using a ref

    playwright-cli click e15

    ```


    You can also use css or role selectors, for example when explicitly asked for
    it.


    ```bash

    # css selector

    playwright-cli click "#main > button.submit"


    # role selector

    playwright-cli click "role=button[name=Submit]"


    # chaining css and role selectors

    playwright-cli click "#footer >> role=button[name=Submit]"

    ```'
  gold_removed: ''
