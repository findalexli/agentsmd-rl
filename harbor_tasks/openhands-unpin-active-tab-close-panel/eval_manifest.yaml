distractors:
- rule: When working on a PR that requires design documents, scripts meant for development-only,
    or other temporary artifacts... store them in a `.pr/` directory
  collision_type: scope_ambiguity
  why_distracting: The agent might create a `.pr/` directory to store temporary files
    (like the test patch) or write a design document for this simple bug fix, which
    is unnecessary and overcomplicates the PR.
  severity: medium
  source:
    path: AGENTS.md
    lines: 41-43
- rule: To set up the entire repo, including frontend and backend, run `make build`.
  collision_type: scope_ambiguity
  why_distracting: The agent might run `make build` to set up the entire repository
    including the backend, which is a waste of time and resources since only frontend
    changes are required.
  severity: low
  source:
    path: AGENTS.md
    lines: 5-7
- rule: This skill should be used when the user asks to 'test a cross-repo feature',
    'deploy a feature branch to staging', 'test SDK against OH Cloud', 'e2e test a
    cloud workspace feature'...
  source:
    path: .agents/skills/cross-repo-testing/SKILL.md
    lines: 1-3
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to write or run cross-repo e2e tests to
    verify the right panel visibility across the full stack, but the task only requires
    frontend unit tests.
  severity: medium
