distractors:
- rule: npm run ctest <filter> | Chromium only library tests — use during development
  collision_type: meta_confusion
  why_distracting: The agent might try to run `npm run ctest` to test the evaluate
    tool since it's a core feature, but MCP tools have their own specific test command
    `npm run ctest-mcp`.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 46-48
- rule: 'Decision rule: Does the test need browser/browserType/context -> tests/library/.
    Just needs page + server -> tests/page/.'
  collision_type: architecture_boundary
  why_distracting: The agent might think the evaluate tool tests belong in `tests/page/`
    because the tool uses `page.evaluate` internally, but MCP tools have their own
    dedicated directory `tests/mcp/`.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 71-71
hierarchy_analysis: The repository uses a single `CLAUDE.md` file at the root level.
  The main challenge for an agent is navigating the specific test commands and directories
  for different subsystems (e.g., MCP tools vs. core library tests). The agent must
  correctly identify that the `browser_evaluate` tool falls under the MCP subsystem
  and use the corresponding `ctest-mcp` command and `tests/mcp/` directory, ignoring
  the general library test guidelines.
