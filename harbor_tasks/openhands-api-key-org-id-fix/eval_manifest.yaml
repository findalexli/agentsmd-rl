distractors:
- rule: 'Backend: Located in the `openhands` directory'
  collision_type: architecture_boundary
  why_distracting: The rule states the backend is located in the `openhands` directory,
    but the target file for this fix is in the `enterprise/` directory. The agent
    might incorrectly search for the file inside `openhands/` or assume it's modifying
    the wrong file.
  severity: high
  source:
    path: AGENTS.md
    lines: 48-49
- rule: Store design documents, scripts, or temporary artifacts in a `.pr/` directory
  collision_type: scope_ambiguity
  why_distracting: The agent might create a `.pr/analysis.md` or `.pr/notes.md` file
    to document its investigation of the API key organization bug, wasting time and
    tokens on a simple bug fix that doesn't require design docs.
  severity: low
  source:
    path: AGENTS.md
    lines: 26-34
- rule: Run `pre-commit run --config ./dev_config/python/.pre-commit-config.yaml`
    for backend changes
  collision_type: scope_ambiguity
  why_distracting: The agent might run the pre-commit hook specifically designed for
    the `openhands` backend (`./dev_config/python/.pre-commit-config.yaml`) after
    modifying the `enterprise` code, which could fail, format unrelated files, or
    lead the agent down a rabbit hole of fixing unrelated lint issues.
  severity: medium
  source:
    path: AGENTS.md
    lines: 13-14
hierarchy_analysis: The AGENTS.md file provides general repository guidelines, but
  its strict definition of the backend being in the `openhands` directory conflicts
  with the reality that enterprise backend code lives in the `enterprise` directory.
  This creates an architecture boundary collision for agents trying to locate or lint
  the target file.
