    changes, but later defines the backend as being located in the `openhands` directory.
    The agent is editing `enterprise/server/`, creating ambiguity about whether this
    pre-commit rule applies to the enterprise directory.
  severity: low
  source:
    path: AGENTS.md
    lines: 20-21
- rule: Store design documents, analysis, and temporary artifacts in a `.pr/` directory
  collision_type: scope_ambiguity
  why_distracting: The agent might waste time and tokens creating a `.pr/analysis.md`
    or `.pr/notes.md` file to document its debugging process, which is unnecessary
    for this straightforward bug fix.
  severity: low
  source:
    path: AGENTS.md
    lines: 38-40
