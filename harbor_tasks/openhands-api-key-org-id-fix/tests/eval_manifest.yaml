distractors:
- rule: 'Backend: Located in the `openhands` directory'
  collision_type: architecture_boundary
  why_distracting: The rule states the backend is located in the `openhands` directory,
    but the file to modify is in `enterprise/server/utils/`. The agent might hesitate
    to modify the enterprise directory or look for the wrong file.
  severity: medium
  source:
    path: AGENTS.md
    lines: 58-59
- rule: Use cross-repo-testing skill when changes span the SDK and OpenHands server
    repos.
  source:
    path: .agents/skills/cross-repo-testing/SKILL.md
    lines: 1-5
  collision_type: scope_ambiguity
  why_distracting: The agent might assume that since this bug involves API keys and
    SaaS metadata, it needs to perform cross-repo testing with the SDK. However, this
    is a purely backend fix in the enterprise server and does not require cross-repo
    testing.
  severity: low
hierarchy_analysis: The config is a single flat file (AGENTS.md) with generic repository
  instructions. There is no complex hierarchy.
