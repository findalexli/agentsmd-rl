rubric:
- rule: 'Code changes must compile with cargo check --package sui-benchmark'
  source:
    path: crates/sui-benchmark/src/options.rs
  reference: cargo check --package sui-benchmark passes
- rule: 'Code changes must pass cargo fmt --check linting'
  source:
    path: crates/sui-benchmark/src/bin/stress.rs
  reference: cargo fmt --check passes
distractors:
- rule: Use `#[cfg(test)]` for test-only code used within the same crate.
  collision_type: would_cause_bug
  why_distracting: The prompt states the new flag is needed for 'CI smoke tests'.
    An agent might misinterpret this as 'test-only code' and added the `#[cfg(test)]`
    attribute to the `min_tps` field or its validation logic. Doing so would compile
    the feature out of the actual stress binary used in CI, breaking the requested
    functionality.
  severity: high
  source:
    path: CLAUDE.md
    lines: 74-76
- rule: All new files must start with the following license in comments at the top
    of the file
  collision_type: scope_ambiguity
  why_distracting: The task instruction states 'The project requires all files to
    have Apache-2.0 license headers', but the config clarifies this applies to 'All
    new files'. An agent might waste effort trying to prepend license headers to the
    existing `stress.rs` and `options.rs` files, potentially duplicating existing headers.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 14-19
hierarchy_analysis: The hierarchy is flat, with `AGENTS.md` simply deferring to the
  root `CLAUDE.md`. All relevant rules are contained within a single root configuration
  file.
version: '2.0'
