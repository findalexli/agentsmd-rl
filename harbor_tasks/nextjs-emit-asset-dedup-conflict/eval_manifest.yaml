distractors:
- rule: Start `pnpm --filter=next dev` in a separate terminal session before making
    edits for iterative development.
  collision_type: scope_ambiguity
  why_distracting: The rule suggests running `pnpm --filter=next dev` for fast local
    development when changing Next.js source. However, the PR modifies Rust code in
    `crates/next-core`. The JS/TS dev server watch mode does not automatically recompile
    Rust Turbopack changes in the background in the same way, which could confuse
    an agent expecting instant reloads.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 65-67
- rule: 'For type errors only: Use `pnpm --filter=next types` instead of `pnpm --filter=next
    build`.'
  collision_type: scope_ambiguity
  why_distracting: The rule advises using `pnpm --filter=next types` to check for
    type errors. An agent might run this to verify its Rust changes in `emit.rs`,
    but this command only runs TypeScript type checking (`tsc`) for the JS/TS packages,
    not `cargo check` for Rust.
  severity: high
  source:
    path: CLAUDE.md
    lines: 81-81
- rule: Run tests fast using NEXT_SKIP_ISOLATE=1 NEXT_TEST_MODE=<mode> pnpm testheadless
    test/path/to/test.ts.
  collision_type: scope_ambiguity
  why_distracting: The rule provides a command (`pnpm testheadless test/path/to/test.ts`)
    for running tests fast. An agent might try to use this JS/TS testing command to
    test its Rust changes, rather than using `cargo test` for the Turbopack crates.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 74-77
hierarchy_analysis: The config files (`CLAUDE.md` and `AGENTS.md`) are identical and
  primarily focus on the JS/TS parts of the Next.js monorepo (e.g., `packages/next`).
  They lack specific guidance for the Rust codebase (`crates/`, `turbopack/`). This
  creates a significant scope ambiguity where agents might apply JS/TS workflow commands
  (like `pnpm --filter=next types` or `pnpm testheadless`) to Rust development tasks.
