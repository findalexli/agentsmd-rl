distractors:
- rule: 'Fail-closed behavior for agents: If coordination evidence cannot be found,
    do not proceed to PR-ready output.'
  collision_type: meta_confusion
  why_distracting: The repository guidelines mandate failing closed and refusing to
    output PR-ready code if coordination evidence (like an issue link) is missing.
    An agent might strictly follow this and refuse to generate the requested patch.
  severity: high
  source:
    path: AGENTS.md
    lines: 63-66
- rule: 'No low-value busywork PRs: Do not open one-off PRs for tiny edits.'
  collision_type: scope_ambiguity
  why_distracting: The fix is relatively small (replacing one line with a hardcoded
    tuple). The agent might incorrectly classify this as a 'tiny edit' or 'low-value
    busywork' and refuse to implement the fix based on this policy.
  severity: medium
  source:
    path: AGENTS.md
    lines: 45-47
hierarchy_analysis: The configuration is flat, with identical rules in `AGENTS.md`
  and `CLAUDE.md` at the root level. The primary challenge is the conflict between
  the user's direct instruction to fix the file and the repository's strict agent
  contribution policies.
