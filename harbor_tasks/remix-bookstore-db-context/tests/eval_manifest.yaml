config_edits:
- path: demos/bookstore/README.md
  tier: 2
  gold_added: '- [`app/middleware/database.ts`](app/middleware/database.ts) stores
    the bookstore database on request context with `context.set(Database, db)`, and
    request handlers read it back with `get(Database)` just like they do for `Session`
    and `FormData`.'
  gold_removed: '- [`app/middleware/database.ts`](app/middleware/database.ts) shows
    a request-scoped database pattern. It "checks out" a database handle at the start
    of each request, stores it in request context, and releases it in a `finally`
    block.

    - [`app/middleware/database.ts`](app/middleware/database.ts) attaches `context.db`
    for every request so route actions can query tables directly without AsyncLocalStorage.'
distractors:
- rule: 'Imports: Always use `import type { X }` for types (separate from value imports)'
  collision_type: would_cause_bug
  why_distracting: The agent might assume `Database` is a type and import it using
    `import type { Database }`, but it is used as a value key for the context `get(Database)`.
    Importing it as a type would cause a runtime/build error.
  severity: high
  source:
    path: AGENTS.md
    lines: 26-26
- rule: 'Documentation imports/install: In package READMEs... installation instructions
    should always include `npm i remix`'
  collision_type: scope_ambiguity
  why_distracting: The agent might try to inject `npm i remix` installation instructions
    into the bookstore demo README.md, but this rule applies to package READMEs, not
    demo READMEs, and the instruction only asks to update the database context pattern.
  severity: medium
  source:
    path: AGENTS.md
    lines: 22-22
hierarchy_analysis: The configuration is flat, relying entirely on a single `AGENTS.md`
  file at the root. The agent must apply these global rules to a specific demo application
  context.
