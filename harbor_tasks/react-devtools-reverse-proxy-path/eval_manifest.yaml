config_edits:
- path: packages/react-devtools-core/README.md
  tier: 2
  gold_added: '| `path`                 | `""`          | Path appended to the WebSocket
    URI (e.g. `"/__react_devtools__/"`). Useful when proxying through a reverse proxy
    on a subpath. A leading `/` is added automatically if missing. |

    #### `startServer(port?, host?, httpsOptions?, loggerOptions?, path?, clientOptions?)`

    | `port` | `8097` | Port the local server listens on. |

    | `host` | `"localhost"` | Host the local server binds to. |

    | `path` | | _Optional_ path to append to the WebSocket URI served to connecting
    clients (e.g. `"/__react_devtools__/"`). Also set via the `REACT_DEVTOOLS_PATH`
    env var in the Electron app. |

    | `clientOptions` | | _Optional_ object with client-facing overrides (see below).
    |


    ##### `clientOptions`


    When connecting through a reverse proxy, the client may need to connect to a different
    host, port, or protocol than the local server. Use `clientOptions` to override
    what appears in the `connectToDevTools()` script served to clients. Any field
    not set falls back to the corresponding server value.


    | Field | Default | Description |

    |---|---|---|

    | `host` | server `host` | Host the client connects to. |

    | `port` | server `port` | Port the client connects to. |

    | `useHttps` | server `useHttps` | Whether the client should use `wss://`. |


    These can also be set via environment variables in the Electron app:


    | Env Var | Description |

    |---|---|

    | `REACT_DEVTOOLS_CLIENT_HOST` | Overrides the host in the served client script.
    |

    | `REACT_DEVTOOLS_CLIENT_PORT` | Overrides the port in the served client script.
    |

    | `REACT_DEVTOOLS_CLIENT_USE_HTTPS` | Set to `"true"` to make the served client
    script use `wss://`. |


    ##### Reverse proxy example


    Run DevTools locally on the default port, but tell clients to connect through
    a remote proxy:

    ```sh

    REACT_DEVTOOLS_CLIENT_HOST=remote.example.com \

    REACT_DEVTOOLS_CLIENT_PORT=443 \

    REACT_DEVTOOLS_CLIENT_USE_HTTPS=true \

    REACT_DEVTOOLS_PATH=/__react_devtools__/ \

    react-devtools

    ```

    The server listens on `localhost:8097`. The served script tells clients:

    ```js

    connectToDevTools({host: ''remote.example.com'', port: 443, useHttps: true, path:
    ''/__react_devtools__/''})

    ```'
