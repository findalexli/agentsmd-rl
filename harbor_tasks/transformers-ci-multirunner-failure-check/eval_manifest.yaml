hierarchy_analysis: The hierarchy includes root-level agent instructions (AGENTS.md,
  CLAUDE.md) that enforce strict meta-rules about PR coordination, and a .github-level
  copilot instruction file that gives general coding advice. The agent must ignore
  the meta-rules that block code generation in an evaluation context, and correctly
  scope the 'brief PR' rule to allow a substantial CI infrastructure change.
