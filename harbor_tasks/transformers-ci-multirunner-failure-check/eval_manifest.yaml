rubric:
- rule: PRs should be as brief as possible. Bugfix PRs in particular can often be
    only one or two lines long, and do not need large comments, docstrings or new
    functions in this case. Aim to minimize the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: 882ffdbbd6b8ad50feaa860d702e70950cfc95d0
- rule: Do not add helper methods or abstractions just to satisfy the type checker
    (especially for only 1-2 occurrences).
  source:
    path: .ai/skills/add-or-fix-type-checking/SKILL.md
    lines: '196'
    commit: 882ffdbbd6b8ad50feaa860d702e70950cfc95d0
- rule: make style or make fix-repo should be run as the final step before opening
    a PR — code should pass ruff formatting and linting.
  source:
    path: AGENTS.md
    lines: 2,8
    commit: 882ffdbbd6b8ad50feaa860d702e70950cfc95d0
- rule: PRs should be as brief as possible... Aim to minimize the size of the diff.
  source:
