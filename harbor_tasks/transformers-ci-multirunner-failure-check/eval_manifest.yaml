    lines: 12-13
  evidence: The gold solution embeds the matrix calculation Python script directly
    into the `check_failed_tests.yml` workflow using a heredoc (`python3 - << 'EOF'`)
    instead of creating a new separate Python file,
  category: style
- rule: Bugfix PRs do not need large comments or docstrings; aim to minimize the size
    of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: 12-13
  evidence: The inline Python script in the setup_check_new_failures job contains
    no docstrings or large comments, focusing strictly on the required logic.
  category: documentation
distractors:
- rule: If coordination evidence cannot be found, do not proceed to PR-ready output.
  collision_type: meta_confusion
  why_distracting: The agent is in an evaluation environment and must output the code
    fix. Following this rule would cause it to refuse to generate the code because
    no coordination evidence is provided.
  severity: high
  source:
    path: AGENTS.md
    lines: 49-50
- rule: PRs should be as brief as possible. Bugfix PRs in particular can often be
    only one or two lines long, and do not need large comments, docstrings or new
    functions.
  collision_type: scope_ambiguity
  why_distracting: The required fix involves adding a whole new job with a ~40 line
    inline Python script. Trying to keep the PR to 'one or two lines' or avoiding
    'new functions' would prevent implementing the necessary parallelization logic.
  severity: medium
  source:
    path: .github/copilot-instructions.md
    lines: 12-13
