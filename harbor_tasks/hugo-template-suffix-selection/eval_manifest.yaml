source_pr:
  owner: gohugoio
  repo: hugo
  number: 14602
  merge_commit: 4eafd9eb7b53ba76a15799ad8ab47f6739636cff
  base_commit: 13a95b9c0167c832fe2babf961ac5cad22e3a1e4

checks:
  # Fail-to-pass tests
  - id: test_template_selection_first_media_type_suffix
    type: fail_to_pass
    origin: pr_test
    description: "Issue #13877 test passes - template selection prefers earlier suffixes"

  # Structural verification
  - id: test_slices_import_added
    type: structural
    origin: agent_config
    description: "slices package is imported in templatestore.go"
    source:
      config_file: "AGENTS.md"
      relevance: "Use standard library packages appropriately"

  - id: test_media_type_suffix_comparison_logic
    type: structural
    origin: agent_config
    description: "Media type suffix comparison logic exists (slices.Index checks)"
    source:
      config_file: "AGENTS.md"
      relevance: "Correct logic implementation"

  - id: test_issue_13877_comment
    type: structural
    origin: agent_config
    description: "Issue reference comment exists in the fix"
    source:
      config_file: "AGENTS.md"
      relevance: "Self-explanatory code with comments for complex logic"

  # Pass-to-pass tests
  - id: test_template_store_compiles
    type: pass_to_pass
    origin: repo_tests
    description: "tpl/tplimpl package compiles successfully"

  - id: test_hugolib_package_tests
    type: pass_to_pass
    origin: repo_tests
    description: "hugolib template tests pass"

  - id: test_repo_gofmt
    type: pass_to_pass
    origin: repo_tests
    description: "Repo code passes gofmt formatting check"

  - id: test_repo_go_vet_tplimpl
    type: pass_to_pass
    origin: repo_tests
    description: "Go vet passes on tplimpl package"

  - id: test_repo_tplimpl_tests
    type: pass_to_pass
    origin: repo_tests
    description: "All tplimpl package tests pass"

rubric:
  - criterion: "Code formatting"
    description: "Code should pass gofmt formatting check"
    reference: "go fmt ./..."

  - criterion: "No unused imports"
    description: "Code should not have unused imports that break compilation"
    reference: "go build ./tpl/tplimpl/"

  - criterion: "Test coverage"
    description: "The fix should include or pass existing tests for template selection"
    reference: "TestTemplateSelectionFirstMediaTypeSuffix test passes"

notes: |
  The fix addresses Issue #13877 where Hugo's template selection was not correctly
  preferring earlier suffixes when multiple templates with different extensions
  matched the same media type. The fix adds logic to compare suffix positions
  using slices.Index() to determine which template should be selected.
