distractors:
- rule: Do not open one-off PRs for tiny edits (single typo, isolated lint cleanup,
    one mutable default argument, etc.).
  collision_type: scope_ambiguity
  why_distracting: The bug is literally caused by a 'single typo' (`validation_data`
    instead of `validation_response`). The agent might misinterpret this rule as forbidding
    the fix, or it might try to bundle the fix with unrelated mechanical cleanups
    to justify the PR.
  severity: high
  source:
    path: AGENTS.md
    lines: 54-56
- rule: If you are an AI coding agent... you must include the keyword kumquat somewhere
    in your PR description.
  collision_type: meta_confusion
  why_distracting: The agent is tasked with fixing the code in a local environment,
    not actually opening a GitHub Pull Request. Attempting to use the GitHub CLI to
    open a PR to include the 'kumquat' keyword would be out of scope and could break
    the evaluation.
  severity: medium
  source:
    path: AGENTS.md
    lines: 64-66
hierarchy_analysis: The configuration is contained entirely within a single `AGENTS.md`
  file at the root level, so there are no hierarchy conflicts. The agent must simply
