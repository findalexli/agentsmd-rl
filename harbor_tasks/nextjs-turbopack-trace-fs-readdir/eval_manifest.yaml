version: "2.0"

source:
  repo: "vercel/next.js"
  pr: 92148
  base_commit: "4582b5fa93dd65b6f9ed1dff7e66bdb93ddd653c"
  merge_commit: "a5c0a897f8e692a26e3bf550a6629607805b3a0d"

checks:
  - id: source_files_exist
    type: pass_to_pass
    origin: static
    description: "Required source files exist and are not stubbed"

  - id: fsreaddir_enum_variant
    type: fail_to_pass
    origin: pr_diff
    description: "WellKnownFunctionKind enum has FsReadDir variant in correct ASCII-order position"

  - id: readdir_sync_mapping
    type: fail_to_pass
    origin: pr_diff
    description: "well_known.rs maps both readdir and readdirSync to WellKnownFunctionKind::FsReadDir"

  - id: dir_asset_reference_handler
    type: fail_to_pass
    origin: pr_diff
    description: "references/mod.rs has FsReadDir handler with DirAssetReference, dynamic pattern detection, and error handling"

  - id: fsreaddir_description_in_impl
    type: fail_to_pass
    origin: pr_diff
    description: "FsReadDir has human-readable description in WellKnownFunction impl block"

  - id: wildcard_fixtures_have_fs_import
    type: fail_to_pass
    origin: pr_diff
    description: "NFT test fixture files have const fs = require('fs') for readdir tracing"

  - id: nft_unit_tests_enabled
    type: fail_to_pass
    origin: pr_diff
    description: "NFT unit test cases dirname_emit, dirname_emit_concat, wildcard_require, wildcard3 are enabled"

  - id: well_known_module_intact
    type: pass_to_pass
    origin: static
    description: "well_known.rs fs_module_member function has substantial body with all existing fs method mappings"

  - id: references_module_not_stubbed
    type: pass_to_pass
    origin: static
    description: "references/mod.rs has substantial code in tracing handler section"

  - id: test_repo_prettier_js_files
    type: pass_to_pass
    origin: repo_tests
    description: "Modified JS fixture files pass Prettier format check (npx prettier --check)"

  - id: test_repo_node_syntax_js_files
    type: pass_to_pass
    origin: repo_tests
    description: "Modified JS fixture files have valid Node.js syntax (node --check)"

  - id: test_source_files_no_hard_tabs
    type: pass_to_pass
    origin: static
    description: "Source files use spaces not tabs per .rustfmt.toml hard_tabs=false"

  - id: test_no_trailing_whitespace_on_modified_lines
    type: pass_to_pass
    origin: static
    description: "Source files have no trailing whitespace - standard CI lint check"

  - id: test_unit_rs_valid_rstest_syntax
    type: pass_to_pass
    origin: static
    description: "unit.rs has valid rstest syntax structure with case attributes"

  - id: test_fixture_files_valid_syntax
    type: pass_to_pass
    origin: static
    description: "NFT fixture files have balanced braces/parens (basic syntax check)"

  - id: test_cargo_toml_structure
    type: pass_to_pass
    origin: static
    description: "Cargo.toml files have valid TOML structure with required sections"

  - id: test_well_known_rs_function_structure
    type: pass_to_pass
    origin: static
    description: "well_known.rs has expected function structure with required functions"

  - id: test_references_mod_structure
    type: pass_to_pass
    origin: static
    description: "references/mod.rs has expected module structure (impl blocks, async fn, match)"

  - id: test_mod_rs_enum_structure
    type: pass_to_pass
    origin: static
    description: "mod.rs has expected enum definitions (WellKnownFunctionKind, JsValue)"

rubric:
  - rule: "The FsReadDir enum variant in WellKnownFunctionKind MUST be placed in correct ASCII order relative to other variants (e.g. before PathToFileUrl)"
