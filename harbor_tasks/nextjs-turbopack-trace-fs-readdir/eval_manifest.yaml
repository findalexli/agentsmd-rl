rubric:
- rule: The FsReadDir enum variant in WellKnownFunctionKind MUST be placed in correct
    ASCII order relative to other variants (e.g. before PathToFileUrl)
distractors:
- rule: If you are changing Next.js source or integration tests, start `pnpm --filter=next
    dev` in a separate terminal session before making edits
  collision_type: scope_ambiguity
  why_distracting: The rule instructs starting `pnpm --filter=next dev` for Next.js
    source changes. An agent might misinterpret Turbopack Rust crates as 'Next.js
    source' and try to use the Next.js dev server to test its changes, which is ineffective
    for running Turbopack's Rust unit tests.
  severity: high
  source:
    path: CLAUDE.md
    lines: 61-65
- rule: 'Run tests fast (no isolation, no packing): NEXT_SKIP_ISOLATE=1 NEXT_TEST_MODE=<dev|start>
    pnpm testheadless test/path/to/test.ts'
  collision_type: architecture_boundary
  why_distracting: The rule provides a command (`pnpm testheadless test/path/to/test.ts`)
    for running tests fast. An agent might try to use this JS/TS test command, but
    the relevant tests for this issue are Rust unit tests located in `turbopack/crates/turbopack-tracing/tests/unit.rs`.
  severity: high
  source:
    path: CLAUDE.md
    lines: 73-77
- rule: prefer `pnpm --filter=next build` when edits are limited to core Next.js files.
  collision_type: architecture_boundary
  why_distracting: The rule suggests using `pnpm --filter=next build` for core Next.js
    files. An agent might apply this to Turbopack Rust changes, which is the wrong
    build process for iterating on Rust crates (where `cargo` commands within the
    `turbopack` directory would be more appropriate).
  severity: medium
  source:
    path: CLAUDE.md
    lines: 82-83
hierarchy_analysis: CLAUDE.md and AGENTS.md are identical symlinks. The rules are
  heavily biased towards the TypeScript/JavaScript parts of the Next.js monorepo (`packages/next`),
  while the issue requires modifying the Rust-based Turbopack bundler (`turbopack/crates`).
  This creates a significant architecture boundary mismatch where the agent might
  try to apply JS/TS build and test commands to Rust code.
