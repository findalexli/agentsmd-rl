checks:
  # =============================================================================
  # FAIL-TO-PASS TESTS (Must fail on base, pass after fix)
  # These verify the new UNNAMED_PROPERTY_WITH_IMPLICIT_UNIT_TYPE diagnostic.
  # =============================================================================

  - id: test_unnamed_property_checker_compiles
    type: fail_to_pass
    origin: pr_diff
    description: FirUnnamedPropertyChecker.kt compiles after adding new diagnostic logic
    source:
      path: compiler/fir/checkers/src/org/jetbrains/kotlin/fir/analysis/checkers/declaration/FirUnnamedPropertyChecker.kt
      rule: Add logic to detect underscore variables with implicit Unit type

  - id: test_fir_errors_compiles
    type: fail_to_pass
    origin: pr_diff
    description: FirErrors.kt compiles with new UNNAMED_PROPERTY_WITH_IMPLICIT_UNIT_TYPE diagnostic factory
    source:
      path: compiler/fir/checkers/checkers-component-generator/src/org/jetbrains/kotlin/fir/checkers/generator/diagnostics/FirDiagnosticsList.kt
      rule: Define new diagnostic in DIAGNOSTICS_LIST

  - id: test_new_diagnostic_in_diagnostics_list
    type: fail_to_pass
    origin: pr_diff
    description: DIAGNOSTICS_LIST defines UNNAMED_PROPERTY_WITH_IMPLICIT_UNIT_TYPE as a warning
    source:
      path: compiler/fir/checkers/checkers-component-generator/src/org/jetbrains/kotlin/fir/checkers/generator/diagnostics/FirDiagnosticsList.kt
      rule: Add val UNNAMED_PROPERTY_WITH_IMPLICIT_UNIT_TYPE by warning<PsiElement>

  - id: test_checker_contains_unit_warning_logic
    type: fail_to_pass
    origin: pr_diff
    description: FirUnnamedPropertyChecker contains logic to detect underscore variables with implicit Unit type
    source:
      path: compiler/fir/checkers/src/org/jetbrains/kotlin/fir/analysis/checkers/declaration/FirUnnamedPropertyChecker.kt
      rule: Check for ImplicitTypeRef and isUnitOrFlexibleUnit before reporting diagnostic

  - id: test_error_message_defined
    type: fail_to_pass
    origin: pr_diff
    description: FirErrorsDefaultMessages defines human-readable error message for the new warning
    source:
      path: compiler/fir/checkers/src/org/jetbrains/kotlin/fir/analysis/diagnostics/FirErrorsDefaultMessages.kt
      rule: Add map.put(UNNAMED_PROPERTY_WITH_IMPLICIT_UNIT_TYPE, "...")

  - id: test_analysis_api_converter_exists
    type: fail_to_pass
    origin: pr_diff
    description: Analysis API KaFirDataClassConverters.kt has converter for UNNAMED_PROPERTY_WITH_IMPLICIT_UNIT_TYPE
    source:
      path: analysis/analysis-api-fir/gen/org/jetbrains/kotlin/analysis/api/fir/diagnostics/KaFirDataClassConverters.kt
      rule: Add converter for new diagnostic

  - id: test_analysis_api_diagnostic_interface
    type: fail_to_pass
    origin: pr_diff
    description: Analysis API KaFirDiagnostics.kt defines UnnamedPropertyWithImplicitUnitType interface
    source:
      path: analysis/analysis-api-fir/gen/org/jetbrains/kotlin/analysis/api/fir/diagnostics/KaFirDiagnostics.kt
      rule: Add interface for new diagnostic

  - id: test_analysis_api_implementation
    type: fail_to_pass
    origin: pr_diff
    description: Analysis API KaFirDiagnosticsImpl.kt has UnnamedPropertyWithImplicitUnitTypeImpl class
    source:
      path: analysis/analysis-api-fir/gen/org/jetbrains/kotlin/analysis/api/fir/diagnostics/KaFirDiagnosticsImpl.kt
      rule: Add implementation class for new diagnostic

  - id: test_testdata_file_exists
    type: fail_to_pass
    origin: pr_diff
    description: Test data file withUnitType.kt exists with proper markers and directives
    source:
      path: compiler/testData/diagnostics/tests/unnamedLocalVariables/withUnitType.kt
      rule: Add test data file with test cases for the new diagnostic

  - id: test_testdata_implicit_cases_have_warnings
    type: fail_to_pass
    origin: pr_diff
    description: Test data marks expected warnings for implicit Unit type cases
    source:
      path: compiler/testData/diagnostics/tests/unnamedLocalVariables/withUnitType.kt
      rule: Use <!UNNAMED_PROPERTY_WITH_IMPLICIT_UNIT_TYPE!> markers in testWithImplicit function

  - id: test_testdata_explicit_no_warning
    type: fail_to_pass
    origin: pr_diff
    description: Test data verifies explicit Unit type annotations don't trigger warning
    source:
      path: compiler/testData/diagnostics/tests/unnamedLocalVariables/withUnitType.kt
      rule: Ensure testWithExplicit function has no warning markers

  - id: test_scripting_testdata_updated
    type: fail_to_pass
    origin: pr_diff
    description: Scripting test data updated to avoid false positives from new warning
    source:
      path: plugins/scripting/scripting-tests/testData/codegen/testScripts/unnamedLocalVariables.test.kts
      rule: Change call() function return type from implicit Unit to explicit Int

  # =============================================================================
  # PASS-TO-PASS TESTS (Must pass on both base and after fix)
  # These verify the compiler infrastructure is intact.
  # =============================================================================

  - id: test_compiler_module_structure
    type: pass_to_pass
    origin: repo_tests
    description: Compiler module directory structure is intact

  - id: test_checker_base_structure
    type: pass_to_pass
    origin: repo_tests
    description: FirUnnamedPropertyChecker has valid base structure
    source:
      path: compiler/fir/checkers/src/org/jetbrains/kotlin/fir/analysis/checkers/declaration/FirUnnamedPropertyChecker.kt
