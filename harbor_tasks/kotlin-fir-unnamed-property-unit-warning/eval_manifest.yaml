  - id: test_existing_checkers_still_work
    type: pass_to_pass
    origin: repo_tests
    description: Existing UNNAMED_VAR_PROPERTY and UNNAMED_DELEGATED_PROPERTY checkers still work

  - id: test_testdata_directory_structure
    type: pass_to_pass
    origin: repo_tests
    description: unnamedLocalVariables test data directory has expected structure

  - id: test_diagnostics_list_has_base_entries
    type: pass_to_pass
    origin: repo_tests
    description: DIAGNOSTICS_LIST has existing unnamed property diagnostics

  - id: test_analysis_api_base_structure
    type: pass_to_pass
    origin: repo_tests
    description: Analysis API has expected base structure for unnamed property diagnostics

rubric:
