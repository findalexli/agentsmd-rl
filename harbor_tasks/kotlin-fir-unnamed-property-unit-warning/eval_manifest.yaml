    source:
      path: compiler/fir/checkers/src/org/jetbrains/kotlin/fir/analysis/checkers/declaration/FirUnnamedPropertyChecker.kt
    weight: medium

  - rule: "Use proper diagnostic positioning - PositioningStrategy.NAME_IDENTIFIER for naming-related warnings"
    source:
      path: compiler/fir/checkers/checkers-component-generator/src/org/jetbrains/kotlin/fir/checkers/generator/diagnostics/FirDiagnosticsList.kt
    weight: medium

  - rule: "Check for implicit type via KtFakeSourceElementKind.ImplicitTypeRef"
    source:
      path: compiler/fir/checkers/src/org/jetbrains/kotlin/fir/analysis/checkers/declaration/FirUnnamedPropertyChecker.kt
    weight: high

  - rule: "Use fullyExpandedType() and isUnitOrFlexibleUnit for Unit type detection"
    source:
      path: compiler/fir/checkers/src/org/jetbrains/kotlin/fir/analysis/checkers/declaration/FirUnnamedPropertyChecker.kt
    weight: high

