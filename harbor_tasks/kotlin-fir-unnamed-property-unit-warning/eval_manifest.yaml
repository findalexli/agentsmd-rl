  - rule: "Mark expected diagnostics with <!DIAGNOSTIC_NAME!> markers in test data"
    source:
      path: compiler/fir/analysis-tests/AGENTS.md
    weight: high

  - rule: "Use 'FIR: ' prefix in commit messages for FIR-related changes"
    source:
      path: compiler/AGENTS.md
    weight: low

  - rule: "Define new diagnostics in DIAGNOSTICS_LIST with proper type (warning vs error)"
    source:
      path: compiler/fir/checkers/checkers-component-generator/src/org/jetbrains/kotlin/fir/checkers/generator/diagnostics/FirDiagnosticsList.kt
    weight: high

  - rule: "Add error message mapping in FirErrorsDefaultMessages"
    source:
      path: compiler/fir/checkers/src/org/jetbrains/kotlin/fir/analysis/diagnostics/FirErrorsDefaultMessages.kt
