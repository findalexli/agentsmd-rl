version: "2.0"

source:
  repo: "astral-sh/uv"
  pr: 18659
  base_commit: "9d45e7f8177e6f60e084ba52b2a32a56edf237c7"
  merge_commit: "685a79876028a83976acafffd94e8abe3295d72a"

checks:
  - id: compilation
    type: pass_to_pass
    origin: static
    description: "uv-client crate must compile after changes"

  - id: lock_not_held_across_fetch
    type: fail_to_pass
    origin: pr_diff
    description: "Cache-level lock must not be held across the fetch_index network call"

  - id: cache_restructured_for_concurrency
    type: fail_to_pass
    origin: pr_diff
    description: "FlatIndexCache restructured to support per-index concurrent access"

  - id: global_insert_removed
    type: fail_to_pass
    origin: pr_diff
    description: "Old cache.insert(index, entries) pattern removed from flat_single_index"

  - id: fetch_logic_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "flat_single_index still calls fetch_index to retrieve index data"

  - id: package_lookup_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "flat_single_index still looks up entries by package_name"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "flat_single_index has substantial implementation, not placeholders"

  - id: no_unwrap_panic
    type: pass_to_pass
    origin: agent_config
    description: "No .unwrap(), panic!(), or unreachable!() in flat_single_index"
    source:
      path: "CLAUDE.md"
      lines: "7"
      commit: "9d45e7f8177e6f60e084ba52b2a32a56edf237c7"

  - id: no_shortened_names
    type: pass_to_pass
    origin: agent_config
    description: "No abbreviated variable names in flat_single_index"
    source:
      path: "CLAUDE.md"
      lines: "16-17"
      commit: "9d45e7f8177e6f60e084ba52b2a32a56edf237c7"

rubric:
  - rule: "PREFER patterns like `if let` to handle fallibility"
    source:
      path: "CLAUDE.md"
      lines: "8"
      commit: "9d45e7f8177e6f60e084ba52b2a32a56edf237c7"

  - rule: "PREFER `#[expect()]` over `[allow()]` if clippy must be disabled"
    source:
      path: "CLAUDE.md"
      lines: "10"
      commit: "9d45e7f8177e6f60e084ba52b2a32a56edf237c7"

  - rule: "PREFER let chains (`if let` combined with `&&`) over nested `if let` statements"
    source:
      path: "CLAUDE.md"
      lines: "11"
      commit: "9d45e7f8177e6f60e084ba52b2a32a56edf237c7"

  - rule: "PREFER [`TypeName`] references when writing Rust doc comments"
    source:
      path: "CLAUDE.md"
      lines: "19"
      commit: "9d45e7f8177e6f60e084ba52b2a32a56edf237c7"
