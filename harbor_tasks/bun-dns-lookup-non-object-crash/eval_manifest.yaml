rubric:
- rule: When modifying type checks on JSValue, use semantically correct methods (isObject
    vs isCell).
  source:
    path: src/bun.js/api/bun/dns.zig
    lines: '2719'
    commit: 7fb789749edc96504fda8043e82a88eb88592d4e
  reference: arguments.ptr[1].isObject()
distractors:
- rule: Ensure the issue number is REAL and not a placeholder!
  collision_type: rule_conflict
  why_distracting: The bug description does not provide an issue number. The agent
    might try to create a regression test with a placeholder issue number, which explicitly
    violates the rule against using placeholders.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 30-30
- rule: NEVER write tests that check for no "panic" or "uncaught exception" or similar
    in the test output.
  collision_type: rule_conflict
  why_distracting: The bug is about a crash when passing invalid arguments. An agent
    might naturally try to write a test that ensures the code doesn't crash or panic,
    but the rules explicitly forbid writing tests that check for no 'panic' or 'uncaught
    exception'.
  severity: high
  source:
    path: CLAUDE.md
    lines: 84-84
hierarchy_analysis: The hierarchy consists of `CLAUDE.md` and `AGENTS.md` at the root,
  and `src/CLAUDE.md` and `src/AGENTS.md` at the `src/` level. The root files focus
  on building, testing, and test organization. The `src/` level files focus on Zig
  conventions and using Bun APIs over `std`. The gold solution is a minimal 1-line
  fix in Zig that doesn't trigger most of these rules, but the testing rules in the
  root config create significant distractors for an agent trying to verify the crash
  fix.
