# Track 4: Distractors - conventions that could create collisions
distractors:
  - rule: "Always use package manager versions of tools when available"
    source:
      path: "CONTRIBUTING.md"
      lines: "23-40"
      commit: "995d988c736293572f0a5a2c8a49fd1a2b6ca84c"
    collision_type: rule_conflict
    why_distracting: "sccache requires manual cargo install with --features=s3 because package manager versions often lack S3 support. The docs explicitly explain this tradeoff."
    severity: medium

  - rule: "Remove old troubleshooting sections entirely when replacing tools"
    source:
      path: "CLAUDE.md"
      lines: "300-320"
      commit: "995d988c736293572f0a5a2c8a49fd1a2b6ca84c"
    collision_type: scope_ambiguity
    why_distracting: "The ccache troubleshooting section was NOT replaced with sccache troubleshooting - the new sccache section covers installation and AWS setup instead."
    severity: low

  - rule: "Only core developers need build cache access configuration"
    source:
      path: "CONTRIBUTING.md"
      lines: "65-85"
      commit: "782f684b2e67ed08ef6fa61b65c30f4ed5e7979c"
    collision_type: architecture_boundary
    why_distracting: "The sccache section includes AWS credential setup for core developers, which might look like it should be in a separate internal doc. But it's correctly kept in CONTRIBUTING.md with a clear 'Core Developers Only' label."
    severity: low
