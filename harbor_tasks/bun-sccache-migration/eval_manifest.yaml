version: "2.0"

source:
  repo: "oven-sh/bun"
  pr: 24200
  base_commit: "995d988c736293572f0a5a2c8a49fd1a2b6ca84c"
  merge_commit: "782f684b2e67ed08ef6fa61b65c30f4ed5e7979c"

# Track 1: Code/config correctness tests (via test.sh)
checks:
  # SCCache CMake module tests
  - id: sccache_cmake_module_exists
    type: fail_to_pass
    origin: pr_diff
    description: "SetupSccache.cmake must exist with proper S3 configuration"

  - id: ccache_cmake_module_removed
    type: fail_to_pass
    origin: pr_diff
    description: "SetupCcache.cmake must be removed"

  - id: cmake_lists_uses_sccache
    type: fail_to_pass
    origin: pr_diff
    description: "CMakeLists.txt must include SetupSccache instead of SetupCcache"

  # Documentation tests
  - id: contributing_documents_sccache
    type: fail_to_pass
    origin: pr_diff
    description: "CONTRIBUTING.md must document sccache installation and configuration"

  - id: contributing_no_ccache
    type: fail_to_pass
    origin: pr_diff
    description: "CONTRIBUTING.md should not reference ccache in package lists"

  - id: contributing_no_ccache_troubleshooting
    type: fail_to_pass
    origin: pr_diff
    description: "CONTRIBUTING.md should remove ccache troubleshooting section"

  # CMake config tests
  - id: globals_cmake_cache_strategy
    type: fail_to_pass
    origin: pr_diff
    description: "cmake/Globals.cmake should remove write-only cache strategy option"

  # Nix files tests
  - id: flake_nix_uses_sccache
    type: fail_to_pass
    origin: pr_diff
    description: "flake.nix should use sccache instead of ccache"

  - id: shell_nix_uses_sccache
    type: fail_to_pass
    origin: pr_diff
    description: "shell.nix should use sccache instead of ccache"

  # Documentation tests
  - id: docs_windows_uses_sccache
    type: fail_to_pass
    origin: pr_diff
    description: "docs/project/building-windows.mdx should use sccache"

  # Bootstrap script tests
  - id: bootstrap_sh_uses_sccache
    type: fail_to_pass
    origin: pr_diff
    description: "scripts/bootstrap.sh should use install_sccache instead of install_ccache"

  - id: bootstrap_sh_sccache_download
    type: fail_to_pass
    origin: pr_diff
    description: "scripts/bootstrap.sh should download sccache from GitHub releases"

  # Build script tests
  - id: build_mjs_sccache_stats
    type: fail_to_pass
    origin: pr_diff
    description: "scripts/build.mjs should show sccache stats after build"

  - id: build_mjs_no_ccache_functions
    type: fail_to_pass
    origin: pr_diff
    description: "scripts/build.mjs should remove ccache-related functions"

  # Machine script tests
  - id: machine_mjs_iam_profile
    type: fail_to_pass
    origin: pr_diff
    description: "scripts/machine.mjs should attach IAM instance profile for CI"

  - id: machine_mjs_service_tag
    type: fail_to_pass
    origin: pr_diff
    description: "scripts/machine.mjs should set Service tag for S3 cache access"

  # Pass-to-pass tests
  - id: cmake_parses
    type: pass_to_pass
    origin: static
    description: "CMakeLists.txt should have valid CMake syntax"

  - id: build_mjs_imports
    type: pass_to_pass
    origin: static
    description: "scripts/build.mjs should have correct fs imports"

# Track 2: Config edits (extracted from solve.sh)
