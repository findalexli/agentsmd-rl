evaluation:
  # Source metadata
  source_pr:
    owner: containerd
    repo: containerd
    number: 13017
    merge_commit: 1abba0c96162254eb85b3350aec4dbe2684a94ef
    base_commit: 18201e7d52037a8a9657a2764ef63f60ec556e37

  # Checks - each corresponds to a test_* function in test_outputs.py
  checks:
    # Fail-to-pass: tests the core bug fix
    - id: resolve_transient_manifest_error
      name: "TestResolveTransientManifestError"
      type: fail_to_pass
      description: "Transient 5xx errors from /manifests/ should NOT trigger /blobs/ fallback"
      file: "tests/test_outputs.py"
      function: "test_resolve_transient_manifest_error"

    # Pass-to-pass: verifies backward compatibility preserved
    - id: resolve_404_manifest_fallback
      name: "TestResolve404ManifestFallback"
      type: pass_to_pass
      description: "404 from /manifests/ should still allow /blobs/ fallback for legacy registries"
      file: "tests/test_outputs.py"
      function: "test_resolve_404_manifest_fallback"

    # Compilation check
    - id: resolver_compiles
      name: "TestResolverCompiles"
      type: pass_to_pass
      description: "Resolver code must compile without errors"
      file: "tests/test_outputs.py"
      function: "test_resolver_compiles"

    # Structural verification - gated by behavioral tests
    - id: blobs_fallback_check_present
      name: "TestBlobsFallbackCheckPresent"
      type: pass_to_pass
      description: "The firstErrPriority > 2 check must be present in resolver.go"
      file: "tests/test_outputs.py"
      function: "test_blobs_fallback_check_present"

    # Repo CI/CD pass-to-pass checks
    - id: repo_build
      name: "TestRepoBuild"
      type: pass_to_pass
      origin: repo_tests
      description: "Repo's Go build for core/remotes/docker passes"
      file: "tests/test_outputs.py"
      function: "test_repo_build"

    - id: repo_unit_tests
      name: "TestRepoUnitTests"
      type: pass_to_pass
      origin: repo_tests
      description: "Repo's Go unit tests for core/remotes/docker pass"
      file: "tests/test_outputs.py"
      function: "test_repo_unit_tests"

    - id: repo_vet
      name: "TestRepoVet"
      type: pass_to_pass
      origin: repo_tests
      description: "Repo's Go vet for core/remotes/docker passes"
      file: "tests/test_outputs.py"
      function: "test_repo_vet"

  # No agent config rules to enforce - the repo has no CLAUDE.md, AGENTS.md, etc.
  agent_config: []

  # Rubric for LLM-based evaluation - empty since no soft rules
  rubric: []

  # Scoring weights
  scoring:
    fail_to_pass_weight: 0.75
    pass_to_pass_weight: 0.25
