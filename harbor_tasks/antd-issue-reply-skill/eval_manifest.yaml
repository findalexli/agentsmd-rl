config_edits:
- path: .claude/skills/issue-reply/SKILL.md
  tier: 1
  gold_added: "---\nname: antd-issue-reply\ndescription: Help maintainers reply to Ant Design GitHub issues following official guidelines. Use this skill when the user asks to handle issues, reply to issues, process issues, check issues, or manage issues for ant-design/ant-design repository. Also use when the user mentions \"issue\" in the context of antd, Ant Design, or GitHub issue management. This skill provides guidelines for classifying issues (Bug vs Feature Request), handling dosubot replies, using proper labels, writing polite responses, and knowing when to close issues.\n---\n\n# Ant Design Issue 回复规范\n\nTopics covered in the body of the gold SKILL.md:\n\n- 目标 / Goals: keep the community active and reduce stale or duplicate\n  issues; maintainers and users collaborate, the issue tracker is not a\n  customer-support queue.\n- First-reply rules: only reply to open issues with no MEMBER /\n  OWNER / CONTRIBUTOR human reply yet.\n- Checking already-replied issues: close after 7+ days of user silence,\n  close when resolved, close when usage question with answer provided.\n- Strict language policy: read only the original issue body\n  (\"What is expected?\" / \"What is actually happening?\") and reply in\n  that language; ignore the language of subsequent comments, the\n  issue-helper template, and dosubot replies.\n- Issue type triage: Bug Report → check version/changelog and\n  reproduction link, label `\U0001F41B Bug` or `\U0001F914 Need Reproduce`. Feature\n  Request → label `\U0001F4A1 Feature Request`. Usage question → answer or\n  redirect to FAQ / StackOverflow / SegmentFault, optionally invoke\n  `@docu` / `@Copilot`.\n- Handling `@dosu` (note the bot is mentioned as `@dosu`, not\n  `@dosubot`): review accuracy, endorse if correct, correct if wrong.\n- Bug vs Feature Request decision table with examples (Cascader\n  onFocus = Bug; DatePicker keyboard navigation = Feature Request);\n  when in doubt classify as Bug.\n- Duplicate handling: post `Duplicate of #xxxx` and close.\n- Closing policy: cautious, polite templates in EN and ZH for\n  resolved / usage-question / user-inactive scenarios; always\n  re-check language before closing.\n- \"Don't promise\": no release dates, no \"we will add this\".\n- When NOT to reply: dosu's answer is already complete; uncertain;\n  active discussion in progress.\n- Decision flow chart for re-checking previously-replied issues.\n- Tone: friendly, patient, professional; provide code examples and\n  documentation links.\n- Pointer to references/labels-and-resources.md for labels and links.\n"
  gold_removed: ''
- path: .claude/skills/issue-reply/references/labels-and-resources.md
  tier: 1
  gold_added: "# 标签和资源参考\n\nReference document accompanying the issue-reply skill. Lists:\n\n- Common labels in a Markdown table:\n    `\U0001F41B Bug`, `\U0001F914 Need Reproduce`, `\U0001F4A1 Feature Request`, `❓FAQ`,\n    `help wanted`, `good first issue`, `unconfirmed`, `improvement`,\n    `Inactive` — each with a one-line purpose description.\n- FAQ resource links: official FAQ-labelled issue search,\n  ant.design/docs/react/faq-cn/, ant.design/changelog-cn,\n  component-specific FAQ pages (Form, Table virtual list, i18n,\n  theme customisation).\n- Community resources: StackOverflow `antd` tag, SegmentFault\n  `antd` tag.\n- Reproduction templates: CodeSandbox and StackBlitz starter URLs.\n- Issue-creation conventions: issues should be filed via\n  new-issue.ant.design; bug reports require a reproduction link;\n  feature requests should describe the use case and proposed API.\n  If a user did not follow the formal channel but the content is\n  substantive, do not force-close — handle normally.\n"
  gold_removed: ''
