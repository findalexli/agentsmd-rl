version: "2.0"

source:
  repo: "astral-sh/ruff"
  pr: 24200
  base_commit: "20ca73626d71189ed000806938e1de688c1d3e55"
  merge_commit: "fa07cda98636eaa757b2687574785a234fe89e4f"

checks:
  - id: compiles
    type: pass_to_pass
    origin: static
    description: "Rust code in ruff_linter crate must compile"

  - id: unparen_generator_parenthesized
    type: fail_to_pass
    origin: pr_diff
    description: "Unparenthesized generator in s.add() gets wrapped in parens by FURB142 fix"

  - id: varied_unparen_generator
    type: fail_to_pass
    origin: pr_diff
    description: "Different unparenthesized generator expression also gets parenthesized"

  - id: conditional_unparen_generator
    type: fail_to_pass
    origin: pr_diff
    description: "Unparenthesized generator with if-clause also gets parenthesized"

  - id: already_paren_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "Already-parenthesized generator in s.add() is not double-wrapped"

  - id: upstream_furb142_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Upstream snapshot tests for FURB142 still pass"

  - id: no_panic_unwrap_unreachable
    type: pass_to_pass
    origin: agent_config
    description: "Rule file avoids panic!/unwrap()/unreachable!() per AGENTS.md guidance"
    source:
      path: "AGENTS.md"
      lines: "79"
      commit: "20ca73626d71189ed000806938e1de688c1d3e55"

  - id: imports_at_top
    type: pass_to_pass
    origin: agent_config
    description: "Rust imports (use statements) must be at top of file, not inside functions"
    source:
      path: "AGENTS.md"
      lines: "76"
      commit: "20ca73626d71189ed000806938e1de688c1d3e55"

  - id: prefer_expect_over_allow
    type: pass_to_pass
    origin: agent_config
    description: "Clippy lint suppression uses #[expect()] not #[allow()]"
    source:
      path: "AGENTS.md"
      lines: "81"
      commit: "20ca73626d71189ed000806938e1de688c1d3e55"

rubric:
  - rule: "Look to see if your tests could go in an existing file before adding a new file for your tests."
    source:
      path: "AGENTS.md"
      lines: "73"
      commit: "20ca73626d71189ed000806938e1de688c1d3e55"

  - rule: "Avoid writing significant amounts of new code. Look for existing utilities first."
    source:
      path: "AGENTS.md"
      lines: "78"
      commit: "20ca73626d71189ed000806938e1de688c1d3e55"

  - rule: "Prefer let chains (if let combined with &&) over nested if let statements."
    source:
      path: "AGENTS.md"
      lines: "80"
      commit: "20ca73626d71189ed000806938e1de688c1d3e55"

  - rule: "Use comments purposefully. Don't narrate code, but explain invariants and why something unusual was done."
    source:
      path: "AGENTS.md"
      lines: "82"
      commit: "20ca73626d71189ed000806938e1de688c1d3e55"
