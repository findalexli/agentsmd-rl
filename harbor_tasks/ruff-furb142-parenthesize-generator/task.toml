version = "1.0"

[metadata]
author_name = "Alex Li"
author_email = "alex@example.com"
difficulty = "easy"
category = "bugfix"
tags = ["ruff", "rust", "refurb", "generator"]
expert_time_estimate_min = 10.0
junior_time_estimate_min = 30.0

source_repo = "astral-sh/ruff"
source_pr = 24200
source_commit = "20ca73626d71189ed000806938e1de688c1d3e55"

[verifier]
env = { LLM_JUDGE = "${LLM_JUDGE:-0}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
timeout_sec = 60.0

[agent]
timeout_sec = 1200.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 4096
storage_mb = 10240
allow_internet = true
