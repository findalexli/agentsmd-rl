rubric:
- rule: Comments should explain why, not what. Prefer well-named methods over comments
    that narrate code.
  source:
    path: AGENTS.md
    lines: '70'
    commit: 2fed1c09849431329f3e414479c627d652424f4e
- rule: After making changes to high-risk areas (dependency updates, repin flows),
    call out the risk areas touched and note any cross-binding impact.
  source:
    path: AGENTS.md
    lines: 76-79, 82-84
    commit: 2fed1c09849431329f3e414479c627d652424f4e
- rule: When modifying Rake tasks that invoke other tasks, use reenable before invoke
    to ensure idempotent execution within the same Ruby process.
  source:
    path: AGENTS.md
    lines: 17-18, 76-79
    commit: 2fed1c09849431329f3e414479c627d652424f4e
