distractors:
- rule: Use WebDriver.logger for logging
  source:
    path: rb/AGENTS.md
    lines: 16-21
  source_text: '### Logging

    ```ruby

    WebDriver.logger.warn("actionable: something needs attention", id: :warning_id)

    WebDriver.logger.info("useful: driver started successfully")

    WebDriver.logger.debug("diagnostic: request details for debugging")

    ```'
  collision_type: would_cause_bug
  why_distracting: The modified file `rake_tasks/rust.rake` is written in Ruby, which
    might lead an agent to try and apply Ruby conventions from `rb/AGENTS.md`. However,
    Rake tasks are build infrastructure, not part of the Selenium Ruby Bindings library
    (`rb/lib/selenium/webdriver`). Attempting to use `WebDriver.logger` in a Rakefile
    would cause a NameError and crash the build.
  severity: high
- rule: Mark internal APIs with @api private in YARD comments
  source:
    path: rb/AGENTS.md
    lines: 32-38
  source_text: '### Internal APIs

    Mark internal APIs with `@api private` in YARD comments:

    ```ruby

    # @api private

    def internal_method

    end

    ```'
  collision_type: scope_ambiguity
  why_distracting: Because the modified file is in Ruby, an agent might assume all
    Ruby code requires YARD documentation tags like `@api private` for internal methods.
    However, this rule only applies to the Selenium Ruby Bindings library, not internal
    build scripts like Rakefiles.
  severity: medium
- rule: Update corresponding .rbs files when changing public API
  source:
    path: rb/AGENTS.md
    lines: 40-41
  source_text: '### Type signatures (steep/rbs)

    When changing public API, update corresponding `.rbs` files in `rb/sig/`'
  collision_type: scope_ambiguity
  why_distracting: An agent modifying Ruby code in `rake_tasks/` might try to find
    or create `.rbs` signature files to comply with this directive. This is incorrect
    because Rake scripts do not use Steep/RBS signatures, which are exclusively managed
    in the `rb/` bindings library.
  severity: medium
