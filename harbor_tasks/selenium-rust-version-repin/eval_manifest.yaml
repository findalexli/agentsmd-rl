rubric:
- rule: Comments should explain why, not what
  source:
    path: AGENTS.md
    lines: '70'
  source_text: '- Comments should explain *why*, not *what* - prefer well-named methods
    over comments'
  evidence: The gold diff adds detailed block comments in `rake_tasks/rust.rake` explicitly
    explaining *why* cargo must be repinned immediately (to avoid a mid-evaluation
    file-hash conflict in Bazel) and *why* `reenable` is needed (because `invoke`
    is a no-op if the task has already run), focusing entirely on the reasoning behind
    the code rather than merely describing what the methods do.
  category: documentation
  verification: llm_judge
version: '2.0'
source:
  repo: SeleniumHQ/selenium
  pr: 17320
