distractors:
- rule: Use the PR template. Fill out every section of .github/PULL_REQUEST_TEMPLATE.md
  collision_type: meta_confusion
  why_distracting: The rule instructs contributors to fill out the PR template and
    disclose AI usage. An agent might attempt to create or modify `.github/PULL_REQUEST_TEMPLATE.md`
    or write a PR description, which is out of scope for this code-level fix.
  severity: low
  source:
    path: AGENTS.md
    lines: 20-24
- rule: Use Interface and Blocks patterns for building applications
  source:
    path: /workspace/repo/.agents/skills/gradio/SKILL.md
    lines: 27-52
  source_text: "## Core Patterns\n\n**Interface** (high-level): wraps a function with\
    \ input/output components.\n\n```python\nimport gradio as gr\n\ndef greet(name):\n\
    \    return f\"Hello {name}!\"\n\ngr.Interface(fn=greet, inputs=\"text\", outputs=\"\
    text\").launch()\n```\n\n**Blocks** (low-level): flexible layout with explicit\
    \ event wiring.\n\n```python\nimport gradio as gr\n\nwith gr.Blocks() as demo:\n\
    \    name = gr.Textbox(label=\"Name\")\n    output = gr.Textbox(label=\"Greeting\"\
    )\n    btn = gr.Button(\"Greet\")\n    btn.click(fn=lambda n: f\"Hello {n}!\"\
    , inputs=name, outputs=output)\n\ndemo.launch()\n```"
  collision_type: scope_ambiguity
  why_distracting: This rule outlines the patterns for building user-facing Gradio
    applications. The current task is to fix a backend metaprogramming bug in the
    Gradio framework itself (`gradio/utils.py` and `gradio/cli/commands/skills.py`).
    An agent reading this might mistakenly attempt to write or modify Gradio UI components
    instead of addressing the core library bug.
  severity: medium
- rule: Create custom HTML components for significant customization
  source:
    path: /workspace/repo/.agents/skills/gradio/SKILL.md
    lines: 112-112
  source_text: If a task requires significant customization of an existing component
    or a component that doesn't exist in Gradio, you can create one with `gr.HTML`.
    It supports `html_template` (with `${}` JS expressions and `{{}}` Handlebars syntax),
    `css_template` for scoped styles, and `js_on_load` for interactivity — where `props.value`
    updates the component value and `trigger('event_name')` fires Gradio events. For
    reuse, subclass `gr.HTML` and define `api_info()` for API/MCP support. See the
    [full guide](https://www.gradio.app/guides/custom-HTML-components).
  collision_type: scope_ambiguity
  why_distracting: The task focuses on fixing hot-reload crashes caused by Python
    type stringification. An agent misinterpreting the bug report might see this rule
    and assume a frontend UI component needs to be created or modified using `gr.HTML`,
    completely missing the backend Python typing issue.
  severity: low
hierarchy_analysis: The repository contains a single, flat `AGENTS.md` file at the
