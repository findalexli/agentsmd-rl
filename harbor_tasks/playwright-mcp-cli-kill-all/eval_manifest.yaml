    category: code_style
    verification: programmatic
    check_cmd: "grep -q 'win32' packages/playwright/src/mcp/terminal/program.ts"

  - rule: "Documentation should include comments explaining command purpose when not obvious"
    source:
      path: "packages/playwright/src/skill/SKILL.md"
      lines: "180-195"
      commit: "7aaffc87da20df44d19cf6114efb44a5c99de106"
    evidence: "Gold adds comment '# forcefully kill all daemon processes (for stale/zombie processes)'"
    category: documentation
    verification: llm_judge

  - rule: "Session management commands should be grouped in category 'session'"
    source:
      path: "packages/playwright/src/mcp/terminal/commands.ts"
      lines: "1-50"
      commit: "7aaffc87da20df44d19cf6114efb44a5c99de106"
    evidence: "Gold sets category: 'session' for killAll command"
    category: code_style
    verification: llm_judge

# Track 4: Distractors - conventions that create collisions
distractors:
  - rule: "Use process.kill() with SIGTERM instead of SIGKILL for graceful shutdown"
    source:
      path: "packages/playwright/src/mcp/terminal/program.ts"
      lines: "1-50"
      commit: "7aaffc87da20df44d19cf6114efb44a5c99de106"
    collision_type: rule_conflict
    why_distracting: "SIGTERM is for graceful shutdown, but kill-all is for forceful termination of zombie processes - SIGKILL is correct here"
    severity: high

  - rule: "Avoid using execSync - prefer async exec for non-blocking operations"
    source:
      path: "packages/playwright/src/mcp/terminal/program.ts"
      lines: "1-50"
      commit: "7aaffc87da20df44d19cf6114efb44a5c99de106"
    collision_type: scope_ambiguity
    why_distracting: "While async is generally preferred, execSync is appropriate here for synchronous process enumeration before killing"
    severity: medium

  - rule: "All new commands should have a corresponding toolName for MCP tool interface"
    source:
      path: "packages/playwright/src/mcp/terminal/commands.ts"
      lines: "1-50"
      commit: "7aaffc87da20df44d19cf6114efb44a5c99de106"
    collision_type: architecture_boundary
    why_distracting: "kill-all is a CLI-only command for manual intervention, not an MCP tool - empty toolName is correct"
    severity: medium
