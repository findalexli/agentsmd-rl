  - id: typescript_compiles
    type: pass_to_pass
    origin: static
    description: "Modified TypeScript files parse without errors"

  # Fail-to-pass: Code behavior tests
  - id: kill_all_command_exists_in_commands
    type: fail_to_pass
    origin: pr_diff
    description: "The kill-all command must be declared in commands.ts with proper name, description, and category"

  - id: kill_all_in_commands_array
    type: fail_to_pass
    origin: pr_diff
    description: "The killAll command must be added to the commandsArray to be registered"

  - id: kill_all_handled_in_program
    type: fail_to_pass
    origin: pr_diff
    description: "The kill-all subcommand must be handled in handleSessionCommand function"

  - id: kill_all_top_level_command
    type: fail_to_pass
    origin: pr_diff
    description: "The kill-all command must be handled at top-level program function"

  - id: kill_all_daemons_function_exists
    type: fail_to_pass
    origin: pr_diff
    description: "The killAllDaemons function must be implemented with cross-platform process killing"

  - id: execsync_imported
    type: fail_to_pass
    origin: pr_diff
    description: "execSync must be imported from child_process for executing ps/powershell commands"

  # Fail-to-pass: Config/documentation updates (agentmd-edit specific)
  - id: skill_md_documents_kill_all
    type: fail_to_pass
    origin: pr_diff
    description: "SKILL.md must document the kill-all command in the Sessions section"

  - id: session_management_md_documents_kill_all
    type: fail_to_pass
    origin: pr_diff
    description: "session-management.md must document the kill-all command"

  - id: session_management_shows_use_case
    type: fail_to_pass
    origin: pr_diff
    description: "session-management.md should explain when to use kill-all (zombie/stale processes)"

