    category: naming
    verification: llm_judge

  - rule: "Commands should include a description explaining their purpose"
    source:
      path: "packages/playwright/src/skill/SKILL.md"
      lines: "1-50"
      commit: "7aaffc87da20df44d19cf6114efb44a5c99de106"
    evidence: "Gold adds description: 'Forcefully kill all daemon processes (for stale/zombie processes)'"
    category: documentation
    verification: llm_judge

  - rule: "Cross-platform code should handle Windows and Unix platforms separately"
    source:
      path: "packages/playwright/src/skill/SKILL.md"
      lines: "1-50"
      commit: "7aaffc87da20df44d19cf6114efb44a5c99de106"
