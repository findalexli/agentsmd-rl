name = "playwright-mcp-cli-kill-all"
description = "Add kill-all command to Playwright MCP CLI and update SKILL.md documentation"
category = "cli"
tags = ["typescript", "cli", "mcp", "process-management", "agentmd-edit"]

[execution]
timeout = 300
type = "docker"

[resources]
cpus = 2
memory = "4g"

[difficulty]
level = "medium"
reason = "Requires adding a new CLI command with cross-platform process killing logic (Windows PowerShell + Unix ps/kill), plus updating SKILL.md documentation to reflect the new command"

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
