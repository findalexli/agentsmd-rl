rubric:
- rule: Follow existing code patterns in the same module. Look at neighboring code
    for tensor operations, stats logging, and control flow conventions.
  source:
    path: CLAUDE.md
    lines: '66'
    commit: a0d122930f7de028404235688c7dba3f01854954
- rule: Use stats_tracker for metrics observability. Register training metrics via
    stats_tracker.stat() with denominator for per-token averaging.
  source:
    path: AGENTS.md
    lines: '97'
    commit: a0d122930f7de028404235688c7dba3f01854954
- rule: Detach tensors from computation graph when computing metrics that do not require
    gradients.
  source:
    path: AGENTS.md
    lines: 84-97
    commit: a0d122930f7de028404235688c7dba3f01854954
- rule: Batch ops over Python loops on tensor elements.
  source:
    path: AGENTS.md
    lines: 64-65
  evidence: The gold solution computes the Taylor and Dual estimators using vectorized
    tensor math (`log_ratio**2 / 2.0` and `log_ratio.exp() - 1 - log_ratio`) rather
    than iterating over elements.
  category: style
- rule: No GPU-CPU sync in hot paths (`.item()`, `.tolist()`, `print(tensor)`).
  source:
    path: AGENTS.md
    lines: 65-66
  evidence: The gold solution computes the estimators using tensor operations and
    passes the tensors directly to `stats_tracker.stat()` without calling `.item()`
    or `.tolist()`.
  category: style
- rule: Explicit `dtype`/`device`
  source:
    path: AGENTS.md
    lines: '58'
  evidence: The gold solution explicitly casts the tensors to float using `.float()`
    before performing the subtraction.
  category: style
distractors:
- rule: 'Logging: `areal.utils.logging.getLogger(name)` with PascalCase names -- never
    `print` or `logging.__name__`.'
  collision_type: scope_ambiguity
  why_distracting: The agent might try to use `areal.utils.logging.getLogger` to log
    the KL divergence values, confusing standard text logging with the required metric
    tracking via `stats_tracker.stat()`.
  severity: medium
  source:
    path: AGENTS.md
    lines: 51-52
- rule: Add tests for new functionality.
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to write unit tests for the new KL divergence
    estimators, which is out of scope for this specific PR and not requested in the
    instructions.
  severity: low
  source:
    path: AGENTS.md
    lines: '26'
hierarchy_analysis: The configuration hierarchy is flat, consisting of two Level 0
  files (`AGENTS.md` and `CLAUDE.md`) that apply globally. There are no direct conflicts
  between the files, but the agent must carefully distinguish between general logging
  rules in the config and the specific metric tracking API requested in the prompt.
