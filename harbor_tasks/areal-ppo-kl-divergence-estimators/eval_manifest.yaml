rubric:
- rule: Follow existing code patterns in the same module. Look at neighboring code
    for tensor operations, stats logging, and control flow conventions.
  source:
    path: CLAUDE.md
    lines: '66'
    commit: a0d122930f7de028404235688c7dba3f01854954
- rule: Use stats_tracker for metrics observability. Register training metrics via
    stats_tracker.stat() with denominator for per-token averaging.
  source:
    path: AGENTS.md
    lines: '97'
    commit: a0d122930f7de028404235688c7dba3f01854954
- rule: Detach tensors from computation graph when computing metrics that do not require
    gradients.
  source:
    path: AGENTS.md
    lines: 84-97
    commit: a0d122930f7de028404235688c7dba3f01854954
- rule: Batch ops over Python loops on tensor elements.
  source:
    path: AGENTS.md
    lines: 64-65
  evidence: The gold solution computes the Taylor and Dual estimators using vectorized
    tensor math (`log_ratio**2 / 2.0` and `log_ratio.exp() - 1 - log_ratio`) rather
    than iterating over elements.
  category: style
- rule: Follow existing code patterns in the same module.
  source:
    path: AGENTS.md
    lines: 24-25
  evidence: The gold solution registers the stats using `stats_tracker.stat(..., denominator="n_valid_tokens")`,
    matching the existing pattern in the file for tracking metrics.
  category: architecture
distractors:
- rule: 'Logging: `areal.utils.logging.getLogger(name)` with PascalCase names -- never
    `print` or `logging.__name__`.'
  collision_type: meta_confusion
  why_distracting: The prompt asks to 'log KL divergence estimators', which might
    lead the agent to use the standard text logger (`areal.utils.logging.getLogger`).
    However, in this context, 'logging' refers to tracking metrics via `stats_tracker.stat`
    for TensorBoard. Using a text logger would spam the console and likely require
    `.item()`, which would violate the rule against GPU-CPU syncs in hot paths.
  severity: high
  source:
    path: AGENTS.md
    lines: 58-60
- rule: Add tests for new functionality.
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to create a new test file or modify existing
    tests to verify the math of the KL estimators. However, this is a simple metric
    tracking addition to an existing function, and the gold solution does not include
    tests.
  severity: medium
  source:
    path: AGENTS.md
    lines: 26-27
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` contain similar rules regarding
  testing and following existing patterns. `AGENTS.md` provides more specific guidance
  on logging and performance (e.g., avoiding `.item()`, batch ops). The conflict arises
  from the overloaded term 'log' in the prompt versus the strict text logging rules
  in `AGENTS.md`.
