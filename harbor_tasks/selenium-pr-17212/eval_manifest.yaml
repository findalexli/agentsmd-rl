  - id: test_broker_validates_event_type_before_deserialize
    type: fail_to_pass
    origin: pr_behavior
    description: Broker checks TryGetJsonTypeInfo before attempting deserialization

  - id: test_params_reader_snapshot_pattern
    type: fail_to_pass
    origin: pr_behavior
