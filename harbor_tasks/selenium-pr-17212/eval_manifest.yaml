  - id: test_diagnostics_code_analysis_import
    type: fail_to_pass
    origin: pr_behavior
    description: EventDispatcher uses System.Diagnostics.CodeAnalysis for NotNullWhen

rubric:
  - id: logging_conventions
    rule: The code uses Warn level for the warning log about missing event type mapping, which is appropriate for actionable items
    weight: 1.0
    source:
      path: dotnet/src/webdriver/BiDi/Broker.cs
    reference: "if (_logger.IsEnabled(LogEventLevel.Warn))"

  - id: scoped_changes
    rule: Changes are scoped to only the necessary files without repo-wide refactoring
    weight: 0.8
    source:
      path: dotnet/src/webdriver/BiDi/Broker.cs
    reference: "paramsReader = reader"

  - id: field_renamed
    rule: The internal events dictionary is renamed from _events to _eventRegistrations for clarity
    weight: 1.0
    source:
      path: dotnet/src/webdriver/BiDi/EventDispatcher.cs
    reference: "_eventRegistrations"
