    description: BiDi code passes dotnet format whitespace check

  - id: test_dotnet_format_style
    type: pass_to_pass
    origin: repo_tests
    description: BiDi code passes dotnet format style check

  - id: test_dotnet_format_analyzers
    type: pass_to_pass
    origin: repo_tests
    description: BiDi code passes dotnet format analyzers check

  - id: test_try_get_json_type_info_method_exists
    type: fail_to_pass
