task:
  name: selenium-bidi-remove-high-level-interception
  description: Remove high-level network interception API from Selenium .NET BiDi implementation
  language: csharp
  primary_files:
    - dotnet/src/webdriver/BiDi/Network/NetworkModule.HighLevel.cs
    - dotnet/src/webdriver/BiDi/Network/INetworkModule.cs
    - dotnet/src/webdriver/BiDi/BrowsingContext/BrowsingContextNetworkModule.cs
    - dotnet/src/webdriver/BiDi/BrowsingContext/IBrowsingContextNetworkModule.cs

agent_config_rules:
  - id: deprecation_policy
    description: "Agent config from AGENTS.md: Before removing public functionality, mark as deprecated"
    category: agent_config
    severity: warning
    source:
      file: AGENTS.md
      lines: "Deprecation policy section"
    check: test_deprecation_policy_compliance

  - id: prefer_unit_tests
    description: "Agent config from AGENTS.md: Prefer small (unit) tests over browser tests"
    category: agent_config
    severity: info
    source:
      file: AGENTS.md
      lines: "Testing section"

  - id: avoid_mocks
    description: "Agent config from AGENTS.md: Avoid mocks—they can misrepresent API contracts"
    category: agent_config
    severity: warning
    source:
      file: AGENTS.md
      lines: "Testing section"

  - id: async_patterns
    description: "Agent config from dotnet/AGENTS.md: The codebase is migrating to async"
    category: agent_config
    severity: info
    source:
      file: dotnet/AGENTS.md
      lines: "Code conventions section"

  - id: api_compatibility
    description: "Agent config from AGENTS.md: Maintain API/ABI compatibility"
    category: agent_config
    severity: error
    source:
      file: AGENTS.md
      lines: "Invariants section"

