rubric:
- rule: Use Effect.gen(function* () { ... }) for composition in effectified tools
  source:
    path: packages/opencode/src/tool/todo.ts
    lines: 35-45
  reference: |
    Effect.gen(function* () {
      const todo = yield* Todo.Service
- rule: Yield Effect services instead of calling static namespace functions
  source:
    path: packages/opencode/src/tool/todo.ts
    lines: 35-45
  reference: |
    const todo = yield* Todo.Service
    ...
    await todo.update({...})
- rule: Avoid mocks in tests by providing actual service layers
  source:
    path: packages/opencode/test/session/prompt-effect.test.ts
    lines: 160-170
  reference: |
    const todo = Todo.layer.pipe(Layer.provideMerge(deps))
- rule: Export defaultLayer for services to enable dependency injection
  source:
    path: packages/opencode/src/session/todo.ts
    lines: 80-90
  reference: |
    export const defaultLayer = layer.pipe(Layer.provide(Bus.layer))
- rule: Provide service dependencies in registry layer composition
  source:
    path: packages/opencode/src/tool/registry.ts
    lines: 220-235
  reference: |
    export const defaultLayer = Layer.unwrap(
      Effect.sync(() =>
        layer.pipe(
          Layer.provide(Config.defaultLayer),
          Layer.provide(Plugin.defaultLayer),
          Layer.provide(Question.defaultLayer),
          Layer.provide(Todo.defaultLayer),
        ),
      ),
    )
distractors:
- rule: Use `makeRuntime` (from `src/effect/run-service.ts`) for all services.
  collision_type: architecture_boundary
  why_distracting: The agent is effectifying a tool and might try to apply `makeRuntime`
    to `TodoWriteTool` because it acts somewhat like a service. However, tools are
    executed within the existing runtime provided by the session/registry and do not
    need their own runtime.
  severity: medium
  source:
    path: packages/opencode/AGENTS.md
    lines: 24-25
- rule: Prefer single word variable names where possible
  collision_type: rule_conflict
  why_distracting: The agent might try to rename `defaultLayer` to a single word like
    `layer` (which would shadow the existing `layer` variable) or rename `TodoWriteTool`
    to `Todo`, which would break existing imports and conventions.
  severity: low
  source:
    path: AGENTS.md
    lines: 20-21
- rule: Use `InstanceState` (from `src/effect/instance-state.ts`) for per-directory
    or per-project state that needs per-instance cleanup.
  collision_type: scope_ambiguity
  why_distracting: Because `ToolRegistry` uses `InstanceState`, the agent might mistakenly
    try to add `Todo.Service` into the `InstanceState.make` closure instead of the
    `Layer.effect` requirements, or try to wrap `Todo.Service` in `InstanceState`.
  severity: medium
  source:
    path: packages/opencode/AGENTS.md
    lines: 26-27
hierarchy_analysis: The hierarchy consists of a root `AGENTS.md` with general TypeScript/style
  rules, a package-level `AGENTS.md` with Effect-specific architectural rules, and
  a test-level `AGENTS.md` for fixtures. The agent must synthesize the Effect rules
  (yielding services) with the existing instructions to effectify the tool, while
  ignoring general rules that don't apply to this specific refactoring (like `makeRuntime`
  for tools).
