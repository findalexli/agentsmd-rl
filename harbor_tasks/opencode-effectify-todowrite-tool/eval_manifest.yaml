  category: architecture
- rule: In effectified services, prefer yielding existing Effect services over dropping
    down to ad hoc platform APIs.
  source:
    path: packages/opencode/AGENTS.md
    lines: 38-38
  evidence: The tool yields `Todo.Service` from the Effect context instead of calling
    the static `Todo.update` function directly.
  category: architecture
- rule: Avoid mocks as much as possible
  source:
    path: AGENTS.md
    lines: 86-86
  evidence: The test files (`prompt-effect.test.ts`, `snapshot-tool-race.test.ts`)
    are updated to provide the actual `Todo.defaultLayer` rather than mocking the
    newly required `Todo.Service`.
  category: testing
distractors:
- rule: Use `Effect.fn("Domain.method")` for named/traced effects
  collision_type: would_cause_bug
  why_distracting: The agent might try to wrap the tool's `execute` function in `Effect.fn`.
    However, `Tool.defineEffect` expects an Effect that resolves to a standard `Tool.Info`
    object where `execute` is a Promise-returning function, not an Effect. Doing so
    would cause type errors and violate the tool interface.
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: 19-19
- rule: Use `makeRuntime` (from `src/effect/run-service.ts`) for all services.
  collision_type: architecture_boundary
  why_distracting: The agent might try to use `makeRuntime` inside the tool definition
    to resolve `Todo.Service` and call its methods, rather than yielding it and letting
    the `ToolRegistry` provide the dependency. This would bypass the dependency injection
    system.
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: 28-28
- rule: Avoid using the `any` type
  collision_type: scope_ambiguity
  why_distracting: The `ToolRegistry` layer definition contains `any` in the `build`
    helper (`Effect.Effect<T, never, any>`). An agent might try to fix this while
    updating the layer requirements, which would expand the PR scope unnecessarily
    and potentially break complex Effect type inference.
  severity: medium
  source:
    path: AGENTS.md
    lines: 13-13
hierarchy_analysis: The hierarchy applies rules from `AGENTS.md` globally, and `packages/opencode/AGENTS.md`
  specifically for Effect rules. The Effect rules in the package-level config correctly
  guide the use of `Effect.gen` and yielding services, which overrides generic TypeScript
  patterns. The global 'Avoid mocks' rule correctly drives the test updates to provide
  the real `Todo.defaultLayer` rather than mocking the newly injected dependency.
