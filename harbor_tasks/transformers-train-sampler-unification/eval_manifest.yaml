config_edits:
- path: examples/pytorch/speech-recognition/README.md
  tier: 2
  gold_added: --train_sampling_strategy group_by_length
  gold_removed: --group_by_length
rubric:
- rule: Prefer minimal changes when refactoring - replace boolean with string enum,
    don't add unnecessary abstractions
  source:
    path: AGENTS.md
    lines: '11'
    commit: 8efd81513f51cd343d086e0e8f69190caa49dbcf
  evidence: Gold changes group_by_length bool to train_sampling_strategy str with
    3 choices - minimal API change
  category: code_style
  verification: llm_judge
- rule: When updating examples, keep the same parameter value semantics (--group_by_length
    becomes --train_sampling_strategy group_by_length)
  source:
    path: AGENTS.md
    lines: 11-12
    commit: 8efd81513f51cd343d086e0e8f69190caa49dbcf
  evidence: Gold preserves group_by_length behavior by using explicit value in examples
  category: code_style
  verification: llm_judge
- rule: Update docstrings when changing parameter semantics - document new options
    clearly
  source:
    path: .github/copilot-instructions.md
    lines: 15-16
    commit: 8efd81513f51cd343d086e0e8f69190caa49dbcf
  evidence: Gold updates docstrings to document random/sequential/group_by_length
    options
  category: documentation
  verification: llm_judge
- rule: Handle backward compatibility gracefully - warn instead of error for incompatible
    options
  source:
    path: AGENTS.md
    lines: '10'
    commit: 8efd81513f51cd343d086e0e8f69190caa49dbcf
  evidence: Gold changes ValueError to logger.info for IterableDataset - graceful
    degradation
  category: error_handling
  verification: llm_judge
distractors:
- rule: Always maintain backward compatibility by keeping old parameter names as aliases
  source:
    path: AGENTS.md
    lines: 1-5
    commit: 8efd81513f51cd343d086e0e8f69190caa49dbcf
  collision_type: scope_ambiguity
  why_distracting: This PR breaks backward compatibility intentionally (API change).
    Adding aliases would contradict the design goal.
  severity: medium
- rule: Keep PRs as brief as possible - only change the core implementation, don't
    update examples
  source:
    path: .github/copilot-instructions.md
    lines: '12'
    commit: 8efd81513f51cd343d086e0e8f69190caa49dbcf
  collision_type: scope_ambiguity
  why_distracting: Examples MUST be updated when API changes - users need working
    examples.
  severity: high
- rule: When adding new sampler options, add comprehensive tests in tests/trainer/test_trainer.py
  source:
    path: AGENTS.md
    lines: 31-35
    commit: 8efd81513f51cd343d086e0e8f69190caa49dbcf
  collision_type: scope_ambiguity
  why_distracting: This PR updates existing tests to use new parameter but doesn't
    add new test file - appropriate for this scope.
  severity: low
