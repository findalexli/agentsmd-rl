distractors:
- rule: Prefer `const` over `let`. Use ternaries or early returns instead of reassignment.
  collision_type: would_cause_bug
  why_distracting: The `waitSlug` helper must track state across multiple polling iterations to ensure the slug has settled. This requires using `let` and reassigning `prev` and `next` variables. Avoiding reassignment would make it impossible to track the previous value across `expect.poll` calls.
  severity: high
  source:
    path: AGENTS.md
    lines: 68-78
- rule: Use single word names by default for new locals, params, and helper functions.
  collision_type: rule_conflict
  why_distracting: The task explicitly requires creating helper functions named `slugFromUrl` and `waitSlug`. An agent strictly following the single-word naming rule might try to name them `slug` and `wait`, which would violate the explicit task instructions.
  severity: medium
  source:
    path: AGENTS.md
    lines: 28-35
hierarchy_analysis: The task involves editing `packages/app/e2e/AGENTS.md`, which is a Level 3 config file. This means the agent is modifying its own instructions for future tasks. The Level 0 config enforces strict rules on naming and variable reassignment, but the specific requirements of the E2E polling logic (tracking state across polls) and the explicit task instructions override these general style rules.
