version: "2.0"
source:
  repo: "example/repo"
  pr: 123
  base_commit: "abc123"
  merge_commit: "def456"

checks:
  # ============================================================================
  # Fail-to-pass tests (verify the fix)
  # These test that the bug is actually fixed
  # ============================================================================
  - id: test_syntax_error_fixed
    type: fail_to_pass
    origin: pr_diff
    description: Syntax error in utils.py is fixed - file compiles without error

  - id: test_import_works
    type: fail_to_pass
    origin: pr_diff
    description: Importing utils module works after fix - can import and use functions

  # ============================================================================
  # Pass-to-pass tests (verify no regression)
  # These are sourced from the repo's actual CI/test commands
  # They must pass BOTH before AND after the fix
  # ============================================================================

  - id: test_repo_linter_passes
    type: pass_to_pass
    origin: repo_tests
    description: |
      Repo's ruff linter passes.
      CI command: ruff check src/ tests/
      Source: .github/workflows/ci.yml

  - id: test_repo_typecheck_passes
    type: pass_to_pass
    origin: repo_tests
    description: |
      Repo's mypy typecheck passes.
      CI command: mypy src/ --ignore-missing-imports
      Source: .github/workflows/ci.yml

  - id: test_repo_unit_tests_specific
    type: pass_to_pass
    origin: repo_tests
    description: |
      Repo unit tests for the modified module (tests/test_utils.py) pass.
      CI command: pytest tests/test_utils.py -v
      Focused on the specific test file covering the modified src/utils.py

  - id: test_repo_imports_clean
    type: pass_to_pass
    origin: repo_tests
    description: |
      All repo imports work without error.
      Verifies the package structure is intact and modules can be imported.

  - id: test_repo_py_compile
    type: pass_to_pass
    origin: repo_tests
    description: |
      All Python files compile without syntax errors.
      CI command: python -m py_compile src/utils.py
      Source: Python syntax validation

  - id: test_repo_all_tests
    type: pass_to_pass
    origin: repo_tests
    description: |
      All repo unit tests pass (full test suite).
      CI command: pytest tests/ -v
      Source: .github/workflows/ci.yml

rubric: []
config_edits: []
distractors: []
