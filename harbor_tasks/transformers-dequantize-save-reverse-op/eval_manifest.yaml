rubric:
- rule: PRs should be as brief as possible. Bugfix PRs in particular can often be
    only one or two lines long, and do not need large comments, docstrings or new
    functions. Aim to minimize the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: 12b6b57cac0397db0afda56f3ab0101729bc5f0f
- rule: 'No low-value busywork PRs: Do not open one-off PRs for tiny edits.'
  source:
    path: CLAUDE.md
    lines: 41-43
  evidence: The PR addresses a core functional crash (NotImplementedError during save_pretrained)
    rather than a mechanical cleanup or tiny edit.
  category: architecture
- rule: '`make style`: runs formatters and linters (ruff), necessary to pass code
    style checks'
  source:
    path: CLAUDE.md
    lines: 2-2
  evidence: The gold solution uses modern Python typing (`dict[str, Any]`) and proper
    spacing (two blank lines before classes) that complies with ruff formatters.
  category: style
distractors:
- rule: We try to avoid direct inheritance between model-specific files in src/transformers/models/.
  collision_type: scope_ambiguity
  why_distracting: The agent might avoid making `_IdentityOp` inherit from `ConversionOps`
    or avoid importing it across the `integrations/` modules, mistakenly applying
    the 'no direct inheritance' rule outside of the `models/` directory.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 61-63
- rule: The older method is to mark classes or functions with `# Copied from ...`.
    Copies are kept in sync by `make fix-repo`.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to duplicate the `reverse_op` implementation
    in `finegrained_fp8.py`, `metal_quantization.py`, and `mxfp4.py` and use `# Copied
    from` comments to link them, instead of importing a shared `_IdentityOp` from
    `core_model_loading.py`.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 65-65
hierarchy_analysis: CLAUDE.md and AGENTS.md contain identical rules. The rules primarily
  focus on agent contribution policies, PR coordination, and model-specific code duplication.
  The duplication rules are specific to `src/transformers/models/` and do not apply
  to `core_model_loading.py` or `integrations/`.
