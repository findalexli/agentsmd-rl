rubric:
- rule: Use deepEqual from @tanstack/router-core as the comparator for useStore calls
    that return arrays or objects to prevent unnecessary re-renders
  source:
    path: AGENTS.md
    lines: 18-23
    commit: d5622bb413a2d1ac99c546c5336be949dfb351d9
- rule: Always run pnpm test:types and pnpm test:unit before committing changes
  source:
    path: AGENTS.md
    lines: 53,71
    commit: d5622bb413a2d1ac99c546c5336be949dfb351d9
- rule: Follow existing patterns in the codebase when modifying related functionality
  source:
    path: AGENTS.md
    lines: 18-23
    commit: d5622bb413a2d1ac99c546c5336be949dfb351d9
- rule: Framework-agnostic core logic separated from React/Solid bindings
  source:
    path: AGENTS.md
    lines: 17-17
  evidence: The gold solution imports the `deepEqual` utility from `@tanstack/router-core`
    rather than implementing a custom deep equality check within the React-specific
    `@tanstack/react-router` package.
  category: architecture
distractors:
- rule: Use workspace protocol for internal dependencies (`workspace:*`)
  collision_type: scope_ambiguity
  why_distracting: The agent might assume it needs to add `@tanstack/router-core`
    to the `package.json` dependencies of `@tanstack/react-router` using the `workspace:*`
    protocol. However, the dependency already exists, and modifying `package.json`
    is out of scope and unnecessary for this PR.
  severity: medium
  source:
    path: AGENTS.md
    lines: 19-19
- rule: 'Fix formatting: `pnpm format`'
  collision_type: scope_ambiguity
  why_distracting: Running a global or package-wide `pnpm format` command might introduce
    unrelated formatting changes across the repository or within the modified files,
    polluting the PR diff with out-of-scope changes.
  severity: low
  source:
    path: AGENTS.md
    lines: 48-48
hierarchy_analysis: The AGENTS.md file provides high-level architectural and workflow
  guidelines. The positive rubric reinforces the architectural boundary between core
  and framework bindings. The negative rubrics highlight potential pitfalls where
  an agent might over-apply general repository instructions (like formatting or dependency
  management) to a narrowly scoped bug fix.
