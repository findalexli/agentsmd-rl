rubric:
- rule: AGENTS.md contains the complete Naming Enforcement section with mandatory
    single-word naming rules, examples of preferred short names (pid, cfg, err, opts,
    dir, root, child, state, timeout), and examples to avoid (inputPID, existingClient,
    connectTimeout, workerPath).
  source:
    path: AGENTS.md
    lines: 23-42
    commit: 2a0be8316be7ae6ec78f5d221851fc1cc0cdddb2
  reference: '### Naming Enforcement (Read This)


    THIS RULE IS MANDATORY FOR AGENT WRITTEN CODE.


    - Use single word names by default for new locals, params, and helper functions.

    - Multi-word names are allowed only when a single word would be unclear or ambiguous.

    - Do not introduce new camelCase compounds when a short single-word alternative
    is clear.

    - Before finishing edits, review touched lines and shorten newly introduced identifiers
    where possible.

    - Good short names to prefer: `pid`, `cfg`, `err`, `opts`, `dir`, `root`, `child`,
    `state`, `timeout`.

    - Examples to avoid unless truly required: `inputPID`, `existingClient`, `connectTimeout`,
    `workerPath`.'
- rule: Prefer single word names for variables and functions.
  source:
    path: AGENTS.md
    lines: 21-22
  evidence: The gold solution renames multi-word variables to single words (`baseCwd`
    to `root`, `workerPath` to `file`) and names the newly extracted helper functions
    with single words (`target` and `input`).
  category: naming
- rule: Avoid `else` statements. Prefer early returns.
  source:
    path: AGENTS.md
    lines: 61-62
  evidence: The gold solution uses multiple `if` statements with early returns in
    the newly extracted `input()` and `target()` functions instead of using `else`
    blocks.
  category: style
