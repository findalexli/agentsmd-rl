rubric:
- rule: Use single word names by default for new locals, params, and helper functions.
  source:
    path: AGENTS.md
    lines: 23-42
    commit: 2a0be8316be7ae6ec78f5d221851fc1cc0cdddb2
  evidence: The gold solution adds the complete Naming Enforcement section to AGENTS.md immediately after the existing Naming section, with mandatory rules, preferred short name examples (pid, cfg, err, opts, dir, root, child, state, timeout), and multi-word examples to avoid (inputPID, existingClient, connectTimeout, workerPath).
  category: naming
  verification: llm_judge
- rule: Prefer single word names for variables and functions.
  source:
    path: AGENTS.md
    lines: 21-22
    commit: 2a0be8316be7ae6ec78f5d221851fc1cc0cdddb2
  evidence: The gold solution renames multi-word variables to single words (baseCwd to root, workerPath to file) and names the newly extracted helper functions with single words (target and input).
  category: naming
  verification: llm_judge
- rule: Avoid `else` statements. Prefer early returns.
  source:
    path: AGENTS.md
    lines: 73-73
    commit: 2a0be8316be7ae6ec78f5d221851fc1cc0cdddb2
  evidence: The newly extracted input() function uses multiple early returns (if (!value) return piped, if (!piped) return value) instead of else blocks.
  category: style
  verification: llm_judge
config_edits:
- path: AGENTS.md
  tier: 1
  gold_added: '### Naming Enforcement (Read This)


    THIS RULE IS MANDATORY FOR AGENT WRITTEN CODE.


    - Use single word names by default for new locals, params, and helper functions.

    - Multi-word names are allowed only when a single word would be unclear or ambiguous.

    - Do not introduce new camelCase compounds when a short single-word alternative is clear.

    - Before finishing edits, review touched lines and shorten newly introduced identifiers where possible.

    - Good short names to prefer: `pid`, `cfg`, `err`, `opts`, `dir`, `root`, `child`, `state`, `timeout`.

    - Examples to avoid unless truly required: `inputPID`, `existingClient`, `connectTimeout`, `workerPath`.'
  gold_removed: ''
distractors:
- rule: Avoid `try`/`catch` where possible
  collision_type: rule_conflict
  why_distracting: The PR instruction explicitly requires adding a try/finally block around the TUI invocation to guarantee cleanup. An agent strictly following the style guide might attempt to avoid try/finally or refactor existing try/catch blocks, violating the explicit PR requirement.
  severity: high
  source:
    path: AGENTS.md
    lines: 12-12
    commit: 2a0be8316be7ae6ec78f5d221851fc1cc0cdddb2
- rule: Keep things in one function unless composable or reusable / Reduce total variable count by inlining when a value is only used once.
  collision_type: rule_conflict
  why_distracting: The PR instruction explicitly asks to extract inline logic into standalone helper functions (target and input). The style guide tells the agent to keep things in one function and inline single-use values, which directly conflicts with the extraction requirement.
  severity: high
  source:
    path: AGENTS.md
    lines: 11-11
    commit: 2a0be8316be7ae6ec78f5d221851fc1cc0cdddb2
