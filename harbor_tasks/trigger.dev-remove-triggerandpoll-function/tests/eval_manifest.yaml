distractors:
- rule: Unit tests use vitest. Run tests for a specific workspace or prefer running
    a single test file from within its directory.
  collision_type: scope_ambiguity
  why_distracting: The config provides detailed instructions on how to run and locate
    unit tests. An agent might assume it needs to find and delete test files for `triggerAndPoll`,
    or run the test suite to verify its removal. However, the task instructions strictly
    scope the removal to the implementation, exports, references, and docs, with no
    test files involved.
  severity: medium
  source:
    path: AGENTS.md
    lines: 33-41
- rule: Do not commit directly to the main branch. All changes should be made in a
    separate branch and go through a pull request.
  collision_type: meta_confusion
  why_distracting: The config instructs not to to commit directly to main and to use
    a separate branch/PR. An agent might try to execute git commands (`git checkout
    -b`, `git commit`) to fulfill this rule, which falls outside the scope of standard
    file-editing benchmarks and could cause the evaluation script to fail.
  severity: low
  source:
    path: AGENTS.md
    lines: 46-47
hierarchy_analysis: The config hierarchy is flat, consisting only of a root-level
  `AGENTS.md` file. The agent must apply the global Prettier formatting rule while
  navigating across multiple workspaces (SDK, docs, references) and meta-instruction
  files.
