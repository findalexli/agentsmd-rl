    lines: '15'
    commit: a8732d5546d84bfb4519b6dbf461c947a5de45f6
- rule: Do not open one-off PRs for tiny edits; focus on substantive changes.
  source:
    path: CLAUDE.md
    lines: 42-44
  evidence: The gold solution implements a substantive behavioral change to dependency
    checking and error reporting, rather than a tiny edit or isolated lint cleanup.
  category: architecture
distractors:
- rule: 'Fail-closed behavior for agents: If coordination evidence cannot be found,
    do not proceed to PR-ready output.'
  collision_type: meta_confusion
  why_distracting: The prompt does not provide an issue number or coordination evidence.
    An agent strictly following this rule would refuse to generate the code and instead
    return a message asking for an approval link, failing the benchmark task.
  severity: high
  source:
    path: AGENTS.md
    lines: 49-52
- rule: 'Copies and Modular Models: mark classes or functions with `# Copied from
    ...` to manage code duplication.'
  collision_type: scope_ambiguity
  why_distracting: The prompt instructs the agent to follow the pattern used in `quantizer_higgs.py`.
    The agent might erroneously add a `# Copied from quantizer_higgs.py` comment to
    the new code, but this rule explicitly applies only to `src/transformers/models/`,
    not `src/transformers/quantizers/`.
  severity: medium
  source:
    path: AGENTS.md
    lines: 54-58
hierarchy_analysis: The configuration is flat, with identical rules present in both
  `AGENTS.md` and `CLAUDE.md` at the root level. The primary challenge is navigating
  the strict meta-instructions designed to prevent autonomous PR creation without
  human coordination.
