rubric:
- rule: PRs should be as brief as possible. Bugfix PRs in particular can often be
    only one or two lines long, and do not need large comments, docstrings or new
    functions in this case. Aim to minimize the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: a8732d5546d84bfb4519b6dbf461c947a5de45f6
- rule: Do not open one-off PRs for tiny edits; focus on substantive changes.
  source:
    path: CLAUDE.md
    lines: 42-44
  evidence: The gold solution implements a substantive behavioral change to dependency
    checking and error reporting, rather than a tiny edit or isolated lint cleanup.
  category: architecture
distractors:
- rule: Mandatory duplicate-work checks using gh CLI
  collision_type: meta_confusion
  why_distracting: The agent is in a headless evaluation environment and should focus
    on fixing the code. Attempting to run `gh issue view` or `gh pr list` will fail
    or waste time, as the agent cannot interact with live GitHub repositories.
  severity: high
  source:
    path: CLAUDE.md
    lines: 30-37
- rule: Fail-closed behavior for agents without coordination evidence
  collision_type: meta_confusion
  why_distracting: In a benchmark setting, there is no coordination evidence or issue
    thread to link. If the agent strictly follows this rule, it will refuse to generate
    the patch and fail the evaluation.
  severity: high
  source:
    path: CLAUDE.md
    lines: 57-60
- rule: Copies and Modular Models rules for src/transformers/models/
  collision_type: scope_ambiguity
  why_distracting: The file being edited (`src/transformers/quantizers/quantizer_mxfp4.py`)
    is a quantizer, not a model-specific file in `src/transformers/models/`. The agent
    might waste time looking for `# Copied from` statements or trying to apply modular
    model rules to the quantizer.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 62-67
hierarchy_analysis: CLAUDE.md and AGENTS.md contain identical rules. The rules are
  heavily focused on repository management, PR coordination, and human-in-the-loop
  validation, which conflict with the autonomous nature of a coding agent benchmark.
  The agent must selectively ignore the meta-coordination rules while still respecting
  any relevant architectural guidelines.
