version: "2.0"

source:
  repo: "psf/requests"
  pr: 0  # Demo task
  base_commit: "HEAD"
  merge_commit: "HEAD"

checks:
  # Pass-to-Pass tests (repo_tests) - run CI commands that should pass before and after fix
  - id: test_repo_structures_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's unit tests for structures.py pass"

  - id: test_repo_ruff_check
    type: pass_to_pass
    origin: repo_tests
    description: "Ruff linting passes on modified file"

  - id: test_repo_ruff_format
    type: pass_to_pass
    origin: repo_tests
    description: "Ruff formatting check passes on modified file"

  # Fail-to-Pass tests (pr_diff) - test the actual bug fix
  - id: test_case_insensitive_dict_pop_returns_default
    type: fail_to_pass
    origin: pr_diff
    description: "pop() should return default when key is not found"

  - id: test_case_insensitive_dict_pop_no_default
    type: fail_to_pass
    origin: pr_diff
    description: "pop() with no default should raise KeyError for missing key"

config_edits: []

rubric: []

distractors: []
