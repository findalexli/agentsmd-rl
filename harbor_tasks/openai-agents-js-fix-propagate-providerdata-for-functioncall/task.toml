version = "1.0"
source_repo = "openai/openai-agents-js"
source_pr = 746

[metadata]
author_name = "Alex Li"
author_email = "alex@example.com"
difficulty = "medium"  # easy / medium / hard
category = "bugfix"    # bugfix / feature / refactor
tags = ["openai-agents-js", "typescript", "agentmd-edit"]
expert_time_estimate_min = 10.0
junior_time_estimate_min = 30.0

[verifier]
env = { LLM_JUDGE = "${LLM_JUDGE:-0}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
timeout_sec = 180.0

[agent]
timeout_sec = 1800.0

[environment]
build_timeout_sec = 600.0
cpus = 2
memory_mb = 4096
storage_mb = 10240
allow_internet = true
