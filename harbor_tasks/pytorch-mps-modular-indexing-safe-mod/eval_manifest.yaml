distractors:
- rule: Don't make trivial (1-2 LOC) helper functions that are only used once unless
    it significantly improves code readability.
  collision_type: rule_conflict
  why_distracting: The `safe_mod` function is literally a 1-LOC helper (`return x
    % y;`). An agent strictly following this rule might try to avoid creating this
    helper and instead emit complex inline workarounds in the Python codegen, which
    could fail to defeat the Metal compiler's peephole optimizer or make the codegen
    messy.
  severity: high
  source:
    path: CLAUDE.md
    lines: 33-34
- rule: To run lint, run 'lintrunner -a' (which will autoapply changes)
  collision_type: meta_confusion
  why_distracting: '`CLAUDE.md` explicitly states ''Only use commands provided via
    `spin` for linting.'' This creates a direct contradiction in the instructions
    for how the agent should check its work, potentially causing the agent to run
    the wrong command and fail.'
  severity: low
  source:
    path: AGENTS.md
    lines: 9-9
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` are at Level 0, but they contain
  conflicting instructions regarding linting (`spin lint` vs `lintrunner -a`). The
  agent must navigate this contradiction. Additionally, the general rule against trivial
  helper functions in `CLAUDE.md` conflicts with the specific necessity of creating
  a 1-LOC C++ function to defeat a compiler optimization pass.
