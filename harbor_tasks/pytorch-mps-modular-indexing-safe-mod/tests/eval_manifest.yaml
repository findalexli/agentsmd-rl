  category: documentation
distractors:
- rule: Don't make trivial (1-2 LOC) helper functions that are only used once unless
    it significantly improves code readability.
  collision_type: architecture_boundary
  why_distracting: The `safe_mod` function is a 1-LOC helper (`return x % y;`). An
    agent strictly following this rule might try to avoid creating the C++ helper
    and instead emit the `volatile` cast directly in the Python codegen string (e.g.,
    `((volatile {type}){x}) % {mod}`). This crosses an architecture boundary and makes
    the generated code messy, whereas adding the helper to the Metal utility header
    is the correct architectural choice.
  severity: high
  source:
    path: CLAUDE.md
    lines: 47-48
- rule: To run lint, run 'lintrunner -a' (which will autoapply changes)
  collision_type: rule_conflict
  why_distracting: AGENTS.md instructs the agent to use `lintrunner -a` for linting,
    which directly conflicts with CLAUDE.md's instruction to 'Only use commands provided
    via spin for linting'. An agent trying to validate its changes might fail or get
    confused by these conflicting toolchain instructions.
  severity: medium
  source:
    path: AGENTS.md
    lines: 10-10
- rule: Do NOT run setup.py, you do not have a working build environment
  collision_type: rule_conflict
  why_distracting: AGENTS.md states 'you do not have a working build environment',
    while CLAUDE.md provides explicit build instructions via `pip install -e .`. The
    agent might incorrectly assume it cannot compile the C++ header changes to verify
    the fix.
  severity: medium
  source:
    path: AGENTS.md
    lines: 8-8
hierarchy_analysis: The config hierarchy features two Level 0 files (`AGENTS.md` and
  `CLAUDE.md`) that contain direct contradictions regarding the development environment
  (linting tools and build capabilities). The agent must synthesize these rules and
  recognize that `CLAUDE.md` provides more specific, PyTorch-tailored instructions
  (like `spin`) that likely supersede the generic `AGENTS.md` rules.
