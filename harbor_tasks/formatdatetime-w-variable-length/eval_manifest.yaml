source:
  repo: ClickHouse/ClickHouse
  pr_number: 102100
  base_commit: 0ac8d1fb82e45ca6c903f5549d564e867fb422dd
  merge_commit: 16684b0f40c6d834872b9fa5d2fd68c6326a339b
  target_file: src/Functions/formatDateTime.cpp

checks:
  - id: test_variable_width_formatter_m_is_month_name_array
    description: "variable_width_formatter_M_is_month_name should only contain 'M'"
    origin: behavioral
    weight: 0.25

  - id: test_w_check_moved_outside_conditional
    description: "%W check must be outside mysql_M_is_month_name conditional"
    origin: behavioral
    weight: 0.35

  - id: test_no_w_check_in_else_branch
    description: "No variable_width_formatter check in else branch"
    origin: behavioral
    weight: 0.25

  - id: test_compilation_succeeds
    description: "Modified code compiles successfully"
    origin: behavioral
    weight: 0.15

  - id: agent_config_allman_braces
    description: "Follow Allman-style braces (opening brace on new line)"
    origin: agent_config
    source:
      file: .claude/CLAUDE.md
      lines: "When writing C++ code, always use Allman-style braces (opening brace on a new line)."
    weight: 0.0
    penalty: -0.1

  - id: test_repo_no_tabs
    type: pass_to_pass
    origin: repo_tests
    description: "No tab characters in target file (CI: check_cpp.sh)"

  - id: test_repo_no_trailing_whitespace
    type: pass_to_pass
    origin: repo_tests
    description: "No trailing whitespace in target file (CI: check_cpp.sh)"

  - id: test_repo_no_crlf
    type: pass_to_pass
    origin: repo_tests
    description: "Unix line endings only, no CRLF (CI: various_checks.sh)"

  - id: test_repo_no_bom
    type: pass_to_pass
    origin: repo_tests
    description: "No UTF-8 BOM in target file (CI: various_checks.sh)"

  - id: test_repo_no_duplicate_includes
    type: pass_to_pass
    origin: repo_tests
    description: "No duplicate #include directives (CI: check_style.py)"

  - id: test_repo_allman_braces_in_function
    type: pass_to_pass
    origin: repo_tests
    description: "Allman-style braces in modified function (CI: check_cpp.sh)"

rubric:
  - id: follow_repo_style
    description: "Code follows ClickHouse C++ style conventions"
    criteria:
      - "Allman-style braces used consistently"
      - "Proper indentation (4 spaces)"
      - "Consistent with surrounding code patterns"

  - id: fix_completeness
    description: "Fix completely addresses the bug"
    criteria:
      - "%W formatter treated as variable-length in ALL cases"
      - "No duplicate checks for 'W'"
      - "Code structure is cleaner than before"
