distractors:
- rule: '`no-console: error` — use project''s logging utilities'
  collision_type: architecture_boundary
  why_distracting: The agent might try to import the project's logging utilities to
    print the version error. However, the bin shim must be a standalone script that
    runs before the main bundle is loaded. Importing internal utilities would likely
    trigger the very syntax errors on older Node versions that the shim is designed
    to prevent.
  severity: high
  source:
    path: packages/create-cloudflare/AGENTS.md
    lines: '21'
- rule: No separate bin shim — the built output IS the bin
  collision_type: rule_conflict
  why_distracting: The agent might try to inject the version check directly into `src/cli.ts`
    or the esbuild build script to avoid creating a separate bin shim, adhering to
    the documented architecture. This contradicts the explicit PR instruction to add
    a bin shim and would fail to prevent syntax errors during the parsing of the bundled
    CLI.
  severity: high
  source:
    path: packages/create-cloudflare/AGENTS.md
    lines: 16-17
hierarchy_analysis: The root AGENTS.md provides general monorepo context, while packages/create-cloudflare/AGENTS.md
  contains specific architectural rules for the C3 package. The PR instructions explicitly
  require changing the architecture documented in the package-level AGENTS.md (introducing
  a bin shim), creating a direct conflict between the existing documentation and the
  new requirements. The agent must recognize that the instructions override the existing
  architectural documentation, and must update the documentation to reflect the new
  state.
