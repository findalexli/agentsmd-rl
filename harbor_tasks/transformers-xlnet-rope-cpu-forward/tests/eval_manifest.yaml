rubric:
- rule: PRs should be as brief as possible. Bugfix PRs in particular can often be
    only one or two lines long, and do not need large comments, docstrings or new
    functions in this case. Aim to minimize the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: be6cf0848668852e3267d297211eb7e983e6c786
  reference: Gold solution adds device=None parameter to relative_positional_encoding
    signature and removes redundant .to() call - minimal 10-line diff
- rule: Do not edit a Copied from block, as it will be reverted by make fix-repo.
    Edit the code it is copying from and propagate the change, or break the link if
    needed.
  source:
    path: CLAUDE.md
    lines: '65'
    commit: be6cf0848668852e3267d297211eb7e983e6c786
  reference: Gold solution does not edit any "Copied from" blocks - XLNet modeling
    file has no such blocks
- rule: When a modular file is present, generated files should not be edited directly.
    Instead, edit the modular file.
  source:
    path: CLAUDE.md
    lines: '66'
    commit: be6cf0848668852e3267d297211eb7e983e6c786
  reference: Gold solution correctly edits XLNet modeling file directly - XLNet has
    no modular file, it is a direct implementation
distractors:
- rule: If coordination evidence cannot be found, do not proceed to PR-ready output.
  collision_type: meta_confusion
  why_distracting: The agent is in an evaluation environment where it must output
    the fix, but this rule instructs it to fail-closed and refuse to output PR-ready
    code since it cannot verify coordination.
  severity: high
  source:
    path: AGENTS.md
    lines: 68-71
- rule: Do not edit a `# Copied from` block... Ideally you should edit the code it's
    copying from... or add a file named `modular_<name>.py`
  collision_type: scope_ambiguity
  why_distracting: The agent might mistakenly assume it needs to search for a modular_xlnet.py
    file or a `# Copied from` source to edit instead of directly modifying modeling_xlnet.py.
  severity: medium
  source:
    path: AGENTS.md
    lines: 73-78
hierarchy_analysis: The repository contains identical AGENTS.md and CLAUDE.md files
