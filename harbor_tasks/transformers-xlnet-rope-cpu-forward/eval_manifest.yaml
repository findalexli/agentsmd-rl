rubric:
  - rule: "PRs should be as brief as possible. Bugfix PRs in particular can often be only one or two lines long, and do not need large comments, docstrings or new functions in this case. Aim to minimize the size of the diff."
    source:
      path: ".github/copilot-instructions.md"
      lines: "15"
      commit: "be6cf0848668852e3267d297211eb7e983e6c786"

  - rule: "Do not edit a `# Copied from` block, as it will be reverted by `make fix-repo`. Edit the code it's copying from and propagate the change, or break the link if needed."
    source:
      path: "CLAUDE.md"
      lines: "65"
      commit: "be6cf0848668852e3267d297211eb7e983e6c786"

  - rule: "When a modular file is present, generated files should not be edited directly. Instead, edit the modular file."
    source:
