rubric:
- rule: PRs should be as brief as possible. Bugfix PRs in particular can often be
    only one or two lines long, and do not need large comments, docstrings or new
    functions in this case. Aim to minimize the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: be6cf0848668852e3267d297211eb7e983e6c786
- rule: Do not edit a Copied from block, as it will be reverted by make fix-repo.
    Edit the code it is copying from and propagate the change, or break the link if
    needed.
  source:
    path: CLAUDE.md
    lines: '65'
    commit: be6cf0848668852e3267d297211eb7e983e6c786
- rule: When a modular file is present, generated files should not be edited directly.
    Instead, edit the modular file.
  source:
    path: CLAUDE.md
    lines: '66'
    commit: be6cf0848668852e3267d297211eb7e983e6c786
distractors:
- rule: The newer method is to add a file named `modular_<name>.py` in the model directory.
    `modular` files can inherit from other models. `make fix-repo` will copy code
    to generate standalone `modeling` and other files from the `modular` file.
  collision_type: architecture_boundary
  why_distracting: The agent might search for or attempt to edit `modular_xlnet.py`,
    or try to convert the model to the new modular format, instead of directly fixing
    the bug in `modeling_xlnet.py`.
  severity: high
  source:
    path: CLAUDE.md
    lines: 63-65
- rule: Do not open one-off PRs for tiny edits (single typo, isolated lint cleanup,
    one mutable default argument, etc.).
  collision_type: scope_ambiguity
  why_distracting: The agent might refuse to make the change, misclassifying the addition
    of a `device=None` argument and removing a `.to()` call as a 'tiny edit' or 'low-value
    busywork', missing that it fixes a major performance bottleneck (CPU-to-GPU transfer
    on every forward pass).
  severity: medium
  source:
    path: CLAUDE.md
    lines: 36-38
- rule: Do not edit a `# Copied from` block, as it will be reverted by `make fix-repo`.
    Ideally you should edit the code it's copying from and propagate the change...
  collision_type: meta_confusion
  why_distracting: The agent might overly scrutinize the file for `# Copied from`
    comments or hesitate to modify `modeling_xlnet.py` directly if it mistakenly believes
    the file is auto-generated or copied from elsewhere, complicating a straightforward
    patch.
  severity: low
  source:
    path: CLAUDE.md
    lines: 60-62
hierarchy_analysis: CLAUDE.md and AGENTS.md contain identical content at the root
  level. The rules focus heavily on PR coordination, avoiding trivial edits, and managing
  model file duplication (modular vs copied). There are no conflicting rules between
  the files since they are duplicates.
