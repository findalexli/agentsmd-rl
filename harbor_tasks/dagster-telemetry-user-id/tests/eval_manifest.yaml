    description: UUID generation should work for creating user_ids

# Rubric for soft/subjective rules from agent configs
rubric:
  - rule: Use top-level imports instead of function-scoped imports
    source: .claude/coding_conventions.md
    description: New telemetry functions should use top-level imports (yaml, uuid) where possible, with acceptable exceptions for lazy loading

  - rule: Add type annotations for all function parameters and return values
    source: .claude/coding_conventions.md
    description: New get_or_set_user_id and _get/_set_telemetry_user_id functions should have full type annotations

  - rule: Use built-in generic types for annotations
    source: .claude/coding_conventions.md
    description: Use 'list[str]', 'dict[str, Any]' instead of 'typing.List', 'typing.Dict' for Python 3.9+

  - rule: Follow functional-style programming with immutable objects
    source: .claude/coding_conventions.md
    description: Telemetry data structures should be immutable where possible, using @record pattern

  - rule: Include docstrings for all new public functions
    source: CLAUDE.md Development Guide
    description: get_or_set_user_id and helper functions should have clear docstrings explaining purpose and behavior
