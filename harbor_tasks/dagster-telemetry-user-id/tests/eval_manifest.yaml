task_name: dagster-telemetry-user-id
task_title: Add anonymous user_id to telemetry payload

# Checklist for evaluation - each test_* function in test_outputs.py has a matching entry
checks:
  # FAIL-TO-PASS: Core functionality tests
  - id: test_get_or_set_user_id_exists
    type: fail_to_pass
    origin: behavior
    description: get_or_set_user_id() function must exist and return a valid UUID string
    source: dagster_shared/telemetry/__init__.py

  - id: test_user_id_stored_in_user_telemetry_dir
    type: fail_to_pass
    origin: behavior
    description: user_id must be stored in ~/.dagster/.telemetry/user_id.yaml, NOT in DAGSTER_HOME
    source: dagster_shared/telemetry/__init__.py

  - id: test_user_id_consistent_across_dagster_homes
    type: fail_to_pass
    origin: behavior
    description: user_id must remain consistent across different DAGSTER_HOME values
    source: dagster_shared/telemetry/__init__.py

  - id: test_telemetry_entry_has_user_id_field
    type: fail_to_pass
    origin: behavior
    description: TelemetryEntry NamedTuple must include user_id field
    source: dagster_shared/telemetry/__init__.py

  - id: test_telemetry_entry_accepts_user_id
    type: fail_to_pass
    origin: behavior
    description: TelemetryEntry must accept and store user_id parameter correctly
    source: dagster_shared/telemetry/__init__.py

  # PASS-TO-PASS: Baseline functionality tests - using repo's actual test infrastructure
  - id: test_telemetry_module_imports
    type: pass_to_pass
    origin: repo_tests
    description: dagster_shared.telemetry module should be importable via subprocess

  - id: test_get_or_set_instance_id_exists
    type: pass_to_pass
    origin: repo_tests
    description: get_or_set_instance_id function should work via subprocess

  - id: test_dagster_shared_yaml_tests
    type: pass_to_pass
    origin: repo_tests
    description: dagster-shared YAML tests from dagster_shared_tests should pass

  - id: test_dagster_shared_hash_tests
    type: pass_to_pass
    origin: repo_tests
    description: dagster-shared hash tests from dagster_shared_tests should pass

  - id: test_dagster_telemetry_upload_tests
    type: pass_to_pass
    origin: repo_tests
    description: dagster core telemetry upload tests should pass

  - id: test_dagster_core_telemetry_imports
    type: pass_to_pass
    origin: repo_tests
    description: dagster core telemetry module imports should work

  - id: test_dagster_shared_package_structure
    type: pass_to_pass
    origin: static
    description: dagster-shared package structure should be valid (file existence)

  - id: test_telemetry_yaml_module_available
    type: pass_to_pass
