[description]
brief = "Add a persistent user-level identifier to telemetry events that is independent of DAGSTER_HOME"
details = """
This task involves adding a user_id field to Dagster's telemetry system. Unlike instance_id
which varies by DAGSTER_HOME directory, user_id should be stored in ~/.dagster/.telemetry/
and remain consistent across all Dagster instances for a given user.

Key requirements:
1. Add get_or_set_user_id() function that returns/creates a persistent user ID
2. Store user_id in ~/.dagster/.telemetry/user_id.yaml (ignoring DAGSTER_HOME)
3. Add user_id field to TelemetryEntry NamedTuple
4. Include user_id in all telemetry payloads
5. Ensure user_id is consistent across different DAGSTER_HOME values
"""

[files]
