source:
  repo: SeleniumHQ/selenium
  pr_number: 17218
  title: "[java] Fix saving docker logs to a file"
  base_commit: 491207a87b89b2824d8ca976fa7cb46cce9325ea
  merge_commit: f822b35e5293b52165498af1dc240e1b1f008c42
  author: asolntsev

description: |
  Fix Docker container log parsing to properly handle Docker's multiplexed
  stream format. The logs endpoint returns data with 8-byte frame headers
  (stream type + padding + payload size) that were being written as garbage
  characters in log files.

checks:
  - id: test_parse_multiplexed_stream_behavior
    type: fail_to_pass
    origin: pr_diff
    description: Behavioral test verifying parseMultiplexedStream algorithm strips Docker frame headers correctly

  - id: test_container_is_running_method
    type: fail_to_pass
    origin: pr_diff
    description: Container.java must expose public boolean isRunning() method

  - id: test_container_logs_get_logs_input_stream
    type: fail_to_pass
    origin: pr_diff
    description: ContainerLogs.java must have getLogs() returning InputStream for streaming

  - id: test_jdk_http_binary_stream_detection
    type: fail_to_pass
    origin: pr_diff
    description: JdkHttpMessages must recognize Docker binary stream content types

  - id: test_docker_session_saves_logs_correctly
    type: fail_to_pass
    origin: pr_diff
    description: DockerSession.saveLogs must check container.isRunning() before saving

  - id: test_timezone_null_check
    type: fail_to_pass
    origin: pr_diff
    description: DockerSessionFactory must check TZ env var for null to prevent NPE

  - id: test_multiplexed_stream_round_trip
    type: fail_to_pass
    origin: pr_diff
    description: End-to-end test verifying multiplexed stream parsing produces clean output

  - id: test_java_source_compiles
    type: pass_to_pass
    origin: static
    description: Java source files have valid package/class declarations

  - id: test_docker_module_structure
    type: pass_to_pass
    origin: static
    description: Docker module files exist in correct locations

  - id: test_container_has_getLogs_method
    type: pass_to_pass
    origin: static
    description: Container.java has getLogs(), start(), and stop() methods

  - id: test_docker_session_has_saveLogs
    type: pass_to_pass
    origin: static
    description: DockerSession.java has saveLogs() and stop() methods

  - id: test_jdk_http_messages_has_extract_content
    type: pass_to_pass
    origin: static
    description: JdkHttpMessages.java has extractContent method

rubric:
  - id: internal_implementation_fix
    rule: "This is an internal implementation fix for Docker log parsing. No documentation or agent config file updates are required - the fix only changes internal Java implementation details without affecting public API documentation."
    evaluation: "PASS if no documentation changes were made, as this internal bug fix does not require updating CLAUDE.md, AGENTS.md, or README.md"
