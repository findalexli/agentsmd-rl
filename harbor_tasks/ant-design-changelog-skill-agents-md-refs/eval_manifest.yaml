rubric:
- id: cross_reference_correctness
  weight: 0.4
  source:
    ref: Documentation conventions implicit in the repository's AGENTS.md and CLAUDE.md
    commit: 900d97f2035b301d6862d84b86fec57345ccfe30
    path: AGENTS.md
  rule: 'Markdown cross-references that include both a path and an anchor (e.g.,

    `[label](path#anchor)`) must be valid: the path component must resolve

    from the source file''s location, and the anchor must correspond to an

    actual heading in the target file. Broken cross-references are an

    immediate quality red flag in agent-facing instruction files because

    agents may follow them and either fail or hallucinate content.

    '
- id: anchor_to_heading_label_consistency
  weight: 0.3
  source:
    ref: 文档锚点 ID 规范
    commit: 900d97f2035b301d6862d84b86fec57345ccfe30
    path: AGENTS.md
  rule: 'The visible label `[text]` of an in-document link should reflect the

    heading text it points to. After fixing an anchor mismatch, the label

    must be updated in lockstep so that readers see a coherent label that

    matches the section title in the linked file.

    '
- id: minimal_scope_edit
  weight: 0.2
  source:
    ref: PR 规范 — 标题与内容 (concise scope expectation)
    commit: 900d97f2035b301d6862d84b86fec57345ccfe30
    path: AGENTS.md
  rule: 'The fix should touch only the four bullet lines in the

    ''AGENTS.md 规范引用'' section of `.agents/skills/changelog-collect/SKILL.md`.

    Trailing descriptions, surrounding paragraphs, and unrelated sections

    must remain untouched. Drive-by edits in a documentation/path-fix change

    pollute the diff and make review harder.

    '
- id: bilingual_terminology_preserved
  weight: 0.1
  source:
    ref: 国际化规范 / bilingual document conventions
    commit: 900d97f2035b301d6862d84b86fec57345ccfe30
    path: AGENTS.md
  rule: 'The references section uses Chinese label text (e.g. ''核心原则'', ''格式规范'').

    The fix should keep the labels in Chinese to match surrounding prose;

    do not silently translate them to English.

    '
