    type: pass_to_pass
    origin: repo_tests
    description: "Ruff linter check on kda_backend.py passes"

  - id: test_repo_black_format
    type: pass_to_pass
    origin: repo_tests
    description: "Black formatting check on kda_backend.py passes"

  - id: test_repo_isort
    type: pass_to_pass
    origin: repo_tests
    description: "isort import ordering check on kda_backend.py passes"

  - id: test_repo_codespell
    type: pass_to_pass
    origin: repo_tests
    description: "codespell spelling check on kda_backend.py passes"

  - id: test_repo_import_structure
    type: pass_to_pass
