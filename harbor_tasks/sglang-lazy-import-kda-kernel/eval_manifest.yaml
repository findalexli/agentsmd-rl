    description: "CuteDSLKDAKernel must still be referenced in the file (not deleted)"

  - id: triton_import_still_toplevel
    type: pass_to_pass
    origin: static
    description: "TritonKDAKernel must remain a top-level import (only CuteDSL should be lazified)"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "File must have real content with all key identifiers present"

