version: "2.0"

source:
  repo: "astral-sh/ruff"
  pr: 24146
  base_commit: "e7f1c536715d8a44aa830c1e4947e2ffcca06e0e"
  merge_commit: "d72371fe242262f2c0a8cfc1d9428d36fbcac8d0"

checks:
  - id: crate_compiles
    type: pass_to_pass
    origin: static
    description: "ruff_annotate_snippets crate compiles without errors"

  - id: plain_ascii_avoids_allocation
    type: fail_to_pass
    origin: pr_diff
    description: "normalize_whitespace returns Cow::Borrowed for plain ASCII text"

  - id: tab_replacement_correct
    type: fail_to_pass
    origin: pr_diff
    description: "normalize_whitespace returns Cow::Owned with correct output for tab input"

  - id: complex_clean_avoids_allocation
    type: fail_to_pass
    origin: pr_diff
    description: "normalize_whitespace avoids allocation for complex strings without replacement chars"

  - id: empty_string_avoids_allocation
    type: fail_to_pass
    origin: pr_diff
    description: "normalize_whitespace avoids allocation for empty string"

  - id: unicode_control_chars_replaced
    type: fail_to_pass
    origin: pr_diff
    description: "normalize_whitespace replaces Unicode control chars and returns Cow::Owned"

  - id: existing_crate_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Existing ruff_annotate_snippets tests must not regress"

  - id: render_pre_allocates
    type: fail_to_pass
    origin: pr_diff
    description: "StyledBuffer::render pre-allocates string capacity"

  - id: puts_avoids_per_char_putc
    type: fail_to_pass
    origin: pr_diff
    description: "StyledBuffer::puts does not delegate to per-character putc loop"

  - id: no_local_imports
    type: pass_to_pass
    origin: agent_config
    description: "Rust imports at file top, not locally in functions"
    source:
      path: "AGENTS.md"
      lines: "76"
      commit: "e7f1c536715d8a44aa830c1e4947e2ffcca06e0e"

  - id: no_new_unwrap_panic
    type: pass_to_pass
    origin: agent_config
    description: "No new unwrap()/panic!()/unreachable!() introduced"
    source:
      path: "AGENTS.md"
      lines: "79"
      commit: "e7f1c536715d8a44aa830c1e4947e2ffcca06e0e"

  - id: prefer_expect_over_allow
    type: pass_to_pass
    origin: agent_config
    description: "Use #[expect()] not #[allow()] for Clippy lint suppression"
    source:
      path: "AGENTS.md"
      lines: "81"
      commit: "e7f1c536715d8a44aa830c1e4947e2ffcca06e0e"

rubric:
