version: "1.0"
source_pr:
  owner: cloudflare
  repo: workers-sdk
  pr_number: 13049
  base_commit: 5ededb5d52f4362ce8f72d442ba825d48dcabbf8
  merge_commit: 7a5be2078800426a9ef1f8520ef72a99d9847c16

entrypoint: packages/wrangler/src/containers/registries.ts
target_files:
  - packages/wrangler/src/containers/registries.ts
  - packages/containers-shared/src/client/models/ImageRegistryPermissions.ts

# Distinctive line for idempotency (from the patch)
distinctive_line: 'LIBRARY_PUSH = "library_push",'

checks:
  # Fail-to-pass tests (the core fix)
  - id: test_library_push_enum_exists
    type: fail_to_pass
    origin: behavioral
    description: ImageRegistryPermissions enum must include LIBRARY_PUSH
    file: packages/containers-shared/src/client/models/ImageRegistryPermissions.ts

  - id: test_cli_argument_definition
    type: fail_to_pass
    origin: behavioral
    description: CLI must define the --library-push argument with correct type
    file: packages/wrangler/src/containers/registries.ts

  - id: test_function_parameter
    type: fail_to_pass
    origin: behavioral
    description: registryCredentialsCommand function must accept libraryPush parameter
    file: packages/wrangler/src/containers/registries.ts

  - id: test_validation_logic
    type: fail_to_pass
    origin: behavioral
    description: Validation logic must accept --library-push as valid option
    file: packages/wrangler/src/containers/registries.ts

  - id: test_permission_passed_to_api
    type: fail_to_pass
    origin: behavioral
    description: library_push permission must be passed to API when flag is set
    file: packages/wrangler/src/containers/registries.ts

  # Pass-to-pass tests (regression safety)
  - id: test_wrangler_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: Wrangler containers registries unit tests pass

  - id: test_typescript_compiles
    type: pass_to_pass
    origin: repo_tests
    description: TypeScript compilation succeeds

  - id: test_modified_files_format
    type: pass_to_pass
    origin: repo_tests
    description: Modified files must follow the repo's formatting standards

  - id: test_modified_files_lint
    type: pass_to_pass
    origin: repo_tests
    description: Modified files must pass the repo's linter

  - id: test_enum_matches_api_values
    type: pass_to_pass
    origin: behavioral
    description: Enum values match expected API format

# Rubric for agent config rules
rubric:
  - rule: Use pnpm for package management (not npm/yarn)
    source: AGENTS.md
    type: process

  - rule: Use TypeScript with strict mode, no 'any' type
    source: AGENTS.md
    type: code_quality

  - rule: No console.* in wrangler - use logger singleton
    source: AGENTS.md
    type: code_quality

  - rule: Use import type for type-only imports
    source: AGENTS.md
    type: code_style

  - rule: No non-null assertions (!)
    source: AGENTS.md
    type: code_quality

  - rule: Always use curly braces for control flow
    source: AGENTS.md
    type: code_style
