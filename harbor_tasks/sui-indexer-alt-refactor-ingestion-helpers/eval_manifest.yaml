# Agent config rules - based on CLAUDE.md from the repo
agent_config:
  - rule: License headers required
    check: All new files have license headers
    source: CLAUDE.md (License comments section)

  - rule: Use cargo check for validation
    check: Code compiles with cargo check
    source: CLAUDE.md (Building and Installation)

  - rule: Never use linting suppressions
    check: No #[allow(dead_code)] or similar attributes added
    source: CLAUDE.md (CRITICAL - Final Development Steps)

  - rule: Use cargo xclippy for linting
    check: Code passes cargo xclippy
    source: CLAUDE.md (Linting and Formatting)

# Rubric for soft/subjective checks (LLM judge only)
rubric: []
