    source: test_metric_registered

  - id: unit_tests_compile
    name: Unit tests compile
    description: Unit tests compile successfully
    origin: p2p
    source: test_unit_tests_compile

  - id: p2p_cargo_check
    name: Cargo check passes
    description: Repo's cargo check passes for sui-indexer-alt-framework
