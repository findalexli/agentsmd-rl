task_name: sui-indexer-alt-refactor-ingestion-helpers
source_pr:
  owner: MystenLabs
  repo: sui
  pr_number: 26042
  base_commit: 6a391733c6a07cda5d3c9939efee306490d16bd
  merge_commit: 9ae4df2ec0416c7b051b128a8a8d3bd23efbfe1f
description: >
  Refactor sui-indexer-alt-framework to use helper functions for ingestion client
  operations. The PR extracts transient_backoff() and retry_transient_with_slow_monitor()
  functions to reduce code duplication.

# Each check maps 1:1 to a test_* function in test_outputs.py
checks:
