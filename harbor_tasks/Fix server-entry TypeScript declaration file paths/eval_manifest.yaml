- rule: Proper tsconfig files created
- rule: Vite configs updated
- rule: Package validation passes
- rule: 'Test types: `pnpm test:unit`, `pnpm test:types`, `pnpm test:eslint`, `pnpm
    test:e2e`, `pnpm test:build`'
  source:
    path: AGENTS.md
    lines: 54-54
  evidence: The gold solution updates the `test:build` script in the `package.json`
    files to run package validation (`publint` and `attw`), which aligns with the
    defined test types.
  category: testing
hierarchy_analysis: The `AGENTS.md` file provides general guidelines for testing and
  formatting. However, for this specific PR, the focus is on fixing build configuration
  (`tsconfig` and `vite.config`) and updating the `test:build` script. The agent should
  prioritize the specific task instructions over general formatting or exhaustive
  unit testing rules.
distractors:
- rule: 'Fix formatting: `pnpm format`'
  collision_type: scope_ambiguity
  why_distracting: The agent might run `pnpm format` and include unrelated formatting
    changes in the PR, which is out of scope for fixing the TypeScript declaration
    file paths.
  severity: medium
  source:
    path: AGENTS.md
    lines: 56-56
- rule: 'Critical: Always run unit and type tests during development - do not proceed
    if they fail'
  collision_type: scope_ambiguity
  why_distracting: The agent might try to run the full unit and type test suite and
    get distracted by unrelated failures, or try to write unit tests for this purely
    configuration/build-related change.
  severity: medium
  source:
    path: AGENTS.md
