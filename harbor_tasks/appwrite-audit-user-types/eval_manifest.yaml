    path: AGENTS.md
    lines: 90-99
    commit: bb078086618f85634763943b9bee5fb8e8453cbd
- rule: resourceType values must always be plural (e.g., 'functions', 'sites', 'deployments').
  source:
    path: AGENTS.md
    lines: '88'
    commit: bb078086618f85634763943b9bee5fb8e8453cbd
- rule: Follow the Action pattern for HTTP endpoints with proper constructor setup
    and dependency injection.
  source:
    path: AGENTS.md
    lines: 103-126
    commit: bb078086618f85634763943b9bee5fb8e8453cbd
