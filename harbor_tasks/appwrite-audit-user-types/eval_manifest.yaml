source_pr:
  owner: appwrite
  repo: appwrite
  number: 11580
  title: "feat: distinguish user types in audit logs"
  merge_commit: 20f80ac067e0042ea05ac9566f0a9ff1624bf3b2
  base_commit: bb078086618f85634763943b9bee5fb8e8453cbd

checks:
  - id: "constants_defined"
    name: "Activity type constants defined"
    type: "pass_to_pass"
    description: "All new activity type constants (ACTIVITY_TYPE_USER, ACTIVITY_TYPE_ADMIN, ACTIVITY_TYPE_GUEST, ACTIVITY_TYPE_KEY_PROJECT, ACTIVITY_TYPE_KEY_ACCOUNT, ACTIVITY_TYPE_KEY_ORGANIZATION) are defined in app/init/constants.php"
    origin: "fail_to_pass"

  - id: "log_model_has_usertype"
    name: "Log model has userType field"
    type: "pass_to_pass"
    description: "Log response model includes userType field with correct description and possible values"
    origin: "fail_to_pass"

  - id: "api_controller_mode_based_type"
    name: "API controller sets user type based on mode"
    type: "pass_to_pass"
    description: "API controller distinguishes between admin and regular users based on APP_MODE_ADMIN"
    origin: "fail_to_pass"

  - id: "api_controller_key_type_mapping"
    name: "API key types map to activity types"
    type: "pass_to_pass"
    description: "API controller maps API_KEY_STANDARD/ACCOUNT/ORGANIZATION to corresponding ACTIVITY_TYPE_KEY_* values"
    origin: "fail_to_pass"

  - id: "api_controller_mode_injection"
    name: "API controller injects mode parameter"
    type: "pass_to_pass"
    description: "API controller action properly injects and uses mode parameter"
    origin: "fail_to_pass"

  - id: "api_controller_preserves_type"
    name: "API controller preserves existing type"
    type: "pass_to_pass"
    description: "API controller only sets user type when not already set via empty() guard"
    origin: "fail_to_pass"

  - id: "users_api_includes_usertype"
    name: "Users API includes userType and mode"
    type: "pass_to_pass"
    description: "Users API log response construction includes both userType and mode fields"
    origin: "fail_to_pass"

  - id: "messaging_api_includes_usertype"
    name: "Messaging API includes userType"
    type: "pass_to_pass"
    description: "All messaging API log response constructions include userType field"
    origin: "fail_to_pass"

  - id: "xlist_endpoints_include_usertype"
    name: "XList endpoints include userType"
    type: "pass_to_pass"
    description: "All log listing endpoints (teams, databases, collections, documents, tablesDB) include userType in response"
    origin: "fail_to_pass"

  - id: "key_project_replaces_app_type"
    name: "ACTIVITY_TYPE_KEY_PROJECT replaces ACTIVITY_TYPE_APP"
    type: "pass_to_pass"
    description: "ACTIVITY_TYPE_APP is replaced with ACTIVITY_TYPE_KEY_PROJECT for API key handling"
    origin: "fail_to_pass"

  - id: "php_syntax_valid"
    name: "PHP syntax is valid"
    type: "pass_to_pass"
    description: "All modified PHP files pass PHP syntax check"
    origin: "pass_to_pass"

  - id: "test_repo_phplint"
    name: "Repo PHP syntax check"
    type: "pass_to_pass"
    description: "All PHP files in app/ and src/ pass syntax validation"
    origin: "repo_tests"

  - id: "test_repo_pint"
    name: "Repo Pint code style check"
    type: "pass_to_pass"
    description: "All PHP files pass Pint code style checks"
    origin: "repo_tests"

  - id: "test_repo_phpstan_modified"
    name: "Repo PHPStan static analysis"
    type: "pass_to_pass"
    description: "Modified directories pass PHPStan static analysis"
    origin: "repo_tests"

