  evidence: The gold solution correctly targets `XList.php` files (e.g., `src/Appwrite/Platform/Modules/Databases/Http/Databases/Collections/Documents/Logs/XList.php`)
    to update the log response builders in the n
  category: naming
- rule: Inside `Http` directories for services, file names can only be `Get.php`,
    `Update.php`, `Create.php`, `Delete.php` or `XList.php`.
  source:
    path: src/Appwrite/Platform/AGENTS.md
    lines: 31-35
  evidence: The gold solution correctly identifies and modifies `XList.php` files
    across various modules (e.g., Databases, Teams) to update the log response builders,
    leveraging the naming convention that list endpoi
  category: naming
- rule: List endpoints in Http directories must be named `XList.php` because `List`
    is a reserved keyword in PHP.
  source:
    path: src/Appwrite/Platform/AGENTS.md
    lines: 31-35
  evidence: The gold solution edits `XList.php` files under `Logs/` directories across
    various modules (e.g., Databases, Teams) to composer.json passes schema validation
    with composer validate --strict
  category: naming
hierarchy_analysis: The base `AGENTS.md` provides the general module structure, while
  `src/Appwrite/Platform/AGENTS.md` provides the specific `XList.php` naming convention.
  The agent must combine the instruction 'Update log response builders' with the `XList.php`
  convention to successfully locate all the files that need editing.
version: '2.0'
source:
  repo: appwrite/appwrite
  pr: 11580
  base_commit: bb078086618f85634763943b9bee5fb8e8453cbd
  merge_commit: 20f80ac067e0042ea05ac9566f0a9ff1624bf3b2
distractors:
- rule: Model non-CRUD operations as property updates (e.g., `Update.php`).
  source:
    path: src/Appwrite/Platform/AGENTS.md
    lines: 32-34
  collision_type: scope_ambiguity
  why_distracting: The instruction asks to 'Update log response builders'. An agent
    might misinterpret this as a directive to create a new endpoint for updating logs
    (e.g., `Logs/Update.php`) based on the rule to model non-CRUD operations as property
    updates, rather than modifying the existing `XList.php` read endpoints.
  severity: medium
- rule: Each service is its own module, and related code should be grouped under one
    roof.
  source:
    path: src/Appwrite/Platform/AGENTS.md
    lines: 6-8
  collision_type: architecture_boundary
  why_distracting: The rule states that related code achieving a specific goal should
    be put under one roof (a module). An agent might try to refactor all log-related
    endpoints into a single new `Logs` module, rather than updating the existing log
    endpoints scattered across different modules (Databases, Teams, etc.).
  severity: medium
