  evidence: The gold solution uses a PHP 8 `match` expression in `app/controllers/shared/api.php`
    to map `$apiKey->getType()` to the corresponding `ACTIVITY_TYPE_KEY_*` constant.
  category: style
- rule: Use `XList.php` for list endpoints instead of `List.php`.
  source:
    path: src/Appwrite/Platform/AGENTS.md
    lines: 31-35
  evidence: The gold solution correctly targets `XList.php` files (e.g., `src/Appwrite/Platform/Modules/Databases/Http/Databases/Collections/Documents/Logs/XList.php`)
    to update the log response builders in the n
  category: naming
agent_config:
- source_file: CLAUDE.md
  relevant_lines: all
  description: Appwrite architecture overview and Action pattern
- source_file: AGENTS.md
  relevant_lines: all
  description: Commands, stack, project layout, and conventions
- source_file: src/Appwrite/Platform/AGENTS.md
  relevant_lines: all
  description: Module structure and HTTP endpoint naming conventions
- source_file: .claude/skills/pr-workflow/SKILL.md
  relevant_lines: all
  description: Branch targeting rules (target version branches, not main)
distractors:
- rule: Inside Http directories, file names can only be Get.php, Update.php, Create.php,
    Delete.php or XList.php.
  collision_type: architecture_boundary
  why_distracting: The agent might notice that `app/controllers/api/messaging.php`
    and `app/controllers/api/users.php` do not follow the strict CRUD naming convention
    (Get, Update, Create, Delete, XList) and attempt to refactor these legacy controllers
    into the new module structure, which is a massive out-of-scope change.
  severity: high
  source:
    path: src/Appwrite/Platform/AGENTS.md
    lines: 31-35
- rule: Each service is its own module, putting related code under one roof.
  collision_type: architecture_boundary
  why_distracting: The agent might try to extract the audit logging logic into a dedicated
    `Audit` or `Log` module under `src/Appwrite/Platform/Modules/` to put 'related
    code under one roof', instead of simply updating the existing legacy `app/controllers/shared/api.php`
    and `app/init/constants.php`.
  severity: medium
  source:
    path: src/Appwrite/Platform/AGENTS.md
    lines: 6-7
hierarchy_analysis: The project has a hybrid architecture with legacy controllers
  in `app/controllers/` and new modules in `src/Appwrite/Platform/Modules/`. The root
  `AGENTS.md` mentions both, but `src/Appwrite/Platform/AGENTS.md` strictly enforces
  the new module structure and naming conventions (`XList.php`, etc.). Agents must
  understand that rules in `src/Appwrite/Platform/AGENTS.md` apply only to the new
  module architecture and should not be retroactively applied to legacy files in `app/controllers/`
  during a feature update.
