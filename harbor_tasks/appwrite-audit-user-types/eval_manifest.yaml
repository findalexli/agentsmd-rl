    path: AGENTS.md
    lines: 90-99
    commit: bb078086618f85634763943b9bee5fb8e8453cbd
- rule: resourceType values must always be plural (e.g., 'functions', 'sites', 'deployments').
  source:
    path: AGENTS.md
    lines: '88'
    commit: bb078086618f85634763943b9bee5fb8e8453cbd
- rule: Follow the Action pattern for HTTP endpoints with proper constructor setup
    and dependency injection.
  source:
    path: AGENTS.md
    lines: 103-126
    commit: bb078086618f85634763943b9bee5fb8e8453cbd
- rule: HTTP endpoint files must be named Get.php, Create.php, Update.php, Delete.php,
    or XList.php only.
  source:
    path: src/Appwrite/Platform/AGENTS.md
    lines: '32'
    commit: bb078086618f85634763943b9bee5fb8e8453cbd
- rule: Use PHP 8.3+ features.
  source:
    path: AGENTS.md
    lines: 18-18
    commit: bb078086618f85634763943b9bee5fb8e8453cbd
  evidence: The gold solution uses a PHP 8 `match` expression in `app/controllers/shared/api.php`
    to map `$apiKey->getType()` to the corresponding `ACTIVITY_TYPE_KEY_*` constant.
  category: style
