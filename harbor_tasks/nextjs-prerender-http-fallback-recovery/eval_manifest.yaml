version: "2.0"

source:
  repo: "vercel/next.js"
  pr: 92231
  base_commit: "e464ca398c5992c4ec9fb23192fc60ef7b1b5f94"
  merge_commit: "c06658e9199bccc10de1daf24cf7fe542c5ee13a"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Both modified TypeScript files must have balanced braces"

  - id: test_prettier_formatting
    type: pass_to_pass
    origin: repo_tests
    description: "Modified TypeScript files must pass Prettier formatting check"

  - id: test_error_codes_check
    type: pass_to_pass
    origin: repo_tests
    description: "Error codes must be valid"

  - id: test_repo_lint
    type: pass_to_pass
    origin: repo_tests
    description: "Modified TypeScript files must pass ESLint"

  - id: http_error_boundary_status_code_mapping
    type: fail_to_pass
    origin: pr_diff
    description: "app-render.tsx must map HTTP status codes (404/403/401) to their loader tree boundary slots (not-found/forbidden/unauthorized)"

  - id: deepest_boundary_tree_search
    type: fail_to_pass
    origin: pr_diff
    description: "app-render.tsx must recursively find the deepest matching HTTP fallback boundary in the loader tree"

  - id: prerender_http_error_state_type_exported
    type: fail_to_pass
    origin: pr_diff
    description: "create-component-tree.tsx must export a type for prerender HTTP error state with boundaryTree and triggeredStatus fields"

  - id: recovery_branches_on_cache_components_http_error
    type: fail_to_pass
    origin: pr_diff
    description: "Prerender recovery must branch on cacheComponents + HTTP access error to use getRSCPayload with scoped fallback instead of getErrorRSCPayload"

  - id: flight_stream_teed_for_prerender
    type: fail_to_pass
    origin: pr_diff
    description: "Flight stream must be teed so both Fizz rendering and prerender buffer get their own copy during HTTP fallback recovery"

  - id: component_tree_renders_scoped_fallback
    type: fail_to_pass
    origin: pr_diff
    description: "create-component-tree.tsx must render the scoped fallback element at the matched boundary for 404/403/401 via createSeedData"

  - id: generic_error_path_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "getErrorRSCPayload must still exist for non-HTTP-access errors"

  - id: app_render_not_truncated
    type: pass_to_pass
    origin: static
    description: "app-render.tsx must not be truncated (>200KB)"

  - id: create_component_tree_not_truncated
    type: pass_to_pass
    origin: static
    description: "create-component-tree.tsx must not be truncated (>15KB)"

rubric:
  - rule: "When modifying TypeScript source files, use consistent type annotations and export types that are consumed by other modules."
    reference:
      file: "packages/next/src/server/app-render/create-component-tree.tsx"
      line: "227-230"
      content: "export type PrerenderHTTPErrorState = { boundaryTree: LoaderTree; triggeredStatus: HTTPAccessErrorStatusCode }"
  - rule: "HTTP error handling code should use proper status code types (404 | 403 | 401) and check for specific boundary slots in the loader tree."
    reference:
      file: "packages/next/src/server/app-render/app-render.tsx"
      line: "534-551"
      content: "function hasPrerenderHTTPErrorBoundary(loaderTree: LoaderTree, triggeredStatus: HTTPAccessErrorStatusCode, authInterrupts: boolean): boolean"
