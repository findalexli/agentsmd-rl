rubric:
- id: agents_md_no_panic_unwrap
  source:
    path: AGENTS.md
    commit: 6728820252f31969cba8258c32b1fe7e7162d5d9
  rule: 'Per AGENTS.md "Development Guidelines": avoid `panic!`, `unreachable!`,

    and `.unwrap()` in new code. Encode invariants in the type system or

    handle the missing case explicitly. The added typed_dict.rs code must

    not introduce any of these.

    '
- id: agents_md_let_chains
  source:
    path: AGENTS.md
    commit: 6728820252f31969cba8258c32b1fe7e7162d5d9
  rule: 'Per AGENTS.md "Development Guidelines": prefer let-chains

    (`if let Some(x) = ... && cond && let Some(y) = ...`) over nested

    `if let` statements. The mismatch check involves multiple optional

    lookups (definition, assigned name, lint builder) — these should be

    composed in a single let-chain.

    '
- id: agents_md_concise_diagnostic
  source:
    path: AGENTS.md
    commit: 6728820252f31969cba8258c32b1fe7e7162d5d9
  rule: 'Per AGENTS.md: "make error messages concise. Think about how an error

    message would look on a narrow terminal screen." The diagnostic

    message naming the mismatch must be a single, terse line; if extra

    context is required it should go in subdiagnostics, not the primary

    message.

    '
- id: agents_md_imports_at_top
  source:
    path: AGENTS.md
    commit: 6728820252f31969cba8258c32b1fe7e7162d5d9
  rule: 'Per AGENTS.md: "Rust imports should always go at the top of the file,

    never locally in functions." Any new `use` statements added to support

    the fix must be at the top of `typed_dict.rs`.

    '
- id: agents_md_existing_utilities
  source:
    path: AGENTS.md
    commit: 6728820252f31969cba8258c32b1fe7e7162d5d9
  rule: 'Per AGENTS.md: "Avoid writing significant amounts of new code. ... Look

    for existing utilities first." The fix should reuse the existing

    `INVALID_ARGUMENT_TYPE` lint and `report_lint`/`into_diagnostic`

    mechanism already used by sibling argument checks in the same file,

    not introduce a new diagnostic plumbing path.

    '
- id: agents_md_purposeful_comments
  source:
    path: AGENTS.md
    commit: 6728820252f31969cba8258c32b1fe7e7162d5d9
  rule: 'Per AGENTS.md: "Use comments purposefully. Don''t use comments to

    narrate code." The fix should not add narrative comments describing

    what the code does; the code should be self-explanatory or annotated

    only for non-obvious invariants.

    '
