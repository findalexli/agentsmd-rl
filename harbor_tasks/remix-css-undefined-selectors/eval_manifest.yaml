checks:
- id: test_nested_selector_with_undefined_value_does_not_throw
  type: fail_to_pass
  origin: pr_diff
  description: A nested selector key whose value is `undefined` must not raise; processStyle must emit valid CSS that omits the disabled selector.
- id: test_at_rule_with_undefined_value_does_not_throw
  type: fail_to_pass
  origin: pr_diff
  description: An at-rule key whose value is `undefined` must not raise; the disabled at-rule must be skipped while sibling at-rules render.
- id: test_at_rule_undefined_inside_function_at_rule_does_not_throw
  type: fail_to_pass
  origin: pr_diff
  description: An undefined nested at-rule inside an `@function` definition body must be skipped without raising.
- id: test_array_value_is_not_treated_as_record
  type: fail_to_pass
  origin: pr_diff
  description: The record predicate must reject Array values so iterating an array as record entries does not happen.
- id: test_undefined_at_rule_does_not_emit_empty_block
  type: fail_to_pass
  origin: pr_diff
  description: A skipped at-rule must produce no output at all — not an empty `@media (...) {}` block in the resulting CSS.
- id: test_basic_styles_still_compile
  type: pass_to_pass
  origin: pr_diff
  description: Basic css objects with declarations and a `&:hover` block still produce expected CSS.
- id: test_node_can_strip_types_on_style_module
  type: pass_to_pass
  origin: repo_tests
  description: The patched style.ts file is syntactically valid TypeScript.
- id: test_ci_format_format
