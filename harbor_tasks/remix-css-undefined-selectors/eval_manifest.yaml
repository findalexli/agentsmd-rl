config_edits: []
rubric:
- rule: Prefer `let` for locals, `const` only at module scope; never use `var`
  source:
    path: AGENTS.md
    lines: '24'
    commit: bf2a74b63184ec2da7fbe993fd12e229a42fb3f1
  evidence: The patch uses `let` for all new locals (e.g., `let record = toRecord(value)`, `let inner = ...`); no new `const` appears inside function bodies.
  category: style
  verification: llm_judge
- rule: 'Prettier (printWidth: 100, no semicolons, single quotes, spaces not tabs)'
  source:
    path: AGENTS.md
    lines: '28'
    commit: bf2a74b63184ec2da7fbe993fd12e229a42fb3f1
  evidence: The patch uses single quotes for string literals and omits statement-terminating semicolons, matching the repo Prettier configuration.
  category: style
  verification: llm_judge
- rule: Only add non-JSDoc comments when the code is doing something surprising or non-obvious
  source:
    path: AGENTS.md
    lines: '31'
    commit: bf2a74b63184ec2da7fbe993fd12e229a42fb3f1
  evidence: The patch adds comments explaining the non-obvious `continue` skip for conditionally disabled selectors/at-rules — each explains why the guard exists, not what the code does.
  category: style
  verification: llm_judge
- rule: Always use `import type { X }` for types (separate from value imports); use `export type { X }` for type exports; include `.ts` extensions
  source:
    path: AGENTS.md
    lines: '23'
    commit: bf2a74b63184ec2da7fbe993fd12e229a42fb3f1
  evidence: The fix introduces no new imports, so it does not violate the import-type convention.
  category: style
  verification: llm_judge
distractors:
- rule: Use regular function declarations/expressions by default. Only use arrow functions as callbacks (e.g., route handlers, array methods) where preserving lexical `this` is beneficial or the syntax is more concise
  source:
    path: AGENTS.md
    lines: '25'
    commit: bf2a74b63184ec2da7fbe993fd12e229a42fb3f1
  collision_type: scope_ambiguity
  why_distracting: The fix does not require changing function styles; refactoring existing arrow functions adds noise and risks introducing subtle `this` binding bugs.
  severity: medium
- rule: Use descriptive lowercase names for type parameters (e.g., `source`, `method`, `pattern`) instead of single uppercase letters like `T`, `P`, or `K`
  source:
    path: AGENTS.md
    lines: '30'
    commit: bf2a74b63184ec2da7fbe993fd12e229a42fb3f1
  collision_type: rule_conflict
  why_distracting: The fix introduces no new generic type parameters; renaming existing ones in the file is out of scope and risks breaking the public API.
  severity: low
- rule: Do not use `for` loops or conditional statements (`if`, `switch`, etc.) to generate test cases within `describe()` blocks.
  source:
    path: AGENTS.md
    lines: '35'
    commit: bf2a74b63184ec2da7fbe993fd12e229a42fb3f1
  collision_type: meta_confusion
  why_distracting: This rule governs test files only; an agent might incorrectly avoid `for...of` loops in the production style.ts source code, which the fix relies on.
  severity: low
