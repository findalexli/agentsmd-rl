task:
  name: excalidraw-arrow-drag-start-fix
  title: "Fix arrow drag start jumping when initiated in bindable element area"
  description: |
    When dragging to create an arrow starting from within a bindable element's area,
    the arrow jumps across the element instead of starting from the pointer position.
    The fix involves modifying updateBoundPoint in packages/element/src/binding.ts to
    check for initial arrow state (last point at [0,0]) and skip binding updates.

checks:
  - id: binding_logic_initial_arrow
    name: "Fix applied: pointsEqual check for initial arrow state"
    type: structural
    description: |
      The updateBoundPoint function must have the fix applied: importing pointsEqual
      and checking if the arrow's last point is at origin [0,0] to return null for
      initial arrow state. This prevents the jump bug.
    origin: f2p

