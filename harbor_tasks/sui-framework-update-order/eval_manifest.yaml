    origin: behavioral

  - id: temp_dir_copy
    description: "UPDATE copies files from temp dir to crate root"
    type: programmatic
    origin: behavioral

  - id: existence_checks
    description: "File deletion checks path existence first"
    type: programmatic
    origin: behavioral

  - id: compilation
    description: "Modified test file compiles without errors"
    type: programmatic
    origin: behavioral

  - id: async_test_attr
    description: "Async tests use #[tokio::test], not #[test]"
