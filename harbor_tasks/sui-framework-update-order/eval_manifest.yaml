distractors:
- rule: Use `cargo nextest --lib` to run only library tests and skip integration tests
    for faster feedback
  collision_type: scope_ambiguity
  why_distracting: The file being modified (`crates/sui-framework/tests/build-system-packages.rs`)
    is an integration test. If the agent follows the rule to use `--lib` for faster
    feedback, the test they are trying to fix will be skipped entirely, leading to
    false positives where the agent thinks their code works but it was never executed.
  severity: high
  source:
    path: CLAUDE.md
    lines: 39-40
- rule: simtests must be run with `cargo simtest` to avoid false negatives
  collision_type: meta_confusion
  why_distracting: The test being modified is a standard async tokio test (`#[tokio::test]`),
    not a simtest. An agent might get confused and try to run it using `cargo simtest`
    or attempt to convert it to a simtest, which is unnecessary and could fail.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 28-29
hierarchy_analysis: The repository uses a root `CLAUDE.md` and `AGENTS.md` which apply
  globally. The `AGENTS.md` defers to `CLAUDE.md` for repo defaults. There are no
  crate-specific config files provided for `sui-framework`, so the root `CLAUDE.md`
  rules apply directly.
