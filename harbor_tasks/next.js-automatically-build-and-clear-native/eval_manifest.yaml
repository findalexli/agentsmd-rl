rubric:
- rule: Build everything uses `pnpm build`
  source:
    path: AGENTS.md
    lines: 55-56
  category: tooling
  evidence: The gold solution updates the developer instructions to point to `pnpm
    build` for Rust/Turbopack changes, unifying the workflow under the existing 'Build
    everything' command.
config_edits:
- path: AGENTS.md
  tier: 1
  gold_added: '- **Edited Next.js code or Turbopack (Rust)?** → `pnpm build`'
  gold_removed: '- **Edited Turbopack (Rust)?** → `pnpm swc-build-native`

    - **Edited both?** → `pnpm turbo build build-native`'
distractors:
- rule: If you are changing Next.js source or integration tests, start `pnpm --filter=next
    dev` in a separate terminal session before making edits
  source:
    path: AGENTS.md
    lines: 65-67
  collision_type: scope_ambiguity
  why_distracting: The agent is modifying build scripts and tooling (`packages/next-swc`),
    not the core Next.js framework source (`packages/next/src`). Starting the dev
    server would waste time and resources, as the changes need to be tested via the
    build pipeline, not the dev server.
  severity: medium
hierarchy_analysis: The repository uses `CLAUDE.md` which is a symlink to `AGENTS.md`.
  Both files contain identical high-level workflow instructions. The unique aspect
  of this PR is that the agent must modify the very instructions it is reading (`AGENTS.md`)
  to reflect the new, simplified build workflow it is implementing.
