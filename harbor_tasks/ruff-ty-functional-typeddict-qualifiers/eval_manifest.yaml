version: "2.0"

source:
  repo: "astral-sh/ruff"
  pr: 24176
  base_commit: "8c2a9cfbd6d22fdfff452d7e899595d4fa6ecc92"
  merge_commit: "b1e747d6fb0c3c49354ea0a4090eaf4d998359df"

checks:
  - id: cargo_check
    type: pass_to_pass
    origin: static
    description: "Modified Rust code must compile"

  - id: readonly_enforced_functional
    type: fail_to_pass
    origin: pr_diff
    description: "Assigning to ReadOnly field in functional TypedDict must produce invalid-assignment"

  - id: notrequired_allows_omission
    type: fail_to_pass
    origin: pr_diff
    description: "Omitting NotRequired field must not produce missing-typed-dict-key"

  - id: required_enforced_total_false
    type: fail_to_pass
    origin: pr_diff
    description: "Required field in total=False TypedDict must produce missing-typed-dict-key when omitted"

  - id: string_annotation_qualifier
    type: fail_to_pass
    origin: pr_diff
    description: "String annotation 'NotRequired[int]' must be respected as qualifier"

  - id: string_annotation_required_total_false
    type: fail_to_pass
    origin: pr_diff
    description: "String 'Required[str]' in total=False must enforce requiredness"

  - id: basic_functional_typeddict
    type: pass_to_pass
    origin: repo_tests
    description: "Basic functional TypedDict without qualifiers must not regress"

  - id: class_based_qualifiers
    type: pass_to_pass
    origin: repo_tests
    description: "Class-based TypedDict with qualifiers must still work"

  - id: total_false_without_qualifiers
    type: pass_to_pass
    origin: repo_tests
    description: "total=False without qualifiers must allow omitting all fields"

  - id: no_unwrap_panic
    type: pass_to_pass
    origin: agent_config
    description: "No .unwrap(), panic!(), or unreachable!() in new code"
    source:
      path: "AGENTS.md"
      lines: "79"
      commit: "8c2a9cfbd6d22fdfff452d7e899595d4fa6ecc92"

  - id: imports_at_top
    type: pass_to_pass
    origin: agent_config
    description: "Rust imports at top of file, not locally in functions"
    source:
      path: "AGENTS.md"
      lines: "76"
      commit: "8c2a9cfbd6d22fdfff452d7e899595d4fa6ecc92"

  - id: expect_over_allow
    type: pass_to_pass
    origin: agent_config
    description: "Use #[expect()] over #[allow()] for Clippy lint suppression"
    source:
      path: "AGENTS.md"
      lines: "81"
      commit: "8c2a9cfbd6d22fdfff452d7e899595d4fa6ecc92"

  - id: salsa_node_access
    type: pass_to_pass
    origin: agent_config
    description: "Methods accessing .node() must be #[salsa::tracked]"
    source:
      path: "AGENTS.md"
      lines: "84"
      commit: "8c2a9cfbd6d22fdfff452d7e899595d4fa6ecc92"

rubric:
  - rule: "Prefer let chains (`if let` combined with `&&`) over nested `if let` statements to reduce indentation and improve readability."
    source:
      path: "AGENTS.md"
      lines: "80"
      commit: "8c2a9cfbd6d22fdfff452d7e899595d4fa6ecc92"

  - rule: "Use comments purposefully. Don't use comments to narrate code, but do use them to explain invariants and why something unusual was done a particular way."
    source:
      path: "AGENTS.md"
      lines: "82"
      commit: "8c2a9cfbd6d22fdfff452d7e899595d4fa6ecc92"

  - rule: "Avoid writing significant amounts of new code. Look for existing utilities and mechanisms first."
    source:
      path: "AGENTS.md"
      lines: "78"
      commit: "8c2a9cfbd6d22fdfff452d7e899595d4fa6ecc92"

  - rule: "Follow existing code style. Check neighboring files for patterns."
    source:
      path: "AGENTS.md"
      lines: "75"
      commit: "8c2a9cfbd6d22fdfff452d7e899595d4fa6ecc92"

  - rule: "Look to see if tests could go in an existing file before adding a new file for tests."
    source:
      path: "AGENTS.md"
      lines: "73"
      commit: "8c2a9cfbd6d22fdfff452d7e899595d4fa6ecc92"

  - rule: "When adding new ty checks, make error messages concise. Think about how an error message would look on a narrow terminal screen."
    source:
      path: "AGENTS.md"
      lines: "83"
      commit: "8c2a9cfbd6d22fdfff452d7e899595d4fa6ecc92"
