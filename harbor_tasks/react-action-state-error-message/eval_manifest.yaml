rubric:
- rule: React core files are located outside the `/compiler/` directory.
  source:
    path: CLAUDE.md
    lines: 7-8
  evidence: The gold solution modifies files in `packages/react-dom`, `packages/react-reconciler`,
    and `scripts/error-codes`, correctly identifying them as part of React core (outside
    `/compiler/`).
  category: architecture
distractors:
- rule: Use extract-errors when adding new error messages to React, or seeing 'unknown
    error code' warnings.
  collision_type: scope_ambiguity
  why_distracting: The agent might think it needs to run the extract-errors skill/script
    to update the error message. However, the gold solution manually updates `scripts/error-codes/codes.json`
    because it is modifying an existing error message (code 485) rather than adding
    a new one. Attempting to use the script for a simple string replacement might
    cause the agent to overcomplicate the task or fail if the script is optimized
    only for new error extraction.
  severity: medium
  source:
    path: .claude/skills/extract-errors
    lines: 1-2
hierarchy_analysis: The configuration is minimal, with a single CLAUDE.md file defining
  the monorepo structure. The primary source of potential confusion comes from the
  available skills, specifically the extract-errors skill, which might mislead an
  agent into using a script for a manual JSON update.
