    description: "generate_theme.py without --website preserves url('static/...) paths"

  - id: google_font_stylesheet
    type: pass_to_pass
    origin: repo_tests
    description: "GoogleFont still generates valid stylesheets with googleapis URL"

  - id: font_base_class
    type: pass_to_pass
    origin: repo_tests
    description: "Font base class returns expected defaults (url=None, css=None)"

  - id: not_stub
    type: pass_to_pass
