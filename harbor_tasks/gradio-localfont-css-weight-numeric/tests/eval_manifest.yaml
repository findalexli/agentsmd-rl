rubric:
- rule: Be consistent with the style of the surrounding code in gradio/themes/utils/fonts.py
  source:
    path: gradio/themes/utils/fonts.py
    lines: 85-106
    commit: 0595d1b15ba6b7c47f68ddf7f79152b3d1d3c467
  reference: '# Uses clear variable names (file_weight, css_weight) matching the surrounding
    code style

    file_weight = ("Regular" if weight == 400 else "Bold" if weight == 700 else str(weight))

    css_weight=weight

    '
- rule: 'Repository Structure: `gradio/` is Python backend, `js/` is frontend code.'
  source:
    path: scripts/generate_theme.py
    lines: 1-20
    commit: 0595d1b15ba6b7c47f68ddf7f79152b3d1d3c467
  reference: '# Backend Python code in scripts/

    parser.add_argument("--website", action="store_true", help="Adjust paths for SvelteKit
    website")

    # Frontend config in js/_website/package.json uses the --website flag

    "dev": "...python ../../scripts/generate_theme.py --website --outfile ..."

    '
  evidence: The gold solution correctly navigates the repository structure by modifying
    `gradio/themes/utils/fonts.py` for the backend Python logic and `js/_website/package.json`
    for the frontend website build script.
  category: architecture
