version: "1.0"
source_pr:
  owner: storybookjs
  repo: storybook
  number: 34166
  title: "UI: Make disabled Buttons keyboard-focusable"
  merge_commit: b8449a407ed99b3a1b345242641aac41a359281b
  base_commit: 90d86a1213443055f5e1ce73c9e2d7a7ac5a8499

checks:
  # Fail-to-pass tests - verify the accessibility fix
  - id: test_button_uses_aria_disabled
    type: fail_to_pass
    origin: agent_solution
    description: Button component uses aria-disabled instead of native disabled attribute

  - id: test_disabled_button_click_handler_blocked
    type: fail_to_pass
    origin: agent_solution
    description: Disabled buttons block click handlers to prevent interactions

  - id: test_styled_button_uses_transient_disabled_prop
    type: fail_to_pass
    origin: agent_solution
    description: StyledButton uses transient $disabled prop to avoid DOM pollution

  - id: test_styled_button_uses_disabled_prop_for_styling
    type: fail_to_pass
    origin: agent_solution
    description: Button styling correctly applies disabled visual state via $disabled

  # Pass-to-pass tests - verify repo health
  - id: test_repo_typecheck
    type: pass_to_pass
    origin: repo_tests
    description: Repo TypeScript checking passes (from AGENTS.md)

  - id: test_button_compiles
    type: pass_to_pass
    origin: repo_tests
    description: Button component and core package compile successfully

  - id: test_repo_prettier_check
    type: pass_to_pass
    origin: repo_tests
    description: Repo code formatting passes (prettier --check on Button.tsx)

  - id: test_core_check_package
    type: pass_to_pass
    origin: repo_tests
    description: Core package type checking passes (check-package script)

  - id: test_core_build_package
    type: pass_to_pass
    origin: repo_tests
    description: Core package builds successfully (build-package script)

# Accessibility-specific rules derived from the PR - these are validated by tests above
rubric:
  - rule: "Disabled buttons must remain keyboard-focusable for a11y"
    type: programmatic
    source: "PR #34166: UI: Make disabled Buttons keyboard-focusable"
    test_hint: "test_button_uses_aria_disabled validates this"

  - rule: "Use aria-disabled='true' instead of disabled attribute"
    type: programmatic
    source: "PR #34166"
    test_hint: "test_button_uses_aria_disabled validates this"

  - rule: "Click handlers must be blocked when aria-disabled is true"
    type: programmatic
    source: "PR #34166"
    test_hint: "test_disabled_button_click_handler_blocked validates this"

  - rule: "Use transient props ($prefix) for styled-component props that shouldn't reach DOM"
    type: programmatic
    source: "styled-components best practice + PR #34166"
    test_hint: "test_styled_button_uses_transient_disabled_prop validates this"
