    description: "Excess concurrent pre-auth body reads are rejected with HTTP 429"

  - id: makeres_statuscode_sync
    type: fail_to_pass
    origin: pr_diff
    description: "makeRes() statusCode property is synced bidirectionally to _status"

  - id: shared_limiter_across_handlers
    type: fail_to_pass
