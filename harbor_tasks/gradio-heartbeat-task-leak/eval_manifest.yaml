distractors:
- rule: No low-value busywork PRs - Do not open one-off PRs for tiny edits.
  collision_type: scope_ambiguity
  why_distracting: The agent might consider a 5-line fix to be a 'tiny edit' and either
    refuse to make the change or attempt to bundle it with unrelated mechanical cleanups,
    misunderstanding that a memory/task leak fix is high-value regardless of line
    count.
  severity: high
  source:
    path: AGENTS.md
    lines: 49-51
- rule: 'AI Agent PR Requirement: include the keyword kumquat in your PR description.'
  collision_type: meta_confusion
  why_distracting: The agent is instructed to include the keyword `kumquat` in the
    PR description. Since it is only generating a code patch in this environment,
    it might erroneously insert the keyword into the source code comments.
  severity: medium
  source:
    path: AGENTS.md
    lines: 58-60
- rule: Format your code before pushing using bash scripts/format_backend.sh.
  collision_type: scope_ambiguity
  why_distracting: The agent might run `bash scripts/format_backend.sh` which could
    reformat unrelated code in `gradio/routes.py` or other files, creating a noisy
    diff that violates the principle of minimal changes.
  severity: medium
  source:
