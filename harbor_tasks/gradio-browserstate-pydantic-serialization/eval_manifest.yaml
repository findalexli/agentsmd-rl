    to verify the Pydantic serialization fix. However, the acceptance criteria and
    gold solution only require fixing the component file itself, making test creation
    an out-of-scope effort for this specific task.
  severity: medium
  source:
    path: AGENTS.md
    lines: 28-28
- rule: 'Format your code before pushing. Backend: `bash scripts/format_backend.sh`'
  collision_type: scope_ambiguity
  why_distracting: The agent might run `bash scripts/format_backend.sh` across the
    entire backend. If there are pre-existing formatting issues in other files, this
    could result in a noisy PR with out-of-scope changes, rather than just formatting
    the modified `browser_state.py`.
  severity: low
