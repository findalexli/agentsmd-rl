distractors:
- rule: To run lint, run 'lintrunner -a' (which will autoapply changes)
  collision_type: rule_conflict
  why_distracting: AGENTS.md instructs the agent to use `lintrunner -a` for linting,
    which directly conflicts with CLAUDE.md's instruction to 'Only use commands provided
    via `spin` for linting' (lines 31-34).
  severity: high
  source:
    path: AGENTS.md
    lines: 10-10
- rule: Use `torch._dynamo.config.patch` for temporarily changing config.
  collision_type: would_cause_bug
  why_distracting: The PR involves testing an `ignore_raw_node` option. An agent might
    mistakenly assume this is a global Dynamo config and attempt to use `torch._dynamo.config.patch(ignore_raw_node=True)`,
    which would fail because it is actually an attribute of `GraphPickler.Options`
    passed directly to `dumps()`.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 70-72
- rule: When you are working on a bug, first create a standalone file that reproduces
    the bug... Once the change is passing, find an appropriate test file to add the
    test to
  collision_type: scope_ambiguity
  why_distracting: The user explicitly requested adding test coverage to an existing
    file (`test/fx/test_graph_pickler.py`) for a known feature. Instructing the agent
    to first create a standalone reproduction file wastes time and tokens on an unnecessary
    step.
  severity: low
  source:
    path: AGENTS.md
    lines: 3-7
hierarchy_analysis: Both CLAUDE.md and AGENTS.md are at Level 0, leading to direct
  conflicts in tooling instructions. Specifically, CLAUDE.md mandates `spin` for linting,
  while AGENTS.md mandates `lintrunner`. Agents must navigate these conflicting root-level
  directives.
