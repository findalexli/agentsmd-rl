distractors:
- rule: Use `torch._dynamo.config.patch` for temporarily changing config.
  collision_type: architecture_boundary
  why_distracting: The task involves setting `ignore_raw_node=True` on `GraphPickler.Options`. An agent might confuse this with a global configuration and attempt to use `torch._dynamo.config.patch(ignore_raw_node=True)` instead of instantiating and passing the `Options` object to `dumps()`.
  severity: high
  source:
    path: CLAUDE.md
    lines: 67-86
- rule: When you are working on a bug, first create a standalone file that reproduces the bug and verify it fails in the expected way.
  collision_type: scope_ambiguity
  why_distracting: The task is to add missing test coverage for an existing feature, not to fix a bug. An agent might waste time creating a standalone reproduction file before modifying the test suite.
  severity: medium
  source:
    path: AGENTS.md
    lines: 3-6
hierarchy_analysis: The configuration is flat, with both `AGENTS.md` and `CLAUDE.md` at the root level. The agent must synthesize testing guidelines from `CLAUDE.md` while avoiding the bug-reproduction workflow in `AGENTS.md`.
rubric:
- rule: 'Use our test class and test runner: `from torch.testing._internal.common_utils import run_tests, TestCase`'
  source:
    path: CLAUDE.md
    lines: 16-24
  evidence: The gold solution defines `class TestIgnoreRawNode(TestCase):` which inherits from the required `TestCase` class.
  category: testing
  verification: llm_judge
- rule: Minimize comments; be concise; code should be self-explanatory and self-documenting.
  source:
    path: CLAUDE.md
    lines: 53-64
  evidence: The gold solution uses concise docstrings and minimal comments, only explaining the non-obvious injection of the raw node into metadata.
  category: style
