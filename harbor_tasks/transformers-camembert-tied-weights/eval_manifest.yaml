version: "2.0"

source:
  repo: "huggingface/transformers"
  pr: 45031
  base_commit: "d81ad48109331f910fd81f699869855cbd50f681"
  merge_commit: "882ffdbbd6b8ad50feaa860d702e70950cfc95d0"

checks:
  - id: syntax_valid
    type: pass_to_pass
    origin: static
    description: "Modified camembert files must parse without syntax errors"

  - id: ruff_check
    type: pass_to_pass
    origin: repo_tests
    description: "Camembert module passes ruff linting"

  - id: ruff_format
    type: pass_to_pass
    origin: repo_tests
    description: "Camembert module passes ruff format check"

  - id: check_copies
    type: pass_to_pass
    origin: repo_tests
    description: "Camembert modeling file passes check_copies validation"

  - id: init_isort
    type: pass_to_pass
    origin: repo_tests
    description: "Init files have correct import ordering"

  - id: modeling_structure
    type: pass_to_pass
    origin: repo_tests
    description: "Modeling files have correct structure"

  - id: inits
    type: pass_to_pass
    origin: repo_tests
    description: "Init files are correctly structured"

  - id: dummies
    type: pass_to_pass
    origin: repo_tests
    description: "Dummy objects are correctly generated"

  - id: pipeline_typing
    type: pass_to_pass
    origin: repo_tests
    description: "Pipeline type hints are correct"

  - id: modeling_file_structure
    type: pass_to_pass
    origin: static
    description: "Camembert modeling files have valid structure and CamembertForCausalLM class exists"

  - id: tied_weights_keys_exists
    type: pass_to_pass
    origin: static
    description: "CamembertForCausalLM has _tied_weights_keys defined in both modeling and modular files"

  - id: model_instantiates
    type: fail_to_pass
    origin: pr_diff
    description: "CamembertForCausalLM can be created without ValueError on tied weights"

  - id: weight_tying_shares_memory
    type: fail_to_pass
    origin: pr_diff
    description: "lm_head.decoder.weight is the same tensor object as roberta embeddings"

  - id: weight_mutation_propagates
    type: fail_to_pass
    origin: pr_diff
    description: "Mutating lm_head weight propagates to embedding weight and vice versa"

  - id: other_camembert_models_unaffected
    type: pass_to_pass
    origin: static
    description: "Other Camembert model variants (CamembertModel, ForMaskedLM, ForSequenceClassification) still load"

  - id: modular_has_roberta_tied_key
    type: fail_to_pass
    origin: static
    description: "modular_camembert.py CamembertForCausalLM defines _tied_weights_keys with roberta path"
    source:
      path: "CLAUDE.md"
      lines: "67"
      commit: "d81ad48109331f910fd81f699869855cbd50f681"

rubric:
  - rule: "Code fix tasks require only code changes, not config file modifications. The tied weights fix correctly changes only modeling_camembert.py and modular_camembert.py."
    reference: "_tied_weights_keys defines roberta.embeddings.word_embeddings.weight"
