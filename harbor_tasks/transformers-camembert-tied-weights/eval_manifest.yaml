rubric:
- rule: Code fix tasks require only code changes, not config file modifications. The
    tied weights fix correctly changes only modeling_camembert.py and modular_camembert.py.
  source:
    path: src/transformers/models/camembert/modeling_camembert.py
  reference: _tied_weights_keys defines roberta.embeddings.word_embeddings.weight
- rule: The newer method is to add a file named `modular_<name>.py` in the model directory.
    `modular` files can inherit from other models.
  source:
    path: src/transformers/models/camembert/modular_camembert.py
  evidence: The gold solution modifies `modular_camembert.py` to add the `_tied_weights_keys`
    override to `CamembertForCausalLM`, which inherits from `RobertaForCausalLM`,
    aligning with the modular file design pattern
  category: architecture
