rubric:
- rule: Code fix tasks require only code changes, not config file modifications. The
    tied weights fix correctly changes only modeling_camembert.py and modular_camembert.py.
  reference: _tied_weights_keys defines roberta.embeddings.word_embeddings.weight
- rule: The newer method is to add a file named `modular_<name>.py` in the model directory.
    `modular` files can inherit from other models.
  source:
    path: CLAUDE.md
    lines: 58-62
  evidence: The gold solution modifies `modular_camembert.py` to add the `_tied_weights_keys`
    override to `CamembertForCausalLM`, which inherits from `RobertaForCausalLM`,
    aligning with the modular file design pa
  category: architecture
distractors:
- rule: Do not open one-off PRs for tiny edits (single typo, isolated lint cleanup,
    one mutable default argument, etc.).
  collision_type: scope_ambiguity
  why_distracting: The fix requires changing a single string prefix from 'camembert'
    to 'roberta'. The agent might interpret this as a 'tiny edit' or 'single typo'
    and refuse to solve the issue or attempt to bundle it with unrelated cleanups
    to justify the PR.
  severity: high
  source:
    path: CLAUDE.md
    lines: 36-37
- rule: 'Pure code-agent PRs are not allowed: a human submitter must understand and
    be able to defend the change end-to-end... Do not raise PRs without human validation.'
  collision_type: meta_confusion
  why_distracting: The agent might refuse to generate a solution entirely, citing
    the policy that 'Pure code-agent PRs are not allowed' and that it cannot proceed
    without human validation.
  severity: high
  source:
    path: CLAUDE.md
    lines: 41-49
- rule: '`make fix-repo` will copy code to generate standalone `modeling` and other
    files from the `modular`'
  collision_type: architecture_boundary
  why_distracting: The rule states `make fix-repo` generates the `modeling` files
    from `modular` files. An agent might edit only the modular file and rely on `make
    fix-repo`, which could fail in the test environment or time out. The gold solution
    manually patches both files to ensure the fix is applied.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 58-62
hierarchy_analysis: '`CLAUDE.md` and `AGENTS.md` contain identical content and apply
