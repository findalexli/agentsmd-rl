# eval_manifest.yaml for effect-ts/effect#6021
# Fix HttpClientRequest.appendUrl URL path joining

pr_metadata:
  owner: Effect-TS
  repo: effect
  pr_number: 6021
  title: "fix(platform): properly join URL paths in HttpClientRequest.appendUrl"
  base_commit: 7b8165f45779380fea8ac8e09badef898b63eb41
  merge_commit: 0023c19c63c402c050d496817ba92aceea7f25b7

target_file: packages/platform/src/internal/httpClientRequest.ts

patch_content: |
  diff --git a/packages/platform/src/internal/httpClientRequest.ts b/packages/platform/src/internal/httpClientRequest.ts
  index 73d0132ce2a..14fb718c526 100644
  --- a/packages/platform/src/internal/httpClientRequest.ts
  +++ b/packages/platform/src/internal/httpClientRequest.ts
  @@ -250,17 +250,21 @@ export const setUrl = dual<
   export const appendUrl = dual<
     (path: string) => (self: ClientRequest.HttpClientRequest) => ClientRequest.HttpClientRequest,
     (self: ClientRequest.HttpClientRequest, path: string) => ClientRequest.HttpClientRequest
   >(2, (self, url) =>
  -  makeInternal(
  +>(2, (self, path) => {
  +  if (path === "") {
  +    return self
  +  }
  +  const baseUrl = self.url.endsWith("/") ? self.url : self.url + "/"
  +  const pathSegment = path.startsWith("/") ? path.slice(1) : path
  +  return makeInternal(
       self.method,
  -    self.url.endsWith("/") && url.startsWith("/") ?
  -      self.url + url.slice(1) :
  -      self.url + url,
  +    baseUrl + pathSegment,
       self.urlParams,
       self.hash,
       self.headers,
       self.body
  -  ))
  +  )
  +})

checks:
  - id: test_append_url_no_slash_both
    type: fail_to_pass
    description: "FAIL_TO_PASS: Core bug - no trailing slash on base, no leading slash on path"
    details: |
      "https://api.example.com/v1" + "users" should equal "https://api.example.com/v1/users"
      On buggy base: "https://api.example.com/v1users"

  - id: test_append_url_trailing_slash_base
    type: pass_to_pass
    description: "PASS_TO_PASS: Base URL has trailing slash, path has no leading slash"
    details: |
      "https://api.example.com/v1/" + "users" should equal "https://api.example.com/v1/users"
      (passes on base due to incidental correctness of buggy code)

  - id: test_append_url_leading_slash_path
    type: pass_to_pass
    description: "PASS_TO_PASS: Base URL has no trailing slash, path has leading slash"
    details: |
      "https://api.example.com/v1" + "/users" should equal "https://api.example.com/v1/users"
      (passes on base due to incidental correctness of buggy code)

  - id: test_append_url_both_slashes
    type: pass_to_pass
    description: "PASS_TO_PASS: Both base has trailing slash and path has leading slash"
    details: |
      "https://api.example.com/v1/" + "/users" should equal "https://api.example.com/v1/users"
      (passes on base due to incidental correctness of buggy code)

  - id: test_append_url_nested_path
    type: fail_to_pass
    description: "FAIL_TO_PASS: Nested path with multiple segments"
    details: |
      "https://api.example.com/v1" + "users/123/posts" should equal "https://api.example.com/v1/users/123/posts"
      On buggy base: "https://api.example.com/v1users/123/posts"

  - id: test_append_url_empty_path
    type: pass_to_pass
    description: "PASS_TO_PASS: Empty path should not modify the URL"
    details: |
      "https://api.example.com/v1" + "" should equal "https://api.example.com/v1"

  - id: test_platform_vitest_pass
    type: pass_to_pass
    origin: repo_tests
    description: Platform package vitest tests pass (repo CI)
    details: |
      The platform package's 175 vitest tests should all pass on base and continue
      to pass after the fix, ensuring no regressions.

  - id: test_platform_eslint_pass
    type: pass_to_pass
    origin: repo_tests
    description: Platform package eslint passes with no warnings (repo CI)
    details: |
      The platform package source code should pass eslint with no warnings
      on base and continue to pass after the fix.

  - id: test_circular_check
    type: pass_to_pass
    origin: repo_tests
    description: Repo circular dependency check passes (repo CI)
    details: |
      The monorepo's circular dependency check should pass on base
      and continue to pass after the fix.

