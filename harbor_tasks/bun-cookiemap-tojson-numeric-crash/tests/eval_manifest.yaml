distractors:
- rule: Always use `bun.*` APIs instead of `std.*`.
  collision_type: architecture_boundary
  why_distracting: The rule instructs to avoid `std.*` and use `bun.*` APIs. While
    intended for Zig, an agent editing C++ might incorrectly avoid standard C++ or
    WTF data structures (like `HashSet`) and look for non-existent Bun C++ wrappers.
  severity: medium
  source:
    path: src/AGENTS.md
    lines: 16-18
- rule: NEVER write tests that check for no "panic" or "uncaught exception" or similar
    in the test output.
  collision_type: scope_ambiguity
  why_distracting: The bug is an assertion failure/crash. The agent might try to write
    a regression test but get confused by the rule forbidding tests that check for
    'no panic' or 'uncaught exception'.
  severity: medium
  source:
    path: AGENTS.md
    lines: '74'
hierarchy_analysis: The hierarchy applies Zig-specific rules at the `src/` level,
  but the target file is C++ within `src/bun.js/bindings/`. The agent must understand
  that the `src/AGENTS.md` rules do not apply across the language boundary.
rubric:
- rule: It's written primarily in Zig with C++ for JavaScriptCore integration, powered
    by WebKit's JavaScriptCore engine.
  source:
    path: CLAUDE.md
    lines: 1-3
  evidence: The solution uses WebKit's WTF::HashSet (#include <wtf/HashSet.h>) and
    JSC APIs (putDirectMayBeIndex) rather than standard C++ std::unordered_set, aligning
    with the architecture of using WebKit's JavaScriptCore engine.
  category: architecture
  verification: llm_judge
