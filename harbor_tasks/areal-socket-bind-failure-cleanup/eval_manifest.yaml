rubric:
- rule: Follow existing code patterns in the same module
  source:
    path: CLAUDE.md
    lines: 76-76
  evidence: The gold solution modifies the `__exit__` methods to `return False` instead
    of `raise exc_value`, cleanly integrating with the existing `if exc_type is not
    None:` block and `logger.error` call without
  category: style
- rule: Never hardcode secrets, paths, or endpoints
  source:
    path: CLAUDE.md
    lines: 90-90
  evidence: The gold solution maintains the dynamic port binding `sock.bind(("", port))`
    in `is_port_free` and does not introduce any hardcoded IP addresses or specific
    ports when fixing the socket leak.
  category: architecture
distractors:
- rule: Add tests for new functionality
  collision_type: scope_ambiguity
  why_distracting: The PR is fixing bugs in existing functionality (socket leak, traceback
    propagation), not adding new functionality. Attempting to add tests for `is_port_free`
    could lead to flaky network tests, and testing `__exit__` traceback propagation
    is complex and unnecessary for this specific fix.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 77-77
- rule: 'Logging: areal.utils.logging.getLogger(name) with PascalCase names'
  collision_type: would_cause_bug
  why_distracting: An agent might see the `except OSError:` block in `is_port_free`
    and decide to add a logger to log the exception. However, `is_port_free` is designed
    to return `False` when a port is in use, so logging an error here would spam the
    logs with false positives during normal operation.
  severity: high
  source:
    path: AGENTS.md
    lines: 89-91
hierarchy_analysis: Both CLAUDE.md and AGENTS.md contain overlapping rules regarding
  code patterns and testing. AGENTS.md provides more specific guidance on logging
  and environment setup. The rules are consistent across the hierarchy, with AGENTS.md
  acting as a more detailed operational guide.
