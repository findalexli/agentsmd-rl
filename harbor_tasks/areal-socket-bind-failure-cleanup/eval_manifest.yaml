version: "2.0"

source:
  repo: "inclusionAI/AReaL"
  pr: 1032
  base_commit: "7cad4dac2d1f230891f201dbbfa91403e621cec1"
  merge_commit: "02a25454bc8ff348b05ae2a62040d5ec48237e16"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified files (network.py, rl_trainer.py, sft_trainer.py) parse without errors"

  - id: tcp_socket_closed_on_bind_failure
    type: fail_to_pass
    origin: pr_diff
    description: "TCP socket.close() is called even when bind() raises OSError"

  - id: udp_socket_closed_on_bind_failure
    type: fail_to_pass
    origin: pr_diff
    description: "UDP socket.close() is called even when bind() raises OSError"

  - id: both_sockets_closed_on_success
    type: pass_to_pass
    origin: pr_diff
    description: "Both TCP and UDP sockets are closed even when both binds succeed"

  - id: rl_exit_does_not_reraise
    type: fail_to_pass
    origin: pr_diff
    description: "RLTrainer.__exit__ returns falsy instead of re-raising with 'raise exc_value'"

  - id: sft_exit_does_not_reraise
    type: fail_to_pass
    origin: pr_diff
    description: "SFTTrainer.__exit__ returns falsy instead of re-raising with 'raise exc_value'"

  - id: rl_exit_calls_close
    type: pass_to_pass
    origin: pr_diff
    description: "RLTrainer.__exit__ calls self.close() for cleanup"

  - id: sft_exit_calls_close
    type: pass_to_pass
    origin: pr_diff
    description: "SFTTrainer.__exit__ calls self.close() for cleanup"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "Modified functions have real logic, not just pass/return"

  - id: no_wildcard_imports
    type: pass_to_pass
    origin: agent_config
    description: "No wildcard imports (from x import *) in modified files"
    source:
      path: "AGENTS.md"
      lines: "30"
      commit: "7cad4dac2d1f230891f201dbbfa91403e621cec1"

  - id: no_print_logging
    type: pass_to_pass
    origin: agent_config
    description: "No bare print() calls — use areal.utils.logging.getLogger()"
    source:
      path: "AGENTS.md"
      lines: "89-91"
      commit: "7cad4dac2d1f230891f201dbbfa91403e621cec1"

rubric:
  - rule: "Keep class hierarchies <= 2 levels deep; prefer delegation over deep inheritance."
    source:
      path: "AGENTS.md"
      lines: "80"
      commit: "7cad4dac2d1f230891f201dbbfa91403e621cec1"
