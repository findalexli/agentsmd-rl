task: auto-update-example-deps
pr: TanStack/router#6892
source:
  owner: TanStack
  repo: router
  base_commit: 870cf28066954b17e551c4e0f6627e382f0d6a57
  merge_commit: 044fb24d265659d4b895f5b23a314e3a22c26564

checks:
  # Fail-to-pass tests
  - id: script_file_exists
    type: pytest
    test: test_script_file_exists
    description: "Script file must exist at scripts/update-example-deps.mjs"

  - id: package_json_updated
    type: pytest
    test: test_package_json_updated
    description: "package.json changeset:version must call the update script"

  - id: script_updates_example_deps
    type: pytest
    test: test_script_updates_example_deps
    description: "Script must correctly update outdated example dependencies"

  # Pass-to-pass tests
  - id: script_valid_javascript
    type: pytest
    test: test_script_is_valid_javascript
    description: "Script must be syntactically valid JavaScript"

  - id: script_handles_no_changes
    type: pytest
    test: test_script_handles_no_changes
    description: "Script must complete successfully when no changes needed"

  - id: script_skips_non_workspace_deps
    type: pytest
    test: test_script_skips_non_workspace_deps
    description: "Script must not modify non-workspace dependencies"

  - id: script_updates_devdeps
    type: pytest
    test: test_script_updates_both_deps_and_devdeps
    description: "Script must update both dependencies and devDependencies"

# Agent config checks - from AGENTS.md
agent_config:
  - rule: "Use pnpm for package management in this monorepo"
    test: "test_package_json_updated"  # Verifies pnpm-based workflow
    source: "AGENTS.md"

# Rubric for soft/subjective checks
rubric: []
