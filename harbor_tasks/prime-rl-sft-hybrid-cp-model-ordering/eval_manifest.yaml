checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "train.py must be valid Python"

  - id: model_assigned_before_hybrid_cp
    type: fail_to_pass
    origin: pr_diff
    description: "model must be assigned (via setup_model) before setup_hybrid_cp(model, ...) is called"

  - id: hybrid_cp_after_model_init
    type: fail_to_pass
    origin: pr_diff
    description: "setup_hybrid_cp() must be called after setup_model() in train()"

  - id: setup_hybrid_cp_retained
    type: pass_to_pass
    origin: pr_diff
    description: "setup_hybrid_cp call must still exist (not deleted to avoid NameError)"

  - id: substitute_ring_attn_present
    type: pass_to_pass
    origin: pr_diff
    description: "substitute_ring_attn must still be called"

  - id: setup_model_present
    type: pass_to_pass
    origin: pr_diff
    description: "setup_model must still be called"

  - id: train_not_stub
    type: pass_to_pass
    origin: static
    description: "train() must have >= 20 top-level statements"

  - id: setup_ckpt_managers_retained
    type: pass_to_pass
    origin: pr_diff
    description: "setup_ckpt_managers must still be called"

  - id: hybrid_cp_guarded_by_cp_enabled
    type: pass_to_pass
    origin: pr_diff
    description: "setup_hybrid_cp must be inside a cp_enabled conditional"

  - id: no_try_except_around_hybrid_cp
    type: pass_to_pass
    origin: agent_config
    description: "setup_hybrid_cp must not be wrapped in try/except"
