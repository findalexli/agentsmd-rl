distractors:
- rule: Write tests as plain functions with pytest fixtures.
  collision_type: scope_ambiguity
  why_distracting: The rule instructs the agent to write tests, which might lead the
    agent to attempt writing a complex distributed test for context-parallel initialization,
    expanding the scope unnecessarily for a simple function call reordering.
  severity: medium
  source:
    path: AGENTS.md
    lines: 44-45
- rule: You are responsible for maintaining the skills folder. When a workflow fails
    and you fix it... you must update the skills to make implicit knowledge explicit.
  collision_type: scope_ambiguity
  why_distracting: The rule states that when fixing a workflow, the agent must update
    the skills folder to make implicit knowledge explicit. The agent might waste time
    trying to document the CP initialization order in the skills files.
  severity: low
  source:
    path: AGENTS.md
    lines: 39-42
- rule: Any PR that modifies configuration structures or usage patterns must update
    CHANGELOG.md.
  source:
    path: .cursor/BUGBOT.md
    lines: 5-11
  source_text: 'Any PR that modifies configuration structures or usage patterns must
    update `CHANGELOG.md`. This includes changes to config fields (added, removed,
    renamed, moved, or default value changes) in:


    - `src/prime_rl/*/config.py`

    - `src/prime_rl/rl.py`

    - `src/prime_rl/utils/config.py`


    If such changes are detected without a corresponding `CHANGELOG.md` update, request
    that the author add an entry.'
  collision_type: rule_conflict
  why_distracting: The diff edits `src/prime_rl/trainer/sft/train.py`, which heavily
    relies on `config`. An agent might mistakenly believe this constitutes a usage
    pattern change requiring a CHANGELOG update, ignoring the specific file allowlist
    constraint.
  severity: medium
hierarchy_analysis: The hierarchy is flat, with `CLAUDE.md` simply pointing to `AGENTS.md`.
  The rules are generic repository guidelines rather than specific architectural constraints.
rubric:
- rule: Do not add unnecessary comments. Especially do not try to explain code change
    that reflect your work process, do not refer to old code.
  source:
    path: AGENTS.md
    lines: 5-6
  evidence: The gold solution moves the `setup_hybrid_cp` call without adding any
    comments explaining the bug fix or referring to the old code location.
  category: documentation
  verification: llm_judge
- rule: Avoid try/except blocks unless it's really necessary.
  source:
    path: AGENTS.md
    lines: '5'
  source_text: '- Avoid try/except blocks unless it''s really necessary.  It''s fine
    that a program fails if something goes wrong as this helps us to catch non-obvious
    bugs and unforeseen side-effects earlier. You can add try catch on code that explicitly
    aims to be fault tolerant like adding retry mechanisms or explicit and intentional
    robustness. '
  evidence: Instead of wrapping the premature `setup_hybrid_cp(model, ...)` call in
    a try/except block to catch the resulting NameError/UnboundLocalError, the diff
    addresses the root cause by logically reordering the initialization flow, allowing
    any unhandled issues to fail loudly.
  category: error_handling
  verification: llm_judge
