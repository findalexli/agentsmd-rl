rubric:
- rule: 'The cargo test examples must use the `-- <filter>` separator form for

    filtering by test name. A bare module-path positional argument

    (e.g. `--lib some::module::path`) must not be shown as the way to

    filter by test name.

    '
  source:
    path: CLAUDE.md
    lines: 14-18
    commit: 7fcf44783eddcf9328842691cf2a0a181e1e90dd
  evidence: The gold diff removes `cargo insta test -p prqlc --lib semantic::resolver` (module-path form) and adds `cargo insta test -p prqlc --lib -- resolver` (filter form with `--` separator), making the correct syntax pattern self-evident.
  category: syntax
  verification: programmatic
- rule: 'The unit-test example must appear before the integration-test

    example, because the inner loop prioritizes faster feedback.

    '
  source:
    path: CLAUDE.md
    lines: 5-21
    commit: 7fcf44783eddcf9328842691cf2a0a181e1e90dd
  evidence: The gold diff reorders examples so `cargo insta test -p prqlc --lib -- resolver` (unit, faster) appears before `cargo insta test -p prqlc --test integration -- date` (integration, slower).
  category: ordering
  verification: programmatic
- rule: 'Each filtered-test example must have a comment that describes what

    the example demonstrates by filter behavior (unit vs integration,

    filtered by test name), not vague phrasing such as "Or run specific

    tests you''re working on" or "Run unit tests for a specific module".

    '
  source:
    path: CLAUDE.md
    lines: 14-18
    commit: 7fcf44783eddcf9328842691cf2a0a181e1e90dd
  evidence: The gold diff replaces vague comments (`# Or run specific tests you're working on`, `# Run unit tests for a specific module`) with precise labels (`# Unit tests filtered by test name`, `# Integration tests filtered by test name`).
  category: naming
  verification: programmatic
- rule: 'The edit must be scoped to the Inner loop fenced code block. Other

    sections of CLAUDE.md (Tests, Running the CLI, Linting,

    Documentation, Outer loop framing) must not be rewritten.

    '
  source:
    path: CLAUDE.md
    lines: 1-91
    commit: 7fcf44783eddcf9328842691cf2a0a181e1e90dd
  evidence: The gold diff only touches lines inside the Inner loop code block (lines 14-18). No other section is modified.
  category: scope
  verification: programmatic
- rule: 'The inner-loop block must remain a terse list of commented shell

    commands. Do not introduce prose paragraphs, sub-headings, or

    "don''t do this" anti-example sections inside the code block.

    '
  source:
    path: CLAUDE.md
    lines: 10-19
    commit: 7fcf44783eddcf9328842691cf2a0a181e1e90dd
  evidence: The gold diff is a clean line-for-line replacement within the fenced code block, preserving the terse command-oriented style without adding prose or anti-examples.
  category: style
  verification: semantic_diff
distractors:
- rule: '# Or run specific tests you''re working on'
  source:
    path: CLAUDE.md
    lines: '14'
    commit: 541974b371bac89e3c7e758106ecde97df307f4c
  collision_type: rule_conflict
  why_distracting: This comment is vague and does not specify WHAT the example demonstrates by filter behavior. Keeping it conflicts with the requirement for precise, filter-specific labels.
  severity: medium
- rule: cargo insta test -p prqlc --lib semantic::resolver
  source:
    path: CLAUDE.md
    lines: '18'
    commit: 541974b371bac89e3c7e758106ecde97df307f4c
  collision_type: would_cause_bug
  why_distracting: The bare module-path positional form (`--lib semantic::resolver`) does not filter by test name — cargo treats positional args as module paths, not test name filters. Following this pattern would silently fail to run the intended tests.
  severity: high
- rule: '# Run fast tests on core packages (from project root)'
  source:
    path: CLAUDE.md
    lines: '11'
    commit: 541974b371bac89e3c7e758106ecde97df307f4c
  collision_type: scope_ambiguity
  why_distracting: An agent might interpret the edit scope to include this adjacent comment line, even though only the filtered-test examples need updating.
  severity: low
- rule: 'Use a tight inner loop for fast feedback, comprehensive outer loop before returning to user:'
  source:
    path: CLAUDE.md
    lines: '5'
    commit: 541974b371bac89e3c7e758106ecde97df307f4c
  collision_type: meta_confusion
  why_distracting: This prose framing text could tempt an agent to add lengthy explanations or rewrite the workflow description, when the task only requires editing the code-block examples.
  severity: medium
