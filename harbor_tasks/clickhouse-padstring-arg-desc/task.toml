name = "clickhouse-padstring-arg-desc"
title = "Fix argument descriptions in leftPad/rightPad functions"
description = """
The leftPad and rightPad SQL functions have incorrect argument descriptions
that appear in error messages when users pass wrong argument types.

The descriptions currently say:
- "Array" for the string argument (should be "String or FixedString")
- "const UInt*" for the length argument (should be "UInt*")
- "Array" for the pad_string argument (should be "String")

Fix these descriptions in src/Functions/padString.cpp.
"""

# Difficulty: small change to C++ file
difficulty = "easy"

# Categories
categories = ["bug-fix", "c++", "clickhouse"]

# Estimated time for an experienced developer
time_estimate = "5-10 minutes"

# Repository info
[repository]
owner = "ClickHouse"
name = "ClickHouse"
base_commit = "a77cd4c5a6ede8a2d5da637a75348a4cc055c007"
merge_commit = "dea580e0abc03ab181a4d2bc2bc8a65e599216ae"
pr_number = 102106

# Target files to modify
[[target_files]]
path = "src/Functions/padString.cpp"
description = "Contains leftPad/rightPad function implementations"
