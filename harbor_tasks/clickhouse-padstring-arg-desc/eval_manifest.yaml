rubric:
- rule: Use accurate type descriptions in FunctionArgumentDescriptor. String arguments
    should be described as 'String or FixedString' not 'Array', and length arguments
    as 'UInt*' not 'const UInt*'.
  source:
    path: src/Functions/padString.cpp
    lines: 167-173
    commit: dea580e0abc03ab181a4d2bc2bc8a65e599216ae
  reference: "FunctionArgumentDescriptors mandatory_args{\n    {\"string\", static_cast<FunctionArgumentDescriptor::TypeValidator>(&isStringOrFixedString),\
    \ nullptr, \"String or FixedString\"},\n    {\"length\", static_cast<FunctionArgumentDescriptor::TypeValidator>(&isInteger),\
    \ nullptr, \"UInt*\"},\n};\nFunctionArgumentDescriptors optional_args{\n    {\"\
    pad_string\", static_cast<FunctionArgumentDescriptor::TypeValidator>(&isString),\
    \ isColumnConst, \"String\"}\n};\n"
distractors:
- rule: 'When writing text such as documentation, comments, or commit messages, wrap
    literal names from ClickHouse SQL language, classes and functions, or literal
    excerpts from log messages inside inline code blocks, such as: `MergeTree`.'
  collision_type: scope_ambiguity
  why_distracting: The rule requires wrapping literal names and log excerpts in backticks
    for documentation and comments. An agent might mistakenly apply this to the C++
    string literals used for error messages (e.g., changing to `"\`String or FixedString\`"`),
    which would cause literal backticks to appear in the actual user-facing error
    output.
  severity: high
  source:
    path: AGENTS.md
    lines: 5-5
hierarchy_analysis: The AGENTS.md file contains rules primarily focused on documentation,
  commit messages, and git workflow. Since this PR only modifies C++ string literals
  used for error messages, most rules do not apply directly to the code changes.
