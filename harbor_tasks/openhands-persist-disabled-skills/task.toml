name = "openhands-persist-disabled-skills"
version = "1.0.0"
description = "Add disabled_skills column to User model for SaaS settings persistence"
difficulty = "easy"
estimated_time = "15-30 minutes"
tags = ["python", "sqlalchemy", "alembic", "database", "bugfix"]

[evaluation]
reward_type = "binary"
timeout = "600"

[repository]
url = "https://github.com/All-Hands-AI/OpenHands.git"
base_commit = "73ba66faeae1520fc2671b07677db4b5e3e235d3"
merge_commit = "9c0f5d785ee71c7d16d157333994245cb242a885"
pr_number = 13658

[environment]
base_image = "python:3.12-slim"
dockerfile = "environment/Dockerfile"

[solution]
solve_script = "solution/solve.sh"
distinctive_line = "disabled_skills = Column(JSON, nullable=True)"

[tests]
script = "tests/test.sh"
outputs = "tests/test_outputs.py"
manifest = "eval_manifest.yaml"

[instruction]
file = "instruction.md"

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
