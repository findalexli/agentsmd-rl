    as a 'script meant for development-only' or temporary artifact and place it in
    the `.pr/` directory instead of `enterprise/migrations/versions/`.
  severity: low
  source:
    path: AGENTS.md
    lines: 68-82
- rule: Write the SDK-side changes... implement the client code
  source:
    path: .agents/skills/cross-repo-testing/SKILL.md
    lines: 38-45
  collision_type: scope_ambiguity
  why_distracting: The agent might think that adding a new column to the SaaS settings
    store requires updating the SDK client to handle the new field, but this is purely
    a backend persistence fix.
  severity: medium
- rule: Bump SDK packages... pin them to unreleased commits for testing
