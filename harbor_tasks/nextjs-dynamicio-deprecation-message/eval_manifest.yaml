version: "2.0"

source:
  repo: "vercel/next.js"
  pr: 92081
  base_commit: "4b62ff78c0ad4117477ab78806df809f4c1f8b33"
  merge_commit: "9b66a376e7e66c51d1a0952a96e3c377b56bd81a"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "config.ts must be valid TypeScript (parseable by Node)"

  - id: dynamicio_fatal_error
    type: fail_to_pass
    origin: pr_diff
    description: "dynamicIO in experimental config must produce a fatal error mentioning cacheComponents"

  - id: dynamicio_includes_docs_link
    type: fail_to_pass
    origin: pr_diff
    description: "dynamicIO fatal error must include a link to the cacheComponents docs"

  - id: turbopack_handling_preserved
    type: pass_to_pass
    origin: repo_tests
    description: "turbopackPersistentCaching must still produce a fatal error"

  - id: generic_unrecognized_key_is_warning
    type: pass_to_pass
    origin: pr_diff
    description: "An unrecognized experimental key (not dynamicIO or turbopack) should be a warning, not fatal"

  - id: test_repo_eslint
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ESLint passes on config.ts"

  - id: test_repo_prettier
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's Prettier formatting passes on config.ts"

  - id: test_repo_typescript
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's TypeScript type check passes"

  - id: test_repo_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's unit tests for config warnings pass"

rubric:
  - rule: "When modifying experimental flags, maintain proper wiring across config-shared.ts, config-schema.ts, and define-env.ts. If a flag is consumed in pre-compiled runtime internals, also wire runtime env values (next-server.ts/export/worker.ts as needed)."
    source:
      path: "AGENTS.md"
      lines: "167-174"
      commit: "4b62ff78c0ad4117477ab78806df809f4c1f8b33"

  - rule: "Replace deprecated experimental.dynamicIO with cacheComponents. The dynamicIO feature has been replaced by cacheComponents - error messages must clearly indicate this migration path."
    source:
      path: ".claude-plugin/plugins/cache-components/skills/cache-components/SKILL.md"
      lines: "9,293-299"
      commit: "4b62ff78c0ad4117477ab78806df809f4c1f8b33"

  - rule: "Error messages for deprecated/invalid config options must include a link to relevant documentation for user guidance."
    source:
      path: "AGENTS.md"
      lines: "105-113"
      commit: "4b62ff78c0ad4117477ab78806df809f4c1f8b33"
