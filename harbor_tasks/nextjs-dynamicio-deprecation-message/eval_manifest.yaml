rubric:
- rule: Replace deprecated experimental.dynamicIO with cacheComponents. The dynamicIO feature has been replaced by cacheComponents - error messages must clearly indicate this migration path and suggest updating next.config file.
  source:
    path: .claude-plugin/plugins/cache-components/skills/cache-components/SKILL.md
    lines: 9,293-299
    commit: 4b62ff78c0ad4117477ab78806df809f4c1f8b33
  reference: '`experimental.dynamicIO` has been replaced by `cacheComponents`. Please update your next.config file accordingly.'
- rule: Error messages for deprecated/invalid config options must include a link to relevant documentation for user guidance.
  source:
    path: AGENTS.md
    lines: 105-113
    commit: 4b62ff78c0ad4117477ab78806df809f4c1f8b33
  reference: 'Learn more: https://nextjs.org/docs/app/api-reference/config/next-config-js/cacheComponents'
- rule: Changes to Next.js framework code must target source files in packages/next/src/, not compiled output in packages/next/dist/.
  source:
    path: CLAUDE.md
    lines: 24-33
    commit: 4b62ff78c0ad4117477ab78806df809f4c1f8b33
  reference: packages/next/src/server/config.ts
- rule: Source code is located in `packages/next/src/`, and compiled output goes to `packages/next/dist/`.
  source:
    path: AGENTS.md
    lines: 30-38
  evidence: The gold solution edits the source file `packages/next/src/server/config.ts` rather than attempting to modify the compiled output in `packages/next/dist/`.
  category: architecture
distractors:
- rule: Use the update-docs skill when the user asks to update documentation, check docs, or sync docs with code.
  collision_type: scope_ambiguity
  why_distracting: The task instruction mentions adding 'a link to the relevant documentation' in the error message. An agent might misinterpret this and use the `update-docs` skill to actually modify or scaffold documentation files for `dynamicIO` or `cacheComponents`, which is out of scope for this specific PR.
  severity: medium
  source:
    path: .claude/skills/update-docs
    lines: 1-2
hierarchy_analysis: The config hierarchy is essentially flat, consisting of identical `AGENTS.md` and `CLAUDE.md` files at the root level, alongside various skill files. There are no deep overrides or conflicting rules between parent and child directories.
