source:
  repo: SeleniumHQ/selenium
  pr_number: 17233
  base_commit: 4bb23f484eec6f986b563fb3146cb64dcbcc0187
  merge_commit: d4fb256426eed10e0b0e37c8d16a7b969d1e1848

# Map each test_* function to a check
checks:
  # Fail-to-pass: RuntimeException handling
  - id: test_runtime_exception_not_wrapped
    type: fail_to_pass
    origin: behavioral
    description: RuntimeException from supplier is NOT wrapped in InitializationException

  - id: test_various_runtime_exceptions
    type: fail_to_pass
    origin: behavioral
    description: Various RuntimeException subclasses (IllegalArgument, NullPointer, etc.) are preserved

  - id: test_checked_exception_still_wrapped
    type: fail_to_pass
    origin: behavioral
    description: Checked exceptions are still properly wrapped in InitializationException

  # Pass-to-pass: Build/compilation
  - id: test_file_compiles
    type: pass_to_pass
    origin: repo_tests
    description: Lazy.java compiles successfully

  - id: test_bazel_build_concurrent
    type: pass_to_pass
    origin: repo_tests
    description: Bazel build for concurrent package succeeds

  - id: test_bazel_test_concurrent_smalltests
    type: pass_to_pass
    origin: repo_tests
    description: Repo unit tests for concurrent package (LazyTest) pass

  - id: test_java_format
    type: pass_to_pass
    origin: repo_tests
    description: Java code follows google-java-format style

  # Agent config checks (from AGENTS.md)
  - id: agent_config_exception_handling
    type: fail_to_pass
    origin: agent_config
    source: java/AGENTS.md
    description: Preserve RuntimeException types instead of wrapping in InitializationException

# Rubric for soft/subjective rules from agent configs
rubric:
  - rule: "Follow Java code conventions from java/AGENTS.md"
    description: "Logging, deprecation, and documentation style"
    weight: optional
