# Evaluation manifest for mlflow#22369
# Fix _lookup_model_info all-provider scan causing network latency

source:
  owner: mlflow
  repo: mlflow
  pr_number: 22369
  base_commit: b3075b40fed52161849b3a238c06d3b36102e0f4
  merge_commit: 173ce0e65a25210f62731f42838985c052a55cb1
  title: "Fix `_lookup_model_info` all-provider scan causing network latency"
  description: |
    When `_lookup_model_info` is called without a provider, it previously scanned
    all 68 providers via `_load_provider()`, which triggers remote fetches (with
    retries + timeouts) for each. For unknown models, this caused O(N) network
    latency (potentially ~1000s worst case).

    Solution: Without provider, use `_load_bundled_provider()` (local files
    only, no network) instead of `_load_provider()` (may remote fetch).

checks:
  - id: test_lookup_model_info_without_provider_uses_bundled
    type: fail_to_pass
    origin: agent_config
    description: |
      Verify _lookup_model_info(model) without custom_llm_provider uses
      _load_bundled_provider (not _load_provider). On base commit this fails
      because it calls _load_provider which raises an error when network fetch
      is attempted.
    source:
      file: mlflow/utils/providers.py
      function: _lookup_model_info
      line: ~311

  - id: test_lookup_model_info_with_provider_uses_load_provider
    type: pass_to_pass
    origin: agent_config
    description: |
      Verify _lookup_model_info(model, provider) with provider specified uses
      _load_provider (fast path). This should work on both base and fixed commits.
    source:
      file: mlflow/utils/providers.py
      function: _lookup_model_info
      line: ~305

  - id: test_repo_test_providers
    type: pass_to_pass
    origin: repo_tests
    description: Repo's own test_providers.py tests pass after fix
    source:
      file: tests/utils/test_providers.py

  - id: test_repo_lint_providers_and_tracing_utils
    type: pass_to_pass
    origin: repo_tests
    description: Ruff linter passes on modified source files
    source:
      files:
        - mlflow/utils/providers.py
        - mlflow/tracing/utils/__init__.py

  - id: test_repo_tracing_cost_aggregation
    type: pass_to_pass
    origin: repo_tests
    description: Repo tracing cost aggregation tests pass
    source:
      file: tests/tracing/utils/test_utils.py
      function: test_aggregate_cost_from_spans

