rubric:
- rule: README documents the sliver-based lazy scroll architecture with SliverList
    and SliverToBoxAdapter
  source:
    path: lib/features/projects/README.md
    lines: 257-268
    commit: e0ed1461a20edea9ea57c49fda29fb89d72d7882
  reference: The top-level detail route now uses a CustomScrollView with slivers instead
    of one large SingleChildScrollView body. The static header, health panel, and
    AI report stay boxed in SliverToBoxAdapters, while the task list is rendered by
    ProjectTasksSliverPanel on a lazy SliverList.
- rule: README mentions the sliver panel widget class name ProjectTasksSliverPanel
  source:
