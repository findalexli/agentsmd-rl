name: mantine-mcp-ndjson-stdio
version: 1.0.0

core:
  repository: mantinedev/mantine
  base_commit: 4e071c14d8febd7e583ef59a9f8eb9245c22a3ae
  merge_commit: 67dc866fa74d6301fa02f02cfd0212ffddf0c728
  pr_number: 8792

task:
  name: mantine-mcp-ndjson-stdio
  title: "[@mantine/mcp-server] Fix stdio transport to comply with MCP spec"
  description: |
    Fix the MCP server stdio transport to use NDJSON framing per MCP spec instead of
    LSP-style Content-Length headers. The MCP server was using LSP-style Content-Length
    header framing for stdio transport, which is incompatible with the MCP specification.
    This caused MCP clients (VS Code, etc.) to hang indefinitely during the initialize handshake.
  difficulty: medium
  tags:
    - mcp-server
    - stdio
    - ndjson
    - protocol
  estimated_time_minutes: 30

checks:
  - id: test_ndjson_write_format
    description: writeMessage writes NDJSON (one JSON per line) not Content-Length headers
    type: fail_to_pass
    origin: agent_config
    source: CLAUDE.md:comments_guidelines
  - id: test_readline_interface_used
    description: startServer uses readline.createInterface for line-based parsing
    type: fail_to_pass
    origin: agent_config
    source: CLAUDE.md:code_style
  - id: test_no_contentlength_buffer_parsing
    description: The old Content-Length buffer parsing should be removed
    type: fail_to_pass
    origin: agent_config
    source: CLAUDE.md:comments_guidelines
  - id: test_ndjson_protocol_compliance
    description: Verify the server writes valid NDJSON and parses line-by-line
    type: fail_to_pass
    origin: agent_config
    source: CLAUDE.md:code_style
  - id: test_error_codes_preserved
    description: Error handling should still use proper JSON-RPC error codes
    type: pass_to_pass
    origin: agent_config
    source: CLAUDE.md:code_style
  - id: test_mcp_server_typecheck
    description: The mcp-server package should pass TypeScript type checking
    type: pass_to_pass
    origin: repo_tests
    source: null
  - id: test_repo_lint
    description: Repo linter passes for mcp-server package
    type: pass_to_pass
    origin: repo_tests
    source: null
  - id: test_repo_format
    description: Repo formatter passes for mcp-server package
    type: pass_to_pass
    origin: repo_tests
    source: null
  - id: test_no_buffer_concat_in_stdin_handler
    description: stdin handler should not use Buffer.concat anymore
    type: fail_to_pass
    origin: agent_config
    source: CLAUDE.md:code_style
  - id: test_readline_line_event_handler
    description: startServer should register a 'line' event handler on readline interface
    type: fail_to_pass
    origin: agent_config
    source: CLAUDE.md:code_style

rubric:
  - id: preserve_documentation_comments
    description: |
      Type definitions and public APIs should maintain their documentation comments
      (JSDoc-style comments with /** */). When modifying functions, preserve existing
      documentation on interfaces, types, and function parameters.
    type: soft
    source: CLAUDE.md:comments_guidelines
    weight: 1
  - id: no_inline_implementation_comments
    description: |
      Do not include inline comments that describe logic or implementation details
      unless explicitly requested. Code should be self-documenting.
    type: soft
    source: CLAUDE.md:comments_guidelines
    weight: 1
  - id: self_documenting_code
    description: |
      The codebase prefers clean, self-documenting code for implementation.
      Implementation details should be expressed through clear code structure,
      not comments explaining what the code does.
    type: soft
    source: CLAUDE.md:code_style
    weight: 1
