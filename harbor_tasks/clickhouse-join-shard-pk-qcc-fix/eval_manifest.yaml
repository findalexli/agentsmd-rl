source:
  pr: "ClickHouse/ClickHouse#101962"
  base_commit: "63f473f503c91e0694389620a168e40c4ccc6483"
  merge_commit: "9893080d285656b1f90153260f95a675e002326b"
  description: |
    Fix wrong results in JOIN with shard-by-PK optimization and query condition cache.
    The bug was in optimizeJoinByShards::apply() which assumed contiguous part_index_in_query
    values, but filterPartsByQueryConditionCache can drop parts leaving gaps in the indices.
    This caused the layer distribution to assign parts to the wrong source, producing 0 rows.

checks:
  # Fail-to-pass tests (behavioral - must fail before fix)
  - id: test_patch_applied
    type: fail_to_pass
    origin: agent_config
    source: "AGENTS.md: C++ code review guidelines"
    description: "Fix is applied - contiguous renumbering comment and local_idx variable present"

  - id: test_contiguous_index_assignment
    type: fail_to_pass
    origin: agent_config
    source: "AGENTS.md: C++ code review guidelines"
    description: "part_index_in_query is assigned contiguously using added_parts + local_idx"

  - id: test_for_loop_indexing_logic
    type: fail_to_pass
    origin: agent_config
    source: "AGENTS.md: C++ code review guidelines"
    description: "For loop uses local_idx for both indexing and assignment"

  - id: test_comment_explains_fix
    type: fail_to_pass
    origin: agent_config
    source: "AGENTS.md: Documentation guidelines"
    description: "Fix has explanatory comments about filterPartsByQueryConditionCache"

  # Pass-to-pass tests (structural - must pass before and after)
  - id: test_code_compiles_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "C++ syntax validation passes"

  - id: test_file_structure_intact
    type: pass_to_pass
    origin: repo_tests
    description: "File structure and function signatures intact"

  # CI-based pass-to-pass tests using actual repo CI commands
  - id: test_repo_file_tracked
    type: pass_to_pass
    origin: repo_tests
    source: "ClickHouse CI: git ls-files check"
    description: "Modified file is tracked in git"

  - id: test_repo_no_conflict_markers
    type: pass_to_pass
    origin: repo_tests
    source: "ClickHouse CI: check for conflict markers"
    description: "Source files have no git conflict markers"

  - id: test_repo_no_bom
    type: pass_to_pass
    origin: repo_tests
    source: "ClickHouse CI: check for UTF-8 BOM"
    description: "C++ files have no UTF-8 BOM marker"

  - id: test_repo_no_dos_newlines
    type: pass_to_pass
    origin: repo_tests
    source: "ClickHouse CI: check for DOS newlines"
    description: "C++ files use Unix newlines"

  - id: test_repo_file_ends_with_newline
    type: pass_to_pass
    origin: repo_tests
    source: "ClickHouse CI: check file ends with newline"
    description: "C++ files end with newline character"

  - id: test_repo_no_executable_source_files
    type: pass_to_pass
    origin: repo_tests
    source: "ClickHouse CI: check source file permissions"
    description: "Source files are not executable"

  - id: test_repo_no_trailing_whitespace
    type: pass_to_pass
    origin: repo_tests
    source: "ClickHouse CI: check for trailing whitespace"
    description: "Modified file has no trailing whitespace"

  - id: test_repo_no_tabs
    type: pass_to_pass
    origin: repo_tests
    source: "ClickHouse CI: check for tabs"
    description: "C++ files use spaces for indentation"

  - id: test_repo_git_works
    type: pass_to_pass
    origin: repo_tests
    source: "ClickHouse CI: git functionality"
    description: "Git commands work in repo"

  - id: test_repo_directory_structure
    type: pass_to_pass
    origin: repo_tests
    source: "ClickHouse CI: directory structure"
    description: "Directory structure for modified file is intact"

  # Additional CI-based pass-to-pass tests from ClickHouse style checks
  - id: test_repo_pragma_once
    type: pass_to_pass
    origin: repo_tests
    source: "ClickHouse CI: check_style/check_cpp.sh"
    description: "Modified file is non-empty and valid"

  - id: test_repo_clang_syntax_check
    type: pass_to_pass
    origin: repo_tests
    source: "ClickHouse CI: clang syntax validation"
    description: "Modified file passes basic clang syntax check"

  - id: test_repo_no_std_stringstream
    type: pass_to_pass
    origin: repo_tests
    source: "ClickHouse CI: check_style/check_cpp.sh"
    description: "No std::stringstream usage (should use WriteBufferFromOwnString)"

  - id: test_repo_no_mt19937
    type: pass_to_pass
    origin: repo_tests
    source: "ClickHouse CI: check_style/check_cpp.sh"
    description: "No std::mt19937 or std::random_device (should use pcg64_fast)"

  - id: test_repo_no_hardware_destructive_interference
    type: pass_to_pass
    origin: repo_tests
    source: "ClickHouse CI: check_style/check_cpp.sh"
    description: "No hardware_destructive_interference_size (should use CH_CACHE_LINE_SIZE)"

  - id: test_repo_no_std_filesystem_symlink
    type: pass_to_pass
    origin: repo_tests
    source: "ClickHouse CI: check_style/check_cpp.sh"
    description: "No std::filesystem::is_symlink (should use DB::FS::isSymlink)"

rubric:
  - rule: "Use Allman-style braces (opening brace on a new line) for C++ code."
    source:
      path: "AGENTS.md"
      lines: "53"
      commit: "63f473f503c91e0694389620a168e40c4ccc6483"

  - rule: "When writing comments, wrap literal class/function names in inline code blocks such as `MergeTree`."
    source:
      path: "AGENTS.md"
      lines: "6-7"
      commit: "63f473f503c91e0694389620a168e40c4ccc6483"

  - rule: "When writing comments referencing functions, write names as `f` instead of `f()` for mathematical purity when referring to the function itself rather than its application."
    source:
      path: "AGENTS.md"
      lines: "8-10"
      commit: "63f473f503c91e0694389620a168e40c4ccc6483"

  - rule: "Comments should explain invariants and complex logic clearly. For bug fixes, explain the root cause and the fix approach."
    source:
      path: ".claude/skills/review/SKILL.md"
      lines: "140-142"
      commit: "63f473f503c91e0694389620a168e40c4ccc6483"
