distractors:
- rule: 'Default agent rule: If you are changing Next.js source or integration tests,
    start `pnpm --filter=next dev` in a separate terminal session before making edits'
  collision_type: meta_confusion
  why_distracting: The rule mandates starting `pnpm --filter=next dev` for iterative
    development. However, the bug specifically occurs when handlers are invoked directly
    *without* `base-server` (e.g., in custom entrypoint servers). Running `next dev`
    uses the standard dev server which wraps handlers in `base-server`, meaning `next.route`
    will be set and the bug will not reproduce, leading to wasted time and confusion.
  severity: high
  source:
    path: CLAUDE.md
    lines: 60-62
- rule: Before editing or creating files in any subdirectory... read all README.md
    files in the directory path from the repo root up to and including the target
    file's directory.
  collision_type: scope_ambiguity
  why_distracting: The rule suggests reading all `README.md` files in the directory
    path up to the target file. The target files are in deep internal framework directories
    (`packages/next/src/build/templates/` and `packages/next/src/server/route-modules/pages/`).
    Searching for and reading READMEs in these directories will waste time as they
    likely don't exist or don't contain information relevant to OpenTelemetry span
    naming logic.
  severity: low
  source:
    path: CLAUDE.md
    lines: 43-45
hierarchy_analysis: The repository uses identical `CLAUDE.md` and `AGENTS.md` files
  at the root level. The rules are heavily focused on workflow and build processes
  rather than code style. The most critical interaction is the conflict between the
  mandated `next dev` workflow and the specific nature of this bug, which only manifests
  outside of the standard dev server environment.
