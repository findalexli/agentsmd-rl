version: "2.0"

source:
  repo: "vercel/next.js"
  pr: 0
  base_commit: "3003e17b102699bffca325257ae7be53fda69052"

checks:
  - id: app_page_route_fallback
    type: fail_to_pass
    origin: pr_diff
    description: "app-page.ts route falls back to page identifier when next.route absent"

  - id: app_route_route_fallback
    type: fail_to_pass
    origin: pr_diff
    description: "app-route.ts route falls back to page identifier when next.route absent"

  - id: pages_api_route_fallback
    type: fail_to_pass
    origin: pr_diff
    description: "pages-api.ts route falls back to page identifier when next.route absent"

  - id: pages_handler_route_fallback
    type: fail_to_pass
    origin: pr_diff
    description: "pages-handler.ts route falls back to page identifier when next.route absent"

  - id: wrapped_by_server_detection
    type: fail_to_pass
    origin: pr_diff
    description: "pages-handler.ts gates activeSpan path by server-wrapper detection"

  - id: route_uses_next_route_when_present
    type: pass_to_pass
    origin: pr_diff
    description: "All handler files use next.route value when rootSpanAttributes has it"

  - id: parent_span_propagation
    type: fail_to_pass
    origin: pr_diff
    description: "parentSpan http.route set unconditionally, not gated by route truthiness"

  - id: span_logic_not_stubbed
    type: pass_to_pass
    origin: static
    description: "All handler files contain real span logic (setAttributes + updateName)"

  - id: repo_typescript_parse
    type: pass_to_pass
    origin: static
    description: "Repo's TypeScript files have valid syntax structure"

  - id: repo_otel_parent_span_structure
    type: pass_to_pass
    origin: static
    description: "Repo's OTel handler files have expected parentSpan structure"

  - id: repo_pages_handler_structure
    type: pass_to_pass
    origin: static
    description: "Pages handler has expected isWrappedByNextServer pattern"

  - id: repo_tsc_syntax_check
    type: pass_to_pass
    origin: repo_tests
    description: "Modified TypeScript files have valid syntax via tsc"

  - id: repo_git_status_clean
    type: pass_to_pass
    origin: repo_tests
    description: "Git repo is in clean state at base commit"

rubric:
  - rule: "Read all README.md files in the directory path from repo root up to target file's directory before editing files."
    source:
      path: "CLAUDE.md"
      lines: "44-54"
      commit: "3003e17b102699bffca325257ae7be53fda69052"

  - rule: "Build templates (app-page.ts) are compiled by the user's bundler - cannot require internal modules with relative paths. Export helpers from entry-base.ts and access via entryBase.* instead."
    source:
      path: ".agents/skills/dce-edge/SKILL.md"
      lines: "62-68"
      commit: "3003e17b102699bffca325257ae7be53fda69052"

  - rule: "Use pnpm --filter=next dev for watch mode during iterative development on Next.js source."
    source:
      path: "CLAUDE.md"
      lines: "60-68"
      commit: "3003e17b102699bffca325257ae7be53fda69052"
