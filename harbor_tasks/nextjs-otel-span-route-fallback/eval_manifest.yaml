rubric:
- rule: Source code is located in packages/next/src/, while compiled output goes to
    packages/next/dist/.
  source:
    path: AGENTS.md
    lines: 25-32
  evidence: The gold solution correctly targets and modifies TypeScript files within
    `packages/next/src/` (e.g., `packages/next/src/build/templates/app-page.ts`) rather
    than attempting to edit the compiled output
  category: architecture
distractors:
- rule: 'Start watch build in background: pnpm --filter=next dev'
  collision_type: meta_confusion
  why_distracting: The rule instructs developers to start a background watch build
    (`pnpm --filter=next dev`) for iterative development. An agent might try to run
    this command, which could hang the execution environment or consume unnecessary
    resources during an automated, non-interactive evaluation.
  severity: medium
  source:
    path: AGENTS.md
    lines: 65-70
- rule: 'Always run a full bootstrap build after switching branches: pnpm build-all'
  collision_type: scope_ambiguity
  why_distracting: The rule suggests running `pnpm build-all` after switching branches.
    An agent might unnecessarily run this full build (which includes compiling Rust
    crates) instead of just testing the specific Next.js TS files, wasting significant
    time and potentially hitting timeout limits.
  severity: low
  source:
    path: AGENTS.md
    lines: 86-90
hierarchy_analysis: The configuration consists of identical root-level files (AGENTS.md
  and CLAUDE.md) providing generic monorepo instructions. There is no deep hierarchy
  or overriding of rules.