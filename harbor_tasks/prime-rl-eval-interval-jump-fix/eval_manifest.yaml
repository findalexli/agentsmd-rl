rubric:
- rule: Avoid try/except blocks unless it's really necessary.  It's fine that a program fails if something goes wrong as this helps us to catch non-obvious bugs and unforeseen side-effects earlier. You can add try catch on code that explicitly aims to be fault tolerant like adding retry mechanisms or explicit and intentional robustness.
  source:
    path: AGENTS.md
    lines: '5'
    commit: f655f71c33e75dc9d78adefc13f0809d2002485c
  evidence: The gold patch implements compute_eval_ckpt_step with straight-line arithmetic and no try/except blocks.
  category: style
  verification: semantic_diff
- rule: Do not add unnecessary comments. Especially do not try to explain code change that reflect your work process, do not refer to old code. "The code used to do that but now we are doing this" is not a pattern we want. Instead prefer to use targeted comments sparingly to explain ambiguous code.
  source:
    path: AGENTS.md
    lines: '7'
    commit: f655f71c33e75dc9d78adefc13f0809d2002485c
  evidence: The gold patch contains only a targeted docstring and one short comment; no change-narration or old-code references.
  category: style
  verification: semantic_diff
- rule: Write tests as plain functions with pytest fixtures. Don't use class-based tests.
  source:
    path: AGENTS.md
    lines: '54'
    commit: f655f71c33e75dc9d78adefc13f0809d2002485c
  evidence: The test file test_outputs.py uses plain pytest functions, not unittest.TestCase or pytest class-based tests.
  category: testing
  verification: programmatic
- rule: Explicit is better than implicit. Simple is better than complex. Readability counts.
  source:
    path: AGENTS.md
    lines: 12-31
    commit: f655f71c33e75dc9d78adefc13f0809d2002485c
  evidence: The gold implementation of compute_eval_ckpt_step uses clear branching logic (if/elif) rather than a compact one-line expression that hides intent.
  category: architecture
  verification: llm_judge
distractors:
- rule: You can add try catch on code that explicitly aims to be fault tolerant like adding retry mechanisms or explicit and intentional robustness.
  source:
    path: AGENTS.md
    lines: '5'
    commit: f655f71c33e75dc9d78adefc13f0809d2002485c
  collision_type: rule_conflict
  why_distracting: The fault-tolerance exception could lead an agent to wrap the eval scheduling logic in try/except for defensive robustness, when the correct fix is pure integer arithmetic with no failure modes requiring handling.
  severity: medium
- rule: Do not add unnecessary comments.
  source:
    path: AGENTS.md
    lines: '7'
    commit: f655f71c33e75dc9d78adefc13f0809d2002485c
  collision_type: scope_ambiguity
  why_distracting: An agent may omit the docstring on compute_eval_ckpt_step as unnecessary, but the docstring is needed to document the non-obvious jump-handling contract of the function.
  severity: low
- rule: Flat is better than nested.
  source:
    path: AGENTS.md
    lines: '18'
    commit: f655f71c33e75dc9d78adefc13f0809d2002485c
  collision_type: architecture_boundary
  why_distracting: An agent may try to flatten the eval logic with early returns or guard clauses instead of the nested if structure, risking incorrect semantics in the base-model eval special case.
  severity: medium
