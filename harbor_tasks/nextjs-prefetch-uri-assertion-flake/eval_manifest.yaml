rubric:
- rule: If using retry() for waiting, it should be for DOM element presence after
    navigation — not for waiting on network/prefetch activity. For network-level waits,
    the router-act pattern (createRouterAct) is preferred.
  source:
    path: .agents/skills/router-act/SKILL.md
    lines: 17-24
    commit: 138092696c355fa38ec8409e7f2c6c67c97e4f6b
distractors:
- rule: If you are changing Next.js source or integration tests, start `pnpm --filter=next
    dev` in a separate terminal session before making edits
  collision_type: scope_ambiguity
  why_distracting: The rule instructs starting the Next.js watch build (`pnpm --filter=next
    dev`) when changing integration tests. However, for fixing a flaky e2e test, the
    agent only needs to modify the test file itself. Running the framework watch build
    is unnecessary overhead since no framework source code is being modified.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 59-67
- rule: 'Always run a full bootstrap build after switching branches: git checkout
    <branch> pnpm build-all'
  collision_type: meta_confusion
  why_distracting: The rule says to always run a full bootstrap build (`pnpm build-all`)
    after switching branches. An agent might think it needs to run this full build
    before it can run the e2e test to reproduce the issue, which would waste a lot
    of time. The test can be run directly using the fast local development commands.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 84-89
- rule: Before editing or creating files in any subdirectory... read all README.md
    files in the directory path from the repo root up to and including the target
    file's directory.
  collision_type: scope_ambiguity
  why_distracting: The rule requires reading all README.md files in the directory
    path up to the target file. For a deep path like `test/e2e/app-dir/app-prefetch/`,
    the agent might waste time searching for and reading multiple non-existent or
    irrelevant READMEs just to fix a simple flaky test assertion.
  severity: low
  source:
    path: CLAUDE.md
    lines: 43-47
hierarchy_analysis: The config hierarchy consists of identical `CLAUDE.md` and `AGENTS.md`
  files at the root level. They provide general monorepo guidance and build commands.
  There are no specific testing conventions or rules about handling flaky tests or
  Playwright assertions in the provided configs, meaning the agent must rely on its
  intrinsic knowledge of Next.js testing patterns (like using `retry`) rather than
  explicit config guidance.
