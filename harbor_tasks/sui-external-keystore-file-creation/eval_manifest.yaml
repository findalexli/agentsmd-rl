source_pr:
  owner: MystenLabs
  repo: sui
  pr_number: 26107
  title: "sui: ensure external keys files exist"
  merge_commit: dd2cbb20741fc828b7d4ecbf0c1967271db8a982
  base_commit: 4a9af930d043cc9f9bf7a9438ee3f25e4d26e741

# Agent config rules to check (from CLAUDE.md)
agent_config:
  - id: license_headers
    description: "Files must have Mysten Labs Apache 2.0 license header"
    origin: agent_config
    source: "CLAUDE.md"

  - id: cargo_xclippy
    description: "Must run cargo xclippy before finishing"
    origin: agent_config
    source: "CLAUDE.md"

  - id: no_lint_suppressions
    description: "No #[allow(dead_code)] or #[allow(unused)] suppressions"
    origin: agent_config
    source: "CLAUDE.md"

# Rubric rules for LLM evaluation (soft/subjective rules)
rubric: []

# Checks - one per test function in test_outputs.py
checks:
  - id: external_keystore_compiles
    description: "sui-keys crate compiles successfully"
    type: binary
    points: 10

  - id: sui_commands_compiles
    description: "sui crate compiles successfully"
    type: binary
    points: 10

  - id: load_or_create_creates_files
    description: "External::load_or_create creates external files when missing"
    type: binary
    points: 25

  - id: load_new_from_path
    description: "External::load_or_create works with temp directories"
    type: binary
    points: 5

  - id: external_file_creation_code_writes_files
    description: "Rust code writes files when they don't exist"
    type: binary
    points: 10

  - id: external_struct_has_load_or_create
    description: "External struct has load_or_create method"
    type: binary
    points: 5

  - id: sui_commands_has_ensure_external
    description: "ensure_external_keystore_config function exists"
    type: binary
    points: 10

  - id: sui_commands_has_default_path
    description: "default_external_keystore_path function exists"
    type: binary
    points: 5

  - id: sui_commands_imports_external
    description: "sui_commands.rs imports External from sui_keys"
    type: binary
    points: 5

  - id: external_keystore_in_prompt_if_no_config
    description: "prompt_if_no_config initializes external_keys properly"
    type: binary
    points: 10

  - id: external_keys_command_uses_ensure_config
    description: "external-keys command uses ensure_external_keystore_config"
    type: binary
    points: 5

  # Pass-to-Pass (P2P) checks - repo CI/CD tests
  - id: test_repo_sui_keys_compiles
    description: "sui-keys crate compiles (repo CI check)"
    type: pass_to_pass
    origin: repo_ci
    points: 0

  - id: test_repo_sui_keys_clippy
    description: "sui-keys crate passes clippy (repo CI check)"
    type: pass_to_pass
    origin: repo_ci
    points: 0

  - id: test_repo_sui_keys_tests
    description: "sui-keys crate unit tests pass (repo CI check)"
    type: pass_to_pass
    origin: repo_ci
    points: 0

  - id: test_repo_sui_keys_formatting
    description: "sui-keys crate code is properly formatted (repo CI check)"
    type: pass_to_pass
    origin: repo_ci
    points: 0

scoring:
  max_score: 100
  passing_threshold: 70
