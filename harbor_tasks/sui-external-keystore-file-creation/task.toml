[description]
short = "Fix external keystore file creation bug"
long = """
When using external keys in the Sui CLI, the external.keystore and external.aliases
files should be automatically created if they don't exist. Currently, load_or_create()
only loads existing files but doesn't create them when missing. This causes failures
when the external_keys field exists in client.yaml but the corresponding files don't.

The fix requires:
1. Modifying External::load_or_create() in crates/sui-keys/src/external.rs to create
   the keystore and aliases files when they don't exist
2. Adding helper functions in crates/sui/src/sui_commands.rs to ensure external keystore
   configuration is properly initialized
3. Ensuring prompt_if_no_config() initializes external_keys properly
"""
