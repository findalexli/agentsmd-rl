checks:
- id: test_repliesForUnfiltered_empty_skips_delegation
  type: fail_to_pass
  origin: pr_diff
  description: 'Calling storage.repliesForUnfiltered([]) on a makeEncoded-wrapped storage must

    return [] without invoking the underlying encoded.repliesForUnfiltered (verified

    by an Effect.die trap on the encoded layer).

    '
- id: test_resetShards_empty_skips_delegation
  type: fail_to_pass
  origin: pr_diff
  description: 'Calling storage.resetShards([]) must succeed without invoking the underlying

    encoded.resetShards (verified by an Effect.die trap).

    '
- id: test_repliesForUnfiltered_nonempty_still_delegates
  type: pass_to_pass
  origin: pr_diff
  description: 'Non-empty input to repliesForUnfiltered must still be forwarded to the encoded

    layer with the string-coerced ids; guards a trivial fix that always returns [].

    '
- id: test_resetShards_nonempty_still_delegates
  type: pass_to_pass
  origin: pr_diff
  description: 'Non-empty input to resetShards must still be forwarded to the encoded layer with

    the string-coerced ids; guards a trivial fix that always returns void.

