rubric:
- rule: Variable names in Python scripts should not be shortened; use full descriptive
    names like 'version' instead of 'ver'
  source:
    path: CLAUDE.md
    lines: 17-18
    commit: d0f2f3babc7c892958e93419ad6065df0deb2112
- rule: Python scripts should avoid bare exception handling patterns; use specific
    exception types and proper error handling
  source:
    path: CLAUDE.md
    lines: 7-8
    commit: d0f2f3babc7c892958e93419ad6065df0deb2112
- rule: Python scripts should include a proper module-level docstring explaining the
    script's purpose and usage
  source:
    path: CLAUDE.md
    lines: '1'
    commit: d0f2f3babc7c892958e93419ad6065df0deb2112
- rule: AVOID shortening variable names, e.g., use `version` instead of `ver`
  source:
    path: CLAUDE.md
    lines: 17-18
  evidence: In the release workflow, the bash script uses the descriptive variable
    name `temp_manifest` rather than a shortened name like `tmp` or `man`.
  category: naming
distractors:
- rule: ALWAYS attempt to add a test case for changed behavior
  collision_type: scope_ambiguity
  why_distracting: The changes involve GitHub Actions workflows and a release packaging
    script. Attempting to add a test case for these CI/CD infrastructure changes would
    be a waste of effort as they are not part of the standard test suite.
  severity: high
  source:
    path: CLAUDE.md
    lines: '2'
- rule: PREFER integration tests, e.g., at `it/...` over unit tests
  collision_type: architecture_boundary
  why_distracting: The agent might try to add an integration test in the Rust `it/...`
    directory for the Python script. This crosses an architecture boundary, as the
    script is a standalone utility for the release workflow, not part of the Rust
    application.
  severity: medium
  source:
    path: CLAUDE.md
    lines: '3'
hierarchy_analysis: The CLAUDE.md file provides general Rust-focused guidelines. However,
  this PR is entirely focused on CI/CD infrastructure (GitHub Actions) and a Python
  utility script. The Rust-specific testing and style rules do not apply here.
