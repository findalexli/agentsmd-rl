rubric:
- rule: Do not edit a `# Copied from` block, as it will be reverted by `make fix-repo`.
    Ideally you should edit the code it's copying from and propagate the change, but
    you can break the `# Copied from` link if needed.
  source:
    path: .ai/AGENTS.md
    lines: '65'
    commit: aa1c36f1a9f454e69c4eac83071ced235942c7ed
- rule: When a `modular` file is present, generated files should not be edited, as
    changes will be overwritten by `make fix-repo`! Instead, edit the `modular` file.
  source:
    path: .ai/AGENTS.md
    lines: '66'
    commit: aa1c36f1a9f454e69c4eac83071ced235942c7ed
- rule: PRs should be as brief as possible. Bugfix PRs in particular can often be
    only one or two lines long, and do not need large comments, docstrings or new
    functions in this case. Aim to minimize the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: aa1c36f1a9f454e69c4eac83071ced235942c7ed
- rule: 'Never use `# type: ignore` as a first resort. Exhaust all approaches (isinstance
    narrowing, cast(), overloads, Protocol) before resorting to type: ignore.'
  source:
    path: .ai/skills/add-or-fix-type-checking/SKILL.md
    lines: '191'
    commit: aa1c36f1a9f454e69c4eac83071ced235942c7ed
- rule: '`make check-repo` is the command for CI-style consistency checks.'
  source:
    path: CLAUDE.md
    lines: 4-4
  evidence: The gold solution updates `.ai/AGENTS.md` to explicitly state that `make
    check-repo` includes `make typing`, preserving its documented role as the comprehensive
    CI-style consistency check even after t
  category: documentation
distractors:
- rule: '`make style`: runs formatters, linters and type checker'
  collision_type: meta_confusion
  why_distracting: The rule defines `make style` as running formatters, linters, and
    the type checker. The agent is explicitly tasked with changing this behavior by
    extracting the type checker into a new `make typing` target. Treating this documentation
    as an immutable constraint would prevent the agent from modifying the Makefile
    and updating the documentation itself.
  severity: high
  source:
    path: CLAUDE.md
    lines: 2-2
- rule: Do not open one-off PRs for tiny edits or isolated lint cleanup.
  collision_type: scope_ambiguity
  why_distracting: The rule forbids one-off PRs for 'isolated lint cleanup'. An agent
    might misinterpret the task of adding caching to the model structure linter and
    refactoring linting Makefile targets as an 'isolated lint cleanup' and refuse
    to proceed, citing the contribution policy.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 34-36
- rule: Pure code-agent PRs are not allowed; human validation is required.
  collision_type: meta_confusion
  why_distracting: The rule states that pure code-agent PRs are not allowed and require
    human validation. An agent might refuse to generate the requested code or inappropriately
    inject human-validation disclaimers into the PR description or code comments,
    misunderstanding its role as an assistant generating the patch for a human.
  severity: low
  source:
    path: CLAUDE.md
    lines: 38-46
hierarchy_analysis: 'The repository contains identical rules across `CLAUDE.md`, `AGENTS.md`,
  and `.ai/AGENTS.md`. The primary challenge is meta-circularity: the agent is asked
  to modify the very documentation (`.ai/AGENTS.md`) that defines the repository''s
  commands (`make style`). The agent must recognize that the config files describe
  the *current* state, which the prompt explicitly asks to change.'
