rubric:
- rule: 'Avoid `try`/`catch` where possible in any new code added to

    packages/opencode/src/config/.

    '
  source:
    lines: 8-15
    commit: 326471a25c50cb83d33e6b327bc88faf38a4db11
    path: AGENTS.md
  category: style
  verification: llm_judge
- rule: 'Avoid the `any` type in newly-introduced code. (The existing inline

    schema''s `initialization: z.record(z.string(), z.any())` may be carried

    across verbatim — that is the schema''s contract; the rule applies to

    additional code.)

    '
  source:
    lines: 8-15
    commit: 326471a25c50cb83d33e6b327bc88faf38a4db11
    path: AGENTS.md
  category: style
  verification: llm_judge
- rule: 'Rely on type inference where possible; avoid explicit type annotations

    or interfaces except where required for export. (The new modules already

    need `export type Info = z.infer<typeof Info>` for downstream consumers

    — that export is required and counts as "necessary for exports".)

    '
  source:
    lines: 8-15
    commit: 326471a25c50cb83d33e6b327bc88faf38a4db11
    path: AGENTS.md
  category: style
  verification: llm_judge
- rule: 'Prefer functional array methods (flatMap, filter, map) over for loops

    in any newly-introduced code; use type guards on filter to maintain

    type inference downstream. (The lsp refinement already uses

    `Object.entries(data).every(...)` — keep functional style if you

    restructure it.)

    '
  source:
    lines: 8-15
    commit: 326471a25c50cb83d33e6b327bc88faf38a4db11
    path: AGENTS.md
  category: style
  verification: llm_judge
- rule: 'Reduce total variable count by inlining when a value is only used once.

    '
  source:
    lines: 17-26
    commit: 326471a25c50cb83d33e6b327bc88faf38a4db11
    path: AGENTS.md
  category: style
  verification: llm_judge
- rule: 'Prefer `const` over `let`. Use ternaries or early returns instead of

    reassignment in any new helper logic the agent introduces.

    '
  source:
    lines: 39-50
    commit: 326471a25c50cb83d33e6b327bc88faf38a4db11
    path: AGENTS.md
  category: style
  verification: llm_judge
- rule: 'Avoid `else` statements; prefer early returns. If the agent restructures

    the lsp refinement, follow this rule.

    '
  source:
    lines: 53-69
    commit: 326471a25c50cb83d33e6b327bc88faf38a4db11
    path: AGENTS.md
  category: style
  verification: llm_judge
- rule: 'Avoid unnecessary destructuring; use dot notation to preserve context.

    The existing schema bodies use property access — keep that style.

    '
  source:
    lines: 29-37
    commit: 326471a25c50cb83d33e6b327bc88faf38a4db11
    path: AGENTS.md
  category: style
  verification: llm_judge
