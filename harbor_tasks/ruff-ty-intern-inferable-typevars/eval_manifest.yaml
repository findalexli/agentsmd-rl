    source:
      path: "AGENTS.md"
      lines: "81"
      commit: "3a44cce48e2f9687c767a36b9af2da280ef68c64"

rubric:
  - rule: "Avoid writing significant amounts of new code. Look for existing utilities first."
    source:
      path: "AGENTS.md"
      lines: "78"
      commit: "3a44cce48e2f9687c767a36b9af2da280ef68c64"

  - rule: "Try hard to avoid patterns that require panic!, unreachable!, or .unwrap(). Encode constraints in the type system instead."
    source:
      path: "AGENTS.md"
      lines: "79"
      commit: "3a44cce48e2f9687c767a36b9af2da280ef68c64"

  - rule: "Prefer let chains (if let combined with &&) over nested if let statements to reduce indentation and improve readability."
    source:
      path: "AGENTS.md"
      lines: "80"
      commit: "3a44cce48e2f9687c767a36b9af2da280ef68c64"

  - rule: "Use comments purposefully. Don't narrate code, but explain invariants and why something unusual was done."
    source:
      path: "AGENTS.md"
      lines: "82"
      commit: "3a44cce48e2f9687c767a36b9af2da280ef68c64"

  - rule: "Any method that accesses .node() must be #[salsa::tracked], or it will break incrementality."
