task:
  kind: code_fix
  name: kotlin-swift-export-flow-nullable
  title: '[Swift Export] Support Flow with nullable elements'
  description: 'Fix Kotlin''s Swift export to properly handle Flow<T?> with nullable elements.


    The issue is that the SwiftFlowIterator cannot distinguish between a null value

    in the flow and the end of the flow, because both were represented as null in

    the callback type T?.


    The fix introduces a Value wrapper class and changes the callback protocol to

    use a boolean flag to indicate nullability.

    '
  time_limit: 1200
  difficulty: medium
  tags:
  - kotlin
  - swift
  - native
  - coroutines
  - flow
  - nullable
