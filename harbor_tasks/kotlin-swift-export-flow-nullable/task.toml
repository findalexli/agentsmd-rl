name = "kotlin-swift-export-flow-nullable"
title = "[Swift Export] Support Flow with nullable elements"
description = "Fix Kotlin's Swift export to properly handle Flow<T?> with nullable elements by introducing a Value wrapper class and changing the callback protocol to use a boolean flag for nullability indication."
