distractors:
- rule: Prefer functional array methods (flatMap, filter, map) over for loops
  collision_type: rule_conflict
  why_distracting: The agent might try to use `.map()` or `.forEach()` for the tool
    discovery loop, but `yield*` cannot be used inside standard synchronous array
    callbacks. The gold solution correctly uses `for...of` loops to allow yielding
    effects sequentially.
  severity: high
  source:
    path: AGENTS.md
    lines: '17'
- rule: Prefer `FileSystem.FileSystem` instead of raw `fs/promises` for effectful
    file I/O.
  collision_type: scope_ambiguity
  why_distracting: The code uses `Glob.scanSync` to find tool files. An agent might
    try to replace this with `FileSystem` operations to be 'more effectful', which
    would be a massive scope creep and likely break the globbing logic.
  severity: medium
  source:
    path: packages/opencode/AGENTS.md
    lines: '46'
hierarchy_analysis: The root `AGENTS.md` provides general TypeScript style rules (like
  preferring functional array methods), while `packages/opencode/AGENTS.md` provides
  specific Effect.js architecture rules. The Effect rules implicitly override the
  general TS style rules because generator functions (`Effect.gen`) have different
  constraints (e.g., `yield*` cannot be used in standard array callbacks, requiring
  `for...of` loops or `Effect.forEach`).
