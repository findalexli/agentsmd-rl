distractors:
- rule: Prefer functional array methods (flatMap, filter, map) over for loops
  collision_type: rule_conflict
  why_distracting: The original code uses `Promise.all(array.map(async ...))`. Following
    this rule might encourage the agent to keep `.map` and wrap it in `Effect.all`,
    rather than using the idiomatic `Effect.forEach` with concurrency options as required
    by the Effect migration.
  severity: medium
  source:
    path: AGENTS.md
    lines: 17-17
- rule: Reduce total variable count by inlining when a value is only used once.
  collision_type: rule_conflict
  why_distracting: The agent might try to inline the service resolution (e.g., `yield*
    (yield* Config.Service).directories()`) instead of binding `config` and `plugin`
    to variables at the top of the generator, which would be unreadable and evaluate
    the service dependency multiple times.
  severity: medium
  source:
    path: AGENTS.md
    lines: 44-44
- rule: Use Bun APIs when possible, like `Bun.file()`
  collision_type: scope_ambiguity
  why_distracting: The code uses `Glob.scanSync` and `import()`. The agent might try
    to replace these with `Bun.file()` or `Bun.glob()`, which is out of scope for
    this Effect migration PR and could introduce cross-platform bugs (since the code
    explicitly handles `process.platform === "win32"` for imports).
  severity: low
  source:
    path: AGENTS.md
    lines: 15-15
hierarchy_analysis: The root `AGENTS.md` provides general TypeScript/JS guidelines
  (like preferring functional array methods and inlining variables), while `packages/opencode/AGENTS.md`
  provides specific Effect patterns. The Effect patterns must take precedence, as
  Effect has its own idioms for concurrency (`Effect.forEach` instead of `.map`) and
  dependency injection (yielding services to variables instead of inlining).
