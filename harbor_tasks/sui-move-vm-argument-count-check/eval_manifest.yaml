rubric:
- rule: Always run cargo xclippy after finishing development to ensure code passes
    all linting checks
  source:
    path: CLAUDE.md
    lines: '111'
    commit: 44e12d2c78cf6724a80fc06828bfa89b98c8de8f
- rule: Never disable or ignore tests - all tests must pass and be enabled
  source:
    path: CLAUDE.md
    lines: '112'
    commit: 44e12d2c78cf6724a80fc06828bfa89b98c8de8f
- rule: 'Never use #[allow(dead_code)], #[allow(unused)], or any other linting suppressions
    - fix the underlying issues instead'
  source:
    path: CLAUDE.md
    lines: '113'
    commit: 44e12d2c78cf6724a80fc06828bfa89b98c8de8f
- rule: Do NOT comment the obvious - comments should not simply repeat what the code
    does. Comment non-obvious algorithms, temporary exclusions, or subtle race conditions
  source:
    path: CLAUDE.md
    lines: 118-131
    commit: 44e12d2c78cf6724a80fc06828bfa89b98c8de8f
- rule: 'All new files must start with the Apache-2.0 license header: Copyright (c)
    Mysten Labs, Inc. SPDX-License-Identifier: Apache-2.0'
  source:
    path: CLAUDE.md
    lines: 17-20
    commit: 44e12d2c78cf6724a80fc06828bfa89b98c8de8f
distractors:
- rule: For faster iteration, use -p to select only the most relevant packages for
    testing. Use multiple `-p` flags if necessary, e.g. `cargo nextest run -p sui-types
    -p sui-core`
  collision_type: meta_confusion
  why_distracting: The example suggests using `-p sui-types -p sui-core` for testing,
    but this PR modifies `move-vm-runtime` in `external-crates`. An agent might blindly
    copy the example and fail to run the relevant tests for the modified crate.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 38-39
- rule: sui-execution/ - Move execution layer with versions (v0, v1, v2 and latest)
  collision_type: architecture_boundary
  why_distracting: The architecture section describes `sui-execution/` as the 'Move
    execution layer'. An agent might mistakenly try to implement the VM argument count
    checks there instead of in `external-crates/move/crates/move-vm-runtime/`.
  severity: high
  source:
    path: CLAUDE.md
    lines: 63-63
hierarchy_analysis: The root CLAUDE.md provides general repository guidelines, but
  its examples for testing (`sui-core`, `sui-types`) and architecture descriptions
  (`sui-execution/`) can be misleading for changes in the `external-crates/` directory.
version: '2.0'
