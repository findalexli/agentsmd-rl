distractors:
- rule: All new files must start with the following license in comments at the top
    of the file
  collision_type: scope_ambiguity
  why_distracting: The rule specifies adding a license header to new files. An agent
    might mistakenly add it to the existing files being modified, misunderstanding
    the scope of 'new files'.
  severity: low
  source:
    path: CLAUDE.md
    lines: 16-19
- rule: Gate consensus-breaking or VM execution changes behind protocol configuration
    flags.
  source:
    path: .claude/skills/protocol-config/SKILL.md
    lines: 1-10
  collision_type: scope_ambiguity
  why_distracting: The agent might assume that adding a new error (NUMBER_OF_ARGUMENTS_MISMATCH)
    to the VM execution path requires a protocol config flag to avoid breaking consensus,
    but this is an internal invariant check that should be applied directly.
  severity: high
hierarchy_analysis: The hierarchy consists of root-level AGENTS.md and CLAUDE.md files
  with generic repository guidelines. No crate-specific configs are present to guide
  the Move VM modifications.
