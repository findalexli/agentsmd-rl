  - id: test_repo_fmt_check
    description: "Rust formatting check passes"
    type: pass_to_pass
    origin: repo_tests
    note: "CI runs cargo fmt --check on all Rust changes"

  - id: test_try_unwrap_pattern_exists
    description: "visitor/mod.rs uses Arc::try_unwrap instead of Arc::into_inner"
    type: fail_to_pass
    origin: agent_config
    source:
      file: AGENTS.md
      lines: "20-30"
      note: >
        When modifying core task_graph components (files in
        crates/turborepo-lib/src/task_graph/), Arc-based concurrency
        patterns must be safe for multi-reference scenarios in watch mode.
        The fix must not use Arc::into_inner which panics on extra refs.

  - id: test_watch_mode_guard_exists
    description: "processes.stop() is guarded by is_watch check in execute_visitor"
    type: fail_to_pass
    origin: agent_config
    source:
      file: AGENTS.md
      lines: "20-30"
      note: >
        When modifying files in crates/turborepo-lib/src/run/, the
        is_watch flag must be respected to prevent killing persistent
        tasks managed by the watch coordinator.

rubric:
  - id: arch_doc_update
    description: >
      The two core Rust files in crates/turborepo-lib/src/run/ and
      crates/turborepo-lib/src/task_graph/ were correctly modified with the fix.
      Specifically, run/mod.rs has the is_watch guard and visitor/mod.rs has
      the try_unwrap pattern. The patch correctly addresses the persistent
      task panic issue.
    weight: 1
    source:
      path: crates/turborepo-lib/src/task_graph/visitor/mod.rs
    reference: |
      let errors = match Arc::try_unwrap(errors) {
          Ok(mutex) => mutex.into_inner().expect("mutex poisoned"),
          Err(arc) => {
              // In watch mode, fire-and-forget persistent tasks may still
              // hold references. Drain the collected errors from the mutex.
              std::mem::take(&mut *arc.lock().expect("mutex poisoned"))
          }
      };

  - id: pr_title_format
    description: >
      The fix compiles without warnings and all tests pass. The cargo check,
      clippy, and test commands all succeed, confirming the fix is correct.
    weight: 1
    source:
      path: crates/turborepo-lib/src/run/mod.rs
    reference: |
      if !is_watch {
          self.processes.stop().await;
      }

  - id: commit_hooks_enforced
    description: >
      The patch applies cleanly to both run/mod.rs and visitor/mod.rs without
      conflicts. The fix is self-contained and doesn't bypass any safety checks.
    weight: 1
    source:
      path: crates/turborepo-lib/src/run/mod.rs
    reference: "if !is_watch"
