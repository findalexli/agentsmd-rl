  - id: test_repo_watch_tests
    description: "Watch mode tests pass"
    type: pass_to_pass
    origin: repo_tests
    note: "Watch mode is directly affected by the persistent task fix"

  - id: test_repo_visitor_command_tests
    description: "Visitor command tests pass"
    type: pass_to_pass
    origin: repo_tests
    note: "Visitor module contains the Arc::try_unwrap fix"

  - id: test_repo_task_filter_tests
    description: "Task filter tests pass"
    type: pass_to_pass
    origin: repo_tests
