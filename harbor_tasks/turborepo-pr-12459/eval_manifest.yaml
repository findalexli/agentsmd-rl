      lines: "44-54"
      note: "Rust code must compile — modified files are in tracked paths"

  - id: test_cargo_clippy
    description: "turbo-repo-lib passes clippy lints"
    type: fail_to_pass
    origin: agent_config
    source:
      file: .github/workflows/lint.yml
