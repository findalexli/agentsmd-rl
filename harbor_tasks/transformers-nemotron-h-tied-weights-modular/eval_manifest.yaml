version: "2.0"

source:
  repo: "huggingface/transformers"
  pr: 44876
  base_commit: "2cd52c267ce4d0212eaa40c0ec7192a11654336f"
  merge_commit: "8dc7a52d766efe76c121c0654a5d24d633bffe9e"

checks:
  - id: syntax_valid
    type: pass_to_pass
    origin: static
    description: "Both modeling and modular files must be valid Python"

  - id: base_class_no_tied_weights_keys
    type: fail_to_pass
    origin: pr_diff
    description: "NemotronHPreTrainedModel must NOT define _tied_weights_keys (it shadows parent)"

  - id: modular_base_no_tied_weights_keys
    type: fail_to_pass
    origin: pr_diff
    description: "Modular NemotronHPreTrainedModel must NOT define _tied_weights_keys"

  - id: modular_causal_lm_no_init_override
    type: fail_to_pass
    origin: pr_diff
    description: "Modular NemotronHForCausalLM.__init__ must not delete _tied_weights_keys"

  - id: causal_lm_init_config_annotation
    type: fail_to_pass
    origin: pr_diff
    description: "NemotronHForCausalLM.__init__ config param has NemotronHConfig type annotation"

  - id: causal_lm_has_tied_weights_keys
    type: pass_to_pass
    origin: pr_diff
    description: "NemotronHForCausalLM retains _tied_weights_keys as a class attribute"

  - id: key_classes_exist
    type: pass_to_pass
    origin: static
    description: "All key model classes present in modeling file"

  - id: modeling_not_stub
    type: pass_to_pass
    origin: static
    description: "Modeling file is not stubbed out (>500 lines)"

  - id: modular_not_stub
    type: pass_to_pass
    origin: static
    description: "Modular file is not stubbed out (>150 lines)"

  - id: ruff_clean
    type: pass_to_pass
    origin: agent_config
    description: "Both files pass ruff linting"
    source:
      path: "CLAUDE.md"
      lines: "2"
      commit: "2cd52c267ce4d0212eaa40c0ec7192a11654336f"

  - id: no_bare_type_ignore
    type: pass_to_pass
    origin: agent_config
    description: "No bare '# type: ignore' without error code in modified files"
    source:
      path: ".ai/skills/add-or-fix-type-checking/SKILL.md"
      lines: "185"
      commit: "2cd52c267ce4d0212eaa40c0ec7192a11654336f"

rubric:
  - rule: "When a modular file is present, generated files should not be edited, as changes will be overwritten by make fix-repo. Instead, edit the modular file."
    source:
      path: "CLAUDE.md"
      lines: "67"
      commit: "2cd52c267ce4d0212eaa40c0ec7192a11654336f"

  - rule: "PRs should be as brief as possible. Bugfix PRs in particular can often be only one or two lines long. Aim to minimize the size of the diff."
    source:
      path: ".github/copilot-instructions.md"
      lines: "15"
      commit: "2cd52c267ce4d0212eaa40c0ec7192a11654336f"
