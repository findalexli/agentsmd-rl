rubric:
- rule: When a modular file is present, generated files should not be edited, as changes
    will be overwritten by make fix-repo. Instead, edit the modular file.
  source:
    path: CLAUDE.md
    lines: '67'
    commit: 2cd52c267ce4d0212eaa40c0ec7192a11654336f
- rule: PRs should be as brief as possible. Bugfix PRs in particular can often be
    only one or two lines long. Aim to minimize the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: 2cd52c267ce4d0212eaa40c0ec7192a11654336f
- rule: '`make typing`: runs the ty type checker and model structure rules'
  source:
    path: CLAUDE.md
    lines: 3-3
  evidence: The gold solution adds the `NemotronHConfig` type hint to the `config`
    parameter in `NemotronHForCausalLM.__init__`, which is required to pass the model
    structure rules enforced by `make typing`.
  category: tooling
- rule: The newer method is to add a file named `modular_<name>.py` in the model directory.
    `modular` files can inherit from other models.
  source:
    path: CLAUDE.md
    lines: 56-58
  evidence: The gold solution correctly updates `modular_nemotron_h.py` (where `NemotronHForCausalLM`
    inherits from `ZambaForCausalLM`) by removing the hacky `__init__` override, adhering
    to the modular model des
  category: architecture
distractors:
- rule: No low-value busywork PRs - Do not open one-off PRs for tiny edits.
  collision_type: scope_ambiguity
  why_distracting: The agent might refuse to fix the misplaced `_tied_weights_keys`
    attribute and missing type hint, incorrectly classifying this bug fix as a 'tiny
    edit' or 'isolated lint cleanup' and thus violating the 'No low-value busywork
    PRs' rule.
  severity: high
  source:
    path: CLAUDE.md
    lines: 34-36
- rule: '`make fix-repo`: auto-fixes copies, modular conversions...'
  collision_type: meta_confusion
  why_distracting: The agent might only edit `modular_nemotron_h.py` and attempt to
    run `make fix-repo` in its patch script to generate `modeling_nemotron_h.py`.
    In a patch-based evaluation environment, this tooling might fail. The gold solution
    avoids this by explicitly patching both files.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 4-4
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` are located at the root level
  and contain identical content. There are no conflicts between the files, but agents
  must synthesize the rules regarding modular models and tooling without getting blocked
  by the strict PR contribution policies.
