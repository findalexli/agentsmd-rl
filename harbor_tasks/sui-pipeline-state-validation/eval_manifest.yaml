source_pr:
  owner: MystenLabs
  repo: sui
  number: 26022
  title: "Panic if pipeline is an an unrecoverable state"
  base_commit: f8024baa75086db5a440d98247ecfd3d1ee90c73
  merge_commit: 3cacbc7cdce3ef4a14a32b077a860394254364ce
  target_file: crates/sui-indexer-alt-framework/src/pipeline/mod.rs

checks:
  # Fail-to-pass tests
  - id: assert_prevents_batch_rows_exceeding_total
    name: "add() panics when batch_rows would exceed total_rows"
    type: f2p
    points: 3

  - id: assert_prevents_taking_more_than_available
    name: "take() panics when taking more rows than available"
    type: f2p
    points: 3

  - id: checkpoint_mismatch_assertion
    name: "add() panics when checkpoint values don't match"
    type: f2p
    points: 2

  # Pass-to-pass tests
  - id: compilation_succeeds
    name: "Crate compiles without errors"
    type: p2p
    points: 1

  - id: assertions_are_present
    name: "Assert! is used instead of debug_assert! for critical checks"
    type: p2p
    points: 1
    source:
      origin: agent_config
      file: CLAUDE.md
      rule: "ALWAYS run `cargo xclippy` after finishing development"  # Related to code quality

rubric: []

# Agent configuration references
agent_config:
  files:
    - CLAUDE.md
    - AGENTS.md
