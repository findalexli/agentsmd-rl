  - id: test_repo_zig_ban_words_extend
    type: pass_to_pass
    origin: repo_tests
    description: "extend() function passes ban-words check (no std.debug.print, std.log, allocator.ptr comparisons, catch bun.outOfMemory) via Python subprocess"

  # Mirrors: bun test test/internal/ban-words.test.ts -- full file zero-tolerance patterns
  - id: test_repo_zig_ban_words_full
    type: pass_to_pass
    origin: repo_tests
    description: "expect.zig passes full ban-words test suite (zero-tolerance patterns) via Python subprocess"

  # Mirrors: bun run zig:check -- basic syntax validation
  - id: test_repo_zig_syntax_basic
    type: pass_to_pass
    origin: repo_tests
    description: "Zig code has valid basic syntax (balanced braces/parens/brackets) via Python subprocess"

  # Mirrors: bun run zig:check -- structure validation
  - id: test_repo_expect_zig_structure
    type: pass_to_pass
    origin: repo_tests
    description: "expect.zig has required structure (Expect struct, applyCustomMatcher, extend, call) via Python subprocess"

  # Mirrors: bun run prettier -- package.json validation
  - id: test_repo_package_json_valid
    type: pass_to_pass
    origin: repo_tests
    description: "package.json is valid JSON with required CI scripts (lint, fmt, typecheck) via Python subprocess"

  # Mirrors: bun run clang-format:check -- C++ formatting
  - id: test_repo_cpp_basic_style
    type: pass_to_pass
    origin: repo_tests
    description: "C++ files follow basic style conventions (no trailing whitespace, no tabs) via Python subprocess"

