    type: fail_to_pass
    origin: pr_diff
    description: "Buggy .put() calls on expect_proto/constructor/static_proto are removed or guarded"

  - id: index_safe_property_setting
    type: fail_to_pass
    origin: pr_diff
    description: "Properties registered via a method that handles index keys (putMayBeIndex, etc.)"

  - id: all_three_targets_use_safe_setter
    type: fail_to_pass
    origin: pr_diff
    description: "All three registration targets are updated, not just one or two"

  - id: extend_preserves_core_logic
    type: pass_to_pass
    origin: pr_diff
    description: "Extend function still iterates properties and creates wrapper functions"

  - id: key_functions_preserved
    type: pass_to_pass
    origin: static
    description: "Core expect functions (applyCustomMatcher, extend, toBeCloseTo, toEqual) still exist"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "expect.zig has substantial Zig content (not stubbed out)"

  - id: no_inline_import_in_functions
    type: pass_to_pass
    origin: agent_config
    description: "No @import() inline inside the extend() function body (scoped to agent's change)"
    source:
      path: "src/CLAUDE.md"
      lines: "11"
      commit: "6034bd82b1a0d9b3635560405354e931b7e0e192"

  - id: no_std_direct_usage
    type: pass_to_pass
    origin: agent_config
    description: "No std.fs/std.posix/std.os introduced in extend() — must use bun.* equivalents"
    source:
      path: "src/CLAUDE.md"
      lines: "16"
      commit: "6034bd82b1a0d9b3635560405354e931b7e0e192"

  - id: no_wrong_allocator
    type: pass_to_pass
    origin: agent_config
    description: "New allocator usage should use bun.default_allocator, not std.heap"
    source:
      path: "src/CLAUDE.md"
      lines: "232"
      commit: "6034bd82b1a0d9b3635560405354e931b7e0e192"

  - id: no_catch_outofmemory_pattern
    type: pass_to_pass
    origin: agent_config
    description: "Must not use 'catch bun.outOfMemory()' — use bun.handleOom() instead"
    source:
      path: "src/CLAUDE.md"
      lines: "234"
      commit: "6034bd82b1a0d9b3635560405354e931b7e0e192"

