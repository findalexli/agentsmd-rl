rubric: []
distractors:
- rule: Always use `bun.*` APIs instead of `std.*`.
  collision_type: architecture_boundary
  why_distracting: The agent might try to convert the numeric index to a string using
    `std.fmt` or `bun.strings` to bypass the `put` assertion, rather than using the
    correct JSC method `putMayBeIndex`.
  severity: medium
  source:
    path: src/AGENTS.md
    lines: 18-32
- rule: NEVER write tests that check for no "panic" or "uncaught exception" or similar
    in the test output.
  collision_type: rule_conflict
  why_distracting: The bug explicitly mentions a crash/assertion failure. If the agent
    decides to write a regression test, it might naturally try to assert that the
    process doesn't crash or panic, which directly violates this rule.
  severity: low
  source:
    path: AGENTS.md
    lines: 78-80
hierarchy_analysis: The config hierarchy provides general Zig and testing guidelines,
  but the fix requires specific knowledge of Bun's JSC wrapper (`putMayBeIndex`).
  The config files do not provide guidance on JSC property assignment, making them
  largely orthogonal to the core problem.
