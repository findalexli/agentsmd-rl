rubric:
- rule: Use bun.JSError!JSValue return type for error handling
  source:
    path: .claude/skills/implementing-jsc-classes-zig/SKILL.md
    lines: 87-89
  source_text: '**Key patterns:**


    - Use `bun.JSError!JSValue` return type for error handling'
  evidence: The gold diff replaces `expect_proto.put` with `try expect_proto.putMayBeIndex(...)`,
    properly utilizing Zig's `try` keyword to propagate the `bun.JSError` from `putMayBeIndex`
    through the enclosing `extend` function, which correctly uses the `bun.JSError!JSValue`
    return type.
  category: error_handling
  verification: llm_judge
distractors:
- rule: Always use `bun.*` APIs instead of `std.*`.
  collision_type: architecture_boundary
  why_distracting: The agent might try to convert the numeric index to a string using
    `std.fmt` or `bun.strings` to bypass the `put` assertion, rather than using the
    correct JSC method `putMayBeIndex`.
  severity: medium
  source:
    path: src/AGENTS.md
    lines: 18-32
- rule: NEVER write tests that check for no "panic" or "uncaught exception" or similar
    in the test output.
  collision_type: rule_conflict
  why_distracting: The bug explicitly mentions a crash/assertion failure. If the agent
    decides to write a regression test, it might naturally try to assert that the
    process doesn't crash or panic, which directly violates this rule.
  severity: low
  source:
    path: AGENTS.md
    lines: 78-80
- rule: Use `putDirectWithoutTransition` when setting JSC properties on prototypes.
  source:
    path: .claude/skills/implementing-jsc-classes-cpp/SKILL.md
    lines: 142-145
  source_text: "    void finishCreation(JSC::VM& vm, JSC::JSObject* prototype) {\n\
    \        Base::finishCreation(vm, 0, \"Foo\"_s);\n        putDirectWithoutTransition(vm,\
    \ vm.propertyNames->prototype, prototype, JSC::PropertyAttribute::DontEnum | JSC::PropertyAttribute::DontDelete\
    \ | JSC::PropertyAttribute::ReadOnly);\n    }"
  collision_type: architecture_boundary
  why_distracting: An agent tasked with fixing property assignment (`put`) on a JSC
    prototype (`expect_proto`) might mistakenly try to use the C++ `putDirectWithoutTransition`
    method. However, the changed file is written in Zig and handles dynamic properties,
    meaning the C++ API is unavailable and incorrect here.
  severity: high
- rule: Use `putDirectBuiltinFunction` when making C++ access assignments.
  source:
    path: src/js/CLAUDE.md
    lines: 47-52
  source_text: "C++ access:\n\n```cpp\nobject->putDirectBuiltinFunction(vm, globalObject,\
    \ identifier,\n  readableStreamInitializeReadableStreamCodeGenerator(vm), 0);\n\
    ```"
  collision_type: scope_ambiguity
  why_distracting: Because the code assigns a wrapper function (`wrapper_fn`) to an
    object (`expect_proto`), an agent might assume it should use `putDirectBuiltinFunction`.
    This would cause a bug, as `expect.extend` matchers are custom native wrappers
    handled via Zig JSC bindings, not compiled JS built-ins.
  severity: high
- rule: Unwrap error results using `.unwrap()` after a `try`.
  source:
    path: .claude/skills/zig-system-calls/SKILL.md
    lines: 84-85
  source_text: '// Pattern 2: Unwrap with try (converts to Zig error)

    const bytes = try sys.read(fd, buffer).unwrap();'
  collision_type: would_cause_bug
  why_distracting: An agent seeing this rule might incorrectly append `.unwrap()`
    after `try expect_proto.putMayBeIndex(...)`. This rule applies exclusively to
    `bun.sys.Maybe(T)` tagged unions, but `putMayBeIndex` returns a standard Zig error
    union (`bun.JSError!void`), so calling `.unwrap()` would cause a compilation failure.
  severity: high
hierarchy_analysis: The config hierarchy provides general Zig and testing guidelines,
  but the fix requires specific knowledge of Bun's JSC wrapper (`putMayBeIndex`).
  The config files do not provide guidance on JSC property assignment, making them
  largely orthogonal to the core problem.
