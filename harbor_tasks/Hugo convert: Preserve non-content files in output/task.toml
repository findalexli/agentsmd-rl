id = "hugo-convert-preserve-noncontent"
name = "Hugo convert: Preserve non-content files in output"
difficulty = "medium"
type = "exec"
timeout_seconds = 1800

[repository]
remote = "https://github.com/gohugoio/hugo"
base_commit = "d88a29e002ebc31bf9b4e1e024f141cc0b39a657"

[evaluation]
tracking_variable = "is_built"
command = ["/bin/sh", "-c", "cd /workspace/task && ./test.sh"]

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
