rubric:
- rule: Be brief. Don't over-comment code or explain the obvious - assume Go expertise.
  source:
    path: AGENTS.md
    lines: 1-4
    commit: d88a29e002ebc31bf9b4e1e024f141cc0b39a657
- rule: Use short variable names when context is clear (e.g., 'p' for page, 'c' for
    config).
  source:
    path: AGENTS.md
    lines: '6'
    commit: d88a29e002ebc31bf9b4e1e024f141cc0b39a657
- rule: Never export symbols not needed outside the package - use unexported functions/methods.
  source:
    path: AGENTS.md
    lines: '8'
    commit: d88a29e002ebc31bf9b4e1e024f141cc0b39a657
- rule: Never export symbols that's not needed outside of the package.
  source:
    path: AGENTS.md
    lines: 6-6
  evidence: The new method `copyContentDirsForOutput` is unexported (starts with a
    lowercase 'c'), keeping it internal to the package.
  category: architecture
- rule: Look hard for helper functions before creating new ones.
  source:
    path: AGENTS.md
    lines: 8-8
  evidence: Instead of writing a custom recursive directory copying function, the
    solution uses the existing `hugio.CopyDir` helper function.
  category: architecture
- rule: 'Assume that the maintainers and readers of the code you write are Go experts:
    Don''t use comments to explain the obvious.'
  source:
    path: AGENTS.md
    lines: 3-4
  evidence: The 48-line `copyContentDirsForOutput` function contains zero comments,
    relying entirely on standard Go idioms and clear variable names to explain its
    logic.
  category: documentation
- rule: This is a project with a long history; assume that a similiar problem has
    been solved before, look hard for helper functions before creating new ones.
  source:
    path: AGENTS.md
    lines: 8-8
  evidence: The solution leverages the existing `hugio.CopyDir` function to handle
    the recursive directory copying instead of implementing a custom file tree traversal.
  category: tooling
distractors:
- rule: Use short variable names when the context is clear.
  collision_type: rule_conflict
  why_distracting: The agent might try to use overly short variable names (e.g., `cd`,
    `od`, `r`) for the complex path manipulation logic. This would make the code unreadable
    and conflict with the adjacent rule to use self-explanatory names, as the context
    of absolute vs. relative paths requires descriptive naming.
  severity: medium
  source:
    path: AGENTS.md
    lines: '5'
hierarchy_analysis: The configuration is flat, with `CLAUDE.md` simply referencing
  `AGENTS.md`. The rules are straightforward Go conventions, but there is a slight
  internal tension between using short variable names and self-explanatory names in
  complex logic.
