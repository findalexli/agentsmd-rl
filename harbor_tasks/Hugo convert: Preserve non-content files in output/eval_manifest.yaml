rubric:
- rule: Be brief. Don't over-comment code or explain the obvious - assume Go expertise.
  source:
    path: AGENTS.md
    lines: 1-4
    commit: d88a29e002ebc31bf9b4e1e024f141cc0b39a657
- rule: Use short variable names when context is clear (e.g., 'p' for page, 'c' for
    config).
  source:
    path: AGENTS.md
    lines: '6'
    commit: d88a29e002ebc31bf9b4e1e024f141cc0b39a657
- rule: Never export symbols not needed outside the package - use unexported functions/methods.
  source:
    path: AGENTS.md
    lines: '8'
    commit: d88a29e002ebc31bf9b4e1e024f141cc0b39a657
- rule: Never export symbols that's not needed outside of the package.
  source:
    path: AGENTS.md
    lines: 6-6
  evidence: The new method `copyContentDirsForOutput` is unexported (starts with a
    lowercase 'c'), keeping it internal to the package.
  category: architecture
- rule: Look hard for helper functions before creating new ones.
  source:
    path: AGENTS.md
    lines: 8-8
  evidence: Instead of writing a custom recursive directory copying function, the
    solution uses the existing `hugio.CopyDir` helper function.
  category: architecture
- rule: 'Assume that the maintainers and readers of the code you write are Go experts:
    Don''t use comments to explain the obvious.'
  source:
    path: AGENTS.md
    lines: 3-4
  evidence: The 48-line `copyContentDirsForOutput` function contains zero comments,
    relying entirely on standard Go idioms and clear variable names to explain its
    logic.
  category: documentation
distractors:
- rule: Use short variable names when the context is clear.
  collision_type: scope_ambiguity
  why_distracting: The path manipulation logic involves multiple related directories
    (content dir, output dir, absolute output dir, absolute output content dir). An
    agent trying to use short variable names (e.g., `od`, `cd`, `ocd`) would make
    this complex logic extremely difficult to read. The gold solution correctly uses
    explicit names like `outputDirAbs` and `outputContentDirAbs`.
  severity: medium
  source:
    path: AGENTS.md
    lines: 5-5
- rule: Brevity is good.
  collision_type: rule_conflict
  why_distracting: An agent might interpret 'Brevity is good' as an instruction to
    inline the directory copying logic directly into `convertContents` to save lines
    of code, rather than creating a properly structured helper method. This would
    make `convertContents` bloated and harder to maintain.
  severity: low
  source:
    path: AGENTS.md
    lines: 2-2
hierarchy_analysis: The configuration hierarchy is flat, with `CLAUDE.md` simply including
  `AGENTS.md`. The rules in `AGENTS.md` provide a strong set of Go-specific conventions.
  There is a slight internal tension between 'Brevity is good' / 'Use short variable
  names' and the need for 'self-explanatory variable and function names' when dealing
  with complex path logic, which the gold solution resolves in favor of clarity.
