distractors:
- rule: Use short variable names when the context is clear.
  collision_type: rule_conflict
  why_distracting: The agent might try to use overly short variable names (e.g., `cd`,
    `od`, `r`) for the complex path manipulation logic. This would make the code unreadable
    and conflict with the adjacent rule to use self-explanatory names, as the context
    of absolute vs. relative paths requires descriptive naming.
  severity: medium
  source:
    path: AGENTS.md
    lines: '5'
- rule: '- `content/`: Directory for markdown content files.'
  source:
    path: docs/AGENTS.md
    lines: 19-19
  source_text: '   - `content/`: Directory for markdown content files.'
  collision_type: scope_ambiguity
  why_distracting: The code change involves copying content directories (`copyContentDirsForOutput`).
    An AI might read this project knowledge and attempt to hardcode the string `"content/"`
    or filter specifically for markdown files. However, the Go code correctly determines
    the content directory dynamically using `p.File().Path()` and `p.File().Filename()`
    to support custom configurations and various content formats.
  severity: high
- rule: You are an expert front-end and Tailwind CSS developer.
  source:
    path: docs/AGENTS.md
    lines: 4-9
  source_text: 'You are an expert front-end and Tailwind CSS developer. Your primary
    goal is to build reliable, readable, and scalable user interfaces using the existing
    project structure and design system.


    ### Directives

    *   **ALWAYS** use existing Tailwind utility classes for styling.

    *   **NEVER** write raw CSS in `.css` files unless absolutely necessary for a
    non-utility-based global reset.

    *   **NEVER** use inline styles (e.g., `<div style="...">`).'
  collision_type: meta_confusion
  why_distracting: This role definition and its directives are strictly for frontend/theme
    development. An agent might get confused by this global persona and hesitate to
    write or modify the core backend Go code (`commands/convert.go`), or mistakenly
    look for frontend files to apply the conversion logic.
  severity: low
hierarchy_analysis: The configuration is flat, with `CLAUDE.md` simply referencing
  `AGENTS.md`. The rules are straightforward Go conventions, but there is a slight
  internal tension between using short variable names and self-explanatory names in
  complex logic.
