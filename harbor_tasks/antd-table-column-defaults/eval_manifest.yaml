rubric:
- rule: 'Test 导入规范: 测试文件应优先从当前组件目录、相邻内部模块或共享测试工具目录通过相对路径引用，禁止使用绝对路径引用仓库内代码。'
  source:
    path: CLAUDE.md
    lines: 39-43
  evidence: 'The gold solution modifies `components/table/__tests__/Table.test.tsx`
    to add a new test case without introducing any absolute imports for internal Ant
    Design modules, adhering to the relative import '
  category: testing
distractors:
- rule: '文档规范: API 表格格式要求记录组件的属性、说明、类型、默认值和版本。'
  collision_type: scope_ambiguity
  why_distracting: The instructions ask to add a new `column` prop, which is a public
    API change. An agent might read the '文档规范' (API 表格格式) and attempt to update `components/table/index.en-US.md`
    and `index.zh-CN.md`. However, the instructions do not request documentation updates,
    and modifying these files would be out of scope for this specific task.
  severity: high
  source:
    path: CLAUDE.md
    lines: 49-68
- rule: 'Changelog 规范: 必须同时提供中英文两个版本的更新日志，描述对开发者的影响。'
  collision_type: scope_ambiguity
  why_distracting: The agent might see that a new feature is being added and attempt
    to update `CHANGELOG.en-US.md` and `CHANGELOG.zh-CN.md` according to the Changelog
    rules. However, changelog generation is handled separately (e.g., via the `changelog-collect`
    skill) and is not requested in the prompt.
  severity: high
  source:
    path: CLAUDE.md
    lines: 101-115
- rule: 'Demo 导入规范: 引入 Ant Design 组件、内部模块时，一律使用绝对路径导入，不使用相对路径导入。'
  collision_type: scope_ambiguity
  why_distracting: The 'Demo 导入规范' mandates using absolute paths (e.g., `antd`, `antd/es/*`)
    for imports. An agent might mistakenly apply this rule to the newly created `useFilledColumns.ts`
    or `InternalTable.tsx`, which are internal component files and must use relative
    imports.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 31-35
hierarchy_analysis: 'The configuration files `CLAUDE.md` and `AGENTS.md` are identical
  and provide rules for Demo imports, Test imports, Documentation, PRs, and Changelogs.
  The primary conflict arises from scope ambiguity: the config provides detailed instructions
  for updating documentation and changelogs, which an agent might eagerly apply to
  this new feature PR. However, the specific task instructions strictly limit the
  scope to implementing the feature and its tests. The agent must recognize that documentation
  and changelog rules, while present in the global config, are out of scope for this
  specific code-level implementation task. Additionally, the agent must correctly
  distinguish between Demo import rules (absolute) and Test/Internal import rules
  (relative).'
