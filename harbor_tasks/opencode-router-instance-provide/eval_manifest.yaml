distractors:
- rule: Prefer `HttpClient.HttpClient` instead of raw `fetch`.
  collision_type: architecture_boundary
  why_distracting: The agent might try to refactor the `fetch` calls in the workspace
    router or adaptor to use `HttpClient.HttpClient`, but the actual goal of the PR
    is to eliminate the network round-trip entirely by consolidating the middleware,
    making the `fetch` call obsolete.
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: 35-36
- rule: Instance.bind — ALS for native callbacks
  collision_type: scope_ambiguity
  why_distracting: The PR is specifically about refactoring `Instance.provide` (which
    sets up the context). An agent might confuse `Instance.provide` with `Instance.bind`
    and try to use `Instance.bind` in the new router, which is only for native callbacks,
    not for initializing the context for the request.
  severity: medium
  source:
    path: packages/opencode/AGENTS.md
    lines: 43-45
hierarchy_analysis: The root `AGENTS.md` provides general TypeScript style guidelines
  (naming, avoiding `any`), while `packages/opencode/AGENTS.md` provides highly specific
  Effect-driven architecture rules. For this specific PR, the agent must rely on the
  root style guidelines while recognizing that the Effect-specific rules in the child
  config (like `HttpClient` and `Instance.bind`) are distractors for this Hono middleware
  refactor.
