distractors:
- rule: Prefer `HttpClient.HttpClient` instead of raw `fetch`.
  collision_type: scope_ambiguity
  why_distracting: The `fetch` method in `worktree.ts` is an implementation of the
    `Adaptor` interface (which mimics the Web Fetch API signature), not an actual
    HTTP client call. An agent might try to replace this method signature or its internal
    logic with `HttpClient`, breaking the interface.
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: 38-38
- rule: Use `InstanceState` (from `src/effect/instance-state.ts`) for per-directory
    or per-project state that needs per-instance cleanup.
  collision_type: meta_confusion
  why_distracting: The PR is about consolidating `Instance.provide` (which uses AsyncLocalStorage
    for Hono request lifecycle) and directory resolution. An agent might confuse this
    with Effect's `InstanceState` and try to rewrite the directory resolution using
    Effect, which is incorrect for the Hono middleware layer.
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: 22-24
- rule: Use `Effect.gen(function* () { ... })` for composition.
  collision_type: architecture_boundary
  why_distracting: The router and middleware are standard async functions in Hono.
    An agent might try to effectify the new router module, which is unnecessary and
    out of scope for this specific refactor.
  severity: medium
  source:
    path: packages/opencode/AGENTS.md
    lines: 11-11
hierarchy_analysis: The root `AGENTS.md` provides general TypeScript/Node.js guidelines
  (naming, architecture), while `packages/opencode/AGENTS.md` introduces highly specific
  Effect-ts patterns. For this PR, which deals with Hono middleware and standard async
  functions, the Effect rules in the child config act as strong distractors because
  the agent might assume all new or refactored code in `packages/opencode` must be
  migrated to Effect.
