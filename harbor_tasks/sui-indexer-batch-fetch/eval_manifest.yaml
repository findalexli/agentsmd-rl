    origin: gold_patch
    description: Verify futures::future::try_join_all is imported in checkpoints.rs

  - id: test_checkpoints_concurrent_fetch_pattern
    type: fail_to_pass
    origin: gold_patch
    description: Verify checkpoints use try_join_all instead of sequential loop

  - id: test_events_batch_fetch_pattern
    type: fail_to_pass
