distractors:
- rule: Integration and performance tests require multi-node hardware. Explain skips explicitly when you cannot access the cluster.
  collision_type: scope_ambiguity
  why_distracting: The rule states that integration tests require multi-node hardware and instructs the agent to 'explain skips explicitly when you cannot access the cluster'. An agent might misinterpret this as an instruction to add `@pytest.mark.skip` decorators to the new Megatron tests, whereas the goal is to parametrize the tests so they can be executed by the CI/CD pipeline.
  severity: high
  source:
    path: AGENTS.md
    lines: 8-10
- rule: Coordinate doc edits with the docs build pipeline.
  collision_type: meta_confusion
  why_distracting: The rule says to 'Coordinate doc edits with the docs build pipeline'. An agent might avoid committing the changes to `docs/cli_reference.md` or try to trigger a complex external build pipeline, not realizing that the CLI doc generation is handled automatically by the local pre-commit hook.
  severity: medium
  source:
    path: AGENTS.md
    lines: 16-17
hierarchy_analysis: The repository uses a flat, single-file config (`AGENTS.md`) that provides high-level operational guidelines. The agent must synthesize the instruction to update `docs/cli_reference.md` with the `AGENTS.md` rule about pre-commit hooks generating CLI docs.
