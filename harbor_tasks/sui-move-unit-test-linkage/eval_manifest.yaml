rubric:
- rule: The solution properly imports linkage_context from move_vm_runtime::shared
    and uses StoredPackage::from_module_for_testing_with_linkage with proper linkage
    context
  reference: 'PR #26139: adds linkage_context import, creates identity linkage table,
    and uses from_module_for_testing_with_linkage'
distractors:
- rule: Run e2e tests. simtests must be run with `cargo simtest` to avoid false negatives
  collision_type: scope_ambiguity
  why_distracting: The agent might try to run `cargo simtest -p sui-e2e-tests` to
    verify its changes, but this is irrelevant for a unit test runner fix in the Move
    compiler and would waste time.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 30-31
- rule: Run Rust unittests. skip simulation tests as they may cause false negatives
    with `cargo nextest`
  collision_type: scope_ambiguity
  why_distracting: Running `SUI_SKIP_SIMTESTS=1 cargo nextest run` without package
    filters will run tests for the entire massive workspace, likely causing timeouts.
    The agent must realize it should only test the `move-unit-test` package.
  severity: high
  source:
    path: CLAUDE.md
    lines: 33-34
