task:
  name: sui-move-unit-test-linkage
  title: Fix Move unit test runner to provide full package linkage
  description: |
    The Move unit test runner was not providing full linkage context for packages,
    causing issues with cross-package test execution. The fix adds proper
    linkage context creation using identity mapping (addr -> addr) and passes
    it to StoredPackage creation via from_module_for_testing_with_linkage.

checks:
  # Fail-to-pass tests
  - id: test_linkage_context_import_exists
    type: fail_to_pass
    origin: behavior
    description: Verify linkage_context is imported in test_runner.rs

  - id: test_linkage_table_creation_exists
    type: fail_to_pass
    origin: behavior
    description: Verify linkage_table is created mapping addresses

  - id: test_stored_package_with_linkage_exists
    type: fail_to_pass
    origin: behavior
    description: Verify from_module_for_testing_with_linkage is used

  - id: test_linkage_context_passed_to_package
    type: fail_to_pass
    origin: behavior
    description: Verify linkage_context is cloned and passed to package creation

  # Pass-to-pass tests (repo CI)
