rubric:
- rule: Follow existing code style for license headers. New files must start with
    SPDX-License-Identifier comment.
  source:
    path: CLAUDE.md
    lines: 16-20
    commit: 8810914bd8a82363390cbd30eb12188b34592c87
- rule: Use comments to explain the WHY (non-obvious algorithms, reasoning, assumptions),
    not the WHAT (what code does).
  source:
    path: CLAUDE.md
    lines: 116-130
    commit: 8810914bd8a82363390cbd30eb12188b34592c87
- rule: 'NEVER use #[allow(dead_code)], #[allow(unused)], or other linting suppressions
    - fix underlying issues instead.'
  source:
    path: CLAUDE.md
    lines: 111-114
    commit: 8810914bd8a82363390cbd30eb12188b34592c87
- rule: For faster iteration, use -p to select only the most relevant packages for
    testing.
  source:
    path: CLAUDE.md
    lines: 41-41
  evidence: The verification instructions specifically use `cargo check -p move-unit-test`
    to target only the modified package rather than checking the entire workspace.
  category: tooling
distractors:
- rule: 'Run e2e tests. simtests must be run with `cargo simtest` to avoid false negatives:
    `cargo simtest -p sui-e2e-tests`'
  collision_type: scope_ambiguity
  why_distracting: The agent might try to run `cargo simtest -p sui-e2e-tests` to
    verify its changes, but this PR modifies an external Move VM crate (`move-unit-test`),
    making Sui e2e tests out of scope and a massive waste of time.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 32-33
- rule: 'Run Rust unittests. skip simulation tests as they may cause false negatives
    with `cargo nextest`: `SUI_SKIP_SIMTESTS=1 cargo nextest run`'
  collision_type: scope_ambiguity
  why_distracting: The agent might run the global test command `SUI_SKIP_SIMTESTS=1
    cargo nextest run` which runs tests for the entire massive workspace, leading
    to timeouts or unrelated failures, instead of scoping to the specific `-p move-unit-test`
    package.
  severity: high
  source:
    path: CLAUDE.md
    lines: 35-36
hierarchy_analysis: The repository has a root `CLAUDE.md` and `AGENTS.md`. The `AGENTS.md`
  defers to `CLAUDE.md`. The root `CLAUDE.md` provides general guidance for the Sui
  repository, including testing commands. However, the modified file is in `external-crates/move/`,
  which is an upstream dependency. The global testing commands in `CLAUDE.md` (like
  `cargo simtest -p sui-e2e-tests`) are heavily Sui-focused and can distract an agent
  working on the generic Move VM unit test runner. The agent must rely on the `-p`
  scoping rule to avoid running irrelevant, long-running workspace tests.
version: '2.0'
