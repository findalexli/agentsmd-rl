rubric:
- rule: Brevity is good. This applies to code, comments and commit messages. Don't
    write a novel.
  source:
    path: AGENTS.md
    lines: 1,12
    commit: 45e4596630b1372ab02634e4536d2b5a89452e0b
- rule: Don't use comments to explain the obvious. Assume maintainers are Go experts.
  source:
    path: AGENTS.md
    lines: 2-4
    commit: 45e4596630b1372ab02634e4536d2b5a89452e0b
- rule: Use self-explanatory variable and function names. Use short variable names
    when the context is clear.
  source:
    path: AGENTS.md
    lines: 4-5
    commit: 45e4596630b1372ab02634e4536d2b5a89452e0b
- rule: Assume that a similar problem has been solved before; look hard for helper
    functions before creating new ones.
  source:
    path: AGENTS.md
    lines: '9'
    commit: 45e4596630b1372ab02634e4536d2b5a89452e0b
- rule: Avoid global state at (almost) all cost.
  source:
    path: AGENTS.md
    lines: '8'
    commit: 45e4596630b1372ab02634e4536d2b5a89452e0b
- rule: Brevity is good.
  source:
    path: AGENTS.md
    lines: 1-1
  evidence: The solve.sh script is extremely concise, containing only a simple idempotency
    check and the commands to copy and run the python script without any unnecessary
    boilerplate.
  category: style
- rule: Use self-explanatory variable and function names.
  source:
    path: AGENTS.md
    lines: 2-4
  evidence: The script checks for the string 'DedentMarkers removes leading whitespace',
    indicating the creation of a self-explanatory function name `DedentMarkers` that
    clearly describes its purpose.
  category: naming
distractors:
- rule: Use `./check.sh` when you're done.
  collision_type: would_cause_bug
  why_distracting: The agent might append `./check.sh` to the end of `solve.sh`. Since
    `solve.sh` is used to apply the fix in the evaluation environment, running the
    entire test suite here could lead to timeouts or unintended test failures blocking
    the application of the fix.
  severity: high
  source:
    path: AGENTS.md
    lines: 12-12
- rule: In tests, use `qt` matchers instead of raw `if`/`t.Fatal` checks.
  collision_type: meta_confusion
  why_distracting: The agent might attempt to write Go tests using `qt` matchers,
    but the gold solution relies on a Python script to apply the fix and does not
    include any Go test files in its execution path.
  severity: medium
  source:
    path: AGENTS.md
    lines: 8-8
hierarchy_analysis: The hierarchy consists of `CLAUDE.md` which simply includes `AGENTS.md`.
  All actionable rules are located in `AGENTS.md`, so there are no conflicts between
  different levels of the configuration hierarchy.
version: '2.0'
