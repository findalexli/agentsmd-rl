  category: architecture
distractors:
- rule: 'Default agent rule: If you are changing Next.js source or integration tests,
    start `pnpm --filter=next dev` in a separate terminal session before making edits'
  collision_type: scope_ambiguity
  why_distracting: The issue is about telemetry during `next build` and `next export`.
    Running `next dev` (the development server) does not exercise the `build()` or
    `exportAppImpl()` functions where the `turboFlag` telemetry is emitted. Following
    this rule would waste time testing the wrong environment.
  severity: high
  source:
    path: CLAUDE.md
    lines: 68-70
- rule: Use full `pnpm build-all` for branch switches/bootstrap, before CI push, or
    when changes span multiple packages.
  collision_type: architecture_boundary
  why_distracting: Because the issue mentions 'Turbopack', an agent might mistakenly
    believe it needs to modify or build the Rust Turbopack compiler (`turbopack/`
    directory) and run `pnpm build-all`. However, the fix only requires passing the
    existing `Bundler` enum in the TypeScript `packages/next` code, making a full
    build unnecessary and slow.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 93-94
hierarchy_analysis: The configuration is flat, with `CLAUDE.md` and `AGENTS.md` being
