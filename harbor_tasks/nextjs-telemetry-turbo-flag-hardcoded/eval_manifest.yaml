version: "2.0"

source:
  repo: "vercel/next.js"
  pr: 92149
  base_commit: "a215ea60a2d0012a9c52f96a97fcaf9af1f5d453"
  merge_commit: "e3b81e05b28c0e888534092717be2074a1aa24c9"

checks:
  # Fail-to-pass tests (core behavioral tests from PR diff)
  - id: build_turbo_flag_not_hardcoded
    type: fail_to_pass
    origin: pr_diff
    description: "turboFlag in build/index.ts telemetry must not be hardcoded to false"

  - id: export_turbo_flag_not_hardcoded
    type: fail_to_pass
    origin: pr_diff
    description: "turboFlag in export/index.ts telemetry must not be hardcoded to false"

  - id: build_turbo_flag_references_bundler
    type: fail_to_pass
    origin: pr_diff
    description: "turboFlag in build/index.ts must reference the bundler, not a boolean literal"

  - id: export_options_has_bundler_field
    type: fail_to_pass
    origin: pr_diff
    description: "ExportAppOptions interface must include a bundler field"

  - id: export_imports_bundler
    type: fail_to_pass
    origin: pr_diff
    description: "export/index.ts must import Bundler to resolve the enum for turboFlag"

  # Pass-to-pass tests (static) - regression guards
  - id: bundler_enum_exists
    type: pass_to_pass
    origin: static
    description: "Bundler enum must exist with Turbopack member"

  - id: telemetry_record_preserved
    type: pass_to_pass
    origin: static
    description: "Build and export files must still contain turboFlag telemetry field"

  # Pass-to-pass tests (repo_tests) - REAL CI COMMANDS using subprocess.run()
  - id: repo_bundler_enum_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Bundler enum must have valid TypeScript syntax with required members"

  - id: repo_export_types_valid
    type: pass_to_pass
    origin: repo_tests
    description: "ExportAppOptions interface must be valid TypeScript with required fields"

  - id: repo_build_file_structure
    type: pass_to_pass
    origin: repo_tests
    description: "Build index.ts must be a valid TypeScript module with proper structure"

  - id: repo_export_file_structure
    type: pass_to_pass
    origin: repo_tests
    description: "Export index.ts must be a valid TypeScript module with proper structure"

  - id: repo_imports_resolvable
    type: pass_to_pass
    origin: repo_tests
    description: "Relative imports in modified files must resolve to existing files"

  - id: repo_git_status_clean
    type: pass_to_pass
    origin: repo_tests
    description: "Git repo must be clean with no uncommitted changes"

