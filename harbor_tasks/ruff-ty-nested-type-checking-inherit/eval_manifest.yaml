    origin: static
    description: "ty binary exists after build"

  - id: nested_if_else_type_checking
    type: fail_to_pass
    origin: pr_diff
    description: "Overloads inside if/else nested within TYPE_CHECKING should not trigger invalid-overload"

  - id: nested_elif_type_checking
    type: fail_to_pass
    origin: pr_diff
    description: "Overloads inside elif branch nested within TYPE_CHECKING should not trigger invalid-overload"

  - id: deeply_nested_type_checking
    type: fail_to_pass
    origin: pr_diff
    description: "Overloads inside double-nested conditionals within TYPE_CHECKING should not trigger invalid-overload"

  - id: direct_type_checking_no_regression
    type: pass_to_pass
    origin: pr_diff
    description: "Overloads directly inside TYPE_CHECKING (no nesting) still produce no false positive"

  - id: overloads_mdtest
    type: pass_to_pass
    origin: repo_tests
    description: "Upstream overloads mdtest suite passes"

  - id: no_panic_unwrap
    type: pass_to_pass
    origin: agent_config
    description: "No panic!/unreachable!/unwrap near the TYPE_CHECKING state assignment"
    source:
      path: "AGENTS.md"
      lines: "79"
      commit: "02e5d6d90e269ca2c49b231f23b7d3c4fd579d92"

  - id: no_local_imports
    type: pass_to_pass
    origin: agent_config
    description: "No local use/import statements inside the Visitor impl"
    source:
      path: "AGENTS.md"
      lines: "76"
      commit: "02e5d6d90e269ca2c49b231f23b7d3c4fd579d92"

rubric:
  - rule: "Use comments purposefully. Don't use comments to narrate code, but do use them to explain invariants and why something unusual was done a particular way."
    source:
      path: "AGENTS.md"
      lines: "82"
      commit: "02e5d6d90e269ca2c49b231f23b7d3c4fd579d92"
  - rule: "Avoid writing significant amounts of new code. This is often a sign that we're missing an existing method or mechanism that could help solve the problem. Look for existing utilities first."
    source:
      path: "AGENTS.md"
      lines: "78"
      commit: "02e5d6d90e269ca2c49b231f23b7d3c4fd579d92"
  - rule: "Prefer let chains (if let combined with &&) over nested if let statements to reduce indentation and improve readability."
    source:
      path: "AGENTS.md"
      lines: "80"
      commit: "02e5d6d90e269ca2c49b231f23b7d3c4fd579d92"
