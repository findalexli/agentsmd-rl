rubric:
- rule: Use comments purposefully. Don't use comments to narrate code, but do use them to explain invariants and why something unusual was done a particular way.
  source:
    path: AGENTS.md
    lines: '82'
    commit: 02e5d6d90e269ca2c49b231f23b7d3c4fd579d92
- rule: Avoid writing significant amounts of new code. This is often a sign that we're missing an existing method or mechanism that could help solve the problem. Look for existing utilities first.
  source:
    path: AGENTS.md
    lines: '78'
    commit: 02e5d6d90e269ca2c49b231f23b7d3c4fd579d92
- rule: Prefer let chains (if let combined with &&) over nested if let statements to reduce indentation and improve readability.
  source:
    path: AGENTS.md
    lines: '80'
    commit: 02e5d6d90e269ca2c49b231f23b7d3c4fd579d92
- rule: Look to see if your tests could go in an existing file before adding a new file for your tests.
  source:
    path: AGENTS.md
    lines: 65-66
  evidence: The gold solution adds the new test case for nested conditional blocks to the existing `crates/ty_python_semantic/resources/mdtest/overloads.md` file rather than creating a new test file.
  category: testing
- rule: All changes must be tested. If you're not testing your changes, you're not done.
  source:
    path: AGENTS.md
    lines: 64-65
  evidence: The gold solution includes a test case in `overloads.md` that specifically verifies the behavior of overloaded functions inside nested conditional blocks within `if TYPE_CHECKING:`.
  category: testing
distractors:
- rule: Rust imports should always go at the top of the file, never locally in functions.
  collision_type: scope_ambiguity
  why_distracting: The rule states that imports should always go at the top of the file and never locally. However, this rule explicitly applies to Rust code. The Python test case added in the markdown file requires a local import (`import sys` inside `if TYPE_CHECKING:`) to properly set up the nested conditional block scenario. An agent might mistakenly apply this Rust rule to the Python test code, moving the import and potentially altering the test's behavior.
  severity: medium
  source:
    path: AGENTS.md
    lines: 66-67
hierarchy_analysis: The configuration is essentially flat, with `CLAUDE.md` simply including `AGENTS.md`. The rules provided are generic repository guidelines.
