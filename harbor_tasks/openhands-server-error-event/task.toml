name = "openhands-server-error-event"
title = "Add ServerErrorEvent handling to OpenHands frontend"
description = """
The Agent Server now sends ServerErrorEvent messages over WebSocket for server-side
errors (e.g., MCP configuration failures). The frontend needs to handle these events
by displaying error banners to users, similar to how ConversationErrorEvent is handled.

This task involves:
1. Adding the ServerErrorEvent type definition
2. Creating type guards (isServerErrorEvent and isDisplayableErrorEvent)
3. Updating the WebSocket context to use the new type guards
4. Updating the OpenHandsEvent union type
5. Adding mock helper for testing
6. Adding tests for the new functionality
"""

difficulty = "medium"
estimated_time = "30-45 minutes"
tags = ["typescript", "react", "frontend", "error-handling", "websocket"]

[repository]
owner = "All-Hands-AI"
name = "OpenHands"
base_commit = "a198599d917fca47c467715b43858fc30f8082d4"
merge_commit = "73ba66faeae1520fc2671b07677db4b5e3e235d3"
pr_number = 13643

[environment]
base_image = "node:22-slim"
language = "typescript"
framework = "react"

[test]
command = "pytest /tests/test_outputs.py -v"
timeout = 300

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
