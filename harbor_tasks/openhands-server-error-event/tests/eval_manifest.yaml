distractors:
- rule: When working on a PR that requires design documents or temporary artifacts,
    store them in a `.pr/` directory.
  collision_type: scope_ambiguity
  why_distracting: The agent might interpret the instruction to add a new event type
    and type guards as requiring a design document or planning notes, prompting it
    to create a `.pr/` directory. However, this is a straightforward feature addition
    that does not require temporary PR artifacts.
  severity: low
  source:
    path: AGENTS.md
    lines: 60-70
- rule: To set up the entire repo, including frontend and backend, run `make build`.
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to run `make build` to set up the entire
    repository (including the Python backend) before starting, which is unnecessary
    since the task only requires modifying frontend TypeScript files and running frontend
    tests.
  severity: low
  source:
    path: AGENTS.md
    lines: 5-6
- rule: Use this skill to test a cross-repo feature or when changes span the SDK and
    OpenHands server repos.
  source:
    path: .agents/skills/cross-repo-testing/SKILL.md
    lines: 1-5
  collision_type: scope_ambiguity
  why_distracting: The task involves handling an event sent by the backend in the
    frontend, which might seem like a 'cross-repo feature' testing scenario. However,
    the task only requires adding standard React/Jest unit tests in the frontend,
    not cross-repo e2e testing.
  severity: medium
