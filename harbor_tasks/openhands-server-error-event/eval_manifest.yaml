task:
  name: openhands-server-error-event
  title: Add ServerErrorEvent handling to OpenHands frontend
  description: 'The Agent Server now sends ServerErrorEvent messages over WebSocket
    for server-side

    errors (e.g., MCP configuration failures). The frontend needs to handle these
    events

    by displaying error banners to users, similar to how ConversationErrorEvent is
    handled.

    '
