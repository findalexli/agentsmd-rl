distractors:
- rule: Run Python pre-commit hooks if changes are made to the backend.
  collision_type: architecture_boundary
  why_distracting: The problem description mentions 'The Agent Server has been updated'.
    The agent might mistakenly think it needs to inspect or modify the Python backend
    to understand the `ServerErrorEvent` structure, and subsequently try to run backend
    pre-commit hooks, wasting time outside the frontend scope.
  severity: high
  source:
    path: AGENTS.md
    lines: 18-18
- rule: Store PR-specific artifacts like design documents or analysis notes in a `.pr/`
    directory.
  collision_type: meta_confusion
  why_distracting: The agent might interpret the task of adding a new event type as
    requiring a design document or analysis notes, and create unnecessary files in
    a `.pr/` directory instead of just implementing the frontend code.
  severity: low
  source:
    path: AGENTS.md
    lines: 58-62
hierarchy_analysis: The `AGENTS.md` file provides repository-wide instructions that
  clearly separate frontend and backend workflows. The agent must correctly identify
  that this task is strictly within the frontend scope (as specified by 'Files to
  Modify') and ignore backend-specific rules and general PR artifact rules unless
  explicitly requested.
