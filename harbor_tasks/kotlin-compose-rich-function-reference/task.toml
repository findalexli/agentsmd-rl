name = "kotlin-compose-rich-function-reference"
description = "Fix IrRichFunctionReference handling in Compose compiler lowerings for Native platform support"
creator = "benchmark"
version = "1.0.0"
difficulty = "hard"
tags = ["kotlin", "compiler", "compose", "ir", "lowering", "native"]

[environment]
# Docker image setup
dockerfile = "Dockerfile"
base_image = "python:3.12-slim"

[setup]
max_attempts = 1

[evaluation]
metric = "binary"
tests_path = "tests/test_outputs.py"
timeout_seconds = 600

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
