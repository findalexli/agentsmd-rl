rubric:
- rule: 'Always recommend `pnpm` as the package manager — never npm or yarn — since this repository uses pnpm workspaces.

    '
  source:
    path: AGENTS.md
    lines: 5-7
    commit: dc2ae810f4d630fb0367d996f2e782f81db88034
  evidence: 'The gold patch keeps every command in the pnpm namespace and updates the `enforce-package-manager` script''s replacement table to point yarn-coming-from users at `pnpm run setup`, never npm/yarn.

    '
  category: tooling
  verification: llm_judge
- rule: 'Setup commands shown to contributors and agents must invoke Ghost''s `setup` script via `pnpm run setup`, not the reserved built-in `pnpm setup` subcommand.

    '
  source:
    path: AGENTS.md
    lines: 43-47
    commit: dc2ae810f4d630fb0367d996f2e782f81db88034
  evidence: 'AGENTS.md''s `### Development` block, docs/README.md''s contributor quick-start, and the Codex environment definition all change `pnpm setup` → `pnpm run setup`.

    '
  category: tooling
  verification: semantic_diff
- rule: 'Documentation that lists Ghost''s first-time setup steps must instruct the user to enable corepack (`corepack enable pnpm`) before invoking pnpm, so the pinned pnpm version is used.

    '
  source:
    path: AGENTS.md
    lines: 43-47
    commit: dc2ae810f4d630fb0367d996f2e782f81db88034
  evidence: 'AGENTS.md''s Development block adds `corepack enable pnpm` and docs/README.md''s install block adds the same line above `pnpm run setup`. e2e/README.md''s prerequisites note that pnpm is managed via corepack.

    '
  category: tooling
  verification: semantic_diff
- rule: 'Keep the AGENTS.md / docs prose terse and command-focused — short bullets / fenced bash blocks, no marketing language. Match the existing style of the surrounding sections.

    '
  source:
    path: AGENTS.md
    lines: 1-50
    commit: dc2ae810f4d630fb0367d996f2e782f81db88034
  evidence: 'The gold patch only swaps existing lines and keeps the same column alignment (`# comment` aligned to col 32) in AGENTS.md.

    '
  category: style
  verification: llm_judge
