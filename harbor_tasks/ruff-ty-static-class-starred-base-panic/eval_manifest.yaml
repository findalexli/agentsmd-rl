rubric:
- id: agent_config_no_panic_unwrap
  source:
    path: AGENTS.md
    commit: 65d768e4e2a7133b7bcddc4de3027259b4578d8a
  rule: 'ty source code must avoid `panic!`, `unreachable!`, and `.unwrap()` — encode constraints in the type system instead. The whole point of this PR is replacing an indexing operation that could panic with a structured iterator over already-paired entries; agent fixes that keep using `.unwrap()` or `.expect()` on `class_node.bases().get(i)` are accepted by the tests but violate this rule.

    '
- id: agent_config_let_chains
  source:
    path: AGENTS.md
    commit: 65d768e4e2a7133b7bcddc4de3027259b4578d8a
  rule: 'Prefer let chains (`if let` combined with `&&`) over nested `if let` statements. The PR diff itself flattens several nested `if let` blocks into let chains; the agent''s fix should follow that style where applicable.

    '
- id: agent_config_no_local_imports
  source:
    path: AGENTS.md
    commit: 65d768e4e2a7133b7bcddc4de3027259b4578d8a
  rule: 'Rust imports must always go at the top of the file, never locally inside functions.

    '
- id: agent_config_test_changes
  source:
    path: AGENTS.md
    commit: 65d768e4e2a7133b7bcddc4de3027259b4578d8a
  rule: 'All changes must be tested. The fix must add or update an mdtest case under `crates/ty_python_semantic/resources/mdtest/` that exercises the panic-triggering input.

    '
- id: agent_config_purposeful_comments
  source:
    path: AGENTS.md
    commit: 65d768e4e2a7133b7bcddc4de3027259b4578d8a
  rule: 'Comments should explain invariants or unusual decisions, not narrate what the code is doing.

    '
- id: agent_config_minimal_new_code
  source:
    path: AGENTS.md
    commit: 65d768e4e2a7133b7bcddc4de3027259b4578d8a
  rule: 'Avoid writing significant amounts of new code; prefer reusing existing utilities. The right fix here reuses the `expanded_class_base_entries` helper rather than introducing a parallel abstraction.

    '
