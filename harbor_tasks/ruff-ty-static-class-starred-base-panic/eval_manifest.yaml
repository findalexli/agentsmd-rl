- id: test_inherits_from_final_via_starred_tuple_no_panic
  type: fail_to_pass
  origin: pr_diff
  description: '`class X(*(int, bool)): ...` must not panic and must emit subclass-of-final-class.

    '
- id: test_inherits_from_final_via_named_starred_tuple_no_panic
  type: fail_to_pass
  origin: pr_diff
  description: 'Starred tuple via name binding (`final_bases = (int, bool); class X(*final_bases): ...`) must not panic and must emit subclass-of-final-class.

    '
- id: test_named_tuple_with_starred_bases_emits_invalid_named_tuple
  type: fail_to_pass
  origin: pr_diff
  description: '`class N(NamedTuple, *(int, str)): ...` must emit invalid-named-tuple on each unpacked extra base.

    '
- id: test_protocol_with_starred_bases_emits_invalid_protocol
  type: fail_to_pass
  origin: pr_diff
  description: '`class P(Protocol, *(int, str)): ...` must emit invalid-protocol on the unpacked non-protocol bases.

    '
- id: test_bare_generic_in_starred_tuple_emits_invalid_base
  type: fail_to_pass
  origin: pr_diff
  description: 'Bare `Generic` reached through a starred tuple base must emit invalid-base.

    '
