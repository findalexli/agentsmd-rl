rubric:
- rule: Add rubric rules section to CLAUDE.md or .github/copilot-instructions.md with coding standards and workflow guidelines
  source:
    path: .github/copilot-instructions.md
- rule: Work in `packages/*` for editor features
  source:
    path: CLAUDE.md
    lines: 13-13
  evidence: The fix for the arrow dragging behavior is implemented in `packages/element/src/binding.ts`,
    adhering to the rule to work in `packages/*` for editor features.
  category: architecture
- rule: Always run `yarn test:update` before committing
  source:
    path: CLAUDE.md
    lines: 15-15
  evidence: The gold solution updates test snapshots in `packages/excalidraw/tests/move.test.tsx`
    and `packages/excalidraw/tests/history.test.tsx`, reflecting the outcome of running
    `yarn test:update`.
  category: testing
- rule: 'Package Development: Work in `packages/*` for editor features'
  source:
    path: CLAUDE.md
    lines: 13-14
  evidence: The gold solution modifies `packages/element/src/binding.ts` to fix the
    arrow binding logic, correctly identifying it as an editor feature rather than
    an app-specific feature.
  category: architecture
- rule: 'Testing: Always run `yarn test:update` before committing (implies updating
    test snapshots/expectations when behavior changes)'
  source:
    path: CLAUDE.md
    lines: 15-16
  evidence: The gold solution updates test expectations in `packages/excalidraw/tests/move.test.tsx`
    and `packages/excalidraw/tests/history.test.tsx` to account for the new arrow
    coordinates, aligning with the in
  category: testing
distractors:
- rule: 'App Development: Work in `excalidraw-app/` for app-specific features'
  collision_type: architecture_boundary
  why_distracting: The agent might misinterpret arrow dragging as an app-specific
    interaction and attempt to implement the fix in the `excalidraw-app/` directory
    instead of the core `packages/element/` library.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 14-15
