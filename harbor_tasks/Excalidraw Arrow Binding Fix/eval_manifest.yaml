  - ui
  estimated_time: 30
distractors:
- rule: Work in `excalidraw-app/` for app-specific features
  collision_type: architecture_boundary
  why_distracting: The issue describes a 'jarring user experience' during drag operations,
    which an agent might misinterpret as an app-level interaction and attempt to fix
    in `excalidraw-app/` instead of the core `packages/element/` library.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 15-15
hierarchy_analysis: The configuration is flat with a single `CLAUDE.md` file at the
  root. The primary architectural boundary is between `packages/*` (core editor features)
  and `excalidraw-app/` (app-specific features). The agent must correctly identify
  arrow dragging as a core editor feature to apply the fix in the right package.
