rubric:
- rule: Prefer implementations without allocation where possible. Use efficient point
    comparison methods.
  source:
    path: .github/copilot-instructions.md
    lines: '13'
    commit: 60ab14c2f633112613843eec3c049f6da0f566e8
- rule: Use the Point type from packages/math/src/types.ts for math-related code instead
    of { x, y } objects.
  source:
    path: .github/copilot-instructions.md
    lines: '21'
    commit: 60ab14c2f633112613843eec3c049f6da0f566e8
- rule: Prefer immutable data (const, readonly) for variables that don't change.
  source:
    path: .github/copilot-instructions.md
    lines: '14'
    commit: 60ab14c2f633112613843eec3c049f6da0f566e8
- rule: Work in `packages/*` for editor features
  source:
    path: CLAUDE.md
    lines: 14-14
  evidence: The fix is implemented in `packages/element/src/binding.ts`, correctly
    targeting the core packages for an editor feature rather than the application
    layer.
  category: architecture
- rule: Always run `yarn test:update` before committing
  source:
    path: CLAUDE.md
    lines: 16-16
  evidence: The gold solution updates test expectations in `move.test.tsx` and `history.test.tsx`
    to account for the new arrow coordinates, which aligns with running `yarn test:update`
    to update snapshots and inl
  category: testing
distractors:
- rule: Work in `excalidraw-app/` for app-specific features
  collision_type: architecture_boundary
  why_distracting: The issue describes a 'jarring user experience' during drag operations,
    which an agent might misinterpret as an app-level interaction and attempt to fix
    in `excalidraw-app/` instead of the core `packages/element/` library.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 15-15
hierarchy_analysis: The configuration is flat with a single `CLAUDE.md` file at the
  root. The primary architectural boundary is between `packages/*` (core editor features)
  and `excalidraw-app/` (app-specific features). The agent must correctly identify
  arrow dragging as a core editor feature to apply the fix in the right package.
version: '2.0'
