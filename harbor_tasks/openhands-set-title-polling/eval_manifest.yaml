distractors:
- rule: When working on a PR that requires design documents, scripts meant for development-only,
    or other temporary artifacts that should NOT be merged to main, store them in
    a `.pr/` directory at the repository root.
  collision_type: scope_ambiguity
  why_distracting: The agent might waste time creating a `.pr/design.md` or `.pr/analysis.md`
    to document the new polling logic or the debugging of the title callback processor,
    which is overkill for a simple bug fix.
  severity: medium
  source:
    path: AGENTS.md
    lines: 36-37
- rule: 'To run the full application to debug issues: export INSTALL_DOCKER=0 ...
    make build && make run ...'
  collision_type: scope_ambiguity
  why_distracting: The agent might try to spin up the entire application (frontend
    and backend) using `make build && make run` to manually test the title polling,
    which is unnecessary and time-consuming since the issue is well-defined and covered
    by unit tests.
  severity: high
  source:
    path: AGENTS.md
    lines: 8-11
hierarchy_analysis: The repository has a single root-level `AGENTS.md` file. The rules
  are straightforward, but the agent must discern which rules apply to the current
  scope. The instructions for running the full application or creating `.pr/` artifacts
  are meant for larger features or complex debugging, not simple bug fixes with existing
  unit tests.
