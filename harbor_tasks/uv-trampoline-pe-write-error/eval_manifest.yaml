version: "2.0"

source:
  repo: "astral-sh/uv"
  pr: 18710
  base_commit: "8b1a15eae6aa51f25f7dfefd247d5592201b78a0"
  merge_commit: "8cdb2b087a40346336f47904d6ab406ea12b1c53"

checks:
  # --- fail_to_pass: core behavioral tests ---
  - id: write_resources_variant_exists
    type: fail_to_pass
    origin: pr_diff
    description: "Error enum has WriteResources struct variant with PathBuf and io::Error fields"

  - id: write_resources_has_source_attr
    type: fail_to_pass
    origin: pr_diff
    description: "WriteResources has #[source] attribute on the io::Error field"

  - id: error_display_includes_path
    type: fail_to_pass
    origin: pr_diff
    description: "#[error(...)] for WriteResources references the file path"

  - id: write_resources_used_in_function
    type: fail_to_pass
    origin: pr_diff
    description: "write_resources maps errors to WriteResources, not Error::Io"

  - id: write_resources_captures_path
    type: fail_to_pass
    origin: pr_diff
    description: "WriteResources construction captures the path parameter"

  # --- pass_to_pass: regression checks ---
  - id: original_variants_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "Original Error enum variants (Io, InvalidPath, etc.) still present"

  - id: write_resources_signature_unchanged
    type: pass_to_pass
    origin: pr_diff
    description: "write_resources function signature takes path: &Path"

  - id: resource_too_large_still_used
    type: pass_to_pass
    origin: pr_diff
    description: "ResourceTooLarge error still used inside write_resources"

  # --- pass_to_pass: agent config checks ---
  - id: no_unwrap_panic_in_write_resources
    type: pass_to_pass
    origin: agent_config
    description: "No unwrap/panic/unreachable/unsafe-without-SAFETY in write_resources"
    source:
      path: "CLAUDE.md"
      lines: "7,9"
      commit: "8b1a15eae6aa51f25f7dfefd247d5592201b78a0"

  - id: no_new_allow_clippy
    type: pass_to_pass
    origin: agent_config
    description: "No new #[allow(clippy::...)] — use #[expect()] instead"
    source:
      path: "CLAUDE.md"
      lines: "7,10"
      commit: "8b1a15eae6aa51f25f7dfefd247d5592201b78a0"

  - id: simplified_import_top_level
    type: pass_to_pass
    origin: agent_config
    description: "Simplified trait imported at top level if used"
    source:
      path: "CLAUDE.md"
      lines: "16"
      commit: "8b1a15eae6aa51f25f7dfefd247d5592201b78a0"

rubric:
  - rule: "PREFER patterns like `if let` to handle fallibility"
    source:
      path: "CLAUDE.md"
      lines: "8"
      commit: "8b1a15eae6aa51f25f7dfefd247d5592201b78a0"

  - rule: "PREFER let chains (`if let` combined with `&&`) over nested `if let` statements"
    source:
      path: "CLAUDE.md"
      lines: "11"
      commit: "8b1a15eae6aa51f25f7dfefd247d5592201b78a0"

  - rule: "AVOID shortening variable names, e.g., use `version` instead of `ver`, and `requires_python` instead of `rp`"
    source:
      path: "CLAUDE.md"
      lines: "17-18"
      commit: "8b1a15eae6aa51f25f7dfefd247d5592201b78a0"

  - rule: "PREFER [`TypeName`] references when writing Rust doc comments"
    source:
      path: "CLAUDE.md"
      lines: "19"
      commit: "8b1a15eae6aa51f25f7dfefd247d5592201b78a0"
