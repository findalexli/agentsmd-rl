task:
  name: prisma-datetime-cursor
  language: typescript
  primary_file: packages/client-engine-runtime/src/interpreter/render-query.ts
checks:
- id: test_datetime_placeholder_string_resolves_to_date
  type: fail_to_pass
  origin: repo_tests
  description: 'evaluateArg() must coerce a DateTime placeholder whose scope-bound value is a string into a JS Date object. The base implementation returned the string as-is, which broke cursor pagination against DATE-typed columns because the pagination layer compared the cursor value against a database-side Date using strict equality.

    '
- id: test_array_of_datetime_placeholders_resolves_elementwise
  type: fail_to_pass
  origin: repo_tests
  description: 'When the argument to evaluateArg is an array of DateTime placeholders, each element must be resolved to a Date instance.

    '
- id: test_renderquery_binds_datetime_placeholder_as_date
  type: fail_to_pass
  origin: repo_tests
  description: 'End-to-end through renderQuery, a DateTime placeholder bound to a string in scope yields a Date object in the rendered SQL args list.

    '
- id: test_datetime_placeholder_existing_date_passthrough
  type: pass_to_pass
  origin: repo_tests
  description: 'Solution-uniqueness guard: a DateTime placeholder whose scope value is already a Date must continue to resolve to that Date unchanged.

    '
- id: test_non_datetime_placeholder_values_unchanged
  type: pass_to_pass
  origin: repo_tests
  description: 'Solution-uniqueness guard: only DateTime triggers coercion. Strings, ints, and booleans bound by non-DateTime placeholders pass through unchanged. Catches over-eager fixes that convert every placeholder.

    '
- id: test_existing_render_query_tests_still_pass
  type: pass_to_pass
  origin: repo_tests
  description: Existing render-query.test.ts continues to pass.
- id: test_full_client_engine_runtime_test_suite_passes
  type: pass_to_pass
  origin: repo_tests
  description: Full @prisma/client-engine-runtime vitest suite passes.
- id: test_client_engine_runtime_builds
  type: pass_to_pass
  origin: repo_tests
  description: client-engine-runtime builds cleanly via the package's `build` script.
- id: test_render_query_no_what_inline_comments
  type: pass_to_pass
  origin: agent_config
  description: 'Coding convention from AGENTS.md: avoid inline comments that describe WHAT the code does. Comments must answer WHY.

    '
