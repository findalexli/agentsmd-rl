version: "2.0"

source:
  repo: "huggingface/transformers"
  pr: 44797
  base_commit: "a269c990e8571d9b9f8adfc1add9472eec3f252d"
  merge_commit: "e6ed96c7e93a6408a151e3177793212b02b8bb53"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Both modified files must parse without errors"

  - id: fa4_in_fallback_dict
    type: fail_to_pass
    origin: pr_diff
    description: "FLASH_ATTN_KERNEL_FALLBACK contains flash_attention_4 entry"

  - id: fa4_fallback_value_format
    type: fail_to_pass
    origin: pr_diff
    description: "FA4 fallback value is a kernels-community package with FA-related name"

  - id: fa4_not_skipped_in_loop
    type: fail_to_pass
    origin: pr_diff
    description: "Fallback loop in _check_and_adjust_attn_implementation does not skip version 4"

  - id: fa2_fa3_entries_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "FA2 and FA3 kernel fallback entries remain unchanged"

  - id: compat_matrix_has_all_versions
    type: pass_to_pass
    origin: pr_diff
    description: "FLASH_ATTENTION_COMPATIBILITY_MATRIX includes versions 2, 3, and 4"

  - id: repo_ruff_format
    type: pass_to_pass
    origin: repo_tests
    description: "ruff format check passes on modified files"

  - id: repo_check_copies
    type: pass_to_pass
    origin: repo_tests
    description: "check_copies.py validates # Copied from blocks are consistent"

  - id: repo_check_dummies
    type: pass_to_pass
    origin: repo_tests
    description: "check_dummies.py validates dummy objects for optional dependencies"

  - id: repo_check_doc_toc
    type: pass_to_pass
    origin: repo_tests
    description: "check_doc_toc.py validates documentation structure"

  - id: repo_check_inits
    type: pass_to_pass
    origin: repo_tests
    description: "check_inits.py validates __init__.py files expose public APIs correctly"

  - id: ruff_check
    type: pass_to_pass
    origin: agent_config
    description: "ruff check passes on modified files"
    source:
      path: "CLAUDE.md"
      lines: "2"
      commit: "a269c990e8571d9b9f8adfc1add9472eec3f252d"

  - id: minimal_diff
    type: pass_to_pass
    origin: agent_config
    description: "Diff touches at most 3 files"
    source:
      path: ".github/copilot-instructions.md"
      lines: "15"
      commit: "a269c990e8571d9b9f8adfc1add9472eec3f252d"

  - id: no_copied_from_edits
    type: pass_to_pass
    origin: agent_config
    description: "Diff does not modify lines inside a '# Copied from' block"
    source:
      path: "CLAUDE.md"
      lines: "66"
      commit: "a269c990e8571d9b9f8adfc1add9472eec3f252d"

  - id: no_modular_file_edits
    type: pass_to_pass
    origin: agent_config
    description: "Changed files are not auto-generated from modular files"
    source:
      path: "CLAUDE.md"
      lines: "67"
      commit: "a269c990e8571d9b9f8adfc1add9472eec3f252d"

rubric:
  - rule: "PRs should be as brief as possible. Bugfix PRs can often be only one or two lines long. Aim to minimize the size of the diff."
    source:
      path: ".github/copilot-instructions.md"
      lines: "15"
      commit: "a269c990e8571d9b9f8adfc1add9472eec3f252d"
