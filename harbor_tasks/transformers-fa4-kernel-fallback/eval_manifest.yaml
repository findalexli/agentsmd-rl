    lines: 62-67
  evidence: The gold solution modifies the shared utility files (`modeling_utils.py`
    and `modeling_flash_attention_utils.py`) to implement the fallback logic globally,
    rather than attempting to modify model-speci
  category: architecture
distractors:
- rule: If coordination evidence cannot be found, do not proceed to PR-ready output.
  collision_type: meta_confusion
  why_distracting: In an automated evaluation environment, the agent is given a bug
    report and expected to produce a patch autonomously. There is no human to coordinate
    with and no issue thread provided. If the agent follows this 'fail-closed' rule
    strictly, it will refuse to output the patch and instead output a message asking
    for coordination evidence.
  severity: high
  source:
    path: CLAUDE.md
    lines: 57-60
- rule: 'Pure code-agent PRs are not allowed: a human submitter must understand and
    be able to defend the change end-to-end. Do not raise PRs without human validation.'
  collision_type: meta_confusion
  why_distracting: The rule explicitly forbids 'pure code-agent PRs' and mandates
    human validation. An autonomous agent in a benchmark might read this and halt
    execution, stating it needs a human to validate the changes before it can output
    the patch.
  severity: high
  source:
    path: CLAUDE.md
    lines: 46-55
- rule: Do not open one-off PRs for tiny edits (single typo, isolated lint cleanup,
    one mutable default argument, etc.).
  collision_type: scope_ambiguity
  why_distracting: The bug fix requires changing only 4 lines of code (removing a
    3-line `continue` block and adding a 1-line dictionary entry). An agent might
    misinterpret this small diff as a 'tiny edit' or 'low-value busywork' and refuse
    to fix it, even though it resolves a legitimate feature fallback bug.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 42-44
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` contain identical rules at the
  root level. The rules are heavily focused on the PR submission process, human accountability,
  and preventing spam. There are no conflicting rules between the files, but the entire
  ruleset is highly restrictive for autonomous agents.
