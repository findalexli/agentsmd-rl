task_name: selenium-cdp-domain-lifecycle
source:
  pr: "https://github.com/SeleniumHQ/selenium/pull/17305"
  merge_commit: "1d58a30530101d6ff84ecabb4422ac3078f8e40d"
  base_commit: "e78c3900fdef5d729cc3a24cfc7e2e7ea3421de4"
  description: "Fix domain lifecycle in CDP adapters by implementing lazy initialization"

# Fail-to-pass tests: These verify the fix works correctly
checks:
  # V143Domains checks
  - id: test_v143domains_has_lazy_fields
    type: fail_to_pass
    description: "V143Domains has Lazy<T> fields for network, javaScript, target, log"

  - id: test_v143domains_lazy_initialized_in_constructor
    type: fail_to_pass
    description: "V143Domains constructor initializes Lazy fields with correct factory lambdas"

  - id: test_v143domains_properties_return_lazy_value
    type: fail_to_pass
    description: "V143Domains properties return cached Lazy value instead of new instances"

  # V144Domains checks
  - id: test_v144domains_has_lazy_fields
    type: fail_to_pass
    description: "V144Domains has Lazy<T> fields for network, javaScript, target, log"

  - id: test_v144domains_lazy_initialized_in_constructor
    type: fail_to_pass
    description: "V144Domains constructor initializes Lazy fields with correct factory lambdas"

  - id: test_v144domains_properties_return_lazy_value
    type: fail_to_pass
    description: "V144Domains properties return cached Lazy value instead of new instances"

  # V145Domains checks
  - id: test_v145domains_has_lazy_fields
    type: fail_to_pass
    description: "V145Domains has Lazy<T> fields for network, javaScript, target, log"

  - id: test_v145domains_lazy_initialized_in_constructor
    type: fail_to_pass
    description: "V145Domains constructor initializes Lazy fields with correct factory lambdas"

  - id: test_v145domains_properties_return_lazy_value
    type: fail_to_pass
    description: "V145Domains properties return cached Lazy value instead of new instances"

  # Test file check
  - id: test_devtools_domains_tests_file_exists
    type: fail_to_pass
    description: "DevToolsDomainsTests.cs test file exists with proper content"

  # Pass-to-pass: Repo CI tests using subprocess.run()
  - id: test_repo_bazel_build_webdriver
    type: pass_to_pass
    origin: repo_tests
    description: "Bazel build of dotnet webdriver passes"

  - id: test_repo_bazel_build_devtools
    type: pass_to_pass
    origin: repo_tests
    description: "Bazel build of DevTools module passes"

  # Pass-to-pass: Static file content checks
  - id: test_cs_files_balanced_braces
    type: pass_to_pass
    origin: static
    description: "C# source files have balanced braces"

  - id: test_cs_files_valid_identifiers
    type: pass_to_pass
    origin: static
    description: "C# source files use valid C# identifiers"

  - id: test_cs_files_no_syntax_errors
    type: pass_to_pass
    origin: static
    description: "C# source files have no obvious syntax errors"

# Agent config rules (from dotnet/AGENTS.md)
# These are programmatically checkable
agent_config:
  - rule: "Use XML documentation comments for public APIs"
    source: "dotnet/AGENTS.md"
    file_pattern: "dotnet/src/webdriver/DevTools/**/*.cs"

  - rule: "The codebase is migrating to async - use async patterns where applicable"
    source: "dotnet/AGENTS.md"
    file_pattern: "dotnet/src/webdriver/DevTools/**/*.cs"

  - rule: "Avoid repo-wide refactors/formatting; prefer small, reversible diffs"
    source: "AGENTS.md"

  - rule: "Use targeted Bazel commands; use bazel query to locate labels before build/test"
    source: "AGENTS.md"

# Rubric for soft/subjective rules (LLM-judged)
rubric:
  - rule: "Comments should explain *why*, not *what* - prefer well-named methods over comments that narrate code"
    source:
      path: "AGENTS.md"
      lines: "70"
      commit: "e78c3900fdef5d729cc3a24cfc7e2e7ea3421de4"

  - rule: "Use NUnit constraint-style assertions (Assert.That(x, Is.SameAs(y))) in test code"
    source:
      path: "dotnet/AGENTS.md"
      lines: "12"
      commit: "e78c3900fdef5d729cc3a24cfc7e2e7ea3421de4"

  - rule: "Follow existing field naming conventions: use 'this.' prefix for instance fields and camelCase naming"
    source:
      path: "dotnet/src/webdriver/DevTools/v143/V143Domains.cs"
      lines: "22-25"
      commit: "e78c3900fdef5d729cc3a24cfc7e2e7ea3421de4"
