task_name: selenium-cdp-domain-lifecycle
source:
  pr: "https://github.com/SeleniumHQ/selenium/pull/17305"
  merge_commit: "1d58a30530101d6ff84ecabb4422ac3078f8e40d"
  base_commit: "e78c3900fdef5d729cc3a24cfc7e2e7ea3421de4"
  description: "Fix domain lifecycle in CDP adapters by implementing lazy initialization"

# Fail-to-pass tests: These verify the fix works correctly
checks:
  # V143Domains checks
  - id: test_v143domains_has_lazy_fields
    type: fail_to_pass
    description: "V143Domains has Lazy<T> fields for network, javaScript, target, log"

  - id: test_v143domains_lazy_initialized_in_constructor
    type: fail_to_pass
    description: "V143Domains constructor initializes Lazy fields with correct factory lambdas"

  - id: test_v143domains_properties_return_lazy_value
    type: fail_to_pass
    description: "V143Domains properties return cached Lazy value instead of new instances"

  # V144Domains checks
  - id: test_v144domains_has_lazy_fields
    type: fail_to_pass
    description: "V144Domains has Lazy<T> fields for network, javaScript, target, log"

  - id: test_v144domains_lazy_initialized_in_constructor
    type: fail_to_pass
    description: "V144Domains constructor initializes Lazy fields with correct factory lambdas"

  - id: test_v144domains_properties_return_lazy_value
    type: fail_to_pass
    description: "V144Domains properties return cached Lazy value instead of new instances"

  # V145Domains checks
  - id: test_v145domains_has_lazy_fields
    type: fail_to_pass
    description: "V145Domains has Lazy<T> fields for network, javaScript, target, log"

  - id: test_v145domains_lazy_initialized_in_constructor
    type: fail_to_pass
    description: "V145Domains constructor initializes Lazy fields with correct factory lambdas"

  - id: test_v145domains_properties_return_lazy_value
    type: fail_to_pass
    description: "V145Domains properties return cached Lazy value instead of new instances"

  # Test file check
  - id: test_devtools_domains_tests_file_exists
    type: fail_to_pass
    description: "DevToolsDomainsTests.cs test file exists with proper content"

  # Pass-to-pass: Syntax check
  - id: test_dotnet_syntax_valid
    type: pass_to_pass
    origin: repo_tests
    description: "C# source files have valid syntax with proper type consistency"

