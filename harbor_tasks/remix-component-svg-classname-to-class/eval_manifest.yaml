rubric:
- id: imports_use_type_keyword
  source:
    commit: 1a2974fa4d1787844cfa6881bb10659f18850675
    path: AGENTS.md
  rule: 'Type-only imports must use `import type { X }` syntax (separate from

    value imports). Type-only exports must use `export type { X }`.

    Source ref: AGENTS.md "Code Style > Imports".

    '
- id: prefer_let_for_locals
  source:
    commit: 1a2974fa4d1787844cfa6881bb10659f18850675
    path: AGENTS.md
  rule: 'Use `let` for local variables. `const` only at module scope. Never

    `var`.

    Source ref: AGENTS.md "Code Style > Variables".

    '
- id: no_loops_in_test_describe_blocks
  source:
    commit: 1a2974fa4d1787844cfa6881bb10659f18850675
    path: AGENTS.md
  rule: 'Tests must not generate cases via `for` loops or `if/switch` inside

    `describe()` blocks. This breaks IDE per-test running.

    Source ref: AGENTS.md "Test Structure".

    '
- id: comments_only_when_non_obvious
  source:
    commit: 1a2974fa4d1787844cfa6881bb10659f18850675
    path: AGENTS.md
  rule: 'Only add non-JSDoc comments when the code is doing something

    surprising or non-obvious. Trivial restating of code as a comment

    should be avoided.

    Source ref: AGENTS.md "Code Style > Comments".

    '
- id: change_file_present_for_user_facing_fix
  source:
    commit: 1a2974fa4d1787844cfa6881bb10659f18850675
    path: AGENTS.md
  rule: 'A user-facing bug fix in a published package must include a change

    file at `packages/<pkg>/.changes/patch.<short-description>.md`

    describing the fix. The component package is at v0.x but bug fixes

    in v0.x packages should still use a `patch.*.md` change file.

    Source refs: AGENTS.md "Changes and Releases > Adding changes" and

    "Versioning > For v0.x packages".

    '
- id: do_not_edit_published_changelog
  source:
    commit: 1a2974fa4d1787844cfa6881bb10659f18850675
    path: AGENTS.md
  rule: 'Do not modify existing entries in `packages/component/CHANGELOG.md`

    (those are for already-released versions). New work goes through a

    change file only.

    Source ref: AGENTS.md "Changes and Releases > Do not edit past

    changelogs".

    '
- id: prettier_formatting
  source:
    commit: 1a2974fa4d1787844cfa6881bb10659f18850675
    path: AGENTS.md
  rule: 'Code must match the repo''s Prettier configuration (printWidth: 100,

    no semicolons, single quotes, 2-space indent). New/changed lines

    should produce no diff under `pnpm run format:check`.

    Source ref: AGENTS.md "Code Style > Formatting".

    '
