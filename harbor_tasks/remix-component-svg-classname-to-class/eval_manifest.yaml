checks:
- id: test_ssr_svg_classname_renders_as_class
  type: fail_to_pass
  origin: pr_diff
  description: '`<svg className="icon">` rendered via renderToStream must produce

    class="icon" (and never class-name="icon" or classname="icon").

    '
- id: test_ssr_svg_classname_full_expected_output
  type: fail_to_pass
  origin: pr_diff
  description: 'End-to-end SSR output for the canonical SVG icon snippet matches the

    exact expected HTML string from the upstream regression test.

    '
- id: test_ssr_html_classname_still_renders_as_class
  type: pass_to_pass
  origin: pr_diff
  description: 'Non-SVG elements (HTML) continue to map className -> class. Guards

    against the agent breaking the existing HTML mapping while fixing

    the SVG one (e.g., by simply deleting the rule from inside the

    `!isSvg` block without re-adding it above).

    '
- id: test_vdom_svg_classname_sets_class_attribute
  type: fail_to_pass
  origin: pr_diff
  description: 'In the VDOM diff path, rendering an SVG element with `className`

    must call setAttribute(''class'', value) on the SVGElement, not

    ''class-name'' (camelToKebab fallback).

    '
