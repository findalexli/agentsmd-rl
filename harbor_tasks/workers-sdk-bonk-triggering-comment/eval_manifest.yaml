config_edits:
- path: .opencode/agents/bonk.md
  tier: 1
  gold_added: "- **Triggering comment is the task:** The comment that invoked you (`/bonk` or `@ask-bonk`) is your primary instruction. Read it first, before reading the PR description or any other context. Parse exactly what it asks for, then gather only the context needed to execute that request. Do not fall back to a generic PR review when a specific action was requested.\n- **No re-reviewing on fixup requests:** If you previously reviewed the PR and the maintainer now asks you to fix something, do not review again. Act on the specific request in the triggering comment.\n1. **Start from the triggering comment.** Parse what it asks for. Identify the concrete action(s) requested — e.g., \"fix the formatting\", \"address the review comments\", \"add a changeset\". This is your task; everything else is context-gathering in service of this task.\n2. **Gather only the context you need** to execute the task identified in step 1:\n   - If the triggering comment references review feedback, read the existing review comments and inline comments (`gh api repos/cloudflare/workers-sdk/pulls/$PR_NUMBER/comments`).\n   - If the request is self-contained (e.g., \"run the formatter\"), you may not need to read the full PR at all.\n   - On issues: read the body and relevant comments for reproduction details.\n9. **Make the requested change directly.** Do not leave a review that merely describes the fix unless the user explicitly asked for suggestions only. Do not re-review the PR when the request is to fix something.\nNegative examples:\n- Trigger: \"/bonk fix the formatting in this PR and commit the result\" (after Bonk already reviewed the PR)\n  Incorrect behavior: ignoring the triggering comment, performing a second full review, approving the PR, and posting new review comments. The maintainer asked for a code change and a commit, not another review.\n  Correct behavior: read the triggering comment, run the formatter (`pnpm prettify` or `pnpm check`), commit the result, and push.\n- Trigger: \"/bonk address the review comments\" (on a PR Bonk previously reviewed)\n  Incorrect behavior: re-reviewing the PR and restating the same findings.\n  Correct behavior: read Bonk's own prior review comments, fix each one in code, commit, and push.\n"
  gold_removed: '1. Read the full issue or PR first. On issues: read the body and all comments. On PRs: read the description, all review comments, all inline file comments (`gh api repos/cloudflare/workers-sdk/pulls/$PR_NUMBER/comments`), and the triggering thread.

    8. Make the requested change directly. Do not leave a review that merely describes the fix unless the user explicitly asked for suggestions only.

    Negative example:

    '
- path: .github/workflows/bonk.yml
  tier: 2
  gold_added: "- name: Build prompt with triggering comment\n  id: prompt\n  run: |\n    {\n      DELIMITER=$(openssl rand -hex 16)\n      echo \"value<<$DELIMITER\"\n      echo \"You were invoked by @${{ github.event.comment.user.login }} on ${{ github.event.comment.html_url }}\"\n      echo \"\"\n      echo \"Their comment:\"\n      echo '```'\n      echo \"$COMMENT_BODY\"\n      echo '```'\n      echo \"\"\n      echo \"This is your task. Read it carefully and act on it.\"\n      echo \"$DELIMITER\"\n    } >> \"$GITHUB_OUTPUT\"\n  env:\n    COMMENT_BODY: ${{ github.event.comment.body }}\nprompt: ${{ steps.prompt.outputs.value }}\n"
  gold_removed: ''
rubric:
- rule: 'Use `pnpm` for any Node.js package operations; never use `npm` or

    `yarn`. The example commands referenced in the new negative

    examples (e.g., `pnpm prettify`, `pnpm check`) must use pnpm.

    '
  source:
    path: AGENTS.md
    lines: '13'
    commit: ad6799bd48742f0a589ed5867b269055015e4293
  evidence: 'The new negative example uses `pnpm prettify` and `pnpm check`,

    consistent with the AGENTS.md rule "Use `pnpm` - never use npm or

    yarn".

    '
  category: tooling
  verification: programmatic
  check_cmd: "grep -q \"pnpm\" /workspace/workers-sdk/.opencode/agents/bonk.md \\\n  && ! grep -E \"(npm install|yarn (install|add))\" /workspace/workers-sdk/.opencode/agents/bonk.md\n"
- rule: 'In GitHub Actions workflow steps, never interpolate

    `${{ github.event.* }}` user-controlled strings directly into a

    shell `run:` block — pass them through `env:` and reference the

    env var instead, to avoid shell-injection.

    '
  source:
    path: AGENTS.md
    lines: 108-110
    commit: ad6799bd48742f0a589ed5867b269055015e4293
  evidence: 'The new build-prompt step in `bonk.yml` uses

    `COMMENT_BODY: ${{ github.event.comment.body }}` under `env:` and

    references `$COMMENT_BODY` from the shell, mirroring the repo''s

    no-unsafe-command-execution stance from AGENTS.md.

    '
  category: security
  verification: programmatic
  check_cmd: 'python3 -c "

    import yaml, sys

    doc = yaml.safe_load(open(''/workspace/workers-sdk/.github/workflows/bonk.yml'').read())

    step = next((s for s in doc[''jobs''][''bonk''][''steps''] if s.get(''name'') == ''Build prompt with triggering comment''), None)

    assert step is not None

    env = step.get(''env'') or {}

    assert ''COMMENT_BODY'' in env

    run_block = step.get(''run'', '''')

    # The raw expression must NOT appear inside the run script.

    assert ''github.event.comment.body'' not in run_block

    sys.exit(0)

    "

    '
- rule: 'Implementation-mode workflow steps in `.opencode/agents/bonk.md`

    should reflect the action-bias rule: maintainers asking Bonk to

    fix something want code changes pushed, not another review. Step 1

    should start from the triggering comment (the maintainer''s

    explicit ask), not from a generic full-context read of the PR.

    '
  source:
    path: .opencode/agents/bonk.md
    lines: 16-27
    commit: ad6799bd48742f0a589ed5867b269055015e4293
  evidence: 'The new step 1 in <implementation> reads

    "Start from the triggering comment. Parse what it asks for…"

    enforcing the existing action-bias non-negotiable rule.

    '
  category: agent-behavior
  verification: semantic_diff
- rule: 'Negative examples in `<examples>` must be specific, including the

    exact trigger comment that produced the failure and the incorrect

    behavior observed, so that Bonk can pattern-match against the

    observed failure mode rather than against a paraphrased summary.

    '
  source:
    path: .opencode/agents/bonk.md
    lines: 154-189
    commit: ad6799bd48742f0a589ed5867b269055015e4293
  evidence: 'The new negative examples include the exact trigger

    `/bonk address the review comments` and frame the context as

    "on a PR Bonk previously reviewed", matching the observed PR #13056

    failure mode.

    '
  category: agent-behavior
  verification: semantic_diff
