rubric:
- rule: Follow existing code style — check neighboring files for patterns
  source:
    path: CLAUDE.md
    lines: '203'
    commit: a14a89ca953910e89697895dfdfb4cdf4c90a151
config_edits:
- path: CONTRIBUTING.md
  tier: 2
  gold_added: '# Build bun with the local JSC build — this automatically configures
    and builds JSC

    `bun run build:local` handles everything: configuring JSC, building JSC, and building
    Bun. On subsequent runs, JSC will incrementally rebuild if any WebKit sources
    changed. `ninja -Cbuild/debug-local` also works after the first build, and will
    build Bun+JSC.


    The build output goes to `./build/debug-local` (instead of `./build/debug`), so
    you''ll need to update a couple of places:

    Note that if you make changes to our [WebKit fork](https://github.com/oven-sh/WebKit),
    you will also have to change [`SetupWebKit.cmake`](/cmake/tools/SetupWebKit.cmake)
    to point to the commit hash.'
  gold_removed: '# Make a debug build of JSC. This will output build artifacts in
    ./vendor/WebKit/WebKitBuild/Debug

    # Optionally, you can use `bun run jsc:build` for a release build

    $ bun run jsc:build:debug && rm vendor/WebKit/WebKitBuild/Debug/JavaScriptCore/DerivedSources/inspector/InspectorProtocolObjects.h


    # After an initial run of `make jsc-debug`, you can rebuild JSC with:

    $ cmake --build vendor/WebKit/WebKitBuild/Debug --target jsc && rm vendor/WebKit/WebKitBuild/Debug/JavaScriptCore/DerivedSources/inspector/InspectorProtocolObjects.h


    # Build bun with the local JSC build

    Using `bun run build:local` will build Bun in the `./build/debug-local` directory
    (instead of `./build/debug`), you''ll have to change a couple of places to use
    this new directory:

    Note that if you change make changes to our [WebKit fork](https://github.com/oven-sh/WebKit),
    you will also have to change [`SetupWebKit.cmake`](/cmake/tools/SetupWebKit.cmake)
    to point to the commit hash.'
distractors:
- rule: 'Build Bun: `bun bd` - Creates a debug build at `./build/debug/bun-debug`'
  collision_type: scope_ambiguity
  why_distracting: The config states that the standard way to build Bun is `bun bd`
    which outputs to `./build/debug`. The agent might try to unify `build:local` with
    `bun bd` or modify `AGENTS.md` to reflect the new local JSC build process, but
    the instructions specifically scope the documentation changes to `CONTRIBUTING.md`
    and `docs/project/contributing.mdx`.
  severity: high
  source:
    path: AGENTS.md
    lines: 6-8
- rule: 'Test Organization: Place tests in specific directories based on the feature
    or issue.'
  collision_type: scope_ambiguity
  why_distracting: The config provides detailed instructions on how to write and organize
    tests. The agent might assume it needs to write a test for the new build process,
    but build system changes (CMake) typically don't have JS tests in this repo.
  severity: low
  source:
    path: AGENTS.md
    lines: 20-22
- rule: Never use `bun test` or `bun <file>` directly
  source:
    path: /workspace/repo/CLAUDE.md
    lines: '200'
  source_text: 1. **Never use `bun test` or `bun <file>` directly** - always use `bun
    bd test` or `bun bd <command>`. `bun bd` compiles & runs the debug build.
  collision_type: scope_ambiguity
  why_distracting: An agent might incorrectly change `bun run build:local` (which
    is correct for building Bun itself via package.json scripts) to `bun bd build:local`,
    misapplying this development loop command to the initial build setup instructions.
  severity: medium
- rule: All changes must be tested
  source:
    path: /workspace/repo/CLAUDE.md
    lines: '201'
  source_text: 2. **All changes must be tested** - if you're not testing your changes,
    you're not done.
  collision_type: architecture_boundary
  why_distracting: The gold diff modifies CMake configuration files which are not
    tested via the standard `bun:test` runner. An agent might waste effort trying
    to add an unnecessary `.test.ts` file for this build system logic.
  severity: low
- rule: Use absolute paths in file operations
  source:
    path: /workspace/repo/CLAUDE.md
    lines: '205'
  source_text: 6. **Use absolute paths** - Always use absolute paths in file operations
  collision_type: scope_ambiguity
  why_distracting: An agent might incorrectly apply this to the markdown changes (where
    relative paths like `./build/debug-local` are appropriate) instead of keeping
    it scoped to Zig/TS runtime file I/O operations.
  severity: low
- rule: Avoid shell commands
  source:
    path: /workspace/repo/CLAUDE.md
    lines: '206'
  source_text: 7. **Avoid shell commands** - Don't use `find` or `grep` in tests;
    use Bun's Glob and built-in tools
  collision_type: scope_ambiguity
  why_distracting: The gold diff uses `powershell` as a shell command within CMake
    `execute_process`. An agent might think this violates the rule, not realizing
    the rule is specifically scoped to JS tests.
  severity: medium
- rule: Run `bun run zig:check-all` on platform-specific changes
  source:
    path: /workspace/repo/CLAUDE.md
    lines: '208'
  source_text: 9. **Cross-platform** - Run `bun run zig:check-all` to compile the
    Zig code on all platforms when making platform-specific changes
  collision_type: scope_ambiguity
  why_distracting: The diff adds Windows-specific logic (`if(WIN32)`) in CMake, which
    is a platform-specific change. An agent might unnecessarily try to run `zig:check-all`,
    which only applies to Zig source code, not CMake build configurations.
  severity: low
hierarchy_analysis: The config files provide general repository instructions (`bun
  bd`), but the PR is specifically about modifying the build system for a specialized
  local JSC build (`build:local`). The agent must recognize that the general build
  instructions do not apply to this specific CMake target and documentation update.
