  source_text: '- **Conciseness:** Aim for one idea per sentence. Keep sentences short.'
  evidence: 'The diff splits a longer sentence about ChangeDetectionStrategy.OnPush into two shorter, more concise sentences: ''...is the default strategy (since v22). This mode reduces the amount of checking...'''
