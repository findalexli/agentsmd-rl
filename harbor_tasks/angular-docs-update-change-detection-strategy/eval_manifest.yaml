  verification: llm_judge
- rule: 'Code formatting: Use code font for code-related text (filenames, variables, commands).'
  source:
    path: .agent/skills/adev-writing-guide/SKILL.md
    lines: 42-43
  evidence: The gold solution wraps the strategy names `Eager` and `OnPush` in backticks within the markdown text.
