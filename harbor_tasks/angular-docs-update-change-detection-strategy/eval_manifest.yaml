config_edits:
- path: adev/src/content/tutorials/signals/steps/1-creating-your-first-signal/README.md
  tier: 2
  gold_added: ''
  gold_removed: '<docs-callout helpful title="About ChangeDetectionStrategy.OnPush">


    You might notice `ChangeDetectionStrategy.OnPush` in the component decorator throughout this tutorial. This is a performance optimization for Angular components that use signals. For now, you can safely ignore it—just know it helps your app run faster when using signals! You can learn more in the [change detection strategies API docs](/api/core/ChangeDetectionStrategy).


    </docs-callout>'
- path: adev/src/context/angular-20.mdc
  tier: 1
  gold_added: ''
  gold_removed: '* **`ChangeDetectionStrategy.OnPush`:** Always set `changeDetection: ChangeDetectionStrategy.OnPush` in the `@Component` decorator for performance benefits by reducing unnecessary change detection cycles.'
distractors:
- rule: 'Testing - Zoneless & Async-First: ALWAYS use the ''Act, Wait, Assert'' pattern'
  collision_type: scope_ambiguity
  why_distracting: The agent might try to write or update tests for the change detection strategy using the zoneless testing rules, but this PR is strictly a documentation, JSDoc, and configuration update.
  severity: low
  source:
    path: AGENTS.md
    lines: 15-25
- rule: 'Strategies: Default: Checks everything. OnPush: Checks only if inputs change, events fire, or signals update.'
  source:
    path: .agent/skills/reference-core/SKILL.md
    lines: 56-59
  collision_type: rule_conflict
  why_distracting: The skill document states that 'Default' checks everything and 'OnPush' is a specific strategy. The PR instruction explicitly changes this mental model so that OnPush is the default and the old Default is now Eager. Following the skill document would contradict the PR instruction.
  severity: high
hierarchy_analysis: The agent is instructed to modify its own configuration files (e.g., `adev/src/context/angular-20.mdc`, `adev/src/context/airules.md`) to remove outdated instructions about `OnPush`. This is a highly meta-referential task where the agent must understand that the instructions it usually follows are the target of the modification.
