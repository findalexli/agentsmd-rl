    lines: 38-38
  source_text: '- **Code formatting:** Use code font for code-related text (filenames, variables, commands).'
  evidence: The diff applies backticks to format the code-related term 'Eager' as code font, changing 'default change detection' to '`Eager` change detection' and 'without `OnPush` strategy' to 'with the `Eager` strategy'.
