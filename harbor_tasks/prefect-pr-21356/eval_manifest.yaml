version: 1

pr:
  owner: prefecthq
  repo: prefect
  number: 21356
  title: "Fix deploy pull step for custom Docker images without build step"
  base_commit: 2a145258b1e6ece42efa8fbbe8bc1a190b7cd1f0
  merge_commit: 5d6c8b414284806d14c9494c1a02da9b995f922b

target_file: src/prefect/cli/deploy/_actions.py

agent_configs:
  - file: AGENTS.md
    source: prefecthq/prefect/AGENTS.md@2a145258b1e6ece42efa8fbbe8bc1a190b7cd1f0
  - file: src/prefect/cli/AGENTS.md
    source: prefecthq/prefect/src/prefect/cli/AGENTS.md@2a145258b1e6ece42efa8fbbe8bc1a190b7cd1f0
  - file: tests/AGENTS.md
    source: prefecthq/prefect/tests/AGENTS.md@2a145258b1e6ece42efa8fbbe8bc1a190b7cd1f0

checks:
  - id: test_non_interactive_custom_image_uses_opt_prefect
    type: fail_to_pass
    origin: agent_config
    description: >
      When `build` is null/empty and `job_variables.image` is set, non-interactive
      `_generate_default_pull_action` returns a pull step with directory
      `/opt/prefect` (container path), not the local cwd.
    source: "AGENTS.md (Guiding Principles: quality gate, minimal well-tested changes)"
    source: "src/prefect/cli/AGENTS.md (Use rich for output, support JSON output)"
    source: "tests/AGENTS.md (tests must be deterministic, prefer real operations)"

  - id: test_non_interactive_custom_image_prints_warning
    type: fail_to_pass
    origin: agent_config
    description: >
      In non-interactive mode with a custom image, a warning containing "Warning"
      and `/opt/prefect` is printed to the console advising the user to verify
      the path matches their image's WORKDIR.
    source: "AGENTS.md (Guiding Principles: quality gate)"
    source: "src/prefect/cli/AGENTS.md (Use rich for output)"

  - id: test_no_custom_image_preserves_local_cwd
    type: pass_to_pass
    origin: repo_tests
    description: >
      When there is no custom image in job_variables, the existing behavior
      (local cwd) is preserved.

  - id: test_ruff_lint_passes
    type: pass_to_pass
    origin: repo_tests
    description: >
      Repo linter passes on the modified file.

  - id: test_ruff_check_deploy_module
    type: pass_to_pass
    origin: repo_tests
    description: >
      Repo linter passes on the entire deploy CLI module.

  - id: test_deploy_actions_module_compiles
    type: pass_to_pass
    origin: repo_tests
    description: >
      The deploy _actions module compiles without syntax errors.

  - id: test_deploy_actions_imports
    type: pass_to_pass
    origin: repo_tests
    description: >
      The deploy _actions module imports successfully.

  - id: test_deploy_actions_syntax_valid
    type: pass_to_pass
    origin: repo_tests
    description: >
      The deploy _actions module has valid Python syntax.

rubric: []
