rubric:
  - source: core/tools/parseArgs.vitest.ts
    rule: "Unit tests must be added for any new function that implements non-trivial logic"
    reference: "The gold solution adds coerceArgsToSchema and vitest tests in parseArgs.vitest.ts that cover object stringification, array stringification, string preservation, number non-coercion, immutability, and missing schema handling."
    weight: 0.3
  - source: core/tools/parseArgs.ts
    rule: "New functions should not mutate their input arguments"
    reference: "coerceArgsToSchema uses 'const coerced = { ...args }' to create a shallow copy and only modifies values in the new object, preserving the original args."
    weight: 0.2
  - source: core/tools/parseArgs.ts
    rule: "JSDoc comments must use backticks for inline code"
    reference: "The coerceArgsToSchema JSDoc uses backticks: '`JSON.parse()`' and '`type: \"string\"`'"
