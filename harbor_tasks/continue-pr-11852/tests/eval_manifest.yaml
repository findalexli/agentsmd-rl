benchmark:
  name: continue-mcp-arg-coercion
  version: 1.0.0

pr:
  owner: continuedev
  repo: continue
  number: 11852
  title: "fix: coerce MCP tool args to match schema string types"
  description: |
    This PR fixes MCP tools receiving parsed JSON objects instead of strings when
    the tool's input schema defines a parameter as `type: "string"`.

    It adds `coerceArgsToSchema()` that checks the tool's `inputSchema` and re-stringifies
    any values that were deeply parsed by `JSON.parse()` but should remain as strings
    (e.g., file content for `.json` files passed to `write_file`).

  base_commit: b7fead504e7cc07b5a7b5152a2de1428e07a93fc
  merge_commit: ff89a882995c6d7eb61f8b3df1fd1b8761d6ef27

