distractors:
- rule: Always consult CLAUDE.md files in sub-crates. Instructions in local CLAUDE.md
    files override instructions in this file when they are in conflict.
  collision_type: meta_confusion
  why_distracting: The agent might halt progress to search for or request `CLAUDE.md`
    files in the `consensus/` or `crates/sui-core/` sub-crates. For a straightforward
    dead-code elimination task, this leads to unnecessary file system exploration
    and meta-confusion.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 7-8
- rule: Consult crate-specific CLAUDE.md or AGENTS.md files when changing files in
    those crates.
  collision_type: meta_confusion
  why_distracting: Similar to the sub-crate CLAUDE.md rule, this instructs the agent
    to look for crate-specific `AGENTS.md` files, which are not provided and not necessary
    for this PR, leading to wasted effort.
  severity: medium
  source:
    path: AGENTS.md
    lines: 3-4
- rule: When compiling or running tests in this repository, set timeout limits to
    at least 10 minutes due to the large codebase size
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to run the full test suite (like `cargo
    simtest -p sui-e2e-tests`) and wait 10+ minutes as suggested by the timeout rule,
    wasting significant time on a simple unused field removal that can be quickly
    verified with `cargo check`.
  severity: low
  source:
    path: CLAUDE.md
    lines: 31-32
hierarchy_analysis: The hierarchy consists of a root `CLAUDE.md` and a root `AGENTS.md`.
  Both files emphasize checking for crate-specific configuration files (`CLAUDE.md`
  or `AGENTS.md` in sub-crates). Since no sub-crate configs are provided in the context,
  these rules act as distractors that could cause an agent to over-explore the file
  system.
