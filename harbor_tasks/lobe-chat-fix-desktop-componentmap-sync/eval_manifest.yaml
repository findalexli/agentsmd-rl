distractors:
- rule: Do not add new `features/` folders inside `src/routes/`.
  collision_type: scope_ambiguity
  why_distracting: The file to edit is `src/routes/(main)/settings/features/componentMap.desktop.ts`.
    An agent might see this path violates the rule against having `features/` inside
    `src/routes/` and attempt to refactor/move the directory to comply, which is out
    of scope and would break imports.
  severity: high
  source:
    path: CLAUDE.md
    lines: 47-49
hierarchy_analysis: The agent must understand the relationship between the root config
  files (`AGENTS.md`, `CLAUDE.md`) and the dynamically loaded skill files in `.agents/skills/`.
  The task requires modifying the leaf nodes (skill files) to enforce a new rule globally,
  demonstrating an understanding of how the agent's own instruction hierarchy works.
