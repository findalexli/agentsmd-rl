    and the page segment mapping in `src/routes/(main)/settings/features/componentMap.des
  category: architecture
distractors:
- rule: Do not add new `features/` folders inside `src/routes/`.
  collision_type: architecture_boundary
  why_distracting: The file `src/routes/(main)/settings/features/componentMap.desktop.ts`
    is located in a `features/` folder inside `src/routes/`. An agent strictly following
    this rule might attempt to move this file and its web counterpart to `src/features/`,
    causing a massive out-of-scope refactor that breaks the application.
  severity: high
  source:
    path: CLAUDE.md
    lines: 46-47
- rule: 'When adding or changing SPA routes: 1. In `src/routes/`, add only the route
    segment files (layout + page) that delegate to features.'
  collision_type: scope_ambiguity
  why_distracting: The task asks to fix a missing `/onboarding` route in the desktop
    app. An agent might interpret this rule as a directive to create new route segment
    files (e.g., `src/routes/onboarding/index.tsx`), but the web route already exists
    and only the desktop router configuration (`desktopRouter.config.desktop.tsx`)
    needs to be synced.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 43-44
hierarchy_analysis: '`CLAUDE.md` and `AGENTS.md` both define the architectural boundary
  between `src/spa/`, `src/routes/`, and `src/features/`. The existing codebase has
  a `features/` directory inside `src/routes/(main)/settings/`, which violates the
  strict rule ''Do not add new features/ folders inside src/routes/''. Agents must
  recognize that fixing the immediate bug (syncing `.desktop` files) takes precedence
  over enforcing architectural purity on existing legacy structures.'
