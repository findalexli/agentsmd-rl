  - id: "test_target_file_pragma_once"
    description: "Target header file has #pragma once (pass_to_pass)"
    origin: static
    file: "test_outputs.py"

  - id: "test_target_files_exist"
    description: "Target source files exist and are readable (pass_to_pass)"
    origin: static
    file: "test_outputs.py"

  - id: "test_target_cpp_syntax_valid"
    description: "Target C++ file has valid syntax - balanced braces/parens (pass_to_pass)"
    origin: static
    file: "test_outputs.py"

  - id: "test_no_trailing_whitespace_in_target"
    description: "Target files have no trailing whitespace (pass_to_pass)"
    origin: static
    file: "test_outputs.py"

  - id: "test_no_tabs_in_target"
    description: "Target files use spaces not tabs (pass_to_pass)"
    origin: static
    file: "test_outputs.py"

  - id: "test_include_guards_for_target_dir"
    description: "Header files in target dir have include guards (pass_to_pass)"
    origin: static
    file: "test_outputs.py"

  - id: "test_file_size_reasonable"
    description: "Target file size is reasonable (pass_to_pass)"
    origin: static
    file: "test_outputs.py"

  - id: "test_no_conflict_markers_in_target"
    description: "Target files have no git conflict markers (pass_to_pass)"
    origin: static
    file: "test_outputs.py"

  - id: "test_no_dos_newlines_in_target"
    description: "Target files use Unix newlines not DOS (pass_to_pass)"
    origin: static
    file: "test_outputs.py"

  # Pass-to-pass checks: Actual repo CI/CD tests
  - id: "test_repo_typos"
    description: "Repo typos check passes using codespell (pass_to_pass)"
    origin: repo_tests
    file: "test_outputs.py"

  - id: "test_repo_cpp_style"
    description: "Repo C++ style check passes - no tabs, proper braces, header guards (pass_to_pass)"
    origin: repo_tests
    file: "test_outputs.py"

  - id: "test_repo_yamllint"
    description: "Repo YAML workflow files pass yamllint validation (pass_to_pass)"
    origin: repo_tests
    file: "test_outputs.py"

  - id: "test_repo_git_status"
    description: "Repo has clean git status at base commit (pass_to_pass)"
    origin: repo_tests
    file: "test_outputs.py"

  # Fail-to-pass checks: the actual fix verification
  - id: "nodes_to_remove_uses_pair_type"
    description: "nodes_to_remove is declared as vector<pair<String, int32_t>> to track node versions"
    origin: behavior
    file: "test_outputs.py"

  - id: "emplace_back_with_version"
    description: "Nodes are added with emplace_back including version info"
    origin: behavior
    file: "test_outputs.py"

  - id: "tryremove_uses_version"
    description: "tryRemove is called with version parameter for safe deletion"
    origin: behavior
    file: "test_outputs.py"

  - id: "zbadversion_error_handling"
    description: "ZBADVERSION error is handled gracefully (race condition safety)"
    origin: behavior
    file: "test_outputs.py"

  - id: "removed_count_tracking"
    description: "Successful removals are counted for observability"
    origin: behavior
    file: "test_outputs.py"

  - id: "log_includes_count_ratio"
    description: "Log message shows removed/total ratio"
    origin: behavior
    file: "test_outputs.py"

  - id: "node_and_version_extracted_from_pair"
    description: "Node and version are properly extracted from pair in removal loop"
    origin: behavior
    file: "test_outputs.py"

rubric:
  - rule: "Log all ZooKeeper/Keeper entry deletions at an appropriate log level"
