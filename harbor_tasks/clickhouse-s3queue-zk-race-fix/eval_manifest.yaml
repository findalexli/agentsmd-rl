      lines: "119-120"
      commit: "c71831a6b0df9e6b69eaba0e4cf83801c1fb3832"

  - rule: "Handle ZBADVERSION errors gracefully for race condition safety in ZooKeeper operations"
    source:
      path: ".github/copilot-instructions.md"
      lines: "103-104"
      commit: "c71831a6b0df9e6b69eaba0e4cf83801c1fb3832"

  - rule: "When mentioning logical errors in comments or logs, use 'exception' instead of 'crash'"
