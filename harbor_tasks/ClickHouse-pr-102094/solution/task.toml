[description]
The `splitByString` tokenizer in ClickHouse does not properly validate that separator strings are non-empty.
When an empty string is provided as a separator, it should throw a `BAD_ARGUMENTS` exception with a clear error message.

[target]
files = ["src/Interpreters/TokenizerFactory.cpp"]
