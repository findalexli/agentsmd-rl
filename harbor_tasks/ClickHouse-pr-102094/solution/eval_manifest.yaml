source_pr:
  owner: ClickHouse
  repo: ClickHouse
  number: 102094
  title: "Backport #101928 to 26.3: Extend argument validation in splitByString tokenizer"
  base_commit: "4735a442e4fd8d0b317a2171945fbcaf8cfa7ec7"
  merge_commit: "73ad233a01a81190b2a45b820878e54c36a9a22c"

checks:
  - id: "empty_separator_validation"
    test: "test_empty_separator_validation_exists"
    description: "Empty separator validation check exists in source code"
    type: "fail_to_pass"
    origin: "bug_fix"

  - id: "error_message_improved"
    test: "test_error_message_improved"
    description: "Error message for empty separators argument is improved"
    type: "pass_to_pass"
    origin: "bug_fix"

  - id: "validation_in_loop"
    test: "test_validation_in_loop"
    description: "Validation happens inside the loop that processes each separator"
    type: "fail_to_pass"
    origin: "bug_fix"

  - id: "bad_arguments_exception"
    test: "test_bad_arguments_exception_thrown"
    description: "BAD_ARGUMENTS exception is thrown for empty separator strings"
    type: "fail_to_pass"
    origin: "bug_fix"

  - id: "exception_error_code"
    test: "test_exception_error_code_used"
    description: "Exception uses correct ErrorCodes::BAD_ARGUMENTS"
    type: "pass_to_pass"
    origin: "bug_fix"

  - id: "source_compiles"
    test: "test_source_compiles"
    description: "Modified source file compiles without errors"
    type: "pass_to_pass"
    origin: "code_quality"

  - id: "values_vector_usage"
    test: "test_values_vector_usage"
    description: "values.emplace_back happens after empty check"
    type: "pass_to_pass"
    origin: "code_quality"

  - id: "allman_brace_style"
    test: "test_allman_brace_style"
    description: "Code uses Allman-style braces (opening brace on new line)"
    type: "pass_to_pass"
    origin: "agent_config"
    source:
      file: ".claude/CLAUDE.md"
      commit: "4735a442e4fd8d0b317a2171945fbcaf8cfa7ec7"
      lines: "When writing C++ code, always use Allman-style braces (opening brace on a new line). This is enforced by the style check in CI."

rubric:
  - id: "clear_error_messages"
    description: "Error messages are clear and descriptive"
    criteria: "Error messages should clearly explain what went wrong (empty string cannot be used as separator)"

  - id: "consistent_style"
    description: "Code follows existing style and patterns in the file"
    criteria: "The validation code should match the style and structure of surrounding code"
