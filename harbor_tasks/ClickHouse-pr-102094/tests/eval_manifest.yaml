source_pr:
  owner: ClickHouse
  repo: ClickHouse
  number: 102094
  title: "Backport #101928 to 26.3: Extend argument validation in splitByString tokenizer"
  base_commit: "4735a442e4fd8d0b317a2171945fbcaf8cfa7ec7"
  merge_commit: "73ad233a01a81190b2a45b820878e54c36a9a22c"

checks:
  # ==================== Fail-to-Pass: Core Bug Fix Tests ====================
  - id: "empty_separator_validation"
    test: "test_empty_separator_validation_exists"
    description: "Empty separator validation check exists in source code"
    type: "fail_to_pass"
    origin: "bug_fix"

  - id: "error_message_improved"
    test: "test_error_message_improved"
    description: "Error message for empty separators argument is improved"
    type: "fail_to_pass"
    origin: "bug_fix"

  - id: "validation_in_loop"
    test: "test_validation_in_loop"
    description: "Validation happens inside the loop that processes each separator"
    type: "fail_to_pass"
    origin: "bug_fix"

  - id: "bad_arguments_exception"
    test: "test_bad_arguments_exception_thrown"
    description: "BAD_ARGUMENTS exception is thrown for empty separator strings"
    type: "fail_to_pass"
    origin: "bug_fix"

  - id: "exception_error_code"
    test: "test_exception_error_code_used"
    description: "Exception uses correct ErrorCodes::BAD_ARGUMENTS"
    type: "pass_to_pass"
    origin: "bug_fix"

  # ==================== Pass-to-Pass: Code Quality Tests ====================
  - id: "source_compiles"
    test: "test_source_compiles"
    description: "Modified source file compiles without errors"
    type: "pass_to_pass"
    origin: "code_quality"

  - id: "values_vector_usage"
    test: "test_values_vector_usage"
    description: "values.emplace_back happens after empty check"
    type: "fail_to_pass"
    origin: "code_quality"

  - id: "allman_brace_style"
    test: "test_allman_brace_style"
    description: "Code uses Allman-style braces for the for loop (opening brace on new line)"
    type: "fail_to_pass"
    origin: "agent_config"
    source:
      file: ".claude/CLAUDE.md"
      commit: "4735a442e4fd8d0b317a2171945fbcaf8cfa7ec7"
      lines: "When writing C++ code, always use Allman-style braces (opening brace on a new line). This is enforced by the style check in CI."

  # ==================== Pass-to-Pass: Repo CI/CD Style Checks ====================
  - id: "no_trailing_whitespace"
    test: "test_no_trailing_whitespace_in_target_file"
    description: "Source file has no trailing whitespace"
    type: "pass_to_pass"
    origin: "repo_tests"
    source:
      file: ".github/workflows/master.yml"
      note: "ClickHouse CI runs style checks including trailing whitespace validation"

  - id: "file_ends_with_newline"
    test: "test_file_ends_with_newline"
    description: "Source file ends with newline (POSIX standard)"
    type: "pass_to_pass"
    origin: "repo_tests"
    source:
      note: "Standard POSIX requirement enforced in CI"

  - id: "no_tabs_in_source"
    test: "test_no_tabs_in_source"
    description: "Source file uses spaces instead of tabs for indentation"
    type: "pass_to_pass"
    origin: "repo_tests"
    source:
      file: "ci/jobs/scripts/check_style/check_cpp.sh"
      note: "ClickHouse CI checks for tabs in source files"

  - id: "clang_format_compliance"
    test: "test_clang_format_basic_compliance"
    description: "Modified code follows basic clang-format rules (line length)"
    type: "pass_to_pass"
    origin: "repo_tests"
    source:
      file: ".clang-format"
      note: "ClickHouse uses clang-format with 140 character column limit"

  - id: "consistent_indentation"
    test: "test_consistent_indentation"
    description: "Modified code uses consistent 4-space indentation"
    type: "pass_to_pass"
    origin: "repo_tests"
    source:
      file: ".clang-format"
      note: "ClickHouse uses 4-space indentation (IndentWidth: 4)"

  - id: "no_merge_conflict_markers"
    test: "test_no_merge_conflict_markers"
    description: "Source file has no merge conflict markers"
    type: "pass_to_pass"
    origin: "repo_tests"
    source:
      note: "Basic CI/CD sanity check"

  - id: "pyproject_toml_valid"
    test: "test_repo_pyproject_toml_valid"
    description: "Repository pyproject.toml is valid"
    type: "pass_to_pass"
    origin: "repo_tests"
    source:
      file: "pyproject.toml"
      note: "Repository Python configuration should be valid"

  # ==================== Pass-to-Pass: New CI/CD Enrichment Tests ====================
  - id: "sql_test_file_exists"
    test: "test_sql_test_file_exists"
    description: "SQL test file for modified component exists"
    type: "pass_to_pass"
    origin: "repo_tests"
    source:
      file: "tests/queries/0_stateless/03403_function_tokens.sql"
      note: "ClickHouse CI requires test files for modified components (PR adds tests to this file)"

  - id: "sql_test_file_valid_syntax"
    test: "test_sql_test_file_valid_syntax"
    description: "SQL test file uses valid ClickHouse test syntax"
    type: "pass_to_pass"
    origin: "repo_tests"
    source:
      file: "tests/queries/0_stateless/03403_function_tokens.sql"
      note: "CI validates SQL test file syntax and error markers"

  - id: "no_dos_line_endings"
    test: "test_no_dos_line_endings_in_source"
    description: "Source file has no DOS/Windows line endings (CRLF)"
    type: "pass_to_pass"
    origin: "repo_tests"
    source:
      file: "ci/jobs/scripts/check_style/various_checks.sh"
      note: "CI checks for DOS line endings in source files"

  - id: "no_utf8_bom"
    test: "test_no_utf8_bom_in_source"
    description: "Source file does not have UTF-8 BOM marker"
    type: "pass_to_pass"
    origin: "repo_tests"
    source:
      file: "ci/jobs/scripts/check_style/various_checks.sh"
      note: "CI forbids UTF-8 BOM markers in source files"

  - id: "pragma_once_in_headers"
    test: "test_pragma_once_in_local_headers"
    description: "Local header files have #pragma once"
    type: "pass_to_pass"
    origin: "repo_tests"
    source:
      file: "ci/jobs/scripts/check_style/check_cpp.sh"
      note: "CI requires #pragma once in all header files"

  - id: "cmake_lists_exists"
    test: "test_cmake_lists_exists"
    description: "CMakeLists.txt exists and is non-empty"
    type: "pass_to_pass"
    origin: "repo_tests"
    source:
      file: "CMakeLists.txt"
      note: "Build system configuration must be intact"

  - id: "no_exec_bits_on_source"
    test: "test_no_exec_bits_on_source"
    description: "Source files don't have executable permissions"
    type: "pass_to_pass"
    origin: "repo_tests"
    source:
      file: "ci/jobs/scripts/check_style/various_checks.sh"
      note: "CI checks that .cpp and .h files are not executable"

  - id: "clang_format_config_exists"
    test: "test_clang_format_config_exists"
    description: ".clang-format configuration file exists"
    type: "pass_to_pass"
    origin: "repo_tests"
    source:
      file: ".clang-format"
      note: "ClickHouse uses clang-format for code formatting"

rubric:
  - id: "clear_error_messages"
    description: "Error messages are clear and descriptive"
    criteria: "Error messages should clearly explain what went wrong (empty string cannot be used as separator)"

  - id: "consistent_style"
    description: "Code follows existing style and patterns in the file"
    criteria: "The validation code should match the style and structure of surrounding code"
