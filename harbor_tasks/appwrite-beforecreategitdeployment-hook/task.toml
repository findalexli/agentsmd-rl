name = "appwrite-beforecreategitdeployment-hook"
difficulty = "easy"
tags = ["php", "appwrite", "hook", "extensibility"]

[description]
short = "Add beforeCreateGitDeployment hook for deployment validation"
detailed = """
This task requires adding a new hook method `beforeCreateGitDeployment()` to the VCS Deployment
class that allows for extensible deployment validation logic. The hook should be called after
project validation but before database operations in the git deployment creation flow.

The method should accept the project, repository, database, and authorization as parameters
and have a no-op implementation in the base class (to be overridden in Cloud-specific subclasses).
"""

