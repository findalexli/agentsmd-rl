distractors:
- rule: Start the Full Development Environment (Recommended)
  source:
    path: CLAUDE.md
    lines: 28-35
  collision_type: scope_ambiguity
  why_distracting: The agent might try to start the MLflow dev server to test its changes, but this task is purely about creating a standalone bash script for GitHub API interactions. Starting the dev server would waste time and resources.
  severity: medium
- rule: Testing (uv run pytest tests/)
  source:
    path: CLAUDE.md
    lines: 74-85
  collision_type: architecture_boundary
  why_distracting: The agent might attempt to write Python tests using pytest for the new bash script, which is outside the scope of the task and the established pattern for these Claude skill scripts.
  severity: medium
- rule: Analyze failed GitHub Action jobs for a pull request
  source:
    path: .claude/skills/analyze-ci/SKILL.md
    lines: 1-2
  collision_type: scope_ambiguity
  why_distracting: The analyze-ci skill deals with GitHub Action jobs, which might lead the agent to integrate the rerun logic there or use its conventions, but the task explicitly requires adding the script to the copilot skill.
  severity: low
hierarchy_analysis: The repository has a single root-level CLAUDE.md file that is heavily focused on Python development, MLflow architecture, and local dev servers. Since this task involves writing a bash script for GitHub API interactions within the `.claude/skills` directory, most of the root config is irrelevant. The agent must rely primarily on the explicit task instructions and the patterns established in the sibling `poll.sh` file rather than the Python-centric repository guidelines.
