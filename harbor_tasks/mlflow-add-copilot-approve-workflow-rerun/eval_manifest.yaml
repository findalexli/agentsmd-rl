  evidence: 'The approve.sh script includes a comment explaining the non-obvious workaround: "The /approve API fails with ''not a fork pull request''. Use /rerun instead."'
- rule: Document skill usage with a markdown heading and a bash code block demonstrating the command
  source:
    path: .claude/skills/copilot/SKILL.md
    lines: 18-22
  evidence: The gold solution updates SKILL.md by adding a new section '## Approving workflows' with a bash code block, exactly matching the formatting of the existing '## Polling for completion' section.
  category: documentation
  verification: llm_judge
