  category: style
distractors:
- rule: 'Ask first before: Modifying config structures in `areal/api/cli_args.py`.'
  collision_type: rule_conflict
  why_distracting: The instruction explicitly commands the agent to add `TrackioConfig`
    to the configuration system (which lives in `areal/api/cli_args.py`). If the agent
    strictly follows the 'Ask first' rule, it will halt the autonomous task unnecessarily.
  severity: high
  source:
    path: AGENTS.md
    lines: 40-41
- rule: 'Logging: `areal.utils.logging.getLogger(name)` with PascalCase names -- never
    `print` or `logging.__name__`.'
  collision_type: scope_ambiguity
  why_distracting: The task requires updating the experiment tracking logging (metrics
    logging via `trackio.log`), not standard application stdout logging. Applying
    the `getLogger` rule here would result in incorrect implementation of the metrics
    logger.
  severity: medium
  source:
    path: AGENTS.md
    lines: 74-75
- rule: 'Ask first before: Adding new dependencies.'
  collision_type: rule_conflict
  why_distracting: The instruction specifies a 'graceful fallback when the package
    is not installed', meaning Trackio should be handled via `try...except ImportError`
    rather than halting to ask about adding a hard dependency.
  severity: medium
  source:
    path: AGENTS.md
    lines: 41-42
hierarchy_analysis: The rules are defined in both `AGENTS.md` and `CLAUDE.md` (Level
  0). The agent must prioritize the explicit task instructions over the general 'Ask
  first' constraints in the agent guidelines to successfully complete the PR autonomously.
