distractors:
- rule: 'Ask first before: Modifying config structures in `areal/api/cli_args.py`.'
  collision_type: rule_conflict
  why_distracting: The prompt explicitly instructs the agent to add `TrackioConfig`
    to the configuration system and points to `areal/api/cli_args.py`. If the agent
    follows the rule to 'Ask first' before modifying this file, it will halt execution
    and fail to complete the task autonomously.
  severity: high
  source:
    path: AGENTS.md
    lines: 34-36
- rule: 'Always do: Add tests for new functionality.'
  collision_type: scope_ambiguity
  why_distracting: The gold solution does not include any test files. Attempting to
    add tests for the trackio integration might lead the agent to hallucinate test
    structures, struggle with mocking the trackio library, or modify files outside
    the expected scope of this PR.
  severity: medium
  source:
    path: AGENTS.md
    lines: 29-29
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` are Level 0 and contain identical,
  overlapping rules (e.g., 'Ask first before modifying config structures', 'Add tests').
  They are consistent with each other. The primary tension is between the repository's
  general defensive rules ('Ask first') and the specific, scoped nature of the user's
  prompt which requires immediate modification of restricted files.
