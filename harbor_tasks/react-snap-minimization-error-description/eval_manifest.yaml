distractors:
- rule: When modifying the compiler, you MUST read the documentation about that pass
    in compiler/packages/babel-plugin-react-compiler/docs/passes/
  collision_type: architecture_boundary
  why_distracting: The rule mandates reading pass documentation in `babel-plugin-react-compiler/docs/passes/`
    when modifying the compiler. However, `minimize.ts` is a testing utility in the
    `snap` package, not a compiler pass. An agent might waste time looking for non-existent
    documentation or misinterpret the architecture.
  severity: medium
  source:
    path: compiler/CLAUDE.md
    lines: 7-8
hierarchy_analysis: The hierarchy consists of a root `CLAUDE.md` that explicitly delegates
  compiler-specific instructions to `compiler/CLAUDE.md`. The agent must recognize
  that it is working within the `/compiler/` directory and apply the rules from the
  child config, while ignoring React core tooling.
