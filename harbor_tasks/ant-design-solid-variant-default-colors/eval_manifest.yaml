source_pr: "ant-design/ant-design#57495"
source_repo: "ant-design/ant-design"
task_name: "ant-design-solid-variant-default-colors"
base_commit: "df5547f2ade5fe0bd9906bb9a386e7865afa4835"
merge_commit: "8e10c284f1780a5caa0e646bd0bba9875da63573"

checks:
  # Fail-to-pass: Button solid variant should have default primary color
  - id: "test_button_solid_has_default_primary_color"
    type: "pytest"
    weight: 20
    description: "Button with variant='solid' and no color prop should render with primary color class"

  # Fail-to-pass: Button with ConfigProvider solid variant
  - id: "test_button_config_provider_solid_default_color"
    type: "pytest"
    weight: 20
    description: "Button inside ConfigProvider with button={{variant: 'solid'}} should render with primary color class"

  # Fail-to-pass: Tag solid variant should have default color
  - id: "test_tag_solid_has_default_color"
    type: "pytest"
    weight: 20
    description: "Tag with variant='solid' and no color prop should render with default color class"

  # Fail-to-pass: Tag with ConfigProvider solid variant
  - id: "test_tag_config_provider_solid_default_color"
    type: "pytest"
    weight: 20
    description: "Tag inside ConfigProvider with tag={{variant: 'solid'}} should render with default color class"

  # Pass-to-pass: Non-solid variants should not be affected
  - id: "test_tag_non_solid_no_default_color"
    type: "pytest"
    weight: 10
    description: "Tag with variant='outlined' should NOT have 'ant-tag-default' class"

  # Guard test: TypeScript compilation
  - id: "test_typescript_compiles"
    type: "pytest"
    weight: 10
    description: "TypeScript should compile without errors"

  # Agent config compliance: Test import paths
  - id: "test_imports_relative"
    type: "agent_config"
    origin: "agent_config"
    source: "CLAUDE.md and AGENTS.md - Test Import Rules"
    weight: 0
    description: "Tests should use relative imports, not absolute paths like 'antd'"

rubric: []
