version: "2.0"

source:
  repo: "astral-sh/uv"
  pr: 18919
  base_commit: "84a854c169ef8acdcc90692e40f6f540be74b956"
  merge_commit: "6eb5fe09cc9999fc9c42f780ca8bdf56d7e30624"

checks:
  - id: uv_keyring_cargo_check
    type: pass_to_pass
    origin: repo_ci
    description: "uv-keyring crate compiles with cargo check"

  - id: uv_keyring_cargo_clippy
    type: pass_to_pass
    origin: repo_ci
    description: "uv-keyring crate passes clippy linting"

  - id: cargo_fmt_check
    type: pass_to_pass
    origin: repo_ci
    description: "Workspace code is formatted correctly"

  - id: cargo_toml_valid
    type: pass_to_pass
    origin: static
    description: "Cargo.toml must remain valid TOML"

  - id: readme_exists_with_docs
    type: pass_to_pass
    origin: static
    description: "README.md must still exist and contain usage documentation"

  - id: readme_no_wrong_crate_imports
    type: fail_to_pass
    origin: pr_diff
    description: "README code blocks must not import from non-existent 'keyring' crate"

  - id: readme_no_await_in_sync_fn
    type: fail_to_pass
    origin: pr_diff
    description: "README code blocks must not use .await in a non-async fn main"

  - id: mock_no_wrong_crate_refs
    type: fail_to_pass
    origin: pr_diff
    description: "mock.rs doc code examples must not reference non-existent 'keyring' crate"

rubric:
  - rule: "PREFER [`TypeName`] references when writing Rust doc comments"
    source:
      path: "AGENTS.md"
      lines: "20"
      commit: "84a854c169ef8acdcc90692e40f6f540be74b956"
