rubric:
- rule: PREFER [`TypeName`] references when writing Rust doc comments
  source:
    path: AGENTS.md
    lines: 19-20
  evidence: In `crates/uv-keyring/src/mock.rs`, the gold solution replaces a broken
    code block with prose that uses `[`TypeName`]` references like `[`set_default_credential_builder`](crate::set_default_credential_builder)`
    and `[`default_credential_builder`]`.
  category: documentation
  verification: llm_judge
distractors:
- rule: ALWAYS attempt to add a test case for changed behavior
  collision_type: scope_ambiguity
  why_distracting: The task is to fix broken doctests. The agent might think it needs
    to add new tests to cover the `mock.rs` functionality since it removed the doctest,
    but the task is strictly about fixing compilation errors.
  severity: medium
  source:
    path: AGENTS.md
    lines: 2-3
- rule: NEVER update all dependencies in the lockfile and ALWAYS use `cargo update
    --precise` to make lockfile changes
  collision_type: meta_confusion
  why_distracting: The agent needs to remove `doc-comment` from `Cargo.toml` and `Cargo.lock`.
    The rule about `cargo update --precise` applies to updating dependencies, not
    removing them, but the agent might misinterpret this as a restriction on modifying
    `Cargo.lock` directly or running `cargo remove`.
  severity: low
  source:
    path: AGENTS.md
    lines: 13-14
hierarchy_analysis: The configuration is a flat single file (`AGENTS.md` included
  via `CLAUDE.md`). The task is to fix broken doctests and documentation.
