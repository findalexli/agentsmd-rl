name = "kotlin-compose-stable-object"
title = "Fix Compose compiler adding $stable to Kotlin objects"
description = """
The Compose compiler plugin was incorrectly adding a `$stable` property to Kotlin objects
(companion objects and regular objects) when they were accessed from different files.
This caused JVM bytecode verification errors due to duplicate field names.

The fix requires treating all objects as inherently stable in the stability inference
and recognizing all object references (not just companions) as static values.
"""

# Difficulty and classification
difficulty = "medium"
tags = ["kotlin", "compose", "compiler-plugin", "stability", "bytecode"]

# Target files for the fix
target_files = [
    "plugins/compose/compiler-hosted/src/main/java/androidx/compose/compiler/plugins/kotlin/analysis/Stability.kt",
    "plugins/compose/compiler-hosted/src/main/java/androidx/compose/compiler/plugins/kotlin/lower/AbstractComposeLowering.kt"
]

# Distinctive line from the patch for idempotency check
distinctive_line = "if (declaration.isObject) return Stability.Stable"

# Time estimates (in minutes)
estimated_solve_time = 45
estimated_test_time = 15

# Repository info
repo_owner = "JetBrains"
repo_name = "kotlin"
pr_number = 5801
