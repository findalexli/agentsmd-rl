    file: plugins/compose/compiler-hosted/integration-tests/src/jvmTest/kotlin/androidx/compose/compiler/plugins/kotlin/StaticExpressionDetectionTests.kt

  # New pass-to-pass tests (kotlinc syntax validation)
  - id: test_stability_kt_syntax_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Stability.kt has valid Kotlin syntax (kotlinc validation)"
    file: plugins/compose/compiler-hosted/src/main/java/androidx/compose/compiler/plugins/kotlin/analysis/Stability.kt

  - id: test_lowering_kt_syntax_valid
