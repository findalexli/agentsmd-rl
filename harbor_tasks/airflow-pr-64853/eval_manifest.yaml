    description: TypeScript compilation succeeds without errors

  - id: test_eslint_passes
    type: pass_to_pass
    origin: repo_tests
    description: ESLint linting passes on the UI codebase

  - id: test_vitest_gantt_utils
    type: pass_to_pass
    origin: repo_tests
    description: Vitest tests for Gantt utils pass (if test file exists)

  - id: test_repo_vitest_full
    type: pass_to_pass
