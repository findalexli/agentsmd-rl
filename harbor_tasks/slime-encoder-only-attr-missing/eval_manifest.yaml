rubric:
- rule: Use defensive attribute checking (e.g., hasattr) when accessing optional attributes
    that may not exist on all object types.
  source:
    path: slime/backends/sglang_utils/sglang_engine.py
    lines: '54'
    commit: 6f70479966749e258ba0b20341e2c4b88ea094f1
  reference: Changed 'if server_args.encoder_only:' to 'if hasattr(server_args, "encoder_only")
    and server_args.encoder_only:' to safely check for optional attribute before accessing
    it.
distractors:
- rule: Keep exceptions explicit for invalid metadata instead of silently returning
    zeros.
  source:
    path: .claude/skills/add-reward-function/SKILL.md
    lines: '51'
  source_text: '- Keep exceptions explicit for invalid metadata instead of silently
    returning zeros.'
  collision_type: rule_conflict
  why_distracting: An agent reading this might believe it shouldn't use `hasattr`
    to silently handle a missing `encoder_only` attribute on `ServerArgs`, and instead
    should allow the `AttributeError` to be raised explicitly. However, the rule is
    meant for reward functions handling metadata, not engine initialization backwards
    compatibility.
  severity: high
