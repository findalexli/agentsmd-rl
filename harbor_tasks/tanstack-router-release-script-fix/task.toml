name = "tanstack-router-release-script-fix"
version = "1.0.0"
description = "Fix git commit parsing and release flag logic in create-github-release.mjs"
author = "taskforge"
type = "benchmark"

[repository]
owner = "TanStack"
repo = "router"
base_commit = "ab46b5ec42296c60dc46d97481f038b8df68ed84"
merge_commit = "986776cd27dbab6d032d764933242936f68103f5"
pr_number = 6895

[agent]
timeout_seconds = 1800

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
timeout_seconds = 120
