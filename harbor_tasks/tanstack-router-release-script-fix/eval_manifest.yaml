distractors:
- rule: TypeScript strict mode with extensive type safety
  collision_type: architecture_boundary
  why_distracting: The file being edited is a plain JavaScript module (.mjs). Attempting
    to enforce TypeScript strict mode or convert the file to TypeScript would violate
    the existing architecture of the scripts directory.
  severity: medium
  source:
    path: AGENTS.md
    lines: 18-18
- rule: 'Critical: Always run unit and type tests during development - do not proceed
    if they fail'
  collision_type: scope_ambiguity
  why_distracting: The instruction mandates running unit and type tests, but the release
    script is a standalone utility without dedicated unit tests. An agent might waste
    time trying to test it or fail the task if it strictly refuses to proceed without
    test coverage.
  severity: low
  source:
    path: AGENTS.md
    lines: 43-43
hierarchy_analysis: The config hierarchy consists of a single root-level AGENTS.md
  file containing generic repository guidelines. These guidelines are primarily focused
  on the TypeScript packages and Nx workspace, which are largely irrelevant to the
  standalone Node.js release script being modified.
version: '2.0'
