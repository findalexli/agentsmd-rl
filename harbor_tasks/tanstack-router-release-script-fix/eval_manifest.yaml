    lines: ''
distractors:
- rule: TypeScript strict mode with extensive type safety
  collision_type: scope_ambiguity
  why_distracting: The file being edited (`scripts/create-github-release.mjs`) is
    a standalone Node.js script used for CI releases, not part of the core library.
    Attempting to enforce TypeScript strict mode, add type annotations, or convert
    it to `.ts` would be out of scope and could break the CI pipeline.
  severity: medium
  source:
    path: AGENTS.md
    lines: 18-20
- rule: 'Critical: Always run unit and type tests during development - do not proceed
    if they fail'
  collision_type: scope_ambiguity
  why_distracting: The agent might waste time trying to find, run, or write unit/type
    tests for this specific release script using Nx. However, this is a standalone
    CI script without a dedicated test suite, so standard package-level testing instructions
    do not apply.
  severity: low
  source:
    path: AGENTS.md
    lines: 42-44
hierarchy_analysis: The AGENTS.md file provides rules heavily focused on the core
  TanStack Router packages (TypeScript, Nx, React/Solid). However, the target file
  is a standalone `.mjs` script in the `scripts/` directory. The agent must recognize
  that core library guidelines (like TS strict mode and Nx testing) do not apply to
  utility scripts.
version: '2.0'
