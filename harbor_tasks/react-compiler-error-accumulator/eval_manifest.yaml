version: "2.0"

source:
  repo: "facebook/react"
  pr: 35873
  base_commit: "0dbb43bc57d27a79ecf4c78508089a36bd08ef5d"
  merge_commit: "eca778cf8bf88b2a62a5244f94a0084593ffbf14"

checks:
  - id: typescript_compiles
    type: pass_to_pass
    origin: static
    description: "Environment.ts and its imports must compile without TypeScript errors (tsc --noEmit)"

  - id: all_methods_exist
    type: fail_to_pass
    origin: pr_diff
    description: "All 5 new methods (recordError, recordErrors, hasErrors, aggregateErrors, tryRecord) exist on Environment prototype at runtime"

  - id: errors_field_initialized
    type: fail_to_pass
    origin: pr_diff
    description: "Environment class has a private #errors field initialized to new CompilerError()"

  - id: record_error_throws_invariants
    type: fail_to_pass
    origin: pr_diff
    description: "recordError immediately throws when error category is ErrorCategory.Invariant"

  - id: record_errors_processes_details
    type: fail_to_pass
    origin: pr_diff
    description: "recordErrors(error: CompilerError) iterates over error details and records each"

  - id: has_errors_method
    type: fail_to_pass
    origin: pr_diff
    description: "hasErrors(): boolean delegates to the accumulated errors' hasAnyErrors()"

  - id: aggregate_errors_method
    type: fail_to_pass
    origin: pr_diff
    description: "aggregateErrors(): CompilerError returns the accumulated #errors field"

  - id: try_record_catches_compiler_errors
    type: fail_to_pass
    origin: pr_diff
    description: "tryRecord wraps a callback in try/catch; records non-invariant CompilerErrors, re-throws others"

  - id: required_imports
    type: fail_to_pass
    origin: pr_diff
    description: "CompilerDiagnostic, CompilerErrorDetail, and ErrorCategory are named imports from CompilerError"

  - id: invariant_check_in_both_methods
    type: fail_to_pass
    origin: agent_config
    description: "ErrorCategory.Invariant is checked in both recordError and tryRecord; invariants must never be silently accumulated"
    source:
      path: "compiler/CLAUDE.md"
      lines: "232-245"
      commit: "0dbb43bc57d27a79ecf4c78508089a36bd08ef5d"

  - id: private_field_uses_hash_prefix
    type: fail_to_pass
    origin: agent_config
    description: "Private error field uses TypeScript # prefix (#errors), not underscore convention (_errors)"
    source:
      path: "compiler/CLAUDE.md"
      lines: "232-245"
      commit: "0dbb43bc57d27a79ecf4c78508089a36bd08ef5d"

rubric:
  - rule: "New public methods added to Environment should have JSDoc comments explaining their purpose and key behaviors (e.g., when they throw vs accumulate)."
    source:
      path: "compiler/CLAUDE.md"
      lines: "232-245"
      commit: "0dbb43bc57d27a79ecf4c78508089a36bd08ef5d"

  - rule: "tryRecord() should re-throw any CompilerError that contains at least one Invariant diagnostic, not record it — Invariant errors indicate internal compiler bugs that cannot be recovered from."
    source:
      path: "compiler/CLAUDE.md"
      lines: "232-245"
      commit: "0dbb43bc57d27a79ecf4c78508089a36bd08ef5d"
