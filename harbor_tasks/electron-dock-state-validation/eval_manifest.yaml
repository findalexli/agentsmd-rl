task_name: electron-dock-state-validation
source_pr: electron/electron#50667
description: |
  Add allowlist validation for dock_state_ before JavaScript execution.
  The dock_state_ variable comes from DevTools preferences and can be
  manipulated. This fix validates the value against an allowlist before
  passing it to JavaScript contexts.

base_commit: 92892ca4815cf8c781e72a1b8ee717917992cc18
merge_commit: 2046ae87731d80a7b535512ae19acb529e10e33b
target_file: shell/browser/ui/inspectable_web_contents.cc

# Checks - one per test function in test_outputs.py
checks:
  - id: test_file_exists
    name: File exists
    type: existence
    points: 1

  - id: test_kValidDockStates_defined
    name: kValidDockStates allowlist defined
    type: structural
    points: 2
    description: |
      The kValidDockStates allowlist must be defined using base::MakeFixedFlatSet
      and contain all valid states: bottom, left, right, undocked.

  - id: test_IsValidDockState_function
    name: IsValidDockState function exists
    type: structural
    points: 2
    description: |
      The IsValidDockState function must exist and use kValidDockStates.contains()
      for validation.

  - id: test_SetDockState_validates_input
    name: SetDockState validates input
    type: behavioral
    points: 3
    description: |
      SetDockState must validate the input state using IsValidDockState
      before assigning to dock_state_.

  - id: test_LoadCompleted_handles_invalid_dock_state
    name: LoadCompleted handles invalid dock_state
    type: behavioral
    points: 3
    description: |
      LoadCompleted must check for null current_dock_state and validate
      the sanitized value using IsValidDockState.

  - id: test_sanitization_before_validation
    name: Sanitization happens before validation
    type: behavioral
    points: 2
    description: |
      Quotes must be removed from current_dock_state using base::RemoveChars
      before passing to IsValidDockState.

  - id: test_default_fallback_to_right
    name: Invalid states fall back to right
    type: behavioral
    points: 2
    description: |
      When an invalid dock state is detected, it should fall back to
      the "right" state.

  - id: test_fixed_flat_set_include
    name: FixedFlatSet header included
    type: structural
    points: 1
    description: |
      The base/containers/fixed_flat_set.h header must be included.

  - id: test_all_validation_points
    name: All validation points present
    type: structural
    points: 2
    description: |
      At least 2 IsValidDockState call sites should exist (SetDockState
      and LoadCompleted).

  - id: test_no_unsanitized_assignment
    name: No unvalidated assignments
    type: behavioral
    points: 2
    description: |
      dock_state_ should never be assigned without validation.

  - id: test_clang_format_compliance
    name: Code formatting
    type: structural
    points: 1
    description: |
      Code should follow basic formatting conventions.

# Rubric for soft/subjective checks (if any)
rubric: []

# Agent config rules to enforce
agent_config:
  - source: .github/copilot-instructions.md
    rule: "Follow Chromium coding style, enforced by clang-format and clang-tidy"
    type: structural
    applies_to: ["*.cc", "*.h"]
