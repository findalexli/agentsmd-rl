version: "1.0"

source:
  pr:
    owner: langchain-ai
    repo: langchain
    number: 36660
    title: "fix(core): Use reference counting for storing inherited run trees to support garbage collection"
    merge_commit: a6eb82970166a8fb966f1eb04238e6c378811bcc
    base_commit: c59e83a1ffba63d709ea4847445845edd82085dc
  notes: >
    This PR fixes a memory leak in the LangChain tracer where external RunTree
    objects injected into run_map were never cleaned up. The fix adds reference
    counting via _external_run_ids to track when all children of an external
    parent have finished, allowing proper eviction from run_map.

checks:
  # Fail-to-pass tests (core behavioral fixes)
  - id: test_external_run_id_cleanup_single_child
    type: fail_to_pass
    origin: agent_config
    description: External RunTree is cleaned up after its single child finishes
    source:
      file: libs/core/langchain_core/tracers/core.py
      lines: [89-99]
      reason: _external_run_ids refcount implementation

  - id: test_external_run_id_cleanup_sibling_children
    type: fail_to_pass
    origin: agent_config
    description: External parent survives until ALL sibling children finish (refcount mechanism)
    source:
      file: libs/core/langchain_core/tracers/base.py
      lines: [50-59, 580-589]
      reason: Proper refcount decrement and cleanup in _end_trace

  - id: test_runtree_no_accumulation
    type: fail_to_pass
    origin: agent_config
    description: RunTree objects don't accumulate across multiple calls (memory-level regression test)
    source:
      file: libs/core/langchain_core/tracers/core.py
      lines: [132-134]
      reason: Refcount increment in _start_trace

