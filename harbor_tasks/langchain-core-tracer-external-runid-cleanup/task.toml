    "libs/core/langchain_core/tracers/core.py",
    "libs/core/langchain_core/tracers/langchain.py",
]
test_file = "libs/core/tests/unit_tests/runnables/test_tracing_interops.py"

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
