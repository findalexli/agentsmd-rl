rubric:
- rule: 'shell.zig: Add jsobjs_len field to Lexer struct and jsobjs_len parameter
    to new() function for bounds checking'
  source:
    path: src/shell/shell.zig
    lines: 2337-2377
    commit: f06119ad0cd49bba93908329ef5e53a39c50fb70
  reference: 'jsobjs_len: u32 = 0'
- rule: 'shell.zig: Update validateJSObjRefIdx to check against jsobjs_len instead
    of maxInt(u32)'
  source:
    path: src/shell/shell.zig
    lines: 3363-3370
    commit: f06119ad0cd49bba93908329ef5e53a39c50fb70
  reference: if (idx >= self.jsobjs_len)
- rule: 'interpreter.zig: Calculate jsobjs_len and pass to Lexer.new() calls'
  source:
    path: src/shell/interpreter.zig
    lines: 792-805
    commit: f06119ad0cd49bba93908329ef5e53a39c50fb70
  reference: 'jsobjs_len: u32 = @intCast(jsobjs.len)'
- rule: 'Builtin.zig: Add bounds check for JS object references before accessing interpreter.jsobjs'
  source:
    path: src/shell/Builtin.zig
    lines: 510-525
    commit: f06119ad0cd49bba93908329ef5e53a39c50fb70
  reference: if (file.jsbuf.idx >= interpreter.jsobjs.len)
- rule: 'Cmd.zig: Add bounds check for JS object references before accessing this.base.interpreter.jsobjs'
  source:
    path: src/shell/states/Cmd.zig
    lines: 1-50
    commit: f06119ad0cd49bba93908329ef5e53a39c50fb70
  reference: if (val.idx >= this.base.interpreter.jsobjs.len)
- rule: 'Decl literals in Zig are recommended. `const decl: Decl = .{ .binding = 0,
    .value = 0 };`'
  source:
    path: src/CLAUDE.md
    lines: 6-7
  evidence: The gold solution uses the anonymous struct literal `.{}` when calling
    `globalObject.throw("Invalid JS object reference in shell", .{})` in both `Builtin.zig`
    and `Cmd.zig`.
  category: style
- rule: Decl literals in Zig are recommended.
  source:
    path: src/CLAUDE.md
    lines: 6-7
  evidence: The gold solution uses anonymous struct literals like `.{}` and `.{ .Blob
    = blob }` when calling `throw` and `extractBlob`, adhering to the recommendation
    for decl literals.
  category: style
- rule: Always use `bun.*` APIs instead of `std.*`.
  source:
    path: src/CLAUDE.md
    lines: 14-15
  evidence: The gold solution maintains the use of `[]bun.String` in the `new` function
    signature rather than converting to a standard library string type, adhering to
    the preference for Bun APIs.
  category: architecture
distractors:
- rule: Private fields are fully supported in Zig with the `#` prefix.
  collision_type: would_cause_bug
  why_distracting: The agent might try to declare `#jsobjs_len` as a private field
    in the Lexer struct. While supported by Bun's custom Zig fork, using it here would
    require updating all access sites (like `self.jsobjs_len`) and could cause compilation
    errors if the field needs to be accessed from other files like `interpreter.zig`.
  severity: high
  source:
    path: src/CLAUDE.md
    lines: 4-5
- rule: Tests use Bun's Jest-compatible test runner with proper test fixtures. For
    multi-file tests, prefer tempDir and Bun.spawn.
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to write extensive shell interpolation
    tests using `Bun.spawn` and `tempDir`, expanding the scope of the PR unnecessarily
    when the core task is to fix the runtime implementation.
  severity: medium
  source:
    path: AGENTS.md
    lines: 43-46
hierarchy_analysis: The config hierarchy includes root-level `AGENTS.md`/`CLAUDE.md`
  and `src/`-level overrides. The `src/CLAUDE.md` provides specific Zig conventions
  (like the `#` private field syntax and `bun.*` API preference) that apply directly
  to the files being edited. The agent must weigh the Zig-specific rules against the
    existing code patterns while ignoring the test-writing guidelines from the root
  config.
