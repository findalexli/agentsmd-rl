    type: fail_to_pass
    origin: pr_diff
    description: "Windows paths with forward slashes (C:/path) must be recognized by WINDOWS_PATH regex"

  - id: unc_path_not_mid_string
    type: fail_to_pass
    origin: pr_diff
    description: "Double-backslash must only match at start of string, not embedded mid-string"

  - id: backslash_windows_path
    type: pass_to_pass
    origin: pr_diff
    description: "Traditional C:\\path format must still be recognized"

  - id: unc_path_at_start
    type: pass_to_pass
    origin: pr_diff
    description: "UNC paths (\\\\server\\share) at start of string must still match"

  - id: regex_valid_and_nontrivial
    type: pass_to_pass
    origin: static
    description: "WINDOWS_PATH regex compiles and has non-trivial content"

  - id: regex_has_forward_slash_support
    type: pass_to_pass
    origin: pr_diff
    description: "Regex explicitly supports forward slashes via [/\\] character class"

  - id: regex_has_proper_unc_anchor
    type: pass_to_pass
    origin: pr_diff
    description: "UNC path alternation is anchored to start with ^"

  - id: turbopack_core_crate_structure
    type: pass_to_pass
    origin: repo_tests
    description: "Turbopack-core crate has expected structure with src/ and Cargo.toml"

  - id: parse_rs_has_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: "parse.rs contains inline unit tests (#[cfg(test)] mod tests)"

  - id: request_enum_variants
    type: pass_to_pass
    origin: repo_tests
    description: "Request enum has expected variants including Windows variant"

  - id: windows_path_regex_well_formed
    type: pass_to_pass
    origin: repo_tests
    description: "WINDOWS_PATH regex definition follows expected patterns for Windows paths"

  - id: cargo_available
    type: pass_to_pass
    origin: repo_tests
    description: "Rust toolchain (cargo) is available for testing"

  - id: parse_rs_compiles
    type: pass_to_pass
    origin: repo_tests
    description: "parse.rs compiles without syntax errors via cargo check"

rubric: []
