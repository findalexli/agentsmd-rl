distractors:
- rule: API views should declare request/response schemas — prefer `@validated_request` from `posthog.api.mixins` or `@extend_schema` from drf-spectacular.
  collision_type: scope_ambiguity
  why_distracting: The prompt mentions the backend endpoint is fully implemented with `@extend_schema`. The agent might be distracted by this rule and attempt to verify or modify the backend API view, which is out of scope and unnecessary for this PR.
  severity: high
  source:
    path: AGENTS.md
    lines: 68-70
- rule: 'OpenAPI/types: `hogli build:openapi` (regenerate after changing serializers/viewsets)'
  collision_type: scope_ambiguity
  why_distracting: The agent might think it needs to regenerate OpenAPI schemas because it is exposing an endpoint as an MCP tool, but the endpoint is already implemented and the task only requires enabling the tool in the YAML config.
  severity: medium
  source:
    path: AGENTS.md
    lines: 25-26
hierarchy_analysis: The agent must navigate from the root `AGENTS.md` to the specific skill documents (`.agents/skills/implementing-mcp-tools/SKILL.md` and `.agents/skills/writing-skills/SKILL.md`) to understand how to format the YAML and the skill document. The root rules about backend development act as distractors.
