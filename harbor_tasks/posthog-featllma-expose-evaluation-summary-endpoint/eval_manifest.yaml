- rule: 'Codebase Structure - Key entry points: `products/` (product apps)'
  source:
    path: AGENTS.md
    lines: 4-7
  evidence: The gold solution correctly places the new skill document and modifies
    the MCP tools YAML within the `products/llm_analytics/` directory, adhering to
    the product-centric architecture.
  category: architecture
distractors:
- rule: API views should declare request/response schemas — prefer `@validated_request`
    from `posthog.api.mixins` or `@extend_schema` from drf-spectacular.
  collision_type: scope_ambiguity
  why_distracting: The task description mentions the backend endpoint is already fully
    implemented with `@extend_schema`. An agent might be distracted by this rule and
    attempt to modify or audit the Python viewset/serializers, wasting time and potentially
    breaking existing code when only YAML and Markdown changes are needed.
  severity: high
  source:
    path: AGENTS.md
    lines: 62-64
- rule: 'OpenAPI/types: `hogli build:openapi` (regenerate after changing serializers/viewsets)'
  collision_type: scope_ambiguity
  why_distracting: The agent might think that exposing a new MCP tool requires regenerating
    the OpenAPI schema, but since no serializers or viewsets are being changed (only
    YAML config), running this command is unnecessary and wastes time.
  severity: medium
  source:
    path: AGENTS.md
    lines: 26-27
hierarchy_analysis: 'The configuration hierarchy is relatively flat with `.cursorrules`
  providing general behavioral guidelines and `AGENTS.md` providing specific PostHog
  development rules. The primary challenge in this task is scope management: `AGENTS.md`
  provides extensive instructions for backend API development (schemas, OpenAPI generation,
  testing), but the task explicitly states the backend is already implemented and
  only requires configuration (YAML) and documentation (Markdown) updates. Agents
  must recognize that the backend rules in `AGENTS.md` do not apply to this specific
  PR.'
