  description: Repo license headers pass cargo xlint
- id: test_repo_git_checks
  type: pass_to_pass
  origin: repo_tests
  description: Repo passes git checks script
rubric:
- rule: 'Authority System: Each authority maintains its own state and participates
    in Byzantine consensus.'
  source:
    path: CLAUDE.md
    lines: 69-70
  evidence: The gold solution modifies methods on `impl AuthorityState` in `crates/sui-core/src/authority.rs`
    to correctly handle gasless transactions within the authority's state execution
    pipeline.
  category: architecture
- rule: For faster iteration, use -p to select only the most relevant packages for
    testing.
  source:
    path: CLAUDE.md
    lines: 41-42
  evidence: The prompt explicitly instructs the agent to use `-p sui-core` for both
    `cargo check` and `cargo clippy`, adhering to the rule to use `-p` to select only
    the most relevant packages.
  category: tooling
distractors:
- rule: cargo xclippy does not recognize -p option
  collision_type: rule_conflict
  why_distracting: The config states that `cargo xclippy` does not recognize the `-p`
    option, while the task instruction explicitly requires running `cargo clippy -p
    sui-core`. This creates confusion over which linting command to use.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 48-50
- rule: Run Rust unittests with SUI_SKIP_SIMTESTS=1 cargo nextest run
  collision_type: scope_ambiguity
  why_distracting: The config suggests running all Rust unittests with `SUI_SKIP_SIMTESTS=1
    cargo nextest run`, whereas the instruction only asks for `cargo check -p sui-core`.
    Running the full test suite would waste significant time.
  severity: low
  source:
    path: CLAUDE.md
    lines: 33-35
- rule: Protocol configuration management and modification
  source:
    path: .claude/skills/protocol-config/SKILL.md
    lines: 1-10
  collision_type: scope_ambiguity
  why_distracting: The task requires checking `protocol_config.enable_gasless()`.
    An agent might activate the protocol-config skill thinking it needs to modify
    or add new protocol configurations, wasting time on irrelevant domain rules instead
    of just calling the existing method.
  severity: medium
hierarchy_analysis: The hierarchy is shallow. `AGENTS.md` defers to `CLAUDE.md`, which
  contains generic repository guidelines. The task instructions override the generic
  testing commands in `CLAUDE.md`.
version: '2.0'
