source:
  pr:
    owner: MystenLabs
    repo: sui
    number: 26148
    title: "fix gasless transaction dryrun and simulate"
    base_commit: b11d7b977aab3ab79dc6f783555d1726c34b6ca7
    merge_commit: 4a9af930d043cc9f9bf7a9438ee3f25e4d26e741

  agent_config:
    files:
      - path: CLAUDE.md
        commit: b11d7b977aab3ab79dc6f783555d1726c34b6ca7
        rules_applied:
          - license_headers
          - cargo_check
          - cargo_xclippy
          - test_timeout_10min
          - no_allow_dead_code
      - path: .claude/skills/protocol-config/SKILL.md
        commit: b11d7b977aab3ab79dc6f783555d1726c34b6ca7
        rules_applied:
          - protocol_config_versioning

checks:
  - id: test_dry_exec_has_gasless_check
    type: fail_to_pass
    origin: pr_description
    description: "dry_exec_transaction has is_gasless check to prevent mock gas injection"

  - id: test_dry_exec_skips_mock_gas_for_gasless
    type: fail_to_pass
    origin: pr_description
    description: "dry_exec_transaction skips mock gas when is_gasless is true"

  - id: test_simulate_skips_mock_gas_for_gasless
    type: fail_to_pass
    origin: pr_description
    description: "simulate_transaction skips mock gas for gasless transactions"

  - id: test_gasless_uses_check_transaction_input
    type: fail_to_pass
    origin: pr_description
    description: "Gasless path uses check_transaction_input directly without mock gas"

  - id: test_repo_compiles
    type: pass_to_pass
    origin: repo_tests
    description: "sui-core compiles with cargo check"

  - id: test_no_clippy_errors
    type: pass_to_pass
    origin: agent_config
    source: CLAUDE.md
    description: "No clippy errors in sui-core (per CLAUDE.md requirement)"

  - id: test_repo_rustfmt
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's code passes rustfmt check"

  - id: test_repo_license_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's license headers pass lint check"

rubric:
  - criteria: "Code follows Rust best practices and CLAUDE.md guidelines"
    points: 10
  - criteria: "Fix correctly handles both dry_exec_transaction and simulate_transaction"
    points: 20
  - criteria: "Gasless transactions skip mock gas injection as intended"
    points: 20
