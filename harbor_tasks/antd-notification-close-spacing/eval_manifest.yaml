eval_manifest:
  version: "1.0"

  source:
    pr: "https://github.com/ant-design/ant-design/pull/57590"
    title: "fix(Notification): reserve close button spacing for description-only notices"
    description: |
      When title/message is omitted and only description is rendered, the close button
      can overlap notification content because right-side spacing is only reserved for
      the title block. This fix updates notification styles to reserve close-button
      spacing for description content in closable notices.

  checks:
    # Pass-to-pass tests (regression prevention - repo's CI/CD checks)
    - id: test_repo_typescript_compilation
      type: pass_to_pass
      origin: repo_tests
      description: "Repo's TypeScript typecheck passes"
      weight: 1

    - id: test_repo_notification_unit_tests
      type: pass_to_pass
      origin: repo_tests
      description: "Repo's notification component unit tests pass"
      weight: 1

    - id: test_repo_eslint_notification
      type: pass_to_pass
      origin: repo_tests
      description: "Repo's ESLint passes on notification component"
      weight: 1

    - id: test_repo_biome_lint_notification
      type: pass_to_pass
      origin: repo_tests
      description: "Repo's Biome lint passes on notification component"
      weight: 1

    - id: test_repo_node_tests
      type: pass_to_pass
      origin: repo_tests
      description: "Repo's Node.js tests pass"
      weight: 1

    - id: test_repo_markdown_lint
      type: pass_to_pass
      origin: repo_tests
      description: "Repo's markdown linting passes"
      weight: 1

    # Fail-to-pass tests (the actual fix verification)
    - id: test_purepanel_conditional_title_render
      type: fail_to_pass
      origin: code_analysis
      description: "PureContent conditionally renders title div only when title exists"
      rationale: |
        The bug occurs because title div is always rendered, even when empty.
        When title is omitted, the empty title div doesn't reserve space for the close button,
        causing the close button to overlap the description. The fix wraps the title div
        in a conditional: {title && (<div>{title}</div>)}
      weight: 3
      source:
        file: components/notification/PurePanel.tsx
        lines: "100-104"

    - id: test_style_first_child_margin
      type: fail_to_pass
      origin: code_analysis
      description: "Style adds &:first-child rule to reserve close button spacing for description-only notices"
      rationale: |
        When there's no title, the description becomes the first child and needs
        right margin to reserve space for the close button. The fix adds a CSS rule
        that applies marginInlineEnd (token.marginSM) to the description when it's :first-child.
      weight: 3
      source:
        file: components/notification/style/index.ts
        lines: "178-182"

    - id: test_description_margin_value_is_token
      type: fail_to_pass
      origin: agent_config
      description: "marginInlineEnd uses design token (token.marginSM) not hardcoded value"
      rationale: |
        Ant Design follows a strict design token system. All spacing values must use
        tokens from the theme system, not hardcoded pixel values.
      weight: 2
      source:
        config: CLAUDE.md
        section: "Styling Approach"
        excerpt: "Never hardcode colors, sizes, or spacing values"

  # Rubric for soft/subjective rules from agent configs
  rubric:
    - rule: "Spacing values must use design tokens (token.marginSM), not hardcoded values"
      source:
        path: "CLAUDE.md"
        lines: "95-100"
        commit: "501436e5f45e533679f797ee0ee58e2a391e566d"

    - rule: "Use CSS logical properties (marginInlineEnd) for RTL support instead of directional properties"
      source:
        path: "CLAUDE.md"
        lines: "101-103"
        commit: "501436e5f45e533679f797ee0ee58e2a391e566d"

    - rule: "Test imports must use relative paths for internal modules"
      source:
        path: "CLAUDE.md"
        lines: "55-58"
        commit: "501436e5f45e533679f797ee0ee58e2a391e566d"

    - rule: "Use conditional rendering with {condition && (jsx)} pattern"
      source:
        path: ".github/copilot-instructions.md"
        lines: "45"
        commit: "501436e5f45e533679f797ee0ee58e2a391e566d"

    - rule: "Component styles must use @ant-design/cssinjs with gen[ComponentName]Style naming"
      source:
        path: ".github/copilot-instructions.md"
        lines: "68-71"
        commit: "501436e5f45e533679f797ee0ee58e2a391e566d"
