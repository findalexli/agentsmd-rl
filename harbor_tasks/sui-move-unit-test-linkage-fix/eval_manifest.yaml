distractors:
- rule: All new files must start with the Mysten Labs license header
  collision_type: scope_ambiguity
  why_distracting: The rule mandates a specific Mysten Labs license header for all
    new files. An agent might misinterpret this and attempt to prepend the license
    header to the existing `test_runner.rs` file being modified, which already has
    one or doesn't need it injected again.
  severity: low
  source:
    path: CLAUDE.md
    lines: 16-19
- rule: Sui uses an object-centric model with unique IDs and versions for each object.
  source:
    path: CLAUDE.md
    lines: 85-88
  source_text: "2. **Object Model**: Unlike account-based blockchains, Sui uses an\
    \ object-centric model where:\n   - Each object has a unique ID and version\n\
    \   - Objects can be owned, shared, or immutable"
  collision_type: architecture_boundary
  why_distracting: The modified file is located in `external-crates/move/`, which
    is the core upstream Move VM implementation. It is independent of Sui's specific
    object-centric model. An agent reading this rule might attempt to incorrectly
    map Move module addresses to Sui's `ObjectID` types or introduce versioning concepts,
    which would violate the architecture boundary separating the generic Move VM from
    the Sui framework.
  severity: high
- rule: 'All unit tests must work properly - use #[tokio::test] for async tests, not
    #[test]'
  source:
    path: CLAUDE.md
    lines: '114'
  source_text: '   - **All unit tests must work properly** - use `#[tokio::test]`
    for async tests, not `#[test]`'
  collision_type: scope_ambiguity
  why_distracting: The modified file is `test_runner.rs`, which builds the testing
    infrastructure for `move-unit-test`. An agent might see the word 'test' and assume
    this code represents individual application unit tests, mistakenly trying to rewrite
    the test runner's internal synchronous framework execution loop to use async paradigms
    or `#[tokio::test]`.
  severity: medium
- rule: 'Use #[tokio::test] for async tests, not #[test]'
  source:
    path: CLAUDE.md
    lines: '115'
  source_text: '- **All unit tests must work properly** - use `#[tokio::test]` for
    async tests, not `#[test]`'
  collision_type: scope_ambiguity
  why_distracting: The modified file `test_runner.rs` is in the `move-unit-test` crate.
    An AI agent might see the filename/path and assume it is working on Rust unit
    tests, thereby inappropriately attempting to apply `#[tokio::test]` to new test
    functions. However, this file implements the Move VM test runner infrastructure,
    not async Rust unit tests.
  severity: low
