rubric:
- rule: Comments should explain the 'why' not the 'what'. Explain non-obvious algorithms,
    temporary exclusions, complex calculations, subtle race conditions, and assumptions
    - not simple variable assignments or standard library usage.
  source:
    path: CLAUDE.md
    lines: 116-131
    commit: 89286c8e52b8b358b3bd895e40ec4ee2f991c742
- rule: Always run tests before submitting changes. Do not disable or ignore tests
    - all tests must pass and be enabled.
  source:
    path: CLAUDE.md
    lines: 105-107,112
    commit: 89286c8e52b8b358b3bd895e40ec4ee2f991c742
- rule: 'Never use #[allow(dead_code)], #[allow(unused)], or other linting suppressions.
    Fix the underlying issues instead.'
  source:
    path: CLAUDE.md
    lines: '113'
    commit: 89286c8e52b8b358b3bd895e40ec4ee2f991c742
distractors:
- rule: All new files must start with the following license in comments
  collision_type: scope_ambiguity
  why_distracting: The agent might try to prepend the license header to `test_runner.rs`
    while modifying it, but the rule strictly applies only to *new* files.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 18-21
- rule: Run e2e tests. simtests must be run with `cargo simtest` to avoid false negatives
  collision_type: scope_ambiguity
  why_distracting: The agent might run `cargo simtest -p sui-e2e-tests` to verify
    its fix, but this PR only affects the Move unit test runner (`move-unit-test`),
    making e2e tests an unnecessary and slow verification step.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 31-32
- rule: '`cargo xclippy does not recognize -p option`'
  collision_type: meta_confusion
  why_distracting: The agent might try to lint the specific package using `cargo xclippy
    -p move-unit-test` out of habit to verify its changes, which will fail as explicitly
    stated in the config, causing wasted iteration cycles.
  severity: low
  source:
    path: CLAUDE.md
    lines: 52-53
hierarchy_analysis: The repository uses a root `CLAUDE.md` and `AGENTS.md` that define
  general testing, linting, and architectural guidelines. There are no crate-specific
  config files provided for `external-crates/move/crates/move-unit-test`, so the root
  rules apply. However, because the root rules are heavily geared towards the core
  Sui blockchain components (like `sui-e2e-tests`), applying them blindly to the Move
  compiler/VM external crates can lead to scope ambiguity and wasted test execution
  time.
