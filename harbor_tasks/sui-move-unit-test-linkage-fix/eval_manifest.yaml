rubric:
- rule: Do not comment the obvious, including simple variable assignments, standard
    library usage, and self-descriptive function calls.
  source:
    path: CLAUDE.md
    lines: 118-130
  source_text: '### **Comment Writing Guidelines**


    **Do NOT comment the obvious** - comments should not simply repeat what the code
    does.

    **When to comment**:

    - Non-obvious algorithms or business logic

    - Temporary exclusions, timeouts, or thresholds and their reasoning

    - Complex calculations where the "why" isn''t immediately clear

    - Subtle race conditions or threading considerations

    - Assumptions about external state or preconditions


    **When NOT to comment**:

    - Simple variable assignments

    - Standard library usage

    - Self-descriptive function calls

    - Basic control flow (if/for/while)'
  evidence: The diff introduces simple variable assignments (`linkage_table`, `linkage_context`),
    standard library iterator patterns (`.map().collect()`), and self-descriptive
    function calls (`LinkageContext::new()`). It strictly adheres to this rule by
    omitting any obvious or redundant comments for these operations.
  category: style
  verification: llm_judge
