name = "lancedb-lance-3.0.0-rc3-upgrade"
description = "Upgrade Lance dependency from 3.0.0-rc.2 to 3.0.0-rc.3 and fix breaking API changes in error handling"
author = "benchmark"
difficulty = "medium"
tags = ["rust", "dependency-upgrade", "error-handling", "compilation"]
time_limit = 1800  # 30 minutes

[metadata]
owner = "lancedb"
repo = "lancedb"
pr_number = 3104
base_commit = "4be85444f0c00279920c0fe6ecbee0b6918e38c1"
merge_commit = "5c3bd68e5879c0add175706909d0f08539a53b54"
target_files = [
    "Cargo.toml",
    "python/src/namespace.rs",
    "python/src/storage_options.rs",
    "rust/lancedb/src/database/namespace.rs"
]

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
