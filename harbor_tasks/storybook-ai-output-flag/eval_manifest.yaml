    lines: 242-249
    commit: 15180fa049e683c4a58d69615dde12e33456512c
- rule: Use modern Node.js features and conventions appropriate for Node 22.22.1.
  source:
    path: AGENTS.md
    lines: 12-12
  evidence: The gold solution uses the `node:` prefix for built-in modules (`node:fs/promises`
    and `node:path`), which aligns with modern Node.js conventions supported by the
    specified Node 22.22.1 environment.
  category: style
distractors:
- rule: New scripts should use explicit `.ts` import extensions for native Node execution.
  collision_type: architecture_boundary
  why_distracting: The rule states that new scripts should use explicit `.ts` import
    extensions. An agent might mistakenly apply this to the imports in `index.ts`
    or `run.ts` (e.g., changing `./prompt` to `./prompt.ts`). However, these files
    are part of the compiled CLI source code in `code/lib/`, not standalone scripts
    in the `scripts/` directory, so adding `.ts` extensions here would be incorrect.
  severity: high
  source:
    path: AGENTS.md
    lines: 16-18
- rule: Write and run tests using Vitest for codebase changes.
  collision_type: scope_ambiguity
  why_distracting: The extensive documentation on Vitest and test execution might
    prompt an agent to write unit tests for the new `--output` flag and option merging
    logic. However, the gold solution implements the feature without adding new test
    files, making test generation an unnecessary distraction for this specific PR.
  severity: medium
  source:
    path: .cursorrules
    lines: 3-14
hierarchy_analysis: 'The configuration hierarchy is straightforward, with `CLAUDE.md`
  delegating entirely to `AGENTS.md`. The primary challenge for an agent is contextual
  boundary recognition: distinguishing between standalone repository scripts (which
  require `.ts` extensions per `AGENTS.md`) and compiled library code (which does
  not), as well as determining when the extensive test guidelines in `.cursorrules`
  should actually be applied.'
