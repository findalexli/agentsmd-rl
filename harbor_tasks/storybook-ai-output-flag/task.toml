version = "1.0"

[metadata]
author_name = "Alex Li"
author_email = "alex@example.com"
difficulty = "easy"
category = "feature"
tags = ["storybook", "cli", "typescript"]
expert_time_estimate_min = 5.0
junior_time_estimate_min = 20.0

[verifier]
env = { LLM_JUDGE = "${LLM_JUDGE:-0}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
timeout_sec = 120.0

[agent]
timeout_sec = 1800.0

[environment]
build_timeout_sec = 900.0
cpus = 2
memory_mb = 8192
storage_mb = 16384
allow_internet = true
