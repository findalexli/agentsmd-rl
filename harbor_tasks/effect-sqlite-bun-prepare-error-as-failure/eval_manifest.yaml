- id: test_ci_lint_pnpm_3
  type: pass_to_pass
  origin: repo_tests
  description: 'CI: Lint / Codegen check (pnpm codegen) must pass.'
- id: test_ci_build_pnpm
  type: pass_to_pass
  origin: repo_tests
  description: 'CI: Build / Docgen (pnpm docgen) must pass.'
- id: test_ci_lint_check_for_codegen_changes
