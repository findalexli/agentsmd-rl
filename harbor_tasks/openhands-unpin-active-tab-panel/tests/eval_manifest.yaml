manifest_version: "1.0"
task_id: "openhands-unpin-active-tab-panel"
source_pr: "All-Hands-AI/OpenHands#13648"

# Fail-to-pass tests: verify the bug fix works
checks:
  - id: test_unpin_active_tab_closes_panel
    type: fail_to_pass
    origin: behavioral
    description: "Unpinning the active tab closes the right panel (selectedTab === tab && isRightPanelShown)"

  - id: test_conversation_store_imported
    type: fail_to_pass
    origin: behavioral
    description: "Source file imports useConversationStore from stores"

  - id: test_store_hooks_used
    type: fail_to_pass
    origin: behavioral
    description: "Source file uses selectedTab, isRightPanelShown, setHasRightPanelToggled from store"

  - id: test_setrightpanelshown_destructured
    type: fail_to_pass
    origin: behavioral
    description: "Source file extracts setRightPanelShown from useConversationLocalStorageState"

  - id: test_test_file_includes_active_tab_test
    type: fail_to_pass
    origin: behavioral
    description: "Test file includes regression tests for active/non-active tab scenarios"

# Pass-to-pass tests: verify repo quality standards
  - id: test_vitest_context_menu_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's vitest tests for ConversationTabsContextMenu pass"

  - id: test_lint_passes
    type: pass_to_pass
    origin: agent_config
    source:
      file: "AGENTS.md"
      lines: "57-58"
      commit: "6dd9046ba29f5d22b045a28d7a34c9ecfc981eab"
    description: "Frontend linting passes (npm run lint:fix)"

  - id: test_typescript_compiles
    type: pass_to_pass
    origin: repo_tests
    description: "TypeScript compilation passes (tsc --noEmit)"

  - id: test_eslint_passes
    type: pass_to_pass
    origin: repo_tests
    description: "ESLint passes on frontend source (npx eslint src --ext .ts,.tsx,.js)"

  - id: test_prettier_check_passes
    type: pass_to_pass
    origin: repo_tests
    description: "Prettier formatting check passes (npx prettier --check)"

  - id: test_conversation_tabs_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Unit tests for conversation-tabs components pass"

  - id: test_conversation_store_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Unit tests for conversation-store pass"

# Note: This PR is a pure code fix with no config file changes.
# The rubric judge is designed for config edits (AGENTS.md, CLAUDE.md, etc.)
# and cannot evaluate source-only changes. The rubric section is required
# by the schema but these rules are validated through pytest instead.
rubric:
  - rule: "Source changes follow established frontend patterns"
    description: "Code changes should match existing patterns in the frontend codebase"

  - rule: "Tests updated to cover the fix"
    description: "New tests should be added for both active and non-active tab scenarios"

  - rule: "TypeScript compilation passes"
    description: "Changes must not introduce TypeScript compilation errors"

  - rule: "Lint and formatting checks pass"
    description: "Code must pass ESLint and Prettier checks"
