distractors:
- rule: Add ToolCapability in config.d.ts
  source:
    path: .claude/skills/playwright-mcp-dev/SKILL.md
    lines: '11'
  source_text: '- Add ToolCapability in `packages/playwright/src/mcp/config.d.ts`'
  collision_type: architecture_boundary
  why_distracting: The developer might think they need to add a new 'network' capability
    in config.d.ts, but the new tools reuse the existing 'core' capability. Modifying
    config.d.ts unnecessarily breaks architecture boundaries.
  severity: high
- rule: Place new MCP tests following the <category> pattern
  source:
    path: .claude/skills/playwright-mcp-dev/SKILL.md
    lines: '12'
  source_text: '- Place new tests in `tests/mcp/mcp-<category>.spec.ts`'
  collision_type: rule_conflict
  why_distracting: The developer might create a file strictly named tests/mcp/mcp-network.spec.ts
    (using the category), but the actual convention observed in the diff is to name
    it after the feature, e.g., tests/mcp/route.spec.ts.
  severity: medium
- rule: Update skill file and references
  source:
    path: .claude/skills/playwright-mcp-dev/SKILL.md
    lines: 25-26
  source_text: "- Update skill file at `packages/playwright/src/skill/SKILL.md` and\
    \ references if necessary\n  in `packages/playwright/src/skill/references/`"
  collision_type: scope_ambiguity
  why_distracting: A developer might try to add documentation for the new CLI commands
    into SKILL.md, but the gold diff explicitly avoids updating these user-facing
    skill docs, as the scope of this change does not include user documentation.
  severity: medium
- rule: Place new CLI tests following the cli-<category> pattern
  source:
    path: .claude/skills/playwright-mcp-dev/SKILL.md
    lines: '27'
  source_text: '- Place new tests in `tests/mcp/cli-<category>.spec.ts`'
  collision_type: rule_conflict
  why_distracting: A developer might try to create tests/mcp/cli-network.spec.ts using
    the category name, but the correct convention observed in the diff is to name
    it after the specific tool/feature, e.g., tests/mcp/cli-route.spec.ts.
  severity: medium
