    lines: 196-197
    commit: b0bba2d832f3cfd94b339a407f2b3e5b90ce3499
- rule: '`make style`: runs formatters and linters (ruff), necessary to pass code
    style checks'
  source:
    path: CLAUDE.md
    lines: 2-2
  evidence: The gold solution inserts `is_flash_attn_greater_or_equal_2_10` in strict
    alphabetical order in `src/transformers/utils/__init__.py` (between `is_flash_attn_greater_or_equal`
    and `is_flute_available`)
  category: style
distractors:
- rule: 'Fail-closed behavior for agents: If coordination evidence cannot be found,
    do not proceed to PR-ready output.'
  collision_type: meta_confusion
  why_distracting: The rule instructs the agent to fail-closed and refuse to generate
    PR-ready output if coordination evidence (like issue approval) is missing. In
    a benchmark or evaluation setting, the agent must output the fix regardless of
    missing GitHub context, otherwise it will fail the evaluation.
  severity: high
  source:
    path: CLAUDE.md
    lines: 56-59
- rule: 'Copies and Modular Models: manage code duplication in `src/transformers/models/`
    using `# Copied from` or `modular_<name>.py`.'
  collision_type: architecture_boundary
  why_distracting: The agent might attempt to manage code duplication using `# Copied
    from` comments or modular files, but this rule specifically applies to `src/transformers/models/`.
    The bug being fixed is in `src/transformers/utils/`, which is outside this architectural
    boundary.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 61-66
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` contain identical rules. The
  rules are heavily focused on contribution policies and repository management rather
  than specific coding conventions. The agent must distinguish between meta-instructions
  meant for real-world PR submission (which should be ignored in an evaluation context)
  and architectural rules (which only apply to specific directories like `models/`).
