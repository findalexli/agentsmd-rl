distractors:
- rule: If coordination evidence cannot be found, do not proceed to PR-ready output.
    In blocked cases, return a short explanation of what is missing.
  collision_type: meta_confusion
  why_distracting: The repository has a strict 'fail-closed' policy for AI agents.
    An agent might refuse to generate the patch and instead output a message asking
    for an issue link or coordination evidence, failing the benchmark task.
  severity: high
  source:
    path: AGENTS.md
    lines: 53-56
- rule: Do not open one-off PRs for tiny edits (single typo, isolated lint cleanup,
    one mutable default argument, etc.).
  collision_type: scope_ambiguity
  why_distracting: The agent might misclassify this small backward-compatibility fix
    (adding a 5-line helper function) as a 'tiny edit' and refuse to implement it
    based on the repository's policy against low-value busywork.
  severity: medium
  source:
    path: AGENTS.md
    lines: 38-40
hierarchy_analysis: The repository contains identical root-level agent instruction
  files (`AGENTS.md` and `CLAUDE.md`). These files contain strict meta-instructions
  dictating how AI agents should behave, specifically instructing them to refuse work
  if certain human-coordination criteria are not met. The agent must navigate these
  constraints to fulfill the user's direct coding request.
