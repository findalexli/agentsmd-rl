rubric:
- rule: Follow existing naming patterns when adding public methods - use get_* naming
    for accessors
  reference: test_public_get_metrics_router_addr validates get_metrics_router_addr
    naming
- rule: Public wrappers should delegate cleanly to private implementations without
    changing semantics
  reference: test_public_get_metrics_router_addr validates wrapper calls _get_metrics_router_addr
- rule: Bridge functions should delegate cleanly without unnecessary indirection
  reference: test_update_tracking_bridge_exists validates direct delegation to reinit_wandb_primary_with_open_metrics
- rule: 'WandB integration code must handle lifecycle correctly: finish before init,
    resume mode, early returns'
  reference: test_reinit_calls_wandb_finish_and_init, test_reinit_noop_when_no_router
    validate lifecycle handling
distractors:
- rule: If the task needs engine-based async generation and rewards, use the sglang
    path as base. If the task is file/buffer-driven and simple, use sft path as base.
  source:
    path: .claude/skills/add-rollout-function/SKILL.md
    lines: 27-28
  source_text: 'If the task needs engine-based async generation and rewards, use the
    sglang path as base.

    If the task is file/buffer-driven and simple, use sft path as base.'
  collision_type: architecture_boundary
  why_distracting: The issue involves SGLang Prometheus metrics and modifies `slime/ray/rollout.py`.
    An agent might mistakenly think it should modify the rollout generation logic
    (e.g. `sglang_rollout.py`) to extract metrics from the generation loop. However,
    SGLang metrics are exposed via the router's separate open metrics endpoint, so
    modifying the rollout generation path would be the wrong architectural approach.
  severity: high
- rule: Customize reward normalization/shaping using post_process_rewards in rollout.py
  source:
    path: .claude/skills/add-reward-function/SKILL.md
    lines: 58-69
  source_text: "def post_process_rewards(args, samples):\n    # return (raw_rewards,\
    \ processed_rewards)\n    ...\n```\n\nWire with:\n\n```bash\n--custom-reward-post-process-path\
    \ <module>.post_process_rewards\n```\n\nThis hook is consumed in `slime/ray/rollout.py`."
  collision_type: scope_ambiguity
  why_distracting: The diff modifies `slime/ray/rollout.py`. An agent scanning for
    rules related to this file might think it needs to use the reward post-processing
    hook to expose or manipulate metrics. However, this rule is strictly for RL reward
    shaping, whereas the task is to fix W&B logging for SGLang's engine metrics, which
    is completely unrelated to rewards.
  severity: medium
- rule: Add tests for new behavior following existing naming conventions
  source:
    path: .claude/skills/add-tests-and-ci/SKILL.md
    lines: 23-25
  source_text: '- Follow existing naming: `tests/test_<feature>.py`

    - Start from nearest existing test file for your model/path

    - Keep test scope small and behavior-focused'
  collision_type: scope_ambiguity
  why_distracting: The agent is fixing a bug related to metrics tracking. It might
    proactively try to write a test for this change. However, testing WandB initialization
    and Ray remote actor metric scraping in a distributed multi-process environment
    is highly complex and not requested by the user. The skill is intended for when
    the user explicitly asks for tests.
  severity: low
