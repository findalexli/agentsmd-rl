rubric:
  # Note: This is a pure code-change task (no config file modifications).
  # The rubric rules below are enforced through the test assertions in test_outputs.py
  # rather than LLM-based config file evaluation.
  - rule: "Follow existing naming patterns when adding public methods - use get_* naming for accessors"
    reference: "test_public_get_metrics_router_addr validates get_metrics_router_addr naming"

  - rule: "Public wrappers should delegate cleanly to private implementations without changing semantics"
    reference: "test_public_get_metrics_router_addr validates wrapper calls _get_metrics_router_addr"

  - rule: "Bridge functions should delegate cleanly without unnecessary indirection"
    reference: "test_update_tracking_bridge_exists validates direct delegation to reinit_wandb_primary_with_open_metrics"

  - rule: "WandB integration code must handle lifecycle correctly: finish before init, resume mode, early returns"
    reference: "test_reinit_calls_wandb_finish_and_init, test_reinit_noop_when_no_router validate lifecycle handling"
