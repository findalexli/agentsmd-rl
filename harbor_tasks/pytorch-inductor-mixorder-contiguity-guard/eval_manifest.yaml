      path: "CLAUDE.md"
      lines: "57"
      commit: "63fcbe1040ffef63e82abd4e66da1d7554d23aa4"

  - rule: "Don't make trivial (1-2 LOC) helper functions that are only used once unless it significantly improves code readability."
