distractors:
- rule: Minimize comments; be concise; code should be self-explanatory and self-documenting.
  collision_type: rule_conflict
  why_distracting: The agent might strictly follow this rule and omit the explanatory
    comment about the contiguity invariant. However, the invariant is enforced in
    a different class (`FusedMixOrderReductions.__init__`), making the local code
    non-self-explanatory without the comment.
  severity: medium
  source:
    path: CLAUDE.md
    lines: '44'
- rule: Once the change is passing, find an appropriate test file to add the test
    to and make sure to follow local conventions on the test file.
  collision_type: scope_ambiguity
  why_distracting: The reproduction requires a highly specific and complex setup (large
    asymmetric shape, split_reductions=False, specific op sequence). The gold solution
    omits the test, likely because it's too complex or flaky to add as a standard
    unit test. The agent might waste significant effort trying to fulfill this testing
    requirement.
  severity: high
  source:
    path: AGENTS.md
    lines: 3-6
- rule: Migrate a file to use stricter Pyrefly type checking with annotations required
    for all functions, classes, and attributes.
  source:
