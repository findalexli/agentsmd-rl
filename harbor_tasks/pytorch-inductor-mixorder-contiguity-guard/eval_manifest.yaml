    lines: 1-2
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to add strict type annotations to `sub_node_can_fuse`
    or other parts of `scheduler.py` while modifying it, which is out of scope for
    this bug fix and would bloat the PR.
  severity: medium
- rule: Write docstrings for PyTorch functions and methods following PyTorch conventions.
  source:
    path: .claude/skills/docstring/SKILL.md
    lines: 1-2
  collision_type: scope_ambiguity
  why_distracting: The agent might try to add or update the docstring for `sub_node_can_fuse`
