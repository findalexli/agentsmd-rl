- rule: Use single word names by default for new locals, params, and helper functions.
  source:
    path: AGENTS.md
    lines: 28-32
  evidence: The gold solution names the rest element `extra`, which is a single word,
    adhering to the strict naming convention for new locals.
  category: naming
- rule: Prefer `const` over `let`.
  source:
    path: AGENTS.md
    lines: 58-60
  evidence: The gold solution uses `const` for the destructuring assignment of `result`
    rather than `let`.
  category: style
distractors:
- rule: Avoid unnecessary destructuring. Use dot notation to preserve context.
  collision_type: rule_conflict
  why_distracting: To extract the `extra` fields while omitting specific keys like
    `type` and `provider`, destructuring with a rest element is the most idiomatic
    approach. Avoiding destructuring would force the agent to use cumbersome object
    manipulation (like `delete` or `Object.keys().filter()`).
  severity: high
  source:
    path: AGENTS.md
    lines: 51-53
- rule: Do not introduce new camelCase compounds when a short single-word alternative
    is clear.
  collision_type: rule_conflict
  why_distracting: The issue explicitly requires adding the `enterpriseUrl` field
    to support the OAuth callback. An agent strictly following the single-word naming
    rule might try to name the field `url` or `enterprise`, which would fail to meet
    the external API requirements.
  severity: high
  source:
    path: AGENTS.md
    lines: 28-32
- rule: Reduce total variable count by inlining when a value is only used once.
  collision_type: rule_conflict
  why_distracting: The gold solution extracts `refresh`, `access`, `expires`, and
    `extra` into variables via destructuring, even though they are only used once
    in the `auth.set` call. Trying to inline this logic to reduce variable count would
    result in unreadable code (e.g., inline filtering of object keys).
  severity: medium
  source:
    path: AGENTS.md
    lines: 42-44
hierarchy_analysis: The root `AGENTS.md` provides strict rules on naming, destructuring,
  and variable inlining. However, the specific requirements of this PR (extracting
  rest properties and adding a specific camelCase field `enterpriseUrl`) necessitate
  violating the destructuring and camelCase rules. The agent must recognize that language
  idioms (rest destructuring) and external API requirements (`enterpriseUrl`) override
  general stylistic guidelines.
