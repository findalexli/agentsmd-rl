distractors:
- rule: AVOID using `panic!`, `unreachable!`, `.unwrap()`, unsafe code, and clippy
    rule ignores
  collision_type: rule_conflict
  why_distracting: The existing code uses `.unwrap()` for URL parsing in the `manifest_urls`
    method. Trying to follow this rule by removing `.unwrap()` would require changing
    the method signature to return a `Result`, causing a cascading refactor across
    the codebase.
  severity: high
  source:
    path: CLAUDE.md
    lines: 8-8
- rule: ALWAYS attempt to add a test case for changed behavior
  collision_type: scope_ambiguity
  why_distracting: Testing network fallback logic and malformed manifest responses
    requires complex mocking of the Astral mirror and GitHub. The agent might waste
    significant time trying to write integration tests for this, whereas the gold
    solution correctly scopes the fix to just the implementation.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 3-3
hierarchy_analysis: The config hierarchy is flat with a single `CLAUDE.md` file. The
  agent must recognize that local consistency (using `.unwrap()` like the rest of
  the `manifest_urls` method) overrides the global rule to avoid `.unwrap()`. Additionally,
  the agent must use judgment to skip adding a test case despite the 'ALWAYS' directive,
  as testing network fallback logic is out of scope for this simple bug fix.
