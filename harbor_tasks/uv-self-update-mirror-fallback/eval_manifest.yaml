    commit: 7228ad62b9de7f9b5d887ef4b2be9bb033a04191
distractors:
- rule: AVOID using `panic!`, `unreachable!`, `.unwrap()`, unsafe code, and clippy
    rule ignores
  collision_type: rule_conflict
  why_distracting: The existing code uses `.unwrap()` when parsing known-valid URLs
    (e.g., `DisplaySafeUrl::parse(...).unwrap()`). If an agent strictly avoids `.unwrap()`,
    it might attempt to refactor the method signature to return a `Result` or add
    unnecessary error handling, breaking consistency with the adjacent `Ruff` match
    arm.
  severity: high
  source:
    path: CLAUDE.md
    lines: 7-7
- rule: ALWAYS attempt to add a test case for changed behavior
  collision_type: scope_ambiguity
  why_distracting: Testing the network fallback logic for `uv self update` would require
    mocking the Astral mirror and GitHub CDN responses (including malformed responses).
    Attempting to add a test case for this specific resilience fix would likely lead
    to wasted effort or overly complex test setup.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 2-2
hierarchy_analysis: The CLAUDE.md file provides general guidelines. However, local
  consistency (using `.unwrap()` for static URL parsing) overrides the general rule
  to avoid `.unwrap()`. Additionally, the directive to always add tests is impractical
  for this specific network-level fallback fix.
