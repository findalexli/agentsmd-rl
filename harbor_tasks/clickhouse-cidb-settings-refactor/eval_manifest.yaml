checks:
- id: syntax_valid
  type: pass_to_pass
  description: Verifies the file has valid Python syntax
  origin: pr_diff
- id: no_hardcoded_secret_names
  type: fail_to_pass
  description: Hardcoded secret names like 'clickhouse-test-stat-url' should be removed
  origin: pr_diff
- id: settings_imported
  type: fail_to_pass
  description: Settings should be imported from ci.praktika.settings
  origin: pr_diff
- id: info_imported
  type: fail_to_pass
  description: Info should be imported from ci.praktika.info
  origin: pr_diff
- id: settings_constants_used
  type: fail_to_pass
  description: Should use Settings.SECRET_CI_DB_URL, SECRET_CI_DB_USER, SECRET_CI_DB_PASSWORD
  origin: pr_diff
- id: info_get_secret_used
  type: fail_to_pass
  description: Should use info.get_secret() pattern instead of Secret.Config().get_value()
  origin: pr_diff
- id: cidb_initialized_with_variables
  type: pass_to_pass
  description: CIDB should be initialized with url/user/pwd variables
  origin: pr_diff
- id: no_secret_class_import
  type: fail_to_pass
  description: Should not import Secret directly from ci.praktika
  origin: pr_diff
- id: repo_black_formatting
  type: pass_to_pass
  description: Black formatting check passes on the modified file
  origin: repo_tests
- id: repo_python_ast_valid
  type: pass_to_pass
  description: Python files have valid AST
  origin: repo_tests
- id: repo_python_syntax
  type: pass_to_pass
  description: Python file has valid syntax (py_compile)
  origin: repo_tests
- id: repo_ci_pytest_xfail
  type: pass_to_pass
  description: CI internal tests for pytest result parsing pass
  origin: repo_tests
rubric:
- rule: When mentioning logical errors, say 'exception' instead of 'crash'
  source:
    path: .claude/CLAUDE.md
- rule: Write names of functions and methods without parentheses
  source:
    path: .claude/CLAUDE.md
- rule: Wrap literal names from ClickHouse code inside inline code blocks
  source:
    path: .claude/CLAUDE.md
distractors:
- rule: Links to ClickHouse CI should be analyzed using the tool at .claude/tools/fetch_ci_report.js
    (which has options like --cidb for CIDB links).
  collision_type: meta_confusion
  why_distracting: The task requires refactoring how the CI database (CIDB) secrets
    are loaded in a Python script. The rule instructs using a specific tool to analyze
    'CIDB links' in CI reports. An agent might be distracted by the 'CIDB' keyword
    and incorrectly assume it needs to fetch or analyze CI reports using the tool
    rather than modifying the Python source code.
  severity: medium
  source:
    path: AGENTS.md
    lines: 18-22
hierarchy_analysis: The AGENTS.md file contains general repository guidelines and
  tool instructions. Since the task is a straightforward Python refactoring job, most
  of the rules in AGENTS.md (which focus on git workflow, documentation formatting,
  and CI analysis tools) do not apply directly to the code changes.
version: '2.0'
