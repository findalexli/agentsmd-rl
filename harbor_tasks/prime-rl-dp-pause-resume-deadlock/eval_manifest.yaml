version: "2.0"

source:
  repo: "PrimeIntellect-ai/prime-rl"
  pr: 2099
  base_commit: "c2b99e69ce31c71261f56c97fbd2ed467258f940"
  merge_commit: "b92c2128ddeb679c23954c2bf6825e4d6659d501"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "patches.py must be valid Python syntax"

  - id: unpaused_old_wave_sends_notification
    type: fail_to_pass
    origin: pr_diff
    description: "Unpaused + old wave sends start_wave notification with engines_running=True"

  - id: new_wave_updates_current_wave
    type: fail_to_pass
    origin: pr_diff
    description: "current_wave updated to request_wave when request_wave > current_wave"

  - id: paused_old_wave_no_notification
    type: pass_to_pass
    origin: pr_diff
    description: "Paused + old wave does NOT send notification (avoids deadlock)"

  - id: already_running_no_duplicate
    type: pass_to_pass
    origin: pr_diff
    description: "Already running + old wave does NOT send duplicate notification"

  - id: same_wave_noop
    type: pass_to_pass
    origin: pr_diff
    description: "Same wave request is a no-op (no notification, no state change)"

  - id: wired_into_compat
    type: fail_to_pass
    origin: pr_diff
    description: "New patch function is called from transformers_v5_compat"

  - id: existing_functions_present
    type: pass_to_pass
    origin: repo_tests
    description: "transformers_v5_compat and _patch_qwen35_lora still defined"

  - id: no_coordinator_noop
    type: pass_to_pass
    origin: pr_diff
    description: "has_coordinator=False means no wave logic runs at all"

  - id: no_unnecessary_try_except
    type: fail_to_pass
    origin: agent_config
    description: "New patch function does not use try/except blocks"
    source:
      path: "AGENTS.md"
      lines: "5"
      commit: "c2b99e69ce31c71261f56c97fbd2ed467258f940"

  - id: repo_ruff_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ruff linting passes on patches.py"

  - id: repo_ruff_format
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ruff format check passes on patches.py"

rubric:
  - rule: "Do not add unnecessary comments. Especially do not try to explain code change that reflect your work process, do not refer to old code."
    source:
      path: "AGENTS.md"
      lines: "7"
      commit: "c2b99e69ce31c71261f56c97fbd2ed467258f940"
