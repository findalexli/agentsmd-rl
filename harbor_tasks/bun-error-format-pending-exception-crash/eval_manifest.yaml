rubric:
- rule: Follow existing code style. Check neighboring files for patterns.
  source:
    path: src/CLAUDE.md
    lines: '228'
    commit: f6528b58ed67c8fb8c80046114829d9ad79a292f
- rule: In Zig code, be careful with allocators and use defer for cleanup.
  source:
    path: src/CLAUDE.md
    lines: '232'
    commit: f6528b58ed67c8fb8c80046114829d9ad79a292f
- rule: Never use `@import()` inline inside of functions. Always put them at the bottom
    of the file or containing struct.
  source:
    path: src/CLAUDE.md
    lines: 10-11
  evidence: 'The gold solution calls `this.clearExceptionExceptTermination()` directly
    on the existing object without attempting to add any inline `@import()` statements
    to bring in external dependencies or error '
  category: style
distractors:
- rule: Always use `bun.*` APIs instead of `std.*`.
  collision_type: scope_ambiguity
  why_distracting: The existing code in `createErrorInstance` uses `std.Io.Writer.Allocating.initCapacity`.
    An agent might see this and attempt to refactor it to a `bun.*` API to comply
    with the rule, which is out of scope for this bug fix and could introduce regressions.
  severity: medium
  source:
    path: src/CLAUDE.md
    lines: 15-26
- rule: NEVER write tests that check for no 'panic' or 'uncaught exception' or similar
    in the test output.
  collision_type: would_cause_bug
  why_distracting: Because the bug describes a crash (assertion failure), an agent
    writing a regression test might naturally try to assert that the process output
    does not contain 'panic' or 'crash'. The rule explicitly forbids this because
    such tests silently pass in CI.
  severity: high
  source:
    path: CLAUDE.md
    lines: 69-70
- rule: If a test is for a specific numbered GitHub Issue, it should be placed in
    `test/regression/issue/${issueNumber}.test.ts`. Ensure the issue number is REAL
    and not a placeholder!
  collision_type: meta_confusion
  why_distracting: The bug description does not provide a GitHub issue number. An
    agent might try to create a placeholder issue file (e.g., `test/regression/issue/9999.test.ts`)
    despite the rule explicitly forbidding placeholders, rather than using the fallback
    directories.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 23-24
hierarchy_analysis: The config hierarchy consists of identical root and level 1 files
  (`CLAUDE.md` and `AGENTS.md`). The root files focus heavily on testing conventions
  and build commands, while the `src/` level files focus on Zig-specific coding standards
  and the `bun.sys` API. There are no direct conflicts between the levels, but the
  strict testing rules in the root config create significant distractors for an agent
  trying to write a test for a crash without an issue number.
