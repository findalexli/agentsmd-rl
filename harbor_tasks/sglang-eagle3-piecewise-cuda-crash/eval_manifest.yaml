version: "2.0"

source:
  repo: "sgl-project/sglang"
  pr: 21565
  base_commit: "aa9177152ec7057dff4fd8f210dd6a42e96dac5d"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Target file must parse without syntax errors"

  - id: repo_ruff_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ruff lint check passes (F401, F821) on target file"

  - id: no_crash_missing_layers
    type: fail_to_pass
    origin: pr_diff
    description: "Model without 'layers' attr must not raise AttributeError in init_piecewise_cuda_graphs"

  - id: no_spurious_extraction_layerless
    type: fail_to_pass
    origin: pr_diff
    description: "Layerless model must not produce populated attention_layers list"

  - id: layers_extracted_standard_model
    type: pass_to_pass
    origin: pr_diff
    description: "Model WITH standard layers attribute still gets attention layers extracted"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "init_piecewise_cuda_graphs has real logic, not stubbed out"

rubric: []
  # No applicable soft rules — all config files in this repo are specialized
  # skills scoped to CUDA kernels, profiling, CI, test authoring, or the
  # multimodal_gen subsystem. None cover model_runner.py code quality.
