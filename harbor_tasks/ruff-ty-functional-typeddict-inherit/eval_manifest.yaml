version: "2.0"

source:
  repo: "astral-sh/ruff"
  pr: 24227
  base_commit: "3465d7f1a2ed13c03aeca5f9b2d764b00ab0ab32"
  merge_commit: "9f5784ab2e4e98f6bb7cb5e9442ea78790f8ccd9"

checks:
  - id: cargo_check
    type: pass_to_pass
    origin: static
    description: "Modified Rust code must compile"

  - id: functional_typeddict_fields_inherited
    type: fail_to_pass
    origin: pr_diff
    description: "Child class inherits fields (a, b, c) from functional TypedDict parent without false errors"

  - id: required_field_enforced_from_functional_parent
    type: fail_to_pass
    origin: pr_diff
    description: "Required fields from functional TypedDict parent are enforced in child constructor"

  - id: functional_subclass_with_not_required
    type: fail_to_pass
    origin: pr_diff
    description: "Functional TypedDict subclass with NotRequired qualifier compiles cleanly"

  - id: total_false_optional_field_accessible
    type: fail_to_pass
    origin: pr_diff
    description: "Optional fields from functional parent (total=False) can be provided and typed correctly"

  - id: dataclass_inherits_functional_typeddict
    type: fail_to_pass
    origin: pr_diff
    description: "@dataclass on a class inheriting from functional TypedDict triggers invalid-dataclass diagnostic"

  - id: class_based_typeddict_inheritance_baseline
    type: pass_to_pass
    origin: repo_tests
    description: "Existing class-based TypedDict inheritance must not regress"

  - id: existing_typed_dict_mdtests
    type: pass_to_pass
    origin: repo_tests
    description: "Upstream TypedDict mdtests must still pass"

  - id: no_unwrap_in_new_code
    type: pass_to_pass
    origin: agent_config
    description: "No .unwrap() in newly added Rust code"
    source:
      path: "AGENTS.md"
      lines: "79"
      commit: "3465d7f1a2ed13c03aeca5f9b2d764b00ab0ab32"

  - id: no_local_rust_imports
    type: pass_to_pass
    origin: agent_config
    description: "Rust imports must be at top of file, not locally in functions"
    source:
      path: "AGENTS.md"
      lines: "76"
      commit: "3465d7f1a2ed13c03aeca5f9b2d764b00ab0ab32"

rubric:
  - rule: "Avoid writing significant amounts of new code. This is often a sign that we're missing an existing method or mechanism that could help solve the problem. Look for existing utilities first."
    source:
      path: "AGENTS.md"
      lines: "78"
      commit: "3465d7f1a2ed13c03aeca5f9b2d764b00ab0ab32"

  - rule: "Prefer let chains (if let combined with &&) over nested if let statements to reduce indentation and improve readability."
    source:
      path: "AGENTS.md"
      lines: "80"
      commit: "3465d7f1a2ed13c03aeca5f9b2d764b00ab0ab32"

  - rule: "If you have to suppress a Clippy lint, prefer #[expect()] over #[allow()], where possible. If a lint is complaining about unused/dead code, just delete the unused code."
    source:
      path: "AGENTS.md"
      lines: "81"
      commit: "3465d7f1a2ed13c03aeca5f9b2d764b00ab0ab32"

  - rule: "Use comments purposefully. Don't use comments to narrate code, but do use them to explain invariants and why something unusual was done a particular way."
    source:
      path: "AGENTS.md"
      lines: "82"
      commit: "3465d7f1a2ed13c03aeca5f9b2d764b00ab0ab32"

  - rule: "Any method that accesses .node() must be #[salsa::tracked], or it will break incrementality. Prefer higher-level semantic APIs over raw AST access."
    source:
      path: "AGENTS.md"
      lines: "84"
      commit: "3465d7f1a2ed13c03aeca5f9b2d764b00ab0ab32"
