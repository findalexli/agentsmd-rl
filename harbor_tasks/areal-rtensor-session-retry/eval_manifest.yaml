rubric:
- rule: Follow existing code patterns in the same module
  source:
    path: AGENTS.md
    lines: '40'
    commit: 9639749e700ea278e0617589391cc3dda6ec3a5c
- rule: Prefer composition over inheritance -- keep class hierarchies <= 2 levels; use delegation when adding behavior.
  source:
    path: AGENTS.md
    lines: '80'
    commit: 9639749e700ea278e0617589391cc3dda6ec3a5c
- rule: 'Logging: `areal.utils.logging.getLogger(name)` with PascalCase names -- never `print` or `logging.__name__`.'
  source:
    path: AGENTS.md
    lines: 48-49
  evidence: The gold solution creates the logger using `logger = logging.getLogger("HttpRTensor")`, strictly following the PascalCase naming convention and using the custom logging module.
  category: style
- rule: Follow existing code patterns in the same module.
  source:
    path: CLAUDE.md
    lines: 48-49
  evidence: The gold solution imports and reuses `DEFAULT_REQUEST_TIMEOUT` and `get_default_connector` from `areal.infra.utils.http` instead of hardcoding new timeout and connector settings.
  category: architecture
distractors:
- rule: 'Per-rank format: `[{Component} Rank {N}]`.'
  collision_type: architecture_boundary
  why_distracting: The rule specifies a per-rank log format `[{Component} Rank {N}]`. An agent might try to manually prepend this to the warning message, but the custom logger likely handles this formatting internally, or rank information is not accessible/relevant in this specific HTTP backend context.
  severity: high
  source:
    path: AGENTS.md
    lines: 69-70
- rule: Add tests for new functionality.
  collision_type: scope_ambiguity
  why_distracting: The rule requires adding tests for new functionality, which might lead the agent to write complex mock-based async tests for the retry logic. However, this is a bug fix for an existing feature, and the gold solution correctly scopes the PR to just the fix.
  severity: medium
  source:
    path: AGENTS.md
    lines: '29'
hierarchy_analysis: Both `AGENTS.md` and `CLAUDE.md` are at the root level and contain overlapping rules. `AGENTS.md` provides more specific guidance on logging conventions (PascalCase, `areal.utils.logging.getLogger`) which the agent must prioritize over generic Python logging practices.
