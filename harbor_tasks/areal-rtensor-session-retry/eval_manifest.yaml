- rule: 'Logging: `areal.utils.logging.getLogger(name)` with PascalCase names -- never
    `print` or `logging.__name__`.'
  source:
    path: AGENTS.md
    lines: 48-49
  evidence: The gold solution creates the logger using `logger = logging.getLogger("HttpRTensor")`,
    strictly following the PascalCase naming convention and using the custom logging
    module.
  category: style
- rule: Follow existing code patterns in the same module.
  source:
    path: CLAUDE.md
    lines: 48-49
  evidence: The gold solution imports and reuses `DEFAULT_REQUEST_TIMEOUT` and `get_default_connector`
    from `areal.infra.utils.http` instead of hardcoding new timeout and connector
    settings.
  category: architecture
distractors:
- rule: Add tests for new functionality.
  collision_type: scope_ambiguity
  why_distracting: This is a bug fix for network resilience, not new functionality.
    Attempting to add tests for this retry logic would require complex `aiohttp` mocking
    or spinning up a local test server, which is out of scope and overcomplicates
    the PR.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 49-50
- rule: No hardcoded secrets, paths, or endpoints.
  collision_type: scope_ambiguity
  why_distracting: The agent might see `url = f"http://{node_addr}/data/{shard_id}"`
    and try to extract the `/data/` path or HTTP scheme into a configuration file.
    This rule is meant for external API endpoints and secrets, not internal RPC routing
    paths.
  severity: low
  source:
    path: AGENTS.md
    lines: 18-19
- rule: No GPU-CPU sync in hot paths (`.item()`, `.tolist()`, `print(tensor)`).
  collision_type: scope_ambiguity
  why_distracting: The agent might consider tensor fetching a 'hot path' and try to
    optimize the deserialization or avoid CPU operations. However, this is network
    I/O where network latency dominates, and CPU processing of the payload is necessary
    and expected.
  severity: low
  source:
    path: AGENTS.md
    lines: 52-53
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` apply cumulatively. `AGENTS.md`
  provides more specific, actionable rules for logging and performance, which complement
  the general guidelines in `CLAUDE.md`. There are no direct conflicts between the
  two files, but `AGENTS.md`'s strict logging rules dictate the exact implementation
  of the logger in the gold solution.
