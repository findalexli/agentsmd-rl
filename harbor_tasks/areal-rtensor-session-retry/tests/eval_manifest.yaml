distractors:
- rule: 'Per-rank format: `[{Component} Rank {N}]`.'
  collision_type: architecture_boundary
  why_distracting: The rule specifies a per-rank log format `[{Component} Rank {N}]`.
    An agent might try to manually prepend this to the warning message, but the custom
    logger likely handles this formatting internally, or rank information is not accessible/relevant
    in this specific HTTP backend context.
  severity: high
  source:
    path: AGENTS.md
    lines: 69-70
- rule: Add tests for new functionality.
  collision_type: scope_ambiguity
  why_distracting: The rule requires adding tests for new functionality, which might
    lead the agent to write complex mock-based async tests for the retry logic. However,
    this is a bug fix for an existing feature, and the gold solution correctly scopes
    the PR to just the fix.
  severity: medium
  source:
    path: AGENTS.md
    lines: '29'
hierarchy_analysis: Both `AGENTS.md` and `CLAUDE.md` are at the root level and contain
  overlapping rules. `AGENTS.md` provides more specific guidance on logging conventions
  (PascalCase, `areal.utils.logging.getLogger`) which the agent must prioritize over
  generic Python logging practices.
