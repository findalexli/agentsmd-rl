version: "2.0"

source:
  repo: "{{OWNER}}/{{REPO}}"
  pr: 0  # {{PR_NUMBER}}
  base_commit: "{{BASE_COMMIT}}"
  merge_commit: "{{MERGE_COMMIT}}"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified Python files must parse without errors (py_compile)"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "Modified function _is_lora_case has real logic, not just pass/return"

  - id: existing_tests_pass
    type: pass_to_pass
    origin: repo_tests
    description: "Upstream test files are syntactically valid"

  - id: test_ruff_check
    type: pass_to_pass
    origin: repo_tests
    description: "Ruff linting passes on modified file (CI standard)"

  - id: test_black_format
    type: pass_to_pass
    origin: repo_tests
    description: "Black formatting check passes on modified file (CI standard)"

  - id: test_isort_check
    type: pass_to_pass
    origin: repo_tests
    description: "isort import ordering check passes on modified file (CI standard)"

  - id: core_bug_fixed
    type: fail_to_pass
    origin: pr_diff
    description: "LoRA GT cases use normal backend path while non-LoRA GT uses diffusers backend"

  - id: edge_case
    type: fail_to_pass
    origin: pr_diff
    description: "Dynamic LoRA loading check runs in both GT and non-GT modes"

  # Uncomment and fill if agent config rules exist:
  # - id: config_rule
  #   type: fail_to_pass
  #   origin: agent_config
  #   description: "TODO: rule from agent config"
  #   source:
  #     path: "AGENTS.md"
  #     lines: "30"
  #     commit: "{{BASE_COMMIT}}"

  - id: test_codespell
    type: pass_to_pass
    origin: repo_tests
    description: "Codespell spell check passes on modified file (CI standard)"

  - id: test_pre_commit_check_ast
    type: pass_to_pass
    origin: repo_tests
    description: "Pre-commit check-ast passes on modified file (CI standard)"

  - id: test_pre_commit_debug_statements
    type: pass_to_pass
    origin: repo_tests
    description: "Pre-commit debug-statements check passes on modified file (CI standard)"

rubric:
  # Rules about test code quality - checking the actual code in the modified file
  - rule: "Modified code should include explanatory comments describing why changes were made, not just what the code does."
    reference: "# Keep LoRA GT on the normal backend path so adapter state matches CI."

  - rule: "Helper functions should have clear, descriptive names that indicate their purpose."
    reference: "def _is_lora_case(case: DiffusionTestCase) -> bool:"
