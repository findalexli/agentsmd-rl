distractors:
- rule: TypeScript strict mode with extensive type safety
  collision_type: rule_conflict
  why_distracting: The PR explicitly requests a `.mjs` file (`upsert-pr-comment.mjs`),
    which is a JavaScript module. Applying the TypeScript rule would lead the agent
    to create a `.ts` file instead, violating the PR requirements.
  severity: high
  source:
    path: AGENTS.md
    lines: 20-20
- rule: 'Critical: Always run unit and type tests during development - do not proceed
    if they fail'
  collision_type: scope_ambiguity
  why_distracting: The PR is for a simple utility script in the `scripts/` directory.
    The agent might waste time trying to write unit tests for this script or get stuck
    trying to run the test suite for a standalone script that isn't integrated into
    the main testing graph.
  severity: medium
  source:
    path: AGENTS.md
    lines: 53-53
hierarchy_analysis: Only AGENTS.md is present. The rules in AGENTS.md are heavily
  focused on the core library (TypeScript, Nx, testing), which creates scope ambiguity
  when the agent is asked to write a standalone Node.js script in the scripts/ directory.
