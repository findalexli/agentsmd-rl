rubric:
- rule: Use Node.js built-in modules with the 'node:' prefix (e.g., 'node:fs', 'node:path',
    'node:util').
  source:
    path: AGENTS.md
    lines: 18-24
    commit: 13ef4c2e7c92e276185c112d486248b7447535de
- rule: Include the shebang '#!/usr/bin/env node' at the top of executable scripts.
  source:
    path: AGENTS.md
    lines: 18-24
    commit: 13ef4c2e7c92e276185c112d486248b7447535de
- rule: Validate required CLI arguments and environment variables with clear error
    messages.
  source:
    path: AGENTS.md
    lines: 18-24
    commit: 13ef4c2e7c92e276185c112d486248b7447535de
distractors:
- rule: TypeScript strict mode with extensive type safety
  collision_type: rule_conflict
  why_distracting: The task explicitly requires creating a `.mjs` (JavaScript) file.
    An agent following the 'TypeScript strict mode' rule might erroneously create
    a `.ts` file or attempt to add complex JSDoc typings, conflicting with the simple
    ES module script requirement.
  severity: high
  source:
    path: AGENTS.md
    lines: 14-15
- rule: 'Critical: Always run unit and type tests during development - do not proceed
    if they fail'
  collision_type: scope_ambiguity
  why_distracting: This is a standalone utility script for CI benchmarks. An agent
    strictly following the testing instructions might waste time trying to write Nx-compatible
    unit tests for this script or get stuck running the entire monorepo test suite.
  severity: medium
  source:
    path: AGENTS.md
    lines: 45-46
hierarchy_analysis: The repository has a single root-level AGENTS.md file. The rules
  within it are heavily tailored towards the main TanStack Router packages (TypeScript,
  Nx, React/Solid). The agent must recognize that these global application-level rules
  do not apply to standalone utility scripts in the `scripts/` directory.
version: '2.0'
