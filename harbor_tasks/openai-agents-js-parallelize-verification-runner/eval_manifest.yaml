version: '2.0'
source:
  pr_url: https://github.com/openai/openai-agents-js/pull/1120
  owner: openai
  repo: openai-agents-js
  pr_number: 1120
  base_commit: 05dd513231c04ffb6013a25118605a7a72a9a063
