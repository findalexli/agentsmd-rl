distractors:
- rule: You are responsible for maintaining the skills folder... keeping the skills
    up to date whenever you or anyone else modifies the code.
  collision_type: meta_confusion
  why_distracting: The agent might try to edit `skills/toml-config` or `.claude/skills/toml-config`
    to document the new serialization behavior for `None` values, but the gold solution
    only modifies the Python source files.
  severity: high
  source:
    path: AGENTS.md
    lines: 45-49
- rule: Write tests as plain functions with pytest fixtures.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to add tests for the new config serialization
    behavior in a test file, but the gold solution only modifies the implementation
    files.
  severity: medium
  source:
    path: AGENTS.md
    lines: 51-52
- rule: Use the string '"None"' in TOML to set a field to None.
  source:
    path: skills/toml-config/SKILL.md
    lines: 46-52
  collision_type: rule_conflict
  why_distracting: The skill explicitly instructs using the literal string '"None"'
    to represent None values in TOML. An agent might read this and believe it must
    preserve the '"None"' string output during serialization to comply with the project's
    TOML conventions, conflicting with the PR instruction to omit None fields entirely.
  severity: high
hierarchy_analysis: The config hierarchy is flat, with all rules defined in `AGENTS.md`
  (referenced by `CLAUDE.md`). The agent must apply general Python guidelines while
  avoiding the temptation to over-apply meta-instructions regarding skill maintenance.
