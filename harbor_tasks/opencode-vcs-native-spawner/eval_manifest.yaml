- rule: '`Effect.fn` / `Effect.fnUntraced` accept pipeable operators as extra arguments,
    so avoid unnecessary outer `.pipe()` wrappers.'
  source:
    path: packages/opencode/AGENTS.md
    lines: '18'
  evidence: The gold solution passes `Effect.scoped` and `Effect.catch(...)` as the
    second and third arguments to `Effect.fnUntraced` for the `git` helper, avoiding
    an outer `.pipe()` wrapper.
  category: style
distractors:
- rule: Prefer single word names for variables and functions. Use single word names
    by default for new locals, params, and helper functions.
  collision_type: rule_conflict
  why_distracting: The original code used a single-word helper `const get = async
    () => ...`. The gold solution renames this to `getBranch`. An agent strictly following
    the single-word naming rule might keep it as `get` (which is vague) or rename
    it to `branch` (which shadows the exported `branch()` function), leading to less
    readable code.
  severity: medium
  source:
    path: AGENTS.md
    lines: 18-26
- rule: Avoid `try`/`catch` where possible
  collision_type: scope_ambiguity
  why_distracting: The agent might avoid using `Effect.catch` to handle the git process
    failure because of the general 'Avoid try/catch' rule. However, `Effect.catch`
    is the correct, native way to handle expected failures in Effect pipelines, and
    avoiding it would lead to unhandled defects or awkward error handling.
  severity: medium
  source:
    path: AGENTS.md
    lines: '11'
- rule: Use `Effect.addFinalizer` or `Effect.acquireRelease` inside the `InstanceState.make`
    closure for cleanup (subscriptions, process teardown, etc.).
  collision_type: would_cause_bug
  why_distracting: The agent might try to manually add an `Effect.addFinalizer` for
    the spawned git process inside the `InstanceState.make` closure. However, `ChildProcessSpawner`
    already manages process lifecycle via Effect's scope, and the `git` helper is
    marked with `Effect.scoped`, making manual teardown redundant and potentially
    buggy.
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: '31'
hierarchy_analysis: The hierarchy consists of a root `AGENTS.md` providing general
  TypeScript/Node conventions and a package-specific `packages/opencode/AGENTS.md`
  providing strict Effect-specific patterns. The Effect-specific rules in the package
  config must take precedence over general TS rules (e.g., Effect error handling vs
  general try/catch avoidance). Additionally, the strict single-word naming rule in
  the root config conflicts with the need for clarity in the Effect helper (`getBranch`),
  requiring the agent to apply the exception clause ('unless a single word would be
  unclear').
