distractors:
- rule: Run backend tests locally with `bash scripts/run_backend_tests.sh`.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to run Python backend tests for a change that
    only affects the Node.js frontend build pipeline, wasting time on irrelevant test
    suites.
  severity: low
  source:
    path: AGENTS.md
    lines: 28-29
- rule: Write comprehensive, behaviour-driven unit tests for Gradio frontend Svelte
    components using Vitest browser mode, Playwright...
  collision_type: architecture_boundary
  why_distracting: The agent might attempt to write a browser-based or Svelte component
    test for `build.ts`, which is actually a Node.js CLI build script, not a UI component.
  severity: medium
  source:
    path: .claude/skills/frontend-unit-testing
    lines: 1-2
- rule: Test everything
  source:
    path: /workspace/repo/.agents/skills/frontend-unit-testing/SKILL.md
    lines: 12-12
  source_text: 1. **Test everything.** Unit tests are cheap. Having too many is a
    problem we want to have. When in doubt, write the test. Multiple tests per feature/argument
    is fine and encouraged.
  collision_type: architecture_boundary
  why_distracting: Since the patch modifies a TypeScript file in the `js/` directory,
    an agent reading this rule might incorrectly conclude it needs to write frontend
    unit tests using the `@self/tootils/render` testing library. However, `build.ts`
    is a Node.js build configuration script, not a Svelte frontend component, and
    such tests would fail.
  severity: high
- rule: Custom HTML Components
  source:
    path: /workspace/repo/.agents/skills/gradio/SKILL.md
    lines: 112-112
  source_text: If a task requires significant customization of an existing component
    or a component that doesn't exist in Gradio, you can create one with `gr.HTML`.
    It supports `html_template` (with `${}` JS expressions and `{{}}` Handlebars syntax),
    `css_template` for scoped styles, and `js_on_load` for interactivity — where `props.value`
    updates the component value and `trigger('event_name')` fires Gradio events. For
    reuse, subclass `gr.HTML` and define `api_info()` for API/MCP support. See the
    [full guide](https://www.gradio.app/guides/custom-HTML-components).
  collision_type: scope_ambiguity
  why_distracting: The patch references `pkg.exports["./example"].gradio` and `svelte_runtime_entry.js`,
    dealing with component compilation via TypeScript build logic. An agent reading
    about 'customization of an existing component' might mistakenly attempt to use
    the `gr.HTML` Python wrapper with `js_on_load` instead of addressing the actual
    frontend build pipeline.
  severity: medium
