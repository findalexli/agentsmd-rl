distractors:
- rule: Do not open one-off PRs for tiny edits (single typo, isolated lint cleanup,
    one mutable default argument, etc.).
  collision_type: scope_ambiguity
  why_distracting: The fix for this crash is very small (modifying a single array
    element construction). An agent might misinterpret this critical bug fix as a
    'tiny edit' or 'low-value busywork' and either refuse to generate the fix or attempt
    to bundle it with unrelated mechanical cleanups.
  severity: high
  source:
    path: AGENTS.md
    lines: 53-55
- rule: Tests must pass. Run backend tests locally with `bash scripts/run_backend_tests.sh`.
  collision_type: architecture_boundary
  why_distracting: The modified file `js/preview/src/build.ts` is part of the frontend/Node.js
    build pipeline. Instructing the agent to run backend tests (`bash scripts/run_backend_tests.sh`)
    for a frontend build script change crosses architectural boundaries and would
    waste time or cause confusion if backend tests fail for unrelated reasons.
  severity: medium
  source:
    path: AGENTS.md
    lines: 28-29
hierarchy_analysis: The repository has a single root-level `AGENTS.md` file. The rules
  are generally broad and PR-focused. The main conflict arises from the definition
  of 'tiny edits' versus critical but small bug fixes, and the blanket instruction
  to run backend tests which does not apply to this frontend TypeScript change.
