source_pr:
  owner: ClickHouse
  repo: ClickHouse
  number: 101934
  title: "Fix sparseGrams generating longer tokens than the max length"
  merge_commit: 7385689a1e28dbc564bc4ea0d22dc861aef72fda
  base_commit: 64b0a83ca8c950b0efa6a5972ec0f1ce3d622fd6

task_metadata:
  name: clickhouse-sparsegrams-max-length
  description: Fix sparseGrams tokenizer generating longer tokens than the provided max length
  primary_language: cpp
  difficulty: medium
  estimated_time_minutes: 30

# Each check maps 1:1 to a test_* function in test_outputs.py
checks:
  - id: test_sparsegrams_length_constraint_bug
    type: fail_to_pass
    origin: regression
    description: >
      The length calculation in consume() must use 'min_ngram_length - 1' instead of hardcoded '+ 2'.
      This ensures tokens respect max_ngram_length when min_ngram_length != 3.

  - id: test_min_ngram_length_used_correctly
    type: fail_to_pass
    origin: regression
    description: >
      All length calculations in the consume() function must use min_ngram_length variable,
      not hardcoded constants.

  - id: test_logic_calculation_correct
    type: fail_to_pass
    origin: regression
    description: >
      The mathematical logic of the fix must be correct: the new formula produces
      different (correct) results compared to the old hardcoded + 2.

  - id: test_source_code_fix_applied
    type: structural
    origin: agent_config
    description: >
      The fix replaces hardcoded '+ 2' with '+ min_ngram_length - 1' in sparseGramsImpl.h.
      This check is gated by behavioral tests passing first.

  - id: test_convex_hull_logic_preserved
    type: pass_to_pass
    origin: repo_tests
    description: >
      The fix must preserve the existing convex hull iteration logic and control flow.

  # Pass-to-pass tests derived from the repo's actual CI
  - id: test_repo_cpp_style_check
    type: pass_to_pass
    origin: repo_tests
    description: >
      ClickHouse C++ style check passes on modified file.
      Uses ci/jobs/scripts/check_style/check_cpp.sh.

  - id: test_repo_submodules_check
    type: pass_to_pass
    origin: repo_tests
    description: >
      Git submodules configuration validation passes.
      Uses ci/jobs/scripts/check_style/check_submodules.sh.

  - id: test_repo_various_checks
    type: pass_to_pass
    origin: repo_tests
    description: >
      SQL test style validation passes.
      Uses ci/jobs/scripts/check_style/various_checks.sh.

# Rubric for soft/subjective rules from agent configs
