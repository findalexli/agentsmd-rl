distractors:
- rule: Backend and API changes (with tests and API doc changes documented fully using
    the tools/create-api-changelog double-entry changelog system)
  collision_type: scope_ambiguity
  why_distracting: The rule requires backend and API changes to be documented using
    the `tools/create-api-changelog` system. An agent might mistakenly classify the
    URL parser update as a backend/API change and attempt to generate a changelog,
    but this script is an internal Claude skill tool, not part of the Zulip public
    API.
  severity: high
  source:
    path: .claude/CLAUDE.md
    lines: 46-48
- rule: Run tests before making a commit... ./tools/test-backend zerver.tests.test_relevant_module
  collision_type: architecture_boundary
  why_distracting: The rule instructs running specific test collections like `./tools/test-backend
    zerver.tests.test_relevant_module`. An agent might waste time trying to find or
    write tests in the `zerver` Django app for this script, but the script lives in
    `.claude/skills/` and is completely separate from the main backend architecture.
  severity: medium
  source:
    path: .claude/CLAUDE.md
    lines: 58-61
- rule: Fix backend test coverage gaps when modifying Python files.
  source:
    path: .claude/skills/fix-backend-coverage/SKILL.md
    lines: 1-2
  collision_type: scope_ambiguity
  why_distracting: The agent might try to write backend tests for the modified `fetch-zulip-web-public-messages`
    script to ensure test coverage, but this is an AI skill script outside the main
    backend test suite.
  severity: medium
hierarchy_analysis: The task involves a flat single-file config (`.claude/CLAUDE.md`),
  but it is highly meta-referential because the agent is explicitly instructed to
  edit this exact config file to update its own future instructions. The agent must
  apply the rules from the file while simultaneously modifying it.
