rubric:
- rule: CLAUDE.md must include a "Zulip Chat Links" section documenting that agents
    should use the /fetch-zulip-messages skill for Zulip URLs, not WebFetch
  source:
    path: .claude/CLAUDE.md
    lines: 378-383
    commit: 305c52c35a7dad3e6c9bde470e8f717186abaae5
  reference: '## Zulip Chat Links


    When you encounter a Zulip narrow URL (e.g., from `chat.zulip.org` in a

    GitHub issue, PR, or user message), use the `/fetch-zulip-messages` skill

    to read the conversation. Do not use `WebFetch` — it cannot access Zulip

    message content.'
- rule: Be consistent with existing code. Look at surrounding code and follow the
    same patterns.
  source:
    path: .claude/CLAUDE.md
    lines: 70-71
  evidence: The gold solution updates the regex by changing `(?:/with/(\d+))?` to
    `(?:/(?:with|near)/(\d+))?` and updates the error message by changing `[/with/MSG_ID]`
    to `[/with|near/MSG_ID]`, perfectly matchin
  category: style
- rule: Comments should have a line to themself except for CSS px math.
  source:
    path: .claude/CLAUDE.md
    lines: 74-75
  evidence: 'The updated comment `# Parse the narrow fragment: narrow/channel/ID-slug/topic/encoded-topic[/with|near/ID]`
    is kept on its own line, rather than being moved to an inline comment.'
  category: style
