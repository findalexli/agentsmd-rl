# Rules from repo agent configs, evaluated by LLM judge.
# Repo: inclusionAI/AReaL @ 99040b94e43d7e4b26d71c6f37edf7ce6781dc56
rules:
  - rule: "Follow existing code patterns in the same module."
    from: "AGENTS.md:40"

  - rule: "No wildcard imports (`from x import *`)."
    from: "AGENTS.md:30"

  - rule: "heavy optional deps inside functions"
    from: "AGENTS.md:100"

  - rule: "explicit type hints"
    from: "AGENTS.md:99"

  - rule: "Use `areal.utils.logging.getLogger(name)` with PascalCase descriptive name, NOT `print` or stdlib `logging`"
    from: ".claude/rules/code-style.md:16-17"

  - rule: "Prefer explicit imports over module-level imports for large modules"
    from: ".claude/rules/code-style.md:67"

  - rule: "Prefer composition over inheritance: Avoid deep class hierarchies"
    from: ".claude/rules/code-style.md:7"

  - rule: "No hardcoded secrets, paths, or endpoints."
    from: "AGENTS.md:31"
