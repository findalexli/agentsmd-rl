  merge_commit: "0629e70a4ab6d88ec9f1f27c787dce4b18f92e70"

checks:
  - id: compiles
    type: pass_to_pass
    origin: static
    description: "enumerate_for_loop.rs must exist and compile"

  - id: sibling_loops_both_flagged
    type: fail_to_pass
    origin: pr_diff
    description: "Two sibling loops reusing the same counter variable must both get SIM113"

  - id: enumerate_then_manual
    type: fail_to_pass
    origin: pr_diff
    description: "enumerate() loop followed by manual counter — second loop must be flagged"

  - id: three_sibling_loops
    type: fail_to_pass
    origin: pr_diff
    description: "Three sibling loops with same counter — all three must be flagged"

  - id: counter_used_between_sibling_loops
    type: fail_to_pass
    origin: pr_diff
    description: "Counter used after first loop, reset before second — second loop still flagged"

  - id: single_loop_still_flagged
    type: pass_to_pass
    origin: pr_diff
    description: "Single loop with manual counter still flagged (regression guard)"

  - id: counter_used_after_loop_not_flagged
    type: pass_to_pass
    origin: pr_diff
    description: "Counter used after loop must NOT be flagged"

  - id: different_counter_names_both_flagged
    type: pass_to_pass
    origin: pr_diff
    description: "Sibling loops with different counter names both independently flagged"

  - id: existing_sim113_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Upstream SIM113 snapshot tests still pass"

  - id: no_local_imports_in_functions
    type: pass_to_pass
    origin: agent_config
    description: "Rust imports at file top, not inside function bodies"
    source:
      path: "AGENTS.md"
      lines: "76"
      commit: "5f7e0346bc946d7fb484b285d49d351d3a54d526"

  - id: no_new_unwraps
    type: pass_to_pass
    origin: agent_config
    description: "No new .unwrap() calls added to enumerate_for_loop.rs"
    source:
      path: "AGENTS.md"
      lines: "79"
      commit: "5f7e0346bc946d7fb484b285d49d351d3a54d526"

  - id: prefer_expect_over_allow
    type: pass_to_pass
    origin: agent_config
    description: "No new #[allow()] attributes — prefer #[expect()] instead"
    source:
      path: "AGENTS.md"
      lines: "81"
      commit: "5f7e0346bc946d7fb484b285d49d351d3a54d526"

rubric:
