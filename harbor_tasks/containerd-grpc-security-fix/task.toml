name = "containerd-grpc-security-fix"
title = "Fix gRPC authorization bypass vulnerability in path handling"
owner = "containerd"
repo = "containerd"
base_commit = "3a2c003f946e1dbe3e11888465624ff3c231af84"
merge_commit = "eceb03e0381202dc687a9b734e1dd754c40731e0"
pr_number = 13098

# Task classification
difficulty = "medium"
tags = ["security", "grpc", "go", "authorization", "path-validation"]
categories = ["vulnerability-fix", "dependency-update"]

# Timeouts (in seconds)
agent_timeout = 1800
verifier_timeout = 120

# Task description
[description]
brief = "Apply security fix for gRPC authorization bypass vulnerability by adding strict path checking"
details = """
This task requires applying a security fix that addresses a vulnerability in gRPC where malformed
:path headers (missing the leading slash) could bypass path-based restricted 'deny' rules in
interceptors like grpc/authz.

The fix involves:
1. Adding DisableStrictPathChecking envconfig option
2. Adding strict path checking logic in the gRPC server's handleStream method
3. Updating gRPC version from 1.79.2 to 1.79.3 in go.mod and go.sum

Files to modify:
- vendor/google.golang.org/grpc/internal/envconfig/envconfig.go
- vendor/google.golang.org/grpc/server.go
- vendor/google.golang.org/grpc/version.go
- go.mod
- go.sum
- vendor/modules.txt
"""

# Target files hint (for agents)
[target_files]
primary = [
    "vendor/google.golang.org/grpc/internal/envconfig/envconfig.go",
    "vendor/google.golang.org/grpc/server.go",
    "vendor/google.golang.org/grpc/version.go",
    "go.mod",
    "go.sum",
    "vendor/modules.txt"
]
