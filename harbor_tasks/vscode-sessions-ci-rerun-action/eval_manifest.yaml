    path: .github/copilot-instructions.md
    lines: 99-100
    commit: 64e73b036669494bbc9a6904cf090b01a8d3bb1e
- rule: Follow Agent Sessions window architecture, including layering, folder structure,
    and contributions when implementing features.
  source:
    path: .github/skills/sessions
    lines: 1-3
  evidence: The gold solution correctly implements the feature within the sessions
    architecture, modifying the ciStatusWidget for the UI, the githubPRCIFetcher for
    the API call, and the githubPullRequestCIModel f
  category: architecture
distractors:
- rule: Investigate and fix CI failures on a pull request. Use when CI checks fail
    on a PR branch.
  collision_type: scope_ambiguity
  why_distracting: The bug report is about adding a feature to rerun failed CI checks
    from the UI. The agent might misinterpret 'failed CI checks' and attempt to use
    this skill to fix a broken CI build instead of writing the code for the new feature.
  severity: high
  source:
    path: .github/skills/fix-ci-failures
    lines: 1-3
- rule: Use when validating Azure DevOps pipeline changes for the VS Code build. Covers
    queueing builds, checking build status...
  collision_type: architecture_boundary
  why_distracting: The agent might think it needs to interact with Azure Pipelines
    to rerun the CI checks, but the gold solution correctly uses the GitHub Actions
    API (`/repos/{owner}/{repo}/actions/runs/{runId}/rerun-failed-jobs`).
  severity: medium
  source:
    path: .github/skills/azure-pipelines
    lines: 1-3
hierarchy_analysis: The explicit config hierarchy (AGENTS.md) contains no direct rules,
  only a pointer to copilot-instructions.md. However, the repository contains several
  skills that act as behavioral rules. The 'sessions' skill provides architectural
  guidance for the modified files. The 'fix-ci-failures' and 'azure-pipelines' skills
  act as strong distractors due to keyword overlap with the issue description.
