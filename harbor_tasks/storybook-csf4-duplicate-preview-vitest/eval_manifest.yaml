version: "2.0"

source:
  repo: "storybookjs/storybook"
  pr: 34361
  base_commit: "6d4fcb5417be0013e4c2d6e2e166a15a81637268"
  merge_commit: "69c8442c114a753762c3052efac38eb489509751"

checks:
  - id: typescript_files_parse
    type: pass_to_pass
    origin: static
    description: "Both modified TypeScript files must parse without syntax errors"

  - id: no_csf4_param_in_requires_project_annotations
    type: fail_to_pass
    origin: pr_diff
    description: "requiresProjectAnnotations must not accept an isCSF4 parameter"

  - id: no_csf4_conditional_return_in_utils
    type: fail_to_pass
    origin: pr_diff
    description: "requiresProjectAnnotations must not short-circuit to false for CSF4"

  - id: no_preview_file_loading_for_csf4_detection
    type: fail_to_pass
    origin: pr_diff
    description: "The plugin must not load/parse preview config to detect CSF4 status"

  - id: setup_files_no_preview_injection
    type: fail_to_pass
    origin: pr_diff
    description: "Internal setup files must not conditionally include the preview file"

  - id: project_annotations_conditional_still_exists
    type: pass_to_pass
    origin: static
    description: "The project annotations setup file must still be conditionally included"

  - id: requires_project_annotations_still_exported
    type: pass_to_pass
    origin: static
    description: "requiresProjectAnnotations must still be exported from utils.ts"

  - id: requires_project_annotations_returns_true_by_default
    type: pass_to_pass
    origin: static
    description: "requiresProjectAnnotations must return true when no setup file has setProjectAnnotations"

  # New repo_tests pass_to_pass checks using TypeScript AST validation
  - id: repo_utils_ts_no_syntax_errors
    type: pass_to_pass
    origin: repo_tests
    description: "utils.ts must have zero TypeScript parse diagnostics (CI-style AST check)"

  - id: repo_index_ts_no_syntax_errors
    type: pass_to_pass
    origin: repo_tests
    description: "index.ts must have zero TypeScript parse diagnostics (CI-style AST check)"

  - id: repo_base_commit_structure_utils
    type: pass_to_pass
    origin: repo_tests
    description: "Base commit utils.ts structure must be valid - CI AST validation"

  - id: repo_base_commit_structure_index
    type: pass_to_pass
    origin: repo_tests
    description: "Base commit index.ts structure must be valid - CI AST validation"

  - id: repo_import_structure_valid
    type: pass_to_pass
    origin: repo_tests
    description: "All imports in modified files must be syntactically valid (CI AST check)"

  - id: repo_function_call_structure_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Key function calls in index.ts must have valid structure (CI AST check)"

rubric:
  - rule: "The fix must remove the CSF4-specific code path from the vitest plugin without adding new console.* usage"
    description: "The fix should properly remove isCSF4 parameter and preview file loading logic. Console.* usage should remain as-is since it's pre-existing in the base commit and unrelated to the fix."
