name = "prisma-uint8array-nested-in-json"
title = "Serialize nested Uint8Array values in Json fields as base64"
description = """
Fix a bug in Prisma's client parameterization layer where Uint8Array values
nested inside an object or array stored in a Json field are serialized as
numeric-keyed objects instead of base64 strings.
"""

difficulty = "easy"
estimated_minutes = 20
tags = ["prisma", "typescript", "json", "serialization", "bug-fix"]

