  - id: test_anchor_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: Anchor component jest unit tests pass

  - id: test_anchor_demo_tests
    type: pass_to_pass
    origin: repo_tests
    description: Anchor demo snapshot tests pass

rubric:
  - id: no_config_changes_needed
    rule: "This is a pure TypeScript code change adding targetOffset prop to AnchorLink. No configuration file updates are required since the change is internal implementation only."
    source:
      path: components/anchor/Anchor.tsx
