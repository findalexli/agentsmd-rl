  - id: test_anchor_link_destructures_target_offset
    type: fail_to_pass
    origin: pr_behavior
    description: AnchorLink component destructures targetOffset from props

  - id: test_anchor_link_passes_target_offset_to_register
    type: fail_to_pass
    origin: pr_behavior
    description: AnchorLink passes targetOffset to registerLink

  - id: test_anchor_link_passes_target_offset_to_scroll
    type: fail_to_pass
    origin: pr_behavior
    description: AnchorLink passes targetOffset to scrollTo

  - id: test_ant_anchor_register_link_signature
    type: fail_to_pass
    origin: pr_behavior
    description: AntAnchor registerLink signature accepts targetOffset

  - id: test_ant_anchor_scroll_to_signature
    type: fail_to_pass
    origin: pr_behavior
    description: AntAnchor scrollTo signature accepts targetOffset

  - id: test_anchor_has_link_target_offset_ref
    type: fail_to_pass
    origin: pr_behavior
    description: Anchor has linkTargetOffsetRef to store per-link offsets

  - id: test_register_link_stores_target_offset
    type: fail_to_pass
    origin: pr_behavior
