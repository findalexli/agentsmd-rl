rubric:
- criterion: Followed license header requirement
  description: New test file content includes proper license header (Copyright + SPDX)
- criterion: Code organization
  description: Test is placed in the appropriate test file (per_epoch_config_stress_tests.rs)
- rule: Use simulation tests (`simtest`) for e2e tests to avoid false negatives.
  source:
    path: CLAUDE.md
    lines: 30-31
  evidence: The new test `coin_deny_list_v2_party_owner_test` is added with the `#[sim_test]`
    attribute, adhering to the simulation testing framework referenced in the e2e
    testing commands.
  category: testing
distractors:
- rule: Skip simulation tests as they may cause false negatives with `cargo nextest`.
  collision_type: meta_confusion
  why_distracting: The rule mentions skipping simulation tests with `cargo nextest`
    because they may cause false negatives. An agent might misinterpret this as a
    discouragement from writing simulation tests and instead use `#[tokio::test]`
    or `#[test]`, which contradicts the explicit requirement to use `#[sim_test]`
    for e2e tests.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 33-34
- rule: All new files must start with the Mysten Labs license header.
  collision_type: scope_ambiguity
  why_distracting: The rule requires all new files to start with a specific license
    header. An agent might mistakenly apply this to the new test function being added,
    but the test is being added to an existing file (`per_epoch_config_stress_tests.rs`),
    not a new file.
  severity: low
  source:
    path: CLAUDE.md
    lines: 18-22
hierarchy_analysis: The root `CLAUDE.md` provides general testing guidelines, specifically
  distinguishing between `cargo simtest` for e2e tests and `cargo nextest` for unit
  tests. `AGENTS.md` defers to `CLAUDE.md`. The agent must carefully apply the `simtest`
  guidelines without being deterred by the instruction to skip simtests during unit
  testing.
