rubric:
- rule: Followed license header requirement
- rule: Code organization
- rule: Use simulation tests (`simtest`) for e2e tests to avoid false negatives.
  source:
    path: CLAUDE.md
    lines: 30-31
  evidence: The new test `coin_deny_list_v2_party_owner_test` is added with the `#[sim_test]`
    attribute, adhering to the simulation testing framework referenced in the e2e
    testing commands.
  category: testing
- rule: simtests must be run with `cargo simtest` to avoid false negatives
  source:
    path: CLAUDE.md
    lines: 31-32
  evidence: The task requires modifying and adding tests with the `#[sim_test]` attribute,
    which aligns with the repository's custom testing framework that requires `cargo
    simtest`.
  category: testing
distractors:
- rule: skip simulation tests as they may cause false negatives with `cargo nextest`
  collision_type: would_cause_bug
  why_distracting: The config instructs to use `SUI_SKIP_SIMTESTS=1 cargo nextest
    run` for Rust unittests. If the agent uses this command to verify its work, it
    will silently skip the `#[sim_test]` functions it just modified/added, leading
    to false confidence that the code works.
  severity: high
  source:
    path: CLAUDE.md
    lines: 34-35
- rule: All new files must start with the following license in comments at the top
    of the file
  collision_type: scope_ambiguity
  why_distracting: The rule requires a specific copyright header for 'All new files'.
    The agent might mistakenly prepend this header to the existing test files it is
    modifying, causing linting errors or duplicate headers.
  severity: low
  source:
    path: CLAUDE.md
    lines: 20-23
hierarchy_analysis: The repository uses a flat config structure at the root (`CLAUDE.md`
  and `AGENTS.md`). The `CLAUDE.md` file contains critical testing instructions that
  differentiate between standard unit tests and simulation tests.
