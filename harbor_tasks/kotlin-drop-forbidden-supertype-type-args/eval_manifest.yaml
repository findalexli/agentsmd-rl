version: "1.0"
source:
  pr: "JetBrains/kotlin#5737"
  title: "Frontend: drop ForbidUsingSupertypesWithInaccessibleContentInTypeArguments"
  description: |
    Removes the ForbidUsingSupertypesWithInaccessibleContentInTypeArguments language feature from the Kotlin compiler.
    This feature was controlling whether to report MISSING_DEPENDENCY_SUPERCLASS_IN_TYPE_ARGUMENT diagnostic for
    supertypes with inaccessible content in type arguments. The feature is now always enabled (hardcoded behavior).

    Changes include:
    1. Remove LanguageFeature enum entry
    2. Remove TypeWithOrigin data class and SupertypeOrigin enum from FirMissingDependencyStorage
    3. Simplify collectSuperTypes to not track origin
    4. Remove TYPE_ARGUMENT origin check from FirMissingDependencySupertypeUtils
    5. Update test data files to remove feature flags and diagnostic markers

agent_configs:
  - file: ".ai/guidelines.md"
    lines: "all"
    rules:
      - "Identify area and READ its docs before working"
      - "Use FIR prefix for FIR-related commits"
      - "Commit tests before fix (test-before-fix)"
      - "Reference YouTrack issues (KT-XXXXX) in commit messages"
      - "Follow docs/code_authoring_and_core_review.md for commits"

  - file: "compiler/AGENTS.md"
    lines: "all"
    rules:
      - "Use FIR prefix when changes are mostly related to FIR (compiler/fir/)"
      - "Commit test data as separate commit before the fix"
      - "See AGENTS.md in fir/analysis-tests for FIR analysis test format"

