rubric:
- id: i18n_keys_not_dynamically_constructed
  source:
    lines: 139-146
    commit: f7dce9c6c0929a2e74e15499f723d376e1e98238
    path: AGENTS.md
  rule: 'Translation keys must come from the I18nKey enum

    (frontend/src/i18n/declaration.ts) or canonical maps such as

    AGENT_STATUS_MAP (frontend/src/utils/status.ts). Dynamically

    constructed keys (template literals / string concat) silently fall

    back to the raw key at runtime.

    '
- id: ui_uses_tanstack_query_for_data_access
  source:
    lines: 140-146
    commit: f7dce9c6c0929a2e74e15499f723d376e1e98238
    path: AGENTS.md
  rule: 'UI components must NEVER call API client methods (frontend/src/api)

    directly. Data access must flow through TanStack Query hooks under

    frontend/src/hooks/query/ or frontend/src/hooks/mutation/.

    Architecture rule: UI components → TanStack Query hooks → Data

    Access Layer (frontend/src/api) → API endpoints.

    '
- id: query_hook_naming_convention
  source:
    lines: 143-145
    commit: f7dce9c6c0929a2e74e15499f723d376e1e98238
    path: AGENTS.md
  rule: 'Custom data hooks must follow naming conventions: query hooks use

    "use[Resource]" (e.g., useConversationSkills); mutation hooks use

    "use[Action]" (e.g., useDeleteConversation). New hooks placed under

    frontend/src/hooks/ must follow consistent kebab-case file naming

    (e.g., use-agent-notification.ts).

    '
- id: vitest_is_test_framework
  source:
    lines: 129-132
    commit: f7dce9c6c0929a2e74e15499f723d376e1e98238
    path: AGENTS.md
  rule: 'The frontend test framework is Vitest. New tests must be written

    with vitest (describe/it/expect, vi.* mocks, vi.useFakeTimers, etc.)

    and placed under frontend/__tests__/ mirroring the source layout.

    '
