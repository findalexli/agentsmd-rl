distractors:
- rule: API views should declare request/response schemas — prefer `@validated_request` from `posthog.api.mixins` or `@extend_schema` from drf-spectacular.
  collision_type: architecture_boundary
  why_distracting: The rule requires API views to declare request/response schemas using `@validated_request` or `@extend_schema`. An agent might mistakenly apply these decorators to `Task.create_and_run()`, but this is a model static method, not a Django REST Framework API view. Doing so would cause a crash or incorrect schema generation.
  severity: high
  source:
    path: AGENTS.md
    lines: 65-67
- rule: 'Scope convention: use `llma` for LLM analytics changes (for example, `feat(llma):\n    ...`)'
  collision_type: scope_ambiguity
  why_distracting: The rule suggests using the `llma` scope for LLM analytics changes. Since this task involves AI agents, an agent might incorrectly use `feat(llma):` instead of the more accurate `cloud-agent` scope provided in the task instruction.
  severity: low
  source:
    path: AGENTS.md
    lines: 48-48
hierarchy_analysis: The configuration hierarchy is relatively flat, with `.cursorrules` providing general behavioral instructions and `AGENTS.md` providing project-specific conventions. The agent must rely on `AGENTS.md` for architectural boundaries (e.g., distinguishing between API views and model methods) to avoid misapplying decorators.
