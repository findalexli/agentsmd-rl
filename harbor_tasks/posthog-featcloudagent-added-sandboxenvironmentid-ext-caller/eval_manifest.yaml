    callers` strictly follows the conventional commit format `<type>(<scope>): <description>`
    specified in the guidelines.'
  category: style
- rule: Please respect my formatting preferences when you provide code.
  source:
    path: .cursorrules
    lines: 16-16
  evidence: The gold solution carefully realigns the markdown table columns in `sandboxed-agents.md`
    (e.g., padding `Parameter` to `Parameter                ` and extending the separator
    `---`) to maintain consis
  category: style
distractors:
- rule: API views should declare request/response schemas — prefer @validated_request
    or @extend_schema.
  collision_type: scope_ambiguity
  why_distracting: The prompt mentions exposing the parameter for 'external callers',
    which might mislead the agent into treating the `create_and_run` model method
    as an API view and applying `@extend_schema` or `@validated_request` decorators
    to it, causing invalid syntax or errors.
  severity: high
  source:
    path: AGENTS.md
    lines: 58-58
- rule: Django serializers are the source of truth for frontend API types — hogli
    build:openapi generates TypeScript.
  collision_type: scope_ambiguity
  why_distracting: The phrase 'unavailable to external products' refers to other backend
    products in the monorepo, but the agent might interpret 'external products' as
    frontend or external API consumers, leading it to unnecessarily modify Django
    serializers and run OpenAPI generation.
  severity: medium
  source:
    path: AGENTS.md
    lines: 59-59
hierarchy_analysis: The `.cursorrules` file provides general behavioral guidelines,
  while `AGENTS.md` provides specific PostHog development conventions. `CLAUDE.md`
  simply points to `AGENTS.md`. The rules in `AGENTS.md` regarding API views and serializers
  are highly specific, but their scope must be carefully evaluated against the context
  of the PR, which is a backend-to-backend model method update rather than a REST
  API change.
