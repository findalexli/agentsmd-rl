distractors:
- rule: 'To run the full application to debug issues: export INSTALL_DOCKER=0 ...
    make build && make run ...'
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to start the full application stack (backend
    and frontend) to reproduce the crash interactively. This is unnecessary and time-consuming
    since the issue is a clear frontend null-pointer exception that can be reproduced
    and verified entirely via unit tests.
  severity: medium
  source:
    path: AGENTS.md
    lines: 8-11
- rule: When working on a PR that requires design documents, scripts meant for development-only,
    or other temporary artifacts... store them in a `.pr/` directory.
  collision_type: scope_ambiguity
  why_distracting: The agent might create a `.pr/analysis.md` or `.pr/design.md` file
    to document its investigation of the crash. This is overkill for a simple undefined
    check and wastes time and context window.
  severity: low
  source:
    path: AGENTS.md
    lines: 35-43
hierarchy_analysis: Only one config file (`AGENTS.md`) is present at the root level,
  so there are no hierarchy conflicts. The rules apply globally to the repository.
