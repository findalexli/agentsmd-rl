rubric:
- rule: TypeScript code should use nullish coalescing (??) for null/undefined guards
    in the hook-event-item component when accessing matcher.hooks.length
  source:
    path: frontend/src/components/features/conversation-panel/hook-event-item.tsx
    lines: 30-35
    commit: 3cd85a07b78a2d9d2e28b2904e1b42096d47a802
  reference: matcher.hooks ?? []
- rule: TypeScript code should use nullish coalescing (??) for null/undefined guards
    in the hook-matcher-content component when mapping over matcher.hooks
  source:
    path: frontend/src/components/features/conversation-panel/hook-matcher-content.tsx
    lines: 25-30
    commit: 3cd85a07b78a2d9d2e28b2904e1b42096d47a802
  reference: (matcher.hooks ?? []).map
- rule: HookMatcher type definition must make hooks optional to allow undefined values
    during server-side hook execution
  source:
    path: frontend/src/api/conversation-service/v1-conversation-service.types.ts
    lines: 153-156
    commit: 3cd85a07b78a2d9d2e28b2904e1b42096d47a802
  reference: 'hooks?: HookDefinition[]'
- rule: The fix must include comprehensive unit tests covering undefined hooks cases
    including collapsed state, expanded state, and mixed matchers
  source:
    path: frontend/__tests__/components/features/conversation-panel/hooks-modal.test.tsx
    lines: 204-290
    commit: 3cd85a07b78a2d9d2e28b2904e1b42096d47a802
  reference: 'hooks: undefined'
- rule: If you've made changes to the frontend, you should run `cd frontend && npm
    run lint:fix && npm run build ; cd ..`
  source:
    path: AGENTS.md
    lines: 20-21
  evidence: The gold solution modifies frontend files and ensures type safety by updating
    the `HookMatcher` interface and adding nullish coalescing operators, which is
    required to pass the frontend build and lint
  category: tooling
distractors:
- rule: When working on a PR that requires design documents, scripts meant for development-only,
    or other temporary artifacts... store them in a `.pr/` directory at the repository
    root.
  collision_type: scope_ambiguity
  why_distracting: The agent might think it needs to create a `.pr/analysis.md` or
    `.pr/notes.md` to document its debugging of the crash, but this is a simple bug
    fix, not a complex refactoring that warrants PR-specific artifacts.
  severity: low
  source:
    path: AGENTS.md
    lines: 40-47
- rule: 'To run the full application to debug issues: export INSTALL_DOCKER=0 ...
    make build && make run FRONTEND_PORT=12000 ...'
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to start the full application server to
    reproduce the crash, which is slow and unnecessary since the issue can be reproduced
    and verified entirely via frontend unit tests.
  severity: medium
  source:
    path: AGENTS.md
    lines: 9-12
- rule: Use cross-repo-testing skill when changes span the SDK and OpenHands server
    repos and need e2e testing.
  source:
    path: .agents/skills/cross-repo-testing/SKILL.md
    lines: 1-5
  collision_type: scope_ambiguity
  why_distracting: Because the bug involves an API response from the server causing
    a frontend crash, an agent might mistakenly activate the cross-repo-testing skill
    to verify the server-frontend interaction. However, the fix is purely a frontend
    null-guard and type update, making this skill irrelevant and a waste of effort.
  severity: low
hierarchy_analysis: The configuration is a single flat file (`AGENTS.md`) with generic
  repository guidelines. There is no complex hierarchy or overriding of rules.
