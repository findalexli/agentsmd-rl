rubric:
  - id: internal_api_change
    rule: Internal API addition does not require documentation updates - ConvertRemoteValuesToDictionary is a private method used only within the existing public ConvertTo API
    reference: "No documentation edits required. The change adds private implementation details that don't affect the public API surface."

  - id: no_breaking_changes
    rule: No breaking changes that would require changelog or migration documentation - the change only adds new functionality
    reference: "No documentation edits required. Existing behavior unchanged, only new conversion capabilities added."

  - id: follows_existing_patterns
    rule: Follows existing code patterns in the file - dictionary conversion matches array/list conversion implementation style
    reference: "No documentation edits required. Implementation follows the same pattern as ConvertRemoteValuesToArray and ConvertRemoteValuesToGenericList."
