source:
  pr: "MystenLabs/sui#26102"
  title: "jsonrpc-alt: gate coin reservation obj refs"
  description: |
    Only inject the synthetic object ref that points at an address' SUI balance
    into `suix_getCoins` if the `enable_coin_reservation_obj_refs` feature flag
    is enabled in the config.

  base_commit: "2bf0af8d8048b75d7d7e6e46cde1958c40e43481"
  merge_commit: "08740a5fd4f46df33dc6dda8b34056ce9a54e3fd"

# Checks to run during evaluation
checks:
  # Fail-to-pass tests (require the fix to pass)
  - id: test_system_state_module_exists
    type: fail_to_pass
    origin: task_spec
    description: |
      system_state.rs module must exist with latest_feature_flag function that
      queries kv_feature_flags table and returns the boolean flag value.

  - id: test_mod_rs_exports_feature_flag
    type: fail_to_pass
    origin: task_spec
    description: |
      mod.rs must export latest_feature_flag from the system_state module.

  - id: test_address_balance_coins_checks_feature_flag
    type: fail_to_pass
    origin: task_spec
    description: |
      address_balance_coins.rs must check enable_coin_reservation_obj_refs
      feature flag before returning synthetic address balance coin reference.

  - id: test_address_balance_coins_uses_latest_epoch
    type: fail_to_pass
    origin: task_spec
    description: |
      address_balance_coins.rs must use latest_epoch instead of current_epoch.

  - id: test_mod_rs_removed_old_current_epoch
    type: fail_to_pass
    origin: task_spec
    description: |
      mod.rs must no longer contain the inline current_epoch implementation.

  - id: test_latest_epoch_exists
    type: fail_to_pass
    origin: task_spec
    description: |
      system_state.rs must contain the latest_epoch function.

  - id: test_latest_feature_flag_logic
    type: fail_to_pass
    origin: task_spec
    description: |
      latest_feature_flag must have correct query logic with filter, order, limit, default.

  # Pass-to-pass tests (should always pass)
  - id: test_crate_syntax_valid
    type: pass_to_pass
    origin: repo_tests
    description: |
      The sui-indexer-alt-jsonrpc crate must have valid Rust syntax.

  - id: test_rustfmt_check
    type: pass_to_pass
    origin: agent_config
    source:
      file: "CLAUDE.md"
      lines: "47-48"
      rule: "ALWAYS run `cargo xclippy` after finishing development"
    description: |
      Modified files must follow standard Rust formatting.

# Soft rules (subjective, LLM-judged)
rubric: []
