distractors:
- rule: If you are changing Next.js source or integration tests, start `pnpm --filter=next
    dev` in a separate terminal session before making edits (unless it is already
    running). If you skip this, explicitly state why.
  collision_type: scope_ambiguity
  why_distracting: The agent might think it needs to start the dev server or write
    an explicit justification for skipping it. However, this task is strictly about
    CI/build scripts (`scripts/docker-image-cache.js`) and turbo configuration, not
    Next.js framework source code or integration tests.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 71-75
- rule: Before editing or creating files in any subdirectory (e.g., `packages/*`,
    `crates/*`), read all `README.md` files in the directory path from the repo root
    up to and including the target file's directory.
  collision_type: meta_confusion
  why_distracting: The agent might waste tool calls reading READMEs in `packages/next-swc/`
    when the task only requires deleting a few lines in `package.json` and `turbo.jsonc`
    to remove the `build-docker-image` task.
  severity: low
  source:
    path: CLAUDE.md
    lines: 43-48
hierarchy_analysis: The config hierarchy consists of identical `CLAUDE.md` and `AGENTS.md`
  files at the root level. The rules provided are heavily focused on the Next.js core
  framework development workflow (running dev servers, skipping isolation for tests).
  Because this PR is an infrastructure/CI fix dealing with Turborepo and Docker, most
  of the core framework rules act as distractors or have ambiguous scope.
