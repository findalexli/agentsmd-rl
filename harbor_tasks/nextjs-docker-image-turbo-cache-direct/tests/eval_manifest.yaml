distractors:
- rule: If you are changing Next.js source or integration tests, start `pnpm --filter=next
    dev` in a separate terminal session before making edits.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to start the Next.js dev server (`pnpm --filter=next
    dev`) before making edits, but this PR only modifies CI scripts and native build
    orchestration, not the core Next.js source. Running the dev server here is irrelevant
    and wastes time.
  severity: low
  source:
    path: AGENTS.md
    lines: 73-76
- rule: 'Always run a full bootstrap build after switching branches: `pnpm build-all`'
  collision_type: scope_ambiguity
  why_distracting: The agent might run `pnpm build-all` which is a full bootstrap
    build taking significant time, but it is completely unnecessary for editing standalone
    Docker caching scripts.
  severity: low
  source:
    path: AGENTS.md
    lines: 96-100
hierarchy_analysis: The config hierarchy is flat, consisting of identical root-level
