rubric:
- rule: Add partition_key and partition_date fields to DagRunInfo.includes list in
    the correct location with Airflow 3.2+ version comments.
  source:
    path: providers/openlineage/src/airflow/providers/openlineage/utils/utils.py
  reference: "Added to DagRunInfo.includes after logical_date:\n    \"partition_key\"\
    ,  # Airflow 3.2+\n    \"partition_date\",  # Airflow 3.2+\n"
- rule: The partition fields must be placed between logical_date and run_after in
    the includes list, maintaining the expected field ordering.
  source:
    path: providers/openlineage/src/airflow/providers/openlineage/utils/utils.py
  reference: 'Ordering in includes list: logical_date (Airflow 3), partition_key (Airflow
    3.2+), partition_date (Airflow 3.2+), run_after (Airflow 3)

    '
- rule: Update corresponding test file to include partition_key and partition_date
    in DagRun test mocks and assertions.
  source:
    path: providers/openlineage/tests/unit/openlineage/utils/test_utils.py
  reference: 'Added partition_key and partition_date attributes to dagrun_mock and
    optional_args in tests

    '
distractors:
- rule: Use `version_compat.py` patterns for cross-version compatibility.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to import `AIRFLOW_V_3_2_PLUS` from `version_compat.py`
    to conditionally add `partition_key` and `partition_date` to the `attributes`
    list in `utils.py`. However, the instruction specifies adding them with 'appropriate
    version comments' and notes that the base class handles serialization logic, meaning
    conditional logic in the class definition is unnecessary and incorrect.
  severity: high
  source:
    path: providers/AGENTS.md
    lines: 9-10
- rule: Never run pytest, python, or airflow commands directly on the host — always
    use `breeze`.
  collision_type: rule_conflict
  why_distracting: The config strictly forbids running pytest directly on the host
    and mandates `breeze`. However, the task instruction explicitly provides a `uv
    run` command to execute the tests. The agent might waste time trying to set up
    or use `breeze` instead of following the provided `uv run` command.
  severity: medium
  source:
    path: AGENTS.md
    lines: 8-9
- rule: 'Determining the Task: Translation work falls into one of two categories depending
    on whether the target locale already exists.'
  source:
    path: .github/skills/airflow-translations/SKILL.md
    lines: 12-15
  collision_type: scope_ambiguity
  why_distracting: The skill is completely irrelevant to this backend serialization
    task, but an agent might get confused by the presence of this skill if it misinterprets
    'OpenLineage events' or 'serialization' as requiring some form of translation
    or mapping, wasting time looking for locale files.
  severity: low
hierarchy_analysis: The hierarchy consists of root-level `AGENTS.md`/`CLAUDE.md` and
  provider-level `providers/AGENTS.md`. The provider-level config introduces specific
  rules about `version_compat.py` which conflict with the simpler approach requested
  in the task instruction for this specific PR.
version: '2.0'
