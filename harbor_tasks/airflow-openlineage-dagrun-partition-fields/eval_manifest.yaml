distractors:
- rule: Use `version_compat.py` patterns for cross-version compatibility.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to use `version_compat.py` to conditionally
    add `partition_key` and `partition_date` to the `attributes` list based on the
    Airflow version. However, the `InfoJsonEncodable` base class already handles missing
    attributes gracefully, so simply adding the strings to the list is the correct
    approach.
  severity: medium
  source:
    path: providers/AGENTS.md
    lines: 10-11
- rule: Never run pytest, python, or airflow commands directly on the host — always
    use `breeze`.
  collision_type: rule_conflict
  why_distracting: The config file strictly forbids running pytest directly on the
    host and mandates using `breeze`. However, the specific task instructions explicitly
    tell the agent to run tests using `uv run --project providers/openlineage pytest
    <test_path>`. This creates a direct conflict on how to execute tests.
  severity: high
  source:
    path: CLAUDE.md
    lines: 8-9
hierarchy_analysis: The hierarchy consists of root-level instructions (`CLAUDE.md`,
  `AGENTS.md`) and provider-specific instructions (`providers/AGENTS.md`). The provider-specific
  instructions correctly guide the test placement. However, there is a conflict between
  the root-level instruction to always use `breeze` for testing and the task-specific
  instruction to use `uv run`.
