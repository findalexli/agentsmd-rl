source_pr:
  owner: apache
  repo: airflow
  number: 64897
  title: "feat: Add dagrun partition info to OpenLineage events"
  merge_commit: bdc2747cc41b18af1fb42ab80159556a93d79ff3
  base_commit: 40902de7e7d31225410db85e3707aaf494ab5e90

checks:
  # Fail-to-pass tests
  - id: test_dagrun_info_includes_partition_fields
    type: fail_to_pass
    origin: behavioral
    description: "DagRunInfo.includes must include partition_key and partition_date strings"
    points: 2

  - id: test_partition_fields_in_dagrun_info_includes_list
    type: fail_to_pass
    origin: behavioral
    description: "partition_key and partition_date must be specifically in DagRunInfo.includes list"
    points: 2

  - id: test_partition_fields_have_version_comments
    type: fail_to_pass
    origin: behavioral
    description: "partition fields must have Airflow 3.2+ version comments"
    points: 1

  - id: test_partition_fields_ordering
    type: fail_to_pass
    origin: behavioral
    description: "partition_key must come after logical_date and before partition_date and run_after"
    points: 1

  - id: test_partition_fields_only_in_dagrun_info
    type: fail_to_pass
    origin: behavioral
    description: "partition fields must be in DagRunInfo class specifically"
    points: 1

  - id: test_no_duplicate_partition_fields
    type: fail_to_pass
    origin: behavioral
    description: "partition fields should not be duplicated in the source file"
    points: 1

  # Pass-to-pass tests
  - id: test_repo_openlineage_utils_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "OpenLineage utils.py has valid Python syntax"
    points: 1

  - id: test_repo_openlineage_ruff_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo ruff linting passes for OpenLineage utils"
    points: 1

  - id: test_repo_openlineage_ruff_format
    type: pass_to_pass
    origin: repo_tests
    description: "Repo ruff format check passes for OpenLineage utils"
    points: 1

  - id: test_repo_openlineage_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: "OpenLineage unit tests pass"
    points: 1

rubric:
  # Agent config rules from CLAUDE.md / AGENTS.md
  - id: ruff_formatting
    description: "Code should be formatted with ruff (if available)"
    source: "CLAUDE.md: 'Always format and check Python files with ruff immediately after writing or editing them'"
    points: 1

  - id: test_location_mirror
    description: "Tests should mirror source file location"
    source: "CLAUDE.md: 'Test location mirrors source: airflow/cli/cli_parser.py → tests/cli/test_cli_parser.py'"
    points: 1

  - id: no_assert_in_prod
    description: "No assert statements in production code"
    source: "CLAUDE.md: 'No assert in production code'"
    points: 1

  - id: apache_license_header
    description: "Apache License header on all new files"
    source: "CLAUDE.md: 'Apache License header on all new files'"
    points: 1

  - id: use_parametrize
    description: "Tests should use @pytest.mark.parametrize for multiple similar inputs"
    source: "CLAUDE.md: 'Use @pytest.mark.parametrize for multiple similar inputs'"
    points: 1

