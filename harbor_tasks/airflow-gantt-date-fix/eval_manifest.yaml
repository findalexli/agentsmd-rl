hierarchy_analysis: '`CLAUDE.md` and `AGENTS.md` are identical. The instructions are
  heavily biased towards the Python backend of Airflow, with many commands for `pytest`,
  `ruff`, `mypy`, and `breeze`. However, the bug is in the React/TypeScript UI frontend.
  The agent must recognize that the Python-specific tooling commands do not apply
  to the `ui/` directory, despite being listed as general commands.'
