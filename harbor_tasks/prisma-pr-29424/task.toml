name = "prisma-bootstrap-deps-timeout"
difficulty = "medium"
tags = ["cli", "prisma", "bootstrap", "ux"]
description = "Fix bootstrap CLI to auto-install missing deps, handle timeouts, and detect package managers"

agents_min_ver = "3.0.0"

execution_timeout = 600
discovery_timeout = 120

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
