# Evaluation manifest for prisma/prisma#29424
# Fix bootstrap CLI to auto-install missing deps, handle timeouts, and detect package managers

source:
  owner: prisma
  repo: prisma
  pr_number: 29424
  base_commit: 6a3c3ccf9cc2db7f27bbbf6df9f050fc112dc66e
  merge_commit: ada077ba32b5801d00d32f1434a45aaae7bc09a9

description: >
  Fix bootstrap CLI UX — auto-install deps, resumable flow, timeout handling.
  This PR improves the Prisma bootstrap command by extending template download timeout
  (30s → 120s), adding auto-install of missing dependencies via detected package manager,
  making already-linked projects resumable with --database flag, and enhancing
  detectPackageManager to read the packageManager field from package.json.

