rubric:
  # Soft/subjective rules from AGENTS.md relevant to this PR

  - id: coding-conventions-kebab-case
    source: AGENTS.md (Prisma AGENTS.md, Prisma Repository – Agent Field Notes)
    description: >
      Use kebab-case for new file names (e.g., query-utils.ts, filter-operators.test.ts).
      The new template-scaffold.ts file follows this convention.
    weight: 1

  - id: avoid-useless-comments
    source: AGENTS.md (Prisma AGENTS.md, Prisma Repository – Agent Field Notes)
    description: >
      Avoid adding useless code comments that do not add new information for the reader.
      Comments should describe why code was written in a particular way, not what it does.
    weight: 1

  - id: write-documentation-comments
    source: AGENTS.md (Prisma AGENTS.md, Prisma Repository – Agent Field Notes)
    description: >
      Write documentation comments for exported items (functions, classes, methods).
      The new addDevDependencies and scaffoldTemplate should have proper doc comments.
    weight: 1

  - id: detectpackagemanager-reads-packagemanager-field
    source: AGENTS.md (Prisma AGENTS.md, Prisma Repository – Agent Field Notes)
    description: >
      detectPackageManager now checks the packageManager field in package.json
      (e.g., "packageManager": "pnpm@10.15.1") in addition to lock files.
      Lock files (pnpm-lock.yaml, yarn.lock, bun.lock, deno.lock) take priority.
    weight: 3

  - id: bootstrap-auto-install-missing-deps
    source: PR body
    description: >
      Bootstrap should prompt to auto-install missing dotenv/prisma dependencies
      via the detected package manager instead of just showing a message to install manually.
    weight: 2

  - id: bootstrap-resumable-flow
    source: PR body
    description: >
      When --database is passed on an already-linked project, bootstrap should skip
      the link step and continue to migrate/generate/seed instead of blocking with an error.
    weight: 2

  - id: timeout-error-handling
    source: PR body
    description: >
      Template download timeout errors should show a user-friendly message about
      checking network connection, not a raw DOMException.
    weight: 2

  - id: decompress-gzip-error-handling
    source: PR body
    description: >
      The gzip decompression stream should properly catch and report failures
      via error handler on nodeStream.
    weight: 2