# eval_manifest.yaml for quickwit-oss/quickwit#6097
# Task: Add support for numeric values in TermsQuery

task:
  name: quickwit-termsquery-numeric
  description: Add support for numeric values in TermsQuery for quickwit-oss/quickwit#6097
  version: 1.0.0

source:
  owner: quickwit-oss
  repo: quickwit
  pr_number: 6097
  base_commit: e2d9623d1cb64cf0bc85f2a0f0dd858c42651d50
  merge_commit: 13b4d4b91f4d88550ddb099dc10500f4f924afa7

targets:
  - path: quickwit/quickwit-query/src/elastic_query_dsl/terms_query.rs

patch:
  content: |
    diff --git a/quickwit/quickwit-query/src/elastic_query_dsl/terms_query.rs b/quickwit/quickwit-query/src/elastic_query_dsl/terms_query.rs
    index f6c0545a33a..e31ee090693 100644
    --- a/quickwit/quickwit-query/src/elastic_query_dsl/terms_query.rs
    +++ b/quickwit/quickwit-query/src/elastic_query_dsl/terms_query.rs
    @@ -37,17 +37,36 @@ struct TermsQueryForSerialization {
         capture_other: serde_json::Value,
     }

    +#[derive(Deserialize)]
    +#[serde(untagged)]
    +enum TermValue {
    +    I64(i64),
    +    U64(u64),
    +    Str(String),
    +}
    +
    +impl From<TermValue> for String {
    +    fn from(term_value: TermValue) -> String {
    +        match term_value {
    +            TermValue::I64(val) => val.to_string(),
    +            TermValue::U64(val) => val.to_string(),
    +            TermValue::Str(val) => val,
    +        }
    +    }
    +}
    +
     #[derive(Deserialize)]
     #[serde(untagged)]
     enum OneOrMany {
    -    One(String),
    -    Many(Vec<String>),
    +    One(TermValue),
    +    Many(Vec<TermValue>),
     }
    +
     impl From<OneOrMany> for Vec<String> {
         fn from(one_or_many: OneOrMany) -> Vec<String> {
             match one_or_many {
    -            OneOrMany::One(one_value) => vec![one_value],
    -            OneOrMany::Many(values) => values,
    +            OneOrMany::One(one_value) => vec![String::from(one_value)],
    +            OneOrMany::Many(values) => values.into_iter().map(String::from).collect(),
             }
         }
     }
    @@ -109,6 +128,14 @@ mod tests {
             assert_eq!(&terms_query.values[..], &["hello".to_string()]);
         }

    +    #[test]
    +    fn test_terms_query_not_string() {
    +        let terms_query_json = r#"{ "user.id": [1, 2] }"#;
    +        let terms_query: TermsQuery = serde_json::from_str(terms_query_json).unwrap();
    +        assert_eq!(&terms_query.field, "user.id");
    +        assert_eq!(&terms_query.values[..], &["1".to_string(), "2".to_string()]);
    +    }
    +
         #[test]
         fn test_terms_query_single_term_boost() {
             let terms_query_json = r#"{ "user.id": ["hello", "happy"], "boost": 2 }"#;

checks:
  - id: test_terms_query_numeric_array
    description: TermsQuery accepts integer arrays like [1, 2] and converts them to strings
    type: fail_to_pass
    origin: gold_test
    details:
      test_name: test_terms_query_not_string
      input: '{"user.id": [1, 2]}'
      expected_field: "user.id"
      expected_values: ["1", "2"]

  - id: test_terms_query_single_numeric
    description: TermsQuery accepts a single integer value and converts it to string
    type: pass_to_pass
    origin: existing_test
    details:
      test_name: test_terms_query_single_term

  - id: test_terms_query_build
    description: The quickwit-query crate compiles successfully
    type: pass_to_pass
    origin: compilation
    details:
      command: cargo check -p quickwit-query

  - id: test_terms_query_tests
    description: All existing TermsQuery tests pass (no regressions)
    type: pass_to_pass
    origin: existing_tests

  - id: test_repo_clippy
    description: Clippy passes on quickwit-query crate
    type: pass_to_pass
    origin: repo_tests
    details:
      command: cargo clippy -p quickwit-query --all-features -- -Dwarnings

rubric: []
