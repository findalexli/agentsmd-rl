title: "Improve build path mapping to produce clean relative paths in stack traces"
description: |
  Stack traces now show clean bare relative paths (e.g. `src/Common/Exception.cpp`)
  instead of paths polluted with the build directory (e.g. `./ci/tmp/fast_build/./src/Common/Exception.cpp`).

  The fix updates ENABLE_BUILD_PATH_MAPPING to use:
  - `-fdebug-compilation-dir=.` — pins DW_AT_comp_dir to "."
  - `-ffile-prefix-map=${SOURCE_DIR}/=` — strips source root prefix with separator

  Also fixes `Dwarf::LineNumberVM::getFullFileName` to skip "." directory entries.

files_modified:
  - CMakeLists.txt
  - src/Common/Dwarf.cpp

