name = "sui-indexer-latest-checkpoint"
description = "Add latest_checkpoint_number() API and smart start checkpoint logic to sui-indexer-alt-framework"
difficulty = "medium"
tags = ["rust", "blockchain", "indexer", "async", "traits"]

[setup]
# No additional setup needed - repo is cloned in Dockerfile

[environment]
dockerfile = "environment/Dockerfile"

[verification]
script = "tests/test.sh"

[time]
# Estimated time for an experienced developer to solve
setup = 300  # 5 minutes - Docker build takes time due to Rust compilation
solve = 1800  # 30 minutes - understanding the trait system and adding methods
test = 600  # 10 minutes - running tests
