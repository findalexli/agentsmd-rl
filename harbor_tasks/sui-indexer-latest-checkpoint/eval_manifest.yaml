# Agent configuration compliance
agent_config:
  # Rule from CLAUDE.md: Test-only code guidelines
  - rule: "Use #[cfg(test)] for test-only code within the same crate; use #[cfg(feature = 'testing')] for cross-crate test code"
    origin: agent_config
    source: "CLAUDE.md:Test-Only Code section"
    check_ids: ["test_cargo_check"]  # Compilation will fail if this is violated

  # Rule from CLAUDE.md: Testing requirements
  - rule: "Always run tests before submitting changes; NEVER disable or ignore tests"
    origin: agent_config
    source: "CLAUDE.md:Critical Development Notes"
    check_ids: ["test_cargo_test_lib"]

  # Rule from CLAUDE.md: Linting requirements
  - rule: "ALWAYS run cargo xclippy after finishing development"
    origin: agent_config
    source: "CLAUDE.md:Critical Development Notes"
    check_ids: ["test_cargo_check"]

  # Rule from CLAUDE.md: No linting suppressions
  - rule: "NEVER use #[allow(dead_code)], #[allow(unused)], or any other linting suppressions - fix the underlying issues"
    origin: agent_config
    source: "CLAUDE.md:Critical Development Notes"
    check_ids: ["test_compilation_succeeds"]

