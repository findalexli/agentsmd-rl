config_edits:
- rationale: 'The skill reference is a public-facing instruction surface for the

    Angular-developer agent skill. The removed block promoted symbols

    from `packages/private/testing/src/utils.ts`, a private framework

    package that downstream Angular consumers cannot import. Skill

    docs must not steer agents toward private internals.

    '
  path: skills/dev-skills/angular-developer/references/testing-fundamentals.md
  gold_added: ''
  gold_removed: '## Custom Utilities


    To keep tests fast and avoid long waits, this project provides custom utilities:


    - **`useAutoTick()`**: (from `packages/private/testing/src/utils.ts`) Fast-forwards time via a mock clock to avoid real waits.

    - **`await timeout(ms)`**: (from `packages/private/testing/src/utils.ts`) Use for cases where a specific real-time delay is unavoidable.


    Always prefer `useAutoTick()` to keep tests efficient.

    '
rubric:
- id: act_wait_assert_pattern_for_test_examples
  source:
    lines: 18-25
    path: AGENTS.md
    commit: b82901f8f99469a8ff4a0ec54ef78d94c7543f5a
  rule: 'Any test code shown in skill references must use the "Act, Wait,

    Assert" pattern (state change → `await fixture.whenStable()` →

    assertion) and must NOT use `fixture.detectChanges()` to manually

    trigger updates. This rule applies because the file being edited

    teaches testing patterns to agents.

    '
- id: do_not_promote_private_package_internals
  source:
    lines: 1-10
    path: skills/dev-skills/angular-developer/SKILL.md
    commit: b82901f8f99469a8ff4a0ec54ef78d94c7543f5a
  rule: 'Public-facing skill instructions under `skills/dev-skills/` must

    not direct agents toward symbols, helpers, or paths from

    `packages/private/...`. The angular-developer skill is loaded by

    downstream consumers who cannot access private framework

    internals.

    '
- id: skill_reference_focused_scope
  source:
    lines: 60-70
    path: skills/dev-skills/angular-developer/SKILL.md
    commit: b82901f8f99469a8ff4a0ec54ef78d94c7543f5a
  rule: 'Each reference under `skills/dev-skills/angular-developer/references/`

    is loaded on-demand for a specific task domain. Edits to a

    reference should stay within that file''s documented domain

    (testing-fundamentals = unit testing patterns) and should not

    drift into unrelated guidance, rewrites, or new sections.

    '
- id: commit_message_follows_angular_guidelines
  source:
    lines: 11-14
    path: AGENTS.md
    commit: b82901f8f99469a8ff4a0ec54ef78d94c7543f5a
  rule: 'Per `AGENTS.md` → "Commit Guidelines", commits and PR titles must

    follow the Angular commit-message format. For a docs change to

    skills, a `docs:` prefix is appropriate (matches the original PR

    title `docs: remove private utils from testing skills`).

    '
