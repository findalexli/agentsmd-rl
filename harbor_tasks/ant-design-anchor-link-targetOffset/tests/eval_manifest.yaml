distractors:
- rule: Changelog 规范：必须同时提供中英文两个版本，描述对开发者的影响
  collision_type: scope_ambiguity
  why_distracting: The config provides detailed instructions on how to write changelogs,
    which might prompt the agent to create or modify CHANGELOG.en-US.md and CHANGELOG.zh-CN.md
    for the new targetOffset feature. However, the task explicitly restricts the files
    to modify to just the component files.
  severity: high
  source:
    path: AGENTS.md
    lines: 118-124
- rule: 文档规范：API 表格格式需按字母顺序排列，包含参数、说明、类型、默认值、版本等
  collision_type: scope_ambiguity
  why_distracting: The config provides rules for updating API tables in documentation.
    Since a new prop targetOffset is added to Anchor.Link, the agent might try to
    update components/anchor/index.en-US.md and index.zh-CN.md. But the task scope
    is limited to the component implementation.
  severity: high
  source:
    path: AGENTS.md
    lines: 52-75
- rule: Help maintainers reply to Ant Design GitHub issues following official guidelines.
  source:
    path: .claude/skills/issue-reply/SKILL.md
    lines: 1-5
  collision_type: scope_ambiguity
  why_distracting: The agent might activate this skill thinking it needs to reply
    to an issue about the missing `targetOffset` prop, but the task requires direct
    code implementation.
  severity: low
hierarchy_analysis: The config files AGENTS.md and CLAUDE.md are identical and flat.
  They provide repository-wide guidelines for PRs, changelogs, docs, and tests. The
  task instructions strictly limit the scope to two component files, overriding the
  general repository instinct to update docs and changelogs for new features.
