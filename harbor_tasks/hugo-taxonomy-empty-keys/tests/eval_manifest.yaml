distractors:
- rule: Use self-explanatory variable and function names
  source:
    path: repo/AGENTS.md
    lines: 4-4
  source_text: '* Use self-explanatory variable and function names.'
  collision_type: rule_conflict
  why_distracting: An agent could misinterpret this rule as a mandate to use verbose
    names like `taxonomyMap`, `taxonomyKey`, and `taxonomyValue`, ignoring the adjacent
    'use short variable names' rule which is actually preferred for this small local
    context.
  severity: low
- rule: Look for existing helper functions before writing new ones
  source:
    path: repo/AGENTS.md
    lines: 9-9
  source_text: '* This is a project with a long history; assume that a similiar problem
    has been solved before, look hard for helper functions before creating new ones.'
  collision_type: wasted_effort
  why_distracting: The diff implements a simple inline `for` loop to filter the map.
    An agent strictly following this rule might waste significant effort searching
    for or hallucinating a map-filtering helper function instead of just writing the
    standard Go loop.
  severity: medium
