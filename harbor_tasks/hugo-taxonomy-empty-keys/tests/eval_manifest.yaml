rubric:
- rule: Brevity is good. Keep code, comments, and changes minimal.
  source:
    path: AGENTS.md
    lines: 1,11
    commit: cc338a9d4854c7e7273a5c3c8fee436c642f4dde
- rule: Don't use comments to explain the obvious. Use comments to explain invariants
    and rationale, not to narrate code.
  source:
    path: AGENTS.md
    lines: '3'
    commit: cc338a9d4854c7e7273a5c3c8fee436c642f4dde
- rule: Use self-explanatory variable and function names. Short variable names are
    fine when context is clear.
  source:
    path: AGENTS.md
    lines: 4-5
    commit: cc338a9d4854c7e7273a5c3c8fee436c642f4dde
- rule: Look hard for helper functions before creating new ones - similar problems
    have likely been solved before.
  source:
    path: AGENTS.md
    lines: '9'
    commit: cc338a9d4854c7e7273a5c3c8fee436c642f4dde
- rule: Use short variable names when context is clear
  source:
    path: repo/AGENTS.md
    lines: 5-5
  source_text: '* Use short variable names when the context is clear.'
  evidence: The diff introduces variables named 'm', 'k', and 'v', effectively using
    short idiomatic names within a clear, localized scope.
  category: naming
  verification: llm_judge
- rule: Assume Go expertise and avoid explaining obvious code
  source:
    path: repo/AGENTS.md
    lines: 2-3
  source_text: "* Assume that the maintainers and readers of the code you write are\
    \ Go experts:\n   * Don't use comments to explain the obvious."
  evidence: The new comment `// Remove invalid entries (e.g. non-taxonomy keys placed
    inside [taxonomies] in TOML).` explains the domain-specific 'why' without wasting
    time explaining the standard Go `delete()` operation.
  category: commenting
  verification: llm_judge
- rule: Brevity in code and comments
  source:
    path: repo/AGENTS.md
    lines: 11-11
  source_text: '* Brevity is good. This applies to code, comments and commit messages.
    Don''t write a novel.'
  evidence: The fix is a minimal 7-line modification that avoids unnecessary abstraction
    and only adds a concise, single-line comment.
  category: style
  verification: llm_judge
