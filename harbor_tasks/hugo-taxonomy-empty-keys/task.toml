name = "hugo-taxonomy-empty-keys"
difficulty = "medium"
description = "Fix phantom taxonomy bug causing infinite loop in .Ancestors when non-taxonomy keys are placed after [taxonomies] in TOML config"
tags = ["golang", "hugo", "config", "taxonomy", "bugfix"]
pr = "https://github.com/gohugoio/hugo/pull/14551"

timeout = { agent = 1800, verifier = 120 }

[repo]
name = "hugo"
owner = "gohugoio"
base_commit = "cc338a9d4854c7e7273a5c3c8fee436c642f4dde"
merge_commit = "65b4287c68cfa17d4cf0f5526b2a53b960516ac0"

[paths]
repo = "/workspace/hugo"
solution = "/workspace/task/solution/solve.sh"
test = "/workspace/task/tests/test_outputs.py"

[agent]
# The agent needs to find and fix the bug in the taxonomy config parsing
target_files = ["config/allconfig/alldecoders.go"]
