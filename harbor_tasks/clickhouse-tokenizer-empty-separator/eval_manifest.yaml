- rule: When writing text such as documentation, comments, or commit messages, write
    names of functions and methods as `f` instead of `f()` - prefer it for mathematical
    purity when it refers a function itself rather than its application
  source:
    path: .claude/CLAUDE.md
    lines: '7'
    commit: 7dad4d8f7af43976fa63a062d20225aad04842c8
- rule: 'When writing text such as documentation, comments, or commit messages, wrap
    literal names from ClickHouse SQL language, classes and functions, or literal
    excerpts from log messages inside inline code blocks, such as: `MergeTree`'
  source:
    path: .claude/CLAUDE.md
    lines: '5'
    commit: 7dad4d8f7af43976fa63a062d20225aad04842c8
distractors:
