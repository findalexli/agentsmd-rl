rubric:
- rule: PRs should be as brief as possible. Bugfix PRs in particular can often be
    only one or two lines long, and do not need large comments, docstrings or new
    functions in this case. Aim to minimize the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: f5e573080ae0838799c1f9a0ba28be8431120b56
- rule: We try to avoid direct inheritance between model-specific files in src/transformers/models/.
  source:
    path: CLAUDE.md
    lines: '64'
    commit: f5e573080ae0838799c1f9a0ba28be8431120b56
- rule: If a model has a modular file, the modeling file should never be edited directly.
    Changes should be made in the modular file, and then make fixup should be run
    to update the modeling file automatically.
  source:
    path: .github/copilot-instructions.md
    lines: 27-29
    commit: f5e573080ae0838799c1f9a0ba28be8431120b56
- rule: The newer method is to add a file named `modular_<name>.py` in the model directory...
    `make fix-repo` will generate the modeling file
  source:
    path: CLAUDE.md
    lines: 56-57
  evidence: The gold solution modifies `modular_lfm2.py` (the source of truth) as
    listed in the edited files, ensuring the fix is applied to the modular definition
    rather than just the generated modeling file.
  category: architecture
distractors:
- rule: 'Fail-closed behavior for agents: If coordination evidence cannot be found,
    do not proceed to PR-ready output.'
  collision_type: meta_confusion
  why_distracting: In an isolated evaluation environment, there is no live issue thread
    or coordination evidence. An agent strictly following this rule will refuse to
    generate the fix, resulting in a failed evaluation.
  severity: high
  source:
    path: CLAUDE.md
    lines: 46-49
- rule: Ideally you should edit the code it's copying from and propagate the change,
    but you can break the `# Copied from` link if needed.
  collision_type: architecture_boundary
  why_distracting: The agent might choose to break the `# Copied from` link in `modeling_lfm2_moe.py`
    to apply the fix directly, rather than correctly updating the source modular file
    and propagating the changes, which undermines the repository's code deduplication
    strategy.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 55-55
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` contain identical rules. The
  agent must navigate the meta-instructions regarding PR coordination (which should
  be ignored in a benchmark context) while strictly adhering to the architectural
  instructions regarding modular files and `make fix-repo`.
