source_pr:
  owner: prometheus
  repo: prometheus
  number: 18259
  merge_commit: 89b3ad45a8326da8b36c1db0bfc85237e7edd849
  base_commit: 1906c9877fbe7d33d4bd220e9851c719e1b43156

task:
  name: prometheus-file-sd-atomic-writes
  title: "Fix file discovery test helpers to use atomic file writes"
  description: |
    The file service discovery tests in discovery/file/file_test.go have a race condition.
    The test helpers copyFileTo and writeString use os.WriteFile which is not atomic
    (it truncates then writes). This can cause fsnotify to fire between truncate and write,
    causing the watcher to read an empty file.

    Fix: Restore atomic file writes using temp file + os.Rename. The temp file should be
    created in t.TempDir() (outside the watched directory) to avoid spurious fsnotify events.
    Include retry logic for Windows compatibility.

  target_files:
    - discovery/file/file_test.go

  distinctiveness:
    grep_for: "func (t *testRunner) atomicWrite"

  checks:
    # Fail-to-pass checks (test the fix)
    - id: test_atomicwrite_function_exists
      type: fail_to_pass
      origin: agent_config
      description: atomicWrite helper function must exist with correct implementation

    - id: test_copyfileto_uses_atomicwrite
      type: fail_to_pass
      origin: agent_config
      description: copyFileTo must use atomicWrite instead of direct os.WriteFile

    - id: test_writestring_uses_atomicwrite
      type: fail_to_pass
      origin: agent_config
      description: writeString must use atomicWrite instead of direct os.WriteFile

    - id: test_atomicwrite_has_retry_logic
      type: fail_to_pass
      origin: agent_config
      description: atomicWrite must have retry logic for Windows file handle issues

    - id: test_atomicwrite_uses_tempdir
      type: fail_to_pass
      origin: agent_config
      description: atomicWrite must create temp files in t.TempDir() not t.dir

    - id: test_file_sd_tests_run
      type: fail_to_pass
      origin: agent_config
      description: File discovery tests must pass (verifies the fix works)

    # Pass-to-pass checks (regression tests)
    - id: test_file_sd_tests_compile
      type: pass_to_pass
      origin: repo_tests
      description: File discovery code should compile

    - id: test_go_vet_passes
      type: pass_to_pass
      origin: repo_tests
      description: Go vet should pass on the modified code

    - id: test_go_fmt_passes
      type: pass_to_pass
      origin: repo_tests
      description: Go fmt should pass on the modified code

    - id: test_go_mod_verify
      type: pass_to_pass
      origin: repo_tests
      description: Go modules should verify correctly

    - id: test_file_sd_quick_tests
      type: pass_to_pass
      origin: repo_tests
      description: Quick subset of file discovery tests should pass

  rubric: []
    # No agent config files exist in this repository at base commit,
    # so no rubric entries are needed.
