source:
  pr: "https://github.com/MystenLabs/sui/pull/26133"
  merge_commit: "92cdfc7fe041bf824567e76995a5d5ef973bc6d6"
  base_commit: "ffbf699bc89e0d16fbcdefdd9d459b1ca0ddb88a"
  repo: "MystenLabs/sui"
  files_modified:
    - "crates/sui-indexer-alt-object-store/src/lib.rs"

# Evaluation checks
checks:
  # ===========================================================================
  # Fail-to-pass tests: Core behavioral changes
  # ===========================================================================
  - id: test_reader_watermark_returns_data
    type: fail_to_pass
    origin: behavioral
    description: "ConcurrentConnection::reader_watermark() returns actual watermark data instead of None"

  - id: test_pruner_watermark_returns_data
    type: fail_to_pass
    origin: behavioral
    description: "ConcurrentConnection::pruner_watermark() returns actual watermark with computed wait time"

  - id: test_set_reader_watermark_updates
    type: fail_to_pass
    origin: behavioral
    description: "ConcurrentConnection::set_reader_watermark() updates watermark successfully instead of error"

  - id: test_set_pruner_watermark_updates
    type: fail_to_pass
    origin: behavioral
    description: "ConcurrentConnection::set_pruner_watermark() updates watermark successfully instead of error"

  - id: test_init_watermark_with_checkpoint
    type: fail_to_pass
    origin: behavioral
    description: "init_watermark() properly uses checkpoint_hi_inclusive parameter"

  - id: test_legacy_watermark_migration
    type: fail_to_pass
    origin: behavioral
    description: "init_watermark() detects and migrates legacy watermark format to new format"

  - id: test_init_watermark_returns_existing
    type: fail_to_pass
    origin: behavioral
    description: "init_watermark() returns existing watermark values on AlreadyExists"

  # ===========================================================================
  # Pass-to-pass tests: Repo CI/CD
  # ===========================================================================
  - id: test_cargo_check
    type: pass_to_pass
    origin: repo_tests
    description: "cargo check passes for sui-indexer-alt-object-store crate"

  - id: test_cargo_fmt
    type: pass_to_pass
    origin: repo_tests
    description: "Code formatting check (cargo fmt --check) passes"

  - id: test_cargo_xlint
    type: pass_to_pass
    origin: repo_tests
    description: "License linting check (cargo xlint) passes"

  - id: test_existing_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Pre-existing unit tests in the crate pass"

  - id: test_all_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: "All unit tests in the crate pass (including new tests after fix)"

  # ===========================================================================
  # Structural verification tests (gated behind behavioral pass)
  # ===========================================================================
  - id: test_watermark_path_helper_exists
    type: structural
    origin: agent_config
    description: "watermark_path helper function exists"
    source:
      file: "CLAUDE.md"
      lines: "46-50"

  - id: test_object_store_watermark_struct_exists
    type: structural
    origin: agent_config
    description: "ObjectStoreWatermark struct with reader_lo, pruner_hi, pruner_timestamp_ms fields exists"
    source:
      file: "CLAUDE.md"
      lines: "46-50"

  - id: test_get_watermark_helpers_exist
    type: structural
    origin: agent_config
    description: "get_watermark_for_read and get_watermark_for_write helper methods exist"
    source:
      file: "CLAUDE.md"
      lines: "46-50"

# Rubric: Agent config rules that should be followed
rubric:
  - rule: "License header in new files"
    description: "All new files must start with Copyright (c) Mysten Labs, Inc. / SPDX-License-Identifier: Apache-2.0"
    source:
      file: "CLAUDE.md"
      lines: "13-16"

  - rule: "Use #[tokio::test] for async tests"
    description: "All unit tests must use #[tokio::test] for async tests, not #[test]"
    source:
      file: "CLAUDE.md"
      lines: "46-50"

  - rule: "Run cargo xclippy before submitting"
    description: "Code must pass clippy linting without suppressions"
    source:
      file: "CLAUDE.md"
      lines: "46-50"

  - rule: "No linting suppressions"
    description: "NEVER use #[allow(dead_code)], #[allow(unused)], or other linting suppressions"
    source:
      file: "CLAUDE.md"
      lines: "46-50"

  - rule: "All tests must pass"
    description: "NEVER disable or ignore tests - all tests must pass and be enabled"
    source:
      file: "CLAUDE.md"
      lines: "46-50"

  - rule: "Comment only non-obvious logic"
    description: "Do NOT comment the obvious - only non-obvious algorithms, business logic, race conditions"
    source:
      file: "CLAUDE.md"
      lines: "53-66"
