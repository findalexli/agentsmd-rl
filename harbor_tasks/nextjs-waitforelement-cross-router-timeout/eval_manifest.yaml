    lines: 84-91
- rule: Always run a full bootstrap build (pnpm build-all) after switching branches
  collision_type: scope_ambiguity
  why_distracting: The fix only involves changing a timeout value and adding comments
    in a single test file. Running a full bootstrap build (`pnpm build-all`) that
    compiles all JS and Rust code is completely unnecessary for this scope and would
    waste significant time.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 99-104
