distractors:
- rule: Test Commands for MCP tools are `npm run ctest-mcp <filter>` and tests are
    located in `tests/mcp/`.
  collision_type: scope_ambiguity
  why_distracting: The agent might read the test commands for MCP tools and attempt
    to write new tests in `tests/mcp/` to verify the removal of `waitForCompletion`.
    However, the instructions only ask to fix the code and update the skill documentation,
    making test creation an out-of-scope waste of effort.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 58-63
- rule: 'Decision rule: Tests needing `page` + `server` go to `tests/page/`, and tests
    needing `browser`/`context` go to `tests/library/`.'
  collision_type: architecture_boundary
  why_distracting: Because the modified tools interact with `page` and `locator` objects,
    the agent might mistakenly try to add tests in `tests/page/` or `tests/library/`
    based on the decision rule. This crosses an architectural boundary since MCP tools
    have their own dedicated test directory (`tests/mcp/`).
  severity: medium
  source:
    path: CLAUDE.md
    lines: 74-82
hierarchy_analysis: The repository uses a single `CLAUDE.md` file at the root level.
  The guidance is straightforward, but the extensive documentation on testing could
  distract an agent into writing tests when the prompt only requires implementation
  fixes and documentation updates.
