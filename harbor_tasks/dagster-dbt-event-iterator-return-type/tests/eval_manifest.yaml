source:
  repo: dagster-io/dagster
  pr_number: 33615
  base_commit: f44352a8a384296e999c33df60bb785bd69953c4
  merge_commit: ca3d311541c8fc8e12a0fbd1e79ad956bba4a752
  title: "Fix return type on DbtProjectComponent._get_dbt_event_iterator"
  description: |
    Changes the return type of _get_dbt_event_iterator from generic Iterator to
    DbtEventIterator[DbtDagsterEventType] to enable proper type inference when
    using iterator methods like with_insights() in subclasses.

# Checks correspond to test functions in test_outputs.py
checks:
  # Fail-to-pass tests
  - id: test_component_imports_iterator_types
    type: fail_to_pass
    origin: code_review
    description: component.py must import DbtEventIterator and DbtDagsterEventType

  - id: test_component_method_return_type
    type: fail_to_pass
    origin: code_review
    description: _get_dbt_event_iterator must return DbtEventIterator[DbtDagsterEventType]

  - id: test_iterator_methods_use_type_alias
    type: fail_to_pass
    origin: code_review
    description: Iterator methods must use DbtDagsterEventType type alias consistently

  - id: test_type_alias_exists
    type: fail_to_pass
    origin: code_review
    description: DbtDagsterEventType type alias must exist and be properly defined

  # Pass-to-pass tests
  - id: test_grep_style_type_check
    type: pass_to_pass
    origin: code_review
    description: Consistent type alias usage across both files

  - id: test_repo_ruff_check
    type: pass_to_pass
    origin: repo_tests
    description: dagster-dbt passes ruff linting

  - id: test_repo_ruff_format
    type: pass_to_pass
    origin: repo_tests
    description: dagster-dbt passes ruff format check

  - id: test_repo_python_syntax
    type: pass_to_pass
    origin: repo_tests
    description: dagster-dbt Python files have valid syntax

  - id: test_repo_module_browsable
    type: pass_to_pass
    origin: repo_tests
    description: dagster-dbt modules can be parsed by pyclbr

# Rubric rules from agent config files
rubric:
  - rule: "Use builtin types for annotations (list[str], dict[str, Any]) instead of typing.Dict, typing.List"
    source: ".claude/coding_conventions.md"
    weight: minor

  - rule: "Type hints required for all Python code"
    source: ".claude/coding_conventions.md"
    weight: major

  - rule: "All Python code must pass pyright type checking with zero errors"
    source: ".claude/coding_conventions.md"
    weight: critical

  - rule: "Use @record for dataclasses and lightweight objects instead of @dataclass"
    source: ".claude/coding_conventions.md"
    weight: minor

  - rule: "Always use top-level (module-scoped) imports - avoid function-scoped imports except for circular deps, TYPE_CHECKING, or expensive lazy loading"
    source: ".claude/coding_conventions.md"
    weight: minor

  - rule: "After any Python code changes, ALWAYS run make ruff to format and lint"
    source: "CLAUDE.md"
    weight: major
