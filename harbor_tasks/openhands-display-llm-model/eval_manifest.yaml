source:
  pr:
    owner: All-Hands-AI
    repo: OpenHands
    number: 13616
    title: "feat(frontend): Display LLM model on conversation cards and header"
    merge_commit: 0731e8c68a8f80c0157c13ff4c35e79ed655e39a
    base_commit: 0a9570eea22ca0f42dbd055d03d146375853c56c

description: |
  Display the LLM model used for each conversation in the UI. The model name
  appears on conversation cards in the sidebar panel and in the conversation
  name header bar when viewing a conversation. Backend changes plumb the existing
  llm_model field from AppConversation through ConversationInfo to the API response.

repository:
  language: mixed  # TypeScript/React frontend + Python backend
  setup_required: true

agent_config:
  # From AGENTS.md - applicable rules for this task
  checks: []

rubric: []

checks:
  - id: f2p-1
    name: Backend ConversationInfo has llm_model field
    description: |
      The ConversationInfo dataclass in openhands/server/data_models/conversation_info.py
      must have an llm_model field of type str | None = None.
    test: test_backend_conversation_info_has_llm_model
    type: fail_to_pass
    points: 1

  - id: f2p-2
    name: Backend API populates llm_model field
    description: |
      The _to_conversation_info function in openhands/server/routes/manage_conversations.py
      must populate the llm_model field from app_conversation.llm_model.
    test: test_backend_manage_conversations_populates_llm_model
    type: fail_to_pass
    points: 1

  - id: f2p-3
    name: Frontend TypeScript types include llm_model
    description: |
      The Conversation interface in frontend/src/api/open-hands.types.ts must
      include llm_model?: string | null.
    test: test_frontend_types_include_llm_model
    type: fail_to_pass
    points: 1

  - id: f2p-4
    name: ConversationCard component accepts llmModel prop
    description: |
      The ConversationCard component must accept and forward an llmModel prop
      to ConversationCardFooter.
    test: test_conversation_card_accepts_llm_model_prop
    type: fail_to_pass
    points: 1

  - id: f2p-5
    name: ConversationCardFooter displays llm_model with CircuitIcon
    description: |
      The ConversationCardFooter must display the llm_model with CircuitIcon,
      truncation, and tooltip when provided.
    test: test_conversation_card_footer_displays_llm_model
    type: fail_to_pass
    points: 1

  - id: f2p-6
    name: ConversationPanel passes llm_model to ConversationCard
    description: |
      The ConversationPanel component must pass the llm_model from the project
      to the ConversationCard component.
    test: test_conversation_panel_passes_llm_model
    type: fail_to_pass
    points: 1

  - id: f2p-7
    name: ConversationName component displays llm_model
    description: |
      The ConversationName component must display the llm_model with CircuitIcon,
      truncation, and tooltip when not in edit mode.
    test: test_conversation_name_displays_llm_model
    type: fail_to_pass
    points: 1

  - id: f2p-8
    name: RecentConversation component displays llm_model
    description: |
      The RecentConversation component must display the llm_model with CircuitIcon,
      truncation, and tooltip when provided.
    test: test_recent_conversation_displays_llm_model
    type: fail_to_pass
    points: 1

  - id: p2p-1
    name: Frontend TypeScript compiles
    description: |
      The frontend TypeScript code must compile without errors.
    test: test_frontend_typescript_compiles
    type: pass_to_pass
    points: 1

  - id: p2p-2
    name: Frontend lint passes
    description: |
      The frontend code must pass linting (warnings allowed, no errors).
    test: test_frontend_lint_passes
    type: pass_to_pass
    points: 0

  - id: p2p-3
    name: Frontend build passes
    description: |
      The frontend must build successfully without errors.
    test: test_frontend_build_passes
    type: pass_to_pass
    origin: repo_tests
    points: 1

  - id: p2p-4
    name: Conversation component unit tests pass
    description: |
      Unit tests for modified conversation components must pass.
    test: test_frontend_unit_tests_conversation_components
    type: pass_to_pass
    origin: repo_tests
    points: 1

scoring:
  max_score: 11
  passing_score: 9
  hint_penalty: 0.5
