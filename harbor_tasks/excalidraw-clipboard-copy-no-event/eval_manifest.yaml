checks:
- id: clipboard-flow-control
  description: 'The copyTextToSystemClipboard function must return inside the clipboardEvent

    block only when clipboardEvent is provided, and return after navigator.clipboard.writeText

    succeeds. This ensures proper fallback behavior when no ClipboardEvent is available.

    '
  type: fail_to_pass
  origin: pr_diff
- id: plain-text-const
  description: 'The plainTextEntry variable should be declared as const since it is
    never reassigned.

    '
  type: fail_to_pass
  origin: agent_config
  source:
    path: CLAUDE.md
- id: no-redundant-undefined
  description: 'After successful navigator.clipboard.writeText(), the code should
    return directly

    instead of setting plainTextEntry to undefined and continuing.

    '
  type: fail_to_pass
  origin: pr_diff
- id: scss-success-color
  description: 'The FilledButton.scss file should include background-color: var(--color-success)

    for loading and success states.

    '
  type: fail_to_pass
  origin: pr_diff
- id: repo-clipboard-ts-syntax
  description: 'The clipboard.ts file must have valid TypeScript syntax that can be
    parsed.

    This is a pass_to_pass check to ensure the fix doesn''t break syntax.

    '
  type: pass_to_pass
  origin: repo_tests
- id: repo-clipboard-test-ts-syntax
  description: 'The clipboard.test.ts file must have valid TypeScript syntax that
    can be parsed.

    Uses prettier --parser typescript to validate without requiring full type check.

    This is a pass_to_pass check from the repo CI pipeline.

    '
  type: pass_to_pass
  origin: repo_tests
- id: repo-filledbutton-scss-syntax
  description: 'The FilledButton.scss file must have valid SCSS syntax that can be
    parsed.

    This is a pass_to_pass check to ensure the fix doesn''t break syntax.

    '
  type: pass_to_pass
  origin: repo_tests
- id: repo-clipboard-test-syntax
  description: 'The clipboard.test.ts file must have valid TypeScript syntax that
    can be parsed.

    Uses prettier --parser typescript to validate without requiring full type check.

    This is a pass_to_pass check from the repo CI pipeline.

    '
  type: pass_to_pass
  origin: repo_tests
- id: repo-constants-ts-syntax
  description: 'The constants.ts file must have valid TypeScript syntax that can be
    parsed.

    Uses prettier --parser typescript to validate without requiring full type check.

    This is a pass_to_pass check from the repo CI pipeline.

    '
  type: pass_to_pass
  origin: repo_tests
rubric:
- source:
    path: CLAUDE.md
    lines: Clipboard operations must have fallbacks
  rule: Document clipboard fallback architecture
- rule: 'Package Development: Work in `packages/*` for editor features'
  source:
    path: CLAUDE.md
    lines: '14'
  evidence: The gold solution modifies `packages/excalidraw/clipboard.ts` and `packages/excalidraw/components/FilledButton.scss`,
    correctly identifying clipboard logic and button styling as editor features within
  category: architecture
- rule: TypeScript throughout with strict configuration
  source:
    path: CLAUDE.md
    lines: '34'
  evidence: The gold solution changes `let plainTextEntry` to `const plainTextEntry`
    after removing the reassignment (`plainTextEntry = undefined;`), adhering to strict
    TypeScript and linting standards.
  category: style
distractors:
- rule: 'App Development: Work in `excalidraw-app/` for app-specific features'
  collision_type: architecture_boundary
  why_distracting: An agent might assume that system clipboard interaction is an app-specific
    feature rather than an editor feature, leading it to search for or implement the
    fix in `excalidraw-app/` instead of the core package.
  severity: medium
  source:
    path: CLAUDE.md
    lines: '15'
- rule: 'Testing: Always run `yarn test:update` before committing'
  collision_type: meta_confusion
  why_distracting: The agent might attempt to run `yarn test:update` to update snapshots
    as instructed before committing. In an isolated agent environment, this could
    lead to unrelated snapshot changes or test failures, distracting from the specific
    clipboard fix.
  severity: low
  source:
    path: CLAUDE.md
    lines: 16-23
hierarchy_analysis: The repository uses a single `CLAUDE.md` file at the root level.
  The primary challenge is distinguishing between editor features (`packages/excalidraw/`)
  and app-specific features (`excalidraw-app/`), as clipboard interaction could conceptually
  belong to either depending on the architecture.
version: '2.0'
