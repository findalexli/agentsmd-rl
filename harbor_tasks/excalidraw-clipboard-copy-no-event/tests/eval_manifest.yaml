rubric:
- source:
    path: CLAUDE.md
  reference: '### Clipboard

    - Clipboard operations must have fallbacks (event.clipboardData -> navigator.clipboard
    -> execCommand)'
  rule: Document clipboard fallback architecture in CLAUDE.md
  category: documentation
- rule: Prefer immutable data
  source:
    path: repo/.github/copilot-instructions.md
    lines: '16'
  source_text: '- Prefer immutable data (const, readonly)'
  evidence: The gold diff converts `let plainTextEntry` to `const plainTextEntry`
    by removing the subsequent `plainTextEntry = undefined;` reassignment, strictly
    following the rule to prefer immutable `const` declarations when variables are
    no longer re-assigned.
  category: style
  verification: llm_judge
distractors:
- rule: 'App Development: Work in `excalidraw-app/` for app-specific features'
  collision_type: architecture_boundary
  why_distracting: An agent might assume that system clipboard interaction is an app-specific
    feature rather than an editor feature, leading it to search for or implement the
    fix in `excalidraw-app/` instead of the core package.
  severity: medium
  source:
    path: CLAUDE.md
    lines: '15'
- rule: 'Testing: Always run `yarn test:update` before committing'
  collision_type: meta_confusion
  why_distracting: The agent might attempt to run `yarn test:update` to update snapshots
    as instructed before committing. In an isolated agent environment, this could
    lead to unrelated snapshot changes or test failures, distracting from the specific
    clipboard fix.
  severity: low
  source:
    path: CLAUDE.md
    lines: 16-23
- rule: Use CSS modules for component styling
  source:
    path: repo/.github/copilot-instructions.md
    lines: '24'
  source_text: '- Use CSS modules for component styling'
  collision_type: rule_conflict
  why_distracting: The diff involves styling changes to a standard SCSS file (`FilledButton.scss`)
    that uses BEM conventions (`.ExcButton--status-success`). An agent might mistakenly
    attempt to rewrite this styling into a CSS module (`.module.css`) to obey this
    rule, which would break the established architecture and component styles for
    this specific package.
  severity: high
hierarchy_analysis: The repository uses a single `CLAUDE.md` file at the root level.
  The primary challenge is distinguishing between editor features (`packages/excalidraw/`)
  and app-specific features (`excalidraw-app/`), as clipboard interaction could conceptually
  belong to either depending on the architecture.
version: '2.0'
