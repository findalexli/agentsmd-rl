version: "1.0"

task:
  source:
    pr: "https://github.com/OpenHands/OpenHands/pull/13577"
    base_commit: "eb189144f2dfbbf0dad964cf7bdbd44e7910cb29"
    merge_commit: "06cd53d752b022a7ae3676ab17c029f1f810c892"

  checks:
    # Fail-to-pass: New constants must exist
    - id: test_new_poll_constants_exist
      type: fail_to_pass
      origin: behavioral
      description: "_POLL_DELAY_S=3 and _NUM_POLL_ATTEMPTS=4 constants replace old _TITLE_POLL_DELAYS_S"

    # Fail-to-pass: New function must exist
    - id: test_poll_for_title_function_exists
      type: fail_to_pass
      origin: structural
      description: "_poll_for_title async function extracted from __call__ method"

    # Fail-to-pass: Delay value must be correct
    - id: test_poll_delay_is_3_seconds
      type: fail_to_pass
      origin: behavioral
      description: "_POLL_DELAY_S constant is set to 3 seconds"

    # Fail-to-pass: Attempt count must be correct
    - id: test_num_poll_attempts_is_4
      type: fail_to_pass
      origin: behavioral
      description: "_NUM_POLL_ATTEMPTS constant is set to 4"

    # Fail-to-pass: Log level must be warning
    - id: test_warning_log_level_for_failed_polls
      type: fail_to_pass
      origin: behavioral
      description: "Failed polls log at warning level instead of debug"

    # Fail-to-pass: Constants used in function
    - id: test_poll_for_title_uses_constants
      type: fail_to_pass
      origin: structural
      description: "_poll_for_title uses _POLL_DELAY_S and _NUM_POLL_ATTEMPTS"

    # Fail-to-pass: __call__ uses new function
    - id: test_call_method_uses_poll_for_title
      type: fail_to_pass
      origin: structural
      description: "__call__ method calls _poll_for_title() instead of inline logic"

    # Pass-to-pass: File is valid Python
    - id: test_file_is_valid_python
      type: pass_to_pass
      origin: syntax
      description: "Modified file has valid Python syntax"

    # Pass-to-pass: Imports work correctly
    - id: test_imports_work
      type: pass_to_pass
      origin: behavioral
      description: "Module can be imported with new constants accessible"

  # Rubric rules extracted from AGENTS.md
  rubric:
    - rule: "Run pre-commit hooks before pushing changes"
      weight: 1
      source:
        file: AGENTS.md
        lines: "25-30"
        commit: eb189144f2dfbbf0dad964cf7bdbd44e7910cb29

    - rule: "Use specific git add <filename> instead of git add ."
      weight: 1
      source:
        file: AGENTS.md
        lines: "55-56"
        commit: eb189144f2dfbbf0dad964cf7bdbd44e7910cb29

    - rule: "Write tests with pytest for new code"
      weight: 1
      source:
        file: AGENTS.md
        lines: "79-80"
        commit: eb189144f2dfbbf0dad964cf7bdbd44e7910cb29
