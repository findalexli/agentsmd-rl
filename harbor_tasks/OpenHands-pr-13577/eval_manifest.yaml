checks:
  # Fail-to-pass tests: These verify the fix was applied
  - id: test_new_poll_constants_exist
    type: fail_to_pass
    origin: agent_config
    description: New _POLL_DELAY_S and _NUM_POLL_ATTEMPTS constants must exist

  - id: test_poll_for_title_function_exists
    type: fail_to_pass
    origin: agent_config
    description: New _poll_for_title async function must exist

  - id: test_poll_delay_is_3_seconds
    type: fail_to_pass
    origin: agent_config
    description: _POLL_DELAY_S constant must be set to 3

  - id: test_num_poll_attempts_is_4
    type: fail_to_pass
    origin: agent_config
    description: _NUM_POLL_ATTEMPTS constant must be set to 4

  - id: test_warning_log_level_for_failed_polls
    type: fail_to_pass
    origin: agent_config
    description: Failed polls must log at warning level, not debug

  - id: test_poll_for_title_uses_constants
    type: fail_to_pass
    origin: agent_config
    description: _poll_for_title must use the new constants

  - id: test_call_method_uses_poll_for_title
    type: fail_to_pass
    origin: agent_config
    description: __call__ method must use _poll_for_title

  - id: test_imports_work
    type: fail_to_pass
    origin: agent_config
    description: Module must be importable with new constants after fix

  # Pass-to-pass tests: These verify nothing was broken
  - id: test_file_is_valid_python
    type: pass_to_pass
    origin: static
    description: The modified file must be valid Python syntax

  # Repo CI tests: These run actual CI commands
  - id: test_repo_ruff_check_modified_file
    type: pass_to_pass
    origin: repo_tests
    description: Repo ruff linter passes on modified file

  - id: test_repo_unit_tests_for_modified_module
    type: pass_to_pass
    origin: repo_tests
    description: Repo unit tests for modified module pass

  - id: test_repo_python_syntax_valid
    type: pass_to_pass
    origin: repo_tests
    description: Python syntax validation via compileall
