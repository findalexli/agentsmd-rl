  description: 'Same defect, exercised with float16. Verifies the fix is not hard-coded to bfloat16 and that probs are finite.

    '
- id: test_switch_transformers_router_input_dtype_preserved
  type: fail_to_pass
  origin: pr_diff
  description: 'Output router_probs must be returned in the input tensor''s dtype (selective-precision contract documented in the forward method).

    '
- id: test_timm_wrapper_module_cast_to_bfloat16
  type: fail_to_pass
  origin: pr_diff
  description: 'TimmWrapperModel cast to bfloat16 must accept default-dtype pixel_values; the wrapper is responsible for promoting them to the model dtype before invoking the inner timm model.

    '
