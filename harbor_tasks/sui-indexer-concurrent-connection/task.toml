merge_commit = "92cdfc7fe041bf824567e76995a5d5ef973bc6d6"
pr_number = 26133

# Target file
[target]
files = ["crates/sui-indexer-alt-object-store/src/lib.rs"]

# Environment setup
[environment]
# Docker image built from Dockerfile
image = "task-image"
workdir = "/workspace/sui"
