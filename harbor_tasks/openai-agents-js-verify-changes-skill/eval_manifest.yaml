config_edits:
- path: .codex/skills/verify-changes/SKILL.md
  tier: 1
  gold_added: 'YAML frontmatter with `name: verify-changes` and description. Body explains when to use the skill, Quick Start steps for macOS/Linux and Windows, manual fallback workflow listing all five verification commands, and Resources section pointing to run.sh and run.ps1.

    '
  gold_removed: ''
- path: .codex/skills/verify-changes/scripts/run.sh
  tier: 1
  gold_added: 'Bash fail-fast wrapper (`set -euo pipefall`) that resolves the repo root via `git rev-parse --show-toplevel`, then runs `pnpm i`, `pnpm build`, `pnpm -r build-check`, `pnpm lint`, `pnpm test` in order with per-step status messages and a final success message.

    '
  gold_removed: ''
- path: .codex/skills/verify-changes/scripts/run.ps1
  tier: 1
  gold_added: 'PowerShell wrapper with `Set-StrictMode -Version Latest` and `$ErrorActionPreference = "Stop"`, repo-root resolution via git, and a reusable `Invoke-PnpmStep` function that runs the same five-command sequence with `$LASTEXITCODE` checks.

    '
  gold_removed: ''
- path: AGENTS.md
  tier: 1
  gold_added: '(1) New `## Mandatory Skill Usage` section near the top instructing agents to load `$verify-changes` after any code change. (2) Updated Table of Contents to register the new section and renumbered entries. (3) One-line note under `## ExecPlans` about backward-compatibility / public API risks. (4) Note that translated docs under `docs/src/content/docs/{ja,ko,zh}` are generated via `pnpm docs:translate` and must not be edited manually. (5) Replaced the raw `pnpm lint && pnpm build && pnpm -r build-check && pnpm test` fenced code block under `### Mandatory Local Run Order` with prose delegating to `$verify-changes`. (6) Replaced the equivalent block in Development Workflow step 4 with the same delegation.

    '
  gold_removed: 'Raw inline fenced code block `pnpm lint && pnpm build && pnpm -r build-check && pnpm test` from both `### Mandatory Local Run Order` and Development Workflow step 4. Old TOC numbering (1-10) before renumbering to 1-11.

    '
rubric:
- rule: Comments must end with a period (AGENTS.md 'Linting & Formatting' bullet). Applies to any inline comments the agent writes in the new run.sh / run.ps1 scripts.
  source:
    path: AGENTS.md
    lines: '101'
    commit: b54fc4a3222ea8b14b1c3a8e45457b4905354bee
  evidence: Gold run.sh and run.ps1 scripts use inline comments that end with periods (e.g. '# starts Verdaccio on :4873' style in the gold AGENTS.md).
  category: style
  verification: llm_judge
- rule: The verification stack must execute in the documented order without skipping steps (AGENTS.md 'Mandatory Local Run Order'). The new skill and its scripts must preserve the canonical sequence and fail fast on the first failing command.
  source:
    path: AGENTS.md
    lines: 111-115
    commit: b54fc4a3222ea8b14b1c3a8e45457b4905354bee
  evidence: Gold run.sh and run.ps1 execute `pnpm i`, `pnpm build`, `pnpm -r build-check`, `pnpm lint`, `pnpm test` in that exact order, and SKILL.md manual workflow lists the same order.
  category: testing
  verification: programmatic
- rule: Codex agent skills must live under `.codex/skills/<skill-name>/` so they are auto-loaded for the repository (per the skill's own Quick Start guidance and Codex skill conventions).
  source:
    path: .codex/skills/verify-changes/SKILL.md
    lines: '13'
    commit: f122a605e9d9ac7cc035444dfd73e015369633a2
  evidence: Gold creates all skill files under `.codex/skills/verify-changes/` matching the canonical auto-load path.
  category: naming
  verification: programmatic
- rule: 'Skills must be referenced from `AGENTS.md` via the `$<skill-name>` syntax (e.g. `$verify-changes`) — that is how Codex resolves skill invocations from prose.

    '
  source:
    path: AGENTS.md
    lines: 29-31
    commit: f122a605e9d9ac7cc035444dfd73e015369633a2
  evidence: Gold AGENTS.md references the skill as `$verify-changes` in the Mandatory Skill Usage section, the testing intro, Mandatory Local Run Order, and Development Workflow step 4.
  category: style
  verification: llm_judge
- rule: The `## Table of Contents` numbered list must list every top-level section in the order it appears in the file. Adding a new top-level section (Mandatory Skill Usage) requires renumbering the TOC entries.
  source:
    path: AGENTS.md
    lines: 13-23
    commit: b54fc4a3222ea8b14b1c3a8e45457b4905354bee
  evidence: Gold AGENTS.md TOC lists `## Mandatory Skill Usage` as entry 1 and renumbers all subsequent entries (Overview becomes 2, Repo Structure becomes 3, etc. through Prerequisites becoming 11).
  category: style
  verification: llm_judge
- rule: The verification scripts must abort on the first failing step so that contributors do not silently continue past a broken stage. For Bash this means `set -e` (or stricter); for PowerShell, `$ErrorActionPreference = 'Stop'` plus explicit `$LASTEXITCODE` checks.
  source:
    path: .codex/skills/verify-changes/scripts/run.sh
    lines: '2'
    commit: f122a605e9d9ac7cc035444dfd73e015369633a2
  evidence: Gold run.sh uses `set -euo pipefail` on line 2; gold run.ps1 uses `Set-StrictMode -Version Latest`, `$ErrorActionPreference = 'Stop'`, and checks `$LASTEXITCODE` after each pnpm invocation.
  category: testing
  verification: programmatic
distractors:
- rule: 'The `### Mandatory Local Run Order` section in base AGENTS.md displays the verification commands inside a fenced code block (` ```bash ... ``` `), which could lead the agent to preserve the fenced-block format instead of rewriting the section as prose delegation to the `$verify-changes` skill.

    '
  source:
    path: AGENTS.md
    lines: 111-117
    commit: b54fc4a3222ea8b14b1c3a8e45457b4905354bee
  collision_type: scope_ambiguity
  why_distracting: Agent may keep the fenced code block alongside a new skill reference, violating the instruction to replace the raw command block with prose delegation.
  severity: medium
- rule: 'The `## ExecPlans` section references `.agent/PLANS.md`, establishing `.agent/` as a directory for agent configuration. An agent might incorrectly place the new skill under `.agent/skills/` instead of `.codex/skills/`.

    '
  source:
    path: AGENTS.md
    lines: 7-9
    commit: b54fc4a3222ea8b14b1c3a8e45457b4905354bee
  collision_type: rule_conflict
  why_distracting: Agent may follow the `.agent/` convention from ExecPlans and place skill files there, which would not auto-load per Codex skill conventions.
  severity: high
- rule: 'The `## Table of Contents` section in base AGENTS.md shows a strict numbered-list format. An agent might only add the new entry without renumbering subsequent items, or append the entry out of order at the bottom.

    '
  source:
    path: AGENTS.md
    lines: 11-22
    commit: b54fc4a3222ea8b14b1c3a8e45457b4905354bee
  collision_type: meta_confusion
  why_distracting: Agent may insert the new TOC entry without renumbering 2→11, breaking the TOC ordering constraint.
  severity: low
