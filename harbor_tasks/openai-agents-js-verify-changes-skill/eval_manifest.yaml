  evidence: Gold SKILL.md and AGENTS.md enforce the full stack via the verify-changes skill.
  category: testing
  verification: semantic_diff
- rule: NEVER USE `-w` or other watch modes.
  source:
    path: AGENTS.md
    lines: '59'
    commit: b54fc4a3222ea8b14b1c3a8e45457b4905354bee
  evidence: Gold scripts do not use -w or watch mode flags.
  category: style
  verification: semantic_diff
- rule: Comments must end with a period.
  source:
    path: AGENTS.md
    lines: '70'
    commit: b54fc4a3222ea8b14b1c3a8e45457b4905354bee
  evidence: Gold markdown content uses proper sentence punctuation.
  category: style
  verification: llm_judge
- rule: Add or update unit tests for any code change unless it is truly infeasible
  source:
    path: AGENTS.md
    lines: '55'
    commit: b54fc4a3222ea8b14b1c3a8e45457b4905354bee
  evidence: The verify-changes skill enforces running tests as part of the verification stack.
  category: testing
  verification: semantic_diff
