  evidence: The skill enforces linting which applies ESLint and Prettier.
  category: style
  verification: semantic_diff
distractors:
- rule: You can skip failing precommit hooks using `--no-verify` during commit.
  source:
    path: AGENTS.md
    lines: '120'
    commit: b54fc4a3222ea8b14b1c3a8e45457b4905354bee
  collision_type: rule_conflict
  why_distracting: The --no-verify escape hatch contradicts the mandatory verification ethos. An agent might include a skip flag in the skill script.
  severity: medium
- rule: Use Conventional Commits
  source:
    path: AGENTS.md
    lines: '140'
    commit: b54fc4a3222ea8b14b1c3a8e45457b4905354bee
  collision_type: scope_ambiguity
  why_distracting: Commit message formatting is a repo workflow rule, not a skill-creation rule. Agent may confuse it with the skill content.
  severity: low
