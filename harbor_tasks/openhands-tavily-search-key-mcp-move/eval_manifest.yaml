checks:
- id: test_llm_save_excludes_search_api_key
  type: fail_to_pass
  origin: repo_tests
  description: 'LLM settings save payload must omit `search_api_key`. Test located in frontend/__tests__/routes/llm-settings.test.tsx (PR HEAD case "does not include search API key updates when saving basic LLM settings").

    '
- id: test_llm_advanced_view_omits_search_api_key_input
  type: fail_to_pass
  origin: repo_tests
  description: 'Advanced LLM view must not render the `search-api-key-input` element. Frontend test "does not render the search API key input in advanced LLM settings".

    '
- id: test_llm_save_preserves_mcp_owned_search_key_on_refetch
  type: fail_to_pass
  origin: repo_tests
  description: 'Saving LLM settings must not flip into all-fields view when the refetched settings still carry an MCP-owned `search_api_key`.

    '
- id: test_mcp_settings_renders_and_saves_tavily
  type: fail_to_pass
  origin: repo_tests
  description: 'MCP settings screen must render a built-in Tavily search section with `search-api-key-input` and `save-search-api-key-button`, and persist `{search_api_key: <new value>}` on save.

    '
- id: test_mcp_delete_flow_still_works
  type: pass_to_pass
  origin: repo_tests
  description: 'Pre-existing MCP server delete-flow test must continue to pass.

    '
- id: test_no_unrelated_vitest_regressions
  type: pass_to_pass
  origin: repo_tests
  description: 'Aggregate guard: every case in llm-settings.test.tsx and mcp-settings.test.tsx must pass after the change.

    '
- id: test_repo_lint_passes
  type: pass_to_pass
  origin: repo_tests
  description: 'Repo''s `npm run lint` (typecheck + eslint + prettier --check) must pass. AGENTS.md requires this for any frontend change.

    '
- id: test_repo_lint_via_bash
  type: pass_to_pass
  origin: repo_tests
  description: 'Same `npm run lint` but executed through `bash -lc` to match CI/CD shell semantics.'
rubric:
- id: rubric_lint_pre_push_required
  source:
    lines: 21-21
    path: AGENTS.md
    commit: fd014e8e23fa631b1667fe25929a149c85154519
  rule: 'AGENTS.md requires `cd frontend && npm run lint:fix && npm run build` to pass before pushing frontend changes. This is enforced as a hard check by `test_repo_lint_passes`, but solutions that disable rules or bypass lint should be rejected.

    '
- id: rubric_data_access_layer
  source:
    lines: 85-89
    path: AGENTS.md
    commit: fd014e8e23fa631b1667fe25929a149c85154519
  rule: 'Architecture rule from AGENTS.md: UI components must call data via TanStack Query hooks under `frontend/src/hooks/query` / `frontend/src/hooks/mutation`, never `frontend/src/api/*` clients directly. The new MCP search-key save path must respect this layering.

    '
- id: rubric_settings_pattern_choice
  source:
    lines: 139-160
    path: AGENTS.md
    commit: fd014e8e23fa631b1667fe25929a149c85154519
  rule: 'AGENTS.md describes two settings UI patterns. The Tavily search key on the MCP page is a single, immediately-acting credential (similar to API Keys / MCP servers); a manual-save form is also acceptable so long as the save action posts `{search_api_key: <value>}` only. Solutions that conflate this with the LLM settings form (re-introducing payload coupling) should be rejected.

    '
- id: rubric_i18n_keys_declared
  source:
    lines: 117-128
    path: AGENTS.md
    commit: fd014e8e23fa631b1667fe25929a149c85154519
  rule: 'AGENTS.md (Adding User Settings) requires that any new translation string be added to both `frontend/src/i18n/translation.json` and `frontend/src/i18n/declaration.ts`. Visible labels on the new MCP search section must be localised — not hardcoded English strings.

    '
