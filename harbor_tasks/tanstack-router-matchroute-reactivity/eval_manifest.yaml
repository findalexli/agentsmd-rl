  # Fail-to-pass tests
  - id: test_usematchroute_opts_inside_memo
    type: fail_to_pass
    origin: task_specific
    description: "useMatchRoute destructures opts inside createMemo callback"

  - id: test_matchroute_uses_memo_for_children
    type: fail_to_pass
