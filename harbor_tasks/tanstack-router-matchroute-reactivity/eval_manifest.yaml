source_pr:
  owner: TanStack
  repo: router
  number: 6911
  title: "fix(solid-router): restore MatchRoute reactivity"
  merge_commit: 1a6c6cf83e0d4baf9232802f66e1a3b7ae760f3f
  base_commit: 49d7cbb7768c085be2ce31b36ef3da272b0ebbdd

task:
  name: tanstack-router-matchroute-reactivity
  title: Fix MatchRoute reactivity in Solid Router
  description: |
    The MatchRoute component in @tanstack/solid-router has a reactivity bug
    where route changes do not properly update the rendered children. The
    component gets stuck on the initial match result and doesn't react to:
    1. Navigation changes (router.history.push)
    2. Reactive param changes (via Solid signals)

    The fix requires moving option destructuring inside Solid.createMemo callbacks
    so that reactive inputs are properly tracked by Solid's reactivity system.

  target_files:
    - packages/solid-router/src/Matches.tsx

  difficulty: medium
  tags: ["solidjs", "reactivity", "router", "typescript", "bugfix"]

  estimated_time:
    min: 15
    max: 45

