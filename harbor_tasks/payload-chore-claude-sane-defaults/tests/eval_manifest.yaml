distractors:
- rule: Use bare pnpm commands like `pnpm build` and `pnpm dev` for build and development
    tasks.
  collision_type: meta_confusion
  why_distracting: The existing documentation lists commands like `pnpm build` and
    `pnpm dev` without the `run` prefix. An agent might copy these exact commands
    into the new Quick Start section or leave them unmodified, violating the PR instruction
    to standardize on `pnpm run` to match the new permission allowlist.
  severity: high
  source:
    path: CLAUDE.md
    lines: 40-43
hierarchy_analysis: The agent must edit the root `CLAUDE.md` file, which acts as its
  own instruction manual. The PR instructions explicitly override the existing conventions
  in `CLAUDE.md` (e.g., changing bare `pnpm` commands to `pnpm run`). The agent must
  apply these overrides while maintaining the rest of the file's structure.
