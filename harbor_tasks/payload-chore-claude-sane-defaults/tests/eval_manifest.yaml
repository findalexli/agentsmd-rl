    - \u0060pnpm build:all\u0060 - Build all packages

    - \u0060pnpm build:<directory_name>\u0060 - Build specific package (e.g. \u0060pnpm
    build:db-mongodb\u0060, \u0060pnpm build:ui\u0060)

    - \u0060pnpm dev\u0060 - Start dev server with default config (\u0060test/_community/config.ts\u0060)

    - \u0060pnpm dev <directory_name>\u0060 - Start dev server with specific test
