- path: CLAUDE.md
  tier: 1
  gold_added: "- `packages/kv-redis` - Redis key-value store adapter\n  - `packages/storage-*`\
    \ - Storage adapters (S3, Azure, GCS, Uploadthing, Vercel Blob, R2)\n## Quick\
    \ Start\n\n1. `pnpm install`\n2. `pnpm run build:core`\n3.  `pnpm run dev` (MongoDB)\
    \ or `pnpm run dev:postgres`\n\n-  `pnpm install` - Install all dependencies\n\
    - `pnpm turbo` - All Turbo commands should be run from root with pnpm - not with`turbo`\
    \ directly\n- `pnpm run build` or `pnpm run build:core` - Build core packages\
    \ (excludes plugins and storage adapters)\n- `pnpm run build:all` - Build all\
    \ packages\n- `pnpm run build:<directory_name>` - Build specific package (e.g.\
    \ `pnpm run build:db-mongodb`, `pnpm run build:ui`)\n- `pnpm run dev` - Start\
    \ dev server with default config (`test/_community/config.ts`)\n- `pnpm run dev\
    \ <directory_name>` - Start dev server with specific test config (e.g. `pnpm run\
    \ dev fields` loads `test/fields/config.ts`)\n- `pnpm run dev:postgres` - Run\
    \ dev server with Postgres\n- `pnpm run dev:memorydb` - Run dev server with in-memory\
    \ MongoDB\n- `pnpm run test` - Run all tests (integration + components + e2e)\n\
    - `pnpm run test:int` - Integration tests (MongoDB, recommended)\n- `pnpm run\
    \ test:int <dir>` - Specific test suite (e.g. `fields`)\n- `pnpm run test:int:postgres|sqlite`\
    \ - Integration tests with other databases\n- `pnpm run test:e2e` - Playwright\
    \ tests (add `:headed` or `:debug` suffix)\n- `pnpm run test:unit|components|types`\
    \ - Other test suites\nGenerate types for a test directory: `pnpm run dev:generate-types\
    \ <directory_name>`\n- `pnpm run lint` - Run linter across all packages\n-  `pnpm\
    \ run lint:fix` - Fix linting issues\n- Run `pnpm run translateNewKeys` to auto-translate\
    \ new keys (requires `OPENAI_KEY` in `.env`)\n- Lexical translations: `cd packages/richtext-lexical\
    \ && pnpm run translateNewKeys`"
  gold_removed: '- \u0060packages/storage-*\u0060 - Storage adapters (S3, Azure, GCS,
