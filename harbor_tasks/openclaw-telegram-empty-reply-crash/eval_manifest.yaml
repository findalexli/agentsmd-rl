  category: architecture
distractors:
- rule: 'Messaging channels: always consider all built-in + extension channels when
    refactoring shared logic'
  collision_type: scope_ambiguity
  why_distracting: The rule mandates considering ALL built-in and extension channels
    when refactoring shared logic. An agent might interpret the empty-text filtering
    as 'shared logic' and attempt to proactively add similar guards to Discord, Slack,
    Signal, etc., vastly overcomplicating a PR meant to fix a specific Telegram `GrammyError
    400`.
  severity: high
  source:
    path: CLAUDE.md
    lines: 21-25
- rule: 'Core channel code: src/telegram ... Extensions (channel plugins): extensions/*'
  collision_type: architecture_boundary
  why_distracting: The rule explicitly lists `src/telegram` as 'Core channel code'
    while categorizing `extensions/*` as 'Extensions (channel plugins)'. Since the
    target file is `extensions/telegram/src/bot/delivery.replies.ts`, the agent might
    get confused about whether Telegram is a core channel or an extension, potentially
    trying to modify or move code to `src/telegram`.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 22-24
- rule: 'Tests: colocated *.test.ts.'
  collision_type: scope_ambiguity
  why_distracting: 'The rule states ''Tests: colocated *.test.ts''. The agent might
    waste time trying to write unit tests for the new `filterEmptyTelegramTextChunks`
    function or the delivery paths, which is not required by the expected fix and
    not present in the gold solution.'
  severity: low
  source:
    path: CLAUDE.md
    lines: 10-10
hierarchy_analysis: CLAUDE.md and AGENTS.md are identical at the root level. The primary
  conflict arises from the documentation's classification of channels, where `src/telegram`
  is listed as core but the actual implementation lives in `extensions/telegram`.
  The agent must trust the provided file path over the generalized directory mapping
  in the config.
