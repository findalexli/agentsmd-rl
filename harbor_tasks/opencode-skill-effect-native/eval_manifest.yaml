    lines: '607'
    commit: 21023337fa8011568b2570a3bd49fffed842ce86
- rule: Effect.fn / Effect.fnUntraced accept pipeable operators as extra arguments,
    so avoid unnecessary outer .pipe() wrappers.
  source:
    path: packages/opencode/AGENTS.md
    lines: '608'
    commit: 21023337fa8011568b2570a3bd49fffed842ce86
- rule: In effectified services, prefer yielding existing Effect services over dropping
    down to ad hoc platform APIs.
  source:
    path: packages/opencode/AGENTS.md
    lines: 631-632
    commit: 21023337fa8011568b2570a3bd49fffed842ce86
- rule: Do the work directly in the InstanceState.make closure -- ScopedCache handles
    run-once semantics. Don't add fibers, ensure() callbacks, or started flags on
    top.
  source:
    path: packages/opencode/AGENTS.md
    lines: '625'
    commit: 21023337fa8011568b2570a3bd49fffed842ce86
- rule: Keep things in one function unless composable or reusable.
  source:
    path: AGENTS.md
    lines: '11'
    commit: 21023337fa8011568b2570a3bd49fffed842ce86
- rule: Prefer single word variable names where possible.
  source:
    path: AGENTS.md
    lines: '14'
    commit: 21023337fa8011568b2570a3bd49fffed842ce86
- rule: Rely on type inference when possible; avoid explicit type annotations or interfaces
    unless necessary for exports or clarity.
  source:
    path: AGENTS.md
    lines: '16'
    commit: 21023337fa8011568b2570a3bd49fffed842ce86
- rule: Reduce total variable count by inlining when a value is only used once.
  source:
    path: AGENTS.md
    lines: '44'
    commit: 21023337fa8011568b2570a3bd49fffed842ce86
- rule: Use `Effect.fn("Domain.method")` for named/traced effects and `Effect.fnUntraced`
    for internal helpers.
  source:
    path: packages/opencode/AGENTS.md
    lines: 13-14
  evidence: The internal helper functions `add`, `scan`, and `loadSkills` are converted
    from plain async functions to Effect generators using `Effect.fnUntraced(function*
    (...) { ... })`.
  category: architecture
- rule: Avoid `try`/`catch` where possible
  source:
    path: AGENTS.md
    lines: 11-12
  evidence: 'The gold solution avoids native `try/catch` blocks, instead using `Effect.tryPromise({
    try: ..., catch: ... })` and `Effect.catch` to handle promise rejections and errors.'
  category: style
- rule: 'Control Flow: Avoid `else` statements. Prefer early returns.'
  source:
    path: AGENTS.md
    lines: 68-69
  evidence: In the `scan` error handler, the code uses an early return `if (!opts?.scope)
    return Effect.die(error)` instead of wrapping the subsequent logging and return
    in an `else` block.
  category: style
distractors:
- rule: Prefer `FileSystem.FileSystem` instead of raw `fs/promises` for effectful
    file I/O.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to replace `Glob.scan` or `Filesystem.isDir`
    with `FileSystem.FileSystem` methods. However, `Glob.scan` is a specific utility
    and the goal of this PR is strictly to fix Effect dependency injection and lifecycle
    management, not to rewrite the underlying file scanning implementation.
  severity: medium
  source:
    path: packages/opencode/AGENTS.md
    lines: 38-39
- rule: '`Effect.fn` / `Effect.fnUntraced` accept pipeable operators as extra arguments,
    so avoid unnecessary outer `.pipe()` wrappers.'
  collision_type: meta_confusion
  why_distracting: The gold solution uses `.pipe(Effect.catch(...))` on the `Effect.tryPromise`
    call inside the generator. An agent might misinterpret this rule and try to pass
    the `Effect.catch` as an argument to `Effect.fnUntraced`, or try to avoid `.pipe()`
    on `Effect.tryPromise` (which does not accept operators as extra arguments), leading
    to incorrect error handling or type errors.
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: 14-15
- rule: Use Bun APIs when possible, like `Bun.file()`
  collision_type: architecture_boundary
  why_distracting: The agent might attempt to rewrite the file reading or globbing
    logic using Bun-specific APIs like `Bun.file()`. This would cross an architecture
    boundary since the codebase already uses `Glob.scan` and `ConfigMarkdown.parse`
    for these specific tasks, and changing the I/O mechanism is out of scope.
  severity: low
  source:
    path: AGENTS.md
    lines: 14-15
hierarchy_analysis: The root `AGENTS.md` provides general TypeScript and style guidelines
  (like avoiding try/catch and early returns), while `packages/opencode/AGENTS.md`
  provides highly specific Effect migration patterns. The Effect-specific rules in
  the package config take precedence for architectural decisions, but the general
  style rules from the root still apply to the internal logic of the Effect generators.
