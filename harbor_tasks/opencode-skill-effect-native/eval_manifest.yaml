    origin: pr_diff
    description: "loadSkills must be a native Effect generator, not an async function"

  - id: add_helper_is_effect_generator
    type: fail_to_pass
    origin: pr_diff
    description: "add helper must be a native Effect generator, not async"

  - id: scan_helper_is_effect_generator
    type: fail_to_pass
    origin: pr_diff
    description: "scan helper must be a native Effect generator, not async"

  - id: static_config_facades_removed
    type: fail_to_pass
    origin: pr_diff
    description: "Config.get() and Config.directories() static facades removed in favor of yielded instance"

  - id: effect_run_promise_removed
    type: fail_to_pass
    origin: pr_diff
    description: "Effect.runPromise bridge removed -- discovery.pull() yielded natively"

  - id: monolithic_promise_wrapper_removed
    type: fail_to_pass
    origin: pr_diff
    description: "Monolithic Effect.promise(() => loadSkills(...)) wrapper removed"

  - id: layer_declares_config_and_bus_deps
    type: fail_to_pass
    origin: pr_diff
    description: "Layer type declares Config.Service and Bus.Service as dependencies"

  - id: default_layer_provides_config_and_bus
    type: fail_to_pass
    origin: pr_diff
    description: "defaultLayer provides Config and Bus layers alongside Discovery"

  - id: no_promise_then_chains
    type: fail_to_pass
    origin: pr_diff
    description: "Promise .then() chains replaced with Effect combinators"

  - id: no_promise_all
    type: fail_to_pass
    origin: pr_diff
    description: "Promise.all replaced with Effect.forEach or Effect.all"

  # --- Pass-to-pass: Regression ---
  - id: core_patterns_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "Core skill discovery patterns preserved (SKILL.md, InstanceState, Skill.state)"

  - id: error_reporting_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "Session.Event.Error reporting preserved in error handling path"

  # --- Pass-to-pass: Agent config ---
  - id: no_try_catch
    type: pass_to_pass
    origin: agent_config
    description: "No try/catch blocks (prefer Effect.tryPromise/Effect.catch)"
    source:
      path: "AGENTS.md"
      lines: "12"
      commit: "21023337fa8011568b2570a3bd49fffed842ce86"

  - id: no_any_type
    type: pass_to_pass
    origin: agent_config
    description: "No 'any' type annotations"
    source:
      path: "AGENTS.md"
      lines: "13"
      commit: "21023337fa8011568b2570a3bd49fffed842ce86"

  # --- Pass-to-pass: Anti-stub ---
  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "Modified file retains substantial logic, not a stub"

rubric:
  - rule: "Use Effect.fn(\"Domain.method\") for named/traced effects and Effect.fnUntraced for internal helpers."
    source:
      path: "packages/opencode/AGENTS.md"
      lines: "607"
      commit: "21023337fa8011568b2570a3bd49fffed842ce86"

  - rule: "Effect.fn / Effect.fnUntraced accept pipeable operators as extra arguments, so avoid unnecessary outer .pipe() wrappers."
    source:
      path: "packages/opencode/AGENTS.md"
      lines: "608"
      commit: "21023337fa8011568b2570a3bd49fffed842ce86"

  - rule: "In effectified services, prefer yielding existing Effect services over dropping down to ad hoc platform APIs."
    source:
      path: "packages/opencode/AGENTS.md"
      lines: "631-632"
      commit: "21023337fa8011568b2570a3bd49fffed842ce86"

  - rule: "Do the work directly in the InstanceState.make closure -- ScopedCache handles run-once semantics. Don't add fibers, ensure() callbacks, or started flags on top."
    source:
      path: "packages/opencode/AGENTS.md"
      lines: "625"
      commit: "21023337fa8011568b2570a3bd49fffed842ce86"

  - rule: "Keep things in one function unless composable or reusable."
    source:
      path: "AGENTS.md"
      lines: "11"
      commit: "21023337fa8011568b2570a3bd49fffed842ce86"

  - rule: "Prefer single word variable names where possible."
    source:
      path: "AGENTS.md"
      lines: "14"
      commit: "21023337fa8011568b2570a3bd49fffed842ce86"

  - rule: "Rely on type inference when possible; avoid explicit type annotations or interfaces unless necessary for exports or clarity."
    source:
      path: "AGENTS.md"
      lines: "16"
      commit: "21023337fa8011568b2570a3bd49fffed842ce86"

  - rule: "Reduce total variable count by inlining when a value is only used once."
    source:
      path: "AGENTS.md"
      lines: "44"
      commit: "21023337fa8011568b2570a3bd49fffed842ce86"
