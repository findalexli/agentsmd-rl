config_edits:
- path: devtools/README.md
  tier: 2
  gold_added: "#### Dev Install\n\nTo actually build and install as a real browser\
    \ extension in dev mode, use:\n\n```shell\npnpm devtools:build:chrome:debug\n\
    ```\n\nThis will build the extension at `dist/bin/devtools/projects/shell-browser/src/prodapp`.\
    \ Then go to `chrome://extensions`,\nenable developer mode, and click \"Load unpacked\"\
    \ to load the extension from that directory.\n\nWhenever you rebuild the extension,\
    \ make sure to reload the extension in `chrome://extensions`, right click on the\n\
    Angular DevTools panel and click \"Reload frame\", and refresh the page you're\
    \ inspecting to make sure changes are applied.\n\n#### Debugging\n\nDepending\
    \ on which script you want to debug, you can find them in different locations.\
    \ In debug mode, these should all\nhave sourcemaps loaded and be unminified.\n\
    \n- The main \"Angular DevTools\" panel UI runs in its own frame and can be found\
    \ by clicking \"Inspect Element\" directly\n  on that UI.\n  - Note that this\
    \ inspects _all_ of Chrome DevTools, which loads Angular DevTools in an iframe.\n\
    \  - The right entry point is under `index.html/ienfalfjdbdpebioblfackkekamfmbnh/...`\n\
    - Scripts directly executed in the inspected page content's can be found in the\
    \ normal Sources panel under \"Angular DevTools\".\n  - `backend_bundle.js`\n\
    \  - `detect_angular_bundle.js`\n- Content scripts are executed in the inspected\
    \ page, but within an isolated environment and found in the normal Sources panel,\n\
    \  but under the \"Content Scripts\" section (as opposed to \"Page\", \"Workspace\"\
    , \"Overrides\", etc., you may need to click an\n  arrow to expand the list of\
    \ sections).\n  - `content_script_bundle.js`\n  - `ng_validate_bundle.js`\n- The\
    \ background service worker is found at `chrome://extensions`.\n  - Click on the\
    \ \"Angular DevTools\" extension and the \"Inspect Views > service worker\" button\
    \ to open a debugger."
  gold_removed: ''
distractors:
- rule: 'Zoneless & Async-First: Assume a zoneless environment where state changes
    schedule updates asynchronously.'
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to write or modify tests for the new debug
    build flag using the 'Act, Wait, Assert' pattern or look for test files to update.
    However, this PR is strictly about build configuration (Bazel, package.json) and
    documentation. No tests are required or modified.
  severity: low
  source:
    path: AGENTS.md
    lines: 19-27
- rule: Use when authoring or reviewing content in adev/src/content.
  source:
    path: .agent/skills/adev-writing-guide/SKILL.md
    lines: 1-3
  collision_type: scope_ambiguity
  why_distracting: The agent might try to apply Angular-specific markdown extensions
    or Google Technical Writing standards to `devtools/README.md`, but this guide
    is strictly scoped to `adev/src/content`.
  severity: medium
- rule: You can always run `npx ng build` to check for errors and repair them.
  source:
    path: skills/dev-skills/angular-new-app/SKILL.md
    lines: 25-26
  collision_type: architecture_boundary
  why_distracting: The agent might attempt to use Angular CLI (`ng build`) or suggest
    CLI commands for the devtools build process, but devtools is built using Bazel
    and esbuild.
  severity: high
hierarchy_analysis: Only the root AGENTS.md file applies to this PR. The rules are
  straightforward, though the testing guidelines are out of scope for this specific
  build configuration task.
