  category: style
distractors:
- rule: When implementing solutions prefer writing a test for it first / Avoid mocks
  collision_type: rule_conflict
  why_distracting: Testing Docker container lifecycle and resource leaks requires
    either heavy integration tests (spinning up actual Docker containers) or mocks.
    However, the rules explicitly state to 'Avoid mocks' and 'Prefer small (unit)
    tests'. An agent might get stuck trying to write a test for this or violate the
    no-mocking rule.
  severity: high
  source:
    path: AGENTS.md
    lines: 40-43
- rule: When changing user-visible behavior, compare with at least one other binding
  collision_type: architecture_boundary
  why_distracting: The agent might try to search for Docker Grid implementations in
    Python, Ruby, or C# to add the same `--docker-stop-grace-period` flag. However,
    the Selenium Grid server is primarily implemented in Java, making cross-binding
    comparisons irrelevant and a waste of effort for this specific feature.
  severity: medium
  source:
    path: AGENTS.md
    lines: 36-38
- rule: Add logging where users may need insight into what's happening
  collision_type: scope_ambiguity
  why_distracting: An agent might add logging inside the `finally` block or when the
    timeout is applied to provide 'insight'. This would likely spam the logs during
    normal, successful session teardowns, degrading the user experience.
  severity: low
  source:
    path: AGENTS.md
    lines: 50-51
hierarchy_analysis: The configuration hierarchy is flat for this task, as all rules
  are contained within the root `AGENTS.md` file. The primary tension lies within
  `AGENTS.md` itself, specifically between the mandate to write tests first and the
  strict prohibition against using mocks, which makes testing infrastructure-level
  code (like Docker container management) highly problematic for an AI agent.
