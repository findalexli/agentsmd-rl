distractors:
- rule: Run tests using `yarn snap`
  collision_type: scope_ambiguity
  why_distracting: The instructions say to use `yarn snap` to run tests. However,
    `yarn snap` runs the fixture tests for `babel-plugin-react-compiler`. The XSS
    vulnerability is in the playground app (`compiler/apps/playground`), which uses
    Playwright e2e tests and Node tests. Running `yarn snap` would not test the playground
    changes and might lead the agent to falsely believe its changes are fully tested.
  severity: high
  source:
    path: compiler/CLAUDE.md
    lines: 16-29
- rule: Use Sapling (`sl`) for version control instead of Git
  collision_type: meta_confusion
  why_distracting: The instructions state that the repository uses Sapling (`sl`)
    for version control. An agent might attempt to use `sl status` or `sl commit`
    to save its work, which will fail or cause issues in a standard Git-based evaluation
    environment (as evidenced by the gold solution using standard `git apply`).
  severity: medium
  source:
    path: compiler/CLAUDE.md
    lines: 53-67
- rule: Run lint on the compiler source using `yarn workspace babel-plugin-react-compiler
    lint`
  collision_type: scope_ambiguity
  why_distracting: The instructions say to run linting using `yarn workspace babel-plugin-react-compiler
    lint`. This only lints the compiler package, not the playground app where the
    changes are being made. An agent relying on this command might miss linting errors
    in its playground modifications.
  severity: medium
  source:
    path: compiler/CLAUDE.md
    lines: 30-35
hierarchy_analysis: The root `CLAUDE.md` correctly delegates compiler-related instructions
  to `compiler/CLAUDE.md`. However, `compiler/CLAUDE.md` is heavily biased towards
  the core compiler package (`babel-plugin-react-compiler`) and its specific tooling
  (`yarn snap`, HIR, etc.). Because the playground app (`compiler/apps/playground`)
  is also under `/compiler/`, the agent inherits these core-compiler rules, which
  are mostly inapplicable or misleading for a Next.js/React app like the playground.
