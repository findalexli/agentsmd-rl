distractors:
- rule: Run all tests using `yarn snap`
  collision_type: scope_ambiguity
  why_distracting: The rule suggests using `yarn snap` to run tests, but this command is specific to the compiler's fixture tests in `packages/babel-plugin-react-compiler`. The playground app has its own tests (e.g., Playwright e2e tests and Node tests), so running `yarn snap` will not verify the XSS fix and might lead the agent to think no tests need updating.
  severity: high
  source:
    path: compiler/CLAUDE.md
    lines: 18-22
- rule: When modifying the compiler, you MUST read the documentation about that pass in `compiler/packages/babel-plugin-react-compiler/docs/passes/`
  collision_type: architecture_boundary
  why_distracting: The rule mandates reading documentation in `docs/passes/` when modifying the compiler. However, this PR modifies the playground web app's config parser, not a compiler pass. Searching for pass documentation would waste time and confuse the agent about the architecture.
  severity: medium
  source:
    path: compiler/CLAUDE.md
    lines: 8-9
- rule: This repository uses Sapling (`sl`) for version control. Use `sl status`, `sl addremove`, and `sl commit`.
  collision_type: meta_confusion
  why_distracting: The rule instructs the use of Sapling (`sl`) for version control instead of git. In an automated agent evaluation environment, trying to use `sl` commands to stage or commit files might fail or interfere with the evaluation harness.
  severity: low
  source:
    path: compiler/CLAUDE.md
    lines: 58-61
hierarchy_analysis: The root `CLAUDE.md` correctly delegates `/compiler/` directory instructions to `compiler/CLAUDE.md`. However, `compiler/CLAUDE.md` assumes all work in the `/compiler/` directory is within `packages/babel-plugin-react-compiler/`. The agent must recognize that `apps/playground/` is a separate sub-project with its own testing and architectural paradigms, overriding the generic compiler instructions.
