source:
  repo: apache/superset
  pr_number: 39017
  pr_url: https://github.com/apache/superset/pull/39017
  title: "fix(mcp): add description and certification fields to default list tool columns"
  base_commit: 83ad1eca26bec5de6e6d908ebf3ba6aa8eea0c21
  merge_commit: 7be2acb2f3ce44d02a3bd1bc6ccf0f539fadf09f

checks:
