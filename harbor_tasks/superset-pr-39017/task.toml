[task]
name = "superset-mcp-certification-fields"
title = "Add certification fields to MCP list tool default columns"
description = """
Add certified_by, certification_details, and description fields to the default
columns returned by list_charts, list_dashboards, and list_datasets MCP tools.
Update Pydantic schemas and serializers to include certification fields.
"""
difficulty = "medium"
time_estimate_minutes = 45
tags = ["python", "pydantic", "mcp", "api", "superset"]

[environment]
dockerfile = "environment/Dockerfile"
build_timeout_seconds = 600

[solution]
solve_script = "solution/solve.sh"

[tests]
test_script = "tests/test.sh"
test_timeout_seconds = 120

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
