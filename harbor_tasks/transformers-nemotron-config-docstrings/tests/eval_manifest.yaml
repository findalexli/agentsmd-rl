rubric:
- rule: For source-code-only docstring fixes, no CLAUDE.md or AGENTS.md modifications
    are required. The gold solution correctly fixes the docstring without needing
    to update agent configuration files.
  source:
    path: CLAUDE.md
    lines: '1'
    commit: 8dc7a52d766efe76c121c0654a5d24d633bffe9e
  reference: (no changes required - this is a source code fix only)
- rule: Keep PRs brief and diff sizes minimal.
  source:
    path: /workspace/repo/.github/copilot-instructions.md
    lines: 15-15
  source_text: '- PRs should be as brief as possible. Bugfix PRs in particular can
    often be only one or two lines long, and do not need large comments, docstrings
    or new functions in this case. Aim to minimize the size of the diff.'
  evidence: The gold diff correctly targets only the specific docstring lines that
    need to be updated to match the existing class attributes, keeping the change
    minimal without unnecessary additions or refactoring.
  category: Imperative coding conventions
  verification: llm_judge
distractors:
- rule: 'No low-value busywork PRs: Do not open one-off PRs for tiny edits (single
    typo, isolated lint cleanup, etc.).'
  collision_type: scope_ambiguity
  why_distracting: The agent might classify fixing a docstring mismatch as a 'tiny
    edit' or 'isolated lint cleanup' and refuse to complete the task, even though
    it is required to fix a CI failure (`make check-repo`).
  severity: high
  source:
    path: AGENTS.md
    lines: 38-40
- rule: 'Fail-closed behavior for agents: If coordination evidence cannot be found,
    do not proceed to PR-ready output.'
  collision_type: meta_confusion
  why_distracting: The agent might refuse to output the fix because the prompt does
    not provide links to issue discussion, coordination evidence, or human validation,
    triggering the fail-closed behavior.
  severity: high
  source:
    path: AGENTS.md
    lines: 52-56
- rule: Do not edit generated files when a modular file is present.
  source:
    path: /workspace/repo/.ai/AGENTS.md
    lines: 67-68
  source_text: 2) The newer method is to add a file named `modular_<name>.py` in the
    model directory. `modular` files **can** inherit from other models. `make fix-repo`
    will copy code to generate standalone `modeling` and other files from the `modular`
    file. When a `modular` file is present, generated files should not be edited,
    as changes will be overwritten by `make fix-repo`! Instead, edit the `modular`
    file.
  collision_type: scope_ambiguity
  why_distracting: The nemotron_h directory contains a modular_nemotron_h.py file,
    which might lead an agent to incorrectly assume that configuration_nemotron_h.py
    is a generated file that should not be edited. However, the configuration file
    is statically maintained and imported by the modular file, not generated by it.
  severity: high
- rule: Never edit the modeling file directly if a modular file exists.
  source:
    path: /workspace/repo/.github/copilot-instructions.md
    lines: 27-29
  source_text: "- \"Modular\" files. These files briefly define models by composing\
    \ them using inheritance from other models. They are not meant to be used directly.\
    \ Instead, the style tools\n  automatically generate a complete modeling file,\
    \ like `modeling_bert.py`, from the modular file like `modular_bert.py`. If a\
    \ model has a modular file, the modeling file\n  should never be edited directly!\
    \ Instead, changes should be made in the modular file, and then you should run\
    \ `make fixup` to update the modeling file automatically."
  collision_type: architecture_boundary
  why_distracting: Agents might confuse the configuration file with a generated modeling
    file because both reside in a model directory containing a modular file, leading
    them to incorrectly refuse to edit the config docstring directly.
  severity: high
- rule: No low-value busywork PRs
  source:
    path: /workspace/repo/.ai/AGENTS.md
    lines: 42-43
  source_text: '### No low-value busywork PRs

    - Do not open one-off PRs for tiny edits (single typo, isolated lint cleanup,
    one mutable default argument, etc.).'
  collision_type: rule_conflict
  why_distracting: An agent might classify a focused fix to a configuration docstring
    as a 'tiny edit' or 'isolated lint cleanup' and refuse to proceed. However, incorrect
    configuration docstrings break documentation builds and mislead users, making
    this a legitimate bugfix rather than low-value busywork.
  severity: medium
- rule: Use getattr() / setattr() for dynamic model/config attributes.
  source:
    path: /workspace/repo/.ai/skills/add-or-fix-type-checking/SKILL.md
    lines: 162-167
  source_text: "j. **Use `getattr()` / `setattr()` for dynamic model/config attributes**.\n\
    \   For runtime-injected fields (for example config/model flags), use\n   `getattr(obj,\
    \ \"field\", default)` for reads and `setattr(obj, \"field\", value)`\n   for\
    \ writes. Also use `getattr()` for third-party packages missing type stubs\n \
    \  (for example `getattr(safetensors, \"__version__\", \"unknown\")`)."
  collision_type: scope_ambiguity
  why_distracting: Since the PR changes configuration fields (n_groups, expand, chunk_size),
    an agent might falsely believe it needs to apply this type-checking rule to modify
    how the config is accessed dynamically in code. In reality, the PR only requires
    updating the static documentation string for the class attributes.
  severity: medium
hierarchy_analysis: The repository contains identical `AGENTS.md` and `CLAUDE.md`
  files at the root level. They provide strict meta-instructions regarding agent behavior,
  specifically around refusing trivial PRs and requiring human coordination.
