rubric:
- rule: Do not edit a `# Copied from` block, as it will be reverted by `make fix-repo`.
  source:
    path: CLAUDE.md
    lines: '66'
    commit: 8dc7a52d766efe76c121c0654a5d24d633bffe9e
- rule: When a `modular` file is present, generated files should not be edited, as
    changes will be overwritten by `make fix-repo`.
  source:
    path: CLAUDE.md
    lines: '67'
    commit: 8dc7a52d766efe76c121c0654a5d24d633bffe9e
- rule: '`make check-repo` — CI-style consistency checks'
  source:
    path: CLAUDE.md
    lines: 5-5
  evidence: The gold solution manually updates the docstring parameters (`n_groups`,
    `expand`, `use_conv_bias`, `chunk_size`) to match the actual class attributes,
    which directly resolves the `check_docstrings` f
  category: documentation
distractors:
- rule: 'No low-value busywork PRs: Do not open one-off PRs for tiny edits (single
    typo, isolated lint cleanup, one mutable default argument, etc.).'
  collision_type: scope_ambiguity
  why_distracting: The agent might refuse to fix the docstring mismatch, classifying
    it as a 'tiny edit' or 'isolated lint cleanup'. However, this mismatch causes
    the CI (`make check-repo`) to fail, making it a necessary build-breaking fix rather
    than an optional low-value busywork PR.
  severity: high
  source:
    path: CLAUDE.md
    lines: 35-37
- rule: '`make fix-repo`: auto-fixes copies, modular conversions, doc TOCs, docstrings
    in addition to the `make style` fixes'
  collision_type: meta_confusion
  why_distracting: The agent might rely entirely on running `make fix-repo` to fix
    the issue, assuming the tool will automatically correct the docstring. However,
    while the tool can flag the mismatch or format existing text, it cannot infer
    the natural language descriptions for the new parameters (`n_groups`, `expand`,
    etc.), so manual intervention is required.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 4-4
hierarchy_analysis: The configuration files `CLAUDE.md` and `AGENTS.md` are identical
