  merge_commit: "28e1cc59ecf479ea674f2cc4b443a2969aae3a69"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified file must parse without syntax errors"

  - id: docstring_params_match_class_annotations
    type: fail_to_pass
    origin: pr_diff
    description: "Every documented parameter must be an actual class annotation"

  - id: new_mamba_params_documented
    type: fail_to_pass
    origin: pr_diff
    description: "n_groups, expand, use_conv_bias, chunk_size must be documented"

  - id: old_deprecated_names_removed
    type: fail_to_pass
    origin: pr_diff
    description: "mamba_dt_* alias names must not appear as documented params"

  - id: existing_params_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "Pre-existing documented params remain in docstring"

  - id: backward_compat_aliases_in_post_init
    type: pass_to_pass
    origin: pr_diff
    description: "__post_init__ still handles mamba_dt_* backward-compat aliases"

  - id: annotation_defaults_consistent
    type: pass_to_pass
    origin: pr_diff
    description: "Class annotations for n_groups, expand, use_conv_bias, chunk_size have correct defaults"

  - id: ruff_format
    type: pass_to_pass
    origin: agent_config
    description: "Modified file passes ruff format check"
    source:
      path: "CLAUDE.md"
      lines: "2"
      commit: "8dc7a52d766efe76c121c0654a5d24d633bffe9e"

rubric:
  - rule: "Do not edit a `# Copied from` block, as it will be reverted by `make fix-repo`."
    source:
      path: "CLAUDE.md"
      lines: "66"
      commit: "8dc7a52d766efe76c121c0654a5d24d633bffe9e"
  - rule: "When a `modular` file is present, generated files should not be edited, as changes will be overwritten by `make fix-repo`."
