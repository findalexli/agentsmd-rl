distractors:
- rule: Avoid writing significant amounts of new code. This is often a sign that we're
    missing an existing method or mechanism that could help solve the problem.
  collision_type: rule_conflict
  why_distracting: The task explicitly requires creating a new ~100 line Python script
    to automate a previously manual workflow. An agent strictly following this rule
    might hesitate to write the full script or waste time searching for non-existent
    utilities instead of fulfilling the prompt.
  severity: high
  source:
    path: CLAUDE.md
    lines: 52-53
- rule: Avoid falling back to patterns that require `panic!`, `unreachable!`, or `.unwrap()`.
    Instead, try to encode those constraints in the type system.
  collision_type: architecture_boundary
  why_distracting: This rule is specific to the Rust codebase (Ruff/ty), but the agent
    is tasked with writing a Python script. The agent might get confused about the
    language context or try to apply Rust-specific error handling paradigms in Python.
  severity: low
  source:
    path: CLAUDE.md
    lines: 54-55
