type = "syntax"
weight = 0.1

[[tests]]
id = "test_callable_node_kind"
name = "Callable Node Kind Check"
type = "pytest"
weight = 0.3

[[tests]]
id = "test_callable_inference_node_of"
name = "Callable Inference Node Of Logic"
type = "pytest"
weight = 0.3

[[tests]]
id = "test_function_call_handling"
name = "FirFunctionCall Handling"
type = "pytest"
weight = 0.3

[tags]
category = ["compiler", "kotlin", "compose", "inference"]
language = ["kotlin", "java"]
framework = ["gradle"]
