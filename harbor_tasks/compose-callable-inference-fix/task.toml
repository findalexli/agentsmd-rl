version = "1.0.0"

[environment]
image = "python:3.12-slim"
type = "docker"

[task]
type = "code_fix"
difficulty = "medium"
time_estimate = 1800

[repository]
owner = "JetBrains"
repo = "kotlin"
base_commit = "a304b4b5c79aa22c62ab5410caccaeb3a05c276a"
merge_commit = "167a139ee7e66f69f847c6d0ab2957ab162df1f3"
pr_number = 5833

[[tests]]
id = "test_syntax"
