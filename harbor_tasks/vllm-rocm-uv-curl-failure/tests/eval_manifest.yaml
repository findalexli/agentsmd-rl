  description: Repo's root __init__.py uses lazy imports correctly
- id: test_repo_forbidden_imports
  type: pass_to_pass
  origin: repo_tests
  description: Repo's Python files don't have forbidden imports
rubric:
- rule: 'Implement fail-closed behavior: if an operation fails, it must not proceed
    silently or mask errors.'
  source:
    path: AGENTS.md
    lines: 34-36
    commit: b2bc736b1247a76e6ab1cfbe38ae39c3c307de40
  reference: 'Code fix: curl saves to file before execution so && propagates failures.
    Old: curl ... | sh (masks curl failure). New: curl -o file && sh file && verify'
- rule: Use the project's standard tooling (uv) for installations, not bare system
    commands.
  source:
    path: AGENTS.md
    lines: 42,48-56
    commit: b2bc736b1247a76e6ab1cfbe38ae39c3c307de40
  reference: 'Code fix: Install and use uv for dependency management. The fix installs
    uv and then uses it (uv --version verification shows uv is available)'
- rule: Follow existing code style and error handling patterns in the same file.
  source:
    path: AGENTS.md
    lines: 119-127
    commit: b2bc736b1247a76e6ab1cfbe38ae39c3c307de40
  reference: 'Code fix: Use RUN with proper line continuation (backslashes) and &&
    chaining, matching other multi-command RUN instructions in the Dockerfile'
distractors:
- rule: 'Install `uv` if you don''t have it already: curl -LsSf https://astral.sh/uv/install.sh
    | sh'
  collision_type: rule_conflict
  why_distracting: The config file explicitly provides `curl -LsSf https://astral.sh/uv/install.sh
    | sh` as the standard way to install `uv`. The agent might assume this is the
    canonical project convention and refuse to remove the pipe in the Dockerfile,
    or might try to align the Dockerfile with this exact snippet, which would fail
    to fix the masked exit code.
  severity: high
  source:
    path: AGENTS.md
    lines: 41-42
- rule: Do not open one-off PRs for tiny edits (single typo, isolated style change,
    one mutable default, etc.).
  collision_type: meta_confusion
  why_distracting: The config forbids 'one-off PRs for tiny edits' and instructs the
    agent to 'fail-closed' and refuse the change if it is trivial busywork. The agent
    might classify fixing a single pipe in a Dockerfile as a trivial edit and refuse
    to complete the task.
  severity: high
  source:
    path: AGENTS.md
    lines: 20-21
hierarchy_analysis: The config hierarchy is flat (CLAUDE.md simply includes AGENTS.md).
  The primary challenge is resolving the direct contradiction between the task instruction
  (which identifies `curl | sh` as an anti-pattern) and the project's own documentation
  (which uses that exact anti-pattern for local setup).
