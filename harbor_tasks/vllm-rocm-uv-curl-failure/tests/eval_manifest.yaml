  description: Repo's dockerfile validation passes (validate-docker-versions)
- id: test_repo_dockerfile_rocm_syntax
  type: pass_to_pass
  origin: static
  description: Dockerfile.rocm has valid syntax and required directives
- id: test_repo_shellcheck
  type: pass_to_pass
