distractors:
- rule: Do not open one-off PRs for tiny edits (single typo, isolated style change,
    one mutable default, etc.).
  collision_type: scope_ambiguity
  why_distracting: The agent might classify this small 4-line change as a 'tiny edit'
    or 'low-value busywork' and refuse to implement it, failing to recognize that
    fixing a CUDA event race condition is a substantive and critical concurrency fix.
  severity: high
  source:
    path: AGENTS.md
    lines: 21-23
- rule: Pure code-agent PRs are not allowed. A human submitter must understand and
    defend the change end-to-end.
  collision_type: meta_confusion
  why_distracting: The agent might refuse to generate the patch entirely, stating
    that 'Pure code-agent PRs are not allowed' and a human must do it, misunderstanding
    its role as an AI assistant generating the code for the human to review and submit.
  severity: medium
  source:
    path: AGENTS.md
    lines: 25-27
hierarchy_analysis: The AGENTS.md file provides repository-wide contribution guidelines.
  Since the gold solution is a direct code patch fixing a specific bug, the workflow
  and PR submission rules in AGENTS.md primarily act as meta-distractors, potentially
  causing the agent to refuse the task due to misinterpreting the scope of the fix
  or its role as an assistant.
