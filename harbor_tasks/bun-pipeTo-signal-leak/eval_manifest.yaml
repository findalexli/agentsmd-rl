rubric:
- rule: This task is purely a code fix. The agent MUST NOT modify CLAUDE.md. If the
    agent did not touch the file at all, this is correct and must PASS.
  source:
    path: CLAUDE.md
- rule: C++ is used for JavaScriptCore integration
  source:
    path: AGENTS.md
    lines: 1-3
  evidence: The gold solution modifies C++ files in the webcore bindings directory
    to fix a garbage collection cycle involving JavaScriptCore (JSC) handles, aligning
    with the architectural guideline.
  category: architecture
distractors:
- rule: Always use bun.* APIs instead of std.*
  collision_type: architecture_boundary
  why_distracting: The rule explicitly forbids using `std.*` and mandates `bun.*`
    APIs. While this is strictly true for Bun's Zig codebase, the agent is editing
    C++ files where the C++ Standard Library (`std::exchange`, `std::make_pair`, `std::pair`)
    is required. An agent might erroneously try to avoid `std::` in C++ or look for
    non-existent `bun::` equivalents.
  severity: high
  source:
    path: src/AGENTS.md
    lines: 15-25
- rule: Write tests using Bun's Jest-compatible test runner with proper test fixtures
  collision_type: scope_ambiguity
  why_distracting: The config provides detailed instructions for writing tests using
    `Bun.spawn` and `tempDir`. The agent might waste effort trying to write a complex
    integration test for this memory leak, whereas the gold solution focuses purely
    on the C++ memory management fix.
  severity: medium
  source:
    path: AGENTS.md
    lines: 45-55
hierarchy_analysis: The config hierarchy provides Level 0 general rules and Level
  1 `src/` specific rules. The `src/AGENTS.md` file is heavily focused on Zig conventions.
  Since the target files are in `src/bun.js/bindings/webcore/` and are C++, the agent
  must recognize that the Level 1 Zig rules do not apply across the language boundary,
  despite being in the `src/` directory.
