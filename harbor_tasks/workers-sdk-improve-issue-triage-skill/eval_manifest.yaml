    summary column legend.'
rubric:
- rule: Step 2 contains all eleven sub-categories (2a-2k) in the order specified in the instruction (Spam -> Resolved -> Already
    Fixed -> Duplicate -> Wrong Repo -> Stale -> Transient -> User Error -> Breaking Change -> Won't Fix -> Superseded). The
    agent must add ALL eleven; missing or out-of-order categories degrade the score.
  source:
    path: .github/skills/issue-review.md
    lines: 35-50
    commit: 9c5ebf56291199eeaec43513732fd3fa7fbd502d
  evidence: 'Gold file contains all eleven sub-categories as #### 2a through #### 2k in the exact specified order.'
  category: architecture
  verification: llm_judge
- rule: Each closeable category names the correct state_reason value (`completed` for resolved/transient/superseded; `not_planned`
    for spam/duplicate/wrong-repo/stale/user-error/wont-fix). Breaking Change is the only KEEP OPEN category.
  source:
    path: .github/skills/issue-review.md
    lines: 35-50
    commit: 9c5ebf56291199eeaec43513732fd3fa7fbd502d
