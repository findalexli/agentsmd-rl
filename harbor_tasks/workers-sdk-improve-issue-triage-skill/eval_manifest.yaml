distractors:
- rule: '**Stop and skip to Output as soon as you have sufficient evidence for a recommendation.**'
  source:
    path: .github/skills/issue-review.md
    lines: '18'
    commit: 9c5ebf56291199eeaec43513732fd3fa7fbd502d
  collision_type: rule_conflict
  why_distracting: The early-stop instruction could cause the agent to skip the full 11-category closeable-issue triage after
    finding a single match, missing categories that should be checked first in order.
  severity: high
- rule: '### Step 2: Check for Empty or Invalid Issues'
  source:
    path: .github/skills/issue-review.md
    lines: '35'
    commit: 9c5ebf56291199eeaec43513732fd3fa7fbd502d
  collision_type: scope_ambiguity
  why_distracting: The old heading suggests a narrow scope (only empty/invalid) which contradicts the new broad 'Check for
    Closeable Issues' framing with 11 categories.
  severity: medium
- rule: If the issue describes Workers **runtime** behavior (e.g., fetch API quirks, V8 issues, compatibility flags) rather
    than **tooling** behavior, note that it may belong in a different repo.
  source:
    path: .github/skills/issue-review.md
    lines: '68'
    commit: 9c5ebf56291199eeaec43513732fd3fa7fbd502d
  collision_type: architecture_boundary
  why_distracting: This vague 'may belong in a different repo' language conflicts with the new explicit Wrong Repo category
    that provides specific templates for runtime, framework, and account/support issues.
  severity: medium
