config_edits:
- path: .github/skills/issue-review.md
  tier: 1
  gold_added: 'Step 1 now also extracts: labels, issue age, last activity date, and state_reason for closed issues. Step 2
    reframed as ''Check for Closeable Issues'' with sub-categories 2a-2k (Spam or Junk, Reporter Confirmed Resolved, Already
    Fixed in a Prior Release, Duplicate, Not workers-sdk / Wrong Repo, Stale / No Response, Transient Platform Issue, User
    Error / Misunderstanding, Breaking Change (KEEP OPEN), Won''t Fix / By Design, Feature Superseded / Deprecated). Each
    closeable category specifies the appropriate state_reason (completed vs not_planned). Each category (except spam) includes
    comment templates. Wrong-Repo category has separate templates for runtime, framework, and account/billing issues. New
