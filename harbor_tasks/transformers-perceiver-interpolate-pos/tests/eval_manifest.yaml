- rule: 'No low-value busywork PRs: Do not open one-off PRs for tiny edits.'
  collision_type: scope_ambiguity
  why_distracting: The bug fix requires changing only a single line of code. The agent
    might misclassify this as a 'tiny edit' or 'low-value busywork' and refuse to
    fix it.
  severity: medium
  source:
    path: AGENTS.md
