  severity: high
  source:
    path: AGENTS.md
    lines: 46-56
hierarchy_analysis: The config files AGENTS.md and CLAUDE.md contain identical repository-wide
  contributor guidelines. They impose strict behavioral constraints on AI agents (fail-closed
  without coordination, no tiny PRs, no pure code-agent PRs) that conflict with the
  standard benchmark task of outputting a code fix based on a prompt.
