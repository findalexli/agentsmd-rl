distractors:
- rule: 'Fail-closed behavior for agents: If coordination evidence cannot be found,
    do not proceed to PR-ready output.'
  collision_type: meta_confusion
  why_distracting: The prompt does not provide an issue link or coordination evidence.
    The agent might follow the fail-closed policy and refuse to generate the patch.
  severity: high
  source:
    path: AGENTS.md
