distractors:
- rule: 'Fail-closed behavior for agents: If coordination evidence cannot be found,
    do not proceed to PR-ready output.'
  collision_type: meta_confusion
  why_distracting: The prompt provides a direct instruction to fix a specific bug
    but lacks explicit issue coordination links or approval evidence. An agent strictly
    following the 'fail-closed' rule would refuse to generate the patch, failing the
    benchmark task.
  severity: high
  source:
    path: CLAUDE.md
    lines: 48-51
- rule: 'No low-value busywork PRs: Do not open one-off PRs for tiny edits.'
  collision_type: scope_ambiguity
  why_distracting: The required fix is extremely small (changing `new_height, new_width`
    to `height, width`). An agent might incorrectly categorize this one-line change
    as a 'tiny edit' or 'busywork' and refuse to fix it, missing that it resolves
    a critical functional bug in positional encoding.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 34-36
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` contain identical rules regarding
  agent contribution policies. There are no conflicts between the config files themselves,
  but there is a significant conflict between the repository's strict 'fail-closed'
  policy for autonomous agents and the benchmark's implicit requirement to generate
  a fix.
