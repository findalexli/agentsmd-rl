version: "2.0"

source:
  repo: "huggingface/transformers"
  pr: 44899
  base_commit: "c532659b8734b88d2bbaac2542c2a5a8b525f3f7"
  merge_commit: "2620c4ddd41afcc8d3b1d1134803bd418ffa45a7"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified file must parse without syntax errors"

  - id: test_repo_ruff_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo code quality check passes on modified file"

  - id: test_repo_perceiver_unit
    type: pass_to_pass
    origin: repo_tests
    description: "Perceiver model unit tests pass via subprocess"

  - id: interpolate_to_target_dims
    type: fail_to_pass
    origin: pr_diff
    description: "Interpolating from 4x4 to 8x8 produces 64 positions, not 16"

  - id: interpolate_multiple_resolutions
    type: fail_to_pass
    origin: pr_diff
    description: "Interpolation works for varied target sizes including non-square"

  - id: interpolate_values_change
    type: fail_to_pass
    origin: pr_diff
    description: "Interpolated embeddings differ from source when target dims differ"

  - id: perceiver_imports
    type: pass_to_pass
    origin: repo_tests
    description: "Core perceiver classes import successfully"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "Modified file retains substantial content, not replaced with stub"

  - id: ruff_lint_changed_lines
    type: pass_to_pass
    origin: agent_config
    description: "Agent's changes must not introduce new ruff lint violations"
    source:
      path: ".github/copilot-instructions.md"
      lines: "15"
      commit: "c532659b8734b88d2bbaac2542c2a5a8b525f3f7"

rubric:
  - rule: "PRs should be as brief as possible. Bugfix PRs in particular can often be only one or two lines long, and do not need large comments, docstrings or new functions in this case. Aim to minimize the size of the diff."
    source:
      path: ".github/copilot-instructions.md"
      lines: "15"
      commit: "c532659b8734b88d2bbaac2542c2a5a8b525f3f7"

  - rule: "Do not edit a `# Copied from` block, as it will be reverted by `make fix-repo`. Ideally you should edit the code it's copying from and propagate the change, but you can break the `# Copied from` link if needed."
    source:
      path: "CLAUDE.md"
      lines: "66"
      commit: "c532659b8734b88d2bbaac2542c2a5a8b525f3f7"

  - rule: "When a `modular` file is present, generated files should not be edited, as changes will be overwritten by `make fix-repo`! Instead, edit the `modular` file."
    source:
      path: "CLAUDE.md"
      lines: "67"
      commit: "c532659b8734b88d2bbaac2542c2a5a8b525f3f7"

  - rule: "We try to avoid direct inheritance between model-specific files in `src/transformers/models/`."
    source:
      path: "CLAUDE.md"
      lines: "64"
      commit: "c532659b8734b88d2bbaac2542c2a5a8b525f3f7"
