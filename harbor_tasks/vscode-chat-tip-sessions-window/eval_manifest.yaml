version: "2.0"

source:
  repo: "microsoft/vscode"
  pr: 306611
  base_commit: "67fdb3ee04fbd04430cd47702977eaa51bd14c40"
  merge_commit: "121d7eb3cdd7f0f6de81c83036ece0f939292643"

checks:
  - id: tip_id_exists
    type: fail_to_pass
    origin: pr_diff
    description: "TIP_CATALOG must contain a tip with id 'tip.openSessionsWindow'"

  - id: tip_tier_qol
    type: fail_to_pass
    origin: pr_diff
    description: "The sessions window tip must have tier ChatTipTier.Qol"

  - id: command_link_present
    type: fail_to_pass
    origin: pr_diff
    description: "buildMessage must link to workbench.action.openSessionsWindow"

  - id: command_link_descriptive_title
    type: fail_to_pass
    origin: pr_diff
    description: "Command link must include the title 'Open Sessions Window'"

  - id: exclude_when_commands_executed
    type: fail_to_pass
    origin: pr_diff
    description: "Tip must be excluded once workbench.action.openSessionsWindow is executed"

  - id: dismiss_when_commands_clicked
    type: fail_to_pass
    origin: pr_diff
    description: "Tip must be dismissed once workbench.action.openSessionsWindow is clicked"

  - id: when_clause_non_stable
    type: fail_to_pass
    origin: pr_diff
    description: "Tip must only appear on non-stable builds via ProductQualityContext.notEqualsTo"

  - id: when_clause_not_sessions_window
    type: fail_to_pass
    origin: pr_diff
    description: "Tip must be hidden when already in a Sessions Window via IsSessionsWindowContext.negate()"

  - id: required_imports
    type: fail_to_pass
    origin: pr_diff
    description: "ProductQualityContext and IsSessionsWindowContext must be imported"

  - id: existing_tips_preserved
    type: pass_to_pass
    origin: repo_tests
    description: "Pre-existing tip IDs in TIP_CATALOG must still be present"

  - id: test_repo_eslint_chat
    type: pass_to_pass
    origin: repo_tests
    description: "ESLint check on modified chat files passes"

  - id: test_repo_ts_parse_chat
    type: pass_to_pass
    origin: repo_tests
    description: "TypeScript file parses without syntax errors"

  - id: test_repo_import_check
    type: pass_to_pass
    origin: repo_tests
    description: "Import paths in modified file are valid"

  - id: test_repo_tsec_check
    type: pass_to_pass
    origin: repo_tests
    description: "TSEC security compile check passes"

  - id: test_repo_vscode_dts_check
    type: pass_to_pass
    origin: repo_tests
    description: "VS Code dts compile check passes"

  - id: test_repo_valid_layers_check
    type: pass_to_pass
    origin: repo_tests
    description: "Valid layers check passes"

  - id: test_repo_define_class_fields_check
    type: pass_to_pass
    origin: repo_tests
    description: "Define class fields check passes"

  - id: test_repo_stylelint
    type: pass_to_pass
    origin: repo_tests
    description: "Stylelint check passes"

  - id: test_repo_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Node unit tests pass"

  - id: user_facing_string_localized
    type: fail_to_pass
    origin: agent_config
    description: "User-facing tip message must use localize() from vs/nls"
    source:
      path: ".github/copilot-instructions.md"
      lines: "83"
      commit: "67fdb3ee04fbd04430cd47702977eaa51bd14c40"

  - id: uses_tabs_not_spaces
    type: fail_to_pass
    origin: agent_config
    description: "New code must use tabs for indentation, not spaces"
    source:
      path: ".github/copilot-instructions.md"
      lines: "62"
      commit: "67fdb3ee04fbd04430cd47702977eaa51bd14c40"

  - id: no_duplicate_imports
    type: fail_to_pass
    origin: agent_config
    description: "Never duplicate imports — reuse existing imports if present"
    source:
      path: ".github/copilot-instructions.md"
      lines: "119"
      commit: "67fdb3ee04fbd04430cd47702977eaa51bd14c40"

rubric:
  - rule: User-facing strings in the tip message must use double quotes (not single quotes) as they need to be externalized/localized
    source:
      path: src/vs/workbench/contrib/chat/browser/chatTipCatalog.ts
      commit: 67fdb3ee04fbd04430cd47702977eaa51bd14c40
    reference: |
      "Try the [Sessions Window](command:workbench.action.openSessionsWindow \"Open Sessions Window\") to run multiple agents simultaneously and manage your coding sessions."
  - rule: Externalized strings must not use string concatenation - must use placeholders like {0} instead
    source:
      path: src/vs/workbench/contrib/chat/browser/chatTipCatalog.ts
      commit: 67fdb3ee04fbd04430cd47702977eaa51bd14c40
    reference: |
      localize('tip.openSessionsWindow', "Try the [Sessions Window](command:workbench.action.openSessionsWindow ... )")
  - rule: UI labels must use title-style capitalization (each word capitalized, except prepositions of four or fewer letters unless first or last word)
    source:
      path: src/vs/workbench/contrib/chat/browser/chatTipCatalog.ts
      commit: 67fdb3ee04fbd04430cd47702977eaa51bd14c40
    reference: |
      "Open Sessions Window"
