rubric:
- rule: Debug loggers must use the namespace pattern 'lobe-[module]:[submodule]' (e.g., 'lobe-email:Resend' for email services)
  source:
    path: .cursor/rules/debug-usage.mdc
    lines: 21-23,33-36
    commit: 08572d060270afd65fcc5efdf7cde9e5fb0b0e04
  evidence: The gold solution uses `const log = debug('lobe-email:Resend');` in the ResendImpl class, which follows the required namespace pattern.
- rule: When importing a directory module, use the explicit index path like '@/envs/email/index' instead of '@/envs/email'
  source:
    path: .cursor/rules/typescript.mdc
    lines: '21'
    commit: 08572d060270afd65fcc5efdf7cde9e5fb0b0e04
  evidence: The gold solution uses `import { emailEnv } from '@/envs/email/index';` in the resend/index.ts file, following the explicit index path convention.
- rule: Server environment variables must be defined using createEnv from '@t3-oss/env-nextjs' with zod validation schema in src/envs/<domain>.ts files
  source:
    path: .cursor/rules/add-setting-env.mdc
    lines: 16-34
    commit: 08572d060270afd65fcc5efdf7cde9e5fb0b0e04
  evidence: The gold solution adds RESEND_API_KEY, RESEND_FROM, and EMAIL_SERVICE_PROVIDER to src/envs/email.ts using createEnv with zod validation schema.
- rule: Prefer async/await over callbacks or chained .then() promises in asynchronous code
  source:
    path: .cursor/rules/typescript.mdc
    lines: 25-28
    commit: 08572d060270afd65fcc5efdf7cde9e5fb0b0e04
  evidence: The gold solution's ResendImpl.sendMail() method uses async/await throughout, including `await this.client.emails.send(emailOptions)`.
- rule: read @.cursor/rules/project-introduce.mdc
  source:
    path: CLAUDE.md
    lines: 6-8
  evidence: The gold solution updates the project description in `.cursor/rules/project-introduce.mdc` in addition to `AGENTS.md`, following the cross-reference in CLAUDE.md's Tech Stack section.
  category: documentation
- rule: Update the project description in the agent instructions to reflect the new 'AI Agent Workspace' branding.
  source:
    path: AGENTS.md
    lines: 1-5
  evidence: 'The gold solution directly edits AGENTS.md to add the Project Description section with the text You are developing an open-source, modern-design AI Agent Workspace: LobeHub(previous LobeChat).'
  category: documentation
- rule: Maintain accurate and consistent project description across documentation and rule files
  source:
    path: .cursor/rules/project-introduce.mdc
    lines: 4-7
  evidence: The gold solution updates `.cursor/rules/project-introduce.mdc` to change 'AI chat framework' to 'AI Agent Workspace' and 'lobehub(previous lobe-chat)' to 'LobeHub(previous LobeChat)'.
  category: documentation
- rule: Update AGENTS.md to reflect the new project description as an AI Agent Workspace.
  source:
    path: AGENTS.md
    lines: 1-10
  evidence: 'The gold solution adds a new ''## Project Description'' section to AGENTS.md with the updated branding ''AI Agent Workspace: LobeHub(previous LobeChat)''.'
