- path: src/server/services/email/README.md
  tier: 2
  gold_added: '### Resend


    If you prefer Resend, configure the following and initialize the service with `EmailImplType.Resend`:


    ```bash

    RESEND_API_KEY=your-resend-api-key

    RESEND_FROM=noreply@example.com

    ```


    `RESEND_FROM` is used when `from` is not provided in the payload.


    ### Choose Provider by Environment


    Set `EMAIL_SERVICE_PROVIDER` to `nodemailer` or `resend` to pick the default implementation without changing code:


    ```bash

    EMAIL_SERVICE_PROVIDER=resend

    ```'
  gold_removed: ''
distractors:
- rule: Never run `bun run test` etc to run tests, this will run all tests and cost about 10mins.
  collision_type: rule_conflict
  why_distracting: The agent creates a new test file `src/server/services/email/index.test.ts` and will likely want to run tests to verify its implementation. Standard instinct is to run `bun run test` or `npm test`, but doing so will trigger the entire test suite and waste significant time (10+ minutes).
  severity: high
  source:
    path: CLAUDE.md
    lines: 35-45
- rule: DON'T run `pnpm i18n`, let CI auto handle it.
  collision_type: scope_ambiguity
  why_distracting: The agent is updating documentation and might notice the existence of localized files like `auth.zh-CN.mdx`. It might attempt to run `pnpm i18n` to automatically sync or generate translations for the new Resend documentation.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 50-55
hierarchy_analysis: The configuration is relatively flat but split across `AGENTS.md` and `CLAUDE.md`. The most interesting dynamic is that `AGENTS.md` acts simultaneously as a rule file and a target file to be edited, creating a meta-referential loop.
