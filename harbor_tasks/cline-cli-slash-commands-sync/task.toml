name = "cline-cli-slash-commands-sync"
repo = "cline/cline"
difficulty = "medium"
tags = ["typescript", "react", "cli", "testing"]
time_limit = 600

title = "Fix Windows CLI tests for slash command timing issues"

description = """
The CLI has timing-sensitive unit tests on Windows that fail intermittently due to race conditions
in slash command handling. The issue is that CLI-only slash commands like /q and /exit are only
available after an async fetch completes, creating a race condition where the commands may not be
ready when tests try to use them.

The fix involves:
1. Making CLI-only commands available synchronously on component initialization
2. Adding a new utility function `getStandaloneSlashCommandToExecute` to detect standalone slash commands
3. Improving slash command matching to prioritize exact/prefix matches over fuzzy matches
4. Extracting the CLI-only command handling into a reusable `handleCliOnlySlashCommand` function

Files to modify:
- cli/src/utils/slash-commands.ts - Add synchronous command creation and standalone detection
- cli/src/components/ChatView.tsx - Use new utilities for deterministic command handling
- cli/src/components/QuitCommand.test.tsx - Replace flaky integration tests with unit tests
- cli/src/components/ChatView.test.tsx - Update mock to preserve actual utility exports
- cli/src/components/SkillsPanelContent.test.tsx - Use vim-style navigation for Windows compatibility
- cli/src/utils/slash-commands.test.ts - Add unit tests for new utility functions (new file)
"""
