rubric:
  - id: cli_synchronous_init
    description: CLI-only slash commands should be initialized synchronously to avoid race conditions
    source: PR description - "Seed these synchronously on first render so locally handled commands like /q and /exit are immediately available"

  - id: standalone_command_detection
    description: Standalone slash commands (/q, /exit) should be detectable and executable without requiring the slash menu
    source: PR description - "extracts standalone slash-command resolution into testable utilities"

  - id: command_matching_priority
    description: Exact and prefix matches should be prioritized over fuzzy matches in slash command filtering
    source: PR description - "improves slash-command matching so exact/prefix matches win over fuzzy matches"

  - id: code_reusability
    description: CLI-only command handling should be extracted into a reusable function rather than inline
    source: PR diff - handleCliOnlySlashCommand extracted as useCallback

  - id: test_determinism
    description: Tests should be deterministic and not rely on timing-sensitive operations
    source: PR description - "Fix flaky/failing CLI unit tests on Windows CI by removing timing-sensitive slash-command behavior"
