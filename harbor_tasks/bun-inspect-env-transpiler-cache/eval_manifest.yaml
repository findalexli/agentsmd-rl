rubric:
- rule: Gold solution adds RuntimeTranspilerCache.is_disabled = true inside configureDebugger
    when inspector is enabled
  reference: jsc.RuntimeTranspilerCache.is_disabled = true; inside if (this.isInspectorEnabled())
    block in configureDebugger function
- rule: Gold solution removes duplicate cache disables from Arguments.zig and makes
    cache disable apply to all inspector modes
  reference: Removes three instances of bun.jsc.RuntimeTranspilerCache.is_disabled
    = true from --inspect, --inspect-wait, --inspect-brk handlers in Arguments.zig
    parse function
- rule: Never use `@import()` inline inside of functions. Always put them at the bottom
    of the file or containing struct.
  source:
    path: src/CLAUDE.md
    lines: 9-10
  evidence: The gold solution accesses `jsc.RuntimeTranspilerCache` directly using
    the existing `jsc` namespace in `VirtualMachine.zig` rather than adding an inline
    `@import("bun").jsc` inside the `configureDebug
  category: style
distractors:
- rule: Tests use Bun's Jest-compatible test runner with proper test fixtures... For
    multi-file tests, prefer tempDir and Bun.spawn.
  collision_type: scope_ambiguity
  why_distracting: The instructions heavily emphasize writing tests using `Bun.spawn`
    and `tempDir`. An agent might try to write a test that spawns Bun with `BUN_INSPECT`
    and a >50KB file to verify breakpoint line numbers. However, verifying debugger
    breakpoints requires implementing a WebSocket client that speaks the WebKit Inspector
    Protocol to attach, set breakpoints, and read back the resolved locations. This
    is highly complex, likely to be flaky, and the gold solution correctly skips adding
    a test for this specific debugger behavior.
  severity: high
  source:
    path: CLAUDE.md
    lines: 45-85
- rule: Always use `bun.*` APIs instead of `std.*`
  collision_type: architecture_boundary
  why_distracting: The issue mentions the bug occurs when using the `BUN_INSPECT`
    environment variable. The agent might see the rule to use `bun.*` APIs over `std.*`
    and attempt to use Bun's environment variable utilities to explicitly check for
    `BUN_INSPECT` inside `VirtualMachine.zig`. However, `VirtualMachine` already tracks
    this state via `this.isInspectorEnabled()`, which abstracts whether the debugger
    was enabled via CLI or env var. Directly checking the environment variable here
    would violate the architecture boundary and duplicate logic.
  severity: high
  source:
    path: src/CLAUDE.md
    lines: 15-26
hierarchy_analysis: The hierarchy consists of root-level `CLAUDE.md` focusing on building
  and testing, and `src/CLAUDE.md` focusing on Zig conventions. The testing guidelines
  in the root config strongly encourage writing tests for new features or bug fixes,
  which conflicts with the practical reality that testing the debugger protocol is
  too complex for this PR. The agent must recognize the scope boundary and prioritize
  the Zig fix over the testing guidelines.
