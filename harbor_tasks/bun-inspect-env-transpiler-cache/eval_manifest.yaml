rubric:
- rule: Gold solution adds RuntimeTranspilerCache.is_disabled = true inside configureDebugger
    when inspector is enabled
  reference: jsc.RuntimeTranspilerCache.is_disabled = true; inside if (this.isInspectorEnabled())
    block in configureDebugger function
- rule: Gold solution removes duplicate cache disables from Arguments.zig and makes
    cache disable apply to all inspector modes
  reference: Removes three instances of bun.jsc.RuntimeTranspilerCache.is_disabled
    = true from --inspect, --inspect-wait, --inspect-brk handlers in Arguments.zig
    parse function
- rule: Never use `@import()` inline inside of functions. Always put them at the bottom
    of the file or containing struct.
  source:
    path: src/CLAUDE.md
    lines: 9-10
  evidence: The gold solution accesses `jsc.RuntimeTranspilerCache` directly using
    the existing `jsc` namespace in `VirtualMachine.zig` rather than adding an inline
    `@import("bun").jsc` inside the `configureDebug
  category: style
distractors:
- rule: Writing Tests and Test Organization (expecting tests for bugs)
  collision_type: scope_ambiguity
  why_distracting: The config strongly encourages writing tests for bugs using `Bun.spawn`
    and snapshot testing. However, testing debugger breakpoint line number resolution
    requires implementing a Chrome DevTools Protocol (CDP) client to connect to the
    inspector WebSocket, set breakpoints, and verify their resolved locations. Attempting
    to write a standard test for this would lead to wasted effort and likely a broken
    or flaky test.
  severity: high
  source:
    path: AGENTS.md
    lines: 26-88
hierarchy_analysis: The hierarchy is moderate (root `AGENTS.md` and `src/AGENTS.md`).
  The root config focuses on testing and building, while the `src/` config focuses
  on Zig conventions. The agent must apply the Zig conventions while recognizing that
  the testing guidelines from the root config are out of scope for this specific,
  highly complex inspector bug.
