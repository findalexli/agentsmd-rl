version: '1.0'
source_pr:
  owner: ClickHouse
  repo: ClickHouse
  number: 101960
  merge_commit: 5f35e27d1a1192a54aabe56b74664bc8452f71ec
  base_commit: f4eb1501802bc9f274870d147ae82979956939e6
description: 'Fix wrong results in JOIN with shard-by-PK optimization and query condition
  cache.


  The bug was in optimizeJoinByShards::apply() which assumed contiguous part_index_in_query

  values, but filterPartsByQueryConditionCache can drop parts from selectRangesToRead(),

  leaving non-contiguous part_index_in_query values. The distribution logic assigns
  parts

  back to their sources using these indices, so gaps caused parts to be assigned to
  the

  wrong source, producing 0 rows.


  The fix renumbers part_index_in_query to be contiguous starting from added_parts,

  using a local_idx counter instead of relying on the original part indices.

  '
