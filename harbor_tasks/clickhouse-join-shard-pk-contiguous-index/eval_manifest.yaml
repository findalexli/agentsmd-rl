    preserving gaps from filterPartsByQueryConditionCache. Verifies the specific

    pattern: part_index_in_query = added_parts + local_idx

    '
- id: test_fix_comment_explains_issue
  type: fail_to_pass
  origin: behavior
  description: 'Fix includes explanatory comment about why contiguous renumbering
