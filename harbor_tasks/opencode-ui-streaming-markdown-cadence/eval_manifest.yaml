distractors:
- rule: Prefer functional array methods (flatMap, filter, map) over for loops
  collision_type: rule_conflict
  why_distracting: The `next` function uses a `for` loop to scan ahead in the string
    for a snap point (`for (let i = end; i < max; i++)`). An agent strictly following
    this rule might try to convert the string to an array and use `.findIndex()`,
    which would create unnecessary allocations and overhead in a hot rendering path.
  severity: medium
  source:
    path: AGENTS.md
    lines: 17-17
- rule: Prefer `const` over `let`. Use ternaries or early returns instead of reassignment.
  collision_type: rule_conflict
  why_distracting: The pacing logic inherently requires mutable state across asynchronous
    callbacks and reactive effects (`let shown`, `let timeout`). An agent trying to
    avoid `let` and reassignment might attempt to use complex recursive functional
    patterns or unnecessary SolidJS signals, complicating the implementation.
  severity: high
  source:
    path: AGENTS.md
    lines: 54-63
