- rule: Use single word names by default for new locals, params, and helper functions.
  source:
    path: AGENTS.md
    lines: 22-34
  evidence: The gold solution introduces helper functions `step`, `next`, `clear`, `sync`, `run` and variables `shown`, `live`, `end`, `max`, `size`, all of which strictly adhere to the single-word naming constra
  category: naming
- rule: Avoid `else` statements. Prefer early returns.
  source:
    path: AGENTS.md
    lines: 65-75
  evidence: In `run` and `createEffect`, the gold solution uses multiple `if (...) { ...; return }` statements to handle edge cases (like `!live?.()` or text shrinking) instead of using `if/else` blocks.
  category: style
distractors:
- rule: Prefer `const` over `let`. Use ternaries or early returns instead of reassignment.
  collision_type: would_cause_bug
  why_distracting: The pacing algorithm inherently requires tracking mutable state (`shown` text and `timeout` handle) across asynchronous `setTimeout` callbacks. Attempting to strictly avoid `let` and reassignment here would force the agent into unnatural recursive patterns or cause bugs in the pacing logic.
  severity: medium
  source:
    path: AGENTS.md
    lines: 56-67
- rule: Keep things in one function unless composable or reusable
  collision_type: scope_ambiguity
  why_distracting: The pacing logic involves calculating step sizes and finding snap boundaries. Extracting `step` and `next` as helper functions keeps `createPacedValue` readable. An agent strictly following 'keep things in one function' might inline these, bloating the main function unnecessarily.
  severity: low
  source:
    path: AGENTS.md
    lines: 10-11
hierarchy_analysis: The configuration is a flat, single-file (`AGENTS.md`) setup containing generic style guidelines. There is no complex inheritance or overriding between multiple config files.
