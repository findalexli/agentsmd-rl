title = "Fix useDidUpdate running on mount in React Strict Mode during development"
description = """
The useDidUpdate hook is incorrectly running its callback on mount in React Strict Mode during development.
This happens because React Strict Mode double-invokes effects in development to help detect side effects,
but the hook's mounted ref is not properly reset when the component remounts.

The fix involves adding a cleanup effect that resets the mounted ref when the component unmounts,
ensuring that the callback only runs on actual dependency updates, not on initial mount or remounts.
"""
difficulty = "easy"
estimated_time = "15 min"
