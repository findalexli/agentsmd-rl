rubric:
- rule: Include necessary headers for new types used (e.g., Weak.h when using JSC::Weak).
  source:
    path: src/bun.js/bindings/NodeVMScriptFetcher.h
    lines: '1-10'
  reference: >
    Solution adds include statements for JavaScriptCore/Weak.h and WeakInlines.h
    to provide the JSC::Weak type used in the m_owner field declaration.
- rule: Use proper WebKit GC types (Weak<T>) for back-references to prevent GC cycles.
  source:
    path: src/bun.js/bindings/NodeVMScriptFetcher.h
    lines: '45-60'
  reference: >
    m_owner field changed from Strong to Weak type to break the GC reference cycle
    between NodeVMScript and its ScriptFetcher.
- rule: Follow existing code style — check neighboring files for patterns.
  source:
    path: src/bun.js/bindings/NodeVMScriptFetcher.h
    lines: '1-72'
  reference: >
    Solution follows Bun's C++ style with proper indentation, WebKit JSC naming
    conventions, and includes a detailed comment explaining the Weak usage rationale.
- rule: Use C++ for JavaScriptCore integration, powered by WebKit's JavaScriptCore
    engine.
  source:
    path: src/bun.js/bindings/NodeVMScriptFetcher.h
    lines: '1-72'
  reference: >
    NodeVMScriptFetcher.h uses JSC::Weak, JSC::JSCell, JSC::JSValue, and
    includes JavaScriptCore/Weak.h headers for proper WebKit JSC integration.
distractors:
- rule: Always use `bun.*` APIs instead of `std.*`
  collision_type: architecture_boundary
  why_distracting: The agent is editing a C++ header file (`NodeVMScriptFetcher.h`)
    for JSC bindings, but this rule dictates using Zig-specific `bun.*` APIs instead
    of Zig's `std.*`. Applying Zig rules to C++ code would cause compilation errors.
  severity: high
  source:
    path: src/AGENTS.md
    lines: 15-25
- rule: 'Test Organization: Place tests in test/regression/issue/ or specific directories
    like test/js/node/'
  collision_type: scope_ambiguity
  why_distracting: The prompt explicitly asks for a regression test, and the config
    dictates where to place it (e.g., `test/js/node/`). However, the gold solution
    completely omits the test. An agent following the instructions and config to write
    a test would generate a diff that diverges from the gold solution.
  severity: medium
  source:
    path: AGENTS.md
    lines: 25-35
hierarchy_analysis: The hierarchy applies Zig-specific rules at the `src/` level,
  but the agent must recognize that these rules do not apply to C++ files within the
  same directory tree. The root config provides testing rules that conflict with the
  gold solution's omission of a test.
