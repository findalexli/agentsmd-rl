version: "2.0"

source:
  repo: "oven-sh/bun"
  pr: 28974
  base_commit: "c99fd9d1e17ec73ce4c0edd1c49f34be8e8edc25"
  merge_commit: "7e142ca82492a23c1e9bb2e0422ceccf69dbf7c4"

checks:
  # Fail-to-pass tests (PR diff - core behavior)
  - id: cert_not_expired
    type: fail_to_pass
    origin: pr_diff
    description: "TLS certificate notAfter must be in the future"

  - id: cert_long_validity
    type: fail_to_pass
    origin: pr_diff
    description: "Certificate must be valid for at least 5 years (not just 1 year)"

  # Original pass-to-pass tests (static checks)
  - id: cert_cn_localhost
    type: pass_to_pass
    origin: static
    description: "Certificate CN must be 'localhost'"

  - id: cert_san_localhost
    type: pass_to_pass
    origin: static
    description: "Certificate SAN must include DNS:localhost"

  - id: key_matches_cert
    type: pass_to_pass
    origin: static
    description: "Private key modulus must match certificate modulus"

  - id: cert_self_signed
    type: pass_to_pass
    origin: static
    description: "Certificate must be self-signed (issuer == subject)"

  # Pass-to-pass tests (repo_tests - file validity checks)
  - id: test_cert_file_exists
    type: pass_to_pass
    origin: repo_tests
    description: "TLS certificate file must exist in expected location"

  - id: test_key_file_exists
    type: pass_to_pass
    origin: repo_tests
    description: "TLS private key file must exist in expected location"

  - id: test_cert_valid_pem_format
    type: pass_to_pass
    origin: repo_tests
    description: "Certificate must be a valid PEM format file"

  - id: test_key_valid_pem_format
    type: pass_to_pass
    origin: repo_tests
    description: "Private key must be a valid PEM format file"

  - id: test_cert_has_rsa_2048
    type: pass_to_pass
    origin: repo_tests
    description: "Certificate must use RSA 2048-bit key"

  - id: test_cert_sig_sha256
    type: pass_to_pass
    origin: repo_tests
    description: "Certificate must use sha256WithRSAEncryption signature algorithm"

  - id: test_repo_files_unchanged
    type: pass_to_pass
    origin: repo_tests
    description: "Other repo files (Dockerfile, redis.conf) remain unchanged"

  - id: test_cert_not_empty
    type: pass_to_pass
    origin: repo_tests
    description: "Certificate file must not be empty"

  - id: test_key_not_empty
    type: pass_to_pass
    origin: repo_tests
    description: "Private key file must not be empty"

  # Pass-to-pass tests (repo_tests - config validation)
  - id: test_redis_conf_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Redis configuration file must exist and reference TLS files"

  - id: test_valkey_dockerfile_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Valkey Dockerfile must exist and reference certificate files"

  # New pass-to-pass tests (repo_tests - CI/CD TLS certificate checks)
  - id: test_cert_tls_version_compatible
    type: pass_to_pass
    origin: repo_tests
    description: "Certificate must use RSA key for TLS version compatibility"

  - id: test_cert_valid_for_tls_server
    type: pass_to_pass
    origin: repo_tests
    description: "Certificate must have required extensions for TLS server use"

  - id: test_cert_and_key_pair_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Certificate and key must form a valid cryptographic pair for TLS"

  - id: test_redis_tls_config_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "Redis TLS configuration must have valid syntax with all required settings"

  - id: test_cert_no_weak_algorithms
    type: pass_to_pass
    origin: repo_tests
    description: "Certificate must not use weak/insecure algorithms (SHA1, MD5, DSA)"

  - id: test_cert_chain_depth
    type: pass_to_pass
    origin: repo_tests
    description: "Self-signed certificate must have localhost as issuer and subject"

rubric:
  - rule: "Follow existing code style - check neighboring files for patterns"
    source:
      path: "CLAUDE.md"
      lines: "144"
      commit: "c99fd9d1e17ec73ce4c0edd1c49f34be8e8edc25"

  - rule: "All changes must be tested - if you're not testing your changes, you're not done"
    source:
      path: "CLAUDE.md"
      lines: "142"
      commit: "c99fd9d1e17ec73ce4c0edd1c49f34be8e8edc25"

  - rule: "Use absolute paths - Always use absolute paths in file operations"
    source:
      path: "CLAUDE.md"
      lines: "145"
      commit: "c99fd9d1e17ec73ce4c0edd1c49f34be8e8edc25"
