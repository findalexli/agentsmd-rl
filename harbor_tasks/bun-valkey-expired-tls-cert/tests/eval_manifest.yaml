rubric:
- rule: If no valid issue number is provided, find the best existing file to modify
    instead
  source:
    path: CLAUDE.md
    lines: 43-44
  evidence: The gold solution modifies the existing `test/js/valkey/docker-unified/server.crt`
    and `server.key` files rather than creating new test files or directories.
  category: testing
distractors:
- rule: 'Never use hardcoded port numbers. Always use `port: 0` to get a random port.'
  collision_type: would_cause_bug
  why_distracting: 'The agent might see the docker-unified setup (which likely uses
    hardcoded ports for the Valkey/Redis containers) and try to change them to `port:
    0` to follow this rule, which would break the docker container port mapping and
    the test setup.'
  severity: high
  source:
    path: test/CLAUDE.md
    lines: 17-18
- rule: If a test is for a specific numbered GitHub Issue, it should be placed in
    `test/regression/issue/${issueNumber}.test.ts`.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to create a new regression test file in `test/regression/issue/`
    to verify the certificate expiration fix, which is unnecessary and out of scope
    since the fix simply requires updating the existing static certificate files.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 40-41
- rule: Use `bun:test` with files that end in `*.test.{ts,js,jsx,tsx,mjs,cjs}`.
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to write a new `bun:test` script to validate
    the new certificates, overcomplicating a PR that only needs to replace the expired
    `.crt` and `.key` files.
  severity: low
  source:
    path: test/CLAUDE.md
    lines: 14-15
- rule: Never use hardcoded port numbers in tests.
  source:
    path: repo/test/CLAUDE.md
    lines: '21'
  source_text: '- **Do not write flaky tests**. Unless explicitly asked, **never wait
    for time to pass in tests**. Always wait for the condition to be met instead of
    waiting for an arbitrary amount of time. **Never use hardcoded port numbers**.
    Always use `port: 0` to get a random port.'
  collision_type: scope_ambiguity
  why_distracting: Since the PR modifies files within the test/ directory, an agent
    might assume testing conventions apply. However, this PR simply updates static
    certificate (.crt) and key (.key) files without changing any test logic.
  severity: medium
- rule: 'Always use port: 0. Do not hardcode ports.'
  source:
    path: repo/CLAUDE.md
    lines: '114'
  source_text: '- Always use `port: 0`. Do not hardcode ports. Do not use your own
    random port number function.'
  collision_type: scope_ambiguity
  why_distracting: The agent might believe it should validate or enforce test port
    usage due to the 'test/' path, but the PR is entirely data/configuration changes
    (TLS certificates).
  severity: low
- rule: Prefer concurrent tests over sequential tests.
  source:
    path: repo/test/CLAUDE.md
    lines: '22'
  source_text: '- **Prefer concurrent tests over sequential tests**: When multiple
    tests in the same file spawn processes or write files, make them concurrent with
    `test.concurrent` or `describe.concurrent` unless it''s very difficult to make
    them concurrent.'
  collision_type: scope_ambiguity
  why_distracting: The file is located in test/js/, which might lead an agent to attempt
    to verify or enforce test concurrency rules, when no tests are actually being
    modified.
  severity: low
hierarchy_analysis: 'The config hierarchy provides extensive guidance on writing JS/TS
  tests and building Bun. However, the target files are static certificate and key
  files used for a docker-based test environment. The agent must recognize that the
  test infrastructure rules (like `port: 0` or using `bun:test`) do not apply to updating
  static fixture files.'
