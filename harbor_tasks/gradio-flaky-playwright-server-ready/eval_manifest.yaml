distractors:
- rule: '`js/` — frontend code (Svelte/TypeScript), with each component in its own
    subdirectory'
  collision_type: architecture_boundary
  why_distracting: The rule states that `js/` contains frontend code. An agent might
    assume `js/tootils/src/app-launcher.ts` runs in the browser and attempt to use
    browser APIs like `fetch()` for the HTTP request. However, this is a Node.js test
    launcher script, so it must use Node's `http` module.
  severity: high
  source:
    path: AGENTS.md
    lines: 9-11
- rule: Be consistent with the style of the surrounding code.
  collision_type: would_cause_bug
  why_distracting: An agent might try to make the Python and TypeScript HTTP checks
    consistent by using the same endpoint (`/`) for both. However, using `HEAD /`
    in the TS launcher triggers SSR rendering which can block Gradio's own startup
    health check. The TS code must use `/gradio_api/info` instead.
  severity: high
  source:
    path: AGENTS.md
    lines: 37-39
hierarchy_analysis: The AGENTS.md file provides high-level repository structure and
