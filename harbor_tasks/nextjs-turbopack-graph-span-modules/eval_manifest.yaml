rubric:
- rule: Before editing or creating files in any subdirectory (e.g., `packages/*`,
    `crates/*`), read all `README.md` files in the directory path from the repo root
    up to and including the target file's directory.
  source:
    path: CLAUDE.md
    lines: '46'
    commit: 25646b928f900c12504b8a30ce5939207533aa54
- rule: cargo fmt uses ASCII order (uppercase before lowercase) - just run `cargo
    fmt`
  source:
    path: CLAUDE.md
    lines: '414'
    commit: 25646b928f900c12504b8a30ce5939207533aa54
- rule: 'Monorepo Overview: `turbopack/` for Turbopack bundler (Rust), `crates/` for
    Rust crates for Next.js SWC bindings'
  source:
    path: CLAUDE.md
    lines: 18-27
  evidence: The gold solution correctly places the Turbopack module graph logic in
    `turbopack/crates/turbopack-core/src/module_graph/mod.rs` and the Next.js specific
    API integration in `crates/next-api/src/app.rs
  category: architecture
distractors:
- rule: 'Default agent rule: If you are changing Next.js source or integration tests,
    start `pnpm --filter=next dev` in a separate terminal session before making edits'
  collision_type: scope_ambiguity
  why_distracting: The agent might start the JS dev server expecting it to auto-rebuild
    the Rust crates (`crates/next-api` and `turbopack/crates/turbopack-core`) on file
    changes, but Rust changes typically require `cargo` builds or `pnpm build-all`
    to recompile the native bindings.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 68-73
- rule: prefer `pnpm --filter=next build` when edits are limited to core Next.js files.
    Use full `pnpm build-all` ... when changes span multiple packages.
  collision_type: scope_ambiguity
  why_distracting: The agent might interpret `crates/next-api` as 'core Next.js files'
    and run `pnpm --filter=next build`, but the changes span into the `turbopack/`
    subtree, meaning `pnpm build-all` or `cargo` is required to properly build the
    cross-package Rust changes.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 88-93
hierarchy_analysis: '`CLAUDE.md` and `AGENTS.md` are identical symlinks. The rules
  provided are heavily skewed towards JS/TS development (`packages/next`), which creates
  ambiguity when working on the Rust codebase (`crates/` and `turbopack/`). The agent
  must infer that the fast local development rules (like `pnpm --filter=next dev`
  and `testheadless`) do not apply to Rust changes, and instead rely on standard Rust
  tooling or the `pnpm build-all` fallback.'
