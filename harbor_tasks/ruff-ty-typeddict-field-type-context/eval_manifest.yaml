version: "2.0"

source:
  repo: "astral-sh/ruff"
  pr: 24422
  base_commit: "b6c69c288fe9e5b63d70d1743aabdfa40523e344"
  merge_commit: "ac7656d728d016677e002f29fe2c436ce7ee7942"

checks:
  - id: compiles
    type: pass_to_pass
    origin: static
    description: "ty binary exists and is executable"

  - id: dict_keyword_values_with_type_context
    type: fail_to_pass
    origin: pr_diff
    description: "dict() keyword values re-inferred with field TypedDict type context"

  - id: dict_call_as_typeddict_positional
    type: fail_to_pass
    origin: pr_diff
    description: "dict() as positional arg uses TypedDict type context for correct inference"

  - id: missing_key_detected_via_type_context
    type: fail_to_pass
    origin: pr_diff
    description: "dict() with missing keys caught via TypedDict type context as missing-typed-dict-key"

  - id: existing_typeddict_validation
    type: pass_to_pass
    origin: pr_diff
    description: "Basic TypedDict validation still works: type errors and missing keys detected"

  - id: no_panic_unwrap_in_modified_functions
    type: pass_to_pass
    origin: agent_config
    description: "No panic!/unwrap in TypedDict validation functions"
    source:
      path: "AGENTS.md"
      lines: "79"
      commit: "b6c69c288fe9e5b63d70d1743aabdfa40523e344"

  - id: no_local_imports_in_modified_functions
    type: pass_to_pass
    origin: agent_config
    description: "No local use statements inside TypedDict validation functions"
    source:
      path: "AGENTS.md"
      lines: "76"
      commit: "b6c69c288fe9e5b63d70d1743aabdfa40523e344"

  - id: test_repo_build_ty
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ty binary builds successfully"

  - id: test_repo_clippy_ty_python_semantic
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's clippy checks pass for ty_python_semantic"

  - id: test_repo_fmt_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's code formatting is valid"

  - id: test_repo_ty_check_works
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ty binary can check a simple Python file"

  - id: test_repo_check_ty_crate
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ty crate compiles without errors (cargo check)"

  - id: test_repo_check_ty_python_semantic
    type: pass_to_pass
    origin: repo_tests
    description: "Modified crate ty_python_semantic compiles without errors (cargo check)"

  - id: test_repo_typed_dict_mdtest
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's mdtest for typed_dict.md passes"

rubric:
  - rule: "Follow existing code style. Check neighboring files for patterns."
    source:
      path: "AGENTS.md"
      lines: "75"
      commit: "b6c69c288fe9e5b63d70d1743aabdfa40523e344"

  - rule: "Prefer let chains (if let combined with &&) over nested if let statements to reduce indentation and improve readability."
    source:
      path: "AGENTS.md"
      lines: "80"
      commit: "b6c69c288fe9e5b63d70d1743aabdfa40523e344"

  - rule: "Use comments purposefully. Don't use comments to narrate code, but do use them to explain invariants and why something unusual was done a particular way."
    source:
      path: "AGENTS.md"
      lines: "82"
      commit: "b6c69c288fe9e5b63d70d1743aabdfa40523e344"
