distractors:
- rule: Get your tests to pass. If you didn't run the tests, your code does not work.
  collision_type: scope_ambiguity
  why_distracting: The gold solution introduces a known issue where speculative inference
    duplicates diagnostics (e.g., emitting two `unresolved-reference` errors). An
    agent strictly trying to make all tests 'pass' perfectly without duplicated diagnostics
    might attempt to deduplicate diagnostics or rewrite the speculative inference
    merging logic, leading to massive scope creep. The gold solution correctly accepts
    the duplication and adds a `TODO` comment.
  severity: high
  source:
    path: AGENTS.md
    lines: 53-53
hierarchy_analysis: The configuration hierarchy is flat, with all rules originating
  from `AGENTS.md` (included via `CLAUDE.md`). There are no direct conflicts between
  config files, but there is a tension between the instruction to 'Get your tests
  to pass' and the reality that fixing the duplicated diagnostics would violate 'Avoid
  writing significant amounts of new code'.
