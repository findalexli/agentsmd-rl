distractors:
- rule: New documentation files must also include a frontmatter block at the top (before
    the first heading) with description, sidebar_label, etc.
  collision_type: scope_ambiguity
  why_distracting: The instruction asks to create a 'new test file documenting the
    MSan limitation'. An agent might fixate on the word 'documenting' and attempt
    to apply the documentation rules (adding a frontmatter block with slug, title,
    etc.) to the C++ test file, which would cause compilation errors.
  severity: high
  source:
    path: AGENTS.md
    lines: 7-7
- rule: When writing text such as documentation, comments, or commit messages, wrap
    literal names from ClickHouse SQL language, classes and functions... inside inline
    code blocks.
  collision_type: scope_ambiguity
  why_distracting: The rule requires wrapping class and function names in inline
    code blocks (backticks) in comments. However, the gold solution does not use
    backticks for `FiberStack::allocate` or `__msan_unpoison` in the C++ comments,
    likely because standard C++ `///` comments in this file don't use markdown
    formatting.
  severity: low
  source:
    path: AGENTS.md
    lines: 5-5
hierarchy_analysis: The configuration consists of a single flat file (`AGENTS.md`)
  at the root level. There are no hierarchical conflicts, but the agent must carefully
  distinguish between rules intended for Markdown documentation and rules intended
  for C++ source code comments.
