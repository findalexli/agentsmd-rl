agent_config:
- id: allman_braces_style
  file: .claude/CLAUDE.md
  description: Use Allman-style braces (opening brace on a new line)
  lines: C++ code, always use Allman-style braces
- id: sanitizer_naming
  file: .claude/CLAUDE.md
  description: 'Say ASan/MSan, not ASAN/MSAN (two words: Address/Memory Sanitizer)'
  lines: When writing messages, say ASan, not ASAN
rubric:
- id: comment_quality
  description: Comments should accurately explain the MSan limitation with struct
    padding
  criteria:
  - Explains that MSan tracks shadow per-field, not per-byte
  - Mentions that struct padding shadow is lost through return values
  - Explains why __msan_unpoison is needed for fiber stacks
- rule: When writing text such as documentation, comments, or commit messages, write
    names of functions and methods as `f` instead of `f()`
  source:
    path: AGENTS.md
    lines: 9-9
  evidence: In `src/Common/tests/gtest_dragonbox_msan.cpp`, the comment refers to
    `FiberStack::allocate` and `__msan_unpoison` without parentheses, following the
    mathematical purity convention.
  category: style
distractors:
- rule: 'Wrap literal names from ClickHouse SQL language, classes and functions, or
    literal excerpts from log messages inside inline code blocks, such as: `MergeTree`.'
  collision_type: scope_ambiguity
  why_distracting: The rule explicitly mentions 'comments', which might lead an agent
    to use markdown backticks around `FiberStack::allocate` and `__msan_unpoison`
    in the C++ comments. However, the gold solution demonstrates that standard C++
    comments in this codebase do not use markdown backticks for class/function names.
  severity: medium
  source:
    path: AGENTS.md
    lines: 5-5
hierarchy_analysis: The AGENTS.md file provides general guidelines for the repository.
  The rule regarding function parentheses is correctly applied to C++ comments, but
  the rule regarding markdown backticks in comments is too broad and does not apply
  to standard C++ source file comments, creating a scope ambiguity.
