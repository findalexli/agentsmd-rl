# Rules from repo agent configs, evaluated by LLM judge.
# Source: astral-sh/ruff @ c8214d1c3b3ac051d23c03738ddb3a8e8b8e6a1e
rules:
  - rule: "Follow existing code style. Check neighboring files for patterns."
    from: "AGENTS.md:75"
  - rule: "Rust imports should always go at the top of the file, never locally in functions."
    from: "AGENTS.md:76"
  - rule: "Avoid writing significant amounts of new code. This is often a sign that we're missing an existing method or mechanism that could help solve the problem. Look for existing utilities first."
    from: "AGENTS.md:78"
  - rule: "Try hard to avoid patterns that require `panic!`, `unreachable!`, or `.unwrap()`. Instead, try to encode those constraints in the type system."
    from: "AGENTS.md:79"
  - rule: "Prefer let chains (`if let` combined with `&&`) over nested `if let` statements to reduce indentation and improve readability."
    from: "AGENTS.md:80"
  - rule: "If you *have* to suppress a Clippy lint, prefer to use `#[expect()]` over `[allow()]`, where possible. But if a lint is complaining about unused/dead code, it's usually best to just delete the unused code."
    from: "AGENTS.md:81"
  - rule: "Use comments purposefully. Don't use comments to narrate code, but do use them to explain invariants and why something unusual was done a particular way."
    from: "AGENTS.md:82"
