distractors:
- rule: Avoid writing significant amounts of new code. This is often a sign that we're
    missing an existing method or mechanism.
  collision_type: would_cause_bug
  why_distracting: An agent might try to avoid writing the custom `has_top_level_line_break`
    token-iterating function, assuming there must be an existing AST method to detect
    multiline expressions. This could lead to incorrect heuristics (like just checking
    the start and end line numbers of the AST node), which would fail to distinguish
    between top-level line breaks and nested line breaks (e.g., inside a function
    call).
  severity: high
  source:
    path: AGENTS.md
    lines: 50-51
hierarchy_analysis: 'The configuration consists of a single file (`AGENTS.md`) included
  via `CLAUDE.md`. There are no hierarchical conflicts. The primary tension is internal
  to `AGENTS.md`: balancing the directive to ''look for existing utilities'' with
  the need to write custom token-parsing logic when no exact utility exists for the
  specific problem.'
