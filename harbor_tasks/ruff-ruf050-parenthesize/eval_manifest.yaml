rubric:
- rule: Look to see if your tests could go in an existing file before adding a new file for your tests.
  source:
    path: AGENTS.md
    lines: '73'
    commit: c8214d1c3b3ac051d23c03738ddb3a8e8b8e6a1e
  evidence: The gold solution adds test cases for multiline expressions directly into the existing `crates/ruff_linter/resources/test/fixtures/ruff/RUF050.py` file rather than creating a new fixture file.
  category: testing
  verification: llm_judge
- rule: Rust imports should always go at the top of the file, never locally in functions.
  source:
    path: AGENTS.md
    lines: '76'
    commit: c8214d1c3b3ac051d23c03738ddb3a8e8b8e6a1e
  evidence: The gold solution adds `Tokens` and `parenthesized_range` to the top-level import `use ruff_python_ast::token::{...};` instead of importing them locally inside the new functions.
  category: style
  verification: llm_judge
- rule: Avoid writing significant amounts of new code. This is often a sign that we're missing an existing method or mechanism that could help solve the problem. Look for existing utilities first.
  source:
    path: AGENTS.md
    lines: '78'
    commit: c8214d1c3b3ac051d23c03738ddb3a8e8b8e6a1e
  evidence: The gold solution imports and uses the existing `parenthesized_range` utility from `ruff_python_ast::token` to find the bounds of the expression, rather than manually calculating the range.
  category: architecture
  verification: llm_judge
- rule: Prefer let chains (`if let` combined with `&&`) over nested `if let` statements to reduce indentation and improve readability.
  source:
    path: AGENTS.md
    lines: '80'
    commit: c8214d1c3b3ac051d23c03738ddb3a8e8b8e6a1e
  evidence: 'The gold solution uses a let chain in `condition_as_expression_statement`: `if has_top_level_line_break && let Some(range) = parenthesized_range(...)`.'
  category: style
  verification: llm_judge
distractors:
- rule: When working on ty, PR titles should start with `[ty]` and be tagged with the `ty` GitHub label.
  source:
    path: AGENTS.md
    lines: '68'
    commit: c8214d1c3b3ac051d23c03738ddb3a8e8b8e6a1e
  collision_type: scope_ambiguity
  why_distracting: The instruction specifies that PR titles should start with `[ty]` when working on ty. However, this task is to fix a Ruff linter rule (`RUF050`), so applying ty-specific conventions would be incorrect.
  severity: medium
- rule: 'Run tests for a specific crate:'
  source:
    path: AGENTS.md
    lines: 13-17
    commit: c8214d1c3b3ac051d23c03738ddb3a8e8b8e6a1e
  collision_type: scope_ambiguity
  why_distracting: The config provides a specific command to run tests for the `ty_python_semantic` crate. An agent might blindly copy this command to run tests, but the changes are in `ruff_linter`, so running `ty_python_semantic` tests would not verify the fix.
  severity: low
