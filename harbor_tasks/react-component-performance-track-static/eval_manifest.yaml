  - id: test_repo_print_warnings
    type: pass_to_pass
    origin: repo_tests
    description: "Repo print warnings check passes"

  - id: test_repo_version_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo version check passes"

  - id: test_repo_tests_shared
    type: pass_to_pass
    origin: repo_tests
    description: "Repo shared package tests pass"

