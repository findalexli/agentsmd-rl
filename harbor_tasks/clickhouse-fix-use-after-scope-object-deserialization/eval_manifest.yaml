task_name: clickhouse-fix-use-after-scope-object-deserialization
title: Fix use-after-scope in parallel Object type deserialization

description: |
  This PR fixes a use-after-scope bug in parallel Object type deserialization.
  When using thread pools for parallel deserialization, tasks could hold references
  to stack-local variables (tasks vector and caches vector). If an exception was thrown
  during task scheduling or execution, the function would exit without properly draining
  the thread pool, leading to dangling references.

  The fix adds a SCOPE_EXIT block that ensures all already-scheduled tasks are drained
  on any exit path (including exceptions), so pool threads do not dereference
  dangling references to stack locals.

  Key changes in src/DataTypes/Serializations/SerializationObject.cpp:
  - Added SCOPE_EXIT macro usage after task_size calculation
  - Ensures tryExecute() and wait() are called on all tasks during stack unwinding

