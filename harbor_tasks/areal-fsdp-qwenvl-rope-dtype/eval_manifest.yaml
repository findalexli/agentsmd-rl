version: "2.0"

source:
  repo: "inclusionAI/AReaL"
  pr: 1094
  base_commit: "f6556e88582e82b747ab1ac4038af2e106a464ee"
  merge_commit: "45e805ba8d274ec2c3cbb0699658449c2c6e163a"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "fsdp_engine.py must parse without errors"

  - id: dtype_cast_int32_to_int64
    type: fail_to_pass
    origin: pr_diff
    description: "Non-long input_ids (int32, float16, bfloat16) must be cast to int64/long"

  - id: dict_updated_with_cast_tensor
    type: fail_to_pass
    origin: pr_diff
    description: "Cast tensor must be written back to input_ dict, not just local var"

  - id: keyword_args_in_get_rope_index
    type: fail_to_pass
    origin: pr_diff
    description: "get_rope_index must use all 4 keyword args (input_ids, image_grid_thw, video_grid_thw, attention_mask)"

  - id: keyword_args_with_int64_input
    type: fail_to_pass
    origin: pr_diff
    description: "get_rope_index uses keyword args even when input_ids is already int64"

  - id: noop_int64_input
    type: pass_to_pass
    origin: pr_diff
    description: "int64 input_ids must be preserved without crash or dtype change"

  - id: noop_long_input
    type: pass_to_pass
    origin: pr_diff
    description: "torch.long input_ids must be preserved without crash or dtype change"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "_prepare_mb_list has substantial implementation (>=10 meaningful stmts)"

  - id: no_wildcard_imports
    type: pass_to_pass
    origin: agent_config
    description: "No wildcard imports (from x import *) in fsdp_engine.py"
    source:
      path: "AGENTS.md"
      lines: "30"
      commit: "f6556e88582e82b747ab1ac4038af2e106a464ee"

  - id: no_global_process_groups
    type: pass_to_pass
    origin: agent_config
    description: "No global process group creation at module level in fsdp_engine.py"
    source:
      path: "AGENTS.md"
      lines: "189"
      commit: "f6556e88582e82b747ab1ac4038af2e106a464ee"
  - id: repo_ruff_lint
    type: pass_to_pass
    origin: repo_tests
    description: "Engine files must pass ruff linting (E, W, I rules)"
  - id: no_print_statements
    type: pass_to_pass
    origin: agent_config
    description: "No bare print() calls in fsdp_engine.py — use areal.utils.logging logger instead"
    source:
      path: "AGENTS.md"
      lines: "90-92"
      commit: "f6556e88582e82b747ab1ac4038af2e106a464ee"

  - id: repo_ruff_format
    type: pass_to_pass
    origin: repo_tests
    description: "Engine files must be formatted according to ruff standards"

  - id: repo_yaml_valid
    type: pass_to_pass
    origin: repo_tests
    description: "All YAML workflow files must have valid syntax"

  - id: repo_json_valid
    type: pass_to_pass
    origin: repo_tests
    description: "All JSON files in repo must have valid syntax"

rubric:
  - rule: "Use explicit dtype/device for tensors; prefer explicit conversion over implicit. Check dtype before operations that require specific types."
    source:
      path: ".claude/rules/code-style.md"
      lines: "65-68"
      commit: "f6556e88582e82b747ab1ac4038af2e106a464ee"

  - rule: "Use keyword arguments for clarity when calling functions with multiple optional/none parameters. Prefer `fn(arg=value)` over positional when parameter meaning isn't obvious from value alone."
    source:
      path: "AGENTS.md"
      lines: "83-84"
      commit: "f6556e88582e82b747ab1ac4038af2e106a464ee"
    reference: |
      # From AGENTS.md "Always do":
      - Read relevant files before modifying code
      - Run `pre-commit run --all-files` before committing
      - Follow existing code patterns in the same module
      - Add tests for new functionality
