rubric:
- rule: Use explicit dtype/device for tensors - prefer explicit conversion over implicit
  source:
    path: areal/engine/fsdp_engine.py
    lines: 1317-1320
    commit: f6556e88582e82b747ab1ac4038af2e106a464ee
  evidence: The gold solution explicitly checks input_ids.dtype != torch.long and
    casts using input_ids.to(torch.long)
  category: style
- rule: Use keyword arguments for clarity when calling functions with multiple optional
    parameters
  source:
    path: areal/engine/fsdp_engine.py
    lines: 1341-1345
    commit: f6556e88582e82b747ab1ac4038af2e106a464ee
  evidence: The gold solution uses keyword arguments (input_ids=input_ids, image_grid_thw=image_grid_thw,
    etc.) when calling get_rope_index
  category: style
- rule: Follow existing code patterns in the same module for dictionary updates
  source:
    path: areal/engine/fsdp_engine.py
    lines: 1319-1320
    commit: f6556e88582e82b747ab1ac4038af2e106a464ee
  evidence: The gold solution updates the input_ dictionary with the modified tensor
    using input_["input_ids"] = input_ids
  category: style
- rule: No GPU-CPU sync in hot paths - avoid .item(), .tolist(), print(tensor)
  source:
    path: areal/engine/fsdp_engine.py
    lines: 1317-1320
    commit: f6556e88582e82b747ab1ac4038af2e106a464ee
  evidence: The gold solution performs async dtype checks and tensor.to() operations
    without any .item(), .tolist(), or print() calls
  category: architecture
- rule: 'Performance: No GPU-CPU sync in hot paths'
  source:
    path: AGENTS.md
    lines: 65-67
  evidence: The gold solution checks the tensor dtype and casts it using `input_ids.dtype
    != torch.long` and `.to(torch.long)`, avoiding any CPU-GPU synchronization methods
    like `.item()`.
  category: style
distractors:
- rule: Add tests for new functionality.
  collision_type: scope_ambiguity
  why_distracting: The instruction is to fix a bug in an existing FSDP engine method,
    not to add new functionality. Attempting to write unit tests for this would require
    complex mocking of distributed training state and Qwen-VL models, wasting effort.
  severity: medium
  source:
    path: AGENTS.md
    lines: 30-30
- rule: Integration tests require multi-node hardware -- explain skips explicitly.
  collision_type: meta_confusion
  why_distracting: The agent might try to run integration tests to verify the FSDP
    engine fix, but these require multi-node hardware. The agent might get stuck trying
    to run them or writing explanations for skipping them.
  severity: medium
  source:
    path: AGENTS.md
    lines: 24-24
hierarchy_analysis: The config hierarchy is flat (Level 0 files AGENTS.md and CLAUDE.md).
