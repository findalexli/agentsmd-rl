version: "2.0"

source:
  repo: "vercel/next.js"
  pr: 91649
  base_commit: "78f73b27069ffe2dc1ddfb2b16013220d2a86569"
  merge_commit: "4693685be18ace1818d9c1ade1dae77902013a6f"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Test file exists and has balanced braces/parens"

  - id: flaky_click_chains_removed
    type: fail_to_pass
    origin: pr_diff
    description: "Flaky .click().text()/.eval() chains are broken apart"

  - id: retry_wraps_browser_assertions
    type: fail_to_pass
    origin: pr_diff
    description: "retry/polling wrappers surround browser assertions (>=5 with proximity check)"

  - id: retry_mechanism_imported
    type: fail_to_pass
    origin: pr_diff
    description: "A retry/polling mechanism (retry, waitFor, toPass, etc.) is imported or defined"

  - id: names_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "Existing describe blocks and test names are preserved"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "File has substantial content (>=150 lines, >=10 it blocks, >=10 expects, >=15 browser refs)"

  - id: no_deprecated_check
    type: pass_to_pass
    origin: agent_config
    description: "No deprecated check() usage — must use retry() + expect() instead"
    source:
      path: "AGENTS.md"
      lines: "194"
      commit: "78f73b27069ffe2dc1ddfb2b16013220d2a86569"

  - id: no_settimeout_waiting
    type: pass_to_pass
    origin: agent_config
    description: "No setTimeout-based waiting — must use retry() instead"
    source:
      path: "AGENTS.md"
      lines: "180"
      commit: "78f73b27069ffe2dc1ddfb2b16013220d2a86569"

  - id: no_inline_files_object
    type: pass_to_pass
    origin: agent_config
    description: "nextTestSetup uses real fixture directory (files: __dirname) not inline file object literals"
    source:
      path: "AGENTS.md"
      lines: "207-221"
      commit: "78f73b27069ffe2dc1ddfb2b16013220d2a86569"

  - id: repo_fixture_directory_exists
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's test fixture directory exists and has required files (pages, components, next.config.js)"

  - id: repo_next_test_utils_retry_exists
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's next-test-utils has retry function available"

  - id: repo_test_file_imports_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Repo test file uses valid import paths (path, e2e-utils)"

  - id: repo_typescript_syntax_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Repo test file has valid TypeScript syntax (balanced braces, valid structure)"

rubric:
  - rule: "Test assertions should be wrapped in retry() for any browser interaction that may be asynchronous, not just scroll position checks."
    source:
      path: "AGENTS.md"
      lines: "180-192"
      commit: "78f73b27069ffe2dc1ddfb2b16013220d2a86569"
