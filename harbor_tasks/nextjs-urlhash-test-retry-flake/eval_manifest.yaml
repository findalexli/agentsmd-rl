rubric:
- rule: Run tests fast using NEXT_SKIP_ISOLATE=1 NEXT_TEST_MODE=<dev|start> pnpm testheadless
  source:
    path: CLAUDE.md
    lines: 80-85
  evidence: The gold solution modifies `test/development/pages-dir/client-navigation/url-hash.test.ts`,
    which is a test file that should be run and verified using the `testheadless`
    command described in the confi
  category: testing
- rule: Test suites are located in the `test/` directory
  source:
    path: CLAUDE.md
    lines: 14-15
  evidence: The gold solution correctly targets the test file within the `test/` directory,
    adhering to the monorepo structure where all test suites are housed.
  category: architecture
distractors:
- rule: prefer `pnpm --filter=next build` when edits are limited to core Next.js files
  collision_type: scope_ambiguity
  why_distracting: The agent might run `pnpm --filter=next build` thinking it needs
    to rebuild the framework to test its changes. However, since the edits are strictly
    within a test file and not core Next.js files, rebuilding the core framework is
    a waste of time and compute.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 90-91
- rule: Before editing or creating files in any subdirectory... read all README.md
    files in the directory path
  collision_type: meta_confusion
  why_distracting: The agent might waste time searching for and reading `README.md`
    files in `test/`, `test/development/`, and `test/development/pages-dir/` when
    the issue is a standard flaky test that simply requires wrapping assertions in
    `retry` from `next-test-utils`.
  severity: low
  source:
    path: CLAUDE.md
    lines: 46-48
hierarchy_analysis: The config files `CLAUDE.md` and `AGENTS.md` are identical symlinks.
  The rules primarily focus on local development workflows, building, and testing.
  The agent must discern which commands apply to modifying test files versus core
  framework files.
