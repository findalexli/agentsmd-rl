version: "2.0"

source:
  repo: "astral-sh/uv"
  pr: 18565
  base_commit: "5e25583c42b01fe8b1fae3b8ef05057cfdb4090c"
  merge_commit: "bd2e0c9b09551c6570b14c4da80364fe90805b78"

checks:
  - id: cargo_check
    type: pass_to_pass
    origin: static
    description: "uv-cli crate must compile without errors"

  - id: export_no_emit_package_comma_delimiter
    type: fail_to_pass
    origin: pr_diff
    description: "ExportArgs no_emit_package accepts comma-separated values via value_delimiter"

  - id: export_only_emit_package_comma_delimiter
    type: fail_to_pass
    origin: pr_diff
    description: "ExportArgs only_emit_package accepts comma-separated values via value_delimiter"

  - id: pipcompile_no_emit_package_comma_delimiter
    type: fail_to_pass
    origin: pr_diff
    description: "PipCompileArgs no_emit_package accepts comma-separated values via value_delimiter"

  - id: existing_aliases_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "Existing aliases (no-install-package, only-install-package, unsafe-package) still present"

  - id: no_prohibited_patterns_in_changes
    type: pass_to_pass
    origin: agent_config
    description: "No .unwrap(), panic!, unreachable!, or unsafe introduced in modified code"
    source:
      path: "CLAUDE.md"
      lines: "7"
      commit: "5e25583c42b01fe8b1fae3b8ef05057cfdb4090c"

  - id: no_allow_attribute_in_changes
    type: pass_to_pass
    origin: agent_config
    description: "Uses #[expect()] instead of #[allow()] for clippy suppressions"
    source:
      path: "CLAUDE.md"
      lines: "10"
      commit: "5e25583c42b01fe8b1fae3b8ef05057cfdb4090c"

rubric:
  - rule: "PREFER patterns like `if let` to handle fallibility"
    source:
      path: "CLAUDE.md"
      lines: "8"
      commit: "5e25583c42b01fe8b1fae3b8ef05057cfdb4090c"

  - rule: "PREFER let chains (`if let` combined with `&&`) over nested `if let` statements"
    source:
      path: "CLAUDE.md"
      lines: "11"
      commit: "5e25583c42b01fe8b1fae3b8ef05057cfdb4090c"

  - rule: "AVOID shortening variable names, e.g., use `version` instead of `ver`, and `requires_python` instead of `rp`"
    source:
      path: "CLAUDE.md"
      lines: "16-17"
      commit: "5e25583c42b01fe8b1fae3b8ef05057cfdb4090c"
