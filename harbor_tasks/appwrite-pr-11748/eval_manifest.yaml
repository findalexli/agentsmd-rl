source_pr:
  owner: appwrite
  repo: appwrite
  number: 11748
  merge_commit: 387668bb47695ad861aa431e82e39efbaf6c06b5
  base_commit: 96f4ef7d22ea9e12b5080268ed52a3b05b8649d9

# checks define the automated pytest checks that run in test_outputs.py
checks:
  - id: "smtp_register_uses_adapter"
    description: "app/init/registers.php returns SMTP adapter instead of PHPMailer"
    origin: "task"

  - id: "mails_worker_refactored"
    description: "Mails worker uses EmailMessage and EmailAdapter instead of PHPMailer methods"
    origin: "task"

  - id: "doctor_task_refactored"
    description: "Doctor task uses EmailMessage and SMTP adapter for health check"
    origin: "task"

  - id: "dependency_updated"
    description: "composer.json requires utopia-php/messaging ^0.22"
    origin: "task"

  - id: "no_phpmailer_imports"
    description: "PHPMailer imports removed from modified files"
    origin: "task"

  - id: "getmailer_method_removed"
    description: "getMailer() method removed from Mails worker"
    origin: "task"

  - id: "usage_class_not_final"
    description: "Usage class is not final (allows subclassing)"
    origin: "task"

  - id: "syntax_check"
    description: "All modified PHP files have valid syntax"
    origin: "task"

  - id: "agent_config_compliance"
    description: "Code follows repository conventions from AGENTS.md and CLAUDE.md"
    origin: "agent_config"
    source:
      - file: "AGENTS.md"
        lines: "1-100"
        commit: "96f4ef7d22ea9e12b5080268ed52a3b05b8649d9"
      - file: "CLAUDE.md"
        lines: "1-10"
        commit: "96f4ef7d22ea9e12b5080268ed52a3b05b8649d9"

  # Pass-to-pass tests: repo CI/CD checks that must pass on both base and fixed
  - id: "test_composer_validate"
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's composer.json passes validation"

  - id: "test_php_syntax_all_modified"
    type: pass_to_pass
    origin: repo_tests
    description: "All modified PHP files have valid syntax"

# rubric defines soft/subjective criteria for LLM-judge evaluation
rubric:
  - criterion: "Follows Appwrite module conventions (PSR-12, proper imports, Utopia ecosystem)"
    weight: 1
  - criterion: "Proper type hints and PHPDoc comments matching existing code style"
    weight: 1
  - criterion: "Environment variables handled correctly with System::getEnv()"
    weight: 1
