distractors:
- rule: File names can only be Get.php, Update.php, Create.php, Delete.php or XList.php.
  collision_type: scope_ambiguity
  why_distracting: The rule mandates that file names must only be `Get.php`, `Update.php`,
    `Create.php`, `Delete.php` or `XList.php`. An agent might attempt to rename `Mails.php`
    or `Doctor.php` to comply with this rule, but the rule strictly applies to the
    `Http` directory, whereas the edited files are in `Workers` and `Tasks`.
  severity: medium
  source:
    path: src/Appwrite/Platform/AGENTS.md
    lines: 31-35
- rule: For non-CRUD operations, model the endpoint as a property update.
  collision_type: scope_ambiguity
  why_distracting: The rule states that non-CRUD operations should be modeled as property
    updates (e.g., `Status/Update.php`). An agent might try to apply this logic to
    the `Doctor` task or `Mails` worker, but this rule is specific to HTTP endpoints,
    not CLI tasks or background workers.
  severity: low
  source:
    path: AGENTS.md
    lines: 43-45
hierarchy_analysis: The hierarchy consists of `AGENTS.md` at the root and `src/Appwrite/Platform/AGENTS.md`
  for module-specific guidelines. The root file provides general architecture and
  stack information (PHP 8.3+, Utopia PHP), which correctly guides the replacement
  of PHPMailer with Utopia Messaging. Both files contain strict naming conventions
  for HTTP endpoints (CRUD naming), which could cause scope ambiguity since the PR
  modifies Workers and Tasks, not HTTP endpoints. The agent must recognize that the
  HTTP naming rules do not apply to the `Workers` and `Tasks` directories.
