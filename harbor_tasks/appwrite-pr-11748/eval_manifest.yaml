rubric:
- rule: Documentation files should not be modified for this PHP code refactoring task.
    No changes to AGENTS.md, CLAUDE.md, README.md, or SKILL.md expected.
  source:
    path: AGENTS.md
  reference: ''
distractors:
- rule: Workers and Tasks should be placed inside module-specific directories.
  collision_type: architecture_boundary
  why_distracting: The Level 3 config emphasizes that workers and tasks should be
    placed inside module-specific directories (e.g., `src/Appwrite/Platform/Modules/{Name}/Workers/`).
    An agent might try to refactor the global `src/Appwrite/Platform/Workers/Mails.php`
    and `src/Appwrite/Platform/Tasks/Doctor.php` into a new or existing module to
    comply with this rule. However, Level 0 config clarifies that global workers and
    tasks exist outside of modules, and moving them would break the application and
    violate the explicit PR instructions.
  severity: medium
  source:
    path: src/Appwrite/Platform/AGENTS.md
    lines: 13-16
hierarchy_analysis: The Level 0 `AGENTS.md` defines the global architecture, including
  global `Workers` and `Tasks` directories. The Level 3 `src/Appwrite/Platform/AGENTS.md`
  focuses specifically on the structure of `Modules`, which also contain their own
  `Workers` and `Tasks` directories. The agent must understand this distinction and
  not incorrectly apply the module-specific rules to global workers and tasks.
version: '2.0'
