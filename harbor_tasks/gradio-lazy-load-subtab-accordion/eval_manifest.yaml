      path: "js/core/src/init.svelte.ts"
      commit: "ccff8b8cacffe36a270fcea9fc8ba29b78c31c8d"

  - rule: "The Tabs component handling must check child.type === 'tabitem' and only recurse into the selected tab's children."
    source:
      path: "js/core/src/init.svelte.ts"
      commit: "ccff8b8cacffe36a270fcea9fc8ba29b78c31c8d"

  - rule: "The Accordion component handling must check for open === false and skip recursion when not the target node."
    source:
      path: "js/core/src/init.svelte.ts"
      commit: "ccff8b8cacffe36a270fcea9fc8ba29b78c31c8d"
