    description: "Closed accordion does not eagerly load its children"

  - id: tab_initial_tabs_fallback
    type: fail_to_pass
    origin: pr_diff
    description: "Tabs without selected prop fall back to initial_tabs[0]"

  - id: open_accordion_children_visible
    type: pass_to_pass
    origin: pr_diff
    description: "Open accordion children are still made visible (regression)"

  - id: not_stub
    type: pass_to_pass
