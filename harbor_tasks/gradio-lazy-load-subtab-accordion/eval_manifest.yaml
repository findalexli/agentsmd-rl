    description: "Modified functions have real logic, not stubs"

  - id: repo_format_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's code formatting passes"

  - id: repo_vitest_core
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's core init tests pass"

  - id: repo_client_build
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's client package builds successfully"

  - id: repo_vitest_i18n
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's i18n unit tests pass"

rubric:
  - rule: "The make_visible_if_not_rendered function must have the is_target_node parameter to control recursion behavior."
