source_pr:
  owner: OpenHands
  repo: OpenHands
  pr_number: 13599
  merge_commit: c210d5294fa82459443e6163b9b1c9c9f55073fc
  base_commit: c7190ddb308de5a8c00b790049c5027d122159f7
  title: "feat: add /new to slash command menu for V1 conversations"

# Task description
description: |
  Add the /new slash command to the GUI slash command menu so users can discover it
  alongside other slash commands. The /new command should only appear for V1 conversations
  (not V0), and should include proper loading state handling to prevent a staggered menu bug.

checks:
  # Fail-to-pass tests
  - id: test_v1_conversation_includes_new_command
    type: fail_to_pass
    origin: behavior
    description: "/new command appears in slash menu for V1 conversations"

  - id: test_v0_conversation_excludes_new_command
    type: fail_to_pass
    origin: behavior
    description: "/new command does NOT appear for V0 conversations"

  - id: test_returns_empty_while_loading
    type: fail_to_pass
    origin: behavior
    description: "Menu returns empty items while skills loading (prevents staggered menu bug)"

  - id: test_constants_file_updated
    type: fail_to_pass
    origin: behavior
    description: "constants.ts exports BUILT_IN_COMMANDS with /new command definition"

  - id: test_active_conversation_hook_imported
    type: fail_to_pass
    origin: behavior
    description: "use-slash-command.ts imports useActiveConversation hook"

  - id: test_v1_conversation_check_implemented
    type: fail_to_pass
    origin: behavior
    description: "Hook checks conversation_version === 'V1' to gate /new command"

  - id: test_skills_loading_check
    type: fail_to_pass
    origin: behavior
    description: "Hook checks isSkillsLoading to prevent staggered menu"

  # Pass-to-pass tests
  - id: test_use_slash_command_hook_exists
    type: pass_to_pass
    origin: repo_tests
    description: "The use-slash-command hook file exists and compiles"

  - id: test_typecheck_passes
    type: pass_to_pass
    origin: repo_tests
    description: "TypeScript type checking passes"

  - id: test_lint_passes
    type: pass_to_pass
    origin: repo_tests
    description: "Linting passes per AGENTS.md requirements"

  - id: test_new_conversation_command
    type: pass_to_pass
    origin: repo_tests
    description: "useNewConversationCommand hook tests pass (repo CI)"

  - id: test_skill_modal
    type: pass_to_pass
    origin: repo_tests
    description: "SkillsModal component tests pass (repo CI)"

rubric:
  - rule: "Import useActiveConversation from #/hooks/query/use-active-conversation"
    weight: 10
    source: "frontend/src/hooks/chat/use-slash-command.ts"

  - rule: "Import BUILT_IN_COMMANDS from #/utils/constants"
    weight: 10
    source: "frontend/src/hooks/chat/use-slash-command.ts"

  - rule: "Add isSkillsLoading to useConversationSkills destructuring"
    weight: 10
    source: "frontend/src/hooks/chat/use-slash-command.ts"

  - rule: "Add conversation from useActiveConversation hook"
    weight: 10
    source: "frontend/src/hooks/chat/use-slash-command.ts"

  - rule: "Define isV1Conversation = conversation?.conversation_version === 'V1'"
    weight: 15
    source: "frontend/src/hooks/chat/use-slash-command.ts"

  - rule: "Check isSkillsLoading before returning items to prevent staggered menu"
    weight: 15
    source: "frontend/src/hooks/chat/use-slash-command.ts"

  - rule: "Include BUILT_IN_COMMANDS when isV1Conversation is true"
    weight: 15
    source: "frontend/src/hooks/chat/use-slash-command.ts"

  - rule: "Update slashItems useMemo dependencies to include isV1Conversation and isSkillsLoading"
    weight: 15
    source: "frontend/src/hooks/chat/use-slash-command.ts"
