[description]
brief = "Add async implementation for todo list middleware"
detail = """
The TodoListMiddleware in langchain provides task management capabilities for agents.
Currently, the write_todos tool only has a synchronous implementation. This task
requires adding an async coroutine implementation (_awrite_todos) and registering
it with the StructuredTool so that async agent execution works correctly.
"""

[solution]
strategy = "code-change"
files = [
    "libs/langchain_v1/langchain/agents/middleware/todo.py",
    "libs/langchain_v1/tests/unit_tests/agents/middleware/implementations/test_todo.py"
]
