checks:
  # Fail-to-pass tests - these verify the bug is fixed
  - id: test_awrite_todos_function_exists
    type: fail_to_pass
    origin: behavior
    description: _awrite_todos async function must exist in todo module

  - id: test_awrite_todos_has_correct_signature
    type: fail_to_pass
    origin: agent_config
    source: CLAUDE.md:Code quality standards
    description: _awrite_todos must have correct type hints and signature

  - id: test_todo_middleware_tool_has_coroutine
    type: fail_to_pass
    origin: behavior
    description: TodoListMiddleware tool must have coroutine registered

  - id: test_awrite_todos_docstring
    type: fail_to_pass
    origin: agent_config
    source: CLAUDE.md:Documentation standards
    description: _awrite_todos must have appropriate docstring

  - id: test_awrite_todos_functional_behavior
    type: fail_to_pass
    origin: behavior
    description: _awrite_todos must correctly delegate to _write_todos

  # Pass-to-pass tests - these verify existing functionality still works
  - id: test_upstream_tests_pass
    type: pass_to_pass
    origin: repo_tests
    description: Run the existing upstream unit tests for todo middleware

  - id: test_ruff_linting
    type: pass_to_pass
    origin: repo_tests
    description: Code must pass ruff linting

  - id: test_mypy_type_checking
    type: pass_to_pass
    origin: repo_tests
    description: Code must pass mypy type checking

