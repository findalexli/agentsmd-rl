  merge_commit: c7a677bba511d7f3f5c36f9384ae6ba150866e04
  source_repo: https://github.com/langchain-ai/langchain.git

source:
  files:
    - path: libs/langchain_v1/langchain/agents/middleware/todo.py
      description: TodoListMiddleware with write_todos tool definition
    - path: libs/langchain_v1/tests/unit_tests/agents/middleware/implementations/test_todo.py
      description: Unit tests for todo middleware

  config_files:
