source:
  repo: mantinedev/mantine
  pr: 8476
  base_commit: 6cfca290cd5535c031531fa872a6058a625351c0
  merge_commit: 4023dc07dc44cc9be456c66139856f8c27efb467

description: |
  Fix breaking changes accidentally introduced in @mantine/modals package.
  The previous patch changed the API for openContextModal from taking two
  arguments (modal, props) to taking a single object with modalKey property.
  It also renamed closeAll back to closeAllModals and made updateContextModal
  require modalKey. This fix reverts those breaking changes to restore the
  original API.

checks:
  # Fail-to-pass checks - these verify the buggy API is fixed
  - id: test_open_context_modal_signature
    type: fail_to_pass
    origin: behavioral
    description: openContextModal takes two arguments (modal, props) not single object

  - id: test_context_has_close_all
    type: fail_to_pass
    origin: behavioral
    description: ModalsContextProps has closeAll method not closeAllModals

  - id: test_update_context_modal_no_modal_key
    type: fail_to_pass
    origin: behavioral
    description: updateContextModal only needs modalId, not modalKey

  - id: test_open_context_modal_type_signature
    type: fail_to_pass
    origin: behavioral
    description: openContextModal type signature takes two arguments in context.ts

  - id: test_no_context_modal_inner_props_type
    type: fail_to_pass
    origin: behavioral
    description: ContextModalInnerProps helper type is removed

  - id: test_close_context_modal_uses_close_modal
    type: fail_to_pass
    origin: behavioral
    description: closeContextModal is an alias for closeModal

  - id: test_modals_type_simplified
    type: fail_to_pass
    origin: behavioral
    description: MantineModals uses MantineModalsOverwritten pattern

  - id: test_open_context_modal_in_events
    type: fail_to_pass
    origin: behavioral
    description: Provider converts single-arg event payload to two-arg call

  # Pass-to-pass checks - these verify repo tests still pass
  - id: test_repo_jest_modals
    type: pass_to_pass
    origin: repo_tests
    description: Jest tests for @mantine/modals pass

  - id: test_repo_eslint_modals
    type: pass_to_pass
    origin: repo_tests
    description: ESLint passes on @mantine/modals source

  - id: test_repo_prettier_check
    type: pass_to_pass
    origin: repo_tests
    description: Prettier formatting check passes

  - id: test_modals_package_builds
    type: pass_to_pass
    origin: repo_tests
    description: "@mantine/modals package TypeScript compilation"

  - id: test_no_close_context_modal_export
    type: pass_to_pass
    origin: repo_tests
    description: "closeContextModal is not exported from index.ts"

  - id: test_reducer_uses_generic_open_context_modal
    type: pass_to_pass
    origin: repo_tests
    description: reducer.ts uses OpenContextModal<any> with generic parameter

rubric: []
