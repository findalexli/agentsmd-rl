distractors:
- rule: PREFER patterns like `if let` to handle fallibility
  collision_type: would_cause_bug
  why_distracting: The original code used `if let Some(conflicts) = conflicts.as_mut()`
    because `conflicts` was an `Option`. An agent might try to preserve this fallibility
    pattern for the new `activated_items` map. However, the fix requires unconditionally
    tracking activated items (removing the `Option` wrapper entirely) to properly
    resolve unencoded extras, making the `if let` pattern obsolete here.
  severity: high
  source:
    path: CLAUDE.md
    lines: 8-8
- rule: ALWAYS attempt to add a test case for changed behavior
  collision_type: architecture_boundary
  why_distracting: The agent might attempt to add unit tests for the graph building
    or extra resolution logic directly in the modified files. However, testing workspace
    extra conflicts requires full project setups (pyproject.toml, lockfiles) which
    belong in integration tests. Trying to mock the complex `ExportableRequirements`
    state for a unit test would waste effort and likely fail.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 2-2
