name = "kotlin-annotation-repeatable-checks"
version = "1.0.0"
description = "Fix annotation repeatable checks around ALL use-site target in Kotlin FIR compiler"
difficulty = "medium"
tags = ["kotlin", "compiler", "fir", "annotations", "type-checking"]

[agents]
main_agent = { timeout_seconds = 1800 }

[verifier]
timeout_seconds = 300

[repository]
owner = "JetBrains"
name = "kotlin"
base_commit = "3325ebdb5efefe65d4f4e93540ffc010e3db8055"
merge_commit = "c1436f385a6a27fdde2f75208e241e17153983e2"
pr_number = 5792

[source]
target_files = [
    "compiler/fir/checkers/src/org/jetbrains/kotlin/fir/analysis/checkers/FirAnnotationHelpers.kt",
    "compiler/fir/checkers/src/org/jetbrains/kotlin/fir/analysis/checkers/declaration/FirOptInMarkedDeclarationChecker.kt",
    "compiler/fir/checkers/src/org/jetbrains/kotlin/fir/analysis/checkers/declaration/FirAnnotationChecker.kt",
    "compiler/fir/checkers/src/org/jetbrains/kotlin/fir/analysis/checkers/declaration/FirSupertypesChecker.kt",
    "compiler/fir/fir-serialization/src/org/jetbrains/kotlin/fir/serialization/FirElementSerializer.kt",
    "plugins/parcelize/parcelize-compiler/parcelize.k2/src/org/jetbrains/kotlin/parcelize/fir/diagnostics/FirParcelizePropertyChecker.kt"
]
distinctive_line = "it != AnnotationUseSiteTarget.ALL"
