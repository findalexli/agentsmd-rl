rubric:
  - id: modern_type_hints
    rule: The new get_chart_type_schema.py module uses Python type hints (Dict, Any from typing module)

  - id: docstring_quality
    rule: The get_chart_type_schema function has a meaningful docstring explaining what it does

  - id: error_handling_structured
    rule: Error responses include error message, valid_chart_types list, and hint text

  - id: module_level_adapters
    rule: TypeAdapters are defined at module level as _CHART_TYPE_ADAPTERS dict, not inside functions

  - id: discovery_tag
    rule: The @tool decorator uses tags=["discovery"] to mark this as a discovery tool
