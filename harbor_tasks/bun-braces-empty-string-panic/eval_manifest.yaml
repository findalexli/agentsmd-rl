rubric:
- rule: Code changes must pass zig fmt formatting check
  source:
    path: tests/test_outputs.py
    lines: 104-117
    commit: 5b7fe81279a40f3fccebe6e7f52278c81b39dfb6
- rule: Code changes must pass zig ast-check validation
  source:
    path: tests/test_outputs.py
    lines: 120-133
    commit: 5b7fe81279a40f3fccebe6e7f52278c81b39dfb6
- rule: Bug fixes must include regression tests
  source:
    path: tests/test_outputs.py
    lines: 217-230
    commit: 5b7fe81279a40f3fccebe6e7f52278c81b39dfb6
- rule: NEVER write tests that check for no "panic" or "uncaught exception" or similar
    in the test output.
  source:
    path: CLAUDE.md
    lines: 58-59
  evidence: The gold solution tests the actual return value `expect($.braces("")).toEqual([""]);`
    rather than spawning a process and checking stderr for the word 'panic'.
  category: testing
- rule: If no valid issue number is provided, find the best existing file to modify
    instead, such as test/js/bun/ for Bun-specific API tests.
  source:
    path: CLAUDE.md
    lines: 23-24
  evidence: The gold solution adds the test cases to the existing `test/js/bun/shell/brace.test.ts`
    file instead of creating a new regression test file.
  category: testing
distractors:
- rule: When spawning Bun processes, use `bunExe` and `bunEnv` from `harness`.
  collision_type: scope_ambiguity
  why_distracting: Because the issue describes a 'panic' (which crashes the process),
    an agent might assume it must spawn a separate Bun process using `Bun.spawn` to
    safely test the crash without taking down the test runner. However, since the
    bug is fixed in the same PR, a direct, synchronous API test is sufficient and
    preferred.
  severity: high
  source:
    path: test/CLAUDE.md
    lines: 21-24
- rule: Use `-e` for single-file tests
  collision_type: scope_ambiguity
  why_distracting: An agent might try to create a new single-file test using `Bun.spawn`
    with `-e` to test the empty string behavior, rather than simply adding a new `test("empty
    string", ...)` block to the existing `brace.test.ts` suite.
  severity: medium
  source:
    path: test/CLAUDE.md
    lines: 26-27
hierarchy_analysis: The root `CLAUDE.md` provides general testing guidelines (like
  not checking for panics and where to put tests), while `test/CLAUDE.md` provides
  specific patterns for spawning processes. In this case, the root guideline about
  not checking for panics overrides the temptation to use the process-spawning patterns
  from `test/CLAUDE.md`, because a direct API test is preferred once the panic is
  fixed.
