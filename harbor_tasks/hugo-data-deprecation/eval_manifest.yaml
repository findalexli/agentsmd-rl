    description: Repo compiles successfully
    weight: 1

  - id: test_repo_hugolib_tests
    type: pass_to_pass
    origin: repo_tests
    description: Hugolib deprecation tests pass
    weight: 1

  - id: test_repo_page_tests
    type: pass_to_pass
    origin: repo_tests
    description: Page package tests pass
    weight: 1

  - id: test_no_build_errors
    type: pass_to_pass
    origin: repo_tests
    description: Go vet passes on modified packages
    weight: 1

  - id: test_repo_gofmt
    type: pass_to_pass
    origin: repo_tests
    description: gofmt linting passes on modified packages
    weight: 1

  - id: test_repo_data_tests
    type: pass_to_pass
    origin: repo_tests
    description: Data-related tests pass
    weight: 1

  - id: test_repo_hugolib_smoke
    type: pass_to_pass
    origin: repo_tests
    description: Hugolib smoke tests pass
    weight: 1

  - id: test_repo_hugolib_build
    type: pass_to_pass
    origin: repo_tests
    description: Hugolib build tests pass
    weight: 1

  # Fail-to-pass tests (the actual fix)
  - id: test_data_provider_interface_exists
    type: fail_to_pass
    origin: agent_config
    source:
      file: AGENTS.md
      lines: "Never export symbols that's not needed outside of the package"
    description: DataProvider interface is defined
    weight: 1

  - id: test_hugo_info_provider_interface_updated
    type: fail_to_pass
    origin: patch
    description: HugoInfoHugoSitesProvider interface exists with SitesProvider and DataProvider
    weight: 1

  - id: test_site_data_deprecation
    type: fail_to_pass
    origin: patch
    description: Site.Data has deprecation warning with proper version
    weight: 1

  - id: test_site_all_pages_deprecation
    type: fail_to_pass
    origin: patch
    description: Site.AllPages has deprecation warning
    weight: 1

  - id: test_site_build_drafts_deprecation
    type: fail_to_pass
    origin: patch
    description: Site.BuildDrafts has deprecation warning
    weight: 1

  - id: test_site_languages_deprecation
    type: fail_to_pass
    origin: patch
    description: Site.Languages has deprecation warning
    weight: 1

  - id: test_hugo_sites_provider_has_data_method
    type: fail_to_pass
    origin: patch
    description: hugoSitesSitesProvider implements Data() method
    weight: 1

  - id: test_sync_once_fields_added
    type: fail_to_pass
    origin: patch
    description: New sync.Once fields added for deprecation tracking
    weight: 1

  - id: test_hugo_info_options_updated
    type: fail_to_pass
    origin: patch
    description: HugoInfoOptions uses HugoInfoHugoSitesProvider
    weight: 1

  - id: test_nop_hugo_sites_provider
    type: fail_to_pass
    origin: patch
    description: nopHugoSitesProvider replaces nopSitesProvider with Data method
    weight: 1

  - id: test_site_identity_updated
    type: fail_to_pass
    origin: patch
    description: siteidentities.Data updated to hugo.Data
    weight: 1

rubric:
  - rule: Use qt matchers in tests instead of raw if/t.Fatal checks
    source:
      file: AGENTS.md
      lines: "In tests, use `qt` matchers instead of raw `if`/`t.Fatal` checks"
    description: New tests added follow the qt matcher pattern
    weight: 1

  - rule: Avoid global state
    source:
      file: AGENTS.md
      lines: "Avoid global state at (almost) all cost"
    description: Deprecation tracking uses sync.Once fields on struct, not global state
    weight: 1

  - rule: Look for helper functions before creating new ones
    source:
      file: AGENTS.md
      lines: "assume that a similar problem has been solved before, look hard for helper functions"
    description: Code reuses existing patterns like hugo.Deprecate() and sync.Once
    weight: 1

  - rule: Brevity is good - use self-explanatory names
    source:
      file: AGENTS.md
      lines: "Brevity is good. Use self-explanatory variable and function names"
    description: Interface and method names are clear and concise
    weight: 1

  - rule: Don't use comments to explain the obvious
    source:
      file: AGENTS.md
      lines: "Don't use comments to explain the obvious"
    description: Comments are minimal and focused on deprecation rationale
    weight: 1
