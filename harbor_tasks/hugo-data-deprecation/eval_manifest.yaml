manifest_version: "1.0"

source:
  owner: gohugoio
  repo: hugo
  pr_number: 14535
  base_commit: d8ec0eeeaf2ff078565fddbbab5565a65b86346c
  merge_commit: 86aa62524f8bc36a04c8e0c0f76d1fd952585509
  pr_title: "hugolib: Move site.Data to hugo.Data, deprecate Site.AllPages/BuildDrafts/Languages"

task:
