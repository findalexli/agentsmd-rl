  - rule: "Never use linting suppressions like #[allow(dead_code)]"
    source: CLAUDE.md
    reference: "NEVER use #[allow(dead_code)], #[allow(unused)], or any other linting suppressions - fix the underlying issues instead"

  - rule: "Comments should explain non-obvious logic, not the obvious"
    source: CLAUDE.md
    reference: "Do NOT comment the obvious - comments should not simply repeat what the code does"
