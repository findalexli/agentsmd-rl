config_edits:
- path: plugins/explanatory-output-style/README.md
  tier: 2
  gold_added: "# Explanatory Output Style Plugin\n\nThis plugin recreates the deprecated\
    \ Explanatory output style as a SessionStart\nhook.\n\nWARNING: Do not install\
    \ this plugin unless you are fine with incurring the token\ncost of this plugin's\
    \ additional instructions and output.\n\n## What it does\n\nWhen enabled, this\
    \ plugin automatically adds instructions at the start of each\nsession that encourage\
    \ Claude to:\n\n1. Provide educational insights about implementation choices\n\
    2. Explain codebase patterns and decisions\n3. Balance task completion with learning\
    \ opportunities\n\n## How it works\n\nThe plugin uses a SessionStart hook to inject\
    \ additional context into every\nsession. This context instructs Claude to provide\
    \ brief educational explanations\nbefore and after writing code, formatted as:\n\
    \n```\n`★ Insight ─────────────────────────────────────`\n[2-3 key educational\
    \ points]\n`─────────────────────────────────────────────────`\n```\n\n## Usage\n\
    \nOnce installed, the plugin activates automatically at the start of every\nsession.\
    \ No additional configuration is needed.\n\nThe insights focus on:\n\n- Specific\
    \ implementation choices for your codebase\n- Patterns and conventions in your\
    \ code\n- Trade-offs and design decisions\n- Codebase-specific details rather\
    \ than general programming concepts\n\n## Migration from Output Styles\n\nThis\
    \ plugin replaces the deprecated \"Explanatory\" output style setting. If you\n\
    previously used:\n\n```json\n{\n  \"outputStyle\": \"Explanatory\"\n}\n```\n\n\
    You can now achieve the same behavior by installing this plugin instead.\n\nMore\
    \ generally, this SessionStart hook pattern is roughly equivalent to\nCLAUDE.md,\
    \ but it is more flexible and allows for distribution through plugins.\n\nNote:\
    \ Output styles that involve tasks besides software development, are better\n\
    \ expressed as\n[subagents](https://docs.claude.com/en/docs/claude-code/sub-agents),\
    \ not as\nSessionStart hooks. Subagents change the system prompt while SessionStart\
    \ hooks\nadd to the default system prompt.\n\n## Managing changes\n\n- Disable\
    \ the plugin - keep the code installed on your device\n- Uninstall the plugin\
    \ - remove the code from your device\n- Update the plugin - create a local copy\
    \ of this plugin to personalize this\n  plugin\n  - Hint: Ask Claude to read\n\
    \    https://docs.claude.com/en/docs/claude-code/plugins.md and set it up for\n\
    \  you!"
  gold_removed: ''
