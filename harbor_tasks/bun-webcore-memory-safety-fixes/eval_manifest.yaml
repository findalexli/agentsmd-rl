rubric:
- rule: Update CLAUDE.md with a note about WebCore fixes applied.
  source:
    path: CLAUDE.md
    lines: '228'
    commit: 639bc4351cd7b5daa38b99d47a506dec68e95353
  reference: '- WebCore fixes applied: MessagePortChannel memory leak, JSAbortController
    signal reason, BroadcastChannel use-after-free, EventListenerMap thread affinity.'
distractors:
- rule: Always use bun.* APIs instead of std.*
  collision_type: architecture_boundary
  why_distracting: The rule mandates using Bun's Zig APIs (bun.sys, bun.base64) instead
    of std.*, but the agent is editing C++ files that use the WebKit Template Framework
    (WTF) and standard C++ libraries.
  severity: high
  source:
    path: src/AGENTS.md
    lines: 15-25
- rule: Place tests for specific numbered GitHub Issues in test/regression/issue/${issueNumber}.test.ts
  collision_type: scope_ambiguity
  why_distracting: The prompt mentions 'confirmed upstream WebKit bug', which might
    lead the agent to try and write a regression test in test/regression/issue/ using
    the WebKit bug number, but the gold solution focuses purely on the C++ fixes.
  severity: medium
  source:
    path: AGENTS.md
    lines: 26-28
hierarchy_analysis: The config hierarchy provides rules for Zig and JS/TS testing,
  but the task is entirely within the C++ WebCore bindings. The agent must recognize
  that the Zig-specific rules in `src/AGENTS.md` do not apply to `.cpp` files, crossing
  an architecture boundary.
