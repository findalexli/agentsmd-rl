  merge_commit: "b826afb9f0b1a201e426d93b954224be11003763"

checks:
  - id: plugin_prefix_in_discovery
    type: fail_to_pass
    origin: pr_diff
    description: "Plugin skills get canonical plugin prefix applied during slash command discovery"

  - id: frontmatter_override_prefixed
    type: fail_to_pass
    origin: pr_diff
    description: "Even when SKILL.md frontmatter overrides the name, plugin prefix is preserved"

  - id: type_signature_widened
    type: fail_to_pass
    origin: pr_diff
    description: "getCanonicalPluginCommandId accepts structural type with uri, not just IAgentPlugin"

  - id: plugin_source_guard
    type: fail_to_pass
    origin: pr_diff
    description: "Prefix is only applied for Plugin sources, not all prompt sources"

  - id: non_plugin_sources_unaffected
    type: pass_to_pass
    origin: static
    description: "Non-plugin sources still use unmodified name (no false prefix application)"

  - id: canonical_function_still_exported
    type: pass_to_pass
    origin: static
    description: "getCanonicalPluginCommandId remains exported with basename and normalizePluginToken"

  - id: no_arrow_function_for_export
    type: pass_to_pass
    origin: agent_config
    description: "Exported function uses function keyword, not arrow expression"
    source:
      path: ".github/copilot-instructions.md"
      lines: "126"
      commit: "559cb3e74d075670b9a03f84751e8fdcd3c52443"

  - id: tab_indentation_in_modified_files
    type: pass_to_pass
    origin: agent_config
    description: "Modified files use tab indentation"
    source:
      path: ".github/copilot-instructions.md"
      lines: "72"
      commit: "559cb3e74d075670b9a03f84751e8fdcd3c52443"

  - id: single_quotes_for_strings
    type: pass_to_pass
    origin: agent_config
    description: "Non-localized strings use single quotes"
    source:
      path: ".github/copilot-instructions.md"
      lines: "94"
      commit: "559cb3e74d075670b9a03f84751e8fdcd3c52443"

rubric:
