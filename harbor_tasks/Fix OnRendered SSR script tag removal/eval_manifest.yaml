rubric:
- rule: Use TypeScript strict mode with extensive type safety. Types are fully inferred
    - never cast or annotate inferred values.
  source:
    path: AGENTS.md
    lines: 27-29
    commit: 0e0a2817c30011829a4fefbb7d3bdef1e710d3ef
- rule: Keep framework-agnostic core logic separated from React/Solid framework bindings.
  source:
    path: AGENTS.md
    lines: '28'
    commit: 0e0a2817c30011829a4fefbb7d3bdef1e710d3ef
- rule: Do not use browser-only APIs (window, document, localStorage) without environment
    checks - they throw on the server during SSR.
  source:
    path: packages/router-core/skills/router-core/ssr/SKILL.md
    lines: 281-296
    commit: 0e0a2817c30011829a4fefbb7d3bdef1e710d3ef
- rule: When SSR is enabled, code must work correctly in both environments - component
    hooks should return null on server when appropriate.
  source:
    path: packages/router-core/skills/router-core/ssr/SKILL.md
    lines: 8-10
    commit: 0e0a2817c30011829a4fefbb7d3bdef1e710d3ef
- rule: TypeScript strict mode with extensive type safety
  source:
    path: AGENTS.md
    lines: 16-16
  evidence: 'The gold solution explicitly adds type annotations to the new implementation,
    such as typing the component props as `{ resetKey: number }` and the ref as `React.useRef<string
    | undefined>(undefined)`.'
  category: style
distractors:
- rule: Framework-agnostic core logic separated from React/Solid bindings
  collision_type: architecture_boundary
  why_distracting: The agent might attempt to move the `onRendered` event emission
    or tracking logic into `@tanstack/router-core` to make it framework-agnostic.
    However, this specific fix inherently relies on React's rendering lifecycle (`useLayoutEffect`)
    to know when the subtree has committed, so it must remain in the React-specific
    `@tanstack/react-router` package.
  severity: high
  source:
    path: AGENTS.md
    lines: 17-17
- rule: 'Critical: Always run unit and type tests during development - do not proceed
    if they fail'
  collision_type: meta_confusion
  why_distracting: The existing test in `Scripts.test.tsx` explicitly asserts the
    presence of the empty `<script></script>` tag. If an agent strictly follows 'do
    not proceed if tests fail' without realizing the test expectation itself is now
    outdated and needs modification, it might revert a correct fix or get stuck trying
    to satisfy the old test.
  severity: high
  source:
    path: AGENTS.md
    lines: 50-50
hierarchy_analysis: The AGENTS.md file provides high-level architectural and testing
  guidelines. The instruction to maintain framework-agnostic core logic creates a
  boundary tension with the need to use React-specific lifecycle hooks for this particular
  bug. Additionally, the strict testing guardrails conflict with the necessity of
  updating an outdated test expectation.
version: '2.0'
