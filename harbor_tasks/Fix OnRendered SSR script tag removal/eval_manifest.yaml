rubric:
  - rule: "Use TypeScript strict mode with extensive type safety. Types are fully inferred - never cast or annotate inferred values."
    source:
      path: "AGENTS.md"
      lines: "27-29"
      commit: "0e0a2817c30011829a4fefbb7d3bdef1e710d3ef"

  - rule: "Keep framework-agnostic core logic separated from React/Solid framework bindings."
    source:
      path: "AGENTS.md"
      lines: "28"
      commit: "0e0a2817c30011829a4fefbb7d3bdef1e710d3ef"

  - rule: "Do not use browser-only APIs (window, document, localStorage) without environment checks - they throw on the server during SSR."
    source:
      path: "packages/router-core/skills/router-core/ssr/SKILL.md"
      lines: "281-296"
      commit: "0e0a2817c30011829a4fefbb7d3bdef1e710d3ef"

  - rule: "When SSR is enabled, code must work correctly in both environments - component hooks should return null on server when appropriate."
    source:
      path: "packages/router-core/skills/router-core/ssr/SKILL.md"
      lines: "8-10"
      commit: "0e0a2817c30011829a4fefbb7d3bdef1e710d3ef"
