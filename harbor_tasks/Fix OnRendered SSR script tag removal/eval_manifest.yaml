rubric:
  - rule: Use TypeScript strict mode with extensive type safety. Explicitly annotate
      function parameters and return types for public APIs and complex logic.
    source:
      path: AGENTS.md
      lines: 27-29
      commit: 0e0a2817c30011829a4fefbb7d3bdef1e710d3ef
  - rule: Keep framework-agnostic core logic separated from React/Solid framework bindings.
    source:
      path: AGENTS.md
      lines: '28'
      commit: 0e0a2817c30011829a4fefbb7d3bdef1e710d3ef
  - rule: Do not use browser-only APIs (window, document, localStorage) without environment
      checks - they throw on the server during SSR.
    source:
      path: packages/router-core/skills/router-core/ssr/SKILL.md
      lines: 281-296
      commit: 0e0a2817c30011829a4fefbb7d3bdef1e710d3ef
  - rule: When SSR is enabled, code must work correctly in both environments - component
      hooks should return null on server when appropriate.
    source:
      path: packages/router-core/skills/router-core/ssr/SKILL.md
      lines: 8-10
      commit: 0e0a2817c30011829a4fefbb7d3bdef1e710d3ef
  - rule: TypeScript strict mode with extensive type safety
    source:
      path: AGENTS.md
      lines: 16-16
    evidence: 'The gold solution explicitly adds type annotations to the new implementation,
      such as typing the component props as `{ resetKey: number }` and the ref as `React.useRef<string
      | undefined>(undefined)`.'
    category: style
distractors:
  - rule: Framework-agnostic core logic separated from React/Solid bindings
    collision_type: architecture_boundary
    why_distracting: The agent might attempt to move the `onRendered` event emission
      logic or the component itself into `@tanstack/router-core` to make it framework-agnostic.
      However, this fix relies heavily on React-specific lifecycle hooks (`useLayoutEffect`,
      `useRef`) and must remain in the React bindings package.
    severity: high
    source:
      path: AGENTS.md
      lines: 17-17
  - rule: 'Critical: Always run unit and type tests during development - do not proceed
      if they fail'
    collision_type: scope_ambiguity
    why_distracting: The agent might try to run the global `pnpm test:unit` or `pnpm
      test:types` commands as instructed by the 'Critical' rule, which could take excessive
      time or fail on unrelated packages in the monorepo, instead of using the granular
      Nx commands recommended later in the file.
    severity: medium
    source:
      path: AGENTS.md
      lines: 48-48
hierarchy_analysis: The AGENTS.md file provides a flat but extensive set of rules.
  The primary tension is between the general 'run all tests' directive and the highly
  specific Nx granular testing commands. The agent must prioritize the granular Nx
  commands to efficiently verify the fix in the monorepo.
version: '2.0'
