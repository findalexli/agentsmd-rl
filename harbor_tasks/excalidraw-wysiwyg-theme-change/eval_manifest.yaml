source_pr:
  owner: excalidraw
  repo: excalidraw
  pr_number: 10618
  title: "fix: update wysiwyg color on theme change"
  base_commit: 87faa5d3da055ea22c6bce261ee88087bf4cca0e
  merge_commit: cc6c29c0b9298653301a0d18b9c6511730e0b480

target_file: packages/excalidraw/wysiwyg/textWysiwyg.tsx

distinctive_line: "FIXME after we start emitting updates from Store for appState.theme"

checks:
  # Fail-to-pass tests (behavioral)
  - id: test_last_theme_variable_exists
    type: fail_to_pass
    origin: agent_config
    description: LAST_THEME variable must be defined to track theme state
    source:
      file: packages/excalidraw/wysiwyg/textWysiwyg.tsx
      pattern: "let LAST_THEME = app.state.theme"

  - id: test_last_theme_updated_in_style_function
    type: fail_to_pass
    origin: agent_config
    description: LAST_THEME must be updated at the start of updateWysiwygStyle
    source:
      file: packages/excalidraw/wysiwyg/textWysiwyg.tsx
      pattern: "LAST_THEME = app.state.theme"

  - id: test_onchange_emitter_subscription_exists
    type: fail_to_pass
    origin: agent_config
    description: Must subscribe to onChangeEmitter to detect theme changes
    source:
      file: packages/excalidraw/wysiwyg/textWysiwyg.tsx
      pattern: "app.onChangeEmitter.on"

  - id: test_unsub_onchange_cleanup_exists
    type: fail_to_pass
    origin: agent_config
    description: Must unsubscribe from onChangeEmitter in cleanup
    source:
      file: packages/excalidraw/wysiwyg/textWysiwyg.tsx
      pattern: "unsubOnChange()"

  - id: test_fixme_comment_present
    type: fail_to_pass
    origin: agent_config
    description: FIXME comment about Store updates for theme should be present
    source:
      file: packages/excalidraw/wysiwyg/textWysiwyg.tsx
      pattern: "FIXME after we start emitting updates from Store for appState.theme"

  # Pass-to-pass tests (repo CI/CD)
  - id: test_target_file_syntax_valid
    type: pass_to_pass
    origin: static
    description: Target file has valid syntax (balanced braces/parens)

  - id: test_wysiwyg_tests_pass
    type: pass_to_pass
    origin: repo_tests
    description: All WYSIWYG tests pass

  - id: test_repo_eslint
    type: pass_to_pass
    origin: repo_tests
    description: Repo CI - ESLint passes (yarn test:code)

  - id: test_repo_prettier
    type: pass_to_pass
    origin: repo_tests
    description: Repo CI - Prettier formatting passes (yarn test:other)

  - id: test_repo_app_smoke
    type: pass_to_pass
    origin: repo_tests
    description: Repo CI - App smoke test passes

rubric:
  - rule: "This is a code-only fix with no config/documentation changes required - rubric not applicable"
    weight: 1
    source:
      file: CLAUDE.md
