name = "dagster-s3-dynamic-output-brackets"
version = "1.0.0"
description = "Fix s3_pickle_io_manager to sanitize square brackets from dynamic output paths"
repository = "https://github.com/dagster-io/dagster"
pr_number = 33544
base_commit = "fe1beaad91470275c9fe30e0e12ef24d077cfa7b"
merge_commit = "46abb39ef2efdc9abd69b06348db99d54bd439c5"
language = "python"
difficulty = "easy"
tags = ["bugfix", "s3", "io-manager", "dynamic-outputs"]

[time_estimates]
setup = "3 min"
fix = "10 min"
test = "5 min"

[paths]
source = "/workspace/dagster"
logs = "/logs/verifier"

[tools]
required = ["git", "python", "pytest"]
