rubric:
- rule: Follow existing code patterns in the same module.
  source:
    path: AGENTS.md
    lines: 40-40
  evidence: 'The gold solution implements `memory_allocated`, `memory_reserved`, `mem_get_info`,
    and `empty_cache` in `CpuPlatform` with standard PyTorch-like signatures (returning
    `int` or `tuple[int, int]`) but '
  category: style
distractors:
- rule: 'Ask first before: ... Changing launcher or scheduler logic.'
  collision_type: rule_conflict
  why_distracting: The bug description explicitly identifies a problem in `areal/infra/scheduler/local.py`
    and asks for it to be fixed. The agent might get stuck trying to ask for permission
    using a tool instead of just fixing the bug.
  severity: high
  source:
    path: AGENTS.md
    lines: 45-49
- rule: Add tests for new functionality.
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to write unit or integration tests for
    the CPU platform fixes. However, the gold solution treats this as a bug fix and
    does not add tests, avoiding the complexity of mocking distributed/engine environments
    for CPU.
  severity: medium
  source:
    path: AGENTS.md
    lines: 41-41
- rule: Composition over inheritance -- keep hierarchies <= 2 levels; prefer delegation.
  collision_type: architecture_boundary
  why_distracting: The bug states that the base `Platform` class delegates unknown
    attributes to `torch.<device_type>`. An agent strictly following 'prefer delegation'
    might try to build a complex delegation wrapper for `torch.cpu` in the base class
    rather than simply overriding the missing methods directly in the `CpuPlatform`
    subclass.
  severity: medium
  source:
    path: AGENTS.md
    lines: 75-75
hierarchy_analysis: '`CLAUDE.md` and `AGENTS.md` are both Level 0 and contain overlapping
  rules. `AGENTS.md` provides more specific operational constraints (like ''Ask first
  before: Changing launcher or scheduler logic''). The conflict between the explicit
  bug instruction to fix the scheduler and the `AGENTS.md` rule to ''Ask first'' is
  the most critical interaction.'
