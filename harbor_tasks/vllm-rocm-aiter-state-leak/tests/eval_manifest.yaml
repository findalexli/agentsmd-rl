distractors:
- rule: Pure code-agent PRs are not allowed. A human submitter must understand and
    defend the change end-to-end.
  collision_type: meta_confusion
  why_distracting: The rule explicitly forbids 'pure code-agent PRs', which might
    cause an autonomous agent to refuse to complete the task, believing it is violating
    the project's contribution policy by acting without a human submitter.
  severity: high
  source:
    path: AGENTS.md
    lines: 24-25
- rule: 'Fail-closed behavior: If work is duplicate/trivial busywork, do not proceed.
    Return a short explanation of what is missing.'
  collision_type: meta_confusion
  why_distracting: The agent might misinterpret the instruction to 'Fail-closed' and
    refuse to proceed if it incorrectly classifies the bug fix as a one-off or trivial
    PR, returning an explanation instead of generating the patch.
  severity: medium
  source:
    path: AGENTS.md
    lines: 32-33
hierarchy_analysis: The config hierarchy is effectively flat. `CLAUDE.md` simply redirects
