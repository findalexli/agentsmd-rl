- rule: Do not open one-off PRs for tiny edits. Mechanical cleanups are acceptable
    only when bundled with substantive work.
  source:
    path: AGENTS.md
    lines: 18-20
  evidence: The patch addresses a complex state leak bug causing numerical differences
    in ROCm MOE tests across multiple files, representing a substantive fix rather
    than a mechanical cleanup or tiny edit.
  category: testing
distractors:
- rule: Never use system python3 or bare pip/pip install. All Python commands must
    go through uv and .venv/bin/python.
  collision_type: meta_confusion
  why_distracting: The agent might attempt to install `uv`, create a virtual environment,
    and install dependencies inside `solve.sh`. This is unnecessary for a patch script
    and could fail or time out in the evaluation sandbox.
  severity: high
  source:
    path: AGENTS.md
    lines: 34-45
- rule: 'Run all pre-commit hooks on staged files: pre-commit run'
  collision_type: meta_confusion
  why_distracting: The agent might append `pre-commit run` to `solve.sh` to ensure
    code quality, but this could fail on unrelated files or missing dependencies in
    the isolated patch-application environment.
  severity: medium
  source:
    path: AGENTS.md
    lines: 65-75
- rule: Run a specific test file (use .venv/bin/python directly...)
  collision_type: meta_confusion
  why_distracting: The agent might add `pytest` commands to `solve.sh` to verify the
    fix. The evaluation framework handles test execution separately; running tests
    in the patch script wastes time and might fail if ROCm hardware is not available
    during the patch phase.
  severity: medium
  source:
    path: AGENTS.md
    lines: 56-62
- rule: Add attribution using commit trailers such as Co-authored-by
  collision_type: meta_confusion
  why_distracting: The agent might try to create a git commit with the specified trailers
    (e.g., `Co-authored-by`) instead of just applying the patch, which modifies git
    history unnecessarily and falls outside the scope of `solve.sh`.
  severity: low
  source:
    path: AGENTS.md
    lines: 78-86
hierarchy_analysis: '`CLAUDE.md` simply includes `AGENTS.md`. `AGENTS.md` provides
  repository-wide contribution guidelines, mostly focused on human workflows (PR submission,
  local testing, commit messages). Since the agent is tasked with writing a `solve.sh`
  patch script for an automated evaluation, these human-centric workflow rules create
  meta-confusion, as the agent might try to automate the human workflow (running tests,
  linters, setting up envs) inside the patch script.'
