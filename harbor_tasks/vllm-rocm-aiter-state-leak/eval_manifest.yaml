version: "2.0"

source:
  repo: "vllm-project/vllm"
  pr: 20255
  base_commit: "0aac2048bf3a7e60eaddf1ebcb4165ed777eb8ff"
  merge_commit: "6cc1e7d96dab6b9c344ec87dec6dc9ab07ad5d21"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "All three modified files must parse without errors"

  - id: rocm_env_setup_not_gated_on_use_rocm_aiter
    type: fail_to_pass
    origin: pr_diff
    description: "AITER env-var setup runs for all ROCm cases, not just use_rocm_aiter=True"

  - id: cleanup_calls_refresh_env_variables
    type: fail_to_pass
    origin: pr_diff
    description: "cleanup_dist_env_and_memory calls refresh_env_variables() to reset AITER state"

  - id: routing_simulator_no_direct_dict_mutation
    type: fail_to_pass
    origin: pr_diff
    description: "test_routing_strategy_integration does not directly mutate environment_variables dict"

  - id: cleanup_retains_existing_calls
    type: pass_to_pass
    origin: pr_diff
    description: "cleanup_dist_env_and_memory still calls disable_envs_cache() and gc.unfreeze()"

  - id: aiter_env_var_names_present
    type: pass_to_pass
    origin: pr_diff
    description: "Test file still references both VLLM_ROCM_USE_AITER and VLLM_ROCM_USE_AITER_MOE"

  - id: cleanup_not_stub
    type: pass_to_pass
    origin: static
    description: "cleanup_dist_env_and_memory has meaningful code, not emptied out"

rubric:
  # AGENTS.md and CLAUDE.md at base commit contain only process/workflow/tooling rules
  # (duplicate-work checks, uv usage, commit trailers, pre-commit hooks).
  # None are evaluable from a code diff alone.
  []
