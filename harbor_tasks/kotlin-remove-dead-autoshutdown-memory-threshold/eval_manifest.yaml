- rule: 'FIR prefix: When changes are mostly related to FIR (`compiler/fir/`), use
    `FIR: ` prefix in the commit subject line.'
  collision_type: scope_ambiguity
  why_distracting: 'The file being edited is in `compiler/daemon/`, not `compiler/fir/`.
    An agent might see the file is under `compiler/` and mistakenly apply the `FIR:
    ` prefix to the commit message.'
  severity: medium
  source:
    path: compiler/AGENTS.md
    lines: 24-24
- rule: 'Test-before-fix: When fixing an issue and adding a test, commit the test
    data as a separate commit before the fix.'
  collision_type: scope_ambiguity
  why_distracting: This is a dead code removal task, not a bug fix that requires new
    test data. An agent might try to create a test for the removed functionality or
    split the changes into multiple commits unnecessarily.
  severity: low
  source:
    path: compiler/AGENTS.md
    lines: 25-26
hierarchy_analysis: The hierarchy includes root-level CLAUDE.md and AGENTS.md, which
  are extended by compiler/CLAUDE.md and compiler/AGENTS.md. The rules in compiler/AGENTS.md
  are specific to compiler architecture (FIR, IR) and commit guidelines. The root
  CLAUDE.md contains a meta-rule about updating memory. The task modifies compiler/daemon/,
  which falls under the compiler/ directory but is not part of the FIR frontend (compiler/fir/),
  meaning the FIR-specific commit and testing rules in compiler/AGENTS.md do not apply.
