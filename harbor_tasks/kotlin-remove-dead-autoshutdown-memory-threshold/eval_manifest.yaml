- rule: When asked to update memory, you must update `./.claude/CLAUDE.md` if it is
    not specified that another file should be modified.
  collision_type: meta_confusion
  why_distracting: The task involves removing 'memory threshold' code. An agent might
    trigger on the keyword 'memory' and incorrectly attempt to update the agent's
    memory file (CLAUDE.md) instead of just modifying the Kotlin source files.
  severity: high
  source:
    path: CLAUDE.md
