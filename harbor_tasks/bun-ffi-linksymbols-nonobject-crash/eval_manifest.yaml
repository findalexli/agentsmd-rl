version: "2.0"

source:
  repo: "oven-sh/bun"
  pr: 28359
  base_commit: "0de7a806d108a56a2c9f87d5974c52384059c397"
  merge_commit: "8f0fd0cf1da17fff23df7133e414cdd1f5ed917e"

checks:
  - id: zig_file_has_required_functions
    type: pass_to_pass
    origin: static
    description: "ffi.zig exists and contains required function signatures (FFI struct, generateSymbols, generateSymbolForFunction, etc.)"

  - id: nonobject_value_rejected_in_generate_symbols
    type: fail_to_pass
    origin: pr_diff
    description: "generateSymbols checks isObject (or equivalent) before calling generateSymbolForFunction"

  - id: nonobject_rejection_returns_type_error
    type: fail_to_pass
    origin: pr_diff
    description: "Non-object values produce a proper TypeError, not a silent skip or panic"

  - id: arg_types_freed_on_error_paths
    type: fail_to_pass
    origin: pr_diff
    description: "Error paths in print/open/linkSymbols deinit arg_types to prevent memory leak"

  - id: core_ffi_functions_intact
    type: pass_to_pass
    origin: repo_tests
    description: "Core FFI functions and existing null-check validation still present"

  - id: generate_symbol_for_function_not_stub
    type: pass_to_pass
    origin: repo_tests
    description: "generateSymbolForFunction still contains core processing logic"

  - id: no_prohibited_std_apis
    type: pass_to_pass
    origin: agent_config
    description: "New code does not use prohibited std.* APIs where bun.* exists"
    source:
      path: "src/CLAUDE.md"
      lines: "16"
      commit: "0de7a806d108a56a2c9f87d5974c52384059c397"

  - id: no_inline_imports_in_new_code
    type: pass_to_pass
    origin: agent_config
    description: "New code does not add @import() inline inside function bodies"
    source:
      path: "src/CLAUDE.md"
      lines: "11"
      commit: "0de7a806d108a56a2c9f87d5974c52384059c397"

rubric:
  - rule: "Use defer for cleanup in Zig code — be careful with allocators and ensure resources are freed on all paths."
    source:
      path: "CLAUDE.md"
      lines: "232"
      commit: "0de7a806d108a56a2c9f87d5974c52384059c397"
