source_pr:
  owner: dagster-io
  repo: dagster
  number: 33362
  merge_commit: d70d900d13b97702997ad6af7429ad7d0d1c8321
  base_commit: bff96c1a777298c1bf027e7eb1cedb556ddbe2ee

task:
  name: dagster-k8s-utf8-decode
  title: Fix UTF-8 decoding when sequences span k8s log chunks
  description: |
    The _process_log_stream function in dagster_k8s/pipes.py fails when multi-byte
    UTF-8 characters are split across k8s log chunks. This causes UnicodeDecodeError
    or corrupted output when log messages contain non-ASCII characters.

    The fix requires using an incremental UTF-8 decoder (codecs.getincrementaldecoder)
    that can handle partial character sequences across chunk boundaries.

  target_files:
    - python_modules/libraries/dagster-k8s/dagster_k8s/pipes.py

  distinctiveness: "incrementaldecoder"

agent_config:
  - check_id: ruff_check
    description: "Code passes make ruff formatting/linting (per CLAUDE.md)"
    origin: agent_config
    source:
      file: CLAUDE.md
      lines: "CRITICAL: After ANY Python code changes, ALWAYS run `make ruff`"

  - check_id: use_record_decorator
    description: "Use @record decorator instead of @dataclass for data structures"
    origin: agent_config
    source:
      file: CLAUDE.md
      lines: "ALWAYS check this before writing data structures - use @record instead of @dataclass"

  - check_id: uv_for_pip
    description: "Use uv instead of pip for package management"
    origin: agent_config
    source:
      file: CLAUDE.md
      lines: "Always use uv instead of pip"

checks:
  - id: test_utf8_ellipsis_two_chunks
    description: "UTF-8 ellipsis character split across two chunks decodes correctly"
    type: behavioral
    points: 15

  - id: test_utf8_ellipsis_three_chunks
    description: "UTF-8 ellipsis character split across three chunks decodes correctly"
    type: behavioral
    points: 10

  - id: test_emoji_split
    description: "4-byte UTF-8 sequences (emoji) split across chunks decode correctly"
    type: behavioral
    points: 15

  - id: test_japanese_chars_split
    description: "Japanese characters split at chunk boundary decode correctly"
    type: behavioral
    points: 10

  - id: test_invalid_bytes_handled
    description: "Invalid UTF-8 bytes are replaced with replacement character"
    type: behavioral
    points: 10

  - id: test_incomplete_sequence_handled
    description: "Incomplete UTF-8 sequence at stream end is handled gracefully"
    type: behavioral
    points: 5

  - id: test_single_line
    description: "Single complete log line parses correctly"
    type: behavioral
    points: 5

  - id: test_multiple_lines_chunk
    description: "Multiple log lines in one chunk parse correctly"
    type: behavioral
    points: 5

  - id: test_continuation_line
    description: "Lines without timestamps are treated as continuations"
    type: behavioral
    points: 5

  - id: test_same_timestamp_lines
    description: "Multiple lines with same timestamp handled correctly"
    type: behavioral
    points: 5

  - id: test_many_small_chunks
    description: "Many small chunks don't break parsing"
    type: behavioral
    points: 5

  - id: test_mixed_ascii_unicode
    description: "Mixed ASCII and unicode split across chunks works"
    type: behavioral
    points: 5

  # Pass-to-pass checks: repo CI tests that must pass on both base and after fix
  - id: test_dagster_k8s_unit_tests
    description: "dagster-k8s unit tests pass"
    type: pass_to_pass
    origin: repo_tests

  - id: test_dagster_k8s_pipes_module_tests
    description: "dagster-k8s pipes module unit tests pass"
    type: pass_to_pass
    origin: repo_tests

  - id: test_dagster_k8s_imports_cleanly
    description: "dagster-k8s module imports without errors"
    type: pass_to_pass
    origin: repo_tests

rubric: []
