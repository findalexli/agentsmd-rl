version: "2.0"

source:
  repo: "astral-sh/ruff"
  pr: 24390
  base_commit: "5ac54ec2a708b46ec964465ce5d09cb9b80a3dc2"
  merge_commit: "23364ae6a52b47c855db63c203893325a9aab1fa"

checks:
  - id: cargo_check
    type: pass_to_pass
    origin: static
    description: "The crate must compile without errors"

  - id: no_panic_on_null_terminated_encode
    type: fail_to_pass
    origin: pr_diff
    description: "ruff must not panic when UP012 encounters strings ending in octal escapes like \\0"

  - id: octal_named_escape_no_false_positive
    type: fail_to_pass
    origin: pr_diff
    description: "UP012 must not false-positive on strings with \\000 followed by \\N{name} escapes"

  - id: varied_octal_endings_no_crash
    type: fail_to_pass
    origin: pr_diff
    description: "ruff must not crash on various short octal escapes at end of string"

  - id: up012_snapshot_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Upstream UP012 snapshot tests must pass"

  - id: repo_cargo_clippy
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's cargo clippy passes on ruff_linter package"

  - id: repo_pyupgrade_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's pyupgrade rule tests pass"

  - id: no_unwrap_or_panic
    type: pass_to_pass
    origin: agent_config
    description: "No panic!(), unreachable!(), or .unwrap() in the rule file"
    source:
      path: "AGENTS.md"
      lines: "79"
      commit: "5ac54ec2a708b46ec964465ce5d09cb9b80a3dc2"

  - id: rust_imports_at_top
    type: pass_to_pass
    origin: agent_config
    description: "Rust imports must be at top of file, not inside functions"
    source:
      path: "AGENTS.md"
      lines: "76"
      commit: "5ac54ec2a708b46ec964465ce5d09cb9b80a3dc2"

rubric:
  - rule: "Follow existing code style. Check neighboring files for patterns."
    source:
      path: "AGENTS.md"
      lines: "75"
      commit: "5ac54ec2a708b46ec964465ce5d09cb9b80a3dc2"
  - rule: "Use comments purposefully. Don't use comments to narrate code, but do use them to explain invariants and why something unusual was done a particular way."
    source:
      path: "AGENTS.md"
      lines: "82"
      commit: "5ac54ec2a708b46ec964465ce5d09cb9b80a3dc2"
