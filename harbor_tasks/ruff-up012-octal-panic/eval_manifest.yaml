    lines: 63-64
  evidence: The gold solution adds test cases specifically targeting the bug (including the `$IMURAW\0` string and `\000\N{DIGIT ONE}`) to verify the fix.
  category: testing
- rule: Look to see if your tests could go in an existing file before adding a new file for your tests.
  source:
    path: AGENTS.md
    lines: 64-65
  evidence: The gold solution appends the new regression test cases to the existing `crates/ruff_linter/resources/test/fixtures/pyupgrade/UP012.py` file rather than creating a new dedicated test file for the issu
  category: testing
distractors:
- rule: Try hard to avoid patterns that require `panic!`, `unreachable!`, or `.unwrap()`. Instead, try to encode those constraints in the type system. Don't be afraid to write code that's more verbose or requires largeish refactors...
  collision_type: scope_ambiguity
  why_distracting: The instruction asks to fix a panic. The rule suggests avoiding panics by encoding constraints in the type system and encourages 'largeish refactors' to do so. An agent might attempt to heavily refactor the `Cursor` or `StringLiteral` types to make invalid states unrepresentable, which is out of scope and would overcomplicate this localized parsing bug fix.
  severity: medium
  source:
    path: AGENTS.md
    lines: 69-70
- rule: Avoid writing significant amounts of new code. This is often a sign that we're missing an existing method or mechanism... Look for existing utilities first.
  collision_type: scope_ambiguity
  why_distracting: The agent might interpret the manual parsing and cursor manipulation as 'significant amounts of new code' and waste time searching for a non-existent Ruff-specific utility for octal escape sequence parsing, rather than just using the standard library `u8::from_str_radix` and `saturating_sub`.
  severity: low
  source:
    path: AGENTS.md
    lines: 68-69
hierarchy_analysis: The configuration is effectively a flat single file, as CLAUDE.md simply includes AGENTS.md. The rules are generic repository guidelines.
