distractors:
- rule: Don't be afraid to write code that's more verbose or requires largeish refactors
    if it enables you to avoid these unsafe calls.
  collision_type: scope_ambiguity
  why_distracting: The bug involves a panic caused by incorrect cursor advancement
    and parsing. The rule encourages 'largeish refactors' to encode constraints in
    the type system to avoid panics. An agent might attempt to completely rewrite
    the escape sequence parser to be type-safe, whereas the gold solution demonstrates
    that a localized fix using `from_str_radix` and `saturating_sub` is the correct,
    scoped approach.
  severity: medium
  source:
    path: AGENTS.md
    lines: 69-71
- rule: When working on ty, PR titles should start with `[ty]` and be tagged with
    the `ty` GitHub label.
  collision_type: meta_confusion
  why_distracting: The repository contains both `ruff` and `ty` projects. Because
    the instructions heavily feature `ty` examples (like `ty_python_semantic`), an
    agent might mistakenly assume this PR falls under the `ty` ecosystem and attempt
    to apply `ty`-specific conventions or run `ty` test commands, even though the
    issue is strictly within `ruff_linter`.
  severity: low
  source:
    path: AGENTS.md
    lines: 59-60
hierarchy_analysis: The configuration consists of a single substantive file (`AGENTS.md`)
  loaded via `CLAUDE.md`. The rules are flat, but there is a clear division between
