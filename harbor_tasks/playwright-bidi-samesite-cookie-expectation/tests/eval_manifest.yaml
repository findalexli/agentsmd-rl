distractors:
- rule: 'Decision rule: Just needs page + server → tests/page/'
  collision_type: scope_ambiguity
  why_distracting: The test signature destructures `page` and `server` (along with
    primitive fixtures like `browserName` and `isBidi`), but not `context` or `browser`
    directly. An agent reading the simplified decision rule might attempt to move
    the test to `tests/page/`, which is out of scope and incorrect since the test
    explicitly tests context-level cookie behavior.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 68-75
