    type: pass_to_pass
    origin: static
    description: "Modified TypeScript spec file is non-empty with balanced braces"

  - id: isBidi_in_test_signature
    type: fail_to_pass
    origin: pr_diff
    description: "The SameSite set-cookie test must include isBidi in its fixture destructuring"

  - id: bidi_cookie_rejection_condition
    type: fail_to_pass
    origin: pr_diff
    description: "Cookie rejection condition for SameSite=None must OR-combine isBidi with chromium"

  - id: bidi_expectation_removed
    type: fail_to_pass
    origin: pr_diff
    description: "BiDi expectations file must not list this test as failing"

  - id: condition_is_not_narrowed
    type: pass_to_pass
    origin: static
    description: "Existing Chromium and webkit cookie conditions must remain intact"

  - id: test_repo_build
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's build step completes successfully"

  - id: test_repo_eslint
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ESLint linting passes"

  - id: test_repo_tsc
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's TypeScript type check passes"

  - id: test_repo_check_deps
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's dependency check passes"

  - id: test_repo_lint_packages
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's package linting passes"

  - id: test_repo_test_types
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's test types check passes"

rubric:
  - rule: "Code changes must pass the repository's lint checks (eslint, tsc, check-deps, lint-packages, test-types) without errors."
    source:
      path: "CLAUDE.md"
      lines: "52-58, 108"
      commit: "5435c64f6d14293b2ce0dcdbfaa237b015bfd63e"
    reference: "isBidi parameter added to test signature; (browserName === 'chromium' || isBidi) && value === 'None' condition added"

  - rule: "Tests using browser/context/browserType fixtures must be placed in tests/library/ (not tests/page/)."
    source:
      path: "CLAUDE.md"
      lines: "83-88"
      commit: "5435c64f6d14293b2ce0dcdbfaa237b015bfd63e"
    reference: "browsercontext-fetch.spec.ts in tests/library/ modified; expectation removed from tests/bidi/expectations/"
