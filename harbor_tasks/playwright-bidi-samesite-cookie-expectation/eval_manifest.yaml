  category: architecture
distractors:
- rule: 'Decision rule: Just needs `page` + `server` → `tests/page/`'
  collision_type: scope_ambiguity
  why_distracting: The decision rule states 'Just needs `page` + `server` → `tests/page/`'.
    The modified test destructures `page` and `server` (along with other fixtures),
    which might lead an agent to incorrectly move the test to `tests/page/` instead
    of keeping it in `tests/library/` where cookie/browser-specific tests belong.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 74-74
- rule: Use `npm run ctest <filter>` for Chromium only library tests during development.
  collision_type: meta_confusion
  why_distracting: The config recommends using `npm run ctest` during development
    for library tests. However, `ctest` only runs Chromium tests. Since this issue
    is specifically about Firefox/BiDi behavior, following this rule to test the fix
    would fail to verify the BiDi behavior and could lead the agent to think the issue
    is already resolved or un-reproducible.
  severity: high
  source:
    path: CLAUDE.md
    lines: 50-56
- rule: Key fixtures for `tests/library/` are `browser`, `context`, `browserType`.
  collision_type: rule_conflict
  why_distracting: The table lists `browser`, `context`, `browserType` as the key
    fixtures for `tests/library/`. An agent might try to refactor the test to use
    these fixtures instead of the existing `page`, `server`, `browserName`, and `isBidi`
    fixtures, unnecessarily expanding the scope of the PR and potentially breaking
    the test's logic.
  severity: low
  source:
    path: CLAUDE.md
    lines: 65-72
hierarchy_analysis: 'Only a single root `CLAUDE.md` file is provided, so there are
  no cross-file hierarchy conflicts. However, there is internal tension within the
  file regarding test placement: the strict fixture-based decision rule (page+server
  -> tests/page) conflicts with the feature-based directory purpose (cookies -> tests/library).'
