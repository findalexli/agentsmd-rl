id: continue-winston-stderr-ipc-fix
source_pr: continuedev/continue#11914
base_commit: a3dbeb346b4f9e7384b78c62b4f0f3074acfc42d
merge_commit: 294ba934db529ea05e88ea473943792c625c5022
title: "fix: redirect Winston logger to stderr to prevent IPC stream corruption + fix binary tests"
description: |
  This PR fixes two issues:
  1. Winston's Console transport writes directly to process.stdout, which corrupts
     the \r\n-delimited JSON IPC stream between the binary and JetBrains plugin.
     Redirected all Winston log levels to stderr instead.
  2. Fixed binary tests by replacing ReverseMessageIde with BinaryIdeHandler that
     responds with plain data matching the Kotlin CoreMessenger format, added
     response unwrapping for test assertions, and updated stale test expectations.

checks:
  - id: winston_stderr_levels_config
    type: f2p
    description: "Winston Console transport must use stderrLevels to redirect logs to stderr"
    test: test_winston_stderr_levels_config

  - id: logger_no_stdout_corruption
    type: p2p
    description: "Logger should not use default stdout transport that corrupts IPC"
    test: test_logger_no_stdout_corruption

  - id: binary_ide_handler_exists
    type: f2p
    description: "BinaryIdeHandler class must be defined to handle IDE messages from binary"
    test: test_binary_ide_handler_exists

  - id: binary_ide_handler_handlers
    type: p2p
    description: "BinaryIdeHandler must have all required IDE method handlers"
    test: test_binary_ide_handler_handlers

  - id: request_helper_exists
    type: f2p
    description: "request() helper must be defined to unwrap binary responses"
    test: test_request_helper_exists

  - id: tests_use_request_helper
    type: p2p
    description: "Tests must use the request() helper instead of direct messenger.request()"
    test: test_tests_use_request_helper

  - id: subprocess_stderr_handler
    type: p2p
    description: "Must add stderr handler to subprocess for debugging output"
    test: test_subprocess_stderr_handler

  - id: binary_ide_handler_instantiation
    type: p2p
    description: "BinaryIdeHandler must be instantiated in beforeAll hook"
    test: test_binary_ide_handler_instantiation

  - id: jest_timeout_set
    type: p2p
    description: "jest.setTimeout(30000) must be set for binary tests"
    test: test_jest_timeout_set

  - id: core_typescript_compiles
    type: f2p
    description: "Core TypeScript code must compile without errors"
    test: test_core_typescript_compiles

  - id: binary_typescript_compiles
    type: f2p
    description: "Binary TypeScript test code must compile without errors"
    test: test_binary_typescript_compiles

  # Pass-to-pass tests (repo CI/CD checks)
  - id: repo_prettier_check
    type: p2p
    origin: repo_tests
    description: "Prettier format check must pass on repo codebase"
    test: test_repo_prettier_check

  - id: core_lint
    type: p2p
    origin: repo_tests
    description: "Core ESLint checks must pass"
    test: test_core_lint

  - id: core_unit_tests
    type: p2p
    origin: repo_tests
    description: "Core unit tests must pass (excluding API-dependent tests)"
    test: test_core_unit_tests

agent_config:
