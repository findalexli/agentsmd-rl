rubric:
- rule: 'Test Placement: Non-CI, manual verification tests must be placed in the test/manual/
    directory.'
  source:
    path: .claude/skills/write-sglang-test/SKILL.md
    lines: '383'
  source_text: '├── manual/              # Non-CI: debugging, one-off, manual verification'
  evidence: The gold diff explicitly follows this directory convention by moving three
    manual 8-GPU model test files (test_deepseek_v31.py, test_glm_46_fp8.py, test_qwen3_235b.py)
    out of the CI-discovered test/registered/ directory and into the test/manual/
    directory.
  category: testing
  verification: llm_judge
- rule: Place non-CI tests (debugging, one-off, manual verification) in `test/manual/`.
  source:
    path: .claude/skills/write-sglang-test/SKILL.md
    lines: 383-396
  source_text: '├── manual/              # Non-CI: debugging, one-off, manual verification

    └── run_suite.py         # CI runner (scans registered/ plus jit_kernel test/benchmark
    files)


    python/sglang/jit_kernel/

    ├── tests/               # JIT kernel correctness tests (CI-discovered by test/run_suite.py)

    └── benchmark/           # JIT kernel benchmarks (CI-discovered by test/run_suite.py)

    ```


    **Decision rule** (see also `test/registered/README.md`):

    - Component logic, no server → `registered/unit/`

    - JIT kernel correctness / benchmarks → `python/sglang/jit_kernel/tests/` or `python/sglang/jit_kernel/benchmark/`

    - Other kernel correctness → `registered/kernels/`

    - Server needed → `registered/<category>/`

    - Local debugging → `manual/`'
  evidence: The gold diff correctly renames tests (test_deepseek_v31.py, test_glm_46_fp8.py,
    test_qwen3_235b.py) from test/registered/8-gpu-models/ to test/manual/ while simultaneously
    removing their CI registration, strictly adhering to the architectural boundary
    that non-CI tests must be placed in test/manual/.
  category: architecture
  verification: llm_judge
distractors:
- rule: Always use CustomTestCase — never raw unittest.TestCase.
  source:
    path: .claude/skills/write-sglang-test/SKILL.md
    lines: '12'
  source_text: 1. **Always use `CustomTestCase`** — never raw `unittest.TestCase`.
    It ensures `tearDownClass` runs even when `setUpClass` fails, preventing resource
    leaks in CI.
  collision_type: scope_ambiguity
  why_distracting: The test files modified in the PR currently use raw unittest.TestCase.
    An agent reading this rule might incorrectly attempt to refactor these classes
    to inherit from CustomTestCase. However, since these tests are explicitly being
    moved to the manual/ directory to run locally and outside of CI, the strict CI
    resource leak protections do not apply.
  severity: medium
- rule: Place tests in test/registered/<category>/
  source:
    path: .claude/skills/write-sglang-test/SKILL.md
    lines: '14'
  source_text: 3. **Place tests in `test/registered/<category>/`** — except JIT kernel
    tests and benchmarks, which live in `python/sglang/jit_kernel/tests/` and `python/sglang/jit_kernel/benchmark/`
    (nested subfolders are allowed)
  collision_type: rule_conflict
  why_distracting: The gold diff explicitly moves tests out of test/registered/ and
    into test/manual/ in order to remove them from the automated CI pipeline. An agent
    might encounter this general testing rule and mistakenly believe that all tests
    must reside in the registered/ directory, incorrectly moving them back or placing
    new manual tests there.
  severity: high
- rule: Every CI-discovered test file must call a registration function at module
    level
  source:
    path: .claude/skills/write-sglang-test/SKILL.md
    lines: '310'
  source_text: 'Every CI-discovered test file must call a registration function at
    module level:'
  collision_type: scope_ambiguity
  why_distracting: The PR removes the register_cuda_ci function calls precisely because
    the tests are being moved to test/manual/ and are no longer meant to be discovered
    by the CI suite runner. An agent might read this rule, recognize that the files
    are tests, and incorrectly attempt to preserve or re-add the CI registration function
    call.
  severity: high
