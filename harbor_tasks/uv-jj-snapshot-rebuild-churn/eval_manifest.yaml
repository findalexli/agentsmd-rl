version: "2.0"

source:
  repo: "astral-sh/uv"
  pr: 18685
  base_commit: "cde48c8ac8eb13e8eff5cfb5c9fc39dad69c4f19"
  merge_commit: "264b63e8e078d3ed9363937a47eff13cd7d81c3c"

checks:
  - id: build_rs_exists
    type: pass_to_pass
    origin: static
    description: "build.rs exists and contains commit_info function"

  - id: jj_early_return
    type: fail_to_pass
    origin: pr_diff
    description: "commit_info checks for .jj directory and returns/guards before git operations"

  - id: jj_code_added_to_diff
    type: fail_to_pass
    origin: pr_diff
    description: "Agent modified build.rs to add .jj handling (diff contains .jj additions)"

  - id: git_functionality_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "Existing git detection, commands, env vars, and rerun directives remain intact"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "commit_info function has substantial body (not a trivial stub)"

  - id: no_panic_unwrap_unsafe_in_new_code
    type: pass_to_pass
    origin: agent_config
    description: "New code avoids .unwrap(), panic!, unreachable!, and unsafe per CLAUDE.md:7"
    source:
      path: "CLAUDE.md"
      lines: "7"
      commit: "cde48c8ac8eb13e8eff5cfb5c9fc39dad69c4f19"

  - id: descriptive_variable_names
    type: pass_to_pass
    origin: agent_config
    description: "New code uses descriptive variable names per CLAUDE.md:17"
    source:
      path: "CLAUDE.md"
      lines: "17"
      commit: "cde48c8ac8eb13e8eff5cfb5c9fc39dad69c4f19"

  - id: prefer_expect_over_allow
    type: pass_to_pass
    origin: agent_config
    description: "New code uses #[expect()] not #[allow()] for clippy suppression per CLAUDE.md:10"
    source:
      path: "CLAUDE.md"
      lines: "10"
      commit: "cde48c8ac8eb13e8eff5cfb5c9fc39dad69c4f19"

rubric:
  - rule: "PREFER patterns like `if let` to handle fallibility"
    source:
      path: "CLAUDE.md"
      lines: "8"
      commit: "cde48c8ac8eb13e8eff5cfb5c9fc39dad69c4f19"

  - rule: "ALWAYS write `SAFETY` comments following our usual style when writing `unsafe` code"
    source:
      path: "CLAUDE.md"
      lines: "9"
      commit: "cde48c8ac8eb13e8eff5cfb5c9fc39dad69c4f19"

  - rule: "PREFER let chains (`if let` combined with `&&`) over nested `if let` statements"
    source:
      path: "CLAUDE.md"
      lines: "11"
      commit: "cde48c8ac8eb13e8eff5cfb5c9fc39dad69c4f19"

  - rule: "PREFER top-level imports over local imports or fully qualified names"
    source:
      path: "CLAUDE.md"
      lines: "16"
      commit: "cde48c8ac8eb13e8eff5cfb5c9fc39dad69c4f19"
