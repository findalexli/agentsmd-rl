rubric:
- rule: AVOID shortening variable names, e.g., use `version` instead of `ver`
  source:
    path: crates/uv-cli/build.rs
    lines: 33-36
  evidence: The gold solution uses the descriptive variable name `jj_dir` instead
    of a shortened version like `jjd` or `jj`.
  category: naming
- rule: AVOID using `panic!`, `unreachable!`, `.unwrap()`, unsafe code, and clippy
    rule ignores
  source:
    path: crates/uv-cli/build.rs
    lines: 33-36
  evidence: The gold solution safely checks the directory existence using `.exists()`
    and returns early, avoiding any `.unwrap()` or `panic!` calls.
  category: style
distractors:
- rule: ALWAYS attempt to add a test case for changed behavior / PREFER integration
    tests
  collision_type: architecture_boundary
  why_distracting: Testing `build.rs` rerun-if-changed behavior based on the presence
    of a `.jj` directory is extremely difficult and crosses the boundary between build-time
    and test-time execution. The agent might waste significant effort trying to mock
    a workspace or parse cargo build output to satisfy this rule.
  severity: high
  source:
    path: CLAUDE.md
    lines: 2-3
hierarchy_analysis: The config is a flat single file (CLAUDE.md). The main challenge
  is knowing when to ignore the strict 'ALWAYS attempt to add a test case' rule due
  to the architectural difficulty of testing build scripts.
