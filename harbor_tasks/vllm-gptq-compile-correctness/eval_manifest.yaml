rubric:
- rule: No low-value busywork PRs
  source:
    path: AGENTS.md
    lines: 21-22
  evidence: The gold solution implements a substantive fix for a flaky test and uninitialized
    memory bug on ROCm, rather than a trivial mechanical cleanup, aligning with the
    requirement to avoid low-value busywor
  category: testing
distractors:
- rule: Pure code-agent PRs are not allowed
  collision_type: meta_confusion
  why_distracting: The agent is operating in an autonomous evaluation sandbox. If
    it follows the rule that 'Pure code-agent PRs are not allowed', it will refuse
    to generate the patch, incorrectly failing the evaluation.
  severity: high
  source:
    path: AGENTS.md
    lines: 25-27
- rule: Duplicate-work checks using gh CLI
  collision_type: meta_confusion
  why_distracting: The agent might attempt to run `gh` commands in the `solve.sh`
    script or refuse to proceed because it lacks internet access to check for duplicate
    PRs.
  severity: medium
  source:
    path: AGENTS.md
    lines: 11-18
- rule: Never use system python3 or bare pip; use uv
  collision_type: meta_confusion
  why_distracting: The agent might try to include `uv` installation, environment setup,
    and test execution commands inside `solve.sh`, which is only meant to apply the
    code patch. This could cause the script to fail or timeout.
  severity: medium
  source:
    path: AGENTS.md
    lines: 41-42
hierarchy_analysis: The `AGENTS.md` file contains workflow instructions intended for
  human contributors using AI assistants, rather than instructions for an autonomous
  agent generating a patch script. This creates a meta-level conflict where the agent
  must ignore the human-in-the-loop and workflow requirements (like `uv`, `gh` CLI,
  and human submission) and focus solely on the code changes.
