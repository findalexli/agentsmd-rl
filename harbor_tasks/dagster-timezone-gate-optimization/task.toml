brief = "Add a performance optimization gate to skip expensive timezone conversions for timezones without minute-level offsets"
details = """
This task involves adding a `has_nonzero_minute_offset` function that checks if a timezone has a non-standard minute offset (like Asia/Kathmandu at UTC+5:45). For timezones with only hour-level offsets (like UTC, Europe/Berlin), the gate allows using a faster computation path instead of expensive datetime conversions.
"""

