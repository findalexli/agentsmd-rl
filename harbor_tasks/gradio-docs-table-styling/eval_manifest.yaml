rubric:
- rule: Be consistent with the style of the surrounding code.
  source:
    path: AGENTS.md
    lines: '39'
  evidence: The gold solution implements dark mode styling by prefixing selectors
    with the `.dark` class (e.g., `.dark table thead th`), which perfectly matches
    the existing dark mode pattern already present in t
  category: style
distractors:
- rule: '`js/` — frontend code (Svelte/TypeScript), with each component in its own
    subdirectory'
  collision_type: architecture_boundary
  why_distracting: The agent might interpret this rule as a requirement to build a
    dedicated Svelte component (e.g., `<Table />`) for markdown tables and place it
    in a new subdirectory under `js/`, rather than simply adding global CSS rules
    to the existing stylesheet as the issue requires.
  severity: high
  source:
    path: AGENTS.md
    lines: '9'
- rule: Frontend code is formatted with `prettier`. Run `bash scripts/format_frontend.sh`.
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to run the global frontend formatting script
    (`bash scripts/format_frontend.sh`) after making its CSS changes. In an agentic
    context, running global formatters often modifies hundreds of unrelated files
    that were slightly out of sync, polluting the PR with out-of-scope changes.
  severity: medium
  source:
    path: AGENTS.md
    lines: '38'
hierarchy_analysis: The repository has a single root-level `AGENTS.md` file that provides
  general guidelines. Since there are no deeper config files, there are no direct
  hierarchy conflicts. However, the general architectural guidelines (like creating
  Svelte components for frontend code) conflict with the specific, localized nature
  of this bug fix (adding global CSS to a specific stylesheet).
