    lines: 250-253
    commit: dbd199e77cdf741f4b1707702255b0b42fc04ab5
  evidence: Gold tests use AsyncMock and patch for service mocking, and test both success (delegation returns orgs/groups) and error (empty list on exception) paths.
  category: testing
  verification: llm_judge
distractors:
- rule: See openhands/integrations/provider.py for get_azure_devops_organizations - returns installations from Azure DevOps service.
  source:
    path: AGENTS.md
    lines: '221'
    commit: dbd199e77cdf741f4b1707702255b0b42fc04ab5
  collision_type: would_cause_bug
  why_distracting: ProviderHandler already has a get_azure_devops_organizations method that fetches installations, but the API endpoint should return 400 for Azure DevOps since it is explicitly unsupported for git organizations.
  severity: medium
- rule: The existing saas_get_user_installations delegates to openhands.server.routes.git.get_user_installations, which takes a provider parameter and handles all providers uniformly.
  source:
    path: enterprise/server/routes/user.py
    lines: 47-67
    commit: dbd199e77cdf741f4b1707702255b0b42fc04ab5
  collision_type: architecture_boundary
  why_distracting: The git-organizations endpoint should instantiate ProviderHandler directly rather than delegating through openhands.server.routes.git. The gold pattern is inline provider routing via ProviderHandler, unlike the installations endpoint.
  severity: high
