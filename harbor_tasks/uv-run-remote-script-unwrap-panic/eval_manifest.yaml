rubric:
- rule: AVOID using `panic!`, `unreachable!`, `.unwrap()`, unsafe code, and clippy
    rule ignores
  source:
    path: CLAUDE.md
    lines: 8-8
  evidence: The gold solution removes the `.unwrap()` on the downloaded script by
    refactoring `RunCommand` to hold the `NamedTempFile` directly, making the unwrap
    unnecessary and impossible.
  category: style
- rule: PREFER top-level imports over local imports or fully qualified names
  source:
    path: CLAUDE.md
    lines: 15-15
  evidence: The gold solution adds imports like `use uv_cli::{ExternalCommand, GlobalArgs};`
    and `use uv_scripts::{Pep723Error, Pep723Item, Pep723Metadata, Pep723Script};`
    at the top of `crates/uv/src/commands/pr
  category: style
distractors:
- rule: PREFER patterns like `if let` to handle fallibility
  collision_type: architecture_boundary
  why_distracting: An agent might try to replace the `.unwrap()` with an `if let Some(...)`
    check and return an error. However, the architectural problem is that the type
    system doesn't guarantee the download has happened. The correct fix is to refactor
    `RunCommand` and introduce `ParsedRunCommand` to enforce this at the type level,
    rather than just patching the symptom with `if let`.
  severity: high
  source:
    path: CLAUDE.md
    lines: 9-9
- rule: ALWAYS attempt to add a test case for changed behavior
  collision_type: scope_ambiguity
  why_distracting: Testing a remote script execution (`uv run https://...`) requires
    setting up a mock HTTP server or network requests in the test suite. The core
    fix is a structural type-system change that makes the panic impossible by design.
    Trying to add a test for this specific panic would distract the agent into complex
    network mocking.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 3-3
hierarchy_analysis: Only a single root-level `CLAUDE.md` file is present, so there
  are no hierarchical conflicts. All rules apply globally to the edited files.
