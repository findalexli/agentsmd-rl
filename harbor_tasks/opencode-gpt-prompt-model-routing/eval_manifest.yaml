distractors:
- rule: Use Bun APIs when possible, like `Bun.file()`
  collision_type: architecture_boundary
  why_distracting: The agent might try to read the new `gpt.txt` file at runtime using
    `Bun.file()` in `system.ts`, but system prompts in this architecture are typically
    imported directly as strings or handled by an existing prompt loader.
  severity: medium
  source:
    path: AGENTS.md
    lines: 15-15
- rule: Prefer `FileSystem.FileSystem` instead of raw `fs/promises` for effectful
    file I/O.
  collision_type: rule_conflict
  why_distracting: The agent might try to use `FileSystem.FileSystem` to read the
    prompt file, conflicting with the Bun API rule and likely violating how prompts
    are statically loaded or imported.
  severity: medium
  source:
    path: packages/opencode/AGENTS.md
    lines: 38-39
- rule: Use `Effect.gen(function* () { ... })` for composition.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to convert the synchronous `SystemPrompt.provider()`
    routing function into an Effect generator, unnecessarily complicating a simple
    string-matching and routing function.
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: 18-19
- rule: Avoid `else` statements. Prefer early returns.
  collision_type: scope_ambiguity
  why_distracting: When modifying the model routing logic in `SystemPrompt.provider()`,
    the agent might unnecessarily refactor existing `if/else if` chains into early
    returns, expanding the scope of the PR and risking regressions.
  severity: low
  source:
    path: AGENTS.md
    lines: 63-64
hierarchy_analysis: The root `AGENTS.md` provides general TypeScript and Bun guidelines,
  while `packages/opencode/AGENTS.md` introduces Effect-specific rules. This creates
  a direct conflict for file I/O (`Bun.file()` vs `FileSystem.FileSystem`), which
  is a trap here because the prompt file should likely just be imported or loaded
  using the existing mechanism rather than introducing new I/O logic.
