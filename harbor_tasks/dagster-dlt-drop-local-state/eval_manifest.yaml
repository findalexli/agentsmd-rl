  collision_type: scope_ambiguity
  why_distracting: The rule emphasizes using `@record` instead of `@dataclass` for
    data structures. An agent might get distracted looking for data structures to
    refactor or define, but this PR only requires adding procedural logic (method
    calls) to an existing function.
  severity: low
  source:
    path: CLAUDE.md
    lines: 8-9
hierarchy_analysis: The config file `CLAUDE.md` provides general repository guidelines.
  The distinction between core framework and libraries is clear, but test commands
  are overly focused on the core framework, which could mislead an agent working on
  a specific library like `dagster-dlt`.
