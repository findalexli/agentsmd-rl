source_pr:
  owner: dagster-io
  repo: dagster
  number: 33620
  title: "fix(dlt): drop local state before run"
  merge_commit: b776602f1381cd661d3328ed7835ac0120f33111
  base_commit: 095d02df486d2ab390f8d2385e1ef9413ecf37e0

checks:
  # Behavioral tests (fail_to_pass - these test the fix)
  - id: test_stale_state_interference_regression
    type: behavioral
    description: "Verify stale state from previous runs doesn't interfere"
    points: 5

  - id: test_drop_state_called
    type: behavioral
    description: "Verify drop() is called during dagster-dlt runs"
    points: 5

  # Pass-to-pass tests (repo CI/CD checks that must pass on both base and fix)
  - id: test_repo_dagster_dlt_tests
    type: pass_to_pass
    origin: repo_tests
    description: "dagster-dlt test suite passes"
    points: 1

  - id: test_repo_ruff_check
    type: pass_to_pass
    origin: repo_tests
    description: "Ruff lint check on dagster-dlt passes"
    points: 1

  - id: test_repo_ruff_format
    type: pass_to_pass
    origin: repo_tests
    description: "Ruff format check on dagster-dlt passes"
    points: 1

  - id: test_repo_pyright
    type: pass_to_pass
    origin: repo_tests
    description: "Pyright type check on dagster-dlt passes"
    points: 1

  - id: test_repo_dagster_core_imports
    type: pass_to_pass
    origin: repo_tests
    description: "Dagster core and dagster-dlt can be imported without errors"
    points: 1

agent_config:
  - file: CLAUDE.md
    rules:
      - id: run_ruff_after_changes
        description: "Run make ruff after any Python code changes"
        applicable: true
        origin: CLAUDE.md
        lines: "MANDATORY: After ANY Python code changes, ALWAYS run make ruff"

rubric:
  - rule: "Use comments to explain invariants, design decisions, and WHY code exists, not just narrate WHAT the code does."
    source:
      path: ".claude/coding_conventions.md"
      lines: "1-10"
      commit: "095d02df486d2ab390f8d2385e1ef9413ecf37e0"

  - rule: "Follow Google-style docstrings for public functions and classes. Include Args, Returns, and Raises sections where applicable."
    source:
      path: ".claude/coding_conventions.md"
      lines: "320-322"
      commit: "095d02df486d2ab390f8d2385e1ef9413ecf37e0"

scoring:
  max_points: 10
  passing_threshold: 8
