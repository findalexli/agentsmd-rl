version: "2.0"

source:
  repo: "astral-sh/ruff"
  pr: 24295
  base_commit: "ca3343e4cf25e8314c26cce2031abb67ed6a3b16"
  merge_commit: "e765eb073a4d484ce2c9fdbe266e21fff49d4080"

checks:
  - id: cargo_check
    type: pass_to_pass
    origin: static
    description: "ty_python_semantic crate must compile"

  - id: mismatch_typing_import
    type: fail_to_pass
    origin: pr_diff
    description: "TypedDict('WrongName') assigned to BadTypedDict emits a diagnostic"

  - id: mismatch_typing_extensions
    type: fail_to_pass
    origin: pr_diff
    description: "TypedDict('Mismatch') from typing_extensions assigned to AnotherBad emits a diagnostic"

  - id: mismatch_short_names
    type: fail_to_pass
    origin: pr_diff
    description: "Foo = TypedDict('Bar') emits a diagnostic with varied short names"

  - id: mixed_file_only_mismatch_flagged
    type: fail_to_pass
    origin: pr_diff
    description: "In mixed file, only mismatched TypedDict is flagged, not the correct one"

  - id: diagnostic_mentions_both_names
    type: fail_to_pass
    origin: agent_config
    description: "Diagnostic includes both the string name and the variable name"
    source:
      path: "AGENTS.md"
      lines: "83"
      commit: "ca3343e4cf25e8314c26cce2031abb67ed6a3b16"

  - id: correct_name_not_flagged
    type: pass_to_pass
    origin: pr_diff
    description: "GoodTypedDict = TypedDict('GoodTypedDict') produces no diagnostic"

  - id: class_syntax_unaffected
    type: pass_to_pass
    origin: pr_diff
    description: "Class-based TypedDict syntax is not broken by the change"

  - id: upstream_typed_dict_mdtest
    type: pass_to_pass
    origin: repo_tests
    description: "Existing typed_dict mdtest suite still passes"

rubric:
  - rule: "Rust imports should always go at the top of the file, never locally in functions."
    source:
      path: "AGENTS.md"
      lines: "76"
      commit: "ca3343e4cf25e8314c26cce2031abb67ed6a3b16"
  - rule: "Try hard to avoid patterns that require `panic!`, `unreachable!`, or `.unwrap()`. Instead, try to encode those constraints in the type system."
    source:
      path: "AGENTS.md"
      lines: "79"
      commit: "ca3343e4cf25e8314c26cce2031abb67ed6a3b16"
  - rule: "Prefer let chains (`if let` combined with `&&`) over nested `if let` statements to reduce indentation and improve readability."
    source:
      path: "AGENTS.md"
      lines: "80"
      commit: "ca3343e4cf25e8314c26cce2031abb67ed6a3b16"
  - rule: "Use comments purposefully. Don't use comments to narrate code, but do use them to explain invariants and why something unusual was done a particular way."
    source:
      path: "AGENTS.md"
      lines: "82"
      commit: "ca3343e4cf25e8314c26cce2031abb67ed6a3b16"
