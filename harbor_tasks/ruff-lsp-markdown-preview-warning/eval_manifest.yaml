version: "2.0"

source:
  repo: "astral-sh/ruff"
  pr: 24150
  base_commit: "a84a58fef88968e36c0b070f0ab9a4bff7a05389"
  merge_commit: "20ca73626d71189ed000806938e1de688c1d3e55"

checks:
  - id: cargo_check
    type: pass_to_pass
    origin: static
    description: "ruff_server crate must compile without errors"

  - id: md_preview_distinguishable
    type: fail_to_pass
    origin: pr_diff
    description: "format() on markdown without preview returns a result distinguishable from unchanged"

  - id: md_preview_distinguishable_varied
    type: fail_to_pass
    origin: pr_diff
    description: "format() returns preview-only for varied markdown inputs (anti-hardcode)"

  - id: warning_in_format_handler
    type: fail_to_pass
    origin: pr_diff
    description: "Format request handler sends user-visible warning mentioning preview when markdown formatting is skipped"

  - id: format_result_enum_exists
    type: fail_to_pass
    origin: pr_diff
    description: "format.rs defines a result type distinguishing preview-only from unchanged"

  - id: existing_format_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Existing format::tests in ruff_server still pass"

  - id: no_new_unwrap
    type: pass_to_pass
    origin: agent_config
    description: "No new .unwrap() calls added to modified files"
    source:
      path: "AGENTS.md"
      lines: "79"
      commit: "a84a58fef88968e36c0b070f0ab9a4bff7a05389"

  - id: no_inline_imports
    type: pass_to_pass
    origin: agent_config
    description: "No use imports inside function bodies in modified Rust files"
    source:
      path: "AGENTS.md"
      lines: "76"
      commit: "a84a58fef88968e36c0b070f0ab9a4bff7a05389"

  - id: prefer_expect_over_allow
    type: pass_to_pass
    origin: agent_config
    description: "New #[allow(..)] attributes should use #[expect(..)] instead"
    source:
      path: "AGENTS.md"
      lines: "81"
      commit: "a84a58fef88968e36c0b070f0ab9a4bff7a05389"

rubric:
  - rule: "Prefer let chains (`if let` combined with `&&`) over nested `if let` statements to reduce indentation and improve readability."
    source:
      path: "AGENTS.md"
      lines: "80"
      commit: "a84a58fef88968e36c0b070f0ab9a4bff7a05389"
  - rule: "Use comments purposefully. Don't use comments to narrate code, but do use them to explain invariants and why something unusual was done a particular way."
    source:
      path: "AGENTS.md"
      lines: "82"
      commit: "a84a58fef88968e36c0b070f0ab9a4bff7a05389"
  - rule: "Avoid writing significant amounts of new code. This is often a sign that we're missing an existing method or mechanism that could help solve the problem."
    source:
      path: "AGENTS.md"
      lines: "78"
      commit: "a84a58fef88968e36c0b070f0ab9a4bff7a05389"
