      path: "CLAUDE.md"
      lines: "10"
      commit: "bd2e0c9b09551c6570b14c4da80364fe90805b78"

  - id: no_unwrap_panic_in_preference_impl
    type: pass_to_pass
    origin: agent_config
    description: "No unwrap/panic/unreachable in PythonPreference impl block"
    source:
      path: "CLAUDE.md"
      lines: "7"
      commit: "bd2e0c9b09551c6570b14c4da80364fe90805b78"

rubric:
  - rule: "PREFER patterns like `if let` to handle fallibility"
    source:
      path: "CLAUDE.md"
      lines: "8"
      commit: "bd2e0c9b09551c6570b14c4da80364fe90805b78"

  - rule: "PREFER let chains (`if let` combined with `&&`) over nested `if let` statements"
    source:
      path: "CLAUDE.md"
      lines: "11"
      commit: "bd2e0c9b09551c6570b14c4da80364fe90805b78"

  - rule: "PREFER top-level imports over local imports or fully qualified names"
    source:
      path: "CLAUDE.md"
      lines: "16"
      commit: "bd2e0c9b09551c6570b14c4da80364fe90805b78"

  - rule: "AVOID shortening variable names, e.g., use `version` instead of `ver`, and `requires_python` instead of `rp`"
    source:
      path: "CLAUDE.md"
      lines: "17"
      commit: "bd2e0c9b09551c6570b14c4da80364fe90805b78"
