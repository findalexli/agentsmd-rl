    description: "All call sites in the uv crate compile with updated API"

  - id: free_function_removed
    type: fail_to_pass
    origin: pr_diff
    description: "satisfies_python_preference free function removed from discovery.rs, lib.rs, and callers"

  - id: is_system_interpreter_removed
    type: fail_to_pass
    origin: pr_diff
    description: "is_system_interpreter free function removed from discovery.rs"

  - id: list_inline_preference_removed
    type: fail_to_pass
    origin: pr_diff
    description: "list.rs no longer reimplements preference logic with inline variant match"

  - id: preference_method_on_type
    type: fail_to_pass
    origin: pr_diff
    description: "PythonPreference has allows_installation(&PythonInstallation) method"

  - id: installation_has_is_managed
    type: fail_to_pass
