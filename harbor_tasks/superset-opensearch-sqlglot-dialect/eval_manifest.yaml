distractors:
- rule: ALWAYS run `pre-commit run --all-files` before pushing commits.
  source:
    path: AGENTS.md
    lines: '7'
    commit: 18d89f25ce4db6258a01d409dd516003b1df7f0c
  collision_type: meta_confusion
  why_distracting: This mandates running pre-commit across the entire repo, which requires a full Superset dev environment and triggers unrelated lint failures — the agent may waste time on tooling instead of making the targeted dialect change.
  severity: medium
- rule: MyPy compliance - Run `pre-commit run mypy` to validate
