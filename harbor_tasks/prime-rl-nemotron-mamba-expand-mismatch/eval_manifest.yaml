    description: "Config mamba_expand yields correct intermediate_size for Nano-30B (core bug)"

  - id: multiple_dimension_combos
    type: fail_to_pass
    origin: pr_diff
    description: "Config mamba_expand correct for varied hidden_size / head combos"

  - id: fractional_expand_precision
    type: fail_to_pass
    origin: pr_diff
    description: "No off-by-one from float truncation when expand is not a clean fraction"

  - id: 120b_default_config
    type: pass_to_pass
    origin: pr_diff
    description: "120B default config still produces correct mamba_expand (regression)"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "NemotronHConfig.__init__ has real logic, not just pass/return"

  - id: no_silent_try_except
    type: pass_to_pass
    origin: agent_config
    description: "No silent except/pass blocks in modified files"
    source:
      path: "AGENTS.md"
      lines: "5"
      commit: "8a6f4ef3bfe644c7fd1e33841aa66c6f3a4c26a4"

  - id: no_work_process_comments
    type: pass_to_pass
