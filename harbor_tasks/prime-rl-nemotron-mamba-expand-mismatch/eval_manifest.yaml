    description: "Repo's ruff lint check passes on modified files"

  - id: test_repo_ruff_format
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ruff format check passes on modified files"

  - id: test_repo_no_broken_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "All modified Python files parse without syntax errors"

  - id: test_repo_ruff_full_lint
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's full ruff lint check passes on all files"

  - id: test_repo_imports_clean
    type: pass_to_pass
