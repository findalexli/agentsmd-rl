rubric:
  - rule: "Explicit is better than implicit — mamba_expand should be computed from mamba_num_heads * mamba_head_dim / hidden_size, not an opaque constant."
    source:
      path: "AGENTS.md"
      lines: "14"
      commit: "8a6f4ef3bfe644c7fd1e33841aa66c6f3a4c26a4"
    reference:
      file: "src/prime_rl/trainer/models/nemotron_h/configuration_nemotron_h.py"
      line: 179
      content: "self.mamba_expand = (mamba_num_heads * mamba_head_dim) / hidden_size"

  - rule: "Simple is better than complex — the fix should be minimal and direct."
    source:
      path: "AGENTS.md"
      lines: "15"
      commit: "8a6f4ef3bfe644c7fd1e33841aa66c6f3a4c26a4"
    reference:
      file: "src/prime_rl/trainer/models/nemotron_h/configuration_nemotron_h.py"
      line: 179
      content: "self.mamba_expand = (mamba_num_heads * mamba_head_dim) / hidden_size"

  - rule: "Comments should explain why not what — the fix includes a targeted comment explaining the bug."
    source:
      path: "AGENTS.md"
      lines: "7"
      commit: "8a6f4ef3bfe644c7fd1e33841aa66c6f3a4c26a4"
    reference:
      file: "src/prime_rl/trainer/models/nemotron_h/configuration_nemotron_h.py"
      lines: "173-176"
