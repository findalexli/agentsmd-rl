  title: 'fix(agents-openai): omit empty computer safety checks on replay'
checks:
- id: test_computer_call_omits_empty_pending_safety_checks
  type: fail_to_pass
  origin: pr_diff
  description: 'Rebuilt computer_call input items must omit pending_safety_checks entirely when providerData.pending_safety_checks is an empty array.

    '
- id: test_computer_call_output_omits_empty_acknowledged_safety_checks
  type: fail_to_pass
  origin: pr_diff
  description: 'Rebuilt computer_call_output input items must omit acknowledged_safety_checks entirely when providerData.acknowledged_safety_checks is an empty array.

    '
- id: test_computer_call_omits_when_provider_data_missing_field
  type: fail_to_pass
  origin: pr_diff
  description: 'When providerData has no safety-check fields at all, rebuilt items must not synthesise empty pending_safety_checks / acknowledged_safety_checks arrays.

    '
- id: test_non_empty_safety_checks_are_preserved
  type: pass_to_pass
  origin: pr_diff
  description: 'Non-empty pending_safety_checks and acknowledged_safety_checks arrays must still pass through to the rebuilt input items.

    '
