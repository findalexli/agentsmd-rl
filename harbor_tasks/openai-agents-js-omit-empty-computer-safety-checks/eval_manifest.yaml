rubric:
- id: comments_end_with_period
  source:
    quote: Comments must end with a period.
    path: AGENTS.md
    commit: 36a368b7d477f5592aea21aab83b940533607939
  rule: 'Any comment added or modified in TypeScript source must end with a period.

    '
- id: changeset_present_for_packages_change
  source:
    quote: 'When you change anything under `packages/` or touch `.changeset/`, use `$changeset-validation` to create and validate the changeset before you treat the code as final.

      '
    path: AGENTS.md
    commit: 36a368b7d477f5592aea21aab83b940533607939
  rule: 'Any change under packages/ must be accompanied by a Changeset entry under .changeset/ that names the affected package (@openai/agents-openai) at an appropriate semver bump (patch for a bug fix). The summary must read like a Conventional Commit subject (e.g. starting with `fix:` / `feat:`).

    '
- id: unit_tests_added_for_change
  source:
    quote: 'Add or update unit tests for any code change unless it is truly infeasible.

      '
    path: AGENTS.md
    commit: 36a368b7d477f5592aea21aab83b940533607939
  rule: 'The change must come with at least one new or updated unit test in packages/agents-openai/test/ that exercises the new behavior.

    '
