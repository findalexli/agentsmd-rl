rubric:
  - rule: "Always use CustomTestCase — never raw unittest.TestCase. CustomTestCase ensures tearDownClass runs even when setUpClass fails, preventing resource leaks in CI."
    source:
      path: ".claude/skills/write-sglang-test/SKILL.md"
      lines: "10-12"
      commit: "bb9e058f5b9d4754ac2965bb36864fee1cd978e8"

  - rule: "tearDownClass must be defensive — use hasattr/null checks before accessing resources (e.g., cls.process) that setUpClass may not have finished allocating."
    source:
      path: ".claude/skills/write-sglang-test/SKILL.md"
      lines: "13-14"
      commit: "bb9e058f5b9d4754ac2965bb36864fee1cd978e8"

  - rule: "Test kits and mixins should be placed in python/sglang/test/kits/ directory, following the existing pattern of eval_accuracy_kit.py and other kit files."
    source:
      path: ".claude/skills/write-sglang-test/SKILL.md"
      lines: "369-396,400-413"
      commit: "bb9e058f5b9d4754ac2965bb36864fee1cd978e8"
