version: "1.0"

task:
  name: router-semantic-changelog
  description: Refactor GitHub release changelog generation to use conventional commits

source:
  type: github_pr
  repo: TanStack/router
  pr_number: 6909
  base_commit: 576b5acd874f0a7fa11b0cbd8186eb7448268b09
  merge_commit: daa2ab9886f857b0e6b6299aec3787e6f92b6003

checks:
  # Fail-to-pass tests (core behavioral changes)
  - id: test_typeorder_array_exists
    type: fail_to_pass
    origin: pr_behavior
    description: Script defines typeOrder array for conventional commit type priority

  - id: test_typelabels_object_exists
    type: fail_to_pass
    origin: pr_behavior
    description: Script defines typeLabels object for human-readable type names

  - id: test_conventional_commit_parsing
    type: fail_to_pass
    origin: pr_behavior
    description: Script parses conventional commits with type(scope) message format

  - id: test_groups_by_commit_type
    type: fail_to_pass
    origin: pr_behavior
    description: Script groups commits by their conventional commit type

  - id: test_markdown_type_headings
    type: fail_to_pass
    origin: pr_behavior
    description: Script generates markdown with type headings instead of package headings

  - id: test_no_changelog_md_reading
    type: fail_to_pass
    origin: pr_behavior
    description: Script no longer reads CHANGELOG.md files for changelog content

  - id: test_git_log_with_format
    type: fail_to_pass
    origin: pr_behavior
    description: Script uses git log with pretty format for commit parsing

  - id: test_removes_append_authors_function
    type: fail_to_pass
    origin: pr_behavior
    description: Script removes the appendAuthors function

  - id: test_removes_resolve_author_for_commit
    type: fail_to_pass
    origin: pr_behavior
    description: Script removes resolveAuthorForCommit function

  - id: test_type_sorting_by_priority
    type: fail_to_pass
    origin: pr_behavior
    description: Script sorts commit types by priority order

  # Pass-to-pass tests (regression checks)
  - id: test_script_syntax_valid
    type: pass_to_pass
    origin: repo_tests
    description: Release script has valid JavaScript/ESM syntax

  - id: test_repo_eslint_scripts
    type: pass_to_pass
    origin: repo_tests
    description: Repo's ESLint passes on scripts directory

  - id: test_repo_prettier_scripts
    type: pass_to_pass
    origin: repo_tests
    description: Repo's Prettier formatting check passes on scripts

  - id: test_resolve_username_function_exists
    type: pass_to_pass
    origin: static
    description: Script still has resolveUsername function for email lookup

  - id: test_resolve_author_for_pr_exists
    type: pass_to_pass
    origin: static
    description: Script still has resolveAuthorForPR function

  - id: test_pr_author_lookup_pattern
    type: pass_to_pass
    origin: static
    description: Script uses PR number to look up author

  - id: test_previous_release_detection
    type: pass_to_pass
    origin: static
    description: Script detects previous release for git log range

  - id: test_bumped_packages_collection
    type: pass_to_pass
    origin: static
    description: Script collects bumped packages from package.json files

  - id: test_github_release_creation
    type: pass_to_pass
    origin: static
    description: Script creates GitHub release with gh CLI

  - id: test_no_merge_commits_filter
    type: fail_to_pass
    origin: pr_behavior
    description: Script filters out merge commits from git log

rubric:
  - id: code_only_change
    rule: >
      No config/documentation files need to be modified. This is a pure code refactoring
      of scripts/create-github-release.mjs that does not change any agent-facing behavior
      or documentation requirements. The absence of config file changes is correct.
    reference: "N/A - no config changes required for this code-only refactoring"
