source_pr:
  owner: withastro
  repo: astro
  pr_number: 16054
  base_commit: fa5bcded465bda258137f8017721ba15d54a9b4a
  merge_commit: f74465aa406ddfbc9d458189bf7a2e67a227b33c

task_description: |
  Fix HMR (Hot Module Replacement) for middleware changes in Astro dev server.
  When middleware files change during development, the dev server should
  pick up the changes without requiring a full server restart.

  The issue is that middleware was being cached and not re-resolved when
  the middleware.ts file changed. The fix involves:

  1. Adding a clearMiddleware() method to the Pipeline base class
  2. Adding clearMiddleware() methods to DevApp and AstroServerApp
  3. Adding a configureServer hook to the middleware Vite plugin to watch for changes
  4. Adding HMR listeners in the dev entrypoints to clear the cache on changes

