config_edits:
- path: AGENTS.md
  tier: 1
  gold_added: "- **Prerelease mode**: An optional `.changes/prerelease.json` file\
    \ denotes that the package is in prerelease mode. The `channel` field (e.g. `\"\
    alpha\"`, `\"beta\"`, `\"rc\"`) determines the version suffix, while the npm dist-tag\
    \ is always `\"next\"`. **This is only supported for the `remix` package.**\n\
    \    - **Transitioning between prerelease channels** (e.g. `alpha` → `beta`):\
    \ Update `prerelease.json` channel and add a change file. Version resets to new\
    \ channel (e.g. `3.0.0-alpha.7` → `3.0.0-beta.0`). The bump type is for changelog\
    \ categorization only—by convention, use `patch`."
  gold_removed: "- **Prelease mode**: An optional `.changes/prerelease.json` file\
    \ denotes that the package is in prerelease mode and what the npm dist-tag is.\
    \ **This is only supported for the `remix` package.**\n    - **Transitioning between\
    \ prerelease tags** (e.g. `alpha` → `beta`): Update `prerelease.json` tag and\
    \ add a change file. Version resets to new tag (e.g. `3.0.0-alpha.7` → `3.0.0-beta.0`).\
    \ The bump type is for changelog categorization only—by convention, use `patch`."
- path: CONTRIBUTING.md
  tier: 2
  gold_added: '"channel": "alpha"

    The `channel` field determines the version suffix (e.g. `alpha`, `beta`, `rc`),
    while prereleases are always published to npm with the `next` tag. This is only
    supported for `remix` because it''s the only package that needs to publish prereleases
    alongside an existing stable version on npm. All other packages in this monorepo
    are new and publish directly as `latest`.

    #### Transitioning between `remix` prerelease channels

    To transition between channels (e.g. `alpha` → `beta`):

    1. Update `.changes/prerelease.json` to the new channel

    Version resets to the new channel (e.g. `3.0.0-alpha.7` → `3.0.0-beta.0`). The
    bump type is for changelog categorization only—by convention, use `patch`.'
  gold_removed: '"tag": "alpha"

    This is only supported for `remix` because it''s the only package that needs to
    publish prereleases alongside an existing stable version on npm. All other packages
    in this monorepo are new and publish directly as `latest`.

    #### Transitioning between `remix` prerelease tags

    To transition between tags (e.g. `alpha` → `beta`):

    1. Update `.changes/prerelease.json` to the new tag

    Version resets to the new tag (e.g. `3.0.0-alpha.7` → `3.0.0-beta.0`). The bump
    type is for changelog categorization only—by convention, use `patch`.'
distractors:
- rule: 'Formatting: Prettier (printWidth: 100, no semicolons, single quotes, spaces
    not tabs)'
  collision_type: would_cause_bug
  why_distracting: The formatting rule specifies 'single quotes', but the agent must
    edit prerelease.json and a JSON code block in CONTRIBUTING.md. JSON strictly requires
    double quotes, so applying this rule would create invalid JSON.
  severity: high
  source:
    path: AGENTS.md
    lines: 28-28
- rule: 'Adding changes: Create `packages/*/.changes/[major|minor|patch].short-description.md`
    files.'
  collision_type: meta_confusion
  why_distracting: The rule requires creating a change file for changes. However,
    this PR modifies the monorepo's internal release scripts and documentation, not
    the actual package source code that would require a changelog entry for users.
  severity: medium
  source:
    path: AGENTS.md
    lines: 45-45
hierarchy_analysis: AGENTS.md is the root config file. The rules generally apply to
  TypeScript source code, but agents might over-apply them to JSON files (causing
  syntax errors) or meta-level repository changes (causing unnecessary change files).
