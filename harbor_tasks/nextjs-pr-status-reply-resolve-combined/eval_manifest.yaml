distractors:
- rule: 'Default agent rule: If you are changing Next.js source or integration tests,
    start `pnpm --filter=next dev` in a separate terminal session before making edits.'
  collision_type: scope_ambiguity
  why_distracting: The agent might start the Next.js dev server (`pnpm --filter=next
    dev`) because it is editing a JavaScript file. However, `scripts/pr-status.js`
    is a standalone Node.js maintenance script, not part of the Next.js framework
    source (`packages/next/src/`). Starting the dev server is unnecessary and wastes
    time.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 60-62
- rule: 'Always run a full bootstrap build after switching branches: `pnpm build-all`'
  collision_type: scope_ambiguity
  why_distracting: The agent might run `pnpm build-all` to ensure the workspace is
    bootstrapped after checking out the branch. Since the changes are strictly isolated
    to a standalone script and markdown files, a full build of the JS and Rust code
    is completely unnecessary and would waste significant time.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 81-85
hierarchy_analysis: 'The configuration relies on a single root-level `CLAUDE.md` (symlinked
  to `AGENTS.md`). The primary challenge is scope ambiguity: the config heavily emphasizes
  Next.js core development workflows (dev servers, Rust/JS builds, test isolation),
  but this PR is strictly modifying a standalone maintenance script and agent skill
  documentation. Agents must correctly identify that `scripts/` falls outside the
  ''Next.js source'' scope to avoid triggering expensive and irrelevant build/dev
  commands.'
