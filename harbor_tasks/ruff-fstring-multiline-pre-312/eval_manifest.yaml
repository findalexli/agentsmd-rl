    path: AGENTS.md
    lines: '82'
    commit: 9a55bc6568caeba0c78c6f3358cd2f9475006f72
- rule: All changes must be tested. If you're not testing your changes, you're not done.
  source:
    path: AGENTS.md
    lines: 63-63
  evidence: The gold solution adds a new test fixture `fstring_multiline_replacement_field.py` and its corresponding `.options.json` file to verify the formatting behavior across different Python versions.
  category: testing
- rule: Avoid writing significant amounts of new code. Look for existing utilities first.
  source:
    path: AGENTS.md
    lines: 69-69
  evidence: The gold solution keeps the fix concise by leveraging existing utility methods like `supports_pep_701()`, `is_triple_quoted()`, and `contains_line_break()` rather than writing custom parsing or versio
  category: architecture
distractors:
- rule: Look to see if your tests could go in an existing file before adding a new file for your tests.
  collision_type: would_cause_bug
  why_distracting: The agent might try to append the new f-string test cases to an existing test file to follow this rule. However, because the fix specifically depends on the `target_version` (Python 3.11 vs 3.12), it requires a dedicated `.options.json` file to configure the formatter for this specific fixture. Adding it to an existing file would either fail to test the version-specific behavior or incorrectly apply the target version to other unrelated tests.
  severity: high
  source:
    path: AGENTS.md
    lines: 69-69
hierarchy_analysis: The configuration is essentially a flat single file (`AGENTS.md` which is referenced by `CLAUDE.md`). The agent must balance the general directive to reuse test files against the technical requirements of the testing framework which necessitates a new file for specific formatter options.
