- rule: Look to see if your tests could go in an existing file before adding a new
    file for your tests.
  collision_type: would_cause_bug
  why_distracting: The agent might try to append the new f-string test case to an
    existing test file to follow this rule. However, testing this specific fix requires
    running the formatter against multiple Python target versions (3.11 and 3.12).
    In Ruff's testing framework, this requires a dedicated `.options.json` file. Adding
    the test to an existing file would either fail to test the pre-3.12 behavior or
    incorrectly alter the target version for unrelated tests.
