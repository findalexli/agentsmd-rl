version: "2.0"

source:
  repo: "example/example-repo"
  pr: 1
  base_commit: "HEAD"
  merge_commit: "HEAD"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified files must parse without errors"

  - id: core_bug_fixed
    type: fail_to_pass
    origin: pr_diff
    description: "The add function returns the correct sum (not difference)"

  - id: edge_case
    type: fail_to_pass
    origin: pr_diff
    description: "Test add with negative numbers"

  - id: repo_syntax_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo CI: Python syntax check passes"

  - id: repo_import_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo CI: Module imports without errors"

  - id: repo_multiply_regression
    type: pass_to_pass
    origin: repo_tests
    description: "Repo CI: multiply function regression test"

  - id: existing_function_unchanged
    type: pass_to_pass
    origin: static
    description: "The multiply function still works correctly"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "Modified function has real logic, not just pass/return"

rubric: []
