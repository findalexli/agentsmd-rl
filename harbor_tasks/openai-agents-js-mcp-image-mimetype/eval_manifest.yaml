rubric:
- rule: When handling MCP tool image outputs, both mediaType and mimeType fields must be recognized for backward compatibility
  source:
    path: AGENTS.md
    type: agent_config
  description: The fix adds a getImageInlineMediaType helper that checks both mediaType and mimeType
- rule: Image data must be converted to proper data URLs before passing to the model
  source:
    path: AGENTS.md
    type: agent_config
  description: Raw base64 data is converted to data:<mime>;base64,... format via toInlineImageString/formatInlineData
- rule: Existing data URLs must not be double-wrapped when processing image outputs
  source:
    path: AGENTS.md
    type: agent_config
  description: formatInlineData includes a guard to avoid wrapping already-formatted data URLs
