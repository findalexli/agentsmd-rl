  origin: repo_tests
rubric:
- rule: 'Assume that the maintainers and readers of the code you write are Go experts:
    Don''t use comments to explain the obvious.'
  source:
    path: AGENTS.md
    lines: 3-4
  evidence: 'The gold solution implements the fix by adding `if d.startErr == nil
    { ... }` without adding any comments explaining the logic (e.g., omitting the
    `// BUG: This is set unconditionally` comment from th'
  category: documentation
- rule: Brevity is good.
  source:
    path: AGENTS.md
    lines: 2-2
  evidence: The gold solution makes the minimal necessary change to fix the bug by
    simply wrapping the success-dependent state updates inside an `if d.startErr ==
    nil` block, rather than refactoring the entire `s
  category: style
agent_configs:
- path: AGENTS.md
  commit: 54c804876a5b63c3447b612ce6823339f3f486fc
  rules_checked:
  - Never export symbols that's not needed outside of the package
  - Avoid global state at (almost) all cost
- path: CLAUDE.md
  commit: 54c804876a5b63c3447b612ce6823339f3f486fc
  note: References AGENTS.md, contains no additional rules
distractors:
- rule: If you need to add temporary debug printing, use `hdebug.Printf`.
  collision_type: would_cause_bug
  why_distracting: An agent might be tempted to add `hdebug.Printf` to log the error
    when `d.startErr != nil` (since the success case already has an `Infof` log).
    However, as noted in the footnote, leaving `hdebug.Printf` in the final code will
    cause the CI build to fail.
  severity: high
  source:
    path: AGENTS.md
    lines: 7-7
- rule: Brevity is good.
  collision_type: scope_ambiguity
  why_distracting: An agent might over-optimize for 'brevity' by attempting to inline
    the assignment into the if-statement (e.g., `if d.dispatcher, d.startErr = Start[Q,
    R](d.opts); d.startErr == nil { ... }`). While valid Go, this reduces readability
    and deviates from the existing style of the function, which separates the assignment
    and the subsequent logic.
  severity: medium
  source:
    path: AGENTS.md
    lines: 2-2
hierarchy_analysis: The configuration is flat, with `CLAUDE.md` simply including `AGENTS.md`.
  All rules originate from `AGENTS.md` and apply uniformly to the Go source files.
