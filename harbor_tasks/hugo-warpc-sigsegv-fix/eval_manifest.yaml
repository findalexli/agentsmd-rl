- id: code_compiles
  description: The modified code compiles without errors
  type: pytest
  origin: test_outputs
- id: lazy_dispatcher_started_flag_guarded
  description: lazyDispatcher.start() only sets started=true on successful Start()
  type: pytest
  origin: test_outputs
- id: close_handles_failed_start
  description: Dispatchers.Close() properly checks started flag before accessing dispatcher
  type: pytest
  origin: test_outputs
- id: no_unconditional_started_assignment
  description: No unconditional 'd.started = true' in startOnce.Do block (this was
    the bug)
