distractors:
- rule: If coordination evidence cannot be found, do not proceed to PR-ready output.
  collision_type: meta_confusion
  why_distracting: The agent is in an automated evaluation environment and must output
    the fix. If it follows the 'Fail-closed behavior' rule because it cannot find
    coordination evidence in the prompt, it will refuse to generate the patch.
  severity: high
  source:
    path: CLAUDE.md
    lines: 48-52
- rule: Do not open one-off PRs for tiny edits (single typo, isolated lint cleanup,
    one mutable default argument, etc.).
  collision_type: scope_ambiguity
  why_distracting: The prompt requests caching for `get_model_modules()`. The agent
    might misclassify adding `@functools.lru_cache` as a 'tiny edit' or 'low-value
    busywork' and refuse to implement this part of the fix.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 34-36
- rule: 'Copies and Modular Models: mark classes or functions with `# Copied from
    ...` and avoid direct inheritance.'
  collision_type: architecture_boundary
  why_distracting: The issue mentions `PreTrainedModel` and model classes. The agent
    might get distracted by the repository's copy mechanism and try to modify model
    files in `src/transformers/models/` or `# Copied from` directives instead of fixing
    the AST traversal in the utility script.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 54-59
hierarchy_analysis: CLAUDE.md and AGENTS.md contain identical rules focused on agent
  contribution policies and repository-specific mechanisms like modular models. There
  are no conflicts between the files, but the strict fail-closed policies conflict
  with the nature of an automated coding benchmark.
