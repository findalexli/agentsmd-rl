rubric:
- rule: Do not edit a `# Copied from` block, as it will be reverted by `make fix-repo`.
  source:
    path: CLAUDE.md
    lines: '66'
    commit: 9a9997fd73c5eb29fb3677d3c489f5d3cd0765f6
- rule: PRs should be as brief as possible. Bugfix PRs in particular can often be
    only one or two lines long, and do not need large comments, docstrings or new
    functions in this case. Aim to minimize the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: 9a9997fd73c5eb29fb3677d3c489f5d3cd0765f6
- rule: '`make check-repo` runs consistency checks.'
  source:
    path: CLAUDE.md
    lines: 6-6
  evidence: The gold solution fixes the AST parsing logic in `utils/check_repo.py`,
    which is the script responsible for the consistency checks executed by the `make
    check-repo` command.
  category: tooling
distractors:
- rule: 'Fail-closed behavior for agents: If coordination evidence cannot be found,
    do not proceed to PR-ready output.'
  collision_type: meta_confusion
  why_distracting: The rule explicitly commands the agent to 'fail-closed' and 'not
    proceed to PR-ready output' if coordination evidence is missing. In a benchmark
    setting, the agent must ignore this and provide the code anyway rather than refusing
    to work.
  severity: high
  source:
    path: AGENTS.md
    lines: 48-52
- rule: 'Accountability for AI-assisted patches: Pure code-agent PRs are not allowed...
    Do not raise PRs without human validation.'
  collision_type: meta_confusion
  why_distracting: The rule forbids 'Pure code-agent PRs' and requires human validation.
    The agent might output a conversational refusal or ask for a human instead of
    providing the patch.
  severity: high
  source:
    path: AGENTS.md
    lines: 38-46
- rule: 'No low-value busywork PRs: Do not open one-off PRs for tiny edits.'
  collision_type: meta_confusion
  why_distracting: The agent might classify this small bug fix (changing `ast.walk`
    to `tree.body` and adding `lru_cache`) as a tiny edit or 'low-value busywork'
    and refuse to proceed based on the repository's contribution guidelines.
  severity: medium
  source:
    path: AGENTS.md
    lines: 34-36
hierarchy_analysis: The config consists of `AGENTS.md` and `CLAUDE.md` which contain
  identical rules at the root level. The rules are heavily focused on PR workflow
  and agent behavior rather than code style. The primary challenge is overcoming the
  strict 'fail-closed' instructions that forbid the agent from generating code without
  human coordination.
