version: "2.0"

source:
  repo: "vercel/next.js"
  pr: 92034
  base_commit: "9a0214a12f1ed1901c4b01e84073ab854848eea0"
  merge_commit: "c43965275556c3e0243de822e5bd21e07cf9d48c"

checks:
  - id: syntax_valid
    type: pass_to_pass
    origin: static
    description: "hot-reloader-turbopack.ts exists and has substantial content"

  - id: test_repo_typescript_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "TypeScript files have valid syntax"

  - id: test_repo_is_metadata_route_importable
    type: pass_to_pass
    origin: repo_tests
    description: "isMetadataRoute function exists and is importable in hot-reloader-turbopack.ts"

  - id: metadata_route_hmr_exclusion
    type: fail_to_pass
    origin: pr_diff
    description: "usesServerHmr must exclude metadata routes via isMetadataRoute check"

  - id: is_metadata_route_imported
    type: fail_to_pass
    origin: pr_diff
    description: "isMetadataRoute must be imported in hot-reloader-turbopack.ts"

  - id: entry_page_extracted
    type: fail_to_pass
    origin: pr_diff
    description: "The page property must be extracted from splitEntryKey for the metadata check"

  - id: server_hmr_preserves_app_entry_check
    type: pass_to_pass
    origin: pr_diff
    description: "usesServerHmr must still require entryType === 'app'"

  - id: server_hmr_preserves_edge_exclusion
    type: pass_to_pass
    origin: pr_diff
    description: "usesServerHmr must still exclude edge runtime endpoints"

rubric:
  - rule: "Before editing files, read all README.md files in the directory path from repo root to the target file's directory to identify local patterns and conventions."
    source:
      path: "AGENTS.md"
      lines: "46-54"
      commit: "9a0214a12f1ed1901c4b01e84073ab854848eea0"

  - rule: "When working with large files (>500 lines), grep first to find relevant line numbers, then read targeted ranges. Never re-read the same section without code changes in between."
    source:
      path: "AGENTS.md"
      lines: "325-329"
      commit: "9a0214a12f1ed1901c4b01e84073ab854848eea0"

  - rule: "Pre-validate code changes before committing by running prettier and eslint on changed files to avoid slow lint-staged failures."
    source:
      path: "AGENTS.md"
      lines: "361-366"
      commit: "9a0214a12f1ed1901c4b01e84073ab854848eea0"

  - rule: "When adding conditional require() paths or imports in server code, use DCE-safe if/else branching patterns that webpack can evaluate at compile time. Avoid early-return/throw guards."
    source:
      path: ".agents/skills/dce-edge/SKILL.md"
      lines: "17-34"
      commit: "9a0214a12f1ed1901c4b01e84073ab854848eea0"

  - rule: "When reproducing CI failures locally, mirror CI environment variables exactly. For module-resolution validation, always verify without NEXT_SKIP_ISOLATE=1."
    source:
      path: ".agents/skills/runtime-debug/SKILL.md"
      lines: "16-20"
      commit: "9a0214a12f1ed1901c4b01e84073ab854848eea0"
