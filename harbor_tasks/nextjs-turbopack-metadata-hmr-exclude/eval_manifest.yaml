  category: architecture
distractors:
- rule: turbopack/ - Turbopack bundler (Rust) - git subtree
  collision_type: architecture_boundary
  why_distracting: The issue is about Turbopack HMR, so an agent might assume the
    fix needs to be in the Rust Turbopack bundler code (`turbopack/`). However, the
    Next.js-specific HMR routing and cache invalidation logic for metadata routes
    lives in the TypeScript Next.js server code.
  severity: high
  source:
    path: CLAUDE.md
    lines: 14-15
- rule: 'Build all JS and Rust code: pnpm build-all'
  collision_type: meta_confusion
  why_distracting: The agent might try to run `pnpm build-all` to test its changes,
    which takes a long time and compiles Rust code, whereas the changes are only in
    TypeScript and can be tested using the fast local development watch mode (`pnpm
    --filter=next dev`).
  severity: medium
  source:
    path: CLAUDE.md
    lines: 55-56
hierarchy_analysis: The repository uses identical `CLAUDE.md` and `AGENTS.md` files
  at the root level, providing general monorepo structure and build instructions.
  There are no conflicting rules between the files since they are symlinked. The primary
  challenge is navigating the architecture boundary between the Rust Turbopack implementation
  and the TypeScript Next.js server integration.
