version: "2.0"
source:
  repo: microsoft/vscode
  base_commit: 9d3144bf84f54ab1e886fca20608dd3ddc296f64

rubric:
  # NOTE: Rubric rules disabled for this task. The judge's CONFIG_RE only matches
  # config/documentation files (CLAUDE.md, .cursorrules, etc.), but this task
  # involves modifying a TypeScript source file (workbenchThemeService.ts).
  # The gold solution correctly follows all style rules:
  # - Uses nls.localize() for user-facing messages
  # - Has JSDoc comments for the new method
  # - Uses tabs for indentation
  # - Uses arrow functions
  # However, the judge cannot detect these in source code files.
  # The tests already verify all these requirements via test_outputs.py:
  # - test_repo_tabs_not_spaces checks indentation
  # - test_repo_copyright_header checks file structure
  # - test_method_defined, test_notification_guard_conditions verify implementation

checks:
  # --- fail_to_pass tests (from PR diff) ---
  - id: test_method_defined
    type: fail_to_pass
    origin: pr_diff
    description: showThemeAutoUpdatedNotification is defined as a private void method

  - id: test_method_called_in_initialize
    type: fail_to_pass
    origin: pr_diff
    description: showThemeAutoUpdatedNotification is invoked during initialization

  - id: test_notification_guard_conditions
    type: fail_to_pass
    origin: pr_diff
    description: Method has guards for already-shown, new-user, wrong-theme, and explicit-choice

  - id: test_revert_calls_setColorTheme
    type: fail_to_pass
    origin: pr_diff
    description: Revert action looks up previous theme by settings ID and calls setColorTheme

  - id: test_suppresses_new_theme_notification
    type: fail_to_pass
    origin: pr_diff
    description: On close, stores both THEME_AUTO_UPDATED and NEW_THEME notification keys

  # --- pass_to_pass tests (static) ---
  - id: test_target_file_exists
    type: pass_to_pass
    origin: static
    description: Target theme service file exists

  - id: test_existing_notification_intact
    type: pass_to_pass
    origin: pr_diff
    description: showNewDefaultThemeNotification remains unchanged

  # --- pass_to_pass tests (repo CI commands via subprocess) ---
  - id: test_repo_node_syntax_valid
    type: pass_to_pass
    origin: repo_tests
    description: Repo CI - TypeScript files have valid Node.js parsable syntax

  - id: test_repo_no_syntax_errors
    type: pass_to_pass
    origin: repo_tests
    description: Repo CI - Target file has no basic syntax errors

  - id: test_repo_imports_valid
    type: pass_to_pass
    origin: repo_tests
    description: Repo CI - Import statements follow valid patterns

  - id: test_repo_class_structure_valid
    type: pass_to_pass
    origin: repo_tests
    description: Repo CI - WorkbenchThemeService class structure is valid

  - id: test_repo_tabs_not_spaces
    type: pass_to_pass
    origin: repo_tests
    description: Repo CI - Source file uses tabs for indentation per style guide

  - id: test_repo_copyright_header
    type: pass_to_pass
    origin: repo_tests
    description: Repo CI - File has required Microsoft copyright header
