rubric:
  - rule: "Use descriptive boolean prefixes (is/has/can/should). Extract complex conditions into named variables rather than inlining."
    source:
      path: ".claude/skills/studio-best-practices/SKILL.md"
      lines: "15-21"
      commit: "042248fd6d70bc56d49db6c16462a8cc237c2945"

  - rule: "Derive booleans from existing state rather than storing them in useState + useEffect. Avoid redundant boolean state."
    source:
      path: ".claude/skills/studio-best-practices/SKILL.md"
      lines: "38-48"
      commit: "042248fd6d70bc56d49db6c16462a8cc237c2945"

  - rule: "Avoid `as any` / `as Type` casts. Validate at boundaries with zod."
    source:
      path: ".claude/skills/studio-best-practices/SKILL.md"
      lines: "161-168"
      commit: "042248fd6d70bc56d49db6c16462a8cc237c2945"
