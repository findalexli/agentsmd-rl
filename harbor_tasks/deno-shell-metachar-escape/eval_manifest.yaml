rubric:
- rule: Node.js compatibility code is in ext/node/polyfills/. When reviewing these
    files, check behavior against Node.js docs, not just Deno conventions.
  source:
    path: .github/copilot-instructions.md
    lines: 322-325
    commit: 6710d587bc05e4275c2336fb1cc5104d5eee9fdc
- rule: Keep your changes minimal, don't do drive-by changes in a PR.
  source:
    path: CLAUDE.md
    lines: '39'
    commit: 6710d587bc05e4275c2336fb1cc5104d5eee9fdc
distractors:
- rule: 'tests/unit/ - Unit tests

    tests/specs/ - Integration tests (spec tests)'
  collision_type: scope_ambiguity
  why_distracting: The agent might try to add tests for this Node.js polyfill bug
    in `tests/unit/` or `tests/specs/`. However, Node.js compatibility tests in Deno
    typically have their own specific structure (like a dedicated node_compat folder
    or running standard Node tests), so attempting to add standard Deno unit tests
    for this would lead to confusion and out-of-scope changes.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 50-51
- rule: 'Execute your development build:

    ./target/debug/deno eval ''console.log("Hello from dev build")'''
  collision_type: meta_confusion
  why_distracting: The bug is specific to Windows `cmd.exe` escaping. If the agent
    tries to verify the fix locally using the provided development build commands
    on a Linux/Unix environment, the Windows-specific code path in `escapeShellArg`
    won't be exercised, leading to confusion about whether the fix works.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 70-72
hierarchy_analysis: The repository has a single CLAUDE.md file at the root level providing
  general guidelines for Deno development. No deeper config files exist to override
