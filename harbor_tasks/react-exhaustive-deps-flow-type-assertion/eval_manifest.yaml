  - id: exhaustive_deps_suite_passes
    type: pass_to_pass
    origin: repo_tests
    description: "Full ESLintRuleExhaustiveDeps jest test suite passes with no failures"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "ExhaustiveDeps.ts retains TypeParameter handling and is not gutted"

rubric:
