distractors:
- rule: If coordination evidence cannot be found, do not proceed to PR-ready output.
    In blocked cases, return a short explanation of what is missing.
  collision_type: meta_confusion
  why_distracting: The config strictly instructs agents to 'fail-closed' and not proceed
    to PR-ready output if coordination evidence (like issue approval) is missing.
    In a benchmark setting, the agent must bypass this policy to actually generate
    the requested bug fix.
  severity: high
  source:
    path: AGENTS.md
    lines: 53-57
- rule: Before proposing a PR, check for overlapping open PRs and issue ownership
    using gh CLI commands.
  collision_type: meta_confusion
  why_distracting: The config requires running specific GitHub CLI commands (`gh issue
    view`, `gh pr list`) to check for duplicate work before proposing a PR. An agent
    might waste time trying to execute these commands or fail if the environment lacks
    network access or the `gh` CLI.
  severity: medium
  source:
    path: AGENTS.md
    lines: 32-38
- rule: Use Copied from syntax or Modular files for duplicated code
  source:
    path: .github/copilot-instructions.md
    lines: 24-29
  source_text: "- \"Copied from\" syntax. Functions or entire classes can have a comment\
    \ at the top like this: `# Copied from transformers.models.llama.modeling_llama.rotate_half`\
    \ or `# Copied from transformers.models.t5.modeling_t5.T5LayerNorm with T5->MT5`\n\
    \  These comments are actively checked by the style tools, and copies will automatically\
    \ be updated when the base code is updated. If you need to update a copied function,\
    \ you should\n  either update the base function and use `make fixup` to propagate\
    \ the change to all copies, or simply remove the `# Copied from` comment if that\
    \ is inappropriate.\n- \"Modular\" files. These files briefly define models by\
    \ composing them using inheritance from other models. They are not meant to be\
    \ used directly. Instead, the style tools\n  automatically generate a complete\
    \ modeling file, like `modeling_bert.py`, from the modular file like `modular_bert.py`.\
    \ If a model has a modular file, the modeling file\n  should never be edited directly!\
    \ Instead, changes should be made in the modular file, and then you should run\
    \ `make fixup` to update the modeling file automatically."
  collision_type: architecture_boundary
  why_distracting: This rule governs how code duplication and model files are managed
    in the main `src/transformers/models/` directory. However, the changes in the
    gold diff apply to an internal CI script in `utils/`. Applying these synchronization
    rules or looking for modular files here would cause confusion and misdirected
    effort.
  severity: medium
- rule: Avoid direct inheritance using Copies or Modular files
  source:
    path: .ai/AGENTS.md
    lines: 64-71
  source_text: 'We try to avoid direct inheritance between model-specific files in
    `src/transformers/models/`. We have two mechanisms to manage the resulting code
    duplication:


    1) The older method is to mark classes or functions with `# Copied from ...`.
    Copies are kept in sync by `make fix-repo`. Do not edit a `# Copied from` block,
    as it will be reverted by `make fix-repo`. Ideally you should edit the code it''s
    copying from and propagate the change, but you can break the `# Copied from` link
    if needed.

    2) The newer method is to add a file named `modular_<name>.py` in the model directory.
    `modular` files **can** inherit from other models. `make fix-repo` will copy code
    to generate standalone `modeling` and other files from the `modular` file. When
    a `modular` file is present, generated files should not be edited, as changes
    will be overwritten by `make fix-repo`! Instead, edit the `modular` file. See
    [docs/source/en/modular_transformers.md](docs/source/en/modular_transformers.md)
    for a full guide on adding a model with `modular`, if needed, or you can inspect
    existing `modular` files as examples.'
  collision_type: architecture_boundary
  why_distracting: 'An agent reading this might think it needs to use a # Copied from
    mechanism or check for a modular file if they happen to move or copy utility logic.
    But these rules explicitly target `src/transformers/models/`, not CI tools in
    `utils/`.'
  severity: medium
- rule: Annotate untyped attributes
  source:
    path: .ai/skills/add-or-fix-type-checking/SKILL.md
    lines: 86-89
  source_text: "   e. **Annotate untyped attributes**. Add type annotations to instance\
    \ variables\n      set in `__init__` or elsewhere (for example `self.foo: list[int]\
    \ = []`).\n      Declare class-level attributes that are set dynamically later\n\
    \      (for example `_cache: Cache`, `_token_tensor: torch.Tensor | None`)."
  collision_type: scope_ambiguity
  why_distracting: 'Since the PR creates a new list variable `to_output = []`, an
    agent might be tempted to add a type annotation `to_output: list[...] = []` based
    on this rule. However, the PR is a minimal logic fix in a non-type-checked utility
    script, so adding type annotations would unnecessarily expand the scope.'
  severity: low
