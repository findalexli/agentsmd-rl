distractors:
- rule: 'Fail-closed behavior for agents: If coordination evidence cannot be found,
    do not proceed to PR-ready output.'
  collision_type: meta_confusion
  why_distracting: The prompt asks the agent to fix a specific bug but does not provide
    an issue link or coordination evidence. If the agent follows this rule strictly,
    it will refuse to output the fix and instead return an explanation of what is
    missing.
  severity: high
  source:
    path: CLAUDE.md
    lines: 54-58
- rule: 'No low-value busywork PRs: Do not open one-off PRs for tiny edits.'
  collision_type: scope_ambiguity
  why_distracting: The agent might misclassify this small, localized fix to a CI script
    as a 'tiny edit' or 'low-value busywork' and refuse to generate the patch.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 40-42
- rule: 'Copies and Modular Models: We try to avoid direct inheritance between model-specific
    files in src/transformers/models/.'
  collision_type: architecture_boundary
  why_distracting: The agent might try to apply the `# Copied from` mechanism or look
    for modular files, but this rule only applies to `src/transformers/models/`, whereas
    the file being edited is `utils/tests_fetcher.py`.
  severity: low
  source:
    path: CLAUDE.md
    lines: 60-66
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` are identical and apply at the
  repository root. They contain strict meta-rules about agent behavior (fail-closed,
  coordination) that conflict with the standard benchmark evaluation setup where agents
  are expected to just output the fix.
