version: "2.0"

source:
  repo: "huggingface/transformers"
  pr: 45014
  base_commit: "c9faacd7d57459157656bdffe049dabb6293f011"
  merge_commit: "b1ba6d7d2af770b9c7ab0bac38da2f242e40a6d3"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "tests_fetcher.py must parse without errors"

  - id: empty_list_skips_hub
    type: fail_to_pass
    origin: pr_diff
    description: "Empty test list must not produce a tests_hub file"

  - id: unmatched_files_skip_hub
    type: fail_to_pass
    origin: pr_diff
    description: "Files matching no job filter must not produce a tests_hub file"

  - id: matching_files_include_hub
    type: pass_to_pass
    origin: pr_diff
    description: "When real test files match jobs, tests_hub must also be written"

  - id: hub_content_is_tests
    type: pass_to_pass
    origin: pr_diff
    description: "When tests_hub is written, its content must be 'tests'"

  - id: other_jobs_correct
    type: pass_to_pass
    origin: pr_diff
    description: "Non-hub job test lists are unaffected by the fix"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "tests_fetcher.py must not be stubbed out (>= 800 lines)"

  - id: minimal_diff
    type: pass_to_pass
    origin: agent_config
    description: "Fix should be concise — no more than 30 lines added"
    source:
      path: ".github/copilot-instructions.md"
      lines: "15"
      commit: "c9faacd7d57459157656bdffe049dabb6293f011"

  - id: style_ruff
    type: pass_to_pass
    origin: agent_config
    description: "Modified file must pass ruff linting"
    source:
      path: "CLAUDE.md"
      lines: "2"
      commit: "c9faacd7d57459157656bdffe049dabb6293f011"

rubric:
  - rule: "PRs should be as brief as possible. Bugfix PRs in particular can often be only one or two lines long, and do not need large comments, docstrings or new functions in this case. Aim to minimize the size of the diff."
    source:
      path: ".github/copilot-instructions.md"
      lines: "15"
      commit: "c9faacd7d57459157656bdffe049dabb6293f011"
