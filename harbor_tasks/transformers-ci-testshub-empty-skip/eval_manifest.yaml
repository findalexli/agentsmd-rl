version: "2.0"

source:
  repo: "huggingface/transformers"
  pr: 45014
  base_commit: "c9faacd7d57459157656bdffe049dabb6293f011"
  merge_commit: "b1ba6d7d2af770b9c7ab0bac38da2f242e40a6d3"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "tests_fetcher.py must parse without errors"

  - id: repo_ruff_check
    type: pass_to_pass
    origin: repo_ci
    description: "Repo's ruff check passes on tests_fetcher.py"

  - id: repo_ruff_format_check
    type: pass_to_pass
    origin: repo_ci
    description: "Repo's ruff format check passes on tests_fetcher.py"

  - id: repo_tests_fetcher_import
    type: pass_to_pass
    origin: repo_ci
    description: "Repo's tests_fetcher module can be imported without errors"

  - id: repo_tests_fetcher_help
    type: pass_to_pass
    origin: repo_ci
    description: "Repo's tests_fetcher.py --help works"

  - id: repo_syntax_all
    type: pass_to_pass
    origin: repo_ci
    description: "All repo Python files have valid syntax"

  - id: empty_list_skips_hub
    type: fail_to_pass
    origin: pr_diff
    description: "Empty test list must not produce a tests_hub file"

  - id: unmatched_files_skip_hub
    type: fail_to_pass
    origin: pr_diff
    description: "Files matching no job filter must not produce a tests_hub file"

  - id: matching_files_include_hub
    type: pass_to_pass
    origin: pr_diff
    description: "When real test files match jobs, tests_hub must also be written"

  - id: hub_content_is_tests
    type: pass_to_pass
    origin: pr_diff
    description: "When tests_hub is written, its content must be 'tests'"

  - id: other_jobs_correct
    type: pass_to_pass
    origin: pr_diff
    description: "Non-hub job test lists are unaffected by the fix"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "tests_fetcher.py must not be stubbed out (>= 800 lines)"

  - id: minimal_diff
    type: pass_to_pass
    origin: agent_config
    description: "Fix should be concise — no more than 30 lines added"
    source:
      path: ".github/copilot-instructions.md"
      lines: "15"
      commit: "c9faacd7d57459157656bdffe049dabb6293f011"

  - id: style_ruff
    type: pass_to_pass
    origin: agent_config
    description: "Modified file must pass ruff linting"
    source:
      path: "CLAUDE.md"
      lines: "2"
      commit: "c9faacd7d57459157656bdffe049dabb6293f011"

rubric:
  - rule: "PRs should be as brief as possible. Bugfix PRs in particular can often be only one or two lines long, and do not need large comments, docstrings or new functions in this case."
    source:
      path: "utils/tests_fetcher.py"
      lines: "1106-1120"
      commit: "c9faacd7d57459157656bdffe049dabb6293f011"
    reference: "def create_test_list_from_filter(full_test_list, out_path):\n    os.makedirs(out_path, exist_ok=True)\n    all_test_files = \"\\n\".join(full_test_list)\n+\n    # Collect info: job_name, file_name and files_to_test, so we can process after the loop\n+    to_output = []\n     for job_name, _filter in JOB_TO_TEST_FILE.items():\n         file_name = os.path.join(out_path, f\"{job_name}_test_list.txt\")\n         if job_name == \"tests_hub\":\n             files_to_test = [\"tests\"]\n         else:\n             files_to_test = list(re.findall(_filter, all_test_files))\n-        print(job_name, file_name)\n+        print(job_name, file_name, len(files_to_test))\n+\n         if len(files_to_test) > 0:  # No tests -> no file with test list\n-            with open(file_name, \"w\") as f:\n-                f.write(\"\\n\".join(files_to_test))\n+            to_output.append((job_name, file_name, files_to_test))\n+\n+    # Only get `tests_hub`, which means we have 0 test file for all other jobs --> No job at all to run.\n+    if len(to_output) == 1:\n+        print(\"No test file found for any job, skipping `tests_hub` as well.\")\n+        to_output = []\n+\n+    for _, file_name, files_to_test in to_output:\n+        with open(file_name, \"w\") as f:\n+            f.write(\"\\n\".join(files_to_test))"
