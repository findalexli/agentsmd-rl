rubric:
- rule: Run Rust unittests with SUI_SKIP_SIMTESTS=1 cargo nextest run to skip simulation
    tests as they may cause false negatives.
  source:
    path: CLAUDE.md
    lines: 35-36
  evidence: The agent is expected to verify that all existing tests pass after updating
    the protocol config and snapshots, utilizing the recommended test command.
  category: testing
  verification: llm_judge
distractors:
- rule: All new files must start with the following license in comments at the top
    of the file
  collision_type: scope_ambiguity
  why_distracting: The rule requires adding a license header to all new files. The
    agent might mistakenly add this header to auto-generated snapshot files (.snap)
    if it ends up creating new ones or regenerating them, which would break the snapshot
    format.
  severity: low
  source:
    path: CLAUDE.md
    lines: 20-23
hierarchy_analysis: The hierarchy is flat, consisting only of root-level generic instructions
  in CLAUDE.md and AGENTS.md. There are no crate-specific overrides provided in the
  context.
