rubric:
- rule: Do NOT comment the obvious. Comments should explain non-obvious algorithms,
    business logic, or subtle assumptions - not narrate what the code does.
  source:
    path: CLAUDE.md
    lines: 116-131
    commit: a6d32d34bb8e01047eca44e9e62001639090b9a7
- rule: New protocol config fields must use Option<T> type and be initialized with
    Some(value) in the version block.
  source:
    path: .claude/skills/protocol-config/SKILL.md
    lines: 99-104
    commit: a6d32d34bb8e01047eca44e9e62001639090b9a7
- rule: sui-execution/ contains the Move execution layer with versions (v0, v1, v2
    and latest)
  source:
    path: CLAUDE.md
    lines: 61-61
  evidence: The gold solution modifies files in `sui-execution/latest/sui-move-natives/`,
    correctly targeting the `latest` version of the Move execution layer rather than
    older versions (v0, v1, v2).
  category: architecture
distractors:
- rule: cargo xclippy does not recognize -p option
  collision_type: meta_confusion
  why_distracting: The agent might try to lint its specific changes using `cargo xclippy
    -p sui-protocol-config` or `-p sui-move-natives` to save time, which will fail
    because the custom xclippy command does not support the -p option.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 48-50
- rule: All new files must start with the following license in comments at the top
    of the file
  collision_type: scope_ambiguity
  why_distracting: The agent might try to add the Apache-2.0 license header to the
    snapshot files (.snap and .snap.json) that it modifies or regenerates, but these
    are auto-generated data files, not source code.
  severity: low
  source:
    path: CLAUDE.md
    lines: 18-21
- rule: skip simulation tests as they may cause false negatives with cargo nextest
  collision_type: would_cause_bug
  why_distracting: The agent might try to run tests using just `cargo nextest run`
    without the `SUI_SKIP_SIMTESTS=1` environment variable, which could cause false
    negatives or failures in simulation tests.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 33-34
hierarchy_analysis: The repository uses a root `CLAUDE.md` and `AGENTS.md` which establish
  global defaults. The root `CLAUDE.md` explicitly defers to crate-specific `CLAUDE.md`
  files, though none are provided in this context. The agent must navigate the global
  testing and linting commands, being careful with custom tools like `cargo xclippy`
  and `cargo simtest`.
version: '2.0'
