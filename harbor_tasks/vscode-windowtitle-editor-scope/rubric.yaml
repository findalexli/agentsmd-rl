# Rubric rules from VS Code agent configs
# Source: AGENTS.md and .github/copilot-instructions.md @ c2016b08f5d48a676858f04907c2b1c10ab03a44

rules:
  - rule: "Service dependencies MUST be declared in constructors and MUST NOT be accessed through the IInstantiationService at any other point in time."
    from: ".github/copilot-instructions.md:170"

  - rule: "Dependency injection - Services are injected through constructor parameters. If non-service parameters are needed, they need to come after the service parameters."
    from: ".github/copilot-instructions.md:75"

  - rule: "Use PascalCase for type names"
    from: ".github/copilot-instructions.md:124"

  - rule: "Use camelCase for function and method names"
    from: ".github/copilot-instructions.md:125"

  - rule: "Use arrow functions => over anonymous function expressions"
    from: ".github/copilot-instructions.md:142"

  - rule: "Always surround loop and conditional bodies with curly braces"
    from: ".github/copilot-instructions.md:150"

  - rule: "Open curly braces always go on the same line as whatever necessitates them"
    from: ".github/copilot-instructions.md:151"

  - rule: "Do not duplicate imports. Always reuse existing imports if they are present."
    from: ".github/copilot-instructions.md:136"

  - rule: "You MUST deal with disposables by registering them immediately after creation for later disposal. Use helpers such as DisposableStore, MutableDisposable or DisposableMap."
    from: ".github/copilot-instructions.md:160"

  - rule: "Do not leave behind blank lines where imports were removed. Ensure the surrounding code remains compact."
    from: ".github/copilot-instructions.md:137"

  - rule: "Prefer async and await over Promise and then calls"
    from: ".github/copilot-instructions.md:132"
