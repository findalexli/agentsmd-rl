- rule: Bugfix PRs should be as brief as possible and minimize the size of the diff.
    Do not add large comments, docstrings or new functions for brief fixes.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: c55f65056becad6df5f7eef7ce74ac0811fdfac6
  reference: 'Gold solution adds exactly 3 lines to tokenization_auto.py:

    "deepseek_v2", "deepseek_v3" in MODELS_WITH_INCORRECT_HUB_TOKENIZER_CLASS (after
    deepseek_vl_hybrid),

    "modernbert" in the same set (after llava_next). No comments, no docstrings, no
    new functions.

    Minimal diff following existing code style.

    '
- rule: Bugfix PRs should be brief and minimize the size of the diff, without unnecessary
    new functions or tests.
  source:
    path: .github/copilot-instructions.md
    lines: 15-15
  source_text: '- PRs should be as brief as possible. Bugfix PRs in particular can
    often be only one or two lines long, and do not need large comments, docstrings
    or new functions in this case. Aim to minimize the size of the diff.'
  evidence: The gold diff correctly follows this by executing a minimal 3-line change
    (adding 'deepseek_v2', 'deepseek_v3', and 'modernbert' to the tuple in tokenization_auto.py)
    without adding any comments, docstrings, or tests.
  category: style
  verification: llm_judge
distractors:
- rule: 'Fail-closed behavior for agents: If coordination evidence cannot be found,
    do not proceed to PR-ready output.'
  collision_type: meta_confusion
  why_distracting: The agent is operating in an isolated evaluation environment where
    coordination evidence (issue links, maintainer approval) is inherently absent.
    Following this rule would cause the agent to refuse to generate the patch, failing
    the evaluation.
  severity: high
  source:
    path: CLAUDE.md
    lines: 48-51
- rule: 'No low-value busywork PRs: Do not open one-off PRs for tiny edits.'
  collision_type: scope_ambiguity
  why_distracting: The required fix is extremely small (adding three strings to a
    set). An agent might misinterpret this as a 'tiny edit' or 'low-value busywork'
    and refuse to implement it, even though it is a critical bug fix for loading specific
    tokenizers.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 34-36
- rule: 'Copies and Modular Models: Use `# Copied from` or `modular_<name>.py` to
    manage code duplication in model-specific files.'
  collision_type: architecture_boundary
  why_distracting: The agent might mistakenly believe it needs to edit model-specific
    files (like `modular_deepseek_v2.py`) or look for `# Copied from` statements to
    fix the tokenizer issue, whereas the correct fix belongs in the central `tokenization_auto.py`
    registry.
  severity: low
  source:
    path: CLAUDE.md
    lines: 53-59
- rule: Do not edit a `# Copied from` block, as it will be reverted by `make fix-repo`.
  source:
    path: .ai/AGENTS.md
    lines: 65-65
  source_text: 1) The older method is to mark classes or functions with `# Copied
    from ...`. Copies are kept in sync by `make fix-repo`. Do not edit a `# Copied
    from` block, as it will be reverted by `make fix-repo`. Ideally you should edit
    the code it's copying from and propagate the change, but you can break the `#
    Copied from` link if needed.
  collision_type: scope_ambiguity
  why_distracting: The agent might believe the changes required for `deepseek_v2`
    and `modernbert` involve editing model-specific tokenizer files that contain `#
    Copied from` blocks, leading them to unnecessarily break links or edit base models
    instead of making the targeted fix in the `auto` mapping file.
  severity: medium
- rule: When a `modular` file is present, generated files should not be edited, as
    changes will be overwritten by `make fix-repo`!
  source:
    path: .ai/AGENTS.md
    lines: 66-66
  source_text: 2) The newer method is to add a file named `modular_<name>.py` in the
    model directory. `modular` files **can** inherit from other models. `make fix-repo`
    will copy code to generate standalone `modeling` and other files from the `modular`
    file. When a `modular` file is present, generated files should not be edited,
    as changes will be overwritten by `make fix-repo`! Instead, edit the `modular`
    file. See [docs/source/en/modular_transformers.md](docs/source/en/modular_transformers.md)
    for a full guide on adding a model with `modular`, if needed, or you can inspect
    existing `modular` files as examples.
  collision_type: architecture_boundary
  why_distracting: Since the PR involves fixing loading for missing model types, an
    agent might wrongly assume it needs to modify `modular_<name>.py` files or avoid
    editing files because they are generated, when the fix just needs to be directly
    in `tokenization_auto.py`.
  severity: medium
- rule: When adding new models, you should prefer `modular` style and inherit as many
    classes as possible from existing models.
  source:
    path: .github/copilot-instructions.md
    lines: 31-31
  source_text: When adding new models, you should prefer `modular` style and inherit
    as many classes as possible from existing models.
  collision_type: scope_ambiguity
  why_distracting: The task asks to fix missing model types in a tokenizer override
    list. An agent might misinterpret this as 'adding new models' to the repository,
    thereby trying to generate or modify `modular` files for DeepSeek or ModernBERT
    rather than just adding their strings to the auto tokenizer mapping list.
  severity: high
- rule: When writing tests, they should be added to an existing file. The only exception
    is for PRs to add a new model, when a new test directory should be created for
    that model.
  source:
    path: .github/copilot-instructions.md
    lines: 16-16
  source_text: '- When writing tests, they should be added to an existing file. The
    only exception is for PRs to add a new model, when a new test directory should
    be created for that model.'
  collision_type: would_cause_bug
  why_distracting: An agent might believe it should write tests for these 'missing
    models' and create new test directories for them, which contradicts the goal of
    a 1-2 line bugfix and is out of scope for simply adding strings to a registry.
  severity: medium
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` are at the root level and contain
  identical content. There are no conflicts between the files themselves, but their
  heavy emphasis on PR coordination and meta-behavior strongly conflicts with the
  isolated nature of a coding evaluation task.
