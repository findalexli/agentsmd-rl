version: "2.0"

source:
  repo: "facebook/react"
  pr: 0
  base_commit: "9b2d8013eed2b02193aebc37a614b37853ada214"
  merge_commit: ""

checks:
  - id: fixtures_dir_exists
    type: pass_to_pass
    origin: static
    description: "The compiler fixtures directory exists in the workspace"

  - id: fixture_file_exists
    type: fail_to_pass
    origin: pr_diff
    description: "error.fault-tolerance-reports-multiple-errors.js exists in fixtures dir"

  - id: expect_file_exists
    type: fail_to_pass
    origin: pr_diff
    description: "error.fault-tolerance-reports-multiple-errors.expect.md exists alongside fixture"

  - id: expect_reports_two_errors
    type: fail_to_pass
    origin: pr_diff
    description: "expect.md contains 'Found 2 errors' confirming both errors are reported"

  - id: expect_has_ref_access_error
    type: fail_to_pass
    origin: pr_diff
    description: "expect.md includes the ref-access-during-render error message"

  - id: expect_has_mutation_error
    type: fail_to_pass
    origin: pr_diff
    description: "expect.md includes the frozen-value / props mutation error message"

  - id: fixture_pragma_on_first_line
    type: fail_to_pass
    origin: agent_config
    description: "Feature-flag pragma comment must appear on the first line of the fixture"
    source:
      path: "compiler/CLAUDE.md"
      lines: "215"
      commit: "9b2d8013eed2b02193aebc37a614b37853ada214"

  - id: compiler_snap_passes
    type: fail_to_pass
    origin: repo_tests
    description: "yarn snap passes for the new fixture — actual compiler output matches expect.md"

rubric:
  - rule: "When the compiler encounters an unsupported but known pattern, use CompilerError.throwTodo() instead of CompilerError.invariant(). Todo errors cause graceful bailouts in production; Invariant errors are hard failures indicating unexpected/invalid states."
    source:
      path: "compiler/CLAUDE.md"
      lines: "232-248"
      commit: "9b2d8013eed2b02193aebc37a614b37853ada214"
