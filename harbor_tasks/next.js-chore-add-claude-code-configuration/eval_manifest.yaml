config_edits:
- path: .claude/commands/ci-failures.md
  tier: 2
  gold_added: "# Check CI Failures\n\nAnalyze failing tests from PR CI runs with parallel subagent log analysis.\n\n## Usage\n\
    \n```\n/ci-failures [pr-number]\n```\n\nIf no PR number provided, detect from current branch.\n\n## Instructions\n\n1.\
    \ Get the PR number from argument or current branch:\n\n   ```bash\n   gh pr view --json number,headRefName --jq '\"\\\
    (.number) \\(.headRefName)\"'\n   ```\n\n2. **CRITICAL: Always fetch fresh run IDs** - never trust cached IDs from conversation\
    \ summaries:\n\n   ```bash\n   gh api \"repos/vercel/next.js/actions/runs?branch={branch}&per_page=10\" \\\n     --jq\
    \ '.workflow_runs[] | select(.name == \"build-and-test\") | \"\\(.id) attempts:\\(.run_attempt) status:\\(.status) conclusion:\\\
    (.conclusion)\"'\n   ```\n\n3. **Prioritize the MOST RECENT run, even if in-progress:**\n   - If the latest run is `in_progress`\
    \ or `queued`, check it FIRST - it has the most relevant failures\n   - Individual jobs complete before the overall run\
    \ - analyze them as they finish\n   - Only fall back to older completed runs if the current run has no completed jobs\
    \ yet\n\n4. Get all failed jobs from the run (works for in-progress runs too):\n\n   ```bash\n   gh api \"repos/vercel/next.js/actions/runs/{run_id}/jobs?per_page=100\"\
    \ \\\n     --jq '.jobs[] | select(.conclusion == \"failure\") | \"\\(.id) \\(.name)\"'\n   ```\n\n   **Note:** For runs\
    \ with >100 jobs, paginate:\n\n   ```bash\n   gh api \"repos/vercel/next.js/actions/runs/{run_id}/jobs?per_page=100&page=2\"\
    \n   ```\n\n5. Spawn parallel haiku subagents to analyze logs (limit to 3-4 to avoid rate limits):\n   - **CRITICAL: Use\
    \ the API endpoint for logs, NOT `gh run view --log`**\n   - `gh run view --job --log` FAILS when run is in-progress\n\
    \   - **Do NOT group by job name** (e.g., \"test dev\", \"turbopack\") - group by failure pattern instead\n   - Agent\
    \ prompt should extract structured data using:\n     ```bash\n     # Extract assertion failures with context:\n     gh\
    \ api \"repos/vercel/next.js/actions/jobs/{job_id}/logs\" 2>&1 | \\\n       grep -B3 -A10 \"expect.*\\(toBe\\|toContain\\\
    |toEqual\\|toStartWith\\|toMatch\\)\" | head -100\n     # Also check for test file paths:\n     gh api \"repos/vercel/next.js/actions/jobs/{job_id}/logs\"\
    \ 2>&1 | \\\n       grep -E \"^\\s+at Object\\.|FAIL\\s+test/\" | head -20\n     ```\n\n## Common Gotchas\n\n### In-Progress\
    \ Runs\n\n- `gh run view {run_id} --job {job_id} --log` **FAILS** when run is in-progress\n- `gh api \"repos/.../actions/jobs/{job_id}/logs\"\
    ` **WORKS** for any completed job\n- Always use the API endpoint for reliability\n\n### Pagination\n\n- GitHub API paginates\
    \ at 100 jobs per page\n- Next.js CI has ~120+ jobs - always check page 2:\n  ```bash\n  gh api \".../jobs?per_page=100&page=1\"\
    \ --jq '[.jobs[] | select(.conclusion == \"failure\")] | length'\n  gh api \".../jobs?per_page=100&page=2\" --jq '[.jobs[]\
    \ | select(.conclusion == \"failure\")] | length'\n  ```\n\n### Multiple Attempts\n\n- CI runs can have multiple attempts\
    \ (retries)\n- Check attempt count: `.run_attempt` field\n- Query specific attempt: `.../runs/{id}/attempts/{n}/jobs`\n\
    - 404 on attempt endpoint means that attempt doesn't exist\n"
  gold_removed: ''
- path: CLAUDE.md
  tier: 1
  gold_added: "# Next.js Development Guide\n\n## Git Workflow\n\n**Use Graphite for all git operations** instead of raw git\
    \ commands:\n\n- `gt create <branch-name> -m \"message\"` - Create a new branch with commit\n- `gt modify -a --no-edit`\
    \ - Stage all and amend current branch's commit\n- `gt checkout <branch>` - Switch branches (use instead of `git checkout`)\n\
    - `gt sync` - Sync and restack all branches\n- `gt submit --no-edit` - Push and create/update PRs (use `--no-edit` to\
    \ avoid interactive prompts)\n- `gt log short` - View stack status\n\n**Note**: `gt submit` runs in interactive mode by\
    \ default and won't push in automated contexts. Always use `gt submit --no-edit` or `gt submit -q` when running from Claude.\n\
    \n**Graphite Stack Safety Rules:**\n\n- Graphite force-pushes everything - old commits only recoverable via reflog\n-\
    \ Never have uncommitted changes when switching branches - they get lost during restack\n- Never use `git stash` with\
    \ Graphite - causes conflicts when `gt modify` restacks\n- Never use `git checkout HEAD -- <file>` after editing - silently\
    \ restores unfixed version\n- Always use `gt checkout` (not `git checkout`) to switch branches\n- `gt modify --no-edit`\
    \ with unstaged/untracked files stages ALL changes\n- `gt sync` pulls FROM remote, doesn't push TO remote\n- `gt modify`\
    \ restacks children locally but doesn't push them\n- Always verify with `git status -sb` after stack operations\n- When\
    \ resuming from summarized conversation, never trust cached IDs - re-fetch from git/GitHub API\n\n**Safe multi-branch\
    \ fix workflow:**\n\n```bash\ngt checkout parent-branch\n# make edits\ngt modify -a --no-edit        # Stage all, amend,\
    \ restack children\ngit show HEAD -- <files>      # VERIFY fix is in commit\ngt submit --no-edit           # Push immediately\n\
    \ngt checkout child-branch      # Already restacked from gt modify\n# make edits\ngt modify -a --no-edit\ngit show HEAD\
    \ -- <files>      # VERIFY\ngt submit --no-edit\n```\n\n## Build Commands\n\n```bash\n# Build the Next.js package (dev\
    \ server only - faster)\npnpm --filter=next build:dev-server\n\n# Build everything\npnpm build\n\n# Run specific task\n\
    pnpm --filter=next taskfile <task>\n```\n\n## Fast Local Development\n\nFor iterative development, use watch mode + fast\
    \ test execution:\n\n**1. Start watch build in background:**\n\n```bash\n# Runs taskr in watch mode - auto-rebuilds on\
    \ file changes\n# Use Bash(run_in_background=true) to keep working while it runs\npnpm --filter=next dev\n```\n\n**2.\
    \ Run tests fast (no isolation, no packing):**\n\n```bash\n# NEXT_SKIP_ISOLATE=1 - skip packing Next.js for each test\
    \ (much faster)\n# testonly - runs with --runInBand (no worker isolation overhead)\nNEXT_SKIP_ISOLATE=1 NEXT_TEST_MODE=dev\
    \ pnpm testonly test/path/to/test.ts\n```\n\n**3. When done, kill the background watch process.**\n\nOnly use full `pnpm\
    \ --filter=next build` for one-off builds (after branch switch, before CI push).\n\n**Always rebuild after switching branches:**\n\
    \n```bash\ngt checkout <branch>\npnpm build   # Required before running tests (Turborepo dedupes if unchanged)\n```\n\n\
    ## Testing\n\n```bash\n# Run specific test file (development mode with Turbopack)\npnpm test-dev-turbo test/path/to/test.test.ts\n\
    \n# Run tests matching pattern\npnpm test-dev-turbo -t \"pattern\"\n\n# Run development tests\npnpm test-dev-turbo test/development/\n\
    ```\n\n**Test commands by mode:**\n\n- `pnpm test-dev-turbo` - Development mode with Turbopack (default)\n- `pnpm test-dev-webpack`\
    \ - Development mode with Webpack\n- `pnpm test-start-turbo` - Production build+start with Turbopack\n- `pnpm test-start-webpack`\
    \ - Production build+start with Webpack\n\n**Other test commands:**\n\n- `pnpm test-unit` - Run unit tests only (fast,\
    \ no browser)\n- `pnpm testonly <path>` - Run tests without rebuilding (faster iteration)\n- `pnpm new-test` - Generate\
    \ a new test file from template\n\n## Linting and Types\n\n```bash\npnpm lint              # Full lint (types, prettier,\
    \ eslint, ast-grep)\npnpm lint-fix          # Auto-fix lint issues\npnpm prettier-fix      # Fix formatting only\npnpm\
    \ types             # TypeScript type checking\n```\n\n## Investigating CI Test Failures\n\n**Use `/ci-failures` for automated\
    \ analysis** - analyzes failing jobs in parallel and groups by test file.\n\n**CI Analysis Tips:**\n\n- Don't spawn too\
    \ many parallel agents hitting GitHub API (causes rate limits)\n- Prioritize blocking jobs first: lint, types, then test\
    \ jobs\n- Use `gh api` for logs (works on in-progress runs), not `gh run view --log`\n\n**Quick triage:**\n\n```bash\n\
    # List failed jobs for a PR\ngh pr checks <pr-number> | grep fail\n\n# Get failed job names\ngh run view <run-id> --json\
    \ jobs --jq '.jobs[] | select(.conclusion == \"failure\") | .name'\n\n# Search job logs for errors (completed runs only\
    \ - use gh api for in-progress)\ngh run view <run-id> --job <job-id> --log 2>&1 | grep -E \"FAIL|Error|error:\" | head\
    \ -30\n```\n\n**Common failure patterns:**\n\n- `rust check / build` → Run `cargo fmt -- --check` locally, fix with `cargo\
    \ fmt`\n- `lint / build` → Run `pnpm prettier --write <file>` for prettier errors\n- Test failures → Run the specific\
    \ test locally with `pnpm test-dev-turbo <test-path>`\n\n**Run tests in the right mode:**\n\n```bash\n# Dev mode (Turbopack)\n\
    pnpm test-dev-turbo test/path/to/test.ts\n\n# Prod mode\npnpm test-start-turbo test/path/to/test.ts\n```\n\n## Key Directories\n\
    \n- `packages/next/src/` - Main Next.js source code\n  - `server/` - Server runtime (dev server, router, rendering)\n\
    \  - `client/` - Client-side code\n  - `build/` - Build tooling (webpack, turbopack configs)\n  - `cli/` - CLI entry points\n\
    - `packages/next/dist/` - Compiled output\n- `turbopack/` - Turbopack bundler (Rust)\n- `test/` - Test suites\n  - `development/`\
    \ - Dev server tests\n  - `production/` - Production build tests\n  - `e2e/` - End-to-end tests\n\n## Development Tips\n\
    \n- The dev server entry point is `packages/next/src/cli/next-dev.ts`\n- Router server: `packages/next/src/server/lib/router-server.ts`\n\
    - Use `DEBUG=next:*` for debug logging\n- Use `NEXT_TELEMETRY_DISABLED=1` when testing locally\n\n## Commit and PR Style\n\
    \n- Do NOT add \"Generated with Claude Code\" or co-author footers to commits or PRs\n- Keep commit messages concise and\
    \ descriptive\n- PR descriptions should focus on what changed and why\n\n## Development Anti-Patterns\n\n### Test Gotchas\n\
    \n- Mode-specific tests need `skipStart: true` + manual `next.start()` in `beforeAll` after mode check\n- Don't rely on\
    \ exact log messages - filter by content patterns, find sequences not positions\n\n### Rust/Cargo\n\n- cargo fmt uses\
    \ ASCII order (uppercase before lowercase) - just run `cargo fmt`\n\n### Node.js Source Maps\n\n- `findSourceMap()` needs\
    \ `--enable-source-maps` flag or returns undefined\n- Source map paths vary (webpack: `./src/`, tsc: `src/`) - try multiple\
    \ formats\n- `process.cwd()` in stack trace formatting produces different paths in tests vs production\n"
  gold_removed: ''
