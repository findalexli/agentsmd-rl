- path: .github/skills/verify-tests-fail-without-fix/SKILL.md
  tier: 1
  gold_added: '4. **Updates PR labels** based on result

    5. Reports result

    9. **Updates PR labels** based on result

    10. Reports result


    ## PR Labels


    The skill automatically manages two labels on the PR to indicate verification
    status:


    | Label | Color | When Applied |

    |-------|-------|--------------|

    | `s/ai-reproduction-confirmed` | 🟢 Green (#2E7D32) | Tests correctly FAIL without
    fix (AI verified tests catch the bug) |

    | `s/ai-reproduction-failed` | 🟠 Orange (#E65100) | Tests PASS without fix (AI
    verified tests don''t catch the bug) |


    **Behavior:**

    - When verification passes, adds `s/ai-reproduction-confirmed` and removes `s/ai-reproduction-failed`
    if present

    - When verification fails, adds `s/ai-reproduction-failed` and removes `s/ai-reproduction-confirmed`
    if present

    - If a PR is re-verified after fixing tests, labels are updated accordingly

    - No label = AI hasn''t verified tests yet'
  gold_removed: '4. Reports result

    9. Reports result'
distractors:
