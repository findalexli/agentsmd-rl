version: "2.0"

source:
  repo: "astral-sh/uv"
  pr: 18571
  base_commit: "685a79876028a83976acafffd94e8abe3295d72a"
  merge_commit: "b38bea427cca74f993c78213522a16a902b6046e"

checks:
  - id: compilation
    type: pass_to_pass
    origin: static
    description: "All three affected crates (uv-audit, uv-cli, uv) must compile"

  - id: enum_copy_clone_debug
    type: fail_to_pass
    origin: pr_diff
    description: "VulnerabilityServiceFormat::Osv exists with Copy, Clone, Debug derives"

  - id: cli_fields_typed
    type: fail_to_pass
    origin: pr_diff
    description: "AuditArgs.service_format is VulnerabilityServiceFormat, service_url is Option<String>"

  - id: audit_fn_accepts_service_params
    type: fail_to_pass
    origin: pr_diff
    description: "audit() uses VulnerabilityServiceFormat and service_url with API_BASE fallback"

  - id: settings_wires_service_fields
    type: fail_to_pass
    origin: pr_diff
    description: "AuditSettings includes and wires service_format and service_url"

  - id: clap_optional_dependency
    type: fail_to_pass
    origin: pr_diff
    description: "uv-audit Cargo.toml has clap listed as optional dependency"

  - id: no_unwrap_in_audit
    type: pass_to_pass
    origin: agent_config
    description: "No bare .unwrap() calls in audit.rs"
    source:
      path: "CLAUDE.md"
      lines: "7"
      commit: "685a79876028a83976acafffd94e8abe3295d72a"

  - id: top_level_imports
    type: fail_to_pass
    origin: agent_config
    description: "VulnerabilityServiceFormat imported at top of files that use it"
    source:
      path: "CLAUDE.md"
      lines: "16"
      commit: "685a79876028a83976acafffd94e8abe3295d72a"

  - id: no_panic_in_new_code
    type: pass_to_pass
    origin: agent_config
    description: "No panic!, unreachable!, or unsafe in service/mod.rs"
    source:
      path: "CLAUDE.md"
      lines: "7"
      commit: "685a79876028a83976acafffd94e8abe3295d72a"

rubric:
  - rule: "PREFER patterns like `if let` to handle fallibility"
    source:
      path: "CLAUDE.md"
      lines: "8"
      commit: "685a79876028a83976acafffd94e8abe3295d72a"

  - rule: "AVOID shortening variable names, e.g., use `version` instead of `ver`, and `requires_python` instead of `rp`"
    source:
      path: "CLAUDE.md"
      lines: "17-18"
      commit: "685a79876028a83976acafffd94e8abe3295d72a"

  - rule: "PREFER let chains (`if let` combined with `&&`) over nested `if let` statements"
    source:
      path: "CLAUDE.md"
      lines: "11"
      commit: "685a79876028a83976acafffd94e8abe3295d72a"
