    description: "uv-audit crate compiles with the clap feature enabled (validates optional dep + ValueEnum derive)"

  - id: vulnerability_service_format_is_public
    type: fail_to_pass
    origin: pr_diff
    description: "VulnerabilityServiceFormat is a public enum with Osv variant and Copy+Clone+Debug derives"

  # Structural f2p tests
  - id: cli_service_format_field
    type: fail_to_pass
    origin: pr_diff
    description: "AuditArgs.service_format is VulnerabilityServiceFormat"

  - id: cli_service_url_field
    type: fail_to_pass
    origin: pr_diff
    description: "AuditArgs.service_url is Option<String>"

  - id: cli_arg_attributes
    type: fail_to_pass
    origin: pr_diff
    description: "service_format has value_enum + default_value osv, service_url has ValueHint::Url"

  - id: audit_fn_accepts_service_params
    type: fail_to_pass
    origin: pr_diff
    description: "audit() uses VulnerabilityServiceFormat and service_url with API_BASE fallback"

  - id: settings_wires_service_fields
    type: fail_to_pass
    origin: pr_diff
    description: "AuditSettings includes and wires service_format and service_url"

  - id: uv_cli_depends_on_uv_audit
    type: fail_to_pass
    origin: pr_diff
    description: "uv-cli Cargo.toml depends on uv-audit with clap feature enabled"

  # Config-derived tests
  - id: no_unwrap_in_new_service_code
    type: pass_to_pass
    origin: agent_config
    description: "No bare .unwrap() in new service-handling code in audit.rs"
    source:
      path: "CLAUDE.md"
      lines: "7"
      commit: "685a79876028a83976acafffd94e8abe3295d72a"

  - id: top_level_imports
    type: fail_to_pass
    origin: agent_config
    description: "VulnerabilityServiceFormat imported at top of files that use it"
    source:
      path: "CLAUDE.md"
      lines: "16"
      commit: "685a79876028a83976acafffd94e8abe3295d72a"

  - id: no_panic_in_new_code
    type: pass_to_pass
    origin: agent_config
    description: "No panic!, unreachable!, or unsafe in service/mod.rs"
    source:
      path: "CLAUDE.md"
      lines: "7"
      commit: "685a79876028a83976acafffd94e8abe3295d72a"

rubric:
