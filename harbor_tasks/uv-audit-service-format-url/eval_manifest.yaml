distractors:
- rule: ALWAYS attempt to add a test case for changed behavior / PREFER integration
    tests
  collision_type: scope_ambiguity
  why_distracting: The gold solution does not add any tests. An agent strictly following
    this rule might waste significant time trying to mock the OSV API or write integration
    tests for the new CLI flags, which is out of scope for this specific architectural
    plumbing PR.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 2-3
- rule: NEVER update all dependencies in the lockfile and ALWAYS use `cargo update
    --precise` to make lockfile changes
  collision_type: meta_confusion
  why_distracting: The agent needs to add `clap` as a dependency to `uv-audit`. This
    naturally requires updating the lockfile (usually via `cargo check` or `cargo
    build`). The rule about using `cargo update --precise` applies to version bumps
    of existing dependencies, not adding new ones. An agent might get confused and
    try to use `cargo update --precise` inappropriately or fail to commit the lockfile
    changes.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 12-13
- rule: Prefer [`TypeName`] references when writing Rust doc comments.
  source:
    path: CLAUDE.md
    lines: '19'
  source_text: '- PREFER [`TypeName`] references when writing Rust doc comments'
  collision_type: meta_confusion
  why_distracting: The diff adds `///` comments on clap argument fields in `AuditArgs`
    (patch lines 77-92). Those comments are consumed as CLI help text, not primarily
    as Rustdoc. Inserting Rustdoc intra-doc links like [`VulnerabilityServiceFormat`]
    here would leak markup into user-facing help output, so ignoring this convention
    is correct for this change.
  severity: medium
hierarchy_analysis: The configuration is a flat, single-file `CLAUDE.md` at the repository
  root. There are no hierarchical conflicts, but the agent must apply these global
  rules appropriately to a multi-crate workspace refactoring task.
