  - id: qwen_type_regression
    type: pass_to_pass
    origin: repo_tests
    description: "Existing qwen mask type still works after changes"

  - id: qwen3_type_regression
    type: pass_to_pass
    origin: repo_tests
    description: "Existing qwen3 mask type still works after changes"

  - id: get_loss_mask_dispatch_rejects_unknown
    type: pass_to_pass
    origin: repo_tests
    description: "get_loss_mask raises error for unrecognized tokenizer_type"

  - id: loss_mask_binary_values
