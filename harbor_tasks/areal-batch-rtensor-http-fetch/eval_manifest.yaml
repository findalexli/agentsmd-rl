distractors:
- rule: 'Logging: `areal.utils.logging.getLogger(name)` with PascalCase names and
    register new loggers.'
  collision_type: scope_ambiguity
  why_distracting: The agent might try to refactor the existing logger in `rpc_server.py`
    to use PascalCase or register a new logger in `areal/utils/logging.py`, which
    is out of scope for this specific bug fix.
  severity: medium
  source:
    path: AGENTS.md
    lines: 54-56
- rule: Add tests for new functionality.
  collision_type: scope_ambiguity
  why_distracting: The instructions only specify modifying `rpc_server.py` and `rtensor.py`.
    Attempting to add tests would require modifying files outside the specified scope,
    violating the implicit boundary of the task.
  severity: high
  source:
    path: AGENTS.md
    lines: '34'
- rule: No hardcoded secrets, paths, or endpoints.
  collision_type: rule_conflict
  why_distracting: The agent might interpret adding the `/data/batch` route and calling
    it in `rtensor.py` as 'hardcoding an endpoint' and attempt to make the path configurable
    via environment variables or config files, overcomplicating the solution.
  severity: medium
  source:
    path: AGENTS.md
    lines: '26'
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` contain similar rules, but `AGENTS.md`
