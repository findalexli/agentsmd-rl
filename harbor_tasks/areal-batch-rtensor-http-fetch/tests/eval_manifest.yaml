distractors:
- rule: Add tests for new functionality.
  collision_type: scope_ambiguity
  why_distracting: The rule mandates adding tests for new functionality, but the task
    instruction explicitly restricts the 'Files to Modify' to just `rpc_server.py`
    and `rtensor.py`. Attempting to add tests would violate the explicit file scope
    of the prompt.
  severity: high
  source:
    path: AGENTS.md
    lines: 35-35
- rule: No hardcoded secrets, paths, or endpoints.
  collision_type: rule_conflict
  why_distracting: The rule forbids hardcoded endpoints. An agent might interpret
    this as a requirement to make the new `/data/batch` route path configurable via
    `cli_args.py` or environment variables. However, internal RPC routes in this module
    are conventionally hardcoded, and making it configurable would overcomplicate
    the PR and potentially violate the 'Ask first before modifying config structures'
    rule.
  severity: medium
  source:
    path: AGENTS.md
    lines: 24-24
- rule: Register new loggers with color in `areal/utils/logging.py`.
  collision_type: scope_ambiguity
  why_distracting: The rule requires registering new loggers with color in `areal/utils/logging.py`.
    An agent might try to create a new logger specifically for the batch endpoint,
    but the file already has an initialized logger that should be reused.
  severity: low
  source:
    path: AGENTS.md
    lines: 58-59
