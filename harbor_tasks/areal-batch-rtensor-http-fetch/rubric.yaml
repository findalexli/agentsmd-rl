# Rules from repo agent configs, evaluated by LLM judge.
# Repo: inclusionAI/AReaL @ 3142b88a5e93e991df727c81892d6cb8bd65d06e
rules:
  - rule: "No wildcard imports (`from x import *`)."
    from: "AGENTS.md:30"

  - rule: "No hardcoded secrets, paths, or endpoints."
    from: "AGENTS.md:31"

  - rule: "Follow existing code patterns in the same module."
    from: "AGENTS.md:40"

  - rule: >-
      `areal.utils.logging.getLogger(name)` with **PascalCase** names -- never
      `print` or `logging.__name__`.
    from: "AGENTS.md:90-92"

  - rule: >-
      explicit type hints; reuse `areal/api/cli_args.py` dataclasses; no
      wildcard imports; heavy optional deps inside functions.
    from: "AGENTS.md:100-101"
