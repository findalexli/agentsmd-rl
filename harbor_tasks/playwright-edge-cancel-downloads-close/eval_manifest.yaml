distractors:
- rule: Browser engine patches belong in the `browser_patches/` directory.
  collision_type: architecture_boundary
  why_distracting: The issue describes an 'Edge browser crash', which might lead an agent to believe a browser engine patch is necessary since `browser_patches/` is explicitly designated for 'Browser engine patches'. However, the fix must be implemented in Playwright's Chromium context management.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 31-32
- rule: Tests needing `browser`/`browserType`/`context` should be placed in `tests/library/`.
  collision_type: scope_ambiguity
  why_distracting: The config provides detailed instructions on where to add tests for context lifecycle (`tests/library/`). An agent might waste time trying to write an automated test for this Edge-specific crash, which is not required by the gold solution and may be difficult to reliably reproduce in the standard test environment.
  severity: low
  source:
    path: CLAUDE.md
    lines: 70-76
