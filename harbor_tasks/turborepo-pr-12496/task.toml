name = "turborepo-catalog-migration"
version = "1.0.0"
difficulty = "medium"
tags = ["typescript", "codemod", "migrate", "pnpm", "yarn"]
description = "Handle package manager catalogs in migration codemod"
cloud_native = false
docker_image = "task-env"
enable_ground_truth = true

[agent]
source = "vercel/turborepo"

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
