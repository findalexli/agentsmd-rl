rubric:
  - rule: |
      Code changes must handle Raw type ($type: 'Raw') in deserializeTaggedValue
      by returning the raw value without transformation.
    source: AGENTS.md
    weight: 2

  - rule: |
      When fixing JSON serialization bugs, ensure all tagged value types
      (DateTime, BigInt, Bytes, Decimal, Json, Raw, FieldRef, Enum) are
      handled consistently in both serialize and deserialize paths.
    source: AGENTS.md
    weight: 1

  - rule: |
      The parameterization layer must deserialize JSON values before
      stringifying them to avoid double-serialization of Date objects.
    source: AGENTS.md
    weight: 2

