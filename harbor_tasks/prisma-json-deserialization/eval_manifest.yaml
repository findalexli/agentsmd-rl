# Evaluation manifest for prisma/prisma#29182
# fix: add missing deserialization for JSON values
#
# The bug: Date objects in JSON/JSONB fields lose type info due to double-serialization
# in the parameterization layer. Date becomes a string when stored/retrieved.
#
# The fix: Use deserializeJsonObject before JSON.stringify in parameterization,
# add Raw type handling in deserializeTaggedValue, and change wrapRawValues default.

source:
  owner: prisma
  repo: prisma
  pr_number: 29182
  base_commit: 6587f54b0ebd862e13ef68e2febcdeefcc432b63
  merge_commit: 344ccd590f74716424697e915b4b7980fa4f4faf
  title: "fix: add missing deserialization for JSON values"

description: |
  Prisma Client was double-serializing Date objects when storing them in JSON/JSONB
  fields via the parameterization layer. A Date like `new Date('2024-01-01')` would be
  stored as a string `"2024-01-01T00:00:00.000Z"` and when read back, it would not be
  reconstructed as a Date object.

  The fix ensures Date objects and other complex values are properly wrapped using
  the deserializeJsonObject helper before being passed to JSON.stringify, and adds
  proper Raw type handling in the deserialization path.

