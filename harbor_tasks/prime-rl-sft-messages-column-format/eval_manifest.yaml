checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "data.py must be valid Python"

  - id: messages_column_tokenized
    type: fail_to_pass
    origin: pr_diff
    description: "SFTDataset must accept a 'messages' column and produce valid tokenized output with multiple conversation shapes"

  - id: messages_precedence
    type: fail_to_pass
    origin: pr_diff
    description: "When both 'messages' and 'prompt'/'completion' are present, messages takes precedence"

  - id: error_mentions_messages
    type: fail_to_pass
    origin: pr_diff
    description: "ValueError when missing columns should inform users about the messages format"

  - id: multiturn_messages
    type: fail_to_pass
    origin: pr_diff
    description: "Multi-turn messages must produce longer sequences than single-turn"

  - id: messages_equivalent_to_empty_prompt_completion
    type: fail_to_pass
    origin: pr_diff
    description: "Messages column is semantically equivalent to empty prompt + messages as completion"

  - id: messages_with_tool_calls
    type: fail_to_pass
    origin: pr_diff
    description: "Messages containing tool calls must be tokenized correctly via messages path"

  - id: prompt_completion_still_works
    type: pass_to_pass
    origin: pr_diff
    description: "Existing prompt+completion format must continue working"

  - id: valueerror_on_invalid_input
    type: pass_to_pass
    origin: pr_diff
    description: "Missing messages/prompt/completion must still raise ValueError"

  - id: resolve_messages_not_stub
    type: pass_to_pass
    origin: static
    description: "data.py _process handles messages column with branching logic, not a stub"

  - id: no_tryexcept_in_process
    type: pass_to_pass
    origin: agent_config
    description: "No unnecessary try/except in _process method"
