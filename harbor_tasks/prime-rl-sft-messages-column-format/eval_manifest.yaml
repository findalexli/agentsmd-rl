      lines: "5"
      commit: "7e853195ea6c7ce0cdfd67f7f00e6fb755ad0e17"

  - id: no_class_based_tests
    type: pass_to_pass
    origin: agent_config
    description: "Test file uses plain functions with pytest fixtures, not class-based tests"
    source:
      path: "AGENTS.md"
      lines: "54"
      commit: "7e853195ea6c7ce0cdfd67f7f00e6fb755ad0e17"

