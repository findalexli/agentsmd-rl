rubric:
- rule: Composition over inheritance -- keep hierarchies <= 2 levels; prefer delegation.
  source:
    path: AGENTS.md
    lines: '80'
    commit: 1927decc369d30df0037854b5d58ec7a9ca2a3b7
- rule: Never use print statements - use existing logger instead
  source:
    path: AGENTS.md
    lines: 43-45
  evidence: The gold solution uses logger.info and logger.warning from the existing logger instance rather than print statements.
  category: style
- rule: No hardcoded secrets, paths, or endpoints
  source:
    path: AGENTS.md
    lines: '24'
  evidence: The gold solution dynamically retrieves the models object via raw_request.app.state.openai_serving_models instead of hardcoding a global state reference.
  category: architecture
distractors:
- rule: Add tests for new functionality.
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to add tests for the XCCL LoRA update endpoint.
    However, testing distributed XCCL updates requires multi-node hardware (as noted
    in the integration test rule) or complex mocking of the vLLM engine and FastAPI
    state, which is out of scope for this bug fix.
  severity: medium
  source:
    path: AGENTS.md
    lines: '32'
- rule: Register new loggers with color in `areal/utils/logging.py`.
  collision_type: rule_conflict
  why_distracting: Because the agent is adding new log statements for the registry
    update, it might try to register a new logger in `areal/utils/logging.py` following
    this rule. However, it should just use the existing `logger` in `areal_vllm_server.py`.
  severity: low
  source:
    path: AGENTS.md
    lines: 61-62
hierarchy_analysis: The rules in `AGENTS.md` and `CLAUDE.md` are largely identical
  and flat. The agent must balance the general instruction to 'Add tests' against
  the specific constraint that 'Integration tests require multi-node hardware', ultimately
  deciding to skip test creation for this distributed communication bug fix.
