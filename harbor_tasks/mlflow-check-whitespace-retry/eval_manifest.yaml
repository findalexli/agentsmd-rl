rubric:
- id: top_level_imports
  weight: 1
  source:
    lines: 9-13
    commit: b65032fbbcfb5097a5a4b297700e88c171c9b2ea
    path: CLAUDE.md
  rule: 'New modules (e.g. `time`, `urllib.error`) are imported at the top of

    `dev/check_whitespace_only.py`, not lazily inside functions. This follows

    the "Code Style Principles" rule in the repository''s CLAUDE.md, which

    states that lazy imports should only be used when necessary.

    '
- id: comments_only_when_non_obvious
  weight: 1
  source:
    lines: 9-13
    commit: b65032fbbcfb5097a5a4b297700e88c171c9b2ea
    path: CLAUDE.md
  rule: 'The new helper code does not contain comments that merely restate what

    the code does (e.g. "# retry the request"); any added comments must

    explain non-obvious logic or provide context. This follows CLAUDE.md''s

    "Only add comments that explain non-obvious logic or provide additional

    context" rule.

    '
- id: cli_interface_unchanged
  weight: 1
  source:
    lines: all
    commit: b65032fbbcfb5097a5a4b297700e88c171c9b2ea
    path: dev/check_whitespace_only.py
  rule: 'The script''s CLI interface (--repo, --pr) and exit-code semantics are

    unchanged, and `.github/workflows/lint.yml` is untouched. The PR

    explicitly requires "No changes to the CLI interface or workflow file".

    '
