rubric:
- rule: Avoid unnecessary destructuring. Use dot notation to preserve context.
  source:
    path: AGENTS.md
    lines: 56-64
  evidence: The gold solution uses `props.api.theme.current`, `props.api.state.path.directory`,
    and `props.api.state.vcs?.branch` instead of destructuring `api` from `props`
    or `theme`/`state` from `api`.
  category: style
- rule: Prefer single word names for variables and functions. Only use multiple words
    if necessary.
  source:
    path: AGENTS.md
    lines: 25-45
  evidence: The gold solution uses single-word variables like `dir`, `out`, `branch`,
    `list`, `has`, `err`, and `count` in `footer.tsx`.
  category: naming
- rule: Avoid `else` statements. Prefer early returns.
  source:
    path: AGENTS.md
    lines: 76-87
  evidence: In the `Directory` component, the gold solution uses `if (branch) return
    out + ":" + branch` followed by `return out` instead of using an `else` block.
  category: style
- rule: Prefer functional array methods (flatMap, filter, map) over for loops
  source:
    path: AGENTS.md
    lines: 20-21
  evidence: The gold solution uses `.some()` and `.filter()` on the `list()` array
    to calculate `err` and `count` instead of using a `for` loop.
  category: style
distractors:
- rule: Use `Effect.gen(function* () { ... })` for composition.
  collision_type: architecture_boundary
  why_distracting: The agent might try to wrap the TUI plugin registration or data
    fetching in Effect constructs. However, this is a SolidJS frontend component that
    interacts with a specific TUI plugin API, not the Effect backend services.
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: 15-18
- rule: Keep things in one function unless composable or reusable
  collision_type: scope_ambiguity
  why_distracting: The agent might try to cram the `Directory`, `Mcp`, and `Version`
    rendering logic into a single `View` or `home_footer` function to avoid creating
    multiple functions. However, in SolidJS/React, splitting into smaller components
    is standard practice for readability and fine-grained reactivity, even if they
    are only used once.
  severity: medium
  source:
    path: AGENTS.md
    lines: 14-15
hierarchy_analysis: The root `AGENTS.md` provides general TypeScript and style guidelines
  (naming, destructuring, control flow) which apply perfectly to the SolidJS TUI code.
  The `packages/opencode/AGENTS.md` introduces Effect and Database rules, which are
  highly specific to the backend architecture and should be ignored when working on
  the TUI frontend components, creating an architecture boundary that the agent must
  respect.
