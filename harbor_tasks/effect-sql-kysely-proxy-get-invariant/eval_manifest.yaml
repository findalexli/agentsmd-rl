checks:
- id: test_hash_twice_does_not_throw
  type: fail_to_pass
  origin: pr_diff
  description: Hash.hash(builder) called twice on a kysely query builder must not throw the proxy `get` invariant TypeError.
- id: test_hash_returns_stable_value
  type: fail_to_pass
  origin: pr_diff
  description: Repeated Hash.hash calls return the same numeric hash, confirming the cached value is read directly through the proxy.
- id: test_hash_works_for_multiple_builder_shapes
  type: fail_to_pass
  origin: pr_diff
  description: 'Hash.hash twice succeeds for every kysely builder shape: selectFrom, insertInto, updateTable, deleteFrom, and builders with where/set chained.'
- id: test_proxy_returns_frozen_property_actual_value
  type: fail_to_pass
  origin: pr_diff
  description: A non-configurable, non-writable data property defined on a wrapped kysely target must be returned by the proxy with object identity preserved (ECMAScript proxy `get` invariant).
- id: test_kysely_query_compiles
  type: pass_to_pass
  origin: pr_diff
  description: selectFrom('users').selectAll() compiles to standard SQL; the proxy must not break .compile().
- id: test_repo_kysely_vitest
  type: pass_to_pass
  origin: repo_tests
  description: Upstream packages/sql-kysely/test/Kysely.test.ts must still pass.
- id: test_repo_sqlite_vitest
  type: pass_to_pass
  origin: repo_tests
  description: Upstream packages/sql-kysely/test/Sqlite.test.ts must still pass.
- id: test_package_typecheck
  type: pass_to_pass
  origin: repo_tests
  description: '`tsc -b tsconfig.json` for @effect/sql-kysely must succeed.'
