rubric:
- rule: Use @ant-design/cssinjs for all styling. Generate styles with functions named
    gen[ComponentName]Style and place in style/ directory.
  source:
    path: .github/copilot-instructions.md
    lines: 67-75
    commit: 14e3c384e9c7d5b6096ed60ae5de3db80b8a39c9
- rule: Use design tokens from the Ant Design token system. Never hardcode colors,
    sizes, or spacing values.
  source:
    path: .github/copilot-instructions.md
    lines: 72-73
    commit: 14e3c384e9c7d5b6096ed60ae5de3db80b8a39c9
- rule: Support both light and dark themes with any style changes. Use CSS logical
    properties for RTL support.
  source:
    path: .github/copilot-instructions.md
    lines: 74-76
    commit: 14e3c384e9c7d5b6096ed60ae5de3db80b8a39c9
- rule: 采用 CSS-in-JS 架构（基于 `@ant-design/cssinjs`）
  source:
    path: CLAUDE.md
    lines: 10-10
  evidence: The gold solution modifies the styles directly within the TypeScript file
    `components/date-picker/style/panel.ts` using object syntax, adhering to the CSS-in-JS
    architecture.
  category: architecture
distractors:
- rule: Changelog 必须同时提供中英文两个版本 (`CHANGELOG.en-US.md` 和 `CHANGELOG.zh-CN.md`)
  collision_type: scope_ambiguity
  why_distracting: The config mandates updating both English and Chinese changelogs
    for bug fixes. However, the task instructions explicitly restrict the scope to
    modifying `components/date-picker/style/panel.ts`. An agent attempting to update
    the changelogs would waste effort and modify out-of-scope files.
  severity: high
  source:
    path: CLAUDE.md
    lines: 94-96
- rule: 使用 `gh pr create` 创建 PR 时，必须手动填充模板内容
  collision_type: meta_confusion
  why_distracting: The config provides instructions for creating PRs using specific
    templates, and the environment contains an `antd-create-pr` skill. The agent might
    get distracted trying to open a PR or format a PR description, whereas the task
    only requires implementing the code fix.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 63-65
hierarchy_analysis: CLAUDE.md and AGENTS.md are identical in this repository. The
  primary conflict arises between the comprehensive full-lifecycle PR guidelines (which
  demand changelog updates and PR formatting) and the narrow, code-only scope of the
  prompt.
