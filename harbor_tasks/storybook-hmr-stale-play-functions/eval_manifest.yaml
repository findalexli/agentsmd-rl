distractors:
- rule: 'After making file changes, always run both formatting and linting checks: Prettier format first with `yarn prettier --write <file>`, then check linting with `yarn lint:js:cmd <file>`.

    '
  source:
    path: .github/copilot-instructions.md
    lines: 351-354
    commit: 5a9c6ecd7559ee8c7adbe30fb4b0894e369d144b
  collision_type: rule_conflict
  why_distracting: 'The lint-staged pre-commit hook only runs ESLint (not Prettier) on staged files. Requiring Prettier before ESLint contradicts the automated enforcement and may cause confusion about which formatting step is actually gating.

    '
  severity: medium
- rule: 'DO NOT use `console.log`, `console.warn`, or `console.error` directly unless in isolated files where importing loggers would significantly increase bundle size.

    '
  source:
    path: .github/copilot-instructions.md
    lines: '399'
    commit: 5a9c6ecd7559ee8c7adbe30fb4b0894e369d144b
  collision_type: scope_ambiguity
  why_distracting: 'The ''isolated files'' exception is vague — it is not defined what constitutes a ''significant'' bundle size increase. This ambiguity may cause hesitation about when console.* is acceptable in utility files like index-json.ts versus codegen files.

    '
  severity: low
- rule: 'Mock at the highest level of abstraction needed.

    '
  source:
    path: .cursor/rules/spy-mocking.mdc
    lines: '39'
    commit: 5a9c6ecd7559ee8c7adbe30fb4b0894e369d144b
  collision_type: scope_ambiguity
  why_distracting: '''Highest level of abstraction'' is subjective — for the index-json test one could mock at the Watchpack level, the debounce level, or the channel level. The scaffold test mocks at multiple levels (Watchpack, es-toolkit, logger, constants) which may seem to violate this guideline.

    '
  severity: low
