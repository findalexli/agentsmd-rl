version: '2.0'
source:
  repo: storybookjs/storybook
  pr: 33930
  base_commit: 5a9c6ecd7559ee8c7adbe30fb4b0894e369d144b
  merge_commit: 2b6c4da20192051b2d0f1c719a1eda841d2fd306
task:
  kind: code_fix
checks:
- id: test_iframe_codegen_snapshots_match
  type: fail_to_pass
  origin: repo_tests
  description: 'The Vite iframe codegen must produce HMR code that emits STORY_HOT_UPDATED from inside import.meta.hot.accept (not from a separate vite:afterUpdate listener). Validated via the upstream snapshot tests.

    '
- id: test_index_json_emits_once_for_two_paths_in_batch
  type: fail_to_pass
  origin: pr_diff
  description: 'STORY_INDEX_INVALIDATED must fire only once even when the watch batch processes two distinct paths (which produces two maybeInvalidate calls back-to-back). With a leading+trailing debounce that yields two emits (leading from call-1 + trailing from call-2). With trailing-only it yields exactly one emit. The upstream "only emits once per file change" test (single onChange) does NOT distinguish the two configs because es-toolkit''s debounce only fires the trailing edge if pendingArgs are still set — leading clears them — so this scaffold test exercises the multi-call case explicitly.

    '
- id: test_project_annotations_codegen_structure
  type: fail_to_pass
  origin: pr_diff
  description: 'The Vite project-annotations codegen must emit STORY_HOT_UPDATED inside each import.meta.hot.accept callback BEFORE invoking onGetProjectAnnotationsChanged, in both CSF4 and non-CSF4 branches.

    '
- id: test_webpack5_template_emits_in_accept
  type: fail_to_pass
  origin: pr_diff
  description: 'The webpack5 modern-entry template must emit STORY_HOT_UPDATED at the top of each webpackHot.accept callback (before onStoriesChanged / onGetProjectAnnotationsChanged) and must NOT use addStatusHandler(''idle'').

    '
- id: test_index_json_debounces_invalidation_events
  type: pass_to_pass
  origin: repo_tests
  description: 'Existing upstream test ''debounces invalidation events'' that exercises the registered route through the Watchpack mock — passes on both base and gold (the assertion logic is compatible with both edge configs).

    '
