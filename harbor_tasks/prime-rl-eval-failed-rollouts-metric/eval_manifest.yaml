rubric:
- rule: Errors should never pass silently.
  source:
    path: AGENTS.md
    lines: 23-24
  evidence: The gold solution explicitly calculates and logs `failed_groups` in `vf_utils.py`
    and tracks `failed_rollouts` in `eval_utils.py` instead of letting the missing
    data go unnoticed.
  category: style
- rule: Do not add unnecessary comments. Especially do not try to explain code change
    that reflect your work process.
  source:
    path: AGENTS.md
    lines: 8-10
  evidence: The gold solution implements the failure tracking and metric logging without
    adding any inline comments explaining the new logic.
  category: style
distractors:
- rule: It's fine that a program fails if something goes wrong as this helps us to
    catch non-obvious bugs and unforeseen side-effects earlier.
  collision_type: would_cause_bug
  why_distracting: The agent might interpret 'It's fine that a program fails if something
    goes wrong' as an instruction to raise an exception or let the program crash when
    rollouts fail. However, the PR explicitly requests tracking the failure count
    as a metric and reporting it to the monitoring system, which requires graceful
    handling rather than crashing.
  severity: high
  source:
    path: AGENTS.md
    lines: 4-6
- rule: Avoid try/except blocks unless it's really necessary.
  collision_type: architecture_boundary
  why_distracting: Because the prompt mentions failures during generation, an agent
    might think it needs to add a try/except block to catch and count these failures.
    However, the underlying generation code already catches exceptions and returns
    `None` for failed groups. The agent only needs to count the `None` values, and
    adding new exception handling would be redundant and incorrect.
  severity: medium
  source:
    path: AGENTS.md
    lines: 4-6
hierarchy_analysis: The configuration is flat, with `CLAUDE.md` simply delegating
  to `AGENTS.md`. The rules in `AGENTS.md` provide general Python guidelines (Zen
  of Python) and specific instructions on error handling and comments. The Zen of
  Python's 'Errors should never pass silently' perfectly aligns with the PR's core
  objective of surfacing hidden failures.
