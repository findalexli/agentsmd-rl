  - id: failed_rollouts_normal_metrics
    type: fail_to_pass
    origin: pr_diff
    description: "evaluate_env computes failed_rollouts = total_inputs - len(outputs) and includes in monitor metrics"

  - id: failed_rollouts_all_fail
    type: fail_to_pass
    origin: pr_diff
    description: "When all rollouts fail, failure count is still logged to monitor"

  - id: failed_groups_aggregate_warning
    type: fail_to_pass
    origin: pr_diff
    description: "generate() counts None groups and logs aggregate summary warning with failure count"

  - id: failed_rollouts_varied_counts
    type: fail_to_pass
    origin: pr_diff
    description: "evaluate_env correctly computes failure count with different input/output sizes (20 in, 15 out = 5 failed)"

  - id: compute_eval_ckpt_step_regression
    type: pass_to_pass
