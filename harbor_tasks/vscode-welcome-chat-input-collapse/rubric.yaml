# Rubric rules from VS Code agent config files
# Extracted from base commit: abea71e2b7c1daecf68232d5d2a96efe3a6bc7f0

rules:
  # From .github/copilot-instructions.md
  - rule: "Use tabs, not spaces for indentation"
    from: ".github/copilot-instructions.md:134"

  - rule: "Use PascalCase for type names"
    from: ".github/copilot-instructions.md:138"

  - rule: "Use PascalCase for enum values"
    from: ".github/copilot-instructions.md:139"

  - rule: "Use camelCase for function and method names"
    from: ".github/copilot-instructions.md:140"

  - rule: "Use camelCase for property names and local variables"
    from: ".github/copilot-instructions.md:141"

  - rule: "Use whole words in names when possible"
    from: ".github/copilot-instructions.md:142"

  - rule: "Use JSDoc style comments for functions, interfaces, enums, and classes"
    from: ".github/copilot-instructions.md:148"

  - rule: "All files must include Microsoft copyright header"
    from: ".github/copilot-instructions.md:188"

  - rule: "Always surround loop and conditional bodies with curly braces"
    from: ".github/copilot-instructions.md:167"

  - rule: "Open curly braces always go on the same line as whatever necessitates them"
    from: ".github/copilot-instructions.md:168"

  - rule: "Parenthesized constructs should have no surrounding whitespace"
    from: ".github/copilot-instructions.md:170"

  - rule: "Use arrow functions => over anonymous function expressions"
    from: ".github/copilot-instructions.md:165"

  # From .github/skills/sessions/SKILL.md
  - rule: "Dependency injection: Services are injected through constructor parameters"
    from: ".github/skills/sessions/SKILL.md:2.2"

  - rule: "vs/sessions may import from vs/workbench. vs/workbench must never import from vs/sessions"
    from: ".github/skills/sessions/SKILL.md:2.2"

  # From .github/skills/agent-sessions-layout/SKILL.md
  - rule: "Maintain fixed positions — Do not add settings-based position customization"
    from: ".github/skills/agent-sessions-layout/SKILL.md:3.1"

  - rule: "Preserve no-op methods — Unsupported features should remain as no-ops, not throw errors"
    from: ".github/skills/agent-sessions-layout/SKILL.md:3.1"

  - rule: "Use agent session parts — New part functionality goes in the agent session part classes"
    from: ".github/skills/agent-sessions-layout/SKILL.md:3.1"

  - rule: "Use separate storage keys — Agent session parts use their own storage keys prefixed with workbench.agentsession. or workbench.chatbar."
    from: ".github/skills/agent-sessions-layout/SKILL.md:3.1"
