    analysis document and create a `.pr/analysis.md` file to document the WebSocket
    vs conversation status priority. However, this is a straightforward bug fix that
    does not warrant temporary PR artifacts, and creating one would be a waste of
    effort.
  severity: low
  source:
    path: AGENTS.md
    lines: 32-34
- rule: To set up the entire repo, including frontend and backend, run `make build`.
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to run `make build` to set up and test
    the entire repository after making the frontend changes. This is unnecessary and
    wastes time, as the prompt provides specific, isolated testing instructions (`npm
    test -- status.test.ts`) for the frontend.
  severity: medium
  source:
    path: AGENTS.md
    lines: 4-6
