distractors:
- rule: 'To run the full application to debug issues: export INSTALL_DOCKER=0 ...
    make build && make run ...'
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to build and run the full application (frontend
    and backend) to debug the issue, which is unnecessary and time-consuming since
    the task provides specific instructions to run the frontend tests.
  severity: low
  source:
    path: AGENTS.md
    lines: 10-14
- rule: When working on a PR that requires design documents, scripts meant for development-only,
    or other temporary artifacts... store them in a `.pr/` directory.
  collision_type: scope_ambiguity
  why_distracting: The agent might think it needs to create a `.pr/analysis.md` or
    `.pr/notes.md` to document its debugging process for this simple bug fix, wasting
    effort on temporary artifacts.
  severity: low
  source:
    path: AGENTS.md
    lines: 38-40
