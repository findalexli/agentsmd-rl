    lines: 120-122
    commit: 0e2f4c6c1fef69f5c0ba46252d04b1cd4687b661
- rule: Follow existing code style in shell scripts. Check neighboring .sh files for
    patterns.
  source:
    path: .claude/skills/review/SKILL.md
    lines: '56'
    commit: 0e2f4c6c1fef69f5c0ba46252d04b1cd4687b661
- rule: Use clear, informative error messages that help users understand what went
    wrong
  source:
    path: .claude/skills/review/SKILL.md
    lines: 75-77
    commit: 0e2f4c6c1fef69f5c0ba46252d04b1cd4687b661
distractors:
- rule: 'When writing text such as documentation, comments, or commit messages, wrap
    literal names from ClickHouse SQL language, classes and functions, or literal
    excerpts from log messages inside inline code blocks, such as: `MergeTree`.'
  collision_type: would_cause_bug
  why_distracting: The agent might apply markdown backticks to literal names in bash
    `echo` statements (e.g., changing the error message to `echo "Failed to start
    \`clickhouse-server\`"`). In bash, backticks inside double quotes trigger command
    substitution, which would attempt to execute the command and cause a script failure
    or hang.
  severity: high
  source:
    path: AGENTS.md
    lines: 6-6
- rule: When writing text such as documentation, comments, or commit messages, write
    names of functions and methods as `f` instead of `f()`
  collision_type: scope_ambiguity
  why_distracting: The agent might misinterpret the rule about writing function names
    without parentheses (intended for documentation/comments) and apply it to bash
    code, potentially trying to modify bash function definitions or calls in a way
    that breaks bash syntax (e.g., defining `start_server {` instead of `start_server()
    {`).
  severity: medium
  source:
    path: AGENTS.md
    lines: 10-10
hierarchy_analysis: The AGENTS.md file contains rules primarily aimed at documentation,
  commit messages, and C++ code conventions. Since this task involves modifying a
  bash script (`tests/docker_scripts/stress_runner.sh`), applying markdown-specific
  formatting rules (like backticks for code blocks) to bash strings can lead to unintended
  command substitution bugs.
version: '2.0'
