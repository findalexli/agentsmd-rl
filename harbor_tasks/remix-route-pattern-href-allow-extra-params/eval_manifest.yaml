rubric:
- id: descriptive_lowercase_generics
  source:
    excerpt: 'Generics: Use descriptive lowercase names for type parameters (e.g., `source`, `method`, `pattern`) instead of single uppercase letters like `T`, `P`, or `K`'
    path: AGENTS.md
    commit: 7a028b5a1cccb5b231f6b908da2aa06a95000a7f
  rule: Generic type parameters introduced or kept in modified files use descriptive lowercase names (e.g. `source`) rather than single uppercase letters like `T`, per the AGENTS.md "Code Style" section.
- id: type_only_imports
  source:
    excerpt: 'Imports: Always use `import type { X }` for types (separate from value imports); use `export type { X }` for type exports; include `.ts` extensions'
    path: AGENTS.md
    commit: 7a028b5a1cccb5b231f6b908da2aa06a95000a7f
  rule: Any imports added or kept in `href.ts` (or other files the agent modifies) that reference only types use `import type { X }` and include the `.ts` extension on relative paths.
- id: no_unnecessary_comments
  source:
    excerpt: 'Comments: Only add non-JSDoc comments when the code is doing something surprising or non-obvious'
    path: AGENTS.md
    commit: 7a028b5a1cccb5b231f6b908da2aa06a95000a7f
  rule: The fix does not add JSDoc-style or running-commentary comments explaining what the code does. Per AGENTS.md, only non-JSDoc comments for genuinely surprising/non-obvious behavior.
- id: prefers_let_for_locals
  source:
    excerpt: 'Variables: Prefer `let` for locals, `const` only at module scope; never use `var`'
    path: AGENTS.md
    commit: 7a028b5a1cccb5b231f6b908da2aa06a95000a7f
  rule: Any local bindings the agent introduces (e.g. inside test additions) use `let`, not `const`. Module-scope bindings may use `const`.
