version: '2.0'
task:
  name: remix-route-pattern-href-allow-extra-params
  kind: code_fix
  title: Allow extra params in RoutePattern.href types
  description: The HrefParams<source> type for @remix-run/route-pattern rejects object literals with keys not declared by the route pattern, even though those keys are simply ignored at runtime. Loosen the type so extra keys typecheck while keeping required params required.
source:
  repo: remix-run/remix
  pr: 11017
  pr_url: https://github.com/remix-run/remix/pull/11017
  base_commit: 7a028b5a1cccb5b231f6b908da2aa06a95000a7f
  merge_commit: d96a99e1fa649f2a542a455d4f687c04853a1bd4
  primary_files:
  - packages/route-pattern/src/lib/types/href.ts
  - packages/route-pattern/src/lib/route-pattern.test.ts
checks:
- id: test_typecheck_baseline_passes
  type: pass_to_pass
  origin: repo_tests
  description: The package's `pnpm typecheck` script (`tsgo --noEmit`) succeeds on the source as the agent leaves it (no fixture installed).
- id: test_runtime_tests_pass
  type: pass_to_pass
  origin: repo_tests
  description: The package's `pnpm test` script (Node.js `node --test`) reports all tests passing. The fix is type-only and must not regress the runtime suite.
- id: test_extra_params_typecheck
  type: fail_to_pass
  origin: pr_diff
  description: A type-fixture exercising the four call shapes named in the instruction (`pattern.href({...required, ...extra})`) typechecks after the fix. Fails on the base commit due to TypeScript's excess-property check on `HrefParams<source>`.
- id: test_required_params_still_required
  type: fail_to_pass
  origin: pr_diff
  description: The fixture's `// @ts-expect-error` guards (on calls missing the required `:id` param) must continue to fire — i.e. they must NOT become unused suppressions (TS2578). This rejects an over-loose fix like `Record<string, ParamValue>` that would silently drop the required-param constraint.
