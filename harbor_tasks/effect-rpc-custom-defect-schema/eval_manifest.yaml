rubric:
- id: reduces_comments
  source:
    lines: 13-13
    commit: 12b1f1eadf649e30dec581b7351ba3abb12f8004
    path: AGENTS.md
  rule: 'Per AGENTS.md "Reduce comments": new code should not introduce explanatory comments unless absolutely required to explain unusual logic. JSDoc on exported APIs is acceptable; line comments inside function bodies generally are not.

    '
- id: clarity_over_cleverness
  source:
    lines: 11-11
    commit: 12b1f1eadf649e30dec581b7351ba3abb12f8004
    path: AGENTS.md
  rule: 'Per AGENTS.md "Clarity over Cleverness": choose clear, maintainable solutions. The implementation should not introduce unnecessarily clever generics or runtime tricks where a straightforward threading of the new option is sufficient.

    '
- id: includes_changeset
  source:
