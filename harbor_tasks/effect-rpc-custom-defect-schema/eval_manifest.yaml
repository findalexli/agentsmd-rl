    path: AGENTS.md
  rule: 'Per AGENTS.md "Changesets": all PRs must include a file under ``.changeset/*.md`` describing the change. The agent should add one (the upstream PR added ``custom-defect-schema.md``).

    '
- id: barrel_files_not_hand_edited
  source:
    lines: 33-35
    commit: 12b1f1eadf649e30dec581b7351ba3abb12f8004
    path: AGENTS.md
  rule: 'Per AGENTS.md, ``index.ts`` barrel files are auto-generated; if they need updating, run ``pnpm codegen`` rather than hand-editing.

