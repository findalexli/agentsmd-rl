version: '2.0'
source:
  repo: Effect-TS/effect
  pr: 6065
  pr_url: https://github.com/Effect-TS/effect/pull/6065
  base_commit: 12b1f1eadf649e30dec581b7351ba3abb12f8004
  merge_commit: 94b00c8e4c5c150f858c95262d0ff1433276ede5
  pr_title: 'feat(rpc): add defect schema option to Rpc.make'
task:
  name: effect-rpc-custom-defect-schema
  description: 'Add an optional ``defect`` parameter to ``Rpc.make`` in ``@effect/rpc`` that lets callers customise the schema used to (de)serialise defects for that RPC. Defaults to ``Schema.Defect``. The chosen schema must flow through ``Rpc.exitSchema`` and the per-RPC encoder cache used by ``RpcServer`` when sending Die responses.

    '
checks:
- id: test_exitschema_preserves_defect_object_fields
  type: fail_to_pass
  origin: pr_diff
  description: 'Round-tripping a plain object defect through ``Rpc.exitSchema`` with ``defect: Schema.Unknown`` returns the same object (fields such as ``code``/``kind`` survive).

    '
- id: test_exitschema_preserves_primitive_defect
  type: fail_to_pass
  origin: pr_diff
  description: 'Primitive (number) defects survive a custom-schema round-trip.

    '
- id: test_exitschema_preserves_nested_defect
  type: fail_to_pass
  origin: pr_diff
  description: 'Nested-object defects survive a custom-schema round-trip identically.

    '
- id: test_setsuccess_preserves_defect_schema
  type: fail_to_pass
  origin: pr_diff
  description: 'Calling ``.setSuccess(...)`` on an Rpc preserves the custom defect schema (verifies the Proto-method threading).

    '
- id: test_seterror_preserves_defect_schema
  type: fail_to_pass
  origin: pr_diff
  description: 'Calling ``.setError(...)`` on an Rpc preserves the custom defect schema.

    '
- id: test_rpcgroup_preserves_defect_schema
  type: fail_to_pass
  origin: pr_diff
  description: 'An Rpc with a custom defect schema retains it once added to an ``RpcGroup``.

    '
