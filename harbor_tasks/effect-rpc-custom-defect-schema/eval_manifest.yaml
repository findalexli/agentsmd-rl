  type: pass_to_pass
  origin: repo_tests
  description: 'The existing ``packages/platform-node/test/RpcServer.test.ts`` end-to-end suite (100 tests) still passes — exercises ``sendRequestDefect`` / ``handleEncode`` server-encoding paths.

    '
