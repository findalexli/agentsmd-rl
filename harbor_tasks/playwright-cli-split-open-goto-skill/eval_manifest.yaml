distractors:
- rule: Create new MCP tools in the browser/tools directory
  source:
    path: .claude/skills/playwright-mcp-dev/SKILL.md
    lines: 9-9
  source_text: '- Create a new tool in `packages/playwright/src/mcp/browser/tools/your-tool.ts`'
  collision_type: architecture_boundary
  why_distracting: The PR updates CLI console output in `packages/playwright/src/mcp/terminal/program.ts`.
    An agent might mistakenly think it needs to implement these changes as a new browser
    MCP tool.
  severity: high
- rule: Register MCP tools in browser/tools.ts
  source:
    path: .claude/skills/playwright-mcp-dev/SKILL.md
    lines: 10-10
  source_text: '- Register the tool in `packages/playwright/src/mcp/browser/tools.ts`'
  collision_type: architecture_boundary
  why_distracting: Because the changes are exclusively for the terminal CLI interface,
    attempting to register a browser tool would introduce bugs and violate architectural
    boundaries.
  severity: high
- rule: Add ToolCapability in mcp/config.d.ts
  source:
    path: .claude/skills/playwright-mcp-dev/SKILL.md
    lines: 11-11
  source_text: '- Add ToolCapability in `packages/playwright/src/mcp/config.d.ts`'
  collision_type: architecture_boundary
  why_distracting: The diff does not add new MCP capabilities; it only tweaks CLI
    logs and docs. Modifying the MCP type config is unnecessary and distracting.
  severity: medium
- rule: Place tests for MCP tools in mcp-<category>.spec.ts
  source:
    path: .claude/skills/playwright-mcp-dev/SKILL.md
    lines: 12-12
  source_text: '- Place new tests in `tests/mcp/mcp-<category>.spec.ts`'
  collision_type: scope_ambiguity
  why_distracting: This rule applies specifically to browser MCP tools. An agent working
    on CLI changes might mistakenly try to create an `mcp-` prefixed test instead
    of the correct `cli-` prefixed one.
  severity: medium
- rule: Implement corresponding MCP tool for new CLI commands
  source:
    path: .claude/skills/playwright-mcp-dev/SKILL.md
    lines: 24-24
  source_text: '- CLI commands are based on MCP tools. Implement the corresponding
    MCP tool as per `Adding MCP Tools` section above, if needed.'
  collision_type: scope_ambiguity
  why_distracting: The PR modifies an existing CLI implementation. Attempting to add
    or modify a corresponding MCP tool would be out of scope and unnecessary.
  severity: medium
- rule: Add a new CLI category in terminal/command.ts
  source:
    path: .claude/skills/playwright-mcp-dev/SKILL.md
    lines: 25-26
  source_text: "- Add new CLI category for tool if needed:\n  - Add Category in `packages/playwright/src/mcp/terminal/command.ts`"
  collision_type: scope_ambiguity
  why_distracting: The agent might over-engineer the PR by trying to add a new CLI
    category, when only cosmetic updates to console outputs of existing commands are
    needed.
  severity: medium
- rule: Register new command in terminal/commands.ts
  source:
    path: .claude/skills/playwright-mcp-dev/SKILL.md
    lines: 28-28
  source_text: '- Register command in `packages/playwright/src/mcp/terminal/commands.ts`'
  collision_type: scope_ambiguity
  why_distracting: The diff updates the internal implementation of the install command
    and others, not adding a new command, so modifying the registry is incorrect.
  severity: medium
