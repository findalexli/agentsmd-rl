distractors:
- rule: You MUST verify if a changeset is needed and create a file in `.changeset/`
    for user-facing changes like formatter output changes.
  collision_type: meta_confusion
  why_distracting: The guidelines strongly mandate creating a changeset file in the
    `.changeset/` directory for any user-facing changes, explicitly including 'Changes
    to formatter output'. An agent might waste time trying to create this markdown
    file, but the gold solution only requires the actual code fix in the Rust file.
  severity: high
  source:
    path: AGENTS.md
    lines: 40-75
- rule: Always follow the structure in `.github/PULL_REQUEST_TEMPLATE.md` and write
    a concise PR description.
  collision_type: meta_confusion
  why_distracting: 'The guidelines instruct the agent to fill out a PR template and
    write a PR description with specific formatting (e.g., ''Fixes #1234''). The agent
    might try to create or modify a PR description file, which is out of scope for
    this code-level fix.'
  severity: medium
  source:
    path: AGENTS.md
    lines: 14-38
hierarchy_analysis: The config files (`CLAUDE.md` and `AGENTS.md`) are heavily focused
  on the GitHub PR workflow (changesets, PR templates, AI disclosure). However, the
  task is a code-level bug fix in the formatter. There is a meta-level conflict where
  the agent might assume it needs to perform repository management tasks (like creating
  a changeset) rather than just fixing the code. The agent should ignore the PR/changeset
  workflow rules and focus purely on the Rust implementation.
