version: "2.0"

source:
  repo: "supabase/supabase"
  pr: 44561
  base_commit: "b5326ce3b2130bd89689606cb2290501832d910f"
  merge_commit: "4814672f6f95fc7ba1c0f2a23fae8ca201410009"

checks:
  - id: typescript_parses
    type: pass_to_pass
    origin: static
    description: "Modified TypeScript file must parse without syntax errors"

  - id: no_syntax_errors
    type: pass_to_pass
    origin: static
    description: "File must have balanced braces and parentheses"

  - id: enabled_uses_truthy_check_for_dbregion
    type: fail_to_pass
    origin: pr_diff
    description: "enabled property should use !!dbRegion not typeof dbRegion !== 'undefined'"

  - id: enabled_handles_empty_string
    type: fail_to_pass
    origin: pr_diff
    description: "enabled expression must properly handle empty string '' as falsy"

  - id: organization_slug_checks_preserved
    type: fail_to_pass
    origin: pr_diff
    description: "organizationSlug validation checks must be preserved"

  - id: query_options_pattern_followed
    type: pass_to_pass
    origin: static
    description: "File should follow studio-queries skill pattern with proper types"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "Modified function has real logic with queryKey, queryFn, enabled"

  # New repo_tests pass_to_pass checks
  - id: target_file_exists
    type: pass_to_pass
    origin: repo_tests
    description: "Target TypeScript file must exist and be readable"

  - id: file_has_typescript_exports
    type: pass_to_pass
    origin: repo_tests
    description: "File must have TypeScript export statements"

  - id: file_imports_react_query
    type: pass_to_pass
    origin: repo_tests
    description: "File must import from @tanstack/react-query"

  - id: file_has_proper_query_structure
    type: pass_to_pass
    origin: repo_tests
    description: "File must have standard React Query structure"

  - id: file_no_commonjs_require
    type: pass_to_pass
    origin: repo_tests
    description: "File should not use CommonJS require"

  - id: config_directory_exists
    type: pass_to_pass
    origin: repo_tests
    description: "The data/config directory must exist"

  - id: query_enabled_gating_rule
    type: fail_to_pass
    origin: agent_config
    description: "Query must be gated with 'enabled' so it doesn't run until required variables exist"
    source:
      path: ".claude/skills/studio-queries/SKILL.md"
      lines: "43"
      commit: "b5326ce3b2130bd89689606cb2290501832d910f"

  - id: query_keys_structure
    type: pass_to_pass
    origin: agent_config
    description: "Query should follow proper key structure with array keys"
    source:
      path: ".claude/skills/studio-queries/SKILL.md"
      lines: "21-24"
      commit: "b5326ce3b2130bd89689606cb2290501832d910f"

rubric:
  - rule: "Be consistent with the style of the surrounding code. Use descriptive boolean prefixes (is, has, can, should) as specified in studio-best-practices."
    source:
      path: ".claude/skills/studio-best-practices/SKILL.md"
      lines: "12-30"
      commit: "b5326ce3b2130bd89689606cb2290501832d910f"
