name = "playwright-kill-all-helper"
description = "Add kill-all CLI command to forcefully kill daemon processes and update skill documentation"
category = "cli-tool"
tags = ["typescript", "cli", "mcp", "agentmd-edit", "documentation"]
difficulty = "medium"
estimated_time = "20-30 minutes"

[environment]
image = "playwright-kill-all-helper"
setup_timeout = 600
test_timeout = 120

[solution]
type = "patch"

[evaluation]
mode = "test_file"
test_file = "tests/test_outputs.py"

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
