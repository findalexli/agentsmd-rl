distractors:
- rule: 'Messaging channels: always consider all built-in + extension channels when
    refactoring shared logic (routing, allowlists, pairing, command gating, onboarding,
    docs).'
  collision_type: scope_ambiguity
  why_distracting: The bug involves command gating and owner privileges. The rule
    instructs to consider all built-in and extension channels when refactoring shared
    logic like command gating. The agent might waste time auditing or modifying Telegram,
    Discord, Slack, etc., when the bug is specifically isolated to the HTTP ingress
    handler.
  severity: high
  source:
    path: CLAUDE.md
    lines: 18-22
- rule: Do not edit files covered by security-focused CODEOWNERS rules unless a listed
    owner explicitly asked for the change or is already reviewing it with you.
  collision_type: meta_confusion
  why_distracting: The bug is a security vulnerability (privilege escalation). The
    agent might interpret this as a security-focused file and refuse to edit it without
    explicit owner permission, failing to fix the bug.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 5-6
hierarchy_analysis: '`CLAUDE.md` and `AGENTS.md` contain identical rules. The agent
  must carefully scope its changes to the HTTP gateway despite rules encouraging cross-channel
  audits for command gating logic.'
