rubric:
- id: rule_no_manual_index_edit
  source:
    commit: 904e055143ad74b1e4cd25429f44e7a3e86db5dc
    ref: Code Style Guidelines › Barrel files
    path: AGENTS.md
  rule: Barrel `index.ts` files are auto-generated; the agent must not manually edit them. Use `pnpm codegen` to regenerate after structural changes.
- id: rule_changeset_present
  source:
    commit: 904e055143ad74b1e4cd25429f44e7a3e86db5dc
    ref: Changesets
    path: AGENTS.md
  rule: The PR includes a changeset under `.changeset/` describing the fix (effect-team requires this for all PRs touching package source).
- id: rule_reduce_comments
  source:
    commit: 904e055143ad74b1e4cd25429f44e7a3e86db5dc
    ref: Core Principles › Reduce comments
    path: AGENTS.md
  rule: New comments should be avoided unless they explain unusual or complex logic. Prefer self-describing code; trivial inline comments are unwanted.
- id: rule_clarity_over_cleverness
  source:
    commit: 904e055143ad74b1e4cd25429f44e7a3e86db5dc
    ref: Core Principles › Clarity over Cleverness
    path: AGENTS.md
  rule: Choose clear, maintainable solutions over clever or terse ones; the fix should be straightforward to read and review.
- id: rule_use_it_effect_for_tests
  source:
    commit: 904e055143ad74b1e4cd25429f44e7a3e86db5dc
    ref: Testing › it.effect Testing Pattern
    path: AGENTS.md
  rule: Effect-based tests must use `it.effect` from `@effect/vitest`, not `Effect.runSync` with vitest's own `it`. Imports must come from `@effect/vitest`, and `assert` (from `@effect/vitest/utils`) is used instead of `expect`.
- id: rule_match_existing_patterns
  source:
    commit: 904e055143ad74b1e4cd25429f44e7a3e86db5dc
    ref: Code Style Guidelines / Testing
    path: AGENTS.md
  rule: Before adding new code (or new tests), look at existing code in the repository and follow established patterns. Tests live in `packages/*/test/` for their respective package.
- id: rule_no_scratchpad_left_behind
  source:
    commit: 904e055143ad74b1e4cd25429f44e7a3e86db5dc
    ref: Running test code
    path: AGENTS.md
  rule: Throw-away exploration files belong under `scratchpad/` and must be deleted before submission; they should not be committed alongside the fix.
