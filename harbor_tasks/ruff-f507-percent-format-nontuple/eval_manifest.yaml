distractors:
- rule: Run a single mdtest file. The path to the mdtest file should be relative to
    the `crates/ty_python_semantic/resources/mdtest` folder
  collision_type: architecture_boundary
  why_distracting: The agent might try to write tests using the `mdtest` framework
    in `ty_python_semantic` because the bug involves type inference and the instructions
    mention `ruff_python_semantic`. However, this is a Ruff linter rule (`pyflakes`),
    which uses standard Python fixtures and snapshots.
  severity: high
  source:
    path: AGENTS.md
    lines: 18-21
- rule: When working on ty, PR titles should start with `[ty]` and be tagged with
    the `ty` GitHub label.
  collision_type: scope_ambiguity
  why_distracting: The agent might mistakenly classify this as a `ty` issue because
    it involves type inference and semantic analysis, leading it to apply `ty`-specific
    conventions (like PR titles or labels) to a Ruff linter bug.
  severity: medium
  source:
    path: AGENTS.md
    lines: 47-48
hierarchy_analysis: The configuration is flat with only `AGENTS.md` providing rules.
  The primary challenge is distinguishing between the `ruff` and `ty` ecosystems within
  the same repository. The bug requires using semantic analysis (`ruff_python_semantic`),
  which closely borders the `ty` type-checker domain, creating a risk that the agent
  might incorrectly apply `ty`-specific testing frameworks (`mdtest`) or conventions
  to a standard Ruff linter rule.
