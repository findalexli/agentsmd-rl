distractors:
- rule: Prefer pure functions; when mutation is unavoidable, return the mutated object instead of void.
  source:
    path: CLAUDE.md
    lines: '60'
    commit: a188556e99d94c96266671b2129e5c8cb05e46a5
  collision_type: scope_ambiguity
  why_distracting: The cleanup script is inherently side-effectful (running shell commands to delete containers). Trying to make it pure or return mutated objects makes no sense for a standalone executable script.
  severity: medium
- rule: 'Organize functions top-down: exports before helpers'
  source:
    path: CLAUDE.md
    lines: '61'
    commit: a188556e99d94c96266671b2129e5c8cb05e46a5
  collision_type: scope_ambiguity
  why_distracting: The script is a standalone executable that runs imperatively on load, not a module exporting functions. Attempting to organize it with exports would break its functionality as a simple script.
  severity: low
- rule: Use when CI tests fail on main branch after PR merge, or when investigating flaky test failures in CI environments
  source:
    path: .claude/skills/triage-ci-flake/SKILL.md
    lines: 1-5
    commit: a188556e99d94c96266671b2129e5c8cb05e46a5
  collision_type: scope_ambiguity
  why_distracting: The task mentions 'reliability' and 'orphan container conflicts' which often manifest as flaky tests in CI. An agent might mistakenly activate this skill and attempt to modify CI workflows or test retry logic instead of fixing the underlying local docker compose lifecycle.
  severity: low
