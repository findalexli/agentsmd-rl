distractors:
- rule: Prefer pure functions; when mutation is unavoidable, return the mutated object
    instead of void.
  collision_type: scope_ambiguity
  why_distracting: The cleanup script is inherently side-effectful (running shell
    commands to delete containers). Trying to make it pure or return mutated objects
    makes no sense for a standalone executable script.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 45-45
- rule: 'Organize functions top-down: exports before helpers'
  collision_type: scope_ambiguity
  why_distracting: The script is a standalone executable that runs imperatively on
    load, not a module exporting functions. Attempting to organize it with exports
    would break its functionality as a simple script.
  severity: low
  source:
    path: CLAUDE.md
    lines: 46-46
- rule: Use when CI tests fail on main branch after PR merge, or when investigating
    flaky test failures in CI environments
  source:
    path: .claude/skills/triage-ci-flake/SKILL.md
    lines: 1-5
  collision_type: scope_ambiguity
  why_distracting: The task mentions 'reliability' and 'orphan container conflicts'
    which often manifest as flaky tests in CI. An agent might mistakenly activate
    this skill and attempt to modify CI workflows or test retry logic instead of fixing
    the underlying local docker compose lifecycle.
  severity: low
hierarchy_analysis: The config hierarchy is flat, with `AGENTS.md` simply pointing
  to `CLAUDE.md`. The primary challenge is scope ambiguity, as the rules in `CLAUDE.md`
  are geared towards the core CMS logic (pure functions, exports, types) rather than
  standalone imperative Node.js scripts. Additionally, the task is highly meta-referential,
  requiring the agent to modify `CLAUDE.md` itself to update the documented Docker
  commands.
