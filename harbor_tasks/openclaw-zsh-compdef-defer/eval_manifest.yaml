rubric:
- rule: Fix applied to correct location in src/cli/completion-cli.ts
  source:
    path: src/cli/completion-cli.ts
    lines: 414-430
  evidence: The gold solution modifies src/cli/completion-cli.ts to fix the completion
    script generation, adhering to the rule that CLI wiring lives in src/cli.
  category: architecture
  reference: '+_${rootCmd}_register_completion() {

    +  if (( ! $+functions[compdef] )); then

    +    return 0

    +  fi

    +

    +  compdef _${rootCmd}_root_completion ${rootCmd}

    +  precmd_functions=(${precmd_functions:#_${rootCmd}_register_completion})

    +  unfunction _${rootCmd}_register_completion 2>/dev/null

    +}

    +

    +_${rootCmd}_register_completion

    +if (( ! $+functions[compdef] )); then

    +  typeset -ga precmd_functions

    +  if [[ -z "${precmd_functions[(r)_${rootCmd}_register_completion]}" ]]; then

    +    precmd_functions+=(_${rootCmd}_register_completion)

    +  fi

    +fi

    '
- rule: 'Source code: `src/` (CLI wiring in `src/cli`...)'
  source:
    path: AGENTS.md
    lines: 10-10
  evidence: The gold solution correctly modifies `src/cli/completion-cli.ts`, adhering
    to the architectural guideline that CLI wiring belongs in `src/cli`.
  category: architecture
