    the PR.
  severity: medium
- rule: 'Formatting: `rustfmt.toml` — `group_imports = "StdExternalCrate"`, `imports_granularity
    = "Item"` (one `use` per import)'
  source:
    path: src/rust/AGENTS.md
    lines: 28-29
  collision_type: rule_conflict
  why_distracting: The agent might try to reformat existing imports in `lib.rs` or
    `v8.rs` to match this rule, which would introduce unnecessary diff churn unrelated
    to the core task.
  severity: low
hierarchy_analysis: The root `AGENTS.md` provides general project instructions (like
  updating AGENTS.md itself), while `src/rust/AGENTS.md` provides specific architectural
  patterns (CXX bridges, JSG resources). The agent must synthesize these by applying
  the CXX bridge pattern to implement the FFI changes, and then fulfilling the root
  directive by updating the Rust-specific documentation in `src/rust/AGENTS.md` to
  reflect the new JSG resource behavior.
