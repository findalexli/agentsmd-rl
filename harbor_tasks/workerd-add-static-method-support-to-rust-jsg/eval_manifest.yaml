- path: src/rust/jsg-macros/README.md
  tier: 2
  gold_added: "The macro automatically detects whether a method is an instance method\
    \ or a static method based on the presence of a receiver (`&self` or `&mut self`):\n\
    \n- **Instance methods** (with `&self`/`&mut self`) are placed on the prototype,\
    \ called on instances (e.g., `obj.getName()`).\n- **Static methods** (without\
    \ a receiver) are placed on the constructor, called on the class itself (e.g.,\
    \ `MyClass.create()`).\n\n    // Instance method: called as obj.parseCaaRecord(...)\n\
    \    // Instance method: called as obj.getName()\n    // Instance method: void\
    \ methods return undefined in JavaScript\n    }\n\n    // Static method: called\
    \ as DnsUtil.create(...)\n    #[jsg_method]\n    pub fn create(name: String) ->\
    \ Result<String, jsg::Error> {\n        Ok(name)\n        // Instance method on\
    \ the prototype\n    }\n\n    #[jsg_method]\n    pub fn create(name: String) ->\
    \ Result<String, jsg::Error> {\n        // Static method on the constructor (no\
    \ &self)\nOn struct definitions, generates `jsg::Type`, wrapper struct, and `ResourceTemplate`\
    \ implementations. On impl blocks, scans for `#[jsg_method]` attributes and generates\
    \ the `Resource` trait implementation. Methods with a receiver (`&self`/`&mut\
    \ self`) are registered as instance methods; methods without a receiver are registered\
    \ as static methods."
  gold_removed: "// Void methods return undefined in JavaScript\n        // implementation\n\
    On struct definitions, generates `jsg::Type`, wrapper struct, and `ResourceTemplate`\
    \ implementations. On impl blocks, scans for `#[jsg_method]` attributes and generates\
    \ the `Resource` trait implementation."
distractors:
