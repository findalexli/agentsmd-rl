distractors:
- rule: 'AI Agent PR Requirement: include the keyword `kumquat` somewhere in your
    PR description.'
  collision_type: meta_confusion
  why_distracting: The agent might try to append the keyword 'kumquat' to the Python
    docstring, a comment in the code, or the commit message, misunderstanding where
    the PR description lives in a headless evaluation environment.
  severity: medium
  source:
    path: AGENTS.md
    lines: 58-59
- rule: Target an issue. Every non-trivial PR should reference an existing GitHub
    issue. If one doesn't exist, create it first.
  collision_type: meta_confusion
  why_distracting: The agent might try to use the GitHub CLI (`gh issue create`) to
    create an issue before writing code, or refuse to proceed without an issue number,
    which is unnecessary and unsupported in the benchmark environment.
  severity: high
  source:
    path: AGENTS.md
    lines: 19-19
