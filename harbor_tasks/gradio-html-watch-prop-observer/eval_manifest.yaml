version: "2.0"

source:
  repo: "gradio-app/gradio"
  pr: 12988
  base_commit: "f4c3a6dcb45218722d3150baef953c731d3eccf2"
  merge_commit: "0b943a4fd0d7701203f1b79b70b5afed19ee8413"

checks:
  - id: files_exist_and_python_parses
    type: pass_to_pass
    origin: static
    description: "All three modified files exist and html.py parses without errors"

  - id: falsy_value_coalescing
    type: fail_to_pass
    origin: pr_diff
    description: "Value derivation uses ?? (nullish coalescing) not || which coerces 0 to empty string"

  - id: watch_function_defined
    type: fail_to_pass
    origin: pr_diff
    description: "A watch function is defined with callback storage for prop observation"

  - id: watch_exposed_in_js_on_load
    type: fail_to_pass
    origin: pr_diff
    description: "Watch function is passed into the js_on_load Function scope so user code can call it"

  - id: prop_changes_fire_watchers
    type: fail_to_pass
    origin: pr_diff
    description: "Backend prop changes detect changed keys and invoke registered watch callbacks"

  - id: python_docstring_documents_watch
    type: fail_to_pass
    origin: pr_diff
    description: "html.py HTML class docstring documents the watch function in js_on_load context"

  - id: existing_features_preserved
    type: pass_to_pass
    origin: static
    description: "Svelte files have real content with existing component features intact"

  # Static checks - file reading/AST parsing (not CI commands)
  - id: repo_svelte_syntax
    type: pass_to_pass
    origin: static
    description: "Svelte files are valid JS/HTML syntax"

  - id: repo_imports_parse
    type: pass_to_pass
    origin: static
    description: "Repo's Python imports parse correctly"

  - id: repo_svelte_balanced_syntax
    type: pass_to_pass
    origin: static
    description: "Svelte files have balanced braces and parentheses"

  - id: repo_python_docstring_structure
    type: pass_to_pass
    origin: static
    description: "Python docstrings in html.py have valid structure"

  - id: repo_html_component_api
    type: pass_to_pass
    origin: static
    description: "HTML component class has expected API structure"

  # CI/CD checks - actual repo commands via subprocess.run()
  - id: repo_python_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's Python files have valid syntax"

  - id: repo_ruff_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's Python linting passes on html.py"

  - id: repo_ruff_format
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's Python formatting passes on html.py"

  - id: repo_html_component_pytest
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's HTML component pytest tests pass (17 tests covering _to_publish_format and API)"

  - id: repo_html_api_pytest
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's HTML API tests (TestHTML class) pass (2 tests covering get_config and interface)"

rubric:
  - rule: "Be consistent with the style of the surrounding code."
    source:
      path: "AGENTS.md"
      lines: "43-45"
      commit: "f4c3a6dcb45218722d3150baef953c731d3eccf2"
  - rule: "Keep documentation (docstrings) accurate and up-to-date when adding new features like the watch function."
    source:
      path: "AGENTS.md"
      lines: "43"
      commit: "f4c3a6dcb45218722d3150baef953c731d3eccf2"
  - rule: "Follow existing Svelte/TypeScript patterns in the js/html directory for reactive features."
    source:
      path: "AGENTS.md"
      lines: "43-45"
      commit: "f4c3a6dcb45218722d3150baef953c731d3eccf2"
