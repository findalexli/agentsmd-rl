distractors:
- rule: The current V1 application server lives in `openhands/app_server/`.
  collision_type: architecture_boundary
  why_distracting: The config states that the V1 application server lives in `openhands/app_server/`.
    Since the task is about refactoring V1 conversation logic, an agent might incorrectly
    attempt to move `openhands/server/routes/conversation.py` into `openhands/app_server/`
    or look for the routing logic there, despite the explicit file path provided in
    the instructions.
  severity: medium
  source:
    path: AGENTS.md
    lines: 55-57
- rule: Store design documents, analysis, or temporary artifacts in a `.pr/` directory.
  collision_type: scope_ambiguity
  why_distracting: The agent might unnecessarily create a `.pr/analysis.md` or `.pr/design.md`
    file to document the refactoring of the 3 queries down to 1, wasting time on artifacts
    that are not requested for this straightforward code change.
  severity: low
  source:
    path: AGENTS.md
    lines: 34-36
- rule: Use cross-repo-testing when changes span the SDK and OpenHands server repos
    and need e2e testing.
  source:
    path: .agents/skills/cross-repo-testing/SKILL.md
    lines: 1-5
  collision_type: scope_ambiguity
  why_distracting: The task mentions reducing queries to the 'sandbox service', which
    might lead an agent to incorrectly assume it needs to perform cross-repo testing
    or e2e testing of a cloud workspace feature. However, this is purely a local backend
    refactor.
  severity: low
- rule: Use update-sdk when updating the SDK or agent-server image.
  source:
    path: .agents/skills/update-sdk/SKILL.md
    lines: 1-5
  collision_type: scope_ambiguity
  why_distracting: The task involves updating how the server interacts with the sandbox
    service, which an agent might confuse with needing to update the SDK or agent-server
    image.
  severity: low
