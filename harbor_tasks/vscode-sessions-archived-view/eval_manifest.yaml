    lines: 1-3
  evidence: 'The gold solution creates a `DisposableStore` (`_activeSessionDisposables`)
    and explicitly calls `this._activeSessionDisposables.clear()` in `setActiveSession`
    before adding a new `autorun` listener. '
  category: architecture
distractors:
- rule: Manage Agent Sessions workbench layout, including part visibility and editor
    modal state.
  collision_type: architecture_boundary
  why_distracting: The issue describes a UI glitch where the session view flickers
