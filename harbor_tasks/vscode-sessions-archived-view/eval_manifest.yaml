rubric:
  - rule: "Avoid using events to drive control flow between components. Instead, prefer direct method calls or service interactions to ensure clearer dependencies and easier traceability of logic. Events should be reserved for broadcasting state changes or notifications rather than orchestrating behavior across components."
    source:
      path: ".github/copilot-instructions.md"
      lines: "148"
      commit: "3d5035e98791181f4fb04962a8a7b127106d2626"

  - rule: "You MUST deal with disposables by registering them immediately after creation for later disposal. Use helpers such as DisposableStore, MutableDisposable or DisposableMap. Do NOT register a disposable to the containing class if the object is created within a method that is called repeatedly to avoid leaks."
    source:
      path: ".github/copilot-instructions.md"
      lines: "144"
      commit: "3d5035e98791181f4fb04962a8a7b127106d2626"
