hierarchy_analysis: The config hierarchy is minimal, relying heavily on specialized
  skills. The `memory-leak-audit` skill correctly guides the use of `DisposableStore`
  for the new observable listener. However, the UI-focused skills (`agent-sessions-layout`
  and `sessions`) pose a distraction, as the visual flickering issue is actually caused
  by a reactive state management bug in the service layer, not a UI or layout bug.
