version: "2.0"

source:
  repo: "microsoft/vscode"
  pr: 0  # no upstream PR number; task derived from manual patch
  base_commit: "a4855ab045eb06a0fbe50c1a91f5ff53b4cc990b"
  merge_commit: ""

checks:
  - id: rewriter_file_exists
    type: fail_to_pass
    origin: pr_diff
    description: "commandLineBackgroundDetachRewriter.ts is created at the expected path"

  - id: rewriter_class_exported
    type: fail_to_pass
    origin: pr_diff
    description: "CommandLineBackgroundDetachRewriter is exported and implements ICommandLineRewriter"

  - id: is_background_interface_property
    type: fail_to_pass
    origin: pr_diff
    description: "ICommandLineRewriterOptions gains optional isBackground?: boolean property"

  - id: config_setting_added
    type: fail_to_pass
    origin: pr_diff
    description: "DetachBackgroundProcesses added to TerminalChatAgentToolsSettingId enum with correct string value"

  - id: config_properties_correct
    type: fail_to_pass
    origin: pr_diff
    description: "DetachBackgroundProcesses config has included:false, restricted:true, type:boolean, default:false"

  - id: foreground_returns_undefined
    type: fail_to_pass
    origin: pr_diff
    description: "Rewriter returns undefined for foreground commands (isBackground falsy guard) - includes behavioral subprocess test"

  - id: posix_nohup_wrapping
    type: fail_to_pass
    origin: pr_diff
    description: "POSIX background commands are wrapped with 'nohup <cmd> &' - includes behavioral subprocess test for wrapping logic"

  - id: windows_powershell_wrapping
    type: fail_to_pass
    origin: pr_diff
    description: "Windows PowerShell commands wrapped with Start-Process; non-PowerShell returns undefined; double-quotes escaped - includes behavioral subprocess test"

  - id: is_background_passed_in_run_tool
    type: fail_to_pass
    origin: pr_diff
    description: "runInTerminalTool.ts passes isBackground: args.isBackground to rewriter options and imports the new rewriter - includes behavioral subprocess test"

  - id: rewriter_registered_after_sandbox
    type: fail_to_pass
    origin: pr_diff
    description: "BackgroundDetachRewriter registered after SandboxRewriter - includes behavioral subprocess test for registration order"

  - id: upstream_test_file_exists
    type: fail_to_pass
    origin: pr_diff
    description: "TypeScript test file created at test/electron-browser/commandLineBackgroundDetachRewriter.test.ts"

  - id: copyright_header
    type: pass_to_pass
    origin: agent_config
    description: "New rewriter file includes Microsoft copyright header"
    source:
      path: ".github/copilot-instructions.md"
      lines: "130"
      commit: "a4855ab045eb06a0fbe50c1a91f5ff53b4cc990b"

  - id: no_any_unknown_types
    type: pass_to_pass
    origin: agent_config
    description: "New rewriter file must not use 'any' or 'unknown' as types"
    source:
      path: ".github/copilot-instructions.md"
      lines: "140"
      commit: "a4855ab045eb06a0fbe50c1a91f5ff53b4cc990b"

  - id: no_duplicate_imports
    type: pass_to_pass
    origin: agent_config
    description: "New rewriter file must not have duplicate imports from the same module"
    source:
      path: ".github/copilot-instructions.md"
      lines: "138"
      commit: "a4855ab045eb06a0fbe50c1a91f5ff53b4cc990b"

  - id: existing_rewriters_preserved
    type: pass_to_pass
    origin: repo_tests
    description: "Existing rewriter imports (CdPrefix, PreventHistory, Sandbox) still present in runInTerminalTool.ts"

  - id: package_json_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's package.json is valid JSON"

  - id: source_files_present
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's source directory contains TypeScript files"

  - id: terminal_contrib_structure
    type: pass_to_pass
    origin: repo_tests
    description: "Terminal contrib directory structure is preserved"

rubric:
  - rule: "Use JSDoc style comments for functions, interfaces, enums, and classes"
    source:
      path: ".github/copilot-instructions.md"
      lines: "89"
      commit: "a4855ab045eb06a0fbe50c1a91f5ff53b4cc990b"

  - rule: "Prefer async and await over Promise and then calls"
    source:
      path: ".github/copilot-instructions.md"
      lines: "131"
      commit: "a4855ab045eb06a0fbe50c1a91f5ff53b4cc990b"

  - rule: "Use arrow functions => over anonymous function expressions"
    source:
      path: ".github/copilot-instructions.md"
      lines: "102"
      commit: "a4855ab045eb06a0fbe50c1a91f5ff53b4cc990b"

  - rule: "Always surround loop and conditional bodies with curly braces"
    source:
      path: ".github/copilot-instructions.md"
      lines: "113"
      commit: "a4855ab045eb06a0fbe50c1a91f5ff53b4cc990b"

  - rule: "You MUST deal with disposables by registering them immediately after creation for later disposal"
    source:
      path: ".github/copilot-instructions.md"
      lines: "144"
      commit: "a4855ab045eb06a0fbe50c1a91f5ff53b4cc990b"

  - rule: "Service dependencies MUST be declared in constructors and MUST NOT be accessed through the IInstantiationService at any other point in time"
    source:
      path: ".github/copilot-instructions.md"
      lines: "149"
      commit: "a4855ab045eb06a0fbe50c1a91f5ff53b4cc990b"
