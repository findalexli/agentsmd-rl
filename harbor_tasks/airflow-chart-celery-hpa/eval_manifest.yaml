rubric:
- rule: Document Helm chart configuration patterns including safe dict access for backward compatibility
  source:
    path: AGENTS.md
  reference: |
    The gold solution adds documentation for Helm chart changes including safe dict access
    pattern ((.Values.workers.celery).hpa).enabled and backward compatibility for renamed config paths
- rule: Update JSON schema and YAML values with deprecation notices for renamed configuration paths
  source:
    path: AGENTS.md
  reference: |
    The gold solution updates values.schema.json and values.yaml to add workers.celery.hpa
    section with deprecation notices for the old workers.hpa path
distractors:
- rule: 'Run a single test: uv run --project <PROJECT> pytest path/to/test.py::TestClass::test_method
    -xvs'
  collision_type: rule_conflict
  why_distracting: The agent might try to run the modified helm tests using the general
    `uv run --project <PROJECT> pytest ...` command. However, Helm tests require a
    specific environment to render templates, which is only provided by the `breeze
    testing helm-tests` command.
  severity: high
  source:
    path: AGENTS.md
    lines: 16-18
- rule: Never run pytest, python, or airflow commands directly on the host — always
    use breeze.
  collision_type: meta_confusion
  why_distracting: The rule strictly forbids running python directly on the host.
    However, the gold solution uses `python3` directly on the host to automate patching
    the YAML and JSON files. An agent might over-constrain itself and avoid using
    python scripts for text manipulation, or unnecessarily spin up breeze just to
    run a simple refactoring script.
  severity: medium
  source:
    path: AGENTS.md
    lines: 9-9
hierarchy_analysis: The configuration consists of identical `AGENTS.md` and `CLAUDE.md`
  files at the root level. There is no deep hierarchy to traverse, and the rules apply
  globally to the repository.
version: '2.0'
