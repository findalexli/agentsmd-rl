rubric:
- rule: Follow existing Helm template patterns for conditional rendering
  source:
    path: CLAUDE.md:Helm chart structure in chart/
- rule: Add tests for new behavior covering success, failure, and edge cases
  source:
    path: CLAUDE.md:Testing Standards
- rule: Use @pytest.mark.parametrize for multiple similar inputs
  source:
    path: CLAUDE.md:Testing Standards
- rule: Update JSON schema descriptions to reflect deprecation status
  source:
    path: CLAUDE.md:Coding Standards
- rule: 'Run specific Helm test type: `breeze testing helm-tests --use-xdist --test-type
    <type>`'
  source:
    path: CLAUDE.md
    lines: 24-24
  evidence: The PR modifies tests in `helm-tests/tests/helm_tests/airflow_core/` and
    `helm-tests/tests/helm_tests/other/`, which correspond to the `airflow_core` and
    `other` test types mentioned in the specific H
  category: testing
distractors:
- rule: 'Run a test file: `uv run --project <PROJECT> pytest path/to/test.py -xvs`'
  collision_type: rule_conflict
  why_distracting: The agent might try to run Helm tests using `uv run --project helm-tests
    pytest ...` because it looks like a standard Python project, but Helm tests require
    the dedicated `breeze testing helm-tests` command to properly render the charts
    and set up the environment.
  severity: high
  source:
    path: CLAUDE.md
    lines: 15-15
- rule: 'If uv tests fail with missing system dependencies, run the tests with breeze:
    `breeze run pytest <tests> -xvs`'
  collision_type: rule_conflict
  why_distracting: The agent might try to run `breeze run pytest <tests> -xvs` for
    the Helm tests, but Helm tests should be run with `breeze testing helm-tests`
    to ensure the Helm chart is properly built and available to the tests.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 18-18
hierarchy_analysis: '`CLAUDE.md` and `AGENTS.md` are identical. The main conflict
  is between general Python test commands (`uv run pytest`) and specific Helm test
  commands (`breeze testing helm-tests`). The agent must recognize that files in `helm-tests/`
  require the specialized Helm testing commands rather than the generic Python testing
  commands.'
version: '2.0'
