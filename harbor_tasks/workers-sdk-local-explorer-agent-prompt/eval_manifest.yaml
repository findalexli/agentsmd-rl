rubric:
- rule: No `any` type. The agent's `agent-prompt.ts` must not use the `any` keyword anywhere — properly type all parameters and return values.
  source:
    path: AGENTS.md
    lines: '92'
    commit: 525a46bca7c9a8a57972ac152ab9c400df0bf186
  evidence: 'The solution types all parameters and return values explicitly (origin: string, apiPath: string, apiEndpoint: string, text: string, clipboard: Pick<Clipboard, ''writeText''>) without using any.'
  category: style
  verification: programmatic
- rule: No non-null assertion operator (`!`). The agent's `agent-prompt.ts` must use type narrowing instead of forcing a non-null assertion.
  source:
    path: AGENTS.md
    lines: '93'
    commit: 525a46bca7c9a8a57972ac152ab9c400df0bf186
  evidence: The solution uses optional parameter defaults (clipboard = navigator.clipboard) instead of non-null assertions.
  category: style
  verification: programmatic
- rule: Use `import type { X }` for type-only imports. If the file references DOM types like `Clipboard`, it must be a type-only reference (not a runtime import).
  source:
    path: AGENTS.md
    lines: '91'
    commit: 525a46bca7c9a8a57972ac152ab9c400df0bf186
  evidence: The solution does not import any DOM types at runtime; Clipboard is used only as a type reference in the Pick utility type parameter.
  category: style
  verification: programmatic
- rule: No floating promises — every Promise must be `await`ed or explicitly `void`ed. The clipboard's `writeText` call must be awaited.
  source:
    path: AGENTS.md
    lines: '94'
    commit: 525a46bca7c9a8a57972ac152ab9c400df0bf186
  evidence: The copyTextToClipboard function awaits clipboard.writeText(text) and returns Promise<void>.
  category: style
  verification: programmatic
- rule: Always use curly braces for control flow.
  source:
    path: AGENTS.md
    lines: '95'
    commit: 525a46bca7c9a8a57972ac152ab9c400df0bf186
  evidence: The solution has no control flow statements beyond function bodies, satisfying the rule trivially.
  category: style
  verification: programmatic
- rule: Format with tabs (not spaces), double quotes, semicolons. The file should follow the repository's oxfmt style.
  source:
    path: AGENTS.md
    lines: 102-106
    commit: 525a46bca7c9a8a57972ac152ab9c400df0bf186
  evidence: The solution uses tabs for indentation, double quotes for strings, and semicolons at statement ends, matching the oxfmt style.
  category: style
  verification: programmatic
distractors:
- rule: Prefix unused variables with `_`.
  source:
    path: AGENTS.md
    lines: '97'
    commit: 525a46bca7c9a8a57972ac152ab9c400df0bf186
  collision_type: rule_conflict
  why_distracting: AGENT_PROMPT_TEMPLATE is a module-private constant that IS used by createLocalExplorerPrompt, but an agent scanning the code-style section may incorrectly prefix it with '_' as 'unused' since it is not exported, breaking the template reference.
  severity: medium
