source:
  pr: All-Hands-AI/OpenHands#13786
  title: "fix(frontend): prevent budget/credit error banner from disappearing immediately"
  merge_commit: 69d281c6be58f07510a3c9c795c8cc83ec69e0ed
  base_commit: 8ce3089a68018c507025c7410ee3ba25856b23fd

checks:
  # Fail-to-pass tests (these should FAIL on base commit, PASS on fix)
  - id: test_budget_error_persists_on_user_event
    type: pytest
    description: "Budget error should NOT be cleared by user message events"
    origin: gold

  - id: test_budget_error_persists_on_state_update
    type: pytest
    description: "Budget error should NOT be cleared by state update events"
    origin: gold

  - id: test_budget_error_persists_through_multiple_non_agent_events
    type: pytest
    description: "Budget error should persist through rapid non-agent events (~500ms bug)"
    origin: gold

  # Pass-to-pass tests (these should PASS on both base and fix)
  - id: test_budget_error_clears_on_agent_event
    type: pytest
    description: "Budget error SHOULD clear when agent event is received"
    origin: gold

  - id: test_budget_error_clears_after_sequence_with_user_then_agent
    type: pytest
    description: "Budget error clears after user events then agent event"
    origin: gold

  - id: test_non_budget_error_clears_on_user_event
    type: pytest
    description: "Non-budget errors should still clear on user events"
    origin: gold

  - id: test_non_budget_error_clears_on_state_update
    type: pytest
    description: "Non-budget errors should clear on state update"
    origin: gold

  # Pass-to-pass: Repo CI tests (ensure fix doesn't break existing functionality)
  - id: test_repo_typecheck
    type: pass_to_pass
    origin: repo_tests
    description: "Repo TypeScript typecheck passes (react-router typegen && tsc)"

  - id: test_repo_translation_completeness
    type: pass_to_pass
    origin: repo_tests
    description: "Repo translation completeness check passes"

  - id: test_repo_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Repo unit tests pass (npm run test with vitest)"

  - id: test_repo_error_handling_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Error handling & recovery tests pass (covers modified WebSocket context code)"

  # Structural tests
  - id: test_frontend_builds
    type: pytest
    description: "Frontend TypeScript builds without errors"
    origin: gold

  # Agent config check - from AGENTS.md
  - id: test_frontend_linting_passes
    type: pytest
    description: "Frontend linting passes (npm run lint)"
    origin: agent_config
    source:
      file: AGENTS.md
      lines: "44-46"
      text: "If you've made changes to the frontend, you should run cd frontend && npm run lint:fix && npm run build"

rubric:
  - rule: "Follow the frontend data fetching architecture: UI components → TanStack Query hooks → Data Access Layer (frontend/src/api). Never call API client methods directly from UI components."
    source:
      path: "AGENTS.md"
      lines: "134-140"
      commit: "8ce3089a68018c507025c7410ee3ba25856b23fd"

  - rule: "Install pre-commit hooks before making any changes to the codebase by running `make install-pre-commit-hooks`."
    source:
      path: "AGENTS.md"
      lines: "16-18"
      commit: "8ce3089a68018c507025c7410ee3ba25856b23fd"

  - rule: "Use i18n keys for user-facing error messages. Import I18nKey from the i18n declaration file and use consistent translation keys for error states."
    source:
      path: "AGENTS.md"
      lines: "132-133"
      commit: "8ce3089a68018c507025c7410ee3ba25856b23fd"
