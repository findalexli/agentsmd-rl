name = "mantine-scrollarea-overscroll-behavior"
title = "Fix ScrollArea overscroll-behavior for single-axis scrollbars"
description = """When ScrollArea has scrollbars='x' or scrollbars='y', the overscroll-behavior CSS property should only apply to that axis. Without this fix, a horizontal ScrollArea consumes vertical scroll events, preventing parent containers from scrolling."""
type = "git"
difficulty = "easy"
tags = ["react", "css", "javascript", "typescript", "mantine"]
estimated_time = "15 min"

[environment]
type = "docker"

[solution]
type = "patch"
file = "packages/@mantine/core/src/components/ScrollArea/ScrollArea.tsx"
