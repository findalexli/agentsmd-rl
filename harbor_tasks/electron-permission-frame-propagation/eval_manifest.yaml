distractors:
- rule: Test your changes (Leave the user to do this, don't run these commands unless
    asked)
  collision_type: meta_confusion
  why_distracting: An agent would naturally want to verify its C++ changes by running
    the test suite, but the instructions explicitly forbid running `e start` or `e
    test` unless asked.
  severity: high
  source:
    path: CLAUDE.md
    lines: 73-75
- rule: Fix existing patches 99% of the time rather than creating new ones
  collision_type: scope_ambiguity
  why_distracting: Because the issue involves core Chromium concepts like `RenderFrameHost`
    and permissions, the agent might mistakenly assume it needs to modify or create
    a Chromium patch in `patches/chromium/` rather than editing Electron's native
    C++ code.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 91-91
- rule: Guide for performing Chromium version upgrades in the Electron project.
  source:
    path: .claude/skills/electron-chromium-upgrade/SKILL.md
    lines: 1-5
  collision_type: scope_ambiguity
  why_distracting: The agent might activate this skill thinking the issue is related
    to a Chromium upgrade or patch conflict, leading it to waste time on the patch
    application workflow instead of fixing the C++ logic in Electron.
  severity: medium
hierarchy_analysis: The configuration consists of a single flat file (`CLAUDE.md`)
  that provides workflow and tooling instructions. There are no hierarchical conflicts,
  as the rules primarily dictate development loop constraints rather than code-level
  styling.
