distractors:
- rule: 'If you modified patched files in Chromium: cd .. -> git commit -> e patches
    chromium'
  collision_type: architecture_boundary
  why_distracting: Because the bug involves Chromium concepts like `RenderFrameHost`,
    `WebContents`, and permission origins, an agent might mistakenly believe it needs
    to modify Chromium source code and export a patch. However, the bug is entirely
    within Electron's wrapper classes, so no Chromium patches are needed.
  severity: high
  source:
    path: CLAUDE.md
    lines: 78-83
- rule: 'Test your changes (Leave the user to do this, don''t run these commands unless
    asked): e start, e test'
  collision_type: rule_conflict
  why_distracting: An agent might naturally want to run `e test` to verify that the
    permission origin fix works correctly for iframes, but the instructions explicitly
    forbid running these commands autonomously.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 74-76
hierarchy_analysis: Only a single root-level `CLAUDE.md` file is provided, so there
  are no hierarchical conflicts. The guidance focuses heavily on the build system
  (`e` commands) and the boundary between Electron code and Chromium patches.
