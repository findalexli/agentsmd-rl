# Rubric — soft/subjective rules from agent config files
rubric:
  - rule: "Scan helper methods must not call back into Scan(). Crafted input with many consecutive constructs can cause unbounded stack growth. Instead, have helpers advance scanner state and return to Scan's main for loop via continue."
    source: "go/vt/sqlparser/AGENTS.md"
    reference: |
      The fix replaces the recursive nested-Tokenizer approach with an
      inVersionedComment flag in the main scan loop. Helpers never recurse
      into Scan() — they advance state and continue.

  - rule: "Use vterrors.Errorf or vtrpcpb.Code for error handling, not bare errors or fmt.Errorf."
    source: "AGENTS.md (root)"
    reference: |
      Error paths in the tokenizer use LEX_ERROR with no string content
      when encountering malformed input, consistent with existing lex
      error pattern in the codebase.

  - rule: "Do NOT add explanatory comments unless asked. Do NOT make improvements beyond the specific task. If the task is complete, STOP."
    source: "AGENTS.md (root)"
    reference: |
      The new code adds inline comments for the version flag logic but
      these are minimal and focused on the specific fix.

