    description: "Notification offers a Browse Themes action (workbench.action.selectTheme or browseThemes label)"

  - id: has_revert_action
    type: fail_to_pass
    origin: pr_diff
    description: "Notification offers a Revert action that calls setColorTheme to restore the previous default"

  - id: stores_shown_flag_on_close
    type: fail_to_pass
