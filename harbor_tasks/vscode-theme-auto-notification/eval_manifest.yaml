version: "2.0"

source:
  repo: "microsoft/vscode"
  pr: 0  # exact PR unknown; fix identified from base commit af50a47c
  base_commit: "af50a47c13e23e0b3c46719dbd92fe00144362a5"
  merge_commit: ""

checks:
  # Pass-to-pass (repo_tests) — CI/validity checks
  - id: test_repo_git_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Git repository is in valid state"

  - id: test_repo_package_json_valid
    type: pass_to_pass
    origin: repo_tests
    description: "package.json is valid JSON"

  - id: test_repo_target_file_exists
    type: pass_to_pass
    origin: repo_tests
    description: "Target file (workbenchThemeService.ts) exists"

  - id: test_repo_theme_test_file_exists
    type: pass_to_pass
    origin: repo_tests
    description: "Theme test file exists"

  - id: test_repo_ts_syntax_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Target TypeScript file has balanced braces (basic syntax check)"

  - id: test_repo_product_json_valid
    type: pass_to_pass
    origin: repo_tests
    description: "product.json is valid JSON"

  - id: test_repo_settings_json_comments
    type: pass_to_pass
    origin: repo_tests
    description: ".vscode/settings.json exists (may contain comments, not strict JSON)"

  # Fail-to-pass (pr_diff) — core behavioral checks
  - id: method_exists
    type: fail_to_pass
    origin: pr_diff
    description: "showThemeAutoUpdatedNotification private method is defined in WorkbenchThemeService"

  - id: method_called_in_init
    type: fail_to_pass
    origin: pr_diff
    description: "showThemeAutoUpdatedNotification is called during theme initialization"

  - id: storage_key_for_one_time_notification
    type: fail_to_pass
    origin: pr_diff
    description: "A storage key constant exists and is read via getBoolean to prevent repeat display"

  - id: skips_new_users
    type: fail_to_pass
    origin: pr_diff
    description: "storageService.isNew check suppresses notification for brand-new users"

  - id: skips_explicit_theme_choice
    type: fail_to_pass
    origin: pr_diff
    description: "isDefaultColorTheme() guard prevents notification for users who explicitly chose their theme"

  - id: has_browse_themes_action
    type: fail_to_pass
    origin: pr_diff
    description: "Notification offers a Browse Themes action (workbench.action.selectTheme or browseThemes label)"

  - id: has_revert_action
    type: fail_to_pass
    origin: pr_diff
    description: "Notification offers a Revert action that calls setColorTheme to restore the previous default"

  - id: stores_shown_flag_on_close
    type: fail_to_pass
    origin: pr_diff
    description: "THEME_AUTO_UPDATED_NOTIFICATION_KEY is persisted to storage when notification is dismissed"

  - id: nls_localize_used_for_notification
    type: fail_to_pass
    origin: agent_config
    description: "Notification message strings use nls.localize for externalization/localization"
    source:
      path: ".github/copilot-instructions.md"
      lines: "132"
      commit: "af50a47c13e23e0b3c46719dbd92fe00144362a5"

  - id: disposable_registered_with_register
    type: fail_to_pass
    origin: agent_config
    description: "Event listener on notification handle is registered via this._register for proper disposal"
    source:
      path: ".github/copilot-instructions.md"
      lines: "144"
      commit: "af50a47c13e23e0b3c46719dbd92fe00144362a5"

rubric:
  - rule: "Use title-style capitalization for button/action labels (each word capitalized, prepositions of ≤4 letters lowercase unless first/last)."
    source:
      path: ".github/copilot-instructions.md"
      lines: "100-101"
      commit: "af50a47c13e23e0b3c46719dbd92fe00144362a5"

  - rule: "JSDoc comment should be added to the new private method describing its purpose and behavior."
    source:
      path: ".github/copilot-instructions.md"
      lines: "88"
      commit: "af50a47c13e23e0b3c46719dbd92fe00144362a5"
