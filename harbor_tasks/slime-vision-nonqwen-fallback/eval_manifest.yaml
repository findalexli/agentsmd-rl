rubric:
- rule: Ensure required training fields (like `tokens`) are populated for each generated
    sample.
  source:
    path: .claude/skills/add-rollout-function/SKILL.md
    lines: 72-77
  source_text: 'For each generated sample, ensure required training fields are populated
    consistently with your objective:


    - `tokens`

    - `response_length`

    - `reward` (or reward dict if your setup uses keyed rewards)

    - `status`'
  evidence: In `slime/rollout/sglang_rollout.py`, when a multimodal first-turn is
    detected, the gold diff explicitly initializes `sample.tokens = prompt_ids` if
    it is missing, ensuring the tokens field is properly populated according to the
    required training fields contract.
  category: architecture
  verification: llm_judge
- rule: Ensure required training fields are populated for each generated sample
  source:
    path: .claude/skills/add-rollout-function/SKILL.md
    lines: 72-77
  source_text: 'For each generated sample, ensure required training fields are populated
    consistently with your objective:


    - `tokens`

    - `response_length`

    - `reward` (or reward dict if your setup uses keyed rewards)

    - `status`'
  evidence: 'The gold diff explicitly ensures the `tokens` field is populated for
    multimodal first-turns by adding `if not sample.tokens: sample.tokens = prompt_ids`
    in `slime/rollout/sglang_rollout.py`.'
  category: rubric
  verification: llm_judge
distractors:
- rule: Create a new rollout path based on sglang_rollout.py for new engine-based
    tasks.
  source:
    path: .claude/skills/add-rollout-function/SKILL.md
    lines: 27-28
  source_text: 'If the task needs engine-based async generation and rewards, use the
    sglang path as base.

    If the task is file/buffer-driven and simple, use sft path as base.'
  collision_type: architecture_boundary
  why_distracting: An agent tasked with adding multimodal rollout support might mistakenly
    think they need to create a new rollout module (using sglang as a base reference)
    rather than modifying the core `sglang_rollout.py`, but the gold diff correctly
    builds the capability natively into the existing path.
  severity: high
- rule: Keep exceptions explicit for invalid metadata instead of silently returning
    zeros.
  source:
    path: .claude/skills/add-reward-function/SKILL.md
    lines: '51'
  source_text: '- Keep exceptions explicit for invalid metadata instead of silently
    returning zeros.'
  collision_type: scope_ambiguity
  why_distracting: An agent might incorrectly apply this "explicit exceptions" rule
    to `_try_load_glm4v_processor` in `processing_utils.py` and forcefully raise an
    exception when `preprocessor_config.json` doesn't exist, whereas the gold diff
    correctly uses a silent return of `None` to gracefully fallback to other processors.
  severity: medium
- rule: Prefer `sample.remove_sample=True` over deleting objects for sample removal.
  source:
    path: .claude/skills/add-dynamic-filter/SKILL.md
    lines: '70'
  source_text: '- For sample removal, prefer `sample.remove_sample=True` over deleting
    objects.'
  collision_type: scope_ambiguity
  why_distracting: An agent working in `sglang_rollout.py` might try to prematurely
    apply this dynamic filtering rule to flag unsupported or malformed multimodal
    samples, instead of properly parsing/handling them natively within the rollout
    preparation flow.
  severity: low
- rule: Implement Train and Eval Branches Explicitly by returning RolloutFnTrainOutput
    or RolloutFnEvalOutput
  source:
    path: .claude/skills/add-rollout-function/SKILL.md
    lines: 43-46
  source_text: '### Step 3: Implement Train and Eval Branches Explicitly


    - For training (`evaluation=False`), return `RolloutFnTrainOutput(samples=...,
    metrics=...)`

    - For evaluation (`evaluation=True`), return `RolloutFnEvalOutput(data=..., metrics=...)`'
  collision_type: architecture_boundary
  why_distracting: The PR modifies `slime/rollout/sglang_rollout.py` which is mentioned
    as the main rollout path. An agent might mistakenly try to return `RolloutFnTrainOutput`
    from the inner `generate` async helper that is modified in the diff, breaking
    the SGLang generation loop which expects an internal payload or payload dict.
  severity: high
