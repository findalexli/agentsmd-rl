# ==========================================================================
# RUBRIC - Soft/subjective rules from agent configs
# ==========================================================================

rubric:
  - rule: C++ code follows Chromium style (header guards, naming, formatting)
    source: CLAUDE.md - Code Style section
    description: |
      C++ code should follow Chromium coding style:
      - Header guards: ELECTRON_SHELL_BROWSER_API_ELECTRON_API_{NAME}_H_
      - Uses Chromium abstractions (base::, content::, etc.)
      - Follows clang-format and clang-tidy rules
    files: ["*.cc", "*.h"]

  - rule: Header includes follow proper ordering and minimal dependencies
    source: CLAUDE.md - Code Style section
    description: |
      Remove unused includes (like raw_ref.h). Use raw_ptr from base/memory/raw_ptr.h.
      Group includes properly: system headers, Chromium headers, Electron headers.
    files: ["*.h"]

  - rule: Memory management follows Chromium base:: patterns
    source: CLAUDE.md - Code Style section + .github/copilot-instructions.md
    description: |
      Use Chromium smart pointers correctly:
      - raw_ptr for non-owning pointers that can be null
      - raw_ref for non-owning references that should never be null
      - Always nullify raw_ptr when the pointed-to object is destroyed
    files: ["*.cc", "*.h"]

  - rule: TypeScript/JavaScript files use proper import ordering
    source: .github/copilot-instructions.md - Conventions section
    description: |
      Import order: @electron/internal → @electron → electron → external → builtin → relative.
      The regression test should follow existing test file patterns.
    files: ["spec/*.ts"]

  - rule: Test files follow Mocha/Chai patterns
    source: CLAUDE.md - Testing section
    description: |
      Tests should use existing test helpers and patterns:
      - Use startRemoteControlApp() for integration tests
      - Properly clean up resources after tests
      - Follow existing describe/it structure
    files: ["spec/*.ts"]
