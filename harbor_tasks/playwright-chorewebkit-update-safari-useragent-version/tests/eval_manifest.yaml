config_edits:
- path: .claude/skills/playwright-dev/webkit-safari-version.md
  tier: 2
  gold_added: "# Updating WebKit Safari Version\n\nThe Safari version string used\
    \ in the WebKit user-agent is declared in one place:\n\n**[packages/playwright-core/src/server/webkit/wkBrowser.ts](../../../packages/playwright-core/src/server/webkit/wkBrowser.ts)**\
    \ — `BROWSER_VERSION` constant (line ~35).\n\n```ts\nconst BROWSER_VERSION = '26.4';\n\
    const DEFAULT_USER_AGENT = `Mozilla/5.0 ... Version/${BROWSER_VERSION} Safari/605.1.15`;\n\
    ```\n\n## Steps to update\n\n1. **Find the latest stable Safari version** — search\
    \ `site:developer.apple.com \"Safari X.Y Release Notes\"` or check the [Safari\
    \ Release Notes](https://developer.apple.com/documentation/safari-release-notes)\
    \ index. The highest numbered entry that is not a Technology Preview is the current\
    \ stable release.\n\n2. **Update `BROWSER_VERSION`** in `wkBrowser.ts`.\n\n3.\
    \ **Run lint** to update any generated files that embed the version:\n\n   ```bash\n\
    \   npm run flint\n   ```"
  gold_removed: ''
- path: README.md
  tier: 2
  gold_added: '>26.4<'
  gold_removed: ''
distractors:
- rule: Assume watch is running and code is up to date. Generated files are produced
    by watch automatically.
  collision_type: rule_conflict
  why_distracting: The config states that watch mode automatically produces generated
    files. An agent might rely on this and fail to document `npm run flint` as the
    required post-update command in the skill doc, assuming the watch script handles
    everything.
  severity: high
  source:
    path: CLAUDE.md
    lines: 45-47
- rule: '`docs/src/` is the source of truth for public TypeScript types.'
  collision_type: scope_ambiguity
  why_distracting: The config designates `docs/src/` as the source of truth for public
    TypeScript types. An agent might mistakenly attempt to update API documentation
    or type definitions in `docs/src/api/` instead of strictly updating the release
    notes as requested.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 32-33
hierarchy_analysis: The task relies on a single root `CLAUDE.md` file, but requires
  the agent to synthesize its tooling commands (`npm run flint`) into a new meta-instruction
  file (`.claude/skills/playwright-dev/webkit-safari-version.md`). The agent must
  resolve the tension between 'watch automatically generates files' and 'always run
  flint before committing' to correctly document the update process.
