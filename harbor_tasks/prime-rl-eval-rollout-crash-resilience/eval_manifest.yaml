version: "2.0"

source:
  repo: "PrimeIntellect-ai/prime-rl"
  pr: 2086
  base_commit: "60f01a04681df563044cf3cb7c64ec480b608451"
  merge_commit: "f414d9ae496d40fc386e201c61e19392a57c1653"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "eval_utils.py and vf_utils.py must parse without syntax errors"

  - id: generate_catches_group_exceptions
    type: fail_to_pass
    origin: pr_diff
    description: "generate() catches per-group exceptions and returns successful results"

  - id: generate_all_groups_fail
    type: fail_to_pass
    origin: pr_diff
    description: "generate() attempts all groups even when all fail, returns empty list"

  - id: generate_logs_group_failures
    type: fail_to_pass
    origin: pr_diff
    description: "generate() logs a warning for each failed group"

  - id: evaluate_env_empty_outputs
    type: fail_to_pass
    origin: pr_diff
    description: "evaluate_env() returns early with warning when all rollouts fail"

  - id: compute_eval_ckpt_step
    type: pass_to_pass
    origin: repo_tests
    description: "compute_eval_ckpt_step pure function regression tests"

  - id: evaluate_calls_generate
    type: pass_to_pass
    origin: pr_diff
    description: "evaluate() still calls generate() — AST structural regression"

  - id: no_bare_except
    type: pass_to_pass
    origin: agent_config
    description: "No bare except blocks — must catch specific exception types"
    source:
      path: "AGENTS.md"
      lines: "5"
      commit: "60f01a04681df563044cf3cb7c64ec480b608451"

  - id: no_process_comments
    type: pass_to_pass
    origin: agent_config
    description: "No process-explanatory comments referencing old code"
    source:
      path: "AGENTS.md"
      lines: "7"
      commit: "60f01a04681df563044cf3cb7c64ec480b608451"

rubric:
  - rule: "Errors should never pass silently. Unless explicitly silenced."
    source:
      path: "AGENTS.md"
      lines: "23-24"
      commit: "60f01a04681df563044cf3cb7c64ec480b608451"

  - rule: "Simple is better than complex."
    source:
      path: "AGENTS.md"
      lines: "16"
      commit: "60f01a04681df563044cf3cb7c64ec480b608451"

  - rule: "Explicit is better than implicit."
    source:
      path: "AGENTS.md"
      lines: "15"
      commit: "60f01a04681df563044cf3cb7c64ec480b608451"

  - rule: "Avoid try/except blocks unless it's really necessary. It's fine that a program fails if something goes wrong. You can add try catch on code that explicitly aims to be fault tolerant like adding retry mechanisms or explicit and intentional robustness."
    source:
      path: "AGENTS.md"
      lines: "5"
      commit: "60f01a04681df563044cf3cb7c64ec480b608451"

  - rule: "Do not add unnecessary comments. Especially do not try to explain code change that reflect your work process, do not refer to old code."
    source:
      path: "AGENTS.md"
      lines: "7"
      commit: "60f01a04681df563044cf3cb7c64ec480b608451"
