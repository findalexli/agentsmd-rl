source_pr:
  owner: ClickHouse
  repo: ClickHouse
  number: 102059
  merge_commit: ad69fbe467e2d5ead048cb0e03d5b4c167226a8c
  base_commit: 4d79f6ea35f896060e55128fe8ca4216f455d9c0

task:
  name: clickhouse-zookeeper-session-renewal
  title: Fix crash caused by stale ZooKeeper session in UDF retry loop
  description: |
    The UserDefinedSQLObjectsZooKeeperStorage::refreshObjects function had a bug
    where it reused an expired ZooKeeper session on retry iterations. The fix
    ensures the session is renewed via zookeeper_getter on each retry.

  checks:
    # Fail-to-pass tests (behavioral changes)
    - id: test_session_renewal_in_retry_loop
      type: fail_to_pass
      origin: behavioral
      description: Session renewal via zookeeper_getter.getZooKeeper().first must be in retry loop

    - id: test_current_zookeeper_variable_usage
      type: fail_to_pass
      origin: behavioral
      description: current_zookeeper variable must be declared and initialized

    - id: test_is_retry_conditional
      type: fail_to_pass
      origin: behavioral
      description: Session renewal must be conditional on retries_ctl.isRetry()

    - id: test_object_names_fetch_inside_retry_loop
      type: fail_to_pass
      origin: behavioral
      description: getObjectNamesAndSetWatch must be called inside retry loop

    - id: test_try_load_object_uses_current_zookeeper
      type: fail_to_pass
      origin: behavioral
      description: tryLoadObject must use current_zookeeper instead of zookeeper parameter

    # Pass-to-pass tests (CI/repo standards)
    - id: test_clang_syntax_check
      type: pass_to_pass
      origin: repo_tests
      description: C++ syntax check with clang

    - id: test_repo_yaml_lint
      type: pass_to_pass
      origin: repo_tests
      description: Repo YAML files pass yamllint

    - id: test_repo_python_syntax
      type: pass_to_pass
      origin: repo_tests
      description: Repo CI Python files have valid syntax

    - id: test_target_file_no_trailing_whitespace
      type: pass_to_pass
      origin: repo_tests
      description: Target file has no trailing whitespace

    - id: test_target_file_final_newline
      type: pass_to_pass
      origin: repo_tests
      description: Target file ends with newline

    - id: test_target_file_no_tabs
      type: pass_to_pass
      origin: repo_tests
      description: Target file uses spaces not tabs

  # Soft/subjective rules for LLM judge (optional)
  rubric: []

timeout_seconds: 300
