  reference: "# No try/except blocks used in the fix\n# Code changes use direct conditional\
    \ logic without exception handling\nif has_cpu_offload:\n    state_dict.clear()\n\
    \    gc.collect()\n    torch.cuda.empty_cache()\n"
- rule: 'Targeted comments: don''t explain your work process or reference old code.
