distractors:
- rule: Adding CLI Commands by implementing MCP tool first
  source:
    path: /workspace/repo/.claude/skills/playwright-dev/mcp-dev.md
    lines: 191-197
  source_text: '## Adding CLI Commands


    CLI commands are thin wrappers over MCP tools. They live in the daemon and map
    CLI args to MCP tool calls.


    ### Step 1: Implement the MCP Tool


    Implement the corresponding MCP tool first (see section above). CLI commands call
    MCP tools via `toolName`/`toolParams`.'
  collision_type: scope_ambiguity
  why_distracting: The diff implements `PWPAUSE=cli` which integrates the MCP daemon
    into the test runner. An agent might mistakenly think this feature involves adding
    a new CLI command or MCP tool and try to edit `packages/playwright/src/cli/daemon/commands.ts`
    or `tools.ts`, but the change merely uses the existing daemon programmatically.
  severity: high
- rule: Define API in docs/src/api/class-xxx.md
  source:
    path: /workspace/repo/.claude/skills/playwright-dev/api.md
    lines: 5-7
  source_text: '## Step 1: Define API in Documentation


    Define (or update) API in `docs/src/api/class-xxx.md`. For the new methods, params
    and options use the version from package.json (without `-next`).'
  collision_type: scope_ambiguity
  why_distracting: The diff exports new functions (`decorateServer` and `sessionConfigFromArgs`)
    that look like API changes. An agent following this rule might try to document
    these in `docs/src/api/`, but these are internal helper exports for the CLI/daemon,
    not part of the public Playwright API.
  severity: high
- rule: Adding Config Options to MCP config.d.ts
  source:
    path: /workspace/repo/.claude/skills/playwright-dev/mcp-dev.md
    lines: 315-319
  source_text: '## Adding Config Options


    When you need to add a new config option, update these files in order:


    ### 1. Type definition: `packages/playwright/src/mcp/config.d.ts`'
  collision_type: scope_ambiguity
  why_distracting: The diff handles `PWPAUSE=cli`, which is an environment-driven
    configuration for the test runner. An agent might misinterpret this as an MCP
    configuration option and try to add it to the MCP configuration pipeline in `config.d.ts`
    and `CLIOptions`.
  severity: medium
