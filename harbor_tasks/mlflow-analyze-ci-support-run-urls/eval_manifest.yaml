distractors:
- rule: New functionality in the tracking layer should be mirrored by workspace-aware
    tests
  collision_type: scope_ambiguity
  why_distracting: The agent might see 'New functionality' and attempt to write tests
    for the new URL parsing logic, but this code is part of a Claude skill (.claude/skills/),
    not the MLflow tracking layer, making workspace-aware tests completely irrelevant.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 16-16
- rule: Run Python tests using `uv run pytest tests/`
  collision_type: meta_confusion
  why_distracting: The agent might try to run `uv run pytest tests/` to test the skill
    changes, but the skills are standalone scripts in `.claude/skills/` and are not
    covered by the main MLflow test suite, leading to wasted effort and confusion.
  severity: low
  source:
    path: CLAUDE.md
    lines: 76-84
hierarchy_analysis: The repository has a single `CLAUDE.md` file at the root. The
  rules in this file are heavily focused on the main MLflow application (tracking
  layer, SQLAlchemy store, Databricks backend) and its testing/development workflow.
  Since the PR modifies a standalone Claude skill in `.claude/skills/`, many of the
  root-level rules are out of scope or potentially distracting. The agent must recognize
  that the skill is a separate tool and not apply MLflow core development practices
  to it.
