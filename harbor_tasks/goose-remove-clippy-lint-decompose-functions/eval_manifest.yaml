distractors:
- rule: 'Never: Merge without ./scripts/clippy-lint.sh'
  source:
    path: AGENTS.md
    lines: '95'
    commit: 948cb91d5402b6175d4ff6386e8e02beea6b86cd
  collision_type: meta_confusion
  why_distracting: 'The config explicitly states ''Never: Merge without ./scripts/clippy-lint.sh''. An agent might hesitate to delete the script or might try to keep a wrapper script to satisfy this ''Never'' rule, but the instruction explicitly demands removing the custom infrastructure entirely.'
  severity: high
- rule: 'Do not comment on: Clippy warnings - CI handles this (clippy-lint.sh)'
  source:
    path: .github/copilot-instructions.md
    lines: '79'
    commit: 948cb91d5402b6175d4ff6386e8e02beea6b86cd
  collision_type: meta_confusion
  why_distracting: The file instructs Copilot not to comment on 'Clippy warnings - CI handles this (clippy-lint.sh)'. The agent must realize it needs to edit this very instruction file to update the reference, which requires modifying its own meta-instructions.
  severity: high
