distractors:
- rule: 'Never: Merge without ./scripts/clippy-lint.sh'
  collision_type: meta_confusion
  why_distracting: 'The config explicitly states ''Never: Merge without ./scripts/clippy-lint.sh''.
    An agent might hesitate to delete the script or might try to keep a wrapper script
    to satisfy this ''Never'' rule, but the instruction explicitly demands removing
    the custom infrastructure entirely.'
  severity: high
  source:
    path: AGENTS.md
    lines: 94-95
- rule: 'Do not comment on: Clippy warnings - CI handles this (clippy-lint.sh)'
  collision_type: meta_confusion
  why_distracting: The file instructs Copilot not to comment on 'Clippy warnings -
    CI handles this (clippy-lint.sh)'. The agent must realize it needs to edit this
    very instruction file to update the reference, which requires modifying its own
    meta-instructions.
  severity: high
  source:
    path: .github/copilot-instructions.md
    lines: 78-79
hierarchy_analysis: This task is highly meta-referential. The agent must edit the
  very files that provide its instructions (`AGENTS.md`, `.github/copilot-instructions.md`).
  It must override explicit 'Never' rules in the config files because the primary
  instruction dictates a paradigm shift in how linting is handled.
