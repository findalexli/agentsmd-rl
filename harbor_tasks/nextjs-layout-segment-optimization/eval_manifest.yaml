  category: architecture
distractors:
- rule: Start `pnpm --filter=next dev` for auto-rebuilding on file changes during
    iterative development
  collision_type: meta_confusion
  why_distracting: The PR requires changes to Rust crates (`turbopack-core`, `next-api`).
    The `pnpm --filter=next dev` watch mode only auto-rebuilds JS/TS files. If the
    agent relies on this for iterative development, it will test stale Rust binaries
    and get confused why its Rust changes have no effect.
  severity: high
  source:
    path: CLAUDE.md
    lines: 66-72
- rule: Prefer `pnpm --filter=next build` when edits are limited to core Next.js files
  collision_type: scope_ambiguity
  why_distracting: An agent might consider `crates/next-core` to be "core Next.js
    files" and run `pnpm --filter=next build`. However, this command only builds the
    JS package. Since changes span multiple packages including Rust crates, `pnpm
    build-all` is required.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 84-84
hierarchy_analysis: '`CLAUDE.md` and `AGENTS.md` are identical symlinked files at
  the root level. They provide high-level workflow and architecture guidance. The
  rules focus heavily on JS/TS development workflows (like `pnpm --filter=next dev`
  and `pnpm --filter=next types`), which creates ambiguity when working on the Rust-based
  Turbopack compiler where these watch commands do not apply to native code compilation.'
