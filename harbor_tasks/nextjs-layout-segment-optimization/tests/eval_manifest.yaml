distractors:
- rule: Start `pnpm --filter=next dev` in a separate terminal session before making
    edits
  collision_type: scope_ambiguity
  why_distracting: The PR involves changes to Rust crates (crates/next-api, turbopack/crates/turbopack-core)
    in addition to packages/next. Running the dev server for just the next package
    might not correctly rebuild the Rust workspace or could conflict with cargo builds.
  severity: medium
  source:
    path: AGENTS.md
    lines: 74-76
- rule: Prefer `pnpm --filter=next build` when edits are limited to core Next.js files
  collision_type: scope_ambiguity
  why_distracting: The agent might misinterpret 'core Next.js files' to include the
    crates/next-core and crates/next-api Rust files, but the rule specifically contrasts
    this with 'when changes span multiple packages' which requires pnpm build-all.
  severity: low
  source:
    path: AGENTS.md
    lines: 96-98
