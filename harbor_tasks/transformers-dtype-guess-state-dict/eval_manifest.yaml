version: "2.0"

source:
  repo: "huggingface/transformers"
  pr: 44883
  base_commit: "7cd9b985e0698d4f625a18be0125231b6b930390"
  merge_commit: "82db888e29753c891a246933b60518191d83d835"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "modeling_utils.py must parse without syntax errors"

  - id: float8_e4m3fn_skipped
    type: fail_to_pass
    origin: pr_diff
    description: "float8_e4m3fn is skipped, returns next standard dtype"

  - id: float8_e5m2_skipped
    type: fail_to_pass
    origin: pr_diff
    description: "float8_e5m2 is skipped, returns next standard dtype"

  - id: float4_e2m1fn_skipped
    type: fail_to_pass
    origin: pr_diff
    description: "float4_e2m1fn is skipped, returns next standard dtype"

  - id: multiple_quantized_before_standard
    type: fail_to_pass
    origin: pr_diff
    description: "Multiple float8/float4 tensors before the first standard float are all skipped"

  - id: quantized_after_int_tensors
    type: fail_to_pass
    origin: pr_diff
    description: "Int tensors followed by float8 then standard float: skips both non-standard"

  - id: standard_dtypes_returned
    type: pass_to_pass
    origin: pr_diff
    description: "float32, float16, bfloat16, float64 as first tensor are returned directly"

  - id: empty_state_dict
    type: pass_to_pass
    origin: pr_diff
    description: "Empty state dict returns float32"

  - id: standard_float_before_quantized
    type: pass_to_pass
    origin: pr_diff
    description: "When standard float comes first, quantized after is irrelevant"

rubric:
  - rule: "Bugfix PRs in particular can often be only one or two lines long, and do not need large comments, docstrings or new functions in this case. Aim to minimize the size of the diff."
    source:
      path: ".github/copilot-instructions.md"
      lines: "15"
      commit: "7cd9b985e0698d4f625a18be0125231b6b930390"

  - rule: "Do not edit a `# Copied from` block, as it will be reverted by `make fix-repo`."
    source:
      path: "CLAUDE.md"
      lines: "66"
      commit: "7cd9b985e0698d4f625a18be0125231b6b930390"
