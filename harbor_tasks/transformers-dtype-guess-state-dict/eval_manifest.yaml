rubric:
- rule: Bugfix PRs in particular can often be only one or two lines long, and do not
    need large comments, docstrings or new functions in this case. Aim to minimize
    the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: 7cd9b985e0698d4f625a18be0125231b6b930390
- rule: Do not edit a `# Copied from` block, as it will be reverted by `make fix-repo`.
  source:
    path: CLAUDE.md
    lines: '66'
    commit: 7cd9b985e0698d4f625a18be0125231b6b930390
distractors:
- rule: 'Fail-closed behavior for agents: If coordination evidence cannot be found,
    do not proceed to PR-ready output.'
  collision_type: meta_confusion
  why_distracting: The agent is operating in an isolated evaluation environment without
    access to GitHub issues or coordination evidence. Following this rule would cause
    the agent to refuse to generate the bug fix.
  severity: high
  source:
    path: CLAUDE.md
    lines: 57-60
- rule: 'No low-value busywork PRs: Do not open one-off PRs for tiny edits.'
  collision_type: scope_ambiguity
  why_distracting: The required fix is a small, single-line condition change. The
    agent might misclassify this critical bug fix as a 'tiny edit' or 'low-value busywork'
    and refuse to implement it.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 42-44
- rule: Mandatory duplicate-work checks using the gh CLI before proposing a PR.
  collision_type: meta_confusion
  why_distracting: The agent might attempt to run `gh` CLI commands to check for duplicate
    work, which will fail or waste time in a sandboxed evaluation environment.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 30-37
hierarchy_analysis: Both CLAUDE.md and AGENTS.md contain identical repository contribution
  policies. These rules are designed for live repository interactions (PRs, issue
  coordination) and do not apply to the isolated coding evaluation environment.
