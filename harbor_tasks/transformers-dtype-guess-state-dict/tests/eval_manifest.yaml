rubric:
- rule: Bugfix PRs in particular can often be only one or two lines long, and do not
    need large comments, docstrings or new functions in this case. Aim to minimize
    the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: 7cd9b985e0698d4f625a18be0125231b6b930390
- rule: Do not edit a `# Copied from` block, as it will be reverted by `make fix-repo`.
  source:
    path: CLAUDE.md
    lines: '66'
    commit: 7cd9b985e0698d4f625a18be0125231b6b930390
distractors:
- rule: If coordination evidence cannot be found, do not proceed to PR-ready output.
  collision_type: meta_confusion
  why_distracting: The repo's contribution policy strictly forbids proceeding to PR-ready
    output without coordination evidence. In a benchmark setting, the agent must bypass
    this administrative rule to provide the requested code fix.
  severity: high
  source:
    path: AGENTS.md
    lines: 58-61
- rule: Before proposing a PR, check for overlapping open PRs and issue ownership
    using gh CLI.
  collision_type: meta_confusion
  why_distracting: The agent is instructed to run `gh` CLI commands to check for duplicate
    PRs. In an isolated benchmark environment, this will likely fail or distract the
    agent from writing the actual fix.
  severity: medium
  source:
    path: AGENTS.md
    lines: 33-38
- rule: Avoid direct inheritance between model-specific files using `# Copied from`
    or `modular_<name>.py`.
  collision_type: scope_ambiguity
  why_distracting: The agent might look for `# Copied from` blocks or try to use `modular_<name>.py`
    mechanisms, but `modeling_utils.py` is a core utility file, not a model-specific
    file in `src/transformers/models/`.
  severity: low
  source:
    path: AGENTS.md
    lines: 65-70
hierarchy_analysis: The repository contains identical root-level `AGENTS.md` and `CLAUDE.md`
  files that define strict administrative workflows for AI agents. These rules conflict
  with the implicit goal of a coding benchmark (which is to produce the code fix regardless
  of issue coordination).
