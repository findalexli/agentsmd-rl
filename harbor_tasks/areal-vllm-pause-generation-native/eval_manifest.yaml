distractors:
- rule: 'Logging: `areal.utils.logging.getLogger(name)` with PascalCase names -- never `print` or `logging.__name__`.'
  collision_type: architecture_boundary
  why_distracting: The file `areal_vllm_server.py` is an extension of vLLM and uses vLLM's native `init_logger("areal_vllm_server")`. If the agent tries to enforce the AReaL logging rule here, it will unnecessarily refactor the logger, potentially breaking vLLM's logging format expectations or creating a messy diff.
  severity: medium
  source:
    path: AGENTS.md
    lines: 60-62
- rule: Add tests for new functionality.
  collision_type: scope_ambiguity
  why_distracting: This PR refactors existing endpoints to use native vLLM APIs rather than adding new functionality. Furthermore, testing this requires multi-node GPU hardware, so attempting to write unit tests for these distributed RPC calls would likely lead to complex, fragile mocks or wasted effort.
  severity: medium
  source:
    path: AGENTS.md
    lines: 33-33
hierarchy_analysis: Both CLAUDE.md and AGENTS.md provide similar high-level constraints. The primary conflict arises from AReaL-specific rules (like custom logging and testing requirements) clashing with the architecture boundary of a vLLM extension script. The agent must recognize that `areal_vllm_server.py` bridges AReaL and vLLM, and should defer to vLLM's conventions (like `vllm.logger`) where appropriate.
