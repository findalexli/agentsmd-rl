distractors:
- rule: Try hard to avoid patterns that require `panic!`, `unreachable!`, or `.unwrap()`.
  collision_type: scope_ambiguity
  why_distracting: The rule instructs to avoid `.unwrap()` and instead encode constraints
    in the type system. However, the gold solution uses `.unwrap()` multiple times
    in the test added to `indexer.rs` (`TextSize::try_from(contents.find(...).unwrap()).unwrap()`).
    An agent strictly following this rule might try to implement verbose error handling
    (like returning `Result` from tests) which is unnecessary and unidiomatic for
    Rust test code where panicking on failure is expected.
  severity: medium
  source:
    path: AGENTS.md
    lines: 68-69
