version: "2.0"

source:
  repo: "sveltejs/svelte"
  pr: 18077
  base_commit: "8966601dcd14582cd46d4fbb7c5cf1b444292255"
  merge_commit: "6b653b8d17c80b16659c5238875977f0941490c2"

checks:
  # Existing static checks
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "All modified JS files parse without syntax errors (via acorn)"

  # Existing fail_to_pass checks
  - id: acorn_centralizes_error_handling
    type: fail_to_pass
    origin: pr_diff
    description: "acorn.js must import error module and contain js_parse_error call"

  - id: parse_expression_at_internal_error_handling
    type: fail_to_pass
    origin: pr_diff
    description: "parse_expression_at must have internal try/catch error handling"

  - id: parser_no_acorn_error
    type: fail_to_pass
    origin: pr_diff
    description: "Parser class must not have acorn_error method or regex_position_indicator"

  - id: context_no_redundant_error_handling
    type: fail_to_pass
    origin: pr_diff
    description: "context.js must not have redundant try/catch around parse_expression_at"

  - id: script_no_redundant_error_handling
    type: fail_to_pass
    origin: pr_diff
    description: "script.js must call acorn.parse directly without try/catch wrapping"

  - id: expression_rethrows
    type: fail_to_pass
    origin: pr_diff
    description: "expression.js must rethrow errors instead of calling parser.acorn_error"

  # New repo_tests pass_to_pass checks
  - id: test_repo_typecheck
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's TypeScript typecheck passes (pnpm check)"

  - id: test_repo_parser_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Parser and compiler-errors tests pass (pnpm vitest run parser tests)"

  - id: test_repo_lint
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's lint passes after build (pnpm lint)"

  - id: test_repo_syntax_check_acorn
    type: pass_to_pass
    origin: repo_tests
    description: "All JS files in the repo parse without syntax errors (acorn validation)"

rubric: []
