  - id: "test_transactional_test_runner_lib_gated"
    description: "sui-transactional-test-runner lib.rs has proper #[cfg(feature = \"testing\")] gates"
    type: "programmatic"
    origin: "static"
    source:
      file: "crates/sui-transactional-test-runner/src/lib.rs"

  - id: "test_transactional_test_runner_no_debug_assertions"
    description: "sui-transactional-test-runner must not use debug_assertions for gating"
    type: "pass_to_pass"
    origin: "static"
