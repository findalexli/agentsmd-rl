rubric:
- rule: 'Use #[cfg(feature = "testing")] for test-only code that must be callable
    cross-crate. Define testing = [] in the crate''s Cargo.toml, and callers must
    propagate it via features = ["testing"] in their dependency declaration.'
  source:
    path: CLAUDE.md
    lines: 104-105
    commit: 715582d4e58d46aa7d7a5e7b153b0e9c99978f9e
  reference: '### Test-Only Code


    Use `#[cfg(test)]` for test-only code used within the same crate. Use `#[cfg(feature
    = "testing")]` for test-only code that must be callable cross-crate. For the `testing`
    feature: define `testing = []` in the crate''s `Cargo.toml`, and callers must
    propagate it via `features = ["testing"]` in their dependency declaration.

    '
- rule: Do NOT comment the obvious. Comments should explain non-obvious algorithms,
    temporary exclusions/timeouts with reasoning, complex calculations where the 'why'
    isn't clear, subtle race conditions, or assumptions about external state. Do not
    comment simple assignments, standard library usage, self-descriptive functions,
    or basic control flow.
  source:
    path: CLAUDE.md
    lines: 116-130
    commit: 715582d4e58d46aa7d7a5e7b153b0e9c99978f9e
- rule: All new files must start with the Mysten Labs Apache-2.0 license header.
  source:
    path: CLAUDE.md
    lines: 15-20
    commit: 715582d4e58d46aa7d7a5e7b153b0e9c99978f9e
distractors:
- rule: Generally don't need to do release build.
  collision_type: rule_conflict
  why_distracting: The problem explicitly states that the issue occurs in release
    builds (`cargo check --release`). If the agent follows the general guideline to
    avoid release builds, they will fail to reproduce the compilation failure or verify
    the fix.
  severity: high
  source:
    path: CLAUDE.md
    lines: 21-22
- rule: Use `cargo nextest --lib` to run only library tests and skip integration tests
    for faster feedback
  collision_type: scope_ambiguity
  why_distracting: The issue involves cross-crate testing and integration between
    `sui-types` and `sui-transactional-test-runner`. Skipping integration tests by
    using `--lib` would prevent the agent from verifying that the cross-crate test
    functionality works correctly with the new feature gate.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 38-38
hierarchy_analysis: The repository has a root `CLAUDE.md` and an `AGENTS.md`. The
  `AGENTS.md` simply points to the root `CLAUDE.md` and crate-specific `CLAUDE.md`
  files. The root `CLAUDE.md` provides general guidelines, but in this specific PR,
  the agent must override the general 'don't need to do release build' guideline because
  the bug is explicitly about release builds. Furthermore, the agent is expected to
  update the root `CLAUDE.md` to document the new `testing` feature gate convention,
  showing that the config file itself is a living document that should be updated
  when new architectural patterns are introduced.
version: '2.0'
