distractors:
- rule: Shared lint config in `packages/lint-config-shared/`
  collision_type: architecture_boundary
  why_distracting: The agent might try to 'resolve' the ESLint warnings by modifying
    the shared lint config to allow importing `expect` from `vitest` in helper files,
    rather than performing the required dependency injection refactoring.
  severity: high
  source:
    path: AGENTS.md
    lines: 52-52
- rule: Templates excluded from linting (except `c3.ts` files within templates)
  collision_type: scope_ambiguity
  why_distracting: The agent might mistakenly think that the helper files are part
    of the templates or should be excluded from linting, and try to add them to an
    ignore list instead of fixing the imports.
  severity: medium
  source:
    path: packages/create-cloudflare/AGENTS.md
    lines: 18-18
hierarchy_analysis: The hierarchy is relatively flat for this task. The root AGENTS.md
  provides monorepo context (shared lint config), while the package-specific AGENTS.md
  provides local context. The agent must respect the architecture boundary by not
  modifying the shared lint config to bypass the rule.
