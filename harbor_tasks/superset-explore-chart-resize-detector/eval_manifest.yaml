rubric:
- rule: Functional components with hooks
  source:
    path: CLAUDE.md
    lines: 68-69
  evidence: The fix correctly updates the `useResizeDetectorByObserver` hook to use
    `targetRef` and modifies the functional component in `index.tsx` to consume the
    updated hook without `observerRef`.
  category: architecture
- rule: Avoid `any` types - Use proper TypeScript, reuse existing types
  source:
    path: CLAUDE.md
    lines: 67-68
  evidence: The fix updates the return type of the hook to `{ ref, width, height }`
    and ensures TypeScript compiles without errors, maintaining strict typing without
    falling back to `any`.
  category: style
distractors:
- rule: Avoid custom css and styles - Follow antd best practices and avoid styling
    and custom CSS whenever possible
  collision_type: would_cause_bug
  why_distracting: 'The issue describes ''unnecessary scroll bars'', which is typically
    a CSS problem. An agent might be tempted to add custom CSS (like `overflow: hidden`)
    to hide the scroll bars. However, the root cause is a stale dimension bug in the
    React hook, and adding CSS would only mask the bug while violating the rule against
    custom styles.'
  severity: high
  source:
    path: CLAUDE.md
    lines: 33-34
- rule: Use @superset-ui/core - Don't import Ant Design directly
  collision_type: scope_ambiguity
  why_distracting: Because the rule emphasizes using `@superset-ui/core` over direct
    imports, an agent might try to replace `react-resize-detector` with a different
    resize observer utility from the Superset UI library or Ant Design. This is out
    of scope and would overcomplicate a simple hook configuration fix.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 31-32
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` contain identical rules. The
  frontend modernization rules apply directly to this PR, specifically the emphasis
  on TypeScript and React hooks. No conflicts exist between the config files.
