distractors:
- rule: To run lint, run 'lintrunner -a' (which will autoapply changes)
  collision_type: rule_conflict
  why_distracting: AGENTS.md instructs to use `lintrunner -a` for linting, which directly
    conflicts with CLAUDE.md's instruction to 'Only use commands provided via `spin`
    for linting'. An agent might fail or use the wrong tool if it follows this rule.
  severity: high
  source:
    path: AGENTS.md
    lines: '11'
- rule: Minimize comments; be concise; code should be self-explanatory and self-documenting.
  collision_type: scope_ambiguity
  why_distracting: An agent might strictly follow the instruction to minimize comments
    and make code self-explanatory, omitting the crucial explanation of the oneAPI
    2025.3+ behavior change which is necessary to understand why the filtering is
    happening.
  severity: medium
  source:
    path: CLAUDE.md
    lines: '43'
- rule: Don't make trivial (1-2 LOC) helper functions that are only used once unless
    it significantly improves code readability.
  collision_type: scope_ambiguity
  why_distracting: An agent might try to inline the filtering logic directly into
    the `sycl_cflags` assignment to avoid creating a single-use helper function, which
    would make the complex `win_wrap_ninja_compile` function harder to read and violate
    the existing pattern of using nested helpers.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 46-47
hierarchy_analysis: 'The hierarchy contains a direct conflict regarding linting tools:
  `AGENTS.md` recommends `lintrunner -a` while `CLAUDE.md` strictly mandates `spin
  lint`. Additionally, there is tension within `CLAUDE.md`''s coding style guidelines
  between minimizing comments/helper functions and providing necessary global context/matching
  existing architectural patterns (nested helpers).'
