distractors:
- rule: When you are working on a bug, first create a standalone file that reproduces
    the bug and verify it fails in the expected way.
  collision_type: rule_conflict
  why_distracting: The bug is specific to Windows and Intel oneAPI 2025.3+. The agent
    is running in a constrained environment and is explicitly told 'you do not have
    a working build environment'. Attempting to create a standalone reproduction script
    will fail and waste effort.
  severity: high
  source:
    path: AGENTS.md
    lines: 3-6
- rule: Don't make trivial (1-2 LOC) helper functions that are only used once unless
    it significantly improves code readability.
  collision_type: scope_ambiguity
  why_distracting: The agent might inline the MSVC filtering logic directly into the
    `sycl_cflags` assignment to avoid creating a single-use helper function, which
    would clutter the main function body and violate the existing nested-helper pattern.
  severity: medium
  source:
