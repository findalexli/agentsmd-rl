hierarchy_analysis: Both AGENTS.md and CLAUDE.md are at the root level. The agent
  must balance the general instruction to reproduce bugs with the specific constraint
  that the build environment is broken. It must also balance the instruction to minimize
  comments/helpers with the need to explain non-obvious compiler behavior and maintain
  the nested helper pattern.
