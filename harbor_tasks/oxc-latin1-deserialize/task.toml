name = "oxc-latin1-deserialize"
title = "Optimize string deserialization with latin1Slice for NAPI parser"
description = "Speed up decoding strings in raw transfer by implementing Latin1 decoding optimizations, replacing TextDecoder with Buffer.prototype.latin1Slice for 1-byte-per-char strings, removing string-concatenation loops in favor of String.fromCharCode.apply, and increasing the native call threshold from 9 to 64 bytes."
