source_pr:
  owner: oxc-project
  repo: oxc
  number: 21021
  merge_commit: 012c924a046b2dc14c0f381b188743fc24226b79
  base_commit: 55e1e9b1d22c30f8ec9bf937c66c4d5d428a6116

task:
  name: oxc-latin1-deserialize
  description: Optimize string deserialization with latin1Slice for NAPI parser

files:
  - apps/oxlint/src-js/generated/deserialize.js
  - napi/parser/src-js/generated/deserialize/js.js
  - napi/parser/src-js/generated/deserialize/js_parent.js
  - napi/parser/src-js/generated/deserialize/js_range.js
  - napi/parser/src-js/generated/deserialize/js_range_parent.js
  - napi/parser/src-js/generated/deserialize/ts.js
  - napi/parser/src-js/generated/deserialize/ts_parent.js
  - napi/parser/src-js/generated/deserialize/ts_range.js
  - napi/parser/src-js/generated/deserialize/ts_range_parent.js
  - tasks/ast_tools/src/generators/raw_transfer.rs

checks:
  # Fail-to-pass tests (verify the fix is implemented)
  - id: test_latin1slice_usage
    type: fail_to_pass
    origin: agent_config
    source: "AGENTS.md - Avoid editing generated subdirectories (applies: modified generated files with proper optimization)"
    description: Verify latin1Slice from Buffer.prototype is used in all deserializer files

  - id: test_source_text_latin_variable
    type: fail_to_pass
    origin: agent_config
    source: AGENTS.md - Performance is critical for all changes
    description: Verify sourceTextLatin variable is declared and used for ASCII string extraction

  - id: test_string_decode_arrays
    type: fail_to_pass
    origin: agent_config
    source: AGENTS.md - Performance is critical for all changes
    description: Verify stringDecodeArrays are pre-allocated for efficient fromCharCode usage

  - id: test_64_byte_threshold
    type: fail_to_pass
    origin: agent_config
    source: AGENTS.md - Performance is critical for all changes
    description: Verify TextDecoder threshold changed from 9 to 64 bytes

  - id: test_from_char_code_apply
    type: fail_to_pass
    origin: agent_config
    source: AGENTS.md - Performance is critical for all changes
    description: Verify String.fromCharCode.apply is used for non-source ASCII strings

  - id: test_source_end_pos
    type: fail_to_pass
    origin: agent_config
    source: AGENTS.md - Performance is critical for all changes
    description: Verify sourceEndPos is tracked for source region boundary checks

  - id: test_raw_transfer_generator_updated
    type: fail_to_pass
    origin: agent_config
    source: "AGENTS.md - Avoid editing generated subdirectories (applies: must update generator, not just generated files)"
    description: Verify the Rust generator code (raw_transfer.rs) is updated to produce optimized code

  # Pass-to-pass tests (verify no regressions)
  - id: test_napi_parser_tests
    type: pass_to_pass
    origin: repo_tests
    description: NAPI parser test suite passes with the optimization

  - id: test_napi_parser_esm
    type: pass_to_pass
    origin: repo_tests
    description: NAPI parser ESM module tests pass

  - id: test_napi_parser_visit
    type: pass_to_pass
    origin: repo_tests
    description: NAPI parser visitor pattern tests pass

  - id: test_napi_parser_bindings_exist
    type: pass_to_pass
    origin: repo_tests
    description: NAPI parser bindings.js exists and is readable

  - id: test_napi_parser_index_syntax
    type: pass_to_pass
    origin: repo_tests
    description: NAPI parser index.js exists and is readable

  - id: test_napi_parser_wrap_exists
    type: pass_to_pass
    origin: repo_tests
    description: NAPI parser wrap.js exists and is readable

rubric:
  - rule: "Code changes target the generator (raw_transfer.rs), not just the generated files"
    weight: 2
    source: AGENTS.md - Avoid editing `generated` subdirectories

  - rule: "Uses Buffer.prototype.latin1Slice for efficient ASCII string decoding"
    weight: 2
    source: AGENTS.md - Performance is critical for all changes

  - rule: "Pre-allocates decode arrays for String.fromCharCode.apply to avoid per-string allocations"
    weight: 1
    source: AGENTS.md - Performance is critical for all changes

  - rule: "Increased TextDecoder threshold from 9 to 64 bytes to minimize C++ boundary crossings"
    weight: 1
    source: AGENTS.md - Performance is critical for all changes

  - rule: "Maintains proper cleanup of sourceTextLatin in resetBuffer for GC"
    weight: 1
    source: AGENTS.md - Performance is critical for all changes (memory management)
