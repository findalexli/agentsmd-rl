task_metadata:
  name: clickhouse-cidb-secrets-refactor
  title: Refactor CIDB secrets to use Settings instead of hardcoded values
  description: "The collect_statistics.py script hardcoded public CIDB secret names\n\
    (clickhouse-test-stat-url, etc.), so the NightlyStatistics job always\nqueried\
    \ the public CIDB \u2014 even in private forks that override\nSettings.SECRET_CI_DB_*\
    \ via private_settings_overrides.py.\n\nThis task replaces the hardcoded Secret.Config\
    \ calls with\nInfo().get_secret(Settings.SECRET_CI_DB_URL) / SECRET_CI_DB_USER\
    \ /\nSECRET_CI_DB_PASSWORD, matching the pattern used in runner.py and\ncidb_cluster.py.\n"
  difficulty: easy
  estimated_time: 15 min
  tags:
  - python
  - refactoring
  - ci
  - secrets
