rubric:
- rule: Follow existing code patterns in the same directory. The PR should match patterns
    used in neighboring files (e.g., using Info().get_secret() with Settings constants
    like in runner.py and cidb_cluster.py).
  source:
    path: AGENTS.md
    lines: 1-3
    commit: bc855b917b3f456bfd6198c5bc29a1bc5672aabf
- rule: When writing documentation or comments, write names of functions and methods
    as `f` instead of `f()` - we prefer it for mathematical purity when it refers
    a function itself rather than its application.
  source:
    path: AGENTS.md
    lines: 9-10
    commit: bc855b917b3f456bfd6198c5bc29a1bc5672aabf
- rule: For CI-related changes, use the 'CI Fix or improvement' changelog category
    rather than 'Bug Fix' unless it's a real bug fix.
  source:
    path: .claude/skills/clickhouse-pr-description/SKILL.md
    lines: 85-90
    commit: bc855b917b3f456bfd6198c5bc29a1bc5672aabf
distractors:
- rule: Links to ClickHouse CI should be analyzed using the tool at .claude/tools/fetch_ci_report.js
  collision_type: scope_ambiguity
  why_distracting: The problem description mentions the 'NightlyStatistics job' and
    CI DB behavior. An agent might be tempted to use the fetch_ci_report.js tool to
    analyze CI logs for this job to understand the issue. However, the problem provides
    the exact file and the exact refactoring needed, making CI analysis an unnecessary
    distraction.
  severity: medium
  source:
    path: AGENTS.md
    lines: 21-23
- rule: When writing text such as documentation, comments, or commit messages, write
    names of functions and methods as `f` instead of `f()`
  collision_type: rule_conflict
  why_distracting: The prompt explicitly instructs the agent to "Use `Info().get_secret(...)`"
    with parentheses. The rule in AGENTS.md dictates writing function names without
    parentheses (e.g., `f` instead of `f()`) in comments and commit messages. This
    creates a conflict if the agent documents its changes, as it must choose between
    the prompt's literal string and the repository's style guide.
  severity: low
  source:
    path: AGENTS.md
    lines: 14-16
hierarchy_analysis: The AGENTS.md file contains general guidelines for documentation,
  git workflow, and CI analysis. None of the rules directly apply to the specific
  Python refactoring task required in this PR, as the gold solution only modifies
  code without adding comments, documentation, or performing git operations.
