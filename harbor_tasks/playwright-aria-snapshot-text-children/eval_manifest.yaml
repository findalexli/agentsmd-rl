distractors:
- rule: 'Decision rule: Does the test need browser/browserType/context → tests/library/.
    Just needs page + server → tests/page/.'
  collision_type: scope_ambiguity
  why_distracting: The extensive instructions on test directories and fixtures might
    lead the agent to waste effort writing a new test for this specific edge case,
    whereas the gold solution only requires a simple 3-line deletion in the source
    file.
  severity: low
  source:
    path: CLAUDE.md
    lines: 79-86
- rule: Include ARIA snapshots in MCP tool responses using `response.setIncludeSnapshot()`
  source:
    path: .claude/skills/playwright-dev/tools.md
    lines: '71'
  source_text: '- `response.setIncludeSnapshot()` — include ARIA snapshot in response'
  collision_type: scope_ambiguity
  why_distracting: The PR fixes a bug in the core ARIA snapshot generator logic within
    the browser injected script (`packages/injected/src/ariaSnapshot.ts`). The rule
    instructs how to attach ARIA snapshots in MCP tools, which is a different domain.
    An agent might mistakenly try to modify the MCP tools API instead of the core
    algorithm.
  severity: medium
- rule: Trace system DOM snapshots data structures
  source:
    path: .claude/skills/playwright-dev/trace_system_guide.md
    lines: '24'
  source_text: '- **snapshot.ts** - DOM snapshot data structures'
  collision_type: scope_ambiguity
  why_distracting: The PR modifies 'ariaSnapshot.ts' which deals with accessibility
    tree strings. The trace system guide references a 'snapshot.ts' which is for capturing
    DOM snapshots. An agent searching for 'snapshot' might follow the trace system
    guide and incorrectly investigate trace-related DOM snapshot code instead of the
    ARIA snapshot logic.
  severity: medium
hierarchy_analysis: Only a single root-level CLAUDE.md file is provided. There is
  no hierarchy to traverse and no conflicting rules between different levels.
rubric:
- rule: The `injected` package is designated for scripts injected into browser pages.
  source:
    path: CLAUDE.md
    lines: 19-26
  evidence: The gold solution correctly modifies `packages/injected/src/ariaSnapshot.ts`,
    aligning with the architectural definition that the `injected` package handles
    scripts injected into browser pages (which includes ARIA snapshot generation).
  category: architecture
  verification: llm_judge
