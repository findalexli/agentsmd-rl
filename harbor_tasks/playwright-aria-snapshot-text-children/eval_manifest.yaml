distractors:
- rule: Always run `flint` before committing. Do not use `tsc --noEmit` or individual
    lint commands separately.
  collision_type: meta_confusion
  why_distracting: The agent might try to run `npm run flint` to verify its changes,
    which runs a massive suite of linters and typechecks across the monorepo, wasting
    significant time and potentially hitting unrelated errors in the evaluation environment.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 40-46
- rule: 'Decision rule: Does the test need browser/browserType/context → tests/library/.
    Just needs page + server → tests/page/.'
  collision_type: scope_ambiguity
  why_distracting: The agent might try to write a new test in `tests/page/` to verify
    the ARIA snapshot behavior. While good practice, the gold solution only requires
    the code fix, and writing tests might lead to timeouts or test framework complexities
    in the agent environment.
  severity: low
  source:
    path: CLAUDE.md
    lines: 63-72
- rule: Assume watch is running and code is up to date. Generated files are produced
    by watch automatically.
  collision_type: meta_confusion
  why_distracting: The agent might try to run `npm run build` to compile the injected
    script after modifying it, but the instructions say to assume watch is running.
    Running a full build takes a long time.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 34-38
hierarchy_analysis: The repository has a single `CLAUDE.md` file at the root. It provides
  clear architectural boundaries (e.g., `injected` vs `playwright-core`) and testing
  guidelines. The agent must rely on the architectural descriptions to locate the
  ARIA snapshot logic in the `injected` package, but should avoid getting distracted
  by the comprehensive testing and linting instructions (`flint`, `build`, test directories)
  since the gold solution only requires a targeted code deletion.
