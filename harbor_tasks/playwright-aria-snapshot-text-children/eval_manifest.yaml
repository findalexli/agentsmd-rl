rubric:
- rule: Code changes should be minimal and focused on the bug fix. Remove the unnecessary
    length check condition (if node.name.length > text.length) from textContributesInfo
    function.
  source:
    path: packages/injected/src/ariaSnapshot.ts
    lines: 735-738
    commit: 5a56d44a6f0d94b87e044f45f432522132da557c
  reference: "diff --git a/packages/injected/src/ariaSnapshot.ts b/packages/injected/src/ariaSnapshot.ts\n\
    --- a/packages/injected/src/ariaSnapshot.ts\n+++ b/packages/injected/src/ariaSnapshot.ts\n\
    @@ -735,9 +735,6 @@ function textContributesInfo(node: aria.AriaNode, text: string):\
    \ boolean {\n   if (!node.name)\n     return true;\n\n-  if (node.name.length\
    \ > text.length)\n-    return false;\n-\n   // Figure out if text adds any value.\
    \ \"longestCommonSubstring\" is expensive, so limit strings length.\n   const\
    \ substr = (text.length <= 200 && node.name.length <= 200) ? longestCommonSubstring(text,\
    \ node.name) : '';\n   let filtered = text;\n"
- rule: The `injected` package contains scripts injected into browser pages.
  source:
    path: CLAUDE.md
    lines: 18-25
  evidence: The gold solution modifies `packages/injected/src/ariaSnapshot.ts` to
    fix the ARIA snapshot generation, correctly identifying that this logic lives
