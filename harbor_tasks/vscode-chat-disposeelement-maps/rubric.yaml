rules:
  - rule: "Use tabs, not spaces for indentation"
    from: ".github/copilot-instructions.md:111"

  - rule: "Use PascalCase for type names"
    from: ".github/copilot-instructions.md:115"

  - rule: "Use PascalCase for enum values"
    from: ".github/copilot-instructions.md:116"

  - rule: "Use camelCase for function and method names"
    from: ".github/copilot-instructions.md:117"

  - rule: "Use camelCase for property names and local variables"
    from: ".github/copilot-instructions.md:118"

  - rule: "Use whole words in names when possible"
    from: ".github/copilot-instructions.md:119"

  - rule: "Do not export types or functions unless you need to share it across multiple components"
    from: ".github/copilot-instructions.md:122"

  - rule: "Do not introduce new types or values to the global namespace"
    from: ".github/copilot-instructions.md:123"

  - rule: "Use JSDoc style comments for functions, interfaces, enums, and classes"
    from: ".github/copilot-instructions.md:126"

  - rule: "Use double quotes for strings shown to the user that need to be externalized (localized)"
    from: ".github/copilot-instructions.md:129"

  - rule: "Use single quotes otherwise"
    from: ".github/copilot-instructions.md:130"

  - rule: "All strings visible to the user need to be externalized using the vs/nls module"
    from: ".github/copilot-instructions.md:131"

  - rule: "Externalized strings must not use string concatenation. Use placeholders instead ({0})."
    from: ".github/copilot-instructions.md:132"

  - rule: "Use title-style capitalization for command labels, buttons and menu items (each word is capitalized)."
    from: ".github/copilot-instructions.md:135"

  - rule: "Don't capitalize prepositions of four or fewer letters unless it's the first or last word (e.g. in, with, for)."
    from: ".github/copilot-instructions.md:136"

  - rule: "Never use raw .onload, .onclick, or addEventListener() directly. Always use addDisposableListener()."
    from: ".github/skills/memory-leak-audit/SKILL.md:21"

  - rule: "Use Event.once() for events that should only fire once (lifecycle events, close events, first-change events)."
    from: ".github/skills/memory-leak-audit/SKILL.md:33"

  - rule: "Objects created in methods called multiple times must NOT be registered to the class this._register(). Use MutableDisposable or return IDisposable to the caller."
    from: ".github/skills/memory-leak-audit/SKILL.md:45"

  - rule: "When creating a DisposableStore tied to a model's lifetime, register model.onWillDispose(() => store.dispose()) to the store itself."
    from: ".github/skills/memory-leak-audit/SKILL.md:61"

  - rule: "When using factory methods that create pooled objects (lists, trees), disposables must be registered to the individual item, not the pool class."
    from: ".github/skills/memory-leak-audit/SKILL.md:73"
