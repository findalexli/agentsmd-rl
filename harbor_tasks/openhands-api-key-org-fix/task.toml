name = "openhands-api-key-org-fix"
version = "1.0.0"
description = "Fix conversation organization association when using API key authentication"
author = "benchmark"
difficulty = "medium"
tags = ["python", "saas", "auth", "bugfix", "enterprise"]

[time_estimates]
agent_seconds = 1800
verifier_seconds = 120

[repositories]
[[repositories.repositories]]
name = "openhands"
path = "OpenHands"
url = "https://github.com/All-Hands-AI/OpenHands.git"
base_commit = "06cd53d752b022a7ae3676ab17c029f1f810c892"
merge_commit = "889754abfd214fa74138db496e06955edb323022"
pr_number = 13568

[environment]
base_image = "python:3.12-slim"

[verification]
test_cmd = "cd /workspace/task/tests && bash test.sh"
solution_patch = "/workspace/task/solution/solve.patch"

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
