    errors.
  source:
    path: AGENTS.md
    lines: 28-30
  evidence: The gold solution uses `hasattr(self.user_context, 'user_auth')` and `hasattr(user_auth,
    'get_api_key_org_id')` before accessing these attributes. This defensive programming
    approach acts as a type gu
  category: tooling
distractors:
- rule: 'Repository Structure: Backend: Located in the `openhands` directory'
  collision_type: architecture_boundary
  why_distracting: The config explicitly states that the backend is located in the
    `openhands` directory. However, this specific issue requires modifying the SaaS/Enterprise
    edition code located in `enterprise/server/`. An agent might get confused, assume
    it shouldn't touch the `enterprise` directory, or try to find the target file
    inside `openhands/` instead.
  severity: high
  source:
    path: AGENTS.md
    lines: 61-63
- rule: 'To run the full application to debug issues: export INSTALL_DOCKER=0 ...
    make build && make run ...'
  collision_type: scope_ambiguity
  why_distracting: The instructions for running the full application (`make build
    && make run ...`) launch the standard open-source OpenHands application. Since
    this bug is specific to the SaaS/Enterprise edition (involving API keys and organization
    bindings), attempting to reproduce or test the fix using the standard run command
    will likely fail or waste time, as the enterprise features may require a different
    setup or environment variables.
  severity: medium
  source:
    path: AGENTS.md
    lines: 8-12
hierarchy_analysis: The `AGENTS.md` file provides general repository guidelines that
  are heavily biased towards the open-source `openhands` directory. For enterprise-specific
  PRs, the agent must override the repository structure guidance and recognize that
  backend code also exists in the `enterprise/` directory.
