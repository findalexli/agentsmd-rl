    path: enterprise/server/utils/saas_app_conversation_info_injector.py
    lines: 354-365
    commit: 06cd53d752b022a7ae3676ab17c029f1f810c892
  evidence: The gold solution uses `hasattr(self.user_context, 'user_auth')` and `hasattr(user_auth,
    'get_api_key_org_id')` before accessing these attributes. This defensive programming
    approach handles both API key and cookie-based authentication.
  category: code_quality
- rule: Ensure code passes pre-commit hooks (Ruff formatting, trailing whitespace,
    missing newlines) before pushing changes.
  source:
    path: AGENTS.md
    lines: 16-26
  evidence: The patch maintains correct Python indentation and formatting, avoiding
    trailing whitespace or missing newlines, which aligns with the pre-commit hook
    requirements mentioned in the config.
  category: tooling
- rule: Run pre-commit hooks (e.g., `pre-commit run --config ./dev_config/python/.pre-commit-config.yaml`)
    to ensure lint errors and formatting issues are fixed before pushing.
  source:
    path: AGENTS.md
    lines: 16-20
  evidence: The patch introduces cleanly formatted Python code with proper indentation
    and no trailing whitespace, adhering to the repository's linting standards.
  category: tooling
distractors:
- rule: 'Backend: Located in the `openhands` directory'
  collision_type: architecture_boundary
  why_distracting: The config states that the backend is located in the `openhands`
    directory, but the target file for this PR is in `enterprise/server/utils/`. An
    agent might get confused about the repository structure, attempt to search for
    the file inside `openhands/`, or incorrectly assume the file needs to be moved
    to comply with the architecture guidelines.
  severity: medium
  source:
    path: AGENTS.md
    lines: 58-62
- rule: Store PR-specific artifacts like design documents or analysis notes in a `.pr/`
    directory.
  collision_type: scope_ambiguity
  why_distracting: The agent might waste time creating a `.pr/analysis.md` or `.pr/notes.md`
    file to document its investigation of the bug, which is unnecessary for a straightforward
    bug fix and distracts from simply patching the code.
  severity: low
  source:
    path: AGENTS.md
    lines: 35-43
- rule: Use cross-repo-testing skill when testing cloud workspace features or SDK
    against OH Cloud.
  source:
    path: .agents/skills/cross-repo-testing/SKILL.md
    lines: 1-5
  collision_type: scope_ambiguity
  why_distracting: The issue mentions 'OpenHands SaaS/Enterprise edition' and 'API
    key authentication'. The cross-repo-testing skill is triggered by 'test SDK against
    OH Cloud' or 'e2e test a cloud workspace feature'. An agent might incorrectly
    assume it needs to invoke this skill to test the SaaS API key feature, wasting
    time on irrelevant cross-repo testing setups.
  severity: low
hierarchy_analysis: The configuration consists of a single root-level `AGENTS.md`
  file. There is no complex hierarchy to navigate, but there is a slight contradiction
  between the stated repository structure (backend in `openhands`) and the actual
  location of the enterprise code (`enterprise/`).
