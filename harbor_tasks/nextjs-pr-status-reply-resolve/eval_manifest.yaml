distractors:
- rule: Start `pnpm --filter=next dev` in a separate terminal session before making
    edits to Next.js source or integration tests.
  collision_type: scope_ambiguity
  why_distracting: The rule mandates starting `pnpm --filter=next dev` when changing
    Next.js source. An agent might misinterpret `scripts/pr-status.js` as Next.js
    source and start the dev server, which is unnecessary for a standalone maintenance
    script and wastes time.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 68-70
- rule: Use full `pnpm build-all` before CI push or when changes span multiple packages.
  collision_type: scope_ambiguity
  why_distracting: The rule suggests running `pnpm build-all` when changes span multiple
    packages. An agent might trigger a full build after modifying the script and markdown
    files, which is completely unnecessary since these files are not part of the compiled
    Next.js output.
  severity: low
  source:
    path: CLAUDE.md
    lines: 86-88
hierarchy_analysis: The repository uses identical `CLAUDE.md` and `AGENTS.md` files
  at the root level. The rules are heavily focused on the core Next.js framework development
  (e.g., `packages/next/src/`), which creates scope ambiguity when agents work on
  standalone maintenance scripts in the `scripts/` directory or agent skill documentation.
