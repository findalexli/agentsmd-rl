distractors:
- rule: If you are changing Next.js source or integration tests, start `pnpm --filter=next
    dev` in a separate terminal session before making edits
  collision_type: scope_ambiguity
  why_distracting: The rule mandates starting the Next.js dev server when changing
    source code. An agent might mistakenly apply this to `scripts/pr-status.js`,
    wasting time starting a dev server that is irrelevant to a standalone Node script.
  severity: high
  source:
    path: AGENTS.md
    lines: 60-62
- rule: 'Always run a full bootstrap build after switching branches: git checkout
    <branch> \n pnpm build-all'
  collision_type: scope_ambiguity
  why_distracting: The rule requires running a full bootstrap build (`pnpm build-all`)
    after switching branches. An agent might run this heavy command before editing
    the script, which is unnecessary since the script doesn't depend on the compiled
    Next.js packages.
  severity: medium
  source:
    path: AGENTS.md
    lines: 82-85
hierarchy_analysis: The root AGENTS.md provides instructions for Next.js core development.
  However, the task involves modifying a standalone script (`scripts/pr-status.js`)
  and agent skill documentation (`.agents/skills/`). The agent must recognize that
  the scope of the root config (Next.js source) does not apply here, and avoid running
  heavy build commands or dev servers.
