rubric:
  - rule: "When modifying slime/ray/rollout.py, ensure the changes follow the existing code style and patterns used elsewhere in the file."

  - rule: "PD disaggregation fix should remove the assertion that prevented slime router from working with PD, and add appropriate feature flags instead."

  - rule: "Circuit breaker should be disabled for non-slime router when PD disaggregation is enabled, with a comment explaining why."
