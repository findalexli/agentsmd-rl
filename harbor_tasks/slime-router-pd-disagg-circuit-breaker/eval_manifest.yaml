    type: pass_to_pass
    origin: repo_tests
    description: "Repo's YAML files pass pre-commit check"

  - id: test_repo_precommit_private_key_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo has no private keys committed"

  - id: test_repo_precommit_large_files_check
    type: pass_to_pass
