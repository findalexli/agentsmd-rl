version: "2.0"

source:
  repo: "THUDM/slime"
  pr: 0  # internal sync — no public PR
  base_commit: "183e525f60fcf435f82f273e9eb69702d3ce431a"

checks:
  - id: test_syntax_check
    type: pass_to_pass
    origin: static
    description: "rollout.py must parse without syntax errors"

  - id: test_slime_router_pd_disagg_no_crash
    type: fail_to_pass
    origin: pr_diff
    description: "Slime router + PD disagg no longer crashes and spawns a Process returning (ip, port)"

  - id: test_slime_router_pd_flag_set
    type: fail_to_pass
    origin: pr_diff
    description: "Slime router with PD disagg sets slime_router_pd_disaggregation=True on router_args"

  - id: test_circuit_breaker_disabled_with_pd
    type: fail_to_pass
    origin: pr_diff
    description: "Non-slime router with PD disagg sets disable_circuit_breaker=True on router_args"

  - id: test_slime_router_without_pd_still_works
    type: pass_to_pass
    origin: pr_diff
    description: "Slime router without PD disagg still launches normally (regression)"

  - id: test_no_circuit_breaker_without_pd
    type: pass_to_pass
    origin: pr_diff
    description: "Non-slime router without PD disagg does not set disable_circuit_breaker (regression)"

  - id: test_not_stub
    type: pass_to_pass
    origin: static
    description: "_start_router has real logic, not stubbed out"

  - id: test_repo_ruff_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ruff linting passes on slime/ package"

  - id: test_repo_plugin_contracts
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's plugin contract tests pass (CPU-only, no GPU required)"

  - id: test_repo_plugin_rollout_contracts
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's plugin rollout contract tests pass"

  - id: test_repo_plugin_runtime_hook_contracts
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's plugin runtime hook contract tests pass (validates slime/ray/rollout.py callsites)"

  - id: test_repo_isort_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's isort import ordering check passes"

  - id: test_repo_black_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's black formatting check passes on slime/ package"

rubric:
  - rule: "Code must pass ruff linting (E, F, B, UP rules). Run `ruff check slime/` to verify."
    source:
      path: "pyproject.toml"
      lines: "25-36"
      commit: "183e525f60fcf435f82f273e9eb69702d3ce431a"

  - rule: "Imports must follow isort ordering with black profile. First party packages (slime, slime_plugins) should be separated from third party."
    source:
      path: "pyproject.toml"
      lines: "9-19"
      commit: "183e525f60fcf435f82f273e9eb69702d3ce431a"

  - rule: "When modifying router/rollout code, follow existing patterns for argument handling and router initialization. Check neighboring functions in slime/ray/rollout.py for patterns."
    source:
      path: ".claude/skills/add-rollout-function/SKILL.md"
      lines: "100-107"
      commit: "183e525f60fcf435f82f273e9eb69702d3ce431a"
