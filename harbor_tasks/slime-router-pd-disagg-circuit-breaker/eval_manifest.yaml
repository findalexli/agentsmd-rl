rubric:
- rule: When modifying slime/ray/rollout.py, ensure the changes follow the existing
    code style and patterns used elsewhere in the file.
- rule: PD disaggregation fix should remove the assertion that prevented slime router
    from working with PD, and add appropriate feature flags instead.
- rule: Circuit breaker should be disabled for non-slime router when PD disaggregation
    is enabled, with a comment explaining why.
distractors:
- rule: Required callable signature for rollout function
  source:
    path: .claude/skills/add-rollout-function/SKILL.md
    lines: 34-41
  source_text: "Required callable signature:\n\n```python\ndef generate_rollout(args,\
    \ rollout_id, data_source, evaluation=False) -> RolloutFnTrainOutput | RolloutFnEvalOutput:\n\
    \    ...\n```\n\nReturn types are defined in `slime/rollout/base_types.py`."
  collision_type: architecture_boundary
  why_distracting: The file modified in the gold diff is `slime/ray/rollout.py`, which
    is the distributed orchestration layer for rollout. The skill `add-rollout-function/SKILL.md`
    provides rules for writing a custom data generation logic function. An agent might
    misinterpret the filename overlap and mistakenly try to enforce this generation
    function signature or return type in the orchestration layer.
  severity: medium
- rule: Reward post-processing hook in slime/ray/rollout.py
  source:
    path: .claude/skills/add-reward-function/SKILL.md
    lines: 53-69
  source_text: "### Step 4: Optional Reward Post-Processing\n\nTo customize normalization/shaping\
    \ before advantage computation, add:\n\n```python\ndef post_process_rewards(args,\
    \ samples):\n    # return (raw_rewards, processed_rewards)\n    ...\n```\n\nWire\
    \ with:\n\n```bash\n--custom-reward-post-process-path <module>.post_process_rewards\n\
    ```\n\nThis hook is consumed in `slime/ray/rollout.py`."
  collision_type: scope_ambiguity
  why_distracting: The rule explicitly names `slime/ray/rollout.py` (the file modified
    in the gold diff) as the place where the custom reward post-process hook is consumed.
    An agent working in this file might incorrectly assume they should interact with
    or modify the reward post-processing logic, when the diff is purely about configuring
    the router for PD disaggregation and disabling the circuit breaker.
  severity: medium
