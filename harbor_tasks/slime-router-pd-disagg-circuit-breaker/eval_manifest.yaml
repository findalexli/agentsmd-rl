    description: "_start_router has real logic, not stubbed out"

  - id: test_repo_ruff_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ruff linting passes on slime/ package"

  - id: test_repo_ruff_format_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ruff format check passes on slime/ package"

  - id: test_repo_plugin_contracts
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's plugin contract tests pass (CPU-only, no GPU required)"

  - id: test_repo_plugin_rollout_contracts
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's plugin rollout contract tests pass"

  - id: test_repo_plugin_runtime_hook_contracts
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's plugin runtime hook contract tests pass (validates slime/ray/rollout.py callsites)"

  - id: test_repo_plugin_path_loading_contracts
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's plugin path loading contract tests pass"

  - id: test_repo_plugin_generate_contracts
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's plugin generate contract tests pass"

  - id: test_repo_isort_check
    type: pass_to_pass
