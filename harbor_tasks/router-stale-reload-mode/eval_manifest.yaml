source:
  repo: TanStack/router
  pr_number: 6921
  title: "feat: add staleReloadMode"
  base_commit: "79cd4d5afa22903f94655602d244f83bdc220641"
  merge_commit: "6f297a249424c0fd1c1a56aa4fc12c8217be7b6a"
  description: |
    Adds a staleReloadMode feature to TanStack Router for controlling how stale
    successful loader data is revalidated. Supports 'background' (default, non-blocking)
    and 'blocking' (waits for fresh data) modes. Can be configured at the router level
    (defaultStaleReloadMode) or per-route loader (loader.staleReloadMode).

checks:
