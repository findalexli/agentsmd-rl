  - id: test_types_exported
    type: fail_to_pass
    origin: code_structure
    description: LoaderStaleReloadMode and RouteLoaderEntry types are exported from router-core
    source: packages/router-core/src/index.ts

  - id: test_route_loader_object_type_exists
    type: fail_to_pass
    origin: code_structure
    description: RouteLoaderObject type with staleReloadMode property is defined
    source: packages/router-core/src/route.ts

  - id: test_resolve_route_loader_fn_type_exists
    type: fail_to_pass
    origin: code_structure
    description: ResolveRouteLoaderFn helper type is defined
    source: packages/router-core/src/route.ts

  - id: test_loader_stale_reload_mode_type_defined
    type: fail_to_pass
    origin: code_structure
    description: LoaderStaleReloadMode type is defined as 'background' | 'blocking'
    source: packages/router-core/src/route.ts:1417

  - id: test_router_options_has_default_stale_reload_mode
    type: fail_to_pass
    origin: code_structure
