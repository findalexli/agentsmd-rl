    description: Stale loaders reload in background by default

  - id: test_blocking_stale_reload_loader_level
    type: fail_to_pass
    origin: repo_tests
    description: Loader-level staleReloadMode blocking waits for reload

  - id: test_blocking_stale_reload_router_default
    type: fail_to_pass
    origin: repo_tests
    description: Router defaultStaleReloadMode blocking waits for reload

  - id: test_loader_overrides_router_default
    type: fail_to_pass
    origin: repo_tests
    description: Loader-level staleReloadMode overrides router default

  # Pass-to-pass tests (CI/CD)
