    source: packages/router-core/src/load-matches.ts:660

  - id: test_load_matches_uses_should_reload_in_background
    type: fail_to_pass
    origin: code_structure
    description: load-matches.ts uses shouldReloadInBackground flag
    source: packages/router-core/src/load-matches.ts:855

  - id: test_load_matches_respects_stale_reload_mode
    type: fail_to_pass
    origin: code_structure
    description: shouldReloadInBackground is checked before early return for stale data
    source: packages/router-core/src/load-matches.ts:883

  - id: test_fileroute_uses_route_loader_entry
    type: fail_to_pass
    origin: code_structure
    description: fileRoute.ts files use RouteLoaderEntry instead of RouteLoaderFn
    source:
      - packages/react-router/src/fileRoute.ts
      - packages/solid-router/src/fileRoute.ts
      - packages/vue-router/src/fileRoute.ts

  # Behavioral tests (from PR test suite)
