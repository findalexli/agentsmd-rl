config_edits:
- path: CLAUDE.md
  tier: 2
  gold_added: "## Reading PR Feedback\n\n`gh pr view --comments` is fine for a quick\
    \ look at the Conversation tab, but it has a footgun worth knowing about: it only\
    \ returns issue-stream comments and silently omits review summaries and line-level\
    \ review comments. If a reviewer leaves an inline comment on a specific file line,\
    \ it will not show up \u2014 no error, no hint that anything is missing.\n\nWhen\
    \ you want the complete picture \u2014 especially when responding to a review\
    \ or checking whether anyone requested changes \u2014 use `bun run pr:comments`.\
    \ It fetches all three GitHub endpoints (`/issues/N/comments`, `/pulls/N/reviews`,\
    \ `/pulls/N/comments`) and prints them in one chronological listing, each labelled\
    \ with its actual type (issue comment, review verdict, line comment, reply, suggestion\
    \ block).\n\n```bash\nbun run pr:comments                    # current branch's\
    \ PR\nbun run pr:comments 28838              # by PR number\nbun run pr:comments\
    \ '#28838'           # also works\nbun run pr:comments https://github.com/oven-sh/bun/pull/28838\n\
    \n# Machine-readable output for jq pipelines \u2014 one object per entry with\n\
    # { when, user, kind, location?, body, url?, resolved?, outdated? }.\n# resolved/outdated\
    \ come from GraphQL reviewThreads and are present only\n# on line comments / replies\
    \ whose thread state was successfully fetched\n# (omitted on issue comments, review\
    \ verdicts, and on GraphQL fetch\n# failure), so `resolved == false` unambiguously\
    \ means \"confirmed open\n# thread\". No header, no truncation. The PR is optional\
    \ here too\n# (defaults to the current branch's PR).\nbun run pr:comments --json\
    \ | jq '.[] | select(.user == \"Jarred-Sumner\")'\nbun run pr:comments --json\
    \ | jq '[.[] | select(.resolved == false)]'   # still open\n```\n"
  gold_removed: ''
