distractors:
- rule: If you are changing Next.js source or integration tests, start `pnpm --filter=next dev` in a separate terminal session before making edits.
  collision_type: meta_confusion
  why_distracting: The rule instructs the agent to start a background dev server (`pnpm --filter=next dev`) before making edits to integration tests. In an automated evaluation or scripting context, attempting to start a long-running background process could hang the execution or overcomplicate the task, which only requires static file modifications.
  severity: medium
  source:
    path: AGENTS.md
    lines: 61-65
- rule: Before editing or creating files in any subdirectory, read all README.md files in the directory path from the repo root up to and including the target file's directory.
  collision_type: scope_ambiguity
  why_distracting: The rule asks the agent to read all README.md files in the directory path up to the target file before creating files. The agent might waste time searching for non-existent READMEs in the deep `test/e2e/app-dir/segment-cache/staleness/app/per-page-config/` hierarchy instead of just creating the requested hub pages.
  severity: low
  source:
    path: AGENTS.md
    lines: 38-42
hierarchy_analysis: The configuration is relatively flat, relying primarily on a single root `AGENTS.md` file (symlinked to `CLAUDE.md`). The complexity comes from the task instruction requiring the agent to modify this very configuration file and scaffold a new skill file, making it a meta-referential task.
