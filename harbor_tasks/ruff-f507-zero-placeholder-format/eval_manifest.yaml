checks:
  - id: cargo_build
    type: pass_to_pass
    origin: static
    description: "Ruff compiles and strings.rs is not truncated"

  - id: literal_rhs_flagged
    type: pass_to_pass
    origin: pr_diff
    description: "Zero-placeholder format strings with literal/tuple RHS flagged as F507 (pre-existing behavior, regression)"

  - id: variable_rhs_flagged
    type: fail_to_pass
    origin: pr_diff
    description: "Zero-placeholder format strings with variable RHS flagged as F507"

  - id: dynamic_rhs_flagged
    type: fail_to_pass
    origin: pr_diff
    description: "Zero-placeholder format strings with dynamic RHS (calls, attrs) flagged"

  - id: empty_tuple_not_flagged
    type: pass_to_pass
    origin: pr_diff
    description: "Empty tuple RHS is valid at runtime and must not be flagged"

  - id: existing_mismatches_still_flagged
    type: pass_to_pass
    origin: pr_diff
    description: "Pre-existing non-zero-placeholder mismatch cases still detected"

  - id: correct_usage_not_flagged
    type: pass_to_pass
    origin: pr_diff
    description: "Correct %-format usage produces zero F507 violations"

  - id: no_function_local_imports
    type: pass_to_pass
    origin: agent_config
    description: "Rust imports at file top, not inside function bodies"
    source:
      path: "AGENTS.md"
      lines: "76"
      commit: "690ef81f553ca0ce2f477e8030f4ab49abea4b01"

  - id: no_new_unsafe_patterns
    type: pass_to_pass
    origin: agent_config
    description: "No new .unwrap(), panic!(), or unreachable!() calls added to strings.rs"
    source:
      path: "AGENTS.md"
      lines: "79"
      commit: "690ef81f553ca0ce2f477e8030f4ab49abea4b01"

