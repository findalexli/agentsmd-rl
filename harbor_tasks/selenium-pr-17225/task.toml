[task]
name = "selenium-json-exception-field-names"
description = "Add field names to JsonException error messages for duplicate field detection"
difficulty = "medium"
tags = ["java", "json", "error-handling", "refactoring"]

[task.time_estimates]
human_minutes = 30
agent_minutes = 15

[environment]
dockerfile = "environment/Dockerfile"
workdir = "/workspace/selenium"

[solution]
solve_script = "solution/solve.sh"

[evaluation]
test_script = "tests/test.sh"
manifest = "eval_manifest.yaml"

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
