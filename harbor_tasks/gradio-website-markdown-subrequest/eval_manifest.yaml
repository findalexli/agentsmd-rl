distractors:
- rule: Do not open one-off PRs for tiny edits (single typo, isolated lint cleanup,
    one mutable default argument, etc.).
  collision_type: scope_ambiguity
  why_distracting: The agent might refuse to implement this fix because it only changes
    a few lines in one file, misclassifying a significant performance optimization
    (removing a fetch-parse-rewrite cycle in an edge function) as a 'tiny edit' or
    'low-value busywork'.
