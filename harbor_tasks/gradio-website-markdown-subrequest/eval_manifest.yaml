version: "2.0"

source:
  repo: "gradio-app/gradio"
  pr: 13123
  base_commit: "e900202946a615f8fea84253d7a4377fe8a504f0"
  merge_commit: "26be3ade4cf23a73fe9cee119cafc22f274f1ef3"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Target TypeScript file must parse without errors"

  - id: doc_redirect
    type: fail_to_pass
    origin: pr_diff
    description: "serveDocMarkdown returns 3xx redirect to /api/markdown/<doc> for LLM user-agents"

  - id: guide_redirect
    type: fail_to_pass
    origin: pr_diff
    description: "serveGuideMarkdown returns 3xx redirect to /api/markdown/guide/<guide> for LLM user-agents"

  - id: no_subrequest
    type: fail_to_pass
    origin: pr_diff
    description: "Handlers must not make fetch() subrequests for LLM requests"

  - id: non_llm_fallthrough
    type: pass_to_pass
    origin: pr_diff
    description: "Non-LLM user-agents fall through to next() for both handlers"

  - id: exports_callable
    type: pass_to_pass
    origin: static
    description: "serveDocMarkdown and serveGuideMarkdown are exported async functions"

rubric:
  - rule: "Be consistent with the style of the surrounding code."
    source:
      path: "AGENTS.md"
      lines: "45"
      commit: "e900202946a615f8fea84253d7a4377fe8a504f0"
