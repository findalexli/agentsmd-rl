source_pr:
  owner: MystenLabs
  repo: sui
  number: 26122
  title: "Fix MISSING_DEPENDENCY panic for benchmarks that use Move stdlib"
  merge_commit: 2aaedb4930089a7ba741b246a3f8377303267351
  base_commit: 9ae4df2ec0416c7b051b128a8a8d3bd23efbfe1f

# Task metadata
name: sui-fix-benchmark-missing-dependency
description: Fix MISSING_DEPENDENCY panic in Move language benchmarks by moving modules from address 0x1 to 0x2
difficulty: medium
tags: [rust, move, benchmarks, vm, stdlib]
estimated_time: 30

# Evaluation checks
checks:
  # Fail-to-pass checks - these test the fix works
  - id: test_bench_addr_constant_exists
    type: fail_to_pass
    description: BENCH_ADDR constant must be defined for address 0x2

  - id: test_bench_addr_str_constant_exists
    type: fail_to_pass
    description: BENCH_ADDR_STR constant must be defined as '0x2'

  - id: test_publish_stdlib_function_exists
    type: fail_to_pass
    description: publish_stdlib function must be defined to load stdlib before benchmarks

  - id: test_named_addresses_insert_bench
    type: fail_to_pass
    description: Compiler must use 'bench' named address mapped to 0x2

  - id: test_bench_function_calls_publish_stdlib
    type: fail_to_pass
    description: bench() function must call publish_stdlib before execute()

  - id: test_move_files_use_bench_address
    type: fail_to_pass
    description: All .move benchmark files must use 0x2::bench module instead of 0x1::bench

  - id: test_call_move_uses_bench_xmodule_address
    type: fail_to_pass
    description: call.move must use 0x2 for cross-module calls

  - id: test_criterion_bench_function_calls_publish_stdlib
    type: fail_to_pass
    description: Benchmarks must run without MISSING_DEPENDENCY panic

  - id: test_cross_module_disabled
    type: fail_to_pass
    description: cross_module benchmark must be disabled (uses multi-address packages)

  # Pass-to-pass checks - these ensure existing functionality still works
  - id: test_cargo_check_passes
    type: pass_to_pass
    description: cargo check must pass on the crate

  - id: test_move_files_compile
    type: pass_to_pass
    description: Move files must compile successfully

  - id: test_cargo_clippy_passes
    type: pass_to_pass
    origin: repo_ci
    description: cargo clippy must pass on language-benchmarks

  - id: test_cargo_test_compile_passes
    type: pass_to_pass
    origin: repo_ci
    description: cargo test --no-run must compile successfully

# Agent configuration rules to check
agent_config:
