distractors:
- rule: '`guides/` — written guides and tutorials for the website'
  collision_type: architecture_boundary
  why_distracting: The issue asks to fix the 'Guide Pages' missing a table of contents.
    An agent might interpret this as needing to modify the actual guide contents in
    the `guides/` directory. However, the fix requires changing the Svelte layout
    component in `js/_website/`.
  severity: high
  source:
    path: AGENTS.md
    lines: 16-16
- rule: Run backend tests locally with `bash scripts/run_backend_tests.sh`.
  collision_type: scope_ambiguity
  why_distracting: The rule mandates running backend tests locally, but this PR is
    strictly a frontend UI change in a Svelte component. Running backend tests would
    waste agent time and compute.
  severity: low
  source:
    path: AGENTS.md
    lines: 35-35
- rule: Use gr.HTML to create custom HTML components.
  source:
    path: .agents/skills/gradio/SKILL.md
    lines: '112'
  source_text: If a task requires significant customization of an existing component
    or a component that doesn't exist in Gradio, you can create one with `gr.HTML`.
    It supports `html_template` (with `${}` JS expressions and `{{}}` Handlebars syntax),
    `css_template` for scoped styles, and `js_on_load` for interactivity — where `props.value`
    updates the component value and `trigger('event_name')` fires Gradio events. For
    reuse, subclass `gr.HTML` and define `api_info()` for API/MCP support. See the
    [full guide](https://www.gradio.app/guides/custom-HTML-components).
  collision_type: architecture_boundary
  why_distracting: Since the PR requires adding a custom UI element (a table of contents)
    with HTML/CSS, an agent reading this skill might mistakenly attempt to implement
    the feature in Python using the Gradio `gr.HTML` component instead of modifying
    the actual Svelte codebase for the website.
  severity: high
- rule: Wire event listeners using the component.event_name() Python signature.
  source:
    path: .agents/skills/gradio/SKILL.md
    lines: 216-244
  source_text: "All event listeners share the same signature:\n\n```python\ncomponent.event_name(\n\
    \    fn: Callable | None | Literal[\"decorator\"] = \"decorator\",\n    inputs:\
    \ Component | Sequence[Component] | set[Component] | None = None,\n    outputs:\
    \ Component | Sequence[Component] | set[Component] | None = None,\n    api_name:\
    \ str | None = None,\n    api_description: str | None | Literal[False] = None,\n\
    \    scroll_to_output: bool = False,\n    show_progress: Literal[\"full\", \"\
    minimal\", \"hidden\"] = \"full\",\n    show_progress_on: Component | Sequence[Component]\
    \ | None = None,\n    queue: bool = True,\n    batch: bool = False,\n    max_batch_size:\
    \ int = 4,\n    preprocess: bool = True,\n    postprocess: bool = True,\n    cancels:\
    \ dict[str, Any] | list[dict[str, Any]] | None = None,\n    trigger_mode: Literal[\"\
    once\", \"multiple\", \"always_last\"] | None = None,\n    js: str | Literal[True]\
    \ | None = None,\n    concurrency_limit: int | None | Literal[\"default\"] = \"\
    default\",\n    concurrency_id: str | None = None,\n    api_visibility: Literal[\"\
    public\", \"private\", \"undocumented\"] = \"public\",\n    time_limit: int |\
    \ None = None,\n    stream_every: float = 0.5,\n    key: int | str | tuple[int\
    \ | str, ...] | None = None,\n    validator: Callable | None = None,\n) -> Dependency\n\
    ```"
  collision_type: meta_confusion
  why_distracting: The PR requires listening to scroll events to dynamically update
    the active header on the page. An agent reading this might mistakenly try to wire
    events using Python's `component.event_name(...)` instead of writing idiomatic
    Svelte reactive statements and using DOM event bindings.
  severity: high
hierarchy_analysis: The repository uses a single AGENTS.md file at the root level,
