distractors:
- rule: Think of the resource and property it affects... both resources and properties
    can be nested, and have separate directories.
  collision_type: scope_ambiguity
  why_distracting: The rule suggests creating nested directories for specific properties/resources
    (e.g., `Users/Status/Update.php`). An agent might over-engineer the solution by
    trying to extract the metadata initialization into a separate `Metadata/Create.php`
    endpoint to separate concerns. However, the metadata bootstrap is designed to
    happen transparently during the main collection creation, and ensuring it happens
    transparently during the main collection creation, and extracting it would
    break the API contract.
  severity: medium
  source:
    path: src/Appwrite/Platform/AGENTS.md
    lines: 31-35
hierarchy_analysis: The hierarchy consists of a root `AGENTS.md` defining the global
  stack and architecture, and a module-specific `src/Appwrite/Platform/AGENTS.md`
  detailing directory structures. The rules are complementary, but the agent must
  recognize that the module-specific nesting rules apply to new endpoint creation,
  not to internal transparent bootstrapping logic within an existing endpoint.
