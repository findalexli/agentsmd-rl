distractors:
- rule: PHP 8.3+, Swoole 6.x (async runtime, replaces PHP-FPM)
  collision_type: architecture_boundary
  why_distracting: Knowing the stack uses Swoole (an async runtime), an agent might
    try to implement complex application-level locking (like Swoole coroutine locks,
    mutexes, or Redis locks) to prevent the race condition before the `create()` call.
    This is overkill, adds unnecessary complexity, and could cause deadlocks compared
    to simply catching the database's native `DuplicateException`.
  severity: high
  source:
    path: AGENTS.md
    lines: 18-19
- rule: For non-CRUD operations, model the endpoint as a property update.
  collision_type: scope_ambiguity
  why_distracting: An agent might interpret the one-time metadata bootstrap as a non-CRUD
    operation and attempt to extract it into a separate endpoint or file (e.g., `Metadata/Update.php`),
    overcomplicating a simple inline race condition fix and expanding the scope of
    the PR unnecessarily.
  severity: medium
  source:
    path: src/Appwrite/Platform/AGENTS.md
    lines: 31-35
hierarchy_analysis: The rules in `src/Appwrite/Platform/AGENTS.md` (Level 3) reinforce
  and expand upon the base `AGENTS.md` (Level 0) regarding HTTP directory structure
  and naming conventions. The base `AGENTS.md` provides the stack details (Swoole)
  which is crucial for understanding the runtime environment, but in this specific
  concurrency scenario, it acts as a distractor that could lead an agent to over-engineer
  a solution.
