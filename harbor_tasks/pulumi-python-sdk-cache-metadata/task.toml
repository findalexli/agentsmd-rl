name = "pulumi-python-sdk-cache-metadata"
pr_number = 22422
base_commit = "e0c59e5dd6bb3b55d16113be96e338bce3172cf5"
merge_commit = "91c0ddd97a76a8c7bce9de5c8530d879f5d71e05"
difficulty = "easy"
estimated_time = "15 min"

description = """
Cache type metadata and class references in Python SDK to reduce CPU overhead during serialization.
The PR adds @functools.cache decorators to _py_properties and _types_from_py_functions, and
implements module-level caching for class references in known_types.py to avoid repeated import
machinery overhead.
"""

tags = ["python", "performance", "caching", "pulumi"]

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
