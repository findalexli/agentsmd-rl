distractors:
- rule: Use `x-backend` for backend plugin package names.
  source:
    path: docs/architecture-decisions/adr011-plugin-package-structure.md
    lines: 38-40
  source_text: "- `x-backend`: Contains the main backend code of the plugin.\n- `x-backend-module-<name>`:\
    \ Contains optional modules related to the backend\n  plugin package."
  collision_type: scope_ambiguity
  why_distracting: 'The changed package is `plugins/mcp-actions-backend`, so an agent
    could wrongly apply this package-naming rule to the runtime `pluginId` and try
    to rename `pluginId: ''mcp-actions''` to `''mcp-actions-backend''`. That rule
    governs package names, not runtime plugin IDs; changing the ID would conflict
    with existing runtime lookups such as `discovery.getBaseUrl(''mcp-actions'')`
    in the same file.'
  severity: high
- rule: If a file has a single or a main export, name the file after the export.
  source:
    path: STYLE.md
    lines: '30'
  source_text: 1. If a file has a single or a main export, name the file after the
    export.
  collision_type: architecture_boundary
  why_distracting: '`plugins/mcp-actions-backend/src/plugin.ts` mainly exports `mcpPlugin`,
    so this can tempt an unnecessary rename to `mcpPlugin.ts`. In this package, `src/index.ts`
    re-exports `./plugin` and tests import `./plugin`; renaming the file would create
    unrelated entrypoint churn and can break established package wiring if done incompletely.'
  severity: medium
- rule: We will stop using default exports except when absolutely necessary.
  source:
    path: docs/architecture-decisions/adr003-avoid-default-exports.md
    lines: 50-51
  source_text: 'We will stop using default exports except when absolutely necessary
    (such as

    [`React.lazy`](https://18.react.dev/reference/react/lazy) modules).'
  collision_type: would_cause_bug
  why_distracting: 'Because the diff touches the plugin entrypoint, an agent might
    try to ''clean up'' exports by removing the package''s default export from `plugins/mcp-actions-backend/src/index.ts`.
    That would be an unrelated breaking API change: the package currently publishes
    `export default mcpPlugin` in `src/index.ts` and in `report.api.md`.'
  severity: high
- rule: Do not destruct parameters in public function declarations.
  source:
    path: STYLE.md
    lines: 200-202
  source_text: '## Do not destruct parameters in public function declarations


    If the parameters of a function are destructed in the parameter list, they will
    show up in the documentation like this:'
  collision_type: scope_ambiguity
  why_distracting: The diff modifies `async init({ ... })`, so this documentation
    rule looks nearby-relevant. But `init` here is an internal callback passed to
    `env.registerInit`, not a public exported API surface; refactoring it for docs-style
    reasons would add noise without improving the package contract.
  severity: low
