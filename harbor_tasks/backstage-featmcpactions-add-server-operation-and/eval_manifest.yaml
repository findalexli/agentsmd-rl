- rule: Prioritize consistency over correctness, stick to existing patterns within
    the same class/file/folder/package.
  source:
    path: STYLE.md
    lines: '57'
  source_text: 1. Prioritize consistency over correctness, stick to existing patterns
    within the same class/file/folder/package.
  evidence: 'The patch adds `metrics` by following the exact dependency-threading
    pattern already used in this file: it imports `metricsServiceRef` (gold diff line
    7), adds `metrics: metricsServiceRef` to `deps` (line 15), destructures `metrics`
    in `init` (line 23), and forwards it into `McpService.create` and `createSseRouter`
    (lines 27 and 35).'
  category: api_design
  verification: llm_judge
- rule: Consume interfaces rather than concrete implementations.
  source:
    path: STYLE.md
    lines: '58'
  source_text: 1. Consume interfaces rather than concrete implementations.
  evidence: 'The plugin does not construct a metrics implementation itself. Instead
    it declares `metrics: metricsServiceRef` in the backend dependency map (gold diff
    line 15) and passes the injected `metrics` service into downstream helpers (lines
    27 and 35).'
  category: architecture
  verification: llm_judge
- rule: When there is a significant number of arguments to a function or method, prefer
    to use a single options object as the argument, rather than many positional arguments.
  source:
    path: STYLE.md
    lines: '144'
  source_text: 1. When there is a significant number of arguments to a function or
    method, prefer to use a single options object as the argument, rather than many
    positional arguments.
  evidence: 'The new dependency is added as a named property inside existing options
    objects instead of introducing positional arguments: `McpService.create({ actions,
    metrics })` (gold diff lines 25-28) and `createSseRouter({ mcpService, httpAuth,
    logger, metrics })` (lines 30-36).'
  category: api_design
  verification: llm_judge
