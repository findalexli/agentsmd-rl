version: "2.0"

source:
  repo: "vercel/next.js"
  pr: 92167
  base_commit: "8a241bb504bf167d191b96e914b7785156510038"
  merge_commit: "4b62ff78c0ad4117477ab78806df809f4c1f8b33"

checks:
  # Pass-to-pass gates (existing repo CI checks)
  - id: turbo_json_valid_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "turbo.json must parse as valid JSON via Python json.tool"

  - id: turbo_jsonc_valid_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "packages/next-swc/turbo.jsonc must parse as valid JSONC via node"

  - id: next_swc_package_json_valid
    type: pass_to_pass
    origin: repo_tests
    description: "packages/next-swc/package.json must be valid JSON with required scripts via node"

  - id: root_package_json_valid
    type: pass_to_pass
    origin: repo_tests
    description: "package.json must be valid JSON with required scripts"

  - id: rust_fingerprint_script_valid
    type: pass_to_pass
    origin: repo_tests
    description: "scripts/rust-fingerprint.js must have valid Node.js syntax"

  # Fail-to-pass gates (PR-specific behavioral tests)
  - id: rust_fingerprint_writes_stamp
    type: fail_to_pass
    origin: pr_diff
    description: "rust-fingerprint.js writes TURBO_HASH to stamp file when env var is set"

  - id: rust_fingerprint_skips_without_turbo_hash
    type: fail_to_pass
    origin: pr_diff
    description: "rust-fingerprint.js exits 0 and skips when TURBO_HASH is unset"

  - id: turbo_jsonc_has_fingerprint_task
    type: fail_to_pass
    origin: pr_diff
    description: "turbo.jsonc defines rust-fingerprint task with Rust source inputs and stamp output"

  - id: build_tasks_depend_on_fingerprint
    type: fail_to_pass
    origin: pr_diff
    description: "Rust build/check tasks depend on rust-fingerprint instead of duplicating globs"

  - id: build_tasks_use_stamp_not_globs
    type: fail_to_pass
    origin: pr_diff
    description: "Build tasks use stamp file input, not old duplicated Rust source globs"

  - id: sccache_passthrough_env
    type: fail_to_pass
    origin: pr_diff
    description: "turbo.json globalPassThroughEnv includes SCCACHE_* and RUSTC_WRAPPER"

  - id: ci_in_global_env
    type: fail_to_pass
    origin: pr_diff
    description: "turbo.json globalEnv includes CI"

  - id: package_json_fingerprint_script
    type: fail_to_pass
    origin: pr_diff
    description: "packages/next-swc/package.json defines rust-fingerprint script"

rubric:
  - rule: "When adding new scripts to the scripts/ directory, include a descriptive comment header explaining the script's purpose and any environment variables it uses."
    source:
      path: "CLAUDE.md"
      lines: "302-309"
      commit: "8a241bb504bf167d191b96e914b7785156510038"

  - rule: "For changes to build configuration (turbo.json, turbo.jsonc, package.json scripts), verify the changes work with the actual build system (e.g., turbo tasks must have proper inputs/outputs defined)."
    source:
      path: "CLAUDE.md"
      lines: "353-358"
      commit: "8a241bb504bf167d191b96e914b7785156510038"

  - rule: "When modifying package.json files (especially in packages/next-swc/), ensure scripts are properly named and follow the existing naming convention (e.g., rust-* prefix for Rust-related scripts)."
    source:
      path: "CLAUDE.md"
      lines: "55-69"
      commit: "8a241bb504bf167d191b96e914b7785156510038"
