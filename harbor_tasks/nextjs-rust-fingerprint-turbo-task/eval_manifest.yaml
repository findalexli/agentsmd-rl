rubric:
- rule: When adding new scripts to the scripts/ directory, include a descriptive comment
    header explaining the script's purpose and any environment variables it uses.
  source:
    path: CLAUDE.md
    lines: 302-309
    commit: 8a241bb504bf167d191b96e914b7785156510038
- rule: For changes to build configuration (turbo.json, turbo.jsonc, package.json
    scripts), verify the changes work with the actual build system (e.g., turbo tasks
    must have proper inputs/outputs defined).
  source:
    path: CLAUDE.md
    lines: 353-358
    commit: 8a241bb504bf167d191b96e914b7785156510038
- rule: When modifying package.json files (especially in packages/next-swc/), ensure
    scripts are properly named and follow the existing naming convention (e.g., rust-*
    prefix for Rust-related scripts).
  source:
    path: CLAUDE.md
    lines: 55-69
    commit: 8a241bb504bf167d191b96e914b7785156510038
- rule: Place build and maintenance scripts in the `scripts/` directory.
  source:
    path: CLAUDE.md
    lines: 12-20
  evidence: The gold solution creates `scripts/rust-fingerprint.js`, correctly placing
    the new build script in the designated `scripts/` directory as defined by the
    monorepo overview.
  category: architecture
distractors:
- rule: Start `pnpm --filter=next dev` in a separate terminal session before making
    edits to Next.js source.
  collision_type: scope_ambiguity
  why_distracting: The rule requires starting `pnpm --filter=next dev` when changing
    Next.js source. An agent might think modifying `packages/next-swc` or `turbo.json`
    qualifies as Next.js source and try to run the dev server, which is completely
    irrelevant for testing Rust turbo fingerprinting and sccache passthrough.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 61-65
- rule: Read all `README.md` files in the directory path from the repo root up to
    and including the target file's directory before editing.
  collision_type: meta_confusion
  why_distracting: The rule instructs the agent to read all `README.md` files in the
    directory path before editing files in subdirectories like `packages/*`. For a
    pure build-system/turbo configuration task, searching for and reading these READMEs
    will waste context window and time without providing actionable information for
    the task.
  severity: low
  source:
    path: CLAUDE.md
    lines: 44-50
hierarchy_analysis: The configuration relies entirely on the root `CLAUDE.md` (symlinked
  to `AGENTS.md`). The rules are heavily focused on the core Next.js TypeScript/JavaScript
  development loop, which creates scope ambiguity when the task involves the Rust
  build pipeline and Turborepo configuration.
