rubric:
- rule: Skill documentation follows the existing format in copilot-instructions.md
    (Purpose, Trigger phrases, Categories)
  source:
    path: .github/copilot-instructions.md
    lines: 249-260
    commit: 71e5c2f595d7cc104adc18753a646e9c557c10da
- rule: SKILL.md files MUST include YAML frontmatter with name, description, and metadata
    (author, version)
  source:
    path: .github/skills/pr-build-status/SKILL.md
    lines: 1-8
    commit: 71e5c2f595d7cc104adc18753a646e9c557c10da
- rule: Skills must be documented in the copilot instructions with their path, purpose,
    and trigger phrases so that agents and users know how and when to invoke them.
  source:
    path: .github/copilot-instructions.md
    lines: 265-275
  evidence: The gold solution adds the `run-integration-tests` skill to the copilot
    instructions following the established format for other skills, including the
    skill name in bold, the path to the SKILL.md file,
  category: documentation
distractors:
- rule: When performing a code review on PRs that change functional code, run the
    pr-finalize skill to verify that the PR title and description accurately match
    the actual implementation.
  collision_type: meta_confusion
  why_distracting: The config instructs the agent to run the `pr-finalize` skill when
    reviewing PRs that change functional code. An agent might get confused between
    its role as a PR reviewer and a PR author, attempting to invoke `pr-finalize`
    or writing review comments instead of just implementing the requested skill.
  severity: medium
  source:
    path: .github/copilot-instructions.md
    lines: 10-12
- rule: 'Testing frameworks: xUnit for Unit tests, NUnit for UI tests, Appium for
    UI test automation'
  collision_type: scope_ambiguity
  why_distracting: The config explicitly lists xUnit for Unit tests and NUnit/Appium
    for UI tests, but omits Integration tests. An agent might try to force the integration
    tests into one of these categories, change the test framework, or move the files
    to match the documented paths, which would break the existing integration test
    infrastructure.
  severity: low
  source:
    path: .github/copilot-instructions.md
    lines: 25-29
hierarchy_analysis: 'The task involves a flat configuration structure where the agent
  must edit the very configuration file (`.github/copilot-instructions.md`) that governs
  its behavior. The challenge is meta-referential: the agent must understand the implicit
  schema of its own instructions to correctly append new capabilities without breaking
  existing ones.'
