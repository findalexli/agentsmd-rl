    commit: 9f94bdb49634bda90a2804585b8d739228dde876
- rule: The solution should import Duration from effect.
  source:
    path: packages/opencode/src/config/config.ts
    commit: 9f94bdb49634bda90a2804585b8d739228dde876
- rule: The solution should use const destructuring for the cache and invalidate handle.
  source:
    path: packages/opencode/src/config/config.ts
    commit: 9f94bdb49634bda90a2804585b8d739228dde876
distractors:
- rule: Use `Effect.cached` when multiple concurrent callers should share a single
    in-flight computation rather than storing `Fiber | undefined` or `Promise | undefined`
    manually.
  collision_type: rule_conflict
  why_distracting: The existing rule explicitly prescribes using `Effect.cached` for
    deduplication. However, the PR instructions require using an idiomatic Effect
    cache invalidation primitive, which conflicts with this rule. The agent must realize
    the rule is outdated for this specific use case (and the gold solution actually
    updates the rule file to reflect the new pattern).
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: 44-46
- rule: Prefer single word names for variables and functions. Only use multiple words
    if necessary.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to rename `cachedGlobal` or `invalidateGlobal`
    to single words like `cache` or `inv` to satisfy the strict single-word naming
    rule. However, `cachedGlobal` is already established and `invalidateGlobal` pairs
    with it clearly; renaming them would cause unnecessary churn or conflict with
    the outer `invalidate` function.
  severity: medium
  source:
    path: AGENTS.md
    lines: 23-35
hierarchy_analysis: The root `AGENTS.md` provides general style guidelines (like `const`
  over `let` and single-word naming), while `packages/opencode/AGENTS.md` provides
  specific Effect patterns. The agent must navigate the conflict between the PR instruction
  (use cache invalidation primitive) and the local `AGENTS.md` rule (use `Effect.cached`).
  The gold solution resolves this by updating the local `AGENTS.md` rule to recommend
  `Effect.cachedInvalidateWithTTL`.
