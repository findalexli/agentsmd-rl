version: "2.0"

source:
  repo: "anomalyco/opencode"
  pr: 19322
  base_commit: "9f94bdb49634bda90a2804585b8d739228dde876"
  merge_commit: "1ebc92fd36837b1e31e7dbab52f378cd62aa7157"

checks:
  - id: cache_uses_cached_invalidate_with_ttl
    type: fail_to_pass
    origin: pr_diff
    description: "Cache uses Effect.cachedInvalidateWithTTL with const destructured binding"

  - id: invalidate_uses_handle_not_cache_recreation
    type: fail_to_pass
    origin: pr_diff
    description: "invalidate() uses invalidation handle instead of recreating the cache"

  - id: error_logging_before_fallback
    type: fail_to_pass
    origin: pr_diff
    description: "Errors during global config loading are logged before falling back to defaults"

  - id: duration_imported_and_used_as_ttl
    type: fail_to_pass
    origin: pr_diff
    description: "Duration imported from effect and used as TTL argument"

  - id: const_over_let_for_cache
    type: fail_to_pass
    origin: agent_config
    description: "Cache binding uses const, not let"
    source:
      path: "AGENTS.md"
      lines: "70"
      commit: "9f94bdb49634bda90a2804585b8d739228dde876"

  - id: get_global_still_uses_cached_global
    type: pass_to_pass
    origin: pr_diff
    description: "getGlobal function still exists and yields cachedGlobal"

  - id: invalidate_dispatches_dispose_all
    type: pass_to_pass
    origin: pr_diff
    description: "invalidate function still calls Instance.disposeAll"

  - id: load_global_exists
    type: pass_to_pass
    origin: pr_diff
    description: "loadGlobal function still exists"

  - id: no_any_type_near_cache_code
    type: pass_to_pass
    origin: agent_config
    description: "No 'any' type near cache-related code"
    source:
      path: "AGENTS.md"
      lines: "13"
      commit: "9f94bdb49634bda90a2804585b8d739228dde876"

  - id: no_try_catch_in_changed_code
    type: pass_to_pass
    origin: agent_config
    description: "No try/catch added near cache-related code"
    source:
      path: "AGENTS.md"
      lines: "12"
      commit: "9f94bdb49634bda90a2804585b8d739228dde876"

  - id: effect_fn_domain_naming_retained
    type: pass_to_pass
    origin: agent_config
    description: "getGlobal and invalidate retain Effect.fn('Config.*') named/traced effect wrappers"
    source:
      path: "packages/opencode/AGENTS.md"
      lines: "21"
      commit: "9f94bdb49634bda90a2804585b8d739228dde876"

  - id: no_else_statements_near_cache_code
    type: pass_to_pass
    origin: agent_config
    description: "No else statements added near cache-related code (prefer early returns)"
    source:
      path: "AGENTS.md"
      lines: "84"
      commit: "9f94bdb49634bda90a2804585b8d739228dde876"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "config.ts retains original structure (not gutted)"

  # Repo CI/CD pass_to_pass gates
  - id: repo_git_clean
    type: pass_to_pass
    origin: repo_tests
    description: "Repo has clean working tree (no uncommitted changes)"

  - id: repo_config_file_exists
    type: pass_to_pass
    origin: repo_tests
    description: "Config file exists and has substantial content"

  - id: repo_config_has_required_functions
    type: pass_to_pass
    origin: repo_tests
    description: "Config file contains required functions (loadGlobal, getGlobal, invalidate, etc.)"

  - id: repo_commit_correct
    type: pass_to_pass
    origin: repo_tests
    description: "Repo is at a valid git commit"

  - id: repo_config_valid_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "Config file has valid TypeScript syntax (no obvious errors)"

rubric:
  - rule: "Use Effect.cached when multiple concurrent callers should share a single in-flight computation rather than storing Fiber | undefined or Promise | undefined manually."
    source:
      path: "packages/opencode/AGENTS.md"
      lines: "54"
      commit: "9f94bdb49634bda90a2804585b8d739228dde876"

  - rule: "Use Effect.fn(\"Domain.method\") for named/traced effects and Effect.fnUntraced for internal helpers."
    source:
      path: "packages/opencode/AGENTS.md"
      lines: "21"
      commit: "9f94bdb49634bda90a2804585b8d739228dde876"

  - rule: "Avoid unnecessary destructuring. Use dot notation to preserve context."
    source:
      path: "AGENTS.md"
      lines: "57"
      commit: "9f94bdb49634bda90a2804585b8d739228dde876"
