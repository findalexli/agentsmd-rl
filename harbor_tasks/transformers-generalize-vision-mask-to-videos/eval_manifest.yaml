rubric:
- rule: When a `modular` file is present, generated files should not be edited, as changes will be overwritten by `make fix-repo`! Instead, edit the `modular` file. See [docs/source/en/modular_transformers.md](docs/source/en/modular_transformers.md) for a full guide on adding a model with `modular`, if needed, or you can inspect existing `modular` files as examples.
  source:
    path: AGENTS.md
    lines: '67'
    commit: 538368903c6ecdc5f489a8eed4ce809e58fdafb5
  evidence: gold patch edits modular_gemma3.py call site to match modeling_gemma3.py, treating the modular file as source of truth
  category: architecture
  verification: llm_judge
- rule: The older method is to mark classes or functions with `# Copied from ...`. Copies are kept in sync by `make fix-repo`. Do not edit a `# Copied from` block, as it will be reverted by `make fix-repo`. Ideally you should edit the code it's copying from and propagate the change, but you can break the `# Copied from` link if needed.
  source:
    path: AGENTS.md
    lines: '66'
    commit: 538368903c6ecdc5f489a8eed4ce809e58fdafb5
  evidence: gold patch updates the Copied from block in git/modeling_git.py to match gemma3's refactored signature, and check-copies verifies consistency
  category: architecture
  verification: programmatic
- rule: '`make style` or `make fix-repo` should be run as the final step before opening a PR.'
  source:
    path: AGENTS.md
    lines: '8'
    commit: 538368903c6ecdc5f489a8eed4ce809e58fdafb5
  evidence: gold patch produces code that passes ruff format --check and ruff check on all touched files
  category: style
  verification: programmatic
distractors:
- rule: Do not edit a `# Copied from` block, as it will be reverted by `make fix-repo`. Ideally you should edit the code it's copying from and propagate the change, but you can break the `# Copied from` link if needed.
  source:
    path: AGENTS.md
    lines: '66'
    commit: 538368903c6ecdc5f489a8eed4ce809e58fdafb5
  collision_type: rule_conflict
  why_distracting: The Copied-from rule says edit the source gemma3 file; but gemma3 has a modular_gemma3.py, and the modular rule forbids editing the generated file. An agent torn between both may edit only modeling_gemma3.py and have its change reverted by make fix-repo.
  severity: high
