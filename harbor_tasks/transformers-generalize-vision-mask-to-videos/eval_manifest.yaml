checks:
- id: test_signature_takes_single_arg
  type: fail_to_pass
  origin: pr_diff
  description: '`token_type_ids_mask_function` (in gemma3, git, paligemma) must accept exactly one parameter — group_ids — instead of the old (token_type_ids, image_group_ids) pair.'
- id: test_callable_with_one_positional_arg
  type: fail_to_pass
  origin: pr_diff
  description: Calling the helper with a single tensor must succeed and return a callable inner mask.
- id: test_inner_mask_behavior
  type: fail_to_pass
  origin: pr_diff
  description: '`inner_mask` returns True iff the two positions belong to the same non-negative vision group; text↔text, text↔vision, and cross-group pairs return False. Parametrized across 15 (group_ids, q, kv) cases per model.'
- id: test_inner_mask_handles_out_of_bounds_indices
  type: fail_to_pass
  origin: pr_diff
  description: Indices that exceed seq_len (static-cache scenario) must produce False without raising indexing errors.
- id: test_inner_mask_supports_batched_inputs
  type: fail_to_pass
  origin: pr_diff
  description: Each batch row is independent — masks for row b consult only row b of group_ids, so identical (q,kv) pairs can give different results across rows.
- id: test_modular_gemma3_call_site_updated
  type: fail_to_pass
  origin: agent_config
  description: modular_gemma3.py — the source for modeling_gemma3.py — must call token_type_ids_mask_function with the new single-argument form so `make fix-repo` regenerates a consistent modeling_gemma3.py.
  source:
    path: AGENTS.md
    lines: 62-67
    commit: 538368903c6ecdc5f489a8eed4ce809e58fdafb5
- id: test_git_signature_matches_gemma3
  type: pass_to_pass
  origin: agent_config
  description: git/modeling_git.py's helper is annotated `# Copied from transformers.models.gemma3.modeling_gemma3.token_type_ids_mask_function`, so its signature must always match gemma3's after the refactor.
  source:
    path: AGENTS.md
    lines: 62-67
    commit: 538368903c6ecdc5f489a8eed4ce809e58fdafb5
- id: test_paligemma_signature_matches_gemma3
  type: pass_to_pass
  origin: pr_diff
  description: paligemma's helper must continue to share gemma3's signature.
- id: test_repo_check_copies
  type: pass_to_pass
  origin: repo_tests
  description: '`python utils/checkers.py copies` (the repository''s check-copies utility) must keep passing — guards `# Copied from` blocks.'
