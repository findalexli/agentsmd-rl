distractors:
- rule: 'Create a new file, for example: `slime/rollout/<your_rollout>.py`'
  source:
    path: .claude/skills/add-rollout-function/SKILL.md
    lines: '32'
  source_text: 'Create a new file, for example: `slime/rollout/<your_rollout>.py`'
  collision_type: architecture_boundary
  why_distracting: The diff modifies core SGLang engine integration in `slime/ray/rollout.py`
    to support EPD disaggregation. An agent might mistakenly think adding a new rollout
    worker type ('encoder') requires creating a new user-facing rollout script instead
    of modifying the internal server startup logic.
  severity: high
- rule: 'Start from one of these references: Async RL-style rollout: `slime/rollout/sglang_rollout.py`'
  source:
    path: .claude/skills/add-rollout-function/SKILL.md
    lines: 22-24
  source_text: 'Start from one of these references:


    - Async RL-style rollout: `slime/rollout/sglang_rollout.py`'
  collision_type: meta_confusion
  why_distracting: The diff targets `slime/ray/rollout.py` (the ray orchestrator)
    and `sglang_engine.py`. An agent might confuse the ray orchestrator with the `sglang_rollout.py`
    task script and incorrectly modify the task logic or assume the wrong context.
  severity: high
- rule: 'Set your function path via CLI: `--rollout-function-path slime.rollout.<your_rollout>.generate_rollout`'
  source:
    path: .claude/skills/add-rollout-function/SKILL.md
    lines: 83-87
  source_text: 'Set your function path via CLI:


    ```bash

    --rollout-function-path slime.rollout.<your_rollout>.generate_rollout

    ```'
  collision_type: architecture_boundary
  why_distracting: EPD disaggregation leverages existing backend features and is controlled
    by `server_groups` config. It is NOT a custom rollout task function, so instructing
    the user to wire it via `--rollout-function-path` would be incorrect.
  severity: medium
