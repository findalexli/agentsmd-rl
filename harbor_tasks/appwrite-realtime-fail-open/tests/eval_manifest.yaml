source:
  repo: appwrite/appwrite
  pr_number: 11607
  base_commit: 995deea801b16b340d3331392e7b435c8648414c
  merge_commit: 9d976fdc9f4554dad6db14d0c670e61bd3d693a1
  type: bug_fix

description: >
  The realtime event publishing mechanism fails closed - when the realtime
  adapter's send() method throws an exception, it propagates up and disrupts
  the broader event pipeline. The fix wraps the send() call in a try-catch
  block and logs errors via Console::error() rather than letting them propagate.

