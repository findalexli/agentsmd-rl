checks:
  # Fail-to-pass tests: Verify the fix is in place
  - id: test_coroutine_scope_parameter
    type: fail_to_pass
    origin: solution
    description: SwiftFlowIterator has coroutineScope parameter with default value

  - id: test_cancel_uses_scope_cancel
    type: fail_to_pass
    origin: solution
    description: cancel() method uses coroutineScope.cancel() instead of complete()

  - id: test_invoke_on_cancellation_ready_state
    type: fail_to_pass
    origin: solution
    description: State.Ready handler has invokeOnCancellation to cancel on suspension cancel

  - id: test_invoke_on_cancellation_awaiting_consumer_state
    type: fail_to_pass
    origin: solution
    description: State.AwaitingConsumer handler has invokeOnCancellation to cancel on suspension cancel

  - id: test_launch_uses_coroutine_scope
    type: fail_to_pass
    origin: solution
    description: launch() method uses coroutineScope.launch instead of creating new scope each time

  - id: test_swift_iterator_class
    type: fail_to_pass
    origin: solution
    description: Swift file has new Iterator class that handles deinit cancellation

  - id: test_swift_iterator_deinit_cancels
    type: fail_to_pass
    origin: solution
    description: Iterator.deinit calls cancel on the underlying KotlinFlowIterator

  - id: test_kotlin_flow_iterator_is_internal
    type: fail_to_pass
    origin: solution
    description: KotlinFlowIterator is marked as internal (not public)

  - id: test_kotlin_flow_iterator_no_deinit
    type: fail_to_pass
    origin: solution
    description: KotlinFlowIterator no longer has deinit (it was moved to Iterator class)

