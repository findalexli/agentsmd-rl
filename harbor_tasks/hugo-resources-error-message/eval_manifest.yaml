source:
  repo: gohugoio/hugo
  pr_number: 14572
  base_commit: 44dc3847f4c91e86b1afa2350d42559bdecbaca9
  merge_commit: e8577771c3275d16b7d1b31cca5e9fd3ea517416
  title: "resources: Improve getImageOps error message"

# Fail-to-pass tests (primary behavioral validation)
f2p_checks:
  - id: "svg_width_error"
    description: "SVG Width() call produces improved error message with resource info and hints"
    test: "test_svg_width_error_message"

# Pass-to-pass tests (regression checks)
p2p_checks:
  - id: "transform_compiles"
    description: "resources/transform.go compiles successfully"
    test: "test_transform_compiles"

  - id: "no_old_error"
    description: "Old error messages are no longer present in code"
    test: "test_no_old_error_message"

  - id: "fmt_import"
    description: "fmt package is imported for Sprintf usage"
    test: "test_fmt_import_present"

  - id: "error_format"
    description: "Error message format uses fmt.Sprintf with correct pattern"
    test: "test_error_message_format"

  # Repo CI/CD pass-to-pass tests
  - id: "go_vet_resources"
    type: pass_to_pass
    origin: repo_tests
    description: "Go vet passes on resources package"
    test: "test_go_vet_resources"

  - id: "go_build_all"
    type: pass_to_pass
    origin: repo_tests
    description: "Full project builds successfully"
    test: "test_go_build_all"

  - id: "go_test_resources_other"
    type: pass_to_pass
    origin: repo_tests
    description: "Other tests in resources package pass"
    test: "test_go_test_resources_other"

# Agent configuration rules to check
agent_config:
  - id: "use_qt_matchers"
    description: "Tests should use qt matchers instead of raw if/t.Fatal checks"
    source: "AGENTS.md"
    applies_to: "resources/resources_integration_test.go"

  - id: "brevity"
    description: "Code should be brief - don't explain the obvious"
    source: "AGENTS.md"
    applies_to: "resources/transform.go"

  - id: "self_explanatory_names"
    description: "Use self-explanatory variable and function names"
    source: "AGENTS.md"
    applies_to: "resources/transform.go"

  - id: "dont_export_unneeded"
    description: "Never export symbols not needed outside the package"
    source: "AGENTS.md"
    applies_to: "resources/transform.go"

# Rubric for soft/subjective checks (LLM evaluation only)
rubric: []
