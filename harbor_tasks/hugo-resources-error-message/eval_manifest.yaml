rubric:
- rule: Avoid global state at (almost) all cost. Don't introduce new global variables.
  source:
    path: AGENTS.md
    lines: '8'
    commit: 44dc3847f4c91e86b1afa2350d42559bdecbaca9
  reference: The getImageOps function uses only local variables (img, ok, instructions,
    msg) and does not introduce any new global state.
- rule: Look for existing helper functions before creating new ones. Assume similar
    problems have been solved before.
  source:
    path: AGENTS.md
    lines: '9'
    commit: 44dc3847f4c91e86b1afa2350d42559bdecbaca9
  reference: The solution modifies the existing getImageOps method rather than creating
    new helper functions.
- rule: Use short variable names when the context is clear.
  source:
    path: AGENTS.md
    lines: '5'
  evidence: The gold solution uses short, idiomatic variable names like `img`, `ok`,
    and `msg` in the `getImageOps` function.
  category: naming
  reference: Short variable names used - img, ok, msg in the getImageOps function.
- rule: Don't use comments to explain the obvious.
  source:
    path: AGENTS.md
    lines: '3'
  evidence: The gold solution implements the type assertion and error formatting logic
    without adding any explanatory comments.
  category: style
  reference: No explanatory comments added - the code is self-documenting.
- rule: 'Assume that the maintainers and readers of the code you write are Go experts:
    Don''t use comments to explain the obvious.'
  source:
    path: AGENTS.md
    lines: 3-4
  evidence: The gold solution adds no comments to explain the type assertion or the
    `fmt.Sprintf` formatting, assuming the reader understands standard Go idioms.
  category: documentation
distractors:
- rule: This is a project with a long history; assume that a similiar problem has
    been solved before, look hard for helper functions before creating new ones.
  collision_type: rule_conflict
  why_distracting: The instruction explicitly asks to use `fmt.Sprintf` to format
    the error message. The agent might waste time looking for a pre-existing error
    formatting helper or custom panic wrapper in the codebase due to this rule.
  severity: low
  source:
    path: AGENTS.md
    lines: '11'
- rule: In tests, use `qt` matchers (e.g. `b.Assert(err, qt.ErrorMatches, ...)`) instead
    of raw `if`/`t.Fatal` checks.
  collision_type: scope_ambiguity
  why_distracting: The instruction points the agent to `resources/resources_integration_test.go`
    to verify the fix. The agent might be tempted to refactor the test to use `qt`
    matchers while looking at it, expanding the scope unnecessarily.
  severity: medium
  source:
    path: AGENTS.md
    lines: '12'
hierarchy_analysis: The config hierarchy is flat, with `CLAUDE.md` simply including
  `AGENTS.md`. The rules are general Go guidelines that apply uniformly.
