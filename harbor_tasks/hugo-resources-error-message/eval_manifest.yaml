agent_config:
- id: use_qt_matchers
  description: Tests should use qt matchers instead of raw if/t.Fatal checks
  source: AGENTS.md
  applies_to: resources/resources_integration_test.go
- id: brevity
  description: Code should be brief - don't explain the obvious
  source: AGENTS.md
  applies_to: resources/transform.go
- id: self_explanatory_names
  description: Use self-explanatory variable and function names
  source: AGENTS.md
  applies_to: resources/transform.go
- id: dont_export_unneeded
  description: Never export symbols not needed outside the package
  source: AGENTS.md
  applies_to: resources/transform.go
rubric:
- rule: Avoid global state at (almost) all cost. Don't introduce new global variables.
  source:
    path: AGENTS.md
    lines: '8'
    commit: 44dc3847f4c91e86b1afa2350d42559bdecbaca9
- rule: Look for existing helper functions before creating new ones. Assume similar
    problems have been solved before.
  source:
    path: AGENTS.md
    lines: '9'
    commit: 44dc3847f4c91e86b1afa2350d42559bdecbaca9
- rule: Use short variable names when the context is clear.
  source:
    path: AGENTS.md
    lines: '5'
  evidence: The gold solution uses short, idiomatic variable names like `img`, `ok`,
    and `msg` in the `getImageOps` function.
  category: naming
- rule: Don't use comments to explain the obvious.
  source:
    path: AGENTS.md
    lines: '3'
  evidence: The gold solution implements the type assertion and error formatting logic
    without adding any explanatory comments.
  category: style
distractors:
- rule: In tests, use `qt` matchers (e.g. `b.Assert(err, qt.ErrorMatches, ...)`) instead
    of raw `if`/`t.Fatal` checks.
  collision_type: scope_ambiguity
  why_distracting: The prompt explicitly mentions a test file (`resources/resources_integration_test.go`)
    to verify the changes. An agent might read this rule and decide to refactor the
    existing test to use `qt` matchers. However, the gold solution only modifies the
    implementation file to make the existing test pass; modifying the test file is
    out of scope.
  severity: medium
  source:
    path: AGENTS.md
    lines: '9'
- rule: assume that a similiar problem has been solved before, look hard for helper
    functions before creating new ones.
  collision_type: meta_confusion
  why_distracting: An agent might overthink the error handling and waste time searching
    for a Hugo-specific error formatting or panic helper function for resource errors.
    The gold solution simply uses standard `fmt.Sprintf` and `panic`.
  severity: low
  source:
    path: AGENTS.md
    lines: '8'
hierarchy_analysis: The configuration is flat, with rules defined in `AGENTS.md` and
  included via `CLAUDE.md`. The rules emphasize brevity, assuming Go expertise, and
  specific testing conventions. The main conflict arises from the testing instructions
  in the prompt versus the testing rules in the config, where the agent must realize
  that no test modifications are actually required despite the prompt pointing out
  the test file.
