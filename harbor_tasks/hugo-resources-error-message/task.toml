name = "hugo-resources-error-message"
version = "1.0.0"
description = "Improve getImageOps error message in Hugo to provide more helpful guidance when calling image methods on non-raster resources"
repository = "https://github.com/gohugoio/hugo"
pr_number = 14572
difficulty = "easy"
tags = ["go", "error-handling", "refactoring"]
time_estimate = "15m"

[environment]
image = "golang:1.24"
setup_timeout = 600

[agent]
timeout = 1800

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
timeout = 120
