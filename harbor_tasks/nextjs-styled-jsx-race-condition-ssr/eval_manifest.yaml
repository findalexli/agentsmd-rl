    description: "Repo's Prettier formatting check on render.tsx passes"

  - id: test_repo_eslint_render
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ESLint check on render.tsx passes"

  - id: test_repo_ast_grep
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ast-grep lint patterns pass"

  - id: test_repo_language_lint
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's inclusive language linting (alex) passes"

