distractors:
- rule: If you are changing Next.js source or integration tests, start `pnpm --filter=next
    dev` in a separate terminal session before making edits
  collision_type: would_cause_bug
  why_distracting: The issue explicitly notes it is 'particularly visible in production
    deployments'. Next.js development mode (`next dev`) handles styled-jsx and SSR
    differently than production. Relying on the default rule to use `pnpm --filter=next
    dev` for the inner loop could prevent the agent from reproducing the bug or verifying
    the fix, as it requires a production build to observe the exact SSR style registry
    behavior.
  severity: high
  source:
    path: CLAUDE.md
    lines: 60-62
- rule: Read the relevant guide in `dist/docs/` before writing any code.
  collision_type: meta_confusion
  why_distracting: The agent is instructed to read guides in `dist/docs/` before writing
    code because of breaking changes. However, this PR involves a deep internal bug
    in the Pages Router SSR pipeline (`renderToHTMLImpl` and `styledJsxInsertedHTML`
    timing). There are no user-facing guides in `dist/docs/` about this internal rendering
    architecture, so searching for them would be a waste of time.
  severity: medium
  source:
    path: packages/next/AGENTS.md
    lines: 5-6
- rule: Before editing or creating files in any subdirectory... read all README.md
    files in the directory path from the repo root up to and including the target
    file's directory.
  collision_type: scope_ambiguity
  why_distracting: The fix requires a localized change to the execution order of promises
    in `packages/next/src/server/render.tsx`. Reading all READMEs from the root down
    to `packages/next/src/server/` is unnecessary and distracting, as the issue is
    purely about the runtime execution order of `styledJsxInsertedHTML` relative to
    the page render lifecycle, which is not documented in directory READMEs.
  severity: low
  source:
    path: CLAUDE.md
    lines: 36-38
hierarchy_analysis: The root `CLAUDE.md` provides general workflow instructions, while
  `packages/next/AGENTS.md` adds a warning about breaking changes and reading docs.
  Both files provide instructions that are misaligned with the specific nature of
  this PR. The PR requires fixing an internal SSR timing bug that is specific to production
  builds, making the default `dev` workflow and the instruction to read `dist/docs/`
  actively misleading.
