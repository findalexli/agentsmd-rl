  - id: content_html_composition
    type: pass_to_pass
    origin: static
    description: "contentHTML must still be composed from rawStyledJsxInsertedHTML + content"

  - id: null_content_handling
    type: pass_to_pass
    origin: static
    description: "Null content guard must still be present"

  - id: test_repo_prettier_render
    type: pass_to_pass
