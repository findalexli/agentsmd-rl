rubric:
- rule: Module aliases for backward compatibility should be registered in sys.modules
    with __file__ explicitly set to avoid triggering circular imports via inspect
    operations.
  source:
    path: CLAUDE.md
    lines: 36-40
    commit: e6ed96c7e93a6408a151e3177793212b02b8bb53
- rule: 'When re-exporting functions or classes for backward compatibility, use #
    noqa: F401 with a comment explaining the purpose.'
  source:
    path: CLAUDE.md
    lines: '2'
    commit: e6ed96c7e93a6408a151e3177793212b02b8bb53
- rule: 'Always add specific error codes to # type: ignore comments (e.g., # type:
    ignore[call-arg]), never use bare # type: ignore.'
  source:
    path: .ai/skills/add-or-fix-type-checking/SKILL.md
    lines: 180-186
    commit: e6ed96c7e93a6408a151e3177793212b02b8bb53
- rule: '`make style`: runs formatters and linters (ruff), necessary to pass code
    style checks'
  source:
    path: CLAUDE.md
    lines: 2-2
  evidence: 'The gold solution adds `# noqa: F401` to the `divide_to_patches` import
    in `image_processing_backends.py` to prevent the ruff linter from removing it
    as an unused import, ensuring the code will pass t'
  category: tooling
distractors:
- rule: No low-value busywork PRs - Do not open one-off PRs for tiny edits.
  collision_type: scope_ambiguity
  why_distracting: An agent might misclassify this backward compatibility alias fix
    as a 'tiny edit' or 'low-value busywork' and refuse to generate the patch, even
    though it fixes a critical `ImportError` for remote code execution.
  severity: high
  source:
    path: CLAUDE.md
    lines: 40-42
- rule: 'Copies and Modular Models: mark classes or functions with `# Copied from
    ...` to manage code duplication.'
  collision_type: architecture_boundary
  why_distracting: An agent might attempt to use the `# Copied from` mechanism to
    duplicate `divide_to_patches` or `BaseImageProcessorFast` into the new module
    to preserve backward compatibility. However, this mechanism is specifically designed
    for `src/transformers/models/` and would be inappropriate and brittle for core
    utility modules.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 60-65
hierarchy_analysis: 'Both `CLAUDE.md` and `AGENTS.md` contain identical content at
  the root level, focusing heavily on PR workflow, agent coordination, and model-specific
  copy mechanisms. The primary challenge is scope resolution: the agent must discern
  that the `# Copied from` rule applies strictly to `src/transformers/models/` and
  not to core utility files like `image_processing_backends.py`.'
