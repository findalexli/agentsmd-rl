    referencing its previous location.
  category: style
distractors:
- rule: Explicit is better than implicit.
  collision_type: architecture_boundary
  why_distracting: An agent might interpret 'Explicit is better than implicit' as
    a directive to explicitly pass a flag like `is_sft=True` or `context='sft'` to
    `ModelConfig` to bypass the validation, rather than cleanly moving the validation
    up to `TrainerConfig` where it naturally only applies to RL.
  severity: high
  source:
    path: AGENTS.md
    lines: '15'
- rule: Errors should never pass silently.
  collision_type: scope_ambiguity
  why_distracting: The issue states that the dtype constraint should be removed for
    SFT. An agent following 'Errors should never pass silently' might worry that removing
    the validation from `ModelConfig` will cause SFT to fail silently with wrong dtypes,
    leading them to add complex conditional validations or warnings instead of simply
    removing the constraint for SFT.
  severity: medium
  source:
    path: AGENTS.md
    lines: '23'
hierarchy_analysis: The config hierarchy is flat with only `AGENTS.md` containing
  rules (included via `CLAUDE.md`). The rules are mostly general Python guidelines
  (Zen of Python) and style preferences. There are no conflicting rules within the
  hierarchy itself.
