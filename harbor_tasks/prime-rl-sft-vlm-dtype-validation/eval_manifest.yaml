version: "2.0"

source:
  repo: "PrimeIntellect-ai/prime-rl"
  pr: 2079
  base_commit: "7ef29a76600d767e732c99c8eaaec768830a7bca"
  merge_commit: "19511dc2b034591173bce45ac6ee85b57b51f5d2"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "trainer.py and sft.py must parse without errors"

  - id: test_repo_ruff_lint_configs
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ruff lint check passes on configs directory"

  - id: test_repo_ruff_format_configs
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ruff format check passes on configs directory"

  - id: modelconfig_vlm_default_dtypes
    type: fail_to_pass
    origin: pr_diff
    description: "ModelConfig with VLM names and default float32 dtypes does not raise"

  - id: sftconfig_vlm_default_dtypes
    type: fail_to_pass
    origin: pr_diff
    description: "SFTConfig with VLM model and default float32 dtypes does not raise"

  - id: trainerconfig_vlm_rejects_default_float32
    type: fail_to_pass
    origin: pr_diff
    description: "TrainerConfig with VLM name and default float32 dtypes raises ValueError"

  - id: trainerconfig_vlm_rejects_partial_mismatch
    type: fail_to_pass
    origin: pr_diff
    description: "TrainerConfig rejects VLM with partial dtype mismatch"

  - id: modelconfig_vlm_explicit_bfloat16
    type: pass_to_pass
    origin: pr_diff
    description: "ModelConfig accepts VLM with explicit bfloat16 dtypes"

  - id: trainerconfig_vlm_accepts_bfloat16
    type: pass_to_pass
    origin: pr_diff
    description: "TrainerConfig accepts VLM with correct bfloat16 dtypes"

  - id: non_vlm_modelconfig
    type: pass_to_pass
    origin: pr_diff
    description: "Non-VLM ModelConfig with default float32 dtypes still works"

  - id: non_vlm_trainerconfig
    type: pass_to_pass
    origin: pr_diff
    description: "Non-VLM TrainerConfig with default dtypes still works"

  - id: trainerconfig_validator_not_stub
    type: pass_to_pass
    origin: static
    description: "TrainerConfig.vlms_require_bfloat16 validator exists with real logic"

  - id: no_unnecessary_try_except_in_validator
    type: pass_to_pass
    origin: agent_config
    description: "Validator does not wrap logic in try/except (AGENTS.md: avoid try/except unless necessary)"
    source:
      path: "AGENTS.md"
      lines: "5"
      commit: "7ef29a76600d767e732c99c8eaaec768830a7bca"

rubric:
  - rule: "Do not add unnecessary comments. Do not try to explain code changes that reflect your work process or refer to old code."
    source:
      path: "AGENTS.md"
      lines: "7"
      commit: "7ef29a76600d767e732c99c8eaaec768830a7bca"

  - rule: "Errors should never pass silently."
    source:
      path: "AGENTS.md"
      lines: "23"
      commit: "7ef29a76600d767e732c99c8eaaec768830a7bca"

  - rule: "Explicit is better than implicit."
    source:
      path: "AGENTS.md"
      lines: "15"
      commit: "7ef29a76600d767e732c99c8eaaec768830a7bca"

  - rule: "Simple is better than complex. Flat is better than nested."
    source:
      path: "AGENTS.md"
      lines: "17-18"
      commit: "7ef29a76600d767e732c99c8eaaec768830a7bca"

  - rule: "If the implementation is hard to explain, it's a bad idea."
    source:
      path: "AGENTS.md"
      lines: "30"
      commit: "7ef29a76600d767e732c99c8eaaec768830a7bca"
