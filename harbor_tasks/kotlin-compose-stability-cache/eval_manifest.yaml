# Task metadata
name: kotlin-compose-stability-cache
description: |
  Adds caching to StabilityInferencer to prevent exponential explosion
  in the amount of analyzed types during Compose compilation.
  The cache stores stability inference results per SymbolForAnalysis
  to avoid redundant computations.

