rubric:
- rule: Implement __post_init__ method with mode validation that raises ValueError
    for invalid modes
  source:
    path: areal/api/cli_args.py
  reference: WandBConfig and SwanlabConfig have __post_init__ validating mode against
    allowed values
- rule: Error messages must include the invalid mode and list all valid options
  source:
    path: areal/api/cli_args.py
  reference: ValueError messages contain 'Invalid wandb/swanlab mode' and enumerate
    valid_modes
- rule: Follow existing code patterns in the same module
  source:
    path: CLAUDE.md
    lines: 47-47
  evidence: The gold solution uses `field(default=..., metadata=...)` for the `mode`
    fields, matching the existing pattern for CLI argument dataclasses in the module,
    rather than just adding a simple type hint.
  category: style
- rule: Follow existing code patterns in the same module.
  source:
    path: AGENTS.md
    lines: '32'
  evidence: 'The gold solution redefines the `mode` attribute using `dataclasses.field`
    with `metadata={help: ..., choices: ...}`, adhering to the established pattern
    for CLI argument dataclasses in the module'
  category: style
distractors:
- rule: 'Ask first before: Modifying config structures in areal/api/cli_args.py.'
  collision_type: meta_confusion
  why_distracting: The repository instructions explicitly forbid modifying config
    structures in `areal/api/cli_args.py` without asking first. However, the user
    prompt explicitly commands the agent to modify this exact file to add validation.
    An overly compliant agent might halt and ask for permission, failing to complete
    the task.
  severity: high
  source:
    path: AGENTS.md
    lines: 35-36
- rule: 'Logging: areal.utils.logging.getLogger(name) with PascalCase names -- never
    print or logging.__name__.'
  collision_type: rule_conflict
  why_distracting: The agent might be tempted to use the repository's custom logger
    (`areal.utils.logging.getLogger`) to report the invalid mode, but the prompt explicitly
    requires raising a `ValueError` to fail fast.
  severity: medium
  source:
    path: AGENTS.md
    lines: 60-62
hierarchy_analysis: The agent must recognize that the specific user instruction to
  modify `areal/api/cli_args.py` overrides the general repository constraint in `AGENTS.md`
  and `CLAUDE.md` that requires asking for permission before modifying config structures.
