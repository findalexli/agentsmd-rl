rubric:
  - rule: YOCO (You Only Cache Once) fast prefill optimization must follow the pattern from Gemma3n - split layers into SelfDecoder and CrossDecoder classes, each wrapped with @support_torch_compile(enable_if=lambda vllm_config: vllm_config.cache_config.kv_sharing_fast_prefill) or its negation for the non-fast-prefill case
    source:
      path: vllm/model_executor/models/gemma3n.py
      lines: "574-576, 743-745, 787-788"
      commit: e69a265135ef48312d78130f64b7bfce4cd81a37
  - rule: Use vllm.compilation.backends.set_model_tag context manager when instantiating self_decoder and cross_decoder modules
    source:
      path: vllm/model_executor/models/gemma3n.py
      lines: "831-846"
      commit: e69a265135ef48312d78130f64b7bfce4cd81a37
  - rule: Import get_forward_context from vllm.forward_context and KVSharingFastPrefillMetadata from vllm.v1.attention.backends.utils for KV-sharing fast prefill implementations
    source:
      path: vllm/model_executor/models/gemma3n.py
      lines: "27, 52"
      commit: e69a265135ef48312d78130f64b7bfce4cd81a37
