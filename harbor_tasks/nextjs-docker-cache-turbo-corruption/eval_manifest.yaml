version: "2.0"

source:
  repo: "vercel/next.js"
  pr: 91799
  base_commit: "7bce97d6485599cab2964ef58fde8a55d19904d3"
  merge_commit: "b163a8bf6642c7c849964d1238c13cc91d0c2252"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified JS files parse without syntax errors"

  - id: turbo_cache_exports
    type: fail_to_pass
    origin: pr_diff
    description: "turbo-cache.mjs exports 5 callable cache functions (artifactUrl, exists, get, getStream, put)"

  - id: artifact_url_vercel_format
    type: fail_to_pass
    origin: pr_diff
    description: "artifactUrl returns Vercel-style URL with /api/v8/artifacts/{hash}?teamId=..."

  - id: artifact_url_self_hosted_format
    type: fail_to_pass
    origin: pr_diff
    description: "artifactUrl returns self-hosted URL with /v8/artifacts/{hash}?slug=... (no /api/ prefix)"

  - id: cache_key_deterministic_hex
    type: fail_to_pass
    origin: pr_diff
    description: "docker-image-cache.js computes a deterministic hex cache key from repo file contents"

  - id: direct_cache_no_turbo_tar
    type: fail_to_pass
    origin: pr_diff
    description: "docker-image-cache.js uses direct cache API instead of turbo tar-based flow"

  - id: native_build_bypasses_turbo
    type: fail_to_pass
    origin: pr_diff
    description: "docker-native-build.js calls docker-image-cache.js directly, not turbo build-docker-image task"

  - id: turbo_task_removed_from_config
    type: fail_to_pass
    origin: pr_diff
    description: "build-docker-image task removed from package.json and turbo.jsonc"

  - id: build_image_and_force_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "buildImage function and --force flag preserved in docker-image-cache.js"

  - id: no_hardcoded_secret_values
    type: pass_to_pass
    origin: agent_config
    description: "TURBO_TOKEN is only read from process.env — no hardcoded literal values or string fallbacks in changed scripts"
    source:
      path: "CLAUDE.md"
      lines: "307-308"
      commit: "7bce97d6485599cab2964ef58fde8a55d19904d3"

  - id: turbo_cache_not_stub
    type: fail_to_pass
    origin: static
    description: "turbo-cache.mjs has real HTTP implementation (not a stub)"

  # Repo CI pass_to_pass checks
  - id: repo_js_syntax_all_scripts
    type: pass_to_pass
    origin: repo_ci
    description: "All JS files in scripts/ directory parse without syntax errors"

  - id: repo_package_json_valid
    type: pass_to_pass
    origin: repo_ci
    description: "package.json is valid JSON and has required fields"

  - id: repo_next_swc_package_json_valid
    type: pass_to_pass
    origin: repo_ci
    description: "packages/next-swc/package.json is valid JSON and has required Rust build scripts"

  - id: repo_cargo_toml_valid
    type: pass_to_pass
    origin: repo_ci
    description: "Cargo.toml is valid and workspace configuration is parseable"

  - id: repo_github_workflows_valid_yaml
    type: pass_to_pass
    origin: repo_ci
    description: "GitHub workflow files are valid YAML"

  - id: repo_docker_native_build_js_syntax
    type: pass_to_pass
    origin: repo_ci
    description: "docker-native-build.js syntax is valid and has essential functions"

  - id: repo_ci_scripts_exist
    type: pass_to_pass
    origin: repo_ci
    description: "CI scripts referenced by build_and_deploy.yml exist"

  - id: repo_turbo_json_valid
    type: pass_to_pass
    origin: repo_ci
    description: "turbo.json is valid JSON"

  - id: repo_turbo_jsonc_valid
    type: pass_to_pass
    origin: repo_ci
    description: "packages/next-swc/turbo.jsonc is valid JSONC"

  - id: repo_rust_toolchain_toml_valid
    type: pass_to_pass
    origin: repo_ci
    description: "rust-toolchain.toml is valid and parseable"

rubric:
  - rule: "Always treat environment variable values as sensitive unless they are known test-mode flags."
    source:
      path: "CLAUDE.md"
      lines: "304"
      commit: "7bce97d6485599cab2964ef58fde8a55d19904d3"

  - rule: "Never print or paste secret values (tokens, API keys, cookies) in chat responses, commits, or shared logs."
    source:
      path: "CLAUDE.md"
      lines: "306"
      commit: "7bce97d6485599cab2964ef58fde8a55d19904d3"

  - rule: "Mirror CI env names and modes exactly, but do not inline literal secret values in commands."
    source:
      path: "CLAUDE.md"
      lines: "307"
      commit: "7bce97d6485599cab2964ef58fde8a55d19904d3"
