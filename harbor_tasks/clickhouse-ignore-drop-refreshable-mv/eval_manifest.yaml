  number: 102008
  base_commit: 32310ea30010c92c101d7e93c535c6bd17057dcf
  merge_commit: a77cd4c5a6ede8a2d5da637a75348a4cc055c007
  title: "Do not ignore DROP for refreshable materialized views in stress tests"

implementation:
  file: src/Interpreters/InterpreterDropQuery.cpp
  description: |
    Fix the ignore_drop_queries_probability setting to not convert DROP to TRUNCATE
    for refreshable materialized views. TRUNCATE doesn't stop the periodic refresh
    task, causing orphaned views to keep refreshing indefinitely.

