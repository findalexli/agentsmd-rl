rubric:
  - rule: "Use Allman-style braces (opening brace on a new line) in C++ code"
    source:
      path: ".claude/CLAUDE.md"
      lines: "71"
      commit: "32310ea30010c92c101d7e93c535c6bd17057dcf"

  - rule: "When writing comments, wrap literal names from ClickHouse SQL language, classes and functions in inline code blocks using backticks"
    source:
      path: ".claude/CLAUDE.md"
      lines: "41-43"
      commit: "32310ea30010c92c101d7e93c535c6bd17057dcf"

  - rule: "When mentioning logical errors, use 'exception' instead of 'crash' because they don't crash the server in release build"
    source:
      path: ".claude/CLAUDE.md"
      lines: "49-50"
      commit: "32310ea30010c92c101d7e93c535c6bd17057dcf"

  - rule: "Comments should explain invariants and why the code works, not narrate what the code does"
