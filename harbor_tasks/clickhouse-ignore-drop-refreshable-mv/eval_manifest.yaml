- rule: When writing text such as documentation, comments, or commit messages, wrap
    literal names from ClickHouse SQL language, classes and functions, or literal
    excerpts from log messages inside inline code blocks.
  source:
    path: AGENTS.md
    lines: 5-5
  evidence: The comment added in `src/Interpreters/InterpreterDropQuery.cpp` wraps
