    literal names from ClickHouse SQL language in inl
  category: documentation
distractors:
- rule: When adding headers to documentation files under `docs/`, every header must
    include an explicit anchor in the form `{#kebab-case-anchor}`.
  collision_type: architecture_boundary
  why_distracting: The rule specifies how to format headers in `docs/` files. An agent
    might mistakenly believe it needs to document this bug fix in the official documentation,
    expanding the scope unnecessarily for an internal bug fix.
  severity: medium
  source:
    path: AGENTS.md
    lines: 7-7
- rule: When mentioning logical errors, say 'exception' instead of 'crash'.
  collision_type: scope_ambiguity
  why_distracting: The rule asks to use 'exception' instead of 'crash' for logical
    errors. The agent might try to force the word 'exception' into the comment, but
    the bug causes resource exhaustion ('overwhelming the server'), not a logical
    error or crash.
  severity: low
  source:
    path: AGENTS.md
    lines: 11-11
