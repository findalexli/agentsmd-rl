distractors:
- rule: Only use logger.warning_once for hardware limitation fallbacks
  source:
    path: python/sglang/multimodal_gen/.claude/skills/sglang-diffusion-triton-kernel/SKILL.md
    lines: '229'
  source_text: '- Add `logger.warning_once(...)` only when falling back due to a **known
    hardware limitation** (e.g., unsupported SM compute capability), not for wrong-input
    errors.'
  collision_type: architecture_boundary
  why_distracting: The PR removes a logger.warning() related to 'Streaming backlog'
    in the tokenizer manager (SRT runtime). An agent might mistakenly apply this Triton
    kernel rule and think the warning was removed because it wasn't a hardware limitation
    fallback. However, the rule is strictly for diffusion Triton kernels, not the
    LLM serving runtime async queues.
  severity: medium
- rule: Use at::cuda::getCurrentCUDAStream() for stream
  source:
    path: .claude/skills/add-sgl-kernel/SKILL.md
    lines: '108'
  source_text: '- Use `at::Tensor` (PyTorch tensors), `TORCH_CHECK` for validation,
    `at::cuda::getCurrentCUDAStream()` for stream'
  collision_type: scope_ambiguity
  why_distracting: The PR modifies a Python async method where `is_stream` refers
    to HTTP response streaming (Server-Sent Events). The config rule refers to CUDA
    execution streams. An agent searching for 'stream' could be distracted by this
    rule and mistakenly try to apply CUDA stream abstractions in a pure Python HTTP-related
    loop.
  severity: high
