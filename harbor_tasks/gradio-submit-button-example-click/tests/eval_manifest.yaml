- rule: Component Keyword Arguments Signature
  source:
    path: .agents/skills/gradio/SKILL.md
    lines: 67-68
  source_text: '### `Textbox(value: str | I18nData | Callable | None = None, type:
    Literal[''text'', ''password'', ''email''] = "text", lines: int = 1, max_lines:
    int | None = None, placeholder: str | I18nData | None = None, label: str | I18nData
    | None = None, info: str | I18nData | None = None, every: Timer | float | None
    = None, inputs: Component | Sequence[Component] | set[Component] | None = None,
    show_label: bool | None = None, container: bool = True, scale: int | None = None,
    min_width: int = 160, interactive: bool | None = None, visible: bool | Literal[''hidden'']
    = True, elem_id: str | None = None, autofocus: bool = False, autoscroll: bool
    = True, elem_classes: list[str] | str | None = None, render: bool = True, key:
    int | str | tuple[int | str, ...] | None = None, preserved_by_key: list[str] |
    str | None = "value", text_align: Literal[''left'', ''right''] | None = None,
    rtl: bool = False, buttons: list[Literal[''copy''] | Button] | None = None, max_length:
    int | None = None, submit_btn: str | bool | None = False, stop_btn: str | bool
    | None = False, html_attributes: InputHTMLAttributes | None = None)`

    Creates a textarea for user to enter string input or display string output..'
  evidence: The gold diff correctly follows the keyword argument signatures defined
    for the Textbox component, explicitly passing `submit_btn=False` and `stop_btn=self.original_stop_btn`
    to configure the textbox layout without relying on undocumented arguments.
  category: coding_conventions
  verification: llm_judge
- rule: Event Listener Signature and Kwargs
  source:
    path: .agents/skills/gradio/SKILL.md
    lines: 163-191
  source_text: "All event listeners share the same signature:\n\n```python\ncomponent.event_name(\n\
    \    fn: Callable | None | Literal[\"decorator\"] = \"decorator\",\n    inputs:\
    \ Component | Sequence[Component] | set[Component] | None = None,\n    outputs:\
    \ Component | Sequence[Component] | set[Component] | None = None,\n    api_name:\
    \ str | None = None,\n    api_description: str | None | Literal[False] = None,\n\
    \    scroll_to_output: bool = False,\n    show_progress: Literal[\"full\", \"\
    minimal\", \"hidden\"] = \"full\",\n    show_progress_on: Component | Sequence[Component]\
    \ | None = None,\n    queue: bool = True,\n    batch: bool = False,\n    max_batch_size:\
    \ int = 4,\n    preprocess: bool = True,\n    postprocess: bool = True,\n    cancels:\
    \ dict[str, Any] | list[dict[str, Any]] | None = None,\n    trigger_mode: Literal[\"\
    once\", \"multiple\", \"always_last\"] | None = None,\n    js: str | Literal[True]\
    \ | None = None,\n    concurrency_limit: int | None | Literal[\"default\"] = \"\
    default\",\n    concurrency_id: str | None = None,\n    api_visibility: Literal[\"\
    public\", \"private\", \"undocumented\"] = \"public\",\n    time_limit: int |\
    \ None = None,\n    stream_every: float = 0.5,\n    key: int | str | tuple[int\
    \ | str, ...] | None = None,\n    validator: Callable | None = None,\n) -> Dependency\n\
    ```"
  evidence: The gold diff strictly adheres to the event listener arguments when attaching
    `.then()` on `example_select_event`. It positionally passes the function, `None`
    for `inputs`, `[self.textbox]` for `outputs`, and explicitly uses keyword arguments
    for `api_visibility="undocumented"` and `queue=False`.
  category: coding_conventions
  verification: llm_judge
distractors:
- rule: Target an issue. Every non-trivial PR should reference an existing GitHub
    issue. If one doesn't exist, create it first.
  collision_type: meta_confusion
  why_distracting: The rule instructs the agent to create a GitHub issue if one doesn't
    exist. In an isolated evaluation environment, attempting to use the GitHub CLI
    or API to create issues is out of scope, will likely fail, and wastes agent steps.
  severity: medium
  source:
    path: AGENTS.md
    lines: 18-19
- rule: Use the PR template. Fill out every section of .github/PULL_REQUEST_TEMPLATE.md
  collision_type: meta_confusion
  why_distracting: The agent might attempt to create, edit, or fill out `.github/PULL_REQUEST_TEMPLATE.md`
    or draft a PR description in a markdown file, which distracts from the actual
    code-level bug fix required to pass the evaluation.
  severity: low
  source:
    path: AGENTS.md
    lines: 21-24
- rule: ChatInterface Usage Pattern
  source:
    path: .agents/skills/gradio/SKILL.md
    lines: 54-63
  source_text: "**ChatInterface**: high-level wrapper for chatbot UIs.\n\n```python\n\
    import gradio as gr\n\ndef respond(message, history):\n    return f\"You said:\
    \ {message}\"\n\ngr.ChatInterface(fn=respond).launch()\n```"
  collision_type: architecture_boundary
  why_distracting: An agent reading this might assume it should utilize `gr.ChatInterface`
    to build a new app. However, this PR involves modifying the internal backend implementation
    of the ChatInterface class itself (`gradio/chat_interface.py`). Attempting to
    implement a wrapper here would break library architecture and fail.
  severity: high
- rule: Custom HTML Components
  source:
    path: .agents/skills/gradio/SKILL.md
    lines: 110-159
  source_text: '## Custom HTML Components


    If a task requires significant customization of an existing component or a component
    that doesn''t exist in Gradio, you can create one with `gr.HTML`.'
  collision_type: would_cause_bug
  why_distracting: The issue involves heavily customizing UI component behavior (hiding/showing
    buttons during example selection). An agent might read this rule and incorrectly
    try to build a custom `gr.HTML` component for the Textbox instead of using the
    standard python event flow (`.then()`), which would break core internal logic
    and cause a bug.
  severity: high
hierarchy_analysis: The configuration consists of a single, flat `AGENTS.md` file
  at the root level. There is no complex hierarchy or overriding of rules.
