# eval_manifest.yaml for withastro/astro#16080
# Fix: queuedRendering incorrectly escapes HTML output of .html page files

source:
  owner: withastro
  repo: astro
  pr_number: 16080
  base_commit: "7661f48c84f048dafd26ac58d81acee2462fef4f"
  merge_commit: "e80ac73e4433d1ac0518af731f2af00f8aaa46ad"
  title: "fix(render): rendering of html files in queued rendering"

checks:
  - id: test_render_page_preserves_html_in_queued_rendering
    type: fail_to_pass
    origin: agent_config
    description: |
      .html page components (identified by astro:html=true flag) must have their
      HTML output preserved verbatim when queuedRendering is enabled. The raw
      <script> tag must not be escaped to &lt;script&gt;.
    source_ref:
      - file: .agents/skills/astro-developer/testing.md
        line: "Prefer unit tests over integration tests. Write unit-testable code."
      - file: .agents/skills/astro-developer/constraints.md
        line: "Code in runtime/ folders cannot use Node.js APIs — markHTMLString is safe"

  - id: test_render_page_still_escapes_html_in_regular_components
    type: pass_to_pass
    origin: agent_config
    description: |
      Regular (non-.html) page components must still have their HTML output
      escaped when queuedRendering is enabled. Only .html pages with astro:html=true
      should bypass escaping.
    source_ref:
      - file: .agents/skills/astro-developer/testing.md
        line: "Prefer unit tests over integration tests"

  - id: test_build_succeeds
    type: pass_to_pass
    origin: repo_tests
    description: Astro package builds successfully on base commit

  - id: test_queue_rendering_unit_tests_pass
    type: pass_to_pass
    origin: repo_tests
    description: Queue-rendering unit tests pass on base commit

  - id: test_knip
    type: pass_to_pass
    origin: repo_tests
    description: knip (unused code detection) passes on base commit

  - id: test_eslint
    type: pass_to_pass
    origin: repo_tests
    description: ESLint passes on base commit

  - id: test_types
    type: pass_to_pass
    origin: repo_tests
    description: TypeScript type checking passes on base commit

  - id: test_queue_pool_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: NodePool unit tests pass on base commit

  - id: test_queue_batching_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: Queue-batching unit tests pass on base commit

rubric:
  - id: no_node_apis_in_runtime
    description: |
      Changes to packages/astro/src/runtime/server/render/page.ts must not introduce
      Node.js API imports (node:fs, node:path, etc.). The runtime runs in Vite SSR context
      and must be cross-platform.
    source_ref:
      - file: .agents/skills/astro-developer/constraints.md
        line: "Code in runtime/ folders — Node.js APIs FORBIDDEN"
    weight: 1

  - id: use_unit_testable_patterns
    description: |
      Bug fix should be testable via unit tests that mock dependencies (component factories,
      SSRResult). The existing queue-rendering.test.js provides a pattern for testing
      renderPage in isolation.
    source_ref:
      - file: .agents/skills/astro-developer/testing.md
        line: "Prefer unit tests over integration tests. Write unit-testable code."
    weight: 1

  - id: rebuild_after_source_edit
    description: |
      Edits to TypeScript source files in packages/astro/src/ require rebuilding
      the package (pnpm run build --filter=astro) before test changes take effect.
      This matches how the Astro monorepo workflow operates.
    source_ref:
      - file: AGENTS.md
        line: "Edits to source files take effect after rebuilding the package via pnpm build"
    weight: 1
