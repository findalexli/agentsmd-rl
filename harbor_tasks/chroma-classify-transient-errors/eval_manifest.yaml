source_pr:
  owner: chroma-core
  repo: chroma
  number: 6731
  title: "[BUG](log-service,storage): classify transient errors for retry"
  base_commit: e92cd203c4343bf422271146c42042dd6fa5caed
  merge_commit: ac35c93d5cf058d08d55b73d8deefc77e045817d

task:
  name: chroma-classify-transient-errors
  description: |
    Implement proper classification of transient errors for retry handling in Chroma.
    This includes:
    1. Walking gRPC error source chains to detect transport errors (cancelled, closed, incomplete, timeout)
    2. Mapping GCS rate-limiting errors (429, SlowDown, mutation rate limit) to Backoff
    3. Preserving non-transient error classifications

checks:
  - id: source_chain_contains_exists
    description: "source_chain_contains function exists and tests pass"
    test: test_source_chain_contains_function_exists
    points: 8

  - id: error_chain_traversal
    description: "Error source chain is traversed correctly"
    test: test_error_source_chain_traversal
    points: 8

  - id: grpc_unavailable_retryable
    description: "gRPC Unavailable errors preserved as retryable"
    test: test_grpc_unavailable_stays_unavailable
    points: 10

  - id: grpc_cancelled_not_retryable
    description: "Plain gRPC Cancelled stays Cancelled (not retryable)"
    test: test_grpc_plain_cancelled_stays_cancelled
    points: 10

  - id: gcs_429_backoff
    description: "GCS 429 Too Many Requests maps to Backoff"
