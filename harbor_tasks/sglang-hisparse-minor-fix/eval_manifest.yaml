distractors:
- rule: Always prefer abstractions over raw CUDA primitives
  source:
    path: .claude/skills/add-jit-kernel/SKILL.md
    lines: '28'
  source_text: '**Always prefer these abstractions over raw CUDA primitives.** They
    provide safety, readability, and consistency with the rest of the codebase.'
  collision_type: rule_conflict
  why_distracting: An agent might try to rewrite the inline PTX assembly (`asm volatile`)
    in `hisparse.cuh` using higher-level abstractions as mandated. However, the gold
    diff explicitly relies on raw assembly (`ld.global.nc.v2.b64` and `st.global.cg.v2.b64`)
    to force paired 64-bit loads and avoid alignment issues that standard abstractions
    would trigger.
  severity: medium
- rule: Use AlignedVector for vectorized 128-bit loads/stores
  source:
    path: .claude/skills/add-jit-kernel/SKILL.md
    lines: '299'
  source_text: '- Use `AlignedVector` for vectorised 128-bit loads/stores — significant
    bandwidth win'
  collision_type: would_cause_bug
  why_distracting: An agent might attempt to use `device::AlignedVector` for the 128-bit
    memory transfers, which ultimately compiles down to `uint4` memory operations.
    The gold diff correctly ignores this rule and uses paired 64-bit loads specifically
    to circumvent the memory alignment requirements of `uint4`.
  severity: high
- rule: Use `AlignedVector` for vectorised 128-bit loads/stores
  source:
    path: .claude/skills/add-jit-kernel/SKILL.md
    lines: 114, 299
  source_text: '- **`device::AlignedVector<T, N>`** — Aligned storage for N elements
    of type T. N must be a power of two, `sizeof(T)*N <= 32`. Enables vectorized loads/stores
    for bandwidth efficiency. In terms of API/codegen constraints, the upper bound
    is 256-bit; in practice, 128-bit is the portable default, while 256-bit vectorization
    is typically only viable on `SM100+` and should be gated by an architecture check
    when needed.

    - Use `AlignedVector` for vectorised 128-bit loads/stores — significant bandwidth
    win'
  collision_type: would_cause_bug
  why_distracting: The PR implements a 128-bit bulk transfer but specifically avoids
    using standard 128-bit vector types (which `AlignedVector` uses under the hood)
    because of alignment issues on the input pointer. The gold diff uses paired 64-bit
    loads via PTX `ld.global.nc.v2.b64` (`avoids alignment issues with uint4`). Blindly
    applying the rule to use `AlignedVector` would lead to misaligned memory access
    crashes.
  severity: high
- rule: Scheduler maps to multimodal ZMQ event loop and ScheduleBatch maps to multimodal
    pipelines core.
  source:
    path: python/sglang/multimodal_gen/.claude/CLAUDE.md
    lines: 57, 59
  source_text: '| `Scheduler` | `runtime/managers/scheduler.py` | ZMQ event loop,
    request dispatch |

    | `Req` / `OutputBatch` | `runtime/pipelines_core/schedule_batch.py` | Request/output
    containers |'
  collision_type: scope_ambiguity
  why_distracting: The gold diff modifies `python/sglang/srt/managers/scheduler.py`
    and `python/sglang/srt/managers/schedule_batch.py`, which are part of the LLM
    runtime (`srt`). The `multimodal_gen` subsystem maps its own files with identical
    names (e.g. `runtime/managers/scheduler.py` relative to its folder). An agent
    might mistakenly apply the multimodal architecture definitions (like ZMQ event
    loop or ComposedPipeline) when editing the LLM runtime files.
  severity: medium
