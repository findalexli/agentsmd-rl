name = "workers-sdk-glob-double-extension"
difficulty = "medium"
description = "Fix glob patterns matching double-extension filenames in miniflare"
tags = ["miniflare", "glob", "bug-fix"]

[timeouts]
docker_build = 600
docker_run = 300
test = 300

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
