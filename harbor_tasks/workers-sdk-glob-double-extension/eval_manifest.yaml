pr_metadata:
  owner: cloudflare
  repo: workers-sdk
  pr_number: 13080
  title: "[miniflare] Fix glob patterns matching double-extension filenames"
  merge_commit: f4ea4accad70d6a55b648c610cfc806e5be36477
  base_commit: 71259391f84a4df6958936e37b30e7f1faa2fee1

task:
  name: workers-sdk-glob-double-extension
  description: Fix glob patterns matching double-extension filenames in miniflare
  difficulty: medium

checks:
  - id: test_globsToRegExps_endAnchor_prevents_double_extension
    type: fail_to_pass
    origin: agent_config
    description: endAnchor=true prevents **/*.wasm from matching foo.wasm.js
    source: packages/miniflare/src/shared/matcher.ts

  - id: test_globsToRegExps_without_endAnchor_matches_substring
    type: pass_to_pass
    origin: agent_config
    description: Without endAnchor, patterns match substrings (KV Sites compatibility)
    source: packages/miniflare/src/shared/matcher.ts

  - id: test_miniflare_matcher_tests
    type: pass_to_pass
    origin: repo_tests
    description: Miniflare's own matcher test suite passes
    source: packages/miniflare/test/shared/matcher.spec.ts

  - id: test_miniflare_build
    type: pass_to_pass
    origin: repo_tests
    description: Miniflare package builds successfully
    source: packages/miniflare/package.json

  - id: test_miniflare_typecheck
    type: pass_to_pass
    origin: repo_tests
    description: Miniflare passes TypeScript type checking
    source: packages/miniflare/package.json

  - id: test_compileModuleRules_uses_endAnchor
    type: fail_to_pass
    origin: agent_config
    description: compileModuleRules passes endAnchor so wasm rules don't match double extensions
    source: packages/miniflare/src/plugins/core/modules.ts

rubric:
  - rule: "The fix adds endAnchor parameter with proper TypeScript typing"
    source: packages/miniflare/src/shared/matcher.ts
    reference: "export function globsToRegExps("
    weight: 1

  - rule: "The fix uses ternary operator for conditional suffix"
    source: packages/miniflare/src/shared/matcher.ts
    reference: "const suffix = endAnchor"
    weight: 1

  - rule: "compileModuleRules passes endAnchor option"
    source: packages/miniflare/src/plugins/core/modules.ts
    reference: "globsToRegExps(rule.include, { endAnchor: true })"
    weight: 1
