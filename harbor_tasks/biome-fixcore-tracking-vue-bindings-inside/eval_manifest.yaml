distractors:
- rule: Before opening a PR, you MUST verify if a changeset is needed. If YES -> Changeset is REQUIRED.
  collision_type: scope_ambiguity
  why_distracting: The rule strongly mandates creating a changeset for user-facing changes (like bug fixes affecting behavior). However, the gold solution does not create a changeset file. An agent following this rule would create an unnecessary `.changeset/*.md` file, which is out of scope for this specific code-generation task.
  severity: high
  source:
    path: AGENTS.md
    lines: 45-65
- rule: 'Writing the PR Description: Use concise, precise wording... Start with GitHub''s magic comment to auto-close the issue.'
  collision_type: meta_confusion
  why_distracting: The rule provides detailed instructions on writing PR descriptions and using magic comments to close issues. The agent might try to create a PR description file or modify the PR template, which is unnecessary and out of scope for the code generation task.
  severity: medium
  source:
    path: AGENTS.md
    lines: 13-40
- rule: If you relied on AI assistance to make a pull request, you must disclose it in the pull request.
  collision_type: meta_confusion
  why_distracting: The rule requires disclosing AI assistance in the pull request. The agent might try to add a disclosure to a PR description file or commit message, but there is no PR being opened in the context of this script.
  severity: low
  source:
    path: CLAUDE.md
    lines: 25-35
- rule: Step-by-step guide for creating and implementing lint rules in Biome's analyzer. Use when implementing rules like noVar, useConst, or any custom lint/assist rule.
  source:
    path: .claude/skills/lint-rule-development/SKILL.md
    lines: 1-10
  collision_type: architecture_boundary
  why_distracting: The task is to fix a bug where the `noUnusedVariables` linter incorrectly reports variables as unused. An agent might activate this skill and attempt to modify the lint rule directly. However, the issue is actually in the HTML file handler failing to extract embedded JavaScript, so modifying the lint rule would be the wrong architectural approach.
  severity: high
- rule: Guide for implementing configurable options for lint rules and assists.
  source:
    path: .claude/skills/rule-options/SKILL.md
    lines: 1-3
  collision_type: would_cause_bug
  why_distracting: The agent might think it needs to add an option to the `noUnusedVariables` rule to ignore Vue/Svelte directives, rather than fixing the underlying embedded JS extraction.
  severity: high
- rule: Guide for implementing formatting rules using Biome's IR-based formatter infrastructure.
  source:
    path: .claude/skills/formatter-development/SKILL.md
    lines: 1-3
  collision_type: scope_ambiguity
  why_distracting: The skill mentions HTML and AST nodes, which might lead the agent to modify formatter rules for Vue/Svelte directives instead of the file handler's embedded JS extraction logic.
  severity: medium
- rule: Apply parser grammar naming conventions such as `Any*`, `*List`, and `Bogus*` when changing HTML syntax support.
  source:
    path: .claude/skills/parser-development/SKILL.md
    lines: 58-63
  source_text: '**Naming conventions:**

    - Prefix all nodes with language name: `HtmlElement`, `CssRule`

    - Unions start with `Any`: `AnyHtmlAttribute`

    - Error recovery nodes use `Bogus`: `HtmlBogusAttribute`

    - Lists end with `List`: `HtmlAttributeList`

    - Lists are mandatory (never optional), empty by default'
  collision_type: architecture_boundary
  why_distracting: 'Because the patch touches `crates/biome_html_syntax`, an agent might think new directive support requires grammar or generated-node changes. It does not: the gold diff correctly adds an extension module over existing generated syntax and leaves grammar/codegen untouched.'
  severity: medium
- rule: Use parser-rule mechanics like presence tests, `p.expect`, recovery sets, and mandatory list creation for this change.
  source:
    path: .claude/skills/parser-development/SKILL.md
    lines: 301-308
  source_text: '- **Presence test**: Always return `Absent` if the first token doesn''t match - never progress parsing before returning `Absent`

    - **Required vs optional**: Use `p.expect()` for required tokens, `p.eat()` for optional ones

    - **Missing markers**: Use `.or_add_diagnostic()` for required nodes to add missing markers and errors

    - **Error recovery**: Include list terminators, separators, and statement boundaries in recovery sets

    - **Bogus nodes**: Check grammar for which `BOGUS_*` node types are valid in your context

    - **Checkpoints**: Use `p.checkpoint()` to save state and `p.rewind()` if parsing fails

    - **Lookahead**: Use `p.at()` to check tokens, `p.nth_at()` for lookahead beyond current token

    - **Lists are mandatory**: Always create list nodes even if empty - use `parse_list()` not `parse_list().ok()`'
  collision_type: scope_ambiguity
  why_distracting: The change is in embedded-snippet extraction after HTML parsing, not in tokenization or grammar production. Following parser-rule advice here would send the implementation into the wrong layer and add unnecessary parser churn instead of the targeted service-layer fix the gold diff makes.
  severity: medium
hierarchy_analysis: The config hierarchy consists of CLAUDE.md and AGENTS.md at the root level. Both files provide high-level contribution guidelines, but they heavily focus on the PR process (changesets, PR descriptions, AI disclosure). For a code-generation task that does not involve opening a PR, these PR-specific rules act as distractors.
