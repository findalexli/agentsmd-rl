version: "2.0"

source:
  repo: "astral-sh/ruff"
  pr: 23784
  base_commit: "c4c6c22d7b73342b3dfebcd526c466fa1df759c8"
  merge_commit: "cbc17b2c4c1566037ddad74a7c84873bac6074bb"

checks:
  - id: ty_compiles
    type: pass_to_pass
    origin: static
    description: "ty crate must compile without errors"

  - id: target_file_not_stubbed
    type: pass_to_pass
    origin: static
    description: "types.rs has real content (not gutted/stubbed)"

  - id: recursive_callable_typeis_no_crash
    type: fail_to_pass
    origin: pr_diff
    description: "Recursive Callable alias with TypeIs resolves without crash/timeout"

  - id: recursive_callable_typeguard_no_crash
    type: fail_to_pass
    origin: pr_diff
    description: "Recursive Callable alias with TypeGuard resolves without crash/timeout"

  - id: callable_aliases_not_flagged_cyclic
    type: fail_to_pass
    origin: pr_diff
    description: "Callable-wrapped recursive TypeIs/TypeGuard aliases are not flagged as cyclic-type-alias-definition"

  - id: nested_callable_recursion
    type: fail_to_pass
    origin: pr_diff
    description: "Deeper nesting (Callable wrapping Callable with recursive TypeIs) resolves without crash"

  - id: direct_recursive_typeis_still_cyclic
    type: pass_to_pass
    origin: pr_diff
    description: "Direct recursive TypeIs[Self] still correctly produces cyclic-type-alias-definition"

  - id: no_local_imports_in_diff
    type: pass_to_pass
    origin: agent_config
    description: "No new deeply-nested (function-local) Rust imports in the diff"
    source:
      path: "AGENTS.md"
      lines: "76"
      commit: "c4c6c22d7b73342b3dfebcd526c466fa1df759c8"

  - id: no_unwrap_panic_in_diff
    type: pass_to_pass
    origin: agent_config
    description: "No new .unwrap(), panic!, or unreachable! in the diff"
    source:
      path: "AGENTS.md"
      lines: "79"
      commit: "c4c6c22d7b73342b3dfebcd526c466fa1df759c8"

rubric:
  - rule: "Follow existing code style. Check neighboring files for patterns."
    source:
      path: "AGENTS.md"
      lines: "75"
      commit: "c4c6c22d7b73342b3dfebcd526c466fa1df759c8"

  - rule: "Avoid writing significant amounts of new code. Look for existing utilities first."
    source:
      path: "AGENTS.md"
      lines: "78"
      commit: "c4c6c22d7b73342b3dfebcd526c466fa1df759c8"

  - rule: "Use comments purposefully — explain invariants and why something unusual was done, not narrating code."
    source:
      path: "AGENTS.md"
      lines: "82"
      commit: "c4c6c22d7b73342b3dfebcd526c466fa1df759c8"
