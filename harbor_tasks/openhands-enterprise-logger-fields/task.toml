name = "openhands-enterprise-logger-fields"
description = "Add module, funcName, and lineno fields to JSON logger output"
creator = "openhands-scaffold"
version = "1.0.0"
difficulty = "easy"
tags = ["logging", "python", "json", "enterprise"]

[setup]
max_runtime_seconds = 300
max_setup_retries = 1

[evaluation]
timeout_seconds = 120

[troubleshooting]
known_issues = []
hints = [
    "The logger configuration is in enterprise/server/logger.py",
    "Look at the JsonFormatter format string in setup_json_logger()",
    "The fix involves changing from '{message}{levelname}' to include %(module)s%(funcName)s%(lineno)d"
]
