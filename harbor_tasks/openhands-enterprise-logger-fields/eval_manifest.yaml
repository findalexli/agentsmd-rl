rubric:
- rule: Pre-commit hooks must be installed before making changes and must pass before
    pushing
  source:
    path: enterprise/server/logger.py
    commit: 8f87ef59c72f1c7bae2b937164caf99731ac8e83
  reference: Code changes to enterprise/server/logger.py were made following the pre-commit
    process. The modified file passes Ruff linting, Mypy type checks, and formatting
    checks as verified by test_repo_ruff_lint, test_repo_mypy_logger, and test_repo_ruff_format.
- rule: Backend Python changes must pass Ruff linting, Mypy type checks, and formatting
    checks
  source:
    path: enterprise/server/logger.py
    commit: 8f87ef59c72f1c7bae2b937164caf99731ac8e83
  reference: The gold solution modifies enterprise/server/logger.py with proper formatting.
    All linting and type checks pass (verified by test_repo_ruff_lint, test_repo_mypy_logger,
    test_repo_ruff_format tests).
- rule: Enterprise code should use relative imports without the 'enterprise.' prefix
  source:
    path: enterprise/server/logger.py
    commit: 8f87ef59c72f1c7bae2b937164caf99731ac8e83
  reference: The gold solution correctly uses relative imports in the modified code.
    No absolute 'enterprise.' imports are introduced in the logger.py change.
- rule: Ensure code is free of Ruff formatting issues and trailing whitespace
  source:
    path: enterprise/server/logger.py
    commit: 8f87ef59c72f1c7bae2b937164caf99731ac8e83
  reference: The gold solution in enterprise/server/logger.py maintains proper indentation
    and has no trailing whitespace. The format string change from '{message}{levelname}'
    to '%(message)s%(levelname)s%(module)s%(funcName)s%(lineno)d' follows Ruff formatting.
distractors:
- rule: If you've made changes to the backend, you should run pre-commit run --config
    ./dev_config/python/.pre-commit-config.yaml
  collision_type: scope_ambiguity
  why_distracting: The rule instructs running a specific pre-commit config for backend
    changes (`./dev_config/python/.pre-commit-config.yaml`). However, the repository
    structure defines the backend as the `openhands` directory, while this PR modifies
    the `enterprise` directory. Attempting to run the openhands-specific pre-commit
    config on enterprise files may fail or be irrelevant.
  severity: medium
  source:
    path: AGENTS.md
    lines: 18-20
- rule: When working on a PR that requires design documents, scripts meant for development-only,
    or other temporary artifacts... store them in a .pr/ directory
  collision_type: scope_ambiguity
  why_distracting: The agent might misinterpret the instruction to document PRs and
    create a `.pr/` directory with analysis or notes for this trivial logging format
    change, wasting time and creating unnecessary artifacts.
  severity: low
  source:
    path: AGENTS.md
    lines: 38-48
- rule: Use cross-repo-testing skill when testing features that span different repositories
    or components.
  source:
    path: .agents/skills/cross-repo-testing/SKILL.md
    lines: 1-3
  collision_type: scope_ambiguity
  why_distracting: The task involves running tests in the `enterprise` directory,
    which is separate from the main `openhands` backend. An agent might incorrectly
    assume it needs to invoke the `cross-repo-testing` skill to test this feature.
  severity: low
hierarchy_analysis: The configuration consists of a single root-level AGENTS.md file
  with generic repository guidelines. There is no complex hierarchy or overriding
  required.
