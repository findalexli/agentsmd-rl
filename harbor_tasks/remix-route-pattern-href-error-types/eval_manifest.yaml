version: '2.0'
task:
  name: remix-route-pattern-href-error-types
  title: Fix HrefError detail types and messages for nameless wildcards
  kind: code_fix
  difficulty: medium
source:
  repo: remix-run/remix
  pr_url: https://github.com/remix-run/remix/pull/11020
  pr_number: 11020
  base_commit: 96c3f0c095dc8de98543af55df0b9400656f961b
  merge_commit: 327c4881a5ee957137e6386d0767969cd0a8b23a
  pr: 11020
repo:
  workdir: /workspace/remix
  package_dir: packages/route-pattern
checks:
- id: test_nameless_wildcard_hostname
  type: fail_to_pass
  origin: pr_diff
  description: 'Calling .href() on `RoutePattern(''://*.example.com/path'')` must throw

    an HrefError whose `details.type === ''nameless-wildcard''` (was wrongly

    reporting `missing-params` before the fix).

    '
- id: test_nameless_wildcard_pathname
  type: fail_to_pass
  origin: pr_diff
  description: 'Calling .href() on `RoutePattern(''/files/*'')` must throw an HrefError

    whose `details.type === ''nameless-wildcard''`.

    '
- id: test_missing_params_has_missingParams_field_single
  type: fail_to_pass
  origin: pr_diff
  description: 'The HrefError details object for missing-params must include a

    `missingParams: string[]` field listing the names of required params

    that were not provided. Verifies a single missing param.

    '
- id: test_missing_params_has_missingParams_field_multiple
  type: fail_to_pass
  origin: pr_diff
  description: 'missingParams contains every undefined param name in declaration order.

    '
- id: test_missing_params_partial_provided
  type: fail_to_pass
  origin: pr_diff
  description: 'When some required params are supplied, missingParams contains only the

    names that were not supplied.

    '
- id: test_missing_params_message_format
  type: fail_to_pass
  origin: pr_diff
  description: 'Stringified missing-params error matches the new compact format:

    `HrefError: missing param(s): ''name1'', ''name2''\n\nPattern: ...\nParams: ...`

    (previously listed Pathname/Hostname variants).

    '
- id: test_missing_search_params_message_format_multiple
  type: fail_to_pass
  origin: pr_diff
  description: 'Stringified missing-search-params error quotes each name individually

    and uses a colon separator: `missing required search param(s): ''q'', ''sort''`

    (was: `missing required search param(s) ''q, sort''`).

    '
- id: test_missing_search_params_message_format_single
  type: fail_to_pass
  origin: pr_diff
  description: 'Same colon-separator format applies to a single missing search param:

    `missing required search param(s): ''q''`.

    '
- id: test_route_pattern_test_suite
  type: pass_to_pass
  origin: repo_tests
  description: 'The route-pattern package''s full node:test suite passes

    (`pnpm --filter @remix-run/route-pattern run test`).

    '
- id: test_route_pattern_typecheck
  type: pass_to_pass
  origin: repo_tests
  description: 'The route-pattern package typecheck passes

    (`pnpm --filter @remix-run/route-pattern run typecheck`).

    '
rubric:
- id: import_type_syntax
  source:
    ref: '## Code Style — Imports'
    commit: 96c3f0c095dc8de98543af55df0b9400656f961b
    path: AGENTS.md
  rule: 'Type-only imports use `import type { X }` (separate from value imports);

    type re-exports use `export type { X }`.

    '
- id: ts_extension_in_relative_imports
  source:
    ref: '## Code Style — Imports'
    commit: 96c3f0c095dc8de98543af55df0b9400656f961b
    path: AGENTS.md
  rule: 'Relative imports include the `.ts` extension (the codebase uses

    bundler-style resolution with `verbatimModuleSyntax`).

    '
- id: prefer_let_for_locals
  source:
    ref: '## Code Style — Variables'
    commit: 96c3f0c095dc8de98543af55df0b9400656f961b
    path: AGENTS.md
  rule: 'Prefer `let` for local variables; reserve `const` for module scope only;

    never use `var`.

    '
- id: function_declarations_over_arrow
  source:
    ref: '## Code Style — Functions'
    commit: 96c3f0c095dc8de98543af55df0b9400656f961b
    path: AGENTS.md
  rule: 'Use regular function declarations/expressions by default. Arrow

    functions only as callbacks (e.g. array methods, route handlers) where

    preserving lexical `this` is beneficial or syntax is more concise.

    '
- id: descriptive_lowercase_generics
  source:
    ref: '## Code Style — Generics'
    commit: 96c3f0c095dc8de98543af55df0b9400656f961b
    path: AGENTS.md
  rule: 'Generic type parameters use descriptive lowercase names (e.g. `source`,

    `method`, `pattern`) rather than single uppercase letters (`T`, `P`, `K`).

    '
- id: minimal_comments
  source:
    ref: '## Code Style — Comments'
    commit: 96c3f0c095dc8de98543af55df0b9400656f961b
    path: AGENTS.md
  rule: 'Only add non-JSDoc comments when the code is doing something surprising

    or non-obvious. Don''t restate what the code does.

    '
- id: no_loops_or_conditionals_in_test_suites
  source:
    ref: '## Test Structure'
    commit: 96c3f0c095dc8de98543af55df0b9400656f961b
    path: AGENTS.md
  rule: 'Test files do not use `for` loops or conditionals (`if`, `switch`) to

    generate test cases inside `describe()` blocks; this breaks IDE test

    navigation in the Node test runner.

    '
- id: prettier_formatting
  source:
    ref: '## Code Style — Formatting'
    commit: 96c3f0c095dc8de98543af55df0b9400656f961b
    path: AGENTS.md
  rule: 'Code follows Prettier style: printWidth 100, no semicolons, single

    quotes, spaces (not tabs).

    '
- id: change_file_added
  source:
    ref: '## Changes and Releases'
    commit: 96c3f0c095dc8de98543af55df0b9400656f961b
    path: AGENTS.md
  rule: 'A new change file is added at

    `packages/route-pattern/.changes/[major|minor|patch].short-description.md`

    describing the user-visible change in the format used by the rest of

    that directory.

    '
