    path: AGENTS.md
    lines: '32'
    commit: 96c3f0c095dc8de98543af55df0b9400656f961b
  collision_type: rule_conflict
  why_distracting: Agent may try to change existing `let` declarations in part() to `const` since the variables are only assigned once, but the repo convention is `let` for locals
  severity: low
- rule: Use descriptive lowercase names for type parameters (e.g., `source`, `method`, `pattern`) instead of single uppercase letters like `T`, `P`, or `K`
