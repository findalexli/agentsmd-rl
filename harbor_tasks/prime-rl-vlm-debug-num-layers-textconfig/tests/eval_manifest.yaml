rubric:
- rule: Do not add unnecessary comments, especially those explaining work process
    or referring to old code. Targeted comments for ambiguous code are acceptable.
  source:
    path: src/prime_rl/trainer/model.py
  reference: '# VLM configs nest num_hidden_layers under text_config'
  category: documentation
- rule: Simple is better than complex.
  source:
    path: src/prime_rl/trainer/model.py
  reference: target_config = getattr(model_config, "text_config", model_config)
  category: style
- rule: Explicit is better than implicit.
  source:
    path: src/prime_rl/trainer/model.py
  reference: target_config = getattr(model_config, "text_config", model_config)
  category: style
- rule: Readability counts.
  source:
    path: src/prime_rl/trainer/model.py
  reference: target_config.num_hidden_layers
  category: style
- rule: Flat is better than nested.
  source:
    path: src/prime_rl/trainer/model.py
  reference: target_config = getattr(model_config, "text_config", model_config)
  category: style
- rule: Errors should never pass silently. Unless explicitly silenced.
  source:
    path: src/prime_rl/trainer/model.py
  reference: target_config = getattr(model_config, "text_config", model_config)
  category: style
- rule: Avoid try/except blocks unless it's really necessary.
  source:
    path: src/prime_rl/trainer/model.py
  reference: target_config = getattr(model_config, "text_config", model_config)
  evidence: 'The solution uses getattr(model_config, "text_config", model_config)
    to safely access the nested configuration instead of wrapping the access in a
    try...except AttributeError: block.'
  category: style
- rule: Prefer to use targeted comments sparingly to explain ambiguous code, without
    referring to old code or work process.
  source:
    path: src/prime_rl/trainer/model.py
  reference: '# VLM configs nest num_hidden_layers under text_config'
  evidence: The solution adds a single, concise comment to explain the potentially
    ambiguous getattr logic, without referencing the old code or the bug.
  category: documentation
distractors:
- rule: Do not add unnecessary comments.
  collision_type: scope_ambiguity
  why_distracting: The agent might interpret 'Do not add unnecessary comments' as
    a strict ban on comments and omit the helpful explanation for why `getattr` is
    needed for VLM configs.
  severity: low
  source:
    path: AGENTS.md
    lines: 7-8
- rule: Flat is better than nested.
  collision_type: architecture_boundary
  why_distracting: The agent might try to flatten the HuggingFace config object or
    complain about the nested `text_config`, but the HF config structure is external
    and cannot be changed.
  severity: medium
  source:
    path: AGENTS.md
    lines: 15-16
- rule: How to write and use TOML configs in prime-rl. Use when creating config files,
    running commands with configs, or overriding config values via CLI.
  source:
    path: .claude/skills/toml-config/SKILL.md
    lines: 1-3
  collision_type: scope_ambiguity
  why_distracting: The issue mentions setting `debug.num_layers` in a config. An agent
    might activate the TOML config skill and mistakenly attempt to fix the issue by
    modifying TOML config files, flattening the config structure, or changing the
    TOML parsing logic, rather than fixing the underlying model loading logic in Python.
  severity: medium
hierarchy_analysis: The config hierarchy is flat, with rules defined in AGENTS.md
  and referenced by CLAUDE.md. The agent must balance the rule against unnecessary
  comments with the allowance for targeted comments explaining ambiguous code.
