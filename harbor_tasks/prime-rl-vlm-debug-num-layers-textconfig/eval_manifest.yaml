- rule: Avoid try/except blocks unless it's really necessary.
  source:
    path: AGENTS.md
    lines: 5-7
  evidence: The solution uses `getattr(model_config, "text_config", model_config)`
    to safely access the nested configuration instead of wrapping the access in a
    `try...except AttributeError:` block.
  category: style
- rule: Prefer to use targeted comments sparingly to explain ambiguous code, without
    referring to old code or work process.
  source:
    path: AGENTS.md
    lines: 9-11
  evidence: The solution adds a single, concise comment (`# VLM configs nest num_hidden_layers
    under text_config`) to explain the potentially ambiguous `getattr` logic, without
    referencing the old code or the bug
  category: documentation
distractors:
- rule: It's fine that a program fails if something goes wrong as this helps us to
    catch non-obvious bugs and unforeseen side-effects earlier.
  collision_type: scope_ambiguity
  why_distracting: The rule states 'It's fine that a program fails if something goes
    wrong as this helps us to catch non-obvious bugs'. An agent might misinterpret
    this as a reason to not fix the `AttributeError` crash for VLMs, thinking the
    crash is desirable behavior for unsupported model architectures rather than a
    bug to be fixed.
  severity: high
  source:
    path: AGENTS.md
    lines: 5-7
- rule: Flat is better than nested.
  collision_type: architecture_boundary
  why_distracting: The Zen of Python rule 'Flat is better than nested' might lead
    an agent to try and flatten the HuggingFace config object or complain about the
    nested `text_config.num_hidden_layers`, rather than just accepting the external
    library's nested structure and accessing it via `getattr`.
  severity: medium
  source:
    path: AGENTS.md
    lines: 22-22
- rule: Special cases aren't special enough to break the rules.
  collision_type: scope_ambiguity
  why_distracting: The rule 'Special cases aren't special enough to break the rules'
    might cause an agent to view VLMs as a 'special case' and try to force a unified
    approach that doesn't check for `text_config`, or refuse to add the VLM-specific
    `getattr` fallback.
  severity: low
  source:
    path: AGENTS.md
    lines: 25-25
hierarchy_analysis: The hierarchy is simple, with `CLAUDE.md` pointing to `AGENTS.md`.
  The rules in `AGENTS.md` provide general Python guidelines. The main tension is
  between avoiding try/except blocks and handling the missing attribute gracefully,
  which the gold solution resolves elegantly using `getattr` with a default fallback.
