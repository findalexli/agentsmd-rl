# Rubric for agent behavior assessment
# Extracted from CLAUDE.md coding conventions relevant to CLI code changes
rubric:
  - rule: "Use @record for dataclasses and immutable objects"
    source: ".claude/coding_conventions.md"
    relevance: "Data structures in Dagster should use @record decorator"

  - rule: "Use built-in generic types for annotations (list[str], dict[str, Any])"
    source: ".claude/coding_conventions.md"
    relevance: "Type hints should use Python 3.9+ built-in generics"

  - rule: "Never use typing.Dict, typing.List, typing.Set, typing.Tuple"
    source: ".claude/coding_conventions.md"
    relevance: "Use dict, list, set, tuple instead of typing variants"

  - rule: "Use top-level imports; only function-scoped imports for lazy loading expensive modules"
    source: ".claude/coding_conventions.md"
    relevance: "dagster_cloud_cli imports should be lazy-loaded in CLI commands"

  - rule: "Use click.echo() instead of print() for CLI output"
    source: ".claude/coding_conventions.md"
    relevance: "CLI output should use click.echo for proper handling"

  - rule: "After any code changes, ALWAYS run make ruff"
    source: "CLAUDE.md"
    relevance: "Code formatting and linting is mandatory after changes"

  - rule: "Use uv instead of pip for package management"
    source: "CLAUDE.md"
    relevance: "Package installation should use uv"

  - rule: "Bias towards functional-style programming with lightweight immutable objects"
    source: ".claude/coding_conventions.md"
    relevance: "Prefer immutable patterns over mutation"

  - rule: "Do not create imports into __init__.py files for internal classes"
    source: ".claude/coding_conventions.md"
    relevance: "Internal code should use absolute imports"

  - rule: "Never use global singleton objects for services or stateful components"
    source: ".claude/coding_conventions.md"
    relevance: "Pass service instances explicitly as parameters"
