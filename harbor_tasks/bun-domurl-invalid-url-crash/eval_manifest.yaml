hierarchy_analysis: The root `CLAUDE.md` provides general project structure and testing
  commands, while `src/CLAUDE.md` provides highly specific Zig conventions. Because
  this PR modifies a C++ file (`BunString.cpp`), the Zig-specific rules in `src/CLAUDE.md`
  act as distractors. The agent must recognize the architecture boundary between Zig
  and C++ and selectively ignore the `src/CLAUDE.md` rules while applying the JSC
  exception handling concepts implied by the root config.
