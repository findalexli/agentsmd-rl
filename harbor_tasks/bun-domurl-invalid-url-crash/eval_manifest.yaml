version: "2.0"

source:
  repo: "oven-sh/bun"
  pr: 28309
  base_commit: "9e93bfa1b69a2f9b8c05acb15e02c5506dd4cbc8"
  merge_commit: "581d45c267edeeeba53595f1663d73a8d90dec4e"

checks:
  # -----------------------------------------------------------------------------
  # fail_to_pass - pr_diff
  # -----------------------------------------------------------------------------
  - id: fix_adds_return_if_exception
    type: fail_to_pass
    origin: pr_diff
    description: "RETURN_IF_EXCEPTION(throwScope, {}) must exist between toJSNewlyCreated and jsCast"

  - id: fix_is_minimal
    type: fail_to_pass
    origin: pr_diff
    description: "Fix must be a pure insertion - no deletions of existing code in BunString.cpp"

  - id: guard_prevents_null_deref_on_error
    type: fail_to_pass
    origin: pr_diff
    description: "Guard must divert control flow (return/branch) so jsCast is skipped on error"

  # -----------------------------------------------------------------------------
  # pass_to_pass - pr_diff
  # -----------------------------------------------------------------------------
  - id: success_path_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "jsCast, reportExtraMemoryAllocated, RELEASE_AND_RETURN still present in order"

  # -----------------------------------------------------------------------------
  # pass_to_pass - static (file content checks)
  # -----------------------------------------------------------------------------
  - id: file_not_gutted
    type: pass_to_pass
    origin: static
    description: "BunString.cpp retains substantial content (>400 lines)"

  - id: repo_package_json_valid
    type: pass_to_pass
    origin: static
    description: "Repo's package.json is valid JSON"

  - id: repo_typos_toml_valid
    type: pass_to_pass
    origin: static
    description: "Repo's .typos.toml is valid TOML"

  - id: repo_build_zig_valid
    type: pass_to_pass
    origin: static
    description: "Repo's build.zig exists and has structural integrity"

  - id: repo_editorconfig_valid
    type: pass_to_pass
    origin: static
    description: "Repo's .editorconfig is valid and has required sections"

  - id: repo_claude_md_valid
    type: pass_to_pass
    origin: static
    description: "Repo's CLAUDE.md exists and has substantial content"

  # -----------------------------------------------------------------------------
  # pass_to_pass - repo_tests (CI/CD commands that use subprocess.run())
  # -----------------------------------------------------------------------------
  - id: repo_prettier_scripts
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's TypeScript scripts are properly formatted (prettier --check)"

  - id: repo_prettier_packages
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's packages TypeScript files have no parse errors (prettier --check)"

  - id: repo_shell_scripts_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's shell scripts have valid syntax (bash -n)"

  - id: repo_git_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's git repository is intact and has expected commit"

  - id: repo_oxlint_packages_bun_types
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's bun-types package passes oxlint checks"

  - id: repo_oxlint_scripts
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's scripts pass oxlint checks for critical errors"

  - id: repo_prettier_test_internal
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's internal test files are properly formatted (prettier --check)"

  - id: repo_git_status_clean
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's git status command works correctly at base commit"

  - id: repo_git_ls_files
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's git file tracking works correctly for BunString.cpp"

  # -----------------------------------------------------------------------------
  # agent_config
  # -----------------------------------------------------------------------------
  - id: uses_return_if_exception_macro
    type: fail_to_pass
    origin: agent_config
    description: "Fix uses RETURN_IF_EXCEPTION macro per JSC bindings idiom in SKILL.md"
    source:
      path: ".claude/skills/implementing-jsc-classes-cpp/SKILL.md"
      lines: "1-80"
      commit: "9e93bfa1b69a2f9b8c05acb15e02c5506dd4cbc8"

  - id: includes_root_header
    type: pass_to_pass
    origin: agent_config
    description: "BunString.cpp must include root.h as required for C++ bindings files"
    source:
      path: ".claude/skills/implementing-jsc-classes-cpp/SKILL.md"
      lines: "184"
      commit: "9e93bfa1b69a2f9b8c05acb15e02c5506dd4cbc8"

rubric:
  - rule: "Return early with `return {};` (empty encoded JS value) when error conditions are detected in binding functions, rather than continuing with potentially null pointers."
    source:
      path: ".claude/skills/implementing-jsc-classes-cpp/SKILL.md"
      lines: "93-101"
      commit: "9e93bfa1b69a2f9b8c05acb15e02c5506dd4cbc8"
  - rule: "Follow WebCore/JavaScriptCore patterns and conventions established in the codebase when modifying C++ bindings code."
    source:
      path: "CLAUDE.md"
      lines: "109-110"
      commit: "9e93bfa1b69a2f9b8c05acb15e02c5506dd4cbc8"
