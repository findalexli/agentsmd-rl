rubric:
- id: agents_md_let_chains
  source:
    lines: '80'
    commit: ae613c5a55b35f9a96ce7d6f4e49b8aafc244d58
    path: AGENTS.md
  weight: 1.0
  rule: 'AGENTS.md (root): "Prefer let chains (`if let` combined with `&&`) over

    nested `if let` statements to reduce indentation and improve readability."

    The new control flow added to `generics.rs` should use a let chain

    rather than nested `if let` blocks.

    '
- id: agents_md_avoid_panics
  source:
    lines: '79'
    commit: ae613c5a55b35f9a96ce7d6f4e49b8aafc244d58
    path: AGENTS.md
  weight: 1.0
  rule: 'AGENTS.md (root): "Try hard to avoid patterns that require `panic!`,

    `unreachable!`, or `.unwrap()`." The fix should not introduce any of

    those constructs and should encode constraints in the type system or

    via `match` instead.

    '
- id: agents_md_purposeful_comments
  source:
    lines: '82'
    commit: ae613c5a55b35f9a96ce7d6f4e49b8aafc244d58
    path: AGENTS.md
  weight: 0.7
  rule: 'AGENTS.md (root): "Use comments purposefully. Don''t use comments to

    narrate code, but do use them to explain invariants and why something

    unusual was done a particular way." The added control flow is subtle

    (a special-case for invariant union vs inferable typevar) and should

    have a comment that explains *why* this branch is needed (the

    spurious-partial-mapping hazard), not what it does.

    '
- id: agents_md_imports_at_top
  source:
    lines: '76'
    commit: ae613c5a55b35f9a96ce7d6f4e49b8aafc244d58
    path: AGENTS.md
  weight: 0.5
  rule: 'AGENTS.md (root): "Rust imports should always go at the top of the

    file, never locally in functions." Any new `use` introduced by the

    fix must live at the file''s import block, not inside the matched

    arm.

    '
- id: agents_md_existing_style
  source:
    lines: '75'
    commit: ae613c5a55b35f9a96ce7d6f4e49b8aafc244d58
    path: AGENTS.md
  weight: 0.5
  rule: 'AGENTS.md (root): "Follow existing code style. Check neighboring files

