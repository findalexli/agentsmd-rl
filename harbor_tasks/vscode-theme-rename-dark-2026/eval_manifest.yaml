version: "1.0"

checks:
  # =============================================================================
  # Fail-to-Pass Tests (Core behavioral checks)
  # These verify the fix actually works by executing code.
  # =============================================================================

  - id: test_theme_ids_in_package_json
    type: fail_to_pass
    origin: pr_diff
    description: "package.json themes have correct Dark 2026 and Light 2026 IDs"

  - id: test_migration_function_maps_old_names
    type: fail_to_pass
    origin: pr_diff
    description: "migrateThemeSettingsId correctly maps VS Code Dark/Light to new names"

  - id: test_migration_function_maps_experimental
    type: fail_to_pass
    origin: pr_diff
    description: "migrateThemeSettingsId maps Experimental Dark/Light to new names"

  - id: test_theme_setting_defaults_values
    type: fail_to_pass
    origin: pr_diff
    description: "ThemeSettingDefaults.COLOR_THEME_DARK is Dark 2026"

  - id: test_nls_labels_renamed
    type: fail_to_pass
    origin: pr_diff
    description: "package.nls.json has correct 2026 theme labels"

  - id: test_configuration_uses_constant
    type: fail_to_pass
    origin: pr_diff
    description: "Configuration uses ThemeSettingDefaults constant instead of hardcoded string"

  - id: test_unit_tests_updated
    type: fail_to_pass
    origin: pr_diff
    description: "Test file expectations updated for new theme names"

  # =============================================================================
  # Pass-to-Pass Tests (Repo CI/CD Checks)
  # These verify the repo's own quality checks pass.
  # =============================================================================

  - id: test_repo_typecheck
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's TypeScript typecheck passes"

  - id: test_repo_valid_layers
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's valid-layers-check passes"

  - id: test_repo_unit_tests_themes
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's theme-related unit tests pass"
