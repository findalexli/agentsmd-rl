checks:
  - id: test_inlet_event_extra_start_date_tz_conversion
    type: fail_to_pass
    origin: pr_diff
    description: >-
      start_date in example_inlet_event_extra.py can be converted to non-UTC
      timezones (Asia/Shanghai, Asia/Tokyo, Australia/Sydney) without OverflowError

  - id: test_outlet_event_extra_start_date_tz_conversion
    type: fail_to_pass
    origin: pr_diff
    description: >-
      start_date in example_outlet_event_extra.py can be converted to non-UTC
      timezones (Asia/Shanghai, Europe/Moscow, Pacific/Auckland) without OverflowError

  - id: test_start_date_is_timezone_aware
    type: fail_to_pass
    origin: pr_diff
    description: >-
      start_date values in both DAG files have timezone info (tzinfo is not None)

  - id: test_start_date_uses_valid_epoch
    type: fail_to_pass
    origin: pr_diff
    description: >-
      start_date values use a valid epoch (year >= 1970, not datetime.min which has year=1)

  - id: test_python_syntax_valid
    type: pass_to_pass
    origin: static
    description: >-
      Modified DAG files have valid Python syntax

  - id: test_ruff_lint
    type: pass_to_pass
    origin: repo_tests
    description: >-
      Ruff linting passes on modified DAG files (Airflow CI uses ruff check)

  - id: test_ruff_format
    type: pass_to_pass
    origin: repo_tests
    description: >-
      Ruff formatting check passes on modified DAG files (Airflow CI uses ruff format)

