task:
  name: move-compiler-byte-string-escape
  description: Fix Move compiler byte string escape handling for multi-byte UTF-8 characters
  type: code_fix

repository:
  language: rust
  primary_crate: move-compiler
  test_framework: cargo test

checks:
  - id: test_multibyte_hex_escape_error_handling
    type: f2p
    description: "Compiler reports proper error for multi-byte UTF-8 chars in hex escapes, not panic"
    points: 3

  - id: test_valid_hex_escape_still_works
    type: p2p
    description: "Valid hex escape sequences continue to work"
    points: 1

  - id: test_single_invalid_hex_character
    type: f2p
    description: "Compiler handles single invalid hex character correctly"
    points: 1

  - id: test_various_multibyte_chars
    type: f2p
    description: "Compiler handles various multi-byte UTF-8 chars without panicking"
    points: 1

  - id: test_hex_escape_at_end
    type: p2p
    description: "Edge case: hex escape at end of string handled gracefully"
    points: 1

  - id: test_compiler_unit_tests
    type: p2p
    origin: repo_tests
    description: "Move compiler unit tests pass (repo CI check)"
    points: 1

  - id: test_byte_string_expansion_compiles
    type: p2p
    origin: repo_tests
    description: "move-compiler builds without errors (cargo check)"
    points: 1

  - id: test_move_compiler_formatting
    type: pass_to_pass
    origin: repo_tests
    description: "Move code follows Rust formatting standards (cargo fmt --check)"
    points: 1

  - id: test_repo_xlint
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's custom linter passes (cargo xlint)"
    points: 1

  - id: test_repo_git_checks
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's git checks pass (scripts/git-checks.sh)"
    points: 1

