distractors:
- rule: Run Rust unittests with SUI_SKIP_SIMTESTS=1 cargo nextest run
  collision_type: scope_ambiguity
  why_distracting: The agent might run the entire workspace test suite using `cargo
    nextest run`, which takes a very long time due to the large codebase size, instead
    of scoping tests to the `move-compiler` crate as instructed in the prompt.
  severity: high
  source:
    path: CLAUDE.md
    lines: 33-34
- rule: Use `cargo nextest --lib` to run only library tests and skip integration tests
  collision_type: rule_conflict
  why_distracting: The config recommends using `cargo nextest --lib`, but the prompt
    explicitly instructs the agent to use standard `cargo test -p move-compiler --lib`.
    The agent might use nextest and violate the prompt's specific instruction.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 41-42
- rule: Run individual lints with cargo xclippy (which does not recognize -p option)
  collision_type: meta_confusion
  why_distracting: The agent might try to lint its changes using `cargo xclippy -p
    move-compiler`, which will fail because xclippy doesn't support `-p`, or it might
    run it globally which is too slow.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 51-53
- rule: Consult crate-specific CLAUDE.md files for instructions on which tests to
    run
  collision_type: meta_confusion
  why_distracting: The agent might waste time searching for a crate-specific CLAUDE.md
    file in the move-compiler directory to find testing instructions, but no such
    file exists in the context and the prompt already provides the exact test command.
  severity: low
  source:
    path: CLAUDE.md
    lines: 43-44
hierarchy_analysis: The root CLAUDE.md provides general repository guidelines, mostly
  focused on the Sui blockchain components (sui-core, sui-node, etc.). The issue is
  located in the external Move compiler (`external-crates/move/crates/move-compiler`),
  which is a distinct subsystem. The general testing and linting commands in the root
  CLAUDE.md are too broad (running all workspace tests) or inapplicable (simtests)
  for a localized compiler bug. The agent must rely on the specific guidance in the
  prompt (`cargo test -p move-compiler --lib`) rather than the global test commands.
