  merge_commit: "57cf4790ca2f86543bbd773cee15913a38a026d1"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified files (mm_utils.py, scheduler.py) must parse without errors"

  - id: test_repo_ruff
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ruff linting passes on modified files (syntax and import errors)"

  - id: test_repo_isort
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's import sorting passes on modified files"

  - id: test_repo_black
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's code formatting passes on modified files"

  - id: repickle_stable_shm_name
    type: fail_to_pass
    origin: pr_diff
    description: "Multiple pickle cycles must reuse the same shm segment name"

  - id: repickle_no_new_shm
    type: fail_to_pass
    origin: pr_diff
    description: "__getstate__ must not allocate new shm segments on re-pickle"

  - id: materialize_correct_data
    type: pass_to_pass
    origin: pr_diff
    description: "Tensor data survives double pickle (ZMQ + broadcast) and retrieval"

  - id: materialize_cleans_shm
    type: pass_to_pass
    origin: pr_diff
    description: "After materialization the shm segment should be unlinked"

  - id: batch_unwrap
    type: fail_to_pass
    origin: pr_diff
    description: "unwrap_shm_features must recurse into batch sub-requests"

  - id: unwrap_after_broadcast
    type: fail_to_pass
    origin: pr_diff
    description: "unwrap_shm_features called near end of recv_requests, after broadcasts"

  - id: unwrap_not_in_recv_loop
    type: fail_to_pass
    origin: pr_diff
    description: "unwrap_shm_features must not be called inside ZMQ recv try/except block"

  - id: single_pickle_roundtrip
    type: pass_to_pass
    origin: pr_diff
    description: "Basic single pickle/unpickle preserves tensor data across dtypes"

  - id: wrap_unwrap_identity
    type: pass_to_pass
    origin: pr_diff
    description: "wrap_shm_features then unwrap_shm_features returns original tensor"

rubric: []
