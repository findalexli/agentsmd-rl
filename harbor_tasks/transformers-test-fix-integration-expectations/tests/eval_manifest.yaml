rubric:
- rule: 'Many tests are marked as ''slow'' and skipped by default in the CI. To run
    them, use: `RUN_SLOW=1 pytest ...`'
  source:
    path: CLAUDE.md
    lines: 6-6
  evidence: The tests modified in the gold solution (`test_speculative_generation`
    and `test_compile_static_cache`) are decorated with `@slow`, meaning the agent
    must use `RUN_SLOW=1` to verify the fixes locally.
  category: testing
  verification: llm_judge
distractors:
- rule: If coordination evidence cannot be found, do not proceed to PR-ready output.
    In blocked cases, return a short explanation of what is missing.
  collision_type: meta_confusion
  why_distracting: The repository's agent guidelines strictly mandate a 'fail-closed'
    behavior, instructing the agent to refuse to generate PR-ready output if coordination
    evidence (like an issue link or approval) is missing. Since the user prompt directly
    asks for a code fix without providing this meta-context, an agent might refuse
    to complete the task.
  severity: high
  source:
    path: AGENTS.md
    lines: 49-52
- rule: Do not open one-off PRs for tiny edits (single typo, isolated lint cleanup,
    one mutable default argument, etc.).
  collision_type: scope_ambiguity
  why_distracting: The guidelines forbid opening PRs for 'tiny edits' or 'low-value
    busywork'. An agent might misclassify fixing two localized test methods as a tiny
    edit and refuse to proceed, even though fixing failing integration tests is highly
    valuable.
  severity: medium
  source:
    path: AGENTS.md
    lines: 34-36
- rule: We try to avoid direct inheritance between model-specific files... mark classes
    or functions with `# Copied from ...`.
  collision_type: architecture_boundary
  why_distracting: The rule discusses avoiding direct inheritance and managing code
    duplication using `# Copied from ...` blocks. While this applies to `src/transformers/models/`,
    an agent might mistakenly try to apply this logic to the `tests/models/` directory
    and search for or modify copy-mechanisms instead of just fixing the test logic.
  severity: low
  source:
    path: AGENTS.md
    lines: 54-59
hierarchy_analysis: The configuration is flat, consisting of identical `AGENTS.md`
  and `CLAUDE.md` files at the root level. The primary challenge is that these files
  contain strict meta-instructions governing agent behavior (e.g., refusing to code
  without issue coordination) that directly conflict with the user's prompt to fix
  the tests.
