rubric:
- rule: Run `make fixup` or `make style` before submitting changes. Code style is
    enforced in CI and PRs will fail checks if not properly formatted.
  source:
    path: CLAUDE.md
    lines: 1-8
    commit: d4895f0810fd57bf5ee8cf65c3fe20d2f622cd0a
- rule: Bugfix PRs should be as brief as possible - often only one or two lines long.
    Do not add large comments, docstrings or new functions for simple bugfixes. Minimize
    the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: d4895f0810fd57bf5ee8cf65c3fe20d2f622cd0a
- rule: When writing tests, add them to existing test files rather than creating new
    ones. Test files are located in tests/models/<model_name>/ directories.
  source:
    path: .github/copilot-instructions.md
    lines: '16'
    commit: d4895f0810fd57bf5ee8cf65c3fe20d2f622cd0a
- rule: '`make style`: runs formatters and linters (ruff), necessary to pass code
    style checks'
  source:
    path: CLAUDE.md
    lines: 2-2
  evidence: 'The gold solution appends `# fmt: skip` to the `Expectations` dictionary
    to ensure it passes the `make style` ruff formatting checks without being mangled.'
  category: style
distractors:
- rule: If coordination evidence cannot be found, do not proceed to PR-ready output.
  collision_type: meta_confusion
  why_distracting: The agent is in an evaluation environment where it must output
    the code fix. Following the 'Fail-closed behavior' and refusing to output a PR-ready
    patch because there is no issue link or coordination evidence would cause the
    agent to fail the benchmark.
  severity: high
  source:
    path: CLAUDE.md
    lines: 48-49
- rule: Do not open one-off PRs for tiny edits (single typo, isolated lint cleanup,
    one mutable default argument, etc.).
  collision_type: scope_ambiguity
  why_distracting: The agent might misclassify fixing a few strings and method names
    in tests as 'tiny edits' or 'low-value busywork' and refuse to generate the fix,
    but fixing broken integration tests is high-value and required by the prompt.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 34-36
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` contain identical rules. The
  agent must recognize that the strict contribution policies (like fail-closed behavior
  and coordination checks) are intended for real-world PR submission, but in this
  isolated evaluation environment, it must bypass them to actually provide the requested
  code fix.
