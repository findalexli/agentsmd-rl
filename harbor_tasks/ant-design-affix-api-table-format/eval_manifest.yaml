distractors:
- rule: '- 默认值：字符串用反引号，布尔/数字直接写，无默认值用 `-`'
  source:
    path: CLAUDE.md
    lines: '77'
    commit: 3980243572875b822d8df0b308980ad57afee284
  collision_type: scope_ambiguity
  why_distracting: This default-value rule sits inside the same API 表格格式 section but governs cell formatting, not column structure — an agent may waste effort reformatting default values instead of adding the missing Version and Global Config columns.
  severity: medium
- rule: 添加或修改本地化配置时，需同时修改所有语言文件
  source:
    path: CLAUDE.md
    lines: '91'
    commit: 3980243572875b822d8df0b308980ad57afee284
  collision_type: scope_ambiguity
  why_distracting: This i18n rule targets components/locale/ locale files, not markdown docs — an agent could incorrectly expand scope to edit locale TS files unrelated to this documentation-only PR.
  severity: low
