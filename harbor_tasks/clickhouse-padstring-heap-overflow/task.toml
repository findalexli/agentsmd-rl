name = "clickhouse-padstring-heap-overflow"
version = "1.0.0"
source_pr = "https://github.com/ClickHouse/ClickHouse/pull/102088"
source_base_commit = "73ad233a01a81190b2a45b820878e54c36a9a22c"
source_merge_commit = "31deb8bb10fb7083a3c76f1112607b40cb26700b"
description = "Fix heap-buffer-overflow in leftPad/rightPad functions by using PaddedPODArray for safe memory access"
difficulty = "hard"
tags = ["c++", "memory-safety", "buffer-overflow", "clickhouse", "string-functions"]

[time]
estimated_minutes = 120

[environment]
image = "task-env"
workdir = "/workspace/ClickHouse"

[solution]
type = "patch"
script = "solution/solve.sh"

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
