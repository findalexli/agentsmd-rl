distractors:
- rule: All new files must start with the following license in comments at the top
    of the file
  collision_type: scope_ambiguity
  why_distracting: The agent might mistakenly prepend the license header to the existing
    `display.rs` file to ensure compliance, even though the rule explicitly states
    it is only for 'new files'.
  severity: low
  source:
    path: CLAUDE.md
    lines: 18-21
- rule: Run e2e tests. simtests must be run with `cargo simtest` to avoid false negatives
  collision_type: rule_conflict
  why_distracting: The agent might attempt to run the full `sui-e2e-tests` simulation
    suite, which is slow and unnecessary for this localized GraphQL fix, conflicting
    with the task's specific instruction to just run `cargo check -p sui-indexer-alt-graphql`.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 31-33
- rule: Use simtest for debugging and testing
  source:
    path: .claude/skills/simtest-debug/SKILL.md
    lines: 1-10
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to run or write simulation tests (simtests)
    for this GraphQL API bug, which is unnecessary, time-consuming, and outside the
    scope of the requested fix.
  severity: medium
- rule: Never modify settings for a version that exists in a release branch
  source:
    path: repo/.claude/skills/protocol-config/SKILL.md
    lines: 153-153
  source_text: '- **Never modify settings for a version that exists in a release branch**
    - this will break consensus'
  collision_type: scope_ambiguity
  why_distracting: The diff mentions ignoring 'root-version bound inherited from the
    value so a newer Display v2 object can still be resolved for older objects'. An
    agent might see the word 'version' and 'older objects' and mistakenly think this
    violates the rule against modifying version settings, confusing GraphQL object
    versions with protocol versioning.
  severity: high
hierarchy_analysis: The hierarchy is flat (only root-level AGENTS.md and CLAUDE.md
  are present). The rules provided are generic repository guidelines that do not interact
  deeply with the specific GraphQL scoping bug.
