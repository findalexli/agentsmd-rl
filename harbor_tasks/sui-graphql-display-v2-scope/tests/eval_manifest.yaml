rubric:
- rule: Check code without building (preferred) using cargo check
  source:
    path: CLAUDE.md
    lines: 21-22
  evidence: The task instruction and standard workflow align with using `cargo check`
    for validation rather than a full build, as preferred by the config.
  category: tooling
  verification: llm_judge
- rule: Comment non-obvious algorithms, business logic, and assumptions about external
    state.
  source:
    path: repo/CLAUDE.md
    lines: 118-124
  source_text: '**Do NOT comment the obvious** - comments should not simply repeat
    what the code does.

    **When to comment**:

    - Non-obvious algorithms or business logic

    - Temporary exclusions, timeouts, or thresholds and their reasoning

    - Complex calculations where the "why" isn''t immediately clear

    - Subtle race conditions or threading considerations

    - Assumptions about external state or preconditions'
  evidence: The diff adds a comment `// Display registry objects are global objects,
    not children of the value being rendered...` which explains the external assumptions
    and 'why' the `without_root_bound()` is called, rather than just repeating what
    it does.
  category: style
  verification: llm_judge
