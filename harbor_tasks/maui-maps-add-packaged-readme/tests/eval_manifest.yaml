  gold_added: "# Microsoft.Maui.Controls.Maps\n\n`Microsoft.Maui.Controls.Maps` brings\
    \ an easy-to-use map control to .NET MAUI apps so you can display maps, drop pins,\
    \ draw shapes, and react to user interactions on Android and iOS from one shared\
    \ codebase. (Windows implementation is not available yet.)\n\n## Get started\\\
    \n\n1. **Install the package**\n   ```bash\n   dotnet add package Microsoft.Maui.Controls.Maps\n\
    \   ```\n2. **Enable Maps in `MauiProgram.cs`**\n   ```csharp\n   var builder\
    \ = MauiApp.CreateBuilder();\n   builder\n       .UseMauiApp<App>()\n       .UseMauiMaps();\
    \ // registers map handlers\n   ```\n3. **Add platform credentials**\n   - **Android**:\
    \ Add your Google Maps API key to `Platforms/Android/AndroidManifest.xml`\n  \
    \ ```xml\n     <application>\n         <meta-data android:name=\"com.google.android.geo.API_KEY\"\
    \n                    android:value=\"YOUR_API_KEY_HERE\" />\n     </application>\n\
    \     ```\n   - **iOS**: No additional keys required for the built-in map provider.\n\
    \   - **Windows**: The Maps control is currently not implemented on Windows. For\
    \ updates, see [this tracking link](https://aka.ms/maui-maps-no-windows).\n\n\
    4. **Place a map in your page**\n   ```xml\n<ContentPage xmlns=\"http://schemas.microsoft.com/dotnet/2021/maui\"\
    \n             xmlns:x=\"http://schemas.microsoft.com/winfx/2009/xaml\"\n    \
    \         xmlns:maps=\"http://schemas.microsoft.com/dotnet/2021/maui/maps\"\\\
    \n             xmlns:sensors=\"clr-namespace:Microsoft.Maui.Devices.Sensors;assembly=Microsoft.Maui.Essentials\"\
    \n>\n    <maps:Map>\n        <maps:Map.Pins>\n            <maps:Pin Label=\"Downtown\"\
    \n                      Address=\"Main Street\"\n                      Type=\"\
    Place\">\n                <maps:Pin.Location>\n                    <sensors:Location>\n\
    \                        <x:Arguments>\n                            <x:Double>47.6205</x:Double>\n\
    \                            <x:Double>-122.3493</x:Double>\n                \
    \                        </x:Arguments>\n                    </sensors:Location>\n           \
    \                    </maps:Pin.Location>\n            </maps:Pin>\n        </maps:Map.Pins>\n\
    \    </maps:Map>\n</ContentPage>\n   ```\n\n## Features at a glance\\
    \n\n- **Pins**: Labels, addresses, pin types, custom images, and tap handling via `PinClicked`.\\
    \n    - **Shapes**: Draw **polygons**, **polylines**, and **circles** to outline areas\
    \ or routes.\n- **Map interactions**: Handle `MapClicked`, move the camera/region,\
    \ and programmatically add or remove map elements at runtime.\n- **Map display**:\
    \ Switch map types (e.g., Street, Satellite, Hybrid) and control gesture support\
    \ (scroll, zoom, rotate).\n- **User location**: Show the user's current location\
    \ with `IsShowingUser` (platform location permission required).\n\n### Samples:\
    \ pins and shapes\n\n```xml\n<maps:Map xmlns:maps=\"http://schemas.microsoft.com/dotnet/2021/maui/maps\"\
    \n          xmlns:sensors=\"clr-namespace:Microsoft.Maui.Devices.Sensors;assembly=Microsoft.Maui.Essentials\"\
    \n          MapType=\"Hybrid\" MapClicked=\"OnMapClicked\">\n    <maps:Map.Pins>\n\
    \        <maps:Pin Label=\"Office\" Type=\"Place\">\n            <maps:Pin.Location>\\
    n                <sensors:Location>\n                    <x:Arguments>\n          \
    \              <x:Double>47.6424</x:Double>\n                        <x:Double>-122.3219</x:Double>\\
    n                    </x:Arguments>\n                </sensors:Location>\n       \
    \     </maps:Pin.Location>\n        </maps:Pin>\n    </maps:Map.Pins>\n    <maps:Map.MapElements>\\
    n        <maps:Polygon StrokeColor=\"Red\" FillColor=\"#40FF0000\" StrokeWidth=\"4\">\\
    n            <maps:Polygon.Geopath>\n                <sensors:Location>\n        \
    \            <x:Arguments>\n                        <x:Double>47.642</x:Double>\n       \
    \                 <x:Double>-122.323</x:Double>\n                    </x:Arguments>\n \
    \               </sensors:Location>\n                <sensors:Location>\n       \
    \             <x:Arguments>\n                        <x:Double>47.643</x:Double>\\
    n                        <x:Double>-122.326</x:Double>\n                    </x:Arguments>\\
    n                </sensors:Location>\n                <sensors:Location>\n    \
    \                <x:Arguments>\n                        <x:Double>47.640</x:Double>\\
    n                        <x:Double>-122.327</x:Double>\n                    </x:Arguments>\\
    n                </sensors:Location>\n            </maps:Polygon.Geopath>\n     \
    \   </maps:Polygon>\\n\\n        <maps:Polyline StrokeColor=\"DodgerBlue\" StrokeWidth=\"6\">\\
    n            <maps:Polyline.Geopath>\n                <sensors:Location>\n      \
    \              <x:Arguments>\n                        <x:Double>47.639</x:Double>\\
    n                        <x:Double>-122.330</x:Double>\n                    </x:Arguments>\\
    n                </sensors:Location>\n                <sensors:Location>\n    \
    \                <x:Arguments>\n                        <x:Double>47.640</x:Double>\\
    n                        <x:Double>-122.335</x:Double>\n                    </x:Arguments>\\
    n                </sensors:Location>\n            </maps:Polyline.Geopath>\n  \
    \      </maps:Polyline>\\n\\n        <maps:Circle StrokeColor=\"Green\" FillColor=\"#40008000\" StrokeWidth=\"3\">\\
    n            <maps:Circle.Center>\n                <sensors:Location>\n      \
    \              <x:Arguments>\n                        <x:Double>47.641</x:Double>\\
    n                        <x:Double>-122.329</x:Double>\n                    </x:Arguments>\\
    n                </sensors:Location>\n            </maps:Circle.Center>\n     \
    \       <maps:Circle.Radius>\n                <maps:Distance>\n            \
    \        <x:Arguments>\n                        <x:Double>200</x:Double>\n       \
    \             </x:Arguments>\n                </maps:Distance>\n            </maps:Circle.Radius>\\
    n        </maps:Circle>\n    </maps:Map.MapElements>\n</maps:Map>\n```\n\\
    n### Samples: interactions and map modes\n\n```csharp\n// In code-behind\\
    nvoid OnMapClicked(object sender, MapClickedEventArgs e)\n{\n    // Drop a pin where\
    \ the user tapped\n    var map = (Map)sender;\n    map.Pins.Add(new Pin\n   \
    \ {\n        Label = \"Dropped pin\",\n        Type = PinType.Place,\n        Location\
    \ = e.Location\n    });\n\n    // Move/zoom to the tapped location\n    map.MoveToRegion(MapSpan.FromCenterAndRadius(e.Location,\
    \ Distance.FromMeters(500)));\n}\n\n// Toggle map display mode\nvoid ToggleMapType(Map\
    \ map) =>\n    map.MapType = map.MapType == MapType.Street ? MapType.Satellite : MapType.Street;\\
    n\n// Common runtime toggles\nvoid EnableLocationAndTraffic(Map map)\n{\\
    n    map.IsShowingUser = true;      // requires location permission on the device\\
    n    map.IsTrafficEnabled = true;   // show live traffic where supported\n}\
    n```\n\n## Learn more\n\n- [.NET MAUI Map control docs](https://learn.microsoft.com/dotnet/maui/user-interface/controls/map)\
    \ - capabilities, events, and platform guidance\n- [.NET MAUI documentation](https://learn.microsoft.com/dotnet/maui/)\
    \ - build and ship cross-platform apps\n"
