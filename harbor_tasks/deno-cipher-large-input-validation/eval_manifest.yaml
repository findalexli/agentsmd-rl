- rule: Keep your changes minimal, don't do drive-by changes in a PR.
  source:
    path: CLAUDE.md
    lines: 39-41
  evidence: 'The gold solution strictly adds the 3-line `if` statement for buffer
    length validation in `Cipheriv.prototype.update` and `Decipheriv.prototype.update`,
    without refactoring surrounding code or fixing '
  category: style
distractors:
- rule: Before committing, if only non-Rust was changed, make sure to run `tools/lint.js
    --js` and fix any lint errors before committing
  collision_type: rule_conflict
  why_distracting: The agent might run the linter and attempt to fix pre-existing
    lint errors in `ext/node/polyfills/internal/crypto/cipher.ts`, which would violate
    the 'Keep your changes minimal' rule and introduce drive-by changes.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 29-30
- rule: Before committing, make sure `tools/format.js` is run to format your code
  collision_type: rule_conflict
  why_distracting: The agent might run `tools/format.js` on the entire file, potentially
    reformatting untouched lines and creating a noisy diff that violates the minimal
    changes rule.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 28-28
- rule: The `deno_runtime` crate (`./runtime`) assembles the JavaScript runtime, including
    all 'extensions' (native functionality exposed to JavaScript). The extensions
    themselves are in the `ext/` directory, and provide system access to JavaScript
  collision_type: architecture_boundary
  why_distracting: Because the issue mentions OpenSSL and C `int` limits, the agent
    might try to implement the buffer size check in the Rust extension code instead
    of the JS polyfill, crossing an architecture boundary unnecessarily when a simple
    JS check suffices.
  severity: high
  source:
    path: CLAUDE.md
    lines: 51-54
hierarchy_analysis: Only one config file (`CLAUDE.md`) is provided, so there are no
  inter-file conflicts. The primary tension within the file is between the instruction
  to fix lint/formatting errors and the instruction to keep changes minimal. The gold
  solution prioritizes minimal changes over opportunistic cleanup.
