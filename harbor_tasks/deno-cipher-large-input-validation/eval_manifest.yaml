distractors:
- rule: Before committing, make sure tools/format.js is run to format your code
  collision_type: rule_conflict
  why_distracting: The agent might attempt to run `./tools/format.js` on the entire
    file or repository. If the existing code has formatting deviations, this would
    create a massive diff of unrelated changes, directly violating the 'minimal changes'
    rule.
  severity: medium
