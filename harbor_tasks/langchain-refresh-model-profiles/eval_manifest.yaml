source:
  repo: langchain-ai/langchain
  pr_number: 36368
  base_commit: 342d8bdef21c957471cdf9dc9c6af59e3d70d9e7
  merge_commit: 90d1365bf458fd58f5b00dc7ff17d400cd8302dd
  title: "chore(model-profiles): refresh model profile data"
  description: |
    Automated refresh of model profile data for all in-monorepo partner integrations.
    Updates MistralAI, OpenAI, and OpenRouter model profiles with new models and fixes.

checks:
  # Fail-to-pass tests
  - id: test_mistralai_model_small_2603_exists
    type: fail_to_pass
    origin: behavior
    description: "mistral-small-2603 model should exist in MistralAI profiles"

  - id: test_mistralai_model_small_2603_specs
    type: fail_to_pass
    origin: behavior
    description: "mistral-small-2603 should have correct specs (256k tokens, reasoning, etc.)"

  - id: test_mistralai_small_latest_updated
    type: fail_to_pass
    origin: behavior
    description: "mistral-small-latest should have updated specs (256k tokens, reasoning=True)"

  - id: test_openai_gpt_5_3_chat_latest_exists
    type: fail_to_pass
    origin: behavior
    description: "gpt-5.3-chat-latest model should exist in OpenAI profiles"

  - id: test_openai_gpt_5_3_chat_latest_specs
    type: fail_to_pass
    origin: behavior
    description: "gpt-5.3-chat-latest should have correct specs (128k input, tool_calling, etc.)"

  - id: test_openrouter_nemotron_model_id_fixed
    type: fail_to_pass
    origin: behavior
    description: "OpenRouter nemotron model ID should use colon separator (a12b:free not a12b-free)"

  # Pass-to-pass tests (repo health)
  - id: test_mistralai_profiles_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "MistralAI profiles file should be valid Python"

  - id: test_openai_profiles_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "OpenAI profiles file should be valid Python"

  - id: test_openrouter_profiles_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "OpenRouter profiles file should be valid Python"

  - id: test_mistralai_profiles_importable
    type: pass_to_pass
    origin: repo_tests
    description: "MistralAI profiles module should be importable"

  - id: test_openai_profiles_importable
    type: pass_to_pass
    origin: repo_tests
    description: "OpenAI profiles module should be importable"

  - id: test_openrouter_profiles_importable
    type: pass_to_pass
    origin: repo_tests
    description: "OpenRouter profiles module should be importable"

  # Repo CI tests - linting, type checking, unit tests
  - id: test_repo_mistralai_ruff
    type: pass_to_pass
    origin: repo_tests
    description: "MistralAI package passes ruff linting"

  - id: test_repo_openai_ruff
    type: pass_to_pass
    origin: repo_tests
    description: "OpenAI package passes ruff linting"

  - id: test_repo_openrouter_ruff
    type: pass_to_pass
    origin: repo_tests
    description: "OpenRouter package passes ruff linting"

  - id: test_repo_mistralai_mypy
    type: pass_to_pass
    origin: repo_tests
    description: "MistralAI package passes mypy type checking"

  - id: test_repo_openai_mypy
    type: pass_to_pass
    origin: repo_tests
    description: "OpenAI package passes mypy type checking"

  - id: test_repo_openrouter_mypy
    type: pass_to_pass
    origin: repo_tests
    description: "OpenRouter package passes mypy type checking"

  - id: test_repo_mistralai_unit_imports
    type: pass_to_pass
    origin: repo_tests
    description: "MistralAI unit import tests pass"

  - id: test_repo_openai_unit_imports
    type: pass_to_pass
    origin: repo_tests
    description: "OpenAI unit import tests pass"

  - id: test_repo_openrouter_unit_imports
    type: pass_to_pass
    origin: repo_tests
    description: "OpenRouter unit import tests pass"

# Rubric rules removed - this is a model profile data update task
# The test_outputs.py tests already verify all the behavior we care about:
# - Model profiles exist at the expected locations
# - Profile entries have correct structure and all required fields
# - Profile data is valid Python and importable
# - Linting and type checking pass
#
# Rubric judging disabled - requires GEMINI_API_KEY or ANTHROPIC_API_KEY which
# are not available in this environment. The functional tests above are sufficient.
