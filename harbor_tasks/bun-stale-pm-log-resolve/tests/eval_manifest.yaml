- rule: NEVER write tests that check for no "panic" or "uncaught exception" or similar
    in the test output. These tests will never fail in CI.
  source:
    path: CLAUDE.md
    lines: 55-56
  evidence: The gold solution correctly omits adding a test for this stack-buffer-overflow.
    A test that merely executes `mock.module()` to check if it crashes would not fail
    in standard (non-ASAN) CI environments
  category: testing
distractors:
- rule: NEVER write tests that check for no 'panic' or 'uncaught exception' or similar
    in the test output. These tests will never fail in CI.
  collision_type: scope_ambiguity
  why_distracting: The bug is a stack-buffer-overflow that causes a crash. An agent
    might naturally try to write a test that triggers the bug and verifies the process
    doesn't crash or panic. However, the config explicitly forbids tests that check
    for 'no panic', as they won't reliably fail in standard CI without ASAN. The gold
    solution correctly omits a test.
  severity: high
  source:
    path: AGENTS.md
    lines: 68-69
- rule: Always use `bun.*` APIs instead of `std.*`.
  collision_type: rule_conflict
  why_distracting: The agent might try to use `std.log` or `std.debug.print` to fix
    or debug the logging pointer issue, but the codebase strictly requires using Bun's
    internal wrappers and custom `logger.Log`.
  severity: low
  source:
    path: src/AGENTS.md
    lines: 14-15
hierarchy_analysis: The hierarchy separates root-level testing/build instructions
  (`AGENTS.md`) from `src/`-level Zig conventions (`src/AGENTS.md`). The agent must
  synthesize the root-level testing constraints (no panic tests) with the nature of
  the bug (a memory corruption crash) to correctly conclude that a test should not
  be added.
