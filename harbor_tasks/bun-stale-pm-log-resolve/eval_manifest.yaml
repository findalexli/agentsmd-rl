rubric:
- rule: Never use @import() inline inside of functions. Always put them at the bottom
    of the file or containing struct.
  source:
    path: src/CLAUDE.md
    lines: '11'
    commit: 9ce5b052840cecea4aa1977aeb063c47d0137a22
- rule: Always use bun.* APIs instead of std.*.
  source:
    path: src/CLAUDE.md
    lines: '16'
    commit: 9ce5b052840cecea4aa1977aeb063c47d0137a22
- rule: Be careful with allocators and use defer for cleanup.
  source:
    path: src/CLAUDE.md
    lines: 230-232
    commit: 9ce5b052840cecea4aa1977aeb063c47d0137a22
- rule: NEVER write tests that check for no "panic" or "uncaught exception" or similar
    in the test output. These tests will never fail in CI.
  source:
    path: CLAUDE.md
    lines: 55-56
  evidence: The gold solution correctly omits adding a test for this stack-buffer-overflow.
    A test that merely executes `mock.module()` to check if it crashes would not fail
    in standard (non-ASAN) CI environments
  category: testing
distractors:
- rule: If a test is for a specific numbered GitHub Issue, it should be placed in
    test/regression/issue/${issueNumber}.test.ts... If no valid issue number is provided,
    find the best existing file to modify instead
  collision_type: scope_ambiguity
  why_distracting: The bug description provides a clear reproduction using `mock.module()`.
    An agent might feel compelled to write a regression test in `test/js/bun/` or
    `test/regression/`. However, since this is an ASAN-specific stack-buffer-overflow,
    a standard test would be ineffective and wasted effort.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 28-36
- rule: For multi-file tests, prefer tempDir and Bun.spawn.
  collision_type: scope_ambiguity
  why_distracting: An agent might try to use `Bun.spawn` to run a script that triggers
    the `mock.module()` auto-install crash, attempting to capture stderr to check
    for the ASAN trace. This would result in a complex, brittle test setup that is
    ultimately unnecessary for this specific memory safety fix.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 40-41
- rule: Never use @import() inline inside of functions. Always put them at the bottom
    of the file or containing struct.
  collision_type: scope_ambiguity
  why_distracting: The agent might see the need to access the package manager or logger
    and attempt to add an import for it. If it tries to follow this rule, it might
    move existing imports or add new ones at the bottom of the file, creating unnecessary
    diffs, when the `package_manager` is already accessible via `jsc_vm.transpiler.resolver.package_manager`.
  severity: low
  source:
    path: src/CLAUDE.md
    lines: 14-16
hierarchy_analysis: The root `CLAUDE.md` provides extensive testing instructions,
  which might mislead an agent into thinking a test is required for every bug fix.
  However, the specific rule about not writing tests that check for 'no panic' overrides
  the general testing guidelines in the context of this ASAN-specific crash. The `src/CLAUDE.md`
  provides Zig-specific guidelines that are mostly irrelevant since the fix is a simple
  pointer assignment.
