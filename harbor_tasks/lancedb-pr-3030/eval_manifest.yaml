checks:
  # Fail-to-pass tests (verify the fix is applied)
  - id: test_empty_results_early_return_exists
    type: fail_to_pass
    origin: agent_config
    description: Early return for empty results exists in _combine_hybrid_results

  - id: test_relevance_score_column_added
    type: fail_to_pass
    origin: agent_config
    description: _relevance_score column is added to empty results

  - id: test_with_row_ids_handling
    type: fail_to_pass
    origin: agent_config
    description: with_row_ids flag is respected in empty results

  - id: test_pa_unify_schemas_usage
    type: fail_to_pass
    origin: agent_config
    description: pa.unify_schemas is used to merge schemas

  - id: test_patch_code_structure
    type: fail_to_pass
    origin: agent_config
    description: The specific patch structure is present

  - id: test_no_index_error_on_empty_results
    type: fail_to_pass
    origin: agent_config
    description: Early return comes before reranker call

  - id: test_combined_schema_includes_both
    type: fail_to_pass
    origin: agent_config
    description: Combined schema includes fields from both input tables

  # Pass-to-pass tests (CI/CD gates that should pass on clean code)
  - id: test_python_syntax_valid
    type: pass_to_pass
    origin: static
    description: Python code has valid syntax

  - id: test_repo_ruff_lint
    type: pass_to_pass
    origin: repo_tests
    description: Repo ruff linter passes on query.py

  - id: test_repo_ruff_format
    type: pass_to_pass
    origin: repo_tests
    description: Repo ruff format check passes on query.py

  - id: test_repo_git_trackable
    type: pass_to_pass
    origin: repo_tests
    description: Git repo is in a trackable state
