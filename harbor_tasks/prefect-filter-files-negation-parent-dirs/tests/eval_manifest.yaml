source_pr:
  owner: prefecthq
  repo: prefect
  number: 21352
  merge_commit: f3cc0fe39881bbc356040940287effc733671357
  base_commit: 45186a33d5e3f0f66383f27b984c25e3a29e6302

checks:
  # Fail-to-pass tests (the core behavioral fix)
  - id: test_negation_includes_parent_dirs
    type: fail_to_pass
    origin: behavioral
    description: Parent directory of negation-included files must be in filter_files result

  - id: test_negation_includes_nested_parent_dirs
    type: fail_to_pass
    origin: behavioral
    description: All ancestor directories of deeply-nested negation-included files must appear

  # Pass-to-pass tests (existing functionality preservation)
  - id: test_filter_files_basic_functionality
    type: pass_to_pass
    origin: behavioral
    description: Basic filtering without negation patterns still works

  - id: test_include_dirs_false_behavior
    type: pass_to_pass
    origin: behavioral
    description: When include_dirs=False, parent directories should not be added

  - id: test_repo_tests_exist
    type: pass_to_pass
    origin: repo_tests
    description: Repo test file exists and is importable

  - id: test_original_repo_tests_can_run
    type: pass_to_pass
    origin: repo_tests
    description: Repo tests for filesystem module pass

  # Repo CI checks (from static-analysis.yaml workflow)
  - id: test_repo_lint_ruff
    type: pass_to_pass
    origin: repo_tests
    description: Modified filesystem.py passes ruff linting from CI

  - id: test_repo_test_file_lint_ruff
    type: pass_to_pass
    origin: repo_tests
    description: Test file passes ruff linting from CI

  - id: test_repo_ast_valid
    type: pass_to_pass
    origin: repo_tests
    description: Modified filesystem.py has valid Python AST

  - id: test_repo_test_file_ast_valid
    type: pass_to_pass
    origin: repo_tests
    description: Test file has valid Python AST

  # Agent config checks (rules from AGENTS.md files)
  - id: test_no_server_imports_in_filesystem_utils
    type: pass_to_pass
    origin: agent_config
    source:
      file: src/prefect/utilities/AGENTS.md
      lines: "47-49"
      text: "Don't add server imports to utility modules — these are used client-side too."
    description: Utilities must not import from server modules

rubric:
  # Soft/subjective rules from agent configs
  - id: docstring_quality
    description: New code has appropriate inline comments explaining the fix
    weight: minor

  - id: type_annotations
    description: Type annotations use modern Python syntax (set[str]) per AGENTS.md
    weight: minor
    source:
      file: AGENTS.md
      text: "Python >=3.10,<3.15 with modern typing (list[int], T | None)"
