    path: CLAUDE.md
    lines: 1-10
    commit: 156d4e43e6281d0ff65a2351379df732348ffadc
- rule: Don't use f-strings for print lines where there are no variables to format.
  source:
    path: libs/agno_infra/agno/infra/operator.py
    lines: '71'
    commit: 156d4e43e6281d0ff65a2351379df732348ffadc
  evidence: The gold solution updates the print_info string "Select starter template or press Enter for default (agentos-docker)" as a standard string literal without converting it to an f-string
  category: style
- rule: Use `---` horizontal rules to separate major sections in the documentation.
  source:
    path: CLAUDE.md
    lines: 5-15
  evidence: The gold solution inserts the new `## GitHub Operations` section and correctly surrounds it with `---` horizontal rules, matching the established markdown sectioning style of the file.
  category: documentation
config_edits:
- path: CLAUDE.md
  tier: 1
  gold_added: '## GitHub Operations


    **Updating PR descriptions:**


    The `gh pr edit` command may fail with GraphQL errors related to classic projects. Use the API directly instead:


    ```bash

    # Update PR body

    gh api repos/agno-agi/agno/pulls/<PR_NUMBER> -X PATCH -f body="<PR_BODY>"


    # Or with a file

    gh api repos/agno-agi/agno/pulls/<PR_NUMBER> -X PATCH -f body="$(cat /path/to/body.md)"

    ```


    ---'
  gold_removed: ''
distractors:
- rule: '# CLAUDE.md — Agno


    Instructions for Claude Code when working on this codebase.'
  collision_type: meta_confusion
  why_distracting: This file acts as the agent's own system prompt/instructions. The agent might interpret the task to 'update CLAUDE.md' as a meta-instruction to change its current runtime behavior (e.g., attempting to use the GitHub API to update a PR right now) rather than literally editing the markdown file on disk.
  severity: high
  source:
    path: CLAUDE.md
    lines: 1-3
- rule: When testing a cookbook folder, first check for the CLAUDE.md file... Use cookbook/15_learning/CLAUDE.md as a reference.
  collision_type: scope_ambiguity
  why_distracting: The instructions mention `cookbook/15_learning/CLAUDE.md` as a reference and discuss cookbook-specific `CLAUDE.md` files. The agent might mistakenly add the GitHub operations documentation to a cookbook's `CLAUDE.md` instead of the root `CLAUDE.md` specified in the task.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 32-36
hierarchy_analysis: The config hierarchy consists of `.cursorrules` and `CLAUDE.md` at the root level. The primary challenge is that `CLAUDE.md` is both a source of instructions and a target for modification, creating a self-referential loop.
