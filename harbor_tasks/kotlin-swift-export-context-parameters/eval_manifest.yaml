source:
  pr: "https://github.com/JetBrains/kotlin/pull/5702"
  title: "[Swift Export] Support context parameters on functional types"
  base_commit: "7219edd11fe97666ceaf9ff4fc625d5c39d4a420"
  merge_commit: "83679fafcd189bd8f7f00cc67858679efb6c7885"
  description: |
    Adds support for context parameters on functional types in Kotlin's Swift export.
    Context parameters (from Kotlin's context receivers feature) allow functions
    to require specific context objects without explicitly passing them as parameters.
    This change ensures Swift export properly handles these context parameters in
    functional type declarations.

