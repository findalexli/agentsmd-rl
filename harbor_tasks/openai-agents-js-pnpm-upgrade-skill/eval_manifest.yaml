distractors:
- rule: When editing GitHub Actions workflows, always web-search for the latest stable major versions of official actions (e.g., actions/checkout, actions/setup-node) before updating version pins.
  source:
    path: AGENTS.md
    lines: '249'
    commit: 94b4b7c55a6ada0fb0450c95ad6c47e3d6d449f9
  collision_type: rule_conflict
  why_distracting: AGENTS.md tells agents to use latest stable major versions (@v4), but the task requires pinning pnpm/action-setup to a specific SemVer tag (v4.2.0). An agent following AGENTS.md literally would keep the floating @v4 tag, which is exactly what the task forbids.
  severity: high
- rule: You can skip $code-change-verification for docs-only or repo-meta changes (for example, docs/, .codex/, README.md, AGENTS.md, .github/), unless a user explicitly asks to run the full verification stack.
  source:
    path: AGENTS.md
    lines: '33'
    commit: 94b4b7c55a6ada0fb0450c95ad6c47e3d6d449f9
  collision_type: scope_ambiguity
  why_distracting: AGENTS.md says to skip $code-change-verification for .github/ changes, but modifying workflow YAML inside .github/workflows/ could tempt an agent to run the full verification stack unnecessarily, wasting time.
  severity: medium
- rule: 'Use Conventional Commits: ci: CI configuration, chore: build, CI, or tooling changes.'
  source:
    path: AGENTS.md
    lines: 205-215
    commit: 94b4b7c55a6ada0fb0450c95ad6c47e3d6d449f9
  collision_type: meta_confusion
  why_distracting: 'Both ci: and chore: are valid Conventional Commit types for CI workflow changes. The task specifies chore:, but an agent could reasonably choose ci: since the change is a new CI workflow configuration.'
  severity: low
