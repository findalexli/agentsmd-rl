rubric:
  - rule: "When handling errors in trajectory processing, zero out the completion_mask to prevent logprob computation issues"
    source:
      path: "src/prime_rl/orchestrator/trajectories.py"
      lines: "190-200"
      commit: "05165f6c09009c1b2ed3e4c93997152f8cfb6e29"
    reference: |
      When state has an error, the completion_mask should be set to all False:
      ```python
      has_error = state["error"] is not None
      if has_error:
          completion_mask = [False] * len(tokens["completion_mask"])
      ```

  - rule: "Use type annotations with Union syntax (X | Y) for return types that can be None"
    source:
      path: "src/prime_rl/orchestrator/trajectories.py"
      lines: "175-180"
      commit: "05165f6c09009c1b2ed3e4c93997152f8cfb6e29"
    reference: |
      Return type should use modern Union syntax:
      ```python
      def interleave_rollout(state: vf.State) -> list[TrainingSample] | None:
      def branch_rollout(state: vf.State) -> list[TrainingSample] | None:
      ```

