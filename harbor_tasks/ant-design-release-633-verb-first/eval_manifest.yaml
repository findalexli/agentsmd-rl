config_edits:
- path: CLAUDE.md
  description: 'The Chinese row of the *句式* table in the *Changelog 规范 → 格式规范 → 句式*

    section is rewritten to be verb-first (matching the English row).

    The *核心原则* bullet about PR/contributor links is rewritten to drop the

    "community PRs only" carve-out — every entry now gets a contributor link.

    '
  gold_added: '- 尽量给出 PR 链接，并统一添加贡献者链接

    | 中文 | `Emoji 动词 组件名 描述`（动词在前） | `🐞 修复 Button 在暗色主题下 \`color\` 的问题。` |

    '
  gold_removed: '- 尽量给出 PR 链接，社区 PR 加贡献者链接

    | 中文 | `Emoji 组件名 动词/描述` | `🐞 Button 修复暗色主题下 \`color\` 的问题。` |

    '
- path: .claude/skills/changelog-collect/SKILL.md
  description: 'A new sub-section `#### 描述与署名补充规则` is inserted between phases 2

    and 3, with three bullets: (1) descriptions must lead with an action verb

    in both Chinese (修复/优化/新增/重构) and English (Fix/Improve/Add/Refactor);

    (2) the body must still contain the component name (e.g. `修复 Select ...`,

    `Fix Select ...`); (3) every entry adds a PR author link, no team/community

    distinction.


    The footer "注意事项" bullet that forbade `修复 Select...` (component-first

    mandate) is replaced by two bullets that re-affirm verb-first wording AND

    the always-author-link rule.

    '
  gold_added: '#### 描述与署名补充规则


    - 描述必须以动作开头：中文优先使用 `修复`、`优化`、`新增`、`重构` 等动词开头；英文优先使用 `Fix`、`Improve`、`Add`、`Refactor` 开头。

    - 在"动作开头"的前提下，正文仍需包含组件名（例如：`修复 Select ...`、`Fix Select ...`）。

    - 每条 changelog 统一补充 PR 作者链接（如 `[@username](https://github.com/username)`），不再校验是否为团队成员。


    - 描述以动作开头，并保证正文包含组件名（如 `修复 Select ...`、`Fix Select ...`）

    - 统一添加 PR 作者链接（不区分是否团队成员）

    '
  gold_removed: '- 组件名在正文中要出现（如 `Select 修复...`，不是 `修复 Select...`）

    '
