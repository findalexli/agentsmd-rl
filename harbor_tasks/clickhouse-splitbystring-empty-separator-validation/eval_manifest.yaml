distractors:
- rule: When writing text such as documentation, comments, or commit messages, wrap
    literal names from ClickHouse SQL language, classes and functions, or literal
    excerpts from log messages inside inline code blocks
  collision_type: scope_ambiguity
  why_distracting: The agent might interpret the C++ exception message as 'text' and
    attempt to use markdown backticks around the tokenizer name instead of the single
    quotes specified in the instruction and used in the surrounding code.
  severity: medium
  source:
    path: AGENTS.md
    lines: 5-5
- rule: Wrap literal names from ClickHouse SQL language, classes and functions in
    inline code blocks.
  source:
    path: .claude/CLAUDE.md
    lines: '5'
  source_text: 'When writing text such as documentation, comments, or commit messages,
    wrap literal names from ClickHouse SQL language, classes and functions, or literal
    excerpts from log messages inside inline code blocks, such as: `MergeTree`.'
  collision_type: scope_ambiguity
  why_distracting: 'An agent might mistakenly apply this to C++ error message string
    literals (like the one modified in the gold diff: "Incorrect parameter of tokenizer
    ''{}'': the empty string cannot be used as a separator"), incorrectly adding backticks
    around words like "tokenizer" or the format specifier. The rule only applies to
    documentation, comments, and commit messages.'
  severity: medium
- rule: Write names of functions and methods as f instead of f().
  source:
    path: .claude/CLAUDE.md
    lines: '9'
  source_text: When writing text such as documentation, comments, or commit messages,
    write names of functions and methods as `f` instead of `f()` - we prefer it for
    mathematical purity when it refers a function itself rather than its application.
  collision_type: would_cause_bug
  why_distracting: An agent might see `SplitByStringTokenizer::getExternalName()`
    being used in the new exception parameters and incorrectly remove the `()`. Since
    this is a C++ function call being passed to an exception formatting argument,
    removing the parentheses would cause a compilation error.
  severity: high
- rule: Backward compatibility settings for new validation
  source:
    path: .claude/skills/review/SKILL.md
    lines: 189-190
  source_text: "- **Backward compatibility**\n  New versions must be configurable\
    \ to behave like older versions via `compatibility` settings. Ensure `SettingsChangesHistory.cpp`\
    \ is updated when settings change. **New validation / enforcement on existing\
    \ data:** if a PR adds a check that throws at `CREATE TABLE`, query execution,\
    \ or server startup, and that check applies to objects created before the PR,\
    \ it is a backward-incompatibility — the constraint may be violated by legitimate\
    \ existing setups. It should either be gated behind a setting or applied only\
    \ to newly created objects."
  collision_type: rule_conflict
  why_distracting: The PR introduces a new exception check at query execution for
    empty string separators. An agent might mistakenly flag this as a backward-incompatibility
    and demand a compatibility setting to restore the old behavior. However, the old
    behavior for empty strings was fundamentally broken (likely causing infinite loops
    or crashes) and should not be preserved.
  severity: high
- rule: Experimental gate for new features/behaviors
  source:
    path: .claude/skills/review/SKILL.md
    lines: 185-186
  source_text: "- **Experimental gate**\n  New features/behaviors must be gated behind\
    \ an **experimental** setting (e.g. `allow_experimental_simd_acceleration`) until\
    \ proven safe. The gate can later be made ineffective at GA."
  collision_type: scope_ambiguity
  why_distracting: The PR changes behavior by explicitly throwing an exception for
    invalid empty string separators instead of silently accepting them. An agent might
    misinterpret this bug fix as a 'new behavior' and improperly demand it be gated
    behind an experimental setting.
  severity: medium
- rule: Wrap literal names in code blocks
  source:
    path: .claude/CLAUDE.md
    lines: 5-5
  source_text: 'When writing text such as documentation, comments, or commit messages,
    wrap literal names from ClickHouse SQL language, classes and functions, or literal
    excerpts from log messages inside inline code blocks, such as: `MergeTree`.'
  collision_type: scope_ambiguity
  why_distracting: The PR adds an exception message string containing `{}` which formats
    the tokenizer class name. An agent might erroneously apply this text/documentation
    rule to the C++ exception string literal and suggest formatting it with markdown
    backticks (e.g. suggesting `"... '`{}`' ..."`), which is inappropriate for console
    error messages.
  severity: low
hierarchy_analysis: The single AGENTS.md file contains general repository guidelines
  that are mostly irrelevant to this specific C++ code change.
