  - id: standalone_fp_detected
    type: fail_to_pass
    origin: pr_diff
    description: "Standalone 'fp' token recognized as hard-float"

  - id: fp_at_end_detected
    type: fail_to_pass
    origin: pr_diff
    description: "'fp' at end of features string recognized as hard-float"

  - id: fp_middle_of_list
    type: fail_to_pass
    origin: pr_diff
    description: "'fp' in the middle of a feature list recognized as hard-float"

  - id: native_arm32_vfp_detected
    type: pass_to_pass
    origin: pr_diff
    description: "Native ARM32 'vfp' flag still detected as hard-float"

  - id: standalone_vfp_detected
    type: pass_to_pass
    origin: pr_diff
    description: "Standalone 'vfp' token recognized as hard-float"

  - id: fphp_no_false_positive
    type: pass_to_pass
    origin: pr_diff
    description: "'fphp' alone does not match as discrete 'fp' token"

  - id: no_float_features
    type: pass_to_pass
    origin: pr_diff
    description: "Features without float support return soft-float"

  - id: empty_features
    type: pass_to_pass
    origin: pr_diff
    description: "Empty features string returns soft-float"

  - id: not_stub
    type: pass_to_pass
