version: "2.0"

source:
  repo: "huggingface/transformers"
  pr: 44835
  base_commit: "a9532bcf887b364bfedcc33a13be2b1d1acbef85"
  merge_commit: "19bba39fa79e6ad126d2e95c593cb51d71ca7241"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "All four modified files must parse without syntax errors"

  - id: config_return_logprobs
    type: fail_to_pass
    origin: pr_diff
    description: "ContinuousBatchingConfig exposes return_logprobs defaulting to False"

  - id: update_accepts_logprob
    type: fail_to_pass
    origin: pr_diff
    description: "update_and_check_completion accepts (token_id, logprob) two-arg signature"

  - id: logprobs_stored_in_output
    type: fail_to_pass
    origin: pr_diff
    description: "Logprobs flow from update_and_check_completion through to GenerationOutput"

  - id: fork_preserves_logprobs
    type: fail_to_pass
    origin: pr_diff
    description: "fork() copies accumulated logprobs to the new state independently"

  - id: equivalent_initial_request_preserves_logprobs
    type: fail_to_pass
    origin: pr_diff
    description: "create_equivalent_initial_request keeps accumulated logprobs"

  - id: eos_detection_with_logprob
    type: fail_to_pass
    origin: pr_diff
    description: "EOS detection still works when logprob parameter is passed"

  - id: none_logprob_backward_compat
    type: fail_to_pass
    origin: pr_diff
    description: "update_and_check_completion with logprob=None does not break token generation"

  - id: ruff_check
    type: pass_to_pass
    origin: agent_config
    description: "ruff check passes on all changed files"
    source:
      path: "CLAUDE.md"
      lines: "2"
      commit: "a9532bcf887b364bfedcc33a13be2b1d1acbef85"

  - id: test_ruff_format_check
    type: pass_to_pass
    origin: repo_tests
    description: "ruff format --check passes on all changed files"

  - id: test_continuous_batching_modules_import
    type: pass_to_pass
    origin: repo_tests
    description: "All modified continuous batching modules import without errors"

rubric:
  - rule: "Do not edit a `# Copied from` block, as it will be reverted by `make fix-repo`. Ideally you should edit the code it's copying from and propagate the change, but you can break the `# Copied from` link if needed."
    source:
      path: "CLAUDE.md"
      lines: "66"
      commit: "a9532bcf887b364bfedcc33a13be2b1d1acbef85"

  - rule: "When a `modular` file is present, generated files should not be edited, as changes will be overwritten by `make fix-repo`! Instead, edit the `modular` file."
    source:
      path: "CLAUDE.md"
      lines: "67"
      commit: "a9532bcf887b364bfedcc33a13be2b1d1acbef85"

  - rule: "PRs should be as brief as possible. Bugfix PRs in particular can often be only one or two lines long, and do not need large comments, docstrings or new functions in this case. Aim to minimize the size of the diff."
    source:
      path: ".github/copilot-instructions.md"
      lines: "15"
      commit: "a9532bcf887b364bfedcc33a13be2b1d1acbef85"
