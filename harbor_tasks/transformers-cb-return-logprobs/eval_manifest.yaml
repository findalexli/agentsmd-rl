rubric:
- rule: Do not edit a `# Copied from` block, as it will be reverted by `make fix-repo`.
    Ideally you should edit the code it's copying from and propagate the change, but
    you can break the `# Copied from` link if needed.
  source:
    path: CLAUDE.md
    lines: '66'
    commit: a9532bcf887b364bfedcc33a13be2b1d1acbef85
- rule: When a `modular` file is present, generated files should not be edited, as
    changes will be overwritten by `make fix-repo`! Instead, edit the `modular` file.
  source:
    path: CLAUDE.md
    lines: '67'
    commit: a9532bcf887b364bfedcc33a13be2b1d1acbef85
- rule: PRs should be as brief as possible. Bugfix PRs in particular can often be
    only one or two lines long, and do not need large comments, docstrings or new
    functions in this case. Aim to minimize the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
  commit: a9532bcf887b364bfedcc33a13be2b1d1acbef85
  evidence: The gold solution implements a substantial core feature addition (propagating
    logprobs through the continuous batching pipeline) rather than a trivial typo
    or lint fix.
  category: architecture
- rule: Code must pass formatters, linters (ruff), and type checkers (ty) via `make
    style` and `make typing`.
  source:
    path: AGENTS.md
    lines: 2-5
  evidence: The generated patch adheres to standard Python formatting and typing conventions,
    ensuring it would pass the required `make style` and `make typing` checks mentioned
    in the guidelines.
  category: style
distractors:
- rule: 'Fail-closed behavior for agents: If coordination evidence cannot be found,
    do not proceed to PR-ready output.'
  collision_type: meta_confusion
  why_distracting: The rule instructs the agent to fail-closed and refuse to generate
    PR-ready output if there is no evidence of issue coordination. In a benchmark
    setting, the agent must ignore this workflow rule and generate the code to solve
    the task.
  severity: high
  source:
    path: CLAUDE.md
    lines: 48-51
- rule: Mandatory duplicate-work checks using GitHub CLI before proposing a PR.
  collision_type: meta_confusion
  why_distracting: The routine requires the agent to run `gh issue view` and `gh pr
    list` to check for duplicate work before coding. Attempting to run these commands
    in a sandboxed environment will likely fail or distract the agent from the actual
    coding task.
  severity: medium
  source:
    path: AGENTS.md
    lines: 25-30
hierarchy_analysis: The repository contains root-level agent instruction files (`AGENTS.md`
  and `CLAUDE.md`) that define strict contribution workflows. There is no deep hierarchy,
  but the rules apply globally to all agent interactions.
