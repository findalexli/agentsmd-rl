rubric:
- rule: Do not edit a `# Copied from` block, as it will be reverted by `make fix-repo`.
    Ideally you should edit the code it's copying from and propagate the change, but
    you can break the `# Copied from` link if needed.
  source:
    path: CLAUDE.md
    lines: '66'
    commit: a9532bcf887b364bfedcc33a13be2b1d1acbef85
- rule: When a `modular` file is present, generated files should not be edited, as
    changes will be overwritten by `make fix-repo`! Instead, edit the `modular` file.
  source:
    path: CLAUDE.md
    lines: '67'
    commit: a9532bcf887b364bfedcc33a13be2b1d1acbef85
- rule: PRs should be as brief as possible. Bugfix PRs in particular can often be
    only one or two lines long, and do not need large comments, docstrings or new
    functions in this case. Aim to minimize the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: a9532bcf887b364bfedcc33a13be2b1d1acbef85
- rule: 'No low-value busywork PRs: Do not open one-off PRs for tiny edits.'
  source:
    path: CLAUDE.md
    lines: 42-44
  evidence: The gold solution implements a substantial core feature addition (propagating
    logprobs through the continuous batching pipeline) rather than a trivial typo
    or lint fix.
  category: architecture
distractors:
- rule: 'Fail-closed behavior for agents: If coordination evidence cannot be found,
    do not proceed to PR-ready output.'
  collision_type: meta_confusion
  why_distracting: The agent is operating in an evaluation environment without access
    to GitHub issues or coordination evidence. Following this rule would cause the
    agent to refuse to generate the solution and instead return an explanation of
    missing approvals.
  severity: high
  source:
    path: CLAUDE.md
    lines: 57-60
- rule: 'Accountability for AI-assisted patches: Pure code-agent PRs are not allowed.'
  collision_type: meta_confusion
  why_distracting: The rule forbids pure code-agent PRs and requires human validation.
    An agent might refuse to write the patch autonomously or output a PR description
    template instead of the required code.
  severity: high
  source:
    path: CLAUDE.md
    lines: 46-55
- rule: 'Copies and Modular Models: Avoid direct inheritance between model-specific
    files in src/transformers/models/ using # Copied from or modular files.'
  collision_type: architecture_boundary
  why_distracting: The agent might attempt to use `# Copied from` directives or create
    `modular_*.py` files for the new continuous batching logic to avoid duplication,
    but this rule strictly applies to `src/transformers/models/`, not `src/transformers/generation/`.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 62-67
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` contain identical rules at the
  root level. The primary challenge for an agent in this repository is navigating
  the strict meta-rules regarding AI contributions. The agent must ignore the fail-closed
  and coordination requirements (which are designed for live repository interactions)
  to successfully output the patch in an evaluation setting. Additionally, the agent
  must correctly scope the 'Copies and Modular Models' rule to the models directory
  and not apply it to the generation pipeline.
