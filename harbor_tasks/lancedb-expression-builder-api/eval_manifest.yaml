rubric:
- id: rust_api_uses_into_or_asref
  source:
    lines: 86-92
    commit: d5948576b92744c39302f6e9130da0456792fe56
    path: AGENTS.md
  weight: 1.0
  rule: 'Per repo AGENTS.md: public APIs that take strings or path-like inputs

    should use `Into<T>` or `AsRef<T>` traits to allow more flexible

    callers (e.g. `name: impl Into<String>` rather than `name: String`).

    The new `func(name, args)` API in `rust/lancedb/src/expr.rs` should

    accept `impl AsRef<str>` (or `Into<String>`) for the function name

    so callers don''t have to allocate a `String` for a `&str` literal.

    '
- id: new_public_api_has_documentation
  source:
    lines: 94-101
    commit: d5948576b92744c39302f6e9130da0456792fe56
    path: AGENTS.md
  weight: 1.0
  rule: 'Per repo AGENTS.md "Documentation" and "Testing" sections: new public

    APIs must include rustdoc comments and at least one example, and

    should link to relevant structs/methods. The new `expr` module,

    `expr_to_sql_string`, the `lower`/`upper`/`contains`/`expr_cast`/

    `func` helpers, and the `only_if_expr` trait method all need rustdoc

    comments with a usable example.

    '
- id: doctests_use_function_pattern_for_table_examples
  source:
    lines: 26-43
    commit: d5948576b92744c39302f6e9130da0456792fe56
    path: AGENTS.md
  weight: 1.0
  rule: 'Per repo AGENTS.md "Coding tips": rustdoc examples that need a

    `Table` reference must be written as a function (e.g.

    `# async fn query(table: &Table) -> Result<...>`) so type-checking

    runs without requiring a real test environment. The doctest on

    `only_if_expr` in `rust/lancedb/src/query.rs` should follow that

    pattern rather than constructing a Table inline.

    '
- id: code_formatted_with_cargo_fmt
  source:
    lines: 20-22
    commit: d5948576b92744c39302f6e9130da0456792fe56
    path: AGENTS.md
  weight: 1.0
  rule: 'Per repo AGENTS.md: `cargo fmt --all` is the project''s required

    formatter. New code added in `rust/lancedb/src/expr.rs`,

    `rust/lancedb/src/expr/sql.rs`, the `query.rs` trait additions, and

    the `remote/table.rs` and `table/query.rs` filter changes must be

    formatted consistently with the existing crate style.

    '
