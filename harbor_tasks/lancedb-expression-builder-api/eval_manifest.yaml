task:
  name: lancedb-expression-builder-api
  title: Add expression-builder API for type-safe query filters
checks:
- id: test_expr_builder_api
  type: fail_to_pass
  origin: pr_diff
  description: 'The new `lancedb::expr` module exposes `col`, `lit`, `lower`,

    `upper`, `contains`, `func`, and `expr_to_sql_string` as public

    items; the builder composes correctly via `gt`/`eq`/`and`/`or`;

    the `func` registry resolves known string functions and rejects

    unknown names; round-tripping through `expr_to_sql_string` produces

    a SQL string that contains the column names, literals, operators,

    and keywords (`AND`, `OR`, `LOWER`, `UPPER`, `CONTAINS`).

    '
- id: test_only_if_expr_trait_method_exists
  type: fail_to_pass
  origin: pr_diff
  description: '`lancedb::query::QueryBase::only_if_expr(self, datafusion_expr::Expr)

    -> Self` is added as a trait method. A generic helper that calls

    `only_if_expr` on any `Q: QueryBase` must compile against the

    crate; if the method is missing the test binary fails to link and

    `cargo test` exits non-zero.

    '
- id: test_lancedb_compiles
  type: pass_to_pass
  origin: repo_tests
  description: '`cargo check -p lancedb` continues to succeed against the lancedb

    crate after the change is applied — no regression in library

    compilation.

    '
- id: test_existing_only_if_unit_test_still_passes
  type: pass_to_pass
  origin: repo_tests
  description: 'Pre-existing `query::tests::test_execute_no_vector` (which exercises

    `only_if(<sql>)` on the local NativeTable) still passes — confirms

    no regression in the SQL-string filter path.

    '
