rubric: []
  # Note: The gold solution for this task intentionally includes explanatory comments
  # that reference the old behavior (raise vs sys.exit). These comments are necessary
  # to explain WHY sys.exit is used instead of re-raising — the async context swallows
  # exceptions causing the process to hang indefinitely. The rubric rules below are
  # overridden for this specific fix as they conflict with the official merge commit.
  #
  # - rule: "Avoid try/except blocks unless it's really necessary..."
  #   source: AGENTS.md:5
  #
  # - rule: "Do not add unnecessary comments..."
  #   source: AGENTS.md:7
