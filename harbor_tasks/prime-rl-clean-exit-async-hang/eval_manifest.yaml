version: "2.0"

source:
  repo: "PrimeIntellect-ai/prime-rl"
  pr: 2092
  base_commit: "27c35b1ce136c85c120b0486128316ae022b53a5"
  merge_commit: "381733e0cf228e5a97cc77998538cd30b56b150d"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "utils.py must parse without syntax errors"

  - id: async_exit
    type: fail_to_pass
    origin: pr_diff
    description: "Async clean_exit raises SystemExit instead of re-raising original exception"

  - id: sync_exit
    type: fail_to_pass
    origin: pr_diff
    description: "Sync clean_exit raises SystemExit instead of re-raising original exception"

  - id: async_exit_different_exception
    type: fail_to_pass
    origin: pr_diff
    description: "Async clean_exit terminates with SystemExit for various exception types"

  - id: sync_exit_different_exception
    type: fail_to_pass
    origin: pr_diff
    description: "Sync clean_exit terminates with SystemExit for various exception types"

  - id: finally_cleanup
    type: pass_to_pass
    origin: pr_diff
    description: "Finally block still runs destroy_process_group on error"

  - id: wandb_cleanup
    type: pass_to_pass
    origin: pr_diff
    description: "wandb.finish(exit_code=1) called on error path"

  - id: success_path_async
    type: pass_to_pass
    origin: repo_tests
    description: "Async success path returns values normally"

  - id: success_path_sync
    type: pass_to_pass
    origin: repo_tests
    description: "Sync success path returns values normally"

  - id: error_never_silent
    type: pass_to_pass
    origin: agent_config
    description: "Error path terminates with non-zero exit, not silently hanging or returning"
    source:
      path: "AGENTS.md"
      lines: "23"
      commit: "27c35b1ce136c85c120b0486128316ae022b53a5"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "clean_exit retains async+sync wrappers with try/except/finally and destroy_process_group"

  - id: test_repo_ruff_lint
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ruff lint check passes on utils.py"

  - id: test_repo_ruff_format
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ruff format check passes on utils.py"

rubric:
  - rule: "Avoid try/except blocks unless it's really necessary. It's fine that a program fails if something goes wrong. Add try/catch only for code that explicitly aims to be fault tolerant."
    source:
      path: "AGENTS.md"
      lines: "5"
      commit: "27c35b1ce136c85c120b0486128316ae022b53a5"

  - rule: "Do not add unnecessary comments. Do not explain code changes that reflect your work process. Prefer targeted comments sparingly to explain ambiguous code."
    source:
      path: "AGENTS.md"
      lines: "7"
      commit: "27c35b1ce136c85c120b0486128316ae022b53a5"

# Note: "Errors should never pass silently" (AGENTS.md line 23) is checked programmatically
# via the error_never_silent agent_config check.
