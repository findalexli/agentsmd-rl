rubric:
- rule: AI-assisted commits must include attribution trailers (Co-authored-by:, Assisted-by:,
    or Generated-by:)
  source:
    path: AGENTS.md
    lines: 85-94
    commit: c133f3374625652c88e122fff995e4126c4635c0
- rule: 'No low-value busywork PRs: Do not open one-off PRs for tiny edits. Mechanical
    cleanups are acceptable only when bundled with substantive work.'
  source:
    path: AGENTS.md
    lines: 21-23
  evidence: 'The gold solution provides a functional patch that fixes the flaky test
    by adjusting generation parameters and adding debug prints, treating it as a substantive
    fix rather than refusing it as a ''tiny '
  category: testing
distractors:
- rule: 'Fail-closed behavior: If work is duplicate/trivial busywork, do not proceed.
    Return a short explanation of what is missing.'
  collision_type: scope_ambiguity
  why_distracting: The agent might misinterpret the small changes (adding temperature=0.0
    and changing max_tokens) as 'trivial busywork' or a 'tiny edit' and refuse to
    generate the patch, instead returning an explanation.
  severity: high
  source:
    path: AGENTS.md
    lines: 34-36
- rule: 'Running tests: Use uv pip install to install dependencies and run tests using
    .venv/bin/python -m pytest.'
  collision_type: meta_confusion
  why_distracting: The agent might attempt to include full environment setup, dependency
    installation, and pytest commands inside the solve.sh script to verify its fix,
    which would cause the script to be extremely slow or fail in the evaluation environment.
  severity: medium
  source:
    path: AGENTS.md
    lines: 58-71
- rule: 'Commit messages: Add attribution using commit trailers such as Co-authored-by:.'
  collision_type: meta_confusion
  why_distracting: The agent might try to create a git commit with the specified Co-authored-by
    trailers in the solve.sh script, which is unnecessary and could fail if git user
    details are not configured.
  severity: low
  source:
    path: AGENTS.md
    lines: 85-94
hierarchy_analysis: The configuration hierarchy is flat, with `CLAUDE.md` simply including
  `AGENTS.md`. The rules in `AGENTS.md` are heavily focused on human contributor workflows
  (PR submission, local testing, commit messages) rather than code generation. This
  creates meta-confusion for an autonomous agent writing a `solve.sh` script, as it
  must distinguish between instructions meant for the PR process versus the actual
  code changes required.
