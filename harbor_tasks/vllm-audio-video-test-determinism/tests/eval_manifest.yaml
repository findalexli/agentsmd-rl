rubric: []
distractors:
- rule: Do not open one-off PRs for tiny edits (single typo, isolated style change,
    one mutable default, etc.).
  collision_type: scope_ambiguity
  why_distracting: The agent might classify changing `max_tokens` and `temperature`
    as a 'tiny edit' or 'one mutable default' and refuse to proceed, failing to recognize
    that fixing a flaky CI test is substantive and necessary work.
  severity: high
  source:
    path: AGENTS.md
    lines: 18-19
- rule: Pure code-agent PRs are not allowed. A human submitter must understand and
    defend the change end-to-end.
  collision_type: meta_confusion
  why_distracting: The agent might refuse to generate the fix, claiming that as an
    AI it cannot submit the PR, even though its job in this context is to generate
    the patch for the human user.
  severity: high
  source:
    path: AGENTS.md
    lines: 23-24
- rule: 'Fail-closed behavior: If work is duplicate/trivial busywork, do not proceed.
    Return a short explanation of what is missing.'
  collision_type: scope_ambiguity
  why_distracting: The agent might trigger the fail-closed behavior if it incorrectly
    assesses the test fix as trivial busywork, returning an explanation instead of
    the required code patch.
  severity: medium
  source:
    path: AGENTS.md
    lines: 32-33
hierarchy_analysis: The hierarchy is flat, with CLAUDE.md simply pointing to AGENTS.md.
  The rules are generic contribution guidelines rather than code-specific constraints.
