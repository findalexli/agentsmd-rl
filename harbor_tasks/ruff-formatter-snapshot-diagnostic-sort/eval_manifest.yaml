distractors:
- rule: Try hard to avoid patterns that require panic!, unreachable!, or .unwrap().
    Instead, try to encode those constraints in the type system. Don't be afraid to
    write code that's more verbose or requires largeish refactors if it enables you
    to avoid these unsafe calls.
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to change the type of `formatted_unsupported_syntax_errors`
    from `HashMap` to `BTreeMap` or `IndexMap` across the codebase to 'encode those
    constraints in the type system', leading to a massive and unnecessary refactor
    instead of simply sorting the values locally in the test fixture.
  severity: medium
  source:
    path: AGENTS.md
    lines: 58-59
