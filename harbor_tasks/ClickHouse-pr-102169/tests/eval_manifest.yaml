rubric:
- rule: Ensure session renewal happens inside the retry loop by checking
    retries_ctl.isRetry() before obtaining a fresh session
- rule: Perform all ZooKeeper operations (getObjectNamesAndSetWatch, tryLoadObject)
    with the same session variable
- rule: When mentioning logical errors in comments, say 'exception' instead of 'crash'
- rule: When writing text such as documentation, comments, or commit messages, write
    names of functions and methods as `f` instead of `f()`
  source:
    path: AGENTS.md
    lines: 10-10
  evidence: The updated C++ comments refer to functions like `tryLoadObject` and `setAllObjects`
    without trailing parentheses, adhering to the mathematical purity style rule.
  category: style
version: '2.0'
source:
  repo: ClickHouse/ClickHouse
  pr: 102169
  base_commit: 6d03f28ada8b3c521b504f43e04d05c915be3d75
  merge_commit: bcbca752faf0e9774a6b2f40fa558e363d786016
distractors:
- rule: When writing text such as documentation, comments, or commit messages, wrap
    literal names from ClickHouse SQL language, classes and functions... inside inline
    code blocks
  collision_type: scope_ambiguity
  why_distracting: The rule instructs wrapping class and function names in markdown
    backticks for 'comments'. An agent might misinterpret this as applying to C++
    source code comments, which would lead to inserting markdown backticks (e.g.,
    `` `tryLoadObject` ``) into C++ files, violating the existing plain-text comment
    style.
  severity: medium
  source:
    path: AGENTS.md
    lines: 6-6
hierarchy_analysis: The configuration is a flat, single-file structure (`AGENTS.md`).
  The primary challenge is interpreting the scope of the word 'comments' in the style
  rules—distinguishing between GitHub PR comments (where markdown applies) and C++
  source comments (where plain text is expected).
