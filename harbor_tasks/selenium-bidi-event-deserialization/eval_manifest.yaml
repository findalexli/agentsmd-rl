version: 1.0
task_name: selenium-bidi-event-deserialization
source_pr:
  repository: SeleniumHQ/selenium
  pr_number: 17212
  merge_commit: 51be94c0efaa27a235e472072803c9872a3c4979
  base_commit: 1dc4a61843346508c0464bab596b867e7e389966

target_files:
  - path: dotnet/src/webdriver/BiDi/Broker.cs
    description: Main BiDi message processing class
  - path: dotnet/src/webdriver/BiDi/EventDispatcher.cs
    description: Event dispatching and handler management

checks:
  # Fail-to-pass tests for Broker.cs
  - id: test_broker_no_byte_indices
    type: fail_to_pass
    origin: behavioral
    description: Broker.cs should NOT use paramsStartIndex/paramsEndIndex byte slicing

  - id: test_broker_uses_params_reader
    type: fail_to_pass
    origin: behavioral
    description: Broker.cs should use paramsReader (Utf8JsonReader snapshot)

  - id: test_broker_deserializes_in_broker
    type: fail_to_pass
    origin: behavioral
    description: Broker.cs should deserialize event args before calling EnqueueEvent

  - id: test_broker_passes_event_args_to_dispatcher
    type: fail_to_pass
    origin: behavioral
    description: Broker.cs should pass deserialized EventArgs to EnqueueEvent

  - id: test_broker_has_warning_log_for_unknown_events
    type: fail_to_pass
    origin: behavioral
    description: Broker should log warning for unknown event types (moved from EventDispatcher)

  - id: test_broker_no_isParams_flag
    type: fail_to_pass
    origin: behavioral
    description: Broker should not use isParams boolean flag

  # Fail-to-pass tests for EventDispatcher.cs
  - id: test_event_dispatcher_new_method_signature
    type: fail_to_pass
    origin: behavioral
    description: EventDispatcher.EnqueueEvent should accept EventArgs, not bytes

  - id: test_event_dispatcher_renamed_field
    type: fail_to_pass
    origin: behavioral
    description: EventDispatcher should rename _events to _eventRegistrations

  - id: test_event_dispatcher_try_get_json_type_info
    type: fail_to_pass
    origin: behavioral
    description: EventDispatcher should have TryGetJsonTypeInfo method

  - id: test_event_dispatcher_pending_event_struct
    type: fail_to_pass
    origin: behavioral
    description: PendingEvent record struct should only contain Method and EventArgs

  - id: test_event_dispatcher_no_deserialize_in_process
    type: fail_to_pass
    origin: behavioral
    description: ProcessEventsAwaiterAsync should NOT call JsonSerializer.Deserialize

  - id: test_event_dispatcher_uses_event_registrations
    type: fail_to_pass
    origin: behavioral
    description: EventDispatcher should use _eventRegistrations consistently

  # Pass-to-pass tests
  - id: test_code_syntax_valid
    type: pass_to_pass
    origin: repo_tests
    description: The BiDi C# files should have valid syntax

