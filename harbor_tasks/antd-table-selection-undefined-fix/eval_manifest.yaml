rubric:
- rule: 合理使用 React.memo、useMemo 和 useCallback 优化性能
  source:
    path: AGENTS.md
    lines: 37-38
  evidence: The gold solution correctly updates the dependency arrays of `useEffect`
    and `useMemo` to include the newly created `mergedSelectedKeyList` variable, ensuring
    the hooks re-run appropriately without causing stale closures.
  category: architecture
  verification: llm_judge
distractors:
- rule: 测试覆盖率要求 100% (Test coverage requirement 100%)
  collision_type: rule_conflict
  why_distracting: The config mandates 100% test coverage and writing tests, but the
    prompt explicitly states 'Don't modify the test file (tests are already provided)'.
    An agent might waste time trying to write new tests to satisfy the config.
  severity: high
  source:
    path: AGENTS.md
    lines: 165-165
- rule: 避免使用 `any` 类型，尽可能精确地定义类型 (Avoid using `any` type, define types as accurately
    as possible)
  collision_type: scope_ambiguity
  why_distracting: The existing code in `useSelection.tsx` contains `keyEntities as
    any` and `isCheckboxDisabled as any`. An agent strictly following the 'avoid any'
    rule might attempt to refactor these types, expanding the scope unnecessarily
    and risking compilation errors.
  severity: medium
  source:
    path: AGENTS.md
    lines: 131-131
- rule: 使用提前返回（early returns）提高代码可读性 (Use early returns to improve code readability)
  collision_type: would_cause_bug
  why_distracting: An agent might try to apply 'early returns' by adding `if (!mergedSelectedKeys)
    return;` inside the `useEffect` or `useMemo`. This would cause a bug because `undefined`
    needs to be processed as an empty array to clear the selection, rather than being
    skipped.
  severity: high
  source:
    path: AGENTS.md
    lines: 24-24
hierarchy_analysis: The configuration is provided in a single root-level `AGENTS.md`
  file. The primary challenge is resolving conflicts between the general repository
  guidelines in the config (e.g., writing tests, avoiding `any`) and the specific,
  restrictive instructions for this PR (e.g., do not modify tests, do not change public
  API).
