distractors:
- rule: 避免使用 `any` 类型，尽可能精确地定义类型 (Avoid using `any` type, define types as precisely
    as possible)
  collision_type: scope_ambiguity
  why_distracting: The modified `useMemo` block contains existing `as any` assertions
    (`keyEntities as any`, `isCheckboxDisabled as any`). An agent following this rule
    might attempt to remove these assertions and provide precise types, which is out
    of scope for this specific bug fix and could lead to complex type errors.
  severity: medium
  source:
    path: AGENTS.md
    lines: 89-89
- rule: 测试覆盖率要求 100% (Test coverage requires 100%)
  collision_type: rule_conflict
  why_distracting: The instructions explicitly state 'Don't modify the test file (tests
    are already provided)'. An agent might try to write new tests to satisfy the 100%
    coverage rule, violating the negative constraint.
  severity: high
  source:
    path: AGENTS.md
    lines: 171-171
- rule: 使用提前返回（early returns）提高代码可读性 (Use early returns to improve code readability)
  collision_type: would_cause_bug
  why_distracting: An agent might try to add an early return like `if (!mergedSelectedKeys)
    return;` inside the hook or the `useMemo`/`useEffect`. Doing so at the hook level
    violates React rules, and doing so inside the memo/effect might skip necessary
    state updates or return incorrect default values instead of properly coalescing
    to `EMPTY_LIST`.
  severity: high
  source:
    path: AGENTS.md
    lines: 43-43
