rubric:
- rule: 合理使用 React.memo、useMemo 和 useCallback 优化性能
  source:
    path: AGENTS.md
    lines: 37-38
  evidence: The gold solution correctly updates the dependency arrays of `useEffect`
    and `useMemo` to include the newly created `mergedSelectedKeyList` variable, ensuring
    the hooks re-run appropriately without causing stale closures.
  category: architecture
  verification: llm_judge
- rule: Avoid unnecessary re-renders
  source:
    path: /workspace/repo/AGENTS.md
    lines: '420'
  source_text: '- 避免不必要的重新渲染'
  evidence: The diff prevents creating a new array `[]` on every render by using `mergedSelectedKeys
    ?? EMPTY_LIST`. This keeps the array reference stable, preventing unnecessary
    downstream re-renders or re-evaluations in `useMemo` hooks.
  category: performance
  verification: llm_judge
- rule: Pass all ESLint and TypeScript checks
  source:
    path: /workspace/repo/AGENTS.md
    lines: '416'
  source_text: '- 通过所有 ESLint 和 TypeScript 检查'
  evidence: The diff fixes a likely `react-hooks/exhaustive-deps` ESLint warning by
    appropriately adding `updatePreserveRecordsCache` to the `useEffect` dependency
    array.
  category: linting
  verification: llm_judge
- rule: Optimize for minimal re-renders
  source:
    path: /workspace/repo/.github/copilot-instructions.md
