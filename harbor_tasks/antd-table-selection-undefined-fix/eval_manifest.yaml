distractors:
- rule: 测试覆盖率要求 100% (Test coverage requirement 100%)
  collision_type: rule_conflict
  why_distracting: The config mandates 100% test coverage and writing tests, but the
    prompt explicitly states 'Don't modify the test file (tests are already provided)'.
    An agent might waste time trying to write new tests to satisfy the config.
  severity: high
  source:
    path: AGENTS.md
    lines: 165-165
- rule: 避免使用 `any` 类型，尽可能精确地定义类型 (Avoid using `any` type, define types as accurately
    as possible)
  collision_type: scope_ambiguity
  why_distracting: The existing code in `useSelection.tsx` contains `keyEntities as
    any` and `isCheckboxDisabled as any`. An agent strictly following the 'avoid any'
    rule might attempt to refactor these types, expanding the scope unnecessarily
    and risking compilation errors.
  severity: medium
  source:
    path: AGENTS.md
    lines: 131-131
- rule: 使用提前返回（early returns）提高代码可读性 (Use early returns to improve code readability)
  collision_type: would_cause_bug
  why_distracting: An agent might try to apply 'early returns' by adding `if (!mergedSelectedKeys)
    return;` inside the `useEffect` or `useMemo`. This would cause a bug because `undefined`
    needs to be processed as an empty array to clear the selection, rather than being
    skipped.
  severity: high
  source:
    path: AGENTS.md
    lines: 24-24
- rule: Avoid using any type
  source:
    path: /workspace/repo/AGENTS.md
    lines: '122'
  source_text: '- 避免使用 `any` 类型，尽可能精确地定义类型'
  collision_type: scope_ambiguity
  why_distracting: The code modified in the diff includes arguments `keyEntities as
    any` and `isCheckboxDisabled as any` that are left untouched. An agent attempting
    to enforce this rule would expand the scope of the PR to fix legacy type assertions,
    potentially introducing type errors or wasting effort on unrelated refactoring.
  severity: medium
- rule: Never use any type
  source:
    path: /workspace/repo/.github/copilot-instructions.md
    lines: '17'
  source_text: '- Never use `any` type - define precise types instead'
  collision_type: scope_ambiguity
  why_distracting: The diff passes `keyEntities as any` and `isCheckboxDisabled as
    any` without modifying them. A strict adherence to this rule might lead an agent
    to unnecessarily refactor these legacy types, leading to a rabbit hole outside
    the core scope of the fix.
  severity: medium
- rule: Target 100% test coverage
  source:
    path: /workspace/repo/.github/copilot-instructions.md
    lines: '76'
  source_text: '- Target 100% test coverage'
  collision_type: scope_ambiguity
  why_distracting: The PR consists of an internal optimization and ESLint warning
    fix that doesn't change the public API behavior. An agent following this rule
    might incorrectly assume it needs to create new test files or aggressively update
    test coverage for this specific internal hook optimization, wasting effort and
    expanding the scope unnecessarily.
  severity: medium
- rule: Test coverage 100%
  source:
    path: /workspace/repo/AGENTS.md
    lines: '197'
  source_text: '- 测试覆盖率要求 100%'
  collision_type: scope_ambiguity
  why_distracting: Similar to the English rule, an agent might be distracted into
    writing tests for a purely internal memoization optimization, which is typically
    covered implicitly by existing behavioral tests.
  severity: medium
hierarchy_analysis: The configuration is provided in a single root-level `AGENTS.md`
