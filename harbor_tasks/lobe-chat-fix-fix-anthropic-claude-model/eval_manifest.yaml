distractors:
- rule: 'i18n Keys: Add to src/locales/default/namespace.ts'
  collision_type: architecture_boundary
  why_distracting: The agent is modifying `packages/agent-tracing/src/viewer/index.ts`
    to show tool errors by default. It might try to add i18n keys for these error
    messages to `src/locales/default/namespace.ts`, but `agent-tracing` is an internal
    package/CLI tool, not part of the main user-facing Next.js app that uses the global
    i18n system.
  severity: high
  source:
    path: AGENTS.md
    lines: 52-54
- rule: 'When adding or changing SPA routes: Implement layout and page content under
    src/features/<Domain>/ and export from there.'
  collision_type: scope_ambiguity
  why_distracting: The agent might interpret the modifications to the `agent-tracing`
    viewer UI as a frontend change and attempt to move its layout or components into
    `src/features/` or `src/routes/`. However, the tracing viewer is a standalone
    tool within `packages/` and does not follow the main app's SPA routing conventions.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 47-52
hierarchy_analysis: The project has root-level `CLAUDE.md` and `AGENTS.md` files that
  define global conventions, heavily focused on the Next.js frontend (SPA vs features,
  i18n, Zustand). However, the modifications in this PR span across standalone packages
  (`packages/model-runtime`, `packages/agent-tracing`) and backend server modules
  (`src/server/modules/`). The global frontend rules do not apply to these backend
  packages or internal CLI tools. The agent must recognize the architectural boundaries
  between the Next.js app and the workspace packages, relying on package-specific
  instructions (like `packages/model-runtime/CLAUDE.md`) where applicable.
