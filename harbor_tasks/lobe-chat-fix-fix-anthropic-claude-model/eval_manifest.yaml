distractors:
- rule: Never run `bun run test` - this runs all tests and takes ~10 minutes
  collision_type: scope_ambiguity
  why_distracting: The rule explicitly states 'Never run `bun run test`'. An agent
    might strictly follow this and refuse to document `bun run test` in the CLI skill,
    or replace it with `bunx vitest run`. However, the gold solution documents `cd
    apps/cli && bun run test` because the restriction is intended for the monorepo
    root, not individual apps.
  severity: high
  source:
    path: AGENTS.md
    lines: 66-67
- rule: 'SPA Routes and Features: route trees only hold page segments; business logic
    and UI live in features.'
  collision_type: architecture_boundary
  why_distracting: The agent might attempt to apply the SPA routes/features separation
    rules to the server modules being edited (`src/server/modules/Mecha/AgentToolsEngine/index.ts`),
    potentially trying to move logic into a `features/` directory. This rule only
    applies to the frontend SPA architecture.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 42-52
hierarchy_analysis: The config hierarchy is moderate, with root-level `AGENTS.md`
  and `CLAUDE.md` providing global guidelines, and a package-specific `packages/model-runtime/CLAUDE.md`
  emphasizing testing. The agent must understand that root-level restrictions (like
  avoiding `bun run test`) may not apply when documenting app-specific workflows.
