distractors:
- rule: 'Backend: Located in the `openhands` directory'
  collision_type: architecture_boundary
  why_distracting: The rule states the backend is located in the `openhands` directory,
    but the target file `service.py` is in the `enterprise/server/routes/` directory.
    This could lead the agent to search in the wrong directory or refuse to edit the
    file thinking it's outside the backend scope.
  severity: high
  source:
    path: AGENTS.md
    lines: 58-59
- rule: 'To run the full application to debug issues: export INSTALL_DOCKER=0 ...
    make build && make run'
  collision_type: scope_ambiguity
  why_distracting: The rule provides instructions to run the full application using
    `make build && make run ...` to debug issues. The agent might attempt to start
    the full application to verify the rename, which is unnecessary and resource-intensive
    for a simple refactor.
  severity: medium
  source:
    path: AGENTS.md
    lines: 8-11
- rule: When working on a PR that requires design documents... store them in a `.pr/`
    directory
  collision_type: scope_ambiguity
  why_distracting: The rule suggests creating a `.pr/` directory for PR-specific artifacts
    like analysis or notes. Since this is a trivial environment variable rename, creating
    such artifacts would be a waste of time and overcomplicate the task.
  severity: low
  source:
    path: AGENTS.md
    lines: 33-35
hierarchy_analysis: The AGENTS.md file provides general repository guidelines, but
  its architectural descriptions (e.g., backend located in `openhands/`) conflict
  with the enterprise-specific paths required for this task.
