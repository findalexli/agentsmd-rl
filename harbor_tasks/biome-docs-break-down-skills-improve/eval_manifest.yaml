distractors:
- rule: Create a changeset for user-facing changes, assume YES if unsure.
  collision_type: meta_confusion
  why_distracting: The rule states 'If UNSURE -> Assume YES and create changeset'.
    An agent might blindly create a `.changeset/*.md` file for this PR. However, this
    PR only updates agent skills and internal documentation, which is explicitly 'NOT
    User-Facing' (lines 85-89) and does not require a changeset.
  severity: high
  source:
    path: AGENTS.md
    lines: 68-75
- rule: Always follow the structure in .github/PULL_REQUEST_TEMPLATE.md.
  collision_type: meta_confusion
  why_distracting: The rule emphasizes following the structure in `.github/PULL_REQUEST_TEMPLATE.md`.
    An agent might mistakenly try to modify the actual PR template file or create
    a dummy PR description file, rather than creating the requested `.claude/skills/pull-request/SKILL.md`
    documentation.
  severity: medium
  source:
    path: AGENTS.md
    lines: 18-20
hierarchy_analysis: The agent must read Level 0 guidelines (AGENTS.md, CLAUDE.md)
  and synthesize them into Level 1/2 skill files (.claude/skills/*). It must understand
  that it is writing instructions for future agents, not executing the instructions
  for the current PR.
