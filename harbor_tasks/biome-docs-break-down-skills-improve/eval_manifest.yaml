  gold_added: |
    ---
    name: pull-request
    description: Guide for creating proper pull requests for the Biome project.
    compatibility: Designed for coding agents working on the Biome codebase.
    ---

    ## Purpose

    Use this skill when creating a pull request for the Biome repository.

    ## AI Assistance Disclosure

    If AI was used in any capacity to produce the PR, **you must disclose it** in
    the PR description.

    ## Choose the Target Branch

    | Change type | Target branch |
    | --- | --- |
    | Bug fix (code or docs) | `main` |
    | New **nursery** rule | `main` |

    ## PR Title

    Use **conventional commit format**. The title becomes the squash-merge commit
    message.
  gold_removed: ''
