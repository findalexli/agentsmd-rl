name = "continue-intellij-readrange-crash"
title = "Fix StringIndexOutOfBoundsException in readRangeInFile"
description = "The IntelliJ extension crashes with StringIndexOutOfBoundsException when reading ranges from files that are smaller than the requested range. The fix clamps indices using coerceIn() to prevent out-of-bounds access."
difficulty = "medium"
tags = ["kotlin", "intellij", "crash-fix", "bounds-checking"]

[timeouts]
build = 300
test = 300

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
