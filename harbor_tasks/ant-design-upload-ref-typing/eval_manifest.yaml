task:
  kind: code_fix
  name: ant-design-upload-ref-typing
  title: Replace `any` with `UploadRef` in Upload's compound component type
  difficulty: medium
checks:
- id: test_uploadref_exported_from_index
  type: fail_to_pass
  origin: pr_diff
  description: Fixture `_uploadref_export_check.tsx` imports `UploadRef` from `./components/upload`. Before the fix, tsc reports TS2614 because the index does not re-export `UploadRef`; after the fix, the fixture compiles cleanly.
- id: test_compound_ref_narrowed_to_uploadref
  type: fail_to_pass
  origin: pr_diff
  description: Fixture `_ref_narrow_check.tsx` passes a `RefObject<string | null>` to `<Upload<File> ref={...} />`. Before the fix the compound type uses `RefAttributes<any>` so the wrong ref is silently accepted; after the fix tsc must report TS2322 on the ref assignment.
- id: test_no_new_tsc_errors_outside_known_baseline
  type: pass_to_pass
  origin: repo_tests
  description: 'Project-wide `tsc --noEmit` must not regress: only the pre-existing unrelated error in `components/watermark/useWatermark.ts` is allowed. The agent''''s edits must not introduce any new tsc errors elsewhere.'
- id: test_ci_lint_eslint_changed_files
  type: pass_to_pass
  origin: repo_tests
  description: 'CI: lint / eslint on components/upload/index.tsx and tests/utils.tsx — the two files touched by the fix. Must pass cleanly on both base and after the fix.'
- id: test_ci_lint_biome_changed_files
  type: pass_to_pass
  origin: repo_tests
  description: 'CI: lint / biome lint on components/upload/index.tsx and tests/utils.tsx — the two files touched by the fix. Must pass cleanly on both base and after the fix.'
