distractors:
- rule: 'Messaging channels: always consider all built-in + extension channels when
    refactoring shared logic.'
  collision_type: scope_ambiguity
  why_distracting: The rule instructs to consider all built-in and extension channels
    when refactoring shared logic. An agent might mistakenly interpret the gateway
    lifecycle fix as shared logic and attempt to apply similar `reconnect-exhausted`
    handling to other channels (Telegram, Slack, etc.), which would be out of scope
    and potentially introduce bugs since this is a Discord-specific gateway event.
  severity: medium
  source:
    path: AGENTS.md
    lines: 20-24
