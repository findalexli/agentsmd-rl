distractors:
- rule: 'Messaging channels: always consider all built-in + extension channels when
    refactoring shared logic.'
  collision_type: scope_ambiguity
  why_distracting: The rule asks to consider all built-in and extension channels when
    refactoring shared logic. An agent might mistakenly interpret the Discord gateway
    lifecycle fix as 'shared logic' and attempt to apply similar `reconnect-exhausted`
    handling to other channels like Telegram or Slack, which have different connection
    lifecycles and would lead to out-of-scope or buggy changes.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 18-21
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` contain identical rules. The
  rules are straightforward, but the agent must correctly identify that the Discord
  gateway fix is specific to the Discord extension and not shared routing/channel
  logic that requires cross-channel updates.
