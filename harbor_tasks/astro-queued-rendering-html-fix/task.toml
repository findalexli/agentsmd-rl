[description]
brief = "Fix HTML page rendering in experimental queued rendering mode"
detail = """When experimental.queuedRendering is enabled, .html page files have their raw HTML content incorrectly escaped, causing the page to render as plain text instead of HTML in the browser. The fix involves marking .html page strings as safe HTML so the queue builder doesn't escape them."""
