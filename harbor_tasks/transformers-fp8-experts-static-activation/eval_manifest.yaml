    description: "Modified file (finegrained_fp8.py) must parse without errors"

  - id: static_scheme_accepted
    type: fail_to_pass
    origin: pr_diff
    description: "FP8Experts can be constructed with activation_scheme='static'"

  - id: static_activation_scale_params
    type: fail_to_pass
    origin: pr_diff
    description: "Static mode registers gate_up and down activation scale params with correct shape/dtype"

  - id: static_quantizes_to_fp8
    type: fail_to_pass
    origin: pr_diff
    description: "linear() with static scheme + activation_scale quantizes input to FP8 dtype"

  - id: static_scale_affects_output
    type: fail_to_pass
    origin: pr_diff
    description: "Different activation scales produce different quantized values (scale is actually used)"

  - id: dynamic_mode_no_static_params
    type: pass_to_pass
    origin: pr_diff
    description: "Dynamic mode still works and does NOT register activation_scale params"

  - id: set_device_calls
    type: fail_to_pass
    origin: pr_diff
