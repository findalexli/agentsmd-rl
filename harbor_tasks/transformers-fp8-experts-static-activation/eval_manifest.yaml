rubric:
- rule: PRs should be as brief as possible. Bugfix PRs in particular can often be
    only one or two lines long, and do not need large comments, docstrings or new
    functions in this case. Aim to minimize the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: f6195948b47f06444a7bdf5f169197ed64b64de2
- rule: No low-value busywork PRs
  source:
    path: CLAUDE.md
    lines: 41-43
  evidence: The gold solution implements a substantial feature (static activation
    quantization for FP8Experts) and fixes a multi-GPU bug, rather than just doing
    a mechanical cleanup or tiny edit.
  category: architecture
distractors:
- rule: 'Fail-closed behavior for agents: If coordination evidence cannot be found,
    do not proceed to PR-ready output.'
  collision_type: meta_confusion
  why_distracting: In an automated evaluation setting, the agent is expected to produce
    a patch. If it strictly follows the 'fail-closed' rule requiring coordination
    evidence, it will refuse to generate the solution and fail the benchmark.
  severity: high
  source:
    path: CLAUDE.md
    lines: 54-57
- rule: 'Copies and Modular Models: We try to avoid direct inheritance between model-specific
    files in src/transformers/models/.'
  collision_type: architecture_boundary
  why_distracting: The agent might mistakenly apply the `# Copied from` or `modular_`
    file rules to `src/transformers/integrations/finegrained_fp8.py`, which is an
    integration file, not a model-specific file in `src/transformers/models/`.
  severity: low
  source:
    path: CLAUDE.md
    lines: 59-64
hierarchy_analysis: CLAUDE.md and AGENTS.md contain identical rules. The rules are
  heavily focused on human-in-the-loop contribution policies and model-specific file
  duplication, which creates meta-confusion for an autonomous agent operating on an
  integration file.
