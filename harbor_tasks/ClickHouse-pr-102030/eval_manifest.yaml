rubric:
- rule: Use Allman-style braces (opening brace on a new line) in C++ code
  source:
    path: AGENTS.md
    lines: '60'
    commit: 9893080d285656b1f90153260f95a675e002326b
- rule: Never use sleep in C++ code to fix race conditions - use proper synchronization
  source:
    path: AGENTS.md
    lines: '62'
    commit: 9893080d285656b1f90153260f95a675e002326b
- rule: Wrap literal names from ClickHouse classes and functions in inline code blocks
    in comments
  source:
    path: AGENTS.md
    lines: 8-10
    commit: 9893080d285656b1f90153260f95a675e002326b
- rule: Write names of functions and methods as `f` instead of `f()` in comments.
  source:
    path: AGENTS.md
    lines: 7-8
  evidence: The C++ comment added in the gold solution refers to functions as `tryLoadObject`,
    `processWatchQueue`, and `setAllObjects` without trailing parentheses.
  category: style
distractors:
- rule: Wrap literal names from ClickHouse SQL language, classes and functions inside
    inline code blocks in comments.
  collision_type: scope_ambiguity
  why_distracting: The rule instructs to wrap class and function names in inline code
    blocks (backticks) in comments. However, applying markdown backticks inside C++
    source code comments (e.g., `/// Use `ZooKeeperRetriesControl``) is not standard
    practice in this codebase, and the gold solution correctly omits them.
  severity: medium
  source:
    path: AGENTS.md
    lines: 5-6
hierarchy_analysis: The AGENTS.md file provides general guidelines for documentation
  and comments. However, there is a scope ambiguity regarding whether markdown formatting
  (like backticks) should be applied to C++ source code comments versus PR descriptions
  and markdown documentation.
