distractors:
- rule: 基线分支（默认优先 `master`，若仓库实际工作流不同，再按当前仓库状态判断）
  source:
    path: .claude/skills/create-pr/SKILL.md
    lines: '58'
    commit: 3e0031bae868475ce0746651bf70a5a2f705db63
  collision_type: rule_conflict
  why_distracting: The old master-default rule directly contradicts the new reflog-based inference, and an agent might keep both rules instead of replacing the old one.
  severity: high
- rule: 若用户要求直接创建 PR，则先向用户说明缺失项。
  source:
    path: .claude/skills/create-pr/SKILL.md
    lines: '80'
    commit: 3e0031bae868475ce0746651bf70a5a2f705db63
  collision_type: rule_conflict
  why_distracting: This old rule allows creating PRs after only noting missing items, conflicting with the new requirement for explicit user confirmation of base/title/body before gh pr create.
  severity: high
- rule: 忽略用户无感知的改动（内部重构、纯测试更新、工具链优化等）
  source:
    path: AGENTS.md
    lines: '107'
    commit: 3e0031bae868475ce0746651bf70a5a2f705db63
  collision_type: scope_ambiguity
  why_distracting: This changelog rule omits site/docs/demo/ci as explicit no-changelog categories, which could cause an agent to fabricate changelogs for those types instead of using a placeholder.
  severity: medium
