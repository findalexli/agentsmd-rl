distractors:
- rule: Put Electric behind server/proxy – never call directly from production / enforce
    auth at proxy
  collision_type: scope_ambiguity
  why_distracting: The instruction asks the agent to remove the Caddy HTTP/2 proxy
    used for local development. However, the security rules mandate putting Electric
    behind a server/proxy for production and enforcing auth at the proxy. An agent
    might either refuse to remove Caddy thinking it violates this rule, or mistakenly
    delete these production security rules thinking all proxies are now deprecated.
  severity: high
  source:
    path: AGENTS.md
    lines: 19-21
hierarchy_analysis: The task involves editing the root `AGENTS.md` file, which acts
  as the agent's own instruction/config file. The agent must update its own guidelines
  to reflect the new architectural capability (subdomain sharding replacing the need
  for a local proxy) without destroying unrelated production proxy rules.
