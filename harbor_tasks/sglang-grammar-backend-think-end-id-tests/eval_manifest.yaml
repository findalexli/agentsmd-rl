rubric:
- rule: Prefer mock over real server — when testing logic that doesn't need a server
    / engine launch, use unittest.mock.patch / MagicMock and place tests in test/registered/unit/.
  source:
    path: test/registered/unit/constrained/test_base_grammar_backend.py
    lines: 1-50
    commit: 5dd2c243eb52dfd04f27b998e2595fe0c66437b1
- rule: Prefer mock over real server for non-inference logic tests
  source:
    path: .claude/skills/write-sglang-test/SKILL.md
    lines: 16-16
  source_text: 5. **Prefer mock over real server** — when testing logic that doesn't
    need a server / engine launch (middleware, request routing, config validation,
    argument parsing), use `unittest.mock.patch` / `MagicMock` and place tests in
    `test/registered/unit/`. Only launch a real server when the test genuinely needs
    inference results or server lifecycle behavior.
  evidence: The modified file `test/registered/unit/constrained/test_base_grammar_backend.py`
    is located in `test/registered/unit/` and the gold diff shows it continuing to
    use `MagicMock` and `@patch` to mock dependencies (like the tokenizer and `OutlinesGrammarBackend`)
    rather than launching a real server.
  category: Testing/Mocking
  verification: llm_judge
distractors:
- rule: Always use CustomTestCase
  source:
    path: .claude/skills/write-sglang-test/SKILL.md
    lines: 12-12
  source_text: 1. **Always use `CustomTestCase`** — never raw `unittest.TestCase`.
    It ensures `tearDownClass` runs even when `setUpClass` fails, preventing resource
    leaks in CI.
  collision_type: scope_ambiguity
  why_distracting: The file `test_base_grammar_backend.py` currently uses `unittest.TestCase`
    instead of `CustomTestCase`. An agent reading this rule might be distracted into
    refactoring the entire test file to change its base class, which is outside the
    scope of the specific targeted fix being made in the PR.
  severity: medium
