config_edits:
- path: CLAUDE.md
  tier: 1
  gold_added: '## Linear Issue Management

    **Trigger conditions** - when ANY of these occur, apply Linear workflow:


    - User mentions issue ID like `LOBE-XXX`

    - User says "linear", "link linear", "linear issue"

    - Creating PR that references a Linear issue


    **Workflow:**


    1. Use `ToolSearch` to confirm `linear-server` MCP exists (search `linear` or
    `mcp__linear-server__`)

    2. If found, read `.cursor/rules/linear.mdc` and follow the workflow

    3. If not found, skip Linear integration (treat as not installed)'
  gold_removed: '## Linear Issue Management (search tools first; ignore if not installed)

    ClaudeCode may not inject MCP tools until they are discovered/used.\

    Before applying Linear workflows, **use tool search** to confirm `linear-server`
    exists (e.g. search `linear` / `mcp__linear-server__`). If not found, treat it
    as not installed.\

    Then read `@.cursor/rules/linear.mdc` when working with Linear issues.'
distractors:
- rule: Linear Issue Management (search tools first; ignore if not installed) ...
    Before applying Linear workflows, use tool search to confirm linear-server exists
  collision_type: meta_confusion
  why_distracting: The prompt asks the agent to *update* the documentation for the
    Linear Issue Management workflow. The agent might read this existing rule and
    try to *execute* the workflow (e.g., searching for the `linear-server` MCP tool
    and reading `.cursor/rules/linear.mdc`) instead of just editing the text in `CLAUDE.md`.
  severity: high
  source:
    path: CLAUDE.md
    lines: 64-68
- rule: Follow Linear rules in CLAUDE.md when working with Linear issues.
  collision_type: meta_confusion
  why_distracting: This rule instructs the agent to follow the Linear rules when working
    with Linear issues. The agent might interpret the task of updating the Linear
    documentation as 'working with Linear issues' and try to apply the workflow rather
    than modifying the documentation.
  severity: medium
  source:
    path: AGENTS.md
    lines: 57-59
hierarchy_analysis: 'The configuration hierarchy consists of `CLAUDE.md` and `AGENTS.md`
  at the root level. Both files contain instructions regarding Linear Issue Management.
  `CLAUDE.md` contains the actual workflow instructions, while `AGENTS.md` points
  to `CLAUDE.md`. The primary challenge in this PR is meta-level: the agent must recognize
  that it is being asked to modify the rules themselves rather than follow them.'
