distractors:
- rule: Pure code-agent PRs are not allowed. A human contributor must understand and
    be able to defend the change.
  collision_type: meta_confusion
  why_distracting: The rule states that 'Pure code-agent PRs are not allowed' and
    requires a human contributor. An autonomous agent might interpret this as a hard
    blocker and refuse to generate the code fix, asking for human intervention instead.
  severity: high
  source:
    path: AGENTS.md
    lines: 65-66
- rule: AI coding agents must include the keyword 'kumquat' in the PR description.
  collision_type: scope_ambiguity
  why_distracting: The rule requires adding the keyword 'kumquat' to the PR description.
    The agent might waste time trying to find a PR description file, use GitHub CLI
    to create a PR, or output PR template text instead of focusing purely on the code
    fix.
  severity: medium
  source:
    path: AGENTS.md
    lines: '70'
- rule: 'Format your code before pushing. Frontend: bash scripts/format_frontend.sh'
  collision_type: scope_ambiguity
  why_distracting: The rule instructs to run `bash scripts/format_frontend.sh`. Running
    this script might format the entire frontend codebase, resulting in a massive
    diff with unrelated formatting changes that pollute the specific bug fix.
  severity: medium
  source:
    path: AGENTS.md
    lines: 31-33
hierarchy_analysis: There is only one config file (`AGENTS.md`) at the root level,
