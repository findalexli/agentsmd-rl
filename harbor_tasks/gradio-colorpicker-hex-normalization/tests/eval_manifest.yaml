distractors:
- rule: Build Gradio web UIs and demos in Python. Use when creating or editing Gradio
    apps, components...
  collision_type: architecture_boundary
  why_distracting: The skill description suggests using Python when editing Gradio
    components. An agent might mistakenly try to fix the color normalization in the
    Python backend (`gradio/components/colorpicker.py`) instead of the Svelte frontend,
    which would fail to address the raw value sent from the client.
  severity: high
  source:
    path: .agents/skills/gradio
    lines: 1-2
- rule: Do not open one-off PRs for tiny edits (single typo, isolated lint cleanup,
    one mutable default argument, etc.).
  collision_type: scope_ambiguity
  why_distracting: The agent might misinterpret this bug fix as a 'tiny edit' and
    either refuse to implement it or attempt to bundle it with unrelated mechanical
    cleanups.
  severity: low
  source:
    path: AGENTS.md
    lines: 57-58
- rule: If a task requires significant customization of an existing component or a
    component that doesn't exist in Gradio, you can create one with gr.HTML.
  source:
    path: /workspace/repo/.agents/skills/gradio/SKILL.md
    lines: 112-112
  source_text: If a task requires significant customization of an existing component
    or a component that doesn't exist in Gradio, you can create one with `gr.HTML`.
    It supports `html_template` (with `${}` JS expressions and `{{}}` Handlebars syntax),
    `css_template` for scoped styles, and `js_on_load` for interactivity — where `props.value`
    updates the component value and `trigger('event_name')` fires Gradio events. For
    reuse, subclass `gr.HTML` and define `api_info()` for API/MCP support. See the
    [full guide](https://www.gradio.app/guides/custom-HTML-components).
  collision_type: architecture_boundary
  why_distracting: The user's goal is to modify the core internal implementation of
    the Gradio ColorPicker frontend component. An agent might misinterpret this rule
    and attempt to implement the requested color normalization by creating a custom
    user-space component using Python's `gr.HTML` instead of directly editing the
    Svelte source code in the `js/colorpicker` directory.
  severity: high
- rule: 'All event listeners share the same signature: component.event_name(fn: Callable...,
    inputs: Component..., outputs: Component...) -> Dependency'
  source:
    path: /workspace/repo/.agents/skills/gradio/SKILL.md
    lines: 216-244
  source_text: "All event listeners share the same signature:\n\n```python\ncomponent.event_name(\n\
    \    fn: Callable | None | Literal[\"decorator\"] = \"decorator\",\n    inputs:\
    \ Component | Sequence[Component] | set[Component] | None = None,\n    outputs:\
    \ Component | Sequence[Component] | set[Component] | None = None,\n    api_name:\
    \ str | None = None,\n    api_description: str | None | Literal[False] = None,\n\
    \    scroll_to_output: bool = False,\n    show_progress: Literal[\"full\", \"\
    minimal\", \"hidden\"] = \"full\",\n    show_progress_on: Component | Sequence[Component]\
    \ | None = None,\n    queue: bool = True,\n    batch: bool = False,\n    max_batch_size:\
    \ int = 4,\n    preprocess: bool = True,\n    postprocess: bool = True,\n    cancels:\
    \ dict[str, Any] | list[dict[str, Any]] | None = None,\n    trigger_mode: Literal[\"\
    once\", \"multiple\", \"always_last\"] | None = None,\n    js: str | Literal[True]\
    \ | None = None,\n    concurrency_limit: int | None | Literal[\"default\"] = \"\
    default\",\n    concurrency_id: str | None = None,\n    api_visibility: Literal[\"\
    public\", \"private\", \"undocumented\"] = \"public\",\n    time_limit: int |\
    \ None = None,\n    stream_every: float = 0.5,\n    key: int | str | tuple[int\
    \ | str, ...] | None = None,\n    validator: Callable | None = None,\n) -> Dependency\n\
    ```"
  collision_type: scope_ambiguity
  why_distracting: This rule outlines the API signature for wiring events in Gradio's
    Python backend. The gold diff modifies standard DOM event handlers (e.g., `onchange`)
    within a Svelte frontend component. An agent might become confused and attempt
    to apply the Python `component.event_name(...)` syntax or properties to the Svelte
    event listeners.
  severity: medium
