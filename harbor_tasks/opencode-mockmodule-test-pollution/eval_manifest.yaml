distractors:
- rule: Avoid mocks as much as possible
  collision_type: would_cause_bug
  why_distracting: The rule says 'Avoid mocks as much as possible', but this test
    fundamentally requires mocking dependencies like `App.tui` and `Rpc.client` to
    isolate thread logic. Trying to remove all mocks instead of just switching from
    `mock.module` to `spyOn` would break the test or require a massive rewrite.
  severity: high
  source:
    path: AGENTS.md
    lines: 116-117
- rule: Prefer ChildProcessSpawner.ChildProcessSpawner with ChildProcess.make(...)
    instead of custom process wrappers.
  collision_type: architecture_boundary
  why_distracting: The problem mentions `BunProc.run` being mocked in `config.test.ts`.
    An agent might try to refactor the actual implementation to use Effect's `ChildProcessSpawner`
    instead of fixing the test's mock counting logic, crossing an architecture boundary
    into Effect migration.
  severity: medium
  source:
    path: packages/opencode/AGENTS.md
    lines: 45-46
- rule: Use Effect.cached when multiple concurrent callers should share a single in-flight
    computation
  collision_type: scope_ambiguity
  why_distracting: The problem mentions 'dedupes concurrent config dependency installs'.
    An agent might try to implement `Effect.cached` to handle this deduplication,
    but the deduplication is already implemented and the issue is purely about the
    test's mock intercepting unrelated calls.
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: 52-53
hierarchy_analysis: The hierarchy applies general TypeScript/Bun rules at the root,
  Effect/Drizzle rules in the package, and test fixture rules in the test directory.
  The primary conflict arises from the root rule 'Avoid mocks as much as possible'
  conflicting with the necessity of mocking in these specific tests. Additionally,
  the package-level Effect migration rules act as distractors because the problem
  mentions concepts like 'concurrent installs' and 'process running' which have Effect
  equivalents, but the task is strictly to fix test flakiness in existing non-Effect
  or already-implemented code.
