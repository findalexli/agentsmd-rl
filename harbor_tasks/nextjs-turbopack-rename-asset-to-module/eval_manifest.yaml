rubric:
- rule: Run cargo fmt on Rust code changes. cargo fmt uses ASCII order (uppercase
    before lowercase).
  source:
    path: AGENTS.md
    lines: '414'
    commit: d84e3bb56ecfdd9ff6ab5ee479e85be2780b8ba9
- rule: Before editing files in any subdirectory (e.g., turbopack/crates/*), read
    all README.md files in the directory path from repo root up to the target file's
    directory.
  source:
    path: AGENTS.md
    lines: 46-54
    commit: d84e3bb56ecfdd9ff6ab5ee479e85be2780b8ba9
distractors:
- rule: If you are changing Next.js source or integration tests, start `pnpm --filter=next
    dev` in a separate terminal session before making edits
  collision_type: scope_ambiguity
  why_distracting: The rule instructs starting `pnpm --filter=next dev` for 'Next.js
    source' changes. An agent might interpret Turbopack Rust code as Next.js source
    and start the JS dev server, which is unnecessary for a simple Rust refactor and
    doesn't provide Rust compiler feedback.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 70-74
- rule: 'For type errors only: Use `pnpm --filter=next types` (~10s) instead of `pnpm
    --filter=next build` (~60s).'
  collision_type: scope_ambiguity
  why_distracting: The rule suggests using `pnpm --filter=next types` for type errors.
    An agent might run this to verify the Rust struct field rename didn't break types,
    but this command only runs TypeScript typechecking for the `next` package, not
    `cargo check` for Rust crates.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 86-87
- rule: prefer `pnpm --filter=next build` when edits are limited to core Next.js files.
    Use full `pnpm build-all` for branch switches/bootstrap, before CI push, or when
    changes span multiple packages.
  collision_type: scope_ambiguity
  why_distracting: The rule says to prefer `pnpm --filter=next build` when edits are
    limited to core Next.js files, and `pnpm build-all` when changes span multiple
    packages. An agent might be confused about whether a change isolated to a single
    Turbopack crate requires `pnpm build-all` or if there's a faster `cargo` command,
    leading to running a full JS/Rust build unnecessarily.
  severity: low
  source:
    path: CLAUDE.md
    lines: 89-91
hierarchy_analysis: '`CLAUDE.md` and `AGENTS.md` are identical symlinks. The rules
  are heavily biased towards the TypeScript/JavaScript parts of the Next.js monorepo
  (`packages/next`), with commands like `pnpm --filter=next dev` and `pnpm testheadless`.
  For changes in the Rust `turbopack` crates, these JS-centric workflows are distracting
  and ambiguous, as the agent needs to recognize that standard Rust tooling (`cargo
  check`, `cargo test`) is more appropriate for the inner development loop than the
  documented `pnpm` commands.'
