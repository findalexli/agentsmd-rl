version: "2.0"

source:
  repo: "vercel/next.js"
  pr: 91657
  base_commit: "7d451fe01e7a42be4aa9dc12e13e2017c1f0483d"
  merge_commit: "7984e4ab5c9562ea847ab04a43480c27ce4a3368"

checks:
  # Fail-to-pass tests (PR diff behavioral tests)
  - id: test_cli_flags_in_common_arguments
    type: fail_to_pass
    origin: pr_diff
    description: "persistent_caching: bool and cache_dir: Option<PathBuf> in CommonArguments with #[clap(long)]"

  - id: test_build_rs_git_version_embedding
    type: fail_to_pass
    origin: pr_diff
    description: "build.rs uses vergen-gitcl for git version embedding with CI-aware dirty flag"

  - id: test_backend_supports_both_storage_modes
    type: fail_to_pass
    origin: pr_diff
    description: "Backend type uses Either<TurboBackingStorage, NoopBackingStorage> with conditional branching"

  - id: test_cargo_toml_dependencies
    type: fail_to_pass
    origin: pr_diff
    description: "Cargo.toml has either in deps and vergen-gitcl + anyhow in build-deps"

  - id: test_storage_init_and_cache_invalidation
    type: fail_to_pass
    origin: pr_diff
    description: "Dev/build modules init persistent storage via turbo_backing_storage, use env! for version, and warn on invalidation"

  - id: test_bench_file_includes_new_fields
    type: fail_to_pass
    origin: pr_diff
    description: "Bench file has persistent_caching: false and cache_dir: None in struct init"

  # Pass-to-pass tests - static (file structure validation)
  - id: test_existing_cli_args_preserved
    type: pass_to_pass
    origin: static
    description: "Existing CLI args (log_detail, log_level, full_stats, worker_threads) still present"

  - id: test_key_files_not_stubbed
    type: pass_to_pass
    origin: static
    description: "Key source files (arguments.rs, dev/mod.rs, build/mod.rs) have >=50 lines each"

  - id: test_cargo_lock_exists
    type: pass_to_pass
    origin: static
    description: "Cargo.lock file exists with valid package entries"

  - id: test_turbopack_cli_src_structure
    type: pass_to_pass
    origin: static
    description: "turbopack-cli src directory has main.rs, lib.rs, and arguments.rs"

  - id: test_bench_file_structure
    type: pass_to_pass
    origin: static
    description: "Bench files (mod.rs, small_apps.rs) exist with function definitions"

  # Pass-to-pass tests - repo_tests (actual CI-style subprocess commands)
  - id: test_cargo_toml_syntax_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Cargo.toml is valid TOML with required [package] and [dependencies] sections"

  - id: test_cargo_toml_has_workspace_deps
    type: pass_to_pass
    origin: repo_tests
    description: "Cargo.toml properly references workspace dependencies for key crates"

  - id: test_cargo_toml_has_lib_and_bin_targets
    type: pass_to_pass
    origin: repo_tests
    description: "Cargo.toml has both [lib] and [[bin]] targets with proper bench settings"

  - id: test_cargo_toml_features_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Cargo.toml has valid feature flags configuration (default, tokio_console)"

  - id: test_lib_rs_exports_required_modules
    type: pass_to_pass
    origin: repo_tests
    description: "lib.rs exports required modules (arguments, build, dev) as pub mod"

  - id: test_main_rs_has_global_allocator_and_entry
    type: pass_to_pass
    origin: repo_tests
    description: "main.rs has TurboMalloc global allocator and main function with tokio runtime"

  - id: test_clap_arguments_struct_derive
    type: pass_to_pass
    origin: repo_tests
    description: "Arguments and CommonArguments structs use proper clap Parser derive"

  - id: test_dev_module_entry_point
    type: pass_to_pass
    origin: repo_tests
    description: "Dev module has start_server function with correct signature returning Result"

  - id: test_build_module_entry_point
    type: pass_to_pass
    origin: repo_tests
    description: "Build module has build function with correct signature returning Result"

  - id: test_git_repo_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Git repository is valid (git rev-parse --git-dir succeeds)"

  - id: test_git_head_commit
    type: pass_to_pass
    origin: repo_tests
    description: "Git HEAD is at a valid commit (40-char hex hash)"

