  - id: test_build_rs_git_version_embedding
    type: fail_to_pass
    origin: pr_diff
    description: "build.rs uses vergen-gitcl for git version embedding with CI-aware dirty flag"

  - id: test_backend_supports_both_storage_modes
    type: fail_to_pass
    origin: pr_diff
    description: "Backend type uses Either<TurboBackingStorage, NoopBackingStorage> with conditional branching"

  - id: test_cargo_toml_dependencies
    type: fail_to_pass
    origin: pr_diff
    description: "Cargo.toml has either in deps and vergen-gitcl + anyhow in build-deps"

  - id: test_storage_init_and_cache_invalidation
    type: fail_to_pass
    origin: pr_diff
    description: "Dev/build modules init persistent storage via turbo_backing_storage, use env! for version, and warn on invalidation"

  - id: test_bench_file_includes_new_fields
    type: fail_to_pass
    origin: pr_diff
    description: "Bench file has persistent_caching: false and cache_dir: None in struct init"

  - id: test_existing_cli_args_preserved
    type: pass_to_pass
