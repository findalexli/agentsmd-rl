  category: architecture
distractors:
- rule: 'Default agent rule: If you are changing Next.js source or integration tests,
    start `pnpm --filter=next dev` in a separate terminal session before making edits.'
  collision_type: scope_ambiguity
  why_distracting: The rule mandates starting `pnpm --filter=next dev` when changing
    Next.js source. Since `turbopack-cli` is a standalone Rust binary and not part
    of the Next.js core framework (`packages/next`), running the Next.js dev server
    is irrelevant, would waste time, and might confuse the agent into thinking it
    needs to test the CLI through Next.js.
  severity: high
  source:
    path: CLAUDE.md
    lines: 63-65
- rule: 'For type errors only: Use `pnpm --filter=next types` (~10s) instead of `pnpm
    --filter=next build` (~60s).'
  collision_type: scope_ambiguity
  why_distracting: The rule suggests using `pnpm --filter=next types` for type errors.
    This applies to TypeScript code in the Next.js package, but the agent is working
    on Rust code in `turbopack-cli` where `cargo check` is the appropriate tool. Attempting
    to run pnpm type checks will not help validate the Rust changes.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 80-81
- rule: Build all JS and Rust code using `pnpm build-all`.
  collision_type: scope_ambiguity
  why_distracting: The rule suggests `pnpm build-all` to build all JS and Rust code.
    While this would technically build `turbopack-cli`, it builds the entire monorepo
    which is extremely slow. The agent should use `cargo` commands directly in the
    `turbopack/crates/turbopack-cli` directory for this specific task to maintain
    an efficient inner loop.
  severity: low
  source:
    path: CLAUDE.md
    lines: 54-55
hierarchy_analysis: The config files `CLAUDE.md` and `AGENTS.md` are identical symlinks.
  They provide guidance heavily skewed towards Next.js TypeScript development and
  SWC bindings, with very little specific guidance for standalone Turbopack Rust development.
  This creates a situation where the agent must carefully filter out TS/JS-specific
  workflow rules when working purely in the `turbopack/` Rust subtree.
