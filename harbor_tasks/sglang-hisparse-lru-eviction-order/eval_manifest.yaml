rubric:
- rule: "When adding NEW '#include <sgl_kernel/...>' lines, add short trailing comments
    explaining why the header is included (e.g. '// For TensorMatcher'). This applies
    to NEW includes only - existing code should not be modified."
  source:
    path: .claude/skills/add-jit-kernel/SKILL.md
    lines: '30'
    commit: 93109cc89be31809e45886377c55099983effa22
- rule: "When writing NEW JIT kernel code, prefer sgl_kernel abstractions (TensorMatcher,
    SymbolicSize, etc.) over raw CUDA primitives where applicable. This applies
    to NEW code only - existing code should not be refactored unless necessary for
    the fix."
  source:
    path: .claude/skills/add-jit-kernel/SKILL.md
    lines: '28'
    commit: 93109cc89be31809e45886377c55099983effa22
