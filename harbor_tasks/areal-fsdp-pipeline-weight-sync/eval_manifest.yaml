    description: "Repo's fsdp_engine.py parses as valid AST"

  - id: pipelined_main_loop
    type: fail_to_pass
    origin: pr_diff
    description: "Main update loop overlaps bucket broadcast with next bucket preparation (deferred-wait pattern with try/finally)"

  - id: async_bucket_method
    type: fail_to_pass
    origin: pr_diff
    description: "Async bucket broadcast method exists that returns pending state with real distributed logic"

