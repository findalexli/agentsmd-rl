    description: "Repo's ruff linting passes on areal/engine/fsdp_engine.py"

  - id: test_repo_ruff_format
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ruff formatting passes on areal/engine/fsdp_engine.py"

  - id: test_repo_ast_parse
    type: pass_to_pass
