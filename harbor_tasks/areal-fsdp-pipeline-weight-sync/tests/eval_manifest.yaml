distractors:
- rule: Add tests for new functionality.
  collision_type: rule_conflict
  why_distracting: The agent might attempt to write unit tests for the new asynchronous
    bucket logic, but the task instructions explicitly state 'Only areal/engine/fsdp_engine.py
    should be modified.'
  severity: high
  source:
    path: AGENTS.md
    lines: '31'
- rule: Config dataclass | XxxConfig
  collision_type: scope_ambiguity
  why_distracting: The agent might name the new dataclass `PendingWeightUpdateBucketConfig`
    because it uses the `@dataclasses.dataclass` decorator, but this is a runtime
    state container, not a configuration object.
  severity: medium
  source:
    path: AGENTS.md
    lines: 67-68
- rule: Dataclass Conventions
  source:
    path: .claude/rules/api-config.md
    lines: 8-33
  source_text: "## Dataclass Conventions\n\n```python\n@dataclass\nclass XxxConfig:\n\
    \    \"\"\"One-line description.\n\n    Attributes:\n        field_name: Description\
    \ with default explained.\n    \"\"\"\n    # Required fields first (no default)\n\
    \    required_field: str\n\n    # Optional fields with defaults\n    optional_field:\
    \ int = 32\n\n    # Internal fields last (underscore prefix)\n    _internal: str\
    \ = field(default=\"\", repr=False)\n```\n\n## Field Ordering\n\n1. Required fields\
    \ (no default)\n1. Common optional fields\n1. Advanced/rare optional fields\n\
    1. Internal fields (`_prefix`)"
  collision_type: scope_ambiguity
  why_distracting: The AI might try to apply these dataclass conventions (like adding
    a docstring with an Attributes section) to the newly added `_PendingWeightUpdateBucket`
    dataclass. However, this rule is scoped to `areal/api/**` and is meant for public
    configuration classes, whereas the new dataclass is an internal helper in `areal/engine/`.
  severity: medium
hierarchy_analysis: Both AGENTS.md and CLAUDE.md are root-level files that mandate
  adding tests for new functionality. However, the task's explicit constraint ('Only
  areal/engine/fsdp_engine.py should be modified') overrides this general repository
  rule. The agent must prioritize the local task constraint over the global repository
  guidelines.
