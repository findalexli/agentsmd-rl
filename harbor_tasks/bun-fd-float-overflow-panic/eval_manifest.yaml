rubric:
- rule: Follow existing code style. Check neighboring files for patterns.
  source:
    path: CLAUDE.md
    lines: '67'
    commit: 8f0fd0cf1da17fff23df7133e414cdd1f5ed917e
- rule: All changes must be tested. The fix should include or be accompanied by tests
    that verify the behavior.
  source:
    path: CLAUDE.md
    lines: '66'
    commit: 8f0fd0cf1da17fff23df7133e414cdd1f5ed917e
- rule: Prefer Bun APIs over std APIs. Use bun.* APIs instead of std.* for cross-platform
    wrappers with proper error handling.
  source:
    path: src/CLAUDE.md
    lines: 15-16
    commit: 8f0fd0cf1da17fff23df7133e414cdd1f5ed917e
- rule: Decl literals in Zig are recommended (e.g., `.{ .binding = 0, .value = 0 }`).
  source:
    path: src/CLAUDE.md
    lines: 7-8
  evidence: The gold solution uses an anonymous struct literal `.{ .field_name = "fd",
    .min = 0, .max = std.math.maxInt(i32) }` when passing arguments to `global.throwRangeError`,
    aligning with the recommendation
  category: style
distractors:
- rule: Always use `bun.*` APIs instead of `std.*`.
  collision_type: scope_ambiguity
  why_distracting: The rule states 'Always use bun.* APIs instead of std.*'. An agent
    might strictly interpret this and try to avoid or replace `std.math.maxInt(i32)`
    with a non-existent `bun.math` equivalent. However, the rule's examples clearly
    show it applies to OS, FS, and crypto operations, not basic language math constants.
  severity: medium
  source:
    path: src/CLAUDE.md
    lines: 15-26
- rule: NEVER write tests that check for no 'panic' or 'uncaught exception' or similar
    in the test output.
  collision_type: meta_confusion
  why_distracting: 'The issue is explicitly titled ''Bug: Panic when passing extreme
    float values''. An agent might naturally try to write a regression test that spawns
    Bun and asserts the stderr does not contain the word ''panic''. The rule explicitly
    forbids this exact testing approach because it won''t fail reliably in CI.'
  severity: high
  source:
    path: CLAUDE.md
    lines: 81-82
hierarchy_analysis: The hierarchy consists of root-level testing/build instructions
  and `src/`-level Zig conventions. The most significant interaction is the tension
  between the root-level testing rules (which forbid checking for 'panic' in tests)
  and the nature of the bug (which is a panic). Additionally, the `src/`-level rule
  forbidding `std.*` APIs requires contextual understanding to know it doesn't apply
  to `std.math`.
