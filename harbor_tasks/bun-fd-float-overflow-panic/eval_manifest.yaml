version: "2.0"

source:
  repo: "oven-sh/bun"
  pr: 28364
  base_commit: "8f0fd0cf1da17fff23df7133e414cdd1f5ed917e"
  merge_commit: "69e92c767341915b887802ff28cef4ab2884d284"

checks:
  # Gate
  - id: fd_zig_structural_integrity
    type: pass_to_pass
    origin: static
    description: "fd.zig exists with FD packed struct and fromJSValidated function"

  # Core behavioral — fail-to-pass
  - id: range_check_before_int_conversion
    type: fail_to_pass
    origin: pr_diff
    description: "Float range validated BEFORE @intFromFloat to prevent panic on extreme values"

  - id: error_path_before_conversion
    type: fail_to_pass
    origin: pr_diff
    description: "Out-of-range float triggers throwRangeError before @intFromFloat conversion"

  - id: both_positive_and_negative_overflow
    type: fail_to_pass
    origin: pr_diff
    description: "Range check covers both positive (1e308) and negative (-1.5e308) overflow"

  # Regression — pass-to-pass
  - id: mod_check_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "Non-integer float detection (@mod check) still present"

  - id: int_from_float_still_used
    type: pass_to_pass
    origin: pr_diff
    description: "@intFromFloat conversion still used for valid floats"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "fromJSValidated is substantive (not gutted to a stub)"

  # Config-derived — agent_config
  - id: no_inline_import
    type: pass_to_pass
    origin: agent_config
    description: "No inline @import() inside fromJSValidated"
    source:
      path: "src/CLAUDE.md"
      lines: "11"
      commit: "8f0fd0cf1da17fff23df7133e414cdd1f5ed917e"

  - id: no_forbidden_std_apis
    type: pass_to_pass
    origin: agent_config
    description: "No forbidden std.* API usage (std.fs, std.posix, std.os) in fromJSValidated"
    source:
      path: "src/CLAUDE.md"
      lines: "16"
      commit: "8f0fd0cf1da17fff23df7133e414cdd1f5ed917e"

  # Repo CI/CD tests — p2p enrichment (verified 2026-04-09)
  # CI commands discovered from .github/workflows/lint.yml, .github/workflows/format.yml, package.json
  # Working commands:
  # - npx oxlint src/js -> EXIT 0 (336 warnings, 0 errors) - adapted from "bun lint"
  # Skipped commands (require bun/zig toolchain not in node:22-slim):
  # - bun run typecheck -> requires bun runtime
  # - bun run zig:check -> requires zig toolchain
  # - bun ./test/internal/ban-words.test.ts -> requires bun runtime
  # - zig fmt src/ -> requires zig toolchain
  # - clang-format -> requires LLVM toolchain
  - id: repo_oxlint
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's JavaScript linting passes (oxlint on src/js)"
    source:
      ci_workflow: ".github/workflows/lint.yml"
      package_script: "bun lint"
      docker_command: "npx oxlint src/js"
      original_command: "bunx oxlint --config=oxlint.json --format=github src/js"
      verification: "Tested in node:22-slim container, exits 0 with 336 warnings"

  - id: zig_syntax_valid
    type: pass_to_pass
    origin: static
    description: "Zig source files have valid syntax and structure via structural validation"
    source:
      note: "Python-based validation since zig toolchain unavailable in Docker image"
      path: "src/fd.zig"
      validation: "brace_balance,syntax_elements,function_integrity"

rubric:
  - rule: "Follow existing code style. Check neighboring files for patterns."
    source:
      path: "CLAUDE.md"
      lines: "67"
      commit: "8f0fd0cf1da17fff23df7133e414cdd1f5ed917e"

  - rule: "All changes must be tested. The fix should include or be accompanied by tests that verify the behavior."
    source:
      path: "CLAUDE.md"
      lines: "66"
      commit: "8f0fd0cf1da17fff23df7133e414cdd1f5ed917e"

  - rule: "Prefer Bun APIs over std APIs. Use bun.* APIs instead of std.* for cross-platform wrappers with proper error handling."
    source:
      path: "src/CLAUDE.md"
      lines: "15-16"
      commit: "8f0fd0cf1da17fff23df7133e414cdd1f5ed917e"
