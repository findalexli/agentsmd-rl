rubric:
- rule: Use single word names by default for new locals, params, and helper functions.
  source:
    path: AGENTS.md
    lines: 23-32
    commit: 3a0e00dd7f9192730f6d0eeee37ae0a5fb023927
- rule: Avoid `else` statements. Prefer early returns.
  source:
    path: AGENTS.md
    lines: 82-84
    commit: 3a0e00dd7f9192730f6d0eeee37ae0a5fb023927
- rule: Avoid unnecessary destructuring. Use dot notation to preserve context.
  source:
    path: AGENTS.md
    lines: 55-57
    commit: 3a0e00dd7f9192730f6d0eeee37ae0a5fb023927
- rule: Prefer `const` over `let`. Use ternaries or early returns instead of reassignment.
  source:
    path: AGENTS.md
    lines: 68-70
    commit: 3a0e00dd7f9192730f6d0eeee37ae0a5fb023927
distractors:
- rule: Avoid `try`/`catch` where possible
  collision_type: would_cause_bug
  why_distracting: '`npm-package-arg` throws exceptions for invalid specifiers. The
    gold solution uses `try/catch` to safely wrap `npa(spec)` and return undefined
    on failure. An agent strictly avoiding `try/catch` might let the error bubble
    up, crashing the plugin resolution, or attempt to pre-validate the specifier with
    complex regexes, which defeats the purpose of using the library.'
  severity: high
  source:
    path: AGENTS.md
    lines: 12-12
- rule: opencode Effect rules (e.g., Use Effect.gen, Prefer FileSystem.FileSystem)
  collision_type: architecture_boundary
  why_distracting: The `Npm` namespace and plugin shared utilities are currently written
    in standard imperative TypeScript. An agent might see the Effect rules and attempt
    to rewrite `parsePluginSpecifier` or `directory` using `Effect.gen` or `Effect.fn`,
    which is out of scope for a simple bug fix and crosses an architecture boundary.
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: 13-20
hierarchy_analysis: The root `AGENTS.md` provides general TypeScript style guidelines
  (naming, destructuring, control flow) which are strictly followed in the gold solution.
  The package-level `packages/opencode/AGENTS.md` introduces Effect-specific rules,
  but these are not applicable to the files being edited (`src/npm/index.ts` and `src/plugin/shared.ts`),
  which are legacy/imperative code. Agents must recognize that Effect rules only apply
  when writing or migrating Effect code, and should not effectify existing imperative
  code during a targeted bug fix.
