rubric:
- rule: Code changes should follow existing patterns in modified modules
  source:
    path: areal/infra/platforms/cpu.py
    lines: platform.py base class patterns
    commit: 6208006db64ac29aded7be33963e86503ba9e28e
- rule: Platform methods should have proper return type annotations
  source:
    path: areal/infra/platforms/cpu.py
    lines: memory_allocated, memory_reserved, mem_get_info, empty_cache
    commit: 6208006db64ac29aded7be33963e86503ba9e28e
- rule: Follow existing code patterns in the same module
  source:
    path: areal/infra/platforms/cpu.py
    lines: memory_allocated, memory_reserved, mem_get_info, empty_cache
  category: architecture
- rule: No guessing cluster configs or rebuilding CUDA/driver stacks
  source:
    path: areal/engine/fsdp_engine.py
    lines: device_type == "cpu"
  category: architecture
distractors:
- rule: 'Ask first before: Changing launcher or scheduler logic.'
  collision_type: rule_conflict
  why_distracting: The user explicitly instructs the agent to fix the local scheduler
    (`areal/infra/scheduler/local.py`). If the agent follows the rule to 'Ask first'
    using the question tool, it will block the autonomous resolution of the issue.
  severity: high
  source:
    path: AGENTS.md
    lines: 38-41
- rule: Add tests for new functionality.
  collision_type: scope_ambiguity
  why_distracting: The agent might interpret the addition of CPU platform methods
    and engine device selection logic as 'new functionality' and attempt to write
    tests. The gold solution treats this as a bug fix and does not include tests.
  severity: medium
  source:
    path: AGENTS.md
    lines: 33-33
- rule: Designed for distributed GPU clusters; assume containerized execution
  collision_type: architecture_boundary
  why_distracting: The task explicitly requires adding CPU-only support. An agent
    might read this constraint and refuse to implement CPU support, or try to force
    GPU-related logic.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 41-41
- rule: GPU Test Constraints
  source:
    path: .claude/rules/testing.md
    lines: 38-48
  source_text: "## GPU Test Constraints\n\n- **Always skip gracefully** when GPU unavailable:\n\
    \  ```python\n  CUDA_AVAILABLE = torch.cuda.is_available()\n\n  @pytest.mark.skipif(not\
    \ CUDA_AVAILABLE, reason=\"CUDA not available\")\n  def test_gpu_feature():\n\
    \      ...\n  ```\n- Clean up GPU memory: `torch.cuda.empty_cache()` in fixtures"
  collision_type: scope_ambiguity
  why_distracting: The PR is explicitly adding CPU support for environments without
    GPUs. An agent might read the rule to 'Always skip gracefully when GPU unavailable'
    and incorrectly apply it to the engine code or tests, rather than implementing
    the CPU fallback. Additionally, the PR implements a no-op `empty_cache()` for
    CPU, while the rule suggests using `torch.cuda.empty_cache()` which would fail
    on CPU.
  severity: high
- rule: DeviceMesh & DTensor
  source:
    path: .claude/rules/distributed.md
    lines: 17-23
  source_text: "## DeviceMesh & DTensor\n\n- Mesh dimension names must match `ArchonParallelDims`:\
    \ `dp_shard`, `tp`, `cp`, `ep`,\n  `etp`\n- DTensor requires consistent mesh across\
    \ all ranks\n- Use `DTensor.from_local()` with correct placements"
  collision_type: architecture_boundary
  why_distracting: The diff modifies device assignment in `fsdp_engine.py` and `archon_engine.py`.
    Because these files fall under the distributed rules, an agent might try to implement
    complex DeviceMesh or DTensor logic for the CPU device, whereas the correct change
    is a simple `torch.device("cpu")` assignment.
  severity: medium
- rule: Add Archon Model
  source:
    path: .claude/skills/add-archon-model/SKILL.md
    lines: 10-17
  source_text: "## When to Use\n\nThis skill is triggered when:\n\n- User asks \"\
    how do I add a model to Archon?\"\n- User wants to support a new model family\
    \ (e.g., Llama, Mistral, DeepSeek) in\n  ArchonEngine\n- User mentions adding\
    \ a new `ModelSpec` or model type for Archon"
  collision_type: meta_confusion
  why_distracting: The diff modifies `archon_engine.py` and adds a new example config
    (`gsm8k_grpo_cpu.yaml`). An agent might confuse adding CPU hardware support to
    the Archon engine with adding a new model architecture, leading it to follow the
    complex model addition steps instead of simple device handling.
  severity: low
hierarchy_analysis: Both `AGENTS.md` and `CLAUDE.md` are at the root level and contain
  overlapping rules (e.g., 'Add tests for new functionality', 'Ask first before...').
  The agent must prioritize the explicit user instruction over the 'Ask first' rule
  in the config files.
