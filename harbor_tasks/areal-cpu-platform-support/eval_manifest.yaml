version: "2.0"

source:
  repo: "inclusionAI/AReaL"
  pr: 1003
  base_commit: "6208006db64ac29aded7be33963e86503ba9e28e"
  merge_commit: "eb494def6af8390b115ac2409dc86a221c9d3f83"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified Python files must parse without errors"

  - id: cpu_platform_memory_allocated
    type: fail_to_pass
    origin: pr_diff
    description: "CpuPlatform must implement memory_allocated() returning 0"

  - id: cpu_platform_memory_reserved
    type: fail_to_pass
    origin: pr_diff
    description: "CpuPlatform must implement memory_reserved() returning 0"

  - id: cpu_platform_mem_get_info
    type: fail_to_pass
    origin: pr_diff
    description: "CpuPlatform must implement mem_get_info() returning a 2-tuple of zeros"

  - id: cpu_platform_empty_cache
    type: fail_to_pass
    origin: pr_diff
    description: "CpuPlatform must implement empty_cache() as a no-op"

  - id: fsdp_engine_cpu_device
    type: fail_to_pass
    origin: pr_diff
    description: "FSDP engine _create_device_model must set device to cpu when platform is CPU"

  - id: scheduler_device_env_guard
    type: fail_to_pass
    origin: pr_diff
    description: "Scheduler must guard device_control_env_var assignment against empty string"

  - id: archon_engine_cpu_device
    type: fail_to_pass
    origin: pr_diff
    description: "Archon engine _create_device_model must set device to cpu when platform is CPU"

  - id: no_wildcard_imports
    type: pass_to_pass
    origin: agent_config
    description: "Modified files must not use wildcard imports"
    source:
      path: "CLAUDE.md"
      lines: "93"
      commit: "6208006db64ac29aded7be33963e86503ba9e28e"

  - id: test_repo_syntax_all_modules
    type: pass_to_pass
    origin: repo_tests
    description: "All areal Python files must have valid syntax (repo CI check)"

  - id: test_repo_cpu_platform_importable
    type: pass_to_pass
    origin: repo_tests
    description: "CpuPlatform module can be imported with minimal dependencies"

  - id: test_repo_pyproject_toml_valid
    type: pass_to_pass
    origin: repo_tests
    description: "pyproject.toml must be valid TOML (repo CI check)"

  - id: test_repo_example_configs_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Example YAML configs must be valid (repo CI check)"

  - id: test_repo_ruff_lint
    type: pass_to_pass
    origin: repo_tests
    description: "Ruff linting passes on modified files (repo CI check)"

  - id: test_repo_ruff_format
    type: pass_to_pass
    origin: repo_tests
    description: "Ruff formatting check passes on modified files (repo CI check)"

rubric:
  - rule: "Code changes should follow existing patterns in modified modules"
    source:
      path: "areal/infra/platforms/cpu.py"
      lines: "platform.py base class patterns"
      commit: "6208006db64ac29aded7be33963e86503ba9e28e"
  - rule: "Platform methods should have proper return type annotations"
    source:
      path: "areal/infra/platforms/cpu.py"
      lines: "memory_allocated, memory_reserved, mem_get_info, empty_cache"
      commit: "6208006db64ac29aded7be33963e86503ba9e28e"
