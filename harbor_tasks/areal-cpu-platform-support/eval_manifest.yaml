rubric:
- rule: Code changes should follow existing patterns in modified modules
  source:
    path: areal/infra/platforms/cpu.py
    lines: platform.py base class patterns
    commit: 6208006db64ac29aded7be33963e86503ba9e28e
- rule: Platform methods should have proper return type annotations
  source:
    path: areal/infra/platforms/cpu.py
    lines: memory_allocated, memory_reserved, mem_get_info, empty_cache
    commit: 6208006db64ac29aded7be33963e86503ba9e28e
- rule: Follow existing code patterns in the same module.
  source:
    path: AGENTS.md
    lines: 30-30
  evidence: The gold solution implements `memory_allocated`, `memory_reserved`, `mem_get_info`,
    and `empty_cache` in `CpuPlatform` to match the implicit interface expected by
    the engines, returning safe default v
  category: architecture
- rule: No guessing cluster configs or rebuilding CUDA/driver stacks.
  source:
    path: AGENTS.md
    lines: 22-22
  evidence: The gold solution explicitly checks `current_platform.device_type == "cpu"`
    to dynamically assign `torch.device("cpu")` instead of blindly using `LOCAL_RANK`
    which assumes a GPU cluster config.
  category: architecture
distractors:
- rule: 'Ask first before: Changing launcher or scheduler logic.'
  collision_type: rule_conflict
  why_distracting: The instructions explicitly state that the local scheduler has
    an invalid environment variable key issue that needs fixing. If the agent stops
    to ask permission before modifying `areal/infra/scheduler/local.py`, it fails
    to complete the requested fix autonomously.
  severity: high
  source:
    path: AGENTS.md
    lines: 35-39
- rule: Add tests for new functionality.
  collision_type: scope_ambiguity
  why_distracting: The PR is a bug fix for CPU compatibility, not 'new functionality'.
    The gold solution provides an example YAML to demonstrate it works, but no new
    unit tests. An agent might waste time writing mock tests for `CpuPlatform` memory
    methods, which is out of scope.
  severity: medium
  source:
    path: AGENTS.md
    lines: 31-31
hierarchy_analysis: Both CLAUDE.md and AGENTS.md contain identical rules regarding
  testing, code patterns, and asking before modifying schedulers. AGENTS.md acts as
  the primary operational guide. The conflict arises because the prompt explicitly
  asks to fix a bug in the scheduler, overriding the 'Ask first' rule in the agent
  instructions.
