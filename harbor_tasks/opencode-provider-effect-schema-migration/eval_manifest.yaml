rubric:
- id: rubric_no_zod_in_migrated_files
  source:
    lines: 74-86
    commit: 1e439b8226a66dcec0d65751f5cdb50a2b7bc979
    path: packages/opencode/specs/effect/schema.md
  rule: Migrated files contain no remaining `z.` calls or `import z from "zod"`. The package's `effect-zod` walker still re-exports a `zod()` helper, but the migrated file itself should not author zod schemas inline.
- id: rubric_inferred_types_use_schema_schema_type
  source:
    lines: 118-126
    commit: 1e439b8226a66dcec0d65751f5cdb50a2b7bc979
    path: packages/opencode/specs/effect/schema.md
  rule: Inferred TypeScript types are derived with `Schema.Schema.Type<typeof X>` (or equivalent) rather than `z.infer<typeof X>` or `Types.DeepMutable`. The recursive `JsonValue` schema must not introduce a new `Types.DeepMutable` usage that would trip TS2589.
- id: rubric_no_try_catch
  source:
    lines: '12'
    commit: 1e439b8226a66dcec0d65751f5cdb50a2b7bc979
    path: AGENTS.md
  rule: Migrated code avoids try/catch unless unavoidable, per the repo style guide.
- id: rubric_no_any_type
  source:
    lines: '13'
    commit: 1e439b8226a66dcec0d65751f5cdb50a2b7bc979
    path: AGENTS.md
  rule: Migrated code avoids the `any` type.
- id: rubric_prefer_const_and_early_returns
  source:
    lines: 44-73
    commit: 1e439b8226a66dcec0d65751f5cdb50a2b7bc979
    path: AGENTS.md
  rule: Code uses `const` over `let` and early returns instead of `else` branches, per the repo style guide.
- id: rubric_callsite_env_spread
  source:
    lines: 118-126
    commit: 1e439b8226a66dcec0d65751f5cdb50a2b7bc979
    path: packages/opencode/specs/effect/schema.md
  rule: If `Model.env` is now a readonly array, every call site that wants a mutable array should spread (`[...provider.env ?? []]`) at the boundary, not by widening the schema's type.
