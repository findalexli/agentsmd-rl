distractors:
- rule: Keep loader behavior aligned with the documented Plugin SDK and manifest contracts.
    Do not create private backdoors that bundled plugins can use but external plugins
    cannot.
  collision_type: scope_ambiguity
  why_distracting: The agent might interpret adding `allowGatewaySubagentBinding`
    and bypassing the standard loader as creating a 'private backdoor'. However, this
    is an internal core-to-core optimization (gateway to plugin loader) to fix a lifecycle
    bug, not a backdoor for bundled plugins.
  severity: high
  source:
    path: src/plugins/CLAUDE.md
    lines: 18-20
- rule: If a loader or registry change affects plugin authors, update the public SDK,
    docs, and contract tests instead of relying on incidental internals.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to update `docs/plugins/sdk-overview.md` or
    `src/plugin-sdk/*` because it is modifying the plugin registry resolution. This
    is purely an internal lifecycle fix for sub-agents and does not affect the public
    SDK or plugin authors.
  severity: medium
  source:
    path: src/plugins/CLAUDE.md
    lines: 21-22
hierarchy_analysis: The root `CLAUDE.md` defines the high-level architecture boundaries,
  while `src/plugins/CLAUDE.md` provides strict rules about the plugin loader and
  registry contracts. The tension here is that `src/plugins/CLAUDE.md` strongly discourages
  'incidental internals' and 'private backdoors', which an agent might misapply to
  internal core-to-core communication (like the gateway passing `allowGatewaySubagentBinding`
  to the plugin loader).
