source:
  repo: ClickHouse/ClickHouse.git
  pr: 0
  base_commit: 7dad4d8f7af43976fa63a062d20225aad04842c8
  merge_commit: ''
rubric:
- rule: When writing C++ code, always use Allman-style braces (opening brace on a
    new line)
  source:
    path: .claude/CLAUDE.md
    lines: 54-55
    commit: 7dad4d8f7af43976fa63a062d20225aad04842c8
  evidence: The gold solution uses Allman-style braces with opening braces on new
    lines for the for loop and if statement in the validation code block
  category: style
- rule: When mentioning logical errors, say 'exception' instead of 'crash'
  source:
    path: AGENTS.md
    lines: '9'
    commit: 7dad4d8f7af43976fa63a062d20225aad04842c8
- rule: Write names of functions and methods as `f` instead of `f()` - prefer it for
    mathematical purity when it refers a function itself rather than its application
  source:
    path: AGENTS.md
    lines: '7'
    commit: 7dad4d8f7af43976fa63a062d20225aad04842c8
  evidence: The gold solution correctly refers to SplitByStringTokenizer::getExternalName
    without parentheses in the error message string, treating it as a function reference
  category: style
- rule: Wrap literal names from ClickHouse SQL language, classes and functions, or
    literal excerpts from log messages inside inline code blocks
  source:
    path: AGENTS.md
    lines: '5'
    commit: 7dad4d8f7af43976fa63a062d20225aad04842c8
  evidence: The gold solution uses single quotes around '{}' in the error message
    which serves as literal formatting for code-like values, consistent with codebase
    convention
  category: style
- rule: When mentioning logical errors, say "exception" instead of "crash", because
    they don't crash the server in the release build.
  source:
    path: AGENTS.md
    lines: 9-9
  evidence: The gold solution throws an Exception with a clear error message ('the
    empty string cannot be used as a separator') for the logical error of providing
    an empty separator, avoiding any mention of 'cras
  category: style
distractors:
- rule: wrap literal names from ClickHouse SQL language, classes and functions...
    inside inline code blocks
  collision_type: scope_ambiguity
  why_distracting: The agent might apply markdown backticks to the tokenizer name
    in the C++ exception message string (e.g., formatting it as `\`{}\``), but the
    rule explicitly only applies to docs, comments, and commit messages, not C++ string
    literals.
  severity: medium
  source:
    path: AGENTS.md
    lines: 5-5
- rule: write names of functions and methods as `f` instead of `f()`
  collision_type: would_cause_bug
  why_distracting: The agent might try to remove the parentheses from `SplitByStringTokenizer::getExternalName()`
    in the C++ code, mistakenly thinking the mathematical purity rule applies to code
    execution, which would cause a compilation error.
  severity: high
  source:
    path: AGENTS.md
    lines: 9-9
hierarchy_analysis: The config file AGENTS.md contains rules for documentation, comments,
  and commit messages. There is no deep hierarchy, and the rules are flat.
