hierarchy_analysis: The root `AGENTS.md` provides general monorepo guidelines (changesets,
  formatting, object methods). The `packages/component/AGENTS.md` provides component-specific
  API documentation. A critical meta-conflict arises because the task requires modifying
  the very API documented in `packages/component/AGENTS.md`. The agent must recognize
  that the prompt's instructions to change the API override the existing documentation
  in the Level 2 config file, and that the config file itself is a target for modification.
