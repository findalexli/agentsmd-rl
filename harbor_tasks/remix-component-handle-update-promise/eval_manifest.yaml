distractors:
- rule: '`handle.update(task?)` Schedules a component update. Optionally accepts a
    task to run after the update completes.'
  collision_type: meta_confusion
  why_distracting: The config file documents the old behavior of `handle.update(task?)`.
    An agent might be confused whether to follow the config file's API definition
    as a strict rule or follow the prompt's instruction to change the API and update
    this exact documentation file.
  severity: high
  source:
    path: packages/component/AGENTS.md
    lines: 154-156
- rule: 'Updating changes: If iterating on an unpublished change with a change file,
    update it in place rather than creating a new one.'
  collision_type: scope_ambiguity
  why_distracting: The agent might search for an existing unpublished change file
    to modify instead of creating a new one, wasting time or incorrectly modifying
    an unrelated changeset.
  severity: low
  source:
    path: AGENTS.md
    lines: 35-36
- rule: 'Functions: For callback-based APIs... prefer arrow functions over `function`
    expressions.'
  collision_type: rule_conflict
  why_distracting: The agent might try to use arrow functions for the `submit` or
    `click` handlers because they are callback-based APIs, conflicting with the more
    specific rule to use shorthand method syntax for object literals.
  severity: medium
  source:
    path: AGENTS.md
