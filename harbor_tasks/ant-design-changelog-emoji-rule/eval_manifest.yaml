config_edits:
- path: CLAUDE.md
  tier: 1
  gold_added: 每条 Changelog 仅选择一个 Emoji，不要在同一条目中叠加多个 Emoji。
  gold_removed: ''
rubric:
- rule: 'PR 标题始终使用英文，格式：`类型: 简短描述`'
  source:
    path: CLAUDE.md
    lines: '67'
    commit: f24ee27f7bd10d9f56f9293e129496e1c2188ef1
  evidence: The gold solution does not involve PR title changes; this rule constrains unrelated agent behavior.
  category: naming
  verification: llm_judge
- rule: 必须同时提供中英文两个版本
  source:
    path: CLAUDE.md
    lines: '106'
    commit: f24ee27f7bd10d9f56f9293e129496e1c2188ef1
  evidence: Gold edits both CHANGELOG.en-US.md and CHANGELOG.zh-CN.md with identical emoji fixes.
  category: architecture
  verification: llm_judge
- rule: '- **Emoji 置顶**：每条以 Emoji 开头

    - **不加冒号**：组件名后不使用英文冒号

    - **每条必含组件名**：正文必须出现对应组件名

    - **组件名不用反引号**：Modal、Button 等；属性名/API 用反引号

    - **中英空格**：中文与英文、数字、链接之间保留一个空格'
  source:
    path: CLAUDE.md
    lines: 115-119
    commit: f24ee27f7bd10d9f56f9293e129496e1c2188ef1
  evidence: 'Gold preserves the existing entry format: emoji at start, no colon, component name without backticks, API names in backticks, and proper spacing.'
  category: style
  verification: llm_judge
- rule: 描述"对开发者的影响"，而非"具体的实现细节"
  source:
    path: CLAUDE.md
    lines: '108'
    commit: f24ee27f7bd10d9f56f9293e129496e1c2188ef1
  evidence: Gold preserves the original developer-facing description without rephrasing in implementation terms.
  category: style
  verification: llm_judge
distractors:
- rule: '| ⌨️ ♿  | 可访问性增强           |'
  source:
    path: CLAUDE.md
    lines: '145'
    commit: f24ee27f7bd10d9f56f9293e129496e1c2188ef1
  collision_type: rule_conflict
  why_distracting: The Emoji table still lists the stacked accessibility emoji; an agent seeing both the table and the new single-emoji rule may update the table instead of just fixing the entries.
  severity: medium
- rule: 编写 Changelog 时，请参考 `CHANGELOG.zh-CN.md` 和 `CHANGELOG.en-US.md` 中已有条目的格式。
  source:
    path: CLAUDE.md
    lines: '150'
    commit: f24ee27f7bd10d9f56f9293e129496e1c2188ef1
  collision_type: scope_ambiguity
  why_distracting: The instruction to reference existing entries could lead agents to mimic older stacked-emoji entries, contradicting the new single-emoji rule.
  severity: medium
- rule: '- 忽略用户无感知的改动（内部重构、纯测试更新、工具链优化等）'
  source:
    path: CLAUDE.md
    lines: '107'
    commit: f24ee27f7bd10d9f56f9293e129496e1c2188ef1
  collision_type: meta_confusion
  why_distracting: An agent might classify the emoji cleanup as a user-imperceptible change and skip the changelog edit entirely.
  severity: low
