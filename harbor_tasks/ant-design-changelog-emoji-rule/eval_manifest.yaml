  origin: pr_diff
  description: CLAUDE.md must contain the new rule that each changelog entry uses only one emoji (the exact Chinese sentence added by the PR).
- id: test_claude_md_rule_in_changelog_section
  type: fail_to_pass
  origin: pr_diff
  description: The new rule must be placed inside the '## Changelog 规范' section, between the Emoji table and the existing 'reference existing entries' guidance.
- id: test_changelog_en_pr_57266_entry_has_single_emoji
  type: fail_to_pass
  origin: pr_diff
  description: 'The entry referencing PR #57266 in CHANGELOG.en-US.md must lose the stacked wheelchair emoji while keeping the keyboard emoji.'
- id: test_changelog_zh_pr_57266_entry_has_single_emoji
  type: fail_to_pass
  origin: pr_diff
  description: 'The entry referencing PR #57266 in CHANGELOG.zh-CN.md must lose the stacked wheelchair emoji while keeping the keyboard emoji.'
- id: test_changelog_en_pr_57266_text_unchanged
  type: fail_to_pass
  origin: pr_diff
  description: 'The body text (after the emoji) of the #57266 English entry must match the gold exactly.'
- id: test_changelog_zh_pr_57266_text_unchanged
  type: fail_to_pass
  origin: pr_diff
  description: 'The body text (after the emoji) of the #57266 Chinese entry must match the gold exactly.'
- id: test_only_unreleased_section_was_modified
  type: fail_to_pass
  origin: pr_diff
  description: Older, already-released changelog entries that used stacked emojis must remain unchanged; the new rule applies only to the current unreleased section.
- id: test_no_unintended_changelog_changes
  type: fail_to_pass
  origin: pr_diff
  description: Each changelog file should have exactly +1 -1 line of change relative to the base commit.
- id: test_repo_git_status_clean_of_unstaged_other_files
  type: pass_to_pass
  origin: repo_tests
  description: Sanity check that git rev-parse HEAD returns a valid SHA after the agent's edits.
- id: test_ci_test_lib_es_module_compile
  type: pass_to_pass
