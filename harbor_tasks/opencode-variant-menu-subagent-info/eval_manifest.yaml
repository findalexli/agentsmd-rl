- rule: Prefer functional array methods (flatMap, filter, map) over for loops
  source:
    path: AGENTS.md
    lines: 17-18
  evidence: In `subagent-footer.tsx`, the `siblings` array is computed using `.filter()` and `.toSorted()` rather than a traditional `for` loop.
  category: style
- rule: Avoid unnecessary destructuring. Use dot notation to preserve context.
  source:
    path: AGENTS.md
    lines: 51-59
  evidence: In `subagent-footer.tsx`, the gold solution accesses properties directly via `s.title`, `s.parentID`, and `s.id` rather than destructuring the session object.
  category: style
- rule: Rely on type inference when possible; avoid explicit type annotations
  source:
    path: AGENTS.md
    lines: 16-17
  evidence: 'The `subagentInfo` memo in `subagent-footer.tsx` does not declare an explicit return type, relying on TypeScript to infer the `{ label: string, index: number, total: number }` shape.'
  category: style
- rule: Use single word names by default for new locals, params, and helper functions.
  source:
    path: AGENTS.md
    lines: 18-31
  evidence: In `subagent-footer.tsx`, the gold solution uses single-word variable names like `s`, `label`, `siblings`, and `index` to adhere to the naming enforcement rule.
  category: naming
distractors:
- rule: Prefer `const` over `let`. Use ternaries or early returns instead of reassignment.
  collision_type: scope_ambiguity
  why_distracting: The existing `cycleSession` logic uses `let next = ...` and reassigns it if it goes out of bounds. An agent strictly following 'Prefer const over let' might try to refactor this into a complex ternary or modulo expression, which is out of scope for a simple direction inversion and risks introducing bugs.
  severity: medium
  source:
    path: AGENTS.md
    lines: 70-79
- rule: Avoid using the `any` type
  collision_type: scope_ambiguity
  why_distracting: 'The `ToolTitle` component contains `when: any`. An agent might try to fix this type violation by replacing `any` with a proper type, missing the fact that the component is entirely unreferenced and should just be deleted as per the hint.'
  severity: medium
  source:
    path: AGENTS.md
    lines: 13-14
