rubric:
- rule: '- **NO JavaScript files** - Convert to TypeScript (.ts/.tsx)'
  source:
    path: CLAUDE.md
    lines: '33'
    commit: 61fbfda501ef00d24e5dfeeabaf6b8220b73c4c7
  evidence: The swizzled file is created as index.tsx (TypeScript) rather than index.js (JavaScript).
  category: style
  verification: llm_judge
- rule: '- **Functional components** with hooks'
  source:
    path: CLAUDE.md
    lines: '80'
    commit: 61fbfda501ef00d24e5dfeeabaf6b8220b73c4c7
  evidence: MethodEndpoint is exported as a functional component that uses the useSelector hook (not a class component).
  category: architecture
  verification: llm_judge
- rule: '- **Avoid time-specific language** - Don''t use words like "now", "currently", "today" in code comments as they become outdated'
  source:
    path: CLAUDE.md
    lines: 96-97
    commit: 61fbfda501ef00d24e5dfeeabaf6b8220b73c4c7
  evidence: The swizzled file comment describes the bug and fix in timeless terms without words like now, currently, or today.
  category: style
  verification: llm_judge
- rule: '- **Avoid custom css and styles** - Follow antd best practices and avoid styling and custom CSS whenever possible'
  source:
    path: CLAUDE.md
    lines: '36'
    commit: 61fbfda501ef00d24e5dfeeabaf6b8220b73c4c7
  evidence: The gold component reuses the upstream CSS classes (openapi__method-endpoint, badge, openapi__method-endpoint-path, openapi__divider) without adding any custom styles or CSS.
  category: style
  verification: llm_judge
distractors:
- rule: '- **Avoid custom css and styles** - Follow antd best practices and avoid styling and custom CSS whenever possible'
  source:
    path: CLAUDE.md
    lines: '36'
    commit: 61fbfda501ef00d24e5dfeeabaf6b8220b73c4c7
  collision_type: scope_ambiguity
  why_distracting: The rule text ties avoid custom CSS to antd best practices, which may lead an agent to believe the constraint only applies to antd components and not to Docusaurus theme overrides in the docs/ subtree.
  severity: medium
- rule: '- **Use @superset-ui/core** - Don''t import Ant Design directly, prefer Ant Design component wrappers from @superset-ui/core/components'
  source:
    path: CLAUDE.md
    lines: '33'
    commit: 61fbfda501ef00d24e5dfeeabaf6b8220b73c4c7
  collision_type: architecture_boundary
  why_distracting: The rule mandates @superset-ui/core for UI components, but the Docusaurus docs/ subtree uses @docusaurus primitives instead; following this rule would add an unnecessary dependency to the swizzled component.
  severity: low
