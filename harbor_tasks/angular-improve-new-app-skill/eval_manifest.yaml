config_edits:
- path: skills/dev-skills/angular-new-app/SKILL.md
  gold_added: 'description: Creates a new Angular app using the Angular CLI. This skill should be used whenever a user wants to create a new Angular application and contains important guidelines for how to effectively create a modern Angular application.


    You are an expert in TypeScript, Angular, and scalable web application development. You write functional, maintainable, performant, and accessible code following Angular and TypeScript best practices. You have access to tools to create new Angular apps.


    Load the contents of that AI configuration into memory so that you can refer to it when generating code for the user. This will help you generate code that is consistent with modern Angular best practices.


    Consider these commonly useful flags based on the user''s requirements:

    - `--style=scss|css|less` — stylesheet format

    - `--routing` — add routing module

    - `--ssr` — enable server-side rendering

    - `--prefix=<prefix>` — component selector prefix

    - `--skip-tests` — only if the user explicitly requests it


    - To generate guards, use the Angular CLI `npx ng generate guard <guard-name>`

    - To generate interceptors, use the Angular CLI `npx ng generate interceptor <interceptor-name>`

    - To generate resolvers, use the Angular CLI `npx ng generate resolver <resolver-name>`

    - To generate enums, use the Angular CLI `npx ng generate enum <enum-name>`

    - To generate classes, use the Angular CLI `npx ng generate class <class-name>`

    '
  gold_removed: 'description: Creates a new Angular app using the Angular CLI. This skill should be used whenver a user wants to create a new Angular application and contains important guidelines for how to effectively create a modern Angular application.


    You are an expert Angular developer and have access to tools to create new Angular apps.


    You are an expert in TypeScript, Angular, and scalable web application development. You write functional, maintainable, performant, and accessible code following Angular and TypeScript best practices.


    Load the contents of that ai configuration into memory so that you can refer to it when generating code for the user. This will help you to generate code that is consistent with modern Angular best practices.

    '
rubric:
- id: conciseness_one_idea_per_sentence
  source:
    lines: Section I, 'Language and Grammar' → 'Conciseness'
    commit: 8fa66173523bb275d33de4bd43ce23947812922e
    path: .agent/skills/adev-writing-guide/SKILL.md
  rule: 'Edits favour conciseness — one idea per sentence, no redundant

    restatements (e.g., the duplicate persona intro is consolidated, not

    merely re-ordered or kept verbatim).

    '
- id: code_font_for_cli_tokens
  source:
    lines: Section I, 'Formatting and Organization' → 'Code formatting'
    commit: 8fa66173523bb275d33de4bd43ce23947812922e
    path: .agent/skills/adev-writing-guide/SKILL.md
  rule: 'CLI flags, command names, and option values are wrapped in backticks

    (code font) — never written as bare prose. New flags such as

    `--style`, `--routing`, `--ssr`, `--prefix`, `--skip-tests` and new

    generator commands like `npx ng generate guard <guard-name>` must

    use code formatting.

    '
- id: consistent_terminology
  source:
    lines: Section I, 'Language and Grammar' → 'Consistent terminology'
    commit: 8fa66173523bb275d33de4bd43ce23947812922e
    path: .agent/skills/adev-writing-guide/SKILL.md
  rule: 'The same term is used for the same concept throughout the document.

    In particular, new generator entries follow the existing pattern

    `To generate <plurals>, use the Angular CLI \`npx ng generate <kind>

    <kind-name>\`` — matching the wording and casing of the

    already-listed component / service / pipe / directive / interface

    entries.

    '
- id: second_person_voice
  source:
    lines: Section I, 'Language and Grammar' → 'Use second person'
    commit: 8fa66173523bb275d33de4bd43ce23947812922e
    path: .agent/skills/adev-writing-guide/SKILL.md
  rule: 'The SKILL.md is written in the second person ("you"). New content

    added by the agent should preserve that voice rather than switching

    to third person or imperative-only forms.

    '
