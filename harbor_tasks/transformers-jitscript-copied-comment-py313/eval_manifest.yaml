rubric:
- rule: PRs should be as brief as possible. Bugfix PRs in particular can often be
    only one or two lines long. Aim to minimize the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: 0e1978c9eb69ec64b55245212dbf63deab19d25b
- rule: You can break the '# Copied from' link if needed, but do not edit the content
    of a '# Copied from' block as it will be reverted by make fix-repo.
  source:
    path: CLAUDE.md
    lines: '66'
    commit: 0e1978c9eb69ec64b55245212dbf63deab19d25b
- rule: you can break the `# Copied from` link if needed.
  source:
    path: CLAUDE.md
    lines: 71-71
  evidence: The gold solution removes the `# Copied from` comments entirely from the
    affected functions in `deberta_v2` and `sew_d`, breaking the copy link to resolve
    the parsing error.
  category: architecture
distractors:
- rule: Ideally you should edit the code it's copying from and propagate the change
  collision_type: would_cause_bug
  why_distracting: The rule suggests editing the source code being copied from and
    propagating the change. However, the bug is caused by the `# Copied from` comment
    itself being placed between the decorator and the function definition. Editing
    the source function in `deberta` will not remove this comment in `deberta_v2`
    and `sew_d`, so the syntax error would persist.
  severity: high
  source:
    path: CLAUDE.md
    lines: 71-71
hierarchy_analysis: CLAUDE.md and AGENTS.md contain identical rules. The primary conflict
  is internal to the 'Copies and Modular Models' section, where the ideal path (editing
  the source) fails for this specific bug because the bug is in the copy mechanism's
  artifact (the comment itself) rather than the code logic.
