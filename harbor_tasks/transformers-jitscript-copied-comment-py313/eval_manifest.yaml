version: "2.0"

source:
  repo: "huggingface/transformers"
  pr: 44986
  base_commit: "0e1978c9eb69ec64b55245212dbf63deab19d25b"
  merge_commit: "2f6249179233e880770c1dbc47ea834ada29fe59"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Both affected files must be valid Python"

  - id: no_content_between_decorator_and_def
    type: fail_to_pass
    origin: pr_diff
    description: "No non-blank non-def content between @torch.jit.script decorator and def statement"

  - id: no_copied_from_breaks_jit_pattern
    type: fail_to_pass
    origin: pr_diff
    description: "'# Copied from' comments must not appear after @torch.jit.script decorators"

  - id: functions_preserved_with_signatures
    type: pass_to_pass
    origin: pr_diff
    description: "All three jit-scripted functions exist in both files with correct parameter names and decorator"

  - id: function_bodies_nontrivial
    type: pass_to_pass
    origin: static
    description: "Function bodies contain real tensor operations (>=3 Call+Subscript AST nodes), not stubs"

  - id: ruff_lint
    type: pass_to_pass
    origin: agent_config
    description: "Ruff lint (E,W,F rules) passes on both affected files"
    source:
      path: "CLAUDE.md"
      lines: "2"
      commit: "0e1978c9eb69ec64b55245212dbf63deab19d25b"

  - id: ruff_format_check
    type: pass_to_pass
    origin: repo_tests
    description: "Ruff format check passes on affected files (CI: make style)"

  - id: py_compile_deberta_v2
    type: pass_to_pass
    origin: repo_tests
    description: "Deberta V2 model file compiles without syntax errors"

  - id: py_compile_sew_d
    type: pass_to_pass
    origin: repo_tests
    description: "SEW-D model file compiles without syntax errors"

rubric:
  - rule: "PRs should be as brief as possible. Bugfix PRs in particular can often be only one or two lines long. Aim to minimize the size of the diff."
    source:
      path: ".github/copilot-instructions.md"
      lines: "15"
      commit: "0e1978c9eb69ec64b55245212dbf63deab19d25b"
  - rule: "You can break the '# Copied from' link if needed, but do not edit the content of a '# Copied from' block as it will be reverted by make fix-repo."
    source:
      path: "CLAUDE.md"
      lines: "66"
      commit: "0e1978c9eb69ec64b55245212dbf63deab19d25b"
