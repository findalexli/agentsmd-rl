rubric:
- rule: Replace sequential for-loops over test data with test.each() or describe.each()
    for parameterized tests to enable concurrent execution
  source:
    path: test/AGENTS.md
    lines: '4488'
    commit: a04817ce2b7f1a1e8b7cbf8af8f2c027ab072f1d
  reference: "The gold solution replaces:\n  for (const version of invalidVersions)\
    \ { await using proc = Bun.spawn(...); }\nwith:\n  test.each([...])(\"name\",\
    \ async ({ version }) => { await using proc = Bun.spawn(...); })\nThis removes\
    \ the flaky sequential loop pattern and enables concurrent test execution.\n"
- rule: Prefer concurrent tests over sequential tests when spawning processes.
  source:
    path: test/AGENTS.md
    lines: 18-20
  evidence: The gold solution replaces a sequential `for` loop with `test.each`, which
    allows the tests to run concurrently because the parent `describe` block is already
    marked with `.concurrent`.
  category: testing
- rule: When spawning Bun processes, use bunExe and bunEnv from harness.
  source:
    path: test/AGENTS.md
    lines: 24-25
  evidence: The gold solution continues to use `bunExe()` and `bunEnv` from the harness
    when calling `Bun.spawn` for the individual test cases.
  category: testing
- rule: 'CRITICAL: Do not set a timeout on tests.'
  source:
    path: test/AGENTS.md
    lines: 102-103
  evidence: The gold solution fixes the timeout issue by splitting the test cases
    to utilize individual timeout budgets, rather than adding a custom timeout parameter
    to the test function.
  category: testing
distractors:
- rule: test/bundler/ - Bundler and transpiler tests. Use itBundled helper.
  collision_type: scope_ambiguity
  why_distracting: The rule states to use the `itBundled` helper for tests in `test/bundler/`.
    Since this file is in `test/bundler/`, an agent might try to refactor the test
    to use `itBundled`. However, this test is specifically for the `--compile` CLI
    flag (which generates an executable), so `Bun.spawn` is required and `itBundled`
    is inappropriate.
  severity: high
  source:
    path: AGENTS.md
    lines: 46-47
- rule: When a test file spawns a Bun process, we like for that file to end in *-fixture.ts.
  collision_type: scope_ambiguity
  why_distracting: The rule suggests that files spawned by Bun in tests should end
    in `*-fixture.ts`. The test creates an inline `app.js` file using `tempDir`. An
    agent might unnecessarily rename this to `app-fixture.ts` or extract it, adding
    noise to the PR.
  severity: low
  source:
    path: test/AGENTS.md
    lines: 82-83
hierarchy_analysis: The config hierarchy is moderate, with `AGENTS.md` at the root
  and `test/AGENTS.md` providing specific testing overrides. The root config suggests
  using `itBundled` for the bundler directory, but the agent must recognize that this
  specific test's nature (CLI compilation) overrides that general directory-based
  rule.
