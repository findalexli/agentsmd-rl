rubric:
- rule: Use describe.each() or test.each() for parameterized tests rather than loops
  source:
    path: test/AGENTS.md
    lines: '4488'
    commit: a04817ce2b7f1a1e8b7cbf8af8f2c027ab072f1d
- rule: Prefer concurrent tests over sequential tests when tests spawn processes or
    write files
  source:
    path: test/AGENTS.md
    lines: '4266'
    commit: a04817ce2b7f1a1e8b7cbf8af8f2c027ab072f1d
- rule: 'Prefer concurrent tests over sequential tests: When multiple tests in the
    same file spawn processes or write files, make them concurrent'
  source:
    path: test/CLAUDE.md
    lines: 18-19
  evidence: The gold solution replaces a sequential `for` loop with `test.each`, which
    allows the individual test cases to run concurrently under the parent `describe.concurrent`
    block.
  category: testing
- rule: Generally, `await using` or `using` is a good idea to ensure proper resource
    cleanup.
  source:
    path: test/CLAUDE.md
    lines: 80-81
  evidence: The gold solution maintains the use of `using dir = tempDir(...)` and
    `await using proc = Bun.spawn(...)` inside the new `test.each` block to ensure
    proper resource cleanup for each concurrent test.
  category: style
distractors:
- rule: test/bundler/ - Bundler and transpiler tests. Use itBundled helper.
  collision_type: would_cause_bug
  why_distracting: The file is in `test/bundler/`, so the agent might try to rewrite
    the test using the `itBundled` helper. However, this test specifically tests the
    `--compile` flag to build a Windows executable, which requires spawning a process
    via `Bun.spawn`. `itBundled` is for JS bundling tests and cannot test executable
    compilation.
  severity: high
  source:
    path: CLAUDE.md
    lines: 35-35
- rule: For single-file tests, prefer `-e` over `tempDir`.
  collision_type: would_cause_bug
  why_distracting: The test creates a single `app.js` file, so the agent might try
    to use `-e` instead of `tempDir`. However, `bun build --compile` requires an actual
    file path on disk to compile into an executable, so `-e` would not work.
  severity: high
  source:
    path: CLAUDE.md
    lines: 44-44
- rule: When a test file spawns a Bun process, we like for that file to end in `*-fixture.ts`.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to extract the inline `app.js` into a separate
    `*-fixture.ts` file because the test spawns a Bun process. This is unnecessary
    refactoring that distracts from the core issue of fixing the flaky test timeout.
  severity: medium
  source:
    path: test/CLAUDE.md
    lines: 77-78
hierarchy_analysis: The hierarchy consists of root `CLAUDE.md`/`AGENTS.md` and `test/CLAUDE.md`/`test/AGENTS.md`.
  The test-specific configs provide more detailed guidance on testing style, such
  as preferring concurrent tests and specific rules for spawning processes. The root
  config suggests using `itBundled` for `test/bundler/`, but this conflicts with the
  specific needs of testing `--compile` which requires `Bun.spawn` as detailed in
  the test-specific config.
