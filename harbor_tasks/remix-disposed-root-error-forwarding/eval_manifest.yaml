    lines: '30'
    commit: 5ce4b49540814294c08af920bd2b582881349f29
  evidence: Gold patch uses `let parent = container` and `let isErrorForwardingAttached = false` for local variables in both createRoot and createRangeRoot
  category: naming
  verification: llm_judge
- rule: Use regular function declarations/expressions by default.
  source:
    path: AGENTS.md
    lines: '31'
    commit: 5ce4b49540814294c08af920bd2b582881349f29
  evidence: Gold patch defines `function forwardDomError`, `function attachDomErrorForwarding`, and `function detachDomErrorForwarding` as named function declarations
  category: style
  verification: llm_judge
- rule: Only add non-JSDoc comments when the code is doing something surprising or non-obvious
  source:
