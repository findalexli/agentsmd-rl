rubric:
- rule: Prefer `let` for locals, `const` only at module scope; never use `var`
  source:
    path: AGENTS.md
    lines: '30'
    commit: 5ce4b49540814294c08af920bd2b582881349f29
  evidence: Gold patch uses `let parent = container` and `let isErrorForwardingAttached = false` for local variables in both createRoot and createRangeRoot
  category: naming
  verification: llm_judge
- rule: Use regular function declarations/expressions by default.
  source:
    path: AGENTS.md
    lines: '31'
    commit: 5ce4b49540814294c08af920bd2b582881349f29
  evidence: Gold patch defines `function forwardDomError`, `function attachDomErrorForwarding`, and `function detachDomErrorForwarding` as named function declarations
  category: style
  verification: llm_judge
- rule: Only add non-JSDoc comments when the code is doing something surprising or non-obvious
  source:
    path: AGENTS.md
    lines: '37'
    commit: 5ce4b49540814294c08af920bd2b582881349f29
  evidence: Gold patch adds event-forwarding lifecycle management without any non-JSDoc comments
  category: style
  verification: llm_judge
- rule: 'Prettier (printWidth: 100, no semicolons, single quotes, spaces not tabs)'
  source:
    path: AGENTS.md
    lines: '34'
    commit: 5ce4b49540814294c08af920bd2b582881349f29
  evidence: 'Gold patch is formatted per Prettier: no semicolons, single quotes, spaces indentation'
  category: style
  verification: llm_judge
distractors:
- rule: For callback-based APIs (array methods, Promise callbacks, test callbacks, transaction callbacks, etc.), prefer arrow functions over `function` expressions.
  source:
    path: AGENTS.md
    lines: '31'
    commit: 5ce4b49540814294c08af920bd2b582881349f29
  collision_type: rule_conflict
  why_distracting: addEventListener is callback-based, which may lead models to use arrow functions for handlers; gold uses named function declarations so removeEventListener works
  severity: medium
- rule: Do not use `for` loops or conditional statements (`if`, `switch`, etc.) to generate test cases within `describe()` blocks.
  source:
    path: AGENTS.md
    lines: '41'
    commit: 5ce4b49540814294c08af920bd2b582881349f29
  collision_type: scope_ambiguity
  why_distracting: This rule applies only to test suite structure in describe() blocks, not to production code in src/lib/vdom.ts
  severity: low
- rule: Files in `src/lib` are implementation files. Do not add barrel-style re-exports or thin pass-through wrapper APIs between `src/lib` files.
  source:
    path: AGENTS.md
    lines: '19'
    commit: 5ce4b49540814294c08af920bd2b582881349f29
  collision_type: meta_confusion
  why_distracting: vdom.ts lives in src/lib; models may hesitate to add helper functions (forwardDomError, attachDomErrorForwarding, detachDomErrorForwarding) thinking they violate the wrapper-API rule, but these are legitimate private helpers, not re-export wrappers
  severity: medium
