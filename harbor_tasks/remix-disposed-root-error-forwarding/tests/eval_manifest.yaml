version: "2.0"

task:
  name: remix-disposed-root-error-forwarding
  title: Stop forwarding DOM error events from disposed virtual roots

source:
  repo: remix-run/remix
  pr_number: 11113
  pr_url: https://github.com/remix-run/remix/pull/11113
  base_commit: 5ce4b49540814294c08af920bd2b582881349f29
  merge_commit: 88642924de0d4a130167202e719689a3ddda107d
  primary_files:
    - packages/component/src/lib/vdom.ts

checks:
  # ------- f2p (fail-to-pass) -------
  - id: test_createroot_dispose_stops_forwarding
    type: fail_to_pass
    origin: pr_regression
    description: After createRoot.dispose(), bubbling DOM error events must not be forwarded.

  - id: test_createrangeroot_dispose_stops_forwarding
    type: fail_to_pass
    origin: pr_regression
    description: After createRangeRoot.dispose(), bubbling DOM error events must not be forwarded.

  - id: test_createroot_still_forwards_before_dispose
    type: fail_to_pass
    origin: behavioral_guard
    description: Before dispose(), error events on the root container are still forwarded (guards against over-fixing).

  - id: test_createrangeroot_still_forwards_before_dispose
    type: fail_to_pass
    origin: behavioral_guard
    description: Before dispose(), error events on a range-root host are still forwarded.

  - id: test_multiple_dispose_calls_safe
    type: fail_to_pass
    origin: behavioral_guard
    description: Calling dispose() multiple times must be a safe no-op (idempotent).

  # ------- p2p (pass-to-pass) — upstream regressions in the same files -------
  - id: test_p2p_existing_error_forwarding
    type: pass_to_pass
    origin: repo_tests
    description: Existing test for forwarding bubbling DOM error events still passes.

  - id: test_p2p_dispose_no_op_before_render
    type: pass_to_pass
    origin: repo_tests
    description: Existing test for dispose-before-first-render is still a no-op.

  - id: test_p2p_setup_error_dispatches
    type: pass_to_pass
    origin: repo_tests
    description: Setup-throw error dispatch still works.

  - id: test_p2p_render_error_dispatches
    type: pass_to_pass
    origin: repo_tests
    description: Render-throw error dispatch still works.

  - id: test_p2p_queueTask_error_dispatches
    type: pass_to_pass
    origin: repo_tests
    description: Sync queueTask-throw error dispatch still works.

  - id: test_p2p_sync_event_handlers
    type: pass_to_pass
    origin: repo_tests
    description: Sync event handlers attached via on() mixin still run.

  - id: test_p2p_range_root_renders_content
    type: pass_to_pass
    origin: repo_tests
    description: createRangeRoot still renders content between markers.

  - id: test_p2p_range_root_forwards_error
    type: pass_to_pass
    origin: repo_tests
    description: createRangeRoot still forwards bubbling DOM error events to listeners.

  # ------- repo CI checks -------
  - id: test_repo_typecheck
    type: pass_to_pass
    origin: repo_tests
    description: Repo's typecheck (tsc --noEmit) passes.

