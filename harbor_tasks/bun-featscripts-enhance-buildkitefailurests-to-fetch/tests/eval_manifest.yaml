distractors:
- rule: The file itself serves as the agent's instructions.
  collision_type: meta_confusion
  why_distracting: The agent is explicitly instructed to edit CLAUDE.md to add documentation.
    Since CLAUDE.md is typically a read-only system prompt/instruction file for the
    agent, the agent might refuse to edit it or get confused about modifying its own
    instructions.
  severity: high
  source:
    path: CLAUDE.md
    lines: 1-95
- rule: Tests use Bun's Jest-compatible test runner with proper test fixtures.
  collision_type: scope_ambiguity
  why_distracting: The config provides detailed instructions on how to write tests
    using bun:test, tempDir, and Bun.spawn. The agent might think it needs to write
    tests for the new features in buildkite-failures.ts, but the prompt only asks
    to enhance the script and update documentation.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 45-95
hierarchy_analysis: The config files CLAUDE.md and AGENTS.md are identical and sit
  at the root. The task is highly meta-referential because the agent must modify CLAUDE.md
  itself.
