version: "2.0"

source:
  repo: "sgl-project/sglang"
  pr: 21650
  base_commit: "afb32d76224e39d1226273d4a4a7fc568bd36b8c"
  merge_commit: "c06ca1526cb6008a8dacb4fdb06567e648134664"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "test_utils.py must parse without syntax errors"

  - id: test_repo_ruff_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "Repo CI: ruff check --select=E9 catches syntax errors"

  - id: test_repo_ruff_imports
    type: pass_to_pass
    origin: repo_tests
    description: "Repo CI: ruff check --select=F401,F821 catches import/name issues"

  - id: test_repo_ast_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Repo CI: Python AST validation passes"

  - id: test_repo_isort
    type: pass_to_pass
    origin: repo_tests
    description: "Repo CI: isort --check passes (import order)"

  - id: test_repo_black
    type: pass_to_pass
    origin: repo_tests
    description: "Repo CI: black --check passes (code formatting)"

  - id: dill_no_recursive_ref_warning
    type: fail_to_pass
    origin: pr_diff
    description: "dill.dumps on a CustomTestCase subclass must not emit recursive-ref PicklingWarnings"

  - id: no_circular_ref_in_setup_defaults
    type: fail_to_pass
    origin: pr_diff
    description: "safe_setUpClass must not hold a bound-method default that creates a circular reference"

  - id: dill_roundtrip_preserves_state
    type: pass_to_pass
    origin: pr_diff
    description: "dill round-trip preserves class attributes and name"

  - id: teardown_called_on_setup_failure
    type: pass_to_pass
    origin: pr_diff
    description: "tearDownClass still runs when setUpClass raises"

  - id: normal_setup_flow
    type: pass_to_pass
    origin: pr_diff
    description: "Normal setUpClass executes correctly and sets class state"

  - id: no_double_wrapping
    type: pass_to_pass
    origin: pr_diff
    description: "Subclass of subclass doesn't double-wrap setUpClass"

  - id: init_subclass_not_stub
    type: pass_to_pass
    origin: static
    description: "__init_subclass__ has meaningful logic, not gutted to pass/return"

rubric:
  - rule: "Always use CustomTestCase — never raw unittest.TestCase. It ensures tearDownClass runs even when setUpClass fails, preventing resource leaks in CI."
    source:
      path: ".claude/skills/write-sglang-test/SKILL.md"
      lines: "18"
      commit: "afb32d76224e39d1226273d4a4a7fc568bd36b8c"
  - rule: "tearDownClass must be defensive — use hasattr/null checks before accessing resources (e.g. cls.process) that setUpClass may not have finished allocating."
    source:
      path: ".claude/skills/write-sglang-test/SKILL.md"
      lines: "19"
      commit: "afb32d76224e39d1226273d4a4a7fc568bd36b8c"
