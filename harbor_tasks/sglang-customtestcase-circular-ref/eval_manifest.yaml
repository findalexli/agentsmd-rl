  severity: low
- rule: Defensive tearDownClass implementation
  source:
    path: .claude/skills/write-sglang-test/SKILL.md
    lines: 13-13
  source_text: 2. **`tearDownClass` must be defensive** â€” use `hasattr`/null checks
