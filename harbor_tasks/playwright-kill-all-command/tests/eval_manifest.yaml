distractors:
- rule: Create corresponding MCP tool
  source:
    path: .claude/skills/playwright-mcp-dev/SKILL.md
    lines: 8-12, 24
  source_text: '## Adding MCP Tools

    - Create a new tool in `packages/playwright/src/mcp/browser/tools/your-tool.ts`

    - Register the tool in `packages/playwright/src/mcp/browser/tools.ts`

    - Add ToolCapability in `packages/playwright/src/mcp/config.d.ts`

    - Place new tests in `tests/mcp/mcp-<category>.spec.ts`

    ...

    - CLI commands are based on MCP tools. Implement the corresponding MCP tool as
    per `Adding MCP Tools` section above, if needed.'
  collision_type: architecture_boundary
  why_distracting: An agent reading that 'CLI commands are based on MCP tools' might
    mistakenly try to implement a new MCP browser tool for 'kill-all'. However, 'kill-all'
    is a purely terminal-level utility for managing daemon processes with no browser
    interaction component, so creating an MCP tool for it would be incorrect and violate
    architectural boundaries.
  severity: high
