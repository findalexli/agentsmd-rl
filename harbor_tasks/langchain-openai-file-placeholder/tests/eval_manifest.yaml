source_pr:
  owner: langchain-ai
  repo: langchain
  number: 36433
  merge_commit: bdfd4462ac89f909fce97663ab17fc312544c17e
  base_commit: 86238a775edc438add00836fb89d6879bbd8f1ed

task_metadata:
  name: langchain-openai-file-placeholder
  description: |
    Impute placeholder filenames for OpenAI file inputs. When a file block
    lacks a filename, the translator should add "LC_AUTOGENERATED" as a
    default placeholder instead of leaving it out.

  # Primary file that needs modification
  target_file: libs/core/langchain_core/messages/block_translators/openai.py

  # Distinctive line for idempotency check
  distinctive_line: "LC_AUTOGENERATED"

checks:
  # Fail-to-pass tests - these verify the bug fix
  - id: test_placeholder_filename_added
    type: fail_to_pass
    origin: behavioral
    description: |
      File blocks without filename get LC_AUTOGENERATED placeholder.
      Before fix: no filename key in result. After fix: filename is "LC_AUTOGENERATED".

  - id: test_placeholder_filename_various_mime_types
    type: fail_to_pass
    origin: behavioral
    description: |
      Placeholder filename works for various mime types (pdf, png, jpeg, text).

  - id: test_warning_includes_placeholder_info
    type: fail_to_pass
    origin: behavioral
    description: |
      Warning message mentions the LC_AUTOGENERATED placeholder filename.

  - id: test_file_block_data_structure
    type: fail_to_pass
    origin: behavioral
    description: |
      Complete file block output structure is valid for OpenAI API.

  # Pass-to-pass tests - these verify nothing else broke
  - id: test_existing_filename_preserved
    type: pass_to_pass
    origin: behavioral
    description: |
      File blocks with existing filename are not modified - backwards compatibility.

  - id: test_ruff_linting
    type: pass_to_pass
    origin: repo_tests
    description: |
      Code passes ruff linting as required by the repo.

  - id: test_repo_unit_tests_block_translators
    type: pass_to_pass
    origin: repo_tests
    description: |
      Repo unit tests for block_translators module pass.

  - id: test_repo_unit_tests_messages
    type: pass_to_pass
    origin: repo_tests
    description: |
      Repo unit tests for messages module pass.

  - id: test_repo_ruff_format
    type: pass_to_pass
    origin: repo_tests
    description: |
      Code passes ruff format check as required by the repo.

  # Agent config rules extracted from CLAUDE.md and AGENTS.md
  - id: type_hints_present
    type: fail_to_pass
    origin: agent_config
    source:
      file: CLAUDE.md
      description: "All Python code MUST include type hints and return types"

  - id: stable_public_interfaces
    type: fail_to_pass
    origin: agent_config
    source:
      file: CLAUDE.md
      description: "Always attempt to preserve function signatures, argument positions, and names for exported/public methods"

rubric:
  # Soft/subjective rules from agent configs that apply to this PR
  - id: conventional_commit_format
    description: |
      Commit follows Conventional Commits format with appropriate scope.
      Example: "feat(core): impute placeholder filenames for OpenAI file inputs"
    source:
      file: CLAUDE.md
      section: "Commits must follow Conventional Commits format"

  - id: unit_test_quality
    description: |
      Unit tests are included that verify the fix without making network calls.
      Tests should fail before the fix and pass after.
    source:
      file: CLAUDE.md
      section: "Unit tests are required for new functionality"

  - id: google_style_docstrings
    description: |
      Code uses Google-style docstrings for public methods.
    source:
      file: CLAUDE.md
      section: "Use Google-style docstrings"

  - id: no_eval_exec
    description: |
      No use of eval(), exec(), or pickle on user-controlled input.
    source:
      file: CLAUDE.md
      section: "Security: Never use eval(), exec(), or pickle on user-controlled input"
