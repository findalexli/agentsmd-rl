name = "langchain-openai-file-placeholder"
title = "Impute placeholder filenames for OpenAI file inputs"
description = """
When converting file blocks to OpenAI format, the translator should add a
placeholder filename "LC_AUTOGENERATED" when none is provided, instead of
leaving the filename out entirely. This allows tools to work without needing
to know the target model type.
"""

difficulty = "easy"
tags = ["python", "langchain", "file-handling", "backward-compatibility"]

# Estimated time (in minutes) for an agent to complete this task
time_estimate = 15

[metadata]
# The PR that this task is based on
source_pr = "https://github.com/langchain-ai/langchain/pull/36433"

# Main file that needs to be modified
target_file = "libs/core/langchain_core/messages/block_translators/openai.py"

# Programming language
language = "python"

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
