rubric:
  - id: doc_comments_on_exported_items
    source:
      path: packages/adapter-pg/src/pg.ts
    description: Documentation comments should be written for exported items. The PR adds doc comments to the new PrismaPgOptions fields explaining their purpose and behavior.
    reference: |
      The PR adds JSDoc comments to all PrismaPgOptions fields including:
      - schema?: string with comment "The name of the schema to use in generated queries"
      - disposeExternalPool?: boolean with multi-line comment about pool.end() behavior
      - onPoolError?: (err: Error) => void with comment "Callback attached to the pool's 'error' events"
      - onConnectionError?: (err: Error) => void with comment "Callback attached to connection's 'error' events"
      - userDefinedTypeParser?: UserDefinedTypeParser with multi-line comment about parser behavior
      - statementNameGenerator?: StatementNameGenerator with multi-line comment about statement caching
    weight: 1

  - id: adapter_option_pattern
    source:
      path: packages/adapter-pg/src/pg.ts
    description: When adding new options to driver adapters, follow the established pattern of defining the option type, adding it to the options interface, and using it in the implementation.
    reference: |
      The PR follows the adapter option pattern by:
      1. Defining the new type: export type StatementNameGenerator = (query: SqlQuery) => string
      2. Adding the option to PrismaPgOptions interface: statementNameGenerator?: StatementNameGenerator
      3. Using the option in queryRaw: name: this.pgOptions?.statementNameGenerator?.(query)
    weight: 2
