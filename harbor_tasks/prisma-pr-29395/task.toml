name = "prisma-adapter-pg-statement-name-generator"
duration = "medium"
description = "Add statementNameGenerator option to Prisma PostgreSQL adapter for prepared statement caching"

# Primary files the PR modifies
target_file = "packages/adapter-pg/src/pg.ts"
target_test = "packages/adapter-pg/src/__tests__/pg.test.ts"

prisma_adapter_pg = true

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
