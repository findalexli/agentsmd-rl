  evidence: The gold solution adds `pgoGenerate` and `pgoUse` to the single `Config`
    and `PartialConfig` interfaces, and resolves their absolute paths and mutual exclusivity
    exactly once inside the `resolveConfig
  category: architecture
- rule: One flat table per flag category. Each flag has a when predicate and a desc.
  source:
    path: scripts/build/CLAUDE.md
    lines: 21-22
  evidence: The gold solution adds the PGO compiler and linker flags to the centralized
    `globalFlags` and `linkerFlags` arrays in `scripts/build/flags.ts` rather than
    scattering them across different configuratio
  category: architecture
distractors:
- rule: nested-cmake — invoke the dep's own cmake configure + build as ninja edges.
    Flags forwarded via -DCMAKE_C_FLAGS
  collision_type: architecture_boundary
  why_distracting: The rule states that for nested-cmake dependencies, flags are forwarded
    via `-DCMAKE_C_FLAGS`. An agent might try to implement PGO flag forwarding globally
    for all cmake dependencies in `source.ts`. However, WebKit specifically clears
    global dependency flags to avoid conflicts with its own optimizations, requiring
    the PGO flags to be explicitly appended to `optFlags` within `scripts/build/deps/webkit.ts`
    instead.
  severity: high
  source:
    path: scripts/build/CLAUDE.md
    lines: 31-33
- rule: Build flags (e.g. --asan=off) go before the exec args; see scripts/build.ts
    header for the full arg routing rules.
  collision_type: scope_ambiguity
  why_distracting: The rule mentions that build flags go before exec args and points
    to the `scripts/build.ts` header for full arg routing rules. An agent might get
    distracted trying to implement complex argument routing logic or modifying the
    header documentation, when all that is actually required is adding the new keys
    to the `parseArgs` allowed keys array.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 26-27
hierarchy_analysis: The repository has a root `CLAUDE.md` (and identical `AGENTS.md`)
  focusing on high-level build commands and testing, and a specialized `scripts/build/CLAUDE.md`
  focusing on the architecture of the TypeScript build system itself. For this task,
  the specialized build system rules in `scripts/build/CLAUDE.md` take precedence,
  as the PR involves modifying the core configuration and flag resolution mechanisms
  of the build system.
