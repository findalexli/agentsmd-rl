distractors:
- rule: nested-cmake — invoke the dep's own cmake configure + build as ninja edges.
    Flags forwarded via `-DCMAKE_C_FLAGS`
  collision_type: architecture_boundary
  why_distracting: The agent might assume PGO flags added to the global flags table
    will automatically be forwarded to WebKit via `CMAKE_C_FLAGS`, but WebKit's cmake
    configuration clears global flags, requiring explicit forwarding in `webkit.ts`.
  severity: high
  source:
    path: scripts/build/CLAUDE.md
    lines: 32-34
- rule: 'The smell: if configure code calls `spawnSync` to compile something... Make
    it a build edge — `n.rule()` + `n.build()`.'
  collision_type: scope_ambiguity
  why_distracting: The agent might try to add a ninja rule to run `llvm-profdata merge`
    to generate the `.profdata` file as a build edge, but the instruction only asks
    to accept the `--pgo-use=<file.profdata>` flag and forward it.
  severity: medium
  source:
    path: scripts/build/CLAUDE.md
    lines: 44-45
hierarchy_analysis: The task requires understanding the build system architecture
  described in `scripts/build/CLAUDE.md`. The agent must navigate the `Config` struct,
  the flag tables, and the dependency-specific overrides (WebKit). The instructions
  in `scripts/build/CLAUDE.md` provide the architectural principles (flat config,
  explicit over implicit) that guide the implementation, while the agent must also
  recognize the boundary where global flags do not automatically apply to nested cmake
  dependencies.
rubric:
- rule: One flat Config struct. All derived booleans computed once in resolveConfig().
  source:
    path: scripts/build/CLAUDE.md
    lines: 18-20
  evidence: Adds `pgoGenerate` and `pgoUse` to the `Config` and `PartialConfig` interfaces,
    and resolves their absolute paths centrally in `resolveConfig()`, keeping the
    configuration flat.
  category: architecture
  verification: llm_judge
- rule: First-class support for deps with their own build systems. Vendored deps keep
    their native cmake/cargo... Flags forwarded via -DCMAKE_C_FLAGS
  source:
    path: scripts/build/CLAUDE.md
    lines: 31-33
  evidence: Explicitly forwards `-fprofile-generate` and `-fprofile-use` to WebKit's
    `optFlags` in `scripts/build/deps/webkit.ts` to ensure the nested CMake build
    receives the PGO instructions.
  category: architecture
  verification: llm_judge
