rubric:
- rule: Avoid using the `any` type
  source:
    path: AGENTS.md
- rule: Prefer `const` over `let`. Use ternaries or early returns instead of reassignment.
  source:
    path: AGENTS.md
- rule: Rely on type inference when possible; avoid explicit type annotations or interfaces
    unless necessary for exports or clarity
  source:
    path: AGENTS.md
- rule: Avoid unnecessary destructuring. Use dot notation to preserve context.
  source:
    path: AGENTS.md
    lines: 64-73
  evidence: The gold solution accesses `params.maxOutputTokens` directly using dot
    notation when passing it to the provider payload, rather than destructuring `maxOutputTokens`
    from `params`.
  category: style
distractors:
- rule: Use single word names by default for new locals, params, and helper functions.
  collision_type: would_cause_bug
  why_distracting: The agent might try to rename `maxOutputTokens` to a single word
    like `tokens` or `limit` to satisfy the strict single-word naming rule. However,
    `maxOutputTokens` is an existing property name in the provider API and the `chat.params`
    hook output. Changing it would break the API contract and cause bugs.
  severity: high
  source:
    path: AGENTS.md
    lines: 34-45
- rule: Rely on type inference when possible; avoid explicit type annotations or interfaces
    unless necessary for exports or clarity
  collision_type: scope_ambiguity
  why_distracting: 'The agent might avoid adding the explicit type `maxOutputTokens:
    number | undefined` to the `Hooks` interface in `packages/plugin/src/index.ts`,
    thinking it should be inferred. But since it''s an exported interface defining
    a plugin hook contract, explicit typing is required.'
  severity: medium
  source:
    path: AGENTS.md
    lines: 20-21
hierarchy_analysis: The root `AGENTS.md` provides general TypeScript styling rules
  (naming, destructuring, variables). The `packages/opencode/AGENTS.md` provides Effect
