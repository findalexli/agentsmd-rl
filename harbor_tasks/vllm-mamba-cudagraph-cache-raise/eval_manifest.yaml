    description: "_init_minimal_kv_cache_for_profiling must signal profiling to skip Mamba block validation"

  - id: no_silent_cap_reference_in_runner
    type: fail_to_pass
    origin: pr_diff
    description: "gpu_model_runner.py must not reference the removed silent-capping method"

  - id: is_profiling_param_threaded
    type: fail_to_pass
    origin: pr_diff
    description: "is_profiling parameter accepted by initialize_kv_cache, initialize_attn_backend, and _check_and_update_cudagraph_mode"

  - id: kv_cache_forwards_profiling_to_attn_backend
    type: fail_to_pass
    origin: pr_diff
    description: "initialize_kv_cache forwards profiling signal to initialize_attn_backend"

  - id: spec_decode_adjustment_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "adjust_cudagraph_sizes_for_spec_decode must still exist in CompilationConfig"

  - id: core_methods_preserved
    type: pass_to_pass
    origin: static
    description: "Key methods preserved in gpu_model_runner.py"

  - id: check_cudagraph_mode_not_stub
    type: pass_to_pass
    origin: static
    description: "_check_and_update_cudagraph_mode has real logic, not a stub"

rubric: []
