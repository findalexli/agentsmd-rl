source_pr:
  owner: MystenLabs
  repo: sui
  number: 26041
  title: "sui-rpc-resolver in Analytics Indexer"
  merge_commit: 8a866b804e6b1008de776e12df7a5f629e0fdf41
  base_commit: 591ac7c96a2877709479724edeea7038d01f064b

task:
  name: sui-analytics-indexer-rpc-resolver
  title: "Migrate analytics indexer from custom PackageCache to sui-rpc-resolver"
  description: |
    The analytics indexer uses a custom 2-level package cache (in-memory LRU + RocksDB) for type layouts.
    This cache has stale cache issues when system packages change during epoch transitions. Migrate to
    use sui-rpc-resolver instead, with proper cache eviction on epoch changes via a new SystemPackageEviction handler.

checks:
  - id: compilation
    description: "Crate compiles successfully after migration"
    type: f2p
    test_function: test_cargo_check_passes
    points: 15

  - id: eviction_module_exists
    description: "SystemPackageEviction handler module exists with correct structure"
    type: f2p
    test_function: test_system_package_eviction_module_exists
    points: 15

  - id: old_cache_removed
    description: "Old PackageCache module is removed"
    type: f2p
    test_function: test_old_package_cache_removed
    points: 10

  - id: package_store_not_in_lib
    description: "package_store is no longer declared in lib.rs"
    type: f2p
    test_function: test_package_store_not_in_lib
    points: 10

  - id: handlers_use_new_resolver
    description: "Handlers use PackageStoreWithLruCache instead of PackageCache"
    type: f2p
    test_function: test_handlers_use_new_resolver
    points: 15

  - id: object_processor_rpc_client
    description: "ObjectProcessor has new rpc_client field and get_original_package_id method"
    type: f2p
    test_function: test_object_processor_has_rpc_client
    points: 10

  - id: cargo_toml_updated
    description: "Cargo.toml has sui-rpc-resolver and removed old dependencies"
    type: f2p
    test_function: test_cargo_toml_dependencies_updated
    points: 10

  - id: indexer_uses_rpc_store
    description: "indexer.rs uses RpcPackageStore with cache and registers SystemPackageEviction"
    type: f2p
    test_function: test_indexer_uses_rpc_package_store
    points: 10

  - id: pipeline_signature
    description: "pipeline.rs has updated function signature with rpc_url parameter"
    type: f2p
    test_function: test_pipeline_signature_updated
    points: 5

