distractors:
- rule: 'Storage Layer: Uses RocksDB for persistent storage'
  collision_type: architecture_boundary
  why_distracting: The architecture section states that the storage layer uses RocksDB for persistent storage. The agent might try to retain RocksDB usage for the new package cache or implement a RocksDB layer for `sui-rpc-resolver`, conflicting with the instruction to remove the old package cache and use the built-in caching of `sui-rpc-resolver`.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 65-66
hierarchy_analysis: The hierarchy is flat, with only root-level `CLAUDE.md` and `AGENTS.md` files applying to the task. The agent must apply the root-level license header rule to the newly created file.
