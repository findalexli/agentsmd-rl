rubric:
- rule: 'All new files must start with the Mysten Labs license header: // Copyright
    (c) Mysten Labs, Inc. and // SPDX-License-Identifier: Apache-2.0'
  source:
    path: CLAUDE.md
    lines: 17-20
    commit: 591ac7c96a2877709479724edeea7038d01f064b
- rule: 'Never use #[allow(dead_code)], #[allow(unused)], or any other linting suppressions
    - fix the underlying issues instead'
  source:
    path: CLAUDE.md
    lines: '113'
    commit: 591ac7c96a2877709479724edeea7038d01f064b
- rule: Code must pass cargo xclippy without warnings or suppressions
  source:
    path: CLAUDE.md
    lines: 59-60
    commit: 591ac7c96a2877709479724edeea7038d01f064b
- rule: All new files must start with the Mysten Labs copyright and Apache-2.0 license
    header.
  source:
    path: CLAUDE.md
    lines: 16-20
  evidence: 'The newly created file `crates/sui-analytics-indexer/src/handlers/system_package_eviction.rs`
    starts exactly with the required `// Copyright (c) Mysten Labs, Inc.` and `//
    SPDX-License-Identifier: Apa'
  category: style
distractors:
- rule: Core Components Structure lists `sui-indexer-alt` as the primary indexer and
    omits `sui-analytics-indexer`.
  collision_type: scope_ambiguity
  why_distracting: The architecture diagram lists `sui-indexer-alt` as the 'Blockchain
    data indexer' but completely omits `sui-analytics-indexer`. An agent might incorrectly
    assume it should modify `sui-indexer-alt` instead of `sui-analytics-indexer`,
    or try to migrate the analytics indexer into `sui-indexer-alt` to match the documented
    core structure.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 58-68
hierarchy_analysis: The repository uses a root `CLAUDE.md` and `AGENTS.md`. The root
  `CLAUDE.md` provides general guidelines, including license headers which are strictly
  followed in the new `system_package_eviction.rs` file. The architecture section
  in `CLAUDE.md` is incomplete regarding the analytics indexer, which could cause
  scope confusion, but the prompt explicitly directs the agent to the analytics indexer.
version: '2.0'
