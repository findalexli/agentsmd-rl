source_pr:
  owner: MystenLabs
  repo: sui
  number: 26041
  title: sui-rpc-resolver in Analytics Indexer
  merge_commit: 8a866b804e6b1008de776e12df7a5f629e0fdf41
  base_commit: 591ac7c96a2877709479724edeea7038d01f064b
task:
  name: sui-analytics-indexer-rpc-resolver
  title: Migrate analytics indexer from custom PackageCache to sui-rpc-resolver
  description: 'The analytics indexer uses a custom 2-level package cache (in-memory
    LRU + RocksDB) for type layouts.

    This cache has stale cache issues when system packages change during epoch transitions.
    Migrate to

    use sui-rpc-resolver instead, with proper cache eviction on epoch changes via
    a new SystemPackageEviction handler.

    '
