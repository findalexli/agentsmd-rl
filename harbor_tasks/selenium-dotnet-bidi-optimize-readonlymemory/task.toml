name = "selenium-dotnet-bidi-optimize-readonlymemory"
difficulty = "medium"
language = "csharp"
timeout = 1800
verifier_timeout = 120
tags = [".net", "bidi", "performance", "async", "websocket"]

[description]
brief = "Optimize Selenium .NET BiDi transport to use ReadOnlyMemory<byte> for better performance"
detail = """
This task involves optimizing the BiDi (Bidirectional) protocol transport interface in Selenium's .NET bindings.
The changes improve performance and compatibility, especially for .NET 8 and later, by:
1. Changing ITransport.SendAsync to use ValueTask and ReadOnlyMemory<byte> instead of Task and byte[]
2. Updating WebSocketTransport implementation with conditional compilation for .NET 8+ optimizations
3. Changing TaskCompletionSource.SetResult/SetException to TrySetResult/TrySetException in Broker.cs
"""

