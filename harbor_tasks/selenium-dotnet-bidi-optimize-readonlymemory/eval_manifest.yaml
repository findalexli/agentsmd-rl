source_pr:
  owner: SeleniumHQ
  repo: selenium
  number: 17205
  title: "[dotnet] [bidi] Optimize commands via ReadOnlyMemory"
  merge_commit: 2feac4e4feb3f58c8b5ef8f9eed04f9e0fc9ab5f
  base_commit: c9cfcf888c0bf1021bd71da029301fedda71f6a9

target_files:
  - dotnet/src/webdriver/BiDi/ITransport.cs
  - dotnet/src/webdriver/BiDi/WebSocketTransport.cs
  - dotnet/src/webdriver/BiDi/Broker.cs

# Checks are evaluated in order; first failure stops evaluation.
# All checks must pass for the task to be considered successful.
checks:
  - id: "1"
    name: "ITransport signature"
    description: "ITransport.SendAsync uses ValueTask and ReadOnlyMemory<byte>"
    type: "test_outputs"
    origin: "fail_to_pass"

  - id: "2"
    name: "WebSocketTransport signature"
    description: "WebSocketTransport.SendAsync matches interface signature"
    type: "test_outputs"
    origin: "fail_to_pass"

  - id: "3"
    name: "WebSocketTransport .NET 8+ optimization"
    description: "WebSocketTransport uses .NET 8+ optimizations with conditional compilation"
    type: "test_outputs"
    origin: "fail_to_pass"

  - id: "4"
    name: "WebSocketTransport fallback"
    description: "WebSocketTransport has fallback for older .NET versions"
    type: "test_outputs"
    origin: "fail_to_pass"

  - id: "5"
    name: "Broker TrySetResult"
    description: "Broker.cs uses TrySetResult instead of SetResult"
    type: "test_outputs"
    origin: "fail_to_pass"

  - id: "6"
    name: "Broker TrySetException"
    description: "Broker.cs uses TrySetException instead of SetException"
    type: "test_outputs"
    origin: "fail_to_pass"

  - id: "7"
    name: "Compilation"
    description: "Project compiles successfully"
    type: "test_outputs"
    origin: "pass_to_pass"

  - id: "8"
    name: "Idempotency"
    description: "Patch has been applied (idempotency check)"
    type: "test_outputs"
    origin: "pass_to_pass"

# Agent config rules to validate
agent_config:
  - rule: "Maintain API/ABI compatibility"
    source: "AGENTS.md"
    description: "Changes maintain backward compatibility - interface change is internal (ITransport is internal interface)"
    type: "behavioral"
    test_ref: "test_compilation"

  - rule: "Async patterns"
    source: "dotnet/AGENTS.md"
    description: "Codebase is migrating to async - using ValueTask for better performance in high-throughput scenarios"
    type: "behavioral"
    test_ref: "test_itransport_signature,test_websocket_transport_signature"

# Rubric for LLM-judge evaluation (soft/subjective rules)
rubric: []
