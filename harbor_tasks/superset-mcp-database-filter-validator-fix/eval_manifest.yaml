    type: "fail_to_pass"
    origin: "pr_diff"

  - id: "test_database_error_has_timezone_aware_timestamp"
    name: "DatabaseError has timezone-aware timestamp"
    description: "DatabaseError.create() should produce timezone-aware timestamps via code execution"
    test: "test_database_error_has_timezone_aware_timestamp"
    type: "fail_to_pass"
    origin: "pr_diff"

  - id: "test_humanize_timestamp_handles_aware_datetime"
    name: "_humanize_timestamp handles aware datetimes"
    description: "_humanize_timestamp should handle both aware and naive datetimes correctly"
