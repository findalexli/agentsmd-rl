    type: "fail_to_pass"
    origin: "pr_diff"

  - id: "test_schemas_py_imports_field_validator"
    name: "schemas.py imports field_validator"
    description: "schemas.py should import field_validator from pydantic via code execution"
    test: "test_schemas_py_imports_field_validator"
    type: "fail_to_pass"
    origin: "pr_diff"

  - id: "test_schemas_py_imports_parse_utilities"
    name: "schemas.py imports parse utilities"
    description: "schemas.py should import parse_json_or_list and parse_json_or_model_list from schema_utils via code execution"
    test: "test_schemas_py_imports_parse_utilities"
    type: "fail_to_pass"
