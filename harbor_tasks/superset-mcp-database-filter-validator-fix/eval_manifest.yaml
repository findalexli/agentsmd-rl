  source:
    path: CLAUDE.md
    lines: 42-44
  evidence: The gold solution applies patches that add Pydantic `@field_validator`
    decorators to `ListDatabasesRequest` to parse JSON strings into native Python
    lists, which enforces backend type safety and prope
  category: architecture
distractors:
- rule: 'UUID Migration: Use UUIDs in public APIs instead of internal integer IDs.'
  collision_type: scope_ambiguity
  why_distracting: The task requires adding `created_by_fk` and `changed_by_fk` to
    `DatabaseFilter` to allow querying by user ID. The rule mandates using UUIDs in
    public APIs instead of internal integer IDs. An agent might try to convert these
    foreign keys to UUIDs or initiate a UUID migration for these fields, which is
    out of scope for a simple filter addition and would break the existing 'find my
    databases' query logic.
  severity: high
  source:
    path: CLAUDE.md
    lines: 47-50
- rule: ALWAYS run pre-commit run --all-files before pushing commits.
  collision_type: scope_ambiguity
  why_distracting: The rule strictly mandates running `pre-commit run --all-files`
    and fixing all formatting/linting issues. An agent might attempt to fix pre-existing
    linting or typing errors across the entire repository or in the modified files,
    bloating the PR with unrelated changes instead of focusing purely on the MCP service
    fixes.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 6-18
hierarchy_analysis: The repository contains identical `CLAUDE.md` and `AGENTS.md`
  files at the root level. Both provide the same set of rules regarding backend type
  safety, UUID migrations, and pre-commit hooks. There are no conflicts between the
  files, but agents must carefully scope the UUID migration rule to avoid applying
  it to existing integer foreign keys being exposed in filters.
