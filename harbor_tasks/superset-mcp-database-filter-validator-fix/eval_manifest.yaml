    description: "DatabaseFilter should accept created_by_fk as valid filter column via code execution"
    test: "test_database_filter_accepts_created_by_fk"
    type: "fail_to_pass"
    origin: "pr_diff"

  - id: "test_database_filter_accepts_changed_by_fk"
    name: "DatabaseFilter accepts changed_by_fk"
    description: "DatabaseFilter should accept changed_by_fk as valid filter column via code execution"
    test: "test_database_filter_accepts_changed_by_fk"
    type: "fail_to_pass"
    origin: "pr_diff"

  - id: "test_list_databases_request_parses_json_filters"
    name: "ListDatabasesRequest parses JSON filters"
    description: "ListDatabasesRequest field_validator should parse JSON string for filters field"
    test: "test_list_databases_request_parses_json_filters"
    type: "fail_to_pass"
    origin: "pr_diff"

  - id: "test_list_databases_request_parses_json_select_columns"
