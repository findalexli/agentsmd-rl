version: "1.0"

task:
  name: "superset-pivot-table-date-formatting"
  description: "Fix pivot table showing '0NaN' in headers when using Date/Timestamp data by safely casting numeric strings to numbers."
  source:
    pr: "https://github.com/apache/superset/pull/38953"
    repo: "https://github.com/apache/superset"
    base_commit: "e0a0a2254265cce88e5dfca1c3b3ca8b8e155122"
    merge_commit: "f1cd1ae7100a6addc620f1a78e51749254d64d4e"

checks:
  # Fail-to-pass tests for the core bug fix
  - id: "f2p_helper_exists"
    name: "convertToNumberIfNumeric function exists"
    description: "The helper function with proper TypeScript signature exists"
    test: "test_convert_to_number_if_numeric_function_exists"
    type: "fail_to_pass"

  - id: "f2p_uses_number_cast"
    name: "Function uses Number() and Number.isNaN()"
    description: "Helper uses proper numeric conversion and NaN checking"
    test: "test_convert_to_number_if_numeric_uses_number_cast"
    type: "fail_to_pass"

  - id: "f2p_handles_empty_strings"
    name: "Function handles empty strings"
    description: "Empty strings are not converted to 0"
    test: "test_convert_to_number_if_numeric_handles_empty_strings"
    type: "fail_to_pass"

  - id: "f2p_col_header_uses_helper"
    name: "Column header uses convertToNumberIfNumeric"
    description: "renderColHeaderRow wraps colKey[attrIdx] with the helper"
    test: "test_col_header_uses_helper"
    type: "fail_to_pass"

  - id: "f2p_row_header_uses_helper"
    name: "Row header uses convertToNumberIfNumeric"
    description: "renderTableRow wraps 'r' with the helper"
    test: "test_row_header_uses_helper"
    type: "fail_to_pass"

  # Pass-to-pass tests
  - id: "p2p_no_bare_cast"
    name: "No bare Number() cast remains"
    description: "The old buggy bare cast pattern is replaced"
    test: "test_no_bare_number_cast"
    type: "pass_to_pass"

  - id: "p2p_typescript_valid"
    name: "TypeScript syntax is valid"
    description: "The file compiles without errors"
    test: "test_typescript_syntax_valid"
    type: "pass_to_pass"

  # Agent config compliance checks
  - id: "agent_no_any_types"
    name: "No 'any' types introduced"
    description: "The fix uses proper TypeScript types, not 'any'"
    test: "test_no_any_types"
    type: "agent_config"
    source:
      file: "CLAUDE.md"
      rule: "NO `any` types - Use proper TypeScript types"

rubric: []
