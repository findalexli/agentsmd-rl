task: airflow-breeze-ci-commit-fix
source_pr: apache/airflow#64856
title: "Bugfix/skip commit checks on automated CI upgrades"
description: |
  Fix the CI upgrade command to handle pre-commit hook failures gracefully.
  The original code would fail if pre-commit hooks made auto-fixes that changed
  files during the commit. The fix adds a try-except block to catch CalledProcessError
  and retry with --no-verify flag.

