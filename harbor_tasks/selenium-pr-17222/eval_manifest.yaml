rubric:
  # Note: This is a code-only task (Java fix). Rubric rules check code conventions.
  # The judge expects config file edits which this task doesn't have - rules may not fully pass.
  - id: logging_convention
    rule: "Use java.util.logging.Logger with LOG field naming (the gold solution follows this in DockerOptions.java)"
    weight: 1

  - id: small_focused_diff
    rule: "Changes should be small and focused - the gold solution modifies only the necessary Java files"
    weight: 1

  - id: null_checks
    rule: "Use Require.nonNull for parameter validation - the gold solution validates Duration parameters this way"
    weight: 1
