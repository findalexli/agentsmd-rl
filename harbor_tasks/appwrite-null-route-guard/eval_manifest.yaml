title: 'Appwrite: Handle null routes in API middleware'
description: Fix null pointer exception when requests reach API middleware without
  a matched route. Add guards that throw GENERAL_ROUTE_NOT_FOUND instead of fatalling
  on null $route.
checks:
- id: null_route_guard_in_init_action
  type: pass_to_pass
  description: Verify the Http::init action has a null guard after $route = $utopia->getRoute()
    that throws GENERAL_ROUTE_NOT_FOUND
  points: 2
- id: null_route_guard_in_shutdown_action
  type: fail_to_pass
  description: Verify the shutdown action has a null guard after $route = $utopia->getRoute()
    that throws GENERAL_ROUTE_NOT_FOUND
  points: 2
- id: no_direct_route_dereference_without_check
  type: pass_to_pass
  description: Verify that $route is not directly dereferenced without a preceding
    null guard
  points: 1
