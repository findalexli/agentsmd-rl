title: "Appwrite: Handle null routes in API middleware"
description: "Fix null pointer exception when requests reach API middleware without a matched route. Add guards that throw GENERAL_ROUTE_NOT_FOUND instead of fatalling on null $route."

# Programmatic checks - these run via test_outputs.py
checks:
  - id: "null_route_guard_in_init_action"
    type: "pass_to_pass"
    description: "Verify the Http::init action has a null guard after $route = $utopia->getRoute() that throws GENERAL_ROUTE_NOT_FOUND"
    points: 2

  - id: "null_route_guard_in_shutdown_action"
    type: "fail_to_pass"
    description: "Verify the shutdown action has a null guard after $route = $utopia->getRoute() that throws GENERAL_ROUTE_NOT_FOUND"
    points: 2

  - id: "no_direct_route_dereference_without_check"
    type: "pass_to_pass"
    description: "Verify that $route is not directly dereferenced without a preceding null guard"
    points: 1

  - id: "php_syntax_valid"
    type: "pass_to_pass"
    description: "Verify the PHP file has valid syntax after modifications"
    points: 1

  - id: "correct_exception_constant_used"
    type: "pass_to_pass"
    description: "Verify that GENERAL_ROUTE_NOT_FOUND is used consistently in both guards"
    points: 1

  - id: "repo_composer_valid"
