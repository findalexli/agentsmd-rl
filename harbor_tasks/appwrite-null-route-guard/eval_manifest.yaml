distractors:
- rule: Action pattern (HTTP endpoints) using dedicated classes extending Action
  collision_type: scope_ambiguity
  why_distracting: The config outlines a strict class-based Action pattern for HTTP
    endpoints (extending `Action` with `__construct` and `action` methods). `api.php`
    uses inline `->action(function (...) { ... })` definitions. An agent might attempt
    to refactor `api.php` to match the documented class pattern, which would violate
    the instruction to keep the fix minimal.
  severity: medium
  source:
    path: AGENTS.md
    lines: 48-68
- rule: HTTP directory structure and module organization
  source:
    path: src/Appwrite/Platform/AGENTS.md
    lines: 13-20
  source_text: 'A module consists of:


    - `Module.php` - Simple register class registering all module''s services (from
    `Services` directory)

    - `Workers` directory - Contains behavior for module-specific workers

    - `Tasks` directory - Contains behavior for module-specific CLI tasks

    - `Http` directory - Contains HTTP endpoints for the module

    - `Services` directory - Contains register classes for all relevant types of services'
  collision_type: architecture_boundary
  why_distracting: The AI might attempt to refactor the `app/controllers/shared/api.php`
    file into the new Module architecture (`src/Appwrite/Platform/Modules/*/Http`)
    because it handles HTTP endpoints, but this PR is strictly a bug fix for a null
    route in an existing shared controller.
  severity: medium
- rule: HTTP directory rules
  source:
    path: src/Appwrite/Platform/AGENTS.md
    lines: 29-33
  source_text: '### HTTP directory structure


    Inside module''s `Http` directory, there are multiple rules to follow:


    1. Directly in `Http` directory, there should only be directories for services
    (and hooks, check point number 2'
  collision_type: scope_ambiguity
  why_distracting: The AI might see rules about HTTP directories and try to apply
    them to `app/controllers/shared/api.php`, but this file is outside the `src/Appwrite/Platform/Modules`
    scope.
  severity: low
hierarchy_analysis: The configuration is effectively a flat single file, as CLAUDE.md
  simply redirects to AGENTS.md.
