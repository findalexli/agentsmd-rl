agent_config:
- source: AGENTS.md
  applies: true
  description: PHP PSR-12 formatting, sparse Document updates, no hardcoded credentials
- source: CLAUDE.md
  applies: true
  description: '@AGENTS.md - references main project conventions'
- source: src/Appwrite/Platform/AGENTS.md
  applies: false
  description: Module structure rules - not relevant for shared controller fix
rubric:
- rule: 'Follow PSR-12 formatting enforced by Pint: proper brace placement, indentation,
    and spacing.'
  source:
    path: AGENTS.md
    lines: '98'
    commit: 951a96ae01bceaabe6e2fb936686b7953209ce19
- rule: Use appropriate exception throwing with AppwriteException for error conditions
    instead of allowing fatal errors.
  source:
    path: AGENTS.md
    lines: 96-120
    commit: 951a96ae01bceaabe6e2fb936686b7953209ce19
- rule: Write end-to-end tests in `tests/e2e/` for service endpoints.
  source:
    path: AGENTS.md
    lines: 27-28
  evidence: The gold solution adds `testConsoleRootWithoutRouteDoesNotFatal` to `tests/e2e/General/HTTPTest.php`
    to verify the 404 behavior.
  category: testing
distractors:
- rule: Action pattern (HTTP endpoints) using `class [Name] extends Action`.
  collision_type: architecture_boundary
  why_distracting: The config details a new `Action` class pattern for HTTP endpoints.
    However, `app/controllers/shared/api.php` uses an older closure-based middleware
    pattern (`->action(function (...) { ... })`). An agent might attempt to refactor
    this shared middleware into the new class-based pattern, which would be a massive,
    out-of-scope rewrite.
  severity: high
  source:
    path: AGENTS.md
    lines: 51-72
- rule: File names in Http directories must only be Get.php, Create.php, Update.php,
    Delete.php, or XList.php.
  collision_type: scope_ambiguity
  why_distracting: The config mandates that HTTP endpoint files must only be named
    `Get.php`, `Create.php`, `Update.php`, `Delete.php`, or `XList.php`. An agent
    might think `api.php` violates this and try to rename or split it, failing to
    realize this rule only applies to the new `src/Appwrite/Platform/Modules/` structure,
    not legacy shared controllers.
  severity: medium
  source:
    path: AGENTS.md
    lines: 44-46
hierarchy_analysis: The config hierarchy is flat, with `CLAUDE.md` simply including
  `AGENTS.md`. The primary tension arises from `AGENTS.md` heavily documenting the
  new module architecture (`src/Appwrite/Platform/Modules/`), while the bug is located
  in the legacy shared controller system (`app/controllers/shared/api.php`).
