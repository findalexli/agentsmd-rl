name = "appwrite-null-route-guard"
title = "Appwrite: Handle null routes in API middleware"
description = "Fix null pointer exception when requests reach API middleware without a matched route. Add guards that throw GENERAL_ROUTE_NOT_FOUND instead of fatalling on null $route."

owner = "appwrite"
repo = "appwrite"
base_commit = "951a96ae01bceaabe6e2fb936686b7953209ce19"
merge_commit = "d200b07466ae8db6ce9b100f8c41b3569f46cf28"
pr_number = 11809

# Difficulty and categorization
difficulty = "easy"
tags = ["php", "null-safety", "error-handling", "guard-clause"]
time_estimate_mins = 15

# Timeouts (in seconds)
timeout_agent = 1800
timeout_verifier = 120

[file_context]
primary_paths = [
    "app/controllers/shared/api.php"
]
secondary_paths = [
    "tests/e2e/General/HTTPTest.php"
]

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
