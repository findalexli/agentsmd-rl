rubric:
  # Agent config rules - extracted from CLAUDE.md and superset/mcp_service/CLAUDE.md
  - id: use_modern_python_syntax
    description: "Use Python 3.10+ union syntax (T | None) instead of Optional[T]"
    source:
      file: "superset/mcp_service/CLAUDE.md"
      lines: "245-275"

  - id: apache_license_headers
    description: "All Python files must have Apache Software Foundation license headers"
    source:
      file: "superset/mcp_service/CLAUDE.md"
      lines: "1-25"

  - id: add_type_hints
    description: "All new Python code needs proper typing and MyPy compliance"
    source:
      file: "CLAUDE.md"
      lines: "50-60"

  - id: use_pydantic_schemas
    description: "All tool inputs and outputs must be Pydantic models with Field descriptions"
    source:
      file: "superset/mcp_service/CLAUDE.md"
      lines: "280-300"

  - id: defense_in_depth_validation
    description: "Validation at multiple layers (schema + runtime clamping) is preferred"
    source:
      file: "superset/mcp_service/CLAUDE.md"
      lines: "1-50"

  - id: constants_in_separate_file
    description: "Service-specific constants should be defined in a dedicated constants.py file"
    source:
      file: "superset/mcp_service/CLAUDE.md"
      lines: "1-50"

  - id: use_le_not_lt
    description: "Use le= (less than or equal) constraint for inclusive upper bounds on Pydantic fields"
    source:
      file: "PR context"
      lines: "schema changes"
