name = "superset-mcp-enforce-max-page-size"
difficulty = "medium"
estimated_time = "30m"
tags = ["python", "pydantic", "mcp", "pagination", "validation"]

[description]
brief = "Enforce MAX_PAGE_SIZE limit on MCP list tools to prevent oversized responses"
detail = """
The MCP (Model Context Protocol) service in Apache Superset allows LLM clients to list
charts, dashboards, and datasets. Currently, there's no limit on the page_size parameter,
which allows clients to request excessive page sizes (e.g., 10000) that generate responses
large enough to overwhelm LLM context windows.

This task requires:
1. Adding MAX_PAGE_SIZE=100 and DEFAULT_PAGE_SIZE=10 constants
2. Adding Pydantic validation (le=MAX_PAGE_SIZE) to page_size fields in chart, dashboard,
   and dataset list schemas
3. Adding defense-in-depth clamp in ModelListCore.run_tool()
4. Adding missing middleware stack to the __main__.py entry point

The fix should prevent clients from requesting page sizes over 100, returning a validation
error when they try.
"""

[environment]
base_commit = "38fdfb4ca2e4fbca5c308898d9c1d5f58e2e7302"
merge_commit = "2c9cf0bd558449805e458e02374c565f6c8270da"
repo = "https://github.com/apache/superset.git"
