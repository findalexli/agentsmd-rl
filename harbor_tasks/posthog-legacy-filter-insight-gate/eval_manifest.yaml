rubric:
- rule: Django serializers are the source of truth for frontend API types — validation
    logic should be implemented in serializers rather than viewsets
  source:
    path: AGENTS.md
    lines: 65-68
  evidence: The gold solution implements the new legacy filter validation logic directly
    inside `InsightSerializer.validate` rather than in the viewset, adhering to the
    principle that serializers are the source of truth for frontend API types
  category: architecture
  reference: 'The validate method is added to InsightSerializer class, not the viewset,

    keeping validation logic in the serializer where it belongs per PostHog

    architectural guidelines.

    '
distractors:
- rule: 'OpenAPI/types: `hogli build:openapi` (regenerate after changing serializers/viewsets)'
  collision_type: scope_ambiguity
  why_distracting: The rule instructs the agent to regenerate OpenAPI schemas after
    changing serializers. An agent might run `hogli build:openapi` and attempt to
    commit frontend schema changes. However, adding a validation check (raising PermissionDenied)
    does not change the request/response type signatures, making schema regeneration
    unnecessary and potentially introducing noisy diffs.
  severity: medium
  source:
    path: AGENTS.md
    lines: 26-26
- rule: API views should declare request/response schemas — prefer `@validated_request`
    from `posthog.api.mixins` or `@extend_schema`
  collision_type: scope_ambiguity
  why_distracting: The agent might try to add `@extend_schema` or `@validated_request`
    to the viewset to explicitly document the new 403 Forbidden response. However,
    the task only requires adding validation logic to the existing serializer, and
    adding schema decorators would be out of scope and pollute the diff.
  severity: low
  source:
    path: AGENTS.md
    lines: 66-68
hierarchy_analysis: The config hierarchy is relatively flat, with `.cursorrules` providing
  generic AI behavior and `AGENTS.md` providing PostHog-specific guidelines. The agent
  must apply the DRF guidelines from `AGENTS.md` but must use judgment to avoid over-applying
  the OpenAPI regeneration rule, as the schema structure itself did not change.
