rubric:
- rule: Toast notifications should only show on successful organization switch
- rule: Hook logic should remain clean and readable after adding toast functionality
- rule: Tests should properly mock external dependencies and verify behavior not implementation
- rule: React frontend code is located in the `frontend` directory.
