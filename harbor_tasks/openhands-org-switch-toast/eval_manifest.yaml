    lines: 1-2
  evidence: The gold solution correctly implements the React frontend changes within
    the `frontend/` directory, specifically modifying `frontend/src/hooks/mutation/use-switch-organization.ts`
    and `frontend/src/co
  category: architecture
distractors:
- rule: To set up the entire repo, including frontend and backend, run `make build`.
    You don't need to do this unless the user asks you to.
  collision_type: scope_ambiguity
  why_distracting: The agent might run `make build` to set up the repo for testing
    the frontend changes, but the rule explicitly states not to do this unless requested.
    Running it would waste time and resources for a simple frontend UI change.
  severity: medium
  source:
    path: AGENTS.md
    lines: 4-6
- rule: When working on a PR that requires design documents... store them in a `.pr/`
    directory at the repository root.
  collision_type: scope_ambiguity
  why_distracting: The agent might create a `.pr/design.md` file to document the organization
    switching toast notification feature, but this is a simple UI addition, not a
    complex refactoring or debugging session that warrants PR-specific artifacts.
  severity: low
  source:
    path: AGENTS.md
    lines: 36-45
- rule: If you've made changes to the backend, you should run `pre-commit run --config
    ./dev_config/python/.pre-commit-config.yaml`
  collision_type: scope_ambiguity
  why_distracting: The agent might run the Python backend pre-commit hooks, but this
    PR only involves frontend TypeScript/React changes, making the backend linting
    unnecessary.
  severity: low
  source:
    path: AGENTS.md
    lines: 20-20
