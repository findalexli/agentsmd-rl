checks:
  - id: test_contextlength_field_in_base_model_fields
    type: fail_to_pass
    origin: agent_config
    source:
      - file: .continue/agents/input-validation.md
        rule: "Validate types (e.g., numbers are actually numbers)"
    description: |
      contextLength must be defined as z.number().optional() in the YAML model schema's
      baseModelFields at packages/config-yaml/src/schemas/models.ts. Without this, Zod
      silently strips contextLength when placed at the model level.

  - id: test_validation_uses_effective_context_length
    type: fail_to_pass
    origin: agent_config
    source:
      - file: .continue/agents/breaking-change-detector.md
        rule: "Configuration schema changes: check that validation logic handles both old and new formats"
    description: |
      validation.ts must compute effectiveContextLength as model.contextLength ??
      model.defaultCompletionOptions?.contextLength. This ensures model-level contextLength
      is not ignored in validation.

  - id: test_validation_warning_uses_effective_values
    type: fail_to_pass
    origin: agent_config
    source:
      - file: .continue/agents/input-validation.md
        rule: "Provide clear error messages that name the specific field and expected format"
    description: |
      The validation warning about maxTokens being too close to contextLength must use
      the effective context length and effective maxTokens (model-level takes precedence).

  - id: test_configslice_uses_default_context_length
    type: fail_to_pass
    origin: repo_tests
    description: |
      The GUI's selectSelectedChatModelContextLength selector must fallback to
      DEFAULT_CONTEXT_LENGTH (32768), not DEFAULT_MAX_TOKENS (4096).

  - id: test_core_models_reads_contextlength_from_model_level
    type: fail_to_pass
    origin: agent_config
    source:
      - file: .continue/agents/breaking-change-detector.md
        rule: "Configuration schema changes: check that validation logic handles both old and new formats"
    description: |
      core/config/yaml/models.ts must compute contextLength from model.contextLength ??
      model.defaultCompletionOptions?.contextLength before using it in LLMOptions.

  - id: test_no_typescript_errors
    type: pass_to_pass
    origin: repo_tests
    description: |
      TypeScript compilation succeeds on the fixed code.

  - id: test_repo_prettier_check
    type: pass_to_pass
    origin: repo_tests
    description: |
      Prettier formatting check passes on modified files.

  - id: test_repo_vitest_models
    type: pass_to_pass
    origin: repo_tests
    description: |
      Vitest tests for core/config/yaml/models.ts pass.

  - id: test_repo_jest_config_yaml_model_name
    type: pass_to_pass
    origin: repo_tests
    description: |
      Jest tests for config-yaml modelName parsing pass.

  - id: test_repo_jest_config_yaml_slugs
    type: pass_to_pass
    origin: repo_tests
    description: |
      Jest tests for config-yaml slug parsing pass.

  - id: test_repo_jest_config_yaml_secret_result
    type: pass_to_pass
    origin: repo_tests
    description: |
      Jest tests for config-yaml SecretResult encoding pass.

rubric:
  - id: input_validation_types
    source:
      path: packages/config-yaml/src/schemas/models.ts
    rule: Zod schema includes contextLength as optional number type
    reference: "contextLength: z.number().optional()"
    description: |
      New configuration fields like contextLength should have proper type validation.
      The agent should ensure the Zod schema includes type information.
    weight: 1

  - id: config_schema_backwards_compatibility
    source:
      path: packages/config-yaml/src/validation.ts
    rule: Validation logic handles both model-level and defaultCompletionOptions contextLength
    reference: "effectiveContextLength = model.contextLength ?? model.defaultCompletionOptions?.contextLength"
    description: |
      When adding contextLength at the model level, the existing defaultCompletionOptions
      location must continue to work for backwards compatibility.
    weight: 1

  - id: regression_tests_for_bug_fixes
    source:
      path: core/config/yaml/models.ts
    rule: Bug fix includes contextLength fallback from model level to defaultCompletionOptions
    reference: "contextLength = model.contextLength ?? model.defaultCompletionOptions?.contextLength"
    description: |
      Bug fixes should include tests that verify the fix resolves the reported issue.
      The tests should fail on the buggy base commit and pass on the fix.
    weight: 1

  - id: clear_error_messages
    source:
      path: gui/src/redux/slices/configSlice.ts
    rule: Config slice uses DEFAULT_CONTEXT_LENGTH constant as fallback, not DEFAULT_MAX_TOKENS
    reference: "DEFAULT_CONTEXT_LENGTH"
    description: |
      Error messages should include specific field names and values, not generic messages.
    weight: 1
