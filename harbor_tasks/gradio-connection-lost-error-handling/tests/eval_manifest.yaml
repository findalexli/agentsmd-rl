    description: "submit.ts dynamically computes broken flag by comparing error to BROKEN_CONNECTION_MSG"

  - id: dispatch_short_circuits_on_connection_lost
    type: fail_to_pass
    origin: pr_diff
    description: "DependencyManager.dispatch() returns early when connection_lost is true"

  - id: dependency_connection_lost_tracking
    type: fail_to_pass
    origin: pr_diff
    description: "DependencyManager detects broken/session errors, sets connection_lost, and fires callback"

  - id: blocks_reconnection_handler
    type: fail_to_pass
    origin: pr_diff
    description: "Blocks.svelte defines connection-lost handler with setInterval reconnection and page reload"

  - id: callback_wiring
    type: fail_to_pass
    origin: pr_diff
    description: "Blocks.svelte passes handle_connection_lost to DependencyManager constructor"

  - id: reconnect_interval_cleanup
    type: fail_to_pass
    origin: pr_diff
    description: "Blocks.svelte cleans up reconnection interval with clearInterval on teardown"

  - id: modified_files_exist
    type: pass_to_pass
    origin: static
    description: "All three modified files (submit.ts, dependency.ts, Blocks.svelte) exist"

  - id: files_not_stub
    type: pass_to_pass
    origin: static
    description: "Modified files have substantial implementation, not stubs"

  - id: repo_format_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo Prettier format check passes"

  - id: repo_client_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Repo @gradio/client package tests pass"

  - id: repo_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Repo unit tests (vitest) pass"

  - id: repo_core_init
    type: pass_to_pass
    origin: repo_tests
    description: "Repo js/core/src/init.test.ts tests pass"

  - id: repo_client_init
    type: pass_to_pass
    origin: repo_tests
    description: "Repo client/js/src/test/init.test.ts tests pass"

