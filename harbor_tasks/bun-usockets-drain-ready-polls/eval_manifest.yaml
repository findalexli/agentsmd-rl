distractors:
- rule: If a test is for a specific numbered GitHub Issue, it should be placed in test/regression/issue/${issueNumber}.test.ts
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to write a regression test for >1024 simultaneous ready file descriptors to satisfy the testing instructions, but simulating event loop saturation reliably in a test environment is highly complex and omitted from the gold solution.
  severity: medium
  source:
    path: AGENTS.md
    lines: 48-50
- rule: Guides using bun.sys for system calls and file I/O in Zig. Use when implementing file operations instead of std.fs or std.posix.
  collision_type: architecture_boundary
  why_distracting: The agent might try to use bun.sys or bridge to Zig for system calls, but the target file is a C file (epoll_kqueue.c) that must use standard C system calls (bun_epoll_pwait2, kevent64).
  severity: high
  source:
    path: .claude/skills/zig-system-calls
    lines: 1-2
hierarchy_analysis: The config files provide general guidance for Bun development (Zig/C++ and JS tests), but the target file is a C file in a vendored/forked library (bun-usockets). The agent must recognize that Zig-specific system call rules and standard JS testing requirements do not cleanly apply to this low-level C event loop patch.
