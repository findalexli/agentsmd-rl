distractors:
- rule: Write regression tests for specific numbered GitHub issues in test/regression/issue/
  collision_type: would_cause_bug
  why_distracting: The agent might attempt to write a JS test to reproduce the >1024
    fd issue. However, creating >1024 simultaneous ready file descriptors in a test
    environment will likely hit default OS `ulimit -n` limits (often 256 or 1024)
    and fail or be flaky. The gold solution correctly omits a test for this low-level
    event loop saturation.
  severity: high
  source:
    path: CLAUDE.md
    lines: 43-44
- rule: Bun is written primarily in Zig with C++ for JavaScriptCore integration
  collision_type: architecture_boundary
  why_distracting: The config states Bun is written primarily in Zig with C++ for
    JSC. An agent might try to fix the event loop polling logic in Zig or C++, but
    `bun-usockets` is a C library fork. The fix must be implemented in C within the
    existing `epoll_kqueue.c` file.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 1-3
hierarchy_analysis: CLAUDE.md and AGENTS.md are identical and focus heavily on testing
  and Zig/C++ architecture. However, this specific issue requires modifying a vendored
  C library (`bun-usockets`). The agent must ignore the general testing directives
  (due to OS ulimit constraints on FDs) and the Zig architecture norms to patch the
  C code directly.
