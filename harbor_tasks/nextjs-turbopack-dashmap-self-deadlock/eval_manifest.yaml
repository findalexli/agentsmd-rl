rubric:
- rule: Code fix uses the .map(|r| *r) pattern to release DashMap Ref before ConnectChildOperation::run,
    preventing read-write self-deadlock
  source:
    path: turbopack/crates/turbo-tasks-backend/src/backend/mod.rs
    lines: 1535,1618
    commit: 3e0158846e490509c6a26a4536d33777d9778101
  reference: self.task_cache.get(&task_type).map(|r| *r)
distractors:
- rule: 'Start watch build in background: `pnpm --filter=next dev`'
  collision_type: scope_ambiguity
  why_distracting: The rule suggests running `pnpm --filter=next dev` for iterative
    development and watch mode. However, this PR modifies Rust code in the Turbopack
    backend (`turbopack/crates/turbo-tasks-backend`). The Next.js dev server watch
    mode does not automatically recompile Rust source files, so an agent relying on
    this for Rust iteration will be confused when changes don't take effect.
  severity: high
  source:
    path: CLAUDE.md
    lines: 75-80
- rule: 'Run tests fast (no isolation, no packing): `NEXT_SKIP_ISOLATE=1 NEXT_TEST_MODE=<dev|start>
    pnpm testheadless test/path/to/test.ts`'
  collision_type: scope_ambiguity
  why_distracting: The rule provides a command (`pnpm testheadless`) for running tests
    fast without isolation. An agent might attempt to use this command to test the
    Turbopack Rust changes, but this command is exclusively for Next.js JS/TS integration
    tests. Rust tests require `cargo test`.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 82-87
- rule: 'For type errors only: Use `pnpm --filter=next types` (~10s) instead of `pnpm
    --filter=next build` (~60s).'
  collision_type: meta_confusion
  why_distracting: The rule suggests using `pnpm --filter=next types` for type errors
    instead of a full build. An agent might try to use this to check for Rust compiler/type
    errors, but this command only runs TypeScript `tsc`. It will silently pass or
    fail on unrelated TS code, providing no feedback on the Rust changes.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 92-92
hierarchy_analysis: The repository uses identical `CLAUDE.md` and `AGENTS.md` files
  at the root level. The guidelines are heavily skewed towards Next.js TypeScript/JavaScript
  development, integration tests, and the `pnpm` build system. There is a significant
  lack of guidance for the Rust (`turbopack/crates/*`) portion of the monorepo, other
  than mentioning `pnpm build-all` for building both JS and Rust. This creates a high
  risk of agents misapplying JS/TS-specific workflows (like `next dev` watch mode
  or `testheadless`) to Rust backend tasks.
