version: "2.0"

source:
  repo: "vercel/next.js"
  pr: 92210
  base_commit: "3e0158846e490509c6a26a4536d33777d9778101"
  merge_commit: "9e1509307e336bc422bc6d1c1cc0a32ce00d9523"

checks:
  - id: source_file_exists
    type: pass_to_pass
    origin: static
    description: "mod.rs exists and is not stubbed"

  - id: repo_rust_file_parses
    type: pass_to_pass
    origin: repo_tests
    description: "Modified Rust file is valid and parseable"

  - id: repo_dashmap_usage_present
    type: pass_to_pass
    origin: repo_tests
    description: "DashMap task_cache is used in both target functions"

  - id: repo_taskid_type_present
    type: pass_to_pass
    origin: repo_tests
    description: "TaskId type and ConnectChildOperation are present"

  - id: repo_git_history_intact
    type: pass_to_pass
    origin: repo_tests
    description: "Git history is intact for blame/annotation"

  - id: repo_cargo_fmt
    type: pass_to_pass
    origin: repo_tests
    description: "Rust code passes cargo fmt --check"

  - id: repo_cargo_check
    type: pass_to_pass
    origin: repo_tests
    description: "Rust code passes cargo check"

  - id: repo_cargo_test_unit
    type: pass_to_pass
    origin: repo_tests
    description: "Rust unit tests for turbo-tasks-backend pass"

  - id: persistent_task_ref_released
    type: fail_to_pass
    origin: pr_diff
    description: "DashMap Ref consumed inline in get_or_create_persistent_task before ConnectChildOperation::run"

  - id: transient_task_ref_released
    type: fail_to_pass
    origin: pr_diff
    description: "DashMap Ref consumed inline in get_or_create_transient_task before ConnectChildOperation::run"

  - id: no_dangling_deref_after_cache_get
    type: fail_to_pass
    origin: pr_diff
    description: "No separate 'let task_id = *task_id;' after task_cache.get() that keeps Ref alive"

  - id: cache_lookup_preserved
    type: pass_to_pass
    origin: static
    description: "Both functions still perform cache lookup and ConnectChildOperation (not deleted)"

rubric:
  - rule: "Code fix uses the .map(|r| *r) pattern to release DashMap Ref before ConnectChildOperation::run, preventing read-write self-deadlock"
    source:
      path: "turbopack/crates/turbo-tasks-backend/src/backend/mod.rs"
      lines: "1535,1618"
      commit: "3e0158846e490509c6a26a4536d33777d9778101"
    reference: "self.task_cache.get(&task_type).map(|r| *r)"
