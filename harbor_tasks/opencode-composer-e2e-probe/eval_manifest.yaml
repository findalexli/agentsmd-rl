rubric:
- id: rubric_single_word_names
  source:
    lines: 20-31
    commit: dcb17c6a678918ce0786640729fcc8cd8adb1746
    path: AGENTS.md
  rule: 'New locals, params, and helper functions in agent-written code use

    single-word names by default; multi-word names only when a single

    word would be unclear (per AGENTS.md "Naming Enforcement").

    '
- id: rubric_no_try_catch_unless_needed
  source:
    lines: 9-13
    commit: dcb17c6a678918ce0786640729fcc8cd8adb1746
    path: AGENTS.md
  rule: 'Avoid try/catch where possible (per AGENTS.md "General Principles");

    prefer early returns and direct error propagation.

    '
- id: rubric_no_any_type
  source:
    lines: 9-13
    commit: dcb17c6a678918ce0786640729fcc8cd8adb1746
    path: AGENTS.md
  rule: 'Avoid the `any` type in agent-written code (per AGENTS.md "General

    Principles"). Use precise types or generic inference.

    '
- id: rubric_avoid_else
  source:
    lines: 78-91
    commit: dcb17c6a678918ce0786640729fcc8cd8adb1746
    path: AGENTS.md
  rule: 'Avoid `else` branches; prefer early returns (per AGENTS.md

    "Control Flow").

    '
- id: rubric_avoid_destructuring
  source:
    lines: 57-66
    commit: dcb17c6a678918ce0786640729fcc8cd8adb1746
    path: AGENTS.md
  rule: 'Avoid unnecessary `{ a, b } = obj` destructuring; prefer dot

    notation to preserve context (per AGENTS.md "Destructuring"). The

    region change in this PR (`const { sessionKey } = useSessionKey()`

    → `const route = useSessionKey()`) follows this rule.

    '
- id: rubric_prefer_const
  source:
    lines: 68-77
    commit: dcb17c6a678918ce0786640729fcc8cd8adb1746
    path: AGENTS.md
  rule: 'Prefer `const` over `let`; use ternaries or early returns instead of

    reassignment (per AGENTS.md "Variables").

    '
- id: rubric_prefer_array_methods
  source:
    lines: 9-13
    commit: dcb17c6a678918ce0786640729fcc8cd8adb1746
    path: AGENTS.md
  rule: 'Prefer functional array methods (flatMap / filter / map) over

    imperative for loops (per AGENTS.md "General Principles"). The

    `clearPermissionDock` rewrite — replacing the for-with-waitForTimeout

    loop with a single visibility assertion + click — exemplifies this.

    '
- id: rubric_e2e_no_wall_clock
  source:
    lines: 179-184
    commit: 96b1d8f639991e896bc8d31afe64d6309bf3ccd2
    path: packages/app/e2e/AGENTS.md
  rule: 'E2E tests must never use wall-clock waits like

    `page.waitForTimeout(...)` to make a test pass; wait/poll on

    observable state instead. (Per the new packages/app/e2e/AGENTS.md

    "Wait on state" section the agent must add.)

    '
- id: rubric_e2e_hooks_inert_unless_enabled
  source:
    lines: 186-192
    commit: 96b1d8f639991e896bc8d31afe64d6309bf3ccd2
    path: packages/app/e2e/AGENTS.md
  rule: 'Test-only hooks added in app code must be inert unless explicitly

    enabled — no normal-runtime listeners, reactive subscriptions, or

    per-update allocations for e2e ceremony.

    '
