  merge_commit: "3a69e4c775126274548d1f3fde6c0fd0b946ecdf"

checks:
  - id: cargo_check
    type: pass_to_pass
    origin: static
    description: "ty_python_semantic crate must compile"

  - id: pop_empty_dict_default
    type: fail_to_pass
    origin: pr_diff
    description: "pop() with empty dict default infers dict[str, int], not a union"

  - id: pop_nonempty_dict_default
    type: fail_to_pass
    origin: pr_diff
    description: "pop() with non-empty dict default infers dict[str, int]"

  - id: pop_list_default
    type: fail_to_pass
    origin: pr_diff
    description: "pop() with empty list default infers list[int]"

  - id: pop_set_default
    type: fail_to_pass
    origin: pr_diff
    description: "pop() with set() default on different field infers set[str]"

  - id: pop_no_default
    type: pass_to_pass
    origin: pr_diff
    description: "pop() without default still returns the field type"

  - id: get_bidirectional
    type: pass_to_pass
    origin: pr_diff
    description: "get() bidirectional inference not regressed"

  - id: mdtest_typed_dict
    type: pass_to_pass
    origin: repo_tests
    description: "Existing typed_dict mdtest suite still passes"

  - id: no_new_unwrap
    type: pass_to_pass
    origin: agent_config
    description: "No new .unwrap() calls added to typed_dict.rs"
    source:
      path: "AGENTS.md"
      lines: "79"
      commit: "55177205a0c5b8664b16a9dbc708a63807de130f"

  - id: no_new_panic_unreachable
    type: pass_to_pass
    origin: agent_config
    description: "No new panic!() or unreachable!() calls added to typed_dict.rs"
    source:
      path: "AGENTS.md"
      lines: "79"
      commit: "55177205a0c5b8664b16a9dbc708a63807de130f"

  - id: not_truncated
    type: pass_to_pass
    origin: static
    description: "typed_dict.rs is not truncated (has substantial content)"

rubric:
  - rule: "Avoid writing significant amounts of new code. Look for existing utilities first."
    source:
      path: "AGENTS.md"
      lines: "78"
      commit: "55177205a0c5b8664b16a9dbc708a63807de130f"

  - rule: "Any method that accesses .node() must be #[salsa::tracked], or it will break incrementality. Prefer higher-level semantic APIs over raw AST access."
    source:
      path: "AGENTS.md"
      lines: "84"
      commit: "55177205a0c5b8664b16a9dbc708a63807de130f"

  - rule: "Use comments purposefully. Don't use comments to narrate code, but do use them to explain invariants and why something unusual was done a particular way."
    source:
      path: "AGENTS.md"
      lines: "82"
      commit: "55177205a0c5b8664b16a9dbc708a63807de130f"
