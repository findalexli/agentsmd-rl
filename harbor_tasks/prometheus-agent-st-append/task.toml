name = "prometheus-agent-st-append"
title = "Fix Start Timestamp (ST) append in Prometheus agent mode"
description = """
Fix a bug in the Prometheus agent mode where the Start Timestamp (ST) field
was not being correctly persisted to WAL samples when the --enable-feature=st-storage
flag was enabled. The fix requires adding the ST field to record.RefSample
when appending samples in appenderV2.
"""

difficulty = "easy"
estimated_time_minutes = 15
tags = ["go", "bugfix", "prometheus", "tsdb", "agent-mode", "timestamp-handling"]

source_owner = "prometheus"
source_repo = "prometheus"
source_pr_number = 18270
source_base_commit = "788d122903baae36e823ec3b6c759aeb877ba1a7"
source_merge_commit = "a3217fe94f9ca231f4b94ff80441cb3f25b6dc7a"
[environment]
base_image = "golang:1.25-bookworm"
language = "go"

[files]
target = [
    "tsdb/agent/db_append_v2.go"
]
test = [
    "tsdb/agent/db_append_v2_test.go",
    "tsdb/agent/db.go"
]
