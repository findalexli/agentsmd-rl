task:
  name: prometheus-agent-st-append
  title: "Fix Start Timestamp (ST) append in Prometheus agent mode"
  description: |
    Fix a bug in the Prometheus agent mode where the Start Timestamp (ST) field
    was not being correctly persisted to WAL samples when the --enable-feature=st-storage
    flag was enabled. The fix requires adding the ST field to record.RefSample
    when appending samples in appenderV2.

