source:
  pr:
    url: https://github.com/langchain-ai/langchain/pull/36471
    number: 36471
    merge_commit: 0b5f2c08ee256473e368372a803c5c92039c0a4e
    base_commit: c9f51aef85e02fbaadcd5c6c37cf4ef01a49f86e
  repo:
    name: langchain-ai/langchain
    language: python
    description: LangChain is a framework for developing applications powered by large language models

task:
  description: |
    Fix symlink vulnerability in deprecated prompt loading functions.
    The _load_template function in loading.py checked file extensions before
    resolving symlinks, allowing attackers to bypass security checks by creating
    a .txt symlink pointing to a non-.txt file.

  files:
    - libs/core/langchain_core/prompts/loading.py

checks:
  # Fail-to-pass tests (core behavioral fixes)
  - id: test_symlink_txt_to_py_is_blocked
    type: fail_to_pass
    origin: agent_output
    description: A .txt symlink pointing to a .py file should raise ValueError

  - id: test_symlink_jinja2_rce_is_blocked
    type: fail_to_pass
    origin: agent_output
    description: A .txt symlink pointing to a jinja2 template should raise ValueError

  # Pass-to-pass tests (regression prevention)
  - id: test_real_txt_file_still_works
    type: pass_to_pass
    origin: agent_output
    description: Real .txt files should still load correctly after the fix

  - id: test_symlink_txt_to_txt_works
    type: pass_to_pass
    origin: agent_output
    description: A .txt symlink pointing to a real .txt file should work
  - id: test_import_loading_module
    type: pass_to_pass
    origin: agent_output
    description: Loading module can be imported

  - id: test_unit_tests_still_pass
    type: pass_to_pass
    origin: repo_tests
    description: Existing unit tests in test_loading.py still pass

  - id: test_repo_imports
    type: pass_to_pass
    origin: repo_tests
    description: Repo's prompt imports are valid

  - id: test_repo_prompt_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: Repo's prompt unit tests pass

  - id: test_repo_loading_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: Repo's loading unit tests pass

rubric: []
