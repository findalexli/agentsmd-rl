distractors:
- rule: Do not open one-off PRs for tiny edits (single typo, isolated style change,
    one mutable default, etc.). Mechanical cleanups are acceptable only when bundled
    with substantive work.
  collision_type: scope_ambiguity
  why_distracting: The agent might refuse to fix the import paths, misclassifying
    the change as a 'tiny edit' or 'mechanical cleanup', even though it resolves a
    critical ModuleNotFoundError at runtime.
  severity: high
  source:
    path: AGENTS.md
    lines: 18-19
- rule: Pure code-agent PRs are not allowed. A human submitter must understand and
    defend the change end-to-end.
  collision_type: meta_confusion
  why_distracting: The agent might refuse to generate the fix entirely, stating that
    'Pure code-agent PRs are not allowed', misunderstanding its role as an AI assistant
    generating a patch for a human submitter.
  severity: high
  source:
    path: AGENTS.md
    lines: 22-23
