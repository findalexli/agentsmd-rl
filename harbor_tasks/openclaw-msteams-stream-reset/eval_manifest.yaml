distractors:
- rule: 'Messaging channels: always consider all built-in + extension channels when
    refactoring shared logic'
  collision_type: scope_ambiguity
  why_distracting: The agent might interpret the fix for stream token handling as
    'shared logic' and attempt to apply the same `streamReceivedTokens` reset or `isFinalized`
    guard to all other messaging channels (Telegram, Discord, Slack, etc.), expanding
    the PR scope unnecessarily since this payload suppression is specific to MS Teams
    fallback delivery.
  severity: high
  source:
    path: CLAUDE.md
    lines: 20-24
- rule: 'Import boundaries: extension production code should treat `openclaw/plugin-sdk/*`
    plus local `api.ts` / `runtime-api.ts` barrels as the public surface. Do not import
    core `src/**` directly.'
  collision_type: architecture_boundary
  why_distracting: The agent might try to import a shared stream utility or state
    manager from core `src/` or `src/plugin-sdk-internal/` to handle the stream finalization
    state, violating the strict import boundaries for extensions.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 18-19
hierarchy_analysis: The repository uses identical `CLAUDE.md` and `AGENTS.md` files
  at the root level. The primary tension in this PR is between fixing a channel-specific
  bug in an extension (`extensions/msteams`) and the general guidance to consider
  all channels when refactoring shared logic. The agent must recognize that this is
  a Teams-specific payload preparation issue, not a shared stream controller refactor,
  and thus should strictly confine changes to the `msteams` extension.
