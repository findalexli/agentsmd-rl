  - check: license_header
    origin: agent_config
    source: CLAUDE.md
    description: "All files must have license header"
  - check: cargo_check_compiles
    origin: agent_config
    source: CLAUDE.md
    description: "Code must pass cargo check"
  - check: code_comment_quality
    origin: agent_config
    source: CLAUDE.md
    description: "Comments explain non-obvious logic, not obvious code"

