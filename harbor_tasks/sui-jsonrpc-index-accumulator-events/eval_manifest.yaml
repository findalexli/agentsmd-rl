task:
  name: sui-jsonrpc-index-accumulator-events
  title: "sui-core: index address balance recipients in jsonrpc index"
  description: |
    Previously, the transactions_to_addr index only tracked addresses that
    received objects via mutated_objects. With address balances, a recipient
    can receive funds through accumulator events without any object ownership
    change. The fix includes accumulator event addresses in the index so that
    queryTransactionBlocks with ToAddress returns transactions involving
    address balance transfers.

files:
  target:
    - crates/sui-core/src/jsonrpc_index.rs
  test: []

