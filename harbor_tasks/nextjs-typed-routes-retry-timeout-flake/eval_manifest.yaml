rubric:
- rule: Add comments to explain WHY, not WHAT. Comments should explain the reasoning
    behind timing decisions and race conditions.
  source:
    path: AGENTS.md
    lines: 149-152
    commit: 0090db224d177c51f6d5e45fe1be2527ce04e899
- rule: Document timing invariants in tests when dealing with async operations. Explain
    relationships between events (e.g., route type generation happens after 'Ready'
    log).
  source:
    path: AGENTS.md
    lines: 385-390
    commit: 0090db224d177c51f6d5e45fe1be2527ce04e899
- rule: When fixing flaky tests, add explanatory comments that document the race condition
    being addressed, not just the fix itself.
  source:
    path: AGENTS.md
    lines: 169-179
    commit: 0090db224d177c51f6d5e45fe1be2527ce04e899
distractors:
- rule: Start `pnpm --filter=next dev` in a separate terminal session before making
    edits for iterative development.
  collision_type: meta_confusion
  why_distracting: The bug is explicitly described as an intermittent timeout on loaded
    CI runners. Following the rule to start a local dev server and iteratively test
    will likely fail to reproduce the race condition, potentially causing the agent
    to doubt the root cause or waste time on local reproduction instead of applying
    the logical fix for CI.
  severity: high
  source:
    path: CLAUDE.md
    lines: 65-73
- rule: Run tests fast (no isolation, no packing) using NEXT_SKIP_ISOLATE=1 NEXT_TEST_MODE=<mode>
    pnpm testheadless.
  collision_type: meta_confusion
  why_distracting: The rule suggests running tests locally with `NEXT_SKIP_ISOLATE=1`
    for speed. However, making the tests run faster locally is the opposite of the
    CI environment (loaded runners) where the 3000ms timeout occurs. The agent might
    get confused when the tests pass locally and fail to verify the fix.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 75-82
- rule: 'For type errors only: Use `pnpm --filter=next types` instead of `pnpm --filter=next
    build`.'
  collision_type: scope_ambiguity
  why_distracting: The bug mentions 'tsc runs against a project missing the generated
    types, causing type errors'. The agent might misinterpret this as a type error
    in the Next.js repository and run `pnpm --filter=next types`, but the type error
    actually occurs inside the e2e test's child process executing `tsc` on a test
    fixture.
  severity: low
  source:
    path: CLAUDE.md
    lines: 86-86
hierarchy_analysis: CLAUDE.md and AGENTS.md are identical symlinks providing repository-wide
  guidance. The rules focus heavily on local development and fast iteration, which
  is actively detrimental for a CI-specific race condition. The agent must recognize
  the 'CI-only analysis' exception in the dev server rule to avoid wasting time on
  local reproduction.
