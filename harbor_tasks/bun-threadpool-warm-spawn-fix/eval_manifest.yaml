    lines: 9-11
    commit: 49221ca7440128b32222aefd0df53c359b3fd5fd
- rule: Always use bun.* APIs instead of std.* for system calls, file operations,
    and strings
  source:
    path: src/CLAUDE.md
    lines: 14-34
    commit: 49221ca7440128b32222aefd0df53c359b3fd5fd
distractors:
- rule: Always use `bun.*` APIs instead of `std.*`
  collision_type: scope_ambiguity
  why_distracting: The rule explicitly commands 'Always use bun.* APIs instead of
    std.*'. Since the code being modified relies on `std.Thread.spawn` and `std.Thread.SpawnConfig`,
    an agent might incorrectly attempt to refactor these to use `bun.*` equivalents
    (like `bun.spawnSync`, which is for processes, or a fabricated `bun.Thread`),
    which would cause compilation errors.
  severity: high
  source:
    path: src/CLAUDE.md
    lines: 15-17
- rule: Test Organization and Writing Tests guidelines
  collision_type: rule_conflict
  why_distracting: The config file provides extensive instructions on how and where
    to write tests (e.g., `test/regression/issue/...`). However, the task instructions
    explicitly state 'Do NOT modify any test files.' An agent might get confused and
    try to add a test file anyway to comply with the testing guidelines.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 41-76
hierarchy_analysis: The hierarchy consists of root-level testing/building guidelines
  and src-level Zig conventions. The most significant conflict arises from the src-level
  rule 'Always use bun.* APIs instead of std.*', which is intended for OS/file operations
  but is stated absolutely, conflicting with the legitimate use of `std.Thread` in
  the target file. Additionally, the root-level testing guidelines conflict with the
  task-specific instruction to not modify test files.
