distractors:
- rule: Always use `bun.*` APIs instead of `std.*`.
  collision_type: scope_ambiguity
  why_distracting: The rule strongly mandates 'Always use bun.* APIs instead of std.*'.
    An agent might incorrectly attempt to replace the existing `std.Thread.spawn`
    and `std.Thread.SpawnConfig` calls with non-existent `bun.Thread` equivalents,
    which would cause compilation errors.
  severity: high
  source:
    path: src/AGENTS.md
    lines: 16-20
- rule: If no valid issue number is provided, find the best existing file to modify
    instead [to add tests].
  collision_type: rule_conflict
  why_distracting: The config provides detailed instructions on where and how to write
    tests for bug fixes (e.g., `test/js/bun/`), but the task instruction explicitly
    forbids modifying any test files.
  severity: high
  source:
    path: AGENTS.md
    lines: 45-55
hierarchy_analysis: The repository has identical `AGENTS.md` and `CLAUDE.md` files
  at both the root and `src/` levels. The root level focuses on building and testing,
  while the `src/` level focuses on Zig conventions. The agent must apply the `src/`
  level Zig conventions while ignoring the root level testing instructions due to
  the prompt's explicit override.
