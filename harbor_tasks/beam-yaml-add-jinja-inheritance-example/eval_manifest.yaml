    \n    Unless required by applicable law or agreed to in writing,\n    software\
    \ distributed under the License is distributed on an\n    \"AS IS\" BASIS, WITHOUT\
    \ WARRANTIES OR CONDITIONS OF ANY\n    KIND, either express or implied.  See the\
    \ License for the\n    specific language governing permissions and limitations\n\
    \    under the License.\n-->\n\n# Jinja Inheritance Example\n\nThis folder contains\
    \ an example of how to use Jinja2 inheritance in Beam YAML pipelines.\n\n## Files\n\
    \n*   **base/base_pipeline.yaml**: A complete WordCount pipeline (Read -> Split\
    \ -> Explode -> Combine -> MapToFields -> Write). It defines a block `extra_steps`\
    \ between `Explode` and `MapToFields` to allow child pipelines to inject additional\
    \ transforms.\n*   **wordCountInheritance.yaml**: Extends `base/base_pipeline.yaml`\
    \ and injects a `Combine` transform into the `extra_steps` block to combine words.\n\
    \n## Running the Example\n\nTo run the child pipeline (which includes the inherited\
    \ base pipeline logic + the new filter):\n\nGeneral setup:\n```sh\nexport PIPELINE_FILE=apache_beam/yaml/examples/transforms/jinja/inheritance/wordCountInheritance.yaml\n\
    export KINGLEAR=\"gs://dataflow-samples/shakespeare/kinglear.txt\"\nexport TEMP_LOCATION=\"\
    gs://MY-BUCKET/wordCounts/\"\nexport PROJECT=\"MY-PROJECT\"\nexport REGION=\"\
    MY-REGION\"\n\ncd <PATH_TO_BEAM_REPO>/beam/sdks/python\n```\n\nMultiline Run Example:\n\
    ```sh\npython -m apache_beam.yaml.main \\\n  --project=${PROJECT} \\\n  --region=${REGION}\
    \ \\\n  --yaml_pipeline_file=\"${PIPELINE_FILE}\" \\\n  --jinja_variables='{\n\
    \    \"readFromTextTransform\": {\"path\": \"'\"${KINGLEAR}\"'\"},\n    \"mapToFieldsSplitConfig\":\
    \ {\"language\": \"python\", \"fields\":{\"value\":\"1\"}}, \"explodeTransform\":{\"fields\":\"word\"},\
    \ \"combineTransform\":{\"group_by\":\"word\", \"combine\":{\"value\":\"sum\"}},\
    \ \"mapToFieldsCountConfig\":{\"language\": \"python\", \"fields\":{\"output\":\"word\\\
    \ \\\"- \\\"+ str(value)\"}}, \"writeToTextTransform\":{\"path\":\"'\"${TEMP_LOCATION}\"'\"}}'\n\
    ```\n\nSingle Line Run Example:\n```sh\npython -m apache_beam.yaml.main --project=${PROJECT}\
    \ --region=${REGION} \\\n--yaml_pipeline_file=\"${PIPELINE_FILE}\" --jinja_variables='{\"readFromTextTransform\":\
    \n{\"path\": \"'\"${KINGLEAR}\"'\"}, \"mapToFieldsSplitConfig\": {\"language\": \"python\",\
    \ \"fields\":{\"value\":\"1\"}}, \"explodeTransform\":{\"fields\":\"word\"},\
    \ \"combineTransform\":{\"group_by\":\"word\", \"combine\":{\"value\":\"sum\"}},\
    \ \"mapToFieldsCountConfig\":{\"language\": \"python\", \"fields\":{\"output\":\"word\\\
    \ + \\\"- \\\"+ str(value)\"}}, \"writeToTextTransform\":{\"path\":\"'\"${TEMP_LOCATION}\"'\"}}'\n\
    ```\n"
  gold_removed: ''
