  - id: test_repo_lint
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's linter (oxlint) passes on all files"

  - id: test_repo_format
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's formatter (oxfmt) passes on all files"

  - id: test_repo_workers_playground_check
    type: pass_to_pass
    origin: repo_tests
    description: "Workers-playground package check passes (typecheck and default-hashes)"

