    assume the fix belongs in the Vite plugin for Cloudflare Workers (`packages/vite-plugin-cloudflare/`),
    but the fix is actually just a configuration change in the playground's own `vite.config.ts`.
  severity: high
  source:
    path: AGENTS.md
    lines: '41'
- rule: Change local dev behavior -> `packages/miniflare/src/`
  collision_type: scope_ambiguity
  why_distracting: The issue mentions a runtime crash in the Workers Playground. The
    agent might think this is a local dev simulator issue and try to modify Miniflare,
    but it's a bundler issue in the playground's Vite config.
  severity: medium
  source:
    path: AGENTS.md
    lines: '71'
- rule: Add a test fixture -> `fixtures/`
  collision_type: scope_ambiguity
  why_distracting: The agent might try to add a test fixture for this Vite 8 crash,
    but it's a playground app build config issue, so adding a fixture might be overkill
    or out of scope.
  severity: low
  source:
    path: AGENTS.md
    lines: '73'
hierarchy_analysis: The config files provide a high-level overview of the monorepo
  architecture. However, they do not explicitly mention the `workers-playground` package.
