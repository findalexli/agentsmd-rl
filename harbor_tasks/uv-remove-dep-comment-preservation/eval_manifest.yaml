version: "2.0"

source:
  repo: "astral-sh/uv"
  pr: 18557
  base_commit: "46c9bac182d64359cef45d51fd796b81b3736f8b"
  merge_commit: "6d628da78a2b1689640f5dbf2b04f56f179601b0"

checks:
  - id: cargo_check
    type: pass_to_pass
    origin: static
    description: "Modified crate must compile without errors"

  - id: remove_last_dep_preserves_prev_comment
    type: fail_to_pass
    origin: pr_diff
    description: "End-of-line comment on previous entry survives removal of last entry (3 inputs)"

  - id: remove_middle_dep_preserves_prev_comment
    type: fail_to_pass
    origin: pr_diff
    description: "End-of-line comment on previous entry survives removal of middle entry (2 inputs)"

  - id: remove_adjacent_duplicates_preserves_comment
    type: fail_to_pass
    origin: pr_diff
    description: "Removing multiple adjacent matching deps preserves comment on preceding entry (2 inputs)"

  - id: comment_preserved_across_sequential_removals
    type: fail_to_pass
    origin: pr_diff
    description: "Comments survive when multiple deps are removed in sequence via separate uv remove calls"

  - id: existing_unit_tests_pass
    type: pass_to_pass
    origin: repo_tests
    description: "Existing uv-workspace unit tests still pass"

  - id: remove_only_dep_basic
    type: pass_to_pass
    origin: static
    description: "Removing the sole dependency works and leaves dependencies key"

  - id: no_panic_unwrap_unreachable
    type: pass_to_pass
    origin: agent_config
    description: "remove_dependency avoids panic!/unreachable!/.unwrap() per CLAUDE.md line 7"
    source:
      path: "CLAUDE.md"
      lines: "7"
      commit: "46c9bac182d64359cef45d51fd796b81b3736f8b"

rubric:
  - rule: "PREFER patterns like `if let` to handle fallibility"
    source:
      path: "CLAUDE.md"
      lines: "8"
      commit: "46c9bac182d64359cef45d51fd796b81b3736f8b"

  - rule: "PREFER let chains (`if let` combined with `&&`) over nested `if let` statements"
    source:
      path: "CLAUDE.md"
      lines: "11"
      commit: "46c9bac182d64359cef45d51fd796b81b3736f8b"

  - rule: "PREFER top-level imports over local imports or fully qualified names"
    source:
      path: "CLAUDE.md"
      lines: "16"
      commit: "46c9bac182d64359cef45d51fd796b81b3736f8b"

  - rule: "AVOID shortening variable names, e.g., use `version` instead of `ver`, and `requires_python` instead of `rp`"
    source:
      path: "CLAUDE.md"
      lines: "17"
      commit: "46c9bac182d64359cef45d51fd796b81b3736f8b"

  - rule: "PREFER #[expect()] over #[allow()] if clippy must be disabled"
    source:
      path: "CLAUDE.md"
      lines: "10"
      commit: "46c9bac182d64359cef45d51fd796b81b3736f8b"
