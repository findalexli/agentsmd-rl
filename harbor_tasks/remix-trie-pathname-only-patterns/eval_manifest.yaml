version: '2.0'
task:
  kind: code_fix
  name: remix-trie-pathname-only-patterns
  title: 'TrieMatcher: support pathname-only patterns and return null on miss'
  difficulty: medium
  tags:
  - typescript
  - routing
  - trie
  - data-structures
source:
  repo: remix-run/remix
  pr: 10992
  base_commit: 3aa3d939d558aac03bfb0f3796bb7d6d4aacfa70
  merge_commit: d662c33fb9d6ddec885c71bf1e1fa8c523b44c8e
  primary_files:
  - packages/route-pattern/src/lib/matchers/trie.ts
checks:
- id: test_pathname_only_static_matches
  type: fail_to_pass
  origin: pr_diff
  description: 'A pathname-only static pattern (no hostname/protocol prefix) matches a

    URL with that pathname under any hostname.

    '
- id: test_pathname_only_nested_static_matches
  type: fail_to_pass
  origin: pr_diff
  description: 'A pathname-only pattern with multiple segments (e.g. ''api/v1/users'')

    matches URLs whose pathname is /api/v1/users under any hostname.

    '
- id: test_pathname_only_variable_matches
  type: fail_to_pass
  origin: pr_diff
  description: 'A pathname-only pattern with a variable segment (e.g. ''users/:id'')

    matches and captures the variable into params.

    '
- id: test_pathname_only_wildcard_matches
  type: fail_to_pass
  origin: pr_diff
  description: 'A pathname-only pattern with a wildcard segment (e.g. ''files/*path'')

    matches and captures the remaining segments into the wildcard param.

    '
- id: test_pathname_only_matches_across_hostnames
  type: fail_to_pass
  origin: pr_diff
  description: 'The same pathname-only pattern matches the same path under multiple

    different hostnames (example.com, other.com, localhost).

    '
- id: test_match_returns_null_when_no_match
  type: fail_to_pass
  origin: pr_diff
  description: 'TrieMatcher.match() returns null (not undefined) when no pattern

    matches, agreeing with its declared return type.

    '
- id: test_explicit_hostname_does_not_match_different_host
  type: fail_to_pass
  origin: pr_diff
  description: 'A pattern with an explicit hostname (e.g. ''://example.com/users'') is

    still scoped to that hostname and does not match other hostnames after

    pathname-only support is added.

    '
- id: test_existing_trie_tests_pass
  type: pass_to_pass
  origin: repo_tests
  description: 'The existing TrieMatcher test file (packages/route-pattern/src/lib/matchers/trie.test.ts)

    continues to pass.

    '
- id: test_existing_array_matcher_tests_pass
  type: pass_to_pass
  origin: repo_tests
  description: 'Sibling ArrayMatcher tests continue to pass (regression guard for the

    matchers module).

    '
- id: test_no_var_declarations_in_trie
  type: pass_to_pass
  origin: agent_config
  description: 'AGENTS.md rule: ''never use var''. trie.ts must not contain var

