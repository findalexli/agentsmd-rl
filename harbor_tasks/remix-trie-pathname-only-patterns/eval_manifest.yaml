    path: AGENTS.md
  rule: 'Prettier convention used throughout this repo: no trailing semicolons

    on statements. New code introduced into trie.ts should follow this

    style.

    '
- id: prettier_single_quotes
  source:
    lines: '20'
    commit: 3aa3d939d558aac03bfb0f3796bb7d6d4aacfa70
    path: AGENTS.md
  rule: 'Prettier convention used throughout this repo: single quotes for

    string literals (not double quotes), printWidth 100, 2-space

    indentation.

    '
- id: import_type_for_type_only_imports
  source:
    lines: '15'
    commit: 3aa3d939d558aac03bfb0f3796bb7d6d4aacfa70
    path: AGENTS.md
  rule: 'Type-only imports must use ''import type { X }'' syntax (separate from

    value imports). Same rule applies to type-only re-exports

    (''export type { X }'').

    '
- id: prefer_let_for_locals
  source:
    lines: '16'
    commit: 3aa3d939d558aac03bfb0f3796bb7d6d4aacfa70
    path: AGENTS.md
  rule: 'Use ''let'' for local variables; ''const'' only at module scope. Never

    ''var''. (Inside this file, virtually all locals are introduced with

    let — new code should match.)

    '
- id: object_method_shorthand
  source:
    lines: '18'
    commit: 3aa3d939d558aac03bfb0f3796bb7d6d4aacfa70
    path: AGENTS.md
  rule: 'Use shorthand method syntax in object literals (''{ method() {} }'')

    instead of arrow-function-valued properties (''{ method: () => {} }'').

    '
- id: minimal_non_jsdoc_comments
  source:
    lines: '22'
    commit: 3aa3d939d558aac03bfb0f3796bb7d6d4aacfa70
    path: AGENTS.md
  rule: 'Only add non-JSDoc comments when the code is doing something

    surprising or non-obvious. Avoid restating what the code already

    makes clear.

    '
- id: descriptive_lowercase_generics
  source:
    lines: '21'
    commit: 3aa3d939d558aac03bfb0f3796bb7d6d4aacfa70
    path: AGENTS.md
  rule: 'Use descriptive lowercase names for generic type parameters (e.g.,

    ''data'', ''pattern'') instead of single uppercase letters like ''T'' or

    ''K''. The existing ''class TrieMatcher<data = unknown>'' pattern in

    this file demonstrates this convention.

    '
