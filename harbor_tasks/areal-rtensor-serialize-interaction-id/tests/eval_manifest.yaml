rubric:
- rule: No wildcard imports (`from x import *`).
  source:
    path: areal/experimental/openai/proxy/server.py
    lines: 1-50
  evidence: The gold solution has no wildcard imports. It uses explicit imports like
    `from pydantic import BaseModel` and imports heavy deps inside functions like
    `from areal.infra.rpc.serialization import serialize_value`.
  category: style
- rule: Heavy optional deps (torch, transformers) should be imported inside functions,
    not at module level
  source:
    path: areal/experimental/inference_service/data_proxy/app.py
    lines: 359-375
  evidence: The gold solution places the import `from areal.infra.rpc.rtensor import
    RTensor` inside the `export_trajectories` function, matching the existing pattern
    of local function-level imports.
  category: style
- rule: No hardcoded secrets, paths, or endpoints.
  source:
    path: areal/experimental/inference_service/data_proxy/app.py
    lines: 359-375
  evidence: The gold solution dynamically passes `config.serving_addr` to `RTensor.remotize()`
    rather than hardcoding a local or remote endpoint address.
  category: architecture
distractors:
- rule: 'Ask first before: Deleting or renaming public APIs.'
  collision_type: rule_conflict
  why_distracting: The rule requires the agent to ask first before deleting or renaming
    public APIs. The agent might pause to ask for permission before removing the `node_addr`
    parameter from `serialize_interactions`, but the PR instruction explicitly requires
    refactoring the serialization logic, making the parameter obsolete.
  severity: medium
  source:
    path: AGENTS.md
    lines: 42-43
- rule: Add tests for new functionality.
  collision_type: scope_ambiguity
  why_distracting: The rule mandates adding tests for new functionality. The agent
    might waste time trying to write unit tests for the serialization roundtrip, but
    this is a bug fix rather than new functionality, and the gold solution does not
    include tests.
  severity: low
  source:
    path: AGENTS.md
    lines: '35'
hierarchy_analysis: Both `AGENTS.md` and `CLAUDE.md` reside at the root level and
  contain overlapping rules (e.g., pre-commit hooks, adding tests, asking before changing
  APIs). There are no conflicts between the config files themselves, but the explicit
  PR instructions override the general 'Ask first' constraints found in both files.
