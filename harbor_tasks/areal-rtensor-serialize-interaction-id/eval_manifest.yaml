distractors:
- rule: Batch ops over Python loops on tensor elements.
  collision_type: would_cause_bug
  why_distracting: An agent might try to avoid the `for item in interactions.values():`
    loop by batching the `RTensor.remotize` calls. However, `interactions` is a dictionary
    of `InteractionWithTokenLogpReward` objects, and `remotize` expects a tensor dict
    cache. Attempting to batch this would cause a bug.
  severity: high
  source:
    path: AGENTS.md
    lines: 62-63
- rule: Add tests for new functionality
  collision_type: scope_ambiguity
  why_distracting: An agent might try to add a unit test for the serialization roundtrip.
    However, this is a bug fix, not new functionality, and the test suite might require
    complex mocking of the data proxy or multi-node hardware (as mentioned in the
    constraints).
  severity: medium
  source:
    path: CLAUDE.md
    lines: 43-44
hierarchy_analysis: Both CLAUDE.md and AGENTS.md provide overlapping rules (e.g.,
  no wildcard imports, add tests). AGENTS.md acts as a more specific operational guide
  for AI agents, adding performance constraints like avoiding Python loops on tensor
  elements, which creates a potential collision in this PR.
