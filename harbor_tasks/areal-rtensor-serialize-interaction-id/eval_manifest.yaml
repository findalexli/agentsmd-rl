version: "2.0"

source:
  repo: "inclusionAI/AReaL"
  pr: 1067
  base_commit: "3bf10c9c56eeae846b3de52dde8db42918f80690"
  merge_commit: "9639749e700ea278e0617589391cc3dda6ec3a5c"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified files must parse without errors"

  - id: interaction_id_setter_getter
    type: fail_to_pass
    origin: pr_diff
    description: "Bare InteractionWithTokenLogpReward supports setting and reading interaction_id (multiple values, empty string, independent instances)"

  - id: setter_rejects_completion_and_response
    type: fail_to_pass
    origin: pr_diff
    description: "Setting interaction_id on completion or response objects raises ValueError"

  - id: roundtrip_preserves_interaction_id
    type: fail_to_pass
    origin: pr_diff
    description: "interaction_id survives serialize -> deserialize cycle with varied IDs and tensor shapes"

  - id: multi_interaction_roundtrip
    type: fail_to_pass
    origin: pr_diff
    description: "Multiple interactions each retain their own interaction_id and reward after roundtrip"

  - id: roundtrip_preserves_tensor_data
    type: fail_to_pass
    origin: pr_diff
    description: "Tensor data in _cache survives serialize -> deserialize cycle"

  - id: serialize_value_roundtrip
    type: pass_to_pass
    origin: repo_tests
    description: "Core serialize_value/deserialize_value utilities still work correctly"

  - id: ruff_lint_modified
    type: pass_to_pass
    origin: repo_tests
    description: "Modified files can be processed by ruff linter (no crashes/syntax errors)"

  - id: modified_files_exist
    type: pass_to_pass
    origin: repo_tests
    description: "Modified files exist in the repository"

  - id: no_wildcard_imports
    type: pass_to_pass
    origin: agent_config
    description: "No wildcard imports (from x import *) in modified files"
    source:
      path: "AGENTS.md"
      lines: "30"
      commit: "3bf10c9c56eeae846b3de52dde8db42918f80690"

  - id: type_hints_on_new_fields
    type: pass_to_pass
    origin: agent_config
    description: "New dataclass fields use explicit type annotations"
    source:
      path: "AGENTS.md"
      lines: "99"
      commit: "3bf10c9c56eeae846b3de52dde8db42918f80690"

  - id: new_fields_have_defaults
    type: pass_to_pass
    origin: agent_config
    description: "New dataclass fields have default values for backward compatibility"
    source:
      path: "AGENTS.md"
      lines: "162-163"
      commit: "3bf10c9c56eeae846b3de52dde8db42918f80690"

  - id: no_bare_print
    type: pass_to_pass
    origin: agent_config
    description: "Modified files use areal.utils.logging, not bare print()"
    source:
      path: "AGENTS.md"
      lines: "89-91"
      commit: "3bf10c9c56eeae846b3de52dde8db42918f80690"

  - id: no_tolist_in_serialize
    type: fail_to_pass
    origin: agent_config
    description: "serialize_interactions must not call .tolist() directly -- use serialize_value for GPU-CPU sync avoidance"
    source:
      path: "AGENTS.md"
      lines: "95"
      commit: "3bf10c9c56eeae846b3de52dde8db42918f80690"

rubric:
  - rule: "Follow existing code patterns in the same module"
    source:
      path: "AGENTS.md"
      lines: "40"
      commit: "3bf10c9c56eeae846b3de52dde8db42918f80690"
  - rule: "Heavy optional deps (torch, transformers) should be imported inside functions, not at module level"
    source:
      path: "AGENTS.md"
      lines: "99-100"
      commit: "3bf10c9c56eeae846b3de52dde8db42918f80690"
  - rule: "Batch tensor operations over Python loops on tensor elements"
    source:
      path: "AGENTS.md"
      lines: "96"
      commit: "3bf10c9c56eeae846b3de52dde8db42918f80690"
