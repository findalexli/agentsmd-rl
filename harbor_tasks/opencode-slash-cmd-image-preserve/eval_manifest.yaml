distractors:
- rule: Reduce total variable count by inlining when a value is only used once.
  collision_type: scope_ambiguity
  why_distracting: An agent might interpret 'used once' as 'used once per execution
    path' and attempt to inline `imageAttachments()` directly into both `prompt.set()`
    calls. This would duplicate the function call in the source code, whereas the
    gold solution correctly extracts it to a shared `const images` variable before
    the branch.
  severity: low
  source:
    path: AGENTS.md
    lines: 44-56
hierarchy_analysis: The hierarchy consists of a root `AGENTS.md` with general style
  rules and a package-specific `packages/app/AGENTS.md` with SolidJS and local dev
  instructions. The rules do not directly conflict, but the agent must apply the root
  style rules (naming, const usage) to the SolidJS component modification.
