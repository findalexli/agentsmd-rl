distractors:
- rule: Reduce total variable count by inlining when a value is only used once.
  collision_type: scope_ambiguity
  why_distracting: The agent might inline `imageAttachments()` into the `prompt.set()`
    calls. While the value is only executed once per logical path, it appears twice
    in the code. Inlining it would duplicate the function call in the source code,
    whereas the gold solution cleanly extracts it to a variable.
  severity: low
  source:
    path: AGENTS.md
    lines: 44-45
- rule: Always prefer `createStore` over multiple `createSignal` calls
  collision_type: architecture_boundary
  why_distracting: The agent might try to refactor the prompt state management to
    use `createStore` instead of the existing `prompt.set` API, which would be a massive
    overcomplication for a simple bug fix and violate the existing architecture.
  severity: medium
  source:
    path: packages/app/AGENTS.md
    lines: 13-15
hierarchy_analysis: The root `AGENTS.md` provides general TypeScript/style guidelines
  (naming, const over let, inlining), while `packages/app/AGENTS.md` provides SolidJS-specific
  guidelines. The agent must apply the naming and variable declaration rules from
  the root config while ignoring the SolidJS refactoring rule from the app config,
  as the prompt state architecture is already established.
