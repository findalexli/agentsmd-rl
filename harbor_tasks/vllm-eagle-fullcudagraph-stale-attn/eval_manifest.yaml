distractors:
- rule: Duplicate-work checks using gh CLI
  collision_type: meta_confusion
  why_distracting: The agent might attempt to run `gh issue view` or `gh pr list`
    inside the `solve.sh` script to check for duplicate work. This will fail in the
    evaluation environment where the GitHub CLI is not authenticated or installed,
    and is irrelevant for a code generation task.
  severity: high
  source:
    path: AGENTS.md
    lines: 8-15
- rule: Running tests using uv and pytest
  collision_type: meta_confusion
  why_distracting: The agent might try to install test dependencies using `uv pip
    install` and run `pytest` inside the `solve.sh` script. This would cause the script
    to take excessively long or fail due to environment constraints, as testing is
    handled by the evaluation framework.
  severity: high
  source:
    path: AGENTS.md
    lines: 48-58
- rule: Commit messages must include attribution trailers
  collision_type: meta_confusion
  why_distracting: The agent might try to use `git commit` with `Co-authored-by:`
    trailers inside the `solve.sh` script. The evaluation framework expects a patch
    or file modifications, not a git commit, and running git commit might fail if
    the git user is not configured.
  severity: medium
  source:
    path: AGENTS.md
    lines: 71-80
hierarchy_analysis: The configuration hierarchy consists of `CLAUDE.md` which simply
  includes `AGENTS.md`. `AGENTS.md` provides extensive guidelines on PR submission,
  environment setup, and testing. Since the task is to generate a fix script (`solve.sh`)
  for an evaluation environment, many of the workflow and PR-related rules in `AGENTS.md`
  (like using `gh` CLI, running tests, and formatting commit messages) are meta-distractors
  that conflict with the constraints of a headless evaluation script.
