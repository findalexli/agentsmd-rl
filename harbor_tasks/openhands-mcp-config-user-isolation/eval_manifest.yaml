source:
  repo: All-Hands-AI/OpenHands
  pr_number: 13591
  base_commit: f7b53283b5692e1ba1755bfba8a51f09c76f5ec7
  merge_commit: 9be60bc28698f78c0d06d17624d69622fab47ea6
  title: "fix: make MCP settings user-specific within organization"
  description: |
    Previously, MCP config was stored at the org level, making it visible to all users
    in the organization. This change moves MCP config storage to the org_member table,
    ensuring each user's MCP settings are private and isolated from other members.

checks:
