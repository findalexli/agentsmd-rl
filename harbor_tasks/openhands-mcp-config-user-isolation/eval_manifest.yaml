    description: org_models.py has valid Python syntax

  # Fail-to-pass: These tests fail on base commit, pass on correct fix
  - id: test_migration_file_exists
    type: fail_to_pass
    origin: behavior
    description: "Migration 103 should add mcp_config column to org_member table"

  - id: test_migration_has_downgrade
    type: fail_to_pass
    origin: behavior
    description: "Migration should include downgrade function to drop mcp_config column"

  - id: test_org_member_model_has_mcp_config
    type: fail_to_pass
    origin: behavior
    description: "OrgMember SQLAlchemy model should have mcp_config JSON column"

  - id: test_saas_settings_store_load_reads_from_org_member
    type: fail_to_pass
    origin: behavior
    description: "SaasSettingsStore.load() should read mcp_config from org_member.mcp_config"

  - id: test_saas_settings_store_store_skips_org_mcp_config
    type: fail_to_pass
    origin: behavior
    description: "SaasSettingsStore.store() should skip mcp_config when saving to org model"

  - id: test_org_update_model_no_mcp_config
    type: fail_to_pass
    origin: behavior
    description: "OrgUpdate Pydantic model should NOT have mcp_config field (removed)"

  - id: test_store_method_preserves_other_fields
    type: fail_to_pass
    origin: behavior
    description: "store() should continue saving other fields to org, only skip mcp_config"

  - id: test_load_method_checks_for_none
    type: fail_to_pass
    origin: behavior
    description: "load() should check if org_member.mcp_config is not None before using"

  - id: test_unit_tests_exist_for_mcp_config_isolation
    type: fail_to_pass
    origin: behavior
    description: "Unit tests should exist for MCP config user-specific behavior"

  - id: test_migration_has_correct_revision
