  - id: test_repo_python_syntax_valid
    type: pass_to_pass
    origin: repo_tests
    description: All Python files in the repo should have valid syntax

  - id: test_repo_migration_102_exists
    type: pass_to_pass
    origin: repo_tests
    description: Migration 102 should exist as down_revision for migration 103

  - id: test_repo_storage_modules_syntax
    type: pass_to_pass
    origin: repo_tests
    description: All storage module files should have valid Python syntax

  - id: test_repo_routes_modules_syntax
    type: pass_to_pass
    origin: repo_tests
    description: All routes module files should have valid Python syntax

  - id: test_repo_migrations_dir_structure
