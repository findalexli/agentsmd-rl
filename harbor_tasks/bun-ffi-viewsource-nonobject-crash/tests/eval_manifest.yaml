rubric:
- rule: In Zig code, be careful with allocators and use defer for cleanup where applicable.
  source:
    path: src/bun.js/api/ffi.zig
    lines: 960-1201
    commit: 0de7a806d108a56a2c9f87d5974c52384059c397
  reference: "The gold solution adds arg_types cleanup loops in three error-return\
    \ paths:\nfor (symbols.values()) |*function_| {\n    function_.arg_types.deinit(allocator);\n\
    }\nThis properly deinitializes the arg_types array before clearAndFree in error\
    \ paths.\n"
- rule: Always use `bun.*` APIs instead of `std.*`
  source:
    path: src/bun.js/api/ffi.zig
    lines: 1055-1058
    commit: 0de7a806d108a56a2c9f87d5974c52384059c397
  reference: 'When deinitializing the `arg_types` array to fix the memory leak, the

    gold solution uses `bun.default_allocator` (or the locally available `allocator`

    alias) rather than introducing a `std` allocator.

    '
- rule: Always use `bun.*` APIs instead of `std.*`.
  source:
    path: src/AGENTS.md
    lines: 18-20
  evidence: 'The gold solution uses `bun.default_allocator` to deinitialize `arg_types`
    in one of the functions, adhering to the convention of using Bun''s specific APIs
    and allocators rather than standard library '
  category: tooling
distractors:
- rule: NEVER write tests that check for no "panic" or "uncaught exception" or similar
    in the test output.
  collision_type: scope_ambiguity
  why_distracting: The issue explicitly describes a bug where the program crashes
    (panics) instead of throwing a TypeError. An agent might be tempted to write a
    test that simply checks that no panic occurs when passing a non-object, but the
    rule strictly forbids writing tests that check for 'no panic'. The agent must
    instead test for the specific TypeError.
  severity: medium
  source:
    path: AGENTS.md
    lines: 68-69
- rule: Always use `bun.*` APIs instead of `std.*`.
  collision_type: architecture_boundary
  why_distracting: The agent needs to fix memory leaks by deinitializing `arg_types`.
    It might try to import and use standard Zig allocators (like `std.heap.page_allocator`)
    to manage this memory, but it must use the existing `allocator` or `bun.default_allocator`
    as per the codebase conventions.
  severity: low
  source:
    path: src/AGENTS.md
    lines: 15-16
hierarchy_analysis: The configuration hierarchy consists of a root-level file (`AGENTS.md`/`CLAUDE.md`)
  focusing on testing and build commands, and a source-level file (`src/AGENTS.md`/`src/CLAUDE.md`)
  focusing on Zig-specific conventions. They are complementary rather than conflicting.
