rubric:
- rule: In Zig code, be careful with allocators and use defer for cleanup where applicable.
  source:
    path: AGENTS.md
    lines: '232'
    commit: 0de7a806d108a56a2c9f87d5974c52384059c397
- rule: Always use `bun.*` APIs instead of `std.*`
  source:
    path: src/CLAUDE.md
    lines: 15-16
  evidence: When deinitializing the `arg_types` array to fix the memory leak, the
    gold solution uses `bun.default_allocator` (or the locally available `allocator`
    alias) rather than introducing a `std` allocator.
  category: style
distractors:
- rule: Use `bun.sys.open` for system calls instead of `std.posix.open`
  collision_type: scope_ambiguity
  why_distracting: The issue mentions fixing error-return paths in `open`, `print`,
    and `linkSymbols`. These refer to the JavaScript FFI API methods implemented in
    Zig (e.g., `Bun.FFI.open`), not system-level file operations. An agent might mistakenly
    think it needs to refactor these functions to use `bun.sys.open` or apply system
    call error handling patterns (`Maybe(T)`), which would be completely wrong for
    JS API bindings.
  severity: high
  source:
    path: src/CLAUDE.md
    lines: 36-45
- rule: NEVER write tests that check for no 'panic' or 'uncaught exception' or similar
    in the test output.
  collision_type: meta_confusion
  why_distracting: The issue explicitly describes a bug where the code 'causes a debug
    assertion failure (crash)' and 'leading to a panic on non-object inputs'. An agent
    might read this rule and either avoid writing a test altogether, or get confused
    about how to test a fix for a panic. The correct approach is to test that a `TypeError`
    is thrown, but the strong wording against testing for panics creates meta-level
    confusion.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 65-66
hierarchy_analysis: The hierarchy consists of root-level `CLAUDE.md` focusing on testing/building,
  and `src/CLAUDE.md` focusing on Zig conventions and system calls. The rules are
  complementary and accumulate cleanly. The main conflicts arise from terminology
  in the issue description ('open', 'panic') colliding with specific rules in the
  config (`bun.sys.open`, 'never test for no panic').
