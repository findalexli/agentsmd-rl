source:
  pr:
    repo: "excalidraw/excalidraw"
    number: 10748
    title: "fix: Other binding converted from fixed to orbit unconditionally"
    base_commit: "83d3943cd0973aa2fe6dc843a730bcb50e8a26ec"
    merge_commit: "b43260d97be0cd36faaa630595c299963de2cb6c"
  files_changed:
    - "packages/element/src/binding.ts"
    - "packages/excalidraw/components/App.tsx"

# Each check corresponds to a test function in test_outputs.py
checks:
  # Fail-to-pass tests (verify the fix is present)
  - id: test_binding_ts_never_override_check_exists
    type: fail_to_pass
    origin: agent_config
    source:
      file: "packages/element/src/binding.ts"
      lines: "813-825"
      commit: "b43260d97be0cd36faaa630595c299963de2cb6c"
    description: "The otherNeverOverride check exists in binding.ts to prevent overriding fixed bindings"

  - id: test_app_ts_tracks_arrow_start_is_inside
    type: fail_to_pass
    origin: agent_config
    source:
      file: "packages/excalidraw/components/App.tsx"
      lines: "8746"
      commit: "b43260d97be0cd36faaa630595c299963de2cb6c"
    description: "App.tsx tracks arrowStartIsInside in initialState to know when binding is fixed"

  - id: test_binding_logic_preserves_inside_binding
    type: fail_to_pass
    origin: agent_config
    source:
      file: "packages/element/src/binding.ts"
      lines: "813-825"
      commit: "b43260d97be0cd36faaa630595c299963de2cb6c"
    description: "Binding logic checks otherBinding?.mode === 'inside' to preserve fixed bindings"

  - id: test_no_orbit_override_for_fixed_binding
    type: fail_to_pass
    origin: agent_config
    source:
      file: "packages/element/src/binding.ts"
      lines: "816-838"
      commit: "b43260d97be0cd36faaa630595c299963de2cb6c"
    description: "The mode: 'orbit' assignment is gated by !otherNeverOverride check"

  # Pass-to-pass tests (regression checks - repo CI)
  - id: test_repo_typecheck
    type: pass_to_pass
    origin: repo_tests
    description: "TypeScript compilation passes (yarn test:typecheck)"

  - id: test_repo_lint
    type: pass_to_pass
    origin: repo_tests
    description: "ESLint passes (yarn test:code)"

  - id: test_repo_prettier
    type: pass_to_pass
    origin: repo_tests
    description: "Prettier formatting passes (yarn test:other)"

  - id: test_repo_binding_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Binding-specific unit tests pass (packages/element/tests/binding.test.tsx)"

  - id: test_repo_element_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Element package unit tests pass (packages/element/tests/)"

# Rubric for soft/subjective rules from agent configs
