rubric:
- rule: PR review guidelines in copilot-instructions.md are concise, actionable, and
    focus on substantive issues over style.
  source:
    path: .github/copilot-instructions.md
    lines: 1-9
    commit: 4df350b1c81b61ea471ff12767efd8e05f773377
  reference: '## PR Review Guidelines

    When reviewing pull requests:

    - Only comment on semantically meaningful issues: bugs, incorrect logic, security
    problems, or API contract violations.

    - Skip style, formatting, naming, and whitespace observations unless they cause
    functional problems.

    - Keep each comment short — one or two sentences maximum.

    - Do not write long descriptions or summaries of what the code does.

    - Do not suggest refactors or improvements unrelated to the PR''s stated goal.

    '
- rule: Assume watch is running and code is up to date. Generated files (types, channels,
    validators) are produced by watch automatically.
  source:
    path: CLAUDE.md
    lines: 38-39
  evidence: The gold solution only edits the source TypeScript files (`network.ts`,
    `commands.ts`) and does not manually update any generated files, relying on the
    watch process.
  category: tooling
- rule: '`playwright-core` is the package for the browser automation engine, server,
    and dispatchers.'
  source:
    path: CLAUDE.md
    lines: 4-5
  evidence: The MCP tool backend is modified in `packages/playwright-core/src/tools/backend/network.ts`,
    respecting the package boundary where core server/dispatcher logic lives.
  category: architecture
