distractors:
- rule: docs/src/ API documentation — source of truth for public TypeScript types
  collision_type: scope_ambiguity
  why_distracting: The agent might try to document the new MCP tool parameters in
    `docs/src/api/`, but MCP tools are internal/developer tools and their schema is
    self-documenting via `zod`, not part of the public Playwright API.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 24-25
- rule: Import boundaries are enforced via DEPS.list files
  collision_type: scope_ambiguity
  why_distracting: The agent might look for or try to modify `DEPS.list` files when
    updating the network tool, but no new cross-package imports are needed for adding
    simple boolean/string parameters.
  severity: low
  source:
    path: CLAUDE.md
    lines: 67-68
