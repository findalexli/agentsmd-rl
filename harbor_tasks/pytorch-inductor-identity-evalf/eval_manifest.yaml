      path: "CLAUDE.md"
      lines: "62"
      commit: "f95d7a4bacff6a1e4f11a232c0f8a3f2b42bed4e"

  - rule: "Match existing code style and architectural patterns."
    source:
      path: "CLAUDE.md"
      lines: "57"
      commit: "f95d7a4bacff6a1e4f11a232c0f8a3f2b42bed4e"
