version: "2.0"

source:
  repo: "pytorch/pytorch"
  pr: 176783
  base_commit: "f95d7a4bacff6a1e4f11a232c0f8a3f2b42bed4e"
  merge_commit: "dc12b65cd31ba18cbdc7f2e12e7d1564a67770d0"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Target file parses without syntax errors"

  - id: identity_integer_comparison
    type: fail_to_pass
    origin: pr_diff
    description: "Identity-wrapped integers can be compared (>=) without RecursionError"

  - id: max_with_identity
    type: fail_to_pass
    origin: pr_diff
    description: "Max(0, Identity(x)) evaluates correctly for multiple values"

  - id: rational_comparison
    type: fail_to_pass
    origin: pr_diff
    description: "Identity-wrapped rationals can be compared without RecursionError"

  - id: min_with_identity
    type: fail_to_pass
    origin: pr_diff
    description: "Min(0, Identity(x)) evaluates correctly for multiple values"

  - id: all_comparison_operators
    type: fail_to_pass
    origin: pr_diff
    description: "All four comparison operators (__ge__, __gt__, __le__, __lt__) work on Identity"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "Identity class retains __int__, __float__ and has non-trivial body"

  - id: no_dynamic_attr_access_in_identity
    type: pass_to_pass
    origin: agent_config
    description: "Identity class does not use dynamic setattr/getattr for state management"
    source:
      path: "CLAUDE.md"
      lines: "53-56"
      commit: "f95d7a4bacff6a1e4f11a232c0f8a3f2b42bed4e"

  - id: repo_flake8_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's Python flake8 syntax check passes (E9,F63,F7,F82)"

  - id: repo_pydocstyle_module
    type: pass_to_pass
    origin: repo_tests
    description: "Module has docstring and valid Python structure"

  - id: repo_imports_clean
    type: pass_to_pass
    origin: repo_tests
    description: "File has no unresolved import errors at AST level"

  - id: identity_has_comparison_methods
    type: fail_to_pass
    origin: repo_tests
    description: "Identity class has comparison magic methods (__ge__, __gt__, __le__, __lt__)"

  - id: identity_has_helper_compare_method
    type: fail_to_pass
    origin: repo_tests
    description: "Identity class has _identity_atom_compare helper method for fast-path comparison"

