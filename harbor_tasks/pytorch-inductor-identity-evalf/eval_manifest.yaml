distractors:
- rule: Only use commands provided via `spin` for linting. Generally, use `spin lint`
    as to run the lint and `spin fixlint` to apply automatic fixes.
  collision_type: rule_conflict
  why_distracting: AGENTS.md explicitly instructs to use `lintrunner -a`. An agent
    following CLAUDE.md might try to use `spin lint` and fail if the environment is
    not set up for it.
  severity: high
  source:
    path: CLAUDE.md
    lines: 23-25
- rule: Minimize comments; be concise; code should be self-explanatory and self-documenting.
  collision_type: rule_conflict
  why_distracting: An agent might omit the docstring for `_identity_atom_compare`
    to be concise, but the explanation of SymPy's symbolic path fallback is crucial
    for understanding the implementation.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 43-43
- rule: Don't make trivial (1-2 LOC) helper functions that are only used once unless
    it significantly improves code readability.
  collision_type: scope_ambiguity
  why_distracting: An agent might try to inline the comparison logic into each dunder
    method (`__ge__`, `__le__`, etc.) to avoid making a helper function, resulting
    in duplicated code. Alternatively, it might try to use `@functools.total_ordering`
    which could break SymPy's specific fallback mechanisms.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 46-47
hierarchy_analysis: CLAUDE.md and AGENTS.md are both Level 0 config files but contain
  a direct conflict regarding linting commands (`spin lint` vs `lintrunner -a`). AGENTS.md
  is typically more specific to the agent environment, so its instruction to use `lintrunner
  -a` should override CLAUDE.md's instruction to use `spin`. Additionally, there is
  an internal tension in CLAUDE.md between minimizing comments and providing useful
  global context, which the gold solution resolves by providing a targeted docstring
  for the SymPy fallback behavior.
