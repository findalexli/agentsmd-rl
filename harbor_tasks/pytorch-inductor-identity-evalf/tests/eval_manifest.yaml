rubric:
- rule: Code changes should include helpful docstrings for non-obvious behavior
  source:
    path: torch/utils/_sympy/functions.py
    lines: 1368-1379
    commit: dc12b65cd31ba18cbdc7f2e12e7d1564a67770d0
  reference: The gold solution includes a docstring in `_identity_atom_compare` explaining
    the interaction with SymPy's default symbolic path, which provides necessary global
    context for why the fast path returns None
  category: documentation
- rule: Code should use clear abstractions and avoid duplication
  source:
    path: torch/utils/_sympy/functions.py
    lines: 1380-1395
    commit: dc12b65cd31ba18cbdc7f2e12e7d1564a67770d0
  reference: The gold solution creates a single `_identity_atom_compare` helper method
    to handle the complex SymPy type checking and comparison logic, reusing it across
    `__ge__`, `__gt__`, `__le__`, and `__lt__`
  category: architecture
- rule: Implementation should be concise and match existing code patterns
  source:
    path: torch/utils/_sympy/functions.py
    lines: 1380-1395
    commit: dc12b65cd31ba18cbdc7f2e12e7d1564a67770d0
  reference: The gold solution matches patterns in functions.py - type checks, early
    returns, lambda operators, with minimal but useful comments
distractors:
- rule: Minimize comments; be concise; code should be self-explanatory and self-documenting.
  collision_type: rule_conflict
  why_distracting: The agent might omit the explanatory docstring for `_identity_atom_compare`
    to be concise, but the SymPy fallback behavior is non-obvious and requires documentation.
  severity: medium
  source:
    path: CLAUDE.md
