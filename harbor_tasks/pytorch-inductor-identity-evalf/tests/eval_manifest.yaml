- rule: Migrate a file to use stricter Pyrefly type checking with annotations required
    for all functions, classes, and attributes.
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to add strict type hints to the new dunder
    methods (`__ge__`, etc.) and `_identity_atom_compare`, which is not done in the
    gold solution and could complicate the dynamic nature of SymPy objects.
  severity: low
  source:
    path: .claude/skills/pyrefly-type-coverage
    lines: 1-2
- rule: Use raw strings (r"""...""") for all docstrings and start with the function
    signature showing all parameters.
  source:
    path: .claude/skills/docstring/SKILL.md
    lines: 10-21
  collision_type: scope_ambiguity
  why_distracting: The agent might try to format the docstring of the internal `_identity_atom_compare`
    helper using heavy Sphinx/reST documentation standards (raw strings, function
    signatures, etc.) meant for public PyTorch APIs, which is unnecessary and clutters
    internal SymPy extensions.
  severity: medium
hierarchy_analysis: The config hierarchy is flat, consisting only of root-level files
  (`AGENTS.md` and `CLAUDE.md`). The rules are generic PyTorch development guidelines
