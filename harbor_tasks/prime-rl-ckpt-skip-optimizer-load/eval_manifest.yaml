    origin: repo_tests
    description: "Repo's ruff linting passes on modified files (pass_to_pass)"

  - id: test_repo_ruff_format
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ruff formatting passes on modified files (pass_to_pass)"

  - id: test_repo_pathing_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's pathing unit tests pass (pass_to_pass)"

  - id: config_field_exists
    type: fail_to_pass
