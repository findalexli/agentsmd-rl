  - id: existing_fields_work
    type: pass_to_pass
    origin: repo_tests
    description: "Existing CheckpointConfig fields (skip_progress, skip_scheduler, interval, etc.) still work"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "Modified files have expected content and are not stubbed out"

  - id: no_try_except_in_config
    type: pass_to_pass
    origin: agent_config
    source:
      path: "AGENTS.md"
      lines: "5"
      commit: "d8030652042f38a019beffecd8aa5e07cfefe4c4"

