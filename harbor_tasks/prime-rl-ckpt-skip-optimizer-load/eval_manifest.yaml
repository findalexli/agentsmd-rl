    description: "CheckpointConfig must have a boolean skip_optimizer field"

  - id: config_default_false
    type: fail_to_pass
    origin: pr_diff
    description: "skip_optimizer must default to False so existing behavior is preserved"

  - id: config_accepts_true_and_roundtrips
    type: fail_to_pass
