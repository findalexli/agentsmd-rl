distractors:
- rule: To set up the entire repo, including frontend and backend, run `make build`.
  collision_type: scope_ambiguity
  why_distracting: The agent might run `make build` at the root level to set up the
    repo, which builds both frontend and backend. This wastes time and potentially
    causes unrelated backend setup issues, when only frontend changes are needed and
    the task instructions specify frontend-specific commands.
  severity: medium
  source:
    path: AGENTS.md
    lines: 5-6
- rule: When working on a PR that requires design documents, scripts meant for development-only,
    or other temporary artifacts... store them in a `.pr/` directory at the repository
    root.
  collision_type: scope_ambiguity
  why_distracting: The agent might create a `.pr/` directory to store debugging logs
    or analysis for this simple bug fix, which is overkill and unnecessary for a straightforward
    null-check addition.
  severity: low
  source:
    path: AGENTS.md
    lines: 38-40
- rule: Use cross-repo-testing skill when changes span the SDK and OpenHands server
    repos and need e2e testing.
  source:
    path: .agents/skills/cross-repo-testing/SKILL.md
    lines: 1-3
  collision_type: scope_ambiguity
  why_distracting: The agent might try to invoke cross-repo testing because it's fixing
    a UI bug, but this is a purely frontend fix that only requires local frontend
    tests.
  severity: low
hierarchy_analysis: The config hierarchy is flat, consisting only of the root `AGENTS.md`
  file. The agent must apply the general frontend testing and linting rules to the
  specific bug fix, ensuring that the new imports do not break existing tests.
