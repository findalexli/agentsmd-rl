distractors:
- rule: In tests, use `qt` matchers (e.g. `b.Assert(err, qt.ErrorMatches, ...)`) instead
    of raw `if`/`t.Fatal` checks.
  collision_type: scope_ambiguity
  why_distracting: The agent is modifying multiple test files to fix deprecated tokens.
    It might be tempted to refactor existing test assertions to use `qt` matchers
    while it is editing these files, which would unnecessarily expand the scope of
    the PR and create a noisy diff.
  severity: medium
  source:
    path: AGENTS.md
    lines: 10-10
- rule: 'If you need to add temporary debug printing, use `hdebug.Printf`.[^1] ...
    [^1]: CI build fail if you forget to remove the debug printing.'
  collision_type: would_cause_bug
  why_distracting: The gold solution adds a commented-out `hdebug.Panicf` to help
    debug deprecation errors in `common/hugo/hugo.go`. An agent might add uncommented
    `hdebug.Printf` statements to debug the tests and forget to remove them, which
    would fail the CI build as warned by the footnote.
  severity: high
  source:
    path: AGENTS.md
    lines: 6-17
