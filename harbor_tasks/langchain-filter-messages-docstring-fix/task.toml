name = "langchain-filter-messages-docstring-fix"
difficulty = "easy"
time_limit = 300  # 5 minutes

[description]
title = "Fix filter_messages docstring parameter names"
body = """
The filter_messages function in langchain_core/messages/utils.py has a docstring
example that uses incorrect parameter names (incl_names, incl_types, excl_ids)
instead of the actual parameter names (include_names, include_types, exclude_ids).
This causes a TypeError when users copy the example from the docs.

Your task is to fix the docstring example to use the correct parameter names.
"""

[tags]
category = "documentation"
language = "python"
framework = "langchain"
