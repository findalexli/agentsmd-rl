source:
  pr:
    owner: continuedev
    repo: continue
    number: 11429
    title: "fix: remove hardcoded Unix $ prompt prefix from terminal UI"
    base_commit: af4383f6df877ef12ba9678adec5d27b0d8e9eb3
    merge_commit: a952ea1450250352521b0e31b144c3698a24a822

  files_changed:
    - gui/src/components/UnifiedTerminal/UnifiedTerminal.tsx
    - gui/src/components/UnifiedTerminal/UnifiedTerminal.test.tsx

checks:
  - id: "copy_content_no_dollar"
    name: "Copy content excludes $ prefix"
    description: "The copyContent useMemo hook must initialize with just 'command', not '$ command'"
    type: "f2p"
    test: "test_copy_content_no_dollar_prefix"

  - id: "display_no_dollar"
    name: "Visual display excludes $ prefix"
    description: "The JSX div must render {command} without hardcoded '$ ' prefix"
    type: "f2p"
    test: "test_display_no_dollar_prefix"

  - id: "copy_content_with_output"
    name: "Copy content format with output"
    description: "When output exists, copyContent should be 'command\\n\\noutput' without $ prefix"
    type: "f2p"
    test: "test_copy_content_with_output"

  - id: "vitest_pass"
    name: "UnifiedTerminal vitest tests pass"
    description: "All UnifiedTerminal vitest tests pass with the fix"
    type: "p2p"
    test: "test_vitest_unified_terminal_tests_pass"

  - id: "test_files_updated"
    name: "Test assertions updated"
    description: "All 3 test assertions updated to check for commands without $ prefix"
    type: "p2p"
    test: "test_three_test_files_updated"

  - id: "no_regression"
    name: "Display format is correct"
    description: "Sanity check that {command} appears exactly once in display context"
    type: "p2p"
    test: "test_no_regression_dollar_in_comments"

  # Pass-to-pass tests from repo CI/CD
  - id: "repo_typecheck"
    name: "Repo TypeScript typecheck passes"
    description: "GUI package TypeScript typecheck (tsc --noEmit) passes on base commit"
    type: "pass_to_pass"
    test: "test_repo_typecheck"

  - id: "repo_lint"
    name: "Repo lint passes"
    description: "GUI package ESLint passes on base commit"
    type: "pass_to_pass"
    test: "test_repo_lint"

  - id: "repo_unified_terminal_tests"
    name: "Repo UnifiedTerminal tests pass"
    description: "GUI UnifiedTerminal vitest tests pass on base commit"
    type: "pass_to_pass"
    test: "test_repo_unified_terminal_tests"

agent_config:
  - source_file: "extensions/cli/AGENTS.md"
    rules:
      - "Whenever you create / update a test, you should run the test to be certain that it passes"
      - "If you ever create a PR, you should be sure to check the formatting and linting first with `npm run format` and `npm run lint` / `npm run lint:fix`"
      - "Run tests using `npm run test path/or/pattern`"

