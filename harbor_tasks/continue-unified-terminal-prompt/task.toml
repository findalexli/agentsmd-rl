name = "continue-unified-terminal-prompt"
title = "Remove hardcoded Unix $ prompt prefix from terminal UI"
difficulty = "easy"
tags = ["typescript", "react", "ui", "cross-platform"]

[owner]
repo = "https://github.com/continuedev/continue"
pr = 11429
base_commit = "af4383f6df877ef12ba9678adec5d27b0d8e9eb3"
merge_commit = "a952ea1450250352521b0e31b144c3698a24a822"

[time_estimates]
agent = 300      # 5 minutes for a simple change
verifier = 60    # 1 minute to run tests

[timeouts]
agent = 1800     # 30 minutes default
verifier = 120   # 2 minutes default

[paths]
task = "/workspace/task"
repo = "/workspace/continue"
logs = "/logs/verifier"

[target]
files = [
    "gui/src/components/UnifiedTerminal/UnifiedTerminal.tsx"
]
