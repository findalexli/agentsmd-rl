distractors:
- rule: 'Adding changes: Create `packages/*/.changes/[major|minor|patch].short-description.md`
    files.'
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to create a changeset file to document
    the new preview build behavior. However, the rule explicitly scopes change files
    to `packages/*/.changes/`. Since this PR only modifies repository infrastructure
    (.github/workflows, scripts) and root documentation, creating a change file would
    be incorrect and violate the scope.
  severity: high
  source:
    path: AGENTS.md
    lines: 34-35
- rule: Prerelease mode
  source:
    path: /workspace/repo/AGENTS.md
    lines: 51-55
  source_text: "    - _For the `remix` package only:_\n      - **Prerelease mode**:\
    \ An optional `.changes/config.json` file with a `prereleaseChannel` field (e.g.\
    \ `\"alpha\"`, `\"beta\"`, `\"rc\"`) denotes that the package is in prerelease\
    \ mode. The channel determines the version suffix, while the npm dist-tag is always\
    \ `\"next\"`.\n      - **Bumping prerelease versions**: You can use normal change\
    \ files. These will bump the prerelease counter (e.g. `3.0.0-alpha.1` → `3.0.0-alpha.2`).\
    \ Changelog entries still get proper Major/Minor/Patch sections, but otherwise\
    \ the bump type is ignored and only the prerelease counter is bumped.\n      -\
    \ **Transitioning between prerelease channels** (e.g. `alpha` → `beta`): Update\
    \ `prereleaseChannel` in `.changes/config.json` and add a change file. Version\
    \ resets to new channel (e.g. `3.0.0-alpha.7` → `3.0.0-beta.0`). The bump type\
    \ is for changelog categorization only—by convention, use `patch`.\n      - **Graduating\
    \ from prerelease to latest stable version**: Remove `prereleaseChannel` from\
    \ `.changes/config.json` (or delete the file) and add a change file. The prerelease\
    \ suffix will be stripped (e.g. `3.0.0-rc.7` → `3.0.0`). The bump type is for\
    \ changelog categorization only—by convention, use `major` for a major release\
    \ announcement."
  collision_type: scope_ambiguity
  why_distracting: The PR modifies GitHub workflows to publish 'preview builds' as
    installable git branches. The agent might confuse these 'preview' branches with
    npm 'prerelease' channels and mistakenly attempt to configure a prerelease channel
    in '.changes/config.json' instead of keeping the logic entirely within the git/GitHub
    Actions domain.
  severity: medium
- rule: Previewing releases
  source:
    path: /workspace/repo/AGENTS.md
    lines: '57'
  source_text: '- **Previewing releases**: `pnpm changes:preview` shows which packages
    will be released, what the CHANGELOG will look like, and the commit message.'
  collision_type: meta_confusion
  why_distracting: The text describes a CLI command for previewing changelog generation
    for npm releases, sharing the word 'preview'. The PR deals with 'preview' GitHub
    Action branches. An agent might mistakenly think it needs to run or modify this
    command or its behavior for the preview branch.
  severity: low
- rule: Test change/release code with preview scripts
  source:
    path: /workspace/repo/AGENTS.md
    lines: '61'
  source_text: '- **Test change/release code with preview scripts**: When modifying
    any change/release code, run `pnpm changes:preview` to test locally. For the release
    PR script, run `node ./scripts/release-pr.ts --preview`. For the publish script,
    run `node ./scripts/publish.ts --dry-run` to see what commands would be executed
    without actually publishing.'
  collision_type: meta_confusion
  why_distracting: This workflow instruction mentions testing release code with a
    '--preview' flag. The PR focuses on generating continuous 'preview' builds via
    GitHub Actions. The lexical overlap might lead an agent to incorrectly add a `--preview`
    flag to the action steps or modify these scripts.
  severity: low
