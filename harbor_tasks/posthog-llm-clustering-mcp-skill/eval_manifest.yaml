    \      \"trace_id\": \"abc-123\",\n      \"generation_id\": \"gen-456\"\n    }\n\
    \  },\n  \"centroid_x\": -2.1,\n  \"centroid_y\": 1.4\n}\n```\n\n- `cluster_id:\
    \ -1` is the **noise/outlier** cluster (items that didn't fit any cluster)\n-\
    \ Items in `traces` are keyed by trace ID (trace-level) or generation event UUID\
