  gold_added: "---\nname: exploring-llm-clusters\ndescription: 'Investigate LLM analytics\
    \ clusters — understand usage patterns in AI/LLM traffic, compare cluster behavior,\
    \ compute cost/latency metrics, and drill into individual traces within clusters.'\n\
    ---\n\n# Exploring LLM clusters\n\nUse this skill when investigating LLM analytics\
    \ clusters —\nunderstanding what patterns exist in your AI/LLM traffic,\ncomparing\
    \ cluster behavior, and drilling into individual clusters.\n\n## Tools\n\n| Tool\
