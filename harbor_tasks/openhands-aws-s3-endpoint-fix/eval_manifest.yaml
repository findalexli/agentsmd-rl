- rule: When working on a PR that requires design documents, scripts meant for development-only,
    or other temporary artifacts that should NOT be merged to main, store them in
    a `.pr/` directory at the repository root.
  collision_type: scope_ambiguity
  why_distracting: The agent might think it needs to create a design document in `.pr/design.md`
    for this change, but it's a straightforward configuration fix that doesn't require
    temporary artifacts or design docs.
  severity: low
  source:
    path: AGENTS.md
    lines: 36-40
