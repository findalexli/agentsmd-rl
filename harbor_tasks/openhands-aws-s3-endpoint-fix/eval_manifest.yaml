distractors:
- rule: Store PR-specific artifacts like design documents or analysis notes in a `.pr/`
    directory.
  collision_type: scope_ambiguity
  why_distracting: The agent might waste time creating a `.pr/design.md` or `.pr/analysis.md`
    to document its changes for this simple configuration fix, which is unnecessary
    and not part of the requested task.
  severity: low
  source:
    path: AGENTS.md
    lines: 36-44
- rule: Use cross-repo-testing skill when testing a cross-repo feature or deploying
    a feature branch to staging.
  source:
    path: .agents/skills/cross-repo-testing/SKILL.md
    lines: 1-3
  collision_type: scope_ambiguity
  why_distracting: The task mentions 'feature branches' and 'testing' S3/Minio endpoints,
    which might lead the agent to think it needs to use the cross-repo-testing skill
    to test a cross-repo feature or deploy a feature branch to staging. However, this
    task is purely about modifying the backend code to support these configurations,
    not actually running cross-repo tests.
  severity: low
hierarchy_analysis: The configuration consists of a single, flat `AGENTS.md` file
