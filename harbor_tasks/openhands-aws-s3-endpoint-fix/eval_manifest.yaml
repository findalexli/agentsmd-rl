rubric:
- rule: Add a helper function _get_default_aws_endpoint_url() that handles protocol
    prefixes (http/https) based on AWS_S3_SECURE environment variable.
  source:
    path: openhands/app_server/event/aws_event_service.py
    pr: All-Hands-AI/OpenHands#13579
- rule: Use Pydantic's Field with default_factory to populate endpoint_url from environment
    variables.
  source:
    path: openhands/app_server/event/aws_event_service.py
    pr: All-Hands-AI/OpenHands#13579
- rule: Update S3 client to use self.endpoint_url instead of direct os.getenv() call.
  source:
    path: openhands/app_server/event/aws_event_service.py
    pr: All-Hands-AI/OpenHands#13579
- rule: The current V1 application server lives in `openhands/app_server/`.
  source:
    path: AGENTS.md
    lines: 64-66
  evidence: The gold solution modifies `openhands/app_server/event/aws_event_service.py`,
    which aligns with the architectural guidance that the V1 application server lives
    in `openhands/app_server/`.
  category: architecture
distractors:
- rule: 'To run the full application to debug issues: export INSTALL_DOCKER=0 ...
    make build && make run FRONTEND_PORT=12000 ...'
  collision_type: scope_ambiguity
  why_distracting: The agent might try to spin up the entire application including
    the frontend to test this S3 endpoint change, which is unnecessary and time-consuming.
    Testing the backend logic directly is sufficient.
  severity: medium
  source:
    path: AGENTS.md
    lines: 8-12
- rule: When working on a PR that requires design documents, scripts meant for development-only,
    or other temporary artifacts that should NOT be merged to main, store them in
    a `.pr/` directory at the repository root.
  collision_type: scope_ambiguity
  why_distracting: The agent might think it needs to create a design document in `.pr/design.md`
    for this change, but it's a straightforward configuration fix that doesn't require
    temporary artifacts or design docs.
  severity: low
  source:
    path: AGENTS.md
    lines: 36-40
hierarchy_analysis: The repository has a single root-level `AGENTS.md` file providing
  general setup, git practices, and PR artifact guidelines. There are no conflicting
