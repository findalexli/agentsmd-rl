rubric:
- rule: Add a helper function _get_default_aws_endpoint_url() that handles protocol
    prefixes (http/https) based on AWS_S3_SECURE environment variable.
  source:
    path: openhands/app_server/event/aws_event_service.py
    pr: All-Hands-AI/OpenHands#13579
- rule: Use Pydantic's Field with default_factory to populate endpoint_url from environment
    variables.
  source:
    path: openhands/app_server/event/aws_event_service.py
    pr: All-Hands-AI/OpenHands#13579
- rule: Update S3 client to use self.endpoint_url instead of direct os.getenv() call.
  source:
    path: openhands/app_server/event/aws_event_service.py
    pr: All-Hands-AI/OpenHands#13579
- rule: The current V1 application server lives in `openhands/app_server/`.
  source:
    path: AGENTS.md
    lines: 64-66
  evidence: The gold solution modifies `openhands/app_server/event/aws_event_service.py`,
    which aligns with the architectural guidance that the V1 application server lives
    in `openhands/app_server/`.
  category: architecture
