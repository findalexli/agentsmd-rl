rubric:
- id: license_header_on_new_files
  source:
    path: .github/copilot-instructions.md @ 79c8ce77 — "Add license header to all files"
    lines: ''
    commit: ''
  rule: 'Any new C# source file added under src/ must begin with the standard MIT license header:

    // Licensed to the .NET Foundation under one or more agreements.

    // The .NET Foundation licenses this file to you under the MIT license.

    '
- id: xml_docs_on_public_apis
  source:
    path: .github/copilot-instructions.md @ 79c8ce77 — "Include XML documentation for all public APIs" / "Use <see href="https://aka.ms/efcore-docs-*">"
    lines: ''
    commit: ''
  rule: 'All newly introduced public APIs (RemoveDbContext, RemoveExtension, WithoutExtension) must

    have XML <summary>/<param>/<typeparam>/<returns> documentation. Doc links should use the

    <see href="https://aka.ms/efcore-docs-..."/> redirect form rather than hardcoded

    learn.microsoft.com links.

    '
- id: nullability_and_null_checks
  source:
    path: .github/copilot-instructions.md @ 79c8ce77 — "Use Check.NotNull and Check.NotEmpty for preconditions in public APIs" / "Don't disable nullability with a preprocessor directive"
    lines: ''
    commit: ''
  rule: 'Use Check.NotNull for non-null preconditions on public-API parameters in IServiceCollection

    extension methods (the [CallerArgumentExpression] machinery captures the parameter name

    automatically). Do not use #nullable disable.

    '
- id: avoid_breaking_public_apis
  source:
    path: .github/copilot-instructions.md @ 79c8ce77 — "Avoid breaking public APIs"
    lines: ''
    commit: ''
  rule: 'Do not modify or delete existing public APIs. The new functionality must be added as

    *new* methods (RemoveExtension on IDbContextOptionsBuilderInfrastructure, WithoutExtension

    on DbContextOptions, RemoveDbContext on IServiceCollection) without altering the existing

    AddOrUpdateExtension / WithExtension / AddDbContext signatures.

    '
- id: minimal_comments
  source:
    path: .github/copilot-instructions.md @ 79c8ce77 — "Prefer minimal comments"
    lines: ''
    commit: ''
  rule: 'Code should be self-explanatory. Inline comments inside the new method bodies should be

    sparing and only present when explaining non-obvious WHY (e.g., the ordinal-renormalization

    step). Avoid commentary that simply restates what the code does.

    '
- id: file_scoped_namespace_and_var
  source:
    path: .github/copilot-instructions.md @ 79c8ce77 — "File scoped namespace declarations" / "Use var for local variables"
    lines: ''
    commit: ''
  rule: 'Use file-scoped namespace declarations and `var` for local variable declarations in the

    new code (matches the surrounding files'' conventions in src/EFCore/).

    '
