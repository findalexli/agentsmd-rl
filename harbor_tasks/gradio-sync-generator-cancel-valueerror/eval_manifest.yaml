    description: "gradio/utils.py parses without syntax errors"

  - id: aclose_retries_on_already_executing
    type: fail_to_pass
    origin: pr_diff
    description: "aclose() retries when close() raises ValueError('generator already executing')"

  - id: aclose_retries_higher_fail_count
    type: fail_to_pass
    origin: pr_diff
    description: "aclose() retries correctly with higher failure counts (fail_count=5)"

  - id: aclose_timeout_raises
    type: fail_to_pass
    origin: pr_diff
    description: "aclose() raises ValueError after timeout is exceeded"

  - id: aclose_race_condition
    type: fail_to_pass
    origin: pr_diff
    description: "aclose() handles time-based race where close() fails temporarily"

  - id: aclose_propagates_non_matching_valueerror
    type: pass_to_pass
    origin: pr_diff
    description: "aclose() does not retry on ValueError without 'already executing'"

  - id: safe_aclose_works_with_async_generator
    type: pass_to_pass
    origin: pr_diff
    description: "safe_aclose_iterator() works with native async generators"

  - id: not_stub
    type: fail_to_pass
    origin: static
    description: "aclose() has real retry logic, not just self.iterator.close()"

  - id: test_repo_ruff_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's Python linting passes (ruff check on gradio/utils.py)"

  - id: test_repo_ruff_format
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's Python formatting passes (ruff format check on gradio/utils.py)"

  - id: test_repo_gradio_imports
    type: pass_to_pass
    origin: repo_tests
    description: "gradio module imports successfully"

  - id: test_repo_utils_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "gradio/utils.py has valid Python syntax via py_compile"

