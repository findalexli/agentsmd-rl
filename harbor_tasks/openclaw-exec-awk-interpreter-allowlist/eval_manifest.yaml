checks:
  # Fail-to-pass: awk allowlist recognition
  - id: allowlist_recognizes_awk
    type: fail_to_pass
    origin: pr_diff
    description: "isInterpreterLikeAllowlistPattern recognizes awk paths as interpreter-like"

  - id: allowlist_recognizes_awk_variants
    type: fail_to_pass
    origin: pr_diff
    description: "isInterpreterLikeAllowlistPattern recognizes gawk, mawk, nawk"

  # Fail-to-pass: inline eval detection
  - id: detect_awk_inline_positional
    type: fail_to_pass
    origin: pr_diff
    description: "detectInterpreterInlineEvalArgv detects awk positional inline program"

  - id: detect_awk_with_value_flags
    type: fail_to_pass
    origin: pr_diff
    description: "detectInterpreterInlineEvalArgv detects awk program after -F/-v flags"

  - id: awk_detection_description
    type: fail_to_pass
    origin: pr_diff
    description: "describeInterpreterInlineEval returns '<variant> inline program' format for awk family"

  - id: awk_double_dash_positional
    type: fail_to_pass
    origin: pr_diff
    description: "awk -- '{program}' detects inline code after double-dash separator"

  # Fail-to-pass: integration wiring
  - id: allowlist_imports_interpreter_check
    type: fail_to_pass
    origin: pr_diff
    description: "exec-approvals-allowlist.ts calls isInterpreterLikeAllowlistPattern"

  # Pass-to-pass: existing behavior preserved
  - id: existing_interpreters_still_detected
    type: pass_to_pass
    origin: pr_diff
    description: "python3, node, perl still recognized as interpreter-like"

  - id: awk_file_flag_not_inline
    type: pass_to_pass
    origin: pr_diff
    description: "awk -f script.awk is file-based, not inline eval"

  - id: non_interpreters_not_flagged
    type: pass_to_pass
    origin: pr_diff
    description: "Non-interpreter programs (ls, cat, rg, grep) not falsely detected"

