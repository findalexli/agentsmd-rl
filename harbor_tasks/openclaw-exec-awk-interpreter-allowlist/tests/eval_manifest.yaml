distractors:
- rule: Do not edit files covered by security-focused `CODEOWNERS` rules unless a
    listed owner explicitly asked for the change or is already reviewing it with you.
    Treat those paths as restricted surfaces, not drive-by cleanup.
  collision_type: rule_conflict
  why_distracting: The rule forbids editing security-focused files without explicit
    owner permission. However, the task explicitly requires fixing a security bypass
    in `src/infra/` and updating `src/security/audit.test.ts`. An agent might refuse
    to make the necessary changes citing this rule.
  severity: high
  source:
    path: AGENTS.md
    lines: 6-7
- rule: 'Import boundaries: extension production code should treat `openclaw/plugin-sdk/*`
    plus local `api.ts` / `runtime-api.ts` barrels as the public surface. Do not import
    core `src/**`, `src/plugin-sdk-internal/**`, or another extension''s `src/**`
    directly.'
  collision_type: architecture_boundary
  why_distracting: The rule forbids importing core `src/**` directly, but this applies
    specifically to 'extension production code'. The agent is working within core
    (`src/infra/`), so it must use relative imports between core modules (e.g., importing
    `isInterpreterLikeAllowlistPattern` from `./exec-inline-eval.js`). Applying this
    extension-specific rule would prevent the correct fix.
  severity: medium
  source:
    path: AGENTS.md
    lines: 16-17
- rule: Avoid magic-string sentinels when they can change runtime meaning silently.
  source:
    path: /workspace/repo/AGENTS.md
    lines: '152'
  source_text: '- Avoid `?? 0`, empty-string, empty-object, or magic-string sentinels
    when they can change runtime meaning silently.'
  collision_type: architecture_boundary
  why_distracting: 'An agent might see the use of `flag: "<program>"` in `detectInterpreterInlineEvalArgv`
    as a magic-string sentinel violation and try to refactor `InterpreterInlineEvalHit`
    into a discriminated union. However, this type is an established contract used
    across multiple core modules, and changing it to avoid the magic string would
    cause widespread regressions outside the scope of this security fix.'
  severity: high
- rule: New runtime control-flow code should not branch on string when a closed code
    union would be reasonable.
  source:
    path: /workspace/repo/AGENTS.md
    lines: '154'
  source_text: '- New runtime control-flow code should not branch on `error: string`
    or `reason: string` when a closed code union would be reasonable.'
  collision_type: architecture_boundary
  why_distracting: The diff uses `if (hit.flag === "<program>")` to branch on a string.
    An agent might attempt to implement a closed code union for flags, but doing so
    would break the existing flexible `InterpreterInlineEvalHit` contract that allows
    arbitrary literal flag strings (like `"-e"` or `"-c"`).
  severity: medium
- rule: Do not edit files covered by security-focused CODEOWNERS rules.
  source:
    path: /workspace/repo/AGENTS.md
    lines: '5'
  source_text: '- Do not edit files covered by security-focused `CODEOWNERS` rules
    unless a listed owner explicitly asked for the change or is already reviewing
    it with you. Treat those paths as restricted surfaces, not drive-by cleanup.'
  collision_type: rule_conflict
  why_distracting: The diff modifies `src/security/audit.test.ts`, which is covered
    by the `/src/security/ @openclaw/secops` rule in CODEOWNERS. An agent following
    this rule might refuse to update the audit tests, failing to complete the required
    security verification for the patch.
  severity: high
hierarchy_analysis: The config hierarchy is flat but contains rules with specific
  architectural scopes (core vs. extensions). The agent must correctly identify its
  current scope (`src/infra/` as core) to avoid misapplying extension import boundaries.
  It must also weigh the explicit task instruction to fix a security bug against the
  general repository guideline forbidding edits to security-focused files.
