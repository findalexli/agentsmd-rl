distractors:
- rule: Avoid writing significant amounts of new code. This is often a sign that we're
    missing an existing method or mechanism that could help solve the problem. Look
    for existing utilities first.
  collision_type: scope_ambiguity
  why_distracting: The PR requires adding a new, dedicated method `infer_typed_dict_constructor_values`
    to handle the complex validation logic for TypedDict constructors. An agent strictly
    following the rule to 'avoid writing significant amounts of new code' might try
    to shoehorn this logic into existing general call inference methods, which would
    likely fail to handle the specific edge cases of TypedDicts (like mixed dict +
    keyword args) or result in overly complex, tangled code.
  severity: medium
  source:
    path: AGENTS.md
    lines: 68-68
