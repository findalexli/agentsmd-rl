name = "clickhouse-materialize-skip-indexes-text"
title = "Fix materialize_skip_indexes_on_merge not suppressing text indexes"
description = "When materialize_skip_indexes_on_merge is set to false, text (full-text) indexes were still built during merge operations. The fix adds text_indexes_to_merge.clear() to suppress text indexes along with other skip index types."
source_pr = "ClickHouse/ClickHouse#101932"
category = "bug_fix"
difficulty = "easy"
tags = ["c++", "clickhouse", "bug-fix", "indexes", "merge-tree"]

[env]
image = "clickhouse-text-index-fix"
container = "clickhouse-task"
workdir = "/workspace/ClickHouse"

[time]
agent_timeout_sec = 1800
verifier_timeout_sec = 120

[repository]
owner = "ClickHouse"
name = "ClickHouse"
base_commit = "82211a574743ad08dfbe01e1252040efd544f9c5"
merge_commit = "6328699b74215241c0416edcae5dbf5d9b4c086d"
pr_number = 101932

[files]
primary = ["src/Storages/MergeTree/MergeTask.cpp"]
test = ["tests/queries/0_stateless/04082_materialize_skip_indexes_text_index.sql", "tests/queries/0_stateless/04082_materialize_skip_indexes_text_index.reference"]
