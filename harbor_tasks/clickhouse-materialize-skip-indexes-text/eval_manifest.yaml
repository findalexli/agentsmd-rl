rubric:
- rule: When mentioning logical errors in comments, say 'exception' instead of 'crash'
  source:
    path: .claude/CLAUDE.md
    lines: '79'
    commit: 82211a574743ad08dfbe01e1252040efd544f9c5
distractors:
- rule: 'When writing text such as documentation, comments, or commit messages, wrap
    literal names from ClickHouse SQL language, classes and functions, or literal
    excerpts from log messages inside inline code blocks, such as: `MergeTree`.'
  collision_type: scope_ambiguity
  why_distracting: The agent might interpret 'comments' as C++ source code comments
    and attempt to use Markdown backticks in the C++ code (e.g., `// Clear `text_indexes_to_merge``),
    which is not standard C++ commenting style and not present in the gold solution.
  severity: medium
  source:
    path: AGENTS.md
    lines: 5-5
- rule: When writing text such as documentation, comments, or commit messages, write
    names of functions and methods as `f` instead of `f()` - we prefer it for mathematical
    purity when it refers a function itself rather than its application.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to add unnecessary comments explaining the
    `clear` method call to demonstrate compliance with this rule (e.g., writing `clear`
    instead of `clear()`), cluttering the simple one-line fix.
  severity: low
  source:
    path: AGENTS.md
    lines: 9-9
hierarchy_analysis: The AGENTS.md file contains general repository guidelines, mostly
  focused on git workflow, documentation, and CI tools. There are no specific C++
  coding standards provided that apply to this simple bug fix.
