config_edits:
- path: CLAUDE.md
  tier: 1
  gold_added: 'Validation Task: transformers-processor-chat-template-kwargs'
  gold_removed: ''
rubric:
- rule: We try to avoid direct inheritance between model-specific files in `src/transformers/models/`.
  source:
    path: CLAUDE.md
    lines: 63-66
  evidence: The gold solution implements the `apply_chat_template` fix independently
    in both `src/transformers/models/smolvlm/processing_smolvlm.py` and `src/transformers/models/voxtral/processing_voxtral.py`
    rat
  category: architecture
distractors:
- rule: If coordination evidence cannot be found, do not proceed to PR-ready output.
  collision_type: meta_confusion
  why_distracting: In an automated evaluation environment, the agent is expected to
    output the code fix directly. If it follows this rule, it will fail-closed and
    refuse to generate the patch because no coordination evidence or issue link is
    provided in the prompt.
  severity: high
  source:
    path: CLAUDE.md
    lines: 57-61
- rule: Pure code-agent PRs are not allowed... Do not raise PRs without human validation.
  collision_type: meta_confusion
  why_distracting: The agent might output conversational text asking for a human to
    validate the changes or refuse to output the final patch entirely, which breaks
    the automated evaluation harness that expects a direct code solution.
  severity: high
  source:
    path: CLAUDE.md
    lines: 47-55
- rule: Do not edit a `# Copied from` block, as it will be reverted by `make fix-repo`.
    Ideally you should edit the code it's copying from.
  collision_type: scope_ambiguity
  why_distracting: The agent might assume that `apply_chat_template` in the model-specific
    processing files (`processing_smolvlm.py`, `processing_voxtral.py`) are copied
    from a common source and waste time looking for a non-existent source to edit,
    or it might hesitate to modify these files directly out of fear that `make fix-repo`
    will revert its changes.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 67-70
hierarchy_analysis: '`CLAUDE.md` and `AGENTS.md` contain identical content. The rules
  are heavily focused on meta-contribution guidelines (coordination, human validation,
  fail-closed behavior) which are highly distracting for an autonomous coding agent
  in a benchmark setting. The agent must ignore the meta-rules about refusing to work
  without human coordination, while still adhering to the architectural rules about
  model-specific files.'
