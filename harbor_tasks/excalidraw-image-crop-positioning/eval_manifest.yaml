source_pr:
  owner: excalidraw
  repo: excalidraw
  number: 10726
  title: "fix(editor): image positioning in crop editor"
  merge_commit: b57f3e009694acaa73e83ab9bab9a1470dd52ab3
  base_commit: f12ae80ba1e1364952c6c6c440ac4212acd06eab

target_files:
  - packages/excalidraw/components/App.tsx

checks:
  - id: previous_pointer_field_exists
    description: "previousPointerMoveCoords field is declared with proper comment"
    type: fail_to_pass

  - id: last_pointer_coords_uses_previous
    description: "lastPointerCoords uses previousPointerMoveCoords for drag calculation"
    type: fail_to_pass

  - id: crop_x_uses_subtraction
    description: "crop.x calculation uses subtraction for offsetVector"
    type: fail_to_pass

  - id: crop_y_uses_subtraction
    description: "crop.y calculation uses subtraction for offsetVector"
    type: fail_to_pass

  - id: previous_pointer_reset_on_pointer_up
    description: "previousPointerMoveCoords is reset to null on pointer up"
    type: fail_to_pass

  - id: typescript_compiles
    description: "TypeScript compiles without type errors"
    type: pass_to_pass

  - id: unit_tests_pass
    description: "Unit tests pass without critical errors"
    type: pass_to_pass

  - id: test_repo_lint
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ESLint check passes"

  - id: test_repo_format
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's Prettier format check passes"

agent_config:
  - check_id: typescript_guidelines
    source: ".github/copilot-instructions.md"
    rule: "Use TypeScript for all new code"
    origin: agent_config

  - check_id: immutable_data
    source: ".github/copilot-instructions.md"
    rule: "Prefer immutable data (const, readonly)"
    origin: agent_config

  - check_id: nullish_coalescing
    source: ".github/copilot-instructions.md"
    rule: "Use optional chaining (?.) and nullish coalescing (??) operators"
    origin: agent_config

  - check_id: typecheck_before_commit
    source: "CLAUDE.md"
    rule: "Use yarn test:typecheck to verify TypeScript"
    origin: agent_config

rubric: []
