distractors:
- rule: All changes that affect the published version of packages in the `/packages` and `/plugins` directories must be accompanied by a changeset.
  collision_type: scope_ambiguity
  why_distracting: The agent might generate a changeset file for this PR because it is adding a new feature (a style guide). However, the CI workflow explicitly states that changesets are only for packages in `/packages` and `/plugins`. Since this PR only modifies `/docs` and root markdown files, a changeset is unnecessary and would fail validation.
  severity: high
  source:
    path: AGENTS.md
    lines: 43-46
- rule: When writing or generating code, always match the existing coding style of each individual package and file.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to infer and document code-specific style rules (like TypeScript formatting or React conventions) into the documentation style guide, confusing 'coding style' with 'writing style'.
  severity: medium
  source:
    path: AGENTS.md
    lines: 24-26
hierarchy_analysis: The configuration is flat (a single AGENTS.md file at the root), but the task is highly meta-referential. The agent must understand that AGENTS.md is the very file that dictates its own behavior and the behavior of future AI agents, and must modify it to enforce the new documentation rules it just created.
