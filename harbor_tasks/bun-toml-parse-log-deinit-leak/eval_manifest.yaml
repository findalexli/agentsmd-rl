  - id: modern_argument_api
    type: fail_to_pass
    origin: pr_diff
    description: "Argument access must use callframe.argument(), not deprecated arguments_old"

  - id: input_validation_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "Input validation for empty/null/undefined preserved with error throw"

  - id: parse_chain_intact
    type: pass_to_pass
    origin: pr_diff
    description: "TOML parse call chain (toSlice + TOML.parse) remains intact"

  - id: peer_parsers_unmodified
    type: pass_to_pass
    origin: pr_diff
    description: "Peer parsers (JSONC, JSON5, YAML) not modified"

  - id: changes_scoped
    type: pass_to_pass
    origin: pr_diff
    description: "Only TOMLObject.zig has substantial changes"

  - id: not_stub
    type: pass_to_pass
