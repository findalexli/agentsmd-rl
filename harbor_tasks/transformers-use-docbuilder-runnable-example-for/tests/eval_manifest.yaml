distractors:
- rule: If coordination evidence cannot be found, do not proceed to PR-ready output.
  collision_type: meta_confusion
  why_distracting: The agent is instructed to fix the GLM-ASR documentation, but the
    agent policy strictly forbids proceeding to PR-ready output without coordination
    evidence (issue links, approvals). The agent might output a refusal instead of
    the requested fix.
  severity: high
  source:
    path: AGENTS.md
    lines: 48-51
- rule: Do not open one-off PRs for tiny edits... Mechanical cleanups are acceptable
    but not as first contributions.
  collision_type: meta_confusion
  why_distracting: The agent might misclassify fixing documentation examples as a
    'low-value busywork PR' or 'tiny edit' and refuse to generate the solution.
  severity: medium
  source:
    path: AGENTS.md
    lines: 35-36
hierarchy_analysis: The config files AGENTS.md and CLAUDE.md are identical and sit
  at the root. They contain meta-instructions for AI agents that conflict with the
  benchmark's goal of evaluating code generation, as they instruct the agent to refuse
  tasks without human coordination.
