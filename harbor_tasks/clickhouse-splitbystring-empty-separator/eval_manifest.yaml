rubric:
- rule: The gold solution correctly adds empty string validation in the split_by_string_creator
    lambda, checking value_as_string.empty() before adding to values vector
  reference: "const auto & value_as_string = castAs<String>(value, \"separator\");\n\
    \            if (value_as_string.empty())\n                throw Exception(\n\
    \                    ErrorCodes::BAD_ARGUMENTS,\n                    \"Incorrect\
    \ parameter of tokenizer '{}': the empty string cannot be used as a separator\"\
    ,\n                    SplitByStringTokenizer::getExternalName());"
  source:
    path: src/Interpreters/TokenizerFactory.cpp
    lines: 190-200
    commit: 2ffea49f37f25c9a09a74b9ecb338b05eb426370
- rule: The gold solution updates the error message for empty separators array to
    use "the separators argument cannot be empty" instead of "separators cannot be
    empty"
  reference: '"Incorrect parameter of tokenizer ''{}'': the separators argument cannot
    be empty"'
  source:
    path: src/Interpreters/TokenizerFactory.cpp
    lines: 200-210
    commit: 2ffea49f37f25c9a09a74b9ecb338b05eb426370
distractors:
- rule: 'When writing text such as documentation, comments, or commit messages, wrap
    literal names from ClickHouse SQL language, classes and functions, or literal
    excerpts from log messages inside inline code blocks, such as: `MergeTree`.'
  collision_type: scope_ambiguity
  why_distracting: The agent might incorrectly apply markdown backticks to the C++
    exception string literal, thinking it qualifies as 'text' like documentation or
    comments.
  severity: medium
  source:
    path: AGENTS.md
    lines: 5-5
hierarchy_analysis: The single AGENTS.md file contains general repository guidelines
  that are mostly irrelevant to this specific C++ bug fix.
version: '2.0'
