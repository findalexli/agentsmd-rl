agent_config:
- rule: Use Allman-style braces (opening brace on a new line)
  source: .claude/CLAUDE.md
  applicable: true
  check_type: style
- rule: Say ASan not ASAN
  source: .claude/CLAUDE.md
  applicable: false
- rule: Write names of functions and methods as `f` instead of `f()`
  source: .claude/CLAUDE.md
  applicable: false
- rule: When mentioning logical errors, say exception instead of crash
  source: .claude/CLAUDE.md
  applicable: true
rubric:
- rule: When writing tests in tests/queries, prefer adding a new test instead of extending
    existing ones
  source:
    path: .claude/CLAUDE.md
    lines: '141'
    commit: 2ffea49f37f25c9a09a74b9ecb338b05eb426370
- rule: When adding a new test, consult `./tests/queries/0_stateless/add-test` to
    determine the correct name prefix for the new test
  source:
    path: .claude/CLAUDE.md
    lines: '143'
    commit: 2ffea49f37f25c9a09a74b9ecb338b05eb426370
distractors:
- rule: 'When writing text such as documentation, comments, or commit messages, wrap
    literal names from ClickHouse SQL language, classes and functions, or literal
    excerpts from log messages inside inline code blocks, such as: `MergeTree`.'
  collision_type: scope_ambiguity
  why_distracting: An agent might try to add markdown backticks around the tokenizer
    name or other literals within the C++ exception message (e.g., `"Incorrect parameter
    of tokenizer `{}`"`), but this rule explicitly targets documentation, comments,
    and commit messages, not C++ string literals for user-facing errors.
  severity: medium
  source:
    path: AGENTS.md
    lines: 5-5
- rule: When writing text such as documentation, comments, or commit messages, write
    names of functions and methods as `f` instead of `f()` - we prefer it for mathematical
    purity when it refers a function itself rather than its application.
  collision_type: scope_ambiguity
  why_distracting: An agent might try to apply the mathematical purity rule for function
    names to the C++ error message or code, but this rule is scoped to text like documentation
    and comments, not the actual implementation or user-facing exception strings.
  severity: low
  source:
    path: AGENTS.md
    lines: 9-9
hierarchy_analysis: The `AGENTS.md` file contains general guidelines for documentation,
  commit messages, and text formatting. Since the task only involves modifying C++
  code to add an exception, these text-formatting rules do not apply to the C++ string
  literals. Agents must be careful not to over-apply documentation rules to user-facing
  error messages in the codebase.
