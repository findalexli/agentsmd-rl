name = "clickhouse-splitbystring-empty-separator"
description = "Fix splitByString tokenizer to reject empty separator strings"
created_at = 2026-04-09
pr_source = "https://github.com/ClickHouse/ClickHouse/pull/101928"
difficulty = "easy"
estimated_time = "15 min"
tags = ["c++", "validation", "tokenizer", "input-validation"]

[environment]
base_image = "ubuntu:24.04"
dockerfile = "environment/Dockerfile"

[solution]
type = "patch"
script = "solution/solve.sh"

[evaluation]
manifest = "eval_manifest.yaml"
test_script = "tests/test.sh"
output_tests = "tests/test_outputs.py"

[repository]
owner = "ClickHouse"
name = "ClickHouse"
base_commit = "2ffea49f37f25c9a09a74b9ecb338b05eb426370"
merge_commit = "ac7a313a2fe360f672ecfad47ff515748f9ec151"
target_files = ["src/Interpreters/TokenizerFactory.cpp"]

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
