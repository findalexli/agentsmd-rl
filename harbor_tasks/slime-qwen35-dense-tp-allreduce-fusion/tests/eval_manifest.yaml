rubric: []
distractors:
- rule: For training (evaluation=False), return RolloutFnTrainOutput(samples=...,
    metrics=...)
  source:
    path: .claude/skills/add-rollout-function/SKILL.md
    lines: 43-46
  source_text: '### Step 3: Implement Train and Eval Branches Explicitly


    - For training (`evaluation=False`), return `RolloutFnTrainOutput(samples=...,
    metrics=...)`

    - For evaluation (`evaluation=True`), return `RolloutFnEvalOutput(data=..., metrics=...)`'
  collision_type: architecture_boundary
  why_distracting: The PR modifies the underlying SGLang PyTorch model layer (`qwen3_5.py`),
    not a Slime rollout function. Because the term 'sglang' is heavily associated
    with Slime's rollout functions (e.g. `sglang_rollout.py`), an agent might mistakenly
    think it's working on a rollout function and try to enforce Slime rollout return
    types on a low-level PyTorch `forward` method.
  severity: high
- rule: Start from nearest existing test file for your model/path
  source:
    path: .claude/skills/add-tests-and-ci/SKILL.md
    lines: '24'
  source_text: '- Start from nearest existing test file for your model/path'
  collision_type: scope_ambiguity
  why_distracting: The PR modifies a model implementation (qwen3_5.py) within an external
    dependency (SGLang) that Slime patches. An agent might mistakenly apply this rule
    to create or modify a test in the Slime repo's tests/ directory (which contains
    Qwen test files like test_qwen3_4B_ckpt.py), but the change is internal to SGLang
    and outside the scope of Slime's model tests.
  severity: medium
- rule: 'Follow existing naming: tests/test_<feature>.py'
  source:
    path: .claude/skills/add-tests-and-ci/SKILL.md
    lines: '23'
  source_text: '- Follow existing naming: `tests/test_<feature>.py`'
  collision_type: scope_ambiguity
  why_distracting: Since the PR changes the behavior of a feature (allreduce fusion
    in SGLang), the agent might think it needs to add a test in Slime's tests/ directory,
    but the change belongs to an SGLang patch, not Slime.
  severity: medium
