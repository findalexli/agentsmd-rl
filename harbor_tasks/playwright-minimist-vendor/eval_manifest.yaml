  collision_type: architecture_boundary
  why_distracting: The PR specifically vendors minimist for better control and reduced dependencies, so keeping the external package would be wrong
  severity: medium
- rule: Define types locally in each file that uses them
  source:
    path: CLAUDE.md
    lines: 1-50
    commit: 4df350b1c81b61ea471ff12767efd8e05f773377
  collision_type: rule_conflict
  why_distracting: PR shares MinimistArgs type across files from a single source - duplicating type definitions would be incorrect
  severity: medium
- rule: Add all tool-generated content restrictions to CLAUDE.md
  source:
    path: CLAUDE.md
