    lines: 1-50
    commit: 4df350b1c81b61ea471ff12767efd8e05f773377
  evidence: Gold uses 'import { minimist } from './minimist'' not 'require('minimist')'
  category: code_style
  verification: programmatic
- rule: Always update DEPS.list when adding new file dependencies
  source:
    path: CLAUDE.md
    lines: 75-90
    commit: 4df350b1c81b61ea471ff12767efd8e05f773377
  evidence: Gold adds ./minimist.ts to [program.ts] and [session.ts] sections in DEPS.list
  category: code_organization
  verification: programmatic
- rule: Use explicit type imports with 'import type' for TypeScript types
  source:
    path: CLAUDE.md
    lines: 1-50
    commit: 4df350b1c81b61ea471ff12767efd8e05f773377
  evidence: Gold uses 'import type { MinimistArgs } from ./minimist' in program.ts and session.ts
  category: code_style
  verification: programmatic
- rule: Follow existing commit message conventions when updating CLAUDE.md
  source:
    path: CLAUDE.md
    lines: 125-130
    commit: 4df350b1c81b61ea471ff12767efd8e05f773377
  evidence: Gold adds new rule 'Never add "Generated with"' in same format as existing 'Never add Co-Authored-By' rule
