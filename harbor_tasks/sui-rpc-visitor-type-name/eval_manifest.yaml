rubric:
- source:
    path: CLAUDE.md
  rule: New files must include license header
- source:
    path: CLAUDE.md
  rule: Use -p flag to run crate-specific tests for faster feedback
- source:
    path: CLAUDE.md
  rule: Run cargo xclippy after finishing development
- rule: sui-types/ contains Core type definitions
  source:
    path: CLAUDE.md
    lines: 56-58
  evidence: The gold solution adds the TypeName layout and constants to crates/sui-types/src/base_types.rs,
    aligning with the architectural definition of sui-types.
  category: architecture
distractors:
- rule: Always consult CLAUDE.md files in sub-crates.
  collision_type: meta_confusion
  why_distracting: The rule instructs the agent to always consult crate-specific CLAUDE.md
    files. Since the agent is modifying `sui-types` and `sui-display`, it might waste
    time and API calls searching for local config files that do not exist in this
    context.
  severity: low
  source:
    path: CLAUDE.md
    lines: 8-10
- rule: All new files must start with the following license in comments at the top
    of the file
  collision_type: scope_ambiguity
  why_distracting: The rule requires adding a license header to all new files. The
    agent might mistakenly create a new file for the TypeName layout instead of adding
    it to the existing `base_types.rs` as instructed, or it might try to add a license
    to the existing files if it misinterprets 'new files'.
  severity: low
  source:
    path: CLAUDE.md
    lines: 18-21
- rule: Protocol configuration and versioning for Sui network changes
  source:
    path: .claude/skills/protocol-config/SKILL.md
    lines: 1-10
  collision_type: architecture_boundary
  why_distracting: The agent might mistakenly believe that changing how TypeName is
    serialized in RPC outputs requires a protocol config change or versioning, but
    RPC/Display changes are outside the consensus protocol boundary.
  severity: medium
hierarchy_analysis: The hierarchy is flat, consisting only of root-level AGENTS.md
  and CLAUDE.md. The root configs mention crate-specific configs, but none are present
  in the context, which could lead to a wild goose chase.
