  rule: Run cargo xclippy after finishing development
distractors:
- rule: Run e2e tests. simtests must be run with `cargo simtest` to avoid false negatives
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to run the full suite of e2e simtests (`cargo
    simtest -p sui-e2e-tests`) to verify its changes. However, this PR only modifies
    RPC serialization for a specific type (`TypeName`), which is fully covered by
    unit tests in `sui-types` and `sui-display`. Running simtests would be a massive
    waste of time and compute.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 28-29
- rule: Run Rust unittests. skip simulation tests as they may cause false negatives
    with `cargo nextest` SUI_SKIP_SIMTESTS=1 cargo nextest run
  collision_type: scope_ambiguity
  why_distracting: The agent might blindly run `SUI_SKIP_SIMTESTS=1 cargo nextest
    run` across the entire workspace. Given the large codebase size mentioned in the
    notes, this will take too long. The agent must realize it needs to combine this
    rule with the `-p` flag rule to scope tests only to `sui-types` and `sui-display`.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 31-32
- rule: All new files must start with the following license in comments at the top
    of the file
  collision_type: architecture_boundary
  why_distracting: The agent might decide to create a new file (e.g., `crates/sui-types/src/type_name.rs`)
    to define the `TypeName` layout in order to keep things modular, and then apply
    this license header. However, the gold solution correctly identifies that `base_types.rs`
    is the established location for these standard library type layouts (like `url_layout`
    and `move_ascii_str_layout`).
  severity: low
  source:
    path: CLAUDE.md
    lines: 15-18
hierarchy_analysis: The root `CLAUDE.md` provides general tooling and testing commands.
  `AGENTS.md` defers to `CLAUDE.md` and crate-specific files. Since no crate-specific
  config files are provided in the context, the agent must rely entirely on the root
  `CLAUDE.md`. The primary challenge is filtering the broad testing commands (like
  running all simtests or workspace-wide nextest) down to the specific crates modified
  (`sui-types` and `sui-display`) using the `-p` flag rule.
