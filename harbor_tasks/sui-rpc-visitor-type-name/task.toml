name = "sui-rpc-visitor-type-name"
difficulty = "medium"
time_limit = 1800  # 30 minutes

[description]
title = "RPC Visitor: Unwrap TypeName as string"
summary = "Add support for detecting and unwrapping 0x1::type_name::TypeName as a special case in RPC outputs, treating it as a simple string rather than an object with a 'name' field."

[repository]
owner = "MystenLabs"
name = "sui"
base_commit = "ceb0bf788b8711eca37a448854db0421beb8d612"
merge_commit = "82942c59ebb94f4f4c8ae494fed945e5f8eb4ee5"
pr_number = 26070

[environment]
image = "task-env"
workdir = "/workspace/sui"

[files]
primary = [
    "crates/sui-types/src/base_types.rs",
    "crates/sui-types/src/object/rpc_visitor/mod.rs",
    "crates/sui-display/src/v2/value.rs"
]

[tags]
category = ["rust", "blockchain", "serialization"]
frameworks = ["move", "sui"]
trait = ["api-design", "data-format"]

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
