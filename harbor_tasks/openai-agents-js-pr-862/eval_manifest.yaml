    path: AGENTS.md
    lines: '237'
    commit: 4a53e998a2cd27eb004c4c25d6d178bfe371b72e
  evidence: 'Gold fix is a single clear line: this.name = new.target.name; placed right after super(message) in the constructor.'
  category: style
  verification: llm_judge
- rule: Commit using Conventional Commits.
  source:
    path: AGENTS.md
    lines: '219'
    commit: 4a53e998a2cd27eb004c4c25d6d178bfe371b72e
  evidence: 'Gold commit uses fix(agents-core): prefix matching Conventional Commits format.'
  category: naming
  verification: llm_judge
- rule: Comments must end with a period.
  source:
    path: AGENTS.md
    lines: '145'
    commit: 4a53e998a2cd27eb004c4c25d6d178bfe371b72e
  evidence: Not directly relevant to this PR but is a repo-level style rule agents must follow.
