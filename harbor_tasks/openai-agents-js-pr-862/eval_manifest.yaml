distractors:
- rule: 'Treat review feedback critically: reviewers can be wrong. Reproduce or verify each comment, cross-check with source docs, and only make changes when the feedback remains valid after your own validation.'
  source:
    path: AGENTS.md
    lines: '249'
    commit: 4a53e998a2cd27eb004c4c25d6d178bfe371b72e
  collision_type: meta_confusion
  why_distracting: This rule about review process could distract agents into second-guessing the bug report instead of fixing the clear behavioral issue.
  severity: low
- rule: If your change affects the public API, add a Changeset.
  source:
