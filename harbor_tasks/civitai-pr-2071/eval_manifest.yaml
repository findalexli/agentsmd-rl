version: 1

source:
  owner: civitai
  repo: civitai
  pr_number: 2071
  base_commit: 47c3beedb50993e5f410e241e4940131bba9afb2
  merge_commit: 231986ad933972b1e9c42ef1b4e4ce400a69b9c2
  title: "fix: bypass storage resolver for article attachment downloads"
  description: |
    Article attachment downloads were serving the wrong file content when a
    File.id collided with a ModelFile.id in the storage resolver's file_locations
    table. The resolver only tracks ModelFile records, not File table records
    (article attachments, bounty files). The fix bypasses the storage resolver
    and uses the delivery worker directly for attachment downloads, since it
    resolves via the file's actual S3 URL rather than by ID.

