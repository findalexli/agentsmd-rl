distractors:
- rule: Target an issue. Every non-trivial PR should reference an existing GitHub
    issue. If one doesn't exist, create it first.
  collision_type: meta_confusion
  why_distracting: The agent might attempt to use tools to create a GitHub issue or
    write issue-related text in the code, which is outside the scope of the coding
    task.
  severity: medium
  source:
    path: AGENTS.md
    lines: 18-19
- rule: Use the PR template. Fill out every section of .github/PULL_REQUEST_TEMPLATE.md
  collision_type: meta_confusion
  why_distracting: The agent might try to edit the `.github/PULL_REQUEST_TEMPLATE.md`
    file itself to add the AI disclosure or issue link, misunderstanding the instruction
    to 'Use the PR template' as a directive to modify the template file during the
    coding task.
  severity: medium
  source:
    path: AGENTS.md
    lines: 21-24
- rule: Gradio Core Patterns for creating apps (Interface/Blocks)
  source:
    path: repo/.agents/skills/gradio/SKILL.md
    lines: 27-52
  source_text: "## Core Patterns\n\n**Interface** (high-level): wraps a function with\
    \ input/output components.\n\n```python\nimport gradio as gr\n\ndef greet(name):\n\
    \    return f\"Hello {name}!\"\n\ngr.Interface(fn=greet, inputs=\"text\", outputs=\"\
    text\").launch()\n```\n\n**Blocks** (low-level): flexible layout with explicit\
    \ event wiring.\n\n```python\nimport gradio as gr\n\nwith gr.Blocks() as demo:\n\
    \    name = gr.Textbox(label=\"Name\")\n    output = gr.Textbox(label=\"Greeting\"\
    )\n    btn = gr.Button(\"Greet\")\n    btn.click(fn=lambda n: f\"Hello {n}!\"\
    , inputs=name, outputs=output)\n\ndemo.launch()\n```"
  collision_type: scope_ambiguity
  why_distracting: This rule explains how to build end-user Gradio applications. However,
    the gold diff modifies the internal execution engine (`mcp.py`) of Gradio itself.
    An agent might mistakenly try to introduce new UI components or use the public
    `gr.Blocks()` API instead of working with the internal core logic like `blocks.process_api()`.
  severity: medium
- rule: Event Listeners signature and default queue=True behavior
  source:
    path: repo/.agents/skills/gradio/SKILL.md
    lines: 161-191
  source_text: "## Event Listeners\n\nAll event listeners share the same signature:\n\
    \n```python\ncomponent.event_name(\n    fn: Callable | None | Literal[\"decorator\"\
    ] = \"decorator\",\n    inputs: Component | Sequence[Component] | set[Component]\
    \ | None = None,\n    outputs: Component | Sequence[Component] | set[Component]\
    \ | None = None,\n    api_name: str | None = None,\n    api_description: str |\
    \ None | Literal[False] = None,\n    scroll_to_output: bool = False,\n    show_progress:\
    \ Literal[\"full\", \"minimal\", \"hidden\"] = \"full\",\n    show_progress_on:\
    \ Component | Sequence[Component] | None = None,\n    queue: bool = True,\n  \
    \  batch: bool = False,\n    max_batch_size: int = 4,\n    preprocess: bool =\
    \ True,\n    postprocess: bool = True,\n    cancels: dict[str, Any] | list[dict[str,\
    \ Any]] | None = None,\n    trigger_mode: Literal[\"once\", \"multiple\", \"always_last\"\
    ] | None = None,\n    js: str | Literal[True] | None = None,\n    concurrency_limit:\
    \ int | None | Literal[\"default\"] = \"default\",\n    concurrency_id: str |\
    \ None = None,\n    api_visibility: Literal[\"public\", \"private\", \"undocumented\"\
    ] = \"public\",\n    time_limit: int | None = None,\n    stream_every: float =\
    \ 0.5,\n    key: int | str | tuple[int | str, ...] | None = None,\n    validator:\
    \ Callable | None = None,\n) -> Dependency\n```"
  collision_type: meta_confusion
  why_distracting: This documents the public method signature for attaching event
    listeners and indicates `queue=True` is the default behavior. The gold diff is
    actually inspecting the `block_fn.queue` boolean flag internally to choose between
    a fast-path direct call and a queued client submission. An agent could misinterpret
    this public API default as an instruction to override the `queue` behavior or
    mistake internal processing for event definition.
  severity: medium
hierarchy_analysis: The hierarchy is flat, consisting of a single generic AGENTS.md
  file. There are no conflicts between config files.
