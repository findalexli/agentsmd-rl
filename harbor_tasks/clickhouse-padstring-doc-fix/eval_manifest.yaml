# Tests to run
checks:
  # Fail-to-pass tests (these fail on base, pass after fix)
  - id: test_original_incorrect_descriptions_removed
    type: fail_to_pass
    origin: gold_patch
    description: "Old incorrect 'Array' descriptions are removed"

  - id: test_string_argument_has_correct_description
    type: fail_to_pass
    origin: gold_patch
    description: "'string' argument has correct 'String or FixedString' description"

  - id: test_length_argument_has_correct_description
    type: fail_to_pass
    origin: gold_patch
    description: "'length' argument has correct 'UInt*' description (without 'const')"

  - id: test_length_argument_no_const_prefix
    type: fail_to_pass
    origin: gold_patch
    description: "'length' argument does not have 'const UInt*' prefix"

  - id: test_pad_string_argument_has_correct_description
    type: fail_to_pass
    origin: gold_patch
    description: "'pad_string' argument has correct 'String' description"

  - id: test_all_three_descriptions_fixed
    type: fail_to_pass
    origin: gold_patch
    description: "All three argument descriptions are fixed correctly"

  - id: test_no_old_const_uint_description
    type: fail_to_pass
    origin: gold_patch
    description: "Old 'const UInt*' description is completely removed"

  # Pass-to-pass tests (should work on base and after fix)
  - id: test_file_exists
    type: pass_to_pass
    origin: repo_structure
    description: "Target file exists"

  - id: test_function_argument_descriptors_structure
    type: pass_to_pass
    origin: repo_structure
    description: "FunctionArgumentDescriptors structure is syntactically valid"

  - id: test_cpp_syntax_valid
    type: pass_to_pass
    origin: repo_structure
    description: "C++ syntax is valid (balanced braces, etc.)"

  - id: test_padString_file_compiles
    type: pass_to_pass
    origin: repo_structure
    description: "Modified file passes basic compile checks"

  # Repo CI tests (pass_to_pass using actual repo CI commands)
  - id: test_repo_style_check_cpp
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's C++ style check passes on modified file"

  - id: test_repo_no_tabs_in_padstring
    type: pass_to_pass
    origin: repo_tests
    description: "No tabs in padString.cpp - CI style requirement"

  - id: test_repo_functional_test_exists
    type: pass_to_pass
    origin: repo_tests
    description: "pad_string functional test file exists"

  - id: test_repo_functional_test_has_content
    type: pass_to_pass
    origin: repo_tests
    description: "pad_string functional test has valid content"

  - id: test_repo_reference_file_exists
    type: pass_to_pass
    origin: repo_tests
    description: "pad_string reference file exists for comparison"

  - id: test_repo_functional_test_matches_reference
    type: pass_to_pass
    origin: repo_tests
    description: "Functional test and reference file are properly paired"

  - id: test_repo_leftpad_fixedstring_test_exists
    type: pass_to_pass
    origin: repo_tests
    description: "leftPad FixedString test exists"

  - id: test_repo_padstring_utf8_test_exists
    type: pass_to_pass
    origin: repo_tests
    description: "padString UTF8 variant test exists"

# Agent config rules (from CLAUDE.md, AGENTS.md, etc.)
# This is a documentation fix, so relevant rules about documentation apply
rubric:
  - rule: "Use backticks for literal names from ClickHouse SQL language, classes and functions in comments/documentation"
    source: ".claude/CLAUDE.md"
    description: "When writing documentation/comments, wrap literal names in backticks"
    applicable: true

  - rule: "When writing text such as documentation, comments, or commit messages, write names of functions and methods as `f` instead of `f()`"
    source: ".claude/CLAUDE.md"
    description: "Prefer mathematical purity - refer to function itself rather than its application"
    applicable: true

  - rule: "Always use Allman-style braces (opening brace on a new line) when writing C++ code"
    source: ".claude/CLAUDE.md"
    description: "This is enforced by the style check in CI"
    applicable: true

  - rule: "Check PR template changelog quality: Changelog category must match change type"
    source: ".claude/skills/review/SKILL.md"
    description: "Documentation-only fixes should use 'Not for changelog' when appropriate"
    applicable: true

  - rule: "Check that error messages are clear, informative, and help the user understand what went wrong"
    source: ".claude/skills/review/SKILL.md"
    description: "Error/argument descriptions should accurately describe expected types"
    applicable: true
