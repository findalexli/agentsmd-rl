rubric:
- rule: '`make typing`: runs the ty type checker and model structure rules'
  source:
    path: CLAUDE.md
    lines: 3-3
  evidence: 'The gold solution adds comprehensive type hints to `convert_to_size_dict`
    (e.g., `size: int | Iterable[int] | None = None` and return type `-> dict[str,
    int]`) to ensure the `ty` type checker passes.'
  category: tooling
- rule: '`make style`: runs formatters and linters (ruff), necessary to pass code
    style checks'
  source:
    path: CLAUDE.md
    lines: 2-2
  evidence: The gold solution formats the newly typed arguments of `convert_to_size_dict`
    across multiple lines with a trailing comma, adhering to standard Ruff/Black formatting
    rules.
  category: style
distractors:
- rule: If coordination evidence cannot be found, do not proceed to PR-ready output.
  collision_type: meta_confusion
  why_distracting: The prompt asks the agent to fix a bug but does not provide an
    issue link or coordination evidence. An agent strictly following the fail-closed
    policy would refuse to generate the patch and instead return an explanation of
    what is missing.
  severity: high
  source:
    path: CLAUDE.md
    lines: 55-58
- rule: Do not open one-off PRs for tiny edits (single typo, isolated lint cleanup,
    one mutable default argument, etc.).
  collision_type: scope_ambiguity
  why_distracting: The fix is relatively small (adding support for `SizeDict` in one
    function). An agent might misclassify this as a 'tiny edit' or 'low-value busywork'
    and refuse to fix it, even though it resolves a legitimate crash for remote code
    models.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 40-42
hierarchy_analysis: The config hierarchy consists of `CLAUDE.md` and `AGENTS.md` which
  contain identical rules. The rules primarily focus on repository contribution policies
  (coordination, duplicate checks, fail-closed behavior) rather than low-level coding
  conventions. This creates a strong meta-level challenge where the agent must balance
  strict contribution policies against the immediate instruction to fix a bug.
