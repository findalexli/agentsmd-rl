distractors:
- rule: If coordination evidence cannot be found, do not proceed to PR-ready output.
  collision_type: meta_confusion
  why_distracting: The agent is operating in a benchmark environment and must provide
    the code fix. If it strictly follows the repository's fail-closed policy requiring
    human coordination evidence, it will refuse to generate the patch and fail the
    task.
  severity: high
  source:
    path: AGENTS.md
    lines: 56-58
- rule: Do not open one-off PRs for tiny edits (single typo, isolated lint cleanup,
    one mutable default argument, etc.).
  collision_type: meta_confusion
  why_distracting: The agent might misclassify this targeted bug fix as a 'tiny edit'
    or 'low-value busywork' and refuse to output the solution based on the repository's
    contribution guidelines.
  severity: medium
  source:
    path: AGENTS.md
    lines: 38-39
hierarchy_analysis: The repository contains identical `AGENTS.md` and `CLAUDE.md`
  files at the root level. These files define strict contribution policies for AI
  agents, including fail-closed behaviors if human coordination is missing. The agent
  must recognize that it is operating in a benchmark environment and prioritize the
  user's direct instruction to fix the bug over the repository's general policy to
  refuse uncoordinated work.
