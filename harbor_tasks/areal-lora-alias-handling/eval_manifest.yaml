distractors:
- rule: No hardcoded secrets, paths, or endpoints.
  collision_type: rule_conflict
  why_distracting: The rule forbids hardcoded paths, but the PR instruction explicitly requires falling back to a synthetic `xccl://` path. An agent strictly following the rule might refuse to implement the fallback, ask for clarification, or try to make it configurable, which overcomplicates the requested fix.
  severity: high
  source:
    path: AGENTS.md
    lines: 24-24
- rule: 'Logging: `areal.utils.logging.getLogger(name)` with PascalCase names -- never print or logging.__name__.'
  collision_type: architecture_boundary
  why_distracting: The rule mandates using `areal.utils.logging.getLogger(name)` with PascalCase names. However, this specific file (`areal_vllm_server.py`) is a vLLM extension and uses vLLM's native logging (`vllm.logger.init_logger`). Applying the AReaL logging convention here would break consistency with the vLLM subsystem.
  severity: high
  source:
    path: AGENTS.md
    lines: 65-67
- rule: Add tests for new functionality.
  collision_type: scope_ambiguity
  why_distracting: The rule requires adding tests for new functionality. The agent might attempt to write unit tests for the new `_infer_runtime_lora_path` and `_register_runtime_lora_name` helpers, which would require complex mocking of vLLM server state and is out of scope for this specific bug fix.
  severity: medium
  source:
    path: AGENTS.md
    lines: 32-32
hierarchy_analysis: The repository uses a flat configuration structure with `AGENTS.md` and `CLAUDE.md` at the root level providing identical or highly overlapping rules. The primary challenge is not hierarchy traversal, but rather context-aware rule application (e.g., knowing when a file belongs to a third-party extension boundary like vLLM, and knowing when a direct prompt instruction overrides a general 'no hardcoded paths' rule).
