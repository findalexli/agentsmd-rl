distractors:
- rule: 'Logging: `areal.utils.logging.getLogger(name)` with PascalCase names -- never
    `print` or `logging.__name__`.'
  collision_type: architecture_boundary
  why_distracting: The file `areal_vllm_server.py` is a vLLM extension and already
    uses vLLM's logger (`from vllm.logger import init_logger`). Forcing the AReaL-specific
    logger (`areal.utils.logging.getLogger`) here would mix logging frameworks in
    a vLLM-owned context and violate the file's existing pattern.
  severity: high
  source:
    path: AGENTS.md
    lines: 55-56
- rule: Add tests for new functionality
  collision_type: scope_ambiguity
  why_distracting: The task is specifically to harden the registration path in the
    vLLM server file. Writing unit tests for this vLLM server extension would require
    complex mocking of vLLM internals and FastAPI requests, which is out of scope
    for this specific fix.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 46-46
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` provide overlapping rules regarding
  imports, code patterns, and testing. `AGENTS.md` provides more specific logging
  rules, but applying them blindly ignores the architectural boundary of the vLLM
  extension. The rule to 'Follow existing code patterns' must take precedence over
  the global AReaL logging rule in this specific file.
