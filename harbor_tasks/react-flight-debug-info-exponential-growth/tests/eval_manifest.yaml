  React Compiler. No deeper file guidance or conflicting rules exist.
distractors:
- rule: Use CompilerError.throwTodo() or CompilerError.invariant() for unsupported
    patterns or invalid states.
  source:
    path: compiler/CLAUDE.md
    lines: 234-247
  source_text: When the compiler encounters an unsupported but known pattern, use
    `CompilerError.throwTodo()` instead of `CompilerError.invariant()`. Todo errors
    cause graceful bailouts in production; Invariant errors are hard failures indicating
    unexpected/invalid states.
  collision_type: architecture_boundary
  why_distracting: The agent is fixing a bug in ReactFlightClient and might try to
    use CompilerError for throwing errors related to infinite loops. However, CompilerError
    is specific to the React Compiler package and does not exist in React core packages
    like react-client.
  severity: high
- rule: Create test fixtures in packages/babel-plugin-react-compiler/src/__tests__/fixtures/compiler/
  source:
    path: compiler/.claude/agents/investigate-error.md
    lines: 12-13
  source_text: Create a new fixture file at `packages/babel-plugin-react-compiler/src/__tests__/fixtures/compiler/<fixture-name>.js`
    containing the problematic code.
  collision_type: architecture_boundary
  why_distracting: The instructions ask for a regression test. If the agent mistakenly
    follows compiler debugging rules, it will create the regression test in the compiler's
    fixture directory instead of the correct React core testing directory (packages/react-server/src/__tests__/).
  severity: medium
- rule: Use comment pragmas (e.g., @enableFeature) on the first line of the fixture
    input to override feature flags.
  source:
    path: compiler/CLAUDE.md
    lines: 215-223
  source_text: 'Test fixtures can override the active feature flags used for that
    fixture via a comment pragma on the first line of the fixture input, for example:


    ```javascript

    // enableJsxOutlining @enableChangeVariableCodegen:false


    ...code...

    ```'
  collision_type: architecture_boundary
  why_distracting: If the agent attempts to mock or test feature flags or setup test
    state, it might use comment pragmas. However, these comment pragmas are specific
    to the React Compiler's test harness, not React core's jest test environment.
  severity: low
- rule: Use inline gate() or @gate pragma to test different behaviors based on flags.
  source:
    path: .claude/skills/feature-flags/SKILL.md
    lines: 19-45
  source_text: 'Use when the feature is completely unavailable without the flag:


    ```javascript

    // @gate enableViewTransition

    ...

    Use when the feature exists but behavior differs based on flag:


    ```javascript

    ...

    if (gate(flags => flags.enableNewBehavior)) {'
  collision_type: scope_ambiguity
  why_distracting: The PR adds a test for exponential debug accumulation. The agent
    might see __DEV__ conditions in the code and mistakenly think it needs to use
    @gate or gate() in the test, which applies to feature flags, not DEV mode. This
    would add unnecessary gating.
  severity: low
