rubric:
- rule: Node.js compatibility code is in ext/node/polyfills/. When reviewing these
    files, check behavior against Node.js docs, not just Deno conventions.
  source:
    path: .github/copilot-instructions.md
    lines: 322-325
    commit: d198cda44b7fddb56d892a8ef2349d1630adfa37
- rule: Keep your changes minimal, don't do drive-by changes in a PR.
  source:
    path: CLAUDE.md
    lines: 39-41
    commit: d198cda44b7fddb56d892a8ef2349d1630adfa37
- rule: Extensions providing native functionality to JS (fs, net, etc.) belong in
    the `ext/` directory.
  source:
    path: CLAUDE.md
    lines: 61-62
  evidence: The gold solution implements the native OS file descriptor handling and
    stdio inheritance within the `ext/io/lib.rs` and `ext/process/lib.rs` files, correctly
    placing native system access logic in the
  category: architecture
distractors:
- rule: '`tests/unit/` - Unit tests'
  collision_type: architecture_boundary
  why_distracting: The config states that unit tests belong in `tests/unit/`. However,
    the PR instructions explicitly require adding the test to `tests/unit_node/child_process_test.ts`.
    An agent strictly following the directory structure in the config might try to
    create or move the test to `tests/unit/`, violating the PR's specific requirements
    for Node.js compatibility tests.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 64-64
- rule: Before committing, if only non-Rust was changed, make sure to run `tools/lint.js
    --js`
  collision_type: scope_ambiguity
  why_distracting: The rule specifies running `tools/lint.js --js` if only non-Rust
    code was changed. Since the agent is modifying both TypeScript (`child_process.ts`)
    and Rust (`lib.rs`) files, it might get confused about which linting command to
    run or attempt to run the JS-only linter, missing Rust linting errors.
  severity: low
  source:
    path: CLAUDE.md
    lines: 25-26
hierarchy_analysis: The `CLAUDE.md` file provides general repository guidelines. There
  is a conflict between the general directory structure outlined in `CLAUDE.md` (which
  specifies `tests/unit/` for unit tests) and the specific PR instructions (which
  require modifying `tests/unit_node/`). The PR-specific instructions must override
  the general repository documentation.
