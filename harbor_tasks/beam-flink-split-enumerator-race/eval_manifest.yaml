distractors:
- rule: Update other runners to ensure they propagate the new WindowedValue fields
    correctly.
  source:
    path: repo/.agent/skills/adding-new-metadata/SKILL.md
    lines: 119-119
  source_text: 12. [ ] Update other runners (Flink, Spark, Samza) to ensure they propagate
    the new `WindowedValue` fields correctly in their specific operators/runners.
  collision_type: scope_ambiguity
  why_distracting: The diff modifies a Flink runner file, so an agent might incorrectly
    apply this runner update checklist item. However, this change is purely a concurrency
    bug fix and has nothing to do with WindowedValue metadata.
  severity: medium
- rule: I/O Connector Components
  source:
    path: repo/.agent/skills/io-connectors/SKILL.md
    lines: 194-197
  source_text: 'Key components:

    1. **Source** - Reads data (bounded or unbounded)

    2. **Sink** - Writes data

    3. **Read/Write transforms** - User-facing API'
  collision_type: architecture_boundary
  why_distracting: The modified file has 'io/source' in its path and 'Source' in its
    name, which might mislead an agent into applying user-facing I/O connector rules.
    This is actually an internal Flink runner translation wrapper, not a Beam I/O
    connector.
  severity: low
