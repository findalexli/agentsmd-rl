# Rules from repo agent configs, evaluated by LLM judge.
# Source: zeroclaw-labs/zeroclaw @ 753d4fc65f32b45797e7aba52db6c8eb3a24ad89
# Config files found: CLAUDE.md, AGENTS.md, .claude/skills/{zeroclaw,github-issue,github-pr,skill-creator}/SKILL.md
# CLAUDE.md delegates entirely to AGENTS.md; skill files are operational (not code-change rules).
rules:
  - rule: "cargo fmt --all -- --check"
    from: "AGENTS.md:8"

  - rule: "cargo clippy --all-targets -- -D warnings"
    from: "AGENTS.md:9"

  - rule: "cargo test"
    from: "AGENTS.md:10"

  - rule: "Read before write — inspect existing module, factory wiring, and adjacent tests before editing."
    from: "AGENTS.md:64"

  - rule: "Implement minimal patch — no speculative abstractions, no config keys without a concrete use case."
    from: "AGENTS.md:66"

  - rule: "Validate by risk tier — docs-only: lightweight checks. Code changes: full relevant checks."
    from: "AGENTS.md:67"

  - rule: "Do not add speculative config/feature flags \"just in case\"."
    from: "AGENTS.md:81"

  - rule: "Do not mix massive formatting-only changes with functional changes."
    from: "AGENTS.md:82"

  - rule: "Do not modify unrelated modules \"while here\"."
    from: "AGENTS.md:83"

  - rule: "Do not bypass failing checks without explicit explanation."
    from: "AGENTS.md:84"

  - rule: "Do not hide behavior-changing side effects in refactor commits."
    from: "AGENTS.md:85"
