agent_config:
  - file: ".claude/CLAUDE.md"
    lines: "When writing text such as documentation, comments, or commit messages, wrap literal names from ClickHouse SQL language, classes and functions, or literal excerpts from log messages inside inline code blocks"
    relevance: "medium"

  - file: ".github/copilot-instructions.md"
    lines: "Resource management - Opened file descriptors or sockets not closed on all paths (including error paths)"
    relevance: "high"

  - file: ".github/copilot-instructions.md"
    lines: "Error handling & observability - Ignored return values of functions that can fail (IO, network, syscalls)"
    relevance: "high"

  - file: ".github/copilot-instructions.md"
    lines: "Concurrency & robustness - Using non-thread-safe data structures from multiple threads"
    relevance: "medium"

  - file: ".github/copilot-instructions.md"
    lines: "Missing logs for serious failure modes (data loss risk, query aborts, background task failures)"
    relevance: "low"

rubric:
  - rule: "When writing comments or documentation, wrap literal names from ClickHouse SQL language, classes and functions, or literal excerpts from log messages inside inline code blocks (e.g., `ClassName`, `function_name`)."
    source:
      path: ".claude/CLAUDE.md"
      lines: "3"
      commit: "6f01023e78a9e84c588068560fda778a7c11a665"

  - rule: "When writing comments or documentation, write names of functions and methods as `f` instead of `f()` (without parentheses) when referring to the function itself rather than its application."
    source:
      path: ".claude/CLAUDE.md"
      lines: "5"
      commit: "6f01023e78a9e84c588068560fda778a7c11a665"

  - rule: "Resource management: Ensure opened file descriptors, sockets, or session handles (like ZooKeeper sessions) are properly managed on all paths including error paths and retry scenarios."
    source:
      path: ".github/copilot-instructions.md"
      lines: "82"
      commit: "6f01023e78a9e84c588068560fda778a7c11a665"

  - rule: "Error handling & observability: Always check return values of functions that can fail (IO, network, syscalls) and handle failures appropriately."
    source:
      path: ".github/copilot-instructions.md"
      lines: "93"
      commit: "6f01023e78a9e84c588068560fda778a7c11a665"

  - rule: "Concurrency & robustness: Use thread-safe patterns when accessing shared state; ensure session handles are refreshed appropriately in retry loops to avoid using stale/expired sessions."
    source:
      path: ".github/copilot-instructions.md"
      lines: "89"
      commit: "6f01023e78a9e84c588068560fda778a7c11a665"
