distractors:
- rule: 'Messaging channels: always consider all built-in + extension channels when
    refactoring shared logic.'
  collision_type: architecture_boundary
  why_distracting: The problem description mentions that the error 'stalls Telegram
    polling and any other channel waiting for a response.' The rule mandates considering
    all built-in and extension channels when refactoring shared logic. An agent might
    mistakenly attempt to add error handling or recovery logic directly to the channel
    implementations (e.g., `src/telegram`, `src/discord`) instead of centralizing
    the fix in the embedded agent runner as instructed.
  severity: high
  source:
    path: CLAUDE.md
    lines: 18-21
- rule: 'Tests: colocated `*.test.ts`.'
  collision_type: scope_ambiguity
  why_distracting: The rule specifies that tests should be colocated as `*.test.ts`.
    Since a new module `attempt.stop-reason-recovery.ts` is being created, an agent
    might over-eagerly create a corresponding `attempt.stop-reason-recovery.test.ts`
    file, violating the explicit 'Files to Modify' list which does not request a test
    file.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 10-10
hierarchy_analysis: '`CLAUDE.md` and `AGENTS.md` contain identical rules. The agent
  must prioritize the explicit instructions in the prompt regarding which files to
  modify, overriding any general repository rules that might suggest broader refactoring
  (like updating all channels or writing tests).'
