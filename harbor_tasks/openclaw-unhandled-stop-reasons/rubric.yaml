# Rules from repo agent configs, evaluated by LLM judge.
# Source: openclaw/openclaw @ 664680318eea98172c7d25405c20f5e3eadfd0e2
rules:
  - rule: "Language: TypeScript (ESM). Prefer strict typing; avoid `any`."
    from: "CLAUDE.md:102"

  - rule: "Never add `@ts-nocheck` and do not add inline lint suppressions by default. Fix root causes first; only keep a suppression when the code is intentionally correct, the rule cannot express that safely, and the comment explains why."
    from: "CLAUDE.md:104"

  - rule: "Do not disable `no-explicit-any`; prefer real types, `unknown`, or a narrow adapter/helper instead."
    from: "CLAUDE.md:105"

  - rule: "Dynamic import guardrail: do not mix `await import(\"x\")` and static `import ... from \"x\"` for the same module in production code paths."
    from: "CLAUDE.md:106"

  - rule: "Never share class behavior via prototype mutation. Use explicit inheritance/composition or helper composition so TypeScript can typecheck."
    from: "CLAUDE.md:111"

  - rule: "Add brief code comments for tricky or non-obvious logic."
    from: "CLAUDE.md:114"

  - rule: "Keep files concise; extract helpers instead of \"V2\" copies."
    from: "CLAUDE.md:115"

  - rule: "Written English: use American spelling and grammar in code, comments, docs, and UI strings (e.g. \"color\" not \"colour\", \"behavior\" not \"behaviour\", \"analyze\" not \"analyse\")."
    from: "CLAUDE.md:118"
