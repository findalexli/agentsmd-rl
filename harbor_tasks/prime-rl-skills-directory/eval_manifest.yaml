    \ inference server. Use when asked to run inference, start vLLM, test a model,\
    \ or launch the inference server.\n---\n\n# Inference Server\n\n## Starting the\
    \ server\n\nAlways use the `inference` entry point — never `vllm serve` or `python\
    \ -m vllm.entrypoints.openai.api_server` directly. The entry point runs `setup_vllm_env()`\
