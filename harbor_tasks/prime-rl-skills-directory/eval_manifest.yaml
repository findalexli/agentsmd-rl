    \ imported.\n\n```bash\n# With a TOML config\nuv run inference @ path/to/config.toml\n\
    \n# With CLI overrides\nuv run inference --model.name Qwen/Qwen3-0.6B --model.max_model_len\
    \ 2048 --model.enforce_eager\n\n# Combined\nuv run inference @ path/to/config.toml\
    \ --server.port 8001 --gpu-memory-utilization 0.5\n```\n\n## Custom endpoints\n\
    \nThe server extends vLLM with:\n\n- `/v1/chat/completions/tokens` — accepts token\
    \ IDs as prompt input (used by multi-turn RL rollouts)\n- `/update_weights` —\
    \ hot-reload model weights from the trainer\n- `/load_lora_adapter` — load LoRA\
