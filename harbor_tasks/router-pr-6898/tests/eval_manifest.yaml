    type: fail_to_pass
    origin: pr_behavior
    description: The resolveAuthorForPR function must exist to handle PR-based author resolution

  - id: test_pr_pattern_matching
    type: fail_to_pass
    origin: pr_behavior
    description: The script must match PR reference patterns like [#6891](url)

  - id: test_pr_author_cache_exists
    type: fail_to_pass
    origin: pr_behavior
    description: A cache for PR authors should exist to avoid duplicate API calls

  - id: test_pr_resolution_before_commit
    type: fail_to_pass
    origin: pr_behavior
    description: PR resolution must be attempted before commit hash resolution

  - id: test_github_api_pr_endpoint
    type: fail_to_pass
    origin: pr_behavior
    description: The script must call the GitHub API pulls endpoint for PR resolution

  - id: test_author_format_consistent
    type: pass_to_pass
    origin: pr_behavior
    description: Author attribution format should be consistent between PR and commit paths

  - id: test_pr_match_regex_correctness
    type: fail_to_pass
    origin: pr_behavior
    description: The PR match regex should correctly extract PR numbers

  - id: test_script_syntax_valid
    type: pass_to_pass
    origin: repo_tests
    description: The script must have valid JavaScript syntax

  - id: test_appendauthors_handles_non_list_items
    type: pass_to_pass
    origin: pr_behavior
    description: Lines not starting with '- ' should pass through unchanged

  - id: test_repo_eslint_scripts
    type: pass_to_pass
    origin: repo_tests
    description: ESLint passes on the release script

  - id: test_repo_prettier_scripts
    type: pass_to_pass
    origin: repo_tests
    description: Prettier formatting check passes on the release script

  - id: test_repo_node_syntax_scripts
    type: pass_to_pass
    origin: repo_tests
    description: All script files have valid JavaScript syntax

rubric:
  - id: formatting_compliance
    rule: "Code changes must pass ESLint and Prettier checks - for script bug fixes, no documentation updates are required as the existing AGENTS.md already covers testing and code style guidelines"
    reference: "This is a bug fix to scripts/create-github-release.mjs - no new documentation is needed since the script's purpose and behavior are not changing, only fixing author attribution"
    source:
      file: AGENTS.md
      lines: "PR instructions section"
      commit: bb291c68aaf63cd57406f14d382abc4d1c5456f3
