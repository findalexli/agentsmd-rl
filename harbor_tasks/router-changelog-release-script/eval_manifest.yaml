  merge_commit: "bb291c68aaf63cd57406f14d382abc4d1c5456f3"

checks:
  # Fail-to-pass tests (behavioral changes)
  - id: test_resolveAuthorForCommit_function_exists
    type: fail_to_pass
    origin: task_definition
    description: "resolveAuthorForCommit function should exist to extract authors from commit hashes"

  - id: test_appendAuthors_function_exists
    type: fail_to_pass
    origin: task_definition
    description: "appendAuthors function should exist to append author info to changelog lines"

  - id: test_bumpedPackages_logic_exists
    type: fail_to_pass
    origin: task_definition
    description: "bumpedPackages logic should exist with version comparison to detect changed packages"

  - id: test_changelog_extraction_from_files
    type: fail_to_pass
    origin: task_definition
    description: "Should extract changelog from CHANGELOG.md files instead of parsing git commits"

  - id: test_author_appended_to_entries
    type: fail_to_pass
    origin: task_definition
    description: "Changelog entries should have author attribution via appendAuthors"

  - id: test_no_conventional_commit_grouping
    type: fail_to_pass
    origin: task_definition
    description: "Old conventional commit grouping by type (Feat, Fix, etc.) should be removed"

  - id: test_bumpedPackages_sorted
    type: fail_to_pass
    origin: task_definition
    description: "bumpedPackages should be sorted alphabetically by name"

  - id: test_new_package_handling
    type: fail_to_pass
    origin: task_definition
    description: "Should handle new packages that don't exist in previous release"

  # Pass-to-pass tests (syntax and repo health)
  - id: test_script_syntax_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Script should have valid JavaScript syntax"

rubric:
  # Code style rules for scripts/create-github-release.mjs changes
  - rule: "TypeScript/JS files should use proper async/await patterns"
    weight: 1
    source:
      path: "scripts/create-github-release.mjs"
    reference: "async function resolveAuthorForCommit(hash) and async function appendAuthors(content) using await resolveUsername(email)"

  - rule: "Functions should have clear, descriptive names matching their purpose"
    weight: 1
    source:
      path: "scripts/create-github-release.mjs"
    reference: "resolveAuthorForCommit resolves commit hash to author string, appendAuthors adds author info to changelog entries"

  - rule: "Error handling should use try-catch with appropriate fallbacks"
    weight: 1
    source:
      path: "scripts/create-github-release.mjs"
    reference: "try { execSync(...) } catch { authorCache[hash] = ''; return '' } with empty string fallback"

  - rule: "Code should handle edge cases (new packages, missing files, etc.)"
    weight: 1
    source:
      path: "scripts/create-github-release.mjs"
    reference: "try { git show prevRelease:packages/pkg } catch { // Package didn't exist in previous release — it's new; bumpedPackages.push({..., prevVersion: null}) }"

scoring:
  max_score: 9
  min_pass_threshold: 7
  partial_credit: true
