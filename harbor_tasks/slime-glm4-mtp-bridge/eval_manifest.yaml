distractors:
- rule: Return RolloutFnTrainOutput and RolloutFnEvalOutput from rollout functions
  source:
    path: .agents/skills/add-rollout-function/SKILL.md
    lines: 43-46
  source_text: '### Step 3: Implement Train and Eval Branches Explicitly


    - For training (`evaluation=False`), return `RolloutFnTrainOutput(samples=...,
    metrics=...)`

    - For evaluation (`evaluation=True`), return `RolloutFnEvalOutput(data=..., metrics=...)`'
  collision_type: architecture_boundary
  why_distracting: The gold diff implements MTP support for GLM-4.7. Since MTP is
    typically used to accelerate rollout generation via speculative decoding, an agent
    might incorrectly assume this change belongs in the rollout generation module
    and try to apply rollout output conventions. However, the changed file is a bridge
    (`mbridge/glm4moe_lite.py`) that strictly handles Megatron-to-HF weight mapping.
  severity: high
- rule: Add tests for new features and follow existing naming conventions
  source:
    path: .agents/skills/add-tests-and-ci/SKILL.md
    lines: 21-25
  source_text: '### Step 1: Pick the Right Test Pattern


    - Follow existing naming: `tests/test_<feature>.py`

    - Start from nearest existing test file for your model/path

    - Keep test scope small and behavior-focused'
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to add unit tests for the newly created
    GLM4MoELiteBridge. However, the gold diff correctly ignores this convention, likely
    because this bridge implementation is a straightforward parameter mapping that
    does not require a standalone unit test in the scope of this specific PR.
  severity: medium
- rule: Return scalar numeric rewards unless your pipeline explicitly uses keyed rewards.
  source:
    path: /workspace/repo/.claude/skills/add-reward-function/SKILL.md
    lines: '49'
  source_text: '- Return scalar numeric rewards unless your pipeline explicitly uses
    keyed rewards.'
  collision_type: architecture_boundary
  why_distracting: The gold diff correctly modifies the Megatron critic model layer
    to output a scalar dimension (output_size=1) for value/reward prediction. An agent
    might see this rule and mistakenly try to implement a custom Python reward function
    (RM) returning a scalar float, entirely missing the required model architecture
    layer modification.
  severity: high
