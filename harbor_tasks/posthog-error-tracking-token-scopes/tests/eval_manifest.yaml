rubric:
- rule: When adding or modifying viewset methods or serializer fields, ensure schema
    annotations are present (@extend_schema or @validated_request on viewset methods,
    help_text on serializer fields). Adding class-level permission attributes like
    scope_object_read_actions does not require schema annotations.
  source:
    path: AGENTS.md
    lines: '85'
    commit: 43d0423b3f819335cfecfae1f1844ea883ba97ac
- rule: DO NOT GIVE ME HIGH LEVEL SHIT, IF I ASK FOR FIX OR EXPLANATION, I WANT ACTUAL
    CODE OR EXPLANATION!
  source:
    path: .cursorrules
    lines: 1-2
  evidence: The gold solution provides a direct, executable bash script with a git
    patch that precisely targets the missing class attributes, without any high-level
    explanations or conversational filler.
  category: style
- rule: Be terse
  source:
    path: .cursorrules
    lines: 3-3
  evidence: The gold solution only adds the exact class attributes (scope_object_read_actions
    and scope_object_write_actions) needed to fix the scope mappings without unnecessary
    refactoring or boilerplate.
  category: style
- rule: Please respect all code comments, they're usually there for a reason. Remove
    them ONLY if they're completely irrelevant after a code change.
  source:
    path: .cursorrules
    lines: 17-17
  evidence: The gold solution modifies the ErrorTrackingIssueViewSet class to add
    scope actions but carefully preserves all existing decorators and comments.
  category: style
- rule: Be accurate and thorough
  source:
    path: .cursorrules
    lines: 6-6
  evidence: The gold solution meticulously includes all standard DRF write actions
    (`create`, `update`, `partial_update`, `patch`, `destroy`) and read actions (`list`,
    `retrieve`) in addition to the new custom ac
distractors:
- rule: API views should declare request/response schemas — prefer `@validated_request`
    from `posthog.api.mixins` or `@extend_schema` from drf-spectacular.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to fix the API access issue by adding or modifying
    `@extend_schema` decorators on the custom action methods, confusing OpenAPI schema
    generation with PostHog's custom token scope enforcement.
  severity: medium
  source:
    path: AGENTS.md
    lines: 64-66
- rule: Be terse
  collision_type: would_cause_bug
  why_distracting: The agent might try to be terse by only adding the commands to
    the lists (e.g., `scope_object_write_actions = ["merge", "split", ...]`), which
    would overwrite the base class defaults and break standard CRUD operations. The
    agent must explicitly redefine the standard actions as well.
  severity: high
  source:
    path: .cursorrules
    lines: 3-3
hierarchy_analysis: The config hierarchy is relatively flat, with `.cursorrules` providing
  general behavioral instructions and `AGENTS.md` providing PostHog-specific architectural
  guidelines. The agent must balance the general instruction to 'Be terse' against
  the architectural reality of overriding class attributes in Django/DRF, where omitting
  standard actions causes bugs.
