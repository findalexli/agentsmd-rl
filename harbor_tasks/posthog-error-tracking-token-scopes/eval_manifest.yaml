checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Target file parses without syntax errors"

  - id: ruff_lint
    type: pass_to_pass
    origin: repo_tests
    description: "Target file passes ruff linting"

  - id: importable
    type: pass_to_pass
    origin: repo_tests
    description: "Target module can be imported without ImportError"

  - id: read_actions_includes_values
    type: fail_to_pass
    origin: pr_diff
    description: "scope_object_read_actions includes \"values\" so API tokens with error_tracking:read can access the values endpoint"

  - id: write_actions_includes_custom_actions
    type: fail_to_pass
    origin: pr_diff
    description: "scope_object_write_actions includes custom actions (merge, split, assign, cohort, bulk) so API tokens with error_tracking:write can use them"

  - id: standard_read_actions_preserved
    type: fail_to_pass
    origin: pr_diff
    description: "Standard DRF read actions (list, retrieve) are preserved in scope_object_read_actions since setting the attribute overrides defaults"

  - id: standard_write_actions_preserved
    type: fail_to_pass
    origin: pr_diff
    description: "Standard DRF write actions (create, update, partial_update) are preserved in scope_object_write_actions since setting the attribute overrides defaults"

  - id: scope_object_still_error_tracking
    type: pass_to_pass
    origin: static
    description: "scope_object remains \"error_tracking\" for correct resource type mapping"

  - id: viewset_class_has_substance
    type: pass_to_pass
    origin: static
    description: "ErrorTrackingIssueViewSet has substantial body (not a stub)"

rubric:
  - rule: "When touching a viewset or serializer, ensure schema annotations are present (@extend_schema or @validated_request on viewset methods, help_text on serializer fields)"
    source:
      path: "AGENTS.md"
