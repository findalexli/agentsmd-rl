rubric:
- rule: When adding or modifying viewset methods or serializer fields, ensure schema
    annotations are present (@extend_schema or @validated_request on viewset methods,
    help_text on serializer fields). Adding class-level permission attributes like
    scope_object_read_actions does not require schema annotations.
  source:
    path: AGENTS.md
    lines: '85'
    commit: 43d0423b3f819335cfecfae1f1844ea883ba97ac
- rule: DO NOT GIVE ME HIGH LEVEL SHIT, IF I ASK FOR FIX OR EXPLANATION, I WANT ACTUAL
    CODE OR EXPLANATION!
  source:
    path: .cursorrules
    lines: 1-2
  evidence: The gold solution provides a direct, executable bash script with a git
    patch that precisely targets the missing class attributes, without any high-level
    explanations or conversational filler.
  category: style
distractors:
- rule: API views should declare request/response schemas — prefer `@validated_request`
    from `posthog.api.mixins` or `@extend_schema` from drf-spectacular.
  collision_type: architecture_boundary
  why_distracting: The agent might try to fix the API access issue by adding or modifying
    `@extend_schema` or `@validated_request` decorators on the custom action methods
    (`merge`, `split`, etc.). However, the issue is strictly about token scope mappings
    handled by `TeamAndOrgViewSetMixin` via the `scope_object_read_actions` and `scope_object_write_actions`
    class attributes, not the OpenAPI schema definitions.
  severity: high
  source:
    path: AGENTS.md
    lines: 58-60
- rule: 'OpenAPI/types: `hogli build:openapi` (regenerate after changing serializers/viewsets)'
  collision_type: scope_ambiguity
  why_distracting: The agent might run `hogli build:openapi` and attempt to commit
    generated TypeScript files because it modified a ViewSet. However, adding internal
    permission scope mappings does not change the public API schema, so running this
    command is unnecessary and could lead to unrelated generated code changes.
  severity: medium
  source:
    path: AGENTS.md
    lines: 28-28
hierarchy_analysis: The `.cursorrules` file provides general behavioral instructions
  (e.g., providing actual code, being terse), while `AGENTS.md` provides PostHog-specific
  development guidelines. In this PR, the agent must follow the specific architecture
  of `TeamAndOrgViewSetMixin` (which uses `scope_object_read_actions` and `scope_object_write_actions`)
  rather than getting distracted by the general API schema rules in `AGENTS.md`.
