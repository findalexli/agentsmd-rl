source:
  repo: apache/airflow
  pr_number: 64940
  base_commit: 8cbe7b9c4a18cf93c751fbdd0618ac92e70c20f4
  merge_commit: ba4be73c24aa8936a9b8cdbd4073484a43345897

checks:
  # Fail-to-pass: Core fix validation
  - id: test_update_log_inside_disable_sqlite_fkeys
    type: fail_to_pass
    origin: pr_fix
    description: UPDATE log statement must be inside disable_sqlite_fkeys context manager

  - id: test_update_dag_inside_disable_sqlite_fkeys
    type: fail_to_pass
    origin: pr_fix
    description: UPDATE dag statement must be inside disable_sqlite_fkeys context manager

  - id: test_sqlite_fk_pragma_ignored_with_active_transaction
    type: fail_to_pass
    origin: pr_fix
    description: Verifies UPDATE comes after context manager line (fix for SQLite PRAGMA being ignored)

  - id: test_update_log_sets_empty_string_for_null
    type: pass_to_pass
    origin: static
    description: UPDATE log statement sets event to empty string for NULL values

  - id: test_update_dag_sets_false_for_null
    type: pass_to_pass
    origin: static
    description: UPDATE dag statement sets is_stale to false for NULL values

  # Pass-to-pass: Preserve existing functionality (static file checks)
  - id: test_migration_file_exists
    type: pass_to_pass
    origin: static
    description: Migration file must exist

  - id: test_migration_file_syntax_valid
    type: pass_to_pass
    origin: static
    description: Migration file must have valid Python syntax

  - id: test_migration_imports_disable_sqlite_fkeys
    type: pass_to_pass
    origin: static
    description: Migration must import disable_sqlite_fkeys utility

  - id: test_migration_has_upgrade_function
    type: pass_to_pass
    origin: static
    description: Migration must have upgrade() function

  - id: test_migration_has_batch_alter_table
    type: pass_to_pass
    origin: static
    description: Migration must use batch_alter_table for SQLite compatibility

  - id: test_migration_alters_event_column
    type: pass_to_pass
    origin: static
    description: Migration must alter the event column

  - id: test_migration_sets_nullable_false
    type: pass_to_pass
    origin: static
    description: Migration must set nullable=False for event column

  # Pass-to-pass: Actual repo CI commands (subprocess.run)
  - id: test_repo_migration_compiles
    type: pass_to_pass
    origin: repo_tests
    description: Migration file passes Python py_compile check

  - id: test_repo_migration_valid_structure
    type: pass_to_pass
    origin: repo_tests
    description: Migration has required alembic structure (revision, functions)

  - id: test_repo_migration_no_assert_statements
    type: pass_to_pass
    origin: repo_tests
    description: Migration has no assert statements in production code

rubric:
  - id: code_only_fix
    rule: "This is a code-only fix that does not require CLAUDE.md or documentation changes"
    description: "Migration fixes that move existing code do not require documentation updates"
    origin: task_context
    reference: "No config file changes needed - the fix simply moves UPDATE statements inside an existing context manager to fix SQLite PRAGMA timing"

  - id: minimal_change
    rule: "The fix should be minimal - only move the UPDATE statements, don't add new code"
    description: "The gold solution moves existing UPDATE statements inside disable_sqlite_fkeys context without adding new functionality"
    origin: task_context
    reference: "The diff shows UPDATE statements moved from before to inside the context manager, with no new logic added"

  - id: preserve_behavior
    rule: "The fix preserves the original UPDATE logic while changing only the execution order"
    description: "Both UPDATE statements maintain their original SQL content"
    origin: task_context
    reference: "UPDATE log SET event = '' WHERE event IS NULL and UPDATE dag SET is_stale = false WHERE is_stale IS NULL remain unchanged"
