rubric:
- rule: In Zig code, be careful with allocators and use defer for cleanup.
  source:
    path: AGENTS.md
    lines: '232'
    commit: 7960fe985dfa3418b507777a5a61289defbdb9dc
- rule: Always use `bun.*` APIs instead of `std.*`.
  source:
    path: src/CLAUDE.md
    lines: 14-15
  evidence: The gold solution implements the cache expiration and memory management
    logic using existing struct fields (`entry.refcount`) and methods (`entry.deinit()`)
    without introducing any `std` library impor
  category: architecture
distractors:
- rule: 'All return `Maybe(T)` — a tagged union of `.result: T` or `.err: bun.sys.Error`'
  collision_type: architecture_boundary
  why_distracting: The agent might see the `err` parameter in the `freeaddrinfo` callback
    and try to refactor it to use Bun's `Maybe(T)` error handling pattern. However,
    this callback interfaces with C code (c-ares or system DNS) and must maintain
    its C ABI signature with an integer error code.
  severity: high
  source:
    path: src/CLAUDE.md
    lines: 28-33
- rule: If a test is for a specific numbered GitHub Issue, it should be placed in
    `test/regression/issue/${issueNumber}.test.ts`. Ensure the issue number is REAL
    and not a placeholder!
  collision_type: meta_confusion
  why_distracting: The agent might try to write a test for this bug fix. Since no
    issue number is provided in the prompt, it might create a placeholder issue file
    (violating the rule) or struggle to write a reliable test for an in-flight DNS
    request race condition, which is highly prone to flakiness. The gold solution
    correctly focuses only on the Zig fix.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 24-25
hierarchy_analysis: The hierarchy consists of root-level config files focusing on
  building and testing, and `src/`-level config files focusing on Zig conventions
  and internal APIs. For this PR, the `src/` level rules are more relevant to the
  code changes. The root-level testing rules create potential distractions, as writing
  a reliable test for this network race condition is difficult and not included in
  the gold solution.
