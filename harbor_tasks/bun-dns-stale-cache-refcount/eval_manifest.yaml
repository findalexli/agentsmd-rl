version: "2.0"

source:
  repo: "oven-sh/bun"
  pr: 28271
  base_commit: "7960fe985dfa3418b507777a5a61289defbdb9dc"
  merge_commit: "923690e923b2f13e0815e8cf342748082058bede"

checks:
  # Gate
  - id: dns_file_exists
    type: pass_to_pass
    origin: static
    description: "dns.zig must exist and be non-empty"

  # Core behavioral fixes (fail-to-pass)
  - id: isexpired_no_refcount_gate
    type: fail_to_pass
    origin: pr_diff
    description: "isExpired must not gate expiry on refcount > 0"

  - id: get_refcount_guard
    type: fail_to_pass
    origin: pr_diff
    description: "get() must guard deinit of expired entries on zero refcount"

  - id: freeaddrinfo_conditional_valid
    type: fail_to_pass
    origin: pr_diff
    description: "freeaddrinfo must not unconditionally assign valid = (err == 0)"

  # Regression (pass-to-pass)
  - id: isexpired_result_null
    type: pass_to_pass
    origin: pr_diff
    description: "isExpired still checks result == null"

  - id: get_calls_isexpired
    type: pass_to_pass
    origin: pr_diff
    description: "get() still calls isExpired for cache entries"

  - id: get_calls_deinit
    type: pass_to_pass
    origin: pr_diff
    description: "get() still calls deinit for expired unreferenced entries"

  - id: isexpired_ttl_comparison
    type: pass_to_pass
    origin: pr_diff
    description: "isExpired still performs TTL comparison"

  # Anti-stub (pass-to_pass)
  - id: isexpired_not_stub
    type: pass_to_pass
    origin: pr_diff
    description: "isExpired has meaningful body (>= 4 non-blank code lines)"

  - id: freeaddrinfo_refcount_dec
    type: pass_to_pass
    origin: pr_diff
    description: "freeaddrinfo still decrements refcount"

  # Config-derived (agent_config)
  - id: no_std_apis
    type: pass_to_pass
    origin: agent_config
    description: "No std.* usage in modified functions (use bun.* instead)"
    source:
      path: "src/CLAUDE.md"
      lines: "14-16"
      commit: "7960fe985dfa3418b507777a5a61289defbdb9dc"

  - id: no_inline_imports
    type: pass_to_pass
    origin: agent_config
    description: "No inline @import() in modified functions"
    source:
      path: "src/CLAUDE.md"
      lines: "11"
      commit: "7960fe985dfa3418b507777a5a61289defbdb9dc"

  # CI-derived (repo_tests) — pass_to_pass gates from bun repo CI checks
  - id: zig_no_debug_prints
    type: pass_to_pass
    origin: static
    description: "Modified Zig functions must not use std.debug.print or std.log"
    source:
      path: "test/internal/ban-words.test.ts"
      commit: "7960fe985dfa3418b507777a5a61289defbdb9dc"

  - id: zig_no_undefined_comparisons
    type: pass_to_pass
    origin: static
    description: "Modified Zig functions must not compare values to undefined (UB)"
    source:
      path: "test/internal/ban-words.test.ts"
      commit: "7960fe985dfa3418b507777a5a61289defbdb9dc"

  - id: zig_no_arguments_old
    type: pass_to_pass
    origin: static
    description: "Modified Zig functions must not use deprecated .arguments_old() API"
    source:
      path: "test/internal/ban-words.test.ts"
      commit: "7960fe985dfa3418b507777a5a61289defbdb9dc"

  - id: zig_no_usingnamespace
    type: pass_to_pass
    origin: static
    description: "Modified code must not use usingnamespace (removed in Zig 0.15)"
    source:
      path: "test/internal/ban-words.test.ts"
      commit: "7960fe985dfa3418b507777a5a61289defbdb9dc"

  - id: zig_no_std_mutex
    type: pass_to_pass
    origin: static
    description: "Modified Zig functions must use bun.Mutex instead of std.Thread.Mutex"
    source:
      path: "test/internal/ban-words.test.ts"
      commit: "7960fe985dfa3418b507777a5a61289defbdb9dc"

  - id: zig_no_std_strings
    type: pass_to_pass
    origin: static
    description: "Modified Zig functions must use bun.strings instead of std.mem.indexOfAny or std.unicode"
    source:
      path: "test/internal/ban-words.test.ts"
      commit: "7960fe985dfa3418b507777a5a61289defbdb9dc"

  - id: zig_no_std_hash_maps
    type: pass_to_pass
    origin: static
    description: "Modified Zig functions must use bun.StringHashMap instead of std.StringHashMap"
    source:
      path: "test/internal/ban-words.test.ts"
      commit: "7960fe985dfa3418b507777a5a61289defbdb9dc"

  - id: zig_no_bun_import_inline
    type: pass_to_pass
    origin: static
    description: "Modified code must not use @import('bun') inline (only import bun once at top)"
    source:
      path: "test/internal/ban-words.test.ts"
      commit: "7960fe985dfa3418b507777a5a61289defbdb9dc"

  - id: zig_no_jsboolean_true_false
    type: pass_to_pass
    origin: static
    description: "Modified Zig functions must use .true/.false instead of .jsBoolean(true/false)"
    source:
      path: "test/internal/ban-words.test.ts"
      commit: "7960fe985dfa3418b507777a5a61289defbdb9dc"

  - id: zig_no_allocator_ptr_compare
    type: pass_to_pass
    origin: static
    description: "Modified Zig functions must not compare allocator.ptr (UB if undefined)"
    source:
      path: "test/internal/ban-words.test.ts"
      commit: "7960fe985dfa3418b507777a5a61289defbdb9dc"

  # Real CI subprocess tests (repo_tests) — these actually run CI commands
  - id: repo_ban_words
    type: pass_to_pass
    origin: repo_tests
    description: "Run the repo's ban-words CI check using bun"
    source:
      path: "test/internal/ban-words.test.ts"
      commit: "7960fe985dfa3418b507777a5a61289defbdb9dc"

  - id: repo_zig_syntax_valid
    type: pass_to_pass
    origin: static
    description: "Verify dns.zig has valid Zig syntax (balanced braces/parens)"

  - id: repo_zig_no_hard_tabs
    type: pass_to_pass
    origin: static
    description: "Verify dns.zig doesn't use hard tabs (coding style)"

  - id: repo_dns_file_not_empty
    type: pass_to_pass
    origin: static
    description: "Verify dns.zig is a non-trivial file with multiple functions"

rubric:
  - rule: "In Zig code, be careful with allocators and use defer for cleanup."
    source:
      path: "AGENTS.md"
      lines: "232"
      commit: "7960fe985dfa3418b507777a5a61289defbdb9dc"
