rubric:
- rule: In Zig code, be careful with allocators and use defer for cleanup.
  source:
    path: AGENTS.md
    lines: '232'
    commit: 7960fe985dfa3418b507777a5a61289defbdb9dc
- rule: Always use `bun.*` APIs instead of `std.*`.
  source:
    path: src/CLAUDE.md
    lines: 14-15
  evidence: The gold solution implements the cache expiration and memory management
    logic using existing struct fields (`entry.refcount`) and methods (`entry.deinit()`)
    without introducing any `std` library impor
  category: architecture
distractors:
- rule: Write tests for changes and place them in the appropriate test directory (e.g.,
    test/js/bun/).
  collision_type: scope_ambiguity
  why_distracting: The config instructs the agent to write tests for new features
    or bug fixes in specific directories (e.g., `test/js/bun/`). However, testing
    internal DNS cache refcount behavior and memory management deterministically from
    JavaScript is extremely difficult and prone to flakiness. The gold solution correctly
    omits a test, but an agent might waste significant effort trying to satisfy the
    testing requirement.
  severity: medium
  source:
    path: AGENTS.md
    lines: 30-40
hierarchy_analysis: The config hierarchy provides general testing guidelines at the
  root (AGENTS.md) and Zig-specific conventions in the `src/` directory. However,
  the bug is a pure logic error regarding refcounts and TTLs, so neither the system
  call wrappers (`bun.sys`) nor the testing guidelines directly apply to the required
  fix.
