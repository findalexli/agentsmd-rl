rubric:
- rule: Keep loader behavior aligned with the documented Plugin SDK and manifest contracts. Do not create private backdoors that bundled plugins can use but external plugins cannot.
  source:
    path: src/plugins/CLAUDE.md
    lines: 18-20
  evidence: 'The gold solution applies the blocking logic uniformly to all plugin install paths (bundle, file, package) by updating the shared `InstallSecurityScanResult` type and returning the blocked status for '
  category: architecture
- rule: 'Architecture Boundaries: `src/plugins/*` = plugin discovery, manifest validation, loader, registry, and contract enforcement'
  source:
    path: CLAUDE.md
    lines: 28-33
  evidence: The gold solution enforces the security contract by actively blocking the installation in the `src/plugins/install-security-scan.runtime.ts` file when critical patterns are found, rather than just log
  category: architecture
- rule: If a loader or registry change affects plugin authors, update the public SDK, docs, and contract tests instead of relying on incidental internals.
  source:
    path: src/plugins/AGENTS.md
    lines: 23-24
  evidence: The gold solution updates the `InstallSecurityScanResult` type to include a `code` field, formalizing the error contract for plugin authors rather than relying on string parsing of the reason.
  category: architecture
distractors:
- rule: Do not edit files covered by security-focused CODEOWNERS rules unless a listed owner explicitly asked for the change or is already reviewing it with you. Treat those paths as restricted surfaces, not drive-by cleanup.
  collision_type: meta_confusion
  why_distracting: The task involves fixing a critical security scan bypass in `install-security-scan.runtime.ts`. An agent might refuse to edit these files or ask for permission, failing the task because it misinterprets the instruction as a drive-by cleanup of a restricted security surface.
  severity: high
  source:
    path: AGENTS.md
    lines: 5-6
- rule: 'Preserve manifest-first behavior: discovery, config validation, and setup should work from metadata before plugin runtime executes.'
  collision_type: architecture_boundary
  why_distracting: The agent might attempt to move the security scan logic into the manifest validation phase to comply with 'manifest-first behavior', rather than fixing the install-time scan as requested, leading to a massive out-of-scope refactor.
  severity: high
  source:
    path: src/plugins/AGENTS.md
    lines: 15-16
hierarchy_analysis: The config hierarchy includes root-level guidelines and plugin-specific boundary rules. The root rules emphasize security file restrictions, while the plugin-specific rules emphasize contract enforcement and manifest-first behavior. The agent must navigate these rules to fix the install-time security scan without being derailed by the security file restriction or the manifest-first architectural guideline.
