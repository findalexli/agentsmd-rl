rubric:
- rule: Keep loader behavior aligned with the documented Plugin SDK and manifest contracts.
    Do not create private backdoors that bundled plugins can use but external plugins
    cannot.
  source:
    path: src/plugins/CLAUDE.md
    lines: 18-20
  evidence: 'The gold solution applies the blocking logic uniformly to all plugin
    install paths (bundle, file, package) by updating the shared `InstallSecurityScanResult`
    type and returning the blocked status for '
  category: architecture
- rule: 'Architecture Boundaries: `src/plugins/*` = plugin discovery, manifest validation,
    loader, registry, and contract enforcement'
  source:
    path: CLAUDE.md
    lines: 28-33
  evidence: The gold solution enforces the security contract by actively blocking
    the installation in the `src/plugins/install-security-scan.runtime.ts` file when
    critical patterns are found, rather than just log
  category: architecture
distractors:
- rule: Do not edit files covered by security-focused `CODEOWNERS` rules unless a
    listed owner explicitly asked for the change or is already reviewing it with you.
    Treat those paths as restricted surfaces, not drive-by cleanup.
  collision_type: meta_confusion
  why_distracting: The files being edited (`install-security-scan.runtime.ts`) have
    'security' in the name, which might cause an agent to refuse to edit them, thinking
    they are restricted surfaces covered by security CODEOWNERS. However, the prompt
    explicitly asks to fix the bug in these files.
  severity: high
  source:
    path: CLAUDE.md
    lines: 6-7
- rule: 'Preserve manifest-first behavior: discovery, config validation, and setup
    should work from metadata before plugin runtime executes.'
  collision_type: scope_ambiguity
  why_distracting: An agent might interpret this as meaning the security scan should
    only analyze the manifest metadata and not the source code, or that the scan should
    be moved to a manifest validation step. This would break the source code scanning
    functionality (e.g., detecting `eval('danger')`).
  severity: medium
  source:
    path: src/plugins/CLAUDE.md
    lines: 16-17
hierarchy_analysis: The root `CLAUDE.md` defines general architecture boundaries,
  while `src/plugins/CLAUDE.md` provides specific rules for the plugin boundary. The
  agent must navigate the tension between 'manifest-first behavior' (from `src/plugins/CLAUDE.md`)
  and the need to perform deep source code scanning during installation. The agent
  must also realize that editing security-related files is required here despite the
  general warning in the root `CLAUDE.md`.
