rubric:
- rule: For CI/workflow changes, the fix must correctly reorder steps and update cache
    keys.
  source:
    path: .github/actions/install-all-deps/action.yml
    commit: 30af84cdd100855999281de8720cbb6d58b48556
  category: workflow
  reference: 'The fix adds id: setup-python to the Install Python step, moves the

    Create env step after the cache step, and updates cache keys to use

    steps.setup-python.outputs.python-version for exact version matching.

    '
- rule: For test fixes, uncomment or add necessary test assertions.
  source:
    path: js/textbox/Textbox.test.ts
    commit: 30af84cdd100855999281de8720cbb6d58b48556
  category: testing
  reference: 'The fix uncomments await tick() in the copy test to ensure the event

    loop processes before assertions run, fixing the flaky test.

    '
- rule: Tests must pass. PRs are only merged when CI is green.
  source:
    path: AGENTS.md
    lines: 40-41
  evidence: The gold solution fixes the flaky test in `js/textbox/Textbox.test.ts`
    by uncommenting `await tick();`, ensuring the test passes reliably.
  category: testing
- rule: Be consistent with the style of the surrounding code.
  source:
    path: AGENTS.md
    lines: '49'
  evidence: The gold solution uncomments `await tick();` after firing a click event,
    which is consistent with the standard Svelte testing style for handling async
    event loop ticks.
  category: style
- rule: '`js/` — frontend code (Svelte/TypeScript), with each component in its own
    subdirectory'
  source:
    path: AGENTS.md
    lines: 12-13
  evidence: The gold solution edits `js/textbox/Textbox.test.ts` to fix the Svelte
    component test, respecting the directory structure where frontend code and tests
    for a component are in its own subdirectory unde
  category: architecture
distractors:
- rule: 'No low-value busywork PRs: Do not open one-off PRs for tiny edits.'
  collision_type: scope_ambiguity
  why_distracting: The agent might refuse to fix the flaky test because it only requires
    uncommenting a single line (`await tick();`), misinterpreting it as a 'tiny edit'
    or 'low-value busywork' despite it being explicitly requested in the prompt.
  severity: medium
  source:
    path: AGENTS.md
    lines: 51-52
hierarchy_analysis: The repository uses a single flat AGENTS.md file at the root.
