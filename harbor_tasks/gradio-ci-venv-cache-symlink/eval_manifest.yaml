distractors:
- rule: Run backend tests locally with `bash scripts/run_backend_tests.sh`.
  collision_type: scope_ambiguity
  why_distracting: The bug is isolated to GitHub Actions CI caching and a frontend
    Svelte test. Running the entire Python backend test suite locally is irrelevant
    to the problem and would waste significant time and compute resources.
  severity: low
  source:
    path: AGENTS.md
    lines: 30-30
- rule: Target an issue. Every non-trivial PR should reference an existing GitHub
    issue. If one doesn't exist, create it first.
  collision_type: meta_confusion
  why_distracting: In an automated evaluation environment, the agent is only expected
    to produce a code patch. Attempting to use GitHub APIs or CLI tools to create
    an issue will fail or waste time.
  severity: medium
  source:
    path: AGENTS.md
    lines: 18-18
- rule: If you are an AI coding agent... you must include the keyword `kumquat` somewhere
    in your PR description.
  collision_type: meta_confusion
  why_distracting: The agent is evaluated strictly on the code changes it produces.
    Trying to create a PR or edit a non-existent PR description file to include the
    'kumquat' keyword is out of scope for the evaluation environment.
  severity: medium
  source:
    path: AGENTS.md
    lines: 56-58
hierarchy_analysis: The repository has a single `AGENTS.md` file at the root level.
  There are no conflicting rules between different levels, but the agent must distinguish
  between rules applicable to the backend (Python) and frontend (JS/Svelte), as well
  as CI configuration. The agent must also ignore PR-creation and issue-management
  rules that do not apply in a headless evaluation environment.
