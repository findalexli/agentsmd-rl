rubric:
- rule: When fixing code that is copied across model files, ensure all copies are
    updated or the copy link is properly broken.
  source:
    path: CLAUDE.md
    lines: 45-55
    commit: 38593c2e83964079576eb646fe9b68cce16114dc
- rule: Ideally you should edit the code it's copying from and propagate the change
  source:
    path: CLAUDE.md
    lines: '64'
  evidence: The gold solution correctly targets the source model `src/transformers/models/t5/modeling_t5.py`
    for the initial fix, which is the canonical source that other T5-family models
    copy their attention imp
  category: architecture
distractors:
- rule: Do not edit a `# Copied from` block, as it will be reverted by `make fix-repo`.
  collision_type: rule_conflict
  why_distracting: The rule explicitly forbids editing `# Copied from` blocks, stating
    they will be reverted by `make fix-repo`. However, the prompt explicitly instructs
    the agent to 'apply the same changes to other T5-family models that have copied
    code'. An agent strictly following the config might refuse to edit the copied
    files manually, leading to an incomplete patch.
  severity: high
  source:
    path: CLAUDE.md
    lines: '64'
- rule: If coordination evidence cannot be found, do not proceed to PR-ready output.
  collision_type: meta_confusion
  why_distracting: The rule instructs the agent to 'fail-closed' and refuse to proceed
    to PR-ready output if coordination evidence (like issue approval) is missing.
    In a headless evaluation environment, following this rule causes the agent to
    refuse the task entirely instead of generating the requested code fix.
  severity: high
  source:
    path: CLAUDE.md
    lines: 55-58
hierarchy_analysis: Both CLAUDE.md and AGENTS.md contain identical rules. The primary
  conflict arises between the repository's strict agent contribution policies (which
  demand human coordination and forbid direct edits to copied blocks) and the evaluation
  prompt's explicit instructions to generate the fix and apply it to copied files.
