rubric:
- rule: When fixing code that is copied across model files, ensure all copies are
    updated or the copy link is properly broken.
  source:
    path: CLAUDE.md
    lines: 45-55
    commit: 38593c2e83964079576eb646fe9b68cce16114dc
- rule: Ideally you should edit the code it's copying from and propagate the change
  source:
    path: CLAUDE.md
    lines: '64'
  evidence: The gold solution correctly targets the source model `src/transformers/models/t5/modeling_t5.py`
    for the initial fix, which is the canonical source that other T5-family models
    copy their attention imp
  category: architecture
- rule: Avoid direct inheritance between model-specific files in `src/transformers/models/`.
  source:
    path: AGENTS.md
    lines: 61-62
  evidence: The gold solution patches `modeling_t5.py` and `modeling_mt5.py` independently
    rather than refactoring them to use direct inheritance to share the fixed attention
    logic.
  category: architecture
- rule: Run `make fix-repo` to auto-fix copies and propagate changes before opening
    a PR
  source:
    path: AGENTS.md
    lines: 4-8
  evidence: The gold solution includes identical changes across multiple T5-family
    model files, which is the expected outcome of running `make fix-repo` to auto-fix
    copies after modifying the source.
  category: tooling
distractors:
- rule: Do not edit a `# Copied from` block, as it will be reverted by `make fix-repo`.
  collision_type: rule_conflict
  why_distracting: The user instruction explicitly tells the agent to 'apply the same
    changes to other T5-family models that have copied code'. An agent might interpret
    this as a directive to manually edit those files, which directly violates the repository
    rule against manually editing `# Copied from` blocks.
  severity: high
  source:
    path: AGENTS.md
    lines: 61-65
hierarchy_analysis: The configuration files (`AGENTS.md` and `CLAUDE.md`) contain
  identical rules at the root level. The primary conflict is between the user's prompt
  (which implies manual edits to copied files) and the repository's config (which mandates
  using `make fix-repo` to sync copies). The agent must prioritize the repository's
  structural integrity rules over a literal interpretation of the user's instruction.
