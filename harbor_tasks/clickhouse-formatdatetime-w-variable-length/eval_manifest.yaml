source_pr:
  owner: ClickHouse
  repo: ClickHouse
  number: 102102
  title: "Backport #101847 to 26.3: formatDateTime: Treat %W unconditionally as a variable-length formatter"
  merge_commit: 4735a442e4fd8d0b317a2171945fbcaf8cfa7ec7
  base_commit: 5316ae89ac9d925b36281526d98a8adff23d0d3e

task:
  name: clickhouse-formatdatetime-w-variable-length
  title: "formatDateTime %W variable-length formatter fix"
  description: |
    Fix a bug where the %W formatter (weekday name) in formatDateTime was not
    consistently treated as variable-length. When mysql_M_is_month_name=true,
    %W would incorrectly be considered fixed-width, potentially causing truncation
    or incorrect padding of output.

target_files:
  - src/Functions/formatDateTime.cpp

checks:
  # Fail-to-pass tests
  - id: test_variable_width_formatter_array_updated
    type: fail_to_pass
    origin: code_structure
    description: variable_width_formatter_M_is_month_name array only contains 'M'

  - id: test_unconditional_w_check_added
    type: fail_to_pass
    origin: code_structure
    description: variable_width_formatter check comes before mysql_M_is_month_name check

  - id: test_no_redundant_w_in_m_array
    type: fail_to_pass
    origin: code_structure
    description: '''W'' is not redundantly in variable_width_formatter_M_is_month_name array'

  # Pass-to-pass tests (code structure)
  - id: test_w_in_variable_width_formatter
    type: pass_to_pass
    origin: code_structure
    description: '''W'' remains in the variable_width_formatter array'

  - id: test_function_signature_unchanged
    type: pass_to_pass
    origin: code_structure
    description: Function signature remains unchanged

  # Pass-to-pass tests (agent config rules)
  - id: test_no_sleep_in_code
    type: pass_to_pass
    origin: agent_config
    source: ".claude/CLAUDE.md:47"
    description: No sleep() calls added to fix race conditions

  - id: test_code_uses_allman_braces
    type: pass_to_pass
    origin: agent_config
    source: ".claude/CLAUDE.md:46"
    description: C++ code uses Allman-style braces (opening brace on new line)

  # Pass-to-pass tests (repo CI tests)
  - id: test_repo_style_cpp
    type: pass_to_pass
    origin: repo_tests
    description: C++ style check script passes

  - id: test_repo_various_checks
    type: pass_to_pass
    origin: repo_tests
    description: Various style checks script passes

  - id: test_repo_functional_test_files_exist
    type: pass_to_pass
    origin: repo_tests
    description: formatDateTime functional test files exist

rubric: []
