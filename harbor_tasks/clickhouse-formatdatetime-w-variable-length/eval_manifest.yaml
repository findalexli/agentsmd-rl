source_pr:
  owner: ClickHouse
  repo: ClickHouse
  number: 102098
  title: "Backport #101847 to 26.1: formatDateTime: Treat %W unconditionally as a variable-length formatter"
  base_commit: 23059ebe14d3e8ff8ddabbafd89edcf4071de0fe
  merge_commit: 6f01023e78a9e84c588068560fda778a7c11a665

checks:
