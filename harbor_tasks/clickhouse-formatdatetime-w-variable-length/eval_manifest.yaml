  - id: test_w_in_variable_width_formatter_M_is_month_name_removed
    type: fail_to_pass
    origin: behavior
    description: "%W must not be in variable_width_formatter_M_is_month_name array (should only have 'M')"

  - id: test_w_checked_unconditionally_before_mysql_M_is_month_name
    type: fail_to_pass
    origin: behavior
    description: "%W check must come BEFORE the mysql_M_is_month_name conditional (unconditional check)"

  - id: test_no_else_branch_with_variable_width_formatter
    type: fail_to_pass
    origin: behavior
    description: "The else branch containing variable_width_formatter check should be removed"

  # Pass-to-pass tests - verify the solution doesn't break existing functionality
  - id: test_file_has_valid_structure
    type: pass_to_pass
    origin: agent_config
    description: "Modified file has valid C++ structure (balanced braces)"

  - id: test_cmake_configures
    type: pass_to_pass
    origin: repo_tests
    description: "CMake configuration succeeds with the fix"

  - id: test_cpp_syntax_valid
    type: pass_to_pass
    origin: agent_config
    description: "Modified C++ file has valid syntax (clang -fsyntax-only)"

  - id: test_git_repo_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Git repository is in a valid state and file is tracked"

  - id: test_file_no_trailing_whitespace
    type: pass_to_pass
    origin: agent_config
    description: "Modified file has no trailing whitespace (lint check)"

  # New pass-to-pass tests using real CI commands from the repo
  - id: test_repo_file_exists_and_is_cpp
    type: pass_to_pass
    origin: repo_tests
    description: "Modified file exists and is recognized as C++ source by 'file' command"

  - id: test_repo_cpp_syntax_no_errors
    type: pass_to_pass
    origin: repo_tests
    description: "C++ syntax check using clang++ shows no syntax errors in modified file"

  - id: test_repo_clang_check_runs
    type: pass_to_pass
    origin: repo_tests
    description: "clang-check-20 runs on modified file without crashing"

  - id: test_cmake_presence
    type: pass_to_pass
    origin: repo_tests
    description: "CMake is available and reports version"

  - id: test_repo_directory_structure
    type: pass_to_pass
    origin: repo_tests
    description: "Repo has expected directory structure for Functions module"

  - id: test_repo_file_line_count
    type: pass_to_pass
    origin: repo_tests
    description: "Modified file has reasonable line count (not truncated/corrupted)"

  - id: test_repo_clang_version
    type: pass_to_pass
    origin: repo_tests
    description: "Clang compiler version is compatible (supports C++23)"

  - id: test_repo_ninja_version
    type: pass_to_pass
    origin: repo_tests
    description: "Ninja build system is available and functional"

  - id: test_repo_ccache_version
    type: pass_to_pass
