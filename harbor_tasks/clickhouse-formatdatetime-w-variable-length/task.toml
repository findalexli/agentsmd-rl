name = "clickhouse-formatdatetime-w-variable-length"
title = "formatDateTime %W variable-length formatter fix"
description = """
Fix a bug where the %W formatter (weekday name) in formatDateTime was not consistently
treated as variable-length. When mysql_M_is_month_name=true, %W would incorrectly be
considered fixed-width, potentially causing truncation or incorrect padding of output.

The fix ensures that %W is always checked unconditionally as a variable-length formatter
before other format-specific checks, and removes the redundant 'W' from the
variable_width_formatter_M_is_month_name array.
"""

# Difficulty: Medium - requires understanding C++ control flow and the specific bug
# Tags reflect the nature of the fix
difficulty = "medium"
tags = ["c++", "bugfix", "formatting", "datetime"]

# Time estimates (minutes)
estimated_time = { setup = 10, solve = 20, verify = 5 }

# Repository info
[repository]
owner = "ClickHouse"
repo = "ClickHouse"
base_commit = "5316ae89ac9d925b36281526d98a8adff23d0d3e"
merge_commit = "4735a442e4fd8d0b317a2171945fbcaf8cfa7ec7"
pr_number = 102102

# Target file(s) to modify
[[target_files]]
path = "src/Functions/formatDateTime.cpp"
description = "Main file containing the containsOnlyFixedWidthMySQLFormatters function"

# Distinctive line from the patch (for idempotency check)
distinctive_line = "variable_width_formatter_M_is_month_name = {'M'}"
