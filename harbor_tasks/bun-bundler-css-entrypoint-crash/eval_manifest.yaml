- rule: Additional config files (.prettierrc, .clang-tidy) must pass Prettier formatting
- rule: Bundler related files (tsconfig.json) must pass Prettier formatting
- rule: Git repository must be in a valid state (git status passes)
- rule: package.json must be valid JSON (verified via Python subprocess)
- rule: tsconfig.json must be valid JSON (verified via Python subprocess)
- rule: Zig file must have valid basic structure (balanced braces, key constructs)
- rule: Zig file must not contain double semicolons
- rule: package.json and tsconfig.json must be valid JSON
- rule: Key Zig functions must have valid signatures (computeChunks, Handler.next)
- rule: Critical repo files (CLAUDE.md, build.zig, package.json, etc.) must exist
- rule: .prettierrc must be valid JSON if it exists
- rule: tsconfig.json must have valid structure with required fields
- rule: computeChunks.zig must exist (verified via ls subprocess)
- rule: Critical repo files must exist (verified via find subprocess)
- rule: Python scripts must have valid syntax (verified via py_compile)
- rule: Decl literals in Zig are recommended.
  source:
    path: src/CLAUDE.md
    lines: 6-7
  evidence: The gold solution maintains the use of a struct literal `.{ ... }` when
    adding the `entry_point_to_js_chunk_idx` field to the `Handler` initialization.
  category: style
distractors:
- rule: Always use bun.* APIs instead of std.*
  collision_type: scope_ambiguity
  why_distracting: The rule strongly states 'Always use bun.* APIs instead of std.*',
    which might cause the agent to avoid using `std.math.maxInt` for the sentinel
    value or `std.mem.Allocator`, even though the rule is intended for OS/FS/crypto
    wrappers.
  severity: high
  source:
    path: src/CLAUDE.md
    lines: 15-17
- rule: bun wrappers preserve OS error info and never use unreachable
  collision_type: scope_ambiguity
  why_distracting: The rule mentions that bun wrappers 'never use unreachable'. An
    agent might misinterpret this as a blanket ban and try to refactor the existing
    `catch unreachable` on the `getOrPut` call in `computeChunks.zig`, expanding the
    PR scope unnecessarily.
  severity: medium
  source:
    path: src/CLAUDE.md
    lines: 15-17
- rule: test/bundler/ - Bundler and transpiler tests. Use itBundled helper.
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to write a complex bundler test using the
    `itBundled` helper to reproduce the CSS entry point crash, but the gold solution
    only modifies the Zig source code.
  severity: low
  source:
    path: CLAUDE.md
    lines: 31-32
hierarchy_analysis: The hierarchy consists of root-level CLAUDE.md/AGENTS.md focusing
  on testing and build commands, and src-level CLAUDE.md/AGENTS.md focusing on Zig
  conventions and the bun vs std API usage. The src-level rules are more relevant
  to the actual code changes, but their broad wording ('Always use bun.* APIs instead
  of std.*') creates scope ambiguity when dealing with core Zig standard library features
  like std.math.
