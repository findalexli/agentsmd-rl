rubric:
- rule: Follow existing code style. Check neighboring files for patterns.
  source:
    path: CLAUDE.md
    lines: '225'
    commit: 7abe6c387d0746b26eeed7fe9175e14560840cbb
- rule: Use comments to explain invariants, not narrate code. Comments should clarify
    why something is done, not restate what the code does.
  source:
    path: CLAUDE.md
    lines: 1-5
    commit: 7abe6c387d0746b26eeed7fe9175e14560840cbb
- rule: Repo config files (package.json, tsconfig.json) must pass Prettier formatting
- rule: oxlint.json must pass Prettier formatting check
