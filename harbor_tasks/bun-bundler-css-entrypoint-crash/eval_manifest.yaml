version: "2.0"

source:
  repo: "oven-sh/bun"
  pr: 28251
  base_commit: "7abe6c387d0746b26eeed7fe9175e14560840cbb"
  merge_commit: "7960fe985dfa3418b507777a5a61289defbdb9dc"

checks:
  - id: zig_file_exists
    type: pass_to_pass
    origin: static
    description: "computeChunks.zig must exist and be non-empty"

  - id: handler_next_no_direct_param_as_index
    type: fail_to_pass
    origin: pr_diff
    description: "Handler.next must not use raw entry_point_id as chunks[] index"

  - id: css_entry_point_guard
    type: fail_to_pass
    origin: pr_diff
    description: "Handler.next must guard/skip CSS-only entry points with no JS chunk"

  - id: entry_point_to_chunk_mapping
    type: fail_to_pass
    origin: pr_diff
    description: "A mapping from entry point IDs to JS chunk indices must exist"

  - id: handler_retains_core_logic
    type: pass_to_pass
    origin: pr_diff
    description: "Handler struct retains chunks, next, files_with_parts_in_chunk, getOrPut"

  - id: compute_chunks_structure
    type: pass_to_pass
    origin: pr_diff
    description: "computeChunks still creates js_chunks and css_chunks"

  - id: handler_next_not_stub
    type: pass_to_pass
    origin: static
    description: "Handler.next has >= 3 meaningful lines (not a stub)"

  - id: no_prohibited_std_apis
    type: pass_to_pass
    origin: agent_config
    description: "No std.fs/posix/os/process usage — bun.* wrappers required"
    source:
      path: "src/CLAUDE.md"
      lines: "16"
      commit: "7abe6c387d0746b26eeed7fe9175e14560840cbb"

  - id: no_inline_imports
    type: pass_to_pass
    origin: agent_config
    description: "No @import() inline inside function bodies"
    source:
      path: "src/CLAUDE.md"
      lines: "11"
      commit: "7abe6c387d0746b26eeed7fe9175e14560840cbb"

  - id: no_catch_out_of_memory_pattern
    type: pass_to_pass
    origin: agent_config
    description: "Must use bun.handleOom() or try, not catch bun.outOfMemory()"
    source:
      path: "src/CLAUDE.md"
      lines: "234-238"
      commit: "7abe6c387d0746b26eeed7fe9175e14560840cbb"

  - id: mapping_populated_during_chunk_creation
    type: fail_to_pass
    origin: pr_diff
    description: "Entry-point-to-chunk mapping is written when JS chunks are created"

rubric:
  - rule: "Follow existing code style. Check neighboring files for patterns."
    source:
      path: "CLAUDE.md"
      lines: "225"
      commit: "7abe6c387d0746b26eeed7fe9175e14560840cbb"

  - rule: "Use comments to explain invariants, not narrate code. Comments should clarify why something is done, not restate what the code does."
    source:
      path: "CLAUDE.md"
      lines: "1-5"
      commit: "7abe6c387d0746b26eeed7fe9175e14560840cbb"

  # Repo CI/CD tests - these actually run subprocess commands
  - id: test_repo_prettier_config_files
    type: pass_to_pass
    origin: repo_tests
    description: "Repo config files (package.json, tsconfig.json) must pass Prettier formatting"

  - id: test_repo_prettier_oxlint_json
    type: pass_to_pass
    origin: repo_tests
    description: "oxlint.json must pass Prettier formatting check"

  - id: test_repo_prettier_clang_tidy
    type: pass_to_pass
    origin: repo_tests
    description: ".clang-tidy must pass Prettier formatting check"

  - id: test_repo_prettier_misc_configs
    type: pass_to_pass
    origin: repo_tests
    description: "Additional config files (.prettierrc, .clang-tidy) must pass Prettier formatting"

  # New repo_tests added during p2p enrichment
  - id: test_repo_prettier_bundler_files
    type: pass_to_pass
    origin: repo_tests
    description: "Bundler related files (tsconfig.json) must pass Prettier formatting"

  - id: test_repo_git_status
    type: pass_to_pass
    origin: repo_tests
    description: "Git repository must be in a valid state (git status passes)"

  - id: test_repo_package_json_valid_subprocess
    type: pass_to_pass
    origin: repo_tests
    description: "package.json must be valid JSON (verified via Python subprocess)"

  - id: test_repo_tsconfig_json_valid_subprocess
    type: pass_to_pass
    origin: repo_tests
    description: "tsconfig.json must be valid JSON (verified via Python subprocess)"

  # Static analysis tests - file reads, not subprocess commands
  - id: test_zig_file_basic_structure
    type: pass_to_pass
    origin: static
    description: "Zig file must have valid basic structure (balanced braces, key constructs)"

  - id: test_zig_no_double_semicolons
    type: pass_to_pass
    origin: static
    description: "Zig file must not contain double semicolons"

  - id: test_repo_json_valid
    type: pass_to_pass
    origin: static
    description: "package.json and tsconfig.json must be valid JSON"

  - id: test_zig_function_signatures
    type: pass_to_pass
    origin: static
    description: "Key Zig functions must have valid signatures (computeChunks, Handler.next)"

  - id: test_repo_critical_files_exist
    type: pass_to_pass
    origin: static
    description: "Critical repo files (CLAUDE.md, build.zig, package.json, etc.) must exist"

  - id: test_prettierrc_valid
    type: pass_to_pass
    origin: static
    description: ".prettierrc must be valid JSON if it exists"

  # Replaces test_repo_typecheck with static version
  - id: test_tsconfig_structure
    type: pass_to_pass
    origin: static
    description: "tsconfig.json must have valid structure with required fields"

  # Additional repo CI tests for the bundler code change (subprocess commands)
  - id: test_zig_computeChunks_file_exists
    type: pass_to_pass
    origin: repo_tests
    description: "computeChunks.zig must exist (verified via ls subprocess)"

  - id: test_repo_find_critical_files
    type: pass_to_pass
    origin: repo_tests
    description: "Critical repo files must exist (verified via find subprocess)"

  - id: test_python_syntax_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Python scripts must have valid syntax (verified via py_compile)"
