rubric:
- rule: Follow existing code style. Check neighboring files for patterns.
  source:
    path: CLAUDE.md
    lines: '225'
    commit: 7abe6c387d0746b26eeed7fe9175e14560840cbb
- rule: Use comments to explain invariants, not narrate code. Comments should clarify
    why something is done, not restate what the code does.
  source:
    path: CLAUDE.md
    lines: 1-5
    commit: 7abe6c387d0746b26eeed7fe9175e14560840cbb
- rule: Repo config files (package.json, tsconfig.json) must pass Prettier formatting
- rule: oxlint.json must pass Prettier formatting check
- rule: .clang-tidy must pass Prettier formatting check
- rule: Additional config files (.prettierrc, .clang-tidy) must pass Prettier formatting
- rule: Bundler related files (tsconfig.json) must pass Prettier formatting
- rule: Git repository must be in a valid state (git status passes)
- rule: package.json must be valid JSON (verified via Python subprocess)
- rule: tsconfig.json must be valid JSON (verified via Python subprocess)
- rule: Zig file must have valid basic structure (balanced braces, key constructs)
- rule: Zig file must not contain double semicolons
- rule: package.json and tsconfig.json must be valid JSON
- rule: Key Zig functions must have valid signatures (computeChunks, Handler.next)
- rule: Critical repo files (CLAUDE.md, build.zig, package.json, etc.) must exist
- rule: .prettierrc must be valid JSON if it exists
- rule: tsconfig.json must have valid structure with required fields
- rule: computeChunks.zig must exist (verified via ls subprocess)
- rule: Critical repo files must exist (verified via find subprocess)
- rule: Python scripts must have valid syntax (verified via py_compile)
- rule: Decl literals in Zig are recommended.
  source:
    path: src/CLAUDE.md
    lines: 6-7
  evidence: The gold solution maintains the use of a struct literal `.{ ... }` when
    adding the `entry_point_to_js_chunk_idx` field to the `Handler` initialization.
  category: style
distractors:
- rule: Always use `bun.*` APIs instead of `std.*`
  collision_type: scope_ambiguity
  why_distracting: The rule mandates using `bun.*` APIs instead of `std.*`. An agent
    might over-apply this to `std.math.maxInt` or `std.mem.Allocator`, attempting
    to use non-existent `bun.math` or `bun.Allocator` and causing compilation errors.
  severity: high
  source:
    path: src/AGENTS.md
    lines: 14-25
- rule: Test Organization and Writing Tests
  collision_type: scope_ambiguity
  why_distracting: The instructions detail how to write and organize tests, suggesting
    the use of `itBundled` for testing. The agent might waste effort trying to write
    a test for this fix, which is complex and not required by the gold solution.
  severity: medium
  source:
    path: AGENTS.md
    lines: 27-36
hierarchy_analysis: The agent must navigate from the root `AGENTS.md` (testing/building)
  to `src/AGENTS.md` (Zig conventions). The critical challenge is correctly scoping
  the `src/AGENTS.md` rule about avoiding `std.*` APIs, recognizing that it applies
  to OS/fs operations and not core language utilities like `std.math`.
