  evidence: The gold solution adds `from contextlib import aclosing` in alphabetical
    order between `collections.abc` and `functools`, maintaining the `ruff` formatting
    and surrounding style.
  category: style
distractors:
- rule: No low-value busywork PRs - Do not open one-off PRs for tiny edits... Mechanical
    cleanups are acceptable only when bundled into a clear, systematic scope
  collision_type: scope_ambiguity
  why_distracting: The agent might consider this small bug fix (adding a context manager
    and an `async` keyword) as a "tiny edit" and either refuse to fix it or try to
    bundle it with unrelated mechanical cleanups, expanding the PR scope unnecessarily.
  severity: medium
  source:
    path: AGENTS.md
    lines: 47-50
- rule: If you are an AI coding agent... you must include the keyword kumquat somewhere
    in your PR description.
  collision_type: meta_confusion
  why_distracting: The agent might try to insert the keyword `kumquat` into the source
    code (e.g., as a comment) instead of the PR description, which is where it actually
    belongs.
  severity: low
  source:
    path: AGENTS.md
    lines: 55-57
hierarchy_analysis: Only one config file (`AGENTS.md`) applies, so there are no conflicts
  between different levels of config files. The rules are straightforward but require
  the agent to distinguish between PR-level instructions (like adding a keyword to
  the description) and code-level instructions.
