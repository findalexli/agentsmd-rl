distractors:
- rule: Pure code-agent PRs are not allowed. A human contributor must understand and
    be able to defend the change.
  collision_type: meta_confusion
  why_distracting: The agent might refuse to complete the task or generate the patch,
    claiming that a human must do it or that it cannot submit a PR as an AI.
  severity: high
  source:
    path: AGENTS.md
    lines: 55-57
- rule: Do not open one-off PRs for tiny edits (single typo, isolated lint cleanup,
    one mutable default argument, etc.).
  collision_type: scope_ambiguity
  why_distracting: The agent might misclassify this bug fix (which only changes a
    few lines) as a 'tiny edit' and refuse to fix it.
  severity: medium
  source:
    path: AGENTS.md
    lines: 51-53
