rubric:
- rule: Do not use `for` loops or conditional statements (`if`, `switch`, etc.) to generate test cases within `describe()` blocks.
  source:
    path: AGENTS.md
    lines: 34-36
    commit: 87447287f87d29f394c71c1859d293f78b69cdca
  evidence: Gold patch removes the `for (let { name, matcher } of matchers)` loop inside describe() blocks and replaces it with explicit bench() calls for each matcher type.
  category: testing
  verification: llm_judge
- rule: Prefer `let` for locals, `const` only at module scope; never use `var`.
  source:
    path: AGENTS.md
    lines: '25'
    commit: 87447287f87d29f394c71c1859d293f78b69cdca
  evidence: Gold patch uses `let` for all local variables including matcher instances and loop counters.
  category: naming
  verification: llm_judge
- rule: Only use arrow functions as callbacks (e.g., route handlers, array methods) where preserving lexical `this` is beneficial or the syntax is more concise.
  source:
    path: AGENTS.md
    lines: '26'
    commit: 87447287f87d29f394c71c1859d293f78b69cdca
  evidence: Gold patch uses arrow functions only as callbacks for bench(), .forEach(), and for-of loops.
  category: style
  verification: llm_judge
- rule: 'Prettier (printWidth: 100, no semicolons, single quotes, spaces not tabs)'
  source:
    path: AGENTS.md
    lines: '29'
    commit: 87447287f87d29f394c71c1859d293f78b69cdca
  evidence: Gold code passes Prettier format check with the repo's configuration.
  category: style
  verification: programmatic
