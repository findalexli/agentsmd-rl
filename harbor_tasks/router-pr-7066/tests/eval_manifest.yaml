version: 1

title: "TanStack Router #7066: preserve scroll position after SSR hash hydration"
description: |
  After SSR hydration completes in non-SPA mode, resolvedLocation is left undefined.
  When later preload or invalidate cycles run, the router detects a false location
  change (resolvedLocation=undefined vs location=current) and re-runs hash scrolling,
  disrupting the user's scroll position even though the URL hash hasn't actually changed.

  The fix sets `router.stores.resolvedLocation` to the current location state before
  returning from `hydrate()` in the non-SPA SSR path, preventing subsequent load cycles
  from mistakenly triggering hash scroll behavior.

repo: TanStack/router
repo_short: router
pr_number: 7066
base_commit: a556afa0f07c551cc0edaf17fa7d0de7014a1c68
merge_commit: 6ee0e795b085651beb2f1ac6503cdbd7eaffedd1

target_file: packages/router-core/src/ssr/ssr-client.ts

distinctive_line: "router.stores.resolvedLocation.setState(() => router.stores.location.state)"

patch_content: |
  diff --git a/packages/router-core/src/ssr/ssr-client.ts b/packages/router-core/src/ssr/ssr-client.ts
  index b2ea33e92bf..678aa869a99 100644
  --- a/packages/router-core/src/ssr/ssr-client.ts
  +++ b/packages/router-core/src/ssr/ssr-client.ts
  @@ -254,6 +254,11 @@ export async function hydrate(router: AnyRouter): Promise<any> {
         // remove the dehydrated flag since we won't run router.load() which would remove it
         match._nonReactive.dehydrated = undefined
       })
  +    // Mark the current location as resolved so that later load cycles
  +    // (e.g. preloads, invalidations) don't mistakenly detect a href change
  +    // (resolvedLocation defaults to undefined and router.load() is skipped
  +    // in the normal SSR hydration path).
  +    router.stores.resolvedLocation.setState(() => router.stores.location.state)
       return routeChunkPromise
     }

