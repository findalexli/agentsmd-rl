distractors:
- rule: Run backend tests locally with `bash scripts/run_backend_tests.sh`.
  collision_type: scope_ambiguity
  why_distracting: The rule explicitly mentions running backend tests locally, which
    might lead the agent to run `bash scripts/run_backend_tests.sh`. However, this
    PR only touches frontend JS testing utilities, making backend tests irrelevant
    and a waste of time.
  severity: low
  source:
    path: AGENTS.md
    lines: '35'
- rule: 'gradio: Build Gradio web UIs and demos in Python.'
  collision_type: architecture_boundary
  why_distracting: The agent might try to use the `gradio` skill to build a Python
    Gradio app to test the file upload/download, but the task requires adding Vitest/Playwright
    utilities in the JS package `@gradio/tootils`.
  severity: medium
  source:
    path: .agents/skills/gradio
    lines: 1-2
hierarchy_analysis: The repository has a clear separation between Python backend (`gradio/`)
  and JS frontend (`js/`). The `AGENTS.md` file provides rules for both, which can
  cause scope ambiguity for agents working exclusively on one side. The agent must
  recognize that this task is strictly within the frontend (`js/tootils/`) and ignore
  backend-specific rules (like running backend tests or formatting Python code).
