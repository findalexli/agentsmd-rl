name = "lancedb-update-lance-dep"
description = "Update lance dependency from v3.0.0-beta.5 to v3.1.0-beta.2"
category = "dependency-update"
difficulty = "easy"
time_estimate_minutes = 15
tags = ["rust", "dependencies", "cargo", "lancedb"]

[environment]
image = "rust:1.91-slim"
setup_commands = [
    "apt-get update && apt-get install -y git curl pkg-config libssl-dev python3 python3-pip",
    "pip3 install pytest --break-system-packages"
]
