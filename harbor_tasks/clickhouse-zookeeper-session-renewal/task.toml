name = "clickhouse-zookeeper-session-renewal"
title = "Fix stale ZooKeeper session crash in ClickHouse UDF retry loop"
description = """
The refreshObjects function in UserDefinedSQLObjectsZooKeeperStorage has a bug where
it uses a stale ZooKeeper session handle during retries. When a retry is triggered
after a Keeper error, the code was still using the original (potentially expired)
zookeeper session handle instead of obtaining a fresh one.

The fix moves the object_names fetching inside the retry loop and adds logic to
renew the ZooKeeper session on each retry, ensuring watches are set on a live session.
"""

