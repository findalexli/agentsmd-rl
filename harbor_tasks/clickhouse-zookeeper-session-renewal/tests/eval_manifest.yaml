rubric:
- rule: When writing C++ code, always use Allman-style braces (opening brace on a
    new line).
  source:
    path: .claude/CLAUDE.md
    lines: '43'
    commit: a3c77899d3f826cfdc879ce9c276dd5f019cb46d
- rule: When mentioning logical errors in comments, say 'exception' instead of 'crash',
    because they don't crash the server in the release build.
  source:
    path: .claude/CLAUDE.md
    lines: 37-39
    commit: a3c77899d3f826cfdc879ce9c276dd5f019cb46d
- rule: Use comments to explain the 'why' and session management behavior, not just
    narrate the code.
  source:
    path: .claude/CLAUDE.md
    lines: '49'
    commit: a3c77899d3f826cfdc879ce9c276dd5f019cb46d
- rule: When mentioning logical errors, say 'exception' instead of 'crash'
  source:
    path: AGENTS.md
    lines: 11-12
  evidence: 'The gold solution''s added comments (''the provided handle may point
    to an expired session'') describe the failure mode without using the word ''crash'',
    adhering to the rule despite the prompt''s repeated '
  category: documentation
- rule: When writing text such as documentation, comments, or commit messages, write
    names of functions and methods as `f` instead of `f()`
  source:
