distractors:
- rule: wrap literal names from ClickHouse SQL language, classes and functions...
    inside inline code blocks
  collision_type: scope_ambiguity
  why_distracting: The rule mandates wrapping class and function names in backticks.
    However, the surrounding comments in this specific file do not use backticks for
    names like `ZooKeeperRetriesControl` or `tryLoadObject`. An agent strictly applying
    this rule would introduce stylistic inconsistency with the immediate context and
    diverge from the gold solution.
  severity: medium
  source:
    path: AGENTS.md
    lines: 6-7
hierarchy_analysis: The configuration is a flat, single-file structure (`AGENTS.md`).
  The agent must apply comment styling rules while balancing them against the existing
  style of the surrounding code.
