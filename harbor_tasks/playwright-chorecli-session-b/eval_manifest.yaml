    playwright-cli --session=mysession open example.com

    playwright-cli --session=mysession click e6

    playwright-cli --session=mysession close  # stop a named session

    playwright-cli --session=mysession delete-data  # delete user data for named session

    playwright-cli session-list

    playwright-cli session-close-all

    playwright-cli session-kill-all

    * **Session management** [references/session-management.md](references/session-management.md)'
distractors:
- rule: CLI commands require implementing a corresponding MCP tool.
  source:
    path: .claude/skills/playwright-mcp-dev/SKILL.md
    lines: 24-24
  source_text: '- CLI commands are based on MCP tools. Implement the corresponding
    MCP tool as per `Adding MCP Tools` section above, if needed.'
  collision_type: architecture_boundary
  why_distracting: The diff modifies CLI lifecycle commands for managing browser sessions.
    An agent might see this rule and assume it needs to build corresponding MCP tools
    for these commands. However, these specific daemon management commands are CLI-only
    operations, and creating MCP tools for them would violate architectural boundaries.
  severity: medium
- rule: Create new tools in browser/tools/, register them in tools.ts, and add ToolCapability
    in config.d.ts.
  source:
    path: .claude/skills/playwright-mcp-dev/SKILL.md
    lines: 9-11
  source_text: '- Create a new tool in `packages/playwright/src/mcp/browser/tools/your-tool.ts`

    - Register the tool in `packages/playwright/src/mcp/browser/tools.ts`

    - Add ToolCapability in `packages/playwright/src/mcp/config.d.ts`'
  collision_type: scope_ambiguity
  why_distracting: Because the block 'Adding MCP Tools' is referenced in 'Adding commands',
    an agent modifying CLI commands might wrongly think it should also interact with
    the MCP tool registry files. This change is entirely contained within the CLI
    terminal layer and does not involve MCP tool capabilities.
  severity: high
