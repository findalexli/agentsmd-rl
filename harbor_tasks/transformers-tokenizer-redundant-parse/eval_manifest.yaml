  category: architecture
distractors:
- rule: 'Avoid direct inheritance between model-specific files in src/transformers/models/
    and use # Copied from.'
  collision_type: scope_ambiguity
  why_distracting: The rule restricts direct inheritance and mandates the use of `#
    Copied from` for files in `src/transformers/models/`. The agent might incorrectly
    apply this to `src/transformers/tokenization_utils_tokenizers.py`, which is a
    core utility file outside the `models/` directory, potentially avoiding standard
    class structures or searching for `# Copied from` directives that don't exist
    here.
  severity: high
  source:
    path: CLAUDE.md
    lines: 58-62
- rule: 'Many tests are marked as ''slow'' and skipped by default in the CI. To run
    them, use: RUN_SLOW=1 pytest ...'
  collision_type: meta_confusion
  why_distracting: Because the bug is explicitly about a performance issue (0.4s per
    load), an agent might try to write a performance test and mark it as slow, or
    attempt to run all slow tests to verify the performance improvement. Running all
    slow tests locally would waste a massive amount of time and compute during the
    agent's run.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 6-6
hierarchy_analysis: Both CLAUDE.md and AGENTS.md contain identical rules. The rules
  primarily focus on repository-wide contribution policies, CI checks, and model-specific
  architectural patterns (like `# Copied from`). Since the target file is a core utility
  outside the `models/` directory, the model-specific rules do not apply, requiring
  the agent to correctly scope the guidelines.
