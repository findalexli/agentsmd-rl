distractors:
- rule: 'Fail-closed behavior for agents: If coordination evidence cannot be found,
    do not proceed to PR-ready output.'
  collision_type: meta_confusion
  why_distracting: The repository's agent policy strictly forbids proceeding to PR-ready
    output without coordination evidence or issue approval. An agent might refuse
    to generate the bug fix because the user prompt does not provide an issue link
    or proof of coordination.
  severity: high
  source:
    path: AGENTS.md
    lines: 48-52
- rule: 'Mandatory duplicate-work checks: Before proposing a PR, check for overlapping
    open PRs and issue ownership using gh CLI.'
  collision_type: meta_confusion
  why_distracting: The policy mandates running `gh issue view` and `gh pr list` before
    proposing a PR. An agent might waste time trying to execute these CLI commands
    in the sandbox environment instead of focusing on the code fix.
  severity: medium
  source:
    path: AGENTS.md
    lines: 25-31
- rule: Aim to minimize the size of the diff and avoid large comments for bugfixes.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
  source_text: '- PRs should be as brief as possible. Bugfix PRs in particular can
    often be only one or two lines long, and do not need large comments, docstrings
    or new functions in this case. Aim to minimize the size of the diff.'
  collision_type: rule_conflict
  why_distracting: The diff implements an optimization and adds a large 10-line explanatory
    comment detailing edge cases with Unigram and older tokenizers. An agent might
    mistakenly classify this task as a simple bugfix (e.g., fixing slow loading) and
    blindly follow this rule by omitting the crucial explanatory comment, reducing
    maintainability.
  severity: high
- rule: Use getattr() for dynamic model/config attributes.
  source:
    path: .ai/skills/add-or-fix-type-checking/SKILL.md
    lines: 162-167
  source_text: "j. **Use `getattr()` / `setattr()` for dynamic model/config attributes**.\n\
    \       For runtime-injected fields (for example config/model flags), use\n  \
    \     `getattr(obj, \"field\", default)` for reads and `setattr(obj, \"field\"\
    , value)`\n       for writes. Also use `getattr()` for third-party packages missing\
    \ type stubs\n       (for example `getattr(safetensors, \"__version__\", \"unknown\"\
    )`)."
  collision_type: would_cause_bug
  why_distracting: The diff needs to read the dynamic 'type' field from the 'model'
    config nested within 'tokenizer_json'. An agent might incorrectly apply this rule
    by assuming 'tokenizer_json' acts as a dynamic config object and try to use `getattr(tokenizer_json,
    'model')`. This would crash with an AttributeError because 'tokenizer_json' is
    a standard Python dictionary (parsed from json.load). The correct dictionary approach
    (using `.get()`) is used in the gold diff.
  severity: high
- rule: 'Do not edit generated files directly; edit modular_<name>.py or update #
    Copied from source.'
  source:
    path: AGENTS.md
    lines: 64-67
  source_text: 'We try to avoid direct inheritance between model-specific files in
    `src/transformers/models/`. We have two mechanisms to manage the resulting code
    duplication:


    1) The older method is to mark classes or functions with `# Copied from ...`.
    Copies are kept in sync by `make fix-repo`. Do not edit a `# Copied from` block,
    as it will be reverted by `make fix-repo`. Ideally you should edit the code it''s
    copying from and propagate the change, but you can break the `# Copied from` link
    if needed.

    2) The newer method is to add a file named `modular_<name>.py` in the model directory.
    `modular` files **can** inherit from other models. `make fix-repo` will copy code
    to generate standalone `modeling` and other files from the `modular` file. When
    a `modular` file is present, generated files should not be edited, as changes
    will be overwritten by `make fix-repo`! Instead, edit the `modular` file. See
    [docs/source/en/modular_transformers.md](docs/source/en/modular_transformers.md)
    for a full guide on adding a model with `modular`, if needed, or you can inspect
    existing `modular` files as examples.'
  collision_type: scope_ambiguity
  why_distracting: The diff specifically addresses multiple model architectures and
    mentions them by name (AlbertTokenizer, CamembertTokenizer, LlamaTokenizer, T5Tokenizer)
    in the comments. An agent reading these rules might incorrectly assume it needs
    to find and edit the specific `modular_<name>.py` files or `# Copied from` source
    functions in `src/transformers/models/` for each of those tokenizers, instead
    of applying the single optimization in the core `tokenization_utils_tokenizers.py`
    file.
  severity: medium
- rule: Keep PRs brief and minimize diff size, avoiding large comments for bugfixes
  source:
    path: .github/copilot-instructions.md
    lines: 15-15
  source_text: '- PRs should be as brief as possible. Bugfix PRs in particular can
    often be only one or two lines long, and do not need large comments, docstrings
    or new functions in this case. Aim to minimize the size of the diff.'
  collision_type: rule_conflict
  why_distracting: The agent might attempt to omit the extensive 8-line explanatory
    comment that is crucial for understanding the complex optimization logic involving
    Rust Unigram initialization in order to keep the PR brief.
  severity: medium
- rule: 'Avoid direct inheritance in src/transformers/models/ by using # Copied from
    or modular files'
  source:
    path: .ai/AGENTS.md
    lines: 64-67
  source_text: 'We try to avoid direct inheritance between model-specific files in
    `src/transformers/models/`. We have two mechanisms to manage the resulting code
    duplication:


    1) The older method is to mark classes or functions with `# Copied from ...`.
    Copies are kept in sync by `make fix-repo`. Do not edit a `# Copied from` block,
    as it will be reverted by `make fix-repo`. Ideally you should edit the code it''s
    copying from and propagate the change, but you can break the `# Copied from` link
    if needed.

    2) The newer method is to add a file named `modular_<name>.py` in the model directory.
    `modular` files **can** inherit from other models. `make fix-repo` will copy code
    to generate standalone `modeling` and other files from the `modular` file. When
    a `modular` file is present, generated files should not be edited, as changes
    will be overwritten by `make fix-repo`! Instead, edit the `modular` file. See
    [docs/source/en/modular_transformers.md](docs/source/en/modular_transformers.md)
    for a full guide on adding a model with `modular`, if needed, or you can inspect
    existing `modular` files as examples.'
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to verify or enforce the '# Copied from'
    or 'modular' conventions within 'tokenization_utils_tokenizers.py', not realizing
    those architectural rules explicitly only apply to the 'src/transformers/models/'
    directory.
  severity: low
- rule: Use getattr() / setattr() for dynamic model/config attributes
  source:
    path: .ai/skills/add-or-fix-type-checking/SKILL.md
    lines: 162-165
  source_text: "   j. **Use `getattr()` / `setattr()` for dynamic model/config attributes**.\n\
    \      For runtime-injected fields (for example config/model flags), use\n   \
    \   `getattr(obj, \"field\", default)` for reads and `setattr(obj, \"field\",\
    \ value)`\n      for writes. Also use `getattr()` for third-party packages missing\
    \ type stubs"
  collision_type: would_cause_bug
  why_distracting: The variable `tokenizer_json` is a standard Python dictionary returned
    by `json.load()`. If the agent mistakenly treats it as a config object and applies
    this rule (using `getattr(tokenizer_json, 'model')` instead of `.get('model')`),
    it will cause an AttributeError.
  severity: high
hierarchy_analysis: The repository contains identical `AGENTS.md` and `CLAUDE.md`
  files at the root level. These files define strict contribution policies for AI
  agents, including mandatory coordination and fail-closed behaviors. There are no
  code-level style rules that apply to the specific file being edited (`src/transformers/tokenization_utils_tokenizers.py`),
  meaning the primary challenge is navigating the meta-instructions.
