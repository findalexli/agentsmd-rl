checks:
  - id: compilation
    type: pass_to_pass
    origin: static
    description: "uv-torch crate compiles without errors"

  - id: rocm72_fromstr
    type: fail_to_pass
    origin: pr_diff
    description: "TorchBackend parses 'rocm7.2' via FromStr"

  - id: rocm72_version_accessors
    type: fail_to_pass
    origin: pr_diff
    description: "ROCm version returns 7.2 and CUDA version returns None for rocm7.2 backend"

  - id: new_gpu_architectures
    type: fail_to_pass
    origin: pr_diff
    description: "New AMD GPU architectures gfx1150 and gfx1151 parse and display correctly"

  - id: rocm72_index_urls
    type: fail_to_pass
    origin: pr_diff
    description: "Index URLs for rocm7.2 are properly wired up (from_index + Pyx static)"

  - id: schema_includes_rocm72
    type: fail_to_pass
    origin: pr_diff
    description: "uv.schema.json includes 'rocm7.2' as a valid torch mode const value"

  - id: rocm72_gpu_driver_mappings
    type: fail_to_pass
    origin: pr_diff
    description: "backend.rs contains >=12 Rocm72 references (driver mappings + match arms)"

  - id: existing_backends_still_work
    type: pass_to_pass
    origin: repo_tests
    description: "Existing ROCm 7.1, GPU architectures, and CPU backend still parse correctly"

  - id: no_panic_unwrap_in_new_code
    type: pass_to_pass
    origin: agent_config
    description: "No unwrap()/panic!()/unreachable!() in Rocm72 match arms"
    source:
      path: "CLAUDE.md"
      lines: "7"
      commit: "96f329b8d2ab82245b86beb0be835dcbd7be254a"

