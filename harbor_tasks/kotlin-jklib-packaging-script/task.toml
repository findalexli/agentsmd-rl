name = "kotlin-jklib-packaging-script"
difficulty = "easy"
tags = ["gradle", "build-script", "packaging"]

source_pr = "https://github.com/JetBrains/kotlin/pull/5774"
source_base_commit = "b3980e3b7d4d1cfb4e9ad01cc26d73aa2a1c6c24"
source_merge_commit = "350a192bb057e2020a9cdb1659fc3ab05434118d"
[time]
estimated_minutes = 30
max_seconds = 1200

[environment]
dockerfile = "environment/Dockerfile"
workspace = "/workspace/kotlin"

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
