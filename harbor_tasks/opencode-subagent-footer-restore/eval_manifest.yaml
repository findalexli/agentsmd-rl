distractors:
- rule: Use single word names by default for new locals, params, and helper functions.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to name the new component `Footer` and the
    file `footer.tsx` to comply with the strict single-word naming rule. However,
    `SubagentFooter` is necessary to avoid ambiguity with generic footers and clearly
    describe the component's specific role.
  severity: medium
  source:
    path: AGENTS.md
    lines: 25-36
- rule: Use `Effect.gen(function* () { ... })` for composition.
  collision_type: architecture_boundary
  why_distracting: The agent might attempt to use Effect (`Effect.gen`, `Effect.fn`)
    for the new component's state or logic. However, this is a SolidJS TUI component
    that should rely on SolidJS reactive primitives (`createSignal`, `createMemo`)
    rather than the backend Effect runtime.
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: 15-16
hierarchy_analysis: 'The root `AGENTS.md` provides general TypeScript and style guidelines
  (like avoiding `else` blocks) which apply universally and are correctly followed
  in the UI components. The package-level `packages/opencode/AGENTS.md` introduces
  highly specific rules for the Effect runtime and Drizzle database. Agents must recognize
  the architectural boundary here: the TUI components are built with SolidJS, so the
  Effect and Drizzle rules from the package-level config should be ignored for this
  specific frontend task.'
