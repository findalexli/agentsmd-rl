  category: architecture
distractors:
- rule: Before editing or creating files in any subdirectory, read all README.md files
    in the directory path from the repo root up to and including the target file's
    directory.
  collision_type: scope_ambiguity
  why_distracting: The bug is a specific logic error in URL decoding within the router.
    Forcing the agent to read all READMEs up the directory tree wastes time and context
    window, as the fix requires understanding the local code logic in `app.ts`, not
    high-level directory documentation.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 41-48
- rule: Prefer `pnpm --filter=next build` when edits are limited to core Next.js files.
  collision_type: rule_conflict
  why_distracting: The agent might run `pnpm --filter=next build` (~60s) to test its
    changes because the edits are limited to core Next.js files, conflicting with
    the instruction to use fast local development (`testheadless` or `dev`) for the
    inner loop.
  severity: high
  source:
    path: CLAUDE.md
    lines: 93-94
hierarchy_analysis: '`CLAUDE.md` and `AGENTS.md` are identical symlinks. The rules
  within the file have some internal tension, specifically between ''prefer `pnpm
  --filter=next build` when edits are limited to core Next.js files'' and ''default
  to watch mode + skip-isolate for the inner loop (not full builds)''. The agent must
  correctly identify that it is in the ''inner loop'' of iterative development and
  choose the faster test commands over the full build commands.'
