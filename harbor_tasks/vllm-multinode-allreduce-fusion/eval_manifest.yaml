distractors:
- rule: Pure code-agent PRs are not allowed. A human submitter must understand and
    defend the change end-to-end.
  collision_type: meta_confusion
  why_distracting: The agent might refuse to solve the issue because it is an AI and
    the instructions explicitly forbid pure code-agent PRs.
  severity: high
  source:
    path: AGENTS.md
    lines: 25-26
- rule: 'Before proposing a PR, run these checks: gh issue view <issue_number> ...
    gh pr list ...'
  collision_type: would_cause_bug
  why_distracting: The agent might attempt to run `gh` commands to check for duplicate
    PRs, which will likely fail in an unauthenticated sandbox and distract from fixing
    the code.
  severity: medium
  source:
    path: AGENTS.md
    lines: 8-12
- rule: Never use system python3 or bare pip/pip install. All Python commands must
    go through uv and .venv/bin/python.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to install `uv` and create a virtual environment
    to run tests or linters, which is unnecessary for generating the patch and might
    fail in the test environment.
  severity: low
  source:
    path: AGENTS.md
    lines: 40-41
hierarchy_analysis: The config hierarchy consists of a single AGENTS.md file (referenced
