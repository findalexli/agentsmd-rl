# Rubric for soft/subjective rules from agent configs
rubric:
  - source:
      file: .claude/CLAUDE.md
      rule: "When writing C++ code, always use Allman-style braces (opening brace on a new line)"
    description: "Code follows Allman brace style convention"
    type: style

  - source:
      file: .github/copilot-instructions.md
      rule: "Memory & lifetime: Raw pointers where ownership is unclear or inconsistent with surrounding code"
    description: "No unsafe raw pointer usage introduced"
    type: safety

  - source:
      file: .github/copilot-instructions.md
      rule: "Error handling & observability: Ignored return values of functions that can fail"
    description: "Error handling is appropriate for the change"
    type: correctness
