rubric:
  - source:
      - file: packages/agents-openai/src/openaiResponsesModel.ts
        rule: >
          Bug fix: when rebuilding computer_call/computer_call_result items,
          omit pending_safety_checks and acknowledged_safety_checks keys
          when they are empty arrays (not just falsy).
    checks:
      - test_pending_safety_checks_omitted_when_empty
      - test_acknowledged_safety_checks_omitted_when_empty

  - source:
      - file: packages/agents-openai/test/openaiResponsesModel.helpers.test.ts
