name = "clickhouse-udf-keeper-retry"
title = "Fix UDF registry loss during Keeper session expiry"
description = "User-defined functions can be lost when ZooKeeper/Keeper experiences transient connection issues. The tryLoadObject function treats all Keeper exceptions the same way - catching and logging them, returning nullptr. This means hardware errors (connection loss, session expiry) are treated the same as 'node not found' errors, causing the UDF to be silently dropped from the registry instead of triggering a retry."

