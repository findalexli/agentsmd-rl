source:
  pr: "ClickHouse/ClickHouse#102035"
  title: "Backport #101891 to 26.1: Fix UDF registry loss during Keeper session expiry"
  merge_commit: "23059ebe14d3e8ff8ddabbafd89edcf4071de0fe"
  base_commit: "dae8318c5ed52baecd784a85a67c45d985b20d6a"
  file: "src/Functions/UserDefined/UserDefinedSQLObjectsZooKeeperStorage.cpp"

checks:
  # Fail-to-pass tests - these verify the actual fix
  - id: test_hardware_error_handling
    type: fail_to_pass
    origin: solution
    description: "tryLoadObject re-throws Keeper hardware errors instead of treating them as missing objects"

  - id: test_retry_constants
    type: fail_to_pass
    origin: solution
    description: "Retry constants defined (max_retries=5, initial_backoff_ms=200, max_backoff_ms=5000)"

  - id: test_zookeeper_retries_control
    type: fail_to_pass
    origin: solution
    description: "refreshObjects uses ZooKeeperRetriesControl with retryLoop for transient failures"

  - id: test_includes_added
    type: fail_to_pass
    origin: solution
    description: "Required headers ZooKeeperCommon.h and ZooKeeperRetries.h are included"

  - id: test_hardware_error_log_message
    type: fail_to_pass
    origin: solution
    description: "Specific warning log message for Keeper hardware errors"

  - id: test_catch_ordering
    type: fail_to_pass
    origin: solution
    description: "KeeperException catch block appears before generic catch(...)"

  # Pass-to-pass tests - these verify code structure
  - id: test_code_compiles_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "Basic C++ syntax and structure validation"

  - id: test_repo_style_checks
    type: pass_to_pass
    origin: repo_tests
    description: "Repository style checks (check_submodules.sh)"

  - id: test_repo_cpp_style
    type: pass_to_pass
    origin: repo_tests
    description: "C++ style checks (check_cpp.sh) - validates no new style issues in target file"

# Agent config rules to follow (from .claude/CLAUDE.md and .github/copilot-instructions.md)
agent_config:
  - rule: "Add new tests instead of extending existing ones"
    source: ".claude/CLAUDE.md"
    severity: major

  - rule: "Do not delete or relax existing tests"
    source: ".github/copilot-instructions.md"
    severity: blocker

  - rule: "Handle memory/resource management properly in C++"
    source: ".github/copilot-instructions.md"
    severity: blocker

  - rule: "Ensure error handling paths are safe (exception safety)"
    source: ".github/copilot-instructions.md"
    severity: blocker

# Rubric for LLM evaluation (soft/subjective rules)
rubric: []
