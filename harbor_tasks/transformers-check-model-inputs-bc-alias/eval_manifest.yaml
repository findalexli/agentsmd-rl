rubric:
- rule: PRs should be as brief as possible. Bugfix PRs in particular can often be
    only one or two lines long, and do not need large comments, docstrings or new
    functions in this case. Aim to minimize the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: 2620c4ddd41afcc8d3b1d1134803bd418ffa45a7
- rule: '`make style`: runs formatters and linters (ruff), necessary to pass code
    style checks'
  source:
    path: CLAUDE.md
    lines: 2-2
  evidence: The patch carefully includes exactly two blank lines before and after
    the new `check_model_inputs` top-level function, ensuring the code complies with
    ruff/PEP8 formatting rules and will pass the requ
  category: style
distractors:
- rule: No low-value busywork PRs - Do not open one-off PRs for tiny edits (single
    typo, isolated lint cleanup, one mutable default argument, etc.).
  collision_type: scope_ambiguity
  why_distracting: The agent might refuse to implement the fix because it only requires
    adding a few lines of code, misinterpreting a critical backward-compatibility
    fix for downstream libraries (like vllm) as a 'tiny edit' or 'low-value busywork'.
  severity: high
  source:
    path: CLAUDE.md
    lines: 34-36
- rule: Fail-closed behavior for agents - If coordination evidence cannot be found,
    do not proceed to PR-ready output.
  collision_type: meta_confusion
  why_distracting: The agent might refuse to output the patch because the prompt does
    not provide explicit links to issue discussion or coordination evidence, causing
    it to fail-closed unnecessarily in an evaluation context.
  severity: high
  source:
    path: CLAUDE.md
    lines: 47-50
- rule: Copies and Modular Models - mark classes or functions with `# Copied from
    ...` to manage code duplication.
  collision_type: architecture_boundary
  why_distracting: The agent might try to add a `# Copied from merge_with_config_defaults`
    comment to the alias function to manage code duplication, but this rule explicitly
    only applies to model-specific files in `src/transformers/models/`, not utility
    files like `src/transformers/utils/generic.py`.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 52-56
hierarchy_analysis: The configuration hierarchy consists of `CLAUDE.md` and `AGENTS.md`,
  which contain identical rules. The guidance focuses heavily on strict agent contribution
  policies (coordination, avoiding busywork, fail-closed behavior) and repository-specific
  tooling (`make style`, `# Copied from`). There are no conflicts between the files
  since they are duplicates.
