distractors:
- rule: 'Fail-closed behavior for agents: do not proceed to PR-ready output if coordination
    evidence cannot be found.'
  collision_type: meta_confusion
  why_distracting: The rule explicitly commands the agent to 'fail-closed' and 'not
    proceed to PR-ready output' if coordination evidence is missing. An agent might
    strictly follow this and refuse to generate the bug fix because the prompt lacks
    issue links or approval evidence.
  severity: high
  source:
    path: AGENTS.md
    lines: 56-59
- rule: 'No low-value busywork PRs: Do not open one-off PRs for tiny edits.'
  collision_type: scope_ambiguity
  why_distracting: The rule forbids 'one-off PRs for tiny edits'. An agent might misclassify
    adding a single 4-line backward-compatibility alias as a 'tiny edit' or 'mechanical
    cleanup' and refuse to complete the task.
  severity: medium
  source:
    path: AGENTS.md
    lines: 41-43
hierarchy_analysis: The repository contains identical `AGENTS.md` and `CLAUDE.md`
  files at the root level. The guidance is flat, but contains strong meta-instructions
  aimed directly at the agent's behavior rather than just code style.
