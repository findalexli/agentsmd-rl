rubric:
- rule: Prefer functional array methods (flatMap, filter, map) over for loops; use
    type guards on filter to maintain type inference downstream
  source:
    path: AGENTS.md
    lines: 15-16
  evidence: 'The `usage` memo uses `findLast` with a type guard `(item): item is AssistantMessage
    => item.role === "assistant" && item.tokens.output > 0` to safely extract the
    last assistant message while maintain'
  category: style
- rule: Avoid `else` statements. Prefer early returns.
  source:
    path: AGENTS.md
    lines: 63-64
  evidence: The `usage` memo uses multiple early returns (`if (!props.sessionID) return`,
    `if (!last) return`, `if (tokens <= 0) return`) instead of wrapping the logic
    in `if/else` blocks.
  category: style
- rule: Prefer `const` over `let`. Use ternaries or early returns instead of reassignment.
  source:
    path: AGENTS.md
    lines: 51-52
  evidence: 'The `pct` variable is declared as `const` and uses a ternary operator
    (`model?.limit.context ? ... : undefined`) instead of being declared with `let`
    and reassigned.'
  category: style
- rule: Prefer single word names for variables and functions. Only use multiple words
    if necessary.
  source:
    path: AGENTS.md
    lines: 19-20
  evidence: The new variables introduced in the `usage` memo use short, single-word
    names like `msg`, `last`, `tokens`, `model`, `pct`, and `cost`.
  category: naming
distractors:
- rule: Use `Effect.gen(function* () { ... })` for composition.
  collision_type: architecture_boundary
  why_distracting: The files being edited are SolidJS TUI components. Trying to use
    Effect for composition or state management here would break the UI reactivity
    model and violate the architectural boundary between the frontend UI and backend
    Effect services.
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: 15-16
- rule: Use `Effect.cached` when multiple concurrent callers should share a single
    in-flight computation
  collision_type: architecture_boundary
  why_distracting: The PR requires memoizing the token usage calculation. An agent
    might see the deduplication/caching rule and try to use `Effect.cached`, but since
    this is a SolidJS component, it must use Solid's `createMemo` instead.
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: 48-49
hierarchy_analysis: The root `AGENTS.md` provides general TypeScript and style guidelines
  (early returns, single-word variables, functional array methods) which are perfectly
  applicable to the SolidJS TUI components being edited. However, `packages/opencode/AGENTS.md`
  introduces Effect-specific rules that apply to the backend services. Agents must
  recognize the architectural boundary and realize that Effect rules do not apply
  to the SolidJS frontend components in `packages/opencode/src/cli/cmd/tui/`.
