      path: "AGENTS.md"
      lines: "13"
      commit: "15a8c22a263b072a23e2fc0b2e840b2e12c220aa"

  - id: const_preferred_over_let
    type: pass_to_pass
    origin: agent_config
    description: "New/modified code should prefer const over let"
