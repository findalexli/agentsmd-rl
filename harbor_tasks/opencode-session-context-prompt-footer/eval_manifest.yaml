    origin: pr_diff
    description: "header.tsx must be deleted — core refactor removes this file"

  - id: session_no_header_import
    type: fail_to_pass
    origin: pr_diff
    description: "session/index.tsx must not import or render the Header component"

  - id: session_no_header_toggle
    type: fail_to_pass
    origin: pr_diff
    description: "session/index.tsx must not have header toggle state (showHeader/header_visible)"

  - id: session_no_toggle_header_command
    type: fail_to_pass
    origin: pr_diff
    description: "session/index.tsx must not have the toggle header command palette entry"

  - id: variant_cycle_not_hidden
    type: fail_to_pass
    origin: pr_diff
    description: "variant.cycle command must not be hidden in app.tsx"

  - id: prompt_has_usage_computation
    type: fail_to_pass
    origin: pr_diff
    description: "prompt/index.tsx must compute token usage (tokens, context %, aggregation)"

  - id: prompt_formats_cost_as_currency
    type: fail_to_pass
    origin: pr_diff
    description: "prompt/index.tsx must format cost as currency (USD)"

  - id: prompt_displays_usage_in_footer
    type: fail_to_pass
    origin: pr_diff
    description: "prompt/index.tsx must render usage data conditionally in the footer area"

  - id: prompt_exports_prompt_function
    type: pass_to_pass
    origin: static
    description: "prompt/index.tsx must export the Prompt function"

  - id: session_exports_session_function
    type: pass_to_pass
    origin: static
    description: "session/index.tsx must export the Session function"

  - id: prompt_not_stubbed
    type: pass_to_pass
    origin: static
    description: "prompt/index.tsx must have substantial content (>500 lines)"

  - id: session_not_stubbed
    type: pass_to_pass
    origin: static
    description: "session/index.tsx must have substantial content (>300 lines)"

  - id: no_try_catch_in_new_code
    type: pass_to_pass
    origin: agent_config
    description: "Avoid try/catch where possible in prompt component"
