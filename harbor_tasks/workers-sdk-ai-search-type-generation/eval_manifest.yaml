hierarchy_analysis: The hierarchy correctly separates monorepo-wide concerns (`AGENTS.md`)
  from Wrangler-specific concerns (`packages/wrangler/AGENTS.md`). The Wrangler-specific
  rules provide concrete testing conventions (like `.test.ts` extensions) that apply
  directly to the modified test file. The monorepo rules provide architectural boundaries
  (like `workers-utils` for config validation and `fixtures/` for test fixtures) that
  the agent must navigate carefully to avoid expanding the scope of the PR unnecessarily.
