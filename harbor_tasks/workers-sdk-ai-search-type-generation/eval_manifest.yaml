version: "2.0"

source:
  repo: "{{OWNER}}/{{REPO}}"
  pr: 0  # {{PR_NUMBER}}
  base_commit: "{{BASE_COMMIT}}"
  merge_commit: "{{MERGE_COMMIT}}"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified files must parse without errors"

  - id: core_bug_fixed
    type: fail_to_pass
    origin: pr_diff
    description: "TODO: describe the core behavioral change"

  - id: edge_case
    type: fail_to_pass
    origin: pr_diff
    description: "TODO: describe a second input or edge case"

  - id: existing_tests_pass
    type: pass_to_pass
    origin: repo_tests
    description: "Upstream test suite still passes"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "Modified function has real logic, not just pass/return"

  # Uncomment and fill if agent config rules exist:
  # - id: config_rule
  #   type: fail_to_pass
  #   origin: agent_config
  #   description: "TODO: rule from agent config"
  #   source:
  #     path: "AGENTS.md"
  #     lines: "30"
  #     commit: "{{BASE_COMMIT}}"

rubric:
  # Soft rules for LLM judge. Only rules genuinely needing subjective evaluation.
  # Remove this section if no applicable soft rules exist.
  []
  # - rule: "TODO: verbatim text from config file"
  #   source:
  #     path: "AGENTS.md"
  #     lines: "45"
  #     commit: "{{BASE_COMMIT}}"
