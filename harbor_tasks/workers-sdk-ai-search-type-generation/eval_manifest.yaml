    lines: 58-59
- rule: Never import `expect` from vitest — use test context `({ expect }) => {}`
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to refactor the existing tests in `type-generation.test.ts`
    to use the test context `({ expect }) => {}` instead of a global import. Since
    the PR only requires updating the expected string output in existing tests, this
    would cause unnecessary churn and distract from the core task.
  severity: low
  source:
    path: packages/wrangler/AGENTS.md
    lines: 38-39
hierarchy_analysis: The root `AGENTS.md` provides monorepo-wide architectural pointers,
