name = "containerd-error-sanitization"
title = "Fix: Sanitize error before gRPC return to prevent credential leak"
description = """
The containerd CRI service currently leaks sensitive credentials (like SAS tokens,
signatures, and API keys) in error messages when image pull operations fail.
These credentials appear in both gRPC error responses and logs.

Create a utility function that sanitizes errors containing URLs by redacting
all query parameters from the URL before the error is returned.
"""

[repository]
owner = "containerd"
repo = "containerd"
base_commit = "11eca1958537a47c43cd6b922f7242cb98196db7"
merge_commit = "a1ba5feb7f28928b5d5d17f2bddfe2c353adee66"
pr_number = 13181

[diff]
target_files = [
    "internal/cri/util/sanitize.go",
    "internal/cri/util/sanitize_test.go",
    "internal/cri/instrument/instrumented_service.go",
]

[metadata]
difficulty = "easy"
tags = ["security", "error-handling", "go", "url-sanitization"]

[timeouts]
agent = 1800
verifier = 120
