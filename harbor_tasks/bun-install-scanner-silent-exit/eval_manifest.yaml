rubric:
- rule: If a test is for a specific numbered GitHub Issue, it should be placed in
    `test/regression/issue/${issueNumber}.test.ts`.
  source:
    path: CLAUDE.md
    lines: 30-32
  evidence: The gold solution places the regression test in `test/regression/issue/28193.test.ts`
    corresponding to the issue number.
  category: testing
  verification: llm_judge
- rule: When spawning Bun processes, use `bunExe` and `bunEnv` from `harness`.
  source:
    path: test/CLAUDE.md
    lines: 24-25
  evidence: The test file (implied by the edited files list and project conventions)
    uses `bunExe` and `bunEnv` from `harness` to spawn the Bun process for testing
    the install command.
  category: testing
  verification: llm_judge
distractors:
- rule: When a test file spawns a Bun process, we like for that file to end in `*-fixture.ts`.
  collision_type: rule_conflict
  why_distracting: The agent might name the test file `28193-fixture.ts` because it
    tests a CLI command by spawning a process, but the regression issue naming convention
    strictly requires `${issueNumber}.test.ts`.
  severity: high
  source:
    path: test/AGENTS.md
    lines: 79-80
- rule: Always use `bun.*` APIs instead of `std.*`. Using std.fs, std.posix, or std.os
    directly is wrong.
  collision_type: architecture_boundary
  why_distracting: The agent might try to use `bun.sys.write` to write to stderr (fd
    2) to avoid `std.*` functions, missing the higher-level `Output.errGeneric` abstraction
    already used in the file for CLI error reporting.
  severity: medium
  source:
    path: src/AGENTS.md
    lines: 16-18
hierarchy_analysis: The config hierarchy is moderate, with root-level rules defining
  general test placement and directory-specific rules defining test naming conventions
  and Zig system call patterns. There is a direct conflict between the root `AGENTS.md`
  rule for issue test naming (`${issueNumber}.test.ts`) and the `test/AGENTS.md` rule
  for process-spawning test naming (`*-fixture.ts`). The root rule takes precedence
  for regression tests.
