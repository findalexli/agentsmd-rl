  - id: catch_all_produces_output
    type: fail_to_pass
    origin: pr_diff
    description: "Empty else => {} catch-all in scanner error switch replaced with Output.* error messages"

  - id: error_variant_coverage
    type: fail_to_pass
    origin: pr_diff
    description: "All error variants (3+ named or dynamic catch-all) produce diagnostic output"

  - id: error_printing_centralized
    type: fail_to_pass
    origin: pr_diff
    description: "Error printing removed from security_scanner.zig, centralized in install_with_manager.zig"

  - id: error_variant_propagated
    type: fail_to_pass
    origin: pr_diff
    description: ".error variant from retry result propagated instead of collapsed into SecurityScannerRetryFailed"

  - id: uses_err_generic
    type: fail_to_pass
    origin: pr_diff
    description: "Error messages use Output.errGeneric, not Output.pretty with raw <red> formatting"

  # --- fail_to_pass (agent_config) ---
  - id: regression_test_location
    type: fail_to_pass
    origin: agent_config
    description: "Regression test placed at test/regression/issue/28193.test.ts per CLAUDE.md rule"
    source:
      path: "CLAUDE.md"
      lines: "28"
      commit: "1d50d640f8fec6ce2d144f0cfd204e30da373c64"

  - id: regression_test_uses_harness
    type: fail_to_pass
    origin: agent_config
    description: "Regression test imports bunExe/bunEnv from \x27harness\x27 per test/CLAUDE.md rule"
    source:
      path: "test/CLAUDE.md"
      lines: "28"
      commit: "1d50d640f8fec6ce2d144f0cfd204e30da373c64"

  - id: regression_test_uses_tempdir
    type: fail_to_pass
    origin: agent_config
    description: "Regression test uses tempDir from \x27harness\x27, not tmpdirSync/mkdtempSync"
    source:
      path: "CLAUDE.md"
      lines: "100"
      commit: "1d50d640f8fec6ce2d144f0cfd204e30da373c64"

  - id: exit_code_assertion_last
    type: pass_to_pass
    origin: agent_config
    description: "Regression test asserts stdout/stderr content before asserting exit code"
    source:
      path: "CLAUDE.md"
      lines: "101"
      commit: "1d50d640f8fec6ce2d144f0cfd204e30da373c64"

  # --- pass_to_pass ---
