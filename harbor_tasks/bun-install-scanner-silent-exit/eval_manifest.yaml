rubric:
- rule: Update README.md with the latest changes.
  source:
    path: README.md
- rule: If a test is for a specific numbered GitHub Issue, it should be placed in
    test/regression/issue/${issueNumber}.test.ts
  source:
    path: CLAUDE.md
    lines: 32-32
  evidence: The gold solution places the test for this bug in `test/regression/issue/28193.test.ts`,
    following the strict issue-number naming convention.
  category: testing
- rule: Use bun:test with files that end in *.test.{ts,js,jsx,tsx,mjs,cjs}
  source:
    path: test/CLAUDE.md
    lines: 14-14
  evidence: The test file uses the `.test.ts` extension as required for files using
    the `bun:test` runner.
  category: naming
distractors:
- rule: When a test file spawns a Bun process, we like for that file to end in *-fixture.ts
  collision_type: rule_conflict
  why_distracting: The agent might try to name the regression test file `28193-fixture.ts`
    because it spawns a Bun process to test `bun install`. This conflicts with the
    strict `issue/${issueNumber}.test.ts` naming convention required for regression
    tests.
  severity: medium
  source:
    path: test/CLAUDE.md
    lines: 69-69
- rule: Always use bun.* APIs instead of std.* and use bun.sys for system calls
  collision_type: architecture_boundary
  why_distracting: The agent might try to write to stderr using `bun.sys.write(bun.FD.stderr(),
    ...)` or similar low-level system calls to avoid `std.debug.print`, missing the
    existing `Output.errGeneric` abstraction that is standard for the package manager
    architecture.
  severity: high
  source:
    path: src/CLAUDE.md
    lines: 16-31
hierarchy_analysis: The root `CLAUDE.md` defines a strict naming convention for regression
  tests (`test/regression/issue/${issueNumber}.test.ts`). The child `test/CLAUDE.md`
  suggests naming files that spawn processes with `*-fixture.ts`. In this case, the
  root rule for regression tests takes precedence over the child rule for fixture
  naming, as the issue number format is a strict requirement for the regression test
  runner.
