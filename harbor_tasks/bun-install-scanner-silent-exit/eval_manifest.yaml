  - id: test_repo_source_files_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Modified source files exist and have valid content structure"

rubric:
  - rule: "Always use `bun.*` APIs instead of `std.*`. The `bun` namespace provides cross-platform wrappers that preserve OS error info and never use `unreachable`."
    source:
      path: "src/CLAUDE.md"
      lines: "15"
      commit: "1d50d640f8fec6ce2d144f0cfd204e30da373c64"
  - rule: "Do not write flaky tests. Do not use `setTimeout` in tests."
    source:
      path: "CLAUDE.md"
      lines: "102"
      commit: "1d50d640f8fec6ce2d144f0cfd204e30da373c64"
  - rule: "Use `await using` or `using` for proper resource cleanup (Bun.spawn, Bun.serve, etc.)."
    source:
      path: "test/CLAUDE.md"
      lines: "100"
      commit: "1d50d640f8fec6ce2d144f0cfd204e30da373c64"
  - rule: "Prefer concurrent tests (`test.concurrent` / `describe.concurrent`) over sequential when tests are independent."
    source:
      path: "test/CLAUDE.md"
      lines: "22"
      commit: "1d50d640f8fec6ce2d144f0cfd204e30da373c64"
