name = "airflow-dag-start-date-tz-fix"
difficulty = "easy"
type = "python"
description = "Fix start_date in example DAGs to avoid timezone conversion overflow"
version = "1.0.0"
timeout = 600

tags = ["airflow", "datetime", "timezone", "bugfix", "example-dags"]

[estimates]
build_time = 120
test_time = 30
setup_time = 30

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
