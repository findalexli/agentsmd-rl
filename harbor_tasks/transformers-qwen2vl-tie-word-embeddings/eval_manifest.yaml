version: "2.0"

source:
  repo: "huggingface/transformers"
  pr: 44976
  base_commit: "28e1cc59ecf479ea674f2cc4b443a2969aae3a69"
  merge_commit: "28af8184fb00a0e9bc778c3defdec39bbe7e8839"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "All modified config/modeling files must parse without errors"

  - id: qwen2vl_text_no_own_tie_field
    type: fail_to_pass
    origin: pr_diff
    description: "Qwen2VLTextConfig must not define tie_word_embeddings as its own dataclass field"

  - id: qwen2_5_vl_text_no_own_tie_field
    type: fail_to_pass
    origin: pr_diff
    description: "Qwen2_5_VLTextConfig must not define tie_word_embeddings as its own dataclass field"

  - id: modernvbert_init_type_hint
    type: fail_to_pass
    origin: pr_diff
    description: "ModernVBertForMaskedLM.__init__ config param has type annotation"

  - id: modular_init_type_hint
    type: fail_to_pass
    origin: pr_diff
    description: "modular_modernvbert.py ModernVBertForMaskedLM.__init__ config param has type annotation"

  - id: downstream_no_tie_propagation_hack
    type: fail_to_pass
    origin: pr_diff
    description: "ColQwen2Config and ColModernVBertConfig must not contain tie_word_embeddings propagation hack"

  - id: text_configs_instantiate
    type: pass_to_pass
    origin: pr_diff
    description: "Text sub-configs instantiate with expected vocab_size and model_type"

  - id: config_roundtrip
    type: pass_to_pass
    origin: pr_diff
    description: "Config instantiation and to_dict serialization works for text and composite configs"

  - id: downstream_configs_structure
    type: pass_to_pass
    origin: static
    description: "ColQwen2Config and ColModernVBertConfig retain class structure after hack removal"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "Modified config files are not trivially emptied or stubbed"

rubric:
  - rule: "PRs should be as brief as possible. Bugfix PRs in particular can often be only one or two lines long, and do not need large comments, docstrings or new functions in this case. Aim to minimize the size of the diff."
    source:
      path: ".github/copilot-instructions.md"
      lines: "15"
      commit: "28e1cc59ecf479ea674f2cc4b443a2969aae3a69"

  - rule: "When a modular file is present, generated files should not be edited, as changes will be overwritten by make fix-repo. Instead, edit the modular file."
    source:
      path: "CLAUDE.md"
      lines: "67"
      commit: "28e1cc59ecf479ea674f2cc4b443a2969aae3a69"

  - rule: "Do not edit a Copied from block, as it will be reverted by make fix-repo. Ideally you should edit the code it's copying from and propagate the change, but you can break the Copied from link if needed."
    source:
      path: "CLAUDE.md"
      lines: "66"
      commit: "28e1cc59ecf479ea674f2cc4b443a2969aae3a69"

  - rule: "Code style is enforced in the CI via ruff. Run make fixup to apply style and consistency fixes."
    source:
      path: ".github/copilot-instructions.md"
      lines: "17"
      commit: "28e1cc59ecf479ea674f2cc4b443a2969aae3a69"
