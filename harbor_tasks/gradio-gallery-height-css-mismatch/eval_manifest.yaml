distractors:
- rule: Run backend tests locally with Running the backend unit tests....
  collision_type: scope_ambiguity
  why_distracting: The bug is purely in the frontend Svelte/TypeScript code (). Running
    backend tests for a CSS and Svelte prop forwarding issue is a waste of time and
    resources.
  severity: medium
  source:
    path: AGENTS.md
    lines: 26-27
- rule: Target an issue. Every non-trivial PR should reference an existing GitHub
    issue. If one doesn't exist, create it first.
  collision_type: meta_confusion
  why_distracting: The agent is tasked with fixing the code, not managing GitHub issues.
    Trying to create an issue via CLI or API would fail or waste time.
  severity: low
  source:
    path: AGENTS.md
    lines: 16-17
- rule: BaseGallery component height is restricted to number or 'auto'
  source:
    path: js/gallery/README.md
    lines: 18-18
  source_text: ' export let height: number | "auto" = "auto";'
  collision_type: rule_conflict
  why_distracting: The documentation strictly types `height` as `number | "auto"`.
    An agent might think it should enforce this type restriction, but the PR's exact
    purpose is to expand this to accept `string` (CSS units) to fix a height mismatch
    bug. Following this documented rule would prevent the fix.
  severity: high
- rule: Use gr.HTML for custom components
  source:
    path: .agents/skills/gradio/SKILL.md
    lines: 112-112
  source_text: If a task requires significant customization of an existing component
    or a component that doesn't exist in Gradio, you can create one with `gr.HTML`.
    It supports `html_template` (with `${}` JS expressions and `{{}}` Handlebars syntax),
    `css_template` for scoped styles, and `js_on_load` for interactivity — where `props.value`
    updates the component value and `trigger('event_name')` fires Gradio events. For
    reuse, subclass `gr.HTML` and define `api_info()` for API/MCP support. See the
    [full guide](https://www.gradio.app/guides/custom-HTML-components).
  collision_type: architecture_boundary
  why_distracting: An agent tasked with fixing a CSS/height issue on the Gallery might
    mistakenly think it should implement a custom Python-side `gr.HTML` wrapper, rather
    than fixing the core Svelte component in the frontend directory.
  severity: medium
hierarchy_analysis: Only one config file () is present at the root level. It provides
