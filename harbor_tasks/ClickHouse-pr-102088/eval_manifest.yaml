evaluation_manifest:
  version: "1.0"
  source_pr:
    owner: ClickHouse
    repo: ClickHouse
    number: 102088
    base_commit: 73ad233a01a81190b2a45b820878e54c36a9a22c

  # =============================================================================
  # FAIL-TO-PASS TESTS: These tests should FAIL before the fix and PASS after
  # =============================================================================
  fail_to_pass_checks:
    - id: test_padding_chars_uses_padded_pod_array
      type: fail_to_pass
      origin: implementation
      description: PaddingChars class uses PaddedPODArray instead of String for pad_string member
      rationale: The bug was caused by using std::String which doesn't provide the 15 extra bytes of read padding required by memcpySmallAllowReadWriteOverflow15

    - id: test_pad_string_initialized_with_insert
      type: fail_to_pass
      origin: implementation
      description: pad_string is initialized using insert() method and insertFromItself() for duplication
      rationale: PaddedPODArray requires insert() and insertFromItself() instead of operator+= for string manipulation

    - id: test_empty_pad_string_handling_moved
      type: fail_to_pass
      origin: implementation
      description: Empty pad_string check is moved from init() to executeImpl
      rationale: The empty string handling logic needs to be in executeImpl where the pad string is actually extracted

    - id: test_utf8_offsets_use_size_not_length
      type: fail_to_pass
      origin: implementation
      description: utf8_offsets uses size() method instead of length() for PaddedPODArray compatibility
      rationale: PaddedPODArray uses size() not length() like std::String

  # =============================================================================
  # PASS-TO-PASS TESTS: These tests should PASS on both base commit and after fix
  # =============================================================================
  pass_to_pass_checks:
    # --- Existing code quality checks ---
    - id: test_get_return_type_uses_validate_function_arguments
      type: pass_to_pass
      origin: implementation
      description: getReturnTypeImpl uses validateFunctionArguments helper instead of manual checking
      rationale: Code quality improvement using standard validation helper

    - id: test_num_chars_comparison_explicit
      type: pass_to_pass
      origin: implementation
      description: Uses explicit comparison 'num_chars == 0' instead of implicit bool 'if (!num_chars)'
      rationale: Code style improvement for readability

    # --- Repo CI/CD checks (pass-to-pass gates) ---
    - id: test_patch_applies_cleanly
      type: pass_to_pass
      origin: repo_tests
      description: Gold patch applies cleanly without conflicts
      rationale: Any fix must apply cleanly to the codebase - this is a basic CI/CD requirement

    - id: test_source_compiles_syntax_only
      type: pass_to_pass
      origin: repo_tests
      description: Modified C++ source has no syntax errors after patching
      rationale: Code must be syntactically valid - lightweight check without full build

    - id: test_cpp_code_style_basic
      type: pass_to_pass
      origin: repo_tests
      description: C++ source follows basic code style (no tabs, no trailing whitespace)
      rationale: Code style compliance is a standard CI/CD gate for ClickHouse

    - id: test_test_file_syntax_valid
      type: pass_to_pass
      origin: repo_tests
      description: Python test file has valid syntax and can be executed
      rationale: Test suite itself must be valid code

    - id: test_all_tests_have_docstrings
      type: pass_to_pass
      origin: repo_tests
      description: All test functions have proper docstrings explaining their purpose
      rationale: Documentation quality check for test suite

    - id: test_no_debug_code_left
      type: pass_to_pass
      origin: repo_tests
      description: No debug prints (cout, printf, DEBUG) left in production source
      rationale: Production code should not contain debug output

    - id: test_functions_registered_properly
      type: pass_to_pass
      origin: repo_tests
      description: ClickHouse functions are properly registered with FunctionFactory
      rationale: Functions must be registered to be usable in ClickHouse queries

    # --- NEW: ClickHouse CI/CD specific checks ---
    - id: test_clang_format_compliance
      type: pass_to_pass
      origin: repo_tests
      description: C++ source follows .clang-format style rules
      rationale: ClickHouse CI runs clang-format on all changes - code must be properly formatted

    - id: test_no_trailing_whitespace
      type: pass_to_pass
      origin: repo_tests
      description: No trailing whitespace in modified source files
      rationale: Trailing whitespace is caught in ClickHouse code review and rejected

    - id: test_no_tabs_in_source
      type: pass_to_pass
      origin: repo_tests
      description: Source uses spaces for indentation, not tabs
      rationale: ClickHouse uses spaces (TabWidth: 4) per .clang-format - tabs are rejected

    - id: test_include_guards_present
      type: pass_to_pass
      origin: repo_tests
      description: Source has proper include ordering
      rationale: Standard headers should come before project headers - common C++ quality check

    - id: test_copyright_license_header
      type: pass_to_pass
      origin: repo_tests
      description: Source file has license/copyright header
      rationale: ClickHouse uses Apache 2.0 - source files should have proper headers

  # =============================================================================
  # STRUCTURAL TESTS: Verify code structure and patterns
  # =============================================================================
  structural_checks:
    - id: test_source_file_exists
      type: structural
      description: Source file exists at expected path

    - id: test_validate_function_arguments_signature
      type: structural
      description: validateFunctionArguments signature matches expected pattern

    - id: test_source_compiles
      type: structural
      description: Modified source compiles without syntax errors

  # =============================================================================
  # BEHAVIORAL TESTS: Verify runtime behavior
  # =============================================================================
  behavioral_checks:
    - id: test_memcpy_small_requirement_satisfied
      type: behavioral
      description: Fix satisfies memcpySmallAllowReadWriteOverflow15 padding requirements
      rationale: The core bug fix must provide 15 extra bytes of read padding

  # =============================================================================
  # EXECUTION CONFIG
  # =============================================================================
  # =============================================================================
  # RUBRIC RULES: Soft/subjective rules extracted from agent config files
  # These rules are evaluated by the rubric judge against the agent's solution
  # =============================================================================
  rubric:
    - rule: "Use Allman-style braces (opening brace on a new line) in C++ code. This is enforced by style checks in CI."
      source:
        path: ".claude/CLAUDE.md"
        lines: "54"
        commit: "73ad233a01a81190b2a45b820878e54c36a9a22c"

    - rule: "When writing comments or documentation, write function names as `f` instead of `f()` - prefer it for mathematical purity when referring to a function itself rather than its application."
      source:
        path: ".claude/CLAUDE.md"
        lines: "7"
        commit: "73ad233a01a81190b2a45b820878e54c36a9a22c"

    - rule: "When writing C++ code that interacts with low-level memory operations, use appropriate data structures like PaddedPODArray instead of std::String for operations requiring memory padding (e.g., memcpySmallAllowReadWriteOverflow15 requires 15 extra bytes of read padding)."
      source:
        path: ".claude/skills/review/SKILL.md"
        lines: "85-115"
        commit: "73ad233a01a81190b2a45b820878e54c36a9a22c"

  execution:
    test_framework: pytest
    test_file: tests/test_outputs.py
    timeout_seconds: 300
    required_checks:
      - test_source_file_exists
      - test_padding_chars_uses_padded_pod_array
      - test_pad_string_initialized_with_insert
      - test_empty_pad_string_handling_moved
      - test_utf8_offsets_use_size_not_length
      # All pass_to_pass checks are also required
      - test_patch_applies_cleanly
      - test_source_compiles_syntax_only
      - test_cpp_code_style_basic
