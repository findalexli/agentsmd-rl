[task]
name = "clickhouse-padstring-heap-overflow"
title = "Fix heap-buffer-overflow in leftPad/rightPad functions"
description = """
Fix a heap-buffer-overflow vulnerability in the leftPad and rightPad SQL functions.
The bug occurs because the padding string uses std::String which doesn't provide
the 15 extra bytes of read padding required by memcpySmallAllowReadWriteOverflow15.
"""
difficulty = "medium"
category = "memory-safety"
language = "cpp"
tags = ["clickhouse", "buffer-overflow", "memory-safety", "cpp", "padding"]

[source]
owner = "ClickHouse"
repo = "ClickHouse"
pr_number = 102088
merge_commit = "31deb8bb10fb7083a3c76f1112607b40cb26700b"
base_commit = "73ad233a01a81190b2a45b820878e54c36a9a22c"
target_file = "src/Functions/padString.cpp"
distinctive_line = "PaddedPODArray<UInt8> pad_string"

[time]
agent_timeout = 1800  # 30 minutes
verifier_timeout = 300  # 5 minutes (compilation can be slow)

[resources]
# CPU and memory requirements
cpu_cores = 4
memory_gb = 16

[environment]
# Docker environment settings
dockerfile = "environment/Dockerfile"
base_image = "clickhouse/binary-builder:latest"
