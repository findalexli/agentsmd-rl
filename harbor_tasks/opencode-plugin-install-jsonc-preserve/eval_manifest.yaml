version: "2.0"

source:
  repo: "anomalyco/opencode"
  pr: 19938
  base_commit: "afb6abff73bdc1577f7388d8273e2eba69849e08"
  merge_commit: "0b1018f6dd0cde01ef3313112d2d988cc5080f08"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "install.ts must parse without syntax errors"

  - id: comments_preserved_on_add
    type: fail_to_pass
    origin: pr_diff
    description: "Adding a plugin must not strip JSONC comments from config files"

  - id: comments_preserved_on_force_replace
    type: fail_to_pass
    origin: pr_diff
    description: "Force-replacing a plugin must not strip JSONC comments"

  - id: existing_tests_pass
    type: pass_to_pass
    origin: repo_tests
    description: "Upstream plugin install test suite still passes"

  - id: no_any_type
    type: pass_to_pass
    origin: agent_config
    description: "install.ts must not use the any type"
    source:
      path: "AGENTS.md"
      lines: "13"
      commit: "afb6abff73bdc1577f7388d8273e2eba69849e08"

  - id: no_else_statements
    type: pass_to_pass
    origin: agent_config
    description: "install.ts must not use else statements"
    source:
      path: "AGENTS.md"
      lines: "84"
      commit: "afb6abff73bdc1577f7388d8273e2eba69849e08"

  - id: no_try_catch
    type: pass_to_pass
    origin: agent_config
    description: "install.ts must not use try/catch blocks"
    source:
      path: "AGENTS.md"
      lines: "12"
      commit: "afb6abff73bdc1577f7388d8273e2eba69849e08"

rubric:
  - rule: "Prefer single word variable names where possible"
    source:
      path: "AGENTS.md"
      lines: "14"
      commit: "afb6abff73bdc1577f7388d8273e2eba69849e08"

  - rule: "Rely on type inference when possible; avoid explicit type annotations or interfaces unless necessary for exports or clarity"
    source:
      path: "AGENTS.md"
      lines: "16"
      commit: "afb6abff73bdc1577f7388d8273e2eba69849e08"

  - rule: "Prefer functional array methods (flatMap, filter, map) over for loops"
    source:
      path: "AGENTS.md"
      lines: "17"
      commit: "afb6abff73bdc1577f7388d8273e2eba69849e08"

  - rule: "Reduce total variable count by inlining when a value is only used once"
    source:
      path: "AGENTS.md"
      lines: "44"
      commit: "afb6abff73bdc1577f7388d8273e2eba69849e08"

  - rule: "Avoid unnecessary destructuring. Use dot notation to preserve context."
    source:
      path: "AGENTS.md"
      lines: "57"
      commit: "afb6abff73bdc1577f7388d8273e2eba69849e08"

  - rule: "Prefer const over let. Use ternaries or early returns instead of reassignment."
    source:
      path: "AGENTS.md"
      lines: "70"
      commit: "afb6abff73bdc1577f7388d8273e2eba69849e08"

  - rule: "Keep things in one function unless composable or reusable"
    source:
      path: "AGENTS.md"
      lines: "11"
      commit: "afb6abff73bdc1577f7388d8273e2eba69849e08"
