distractors:
- rule: Use Effect.gen(function* () { ... }) for composition and Effect.fn for named/traced
    effects.
  collision_type: architecture_boundary
  why_distracting: The file being edited (`theme.tsx`) is a SolidJS/React TUI component,
    not an Effect service. An agent might try to wrap the KV lookup or memo logic
    in `Effect.gen` or `Effect.fn`, which would break the synchronous reactivity expected
    by the UI framework.
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: 14-21
- rule: Reduce total variable count by inlining when a value is only used once.
  collision_type: would_cause_bug
  why_distracting: An agent might try to inline `kv.get("theme")` directly into the
    theme lookup (e.g., `store.themes[kv.get("theme")]`) to reduce variable count.
    This would bypass the safe `typeof saved === "string"` type guard, potentially
    causing a TypeScript error or runtime bug if the KV store returns undefined or
    a non-string value.
  severity: medium
  source:
    path: AGENTS.md
    lines: 44-53
hierarchy_analysis: The root `AGENTS.md` provides strict stylistic rules (single-word
  naming, early returns, no `let`) that directly apply to this UI component. The package-level
  `packages/opencode/AGENTS.md` introduces Effect-specific rules that act as a distractor
  here, as the agent must recognize that `theme.tsx` falls outside the Effect architecture
  boundary despite being in the `opencode` package.
