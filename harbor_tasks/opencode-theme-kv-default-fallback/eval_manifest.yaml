rubric:
- rule: Keep things in one function unless composable or reusable
  source:
    path: AGENTS.md
    lines: '11'
    commit: 26382c6216797e65a1b43dea8646725332f62e07
- rule: Rely on type inference when possible; avoid explicit type annotations or interfaces
    unless necessary for exports or clarity
  source:
    path: AGENTS.md
    lines: '16'
    commit: 26382c6216797e65a1b43dea8646725332f62e07
- rule: Avoid else statements. Prefer early returns.
  source:
    path: AGENTS.md
    lines: '84'
    commit: 26382c6216797e65a1b43dea8646725332f62e07
- rule: Avoid `else` statements. Prefer early returns.
  source:
    path: AGENTS.md
    lines: 81-89
  evidence: The `createMemo` callback uses multiple `if` statements with early returns
    (`if (active) return ...`, `if (theme) return ...`) and a final fallback return,
    completely avoiding `else` blocks.
  category: style
- rule: Prefer single word variable names where possible.
  source:
    path: AGENTS.md
    lines: 26-41
  evidence: The gold solution introduces new variables with single-word names (`active`,
    `saved`, `theme`) instead of using multi-word names like `activeTheme`, `savedThemeName`,
    or `resolvedTheme`.
  category: naming
- rule: Prefer `const` over `let`. Use ternaries or early returns instead of reassignment.
  source:
    path: AGENTS.md
    lines: 71-79
  evidence: The gold solution uses `const` for `active`, `saved`, and `theme`, and
    relies on early returns to determine the final value, rather than declaring a
    `let` variable and reassigning it.
  category: style
distractors:
- rule: Reduce total variable count by inlining when a value is only used once.
  collision_type: would_cause_bug
  why_distracting: The gold solution explicitly creates `const active`, `const saved`,
    and `const theme` to allow for type narrowing (`if (typeof saved === "string")`)
    and truthiness checks before returning. Inlining these into the `if` conditions
    or return statements would either duplicate property access or break TypeScript's
    type narrowing, leading to type errors.
  severity: high
  source:
    path: AGENTS.md
    lines: 48-57
- rule: Use `Effect.gen(function* () { ... })` for composition.
  collision_type: architecture_boundary
  why_distracting: The file `theme.tsx` is part of the TUI (SolidJS) and uses `createMemo`.
    The `kv` object is a local TUI store wrapper. Trying to wrap this logic in `Effect.gen`
    or use Effect services would break the synchronous reactivity expected by `createMemo`
    and cross the boundary between the TUI frontend and the Effect backend.
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: 16-23
hierarchy_analysis: The root `AGENTS.md` provides general TypeScript style guidelines
  (early returns, single-word naming, const over let) which are highly applicable
  to this TUI React/SolidJS code. The `packages/opencode/AGENTS.md` introduces Effect-specific
  rules, but since this specific file is part of the TUI frontend (`src/cli/cmd/tui/context/theme.tsx`),
  the Effect rules do not apply and serve as an architecture boundary distractor.
