  files:
    - path: core/remotes/docker/resolver.go
      status: modified
      additions: 8
    - path: core/remotes/docker/resolver_test.go
      status: modified
      additions: 132

# Every test_* function in test_outputs.py has a matching check here
checks:
  # Pass-to-pass tests (regression detection)
  - id: test_gofmt_check
    type: pass_to_pass
    origin: repo_tests
    description: Go code formatting check passes

  - id: test_go_build
    type: pass_to_pass
    origin: repo_tests
    description: Package compiles without errors

  - id: test_go_vet
    type: pass_to_pass
    origin: repo_tests
    description: Go vet static analysis passes

  - id: test_go_mod_verify
    type: pass_to_pass
    origin: repo_tests
    description: Go modules verification passes

  - id: test_resolve_allows_blobs_fallback_on_404
    type: pass_to_pass
    origin: repo_tests
    description: 404 from /manifests/ correctly allows fallback to /blobs/

  - id: test_unit_tests_pass
    type: pass_to_pass
    origin: repo_tests
    description: Upstream unit tests pass

  - id: test_resolver_basic_tests
    type: pass_to_pass
    origin: repo_tests
    description: Resolver basic HTTP/HTTPS tests pass

  - id: test_resolver_fallback_tests
    type: pass_to_pass
    origin: repo_tests
    description: Resolver host failure and HTTP fallback tests pass

  - id: test_resolver_auth_tests
    type: pass_to_pass
    origin: repo_tests
    description: Resolver authentication tests pass

  - id: test_fetcher_tests
    type: pass_to_pass
    origin: repo_tests
    description: Fetcher tests pass

  - id: test_registry_tests
    type: pass_to_pass
    origin: repo_tests
    description: Registry tests pass

  - id: test_core_remotes_handlers
    type: pass_to_pass
    origin: repo_tests
    description: Core remotes handlers tests pass

  # Fail-to-pass tests (bug fix verification)
  - id: test_resolve_no_blobs_fallback_on_5xx
    type: fail_to_pass
    origin: gold_patch
    description: |
      Transient 5xx errors from /manifests/ do NOT trigger /blobs/ fallback.
      Before fix: 500 → fallback to /blobs/ → content store polluted with wrong media type.
      After fix: 500 → return error immediately, no fallback.

  - id: test_5xx_errors_not_cached
    type: fail_to_pass
    origin: gold_patch
    description: |
      Multiple 5xx status codes (500, 502, 503) consistently return errors
      without falling back to /blobs/, preventing content store pollution.

  # Structural test (verifies fix is in place)
  - id: test_resolver_priority_check_present
    type: structural
    origin: gold_patch
    description: |
      Code contains the firstErrPriority > 2 check that limits fallback
      to /blobs/ endpoint only when appropriate.

