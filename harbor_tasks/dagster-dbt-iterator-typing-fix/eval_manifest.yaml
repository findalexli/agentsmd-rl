rubric:
- rule: Use specific, accurate type annotations - not generic types like Iterator
    when a more precise type (DbtEventIterator[DbtDagsterEventType]) is available
  source:
    path: .claude/coding_conventions.md
    lines: 22-25
    commit: f44352a8a384296e999c33df60bb785bd69953c4
- rule: All Python code must pass pyright type checking with zero errors
  source:
    path: .claude/coding_conventions.md
    lines: '25'
    commit: f44352a8a384296e999c33df60bb785bd69953c4
- rule: Use builtin types for annotations (list, dict, set, tuple) instead of typing
    module variants, and prefer modern generic syntax
  source:
    path: .claude/coding_conventions.md
    lines: 23-24
    commit: f44352a8a384296e999c33df60bb785bd69953c4
- rule: 'Python: Core framework in `python_modules/dagster/`, libraries in `python_modules/libraries/`'
  source:
    path: CLAUDE.md
    lines: 44-45
  evidence: The gold solution correctly targets the `dagster-dbt` package inside the
    `python_modules/libraries/` directory for its modifications, aligning with the
    repository's architectural layout.
  category: architecture
