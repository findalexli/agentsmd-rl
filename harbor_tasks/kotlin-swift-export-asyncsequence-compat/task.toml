[description]
brief = "Add asyncSequence(for:) compatibility function to Swift Export"
detail = """
This task requires adding a deprecated `asyncSequence(for:)` function to the Swift Export
compatibility layer. The function provides source compatibility with KMP-NativeCoroutines
during migration to Swift Export, delegating to the new `asAsyncSequence()` method.

The change involves modifying:
native/swift/swift-export-standalone/resources/swift/KotlinCoroutineSupport.swift

Key requirements:
- Function must be marked as deprecated with message "Use `asAsyncSequence()` from Swift Export"
- Generic function that works with any KotlinTypedFlow<T>
- Returns KotlinFlowSequence<T>
- Implementation delegates to flow.asAsyncSequence()
"""

