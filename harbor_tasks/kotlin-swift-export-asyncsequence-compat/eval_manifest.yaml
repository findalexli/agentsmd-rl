rubric:
- rule: Function provides proper migration path from KMP-NativeCoroutines
  description: The function should be clearly marked as deprecated with guidance to
    use asAsyncSequence()
  source:
    path: .ai/guidelines.md
    lines: 77-86
    commit: 715bf60a9a2580d55253eb3bfebcd9be5e27a2aa
  reference: '@available(*, deprecated, message: "Use `asAsyncSequence()` from Swift
    Export")'
- rule: Code follows Swift naming conventions
  description: Function name and parameters follow Swift API design guidelines
  source:
    path: .ai/guidelines.md
    lines: 28-40
    commit: 715bf60a9a2580d55253eb3bfebcd9be5e27a2aa
  reference: 'public func asyncSequence<T>(for flow: any KotlinTypedFlow<T>) -> KotlinFlowSequence<T>'
- rule: Documentation explains migration context
  description: Documentation comment should explain why this function exists and when
    to replace it
  source:
    path: .ai/guidelines.md
    lines: 77-86
    commit: 715bf60a9a2580d55253eb3bfebcd9be5e27a2aa
  reference: This function provides source compatibility with KMP-NativeCoroutines
    during the migration to Swift Export
distractors:
- rule: 'languages: [Kotlin, Java]'
  collision_type: scope_ambiguity
  why_distracting: The config specifies the project languages are Kotlin and Java,
    but the task explicitly requires editing a Swift file (`KotlinCoroutineSupport.swift`).
    An agent might hesitate to write Swift code or attempt to implement the compatibility
    layer in Kotlin instead.
  severity: low
  source:
    path: CLAUDE.md
    lines: 3-3
hierarchy_analysis: The provided config files (`CLAUDE.md` and `AGENTS.md`) act primarily
  as pointers to external guideline files (e.g., `.ai/guidelines.md`) which are not
  present in the context. They do not contain explicit coding style, naming, or architectural
  rules. The only constraints present are metadata about the project's primary languages
  and build system.
