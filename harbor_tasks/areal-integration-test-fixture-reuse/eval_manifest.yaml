distractors:
- rule: Follow existing code patterns in the same module
  collision_type: rule_conflict
  why_distracting: The existing code pattern uses per-class `@pytest.mark.slow` markers
    and function-scoped fixtures. The PR's explicit goal is to break this pattern
    by introducing module-level markers (`pytestmark = pytest.mark.sglang`) and module-scoped
    fixtures to improve performance. Following the existing pattern would prevent
    the necessary refactoring.
  severity: high
  source:
    path: CLAUDE.md
    lines: 47-48
- rule: Add tests for new functionality
  collision_type: scope_ambiguity
  why_distracting: The PR instructions explicitly require removing the `should_accept_fn`
    tests because they are incompatible with shared fixtures. An agent might misinterpret
    the rule to 'Add tests for new functionality' (or maintain test coverage) by trying
    to rewrite these tests to work with module-scoped fixtures, which is impossible
    due to stateful re-entrance issues.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 47-49
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` contain identical or very similar
  rules regarding testing, hardcoded paths, and code patterns. They reinforce each
  other without conflict. The primary conflict is between the general repository rule
  to 'Follow existing code patterns' and the specific PR objective to refactor those
  exact patterns for performance.
