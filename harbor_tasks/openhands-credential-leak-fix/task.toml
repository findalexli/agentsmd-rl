name = "openhands-credential-leak-fix"
description = "Fix credential leak vulnerability in callback event logging where API keys were exposed in plaintext production logs"
creator = "openhands-scaffold"
version = "1.0.0"

[requirements]
python = "3.12"

[difficulty]
estimated_time_minutes = 45
fail_to_pass_tests = 5

[tags]
categories = ["security", "logging", "privacy"]
languages = ["python"]
types = ["vulnerability_fix"]
source = "github_pr"

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
