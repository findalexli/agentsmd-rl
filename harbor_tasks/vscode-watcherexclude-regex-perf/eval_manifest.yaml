  - id: pathological_patterns_removed
    type: fail_to_pass
    origin: pr_diff
    description: "Old **/.git/objects/**, **/.git/subtree-cache/**, **/.hg/store/** patterns removed from workbench config"

  - id: performance_comment_present
    type: fail_to_pass
    origin: pr_diff
    description: "Explanatory comment 'Avoiding a ** pattern here which results in a very complex RegExp' added"

  - id: session_config_duplicate_removed
    type: fail_to_pass
    origin: pr_diff
    description: "Duplicate files.watcherExclude block removed from sessions configuration.contribution.ts"

  - id: watcher_exclude_still_in_workbench
    type: pass_to_pass
    origin: repo_tests
    description: "watcherExclude key and default section still present in files.contribution.ts"

  - id: config_files_still_register
    type: pass_to_pass
