distractors:
- rule: Use `#[cfg(test)]` for test-only code used within the same crate.
  collision_type: would_cause_bug
  why_distracting: The PR requires adding tests to a Move file (`option_tests.move`).
    The global config specifies using `#[cfg(test)]` for test-only code, which is
    a Rust-specific attribute. Applying this to Move code instead of Move's native
    `#[test]` attribute would cause syntax/compilation errors.
  severity: high
  source:
    path: CLAUDE.md
    lines: 65-67
hierarchy_analysis: The repository uses a root CLAUDE.md file that primarily focuses
  on Rust development patterns (like `cargo nextest` and `#[cfg(test)]`). Since the
  target files for this task are Move source code (`.move`), agents must be careful
  not to blindly apply Rust-specific rules to Move files.
