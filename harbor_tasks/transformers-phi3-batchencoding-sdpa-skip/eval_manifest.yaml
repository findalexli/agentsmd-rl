version: "2.0"

source:
  repo: "huggingface/transformers"
  pr: 45004
  base_commit: "44686173b26bb174f3c7eb6e59f08a338d1adf54"
  merge_commit: "b0bba2d832f3cfd94b339a407f2b3e5b90ce3499"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified files (phi3 test + test_modeling_common) parse without syntax errors"

  - id: phi3_generate_no_bare_inputs
    type: fail_to_pass
    origin: pr_diff
    description: "No generate() call passes bare 'inputs' as positional arg (must unpack or subscript)"

  - id: sdpa_skip_new_models
    type: fail_to_pass
    origin: pr_diff
    description: "SDPA flash dispatch skip list includes EvollaModel, parakeet_encoder, parakeet_ctc, pi0"

  - id: sdpa_skip_existing_models_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "Existing SDPA skip entries (modernbert, gemma3, pixtral, sam, kosmos-2, mllama, PaliGemma) still present"

  - id: phi3_test_methods_intact
    type: pass_to_pass
    origin: pr_diff
    description: "All four Phi3 integration test methods still defined with non-trivial bodies"

  - id: meaningful_changes
    type: pass_to_pass
    origin: static
    description: "Both target files have meaningful diffs (anti-stub)"

  - id: ruff_style
    type: pass_to_pass
    origin: agent_config
    description: "Modified files pass ruff lint checks"
    source:
      path: "CLAUDE.md"
      lines: "2"
      commit: "44686173b26bb174f3c7eb6e59f08a338d1adf54"

  - id: copied_from_not_edited
    type: pass_to_pass
    origin: agent_config
    description: "'# Copied from' blocks must not be edited (will be reverted by make fix-repo)"
    source:
      path: "CLAUDE.md"
      lines: "66"
      commit: "44686173b26bb174f3c7eb6e59f08a338d1adf54"

  - id: no_new_test_files
    type: pass_to_pass
    origin: agent_config
    description: "Tests should be added to existing files, not new ones"
    source:
      path: ".github/copilot-instructions.md"
      lines: "16"
      commit: "44686173b26bb174f3c7eb6e59f08a338d1adf54"

rubric:
  - rule: "PRs should be as brief as possible. Bugfix PRs in particular can often be only one or two lines long, and do not need large comments, docstrings or new functions in this case. Aim to minimize the size of the diff."
    source:
      path: ".github/copilot-instructions.md"
      lines: "15"
      commit: "44686173b26bb174f3c7eb6e59f08a338d1adf54"

  - rule: "If you need to update a copied function, update the base function it's copying from and use make fixup to propagate the change, or remove the # Copied from comment if it's no longer appropriate."
    source:
      path: ".github/copilot-instructions.md"
      lines: "24-26"
      commit: "44686173b26bb174f3c7eb6e59f08a338d1adf54"

  - rule: "make style or make fix-repo should be run as the final step before opening a PR."
    source:
      path: "CLAUDE.md"
      lines: "8"
      commit: "44686173b26bb174f3c7eb6e59f08a338d1adf54"
