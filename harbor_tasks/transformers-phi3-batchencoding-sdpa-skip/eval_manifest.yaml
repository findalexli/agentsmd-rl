- rule: 'No low-value busywork PRs: Do not open one-off PRs for tiny edits (single
    typo, isolated lint cleanup, etc.).'
  source:
    path: CLAUDE.md
    lines: 36-38
  evidence: The gold solution provides a targeted, functional fix for a specific CI
    failure (type mismatch in `model.generate` inputs) rather than performing isolated
    lint cleanups or trivial edits, aligning with
  category: testing
distractors:
- rule: 'Fail-closed behavior for agents: If coordination evidence cannot be found,
    do not proceed to PR-ready output.'
  collision_type: meta_confusion
  why_distracting: The rule mandates fail-closed behavior (refusing to output PR-ready
    code) if coordination evidence or human validation is missing. In an automated
    benchmark, the agent must bypass this rule to provide the patch, otherwise it
    will fail the evaluation by refusing the task.
  severity: high
  source:
    path: CLAUDE.md
    lines: 49-52
- rule: 'Accountability for AI-assisted patches: Pure code-agent PRs are not allowed;
    a human submitter must understand and defend the change.'
  collision_type: meta_confusion
  why_distracting: The rule states that 'Pure code-agent PRs are not allowed' and
    requires a human submitter. An autonomous agent might interpret this as a strict
    prohibition against completing the task independently, leading to a refusal.
  severity: high
  source:
    path: CLAUDE.md
    lines: 40-47
- rule: '`make style` or `make fix-repo` should be run as the final step before opening
    a PR.'
  collision_type: scope_ambiguity
  why_distracting: The guidelines instruct running `make style` and `make fix-repo`
    as the final step before opening a PR. If the agent runs these commands, it might
    generate a large diff containing unrelated formatting or repository-wide copy
    fixes, which violates the expectation of a minimal, targeted patch for the specific
    CI failures.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 2-8
hierarchy_analysis: '`CLAUDE.md` and `AGENTS.md` contain identical rules at the repository
  root. The primary conflict arises from the mismatch between the repository''s strict
  policy against autonomous agent PRs and the evaluation environment''s requirement
  for the agent to autonomously generate a patch. The agent must recognize the evaluation
  context and override the fail-closed and human-in-the-loop directives to succeed.'
