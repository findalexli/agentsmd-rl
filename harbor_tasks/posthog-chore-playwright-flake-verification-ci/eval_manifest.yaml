config_edits:
- path: .agents/skills/playwright-test/SKILL.md
  tier: 1
  gold_added: 'Read @playwright/README.md for best practices, gotchas, and how to
    run tests.


    - Follow the best practices in the README strictly

    - **Keep looping until all tests pass.** Do not give up or ask the user for help.
    You must resolve every failure yourself.'
  gold_removed: '- Don''t use any locators with css selectors, prefer getting elements
    via accessibility roles or data-testids, add data-attr if required.

    - Write fewer longer tests that do multiple things, split up by test.steps into
    logical steps

    - Use page object models for common tasks and accessing common elements

    - Never put an if statement in a test

    - **Keep looping until all tests pass.** Do not give up or ask the user for help.
    You must resolve every failure yourself.'
- path: playwright/README.md
  tier: 2
  gold_added: '### Best practices

    - Don''t use CSS selectors — prefer accessibility roles (`getByRole`) or `getByTestId()`
    which maps to `data-attr` in our config. Add `data-attr` to components if needed.

    - Write fewer, longer tests that do multiple things. Split logical steps with
    `test.step()`.

    - Use page object models for common tasks and accessing common elements (see `page-models/`).

    - After UI interactions, assert on UI changes — don''t assert on network requests
    resolving.

    - Never put conditional logic (`if`) in a test.

    ### Gotchas

    **Flaky tests are almost always due to not waiting for the right thing.**

    Consider adding a better selector, an intermediate step like waiting for URL or
    page title to change,

    or waiting for a critical network request to complete.


    **Loose selectors cause strict mode violations.**

    If a selector matches multiple elements, Playwright will show all matches — use
    the output to narrow down:'
  gold_removed: '### Flaky tests are almost always due to not waiting for the right
    thing

    Consider adding a better selector, an intermediate step like waiting for URL or
    page title to change, or waiting for a critical network request to complete.

    ### Useful output from Playwright

    If you write a selector that is too loose and matches multiple elements, Playwright
    will output all the matches. With a better selector for each:'
distractors:
- rule: 'All tests: pytest. Single frontend test: pnpm --filter=@posthog/frontend
    jest <test_file>'
  collision_type: scope_ambiguity
  why_distracting: The config specifies pytest for backend and jest for frontend tests.
    An agent might try to use these test runners or their patterns in the CI script,
    but this task specifically requires Playwright for E2E tests.
  severity: medium
  source:
    path: AGENTS.md
    lines: 14-19
- rule: 'If flox is available: ALWAYS use `flox activate -- bash -c "<command>"` pattern'
  collision_type: would_cause_bug
  why_distracting: The rule mandates using `flox activate` for terminal commands.
    However, the agent is writing a CI script (.github/scripts/verify-playwright-new-tests-and-snapshots.sh)
    which runs in GitHub Actions where the environment is already provisioned. Adding
    flox activate here could break the CI pipeline.
  severity: high
  source:
    path: .cursorrules
    lines: 19-21
hierarchy_analysis: The task requires the agent to understand the semantic difference
  between agent-facing instructions (.agents/skills/playwright-test/SKILL.md) and
  human-facing documentation (playwright/README.md). It must edit its own skill file,
  which acts as a local configuration, while ignoring global test runner rules in
  AGENTS.md that don't apply to the E2E testing scope.
