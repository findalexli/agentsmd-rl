distractors:
- rule: 'Decision rule: Does the test need browser/browserType/context -> tests/library/.
    Just needs page + server -> tests/page/.'
  collision_type: scope_ambiguity
  why_distracting: The rule provides a decision matrix for placing tests in `tests/library/`
    vs `tests/page/` based on browser needs. An agent might try to write a test for
    this browser download skipping feature in `tests/library/` because it involves
    browsers, but CLI daemon tests belong in `tests/mcp/` or are out of scope for
    this specific fix.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 64-64
- rule: npm run ctest <filter> Chromium only library tests — use during development
  collision_type: meta_confusion
  why_distracting: The rule says to use `npm run ctest` for development testing. An
    agent might try to run `ctest` to verify the CLI daemon changes, but `ctest` runs
    library tests. The correct command for CLI daemon/MCP changes would be `npm run
    ctest-mcp`.
  severity: low
  source:
    path: CLAUDE.md
    lines: 45-46
hierarchy_analysis: The repository uses a single `CLAUDE.md` file at the root. The
  rules focus heavily on testing and tooling commands. The agent must carefully distinguish
  between library tests and MCP/CLI tests, as the CLI daemon falls under the MCP testing
  umbrella rather than standard library tests.
