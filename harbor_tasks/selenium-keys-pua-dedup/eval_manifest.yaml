rubric:
- id: api_compat_preserved
  source:
    excerpt: Maintain API/ABI compatibility - users upgrade by changing only version number
    path: AGENTS.md
    commit: 99a25472c4da3b39a9f049e1ac07086e3bf508f5
  rule: 'Public enum constants OPTION and FN are not removed; only their backing

    Unicode value (or annotation) changes. The Selenium project explicitly

    requires API/ABI compatibility — users upgrade by changing only version

    number.

    '
- id: deprecation_with_javadoc
  source:
    excerpt: before removing public functionality, mark it as deprecated with a message pointing to the alternative
    path: AGENTS.md
    commit: 99a25472c4da3b39a9f049e1ac07086e3bf508f5
  rule: 'Keys.FN should be marked with @Deprecated and accompanied by a Javadoc

    block (using the @deprecated tag) explaining why the constant is

    deprecated and what its behavior is. Selenium''s deprecation policy

    requires a message pointing to the alternative before removal.

    '
- id: small_reversible_diff
  source:
    excerpt: Avoid repo-wide refactors/formatting; prefer small, reversible diffs
    path: AGENTS.md
    commit: 99a25472c4da3b39a9f049e1ac07086e3bf508f5
  rule: 'The change should be confined to Keys.java and the values/annotations

    that the PR targets — no repo-wide refactors, no unrelated formatting

    sweeps in other files.

    '
- id: comments_explain_why
  source:
    excerpt: Comments should explain *why*, not *what* - prefer well-named methods over comments
    path: AGENTS.md
    commit: 99a25472c4da3b39a9f049e1ac07086e3bf508f5
  rule: 'Any comment added near OPTION/FN should explain *why* the alias is

    chosen (e.g., to avoid duplicate Unicode codes) rather than restating

    what the line does.

    '
- id: javadoc_for_public_api
  source:
    excerpt: Use Javadoc for public APIs
    path: java/AGENTS.md
    commit: 99a25472c4da3b39a9f049e1ac07086e3bf508f5
  rule: 'The Javadoc on a deprecated public enum constant should follow the

    Java AGENTS.md convention (brief description, @deprecated tag with

    explanation).

    '
