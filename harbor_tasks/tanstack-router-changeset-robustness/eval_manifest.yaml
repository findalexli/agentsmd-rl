  type: p2p
  origin: static
  description: The release script exists at the expected path
- id: test_release_logs_parsing
  name: Release logs use array-based parsing
  type: f2p
  description: Script uses split/filter on release logs and accesses [0] and [1] indices
- id: test_commit_range_calculation
  name: Commit range calculation is robust
  type: f2p
