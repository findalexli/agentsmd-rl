distractors:
- rule: TypeScript strict mode with extensive type safety
  collision_type: architecture_boundary
  why_distracting: The rule mandates TypeScript strict mode, but the file being edited
    is a standalone `.mjs` script for CI/releases. An agent might erroneously try
    to convert the script to TypeScript or add JSDoc types, overcomplicating a simple
    script fix.
  severity: medium
  source:
    path: AGENTS.md
    lines: 17-18
- rule: 'Critical: Always run unit and type tests during development - do not proceed
    if they fail'
  collision_type: rule_conflict
  why_distracting: The config mandates running unit and type tests and not proceeding
    if they fail. However, the task instruction explicitly states this is a CI/release
    script fix only and should be verified with `node --check`. Running the full Nx
    test suite is a waste of time and resources for this specific task.
  severity: medium
  source:
    path: AGENTS.md
    lines: 45-46
hierarchy_analysis: The configuration consists of a single root-level AGENTS.md file
