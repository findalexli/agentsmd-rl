checks:
- id: test_script_exists
  name: Script file exists
  type: p2p
  origin: static
  description: The release script exists at the expected path
- id: test_release_logs_parsing
  name: Release logs use array-based parsing
  type: f2p
  description: Script uses split/filter on release logs and accesses [0] and [1] indices
- id: test_commit_range_calculation
  name: Commit range calculation is robust
  type: f2p
  description: Script uses explicit previousRelease/currentRelease instead of fragile
    HEAD~1
- id: test_non_conventional_commit_parsing
  name: Non-conventional commit parsing improved
  type: f2p
  description: Script uses split(' ') instead of brittle double indexOf
- id: test_prerelease_vs_latest_flag
  name: Prerelease handling uses conditional --latest flag
  type: f2p
  description: Script conditionally adds --latest flag only for non-prereleases
- id: test_comments_added
  name: Explanatory comments added
  type: f2p
  description: Script includes comments explaining the git range and parsing logic
- id: test_node_syntax_valid
  name: Script has valid Node.js syntax
  type: p2p
  origin: repo_tests
  description: The script passes node --check validation
- id: test_repo_prettier_check
  name: Prettier formatting check passes
  type: p2p
  origin: repo_tests
  description: Repo's Prettier formatting check passes on the modified file
- id: test_repo_eslint
  name: ESLint check passes
  type: p2p
  origin: repo_tests
  description: Repo's ESLint check passes on the modified file
