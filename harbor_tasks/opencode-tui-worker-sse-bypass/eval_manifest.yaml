    lines: 55-58
    commit: 1d363fa19fe9c1445f635498da48211bf09cbc97
  reference: ''
- rule: Reduce total variable count by inlining when a value is only used once.
  source:
    path: AGENTS.md
    lines: '44'
    commit: 1d363fa19fe9c1445f635498da48211bf09cbc97
  reference: ''
- rule: Use Effect.callback for callback-based APIs.
  source:
    path: packages/opencode/AGENTS.md
    lines: '23'
    commit: 1d363fa19fe9c1445f635498da48211bf09cbc97
  reference: ''
- rule: Use Instance.bind(fn) for native addon callbacks that need to call Bus.publish
    or anything that reads Instance.directory.
  source:
    path: packages/opencode/AGENTS.md
    lines: 54-58
    commit: 1d363fa19fe9c1445f635498da48211bf09cbc97
  reference: ''
- rule: Avoid `try`/`catch` where possible
  source:
    path: AGENTS.md
    lines: 21-22
  evidence: The gold solution handles errors from `WorkspaceContext.provide` by chaining
    a `.catch()` method rather than wrapping the `await` in a `try`/`catch` block.
  category: style
- rule: Avoid `else` statements. Prefer early returns.
  source:
    path: AGENTS.md
    lines: 54-60
  evidence: The `settle` function uses an early return (`if (settled) return`) instead
    of an `else` block to prevent multiple resolutions of the promise.
  category: style
distractors:
- rule: Use Effect.gen(function* () { ... }) for composition and other Effect rules.
  collision_type: architecture_boundary
  why_distracting: The agent might attempt to rewrite the worker's event streaming
    logic using `Effect.gen`, `Effect.async`, or `Effect.forkScoped` because of the
    extensive Effect guidelines. However, this file currently uses standard Promises
    and async/await, and the PR scope is strictly to bypass the HTTP SSE layer, not
    to migrate the file to Effect.
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: 14-20
- rule: Use Instance.bind(fn) to capture the current Instance AsyncLocalStorage context
    for callbacks.
  collision_type: scope_ambiguity
  why_distracting: The agent might wrap the `Bus.subscribeAll` callback with `Instance.bind`
    to preserve context. However, the rule explicitly states it's for native addon
    callbacks, whereas `Bus.subscribeAll` is an internal event emitter. The context
    is already correctly established by wrapping the entire execution in `Instance.provide`.
  severity: medium
  source:
    path: packages/opencode/AGENTS.md
    lines: 46-54
- rule: Reduce total variable count by inlining when a value is only used once.
  collision_type: rule_conflict
  why_distracting: The agent might inline the `WorkspaceID.make(input.workspaceID)`
    call directly into the `WorkspaceContext.provide` arguments since it's only used
    once. However, doing so would place it inside the `while (!signal.aborted)` loop,
    causing unnecessary re-evaluation on every reconnection attempt. The gold solution
    correctly extracts it outside the loop.
  severity: low
  source:
    path: AGENTS.md
    lines: 36-42
hierarchy_analysis: The root `AGENTS.md` provides general TypeScript style guidelines
  (avoiding try/catch, early returns, single-word naming), which the gold solution
  follows closely. The package-level `packages/opencode/AGENTS.md` introduces highly
  specific rules for Effect and `Instance.bind`. These package-level rules act as
  distractors here because the file in question is not using the Effect framework,
  and the callbacks involved are not native addon callbacks. The agent must recognize
  the architectural boundary of the current file and not blindly apply the Effect
  migration rules from the package-level config.
