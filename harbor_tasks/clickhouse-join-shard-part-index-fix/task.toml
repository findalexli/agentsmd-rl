title = "Fix wrong results in JOIN with shard-by-PK and query condition cache"

difficulty = "medium"
estimated_time = "45 minutes"
tags = ["c++", "clickhouse", "query-optimization", "join", "bug-fix"]

[description]
brief = "Fix bug in optimizeJoinByShards where non-contiguous part_index_in_query values caused wrong JOIN results"
details = """
The optimizeJoinByShards optimization distributes parts across sources based on their
part_index_in_query. When filterPartsByQueryConditionCache drops parts, the remaining
parts had non-contiguous indices. The distribution logic assumed contiguous indices,
causing parts to be assigned to wrong sources and producing incorrect (empty) query results.

The fix renumbers part_index_in_query to be contiguous when collecting parts.
"""
