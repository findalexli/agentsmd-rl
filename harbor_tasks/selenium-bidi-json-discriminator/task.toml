name = "selenium-bidi-json-discriminator"
description = "Improve JSON discriminator extraction in Selenium .NET BiDi bindings"
version = "1.0.0"
source_pr = "https://github.com/SeleniumHQ/selenium/pull/17309"
source_merge_commit = "a9285c86005401cef9ac004757f2b43b80ed6964"
source_base_commit = "5c2bf6b42fb66f895d936cf13a392385fb032689"
difficulty = "easy"
estimated_time = "30 minutes"

tags = ["csharp", "json", "parsing", "performance", "selenium"]

[environment]
language = "csharp"
dockerfile = "environment/Dockerfile"

[solution]
script = "solution/solve.sh"

[tests]
script = "tests/test.sh"
manifest = "eval_manifest.yaml"

[verifier]
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
