source_pr:
  owner: SeleniumHQ
  repo: selenium
  pr_number: 17309
  merge_commit: a9285c86005401cef9ac004757f2b43b80ed6964
  base_commit: 5c2bf6b42fb66f895d936cf13a392385fb032689

target_file: dotnet/src/webdriver/BiDi/Json/JsonExtensions.cs

checks:
  # Core fail-to-pass tests for the fix
  - id: test_valuetextequals_usage
    type: fail_to_pass
    origin: agent_config
    source:
      file: dotnet/AGENTS.md
      section: Code conventions
      guidance: Use efficient patterns for JSON parsing
    description: ValueTextEquals is used for property name comparison instead of GetString comparison

  - id: test_no_old_property_name_variable
    type: fail_to_pass
    origin: behavioral
    description: Old propertyName variable assignment using GetString() is removed

  - id: test_valuetextequals_in_property_loop
    type: fail_to_pass
    origin: behavioral
    description: ValueTextEquals is called inside the PropertyName loop in GetDiscriminator method

  - id: test_correct_read_skip_pattern
    type: fail_to_pass
    origin: behavioral
    description: Correct Read-Skip-Read pattern is used when skipping non-matching properties

  # Agent config derived tests (code quality)
  - id: test_reader_advancement_comments
    type: fail_to_pass
    origin: agent_config
    source:
      file: AGENTS.md
      section: General Guidelines
      guidance: Comments should explain *why*, not *what*
    description: Comments explain reader advancement logic (why the movement happens)

  # Pass-to-pass tests (repo health)
  - id: test_syntax_validity
    type: pass_to_pass
    origin: repo_tests
    description: C# code compiles without syntax errors

  - id: test_repo_dotnet_format
    type: pass_to_pass
    origin: repo_tests
    description: .NET code follows editorconfig formatting conventions

  - id: test_repo_file_header
    type: pass_to_pass
    origin: repo_tests
    description: C# source files have proper copyright headers

  - id: test_repo_jsonextensions_compiles
    type: pass_to_pass
    origin: repo_tests
    description: JsonExtensions.cs compiles without errors

  # Aliases for backward compatibility with test function names
  - id: test_discriminator_basic_extraction
    type: fail_to_pass
    origin: behavioral
    description: Alias for test_valuetextequals_usage - ValueTextEquals is used

  - id: test_discriminator_with_nested_objects
    type: fail_to_pass
    origin: behavioral
    description: Alias for test_correct_read_skip_pattern - Read-Skip-Read pattern handles nested objects

  - id: test_discriminator_with_arrays
    type: fail_to_pass
    origin: behavioral
    description: Alias for test_reader_advancement_comments - Comments explain array skipping

  - id: test_repo_build
    type: pass_to_pass
    origin: repo_tests
    description: Alias for test_syntax_validity - Code syntax is valid

rubric:
  - rule: "Comments should explain *why*, not *what*. Use well-named methods and variables instead of comments that merely narrate code."
    source:
      path: "AGENTS.md"
      lines: "36-37"
      commit: "5c2bf6b42fb66f895d936cf13a392385fb032689"

  - rule: "Use efficient patterns for JSON parsing. Prefer Utf8JsonReader.ValueTextEquals(span/readonlySpan) for property name comparison instead of GetString() to avoid unnecessary string allocations."
    source:
      path: "dotnet/AGENTS.md"
      lines: "14-44"
      commit: "5c2bf6b42fb66f895d936cf13a392385fb032689"
