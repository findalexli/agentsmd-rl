distractors:
- rule: The codebase is migrating to async
  collision_type: would_cause_bug
  why_distracting: The codebase is migrating to async, but `Utf8JsonReader` is a `ref
    struct` in C#. It cannot be used in async methods, captured in closures, or used
    in async state machines. Attempting to make `GetDiscriminator` async would result
    in a compilation error.
  severity: high
  source:
    path: dotnet/AGENTS.md
    lines: 26-27
- rule: Add logging where users may need insight into what's happening
  collision_type: would_cause_bug
  why_distracting: The primary goal of this PR is to optimize JSON parsing by avoiding
    unnecessary string allocations. Adding `_logger.Debug()` inside this tight parsing
    loop would introduce new allocations and performance overhead, directly undermining
    the PR's objective.
  severity: high
  source:
    path: dotnet/AGENTS.md
    lines: 17-23
- rule: prefer well-named methods over comments
  collision_type: rule_conflict
  why_distracting: The rule suggests preferring well-named methods over comments.
    However, the prompt explicitly requests adding clear comments explaining each
    reader movement. Furthermore, extracting methods for `Utf8JsonReader` operations
    is cumbersome because it is a `ref struct` and must be passed by `ref`, making
    inline comments the technically superior choice here.
  severity: medium
  source:
    path: AGENTS.md
    lines: 58-58
hierarchy_analysis: The root `AGENTS.md` provides general guidelines on logging, testing,
  and comments, while `dotnet/AGENTS.md` provides C#-specific implementations (like
  the `ILogger` syntax and async migration). In this specific PR, the C# language
  constraints (`ref struct` limitations) override the general architectural directives
  (async migration and logging).
