    to first PropertyName` and `// skip the value (including nested objects/arrays)`
    to explain the intent behind the reader state cha
  category: documentation
- rule: Avoid repo-wide refactors/formatting; prefer small, reversible diffs
  source:
    path: AGENTS.md
