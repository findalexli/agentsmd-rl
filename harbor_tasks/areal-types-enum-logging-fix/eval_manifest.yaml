version: "2.0"

source:
  repo: "inclusionAI/AReaL"
  pr: 1008
  base_commit: "4f5a2944f0acfebba378e5b88bf2ab940f84b943"
  merge_commit: ""

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Both modified files (types.py, clevr_count_70k.py) must parse without syntax errors"

  - id: reward_fn_returns_float
    type: fail_to_pass
    origin: pr_diff
    description: "clevr_count_70k_reward_fn must return float (not int) for correct, wrong, and no-match inputs"

  - id: enum_classes_str_compatible
    type: fail_to_pass
    origin: pr_diff
    description: "ApiType and InputName must be str-compatible Enum subclasses with correct member values"

  - id: properties_use_enum_types
    type: fail_to_pass
    origin: pr_diff
    description: "api_type and input_name_for_logging properties must return enum instances, not bare strings"

  - id: no_bare_print_uses_logger
    type: fail_to_pass
    origin: pr_diff
    description: "clevr_count_70k.py must not use bare print(); must use logger instead"

  - id: log_message_space_fix
    type: fail_to_pass
    origin: pr_diff
    description: "Warning message in to_tensor_dict must not have implicit string concat bug (missing space)"

  - id: extract_answer_works
    type: pass_to_pass
    origin: pr_diff
    description: "extract_answer still correctly parses bracketed numbers from text"

  - id: reward_fn_edge_cases
    type: pass_to_pass
    origin: pr_diff
    description: "Reward function handles None answer and various inputs correctly"

  - id: no_wildcard_imports
    type: pass_to_pass
    origin: agent_config
    description: "Modified files must not use wildcard imports"
    source:
      path: "AGENTS.md"
      lines: "30"
      commit: "4f5a2944f0acfebba378e5b88bf2ab940f84b943"

  - id: reward_fn_has_return_annotation
    type: fail_to_pass
    origin: agent_config
    description: "clevr_count_70k_reward_fn must have an explicit '-> float' return type annotation"
    source:
      path: "AGENTS.md"
      lines: "99"
      commit: "4f5a2944f0acfebba378e5b88bf2ab940f84b943"

  - id: properties_annotated_with_enum_types
    type: fail_to_pass
    origin: agent_config
    description: "api_type and input_name_for_logging properties must be annotated with enum types (ApiType/InputName), not bare str"
    source:
      path: "AGENTS.md"
      lines: "99"
      commit: "4f5a2944f0acfebba378e5b88bf2ab940f84b943"

  - id: reward_uses_areal_logging
    type: fail_to_pass
    origin: agent_config
    description: "clevr_count_70k.py must import logging from areal.utils, not stdlib"
    source:
      path: "AGENTS.md"
      lines: "89-91"
      commit: "4f5a2944f0acfebba378e5b88bf2ab940f84b943"

  - id: logger_pascalcase_name
    type: fail_to_pass
    origin: agent_config
    description: "getLogger in clevr_count_70k.py must use a PascalCase descriptive name"
    source:
      path: "AGENTS.md"
      lines: "89"
      commit: "4f5a2944f0acfebba378e5b88bf2ab940f84b943"

  - id: test_repo_py_compile
    type: pass_to_pass
    origin: repo_ci
    description: "Modified Python files compile without syntax errors (repo CI check)"

  - id: test_repo_ruff_check
    type: pass_to_pass
    origin: repo_ci
    description: "Modified Python files pass ruff linting (repo CI check)"

  - id: test_repo_ruff_format
    type: pass_to_pass
    origin: repo_ci
    description: "Modified Python files are properly formatted (repo CI check)"

  - id: test_repo_ruff_check_fix
    type: pass_to_pass
    origin: repo_tests
    description: "Modified Python files have no auto-fixable lint issues via ruff check --fix"

  - id: test_repo_import_sorting
    type: pass_to_pass
    origin: repo_tests
    description: "Modified Python files follow isort conventions via ruff import sorting"

rubric:
  - rule: "Changes add str-compatible Enum classes (ApiType, InputName) with correct member values in types.py."
    reference: "class ApiType(str, Enum): COMPLETION = 'completion' RESPONSE = 'response' NONE = 'none'"

  - rule: "Changes add proper return type annotations (-> ApiType, -> InputName) on properties in types.py."
    reference: "def api_type(self) -> ApiType: def input_name_for_logging(self) -> InputName:"

  - rule: "Changes add areal.utils.logging import, create logger with PascalCase name, and replace print() with logger.info() in clevr_count_70k.py."
    reference: "from areal.utils import logging\nlogger = logging.getLogger('CLEVR70KReward')\nlogger.info(f'completions: ...')"
