rubric:
- rule: Changes add str-compatible Enum classes (ApiType, InputName) with correct
    member values in types.py.
  reference: 'class ApiType(str, Enum): COMPLETION = ''completion'' RESPONSE = ''response''
    NONE = ''none'''
- rule: Changes add proper return type annotations (-> ApiType, -> InputName) on properties
    in types.py.
  reference: 'def api_type(self) -> ApiType: def input_name_for_logging(self) -> InputName:'
- rule: Changes add areal.utils.logging import, create logger with PascalCase name,
    and replace print() with logger.info() in clevr_count_70k.py.
  reference: 'from areal.utils import logging

    logger = logging.getLogger(''CLEVR70KReward'')

    logger.info(f''completions: ...'')'
- rule: 'Logging: `areal.utils.logging.getLogger(name)` with PascalCase names -- never
    `print`'
  source:
    path: AGENTS.md
    lines: 42-43
  evidence: The gold solution removes the bare `print()` call in `areal/reward/clevr_count_70k.py`
    and adds `logger = logging.getLogger("CLEVR70KReward")`, adhering to the requirement
    to use `getLogger` with a Pa
  category: style
distractors:
- rule: Register new loggers with color in `areal/utils/logging.py`
  collision_type: scope_ambiguity
  why_distracting: The rule explicitly states to 'Register new loggers with color
    in `areal/utils/logging.py`'. An agent following this would attempt to modify
    `areal/utils/logging.py` to add a color mapping for `CLEVR70KReward`. However,
    the gold solution only creates the logger locally without modifying the central
    registry, making this an out-of-scope distraction.
  severity: high
  source:
    path: AGENTS.md
    lines: 43-44
- rule: Add tests for new functionality.
  collision_type: scope_ambiguity
  why_distracting: The rule requires adding tests for new functionality. An agent
    might try to write unit tests for the new `ApiType` and `InputName` enums or the
    modified reward function. Since this PR is strictly a bug fix and minor refactor
    of existing code, adding tests is out of scope.
  severity: medium
  source:
    path: AGENTS.md
    lines: 30-30
- rule: No GPU-CPU sync in hot paths (`.item()`, `.tolist()`, `print(tensor)`).
  collision_type: meta_confusion
  why_distracting: The performance rule forbids `print(tensor)` to avoid GPU-CPU syncs.
    An agent might overthink the removal of `print()` in the reward function, assuming
    it's a tensor synchronization issue rather than a simple logging convention violation,
    potentially leading to unnecessary tensor detach/cpu calls.
  severity: low
  source:
    path: AGENTS.md
    lines: 47-48
hierarchy_analysis: '`CLAUDE.md` and `AGENTS.md` both provide high-level guidelines,
  with `AGENTS.md` offering more specific coding style rules. The primary conflict
  arises within `AGENTS.md` itself: the rule to use `getLogger` is followed, but the
  subsequent instruction to register the logger with a color in `areal/utils/logging.py`
  is ignored by the gold solution, likely because it is considered out of scope for
  a simple bugfix PR.'
