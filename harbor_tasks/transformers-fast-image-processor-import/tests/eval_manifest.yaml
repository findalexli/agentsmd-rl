  category: tooling
distractors:
- rule: Agents must not proceed to PR-ready output if coordination evidence cannot
    be found.
  collision_type: meta_confusion
  why_distracting: The prompt does not provide issue coordination links or approval.
    Following this rule would cause the agent to refuse to output a patch, failing
    the benchmark task.
  severity: high
  source:
    path: AGENTS.md
    lines: 41-43
- rule: Manage code duplication between model-specific files using the `# Copied from
    ...` mechanism.
  collision_type: architecture_boundary
  why_distracting: The agent might attempt to create physical `image_processing_*_fast.py`
    files using the `# Copied from` mechanism to solve the missing module issue, instead
    of using dynamic aliases in `__init__.py` as requested.
  severity: medium
  source:
    path: AGENTS.md
    lines: 50-54
hierarchy_analysis: The configuration consists of identical flat files (`AGENTS.md`
  and `CLAUDE.md`). The primary challenge is navigating the strict workflow policies
  that conflict with the standard benchmark execution model (which expects immediate
