rubric:
- rule: PRs should be as brief as possible. Bugfix PRs in particular can often be
    only one or two lines long, and do not need large comments, docstrings or new
    functions in this case. Aim to minimize the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: 29db503cdef2f00d1f0ecd5841c3a486708ed1dd
- rule: Do not edit a `# Copied from` block, as it will be reverted by `make fix-repo`.
  source:
    path: CLAUDE.md
    lines: '66'
    commit: 29db503cdef2f00d1f0ecd5841c3a486708ed1dd
- rule: When a `modular` file is present, generated files should not be edited, as
    changes will be overwritten by `make fix-repo`! Instead, edit the `modular` file.
  source:
    path: CLAUDE.md
    lines: '67'
    commit: 29db503cdef2f00d1f0ecd5841c3a486708ed1dd
- rule: The CI will run `make check-repo` and fail if any issues are found.
  source:
    path: CLAUDE.md
    lines: 5-8
  evidence: The gold solution modifies `utils/check_repo.py` to explicitly ignore
    the dynamically created `image_processing_*_fast` modules, ensuring that the `make
    check-repo` CI check does not fail due to undoc
  category: tooling
distractors:
- rule: Manage code duplication in model-specific files using `# Copied from ...`
    or `modular_<name>.py`.
  collision_type: architecture_boundary
  why_distracting: The agent might attempt to create physical `image_processing_*_fast.py`
    files in each model directory using `# Copied from` or `modular_<name>.py` patterns
    to duplicate the standard image processors, instead of using the dynamic module
    aliasing approach in `__init__.py` as instructed.
  severity: high
  source:
    path: CLAUDE.md
    lines: 58-61
- rule: 'Fail-closed behavior for agents: If coordination evidence cannot be found,
    do not proceed to PR-ready output.'
  collision_type: meta_confusion
  why_distracting: The agent might refuse to output the code solution because it cannot
    find 'coordination evidence' or an 'approval link' in the prompt, triggering the
    fail-closed behavior for agents instead of completing the evaluation task.
  severity: high
  source:
    path: CLAUDE.md
    lines: 51-55
hierarchy_analysis: The config hierarchy consists of identical `CLAUDE.md` and `AGENTS.md`
  files at the root level. The rules apply globally to the repository. The primary
  conflict arises from the repository's strict agent contribution policies (requiring
  coordination evidence and avoiding busywork) which conflict with the agent's role
  as an automated solver in an evaluation environment.
