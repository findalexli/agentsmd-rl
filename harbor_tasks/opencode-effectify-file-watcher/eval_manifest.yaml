rubric:
- rule: FileWatcherService follows the same patterns as QuestionService, PermissionService,
    and ProviderAuthService - extends ServiceMap.Service, has static readonly layer
    using Layer.effect, uses Effect.gen
  source:
    path: packages/opencode/src/effect/instances.ts
    lines: 1-30
    commit: d4694d058cc590b0f05261a04460034d2fa8541d
  reference: FileWatcherService extends ServiceMap.Service<FileWatcherService, FileWatcherService.Service>()
    with static readonly layer = Layer.effect(FileWatcherService, Effect.gen(function*
    () { ... }))
- rule: 'AGENTS.md documents Instance-scoped Effect services pattern with 4 steps:
    1) Define ServiceMap.Service with static layer, 2) Add to InstanceServices union,
    3) Use InstanceContext inside layer, 4) Call via runPromiseInstance'
  source:
    path: packages/opencode/AGENTS.md
    lines: 46-77
    commit: 9e740d9947e6a4c61680c8dd00cb1fd11adf12af
  reference: Instance-scoped Effect services section with LayerMap, FileWatcherService,
    QuestionService, PermissionService, ProviderAuthService examples
- rule: AGENTS.md documents Instance.bind with when to use it (native C/C++ addons
    like @parcel/watcher, node-pty) and when not needed (setTimeout, Promise.then,
    EventEmitter.on, Effect fibers)
  source:
    path: packages/opencode/AGENTS.md
    lines: 1-50
    commit: d4694d058cc590b0f05261a04460034d2fa8541d
  reference: Instance.bind captures ALS context for native callbacks. Use it for native
    C/C++ addons. Don't need it for setTimeout, Promise.then, EventEmitter.on, or
    Effect fibers.
distractors:
- rule: Use Bun APIs when possible, like `Bun.file()`
  collision_type: would_cause_bug
  why_distracting: The task explicitly mentions handling native C++ callbacks from
    `@parcel/watcher`. An agent might try to replace `@parcel/watcher` with Bun's
    built-in file watching APIs to follow the "Use Bun APIs" rule, which would break
    the specific requirement to integrate with the existing `@parcel/watcher` setup.
  severity: high
  source:
    path: AGENTS.md
    lines: 15-15
- rule: Use single word names by default for new locals, params, and helper functions.
    Multi-word names are allowed only when a single word would be unclear or ambiguous.
  collision_type: rule_conflict
  why_distracting: The task explicitly requires naming the new service `FileWatcherService`.
    The strict naming enforcement rule mandates single-word names and explicitly forbids
    multi-word names unless necessary. An agent might try to name the service `Watcher`
    or `FileWatcher` instead of the requested `FileWatcherService` to comply with
    the style guide.
  severity: medium
  source:
    path: AGENTS.md
    lines: 27-32
- rule: Keep things in one function unless composable or reusable
  collision_type: architecture_boundary
  why_distracting: The task requires refactoring a namespace into a `ServiceMap.Service`
    class with a `static readonly layer`, `Effect.gen` for composition, and `Effect.addFinalizer`
    for cleanup. The agent might try to cram all this into a single function instead
    of properly structuring the class and its layer definition as required by the
    Effect service pattern.
  severity: medium
  source:
    path: AGENTS.md
    lines: 11-11
hierarchy_analysis: The `AGENTS.md` file provides general guidelines that conflict
  with the specific architectural requirements of the task. The task instructions
  require specific naming (`FileWatcherService`) and specific library usage (`@parcel/watcher`),
  which override the general rules to use single-word names and Bun APIs.
