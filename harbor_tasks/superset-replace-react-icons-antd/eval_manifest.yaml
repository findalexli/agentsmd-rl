distractors:
- rule: Use @superset-ui/core - Don't import Ant Design directly, prefer Ant Design
    component wrappers from @superset-ui/core/components
  collision_type: rule_conflict
  why_distracting: The prompt explicitly requires importing from `@ant-design/icons`.
    The rule forbids importing Ant Design directly, which might lead the agent to
    search for non-existent icon wrappers in `@superset-ui/core` or fail to complete
    the task.
  severity: high
  source:
    path: CLAUDE.md
    lines: 28-29
- rule: Functional components with hooks
  collision_type: scope_ambiguity
  why_distracting: '`TableRenderers.tsx` is an existing class component. Refactoring
    it to a functional component to satisfy this rule would be a massive scope creep
    and violate the instruction ''Keep the same functionality - only the icon components
    should change''.'
  severity: high
  source:
    path: CLAUDE.md
    lines: 72-73
hierarchy_analysis: The configuration files CLAUDE.md and AGENTS.md are identical
  and provide general guidelines for the Superset repository. The primary conflict
  arises between the general rule to avoid direct Ant Design imports and the specific
  PR instruction to use `@ant-design/icons`. The PR-specific instruction must override
  the general repository guideline.
