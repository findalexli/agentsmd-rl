rubric:
- rule: Keep your changes minimal - only modify runtime/permissions/lib.rs without
    touching unrelated files like cli/args/flags.rs.
  source:
    path: runtime/permissions/lib.rs
  reference: The gold solution modifies only runtime/permissions/lib.rs (130 lines
    changed) with 113 insertions and 17 deletions, without touching unrelated files.
- rule: Match existing patterns - add comparison_path() function adjacent to the PathDescriptor
    and PathQueryDescriptor structs, following the existing pattern.
  source:
    path: runtime/permissions/lib.rs
  reference: The gold solution adds comparison_path() function as a module-level helper
    function in runtime/permissions/lib.rs, placed between the PathQueryDescriptor
    impl block and the PathDescriptor struct, following the existing pattern of helper
    functions located near the types that use them.
- rule: Place integration tests (spec tests) in the `tests/specs/` directory.
  source:
    path: tests/specs/permission/path_case_insensitive/__test__.jsonc
  reference: 'The gold solution creates __test__.jsonc with {"if": "windows", "args":
    "run -A main.ts"} in tests/specs/permission/path_case_insensitive/ directory.'
  category: testing
- rule: Modify runtime/permissions/lib.rs for filesystem permission path comparison,
    following the architectural guidance that the deno_runtime crate handles system
    access.
  source:
    path: runtime/permissions/lib.rs
  reference: The gold solution modifies only runtime/permissions/lib.rs in the deno_runtime
    crate to implement case-insensitive path comparison for Windows, adding cmp_path
    fields to PathDescriptor and PathQueryDescriptor structs, and updating all comparison
    logic (PartialEq, Hash, starts_with, cmp_allow_allow, cmp_allow_deny) to use cmp_path
    instead of path. This aligns with the architectural guidance that the runtime
    crate handles system-level access control.
  category: architecture
