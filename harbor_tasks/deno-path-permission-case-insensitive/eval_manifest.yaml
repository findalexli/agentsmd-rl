distractors:
- rule: The extensions themselves are in the `ext/` directory, and provide system
    access to JavaScript – for instance filesystem operations and networking.
  collision_type: architecture_boundary
  why_distracting: The rule states that extensions providing system access (like filesystem
    operations) are in the `ext/` directory. An agent might mistakenly try to implement
    the path permission case-insensitivity logic in `ext/fs` or similar, but the core
    permission descriptor logic actually resides in `runtime/permissions/lib.rs`.
  severity: high
  source:
    path: CLAUDE.md
    lines: 59-61
- rule: Open a pull request (PR) against the main branch on GitHub.
  collision_type: meta_confusion
  why_distracting: The agent is operating in an environment where it needs to generate
    a patch or edit files directly to solve the issue. Instructing it to open a pull
    request on GitHub is meta-instructional and irrelevant to the coding task.
  severity: low
  source:
    path: CLAUDE.md
    lines: 28-28
- rule: Create as many commits as you need, all of them get squashed when the PR is
    merged, so there is no need to rewrite history.
  collision_type: meta_confusion
  why_distracting: The agent might attempt to generate git commit commands or split
    its output into multiple logical commits, which is unnecessary and unsupported
    in the evaluation environment.
  severity: low
  source:
    path: CLAUDE.md
    lines: 39-41
