rubric:
- rule: 'Go code fix: IsZero() method should be concise and follow brevity principle'
  source:
    path: modules/module.go
    lines: IsZero() implementation
    commit: 68059972e8789258447e31ca23641c79598d66be
- rule: Use short variable names when the context is clear.
  source:
    path: AGENTS.md
    lines: 4-5
  evidence: The gold solution uses short variable names like `o` for the `ModuleOrigin`
    receiver and `b` for the byte slice returned by `afero.ReadFile`.
  category: naming
- rule: Never export symbols that's not needed outside of the package.
  source:
    path: AGENTS.md
    lines: 7-7
  evidence: The `info` struct used to unmarshal the JSON file in `modules/client.go`
    is defined inline and unexported, preventing unnecessary package-level exports.
  category: architecture
distractors:
- rule: Brevity is good. This applies to code, comments and commit messages. Don't
    write a novel.
  collision_type: scope_ambiguity
  why_distracting: The gold solution includes a 6-line comment block explaining the
    Go issue 67363, the `.info` file fallback, and the JSON structure. An agent strictly
    following 'brevity is good' and 'don't write a novel' might omit this crucial
    context, making the workaround hard to understand.
  severity: medium
  source:
    path: AGENTS.md
    lines: 12-12
- rule: assume that a similiar problem has been solved before, look hard for helper
    functions before creating new ones.
  collision_type: scope_ambiguity
  why_distracting: The agent might waste time searching for an existing helper function
    to parse `.info` files or handle the Go module origin bug, but this is a specific
    edge case that requires inline handling with `afero.ReadFile` and `json.Unmarshal`.
  severity: low
  source:
    path: AGENTS.md
    lines: 9-9
hierarchy_analysis: 'The AGENTS.md file provides general Go conventions. The rules
  around brevity and avoiding obvious comments conflict with the need to document
  a complex workaround for an upstream Go bug (issue #67363). The agent must recognize
  that documenting a hack/workaround is not ''explaining the obvious'' and supersedes
  the brevity rule.'
