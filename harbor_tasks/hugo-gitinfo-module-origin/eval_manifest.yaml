rubric:
- rule: 'Go code fix: IsZero() method should be concise and follow brevity principle'
  source:
    path: modules/module.go
    lines: IsZero() implementation
    commit: 68059972e8789258447e31ca23641c79598d66be
- rule: Use short variable names when the context is clear.
  source:
    path: AGENTS.md
    lines: 4-5
  evidence: The gold solution uses short variable names like `o` for the `ModuleOrigin`
    receiver and `b` for the byte slice returned by `afero.ReadFile`.
  category: naming
- rule: Never export symbols that's not needed outside of the package.
  source:
    path: AGENTS.md
    lines: 7-7
  evidence: The `info` struct used to unmarshal the JSON file in `modules/client.go`
    is defined inline and unexported, preventing unnecessary package-level exports.
  category: architecture
distractors:
- rule: Brevity is good. This applies to code, comments... Don't write a novel. Don't
    use comments to explain the obvious.
  collision_type: scope_ambiguity
  why_distracting: The gold solution includes a very detailed, multi-line comment
    explaining the workaround for a Go upstream issue (golang/go#67363) and the structure
    of the JSON file. An agent strictly following the brevity rule might omit this
    crucial context, making the workaround seem like magic.
  severity: medium
  source:
    path: AGENTS.md
    lines: 2-4, 13-13
hierarchy_analysis: The config hierarchy is flat, with all rules contained in AGENTS.md
  (referenced by CLAUDE.md). The agent must balance the general instruction for brevity
  against the specific need to document a complex workaround for an upstream bug.
version: '2.0'
