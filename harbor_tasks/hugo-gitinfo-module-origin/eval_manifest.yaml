rubric:
  - rule: "Go code fix: IsZero() method should be concise and follow brevity principle"
    source:
      path: "modules/module.go"
      lines: "IsZero() implementation"
      commit: "68059972e8789258447e31ca23641c79598d66be"

agent_config:
  - file: AGENTS.md
    lines: "1-14"
    rules:
      - "Brevity is good - don't write novels in code or comments"
      - "Assume Go experts - don't explain the obvious"
      - "Use self-explanatory variable and function names"
      - "Use short variable names when context is clear"
      - "Use hdebug.Printf for temporary debug (CI fails if not removed)"
      - "Never export symbols not needed outside the package"
      - "Avoid global state at (almost) all cost"
      - "Look for helper functions before creating new ones"
      - "In tests, use qt matchers instead of raw if/t.Fatal"
      - "In tests, use latest Hugo specification (layouts/page.html not layouts/_default/single.html)"
