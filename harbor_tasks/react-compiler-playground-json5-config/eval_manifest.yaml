    commit: 74568e8627aa43469b74f2972f427a209639d0b6
- rule: Format code with `yarn prettier-all` when modifying compiler files. Code must
    pass formatting checks.
  source:
    path: compiler/CLAUDE.md
    lines: 45-50
    commit: 74568e8627aa43469b74f2972f427a209639d0b6
- rule: Use Sapling (`sl`) commands for version control, not git. Use `sl addremove`
    to track new/deleted files and `sl commit` to commit changes.
  source:
    path: compiler/CLAUDE.md
    lines: 77-98
    commit: 74568e8627aa43469b74f2972f427a209639d0b6
- rule: React Compiler files are located in the `/compiler/` directory.
  source:
    path: CLAUDE.md
    lines: 8-9
  evidence: The gold solution correctly targets files within the `/compiler/` directory
    (`compiler/apps/playground/...`) for React Compiler related changes, respecting
    the monorepo structure.
  category: architecture
distractors:
- rule: Use Sapling (`sl`) for version control (e.g., `sl status`, `sl addremove`,
    `sl commit`).
  collision_type: meta_confusion
  why_distracting: The instructions state to use Sapling (`sl`) for version control,
    but the standard evaluation environment uses `git` (as seen in the gold solution's
    `git status` and `git commit` commands). Attempting to use `sl` will fail and
    waste agent effort.
  severity: high
  source:
    path: compiler/CLAUDE.md
    lines: 61-75
- rule: Run tests using `yarn snap` or `yarn snap -p <pattern>`.
  collision_type: architecture_boundary
  why_distracting: The instructions tell the developer to use `yarn snap` to run tests.
    However, `yarn snap` is specific to the `babel-plugin-react-compiler` package
    and its fixture tests. The changes in this PR are in `compiler/apps/playground/`,
    which has its own tests. Running `yarn snap` will not test the playground changes.
  severity: high
  source:
    path: compiler/CLAUDE.md
    lines: 20-33
- rule: When modifying the compiler, you MUST read the documentation about that pass
    in `docs/passes/`.
  collision_type: scope_ambiguity
  why_distracting: The instructions mandate reading documentation in `docs/passes/`
    when modifying the compiler. This PR modifies the playground app's config parsing,
    not the compiler's internal passes, making this rule irrelevant and distracting.
  severity: medium
  source:
    path: compiler/CLAUDE.md
    lines: 11-18
hierarchy_analysis: The root `CLAUDE.md` correctly routes React Compiler tasks to
  the `/compiler/` directory. However, `compiler/CLAUDE.md` is heavily biased towards
  the `babel-plugin-react-compiler` package (the core compiler) rather than the `apps/playground`
  package. This creates significant scope ambiguity and architecture boundary collisions,
  as the tooling (`yarn snap`), linting, and documentation rules in `compiler/CLAUDE.md`
  do not apply to the playground app being modified in this PR. Additionally, the
  version control instructions (`sl`) conflict with the standard git environment.
