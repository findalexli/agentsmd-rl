rubric:
- rule: Run compiler tests with `yarn snap` when modifying compiler files. Tests should
    pass before submitting.
  source:
    path: compiler/CLAUDE.md
    lines: 21-36
    commit: 74568e8627aa43469b74f2972f427a209639d0b6
  reference: DISTRACTOR - This rule applies to core compiler passes, not the playground
    app.
- rule: Format code with `yarn prettier-all` when modifying compiler files. Code must
    pass formatting checks.
  source:
    path: compiler/CLAUDE.md
    lines: 45-50
    commit: 74568e8627aa43469b74f2972f427a209639d0b6
  reference: DISTRACTOR - This rule is for core compiler package.
- rule: Use Sapling (`sl`) commands for version control, not git. Use `sl addremove`
    to track new/deleted files and `sl commit` to commit changes.
  source:
    path: compiler/CLAUDE.md
    lines: 77-98
    commit: 74568e8627aa43469b74f2972f427a209639d0b6
  reference: DISTRACTOR - The environment uses git, not sl.
- rule: React Compiler playground files are located in the `/compiler/apps/playground/`
    directory. Changes to the playground app should only modify files within this directory
    tree, not the core compiler packages.
  reference: 'PASS: The gold solution correctly modifies files within /compiler/apps/playground/
    (compilation.ts, defaultStore.ts, ConfigEditor.tsx, package.json, page.spec.ts).
    This rule is satisfied because all changed files are in the compiler/apps/playground/
    directory.'
distractors:
- rule: When modifying the compiler, you MUST read the documentation about that pass
    in compiler/packages/babel-plugin-react-compiler/docs/passes/
  collision_type: scope_ambiguity
  why_distracting: The task is to fix an XSS vulnerability in the playground's config
    parser, which is a separate app, not a compiler pass. Looking for pass documentation
    would waste time and confuse the agent.
  severity: medium
  source:
    path: compiler/CLAUDE.md
    lines: 8-10
- rule: Run all tests using `yarn snap`
  collision_type: scope_ambiguity
  why_distracting: '`yarn snap` is for the main compiler package''s snapshot tests,
    but the task involves the playground app. The agent might try to run `yarn snap`
    to test its changes and get confused when it doesn''t run the playground tests.'
  severity: medium
  source:
    path: compiler/CLAUDE.md
    lines: 20-22
- rule: This repository uses Sapling (sl) for version control.
  collision_type: meta_confusion
  why_distracting: The agent might try to use `sl` commands to check status or commit,
    which could fail or cause confusion if the environment uses `git` (as seen in
    the gold solution's `git status`).
  severity: low
  source:
    path: compiler/CLAUDE.md
    lines: 60-62
hierarchy_analysis: The root CLAUDE.md delegates compiler-specific instructions to
  compiler/CLAUDE.md. However, compiler/CLAUDE.md is heavily focused on the babel-plugin-react-compiler
  package, whereas this task is in compiler/apps/playground. The agent must recognize
  this scope boundary and not apply compiler-pass rules to the playground app.
