    > First-party developers can load encrypted secrets from `priv/secrets/dev.key`.
    External contributors don''t need this key — the server runs locally without it.
    OAuth, Stripe, and other third-party integrations will be disabled, but core functionality
    works.'
  gold_removed: '1. Clone the repository: `git clone https://github.com/tuist/server.git`.

    1. Get the private key from 1Password.

    1. Create a `priv/secrets/dev.key` file and add the key to decrypt the secrets
    needed for development.

    1. Install additional system dependencies with: `mise install`.

    1. Create a new database with: `mise run db:create`.

    1. Load the data into database with: `mise run db:load`.

    1. Seed your database with data: `mise run db:seed`.

    1. We already have a pre-made user account that you can use to test the server:'
distractors:
- rule: Private key from 1Password for `priv/secrets/dev.key` is a prerequisite.
  collision_type: rule_conflict
  why_distracting: The PR's explicit goal is to remove the 1Password key requirement
    for external contributors. The config file lists it as a strict prerequisite,
    which contradicts the new simplified setup instructions the agent is supposed
    to implement.
  severity: high
  source:
    path: server/AGENTS.md
    lines: 24-25
- rule: Setup Commands include `mise run db:create`, `mise run db:load`, `mise run
    db:seed`.
  collision_type: rule_conflict
  why_distracting: The PR simplifies the database setup instructions in the README
    to use `mise run db:setup`. The config file still lists the verbose individual
    commands (`db:create`, `db:load`, `db:seed`), which might lead an agent to retain
    them or add them back instead of simplifying.
  severity: medium
  source:
    path: server/AGENTS.md
    lines: 27-35
hierarchy_analysis: The `server/AGENTS.md` file contains outdated setup instructions
  that conflict with the PR's goal of simplifying the contributor experience. The
  agent must prioritize the PR instructions over the outdated config file prerequisites.
  The global rule to not edit `.po` files (in `CLAUDE.md` and `server/AGENTS.md`)
  is correctly followed by only modifying the `.pot` template.
