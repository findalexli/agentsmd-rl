# Rubric for soft/subjective rules from AGENTS.md
# Note: The gold solution only modifies stripe_service.py and user_store.py (not test files)
# The original rubric rules about AsyncMock and database testing were not applicable
# since no test files are modified by this PR.
rubric:
  - rule: "migrate_customer should accept session as first parameter"
    weight: 1.0
    source: "enterprise/integrations/stripe_service.py"
    description: "The function signature should be migrate_customer(session, user_id, org)"
    reference: "async def migrate_customer(session, user_id: str, org: Org):"

  - rule: "migrate_customer should use passed session, not create new one"
    weight: 1.0
    source: "enterprise/integrations/stripe_service.py"
    description: "Function should call session.execute() directly, not use a_session_maker()"
    reference: "result = await session.execute("
