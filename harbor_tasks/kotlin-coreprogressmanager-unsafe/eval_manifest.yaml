source:
  pr:
    owner: JetBrains
    repo: kotlin
    number: 5736
    title: "IJ SDK: adjust CoreProgressManager to avoid using sun.misc.Unsafe"
    base_commit: 65fee3c3cad8012a6aad3df7554a1dd20dfb8d22
    merge_commit: 078e58a774eb0921aa7554d41e60d011db46754d
  files:
    - compiler/cli/src/com/intellij/openapi/progress/impl/CoreProgressManager.java

# Checks map 1:1 to test_outputs.py functions
checks:
  - id: "no_concurrent_long_object_map_import"
    name: "ConcurrentLongObjectMap import removed"
    description: "The import for ConcurrentLongObjectMap should be removed"
    type: "f2p"  # Fail-to-pass: base commit has this import

  - id: "no_java11shim_import"
    name: "Java11Shim import removed"
    description: "The import for Java11Shim should be removed"
    type: "f2p"  # Fail-to-pass: base commit has this import

  - id: "concurrent_map_field_type"
    name: "currentIndicators uses ConcurrentMap type"
    description: "The currentIndicators field should be declared as ConcurrentMap<Long, ProgressIndicator>"
    type: "f2p"  # Fail-to-pass: base commit uses ConcurrentLongObjectMap

  - id: "concurrent_hashmap_instantiation"
    name: "currentIndicators uses ConcurrentHashMap"
    description: "The currentIndicators field should be instantiated with new ConcurrentHashMap<>()"
    type: "f2p"  # Fail-to-pass: base commit uses Java11Shim factory

  - id: "thread_top_level_indicators_field_type"
    name: "threadTopLevelIndicators uses ConcurrentMap type"
    description: "The threadTopLevelIndicators field should be declared as ConcurrentMap<Long, ProgressIndicator>"
    type: "f2p"  # Fail-to-pass: base commit uses ConcurrentLongObjectMap

  - id: "both_fields_use_concurrent_hashmap"
    name: "Both indicator fields use ConcurrentHashMap"
    description: "Both currentIndicators and threadTopLevelIndicators should use ConcurrentHashMap"
    type: "f2p"

  - id: "java_compiles"
    name: "Java file compiles"
    description: "The modified Java file should have no syntax errors"
    type: "p2p"  # Pass-to-pass: base commit also compiles

  - id: "javadoc_updated"
    name: "JavaDoc updated"
    description: "The class JavaDoc should mention the sun.misc.Unsafe workaround"
    type: "f2p"  # Fail-to-pass: base commit doesn't have this documentation

  - id: "no_java11shim_create_call"
    name: "No Java11Shim factory calls remain"
    description: "All createConcurrentLongObjectMap() calls should be removed"
    type: "f2p"  # Fail-to-pass: base commit has these calls

  - id: "concurrent_map_import_present"
    name: "ConcurrentMap import present"
    description: "The file should import from java.util.concurrent package"
    type: "p2p"  # Pass-to-pass: already present in base commit (for other types)

  # Pass-to-Pass: Repo CI/CD Checks (using actual repo tooling via subprocess.run)
  - id: "test_repo_java_syntax_valid"
    name: "Java syntax validation"
    description: "Java file has no syntax errors (verified via javac)"
    type: "p2p"
    origin: "repo_tests"

  - id: "test_repo_no_bom"
    name: "No UTF-8 BOM marker"
    description: "Java file does not have a UTF-8 Byte Order Mark (verified via od command)"
    type: "p2p"
    origin: "repo_tests"

  - id: "test_repo_no_tabs"
    name: "No tab characters"
    description: "Java file uses spaces for indentation, no tabs (verified via grep -P \\t)"
    type: "p2p"
    origin: "repo_tests"

  - id: "test_repo_trailing_whitespace"
    name: "No trailing whitespace"
    description: "Java file has no trailing whitespace on any line (verified via grep)"
    type: "p2p"
    origin: "repo_tests"

  - id: "test_repo_newline_at_eof"
    name: "Newline at end of file"
    description: "Java file ends with a proper newline character (verified via od command)"
    type: "p2p"
    origin: "repo_tests"

  - id: "test_repo_package_declaration_valid"
    name: "Package declaration valid"
    description: "Java file has correct package declaration (verified via grep)"
    type: "p2p"
    origin: "repo_tests"

  - id: "test_repo_class_structure_valid"
    name: "Class structure valid"
    description: "CoreProgressManager class is properly declared (verified via grep)"
    type: "p2p"
    origin: "repo_tests"

  - id: "test_repo_copyright_header"
    name: "Copyright header present"
    description: "Java file contains JetBrains copyright header (verified via grep)"
    type: "p2p"
    origin: "repo_tests"

  - id: "test_repo_license_header"
    name: "Apache 2.0 license reference present"
    description: "Java file contains Apache 2.0 license reference (verified via grep)"
    type: "p2p"
    origin: "repo_tests"

  - id: "test_repo_imports_concurrent"
    name: "java.util.concurrent imports present"
    description: "Java file imports from java.util.concurrent package (verified via grep)"
    type: "p2p"
    origin: "repo_tests"

  - id: "test_repo_no_sun_misc_unsafe"
    name: "No sun.misc.Unsafe imports"
    description: "Java file does not directly import sun.misc.Unsafe (verified via grep)"
    type: "p2p"
    origin: "repo_tests"

  - id: "test_repo_no_windows_line_endings"
    name: "Unix line endings only"
    description: "Java file uses Unix-style LF line endings, no CRLF (verified via grep)"
    type: "p2p"
    origin: "repo_tests"

  - id: "test_repo_file_not_empty"
    name: "File is not empty"
    description: "Java file has substantial content (verified via wc -c)"
    type: "p2p"
    origin: "repo_tests"

  - id: "test_repo_no_merge_conflict_markers"
    name: "No merge conflict markers"
    description: "Java file has no git merge conflict markers (verified via grep)"
    type: "p2p"
    origin: "repo_tests"

