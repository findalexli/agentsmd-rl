name = "kotlin-coreprogressmanager-unsafe"
version = "1.0.0"
description = "Replace sun.misc.Unsafe-based ConcurrentLongObjectMap with ConcurrentHashMap in CoreProgressManager"

[repository]
url = "https://github.com/JetBrains/kotlin"
base_commit = "65fee3c3cad8012a6aad5df7554a1dd20dfb8d22"
merge_commit = "078e58a774eb0921aa7554d41e60d011db46754d"
pr_number = 5736

[metadata]
title = "IJ SDK: adjust CoreProgressManager to avoid using sun.misc.Unsafe"
owner = "JetBrains"
repo = "kotlin"

[task]
# Difficulty: easy - single file, straightforward replacement
difficulty = "easy"
tags = ["java", "concurrency", "jdk-compatibility", "refactoring"]
categories = ["code-maintenance"]

# Time estimates (in seconds)
estimated_time = 300
agent_timeout = 1800
verifier_timeout = 120

[files]
target = [
    "compiler/cli/src/com/intellij/openapi/progress/impl/CoreProgressManager.java"
]

[verifier]
script = "tests/test.sh"
