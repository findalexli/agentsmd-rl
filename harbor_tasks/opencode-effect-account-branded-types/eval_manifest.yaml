config_edits:
- path: packages/opencode/AGENTS.md
  tier: 1
  gold_added: '# opencode Effect guide


    Instructions to follow when writing Effect.


    ## Schemas


    - Use `Schema.Class` for data types with multiple fields.

    - Use branded schemas (`Schema.brand`) for single-value types.


    ## Services


    - Services use `ServiceMap.Service<ServiceName, ServiceName.Service>()("@console/<Name>")`.

    - In `Layer.effect`, always return service implementations with `ServiceName.of({ ... })`, never a plain object.


    ## Errors


    - Use `Schema.TaggedErrorClass` for typed errors.

    - For defect-like causes, use `Schema.Defect` instead of `unknown`.

    - In `Effect.gen`, prefer `yield* new MyError(...)` over `yield* Effect.fail(new MyError(...))` for direct early-failure branches.


    ## Effects


    - Use `Effect.gen(function* () { ... })` for composition.

    - Use `Effect.fn("ServiceName.method")` for named/traced effects and `Effect.fnUntraced` for internal helpers.

    - `Effect.fn` / `Effect.fnUntraced` accept pipeable operators as extra arguments, so avoid unnecessary `flow` or outer `.pipe()` wrappers.


    ## Time


    - Prefer `DateTime.nowAsDate` over `new Date(yield* Clock.currentTimeMillis)` when you need a `Date`.


    ## Errors


    - In `Effect.gen/fn`, prefer `yield* new MyError(...)` over `yield* Effect.fail(new MyError(...))` for direct early-failure branches.

    ## Naming - Prefer single word variable names where possible (e.g., `pid`, `cfg`, `err`, `opts`, `dir`). - Multi-word names are allowed only when a single word would be unclear or ambiguous.'
  gold_removed: ''
distractors:
- rule: Use single word names by default... Do not introduce new camelCase compounds when a short single-word alternative is clear.
  collision_type: rule_conflict
  why_distracting: The config strictly forbids multi-word camelCase compounds and mandates single-word names, but the task explicitly requires creating branded types named `RefreshToken`, `DeviceCode`, `UserCode`, `AccessToken`, and `AccountID`.
  severity: high
  source:
    path: AGENTS.md
    lines: 20-33
- rule: Rely on type inference when possible; avoid explicit type annotations or interfaces unless necessary for exports or clarity
  collision_type: rule_conflict
  why_distracting: The config advises avoiding explicit type annotations, but the task requires adding explicit `$type<...>()` annotations to the Drizzle schema to enforce the new branded types.
  severity: medium
  source:
    path: AGENTS.md
    lines: 14-15
hierarchy_analysis: The agent must navigate a 3-level hierarchy. Crucially, the task requires the agent to edit the level 2 config file (`packages/opencode/AGENTS.md`) to add new rules based on the refactor, making this a meta-referential task where the agent writes its own future instructions.
