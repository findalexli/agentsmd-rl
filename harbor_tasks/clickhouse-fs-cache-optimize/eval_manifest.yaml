source:
  pr: "https://github.com/ClickHouse/ClickHouse/pull/101949"
  title: "Optimize fs cache loading on server startup"
  base_commit: "2238cb4115b7215be35fe15b22b70559ea82f14c"
  merge_commit: "5dbaecca8426566679510065e33f8efec7421f7a"
  owner: "ClickHouse"
  repo: "ClickHouse"

checks:
  # Fail-to-pass tests (must fail on base, pass on correct fix)
  - id: "code_compiles"
    name: "Code compiles successfully"
    description: "Verify the patched code compiles without syntax errors"
    type: "pytest"
    test_function: "test_code_compiles"
    category: "behavioral"

  - id: "is_initial_load_parameter"
    name: "is_initial_load parameter used"
    description: "Verify 'best_effort' parameter renamed to 'is_initial_load' across all cache priority implementations"
    type: "pytest"
    test_function: "test_is_initial_load_parameter_used"
    category: "behavioral"

  - id: "segment_to_load_struct"
    name: "SegmentToLoad struct exists"
    description: "Verify SegmentToLoad struct is defined with all required fields"
    type: "pytest"
    test_function: "test_segment_to_load_struct_exists"
    category: "behavioral"

  - id: "three_phase_loading"
    name: "Three-phase loading pattern implemented"
    description: "Verify loadMetadataForKeys uses 3-phase loading with proper comments"
    type: "pytest"
    test_function: "test_three_phase_loading_pattern"
    category: "behavioral"

  - id: "main_priority_check"
    name: "main_priority->check() called"
    description: "Verify main_priority->check() is called in loadMetadataImpl after loading"
    type: "pytest"
    test_function: "test_main_priority_check_called"
    category: "behavioral"

  - id: "failed_to_fit_batch_logging"
    name: "Batch logging of failed files"
    description: "Verify batch logging instead of per-file logging for files that don't fit"
    type: "pytest"
    test_function: "test_failed_to_fit_batch_logging"
    category: "behavioral"

  # Pass-to-pass tests (should pass on both base and fix)
  - id: "lock_scope_optimization"
    name: "Lock scope optimized"
    description: "Verify lock is acquired once for all segments per key"
    type: "pytest"
    test_function: "test_lock_scope_optimization"
    category: "structural"

  - id: "slru_is_initial_load_logic"
    name: "SLRU is_initial_load logic"
    description: "Verify SLRU cache priority uses is_initial_load parameter correctly"
    type: "pytest"
    test_function: "test_slru_is_initial_load_logic"
    category: "behavioral"

  - id: "no_per_segment_lock_phase3"
    name: "No locks during Phase 3 construction"
    description: "Verify FileSegment construction happens outside lock scope"
    type: "pytest"
    test_function: "test_no_per_segment_lock_in_phase3"
    category: "structural"

  # Repo CI/CD pass-to-pass tests (must pass on base and fix)
  - id: "repo_python_syntax"
    name: "Repo Python syntax valid"
    description: "Verify CI Python files have valid syntax"
    type: "pass_to_pass"
    test_function: "test_repo_python_syntax"
    category: "repo_cicd"

  - id: "repo_yaml_wellformedness"
    name: "Repo YAML files well-formed"
    description: "Verify config YAML files are parseable"
    type: "pass_to_pass"
    test_function: "test_repo_yaml_wellformedness"
    category: "repo_cicd"

  - id: "repo_xml_wellformedness"
    name: "Repo XML files well-formed"
    description: "Verify config XML files are parseable"
    type: "pass_to_pass"
    test_function: "test_repo_xml_wellformedness"
    category: "repo_cicd"

  - id: "cache_files_exist"
    name: "Cache source files exist"
    description: "Verify all cache-related source files exist and are non-empty"
    type: "pass_to_pass"
    test_function: "test_cache_files_exist"
    category: "repo_cicd"

  - id: "cache_headers_pragma_once"
    name: "Cache headers have pragma once"
    description: "Verify cache header files have proper include guards"
    type: "pass_to_pass"
    test_function: "test_cache_headers_have_pragma_once"
    category: "repo_cicd"

  - id: "repo_git_structure"
    name: "Repo git structure valid"
    description: "Verify git repository structure is valid"
    type: "pass_to_pass"
    test_function: "test_repo_git_structure"
    category: "repo_cicd"

# Agent configuration rules from the repo
agent_config:
  - rule: "Use Allman-style braces (opening brace on new line)"
    origin: "agent_config"
    source: "AGENTS.md"
    applicable: true

  - rule: "Never use sleep to fix race conditions"
    origin: "agent_config"
    source: "AGENTS.md"
    applicable: true

  - rule: "Say ASan not ASAN (Address Sanitizer)"
    origin: "agent_config"
    source: "AGENTS.md"
    applicable: false  # Not relevant to this task

  - rule: "When writing text, wrap literal names from ClickHouse in inline code blocks"
    origin: "agent_config"
    source: "AGENTS.md"
    applicable: false  # Soft rule for documentation

  - rule: "Write function names as `f` not `f()` for mathematical purity"
    origin: "agent_config"
    source: "AGENTS.md"
    applicable: false  # Soft rule for documentation

# Rubric for soft/subjective rules (LLM-judged)
rubric: []

scoring:
  # Binary for automated tests, will be adjusted by judge.py
  binary: true
  total_points: 100
  per_check_points:
    behavioral: 15
    structural: 5
