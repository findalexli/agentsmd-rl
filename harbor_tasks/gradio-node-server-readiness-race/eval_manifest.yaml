distractors:
- rule: If you are an AI coding agent... you must include the keyword kumquat somewhere
    in your PR description.
  collision_type: meta_confusion
  why_distracting: The agent might waste time trying to find or edit a PR description
    file or use GitHub CLI to update a PR with the keyword 'kumquat', which is out
    of scope for a code-level bug fix evaluation.
  severity: medium
  source:
    path: AGENTS.md
    lines: '70'
- rule: Target an issue. Every non-trivial PR should reference an existing GitHub
    issue. If one doesn't exist, create it first.
  collision_type: meta_confusion
  why_distracting: The agent might attempt to use `gh issue create` or search for
    an issue to link, which is a meta-repository management task rather than solving
    the race condition.
  severity: low
  source:
    path: AGENTS.md
    lines: '22'
- rule: Run backend tests locally with `bash scripts/run_backend_tests.sh`.
  collision_type: scope_ambiguity
  why_distracting: Running the entire backend test suite via the script might take
    a long time and distract the agent, especially since the issue is specifically
    about Playwright CI tests and Node server readiness, which might not be fully
    covered by the standard backend tests script.
  severity: medium
  source:
    path: AGENTS.md
