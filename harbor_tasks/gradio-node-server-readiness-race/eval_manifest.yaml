version: "2.0"

source:
  repo: "gradio-app/gradio"
  pr: 0  # synthetic task — no single upstream PR
  base_commit: "a35f5896e43d2585d9206e8256b4d7e321fcd0fe"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "node_server.py must be syntactically valid Python"

  - id: http_500_server_not_ready
    type: fail_to_pass
    origin: pr_diff
    description: "Server returning HTTP 500 must NOT be considered ready"

  - id: tcp_only_server_not_ready
    type: fail_to_pass
    origin: pr_diff
    description: "TCP-listening but HTTP-unresponsive server must NOT be considered ready"

  - id: http_200_server_ready
    type: pass_to_pass
    origin: pr_diff
    description: "Server returning HTTP 200 is detected as ready"

  - id: http_404_server_ready
    type: pass_to_pass
    origin: pr_diff
    description: "Server returning HTTP 404 (< 500) is still considered ready"

  - id: http_302_server_ready
    type: pass_to_pass
    origin: pr_diff
    description: "Server returning HTTP 302 redirect (< 500) is still ready"

  - id: no_server_returns_false
    type: pass_to_pass
    origin: pr_diff
    description: "No server listening on port returns False"

  - id: attempt_connection_not_broken
    type: pass_to_pass
    origin: pr_diff
    description: "attempt_connection still works after changes (regression)"

  - id: ruff_node_server
    type: pass_to_pass
    origin: agent_config
    description: "node_server.py must pass ruff linting"
    source:
      path: "AGENTS.md"
      lines: "43"
      commit: "a35f5896e43d2585d9206e8256b4d7e321fcd0fe"

  - id: ts_launcher_uses_http_readiness
    type: fail_to_pass
    origin: pr_diff
    description: "app-launcher.ts uses HTTP for readiness polling (structural — no Node in container)"

rubric: []
