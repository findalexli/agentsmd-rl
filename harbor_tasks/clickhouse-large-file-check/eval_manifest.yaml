task: clickhouse-large-file-check
source_pr: https://github.com/ClickHouse/ClickHouse/pull/102080
description: Add a CI style check for large files (>5MB) in git

checks:
  - id: script_exists
    description: The various_checks.sh script must exist
    type: pass_to_pass

  - id: large_file_check_logic_present
    description: Script contains MAX_FILE_SIZE definition and git ls-files logic
    type: fail_to_pass

  - id: large_file_check_executable
    description: Script has proper stat format detection and awk processing
    type: fail_to_pass

  - id: whitelist_includes_expected_patterns
    description: Whitelist includes expected patterns for legitimate test data
    type: fail_to_pass

  - id: script_has_proper_stat_detection
    description: Script detects GNU vs BSD stat properly
    type: fail_to_pass

  - id: extracted_check_detects_large_file
    description: The check logic correctly flags files > 5MB
    type: fail_to_pass

  - id: extracted_check_ignores_small_files
    description: The check logic does not flag files <= 5MB
    type: fail_to_pass

  - id: whitelist_works_with_grep
    description: Whitelist patterns correctly exclude matching files
    type: fail_to_pass

agent_config:
  - source: .claude/skills/review/SKILL.md
    rule_id: no_large_binary_files
    description: Binary blobs must never be committed to git
    applies_to:
      - ci/jobs/scripts/check_style/various_checks.sh

rubric: []
