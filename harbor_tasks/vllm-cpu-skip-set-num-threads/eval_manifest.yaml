distractors:
- rule: Pure code-agent PRs are not allowed. A human submitter must understand and
    defend the change end-to-end.
  collision_type: meta_confusion
  why_distracting: The agent is acting as an autonomous coding agent in an evaluation
    environment. If it strictly follows the rule 'Pure code-agent PRs are not allowed',
    it might refuse to generate the fix and instead output a message asking for a
    human submitter, failing the evaluation.
  severity: high
  source:
    path: AGENTS.md
    lines: 24-25
- rule: Before proposing a PR, run duplicate-work checks using `gh issue view` and
    `gh pr list`.
  collision_type: meta_confusion
  why_distracting: The agent is in an isolated evaluation environment without GitHub
    CLI credentials or network access to GitHub. Attempting to run these `gh` commands
    will fail and waste time/tokens, potentially causing the agent to halt or fail
    the task.
  severity: medium
  source:
    path: AGENTS.md
    lines: 10-14
- rule: Do not open one-off PRs for tiny edits (single typo, isolated style change,
    one mutable default, etc.).
  collision_type: scope_ambiguity
  why_distracting: The fix is small (a few lines overriding `torch.set_num_threads`),
    so the agent might misclassify it as a 'tiny edit' or 'low-value busywork' and
    refuse to proceed due to the 'Fail-closed behavior' rule.
  severity: medium
  source:
    path: AGENTS.md
    lines: 20-21
hierarchy_analysis: The hierarchy consists of CLAUDE.md which simply includes AGENTS.md.
  AGENTS.md contains strict contribution policies aimed at human contributors and
  PR submission, which conflict with the autonomous nature of the agent evaluation
  environment.
