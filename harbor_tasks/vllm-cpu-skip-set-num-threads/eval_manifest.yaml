  - id: warning_logged
    type: fail_to_pass
    origin: pr_diff
    description: "Monkey-patched set_num_threads emits a log or warning when called"

  - id: patch_after_thread_binding
    type: fail_to_pass
    origin: pr_diff
    description: "After monkey-patch is applied, thread binding is protected from later changes"

  - id: init_device_exists
    type: pass_to_pass
    origin: pr_diff
    description: "CPUWorker class and init_device method must still exist"

  - id: key_functionality_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "Distributed init and random seed setting must remain in cpu_worker.py"

  - id: replacement_has_body
    type: pass_to_pass
    origin: static
    description: "Replacement function must have real logic (logging/warning call), not just pass"

  - id: test_repo_syntax_cpu_worker
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's Python syntax check on cpu_worker.py passes"

  - id: test_repo_lint_cpu_worker
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ruff lint check on cpu_worker.py passes"

rubric:
