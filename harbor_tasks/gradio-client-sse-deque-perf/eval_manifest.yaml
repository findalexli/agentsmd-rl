distractors:
- rule: 'Format your code before pushing. Backend: bash scripts/format_backend.sh'
  collision_type: scope_ambiguity
  why_distracting: The instruction to run `bash scripts/format_backend.sh` might cause
    the agent to reformat entire files. If the repository's formatting is slightly
    out of sync with the script, this will introduce unrelated formatting changes
    and pollute the PR diff. The agent should only ensure its own changes are formatted
    correctly.
  severity: medium
  source:
    path: AGENTS.md
    lines: 26-27
- rule: Target an issue. Every non-trivial PR should reference an existing GitHub
    issue. If one doesn't exist, create it first.
  collision_type: meta_confusion
  why_distracting: The instruction to 'create an issue first' if one doesn't exist
    is impossible in a disconnected evaluation environment. An agent might waste time
    attempting to use tools to interact with the GitHub API to create an issue before
    writing code.
  severity: high
  source:
    path: AGENTS.md
    lines: 15-16
hierarchy_analysis: Only one config file (`AGENTS.md`) is present at the root level,
  so there are no hierarchy conflicts. The rules apply globally to the repository.
