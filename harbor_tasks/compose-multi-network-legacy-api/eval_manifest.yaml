  type: fail_to_pass
  origin: pr_diff
  description: When the post-create NetworkConnect fails, the orphan container is removed via ContainerRemove(Force=true) and the error is propagated.
- id: test_at_api_144_default_settings_unchanged
  type: pass_to_pass
  origin: pr_diff
  description: defaultNetworkSettings on API >= 1.44 still includes every network in EndpointsConfig (no regression on the modern path).
