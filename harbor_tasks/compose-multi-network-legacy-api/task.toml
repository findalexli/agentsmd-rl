name = "compose-multi-network-legacy-api"
title = "Restore multi-network post-connect fallback for Docker API < 1.44"
description = "Compose v2 regressed multi-network deployments on Docker daemons older than API 1.44 (Docker 20.10/Synology DSM): the ContainerCreate call now sends every endpoint at once, which the old daemon rejects. Restore the post-create NetworkConnect fallback gated on the negotiated API version."

