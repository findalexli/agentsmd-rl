    description: "vllm_c dispatch predicate must not reject weight with different dtype than x"

  - id: gemma_static_no_residual
    type: fail_to_pass
    origin: pr_diff
    description: "GemmaRMSNorm must have _forward_static_no_residual with correct Gemma normalization"

  - id: gemma_static_with_residual
    type: fail_to_pass
    origin: pr_diff
    description: "GemmaRMSNorm must have _forward_static_with_residual handling residual correctly"

  - id: gemma_forward_native_no_ir_ops
    type: fail_to_pass
    origin: pr_diff
    description: "GemmaRMSNorm.forward_native must not delegate to ir.ops.rms_norm"

  - id: gemma_forward_cuda_uses_compile
    type: fail_to_pass
    origin: pr_diff
    description: "GemmaRMSNorm.forward_cuda must use torch.compile for its static methods"

  - id: rms_norm_same_dtype_correctness
    type: pass_to_pass
    origin: pr_diff
    description: "rms_norm with matching weight dtype still produces correct output"

