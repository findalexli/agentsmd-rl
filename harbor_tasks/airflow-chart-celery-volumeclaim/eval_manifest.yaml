rubric:
- rule: Add deprecation warning in NOTES.txt
  type: soft
  description: NOTES.txt should warn users about the deprecated field
- rule: Update values.schema.json description for deprecated field
  type: soft
  description: Old field should be marked deprecated in schema
- rule: Add examples in schema for new field
  type: soft
  description: Schema should include examples for the new location
distractors:
- rule: Run Helm tests in parallel with xdist `breeze testing helm-tests --use-xdist`
  collision_type: scope_ambiguity
  why_distracting: The PR instructions explicitly provide `helm template` commands
    to test the chart rendering locally. The agent might be distracted by this rule
    and attempt to write or run full pytest-based Helm tests using `breeze testing
    helm-tests`, which is unnecessary for this specific task and wastes time.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 24-24
- rule: Never run pytest, python, or airflow commands directly on the host — always
    use breeze.
  collision_type: meta_confusion
  why_distracting: The PR instructions ask the agent to run `helm dependency build`
    and `helm template` directly in the workspace. The agent might over-apply the
    'always use breeze' rule to `helm` commands and try to execute them inside the
    Breeze environment, leading to potential environment confusion or command failures.
  severity: low
  source:
    path: CLAUDE.md
    lines: 8-8
hierarchy_analysis: The config files (`CLAUDE.md` and `AGENTS.md`) are identical and
  primarily focus on Python development, testing with `breeze`, and repository structure
  for the Airflow core and providers. Since this PR is strictly focused on modifying
  Helm chart YAML, JSON schemas, and documentation, most of the repository-wide Python
  tooling rules are irrelevant and serve as potential distractors if the agent tries
  to apply Python testing workflows to Helm chart template rendering.
