distractors:
- rule: When you are working on a bug, first create a standalone file that reproduces
    the bug... Once the change is passing, find an appropriate test file to add the
    test to
  collision_type: scope_ambiguity
  why_distracting: The bug is about external C++ projects failing to compile due to
    missing headers. Trying to write a standalone Python reproduction script or adding
    a test to the standard PyTorch test suite would not verify this external C++ build
    issue, leading to wasted effort.
  severity: high
  source:
    path: AGENTS.md
    lines: 3-7
- rule: 'Use our test class and test runner: from torch.testing._internal.common_utils
    import run_tests, TestCase'
  collision_type: architecture_boundary
  why_distracting: Instructs the agent to use the Python `TestCase` from `torch.testing._internal.common_utils`,
    which is completely inapplicable for testing a C++ header visibility issue for
    external projects.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 12-20
- rule: To run lint, run 'lintrunner -a' (which will autoapply changes)
  collision_type: rule_conflict
  why_distracting: AGENTS.md instructs the use of `lintrunner -a`, which directly
    conflicts with CLAUDE.md's instruction to 'Only use commands provided via spin
    for linting'.
  severity: medium
  source:
    path: AGENTS.md
    lines: 11-11
hierarchy_analysis: Both `AGENTS.md` and `CLAUDE.md` reside at the root level (Level
  0) and contain conflicting instructions regarding linting (`lintrunner` vs `spin`).
  Furthermore, both files heavily emphasize Python-based testing workflows which are
  entirely distracting for this C++ header visibility bug.
