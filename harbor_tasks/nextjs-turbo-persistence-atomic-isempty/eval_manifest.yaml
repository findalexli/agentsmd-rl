distractors:
- rule: If you are changing Next.js source or integration tests, start `pnpm --filter=next
    dev` in a separate terminal session before making edits
  collision_type: scope_ambiguity
  why_distracting: The agent is modifying a Rust crate (`turbo-persistence`), not
    the Next.js JS/TS framework source. Running the Next.js dev server is unnecessary
    for a Rust-only lock contention fix and would waste time.
  severity: medium
  source:
    path: AGENTS.md
    lines: 79-81
- rule: 'For type errors only: Use `pnpm --filter=next types` instead of `pnpm --filter=next
    build`'
  collision_type: scope_ambiguity
  why_distracting: This command checks TypeScript types, but the agent is working
    on Rust code where `cargo check` or `cargo clippy` is needed. Running the TS typechecker
    will not help validate the Rust changes.
  severity: low
  source:
    path: AGENTS.md
    lines: 96-97
- rule: Help V8 make correct speculative assumptions
  source:
