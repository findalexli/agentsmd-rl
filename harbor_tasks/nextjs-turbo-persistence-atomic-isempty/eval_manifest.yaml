    lines: 32-33
  source_text: 'The key principle: **help V8 make correct speculative assumptions
    by keeping

    types, shapes, and control flow predictable.**'
  collision_type: scope_ambiguity
  why_distracting: The PR optimizes a 'hot path' by avoiding an RwLock read, but it
    is written in Rust for Turbopack. This rule is specifically for JavaScript V8
    performance, not Rust atomic operations.
  severity: low
- rule: No closures allocated inside tight loops
  source:
    path: .agents/skills/v8-jit/SKILL.md
    lines: '428'
  source_text: '- [ ] No closures allocated inside tight loops'
  collision_type: scope_ambiguity
  why_distracting: The PR mentions 'hot path' optimization. An agent might mistakenly
    try to apply JS/V8 hot path rules like avoiding closures or predictable control
    flow to this Rust codebase.
  severity: low
- rule: All cached functions must be async
  source:
    path: .claude-plugin/plugins/cache-components/skills/cache-components/SKILL.md
    lines: '388'
  source_text: 1. **Always use `async`** - All cached functions must be async
  collision_type: meta_confusion
  why_distracting: The PR conceptually implements caching by using an AtomicBool to
    mirror a lock-guarded property (`is_empty`). An agent might mistakenly think this
    caching is related to Next.js Cache Components and incorrectly demand the function
    be asynchronous.
  severity: high
