# Agent config rules that apply to this task
agent_config:
  - file: AGENTS.md
    commit: 4e6b3fbd3355709831a1bb64472b3c947b694690
    rules:
      # Soft rule about when to bump schema version
      - id: runstate-schema-bump
        description: "If serialized RunState shape changes in a released or otherwise supported snapshot format, bump the schema version and update serialization/deserialization."
        type: rubric
      # Soft rule about unreleased changes
      - id: unreleased-post-tag-rewrite
        description: "Unreleased post-tag RunState changes on main may fold into the same next schema version when no supported snapshot consumer exists yet."
        type: rubric
      # Soft rule about implementation strategy
      - id: implementation-strategy-usage
        description: "Before changing runtime code, exported APIs, external configuration, persisted schemas, wire protocols, or other user-facing behavior, use $implementation-strategy to decide the compatibility boundary and implementation shape."
        type: rubric
      # Soft rule about direct rewrite
      - id: direct-rewrite-unreleased
        description: "Interfaces introduced or changed after the latest release tag may be rewritten without compatibility shims unless they already have a released or otherwise supported durable-state consumer."
        type: rubric

  - file: .agents/skills/implementation-strategy/SKILL.md
    commit: 4e6b3fbd3355709831a1bb64472b3c947b694690
    rules:
      - id: compatibility-layer-threshold
        description: "Add a compatibility layer only when there is a concrete released consumer, an otherwise supported durable external state that requires it, or when the user explicitly asks for a migration path."
        type: rubric
      - id: compatibility-boundary-stop
        description: "The change would modify durable external data or protocol formats that are already released or otherwise supported."
        type: rubric
      - id: post-tag-interface-rewrite
        description: "Interface changes present on main but added after the latest release tag: not a semver breaking change by themselves. Rewrite them directly unless they already back a released or otherwise supported durable format."
        type: rubric

