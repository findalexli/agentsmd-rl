distractors:
- rule: To set up the entire repo, including frontend and backend, run `make build`.
    You don't need to do this unless the user asks you to, or if you're trying to
    run the entire application.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to run `make build` to test the Slack integration
    changes, but the user didn't ask to run the application, and setting up the entire
    repo is unnecessary for this specific backend logic change.
  severity: medium
  source:
    path: AGENTS.md
    lines: 4-6
- rule: When working on a PR that requires design documents, scripts meant for development-only,
    or other temporary artifacts that should NOT be merged to main, store them in
    a `.pr/` directory at the repository root.
  collision_type: scope_ambiguity
  why_distracting: The agent might create a `.pr/design.md` to plan the org routing
    logic before implementing it, wasting time on artifacts not requested in the prompt.
  severity: low
  source:
    path: AGENTS.md
    lines: 63-65
- rule: If you've made changes to the backend, you should run `pre-commit run --config
    ./dev_config/python/.pre-commit-config.yaml` (this will run on staged files).
  collision_type: meta_confusion
  why_distracting: The agent might try to stage files and run pre-commit hooks during
    the evaluation, which could fail or complicate the simple file modification task
    if the environment isn't fully set up for it.
  severity: medium
  source:
    path: AGENTS.md
    lines: 16-17
hierarchy_analysis: The repository has a single root-level `AGENTS.md` file containing
  general setup, git best practices, and PR artifact guidelines. No deeper config
  files are present to override these rules.
