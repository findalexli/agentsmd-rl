  - id: test_pg_advisory_lock_call_present
    type: fail_to_pass
    origin: behavior
    description: "pg_advisory_lock is called with the correct lock ID (3617572382373537863)"

  - id: test_advisory_lock_before_migrations
    type: fail_to_pass
    origin: behavior
    description: "Advisory lock is acquired BEFORE context.run_migrations() is called"

  - id: test_advisory_lock_uses_text_wrapper
    type: fail_to_pass
    origin: behavior
    description: "The advisory lock SQL is wrapped with sqlalchemy.text()"

  # Pass-to-pass tests (code quality and correctness)
