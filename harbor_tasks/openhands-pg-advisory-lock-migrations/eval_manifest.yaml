# Rubric for soft/subjective rules from agent config files
# Note: The gold solution only modifies enterprise/migrations/env.py to add the advisory lock.
# Documentation rules are satisfied by comments in the code itself, not separate docs.
rubric:
  - id: no_unnecessary_changes
    description: "Only necessary changes should be made - imports text and adds advisory lock only"
    source: "AGENTS.md: Prefer specific git add instead of git add ."
    criteria: "The fix only adds the advisory lock without unnecessary refactoring"
    reference: |
      from sqlalchemy import create_engine, text  # noqa: E402
      connection.execute(text('SELECT pg_advisory_lock(3617572382373537863)'))

  - id: documentation
    description: "Code should be properly documented with comments explaining the lock"
    source: "AGENTS.md: Enterprise code requires clear documentation"
    criteria: "The advisory lock includes comments explaining its purpose and behavior"
    reference: |
      # Lock number must be unique — md5 hash of 'openhands_enterprise_migrations'
      # Lock is released when the connection context manager exits

  - id: db_migration_pattern
    description: "Follow established database migration patterns with advisory lock before migrations"
    source: "AGENTS.md: Database changes require careful migration planning"
    criteria: "The fix follows the established pattern of using advisory locks for concurrent migration prevention"
    reference: |
      connection.execute(text('SELECT pg_advisory_lock(3617572382373537863)'))
      with context.begin_transaction():
          context.run_migrations()
