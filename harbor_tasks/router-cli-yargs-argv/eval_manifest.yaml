source_pr:
  owner: TanStack
  repo: router
  number: 6981
  merge_commit: e5d23ecd5c28aa592100e7344b408d67fd261c61
  base_commit: 8d9988a054020f3b3be97dac367cbe81b08fc44a

checks:
  # Fail-to-pass: CLI behavior tests
  - id: test_cli_help_shows_usage
    type: fail_to_pass
    origin: behavioral
    description: CLI --help shows usage information with commands listed

  - id: test_cli_recognizes_generate_command
    type: fail_to_pass
    origin: behavioral
    description: CLI recognizes 'generate' command and processes it (not silent)

  - id: test_cli_recognizes_watch_command
    type: fail_to_pass
    origin: behavioral
    description: CLI recognizes 'watch' command and processes it (not silent)

  # Pass-to-pass: Repo CI/CD tests
  - id: test_router_cli_builds
    type: pass_to_pass
    origin: repo_tests
    description: Router CLI package builds successfully with pnpm nx

  - id: test_router_cli_lint
    type: pass_to_pass
    origin: repo_tests
    description: Router CLI package passes ESLint checks

  - id: test_router_cli_types
    type: pass_to_pass
    origin: repo_tests
    description: Router CLI package passes TypeScript type checks across multiple versions

  - id: test_router_cli_build_check
    type: pass_to_pass
    origin: repo_tests
    description: Router CLI package passes build artifact validation (publint, attw)

  # Structural: Code verification (gated by behavioral tests)
  - id: test_yargs_import_exists
    type: structural
    origin: agent_config
    source: AGENTS.md - Code style - TypeScript strict mode
    description: Import statement for hideBin from yargs/helpers exists

  - id: test_yargs_receives_argv
    type: structural
    origin: agent_config
    source: AGENTS.md - Code style - TypeScript strict mode
    description: yargs is called with hideBin(process.argv) to parse CLI args

rubric:
  - rule: "Code fix passes all pass-to-pass tests (build, lint, types, build_check)"
    source: "Gold solution validation"
    reference: "pnpm nx run @tanstack/router-cli:test:eslint, pnpm nx run @tanstack/router-cli:test:types, pnpm nx run @tanstack/router-cli:test:build"
    relevant: true
