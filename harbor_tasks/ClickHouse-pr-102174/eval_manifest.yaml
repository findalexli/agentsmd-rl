rubric:
- rule: 'Exception safety on all control-flow paths: Check that every resource acquired
    before a potentially-throwing call is released on the exception path (including
    early returns, loop continues, and branches added).'
  source:
    path: .claude/skills/review/SKILL.md
    lines: '140'
    commit: 172e4255c5cba41c87722d66c33f459256d56ce7
- rule: 'Core-area scrutiny: For changes in Keeper/coordination, verify invariants
    hold under concurrent operations and check all error paths.'
  source:
    path: .claude/skills/review/SKILL.md
    lines: 214-215
    commit: 172e4255c5cba41c87722d66c33f459256d56ce7
- rule: 'Semantic correctness & fix completeness: Partial / asymmetric fixes: when
    a behavior is changed in one code path, check whether symmetric paths need the
    same change.'
  source:
    path: .claude/skills/review/SKILL.md
    lines: 184-185
    commit: 172e4255c5cba41c87722d66c33f459256d56ce7
- rule: When writing text such as documentation, comments, or commit messages, write
    names of functions and methods as `f` instead of `f()`
  source:
    path: AGENTS.md
    lines: 8-9
  evidence: The C++ comments refer to functions like `tryLoadObject` and `setAllObjects`
    without trailing parentheses, adhering to the mathematical purity convention.
  category: documentation
- rule: When mentioning logical errors, say 'exception' instead of 'crash'
  source:
    path: AGENTS.md
    lines: 10-11
  evidence: The comment explicitly uses the word 'exception' ('the exception propagates
    to the caller') when discussing error propagation, avoiding the word 'crash'.
  category: documentation
distractors:
- rule: When writing text such as documentation, comments, or commit messages, wrap
    literal names from ClickHouse SQL language, classes and functions... inside inline
    code blocks
  collision_type: scope_ambiguity
  why_distracting: The rule instructs to wrap class and function names in inline code
    blocks (backticks) in 'comments'. An agent might apply this to C++ source comments,
    but ClickHouse C++ comments typically do not use markdown backticks (as shown
    by the gold solution's plain text references to ZooKeeperRetriesControl and tryLoadObject).
  severity: medium
  source:
    path: AGENTS.md
    lines: 6-7
hierarchy_analysis: Only one config file (`AGENTS.md`) is present, so there are no
  conflicts between different levels of the hierarchy. The main ambiguity arises from
  the word 'comments' in the markdown formatting rule, which applies to PR/review
  comments but not C++ source comments.
