description = """
Fix a bug where UserDefinedSQLObjectsZooKeeperStorage::refreshObjects() uses a stale
ZooKeeper session handle during retry loops. When transient Keeper errors occur,
the code should obtain a fresh session via zookeeper_getter and re-fetch the object
list with watches set on the live session.
"""
