[description]
short = "Add missing 'specification' field to functions and sites collections"
long = """
This task involves adding a missing 'specification' attribute to the database schema
definitions for the 'functions' and 'sites' collections in Appwrite. The specification
field should be a string type with size 128, using APP_COMPUTE_SPECIFICATION_DEFAULT
as the default value.

The fix requires adding the same field definition to two locations in the
app/config/collections/projects.php file:
1. Inside the 'functions' collection attributes (between 'startCommand' and 'buildSpecification')
2. Inside the 'sites' collection attributes (between the entry ending at line ~1247 and 'buildSpecification')
"""

