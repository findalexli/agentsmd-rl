# Evaluation manifest for superset-mcp-auth-valueerror-fallback
# Source: apache/superset#39106

source:
  repo: apache/superset
  pr_number: 39106
  pr_url: https://github.com/apache/superset/pull/39106
  base_commit: 7380a59ab8a5e026d7cc07180001b0627ded2afd
  merge_commit: 92747246fc7e562eef527034e8fcceec50aad9ab
  title: "fix(mcp): remove JWT ValueError g.user fallback in auth layer"

checks:
  - id: test_valueerror_handler_removes_fallback_logic
    type: fail_to_pass
    origin: pr_behavior
    description: >
      ValueError handler must NOT fall back to g.user. The fix removes
      the 'user = g.user' assignment from the ValueError handler.

  - id: test_valueerror_handler_clears_guser
    type: fail_to_pass
    origin: pr_behavior
    description: >
      ValueError handler must call g.pop("user", None) to clear g.user
      so audit logging doesn't attribute denied request to wrong user.

  - id: test_valueerror_handler_does_not_break
    type: fail_to_pass
    origin: pr_behavior
    description: >
      ValueError handler must NOT have 'break' statement. The fix removes
      the break and lets ValueError propagate via re-raise.

  - id: test_valueerror_logs_error_not_warning
    type: fail_to_pass
    origin: pr_behavior
    description: >
      ValueError handler should log "MCP user resolution failed" error
      instead of the old warning about falling back to middleware user.

  - id: test_auth_module_syntax_valid
    type: pass_to_pass
    origin: repo_tests
    description: Auth module has valid Python syntax.

  - id: test_repo_ruff_check
    type: pass_to_pass
    origin: repo_tests
    description: Ruff linter passes on auth.py (repo's pre-commit CI check).

  - id: test_repo_ruff_format
    type: pass_to_pass
    origin: repo_tests
    description: Ruff format check passes on auth.py (repo's pre-commit CI check).

  - id: test_cleanup_session_called_on_db_error
    type: fail_to_pass
    origin: pr_behavior
    description: >
      _cleanup_session_on_error() must be called before raise in the
      DB connection retry failure path (secondary fix in the PR).

rubric:
  - id: code_only_change
    rule: >
      This PR is a pure code change. No documentation or config file changes
      are required. The agent should NOT modify any CLAUDE.md, AGENTS.md,
      README.md, or other config files. PASS if no config files were modified.
    source:
      file: superset/mcp_service/auth.py
