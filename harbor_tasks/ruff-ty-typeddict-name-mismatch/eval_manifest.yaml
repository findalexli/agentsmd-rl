  type: fail_to_pass
  origin: pr_diff
  description: '`ty check` must report a diagnostic that mentions both the literal string typename and the assigned variable name when they differ in a `Var = TypedDict("Other", {...})` call.'
- id: test_mismatched_name_diagnostic_phrasing
  type: fail_to_pass
  origin: pr_diff
  description: The diagnostic uses the canonical phrase "must match the name of the variable it is assigned to".
- id: test_mismatched_name_uses_invalid_argument_type_lint
