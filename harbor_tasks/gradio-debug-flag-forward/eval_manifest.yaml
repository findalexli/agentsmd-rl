version: "2.0"

source:
  repo: gradio-app/gradio
  pr: 12950
  base_commit: 4d97c68f8a5a55ba686ab5ce599b932b51754984
  merge_commit: 83b223b746c3933920dfef670e545a12de9177ed

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified files (routes.py, blocks.py) must parse without syntax errors"

  - id: ruff_check
    type: pass_to_pass
    origin: static
    description: "Modified files must pass ruff linting (repo's CI standard)"

  - id: test_repo_analytics
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's analytics tests pass (no external deps)"

  - id: test_repo_http_server
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's HTTP server tests pass (no heavy deps)"

  - id: test_repo_gradio_import
    type: pass_to_pass
    origin: repo_tests
    description: "Gradio imports correctly (basic smoke test)"

  - id: default_debug_false
    type: fail_to_pass
    origin: pr_diff
    description: "create_app() with no debug arg produces a non-debug app (tested with 3 different Interface configs)"

  - id: create_app_accepts_debug_param
    type: fail_to_pass
    origin: pr_diff
    description: "create_app() signature includes a debug parameter with default False"

  - id: debug_true_forwarded
    type: fail_to_pass
    origin: pr_diff
    description: "create_app(debug=True) correctly enables debug mode (base has no debug param)"

  - id: explicit_debug_false
    type: fail_to_pass
    origin: pr_diff
    description: "create_app(debug=False) explicitly yields debug=False"

  - id: app_functional
    type: pass_to_pass
    origin: pr_diff
    description: "create_app still produces a fully functional Gradio app with routes"

  - id: app_class_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "App class is still a FastAPI subclass with auth_dependency param"

# No rubric rules - the ruff_check test already validates code formatting
# and the gold solution is minimal/correct by design
