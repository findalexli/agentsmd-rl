version = "1.0"

[metadata]
author_name = "Alex Li"
author_email = "alex@example.com"
difficulty = "easy"
category = "refactor"
tags = ["vscode", "theme", "naming", "migration"]
expert_time_estimate_min = 5.0
junior_time_estimate_min = 15.0

[verifier]
env = { LLM_JUDGE = "${LLM_JUDGE:-0}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
timeout_sec = 60.0

[agent]
timeout_sec = 600.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 4096
storage_mb = 10240
allow_internet = true

[source]
repo = "microsoft/vscode"
base_commit = "573fb0a665c269634b8eb30759b6f2584c0ff127"
