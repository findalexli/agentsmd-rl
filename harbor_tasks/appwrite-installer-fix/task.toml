name = "appwrite-installer-fix"
title = "Fix Appwrite Installer Response Handling and Upgrade Detection"
description = """
Fixes several issues in the Appwrite installer:
1. Enable Swoole coroutines for non-blocking I/O during installation tracking
2. Add CLI parameter detection to skip web installer when explicit args provided
3. Add error suppression for DNS lookups that might fail
4. Fix tracking payload key naming (hostIp -> ip) with proper validation
5. Add HTTP client timeouts to prevent hanging on external calls
6. Implement onComplete callback for proper SSE stream completion before tracking
7. Fix upgrade detection when existing installation found
8. UI fixes: hide secret key on upgrade, fix progress text, adjust CSS min-height
"""

# Estimated difficulty: 3/5 (moderate - requires understanding PHP, Swoole, and async patterns)
difficulty = 3

# Tags for categorization
tags = ["php", "swoole", "installer", "async", "coroutines", "http-client", "cli"]

# Estimated time for an agent to complete
estimated_time_minutes = 45

# Number of test assertions
test_count = 16

