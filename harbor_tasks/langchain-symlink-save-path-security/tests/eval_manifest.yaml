source_pr:
  owner: langchain-ai
  repo: langchain
  number: 36585
  title: "fix(core): handle symlinks in deprecated prompt save path"
  merge_commit: 7629c747260cbaed7ca55466d5b9e1b520a7de77
  base_commit: ce21bf469d7493f4716bc30feb15a5b3f16ebe1e

checks:
  # Fail-to-pass tests - these should fail on base commit and pass with fix
  - id: test_symlink_bypass_blocked
    type: fail_to_pass
    origin: agent_config
    description: Symlink .json -> .py should be rejected with ValueError
    source:
      - file: CLAUDE.md
        section: "Security and risk assessment"
        lines: "No eval(), exec(), or pickle on user-controlled input"
        why: Resolving symlinks before validation prevents writing to arbitrary file types

  - id: test_symlink_yaml_to_py_blocked
    type: fail_to_pass
    origin: agent_config
    description: Symlink .yaml -> .py should be rejected with ValueError
    source:
      - file: CLAUDE.md
        section: "Testing requirements"
        lines: "Edge cases and error conditions are tested"
        why: Testing variants prevents hardcoded single-case fixes

  - id: test_symlink_yml_to_py_blocked
    type: fail_to_pass
    origin: agent_config
    description: Symlink .yml -> .py should be rejected with ValueError
    source:
      - file: CLAUDE.md
        section: "Testing requirements"
        lines: "Edge cases and error conditions are tested"
        why: Testing all yaml extensions ensures complete coverage

  # Pass-to-pass tests - these should pass on both base and fixed
  - id: test_legitimate_symlink_to_json_works
    type: pass_to_pass
    origin: agent_config
    description: Symlinks to valid .json files still work after fix
    source:
      - file: CLAUDE.md
        section: "Testing requirements"
        lines: "Happy path is covered"
        why: Fix should not break legitimate symlink usage

  - id: test_direct_json_save_works
    type: pass_to_pass
    origin: agent_config
    description: Direct .json save without symlinks works correctly
    source:
      - file: CLAUDE.md
        section: "Testing requirements"
        lines: "Happy path is covered"
        why: Core functionality must continue to work

  # Repo tests
  - id: test_repo_prompts_loading_tests
    type: pass_to_pass
    origin: repo_tests
    description: Repo prompt loading tests including save/load round-trip
    source:
      - file: CLAUDE.md
        section: "Testing requirements"
        lines: "Unit tests: tests/unit_tests/ (no network calls allowed)"
        why: tests/unit_tests/prompts/test_loading.py contains tests for save() functionality

  - id: test_repo_prompts_main_tests
    type: pass_to_pass
    origin: repo_tests
    description: Repo main prompt tests covering core PromptTemplate functionality
    source:
      - file: CLAUDE.md
        section: "Testing requirements"
        lines: "Unit tests: tests/unit_tests/ (no network calls allowed)"
        why: tests/unit_tests/prompts/test_prompt.py covers core prompt functionality

  - id: test_repo_ruff_check
    type: pass_to_pass
    origin: repo_tests
    description: Ruff linter passes on prompts module
    source:
      - file: .github/workflows/_lint.yml
        lines: "make lint_package"
        why: CI runs ruff check on all code changes

  - id: test_repo_mypy_check
    type: pass_to_pass
    origin: repo_tests
    description: Mypy type check passes on modified file
    source:
      - file: .github/workflows/_lint.yml
        lines: "make lint_package"
        why: CI runs mypy type checking on all code changes

rubric:
  # From CLAUDE.md - Security and risk assessment
  - rule: "Resolve symlinks before file extension validation in save() method"
    weight: 5
    source:
      file: CLAUDE.md
      section: "Security and risk assessment"

  - rule: "Proper exception handling with descriptive error messages"
    weight: 2
    source:
      file: CLAUDE.md
      section: "Security and risk assessment"
      quote: "Proper exception handling (no bare except:) and use a msg variable for error messages"

  - rule: "Use pathlib.Path methods correctly (resolve() vs symlink following)"
    weight: 2
    source:
      file: CLAUDE.md
      section: "Code quality standards"
      quote: "Use descriptive, self-explanatory variable names"

  - rule: "Follow existing code patterns in the save() method"
    weight: 1
    source:
      file: CLAUDE.md
      section: "Core development principles"
      quote: "Follow existing patterns in the codebase you're modifying"
