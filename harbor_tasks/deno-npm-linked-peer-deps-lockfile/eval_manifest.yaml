distractors:
- rule: Unit tests should be placed in the `tests/unit/` directory.
  collision_type: architecture_boundary
  why_distracting: The config states that unit tests belong in the `tests/unit/` directory.
    However, the file being edited (`libs/npm/resolution/snapshot.rs`) uses an inline
    `mod tests` block. An agent strictly following the config might try to create
    a new file in `tests/unit/` instead of adding the test to the existing inline
    test module, violating the local file's established convention.
  severity: high
  source:
    path: CLAUDE.md
    lines: 50-52
- rule: Create a new git branch, push your branch to the remote repository, and open
    a pull request.
  collision_type: meta_confusion
  why_distracting: The config instructs the developer to create a git branch, push
    to a remote repository, and open a GitHub pull request. In an agentic evaluation
    environment, attempting to perform these git/GitHub operations will fail and waste
    execution steps.
  severity: high
  source:
    path: CLAUDE.md
    lines: 18-22
- rule: The main form of integration test in deno is the 'spec' test... Create a directory
    in `tests/specs/` with a descriptive name and add a `__test__.jsonc` file.
  source:
    path: CLAUDE.md
    lines: 164-176
  source_text: '## "spec" tests


    The main form of integration test in deno is the "spec" test. These tests can
    be

    found in `tests/specs`. The idea is that you have a `__test__.jsonc` file that

    lays out one or more tests, where a test is a CLI command to execute and the

    output is captured and asserted against.


    The name of the test comes from the directory the `__test__.jsonc` appears in.


    ### Creating a New Spec Test


    1. Create a directory in `tests/specs/` with a descriptive name

    2. Add a `__test__.jsonc` file describing your test steps'
  collision_type: scope_ambiguity
  why_distracting: Since lockfile behavior has a user-facing CLI aspect, an agent
    might incorrectly assume it should write a full CLI integration 'spec' test in
    `tests/specs/`. However, this specific fix modifies an internal logic function
    (`snapshot_from_lockfile`) inside a library crate (`libs/npm`), which is most
    appropriately tested with an inline unit test.
  severity: medium
- rule: Test fixtures and data files belong in `tests/testdata/`.
  source:
    path: CLAUDE.md
    lines: '63'
  source_text: '- `tests/testdata/` - Test fixtures and data files'
  collision_type: rule_conflict
  why_distracting: An agent might interpret this list of directories as a strict requirement
    that all mock data (such as the JSON lockfile content required for the test) must
    be placed in a separate file in `tests/testdata/`. The gold diff correctly uses
    a more readable raw string literal (`r#"..."#`) inline for the unit test instead.
  severity: low
- rule: The main form of integration test is the 'spec' test in `tests/specs/`. Each
    test has a `__test__.jsonc` file describing CLI commands to run and expected output.
  source:
    path: .github/copilot-instructions.md
    lines: 130-134
  source_text: '### Spec Tests


    The main form of integration test is the "spec" test in `tests/specs/`. Each

    test has a `__test__.jsonc` file describing CLI commands to run and expected

    output. The schema is in `tests/specs/schema.json`.'
  collision_type: scope_ambiguity
  why_distracting: An agent might try to create an integration test via CLI rather
    than verifying the rust-level fix with a module-level unit test.
  severity: medium
hierarchy_analysis: The configuration is a flat, single file (`CLAUDE.md`). The primary
  conflict arises between the general repository layout guidelines (which dictate
  tests go in `tests/unit/`) and the local file conventions (which use inline `mod
  tests`). The agent must prioritize the local context over the global config.
