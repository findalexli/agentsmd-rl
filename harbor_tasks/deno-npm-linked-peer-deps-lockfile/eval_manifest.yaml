distractors:
- rule: Unit tests are located in `tests/unit/`
  collision_type: architecture_boundary
  why_distracting: The guide states that unit tests belong in `tests/unit/`. An agent
    might try to create a new test file in that directory, but the `snapshot.rs` file
    already has an inline `mod tests` block where the new test `test_snapshot_from_lockfile_v5_with_linked_package_with_peer_deps`
    should be added to follow the local file's convention.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 61-62
hierarchy_analysis: The `CLAUDE.md` file provides high-level architectural guidance,
  but omits mention of the `libs/` directory where the target file resides. The global
  testing guidance points to `tests/unit/`, which conflicts with the local inline
  testing pattern established in `libs/npm/resolution/snapshot.rs`.
