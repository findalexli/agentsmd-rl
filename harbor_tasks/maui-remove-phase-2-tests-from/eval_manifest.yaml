distractors:
- rule: When performing a code review on PRs that change functional code, run the
    pr-finalize skill to verify that the PR title and description accurately match
    the actual implementation.
  collision_type: meta_confusion
  why_distracting: The instruction tells Copilot to run the pr-finalize skill when
    performing a code review. An agent might get confused between its current task
    (modifying the PR agent's workflow definitions) and the instructions meant for
    the PR agent itself, potentially trying to invoke the skill or modify it incorrectly.
  severity: medium
  source:
    path: .github/copilot-instructions.md
    lines: 9-12
hierarchy_analysis: The repository contains meta-instructions for AI agents (.github/copilot-instructions.md)
  that the agent must modify rather than follow as an active participant in this specific
  task. The agent must distinguish between instructions for its own behavior during
  the task and the content of the instructions it is editing.
