distractors:
- rule: When performing a code review on PRs that change functional code, run the
    pr-finalize skill to verify that the PR title and description accurately match
    the actual implementation.
  collision_type: meta_confusion
  why_distracting: The instruction tells the agent to run the pr-finalize skill when
    reviewing PRs. In this task, the agent is modifying the PR agent's instructions
    and scripts, not reviewing a PR. If the agent gets confused by its own instructions
    and tries to run pr-finalize or act as a reviewer, it will fail the task.
  severity: high
  source:
    path: .github/copilot-instructions.md
    lines: 11-13
hierarchy_analysis: The task involves editing the very config files that govern the
  agent's behavior. This creates a recursive meta-reference where the agent must distinguish
  between instructions that apply to its current session versus instructions it is
  authoring for future sessions.
