distractors:
- rule: 'Changelog 规范: 必须同时提供中英文两个版本'
  collision_type: scope_ambiguity
  why_distracting: The config provides detailed instructions for updating the changelog
    when fixing bugs. An agent might waste effort modifying CHANGELOG.zh-CN.md and
    CHANGELOG.en-US.md, but the gold solution scopes the fix strictly to the code
    and tests.
  severity: medium
  source:
    path: AGENTS.md
    lines: 100-104
- rule: 'Demo 导入规范: 一律使用绝对路径导入'
  collision_type: rule_conflict
  why_distracting: The config mandates absolute imports for Demo files. An agent might
    mistakenly apply this to the test file it modifies (`token.test.tsx`) if it needs
    to import new utilities, conflicting with the Test import rules.
  severity: low
  source:
    path: AGENTS.md
    lines: 30-32
- rule: Help maintainers reply to Ant Design GitHub issues
  source:
    path: .claude/skills/issue-reply/SKILL.md
    lines: 1-5
  collision_type: meta_confusion
  why_distracting: The prompt describes a 'Problem' and mentions 'verify the issue'.
    The agent might mistakenly use the issue-reply skill to generate a comment instead
    of implementing the code fix.
  severity: low
hierarchy_analysis: AGENTS.md and CLAUDE.md are identical and provide flat, repository-wide
  guidelines. No deep hierarchy resolution is required.
