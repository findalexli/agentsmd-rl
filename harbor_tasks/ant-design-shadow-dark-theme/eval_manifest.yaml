distractors:
- rule: Changelog 规范：必须同时提供中英文两个版本，并遵循特定的 Emoji 和格式规范
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to edit CHANGELOG.zh-CN.md and CHANGELOG.en-US.md
    to document the shadow token fix, as the config provides detailed instructions
    for changelog entries. However, this is a code-level fix task and changelog updates
    are out of scope.
  severity: high
  source:
    path: CLAUDE.md
    lines: 95-125
- rule: PR 规范：必须使用 PR 模板，遵循特定的标题格式和分支策略
  collision_type: meta_confusion
  why_distracting: The agent might try to use the `antd-create-pr` skill or manually
    create PR templates/descriptions based on the PR rules. The task only requires
    fixing the code, not managing the PR process.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 68-93
hierarchy_analysis: CLAUDE.md and AGENTS.md contain identical rules. The configuration
  provides strong architectural context (Design Tokens, CSS-in-JS) which is crucial
  for the fix. However, it also contains extensive meta-level guidelines (PRs, Changelogs,
  Issue handling) that are irrelevant to the immediate coding task and may distract
  the agent.
