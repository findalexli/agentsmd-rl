  - id: test_code_no_duplicate_imports
    type: pass_to_pass
    origin: static
    description: "No duplicate or conflicting import statements"

  - id: test_utils_functions_exported_correctly
    type: pass_to_pass
    origin: static
    description: "New utility functions are properly exported"

  - id: test_no_placeholder_code
    type: pass_to_pass
