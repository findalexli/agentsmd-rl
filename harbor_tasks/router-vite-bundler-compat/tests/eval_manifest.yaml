  - id: test_isRolldown_logic
    type: fail_to_pass
    origin: behavioral
    description: "isRolldown detects Rolldown by checking 'rolldownVersion' in vite"

  - id: test_bundlerOptionsKey_logic
    type: fail_to_pass
    origin: behavioral
