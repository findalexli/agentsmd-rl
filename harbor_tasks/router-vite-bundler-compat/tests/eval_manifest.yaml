  - id: test_getBundlerOptions_logic
    type: fail_to_pass
    origin: behavioral
    description: "getBundlerOptions reads rolldownOptions first, then rollupOptions as fallback"

  - id: test_plugin_imports_utils
    type: fail_to_pass
    origin: behavioral
    description: "plugin.ts imports bundlerOptionsKey and getBundlerOptions from utils"

  - id: test_plugin_uses_bundlerOptionsKey
    type: fail_to_pass
    origin: behavioral
    description: "plugin.ts uses [bundlerOptionsKey] instead of hardcoded 'rollupOptions' in build configs"

  - id: test_plugin_uses_getBundlerOptions
    type: fail_to_pass
    origin: behavioral
    description: "plugin.ts uses getBundlerOptions() to read server input configuration"

  - id: test_preview_plugin_imports_utils
    type: fail_to_pass
    origin: behavioral
    description: "preview-server-plugin imports getBundlerOptions from utils"

  - id: test_preview_plugin_uses_getBundlerOptions
    type: fail_to_pass
