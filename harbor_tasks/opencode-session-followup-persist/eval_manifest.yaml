rubric:
- rule: Avoid unnecessary destructuring. Use dot notation to preserve context.
  source:
    path: AGENTS.md
    lines: '57'
    commit: 3fb60d05e555dad020d3354602affe166ef0cc22
- rule: Reduce total variable count by inlining when a value is only used once.
  source:
    path: AGENTS.md
    lines: '44'
    commit: 3fb60d05e555dad020d3354602affe166ef0cc22
- rule: Keep things in one function unless composable or reusable.
  source:
    path: AGENTS.md
    lines: '11'
    commit: 3fb60d05e555dad020d3354602affe166ef0cc22
- rule: Rely on type inference when possible; avoid explicit type annotations or interfaces
    unless necessary for exports or clarity.
  source:
    path: AGENTS.md
    lines: '16'
    commit: 3fb60d05e555dad020d3354602affe166ef0cc22
- rule: Always prefer `createStore` over multiple `createSignal` calls
  source:
    path: packages/app/AGENTS.md
    lines: 14-16
  evidence: The gold solution wraps the existing `createStore` with `persisted` to
    persist the complex followup state, rather than breaking it down into multiple
    `createSignal` calls.
  category: architecture
- rule: Avoid using the `any` type
  source:
    path: AGENTS.md
    lines: 11-11
  evidence: The gold solution carefully defines `FollowupItem` and `FollowupEdit`
    types and passes them to `createStore` to ensure strict typing without falling
    back to `any`.
  category: style
distractors:
- rule: Rely on type inference when possible; avoid explicit type annotations or interfaces
    unless necessary for exports or clarity
  collision_type: would_cause_bug
  why_distracting: 'The agent might try to omit the generic type parameter `<{ items:
    ..., failed: ..., paused: ..., edit: ... }>` on `createStore` and rely on inference
    from the initial state `{ items: {}, failed: {}, paused: {}, edit: {} }`. This
    would infer the properties as empty objects `{}` rather than `Record<string, ...>`,
    causing type errors when trying to assign values later.'
  severity: high
  source:
    path: AGENTS.md
    lines: 14-15
- rule: Use single word names by default for new locals, params, and helper functions.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to name the new types `Item` and `Edit` to
    strictly follow the single-word naming rule. However, in a complex session component,
    these names are too generic and ambiguous, so `FollowupItem` and `FollowupEdit`
    are necessary for clarity.
  severity: medium
  source:
    path: AGENTS.md
    lines: 27-28
hierarchy_analysis: The root `AGENTS.md` provides general TypeScript and naming guidelines,
  while `packages/app/AGENTS.md` provides SolidJS-specific guidelines. The SolidJS
  rule to use `createStore` aligns perfectly with the solution. However, the root
  rule to rely on type inference conflicts with the need to explicitly type the `createStore`
  generic parameter when initializing with empty objects `{}`. The agent must recognize
  that explicit types are necessary here to prevent TypeScript errors, overriding
  the general preference for inference.
