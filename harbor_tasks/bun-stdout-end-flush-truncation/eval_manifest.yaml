rubric:
- rule: String literal `require()` only
  source:
    path: src/js/CLAUDE.md
    lines: 14-24
  evidence: The gold solution uses `require("internal/fs/streams")` with a string
    literal to import `kWriteStreamFastPath`.
  category: style
- rule: $ prefix for private APIs and JSC intrinsics
  source:
    path: src/js/CLAUDE.md
    lines: 41-56
  evidence: The gold solution uses the `$isPromise(result)` intrinsic to check if
    the flush result is a promise, following the convention of using `$` prefixed
    private APIs.
  category: style
distractors:
- rule: 'Validation and Errors: validate callbacks using $isCallable'
  collision_type: scope_ambiguity
  why_distracting: The agent might try to validate the `cb` argument in `stream._final
    = function (cb)` using `$isCallable(cb)` or `validateFunction`. However, `_final`
    is an internal stream lifecycle method called by the Node.js stream machinery,
    which guarantees `cb` is a function. Adding validation here is unnecessary.
  severity: medium
  source:
    path: src/js/CLAUDE.md
    lines: 58-66
- rule: Use `.$call` and `.$apply` for callbacks to prevent tampering
  collision_type: scope_ambiguity
  why_distracting: The agent might try to invoke the callback using `cb.$call(undefined,
    null)` to prevent user tampering. However, since `cb` is an internal callback
    provided by the stream implementation (not user code), a direct call `cb(null)`
    is safe and correct.
  severity: low
  source:
    path: src/js/CLAUDE.md
    lines: 41-53
hierarchy_analysis: The hierarchy correctly narrows from general Zig/C++ build instructions
  in the root `CLAUDE.md` to JS builtin specific rules in `src/js/CLAUDE.md`. The
  JS builtin rules take precedence for this TypeScript file, dictating the use of
  `$` intrinsics and string literal requires.
