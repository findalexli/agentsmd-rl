rubric:
  - rule: "When adding psutil import in memory_utils.py, place it after the logging import and before torch import to follow existing import ordering conventions."
    reference: "import psutil\nimport torch"

  - rule: "When adding host memory metrics to the available_memory() return dictionary, use the _byte_to_gb() helper function (already defined in the file) to convert bytes to GB, just like the existing GPU memory keys do."
    reference: '"host_total_GB": _byte_to_gb(vm.total)'

  - rule: "When naming new host memory metric keys, follow the existing _GB suffix pattern used by GPU memory keys (total_GB, free_GB, used_GB, reserved_GB) and prefix with 'host_' to distinguish from GPU metrics."
    reference: '"host_total_GB", "host_available_GB", "host_used_GB", "host_free_GB"'
