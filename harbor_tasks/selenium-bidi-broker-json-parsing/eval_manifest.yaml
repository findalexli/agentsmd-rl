source_pr:
  owner: SeleniumHQ
  repo: selenium
  pr_number: 17206
  title: "[dotnet] [bidi] Optimize processing of incoming messages"
  merge_commit: ec5d115dc192989815344e4f62faaee2798ea963
  base_commit: 87db23284dceb224d13a13c4b72da5a2e6b7f21a

# Each test_* function in test_outputs.py has a corresponding check
checks:
  - id: test_uses_valuetextequals_for_properties
    type: fail_to_pass
    origin: code_quality
    description: Uses ValueTextEquals() with UTF-8 byte literals for JSON property parsing

  - id: test_int_indices_for_params
    type: fail_to_pass
    origin: code_quality
    description: Uses int type for params indices instead of long

  - id: test_message_type_constants
    type: fail_to_pass
    origin: code_quality
    description: Uses int constants for message types instead of string comparison

  - id: test_unknown_message_type_handling
    type: fail_to_pass
    origin: code_quality
    description: Handles unknown message types with warning logging

  # Pass-to-pass gates - verify repo CI/CD checks pass on both base and fixed commits
  - id: test_bazel_assembly_info_build
    type: pass_to_pass
    origin: repo_tests
    description: Bazel can build assembly-info target for dotnet webdriver

  - id: test_broker_cs_exists
    type: pass_to_pass
    origin: repo_tests
    description: Broker.cs file exists and is readable

# Agent config rules extracted from dotnet/AGENTS.md and root AGENTS.md
agent_config:
  - source: dotnet/AGENTS.md
    lines: "12-16"
    rule: Use XML documentation comments for public APIs

  - source: dotnet/AGENTS.md
    lines: "18-20"
    rule: The codebase is migrating to async - use async patterns

  - source: AGENTS.md
    lines: "12-14"
    rule: Avoid repo-wide refactors/formatting; prefer small, reversible diffs

  - source: AGENTS.md
    lines: "24-26"
    rule: Prefer small (unit) tests over browser tests for speed/reliability

  - source: AGENTS.md
    lines: "28-30"
    rule: Comments should explain why, not what - prefer well-named methods

# Soft/rubric rules - LLM judged
rubric: []
