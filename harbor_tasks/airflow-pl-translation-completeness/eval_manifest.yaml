config_edits:
- description: 'Gold patch adds a Terminology Glossary section that records three preferred-vs-avoided wording decisions (Consuming Asset → Zabierający zasób; Bulk → grupow*; Deactivated → Deaktywow*).

    '
  path: .github/skills/airflow-translations/locales/pl.md
  gold_added: "## Terminology Glossary\n\nPreferred wording for specific UI terms. Apply these to new translations and\nprefer them when reviewing existing ones.\n\n| English / context | Preferred Polish | Avoid |\n|---|---|---|\n| Consuming Asset (asset consumed by a Dag run) | **Zabierający zasób** | ~~Konsumujący zasób~~ |\n| Bulk clear / delete / update (toaster and button labels) | **grupowy / grupowego / grupowej / grupowe …** | ~~masowy / masowego / masowej / masowe~~ |\n| Deactivated (Dag header status) | **Deaktywowany** / Deaktywowana / Deaktywowane | ~~Dezaktywowany~~ |\n\nNotes:\n\n- For \"bulk <verb>\" always use \"grupowy\" with the grammatical form that\n  matches the noun — e.g. \"żądanie grupowego wyczyszczenia\", \"żądanie\n  grupowej aktualizacji\". Never use \"masowy\".\n- \"Deactivated\" / \"Deaktywowany\" must agree in gender with the noun it\n  describes (e.g. neuter \"zadanie\" → \"Deaktywowane\").\n"
  gold_removed: ''
rubric:
- id: polish_plural_forms_correct
  source:
    commit: e7a3124af9250e77b60485647c10277f7ce86e54
    lines: Plural Forms
    path: .github/skills/airflow-translations/locales/pl.md
  rule: 'Polish plural-form keys, when introduced, use the four-form scheme (_one / _few / _many / _other) per the rules in pl.md, with the correct grammatical case for each form (nominative singular, nominative plural, genitive plural, fractions / general plural).

    '
- id: polish_diacritics_preserved
  source:
    commit: e7a3124af9250e77b60485647c10277f7ce86e54
    lines: Diacritics
    path: .github/skills/airflow-translations/locales/pl.md
  rule: 'Polish diacritics (ą, ć, ę, ł, ń, ó, ś, ź, ż) are present where the Polish word requires them — e.g. ''żądanie'', ''wybierz'', ''usunięcia'', ''połączenie''. ASCII fallbacks (''zadanie'' for ''żądanie'' meaning request, ''usuniete'') are not acceptable.

    '
- id: polish_gender_agreement
  source:
    commit: e7a3124af9250e77b60485647c10277f7ce86e54
    lines: Gender Agreement
    path: .github/skills/airflow-translations/locales/pl.md
  rule: 'Verbs / adjectives agree in gender (masculine, feminine, neuter) with the nouns they describe — e.g. neuter ''zadanie'' takes ''Deaktywowane'', not ''Deaktywowany''. The new ''Deactivated'' translation, the bulk-action success / error wording, and any new participles must respect gender agreement.

    '
- id: polish_uses_informal_ty
  source:
    commit: e7a3124af9250e77b60485647c10277f7ce86e54
    lines: Verb Forms and User Address
    path: .github/skills/airflow-translations/locales/pl.md
  rule: 'User-facing copy uses informal lowercase ''ty'' addressing — e.g. ''Nie masz uprawnień...'' — not formal ''Pan/Pani'' constructions, per the Verb Forms and User Address section of pl.md.

    '
- id: untranslated_terms_kept_in_english
  source:
    commit: e7a3124af9250e77b60485647c10277f7ce86e54
    lines: Terms Kept in English
    path: .github/skills/airflow-translations/SKILL.md
  rule: 'Terms listed as kept-in-English in the parent SKILL.md (''Airflow'', ''Dag'' / ''Dagi'', ''XCom'' / ''XComs'', ''Provider'' / ''Providers'', ''REST API'', ''JSON'', ''ID'', ''PID'', ''UTC'', ''Schema'', plus log levels CRITICAL / ERROR / WARNING / INFO / DEBUG) are not translated to Polish.

    '
- id: glossary_section_well_formed
  source:
    commit: 9483d1006e068430c936da92ae67ccbefa261299
    lines: Terminology Glossary
    path: .github/skills/airflow-translations/locales/pl.md
  rule: 'The new ''## Terminology Glossary'' section in pl.md is well-formed: it has a clear heading, a comparison structure that distinguishes preferred from avoided wording for each of the three terms, and is placed sensibly (after the variable / placeholder examples, before the Terminology Reference section).

    '
- id: bulk_grupow_grammatical_case
  source:
    commit: 9483d1006e068430c936da92ae67ccbefa261299
    lines: Terminology Glossary, notes section
    path: .github/skills/airflow-translations/locales/pl.md
  rule: 'The new toaster.bulk{Clear,Update,Delete} strings use the correct grammatical case of ''grupowy'' — e.g. genitive ''grupowego'' with ''żądanie ... usunięcia'' (neuter genitive object), ''grupowej'' with ''aktualizacji'' (feminine genitive). They are not stuck in the nominative form.

    '
