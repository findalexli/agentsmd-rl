rubric:
- rule: MCP tools must include proper scopes and annotations when being enabled
  source:
    path: products/llm_analytics/mcp/tools.yaml
    lines: 35-55
    commit: d67b05b91702b8d6c5fcf03a1361d1afe7daf287
- rule: New skills must use lowercase kebab-case naming with gerund form
  source:
    path: products/llm_analytics/mcp/tools.yaml
    lines: 35-55
    commit: d67b05b91702b8d6c5fcf03a1361d1afe7daf287
- rule: SKILL.md files must include required frontmatter with name and description
    fields
  source:
    path: products/llm_analytics/mcp/tools.yaml
    lines: 35-55
    commit: d67b05b91702b8d6c5fcf03a1361d1afe7daf287
- rule: Helper scripts in skills should have proper CLI interfaces with usage messages
  source:
    path: pyproject.toml
    lines: 280-295
    commit: d67b05b91702b8d6c5fcf03a1361d1afe7daf287
- rule: Python code should use type hints
  source:
    path: pyproject.toml
    lines: 280-295
    commit: d67b05b91702b8d6c5fcf03a1361d1afe7daf287
- rule: MCP tool names must be lowercase kebab-case following the domain-action pattern
  source:
    path: products/llm_analytics/mcp/tools.yaml
    lines: 35-55
    commit: d67b05b91702b8d6c5fcf03a1361d1afe7daf287
- rule: Skills must only use references and scripts subdirectories
  source:
    path: pyproject.toml
    lines: 280-295
    commit: d67b05b91702b8d6c5fcf03a1361d1afe7daf287
- rule: 'Scope convention: use `llma` for LLM analytics changes (for example, `feat(llma):
    ...`)'
  source:
    path: AGENTS.md
    lines: 30-31
  evidence: 'The commit message uses the exact scope convention requested: `feat(llma):
    enable clustering read tools and add exploring-llm-clusters skill`.'
  category: style
- rule: Description should be lowercase and not end with a period, and keep the first
    line under 72 characters.
  source:
    path: AGENTS.md
    lines: 41-42
  evidence: The commit message description (`enable clustering read tools and add
    exploring-llm-clusters skill`) is entirely lowercase, does not end with a period,
    and the first line is exactly 71 characters long
  category: style
- rule: Be accurate and thorough
  source:
    path: .cursorrules
    lines: 4-5
  evidence: The tool descriptions added to `tools.yaml` are highly detailed, explaining
    the analysis level, event filters, and exactly how to query the results via docs-search
    or execute-sql.
  category: documentation
- rule: Use conventional commits for all commit messages and PR titles.
  source:
    path: AGENTS.md
    lines: 28-29
  evidence: 'The patch subject uses the conventional commit format `feat(llma): ...`'
  category: style
distractors:
- rule: 'Lint: Python: `ruff check . --fix` and `ruff format .`'
  collision_type: rule_conflict
  why_distracting: The agent is instructed to run ruff and format Python code, which
    might lead it to format the new print_clusters.py script or include it in the
    standard linting pipeline, conflicting with the explicit task instruction to exclude
    skill scripts from Python formatting.
  severity: medium
  source:
    path: AGENTS.md
    lines: 16-18
- rule: 'Tests: All tests: `pytest`'
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to write standard pytest unit tests for
    the new print_clusters.py script, but this is an agent skill helper script, not
    a production backend feature, and the task does not request tests.
  severity: low
  source:
    path: AGENTS.md
    lines: 11-13
hierarchy_analysis: The agent must navigate root-level configuration files (package.json,
  pyproject.toml) to implement exclusions for a deeply nested product-specific directory
  (products/llm_analytics/skills/). It must prioritize the explicit task instructions
  to bypass the general Python linting rules defined in AGENTS.md.
