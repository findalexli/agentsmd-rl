distractors:
- rule: To run lint, run 'lintrunner -a' (which will autoapply changes)
  collision_type: rule_conflict
  why_distracting: Conflicts with CLAUDE.md which explicitly instructs to use `spin
    lint` and `spin fixlint`. The agent might try to run `lintrunner` which might
    not be available or the preferred tool in the current environment setup.
  severity: high
  source:
    path: AGENTS.md
    lines: '11'
- rule: Once the change is passing, find an appropriate test file to add the test
    to and make sure to follow local conventions on the test file.
  collision_type: scope_ambiguity
  why_distracting: The prompt explicitly limits the scope of the fix to three specific
    files (`shim_common.cpp`, `shim.h`, `ops.h`). Following this rule to find and
    modify a test file would violate the strict scope constraint.
  severity: high
  source:
    path: AGENTS.md
    lines: 4-6
- rule: Minimize comments; be concise; code should be self-explanatory and self-documenting.
  collision_type: scope_ambiguity
  why_distracting: The agent might omit the crucial explanation in `shim.h` about
    how `deleter_ctx` is used to pass capturing lambdas across the C ABI boundary,
    strictly adhering to 'minimize comments' despite the complexity of the ABI boundary.
  severity: medium
  source:
    path: CLAUDE.md
    lines: '56'
hierarchy_analysis: 'The hierarchy contains a direct conflict regarding linting tools:
  `CLAUDE.md` mandates `spin lint` while `AGENTS.md` mandates `lintrunner -a`. Additionally,
  `AGENTS.md` instructs the agent to add tests to an appropriate test file, which
  conflicts with the strict file scope provided in the prompt. The agent must prioritize
  the prompt''s scope constraints over the general testing guidelines in `AGENTS.md`.'
