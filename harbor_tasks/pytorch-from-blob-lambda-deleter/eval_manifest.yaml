checks:
  - id: shim_h_two_arg_deleter_callback
    type: fail_to_pass
    origin: pr_diff
    description: "shim.h declares a C function with a two-arg deleter callback: void (*)(void*, void*)"

  - id: shim_h_context_pointer
    type: fail_to_pass
    origin: pr_diff
    description: "shim.h torch_from_blob declaration carries a separate void* context parameter after the callback"

  - id: shim_cpp_wraps_two_arg_callback
    type: fail_to_pass
    origin: pr_diff
    description: "shim_common.cpp accepts a two-arg callback and wraps it for at::for_blob"

  - id: ops_h_generic_callable
    type: fail_to_pass
    origin: pr_diff
    description: "ops.h from_blob accepts generic callables (template or std::function), not just DeleterFnPtr"

  - id: shim_cpp_context_forwarded
    type: fail_to_pass
    origin: pr_diff
    description: "shim_common.cpp forwards the context pointer through a wrapping lambda to the two-arg callback"

  - id: no_deleter_overload_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "The no-deleter from_blob overload still exists for backward compatibility"

  - id: files_not_stubbed
    type: pass_to_pass
    origin: static
    description: "Modified files have real implementation, not stubs"

  - id: shim_cpp_null_callback_guard
    type: pass_to_pass
    origin: pr_diff
    description: "shim_common.cpp still guards against nullptr callback for backward compatibility"

