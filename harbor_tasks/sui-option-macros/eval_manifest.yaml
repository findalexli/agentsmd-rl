instruction: |
  The std::option module in the Move standard library is missing several useful macro functions.
  Add the following 5 macro functions to the option.move file:

  1. map_mut - Map an Option<T> to Option<U> by applying a function to a contained value by mutable reference.
     The original Option<T> is preserved, though potentially modified.

  2. is_none_or - Return true if the value is None, or if the predicate returns true for the contained value.

  3. fold - Consume the option and return a default value if None, otherwise apply a function to the contained value.

  4. fold_ref - Like fold but borrows the value instead of consuming it. Original option is preserved.

  5. fold_mut - Like fold_ref but with mutable borrow.

  Follow the existing patterns in the file for macro function definitions.
  The file is located at: crates/sui-framework/packages/move-stdlib/sources/option.move

