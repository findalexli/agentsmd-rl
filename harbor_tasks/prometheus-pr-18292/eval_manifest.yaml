checks:
- id: test_concurrent_append_same_labels
  type: fail_to_pass
  origin: repo_tests
  description: Concurrent appends for same label set produce exactly one series in memory and one series record in the WAL.
- id: test_concurrent_atomic_insert
  type: fail_to_pass
  origin: repo_tests
  description: Concurrent atomic insert calls for the same label set all return the same canonical series without duplicates.
- id: test_gc_concurrent_safety
  type: fail_to_pass
  origin: repo_tests
  description: Concurrent atomic insert and GC do not deadlock, survivors remain reachable, and GC-eligible series are removed.
- id: test_stripe_series_atomic_operation
  type: fail_to_pass
  origin: repo_tests
  description: StripeSeries atomic check-then-insert creates series on first call and returns existing series on second call.
- id: test_agent_package_compiles
  type: pass_to_pass
  origin: repo_tests
  description: Agent package compiles without errors.
- id: test_existing_agent_tests
  type: pass_to_pass
  origin: repo_tests
  description: All existing agent package tests pass.
- id: test_go_vet_passes
  type: pass_to_pass
  origin: repo_tests
  description: go vet passes on agent package.
- id: test_go_mod_verify
  type: pass_to_pass
  origin: repo_tests
  description: go mod verify passes - module dependencies are consistent.
- id: test_stripe_series_get
  type: pass_to_pass
  origin: repo_tests
  description: TestStripeSeries_Get passes - verifies GetByHash with hash collisions.
- id: test_no_deadlock
  type: pass_to_pass
