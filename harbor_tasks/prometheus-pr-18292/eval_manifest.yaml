rubric:
- rule: Bug fixes require a test that reproduces the bug.
  source:
    path: AGENTS.md
    lines: '73'
    commit: f99f3bb65d779dbaafe8b617c398b4f79b02e6d9
  evidence: Gold patch adds TestConcurrentAppendSameLabels, TestSetUnlessAlreadySetConcurrentSameLabels, and TestSetUnlessAlreadySetConcurrentGC tests that reproduce the race condition.
  category: testing
  verification: llm_judge
- rule: All exposed objects must have a doc comment.
  source:
    path: AGENTS.md
    lines: '104'
    commit: f99f3bb65d779dbaafe8b617c398b4f79b02e6d9
  evidence: SetUnlessAlreadySet method has a complete Go doc comment documenting insertion behavior, return values, and the no-deadlock invariant.
  category: style
  verification: llm_judge
- rule: All comments must start with a capital letter and end with a full stop.
  source:
    path: AGENTS.md
    lines: '105'
    commit: f99f3bb65d779dbaafe8b617c398b4f79b02e6d9
  evidence: All comments in the gold patch follow capitalization and full-stop conventions, including the SetUnlessAlreadySet doc comment and inline comments.
  category: style
  verification: llm_judge
- rule: Tests should attempt to mirror realistic data and/or behaviour.
  source:
    path: AGENTS.md
    lines: '76'
    commit: f99f3bb65d779dbaafe8b617c398b4f79b02e6d9
  evidence: TestConcurrentAppendSameLabels spawns 100 concurrent goroutines appending the same label set, mirroring realistic high-concurrency agent scenarios.
  category: testing
  verification: llm_judge
distractors:
- rule: Performance improvements require a benchmark that demonstrates the improvement.
  source:
    path: AGENTS.md
    lines: '85'
    commit: f99f3bb65d779dbaafe8b617c398b4f79b02e6d9
  collision_type: architecture_boundary
  why_distracting: This is a correctness fix for a race condition, not a performance change. Adding benchstat benchmarks adds unnecessary scope.
  severity: low
- rule: State your assumptions.
  source:
    path: AGENTS.md
    lines: '101'
    commit: f99f3bb65d779dbaafe8b617c398b4f79b02e6d9
  collision_type: would_cause_bug
  why_distracting: In concurrent programming, stating 'assumptions' about lock ordering or goroutine scheduling is dangerous because correctness requires invariant guarantees, not semantic assumptions.
  severity: medium
