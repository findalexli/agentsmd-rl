version: "2.0"

source:
  repo: "oven-sh/bun"
  pr: 28301
  base_commit: "66f7c41412e8a41c9686b0f4524b778a5f69b40e"
  merge_commit: "9e93bfa1b69a2f9b8c05acb15e02c5506dd4cbc8"

checks:
  - id: asan_true_skips_memory_leak_tests
    type: fail_to_pass
    origin: pr_diff
    description: "When isASAN=true, memory leak tests are skipped via todoIf/skipIf"

  - id: asan_imported_from_harness
    type: fail_to_pass
    origin: pr_diff
    description: "isASAN is imported from the harness module"

  - id: non_asan_build_tests_still_run
    type: pass_to_pass
    origin: pr_diff
    description: "When isASAN=false (normal build), memory leak tests are NOT skipped"

  - id: original_test_cases_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "All 7 original memory leak test case names still present"

  - id: existing_skip_conditions_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "Existing isFlaky && isWindows skip condition still present"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "File retains substantial test logic (not gutted/stubbed)"

  - id: uses_module_scope_import
    type: fail_to_pass
    origin: agent_config
    description: "isASAN is imported via a module-scope import statement, not a dynamic import"
    source:
      path: "test/AGENTS.md"
      lines: "219-220"
      commit: "66f7c41412e8a41c9686b0f4524b778a5f69b40e"

  - id: skip_uses_deterministic_detection
    type: fail_to_pass
    origin: agent_config
    description: "Skip condition uses deterministic build flag, not timing heuristics"
    source:
      path: "CLAUDE.md"
      lines: "102"
      commit: "66f7c41412e8a41c9686b0f4524b778a5f69b40e"

  - id: uses_standard_skip_pattern
    type: fail_to_pass
    origin: agent_config
    description: "Uses standard bun:test skip mechanisms (todoIf/skipIf), not process.exit"
    source:
      path: "CLAUDE.md"
      lines: "228"
      commit: "66f7c41412e8a41c9686b0f4524b778a5f69b40e"

rubric:
  - rule: "Do not write flaky tests. Do not use setTimeout in tests. Instead, await the condition to be met."
    source:
      path: "CLAUDE.md"
      lines: "102"
      commit: "66f7c41412e8a41c9686b0f4524b778a5f69b40e"

  - rule: "Do not write flaky tests. Unless explicitly asked, never wait for time to pass in tests. Always wait for the condition to be met instead of waiting for an arbitrary amount of time."
    source:
      path: "test/CLAUDE.md"
      lines: "21"
      commit: "66f7c41412e8a41c9686b0f4524b778a5f69b40e"
