  base_commit: d6259a73046775d90e2440117ee05cc439f26d04

description: |
  Fixes Gemini API 400 errors caused by consecutive messages with the same role
  breaking Gemini's strict role-alternation requirement. Adds a post-processing
  step that merges consecutive same-role messages by combining their parts arrays.

