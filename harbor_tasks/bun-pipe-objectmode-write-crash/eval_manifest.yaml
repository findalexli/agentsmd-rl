distractors:
- rule: NEVER write tests that check for no 'panic' or 'uncaught exception' or similar
    in the test output.
  collision_type: rule_conflict
  why_distracting: The bug report explicitly mentions an 'Uncatchable crash' and 'process
    crashes'. An agent would naturally want to write a test that asserts the process
    does not crash or throw an uncaught exception, but the config explicitly forbids
    this pattern because it won't fail in CI.
  severity: high
