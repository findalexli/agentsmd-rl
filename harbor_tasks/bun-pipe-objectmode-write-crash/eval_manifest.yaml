  category: style
distractors:
- rule: 'CRITICAL: Use `.$call` and `.$apply`, never `.call` or `.apply`'
  collision_type: architecture_boundary
  why_distracting: An agent might try to call `dest.write.$call(dest, chunk)` or `dest.destroy.$call(dest,
    err)` to prevent tampering. However, `dest` is a user-provided stream object,
    and we are calling its public methods, not invoking an internal callback function.
    Using `$call` on user objects crosses the boundary between internal builtins and
    userland objects.
  severity: high
  source:
    path: src/js/CLAUDE.md
    lines: 37-44
- rule: 'Validation and Errors: throw $ERR_INVALID_ARG_TYPE(...)'
  collision_type: scope_ambiguity
  why_distracting: An agent might try to proactively validate the chunk type against
    the destination stream's `objectMode` and throw `$ERR_INVALID_ARG_TYPE` manually
    before calling `write()`. But the issue states `dest.write()` already throws this
    error; the bug is simply that the error isn't caught and forwarded to `dest.destroy()`.
  severity: medium
  source:
    path: src/js/CLAUDE.md
    lines: 56-62
hierarchy_analysis: The hierarchy progresses from general Bun repo instructions (Level
  0) to Zig-specific system call instructions (Level 1) to JS builtins instructions
  (Level 2). Since the file being edited is a JS builtin (`src/js/internal/streams/readable.ts`),
  the rules in `src/js/CLAUDE.md` are the most relevant. The Zig rules in `src/CLAUDE.md`
  are completely irrelevant for this PR and should be ignored.
