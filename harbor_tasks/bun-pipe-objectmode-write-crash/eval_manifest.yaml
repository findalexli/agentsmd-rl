version: "2.0"

source:
  repo: "oven-sh/bun"
  pr: 28432
  base_commit: "2d4c2beb23085873380840c9bd18eeca29645843"
  merge_commit: "2920fac5f712c2714e3a0a97c2d6e8e8ad47cc1e"

checks:
  - id: target_file_exists
    type: pass_to_pass
    origin: static
    description: "Target file exists and contains Readable.prototype.pipe"

  - id: write_error_caught_and_forwarded
    type: fail_to_pass
    origin: pr_diff
    description: "dest.write() throwing TypeError is caught; error forwarded via dest.destroy()"

  - id: exact_error_object_propagated
    type: fail_to_pass
    origin: pr_diff
    description: "The exact error object thrown by write() is passed to dest.destroy()"

  - id: different_error_types_caught
    type: fail_to_pass
    origin: pr_diff
    description: "RangeError from write() is also caught, not just TypeError"

  - id: normal_write_still_works
    type: pass_to_pass
    origin: pr_diff
    description: "Non-throwing dest.write() still passes data through"

  - id: backpressure_pause
    type: pass_to_pass
    origin: pr_diff
    description: "dest.write() returning false still triggers pause()"

  - id: ondata_not_stub
    type: pass_to_pass
    origin: static
    description: "ondata function has real logic, not a stub"

  - id: no_bare_call_apply_in_ondata
    type: pass_to_pass
    origin: agent_config
    description: "Use .$call/.$apply, not .call/.apply in ondata"
    source:
      path: "src/js/CLAUDE.md"
      lines: "56-65"
      commit: "2d4c2beb23085873380840c9bd18eeca29645843"

  - id: no_console_log_in_ondata
    type: pass_to_pass
    origin: agent_config
    description: "Debug logging must use $debug(), not console.log"
    source:
      path: "src/js/CLAUDE.md"
      lines: "71"
      commit: "2d4c2beb23085873380840c9bd18eeca29645843"

