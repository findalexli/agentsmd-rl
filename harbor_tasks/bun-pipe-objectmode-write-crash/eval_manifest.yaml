- rule: 'Validation and Errors: throw $ERR_INVALID_ARG_TYPE(...)'
  collision_type: architecture_boundary
  why_distracting: The bug is caused by `ERR_INVALID_ARG_TYPE` being thrown by the
    destination stream. An agent might try to use Bun's internal validation helpers
    (like `$ERR_INVALID_ARG_TYPE`) to check the chunk type before writing, rather
    than correctly catching the error thrown by the destination stream as Node.js
    does.
  severity: medium
  source:
    path: src/js/AGENTS.md
    lines: 48-54
