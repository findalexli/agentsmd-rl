rubric:
- rule: When writing tests, they should be added to an existing file. The only exception
    is for PRs to add a new model, when a new test directory should be created for
    that model.
  source:
    path: .github/copilot-instructions.md
    lines: '16'
    commit: 7b00e3ba398d355d5f277a4896743b16f21049eb
- rule: Do not edit a `# Copied from` block, as it will be reverted by `make fix-repo`.
  source:
    path: CLAUDE.md
    lines: '66'
    commit: 7b00e3ba398d355d5f277a4896743b16f21049eb
- rule: PRs should be as brief as possible. Bugfix PRs in particular can often be
    only one or two lines long, and do not need large comments, docstrings or new
    functions. Aim to minimize the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: 7b00e3ba398d355d5f277a4896743b16f21049eb
- rule: Do not add helper methods or abstractions just to satisfy the type checker
    (especially for only 1-2 occurrences).
  source:
    path: .ai/skills/add-or-fix-type-checking/SKILL.md
    lines: 196-197
    commit: 7b00e3ba398d355d5f277a4896743b16f21049eb
- rule: When a modular file is present, generated files should not be edited, as changes
    will be overwritten by make fix-repo. Instead, edit the modular file.
  source:
    path: CLAUDE.md
    lines: '67'
    commit: 7b00e3ba398d355d5f277a4896743b16f21049eb
- rule: Avoid direct inheritance between model-specific files in src/transformers/models/
  source:
    path: CLAUDE.md
    lines: 54-55
  evidence: The gold solution edits GraniteConfig, GraniteMoeConfig, and GraniteMoeSharedConfig
    independently instead of refactoring them to inherit from a shared base class.
  category: architecture
distractors:
- rule: 'Fail-closed behavior for agents: If coordination evidence cannot be found,
    do not proceed to PR-ready output.'
  collision_type: meta_confusion
  why_distracting: In an isolated evaluation environment, the agent cannot search
    GitHub for coordination evidence. Following this rule strictly would cause the
    agent to refuse to generate the patch.
  severity: high
  source:
    path: CLAUDE.md
    lines: 49-52
- rule: 'No low-value busywork PRs: Do not open one-off PRs for tiny edits.'
  collision_type: scope_ambiguity
  why_distracting: The fix only changes a few type hints (adding `| int`), which looks
    like a tiny edit. The agent might refuse to fix it, but it's actually a critical
    bug fix for model loading, not just a lint cleanup.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 35-37
- rule: Copies are kept in sync by `make fix-repo`. Ideally you should edit the code
    it's copying from and propagate the change.
  collision_type: would_cause_bug
  why_distracting: The agent might assume the Moe configs are copied from the base
    Granite config and only edit the base one, expecting `make fix-repo` to propagate
    the changes. However, the hint explicitly says to apply the fix consistently across
    all three, and they have different fields (e.g., `| None` in Moe configs), meaning
    they aren't exact copies for these lines.
  severity: high
  source:
    path: CLAUDE.md
    lines: 56-58
hierarchy_analysis: CLAUDE.md and AGENTS.md contain identical rules. The rules focus
  heavily on repository contribution policies and managing code duplication across
  models.
