rubric:
  - rule: "When writing tests, they should be added to an existing file. The only exception is for PRs to add a new model, when a new test directory should be created for that model."
    source:
      path: ".github/copilot-instructions.md"
      lines: "16"
      commit: "7b00e3ba398d355d5f277a4896743b16f21049eb"
  - rule: "Do not edit a `# Copied from` block, as it will be reverted by `make fix-repo`."
    source:
      path: "CLAUDE.md"
      lines: "66"
      commit: "7b00e3ba398d355d5f277a4896743b16f21049eb"
  - rule: "PRs should be as brief as possible. Bugfix PRs in particular can often be only one or two lines long, and do not need large comments, docstrings or new functions. Aim to minimize the size of the diff."
    source:
      path: ".github/copilot-instructions.md"
      lines: "15"
      commit: "7b00e3ba398d355d5f277a4896743b16f21049eb"
  - rule: "Do not add helper methods or abstractions just to satisfy the type checker (especially for only 1-2 occurrences)."
    source:
      path: ".ai/skills/add-or-fix-type-checking/SKILL.md"
      lines: "196-197"
      commit: "7b00e3ba398d355d5f277a4896743b16f21049eb"
  - rule: "When a modular file is present, generated files should not be edited, as changes will be overwritten by make fix-repo. Instead, edit the modular file."
    source:
      path: "CLAUDE.md"
      lines: "67"
      commit: "7b00e3ba398d355d5f277a4896743b16f21049eb"
