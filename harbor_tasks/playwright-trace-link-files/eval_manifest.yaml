rubric:
- rule: TraceLoader.load() must accept optional traceFile parameter as second argument
    for filtering trace files
  reference: 'async load(backend: TraceLoaderBackend, traceFile?: string, unzipProgress?:
    (done: number, total: number) => void)'
- rule: CLI program.ts must catch errors from cliProgram() with .catch(logErrorAndExit)
    for proper error handling
  reference: cliProgram().catch(logErrorAndExit)
- rule: The `playwright-core` package is responsible for the browser automation engine,
    including client, server, dispatchers, and protocol.
  source:
    path: CLAUDE.md
    lines: 3-8
  evidence: The gold solution correctly modifies `packages/playwright-core/src/cli/program.ts`
    and `packages/playwright-core/src/tools/trace/traceUtils.ts`, aligning with the
    architecture that the core engine, se
  category: architecture
distractors:
- rule: 'Tooling Packages: `trace-viewer` is the Trace viewer UI.'
  collision_type: architecture_boundary
  why_distracting: The issue is about opening `.trace` files via the Playwright trace
    CLI. The rule states `trace-viewer` is the 'Trace viewer UI'. An agent might mistakenly
    try to add the `.link` file creation or trace loading logic in the `trace-viewer`
    package. However, the CLI and trace file extraction/loading utilities are actually
    part of `playwright-core`.
  severity: high
  source:
    path: CLAUDE.md
    lines: 16-20
- rule: 'Decision rule: Does the test need browser/browserType/context -> tests/library/.
    Just needs page + server -> tests/page/.'
  collision_type: scope_ambiguity
  why_distracting: The rule provides a strict decision matrix for where to put tests
    (`tests/page/` vs `tests/library/`). An agent might try to force CLI or trace
    loader tests into one of these directories, even though they are meant for browser/page
    user interactions and lifecycle, not CLI unit tests or trace file utilities.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 63-70
hierarchy_analysis: The repository uses a single `CLAUDE.md` file at the root level.
  The guidance is heavily focused on testing, linting, and package architecture. The
  primary challenge for an agent is correctly mapping the feature request (Trace CLI
  and trace loading) to the correct package (`playwright-core` vs `trace-viewer`),
  as the documentation broadly categorizes `trace-viewer` as the tooling package for
  traces, but the backend loading logic resides in `playwright-core`.
