  title: "refactor(plugins): replace react-icons with antd icons, remove 83MB dependency"

checks:
  - id: test_table_chart_uses_antd_icons
    type: fail_to_pass
    origin: functional
    description: TableChart.tsx imports sort icons from @ant-design/icons

  - id: test_table_chart_no_react_icons
    type: fail_to_pass
    origin: functional
    description: TableChart.tsx does not import from react-icons

  - id: test_pivot_table_uses_antd_icons
    type: fail_to_pass
    origin: functional
    description: TableRenderers.tsx imports sort icons from @ant-design/icons

  - id: test_pivot_table_no_react_icons
    type: fail_to_pass
    origin: functional
    description: TableRenderers.tsx does not import from react-icons

  - id: test_sort_icon_logic_table_chart
    type: fail_to_pass
    origin: functional
    description: SortIcon function uses correct icon for each sort state

  - id: test_sort_icon_logic_pivot_table
    type: fail_to_pass
    origin: functional
    description: TableRenderers uses correct icon for each sort state

  - id: test_table_package_no_react_icons_dep
    type: fail_to_pass
    origin: functional
    description: plugin-chart-table/package.json does not have react-icons dependency

  - id: test_pivot_package_no_react_icons_dep
    type: fail_to_pass
    origin: functional
    description: plugin-chart-pivot-table/package.json does not have react-icons dependency

  - id: test_valid_import_syntax
    type: pass_to_pass
    origin: functional
    description: Import statement uses valid syntax with destructuring

  - id: test_sort_icon_function_exists
    type: pass_to_pass
    origin: functional
    description: SortIcon function exists and handles column sorting

  - id: test_repo_oxlint_table_plugin
    type: pass_to_pass
    origin: repo_tests
    description: Oxlint passes on plugin-chart-table

  - id: test_repo_oxlint_pivot_plugin
    type: pass_to_pass
    origin: repo_tests
    description: Oxlint passes on plugin-chart-pivot-table

  - id: test_repo_jest_table_chart
    type: pass_to_pass
    origin: repo_tests
    description: Jest tests pass for TableChart component

  - id: test_repo_jest_pivot_renderers
    type: pass_to_pass
    origin: repo_tests
    description: Jest tests pass for pivot table renderers

# Rubric rules describe coding conventions from CLAUDE.md.
# Note: The rubric judge evaluates config file edits (CLAUDE.md, AGENTS.md, README.md).
# This PR only changes code files (.tsx, package.json), so judge returns ICR=0 by design.
# The conventions ARE verified by functional tests (oxlint, jest, icon imports checks).
rubric:
  - id: use_antd_icons_not_react_icons
    rule: "Use @ant-design/icons instead of react-icons for icon components"
    notes: "Verified by test_table_chart_uses_antd_icons and test_pivot_table_uses_antd_icons"

  - id: remove_unused_dependencies
    rule: "Remove unused dependencies from package.json"
    notes: "Verified by test_table_package_no_react_icons_dep and test_pivot_package_no_react_icons_dep"

  - id: lint_and_test_pass
    rule: "Code must pass oxlint and jest tests"
    notes: "Verified by test_repo_oxlint_* and test_repo_jest_* pass-to-pass tests"
