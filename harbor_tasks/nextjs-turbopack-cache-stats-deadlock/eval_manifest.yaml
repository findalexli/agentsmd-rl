distractors:
- rule: 'Default agent rule: If you are changing Next.js source or integration tests,
    start `pnpm --filter=next dev` in a separate terminal session before making edits'
  collision_type: scope_ambiguity
  why_distracting: The rule mandates starting `pnpm --filter=next dev` for Next.js
    source changes. An agent might try to run this to test the Turbopack Rust changes,
    but the bug only occurs when a specific Cargo feature (`print_cache_item_size`)
    is enabled, which `pnpm dev` won't enable by default. The agent needs to use `cargo`
    directly in the crate to reproduce and verify the fix.
  severity: medium
  source:
    path: AGENTS.md
    lines: 65-70
hierarchy_analysis: The hierarchy is flat (Level 0 only). `AGENTS.md` and `CLAUDE.md`
  are symlinks to the same file. The instructions are heavily skewed towards the TypeScript/Next.js
  parts of the monorepo, providing little to no guidance for the Rust (`turbopack/crates/*`)
  workspace other than a generic `pnpm build-all` command.
