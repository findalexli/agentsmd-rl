distractors:
- rule: 'Start watch build in background: `pnpm --filter=next dev`'
  collision_type: scope_ambiguity
  why_distracting: The rule instructs the agent to start `pnpm --filter=next dev`
    in a background terminal for iterative development. However, this PR is a pure
    Rust fix in `turbo-tasks-backend` (Turbopack). Running the Next.js JS/TS dev server
    is irrelevant for compiling or testing a Rust deadlock and would waste agent time
    and resources.
  severity: high
  source:
    path: CLAUDE.md
    lines: 64-68
- rule: Run tests fast (no isolation, no packing) using `pnpm testheadless`
  collision_type: scope_ambiguity
  why_distracting: The rule suggests using `NEXT_SKIP_ISOLATE=1 pnpm testheadless`
    for fast test execution. This applies to the Next.js JS/TS test suite, but the
    agent is fixing a Rust deadlock in a Turbopack crate and should instead use `cargo
    test` within the specific crate.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 74-78
- rule: Prefer `pnpm --filter=next build` when edits are limited to core Next.js files
  collision_type: scope_ambiguity
  why_distracting: The rule advises preferring `pnpm --filter=next build` when edits
    are limited to core Next.js files. An agent might misinterpret this and try to
    use it to build the Rust changes, which will not properly compile the Turbopack
    Rust crates in isolation compared to using `cargo` directly.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 84-85
hierarchy_analysis: The config files (`CLAUDE.md` and `AGENTS.md`) are identical and
  heavily focused on the TypeScript/JavaScript side of the Next.js monorepo (`packages/next`).
  Because this bug is located entirely within the Rust-based Turbopack subsystem (`turbopack/crates/turbo-tasks-backend`),
  almost all of the build, dev, and test commands provided in the root config are
  distractors. The agent must recognize the architectural boundary between the JS
  framework and the Rust bundler to avoid applying JS-centric workflows to a Rust
  deadlock fix.
