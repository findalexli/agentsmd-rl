config_edits:
- path: demos/bookstore/README.md
  tier: 2
  gold_added: ''
  gold_removed: '- Tests can use [`router.run()`](../../packages/fetch-router/README.md#running-code-in-request-context)
    to execute request-scoped code inside the same middleware stack without creating
    test-only routes.'
- path: packages/fetch-router/README.md
  tier: 2
  gold_added: ''
  gold_removed: "### Running Code In Request Context\n\nUse `router.run()` when you\
    \ need to execute code inside the router's middleware/request context\nwithout\
    \ mapping a test-only route.\n\n```ts\nimport { asyncContext } from 'remix/async-context-middleware'\n\
    import { createRouter, createStorageKey } from 'remix/fetch-router'\n\nlet key\
    \ = createStorageKey<string>()\nlet router = createRouter({\n  middleware: [\n\
    \    asyncContext(),\n    (context, next) => {\n      context.storage.set(key,\
    \ 'from middleware')\n      return next()\n    },\n  ],\n})\n\nlet value = await\
    \ router.run('https://remix.run', ({ storage }) => storage.get(key))\nconsole.log(value)\
    \ // \"from middleware\"\n\n// You can also provide RequestInit, similar to router.fetch(input,\
    \ init)\nlet method = await router.run('https://remix.run', { method: 'POST' },\
    \ ({ method }) => method)\nconsole.log(method) // \"POST\"\n```\n\nThis is especially\
    \ useful in tests for request-scoped services like authenticated users, database\n\
    handles, correlation IDs, and per-request feature flag"
