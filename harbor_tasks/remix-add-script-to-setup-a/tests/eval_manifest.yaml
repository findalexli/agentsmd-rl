distractors:
- rule: 'Package exports: All `exports` in `package.json` have a dedicated file in
    `src` that defines the public API by re-exporting from within `src/lib`'
  collision_type: rule_conflict
  why_distracting: The task instruction explicitly requires the script to 'Apply `publishConfig`
    overrides so exports point to `dist/` instead of `src/`'. The config rule states
    that all exports have a dedicated file in `src`. An agent might incorrectly prioritize
    the config rule and fail to implement the `publishConfig` override, or try to
    implement complex re-exporting logic instead of a simple path replacement.
  severity: high
  source:
    path: AGENTS.md
    lines: 16-16
- rule: 'Adding changes: Create `packages/*/.changes/[major|minor|patch].short-description.md`
    files.'
  collision_type: scope_ambiguity
  why_distracting: The rule mandates creating a `.changes/` markdown file for changes.
    However, this rule is explicitly scoped to `packages/*` (published packages).
    This PR only adds repository infrastructure (GitHub Actions, scripts) and updates
    root documentation, so no change file is needed. An agent might blindly create
    a change file in a non-existent package or the root directory.
  severity: medium
  source:
    path: AGENTS.md
    lines: 38-38
- rule: Two-phase component structure
  source:
    path: /workspace/repo/packages/component/AGENTS.md
    lines: 86-89
  source_text: 'All components follow a consistent two-phase structure:


    1. **Setup Phase** - Runs once when the component is first created

    2. **Render Phase** - Runs on initial render and every update afterward'
  collision_type: scope_ambiguity
  why_distracting: An agent searching for "setup" (since the PR introduces setup-installable-branch.ts)
    might mistakenly try to apply component-based setup/render phases to the simple
    Node.js build script. This rule only applies to UI components, not repo maintenance
    scripts.
  severity: medium
- rule: Controlled vs Uncontrolled Inputs
  source:
    path: /workspace/repo/packages/component/AGENTS.md
    lines: 1672-1673
  source_text: Only control an input's value when something besides the user's interaction
    with that input can also control its state. Otherwise, let the DOM manage the
    input's value and read from it when needed. **This follows the principle of using
    minimal component state** - don't store input state you don't need.
  collision_type: scope_ambiguity
  why_distracting: This rule applies specifically to browser DOM inputs and frontend
    state management. An agent seeing 'input' or 'state' might get confused if applying
    this to CLI arguments or node script variables.
  severity: low
hierarchy_analysis: The config is a flat single file (`AGENTS.md`). The agent must
  synthesize the task instructions with the config rules, specifically recognizing
  that the instruction to override `publishConfig` to `dist/` takes precedence for
  this specific nightly build script over the general architectural rule about exports
  pointing to `src/`.
