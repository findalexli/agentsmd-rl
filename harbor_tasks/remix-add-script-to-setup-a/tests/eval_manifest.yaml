- rule: Use regular function declarations
  source:
    path: /workspace/repo/AGENTS.md
    lines: '25'
  source_text: '- **Functions**: Use regular function declarations/expressions by
    default. Only use arrow functions as callbacks (e.g., route handlers, array methods)
    where preserving lexical `this` is beneficial or the syntax is more concise'
  evidence: The script uses regular function declarations for its utility functions
    like `async function updateGitignore()`, `async function updatePackageDependencies()`,
    and `function commitChanges()`.
  category: functions
  verification: llm_judge
- rule: Format with single quotes and no semicolons
  source:
    path: /workspace/repo/AGENTS.md
    lines: '28'
