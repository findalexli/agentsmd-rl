distractors:
- rule: Use `it.effect` for all Effect-based tests, not `Effect.runSync` with regular `it`
  source:
    path: AGENTS.md
    lines: '79'
    commit: 4d97a61a15b9dd6a0eece65b8f0c035e16d42ada
  collision_type: scope_ambiguity
  why_distracting: The omit tests use regular it() with deepStrictEqual because they test pure AST manipulation without Effect values. The it.effect rule applies only to tests involving Effect computations.
  severity: medium
- rule: Import { assert, describe, it } from '@effect/vitest' - Never use expect from vitest in Effect tests
  source:
    path: AGENTS.md
    lines: '80'
    commit: 4d97a61a15b9dd6a0eece65b8f0c035e16d42ada
  collision_type: rule_conflict
  why_distracting: Existing omit tests use deepStrictEqual from @effect/vitest/utils, not assert. The assertion-style rule is orthogonal to the structural fix needed.
  severity: low
- rule: All pull requests must include a changeset in the `.changeset/` directory.
