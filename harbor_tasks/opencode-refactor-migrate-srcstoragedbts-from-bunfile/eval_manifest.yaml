    description: "Normal division still works correctly"

  - id: test_add_still_works
    type: pass_to_pass
    origin: repo_tests
    description: "Addition operation works"

  - id: test_subtract_still_works
    type: pass_to_pass
    origin: repo_tests
    description: "Subtraction operation works"

  - id: test_multiply_still_works
    type: pass_to_pass
    origin: repo_tests
    description: "Multiplication operation works"

  # static gate
  - id: test_python_syntax_valid
    type: pass_to_pass
