source_pr:
  owner: TanStack
  repo: router
  number: 7069
  title: "fix(router-core): align calculation of publicHref in parseLocation and buildLocation"
  merge_commit: 30835cb8e935b740c92fa95909a073e644dde530
  base_commit: 7b9faaeee045b018240cb29304c4cae207ce4e57

task:
  name: tanstack-router-publichref-ssr-fix
  description: Fix publicHref calculation mismatch causing double loader execution on SSR hydration
  primary_file: packages/router-core/src/router.ts

checks:
  - id: publichref_calculation_consistency
    name: "FAIL-TO-PASS: publicHref uses pathname + searchStr + hash"
    type: fail_to_pass
    test: test_publichref_calculation_consistency
    description: |
      buildLocation must use `publicHref: pathname + searchStr + hash` instead
      of `publicHref: href` to match parseLocation's calculation.
    origin: behavior_fix
    source: PR diff

  - id: parselocation_consistency
    name: "PARITY: parseLocation uses consistent pattern"
    type: pass_to_pass
    test: test_parseLocation_uses_consistent_calculation
    description: |
      parseLocation should use the same `pathname + searchStr + hash` pattern
      for publicHref calculation.
    origin: consistency_check
    source: codebase

  - id: no_raw_href_regression
    name: "ANTI-REGRESSION: No raw href in buildLocation"
    type: anti_regression
    test: test_no_raw_href_in_buildLocation_return
    description: |
      Ensure no remaining publicHref references use raw href without
      the pathname + searchStr + hash pattern.
    origin: guard_check
    source: derived

  - id: build_compiles
    name: "BUILD: TypeScript compiles successfully"
    type: pass_to_pass
    test: test_build_compiles
    description: "The fix must compile without TypeScript errors"
    origin: guard_check
    source: AGENTS.md

  - id: unit_tests_pass
    name: "TESTS: Unit tests pass"
    type: pass_to_pass
    test: test_unit_tests_pass
    description: "Router-core unit tests must pass with the fix"
    origin: guard_check
    source: AGENTS.md

  - id: repo_typescript_check
    name: "PASS_TO_PASS: TypeScript typecheck (repo CI)"
    type: pass_to_pass
    test: test_repo_typescript_check
    description: "Repo CI check - TypeScript typecheck across multiple versions"
    origin: repo_tests
    source: "package.json test:types"

  - id: repo_eslint
    name: "PASS_TO_PASS: ESLint check (repo CI)"
    type: pass_to_pass
    test: test_repo_eslint
    description: "Repo CI check - ESLint validation"
    origin: repo_tests
    source: "package.json test:eslint"

  - id: repo_build_check
    name: "PASS_TO_PASS: Build validation (repo CI)"
    type: pass_to_pass
    test: test_repo_build_check
    description: "Repo CI check - publint and attw package validation"
    origin: repo_tests
    source: "package.json test:build"

agent_config:
  - source: AGENTS.md
    type: project_wide
    rules:
      - "Use pnpm install for dependencies"
      - "Use pnpm nx run @tanstack/router-core:build for building"
      - "TypeScript strict mode required"
      - "Workspace protocol for internal deps"

  - source: packages/router-core/skills/router-core/SKILL.md
    type: skill_specific
    rules:
      - "Framework-agnostic core logic"
      - "Type safety: never cast or annotate inferred values"
      - "Client-first: loaders run on client by default"

  - source: packages/router-core/skills/router-core/ssr/SKILL.md
    type: skill_specific
    rules:
      - "Loaders run on BOTH client AND server with SSR"
      - "Memory history used automatically on server"
      - "Loader data automatically dehydrated on server and hydrated on client"

rubric: []
