task:
  name: selenium-py-type-stubs
  title: Add type stubs for lazy imported Python classes and modules
  description: >
    Add __init__.pyi type stub files to Python packages with lazy imports
    to enable IDE autocomplete and type checker support. Also fix import
    paths in remote_connection modules to use direct imports.

source:
  type: github_pr
  repo: SeleniumHQ/selenium
  pr_number: 17165
  base_commit: 39436b0c1eabbed5489148b98a36302d77feed9e
  merge_commit: 168378778de52a6a4d8a8bee8b85e494ce34a7ff

checks:
  # Fail-to-pass tests
  - id: test_main_webdriver_stub_exists
    type: fail_to_pass
    origin: pr_fix
    description: Main webdriver __init__.pyi stub file exists with key exports

  - id: test_browser_submodule_stubs_exist
    type: fail_to_pass
    origin: pr_fix
    description: Browser-specific __init__.pyi stub files exist for all browsers

  - id: test_chrome_stub_exports_modules
    type: fail_to_pass
    origin: pr_fix
    description: Chrome stub file exports options, service, webdriver modules

  - id: test_firefox_stub_exports_profile
    type: fail_to_pass
    origin: pr_fix
    description: Firefox stub file exports firefox_profile module

  - id: test_safari_stub_exports_permissions
    type: fail_to_pass
    origin: pr_fix
    description: Safari stub file exports permissions module

  - id: test_pyproject_includes_pyi_files
    type: fail_to_pass
    origin: pr_fix
    description: pyproject.toml includes *.pyi in package-data

  - id: test_chrome_remote_connection_import
    type: fail_to_pass
    origin: pr_fix
    description: Chrome remote_connection uses direct DesiredCapabilities import path

  - id: test_edge_remote_connection_import
    type: fail_to_pass
