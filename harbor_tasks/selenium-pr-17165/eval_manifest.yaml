    description: All modified Python files have valid syntax

  - id: test_chrome_module_importable
    type: pass_to_pass
    origin: static
    description: Chrome webdriver module is importable

  - id: test_edge_module_importable
    type: pass_to_pass
    origin: static
    description: Edge webdriver module is importable

  - id: test_desired_capabilities_exists
    type: pass_to_pass
    origin: static
    description: DesiredCapabilities class exists at expected location

  - id: test_repo_ruff_lint
    type: pass_to_pass
    origin: repo_tests
    description: Ruff linter passes on modified Python files

  - id: test_repo_ruff_format
    type: pass_to_pass
    origin: repo_tests
    description: Ruff formatter check passes on modified files

  - id: test_repo_chrome_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: Chrome options unit tests pass

  - id: test_repo_edge_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: Edge options unit tests pass

rubric:
  - rule: "Type stub files (.pyi) are properly formatted with appropriate imports and __all__ exports"

  - rule: "Import changes use the direct module path (selenium.webdriver.common.desired_capabilities) rather than lazy import path (selenium.webdriver)"

  - rule: "Code changes are minimal and focused - only modifying what's necessary to fix the issue"
