name: litellm-entity-usage-export-fix
version: 1.0

task:
  description: >
    Fix entity usage export display bug in LiteLLM dashboard.
    Entity exports for non-team entity types (tags, orgs, customers, agents, users)
    were showing incorrect entity IDs - team names extracted from api_key_breakdown
    metadata were appearing instead of the actual entity key.
  owner: BerriAI
  repo: litellm
  pr_number: 25153

metadata:
  difficulty: medium
  time_estimate_minutes: 45
  tags:
    - frontend
    - typescript
    - ui
    - bugfix
  language: TypeScript

source:
  base_commit: a5322c6efcd579c0ee8af7bae0f27fb07e350fd1
  merge_commit: 55734ee272
  files:
    - ui/litellm-dashboard/src/components/EntityUsageExport/utils.ts
    - ui/litellm-dashboard/src/components/EntityUsageExport/utils.test.ts

