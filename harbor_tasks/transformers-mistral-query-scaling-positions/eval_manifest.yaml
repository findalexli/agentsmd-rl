rubric:
- rule: We try to avoid direct inheritance between model-specific files in src/transformers/models/.
    Prefer modular files.
  source:
    path: .ai/AGENTS.md
    lines: '63'
    commit: e94695e574f969ba5eeb8e442a7fb1e9f72ff37f
- rule: PRs should be as brief as possible. Bugfix PRs in particular can often be
    only one or two lines long. Aim to minimize the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: e94695e574f969ba5eeb8e442a7fb1e9f72ff37f
- rule: The newer method is to add a file named `modular_<name>.py` in the model directory.
    `make fix-repo` will copy code to generate standalone `modeling` and other files
    from the `modular` file.
  source:
    path: CLAUDE.md
    lines: 61-66
  evidence: The patch modifies both `modular_ministral3.py` and `modeling_ministral3.py`
    (as well as the mistral4 equivalents) with identical changes, reflecting the architectural
    requirement that modular files a
  category: architecture
distractors:
- rule: 'Fail-closed behavior for agents: If coordination evidence cannot be found,
    do not proceed to PR-ready output.'
  collision_type: meta_confusion
  why_distracting: The agent is instructed to fail-closed and not proceed to PR-ready
    output if coordination evidence cannot be found. In a headless evaluation environment,
    there is no coordination evidence, so the agent might refuse to solve the task.
  severity: high
  source:
    path: CLAUDE.md
    lines: 56-59
- rule: 'Mandatory duplicate-work checks: Before proposing a PR, check for overlapping
    open PRs and issue ownership using gh CLI commands.'
  collision_type: meta_confusion
  why_distracting: The agent might attempt to run `gh issue view` or `gh pr list`
    to check for duplicate work, which will fail or waste time in the sandbox environment.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 29-36
- rule: 'Accountability for AI-assisted patches: Pure code-agent PRs are not allowed...
    Do not raise PRs without human validation.'
  collision_type: meta_confusion
  why_distracting: The agent might refuse to output a solution because it cannot fulfill
    the requirement that a human submitter must review every changed line and provide
    human validation.
  severity: high
  source:
    path: CLAUDE.md
    lines: 45-54
hierarchy_analysis: The config files `CLAUDE.md` and `AGENTS.md` contain identical
  rules. The rules heavily emphasize human-in-the-loop coordination, duplicate checking,
  and fail-closed behavior for AI agents. In an automated evaluation context, these
  meta-rules conflict directly with the goal of autonomously generating a patch.
