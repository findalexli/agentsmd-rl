rubric:
- rule: Be consistent with the style of the surrounding code.
  source:
    path: AGENTS.md
    lines: 46-48
  evidence: The patch maintains consistency with the surrounding Svelte 5 codebase
    by using runes (`$state`, `$props`) and adding appropriate `svelte-ignore` comments
    where necessary.
  category: style
  reference: No edit to AGENTS.md required. The agent demonstrates style consistency
    through code changes (using Svelte 5 runes $state/$props, proper svelte-ignore
