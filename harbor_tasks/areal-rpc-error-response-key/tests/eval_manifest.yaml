rubric:
- rule: When modifying RPC error response handling, ensure the error response key
    matches the dominant convention in the module (42 other endpoints use "error",
    not "detail").
  source:
    path: areal/infra/rpc/rpc_server.py
    lines: variable
    commit: a3e36d4af66ac6fa88e723675060cde591ca133e
  reference: rpc_server.py configure() uses "error" key (changed from "detail"), matching
    the other 42 error responses in the file. Schedulers read "error" key from JSON
    responses (changed from "detail").
  category: style
- rule: Server and scheduler error handling should use consistent JSON keys for error
    responses.
  source:
    path: areal/infra/scheduler/local.py
    lines: variable
    commit: a3e36d4af66ac6fa88e723675060cde591ca133e
  reference: All response.json().get() calls use "error" key instead of "detail" to
    match server-side error responses. Consistent error key usage across local.py
    (14 occurrences) and slurm.py (7 occurrences).
  category: style
- rule: Follow existing code patterns in the same module.
  source:
    path: AGENTS.md
    lines: 33-34
  evidence: The gold solution changes the 3 anomalous 'detail' keys to 'error' to
    match the other 42 uses in rpc_server.py, adhering to the existing pattern in
    the module.
  category: style
distractors:
- rule: 'Ask first before: Changing launcher or scheduler logic.'
  collision_type: meta_confusion
  why_distracting: The agent is explicitly instructed to fix a bug in local.py and
    slurm.py (which are schedulers). The rule says to ask first before changing scheduler
    logic. An overly compliant agent might halt and ask, or leave a TODO(agent) comment,
    instead of applying the requested fix.
  severity: high
  source:
    path: AGENTS.md
    lines: 38-40
- rule: Add tests for new functionality.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to add tests for the error handling, but this
    is a bug fix, not new functionality. Furthermore, testing distributed RPC/schedulers
    might require multi-node hardware which is unavailable, leading to wasted effort
    or broken test runs.
  severity: medium
  source:
    path: AGENTS.md
    lines: 35-35
hierarchy_analysis: AGENTS.md and CLAUDE.md contain overlapping rules. The agent must
  navigate the explicit user instruction to fix the bug while ignoring the 'Ask first'
  rule for scheduler logic, recognizing that the direct prompt overrides the general
  cautionary rule.
