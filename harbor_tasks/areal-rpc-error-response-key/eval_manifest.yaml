version: "2.0"

source:
  repo: "inclusionAI/AReaL"
  pr: 1019
  base_commit: "a3e36d4af66ac6fa88e723675060cde591ca133e"
  merge_commit: "7cad4dac2d1f230891f201dbbfa91403e621cec1"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified files (rpc_server.py, local.py, slurm.py) parse without syntax errors"

  - id: server_configure_uses_error_key
    type: fail_to_pass
    origin: pr_diff
    description: "rpc_server /configure error responses use 'error' key, not 'detail'"

  - id: local_scheduler_reads_error_key
    type: fail_to_pass
    origin: pr_diff
    description: "local.py scheduler reads 'error' key from RPC JSON responses"

  - id: slurm_scheduler_reads_error_key
    type: fail_to_pass
    origin: pr_diff
    description: "slurm.py scheduler reads 'error' key from RPC JSON responses"

  - id: server_client_key_consistency
    type: fail_to_pass
    origin: pr_diff
    description: "Server and schedulers use the same JSON key for error responses"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "Modified files retain substantial logic (not stubbed out)"

  - id: no_wildcard_imports
    type: pass_to_pass
    origin: agent_config
    description: "No wildcard imports in modified files"
    source:
      path: "AGENTS.md"
      lines: "30"
      commit: "a3e36d4af66ac6fa88e723675060cde591ca133e"

  - id: no_print_statements
    type: pass_to_pass
    origin: agent_config
    description: "No bare print() calls — must use areal logger"
    source:
      path: "AGENTS.md"
      lines: "89-91"
      commit: "a3e36d4af66ac6fa88e723675060cde591ca133e"

  - id: no_hardcoded_secrets
    type: pass_to_pass
    origin: agent_config
    description: "No hardcoded secrets (passwords, tokens, API keys) in modified files"
    source:
      path: "AGENTS.md"
      lines: "31"
      commit: "a3e36d4af66ac6fa88e723675060cde591ca133e"

  # Repo CI/CD pass_to_pass gates
  - id: test_repo_ruff_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ruff linter passes on modified files"
    source:
      path: ".github/workflows/pre-commit.yml"
      commit: "a3e36d4af66ac6fa88e723675060cde591ca133e"

  - id: test_repo_precommit_hooks
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's pre-commit hooks pass on modified files (skips network-dependent hooks)"
    source:
      path: ".github/workflows/pre-commit.yml"
      commit: "a3e36d4af66ac6fa88e723675060cde591ca133e"

  - id: test_repo_yaml_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's YAML workflow files have valid syntax"
    source:
      path: ".github/workflows/pre-commit.yml"
      commit: "a3e36d4af66ac6fa88e723675060cde591ca133e"

  - id: test_repo_eof_newlines
    type: pass_to_pass
    origin: repo_tests
    description: "Modified files end with exactly one newline (pre-commit end-of-file-fixer)"
    source:
      path: ".pre-commit-config.yaml"
      commit: "a3e36d4af66ac6fa88e723675060cde591ca133e"

  - id: test_repo_no_private_keys
    type: pass_to_pass
    origin: repo_tests
    description: "Modified files contain no private keys (pre-commit detect-private-key)"
    source:
      path: ".pre-commit-config.yaml"
      commit: "a3e36d4af66ac6fa88e723675060cde591ca133e"

  - id: test_repo_module_imports
    type: pass_to_pass
    origin: repo_tests
    description: "Modified infrastructure modules (rpc_server, local, slurm) compile without errors"
    source:
      path: "pyproject.toml"
      commit: "a3e36d4af66ac6fa88e723675060cde591ca133e"

rubric:
  - rule: "Follow existing code patterns in the same module — error response keys should be consistent with the dominant convention in each file."
    source:
      path: "AGENTS.md"
      lines: "40"
      commit: "a3e36d4af66ac6fa88e723675060cde591ca133e"
