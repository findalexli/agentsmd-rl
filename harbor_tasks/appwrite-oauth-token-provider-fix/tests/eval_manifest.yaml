  - id: test_php_syntax_controllers
    type: pass_to_pass
    origin: repo_tests
    description: PHP syntax check for all controller files

  - id: test_php_syntax_src
    type: pass_to_pass
    origin: repo_tests
    description: PHP syntax check for all source files in src/

  # Fail-to-pass tests (verify the fix)
  - id: test_jwt_encoding_in_callback
    type: fail_to_pass
    origin: gold_patch
    description: OAuth callback encodes secret as JWT with provider name
    source:
      file: app/controllers/api/account.php
      pr_line_ref: "Wrap secret in a JWT that also carries the provider name"

  - id: test_jwt_decoding_in_create_session
    type: fail_to_pass
    origin: gold_patch
    description: createSession function decodes JWT to extract provider
    source:
      file: app/controllers/api/account.php
      pr_line_ref: "Attempt to decode secret as a JWT"

  - id: test_oauth_provider_variable_mapping
    type: fail_to_pass
    origin: gold_patch
    description: OAuth2 session uses extracted provider variable instead of constant
    source:
      file: app/controllers/api/account.php
      pr_line_ref: "TOKEN_TYPE_OAUTH2 => $oauthProvider"

  - id: test_oauth_token_requires_provider
    type: fail_to_pass
    origin: gold_patch
    description: OAuth2 tokens require provider validation
    source:
      file: app/controllers/api/account.php
      pr_line_ref: "OAuth2 tokens must have a provider from the JWT"

  - id: test_provider_payload_validation
    type: fail_to_pass
    origin: gold_patch
    description: JWT payload validation requires provider field
    source:
      file: app/controllers/api/account.php
      pr_line_ref: "if (empty($payload['provider']))"

