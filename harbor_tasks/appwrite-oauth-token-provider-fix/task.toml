name = "appwrite-oauth-token-provider-fix"
difficulty = "medium"  # Requires understanding JWT handling and OAuth flow
tags = ["php", "oauth", "jwt", "authentication", "security"]
time_estimate = "45m"

[source]
pr = "https://github.com/appwrite/appwrite/pull/11561"
base_commit = "6e59e1307d69b29f458bceec835c051c54dd76a9"
merge_commit = "71146118d252a25f054382023366e433761c1358"

[environment]
base_image = "php:8.3-cli"
setup_time = "5m"

[description]
brief = "Fix OAuth2 token flow to preserve provider name in session"
detail = """
When using OAuth2 token flow (as opposed to session/cookie flow), the provider name
was not being preserved when creating sessions. The session was being created with
a generic OAuth2 provider instead of the specific provider (e.g., 'google', 'github').

The fix involves:
1. Encoding the provider name into a JWT when generating the token callback URL
2. Decoding and extracting the provider from the JWT when creating the session
3. Using the extracted provider name instead of the generic SESSION_PROVIDER_OAUTH2 constant
"""

