    design document or analysis notes in the `.pr/` directory, wasting time on documentation
    for a straightforward frontend change.
  severity: low
  source:
    path: AGENTS.md
    lines: 33-35
- rule: To set up the entire repo, including frontend and backend, run `make build`.
  collision_type: meta_confusion
  why_distracting: The agent might run `make build` to set up the repo, which builds
    both frontend and backend, wasting time when the user prompt explicitly provides
    faster, frontend-only testing commands.
  severity: medium
  source:
    path: AGENTS.md
    lines: 5-6
hierarchy_analysis: The AGENTS.md file provides general repository guidelines. The
  user prompt provides specific, localized instructions for testing the frontend changes.
  The agent must prioritize the prompt's specific frontend commands over the general
  `make build` setup instructions in AGENTS.md.
