tags = ["cpp", "concurrency", "distributed-systems", "zookeeper", "retry-logic"]

description = """
Fix a bug in UserDefinedSQLObjectsZooKeeperStorage where the refreshObjects() method
captures the ZooKeeper session handle and object list BEFORE the retry loop. When a
retry occurs due to session expiration, the stale handle and object list cause crashes
or inconsistent state.

The fix moves getObjectNamesAndSetWatch() inside the retry loop and obtains a fresh
ZooKeeper session on each retry via zookeeper_getter.
"""
