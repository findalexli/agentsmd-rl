checks:
  # Fail-to-pass tests - these verify the core fix
  - id: test_fix_session_refresh_in_retry_loop
    type: fail_to_pass
    origin: agent_config
    source: "CLAUDE.md: retry logic requires obtaining fresh resources on retry"
    description: "Verify that on retry, a fresh ZooKeeper session is obtained via zookeeper_getter"

  - id: test_fix_object_names_inside_retry_loop
    type: fail_to_pass
    origin: agent_config
    source: "CLAUDE.md: retry loop must re-fetch data after transient failures"
    description: "Verify that getObjectNamesAndSetWatch is called INSIDE the retry loop, not before"

  - id: test_fix_uses_current_zookeeper_in_tryload
    type: fail_to_pass
    origin: agent_config
    source: "CLAUDE.md: always use the fresh session handle in retry callbacks"
    description: "Verify that tryLoadObject uses current_zookeeper, not the original zookeeper handle"

  - id: test_no_object_names_before_retry_loop
    type: fail_to_pass
    origin: agent_config
    source: "CLAUDE.md: avoid capturing state before retry loops that may need refresh"
    description: "Verify that object_names is NOT fetched before the retry loop (the bug)"

  # Pass-to-pass tests - these verify code quality
  - id: test_code_compiles_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "Basic syntax validation - balanced braces and parentheses"

  - id: test_function_structure_intact
    type: pass_to_pass
    origin: repo_tests
    description: "Verify the overall function structure has required components"

  # Pass-to-pass tests - repo CI/CD validation
  - id: test_repo_git_integrity
    type: pass_to_pass
    origin: repo_tests
    description: "Verify the git repository is in a valid state"

  - id: test_repo_file_integrity
    type: pass_to_pass
    origin: repo_tests
    description: "Verify the target source file is valid UTF-8 and readable"

  - id: test_cmake_configuration_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Verify CMakeLists.txt can be parsed (syntax check)"

