distractors:
- rule: Target an issue. Every non-trivial PR should reference an existing GitHub
    issue. If one doesn't exist, create it first.
  collision_type: meta_confusion
  why_distracting: The instruction to 'create an issue first if one doesn't exist'
    might cause the agent to attempt to use CLI tools (like `gh issue create`) to
    interact with GitHub before writing code, which is out of scope and likely to
    fail in an isolated coding evaluation environment.
  severity: high
  source:
    path: AGENTS.md
    lines: 18-20
- rule: Frontend code is formatted with `prettier`. Run `bash scripts/format_frontend.sh`.
  collision_type: scope_ambiguity
  why_distracting: The instruction to run `bash scripts/format_frontend.sh` might
    lead the agent to format the entire frontend codebase or the entire file, creating
    a massive diff of unrelated formatting changes instead of just fixing the targeted
    mobile menu UX.
  severity: medium
  source:
    path: AGENTS.md
    lines: 41-43
- rule: Do not open one-off PRs for tiny edits... Mechanical cleanups are acceptable
    only when bundled into a clear, systematic scope.
  collision_type: scope_ambiguity
  why_distracting: The agent might misinterpret a targeted UX fix for the mobile menu
    as a 'tiny edit' or 'mechanical cleanup' and either refuse to complete the task
    or try to bundle it with unrelated changes, violating the specific scope of the
    prompt.
  severity: medium
  source:
    path: AGENTS.md
    lines: 52-54
hierarchy_analysis: The repository has a single `AGENTS.md` file at the root level.
  There are no conflicting child configurations, so the rules in `AGENTS.md` apply
  globally. The main challenge is interpreting the scope of PR rules (like issue creation
  and global formatting) within the context of an isolated coding task.
