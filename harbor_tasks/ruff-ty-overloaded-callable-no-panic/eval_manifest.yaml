rubric:
- id: no_new_panic
  source:
    quote: Try hard to avoid patterns that require `panic!`, `unreachable!`, or `.unwrap()`. Instead, try to encode those constraints in the type system.
    path: AGENTS.md
    commit: 61f9a0a5763fb068cd2f26c0ee9d63a277fb26c2
  rule: 'The fix must not introduce another `panic!`, `unreachable!`,

    `unwrap()`, or `expect()` call in place of the removed panic. ty

    explicitly prefers encoding constraints in the type system over

    panicking. (AGENTS.md: "Try hard to avoid patterns that require

    panic!, unreachable!, or .unwrap()...")

    '
- id: imports_at_file_top
  source:
    quote: Rust imports should always go at the top of the file, never locally in functions.
    path: AGENTS.md
    commit: 61f9a0a5763fb068cd2f26c0ee9d63a277fb26c2
  rule: 'Any new imports introduced by the fix go at the top of the source

    file, not locally inside the function. (AGENTS.md: "Rust imports

    should always go at the top of the file, never locally in

    functions.")

    '
- id: prefer_let_chain
  source:
    quote: Prefer let chains (`if let` combined with `&&`) over nested `if let` statements to reduce indentation and improve readability.
    path: AGENTS.md
    commit: 61f9a0a5763fb068cd2f26c0ee9d63a277fb26c2
  rule: 'The fixed code preserves the existing let-chain (`if let ... &&

    let ... { }`) style over nested `if let` blocks. (AGENTS.md:

    "Prefer let chains (`if let` combined with `&&`) over nested

    `if let` statements...")

    '
- id: comments_purposeful
  source:
    quote: Use comments purposefully. Don't use comments to narrate code, but do use them to explain invariants and why something unusual was done a particular way.
    path: AGENTS.md
    commit: 61f9a0a5763fb068cd2f26c0ee9d63a277fb26c2
  rule: 'Any new comment introduced by the fix is purposeful — explains a

    non-obvious invariant, a TODO, or a deliberate design choice —

    rather than narrating code. (AGENTS.md: "Use comments

    purposefully. Don''t use comments to narrate code, but do use them

    to explain invariants and why something unusual was done a

    particular way.")

    '
- id: minimal_diff
  source:
    quote: Avoid writing significant amounts of new code. This is often a sign that we're missing an existing method or mechanism that could help solve the problem.
    path: AGENTS.md
    commit: 61f9a0a5763fb068cd2f26c0ee9d63a277fb26c2
  rule: 'The change is small and localised inside ty_python_semantic. The

    AGENTS.md guidance ("Avoid writing significant amounts of new

    code... look for existing utilities first") suggests the fix

    should be a tight edit to the panicking branch, not a large

    refactor or new module.

    '
