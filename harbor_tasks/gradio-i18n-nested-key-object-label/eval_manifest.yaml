distractors:
- rule: 'Repository Structure: `gradio/components/` — all Gradio components'
  collision_type: architecture_boundary
  why_distracting: The issue explicitly mentions a 'Gradio component's label prop',
    which could mislead the agent to search for and edit Python files in `gradio/components/`
    instead of the actual frontend translation logic in `js/core/src/gradio_helper.ts`.
  severity: high
  source:
    path: AGENTS.md
    lines: 7-8
- rule: Do not open one-off PRs for tiny edits (single typo, isolated lint cleanup,
    one mutable default argument, etc.).
  collision_type: scope_ambiguity
  why_distracting: The bug fix requires only a small 1-line logic change. The agent
    might misinterpret this as a 'tiny edit' and either refuse to fix it or try to
    bundle it with unrelated mechanical cleanups.
  severity: medium
  source:
    path: AGENTS.md
    lines: 48-49
- rule: Use gr.HTML to create custom HTML components
  source:
    path: .agents/skills/gradio/SKILL.md
    lines: '112'
  source_text: If a task requires significant customization of an existing component
    or a component that doesn't exist in Gradio, you can create one with `gr.HTML`.
    It supports `html_template` (with `${}` JS expressions and `{{}}` Handlebars syntax),
    `css_template` for scoped styles, and `js_on_load` for interactivity — where `props.value`
    updates the component value and `trigger('event_name')` fires Gradio events. For
    reuse, subclass `gr.HTML` and define `api_info()` for API/MCP support. See the
    [full guide](https://www.gradio.app/guides/custom-HTML-components).
  collision_type: architecture_boundary
  why_distracting: This rule applies exclusively to end-users writing Gradio applications
    in Python. An agent tasked with modifying the core JS/TS frontend code (`gradio_helper.ts`)
    might mistake this as a convention for adding frontend features, attempting to
    use Python `gr.HTML` wrappers or string templates instead of directly editing
    the native Svelte/TypeScript components.
  severity: high
hierarchy_analysis: The config is a flat single file (`AGENTS.md`). The agent must
  use the repository structure guide to correctly locate the frontend code (`js/`)
  instead of the backend components (`gradio/components/`), despite the issue mentioning
  'Gradio component'.
