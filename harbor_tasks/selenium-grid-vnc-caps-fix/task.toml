name = "selenium-grid-vnc-caps-fix"
title = "Selenium Grid: Fix VNC caps not propagated for sessions without browserName"
description = """
When a session request arrives without a browserName capability (e.g. proxy-only configuration),
the Selenium Grid should still propagate VNC capabilities (se:vncEnabled, se:noVncPort)
from the slot stereotype to the session capabilities.
"""

