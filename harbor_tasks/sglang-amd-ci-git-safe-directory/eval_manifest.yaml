version: "2.0"

source:
  repo: "sgl-project/sglang"
  pr: 21423
  base_commit: "6f2b51ade1b1d072ee7e8d2727f1dbaec0f496ae"
  merge_commit: "80389fec004394db409e9d04aef263465a3b235c"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Both AMD CI scripts must be valid bash"

  - id: shellcheck
    type: pass_to_pass
    origin: static
    description: "Both AMD CI scripts must pass shellcheck --severity=error"

  - id: scripts_executable
    type: pass_to_pass
    origin: static
    description: "Scripts with shebang are executable (repo CI: check-shebang-scripts-are-executable)"

  - id: no_trailing_whitespace
    type: pass_to_pass
    origin: static
    description: "Modified scripts have no trailing whitespace (repo CI: trailing-whitespace)"

  - id: no_merge_conflict_markers
    type: pass_to_pass
    origin: static
    description: "Modified scripts have no merge conflict markers (repo CI: check-merge-conflict)"

  - id: docker_exec_safe_directory
    type: fail_to_pass
    origin: pr_diff
    description: "Both scripts have a real docker exec command setting git safe.directory"

  - id: safe_directory_after_docker_run
    type: fail_to_pass
    origin: pr_diff
    description: "safe.directory config appears after docker run (container must exist first)"

  - id: safe_directory_targets_checkout
    type: fail_to_pass
    origin: pr_diff
    description: "safe.directory targets /sglang-checkout or wildcard '*'"

  - id: git_config_global_or_system
    type: fail_to_pass
    origin: pr_diff
    description: "git config uses --global or --system flag (not bare repo-local)"

  - id: docker_run_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "docker run --name ci_sglang commands preserved in both scripts"

  - id: shebang_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "Both scripts retain their shebang line"

  - id: docker_exec_targets_ci_sglang
    type: fail_to_pass
    origin: pr_diff
    description: "docker exec targets the ci_sglang container name"

rubric: []
