    points: 1

  - id: test_sorted_missing_dag_ids
    type: fail_to_pass
    origin: behavioral
    description: "Missing DAG IDs are logged in sorted order"
    points: 1

  # Pass-to-pass tests
  - id: test_repo_unit_tests_exist
    type: pass_to_pass
    origin: repo_tests
    description: "Repository's unit tests for the fix are present"
    points: 1

  - id: test_fix_does_not_delete_adrq_rows
    type: pass_to_pass
    origin: behavioral
    description: "Fix only removes from in-memory dicts, not database"
    points: 1

