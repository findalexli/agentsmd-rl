distractors:
- rule: Never run pytest, python, or airflow commands directly on the host — always
    use `breeze`.
  collision_type: rule_conflict
  why_distracting: The instruction explicitly states 'Never run pytest... directly
    on the host — always use breeze', but immediately follows with `uv run` commands
    for pytest. An agent might refuse to use `uv run` (which runs on the host) or
    waste time setting up a full Breeze environment for a simple unit test, getting
    stuck in a loop trying to resolve the contradiction.
  severity: high
  source:
    path: CLAUDE.md
    lines: 8-9
- rule: 'If uv tests fail with missing system dependencies, run the tests with breeze:
    `breeze run pytest <tests> -xvs`'
  collision_type: scope_ambiguity
  why_distracting: The agent might preemptively use `breeze run pytest` instead of
    `uv run` for the newly added test, assuming that database models or asset queues
    require system dependencies. This is slower and unnecessary since this is a standard
    unit test that runs fine with the default SQLite backend via `uv run`.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 17-18
hierarchy_analysis: '`CLAUDE.md` and `AGENTS.md` are identical at the root level.
  The primary conflict exists within the file itself regarding test execution: a strict
  rule forbids running pytest on the host, while subsequent examples explicitly use
  `uv run` (a host command). The agent must infer that `uv run` is the preferred fast
  path, and `breeze` is the fallback.'
