task_id: test-rubric-enrichment
source_repo: test/repo
base_commit: c9667b8

# Rubric rules from CLAUDE.md (for reference)
rubric:
  - rule: All public functions must use type hints for parameters and return values
    source:
      path: main.py
      lines: '15-31'
      commit: c9667b8c7b0c
    reference: "def process_file(filepath: Path) -> str:"
  - rule: File operations should use pathlib.Path rather than string paths and open()
    source:
      path: main.py
      lines: '28-29'
      commit: c9667b8c7b0c
    reference: "content = filepath.read_text()"
  - rule: Never use bare 'except:' clauses - always specify the exception type
    source:
      path: main.py
      lines: '30-31'
      commit: c9667b8c7b0c
    reference: "except (FileNotFoundError, IOError) as e:"
  - rule: Use custom exception classes rather than raising generic Exception or returning None on errors
    source:
      path: main.py
      lines: '10-13'
      commit: c9667b8c7b0c
    reference: "class FileProcessingError(Exception):"
  - rule: All public functions must have docstrings with Args and Returns sections
    source:
      path: main.py
      lines: '16-26'
      commit: c9667b8c7b0c
    reference: 'Args:\n        filepath: Path to the file to process.\n\n    Returns:\n        The file content converted to uppercase.'

# Test checks - must match test function names in test_outputs.py
checks:
