  category: architecture
distractors:
- rule: 'Import boundaries: extension production code should treat `openclaw/plugin-sdk/*`
    plus local `api.ts` / `runtime-api.ts` barrels as the public surface. Do not import
    core `src/**` ... directly.'
  collision_type: scope_ambiguity
  why_distracting: An agent might mistakenly apply this rule to `src/shared/subagents-format.ts`
    and refuse to import `src/infra/format-time/format-duration.ts`, thinking it violates
    the import boundary. However, `src/shared` is part of core, not an extension,
    so it is allowed to import from `src/infra`.
  severity: high
  source:
    path: CLAUDE.md
    lines: 14-14
- rule: 'Messaging channels: always consider all built-in + extension channels when
    refactoring shared logic (routing, allowlists, pairing, command gating, onboarding,
    docs).'
  collision_type: scope_ambiguity
  why_distracting: The agent is refactoring shared logic (`src/shared/subagents-format.ts`)
    and might think it needs to audit or update all messaging channels (`src/telegram`,
    `src/discord`, etc.) to ensure they handle the new duration format. However, the
    duration format is just a string and the specific callers are already updated
    in the PR.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 17-17
hierarchy_analysis: The repository has identical rules in `CLAUDE.md` and `AGENTS.md`.
  The primary challenge is correctly identifying the architectural boundaries of the
  files being edited. The files in `src/shared/`, `src/agents/`, and `src/auto-reply/`
  are core files, not extension production code, so the strict import boundaries for
  extensions do not apply to them.
