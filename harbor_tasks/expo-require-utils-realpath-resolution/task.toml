name = "expo-require-utils-realpath-resolution"
title = "Fix require-utils to resolve realpath for module loading"
description = "The compileModule function in @expo/require-utils uses path.dirname(filename) directly when creating Module._nodeModulePaths, which fails when the input filename is a symlink. This causes node_modules resolution to fail in symlinked environments like pnpm. The fix adds a toRealDirname helper that resolves symlinks before computing the node_modules paths."
owner = "expo"
repo = "expo"
pr_number = 44599
difficulty = "medium"
tags = ["nodejs", "module-resolution", "symlink", "realpath", "typescript"]

[environment]
base_commit = "25749d7dec5676f2f23d0454030598487d79a6c7"
merge_commit = "db5b146bf3fdc86c534a59f7af3b909c4b1cf8a7"

target_files = [
    "packages/@expo/require-utils/src/load.ts",
    "packages/@expo/require-utils/build/load.js"
]

time_estimate = "45m"

[expectations]
# The agent should:
# 1. Understand the problem: module resolution fails with symlinked paths
# 2. Implement toRealDirname helper function
# 3. Update compileModule to use realpath-resolved paths
# 4. Handle error cases (ENOENT for fake paths)
