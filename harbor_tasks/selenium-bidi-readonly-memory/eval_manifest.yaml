  weight: minor
  description: Tests should not rely on mocks
- rule: The codebase is migrating to async
  source:
    path: dotnet/AGENTS.md
    lines: 28-29
  evidence: The gold solution optimizes the async pattern by changing `Task` to `ValueTask`
    for `SendAsync` to reduce allocations, aligning with the ongoing async migration.
  category: architecture
- rule: Add logging where users may need insight into what's happening
  source:
    path: AGENTS.md
    lines: 57-58
  evidence: The gold solution preserves and updates the `_logger.Trace` calls in both
    the .NET 8 and older .NET code paths to ensure diagnostic logging remains functional
    with the new `ReadOnlyMemory<byte>` type.
  category: style
distractors:
- rule: before removing public functionality, mark it as deprecated with a message
    pointing to the alternative.
  collision_type: scope_ambiguity
  why_distracting: The rule requires deprecating public functionality instead of removing
    it. However, `ITransport` is an internal interface, so the agent should directly
    change the `SendAsync` signature rather than keeping the old `byte[]` version
    and marking it `[Obsolete]`.
  severity: high
  source:
    path: AGENTS.md
    lines: 61-63
- rule: Use XML documentation comments for public APIs
  collision_type: scope_ambiguity
  why_distracting: The rule asks for XML documentation on public APIs. Since `ITransport`
    and `WebSocketTransport` are internal, adding XML docs to the modified `SendAsync`
    method would be unnecessary and clutter the PR.
  severity: medium
  source:
    path: dotnet/AGENTS.md
    lines: 31-38
- rule: When implementing solutions prefer writing a test for it first
  collision_type: meta_confusion
  why_distracting: The rule suggests writing a test first. This PR is a pure internal
    performance optimization (reducing allocations and fixing a race condition) with
    no behavioral changes for consumers, so existing tests are sufficient and writing
    new tests is unnecessary.
  severity: medium
  source:
    path: AGENTS.md
    lines: 49-51
hierarchy_analysis: The root `AGENTS.md` provides general guidelines on deprecation
  and testing, while `dotnet/AGENTS.md` provides C#-specific syntax for deprecation
  and documentation. The agent must correctly identify the scope of the changes (internal
  vs. public) to avoid incorrectly applying the deprecation and XML documentation
  rules from both files.
