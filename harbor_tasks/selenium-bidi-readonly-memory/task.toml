name = "selenium-bidi-readonly-memory"
difficulty = "medium"  # Interface changes + conditional compilation + thread safety
time_estimates = { analysis = 300, implementation = 600, validation = 300 }
tags = [".net", "csharp", "bidi", "performance", "async", "websocket"]

[description]
brief = "Optimize Selenium .NET BiDi transport to use ReadOnlyMemory<byte> and ValueTask"
detailed = """
Update the BiDi transport interface and WebSocket implementation to use ReadOnlyMemory<byte>
instead of byte[] for better performance and reduced allocations. Also update TaskCompletionSource
calls to use TrySetResult/TrySetException for thread safety.
"""
