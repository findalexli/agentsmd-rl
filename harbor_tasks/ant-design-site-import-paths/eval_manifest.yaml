source:
  pr:
    owner: ant-design
    repo: ant-design
    number: 57478
    title: "site: update imports path"
    merge_commit: a0d23b2c4234a8567a12400e82bcadf79b3c3320
    base_commit: 310f780636ba07ab85d9997e2a54a569f56e00b4

checks:
  # Fail-to-pass: TypeScript compilation must work after fixing imports
  - id: test_typescript_compilation
    type: fail_to_pass
    origin: code_behavior
    description: TypeScript compilation passes with correct import paths

  # Fail-to-pass: Specific import fixes
  - id: test_import_theme_from_antd
    type: fail_to_pass
    origin: code_behavior
    description: useThemeAnimation.ts imports theme from 'antd' package

  - id: test_import_copy_from_antd_lib
    type: fail_to_pass
    origin: code_behavior
    description: Files import copy utility from 'antd/lib/_util/copy'

  - id: test_import_scrollto_from_antd_lib
    type: fail_to_pass
    origin: code_behavior
    description: AffixTabs.tsx imports scrollTo from 'antd/lib/_util/scrollTo'

  - id: test_import_configprovider_context
    type: fail_to_pass
    origin: code_behavior
    description: SiteContext.ts imports from 'antd/es/config-provider/context'

  - id: test_no_relative_component_imports_in_dumi
    type: fail_to_pass
    origin: code_behavior
    description: No relative imports to components/ directory in .dumi

  # Pass-to-pass: Repo CI checks
  - id: test_repo_tsc
    type: pass_to_pass
    origin: repo_tests
    description: Repo TypeScript type checking passes (npm run tsc)

  - id: test_repo_lint
    type: pass_to_pass
    origin: repo_tests
    description: Repo ESLint passes (npm run lint:script)

  - id: test_repo_version
    type: pass_to_pass
    origin: repo_tests
    description: Repo version generation passes (npm run version)

  - id: test_repo_biome
    type: pass_to_pass
    origin: repo_tests
    description: Repo Biome linting passes (npm run lint:biome)

rubric:
  # Import order from copilot-instructions.md (CLAUDE.md)
  - id: import_order
    description: Follow import order (React → dependencies → antd components → custom components → types → styles)
    source:
      file: .github/copilot-instructions.md
      lines: "Demo & Documentation section"

  # TypeScript strictness from copilot-instructions.md
  - id: typescript_strict
    description: TypeScript imports should resolve correctly with strict type checking
    source:
      file: .github/copilot-instructions.md
      lines: "TypeScript Requirements section"

  # React patterns from copilot-instructions.md
  - id: react_patterns
    description: Import statements should follow React/TypeScript patterns
    source:
      file: .github/copilot-instructions.md
      lines: "React Component Guidelines section"
