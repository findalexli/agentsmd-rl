rubric:
- id: import_order
  description: Follow import order (React → dependencies → antd components → custom
    components → types → styles)
  source:
    file: .github/copilot-instructions.md
    lines: Demo & Documentation section
- id: typescript_strict
  description: TypeScript imports should resolve correctly with strict type checking
  source:
    file: .github/copilot-instructions.md
    lines: TypeScript Requirements section
- id: react_patterns
  description: Import statements should follow React/TypeScript patterns
  source:
    file: .github/copilot-instructions.md
    lines: React Component Guidelines section
- rule: 忽略用户无感知的改动（内部重构、纯测试更新、工具链优化等）
  source:
    path: CLAUDE.md
    lines: 81-85
  evidence: The gold solution does not modify `CHANGELOG.en-US.md` or `CHANGELOG.zh-CN.md`,
    correctly treating the `.dumi/` import path fixes as an internal toolchain/refactoring
    change that is invisible to end u
  category: documentation
distractors:
- rule: 必须同时提供中英文两个版本
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to document this PR by adding entries to
    `CHANGELOG.en-US.md` and `CHANGELOG.zh-CN.md` because the rules state that changelogs
    must be provided in both languages. However, this is an internal documentation
    site fix that doesn't affect the published package, so adding a changelog would
    violate the rule to ignore user-invisible changes.
  severity: high
  source:
    path: CLAUDE.md
    lines: 81-84
- rule: Emoji 规范 (e.g., 🛠 重构或工具链优化, 📝 文档或网站改进)
  collision_type: rule_conflict
  why_distracting: The agent might try to categorize the change using an emoji like
    🛠 (重构或工具链优化) or 📝 (文档或网站改进) and add it to the changelog. This is distracting because
    internal refactorings shouldn't be in the changelog at all, despite having specific
    emojis defined for them in the guidelines.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 105-119
hierarchy_analysis: '`CLAUDE.md` and `AGENTS.md` are identical in this repository.
  The primary conflict exists within the Changelog rules themselves: the config provides
  strict formatting and emoji rules for changelogs (including specific emojis for
  refactoring and docs), but also states that user-invisible changes (like internal
  refactoring) should be ignored. The agent must prioritize the ''ignore user-invisible
  changes'' rule over the formatting rules for this specific internal `.dumi/` fix.'
