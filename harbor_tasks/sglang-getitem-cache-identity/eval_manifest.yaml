rubric:
- rule: Comments in __getitem__ explain invariants and rationale (WHY), not narrate code (WHAT).
  source:
    path: python/sglang/srt/managers/io_struct.py
    lines: 604-605
    commit: 494bb86169669f8dece646873b7c33904d8ddf6e
  reference: '# Cache sub-objects so that repeated obj[i] calls return the same instance.

    # This avoids subtle bugs where different call sites get divergent objects.'
- rule: Dataclass __getitem__ methods use _sub_obj_cache for identity caching.
  source:
    path: python/sglang/srt/managers/io_struct.py
    lines: 606-609
    commit: 494bb86169669f8dece646873b7c33904d8ddf6e
  reference: "cache = self.__dict__.setdefault('_sub_obj_cache', {})\nif i in cache:\n    return cache[i]"
distractors:
- rule: Use `cache_once` — not `functools.lru_cache`
  source:
    path: .claude/skills/add-jit-kernel/SKILL.md
    lines: 379-379
  source_text: '- Use `cache_once` — **not** `functools.lru_cache` (incompatible with `torch.compile`)'
  collision_type: scope_ambiguity
  why_distracting: The gold diff introduces caching for sub-objects in Python dataclasses to prevent object divergence. An agent might see this caching rule and mistakenly try to apply `@cache_once` or avoid standard python caching techniques. However, this rule is strictly for JIT kernel module compilation caching to ensure compatibility with `torch.compile`, and is entirely irrelevant to caching `__getitem__` results.
  severity: medium
