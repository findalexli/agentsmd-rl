    type: pass_to_pass
    origin: static
    description: "Modified files must parse without errors"

  - id: test_check_ast
    type: pass_to_pass
    origin: repo_tests
    description: "Modified Python files have valid AST"

  - id: test_ruff_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repoo's ruff syntax/error lint check passes on modified files"

  - id: test_ruff_import_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ruff import/unused check passes on modified files"

  - id: test_black_format_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's black format check passes on modified files"

  - id: test_isort_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's isort import sorting check passes on modified files"

  - id: test_pyflakes_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's pyflakes static analysis passes on modified files"

  - id: test_codespell_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's codespell spelling check passes on modified files"

  - id: test_no_trailing_whitespace
    type: pass_to_pass
    origin: static
    description: "Modified files have no trailing whitespace (pre-commit check)"

  - id: test_end_of_file_fixer
    type: pass_to_pass
    origin: static
    description: "Modified files end with single newline (pre-commit check)"

  # ---------------------------------------------------------------------------
  # Fail-to-pass gates (origin: pr_diff) — core behavioral tests
  # ---------------------------------------------------------------------------
  - id: generate_req_caching_implemented
    type: fail_to_pass
    origin: pr_diff
    description: "GenerateReqInput.__getitem__ implements identity caching with _sub_obj_cache"

  - id: embedding_req_caching_implemented
    type: fail_to_pass
    origin: pr_diff
    description: "EmbeddingReqInput.__getitem__ implements identity caching with _sub_obj_cache"

  - id: lora_id_propagation_to_cached_subobjects
    type: fail_to_pass
    origin: pr_diff
    description: "tokenizer_manager._resolve_lora_path propagates lora_id to cached sub-objects"

  # ---------------------------------------------------------------------------
  # Pass-to-pass gates (origin: static) — anti-stub checks
  # ---------------------------------------------------------------------------
  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "Modified __getitem__ methods have real caching logic, not just return statements"

rubric:
  - rule: "Use comments to explain invariants and rationale, not narrate code. Comments should describe WHY something is done, not WHAT the code does."
    source:
      path: ".claude/skills/add-jit-kernel/SKILL.md"
      lines: "30"
      commit: "ef2d4013d77cf1267e032d7a7a745dc3a6f74880"

  - rule: "Follow existing code patterns when modifying dataclass __getitem__ methods. Use instance caching with _sub_obj_cache dictionary to ensure repeated obj[i] calls return the same instance."
    source:
      path: ".claude/skills/add-jit-kernel/SKILL.md"
      lines: "24-25"
      commit: "ef2d4013d77cf1267e032d7a7a745dc3a6f74880"
