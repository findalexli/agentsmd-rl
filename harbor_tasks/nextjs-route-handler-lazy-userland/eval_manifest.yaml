rubric:
  - rule: "Keep require() behind compile-time if/else branches for DCE (avoid early-return/throw patterns)."
    source:
      path: "AGENTS.md"
      lines: "404"
      commit: "a43cf0c247b72915d82b44539c0dbde13efccfc9"
  - rule: "Webpack only DCEs a require() when it sits inside the dead branch of an if/else whose condition DefinePlugin can evaluate at compile time."
    source:
      path: ".agents/skills/dce-edge/SKILL.md"
      lines: "18"
      commit: "a43cf0c247b72915d82b44539c0dbde13efccfc9"
