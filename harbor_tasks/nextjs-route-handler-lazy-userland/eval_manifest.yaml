  - id: template_lazy_userland_factory
    type: fail_to_pass
    origin: pr_diff
    description: "Template uses lazy require factory instead of static import for userland"

  - id: module_ensure_userland
    type: fail_to_pass
    origin: pr_diff
    description: "AppRouteRouteModule has public async ensureUserland() method with non-trivial body"

  - id: module_init_from_userland
    type: fail_to_pass
    origin: pr_diff
    description: "Module has _initFromUserland() extracted as separate method calling autoImplementMethods"

  - id: getUserland_synchronous
    type: fail_to_pass
    origin: pr_diff
    description: "getUserland option returns AppRouteUserlandModule synchronously (not Promise)"

  - id: export_route_calls_ensure_userland
    type: fail_to_pass
    origin: pr_diff
    description: "Export route calls ensureUserland() before accessing module.userland"

  - id: base_class_userland_getter
    type: fail_to_pass
    origin: pr_diff
    description: "Base RouteModule uses protected _userland with getter for lazy loading support"

  - id: module_accepts_userland_factory
    type: fail_to_pass
