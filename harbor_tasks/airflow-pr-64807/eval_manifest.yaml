    description: Ruff format check on spark.py module passes

rubric:
  - id: follows_existing_function_patterns
    rule: New EMR Serverless injection functions follow the same patterns as existing injection functions in spark.py
    reference: "The functions inject_parent_job_information_into_emr_serverless_properties and inject_transport_information_into_emr_serverless_properties follow the same pattern as inject_parent_job_information_into_spark_properties and inject_transport_information_into_glue_arguments"

  - id: compat_layer_exports_new_functions
    rule: The compat layer in providers/common/compat exports the new EMR Serverless functions
    reference: "The compat spark.py file adds inject_parent_job_information_into_emr_serverless_properties and inject_transport_information_into_emr_serverless_properties to __all__ and provides fallback implementations"

  - id: uses_deep_copy_for_immutability
    rule: The injection functions use deep copy to avoid mutating input arguments
    reference: "Both EMR injection functions use copy.deepcopy(configuration_overrides) to ensure the original dict is not modified"
