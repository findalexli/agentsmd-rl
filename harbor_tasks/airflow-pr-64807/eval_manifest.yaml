    description: Existing spark-defaults properties are preserved when injecting

  - id: test_inject_parent_does_not_mutate_input
    type: fail_to_pass
    origin: behavioral
    description: The original configuration_overrides dict is not mutated

  - id: test_inject_parent_skips_if_already_present
    type: fail_to_pass
    origin: behavioral
    description: Injection is skipped when parent job info already exists

  # Transport injection tests
  - id: test_inject_transport_into_none_config
    type: fail_to_pass
    origin: behavioral
    description: When configuration_overrides is None, creates full structure

  - id: test_inject_transport_skips_if_already_present
    type: fail_to_pass
    origin: behavioral
    description: Injection is skipped when transport info already exists

  # Compat layer tests
  - id: test_compat_layer_exports_parent_injection_function
    type: fail_to_pass
    origin: behavioral
    description: The compat layer should export inject_parent_job_information_into_emr_serverless_properties

  - id: test_compat_layer_exports_transport_injection_function
    type: fail_to_pass
    origin: behavioral
    description: The compat layer should export inject_transport_information_into_emr_serverless_properties

  - id: test_compat_layer_all_exports_include_new_functions
    type: fail_to_pass
    origin: behavioral
    description: The __all__ in compat layer should include the new EMR functions

  # Edge case tests
  - id: test_monitoring_config_preserved
    type: fail_to_pass
    origin: behavioral
    description: The monitoringConfiguration key should be preserved after injection

  - id: test_multiple_classifications_preserved
    type: fail_to_pass
    origin: behavioral
    description: Multiple applicationConfiguration entries are preserved

  # Pass-to-pass tests: existing functionality still works (static checks)
  - id: test_existing_glue_injection_function_exists
    type: pass_to_pass
    origin: static
    description: The existing inject_parent_job_information_into_glue_arguments function still exists

  - id: test_existing_spark_properties_injection_function_exists
    type: pass_to_pass
    origin: static
    description: The existing inject_parent_job_information_into_spark_properties function still exists

  - id: test_existing_transport_glue_function_exists
    type: pass_to_pass
    origin: static
    description: The existing inject_transport_information_into_glue_arguments function still exists

  - id: test_existing_transport_spark_function_exists
    type: pass_to_pass
    origin: static
    description: The existing inject_transport_information_into_spark_properties function still exists

  - id: test_existing_is_parent_job_info_present_function_exists
    type: pass_to_pass
    origin: static
    description: The existing _is_parent_job_information_present_in_spark_properties helper still exists

  - id: test_is_parent_job_info_present_detects_namespace
    type: pass_to_pass
    origin: static
    description: The _is_parent_job_information_present_in_spark_properties correctly detects namespace key

  - id: test_is_transport_info_present_function_exists
    type: pass_to_pass
    origin: static
    description: The existing _is_transport_information_present_in_spark_properties helper still exists

  - id: test_is_transport_info_present_detects_transport_type
    type: pass_to_pass
    origin: static
    description: The _is_transport_information_present_in_spark_properties correctly detects transport key

  # Pass-to-pass tests: actual repo CI commands (subprocess-based)
  - id: test_repo_syntax_check_spark_py
    type: pass_to_pass
    origin: repo_tests
    description: Python syntax check on spark.py passes

  - id: test_repo_syntax_check_compat_spark_py
    type: pass_to_pass
    origin: repo_tests
    description: Python syntax check on compat spark.py passes

  - id: test_repo_lint_spark_module
    type: pass_to_pass
    origin: repo_tests
    description: Ruff linting on spark.py module passes

  - id: test_repo_lint_compat_spark_module
    type: pass_to_pass
