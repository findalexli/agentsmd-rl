checks:
  # Function existence tests
  - id: test_inject_parent_job_function_exists
    type: fail_to_pass
    origin: behavioral
    description: The inject_parent_job_information_into_emr_serverless_properties function should be importable

  - id: test_inject_transport_function_exists
    type: fail_to_pass
    origin: behavioral
    description: The inject_transport_information_into_emr_serverless_properties function should be importable

  - id: test_get_or_create_spark_defaults_function_exists
    type: fail_to_pass
    origin: behavioral
    description: The _get_or_create_spark_defaults_properties helper function should exist

  # Helper function behavior tests
  - id: test_creates_spark_defaults_when_empty
    type: fail_to_pass
    origin: behavioral
    description: When applicationConfiguration is empty, creates spark-defaults entry

  - id: test_finds_existing_spark_defaults
    type: fail_to_pass
    origin: behavioral
    description: When spark-defaults exists, returns its properties dict

  - id: test_creates_spark_defaults_alongside_other_configs
    type: fail_to_pass
    origin: behavioral
    description: When other classifications exist but not spark-defaults, adds it

  # Parent job injection tests
  - id: test_inject_parent_into_none_config
    type: fail_to_pass
    origin: behavioral
    description: When configuration_overrides is None, creates full structure

  - id: test_inject_parent_preserves_existing_properties
    type: fail_to_pass
