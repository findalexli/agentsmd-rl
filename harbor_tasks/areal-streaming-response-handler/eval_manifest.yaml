distractors:
- rule: Add tests for new functionality.
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to write new unit or integration tests
    for the streaming branch. However, this is a bug fix for an existing proxy server
    endpoint, and testing it might require complex async/mock setups or multi-node
    hardware (as warned elsewhere in the config). The gold solution correctly scopes
    the fix to just the server code.
  severity: medium
  source:
    path: AGENTS.md
    lines: 28-28
- rule: 'Ask first before: ... Deleting or renaming public APIs.'
  collision_type: rule_conflict
  why_distracting: The agent is modifying the return type signature of the `chat_completions`
    endpoint (from `ChatCompletion` to `ChatCompletion | StreamingResponse`) and setting
    `response_model=None`. It might interpret this as changing a public API and pause
    to ask the user for permission, wasting a turn.
  severity: medium
  source:
    path: AGENTS.md
    lines: 32-35
- rule: 'Logging: `areal.utils.logging.getLogger(name)` with PascalCase names... Register
    new loggers with color in `areal/utils/logging.py`.'
  collision_type: scope_ambiguity
  why_distracting: The agent might try to register a new logger in `areal/utils/logging.py`
    for the streaming component or change the logger instantiation to match the PascalCase/Rank
    format, but it should just use the already configured `logger` in the file.
  severity: low
  source:
    path: AGENTS.md
    lines: 68-70
