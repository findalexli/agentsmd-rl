distractors:
- rule: Add tests for new functionality.
  collision_type: scope_ambiguity
  why_distracting: The prompt asks to fix a specific bug in the proxy server. Attempting
    to add tests for this FastAPI endpoint would require setting up complex mocks
    for the OpenAI client and AsyncGenerators, which is out of scope for this specific
    bug fix PR and not present in the gold solution.
  severity: medium
  source:
    path: AGENTS.md
    lines: 25-25
- rule: Register new loggers with color in `areal/utils/logging.py`.
  collision_type: scope_ambiguity
  why_distracting: The agent might see the need to log an error in the new streaming
    branch and think it needs to create a new PascalCase logger and register it in
    `areal/utils/logging.py`. However, it should just reuse the existing `logger`
    already instantiated in the module.
  severity: low
  source:
    path: AGENTS.md
    lines: 47-48
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` contain overlapping rules (e.g.,
