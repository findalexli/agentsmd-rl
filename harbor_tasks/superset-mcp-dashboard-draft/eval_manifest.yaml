- rule: Use pytest for testing in the Python backend
  source:
    path: CLAUDE.md
    lines: 70-74
  evidence: The gold solution adds a new test `test_generate_dashboard_explicit_published`
    using `@pytest.mark.asyncio` and standard `assert` statements, adhering to the
    pytest convention for the Python backend.
  category: testing
distractors:
- rule: When creating new MCP tools, prompts, or resources, you MUST add their imports
    to app.py for auto-registration.
  collision_type: scope_ambiguity
  why_distracting: The agent is modifying the schema for an existing tool (`GenerateDashboardRequest`).
    It might mistakenly interpret the modification of tool-related code as a trigger
    to check or update tool registration in `app.py`, leading to unnecessary file
    modifications or context fetching.
  severity: medium
  source:
    path: superset/mcp_service/CLAUDE.md
    lines: 52-54
- rule: Add type hints - All new Python code needs proper typing
  collision_type: would_cause_bug
  why_distracting: 'The agent adds a new test function `test_generate_dashboard_explicit_published`.
    If it strictly follows the ''all new Python code needs proper typing'' rule, it
    might attempt to type-hint the mock arguments (e.g., `mock_db_session: MagicMock`),
    which often requires importing `MagicMock` or specific internal Superset types,
    potentially causing import errors or mypy failures. The gold solution safely omits
    type hints for these test arguments.'
  severity: medium
  source:
    path: CLAUDE.md
    lines: 38-39
hierarchy_analysis: The hierarchy consists of root-level guidelines (`CLAUDE.md` and
  `AGENTS.md`) and service-specific guidelines (`superset/mcp_service/CLAUDE.md`).
  The service-specific guidelines emphasize tool registration and license headers,
  which are highly relevant to the MCP service but act as distractors here since the
  PR only modifies an existing schema and its tests. The root-level testing guidelines
  correctly guide the use of pytest.
