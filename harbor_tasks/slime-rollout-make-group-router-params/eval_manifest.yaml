distractors:
- rule: Return RolloutFnTrainOutput for training and RolloutFnEvalOutput for evaluation
  source:
    path: .claude/skills/add-rollout-function/SKILL.md
    lines: 45-46
  source_text: '- For training (`evaluation=False`), return `RolloutFnTrainOutput(samples=...,
    metrics=...)`

    - For evaluation (`evaluation=True`), return `RolloutFnEvalOutput(data=..., metrics=...)`'
  collision_type: scope_ambiguity
  why_distracting: The gold diff modifies slime/ray/rollout.py, which is explicitly
    listed as the 'wiring/loading' location in this skill. An agent might mistakenly
    try to change the return type of infra/networking functions like `start_rollout_servers`
    to match these data generation schemas instead of `dict[str, RolloutServer]`.
  severity: medium
- rule: Populate required fields for each generated sample
  source:
    path: .claude/skills/add-rollout-function/SKILL.md
    lines: 72-77
  source_text: 'For each generated sample, ensure required training fields are populated
    consistently with your objective:


    - `tokens`

    - `response_length`

    - `reward` (or reward dict if your setup uses keyed rewards)

    - `status`'
  collision_type: scope_ambiguity
  why_distracting: Because the change occurs in a file related to rollout management
    (slime/ray/rollout.py), an agent might think it needs to handle sample data field
    properties inside the server group initialization logic.
  severity: low
- rule: Implement post_process_rewards for normalization/shaping
  source:
    path: .claude/skills/add-reward-function/SKILL.md
    lines: 55-61
  source_text: "To customize normalization/shaping before advantage computation, add:\n\
    \n```python\ndef post_process_rewards(args, samples):\n    # return (raw_rewards,\
    \ processed_rewards)\n    ...\n```"
  collision_type: scope_ambiguity
  why_distracting: The skill specifically mentions slime/ray/rollout.py as the hook
    location for reward post-processing. An agent modifying the rollout file might
    think it needs to inject reward post-processing or shaping logic into the server
    grouping flow.
  severity: low
- rule: Implement Train and Eval Branches Explicitly
  source:
    path: .claude/skills/add-rollout-function/SKILL.md
    lines: 34-46
  source_text: "Required callable signature:\n\n```python\ndef generate_rollout(args,\
    \ rollout_id, data_source, evaluation=False) -> RolloutFnTrainOutput | RolloutFnEvalOutput:\n\
    \    ...\n```\n\nReturn types are defined in `slime/rollout/base_types.py`.\n\n\
    ### Step 3: Implement Train and Eval Branches Explicitly\n\n- For training (`evaluation=False`),\
    \ return `RolloutFnTrainOutput(samples=..., metrics=...)`\n- For evaluation (`evaluation=True`),\
    \ return `RolloutFnEvalOutput(data=..., metrics=...)`"
  collision_type: architecture_boundary
  why_distracting: The diff edits `slime/ray/rollout.py` which manages the server
    infrastructure for starting rollout ray actors, not the rollout data generation
    logic. An agent might apply these schemas since `slime/ray/rollout.py` is listed
    as a reference location in this skill.
  severity: high
- rule: Keep Data Contract Compatible
  source:
    path: .claude/skills/add-rollout-function/SKILL.md
    lines: 70-77
  source_text: '### Step 4: Keep Data Contract Compatible


    For each generated sample, ensure required training fields are populated consistently
    with your objective:


    - `tokens`

    - `response_length`

    - `reward` (or reward dict if your setup uses keyed rewards)

    - `status`'
  collision_type: architecture_boundary
  why_distracting: Because `slime/ray/rollout.py` is referenced in this file, an agent
    might mistake engine setup logic for data contract logic and mistakenly try to
    assert data contracts on the server actors.
  severity: high
- rule: Optional Reward Post-Processing
  source:
    path: .claude/skills/add-reward-function/SKILL.md
    lines: 53-61
  source_text: "### Step 4: Optional Reward Post-Processing\n\nTo customize normalization/shaping\
    \ before advantage computation, add:\n\n```python\ndef post_process_rewards(args,\
    \ samples):\n    # return (raw_rewards, processed_rewards)\n    ...\n```"
  collision_type: scope_ambiguity
  why_distracting: This skill explicitly lists `slime/ray/rollout.py` as the hook
    location for reward post-processing. An agent modifying engine startup logic in
    `slime/ray/rollout.py` could incorrectly believe it needs to apply reward post-processing
    rules.
  severity: medium
