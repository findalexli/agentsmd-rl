distractors:
- rule: All `exports` in `package.json` have a dedicated file in `src` that defines the public API by re-exporting from within `src/lib`
  collision_type: rule_conflict
  why_distracting: The task explicitly requires removing the re-export of `DataSchema` from `data-table`. The agent might hesitate to remove it from `src/index.ts` because of the rule stating that public APIs are defined by re-exporting from within `src/lib`.
  severity: high
  source:
    path: AGENTS.md
    lines: 13-13
- rule: 'Adding changes: Create `packages/*/.changes/[major|minor|patch].short-description.md` files.'
  collision_type: scope_ambiguity
  why_distracting: The agent might create a `.changes` file for this PR, but the instructions only specify updating `AGENTS.md` and `README.md`. Creating unrequested change files pollutes the PR.
  severity: medium
  source:
    path: AGENTS.md
    lines: 41-41
hierarchy_analysis: 'The configuration is a flat single file (`AGENTS.md`), but the task introduces a unique meta-referential challenge: the agent is instructed to edit `AGENTS.md` itself to add a new architectural guideline. This requires the agent to treat its own instruction file as a mutable target.'
