source_pr:
  owner: ClickHouse
  repo: ClickHouse
  pr_number: 101951
  title: "Fix heap-buffer-overflow in `leftPad/rightPad` functions"
  merge_commit: "cd0e0a0326b0fa36221db111546ed8498f3888fa"
  base_commit: "6958fcb996ad34fe65d3d26d08de9cefd4788351"

# What the agent needs to do to complete the task
task_type: code_fix
primary_language: cpp

# Functional correctness checks (fail-to-pass style)
checks:
  - id: "uses_padded_pod_array"
    name: "PaddingChars uses PaddedPODArray for memory safety"
    test: "test_padding_chars_uses_padded_pod_array"
    type: fail_to_pass
    origin: pr_diff
    description: "The core fix: pad_string field must be PaddedPODArray<UInt8> instead of String"

  - id: "no_string_concat"
    name: "Uses insertFromItself instead of String concatenation"
    test: "test_no_string_concatenation_in_pad_init"
    type: fail_to_pass
    origin: pr_diff
    description: "PaddedPODArray::insertFromItself must be used for string expansion"

  - id: "no_reinterpret_cast"
    name: "No unsafe reinterpret_cast for pad_string data"
    test: "test_no_reinterpret_cast_in_append_to"
    type: fail_to_pass
    origin: pr_diff
    description: "Should not use reinterpret_cast<const UInt8*>(pad_string.data())"

  - id: "empty_pad_handled"
    name: "Empty pad string handling moved to executeImpl"
    test: "test_empty_pad_handled_in_execute_impl"
    type: fail_to_pass
    origin: pr_diff
    description: "Empty pad string check should be in executeImpl, not PaddingChars::init"

  - id: "explicit_comparison"
    name: "Uses explicit == 0 comparison"
    test: "test_explicit_num_chars_comparison"
    type: fail_to_pass
    origin: pr_diff
    description: "Uses if (num_chars == 0) instead of if (!num_chars)"

  - id: "digit_separator"
    name: "Modern C++ digit separator used"
    test: "test_max_new_length_digit_separator"
    type: fail_to_pass
    origin: pr_diff
    description: "MAX_NEW_LENGTH should use C++14 digit separator 1'000'000"

  - id: "validate_arguments"
    name: "Uses validateFunctionArguments helper"
    test: "test_validate_function_arguments_used"
    type: fail_to_pass
    origin: pr_diff
    description: "Should use modern validateFunctionArguments for argument validation"

  - id: "error_codes_clean"
    name: "Unused error codes removed"
    test: "test_error_codes_cleanup"
    type: fail_to_pass
    origin: pr_diff
    description: "ILLEGAL_TYPE_OF_ARGUMENT and NUMBER_OF_ARGUMENTS_DOESNT_MATCH should be removed"

  # Pass-to-pass tests (repo CI checks)
  - id: "cpp_syntax_valid"
    name: "C++ syntax is valid"
    test: "test_cpp_compiles_syntax_valid"
    type: pass_to_pass
    origin: repo_tests
    description: "C++ file compiles without syntax errors and has balanced braces/parens"

  - id: "clang_format_compliance"
    name: "Code follows clang-format style"
    test: "test_clang_format_compliance"
    type: pass_to_pass
    origin: repo_tests
    description: "Source file passes clang-format validation as required by ClickHouse CI"

  - id: "required_headers_present"
    name: "Required headers are included"
    test: "test_required_headers_present"
    type: pass_to_pass
    origin: static
    description: "PaddedPODArray and required C++ headers are present"

  - id: "structure_intact"
    name: "Core function structure preserved"
    test: "test_namespace_and_structure_intact"
    type: pass_to_pass
    origin: repo_tests
    description: "FunctionPadString, PaddingChars, and key methods should still exist"

  - id: "utf8_preserved"
    name: "UTF-8 handling preserved"
    test: "test_utf8_handling_preserved"
    type: pass_to_pass
    origin: repo_tests
    description: "utf8_offsets and is_utf8 template parameter should still exist"

  - id: "no_trailing_whitespace"
    name: "No trailing whitespace"
    test: "test_no_trailing_whitespace"
    type: pass_to_pass
    origin: repo_tests
    description: "Code passes trailing whitespace check as per ClickHouse CI"

  - id: "no_tab_characters"
    name: "No tab characters (uses spaces)"
    test: "test_no_tab_characters"
    type: pass_to_pass
    origin: repo_tests
    description: "Code uses spaces for indentation (4 spaces) per ClickHouse style"

# Agent configuration compliance checks (from ClickHouse's CLAUDE.md / AGENTS.md)
agent_config:
  - id: "allman_braces"
    check: "Opening braces on new line (Allman style)"
    origin: agent_config
    source: ".claude/CLAUDE.md - line: 'always use Allman-style braces'"

  - id: "no_sleep_race_fixes"
    check: "No sleep used for race conditions"
    origin: agent_config
    source: ".claude/CLAUDE.md - line: 'Never use sleep in C++ code to fix race conditions'"

  - id: "exception_not_crash"
    check: "Uses 'exception' not 'crash' for logical errors"
    origin: agent_config
    source: ".claude/CLAUDE.md - line: 'When mentioning logical errors, say exception instead of crash'"

  - id: "asan_capitalization"
    check: "Uses 'ASan' not 'ASAN' for Address Sanitizer"
    origin: agent_config
    source: ".claude/CLAUDE.md - line: 'say ASan, not ASAN'"

rubric:
  - rule: "Memory safety fix completeness"
    description: "The fix should comprehensively address the heap-buffer-overflow by using PaddedPODArray"
    required: true

  - rule: "Code style compliance"
    description: "Should follow ClickHouse coding conventions from AGENTS.md/CLAUDE.md"
    required: false

  - rule: "Error handling correctness"
    description: "Properly handles edge cases like empty pad strings"
    required: true

# Scoring weights
scoring:
  fail_to_pass: 0.7
  pass_to_pass: 0.2
  style: 0.1
