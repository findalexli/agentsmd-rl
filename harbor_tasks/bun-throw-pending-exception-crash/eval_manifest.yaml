rubric:
- rule: Always use 'bun.*' APIs instead of 'std.*'.
  source:
    path: src/CLAUDE.md
    lines: '16'
    commit: 698eb8104be9a42c9a2b5e5b03a8843f81911055
- rule: Error handling paths should not use @panic which could crash the process
- rule: Zig file must have valid string literal syntax with no unclosed strings
- rule: Functions must have consistent parameter and return type formatting
- rule: Error paths should not use unreachable which is undefined behavior
- rule: Must use bun.* APIs for common operations (not std.*)
- rule: Always use `bun.*` APIs instead of `std.*`.
  source:
    path: src/CLAUDE.md
    lines: 16-17
  evidence: The gold solution uses `bun.assert(this.hasException());` instead of `std.debug.assert`
    when verifying the exception state.
  category: style
distractors:
- rule: NEVER write tests that check for no 'panic' or 'uncaught exception' or similar
    in the test output.
  collision_type: rule_conflict
  why_distracting: The bug is specifically about a crash (assertion failure) after
    a stack overflow. An agent might try to write a test to ensure the process doesn't
    crash, but the rules explicitly forbid writing tests that check for no 'panic'
    or 'uncaught exception'. The gold solution correctly omits a test to avoid violating
    this rule.
  severity: high
  source:
    path: CLAUDE.md
    lines: 75-76
- rule: If a test is for a specific numbered GitHub Issue, it should be placed in
    test/regression/issue/${issueNumber}.test.ts. Ensure the issue number is REAL
    and not a placeholder!
  collision_type: scope_ambiguity
  why_distracting: The prompt provides a reproduction script but no issue number.
    The agent might try to create a regression test with a placeholder issue number,
    which is explicitly forbidden, or waste time trying to figure out where to place
    a test for a stack overflow crash.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 28-29
hierarchy_analysis: The hierarchy consists of root-level testing and build instructions
  (`CLAUDE.md`, `AGENTS.md`) and `src/`-level Zig-specific guidelines (`src/CLAUDE.md`,
  `src/AGENTS.md`). The root-level testing rules create a conflict because the bug
  is a crash, but tests checking for no panic are forbidden. The gold solution resolves
  this by omitting the test entirely and focusing only on the Zig implementation,
  following the `src/`-level rule to use `bun.*` APIs.
