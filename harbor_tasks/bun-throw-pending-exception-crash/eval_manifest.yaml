distractors:
- rule: NEVER write tests that check for no "panic" or "uncaught exception" or similar
    in the test output.
  collision_type: scope_ambiguity
  why_distracting: The bug is about a crash/assertion failure after a stack overflow.
    The agent might naturally try to write a test to ensure the process no longer
    crashes, but the rule explicitly forbids writing tests that check for no 'panic'
    or 'uncaught exception' in the output. This creates ambiguity on how to properly
    test the fix, which likely explains why the gold solution omits a test entirely.
  severity: medium
  source:
    path: AGENTS.md
    lines: 68-69
hierarchy_analysis: The repository contains duplicate instruction files (`AGENTS.md`
  and `CLAUDE.md`) at both the root and `src/` levels. The root level focuses on testing
  and building, while the `src/` level focuses on Zig conventions. The agent must
  combine the Zig conventions from `src/AGENTS.md` with the testing constraints from
  the root `AGENTS.md`.
