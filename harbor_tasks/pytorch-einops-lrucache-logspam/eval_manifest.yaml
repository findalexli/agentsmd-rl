rubric:
- rule: Minimize comments; be concise; code should be self-explanatory. Comments explaining
    why code is TEMPORARILY DISABLED are acceptable and necessary.
  source:
    path: CLAUDE.md
    lines: '48'
    commit: 98e35020c7423c304778a7044f6baa3c8a98ba6d
- rule: Comments should be useful, for example, comments that remind the reader about
    some global context that is non-obvious and can't be inferred locally.
  source:
    path: CLAUDE.md
    lines: 49-50
    commit: 98e35020c7423c304778a7044f6baa3c8a98ba6d
- rule: Match existing code style and architectural patterns. Temporarily commenting
    out code with explanatory comments is acceptable for hotfixes.
  source:
    path: CLAUDE.md
    lines: '57'
    commit: 98e35020c7423c304778a7044f6baa3c8a98ba6d
- rule: If uncertain, choose the simpler, more concise implementation. Commenting
    out problematic code is simpler than complex refactoring.
  source:
    path: CLAUDE.md
    lines: '62'
    commit: 98e35020c7423c304778a7044f6baa3c8a98ba6d
distractors:
- rule: Only use commands provided via `spin` for linting.
  collision_type: rule_conflict
  why_distracting: CLAUDE.md instructs the agent to use `spin lint` and `spin fixlint`,
    which directly conflicts with AGENTS.md's instruction to use `lintrunner -a`.
    The agent must choose which linting tool to use.
  severity: high
  source:
    path: CLAUDE.md
    lines: 23-27
- rule: All build (both codegen, C++ and python) is done via `pip install -e . -v
    --no-build-isolation`.
  collision_type: rule_conflict
  why_distracting: CLAUDE.md provides instructions for building PyTorch via `pip install
    -e .`, but AGENTS.md explicitly warns that there is no working build environment.
    Attempting to build will waste time and likely fail.
  severity: high
  source:
    path: CLAUDE.md
    lines: 7-9
- rule: Once the change is passing, find an appropriate test file to add the test
    to and make sure to follow local conventions on the test file.
  collision_type: scope_ambiguity
  why_distracting: The instruction requires finding an appropriate test file to add
    a test once the change is passing. However, this bug involves a third-party library
    (einops) integration, making it ambiguous and difficult to find a suitable test
    file without expanding the scope unnecessarily.
  severity: medium
  source:
    path: AGENTS.md
    lines: 2-6
- rule: Minimize comments; be concise; code should be self-explanatory and self-documenting.
  collision_type: rule_conflict
  why_distracting: The agent might interpret 'Minimize comments; be concise' as an
    instruction to simply delete the version check block without leaving an explanatory
    comment, which would violate the need to document the temporary workaround for
    the lru_cache issue.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 41-41
- rule: Debug AOTInductor (AOTI) errors and crashes.
  source:
    path: .claude/skills/aoti-debug/SKILL.md
    lines: 1-5
  collision_type: scope_ambiguity
  why_distracting: The issue mentions `torch.compile`, which uses AOTInductor under
    the hood. The agent might activate this skill to debug the `lru_cache` warnings,
    but this is a Dynamo frontend tracing issue, not an AOTI backend issue.
  severity: low
hierarchy_analysis: The configuration consists of two root-level files (AGENTS.md
  and CLAUDE.md) that contain direct contradictions. AGENTS.md provides restrictive
  environment warnings ('Do NOT run setup.py', 'run lintrunner -a'), while CLAUDE.md
  provides standard repository workflows ('pip install -e .', 'spin lint'). The agent
  must synthesize these flat but conflicting instructions, ideally prioritizing the
  explicit negative constraints in AGENTS.md over the general guidelines in CLAUDE.md.
