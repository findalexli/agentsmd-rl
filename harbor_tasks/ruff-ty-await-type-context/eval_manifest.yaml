version: "2.0"

source:
  repo: "astral-sh/ruff"
  pr: 24256
  base_commit: "f283ddc382bf2d2825d21d4a59f2610ed97e5302"
  merge_commit: "30e8e1c03f0d1e8e2ae3cbf03998521f7c6fbe0a"

checks:
  - id: cargo_check
    type: pass_to_pass
    origin: static
    description: "Rust code must compile (cargo check -p ty_python_semantic)"

  - id: await_literal_type_context
    type: fail_to_pass
    origin: pr_diff
    description: "list[Literal[1]] annotation propagates through await — no false positive"

  - id: await_self_type_context
    type: fail_to_pass
    origin: pr_diff
    description: "list[Self] annotation propagates through await — no false positive"

  - id: await_union_type_context
    type: fail_to_pass
    origin: pr_diff
    description: "list[int | None] annotation propagates through await — no false positive"

  - id: await_true_positive_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "Genuine type mismatch (str = await get_int()) still flagged"

  - id: await_basic_typed
    type: pass_to_pass
    origin: pr_diff
    description: "Simple typed await without generics does not regress"

  - id: await_no_annotation
    type: pass_to_pass
    origin: pr_diff
    description: "Await without annotation infers correctly (no errors)"

  - id: no_local_rust_imports
    type: pass_to_pass
    origin: agent_config
    description: "No use imports inside function bodies in changed Rust files"
    source:
      path: "AGENTS.md"
      lines: "76"
      commit: "f283ddc382bf2d2825d21d4a59f2610ed97e5302"

  - id: no_new_unwrap_panic
    type: pass_to_pass
    origin: agent_config
    description: "New code does not introduce .unwrap(), panic!(), or unreachable!()"
    source:
      path: "AGENTS.md"
      lines: "79"
      commit: "f283ddc382bf2d2825d21d4a59f2610ed97e5302"

  - id: expect_over_allow
    type: pass_to_pass
    origin: agent_config
    description: "Lint suppressions use #[expect()] not #[allow()]"
    source:
      path: "AGENTS.md"
      lines: "81"
      commit: "f283ddc382bf2d2825d21d4a59f2610ed97e5302"

rubric:
  - rule: "Use comments purposefully. Don't use comments to narrate code, but do use them to explain invariants and why something unusual was done a particular way."
    source:
      path: "AGENTS.md"
      lines: "82"
      commit: "f283ddc382bf2d2825d21d4a59f2610ed97e5302"

  - rule: "Avoid writing significant amounts of new code. This is often a sign that we're missing an existing method or mechanism that could help solve the problem. Look for existing utilities first."
    source:
      path: "AGENTS.md"
      lines: "78"
      commit: "f283ddc382bf2d2825d21d4a59f2610ed97e5302"

  - rule: "Prefer let chains (`if let` combined with `&&`) over nested `if let` statements to reduce indentation and improve readability."
    source:
      path: "AGENTS.md"
      lines: "80"
      commit: "f283ddc382bf2d2825d21d4a59f2610ed97e5302"

  - rule: "Prefer higher-level semantic APIs over raw AST access. Any method that accesses .node() must be #[salsa::tracked]."
    source:
      path: "AGENTS.md"
      lines: "84"
      commit: "f283ddc382bf2d2825d21d4a59f2610ed97e5302"

  - rule: "When adding new ty checks, make error messages concise. Think about how an error message would look on a narrow terminal screen."
    source:
      path: "AGENTS.md"
      lines: "83"
      commit: "f283ddc382bf2d2825d21d4a59f2610ed97e5302"
