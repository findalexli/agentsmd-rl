rubric:
- id: brevity_in_comments
  source:
    lines: 1-4
    commit: e3108225bf2f49bd3908614ac120bf1699fde241
    path: AGENTS.md
  rule: 'AGENTS.md: "Don''t use comments to explain the obvious." Code should

    avoid trivial restatement-of-code comments. Doc comments on exported

    identifiers are fine and required by Go convention; what''s flagged

    is in-body comments that simply repeat what the next line does.

    '
- id: no_unneeded_exports
  source:
    lines: '8'
    commit: e3108225bf2f49bd3908614ac120bf1699fde241
    path: AGENTS.md
  rule: 'AGENTS.md: "Never export symbols that''s not needed outside of the

    package." Helper types/functions added by the change should be

    unexported unless used by another package.

    '
- id: avoid_global_state
  source:
    lines: '9'
    commit: e3108225bf2f49bd3908614ac120bf1699fde241
    path: AGENTS.md
  rule: 'AGENTS.md: "Avoid global state at (almost) all cost." Per-instance

    state belongs on the Namespace receiver, not in package-level vars.

    '
- id: reuse_existing_helpers
  source:
    lines: '10'
    commit: e3108225bf2f49bd3908614ac120bf1699fde241
    path: AGENTS.md
  rule: 'AGENTS.md: "assume that a similar problem has been solved before,

    look hard for helper functions before creating new ones." Reuse

    common helpers (e.g., common/hreflect for type checks, common/hmaps

    for caching, spf13/cast for type conversion) instead of reimplementing.

    '
- id: no_debug_printf_left_behind
  source:
    lines: '5'
    commit: e3108225bf2f49bd3908614ac120bf1699fde241
    path: AGENTS.md
  rule: 'AGENTS.md: temporary debug printing must use hdebug.Printf and not

    be left in committed code (CI fails otherwise). Submitted code must

    not contain stray hdebug.Printf, fmt.Println, or log.Println calls

    added for debugging.

    '
- id: tests_use_qt_matchers
  source:
    lines: '11'
    commit: e3108225bf2f49bd3908614ac120bf1699fde241
    path: AGENTS.md
  rule: 'AGENTS.md: "In tests, use `qt` matchers (e.g.

    `b.Assert(err, qt.ErrorMatches, ...)`) instead of raw `if`/`t.Fatal`

    checks." Any new test code in tpl/strings/ should use the

    quicktest qt matchers, consistent with the rest of the file.

    '
- id: short_self_explanatory_names
  source:
    lines: 2-4
    commit: e3108225bf2f49bd3908614ac120bf1699fde241
    path: AGENTS.md
  rule: 'AGENTS.md: "Use self-explanatory variable and function names. Use

    short variable names when the context is clear." Identifier names

    should follow idiomatic Go and the existing file''s style.

    '
