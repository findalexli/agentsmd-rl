checks:
- id: test_inline_form_single_pair
  type: fail_to_pass
  origin: pr_diff
  description: ReplacePairs("a","b","aab") returns "bbb" with no error.
- id: test_inline_form_multiple_pairs
  type: fail_to_pass
  origin: pr_diff
  description: Multiple inline pairs apply in a single pass.
- id: test_slice_form
  type: fail_to_pass
  origin: pr_diff
  description: With exactly two args, the first arg may be a slice of pairs.
- id: test_single_pass_replacement
  type: fail_to_pass
  origin: pr_diff
  description: Replacements are single-pass — output of one pair is not re-scanned.
- id: test_template_html_source
  type: fail_to_pass
  origin: pr_diff
  description: Source value of type template.HTML is accepted.
- id: test_empty_source_returns_empty
  type: fail_to_pass
  origin: pr_diff
  description: Empty source string returns empty without error.
- id: test_empty_pairs_returns_source_unchanged
  type: fail_to_pass
  origin: pr_diff
  description: Empty pairs slice returns source unchanged.
- id: test_template_html_pair_value
  type: fail_to_pass
  origin: pr_diff
  description: template.HTML values inside the pairs list are accepted.
- id: test_int_source_cast_to_string
  type: fail_to_pass
  origin: pr_diff
  description: Castable non-string source (int) is accepted via cast.ToStringE.
- id: test_any_slice_with_int_pair_value
  type: fail_to_pass
  origin: pr_diff
  description: A []any pairs slice with castable non-string elements is accepted.
- id: test_repeated_calls_consistent
  type: fail_to_pass
  origin: pr_diff
  description: Repeated calls with identical pairs return identical results.
- id: test_error_too_few_args
  type: fail_to_pass
  origin: pr_diff
  description: Fewer than 2 args returns an error matching "requires at least 2".
- id: test_error_two_args_first_not_slice
  type: fail_to_pass
  origin: pr_diff
  description: With 2 args, a non-slice first arg returns "first must be a slice" error.
- id: test_error_uneven_pairs
  type: fail_to_pass
  origin: pr_diff
  description: An odd number of pair elements returns "uneven number" error.
- id: test_method_registered_in_init
  type: fail_to_pass
  origin: pr_diff
  description: ReplacePairs is registered via ns.AddMethodMapping in init.go and the package builds.
- id: test_existing_strings_tests_pass
  type: pass_to_pass
  origin: repo_tests
  description: All existing tpl/strings unit tests continue to pass.
- id: test_go_vet_clean
  type: pass_to_pass
  origin: repo_tests
  description: go vet on tpl/strings reports no issues.
- id: test_gofmt_clean
