rubric:
- rule: Rust imports should always go at the top of the file, never locally in functions.
  source:
    path: crates/ty_project/src/metadata/options.rs
    lines: 23-23
  evidence: The `Deserializer` trait is added to the existing `use serde::{...}` block at the top of the file rather than being imported locally inside the `deserialize_supported_python_version` function.
  category: style
  reference: use serde::{Deserialize, Deserializer, Serialize};
- rule: Try hard to avoid patterns that require `panic!`, `unreachable!`, or `.unwrap()`.
  source:
    path: crates/ty_project/src/metadata/options.rs
    lines: 41-47
  evidence: The custom deserializer returns `Err(serde::de::Error::custom(...))` to gracefully handle unsupported versions instead of using `.unwrap()` or `panic!()`.
  category: style
  reference: Err(serde::de::Error::custom(format!
- rule: Prefer let chains (`if let` combined with `&&`)
  source:
    path: crates/ty_project/src/metadata/options.rs
    lines: 38-40
  evidence: The `deserialize_supported_python_version` function uses an `if let Some(...) = ... && !...` chain to check if the version is supported.
  category: style
  reference: "if let Some(python_version) = &python_version\n        && !PythonVersion::iter().any(|supported_version|"
distractors:
- rule: Avoid writing significant amounts of new code. Look for existing utilities first.
  collision_type: rule_conflict
  why_distracting: The agent might waste time searching for an existing validation utility or try to avoid writing the ~20 line custom deserializer function, but writing this new function is exactly what is required to solve the issue.
  severity: medium
  source:
    path: AGENTS.md
    lines: 57-57
- rule: All changes must be tested. If you're not testing your changes, you're not done.
  collision_type: scope_ambiguity
  why_distracting: The agent might spend significant effort trying to write and wire up tests for the configuration parser, but the gold solution does not require adding new tests for this specific fix.
  severity: medium
  source:
    path: AGENTS.md
    lines: 51-51
hierarchy_analysis: The configuration is flat, with CLAUDE.md simply including AGENTS.md. The agent must apply the style rules from AGENTS.md directly to the Rust code.
