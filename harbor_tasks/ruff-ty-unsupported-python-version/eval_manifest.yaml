rubric:
- rule: Rust imports should always go at the top of the file, never locally in functions.
  source:
    path: AGENTS.md
    lines: 64-64
  evidence: The `Deserializer` trait is added to the existing `use serde::{...}` block
    at the top of the file rather than being imported locally inside the `deserialize_supported_python_version`
    function.
  category: style
- rule: Try hard to avoid patterns that require `panic!`, `unreachable!`, or `.unwrap()`.
  source:
    path: AGENTS.md
    lines: 67-67
  evidence: The custom deserializer returns `Err(serde::de::Error::custom(...))` to
    gracefully handle unsupported versions instead of using `.unwrap()` or `panic!()`.
  category: style
- rule: Prefer let chains (`if let` combined with `&&`)
  source:
    path: AGENTS.md
    lines: 68-68
  evidence: The `deserialize_supported_python_version` function uses an `if let Some(...)
    = ... && !...` chain to check if the version is supported.
  category: style
distractors:
- rule: All changes must be tested. If you're not testing your changes, you're not
    done.
  collision_type: scope_ambiguity
  why_distracting: The gold solution only modifies `options.rs` and does not include
    new tests. An agent strictly following this rule might try to create or modify
    test files, which could lead to hallucinated test paths or out-of-scope changes
    for this specific fix.
  severity: medium
  source:
    path: AGENTS.md
    lines: 60-60
- rule: Avoid writing significant amounts of new code. This is often a sign that we're
    missing an existing method or mechanism.
  collision_type: rule_conflict
  why_distracting: The agent might try to find an existing validation mechanism or
    macro instead of writing the custom deserializer `deserialize_supported_python_version`,
    potentially wasting time or failing to implement the required parse-time validation.
  severity: medium
  source:
    path: AGENTS.md
    lines: 66-66
