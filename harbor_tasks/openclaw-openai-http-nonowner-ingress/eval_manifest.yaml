version: "2.0"

source:
  repo: "openclaw/openclaw"
  pr: 57769
  base_commit: "c6f2db1506873e053bda30f99dea736a1b0e3ba2"
  merge_commit: "f011d0be28afbc7868f5e55c1117c779bd0a9f10"

checks:
  - id: ts_syntax
    type: pass_to_pass
    origin: static
    description: "openai-http.ts must parse without syntax errors"

  - id: sender_is_owner_false
    type: fail_to_pass
    origin: pr_diff
    description: "buildAgentCommandInput must set senderIsOwner to false for HTTP ingress - verified via vitest execution"

  - id: sender_is_owner_in_source
    type: fail_to_pass
    origin: pr_diff
    description: "Source code must contain senderIsOwner: false (not true) in buildAgentCommandInput function"

  - id: build_agent_command_input_exists
    type: pass_to_pass
    origin: pr_diff
    description: "buildAgentCommandInput function must not be deleted or renamed"

  - id: handle_openai_http_request_exported
    type: pass_to_pass
    origin: pr_diff
    description: "handleOpenAiHttpRequest must still be exported"

  - id: adjacent_fields_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "deliver, bestEffortDeliver, and allowModelOverride retain original values"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "buildAgentCommandInput must have a non-trivial function body"

  - id: no_any_in_function
    type: pass_to_pass
    origin: agent_config
    description: "buildAgentCommandInput must not use 'any' type annotation"
    source:
      path: "CLAUDE.md"
      lines: "144"
      commit: "c6f2db1506873e053bda30f99dea736a1b0e3ba2"

  - id: no_ts_nocheck
    type: pass_to_pass
    origin: agent_config
    description: "openai-http.ts must not contain @ts-nocheck, @ts-ignore, or eslint-disable"
    source:
      path: "CLAUDE.md"
      lines: "146"
      commit: "c6f2db1506873e053bda30f99dea736a1b0e3ba2"

  - id: params_pass_through
    type: pass_to_pass
    origin: pr_diff
    description: "buildAgentCommandInput must correctly pass through prompt, model, session, and run fields"

rubric:
  - rule: "Treat schema changes as protocol changes, not local refactors."
    source:
      path: "src/gateway/protocol/CLAUDE.md"
      lines: "19"
      commit: "c6f2db1506873e053bda30f99dea736a1b0e3ba2"
  - rule: "Add brief code comments for tricky or non-obvious logic."
    source:
      path: "CLAUDE.md"
      lines: "163"
      commit: "c6f2db1506873e053bda30f99dea736a1b0e3ba2"
