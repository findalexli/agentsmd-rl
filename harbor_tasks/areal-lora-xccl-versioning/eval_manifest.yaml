version: "2.0"

source:
  repo: "inclusionAI/AReaL"
  pr: 1021
  base_commit: "1927decc369d30df0037854b5d58ec7a9ca2a3b7"
  merge_commit: "a3e36d4af66ac6fa88e723675060cde591ca133e"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified files must parse without syntax errors"

  - id: endpoint_accepts_lora_request_param
    type: fail_to_pass
    origin: pr_diff
    description: "update_weight_lora_xccl accepts UpdateWeightsFromXcclRequestLora parameter"

  - id: registry_update_renames_lora
    type: fail_to_pass
    origin: pr_diff
    description: "After XCCL update, lora_requests registry is renamed from old to new version"

  - id: lora_payload_forwarded
    type: fail_to_pass
    origin: pr_diff
    description: "build_distributed_weight_update_requests forwards LoRA payload (not empty {}) for XCCL update"

  - id: non_lora_payload_unchanged
    type: pass_to_pass
    origin: pr_diff
    description: "Non-LoRA XCCL update still sends empty payload"

  - id: endpoint_not_stub
    type: pass_to_pass
    origin: static
    description: "update_weight_lora_xccl has meaningful body, not just pass/return"

  - id: no_wildcard_imports
    type: pass_to_pass
    origin: agent_config
    description: "No wildcard imports in modified files"
    source:
      path: "AGENTS.md"
      lines: "30"
      commit: "1927decc369d30df0037854b5d58ec7a9ca2a3b7"

  - id: no_bare_print
    type: pass_to_pass
    origin: agent_config
    description: "No bare print() in production code — use logger"
    source:
      path: "AGENTS.md"
      lines: "89-90"
      commit: "1927decc369d30df0037854b5d58ec7a9ca2a3b7"

rubric:
  - rule: "Explicit type hints; reuse areal/api/cli_args.py dataclasses; heavy optional deps inside functions."
    source:
      path: "AGENTS.md"
      lines: "99-100"
      commit: "1927decc369d30df0037854b5d58ec7a9ca2a3b7"

  - rule: "Composition over inheritance — keep hierarchies <= 2 levels; prefer delegation."
    source:
      path: "AGENTS.md"
      lines: "80"
      commit: "1927decc369d30df0037854b5d58ec7a9ca2a3b7"

  - rule: "Follow existing code patterns in the same module."
    source:
      path: "AGENTS.md"
      lines: "40"
      commit: "1927decc369d30df0037854b5d58ec7a9ca2a3b7"

  - rule: "Naming conventions: Config=XxxConfig, Engine=XxxEngine, Workflow=XxxWorkflow, Reward=xxx_reward_fn."
    source:
      path: "AGENTS.md"
      lines: "82-87"
      commit: "1927decc369d30df0037854b5d58ec7a9ca2a3b7"
