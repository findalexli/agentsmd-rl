  - id: test_compilation_after_removal
    type: fail_to_pass
    origin: behavioral
    description: Crate compiles after removing the unused function

  - id: test_sequential_connect_function_removed
    type: fail_to_pass
    origin: behavioral
    description: SequentialStore::sequential_connect function has been removed

  - id: test_unused_import_removed
    type: fail_to_pass
    origin: behavioral
    description: Unused anyhow::Context import has been removed

  # Pass-to-pass tests (structural sanity)
  - id: test_transaction_method_still_present
    type: pass_to_pass
    origin: behavioral
    description: The transaction method still exists (structural sanity check)

  - id: test_sequential_store_trait_intact
    type: pass_to_pass
    origin: behavioral
    description: SequentialStore trait definition is still intact

  - id: test_cargo_check_entire_indexer
