task_name: sui-remove-unused-sequential-connect
title: Remove unused SequentialStore::sequential_connect function

description: |
  The SequentialStore trait in sui-indexer-alt-framework-store-traits has a vestigial
  `sequential_connect` method that is no longer used anywhere. This task requires
  removing this unused method along with its associated unused import.

checks:
