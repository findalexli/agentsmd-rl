rubric:
- rule: Follow existing code style - check neighboring files for patterns
  source:
    path: CLAUDE.md
- rule: Use comments to explain invariants and rationale, not narrate what the code
    does
  source:
    path: CLAUDE.md
- rule: Verify tests pass with 'bun bd test <file>' before pushing - never use 'bun
    test' directly
  source:
    path: test/AGENTS.md
- rule: When spawning processes in tests, assert stdout before exitCode for better
    error messages
  source:
    path: test/AGENTS.md
- rule: Do not write flaky tests - never use setTimeout or wait for time to pass;
    await conditions
  source:
    path: test/AGENTS.md
- rule: Do not set a timeout on tests. Bun already has timeouts. The gold solution
    correctly follows this by using itRendering helper instead of adding timeouts
  source:
    path: test/CLAUDE.md
- rule: Prefer async/await over callbacks in tests. The gold solution correctly fixes
    the async/await pattern in webview-chrome.test.ts
  source:
    path: test/CLAUDE.md
- rule: Prefer async/await over callbacks. The gold solution correctly uses async/await
    instead of callbacks in webview-chrome.test.ts
  source:
    path: test/AGENTS.md
distractors:
- rule: Prefer concurrent tests over sequential tests
  collision_type: scope_ambiguity
  why_distracting: The agent might try to make the webview tests concurrent by using
    `test.concurrent` in the new `itRendering` helper, but webview tests often require
    sequential execution due to window/display focus, and it is out of scope for this
    PR.
  severity: medium
  source:
    path: test/AGENTS.md
    lines: 19-20
- rule: For multi-file tests, prefer tempDir and Bun.spawn.
  collision_type: scope_ambiguity
  why_distracting: The `closeAll` test uses a data URL for HTML content. An agent
    might try to refactor this to use `tempDir` to serve the HTML file as a 'multi-file
    test', but the instructions specifically mention encoding the data URL instead.
  severity: low
  source:
    path: test/AGENTS.md
    lines: 53-66
hierarchy_analysis: The config hierarchy has `AGENTS.md` at the root and `test/AGENTS.md`
  in the test directory. The test directory rules provide specific guidance on test
  timeouts, concurrency, and process spawning which apply directly to the files being
  edited.
