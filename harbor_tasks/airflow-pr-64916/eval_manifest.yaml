source:
  repo: apache/airflow
  pr_number: 64916
  pr_title: "[v3-2-test] Bugfix/skip commit checks on automated ci upgrades (#64856)"
  base_commit: 2eeff98486f794b014bd5ba74aeea5ecafca55a7
  merge_commit: ab42e493b7fbe315ef34b44a6ed1703084d505df

checks:
  - id: test_ci_commands_syntax
    type: pass_to_pass
    origin: structural
    description: Verify ci_commands.py has valid Python syntax

  - id: test_subprocess_import_in_ci_commands
    type: pass_to_pass
    origin: structural
    description: Verify subprocess module is imported (already present in base)

  - id: test_commit_wrapped_in_try_except
    type: fail_to_pass
    origin: behavioral
    description: Verify the git commit is wrapped in try/except for CalledProcessError

  - id: test_retry_commit_with_no_verify
    type: fail_to_pass
    origin: behavioral
    description: Verify retry commit includes --no-verify flag to skip pre-commit hooks

  - id: test_git_add_before_retry_commit
    type: fail_to_pass
    origin: behavioral
    description: Verify git add is called before retry commit in the error handling path

  - id: test_original_commit_uses_message_flag
    type: fail_to_pass
    origin: behavioral
    description: Verify the commit uses --message flag

  - id: test_console_print_called_on_failure
    type: fail_to_pass
    origin: behavioral
    description: Verify console_print is called to inform about the retry attempt

  - id: test_retry_commit_has_same_message
    type: fail_to_pass
    origin: behavioral
    description: Verify retry commit uses the same commit message format as the original

  - id: test_upgrade_function_contains_error_handling
    type: fail_to_pass
    origin: behavioral
    description: Verify the upgrade function contains try/except error handling

  - id: test_repo_black_check
    type: pass_to_pass
    origin: repo_tests
    description: Verify ci_commands.py passes black formatting check

  - id: test_repo_breeze_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: Run breeze unit tests for run_utils and general_utils

  - id: test_repo_breeze_git_worktree_tests
    type: pass_to_pass
    origin: repo_tests
    description: Run breeze git worktree tests

rubric:
  - id: no_doc_update_required
    rule: This is an internal bugfix that does not require documentation updates - code-only change is acceptable
    source:
      path: README.md
    reference: "(none required - internal implementation detail)"

  - id: no_agent_config_update_required
    rule: This bugfix to CI automation does not require CLAUDE.md or agent config updates
    source:
      path: CLAUDE.md
    reference: "(none required - does not change agent behavior)"
