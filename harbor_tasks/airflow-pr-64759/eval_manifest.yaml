rubric:
- id: schema_has_descriptions
  rule: Schema property additions include descriptive descriptions
  source:
    section: properties
    path: chart/values.schema.json
  guidance: New schema properties should have description field explaining their purpose
- id: deprecation_documented
  rule: Deprecated fields are documented in NOTES.txt with migration guidance
  source:
    section: DEPRECATION WARNING
    path: chart/templates/NOTES.txt
  guidance: When deprecating fields, add a deprecation warning in NOTES.txt that mentions the replacement fields
- id: values_yaml_matches_schema
  rule: values.yaml default values match what is defined in values.schema.json
  source:
    section: workers
    path: chart/values.yaml
  guidance: New properties added to schema should also be added to values.yaml with matching defaults
version: '2.0'
