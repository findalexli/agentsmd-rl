checks:
  - id: typescript_compiles
    type: pass_to_pass
    origin: static
    description: "TypeScript compilation must succeed after the refactor"

  - id: context_keys_centralized
    type: fail_to_pass
    origin: pr_diff
    description: "All 6 session context keys exported from contextkeys.ts (IsNewChatSessionContext, ActiveSessionProviderIdContext, ActiveSessionTypeContext, IsActiveSessionBackgroundProviderContext, ActiveSessionHasGitRepositoryContext, ChatSessionProviderIdContext)"

  - id: keys_removed_from_management_service
    type: fail_to_pass
    origin: pr_diff
    description: "RawContextKey definitions removed from sessionsManagementService.ts"

  - id: key_removed_from_copilot_actions
    type: fail_to_pass
    origin: pr_diff
    description: "ActiveSessionHasGitRepositoryContext local definition removed from copilotChatSessionsActions.ts"

  - id: hardcoded_strings_replaced
    type: fail_to_pass
    origin: pr_diff
    description: "Hardcoded context key string literals replaced with .key property access in copilotChatSessionsActions.ts, sessionsList.ts, sessionsTitleBarWidget.ts"

  - id: consumer_imports_updated
    type: fail_to_pass
    origin: pr_diff
    description: "All consumer files import centralized context keys from contextkeys.js"

  - id: no_duplicate_imports
    type: pass_to_pass
    origin: agent_config
    description: "No file has multiple import statements from the same contextkeys module"
    source:
      path: ".github/copilot-instructions.md"
      lines: "89"
      commit: "dfd3b4dcb3884a3de67abfa72adfb54ba462797d"

  - id: microsoft_copyright_header
    type: pass_to_pass
    origin: agent_config
    description: "All modified TypeScript files include the Microsoft copyright header"
    source:
      path: ".github/copilot-instructions.md"
      lines: "114"
      commit: "dfd3b4dcb3884a3de67abfa72adfb54ba462797d"

rubric:
