    source:
      path: ".github/copilot-instructions.md"
      lines: "96"
      commit: "dfd3b4dcb3884a3de67abfa72adfb54ba462797d"

  - rule: "When removing an import, do not leave behind blank lines where the import was. Ensure the surrounding code remains compact."
    source:
      path: ".github/copilot-instructions.md"
      lines: "90"
      commit: "dfd3b4dcb3884a3de67abfa72adfb54ba462797d"

  - rule: "Prefer `async` and `await` over `Promise` and `then` calls"
