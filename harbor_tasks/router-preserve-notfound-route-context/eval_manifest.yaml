  base_commit: d1174179082d896a9674532994a4d6b38238c37e

description: |
  Preserve component-thrown notFound() errors through framework error boundaries
  so route notFoundComponent handlers render without requiring an explicit routeId.

  The bug: When notFound() was thrown from a route component (not a loader),
  the error would lose its routeId context as it propagated through React/Solid/Vue
  error boundaries. This caused the wrong notFoundComponent to render.

  The fix: Assign error.routeId ??= currentMatch.routeId in the onCatch and
  fallback handlers in Match.tsx for each framework. For Solid, also add a
  getNotFound() helper to unwrap errors that Solid wraps in Error objects.

# One check per test function in test_outputs.py
