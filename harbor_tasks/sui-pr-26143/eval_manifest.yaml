task:
  name: remove-certified-blocks-sender
  source_pr:
    owner: MystenLabs
    repo: sui
    number: 26143
    merge_commit: 340c2f6643730ca1693c1a74554cee3c06b198cf
    base_commit: f620dfc7c8d05e828e8f63bc5466b10ed4979e6d
  description: |
    Remove the certified_blocks_sender channel and CertifiedBlocksOutput type from consensus core.
    This is dead code cleanup.

checks:
  - id: compilation
    name: Code compiles
    description: The consensus-core crate must compile successfully
    type: fail_to_pass

  - id: certified_blocks_output_removed
    name: CertifiedBlocksOutput struct removed
    description: CertifiedBlocksOutput type must be removed from block.rs
    type: fail_to_pass

  - id: certified_blocks_output_not_exported
    name: CertifiedBlocksOutput not exported
    description: CertifiedBlocksOutput must not be exported from lib.rs
    type: fail_to_pass

  - id: transaction_certifier_no_sender_field
    name: No certified_blocks_sender field
    description: TransactionCertifier must not have certified_blocks_sender field
    type: fail_to_pass

  - id: transaction_certifier_new_signature
    name: TransactionCertifier::new has 3 parameters
    description: TransactionCertifier::new() must take exactly 3 parameters
    type: fail_to_pass

  - id: commit_consumer_no_block_sender
    name: No block_sender in CommitConsumerArgs
    description: CommitConsumerArgs must not have block_sender field
    type: fail_to_pass

  - id: add_voted_blocks_no_send
    name: No send_certified_blocks calls
    description: add_voted_blocks and add_proposed_block should not send to channels
    type: fail_to_pass

  - id: authority_node_no_block_sender_clone
    name: No block_sender.clone() in authority_node
    description: authority_node.rs should not clone block_sender for TransactionCertifier
    type: fail_to_pass

  - id: consensus_tests_pass
    name: Consensus tests pass
    description: Consensus core tests must pass after the changes
    type: pass_to_pass

rubric: []
