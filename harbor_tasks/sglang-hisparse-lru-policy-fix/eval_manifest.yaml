version: "2.0"

source:
  repo: "sgl-project/sglang"
  pr: 22170
  base_commit: "93109cc89be31809e45886377c55099983effa22"
  merge_commit: "41c7c97ff30a8f5e969cefc3efac57f0f3fdbb64"

checks:
  # ---------------------------------------------------------------------------
  # Static checks (syntax / compilation gates)
  # ---------------------------------------------------------------------------
  - id: file_exists
    type: pass_to_pass
    origin: static
    description: "Target file must exist"

  - id: file_is_not_empty
    type: pass_to_pass
    origin: static
    description: "Target file must have substantial content"

  - id: kernel_has_substantial_content
    type: pass_to_pass
    origin: static
    description: "The kernel function should have substantial implementation (not stubbed)"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "Modified function has real logic, not just pass/return"

  - id: lru_writeback_block_exists
    type: pass_to_pass
    origin: static
    description: "The LRU write-back block must exist with proper comments"

  # ---------------------------------------------------------------------------
  # Fail-to-pass checks (pr_diff) — core behavioral tests
  # ---------------------------------------------------------------------------
  - id: lru_writeback_after_miss_calculation
    type: fail_to_pass
    origin: pr_diff
    description: "LRU write-back block must come AFTER total_misses calculation, not before"

  - id: miss_slot_handling
    type: fail_to_pass
    origin: pr_diff
    description: "LRU write-back must handle miss slots with three-way conditional (misses/evictables/hits)"

  - id: miss_slot_placement
    type: fail_to_pass
    origin: pr_diff
    description: "Miss slots should be placed right before hits in LRU order: total_evictable - total_misses + i"

  - id: evictable_slot_placement
    type: fail_to_pass
    origin: pr_diff
    description: "Evictables should be shifted to make room for misses: i - total_misses"

rubric:
  # Soft rules for LLM judge — none for this task as the rules are programmatic
  []
