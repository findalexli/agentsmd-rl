distractors:
- rule: To run lint, run 'lintrunner -a' (which will autoapply changes)
  collision_type: rule_conflict
  why_distracting: CLAUDE.md instructs the agent to use `spin lint` and `spin fixlint`.
    AGENTS.md instructs the agent to use `lintrunner -a`. This creates a direct conflict
    on how to run linting.
  severity: high
  source:
    path: AGENTS.md
    lines: 9-9
- rule: All build (both codegen, C++ and python) is done via `pip install -e . -v
    --no-build-isolation`.
  collision_type: rule_conflict
  why_distracting: AGENTS.md states 'you do not have a working build environment',
    which conflicts with CLAUDE.md providing a specific build command (`pip install
    -e .`). The agent might try to build and fail, or get confused about whether it
    can test its changes.
  severity: high
  source:
    path: CLAUDE.md
    lines: 8-10
- rule: Minimize comments; be concise; code should be self-explanatory and self-documenting.
  collision_type: scope_ambiguity
  why_distracting: The agent might strictly avoid adding comments, missing the opportunity
    to explain the 'out of shared memory' context for the new config variable, which
    the gold solution explicitly includes.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 36-36
hierarchy_analysis: CLAUDE.md and AGENTS.md are both at Level 0. They have direct
  conflicts regarding linting (`spin lint` vs `lintrunner -a`) and build environment
  (`pip install -e .` vs 'you do not have a working build environment'). The agent
  must navigate these conflicting instructions.
