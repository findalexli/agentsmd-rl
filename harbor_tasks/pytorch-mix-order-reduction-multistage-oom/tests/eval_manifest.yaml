distractors:
- rule: When you are working on a bug... find an appropriate test file to add the
    test to and make sure to follow local conventions on the test file.
  collision_type: scope_ambiguity
  why_distracting: The rule demands adding a test to an appropriate test file. However,
    this bug involves out-of-shared-memory errors on specific large model architectures
    (16K+ sequence lengths, dual RMSNorm). Attempting to write a unit test for this
    hardware/memory constraint would be extremely difficult, likely fail in CI, and
    is not expected for this specific PR.
  severity: high
  source:
    path: AGENTS.md
    lines: 3-6
- rule: To run lint, run 'lintrunner -a' (which will autoapply changes)
  collision_type: rule_conflict
  why_distracting: AGENTS.md instructs the agent to use `lintrunner -a` for linting,
    which directly conflicts with CLAUDE.md's strict instruction to 'Only use commands
    provided via `spin` for linting'.
  severity: medium
  source:
    path: AGENTS.md
    lines: 11-11
- rule: Debug AOTInductor (AOTI) errors and crashes. Use when encountering AOTI segfaults,
    device mismatch errors, constant loading failures, or runtime errors from aot_compile.
  source:
    path: .claude/skills/aoti-debug/SKILL.md
    lines: 1-5
  collision_type: scope_ambiguity
  why_distracting: The issue mentions 'compilation failures', which might lead the
    agent to invoke the `aoti-debug` skill. However, the issue is specifically about
    Triton kernel autotuning heuristics in Inductor, not AOTI compilation or packaging
    errors.
  severity: low
hierarchy_analysis: Both AGENTS.md and CLAUDE.md reside at the root level (Level 0)
  and are loaded accumulatively. They contain direct contradictions regarding linting
  tools (`lintrunner` vs `spin`). Furthermore, the generic testing mandate in AGENTS.md
  conflicts with the practical reality of the hardware-specific bug described in the
  task instruction, requiring the agent to exercise judgment over rigid rule-following.
