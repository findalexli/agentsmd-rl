version: "2.0"

source:
  repo: "astral-sh/uv"
  pr: 18669
  base_commit: "b38bea427cca74f993c78213522a16a902b6046e"
  merge_commit: "d0f2f3babc7c892958e93419ad6065df0deb2112"

checks:
  # Gate
  - id: compile
    type: pass_to_pass
    origin: static
    description: "Crate compiles after modifications"

  # Fail-to-pass: case-insensitive Dynamic field detection
  - id: lowercase_requires_dist
    type: fail_to_pass
    origin: pr_diff
    description: "parse_pkg_info detects lowercase 'requires-dist' as dynamic"

  - id: lowercase_requires_python
    type: fail_to_pass
    origin: pr_diff
    description: "parse_pkg_info detects lowercase 'requires-python' as dynamic"

  - id: lowercase_provides_extra
    type: fail_to_pass
    origin: pr_diff
    description: "parse_pkg_info detects lowercase 'provides-extra' as dynamic"

  - id: lowercase_version_dynamic
    type: fail_to_pass
    origin: pr_diff
    description: "parse_metadata detects lowercase 'version' as dynamic"

  - id: uppercase_requires_dist
    type: fail_to_pass
    origin: pr_diff
    description: "parse_pkg_info detects uppercase 'REQUIRES-DIST' as dynamic"

  - id: uppercase_version_dynamic
    type: fail_to_pass
    origin: pr_diff
    description: "parse_metadata detects uppercase 'VERSION' as dynamic"

  - id: mixed_case_provides_extra
    type: fail_to_pass
    origin: pr_diff
    description: "parse_pkg_info detects mixed-case 'pRoViDeS-eXtRa' as dynamic"

  # Pass-to-pass: regression guards
  - id: canonical_requires_dist
    type: pass_to_pass
    origin: pr_diff
    description: "Canonical 'Requires-Dist' is still rejected"

  - id: canonical_version_dynamic
    type: pass_to_pass
    origin: pr_diff
    description: "Canonical 'Version' still sets dynamic=true"

  - id: upstream_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Upstream metadata_resolver unit tests still pass"

  - id: no_stub_macros
    type: pass_to_pass
    origin: static
    description: "No todo!() or unimplemented!() in metadata_resolver.rs"

  - id: no_unwrap_panic_in_parse_functions
    type: pass_to_pass
    origin: agent_config
    description: "No .unwrap(), panic!(), or unreachable!() in parse_pkg_info/parse_metadata"
    source:
      path: "CLAUDE.md"
      lines: "7"
      commit: "b38bea427cca74f993c78213522a16a902b6046e"

  - id: no_unsafe_in_parse_functions
    type: pass_to_pass
    origin: agent_config
    description: "No unsafe blocks in parse_pkg_info/parse_metadata"
    source:
      path: "CLAUDE.md"
      lines: "7"
      commit: "b38bea427cca74f993c78213522a16a902b6046e"

  - id: expect_over_allow
    type: pass_to_pass
    origin: agent_config
    description: "Uses #[expect()] instead of #[allow()] for clippy attributes"
    source:
      path: "CLAUDE.md"
      lines: "10"
      commit: "b38bea427cca74f993c78213522a16a902b6046e"

rubric:
  - rule: "ALWAYS attempt to add a test case for changed behavior"
    source:
      path: "CLAUDE.md"
      lines: "2"
      commit: "b38bea427cca74f993c78213522a16a902b6046e"

  - rule: "PREFER integration tests, e.g., at `it/...` over unit tests"
    source:
      path: "CLAUDE.md"
      lines: "3"
      commit: "b38bea427cca74f993c78213522a16a902b6046e"

  - rule: "PREFER patterns like `if let` to handle fallibility"
    source:
      path: "CLAUDE.md"
      lines: "8"
      commit: "b38bea427cca74f993c78213522a16a902b6046e"

  - rule: "PREFER let chains (`if let` combined with `&&`) over nested `if let` statements"
    source:
      path: "CLAUDE.md"
      lines: "11"
      commit: "b38bea427cca74f993c78213522a16a902b6046e"

  - rule: "ALWAYS read and copy the style of similar tests when adding new cases"
    source:
      path: "CLAUDE.md"
      lines: "15"
      commit: "b38bea427cca74f993c78213522a16a902b6046e"

  - rule: "PREFER top-level imports over local imports or fully qualified names"
    source:
      path: "CLAUDE.md"
      lines: "16"
      commit: "b38bea427cca74f993c78213522a16a902b6046e"

  - rule: "AVOID shortening variable names, e.g., use `version` instead of `ver`, and `requires_python` instead of `rp`"
    source:
      path: "CLAUDE.md"
      lines: "17-18"
      commit: "b38bea427cca74f993c78213522a16a902b6046e"
