    type: pass_to_pass
    origin: static
    description: "Modified TS files must have balanced braces"

  - id: extension_import_removed
    type: fail_to_pass
    origin: pr_diff
    description: "Buggy import from extensions/telegram/test-support must be removed"

  - id: plugin_constructed_intree
    type: fail_to_pass
    origin: pr_diff
    description: "telegramCommandTestPlugin constructed in-tree via SDK helpers or manual ChannelPlugin"

  - id: plugin_not_stub
    type: fail_to_pass
    origin: pr_diff
    description: "Plugin definition spans >=8 meaningful lines (not a trivial stub)"

  - id: plugin_has_channel_config
    type: fail_to_pass
    origin: pr_diff
    description: "Plugin definition includes config/allowlist/auth adapters"

  - id: path_canonicalization_in_ssrf
    type: fail_to_pass
    origin: pr_diff
    description: "SSRF test block uses path canonicalization (realpath/realpathSync/path.resolve)"

  - id: no_direct_path_comparison
    type: fail_to_pass
    origin: pr_diff
    description: "No direct uncanonicalized path equality in SSRF tests"

  - id: both_ssrf_tests_canonicalize
    type: fail_to_pass
    origin: pr_diff
    description: "Both SSRF test cases use path canonicalization, not just one"

  - id: plugin_defined_and_used
    type: pass_to_pass
    origin: pr_diff
    description: "telegramCommandTestPlugin appears at least twice (definition + usage)"

  - id: ssrf_structure_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "SSRF test block still references MediaAttachmentCache and O_NOFOLLOW"

