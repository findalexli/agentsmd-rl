- rule: Maintain architecture boundaries between core (`src/`) and bundled plugins
    (`extensions/`).
  source:
    path: CLAUDE.md
    lines: 28-33
  evidence: 'The gold solution removes the direct import from `../../../extensions/telegram/test-support.js`
    in `src/auto-reply/reply/commands.test.ts` and instead builds a local mock using
    `src/plugin-sdk/*` and '
  category: architecture
distractors:
- rule: 'Import boundaries: extension production code should treat openclaw/plugin-sdk/*
    as the public surface. Do not import core src/** directly.'
  collision_type: architecture_boundary
  why_distracting: The rule explicitly forbids extension code from importing core
    code, but doesn't explicitly forbid core tests from importing extension code.
    An agent might misinterpret this one-way rule as implying that core tests importing
    extension test-support files is acceptable, failing to recognize the bidirectional
    boundary violation.
  severity: high
  source:
    path: CLAUDE.md
    lines: 18-19
- rule: 'Messaging channels: always consider all built-in + extension channels when
    refactoring shared logic.'
  collision_type: scope_ambiguity
  why_distracting: The rule mandates considering all built-in and extension channels
    when refactoring shared logic. An agent might over-engineer the fix by trying
    to create a generalized, cross-channel test plugin helper for all channels, rather
    than just locally replicating the Telegram-specific configuration needed to fix
    this specific test.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 20-24
- rule: 'Plugins: live in the bundled workspace plugin tree. Keep plugin-only deps
    in the extension package.json; do not add them to the root package.json unless
    core uses them.'
  collision_type: would_cause_bug
  why_distracting: The rule discusses keeping plugin-only deps in the extension `package.json`
    and not adding them to the root `package.json` unless core uses them. An agent
    might try to 'fix' the import error by adding the telegram extension as a devDependency
    to the root `package.json` so that the core test can legally import it, which
    would violate the architectural intent.
  severity: high
  source:
    path: CLAUDE.md
    lines: 16-17
hierarchy_analysis: 'The repository uses a flat config structure where `CLAUDE.md`
  and `AGENTS.md` contain identical repository guidelines. The primary challenge is
  interpreting architectural boundaries correctly: the rules explicitly define what
  extensions can import from core, but rely on implicit architectural boundaries (defined
  in the ''Architecture Boundaries'' section) to prevent core from deep-importing
  extension internals.'
