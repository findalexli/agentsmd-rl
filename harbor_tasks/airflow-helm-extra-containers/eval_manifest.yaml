  - json-schema
distractors:
- rule: 'Run a single test: uv run --project <PROJECT> pytest path/to/test.py::TestClass::test_method
    -xvs'
  collision_type: scope_ambiguity
  why_distracting: The task involves modifying Helm charts. The agent might try to
    run tests using `uv run pytest` which is for Python projects, but Helm tests require
    the specific `breeze testing helm-tests` command.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 18-19
- rule: 'Lint with ruff only: prek run ruff --from-ref <target_branch>'
  collision_type: scope_ambiguity
  why_distracting: The task modifies YAML, JSON, and RST files. Ruff is a Python linter.
    Running it would be useless and waste time since no Python files are changed.
  severity: low
  source:
    path: CLAUDE.md
    lines: 34-35
hierarchy_analysis: The config files CLAUDE.md and AGENTS.md are identical and provide
  general repository commands. There are no conflicts between them.
