distractors:
- rule: Integration tests (files ending in .integrationTest.ts...) are not run by
    scripts/test.sh
  collision_type: scope_ambiguity
  why_distracting: The agent might try to explicitly filter out `.integrationTest.ts`
    files when parsing bare file arguments in `index.js`. However, the instruction
    simply says to treat bare `.ts` and `.js` files as `--run` values, and adding
    explicit exclusion logic would overcomplicate the argument parsing and potentially
    conflict with downstream test resolution.
  severity: high
  source:
    path: .github/skills/unit-tests/SKILL.md
    lines: 83-85
- rule: Run `npm run compile-check-ts-native` after making changes to type-check the
    main VS Code sources
  collision_type: scope_ambiguity
  why_distracting: The agent is editing `test/unit/electron/index.js`, which is a
    plain JavaScript file. Attempting to run TypeScript compilation checks for this
    change is unnecessary and could lead to confusion if the agent expects TS validation.
  severity: medium
  source:
    path: .github/copilot-instructions.md
    lines: 48-55
