config_edits:
- path: .github/skills/unit-tests/SKILL.md
  tier: 1
  gold_added: '#### Bare file paths - Run tests from specific files


    Pass source file paths directly as positional arguments. The test runner automatically
    treats bare `.ts`/`.js` positional arguments as `--run` values.


    ```bash

    ./scripts/test.sh src/vs/editor/test/common/model.test.ts

    ```


    ```bat

    .\scripts\test.bat src\vs\editor\test\common\model.test.ts

    ```


    Multiple files:


    ```bash

    ./scripts/test.sh src/vs/editor/test/common/model.test.ts src/vs/editor/test/common/range.test.ts

    ```


    #### `--run <file>` - Run tests from a specific file (explicit form)

    Integration tests (files ending in `.integrationTest.ts` or located in `extensions/`)
    are **not run** by `scripts/test.sh`. Use `scripts/test-integration.sh` (or `scripts/test-integration.bat`)
    instead. See the `integration-tests` skill for details.'
  gold_removed: '#### `--run <file>` - Run tests from a specific file

    Integration tests (files ending in `.integrationTest.ts` or located in `extensions/`)
    are **not run** by `scripts/test.sh`. Use `scripts/test-integration.sh` (or `scripts/test-integration.bat`)
    instead. See the `integration-tests` skill for details on filtering and running
    specific integration test files.'
distractors:
- rule: If the tool is not available... run `npm run compile-check-ts-native` after
    making changes to type-check the main VS Code sources
  collision_type: scope_ambiguity
  why_distracting: The rule instructs to run `npm run compile-check-ts-native` for
    changes under `src/`. An agent might mistakenly apply this to validate changes
    in `test/unit/electron/index.js`, but this file is outside `src/` and is plain
    JavaScript, so the TypeScript compiler check would not validate it and would waste
    time.
  severity: medium
  source:
    path: .github/copilot-instructions.md
    lines: 45-46
- rule: 'MANDATORY: Always check for compilation errors before running any tests or
    validation scripts, or declaring work complete'
  collision_type: scope_ambiguity
  why_distracting: The rule mandates checking for compilation errors before declaring
    work complete. Since the modified file `test/unit/electron/index.js` is a JavaScript
    file, it does not undergo TypeScript compilation. An agent might waste time trying
    to compile it or running full project compilation unnecessarily.
  severity: medium
  source:
    path: .github/copilot-instructions.md
    lines: 38-38
hierarchy_analysis: The config hierarchy is simple, with `AGENTS.md` providing no
  specific rules and `.github/copilot-instructions.md` providing general architectural
  and validation guidelines. The validation guidelines are heavily focused on TypeScript
  compilation, which creates ambiguity for this specific PR since it modifies a plain
  JavaScript file in the test infrastructure.
