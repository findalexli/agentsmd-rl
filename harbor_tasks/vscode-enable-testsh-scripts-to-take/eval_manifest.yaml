- rule: SKILL.md documents the bare file path positional argument feature with clear
    examples and follows the style of existing documentation sections
  source:
    path: .github/skills/unit-tests/SKILL.md
    lines: 1-25
    commit: 73b0fb29377f401a4e2b792b9065e77b9fa19e9e
  reference: '#### Bare file paths - Run tests from specific files


    Pass source file paths directly as positional arguments. The test runner automatically
    treats bare .ts/.js positional arguments as --run values.


    bash

    ./scripts/test.sh src/vs/editor/test/common/model.test.ts



    bat

    .\scripts\test.bat src\vs\editor\test\common\model.test.ts



    Multiple files:


    bash

    ./scripts/test.sh src/vs/editor/test/common/model.test.ts src/vs/editor/test/common/range.test.ts

    --run <file>bash

    ./scripts/test.sh src/vs/editor/test/common/model.test.ts

    bat

    .\scripts\test.bat src\vs\editor\test\common\model.test.ts

    bash

    ./scripts/test.sh src/vs/editor/test/common/model.test.ts src/vs/editor/test/common/range.test.ts

    --run <file>bash

    ./scripts/test.sh src/vs/editor/test/common/model.test.ts

    bat

    .\scripts\test.bat src\vs\editor\test\common\model.test.ts

    bash

    ./scripts/test.sh src/vs/editor/test/common/model.test.ts src/vs/editor/test/common/range.'
