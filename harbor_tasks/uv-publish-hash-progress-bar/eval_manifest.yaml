version: "2.0"

source:
  repo: "astral-sh/uv"
  pr: 18752
  base_commit: "7c2f6c696bdeb6b04166982b33b8fdca87578391"
  merge_commit: "9ed9283e9ca6224495b16622fa67cf5ced424950"

checks:
  - id: cargo_check
    type: pass_to_pass
    origin: static
    description: "uv-publish and uv crates must compile"

  - id: reporter_trait_has_hash_methods
    type: fail_to_pass
    origin: pr_diff
    description: "Reporter trait includes hash lifecycle methods (start/progress/complete)"

  - id: hash_file_accepts_reporter
    type: fail_to_pass
    origin: pr_diff
    description: "hash_file function signature accepts a reporter parameter"

  - id: hash_file_accepts_filename
    type: fail_to_pass
    origin: pr_diff
    description: "hash_file accepts a filename parameter for reporter display"

  - id: publish_shows_hashing_before_upload
    type: fail_to_pass
    origin: pr_diff
    description: "publish.rs displays 'Hashing' before 'Uploading' in the code flow"

  - id: direction_enum_has_hash_variant
    type: fail_to_pass
    origin: pr_diff
    description: "Direction enum in reporters.rs includes a Hash variant"

  - id: direction_hash_display_text
    type: fail_to_pass
    origin: pr_diff
    description: "Direction::Hash maps to a display string containing 'Hash'"

  - id: publish_reporter_implements_hash_methods
    type: fail_to_pass
    origin: pr_diff
    description: "PublishReporter implements hash reporter methods with real delegation"

  - id: form_metadata_read_accepts_reporter
    type: fail_to_pass
    origin: pr_diff
    description: "FormMetadata::read_from_file accepts a reporter parameter"

  - id: check_url_accepts_reporter
    type: fail_to_pass
    origin: pr_diff
    description: "check_url function accepts a reporter parameter"

  - id: cargo_test_uv_publish
    type: pass_to_pass
    origin: repo_tests
    description: "Existing uv-publish unit tests still pass"

  - id: upload_methods_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "Existing upload reporter methods are not removed"

  - id: direction_retains_existing_variants
    type: pass_to_pass
    origin: pr_diff
    description: "Direction enum still has Upload, Download, and Extract variants"

  - id: no_unsafe_patterns_in_hash_code
    type: pass_to_pass
    origin: agent_config
    description: "No .unwrap(), panic!, or unreachable! in hash-related functions per CLAUDE.md:7"
    source:
      path: "CLAUDE.md"
      lines: "7"
      commit: "7c2f6c696bdeb6b04166982b33b8fdca87578391"

rubric:
  - rule: "PREFER patterns like `if let` to handle fallibility"
    source:
      path: "CLAUDE.md"
      lines: "8"
      commit: "7c2f6c696bdeb6b04166982b33b8fdca87578391"

  - rule: "PREFER let chains (`if let` combined with `&&`) over nested `if let` statements"
    source:
      path: "CLAUDE.md"
      lines: "11"
      commit: "7c2f6c696bdeb6b04166982b33b8fdca87578391"

  - rule: "PREFER top-level imports over local imports or fully qualified names"
    source:
      path: "CLAUDE.md"
      lines: "16"
      commit: "7c2f6c696bdeb6b04166982b33b8fdca87578391"

  - rule: "AVOID shortening variable names, e.g., use `version` instead of `ver`"
    source:
      path: "CLAUDE.md"
      lines: "17"
      commit: "7c2f6c696bdeb6b04166982b33b8fdca87578391"

  - rule: "PREFER [`TypeName`] references when writing Rust doc comments"
    source:
      path: "CLAUDE.md"
      lines: "19"
      commit: "7c2f6c696bdeb6b04166982b33b8fdca87578391"
