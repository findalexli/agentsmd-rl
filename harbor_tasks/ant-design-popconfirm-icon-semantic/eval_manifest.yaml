distractors:
- rule: Demo 导入规范要求使用绝对路径，但明确排除了 semantic.test.tsx
  collision_type: scope_ambiguity
  why_distracting: The agent might apply Demo import rules (which mandate absolute
    paths) to `semantic.test.tsx` because it is closely related to the semantic demo
    feature. However, the rule explicitly excludes `semantic.test.tsx`, meaning it
    must follow the Test import rules (relative paths) instead.
  severity: high
  source:
    path: AGENTS.md
    lines: 28-33
- rule: Changelog 规范与 PR 规范
  collision_type: meta_confusion
  why_distracting: The config provides extensive rules for Changelog and PR creation.
    Given the presence of `antd-create-pr` and `changelog-collect` skills in the repository,
    the agent might waste time trying to generate a PR or modify CHANGELOG.md, which
    is out of scope for this specific code-level implementation task.
  severity: medium
  source:
    path: AGENTS.md
    lines: 85-100
- rule: Help maintainers reply to Ant Design GitHub issues following official guidelines.
  source:
    path: .claude/skills/issue-reply/SKILL.md
    lines: 1-5
  collision_type: meta_confusion
  why_distracting: The task description is formatted like an issue ('Problem Description...'),
    which might trigger the issue-reply skill. The agent needs to implement code,
    not generate a reply to a GitHub issue.
  severity: low
hierarchy_analysis: The configuration is flat, with identical rules duplicated in
  AGENTS.md and CLAUDE.md. The primary challenge is scope discrimination within the
  same file, specifically noticing the explicit exception for `semantic.test.tsx`
  in the Demo import rules and correctly applying the contrasting Test import rules.
