rubric:
- rule: Code changes follow the repository's style guidelines (tested via pass_to_pass
    tests)
- rule: 'Minimal focused change: only the variant_cycle handler and related import
    were modified'
- rule: Rely on type inference when possible; avoid explicit type annotations or interfaces
    unless necessary
  source:
    path: AGENTS.md
    lines: 15-15
  evidence: The `onSelect` callback and the `dialog.replace` argument `() => <DialogVariant
    />` are written without explicit type annotations, relying entirely on TypeScript's
    inference.
  category: style
- rule: Keep things in one function unless composable or reusable
  source:
    path: AGENTS.md
    lines: 10-10
  evidence: Reuses the existing `DialogVariant` component by importing it, rather
    than implementing the dialog UI inline within the `onSelect` handler.
  category: architecture
distractors:
- rule: Use single word names by default for new locals, params, and helper functions.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to alias the imported `DialogVariant` to a
    single word like `Variant` to satisfy the strict single-word naming rule. Doing
    so would break consistency with other dialog components (like `DialogModel`) and
    violate standard React component naming conventions.
  severity: medium
  source:
    path: AGENTS.md
    lines: 26-26
- rule: Use `Effect.gen(function* () { ... })` for composition and `Effect.fn` for
    named effects.
  collision_type: architecture_boundary
  why_distracting: The agent might try to implement the `onSelect` handler using `Effect.gen`
    or `Effect.fn` because the file is within the `opencode` package. However, this
    is a React/Ink TUI component that expects standard synchronous JavaScript callbacks,
    not Effect workflows.
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: 16-17
hierarchy_analysis: The root `AGENTS.md` provides general TypeScript/JavaScript style
  rules, while `packages/opencode/AGENTS.md` introduces highly specific rules for
  the Effect ecosystem and Drizzle database. Since this PR modifies a React/Ink TUI
  component (`app.tsx`), the Effect-specific rules in the package-level config are
  out of scope and act as distractors. The agent must recognize the architectural
  boundary between the Effect-based backend services and the React-based frontend
  TUI.
