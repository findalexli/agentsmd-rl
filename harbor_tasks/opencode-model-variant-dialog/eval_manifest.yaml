version: "2.0"

source:
  repo: "anomalyco/opencode"
  pr: 19534
  base_commit: "8ac2fbbd1262a9de1362beb6e29debc446ceea0e"
  merge_commit: "2b86b36c8cd7d13a64d1e85296554cf5414d532b"

checks:
  - id: handler_opens_dialog_variant
    type: fail_to_pass
    origin: pr_diff
    description: "variant_cycle handler opens DialogVariant via dialog API instead of cycling"

  - id: dialog_variant_imported
    type: fail_to_pass
    origin: pr_diff
    description: "DialogVariant component is imported in app.tsx"

  - id: no_blind_cycle_in_handler
    type: fail_to_pass
    origin: pr_diff
    description: ".variant.cycle() removed from variant_cycle handler"

  - id: title_not_variant_cycle
    type: fail_to_pass
    origin: pr_diff
    description: "Title updated from 'Variant cycle' to a selection-oriented label"

  - id: variant_keybind_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "variant_cycle keybind still registered in commands"

  - id: other_dialogs_preserved
    type: pass_to_pass
    origin: static
    description: "DialogModel and App function still present (anti-stub)"

  - id: app_not_gutted
    type: pass_to_pass
    origin: static
    description: "app.tsx has >150 meaningful lines"

  - id: dialog_variant_component_exists
    type: pass_to_pass
    origin: pr_diff
    description: "dialog-variant.tsx exists and exports DialogVariant"

  - id: no_any_type
    type: pass_to_pass
    origin: agent_config
    description: "No 'any' type usage in app.tsx"
    source:
      path: "AGENTS.md"
      lines: "13"
      commit: "8ac2fbbd1262a9de1362beb6e29debc446ceea0e"

  - id: no_else_in_variant_area
    type: pass_to_pass
    origin: agent_config
    description: "No else statements near variant handler"
    source:
      path: "AGENTS.md"
      lines: "84"
      commit: "8ac2fbbd1262a9de1362beb6e29debc446ceea0e"

  - id: no_try_catch_in_variant_area
    type: pass_to_pass
    origin: agent_config
    description: "No try/catch near variant handler"
    source:
      path: "AGENTS.md"
      lines: "12"
      commit: "8ac2fbbd1262a9de1362beb6e29debc446ceea0e"

  - id: prefer_const_in_variant_area
    type: pass_to_pass
    origin: agent_config
    description: "No let in variant handler area — prefer const"
    source:
      path: "AGENTS.md"
      lines: "70"
      commit: "8ac2fbbd1262a9de1362beb6e29debc446ceea0e"

  - id: repo_tsx_syntax_valid
    type: pass_to_pass
    origin: static
    description: "Repo's TSX files have valid syntax (brace matching check)"

  - id: repo_dialog_variant_exports_component
    type: pass_to_pass
    origin: static
    description: "DialogVariant component is properly exported"

  - id: repo_app_tsx_structure
    type: pass_to_pass
    origin: static
    description: "app.tsx has valid structure with imports and exports"

rubric:
  - rule: "Code changes follow the repository's style guidelines (tested via pass_to_pass tests)"

  - rule: "Minimal focused change: only the variant_cycle handler and related import were modified"
