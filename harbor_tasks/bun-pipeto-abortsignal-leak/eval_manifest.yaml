- rule: Place Web API tests in `test/js/web/` when no specific issue number is provided.
  source:
    path: CLAUDE.md
    lines: 29-33
  evidence: The test for the ReadableStream.pipeTo memory leak is placed in `test/js/web/streams/pipeTo-signal-leak.test.ts`,
    correctly identifying it as a Web API test since no issue number was provided.
  category: testing
- rule: Use `bun:test` with files that end in `*.test.{ts,js,jsx,tsx,mjs,cjs}`.
  source:
    path: test/CLAUDE.md
    lines: 13-13
  evidence: The test file is named `pipeTo-signal-leak.test.ts`, adhering to the required
    `*.test.ts` extension for `bun:test` files.
  category: naming
distractors:
- rule: Always use `bun.*` APIs instead of `std.*`.
  collision_type: scope_ambiguity
  why_distracting: The rule explicitly forbids using `std.*` in favor of `bun.*` APIs.
    While this applies to Zig code, the agent is modifying C++ files (`AbortSignal.cpp`)
    where the C++ Standard Library (`std::exchange`, `std::make_pair`, `std::pair`)
    is required. An agent might incorrectly try to remove `std::` usages in C++.
  severity: high
  source:
    path: src/CLAUDE.md
    lines: 16-18
- rule: When spawning Bun processes, use `bunExe` and `bunEnv` from `harness`.
  collision_type: would_cause_bug
  why_distracting: The rule suggests using `Bun.spawn` with `bunExe` and `bunEnv`
    for tests. However, testing a memory leak using `bun:jsc` `heapStats()` requires
    running the code in the current process to measure the heap before and after GC.
    Spawning a subprocess would make it difficult or impossible to accurately measure
    the retained `AbortSignal` objects in the test runner's process.
  severity: medium
  source:
    path: test/CLAUDE.md
    lines: 24-26
hierarchy_analysis: The hierarchy consists of root-level `CLAUDE.md` providing general
  build and test organization guidelines, while `test/CLAUDE.md` provides specific
  testing conventions and `src/CLAUDE.md` provides Zig-specific coding standards.
  A significant conflict arises because `src/CLAUDE.md` strictly forbids `std.*` usage,
  which is intended for Zig but could be disastrously misapplied to the C++ files
  in `src/bun.js/bindings/webcore/`. The agent must recognize that `src/CLAUDE.md`'s
  Zig rules do not cross the language boundary into C++.
