rubric:
- rule: Web API tests (fetch, WebSocket, streams, etc.) should be placed in `test/js/web/`.
  evidence: The test is placed in `test/js/web/streams/pipeTo-signal-leak.test.ts`,
    following the instruction to put Web API tests in `test/js/web/`.
  reference: test/js/web/streams/pipeTo-signal-leak.test.ts
  category: testing
distractors:
- rule: Prefer concurrent tests over sequential tests
  collision_type: would_cause_bug
  why_distracting: The rule suggests making tests concurrent, but a memory leak test
    using `bun:jsc` `heapStats()` relies on global heap state. Running it concurrently
    with other tests would pollute the heap measurements and cause flaky tests.
  severity: high
  source:
    path: test/AGENTS.md
    lines: 16-18
- rule: For single-file tests, prefer `-e` over `tempDir` and spawn a process.
  collision_type: scope_ambiguity
  why_distracting: The rule provides a template for single-file tests that spawns
    a Bun process using `-e`. However, the bug description specifies verifying the
    leak via `bun:jsc` `heapStats()`, which should be done in-process. Spawning a
    process is unnecessary and complicates the memory assertion.
  severity: medium
  source:
    path: test/AGENTS.md
    lines: 43-60
hierarchy_analysis: The config hierarchy has root-level `AGENTS.md` defining general
  test placement, while `test/AGENTS.md` provides specific testing style rules. The
  agent must synthesize the test placement rule from the root with the testing style
  rules from the `test/` directory, while carefully ignoring the Zig-specific rules
  in `src/AGENTS.md` since the fix requires C++ changes.
