agent_config:
- rule: Use qt matchers in tests instead of raw if/t.Fatal checks
  file_pattern: '*_test.go'
  check_type: grep
  content: qt\.
  source: 'AGENTS.md: In tests, use qt matchers'
- rule: Avoid exporting symbols not needed outside package
  file_pattern: '*.go'
  check_type: grep
  content: ^func [A-Z]
  negative_check: true
  source: 'AGENTS.md: Never export symbols not needed'
- rule: Avoid global state
  file_pattern: '*.go'
  check_type: grep
  content: ^var\s+\w+.*=
  negative_check: true
  source: 'AGENTS.md: Avoid global state at (almost) all cost'
rubric:
- criterion: Solution follows Hugo code style
  description: Code is brief, uses clear variable names, follows Go conventions
  weight: optional
- criterion: Test cases follow Hugo test conventions
  description: Tests use qt matchers and latest Hugo spec conventions
  weight: optional
- rule: Don't use comments to explain the obvious. Use self-explanatory variable and
    function names.
  source:
    path: AGENTS.md
    lines: 3-4
  evidence: 'The gold solution adds the `KeepNamespaces: []string{"", "x-bind"}` configuration
    without adding any inline comments explaining that it is for Alpine.js, trusting
    the field name and context to be self'
  category: style
distractors:
- rule: Avoid global state at (almost) all cost.
  collision_type: architecture_boundary
  why_distracting: The agent needs to modify `defaultTdewolffConfig`, which is a package-level
    global variable. An agent strictly following 'Avoid global state at (almost) all
    cost' might attempt to refactor the minifier configuration to be injected or instantiated
    per-use, which would be a massive out-of-scope architectural change for a simple
    bug fix.
  severity: high
  source:
    path: AGENTS.md
    lines: 6-6
- rule: assume that a similiar problem has been solved before, look hard for helper
    functions before creating new ones.
  collision_type: scope_ambiguity
  why_distracting: The fix requires updating an external dependency in `go.mod` and
    setting a declarative configuration field on an external struct. There is no procedural
    logic involved. An agent might waste time searching the codebase for existing
    SVG manipulation or namespace preservation helper functions instead of just updating
    the struct.
  severity: low
  source:
    path: AGENTS.md
    lines: 7-7
hierarchy_analysis: The configuration is flat, with `CLAUDE.md` simply including `AGENTS.md`.
  The rules in `AGENTS.md` are general Go best practices and Hugo-specific testing
  guidelines. The primary tension is between the rule to avoid global state and the
  existing architecture of the `minifiers` package, which relies on a global default
  configuration struct.
