distractors:
- rule: In tests, use `qt` matchers (e.g. `b.Assert(err, qt.ErrorMatches, ...)`) instead
    of raw `if`/`t.Fatal` checks.
  collision_type: scope_ambiguity
  why_distracting: The instruction suggests creating tests to verify the fix, which
    might lead the agent to write tests using `qt` matchers. However, the gold solution
    does not require committing any tests, making this rule a distraction from the
    core task.
  severity: low
  source:
    path: AGENTS.md
    lines: 10-10
- rule: This is a project with a long history; assume that a similiar problem has
    been solved before, look hard for helper functions before creating new ones.
  collision_type: rule_conflict
  why_distracting: The rule suggests looking for existing helper functions since similar
    problems might have been solved before. An agent might waste time searching for
    internal Hugo workarounds for SVG minification instead of following the explicit
    instruction to update the external `tdewolff/minify` dependency.
  severity: low
  source:
    path: AGENTS.md
    lines: 8-9
