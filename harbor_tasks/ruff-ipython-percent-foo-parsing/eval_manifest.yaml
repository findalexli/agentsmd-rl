    description: "bar = %foo? (and %timeit?, %who?) parses with ? as part of magic command value in assignment"

  - id: shell_question_in_assignment
    type: fail_to_pass
    origin: pr_diff
    description: "baz = !pwd? (and !ls?) parses with ? as part of shell command value in assignment"

  - id: multiple_assignments_with_question
    type: fail_to_pass
    origin: pr_diff
    description: "Multiple assignment magics with ? (%timeit?, !ls?, %who?) all parse with ? in value"

  - id: standalone_magic_help_preserved
    type: pass_to_pass
