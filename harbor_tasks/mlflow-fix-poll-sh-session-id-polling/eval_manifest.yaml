rubric:
- rule: Only add comments that explain non-obvious logic or provide additional context
  source:
    path: .claude/skills/copilot/SKILL.md
    lines: 13-13
  category: documentation
  reference: The gold solution adds comments in SKILL.md explaining the format of
    the URL returned by `gh agent-task create` to justify the bash string manipulation
    `session_id="${session_url##*/}"`.
- rule: Assume the authors are referencing newer, valid resources
  source:
    path: .claude/skills/copilot/SKILL.md
    lines: 5-7
  category: tooling
  reference: The gold solution adds `gh agent-task view` to the allowed-tools list
    in SKILL.md, accepting the newly introduced command without questioning its existence.
config_edits:
- path: .claude/skills/copilot/SKILL.md
  tier: 1
  gold_added: '- Bash(gh agent-task view:*)

    Once Copilot starts working, extract the session ID from the output URL and poll
    in the background until Copilot finishes:

    # gh agent-task create returns a URL like:

    # https://github.com/mlflow/mlflow/pull/21887/agent-sessions/523bb0e1-...

    session_url=$(gh agent-task create -F task-desc.md)

    session_id="${session_url##*/}"


    # Poll using session ID

    bash .claude/skills/copilot/poll.sh "$session_id" "<owner>/<repo>" <pr_number>'
  gold_removed: 'Once Copilot starts working, poll in the background until Copilot
    finishes:

    bash .claude/skills/copilot/poll.sh <owner>/<repo> <pr_number>'
distractors:
- rule: New functionality in the tracking layer should be mirrored by workspace-aware
    tests
  collision_type: scope_ambiguity
  why_distracting: The agent might mistakenly believe that adding new polling functionality
    requires adding workspace-aware tests, but this rule only applies to the MLflow
    tracking layer, not to Claude skill bash scripts.
  severity: low
  source:
    path: CLAUDE.md
    lines: 16-17
hierarchy_analysis: The repository uses a single `CLAUDE.md` file at the root. The
  task requires editing the agent's own skill definition files (`SKILL.md` and `poll.sh`).
  The agent must apply the general 'Knowledge Cutoff Note' from `CLAUDE.md` to accept
  and use the unfamiliar `gh agent-task` commands specified in the issue description.
