rubric:
- rule: Use Allman-style braces (opening brace on a new line) for C++ code.
  source:
    path: src/Functions/UserDefined/UserDefinedSQLObjectsZooKeeperStorage.cpp
  reference: 'The code uses Allman brace style: opening braces on new lines for control structures like retryLoop([&]\n    {)'
  category: style
- rule: When mentioning logical errors, say 'exception' instead of 'crash', because
    they don't crash the server in the release build.
  source:
    path: src/Functions/UserDefined/UserDefinedSQLObjectsZooKeeperStorage.cpp
  reference: 'The comment states "the exception propagates to the caller" rather than "crash"'
  category: style
- rule: 'When writing comments, wrap literal names from ClickHouse SQL language, classes
    and functions inside inline code blocks, such as: `MergeTree`.'
  source:
    path: src/Functions/UserDefined/UserDefinedSQLObjectsZooKeeperStorage.cpp
  reference: 'Comments refer to ZooKeeper concepts appropriately, following ClickHouse conventions'
  category: style
- rule: When writing comments, write names of functions and methods as `f` instead
    of `f()` for mathematical purity when referring to a function itself rather than
    its application.
  source:
    path: src/Functions/UserDefined/UserDefinedSQLObjectsZooKeeperStorage.cpp
  reference: 'Comments refer to tryLoadObject and setAllObjects without parentheses'
  category: style
distractors:
- rule: When writing text such as documentation, comments, or commit messages, wrap
    literal names from ClickHouse SQL language, classes and functions... inside inline
    code blocks
  collision_type: scope_ambiguity
  why_distracting: The rule instructs wrapping literal names of classes and functions
    in inline code blocks (backticks) for 'comments'. An agent might apply this to
    the C++ comments (e.g., writing `` `zookeeper_getter` `` or `` `setAllObjects`
    ``), which would be inconsistent with the surrounding C++ comment style that does
    not use markdown formatting.
  severity: medium
  source:
    path: AGENTS.md
    lines: 5-5
hierarchy_analysis: Only a single root-level AGENTS.md file is present, so there are
  no hierarchical conflicts. The main challenge is interpreting the scope of markdown
  formatting rules (like backticks) when writing C++ source code comments versus PR
  descriptions or markdown documentation.
