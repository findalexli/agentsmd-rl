distractors:
- rule: When writing text such as documentation, comments, or commit messages, wrap
    literal names from ClickHouse SQL language, classes and functions... inside inline
    code blocks
  collision_type: scope_ambiguity
  why_distracting: The rule instructs wrapping literal names of classes and functions
    in inline code blocks (backticks) for 'comments'. An agent might apply this to
    the C++ comments (e.g., writing `` `zookeeper_getter` `` or `` `setAllObjects`
    ``), which would be inconsistent with the surrounding C++ comment style that does
    not use markdown formatting.
  severity: medium
  source:
    path: AGENTS.md
    lines: 5-5
hierarchy_analysis: Only a single root-level AGENTS.md file is present, so there are
  no hierarchical conflicts. The main challenge is interpreting the scope of markdown
  formatting rules (like backticks) when writing C++ source code comments versus PR
  descriptions or markdown documentation.
