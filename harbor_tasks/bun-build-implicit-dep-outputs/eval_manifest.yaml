rubric:
- rule: When dep sub-builds rewrite forwarding headers as undeclared side effects,
    dep outputs (lib*.a) must use implicit dependencies (|), not order-only (||),
    because depfiles record headers but ninja stats them before the sub-build runs
    — order-only would lag one build behind
  source:
    path: scripts/build/CLAUDE.md
    lines: 227-229
    commit: c721d357ad9ed04017bb24d21decf5739dba3911
- rule: 'Documentation for dependency types must explain the invalidation signal rationale:
    dep outputs are implicit deps because the lib itself signals rebuild, while codegen
    headers stay order-only because they are declared ninja outputs with restat'
  source:
    path: scripts/build/CLAUDE.md
    lines: 76-82
    commit: c721d357ad9ed04017bb24d21decf5739dba3911
- rule: The depOutputs variable comment must describe its role as the implicit-dep
    signal for PCH/cc/no-PCH cxx, not just PCH order-only-deps
  source:
    path: scripts/build/bun.ts
    lines: 61-62
    commit: c721d357ad9ed04017bb24d21decf5739dba3911
- rule: CompileOpts documentation must explicitly mention dep outputs (lib*.a) in
    implicitInputs with the WebKit side-effect rationale, and reference this from
    orderOnlyInputs docs
  source:
    path: scripts/build/compile.ts
    lines: 140-164
    commit: c721d357ad9ed04017bb24d21decf5739dba3911
- rule: Idempotent. Run  over and over — that's it. Same inputs produce the same ,
    ninja sees nothing changed, exits immediately.
  source:
    path: scripts/build/CLAUDE.md
    lines: 5-6
  evidence: The gold solution updates the build system documentation to explain how
    using implicit dependencies for dep outputs ensures the build doesn't lag one
    build behind, fixing the spurious relink and resto
  category: architecture
- rule: Idempotent. Run  over and over... ninja sees nothing changed, exits immediately.
  source:
    path: scripts/build/CLAUDE.md
    lines: 4-10
  evidence: The gold solution fixes the spurious relink issue, ensuring that running
    the build twice does nothing, which aligns with the stated goal of idempotency.
  category: architecture
- rule: Keep build system documentation synchronized with the actual ninja dependency
    graph implementation.
  source:
    path: scripts/build/CLAUDE.md
    lines: 74-82
  evidence: The gold solution updates the documentation in CLAUDE.md to explain that
    PCH, cc, and no-PCH cxx use implicit deps for dep outputs, rather than order-only.
  category: documentation
distractors:
- rule: '**cxx needs order-only dep on **, not implicit. Depfile tracks actual header
    deps. Implicit would recompile every  when changes'
  collision_type: meta_confusion
  why_distracting: The agent might read this rule and refuse to implement the requested
    change (using implicit dependencies for cxx), thinking it violates the established
    build system design. The agent must realize the instruction supersedes this rule
    and that it needs to update the rule itself.
  severity: high
  source:
    path: scripts/build/CLAUDE.md
    lines: 227-229
- rule: If a test is for a specific numbered GitHub Issue, it should be placed in
    .
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to write a JavaScript test for this build
    system change in the test/ directory, but build system dependency graph changes
    cannot be tested via the standard JS test runner.
  severity: low
  source:
    path: AGENTS.md
    lines: 45-46
hierarchy_analysis: The agent must navigate a highly meta-referential situation where
  the PR instructions require modifying the very config file () that dictates the
  rules for the build system. The agent must recognize that the PR instruction overrides
  the existing rule in the config file, and update the config file to reflect the
  new architectural decision.
