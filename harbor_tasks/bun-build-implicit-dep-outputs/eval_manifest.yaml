rubric:
- rule: When dep sub-builds rewrite forwarding headers as undeclared side effects,
    dep outputs (lib*.a) must use implicit dependencies (|), not order-only (||),
    because depfiles record headers but ninja stats them before the sub-build runs
    — order-only would lag one build behind
  source:
    path: scripts/build/CLAUDE.md
    lines: 227-229
    commit: c721d357ad9ed04017bb24d21decf5739dba3911
- rule: 'Documentation for dependency types must explain the invalidation signal rationale:
    dep outputs are implicit deps because the lib itself signals rebuild, while codegen
    headers stay order-only because they are declared ninja outputs with restat'
  source:
    path: scripts/build/CLAUDE.md
    lines: 76-82
    commit: c721d357ad9ed04017bb24d21decf5739dba3911
- rule: The depOutputs variable comment must describe its role as the implicit-dep
    signal for PCH/cc/no-PCH cxx, not just PCH order-only-deps
  source:
    path: scripts/build/bun.ts
    lines: 61-62
    commit: c721d357ad9ed04017bb24d21decf5739dba3911
- rule: CompileOpts documentation must explicitly mention dep outputs (lib*.a) in
    implicitInputs with the WebKit side-effect rationale, and reference this from
    orderOnlyInputs docs
  source:
    path: scripts/build/compile.ts
    lines: 140-164
    commit: c721d357ad9ed04017bb24d21decf5739dba3911
