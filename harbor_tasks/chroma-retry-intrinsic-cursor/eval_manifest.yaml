    type: "fail_to_pass"
    points: 15

  - id: "cargo_check"
    name: "code compiles"
    description: "Verify the modified code compiles successfully"
    test: "test_cargo_check_passes"
    type: "pass_to_pass"
    points: 15

  - id: "cargo_lock"
    name: "Cargo.lock updated"
    description: "Verify Cargo.lock includes backon dependency"
    test: "test_cargo_lock_updated"
    type: "pass_to_pass"
    points: 10

  - id: "async_pattern"
    name: "async retry pattern"
    description: "Verify async/await is used correctly in retry closure"
    test: "test_no_blocking_sync_in_retry"
    type: "fail_to_pass"
    points: 10

scoring:
  total_points: 100
  min_for_success: 70

