    name: "backon dependency added"
    description: "Verify backon workspace dependency is added to Cargo.toml"
    test: "test_backon_dependency_added"
    type: "fail_to_pass"
    points: 10

  - id: "backon_import"
    name: "backon import present"
    description: "Verify backon types are imported in lib.rs"
    test: "test_backon_import_present"
    type: "fail_to_pass"
    points: 10

  - id: "retry_structure"
    name: "retry closure structure"
    description: "Verify retry closure pattern is used correctly"
    test: "test_retry_logic_structure"
    type: "fail_to_pass"
    points: 15

  - id: "retry_params"
    name: "exponential backoff params"
    description: "Verify retry parameters match spec (20ms, 200ms, 3 attempts)"
    test: "test_exponential_builder_params"
    type: "fail_to_pass"
    points: 15

  - id: "error_filter"
    name: "precondition error filter"
    description: "Verify retry only triggers on StorageError::Precondition"
