version: "1.0"

task:
  name: chroma-retry-intrinsic-cursor
  source:
    repo: chroma-core/chroma
    pr_number: 6703
    base_commit: 5e3503530862e1de135711cb68a70243bfed9acb
    merge_commit: b0dba666a48cbfc5f724dee2bdf56d0f6a0d4c28
  description: |
    Add exponential backoff retry to update_intrinsic_cursor for transient
    precondition errors. Uses backon crate with 20ms min, 200ms max, 3 retries.

checks:
