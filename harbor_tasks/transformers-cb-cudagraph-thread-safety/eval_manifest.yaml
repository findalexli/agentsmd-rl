rubric:
- rule: PRs should be as brief as possible. Bugfix PRs in particular can often be
    only one or two lines long, and do not need large comments, docstrings or new
    functions in this case. Aim to minimize the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: e5ad3946209fb96db5e9965b3eb67d69cc3749e0
- rule: Code style is enforced in the CI. Run make fixup to apply style and consistency
    fixes to your code.
  source:
    path: .github/copilot-instructions.md
    lines: '17'
    commit: e5ad3946209fb96db5e9965b3eb67d69cc3749e0
- rule: make style or make fix-repo should be run as the final step before opening
    a PR.
  source:
    path: CLAUDE.md
    lines: '8'
    commit: e5ad3946209fb96db5e9965b3eb67d69cc3749e0
- rule: Do not open one-off PRs for tiny edits (single typo, isolated lint cleanup,
    one mutable default argument, etc.).
  source:
    path: CLAUDE.md
    lines: 42-44
  evidence: The gold solution addresses a complex multi-threading CUDA graph capture
    crash, which is a high-value functional bug fix, adhering to the prohibition against
    low-value busywork or tiny edits.
  category: architecture
distractors:
- rule: If coordination evidence cannot be found, do not proceed to PR-ready output.
  collision_type: meta_confusion
  why_distracting: The agent is operating in a benchmark/evaluation setting where
    it must output the fix, but the config strictly mandates failing closed and refusing
    to output PR-ready code if coordination evidence (like an issue approval link)
    is missing. Following this rule would cause the agent to output a refusal instead
    of the required code patch.
  severity: high
  source:
    path: CLAUDE.md
    lines: 57-60
- rule: 'We try to avoid direct inheritance between model-specific files in `src/transformers/models/`.
    We have two mechanisms to manage the resulting code duplication: ... `# Copied
    from ...`'
  collision_type: architecture_boundary
  why_distracting: The rule discusses avoiding direct inheritance and using `# Copied
    from` or `modular_<name>.py` for model-specific files. An agent might mistakenly
    apply this to `continuous_api.py` because it is in the transformers repository,
    but this file is in `generation/continuous_batching/`, not `models/`, so the rule
    does not apply.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 62-67
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` contain identical rules at the
  root level. The primary challenge is that the repository's strict agent contribution
  policies (requiring coordination evidence and human validation) conflict directly
  with the autonomous benchmark environment, requiring the agent to ignore the 'fail-closed'
  directives to successfully complete the task.
