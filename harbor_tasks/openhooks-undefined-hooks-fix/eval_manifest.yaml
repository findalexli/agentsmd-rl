rubric:
- rule: 'Frontend changes must pass lint and build. Run: cd frontend && npm run lint:fix
    && npm run build'
  source:
    path: AGENTS.md
    lines: '21'
    commit: 3cd85a07b78a2d9d2e28b2904e1b42096d47a802
- rule: 'Pre-commit hooks MUST pass successfully before pushing any changes. Run:
    make install-pre-commit-hooks first.'
  source:
    path: AGENTS.md
    lines: 16,24
    commit: 3cd85a07b78a2d9d2e28b2904e1b42096d47a802
- rule: Follow existing code style and patterns. Check neighboring files for TypeScript/React
    conventions.
  source:
    path: AGENTS.md
    lines: 26-31
    commit: 3cd85a07b78a2d9d2e28b2904e1b42096d47a802
- rule: If you've made changes to the frontend, you should run `cd frontend && npm
    run lint:fix && npm run build ; cd ..`
  source:
    path: AGENTS.md
    lines: 21-22
  evidence: The instructions explicitly require that 'All frontend linting should
    pass', which aligns with the repository rule to run `npm run lint:fix` and `npm
    run build` after making changes to the frontend.
  category: tooling
distractors:
- rule: 'To run the full application to debug issues: export INSTALL_DOCKER=0 ...
    make build && make run ...'
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to build and run the entire application
    (backend and frontend) using Docker and `make run` to debug the issue, which is
    unnecessary and time-consuming since the instructions explicitly state to test
    using `npm run test` in the frontend directory.
  severity: medium
  source:
    path: AGENTS.md
    lines: 11-14
- rule: If you've made changes to the backend, you should run `pre-commit run --config
    ./dev_config/python/.pre-commit-config.yaml`
  collision_type: scope_ambiguity
  why_distracting: The agent might try to run the backend Python pre-commit hooks,
    but this PR only involves TypeScript/React frontend changes.
  severity: low
  source:
    path: AGENTS.md
    lines: 20-20
hierarchy_analysis: The repository has a single root-level `AGENTS.md` file. The primary
  conflict arises from the general debugging instructions (running the full app via
  `make build && make run`) versus the specific, localized testing instructions provided
  in the task prompt (`npm run test` in the frontend directory).
