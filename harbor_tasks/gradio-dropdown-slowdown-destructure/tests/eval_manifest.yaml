rubric:
- rule: Svelte reactive variables should use $state for mutable values and $derived
    for computed values, following Svelte 5 runes conventions.
  source:
    path: js/dropdown/shared/Dropdown.svelte
    commit: e5ba4fa992c0ac389c6af2d143c9ad4c33eea360
- rule: Frontend code is formatted with `prettier`.
  source:
    path: AGENTS.md
    lines: 36-36
  evidence: The gold solution maintains proper Prettier formatting, such as wrapping
    the `input_text` assignment over multiple lines with correct indentation when
    it exceeds the line length limit.
  category: style
- rule: '`js/` — frontend code (Svelte/TypeScript), with each component in its own
    subdirectory'
  source:
    path: AGENTS.md
    lines: 8-9
  evidence: The gold solution edits `js/dropdown/shared/Dropdown.svelte`, correctly
    identifying and modifying the frontend Svelte code in the `js/` directory as specified
    by the repository structure.
  category: architecture
- rule: Be consistent with the style of the surrounding code.
  source:
    path: AGENTS.md
    lines: 41-43
  evidence: The Svelte code changes maintain the existing indentation and style of
    the surrounding code.
  category: style
distractors:
- rule: Target an issue. Every non-trivial PR should reference an existing GitHub
    issue. If one doesn't exist, create it first.
  collision_type: meta_confusion
  why_distracting: The rule instructs the agent to create a GitHub issue and fill
    out a PR template. In an isolated evaluation environment, attempting to interact
    with GitHub or create PR templates is impossible and wastes effort.
  severity: medium
  source:
    path: AGENTS.md
    lines: 20-21
- rule: 'Format your code before pushing. Frontend: bash scripts/format_frontend.sh'
  collision_type: scope_ambiguity
  why_distracting: The rule asks to run a repository-wide formatting script (`bash
    scripts/format_frontend.sh`). Running this in an evaluation environment might
    format unrelated files if the base commit has unformatted code, polluting the
    diff and potentially causing the evaluation to fail.
  severity: low
  source:
    path: AGENTS.md
    lines: 28-30
