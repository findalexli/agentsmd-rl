rubric:
- rule: Svelte reactive variables should use $state for mutable values and $derived
    for computed values, following Svelte 5 runes conventions.
  source:
    path: js/dropdown/shared/Dropdown.svelte
    commit: e5ba4fa992c0ac389c6af2d143c9ad4c33eea360
- rule: Frontend code is formatted with `prettier`.
  source:
    path: AGENTS.md
    lines: 36-36
  evidence: The gold solution maintains proper Prettier formatting, such as wrapping
    the `input_text` assignment over multiple lines with correct indentation when
    it exceeds the line length limit.
  category: style
distractors:
- rule: Be consistent with the style of the surrounding code.
  collision_type: scope_ambiguity
  why_distracting: The surrounding code initially uses `$derived.by(() => { return
    ... })` for simple derivations like `choices_names` and `choices_values`. An agent
    strictly following consistency might use `$derived.by` for the new `selected_indices`
    variable or leave the existing ones alone. However, the gold solution refactors
    these to use the simpler `$derived()` syntax.
  severity: medium
  source:
    path: AGENTS.md
    lines: 37-37
hierarchy_analysis: The AGENTS.md file provides high-level repository guidelines.
  The rules are mostly focused on PR mechanics and general formatting. The code style
  rule about consistency creates a minor conflict because the gold solution takes
  the opportunity to refactor nearby code to a better Svelte 5 syntax (`$derived`
  instead of `$derived.by`) rather than strictly matching the existing verbose style.
