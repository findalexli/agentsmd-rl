[task]
name = "openai-agents-js-changeset-major-bump"
title = "Add major bump support to changeset validation"
description = """
The openai-agents-js changeset validation skill recognizes only patch,
minor, and none as valid bump levels. The validation shape checker in
changeset-validation-result.mjs, the JSON schema, and the validation prompt
reference all reject "major" bumps. The milestone assignment script also
lacks major-bump target selection logic and sorts milestones in descending
order, which is inconsistent with how major versions should be grouped.
"""

[difficulty]
level = "medium"
rationale = "4 files to modify across JS, JSON, and Markdown; straightforward enum expansion plus sort-order fix and milestone selection logic."

[tags]
primary = "changeset"
secondary = ["javascript", "validation", "monorepo", "ci"]

[time]
estimated_minutes = 20
max_minutes = 45
