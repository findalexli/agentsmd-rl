distractors:
- rule: Composition over inheritance -- keep hierarchies <= 2 levels; prefer delegation.
  collision_type: rule_conflict
  why_distracting: The rule says 'prefer delegation'. If the agent follows this by
    creating a wrapper class that delegates to an internal nn.Linear instance (e.g.,
    self.linear = nn.Linear(...)), the state dict keys will change from gate.weight
    to gate.linear.weight, breaking the checkpoint compatibility explicitly requested
    in the prompt.
  severity: high
  source:
    path: AGENTS.md
    lines: '62'
- rule: Add tests for new functionality.
  collision_type: scope_ambiguity
  why_distracting: The rule says 'Add tests for new functionality.' The agent might
    try to write a test for the DTensor hook fix. However, testing DTensor hooks requires
    distributed setup, and the config notes 'Integration tests require multi-node
    hardware'. Attempting to write a test would likely fail or waste time, as this
    is a bug fix, not new functionality.
  severity: medium
  source:
    path: AGENTS.md
    lines: '31'
hierarchy_analysis: Both AGENTS.md and CLAUDE.md are at the root level and contain
  overlapping rules. The agent must synthesize guidance from both while prioritizing
  the specific constraints in the prompt over general rules like 'prefer delegation'.
