distractors:
- rule: Composition over inheritance -- keep hierarchies <= 2 levels; prefer delegation.
  collision_type: would_cause_bug
  why_distracting: The rule advocates for composition over inheritance. If an agent
    applies this by creating a new `nn.Module` that contains an `nn.Linear` as an
    attribute (composition) instead of subclassing `nn.Linear` (inheritance), the
    state dict key for the weights would change (e.g., from `gate.weight` to `gate.linear.weight`),
    violating the explicit requirement to preserve checkpoint compatibility.
  severity: high
  source:
    path: AGENTS.md
    lines: 57-57
- rule: Add tests for new functionality
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to write a test for the DTensor hook firing.
    However, testing DTensor hooks requires a distributed multi-GPU setup, and the
    prompt only asks to fix the bug in the router file. Attempting to add tests would
    likely lead to hallucinated test files or complex distributed test setups that
    are out of scope for this specific fix.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 48-48
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` are Level 0 files and share many
  rules. The conflict arises between the general architectural guideline in `AGENTS.md`
  ('Composition over inheritance') and the specific PR requirement to maintain state
  dict compatibility. The PR requirement must override the general guideline to prevent
  a bug.
