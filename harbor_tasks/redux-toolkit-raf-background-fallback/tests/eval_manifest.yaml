task_id: redux-toolkit-raf-background-fallback
source_pr:
  owner: reduxjs
  repo: redux-toolkit
  pr_number: 5273
  merge_commit: eff96dda3c46df38cd7530de4d20270a6bfc08c7
  base_commit: 20a03774af8a9f1090796bb728254168702f3f60

checks:
  # Fail-to-pass tests for the bug fix
  - id: test_raf_fallback_function_exists
    type: fail_to_pass
    origin: behavior
    description: |
      The createRafWithFallbackTimer helper function must exist and properly
      race RAF against setTimeout with a 'called' flag to prevent double notifications.

  - id: test_raf_strategy_uses_fallback
    type: fail_to_pass
    origin: behavior
    description: |
      The 'raf' autoBatch strategy must use createRafWithFallbackTimer
      instead of raw window.requestAnimationFrame to ensure background tab notifications.

  - id: test_100ms_timeout_value
    type: fail_to_pass
    origin: behavior
    description: |
      The setTimeout fallback must use exactly 100ms timeout to balance
      responsiveness with performance in background tabs.

  # Pass-to-pass tests for regression safety - from repo CI
  - id: test_unit_tests_pass
    type: pass_to_pass
    origin: repo_tests
    description: |
      The autoBatchEnhancer unit tests must continue to pass after the fix.
      Command: yarn test src/tests/autoBatchEnhancer.test.ts

  - id: test_full_test_suite
    type: pass_to_pass
    origin: repo_tests
    description: |
      Full test suite must pass to ensure the fix doesn't break other functionality.
      Command: yarn test (runs vitest --typecheck --run)

  - id: test_typescript_compiles
    type: pass_to_pass
    origin: repo_tests
    description: |
      TypeScript must compile without errors.
      Command: yarn tsc --noEmit

  - id: test_type_tests
    type: pass_to_pass
    origin: repo_tests
    description: |
      TypeScript type tests must pass to validate type-level correctness.
      Command: yarn type-tests

