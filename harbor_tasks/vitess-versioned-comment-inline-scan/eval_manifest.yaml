version: '2.0'
source:
  repo: vitessio/vitess
  pr: 19725
  base_commit: 9a3646f7f16d38cec2efabc13cef5da800a72280
  merge_commit: 9e5141afd5c3488cb4a0aea8168b48bf198790db
task:
  kind: code_fix
checks:
- id: test_versioned_comment_no_space_before_close
  type: pass_to_pass
  origin: pr_diff
  description: '`SELECT /*!80100 42*/ FROM dual` (no space before closing `*/`) parses to `select 42 from dual`. (Already works on base; behaviour must be preserved by the inline-scanning refactor.)'
- id: test_versioned_comment_unclosed_emits_lex_error
  type: fail_to_pass
  origin: pr_diff
  description: An unclosed versioned comment such as `SELECT /*!80100 1 + 2` produces `syntax error at position 22`.
- id: test_versioned_comment_nested_regular_comment
  type: fail_to_pass
  origin: pr_diff
  description: A regular `/* ... */` comment nested one level deep inside a versioned comment is consumed and the surrounding tokens parse normally.
- id: test_versioned_comment_nested_versioned_in_skipped
  type: fail_to_pass
  origin: pr_diff
  description: When a versioned comment is skipped (parser version below the comment's version), one level of inner `/*!N ... */` is treated as a nested regular comment so the outer block's `*/` is not consumed early.
- id: test_versioned_comment_short_digits_are_content
  type: fail_to_pass
  origin: pr_diff
  description: Fewer than 5 digits after `/*!` are treated as comment content, not as a version specifier.
- id: test_versioned_comment_no_digits_treated_as_content
  type: fail_to_pass
  origin: pr_diff
  description: '`select 1/*!2*/;` raises a syntax error because `2` becomes content adjacent to the preceding `1`.'
- id: test_p2p_sqlparser_package_tests
  type: pass_to_pass
  origin: repo_tests
  description: Vitess sqlparser package unit tests pass.
- id: test_p2p_go_vet_clean
  type: pass_to_pass
  origin: repo_tests
  description: '`go vet ./go/vt/sqlparser/...` succeeds.'
