# Agent config rules for programmatic verification
agent_config:
  - rule: "Follow the existing pattern from GlueJobOperator, SparkSubmitOperator, LivyOperator"
    origin: "agent_config"
    source: "CLAUDE.md"
    check: "pattern_consistency"

# Rubric for LLM evaluation (soft/subjective rules)
rubric:
  - rule: "Code should follow Apache Airflow coding standards (ruff formatted, proper imports)"
    origin: "agent_config"
    source: "CLAUDE.md"

  - rule: "Docstrings should follow Google style and explain parameters clearly"
    origin: "agent_config"
    source: "CLAUDE.md"

  - rule: "Functions should handle edge cases gracefully (None input, existing config)"
    origin: "agent_config"
    source: "CLAUDE.md"

  - rule: "Changes should not break existing functionality"
    origin: "agent_config"
    source: "CLAUDE.md"
