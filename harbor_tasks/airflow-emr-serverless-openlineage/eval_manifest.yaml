agent_config:
- rule: Follow the existing pattern from GlueJobOperator, SparkSubmitOperator, LivyOperator
  origin: agent_config
  source: CLAUDE.md
  check: pattern_consistency
rubric:
- rule: Code should follow Apache Airflow coding standards (ruff formatted, proper
    imports)
  origin: agent_config
  source: CLAUDE.md
- rule: Docstrings should follow Google style and explain parameters clearly
  origin: agent_config
  source: CLAUDE.md
- rule: Functions should handle edge cases gracefully (None input, existing config)
  origin: agent_config
  source: CLAUDE.md
- rule: Changes should not break existing functionality
  origin: agent_config
  source: CLAUDE.md
- rule: Each provider is an independent package with its own pyproject.toml, tests,
    and documentation.
  source:
    path: providers/AGENTS.md
    lines: 7-8
  evidence: The gold solution respects provider independence by importing OpenLineage
    utilities through `airflow.providers.common.compat.openlineage.utils.spark` rather
    than creating a direct hard dependency on t
  category: architecture
distractors:
- rule: Keep `provider.yaml` metadata, docs, and tests in sync.
  collision_type: architecture_boundary
  why_distracting: The agent might think it needs to add `apache-airflow-providers-openlineage`
    as a dependency in the Amazon provider's `provider.yaml` because it is adding
    OpenLineage features. However, cross-provider integrations are often optional
    or handled via `common.compat` to avoid hard dependencies. Modifying `provider.yaml`
    to add this dependency would violate provider independence.
  severity: high
  source:
    path: providers/AGENTS.md
    lines: 14-15
- rule: 'Run a single test: `uv run --project <PROJECT> pytest path/to/test.py::TestClass::test_method
    -xvs`'
  collision_type: rule_conflict
  why_distracting: The instructions provide a `uv run` command for running a single
    test, but this directly contradicts the earlier instruction on line 10 to 'Never
    run pytest, python, or airflow commands directly on the host — always use breeze.'
    An agent might try to use `uv run` and fail due to missing system dependencies
    that are only present in the Breeze environment.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 14-15
hierarchy_analysis: The root `CLAUDE.md` and `AGENTS.md` files provide general environment
  and testing commands, while `providers/AGENTS.md` adds specific architectural constraints
  for provider packages. There is an internal conflict within the root config regarding
  test execution (`uv run` vs `breeze`), and a potential architectural trap where
  an agent might misinterpret the provider sync rule to mean adding cross-provider
  dependencies.
