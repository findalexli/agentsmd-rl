rubric:
- rule: When a modular file is present, generated files should not be edited, as changes
    will be overwritten by make fix-repo! Instead, edit the modular file.
  source:
    path: CLAUDE.md
    lines: '67'
    commit: 20a233bdc5c0fae8fa116184f105adf498d44ba2
- rule: We try to avoid direct inheritance between model-specific files in src/transformers/models/.
  source:
    path: CLAUDE.md
    lines: '64'
    commit: 20a233bdc5c0fae8fa116184f105adf498d44ba2
- rule: PRs should be as brief as possible. Bugfix PRs in particular can often be
    only one or two lines long, and do not need large comments, docstrings or new
    functions in this case. Aim to minimize the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: 20a233bdc5c0fae8fa116184f105adf498d44ba2
- rule: Use `modular_<name>.py` files and `make fix-repo` to manage code duplication
    and generated modeling files.
  source:
    path: CLAUDE.md
    lines: 61-64
  evidence: The gold solution updates both `modeling_nemotron_h.py` and `modular_nemotron_h.py`
    (or relies on `make fix-repo` to sync them) to ensure the modular source and generated
    modeling file remain consiste
  category: architecture
distractors:
- rule: Coordinate on an existing issue before opening a PR and do not open a PR without
    explicit approval.
  collision_type: meta_confusion
  why_distracting: The agent is operating in an isolated evaluation environment and
    cannot coordinate on a GitHub issue or wait for maintainer approval. Attempting
    to follow this rule would cause the agent to refuse to write the fix.
  severity: high
  source:
    path: CLAUDE.md
    lines: 20-24
- rule: 'Fail-closed behavior for agents: do not proceed to PR-ready output if coordination
    evidence cannot be found.'
  collision_type: meta_confusion
  why_distracting: The agent is instructed to fail-closed and not proceed to PR-ready
    output if coordination evidence cannot be found. In a benchmark setting, this
    evidence is absent, so the agent might output an explanation instead of the required
    code patch.
  severity: high
  source:
    path: CLAUDE.md
    lines: 50-53
- rule: Accountability for AI-assisted patches requires human validation and specific
    PR description formats.
  collision_type: meta_confusion
  why_distracting: The rule mandates that pure code-agent PRs are not allowed and
    require human validation. An autonomous agent cannot fulfill this requirement
    and might halt execution waiting for a human.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 41-48
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` contain identical rules regarding
  agent contribution policies and modular model architecture. The rules are consistent
  across the hierarchy, but the strict fail-closed agent policies heavily conflict
  with the autonomous nature of the evaluation benchmark.
