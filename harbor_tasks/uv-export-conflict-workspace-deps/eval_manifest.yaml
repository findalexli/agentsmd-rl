version: "2.0"

source:
  repo: "astral-sh/uv"
  pr: 18635
  base_commit: "3d4cb95c809aef28c4c527435948c0aae5c2f3d2"
  merge_commit: "e169f431"

checks:
  - id: compiles
    type: pass_to_pass
    origin: static
    description: "uv-resolver crate must compile (cargo check)"

  - id: root_package_conflict_tracking
    type: fail_to_pass
    origin: pr_diff
    description: "Root workspace package must be inserted into conflicts map via ConflictItem between find_by_name and groups.prod()"

  - id: unconditional_marker_activation
    type: fail_to_pass
    origin: pr_diff
    description: "ConflictItem must use MarkerTree::TRUE for unconditional activation of exported workspace member"

  - id: safe_conflicts_access
    type: fail_to_pass
    origin: pr_diff
    description: "Conflicts map access must use safe Option handling (if let/match), not .unwrap()"

  - id: extras_conflict_tracking_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "Existing conflict tracking for extras in the extras loop must not be removed"

  - id: graph_traversal_intact
    type: pass_to_pass
    origin: pr_diff
    description: "from_lock must still add graph edges and queue dependencies for traversal"

  - id: no_panic_unwrap_in_from_lock
    type: pass_to_pass
    origin: agent_config
    description: "No .unwrap(), panic!(), or unreachable!() in from_lock function body"
    source:
      path: "CLAUDE.md"
      lines: "7"
      commit: "3d4cb95c809aef28c4c527435948c0aae5c2f3d2"

  - id: no_stub_macros
    type: pass_to_pass
    origin: static
    description: "Modified file must not contain todo!() or unimplemented!() stubs"

rubric:
  - rule: "PREFER patterns like `if let` to handle fallibility"
    source:
      path: "CLAUDE.md"
      lines: "8"
      commit: "3d4cb95c809aef28c4c527435948c0aae5c2f3d2"

  - rule: "PREFER let chains (`if let` combined with `&&`) over nested `if let` statements"
    source:
      path: "CLAUDE.md"
      lines: "11"
      commit: "3d4cb95c809aef28c4c527435948c0aae5c2f3d2"

  - rule: "AVOID shortening variable names, e.g., use `version` instead of `ver`, and `requires_python` instead of `rp`"
    source:
      path: "CLAUDE.md"
      lines: "17-18"
      commit: "3d4cb95c809aef28c4c527435948c0aae5c2f3d2"

  - rule: "PREFER top-level imports over local imports or fully qualified names"
    source:
      path: "CLAUDE.md"
      lines: "16"
      commit: "3d4cb95c809aef28c4c527435948c0aae5c2f3d2"
