distractors:
- rule: '`yarn knex-migrator migrate` runs database migrations'
  collision_type: rule_conflict
  why_distracting: The config lists `yarn knex-migrator migrate` as a valid database
    command. An agent might see this and assume `knex-migrator` commands should still
    be documented for database initialization/reset, or might try to replace `knex-migrator
    init` with `knex-migrator migrate` instead of using the new `yarn reset:data`
    workflow.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 65-69
- rule: '`yarn reset:data:empty` resets database with no data'
  collision_type: scope_ambiguity
  why_distracting: The config lists both `yarn reset:data` and `yarn reset:data:empty`.
    An agent might arbitrarily choose `yarn reset:data:empty` when updating the documentation
    for resetting the database, which deviates from the standard `yarn reset:data`
    command expected in the general troubleshooting section.
  severity: low
  source:
    path: CLAUDE.md
    lines: 65-69
hierarchy_analysis: '`CLAUDE.md` and `AGENTS.md` are identical at Level 0. They provide
  the source of truth for the new commands (`yarn setup`, `yarn dev`, `yarn reset:data`)
  that the PR is updating the documentation and scripts to match.'
