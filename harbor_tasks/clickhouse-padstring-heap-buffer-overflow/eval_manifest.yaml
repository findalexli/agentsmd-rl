  # Repo CI tests (pass_to_pass with origin: repo_tests)
  - id: test_no_broken_symlinks
    type: pass_to_pass
    origin: repo_tests
    description: "Repo has no broken symlinks (CI style check)"

  - id: test_clickhouse_test_script_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "Main test script has valid Python syntax"

  - id: test_pad_string_sql_test_exists
    type: pass_to_pass
    origin: repo_tests
    description: "01940_pad_string SQL test files exist"

  - id: test_leftpad_fixedstring_sql_test_exists
    type: pass_to_pass
