version: "2.0"

source_pr: "ClickHouse/ClickHouse#102086"
source_original_pr: "ClickHouse/ClickHouse#101951"
title: "Fix heap-buffer-overflow in leftPad/rightPad functions"
type: "security_fix"
language: "cpp"

repository:
  owner: "ClickHouse"
  name: "ClickHouse"
  base_commit: "37d84eba23c7b04f5b8e48b5b1742e7027cff555"
  merge_commit: "d17f0940dc7aba89d01ed0110e04fc54e4f24ace"

changes:
  primary_file: "src/Functions/padString.cpp"
  test_files:
    - "tests/queries/0_stateless/04070_pad_string_asan_overflow.sql"
    - "tests/queries/0_stateless/04070_pad_string_asan_overflow.reference"

rubric:
  - rule: "Use PaddedPODArray for strings that will be read with memcpySmallAllowReadWriteOverflow15"
    weight: 0.3
    description: "Critical memory safety requirement - PaddedPODArray provides 15 extra bytes of read padding required by ClickHouse's optimized memcpy functions"

  - rule: "Prefer validateFunctionArguments() over manual argument checking"
    weight: 0.2
    description: "Code quality - use the helper function for consistent argument validation"

  - rule: "Use debug assertions for conditions already validated"
    weight: 0.1
    description: "Use debug assertions instead of throwing for conditions guaranteed by prior validation"

  - rule: "Error messages should accurately reflect validation logic"
    weight: 0.1
    description: "Update error message to match actual validation (String or FixedString)"

checks:
  # Fail-to-pass checks (must fail on base, pass on fix)
  - id: test_pad_string_uses_padded_buffer
    type: fail_to_pass
    origin: pr_diff
    description: "Pad string storage uses PaddedPODArray instead of String for memory-safe read padding"

  - id: test_write_slice_compatible_with_buffer
    type: fail_to_pass
    origin: pr_diff
    description: "writeSlice calls use pad_string.data() directly without reinterpret_cast"

  - id: test_uses_standard_argument_validation
    type: fail_to_pass
    origin: pr_diff
    description: "Uses validateFunctionArguments helper instead of manual type checks"

  - id: test_error_message_reflects_accepted_types
    type: fail_to_pass
    origin: pr_diff
    description: "Error message mentions both String and FixedString as accepted types"

  - id: test_no_redundant_runtime_exception_for_const_column
    type: fail_to_pass
    origin: pr_diff
    description: "Removes redundant runtime exception for validated const column"

  # Pass-to-pass checks (should pass on both base and fix)
  - id: test_pad_string_sql_test_exists
    type: pass_to_pass
    origin: repo_tests
    description: "01940_pad_string SQL test files exist"

  - id: test_leftpad_fixedstring_sql_test_exists
    type: pass_to_pass
    origin: repo_tests
    description: "02986_leftpad_fixedstring SQL test files exist"

  - id: test_pad_string_cpp_has_valid_structure
    type: pass_to_pass
    origin: repo_tests
    description: "padString.cpp has valid include/namespace structure"

scoring:
  max_score: 1.0
  threshold: 1.0
  partial_credit: false
