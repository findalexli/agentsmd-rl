source_pr:
  owner: excalidraw
  repo: excalidraw
  pr_number: 10676
  base_commit: 60ab14c2f633112613843eec3c049f6da0f566e8
  merge_commit: 9ba0f5dbc9d551aad9277341a82449e04043c5ae
  title: "fix: Arrow drag start in bindable area jumps across bindable"

target_files:
  - packages/element/src/binding.ts

patch_diff: |
  diff --git a/packages/element/src/binding.ts b/packages/element/src/binding.ts
  index 1a519b1c98db..c29c8702609b 100644
  --- a/packages/element/src/binding.ts
  +++ b/packages/element/src/binding.ts
  @@ -15,6 +15,7 @@ import {
     pointFrom,
     pointFromVector,
     pointRotateRads,
  +  pointsEqual,
     vectorFromPoint,
     vectorNormalize,
     vectorScale,
  @@ -1602,7 +1603,12 @@ export const updateBoundPoint = (
     if (
       binding == null ||
       // We only need to update the other end if this is a 2 point line element
  -    (binding.elementId !== bindableElement.id && arrow.points.length > 2)
  +    (binding.elementId !== bindableElement.id && arrow.points.length > 2) ||
  +    // Initial arrow created on pointer down needs to not update the points
  +    pointsEqual(
  +      arrow.points[arrow.points.length - 1],
  +      pointFrom<LocalPoint>(0, 0),
  +    )
     ) {
       return null;
     }

