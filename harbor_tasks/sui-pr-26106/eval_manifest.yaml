rubric:
- rule: Do NOT comment the obvious - comments should explain invariants, not narrate
    code. Comments are for non-obvious algorithms, temporary exclusions, complex calculations,
    subtle race conditions, and assumptions about external state.
  source:
    path: CLAUDE.md
    lines: 116-131
    commit: 2409c793c8f6092d665d28030cfc68967e5fc4dd
- rule: ALWAYS run `cargo xclippy` after finishing development to ensure code passes
    all linting checks. Fix underlying issues rather than suppressing them.
  source:
    path: CLAUDE.md
    lines: 110-113
    commit: 2409c793c8f6092d665d28030cfc68967e5fc4dd
- rule: NEVER use `#[allow(dead_code)]`, `#[allow(unused)]`, or any other linting
    suppressions - fix the underlying issues instead.
  source:
    path: CLAUDE.md
    lines: '113'
    commit: 2409c793c8f6092d665d28030cfc68967e5fc4dd
- rule: NEVER disable or ignore tests - all tests must pass and be enabled.
  source:
    path: CLAUDE.md
    lines: '112'
    commit: 2409c793c8f6092d665d28030cfc68967e5fc4dd
distractors:
- rule: Use `cargo nextest --lib` to run only library tests and skip integration tests
    for faster feedback
  collision_type: scope_ambiguity
  why_distracting: The rule suggests using `cargo nextest --lib` for faster feedback,
    but the modified file (`crates/sui-framework/tests/build-system-packages.rs`)
    is an integration test. Using `--lib` would skip the test being fixed, preventing
    the agent from verifying its changes.
  severity: high
  source:
    path: CLAUDE.md
    lines: 36-37
- rule: Build a specific crate. Generally don't need to do release build. cargo build
    -p sui-core
  collision_type: scope_ambiguity
  why_distracting: The example build command specifies `-p sui-core`, but the agent
    is modifying `sui-framework`. Running the example command verbatim would fail
    to check the modified test file.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 24-28
hierarchy_analysis: The repository uses a root CLAUDE.md and AGENTS.md. The root CLAUDE.md
  provides general testing and building commands, but some of its examples (like `-p
  sui-core` or `--lib`) are scoped to different contexts and can mislead an agent
  working on an integration test in `sui-framework`.
version: '2.0'
