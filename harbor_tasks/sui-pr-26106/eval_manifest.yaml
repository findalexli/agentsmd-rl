rubric:
- rule: Do NOT comment the obvious - comments should explain invariants, not narrate
    code. Comments are for non-obvious algorithms, temporary exclusions, complex calculations,
    subtle race conditions, and assumptions about external state.
  source:
    path: CLAUDE.md
    lines: 116-131
    commit: 2409c793c8f6092d665d28030cfc68967e5fc4dd
- rule: ALWAYS run `cargo xclippy` after finishing development to ensure code passes
    all linting checks. Fix underlying issues rather than suppressing them.
  source:
    path: CLAUDE.md
    lines: 110-113
    commit: 2409c793c8f6092d665d28030cfc68967e5fc4dd
- rule: NEVER use `#[allow(dead_code)]`, `#[allow(unused)]`, or any other linting
    suppressions - fix the underlying issues instead.
  source:
    path: CLAUDE.md
    lines: '113'
    commit: 2409c793c8f6092d665d28030cfc68967e5fc4dd
- rule: NEVER disable or ignore tests - all tests must pass and be enabled.
  source:
    path: CLAUDE.md
    lines: '112'
    commit: 2409c793c8f6092d665d28030cfc68967e5fc4dd
distractors:
- rule: Use `cargo nextest --lib` to run only library tests and skip integration tests
    for faster feedback
  collision_type: scope_ambiguity
  why_distracting: The config recommends using `cargo nextest --lib` to skip integration
    tests for faster feedback. However, the file being modified (`crates/sui-framework/tests/build-system-packages.rs`)
    is an integration test. If the agent follows this rule, it will skip the very
    test it is trying to fix and verify.
  severity: high
  source:
    path: CLAUDE.md
    lines: 39-40
- rule: All new files must start with the following license in comments at the top
    of the file
  collision_type: scope_ambiguity
  why_distracting: The agent might mistakenly treat the heavily modified test file
    as a new file or create a new helper file for the temp directory logic, adding
    the license header unnecessarily.
  severity: low
  source:
    path: CLAUDE.md
    lines: 16-19
- rule: Use simtest-specific debugging tools and macros for tests.
  source:
    path: .claude/skills/simtest-debug/SKILL.md
    lines: 1-10
  collision_type: scope_ambiguity
  why_distracting: The agent might assume this test is a simtest and try to apply
    simtest-specific debugging or macros, but it is a standard tokio integration test.
  severity: low
hierarchy_analysis: The config hierarchy is flat, consisting of repository-level `AGENTS.md`
  and `CLAUDE.md`. `AGENTS.md` defers to `CLAUDE.md` and crate-specific files, but
  no crate-specific files are present in the context.
