source_pr:
  owner: MystenLabs
  repo: sui
  number: 26106
  title: "[chore] Fix sui-framework UPDATE to not delete the existing files unless the build succeeds"
  merge_commit: 6a391733c6a07cda5d3c9939ef3ee306490d16bd
  base_commit: 2409c793c8f6092d665d28030cfc68967e5fc4dd

task:
  name: sui-framework-update-delete-order
  description: Fix the build-system-packages test to delete files AFTER build succeeds, not before
  target_file: crates/sui-framework/tests/build-system-packages.rs

checks:
  # Fail-to-pass tests - these verify the bug is fixed
  - id: test_buggy_pattern_removed
    type: fail_to_pass
    origin: behavioral
    description: "Verify buggy pattern (delete before build) is removed"

  - id: test_fixed_deletes_after_build
    type: fail_to_pass
    origin: behavioral
    description: "Verify fixed pattern (build to tempdir, then copy) is present"

  - id: test_update_builds_to_tempdir_first
    type: fail_to_pass
    origin: behavioral
    description: "Verify build always happens to tempdir first, not crate_root"

  - id: test_safe_deletion_checks_existence
    type: fail_to_pass
    origin: behavioral
    description: "Verify existence checks before deletion are present"

  - id: test_copy_from_tempdir_after_build
    type: fail_to_pass
    origin: behavioral
    description: "Verify copy from tempdir to crate_root after successful build"

  # Pass-to-pass tests - these verify repo standards are maintained
  - id: test_compilation_passes
    type: pass_to_pass
    origin: repo_tests
    description: "Code compiles successfully"

  - id: test_syntax_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Rust syntax is valid"

  - id: test_repo_clippy
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's clippy lints pass on sui-framework"

  - id: test_repo_rustfmt
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's formatting standards pass"

  - id: test_repo_xlint
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's license headers pass"

  - id: test_build_system_packages_check
    type: pass_to_pass
    origin: repo_tests
    description: "The modified build-system-packages test compiles"

rubric:
  - rule: "Do NOT comment the obvious - comments should explain invariants, not narrate code. Comments are for non-obvious algorithms, temporary exclusions, complex calculations, subtle race conditions, and assumptions about external state."
    source:
      path: "CLAUDE.md"
      lines: "116-131"
      commit: "2409c793c8f6092d665d28030cfc68967e5fc4dd"

  - rule: "ALWAYS run `cargo xclippy` after finishing development to ensure code passes all linting checks. Fix underlying issues rather than suppressing them."
    source:
      path: "CLAUDE.md"
      lines: "110-113"
      commit: "2409c793c8f6092d665d28030cfc68967e5fc4dd"

  - rule: "NEVER use `#[allow(dead_code)]`, `#[allow(unused)]`, or any other linting suppressions - fix the underlying issues instead."
    source:
      path: "CLAUDE.md"
      lines: "113"
      commit: "2409c793c8f6092d665d28030cfc68967e5fc4dd"

  - rule: "NEVER disable or ignore tests - all tests must pass and be enabled."
    source:
      path: "CLAUDE.md"
      lines: "112"
      commit: "2409c793c8f6092d665d28030cfc68967e5fc4dd"
