distractors:
- rule: No GPU-CPU sync in hot paths (`.item()`, `.tolist()`, `print(tensor)`).
  collision_type: rule_conflict
  why_distracting: The agent needs to extract the sequence length from the `cu_seqlens`
    tensor to create a new tensor of that size using `torch.ones()`. Since `torch.ones()`
    requires an integer size, calling `.item()` is necessary (`int(cu_seqlens[-1].item())`).
    Strictly avoiding `.item()` would prevent the agent from correctly instantiating
    the fallback tensor.
  severity: high
  source:
    path: AGENTS.md
    lines: 59-60
- rule: Add tests for new functionality.
  collision_type: scope_ambiguity
  why_distracting: The PR is a targeted bug fix for stats logging. The gold solution
    does not add new unit tests. An agent strictly following this might hallucinate
    a test file or modify unrelated test files, expanding the scope unnecessarily.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 45-46
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` are at the root level (Level
  0) and provide overlapping guidance. `AGENTS.md` provides more specific technical
  constraints (like avoiding `.item()` and requiring explicit dtypes/devices), while
  `CLAUDE.md` provides higher-level project context. The conflict arises internally
  within `AGENTS.md` where the rule against GPU-CPU syncs (`.item()`) conflicts with
  the need to dynamically size a tensor based on `cu_seqlens` values.
