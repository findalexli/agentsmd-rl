distractors:
- rule: No GPU-CPU sync in hot paths (`.item()`, `.tolist()`, `print(tensor)`).
  collision_type: would_cause_bug
  why_distracting: The rule forbids `.item()` to prevent GPU-CPU syncs in hot paths. However, to create a new tensor of a specific size using `torch.ones()`, the size argument must be an integer. The gold solution correctly uses `int(cu_seqlens[-1].item())`. An agent strictly following this rule might try to pass the tensor directly as a size (causing a crash) or devise an overly complex workaround.
  severity: high
  source:
    path: AGENTS.md
    lines: '75'
- rule: Add tests for new functionality.
  collision_type: scope_ambiguity
  why_distracting: The rule mandates adding tests for new functionality. An agent might waste time trying to write unit tests for `infer_token_denominator` in a new or existing test file, which is out of scope for this specific bug fix PR and not present in the gold solution.
  severity: medium
  source:
    path: AGENTS.md
    lines: '28'
hierarchy_analysis: Both `AGENTS.md` and `CLAUDE.md` apply to the repository. `AGENTS.md` provides more specific coding guidelines (like the `.item()` prohibition and explicit typing), while `CLAUDE.md` provides higher-level project context. The agent must prioritize the specific technical requirements of the bug fix over the blanket prohibition against `.item()` in `AGENTS.md`.
