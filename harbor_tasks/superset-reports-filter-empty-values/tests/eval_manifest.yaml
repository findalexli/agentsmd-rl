rubric:
  # Agent config rules from CLAUDE.md, AGENTS.md, .cursor/rules/dev-standard.mdc
  - id: type_hints_added
    description: Type hints should be present for any new/modified function signatures
    source: "CLAUDE.md: Backend Type Safety - Add type hints for all new code"

  - id: mypy_compliant
    description: Code should be mypy compliant (no new type errors introduced)
    source: "CLAUDE.md: Backend Type Safety - MyPy compliance - Run pre-commit run mypy"

  - id: proper_warning_messages
    description: Warning messages should include filter type, empty filterValues indicator, and filter_id
    source: "AGENTS.md: Code Standards - Write clear, informative error/warning messages"

  - id: handles_none_and_empty
    description: Code should handle both None and empty list ([]) for filterValues gracefully
    source: "CLAUDE.md: Code Standards - Python Backend - Proper null/empty handling"

  - id: unit_test_follows_pattern
    description: Any new unit tests should follow existing test patterns in the file (pytest style, no describe())
    source: ".cursor/rules/dev-standard.mdc: Testing Strategy - Use pytest for testing"
