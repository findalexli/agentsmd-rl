    description: "qwen3_next GatedDeltaNet.forward must not call gdn_in_proj custom op"

  - id: qwen35_forward_no_custom_op
    type: fail_to_pass
    origin: pr_diff
    description: "qwen3_5 GatedDeltaNet.forward must not call gdn_in_proj custom op"

  - id: gdn_in_proj_not_registered
    type: fail_to_pass
    origin: pr_diff
    description: "gdn_in_proj must not be registered as a custom op at module level"

