distractors:
- rule: ALWAYS attempt to add a test case for changed behavior
  collision_type: scope_ambiguity
  why_distracting: The instruction asks to add a bash script and update CI workflows.
    The rule demands adding test cases for changed behavior, which an agent might
    misinterpret as needing to write tests for the bash script or CI changes, wasting
    effort on out-of-scope testing.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 2-3
- rule: When making changes for Windows from Unix, use `cargo xwin clippy` to check
    compilation
  collision_type: scope_ambiguity
  why_distracting: The PR modifies the Windows CI job in `test.yml`. An agent might
    think it needs to run `cargo xwin clippy` to verify the Windows changes, but this
    is a YAML configuration change, not a Rust code change.
  severity: low
  source:
    path: CLAUDE.md
    lines: 4-5
hierarchy_analysis: The config is a flat single file (`CLAUDE.md`). The rules are
  primarily focused on Rust development, while the task involves CI configuration,
  bash scripting, and documentation. The agent must discern which rules apply to the
  non-Rust components of the repository and correctly identify `CONTRIBUTING.md` as
  the target for documentation updates.
