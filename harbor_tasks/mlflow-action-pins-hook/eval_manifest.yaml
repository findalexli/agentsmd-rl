  severity: low
- rule: Prefer ubuntu-slim over ubuntu-latest for simple jobs (e.g., labeling, commenting, notifications).
  source:
    path: .claude/rules/github-actions.md
    lines: '9'
    commit: f79675735e964e14a190186efeb20176b2fe9216
  collision_type: scope_ambiguity
  why_distracting: This rule about runner selection is tangentially related to GitHub Actions but pulls attention away from the core task of SHA-pinning actions.
