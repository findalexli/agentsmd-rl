distractors:
- rule: All new files must start with the following license in comments at the top
    of the file
  collision_type: scope_ambiguity
  why_distracting: The rule requires adding a specific license header to all 'new
    files'. An agent might misinterpret this and attempt to prepend the license to
    the existing `execution_time_estimator.rs` file, duplicating the header or modifying
    existing comments unnecessarily.
  severity: low
  source:
    path: CLAUDE.md
    lines: 16-20
- rule: Run e2e tests with `cargo simtest` and Rust unittests with `cargo nextest
    run`
  collision_type: rule_conflict
  why_distracting: The config strongly encourages running `cargo simtest` and `cargo
    nextest`, noting that tests can take at least 10 minutes. The task instruction
    only requires `cargo check -p sui-core`. Attempting to run the full test suite
    would waste significant time and compute resources for a simple assertion fix.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 28-42
hierarchy_analysis: The hierarchy is flat, consisting of two root-level files (`AGENTS.md`
  and `CLAUDE.md`). `AGENTS.md` simply defers to `CLAUDE.md` and crate-specific files.
  There are no crate-specific config files provided in the context, so the agent only
  needs to rely on the root `CLAUDE.md` and the explicit task instructions.
