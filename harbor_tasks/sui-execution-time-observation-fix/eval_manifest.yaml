distractors:
- rule: '`cargo xclippy does not recognize -p option`'
  collision_type: meta_confusion
  why_distracting: The agent might try to run `cargo xclippy -p sui-core` to check
    its work, which will fail because `cargo xclippy` doesn't support `-p`. This could
    lead the agent down a rabbit hole of trying to fix the command or the linting
    setup.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 48-49
- rule: skip simulation tests as they may cause false negatives with `cargo nextest`
  collision_type: would_cause_bug
  why_distracting: The agent might run `cargo nextest run` without setting `SUI_SKIP_SIMTESTS=1`,
    which can cause false negatives (spurious test failures) and distract the agent
    from the actual task.
  severity: high
  source:
    path: CLAUDE.md
    lines: 31-32
- rule: All new files must start with the following license in comments at the top
    of the file
  collision_type: scope_ambiguity
  why_distracting: The agent might see the license header requirement and try to prepend
    it to `execution_time_estimator.rs` if it doesn't see one, even though it's not
    a new file.
  severity: low
  source:
    path: CLAUDE.md
    lines: 18-21
hierarchy_analysis: The repository has a root CLAUDE.md and AGENTS.md. The AGENTS.md
  defers to CLAUDE.md. The root CLAUDE.md provides essential commands for building,
  testing, and linting, along with high-level architectural context. There are no
  conflicting rules between the provided config files.
