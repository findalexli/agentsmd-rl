version: "2.0"

source:
  repo: "sgl-project/sglang"
  pr: 21626
  base_commit: "c34593f9512a0be2eb9d252303a7bd12f47f881f"
  merge_commit: "fec9961a1f96638e51f7b1f4e1f55288108083a3"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "engine.py must parse without errors"

  - id: immediate_nonready_first_rank
    type: fail_to_pass
    origin: pr_diff
    description: "Non-ready rank 0 detected immediately, not after polling all ranks"

  - id: immediate_nonready_middle_rank
    type: fail_to_pass
    origin: pr_diff
    description: "Mid-rank non-ready detected before reaching later ranks"

  - id: error_message_deduplicated
    type: fail_to_pass
    origin: pr_diff
    description: "Dead-scheduler error message appears at most once in function body"

  - id: poll_timeout_check_unnested
    type: fail_to_pass
    origin: pr_diff
    description: "Dead-process check after poll timeout is not nested inside else clause"

  - id: happy_path_single_rank
    type: pass_to_pass
    origin: pr_diff
    description: "Single rank ready returns list with one result"

  - id: happy_path_multi_rank
    type: pass_to_pass
    origin: pr_diff
    description: "Multiple ranks all ready returns correct ordered results"

  - id: eoferror_descriptive_error
    type: pass_to_pass
    origin: pr_diff
    description: "Closed pipe raises RuntimeError with rank and exit code info"

  - id: dead_process_detected
    type: pass_to_pass
    origin: pr_diff
    description: "Dead process during poll timeout raises RuntimeError"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "_wait_for_scheduler_ready has meaningful implementation"

rubric: []
  # No applicable soft rules — sglang's .claude/skills contain task-specific
  # tutorials (JIT kernels, CUDA debugging, CI workflows) with no general
  # style or architecture rules applicable to this refactor.
