source_pr:
  owner: containerd
  repo: containerd
  number: 13181
  title: "[release/2.0] fix: sanitize error before gRPC return to prevent credential leak in pod events"
  merge_commit: a1ba5feb7f28928b5d5d17f2bddfe2c353adee66
  base_commit: 11eca1958537a47c43cd6b922f7242cb98196db7

# Programmatic checks from test_outputs.py
checks:
  # Fail-to-pass tests - these verify the security fix works correctly
  - id: test_sanitize_error_simple_url
    type: fail_to_pass
    origin: task_spec
    description: SanitizeError correctly redacts sensitive query parameters from URLs
    file: tests/test_outputs.py

  - id: test_sanitize_error_wrapped
    type: fail_to_pass
    origin: task_spec
    description: SanitizeError works with wrapped errors and preserves error chain
    file: tests/test_outputs.py

  - id: test_sanitize_error_nil
    type: fail_to_pass
    origin: task_spec
    description: SanitizeError handles nil errors correctly
    file: tests/test_outputs.py

  - id: test_sanitize_error_non_url
    type: fail_to_pass
    origin: task_spec
    description: SanitizeError passes through non-URL errors unchanged
    file: tests/test_outputs.py

  - id: test_sanitize_error_no_query_params
    type: fail_to_pass
    origin: task_spec
    description: SanitizeError passes through URLs without query params unchanged
    file: tests/test_outputs.py

  - id: test_sanitized_error_unwrap
    type: fail_to_pass
    origin: task_spec
    description: sanitizedError correctly unwraps to original error
    file: tests/test_outputs.py

  # Structural tests (gated by behavioral tests)
  - id: test_sanitize_file_exists
    type: fail_to_pass
    origin: task_spec
    description: sanitize.go file exists in internal/cri/util/
    file: tests/test_outputs.py

  - id: test_sanitize_test_file_exists
    type: fail_to_pass
    origin: task_spec
    description: sanitize_test.go file exists in internal/cri/util/
    file: tests/test_outputs.py

  - id: test_instrumented_service_uses_sanitize
    type: fail_to_pass
    origin: task_spec
    description: instrumented_service.go calls SanitizeError in image methods
    file: tests/test_outputs.py

  # Pass-to-pass tests - verify no regressions
  - id: test_all_util_tests_pass
    type: pass_to_pass
    origin: repo_tests
    description: All tests in CRI util package pass without regressions
    file: tests/test_outputs.py

  - id: test_go_build
    type: pass_to_pass
    origin: repo_tests
    description: CRI code compiles with go build
    file: tests/test_outputs.py

  - id: test_go_vet
    type: pass_to_pass
    origin: repo_tests
    description: go vet passes on CRI package
    file: tests/test_outputs.py

  - id: test_go_fmt_check
    type: pass_to_pass
    origin: repo_tests
    description: Go code formatting is correct in CRI packages
    file: tests/test_outputs.py

  - id: test_go_mod_verify
    type: pass_to_pass
    origin: repo_tests
    description: Go modules are valid and consistent
    file: tests/test_outputs.py

  - id: test_cri_images_package_tests
    type: pass_to_pass
    origin: repo_tests
    description: CRI images package tests pass (covers modified image methods)
    file: tests/test_outputs.py

  - id: test_cri_instrument_builds
    type: pass_to_pass
    origin: repo_tests
    description: CRI instrument package compiles (contains modified instrumented_service.go)
    file: tests/test_outputs.py

# Rubric from agent configs (if any applicable rules found)
# This repo has no CLAUDE.md or AGENTS.md files at base commit
rubric:
  - rule: "Go code should follow standard Go formatting and style"
    type: soft
    source: CONTRIBUTING.md
    description: "Go files adhere to standard Go formatting and styling"

  - rule: "Package names should be short and simple"
    type: soft
    source: CONTRIBUTING.md
    description: "Avoid using _ and repeating words from parent directories"

  - rule: "Files must not contain trailing whitespace"
    type: soft
    source: CONTRIBUTING.md
    description: "Other files must not contain trailing whitespace and should end with a single new line character"

  - rule: "New utility packages should be placed under internal/"
    type: soft
    source: CONTRIBUTING.md
    description: "internal/ is for utility packages used by containerd and not intended for direct import"

  - rule: "Security-sensitive errors should be sanitized before logging or returning"
    type: programmatic
    source: PR_13181
    description: "URLs containing credentials (query parameters with tokens) must be redacted before inclusion in errors"
