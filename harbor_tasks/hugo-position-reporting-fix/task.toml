name = "hugo-position-reporting-fix"
title = "Fix Position Reporting in Hugo RenderString and Render Hooks"
description = """
Fix position reporting issues when using RenderString and render hooks in Hugo.
The issue is that positions reported by render hooks should reflect the
source content being rendered (e.g., content from RenderString), not the
parent page's content. This requires changes to how SourceInfo is propagated
through the rendering pipeline and how positions are resolved in render hooks.
"""
difficulty = "medium"
tags = ["go", "hugo", "position-reporting", "render-hooks", "source-mapping"]

