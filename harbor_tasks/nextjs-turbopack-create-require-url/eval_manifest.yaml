rubric:
- rule: Follow Rust formatting conventions. Run cargo fmt which uses ASCII order (uppercase
    before lowercase) for imports and enum variants.
  source:
    path: AGENTS.md
    lines: '414'
    commit: b7f99c773ed73e8916bd14ebc9709f625220c838
- rule: Before editing files in any subdirectory, read all README.md files in the
    directory path from the repo root up to and including the target file's directory.
  source:
    path: AGENTS.md
    lines: '46'
    commit: b7f99c773ed73e8916bd14ebc9709f625220c838
- rule: When editing Turbopack (Rust) code, verify with a full build (pnpm build-all)
    since changes may affect multiple packages.
  source:
    path: AGENTS.md
    lines: '374'
    commit: b7f99c773ed73e8916bd14ebc9709f625220c838
distractors:
- rule: Start `pnpm --filter=next dev` in a separate terminal session before making
    edits for auto-rebuilds on file changes.
  collision_type: scope_ambiguity
  why_distracting: The rule instructs the agent to run `pnpm --filter=next dev` for
    a fast inner loop when changing Next.js source. However, this PR modifies Turbopack's
    Rust crates (`turbopack/crates/...`). Running the Next.js dev server watch mode
    will not automatically recompile the Rust binaries, leading the agent to falsely
    believe its Rust changes are taking effect or failing.
  severity: high
  source:
    path: CLAUDE.md
    lines: 67-75
- rule: Prefer `pnpm --filter=next build` when edits are limited to core Next.js files.
  collision_type: scope_ambiguity
  why_distracting: The rule suggests preferring `pnpm --filter=next build` when edits
    are limited to core Next.js files. An agent might misinterpret Turbopack as a
    'core Next.js file' and run this command, which will fail to compile the Rust
    changes. The agent actually needs to use `pnpm build-all` or Cargo directly for
    Rust crate modifications.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 88-89
hierarchy_analysis: The configuration files `CLAUDE.md` and `AGENTS.md` are identical
  symlinks at the root level. The primary conflict arises from the repository's dual-language
  nature (TypeScript/JS for Next.js vs. Rust for Turbopack). The build and dev instructions
  heavily optimize for the TypeScript/JS workflow, which creates scope ambiguity when
  an agent is tasked with modifying the Rust-based Turbopack bundler.
