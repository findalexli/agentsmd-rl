rubric:
- rule: Follow Rust formatting conventions. Run cargo fmt which uses ASCII order (uppercase
    before lowercase) for imports and enum variants.
  source:
    path: AGENTS.md
    lines: '414'
    commit: b7f99c773ed73e8916bd14ebc9709f625220c838
- rule: Before editing files in any subdirectory, read all README.md files in the
    directory path from the repo root up to and including the target file's directory.
  source:
    path: AGENTS.md
    lines: '46'
    commit: b7f99c773ed73e8916bd14ebc9709f625220c838
- rule: When editing Turbopack (Rust) code, verify with a full build (pnpm build-all)
    since changes may affect multiple packages.
  source:
    path: AGENTS.md
    lines: '374'
    commit: b7f99c773ed73e8916bd14ebc9709f625220c838
distractors:
- rule: If you are changing Next.js source or integration tests, start `pnpm --filter=next
    dev` in a separate terminal session before making edits
  collision_type: architecture_boundary
  why_distracting: The rule instructs the agent to start `pnpm --filter=next dev`
    for iterative development. However, this PR involves fixing a bug in the Turbopack
    Rust crates (`turbopack/crates/`), not the Next.js JS/TS source. Running the JS
    dev server will not properly compile or isolate the Rust changes, leading to wasted
    effort.
  severity: medium
  source:
    path: AGENTS.md
    lines: 68-72
- rule: 'For type errors only: Use `pnpm --filter=next types` (~10s) instead of `pnpm
    --filter=next build` (~60s).'
  collision_type: architecture_boundary
  why_distracting: The rule suggests using `pnpm --filter=next types` for type errors.
    An agent might mistakenly attempt to use this command to debug Rust compiler errors
    in Turbopack, but it only runs the TypeScript compiler for the Next.js package.
  severity: low
  source:
    path: AGENTS.md
    lines: 88-89
hierarchy_analysis: The configuration consists of a flat, root-level file (`AGENTS.md`
  and its symlink `CLAUDE.md`). The guidance is heavily skewed towards the TypeScript/JS
  Next.js packages. There are no specific instructions for the Turbopack Rust crates,
  meaning the agent must infer that the JS-centric build and dev commands do not apply
  to the Rust backend.
