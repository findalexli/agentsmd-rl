rubric:
- rule: Add tests for new behavior
  source: CLAUDE.md:Testing Standards
  weight: 1.0
  description: The PR includes new tests in helm-tests/ for the serviceAccount feature.
    Ensure tests cover both celery and kubernetes worker service accounts.
- rule: Apache License header on all new files
  source: CLAUDE.md:Coding Standards
  weight: 1.0
  description: New template files like worker-kubernetes-serviceaccount.yaml must
    include the Apache License header comment block.
- rule: Follow Helm templating conventions for helper functions
  source: CLAUDE.md:Repository Structure
  weight: 0.5
  description: Helm helpers should use consistent naming (define "name") and support
    fallback values using default/dict patterns.
- rule: Maintain backward compatibility with deprecated fields
  source: PR description
  weight: 1.0
  description: The new workers.celery.serviceAccount and workers.kubernetes.serviceAccount
    sections must fall back to workers.serviceAccount values when not specified, maintaining
    backward compatibility.
distractors:
- rule: 'Run a single test: uv run --project <PROJECT> pytest path/to/test.py::TestClass::test_method
    -xvs'
  collision_type: rule_conflict
  why_distracting: The config provides general `uv run pytest` commands for running
    tests, which an agent might try to use for the Helm tests. However, Helm tests
    require the specific `breeze testing helm-tests` command to properly render templates
    and execute.
  severity: high
  source:
    path: CLAUDE.md
    lines: 16-18
- rule: 'Lint with ruff only: prek run ruff --from-ref <target_branch>'
  collision_type: scope_ambiguity
  why_distracting: The config instructs to lint and format with `ruff` only. Since
    this PR exclusively modifies YAML, JSON, and RST files for Helm charts, running
    Ruff will do nothing and might confuse the agent into thinking its syntax is fully
    validated.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 32-33
- rule: SQLite is the default backend. Use --backend postgres or --backend mysql for
    integration tests that need those databases.
  collision_type: scope_ambiguity
  why_distracting: The config mentions setting `--backend postgres` or `--backend
    mysql` for integration tests. Helm tests render templates and do not connect to
    a database backend, so attempting to configure these backends for the Helm tests
    would be a wasted effort.
  severity: low
  source:
    path: CLAUDE.md
    lines: 38-38
hierarchy_analysis: The configuration files CLAUDE.md and AGENTS.md are identical
  and provide general Python/Airflow testing instructions alongside specific Helm
  testing commands. The primary conflict arises from the general `uv run pytest` commands
  overlapping with the specialized `breeze testing helm-tests` commands.
