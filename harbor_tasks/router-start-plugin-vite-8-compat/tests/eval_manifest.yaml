distractors:
- rule: Use workspace protocol for internal dependencies (`workspace:*`)
  collision_type: scope_ambiguity
  why_distracting: The rule instructs to use `workspace:*` for internal dependencies.
    An agent might mistakenly try to add `vite` to `package.json` using this protocol,
    but `vite` is an external dependency and is already available in the environment.
  severity: low
  source:
    path: AGENTS.md
    lines: 18-18
- rule: To run code exclusively on the server, use `createServerFn`.
  source:
    path: packages/start-client-core/skills/start-core/SKILL.md
    lines: 6-8
  collision_type: architecture_boundary
  why_distracting: The agent is editing `preview-server-plugin/plugin.ts` and might
    interpret the 'server' terminology as requiring TanStack Start's server-only APIs.
    However, this is a Vite build plugin running in Node.js, not application runtime
    code, so using `createServerFn` would break the build tool.
  severity: high
- rule: ALL code in TanStack Start is isomorphic by default... Server-only operations
    MUST use `createServerFn`.
  source:
    path: packages/start-client-core/skills/start-core/execution-model/SKILL.md
    lines: 6-8
  collision_type: scope_ambiguity
  why_distracting: The rule states that all code is isomorphic by default and server-only
    operations must use `createServerFn`. Applying this execution model to a Vite
    plugin (which is inherently a Node.js build-time tool) represents a fundamental
    misunderstanding of the project's architecture.
  severity: high
hierarchy_analysis: The config hierarchy consists of a single root-level `AGENTS.md`
  file containing generic monorepo instructions and testing commands. There is no
  deep hierarchy or conflicting rules.
