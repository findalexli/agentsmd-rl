rubric:
- rule: All user-facing strings must be localized using the nls.localize() or localize2()
    methods from the vs/nls module - strings visible to the user cannot be hardcoded
  source:
    path: .github/copilot-instructions.md
    lines: '95'
    commit: d7ebb2cc7dcab5b7d7c9bc98ad5b96652dcab650
- rule: Command labels, buttons and menu items must use title-style capitalization
    (each word capitalized), not capitalizing prepositions of four or fewer letters
    unless first or last word
  source:
    path: .github/copilot-instructions.md
    lines: 99-100
    commit: d7ebb2cc7dcab5b7d7c9bc98ad5b96652dcab650
- rule: UI tooltips in Action2 command definitions may use the tooltip option in the
    action constructor, which is the standard pattern for menu actions in this codebase
  source:
    path: .github/copilot-instructions.md
    lines: '142'
    commit: d7ebb2cc7dcab5b7d7c9bc98ad5b96652dcab650
- rule: Disposables must be properly managed when created - use DisposableStore, MutableDisposable
    or DisposableMap for disposables that need lifecycle management
  source:
