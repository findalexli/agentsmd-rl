- rule: Keep provider.yaml metadata, docs, and tests in sync.
  collision_type: scope_ambiguity
  why_distracting: The rule instructs to keep provider.yaml, docs, and tests in sync.
    An agent might waste time trying to write tests for the new validation or update
    documentation, whereas the gold solution strictly implements the security patches
    requested without touching tests or docs.
  severity: medium
  source:
    path: providers/AGENTS.md
    lines: 12-13
- rule: Tests live alongside the provider — mirror source paths in test directories.
  collision_type: scope_ambiguity
  why_distracting: The rule mandates that tests live alongside the provider and mirror
    source paths. An agent might try to create or modify tests for the new security
    validations (e.g., testing the ValueError for strict_host_key_checking), but the
    gold solution only patches the source code.
  severity: medium
  source:
    path: providers/AGENTS.md
    lines: 14-15
- rule: When adding a translation, some configuration files need to be updated before
    translation work can begin.
  source:
