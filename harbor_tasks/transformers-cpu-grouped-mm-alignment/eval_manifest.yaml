version: "2.0"

source:
  repo: "huggingface/transformers"
  pr: 44970
  base_commit: "b3d7942fbaedda791668d7fe42eaaa323ed7a089"
  merge_commit: "c3b41c6c57be42e5dc2834af25c0c15be98a6678"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified files must parse without errors"

  - id: misaligned_weight_returns_false
    type: fail_to_pass
    origin: pr_diff
    description: "_can_use_grouped_mm returns False when weight tensor is not 16-byte aligned"

  - id: misaligned_input_returns_false
    type: fail_to_pass
    origin: pr_diff
    description: "_can_use_grouped_mm returns False when input tensor is not 16-byte aligned"

  - id: force16bytes_removed_from_mappings
    type: fail_to_pass
    origin: pr_diff
    description: "Force16BytesAlignment no longer used in any weight conversion mapping"

  - id: aligned_tensors_return_true
    type: pass_to_pass
    origin: pr_diff
    description: "Aligned tensors of various sizes still return True from _can_use_grouped_mm"

  - id: no_grouped_mm_returns_false
    type: pass_to_pass
    origin: pr_diff
    description: "Returns False when grouped_mm API is unavailable (regression guard)"

  - id: conversion_mapping_builds
    type: pass_to_pass
    origin: pr_diff
    description: "Weight conversion mapping loads cleanly with known MoE models"

  - id: ruff_check
    type: pass_to_pass
    origin: agent_config
    description: "Changed files pass ruff linter"
    source:
      path: "CLAUDE.md"
      lines: "2"
      commit: "b3d7942fbaedda791668d7fe42eaaa323ed7a089"

  # Repo CI tests (pass_to_pass gates from actual CI commands)
  - id: ruff_format
    type: pass_to_pass
    origin: repo_tests
    description: "Changed files pass ruff format check (make style)"

  - id: moe_module_imports
    type: pass_to_pass
    origin: repo_tests
    description: "MoE integration module imports successfully"

  - id: conversion_mapping_imports
    type: pass_to_pass
    origin: repo_tests
    description: "Conversion mapping module imports and builds mappings"

  - id: core_model_loading_imports
    type: pass_to_pass
    origin: repo_tests
    description: "Core model loading classes import successfully"

  - id: grouped_mm_functional
    type: pass_to_pass
    origin: repo_tests
    description: "_can_use_grouped_mm works with aligned tensors"

rubric:
  - rule: "The fix modifies only necessary files (moe.py, conversion_mapping.py, core_model_loading.py, vlm_tester.py) without touching unrelated code. The gold solution removes Force16BytesAlignment class and its usages, and adds alignment checks directly in _can_use_grouped_mm - this is a minimal, focused change that follows the guideline to keep PRs brief."
    reference: "Gold solution modifies: src/transformers/integrations/moe.py, src/transformers/conversion_mapping.py, src/transformers/core_model_loading.py, tests/vlm_tester.py, docs/source/en/weightconverter.md. No changes to CLAUDE.md or copilot-instructions.md needed."
