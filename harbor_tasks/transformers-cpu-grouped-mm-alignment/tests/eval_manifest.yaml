rubric:
- rule: Do not open one-off PRs for tiny edits; focus on meaningful, non-busywork
    contributions.
  source:
    path: CLAUDE.md
    lines: 33-35
  evidence: The gold solution implements a critical bug fix for CPU tensor alignment
    in MoE models, adhering to the policy against trivial or mechanical cleanups.
  category: architecture
  verification: llm_judge
- rule: Bugfix PRs should be brief and minimize the diff size without large comments
    or new functions.
  source:
    path: .github/copilot-instructions.md
    lines: 15-15
  source_text: '- PRs should be as brief as possible. Bugfix PRs in particular can
    often be only one or two lines long, and do not need large comments, docstrings
    or new functions in this case. Aim to minimize the size of the diff.'
  evidence: The fix avoids complex class additions, instead removing the `Force16BytesAlignment`
    class and fixing the bug using a minimal, concise `if` fallback in `_can_use_grouped_mm`
    with a clear, short comment.
  category: style
  verification: llm_judge
- rule: Tests should be added to an existing file unless adding a new model.
  source:
    path: .github/copilot-instructions.md
    lines: 16-16
  source_text: '- When writing tests, they should be added to an existing file. The
    only exception is for PRs to add a new model, when a new test directory should
    be created for that model.'
  evidence: Instead of creating a new test file for the memory alignment issue, the
    PR edits an existing test parameter (`intermediate_size` = 32) in `tests/vlm_tester.py`.
  category: testing patterns
  verification: llm_judge
