  category: architecture
  verification: llm_judge
distractors:
- rule: Create a changeset file for user-facing changes (including bug fixes that
    affect behavior).
  collision_type: meta_confusion
  why_distracting: The guidelines explicitly mandate creating a changeset file in
    the `.changeset/` directory for user-facing bug fixes. An agent might generate
    this file, but the gold solution only modifies the parser source code. In a benchmark
    environment, generating extra changeset files is out of scope.
  severity: high
  source:
    path: AGENTS.md
    lines: 54-85
- rule: Include a test plan showing what tests were added to demonstrate correctness.
  collision_type: scope_ambiguity
  why_distracting: The guidelines mention a 'Test Plan' and showing what tests were
    added. An agent might try to find and modify test files or add new markdown snapshot
    tests to prove the fix works, but the gold solution strictly fixes the parser
    logic without touching test files.
  severity: medium
  source:
    path: AGENTS.md
    lines: 38-40
- rule: Disclose AI assistance in the pull request.
  collision_type: meta_confusion
  why_distracting: The guidelines require disclosing AI assistance in the pull request.
    An agent might try to create or modify a PR description file or add comments to
    the code disclosing its identity, which is unnecessary and incorrect for a raw
    code patch.
  severity: low
  source:
    path: CLAUDE.md
    lines: 46-60
- rule: Guide for creating high-quality, user-friendly diagnostics in Biome.
  source:
    path: .claude/skills/diagnostics-development/SKILL.md
    lines: 1-5
  collision_type: scope_ambiguity
  why_distracting: The issue mentions a 'false diagnostic', which might lead the agent
    to look into diagnostic generation. However, the fix must be made in the parser's
    syntax logic, not in the diagnostics infrastructure.
  severity: medium
- rule: Step-by-step guide for creating and implementing lint rules in Biome's analyzer.
  source:
    path: .claude/skills/lint-rule-development/SKILL.md
    lines: 1-5
  collision_type: architecture_boundary
  why_distracting: The issue describes a false diagnostic, which an agent might misinterpret
    as a lint rule bug. The agent might try to modify the analyzer instead of the
    markdown parser.
  severity: medium
hierarchy_analysis: The config files (CLAUDE.md and AGENTS.md) are heavily focused
  on the PR lifecycle (PR templates, changesets, AI disclosures). However, the gold
  solution is a raw code patch for a specific bug. This creates a meta-level conflict
  where the agent must realize it is operating in a code-fix benchmark rather than
  a full repository contribution workflow, and should ignore instructions about PRs
  and changesets.
