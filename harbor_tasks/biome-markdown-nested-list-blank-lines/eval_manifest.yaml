rubric:
- rule: The fix must modify list.rs to track indent while skipping blank lines in
    nested list parsing, removing the redundant indent-counting loop after the blank-line
    loop.
  reference: "--- a/crates/biome_markdown_parser/src/syntax/list.rs\n+++ b/crates/biome_markdown_parser/src/syntax/list.rs\n\
    @@ -2569,11 +2569,21 @@ where\n     F: Fn(&mut MarkdownParser) -> bool,\n {\n\
    \     p.lookahead(|p| {\n-        // Skip all blank lines\n+        // Skip all\
    \ blank lines, tracking the indent of the last line visited.\n+        // The\
    \ loop consumes whitespace on each line to check if it's blank\n+        // (only\
    \ whitespace + newline). When we hit a non-blank line, the\n+        // whitespace\
    \ was already consumed, so we must track the indent here\n+        // rather than\
    \ counting it separately afterwards.\n+        let mut indent;\n         loop\
    \ {\n+            indent = 0;\n             while p.at(MD_TEXTUAL_LITERAL) {\n\
    \                 let text = p.cur_text();\n-                if text == \" \"\
    \ || text == \"\\t\" {\n+                if text == \" \" {\n+               \
    \     indent += 1;\n+                    p.bump(MD_TEXTUAL_LITERAL);\n+      \
    \          } else if text == \"\\t\" {\n+                    indent += TAB_STOP_SPACES\
    \ - (indent % TAB_STOP_SPACES);\n                 p.bump(MD_TEXTUAL_LITERAL);\n\
    \             } else {\n                 break;\n@@ -2586,20 +2596,6 @@ where\n\
    \         break;\n     }\n\n-        let mut indent = 0;\n-        while p.at(MD_TEXTUAL_LITERAL)\
    \ {\n-            let text = p.cur_text();\n-            if text == \" \" {\n\
    -                indent += 1;\n-                p.bump(MD_TEXTUAL_LITERAL);\n\
    -            } else if text == \"\\t\" {\n-                indent += TAB_STOP_SPACES\
    \ - (indent % TAB_STOP_SPACES);\n-                p.bump(MD_TEXTUAL_LITERAL);\n\
    -            } else {\n-                break;\n-            }\n-        }\n-\n\
    \         // Check indent matches the list's marker indent range\n         if\
    \ expected_indent == 0 {\n             if indent > MAX_BLOCK_PREFIX_INDENT {\n"
