rubric:
- rule: Code fix properly renames fn variable and formats gr.Interface across multiple
    lines following Python style conventions.
  source:
    path: gradio/external.py
  reference: "interface_fn = kwargs.pop(\"fn\", None)\ninterface = gr.Interface(\n\
    \    interface_fn, inputs, outputs, **kwargs, api_name=\"predict\"\n)\n"
  category: style
- rule: Code fix handles StopIteration with informative error message following existing
    error handling patterns.
  source:
    path: gradio/external_utils.py
  reference: "elif isinstance(e, StopIteration):\n    raise Error(\n        \"This\
    \ model is not supported by any Hugging Face Inference Provider. \"\n        \"\
    Please check the supported models at https://huggingface.co/docs/inference-providers.\"\
    \n    ) from e\n"
  category: correctness
- rule: Be consistent with the style of the surrounding code.
  source:
    path: AGENTS.md
    lines: 38-40
  evidence: The fix in `gradio/external.py` renames `fn` to `interface_fn` and formats
    the `gr.Interface` instantiation over multiple lines, maintaining consistency
    with the surrounding Ruff-formatted Python code
  category: style
distractors:
- rule: Target an issue. Every non-trivial PR should reference an existing GitHub
    issue. If one doesn't exist, create it first.
  collision_type: meta_confusion
  why_distracting: The agent is operating in an isolated evaluation environment and
    cannot interact with GitHub to create issues. Attempting to fulfill this requirement
    would lead to wasted effort or hallucinated API calls.
  severity: high
  source:
    path: AGENTS.md
    lines: 19-20
- rule: 'Format your code before pushing. Backend: `bash scripts/format_backend.sh`'
  collision_type: scope_ambiguity
  why_distracting: Running a repository-wide formatting script (`bash scripts/format_backend.sh`)
    might format unrelated files that were previously unformatted, leading to a bloated
    diff that fails the evaluation's strict diff checking.
  severity: medium
  source:
    path: AGENTS.md
    lines: 27-29
hierarchy_analysis: The configuration hierarchy is flat, consisting of a single `AGENTS.md`
