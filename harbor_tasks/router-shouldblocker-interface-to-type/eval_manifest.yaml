  - rule: "Type safety is preserved - no 'any' casts or type assertions"
    weight: 2
    guidance: "The fix should maintain type safety. The solution should not introduce 'any' or type assertions to work around the error."

  - rule: "Consistency across all framework packages"
    weight: 2
