- rule: Follow existing code style and patterns
  reference: Uses consistent formatting and structure matching existing codebase patterns
  source:
    path: packages/vue-router/src/useBlocker.tsx
- rule: TypeScript strict mode with extensive type safety
  source:
    path: AGENTS.md
    lines: 16-17
  reference: Converts unexported interface to type alias to resolve TS4023 error
  evidence: The gold solution resolves a TS4023 error by converting the unexported
    interface to a type alias, ensuring TypeScript can correctly generate type declaration
    files for public A
  category: style
- rule: Never add type annotations, casts, or generic parameters to values that are
    already inferred.
  source:
    path: packages/router-core/skills/router-core/type-safety/SKILL.md
    lines: 8-12
  evidence: The gold solution only changes the declaration keyword from `interface`
    to `type`, preserving the existing generic parameters without adding any new explicit
    type annotations or casts to the hook's return values.
  category: style
  verification: llm_judge
distractors:
- rule: 'Critical: Always run unit and type tests during development - do not proceed
    if they fail'
  collision_type: scope_ambiguity
  why_distracting: The config mandates running both unit and type tests, but the task
    instruction specifically scopes verification to just the type checkers (). Running
    the full unit test suite across all packages might waste time or hit unrelated
    flaky tests.
  severity: low
  source:
    path: AGENTS.md
    lines: 46-47
- rule: NEVER use explicit generic params or type annotations on inferred values.
  source:
    path: packages/router-core/skills/router-core/type-safety/SKILL.md
    lines: 11-12
  collision_type: scope_ambiguity
  why_distracting: The agent might misinterpret the rule against explicit generic
    params and type annotations as a directive to remove the generic parameters (`out
    TRouteId`, etc.) from `ShouldBlockFnLocation`, which would break the type definition.
  severity: medium
- rule: Most hooks return Accessor<T> — you MUST call the accessor to read the reactive
    value.
  source:
    path: packages/solid-router/skills/solid-router/SKILL.md
    lines: 10-11
  collision_type: architecture_boundary
  why_distracting: The agent might attempt to wrap the properties of `ShouldBlockFnLocation`
    in `Accessor<T>` for the Solid package, assuming that the hook's return type needs
    to be reactive, which would break the shared core type signature.
  severity: high
- rule: Most composables return Ref<T> — access via .value in script.
  source:
    path: packages/vue-router/skills/vue-router/SKILL.md
    lines: 12-13
  collision_type: architecture_boundary
  why_distracting: The agent might attempt to wrap the properties of `ShouldBlockFnLocation`
    in `Ref<T>` for the Vue package, which would incorrectly alter the framework-agnostic
    type signature.
  severity: high
