    to 'type'. The type alias syntax requires '=' before the opening brace.
- rule: Type safety is preserved - no 'any' casts or type assertions
  weight: 2
  guidance: The fix should maintain type safety. The solution should not introduce
    'any' or type assertions to work around the error.
- rule: Consistency across all framework packages
  weight: 2
  guidance: All three packages (react-router, solid-router, vue-router) should have
    the same fix applied since they share the same pattern.
- rule: Follow existing code style and patterns
  weight: 1
  guidance: The change should match the existing style in the codebase. Look at other
    type declarations in the file for consistency.
