description: |
  Fix TimePicker clearing in uncontrolled mode not propagating empty value.
  When a TimePicker is used in uncontrolled mode (defaultValue, no value prop),
  clearing any time field with backspace or delete should propagate onChange('').
  Original bug: condition `typeof value === 'string' && value !== ''` prevented
  onChange calls in uncontrolled mode. Fix uses wasInvalidBefore ref to track
  validity state.

