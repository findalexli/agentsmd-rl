rubric:
- rule: All new files must start with the Mysten Labs Apache-2.0 license header
  source:
    path: CLAUDE.md
    lines: 16-21
    commit: fbb6960c6225c2a4406cd336a0899b54e53e4787
- rule: Always run cargo xclippy after finishing development to ensure code passes
    all linting checks
  source:
    path: CLAUDE.md
    lines: 51-59,111
    commit: fbb6960c6225c2a4406cd336a0899b54e53e4787
- rule: 'NEVER use #[allow(dead_code)], #[allow(unused)], or any other linting suppressions
    - fix the underlying issues instead'
  source:
    path: CLAUDE.md
    lines: '113'
    commit: fbb6960c6225c2a4406cd336a0899b54e53e4787
- rule: Do NOT comment the obvious - comments should explain non-obvious algorithms,
    business logic, or invariants, not narrate simple code
  source:
    path: CLAUDE.md
    lines: 116-131
    commit: fbb6960c6225c2a4406cd336a0899b54e53e4787
- rule: 'Execution Pipeline: Move VM executes smart contracts'
  source:
    path: CLAUDE.md
    lines: 82-84
  evidence: The gold solution modifies `execute_function` in `vm.rs` to validate argument
    counts before allowing the Move VM to execute the smart contract, aligning with
    the execution pipeline architecture.
  category: architecture
distractors:
- rule: Run Rust unittests. skip simulation tests as they may cause false negatives
    with `cargo nextest`
  collision_type: rule_conflict
  why_distracting: The global config suggests running all tests with `SUI_SKIP_SIMTESTS=1
    cargo nextest run`. However, the prompt provides a specific, scoped test command
    (`cargo test --lib function_arg`) for this localized VM fix. Running the global
    test suite would waste significant time and compute.
  severity: high
  source:
    path: CLAUDE.md
    lines: 33-34
- rule: Run e2e tests. simtests must be run with `cargo simtest` to avoid false negatives
  collision_type: scope_ambiguity
  why_distracting: The agent might think it needs to run e2e simtests to verify the
    VM changes, but the prompt explicitly specifies that unit tests in `function_arg_tests.rs`
    are sufficient for this PR.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 30-31
hierarchy_analysis: The root `CLAUDE.md` provides global testing commands (`cargo
  nextest run`, `cargo simtest`), but the prompt acts as a local override by providing
  a specific `cargo test` command for the `move-vm-runtime` crate. The agent must
  prioritize the prompt's localized testing instructions over the global repository
  defaults to avoid massive test execution times.
