rubric:
- rule: All new files must start with the Mysten Labs Apache-2.0 license header
  source:
    path: CLAUDE.md
    lines: 16-21
    commit: fbb6960c6225c2a4406cd336a0899b54e53e4787
- rule: Always run cargo xclippy after finishing development to ensure code passes
    all linting checks
  source:
    path: CLAUDE.md
    lines: 51-59,111
    commit: fbb6960c6225c2a4406cd336a0899b54e53e4787
- rule: 'NEVER use #[allow(dead_code)], #[allow(unused)], or any other linting suppressions
    - fix the underlying issues instead'
  source:
    path: CLAUDE.md
    lines: '113'
    commit: fbb6960c6225c2a4406cd336a0899b54e53e4787
- rule: Do NOT comment the obvious - comments should explain non-obvious algorithms,
    business logic, or invariants, not narrate simple code
  source:
    path: CLAUDE.md
    lines: 116-131
    commit: fbb6960c6225c2a4406cd336a0899b54e53e4787
- rule: 'Execution Pipeline: Move VM executes smart contracts'
  source:
    path: CLAUDE.md
    lines: 82-84
  evidence: The gold solution modifies `execute_function` in `vm.rs` to validate argument
    counts before allowing the Move VM to execute the smart contract, aligning with
    the execution pipeline architecture.
  category: architecture
distractors:
- rule: Run tests using `cargo simtest -p sui-e2e-tests` or `SUI_SKIP_SIMTESTS=1 cargo
    nextest run`
  collision_type: rule_conflict
  why_distracting: The config instructs running the entire test suite using cargo
    nextest or simtest, which takes over 10 minutes. The task instruction provides
    a specific, fast cargo test command for the exact tests needed.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 31-35
- rule: Run `./scripts/lint.sh` or `cargo fmt --all -- --check` and `cargo xclippy`
    before commit
  collision_type: scope_ambiguity
  why_distracting: The config suggests running global linting and formatting checks.
    In a large codebase, this might surface unrelated issues or take a long time,
    distracting the agent from the specific bug fix.
  severity: low
  source:
    path: CLAUDE.md
    lines: 49-53
hierarchy_analysis: The hierarchy is flat with only root-level AGENTS.md and CLAUDE.md
  files. The task instruction provides specific testing commands that conflict with
  the global testing commands in CLAUDE.md.
