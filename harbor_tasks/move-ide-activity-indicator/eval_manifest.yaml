rubric:
- rule: State machine implementation
- rule: Code organization
- rule: Error handling
- rule: All new files must start with the Mysten Labs copyright and SPDX-License-Identifier
    license comment.
  source:
    path: CLAUDE.md
    lines: 15-18
  evidence: The gold solution creates a new file `activity_monitor.ts` for the ServerActivityMonitor
    class, which requires the Mysten Labs copyright and SPDX license header.
  category: style
distractors:
- rule: cargo build -p sui-core
  collision_type: scope_ambiguity
  why_distracting: The instructions suggest building `sui-core`, but the task is entirely
    within `external-crates/move/crates/move-analyzer`. Building `sui-core` would
    waste significant time and compute resources without validating the language server
    changes.
  severity: high
  source:
    path: CLAUDE.md
    lines: 22-24
- rule: cargo simtest -p sui-e2e-tests
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to run `sui-e2e-tests` to verify its changes,
    but these tests are for the Sui blockchain core, not the Move language server
    or VSCode extension.
  severity: high
  source:
    path: CLAUDE.md
    lines: 30-32
hierarchy_analysis: The root CLAUDE.md provides general repository guidelines focused
  on the Sui blockchain core (sui-core, sui-e2e-tests). However, this task is isolated
  to the Move language server and VSCode extension in `external-crates/move/crates/move-analyzer`.
  The agent must recognize that the core build and test commands in the root CLAUDE.md
  do not apply to this specific sub-project.
version: '2.0'
