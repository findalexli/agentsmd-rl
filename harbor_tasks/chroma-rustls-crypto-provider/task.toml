name = "chroma-rustls-crypto-provider"
title = "Fix rustls crypto provider initialization in tracing crate"
description = """
The chroma-tracing crate needs the rustls crypto provider explicitly installed before
initializing OTLP TLS configuration. Multiple dependencies enable different rustls backends,
but none install a provider, leading to runtime panics when TLS config is built.
"""
difficulty = "easy"
tags = ["rust", "rustls", "tls", "crypto", "tracing"]
time_estimate = "15m"

[env]
base_commit = "a0870063aaf988890fc8f642dbe2e11008dc5571"
merge_commit = "19e2d354c5ee07161374bf4b0acf36e02b45433f"
repo = "chroma"
