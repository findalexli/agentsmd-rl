rubric:
  - rule: |
      Code changes must not introduce syntax errors. All cargo checks must pass.
    origin: CONTRIBUTING.md
    reference: |
      Uses `sqlx::query_as` with a CTE query that returns a tuple:
      `(num_found, num_deleted, not_deletable_ids, not_found_ids)`. Code compiles without error.
  - rule: |
      Rust code should follow existing Rust conventions and idioms used in the codebase.
      Use CTEs for complex queries that need to return multiple result sets.
    origin: .claude/skills/fix-clippy/SKILL.md
    reference: |
      DELETE_SPLITS_QUERY uses `WITH input_splits AS (...)` CTE pattern to join
      UNNEST($2) against metrics_splits to determine state, plus a `deleted` CTE
      for the actual DELETE. Query returns num_found, num_deleted, not_deletable, not_found.
  - rule: |
      Doc comments should be accurate and reference correct types/files to avoid broken rustdoc links.
    origin: CONTRIBUTING.md
    reference: |
      row_keys_proto doc comment says: "RowKeys (sort-key min/max boundaries)
      as serialized proto bytes (`sortschema::RowKeys` in `event_store_sortschema.proto`)."
  - rule: |
      Error messages should be informative and include relevant identifiers (split IDs).
    origin: agent_config (implicit Rust convention)
    reference: |
      FailedPrecondition error message: `format!("splits \`{}\` are not deletable", not_deletable_ids.join(", "))`
      with `entity: EntityKind::Splits { split_ids: not_deletable_ids }`.
  - rule: |
      Idempotent operations should warn about missing resources but continue successfully.
    origin: agent_config (API design principle)
    reference: |
      When `!not_found_ids.is_empty()`, logs a warning via `warn!(...)` but does NOT
      return an error - execution continues to `info!(...)` and returns `Ok(EmptyResponse {})`.