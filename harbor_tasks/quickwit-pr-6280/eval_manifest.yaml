description: |
  Fix delete_metrics_splits error handling in postgres metastore to distinguish
  "not found" (warn + succeed, idempotent) from "not deletable" (FailedPrecondition).
  Also fixes the row_keys_proto doc comment to reference the correct proto type.

instruction: |
  The postgres metastore's `delete_metrics_splits` function has a bug in error handling.

  **Current broken behavior:**
  When asked to delete splits that are `Staged` or `Published` (not yet marked for deletion),
  the function silently succeeds without actually deleting them. The caller has no way to
  know that the splits were not actually deleted.

  **Expected behavior (matching the non-metrics `delete_splits` pattern):**
  - If any requested split is in `Staged` or `Published` state, the function should return
    a `FailedPrecondition` error with the split IDs listed.
  - If splits don't exist at all, the function should warn and succeed (idempotent —
    this is already working).

  **Additionally**, the doc comment for `row_keys_proto` in `MetricsSplitMetadata`
  (file `quickwit/quickwit-parquet-engine/src/split/metadata.rs`) currently says
  "RowKeys (sort-key min/max boundaries) as proto bytes." It should reference the actual
  proto type: `sortschema::RowKeys` from `event_store_sortschema.proto`.

  **How to verify your fix:**
  The code change is in `quickwit/quickwit-metastore/src/metastore/postgres/metastore.rs`
  in the `delete_metrics_splits` function. After your fix:
  1. The `DELETE_SPLITS_QUERY` constant uses a CTE pattern with `input_splits` and `deleted` subqueries
  2. When a split is Staged or Published (not marked for deletion), the function returns
     `MetastoreError::FailedPrecondition` with message "splits `X, Y` are not deletable"
  3. When a split truly doesn't exist, the function logs a warning and returns success
  4. The doc comment for `row_keys_proto` mentions `sortschema::RowKeys` and `event_store_sortschema.proto`

