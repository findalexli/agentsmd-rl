rubric:
- rule: Simple is better than complex.
  source:
    path: AGENTS.md
    lines: '16'
    commit: a25b3e7a18e76999558a888c1ab1f8e5cd0e3831
- rule: Flat is better than nested.
  source:
    path: AGENTS.md
    lines: '18'
    commit: a25b3e7a18e76999558a888c1ab1f8e5cd0e3831
- rule: Readability counts.
  source:
    path: AGENTS.md
    lines: '20'
    commit: a25b3e7a18e76999558a888c1ab1f8e5cd0e3831
- rule: Errors should never pass silently.
  source:
    path: AGENTS.md
    lines: '23'
    commit: a25b3e7a18e76999558a888c1ab1f8e5cd0e3831
- rule: Do not add unnecessary comments. Especially do not try to explain code change
    that reflect your work process, do not refer to old code.
  source:
    path: AGENTS.md
    lines: 6-7
  evidence: The gold solution adds a clean docstring to `_convert_none` without any
    inline comments explaining the bug fix, the previous behavior, or the work process.
  category: style
- rule: Avoid try/except blocks unless it's really necessary.
  source:
    path: AGENTS.md
    lines: 3-4
  evidence: The gold solution uses explicit `isinstance` checks to handle dicts and
    lists rather than using `try/except` blocks to catch `AttributeError` when calling
    `.items()` on non-dict objects.
  category: style
distractors:
- rule: Flat is better than nested.
  collision_type: scope_ambiguity
  why_distracting: The data structure being processed is inherently nested (dicts
    containing lists containing dicts). An agent strictly adhering to 'Flat is better
    than nested' might try to write an iterative flattener or avoid the recursive
    `_convert_none` helper, leading to much more complicated and bug-prone code.
  severity: medium
  source:
    path: AGENTS.md
    lines: 15-15
- rule: Errors should never pass silently.
  collision_type: would_cause_bug
  why_distracting: The agent might interpret 'Errors should never pass silently' as
    a mandate to raise an exception for unhandled types in the recursive helper. However,
    the correct behavior is to pass other types (like int, str) through unmodified
    (`return value`). Raising an error would break config serialization.
  severity: high
  source:
    path: AGENTS.md
    lines: 20-20
hierarchy_analysis: The hierarchy is flat with `CLAUDE.md` simply including `AGENTS.md`.
  The rules in `AGENTS.md` provide general Python guidelines (Zen of Python, testing,
  comments). The main challenge is interpreting the Zen of Python principles correctly
  in the context of a recursive data structure transformation.
