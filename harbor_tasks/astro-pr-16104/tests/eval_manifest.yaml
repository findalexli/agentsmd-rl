# Eval manifest for astro-preview-allowed-hosts task
# PR: withastro/astro#16104
# Fix: astro preview now respects vite.preview.allowedHosts from astro.config.mjs

manifest_version: "1.0"

task:
  name: "astro-preview-allowed-hosts"
  description: "Fix astro preview ignoring vite.preview.allowedHosts from astro.config.mjs"
  owner: "withastro"
  repo: "astro"
  pr_number: 16104
  base_commit: "0d24e3b70c34e9a9b7edbed9a298a9a9da2e4b87"
  merge_commit: "47a394d7cf2eb735fcee8e90830737f9e900a274"
  target_file: "packages/astro/src/core/preview/static-preview-server.ts"
  difficulty: "medium"
  tags: ["preview", "vite", "server", "host", "security"]
  estimated_minutes: 30

source:
  pr_url: "https://github.com/withastro/astro/pull/16104"
  pr_title: "Fix astro preview ignoring vite.preview.allowedHosts from astro.config.mjs"
  pr_body: |
    The static preview server was building its own Vite config from scratch and only reading
    from `settings.config.server.*`, completely ignoring `settings.config.vite`. This meant that
    `vite.preview.allowedHosts` (and other `vite.preview.*` options) set via the vite field in
    `astro.config.mjs` were silently dropped. The fix merges the user's vite config as the base
    before applying Astro's overrides, matching how the dev server handles this via `createVite()`.
  distinctive_line: "mergeConfig(userViteConfig, astroPreviewConfig)"

checks:
  - id: test_preview_uses_mergeConfig
    type: fail_to_pass
    origin: agent_config
    source:
      config_file: "AGENTS.md"
      section: "Astro Quick Reference"
      rule: "Use astro preview to serve the production build locally."
    description: "vite.preview.allowedHosts from astro.config.mjs is not ignored"
    timeout: 120

  - id: test_vite_preview_allowed_hosts_merged_in_config
    type: fail_to_pass
    origin: agent_config
    source:
      config_file: "AGENTS.md"
      section: "Monorepo Structure"
      rule: "Edits to source files take effect after rebuilding the package via pnpm build."
    description: "Preview config properly merges user vite config with Astro config"
    timeout: 120

  - id: test_allowedHosts_precedence_logic
    type: fail_to_pass
    origin: agent_config
    source:
      config_file: "STYLE_GUIDE.md"
      section: "Style Guide"
      rule: "Follow the same conventions and patterns that you detect in the surrounding code."
    description: "server.allowedHosts takes precedence over vite.preview.allowedHosts"
    timeout: 120

  - id: test_preview_lint
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's biome linter passes on preview directory"
    timeout: 60

  - id: test_preview_format
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's prettier formatter passes on preview directory"
    timeout: 60

  - id: test_preview_eslint
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ESLint passes on preview directory"
    timeout: 60

rubric:
  - id: rubric_merge_config_usage
    rule: "Uses Vite's mergeConfig utility to merge user vite config with Astro's preview config"
    source:
      path: "packages/astro/src/core/preview/static-preview-server.ts"
    reference: "mergeConfig(userViteConfig, astroPreviewConfig)"

  - id: rubric_config_extraction
    rule: "Extracts userViteConfig from settings.config.vite, excluding plugins to avoid conflicts"
    source:
      path: "packages/astro/src/core/preview/static-preview-server.ts"
    reference: "const { plugins: _plugins, ...userViteConfig } = settings.config.vite ?? {}"

  - id: rubric_allowedhosts_precedence
    rule: "Applies server.allowedHosts precedence logic after config merge"
    source:
      path: "packages/astro/src/core/preview/static-preview-server.ts"
    reference: "typeof allowedHosts === 'boolean'"

  - id: rubric_import_update
    rule: "Imports mergeConfig from vite alongside preview"
    source:
      path: "packages/astro/src/core/preview/static-preview-server.ts"
    reference: "import { mergeConfig, preview, type PreviewServer as VitePreviewServer } from 'vite';"