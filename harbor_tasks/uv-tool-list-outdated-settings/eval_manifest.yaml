version: "2.0"

source:
  repo: "astral-sh/uv"
  pr: 18586
  base_commit: "c1cd212dd5a927d9e354c44d89a307f6a6f4df37"
  merge_commit: "c1517ec647a72a698b2af4d77927b31d9e3d83b3"

checks:
  - id: cargo_check
    type: pass_to_pass
    origin: static
    description: "Modified crate must compile without errors"

  - id: per_tool_options_read
    type: fail_to_pass
    origin: pr_diff
    description: "Outdated section must read each tool's stored options via tool.options()"

  - id: no_global_defaults
    type: fail_to_pass
    origin: pr_diff
    description: "Outdated section must not use global PrereleaseMode::default() or ExcludeNewer::default()"

  - id: per_tool_resolver_settings
    type: fail_to_pass
    origin: pr_diff
    description: "Outdated code must construct per-tool ResolverInstallerSettings from stored options"

  - id: per_tool_client_construction
    type: fail_to_pass
    origin: pr_diff
    description: "RegistryClientBuilder must be constructed per-tool inside the iterator, not shared"

  - id: no_unwrap_panic_in_outdated_section
    type: pass_to_pass
    origin: agent_config
    description: "No .unwrap(), panic!(), unreachable!(), or unsafe in the modified outdated section"
    source:
      path: "CLAUDE.md"
      lines: "7"
      commit: "c1cd212dd5a927d9e354c44d89a307f6a6f4df37"

  - id: expect_over_allow
    type: pass_to_pass
    origin: agent_config
    description: "No #[allow(clippy::...)] — use #[expect()] instead"
    source:
      path: "CLAUDE.md"
      lines: "10"
      commit: "c1cd212dd5a927d9e354c44d89a307f6a6f4df37"

  - id: no_local_imports
    type: pass_to_pass
    origin: agent_config
    description: "No local use statements inside the list function body"
    source:
      path: "CLAUDE.md"
      lines: "16"
      commit: "c1cd212dd5a927d9e354c44d89a307f6a6f4df37"

rubric:
  - rule: "PREFER patterns like `if let` to handle fallibility"
    source:
      path: "CLAUDE.md"
      lines: "8"
      commit: "c1cd212dd5a927d9e354c44d89a307f6a6f4df37"

  - rule: "PREFER let chains (`if let` combined with `&&`) over nested `if let` statements"
    source:
      path: "CLAUDE.md"
      lines: "11"
      commit: "c1cd212dd5a927d9e354c44d89a307f6a6f4df37"

  - rule: "AVOID shortening variable names, e.g., use `version` instead of `ver`, and `requires_python` instead of `rp`"
    source:
      path: "CLAUDE.md"
      lines: "17-18"
      commit: "c1cd212dd5a927d9e354c44d89a307f6a6f4df37"
