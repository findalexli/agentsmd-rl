name = "sui-digest-error-message"
title = "Improve &str to Digest error message"
description = """
Refactor digest parsing to centralize logic in a helper function and improve error messages.
The current error message when a Digest cannot be created from a &str is generic:
"Invalid digest length. Expected 32 bytes"

The fix should provide more informative error messages that include:
1. The actual decoded byte length (not just expected)
2. The input string (truncated for long inputs)
3. Clear indication of whether the input was too short or too long

The refactoring should centralize the base58 parsing logic into a single helper function
digest_from_base58() that is used by all digest types (TransactionDigest, CheckpointDigest,
ObjectDigest, etc.).
"""
difficulty = "easy"
tags = ["rust", "refactoring", "error-handling", "base58"]
pr = "https://github.com/MystenLabs/sui/pull/26017"
time_estimate = "15m"

