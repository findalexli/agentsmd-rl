rubric:
- rule: Unit tests must inherit from CustomTestCase, not raw unittest.TestCase
  source:
    path: .claude/skills/write-sglang-test/SKILL.md
    lines: '12'
    commit: c06ca1526cb6008a8dacb4fdb06567e648134664
- rule: tearDownClass must be defensive — use hasattr/null checks before accessing
    resources that setUpClass may not have finished allocating
  source:
    path: .claude/skills/write-sglang-test/SKILL.md
    lines: 13-14
    commit: c06ca1526cb6008a8dacb4fdb06567e648134664
- rule: Unit tests that don't need a server/engine launch should be placed in test/registered/unit/
  source:
    path: .claude/skills/write-sglang-test/SKILL.md
    lines: 14,374
    commit: c06ca1526cb6008a8dacb4fdb06567e648134664
- rule: All CI-discovered test files must call a registration function at module level
    (register_cuda_ci, register_amd_ci, register_cpu_ci, or register_npu_ci)
  source:
    path: .claude/skills/write-sglang-test/SKILL.md
    lines: 309-320
    commit: c06ca1526cb6008a8dacb4fdb06567e648134664
- rule: Always use CustomTestCase
  source:
    path: .claude/skills/write-sglang-test/SKILL.md
    lines: 12-12
  source_text: 1. **Always use `CustomTestCase`** — never raw `unittest.TestCase`.
    It ensures `tearDownClass` runs even when `setUpClass` fails, preventing resource
    leaks in CI.
  evidence: The diff replaces 'import unittest' and 'class TestMamba(unittest.TestCase):'
    with 'from sglang.test.test_utils import CustomTestCase' and 'class TestMamba(CustomTestCase):'
    in test_mamba_unittest.py.
  category: testing
  verification: llm_judge
- rule: Place tests in test/registered/<category>/
  source:
    path: .claude/skills/write-sglang-test/SKILL.md
    lines: 14-14
  source_text: 3. **Place tests in `test/registered/<category>/`** — except JIT kernel
    tests and benchmarks, which live in `python/sglang/jit_kernel/tests/` and `python/sglang/jit_kernel/benchmark/`
    (nested subfolders are allowed)
  evidence: The modified test file is correctly located at 'test/registered/unit/mem_cache/test_mamba_unittest.py',
    adhering to the placement rule for CI tests.
  category: architecture
  verification: llm_judge
- rule: Prefer mock over real server for logic tests
  source:
    path: .claude/skills/write-sglang-test/SKILL.md
    lines: 16-16
  source_text: 5. **Prefer mock over real server** — when testing logic that doesn't
    need a server / engine launch (middleware, request routing, config validation,
    argument parsing), use `unittest.mock.patch` / `MagicMock` and place tests in
    `test/registered/unit/`. Only launch a real server when the test genuinely needs
    inference results or server lifecycle behavior.
  evidence: The test checks internal memory pool logic without launching a server
    and is correctly placed in 'test/registered/unit/'.
  category: testing
  verification: llm_judge
distractors:
- rule: Adding a New Model to multimodal_gen
  source:
    path: python/sglang/multimodal_gen/.claude/CLAUDE.md
    lines: 72-77
  source_text: '## Adding a New Model


    1. Create pipeline in `runtime/pipelines/` extending `ComposedPipelineBase`

    2. Define stages via `create_pipeline_stages()` (TextEncoding → Denoising → Decoding)

    3. Add config in `configs/pipeline_configs/`

    4. Register in `registry.py` via `register_configs()`'
  collision_type: scope_ambiguity
  why_distracting: The PR modifies 'qwen3_vl.py', which is a Vision-Language model
    (multimodal). An agent might see the 'multimodal_gen' directory's config and assume
    its rules apply here. However, 'qwen3_vl' belongs to the 'srt' (LLM runtime) subsystem,
    whereas 'multimodal_gen' is strictly for diffusion/image generation models.
  severity: high
