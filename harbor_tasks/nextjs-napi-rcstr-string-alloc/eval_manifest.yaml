rubric:
- rule: Rust code changes follow cargo fmt conventions with ASCII sort order for imports
  reference: The gold solution adds `use turbo_rcstr::RcStr;` imports in ASCII sort order
    (uppercase R before lowercase t) in endpoint.rs (between `use tracing` and `use turbo_tasks`)
    and utils.rs (between `use serde` and `use turbo_tasks`), matching cargo fmt conventions.
  source:
    path: crates/next-napi-bindings/src/next_api/endpoint.rs
    lines: "23"
    commit: d84e3bb56ecfdd9ff6ab5ee479e85be2780b8ba9
distractors:
- rule: Start `pnpm --filter=next dev` in a separate terminal session before making
    edits to Next.js source.
  collision_type: scope_ambiguity
  why_distracting: The rule instructs starting the Next.js dev server for iterative
    development. However, this task involves refactoring Rust NAPI bindings where
    running the JS dev server is unnecessary and could distract the agent with background
    process management.
  severity: low
  source:
    path: AGENTS.md
    lines: 72-76
hierarchy_analysis: The config hierarchy consists of a single level with identical
  symlinked files (`AGENTS.md` and `CLAUDE.md`). The rules are generic monorepo guidelines
  (build commands, dev server instructions) that do not specifically guide or conflict
  with the Rust NAPI refactoring task.
