    lines: '414'
    commit: eab7a23533d9009f24694016d2bdbdc1318df52d
distractors:
- rule: Start `pnpm --filter=next dev` in a separate terminal session before making
    edits for fast local development.
  collision_type: scope_ambiguity
  why_distracting: The rule mandates starting `pnpm --filter=next dev` for fast local
    development and auto-rebuilding. However, this PR modifies Rust NAPI bindings
    in `crates/`. The JS dev server watch mode does not automatically hot-reload or
    recompile Rust crate changes on the fly, which would confuse an agent expecting
    its Rust modifications to be immediately reflected or checked.
  severity: high
  source:
    path: CLAUDE.md
    lines: 56-65
- rule: 'For type errors only: Use `pnpm --filter=next types` instead of `pnpm --filter=next
    build`.'
  collision_type: scope_ambiguity
  why_distracting: The rule advises using `pnpm --filter=next types` for type errors.
    Since the PR involves changing struct field types from `String` to `RcStr`, the
    agent might run this command to verify its type changes. However, this command
    only runs TypeScript type checking (`tsc`), not Rust type checking (`cargo check`),
    wasting time and providing no feedback on the Rust code.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 76-76
- rule: Prefer `pnpm --filter=next build` when edits are limited to core Next.js files.
  collision_type: scope_ambiguity
  why_distracting: The rule suggests preferring `pnpm --filter=next build` when edits
    are limited to core Next.js files. The agent might consider `crates/next-napi-bindings`
    as core files and run this, but Rust changes require `pnpm build-all` or direct
    `cargo` commands to compile properly, as the filter primarily targets the JS/TS
    packages.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 78-79
hierarchy_analysis: The configuration files (`CLAUDE.md` and `AGENTS.md` are identical
  symlinks) provide global monorepo instructions that are heavily biased towards the
  TypeScript/JavaScript workflow (`packages/next`). There is a distinct lack of Rust-specific
  workflow guidance. The agent must recognize the architectural boundary between the
  JS packages and the Rust `crates/` and implicitly override the JS-centric tooling
  rules (like `pnpm dev` and `pnpm types`) in favor of standard Rust tooling (`cargo
  check`/`cargo build`) or the explicitly mentioned `pnpm build-all`.
