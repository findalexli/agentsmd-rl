rubric: []
distractors:
- rule: 'Changelog 规范: 必须同时提供中英文两个版本，描述对开发者的影响'
  collision_type: scope_ambiguity
  why_distracting: The config mandates updating CHANGELOG.en-US.md and CHANGELOG.zh-CN.md
    for changes, which might prompt the agent to document the new default colors.
    However, the task explicitly restricts modifications to just the component source
    files.
  severity: medium
  source:
    path: AGENTS.md
    lines: 120-135
- rule: '文档规范: API 表格格式需包含默认值，且中英文需保持一致'
  collision_type: scope_ambiguity
  why_distracting: The config provides strict rules for updating API documentation
    tables (including default values). The agent might try to update the Button and
    Tag docs to reflect the new default colors for solid variants, violating the 'Files
    to Modify' constraint.
  severity: medium
  source:
    path: AGENTS.md
    lines: 55-75
- rule: Help maintainers reply to Ant Design GitHub issues following official guidelines.
  source:
    path: .claude/skills/issue-reply/SKILL.md
    lines: 1-5
  collision_type: scope_ambiguity
  why_distracting: The agent might activate the issue-reply skill because the prompt
    describes a 'Problem' and 'Expected Behavior' similar to a GitHub issue, leading
    it to generate a reply instead of or in addition to the code fix.
  severity: low
hierarchy_analysis: The config files (AGENTS.md and CLAUDE.md) are identical and flat.
  They provide repository-wide guidelines for meta-files (docs, changelog, tests)
  but lack specific coding style rules for the components themselves.
