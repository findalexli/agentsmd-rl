config_edits:
- path: AGENTS.md
  tier: 1
  gold_added: '# Build all JS code

    # Build all JS and Rust code

    pnpm build-all


    After the workspace is bootstrapped, prefer `pnpm --filter=next build` when edits are limited to core Next.js files. Use full `pnpm build-all` for branch switches/bootstrap, before CI push, or when changes span multiple packages.

    pnpm build-all   # Sets up outputs for dependent packages (Turborepo dedupes if unchanged)

    - Capture to file once, then analyze: e.g. `pnpm build 2>&1 | tee /tmp/build.log`

    - **First run after branch switch/bootstrap (or if unsure)?** → `pnpm build-all`

    - **Edited Next.js code or Turbopack (Rust)?** → `pnpm build-all`'
  gold_removed: '# Build everything

    After the workspace is bootstrapped, prefer `pnpm --filter=next build` when edits are limited to core Next.js files. Use full `pnpm build` for branch switches/bootstrap, before CI push, or when changes span multiple packages.

    pnpm build   # Sets up outputs for dependent packages (Turborepo dedupes if unchanged)

    - Capture to file once, then analyze: `pnpm build 2>&1 | tee /tmp/build.log`

    - **First run after branch switch/bootstrap (or if unsure)?** → `pnpm build`

    - **Edited Next.js code or Turbopack (Rust)?** → `pnpm build`'
distractors:
- rule: '# Build everything

    pnpm build'
  collision_type: meta_confusion
  why_distracting: The existing instruction states that `pnpm build` builds everything. An agent might treat this as an immutable system prompt/rule and refuse to change it, or try to make `pnpm build` continue building everything despite the task instructions.
  severity: high
  source:
    path: AGENTS.md
    lines: 61-62
- rule: 'Use full `pnpm build` for branch switches/bootstrap... Always run a full bootstrap build after switching branches: pnpm build'
  collision_type: meta_confusion
  why_distracting: 'The file explicitly instructs the developer/agent to ''Always run a full bootstrap build after switching branches: pnpm build''. The agent must recognize that it is supposed to rewrite its own instructions rather than follow the outdated ones.'
  severity: high
  source:
    path: AGENTS.md
    lines: 94-100
hierarchy_analysis: The task involves a flat config structure but is highly meta-referential. The agent must edit `AGENTS.md`, which serves as its own system prompt/guidance file. It must override the existing rules about `pnpm build` and replace them with the new `pnpm build-all` workflow, requiring it to distinguish between following instructions and updating them.
