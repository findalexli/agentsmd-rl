rubric:
- rule: Add a rule to CLAUDE.md about using bun for Windows ARM64 to avoid crashes.
  source:
    path: CLAUDE.md
  reference: When addressing Windows ARM64 specific bugs (like the 0xC0000409 crash),
    prefer using the bun runtime over node.
distractors:
- rule: Make it a build edge — n.rule() + n.build(). Size doesn't matter; a 1-file
    compile is still a build edge.
  collision_type: architecture_boundary
  why_distracting: The agent might try to implement the binary size check as a Ninja
    build edge (using n.rule() and n.build()) within the TypeScript build system,
    especially since scripts/build/ci.ts is listed in 'Files to Look At'. However,
    this is a CI pipeline concern that belongs in .buildkite/ci.mjs.
  severity: high
  source:
    path: scripts/build/CLAUDE.md
    lines: 35-38
- rule: 'Comparing builds: use --build-dir to park a build somewhere the next build
    won''t overwrite for comparison points.'
  collision_type: scope_ambiguity
  why_distracting: The agent might try to use the --build-dir flag to preserve the
    baseline build for size comparison. In a distributed CI environment, baselines
    are compared against artifacts from previous pipeline runs (latest main), not
    preserved locally on the same runner using --build-dir.
  severity: medium
  source:
    path: AGENTS.md
    lines: 28-32
hierarchy_analysis: The task spans the root CI configuration (.buildkite/ci.mjs) and
  the build scripts (scripts/build/). The agent must recognize that rules in scripts/build/CLAUDE.md
  apply strictly to the Ninja build graph generation, and should not be applied to
  CI pipeline orchestration steps.
