# eval_manifest.yaml - Benchmark task for payloadcms/payload#15941
# Fix block row paste with nested array - ID regeneration bug

meta:
  owner: payloadcms
  repo: payload
  pr_number: 15941
  base_commit: fac59c85155f01d1ef7e9aaeddf3362631ab3419
  merge_commit: 9bcedc8c813c4779524f3b643ea0eaac7b809cdb
  task_name: payload-block-row-paste-nested-array-id

description: >
  Fix for bug where copying a block row containing an array field and pasting
  it into a new block caused array items to appear doubled in the UI. The root
  cause was that mergeFormStateFromClipboard skipped all .id paths using
  .endsWith('.id'), including nested array item IDs (like ctas.0.buttons.0.id),
  causing missing ID form state entries and server-side row duplication on merge.

target_files:
  - packages/ui/src/elements/ClipboardAction/mergeFormStateFromClipboard.ts

patch:
  distinctive_line: "(!pasteIntoField && clipboardPath === `${pathToReplace}.id`)"
  content: |
    diff --git a/packages/ui/src/elements/ClipboardAction/mergeFormStateFromClipboard.ts b/packages/ui/src/elements/ClipboardAction/mergeFormStateFromClipboard.ts
    index 1234567890..abcdef1234 100644
    --- a/packages/ui/src/elements/ClipboardAction/mergeFormStateFromClipboard.ts
    +++ b/packages/ui/src/elements/ClipboardAction/mergeFormStateFromClipboard.ts
    @@ -115,7 +115,11 @@ export function mergeFormStateFromClipboard({
       for (const clipboardPath in dataFromClipboard) {
    -    // Pasting a row id, skip overwriting
    +    // When pasting into a specific row, skip only the direct row ID to avoid overwriting
    +    // the target row's identity. Nested IDs (array item IDs within the block) should
    +    // still be processed so they get regenerated below, preventing server-side duplication.
         if (
    -      (!pasteIntoField && clipboardPath.endsWith('.id')) ||
    +      (!pasteIntoField && clipboardPath === `${pathToReplace}.id`) ||
           !clipboardPath.startsWith(pathToReplace)
         ) {
           continue

checks:
  - id: test_skip_condition_uses_exact_match
    type: fail_to_pass
    description: Skip condition uses exact path match (===) instead of .endsWith('.id')
    origin: agent_config
    source: CLAUDE.md (coding patterns section)

  - id: test_no_endsWith_in_skip_logic
    type: fail_to_pass
    description: Skip condition block does not contain buggy .endsWith('.id')
    origin: agent_config
    source: CLAUDE.md (coding patterns section)

  - id: test_all_existing_tests_pass
    type: pass_to_pass
    description: All existing unit tests pass (no regression)
    origin: repo_tests

  - id: test_repo_eslint_clipboard_action
    type: pass_to_pass
    description: ESLint passes for ClipboardAction module
    origin: repo_tests

  - id: test_repo_scss_lint
    type: pass_to_pass
    description: SCSS linting passes for UI package
    origin: repo_tests

rubric:
  # This task is a pure bug fix; no CLAUDE.md/AGENTS.md updates are required.
  # The rubric rules below verify code-level conventions that the fix follows.
  - id: rule_execution_flow_comments
    source:
      path: packages/ui/src/elements/ClipboardAction/mergeFormStateFromClipboard.ts
    description: Comments should explain 'why' not 'what'
    rule: The fix comment explains WHY the exact-match check is needed (prevents nested ID regen bug), not just what the code does
    reference: "When pasting into a specific row, skip only the direct row ID to avoid overwriting the target row's identity. Nested IDs (array item IDs within the block) should still be processed so they get regenerated below, preventing server-side duplication."

agent_config:
  - config_file: CLAUDE.md
    commit: fac59c85155f01d1ef7e9aaeddf3362631ab3419
    lines: "1-200+ (full file)"
