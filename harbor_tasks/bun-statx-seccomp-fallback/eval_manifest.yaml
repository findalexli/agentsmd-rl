version: '2.0'
source:
  repo: oven-sh/bun
  pr: 28825
  base_commit: 159a285841539c8f166509116c12b11e15b47fdf
  merge_commit: 90538306b1b1d82f99735db9718c38a49c9d6266
checks:
- id: source_files_exist
  type: pass_to_pass
  origin: static
  description: Core source file src/sys.zig must exist and be non-empty
- id: zig_fmt_sys_zig
  type: pass_to_pass
  origin: repo_tests
  description: Zig fmt check on src/sys.zig passes (from format.yml CI)
  ci_source:
    workflow: .github/workflows/format.yml
    command: zig fmt --check src/
- id: zig_fmt_build_zig
  type: pass_to_pass
  origin: repo_tests
  description: Zig fmt check on build.zig passes (from format.yml CI)
  ci_source:
    workflow: .github/workflows/format.yml
    command: zig fmt --check build.zig
- id: claude_md_valid
  type: pass_to_pass
  origin: static
  description: CLAUDE.md exists and is non-empty, AGENTS.md symlink valid
  ci_source:
    path: CLAUDE.md
    note: Project coding guidelines file referenced by AGENTS.md
- id: repo_structure_intact
  type: pass_to_pass
  origin: static
  description: Repository structure is intact with required files and directories
- id: coderabbit_config_valid
  type: pass_to_pass
  origin: static
  description: CodeRabbit config (.coderabbit.yaml) exists and is valid YAML
  ci_source:
    path: .coderabbit.yaml
    note: CodeRabbit AI code review configuration file
- id: agents_symlink_valid
  type: pass_to_pass
