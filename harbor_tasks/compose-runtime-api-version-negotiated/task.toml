name = "compose-runtime-api-version-negotiated"
description = """
Refactor docker/compose's runtime API version lookup so that container request
shaping uses the negotiated client API version (via Ping + ClientVersion)
instead of the daemon's raw maximum version (via ServerVersion).
Errors must not be cached, and the cache must live on the service instance.
"""

difficulty = "medium"
tags = ["go", "docker", "refactor", "concurrency", "api-versioning"]

[time]
estimate_minutes = 25
hard_limit_minutes = 60
