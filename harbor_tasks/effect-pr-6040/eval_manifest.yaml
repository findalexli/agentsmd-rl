# eval_manifest.yaml for effect-ts/effect#6040
# Fix Stream.decodeText to correctly handle multi-byte UTF-8 characters split across chunk boundaries.

owner: effect-ts
repo: effect
repo_short: effect
base_commit: 904e055143ad74b1e4cd25429f44e7a3e86db5dc
merge_commit: a8c436f7004cc2a8ce2daec589ea7256b91c324f
pr_number: 6040

task_name: effect-stream-decodetext-utf8

description: >
  Fix Stream.decodeText to correctly handle multi-byte UTF-8 characters (e.g. emojis)
  when they are split across two or more Stream chunks. The fix passes { stream: true }
  to TextDecoder.decode() so that incomplete multi-byte sequences are buffered and
  completed on subsequent decode calls.

source:
  pr_url: https://github.com/effect-ts/effect/pull/6040
  pr_title: "Fix `Stream.decodeText` to correctly handle multi-byte UTF-8 characters split across chunk boundaries."
  issue: "#6039"
  changeset: ".changeset/kind-mangos-heal.md"

target_file: packages/effect/src/internal/stream.ts

patch_content: |
  diff --git a/packages/effect/src/internal/stream.ts b/packages/effect/src/internal/stream.ts
  index abc123..def456 100644
  --- a/packages/effect/src/internal/stream.ts
  +++ b/packages/effect/src/internal/stream.ts
  @@ -8773,7 +8773,7 @@ export const decodeText = dual<
   >((args) => isStream(args[0]), (self, encoding = "utf-8") =>
     suspend(() => {
       const decoder = new TextDecoder(encoding)
  -    return map(self, (s) => decoder.decode(s))
  +    return map(self, (s) => decoder.decode(s, { stream: true }))
     }))

distinctive_line: "decoder.decode(s, { stream: true })"

checks:
  - id: test_decodetext_multibyte_split_chunks
    type: fail_to_pass
    origin: code_behavior
    description: >
      Stream.decodeText correctly decodes a 4-byte UTF-8 emoji (🌍) split into two
      2-byte chunks. Without { stream: true }, TextDecoder treats each chunk
      independently and fails to reconstruct the character.

  - id: test_decodetext_mixed_ascii_multibyte
    type: fail_to_pass
    origin: code_behavior
    description: >
      Stream.decodeText correctly decodes mixed ASCII and multi-byte UTF-8 content
      ("Hello 🌍!") when the multi-byte character boundary falls across stream chunks.

  - id: test_decodetext_many_multibyte_splits
    type: fail_to_pass
    origin: code_behavior
    description: >
      Stream.decodeText correctly decodes multiple multi-byte UTF-8 characters
      each split across chunk boundaries.

  - id: test_repo_encoding_tests
    type: pass_to_pass
    origin: repo_tests
    description: >
      The repo's own encoding test suite (packages/effect/test/Stream/encoding.test.ts)
      passes with the fix applied.

