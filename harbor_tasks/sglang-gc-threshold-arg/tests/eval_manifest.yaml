distractors:
- rule: ServerArgs and config parameters should be edited in runtime/server_args.py
  source:
    path: python/sglang/multimodal_gen/.claude/CLAUDE.md
    lines: '43'
  source_text: '├── server_args.py      # ServerArgs (all CLI/config params)'
  collision_type: architecture_boundary
  why_distracting: An agent tasked with adding a new CLI argument to ServerArgs might
    incorrectly edit python/sglang/multimodal_gen/runtime/server_args.py based on
    this rule, but the PR correctly edits python/sglang/srt/server_args.py which belongs
    to the core LLM runtime.
  severity: high
- rule: The ServerArgs class is located at runtime/server_args.py
  source:
    path: python/sglang/multimodal_gen/.claude/CLAUDE.md
    lines: '60'
  source_text: '| `ServerArgs` | `runtime/server_args.py` | All config params |'
  collision_type: architecture_boundary
  why_distracting: An agent tasked with modifying ServerArgs might incorrectly target
    the multimodal diffusion subsystem instead of the srt engine where the actual
    changes belong.
  severity: high
- rule: ServerArgs (all CLI/config params) is located in `runtime/server_args.py`,
    and entrypoints are in `runtime/entrypoints/`.
  source:
    path: /workspace/repo/python/sglang/multimodal_gen/.claude/CLAUDE.md
    lines: 36, 43, 60
  source_text: '├── entrypoints/        # CLI (generate/serve), HTTP server, Python
    API (DiffGenerator)

    ...├── server_args.py      # ServerArgs (all CLI/config params)

    ...| `ServerArgs` | `runtime/server_args.py` | All config params |'
  collision_type: scope_ambiguity
  why_distracting: The PR modifies `server_args.py` and `entrypoints/engine.py` in
    the LLM runtime (`python/sglang/srt/`). An agent working on this task might mistakenly
    apply the new argument changes to the multimodal generation subsystem (`python/sglang/multimodal_gen/runtime/server_args.py`)
    because this config file maps identical file and folder names.
  severity: high
- rule: Write tests for argument parsing and config validation using unittest.mock.patch
    / MagicMock in test/registered/unit/.
  source:
    path: /workspace/repo/.claude/skills/write-sglang-test/SKILL.md
    lines: '16'
  source_text: 5. **Prefer mock over real server** — when testing logic that doesn't
    need a server / engine launch (middleware, request routing, config validation,
    argument parsing), use `unittest.mock.patch` / `MagicMock` and place tests in
    `test/registered/unit/`.
  collision_type: rule_conflict
  why_distracting: The PR adds new argument parsing and config validation logic (`gc_threshold`)
    to `server_args.py`. An agent following this rule would waste effort attempting
    to write unit tests for the argument parsing in `test/registered/unit/`, but the
    gold diff successfully completes the change by ignoring this rule and not adding
    tests.
  severity: medium
