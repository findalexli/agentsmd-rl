    name: "test_config_compiles_with_new_defaults"
    type: "functional"
    description: "Config compiles and snapshot test passes with new fields"

  - id: "p2p_2"
    name: "test_network_client_has_probe_method"
    type: "functional"
    description: "NetworkClient has probe_connectivity with correct signature"

  # Repo CI/CD pass-to-pass tests - verified CI commands that work in Docker
  - id: "p2p_repo_fmt_check"
