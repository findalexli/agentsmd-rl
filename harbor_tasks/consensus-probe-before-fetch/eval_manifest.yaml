distractors:
- rule: All new files must start with the following license in comments at the top
    of the file
  collision_type: architecture_boundary
  why_distracting: The agent might create a new file for the `ObserverNetworkService`
    trait implementation or the probe mechanism to satisfy the license header rule,
    rather than correctly integrating the changes into the existing `authority_service.rs`
    and `clients.rs` files.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 17-20
- rule: Always consult CLAUDE.md files in sub-crates. Instructions in local CLAUDE.md
    files override instructions in this file when they are in conflict.
  collision_type: meta_confusion
  why_distracting: The rule instructs to 'Always consult CLAUDE.md files in sub-crates',
    which might cause the agent to hallucinate or search for non-existent `consensus/CLAUDE.md`
    files, wasting time and causing confusion since none are provided in the context.
  severity: low
  source:
    path: CLAUDE.md
    lines: 5-7
- rule: Run Rust unittests. skip simulation tests as they may cause false negatives
    with `cargo nextest`
  collision_type: would_cause_bug
  why_distracting: The agent might rely solely on `cargo nextest run` as instructed,
    which will fail the snapshot test but won't automatically update it. The agent
    might get confused about how to update the snapshot (`cargo insta review` or `UPDATE_EXPECT=1
    cargo test`) since it's not mentioned in the testing commands.
  severity: high
  source:
    path: CLAUDE.md
    lines: 38-39
hierarchy_analysis: The repository uses a root `CLAUDE.md` and `AGENTS.md` that apply
  globally, with instructions to consult crate-specific `CLAUDE.md` files. Since no
  crate-specific config files are provided for the `consensus` crate, the root rules
  apply directly. The root config focuses heavily on testing commands, formatting,
  and high-level architecture, but lacks specific guidance on snapshot testing (`cargo
  insta`), which is required for this PR.
