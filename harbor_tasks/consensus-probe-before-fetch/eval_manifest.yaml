      path: "CLAUDE.md"
      lines: "6-7"
      commit: "192a628cc56fcd901af4330d91c123fe8f493187"

  - rule: "Comments should explain non-obvious algorithms, temporary exclusions/timeouts, and reasoning - not narrate obvious code. Document the 'why' for timeout values and probe logic."
