    type: "functional"
    description: "NetworkClient has the probe_connectivity method"

  - id: "f2p_3"
    name: "test_commit_syncer_uses_configurable_timeout"
    type: "functional"
    description: "commit_syncer uses configurable timeout instead of hardcoded constant"

  - id: "f2p_4"
    name: "test_authority_service_implements_observer_trait"
    type: "functional"
    description: "AuthorityService implements ObserverNetworkService trait methods"

  - id: "f2p_5"
