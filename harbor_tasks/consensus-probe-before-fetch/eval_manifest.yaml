distractors:
- rule: cargo build -p sui-core
  collision_type: scope_ambiguity
  why_distracting: The quick build command specifies `-p sui-core`, but the task modifies
    the `consensus` crate. If the agent only runs this command, it will not compile
    its changes.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 22-23
- rule: Use multiple `-p` flags if necessary, e.g. `cargo nextest run -p sui-types
    -p sui-core`
  collision_type: scope_ambiguity
  why_distracting: The testing instructions suggest using `-p sui-types -p sui-core`,
    which would skip the tests in the `consensus` crate where the snapshot test needs
    to be updated.
  severity: high
  source:
    path: CLAUDE.md
    lines: 38-39
- rule: Add new protocol config settings to crates/sui-protocol-config/src/lib.rs
    and increment MAX_PROTOCOL_VERSION.
  source:
    path: .claude/skills/protocol-config/SKILL.md
    lines: 23-64
  collision_type: scope_ambiguity
  why_distracting: The skill instructs the agent to add new configuration parameters
    to `crates/sui-protocol-config/src/lib.rs` and increment the `MAX_PROTOCOL_VERSION`.
    However, this task specifically targets the local consensus config (`consensus/config/src/parameters.rs`).
    Following the skill would cause the agent to modify the global Sui protocol config
    and incorrectly bump the protocol version.
  severity: high
hierarchy_analysis: The hierarchy is flat with only root-level AGENTS.md and CLAUDE.md.
  The CLAUDE.md provides generic repository commands that are scoped to sui-core/sui-types,
  which can be misleading for a task entirely contained within the consensus crate.
