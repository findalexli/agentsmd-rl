    description: "cargo check -p consensus-types passes (verified in Docker)"

  - id: "p2p_repo_clippy_config"
    name: "test_repo_cargo_clippy_consensus_config"
    type: "pass_to_pass"
    origin: "repo_tests"
    description: "cargo clippy -p consensus-config passes (verified in Docker)"

  - id: "p2p_repo_test_config_lib"
