rubric:
  - rule: "SQLAlchemy model changes must include proper imports"
    description: |
      When adding new SQLAlchemy column types, ensure the corresponding
      types are imported from sqlalchemy (e.g., JSON import when using JSON columns).
    source: "AGENTS.md - Database schema changes"
    weight: medium
    reference: |
      JSON,
      disabled_skills = Column(JSON, nullable=True)

  - rule: "Alembic migrations must have correct revision chain"
    description: |
      Database migrations must properly reference the down_revision to maintain
      the migration chain. The revision ID must be unique and follow sequentially.
    source: "AGENTS.md - Database Migrations section"
    weight: high
    reference: |
      revision: str = '104'
      down_revision: Union[str, None] = '103'

  - rule: "Migrations must include both upgrade and downgrade"
    description: |
      All Alembic migrations must define both upgrade() and downgrade() functions
      to ensure database changes are reversible.
    source: "AGENTS.md - Database Migrations section"
    weight: high
    reference: |
      def upgrade() -> None:
          op.add_column('user', sa.Column('disabled_skills', sa.JSON(), nullable=True))
      def downgrade() -> None:
          op.drop_column('user', 'disabled_skills')

  - rule: "Code must pass pre-commit hooks"
    description: |
      Before pushing changes, ensure pre-commit hooks pass successfully.
      Run `pre-commit run --config ./dev_config/python/.pre-commit-config.yaml`
      to verify code quality.
    source: "AGENTS.md - General Setup section"
    weight: medium
    reference: |
      Code passes ruff check and format validation
