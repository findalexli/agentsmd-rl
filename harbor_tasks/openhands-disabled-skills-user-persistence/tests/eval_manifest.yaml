version: "1.0"

source:
  pr: "OpenHands/OpenHands#13658"
  title: "fix(backend): persist disabled_skills in SaaS settings store"
  description: |
    Migration 102 added disabled_skills to the legacy user_settings table,
    but SaasSettingsStore reads from and writes to User/Org/OrgMember.
    Since User lacked the column, disabled_skills was silently dropped on
    save and missing on load, causing skill toggles to revert after refresh.
    This fix adds disabled_skills JSON column to the User model and table.
  base_commit: "73ba66faeae1520fc2671b07677db4b5e3e235d3"
  merge_commit: "9c0f5d785ee71c7d16d157333994245cb242a885"
  files_changed:
    - "enterprise/storage/user.py"
    - "enterprise/migrations/versions/104_add_disabled_skills_to_user.py"

