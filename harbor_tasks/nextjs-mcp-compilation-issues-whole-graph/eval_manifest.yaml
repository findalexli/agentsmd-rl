distractors:
- rule: 'Start watch build in background: pnpm --filter=next dev'
  collision_type: scope_ambiguity
  why_distracting: The rule suggests running `pnpm --filter=next dev` for iterative
    development, but this is primarily for JS/TS code. Modifying Rust napi bindings
    requires recompiling the Rust code, which the JS dev server watch mode may not
    handle correctly or efficiently.
  severity: medium
  source:
    path: AGENTS.md
    lines: 78-85
- rule: 'Run tests fast (no isolation, no packing): NEXT_SKIP_ISOLATE=1 NEXT_TEST_MODE=<dev|start>
    pnpm testheadless test/path/to/test.ts'
  collision_type: scope_ambiguity
  why_distracting: The rule suggests using `pnpm testheadless` for fast test execution,
    but this applies to JS/TS tests. The agent might waste time trying to run JS tests
    for a Rust-level MCP tool optimization instead of using Cargo.
  severity: low
  source:
    path: AGENTS.md
    lines: 87-92
hierarchy_analysis: The configuration consists of a single flat file (AGENTS.md/CLAUDE.md)
  containing generic Next.js development guidelines. There is no deep hierarchy or
  specific guidance for the Rust crates being modified.
