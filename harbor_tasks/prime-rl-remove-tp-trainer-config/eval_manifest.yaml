distractors:
- rule: 'When preparing release notes: Structure: organize notes into numbered highlight
    sections (# 1., # 2., ...), then # Breaking Changes, # Bug Fixes, and # Misc.'
  collision_type: scope_ambiguity
  why_distracting: The agent is instructed to document the breaking change in `CHANGELOG.md`.
    It might confuse this with 'preparing release notes' and attempt to add `# Breaking
    Changes` headers or reformat the changelog into numbered sections, which would
    disrupt the existing simple bulleted list format.
  severity: high
  source:
    path: AGENTS.md
    lines: 43-51
- rule: 'Skills: When you make changes to the codebase, check if any skills need to
    be updated to stay accurate. You are responsible for maintaining the skills folder.'
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to search and modify the `skills/toml-config`
    files to remove references to `tp` in example configs. While well-intentioned
    based on this rule, it falls outside the explicit expected outcomes for this PR
    and could lead to unnecessary file modifications.
  severity: medium
  source:
    path: AGENTS.md
    lines: 32-35
hierarchy_analysis: The hierarchy is flat with only `AGENTS.md` providing rules. The
