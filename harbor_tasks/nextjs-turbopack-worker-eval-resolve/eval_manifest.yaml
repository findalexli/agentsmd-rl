  - id: datauri_uri_produce_dynamic_in_append_path
    type: fail_to_pass
    origin: pr_diff
    description: "DataUri and Uri individually produce Dynamic when append_path is called"

  - id: worker_path_resolution_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "Worker(path) resolution logic preserved — js_value_to_pattern and WorkerAssetReference still present"

  - id: handler_not_stub
    type: pass_to_pass
