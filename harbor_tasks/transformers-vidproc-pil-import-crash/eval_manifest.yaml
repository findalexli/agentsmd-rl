rubric:
- rule: '`make style`: runs formatters and linters (ruff), necessary to pass code
    style checks'
  source:
    path: CLAUDE.md
    lines: 2-2
  evidence: The gold solution inserts `is_vision_available` into the `from .image_utils
    import (...)` block in strict alphabetical order (between `SizeDict` and `validate_kwargs`),
    adhering to the ruff/isort form
  category: style
distractors:
- rule: 'Copies and Modular Models: Do not edit a `# Copied from` block... add a file
    named `modular_<name>.py` in the model directory.'
  collision_type: scope_ambiguity
  why_distracting: The rule about `# Copied from` and modular models specifically
    applies to `src/transformers/models/`. The file being edited is `src/transformers/video_processing_utils.py`,
    which is a general utility. An agent might waste time looking for copy mechanisms
    or worry about breaking inheritance, but this rule is out of scope for utility
    files.
  severity: low
  source:
    path: CLAUDE.md
    lines: 61-66
- rule: 'Mandatory duplicate-work checks: Before proposing a PR, check for overlapping
    open PRs and issue ownership using `gh` CLI.'
  collision_type: meta_confusion
  why_distracting: The agent is instructed to run `gh issue view` and `gh pr list`
    to check for duplicate work before proposing a PR. In a headless evaluation or
    patch-generation environment, attempting to run these GitHub CLI commands will
    fail or distract from actually writing the code fix.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 25-32
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` contain identical rules. The
  rules are heavily focused on the PR submission process, GitHub coordination, and
  model-specific copy mechanisms, which are mostly out of scope for a direct bug-fix
  patch generation task on a utility file.
