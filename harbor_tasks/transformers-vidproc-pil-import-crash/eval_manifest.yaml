checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "video_processing_utils.py must be valid Python"

  - id: import_without_pil
    type: fail_to_pass
    origin: pr_diff
    description: "Module imports without PIL; BaseVideoProcessor has correct class attributes"

  - id: docstring_constant_without_pil
    type: fail_to_pass
    origin: pr_diff
    description: "BASE_VIDEO_PROCESSOR_DOCSTRING accessible and non-trivial without PIL"

  - id: methods_exist_without_pil
    type: fail_to_pass
    origin: pr_diff
    description: "Key methods on BaseVideoProcessor present; __call__ delegates to preprocess"

  - id: pil_resampling_with_pil
    type: pass_to_pass
    origin: pr_diff
    description: "PILImageResampling available in module namespace when PIL IS installed"

  - id: other_image_utils_imports
    type: pass_to_pass
    origin: pr_diff
    description: "Other image_utils imports (ChannelDimension, SizeDict) unaffected"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "File not emptied/stubbed — retains substantial content and key definitions"

  - id: copied_from_annotations_intact
    type: pass_to_pass
    origin: agent_config
    description: "'# Copied from' annotations must not be broken or removed"
    source:
      path: "CLAUDE.md"
      lines: "66"
      commit: "ed003b4482aabdf8377250f22826dd31f378269c"

  - id: test_repo_ruff_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ruff linting passes on the target file"

  - id: test_repo_ruff_format
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ruff formatting passes on the target file"

rubric:
  - rule: "When a `modular` file is present, generated files should not be edited, as changes will be overwritten by `make fix-repo`."
    source:
      path: "CLAUDE.md"
      lines: "67"
      commit: "ed003b4482aabdf8377250f22826dd31f378269c"

  - rule: "PRs should be as brief as possible. Bugfix PRs in particular can often be only one or two lines long, and do not need large comments, docstrings or new functions in this case. Aim to minimize the size of the diff."
    source:
      path: ".github/copilot-instructions.md"
      lines: "15"
      commit: "ed003b4482aabdf8377250f22826dd31f378269c"
