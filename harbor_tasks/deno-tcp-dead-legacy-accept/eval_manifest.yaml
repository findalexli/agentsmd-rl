distractors:
- rule: Keep your changes minimal, don't do drive-by changes in a PR. If you need
    to make a change that is not directly related to the PR, create a separate PR
    for it.
  collision_type: scope_ambiguity
  why_distracting: An agent might interpret updating the lint plugin configuration
    in `tools/lint_plugins/no_deno_api_in_polyfills.ts` as a 'drive-by change' because
    it is outside the primary `ext/node/` directory being modified. However, the prompt
    explicitly requires removing the lint violation entry since the underlying `Deno.listen`
    API usage is being removed.
  severity: high
  source:
    path: CLAUDE.md
    lines: 33-35
hierarchy_analysis: The single `CLAUDE.md` file provides general repository guidelines.
  The instruction to avoid 'drive-by changes' conflicts with the specific PR requirement
  to update a lint plugin configuration file in a separate directory. The explicit
  PR instructions must override the general guideline to keep changes strictly localized.
