version: "2.0"

source:
  repo: "denoland/deno"
  pr: 33172
  base_commit: "ad725eea313df6204d342d84ace4af1b11cc341f"
  merge_commit: "00d46fe27611060fd87432010c401bbb3ca55a6e"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified files must exist and retain core structure (TCP class, listen method, EXPECTED_VIOLATIONS)"

  - id: test_repo_tcp_wrap_imports
    type: pass_to_pass
    origin: repo_tests
    description: "Repo CI: tcp_wrap.ts must import from _listen.ts (ceilPowOf2 used by listen path)"

  - id: test_repo_listen_module_exports
    type: pass_to_pass
    origin: repo_tests
    description: "Repo CI: _listen.ts must export ceilPowOf2 and backoff constants"

  - id: test_repo_lint_plugin_structure
    type: pass_to_pass
    origin: repo_tests
    description: "Repo CI: lint plugin must have valid EXPECTED_VIOLATIONS structure"

  - id: test_repo_tcp_wrap_violation_count
    type: pass_to_pass
    origin: repo_tests
    description: "Repo CI: tcp_wrap.ts Deno.* usage count must match EXPECTED_VIOLATIONS (base: 3, post-fix: 0)"

  - id: test_repo_tcp_wrap_core_imports
    type: pass_to_pass
    origin: repo_tests
    description: "Repo CI: tcp_wrap.ts must have required ext:core/ops and ext:deno_node imports"

  - id: test_repo_listen_module_structure
    type: pass_to_pass
    origin: repo_tests
    description: "Repo CI: _listen.ts must export ceilPowOf2 with correct signature and backoff constants"

  - id: legacy_listen_branch_removed
    type: fail_to_pass
    origin: pr_diff
    description: "listen() must not branch on kUseNativeWrap to a legacy path"

  - id: dead_legacy_methods_removed
    type: fail_to_pass
    origin: pr_diff
    description: "Dead #listenLegacy, #accept, #acceptBackoff methods and Deno.listen usage must be removed"

  - id: lint_violations_updated
    type: fail_to_pass
    origin: pr_diff
    description: "Lint plugin must not list tcp_wrap.ts in EXPECTED_VIOLATIONS with count > 0"

  - id: unused_imports_cleaned
    type: fail_to_pass
    origin: pr_diff
    description: "Imports only used by dead legacy code (delay, INITIAL_ACCEPT_BACKOFF_DELAY, MAX_ACCEPT_BACKOFF_DELAY) must be removed"

rubric: []
