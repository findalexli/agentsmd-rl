      lines: "45"
      commit: "7874d0411c81dcde9c4b08e7e064ca0dbef94e2e"

  - rule: "Frontend code must be formatted with prettier. Run bash scripts/format_frontend.sh before submitting."
    source:
      path: "AGENTS.md"
      lines: "44"
      commit: "7874d0411c81dcde9c4b08e7e064ca0dbef94e2e"
