version: "2.0"

source:
  repo: "gradio-app/gradio"
  pr: 12999
  base_commit: "7874d0411c81dcde9c4b08e7e064ca0dbef94e2e"
  merge_commit: "f32d9d6fd610f5aa06957afb8de4cf66102ee27e"

checks:
  - id: recorder_state_reactive
    type: fail_to_pass
    origin: pr_diff
    description: "Recording state vars (record, seconds, is_recording, has_started, mic_devices, selected_device_id, show_device_selection) must use $state() for Svelte 5 reactivity"

  - id: player_state_reactive
    type: fail_to_pass
    origin: pr_diff
    description: "Playback state vars (playing, duration, currentTime, waveform_ready) must use $state()"

  - id: stop_button_conditional
    type: fail_to_pass
    origin: pr_diff
    description: "Stop button onclick must branch on is_recording: stop if recording, call onclear if not"

  - id: startmic_error_handling
    type: fail_to_pass
    origin: pr_diff
    description: "startMic() call must have .catch() or try/catch error handling"

  - id: recorder_js_balanced
    type: pass_to_pass
    origin: static
    description: "MinimalAudioRecorder <script> has balanced braces/parens (valid syntax skeleton)"

  - id: player_js_balanced
    type: pass_to_pass
    origin: static
    description: "MinimalAudioPlayer <script> has balanced braces/parens (valid syntax skeleton)"

  - id: recorder_not_stub
    type: pass_to_pass
    origin: static
    description: "MinimalAudioRecorder.svelte must have substantial implementation"

  - id: player_not_stub
    type: pass_to_pass
    origin: static
    description: "MinimalAudioPlayer.svelte must have substantial implementation"

  # Repo CI/CD pass_to_pass gates - Using subprocess.run() to execute real CI commands
  - id: test_audio_package_json_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Audio package.json must be valid JSON with required fields (subprocess python3 -c)"

  - id: test_audio_test_file_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Audio component test file must be valid and complete (subprocess python3 -c)"

  - id: test_audio_svelte_syntax_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Svelte files in js/audio must have valid syntax structure (subprocess python3 -c)"

  - id: test_audio_shared_index_exports
    type: pass_to_pass
    origin: repo_tests
    description: "Audio shared/index.ts must exist with valid exports structure (subprocess python3 -c)"

  - id: test_audio_package_structure
    type: pass_to_pass
    origin: repo_tests
    description: "Audio package must have required subdirectories (subprocess python3 -c)"

  - id: test_audio_types_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Audio types.ts must have valid TypeScript type definitions (subprocess python3 -c)"

  - id: test_audio_buffer_util_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Audio buffer utility (audioBufferToWav.ts) must have valid structure (subprocess python3 -c)"

  - id: test_audio_exports_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Audio package main exports (index.ts) must be valid (subprocess python3 -c)"

  - id: test_audio_index_svelte_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Audio Index.svelte main component must have valid structure (subprocess python3 -c)"

  - id: test_audio_recorder_player_exist
    type: pass_to_pass
    origin: repo_tests
    description: "Audio recorder and player Svelte files must exist with valid structure (subprocess python3 -c)"

  - id: test_audio_recorder_svelte5_runes
    type: pass_to_pass
    origin: repo_tests
    description: "Audio MinimalAudioRecorder uses Svelte 5 runes ($props, $bindable, $state) (subprocess python3 -c)"

  - id: test_audio_player_svelte5_runes
    type: pass_to_pass
    origin: repo_tests
    description: "Audio MinimalAudioPlayer uses Svelte 5 runes ($props, $derived) (subprocess python3 -c)"

rubric:
  - rule: "Follow existing code style. Be consistent with the style of the surrounding code."
    source:
