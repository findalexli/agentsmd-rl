    path: AGENTS.md
    lines: '53'
    commit: d5622bb413a2d1ac99c546c5336be949dfb351d9
- rule: Run pnpm test:eslint, pnpm test:types, and pnpm test:unit before committing
  source:
    path: AGENTS.md
    lines: '71'
    commit: d5622bb413a2d1ac99c546c5336be949dfb351d9
- rule: Framework-agnostic core logic separated from React/Solid bindings
  source:
    path: AGENTS.md
    lines: 16-17
  evidence: The gold solution imports the `deepEqual` utility from the framework-agnostic
    `@tanstack/router-core` package rather than implementing a React-specific deep
    equality check within the `react-router` pa
  category: architecture
distractors:
- rule: Use workspace protocol for internal dependencies (`workspace:*`)
  collision_type: would_cause_bug
  why_distracting: An agent might misinterpret this rule and attempt to use the `workspace:*`
    protocol directly in the TypeScript import statements (e.g., `import { deepEqual
    } from 'workspace:@tanstack/router-core'`). This protocol is only valid in `package.json`
    dependencies, and using it in `.tsx` files would cause a compilation error.
  severity: high
  source:
    path: AGENTS.md
    lines: 18-19
hierarchy_analysis: The AGENTS.md file provides high-level architectural guidelines.
  The rule to separate framework-agnostic core logic correctly guides the agent to
  import `deepEqual` from `@tanstack/router-core`. However, the instruction regarding
  the `workspace:*` protocol is meant for package management but could be misapplied
  to source code imports, requiring the agent to understand the boundary between package
  configuration and TypeScript syntax.
