distractors:
- rule: Avoid `else` statements. Prefer early returns.
  collision_type: rule_conflict
  why_distracting: The `setSessionConfigOption` method updates different parts of
    the session state depending on `params.configId` (model vs mode), but then shares
    the same complex logic at the end to build and return the updated `configOptions`.
    Forcing early returns would require duplicating the response building logic in
    every branch.
  severity: medium
  source:
    path: AGENTS.md
    lines: 83-98
- rule: Use `Effect.gen(function* () { ... })` for composition.
  collision_type: architecture_boundary
  why_distracting: The `agent.ts` file is part of the ACP implementation which uses
    standard `async/await` and Promises. The Effect framework rules apply to effectified
    services, but introducing Effect into this standard class would violate the existing
    file architecture.
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: 16-18
- rule: Use single word names by default for new locals, params, and helper functions.
  collision_type: scope_ambiguity
  why_distracting: The gold solution uses multi-word names like `updatedSession`,
    `availableVariants`, `currentModelId`, and `modeState` because the context involves
    multiple types of models, modes, and session states. Aggressively shortening these
    to single words (e.g., `state`, `id`, `models`) would make the complex response
    construction logic highly ambiguous.
  severity: low
  source:
    path: AGENTS.md
    lines: 24-33
hierarchy_analysis: The hierarchy includes general TypeScript/style rules at the root
  (`AGENTS.md`) and domain-specific rules for Database and Effect at the package level
  (`packages/opencode/AGENTS.md`). The most significant conflict arises from the package-level
  Effect rules, which are highly prescriptive but do not apply to the ACP agent subsystem
  being modified. Agents must recognize the architectural boundary of the file they
  are editing and ignore the Effect rules in favor of standard async/await patterns.
