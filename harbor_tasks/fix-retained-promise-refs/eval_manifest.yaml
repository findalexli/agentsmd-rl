rubric:
- rule: Use TypeScript strict mode with extensive type safety. Core logic should be
    framework-agnostic and separated from React/Solid bindings.
  source:
    path: AGENTS.md
    lines: 18-23
    commit: a0a6aa8b8ad801f0a364b6c27722d5a929c14e70
- rule: Always run unit and type tests during development. Use the efficient targeted
    testing workflow via Nx (specific packages → files → patterns).
  source:
    path: AGENTS.md
    lines: 51-67
    commit: a0a6aa8b8ad801f0a364b6c27722d5a929c14e70
- rule: Run pnpm test:eslint, pnpm test:types, and pnpm test:unit before committing
    changes.
  source:
    path: AGENTS.md
    lines: 69-75
    commit: a0a6aa8b8ad801f0a364b6c27722d5a929c14e70
- rule: Always prefer `pnpm nx ...` over `npx nx ...` and prefer Nx targets.
  source:
    path: AGENTS.md
    lines: 36-37
  evidence: The gold solution rebuilds the package using `pnpm nx run @tanstack/router-core:build`
    rather than using `npx` or a direct build script.
  category: tooling
- rule: Framework-agnostic core logic separated from React/Solid bindings
  source:
    path: AGENTS.md
    lines: 15-15
  evidence: The memory leak fix is applied directly to `packages/router-core/src/load-matches.ts`
    and `router.ts`, keeping the core promise management logic framework-agnostic.
  category: architecture
- rule: Run only one Nx command at a time.
  source:
    path: AGENTS.md
    lines: 40-40
  evidence: The gold solution script executes exactly one Nx command (`pnpm nx run
    @tanstack/router-core:build`) at the end of the script.
  category: tooling
distractors:
- rule: Always run unit and type tests during development - do not proceed if they
    fail
  collision_type: scope_ambiguity
  why_distracting: The agent might try to run the full test suite (`pnpm test:unit`,
    `pnpm test:types`) or targeted Nx test commands inside the solution script. While
    the prompt mentions these in the testing instructions, the gold solution script
    only runs the build command. Adding test commands to the evaluation script might
    cause timeouts or unrelated failures in a sandbox environment.
  severity: medium
  source:
    path: AGENTS.md
    lines: 46-46
hierarchy_analysis: The AGENTS.md file provides general monorepo guidelines. The agent
  must balance the strict testing requirements with the practical scope of a patch
  script, adhering to the tooling preferences (pnpm nx) without over-complicating
  the execution environment.
version: '2.0'
