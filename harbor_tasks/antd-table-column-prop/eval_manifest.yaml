manifest_version: "1.0"
source_pr:
  url: "https://github.com/ant-design/ant-design/pull/57545"
  title: "feat: support column for Table"
  description: |
    This PR adds a `column` property to the Table component that provides
    shared default column props. When a column doesn't explicitly define a
    property, it inherits from the `column` default. Single columns can
    still override these defaults.

  base_commit: "b73b49c02f70e54ffc67c6e7ec895ec8d62378f3"
  merge_commit: "1b5323ef1771c54441d386b6dbe14240e7ae7ca3"

# Checks that must pass for the task to be considered complete
checks:
  # Fail-to-pass tests (verify the bug is fixed)
  - id: "typescript_compiles"
    description: "TypeScript must compile without errors"
    test: "test_typescript_compiles"
    type: "f2p"

  - id: "hook_exists"
    description: "useFilledColumns hook file must exist"
    test: "test_use_filled_columns_hook_exists"
    type: "f2p"

  - id: "internal_table_imports"
    description: "InternalTable must import and use the hook"
    test: "test_internal_table_imports_hook"
    type: "f2p"

  - id: "column_in_interface"
    description: "TableProps interface must include column property"
    test: "test_column_prop_in_interface"
    type: "f2p"

  - id: "column_destructured"
    description: "column prop must be destructured in component"
    test: "test_column_prop_destructured"
    type: "f2p"

  - id: "raw_columns_pattern"
    description: "rawColumns must be renamed and useFilledColumns applied"
    test: "test_raw_columns_renaming"
    type: "f2p"

  - id: "table_props_omit"
    description: "tableProps must omit column to avoid passing to rc-table"
    test: "test_table_props_omits_column"
    type: "f2p"

  # Pass-to-pass tests (verify correct implementation details)
  - id: "special_columns_preserved"
    description: "Hook must preserve SELECTION_COLUMN and EXPAND_COLUMN"
    test: "test_hook_preserves_special_columns"
    type: "p2p"

  - id: "nested_columns"
    description: "Hook must recursively process nested column groups"
    test: "test_hook_handles_nested_columns"
    type: "p2p"

  - id: "children_omitted"
    description: "Hook must omit children when merging"
    test: "test_hook_omits_children_from_merge"
    type: "p2p"

  - id: "early_return"
    description: "Hook must return columns unchanged when no defaults"
    test: "test_hook_returns_columns_unchanged_when_no_defaults"
    type: "p2p"

# Agent configuration rules that apply to this task
# These are programmatic rules from CLAUDE.md / AGENTS.md
agent_config:
  - rule: "test_imports_relative"
    description: "Test files must use relative imports"
    source: "CLAUDE.md - Test import规范"
    check: |
      Files in components/**/__tests__/ must use relative imports
      (.., ../index, ../../_util/*, ../../../tests/shared/*)
      and NOT absolute paths like antd, antd/es/*, etc.
    programmatic: false  # Soft rule - would need AST parsing

  - rule: "typescript_strict"
    description: "Use strict TypeScript with no 'any' types"
    source: ".github/copilot-instructions.md"
    check: "TypeScript compilation test"
    programmatic: true

# Rubric for LLM evaluation of soft/subjective rules
rubric: []
