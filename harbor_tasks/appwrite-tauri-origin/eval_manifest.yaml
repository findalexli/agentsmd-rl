distractors:
- rule: Comprehensive PHPDoc comments
  collision_type: rule_conflict
  why_distracting: The agent might try to add a PHPDoc comment specifically for the
    new `SCHEME_TAURI` constant. However, the surrounding constants (`SCHEME_ANDROID`,
    `SCHEME_WINDOWS`, etc.) do not have individual PHPDoc comments, so adding one
    would violate local file consistency.
  severity: medium
  source:
    path: AGENTS.md
    lines: 23-24
- rule: Update documentation if adding features
  collision_type: scope_ambiguity
  why_distracting: The agent might consider adding Tauri support as a 'feature' and
    attempt to search for and update documentation files. In this specific PR, only
    the validator and its tests need to be updated.
  severity: low
  source:
    path: AGENTS.md
    lines: 71-72
hierarchy_analysis: The configuration hierarchy is flat, with `CLAUDE.md` simply including
  `AGENTS.md`. The rules in `AGENTS.md` are general project guidelines. The agent
  must balance global rules like 'Comprehensive PHPDoc comments' against local file
  consistency, as the existing constants in `Platform.php` do not use individual PHPDocs.
