source_pr:
  owner: appwrite
  repo: appwrite
  pr_number: 11589
  base_commit: 1aa2c7ff2b5216803cb50c0faea58ce2ae380b3f
  merge_commit: c537d09b5c4184ac9ababcdc61f870233af6bcc8

checks:
  - id: test_php_syntax_valid
    type: pytest
    weight: 0.5
    description: "Modified PHP files have valid syntax"

  - id: test_tauri_localhost_valid
    type: pytest
    weight: 1.0
    description: "tauri://localhost should be valid when localhost is in allowed hostnames"

  - id: test_tauri_unregistered_host_invalid
    type: pytest
    weight: 1.0
    description: "tauri://example.com should be invalid with proper error message referencing Web (Tauri)"

  - id: test_tauri_different_hosts
    type: pytest
    weight: 1.0
    description: "tauri:// scheme works with various registered and unregistered hostnames"

  - id: test_tauri_constant_exists
    type: pytest
    weight: 0.5
    description: "SCHEME_TAURI constant is defined in Platform class"

  - id: test_tauri_platform_name
    type: pytest
    weight: 0.5
    description: "Tauri platform name mapping exists as 'Web (Tauri)'"

  - id: test_other_web_platforms_still_work
    type: pytest
    weight: 1.0
    description: "Existing web platform validations (http, https, extensions) still work"

  - id: test_unit_tests_pass
    type: pytest
    weight: 1.0
    description: "Repository's own OriginTest.php unit tests pass"

  - id: test_composer_validate_p2p
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's composer.json is valid"

  - id: test_unit_tests_network_p2p
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's Network unit tests pass"

  - id: test_phpstan_network_p2p
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's PHPStan static analysis passes on Network directory"

  - id: test_pint_lint_network_p2p
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's Pint lint check passes on Network directory"


  - id: test_composer_audit_p2p
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's composer dependencies pass security audit"

  - id: test_cors_unit_tests_p2p
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's CORS unit tests pass"

  - id: test_email_validator_unit_tests_p2p
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's Email validator unit tests pass"
agent_config:
  - rule: "Code should follow PSR-12 coding standard"
    check: test_unit_tests_pass  # PHPUnit includes style checks indirectly
    source: AGENTS.md

  - rule: "Add/update tests for your changes"
    check: test_tauri_localhost_valid
    source: AGENTS.md

rubric:
  - rule: "Use comprehensive PHPDoc comments for new constants and methods"
    source:
      path: "AGENTS.md"
      lines: "43"
      commit: "1aa2c7ff2b5216803cb50c0faea58ce2ae380b3f"

  - rule: "Follow existing code style. Check neighboring files for patterns when adding new constants or mappings."
    source:
      path: "AGENTS.md"
      lines: "39-43"
      commit: "1aa2c7ff2b5216803cb50c0faea58ce2ae380b3f"

  - rule: "Update documentation if adding features. New platform schemes should be properly documented following existing patterns."
    source:
      path: "AGENTS.md"
      lines: "85"
      commit: "1aa2c7ff2b5216803cb50c0faea58ce2ae380b3f"
