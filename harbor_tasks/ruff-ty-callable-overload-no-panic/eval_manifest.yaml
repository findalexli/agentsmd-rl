rubric:
- id: agent_config_no_panic_unwrap_unreachable
  source:
    origin: agent_config
    lines: '79'
    commit: 61f9a0a5763fb068cd2f26c0ee9d63a277fb26c2
    path: AGENTS.md
  rule: 'AGENTS.md: "Try hard to avoid patterns that require `panic!`, `unreachable!`, or `.unwrap()`. Instead, try to encode those constraints in the type system." The fix MUST remove the existing `panic!`. The replacement MUST NOT introduce a new `panic!`, `unreachable!`, or `.unwrap()` on the same code path.

    '
- id: agent_config_let_chains_preferred
  source:
    origin: agent_config
    lines: '80'
    commit: 61f9a0a5763fb068cd2f26c0ee9d63a277fb26c2
    path: AGENTS.md
  rule: 'AGENTS.md: "Prefer let chains (`if let` combined with `&&`) over nested `if let` statements to reduce indentation and improve readability." The surrounding code in builder.rs already uses a let-chain — the fix must not break this pattern (e.g. by re-nesting the chain into separate `if let` statements).

    '
- id: agent_config_top_level_imports
  source:
    origin: agent_config
    lines: '76'
    commit: 61f9a0a5763fb068cd2f26c0ee9d63a277fb26c2
    path: AGENTS.md
  rule: 'AGENTS.md: "Rust imports should always go at the top of the file, never locally in functions." The fix must not add `use` statements inside the function body.

    '
- id: agent_config_purposeful_comments
  source:
    origin: agent_config
    lines: '82'
    commit: 61f9a0a5763fb068cd2f26c0ee9d63a277fb26c2
    path: AGENTS.md
  rule: 'AGENTS.md: "Use comments purposefully. Don''t use comments to narrate code, but do use them to explain invariants and why something unusual was done a particular way." Any new comment at the fall-through (e.g. a TODO about multi-overload inference) should explain *why* the case is deferred, not just what the code does.

    '
- id: agent_config_avoid_significant_new_code
  source:
    origin: agent_config
    lines: '78'
    commit: 61f9a0a5763fb068cd2f26c0ee9d63a277fb26c2
    path: AGENTS.md
  rule: 'AGENTS.md: "Avoid writing significant amounts of new code. This is often a sign that we''re missing an existing method or mechanism." The fix should be small and local — it must not introduce a new multi-inference machinery to handle the deferred case. The original PR fix is ~7 lines; a fix substantially larger than that should be flagged.

    '
