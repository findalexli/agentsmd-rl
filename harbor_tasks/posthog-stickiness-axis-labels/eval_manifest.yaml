rubric:
- rule: Code changes implement the numericTickPrefix feature correctly with proper TypeScript typing and test coverage
  description: 'The solution must:

    1. Add numericTickPrefix?: string to CreateXAxisTickCallbackArgs interface in dates.ts

    2. Update the return function to prefix values when numericTickPrefix is provided

    3. Wire isStickiness logic in LineGraph.tsx to pass the formatted prefix

    4. Add test cases in dates.test.ts for the new functionality

    5. Maintain backward compatibility when numericTickPrefix is not provided

    '
  source:
    path: frontend/src/lib/charts/utils/dates.ts
  reference: 'Target files and expected changes:


    FILE: frontend/src/lib/charts/utils/dates.ts

    - Add to interface: numericTickPrefix?: string

    - Update return: (value) => (numericTickPrefix ? `${numericTickPrefix} ${String(value)}` : String(value))


    FILE: frontend/src/scenes/insights/views/LineGraph/LineGraph.tsx

    - Add isStickiness to destructured values from insightVizDataLogic

    - Pass numericTickPrefix to createXAxisTickCallback when isStickiness is true


    FILE: frontend/src/lib/charts/utils/dates.test.ts

    - Add test: ''formats numbers with a prefix when provided''

    - Test verifies callback(1, 0) returns ''Day 1'' when numericTickPrefix is ''Day''

    '
distractors:
- rule: Django serializers are the source of truth for frontend API types
  collision_type: architecture_boundary
  why_distracting: The agent might assume that the stickiness interval data needs to be formatted on the backend and try to modify Django serializers to return formatted strings, rather than handling the presentation logic in the frontend line graph component.
  severity: high
  source:
    path: AGENTS.md
    lines: 61-63
- rule: 'Scope convention: use `llma` for LLM analytics changes'
  collision_type: scope_ambiguity
  why_distracting: The agent might misinterpret the scope of the PR and use the `llma` scope in the commit message, which is strictly reserved for LLM analytics, not general stickiness insights.
  severity: low
  source:
    path: AGENTS.md
    lines: 38-38
