rubric:
- rule: Code changes must follow existing codebase patterns and pass all functional
    tests
  description: Gold solution passes all 10 tests - fail-to-pass and pass-to-pass
- rule: 'Universal: `hogli test <file_or_directory>` — auto-detects test type'
  source:
    path: AGENTS.md
    lines: 15-16
  evidence: The gold solution updates `frontend/src/lib/charts/utils/dates.test.ts`
    to verify the new `numericTickPrefix` behavior, demonstrating the need to run
    frontend tests using the specified `hogli test` co
  category: testing
- rule: 'TypeScript check: `pnpm --filter=@posthog/frontend typescript:check`'
  source:
    path: AGENTS.md
    lines: 23-23
  evidence: 'The gold solution correctly updates the `CreateXAxisTickCallbackArgs`
    interface in `dates.ts` with `numericTickPrefix?: string` and passes it in `LineGraph.tsx`,
    ensuring the required TypeScript check'
  category: tooling
distractors:
- rule: Django serializers are the source of truth for frontend API types — `hogli
    build:openapi` generates TypeScript
  collision_type: architecture_boundary
  why_distracting: The agent might attempt to modify the backend API to return pre-formatted
    interval strings (e.g., 'Day 1') instead of numbers, and then regenerate the frontend
    types. This would violate the architecture boundary, as the backend should return
    raw data and the frontend should handle presentation formatting.
  severity: high
  source:
    path: AGENTS.md
    lines: 61-61
- rule: 'Scope convention: use `llma` for LLM analytics changes'
  collision_type: scope_ambiguity
  why_distracting: The agent might see 'insights' and 'analytics' in the issue description
    and incorrectly apply the `llma` scope to its commit or PR title, even though
    this is a core product feature (stickiness), not LLM analytics.
  severity: low
  source:
    path: AGENTS.md
    lines: 38-38
- rule: Never use `flox activate` in interactive sessions (it hangs)
  collision_type: would_cause_bug
  why_distracting: The agent might naturally try to run `flox activate` to set up
    its environment before running frontend tests or type checks, which will cause
    the terminal to hang and prevent task completion. It must use the `flox activate
    -- bash -c` pattern instead.
  severity: high
  source:
    path: .cursorrules
    lines: 21-22
hierarchy_analysis: The `.cursorrules` file provides general agent behavior and flox
  environment rules, while `AGENTS.md` provides PostHog-specific architecture and
  command guidelines. `CLAUDE.md` simply points to `AGENTS.md`. The agent must synthesize
  the flox command wrapper from `.cursorrules` with the `hogli` and `pnpm` commands
  from `AGENTS.md` (e.g., `flox activate -- bash -c "hogli test frontend/src/lib/charts/utils/dates.test.ts"`).
