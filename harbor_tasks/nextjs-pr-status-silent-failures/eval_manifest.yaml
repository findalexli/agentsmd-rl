rubric:
- rule: Split work into smaller, individually verifiable tasks. Before starting, break
    the overall goal into incremental steps where each step produces a result that
    can be checked independently. Verify each task before moving on to the next.
  source:
    path: CLAUDE.md
    lines: 340-350
    commit: 3421858b5bef076965d99fd88fedc483193a496e
- rule: Use context-efficient workflows for external API calls. Save responses to
    variables or files, then analyze without re-fetching. Do not re-fetch the same
    API data to analyze from different angles.
  source:
    path: CLAUDE.md
    lines: 290-295
    commit: 3421858b5bef076965d99fd88fedc483193a496e
- rule: Always treat environment variable values as sensitive unless they are known
    test-mode flags. Never print or paste secret values (tokens, API keys, cookies)
    in responses, commits, or shared logs.
  source:
    path: CLAUDE.md
    lines: 265-270
    commit: 3421858b5bef076965d99fd88fedc483193a496e
- rule: Do NOT add 'Generated with Claude Code' or co-author footers to commits or
    PRs. Keep commit messages concise and descriptive.
  source:
    path: CLAUDE.md
    lines: 305-310
    commit: 3421858b5bef076965d99fd88fedc483193a496e
- rule: 'Monorepo Overview: scripts/ - Build and maintenance scripts'
  source:
    path: CLAUDE.md
    lines: 13-22
  evidence: The gold solution correctly targets `scripts/pr-status.js` to fix the
    CI analysis bug, aligning with the documented monorepo structure where build and
    maintenance scripts reside in the `scripts/` dire
  category: architecture
distractors:
- rule: 'Start watch build in background: pnpm --filter=next dev'
  collision_type: scope_ambiguity
  why_distracting: The rule instructs the agent to start `pnpm --filter=next dev`
    when changing Next.js source or integration tests. An agent might mistakenly apply
    this to `scripts/pr-status.js`, wasting time starting a dev server for a standalone
    CI script instead of recognizing it as a 'CI-only analysis' exception.
  severity: high
  source:
    path: CLAUDE.md
    lines: 65-72
- rule: 'Always run a full bootstrap build after switching branches: pnpm build-all'
  collision_type: scope_ambiguity
  why_distracting: The rule requires running `pnpm build-all` after switching branches.
    An agent might think it needs to bootstrap the entire workspace (including Rust
    crates) just to run and test a standalone Node.js script, leading to unnecessary
    build times.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 84-89
hierarchy_analysis: CLAUDE.md and AGENTS.md are identical symlinks containing the
  same rules. The rules primarily focus on the core Next.js framework (`packages/next`)
  and its build/test workflow. The agent must recognize that `scripts/pr-status.js`
  falls outside the scope of the core framework's dev server and build requirements,
  and instead treat it as a standalone Node script.
