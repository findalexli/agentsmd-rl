    description: "getFailedJobs must include conclusion field in returned job objects"

  - id: conclusion_annotation_in_report
    type: fail_to_pass
    origin: pr_diff
    description: "Report table must annotate non-failure conclusions like (timed_out)"

  - id: flaky_detection_includes_timed_out
    type: fail_to_pass
