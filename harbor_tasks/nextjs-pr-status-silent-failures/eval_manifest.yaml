    description: "pr-status.js must not reference obviously undefined variables"

  - id: test_pr_status_js_no_syntax_errors_strict_mode
    type: pass_to_pass
    origin: repo_tests
    description: "pr-status.js must parse without errors in strict mode"

  - id: test_repo_pr_status_script_structure
    type: pass_to_pass
    origin: repo_tests
    description: "pr-status.js must have expected structure and exports"

  - id: test_repo_pr_status_no_banned_patterns
    type: pass_to_pass
    origin: repo_tests
    description: "pr-status.js must not contain banned/unsafe patterns"

  - id: test_repo_pr_status_has_required_helpers
    type: pass_to_pass
    origin: repo_tests
    description: "pr-status.js must have all required helper functions"

  - id: test_repo_pr_status_uses_strict_mode_compatible_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "pr-status.js must use syntax compatible with strict mode"

  - id: test_repo_node_syntax_check_pr_status
    type: pass_to_pass
    origin: repo_tests
    description: "JavaScript syntax check on pr-status.js via node --check must pass"

  - id: test_repo_prettier_check_pr_status
    type: pass_to_pass
