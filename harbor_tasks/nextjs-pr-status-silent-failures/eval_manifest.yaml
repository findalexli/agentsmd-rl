  - id: categorize_failure_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "categorizeJobs must still correctly classify failure and success conclusions"

rubric:
  - rule: "Split work into smaller, individually verifiable tasks. Before starting, break the overall goal into incremental steps where each step produces a result that can be checked independently. Verify each task before moving on to the next."
    source:
