      lines: "340-350"
      commit: "3421858b5bef076965d99fd88fedc483193a496e"
  - rule: "Use context-efficient workflows for external API calls. Save responses to variables or files, then analyze without re-fetching. Do not re-fetch the same API data to analyze from different angles."
    source:
      path: "CLAUDE.md"
      lines: "290-295"
      commit: "3421858b5bef076965d99fd88fedc483193a496e"
  - rule: "Always treat environment variable values as sensitive unless they are known test-mode flags. Never print or paste secret values (tokens, API keys, cookies) in responses, commits, or shared logs."
    source:
      path: "CLAUDE.md"
      lines: "265-270"
      commit: "3421858b5bef076965d99fd88fedc483193a496e"
  - rule: "Do NOT add 'Generated with Claude Code' or co-author footers to commits or PRs. Keep commit messages concise and descriptive."
    source:
