hierarchy_analysis: The hierarchy progresses from general Bun development (`CLAUDE.md`)
  to Zig specifics (`src/CLAUDE.md`) to JS builtins (`src/js/CLAUDE.md`). For this
  PR, the JS builtins config is the most relevant since the fix is entirely within
