distractors:
- rule: 'CRITICAL: Use `.$call` and `.$apply`, never `.call` or `.apply` for tamper-proof
    function calls.'
  collision_type: scope_ambiguity
  why_distracting: The agent might see the need to call `defaultResultOrder` and think
    it must use `defaultResultOrder.$call()` to be 'tamper-proof'. However, `defaultResultOrder`
    is an internal function, not a user-provided callback, so a standard function
    call `defaultResultOrder()` is correct.
  severity: medium
  source:
    path: src/js/CLAUDE.md
    lines: 45-55
- rule: Modules are NOT ES modules; export via `export default {}`.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to refactor the `promises` object or the file's
    exports to strictly match the `export default {}` pattern shown in the docs, which
    would break the existing module structure in `dns.ts`.
  severity: low
  source:
    path: src/js/CLAUDE.md
    lines: 14-23
