    type: fail_to_pass
    origin: pr_diff
    description: "Autofix for aliased anyio produces anyio.lowlevel.checkpoint() call"

  - id: anyio_direct_uses_submodule_import
    type: fail_to_pass
    origin: pr_diff
    description: "Autofix for direct anyio.sleep(0) uses submodule import"

  - id: anyio_from_import_uses_submodule_import
    type: fail_to_pass
    origin: pr_diff
