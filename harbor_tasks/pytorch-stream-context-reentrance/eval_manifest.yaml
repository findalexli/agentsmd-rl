distractors:
- rule: Minimize comments; be concise; code should be self-explanatory and self-documenting.
  collision_type: rule_conflict
  why_distracting: The agent might omit the crucial explanatory comment block about
    the C++ implementation of the Python context manager stack, resulting in code
    that is hard to understand for future maintainers.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 57-57
- rule: 'Prefer clear abstractions. State management should be explicit. For example,
    if managing state in a Python class: there should be a clear class definition...'
  collision_type: architecture_boundary
  why_distracting: The agent might try to implement a complex C++ struct or class
    for the context stack to make state management ''explicit'', instead of simply
    using a `PyList` to store the state, which is the standard and correct way to
    handle Python object state in C extensions.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 62-65
- rule: Only use commands provided via spin for linting.
  collision_type: rule_conflict
  why_distracting: CLAUDE.md says to use spin for linting, but the task uses lintrunner
    checks directly. The gold solution adds comments explaining the implementation,
    which is a valid approach.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 55-56
- rule: Write docstrings for PyTorch functions and methods following PyTorch conventions.
  source:
    path: .claude/skills/docstring/SKILL.md
    lines: 1-3
  collision_type: architecture_boundary
  why_distracting: The agent might attempt to add Python docstrings to the C++ `THPStream_enter`
    or `THPStream_dealloc` functions, which is inappropriate for C++ Python bindings.
  severity: medium
hierarchy_analysis: Both AGENTS.md and CLAUDE.md reside at the root level but contain
  conflicting instructions regarding tooling (linting with `lintrunner` vs `spin`,
  and building with `setup.py` vs `pip install`). The agent must navigate these conflicts
  and choose the correct toolchain for the PyTorch repository.
