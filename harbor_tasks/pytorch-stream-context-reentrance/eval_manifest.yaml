version: "2.0"

source:
  repo: "pytorch/pytorch"
  pr: 176603
  base_commit: "3c40486f8a515b3f6f851a0cc4b3a2dc07744f6c"
  merge_commit: "f31baaae5d066cf833ac96a270495d71bdc1d508"

checks:
  - id: file_exists_and_has_functions
    type: pass_to_pass
    origin: static
    description: "Target file exists with required function definitions and is not a stub"

  - id: reentrance_assertion_removed
    type: fail_to_pass
    origin: pr_diff
    description: "TORCH_CHECK assertion blocking reentrant stream context usage must be removed"

  - id: context_uses_stack
    type: fail_to_pass
    origin: pr_diff
    description: "Context management uses a stack/list structure instead of single-dict assignment"

  - id: enter_pushes_to_stack
    type: fail_to_pass
    origin: pr_diff
    description: "enter() saves current stream state by pushing to stack before setting new stream"

  - id: exit_pops_from_stack
    type: fail_to_pass
    origin: pr_diff
    description: "exit() pops state from stack and restores previous stream without wiping entire stack"

  - id: dealloc_clears_context
    type: fail_to_pass
    origin: pr_diff
    description: "Destructor clears self->context to prevent memory leak"

  - id: noop_when_stream_already_current
    type: fail_to_pass
    origin: pr_diff
    description: "enter() has a no-op fast path when the stream is already current (sentinel instead of redundant switch)"

  - id: enter_exit_not_stub
    type: pass_to_pass
    origin: static
    description: "enter() and exit() have substantial implementations with real logic"

  - id: error_handling_macros
    type: pass_to_pass
    origin: agent_config
    description: "Entry points use HANDLE_TH_ERRORS / END_HANDLE_TH_ERRORS for exception conversion"
    source:
      path: ".github/copilot-instructions.md"
      lines: "91"
      commit: "3c40486f8a515b3f6f851a0cc4b3a2dc07744f6c"

  - id: python_h_included_first
    type: pass_to_pass
    origin: agent_config
    description: "Python.h must be the first include in torch/csrc/ files to avoid _XOPEN_SOURCE redefinition errors"
    source:
      path: ".github/copilot-instructions.md"
      lines: "89"
      commit: "3c40486f8a515b3f6f851a0cc4b3a2dc07744f6c"

