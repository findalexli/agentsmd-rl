# Rules from repo agent configs, evaluated by LLM judge.
# Base commit: 3c40486f8a515b3f6f851a0cc4b3a2dc07744f6c
# PR touches: torch/csrc/Stream.cpp (Python-C++ bindings)
rules:
  - rule: "Minimize comments; be concise; code should be self-explanatory and self-documenting."
    from: "CLAUDE.md:48"

  - rule: "Comments should be useful, for example, comments that remind the reader about some global context that is non-obvious and can't be inferred locally."
    from: "CLAUDE.md:49-50"

  - rule: "Don't make trivial (1-2 LOC) helper functions that are only used once unless it significantly improves code readability."
    from: "CLAUDE.md:51-52"

  - rule: "Prefer clear abstractions. State management should be explicit."
    from: "CLAUDE.md:53"

  - rule: "Match existing code style and architectural patterns."
    from: "CLAUDE.md:57"

  - rule: "If uncertain, choose the simpler, more concise implementation."
    from: "CLAUDE.md:62"

  - rule: "Always include `Python.h` **first** to avoid `_XOPEN_SOURCE` redefinition errors"
    from: ".github/copilot-instructions.md:89"

  - rule: "Use `pybind11::gil_scoped_acquire` before calling Python API or using `THPObjectPtr`"
    from: ".github/copilot-instructions.md:90"

  - rule: "Wrap entry points with `HANDLE_TH_ERRORS` / `END_HANDLE_TH_ERRORS` for exception conversion"
    from: ".github/copilot-instructions.md:91"

  - rule: "Use `TORCH_API` macros for exported symbols (required on Windows, optional on Linux)"
    from: ".github/copilot-instructions.md:113"
