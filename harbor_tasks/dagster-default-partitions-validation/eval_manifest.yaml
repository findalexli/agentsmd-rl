source_pr:
  owner: dagster-io
  repo: dagster
  number: 33335
  merge_commit: a8489c31b7762a79def57643bf38e7a17190c8e9
  base_commit: 3fc2834d865a46aa88a3271159edf52c5a0f07f2

checks:
  # Fail-to-pass tests - core validation behavior
  - id: test_default_subset_with_invalid_keys
    type: fail_to_pass
    origin: behavioral
    description: DefaultPartitionsSubset with non-time keys should NOT be compatible with TimeWindowPartitionsDefinition

  - id: test_default_subset_with_valid_keys
    type: fail_to_pass
    origin: behavioral
    description: DefaultPartitionsSubset with valid time keys should be compatible with TimeWindowPartitionsDefinition

  - id: test_default_subset_with_mixed_keys
    type: fail_to_pass
    origin: behavioral
    description: DefaultPartitionsSubset with mixed keys (some valid, some invalid) should NOT be compatible

  - id: test_default_subset_with_out_of_range_keys
    type: fail_to_pass
    origin: behavioral
    description: DefaultPartitionsSubset with keys outside the partition range should NOT be compatible

  - id: test_various_time_formats
    type: fail_to_pass
    origin: behavioral
    description: Validation works correctly for various time window formats (hourly, monthly)

  - id: test_empty_subset
    type: fail_to_pass
    origin: behavioral
    description: Empty DefaultPartitionsSubset should be compatible (edge case)

  # Pass-to-pass tests - repo quality
  - id: test_repo_ruff
    type: pass_to_pass
    origin: repo_tests
    description: Repo's ruff linter passes

  - id: test_repo_ruff_check
    type: pass_to_pass
    origin: repo_tests
    description: Repo's ruff check passes (read-only lint check)

  - id: test_upstream_tests
    type: pass_to_pass
    origin: repo_tests
    description: Upstream tests for serializable_entity_subset pass (no regressions)

  - id: test_partitions_subset
    type: pass_to_pass
    origin: repo_tests
    description: Partition subset tests pass (related to PR changes)

  - id: test_core_partition
    type: pass_to_pass
    origin: repo_tests
    description: Core partition tests pass (related to PR changes)

# Rubric from agent config files
rubric:
  - rule: "Use @record instead of @dataclass for data structures"
    type: soft
    source: "CLAUDE.md:.claude/coding_conventions.md"
    description: "Data structures should use @record from dagster_shared.record"

  - rule: "Use built-in generic types (list[str], dict[str, Any]) instead of typing.Dict, typing.List"
    type: soft
    source: "CLAUDE.md:.claude/coding_conventions.md"
    description: "Type annotations should use Python 3.9+ built-in generics"

  - rule: "Use top-level (module-scoped) imports - avoid function-scoped imports except for circular imports or TYPE_CHECKING"
    type: soft
    source: "CLAUDE.md:.claude/coding_conventions.md"
    description: "Imports should be at module level unless there's a specific reason"

  - rule: "After ANY Python code changes, ALWAYS run make ruff"
    type: soft
    source: "CLAUDE.md"
    description: "Code quality checks must be run after changes"

  - rule: "Use dagster._check methods over raw assertions for validation"
    type: soft
    source: "CLAUDE.md:.claude/coding_conventions.md"
    description: "Prefer check.not_none(), check.str_param(), etc. over assert statements"

  - rule: "Avoid try/except for basic logic flow when types provide the information"
    type: soft
    source: "CLAUDE.md:.claude/coding_conventions.md"
    description: "Use direct logic with type-safe operations rather than exception handling"

  - rule: "ALWAYS use membership testing (in) before accessing dictionary keys instead of catching KeyError"
    type: soft
    source: "CLAUDE.md:.claude/coding_conventions.md"
    description: "Check key existence before access rather than using exceptions for control flow"
