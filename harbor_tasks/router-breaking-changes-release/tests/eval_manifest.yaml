task:
  id: router-breaking-changes-release
  name: Support semver breaking changes in release notes
  source_pr: TanStack/router#6963
  base_commit: cd7116b53b7ba3152129b5c656dfcaeb0d62c5b8
  merge_commit: 1340197f636911b6ba4224704a6f3bd8b86a1db6

checks:
  # Fail-to-pass tests
  - id: test_conventional_commit_regex_breaking
    type: fail_to_pass
    origin: programmatic
    description: Regex should capture optional ! before colon for breaking changes

  - id: test_type_order_includes_breaking
    type: fail_to_pass
    origin: programmatic
    description: 'breaking' type should be included in typeOrder array

  - id: test_type_labels_includes_breaking
    type: fail_to_pass
    origin: programmatic
    description: 'breaking' type should have a label defined

  - id: test_bucket_logic_for_breaking_changes
    type: fail_to_pass
    origin: programmatic
    description: Breaking changes should be assigned to 'breaking' bucket using bucket logic

  - id: test_regex_index_updated_for_message
    type: fail_to_pass
    origin: programmatic
    description: Message extraction should use regex group 4 after adding ! capture group

  - id: test_breaking_change_parsing_simulation
    type: fail_to_pass
    origin: programmatic
    description: Breaking change parsing simulation should correctly categorize commits

  # Pass-to-pass tests (repo tests)
  - id: test_repo_syntax
    type: pass_to_pass
    origin: repo_tests
    description: JavaScript syntax check passes

  - id: test_repo_lint
    type: pass_to_pass
    origin: repo_tests
    description: ESLint passes on the modified script

  - id: test_repo_format
    type: pass_to_pass
    origin: repo_tests
    description: Prettier formatting check passes on the modified script

  - id: test_old_regex_fails_on_breaking
    type: pass_to_pass
    origin: programmatic
    description: Test demonstrating old regex behavior exists

rubric:
  # Extracted from repository conventions
  - rule: "Conventional commits should be parsed correctly with optional ! marker for breaking changes"
    weight: 0.25
    source: "conventional-commit-standards"

  - rule: "Breaking changes should be categorized in a dedicated 'breaking' section before other change types"
    weight: 0.25
    source: "release-notes-organization"

  - rule: "Regex should capture the breaking indicator (!) as a separate group, not part of the type"
    weight: 0.25
    source: "regex-best-practices"

  - rule: "The message extraction should account for the additional capture group in the regex"
    weight: 0.25
    source: "code-correctness"
