distractors:
- rule: The consistent hashing exchange (`x-consistent-hash`) is structured as a separate
    plugin in `deps/rabbitmq_consistent_hash_exchange`.
  collision_type: architecture_boundary
  why_distracting: Because `x-consistent-hash` is maintained as a separate plugin,
    an agent might incorrectly assume that `x-modulus-hash` should also be extracted
    into its own standalone plugin (e.g., `deps/rabbitmq_modulus_hash_exchange`) instead
    of being integrated into the core `deps/rabbit` application.
  severity: high
  source:
    path: CLAUDE.md
    lines: '48'
- rule: Use `gmake dialyze` and `gmake xref` to run static code analysis tools from
    individual `deps/` component directories.
  collision_type: meta_confusion
  why_distracting: The agent might attempt to run `gmake dialyze` or `gmake xref`
    within its solution script to verify the Erlang code changes, which is unnecessary
    for the patch and could cause the script to fail or timeout in the evaluation
    environment.
  severity: low
  source:
    path: CLAUDE.md
    lines: 29-30
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` provide identical repository
  structure guidelines. The primary architectural decision is correctly identifying
  `deps/rabbit` as the destination for core code, while avoiding the temptation to
  pattern-match against other exchange plugins like `rabbitmq_consistent_hash_exchange`.
