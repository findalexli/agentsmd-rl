rubric:
- rule: '**Clarity over Cleverness**: Choose clear, maintainable solutions'
  source:
    path: AGENTS.md
    lines: '13'
    commit: 12b1f1eadf649e30dec581b7351ba3abb12f8004
  evidence: The defect schema is plumbed through by mirroring existing patterns (successSchema/errorSchema threading through Proto, makeProto, Rpc.make, and exitSchema) rather than introducing a new abstraction.
  category: architecture
  verification: llm_judge
- rule: '**Conciseness**: Keep code and any wording concise and to the point. Sacrifice grammar for the sake of concision.'
  source:
    path: AGENTS.md
    lines: '14'
    commit: 12b1f1eadf649e30dec581b7351ba3abb12f8004
  evidence: The diff is concise and avoids inline comments unless absolutely required to explain unusual logic. JSDoc on exported APIs is acceptable.
  category: style
  verification: llm_judge
- rule: '**Always** look at existing code in the repository to learn and follow established patterns before writing new code.'
  source:
    path: AGENTS.md
    lines: 28-29
    commit: 12b1f1eadf649e30dec581b7351ba3abb12f8004
  evidence: The new defectSchema field is threaded through every Proto method that already threads other schema fields, and RpcServer.encodeDefect follows the same pattern as encodeExit/encodeChunk.
  category: architecture
  verification: llm_judge
