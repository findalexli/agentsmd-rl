- id: test_defect_option_threads_to_defect_schema_property
  type: fail_to_pass
  origin: pr_diff
  description: 'Rpc.make({ defect: customSchema }) must expose customSchema as the defectSchema property on the resulting Rpc instance. Fails at base because no such property exists; passes once the option is plumbed through Rpc.make and the Proto interface.'
- id: test_default_rpc_has_default_defect_schema
  type: fail_to_pass
  origin: pr_diff
  description: Rpc.make() without a defect option must still populate a defectSchema (defaulting to the existing Schema.Defect). Guards against an implementation that only adds the field when the option is provided.
- id: test_exit_schema_uses_custom_defect_for_round_trip
  type: fail_to_pass
  origin: pr_diff
  description: Rpc.exitSchema(rpc) must use rpc.defectSchema for the defect slot, so a Schema.Unknown defect schema lets a plain object round-trip identically through encode/decode. At base, exitSchema hard-codes Schema.Defect and stringifies non-Error defects.
