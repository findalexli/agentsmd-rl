version: "2.0"

source:
  repo: "gradio-app/gradio"
  pr: 12968
  base_commit: "4a0fe6e5aec1df710bd843f2f328d43fb7cfa7ef"
  merge_commit: "fe955348f24115744015d85639e170b8518b28c1"

checks:
  - id: effect_returns_cleanup
    type: fail_to_pass
    origin: pr_diff
    description: "$effect must return a cleanup function instead of using onDestroy"

  - id: effect_remounts_on_rerun
    type: fail_to_pass
    origin: pr_diff
    description: "Effect must re-mount component on every run, not guard with !comp"

  - id: no_inspect_debug
    type: fail_to_pass
    origin: pr_diff
    description: "$inspect(node) debug call must be removed from MountComponents.svelte"

  - id: unmount_spelling
    type: fail_to_pass
    origin: pr_diff
    description: "The 'umount' typo must be fixed to 'unmount' in the runtime type"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "MountCustomComponent.svelte must have real mounting logic"

  - id: repo_lint
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ESLint passes (pnpm lint)"

  - id: repo_typecheck
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's TypeScript typecheck passes (pnpm ts:check)"

  - id: repo_format_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's code formatting passes (pnpm format:check)"

  - id: repo_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's unit tests pass (pnpm test:run)"

# Rubric rules from agent config files for the judge to evaluate.
# These are soft/subjective rules not covered by programmatic checks.
rubric:
  - rule: "Be consistent with the style of the surrounding code. Follow patterns in neighboring files."
    source:
      path: "AGENTS.md"
      lines: "45"
      commit: "4a0fe6e5aec1df710bd843f2f328d43fb7cfa7ef"
