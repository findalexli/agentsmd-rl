  - id: "request_php_remove_int_cast"
    type: fail_to_pass
    description: "request.php removes (int) cast from setTenant() calls"
    origin: behavioral

  - id: "request_php_separate_pool_detection"
    type: fail_to_pass
    description: "request.php has separate pool detection for documentsdb/vectorsdb"
    origin: behavioral

  - id: "worker_php_array_filter"
