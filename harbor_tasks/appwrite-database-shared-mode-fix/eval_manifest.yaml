rubric:
- rule: File names in Http directories must only be Get.php, Update.php, Create.php,
    Delete.php or XList.php.
  source:
    path: src/Appwrite/Platform/AGENTS.md
    lines: 30-35
  evidence: The gold solution modifies the existing `Create.php` file in `src/Appwrite/Platform/Modules/Databases/Http/Databases/`
    without renaming it or creating non-standard filenames, adhering to the strict
    CR
  category: naming
- rule: Project layout defines `app/init/` for bootstrap, configs, resources, and
    workers.
  source:
    path: AGENTS.md
    lines: 21-25
  evidence: The gold solution correctly applies initialization and tenant configuration
    fixes to `app/init/resources/request.php` and `app/init/worker/message.php`, respecting
    the project layout where bootstrap a
  category: architecture
distractors:
- rule: Stack includes MongoDB (default), MariaDB, MySQL, PostgreSQL.
  collision_type: would_cause_bug
  why_distracting: The explicit mention of multiple database engines (MongoDB, MariaDB,
    MySQL, PostgreSQL) might lead the agent to implement engine-specific type checking
    for the tenant ID (e.g., keeping `(int)` for SQL and removing it only for MongoDB).
    This would overcomplicate the fix and potentially cause bugs, as the raw sequence
    should be passed universally.
  severity: high
  source:
    path: AGENTS.md
    lines: 16-17
- rule: Action pattern (HTTP endpoints) uses `inject()` for dependencies in the constructor.
  collision_type: architecture_boundary
  why_distracting: The Action pattern example heavily emphasizes injecting dependencies
    like `dbForProject` in the constructor. An agent might try to solve the separate
    pool validation in `Create.php` by modifying the `__construct()` method to inject
    new pool dependencies, rather than filtering the existing `$pools` collection
    inline within the action method.
  severity: medium
  source:
    path: AGENTS.md
    lines: 48-65
hierarchy_analysis: The hierarchy consists of a root `AGENTS.md` defining the overall
  architecture, stack, and project layout, and a module-specific `src/Appwrite/Platform/AGENTS.md`
  defining strict naming conventions for HTTP endpoints. The module-specific rules
  reinforce the root rules without conflict. The primary challenge is avoiding over-engineering
  the database engine differences and adhering to the existing dependency injection
  flow without modifying the Action constructors unnecessarily.
