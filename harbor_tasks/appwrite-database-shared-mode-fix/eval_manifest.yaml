distractors:
- rule: Generally-speaking, each service is its own module... The goal is to always
    put related code that achieves a specific goal under one roof.
  collision_type: architecture_boundary
  why_distracting: The agent might interpret 'always put related code that achieves
    a specific goal under one roof' as an instruction to refactor the database connection
    and pool logic out of the global `app/init/resources/request.php` and `app/init/worker/message.php`
    files and move it into the `Databases` module. This would break the application's
    initialization phase, as `app/init` is required for global bootstrapping before
    modules are loaded.
  severity: high
  source:
    path: src/Appwrite/Platform/AGENTS.md
    lines: 6-7
- rule: For non-CRUD operations, model the endpoint as a property update.
  collision_type: scope_ambiguity
  why_distracting: The agent might think that fixing 'Shared-Mode Database Configuration'
    is a non-CRUD operation and attempt to create a new endpoint (e.g., `Databases/Http/SharedMode/Update.php`)
    to handle the configuration, rather than fixing the bug in the existing `Create.php`
    endpoint and initialization scripts.
  severity: medium
  source:
    path: AGENTS.md
    lines: 55-58
- rule: Module structure and Workers directory placement
  source:
    path: src/Appwrite/Platform/AGENTS.md
    lines: 13-16
  source_text: 'A module consists of:


    - `Module.php` - Simple register class registering all module''s services (from
    `Services` directory)

    - `Workers` directory - Contains behavior for module-specific workers'
  collision_type: architecture_boundary
  why_distracting: The AI might see the modification to `app/init/worker/message.php`
    and attempt to refactor or move it into the `src/Appwrite/Platform/Modules/*/Workers`
    directory structure, mistakenly applying the new module architecture rules to
    core initialization scripts.
  severity: medium
hierarchy_analysis: The configuration hierarchy is moderate, with a base `AGENTS.md`
  defining the overall stack and project layout, and a module-specific `src/Appwrite/Platform/AGENTS.md`
  defining strict rules for module structure and HTTP endpoint naming. The rules are
  complementary rather than conflicting.
version: '2.0'
