distractors:
- rule: Use `pnpm` - never use npm or yarn
  source:
    path: AGENTS.md
    lines: '13'
    commit: 17a57e641798dca0b298bd91dcdcef6be30d38b6
  collision_type: rule_conflict
  why_distracting: An agent accustomed to npm/yarn may default to `npm run build` instead of `pnpm --filter miniflare run build`, violating the repo's tooling mandate.
  severity: high
- rule: Every change to package code requires a changeset
  source:
    path: AGENTS.md
    lines: '161'
    commit: 17a57e641798dca0b298bd91dcdcef6be30d38b6
  collision_type: rule_conflict
  why_distracting: An agent fixing a two-line schema bug may skip the changeset step, not realizing the repo requires one for every package-code change.
  severity: medium
- rule: Look at the `r2Buckets` schema for the pattern that already works
  source:
    path: packages/miniflare/src/plugins/r2/index.ts
    lines: ''
    commit: 17a57e641798dca0b298bd91dcdcef6be30d38b6
  collision_type: scope_ambiguity
  why_distracting: An agent may copy-paste the r2Buckets schema verbatim into kv/d1 schemas instead of adapting the `z.union([z.string(), z.object({...})])` pattern to the correct field names.
  severity: medium
- rule: The runtime helper that reads these records already handles both value shapes correctly today — only the schema-level validation is too strict
  source:
    path: packages/miniflare/src/plugins/kv/index.ts
    lines: ''
    commit: 17a57e641798dca0b298bd91dcdcef6be30d38b6
  collision_type: would_cause_bug
  why_distracting: An agent may modify the runtime helper `namespaceEntries()` instead of the Zod schema, introducing unnecessary risk and not fixing the root cause (validation rejection at construction time).
  severity: high
