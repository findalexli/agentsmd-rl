rubric:
- rule: In `src/config`, follow the existing self-export pattern at the top of the file (for example `export * as ConfigAgent from "./agent"`) when adding a new config module.
  source:
    path: AGENTS.md
    lines: '17'
    commit: 5181f9b4e141fc6c0c3c3d26169721af9e63ca51
  evidence: layout.ts self-exports via `export * as ConfigLayout from "./layout"` and server.ts via `export * as ConfigServer from "./server"`
  category: architecture
  verification: llm_judge
- rule: 'Do not use `export namespace Foo { ... }` for module organization. It is not standard ESM, it prevents tree-shaking, and it breaks Node''s native TypeScript runner. Use flat top-level exports combined with a self-reexport at the bottom of the file:'
  source:
    path: packages/opencode/AGENTS.md
    lines: 14-17
    commit: 5181f9b4e141fc6c0c3c3d26169721af9e63ca51
  evidence: layout.ts and server.ts use flat top-level exports with self-reexport instead of `export namespace`
  category: architecture
  verification: llm_judge
- rule: Use `Schema.Class` for multi-field data.
  source:
    path: packages/opencode/AGENTS.md
    lines: '89'
    commit: 5181f9b4e141fc6c0c3c3d26169721af9e63ca51
  evidence: server.ts defines the multi-field Server config using Schema.Class, not Schema.Struct
  category: architecture
  verification: llm_judge
- rule: Avoid using the `any` type
  source:
    path: AGENTS.md
    lines: '13'
    commit: 5181f9b4e141fc6c0c3c3d26169721af9e63ca51
  evidence: layout.ts and server.ts rely on type inference throughout; no `any` annotations appear
  category: style
  verification: llm_judge
- rule: Prefer `const` over `let`. Use ternaries or early returns instead of reassignment.
  source:
    path: AGENTS.md
    lines: '45'
    commit: 5181f9b4e141fc6c0c3c3d26169721af9e63ca51
  evidence: layout.ts and server.ts use `const` declarations exclusively; no `let` reassignment patterns
  category: style
  verification: llm_judge
- rule: Avoid `else` statements. Prefer early returns.
  source:
    path: AGENTS.md
    lines: '59'
    commit: 5181f9b4e141fc6c0c3c3d26169721af9e63ca51
  evidence: neither layout.ts nor server.ts contains any else branch
  category: style
  verification: llm_judge
- rule: Avoid unnecessary destructuring. Use dot notation to preserve context.
  source:
    path: AGENTS.md
    lines: '32'
    commit: 5181f9b4e141fc6c0c3c3d26169721af9e63ca51
  evidence: server.ts uses dot notation throughout (Schema.Number.check, Schema.optional, .annotate) instead of destructuring
  category: style
  verification: llm_judge
- rule: Reduce total variable count by inlining when a value is only used once.
  source:
    path: AGENTS.md
    lines: '19'
    commit: 5181f9b4e141fc6c0c3c3d26169721af9e63ca51
  evidence: layout.ts inlines the Schema.Literals definition and pipe chain into a single const declaration
  category: style
  verification: llm_judge
distractors:
- rule: In `src/config`, follow the existing self-export pattern at the top of the file (for example `export * as ConfigAgent from "./agent"`) when adding a new config module.
  source:
    path: AGENTS.md
    lines: '17'
    commit: 5181f9b4e141fc6c0c3c3d26169721af9e63ca51
  collision_type: rule_conflict
  why_distracting: packages/opencode/AGENTS.md lines 14-17 instruct self-reexport at the bottom of the file, directly contradicting root AGENTS.md line 17 which says at the top
  severity: medium
- rule: Use branded schemas (`Schema.brand`) for single-value types.
  source:
    path: packages/opencode/AGENTS.md
    lines: '90'
    commit: 5181f9b4e141fc6c0c3c3d26169721af9e63ca51
  collision_type: architecture_boundary
  why_distracting: Layout is a literal enum, not a branded single-value type — Schema.Literals is correct, Schema.brand would be wrong
  severity: medium
- rule: Use `Schema.Class` for multi-field data.
  source:
    path: packages/opencode/AGENTS.md
    lines: '89'
    commit: 5181f9b4e141fc6c0c3c3d26169721af9e63ca51
  collision_type: scope_ambiguity
  why_distracting: could mislead agent to use Schema.Class for the single-value Layout schema, but Schema.Literals is the correct construct for literal enums
  severity: low
