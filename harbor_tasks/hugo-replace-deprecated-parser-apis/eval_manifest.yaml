task:
  name: hugo-replace-deprecated-parser-apis
  title: "Replace deprecated parser.ParseDir and doc.New in Hugo"
  description: |
    The PR replaces deprecated Go parser APIs in tpl/internal/templatefuncsRegistry.go:
    - parser.ParseDir (deprecated since Go 1.25) → manual file iteration using parser.ParseFile
    - doc.New (deprecated) → doc.NewFromFiles

