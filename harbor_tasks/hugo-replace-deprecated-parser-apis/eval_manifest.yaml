# Rubric for code style (simplified for code-only tasks)
# The judge uses fallback evaluation when no API key is available,
# checking if key code patterns from the gold reference exist in the diff.
rubric:
  - criterion: "parseDir implementation"
    description: "parseDir function uses non-deprecated APIs and follows Go idioms"
    reference: |
      func parseDir(fset *token.FileSet, dir string) ([]*ast.File, error) {
      	entries, err := os.ReadDir(dir)
      	if err != nil {
      		return nil, err
      	}
      	var files []*ast.File
      	for _, e := range entries {
      		if e.IsDir() || !strings.HasSuffix(e.Name(), ".go") {
      			continue
      		}
      		f, err := parser.ParseFile(fset, filepath.Join(dir, e.Name()), nil, parser.ParseComments)
      		if err != nil {
      			return nil, err
      		}
      		files = append(files, f)
      	}
      	return files, nil
      }
