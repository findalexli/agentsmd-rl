  category: architecture
distractors:
- rule: If coordination evidence cannot be found, do not proceed to PR-ready output.
  collision_type: meta_confusion
  why_distracting: The agent is operating in an evaluation environment where it must
    produce a patch. Following the 'fail-closed' policy due to missing coordination
    evidence (like GitHub issue links) will cause it to refuse to generate the fix.
  severity: high
  source:
    path: CLAUDE.md
    lines: 54-58
- rule: Do not open one-off PRs for tiny edits (single typo, isolated lint cleanup,
    one mutable default argument, etc.).
  collision_type: scope_ambiguity
  why_distracting: The fix for the RoPE validation crash is a very small change (changing
    `is None` to `not rope_parameters_dict`). An agent might misclassify this critical
    bug fix as a 'tiny edit' or 'low-value busywork' and refuse to implement it.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 39-41
- rule: We try to avoid direct inheritance between model-specific files in `src/transformers/models/`.
  collision_type: architecture_boundary
  why_distracting: The issue mentions that config classes inherit parameters from
    `PreTrainedConfig`, causing long docstrings. An agent might misapply the 'avoid
    direct inheritance' rule (which is strictly for `models/`) to `configuration_utils.py`
    and attempt to remove inheritance between config classes, breaking the configuration
    architecture.
  severity: high
  source:
    path: CLAUDE.md
    lines: 60-60
hierarchy_analysis: '`CLAUDE.md` and `AGENTS.md` are identical in this context. The
  rules are heavily focused on human-in-the-loop contribution policies and repository
  maintenance mechanics. Agents must distinguish between meta-instructions meant for
  real-world repository interaction (like checking GitHub issues) and the actual coding
  task at hand in an isolated evaluation environment.'
