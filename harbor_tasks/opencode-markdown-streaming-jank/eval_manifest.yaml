distractors:
- rule: Rely on type inference when possible; avoid explicit type annotations or interfaces
    unless necessary for exports or clarity
  collision_type: scope_ambiguity
  why_distracting: 'The gold solution explicitly defines a `Block` type (`type Block
    = { raw: string; mode: "full" | "live" }`) for clarity when handling parsed markdown
    chunks. An agent strictly following the rule against explicit type annotations
    might try to use inline types or avoid defining the `Block` type, leading to messier
    and less maintainable code.'
  severity: medium
  source:
    path: AGENTS.md
    lines: 16-16
- rule: Keep things in one function unless composable or reusable
  collision_type: scope_ambiguity
  why_distracting: The gold solution extracts a `references` helper function in `markdown.tsx`
    to check for markdown reference links. An agent might try to inline this regex
    check directly into the main parsing logic to 'keep things in one function', which
    would make the complex streaming parser harder to read.
  severity: low
  source:
    path: AGENTS.md
    lines: 11-11
hierarchy_analysis: The root `AGENTS.md` provides general TypeScript and style guidelines,
  while `packages/app/AGENTS.md` provides app-specific rules like SolidJS state management.
  The rules are generally complementary, but agents must be careful to apply the SolidJS
  rules only within the `packages/app` scope and not over-apply general rules (like
  avoiding explicit types or extracting functions) when clarity demands otherwise.
