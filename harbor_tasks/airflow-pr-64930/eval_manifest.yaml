    origin: pr_behavior
    description: Hidden directory .pyc files should NOT be deleted (skipped by os.walk pruning)

  - id: test_git_dir_pyc_not_deleted
    type: fail_to_pass
    origin: pr_behavior
    description: .git directory .pyc files should NOT be deleted

  - id: test_venv_dir_pyc_not_deleted
    type: fail_to_pass
    origin: pr_behavior
    description: .venv directory .pyc files should NOT be deleted

  - id: test_node_modules_pyc_not_deleted
    type: fail_to_pass
    origin: pr_behavior
    description: node_modules .pyc files should NOT be deleted

  - id: test_nested_node_modules_pyc_not_deleted
    type: fail_to_pass
    origin: pr_behavior
    description: Nested node_modules .pyc files should NOT be deleted

  - id: test_hidden_pycache_not_deleted
    type: fail_to_pass
    origin: pr_behavior
    description: __pycache__ inside hidden directories should NOT be deleted

  - id: test_deep_hidden_not_traversed
    type: fail_to_pass
