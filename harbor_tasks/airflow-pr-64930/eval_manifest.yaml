  - id: test_repo_ruff_lint
    type: pass_to_pass
    origin: repo_tests
    description: Ruff linting passes on path_utils.py

  - id: test_repo_ruff_format
    type: pass_to_pass
    origin: repo_tests
    description: Ruff formatting check passes on path_utils.py

  - id: test_repo_python_syntax
    type: pass_to_pass
    origin: repo_tests
    description: Python syntax check passes on path_utils.py

rubric:
