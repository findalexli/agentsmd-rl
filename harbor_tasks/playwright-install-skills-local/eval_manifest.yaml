config_edits:
- path: .claude/skills/playwright-mcp-dev/SKILL.md
  tier: 1
  gold_added: '# SKILL File


    The skill file is located at `packages/playwright/src/skill/SKILL.md`. It contains documentation for all available CLI commands and MCP tools. Update it whenever you add new commands or tools.

    At any point in time you can run "npm run playwright-cli -- --help" to see the latest available commands and use them to update the skill file.'
  gold_removed: ''
- path: packages/playwright/src/skill/SKILL.md
  tier: 1
  gold_added: '### Network


    ```bash

    playwright-cli route "**/*.jpg" --status=404

    playwright-cli route "https://api.example.com/**" --body=''{"mock": true}''

    playwright-cli route-list

    playwright-cli unroute "**/*.jpg"

    playwright-cli unroute

    ```


    ### Install


    ```bash

    playwright-cli install-browser

    playwright-cli install-skills

    ```


    # Use specific browser when creating session

    playwright-cli open --browser=chrome

    playwright-cli open --browser=firefox

    playwright-cli open --browser=webkit

    playwright-cli open --browser=msedge

    # Connect to browser via extension

    playwright-cli open --extension


    playwright-cli session-restart mysession'
  gold_removed: '## Example: Authentication state reuse


    ```bash

    # Login and save auth state

    playwright-cli open https://app.example.com/login

    playwright-cli snapshot

    playwright-cli fill e1 "user@example.com"

    playwright-cli fill e2 "password123"

    playwright-cli click e3

    playwright-cli state-save auth.json


    # Later, restore state and skip login

    playwright-cli state-load auth.json

    playwright-cli open https://app.example.com/dashboard

    ```'
distractors:
- rule: Implement corresponding MCP tool for CLI commands
  source:
    path: .claude/skills/playwright-mcp-dev/SKILL.md
    lines: '24'
  source_text: '- CLI commands are based on MCP tools. Implement the corresponding MCP tool as per `Adding MCP Tools` section above, if needed.'
  collision_type: architecture_boundary
  why_distracting: The install-skills command strictly performs local file system operations to install skills, rather than interacting with the browser. An agent might mistakenly attempt to create a full MCP tool for it, incorrectly crossing the architecture boundary from the local CLI execution context into the browser automation context.
  severity: medium
