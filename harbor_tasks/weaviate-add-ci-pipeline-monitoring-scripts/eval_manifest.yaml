version: "2.0"
source:
  repo: "owner/sample-project"
  pr: 123
  base_commit: "abc123"
  merge_commit: "def456"

checks:
  # Fail-to-pass: must fail on base, pass after fix
  - id: test_average_returns_zero_for_empty_array
    type: fail_to_pass
    origin: pr_diff
    description: "calculateAverage returns 0 for empty array (was returning null)"

  - id: test_average_works_for_normal_arrays
    type: fail_to_pass
    origin: pr_diff
    description: "calculateAverage returns correct value for non-empty arrays"

  - id: test_sum_function_works
    type: fail_to_pass
    origin: pr_diff
    description: "calculateSum returns correct sum"

  # Pass-to-pass: must pass on both base and fix
  - id: test_repo_lint
    type: pass_to_pass
    origin: repo_tests
    description: "Repo linting passes"

  - id: test_repo_tests_pass
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's own test suite passes"

  # Static checks
  - id: test_file_structure
    type: pass_to_pass
    origin: static
    description: "Required source files exist"

rubric: []
distractors: []
config_edits: []
# Empty rubric means no convention rules to check - ICR defaults to 1.0
