distractors:
- rule: ServerArgs location and configuration path
  source:
    path: python/sglang/multimodal_gen/.claude/CLAUDE.md
    lines: 60-60
  source_text: '| `ServerArgs` | `runtime/server_args.py` | All config params |'
  collision_type: scope_ambiguity
  why_distracting: The PR modifies `python/sglang/srt/server_args.py`, which is the
    LLM runtime configuration. This rule applies specifically to the `multimodal_gen`
    (diffusion) subsystem's `server_args.py`. An agent might mistakenly modify the
    diffusion subsystem's configuration instead of the LLM runtime's, thinking the
    rule applies globally.
  severity: high
- rule: Steps for Adding a New Model
  source:
    path: python/sglang/multimodal_gen/.claude/CLAUDE.md
    lines: 72-77
  source_text: '## Adding a New Model


    1. Create pipeline in `runtime/pipelines/` extending `ComposedPipelineBase`

    2. Define stages via `create_pipeline_stages()` (TextEncoding → Denoising → Decoding)

    3. Add config in `configs/pipeline_configs/`

    4. Register in `registry.py` via `register_configs()`'
  collision_type: scope_ambiguity
  why_distracting: The PR adds model-specific handling for `mistral-large-3` and others
    to `server_args.py`. An agent might see this guide for 'Adding a New Model' and
    attempt to implement these LLMs as diffusion pipelines extending `ComposedPipelineBase`
    rather than simply configuring argument checks.
  severity: medium
