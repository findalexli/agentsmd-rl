rubric:
  - rule: "Use helper functions to avoid deeply nested conditionals. Complex nested if/else blocks should be refactored into well-named helper functions."
    source:
      path: ".claude/skills/add-jit-kernel/SKILL.md"
      lines: "250-290"
      commit: "b2462694441412ad209c361dfa87f3f37a3d29f3"

  - rule: "Keep comments synchronized with related code. When functions interact with code in other files (e.g., name checks in get_config/get_tokenizer), add comments referencing the need to keep them in sync."
    source:
      path: ".claude/skills/add-jit-kernel/SKILL.md"
      lines: "30"
      commit: "b2462694441412ad209c361dfa87f3f37a3d29f3"

  - rule: "Use private constants (prefixed with underscore) for module-internal values that should not be part of the public API."
    source:
      path: ".claude/skills/add-jit-kernel/SKILL.md"
      lines: "36-40"
      commit: "b2462694441412ad209c361dfa87f3f37a3d29f3"
