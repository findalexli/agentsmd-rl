  - id: test_suspense_tab_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "SuspenseTab.js has valid JavaScript/Flow syntax"

  - id: test_repo_version_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo version check passes"

  - id: test_repo_flags
    type: pass_to_pass
    origin: repo_tests
    description: "Repo flags check passes"

  - id: test_repo_print_warnings
    type: pass_to_pass
    origin: repo_tests
