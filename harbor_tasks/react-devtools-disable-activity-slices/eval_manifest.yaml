    description: "SuspenseTab.js imports enableActivitySlices from react-devtools-feature-flags"

  - id: suspense_tab_uses_flag
    type: fail_to_pass
    origin: pr_diff
    description: "SuspenseTab.js gates activityListDisabled on !enableActivitySlices"

  - id: flag_present_in_all_fork_files
    type: fail_to_pass
    origin: agent_config
    description: "enableActivitySlices is declared in all 5 fork config files"
    source:
