  type: pass_to_pass
  origin: repo_tests
  description: Tall charts (>=100px) keep the user-enabled legend visible (sanity for tall-tier behavior).
- id: test_legend_hidden_on_small_charts
  type: fail_to_pass
  origin: repo_tests
  description: Compact charts (60-99px) suppress the legend even when the user enabled it.
- id: test_yaxis_labels_visible_on_small_charts
  type: fail_to_pass
  origin: repo_tests
  description: Compact charts keep y-axis min/max labels for scale reference.
- id: test_yaxis_labels_hidden_on_micro_charts
  type: fail_to_pass
  origin: repo_tests
  description: Micro charts (<60px) hide y-axis labels for a sparkline view.
- id: test_yaxis_tick_count_scales_with_height
  type: fail_to_pass
  origin: repo_tests
  description: A taller chart yields more y-axis ticks than a shorter chart.
- id: test_small_chart_uses_splitnumber_one
  type: fail_to_pass
  origin: repo_tests
  description: Compact charts use splitNumber=1 so only boundary labels render.
- id: test_zoomable_small_chart_preserves_bottom_padding
  type: pass_to_pass
  origin: repo_tests
  description: Zoomable compact charts must keep enough bottom padding for the dataZoom slider (regression guard for the compact-tier padding logic).
- id: test_boundary_100px_full_axis
  type: fail_to_pass
  origin: repo_tests
  description: At exactly 100px, full-axis behavior applies.
- id: test_boundary_99px_small_chart
  type: fail_to_pass
  origin: repo_tests
  description: At 99px, compact-chart behavior applies.
- id: test_boundary_60px_compact_axis_with_labels
  type: fail_to_pass
  origin: repo_tests
  description: At exactly 60px, axis labels remain visible but axis is compact.
- id: test_boundary_59px_micro_chart
  type: fail_to_pass
  origin: repo_tests
  description: At 59px, micro-chart behavior applies (axis labels hidden).
- id: test_existing_transformprops_baseline
  type: pass_to_pass
  origin: repo_tests
  description: The transformProps oracle baseline test passes (sanity).
- id: test_repo_existing_transformprops_suite_passes
  type: pass_to_pass
