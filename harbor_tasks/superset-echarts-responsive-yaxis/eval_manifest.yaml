  description: The existing transformProps.test.ts jest suite still passes after the change.
rubric:
- id: avoid_time_specific_comments
  source:
    lines: 97-98
    path: AGENTS.md
    commit: e6f1209318b8def92c27c09fed87b3538a10a36c
  rule: 'Code comments must not use time-specific language ("now", "currently",

    "today", "recently") because they go stale. Comments should remain

    accurate regardless of when they''re read.

    '
- id: no_any_types
  source:
    lines: 32-32
    path: AGENTS.md
    commit: e6f1209318b8def92c27c09fed87b3538a10a36c
  rule: 'TypeScript code must avoid `any` types and use proper typings.

    Test files may use `as any` where the ECharts option type is intentionally loose,

    but production source under `src/` should not introduce new `any` types.

    '
- id: prefer_test_over_describe
  source:
    lines: 44-44
    path: AGENTS.md
    commit: e6f1209318b8def92c27c09fed87b3538a10a36c
  rule: 'New tests should use `test()` rather than nested `describe()` blocks.

    (See "avoid nesting when testing" guidance.)

    '
- id: jest_react_testing_library_only
  source:
    lines: 43-43
    path: AGENTS.md
    commit: e6f1209318b8def92c27c09fed87b3538a10a36c
  rule: 'Use Jest (and React Testing Library where applicable) for new tests;

    Enzyme is removed. New tests for transformProps belong in the existing

    jest test file.

    '
- id: no_new_javascript_files
  source:
    lines: 33-33
    path: AGENTS.md
    commit: e6f1209318b8def92c27c09fed87b3538a10a36c
  rule: 'Convert/keep code in TypeScript (.ts/.tsx) — do not introduce new .js/.jsx files.

    '
