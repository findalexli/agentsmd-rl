distractors:
- rule: For single-file tests, prefer `-e` over `tempDir`.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to write a complex subprocess test using `Bun.spawn`
    and `-e` to verify the crash is fixed. However, since the fix makes the function
    throw a synchronous `TypeError`, a simple in-process `expect().toThrow()` is the
    correct and much cleaner way to test it.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 45-46
- rule: Always use `bun.*` APIs instead of `std.*`.
  collision_type: architecture_boundary
  why_distracting: The bug is in a C++ file (`BunPlugin.cpp`), but this rule is strictly
    for Zig code. An agent might get confused about the language boundary, try to
    apply Zig conventions to C++ code, or look for Zig files to modify instead of
    fixing the C++ JSC binding.
  severity: high
  source:
    path: src/CLAUDE.md
    lines: 14-15
hierarchy_analysis: The root `CLAUDE.md` provides general testing guidelines that
  apply to this PR, while `src/CLAUDE.md` provides Zig-specific guidelines. Since
  the bug is in C++ code (`src/bun.js/bindings/BunPlugin.cpp`), the Zig guidelines
  in `src/CLAUDE.md` are irrelevant and potentially distracting. The agent must recognize
  the language boundary and ignore the Zig rules while still following the root testing
  rules.
