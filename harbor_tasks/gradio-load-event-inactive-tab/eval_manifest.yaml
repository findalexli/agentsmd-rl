version: "2.0"

source:
  repo: "gradio-app/gradio"
  pr: 12904
  base_commit: "6011b00d0154b85532fa901dd73cf8fa7d86fd04"
  merge_commit: "7c3fa2a6900cfa3c87cb61ffa9b34b75d1ae49ba"

checks:
  - id: file_exists_with_apptree
    type: pass_to_pass
    origin: static
    description: "init.svelte.ts must exist and contain the AppTree class"

  - id: spread_replace_bug_removed
    type: fail_to_pass
    origin: pr_diff
    description: "Spread-replace pattern removed from update_state !_set_data branch"

  - id: deferred_state_stored
    type: fail_to_pass
    origin: pr_diff
    description: "update_state stores deferred state on class instance for unmounted components"

  - id: register_component_applies_deferred
    type: fail_to_pass
    origin: pr_diff
    description: "register_component applies deferred state when component mounts"

  - id: no_full_tree_traversal_in_render
    type: fail_to_pass
    origin: pr_diff
    description: "render_previously_invisible_children avoids full tree traversal with root reassignment"

  - id: core_methods_present
    type: pass_to_pass
    origin: repo_tests
    description: "All core AppTree methods still present"

  - id: helper_functions_intact
    type: pass_to_pass
    origin: repo_tests
    description: "Standalone helper functions and tab/accordion handling intact"

  - id: consistent_indentation
    type: pass_to_pass
    origin: agent_config
    description: "File uses tabs consistent with surrounding code style"
    source:
      path: "AGENTS.md"
      lines: "45"
      commit: "6011b00d0154b85532fa901dd73cf8fa7d86fd04"

  - id: no_debug_artifacts
    type: pass_to_pass
    origin: agent_config
    description: "No debug logging artifacts in AppTree; no excessive trailing whitespace"
    source:
      path: "js/README.md"
      lines: "65"
      commit: "6011b00d0154b85532fa901dd73cf8fa7d86fd04"

  - id: typescript_quality
    type: pass_to_pass
    origin: agent_config
    description: "No excessive @ts-ignore or any types"
    source:
      path: "js/README.md"
      lines: "80-81"
      commit: "6011b00d0154b85532fa901dd73cf8fa7d86fd04"

rubric:
  - rule: "Be consistent with the style of the surrounding code."
    source:
      path: "AGENTS.md"
      lines: "45"
      commit: "6011b00d0154b85532fa901dd73cf8fa7d86fd04"

  - rule: "Frontend code is formatted with prettier (pnpm format:write / pnpm format:check)."
    source:
      path: "AGENTS.md"
      lines: "44"
      commit: "6011b00d0154b85532fa901dd73cf8fa7d86fd04"
