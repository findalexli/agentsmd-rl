distractors:
- rule: '`gradio/` — Python source for the Gradio library (backend)'
  collision_type: architecture_boundary
  why_distracting: The reproduction code is written in Python, which might lead an
    agent to try fixing the bug in the Python backend (`gradio/` or `gradio/components/`)
    by delaying the load event. However, the root cause is a frontend reactivity issue
    in Svelte 5, so the fix must be in the `js/` directory.
  severity: high
  source:
    path: AGENTS.md
    lines: 7-8
- rule: '`js/` — frontend code (Svelte/TypeScript), with each component in its own
    subdirectory'
  collision_type: scope_ambiguity
  why_distracting: The rule states that each component is in its own subdirectory.
    Since the bug involves `gr.Tab` and `gr.Textbox`, an agent might try to fix the
    issue by modifying the specific component files (e.g., `js/tab/` or `js/textbox/`).
    However, the root cause is in the core state management (`js/core/src/init.svelte.ts`),
    not the individual components.
  severity: medium
  source:
    path: AGENTS.md
    lines: 12-12
hierarchy_analysis: The repository has a single `AGENTS.md` file at the root. The
  primary challenge for an agent is correctly identifying the architectural boundary
  (frontend core vs. frontend components vs. Python backend) since the reproduction
  is in Python but the bug is in the Svelte core state management.
