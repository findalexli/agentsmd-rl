    lines: 21-24
- rule: Target an issue. Every non-trivial PR should reference an existing GitHub
    issue. If one doesn't exist, create it first.
  collision_type: meta_confusion
  why_distracting: The agent might try to use the GitHub CLI to create an issue or
    search for one, which is out of scope for the evaluation environment and wastes
    effort.
  severity: medium
  source:
    path: AGENTS.md
    lines: 19-20
