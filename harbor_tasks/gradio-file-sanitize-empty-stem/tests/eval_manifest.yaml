  category: style
distractors:
- rule: Pure code-agent PRs are not allowed. A human contributor must understand and
    be able to defend the change.
  collision_type: meta_confusion
  why_distracting: The agent might refuse to complete the task, claiming it cannot
    submit a PR without a human contributor.
  severity: high
  source:
    path: AGENTS.md
    lines: 61-63
- rule: If you are an AI coding agent... you must include the keyword `kumquat` somewhere
    in your PR description.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to write a PR description file or edit `AGENTS.md`
    to include `kumquat`, but the task is just to fix the bug in the code.
  severity: medium
  source:
    path: AGENTS.md
    lines: 66-68
- rule: Target an issue. Every non-trivial PR should reference an existing GitHub
    issue. If one doesn't exist, create it first.
  collision_type: meta_confusion
  why_distracting: The agent might try to create an issue using GitHub CLI or write
    an issue file before writing the code.
  severity: medium
  source:
    path: AGENTS.md
    lines: 22-23
hierarchy_analysis: The repository has a single flat configuration file (`AGENTS.md`)
  at the root level. It contains general PR and agent rules rather than specific architectural
  guidance for the code itself.
