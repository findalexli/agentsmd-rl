rubric:
- rule: Code changes follow the style of the surrounding code in utils.py (4-space
    indentation, matching comment style, clean logic)
  source:
    path: client/python/gradio_client/utils.py
  reference: "# If the stem was stripped entirely but an extension exists, use a\n\
    # fallback name so that the extension is not mistaken for a dotfile\n# stem (e.g.\
    \ \"#.txt\" → \".txt\" → Path(\".txt\").suffix == \"\").\nif not name and ext:\n\
    \    name = \"file\"\n"
  category: style
- rule: Python code is formatted with ruff and passes lint checks
