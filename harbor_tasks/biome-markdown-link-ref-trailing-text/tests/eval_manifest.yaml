distractors:
- rule: Create a changeset for user-facing changes (bug fixes that affect behavior)
  collision_type: meta_confusion
  why_distracting: The rule mandates creating a changeset file in `.changeset/` for
    bug fixes that affect behavior. However, the gold solution only contains the code
    fix and snapshot update. An agent might waste effort generating a changeset markdown
    file, which is a PR-level administrative task outside the scope of the core algorithmic
    fix.
  severity: high
  source:
    path: AGENTS.md
    lines: 46-72
- rule: Disclose AI assistance in the pull request
  collision_type: meta_confusion
  why_distracting: The rule requires disclosing AI assistance in the pull request.
    An agent might try to create or modify a PR description file or add comments to
    the code to disclose its AI nature, which is irrelevant to the actual code fix.
  severity: low
  source:
    path: CLAUDE.md
    lines: 45-50
hierarchy_analysis: The config files (CLAUDE.md and AGENTS.md) focus heavily on PR
  creation, changesets, and repository management. Since the task is evaluated purely
  on the code fix and test updates, these PR-level instructions create meta-confusion
  for an agent that might try to act as a full PR author rather than just a code patcher.
