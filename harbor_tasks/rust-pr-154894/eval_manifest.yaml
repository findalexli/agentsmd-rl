task:
  name: "rust-mplace-ptr-refactor"
  source_pr: "rust-lang/rust#154894"
  base_commit: "906ca7ff5e1f01cdf59388574b4822365bffabea"
  merge_commit: "82bcdd18e664f112149bc29787959516c5c54b5a"
  title: "Slightly refactor mplace<->ptr conversions"
  description: |
    Renames interpreter conversion functions to be more accurate:
    - `ref_to_mplace` -> `imm_ptr_to_mplace`
    - `mplace_to_ref` -> `mplace_to_imm_ptr`

    The new `mplace_to_imm_ptr` also accepts an optional `ptr_ty` parameter
    to allow creating pointers of different types.

checks:
  # Fail-to-pass tests - verify old behavior is removed
  - id: test_old_function_ref_to_mplace_removed
    type: fail_to_pass
    origin: behavior
    description: "Old function name `ref_to_mplace` should be removed from place.rs"

  - id: test_old_function_mplace_to_ref_removed
    type: fail_to_pass
    origin: behavior
    description: "Old function name `mplace_to_ref` should be removed from place.rs"

  # Fail-to-pass tests - verify new behavior exists
  - id: test_new_function_imm_ptr_to_mplace_exists
    type: fail_to_pass
    origin: behavior
    description: "New function `imm_ptr_to_mplace` should exist in place.rs"

  - id: test_new_function_mplace_to_imm_ptr_exists
    type: fail_to_pass
    origin: behavior
    description: "New function `mplace_to_imm_ptr` should exist in place.rs"

  - id: test_mplace_to_imm_ptr_has_ptr_ty_parameter
    type: fail_to_pass
    origin: behavior
    description: "New `mplace_to_imm_ptr` function should accept optional `ptr_ty` parameter"

  - id: test_callers_updated_to_imm_ptr_to_mplace
    type: fail_to_pass
    origin: behavior
    description: "All callers should use new `imm_ptr_to_mplace` function name"

  - id: test_callers_updated_to_mplace_to_imm_ptr
    type: fail_to_pass
    origin: behavior
    description: "All callers should use new `mplace_to_imm_ptr` function name"

  - id: test_miri_callers_updated
    type: fail_to_pass
    origin: behavior
    description: "Miri tool callers should be updated to new function names"

  - id: test_documentation_updated
    type: fail_to_pass
    origin: behavior
    description: "Documentation comments should reference new function names"

  # Pass-to-pass tests - verify repo CI/tests work on base commit
  - id: test_repo_tidy_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Tidy tool unit tests pass"

  - id: test_repo_bootstrap_verify_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Bootstrap verify tests pass"

  - id: test_repo_bootstrap_parse_args_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Bootstrap parse args tests pass"

  - id: test_repo_bootstrap_python_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "Bootstrap Python files have valid syntax"

  - id: test_repo_configure_python_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "Configure Python file has valid syntax"

  - id: test_repo_x_py_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "x.py build tool has valid Python syntax"

  - id: test_repo_const_eval_place_file_exists
    type: pass_to_pass
    origin: repo_tests
    description: "The modified place.rs file exists and is readable"

  - id: test_repo_const_eval_module_structure
    type: pass_to_pass
