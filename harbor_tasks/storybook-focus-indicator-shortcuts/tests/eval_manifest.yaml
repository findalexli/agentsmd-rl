source_pr: "https://github.com/storybookjs/storybook/pull/34201"
source_repo: "storybookjs/storybook"
base_commit: "199f65679628d2575f0cba43354e3db4284901a5"
merge_commit: "4ffc04181bb9089891e031e8288f1a20c896dbba"

checks:
  # Base verification
  - id: test_base_commit_checked_out
    type: pass_to_pass
    origin: infrastructure
    description: Repository is at correct base commit

  # TypeScript compilation
  - id: test_typescript_compiles
    type: pass_to_pass
    origin: repo_tests
    description: TypeScript type checking passes

  # Core fail-to-pass tests - focusOnUIElement calls in shortcuts.ts
  - id: test_shortcuts_module_has_focus_call_for_panel
    type: fail_to_pass
    origin: behavior
    description: Alt+A keyboard shortcut triggers focusOnUIElement for addon panel

  - id: test_shortcuts_module_has_focus_call_for_sidebar
    type: fail_to_pass
    origin: behavior
    description: Alt+S keyboard shortcut triggers focusOnUIElement for sidebar

  # Core fail-to-pass tests - Panel.tsx constant usage
  - id: test_panel_uses_focusable_ui_elements_constant
    type: fail_to_pass
    origin: behavior
    description: Panel uses focusableUIElements.storyPanelRoot constant instead of hardcoded string

  # Core fail-to-pass tests - addons.tsx refactoring
  - id: test_addons_showpanel_uses_forcefocus_param
    type: fail_to_pass
    origin: behavior
    description: addons.tsx showPanel uses forceFocus boolean parameter

  - id: test_addons_click_calls_showpanel_false
    type: fail_to_pass
    origin: behavior
    description: addons.tsx onClick calls showPanel(false)

  - id: test_addons_keydown_calls_showpanel_true
    type: fail_to_pass
    origin: behavior
    description: addons.tsx onKeyDown calls showPanel(true)

  - id: test_no_useRegionFocusAnimation_in_addons
    type: fail_to_pass
    origin: behavior
    description: addons.tsx no longer uses useRegionFocusAnimation hook

  # Core fail-to-pass tests - menu.tsx refactoring
  - id: test_menu_showsidebar_uses_forcefocus_param
    type: fail_to_pass
    origin: behavior
    description: menu.tsx showSidebar uses forceFocus boolean parameter

  - id: test_menu_click_calls_showsidebar_false
    type: fail_to_pass
    origin: behavior
    description: menu.tsx onClick calls showSidebar(false)

  - id: test_menu_keydown_calls_showsidebar_true
    type: fail_to_pass
    origin: behavior
    description: menu.tsx onKeyDown calls showSidebar(true)

  - id: test_no_useRegionFocusAnimation_in_menu
    type: fail_to_pass
    origin: behavior
    description: menu.tsx no longer uses useRegionFocusAnimation hook

  # Syntax validation
  - id: test_syntax_valid_in_modified_files
    type: pass_to_pass
    origin: repo_tests
    description: Modified TypeScript files have valid syntax

  # Pass-to-pass tests - Repo unit tests for manager modules
  - id: test_repo_shortcut_unit_tests
    type: pass_to_pass
    origin: repo_tests
    description: Repo shortcut library unit tests pass

  - id: test_repo_manager_api_status_tests
    type: pass_to_pass
    origin: repo_tests
    description: Repo manager-api status tests pass

  - id: test_repo_manager_api_versions_tests
    type: pass_to_pass
    origin: repo_tests
    description: Repo manager-api versions tests pass

  - id: test_repo_manager_sidebar_utils
    type: pass_to_pass
    origin: repo_tests
    description: Repo manager sidebar utils tests pass

  - id: test_repo_manager_api_store_tests
    type: pass_to_pass
    origin: repo_tests
    description: Repo manager-api store tests pass

  - id: test_repo_core_theming_tests
    type: pass_to_pass
    origin: repo_tests
    description: Repo core theming tests pass

rubric:
  # Agent config rules from AGENTS.md and .cursorrules
  - rule: "Use yarn nx run-many -t compile for compiling packages"
    source: "AGENTS.md:Common Commands"
    weight: "optional"

  - rule: "Use yarn nx run-many -t check for TypeScript checking"
    source: "AGENTS.md:Common Commands"
    weight: "optional"

  - rule: "Use yarn test for running unit tests"
    source: "AGENTS.md:Testing Expectations"
    weight: "optional"

  - rule: "Use vitest patterns for focused tests (file names, test descriptions)"
    source: ".cursorrules:Focused Test Patterns"
    weight: "optional"

  - rule: "Avoid console.log, use storybook/internal/node-logger or storybook/internal/client-logger"
    source: "AGENTS.md:Quality and Logging"
    weight: "optional"

  - rule: "When mocking, use vi.mock() with spy: true option and vi.mocked() for type-safe access"
    source: ".cursor/rules/spy-mocking.mdc"
    weight: "optional"
