    lines: '196'
    commit: b7164eca8675e5223cf73fb430a6aaf6ceafc9cc
- rule: Do not use cast() when @overload or generics can eliminate the need at the
    source.
  source:
    path: .ai/skills/add-or-fix-type-checking/SKILL.md
    lines: '195'
    commit: b7164eca8675e5223cf73fb430a6aaf6ceafc9cc
- rule: '`make typing`: runs the ty type checker and model structure rules'
  source:
    path: CLAUDE.md
    lines: 3-3
  evidence: The gold solution includes explicit return type annotations (`-> "SizeDict"`
    and `-> dict`) for the new dunder methods, ensuring compatibility with the repository's
    type checker.
  category: tooling
distractors:
- rule: 'Copies and Modular Models: avoid direct inheritance between model-specific
    files in `src/transformers/models/`.'
  collision_type: architecture_boundary
  why_distracting: The agent might try to apply the `# Copied from` or modular model
    rules to `SizeDict`, but these rules strictly apply to `src/transformers/models/`,
    whereas `image_utils.py` is a core utility file.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 54-59
- rule: 'No low-value busywork PRs: Do not open one-off PRs for tiny edits.'
  collision_type: scope_ambiguity
  why_distracting: The agent might refuse to implement the fix, misclassifying the
    addition of two short dunder methods as a 'low-value busywork PR' or 'tiny edit',
    when it is actually a critical functional fix for downstream libraries like vLLM.
  severity: high
  source:
    path: CLAUDE.md
    lines: 35-37
hierarchy_analysis: Both `CLAUDE.md` and `AGENTS.md` contain identical rules. The
  rules focus heavily on PR workflow, coordination, and model-specific architecture
  (`src/transformers/models/`). Since the target file `src/transformers/image_utils.py`
  is a core utility, the model-specific copying rules do not apply, and the agent
  must rely on general Python data model knowledge (dunder methods) while adhering
  to the repository's typing standards.
