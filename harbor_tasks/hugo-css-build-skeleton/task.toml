name = "hugo-css-build-skeleton"
description = "Update Hugo theme skeleton to use css.Build for CSS processing"
difficulty = "medium"
tags = ["hugo", "go-templates", "css", "build-pipeline"]

[time]
# Estimated time for an agent to complete (seconds)
estimated_duration = 900

[time.timeouts]
# How long agent can spend (default: 30min)
agent = 1800
# How long verifier has to grade (default: 2min)
verifier = 120

[repository]
# PR being benchmarked
owner = "gohugoio"
name = "hugo"
base_commit = "06fcb724219eecdc20367e86e1a8134d3d7e0e5b"
merge_commit = "404ac00001de49c0ccbff4131be40fa2651e4a06"
pr_number = 14631

[paths]
# Where agent writes code
code = "/workspace/hugo"
# Where logs go
logs = "/logs/verifier"
