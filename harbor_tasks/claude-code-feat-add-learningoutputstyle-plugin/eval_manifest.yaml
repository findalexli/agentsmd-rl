rubric:
- rule: Hook command paths must use ${CLAUDE_PLUGIN_ROOT} for portability instead
    of hardcoded or relative paths
  source:
    path: plugins/learning-output-style/hooks/hooks.json
    lines: 1-46
    commit: ae411f846195b38c8bec88914dd06132e00eadf8
  reference: |
    {
      "description": "Learning mode hook that adds interactive learning instructions",
      "hooks": {
        "SessionStart": [
          {
            "hooks": [
              {
                "type": "command",
                "command": "${CLAUDE_PLUGIN_ROOT}/hooks-handlers/session-start.sh"
              }
            ]
          }
        ]
      }
    }
- rule: SessionStart hook scripts must output valid JSON with hookSpecificOutput.hookEventName
    set to 'SessionStart' and hookSpecificOutput.additionalContext containing the
    instructions
  source:
    path: plugins/learning-output-style/hooks-handlers/session-start.sh
    lines: 1-66
    commit: ae411f846195b38c8bec88914dd06132e00eadf8
  reference: |
    #!/bin/bash
    cat << 'EOF'
    {
      "hookSpecificOutput": {
        "hookEventName": "SessionStart",
        "additionalContext": "You are in 'learning' output style mode..."
      }
    }
    EOF
- rule: 'Plugin hooks.json must use the wrapper format with a "hooks" field containing
    the event definitions (e.g., {"hooks": {"SessionStart": [...]}})'
  source:
    path: plugins/learning-output-style/hooks/hooks.json
    lines: 1-46
    commit: ae411f846195b38c8bec88914dd06132e00eadf8
  reference: |
    {
      "description": "Learning mode hook that adds interactive learning instructions",
      "hooks": {
        "SessionStart": [
          {
            "hooks": [
              {
                "type": "command",
                "command": "${CLAUDE_PLUGIN_ROOT}/hooks-handlers/session-start.sh"
              }
            ]
          }
        ]
      }
    }
- rule: 'Plugin manifest (plugin.json) must include required fields: name, version,
    description, and author (with name and email)'
  source:
    path: plugins/learning-output-style/.claude-plugin/plugin.json
    lines: 1-28
    commit: ae411f846195b38c8bec88914dd06132e00eadf8
  reference: |
    {
      "name": "learning-output-style",
      "version": "1.0.0",
      "description": "Interactive learning mode that requests meaningful code contributions at decision points (mimics the unshipped Learning output style)",
      "author": {
        "name": "Boris Cherny",
        "email": "boris@anthropic.com"
      }
    }
- rule: Hook handler scripts must be executable (chmod +x) to run as command hooks
  source:
    path: plugins/learning-output-style/hooks-handlers/session-start.sh
    lines: 1-66
    commit: ae411f846195b38c8bec88914dd06132e00eadf8
  reference: |
    #!/bin/bash
    chmod +x plugins/learning-output-style/hooks-handlers/session-start.sh
