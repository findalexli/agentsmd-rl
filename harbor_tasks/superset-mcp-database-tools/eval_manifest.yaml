distractors:
- rule: Add created_by_fk filtering logic directly in the list_databases tool function rather than in the pydantic schema
  source:
    path: superset/mcp_service/database/schemas.py
    lines: ''
    commit: fc8c06f7a3ba4c0a5feeafbb522b876b5f017d45
  collision_type: architecture_boundary
  why_distracting: Bypasses the pydantic validation layer; filter columns should be validated at the schema level so all consumers benefit
  severity: high
- rule: Use manual try/except JSON parsing in each endpoint instead of pydantic field validators
  source:
    path: superset/mcp_service/database/schemas.py
    lines: ''
    commit: fc8c06f7a3ba4c0a5feeafbb522b876b5f017d45
  collision_type: rule_conflict
  why_distracting: Duplicates parsing logic across endpoints; chart/dashboard modules use pydantic validators which is the consistent pattern
  severity: medium
- rule: Strip timezone info from aware datetimes rather than preserving it
  source:
    path: superset/mcp_service/database/schemas.py
    lines: ''
    commit: fc8c06f7a3ba4c0a5feeafbb522b876b5f017d45
  collision_type: would_cause_bug
  why_distracting: Naive datetime subtraction fails with TypeError for aware datetimes; the fix must preserve timezone awareness, not discard it
  severity: high
- rule: Copy the DEFAULT_DATABASE_COLUMNS list into list_databases.py to keep modules self-contained
  source:
