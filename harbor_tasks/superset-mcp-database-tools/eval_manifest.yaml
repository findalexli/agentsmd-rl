rubric:
- rule: Use Python 3.10+ union syntax (T | None instead of Optional[T])
  source:
    path: superset/mcp_service/database/schemas.py
    lines: ''
    commit: fc8c06f7a3ba4c0a5feeafbb522b876b5f017d45
  evidence: Gold fix uses T | None syntax in _humanize_timestamp signature and DatabaseError fields
  category: style
  verification: llm_judge
- rule: Handle timezone properly with UTC-aware timestamps
  source:
    path: superset/mcp_service/database/schemas.py
    lines: ''
    commit: fc8c06f7a3ba4c0a5feeafbb522b876b5f017d45
  evidence: Gold fix uses datetime.now(timezone.utc) in DatabaseError.create and handles tzinfo in _humanize_timestamp
  category: style
  verification: llm_judge
- rule: Add type hints to all function parameters and return values
  source:
    path: tests/unit_tests/mcp_service/database/tool/test_database_tools.py
    lines: ''
    commit: fc8c06f7a3ba4c0a5feeafbb522b876b5f017d45
  evidence: Gold fix adds type annotations to create_mock_database parameters (int, str, bool) and -> MagicMock return type
  category: style
  verification: llm_judge
- rule: Keep docstrings accurate and up-to-date with functionality
  source:
    path: superset/mcp_service/mcp_core.py
    lines: ''
    commit: fc8c06f7a3ba4c0a5feeafbb522b876b5f017d45
  evidence: Gold fix updates ModelGetSchemaCore.__init__ docstring to include database in the model_type list
  category: naming
  verification: llm_judge
distractors:
- rule: Strip timezone info from aware datetimes rather than preserving it
  source:
    path: superset/mcp_service/database/schemas.py
    lines: ''
    commit: fc8c06f7a3ba4c0a5feeafbb522b876b5f017d45
  collision_type: would_cause_bug
  why_distracting: Naive datetime subtraction fails with TypeError for aware datetimes; the fix must preserve timezone awareness, not discard it
  severity: high
