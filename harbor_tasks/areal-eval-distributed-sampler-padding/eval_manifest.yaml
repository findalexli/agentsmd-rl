distractors:
- rule: Composition over inheritance -- keep hierarchies <= 2 levels; prefer delegation.
  collision_type: architecture_boundary
  why_distracting: The agent might try to use composition to wrap `DistributedSampler`
    instead of inheriting from it. However, PyTorch's `DataLoader` expects a `Sampler`
    object, and inheriting from `DistributedSampler` is the standard and much simpler
    way to override the padding behavior.
  severity: medium
  source:
    path: AGENTS.md
    lines: 66-66
- rule: Add tests for new functionality.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to create a new test file or modify existing
    tests to cover `EvalDistributedSampler`, which is out of scope for this specific
    bug fix PR and not present in the gold solution.
  severity: low
  source:
    path: AGENTS.md
    lines: 31-31
hierarchy_analysis: AGENTS.md and CLAUDE.md provide overlapping rules at the root
  level. The agent must synthesize the constraint against modifying `cli_args.py`
  to arrive at the `isinstance` check in `dataloader.py`, while ignoring the 'composition
  over inheritance' rule because it crosses the PyTorch architecture boundary.
