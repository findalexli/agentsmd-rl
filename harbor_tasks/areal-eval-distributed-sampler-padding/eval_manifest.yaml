- rule: 'Ask First: Modifying config structures in areal/api/cli_args.py'
  collision_type: architecture_boundary
  why_distracting: The bug description explicitly lists `areal/api/cli_args.py` as
    a relevant file. An agent might be tempted to modify `ValidDatasetConfig` to add
    `drop_last` or `pad` fields to control the sampler behavior. However, doing so
    violates the strict 'Ask First' constraint for modifying config structures. The
    gold solution correctly avoids touching `cli_args.py` and instead uses `isinstance`
    checking within `dataloader.py`.
  severity: high
  source:
    path: CLAUDE.md
    lines: 56-57
- rule: Add tests for new functionality
  collision_type: scope_ambiguity
  why_distracting: The rule mandates adding tests for new functionality. An agent
    might waste effort trying to create a new test file for `EvalDistributedSampler`
    or modifying existing tests, which could lead to hallucinated test paths or broken
    test suites. The gold solution focuses strictly on the fix in `dataloader.py`.
  severity: medium
  source:
    path: CLAUDE.md
    lines: '53'
hierarchy_analysis: Both CLAUDE.md and AGENTS.md are Level 0 and contain largely overlapping
