distractors:
- rule: Composition over inheritance -- keep hierarchies <= 2 levels; prefer delegation.
  collision_type: architecture_boundary
  why_distracting: The agent might try to use composition to wrap `DistributedSampler`
    instead of inheriting from it. However, PyTorch's `DataLoader` expects a `Sampler`
    object, and inheriting from `DistributedSampler` is the standard and much simpler
    way to override the padding behavior.
  severity: medium
  source:
    path: AGENTS.md
    lines: 66-66
- rule: Add tests for new functionality.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to create a new test file or modify existing
    tests to cover `EvalDistributedSampler`, which is out of scope for this specific
    bug fix PR and not present in the gold solution.
  severity: low
  source:
    path: AGENTS.md
    lines: 31-31
- rule: Process Group Management
  source:
    path: .claude/rules/distributed.md
    lines: 10-14
  source_text: '## Process Group Management


    - **Never create global process group** in module-level code

    - Always pass `process_group` explicitly, don''t rely on default

    - Use `dist.get_rank(group)` not `dist.get_rank()` when group matters'
  collision_type: scope_ambiguity
  why_distracting: Because the code implements a custom `DistributedSampler` and handles
    `rank` and `world_size`, an agent might try to apply these distributed rules by
    requiring a `process_group` argument or replacing `rank` with `dist.get_rank(group)`.
    However, this file is in `areal/utils/`, which is outside the rule's path scope
    (`areal/engine/**`), and standard PyTorch samplers operate on `num_replicas` and
    `rank` integers rather than process groups.
  severity: medium
- rule: Validation in __post_init__
  source:
    path: .claude/rules/api-config.md
    lines: 35-43
  source_text: "## Validation\n\n- Use `__post_init__` for validation\n- Raise `ValueError`\
    \ with clear message:\n  ```python\n  def __post_init__(self):\n      if self.batch_size\
    \ <= 0:\n          raise ValueError(f\"batch_size must be positive, got {self.batch_size}\"\
    )\n  ```"
  collision_type: architecture_boundary
  why_distracting: The code validates `dataset_config.batch_size` against `world_size`
    and raises a `ValueError`. An agent reading the API config rules might try to
    move this validation into the `__post_init__` of `_DatasetConfig` or `ValidDatasetConfig`.
    This would be an architectural error because `world_size` is a runtime environment
    variable passed to the dataloader, not a property of the dataset configuration
    itself.
  severity: high
hierarchy_analysis: AGENTS.md and CLAUDE.md provide overlapping rules at the root
  level. The agent must synthesize the constraint against modifying `cli_args.py`
  to arrive at the `isinstance` check in `dataloader.py`, while ignoring the 'composition
  over inheritance' rule because it crosses the PyTorch architecture boundary.
