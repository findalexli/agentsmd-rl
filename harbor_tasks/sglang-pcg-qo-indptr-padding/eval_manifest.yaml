- rule: Comments should explain invariants and design rationale, not narrate the code
  file: python/sglang/srt/layers/attention/flashinfer_backend.py
  check: explanatory_comments
rubric: []
distractors:
- rule: 'Exception: kernels that depend on flashinfer can still be implemented as
    jit_kernel.'
  source:
    path: .claude/skills/add-jit-kernel/SKILL.md
    lines: '22'
  source_text: '- **Exception**: kernels that depend on `flashinfer`, or on CUTLASS
    that is already provided through `flashinfer`, can still be implemented as `jit_kernel`.'
  collision_type: architecture_boundary
  why_distracting: The PR modifies the flashinfer backend which is an orchestration
    Python class in the srt LLM runtime. An agent might interpret the word 'flashinfer'
    as a trigger to port this code into a JIT kernel or treat it as C++ logic, conflating
    Python backend orchestration with CUDA kernel development.
  severity: high
- rule: 'Selects a lossless attention kernel for SGLang-native pipelines: fa (FlashAttention
    2/3/4 alias) or torch_sdpa.'
  source:
    path: python/sglang/multimodal_gen/.claude/skills/sglang-diffusion-performance/SKILL.md
    lines: '36'
  source_text: '| **Attention Backend (lossless)** | `--attention-backend fa` | Selects
    a lossless attention kernel for SGLang-native pipelines: `fa` (FlashAttention
    2/3/4 alias) or `torch_sdpa`. | FA is usually faster than SDPA on long sequences
    | FA requires compatible GPU (Ampere+). For `--backend diffusers`, valid backend
    names differ; use the names documented in `docs/diffusion/performance/attention_backends.md`.
    |'
  collision_type: scope_ambiguity
  why_distracting: An agent reading about attention backends (like flashinfer) might
    think it should apply diffusion-specific flags and fallbacks (like --attention-backend
    fa or torch_sdpa) to the srt flashinfer_backend.py, which belongs strictly to
    the LLM engine and has its own routing logic.
  severity: medium
- rule: Temporarily disable CUDA graph and piecewise CUDA graph for real-model success-path
    level-10 dumps.
  source:
    path: .claude/skills/debug-cuda-crash/SKILL.md
    lines: '235'
  source_text: For real-model success-path level-10 dumps, it is often easier to temporarily
    disable CUDA graph and piecewise CUDA graph for the debug run.
  collision_type: meta_confusion
  why_distracting: The PR modifies piecewise_context_manager.py to track num_tokens
    for the piecewise CUDA graph. An agent might see this debugging tip and mistakenly
    try to implement logic to automatically disable the piecewise CUDA graph on failure
    or avoid its use entirely.
  severity: low
- rule: Do not append --enable-piecewise-cuda-graph to sglang generate because it
    is a server flag.
  source:
    path: python/sglang/multimodal_gen/.claude/skills/sglang-diffusion-benchmark-profile/benchmark-and-profile.md
    lines: 435-436
  source_text: '# Note: `--enable-piecewise-cuda-graph` is a server flag, not a valid

    # `sglang generate` flag, so do not append it here.'
  collision_type: scope_ambiguity
  why_distracting: An agent working on the piecewise context manager might assume
    this multimodal diffusion CLI rule relates to how they should expose or test the
    num_tokens parameter being added, but this rule applies strictly to profiling
    diffusion models.
  severity: low
