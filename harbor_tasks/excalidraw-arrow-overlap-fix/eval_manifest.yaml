  evidence: 'The gold solution modifies files in `packages/element/src/` (e.g., `binding.ts`,
    `align.ts`, `arrows/focus.ts`) to implement the core arrow binding logic, adhering
    to the rule to work in `packages/*` '
  category: architecture
- rule: 'Testing: Always run `yarn test:update` before committing'
  source:
    path: CLAUDE.md
    lines: 15-16
  evidence: The gold solution includes changes to `packages/excalidraw/tests/__snapshots__/history.test.tsx.snap`,
    demonstrating that snapshot tests were updated as required by the testing workflow.
  category: testing
distractors:
- rule: 'App Development: Work in `excalidraw-app/` for app-specific features'
  collision_type: architecture_boundary
  why_distracting: The issue mentions 'App-level binding updates' in `packages/excalidraw/components/App.tsx`.
    The rule states that app development should happen in `excalidraw-app/`. An agent
    might mistakenly try to apply the App-level changes in the `excalidraw-app/` directory
    instead of the `packages/excalidraw/` package, misunderstanding the boundary between
    the core library's App component and the actual web application.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 14-15
hierarchy_analysis: Only one config file (`CLAUDE.md`) is present, so there are no
  hierarchy conflicts. The rules clearly separate `packages/*` for library/editor
  features and `excalidraw-app/` for the web application.
