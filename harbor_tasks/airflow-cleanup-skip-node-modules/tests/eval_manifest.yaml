rubric:
  - id: use_os_walk_for_traversal
    description: |
      Use os.walk instead of Path.rglob() for directory traversal.
      The original code used two rglob calls which are inefficient for large trees.
      
      Source: CLAUDE.md line 117+ - follow Python performance best practices
    points: 2
  
  - id: prune_dirnames_in_place
    description: |
      Modify dirnames[:] in-place to prune os.walk traversal.
      This is the correct pattern for skipping subtrees in os.walk.
      
      Source: dev/breeze/src/airflow_breeze/utils/path_utils.py
    points: 2
  
  - id: skip_node_modules
    description: |
      Skip node_modules directories during traversal.
      These directories can be very large and never contain relevant Python files.
      
      Source: PR description - main goal of the optimization
    points: 2
  
  - id: skip_hidden_directories
    description: |
      Skip hidden directories (those starting with ".") like .git, .venv, .tox.
      These are common in development environments and never contain relevant Python files.
      
      Source: PR description - main goal of the optimization
    points: 2
  
  - id: preserve_error_handling
    description: |
      Preserve the original error handling for FileNotFoundError and PermissionError.
      Both should be caught and handled appropriately (FileNotFoundError ignored,
      PermissionError collected in list for reporting).
      
      Source: Original code structure
    points: 1
  
  - id: handle_pyc_files_correctly
    description: |
      Correctly identify and delete .pyc files by checking filename.endswith(".pyc").
      
      Source: dev/breeze/src/airflow_breeze/utils/path_utils.py
    points: 1
  
  - id: handle_pycache_directories_correctly
    description: |
      Correctly identify __pycache__ directories by checking Path(dirpath).name.
      After removing a __pycache__ dir, clear dirnames to skip further traversal.
      
      Source: dev/breeze/src/airflow_breeze/utils/path_utils.py
    points: 1
