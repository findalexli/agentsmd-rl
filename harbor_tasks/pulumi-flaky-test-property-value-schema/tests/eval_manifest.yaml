    origin: problem_spec
    description: "JSON schema must have Float property values definition with correct structure"

  - id: test_float_object_generator_exists
    type: fail_to_pass
    origin: problem_spec
    description: "Test file must have FloatObjectGenerator function with correct hex values"

  - id: test_generator_registered_in_object_value_generator
    type: fail_to_pass
    origin: problem_spec
    description: "FloatObjectGenerator must be registered in ObjectValueGenerator"

  - id: test_test_property_value_schema_passes
    type: fail_to_pass
    origin: problem_spec
    description: "TestPropertyValueSchema/serialized must pass (not flaky)"

  # Pass-to-pass tests (must pass on both base and fix)
  - id: test_go_build_passes
    type: pass_to_pass
    origin: repo_tests
    description: "Go code compiles without errors"

  - id: test_go_vet_passes
    type: pass_to_pass
    origin: repo_tests
    description: "go vet passes"

  - id: test_json_schema_is_valid
    type: pass_to_pass
    origin: repo_tests
    description: "JSON schema file is valid JSON"

  # Agent config compliance checks
  - id: agent_config_json_schema_const
    type: fail_to_pass
    origin: agent_config
    source:
      file: AGENTS.md
      lines: "32-33"
      commit: e7a8c6babcdd6a6b97d288c3c82b61845a286bbd
    description: "Schema changes follow repo conventions (AGENTS.md)"

