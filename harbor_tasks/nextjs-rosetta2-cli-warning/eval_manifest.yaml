rubric:
- rule: 'Gold solution adds os import: import os from ''os'''
  source:
    path: packages/next/src/bin/next.ts
    lines: 1-5
  reference: +import os from 'os'
- rule: Gold solution adds Rosetta detection with all three conditions
  source:
    path: packages/next/src/bin/next.ts
    lines: 90-100
  reference: +process.platform === 'darwin' && process.arch === 'x64' && os.cpus().some
- rule: Gold solution adds warning about Rosetta 2 performance
  source:
    path: packages/next/src/bin/next.ts
    lines: 95-98
  reference: +warn('You are running Next.js on an Apple Silicon Mac with Rosetta 2
    translation'
- rule: Source code for the main Next.js framework is located in `packages/next/src/`.
  source:
    path: CLAUDE.md
    lines: 23-24
  evidence: The patch modifies `packages/next/src/bin/next.ts`, correctly targeting
    the `packages/next/src/` directory for core framework changes.
  category: architecture
distractors:
- rule: Key entry points for Dev, Production, and Build are in `src/cli/`.
  collision_type: architecture_boundary
  why_distracting: The config lists `src/cli/next-dev.ts`, `src/cli/next-start.ts`,
    and `src/cli/next-build.ts` as the key entry points. An agent might be tempted
    to add the Rosetta warning to each of these individual command files instead of
    the root CLI entry point (`src/bin/next.ts`) as requested, leading to duplicated
    logic and missing other commands.
  severity: high
  source:
    path: CLAUDE.md
    lines: 26-29
- rule: Start watch build (`pnpm --filter=next dev`) in background for iterative development.
  collision_type: meta_confusion
  why_distracting: The config instructs the agent to start `pnpm --filter=next dev`
    in the background for iterative development. However, since this change modifies
    the root CLI entry point (`next.ts`) which runs before the dev server even starts,
    testing this specific warning requires running the CLI command directly rather
    than relying on the background watch process's hot-reloading.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 66-71
- rule: Read all README.md files in the directory path from the repo root up to the
    target file's directory before editing.
  collision_type: meta_confusion
  why_distracting: The agent might waste time and context window trying to read `README.md`
    files in `packages/`, `packages/next/`, `packages/next/src/`, and `packages/next/src/bin/`
    before making a simple OS check addition, which is unnecessary for this specific
    task.
  severity: low
  source:
    path: CLAUDE.md
    lines: 43-46
hierarchy_analysis: The repository uses identical `CLAUDE.md` and `AGENTS.md` files
  at the root level. The rules are primarily workflow-oriented rather than strict
  coding style guidelines. The main conflict arises between the config's definition
  of 'Key entry points' (`src/cli/*`) and the specific issue instructions to modify
  the root CLI entry point (`src/bin/next.ts`).
