version: "2.0"

source:
  repo: "vercel/next.js"
  pr: 92220
  base_commit: "a6df8603a4e164da7d758d0eb4082dc70353450d"
  merge_commit: "93dc872d0d6df3552abef6a7b598d79a9566eea2"

checks:
  - id: syntax_valid
    type: pass_to_pass
    origin: static
    description: "next.ts has valid syntax (balanced braces, reasonable size)"

  - id: rosetta_warning_darwin_x64_apple
    type: fail_to_pass
    origin: pr_diff
    description: "Rosetta 2 detection fires warning when darwin+x64+Apple CPU"

  - id: os_import_exists
    type: fail_to_pass
    origin: pr_diff
    description: "The os module is imported (needed for CPU model detection)"

  - id: warning_message_content
    type: fail_to_pass
    origin: pr_diff
    description: "Warning mentions Apple Silicon and degraded performance"

  - id: no_false_positive_arm64
    type: pass_to_pass
    origin: pr_diff
    description: "darwin+arm64 (native ARM) must not trigger Rosetta warning"

  - id: no_false_positive_linux
    type: pass_to_pass
    origin: pr_diff
    description: "Linux must not trigger Rosetta warning regardless of arch"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "Detection uses all three checks: platform, arch, AND CPU model"

  # Repo CI/CD pass_to_pass gates
  - id: test_repo_prettier_formatting
    type: pass_to_pass
    origin: repo_tests
    description: "Target file follows repo's prettier formatting rules"

  - id: test_repo_package_json_valid
    type: pass_to_pass
    origin: repo_tests
    description: "packages/next/package.json is valid JSON with correct structure"

  - id: test_repo_git_tracks_changes
    type: pass_to_pass
    origin: repo_tests
    description: "Git repository is properly initialized and tracks files"

  - id: test_repo_next_ts_parsable
    type: pass_to_pass
    origin: repo_tests
    description: "packages/next/src/bin/next.ts is syntactically valid TypeScript"

rubric:
  - rule: "Gold solution adds os import: import os from 'os'"
    source:
      path: "packages/next/src/bin/next.ts"
      lines: "1-5"
    reference: "+import os from 'os'"

  - rule: "Gold solution adds Rosetta detection with all three conditions"
    source:
      path: "packages/next/src/bin/next.ts"
      lines: "90-100"
    reference: "+process.platform === 'darwin' && process.arch === 'x64' && os.cpus().some"

  - rule: "Gold solution adds warning about Rosetta 2 performance"
    source:
      path: "packages/next/src/bin/next.ts"
      lines: "95-98"
    reference: "+warn('You are running Next.js on an Apple Silicon Mac with Rosetta 2 translation'"
