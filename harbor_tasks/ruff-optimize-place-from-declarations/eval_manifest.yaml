distractors:
- rule: Try hard to avoid patterns that require `panic!`, `unreachable!`, or `.unwrap()`.
    Instead, try to encode those constraints in the type system. Don't be afraid to
    write code that's more verbose or requires largeish refactors if it enables you
    to avoid these unsafe calls.
  collision_type: scope_ambiguity
  why_distracting: The gold solution explicitly uses `unreachable!("If we have at
    least one declaration...")` when handling `Truthiness::AlwaysTrue` for undeclared
    reachability. Attempting to encode this specific invariant into the type system
    would require a massive refactor of how reachability constraints and truthiness
    are represented, completely derailing the targeted performance optimization of
    this PR.
  severity: high
  source:
    path: AGENTS.md
    lines: 57-57
- rule: Avoid writing significant amounts of new code. This is often a sign that we're
    missing an existing method or mechanism that could help solve the problem. Look
    for existing utilities first.
  collision_type: scope_ambiguity
  why_distracting: The PR specifically requires introducing a new abstraction (`DeclarationsBoundnessEvaluator`)
    to separate the concern of *what* boundness analysis strategy to use from *when*
    to evaluate it. An agent strictly following the rule to 'avoid writing significant
    amounts of new code' might try to hack the existing eager evaluation or reuse
    existing iterators inappropriately instead of properly implementing the necessary
    lazy evaluation structure.
  severity: medium
  source:
    path: AGENTS.md
    lines: 56-56
hierarchy_analysis: The configuration is flat, with all rules residing in the root
  `AGENTS.md` file. The primary tension in this PR is between the general architectural
  guidelines (avoiding `unreachable!`, avoiding new code) and the specific requirements
  of the performance optimization, which necessitates introducing a new enum and using
  `unreachable!` for an invariant that is impractical to encode in the type system.
