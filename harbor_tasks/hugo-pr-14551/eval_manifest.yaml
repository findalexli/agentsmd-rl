  pr_number: 14551

task:
  name: "hugo-taxonomy-empty-key-fix"
  title: "Fix taxonomy empty key ancestor hang"
  description: |
    Fixes a bug where taxonomy entries with empty keys or values are not filtered out,
    causing .Ancestors to loop indefinitely on pages with taxonomy terms.

    When a TOML config has non-taxonomy keys (e.g. disableKinds = []) placed after
    [taxonomies], they become part of the taxonomies table, creating phantom taxonomy
    entries with empty pluralTreeKey values.

  difficulty: medium
  tags: ["hugo", "config", "taxonomy", "toml"]
  estimated_minutes: 30

checks:
  - id: test_taxonomy_empty_key_filtering
    type: fail_to_pass
    origin: agent_config
    description: |
      Verifies that taxonomy entries with empty keys or values are filtered out.
      The new test TestDisableKindsEmptySliceAncestors runs with a config that has
      disableKinds = [] after [taxonomies], creating a phantom taxonomy entry.
      With the bug, the test hangs or fails. With the fix, ancestors = 2 (section|home).
    source:
      file: config/allconfig/alldecoders.go
      commit: cc338a9d4854c7e7273a5c3c8fee436c642f4dde
      rule: "taxonomy decoder must filter empty-key/empty-value entries"

  - id: test_hugo_builds
