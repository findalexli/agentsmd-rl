version: "2.0"

source:
  repo: "sgl-project/sglang"
  pr: 21582
  base_commit: "5ef56682b800c3905973c86beeddf1318cedb2a9"
  merge_commit: "8edd4fa802f7"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "runners.py must parse without syntax errors"

  - id: dead_process_raises_runtime_error
    type: fail_to_pass
    origin: pr_diff
    description: "forward() raises RuntimeError with exit code info when subprocess dies (exitcodes 1, 42, 137)"

  - id: dead_process_negative_exitcode
    type: fail_to_pass
    origin: pr_diff
    description: "forward() raises RuntimeError when subprocess killed by signal (exitcodes -9, -15, -11)"

  - id: no_hang_on_dead_process
    type: fail_to_pass
    origin: pr_diff
    description: "forward() completes within 15s when subprocess is dead instead of hanging forever"

  - id: forward_returns_when_alive
    type: pass_to_pass
    origin: pr_diff
    description: "forward() returns queued result when subprocess is healthy (normal operation unchanged)"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "runners.py is not gutted: has expected classes, functions, and line count"

  - id: repo_precommit_basic
    type: pass_to_pass
    origin: repo_tests
    description: "Repo pre-commit basic checks pass (symlinks, yaml, toml, ast, merge conflicts, private keys, debug statements)"

  - id: repo_ruff_lint
    type: pass_to_pass
    origin: repo_tests
    description: "Repo ruff lint checks pass (F401 unused imports, F821 undefined names) for runners.py"

  - id: repo_python_compileall
    type: pass_to_pass
    origin: repo_tests
    description: "Repo Python files compile without syntax errors"

  - id: repo_codespell
    type: pass_to_pass
    origin: repo_tests
    description: "Repo codespell passes on runners.py (no common typos)"

  - id: repo_isort
    type: pass_to_pass
    origin: repo_tests
    description: "Repo isort check passes on runners.py (imports are sorted)"

  - id: repo_pyflakes
    type: pass_to_pass
    origin: repo_tests
    description: "Repo pyflakes check passes on runners.py (no undefined names)"

  - id: repo_yamllint
    type: pass_to_pass
    origin: repo_tests
    description: "Repo yamllint check passes on CI workflow files (valid YAML syntax)"

rubric:
  - rule: "Code must handle subprocess lifecycle properly. Check if processes are alive before blocking operations and report meaningful exit codes on failure."
    source:
      path: ".claude/skills/write-sglang-test/SKILL.md"
      lines: "19,85-86"
      commit: "5ef56682b800c3905973c86beeddf1318cedb2a9"

  - rule: "Test infrastructure must use defensive patterns. Use timeouts on blocking operations and validate preconditions before accessing resources."
    source:
      path: ".claude/skills/write-sglang-test/SKILL.md"
      lines: "19"
      commit: "5ef56682b800c3905973c86beeddf1318cedb2a9"

  - rule: "Error handling must include diagnostic information. Include exit codes, process status, and context when raising errors about subprocess failures."
    source:
      path: ".claude/skills/ci-workflow-guide/SKILL.md"
      lines: "1-10"
      commit: "5ef56682b800c3905973c86beeddf1318cedb2a9"
