distractors:
- rule: Always use CustomTestCase for tests
  source:
    path: .claude/skills/write-sglang-test/SKILL.md
    lines: '12'
  source_text: 1. **Always use `CustomTestCase`** — never raw `unittest.TestCase`.
    It ensures `tearDownClass` runs even when `setUpClass` fails, preventing resource
    leaks in CI.
  collision_type: scope_ambiguity
  why_distracting: The diff is in a file under `test/` (`python/sglang/test/runners.py`),
    so an agent might assume it's a test case and try to refactor it to use `CustomTestCase`.
    However, `runners.py` is a utility class for test execution, not a test suite
    itself.
  severity: medium
- rule: tearDownClass must be defensive when checking process resources
  source:
    path: .claude/skills/write-sglang-test/SKILL.md
    lines: '13'
  source_text: 2. **`tearDownClass` must be defensive** — use `hasattr`/null checks
    before accessing resources (e.g. `cls.process`) that `setUpClass` may not have
    finished allocating.
  collision_type: scope_ambiguity
  why_distracting: The diff checks the status of a process (`self.model_proc.is_alive()`).
    An agent might confuse this process state monitoring during execution with the
    `tearDownClass` resource cleanup rules, incorrectly thinking this change needs
    `hasattr` checks or is part of a test cleanup phase.
  severity: low
- rule: Place tests in test/registered/<category>/
  source:
    path: .claude/skills/write-sglang-test/SKILL.md
    lines: '14'
  source_text: 3. **Place tests in `test/registered/<category>/`** — except JIT kernel
    tests and benchmarks, which live in `python/sglang/jit_kernel/tests/` and `python/sglang/jit_kernel/benchmark/`
    (nested subfolders are allowed)
  collision_type: scope_ambiguity
  why_distracting: Since the modified file is in `python/sglang/test/`, an agent might
    think this test-related file is in the wrong location and suggest moving it to
    `test/registered/`. However, it's a test runner utility, not a test case.
  severity: medium
