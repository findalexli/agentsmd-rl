    description: EventRegistration uses volatile EventHandler[] array instead of List<EventHandler>
    origin: behavior
    weight: 1.0

  - id: test_event_dispatcher_has_thread_safe_add_handler
    type: fail_to_pass
    description: EventRegistration.AddHandler uses lock for thread-safe addition
