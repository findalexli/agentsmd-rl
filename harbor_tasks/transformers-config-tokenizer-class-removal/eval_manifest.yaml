distractors:
- rule: 'Fail-closed behavior for agents: If coordination evidence cannot be found,
    do not proceed to PR-ready output.'
  collision_type: meta_confusion
  why_distracting: The agent is operating in an isolated evaluation environment without
    access to GitHub issues or coordination evidence. Following the fail-closed rule
    would cause the agent to refuse to generate the patch.
  severity: high
  source:
    path: CLAUDE.md
    lines: 49-52
- rule: 'No low-value busywork PRs: Do not open one-off PRs for tiny edits.'
  collision_type: scope_ambiguity
  why_distracting: The agent might misclassify the removal of a single attribute (`tokenizer_class`)
    as a 'tiny edit' or 'low-value busywork' and refuse to implement the fix, failing
    to recognize it as a necessary API cleanup that fixes a compatibility bug.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 34-36
- rule: '`make style` or `make fix-repo` should be run as the final step before opening
    a PR.'
  collision_type: scope_ambiguity
  why_distracting: Running `make fix-repo` in the transformers repository often touches
    many files due to unrelated docstring or copy updates that are out of sync in
    the base branch. This would bloat the PR with unrelated changes.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 8-8
- rule: 'Copies and Modular Models: Ideally you should edit the code it''s copying
    from and propagate the change.'
  collision_type: architecture_boundary
  why_distracting: The agent might assume `MT5Config` and `UMT5Config` are copies
    of `T5Config` and try to edit `T5Config` instead, or run `make fix-repo` expecting
    it to update the MT5/UMT5 files. However, `tokenizer_class` is explicitly defined
    in these files without a copy directive.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 58-58
hierarchy_analysis: The repository uses identical `CLAUDE.md` and `AGENTS.md` files
  at the root level. The rules are heavily focused on agent behavior, coordination,
  and repository maintenance tools (`make fix-repo`).
