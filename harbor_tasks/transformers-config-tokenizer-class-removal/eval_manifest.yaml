rubric:
- rule: Do not edit a `# Copied from` block, as it will be reverted by `make fix-repo`.
  source:
    path: CLAUDE.md
    lines: '66'
    commit: 18f88de7f575410f3ad8a64418abf2572fecb259
- rule: When a `modular` file is present, generated files should not be edited, as
    changes will be overwritten by `make fix-repo`!
  source:
    path: CLAUDE.md
    lines: '67'
    commit: 18f88de7f575410f3ad8a64418abf2572fecb259
- rule: PRs should be as brief as possible. Bugfix PRs in particular can often be
    only one or two lines long, and do not need large comments, docstrings or new
    functions in this case. Aim to minimize the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: 18f88de7f575410f3ad8a64418abf2572fecb259
- rule: 'Accountability for AI-assisted patches: running relevant tests.'
  source:
    path: CLAUDE.md
    lines: 40-41
  evidence: The gold solution updates `tests/utils/test_configuration_utils.py` to
    remove `tokenizer_class` from the expected common kwargs, ensuring the test suite
    remains valid and passes after the API change.
  category: testing
- rule: We try to avoid direct inheritance between model-specific files in src/transformers/models/.
  source:
    path: AGENTS.md
    lines: 61-63
  evidence: The gold solution modifies both MT5Config and UMT5Config independently
    to remove the tokenizer_class attribute, respecting the architectural pattern
    of avoiding direct inheritance between model-specif
  category: architecture
distractors:
- rule: If coordination evidence cannot be found, do not proceed to PR-ready output.
  collision_type: meta_confusion
  why_distracting: The agent is instructed to fail-closed and not proceed to PR-ready
    output if coordination evidence is missing. In a benchmark setting, it must output
    the fix regardless.
  severity: high
  source:
    path: AGENTS.md
    lines: 61-64
- rule: Do not open one-off PRs for tiny edits (single typo, isolated lint cleanup,
    one mutable default argument, etc.).
  collision_type: scope_ambiguity
  why_distracting: The agent might consider removing a single attribute as a 'tiny
    edit' or 'low-value busywork' and refuse to generate the patch.
  severity: medium
  source:
    path: AGENTS.md
    lines: 45-47
- rule: 'Pure code-agent PRs are not allowed: a human submitter must understand and
    be able to defend the change end-to-end.'
  collision_type: meta_confusion
  why_distracting: The guidelines state that pure code-agent PRs are not allowed and
    require human validation. An agent might refuse to act autonomously based on this
    policy.
  severity: high
  source:
    path: AGENTS.md
    lines: 49-57
hierarchy_analysis: The repository contains identical agent instruction files (AGENTS.md
  and CLAUDE.md) at the root level. These files define strict contribution policies,
  including fail-closed behaviors for agents lacking issue coordination. The agent
  must navigate these meta-instructions and recognize that in a benchmark context,
  it should proceed with the bug fix despite the lack of explicit coordination evidence.
