rubric:
- rule: PSR-12 formatting must be enforced. PHP code should follow PSR-12 style conventions
    as enforced by Pint.
  source:
    path: AGENTS.md
    lines: '86'
    commit: 4e10cabec0bf504daffb1bc53ad86bdf6f2cc727
- rule: Code changes should include appropriate comments explaining the rationale,
    especially for non-obvious logic like race condition fixes.
  source:
    path: AGENTS.md
    lines: '86'
    commit: 4e10cabec0bf504daffb1bc53ad86bdf6f2cc727
- rule: Action pattern (HTTP endpoints) where the endpoint logic is implemented in
    the `action()` method.
  source:
    path: AGENTS.md
    lines: 64-83
  evidence: The fix is implemented directly inside the `action()` method of the `Create`
    class, preserving the established Action pattern for HTTP endpoints.
  category: architecture
- rule: Inside `Http` directories for services, file names can only be `Get.php`,
    `Update.php`, `Create.php`, `Delete.php` or `XList.php`.
  source:
    path: src/Appwrite/Platform/AGENTS.md
    lines: 29-32
  evidence: The fix modifies `src/Appwrite/Platform/Modules/Databases/Http/VectorsDB/Collections/Create.php`,
    which strictly follows the rule that file names in Http directories can only be
    standard CRUD names.
  category: naming
distractors:
- rule: For non-CRUD operations, model the endpoint as a property update.
  collision_type: scope_ambiguity
  why_distracting: The rule suggests modeling non-CRUD operations as property updates
    (e.g., `Status/Update.php`). An agent might interpret 'bootstrapping metadata'
    as a non-CRUD operation and try to extract this logic into a new endpoint or file,
    rather than fixing the race condition inline within the existing collection creation
    flow.
  severity: medium
  source:
    path: src/Appwrite/Platform/AGENTS.md
    lines: 33-35
- rule: Use `src/Appwrite/Platform/Workers/` for background job workers.
  collision_type: architecture_boundary
  why_distracting: The rule mentions background job workers (`src/Appwrite/Platform/Workers/`).
    An agent might think that handling concurrent initialization and retries should
    be offloaded to a background worker to avoid blocking the HTTP request, but the
    requirements explicitly ask for an inline synchronous retry loop with `usleep`.
  severity: high
  source:
    path: AGENTS.md
    lines: 28-29
hierarchy_analysis: The base `AGENTS.md` defines the overall architecture and action
  pattern, while `src/Appwrite/Platform/AGENTS.md` provides stricter naming conventions
  for the Modules directory. The agent must apply the inline fix within the existing
  `Create.php` action method, respecting the strict HTTP directory file naming rules,
  without being tempted to extract the retry/bootstrap logic into a new non-CRUD endpoint
  or a background worker.
version: '2.0'
