id: appwrite-vectorsdb-metadata-race
name: Fix flaky VectorsDB metadata bootstrap race condition
source_pr: https://github.com/appwrite/appwrite/pull/11772
base_commit: 4e10cabec0bf504daffb1bc53ad86bdf6f2cc727
merge_commit: e3f373b8d244223a94a05c24a8151f5e3c9ac1df
target_file: src/Appwrite/Platform/Modules/Databases/Http/VectorsDB/Collections/Create.php

# This PR fixes a race condition where concurrent requests to create the first
# collection in a VectorsDB database could fail due to non-atomic existence checks
# followed by create() calls. The fix implements a retry loop with proper exception
# handling for DuplicateException and other Throwable errors.

# All checks are programmatic - no LLM judge needed
llm_judge: false

checks:
  # Fail-to-pass checks (verify the fix is implemented correctly)
  - id: file_exists
    type: programmatic
    description: "Target file exists"
    function: test_target_file_exists
    source: base_commit

  - id: php_syntax
    type: programmatic
    description: "PHP syntax is valid"
    function: test_php_syntax_valid
    source: base_commit

  - id: bootstrap_comment
    type: programmatic
    description: "Explanatory comment about race condition fix is present"
    function: test_bootstrap_comment_present
    source: agent_config
    agent_config_ref: "AGENTS.md - Code changes should include appropriate comments"

  - id: retry_loop
    type: programmatic
    description: "Retry loop with 5 attempts is implemented"
    function: test_retry_loop_structure
    source: merge_commit

  - id: duplicate_exception
    type: programmatic
    description: "DuplicateException is caught and handled with break"
    function: test_duplicate_exception_handling
    source: merge_commit

  - id: throwable_catch
    type: programmatic
    description: "Throwable is caught with metadata exists check"
    function: test_throwable_catch_with_exists_check
    source: merge_commit

  - id: max_attempts
    type: programmatic
    description: "Max attempts check before throwing"
    function: test_max_attempts_check
    source: merge_commit

  - id: usleep_delay
    type: programmatic
    description: "100ms usleep between retry attempts"
    function: test_usleep_retry_delay
    source: merge_commit

  - id: no_pre_check
    type: programmatic
    description: "Old exists() pre-check pattern is removed"
    function: test_no_pre_check_exists
    source: merge_commit

  - id: create_in_loop
    type: programmatic
    description: "create() is called inside retry loop"
    function: test_create_called_in_loop
    source: merge_commit

  - id: retry_comprehensive
    type: programmatic
    description: "All retry logic components in correct order"
    function: test_retry_logic_comprehensive
    source: merge_commit

  # Pass-to-pass checks - CI/CD tests using subprocess.run() (origin: repo_tests)
  - id: composer_validate
    type: pass_to_pass
    description: "Repo's composer.json passes composer validation"
    function: test_composer_validate
    origin: repo_tests
    command: "composer validate --no-check-publish"

  - id: composer_audit
    type: pass_to_pass
    description: "Repo's dependencies pass security audit"
    function: test_composer_audit
    origin: repo_tests
    command: "composer audit --no-interaction"

  - id: php_syntax_check
    type: pass_to_pass
    description: "Target PHP file passes php -l syntax check"
    function: test_php_syntax_check
    origin: repo_tests
    command: "php -l"

  # Pass-to-pass checks - Static file validation (origin: static)
  - id: composer_json_valid
    type: pass_to_pass
    description: "Repo's composer.json is valid JSON with required scripts"
    function: test_composer_json_valid
    origin: static

  - id: pint_json_valid
    type: pass_to_pass
    description: "Repo's pint.json enforces PSR-12 preset"
    function: test_pint_json_valid
    origin: static

  - id: phpstan_config_valid
    type: pass_to_pass
    description: "Repo's phpstan.neon config is valid YAML"
    function: test_phpstan_config_valid
    origin: static

  - id: phpunit_xml_valid
    type: pass_to_pass
    description: "Repo's phpunit.xml is valid XML"
    function: test_phpunit_xml_valid
    origin: static

  - id: target_file_no_syntax_errors
    type: pass_to_pass
    description: "Target PHP file has balanced braces/parens/brackets"
    function: test_target_file_no_syntax_errors
    origin: static

  - id: php_namespace_valid
    type: pass_to_pass
    description: "PHP namespace and use statements are valid"
    function: test_php_namespace_declarations_valid
    origin: static

  - id: repo_directory_structure
    type: pass_to_pass
    description: "Repo has expected directory structure for CI/CD"
    function: test_repo_directory_structure_valid
    origin: static

  - id: php_class_structure
    type: pass_to_pass
    description: "Target file has valid PHP class structure"
    function: test_php_class_structure_valid
    origin: static

  - id: no_merge_conflicts
    type: pass_to_pass
    description: "No Git merge conflict markers in target file"
    function: test_no_merge_conflicts_in_file
    origin: static

  - id: php_opening_tag
    type: pass_to_pass
    description: "PHP files have proper opening tag"
    function: test_php_opening_tag_present
    origin: static

rubric:
  - rule: "PSR-12 formatting must be enforced. PHP code should follow PSR-12 style conventions as enforced by Pint."
    source:
      path: "AGENTS.md"
      lines: "86"
      commit: "4e10cabec0bf504daffb1bc53ad86bdf6f2cc727"

  - rule: "Code changes should include appropriate comments explaining the rationale, especially for non-obvious logic like race condition fixes."
    source:
      path: "AGENTS.md"
      lines: "86"
      commit: "4e10cabec0bf504daffb1bc53ad86bdf6f2cc727"
