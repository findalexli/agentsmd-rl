rubric:
- rule: PSR-12 formatting must be enforced. PHP code should follow PSR-12 style conventions
    as enforced by Pint.
  source:
    path: AGENTS.md
    lines: '86'
    commit: 4e10cabec0bf504daffb1bc53ad86bdf6f2cc727
- rule: Code changes should include appropriate comments explaining the rationale,
    especially for non-obvious logic like race condition fixes.
  source:
    path: AGENTS.md
    lines: '86'
    commit: 4e10cabec0bf504daffb1bc53ad86bdf6f2cc727
- rule: Action pattern (HTTP endpoints) where the endpoint logic is implemented in
    the `action()` method.
  source:
    path: AGENTS.md
    lines: 64-83
  evidence: The fix is implemented directly inside the `action()` method of the `Create`
    class, preserving the established Action pattern for HTTP endpoints.
  category: architecture
- rule: Inside `Http` directories for services, file names can only be `Get.php`,
    `Update.php`, `Create.php`, `Delete.php` or `XList.php`.
  source:
    path: src/Appwrite/Platform/AGENTS.md
    lines: 29-32
  evidence: The fix modifies `src/Appwrite/Platform/Modules/Databases/Http/VectorsDB/Collections/Create.php`,
    which strictly follows the rule that file names in Http directories can only be
    standard CRUD names.
  category: naming
- rule: PHP 8.3+
  source:
    path: AGENTS.md
    lines: 16-17
  evidence: Uses PHP 8+ syntax such as catching an exception without assigning it
    to a variable (`catch (DuplicateException)`) and using numeric literal separators
    (`100_000`).
  category: style
distractors:
- rule: Swoole 6.x (async runtime, replaces PHP-FPM)
  collision_type: architecture_boundary
  why_distracting: The agent might avoid using the standard PHP `\usleep()` function,
    assuming it will block the async event loop, and instead try to implement Swoole-specific
    coroutine sleep functions (e.g., `\Swoole\Coroutine::sleep()`). This breaks the
    framework's abstraction, as Swoole automatically hooks native PHP functions.
  severity: medium
  source:
    path: AGENTS.md
    lines: 16-17
hierarchy_analysis: The config hierarchy provides general architectural guidelines
  (Swoole, PHP 8.3, module structure) across two `AGENTS.md` files. However, the task
  instructions are highly prescriptive, reducing the need to deeply consult or resolve
  conflicts within the configs.
version: '2.0'
