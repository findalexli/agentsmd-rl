task:
  name: airflow-workers-affinity-split
  title: Add workers.celery.affinity & workers.kubernetes.affinity
  description: |
    Split the deprecated workers.affinity field into two new fields:
    workers.celery.affinity for Celery worker pods and
    workers.kubernetes.affinity for Kubernetes executor pod template.
    The old workers.affinity field should still work for backward compatibility,
    but the new fields should take precedence when set.

  files_to_modify:
    - chart/files/pod-template-file.kubernetes-helm-yaml
    - chart/values.schema.json
    - chart/values.yaml
    - chart/templates/NOTES.txt
    - chart/newsfragments/64860.significant.rst

