rubric:
  - id: helm_precedence_order
    description: |
      Helm template precedence order should be correct:
      workers.kubernetes.affinity > workers.affinity > global affinity
      for pod-template-file, and workers.celery.affinity > workers.affinity
      for Celery worker deployment.
    points: 5
    source:
      file: CLAUDE.md
      lines: "Architecture Boundaries"
      rule: Follow the documented template logic and precedence patterns

  - id: schema_definitions_complete
    description: |
      Schema definitions in values.schema.json should be complete with
      proper descriptions, types, and references to k8s Affinity type.
    points: 3
    source:
      file: CLAUDE.md
      lines: "Coding Standards"
      rule: Write clear, maintainable code following project conventions

  - id: deprecation_handling
    description: |
      Deprecation should be handled properly: old field still works,
      new fields are added, deprecation warnings in NOTES.txt,
      deprecation note in schema description, and newsfragment added.
    points: 5
    source:
      file: CLAUDE.md
      lines: "Commits and PRs"
      rule: Add a newsfragment for user-visible changes

