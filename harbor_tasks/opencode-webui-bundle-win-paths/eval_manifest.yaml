version: "2.0"

source:
  repo: "anomalyco/opencode"
  pr: 19337
  base_commit: "b7a06e193952a66a8efa07feb4e105f44bf7ea8b"
  merge_commit: "ef7d1f7efa2e682cf0e3e322009fe84b577bbe02"

checks:
  - id: import_specifiers_relative
    type: fail_to_pass
    origin: pr_diff
    description: "Import specifiers must be relative paths (./... or ../...), not absolute"

  - id: export_keys_sorted
    type: fail_to_pass
    origin: pr_diff
    description: "Export keys must be sorted alphabetically for deterministic output"

  - id: backslash_normalization
    type: fail_to_pass
    origin: pr_diff
    description: "Source must handle backslash-to-forward-slash normalization for Windows"

  - id: all_dist_files_present
    type: pass_to_pass
    origin: pr_diff
    description: "All scanned dist files appear in the generated module output"

  - id: valid_module_structure
    type: pass_to_pass
    origin: pr_diff
    description: "Generated module has import statements, export default, and type: file"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "Function body has >= 5 meaningful statements"

  - id: const_only
    type: pass_to_pass
    origin: agent_config
    description: "Function uses const only, no let/var"
    source:
      path: "AGENTS.md"
      lines: "70"
      commit: "b7a06e193952a66a8efa07feb4e105f44bf7ea8b"

  - id: no_imperative_loops
    type: pass_to_pass
    origin: agent_config
    description: "No for/while loops — use functional array methods"
    source:
      path: "AGENTS.md"
      lines: "17"
      commit: "b7a06e193952a66a8efa07feb4e105f44bf7ea8b"

  - id: no_any_type
    type: pass_to_pass
    origin: agent_config
    description: "No use of the 'any' type"
    source:
      path: "AGENTS.md"
      lines: "13"
      commit: "b7a06e193952a66a8efa07feb4e105f44bf7ea8b"

  - id: no_try_catch
    type: pass_to_pass
    origin: agent_config
    description: "No try/catch blocks — handle errors via returns or throws"
    source:
      path: "AGENTS.md"
      lines: "12"
      commit: "b7a06e193952a66a8efa07feb4e105f44bf7ea8b"

  - id: no_else_statements
    type: pass_to_pass
    origin: agent_config
    description: "No else statements — prefer early returns"
    source:
      path: "AGENTS.md"
      lines: "84"
      commit: "b7a06e193952a66a8efa07feb4e105f44bf7ea8b"

rubric:
  - rule: "Use single word names by default for new locals, params, and helper functions."
    source:
      path: "AGENTS.md"
      lines: "25-26"
      commit: "b7a06e193952a66a8efa07feb4e105f44bf7ea8b"

  - rule: "Reduce total variable count by inlining when a value is only used once."
    source:
      path: "AGENTS.md"
      lines: "44"
      commit: "b7a06e193952a66a8efa07feb4e105f44bf7ea8b"

  - rule: "Avoid unnecessary destructuring. Use dot notation to preserve context."
    source:
      path: "AGENTS.md"
      lines: "57"
      commit: "b7a06e193952a66a8efa07feb4e105f44bf7ea8b"

  - rule: "Keep things in one function unless composable or reusable."
    source:
      path: "AGENTS.md"
      lines: "11"
      commit: "b7a06e193952a66a8efa07feb4e105f44bf7ea8b"

  - rule: "Rely on type inference when possible; avoid explicit type annotations or interfaces unless necessary for exports or clarity."
    source:
      path: "AGENTS.md"
      lines: "16"
      commit: "b7a06e193952a66a8efa07feb4e105f44bf7ea8b"
