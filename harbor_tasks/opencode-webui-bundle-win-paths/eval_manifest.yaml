rubric:
- rule: 'The solution modifies build.ts to fix Windows path issues: uses relative
    import specifiers, sorts export keys, and normalizes backslashes.'
  source:
    path: packages/opencode/script/build.ts
    lines: 68-90
    commit: b7a06e193952a66a8efa07feb4e105f44bf7ea8b
  reference: "const dist = path.join(appDir, \"dist\")\nconst files = (await Array.fromAsync(new\
    \ Bun.Glob(\"**/*\").scan({ cwd: dist })))\n  .map((file) => file.replaceAll(\"\
    \\\\\", \"/\"))\n  .sort()\n"
- rule: Use single word names by default for new locals, params, and helper functions.
  source:
    path: AGENTS.md
    lines: 21-32
  evidence: The gold solution introduces new variables `dist`, `files`, `imports`,
    `entries`, and `spec`, all of which are single words.
  category: naming
- rule: Prefer functional array methods (flatMap, filter, map) over for loops
  source:
    path: AGENTS.md
    lines: 17-18
  evidence: The gold solution uses `.map()` to transform the `files` array into `imports`
    and `entries` arrays instead of using a `for` loop.
  category: style
- rule: Prefer `const` over `let`.
  source:
    path: AGENTS.md
    lines: 60-61
  evidence: The gold solution uses `const` for all new variables (`dist`, `files`,
    `imports`, `entries`, `spec`) and avoids reassignment.
  category: style
distractors:
- rule: Reduce total variable count by inlining when a value is only used once.
  collision_type: rule_conflict
  why_distracting: The variables `imports` and `entries` are only used once in the
    final return array. Inlining them would make the return statement a massive nested
    structure, reducing readability. The gold solution explicitly extracts them for
    clarity.
  severity: medium
  source:
    path: AGENTS.md
    lines: 41-49
- rule: Prefer `Path.Path`, `Config`, `Clock`, and `DateTime` when those concerns
    are already inside Effect code.
  collision_type: architecture_boundary
  why_distracting: The agent might see path manipulation (`path.join`, `path.relative`)
    and try to import `Path` from `@effect/platform` or effectify the script. However,
    this is a simple Node/Bun build script, not an Effect service.
  severity: high
  source:
    path: packages/opencode/AGENTS.md
    lines: 33-34
hierarchy_analysis: The root `AGENTS.md` provides general TypeScript and Node/Bun
  guidelines, while `packages/opencode/AGENTS.md` introduces strict Effect rules.
  Since this is a build script (`script/build.ts`) and not part of the core application
  logic (`src/`), the Effect rules in the package-level config should be ignored in
  favor of standard Node/Bun APIs.
