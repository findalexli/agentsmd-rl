name = "selenium-keys-charat-contract"
title = "Selenium Keys: enforce CharSequence contract in charAt()"
description = """
Fix the Keys.charAt() method to properly enforce the CharSequence contract.
Currently, charAt(n) for n != 0 returns the null character ('\\0') instead of
throwing IndexOutOfBoundsException as required by the CharSequence interface.

The fix should:
1. Throw IndexOutOfBoundsException when index != 0
2. Include the index and length in the exception message
3. Return the key code only for index == 0

This is a small, targeted fix in a single Java file with no external dependencies.
"""

