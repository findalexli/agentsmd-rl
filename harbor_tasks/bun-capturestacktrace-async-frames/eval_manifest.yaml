rubric:
- rule: Bun is written primarily in Zig with C++ for JavaScriptCore integration, powered
    by WebKit's JavaScriptCore engine.
  source:
    path: CLAUDE.md
    lines: 1-3
  evidence: The gold solution modifies `src/bun.js/bindings/ErrorStackTrace.cpp` and
    includes `<JavaScriptCore/Interpreter.h>` to leverage WebKit's built-in stack
    trace collection, aligning with the architectural
  category: architecture
distractors:
- rule: Always use `bun.*` APIs instead of `std.*`.
  collision_type: scope_ambiguity
  why_distracting: The rule mandates using `bun.*` APIs instead of `std.*` (e.g.,
    avoiding `std.fs` or `std.posix`). This is a Zig-specific rule, but the file being
    edited is C++. An agent might misinterpret this and try to avoid C++ `std::` namespaces
    or look for non-existent C++ `bun::` wrappers, causing compilation errors or hallucinated
    code.
  severity: high
  source:
    path: src/CLAUDE.md
    lines: 16-28
- rule: 'Test Organization: find the best existing file to modify instead, such as
    test/v8/ - V8 C++ API compatibility tests.'
  collision_type: scope_ambiguity
  why_distracting: The prompt mentions `Error.captureStackTrace` is a V8 compatibility
    API, and the config provides specific locations for V8 compatibility tests (`test/v8/`).
    An agent might waste significant time trying to write and integrate a test suite
    for the provided reproduction, but the gold solution strictly patches the C++
    implementation without adding tests.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 40-51
hierarchy_analysis: The root `CLAUDE.md` provides general project architecture and
  testing guidelines, while `src/CLAUDE.md` provides highly specific Zig coding conventions.
  Because the target file is C++, the Zig-specific rules in `src/CLAUDE.md` are completely
  irrelevant and act as distractors. The agent must recognize the language boundary
  and ignore the Zig rules when working in `src/bun.js/bindings/`.
