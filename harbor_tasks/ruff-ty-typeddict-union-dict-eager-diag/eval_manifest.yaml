    description: "TypedDict | dict[str, Any] union must not emit false-positive diagnostics for dict literals"

  - id: union_dict_var_assignment
    type: fail_to_pass
    origin: pr_diff
    description: "TypedDict | dict[str, int] via variable assignment must not emit false positives"

  - id: union_dict_triple_union
    type: fail_to_pass
    origin: pr_diff
    description: "TypedDict | dict[str, str] | None must not emit false-positive for dict arm"

  - id: no_fallback_still_validates
    type: pass_to_pass
    origin: pr_diff
    description: "TypedDict | None (no dict fallback) must still emit eager diagnostics"

  - id: single_typeddict_validates
    type: pass_to_pass
    origin: pr_diff
    description: "Single TypedDict annotation (no union) must still validate missing keys"

  - id: typeddict_valid_usage_no_error
    type: pass_to_pass
    origin: pr_diff
    description: "Correct TypedDict usage (all required keys present) produces no diagnostics"

  - id: no_fragile_expect
    type: fail_to_pass
    origin: agent_config
    description: "No fragile .expect('filtered out...') calls in builder.rs"
