      path: "AGENTS.md"
      lines: "79"
      commit: "6cff03427e386e38dc2ead0cc7718a71bfa288f8"

  - id: no_local_imports
    type: pass_to_pass
    origin: agent_config
    description: "Rust use-imports at top of file, not inside function bodies"
    source:
      path: "AGENTS.md"
      lines: "76"
      commit: "6cff03427e386e38dc2ead0cc7718a71bfa288f8"

rubric:
  - rule: "Prefer let chains (`if let` combined with `&&`) over nested `if let` statements to reduce indentation and improve readability."
    source:
      path: "AGENTS.md"
      lines: "80"
      commit: "6cff03427e386e38dc2ead0cc7718a71bfa288f8"

  - rule: "Use comments purposefully. Don't use comments to narrate code, but do use them to explain invariants and why something unusual was done a particular way."
    source:
      path: "AGENTS.md"
      lines: "82"
      commit: "6cff03427e386e38dc2ead0cc7718a71bfa288f8"

  - rule: "Avoid writing significant amounts of new code. This is often a sign that we're missing an existing method or mechanism. Look for existing utilities first."
    source:
