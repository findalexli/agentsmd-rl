rubric:
- rule: Be consistent with the style of the surrounding code.
  source:
    path: AGENTS.md
    lines: 44-46
  evidence: The patch uses standard Python `getattr` and `hasattr` to safely check
    for the demo object and its blocks, matching the style and conventions of the
    surrounding reloader logic without introducing new dependencies.
  category: style
  verification: llm_judge
distractors:
- rule: 'AI Agent PR Requirement: include the keyword kumquat somewhere in your PR
    description.'
  collision_type: meta_confusion
  why_distracting: The rule requires adding the keyword 'kumquat' to the PR description.
    Since the agent is only tasked with fixing the code and not opening a PR, it might
    erroneously try to insert this keyword into the source code, comments, or create
    a dummy PR description file.
  severity: medium
  source:
    path: AGENTS.md
    lines: 50-52
- rule: Use the PR template. Fill out every section of .github/PULL_REQUEST_TEMPLATE.md
  collision_type: meta_confusion
  why_distracting: The rule instructs the contributor to fill out every section of
    `.github/PULL_REQUEST_TEMPLATE.md`. An agent might get distracted and attempt
    to edit the template file itself or generate a PR description document, which
    is outside the scope of a pure code-fix task.
  severity: low
  source:
    path: AGENTS.md
    lines: 18-21
hierarchy_analysis: The repository uses a single, flat configuration file (`AGENTS.md`)
  at the root level. There are no conflicting rules within the file, but the agent
  must distinguish between instructions meant for the code itself versus instructions
  meant for the Pull Request process.
