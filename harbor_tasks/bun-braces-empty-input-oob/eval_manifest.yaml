version: "2.0"

source:
  repo: "oven-sh/bun"
  pr: 28490
  base_commit: "5b7fe81279a40f3fccebe6e7f52278c81b39dfb6"
  merge_commit: "b2a199c7a7e"

checks:
  - id: braces_zig_structure_intact
    type: pass_to_pass
    origin: static
    description: "braces.zig exists and contains core Parser struct with key functions"

  - id: flatten_tokens_empty_guard
    type: fail_to_pass
    origin: pr_diff
    description: "flattenTokens must guard against empty token list before first items[] access"

  - id: advance_prev_no_underflow
    type: fail_to_pass
    origin: pr_diff
    description: "advance()/prev() must not underflow u32 when current == 0"

  - id: prev_normal_case_intact
    type: pass_to_pass
    origin: static
    description: "prev() still accesses current-1 for the normal non-zero case"

  - id: flatten_tokens_not_stub
    type: pass_to_pass
    origin: static
    description: "flattenTokens has real brace-expansion logic, not a stub"

  - id: no_prohibited_std_apis
    type: pass_to_pass
    origin: agent_config
    description: "New code must not use std.fs, std.posix, std.os, std.process"
    source:
      path: "src/CLAUDE.md"
      lines: "16"
      commit: "5b7fe81279a40f3fccebe6e7f52278c81b39dfb6"

  - id: no_inline_imports
    type: pass_to_pass
    origin: agent_config
    description: "@import() must not appear inline inside function bodies"
    source:
      path: "src/CLAUDE.md"
      lines: "11"
      commit: "5b7fe81279a40f3fccebe6e7f52278c81b39dfb6"

  - id: no_catch_outofmemory_pattern
    type: pass_to_pass
    origin: agent_config
    description: "Must use bun.handleOom() not 'catch bun.outOfMemory()'"
    source:
      path: "src/CLAUDE.md"
      lines: "234"
      commit: "5b7fe81279a40f3fccebe6e7f52278c81b39dfb6"

  - id: no_std_mem_for_strings
    type: pass_to_pass
    origin: agent_config
    description: "Must not use std.mem.eql/indexOf/startsWith for string operations; use bun.strings.* instead"
    source:
      path: "src/CLAUDE.md"
      lines: "25"
      commit: "5b7fe81279a40f3fccebe6e7f52278c81b39dfb6"

rubric:
  - rule: "In Zig code, be careful with allocators and use defer for cleanup."
    source:
      path: "src/CLAUDE.md"
      lines: "232"
      commit: "5b7fe81279a40f3fccebe6e7f52278c81b39dfb6"

  - rule: "Use bun.default_allocator for almost everything (backed by mimalloc)."
    source:
      path: "src/CLAUDE.md"
      lines: "232"
      commit: "5b7fe81279a40f3fccebe6e7f52278c81b39dfb6"

  - rule: "Follow existing code style — check neighboring files for patterns."
    source:
      path: "CLAUDE.md"
      lines: "228"
      commit: "5b7fe81279a40f3fccebe6e7f52278c81b39dfb6"
