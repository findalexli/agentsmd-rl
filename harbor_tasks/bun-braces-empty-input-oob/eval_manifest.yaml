distractors:
- rule: NEVER write tests that check for no 'panic' or 'uncaught exception' or similar
    in the test output.
  collision_type: would_cause_bug
  why_distracting: The bug description explicitly mentions a 'runtime panic'. An agent
    might try to write a test that spawns a process and checks that the output does
    not contain 'panic' to verify the fix. The rule explicitly forbids this because
    it creates tests that falsely pass in CI.
  severity: high
  source:
    path: CLAUDE.md
    lines: 98-100
- rule: In Zig code, be careful with allocators and use defer for cleanup. Use bun.default_allocator
    for almost everything.
  collision_type: scope_ambiguity
  why_distracting: The bug involves an empty string and returning `[""]`. An agent
    might think it needs to allocate a new array or string using `bun.default_allocator`
    to represent the empty result. However, the correct fix is purely control-flow
    based (bounds checking and early return), requiring no new allocations.
  severity: medium
  source:
    path: src/CLAUDE.md
    lines: 64-65
hierarchy_analysis: The hierarchy consists of a root `CLAUDE.md` focusing on testing
  and build commands, and a `src/CLAUDE.md` focusing on Zig-specific conventions.
  The agent must navigate the testing rules (specifically the prohibition against
  testing for 'panic' output) while applying the Zig style rules to fix the out-of-bounds
  errors. The fix itself is entirely within the Zig source, so the `src/CLAUDE.md`
  rules take precedence for the implementation, while the root `CLAUDE.md` governs
  any potential test additions.
