    gold_added: |-
      CRITICAL_FILES=""
      if [ -n "$CRITICAL_PATH_PATTERN" ]; then
        CRITICAL_FILES=$(git diff origin/${BASE_REF}...FETCH_HEAD --name-only | grep -E "$CRITICAL_PATH_PATTERN")
        [ -n "$CRITICAL_FILES" ] && HAS_CRITICAL=true
      fi
      CRITICAL_FILES=""
