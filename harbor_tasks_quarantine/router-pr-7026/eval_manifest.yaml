    type: fail_to_pass
    origin: pr_behavior
    description: React router should not pollute globalThis with createFileRoute after import

  - id: test_react_router_no_global_createLazyFileRoute
    type: fail_to_pass
    origin: pr_behavior
    description: React router should not pollute globalThis with createLazyFileRoute after import

  # Fail-to-pass: Source code changes
  - id: test_react_router_source_no_global_assignment
    type: fail_to_pass
    origin: pr_behavior
    description: React router source should not contain globalThis assignment code

  - id: test_solid_router_source_no_global_assignment
    type: fail_to_pass
    origin: pr_behavior
    description: Solid router source should not contain globalThis assignment code

  - id: test_react_router_source_no_fileRoute_import_in_router
    type: fail_to_pass
    origin: pr_behavior
    description: React router.ts should not import createFileRoute from fileRoute

  - id: test_solid_router_source_no_fileRoute_import_in_router
    type: fail_to_pass
    origin: pr_behavior
    description: Solid router.ts should not import createFileRoute from fileRoute

  - id: test_react_router_no_window_assignment
    type: fail_to_pass
    origin: pr_behavior
    description: React router should not have window global assignment code

  - id: test_solid_router_no_window_assignment
    type: fail_to_pass
    origin: pr_behavior
    description: Solid router should not have window global assignment code

  # Pass-to-pass: Functionality tests (custom verification scripts)
  - id: test_react_router_exports_router_class
    type: pass_to_pass
    origin: agent_config
    description: React router should export the Router class

  - id: test_react_router_createFileRoute_still_importable
    type: pass_to_pass
    origin: agent_config
    description: createFileRoute should still be importable from fileRoute module

  - id: test_react_router_createLazyFileRoute_still_importable
    type: pass_to_pass
    origin: agent_config
    description: createLazyFileRoute should still be importable from fileRoute module

  - id: test_react_router_still_exports_core_components
    type: pass_to_pass
    origin: agent_config
    description: React router should still export core router components

  # Pass-to-pass: Actual repo CI commands
  - id: test_repo_react_router_eslint
    type: pass_to_pass
    origin: repo_tests
    description: React router ESLint passes

  - id: test_repo_solid_router_eslint
    type: pass_to_pass
    origin: repo_tests
    description: Solid router ESLint passes

  - id: test_repo_react_router_fileRoute_unit
    type: pass_to_pass
    origin: repo_tests
    description: React router fileRoute unit tests pass

  - id: test_repo_react_router_build_verification
    type: pass_to_pass
    origin: repo_tests
    description: React router build verification passes

  - id: test_repo_react_router_typecheck
    type: pass_to_pass
    origin: repo_tests
    description: React router TypeScript type check passes

