description: |
  PR #3189: fix raise instead of return ValueError

  This PR fixes a bug where ensure_vector_query() was returning ValueError
  instead of raising it, causing silent failures instead of proper error handling.

fail_to_pass:
  - id: test_ensure_vector_query_raises_on_empty_list
    description: ensure_vector_query([]) should raise ValueError, not return it

  - id: test_ensure_vector_query_raises_on_nested_empty_list
    description: ensure_vector_query([[]]) should raise ValueError, not return it

pass_to_pass:
  - id: test_ensure_vector_query_accepts_valid_inputs
    type: pass_to_pass
    origin: repo_tests
    description: ensure_vector_query should accept valid vector inputs

  - id: test_repo_python_syntax
    type: pass_to_pass
    origin: repo_tests
    description: Repo Python files have valid syntax

  - id: test_repo_query_py_ast_parses
    type: pass_to_pass
    origin: repo_tests
    description: query.py can be parsed with ast module

  - id: test_repo_function_exists
    type: pass_to_pass
    origin: repo_tests
    description: ensure_vector_query function exists with correct signature

  - id: test_repo_function_source_structure
    type: pass_to_pass
    origin: static
    description: ensure_vector_query has expected code structure (len checks, error messages)

  - id: test_repo_no_tabs_in_query_py
    type: pass_to_pass
    origin: static
    description: query.py uses spaces for indentation
