rubric:
- rule: PRs should be as brief as possible. Bugfix PRs in particular can often be
    only one or two lines long, and do not need large comments, docstrings or new
    functions in this case. Aim to minimize the size of the diff.
  source:
    path: .github/copilot-instructions.md
    lines: '15'
    commit: 57e84139542c8c297873f35fcd25f66ffcf132ae
  reference: The gold solution adds a single line `new_lm_head._is_hf_initialized = True` to fix the bug,
    demonstrating that bugfix PRs can be just one line long.
- rule: Code style is enforced in the CI. You can install the style tools with `pip
    install -e .[quality]`. You can then run `make fixup` to apply style and consistency
    fixes to your code.
  source:
    path: .github/copilot-instructions.md
    lines: '34'
    commit: 57e84139542c8c297873f35fcd25f66ffcf132ae
  reference: The gold solution follows the code style with clean, properly indented code that passes CI checks.
- rule: Manage code duplication by editing shared utilities or the source code that
    others copy from, rather than editing `# Copied from` blocks or using direct inheritance
    in model-specific files.
  source:
    path: AGENTS.md
    lines: 53-57
  evidence: The patch modifies the shared `_get_resized_lm_head` function in `src/transformers/modeling_utils.py`
    rather than attempting to edit model-specific files or `# Copied from` blocks.
  category: architecture
  reference: The gold solution edits the shared `_get_resized_lm_head` function in `src/transformers/modeling_utils.py`,
    which is the correct approach for managing code duplication by editing the source that others copy from.
distractors:
- rule: If coordination evidence cannot be found, do not proceed to PR-ready output.
  collision_type: meta_confusion
  why_distracting: The task prompt does not provide issue coordination links or approval
    evidence. An agent following this rule strictly would refuse to generate the patch
    and instead output a request for clarification.
  severity: high
  source:
    path: AGENTS.md
    lines: 48-51
- rule: Do not open one-off PRs for tiny edits (single typo, isolated lint cleanup,
    one mutable default argument, etc.).
  collision_type: scope_ambiguity
  why_distracting: The requested fix is a single-line addition (`new_lm_head._is_hf_initialized
    = True`). An agent might misclassify this as a 'tiny edit' and refuse to output
    the fix, failing to distinguish between trivial busywork and a critical bug fix.
  severity: high
  source:
    path: AGENTS.md
    lines: 35-37
