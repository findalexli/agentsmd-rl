source_pr:
  owner: All-Hands-AI
  repo: OpenHands
  number: 13638
  title: "fix: planning agent auth error due to missing base_url"
  base_commit: e1afc95b6c76b7493deb5d7f7dd4ecc2a8cb719b
  merge_commit: ed5ab11fccd75b5b98c9f51ebc536713dc519275

task:
  name: openhands-litellm-proxy-prefix-fix
  description: |
    Fix the _configure_llm method in live_status_app_conversation_service.py
    to recognize the 'litellm_proxy/' prefix in addition to 'openhands/' prefix
    when determining the base_url for LLM configuration.

    The bug occurs when a sub-conversation (planning agent) inherits llm_model
    from the parent - the SDK transforms 'openhands/model' to 'litellm_proxy/model',
    but _configure_llm only checked for 'openhands/' prefix, causing the planning
    agent to get base_url=None and fail with an auth error.

  main_file: openhands/app_server/app_conversation/live_status_app_conversation_service.py
  test_file: tests/unit/app_server/test_live_status_app_conversation_service.py

checks:
  # Fail-to-Pass tests
  - id: test_litellm_proxy_prefix_supported
    type: fail_to_pass
    origin: agent_solution
    description: |
      _configure_llm must check for 'litellm_proxy/' prefix to set base_url.
      This test fails on base commit because the code only checks 'openhands/'.

  - id: test_openhands_prefix_still_supported
    type: fail_to_pass
    origin: agent_solution
    description: |
      _configure_llm must still check for 'openhands/' prefix after the fix.
      Ensures the fix doesn't break existing behavior.

  - id: test_prefix_check_uses_or_logic
    type: fail_to_pass
    origin: agent_solution
    description: |
      The fix must use OR logic to combine both prefix checks.
      Expected: model.startswith('openhands/') or model.startswith('litellm_proxy/')

  # Pass-to-Pass tests (repo CI/CD)
  - id: test_target_file_exists
    type: pass_to_pass
    origin: static
    description: Target source file exists

  - id: test_configure_llm_method_exists
    type: pass_to_pass
    origin: static
    description: _configure_llm method exists in target file

  - id: test_python_syntax_valid
    type: pass_to_pass
    origin: static
    description: Target file has valid Python syntax

  - id: test_repo_import_live_status_service
    type: pass_to_pass
    origin: repo_tests
    description: OpenHands package imports successfully

  - id: test_repo_ruff_check
    type: pass_to_pass
    origin: repo_tests
    description: Repo ruff linter runs on target file

  - id: test_repo_pytest_unit_collect
    type: pass_to_pass
    origin: repo_tests
    description: Repo unit tests for configure_llm can be collected

  - id: test_repo_pytest_unit_run
    type: pass_to_pass
    origin: repo_tests
    description: Repo unit tests for configure_llm pass

  # Agent Config Rule Tests
  - id: test_agent_config_pre_commit_hook_rule
    type: pass_to_pass
    origin: agent_config
    source:
      file: AGENTS.md
      lines: "23-28"
    description: |
      Code follows AGENTS.md rule: "Before pushing any changes, you MUST ensure
      that any lint errors or simple test errors have been fixed."

rubric:
  - id: rule_pre_commit
    description: |
      Code should follow pre-commit hook requirements from AGENTS.md.
      The fix should produce valid, properly-formatted Python code that
      would pass pre-commit checks (consistent indentation, valid syntax).
    source:
      file: AGENTS.md
      lines: "23-45"

  - id: rule_test_before_push
    description: |
      Backend changes should be tested with pytest as specified in AGENTS.md.
      The fix should be testable via the existing test infrastructure.
    source:
      file: AGENTS.md
      lines: "50-52"

  - id: rule_git_best_practices
    description: |
      Changes should follow git best practices from AGENTS.md:
      "Prefer specific git add <filename> instead of git add ."
      The fix should be a minimal, targeted change.
    source:
      file: AGENTS.md
      lines: "54-58"
