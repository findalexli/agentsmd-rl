rubric:
- rule: CSS fix follows Ant Design patterns. The fix should use CSS-in-JS patterns
    consistent with Ant Design
  source:
    path: CLAUDE.md
  reference: 'Note: Cascader ellipsis uses minWidth 0 and maxWidth for flexbox ellipsis
    without altering other CSS properties inappropriately, following Ant Design CSS-in-JS
    patterns.'
- rule: 'Flexbox ellipsis implementation is correct. The use of minWidth: 0 and maxWidth
    for flexbox ellipsis is proper CSS'
  source:
    path: CLAUDE.md
  reference: 'Note: Cascader ellipsis uses minWidth 0 and maxWidth for flexbox ellipsis
    without altering other CSS properties inappropriately, following Ant Design CSS-in-JS
    patterns.'
- rule: No breaking changes to existing styles. The fix should not alter other CSS
    properties inappropriately
  source:
    path: CLAUDE.md
  reference: 'Note: Cascader ellipsis uses minWidth 0 and maxWidth for flexbox ellipsis
    without altering other CSS properties inappropriately, following Ant Design CSS-in-JS
    patterns.'
- rule: 采用 CSS-in-JS 架构（基于 `@ant-design/cssinjs`）
  source:
    path: CLAUDE.md
    lines: 8-10
  evidence: 'The gold solution modifies `components/cascader/style/columns.ts` using
    CSS-in-JS object syntax (e.g., `maxWidth: 400`, `minWidth: 0`) rather than traditional
    CSS files.'
  category: architecture
distractors:
- rule: Changelog 规范：必须同时提供中英文两个版本
  collision_type: scope_ambiguity
  why_distracting: The config mandates updating both English and Chinese changelogs
    for bug fixes. An agent might try to edit `CHANGELOG.en-US.md` and `CHANGELOG.zh-CN.md`,
    but the task instructions explicitly restrict modifications to `columns.ts`.
  severity: high
  source:
    path: AGENTS.md
    lines: 115-120
- rule: PR 规范：必须使用 PR 模板并遵循分支策略
  collision_type: scope_ambiguity
  why_distracting: The config provides PR guidelines and templates. The agent might
    try to use the `antd-create-pr` skill or create a PR, but the task is only to
    fix the code locally.
  severity: medium
  source:
    path: AGENTS.md
    lines: 84-88
- rule: Use this skill when the user asks to handle issues, reply to issues... Also
    use when the user mentions 'issue' in the context of antd
  source:
    path: .claude/skills/issue-reply/SKILL.md
    lines: 1-3
  collision_type: scope_ambiguity
  why_distracting: The prompt contains the heading 'Issue Details', which might trigger
    the issue-reply skill. However, the task requires fixing the actual code, not
    generating a reply to a GitHub issue.
  severity: low
hierarchy_analysis: The config hierarchy is flat, with `AGENTS.md` and `CLAUDE.md`
  containing identical content. There are no conflicts between the files.
version: '2.0'
