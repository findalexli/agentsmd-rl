task:
  name: superset-mcp-dashboard-draft
  title: "Fix MCP dashboard creation to default to draft state"
  description: >
    When using MCP to create a dashboard, the published field defaults to True,
    causing dashboards to be immediately published. This should default to False
    (draft state) to be consistent with manual dashboard creation.

source:
  type: github_pr
  owner: apache
  repo: superset
  pr_number: 39011
  pr_url: https://github.com/apache/superset/pull/39011
  base_commit: 25eea295f6c9e8060619beccb267dd9c7628f882
  merge_commit: 135e0f809968f14ca4e0ddda3abae7ed1d0eef8c

checks:
  - id: test_published_default_is_false
    type: fail_to_pass
    origin: pr_behavior
    description: "GenerateDashboardRequest.published should default to False (draft state)"

  - id: test_published_field_with_multiple_values
    type: fail_to_pass
    origin: pr_behavior
    description: "Verify published default using regex-based secondary check"

  - id: test_schema_file_syntax_valid
    type: pass_to_pass
    origin: static
    description: "schemas.py should be valid Python syntax"

  - id: test_class_has_required_fields
    type: pass_to_pass
    origin: static
    description: "GenerateDashboardRequest should have all required fields"

  - id: test_ruff_lint_schemas
    type: pass_to_pass
    origin: repo_tests
    description: "Ruff linter passes on the schemas file"

  - id: test_repo_ruff_format
    type: pass_to_pass
    origin: repo_tests
    description: "Ruff format check passes on the schemas file"

  - id: test_repo_ruff_mcp_dashboard_module
    type: pass_to_pass
    origin: repo_tests
    description: "Ruff linter passes on the entire mcp_service/dashboard module"

  - id: test_repo_python_syntax_mcp_dashboard
    type: pass_to_pass
    origin: repo_tests
    description: "All Python files in mcp_service/dashboard have valid syntax"

rubric:
  # Note: This is a pure code-change task (fixing a default value in schemas.py).
  # The gold solution does not modify config/documentation files.
  # Rubric rules below evaluate the code change quality, not config file edits.
  - id: minimal_change
    rule: "The fix should be minimal - only change what's necessary to fix the bug"
    description: "The gold solution changes only the default value, not surrounding code"
    weight: 1
