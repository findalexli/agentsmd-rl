# Evaluation manifest for prefecthq/prefect#21403
# Fix for issue #21401: ProcessPoolTaskRunner.duplicate() AttributeError

task_name: "prefect-processpool-duplicate-fix"
pr_number: 21403
repo: prefecthq/prefect
base_commit: 19193fbca153190a7dc5861bb6501ba14771638a
merge_commit: 9b4f7e9968a83c055f905f8e83e66dfbeb848105

description: |
  Fix for https://github.com/PrefectHQ/prefect/issues/21401

  When a ProcessPoolTaskRunner is deserialized in a subprocess (via cloudpickle
  during nested task submission), the `_subprocess_message_processor_factories`
  private attribute can intermittently be absent. This causes an AttributeError
  when `hydrated_context()` calls `flow.task_runner.duplicate()`.

  The fix adds a getattr fallback to the property getter and changes duplicate()
  to use the public property instead of the private attribute.

