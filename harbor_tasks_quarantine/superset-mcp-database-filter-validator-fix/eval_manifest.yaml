rubric:
- rule: Add type hints - All new Python code needs proper typing
  source:
    path: CLAUDE.md
    lines: 48-49
  evidence: The gold solution adds new fields to `DatabaseFilter` and `@field_validator`
    decorators to `ListDatabasesRequest`, maintaining proper Python type hints as
    required by the backend standards.
  category: style
  verification: llm_judge
distractors:
- rule: UUID Migration - External API exposure - Use UUIDs in public APIs instead
    of internal integer IDs
  collision_type: scope_ambiguity
  why_distracting: The instruction requires adding `created_by_fk` and `changed_by_fk`
    to `DatabaseFilter` for the MCP API. The config mandates using UUIDs in public
    APIs instead of internal integer IDs. An agent might try to use UUIDs instead
    of the requested integer foreign keys, which would break the integration with
    `get_instance_info`.
  severity: high
  source:
    path: AGENTS.md
    lines: 50-53
- rule: Code Comments - Avoid time-specific language - Don't use words like 'now',
    'currently', 'today'
  collision_type: meta_confusion
  why_distracting: The instruction explicitly requires fixing timezone issues by using
    `datetime.now(timezone.utc)`. The config forbids using time-specific language
    like 'now'. An agent might misinterpret this rule and avoid using `datetime.now()`
    or write convoluted comments to avoid the word 'now'.
  severity: medium
  source:
    path: AGENTS.md
    lines: 84-85
hierarchy_analysis: The config hierarchy is flat, with identical rules in `AGENTS.md`
  and `CLAUDE.md`. The agent must apply these rules to the Python backend while navigating
  conflicts between the specific task instructions and the general UUID migration
  guidelines.
