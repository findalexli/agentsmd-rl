rubric:
- rule: For code-only tasks, the agent's code changes should follow CLAUDE.md style
    guidelines (minimal comments, matching existing patterns, no over-engineering).
  source:
    path: torch/csrc/distributed/c10d/FakeProcessGroup.hpp
    lines: 99-102
    commit: 8401fdeb9abd665b36465c52b7aefd591cc3dbcb
  reference: 'Code changes follow CLAUDE.md rules: minimal 3-line fix, no comments
    (self-documenting), uses if/continue pattern matching existing code style.'
  category: style
- rule: Minimize comments; be concise; code should be self-explanatory and self-documenting.
  source:
    path: torch/csrc/distributed/c10d/FakeProcessGroup.hpp
    lines: 99-102
  reference: The gold solution adds the size check without any explanatory comments,
    relying on the code itself to be self-explanatory.
  category: style
- rule: If uncertain, choose the simpler, more concise implementation.
  source:
    path: torch/csrc/distributed/c10d/FakeProcessGroup.hpp
    lines: 99-102
  reference: The gold solution uses a simple continue statement to skip the copy operation,
    avoiding complex conditional branching or helper functions.
  category: style
distractors:
- rule: Once the change is passing, find an appropriate test file to add the test
    to and make sure to follow local conventions on the test file.
  collision_type: scope_ambiguity
  why_distracting: Instructs the agent to find an appropriate test file and add a
    test, but the gold solution only modifies the C++ header file without adding any
    tests. An agent might waste significant time searching for or writing a test.
  severity: medium
  source:
    path: AGENTS.md
    lines: 4-7
- rule: To run lint, run 'lintrunner -a' (which will autoapply changes)
  collision_type: rule_conflict
  why_distracting: Instructs the agent to use 'lintrunner -a' for linting, which directly
    conflicts with CLAUDE.md's instruction to 'Only use commands provided via spin
    for linting'.
  severity: high
  source:
    path: AGENTS.md
    lines: 11-11
- rule: All build (both codegen, C++ and python) is done via `pip install -e . -v
    --no-build-isolation`.
  collision_type: rule_conflict
  why_distracting: Instructs the agent to build via `pip install -e .`, which conflicts
    with AGENTS.md's explicit warning that there is no working build environment.
  severity: high
  source:
    path: CLAUDE.md
    lines: 11-13
- rule: Convert PyTorch AT_DISPATCH macros to AT_DISPATCH_V2 format in ATen C++ code.
  source:
    path: .claude/skills/at-dispatch-v2/SKILL.md
    lines: 1-3
  collision_type: scope_ambiguity
  why_distracting: The agent might see it is modifying C++ code and attempt to apply
    AT_DISPATCH_V2 rules, but FakeProcessGroup is a distributed backend component,
    not an ATen kernel, making this skill out of scope.
  severity: medium
hierarchy_analysis: Both AGENTS.md and CLAUDE.md are at Level 0, creating direct contradictions
  regarding linting (`lintrunner` vs `spin`) and building (`pip install` vs no build
  environment). The agent must navigate these conflicting instructions while fixing
  a C++ bug, as well as decide whether to follow the instruction to add a test.
