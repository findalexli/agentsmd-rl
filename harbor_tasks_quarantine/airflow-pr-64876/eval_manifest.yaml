source:
  repo: apache/airflow
  pr_number: 64876
  base_commit: 06101dc5daa2f4a3e4b6020b6e2f305566816e8a
  merge_commit: 666879c6735a08296e4d407709f50a0efe894eff
  target_file: airflow-core/src/airflow/migrations/versions/0097_3_2_0_enforce_log_event_and_dag_is_stale_not_null.py

checks:
  - id: test_update_statements_inside_disable_sqlite_fkeys
    type: fail_to_pass
    origin: pr_diff
    description: UPDATE statements must be inside disable_sqlite_fkeys context manager to prevent autobegin transaction before PRAGMA foreign_keys=off

  - id: test_migration_file_syntax_valid
    type: pass_to_pass
    origin: static
    description: Migration file must have valid Python syntax

  - id: test_migration_module_imports
    type: pass_to_pass
    origin: static
    description: Migration module must be importable and disable_sqlite_fkeys must be callable

  - id: test_disable_sqlite_fkeys_context_manager_present
    type: pass_to_pass
    origin: static
    description: Migration must use disable_sqlite_fkeys context manager

  - id: test_update_log_statement_exists
    type: pass_to_pass
    origin: static
    description: Migration must contain UPDATE log statement

  - id: test_update_dag_statement_exists
    type: pass_to_pass
    origin: static
    description: Migration must contain UPDATE dag statement

  - id: test_repo_syntax_check_migration
    type: pass_to_pass
    origin: repo_tests
    description: Migration file passes Python py_compile syntax check

  - id: test_repo_syntax_check_utils
    type: pass_to_pass
    origin: repo_tests
    description: Migration utils module passes Python py_compile syntax check

  - id: test_repo_ruff_check_migration
    type: pass_to_pass
    origin: repo_tests
    description: Migration file passes ruff linter checks (Airflow CI requirement)

  - id: test_repo_ruff_format_migration
    type: pass_to_pass
    origin: repo_tests
    description: Migration file is properly formatted per ruff format

  - id: test_update_statements_order_in_context
    type: fail_to_pass
    origin: pr_diff
    description: UPDATE statements must appear after disable_sqlite_fkeys but before batch_alter_table

# No rubric rules - this is a code-fix validation task where coding conventions
# are already verified by the pass_to_pass tests (test_repo_ruff_check_migration,
# test_repo_ruff_format_migration, etc.). The rubric judge expects a git repo with
# changes which doesn't apply to validation tasks.
