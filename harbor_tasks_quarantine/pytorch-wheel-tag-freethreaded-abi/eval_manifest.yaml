    path: CLAUDE.md
    lines: 63-64
  evidence: The gold solution adds a complex boolean condition to check for free-threaded
    Python (checking MATRIX_PYTHON_VERSION, Py_GIL_DISABLED, and _is_gil_enabled)
    but includes zero comments, relying entirely
  category: documentation
- rule: If uncertain, choose the simpler, more concise implementation.
  source:
    path: CLAUDE.md
    lines: 84-85
  evidence: The gold solution removes the unreachable `continue` statement immediately
    following `raise RuntimeError(msg)` to simplify the code.
  category: style
distractors:
- rule: Once the change is passing, find an appropriate test file to add the test
    to and make sure to follow local conventions on the test file.
  collision_type: scope_ambiguity
  why_distracting: The bug is in a CI smoke test script (`.ci/pytorch/smoke_test/check_wheel_tags.py`).
    There is no standard test suite for the CI scripts themselves. Attempting to add
    a test for this script would lead the agent to create misplaced tests or fail
    to find an appropriate test file.
  severity: high
  source:
    path: AGENTS.md
    lines: 3-7
- rule: All build (both codegen, C++ and python) is done via `pip install -e . -v
    --no-build-isolation`.
  collision_type: rule_conflict
  why_distracting: The bug report explicitly requires the agent to 'Build a PyTorch
    wheel'. If the agent tries to reproduce the issue by building a wheel, it might
    strictly use the provided command (`pip install -e .`), which creates an editable
    install rather than a `.whl` file, thus failing to reproduce the wheel tag validation
    issue.
  severity: high
  source:
    path: CLAUDE.md
    lines: 11-14
- rule: 'Use our test class and test runner: ... from torch.testing._internal.common_utils
    import run_tests, TestCase'
  collision_type: architecture_boundary
  why_distracting: If the agent attempts to write a test for the wheel tag validation
    logic, it might try to use the core PyTorch testing framework (`torch.testing._internal.common_utils`).
    However, CI scripts are standalone and do not use the core PyTorch testing utilities.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 16-24
- rule: Debug PyTorch 2 compiler stack failures including Dynamo graph breaks, Inductor
    codegen errors...
  source:
    path: .claude/skills/pt2-bug-basher/SKILL.md
    lines: 1-3
  collision_type: scope_ambiguity
  why_distracting: The issue mentions 'free-threaded Python builds' and 'wheel tag
    validation', which might sound like a build/compiler issue, prompting the agent
    to use this skill. However, it's a CI script bug.
  severity: low
hierarchy_analysis: The config hierarchy is flat (Level 0 `AGENTS.md` and `CLAUDE.md`).
  The rules in these files are heavily biased towards core PyTorch development (C++
  extensions, core Python APIs, standard test suite). The agent must recognize that
  it is operating in a CI script (`.ci/pytorch/smoke_test/`) and selectively ignore
  rules about testing frameworks, build commands, and test file placement, as they
  do not apply to this architectural boundary.
