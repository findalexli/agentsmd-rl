# Eval manifest for electric-sql-fast-loop-detection

source:
  repo: electric-sql/electric
  pr_number: 4028
  base_commit: 4f55cef768a2933319c58c7e6275b7661030179c
  merge_commit: 9335ae645357c8d0b2b3f281316f2b318648531e
  title: "fix(elixir-client): Add fast-loop detection"

description: |
  The Elixir client lacked fast-loop detection present in the TypeScript client.
  When a server or CDN bug causes repeated responses at the same offset without
  progress, the client would hammer the server indefinitely. This fix ports the
  TypeScript client's fast-loop detection: track non-live requests in a 500ms
  sliding window, and if 5+ requests occur at the same offset, clear caches on
  first detection, apply exponential backoff on subsequent detections, and raise
  an error after 5 consecutive detections.

files_changed:
  - packages/elixir-client/lib/electric/client/shape_state.ex
  - packages/elixir-client/lib/electric/client/stream.ex

