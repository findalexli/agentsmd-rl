    type: fail_to_pass
    origin: agent_config
    source: root/AGENTS.md
    details: |
      The ShapeState module must export a check_fast_loop/1 function that returns
      {:ok, t()} | {:backoff, non_neg_integer(), t()} | {:error, String.t()}.
      This is the core fast-loop detection function.

