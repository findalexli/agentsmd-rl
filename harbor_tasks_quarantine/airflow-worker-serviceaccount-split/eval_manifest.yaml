rubric:
- rule: Add tests for new behavior
  source:
    path: CLAUDE.md:Testing Standards
- rule: Apache License header on all new files
  source:
    path: CLAUDE.md:Coding Standards
- rule: Follow Helm templating conventions for helper functions
  source:
    path: CLAUDE.md:Repository Structure
- rule: Maintain backward compatibility with deprecated fields
  source:
    path: PR description
distractors:
- rule: 'Run a single test: `uv run --project <PROJECT> pytest path/to/test.py::TestClass::test_method
    -xvs`'
  collision_type: rule_conflict
  why_distracting: The agent might attempt to run the modified Helm tests using `uv
    run pytest` as suggested for standard Python tests, but Helm tests require the
    specific `breeze testing helm-tests` command to function correctly.
  severity: high
  source:
    path: AGENTS.md
    lines: 17-19
hierarchy_analysis: The configuration is provided in both `AGENTS.md` and `CLAUDE.md`
  which contain identical instructions. The agent must navigate the testing commands
  to select the specific Helm testing commands over the general Python testing commands.
version: '2.0'
