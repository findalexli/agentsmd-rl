rubric: []
version: '2.0'
source:
  repo: SeleniumHQ/selenium
  pr: 17317
  base_commit: 7beae82d3e1fbdcb30eb5165f8f4726a83c0fd26
  merge_commit: 375a1fd34e90a884317fcac3522a4de7c08bff05
distractors:
- rule: Use JavaScript logging framework (`logging.getLogger`) for emitting logs
  source:
    path: javascript/selenium-webdriver/AGENTS.md
    lines: 18-27
  source_text: '### Logging


    ```javascript

    const logging = require(''./logging'')

    const log_ = logging.getLogger(''selenium.webdriver.mymodule'')


    log_.warning(''actionable: something needs attention'')

    log_.info(''useful: driver started successfully'')

    log_.finer(''diagnostic: request details for debugging'')

    ```'
  collision_type: would_cause_bug
  why_distracting: The modified file is in the `javascript/` directory, so an agent
    might assume it is JavaScript code and apply these JS logging conventions. However,
    `.bzl` files are Bazel Starlark build scripts; adding JS logging here would cause
    a build error.
  severity: high
- rule: Log a warning for deprecated methods using JavaScript syntax
  source:
    path: javascript/selenium-webdriver/AGENTS.md
    lines: 29-35
  source_text: '### Deprecation


    Log a warning directing users to the alternative:


    ```javascript

    log_.warning(''oldMethod is deprecated, use newMethod instead'')

    ```'
  collision_type: would_cause_bug
  why_distracting: The PR updates a deprecated Bazel provider access pattern. If an
    agent tries to add a deprecation warning using the JS syntax from this rule in
    a Starlark file, it will break the build.
  severity: high
- rule: Use JSDoc block comments for documenting public APIs
  source:
    path: javascript/selenium-webdriver/AGENTS.md
    lines: 37-49
  source_text: "### Documentation\n\nUse JSDoc for public APIs:\n\n```javascript\n\
    /**\n * Brief description.\n *\n * @param {Type} name description\n * @return\
    \ {Type} description\n * @throws {ErrorType} when condition\n */\n```"
  collision_type: would_cause_bug
  why_distracting: An agent working within the `javascript/` directory might try to
    use JSDoc format for comments. Since the file is a Starlark `.bzl` script, JSDoc
    syntax (like `/** ... */`) is invalid and would cause a parsing error.
  severity: high
- rule: Add type annotations to new code and use union notation (`|`) instead of `Optional`
  source:
    path: py/AGENTS.md
    lines: 42-57
  source_text: "### Type hints\n\nType hints are used throughout; add type annotations\
    \ to new code\n\nUse union notation (`|`) instead of `Optional`:\n\n```python\n\
    # Preferred\ndef method(param: str | None) -> int | None:\n    pass\n\n# Avoid\n\
    from typing import Optional\ndef method(param: Optional[str]) -> Optional[int]:\n\
    \    pass\n```"
  collision_type: would_cause_bug
  why_distracting: Starlark is a dialect of Python, so an agent might assume Python
    conventions from `py/AGENTS.md` apply to `.bzl` files. However, Starlark doesn't
    support Python's standard type hint syntax natively, so applying this would cause
    a Bazel evaluation error.
  severity: high
