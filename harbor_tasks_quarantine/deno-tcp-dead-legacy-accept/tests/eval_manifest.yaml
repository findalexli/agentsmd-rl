rubric:
- rule: Code changes must satisfy all fail-to-pass tests (legacy_listen_branch_removed,
    dead_legacy_methods_removed, lint_violations_updated, unused_imports_cleaned).
  source:
    path: tests/test_outputs.py
    lines: 331-423
    commit: ad725eea313df6204d342d84ace4af1b11cc341f
  evidence: The gold solution passes all 4 fail-to-pass tests which verify the dead
    code removal, import cleanup, and lint plugin update
  category: test_verified
  test_ids:
  - legacy_listen_branch_removed
  - dead_legacy_methods_removed
  - lint_violations_updated
  - unused_imports_cleaned
- rule: Node.js compatibility code is in `ext/node/polyfills/`. When reviewing these
    files, check behavior against Node.js docs, not just Deno conventions.
  source:
    path: .github/copilot-instructions.md
    lines: 322-325
  source_text: "- Node.js compatibility code is in `ext/node/polyfills/`. When reviewing\
    \ these\n  files, check behavior against Node.js docs, not just Deno conventions.\
    \ Some\n  patterns (like synchronous `throw` in `spawn()` for EPERM but async\
    \ error\n  event for ENOENT) are intentional Node.js compatibility."
  evidence: The gold diff removes Deno-specific fallback implementations (`#listenLegacy()`,
    `#acceptBackoff()`) and legacy usage of `Deno.listen` from `ext/node/polyfills/internal_binding/tcp_wrap.ts`.
    This strictly aligns the Node.js polyfill with native Node.js behavior (using
    libuv bindings) and eliminates Deno API dependencies, exactly following the rule
    to match Node.js behavior over Deno conventions.
  category: rubric
  verification: llm_judge
distractors:
- rule: Keep your changes minimal, don't do drive-by changes in a PR.
  collision_type: scope_ambiguity
  why_distracting: The agent might interpret 'keep changes minimal' as a reason to
    leave the unused imports or the lint plugin violation entry untouched, which would
    fail the explicit prompt requirements.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 28-31
- rule: Internal symbols in JS (`ext/process/40_process.js`, `ext/node/polyfills/`)
    use the `k` prefix convention.
  source:
    path: .github/copilot-instructions.md
    lines: 319-321
  source_text: "- Internal symbols in JS (`ext/process/40_process.js`, `ext/node/polyfills/`)\n\
    \  use the `k` prefix convention: `kIpc`, `kSerialization`, `kInputOption`. Flag\n\
    \  deviations."
  collision_type: meta_confusion
  why_distracting: The diff removes and touches properties prefixed with `#` (e.g.,
    `#listenLegacy`, `#acceptBackoffDelay`, `#listener`) within a file explicitly
    mentioned in the rule's target path (`ext/node/polyfills/`). An agent might mistakenly
    classify these standard JavaScript private class fields as "internal symbols"
    and try to rename them to use the `k` prefix (e.g., `kListenLegacy`), which would
    be syntactically invalid or incorrectly convert standard private fields into Symbol-based
    properties.
  severity: medium
hierarchy_analysis: The configuration consists of a single, flat `CLAUDE.md` file
  containing generic repository guidelines.
