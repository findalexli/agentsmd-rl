rubric:
- rule: Use accurate type descriptions in FunctionArgumentDescriptor. String arguments
    should be described as 'String or FixedString' not 'Array', and length arguments
    as 'UInt*' not 'const UInt*'.
  source:
    path: src/Functions/padString.cpp
    lines: 167-173
    commit: dea580e0abc03ab181a4d2bc2bc8a65e599216ae
  reference: "FunctionArgumentDescriptors mandatory_args{\n    {\"string\", static_cast<FunctionArgumentDescriptor::TypeValidator>(&isStringOrFixedString),\
    \ nullptr, \"String or FixedString\"},\n    {\"length\", static_cast<FunctionArgumentDescriptor::TypeValidator>(&isInteger),\
    \ nullptr, \"UInt*\"},\n};\nFunctionArgumentDescriptors optional_args{\n    {\"\
    pad_string\", static_cast<FunctionArgumentDescriptor::TypeValidator>(&isString),\
    \ isColumnConst, \"String\"}\n};\n"
distractors:
- rule: 'When writing text such as documentation, comments, or commit messages, wrap
    literal names from ClickHouse SQL language, classes and functions, or literal
    excerpts from log messages inside inline code blocks, such as: `MergeTree`.'
  collision_type: scope_ambiguity
  why_distracting: The agent might apply markdown backticks to the C++ string literals
    (e.g., `"\`String\` or \`FixedString\`"`) because they are used in error messages
    and contain ClickHouse SQL types, misinterpreting the scope of 'text such as documentation,
    comments, or commit messages'.
  severity: high
  source:
    path: AGENTS.md
    lines: 5-5
- rule: Wrap literal names from ClickHouse SQL language in inline code blocks
  source:
    path: .claude/CLAUDE.md
    lines: '5'
  source_text: 'When writing text such as documentation, comments, or commit messages,
    wrap literal names from ClickHouse SQL language, classes and functions, or literal
    excerpts from log messages inside inline code blocks, such as: `MergeTree`.'
  collision_type: scope_ambiguity
  why_distracting: The PR modifies C++ string literals that represent ClickHouse SQL
    types ('String', 'FixedString', 'Array'). An agent might mistakenly apply this
    documentation formatting rule to the C++ strings and wrap them in markdown backticks
    (e.g., '`String` or `FixedString`'), which would cause incorrect type names to
    be displayed in application error messages.
  severity: high
- rule: Always use Allman-style braces when writing C++ code
  source:
    path: .claude/CLAUDE.md
    lines: '145'
  source_text: When writing C++ code, always use Allman-style braces (opening brace
    on a new line). This is enforced by the style check in CI.
  collision_type: scope_ambiguity
  why_distracting: The PR modifies elements within a C++ uniform initialization block
    `FunctionArgumentDescriptors mandatory_args{ ... };`. An agent might see this
    rule and mistakenly try to reformat the `{` onto a new line. However, the rule
    generally applies to control structures and function bodies, not necessarily uniform
    initialization, and reformatting untouched lines falls outside the scope of the
    fix.
  severity: medium
hierarchy_analysis: The single AGENTS.md file contains documentation and commit message
  guidelines that do not apply to the C++ string literals being modified.
version: '2.0'
