- rule: Test-only code fixes require no agent configuration changes when the existing
    conventions are followed
  source:
    path: .claude/skills/write-sglang-test/SKILL.md
    commit: df9c831ab80c78495142b4dbcb1dfa537c9e1c73
  reference: ''
- id: test_repo_precommit_check_added_large_files
  type: pass_to_pass
