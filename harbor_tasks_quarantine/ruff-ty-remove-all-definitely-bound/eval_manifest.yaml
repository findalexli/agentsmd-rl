distractors:
- rule: All changes must be tested. If you're not testing your changes, you're not
    done.
  collision_type: scope_ambiguity
  why_distracting: The task explicitly states the attribute 'no longer influences
    any observable behavior' and is 'dead code'. The absolute rule demanding tests
    for all changes would lead an agent to waste time trying to write tests for an
    unobservable internal state removal.
  severity: high
  source:
    path: AGENTS.md
    lines: 58-59
- rule: Avoid .unwrap() and similar unsafe calls
  source:
    path: /workspace/repo/AGENTS.md
    lines: 80-80
  source_text: '- Try hard to avoid patterns that require `panic!`, `unreachable!`,
    or `.unwrap()`. Instead, try to encode those constraints in the type system. Don''t
    be afraid to write code that''s more verbose or requires largeish refactors if
    it enables you to avoid these unsafe calls.'
  collision_type: meta_confusion
  why_distracting: The diff preserves the call `unwrap_with_diagnostic()`. An agent
    might confuse this safe, domain-specific unwrapping helper with the forbidden
    Rust standard `.unwrap()`, leading to wasted effort trying to refactor valid diagnostic-emitting
    code.
  severity: medium
- rule: Salsa incrementality for methods accessing .node()
  source:
    path: /workspace/repo/AGENTS.md
    lines: 85-85
  source_text: '- **Salsa incrementality (ty):** Any method that accesses `.node()`
    must be `#[salsa::tracked]`, or it will break incrementality. Prefer higher-level
    semantic APIs over raw AST access.'
  collision_type: scope_ambiguity
  why_distracting: Since the modifications happen inside the `ty_python_semantic`
    crate, an agent might incorrectly assume that the modified `TypeInferenceBuilder`
    methods or structs interact with Salsa tracking and require `#[salsa::tracked]`
    annotations, even though they don't directly access raw `.node()` AST fields.
  severity: low
