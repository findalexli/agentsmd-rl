config_edits:
- path: tests/setupAfterEnv.ts
  tier: 1
  gold_added: 'type SnapshotTarget = HTMLElement | DocumentFragment | HTMLCollection
    | NodeList | Node[]; function formatHTML(nodes: SnapshotTarget); let cloneNodes:
    Node | Node[]; as HTMLElement'
  gold_removed: 'function formatHTML(nodes: any); let cloneNodes: any; as any'
- path: tests/shared/focusTest.tsx
  tier: 1
  gold_added: 'type FocusableRef = { focus: () => void; blur: () => void; }; React.createRef<FocusableRef>();
    const getElement = (container: HTMLElement): HTMLElement; querySelector<HTMLElement>;
    expect(element).not.toBeNull()'
  gold_removed: React.createRef<any>(); getElement(container)!
rubric:
- rule: 使用 TypeScript 和 React 开发 (Develop using TypeScript and React)
  source:
    path: CLAUDE.md
    lines: 7-8
  evidence: The gold solution defines explicit TypeScript types (`SnapshotTarget`,
    `FocusableRef`) and uses generics (`querySelector<HTMLElement>`) to replace `any`
    types, aligning with the project's core TypeScr
  category: style
- rule: 使用 TypeScript 和 React 开发
  source:
    path: AGENTS.md
    lines: 7-8
  evidence: The gold solution replaces `any` with explicit TypeScript types like `SnapshotTarget`
    and `FocusableRef`, aligning with the project's TypeScript usage.
  category: style
distractors:
- rule: 'Changelog 规范: 必须同时提供中英文两个版本... 忽略用户无感知的改动（内部重构、纯测试更新、工具链优化等）'
  collision_type: scope_ambiguity
  why_distracting: The agent might see the extensive changelog rules and attempt to
    document this type safety improvement in `CHANGELOG.en-US.md` and `CHANGELOG.zh-CN.md`.
    However, the rule explicitly states to ignore user-imperceptible changes ('忽略用户无感知的改动（内部重构、纯测试更新、工具链优化等）').
    Since this is a pure test utility update, adding a changelog would violate this
    exemption.
  severity: high
  source:
    path: AGENTS.md
    lines: 115-120
- rule: 'Test 导入规范: 本规范适用于 `components/**/__tests__/` 下的测试文件。'
  collision_type: scope_ambiguity
  why_distracting: The agent might try to validate or refactor imports in the edited
    files based on the 'Test 导入规范' (Test Import Rules). However, this rule explicitly
    applies only to `components/**/__tests__/` directories, whereas the edited files
    are located in the global `tests/` and `tests/shared/` directories.
  severity: low
  source:
    path: AGENTS.md
    lines: 45-50
- rule: Help maintainers reply to Ant Design GitHub issues following official guidelines.
  source:
    path: .claude/skills/issue-reply/SKILL.md
    lines: 1-5
  collision_type: scope_ambiguity
  why_distracting: The agent might activate the issue-reply skill assuming the 'Fix'
    instruction implies an issue needs to be managed or replied to, wasting effort
    on irrelevant workflow steps.
  severity: low
hierarchy_analysis: The configuration is provided in identical `AGENTS.md` and `CLAUDE.md`
  files at the root level. There is no complex inheritance, but the agent must correctly
  parse the scope exemptions within the flat rules (e.g., changelog exemptions for
  test updates).
version: '2.0'
