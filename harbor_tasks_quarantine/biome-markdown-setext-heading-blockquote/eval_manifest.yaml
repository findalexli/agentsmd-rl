version: 1
repository: biomejs/biome
pr_number: 9782
title: "fix(markdown_parser): recognize setext heading inside blockquote"
base_commit: e021c4a308ee89f6009f200de5056435080c7179
merge_commit: b897832ad3a5a6720297735fe1a819b18f9f5851

description: |
  Fixes setext heading detection inside blockquotes. After consuming a blockquote
  prefix, the lexer no longer considered the following token to be at line
  start, so `---` was lexed as `MINUS` instead of `MD_THEMATIC_BREAK_LITERAL`. As a
  result, input like `> Foo\n> ---` was parsed as a paragraph instead of a setext
  heading. Per CommonMark, blockquote content should still participate
  in setext heading parsing after the quote prefix is removed.

