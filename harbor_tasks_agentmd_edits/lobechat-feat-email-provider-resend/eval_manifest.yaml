    If you prefer Resend, configure the following and initialize the service with
    `EmailImplType.Resend`:


    ```bash

    RESEND_API_KEY=your-resend-api-key

    RESEND_FROM=noreply@example.com

    ```


    `RESEND_FROM` is used when `from` is not provided in the payload.


    ### Choose Provider by Environment


    Set `EMAIL_SERVICE_PROVIDER` to `nodemailer` or `resend` to pick the default implementation
    without changing code:


    ```bash

    EMAIL_SERVICE_PROVIDER=resend

    ```'
