rubric:
- rule: Documentation updates in README.md should be consistent with the existing
    style and structure of the file
  source:
    path: templates/ecommerce/README.md
    lines: 1-120
    commit: 7f3c6c8f4628fb066002e2fd5c3cc6b83ddf4ccc
- rule: 'Code follows Payload conventions: prefer single object parameters, use import
    type for types'
  source:
    path: CLAUDE.md
    lines: 52-55
    commit: 7f3c6c8f4628fb066002e2fd5c3cc6b83ddf4ccc
- rule: 'Logger usage follows the pattern: payload.logger.error({ msg: ''...'', err:
    error }) with err not error'
  source:
    path: CLAUDE.md
    lines: 63-65
    commit: 7f3c6c8f4628fb066002e2fd5c3cc6b83ddf4ccc
- rule: README documents the accessToken-based guest order access flow and security
    rationale
  source:
    path: templates/ecommerce/README.md
    lines: 122-146
    commit: b317eaa59124eb3a1a7e26c8ccdf909bbea03f96
- rule: README Guests section describes guest checkout flow with accessToken
  source:
    path: templates/ecommerce/README.md
    lines: 131-140
    commit: b317eaa59124eb3a1a7e26c8ccdf909bbea03f96
- rule: Access control section notes guests need accessToken for order access
  source:
    path: templates/ecommerce/README.md
    lines: '122'
    commit: b317eaa59124eb3a1a7e26c8ccdf909bbea03f96
- rule: 'Security-Critical: Follow all security patterns, especially access control'
  source:
    path: templates/ecommerce/AGENTS.md
    lines: '8'
  evidence: The gold solution updates the README to explicitly document the new `accessToken`
    security model that prevents order enumeration attacks for guest users.
  category: architecture
- rule: Prefer pure functions; when mutation is unavoidable, return the mutated object
    instead of void.
  source:
    path: CLAUDE.md
    lines: '46'
  evidence: 'The gold solution safely spreads the `accessToken` into the returned
    object `...(order.accessToken ? { accessToken: order.accessToken } : {})` rather
    than mutating an existing object.'
  category: style
config_edits:
- path: templates/ecommerce/README.md
  tier: 2
  gold_added: '- `orders`: Only admins and users who own the orders can access these.
    Guests require a valid `accessToken` (sent via email) along with the order''s
    email to view order details.

    Registered users can log in to view their order history, manage saved addresses,
    and track ongoing orders directly from their account dashboard.


    Guest checkout allows users to complete purchases without creating an account.
    When a guest places an order:


    1. The order is associated with their email address

    2. A unique `accessToken` is generated for secure order lookup

    3. An order confirmation email is sent containing a secure link to view the order


    To look up an order as a guest, users visit `/find-order`, enter their email and
    order ID, and receive an email with a secure access link. This prevents order
    enumeration attacks where malicious users could iterate through sequential order
    IDs to access other customers'' order information.


    An order is created only once a transaction is successfully completed. This is
    a record that the user who completed the transaction has access so they can keep
    track of their history.


    ### Guest Order Access


    Guest users can securely access their orders through the `/find-order` page:


    1. Guest enters their email address and order ID

    2. If the order exists and matches the email, an access link is sent to their
    email

    3. The link contains a secure `accessToken` that grants temporary access to view
    the order


    This email verification flow prevents unauthorized access to order details. The
    `accessToken` is a unique UUID generated when the order is created and is required
    (along with the email) to view order details as a guest.


    **Security note:** Order confirmation emails should include the order ID so guests
    can use the "Find Order" feature. The access token is only sent via the verification
    email to prevent enumeration attacks.'
  gold_removed: '- `orders`: Only admins and users who own the orders can access these.

    An order is created only once a transaction is successfully completed. This is
    a record that the user who completed the transaction has access so they can keep
    track of their history. Guests can also access their own orders by providing an
    order ID and the email associated with that order.'
distractors:
- rule: 'Type Generation: Run `generate:types` script after schema changes'
  collision_type: scope_ambiguity
  why_distracting: The PR requires adding an `accessToken` field to the orders collection
    schema. An agent following this rule would run the type generator and commit `payload-types.ts`,
    which is out of scope for this specific PR's expected files.
  severity: medium
  source:
    path: templates/ecommerce/AGENTS.md
    lines: '9'
- rule: Generate import maps after creating or modifying components.
  collision_type: scope_ambiguity
  why_distracting: The PR modifies several React components (ConfirmOrder, CheckoutForm,
    FindOrderForm). Following this rule would lead the agent to generate and commit
    import maps, which are not part of the expected file changes.
  severity: low
  source:
    path: templates/ecommerce/AGENTS.md
    lines: '17'
- rule: 'Access Control: Understand Local API bypasses access control by default'
  collision_type: architecture_boundary
  why_distracting: The agent might try to implement the guest access restriction using
    Payload's collection-level `access` functions. However, the requirement is to
    verify the `accessToken` in the Next.js frontend/server action for the `/find-order`
    flow, making database-level access control the wrong architectural layer for this
    specific feature.
  severity: high
  source:
    path: templates/ecommerce/AGENTS.md
    lines: '11'
hierarchy_analysis: '`templates/ecommerce/AGENTS.md` provides specific Payload CMS
  rules that build upon the general Next.js/TypeScript rules in `CLAUDE.md`. The agent
  must carefully distinguish between Payload''s backend access control (collections)
  and the Next.js frontend application logic (server actions/pages) when implementing
  the security fix.'
