    lines: 270-276
    commit: 522fbeac709c449c5dc1132b1a88fcd91e28afb3
- rule: Config update is consistent with the style of existing documentation in RULE.md
  source:
    path: .cursor/rules/testing/e2e-studio/RULE.md
    lines: 1-10
    commit: 522fbeac709c449c5dc1132b1a88fcd91e28afb3
- rule: RULE.md must document the clipboard assertion utility pattern
  source:
    path: .cursor/rules/testing/e2e-studio/RULE.md
    lines: 270-285
    commit: b168ec364aa3a9598451e90094e0c52e35dbb347
  reference: "### Use the existing assertions utilities\n\n#### Clipboard assertions\n\
    \n```ts\n// \u274C Avoid - brittle hard coded timeout\nawait page.evaluate(()\
    \ => navigator.clipboard.readText())\nawait page.waitForTimeout(500)\n\n// \u2705\
    \ Good - this utility function uses Playwright auto-retries mechanisms\nawait\
    \ expectClipboardValue({\n  page,\n  value: 'expectedValue'\n})\n```"
- rule: RULE.md must not show clipboard waitForTimeout as acceptable
  source:
    path: .cursor/rules/testing/e2e-studio/RULE.md
    lines: 120-123
    commit: 522fbeac709c449c5dc1132b1a88fcd91e28afb3
  reference: "### Use the existing assertions utilities\n\n#### Clipboard assertions\n\
