  gold_added: "This submits two identical jobs (one per branch) to HF Jobs. Results\
    \ are uploaded to a shared HF bucket path for easy comparison. Use `--dry-run`\
    \ to preview the generated bash script without submitting.\n\n### Results Directory\
    \ Structure\n\nEach branch produces the following structure in the HF bucket:\n\
    \n```\nhf://buckets/gradio/backend-benchmarks/{run_name}/{branch}/\n├── runner.py\
    \                          # Copy of the benchmark runner script (for reproducibility)\n\
    ├── run_params.json                    # Job parameters (branch, commit, apps,\
    \ tiers, etc.)\n└── {app_stem}/                        # One directory per app\
    \ (e.g. \"echo_text\")\n    └── {timestamp}/                   # e.g. \"20260330_142500\"\
    \n        ├── summary.json               # Overall results: app name, timestamp,\
    \ all tier results\n        ├── summary_table.txt          # Human-readable table\
    \ (client/server p50/p90/p99, success%)\n        ├── tier_1/\n        │   ├──\
    \ client_latencies.jsonl  # One JSON object per request (client-side timing)\n\
    \        │   └── traces.jsonl            # Server-side profiling traces\n    \
    \    ├── tier_10/\n        │   ├── client_latencies.jsonl\n        │   └── traces.jsonl\n\
    \        └── tier_100/\n            ├── client_latencies.jsonl\n            └──\
    \ traces.jsonl\n```\n\nFor A/B tests, both branches share the same `{run_name}`\
    \ prefix:\n├── main/\n│   ├── runner.py\n│   ├── run_params.json\n│   └── {app_stem}/{timestamp}/...\n\
    └── {compare_branch}/\n    ├── runner.py\n    ├── run_params.json\n    └── {app_stem}/{timestamp}/...\n\
    The `tier_{N}` directories are created for each value in `--tiers` (default `1,10,100`),\
    \ and each app passed via `--apps` gets its own `{app_stem}/` directory."
  gold_removed: "This submits two identical jobs (one per branch) to HF Jobs. Results\
