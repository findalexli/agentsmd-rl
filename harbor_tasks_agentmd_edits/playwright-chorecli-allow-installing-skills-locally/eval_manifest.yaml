version: "2.0"

source:
  repo: "microsoft/playwright"
  pr: 39078
  base_commit: "6a928b02f4de1efc633a8fae0331cd1fa821950e"
  merge_commit: "5c749f58b0c958606c0fc29150c61bfeeed3c14e"

checks:
  # [static] pass_to_pass - TypeScript compilation
  - id: typescript_compiles
    type: pass_to_pass
    origin: static
    description: "Modified TypeScript files must compile without errors"

  # [pr_diff] fail_to_pass - Core behavioral tests
  - id: install_skills_command_exists
    type: fail_to_pass
    origin: pr_diff
    description: "The install-skills CLI command must exist and be documented in help"

  - id: install_skills_copies_files
    type: fail_to_pass
    origin: pr_diff
    description: "Running install-skills copies skill files to .claude/skills/playwright/"

  - id: install_browser_command_exists
    type: fail_to_pass
    origin: pr_diff
    description: "The install-browser command must exist (renamed from install)"

  - id: route_capability_is_network
    type: fail_to_pass
    origin: pr_diff
    description: "Route tools must have 'network' capability instead of 'core'"

  - id: network_capability_in_config
    type: fail_to_pass
    origin: pr_diff
    description: "Network capability must be defined in config.d.ts"

  - id: skill_file_documentation
    type: fail_to_pass
    origin: pr_diff
    description: "SKILL.md must document the install-skills command"

  # [repo_tests] pass_to_pass - Regression tests
  - id: existing_mcp_tests_pass
    type: pass_to_pass
    origin: repo_tests
    description: "Upstream MCP test suite passes with modifications"

  # [static] pass_to_pass - Anti-stub check
  - id: not_stub_install_skills
    type: pass_to_pass
    origin: static
    description: "The installSkills function must have real implementation, not just a stub"

  # [agent_config] pass_to_pass - Config-derived checks
  - id: skill_file_updated_when_adding_commands
    type: pass_to_pass
    origin: agent_config
    description: "SKILL.md documents commands and should be updated when adding new ones"
    source:
      path: ".claude/skills/playwright-mcp-dev/SKILL.md"
      lines: "39-43"
      commit: "6a928b02f4de1efc633a8fae0331cd1fa821950e"

  - id: npm_run_flint_runs_before_commit
    type: pass_to_pass
    origin: agent_config
    description: "The skill mentions running npm run flint before commit"
    source:
      path: ".claude/skills/playwright-mcp-dev/SKILL.md"
      lines: "39"
      commit: "6a928b02f4de1efc633a8fae0331cd1fa821950e"

rubric:
  # Soft rules for LLM judge
  - rule: "The skill file is located at packages/playwright/src/skill/SKILL.md. Update it whenever you add new commands or tools."
    source:
      path: ".claude/skills/playwright-mcp-dev/SKILL.md"
      lines: "41-43"
      commit: "6a928b02f4de1efc633a8fae0331cd1fa821950e"

  - rule: "At any point in time you can run npm run playwright-cli -- --help to see the latest available commands and use them to update the skill file."
    source:
      path: ".claude/skills/playwright-mcp-dev/SKILL.md"
      lines: "43"
      commit: "6a928b02f4de1efc633a8fae0331cd1fa821950e"

  - rule: "Run npm run flint to lint everything before commit."
    source:
      path: ".claude/skills/playwright-mcp-dev/SKILL.md"
      lines: "39"
      commit: "6a928b02f4de1efc633a8fae0331cd1fa821950e"
