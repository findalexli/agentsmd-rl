    ---\n\n# Exploring LLM clusters\n\nUse this skill when investigating LLM analytics\
    \ clusters —\nunderstanding what patterns exist in your AI/LLM traffic,\ncomparing\
    \ cluster behavior, and drilling into individual clusters.\n\n## Tools\n\n| Tool\
    \                                             | Purpose                      \
    \                   |\n| ------------------------------------------------ | -----------------------------------------------\
    \ |\n| `posthog:llm-analytics-clustering-jobs-list`     | List clustering job\
    \ configurations for the team |\n| `posthog:llm-analytics-clustering-jobs-retrieve`\
    \ | Get a specific clustering job by ID             |\n| `posthog:execute-sql`\
    \                            | Query cluster run events and compute metrics  \
    \  |\n| `posthog:query-llm-traces-list`                  | Find traces belonging\
    \ to a cluster              |\n| `posthog:query-llm-trace`                   \
    \     | Inspect a specific trace in detail              |\n\n## How clustering\
    \ works\n\nPostHog clusters LLM traces (or individual generations) by embedding\
    \ similarity.\nA Temporal workflow runs periodically or on-demand, producing cluster\
    \ events stored as\n`$ai_trace_clusters` (trace-level) or `$ai_generation_clusters`\
    \ (generation-level).\n\nEach cluster event contains:\n\n- `$ai_clustering_run_id`\
    \ — unique run identifier (format: `<team_id>_<level>_<YYYYMMDD>_<HHMMSS>[_<job_id>]`)\n\
    - `$ai_clustering_level` — `\"trace\"` or `\"generation\"`\n- `$ai_window_start`\
    \ / `$ai_window_end` — time window analyzed\n- `$ai_total_items_analyzed` — number\
    \ of traces/generations processed\n- `$ai_clusters` — JSON array of cluster objects\n\
    - `$ai_clustering_params` — algorithm parameters used\n\n### Cluster object shape\
    \ (inside `$ai_clusters`)\n\n```json\n{\n  \"cluster_id\": 0,\n  \"size\": 42,\n\
    \  \"title\": \"User authentication flows\",\n  \"description\": \"Traces involving\
    \ login, signup, and token refresh operations\",\n  \"traces\": {\n    \"<trace_or_generation_id>\"\
    : {\n      \"distance_to_centroid\": 0.123,\n      \"rank\": 0,\n      \"x\":\
    \ -2.34,\n      \"y\": 1.56,\n      \"timestamp\": \"2026-03-28T10:00:00Z\",\n\
    \      \"trace_id\": \"abc-123\",\n      \"generation_id\": \"gen-456\"\n    }\n\
    \  },\n  \"centroid_x\": -2.1,\n  \"centroid_y\": 1.4\n}\n```\n\n- `cluster_id:\
    \ -1` is the **noise/outlier** cluster (items that didn't fit any cluster)\n-\
    \ Items in `traces` are keyed by trace ID (trace-level) or generation event UUID\
