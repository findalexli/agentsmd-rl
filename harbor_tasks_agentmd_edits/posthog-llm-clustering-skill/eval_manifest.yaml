version: "2.0"

source:
  repo: "PostHog/posthog"
  pr: 53107
  base_commit: "d67b05b91702b8d6c5fcf03a1361d1afe7daf287"
  merge_commit: "ee9eb212266b294edb421b0030c567fba458fb68"

checks:
  # ---------------------------------------------------------------------------
  # Gates (pass_to_pass, static) — syntax / configuration validation
  # ---------------------------------------------------------------------------

  - id: tools_yaml_valid
    type: pass_to_pass
    origin: static
    description: "tools.yaml must be valid YAML with required structure"

  - id: pyproject_toml_valid
    type: pass_to_pass
    origin: static
    description: "pyproject.toml must be valid TOML with tool section"

  - id: package_json_valid
    type: pass_to_pass
    origin: static
    description: "package.json must be valid JSON with lint-staged section"

  # ---------------------------------------------------------------------------
  # Fail-to-pass (pr_diff) — core behavioral/config tests
  # ---------------------------------------------------------------------------

  - id: clustering_jobs_list_enabled
    type: fail_to_pass
    origin: pr_diff
    description: "llm-analytics-clustering-jobs-list tool must be enabled with proper config via YAML parsing in subprocess"

  - id: clustering_jobs_retrieve_enabled
    type: fail_to_pass
    origin: pr_diff
    description: "llm-analytics-clustering-jobs-retrieve tool must be enabled with proper config via YAML parsing in subprocess"

  - id: skill_directory_exists
    type: fail_to_pass
    origin: pr_diff
    description: "exploring-llm-clusters skill directory must be created"

  - id: skill_md_exists_with_frontmatter
    type: fail_to_pass
    origin: pr_diff
    description: "SKILL.md must exist with proper frontmatter parsed via regex in subprocess"

  - id: skill_md_has_required_sections
    type: fail_to_pass
    origin: pr_diff
    description: "SKILL.md must document tools, clustering concepts, workflows, investigation patterns, and tips"

  - id: print_clusters_script_exists
    type: fail_to_pass
    origin: pr_diff
    description: "print_clusters.py helper script must exist in scripts/ directory"

  - id: print_clusters_script_runnable
    type: fail_to_pass
    origin: pr_diff
    description: "print_clusters.py must have valid Python syntax via py_compile in subprocess"

  - id: print_clusters_script_functional
    type: fail_to_pass
    origin: pr_diff
    description: "print_clusters.py must correctly parse and format cluster JSON data via subprocess execution"

  - id: print_clusters_sql_format
    type: fail_to_pass
    origin: pr_diff
    description: "print_clusters.py must handle SQL result format with metadata extraction via subprocess"

  - id: pyproject_toml_has_ruff_exclusion
    type: fail_to_pass
    origin: pr_diff
    description: "pyproject.toml must exclude skill scripts from ruff via TOML parsing in subprocess"

  - id: package_json_has_lint_staged_exclusion
    type: fail_to_pass
    origin: pr_diff
    description: "package.json lint-staged must exclude skill scripts via JSON parsing in subprocess"

  # ---------------------------------------------------------------------------
  # Pass-to-pass (static) — structural consistency
  # ---------------------------------------------------------------------------

  - id: skill_md_consistent_style
    type: pass_to_pass
    origin: static
    description: "SKILL.md follows existing skill documentation style with tables, code blocks, and headers"

rubric:
  # Soft rules for LLM judge
  - rule: "Skill documentation should be clear and actionable for agents investigating LLM clusters"
    source:
      path: ".agents/skills/writing-skills/SKILL.md"
      lines: "1-50"
      commit: "d67b05b91702b8d6c5fcf03a1361d1afe7daf287"

  - rule: "Scripts in skills should have proper CLI interfaces with usage messages"
    source:
      path: ".agents/skills/writing-skills/SKILL.md"
      lines: "50-100"
      commit: "d67b05b91702b8d6c5fcf03a1361d1afe7daf287"
