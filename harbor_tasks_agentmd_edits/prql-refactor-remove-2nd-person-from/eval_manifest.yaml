    path: CLAUDE.md
    lines: 1-90
    commit: efff1bad5f42a6f6cdd10514502028fe41b75db4
- rule: Snapshot string in sql.rs must match updated error text
  reference: "# CLAUDE.md\n## Error Messages\n\nError messages should avoid 2nd person\
    \ (you/your). Use softer modal verbs like\n\"might\" for a friendlier tone:\n\n\
    - ❌ \"are you missing `from` statement?\" → ✅ \"`from` statement might be\n  missing?\"\
    \n- ❌ \"did you forget to specify the column name?\" → ✅ \"column name might be\n\
    \  missing?\"\n- ❌ \"you can only use X\"  → ✅ \"X requires Y\" (for hard constraints)\n\
    - ❌ \"Have you forgotten an argument?\" → ✅ \"Argument might be missing?\""
