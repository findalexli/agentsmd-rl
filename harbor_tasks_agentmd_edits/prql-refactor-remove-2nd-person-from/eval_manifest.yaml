distractors:
- rule: Initialize tests with empty snapshots, then run with `--accept`.
  collision_type: meta_confusion
  why_distracting: The rule suggests initializing tests with empty snapshots (`@""`)
    and running with `--accept`. An agent might try to replace the existing failing
    snapshots with empty strings and assume the test runner or environment will automatically
    fix them, resulting in a patch that just deletes the snapshot contents instead
    of providing the updated expected output.
  severity: high
  source:
    path: CLAUDE.md
    lines: 37-41
- rule: Use focused inner loop test commands like `cargo insta test -p prqlc --lib
    -- resolver`.
  collision_type: scope_ambiguity
  why_distracting: The inner loop testing examples show specific filters (`-- resolver`
    and `-- date`). An agent might literally copy these commands to run tests, which
    would filter out the `bad_error_messages` and `sql` integration tests that actually
    need to be updated in this PR, causing the agent to miss failing tests.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 13-17
hierarchy_analysis: The `CLAUDE.md` file provides general workflow guidelines. The
  testing commands provided are examples, but an agent might interpret them as literal
  commands to run, leading to missed test failures. The snapshot update workflow is
  designed for human interactive use (`--accept`), which can confuse an agent trying
  to generate a static patch.
