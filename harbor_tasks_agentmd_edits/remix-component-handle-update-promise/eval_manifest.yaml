- path: packages/component/AGENTS.md
  tier: 1
  gold_added: "### `handle.update()`\nSchedules a component update and returns a promise\
    \ that resolves with an `AbortSignal` after\nthe update completes.\nWaiting for\
    \ the update:\n        async click() {\n          await handle.update()\n    \
    \      stopButton.focus()\n**Pattern: await `handle.update()` when showing loading\
    \ state before async work:**\nWhen you need to show loading UI before async work\
    \ starts, set loading state, call\n`await handle.update()`, and use the returned\
    \ signal for async APIs.\nfunction GoodAsyncExample(handle: Handle) {\n  async\
    \ function load() {\n    let signal = await handle.update()\n    let response\
    \ = await fetch('/api/data', { signal })\n    if (signal.aborted) return\n  }\n\
    \  return () => <button on={{ click: load }}>{loading ? 'Loading...' : 'Load data'}</button>"
  gold_removed: "### `handle.update(task?)`\nSchedules a component update. Optionally\
    \ accepts a task to run after the update completes.\nWith a task:\n        click()\
    \ {\n          handle.update(() => {\n            // Task runs after update completes\n\
    \            stopButton.focus()\n          })\n**Pattern: Use `handle.update(task)`\
    \ when you need to show loading state before async work:**\nThe task's signal\
    \ is aborted when the component re-renders. If you call `handle.update()` before\
    \ your async work completes, the re-render will abort the signal you're using\
    \ for the async operation. When you need to update state (like showing a loading\
    \ indicator) before starting async work, move the async work into a new task via\
    \ `handle.update(task)`:\n// Bad: Calling handle.update() before async work in\
    \ the same task\nfunction BadAsyncExample(handle: Handle) {\n  handle.queueTask(async\
    \ (signal) => {\n    handle.update() // This triggers a re-render, which aborts\
    \ signal!\n\n    let response = await fetch('/api/data', { signal }) //"
