version: "2.0"

source:
  repo: "vercel/next.js"
  pr: 89309
  base_commit: "b2f193b0964212c3ef0213efb74fe40dfd5be43b"
  merge_commit: "0d49dd888fbe6767ee6a4e0dd6845dd22f5044bf"

checks:
  # ---------------------------------------------------------------------------
  # Pass-to-pass tests - repo CI/CD checks (must pass on base and after fix)
  # ---------------------------------------------------------------------------

  - id: code_compiles
    type: pass_to_pass
    origin: repo_tests
    description: "The crate should compile successfully via cargo check"

  - id: cargo_check_lib
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's cargo check --lib passes (Rust compilation check)"

  - id: cargo_check_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's cargo check --tests passes (Rust test compilation check)"

  - id: cargo_clippy_lib
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's cargo clippy --lib passes (Rust linting check)"

  - id: cargo_fmt_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's cargo fmt --check passes (Rust code formatting check)"

  # ---------------------------------------------------------------------------
  # Fail-to-pass tests - PR changes (must fail on base, pass after fix)
  # ---------------------------------------------------------------------------

  - id: arc_bytes_exports_correctly
    type: fail_to_pass
    origin: pr_diff
    description: "ArcBytes should be exported from lib.rs and usable by dependent code"

  # ---------------------------------------------------------------------------
  # ArcBytes/ArcSlice structural changes
  # ---------------------------------------------------------------------------

  - id: arc_bytes_file_exists
    type: fail_to_pass
    origin: pr_diff
    description: "arc_bytes.rs module file should exist (replaces arc_slice.rs)"

  - id: arc_slice_file_removed
    type: fail_to_pass
    origin: pr_diff
    description: "arc_slice.rs module file should be removed (replaced by arc_bytes.rs)"

  - id: arc_bytes_has_mmap_api
    type: fail_to_pass
    origin: pr_diff
    description: "ArcBytes should have mmap-related API methods (is_mmap_backed, from_mmap)"

  - id: arc_slice_replaced_by_arc_bytes
    type: fail_to_pass
    origin: pr_diff
    description: "lib.rs should export ArcBytes instead of ArcSlice"

  # ---------------------------------------------------------------------------
  # Compression config changes
  # ---------------------------------------------------------------------------

  - id: compression_config_enum_exists
    type: fail_to_pass
    origin: pr_diff
    description: "static_sorted_file_builder.rs should have CompressionConfig enum with TryCompress and Uncompressed variants"

  - id: entry_value_uses_medium_raw
    type: fail_to_pass
    origin: pr_diff
    description: "EntryValue enum should use MediumRaw instead of MediumCompressed"

  - id: index_blocks_use_uncompressed
    type: fail_to_pass
    origin: pr_diff
    description: "Index blocks should be written uncompressed (CompressionConfig::Uncompressed)"

  - id: 7_8_compression_heuristic_implemented
    type: fail_to_pass
    origin: pr_diff
    description: "Code should implement 7/8 compression threshold heuristic from LevelDB/RocksDB"

  - id: decompress_into_arc_has_debug_assert
    type: fail_to_pass
    origin: pr_diff
    description: "decompress_into_arc should have debug_assert for uncompressed_length > 0"

  # ---------------------------------------------------------------------------
  # Documentation/config update tests (required for agentmd-edit tasks)
  # ---------------------------------------------------------------------------

  - id: readme_documents_compression_format
    type: fail_to_pass
    origin: pr_diff
    description: "README.md should document block compression format"

  - id: readme_explains_sentinel_value
    type: fail_to_pass
    origin: pr_diff
    description: "README.md should explain uncompressed_size=0 sentinel value"

  # ---------------------------------------------------------------------------
  # Additional structural verification
  # ---------------------------------------------------------------------------

  - id: static_sorted_file_uses_arc_bytes
    type: fail_to_pass
    origin: pr_diff
    description: "StaticSortedFile should use ArcBytes instead of ArcSlice"

  - id: block_weighter_handles_mmap
    type: fail_to_pass
    origin: pr_diff
    description: "BlockWeighter should handle mmap-backed blocks with small fixed weight"

  - id: db_returns_arc_bytes
    type: fail_to_pass
    origin: pr_diff
    description: "Database get methods should return ArcBytes instead of ArcSlice"

rubric: []
