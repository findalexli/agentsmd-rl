version = "1.0"

[metadata]
author_name = "Alex Li"
author_email = "alex@example.com"
difficulty = "medium"
category = "feature"
tags = ["nextjs", "turbopack", "rust", "compression", "documentation", "agentmd-edit"]
expert_time_estimate_min = 30.0
junior_time_estimate_min = 60.0

[verifier]
env = { LLM_JUDGE = "${LLM_JUDGE:-0}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
