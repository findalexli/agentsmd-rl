version: "2.0"

source:
  repo: "gradio-app/gradio"
  pr: 12929
  base_commit: "7c3fa2a6900cfa3c87cb61ffa9b34b75d1ae49ba"
  merge_commit: "978bc6ea5094aa11e10994cdd662c4c663a86a83"

checks:
  # Gates (pass_to_pass, static) — syntax / compilation checks
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified Python files must parse without errors"

  # Fail-to-pass (pr_diff) — core behavioral tests
  - id: html_accepts_server_functions
    type: fail_to_pass
    origin: pr_diff
    description: "gr.HTML component accepts server_functions parameter and stores it"

  - id: html_str_shows_server_functions
    type: fail_to_pass
    origin: pr_diff
    description: "gr.HTML __str__ method includes server_functions information"

  - id: html_without_server_functions
    type: fail_to_pass
    origin: pr_diff
    description: "gr.HTML works normally without server_functions parameter"

  # Config-derived (agent_config) — rule from SKILL.md
  - id: skill_md_documents_server_functions
    type: fail_to_pass
    origin: agent_config
    description: "SKILL.md documents server_functions parameter in HTML signature"
    source:
      path: ".agents/skills/gradio/SKILL.md"
      lines: "106"
      commit: "7c3fa2a6900cfa3c87cb61ffa9b34b75d1ae49ba"

  # Pass-to-pass (static) — anti-stub
  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "HTML.__init__ has real implementation for server_functions, not just pass/return"

rubric:
  # Soft rules for LLM judge
  - rule: "Config update is consistent with the style of existing documentation in SKILL.md"
    source:
      path: ".agents/skills/gradio/SKILL.md"
      lines: "103-109"
      commit: "7c3fa2a6900cfa3c87cb61ffa9b34b75d1ae49ba"
