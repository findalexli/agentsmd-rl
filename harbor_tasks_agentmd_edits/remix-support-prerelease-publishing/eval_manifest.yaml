version: "2.0"

source:
  repo: "remix-run/remix"
  pr: 10953
  base_commit: "ecb2847dea0dcebb0972c8de23cdfa661483745e"
  merge_commit: "3dbc5db1478ca25170211e89288a48a66e025a65"

checks:
  # Gate — syntax / load check
  - id: changes_ts_exists
    type: pass_to_pass
    origin: static
    description: "scripts/utils/changes.ts must exist and be non-empty"

  # Core code behavior (fail-to-pass)
  - id: parse_all_change_files_api
    type: fail_to_pass
    origin: pr_diff
    description: "parseAllChangeFiles exported with {valid, releases} shape"

  - id: read_remix_prerelease_config
    type: fail_to_pass
    origin: pr_diff
    description: "readRemixPrereleaseConfig exported and reads prerelease.json with tag=alpha"

  - id: publish_dry_run
    type: fail_to_pass
    origin: pr_diff
    description: "publish.ts supports --dry-run flag with DRY RUN output"

  - id: prerelease_json_exists
    type: fail_to_pass
    origin: pr_diff
    description: "packages/remix/.changes/prerelease.json created with tag=alpha"

  - id: semver_module_removed
    type: fail_to_pass
    origin: pr_diff
    description: "scripts/utils/semver.ts removed (logic moved into changes.ts)"

  - id: two_phase_publish_logic
    type: fail_to_pass
    origin: pr_diff
    description: "publish.ts uses readRemixPrereleaseConfig and --filter for two-phase publishing"

  # Config/documentation updates (fail-to-pass)
  - id: agents_md_prerelease_docs
    type: fail_to_pass
    origin: pr_diff
    description: "AGENTS.md documents prerelease mode, prerelease.json, and graduation to stable"

  - id: contributing_md_prerelease_section
    type: fail_to_pass
    origin: pr_diff
    description: "CONTRIBUTING.md has prerelease section with tag transition docs"

  # Agent config compliance (pass-to-pass)
  - id: preview_scripts_documented
    type: pass_to_pass
    origin: agent_config
    description: "AGENTS.md documents preview/dry-run commands for change/release scripts"
    source:
      path: "AGENTS.md"
      lines: "56"
      commit: "ecb2847dea0dcebb0972c8de23cdfa661483745e"

rubric:
  - rule: "Prerelease documentation in AGENTS.md follows the existing bullet-point style of the 'Changes and Releases' section"
    source:
      path: "AGENTS.md"
      lines: "40-56"
      commit: "ecb2847dea0dcebb0972c8de23cdfa661483745e"
  - rule: "CONTRIBUTING.md prerelease section uses the same heading structure and code block style as the rest of the document"
    source:
      path: "CONTRIBUTING.md"
      lines: "1-127"
      commit: "ecb2847dea0dcebb0972c8de23cdfa661483745e"
