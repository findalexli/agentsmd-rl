version: "2.0"

source:
  repo: "mlflow/mlflow"
  pr: 22340
  base_commit: "33200f3a6208bee42c5c1c10a4687bc78302b9a8"
  merge_commit: "74a75068b5d1ceb7175ce26ee565b8a6c2849f83"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified files must parse without errors"

  - id: autogenerated_shown_with_mask
    type: fail_to_pass
    origin: pr_diff
    description: "Auto-generated files (uv.lock, protobuf) shown with masked diff instead of excluded"

  - id: ipynb_no_longer_excluded
    type: fail_to_pass
    origin: pr_diff
    description: "Notebook .ipynb files are no longer excluded from diff output"

  - id: mask_only_once_for_multi_hunk
    type: fail_to_pass
    origin: pr_diff
    description: "Mask message appears exactly once even for multi-hunk auto-generated files"

  - id: regular_file_line_numbers
    type: pass_to_pass
    origin: static
    description: "Regular files still get line number annotations"

  - id: skill_md_documents_masked_output
    type: fail_to_pass
    origin: pr_diff
    description: "SKILL.md updated to document masked diff behavior for auto-generated files"

  - id: function_renamed_to_is_autogenerated
    type: fail_to_pass
    origin: pr_diff
    description: "should_exclude_file renamed to is_autogenerated_file"

  # Repo CI pass-to-pass gates
  - id: test_repo_ruff_check
    type: pass_to_pass
    origin: repo_tests
    description: "Ruff linting passes on .claude/skills"

  - id: test_repo_ruff_format
    type: pass_to_pass
    origin: repo_tests
    description: "Ruff format check passes on .claude/skills"

  - id: test_repo_mypy
    type: pass_to_pass
    origin: repo_tests
    description: "Mypy type checking passes on .claude/skills"

rubric:
  - rule: "Only add comments that explain non-obvious logic or provide additional context"
    source:
      path: "CLAUDE.md"
      lines: "9"
      commit: "33200f3a6208bee42c5c1c10a4687bc78302b9a8"
  - rule: "SKILL.md output example should be consistent with the style and formatting of the existing document"
    source:
      path: ".claude/skills/fetch-diff/SKILL.md"
      lines: "1-10"
      commit: "33200f3a6208bee42c5c1c10a4687bc78302b9a8"
