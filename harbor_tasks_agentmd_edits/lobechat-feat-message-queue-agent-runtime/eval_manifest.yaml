  gold_added: "---\nname: electron-testing\ndescription: Electron desktop app automation\
    \ testing using agent-browser CLI. Use when testing UI features in the running\
    \ Electron app, verifying visual state, interacting with the desktop app, or running\
    \ manual QA scenarios. Triggers on 'test in electron', 'test desktop', 'electron\
    \ test', 'manual test', or UI verification tasks.\n---\n\n# Electron Automation\
    \ Testing with agent-browser\n\nUse the `agent-browser` CLI to automate and test\
    \ the LobeHub desktop Electron app.\n\n## Prerequisites\n\n- `agent-browser` CLI\
    \ installed globally (`agent-browser --version`)\n- Working directory must be\
    \ `apps/desktop/` when starting Electron\n\n## Quick Start\n\n```bash\n# 1. Kill\
    \ existing instances\npkill -f \"Electron\" 2> /dev/null\npkill -f \"electron-vite\"\
    \ 2> /dev/null\npkill -f \"agent-browser\" 2> /dev/null\nsleep 3\n\n# 2. Start\
    \ Electron with CDP (MUST cd to apps/desktop first)\ncd apps/desktop && ELECTRON_ENABLE_LOGGING=1\
    \ npx electron-vite dev -- --remote-debugging-port=9222 > /tmp/electron-dev.log\
    \ 2>&1 &\n\n# 3. Wait for startup (poll for \"starting electron\" in logs)\nfor\
    \ i in $(seq 1 12); do\n  sleep 5\n  if strings /tmp/electron-dev.log 2> /dev/null\
    \ | grep -q \"starting electron\"; then\n    echo \"ready\"\n    break\n  fi\n\
    done\n\n# 4. Wait for renderer to load, then connect\nsleep 15 && agent-browser\
    \ --cdp 9222 wait 3000\n```\n\n**Critical:** `npx electron-vite dev` MUST run\
    \ from `apps/desktop/` directory, not project root. Running from root will fail\
    \ silently (no `initUrl` in logs).\n\n## Connecting to Electron\n\n```bash\nagent-browser\
    \ --cdp 9222 snapshot -i    # Interactive elements only\nagent-browser --cdp 9222\
    \ snapshot -i -C # Include contenteditable elements\n```\n\nAlways use `--cdp\
    \ 9222`. The `--auto-connect` flag is unreliable.\n\n## Core Workflow\n\n### 1.\
    \ Snapshot → Find Elements\n\n```bash\nagent-browser --cdp 9222 snapshot -i\n\
    ```\n\nReturns element refs like `@e1`, `@e2`. **Refs are ephemeral** — re-snapshot\
    \ after any page change (click, navigation, HMR).\n\n### 2. Interact\n\n```bash\n\
    agent-browser --cdp 9222 click @e5\nagent-browser --cdp 9222 type @e3 \"text\"\
    \ # Character by character (for contenteditable)\nagent-browser --cdp 9222 fill\
    \ @e3 \"text\" # Bulk fill (for regular inputs)\nagent-browser --cdp 9222 press\
    \ Enter\nagent-browser --cdp 9222 scroll down 500\n```\n\n### 3. Wait\n\n```bash\n\
    agent-browser --cdp 9222 wait 2000               # Wait ms\nagent-browser --cdp\
    \ 9222 wait --load networkidle # Wait for network\n```\n\nAvoid `agent-browser\
    \ wait` for long durations (>30s) — it blocks the daemon. Use `sleep N` in bash\
    \ instead, then take a new snapshot/screenshot.\n\n### 4. Screenshot & Verify\n\
    \n```bash\nagent-browser --cdp 9222 screenshot   # Save to ~/.agent-browser/tmp/screenshots/\n\
    agent-browser --cdp 9222 get text @e1 # Get element text\nagent-browser --cdp\
    \ 9222 get url      # Get current URL\n```\n\nRead screenshots with the `Read`\
    \ tool for visual verification.\n\n### 5. Evaluate JavaScript\n\n```bash\nagent-browser\
    \ --cdp 9222 eval \"document.title\"\n```\n\nFor multi-line JS, use `--stdin`:\n\
    \n```bas"
