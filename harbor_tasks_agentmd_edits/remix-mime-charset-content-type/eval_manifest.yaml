version: "2.0"

source:
  repo: "remix-run/remix"
  pr: 10905
  base_commit: "848194ecde3f143b5d0d1fde9b11fa713b7c142e"
  merge_commit: "d0ee7eb0e1dd485a9c707eaaf97e58c420e181ee"

checks:
  # Gate
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Pre-existing modified files (index.ts, file.ts) still parse correctly"

  # Repo CI/CD tests (pass_to_pass, repo_tests)
  - id: mime_package_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's @remix-run/mime package tests pass"

  - id: mime_package_typecheck
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's @remix-run/mime package typecheck passes"

  - id: response_package_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's @remix-run/response package tests pass"

  - id: response_package_typecheck
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's @remix-run/response package typecheck passes"

  - id: changes_validate
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's changes file validation passes"

  # Core behavioral tests (code)
  - id: mime_type_to_content_type_text_types
    type: fail_to_pass
    origin: pr_diff
    description: "mimeTypeToContentType adds charset to text/* MIME types"

  - id: mime_type_to_content_type_json_and_js
    type: fail_to_pass
    origin: pr_diff
    description: "mimeTypeToContentType adds charset to application/json, application/javascript, +json types"

  - id: mime_type_to_content_type_exclusions
    type: fail_to_pass
    origin: pr_diff
    description: "mimeTypeToContentType excludes text/xml, binary types, and already-charset types"

  - id: detect_content_type_exists_and_composes
    type: fail_to_pass
    origin: pr_diff
    description: "detectContentType function exists, composing detectMimeType with mimeTypeToContentType"

  # Config/documentation update tests
  - id: readme_documents_detect_content_type
    type: fail_to_pass
    origin: pr_diff
    description: "packages/mime/README.md documents detectContentType with usage examples"

  - id: readme_documents_mime_type_to_content_type
    type: fail_to_pass
    origin: pr_diff
    description: "packages/mime/README.md documents mimeTypeToContentType with charset logic"

  # Agent config compliance
  - id: index_exports_new_functions
    type: fail_to_pass
    origin: agent_config
    description: "index.ts re-exports both new functions per AGENTS.md package exports architecture rule"
    source:
      path: "AGENTS.md"
      lines: "16"
      commit: "848194ecde3f143b5d0d1fde9b11fa713b7c142e"

rubric:
  - rule: "README documentation style is consistent with existing function docs (detectMimeType, isCompressibleMimeType)"
    source:
      path: "packages/mime/README.md"
      lines: "1-55"
      commit: "848194ecde3f143b5d0d1fde9b11fa713b7c142e"
  - rule: "Code comments follow AGENTS.md rule: only non-JSDoc comments when the code is doing something surprising or non-obvious"
    source:
      path: "AGENTS.md"
      lines: "30"
      commit: "848194ecde3f143b5d0d1fde9b11fa713b7c142e"
  - rule: "New code uses let for local variables per AGENTS.md code style"
    source:
      path: "AGENTS.md"
      lines: "23"
      commit: "848194ecde3f143b5d0d1fde9b11fa713b7c142e"
  - rule: "packages/response/src/lib/file.ts uses mimeTypeToContentType for Content-Type header"
