rubric:
- rule: Documentation should clearly explain the feature purpose and usage
  source:
    path: packages/opencode/src/acp/README.md
    lines: 44-53
    commit: d8c25bfeb44771cc3a3ba17bf8de6ad2add9de2c
  reference: '### Question Tool Opt-In


    ACP excludes QuestionTool by default.


    OPENCODE_ENABLE_QUESTION_TOOL=1 opencode acp


    Enable this only for ACP clients that support interactive question prompts.'
- rule: Prefer single word names for variables and functions. Only use multiple words
    if necessary.
  source:
    path: AGENTS.md
    lines: 21-22
  evidence: The gold solution names the local boolean variable `question` instead
    of a multi-word name like `shouldIncludeQuestionTool` or `enableQuestionTool`.
  category: naming
- rule: Prefer `const` over `let`. Use ternaries or early returns instead of reassignment.
  source:
    path: AGENTS.md
    lines: 46-47
  evidence: 'The gold solution uses `const question = ...` and a ternary operator
    `...(question ? [QuestionTool] : [])` to conditionally include the tool, rather
    than using `let` and an `if` statement to mutate th'
  category: style
- rule: Rely on type inference when possible; avoid explicit type annotations or interfaces
    unless necessary for exports or clarity
  source:
    path: AGENTS.md
    lines: 14-14
  evidence: 'The gold solution declares `const question = ...` without explicitly
    adding a `: boolean` type annotation, relying on TypeScript''s inference.'
  category: style
