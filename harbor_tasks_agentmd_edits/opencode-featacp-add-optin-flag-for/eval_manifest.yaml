distractors:
- rule: Reduce total variable count by inlining when a value is only used once.
  collision_type: rule_conflict
  why_distracting: The condition for including the QuestionTool is long. Inlining
    it directly into the array spread `...(...)` would make the array literal extremely
    dense and hard to read. The gold solution explicitly extracts this to `const question`
    to maintain readability, violating the strict 'inline if used once' rule.
  severity: medium
  source:
    path: AGENTS.md
    lines: 31-32
- rule: Prefer single word names for variables and functions. Only use multiple words
    if necessary.
  collision_type: scope_ambiguity
  why_distracting: The environment variable flag must be named `OPENCODE_ENABLE_QUESTION_TOOL`
    to match the requested feature and existing conventions, which is multiple words.
    An agent might try to name the flag `OPENCODE_QUESTION` or similar to adhere to
    the single-word rule, which would be incorrect for an environment variable.
  severity: high
  source:
    path: AGENTS.md
    lines: 21-22
hierarchy_analysis: The root `AGENTS.md` provides general TypeScript style guidelines
  (single-word variables, inlining, const over let). The `packages/opencode/AGENTS.md`
  focuses entirely on database conventions which are irrelevant to this PR. The main
  tension in this PR is balancing the strict 'inline variables used once' and 'single-word
  names' rules against readability and environment variable naming conventions.
