config_edits:
- path: products/posthog_ai/skills/query-examples/references/taxonomy-dynamic-properties.md
  tier: 2
  gold_added: '# Dynamic person and event properties


    Some properties follow dynamic naming patterns with IDs or keys.

    These are **not returned** by the `read-data-schema` tool because they are generated
    per survey, feature flag, or product tour.

    If a user''s question involves these features, construct the property name using
    the patterns below.


    ## Person properties


    Pattern | Type | Description

    `$survey_dismissed/{survey_id}` | Boolean | Whether a person dismissed a specific
    survey

    `$survey_responded/{survey_id}` | Boolean | Whether a person responded to a specific
    survey

    `$feature_enrollment/{flag_key}` | Boolean | Whether a person opted into an early
    access feature

    `$feature_interaction/{feature_key}` | Boolean | Whether a person interacted with
    a specific feature

    `$product_tour_dismissed/{tour_id}` | Boolean | Whether a person dismissed a product
    tour

    `$product_tour_shown/{tour_id}` | Boolean | Whether a person was shown a product
    tour

    `$product_tour_completed/{tour_id}` | Boolean | Whether a person completed a product
    tour


    ## Event properties


    Pattern | Type | Description

    `$feature/{flag_key}` | String | The feature flag value for a specific flag


    ## Querying dynamic properties with SQL


    Because these properties are not discoverable via the `read-data-schema` tool,
    you must know the ID or key.

    Use these queries to find the IDs, then construct the property name.


    ### Find survey IDs


    ```sql

    SELECT id, name, description, type

    FROM system.surveys

    WHERE NOT archived

    ORDER BY created_at DESC

    LIMIT 20

    ```


    Then query person properties like `$survey_dismissed/{id}` or `$survey_responded/{id}`.


    ### Find feature flag keys


    ```sql

    SELECT id, key, name, rollout_percentage

    FROM system.feature_flags

    WHERE NOT deleted

    ORDER BY created_at DESC

    LIMIT 20

    ```


    Then query event properties like `$feature/{key}` or person properties like `$feature_enrollment/{key}`.


    ### Find early access features


    ```sql

    SELECT id, name, feature_flag_id

    FROM system.early_access_features

    WHERE NOT deleted

    ORDER'
  gold_removed: ''
distractors:
- rule: API views should declare request/response schemas — prefer `@validated_request`
    or `@extend_schema`.
  collision_type: architecture_boundary
  why_distracting: The agent is modifying `ee/hogai/tools/read_taxonomy/core.py` which
    handles tool execution. It might mistakenly treat this as a Django API view and
    try to add DRF decorators like `@extend_schema`, but it's an internal AI tool
    function.
  severity: medium
  source:
    path: AGENTS.md
    lines: 60-62
- rule: Django serializers are the source of truth for frontend API types — `hogli
    build:openapi` generates TypeScript.
  collision_type: architecture_boundary
  why_distracting: The agent might try to update a Django serializer or run `hogli
    build:openapi` to expose the dynamic properties, but these properties are intentionally
    excluded from the standard API/schema and only need to be hinted to the AI agent
    via prompts and tool outputs.
  severity: high
  source:
    path: AGENTS.md
    lines: 63-65
- rule: MCP tools are generated from the...
  collision_type: meta_confusion
  why_distracting: The agent might think the taxonomy tool (`read_taxonomy/core.py`)
    is auto-generated and try to find a generator script or YAML config to modify,
    but the tool execution logic is manually written Python code.
  severity: medium
  source:
    path: AGENTS.md
    lines: 66-67
hierarchy_analysis: The `.cursorrules` provides general behavioral guidelines, while
  `AGENTS.md` provides PostHog-specific architectural rules. The skills directory
  contains specific guides for agent capabilities. In this task, the agent must distinguish
  between Django API views (which require serializers and schemas as per `AGENTS.md`)
  and internal AI agent tools (which require prompt engineering and skill documentation
  as per the `writing-skills` guide). The architectural boundary between the web API
  and the AI agent's internal tool execution is crucial to respect.
