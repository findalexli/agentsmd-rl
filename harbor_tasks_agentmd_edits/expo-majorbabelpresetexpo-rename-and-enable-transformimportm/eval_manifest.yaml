rubric:
- rule: Preset enables import.meta transform by default for all environments, not
    just server
  reference: '# packages/babel-preset-expo/README.md

    ### `transformImportMeta`

    Enable transform that converts `import.meta` to `globalThis.__ExpoImportMetaRegistry`.
    Defaults to `true`.

    > **Note:** If the JavaScript engine supports `import.meta` natively, this transformation
    may interfere with the native implementation.'
- rule: README.md documents the option as 'transformImportMeta' with default true
  source:
