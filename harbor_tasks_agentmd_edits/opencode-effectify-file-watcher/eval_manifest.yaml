version: "2.0"

source:
  repo: "anomalyco/opencode"
  pr: 17827
  base_commit: "d4694d058cc590b0f05261a04460034d2fa8541d"
  merge_commit: "9e740d9947e6a4c61680c8dd00cb1fd11adf12af"

checks:
  # -------------------------------------------------------------------------
  # Gates (pass_to_pass, static) — syntax / compilation
  # -------------------------------------------------------------------------
  - id: typescript_compiles
    type: pass_to_pass
    origin: static
    description: "Modified TypeScript files compile without errors"

  # -------------------------------------------------------------------------
  # Fail-to-pass (pr_diff) — core behavioral tests for the refactor
  # -------------------------------------------------------------------------
  - id: filewatcher_service_class_exists
    type: fail_to_pass
    origin: pr_diff
    description: "FileWatcherService class exists with proper Effect Service structure"

  - id: filewatcher_uses_instance_context
    type: fail_to_pass
    origin: pr_diff
    description: "FileWatcherService uses InstanceContext instead of Instance.* globals"

  - id: filewatcher_uses_effect_finalizer
    type: fail_to_pass
    origin: pr_diff
    description: "FileWatcherService uses Effect.addFinalizer for cleanup"

  - id: filewatcher_uses_instance_bind
    type: fail_to_pass
    origin: pr_diff
    description: "FileWatcherService uses Instance.bind for native callbacks"

  - id: instances_ts_updated
    type: fail_to_pass
    origin: pr_diff
    description: "instances.ts includes FileWatcherService in union and layers"

  - id: bootstrap_updated
    type: fail_to_pass
    origin: pr_diff
    description: "bootstrap.ts calls FileWatcherService via runPromiseInstance"

  # -------------------------------------------------------------------------
  # Config/documentation update checks (pr_diff)
  # -------------------------------------------------------------------------
  - id: agents_md_documents_instance_services
    type: fail_to_pass
    origin: pr_diff
    description: "AGENTS.md documents the Instance-scoped Effect services pattern"

  - id: agents_md_documents_instance_bind
    type: fail_to_pass
    origin: pr_diff
    description: "AGENTS.md documents Instance.bind for native callbacks"

  - id: agents_md_documents_effect_callback
    type: fail_to_pass
    origin: pr_diff
    description: "AGENTS.md documents Effect.callback pattern"

  # -------------------------------------------------------------------------
  # Pass-to-pass (repo_tests / static) — regression + anti-stub
  # -------------------------------------------------------------------------
  - id: existing_tests_pass
    type: pass_to_pass
    origin: repo_tests
    description: "Existing permission tests still pass after changes"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "FileWatcherService layer has real implementation with subscription/cleanup logic"

  # -------------------------------------------------------------------------
  # Config-derived (agent_config) — rules from AGENTS.md
  # -------------------------------------------------------------------------
  - id: no_wildcard_imports
    type: pass_to_pass
    origin: agent_config
    description: "No wildcard imports (per AGENTS.md Effect guide)"
    source:
      path: "packages/opencode/AGENTS.md"
      lines: "1-20"
      commit: "d4694d058cc590b0f05261a04460034d2fa8541d"

  - id: uses_effect_gen
    type: pass_to_pass
    origin: agent_config
    description: "Uses Effect.gen for composition (per AGENTS.md Effects section)"
    source:
      path: "packages/opencode/AGENTS.md"
      lines: "33"
      commit: "d4694d058cc590b0f05261a04460034d2fa8541d"

rubric:
  # Soft rules for LLM judge
  - rule: "FileWatcherService follows the same patterns as QuestionService, PermissionService, and ProviderAuthService"
    source:
      path: "packages/opencode/src/effect/instances.ts"
      lines: "1-30"
      commit: "d4694d058cc590b0f05261a04460034d2fa8541d"

  - rule: "Instance.bind documentation explains both when to use it (native addons) and when not needed (setTimeout, EventEmitter, etc.)"
    source:
      path: "packages/opencode/AGENTS.md"
      lines: "46-77"
      commit: "9e740d9947e6a4c61680c8dd00cb1fd11adf12af"

  - rule: "Code is consistent with existing Effect patterns in the codebase"
    source:
      path: "packages/opencode/AGENTS.md"
      lines: "1-50"
      commit: "d4694d058cc590b0f05261a04460034d2fa8541d"
