    Exposes a Rust `const` item as a read-only static constant on both the JavaScript
    constructo'
- rule: src/rust/jsg/README.md has a Static Constants section
  source:
    path: src/rust/jsg/README.md
    lines: 73-93
    commit: ccca821e6883eea58455d2755c621eac90f4f857
  reference: "## Static Constants\n\nTo expose numeric constants on a resource class\
    \ (equivalent to `JSG_STATIC_CONSTANT` in C++), use `#[jsg_static_constant]` on\
    \ `const` items inside a `#[jsg_resource]` impl block:\n\n```rust\nuse jsg_macros::jsg_static_constant;\n\
    \n#[jsg_resource]\nimpl WebSocket {\n    #[jsg_static_constant]\n    pub const\
    \ CONNECTING: i32 = 0;\n\n    #[jsg_static_constant]\n    pub const OPEN: i32\
    \ = 1;\n}\n// JS: WebSocket.CONNECTING === 0, instance.OPEN === 1\n```\n\nConstants\
    \ are set on both the construct"
