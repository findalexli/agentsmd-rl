  gold_added: "# .NET Multi-platform App UI (.NET MAUI)\n\n![NuGet](https://img.shields.io/nuget/v/Microsoft.Maui.Controls?style=flat-square&label=NuGet)\n\
    ![License](https://img.shields.io/github/license/dotnet/maui?style=flat-square&label=License)\n\
    \n[.NET Multi-platform App UI (.NET MAUI)](https://dotnet.microsoft.com/apps/maui)\
    \ is a cross-platform framework for creating native mobile and desktop apps with\
    \ C# and XAML. Using .NET MAUI, you can develop apps that run on Android, iOS,\
    \ iPadOS, macOS, and Windows from a single shared codebase.\n\n## ✨ What is .NET\
    \ MAUI?\n\nThe **Microsoft.Maui.Controls** package provides the UI controls and\
    \ XAML infrastructure for building beautiful, native cross-platform applications.\
    \ It includes:\n\n- **40+ UI controls** - Buttons, labels, entries, pickers, lists,\
    \ grids, and more\n- **XAML support** - Design your UI with declarative markup\n\
    - **Layout system** - Flexible layouts including Grid, StackLayout, FlexLayout,\
    \ and AbsoluteLayout\n- **Navigation** - Shell navigation, NavigationPage, TabbedPage,\
    \ FlyoutPage\n- **Data binding** - Two-way data binding with MVVM support\n- **Styling\
    \ and theming** - Application-wide styles, dynamic resources, and light/dark theme\
    \ support\n- **Platform integration** - Access platform-specific features seamlessly\n\
    - **Hot Reload** - See UI changes instantly during development\n\n## \U0001F680\
    \ Supported Platforms\n\n.NET MAUI applications run on the following platforms:\n\
    \n| Platform | Minimum Version |\n|----------|----------------|\n| Android | API\
    \ 21 (Android 5.0) |\n| iOS | iOS 13.0+ |\n| iPadOS | iPadOS 13.0+ |\n| macOS\
    \ | macOS 12.0+ (via Mac Catalyst) |\n| Windows | Windows 11, Windows 10 (Version\
    \ 1809+) using Windows UI Library (WinUI) |\n\n## \U0001F4E6 Getting Started\n\
    \n### Prerequisites\n\n- [.NET 10 SDK](https://dotnet.microsoft.com/download/dotnet/10.0)\
    \ (or .NET 9 for previous versions)\n- Platform-specific tools:\n  - **Android**:\
    \ Android SDK (installed via Visual Studio or Android Studio)\n  - **iOS/macOS**:\
    \ Xcode (Mac required)\n  - **Windows**: Windows App"
  gold_removed: ''
