- path: src/rust/jsg/README.md
  tier: 2
  gold_added: "pub unsafe fn realm_create(\n    isolate: *mut v8::ffi::Isolate,\n\
    \    feature_flags_data: &[u8],\n) -> Box<Realm> {\n\n## Feature Flags (Compatibility\
    \ Flags)\n\n`Lock::feature_flags()` provides Rust-native access to the worker's\
    \ compatibility flags, backed by the Cap'n Proto Rust crate (`capnp`). The flags\
    \ are deserialized from the `CompatibilityFlags` schema in `src/workerd/io/compatibility-date.capnp`.\n\
    \n### Reading flags\n\n```rust\nif lock.feature_flags().get_node_js_compat() {\n\
    \    // Node.js compatibility behavior\n}\n```\n\n`feature_flags()` returns a\
    \ capnp-generated `compatibility_flags::Reader` with a getter for each boolean\
    \ flag (e.g., `get_node_js_compat()`, `get_url_standard()`, `get_fetch_refuses_unknown_protocols()`).\n\
    \n### How it works\n\n1. During worker initialization, C++ canonicalizes the worker's\
    \ `CompatibilityFlags` via `capnp::canonicalize()` and passes the bytes to `realm_create()`,\
    \ which parses them once and stores the result in the per-context `Realm`.\n2.\
    \ `lock.feature_flags()` reads the cached `FeatureFlags` and returns its capnp\
    \ reader. No copies or re-parsing on access.\n\n### Key types and files\n\n| Item\
    \ | Location |\n|------|----------|\n| `FeatureFlags` struct | `src/rust/jsg/feature_flags.rs`\
    \ |\n| `Lock::feature_flags()` | `src/rust/jsg/lib.rs` |\n| `realm_create()` FFI\
    \ | `src/rust/jsg/lib.rs` (CXX bridge) |\n| C++ call site | `src/workerd/io/worker.c++`\
    \ (`initIsolate`) |\n| Cap'n Proto schema | `src/workerd/io/compatibility-date.capnp`\
    \ |\n| Generated Rust bindings | `//src/workerd/io:compatibility-date_capnp_rust`\
    \ (Bazel target) |"
  gold_removed: 'pub unsafe fn realm_create(isolate: *mut v8::ffi::Isolate) -> Box<Realm>
    {'
