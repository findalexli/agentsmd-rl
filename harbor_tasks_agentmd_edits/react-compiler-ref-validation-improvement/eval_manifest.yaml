version: "2.0"

source:
  repo: "facebook/react"
  pr: 35893
  base_commit: "c0060cf2a695d719152c939cfc3cced8f7da3e52"
  merge_commit: "e33071c6142ae5212483a63b87d5d962860e535a"

checks:
  - id: repo_typescript_compiles
    type: pass_to_pass
    origin: repo_tests
    description: "Repo TypeScript compilation passes (npx tsc --noEmit)"

  - id: repo_jest_tests_pass
    type: pass_to_pass
    origin: repo_tests
    description: "Repo Jest unit tests pass (yarn jest)"

  - id: repo_lint_passes
    type: pass_to_pass
    origin: repo_tests
    description: "Repo ESLint checks pass (yarn lint)"

  - id: repo_build_succeeds
    type: pass_to_pass
    origin: repo_tests
    description: "Compiler package builds successfully (yarn build)"

  - id: repo_snap_build_succeeds
    type: pass_to_pass
    origin: repo_tests
    description: "Snap package builds successfully (yarn workspace snap build)"

  - id: panresponder_compiles_without_ref_error
    type: fail_to_pass
    origin: pr_diff
    description: "PanResponder.create() with ref in callback should compile without ref access error"

  - id: mutation_function_still_reports_error
    type: fail_to_pass
    origin: pr_diff
    description: "Functions that mutate refs should still report errors"

  - id: existing_ref_validation_source_has_logic
    type: pass_to_pass
    origin: static
    description: "Ref validation source code contains expected validation logic"

  - id: validation_has_effect_based_logic
    type: fail_to_pass
    origin: pr_diff
    description: "The validation must have effect-based ref validation logic (anti-stub)"

  - id: claude_md_has_linting_section
    type: fail_to_pass
    origin: agent_config
    description: "CLAUDE.md should include linting and formatting sections"
    source:
      path: "compiler/CLAUDE.md"
      lines: "48-61"
      commit: "c0060cf2a695d719152c939cfc3cced8f7da3e52"

rubric:
  - rule: "When modifying the compiler, you MUST read the documentation about that pass in `compiler/packages/babel-plugin-react-compiler/docs/passes/`"
    source:
      path: "compiler/CLAUDE.md"
      lines: "12"
      commit: "c0060cf2a695d719152c939cfc3cced8f7da3e52"

  - rule: "The compiler is fault-tolerant: it runs all passes and accumulates errors on the Environment rather than throwing on the first error."
    source:
      path: "compiler/CLAUDE.md"
      lines: "187-189"
      commit: "c0060cf2a695d719152c939cfc3cced8f7da3e52"

  - rule: "Error test fixtures should be named following the pattern `error.<description>.js` and placed in `src/__tests__/fixtures/compiler/`"
    source:
      path: "compiler/CLAUDE.md"
      lines: "14-17"
      commit: "c0060cf2a695d719152c939cfc3cced8f7da3e52"

  - rule: "Validation passes must use the fault-tolerant error handling pattern: record errors via `env.recordError(diagnostic)` instead of throwing, or use `tryRecord()` wrapper in Pipeline.ts"
    source:
      path: "compiler/CLAUDE.md"
      lines: "234-238"
      commit: "c0060cf2a695d719152c939cfc3cced8f7da3e52"
