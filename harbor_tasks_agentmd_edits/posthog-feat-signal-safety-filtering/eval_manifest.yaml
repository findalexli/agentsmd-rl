config_edits:
- path: products/signals/eval/AGENTS.md
  tier: 1
  gold_added: "# Reports\n\n## HogQL queries\n\nAll queries filter on `$ai_eval_source\
    \ = 'signals-grouping'` and `$ai_evaluation_type = 'offline'`.\nRun these in the\
    \ PostHog SQL editor.\n\n### Aggregate metrics\n\nARI, homogeneity, completeness,\
    \ purity, recall, malicious leak rate.\n\n```sql\nSELECT\n    properties.$ai_metric_name\
    \ AS metric,\n    properties.$ai_score AS score,\n    properties.$ai_metric_description\
    \ AS description,\n    properties.$ai_reasoning AS reasoning,\n    properties.$ai_input\
    \ AS input,\n    properties.$ai_output AS output,\n    properties.$ai_expected\
    \ AS expected\nFROM events\nWHERE event = '$ai_evaluation'\n  AND properties.$ai_eval_source\
    \ = 'signals-grouping'\n  AND properties.$ai_evaluation_type = 'offline'\n  AND\
    \ properties.$ai_experiment_name = 'signals-grouping/grouping-aggregate'\nORDER\
    \ BY metric\n```\n\n### Match quality failure mode breakdown\n\n```sql\nSELECT\n\
    \    multiIf(\n        properties.$ai_score = 1.0, 'CORRECT',\n        properties.$ai_reasoning\
    \ LIKE '%UNDERGROUP%', 'UNDERGROUP',\n        properties.$ai_reasoning LIKE '%SPECIFICITY_SPLIT%',\
    \ 'SPECIFICITY_SPLIT',\n        properties.$ai_reasoning LIKE '%OVERGROUP%', 'OVERGROUP',\n\
    \        'UNKNOWN'\n    ) AS failure_mode,\n    count() AS cnt,\n    round(count()\
    \ * 100.0 / (SELECT count() FROM events WHERE event = '$ai_evaluation' AND properties.$ai_eval_source\
    \ = 'signals-grouping' AND properties.$ai_evaluation_type = 'offline' AND properties.$ai_experiment_name\
    \ = 'signals-grouping/match-quality'), 1) AS pct\nFROM events\nWHERE event = '$ai_evaluation'\n\
    \  AND properties.$ai_eval_source = 'signals-grouping'\n  AND properties.$ai_evaluation_type\
    \ = 'offline'\n  AND properties.$ai_experiment_name = 'signals-grouping/match-quality'\n\
    \  AND properties.$ai_metric_name = 'correct_match'\nGROUP BY failure_mode\nORDER\
    \ BY cnt DESC\n```\n\n### Pre-emit actionability by source type\n\n```sql\nSELECT\n\
    \    replaceOne(properties.$ai_experiment_name, 'signals-grouping/', '') AS check_name,\n\
    \    count() AS total,\n    countIf(properties.$ai_score = 1.0) AS correct,\n\
    \    countIf(properties.$ai_score != 1.0) AS failures,\n    round(countIf(properties.$ai_score\
    \ != 1.0) * 100.0 / count(), 1) AS failure_pct,\n    countIf(properties.$ai_score\
    \ != 1.0 AND properties.$ai_output = 'ACTIONABLE') AS false_positives,\n    countIf(properties.$ai_score\
    \ != 1.0 AND properties.$ai_output = 'NOT_ACTIONABLE') AS false_negatives\nFROM\
    \ events\nWHERE event = '$ai_evaluation'\n  AND properties.$ai_eval_source = 'signals-grouping'\n\
    \  AND properties.$ai_evaluation_type = 'offline'\n  AND properties.$ai_experiment_name\
    \ IN (\n      'signals-grouping/zendesk-actionability-check',\n      'signals-grouping/github-actionability-check',\n\
    \      'signals-grouping/linear-actionability-check'\n  )\n  AND properties.$ai_metric_name\
    \ = 'correct_classification'\nGROUP BY check_name\nORDER BY check_name\n```\n\n\
    ### Report-level judges (safety + actionability)\n\n```sql\nSELECT\n    replaceOne(properties.$ai_experiment_name,\
    \ 'signals-grouping/', '') AS judge,\n    count() AS total,\n    countIf(properties.$ai_score\
    \ = 1.0) AS correct,\n    round(countIf(properties.$ai_score = 1.0) * 100.0 /\
    \ count(), 1) AS accuracy_pct,\n    countIf(properties.$ai_score != 1.0 AND properties.$ai_output\
    \ IN ('SAFE', 'IMMEDIATELY_ACTIONABLE')) AS false_positives,\n    countIf(properties.$ai_score\
    \ != 1.0 AND properties.$ai_output NOT IN ('SAFE', 'IMMEDIATELY_ACTIONABLE'))\
    \ AS false_negatives\nFROM events\nWHERE event = '$ai_evaluation'\n  AND properties.$ai_eval_source\
    \ = 'signals-grouping'\n  AND properties.$ai_evaluation_type = 'offline'\n  AND\
    \ properties.$ai_experiment_name IN (\n      'signals-grouping/report-safety-check',\n\
    \      'signals-grouping/report-actionability-check'\n  )\n  AND properties.$ai_metric_name\
    \ = 'correct_classification'\nGROUP BY judge\nORDER BY judge\n```\n\n### Per-report\
    \ grouping quality\n\nPurity, is_pure, group_recall distributions.\n\n```sql\n\
    SELECT\n    properties.$ai_metric_name AS metric,\n    count() AS n,\n    round(avg(properties.$ai_score),\
    \ 3) AS mean_score,\n    round(min(properties.$ai_score), 3) AS min_score,\n \
    \   round(max(properties.$ai_score), 3) AS max_score,\n    countIf(properties.$ai_score\
    \ = 1.0) AS perfect_count\nFROM events\nWHERE event = '$ai_evaluation'\n  AND\
    \ properties.$ai_eval_source = 'signals-grouping'\n  AND properties.$ai_evaluation_type\
    \ = 'offline'\n  AND properties.$ai_experiment_name = 'signals-grouping/grouping-quality'\n\
    GROUP BY metric\nORDER BY metric\n```\n\n### Detailed match failures (for debugging)\n\
    \n```sql\nSELECT\n    properties.$ai_experiment_item_name AS item,\n    properties.$ai_reasoning\
    \ AS failure_mode,\n    properties.$ai_input AS signal_description,\n    properties.$ai_expected\
    \ AS expected,\n    JSONExtractString(properties.$ai_output, 'report') AS actual_decision\n\
    FROM events\nWHERE event = '$ai_evaluation'\n  AND properties.$ai_eval_source\
    \ = 'signals-grouping'\n  AND properties.$ai_evaluation_type = 'offline'\n  AND\
    \ properties.$ai_experiment_name = 'signals-grouping/match-quality'\n  AND properties.$ai_metric_name\
    \ = 'correct_match'\n  AND properties.$ai_score != 1.0\nORDER BY properties.$ai_reasoning,\
    \ item\n```\n"
  gold_removed: ''
