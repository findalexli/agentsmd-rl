  reference: "import { context, trace } from '@opentelemetry/api'\nimport { resourceFromAttributes\
    \ } from '@opentelemetry/resources'\nimport { ATTR_SERVICE_NAME, ATTR_SERVICE_VERSION\
    \ } from '@opentelemetry/semantic-conventions'\n  resource: resourceFromAttributes({\n\
    \    [ATTR_SERVICE_NAME]: 'test-tracing-service',\n    [ATTR_SERVICE_VERSION]:\
    \ '1.0.0',\n  spanProcessors: [new SimpleSpanProcessor(otlpTraceExporter)],\n\
    trace.setGlobalTracerProvider(provider)"
