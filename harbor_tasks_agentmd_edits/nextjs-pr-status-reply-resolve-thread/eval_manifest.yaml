distractors:
- rule: Start `pnpm --filter=next dev` in a separate terminal session before making
    edits to Next.js source or integration tests.
  collision_type: scope_ambiguity
  why_distracting: The rule requires starting `pnpm --filter=next dev` when changing
    Next.js source or integration tests. An agent might mistakenly classify `scripts/pr-status.js`
    as Next.js source and start the dev server, wasting time and resources for a standalone
    script that does not require the framework dev server.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 60-65
- rule: Use full `pnpm build-all` when changes span multiple packages.
  collision_type: scope_ambiguity
  why_distracting: The rule suggests using `pnpm build-all` when changes span multiple
    packages. An agent might interpret changes to `scripts/` and `.agents/` as spanning
    multiple packages and trigger a full build, which is entirely unnecessary for
    a standalone Node script and markdown documentation files.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 80-85
hierarchy_analysis: The `CLAUDE.md` and `AGENTS.md` files are identical symlinks providing
  general Next.js framework development guidelines. However, the task involves modifying
  a standalone maintenance script (`scripts/pr-status.js`) and agent skill documentation
  (`.agents/skills/pr-status-triage/`). The core framework build and dev server rules
  in `CLAUDE.md` do not apply to these files, creating scope ambiguity where an agent
  might unnecessarily invoke heavy build commands.
