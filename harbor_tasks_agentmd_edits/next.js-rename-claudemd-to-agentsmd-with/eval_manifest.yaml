version: "2.0"

source:
  repo: "vercel/next.js"
  pr: 88105
  base_commit: "c5b19eb7f5cf48dffa1b8bf87cd089f079fb031a"
  merge_commit: "8fd79ff42e8b1ac82db104fca7a38dfa9cfa902e"

checks:
  # Pass-to-pass checks (repo_tests) — verify repo CI still passes
  - id: test_repo_git_status_clean
    type: pass_to_pass
    origin: repo_tests
    description: "Repository should have clean git status (no uncommitted changes before fix)"

  - id: test_repo_claude_md_readable
    type: pass_to_pass
    origin: repo_tests
    description: "CLAUDE.md should be readable at base commit"

  - id: test_repo_alexignore_exists
    type: pass_to_pass
    origin: repo_tests
    description: ".alexignore should exist at base commit"

  - id: test_repo_files_no_symlink_loops
    type: pass_to_pass
    origin: repo_tests
    description: "No symlink loops should exist in repo"

  - id: test_repo_no_broken_links
    type: pass_to_pass
    origin: repo_tests
    description: "Repository should have no broken symlinks at base"

  # Fail-to-pass checks (pr_diff) — core behavioral tests
  - id: agents_md_exists
    type: fail_to_pass
    origin: pr_diff
    description: "AGENTS.md file should exist with the agent instructions content"

  - id: claude_md_is_symlink
    type: fail_to_pass
    origin: pr_diff
    description: "CLAUDE.md should be a symbolic link pointing to AGENTS.md"

  - id: alexignore_updated
    type: fail_to_pass
    origin: pr_diff
    description: ".alexignore should include both AGENTS.md and CLAUDE.md"

  - id: symlink_resolves_correctly
    type: fail_to_pass
    origin: pr_diff
    description: "The CLAUDE.md symlink should resolve and be readable via subprocess"

  - id: agents_md_has_content
    type: fail_to_pass
    origin: pr_diff
    description: "AGENTS.md should have substantial content from the original CLAUDE.md"

rubric: []
