hierarchy_analysis: The repository uses identical `CLAUDE.md` and `AGENTS.md` files
  at the root level. The rules are heavily focused on the core Next.js framework development
  (e.g., `packages/next/src/`, `pnpm build-all`, `pnpm --filter=next dev`). Since
  this PR only modifies a standalone maintenance script (`scripts/pr-status.js`) and
  agent skill documentation, many of the core framework build and dev server rules
  do not apply and could distract the agent.
