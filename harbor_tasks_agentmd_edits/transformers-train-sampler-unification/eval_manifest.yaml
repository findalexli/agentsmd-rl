version: "2.0"

source:
  repo: "huggingface/transformers"
  pr: 43138
  base_commit: "8efd81513f51cd343d086e0e8f69190caa49dbcf"
  merge_commit: "372c27e71f80e64571ac1149d1708e641d7d44da"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified Python files parse without errors"

  - id: training_args_default_strategy
    type: fail_to_pass
    origin: pr_diff
    description: "TrainingArguments.train_sampling_strategy defaults to 'random'"

  - id: training_args_sequential_strategy
    type: fail_to_pass
    origin: pr_diff
    description: "TrainingArguments accepts train_sampling_strategy='sequential'"

  - id: trainer_sequential_sampler
    type: fail_to_pass
    origin: pr_diff
    description: "Trainer._get_train_sampler returns SequentialSampler for strategy='sequential'"

  - id: asr_docs_use_new_strategy
    type: fail_to_pass
    origin: pr_diff
    description: "English ASR docs use train_sampling_strategy instead of group_by_length"

  - id: speech_readme_uses_new_strategy
    type: fail_to_pass
    origin: pr_diff
    description: "Speech recognition README uses --train_sampling_strategy flag"

  - id: ruff_style_check
    type: pass_to_pass
    origin: agent_config
    description: "Modified files pass ruff style checks per AGENTS.md"
    source:
      path: "AGENTS.md"
      lines: "8"
      commit: "8efd81513f51cd343d086e0e8f69190caa49dbcf"

rubric:
  - rule: "Prefer the smallest change that fixes the issue."
    source:
      path: "AGENTS.md"
      lines: "3"
      commit: "8efd81513f51cd343d086e0e8f69190caa49dbcf"
  - rule: "PRs should be as brief as possible."
    source:
      path: ".github/copilot-instructions.md"
      lines: "15"
      commit: "8efd81513f51cd343d086e0e8f69190caa49dbcf"
