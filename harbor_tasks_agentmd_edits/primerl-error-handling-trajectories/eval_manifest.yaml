    gold_added: '# math-python


      ## Setup


      CLone `verifiers`


      ```bash

      cd ~ && curl -sSL https://raw.githubusercontent.com/PrimeIntellect-ai/verifiers/main/scripts/install.sh
      | bash && cd -

      ```


      Install the environment as local packages


      ```bash

      uv pip install -e ~/verifiers/environments/math_python

      ```


      This will automatically install the environment, and a pinned verifiers commit
      (`71006c`) which includes necessary changes to the PythonEnv.


      ## Eval


      Get a quick vibe-check of the model


      ```bash

      vllm serve Qwen/Qwen3-4B-Instruct-2507 --enable-auto-tool-choice --tool-call-parser
      hermes --max-model-len 8192

      ```


      ```bash

      uv run --no-sync vf-eval math-python -n 16 -r 1 -c -1 -v -m Qwen/Qwen3-4B-Instruct-2507
      -b http://localhost:8000/v1 -a ''{"dataset_name": "PrimeIntellect/Hendrycks-Math",
      "dataset_subset": "default"}'' -t 512

      ```


      ## RL


      Again, make sure to have installed the environment as local packages from verifiers


      ```bash

      uv pip install -e ~/verifiers/environments/math_python

      ```


      Then, run RL in debug mode (small batch size, limited turns, 2 GPUs, etc.)


      ```bash

      uv run --no-sync rl @ configs/math_python/math_python.toml --log.level debug

      ```'
    gold_removed: ''
