- rule: Guidelines are clear and actionable for a developer updating Docker images
  source:
    path: CLAUDE.md
    lines: 136-144
    commit: aa69b9027d6e7128d6a634bc15960a945e5bf00d
- rule: apps/supervisor/Containerfile is valid with FROM instruction
  reference: '# CLAUDE.md

    ## Docker Image Guidelines


    When updating Docker image references in `docker/Dockerfile` or other container
    files:


    - **Always use multiplatform/index digests**, not architecture-specific digests

    - Architecture-specific digests (e.g., for `linux/amd64` only) will cause CI failures
    on different build environments

    - On Docker Hub, the multiplatform digest is shown on the main image page, while
    architecture-specific digests are listed under "OS/ARCH"

    - Example: Use `node:20.20-bullseye-'
- rule: CLAUDE.md must have a Docker image guidelines section
