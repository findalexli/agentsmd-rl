  reference: '### Running integration tests in Docker


    If tests fail on CI but pass locally (often due to OS differences), you can run
    tests in a Docker container that replicates the same environment as CI.


    **Prerequisites:** The project must be built first (same as running tests locally).


    ```text

    yarn test:integration-docker

    ```


    The script will automatically:


    1. Start the development server (if not already running)

    2. Run tests inside a Docker container

    3. Stop the server when tests complete


