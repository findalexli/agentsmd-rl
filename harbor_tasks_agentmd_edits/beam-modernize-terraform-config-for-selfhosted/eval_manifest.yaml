config_edits:
- path: .github/gh-actions-self-hosted-runners/arc/README.md
  tier: 2
  gold_added: '# Updating

    If you need to update the configuration (e.g. upgrading the github runner image,
    changing resource settings, etc), follow the steps below:


    1. From this directory, login to your gcloud account that you created the bucket
    with and init terraform. Replace bucket_name with the bucket for storing terraform
    state, e.g. `beam-arc-state`.

    ```

    gcloud auth login

    gcloud auth application-default login

    terraform init -backend-config="bucket=bucket_name"

    ```


    2. Terraform plan. Replace environment_name.env with the file under environments,
    e.g. `beam.env`. Fix config problems if any.

    ```

    terraform plan -var-file=environments/environment_name.env

    ```


    3. Terraform apply. Replace environment_name.env with the file under environments,
    e.g. `beam.env`.

    ```

    terraform apply -var-file=environments/environment_name.env

    ```'
  gold_removed: ''
