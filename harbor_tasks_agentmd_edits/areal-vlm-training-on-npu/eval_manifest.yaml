config_edits:
- path: examples/vlm_npu/README.md
  tier: 2
  gold_added: "# Training VLMs with GRPO on NPU:\nIn this instruction, we will introduce\
    \ how to train VLMs with GRPO on NPU.\n\n### Hardware\n\nThe following hardware\
    \ configuration has been extensively tested:\n\n- **NPU**: 16x NPU per node\n\
    - **CPU**: 64 cores per node\n- **Memory**: 1TB per node\n- **Network**: RoCE\
    \ 3.2 Tbps\n- **Storage**:\n  - 1TB local storage for single-node experiments\n\
    \  - 10TB shared storage (NAS) for distributed experiments\n\n### Key Contributions\n\
    -\tTrained Qwen2.5VL-3B-instruct model upto 70 epochs with (4 cards+ 4 cards)\
    \ train-infer configuration. Took around 19hr to finish full training.\n- Trained\
    \ model is tested with more than one benchmark using VLMEvalKit.\n\n\n### System\
    \ configuration:\n-\tVllm==0.11.0 ; vllm-ascend==0.11.0rc0 ;\n-\tTorch==0.7.1+cpu\
    \ ; torch_npu==2.7.1.dev20250724\n-\tAreal==0.4.1\n-\tCANN==8.1RC1 ; 910c npus\
    \ (65 gigs X 16)\n\n### Results:\nWe trained Qwen2.5-VL-3B for 70 epochs on Geometry3K\
    \ and evaluated the checkpoints using VLMEvalKit on out of distribution tasks\
    \ such as MathVision, MathVista, and LogicVista. The training was performed on\
    \ both NPU and GPU and results are as follows:\n\n| Method     | LogicVista |\
    \ MathVision_mini | MathVista_mini | Avg.  |\n|------------|------------|------------------|----------------|-------|\n\
    | Base Model | 31.0       | 18.3             | 52.3           | 33.8     |\n|\
    \ GRPO-GPU   | 35.4       | 20.9             | 55.9           | **37.4** |\n|\
    \ GRPO-NPU   | 35.3       | 20.5             | 54.7           | **36.8** |"
  gold_removed: ''
distractors:
- rule: Docs source lives under `docs/` (Jupyter Book). Coordinate doc edits with
    the docs build pipeline.
  collision_type: scope_ambiguity
  why_distracting: The prompt explicitly requests a README documenting hardware requirements
    and results under the new `examples/vlm_npu/` directory. If the agent strictly
    follows the rule that all docs live under `docs/`, it might place the README in
    the wrong location or attempt to integrate it into the Jupyter Book build pipeline
    unnecessarily.
  severity: high
  source:
    path: AGENTS.md
    lines: 29-30
- rule: Before editing code, outline the proposed plan and confirm it with the user.
  collision_type: meta_confusion
  why_distracting: In an automated evaluation setting, the agent must generate the
    complete solution in one go. If it stops to outline a plan and wait for user confirmation,
    it will fail to produce the required files and timeout.
  severity: high
  source:
    path: AGENTS.md
    lines: 33-34
hierarchy_analysis: 'The configuration is flat, relying entirely on `AGENTS.md`. The
  primary challenge is scope resolution: the agent must recognize that example-specific
  documentation (a README in `examples/vlm_npu/`) is an exception to the global rule
  that documentation belongs in `docs/`.'
