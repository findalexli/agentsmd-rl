distractors:
- rule: pnpm build or pnpm build:core - Build core packages
  source:
    path: CLAUDE.md
    lines: 40-43
  collision_type: meta_confusion
  why_distracting: The agent might read the existing CLAUDE.md and assume the commands
    listed (like `pnpm build` or `pnpm dev`) are correct and leave them as is. However,
    the task explicitly states they are inconsistent with permission rules and must
    be updated to use the `pnpm run` prefix.
  severity: high
- rule: Linting & Formatting - pnpm lint - Run linter acro...
  source:
    path: CLAUDE.md
    lines: 84-85
  collision_type: scope_ambiguity
  why_distracting: The agent might try to use the global `pnpm lint` command inside
    the `.claude/hooks/post-edit.sh` script. This would be too slow and broad for
    a post-edit hook, which should instead use targeted commands like `npx prettier`
    or `npx eslint` on the specific file passed via stdin.
  severity: medium
hierarchy_analysis: This task is unique because the agent must both read `CLAUDE.md`
  to understand the project structure and simultaneously recognize that `CLAUDE.md`
  contains flawed instructions that need to be corrected. The agent must apply the
  instructions from the prompt to override the existing conventions in the root config
  file.
