version: "2.0"

source:
  repo: "payloadcms/payload"
  pr: 14445
  base_commit: "80d7781b4f2fc2e874323532a0a8a8da65c8fc22"
  merge_commit: "aa14d867a57fc1c9827b55f69046bb05ef3815d9"

checks:
  # Gates (pass_to_pass)
  - id: post_edit_hook_syntax
    type: pass_to_pass
    origin: static
    description: "post-edit.sh must be valid bash"

  - id: settings_json_valid
    type: pass_to_pass
    origin: static
    description: "settings.json must be valid JSON"

  # Hook behavior tests (fail_to_pass)
  - id: post_edit_hook_extracts_filepath
    type: fail_to_pass
    origin: pr_diff
    description: "Hook reads file_path from JSON stdin and processes matching files"

  - id: post_edit_hook_handles_null_input
    type: fail_to_pass
    origin: pr_diff
    description: "Hook exits 0 gracefully when file_path is null or missing"

  - id: post_edit_hook_case_matching
    type: fail_to_pass
    origin: pr_diff
    description: "Hook has case/esac matching for TS, MD, JSON, package.json with prettier/eslint"

  # Settings config tests (fail_to_pass)
  - id: settings_json_hooks_configured
    type: fail_to_pass
    origin: pr_diff
    description: "settings.json configures PostToolUse hooks for Edit|Write"

  - id: settings_json_permissions
    type: fail_to_pass
    origin: pr_diff
    description: "settings.json has permissions allowlist with pnpm run and git commands"

  # CLAUDE.md documentation update tests (fail_to_pass)
  - id: claude_md_documents_kv_redis
    type: fail_to_pass
    origin: pr_diff
    description: "CLAUDE.md lists kv-redis in key directories"

  - id: claude_md_documents_r2_storage
    type: fail_to_pass
    origin: pr_diff
    description: "CLAUDE.md lists R2 in storage adapters"

  - id: claude_md_has_quick_start
    type: fail_to_pass
    origin: pr_diff
    description: "CLAUDE.md has a Quick Start section with pnpm commands"

  - id: claude_md_pnpm_run_prefix
    type: fail_to_pass
    origin: pr_diff
    description: "Build/dev/test/lint commands use pnpm run prefix"

  - id: claude_md_pnpm_turbo_note
    type: fail_to_pass
    origin: pr_diff
    description: "CLAUDE.md warns turbo should be run via pnpm, not directly"

rubric:
  - rule: "The post-edit hook should handle file type detection idiomatically (case/esac or equivalent), not with long if/elif chains"
    source:
      path: "CLAUDE.md"
      lines: "1-5"
      commit: "80d7781b4f2fc2e874323532a0a8a8da65c8fc22"
  - rule: "Documentation updates in CLAUDE.md should be consistent with the existing formatting style"
    source:
      path: "CLAUDE.md"
      lines: "1-10"
      commit: "80d7781b4f2fc2e874323532a0a8a8da65c8fc22"
