config_edits:
- path: CLAUDE.md
  tier: 1
  gold_added: "- \u0060packages/kv-redis\u0060 - Redis key-value store adapter\n  - \u0060packages/storage-*\u0060\
    \ - Storage adapters (S3, Azure, GCS, Uploadthing, Vercel Blob, R2)\n## Quick\
    \ Start\n\n1. \u0060pnpm install\u0060\n2. \u0060pnpm run build:core\u0060\n3. \
    \ \u0060pnpm run dev\u0060 (MongoDB) or \u0060pnpm run dev:postgres\u0060\n\n- \
    \ \u0060pnpm install\u0060 - Install all dependencies\n- \u0060pnpm turbo\u0060\
    \ - All Turbo commands should be run from root with pnpm - not with\u0060turbo\u0060\
    \ directly\n- \u0060pnpm run build\u0060 or \u0060pnpm run build:core\u0060 - Build core packages\
    \ (excludes plugins and storage adapters)\n- \u0060pnpm run build:all\u0060 - Build all\
    \ packages\n- \u0060pnpm run build:<directory_name>\u0060 - Build specific package (e.g.\
    \ \u0060pnpm run build:db-mongodb\u0060, \u0060pnpm run build:ui\u0060)\n- \u0060pnpm\
    \ run dev\u0060 - Start dev server with default config (\u0060test/_community/config.ts\u0060)\n\
    - \u0060pnpm run dev <directory_name>\u0060 - Start dev server with specific test config\
    \ (e.g. \u0060pnpm run dev fields\u0060 loads \u0060test/fields/config.ts\u0060)\n- \u0060pnpm\
    \ run dev:postgres\u0060 - Run dev server with Postgres\n- \u0060pnpm run dev:memorydb\u0060\
    \ - Run dev server with in-memory MongoDB\n- \u0060pnpm run test\u0060 - Run all tests\
    \ (integration + components + e2e)\n- \u0060pnpm run test:int\u0060 - Integration tests\
    \ (MongoDB, recommended)\n- \u0060pnpm run test:int <dir>\u0060 - Specific test suite\
    \ (e.g. \u0060fields\u0060)\n- \u0060pnpm run test:int:postgres|sqlite\u0060 - Integration\
    \ tests with other databases\n- \u0060pnpm run test:e2e\u0060 - Playwright tests (add\
    \ \u0060:headed\u0060 or \u0060:debug\u0060 suffix)\n- \u0060pnpm run test:unit|components|types\u0060\
    \ - Other test suites\nGenerate types for a test directory: \u0060pnpm run dev:generate-types\
    \ <directory_name>\u0060\n- \u0060pnpm run lint\u0060 - Run linter across all packages\n- \
    \ \u0060pnpm run lint:fix\u0060 - Fix linting issues\n- Run \u0060pnpm run translateNewKeys\u0060\
    \ to auto-translate new keys (requires \u0060OPENAI_KEY\u0060 in \u0060.env\u0060)\n- Lexical\
    \ translations: \u0060cd packages/richtext-lexical && pnpm run translateNewKeys\u0060"
  gold_removed: '- \u0060packages/storage-*\u0060 - Storage adapters (S3, Azure, GCS, Uploadthing,
    Vercel Blob)

    - \u0060pnpm install\u0060 - Install all dependencies (pnpm required - run \u0060corepack
    enable\u0060 first)

    - \u0060pnpm build\u0060 or \u0060pnpm build:core\u0060 - Build core packages (excludes
    plugins and storage adapters)

    - \u0060pnpm build:all\u0060 - Build all packages

    - \u0060pnpm build:<directory_name>\u0060 - Build specific package (e.g. \u0060pnpm
    build:db-mongodb\u0060, \u0060pnpm build:ui\u0060)

    - \u0060pnpm dev\u0060 - Start dev server with default config (\u0060test/_community/config.ts\u0060)

    - \u0060pnpm dev <directory_name>\u0060 - Start dev server with specific test config
    (e.g. \u0060pnpm dev fields\u0060 loads \u0060test/fields/config.ts\u0060)

    - \u0060pnpm dev:postgres\u0060 - Run dev server with Postgres

    - \u0060pnpm dev:memorydb\u0060 - Run dev server with in-memory MongoDB

    ### Running
    Tests


    - \u0060pnpm test\u0060 - Run all tests (integration + components + e2e)

    - \u0060pnpm test:int\u0060 - Run integration tests (MongoDB, recommended for verifying
    local changes)

    - \u0060pnpm test:int <directory_name>\u0060 - Run specific integration test suite (e.g.
    \u0060pnpm test:int fields\u0060)

    - \u0060pnpm test:int:postgres\u0060 - Run integration tests with Postgres

    - \u0060pnpm test:int:sqlite\u0060 - Run integration tests with SQLite

    - \u0060pnpm test:unit\u0060 - Run unit tests

    - \u0060pnpm test:e2e\u0060 - Run end-to-end tests (Playwright)

    - \u0060pnpm test:e2e:headed\u0060 - Run e2e tests in headed mode

    - \u0060pnpm test:e2e:debug\u0060 - Run e2e tests in debug mode

    - \u0060pnpm test:components\u0060 - Run component tests (Jest)

    - \u0060pnpm test:types\u0060 - Run type tests (tstyche)'
