distractors:
- rule: Define new APIs in docs/src/api/class-xxx.md
  source:
    path: .claude/skills/playwright-dev/api.md
    lines: 5-7
  source_text: '## Step 1: Define API in Documentation


    Define (or update) API in `docs/src/api/class-xxx.md`. For the new methods, params
    and options use the version from package.json (without `-next`).'
  collision_type: architecture_boundary
  why_distracting: The diff implements a CLI command and an MCP tool, not a core Playwright
    class method. Following this rule would incorrectly prompt the agent to document
    this feature as a new class method in the main API documentation.
  severity: medium
- rule: Use defineTabTool for most tools that need a Tab
  source:
    path: .claude/skills/playwright-dev/tools.md
    lines: 16-18
  source_text: '**Choose `defineTabTool` vs `defineTool`:**

    - `defineTabTool` — most tools use this. Receives a `Tab` object, auto-handles
    modal state (dialogs/file choosers).

    - `defineTool` — receives the full `Context`. Use when you need `context.ensureBrowserContext()`
    without a specific tab, or need custom tab management.'
  collision_type: rule_conflict
  why_distracting: Although the tool retrieves a Tab via `context.currentTabOrDie()`,
    it correctly ignores `defineTabTool` to remain consistent with sibling video tools
    (`videoStart`, `videoStop`) which use `defineTool`. Switching to `defineTabTool`
    might cause bugs or break established patterns for video/devtools commands.
  severity: medium
- rule: Update skill files in packages/playwright/src/skill/
  source:
    path: .claude/skills/playwright-dev/tools.md
    lines: 277-279
  source_text: 'Update `packages/playwright/src/skill/SKILL.md` with the new command
    documentation.

    Add reference docs in `packages/playwright/src/skill/references/` if the feature
    is complex.'
  collision_type: scope_ambiguity
  why_distracting: The documentation specifies incorrect file paths. The actual skill
    files are located in `packages/playwright-core/src/tools/cli-client/skill/`. Trying
    to update the path mentioned in the guide would create a new file in a non-existent
    directory.
  severity: high
