    description: "SetUpNuGetPackages has real file I/O operations, not a stub"

  # --- Code behavior (fail_to_pass) ---
  - id: base_build_test_creates_directory_build_props
    type: fail_to_pass
    origin: pr_diff
    description: "BaseBuildTest.cs creates Directory.Build.props to prevent MSBuild inheritance"

  - id: base_build_test_creates_directory_build_targets
    type: fail_to_pass
    origin: pr_diff
    description: "BaseBuildTest.cs creates Directory.Build.targets to prevent target inheritance"

  - id: directory_build_xml_is_valid
    type: fail_to_pass
    origin: pr_diff
    description: "XML content written by BaseBuildTest.cs parses as valid XML"

  # --- Config/documentation updates (fail_to_pass) ---
  - id: copilot_instructions_lists_integration_skill
    type: fail_to_pass
    origin: pr_diff
    description: "copilot-instructions.md lists the run-integration-tests skill with categories"

  - id: integration_instructions_references_skill
    type: fail_to_pass
    origin: pr_diff
    description: "integration-tests.instructions.md references the run-integration-tests skill"

  - id: skill_md_exists_with_content
    type: fail_to_pass
    origin: pr_diff
    description: "run-integration-tests SKILL.md exists with frontmatter and all test categories"

  - id: run_script_exists_with_parameters
    type: fail_to_pass
    origin: pr_diff
