- path: packages/data-table/README.md
  tier: 2
  gold_added: "- [**Query Builder**](#query-builder) for expressive joins, aggregates,\
    \ eager loading, and scoped writes\n- [**CRUD Helpers**](#crud-helpers) for common\
    \ create/read/update/delete flows (`find`, `create`, `update`, `delete`)\nBoth\
    \ APIs are type-safe and validate values using your [remix/data-schema](https://github.com/remix-run/remix/tree/main/packages/data-schema)\
    \ definitions.\n## Query Builder\nUse `db.query(table)` when you need joins, custom\
    \ shape selection, eager loading, or aggregate logic.\n## CRUD Helpers\n`data-table`\
    \ provides helpers for common create/read/update/delete operations. Use these\
    \ helpers for common operations without building a full query chain.\n### Read\
    \ operations\n- `createMany` -> `WriteResult` by default, rows when `returnRows:\
    \ true` (not supported in MySQL because it doesn't support `RETURNING`)\n### Data\
    \ Validation\n\nFor write operations, data validation happens before SQL is executed\
    \ so invalid data does not get written to the database.\n\n`data-table` treats\
    \ each column schema as both:\n\n- a runtime validator (is this input valid?)\n\
    - a parser (what normalized value should be written?)\n\nIf you're familiar with\
    \ Zod, this is the same idea: schema-first validation where values are checked\
    \ and parsed before use. In `data-table`, that parsing runs automatically on writes\
    \ (`create`, `createMany`, `update`, `upsert`) so only schema-valid values are\
    \ sent to the database. Invalid values and unknown columns fail fast before a\
    \ write is attempted.\n\nTables are also [Standard Schema](https://standardschema.dev/)-compatible,\
    \ so you can run the same validation explicitly with `remix/data-schema` before\
    \ writing:\n\n```ts\nimport { parseSafe } from 'remix/data-schema'\n\nlet result\
    \ = parseSafe(users, {\n  id: 'u_004',\n  email: 'new@example.com',\n  role: 'customer',\n\
    })\n\nif (!result.success) {\n  // Handle validation issues\n}\n```\n\nValidation\
    \ semantics match `create()`/`update()` input behavior:\n\n- Partial objects are\
    \ allowed\n- Unknown columns fail validation\n- Provided column values are parsed\
    \ through each column schema"
  gold_removed: '- **Query Builder API** for expressive joins, aggregates, eager loading,
    and scoped writes

    - **Database Helper API** for common CRUD flows (`find`, `create`, `update`, `delete`)

    Both APIs are type-safe and validate values using your `remix/data-schema` definitions.

    ## Query Builder API

    Use `db.query(Table)` when you need joins, custom shape selection, eager loading,
    or aggregate logic.

    ## Database Helper API (High-Level CRUD)

    Use these helpers for common operations without building a full query chain.

    ### Read helpers

    - `createMany` -> `WriteResult` by default, rows when `returnRows: true` (RETURNING
    adapters only)'
