  tier: 2
  gold_added: "# Updating WebKit Safari Version\n\nThe Safari version string used\
    \ in the WebKit user-agent is declared in one place:\n\n**[packages/playwright-core/src/server/webkit/wkBrowser.ts](../../../packages/playwright-core/src/server/webkit/wkBrowser.ts)**\
    \ \u2014 `BROWSER_VERSION` constant (line ~35).\n\n```ts\nconst BROWSER_VERSION\
    \ = '26.4';\nconst DEFAULT_USER_AGENT = `Mozilla/5.0 ... Version/${BROWSER_VERSION}\
    \ Safari/605.1.15`;\n```\n\n## Steps to update\n\n1. **Find the latest stable\
    \ Safari version** \u2014 search `site:developer.apple.com \"Safari X.Y Release\
    \ Notes\"` or check the [Safari Release Notes](https://developer.apple.com/documentation/safari-release-notes)\
    \ index. The highest numbered entry that is not a Technology Preview is the current\
    \ stable release.\n\n2. **Update `BROWSER_VERSION`** in `wkBrowser.ts`.\n\n3.\
    \ **Run lint** to update any generated files that embed the version:\n\n   \
    ```bash\n   npm run flint\n   ```"
  gold_removed: ''
