config_edits:
- path: .claude/skills/playwright-dev/webkit-safari-version.md
  tier: 2
  gold_added: "# Updating WebKit Safari Version\n\nThe Safari version string used\
    \ in the WebKit user-agent is declared in one place:\n\n**[packages/playwright-core/src/server/webkit/wkBrowser.ts](../../../packages/playwright-core/src/server/webkit/wkBrowser.ts)**\
    \ — `BROWSER_VERSION` constant (line ~35).\n\n```ts\nconst BROWSER_VERSION = '26.4';\n\
    const DEFAULT_USER_AGENT = `Mozilla/5.0 ... Version/${BROWSER_VERSION} Safari/605.1.15`;\n\
    ```\n\n## Steps to update\n\n1. **Find the latest stable Safari version** — search\
    \ `site:developer.apple.com \"Safari X.Y Release Notes\"` or check the [Safari\
    \ Release Notes](https://developer.apple.com/documentation/safari-release-notes)\
    \ index. The highest numbered entry that is not a Technology Preview is the current\
    \ stable release.\n\n2. **Update `BROWSER_VERSION`** in `wkBrowser.ts`.\n\n3.\
    \ **Run lint** to update any generated files that embed the version:\n\n   ```bash\n\
    \   npm run flint\n   ```"
  gold_removed: ''
- path: README.md
  tier: 2
  gold_added: '>26.4<'
  gold_removed: ''
distractors:
- rule: Assume watch is running and code is up to date. Generated files (types, channels,
    validators) are produced by watch automatically.
  collision_type: scope_ambiguity
  why_distracting: The rule states that generated files are produced by watch automatically.
    An agent might incorrectly assume that `deviceDescriptorsSource.json` or `browsers.json`
    are generated automatically by the watch process and skip updating them manually,
    or it might omit the `npm run flint` step from the skill doc assuming watch handles
    everything.
  severity: high
  source:
    path: CLAUDE.md
    lines: 41-43
- rule: '`docs/src/` | API documentation — source of truth for public TypeScript types'
  collision_type: meta_confusion
  why_distracting: The rule states that `docs/src/` is the source of truth for public
    TypeScript types. An agent might get confused and try to update TypeScript types
    or constants in `docs/src/` instead of treating `wkBrowser.ts` as the source of
    truth for the browser version as instructed by the prompt.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 30-31
hierarchy_analysis: The repository uses a single `CLAUDE.md` file at the root level.
  The primary challenge is distinguishing between manual source-of-truth updates (like
  `wkBrowser.ts` and `deviceDescriptorsSource.json`) and generated files, especially
  since the config mentions that watch mode automatically produces generated files.
  The agent must correctly synthesize the prompt's explicit instructions about the
  source of truth with the config's tooling commands (`npm run flint`).
