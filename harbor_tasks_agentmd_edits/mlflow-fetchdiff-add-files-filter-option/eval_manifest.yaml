    code of the `fetch-diff` skill itself.
  severity: medium
hierarchy_analysis: Only the root CLAUDE.md applies to this task. The rules in CLAUDE.md
  are primarily focused on the main MLflow repository (e.g., tracking store, Databricks
  backend), while this task modifies a local Claude skill script in the `.claude/skills`
  directory. The agent must apply general Python best practices (like top-level imports)
  from the config while recognizing that MLflow-specific architecture rules do not
  apply to the `.claude` directory.
