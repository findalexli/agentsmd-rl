- path: scripts/build/CLAUDE.md
  tier: 1
  gold_added: 'build obj/src/foo.c.o: cc ../../src/foo.c | deps/zstd/libzstd.a ||
    codegen/generated.h

    - **implicit inputs** (`| foo`) — tracked for rebuild but not in `$in`. Use for
    the PCH, dep lib outputs (invalidation signal for their headers), or a per-file
    generated header this source is known to read

    - **order-only inputs** (`|| stamp`) — must exist before this edge runs, but mtime
    doesn''t trigger rebuild. Use for bulk codegen headers: "must be generated first,
    but the compiler''s `.d` depfile will track which ones I actually read"

    **`depfile`** — compiler writes `foo.o.d` listing every `#include`d header. Ninja
    reads it on the next build to know which headers this `.o` depends on. Codegen
    headers are order-only for this reason: they''re declared outputs with restat,
    the depfile gives exact per-file header deps on build 2+, and order-only just
    ensures they exist for build 1. Dep outputs (`lib*.a`) are a different story —
    PCH, cc, and no-PCH cxx use them as _implicit_ deps, because local sub-builds
    (e.g. WebKit) rewrite forwarding headers as undeclared side effects and order-only
    would lag one build behind (see Gotchas).

    **PCH, cc, and no-PCH cxx need implicit dep on `depOutputs`**, not order-only.
    Local WebKit''s sub-build rewrites forwarding headers as an undeclared side effect
    (only `lib*.a` are declared outputs). Depfiles record those headers, but ninja
    stats them before the sub-build runs — order-only lags one build. The lib itself
    is the invalidation signal. Codegen headers stay order-only: they''re declared
    outputs with restat, so depfile tracking is exact.'
