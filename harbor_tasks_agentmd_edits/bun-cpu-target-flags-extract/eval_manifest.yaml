distractors:
- rule: Write tests using Bun's Jest-compatible test runner with proper test fixtures
    (e.g., `Bun.spawn` for multi-file tests).
  collision_type: scope_ambiguity
  why_distracting: The agent might attempt to write a JavaScript test using `Bun.spawn`
    to verify the build flags. However, testing local WebKit compilation flags requires
    a full WebKit build, which is extremely heavy and entirely out of scope for the
    standard JS test suite.
  severity: high
  source:
    path: CLAUDE.md
    lines: 50-70
- rule: Vendored deps keep their native cmake/cargo... Flags forwarded via `-DCMAKE_C_FLAGS`.
  collision_type: rule_conflict
  why_distracting: The agent might try to manually append the CPU target flags directly
    to a hardcoded `-DCMAKE_C_FLAGS` string in the nested cmake arguments. However,
    the correct approach for this specific dependency is to seed the `optFlags` array,
    which the script later uses to construct the cmake flags safely without conflicting
    with WebKit's own cmake machinery.
  severity: medium
  source:
    path: scripts/build/CLAUDE.md
    lines: 38-41
hierarchy_analysis: The root `CLAUDE.md` provides general testing guidelines, while
  `scripts/build/CLAUDE.md` provides specific architectural rules for the build system.
  The build system rules take precedence here, and the general testing rules should
  be ignored because build system configuration changes (especially for heavy dependencies
  like WebKit) are not tested via the standard JS test runner.
