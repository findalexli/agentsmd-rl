distractors:
- rule: When defining functions in object literals, use shorthand method syntax instead
    of arrow functions.
  collision_type: scope_ambiguity
  why_distracting: The existing test code uses an arrow function for the `[hostType]`
    callback in an object literal. An agent might try to refactor this to shorthand
    method syntax `[hostType]() { ... }` to comply with the style guide, but this
    is out of scope for the specific API refactoring requested.
  severity: medium
  source:
    path: AGENTS.md
    lines: '18'
- rule: Only use arrow functions as callbacks where preserving lexical `this` is beneficial
    or the syntax is more concise.
  collision_type: scope_ambiguity
  why_distracting: The original code used an arrow function in tests to preserve lexical
    `this` from the outer setup function. Now that `handle` is passed as a parameter,
    lexical `this` is no longer needed. An agent might strictly follow this rule and
    convert the arrow function to a regular function since the 'preserving lexical
    this' justification no longer applies, leading to unnecessary churn.
  severity: medium
  source:
    path: AGENTS.md
    lines: '17'
hierarchy_analysis: Only a single root-level config file (`AGENTS.md`) is present,
  so there are no hierarchical conflicts. The primary tension lies in applying the
