version: "2.0"

source:
  repo: "oven-sh/bun"
  pr: 23566
  base_commit: "dc36d5601c2c3e7aa191baed6db231d6a7ca5e04"
  merge_commit: "bad726f9433156abe68203800332228a943b78c5"

checks:
  # Gate — syntax
  - id: zig_syntax_balanced
    type: pass_to_pass
    origin: static
    description: "Modified Zig files have balanced braces and parentheses"

  # Gate — agent config compliance
  - id: import_bun_not_root_bun
    type: pass_to_pass
    origin: agent_config
    description: "Modified Zig files use @import(\"bun\"), not @import(\"root\").bun"
    source:
      path: "src/CLAUDE.md"
      lines: "11"
      commit: "dc36d5601c2c3e7aa191baed6db231d6a7ca5e04"

  # Repo CI compliance — no banned patterns in modified files
  - id: test_no_std_debug_assert
    type: pass_to_pass
    origin: repo_tests
    description: "Modified Zig files do not use std.debug.assert (bun.assert preferred)"

  # Code behavior — Watcher.zig lazy file watching
  - id: watcher_add_file_by_path_slow
    type: fail_to_pass
    origin: pr_diff
    description: "Watcher.zig has addFileByPathSlow with O_EVTONLY and addFile integration"

  # Code behavior — hot reloader entrypoint tracking
  - id: hot_reloader_entrypoint_rename_defer
    type: fail_to_pass
    origin: pr_diff
    description: "hot_reloader.zig tracks entrypoint with MainFile and defers reload on rename"

  # Code behavior — VM watcher integration
  - id: vm_report_exception_and_watcher
    type: fail_to_pass
    origin: pr_diff
    description: "VirtualMachine.zig has renamed exception handler and addMainToWatcherIfNeeded"

  # Code behavior — findExtname algorithm
  - id: find_extname_implementation
    type: fail_to_pass
    origin: pr_diff
    description: "fs.zig has findExtname that finds extension after last path separator"

  # Config update — src/CLAUDE.md import conventions
  - id: src_claude_md_import_conventions
    type: fail_to_pass
    origin: pr_diff
    description: "src/CLAUDE.md updated with auto formatter note and @import(\"../bun.zig\") exclusion"

rubric:
  - rule: "Code changes follow existing Zig style patterns in neighboring files"
    source:
      path: "src/CLAUDE.md"
      lines: "8-12"
      commit: "dc36d5601c2c3e7aa191baed6db231d6a7ca5e04"
