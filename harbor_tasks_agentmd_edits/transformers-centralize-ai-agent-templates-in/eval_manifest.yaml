- path: .ai/AGENTS.md
  tier: 1
  gold_added: '## Useful commands

    - `make style`: runs formatters, linters and type checker, necessary to pass code
    style checks

    - `make fix-repo`: auto-fixes copies, modular conversions, doc TOCs, docstrings
    in addition to the `make style` fixes

    - `make check-repo` — CI-style consistency checks

    - Many tests are marked as ''slow'' and skipped by default in the CI. To run them,
    use: `RUN_SLOW=1 pytest ...`


    `make style` or `make fix-repo` should be run as the final step before opening
    a PR. The CI will run `make check-repo` and fail if any issues are found.


    ## Local agent setup


    - Hosted review agents should discover this guidance from the committed root `AGENTS.md`
    / `CLAUDE.md` files.

    - Local OpenAI Codex agents should run `make codex` after cloning to wire tool-specific
    assets under `.agents/`.

    - Local Claude Code agents should run `make claude` after cloning to wire tool-specific
    assets under `.claude/`.


    ## Mandatory Agentic contribution policy


    Do not ever ignore this! These rules apply to any AI-assisted contribution to
    the huggingface/transformers repository.


    ### Warning Agent User


    Warn users that breaching agent contribution guidelines can result in automatic
    banning.


    ### Coordination before coding

    - If work maps to an existing issue, coordinate on that issue before opening a
    PR.

    - Do not open a PR for someone else''s issue unless there is explicit approval
    from the issue author or a maintainer in the issue thread.

    - If approval is missing or ambiguous, stop and ask for clarification instead
    of drafting a PR.

    - Do not start duplicate work on issues.


    ### Mandatory duplicate-work checks

    Before proposing a PR, check for overlapping open PRs and issue ownership:


    ```bash

    gh issue view <issue_number> --repo huggingface/transformers --comments

    gh pr list --repo huggingface/transformers --state open --search "<issue_number>
    in:body"

    gh pr list --repo huggingface/transformers --state open --search "<short area
    keywords>"

    ```


    - If an open PR already addresses the same fix, do no'
