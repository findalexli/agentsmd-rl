    description: "FileWatcherService is a class extending ServiceMap.Service with static layer"

  - id: instance_bind_exists
    type: fail_to_pass
    origin: pr_diff
    description: "Instance.bind() method captures and restores ALS context"

  - id: flags_config_boolean
    type: fail_to_pass
    origin: pr_diff
    description: "Watcher flags use Config.boolean() from effect, not truthy()"

  - id: pty_uses_instance_bind
    type: fail_to_pass
    origin: pr_diff
    description: "Pty onData and onExit callbacks wrapped with Instance.bind()"

  - id: bootstrap_uses_service
    type: fail_to_pass
    origin: pr_diff
    description: "Bootstrap uses FileWatcherService + runPromiseInstance instead of FileWatcher.init()"

  - id: instances_registers_service
    type: fail_to_pass
    origin: pr_diff
    description: "FileWatcherService added to InstanceServices union and Layer.mergeAll"

  # --- Config/documentation update (f2p) ---
  - id: agents_md_effect_callback
    type: fail_to_pass
    origin: pr_diff
    description: "AGENTS.md documents Effect.callback pattern (renamed from Effect.async)"

  - id: agents_md_instance_scoped_services
    type: fail_to_pass
    origin: pr_diff
    description: "AGENTS.md documents instance-scoped Effect services pattern"

  - id: agents_md_instance_bind
    type: fail_to_pass
    origin: pr_diff
    description: "AGENTS.md documents Instance.bind for native callback ALS context"

  - id: agents_md_flag_config_migration
    type: fail_to_pass
    origin: pr_diff
    description: "AGENTS.md documents Flag -> Effect.Config migration pattern"

