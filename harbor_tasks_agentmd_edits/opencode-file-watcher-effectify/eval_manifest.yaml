      path: "packages/opencode/AGENTS.md"
      lines: "23"
      commit: "d4694d058cc590b0f05261a04460034d2fa8541d"

  - id: layer_uses_effect_gen
    type: pass_to_pass
    origin: agent_config
    description: "Layer uses Effect.gen(function* ...) for composition"
    source:
      path: "packages/opencode/AGENTS.md"
      lines: "34"
      commit: "d4694d058cc590b0f05261a04460034d2fa8541d"

  # --- Anti-stub (p2p) ---
  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "watcher.ts retains substantial logic, not gutted"

