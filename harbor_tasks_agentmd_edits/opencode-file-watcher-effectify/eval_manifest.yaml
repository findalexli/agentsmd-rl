  - id: layer_uses_service_of
    type: fail_to_pass
    origin: agent_config
    description: "Layer returns FileWatcherService.of({...}) per AGENTS.md rule"
    source:
      path: "packages/opencode/AGENTS.md"
      lines: "24"
      commit: "d4694d058cc590b0f05261a04460034d2fa8541d"

  # --- Regression / public API (p2p) ---
  - id: file_watcher_event_preserved
    type: pass_to_pass
    origin: pr_diff
    description: "FileWatcher.Event namespace still exported"

