- path: packages/opencode/AGENTS.md
  tier: 1
  gold_added: "- **`Effect.callback`** (not `Effect.async`) for callback-based APIs.\
    \ The classic `Effect.async` was renamed to `Effect.callback` in effect-smol/v4.\n\
    \n## Instance-scoped Effect services\n\nServices that need per-directory lifecycle\
    \ (created/destroyed per instance) go through the `Instances` LayerMap:\n\n1.\
    \ Define a `ServiceMap.Service` with a `static readonly layer` (see `FileWatcherService`,\
    \ `QuestionService`, `PermissionService`, `ProviderAuthService`).\n2. Add it to\
    \ `InstanceServices` union and `Layer.mergeAll(...)` in `src/effect/instances.ts`.\n\
    3. Use `InstanceContext` inside the layer to read `directory` and `project` instead\
    \ of `Instance.*` globals.\n4. Call from legacy code via `runPromiseInstance(MyService.use((s)\
    \ => s.method()))`.\n\n### Instance.bind — ALS context for native callbacks\n\n\
    `Instance.bind(fn)` captures the current Instance AsyncLocalStorage context and\
    \ returns a wrapper that restores it synchronously when called.\n\n**Use it**\
    \ when passing callbacks to native C/C++ addons (`@parcel/watcher`, `node-pty`,\
    \ native `fs.watch`, etc.) that need to call `Bus.publish`, `Instance.state()`,\
    \ or anything that reads `Instance.directory`.\n\n**Don't need it** for `setTimeout`,\
    \ `Promise.then`, `EventEmitter.on`, or Effect fibers — Node.js ALS propagates\
    \ through those automatically.\n\n```typescript\n// Native addon callback — needs\
    \ Instance.bind\nconst cb = Instance.bind((err, evts) => {\n  Bus.publish(MyEvent,\
    \ { ... })\n})\nnativeAddon.subscribe(dir, cb)\n```\n\n## Flag → Effect.Config\
    \ migration\n\nFlags in `src/flag/flag.ts` are being migrated from static `truthy(...)`\
    \ reads to `Config.boolean(...).pipe(Config.withDefault(false))` as their consumers\
    \ get effectified.\n\n- Effectful flags return `Config<boolean>` and are read\
    \ with `yield*` inside `Effect.gen`.\n- The default `ConfigProvider` reads from\
    \ `process.env`, so env vars keep working.\n- Tests can override via `ConfigProvider.layer(ConfigProvider.fromUnknown({\
    \ ... }))`.\n- Keep all flags in `flag.ts` as the single registry — just change\
    \ the implementation from `truthy()` to `Config.boolean()` when the consumer moves\
    \ to Effect."
  gold_removed: ''
