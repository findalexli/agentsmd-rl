rubric:
- rule: Use `import type` for types, regular `import` for values, separate statements
    even from same module (applies to exports as well)
  source:
    path: CLAUDE.md
    lines: 44-44
  category: style
  evidence: The gold solution adds `export type { PayloadLogger }` as a separate statement
    from the value export `export { defaultLoggerOptions }` in `packages/payload/src/index.ts`.
config_edits:
- path: templates/with-cloudflare-d1/README.md
  tier: 2
  gold_added: '### Logger Configuration


    This template includes a custom console-based logger compatible with Cloudflare
    Workers. Payload''s default logger uses `pino-pretty`, which relies on Node.js
    APIs not available in Workers and would cause `fs.write is not implemented` errors.


    The custom logger in `payload.config.ts`:


    - Routes logs through `console.*` methods which Workers handles correctly

    - Outputs JSON-formatted logs for Cloudflare observability

    - Only active in production (development uses the default `pino-pretty` for better
    DX)


    You can control the log level via the `PAYLOAD_LOG_LEVEL` environment variable
    (e.g., `debug`, `info`, `warn`, `error`).


    ### Diagnostic Channel Errors


    If you see "Failed to publish diagnostic channel message" errors in your observability
    logs, these typically come from the `undici` HTTP client library. The template
    includes `skipSafeFetch: true` in the Media collection to use native fetch instead
    of undici for file uploads, which helps reduce these errors.


    Cloudflare Workers runs in an [isolated environment that cannot access private
    IP ranges](https://developers.cloudflare.com/workers-vpc/examples/route-across-private-services/)
    by default, providing built-in SSRF protection. This makes `skipSafeFetch` safe
    to use.'
  gold_removed: ''
distractors:
- rule: 'Logger Usage (`payload.logger.error`) - Valid: `payload.logger.error(''message'')`
    or `payload.logger.error({ msg: ''...'', err: error })`'
  source:
    path: CLAUDE.md
    lines: 49-52
  collision_type: meta_confusion
  why_distracting: The task is to implement and configure a custom logger for Cloudflare
    Workers, not to fix or change how the logger is called throughout the codebase.
    An agent might get confused and try to rewrite logger calls instead of providing
    the logger implementation.
  severity: medium
- rule: Run `generate:types` script after schema changes
  source:
    path: templates/with-cloudflare-d1/AGENTS.md
    lines: 9-9
  collision_type: scope_ambiguity
  why_distracting: The agent modifies `payload.config.ts` which contains the schema,
    but the changes are to the logger configuration, not the schema itself. Running
    `generate:types` is unnecessary and wastes effort.
  severity: low
hierarchy_analysis: The root `CLAUDE.md` provides general TypeScript and export rules
  which apply to the core package modification (`packages/payload/src/index.ts`).
  The template-specific `AGENTS.md` provides rules for the template, but mostly focuses
  on schema and access control which are not the primary focus of this PR. The root
  rules take precedence for the core package, while template rules apply to the template,
  with no direct conflicts.
