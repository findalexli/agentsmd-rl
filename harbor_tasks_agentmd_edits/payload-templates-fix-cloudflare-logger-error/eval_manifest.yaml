config_edits:
- path: templates/with-cloudflare-d1/README.md
  tier: 2
  gold_added: '### Logger Configuration


    This template includes a custom console-based logger compatible with Cloudflare
    Workers. Payload''s default logger uses `pino-pretty`, which relies on Node.js
    APIs not available in Workers and would cause `fs.write is not implemented` errors.


    The custom logger in `payload.config.ts`:


    - Routes logs through `console.*` methods which Workers handles correctly

    - Outputs JSON-formatted logs for Cloudflare observability

    - Only active in production (development uses the default `pino-pretty` for better
    DX)


    You can control the log level via the `PAYLOAD_LOG_LEVEL` environment variable
    (e.g., `debug`, `info`, `warn`, `error`).


    ### Diagnostic Channel Errors


    If you see "Failed to publish diagnostic channel message" errors in your observability
    logs, these typically come from the `undici` HTTP client library. The template
    includes `skipSafeFetch: true` in the Media collection to use native fetch instead
    of undici for file uploads, which helps reduce these errors.


    Cloudflare Workers runs in an [isolated environment that cannot access private
    IP ranges](https://developers.cloudflare.com/workers-vpc/examples/route-across-private-services/)
    by default, providing built-in SSRF protection. This makes `skipSafeFetch` safe
    to use.'
  gold_removed: ''
