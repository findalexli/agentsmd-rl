distractors:
- rule: When performing a code review on PRs that change functional code, run the
    pr-finalize skill to verify that the PR title and description accurately match
    the actual implementation.
  collision_type: meta_confusion
  why_distracting: The task involves fixing the `Review-PR.ps1` script and PR review
    agent instructions. The agent might misinterpret the instruction to 'run the pr-finalize
    skill' as an action it needs to perform on the current PR, rather than fixing
    the underlying infrastructure scripts that power the review process.
  severity: high
  source:
    path: .github/copilot-instructions.md
    lines: 11-11
- rule: 'Platform-specific files use naming conventions to control compilation: .android.cs
    - Android TFM only'
  collision_type: scope_ambiguity
  why_distracting: The task requires fixing Android-specific build and infrastructure
    scripts (`eng/devices/android.cake`, `Start-Emulator.ps1`). The agent might try
    to apply the `.android.cs` naming convention to these files or assume that Android-specific
    logic must only reside in C# files, which is incorrect for build and PowerShell
    scripts.
  severity: medium
  source:
    path: .github/copilot-instructions.md
    lines: 60-62
hierarchy_analysis: The `.github/copilot-instructions.md` file provides general repository
  guidelines. However, this task is highly meta-referential as it involves modifying
  the agent's own instructions (`PLAN-TEMPLATE.md`, `SHARED-RULES.md`, `post-gate.md`)
  and the skills it uses (`try-fix/SKILL.md`). The agent must distinguish between
  rules that apply to the code it writes for the MAUI framework versus the code it
  writes to maintain its own infrastructure.
