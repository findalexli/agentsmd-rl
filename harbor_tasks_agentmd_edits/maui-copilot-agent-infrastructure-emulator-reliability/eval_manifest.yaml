    | Git state unrecoverable | Run `git checkout HEAD -- .` and `git clean -fd` if
    needed |'
  gold_removed: 'git checkout -- .

    4. **Commit state file:**

    ```bash

    git add "$STATE_FILE" && git commit -m "try-fix: attempt #N"

