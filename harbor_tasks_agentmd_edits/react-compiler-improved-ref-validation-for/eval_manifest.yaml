distractors:
- rule: This repository uses Sapling (`sl`) for version control.
  collision_type: meta_confusion
  why_distracting: The agent might attempt to use Sapling (`sl`) commands to manage
    files or commit changes, but the evaluation environment uses standard `git` (as
    seen in the gold solution's `git apply`). Attempting to use `sl` will likely fail
    or waste steps.
  severity: high
  source:
    path: compiler/CLAUDE.md
    lines: 50-63
- rule: 'React Compiler: `/compiler/` directory (has its own instructions)'
  collision_type: scope_ambiguity
  why_distracting: The root config strictly separates React and React Compiler directories.
    An agent might assume formatting commands should be restricted to the `/compiler/`
    directory, but the gold solution explicitly documents running `yarn prettier-all`
    from the React root directory.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 6-8
hierarchy_analysis: 'The hierarchy clearly separates the React core (root `CLAUDE.md`)
  from the React Compiler (`compiler/CLAUDE.md`). The compiler has its own specific
  testing (`yarn snap`) and architecture (HIR, AliasingEffects) which override or
  supplement the root. However, there is a scope ambiguity regarding formatting: while
  the compiler has its own linting command, formatting (`yarn prettier-all`) must
  be run from the root directory, crossing the boundary established in the root config.'
