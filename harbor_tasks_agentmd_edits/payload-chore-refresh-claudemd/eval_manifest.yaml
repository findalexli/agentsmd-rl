  gold_added: "# CLAUDE.md\n\nThis file provides guidance to Claude Code (claude.ai/code)\
    \ when working with code in this repository.\n\n## Project Structure\n\nPayload\
    \ is a monorepo structured around Next.js, containing the core CMS platform, database\
    \ adapters, plugins, and tooling.\n\n### Key Directories\n\n- `packages/` - All\
    \ publishable packages\n  - `packages/payload` - Core Payload package containing\
    \ the main CMS logic\n  - `packages/ui` - Admin UI components (React Server Components)\n\
    \  - `packages/next` - Next.js integration layer\n  - `packages/db-*` - Database\
    \ adapters (MongoDB, Postgres, SQLite, Vercel Postgres, D1 SQLite)\n  - `packages/drizzle`\
    \ - Drizzle ORM integration\n  - `packages/richtext-*` - Rich text editors (Lexical,\
    \ Slate)\n  - `packages/storage-*` - Storage adapters (S3, Azure, GCS, Uploadthing,\
    \ Vercel Blob)\n  - `packages/email-*` - Email adapters (Nodemailer, Resend)\n\
    \  - `packages/plugin-*` - Additional functionality plugins\n  - `packages/graphql`\
    \ - GraphQL API layer\n  - `packages/translations` - i18n translations\n- `test/`\
    \ - Test suites organized by feature area. Each directory contains a granular\
    \ Payload config and test files\n- `docs/` - Documentation (deployed to payloadcms.com)\n\
    \ - `tools/` - Monorepo tooling\n- `templates/` - Production-ready project templates\n\
    \ - `examples/` - Example implementations\n\n### Architecture Notes\n\n- Payload\
    \ 3.x is built as a Next.js native CMS that installs directly in `/app` folder\n\
    \ - UI is built with React Server Components (RSC)\n- Database adapters use Drizzle\
    \ ORM under the hood\n- Packages use TypeScript with strict mode and path mappings\
    \ defined in `tsconfig.base.json`\n- Source files are in `src/`, compiled outputs\
    \ go to `dist/`\n- Monorepo uses pnpm workspaces and Turbo for builds\n\n## Build\
    \ Commands\n\n- `pnpm install` - Install all dependencies (pnpm required - run\n\
    \   `corepack enable` first)\n- `pnpm build` or `pnpm build:core` - Build core\
    \ packages (excludes plugins and storage adapters)\n- `pnpm build:all` - Build\
    \ all packages\n - `pnpm build:<directory_name>` - Build specific package (e.g.\
    \ `pnpm build:db-mongodb`, `pnpm build:ui`)\n\n## Development\n\n### Running Dev\
    \ Server\n\n- `pnpm dev` - Start dev server with default config (`test/_community/config.ts`)\n\
    - `pnpm dev <directory_name>` - Start dev server with specific test config (e.g.\
    \ `pnpm dev fields` loads `test/fields/config.ts`)\n- `pnpm dev:postgres` - Run\
    \ dev server with Postgres\n- `pnpm dev:memorydb` - Run dev server with in-memory\
    \ MongoDB\n\n### Development Environment\n\n- Auto-login is enabled by default\
    \ with credentials: `dev@payloadcms.com` / `test`\n- To disable: pass `--no-auto-login`\
    \ flag or set `PAYLOAD_PUBLIC_DISABLE_AUTO_LOGIN=false`\n- Default database is\
    \ MongoDB (in-memory). Switch to Postgres with `PAYLOAD_DATABASE=postgres`\n-\
    \ Docker services: `pnpm docker:start` / `pnpm docker:stop` / `pnpm docker:restart`\n\
    \ \n## Testing\n\n### Running Tests\n\n- `pnpm test` - Run all tests (integration\
    \ + components + e2e)\n- `pnpm test:int` - Run integration tests (MongoDB, recommended\
    \ for"
  gold_removed: ''
