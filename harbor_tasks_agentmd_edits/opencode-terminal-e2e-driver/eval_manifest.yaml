config_edits:
- path: packages/app/e2e/AGENTS.md
  tier: 1
  gold_added: '- `waitTerminalReady(page, { term? })` - Wait for a mounted terminal
    to connect and finish rendering output

    - `runTerminal(page, { cmd, token, term?, timeout? })` - Type into the terminal
    via the browser and wait for rendered output

    ### Terminal Tests


    - In terminal tests, type through the browser. Do not write to the PTY through
    the SDK.

    - Use `waitTerminalReady(page, { term? })` and `runTerminal(page, { cmd, token,
    term?, timeout? })` from `actions.ts`.

    - These helpers use the fixture-enabled test-only terminal driver and wait for
    output after the terminal writer settles.

    - Avoid `waitForTimeout` and custom DOM or `data-*` readiness checks.'
  gold_removed: ''
distractors:
- rule: Avoid mocks as much as possible. Test actual implementation, do not duplicate
    logic into tests.
  collision_type: rule_conflict
  why_distracting: The instructions explicitly require creating a 'test-only terminal
    driver/probe'. An agent might interpret this as a mock and refuse to create it,
    instead trying to fix the flakiness by adding more `waitForTimeout` or DOM checks,
    which the prompt explicitly forbids.
  severity: high
  source:
    path: AGENTS.md
    lines: 93-96
- rule: Use Bun APIs when possible, like `Bun.file()`
  collision_type: architecture_boundary
  why_distracting: The terminal probe (`packages/app/src/testing/terminal.ts`) is
    injected into the browser environment (`window.__opencode_e2e`). If an agent tries
    to use Bun APIs for this file because it is a testing utility, it will cause runtime
    errors in the browser.
  severity: high
  source:
    path: AGENTS.md
    lines: '14'
- rule: Always prefer `createStore` over multiple `createSignal` calls
  collision_type: architecture_boundary
  why_distracting: The agent is modifying `packages/app/src/components/terminal.tsx`
    (a SolidJS component) and creating a probe in `packages/app/src/testing/terminal.ts`.
    It might try to use SolidJS reactivity (`createStore`) for the `window.__opencode_e2e`
    probe state, but the probe needs to be a plain object accessible by Playwright
    outside the SolidJS reactive root.
  severity: medium
  source:
    path: packages/app/AGENTS.md
    lines: 13-15
hierarchy_analysis: The hierarchy consists of a root `AGENTS.md` with general TypeScript/testing
  rules, an app-level `AGENTS.md` with SolidJS/browser rules, and an e2e-level `AGENTS.md`
  with Playwright rules. The primary conflict arises from the root testing rules ('Avoid
  mocks') clashing with the specific PR requirement to build a test-only driver. Additionally,
  the architectural boundary between Node.js (Bun/Playwright) and the Browser (SolidJS/window)
  creates friction, as agents must carefully apply browser rules to the app code and
  Node rules to the e2e code without mixing them up in the shared `testing/terminal.ts`
  probe.
