  - id: tab_still_handles_ref_path
    type: pass_to_pass
    origin: static
    description: "tab.ts still handles ref-based (aria-ref) element targeting"

  - id: skill_md_preserves_ref_and_css_examples
    type: pass_to_pass
    origin: static
    description: "SKILL.md still shows ref-based and CSS selector examples"

rubric:
