  tier: 2
  gold_added: "## Typescript-Go Integration\n\nCurrently only integrated with deno\
    \ check, though in the future it will also be\nintegrated with our LSP implementation.\n\
    \nIn the CLI, we have a small abstraction over the tsc backend in\n[cli/tsc/mod.rs](./mod.rs).\
    \ Along with some shared types and functionality, the\nmain piece is the `exec`\
    \ function, which takes a \"request\" to be served by the\ntypescript compiler\
    \ and returns the result. This now has two different \"backend\"\nwhich can serve\
    \ the request – the current tsc, which runs in an isolate and\ncommunicates via\
    \ ops, and typescript-go which runs in a subprocess and uses IPC.\n\nFrom a high\
    \ level, the way the tsgo backend works is that we download a\ntypescript-go binary\
    \ from\n[github releases](https://github.com/denoland/typescript-go/releases)\
    \ into the\ndeno cache dir. To actually interface with tsgo, we spawn it in a\
    \ subprocess and\nwrite messages over stdin/stdout (similar to the Language Server\
    \ Protocol). The\nformat is a mixture of binary data (for the header and other\
    \ protocol level\ndetails) followed by json encoded values for RPC calls. The\
    \ rust implementation\nof the IPC protocol is in the\n[deno_typescript_go_client_rust\
    \ crate](../libs/typescript_go_client/src/lib.rs).\n\nWe currently maintain a\n\
    [fork of typescript-go](https://github.com/denoland/typescript-go) with the\n\
    following changes:\n\n- Special handling of the global symbol tables to account\
    \ for the fact that we\n  have two slightly different sets of globals: one for\
    \ node contexts (in npm\n  packages), and one for deno contexts. At this point,\
    \ the main difference is\n  the type returned by `setTimeout`. With node globals\
    \ `setTimeout` returns an\n  object, and with deno globals it returns a number\
    \ (just like the web\n  standard).\n- Symbol table logic to prevent @types/node\
    \ from creating type errors by\n  introducing incompatible definitions for globals\n\
    - Additional hooks to allow us to provide our own resolution, determine whether\n\
    \  a file is esm/cjs, etc.\n- Additional APIs exposed from the IPC server\n- Support\
    \ for deno's custom libs (`deno.window`, `deno.worker`, etc)"
  gold_removed: ''
