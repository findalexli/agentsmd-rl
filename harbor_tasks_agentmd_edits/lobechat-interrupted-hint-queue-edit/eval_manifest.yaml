  why_distracting: The rule explicitly tells the developer to only translate the `zh-CN`
    file for preview and let CI handle the rest. An agent following this rule would
    skip updating `locales/en-US/chat.json`, but the gold solution updates both `zh-CN`
    and `en-US` files.
  severity: medium
