config_edits:
- path: .agents/skills/electron-testing/SKILL.md
  tier: 1
  gold_added: "## Screen Recording\n\nRecord automated demos by combining `ffmpeg`\
    \ screen capture with `agent-browser` automation. The script `.agents/skills/electron-testing/record-electron-demo.sh`\
    \ handles the full lifecycle.\n\n### Usage\n\n```bash\n# Run the built-in demo\
    \ (queue-edit feature)\n./.agents/skills/electron-testing/record-electron-demo.sh\n\
    \n# Run a custom automation script\n./.agents/skills/electron-testing/record-electron-demo.sh\
    \ ./my-demo.sh /tmp/my-demo.mp4\n```\n\nThe script automatically:\n\n1. Starts\
    \ Electron with CDP and waits for SPA to load\n2. Detects the window position,\
    \ screen, and Retina scale via Swift/CGWindowList\n3. Records only the Electron\
    \ window region using `ffmpeg -f avfoundation` with crop\n4. Runs the demo (built-in\
    \ or custom script receiving CDP port as `$1`)\n5. Stops recording and cleans\
    \ up\n\n### Writing Custom Demo Scripts\n\nCreate a shell script that receives\
    \ the CDP port as `$1`:\n\n```bash\n#!/usr/bin/env bash\n# my-demo.sh — Custom\
    \ demo script\nPORT=$1\n\n# Navigate\nagent-browser --cdp \"$PORT\" snapshot -i\
    \ 2>&1 | grep 'link \"Lobe AI\"'\nagent-browser --cdp \"$PORT\" click @e34\nsleep\
    \ 3\n\n# Find input and type\nINPUT=$(agent-browser --cdp \"$PORT\" snapshot -i\
    \ -C 2>&1 \\\n  | grep \"editable\" | grep -oE 'ref=e[0-9]+' | head -1 | sed 's/ref=//')\n\
    agent-browser --cdp \"$PORT\" click \"@$INPUT\"\nagent-browser --cdp \"$PORT\"\
    \ type \"@$INPUT\" \"Hello world\"\nagent-browser --cdp \"$PORT\" press Enter\n\
    sleep 5\n```\n\n### Key Details\n\n- **Multi-monitor support**: Uses Swift to\
    \ find which screen the Electron window is on and calculates relative crop coordinates\n\
    - **Retina aware**: Scales crop coordinates by the display's `backingScaleFactor`\n\
    - **No window resize**: Records the window at its current position/size to avoid\
    \ triggering SPA reload\n- **SPA load polling**: Waits for interactive elements\
    \ to appear before starting the demo\n- **Prerequisites**: `ffmpeg` (`brew install\
    \ ffmpeg`), `agent-browser`\n\n- **Don't resize the Electron window after load**\
    \ — resizing triggers a full SPA reload (splash screen), which can take 30+ seconds\
    \ or get stuck. Record at the window's current size instead\n- **`screencapture\
    \ -V -l<windowid>`** doesn't work reliably for video — use `ffmpeg -f avfoundation`\
    \ with crop instead (see Screen Recording section)"
  gold_removed: ''
