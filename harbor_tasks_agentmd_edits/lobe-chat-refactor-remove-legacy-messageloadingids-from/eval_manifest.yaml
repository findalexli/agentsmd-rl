  - id: typescript_syntax_valid
    type: pass_to_pass
    origin: static
    description: 'Modified TypeScript files parse without syntax errors'

  - id: files_not_empty
    type: pass_to_pass
    origin: static
    description: 'Modified files are not empty or stubbed'

  # ---------------------------------------------------------------------------
  # Repo CI-derived checks (pass_to_pass) — verify codebase integrity
  # ---------------------------------------------------------------------------
  - id: repo_typecheck_core_files
    type: pass_to_pass
    origin: repo_tests
    description: 'Repo core TypeScript files compile without type errors'

  - id: repo_no_syntax_errors
    type: pass_to_pass
    origin: repo_tests
    description: 'All modified source files have valid syntax (brace/paren balance)'

  # ---------------------------------------------------------------------------
