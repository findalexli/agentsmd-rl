  # ---------------------------------------------------------------------------
  - id: message_loading_ids_removed_from_initial_state
    type: fail_to_pass
    origin: pr_diff
    description: 'messageLoadingIds state removed from ChatMessageState interface and initialMessageState'

  - id: toggle_message_loading_action_removed
