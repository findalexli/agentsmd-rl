  reference: '### Go


    Grafana Mimir uses `goimports` tool (`go get golang.org/x/tools/cmd/goimports`
    to install) to format the Go files, and sort imports.

    We use goimports with `-local github.com/grafana/mimir` parameter, to put Grafana
    Mimir internal imports into a separate group.


    We try to keep imports sorted into three groups:


    - imports from standard library

    - imports of 3rd party packages and

    - internal Grafana Mimir imports.


    Goimports will fix the order, but will keep existing newlines between imports'
