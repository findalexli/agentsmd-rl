  gold_added: '# Claude Code


    ![](https://img.shields.io/badge/Node.js-18%2B-brightgreen?style=flat-square)
    [![npm]](https://www.npmjs.com/package/@anthropic-ai/claude-code)


    [npm]: https://img.shields.io/npm/v/@anthropic-ai/claude-code.svg?style=flat-square


    Claude Code is an agentic coding tool that lives in your terminal, understands
    your codebase, and helps you code faster by executing routine tasks, explaining
    complex code, and handling git workflows -- all through natural language commands.
    Use it in your terminal, IDE, or tag @claude on Github.


    **Learn more in the [official documentation](https://docs.anthropic.com/en/docs/claude-code/overview)**.


    <img src="./demo.gif" />


    ## Get started


    1. Install Claude Code:


    ```sh

    npm install -g @anthropic-ai/claude-code

    ```


    2. Navigate to your project directory and run `claude`.


    ## Reporting Bugs


    We welcome feedback during this beta period. Use the `/bug` command to report
    issues directly within Claude Code, or file a [GitHub issue](https://github.com/anthropics/claude-code/issues).


    ## Data collection, usage, and retention


    When you use Claude Code, we collect feedback, which includes usage data (such
    as code acceptance or rejections), associated conversation data, and user feedback
    submitted via the `/bug` command.


    ### How we use your data


    We may use feedback to improve our products and services, but we will not train
    generative models using your feedback from Claude Code. Given their potentially
    sensitive nature, we store user feedback transcripts for only 30 days.


    If you choose to send us feedback about Claude Code, such as transcripts of your
    usage, Anthropic may use that feedback to debug related issues and improve Claude
    Code''s functionality (e.g., to reduce the risk of similar bugs occurring in the
    future).


    ### Privacy safeguards


    We have implemented several safeguards to protect your data, including limited
    retention periods for sensitive information, restricted access to user session
    data, and clear policies against'
