version: "2.0"

source:
  repo: "gradio-app/gradio"
  pr: 11282
  base_commit: "339811ee0d6f750e18a9ddc8e9c9bb036e328535"
  merge_commit: "9a6a6f524e8e9784144d45ea7b6327a1a7b3593c"

checks:
  - id: svelte_style_sections_valid
    type: pass_to_pass
    origin: static
    description: "Modified Svelte files have properly structured style sections"

  - id: virtual_scroll_maintains_consistent_striping
    type: fail_to_pass
    origin: pr_diff
    description: "Class-based striping maintains consistent row colors during virtual scroll (uses Playwright to verify CSS behavior)"

  - id: no_nth_child_in_dataframe_components
    type: fail_to_pass
    origin: pr_diff
    description: "No nth-child CSS selectors remain in dataframe Svelte components (causes virtual scroll flicker)"

  - id: row_number_uses_class_based_striping
    type: fail_to_pass
    origin: pr_diff
    description: "RowNumber.svelte style block has no background or nth-child rules (handled by parent Table)"

  - id: virtual_table_no_nth_child_override
    type: fail_to_pass
    origin: pr_diff
    description: "VirtualTable.svelte does not use nth-child for row striping (prevents flicker)"

  - id: contributing_pnpm_version_updated
    type: fail_to_pass
    origin: pr_diff
    description: "CONTRIBUTING.md references pnpm 9.x (not 8.x)"

  - id: contributing_browser_test_dependencies
    type: fail_to_pass
    origin: pr_diff
    description: "CONTRIBUTING.md documents browser test dependency installation with chromium, firefox, and pip requirements"

  - id: js_readme_updated_browser_test_setup
    type: fail_to_pass
    origin: pr_diff
    description: "js/README.md has updated browser test setup with Firefox and utils/theme package builds"

  # Repo CI/CD pass_to_pass gates (static checks)
  - id: test_repo_ci_workflow_exists
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's CI workflow file exists and contains expected test commands"

  - id: test_repo_package_json_scripts_exist
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's package.json contains expected test scripts"

  - id: test_repo_dataframe_files_exist
    type: pass_to_pass
    origin: repo_tests
    description: "Dataframe Svelte component files exist and are readable"

  - id: test_repo_eslint_config_exists
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ESLint config exists"

  - id: test_repo_tsconfig_exists
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's TypeScript config exists"

rubric: []
