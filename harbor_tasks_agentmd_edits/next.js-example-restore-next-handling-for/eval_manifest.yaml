config_edits:
- path: examples/with-docker/README.md
  tier: 2
  gold_added: '- Multi-stage Docker build for optimal image size

    - Next.js standalone mode for minimal production builds

    - Security best practices (non-root user)

    - Slim Linux base image for optimal compatibility and smaller size

    - BuildKit cache mounts for faster builds

    - Production-ready configuration

    - **BuildKit cache mounts**: Speeds up builds by caching package manager stores
    (`/root/.npm`, `/usr/local/share/.cache/yarn`, `/root/.local/share/pnpm/store`).
    See the Dockerfile for an optional `.next/cache` mount to speed up rebuilds.

    - **Writable `.next` directory**: The `.next` directory is created and owned by
    the `node` user so the server can write prerender cache and optimized images at
    runtime

    - **Standalone output**: Same optimized output as the Node.js version, with writable
    `.next` directory for runtime cache

    > [!IMPORTANT]

    > **Node.js Version Maintenance**: This Dockerfile uses Node.js 24.13.0-slim,
    which was the latest LTS version at the time of writing. To ensure security and
    stay up-to-date, regularly check and update the `NODE_VERSION` ARG in the Dockerfile
    to the latest Node.js LTS version. Check the latest version at [Nodejs official
    website](https://nodejs.org/) and browse available Node.js images on [Docker Hub](https://hub.docker.com/_/node).'
