  gold_removed: "3. Customize `StatusBar color` option (a.k.a. `background color`\
    \ of the StatusBar component)\n\nTo achieve custom background color you need to\
    \ create a new color resource and provide it to the SplashScreen `style` description.\n\
    \nCreate new color resource in your `res/values/colors.xml` (if your application\
    \ supports dark mode, consider adding different color in `res/values-night/colors.xml`\
    \ file):\n\n```diff\n  <resources>\n    <color name=\"splashscreen_background\"\
    >#D0D0C0</color>\n+   <color name=\"splashscreen_statusbar_color\">#(AA)RRGGBB</color>\
    \ <!-- #AARRGGBB or #RRGGBB format -->\n  </resources>\n```\n\nUpdate your `res/values/styles.xml`\
    \ file with the following entry:\n\n```diff\n  <!-- Main/SplashScreen activity\
    \ theme. -->\n  <style name=\"AppTheme\" parent=\"Theme.AppCompat.Light.NoActionBar\"\
    >\n    <item name=\"android:windowBackground\">@drawable/splashscreen</item>\n\
    +   <item name=\"android:statusBarColor\">@color/splashscreen_statusbar_color</item>\n\
    \    <!-- Other style properties -->\n  </style>\n```\n\nI"
