  tier: 2
  gold_added: "- **Prometheus Metrics**: Exposes Prometheus metrics on port `9090`.\
    \ These metrics are exported to Google Cloud Monitoring.\nenable_metrics     \
    \   = true                        # Enable metrics export to Google Cloud Monitoring\n\
    \n1. **Deploy Script (Recommended)**:\nRun the helper script to handle the deployment\
    \ process automatically:\n./deploy.sh\nThe script will provide the ip address\
    \ of the load balancer once the deployment is complete.\n2. **Deploy (Manual Alternative)**:\n\
    If you prefer running Terraform manually, you can use the following commands:\n\
    # Step 1: Initialize Terraform\nterraform init\n\n# Step 2: Create Cluster\nterraform\
    \ apply -target=time_sleep.wait_for_cluster\n\n# Step 3: Create Resources\nterraform\
    \ apply\n3. **Test with Dataflow Workflow**:\n# Observability & Metrics:\nThis\
    \ module supports exporting native Prometheus metrics to **Google Cloud Monitoring**.\n\
    \n `enable_metrics` is set to `true` by default.\n\n### Sample Metrics\n| Metric\
    \ Name | Description |\n| :--- | :--- |\n| `ratelimit_service_rate_limit_total_hits`\
    \ | Total rate limit requests received. |\n| `ratelimit_service_rate_limit_over_limit`\
    \ | Requests that exceeded the limit (HTTP 429). |\n| `ratelimit_service_rate_limit_near_limit`\
    \ | Requests that are approaching the limit. |\n| `ratelimit_service_call_should_rate_limit`\
    \ | Total valid gRPC calls to the service. |\n\n*Note: You will also see many\
    \ other Go runtime metrics (`go_*`) and Redis client metrics (`redis_*`)\n\n###\
    \ Viewing in Google Cloud Console\n1. Go to **Monitoring** > **Metrics Explorer**.\n\
    2. Click **Select a metric**.\n3. Search for `ratelimit` and select **Prometheus\
    \ Target** > **ratelimit**.\n4. Select a metric (e.g., `ratelimit_service_rate_limit_over_limit`)\
    \ and click **Apply**.\n5. Use **Filters** to drill down by `domain`, `key`, and\
    \ `value` (e.g., `key=database`, `value=users`).\n\n\n```bash\n./deploy.sh destroy\n\
    ```\n\nAlternatively:\n\n|enable_metrics         |Enable metrics export to Google\
    \ Cloud Monitoring     |true                             |"
  gold_removed: '- **StatsD Exporter**: Sidecar container that converts StatsD metrics
    to Prometheus format, exposed on port `9102`.

