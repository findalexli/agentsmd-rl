# Track 2: Gold config edits (extracted from solve.sh)
config_edits:
  - path: "packages/playwright/src/mcp/terminal/SKILL.md"
    tier: 1
    gold_added: |-
      ### Configuration
      ```bash
      # configure the session
      playwright-cli config my-config.json
      # Configure named session
      playwright-cli --session=mysession config my-config.json
      # Start with configured session
      playwright-cli open --config=my-config.json
      ```
    gold_removed: ""

