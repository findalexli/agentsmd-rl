distractors:
- rule: Local development connects to `http://localhost:8080` for Tuist CLI integration.
  collision_type: rule_conflict
  why_distracting: The core objective of this PR is to allow multiple concurrent dev
    instances by dynamically assigning ports. If an agent strictly adheres to this
    rule, it might refuse to change the hardcoded 8080 port or fail to implement the
    dynamic port assignment for the server.
  severity: high
  source:
    path: server/AGENTS.md
    lines: 88-88
- rule: Use mocks/stubs/DI for environment-dependent behavior.
  collision_type: architecture_boundary
  why_distracting: An agent might try to use dependency injection or mocks to handle
    the dynamic ports and database names in the application code, rather than correctly
    using `System.get_env` in the Phoenix configuration files (`runtime.exs`, `test.exs`)
    which is the idiomatic way to handle startup configuration in Elixir.
  severity: medium
  source:
    path: server/AGENTS.md
    lines: 64-64
- rule: Never modify System environment variables in tests (shared state).
  collision_type: scope_ambiguity
  why_distracting: The agent might misinterpret this as a prohibition against *reading*
    environment variables in `test.exs` (like `TUIST_CACHE_TEST_PORT`), or it might
    try to avoid using environment variables entirely for the test environment setup,
    complicating the implementation of the per-clone test databases and ports.
  severity: medium
  source:
    path: server/AGENTS.md
    lines: 63-63
- rule: Compares two `tuist cache` runs to identify cache hit rate changes and root-cause
    analysis of cache invalidation.
  source:
    path: skills/skills/compare-cache-runs/SKILL.md
    lines: 1-5
  collision_type: scope_ambiguity
  why_distracting: The task involves modifying the 'cache' service (an Elixir backend).
    The agent might mistakenly activate this skill, which is about the Tuist CLI's
    local caching mechanism, leading to confusion about the scope of the 'cache' being
    modified.
  severity: medium
hierarchy_analysis: The hierarchy defines global rules in `CLAUDE.md` and `AGENTS.md`,
  with specific subsystem rules in `server/AGENTS.md` and `server/config/AGENTS.md`.
  A direct conflict arises because `server/AGENTS.md` documents the existing hardcoded
  state (`http://localhost:8080`) as a rule, which directly opposes the PR's objective
  to make this dynamic. The agent must recognize that the PR objective overrides this
  specific documented constant, while still respecting the architectural boundaries
  defined in `server/config/AGENTS.md` for where to place the new dynamic configuration.
