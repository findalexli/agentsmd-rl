rubric:
- rule: README updates are consistent with the documentation style of the existing
    server/README.md and cache/README.md
  source:
    path: server/README.md
    lines: 1-40
    commit: 729c4d6361931ac3612f2440bb643e340fd9e5a2
- rule: 'The CLAUDE.md ''Intent Layer Maintenance'' rule is followed: if a new subsystem
    boundary is introduced, relevant AGENTS.md nodes are kept up to date'
  source:
    path: CLAUDE.md
    lines: 23-24
    commit: 729c4d6361931ac3612f2440bb643e340fd9e5a2
- rule: server/README.md documents clone-specific URL and .tuist-dev-instance
  source:
    path: server/README.md
    lines: 26-39
    commit: 305327caea381917bef0ab9f913e4e91a678d37f
  reference: '1. Open the clone-specific local URL in your browser and log in with
    the pre-made test user account. With `mise activate` enabled, each repo clone
    persists its own numeric suffix in `.tuist-dev-instance`, which scopes the local
    service ports, MinIO ports, and server databases. For example, a suffix of `443`
    yields `http://localhost:8523`:

    1. Change the url in `Tuist/Config.swift` to the clone-specific local URL, for
    example `http://localhost:8523`.'
- rule: cache/README.md documents clone-local dev instance suffix mechanism
  source:
    path: cache/README.md
    lines: '61'
    commit: 305327caea381917bef0ab9f913e4e91a678d37f
  reference: The service uses a clone-local suffix from `.tuist-dev-instance` in development
    mode through mise shell env. That suffix scopes the cache port and the main server
    URL it talks to, so one repo clone can run its own paired `server/` and `cache/`
    instances without colliding with other clones.
