distractors:
- rule: Always use `import type { X }` for types (separate from value imports)
  collision_type: rule_conflict
  why_distracting: The gold solution uses inline type imports (`import { HrefError,
    type HrefParams } from './href.ts'`). An agent strictly following the rule to
    separate type imports would split this into two separate import statements, which
    deviates from the gold solution's approach.
  severity: low
  source:
    path: AGENTS.md
    lines: 23-23
- rule: Use regular function declarations/expressions by default, not arrow functions
  collision_type: rule_conflict
  why_distracting: 'The gold solution uses an arrow function for the local helper
    `let appendText = (text: string) => { ... }` inside `PartPattern.parse`. An agent
    following this rule would use a regular function declaration `function appendText(text:
    string) { ... }`, causing a diff mismatch.'
  severity: low
  source:
    path: AGENTS.md
    lines: 25-25
- rule: Create changeset files for changes
  collision_type: scope_ambiguity
  why_distracting: The instructions ask for a specific refactoring but do not mention
    creating a changeset. An agent might create a `.changes/` file, which could cause
    the evaluation to fail if it strictly checks for modified files.
  severity: medium
  source:
    path: AGENTS.md
    lines: 44-45
hierarchy_analysis: The gold solution adds a new `AGENTS.md` file in `packages/route-pattern/src/lib/route-pattern/`
