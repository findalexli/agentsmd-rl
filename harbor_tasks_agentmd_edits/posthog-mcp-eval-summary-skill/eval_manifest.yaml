version: "2.0"

source:
  repo: "PostHog/posthog"
  pr: 53656
  base_commit: "69f47d880ee65fd3e9a769a12a7d80997dea555e"
  merge_commit: "92dcf444055fdc6379cfd469f0d1adaab6886e55"

checks:
  # --- YAML validation (behavioral) ---
  - id: test_tools_yaml_valid
    type: fail_to_pass
    origin: pr_diff
    description: "tools.yaml must be valid parseable YAML"

  # --- Code behavior: tools.yaml configuration ---
  - id: test_eval_summary_tool_enabled
    type: fail_to_pass
    origin: pr_diff
    description: "tools.yaml must have llm-analytics-evaluation-summary-create enabled"

  - id: test_eval_summary_tool_scopes
    type: fail_to_pass
    origin: pr_diff
    description: "Tool must declare llm_analytics:write scope"

  - id: test_eval_summary_tool_annotations_and_consent
    type: fail_to_pass
    origin: pr_diff
    description: "Tool must have correct annotations (not readOnly, not destructive, idempotent) and requires_ai_consent"

  - id: test_eval_summary_tool_description_complete
    type: fail_to_pass
    origin: pr_diff
    description: "Tool must have a descriptive title and description with evaluation_id, filter, pass, and fail documented"

  # --- TypeScript validation (behavioral) ---
  - id: test_typescript_api_file_compiles
    type: fail_to_pass
    origin: pr_diff
    description: "Generated api.ts must have valid TypeScript syntax with exports and Zod schemas"

  - id: test_zod_schema_exported_in_api_ts
    type: fail_to_pass
    origin: pr_diff
    description: "Generated api.ts must export the LlmAnalyticsEvaluationSummaryCreateBody Zod schema with evaluation_id, filter, force_refresh, generation_ids fields"

  - id: test_tool_handler_registered_in_generated_tools
    type: fail_to_pass
    origin: pr_diff
    description: "Generated llm_analytics.ts must register the evaluation-summary handler with correct schema reference"

  - id: test_generated_tools_record_has_entry
    type: fail_to_pass
    origin: pr_diff
    description: "GENERATED_TOOLS record must include the evaluation-summary tool entry"

  # --- JSON validation (behavioral) ---
  - id: test_tool_def_json_valid_and_has_entry
    type: fail_to_pass
    origin: pr_diff
    description: "generated-tool-definitions.json must be valid JSON and include the tool with scopes and consent"

  - id: test_tool_def_all_json_has_entry
    type: fail_to_pass
    origin: pr_diff
    description: "tool-definitions-all.json must also include the evaluation summary tool"

  - id: test_snapshot_json_exists_and_valid
    type: fail_to_pass
    origin: pr_diff
    description: "JSON snapshot for the tool schema must exist with required properties (evaluation_id, filter, force_refresh, generation_ids)"

  # --- Config/documentation: skills README (behavioral) ---
  - id: test_skills_readme_valid_markdown
    type: fail_to_pass
    origin: pr_diff
    description: "products/llm_analytics/skills/README.md must be valid markdown and list the exploring-llm-evaluations skill"

  # --- Config/documentation: SKILL.md (behavioral) ---
  - id: test_skill_md_exists_with_valid_frontmatter
    type: fail_to_pass
    origin: pr_diff
    description: "exploring-llm-evaluations/SKILL.md must exist with valid YAML frontmatter (name, description) mentioning evaluations"

  - id: test_skill_md_documents_summary_tool
    type: fail_to_pass
    origin: pr_diff
    description: "SKILL.md must document the evaluation summary tool including filter and force_refresh parameters"

  - id: test_skill_md_covers_both_evaluation_types
    type: fail_to_pass
    origin: pr_diff
    description: "SKILL.md must document both hog and llm_judge evaluation types with their characteristics"

  - id: test_skill_md_has_workflow_sections
    type: fail_to_pass
    origin: pr_diff
    description: "SKILL.md must contain workflow guidance and reference the $ai_evaluation event schema"

  # --- Agent config compliance: naming conventions ---
  - id: test_skill_md_follows_naming_conventions
    type: pass_to_pass
    origin: agent_config
    description: "SKILL.md frontmatter follows naming conventions from writing-skills guide (kebab-case, description < 1024 chars)"
    source:
      path: ".agents/skills/writing-skills/SKILL.md"
      lines: "31-37"
      commit: "69f47d880ee65fd3e9a769a12a7d80997dea555e"

  # --- Agent config compliance: no wildcard imports ---
  - id: test_no_wildcard_imports_in_generated_code
    type: pass_to_pass
    origin: agent_config
    description: "Generated TypeScript must not use wildcard imports"
    source:
      path: ".agents/skills/implementing-mcp-tools/SKILL.md"
      lines: "1-50"
      commit: "69f47d880ee65fd3e9a769a12a7d80997dea555e"

  # --- Pass-to-pass: regression ---
  - id: test_existing_clustering_tool_unchanged
    type: pass_to_pass
    origin: pr_diff
    description: "Previously enabled clustering-jobs-list tool must remain enabled"

  - id: test_existing_skills_remain_in_readme
    type: pass_to_pass
    origin: pr_diff
    description: "Previously listed skills must still appear in skills/README.md"

  # --- Pass-to-pass: repo CI/CD checks (p2p enrichment) ---
  - id: test_mcp_tools_yaml_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "Repo CI: MCP tools.yaml must be valid YAML syntax"

  - id: test_mcp_schema_json_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Repo CI: MCP generated-tool-definitions.json must be valid JSON"

  - id: test_mcp_typescript_syntax
    type: pass_to_pass
    origin: repo_tests
    description: "Repo CI: MCP generated TypeScript files must have valid syntax"

rubric:
  - rule: "SKILL.md description should include trigger terms and when to use it, per the writing-skills guide"
    source:
      path: ".agents/skills/writing-skills/SKILL.md"
      lines: "33"
      commit: "69f47d880ee65fd3e9a769a12a7d80997dea555e"
  - rule: "Config update is consistent with the style of existing skill documentation in exploring-llm-traces and exploring-llm-clusters"
    source:
      path: "products/llm_analytics/skills/README.md"
      lines: "1-10"
      commit: "69f47d880ee65fd3e9a769a12a7d80997dea555e"
