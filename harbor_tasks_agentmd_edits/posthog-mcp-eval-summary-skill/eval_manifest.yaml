version: "2.0"

source:
  repo: "PostHog/posthog"
  pr: 53656
  base_commit: "69f47d880ee65fd3e9a769a12a7d80997dea555e"
  merge_commit: "92dcf444055fdc6379cfd469f0d1adaab6886e55"

checks:
  # --- Code behavior: tools.yaml configuration ---
  - id: eval_summary_tool_enabled
    type: fail_to_pass
    origin: pr_diff
    description: "tools.yaml must have llm-analytics-evaluation-summary-create enabled"

  - id: eval_summary_tool_scopes
    type: fail_to_pass
    origin: pr_diff
    description: "Tool must declare llm_analytics:write scope"

  - id: eval_summary_tool_annotations_and_consent
    type: fail_to_pass
    origin: pr_diff
    description: "Tool must have correct annotations (not readOnly, not destructive, idempotent) and requires_ai_consent"

  # --- Code behavior: generated TypeScript ---
  - id: zod_schema_exported_in_api_ts
    type: fail_to_pass
    origin: pr_diff
    description: "Generated api.ts must export the LlmAnalyticsEvaluationSummaryCreateBody Zod schema with evaluation_id, filter, force_refresh, generation_ids fields"

  - id: tool_handler_registered_in_generated_tools
    type: fail_to_pass
    origin: pr_diff
    description: "Generated llm_analytics.ts must register the evaluation-summary handler in GENERATED_TOOLS"

  - id: tool_def_json_has_entry
    type: fail_to_pass
    origin: pr_diff
    description: "generated-tool-definitions.json must include the evaluation summary tool with scopes and consent"

  - id: snapshot_json_exists_and_valid
    type: fail_to_pass
    origin: pr_diff
    description: "JSON snapshot for the tool schema must exist with required properties (evaluation_id, filter, force_refresh, generation_ids)"

  # --- Config/documentation: skills README ---
  - id: skills_readme_lists_evaluations
    type: fail_to_pass
    origin: pr_diff
    description: "products/llm_analytics/skills/README.md must list the exploring-llm-evaluations skill"

  # --- Config/documentation: SKILL.md ---
  - id: skill_md_exists_with_frontmatter
    type: fail_to_pass
    origin: pr_diff
    description: "exploring-llm-evaluations/SKILL.md must exist with valid YAML frontmatter (name, description)"

  - id: skill_md_documents_summary_tool
    type: fail_to_pass
    origin: pr_diff
    description: "SKILL.md must document the evaluation summary tool including filter and force_refresh parameters"

  - id: skill_md_covers_both_evaluation_types
    type: fail_to_pass
    origin: pr_diff
    description: "SKILL.md must document both hog and llm_judge evaluation types with their characteristics"

  - id: skill_md_has_workflow_sections
    type: fail_to_pass
    origin: pr_diff
    description: "SKILL.md must contain workflow guidance and reference the $ai_evaluation event schema"

  # --- Agent config compliance: existing rules ---
  - id: skill_md_frontmatter_follows_conventions
    type: pass_to_pass
    origin: agent_config
    description: "SKILL.md frontmatter follows naming conventions from writing-skills guide"
    source:
      path: ".agents/skills/writing-skills/SKILL.md"
      lines: "31-37"
      commit: "69f47d880ee65fd3e9a769a12a7d80997dea555e"

  # --- Pass-to-pass: regression ---
  - id: existing_clustering_tool_unchanged
    type: pass_to_pass
    origin: pr_diff
    description: "Previously enabled clustering-jobs-list tool must remain enabled"

  - id: existing_skills_remain_in_readme
    type: pass_to_pass
    origin: pr_diff
    description: "Previously listed skills must still appear in skills/README.md"

rubric:
  - rule: "SKILL.md description should include trigger terms and when to use it, per the writing-skills guide"
    source:
      path: ".agents/skills/writing-skills/SKILL.md"
      lines: "33"
      commit: "69f47d880ee65fd3e9a769a12a7d80997dea555e"
  - rule: "Config update is consistent with the style of existing skill documentation in exploring-llm-traces and exploring-llm-clusters"
    source:
      path: "products/llm_analytics/skills/README.md"
      lines: "1-10"
      commit: "69f47d880ee65fd3e9a769a12a7d80997dea555e"
