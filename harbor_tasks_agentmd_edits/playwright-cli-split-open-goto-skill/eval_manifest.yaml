- rule: "Default config creation and browser-found messages use \u2705 prefix"
  reference: '# packages/playwright/src/skill/SKILL.md

    # open new browser

    playwright-cli open

    # navigate to a page

    playwright-cli goto https://playwright.dev

    # interact with the page using refs from the snapshot

    # take a screenshot

    playwright-cli screenshot

    # close the browser

    playwright-cli close

    playwright-cli open

    # open and navigate right away

    playwright-cli goto https://playwright.dev

    playwright-cli close

    playwright-cli install --skills

    # create new browser session named "mysession" with persistent profi'
