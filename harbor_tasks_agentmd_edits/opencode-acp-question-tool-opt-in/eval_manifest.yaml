distractors:
- rule: Reduce total variable count by inlining when a value is only used once.
  collision_type: rule_conflict
  why_distracting: The gold solution extracts the complex boolean logic into a `question`
    variable even though it is only used once in the array spread. An agent strictly
    following the 'inline when used once' rule would inline the entire condition `["app",
    "cli", "desktop"].includes(Flag.OPENCODE_CLIENT) || Flag.OPENCODE_ENABLE_QUESTION_TOOL`
    directly into the array spread, which would make the line excessively long and
    harm readability.
  severity: medium
  source:
    path: AGENTS.md
    lines: 34-35
hierarchy_analysis: The root `AGENTS.md` provides general TypeScript style guidelines
  that apply to the modified files. The package-level `packages/opencode/AGENTS.md`
  contains database-specific rules that are irrelevant to this PR. The primary tension
  exists within the root `AGENTS.md` itself, where the rule to inline single-use variables
  conflicts with general code readability when dealing with long boolean expressions.
