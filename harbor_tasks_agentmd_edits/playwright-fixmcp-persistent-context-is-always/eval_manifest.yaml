version: "2.0"

source:
  repo: "microsoft/playwright"
  pr: 39601
  base_commit: "114f3a296a78dfbc1eb6631bb358e9fe9b1677bb"
  merge_commit: "8708b7e3407ee43cda83a99ae1a9e7430b9d32bf"

checks:
  # Code behavior — CLI flag and config option removal
  - id: cli_flag_removed
    type: fail_to_pass
    origin: pr_diff
    description: "program.ts must not register --shared-browser-context as a CLI option"

  - id: config_type_removed
    type: fail_to_pass
    origin: pr_diff
    description: "config.d.ts Config type must not define sharedBrowserContext"

  - id: config_ts_removed
    type: fail_to_pass
    origin: pr_diff
    description: "config.ts CLIOptions and configFromCLIOptions must not reference sharedBrowserContext"

  - id: config_ini_removed
    type: fail_to_pass
    origin: pr_diff
    description: "configIni.ts longhandTypes must not include sharedBrowserContext"

  - id: auto_detect_user_data_dir
    type: fail_to_pass
    origin: pr_diff
    description: "program.ts must use userDataDir to auto-detect shared browser mode"

  - id: lazy_browser_lifecycle
    type: fail_to_pass
    origin: pr_diff
    description: "Shared browser lazily created on first client and cleaned up on last disconnect"

  # Config file update — CLAUDE.md
  - id: claude_md_coauthored_by_rule
    type: fail_to_pass
    origin: pr_diff
    description: "CLAUDE.md must include a rule prohibiting Co-Authored-By in commit messages"

  # Regression
  - id: program_still_creates_browsers
    type: pass_to_pass
    origin: static
    description: "program.ts still uses createBrowser for browser instantiation"

rubric:
  - rule: "Config option removal is complete and consistent across all config locations (config.d.ts, config.ts, configIni.ts, program.ts) per the MCP dev guide"
    source:
      path: ".claude/skills/playwright-dev/mcp-dev.md"
      lines: "315-370"
      commit: "114f3a296a78dfbc1eb6631bb358e9fe9b1677bb"
  - rule: "Commit message follows the semantic commit convention documented in CLAUDE.md"
    source:
      path: "CLAUDE.md"
      lines: "97-125"
      commit: "114f3a296a78dfbc1eb6631bb358e9fe9b1677bb"
