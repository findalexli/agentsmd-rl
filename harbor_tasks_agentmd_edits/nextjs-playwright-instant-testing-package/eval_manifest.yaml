- path: packages/next-playwright/README.md
  tier: 2
  gold_added: "# @next/playwright\n\n> - **Status:** Experimental. This API is not\
    \ yet stable.\n> - **Requires:** [Cache Components](https://nextjs.org/docs) to\
    \ be enabled.\n\nPlaywright helpers for testing Next.js applications.\n\n## Instant\
    \ Navigation Testing\n\nAn **instant navigation** commits immediately without\
    \ waiting for data fetching.\nThe cached shell — including any Suspense loading\
    \ boundaries — renders right\naway, and dynamic data streams in afterward. The\
    \ shell is the instant part, not\nthe full page.\n\n`instant()` lets you test\
    \ whether a route achieves this. While the callback is\nactive, navigations render\
    \ only cached and prefetched content. Dynamic data is\ndeferred until the callback\
    \ returns. This lets you make deterministic assertions\nagainst the shell without\
    \ race conditions.\n\nThe tool assumes a warm cache: all prefetches have completed\
    \ and all cacheable\ndata is available. This way you're testing whether the route\
    \ is *structured\ncorrectly* for instant navigation, independent of network timing.\
    \ If content you\nexpected to be cached is missing inside the callback, it points\
    \ to a problem — a\nmissing `use cache` directive, a misplaced Suspense boundary,\
    \ or a similar gap.\n\n### Examples\n\n**Loading shell appears instantly** (dynamic\
    \ content behind a Suspense boundary):\n\n```ts\nimport { instant } from '@next/playwright'\n\
    \ntest('shows loading shell during navigation', async ({ page }) => {\n  await\
    \ page.goto('/')\n\n  await instant(page, async () => {\n    await page.click('a[href=\"\
    /dashboard\"]')\n\n    // The loading shell is visible — dynamic data is deferred\n\
    \    await expect(page.locator('[data-testid=\"loading\"]')).toBeVisible()\n \
    \ })\n\n  // After instant() returns, dynamic data streams in normally\n  await\
    \ expect(page.locator('[data-testid=\"content\"]')).toBeVisible()\n})\n```\n\n\
    **Fully instant navigation** (all content is cached):\n\n```ts\ntest('navigates\
    \ to profile instantly', async ({ page }) => {\n  await page.goto('/')\n\n  await\
    \ instant(page, async () => {\n    await page.click('a[href=\"/profile\"]')\n\n\
    \    // All content renders immediately\n    await expect(page.locator('[data-testid=\"\
    profile-name\"]')).toBeVisible()\n    await expect(page.locator('[data-testid=\"\
    profile-bio\"]')).toBeVisible()\n  })\n})\n```\n\n### Enabling in production builds\n\
    \nIn development (`next dev`), the testing API is available by default. In\nproduction\
    \ builds, it is disabled unless you explicitly opt in:\n\n```js\n// next.config.js\n\
    module.exports = {\n  experimental: {\n    exposeTestingApiInProductionBuild:\
    \ true,\n  },\n}\n```\n\nThis is not meant to be deployed to live production sites.\
    \ Only enable it in\ncontrolled testing environments like preview deployments\
    \ or CI.\n\n## How it works\n\n`instant()` sets a cookie that tells Next.js to\
    \ serve only cached data during\nnavigations. While the cookie is active:\n\n\
    - **Client-side navigations**: The router renders only what is available in the\n\
    \  prefetch cache. Dynamic data is deferred until the cookie is cleared.\n- **Server\
    \ renders (initial load, reload, MPA navigation)**: The ser"
