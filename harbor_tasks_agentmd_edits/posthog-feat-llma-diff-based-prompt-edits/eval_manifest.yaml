  - id: apply_edits_ambiguous_error
    type: fail_to_pass
    origin: pr_diff
    description: "apply_prompt_edits raises error when old text matches multiple times"

  - id: apply_edits_json_prompt
    type: fail_to_pass
    origin: pr_diff
    description: "apply_prompt_edits works on JSON (dict) prompts"

  - id: serializer_has_edits_field
