    ---\n\n# V8 JIT Optimization\n\nUse this skill when writing or optimizing performance-critical\
    \ code paths in\nNext.js server internals — especially per-request hot paths like\
    \ rendering,\nstreaming, routing, and caching.\n\n## Background: V8's Tiered Compilation\n\
    \nV8 compiles JavaScript through multiple tiers:\n\n1. **Ignition** (interpreter)\
    \ — executes bytecode immediately.\n2. **Sparkplug** — fast baseline compiler\
    \ (no optimization).\n3. **Maglev** — mid-tier optimizing compiler.\n4. **Turbofan**\
    \ — full optimizing compiler (speculative, type-feedback-driven).\n\nCode starts\
    \ in Ignition and is promoted to higher tiers based on execution\nfrequency and\
    \ collected type feedback. Turbofan produces the fastest machine\ncode but **bails\
    \ out (deopts)** when assumptions are violated at runtime.\n\nThe key principle:\
    \ **help V8 make correct speculative assumptions by keeping\ntypes, shapes, and\
    \ control flow predictable.**\n\n## Hidden Classes (Shapes / Maps)\n\nEvery JavaScript\
    \ object has an internal \"hidden class\" (V8 calls it a _Map_,\nthe spec calls\
    \ it a _Shape_). Objects that share the same property names, added\nin the same\
    \ order, share the same hidden class. This enables fast property\naccess via inline\
    \ caches.\n\n### Initialize All Properties in Constructors\n\n```ts\n// GOOD —\
