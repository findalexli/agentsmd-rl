version: '2.0'
source:
  repo: '{{OWNER}}/{{REPO}}'
  pr: 0
  base_commit: '{{BASE_COMMIT}}'
  merge_commit: '{{MERGE_COMMIT}}'
checks:
- id: syntax_check
  type: pass_to_pass
  origin: static
  description: Modified files must parse without errors
- id: test_existing_terminal_settle_api
  type: pass_to_pass
  origin: repo_tests
  description: Existing terminal probe connect/render/settle APIs still work
- id: test_repo_terminal_ts_transpiles
  type: pass_to_pass
  origin: repo_tests
  description: Terminal probe module transpiles without errors
- id: test_repo_terminal_panel_label_test_transpiles
  type: pass_to_pass
  origin: repo_tests
  description: Terminal panel label tests transpile without errors
- id: test_repo_bun_version_available
  type: pass_to_pass
  origin: repo_tests
  description: Bun runtime is available and functional
- id: core_bug_fixed
  type: fail_to_pass
  origin: pr_diff
  description: 'TODO: describe the core behavioral change'
- id: edge_case
  type: fail_to_pass
  origin: pr_diff
  description: 'TODO: describe a second input or edge case'
- id: existing_tests_pass
  type: pass_to_pass
  origin: repo_tests
  description: Upstream test suite still passes
- id: not_stub
  type: pass_to_pass
  origin: static
  description: Modified function has real logic, not just pass/return
rubric: []
config_edits:
- path: packages/app/e2e/AGENTS.md
  tier: 1
  gold_added: '- After opening the terminal, use `waitTerminalFocusIdle(...)` before
    the next keyboard action when prompt focus or keyboard routing matters.

    - This avoids racing terminal mount, focus handoff, and prompt readiness when
    the next step types or sends shortcuts.

    - Prefer semantic app state over transient DOM visibility when behavior depends
    on active selection, focus ownership, or async retry loops

    - Do not treat a visible element as proof that the app will route the next action
    to it

    - When fixing a flake, validate with `--repeat-each` and multiple workers when
    practical

    - Add minimal test-only probes for semantic state like the active list item or
    selected command when DOM intermediates are unstable

    - Prefer probing committed app state over asserting on transient highlight, visibility,
    or animation states

    - Prefer helpers that both perform an action and verify the app consumed it

    - Avoid composing helpers redundantly when one already includes the other or already
    waits for the resulting state

    - If a helper already covers the required wait or verification, use it directly
    instead of layering extra clicks, keypresses, or assertions'
  gold_removed: ''
