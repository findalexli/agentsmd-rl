config_edits:
- path: CONTRIBUTING.md
  tier: 2
  gold_added: '$ brew install automake ccache cmake coreutils gnu-sed go icu4c libiconv
    libtool ninja pkg-config rust ruby

    ### Optional: Install `ccache`

    ccache is used to cache compilation artifacts, significantly speeding up builds:

    $ brew install ccache

    # For Ubuntu/Debian

    $ sudo apt install ccache

    # For Arch

    $ sudo pacman -S ccache

    # For Fedora

    $ sudo dnf install ccache

    # For openSUSE

    $ sudo zypper install ccache

    ```


    Our build scripts will automatically detect and use `ccache` if available. You
    can check cache statistics with `ccache --show-stats`.'
  gold_removed: '$ brew install automake cmake coreutils gnu-sed go icu4c libiconv
    libtool ninja pkg-config rust ruby sccache

    ### Optional: Install `sccache`

    sccache is used to cache compilation artifacts, significantly speeding up builds.
    It must be installed with S3 support:

    $ brew install sccache

    # For Linux. Note that the version in your package manager may not have S3 support.

    $ cargo install sccache --features=s3

    ```


    This will install `sccache` with S3 support. Our build scripts will automatically
    detect and use `sccache` with our shared S3 cache. **Note**: Not all versions
    of `sccache` are compiled with S3 support, hence we recommend installing it via
    `cargo`.


    #### Registering AWS Credentials for `sccache` (Core Developers Only)


    Core developers have write access to the shared S3 cache. To enable write access,
    you must log in with AWS credentials. The easiest way to do this is to use the
    [`aws` CLI](https://aws.amazon.com/cli/) and invoke [`aws configure` to provide
    your AWS security info](htt'
distractors:
- rule: If no valid issue number is provided, find the best existing file to modify
    instead, such as; ... test/cli/ - CLI command tests
  collision_type: scope_ambiguity
  why_distracting: The agent might try to find a test directory like test/cli/ or
    test/integration/ to write tests for the build system changes. However, the JS
    test suite is for the Bun runtime, not for CMake or bash bootstrap scripts.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 23-32
- rule: For multi-file tests, prefer tempDir and Bun.spawn.
  collision_type: would_cause_bug
  why_distracting: The agent might attempt to use Bun.spawn to run scripts/bootstrap.sh
    or cmake in a test to verify the changes. Running build/bootstrap scripts within
    the JS test suite is inappropriate, could modify the host environment, and would
    likely cause CI timeouts or failures.
  severity: high
  source:
    path: CLAUDE.md
    lines: 34-38
hierarchy_analysis: The config files (CLAUDE.md and AGENTS.md) are identical and focus
  entirely on testing and building the Bun runtime. Since this PR is strictly about
  modifying the build system (CMake, bootstrap scripts) and documentation, the testing
  guidelines in the config files are largely inapplicable and could distract the agent
  into writing unnecessary or inappropriate JS tests for build scripts.
