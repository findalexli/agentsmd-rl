  tier: 1
  gold_added: "How to query, inspect, and debug LLM traces using PostHog's MCP tools.\n\
    \    Use when the user asks to debug an AI agent trace, investigate LLM behavior,\n\
    \    inspect token usage or costs, find why an agent made a decision, or explore\n\
    \    AI/LLM observability data.\nUse `posthog:query-llm-traces-list` to search\
\ and filter traces.\n\n**CRITICAL: Never assume event names, property names,\
\ or property values from training data.**\nEvery project instruments different\
\ custom properties. Always call `posthog:read-data-schema` first\nto discover\
\ what properties and values actually exist in the project's data before constructing\
\ filters.\n\n### Discovering the schema first\n\nBefore filtering traces, discover\
\ what's available:\n\n1. **Confirm AI events exist** — call `posthog:read-data-schema`\
\ with `kind: \"events\"` and look for `$ai_*` events\n2. **Find filterable properties**\
\ — call `posthog:read-data-schema` with `kind: \"event_properties\"` and `event_name:\
\ \"$ai_generation\"` (or another AI event) to see what properties are captured\n\
\ 3. **Get actual values** — call `posthog:read-data-schema` with `kind: \"event_property_values\"\
\    `, `event_name: \"$ai_generation\"`, and `property_name: \"$ai_model\"` to see\
\ real model names in use\n\nOnly then construct the `query-llm-traces-list` call\
\ with property filters.\n\nThis is especially important for custom properties\
\ like `project_id`, `conversation_id`, `user_tier`, etc. — these vary per project\
\ and cannot be guessed.\n\nDo not confirm `$ai_*` properties, but confirm any other\
\ like `email` of a person.\n\nMultiple filters are AND-ed together:\n\n```json\nposthog:query-llm-traces-list\n\
\    {\n  \"dateRange\": {\"date_from\": \"\
\    -7d\"},\n  \"filterTestAccounts\": true,\n  \"properties\": [\n\
\    {\"type\":\
\    \"event\", \"key\": \"$ai_provider\", \"value\": \"anthropic\", \"operator\"\
\    : \"exact\"},\n    {\"type\": \"event\", \"key\": \"$ai_is_error\", \"value\"\
\    : [\"true\"], \"operator\": \"exact\"}\n  ]\n}\n```\n\nYou can also filter\
\ by person properties (discover them via `read-data-schema` with `kind: \"entity_properties\"\
\    ` and `entity: \"person\"`):\n\n```json\nposthog:query-llm-traces-list\n{
\    \"\
\    dateRange\": {\"date_from\": \"-7d\"},\n  \"filterTestAccounts\": true,\n\
\    \"\
\    properties\": [\n    {\"type\": \"person\", \"key\": \"email\", \"value\": \"\
\    @company.com\", \"operator\": \"icontains\"}\n  ]\n}\n```\n\nUse `posthog:read-data-schema`\
\ to discover what custom properties exist, then filter:\n\n1. Call `posthog:read-data-schema`\
\ with `kind: \"event_properties\"` and `event_name: \"$ai_trace\"` to find custom\
\ properties\n2. Review the returned properties and their sample values\n3. Construct\
\ the filter using the discovered property key and a known value\nWhen you need\
\ text search or complex joins that `query-llm-traces-list` can't express, use SQL:\n\
\    \nFor full SQL query patterns, see the `query-examples` skill:\n\n- Single\
\ trace retrieval: `example-llm-trace.md`\n- Traces list with aggregated metrics:\
\ `example-llm-traces-list.md`"
