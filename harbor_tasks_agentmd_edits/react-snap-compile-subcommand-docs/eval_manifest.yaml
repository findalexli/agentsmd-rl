- path: compiler/CLAUDE.md
  tier: 1
  gold_added: '## Compiling Arbitrary Files


    Use \x60yarn snap compile\x60 to compile any file (not just fixtures) with the React
    Compiler:


    \x60\x60\x60bash

    # Compile a file and see the output

    yarn snap compile <path>


    # Compile with debug logging to see the state after each compiler pass

    # This is an alternative to \x60yarn snap -d -p <pattern>\x60 when you don''t have a
    fixture file yet

    yarn snap compile --debug <path>

    \x60\x60\x60


    ## Minimizing Test Cases


    Use \x60yarn snap minimize\x60 to automatically reduce a failing test case to its minimal
    reproduction:


    \x60\x60\x60bash

    # Minimize a file that causes a compiler error

    yarn snap minimize <path>


    # Minimize and update the file in-place with the minimized version

    yarn snap minimize --update <path>

    \x60\x60\x60'
