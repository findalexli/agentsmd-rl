  tier: 2
  gold_added: "We provide a convenience endpoint `rl` for single-node RL experiments.\
    \ It configures and startsthe trainer, orchestrator and, optionally, an inference\
    \ server. It enforces correctly setting shared configs (e.g. the model name or\
    \ async level should be the same across all modules) and dispatches and monitors\
    \ subprocesses. To stream the logs from each module, we use file logging, by default\
    \ only the trainer logs will be displayed on the main process.\n### Tmuxinator\n\
    \n\n We also provide a convenient tmuxinator layout to start a run and view all\
    \ the logs at the same time. The recommended workflow is:\n\n1. Start a pre-layouted\
    \ `tmux` session using `tmuxinator`\n\n```bash\ntmuxinator\n```\n\n2. Start the\
    \ trainer and orchestrator in the `Trainer` pane.\n\n```bash\nuv run rl \\\n \
    \ --trainer @ configs/trainer/reverse_text.toml \\\n  --orchestrator @ configs/orchestrator/reverse_text.toml\
    \ \\\n  --inference @ configs/inference/reverse_text.toml\n```\n\n#### Standalone\
    \ Inference Server\nYou can optionally start the inference server individually\
    \ to avoid the long vllm warmup at each run restart. Useful for development.\n\
    \n1. Start the pre-layouted `tmux` session using `tmuxinator`\n\n```bash\ntmuxinator\n\
    ```\n\n2. Start the inference server in the `Inference` pane.\n\n```bash\nuv run\
    \ inference @ configs/inference/reverse_text.toml\n```\n\n3. You can now start\
    \ the trainer and orchestrator in the `Trainer` pane.\n\n```bash\nuv run rl \\\
    \n  --trainer @ configs/trainer/reverse_text.toml \\\n  --orchestrator @ configs/orchestrator/reverse_text.toml\
    \ \\\n```"
  gold_removed: "We provide a convenience endpoint `rl` for single-node RL experiments.\
    \ It configures and startsthe trainer, orchestrator and, optionally, an inference\
    \ server. It enforces correctly setting shared configs (e.g. the model name or\
    \ async level should be the same across all modules) and dispatches and monitors\
    \ subprocesses. To stream the logs from each module, we use file logging which\
    \ can be automatically viewed from a `tmux` layout defined in `.tmuxinator.yaml`.\
    \ The recommended workflow is:\n\n1. Start a pre-layouted `tmux` session using\
    \ `tmuxinator`\n\n```bash\ntmuxinator\n```\n\n2. Start the inference server separately\
    \ in the `Inference` pane (to keep it alive across experiments with the same model)\n\
    \n```bash\nuv run inference @ configs/inference/reverse_text.toml\n```\n\n3. Start\
    \ the trainer and orchestrator in the `RL` pane.\n\n```bash\nuv run rl \\\n  --trainer\
    \ @ configs/trainer/reverse_text.toml \\\n  --orchestrator @ configs/orchestrator/reverse_text.toml\n\
    ```"
