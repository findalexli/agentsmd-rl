  gold_added: "---\nname: performance-investigation\ndescription: Investigate performance\
    \ regressions and find opportunities for optimization\n---\n\n## Quick start\n\
    \n1. Start from a branch you want to measure (for example `foo`).\n2. Run:\n\n\
    ```sh\npnpm bench:compare main foo\n```\n\nIf you pass one branch, `bench:compare`\
    \ automatically compares it to `main`.\n\n## Where outputs go\n\n- Summary report:\
    \ `benchmarking/compare/.results/report.txt`\n- Raw benchmark numbers:\n  - `benchmarking/compare/.results/main.json`\n\
    \  - `benchmarking/compare/.results/<your-branch>.json`\n- CPU profiles (per benchmark,\
    \ per branch):\n  - `benchmarking/compare/.profiles/main/*.cpuprofile`\n  - `benchmarking/compare/.profiles/main/*.md`\n\
    \  - `benchmarking/compare/.profiles/<your-branch>/*.cpuprofile`\n  - `benchmarking/compare/.profiles/<your-branch>/*.md`\n\
    \nThe `.md` files are generated summaries of the CPU profile and are usually the\
    \ fastest way to inspect hotspots.\n\n## Suggested investigation flow\n\n1. Open\
    \ `benchmarking/compare/.results/report.txt` and identify largest regressions\
    \ first.\n2. For each high-delta benchmark, compare:\n   - `benchmarking/compare/.profiles/main/<benchmark>.md`\n\
    \   - `benchmarking/compare/.profiles/<branch>/<benchmark>.md`\n3. Look for changes\
    \ in self/inclusive hotspot share in runtime internals (`runtime.js`, `reactivity/batch.js`,\
    \ `reactivity/deriveds.js`, `reactivity/sources.js`).\n4. Make one optimization\
    \ change at a time, then re-run targeted benches before re-running full compare.\n\
    \n## Fast benchmark loops\n\nRun only selected reactivity benchmarks by substring:\n\
    \n```sh\npnpm bench kairo_mux kairo_deep kairo_broad kairo_triangle\npnpm bench\
    \ repeated_deps sbench_create_signals mol_owned\n```\n\n## Tests to run after\
    \ perf changes\n\nRuntime reactivity regressions are most likely in runes runtime\
    \ tests:\n\n```sh\npnpm test runtime-runes\n```\n\n## Helpful script\n\nFor quick\
