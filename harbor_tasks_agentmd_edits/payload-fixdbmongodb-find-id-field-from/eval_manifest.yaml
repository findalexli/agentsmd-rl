  tier: 1
  gold_added: "### Writing Tests - Required Practices\n\n**Tests MUST be self-contained\
    \ and clean up after themselves:**\n\n- If you create a database record in a test,\
    \ you MUST delete it before the test completes\n- For multiple tests with similar\
    \ cleanup needs, use `afterEach` to centralize cleanup logic\n- Track created\
    \ resources (IDs, files, etc.) in a shared array within the `describe` block\n\
    \n**Example pattern:**\n\n```typescript\ndescribe('My Feature', () => {\n  const\
    \ createdIDs: number[] = []\n\n  afterEach(async () => {\n    for (const id of\
    \ createdIDs) {\n      await payload.delete({ collection: 'my-collection', id\
    \ })\n    }\n    createdIDs.length = 0\n  })\n\n  it('should create a record',\
    \ async () => {\n    const id = 123\n    createdIDs.push(id)\n\n    await payload.create({\
    \ collection: 'my-collection', data: { id, title: 'Test' } })\n    // assertions...\n\
    \  })\n})\n```\n\n**Additional test guidelines:**\n\n- Use descriptive test names\
    \ starting with \"should\" (e.g., \"should create document with custom ID\")\n\
    - Add blank lines after variable declarations to improve readability\n- Collection\
    \ and global slugs should be kept in a shared file and re-used i.e. on relationship\
    \ fields `relationTo: collectionSlug`\n- One test should verify one behavior -\
    \ keep tests focused\n- When adding a new collection for testing, add it to both\
    \ `collections/` directory and the config file import statements\n\n### How to\
    \ run tests"
  gold_removed: ''
