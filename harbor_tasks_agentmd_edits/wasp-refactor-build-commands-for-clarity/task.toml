version = "1.0"
source_repo = "wasp-lang/wasp"
source_pr = 3562

[metadata]
author_name = "Alex Li"
author_email = "alex@example.com"
difficulty = "medium"  # easy / medium / hard
category = "refactor"  # bugfix / feature / refactor
tags = ["wasp", "agentmd-edit", "shell", "documentation"]
expert_time_estimate_min = 10.0
junior_time_estimate_min = 25.0

[verifier]
env = { LLM_JUDGE = "${LLM_JUDGE:-0}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
timeout_sec = 120.0

[agent]
timeout_sec = 1800.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 4096
storage_mb = 10240
allow_internet = true
