distractors:
- rule: Suggest updates to AGENTS.md when you find new high-level information
  collision_type: scope_ambiguity
  why_distracting: The agent might interpret the discovery of broken Docker commands
    or missing target suffixes in the README as 'new high-level information' and attempt
    to update `AGENTS.md`. However, these are localized fixes specific to the `container-client`
    test suite and belong only in its specific `README.md`.
