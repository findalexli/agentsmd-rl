    lines: 10-11
- rule: '`.wd-test` tests: Cap''n Proto config files that define a `Workerd.Config`
    with embedded JS/TS modules.'
  collision_type: architecture_boundary
  why_distracting: The agent might see that `test.js` is being modified and attempt
    to convert it to or treat it as a `.wd-test` Cap'n Proto config file based on
    the primary test type documentation. However, `src/workerd/server/AGENTS.md` specifies
    that `container-client` uses the Node.js `server-harness.mjs` E2E testing approach,
    making the `.wd-test` rules inapplicable here.
  severity: medium
  source:
    path: AGENTS.md
    lines: 58-59
hierarchy_analysis: The root `AGENTS.md` provides general testing conventions (like
  the `@` suffix for Bazel targets) which correctly apply to the README update. However,
  its definition of standard test types (`.wd-test` and C++ tests) is overridden/supplemented
  by `src/workerd/server/AGENTS.md`, which explicitly lists `container-client` as
  a subdirectory that uses the Node.js `server-harness.mjs` E2E testing pattern.
