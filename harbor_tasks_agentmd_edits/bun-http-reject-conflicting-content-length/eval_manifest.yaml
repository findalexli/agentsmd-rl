rubric:
- rule: Add documentation for the pr:comments script to CLAUDE.md explaining how to
    read PR feedback
  source:
    path: CLAUDE.md
    lines: 281-304
    commit: 196ed8a1bd4d5c9915e71816ce64a6a281eee23e
  reference: '## Reading PR Feedback\n\n`gh pr view --comments` is fine for a quick
    look at the Conversation tab, but it has a footgun worth knowing about: it only
    returns issue-stream comments and silently omits review summaries and line-level
    review comments. If a reviewer leaves an inline comment on a specific file line,
    it will not show up — no error, no hint that anything is missing.\n\nWhen you
    want the complete picture — especially when responding to a review or checking
    whether anyone requested changes — use `bun run pr:comments`. It fetches all three
    GitHub endpoints (`/issues/N/comments`, `/pulls/N/reviews`, `/pulls/N/comments`)
    and prints them in one chronological listing, each labelled with its actual type
    (issue comment, review verdict, line comment, reply, suggestion block).\n\n```bash\nbun
    run pr:comments                    # current branch''s PR\nbun run pr:comments
    28838              # by PR number\nbun run pr:comments ''#28838''           #
    also works\nbun run pr:comments https://github.com/oven-sh/bun/pull/28838\n\n#
    Machine-readable output for jq pipelines — one object per entry with\n# { when,
    user, kind, location?, body, url?, resolved?, outdated? }.\n# resolved/outdated
    come from GraphQL reviewThreads and are present only\n# on line comments / replies
    whose thread state was successfully fetched\n# (omitted on issue comments, review
    verdicts, and on GraphQL fetch\n# failure), so `resolved == false` unambiguously
    means "confirmed open\n# thread". No header, no truncation. The PR is optional
    here too\n# (defaults to the current branch''s PR).\nbun run pr:comments --json
    | jq ''.[] | select(.user == "Jarred-Sumner")''\nbun run pr:comments --json |
    jq ''[.[] | select(.resolved == false)]''   # still open\n```'
- rule: If no valid issue number is provided, place tests in the appropriate category
    folder (e.g., `test/js/bun/` for HTTP tests).
  source:
    path: CLAUDE.md
    lines: 46-48
  evidence: The test is placed in `test/js/bun/http/request-smuggling.test.ts` rather
    than an issue-specific folder, correctly categorizing it as a Bun-specific HTTP
    API test.
  category: testing
- rule: 'Never use hardcoded port numbers; always use `port: 0` to get a random port.'
  source:
    path: test/CLAUDE.md
    lines: 18-19
  evidence: 'The HTTP request smuggling test starts a server and must use `port: 0`
    instead of a hardcoded port to avoid port collisions during test execution.'
  category: testing
config_edits:
- path: CLAUDE.md
  tier: 1
  gold_added: '## Reading PR Feedback


    `gh pr view --comments` is fine for a quick look at the Conversation tab, but
    it has a footgun worth knowing about: it only returns issue-stream comments and
    silently omits review summaries and line-level review comments. If a reviewer
    leaves an inline comment on a specific file line, it will not show up — no error,
    no hint that anything is missing.


    When you want the complete picture — especially when responding to a review or
    checking whether anyone requested changes — use `bun run pr:comments`. It fetches
    all three GitHub endpoints (`/issues/N/comments`, `/pulls/N/reviews`, `/pulls/N/comments`)
    and prints them in one chronological listing, each labelled with its actual type
    (issue comment, review verdict, line comment, reply, suggestion block).


    ```bash

    bun run pr:comments                    # current branch''s PR

    bun run pr:comments 28838              # by PR number

    bun run pr:comments ''#28838''           # also works

    bun run pr:comments https://github.com/oven-sh/bun/pull/28838


    # Machine-readable output for jq pipelines — one object per entry with

    # { when, user, kind, location?, body, url?, resolved?, outdated? }.

    # resolved/outdated come from GraphQL reviewThreads and are present only

    # on line comments / replies whose thread state was successfully fetched

    # (omitted on issue comments, review verdicts, and on GraphQL fetch

    # failure), so `resolved == false` unambiguously means "confirmed open

    # thread". No header, no truncation. The PR is optional here too

    # (defaults to the current branch''s PR).

    bun run pr:comments --json | jq ''.[] | select(.user == "Jarred-Sumner")''

    bun run pr:comments --json | jq ''[.[] | select(.resolved == false)]''   # still
    open

    ```'
  gold_removed: ''
distractors:
- rule: If a test is for a specific numbered GitHub Issue, it should be placed in
    `test/regression/issue/${issueNumber}.test.ts`.
  collision_type: meta_confusion
  why_distracting: The prompt mentions RFC 9112 and PR 28838 (in the documentation
    example). An agent might mistakenly treat these numbers as the GitHub issue number
    for the bug and try to create `test/regression/issue/9112.test.ts` or `test/regression/issue/28838.test.ts`.
  severity: high
  source:
    path: CLAUDE.md
    lines: 43-44
- rule: When spawning Bun processes, use `bunExe` and `bunEnv` from `harness`.
  collision_type: architecture_boundary
  why_distracting: The rule instructs using `bunExe` and `bunEnv` when spawning Bun
    processes in tests. An agent might think it needs to spawn a separate Bun process
    to test the HTTP server, but HTTP server tests can and should be run in-process
    using `Bun.serve()` and standard clients or raw sockets.
  severity: medium
  source:
    path: test/CLAUDE.md
    lines: 24-25
- rule: When a test file spawns a Bun process, we like for that file to end in `*-fixture.ts`.
  collision_type: scope_ambiguity
  why_distracting: If the agent mistakenly decides to spawn a process for the test,
    it might also create a fixture file ending in `-fixture.ts`. This is unnecessary
    for a simple HTTP server test which should run in-process.
  severity: low
  source:
    path: test/CLAUDE.md
    lines: 44-45
hierarchy_analysis: '`CLAUDE.md` and `test/CLAUDE.md` provide complementary testing
  guidelines. `CLAUDE.md` focuses on test file placement (e.g., `test/js/bun/` vs
  `test/regression/issue/`), while `test/CLAUDE.md` provides deeper, file-level implementation
  details (e.g., `port: 0`, avoiding `bunExe` when unnecessary). The agent must synthesize
  both levels to correctly place and implement the `request-smuggling.test.ts` file
  without falling into the trap of treating RFC numbers as issue numbers or overcomplicating
  the test with process spawning.'
