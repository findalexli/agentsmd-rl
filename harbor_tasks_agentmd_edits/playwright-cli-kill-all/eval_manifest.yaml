distractors:
- rule: Implement corresponding MCP tool for CLI commands
  source:
    path: .claude/skills/playwright-mcp-dev/SKILL.md
    lines: 24-24
  source_text: '- CLI commands are based on MCP tools. Implement the corresponding
    MCP tool as per `Adding MCP Tools` section above, if needed.'
  collision_type: architecture_boundary
  why_distracting: The 'kill-all' command operates at the OS level to forcefully terminate
    stale daemons. Implementing it as an MCP tool would incorrectly place it inside
    the very daemon it needs to kill, fundamentally failing its purpose.
  severity: high
- rule: Create new MCP tools in browser tools directory
  source:
    path: .claude/skills/playwright-mcp-dev/SKILL.md
    lines: 9-11
  source_text: '- Create a new tool in `packages/playwright/src/mcp/browser/tools/your-tool.ts`

    - Register the tool in `packages/playwright/src/mcp/browser/tools.ts`

    - Add ToolCapability in `packages/playwright/src/mcp/config.d.ts`'
  collision_type: architecture_boundary
  why_distracting: Because the agent might mistakenly assume 'kill-all' needs an MCP
    tool counterpart, it could try to scaffold unnecessary files in the browser tools
    directory, violating the domain isolation of a pure CLI OS-level command.
  severity: high
- rule: Place new CLI tests in cli-<category>.spec.ts
  source:
    path: .claude/skills/playwright-mcp-dev/SKILL.md
    lines: 31-31
  source_text: '- Place new tests in `tests/mcp/cli-<category>.spec.ts`'
  collision_type: scope_ambiguity
  why_distracting: Testing OS-level process termination ('kill-all') is highly flaky
    and often requires complex test scaffolding. An agent might waste significant
    effort trying to write tests for this, which are intentionally omitted in the
    gold diff.
  severity: medium
