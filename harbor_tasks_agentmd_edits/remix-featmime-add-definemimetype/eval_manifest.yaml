config_edits:
- path: packages/mime/.changes/minor.define-mime-type.md
  tier: 2
  gold_added: "Add `defineMimeType()` for registering custom MIME types. This allows\
    \ adding support for file extensions not included in the defaults, or overriding\
    \ existing behavior. Custom registrations take precedence over built-in types.\n\
    \n```ts\nimport { defineMimeType, detectMimeType } from '@remix-run/mime'\n\n\
    defineMimeType({\n  extensions: 'myformat',\n  mimeType: 'application/x-myformat',\n\
    })\n\ndetectMimeType('file.myformat') // 'application/x-myformat'\n```"
  gold_removed: ''
distractors:
- rule: 'Variables: Prefer `let` for locals, `const` only at module scope'
  collision_type: rule_conflict
  why_distracting: The rule states 'const only at module scope', but the gold solution
    uses `export let customMimeTypeByExtension` at the module scope to allow lazy
    initialization and resetting for tests. An agent strictly following 'const only
    at module scope' might use `const` and initialize the Maps immediately, which
    could have unintended side effects or prevent the `resetMimeTypes` test utility
    from working.
  severity: medium
  source:
    path: AGENTS.md
    lines: '23'
- rule: 'Comments: Only add non-JSDoc comments when the code is doing something surprising
    or non-obvious'
  collision_type: scope_ambiguity
  why_distracting: The gold solution includes inline comments like `// Remove leading
    dot if present` and `// Custom registries - only created when defineMimeType is
    called.` An agent might omit these helpful comments, thinking they are 'obvious'
    string manipulations or variable declarations, leading to less readable code.
  severity: low
  source:
    path: AGENTS.md
    lines: '30'
hierarchy_analysis: The AGENTS.md file provides repo-wide guidelines. There are no
  conflicting child configs, but the agent must carefully interpret the module-scope
  variable rule to allow for mutable state when necessary for test isolation.
