# Track 2: Config edits extracted deterministically from PR
gold_config_edits:
  - path: "packages/playwright/src/skill/SKILL.md"
    tier: 1
    description: "Update session commands documentation: rename kill-all to session-kill-all, update command descriptions"
    gold_added: "# Close all browsers\n+playwright-cli session-close-all\n+# Forcefully kill all browser processes\n+playwright-cli session-kill-all"
    gold_removed: "playwright-cli session-close-all          # stop all sessions\n-playwright-cli delete-data                # delete user data for default session\n-playwright-cli kill-all                   # forcefully kill all daemon processes"

  - path: "packages/playwright/src/skill/references/session-management.md"
    tier: 1
    description: "Update session management reference: rename kill-all to session-kill-all, update config path"
    gold_added: "playwright-cli session-kill-all\nplaywright-cli open https://example.com --config=.playwright/my-cli.json"
    gold_removed: "playwright-cli kill-all\nplaywright-cli open https://example.com --config=playwright-cli.json"

# Track 1: Code correctness checks
checks:
