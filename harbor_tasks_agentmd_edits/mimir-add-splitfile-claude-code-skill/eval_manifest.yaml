config_edits:
- path: .claude/skills/split-file/SKILL.md
  tier: 1
  gold_added: '---

    name: split-file

    description: Split a large Go file into smaller focused files while preserving
    git history. Use when a file is too large and needs to be broken into logical
    modules.

    argument-hint: [filepath]

    ---


    # Split a Go file into multiple files preserving git history


    Split the file at `$ARGUMENTS` into multiple smaller files, grouped by logical
    concern, while preserving `git log --follow` history for each new file.


    ## Phase 1: Analyze


    1. Read the file and catalog every function, method, type, const block, and var
    block with their line numbers.

    2. Group them into logical categories (e.g., push path, query path, TSDB lifecycle,
    HTTP handlers, etc.).

    3. Check existing files in the same package to understand naming conventions and
    avoid conflicts.

    4. Propose the split to the user: list each new file, what goes in it, and approximate
    line count. Keep the original file for initialization, config, types, and lifecycle.
    Aim for at least 4 files.

    5. Wait for user approval before proceeding.


    ## Phase 2: Split with history preservation


    For each new file, repeat this sequence. Process files from largest to smallest.


    ### Git dance (creates the new file with full history)


    ```bash

    # 1. Create temp branch from current branch git checkout -b temp-split-SUFFIX
    $CURRENT_BRANCH


    # 2. Rename original to new filename git mv path/to/original.go path/to/new_file.go
    git commit -m "temp: rename original.go to new_file.go"


    # 3. Go back to working branch git checkout $CURRENT_BRANCH


    # 4. Rename original to a temp name (creates rename/rename conflict) git mv path/to/original.go
    path/to/original_main_temp.go git commit -m "temp: rename original.go to original_main_temp.go"


    # 5. Merge — this triggers a CONFLICT (rename/rename), which is what we want git
    merge temp-split-SUFFIX --no-commit git checkout --ours path/to/original_main_temp.go
    git checkout --theirs path/to/new_file.go git add path/to/original_main_temp.go
    path/to/new_file.go git rm --cached path/to/original.go 2>/d'
  gold_removed: ''
distractors:
- rule: Include a CHANGELOG message if users of Grafana Mimir need to hear about what
    you did.
  collision_type: scope_ambiguity
  why_distracting: The task is to add an internal developer tool (Claude skill) that
    does not affect end users of Grafana Mimir. Adding a CHANGELOG entry would be
    inappropriate and pollute the user-facing changelog.
  severity: medium
  source:
    path: CLAUDE.md
    lines: '20'
- rule: If you have made any changes to flags or config, run `make reference-help
    doc` and commit the changed files to update the config file documentation.
  collision_type: scope_ambiguity
  why_distracting: The agent is creating a new CLI tool (`tools/split-file-verify/`)
    which takes arguments, but this rule applies to the main Grafana Mimir server
    flags/config. Running `make reference-help doc` for an internal tool's arguments
    would be incorrect and likely fail or pollute the main docs.
  severity: high
  source:
    path: CLAUDE.md
    lines: '21'
- rule: Have unit and/or integration tests for new functionality or tests that would
    have caught the bug being fixed.
  collision_type: meta_confusion
  why_distracting: While the CLI tool might be testable, the primary deliverable is
    a Claude Code skill (Markdown file) which cannot be unit tested. An agent might
    waste time trying to write tests for the SKILL.md or over-engineer tests for a
    simple AST verification script.
  severity: medium
