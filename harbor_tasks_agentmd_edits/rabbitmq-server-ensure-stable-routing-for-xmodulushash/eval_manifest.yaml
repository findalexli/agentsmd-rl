    lines: 51-56
    commit: 564e1b2f48d2c30a00e4cb8fc75d3c45b33ce9ae
  reference: 'RabbitMQ provides a built-in exchange type, `"x-modulus-hash"`, that
    will use

    across a number of regular queues (shards). This exchange type is available

    in core RabbitMQ and does not require enabling this plugin to be used.

    This exchange guarantees stable routing. As long as the bindings to the exchange
    remain the same,

    messages with the same routing key will always be routed to exactly the same destination
    queue,

    even across node restarts.'
