distractors:
- rule: Avoid `try`/`catch` where possible
  collision_type: would_cause_bug
  why_distracting: The PR explicitly requires using a `try/finally` block to ensure
    the `stop()` function is called even if the `tui()` function throws an error.
    Following the rule to avoid `try`/`catch` would lead to skipping the `finally`
    block, which would leave orphaned processes running on errors.
  severity: high
  source:
    path: AGENTS.md
    lines: 12-12
- rule: Keep things in one function unless composable or reusable
  collision_type: rule_conflict
  why_distracting: The PR requires extracting `target()` and `input()` helper functions
    to replace complex inline IIFEs for better readability. An agent strictly following
    the rule to keep things in one function might retain the inline IIFEs, violating
    the PR's refactoring instructions.
  severity: medium
  source:
    path: AGENTS.md
    lines: 11-11
hierarchy_analysis: Only the root `AGENTS.md` file is present, so there are no inter-file
  hierarchy conflicts. However, the PR instructions explicitly override some of the
  general style principles in `AGENTS.md` (such as avoiding `try`/`catch` and keeping
  things in one function) to achieve reliable process management and better readability.
