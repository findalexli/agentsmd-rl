  gold_added: "This starts the dev server, Docker Compose (Postgres + Electric), and\
    \ Caddy automatically.\n   Open [https://tanstack-start-db-electric-starter.localhost](https://tanstack-start-db-electric-starter.localhost)\n\
    This project uses [Docker](https://www.docker.com), [Node](https://nodejs.org/en)\
    \ with [pnpm](https://pnpm.io) and [Caddy](https://caddyserver.com/). You can\
    \ see compatible versions in the `.tool-versions` file.\n### Caddy\n\n#### Why\
    \ Caddy?\n\nElectric SQL's shape delivery benefits significantly from **HTTP/2\
    \ multiplexing**. Without HTTP/2, each shape subscription creates a new HTTP/1.1\
    \ connection, which browsers limit to 6 concurrent connections per domain. This\
    \ creates a bottleneck that makes shapes appear slow.\n\nCaddy provides HTTP/2\
    \ support with automatic HTTPS, giving you:\n\n- **Faster shape loading** - Multiple\
    \ shapes load concurrently over a single connection\n- **Better development experience**\
    \ - No connection limits or artificial delays\n- **Production-like performance**\
    \ - Your local dev mirrors production HTTP/2 behavior\n\nThe Vite development\
    \ server runs on HTTP/1.1 only, so Caddy acts as a reverse proxy to upgrade the\
    \ connection.\n\n#### Setup\n\nOnce you've [installed Caddy](https://caddyserver.com/docs/install),\
    \ install its root certificate using:\n\n```sh\ncaddy trust\n```\n\nThis is necessary\
    \ for HTTP/2 to work [without SSL warnings/errors in the browser](https://caddyserver.com/docs/command-line#caddy-trust).\n\
    \n#### How It Works\n\n- Caddy auto-starts via a Vite plugin when you run `pnpm\
    \ dev`\n- The `Caddyfile` is automatically generated with your project name\n\
    - Your app is available at `https://<project-name>.localhost`\n- Direct access\
    \ to `http://localhost:5173` still works but will be slower for Electric shapes\n\
    \n#### Troubleshooting Caddy\n\nIf Caddy fails to start:\n\n1. **Test Caddy manually:**\n\
    \n   ```sh\n   caddy start\n   ```\n\n2. **Check certificate trust:**\n\n   ```sh\n\
    \   caddy trust\n   # To remove later: caddy untrust\n   ```\n\n3. **Verify Caddyfile\
    \ was generated:**\n   Look for a `Caddyfile` in your project root after running\
    \ `pnpm dev`\n\n4. **Stop conflicting Caddy instances:**\n\n   ```sh\n   caddy\
    \ stop\n   ```\n\n5. **Check for port conflicts:**\n   Caddy needs ports 80 and\
    \ 443 available\n\n| Issue                    | Symptoms                     \
    \              | Solution                                                    \
    \       |\n| ------------------------ | ------------------------------------------\
    \ | ------------------------------------------------------------------ |\n| **Docker\
    \ not running**   | `docker compose ps` shows nothing          | Start Docker\
    \ Desktop/daemon                                        |\n| **Caddy not trusted**\
    \    | SSL warnings in browser                    | Run `caddy trust` (see Caddy\
    \ section below)                        |\n| **Port conflicts**       | Postgres\
    \ (54321) or Electric (3000) in use | Stop conflicting services or change ports\
    \ in `docker-compose.yaml` |\n| **Missing .env**         | Database connection\
    \ errors          "
