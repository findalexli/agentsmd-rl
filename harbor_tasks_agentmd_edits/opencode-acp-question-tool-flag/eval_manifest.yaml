    lines: 21-22
    commit: 86e545a23ecdb2c1840ab01e82eca292117c6bbc
- rule: Prefer `const` over `let`. Use ternaries or early returns instead of reassignment.
  source:
    path: AGENTS.md
    lines: 59-63
    commit: 86e545a23ecdb2c1840ab01e82eca292117c6bbc
- rule: Avoid unnecessary destructuring. Use dot notation to preserve context.
  source:
    path: AGENTS.md
    lines: 42-43
