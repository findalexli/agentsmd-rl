difficulty = "easy"
category = "feature"
tags = ["oxc", "oxfmt", "documentation", "agents.md"]
expert_time_estimate_min = 5.0
junior_time_estimate_min = 10.0

[source]
repo = "oxc-project/oxc"
pr = 20637
base_commit = "828b56a30708f7db749405f245262ca53125fc1b"

