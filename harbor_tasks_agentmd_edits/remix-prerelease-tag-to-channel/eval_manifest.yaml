version: "2.0"

source:
  repo: "remix-run/remix"
  pr: 10981
  base_commit: "40a755c50f40ed444a928363beddd75e6edc1f52"
  merge_commit: "4c77c95a478c863bc7245c7ec11a576df2808d20"

checks:
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified TypeScript and JSON files must parse without errors"

  - id: prerelease_config_validates_channel
    type: fail_to_pass
    origin: pr_diff
    description: "Node runtime reads prerelease.json and validates 'channel' field exists"

  - id: changes_ts_uses_channel
    type: fail_to_pass
    origin: pr_diff
    description: "RemixPrereleaseConfig interface and validation must use 'channel' not 'tag'"

  - id: publish_uses_next_tag
    type: fail_to_pass
    origin: pr_diff
    description: "publish.ts must use '--tag next' for remix prerelease, not dynamic tag"

  - id: agents_md_documents_channel
    type: fail_to_pass
    origin: agent_config
    description: "AGENTS.md must use 'channel' terminology and document 'next' npm tag"
    source:
      path: "AGENTS.md"
      lines: "49-54"
      commit: "40a755c50f40ed444a928363beddd75e6edc1f52"

  - id: contributing_md_documents_channel
    type: fail_to_pass
    origin: pr_diff
    description: "CONTRIBUTING.md must use 'channel' in prerelease JSON example and docs"

  - id: changes_ts_still_validates
    type: pass_to_pass
    origin: static
    description: "changes.ts must still validate that the config field is a non-empty string"

rubric:
  - rule: "Documentation updates should be consistent with the existing style and tone of AGENTS.md and CONTRIBUTING.md"
    source:
      path: "AGENTS.md"
      lines: "1-10"
      commit: "40a755c50f40ed444a928363beddd75e6edc1f52"
  - rule: "The rename from 'tag' to 'channel' should be applied consistently across all references — code, comments, docs, and error messages"
    source:
      path: "AGENTS.md"
      lines: "49-54"
      commit: "40a755c50f40ed444a928363beddd75e6edc1f52"
