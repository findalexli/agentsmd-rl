  evidence: CLAUDE.md updated to document new cache behavior when build system changes
  category: documentation
  verification: llm_judge
- rule: Comments accurately reflect the current implementation
  source:
    path: scripts/build/CLAUDE.md
    lines: 100-200
    commit: 485ec522a22b469b336aece8276b507a71665a87
  evidence: configure.ts comment updated to reference cfg.cacheDir instead of build
    dir
  category: documentation
  verification: llm_judge
- rule: One flat Config struct with derived booleans computed in resolveConfig()
  source:
    path: scripts/build/CLAUDE.md
    lines: 16-16
  source_text: '- **One flat `Config` struct.** All derived booleans computed once
    in `resolveConfig()`. No `if(ENABLE_X)` depending on `if(CI)` depending on `if(RELEASE)`
    — the chain resolves here, the result is a plain value.'
  evidence: The gold diff strictly follows this by computing the `cacheDir` directly
    within `resolveConfig()` based on the `ci` flag in `scripts/build/config.ts`.
    It prevents scattered conditional checks for `ci` in other files like `download.ts`
    and `clean.ts`.
  category: architecture
  verification: llm_judge
distractors:
- rule: Use tempDirWithFiles for temporary directories
  source:
    path: test/CLAUDE.md
    lines: 128-128
  source_text: Use `tempDirWithFiles` to create a temporary directory with files.
  collision_type: scope_ambiguity
  why_distracting: An agent might attempt to use `tempDirWithFiles` or `tempDir` from
    `harness` when creating the staging directories inside `scripts/build/download.ts`
    (e.g. `const stagingDir = ${dest}${suffix}.staging`). However, `download.ts` is
    a build script, not a test file, so the `harness` testing module is not applicable.
  severity: high
- rule: String literal require() only
  source:
    path: src/js/CLAUDE.md
    lines: 15-18
  source_text: 'Modules are NOT ES modules:


    ```typescript

    const EventEmitter = require("node:events"); // String literals only'
  collision_type: architecture_boundary
  why_distracting: An agent seeing `.ts` files being modified in `scripts/build/`
    might try to rewrite the standard ES module `import` statements into string literal
    `require()` calls as dictated by `src/js/CLAUDE.md`. However, `src/js/CLAUDE.md`
    only applies to Bun's JS builtins; `scripts/build/` safely runs under Node with
    ESM enabled.
  severity: high
- rule: No file existence checks in configure code
  source:
    path: scripts/build/CLAUDE.md
    lines: 38-38
  source_text: '**The smell:** if configure code calls `spawnSync` to compile something,
    or compares mtimes with `statSync`, it''s doing ninja''s job. Make it a build
    edge — `n.rule()` + `n.build()`. Size doesn''t matter; a 1-file compile is still
    a build edge.'
  collision_type: scope_ambiguity
  why_distracting: An agent might see the new `existsSync(stampPath)` added in `scripts/build/download.ts`
    and mistakenly flag it as an anti-pattern that should be turned into a ninja build
    edge. This is distracting because `download.ts` is executed *during* the build
    phase by ninja, not during the configure phase (`scripts/build.ts`), making the
    runtime check perfectly valid.
  severity: medium
