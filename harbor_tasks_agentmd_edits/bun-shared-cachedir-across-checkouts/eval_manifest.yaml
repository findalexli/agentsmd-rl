config_edits:
- path: scripts/build/CLAUDE.md
  tier: 1
  gold_added: '**`rm -rf build/` doesn''t clear the cache locally.** `cfg.cacheDir`
    is machine-shared at `$BUN_INSTALL/build-cache` for non-CI builds (ccache, zig,
    tarballs, prebuilt WebKit). Everything there is content-addressed or version-stamped,
    so a stale entry can''t be hit — don''t reach for `bun run clean cache` as a debugging
    step. If a build misbehaves, the bug is in the inputs or the graph, not the cache;
    nuking it just costs you a cold rebuild. CI keeps `<buildDir>/cache` so `rm -rf
    build/` is still a full reset there.'
  gold_removed: ''
rubric:
- rule: Code uses explicit `homedir` import from node:os rather than hardcoding paths
  source:
    path: CLAUDE.md
    lines: 1-50
    commit: 485ec522a22b469b336aece8276b507a71665a87
  evidence: Gold imports homedir from 'node:os' for cross-platform home directory
    resolution
  category: code_quality
  verification: programmatic
  check_cmd: grep -r 'from "node:os"' /workspace/bun/scripts/build/*.ts | grep -q
    'homedir'
- rule: Build scripts handle concurrent access with process-unique identifiers
  source:
    path: scripts/build/CLAUDE.md
    lines: 100-150
    commit: 485ec522a22b469b336aece8276b507a71665a87
  evidence: Gold uses process.pid and Date.now() for unique temp file names to avoid
    race conditions
  category: concurrency
  verification: programmatic
  check_cmd: grep -q 'process.pid' /workspace/bun/scripts/build/download.ts
- rule: TypeScript files must be valid and type-check without errors
