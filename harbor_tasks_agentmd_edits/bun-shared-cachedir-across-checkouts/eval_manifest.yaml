    commit: 485ec522a22b469b336aece8276b507a71665a87
  evidence: All modified .ts files should pass tsc --noEmit check
  category: type_safety
  verification: programmatic
  check_cmd: cd /workspace/bun && npx tsc --noEmit --skipLibCheck scripts/build/config.ts
    scripts/build/clean.ts scripts/build/configure.ts scripts/build/download.ts
- rule: Documentation is updated alongside functional changes
  source:
    path: scripts/build/CLAUDE.md
    lines: 200-250
