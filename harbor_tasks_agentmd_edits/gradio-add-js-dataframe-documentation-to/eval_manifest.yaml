  gold_added: "# @gradio/dataframe\n\nStandalone Svelte component that brings Gradio's\
    \ Dataframe UI to any Svelte/SvelteKit project.\n\nThis component is lightweight,\
    \ virtualized for efficient rendering of large datasets, and offers features like\
    \ column freezing, and customizable styling via CSS variables. Use this component\
    \ when you need a highly interactive, accessible, and easily themeable table for\
    \ user-facing applications, especially where seamless Svelte/SvelteKit integration\
    \ is important.\n\n## Install\n\nWith `npm`:\n\n```shell\nnpm i @gradio/dataframe\n\
    ```\n\nWith `pnpm`:\n\n```shell\npnpm add @gradio/dataframe\n```\n\n**[View\
    \ on\n\tnpm](https://www.npmjs.com/package/@gradio/dataframe)**\n\n## Usage (Svelte/SvelteKit)\n\
    \n```svelte\n<script lang=\"ts\">\n  import Dataframe from \"@gradio/dataframe\"\
    ;\n\n  let value = {\n    data: [\n      [\"Alice\", 25, true],\n      [\"Bob\"\
    , 30, false]\n    ],\n    headers: [\"Name\", \"Age\", \"Active\"],\n  };\n\n\
    \  function handle_change(e: any) {\n    console.log(\"changed\", e.detail);\n  }\n\
    \n  function handle_select(e: any) {\n    console.log(\"selected\", e.detail);\n\
    \  }\n\n  function handle_input(e: any) {\n    console.log(\"input\", e.detail);\n\
    \  }\n</script>\n\n<Dataframe\n  bind:value\n  {datatype}\n  show_search=\"search\"\
    \n  show_row_numbers={true}\n  show_copy_button={true}\n  show_fullscreen_button={true}\
    \n  editable={true}\n  on:change={handle_change}\n  on:select={handle_select}\n\
    \  on:input={handle_input}\n  />\n```\n\n## Props\n\n```typescript\ninterface\
    \ DataframeProps {\n\n  /**\n   * The value object containing the table data,\
    \ headers, and optional metadata.\n   * Example: { data: [...], headers: [...],\
    \ metadata?: any }\n   * Default: { data: [[]], headers: [] }\n   */\n  value:\
    \ {\n    data: (string | number | boolean)[][];\n    headers: string[];\n    metadata?:\
    \ any;\n  };\n\n  /**\n   * Array of data types per column. Supported: \"str\"\
    , \"number\", \"bool\", \"date\", \"markdown\", \"html\".\n   * Default: []\n\
    \   */\n  datatype?: string[];\n\n  /**\n   * Enable or disable cell editing.\n\
    \   * Default: true\n   */\n  editable?: boolean;\n\n "
  gold_removed: ''
