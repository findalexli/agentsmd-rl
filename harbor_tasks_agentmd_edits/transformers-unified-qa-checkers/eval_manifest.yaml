version: "2.0"

source:
  repo: "huggingface/transformers"
  pr: 44879
  base_commit: "28af8184fb00a0e9bc778c3defdec39bbe7e8839"
  merge_commit: "b3d7942fbaedda791668d7fe42eaaa323ed7a089"

checks:
  # Code behaviour: fail_to_pass
  - id: checkers_list
    type: fail_to_pass
    origin: pr_diff
    description: "utils/checkers.py --list outputs all expected checker names"

  - id: checkers_unknown_checker
    type: fail_to_pass
    origin: pr_diff
    description: "Unknown checker name produces a clear error"

  - id: checkers_help
    type: fail_to_pass
    origin: pr_diff
    description: "checkers.py --help shows usage with --fix and --keep-going flags"

  - id: makefile_has_new_targets
    type: fail_to_pass
    origin: pr_diff
    description: "Makefile defines check-code-quality and check-repository-consistency"

  - id: makefile_delegates_to_checkers
    type: fail_to_pass
    origin: pr_diff
    description: "Makefile targets use the unified checkers module instead of raw commands"

  - id: circleci_uses_make_targets
    type: fail_to_pass
    origin: pr_diff
    description: "CircleCI config uses make check-code-quality and make check-repository-consistency"

  - id: tomli_in_quality_deps
    type: fail_to_pass
    origin: pr_diff
    description: "tomli is listed in both setup.py quality extras and dependency_versions_table"

  # Config update: fail_to_pass
  - id: agents_md_updated_check_repo
    type: fail_to_pass
    origin: pr_diff
    description: ".ai/AGENTS.md reflects the updated make check-repo description"

  - id: agents_md_no_stale_ci_statement
    type: fail_to_pass
    origin: pr_diff
    description: ".ai/AGENTS.md does not claim CI runs make check-repo"

  # Pass-to-pass: static
  - id: makefile_core_targets_exist
    type: pass_to_pass
    origin: static
    description: "Core make targets (style, typing, check-repo, fix-repo) must always exist"

  - id: agents_md_has_make_commands
    type: pass_to_pass
    origin: agent_config
    description: ".ai/AGENTS.md documents make style, typing, fix-repo, check-repo"
    source:
      path: ".ai/AGENTS.md"
      lines: "2-5"
      commit: "28af8184fb00a0e9bc778c3defdec39bbe7e8839"

  # Pass-to-pass: repo CI/CD checks
  - id: test_repo_ruff_format
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ruff format check passes on utils/check_types.py"

  - id: test_repo_ruff_lint
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ruff lint check passes on utils/check_types.py"

  - id: test_repo_check_types
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's type checker passes on src/transformers/utils"

  - id: test_repo_custom_init_isort
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's init isort check passes"

  - id: test_repo_sort_auto_mappings
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's auto mappings sort check passes"

  - id: test_repo_check_doc_toc
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's documentation TOC check passes"

  - id: test_repo_check_copies
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's copies check passes"

  - id: test_repo_check_dummies
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's dummies check passes"

  - id: test_repo_check_doctest_list
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's doctest list check passes"

  - id: test_repo_check_inits
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's inits check passes"

rubric:
  - rule: "The unified checker module should wrap all existing check scripts without changing their individual behavior"
    source:
      path: ".ai/AGENTS.md"
      lines: "2-6"
      commit: "28af8184fb00a0e9bc778c3defdec39bbe7e8839"
  - rule: "Agent instruction updates should be consistent with the style of the existing .ai/AGENTS.md content"
    source:
      path: ".ai/AGENTS.md"
      lines: "1-7"
      commit: "28af8184fb00a0e9bc778c3defdec39bbe7e8839"
