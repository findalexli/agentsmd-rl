distractors:
- rule: Prefer pure functions; when mutation is unavoidable, return the mutated object
    instead of void.
  collision_type: architecture_boundary
  why_distracting: The agent might try to wrap the script's logic in pure functions
    or return values, but `scripts/docker-clean.js` is a standalone Node.js script
    meant to execute side effects (Docker commands) imperatively when run.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 50-50
- rule: 'Organize functions top-down: exports before helpers'
  collision_type: architecture_boundary
  why_distracting: The agent might try to structure the script with exported functions
    at the top, but utility scripts in `scripts/` are executed directly via `node`
    and need imperative top-level execution, not exports.
  severity: low
  source:
    path: CLAUDE.md
    lines: 51-51
hierarchy_analysis: The repository has a single `CLAUDE.md` file at the root. The
  rules in `CLAUDE.md` are primarily geared towards the core Next.js CMS platform
  and packages (`packages/`). When creating utility scripts in the `scripts/` directory,
  agents must recognize the architecture boundary and ignore rules about pure functions
  and exports, as these scripts require imperative side-effects.
