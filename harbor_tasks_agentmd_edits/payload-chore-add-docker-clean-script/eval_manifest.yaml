rubric:
- rule: The docker:clean script should handle the case where containers don't exist
    gracefully (try/catch or similar error suppression)
  source:
    path: CLAUDE.md
    lines: '85'
    commit: a188556e99d94c96266671b2129e5c8cb05e46a5
- rule: 'Commenting Guidelines: Keep comments for non-obvious ''why'' in execution
    flow.'
  source:
    path: CLAUDE.md
    lines: 55-56
  evidence: The catch block in `scripts/docker-clean.js` contains a comment `// Some
    or all containers don't exist` to explain the non-obvious reason for swallowing
    the error.
  category: documentation
- rule: 'Top of file/module comments: Use sparingly; only for non-obvious purpose/context.'
  source:
    path: CLAUDE.md
    lines: 57-57
  evidence: '`scripts/docker-clean.js` has no file-level comment or docblock at the
    top, starting directly with the import.'
  category: documentation
- rule: Use regular `import` for values.
  source:
    path: CLAUDE.md
    lines: 53-53
  evidence: The script uses `import { execSync } from 'child_process'` which correctly
    uses a regular import for a value.
  category: style
