    \   | Yes      | GitHub repo in `org/repo` format (e.g., `posthog/posthog-js`)\
    \              |\n| `posthog_mcp_scopes`     | No       | Scope preset or explicit\
    \ scope list (default: `\"full\"`)                    |\n| `create_pr`       \
    \       | No       | Whether the agent should create a PR (default: `True`)  \
    \                   |\n| `mode`                   | No       | Execution mode\
    \ (default: `\"background\"`)                                   |\n| `slack_thread_context`\
    \   | No       | Slack thread context for agents triggered from Slack        \
    \               |\n| `start_workflow`         | No       | Whether to start the\
    \ Temporal workflow immediately (default: `True`)       |\n| `sandbox_environment_id`\
    \ | No       | ID of a `SandboxEnvironment` to apply network restrictions (see\
    \ below)     |\nTo apply network restrictions from your product code,\ncreate\
    \ a `SandboxEnvironment` and pass its ID to `Task.create_and_run`:\n\n```python\n\
