    \  network_access_level=\"custom\",  # \"full\" | \"trusted\" | \"custom\"\n \
    \   allowed_domains=[\"github.com\", \"api.example.com\"],\n    include_default_domains=True,\
    \  # merge GitHub, npm, PyPI defaults\n)\n\n# 2. Pass its ID when creating the\
    \ task\ntask = Task.create_and_run(\n    team=team,\n    title=\"My restricted\
    \ task\",\n    description=\"...\",\n    origin_product=Task.OriginProduct.YOUR_PRODUCT,\n\
    \    user_id=user.id,\n    repository=\"org/repo\",\n    sandbox_environment_id=str(env.id),\n\
    )\n```\n\nThe temporal workflow resolves the allowed domains at execution time\
    \ from the environment,\nso updates to the environment take effect on the next\
    \ run.\nDomain restrictions are enforced at the syscall level by `agentsh` via\
    \ ptrace —\nthe agent cannot bypass them through proxy settings or DNS tricks.\n\
    \nEnvironments can also be managed via the REST API (`SandboxEnvironmentViewSet`)\n\
    or the PostHog Code settings UI."
