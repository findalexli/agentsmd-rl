- path: packages/interaction/CHANGELOG.md
  tier: 2
  gold_added: '## Unreleased\n\n- BREAKING CHANGE: Interaction API refactor - interactions
    now use `this` context with `this.on()`, `this.target`, `this.signal`, and `this.raise`\n\n  Interactions
    are now functions that receive an `Interaction` context via `this`:\n\n  ```ts\n  //
    Before\n  function MyInteraction(target: EventTarget, signal: AbortSignal) {\n    createContainer(target,
    { signal }).set({ ... })\n  }\n\n  // After\n  function MyInteraction(this: Interaction)
    {\n    this.on(this.target, { ... })\n    // or for different targets\n    this.on(this.target.ownerDocument,
    { ... })\n  }\n  ```\n\n  The `Interaction` context provides:\n\n  - `this.target`
    - The target element\n  - `this.signal` - Abort signal for cleanup\n  - `this.raise`
    - Error handler (renamed from `onError`)\n  - `this.on(target, listeners)` - Create
    a container with automatic signal/error propagation\n\n- BREAKING CHANGE: Simplify
    descriptor API - descriptors now extend `AddEventListenerOptions` directly\n\n  Removed
    `capture()` and `listenWith()` helper functions. Consumers now provide options
    inline using descriptor objects:\n\n  ```tsx\n  // removed\n  capture((event)
    => {})\n  listenWith({ once: true }, (event) => {})\n\n  // new API\n  {\n    capture:
    true,\n    listener(event) {}\n  }\n  {\n    once: true,\n    listener(event)
    {}\n  }\n  ```\n\n- BREAKING CHANGE: Remove `on` signal overload, just use containers
    directly\n\n  ```tsx\n  // removed\n  on(target, signal, listeners)\n\n  // on
    is just a shortcut now\n  let dispose = on(target, listeners)\n  dispose()\n\n  //
    use containers for signal cleanup\n  let container = createContainer(target, {
    signal })\n  ```\n\n- Added `onError` handler so containers can handle listener
    errors in one place (avoids Remix Component needing to wrap EventListener interfaces
    to raise to `<Catch>`)\n\n  ```tsx\n  createContainer(target, {\n    onError(error)
    {\n      // handle error\n    },\n  })\n  ```'
  gold_removed: ''
