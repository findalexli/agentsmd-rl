    description: "BuildKit cache mount on .next/cache removed from build RUN command"

  - id: dockerfile_runner_mkdir_executes
    type: fail_to_pass
    origin: pr_diff
    description: "Runner stage creates .next directory with RUN mkdir .next"

  - id: dockerfile_runner_chown_next
    type: fail_to_pass
    origin: pr_diff
    description: "Runner stage sets .next ownership to node:node for writable prerender cache"

  - id: dockerfile_bun_runner_creates_writable_next
    type: fail_to_pass
    origin: pr_diff
    description: "Dockerfile.bun runner stage creates .next and sets ownership to bun:bun"

  # F2P — Config / documentation updates
  - id: readme_documents_writable_next_dir
    type: fail_to_pass
    origin: pr_diff
    description: "with-docker README documents the writable .next directory and prerender cache"

  - id: readme_cache_mount_description_updated
    type: fail_to_pass
    origin: pr_diff
    description: "README explains .next/cache mount is optional, not default"

  # P2P — Structural checks
  - id: dockerfile_runner_commands_valid_shell
    type: pass_to_pass
    origin: static
    description: "RUN commands in runner stage have valid shell syntax"

  - id: dockerfile_build_command_present
    type: pass_to_pass
    origin: static
    description: "Dockerfile builder stage has a build command"

