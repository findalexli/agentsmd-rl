- path: .claude/skills/testing-codegen/SKILL.md
  tier: 1
  gold_added: "// Modify the quick_test function:\njust qt biome_js_analyze\n```\n\
    \n### Quick Test for Parser Development\n\n**IMPORTANT:** Use this instead of\
    \ building full Biome binary for syntax inspection - it's much faster!\n\nFor\
    \ inspecting AST structure when implementing parsers or working with embedded\
    \ languages:\n\n```rust\n// In crates/biome_html_parser/tests/quick_test.rs\n\
    // Modify the quick_test function:\n\n#[test]\npub fn quick_test() {\n    let\
    \ code = r#\"<button on:click={handleClick}>Click</button>\"#;\n\n    let source_type\
    \ = HtmlFileSource::svelte();\n    let options = HtmlParseOptions::from(&source_type);\n\
    \    let root = parse_html(code, options);\n    let syntax = root.syntax();\n\n\
    \    dbg!(&syntax, root.diagnostics(), root.has_errors());\n}\n```\n```shell\n\
    just qt biome_html_parser\n```\n\nThe `dbg!` output shows the full AST tree structure,\
    \ helping you understand:\n- How directives/attributes are parsed (e.g., `HtmlAttribute`\
    \ vs `SvelteBindDirective`)\n- Whether values use `HtmlString` (quotes) or `HtmlTextExpression`\
    \ (curly braces)\n- Token ranges and offsets needed for proper snippet creation\n\
    - Node hierarchy and parent-child relationships\n\n- **Parser inspection**: Use\
    \ `just qt <package>` to run quick_test and inspect AST, NOT full Biome builds\
    \ (much faster)\n- **String extraction**: Use `inner_string_text()` for quoted\
    \ strings, not `text_trimmed()` (which includes quotes)\n- **Legacy syntax**:\
    \ Ask users before implementing deprecated/legacy syntax - wait for user demand\n\
    - **Borrow checker**: Avoid temporary borrows that get dropped - use `let binding\
    \ = value; binding.method()` pattern"
