  gold_added: "### `HTML(value: Any | Callable | None = None, label: str | I18nData\
    \ | None = None, html_template: str = \"${value}\", css_template: str = \"\",\
    \ js_on_load: str | None = \"element.addEventListener('click', function() { trigger('click')\
    \ });\", apply_default_css: bool = True, every: Timer | float | None = None, inputs:\
    \ Component | Sequence[Component] | set[Component] | None = None, show_label:\
    \ bool = False, visible: bool | Literal['hidden'] = True, elem_id: str | None\
    \ = None, elem_classes: list[str] | str | None = None, render: bool = True, key:\
    \ int | str | tuple[int | str, ...] | None = None, preserved_by_key: list[str]\
    \ | str | None = \"value\", min_height: int | None = None, max_height: int | str\
    \ | None = None, container: bool = False, padding: bool = False, autoscroll: bool\
    \ = False, buttons: list[Button] | None = None, server_functions: list[Callable]\
    \ | None = None, props: Any)`\n\n\n## Server Functions\n\nYou can call Python\
    \ functions directly from your `js_on_load` code using the `server_functions`\
    \ parameter. Pass a list of Python functions to `server_functions`, and they become\
    \ available as async methods on a `server` object inside `js_on_load`.\n\nExample:\n\
    ```python\nimport os\nimport gradio as gr\n\ndef list_files(path):\n    try:\n\
    \        return os.listdir(path)\n    except (FileNotFoundError, PermissionError)\
    \ as e:\n        return [f\"Error: {e}\"]\n\nwith gr.Blocks() as demo:\n    gr.Markdown(\"\
    # Server Functions Demo\")\n    filetree = gr.HTML(\n        value=os.path.abspath(''),\n\
    \        html_template=\"\"\"\n            <div>\n                <p>Directory:\
    \ <strong>${value}</strong></p>\n                <div class='tree'></div>\n  \
    \              <button class='load-btn'>Load Files</button>\n            </div>\n\
    \        \"\"\",\n        js_on_load=\"\"\"\n            const loadBtn = element.querySelector('.load-btn');\n\
    \            const tree = element.querySelector('.tree');\n            loadBtn.addEventListener('click',\
    \ async () => {\n                const files = await server.list_files(props.value);\n\
    \                tree.innerHTML = '';\n                files.forEach(file => {\n\
    \                    const fileEl = document.createElement('div');\n         \
    \           fileEl.textContent = file;\n                    tree.appendChild(fileEl);\n\
    \                });\n            });\n        \"\"\",\n        server_functions=[list_files],\n\
    \    )\n\nif __name__ == \"__main__\":\n    demo.launch()\n```\n\nEach function\
    \ in `server_functions` becomes an async method on the `server` object:\n- Function\
    \ name becomes the method name\n- Arguments are passed to the Python function\n\
    - Returns a Promise that resolves with the function's return value\n- Use `await\
    \ server.func_name(args)` or `server.func_name(args).then(result => ...)`"
