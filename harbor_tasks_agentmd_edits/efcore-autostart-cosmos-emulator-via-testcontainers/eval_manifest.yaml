  gold_removed: '## Azure Cosmos DB Emulator in Docker

    Cosmos tests on Helix start the emulator from the work item via `PreCommands`
    that run a Docker container using:

    - `eng/testing/run-cosmos-container.ps1`

    - `eng/testing/run-cosmos-container.sh`


    These scripts can be invoked locally for testing on machines that don''t have
    the emulator installed, but have docker available.


    The `Test__Cosmos__SkipConnectionCheck=true` env var is set to prevent tests from
    being skipped when the emulator failed to start.'
distractors:
- rule: Don't copy code that follows the same pattern in a different context.
  collision_type: rule_conflict
  why_distracting: 'The prompt explicitly asks the agent to match the pattern already
    established for SQL Server in PR #37809. If the agent strictly follows the instruction
    not to copy code from a different context, it might try to invent a novel way
    to manage the Cosmos DB container instead of reusing the proven SQL Server pattern.'
  severity: high
  source:
    path: .github/copilot-instructions.md
    lines: '5'
- rule: Avoid breaking public APIs. If you need to break a public API, add a new API
    instead and mark the old one as obsolete.
  collision_type: scope_ambiguity
  why_distracting: The PR modifies `TestEnvironment.cs` and `CosmosTestStore.cs`,
    which are internal test utilities. An agent might mistakenly treat these as public
    APIs and try to preserve the old `InitializeAsync` signature or add `[Obsolete]`
    attributes, which is unnecessary and pollutes the test codebase.
  severity: medium
  source:
    path: .github/copilot-instructions.md
    lines: '22'
- rule: Types in `.Internal` namespaces or annotated with `[EntityFrameworkInternal]`
    require a specific XML doc comment on ALL members.
  collision_type: scope_ambiguity
  why_distracting: The agent might see test utilities like `TestEnvironment` and think
    they are internal infrastructure, adding the verbose `[EntityFrameworkInternal]`
    XML doc comment to test classes, which is only meant for the main product code.
  severity: low
  source:
    path: .github/copilot-instructions.md
    lines: 24-31
- rule: Start the Cosmos emulator from Helix `PreCommands` via `eng/testing/run-cosmos-container.ps1`
    / `eng/testing/run-cosmos-container.sh`.
  source:
    path: .agents/skills/cosmos-provider/SKILL.md
    lines: 26-30
  source_text: 'Cosmos tests on Helix start the emulator from the work item via `PreCommands`
    that run a Docker container using:

    - `eng/testing/run-cosmos-container.ps1`

    - `eng/testing/run-cosmos-container.sh`


    These scripts can be invoked locally for testing on machines that don''t have
    the emulator installed, but have docker available.'
  collision_type: rule_conflict
  why_distracting: This looks highly relevant because the diff changes the exact Cosmos-emulator
    setup area, but the patch intentionally replaces script-driven Helix startup with
    `TestEnvironment.InitializeAsync()` plus `Testcontainers.CosmosDb`, deletes both
    `eng/testing/run-cosmos-container.*` files, and removes the Ubuntu `PreCommands`/`PostCommands`.
    Following the old rule would reintroduce the obsolete startup path and fight the
    new architecture.
  severity: high
- rule: For new tests, add specification tests, provider overrides, unit tests, and
    baseline capture.
  source:
    path: .agents/skills/testing/SKILL.md
    lines: 69-72
  source_text: '1. **Specification test**: Add to `EFCore.Specification.Tests` (core)
    or `EFCore.Relational.Specification.Tests` (relational)

    2. **Provider override**: Override in `EFCore.{Provider}.FunctionalTests` with
    `AssertSql()`

    3. **Unit test**: Add to `EFCore.{Provider}.Tests`

    4. Run with `EF_TEST_REWRITE_BASELINES=1` to capture initial baselines'
  collision_type: scope_ambiguity
  why_distracting: The diff is entirely about Cosmos test infrastructure and emulator
    bootstrapping, not about adding a new query/update behavior that needs spec/provider/unit
    coverage. An agent working in `test/EFCore.Cosmos.FunctionalTests/` could mistakenly
    treat this as a 'new test' change, but doing so would add unrelated coverage and
    not validate the actual container/bootstrap behavior being changed.
  severity: medium
hierarchy_analysis: The `.github/copilot-instructions.md` file provides general repository
  guidelines. However, the prompt's specific instruction to 'match the pattern already
  established for SQL Server' overrides the general instruction 'Don't copy code that
  follows the same pattern in a different context.' Furthermore, rules regarding public
  APIs and internal namespaces are scoped to the main product code and should not
  be applied to the test utilities being modified in this PR.
