  source:
    path: README.md
    lines: 77-79
    commit: d2c3c1c39e788708e648247ea967ff7d78f3e755
  reference: '#### Background worker note


    The Docker Compose stack starts a dedicated worker container by default. If `REDIS_URL`
    is not configured, the worker will start, log that it is idle, and do no queue
    processing. This is expected. Queue-backed API, webhook, and schedule execution
    requires Redis; installs without Redis continue to use the inline execution path.


    bun run dev:full  # Starts Next.js app, realtime socket server, and the BullMQ
    worker

    If `REDIS_URL` is not configured, the worker will remai'
- rule: helm/sim/README.md documents the Worker and Redis relationship
  source:
    path: helm/sim/README.md
    lines: 712-725
    commit: d2c3c1c39e788708e648247ea967ff7d78f3e755
  reference: "### Worker and Redis\n\nThe Helm chart enables the BullMQ worker by\
    \ default so the deployment topology matches Docker Compose. If `REDIS_URL` is\
    \ not configured, the worker pod will still start but remain idle and do no queue\
    \ processing. This is expected.\n\nQueue-backed API, webhook, and schedule execution\
    \ requires Redis. Installs without Redis continue to use the inline execution\
    \ path. If you do not want the worker pod at all, set:\n\n```yaml\nworker:\n \
    \ enabled: false\n```"
