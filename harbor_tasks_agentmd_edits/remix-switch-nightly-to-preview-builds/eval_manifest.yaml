version: "2.0"

source:
  repo: "remix-run/remix"
  pr: 11003
  base_commit: "721dac4c6704d5b3e8428887af21accdcb3b23ea"
  merge_commit: "5d080eb4aa24c706915844a6ea2fa0606598aef8"

checks:
  # Gates — syntax / structural
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified TypeScript and YAML files parse without errors"

  # Code behavior — fail-to-pass
  - id: setup_script_requires_positional_arg
    type: fail_to_pass
    origin: pr_diff
    description: "setup-installable-branch.ts requires branch name as positional arg, no default"

  - id: nightly_workflow_removed
    type: fail_to_pass
    origin: pr_diff
    description: "nightly.yml workflow is deleted"

  - id: preview_workflow_continuous_build
    type: fail_to_pass
    origin: pr_diff
    description: "preview.yml triggers on push to main with separate event handling"

  # Config/documentation — fail-to-pass
  - id: readme_documents_preview_install
    type: fail_to_pass
    origin: pr_diff
    description: "README.md documents preview branch install command, not nightly"

  - id: contributing_documents_preview_builds
    type: fail_to_pass
    origin: pr_diff
    description: "CONTRIBUTING.md has Preview builds section with preview branch reference"

  # Anti-regression — fail-to-pass
  - id: setup_script_no_overwrite_protection
    type: fail_to_pass
    origin: pr_diff
    description: "Script has no branch overwrite protection (removed along with nightly default)"

rubric:
  - rule: "Config updates are consistent with the existing documentation style"
    source:
      path: "CONTRIBUTING.md"
      lines: "1-10"
      commit: "721dac4c6704d5b3e8428887af21accdcb3b23ea"
