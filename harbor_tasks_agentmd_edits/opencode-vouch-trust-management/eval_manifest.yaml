distractors:
- rule: Prefer functional array methods (flatMap, filter, map) over for loops
  collision_type: would_cause_bug
  why_distracting: The GitHub script in `compliance-close.yml` uses a `for (const
    item of items)` loop because it needs to make asynchronous API calls (`await github.rest.issues.listComments`)
    sequentially. Forcing functional array methods like `.forEach` or `.map` with
    `await` would either cause unhandled promises or require `Promise.all`, which
    could trigger GitHub API rate limits.
  severity: high
  source:
    path: AGENTS.md
    lines: 16-16
- rule: Avoid unnecessary destructuring. Use dot notation to preserve context.
  collision_type: scope_ambiguity
  why_distracting: 'The script uses `const { data: items } = await github.rest.issues.listForRepo(...)`
    which is the standard and expected pattern for extracting payloads from Octokit
    responses. Strictly avoiding destructuring here would make the code less idiomatic
    for GitHub Actions scripts.'
  severity: low
  source:
    path: AGENTS.md
    lines: 34-41
- rule: Prefer single word names for variables and functions. Only use multiple words
    if necessary.
  collision_type: scope_ambiguity
  why_distracting: The script uses multi-word variables like `complianceComment`,
    `commentAge`, `closeMessage`, and `twoHours` for clarity. Enforcing single-word
    variables in this context would reduce readability.
  severity: low
  source:
    path: AGENTS.md
    lines: 18-26
hierarchy_analysis: The rules in `AGENTS.md` are primarily geared towards the TypeScript/Bun
  application code (e.g., Drizzle schemas, Bun APIs). However, this PR involves writing
  JavaScript within a GitHub Actions workflow (`github-script`). Some general TS/JS
  rules apply (like early returns and ternaries), but others (like avoiding for-loops
  or destructuring) conflict with standard Octokit/GitHub Actions idioms.
