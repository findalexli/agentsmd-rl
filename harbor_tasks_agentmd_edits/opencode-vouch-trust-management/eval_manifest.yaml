version: "2.0"

source:
  repo: "anomalyco/opencode"
  pr: 12640
  base_commit: "31f893f8cb7cbec11ae743b4ead806c201a396b7"
  merge_commit: "3118cab2d823920c507d82fa3e5120ddda951e12"

checks:
  # ---------------------------------------------------------------------------
  # Static syntax checks (pass_to_pass)
  # ---------------------------------------------------------------------------
  - id: workflow_syntax_valid
    type: pass_to_pass
    origin: static
    description: "All workflow YAML files must be valid and parseable"

  - id: vouched_td_syntax_valid
    type: pass_to_pass
    origin: static
    description: "VOUCHED.td file must exist and follow expected format"

  # ---------------------------------------------------------------------------
  # Fail-to-pass (pr_diff) — workflow structure tests
  # ---------------------------------------------------------------------------
  - id: vouch_check_issue_workflow_structure
    type: fail_to_pass
    origin: pr_diff
    description: "vouch-check-issue.yml must have correct structure for checking denounced users"

  - id: vouch_check_pr_workflow_structure
    type: fail_to_pass
    origin: pr_diff
    description: "vouch-check-pr.yml must have correct structure for checking PR authors"

  - id: compliance_close_workflow_structure
    type: fail_to_pass
    origin: pr_diff
    description: "compliance-close.yml must check for issues/PRs with needs:compliance label"

  - id: duplicate_issues_workflow_updated
    type: fail_to_pass
    origin: pr_diff
    description: "duplicate-issues.yml must be updated with compliance check logic"

  # ---------------------------------------------------------------------------
  # Fail-to-pass (pr_diff) — config/documentation update tests (REQUIRED for agentmd-edit)
  # ---------------------------------------------------------------------------
  - id: contributing_md_documents_vouch_system
    type: fail_to_pass
    origin: pr_diff
    description: "CONTRIBUTING.md must document the vouch trust management system"

  - id: contributing_md_documents_issue_requirements
    type: fail_to_pass
    origin: pr_diff
    description: "CONTRIBUTING.md must document issue template requirements"

  - id: issue_template_config_disables_blank_issues
    type: fail_to_pass
    origin: pr_diff
    description: "ISSUE_TEMPLATE/config.yml must disable blank issues"

  # ---------------------------------------------------------------------------
  # Pass-to-pass (static) — anti-stub
  # ---------------------------------------------------------------------------
  - id: vouch_workflows_not_empty
    type: pass_to_pass
    origin: static
    description: "Vouch workflow files must have substantial content, not just stubs"

  - id: contributing_section_not_stub
    type: pass_to_pass
    origin: static
    description: "CONTRIBUTING.md vouch section must have substantial content"

rubric:
  # Soft rules for LLM judge — consistency with existing style
  - rule: "Documentation should be consistent with the style of existing CONTRIBUTING.md sections"
    source:
      path: "CONTRIBUTING.md"
      lines: "1-50"
      commit: "31f893f8cb7cbec11ae743b4ead806c201a396b7"
