distractors:
- rule: Maintain existing Go versions and dependencies unless explicitly asked to
    change them
  collision_type: rule_conflict
  why_distracting: The agent might hesitate to update the echo dependency to v5 or
    the Go version to 1.25+ because of the instruction to maintain existing dependencies,
    potentially missing the 'unless explicitly asked' exception.
  severity: high
  source:
    path: CLAUDE.md
    lines: '61'
- rule: When adding a new integration, mirror an existing one.
  collision_type: architecture_boundary
  why_distracting: Because Echo v5 introduces breaking changes, an agent might decide
    to create a new echov5/ integration sub-module to avoid breaking existing v4 users,
    rather than upgrading the existing echo/ module in place.
  severity: medium
  source:
    path: CLAUDE.md
    lines: '42'
- rule: Public API in root package; internals in `/internal`
  collision_type: architecture_boundary
  why_distracting: The agent might try to move the sentryecho package into the root
    sentry package or an internal directory, misunderstanding how integration sub-modules
    expose their own public APIs.
  severity: low
  source:
    path: CLAUDE.md
    lines: '63'
hierarchy_analysis: CLAUDE.md and AGENTS.md are identical. The rules apply globally.
  The agent must carefully balance the general rule to 'Maintain existing Go versions'
  against the explicit prompt instructions to upgrade to Echo v5 and Go 1.25+.
