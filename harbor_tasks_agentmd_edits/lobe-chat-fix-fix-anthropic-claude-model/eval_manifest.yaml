    \ { data: item, message: 'Created', success: true };\n    } catch (error) {\n\
    \      if (error instanceof TRPCError) throw error;\n      console.error('[foo:create]',\
    \ error);\n      throw new TRPCError({\n        cause: error,\n        code: 'INTERNAL_SERVER_ERROR',\n\
    \        message: 'Failed to create',\n      });\n    }\n  }),\n});\n```\n\n###\
