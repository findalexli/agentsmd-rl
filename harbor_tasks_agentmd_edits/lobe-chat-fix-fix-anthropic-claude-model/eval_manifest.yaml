    \ Use when creating or modifying TRPC routers (src/server/routers/**), adding\
    \ procedures, or working with server-side API endpoints. Triggers on TRPC router\
    \ creation, procedure implementation, or API endpoint tasks.\n---\n\n# TRPC Router\
    \ Guide\n\n## File Location\n\n- Routers: `src/server/routers/lambda/<domain>.ts`\n\
    - Helpers: `src/server/routers/lambda/_helpers/`\n- Schemas: `src/server/routers/lambda/_schema/`\n\
    \n## Router Structure\n\n### Imports\n\n```typescript\nimport { TRPCError } from\
    \ '@trpc/server';\nimport { z } from 'zod';\n\nimport { SomeModel } from '@/database/models/some';\n\
    import { authedProcedure, router } from '@/libs/trpc/lambda';\nimport { serverDatabase\
    \ } from '@/libs/trpc/lambda/middleware';\n```\n\n### Middleware: Inject Models\
    \ into ctx\n\n**Always use middleware to inject models into `ctx`** instead of\
    \ creating `new Model(ctx.serverDB, ctx.userId)` inside every procedure.\n\n```typescript\n\
    const domainProcedure = authedProcedure.use(serverDatabase).use(async (opts) =>\
    \ {\n  const { ctx } = opts;\n  return opts.next({\n    ctx: {\n      fooModel:\
    \ new FooModel(ctx.serverDB, ctx.userId),\n      barModel: new BarModel(ctx.serverDB,\
    \ ctx.userId),\n    },\n  });\n});\n```\n\nThen use `ctx.fooModel` in procedures:\n\
    \n```typescript\n// Good\nconst model = ctx.fooModel;\n\n// Bad - don't create\
    \ models inside procedures\nconst model = new FooModel(ctx.serverDB, ctx.userId);\n\
    ```\n\n**Exception**: When a model needs a different `userId` (e.g., watchdog\
    \ iterating over multiple users' tasks), create it inline.\n\n### Procedure Pattern\n\
    \n```typescript\nexport const fooRouter = router({\n  // Query\n  find: domainProcedure.input(z.object({\
    \ id: z.string() })).query(async ({ input, ctx }) => {\n    try {\n      const\
    \ item = await ctx.fooModel.findById(input.id);\n      if (!item) throw new TRPCError({\
    \ code: 'NOT_FOUND', message: 'Not found' });\n      return { data: item, success:\
    \ true };\n    } catch (error) {\n      if (error instanceof TRPCError) throw\
    \ error;\n      console.error('[foo:find]', error);\n      throw new TRPCError({\n\
    \        cause: error,\n        code: 'INTERNAL_SERVER_ERROR',\n        message:\
