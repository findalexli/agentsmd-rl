distractors:
- rule: API views should declare request/response schemas — prefer `@validated_request`
    from `posthog.api.mixins` or `@extend_schema` from drf-spectacular.
  collision_type: architecture_boundary
  why_distracting: The agent might try to implement the response filtering by modifying
    the Django API views or serializers using `@extend_schema` to create a new response
    schema, rather than implementing it in the MCP tool generation layer as requested.
  severity: high
  source:
    path: AGENTS.md
    lines: 50-54
- rule: Django serializers are the source of truth for frontend API types — `hogli
    build:openapi` generates TypeScript via drf-spectacular + Orval.
  collision_type: scope_ambiguity
  why_distracting: The agent might try to run `hogli build:openapi` or modify serializers
    to change the generated Orval types, but the filtering is meant to be applied
    dynamically at runtime in the MCP tools, not by changing the underlying API types.
  severity: medium
  source:
    path: AGENTS.md
    lines: 55-57
- rule: DO NOT GIVE ME HIGH LEVEL SHIT, IF I ASK FOR FIX OR EXPLANATION, I WANT ACTUAL
    CODE OR EXPLANATION!
  collision_type: meta_confusion
  why_distracting: The agent might skip updating the documentation (SKILL.md, README.md,
    handbook) because it thinks it should only provide "ACTUAL CODE" and not high-level
    explanations or docs, despite the prompt explicitly asking for doc updates.
  severity: medium
  source:
    path: .cursorrules
    lines: 1-1
hierarchy_analysis: The `.cursorrules` file contains general behavioral instructions,
  while `AGENTS.md` provides specific architectural guidelines. The instruction in
  `.cursorrules` to only provide 'ACTUAL CODE' conflicts with the prompt's explicit
  request to update documentation and the `AGENTS.md` guideline that treats agent
  instructions as maintainable documentation. The architectural guidelines in `AGENTS.md`
  regarding Django serializers and API views are highly relevant to the backend but
  must be carefully distinguished from the MCP tool generation layer, which operates
  downstream of the API.
