    - The skill may execute the final validation phase in parallel, but every step
    above must still pass.

    - Do not skip steps; stop and fix issues immediately when any step fails.

    - Re-run the full stack after applying fixes so the commands execute with the
    same barriers and coverage.

    - Keeps `pnpm i` and `pnpm build` as barriers, then'
