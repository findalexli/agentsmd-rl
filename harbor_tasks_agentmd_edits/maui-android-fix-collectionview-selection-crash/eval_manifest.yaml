rubric:
- rule: The agent must add a rule specifying that `#nullable enable` must be on line
    1 to `.github/copilot-instructions.md`
  source:
    path: .github/copilot-instructions.md
    lines: 133-140
    commit: ecd6428d324e395ca07f8d375600c0fc93d0dd3c
config_edits:
- path: .github/copilot-instructions.md
  tier: 1
  gold_added: "**\U0001F6A8 CRITICAL: `#nullable enable` must be line 1**\n\nEvery\
    \ `PublicAPI.Unshipped.txt` file starts with `#nullable enable` (often BOM-prefixed:\
    \ `\uFEFF#nullable enable`) on the **first line**. If this line is moved or removed,\
    \ the analyzer treats it as a declared API symbol and emits **RS0017** errors.\n\
    \n**Never sort these files with plain `sort`** — the BOM bytes (`0xEF 0xBB 0xBF`)\
    \ sort after ASCII characters under `LC_ALL=C`, pushing `#nullable enable` to\
    \ the bottom of the file.\n\nWhen resolving merge conflicts or adding entries,\
    \ use this safe pattern that preserves line 1:\n```bash\nfor f in $(git diff --name-only\
    \ --diff-filter=U | grep \"PublicAPI.Unshipped.txt\"); do\n  # Extract and preserve\
    \ the #nullable enable line (with or without BOM)\n  HEADER=$(head -1 \"$f\" |\
    \ grep -o '.*#nullable enable' || echo '#nullable enable')\n  # Strip conflict\
    \ markers, remove all #nullable lines, sort+dedup the API entries\n  grep -v '^<<<<<<\\\
    |^======\\|^>>>>>>\\|#nullable enable' \"$f\" | LC_ALL=C sort -u | sed '/^$/d'\
    \ > /tmp/api_fix.txt\n  # Reassemble: header first, then sorted entries\n  printf\
    \ '%s\\n' \"$HEADER\" > \"$f\"\n  cat /tmp/api_fix.txt >> \"$f\"\n  git add \"\
    $f\"\ndone\n```"
  gold_removed: ''
