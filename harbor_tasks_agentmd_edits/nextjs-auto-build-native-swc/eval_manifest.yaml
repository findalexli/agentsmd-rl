distractors:
- rule: '- **Edited Turbopack (Rust)?** → `pnpm swc-build-native`'
  collision_type: meta_confusion
  why_distracting: The agent reads `AGENTS.md` as its system instructions, which explicitly
    tell it to use `pnpm swc-build-native` for Rust changes. However, the PR's goal
    is to deprecate this exact workflow and update the instructions. The agent might
    hesitate to modify its own instructions or might try to preserve the old command
    because it's listed as a rule.
  severity: high
  source:
    path: AGENTS.md
    lines: 367-370
- rule: If you are changing Next.js source or integration tests, start `pnpm --filter=next
    dev` in a separate terminal session before making edits
  collision_type: scope_ambiguity
  why_distracting: The agent is instructed to start `pnpm --filter=next dev` in a
    separate terminal session before making edits. However, this task is about modifying
    the build pipeline for native SWC binaries (`pnpm build`), not the Next.js dev
    server. Starting the dev server is unnecessary and wastes time/resources for this
    specific task.
  severity: medium
  source:
    path: AGENTS.md
    lines: 70-75
hierarchy_analysis: 'The `CLAUDE.md` and `AGENTS.md` files are identical symlinks.
  The primary challenge here is meta-confusion: the agent is asked to modify the very
  instructions (`AGENTS.md`) that it uses to guide its own behavior. It must recognize
  that the prompt''s instructions to update the build workflow override the existing
  static rules in the config file.'
