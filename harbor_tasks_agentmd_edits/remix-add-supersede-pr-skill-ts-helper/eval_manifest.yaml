      path: "AGENTS.md"
      lines: "26"
      commit: "64b3a160dc25bbb082b96673e12bb55935f3528d"

  - id: script_uses_let_not_var
    type: pass_to_pass
    origin: agent_config
    description: "TS script follows AGENTS.md let/const convention (no var)"
    source:
      path: "AGENTS.md"
      lines: "26"
      commit: "64b3a160dc25bbb082b96673e12bb55935f3528d"

rubric:
  - rule: "Only add non-JSDoc comments when the code is doing something surprising or non-obvious"
    source:
      path: "AGENTS.md"
      lines: "33"
      commit: "64b3a160dc25bbb082b96673e12bb55935f3528d"
