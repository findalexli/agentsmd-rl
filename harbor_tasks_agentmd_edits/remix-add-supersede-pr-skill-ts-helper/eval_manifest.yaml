    type: fail_to_pass
    origin: pr_diff
    description: "close_superseded_pr.ts --help prints usage and exits 0"

  - id: script_rejects_same_pr
    type: fail_to_pass
    origin: pr_diff
    description: "Script rejects when old_pr equals new_pr"

  - id: script_rejects_non_numeric
    type: fail_to_pass
    origin: pr_diff
    description: "Script rejects non-numeric PR numbers"

  - id: supersede_pr_skill_md
    type: fail_to_pass
    origin: pr_diff
    description: "supersede-pr SKILL.md exists with correct frontmatter and content"

  - id: make_pr_skill_md
    type: fail_to_pass
    origin: pr_diff
    description: "make-pr SKILL.md exists with correct frontmatter and content"

  - id: agents_md_scripts_rule
    type: fail_to_pass
    origin: pr_diff
    description: "AGENTS.md documents one-off scripts as TypeScript convention"

  - id: agents_md_skills_section
    type: fail_to_pass
    origin: pr_diff
    description: "AGENTS.md has Skills section listing both supersede-pr and make-pr"

  - id: agents_md_preserves_let_rule
    type: pass_to_pass
    origin: agent_config
    description: "AGENTS.md still has the let/const variable convention"
