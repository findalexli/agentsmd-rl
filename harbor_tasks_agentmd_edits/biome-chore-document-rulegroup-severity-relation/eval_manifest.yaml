  tier: 2
  gold_added: "- [Rule group and severity](#rule-group-and-severity)\n#### Rule group\
    \ and severity\n\n> [!NOTE]\n> This section is relevant to Biome maintainers when\
    \ they want to move (promote) a rule to a group that is not `nursery`.\n\nWe try\
    \ to maintain consistency in the default severity level and group membership of\
    \ the rules.\nFor legacy reasons, we have some rules that don't follow these constraints.\n\
    \n- `correctness`, `security`, and `a11y` rules **must** have a severity set to\
    \ `error`.\n\n  If `error` is too strict for a rule, then it should certainly\
    \ be in another group (for example `suspicious` instead of `correctness`).\n\n\
    - `style` rules **must** have a severity set to `info` or `warn`. If in doubt,\
    \ choose `info`.\n\n- `complexity` rules **must** have a severity set to `warn`\
    \ or `info`. If in doubt, choose `info`.\n\n- `suspicious` rules **must** have\
    \ a severity set to `warn` or `error`. If in doubt, choose `warn`.\n\n- `performance`\
    \ rules **must** have a severity set to `warn`.\n\n- Actions **must** have a severity\
    \ set to `info`."
