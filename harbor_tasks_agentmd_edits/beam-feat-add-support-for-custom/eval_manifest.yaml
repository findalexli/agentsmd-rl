version: "2.0"

source:
  repo: "apache/beam"
  pr: 37155
  base_commit: "be8dfed0530d9192454e410b7d5842651f35ffd6"
  merge_commit: ""

checks:
  # ---------------------------------------------------------------------------
  # Syntax/compilation checks (pass_to_pass)
  # ---------------------------------------------------------------------------
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified Python files must parse without errors"

  # ---------------------------------------------------------------------------
  # Core behavioral tests (fail_to_pass) - the invoke_route feature
  # ---------------------------------------------------------------------------
  - id: invoke_route_parameter_stored
    type: fail_to_pass
    origin: pr_diff
    description: "VertexAIModelHandlerJSON accepts and stores invoke_route parameter"

  - id: parse_invoke_response_predictions_key
    type: fail_to_pass
    origin: pr_diff
    description: "_parse_invoke_response correctly parses Vertex AI response with 'predictions' key"

  - id: parse_invoke_response_list_format
    type: fail_to_pass
    origin: pr_diff
    description: "_parse_invoke_response correctly parses response as a list of predictions"

  - id: parse_invoke_response_single_prediction
    type: fail_to_pass
    origin: pr_diff
    description: "_parse_invoke_response correctly handles single prediction response"

  - id: parse_invoke_response_non_json
    type: fail_to_pass
    origin: pr_diff
    description: "_parse_invoke_response correctly handles non-JSON response by returning raw bytes"

  - id: yaml_wrapper_accepts_invoke_route
    type: fail_to_pass
    origin: pr_diff
    description: "VertexAIRunInference YAML wrapper accepts and passes invoke_route parameter"

  - id: handler_not_stub
    type: fail_to_pass
    origin: pr_diff
    description: "VertexAIModelHandlerJSON._parse_invoke_response method exists with real logic"

  # ---------------------------------------------------------------------------
  # Repo CI tests (pass_to_pass) - linting and formatting
  # ---------------------------------------------------------------------------
  - id: repo_pylint
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's pylint passes on modified files"

  - id: repo_yapf
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's yapf formatting check passes on vertex_ai_inference.py"

  - id: repo_yapf_yaml_ml
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's yapf formatting check passes on yaml_ml.py"

rubric:
  - rule: "Follow the Google Python Style Guide naming conventions: use snake_case for functions/methods/variables, PascalCase for classes, and 2-space indentation"
    source:
      path: "sdks/python/.pylintrc"
      lines: "48-66,194"
      commit: "be8dfed0530d9192454e410b7d5842651f35ffd6"

  - rule: "Use yapf for code formatting with the project's configuration (yapf==0.43.0). Run 'tox -e py3-yapf' to auto-format or 'tox -e py3-yapf-check' to verify"
    source:
      path: "contributor-docs/python-tips.md"
      lines: "282-350"
      commit: "be8dfed0530d9192454e410b7d5842651f35ffd6"

  - rule: "Include the Apache License 2.0 header at the top of every new Python file"
    source:
      path: "sdks/python/apache_beam/ml/inference/vertex_ai_inference.py"
      lines: "1-16"
      commit: "be8dfed0530d9192454e410b7d5842651f35ffd6"

  - rule: "Document all public methods, classes, and modules with descriptive docstrings. Functions over 10 lines must have docstrings. Use Args/Returns/Raises sections for clarity"
    source:
      path: "sdks/python/.pylintrc"
      lines: "25-29"
      commit: "be8dfed0530d9192454e410b7d5842651f35ffd6"

  - rule: "Follow existing code patterns in the module. For ML inference handlers, match the existing structure: store parameters as private instance variables (e.g., self._param), use type hints in method signatures, and follow the RemoteModelHandler interface"
    source:
      path: "sdks/python/apache_beam/ml/inference/vertex_ai_inference.py"
      lines: "55-120"
      commit: "be8dfed0530d9192454e410b7d5842651f35ffd6"
