hierarchy_analysis: The `AGENTS.md` file contains rules primarily targeted at the
  published packages in the `packages/` directory (e.g., runtime-agnostic philosophy,
  changesets). However, the task involves creating internal tooling scripts in the
  `skills/` directory. This creates a scope ambiguity where the agent must discern
  which rules apply to library code versus internal Node.js scripts. The gold solution
  resolves this by explicitly adding a new rule to `AGENTS.md` that carves out an
  exception for one-off scripts, specifying they should be executable natively with
  modern Node.js.
