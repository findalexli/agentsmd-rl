version: "2.0"

source:
  repo: "anomalyco/opencode"
  pr: 17072
  base_commit: "2aae0d3493ac51aa2fd3929c6db0814ab795b04b"
  merge_commit: "981c7b9e375b7d9ac57d2d6a3179451139b2b99b"

checks:
  # ---------------------------------------------------------------------------
  # Gates (pass_to_pass, static) — syntax / compilation checks
  # ---------------------------------------------------------------------------

  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified TypeScript files must compile without errors"

  # ---------------------------------------------------------------------------
  # Pass-to-pass (repo_tests) — CI/CD checks that must pass on base commit
  # ---------------------------------------------------------------------------

  - id: test_repo_typecheck
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's typecheck (tsgo --noEmit) passes on base commit"

  - id: test_repo_account_tests
    type: pass_to_pass
    origin: repo_tests
    description: "Account tests pass on base commit"

  # ---------------------------------------------------------------------------
  # Fail-to-pass (pr_diff) — core behavioral tests
  # ---------------------------------------------------------------------------

  - id: repo_passes_account_tests
    type: fail_to_pass
    origin: pr_diff
    description: "Account repo and service tests must pass after the refactor"

  - id: schema_has_branded_types
    type: fail_to_pass
    origin: pr_diff
    description: "Schema must define RefreshToken, DeviceCode, UserCode branded types"

  - id: service_uses_layer_effect
    type: fail_to_pass
    origin: pr_diff
    description: "AccountService must use Layer.effect with Effect.gen pattern"

  - id: repo_uses_layer_effect
    type: fail_to_pass
    origin: pr_diff
    description: "AccountRepo must use Layer.effect with Effect.gen pattern"

  # ---------------------------------------------------------------------------
  # Pass-to-pass (pr_diff) — regression + anti-stub
  # ---------------------------------------------------------------------------

  - id: service_has_namespace
    type: pass_to_pass
    origin: pr_diff
    description: "AccountService must export namespace with Service interface"

  - id: schema_uses_class_for_data_types
    type: pass_to_pass
    origin: pr_diff
    description: "Data types like Login, User, ClientId must use Schema.Class and Duration"

  # ---------------------------------------------------------------------------
  # Fail-to-pass (pr_diff) — AGENTS.md Effect guide ADDED by this PR
  # ---------------------------------------------------------------------------

  - id: agents_md_has_effect_guide
    type: fail_to_pass
    origin: pr_diff
    description: "AGENTS.md must include the opencode Effect guide section"

  - id: agents_md_schemas_rule
    type: fail_to_pass
    origin: pr_diff
    description: "AGENTS.md must document Schema.Class for data types and Schema.brand for single-value types"

  - id: agents_md_services_rule
    type: fail_to_pass
    origin: pr_diff
    description: "AGENTS.md must document Layer.effect pattern for services"

  - id: agents_md_effects_rule
    type: fail_to_pass
    origin: pr_diff
    description: "AGENTS.md must document Effect.gen and Effect.fn patterns"

  - id: agents_md_errors_rule
    type: fail_to_pass
    origin: pr_diff
    description: "AGENTS.md must document preferring 'yield* new MyError' over 'yield* Effect.fail'"

rubric: []
