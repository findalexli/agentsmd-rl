rubric:
- rule: Services must use Layer.effect with Effect.gen pattern, not Layer.succeed
    with plain objects
  source:
    path: packages/opencode/AGENTS.md
    lines: 14-15
    commit: 2aae0d3493ac51aa2fd3929c6db0814ab795b04b
  reference: In `Layer.effect`, always return service implementations with `ServiceName.of({
    ... })`, never a plain object.
- rule: Data types with multiple fields must use Schema.Class, not Schema.Struct
  source:
    path: packages/opencode/AGENTS.md
    lines: '12'
    commit: 2aae0d3493ac51aa2fd3929c6db0814ab795b04b
  reference: Use `Schema.Class` for data types with multiple fields.
- rule: Single-value types must use branded schemas (Schema.brand)
  source:
    path: packages/opencode/AGENTS.md
    lines: '13'
    commit: 2aae0d3493ac51aa2fd3929c6db0814ab795b04b
  reference: Use branded schemas (`Schema.brand`) for single-value types.
- rule: Internal helpers must use Effect.fnUntraced, public methods must use Effect.fn
    with name
  source:
    path: packages/opencode/AGENTS.md
    lines: '25'
    commit: 2aae0d3493ac51aa2fd3929c6db0814ab795b04b
  reference: Use `Effect.fn("ServiceName.method")` for named/traced effects and `Effect.fnUntraced`
    for internal helpers.
- rule: In Effect.gen, prefer 'yield* new MyError()' over 'yield* Effect.fail(new
    MyError())'
  source:
    path: packages/opencode/AGENTS.md
    lines: 21-22,31-32
    commit: 2aae0d3493ac51aa2fd3929c6db0814ab795b04b
  reference: In `Effect.gen`, prefer `yield* new MyError(...)` over `yield* Effect.fail(new
    MyError(...))` for direct early-failure branches.
