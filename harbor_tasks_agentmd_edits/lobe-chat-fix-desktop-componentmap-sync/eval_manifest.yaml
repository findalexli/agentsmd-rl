version: "2.0"

source:
  repo: "lobehub/lobe-chat"
  pr: 13243
  base_commit: "991de25b9757697553e1180096d8e1d5b8c0d83a"
  merge_commit: "04ddb992d1bfb72e4070ad65ce9c14ee91cf9a94"

checks:
  # Code behavior: componentMap sync
  - id: componentmap_desktop_has_stats
    type: fail_to_pass
    origin: pr_diff
    description: "componentMap.desktop.ts must include Stats entry"

  - id: componentmap_desktop_has_creds
    type: fail_to_pass
    origin: pr_diff
    description: "componentMap.desktop.ts must include Creds entry"

  - id: componentmap_desktop_keys_match_web
    type: fail_to_pass
    origin: pr_diff
    description: "Desktop componentMap keys must be a superset of web componentMap keys"

  # Code behavior: desktopRouter sync
  - id: desktop_router_has_onboarding_route
    type: fail_to_pass
    origin: pr_diff
    description: "desktopRouter.config.desktop.tsx must include /onboarding path"

  - id: desktop_router_paths_match_web
    type: fail_to_pass
    origin: pr_diff
    description: "Desktop router config paths must include all paths from web router config"

  # Config/documentation update tests
  - id: react_skill_documents_desktop_sync_rule
    type: fail_to_pass
    origin: pr_diff
    description: "react/SKILL.md must document the .desktop file sync rule"

  - id: spa_routes_skill_documents_desktop_parity
    type: fail_to_pass
    origin: pr_diff
    description: "spa-routes/SKILL.md must document desktop router parity requirement"

  - id: code_review_skill_has_spa_routing_check
    type: fail_to_pass
    origin: pr_diff
    description: "code-review/SKILL.md must include SPA/routing section for desktopRouter pair"

  # Pass-to-pass: regression checks
  - id: componentmap_desktop_imports_stats
    type: pass_to_pass
    origin: static
    description: "componentMap.desktop.ts must import the Stats component"

  - id: componentmap_desktop_imports_creds
    type: pass_to_pass
    origin: static
    description: "componentMap.desktop.ts must import the Creds component"

rubric:
  - rule: "Config documentation updates should be consistent with the style of existing skill documentation in the repo"
    source:
      path: ".agents/skills/react/SKILL.md"
      lines: "1-10"
      commit: "991de25b9757697553e1180096d8e1d5b8c0d83a"
