version: "2.0"

source:
  repo: "gradio-app/gradio"
  pr: 11766
  base_commit: "5a4ae4926b9dadefd5cf9d0225f5e8ed69eebb51"
  merge_commit: "dfc0e0305068dbd16ce905afc73d139e1e51eb46"

checks:
  # ---------------------------------------------------------------------------
  # Syntax/compilation gates (pass_to_pass)
  # ---------------------------------------------------------------------------
  - id: typescript_syntax_layout_server
    type: pass_to_pass
    origin: static
    description: "Layout server TypeScript file must be syntactically valid"

  - id: typescript_syntax_js_page_server
    type: pass_to_pass
    origin: static
    description: "JS page server TypeScript file must be syntactically valid"

  - id: typescript_syntax_jsdoc_page_server
    type: pass_to_pass
    origin: static
    description: "JSDoc page server TypeScript file must be syntactically valid"

  - id: typescript_syntax_js_client_page_server
    type: pass_to_pass
    origin: static
    description: "JS client page server TypeScript file must be syntactically valid"

  - id: package_json_valid
    type: pass_to_pass
    origin: static
    description: "Package.json must be valid JSON"

  # ---------------------------------------------------------------------------
  # Fail-to-pass (pr_diff) — core behavioral tests
  # ---------------------------------------------------------------------------
  - id: dataframe_readme_has_comprehensive_docs
    type: fail_to_pass
    origin: pr_diff
    description: "js/dataframe/README.md must have comprehensive standalone documentation with Install, Usage, Props, Events sections"

  - id: standalone_readme_deleted
    type: fail_to_pass
    origin: pr_diff
    description: "js/dataframe/standalone/README.md must be deleted (content moved to main README.md)"

  - id: website_layout_has_components_filter
    type: fail_to_pass
    origin: pr_diff
    description: "Website layout must filter js_pages to only include documented components (dataframe, js-client)"

  - id: website_js_page_dynamic_redirect
    type: fail_to_pass
    origin: pr_diff
    description: "JS index page must use dynamic redirect with urlExists instead of hardcoded atoms redirect"

  - id: package_exports_have_default
    type: fail_to_pass
    origin: pr_diff
    description: "Package.json exports must include 'default' field for proper module resolution"

  - id: prism_svelte_import_added
    type: fail_to_pass
    origin: pr_diff
    description: "Prism-svelte must be imported in documentation page servers for syntax highlighting"

  - id: language_map_extended
    type: fail_to_pass
    origin: pr_diff
    description: "Language map must include svelte, markdown, and css support"

  # ---------------------------------------------------------------------------
  # Pass-to-pass (static) — consistency checks
  # ---------------------------------------------------------------------------
  - id: types_field_unchanged
    type: pass_to_pass
    origin: static
    description: "Package.json types field should remain properly ordered"

  - id: navigation_links_removed
    type: pass_to_pass
    origin: static
    description: "Navigation next/prev links removed from documentation pages"

  # ---------------------------------------------------------------------------
  # Pass-to-pass (repo_tests) — CI/CD checks that must pass on base and after fix
  # ---------------------------------------------------------------------------
  - id: test_repo_package_json_valid_dataframe
    type: pass_to_pass
    origin: repo_tests
    description: "Dataframe package.json must be valid JSON"

  - id: test_repo_package_json_valid_code
    type: pass_to_pass
    origin: repo_tests
    description: "Code package.json must be valid JSON with proper exports"

  - id: test_repo_typescript_syntax_changelog_server
    type: pass_to_pass
    origin: repo_tests
    description: "Changelog server TypeScript file must be syntactically valid"

  - id: test_repo_typescript_syntax_storybook_server
    type: pass_to_pass
    origin: repo_tests
    description: "Storybook page server TypeScript file must be syntactically valid"

  - id: test_repo_readme_exists_dataframe
    type: pass_to_pass
    origin: repo_tests
    description: "Dataframe README.md must exist with substantial content"

  - id: test_repo_website_layout_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Website layout server must have valid TypeScript syntax and required functions"

  # ---------------------------------------------------------------------------
  # Pass-to-pass (repo_tests) — CI/CD pipeline checks
  # Discovered from .github/workflows/tests-js.yml and package.json
  # ---------------------------------------------------------------------------
  - id: test_repo_format_check
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's Prettier format check passes (pnpm format:check)"

  - id: test_repo_lint
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's ESLint check passes (pnpm lint)"

  - id: test_repo_typecheck
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's TypeScript typecheck passes (pnpm ts:check)"

  - id: test_repo_client_builds
    type: pass_to_pass
    origin: repo_tests
    description: "Repo's @gradio/client package builds successfully (pnpm --filter @gradio/client build)"

rubric: []
