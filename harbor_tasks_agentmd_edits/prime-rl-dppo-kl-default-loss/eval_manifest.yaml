version: "2.0"

source:
  repo: "PrimeIntellect-ai/prime-rl"
  pr: 2187
  base_commit: "27645f39ab6f1550b2990ba4c5bb47be7f35402e"
  merge_commit: "adbf84ac9f37e285a358480b34d9f79b3d5951b3"

checks:
  # ---------------------------------------------------------------------------
  # Gates (pass_to_pass, static)
  # ---------------------------------------------------------------------------
  - id: syntax_check
    type: pass_to_pass
    origin: static
    description: "Modified Python files must parse without errors"

  - id: import_check
    type: pass_to_pass
    origin: static
    description: "Key modules can be imported without syntax errors"

  # ---------------------------------------------------------------------------
  # Gates (pass_to_pass, repo_tests)
  # ---------------------------------------------------------------------------
  - id: repo_py_compile
    type: pass_to_pass
    origin: repo_tests
    description: "Modified Python files compile without errors"

  - id: repo_ast_parse
    type: pass_to_pass
    origin: repo_tests
    description: "Modified Python files parse as valid AST"

  - id: repo_configs_ast
    type: pass_to_pass
    origin: repo_tests
    description: "DefaultLossConfig class exists in trainer.py"

  - id: repo_loss_ast
    type: pass_to_pass
    origin: repo_tests
    description: "default_loss_fn function exists in loss.py"

  # ---------------------------------------------------------------------------
  # Core behavioral changes (fail_to_pass, pr_diff)
  # ---------------------------------------------------------------------------
  - id: config_fields_renamed
    type: fail_to_pass
    origin: pr_diff
    description: "Config fields renamed from ipo_mask_* to dppo_mask_*"

  - id: loss_logic_updated
    type: fail_to_pass
    origin: pr_diff
    description: "Loss function uses new dppo_mask variables with advantage-based masking"

  - id: loss_docstring_updated
    type: fail_to_pass
    origin: pr_diff
    description: "Loss function docstring describes DPPO+KL instead of IPO"

  # ---------------------------------------------------------------------------
  # Config/documentation update (fail_to_pass, pr_diff)
  # ---------------------------------------------------------------------------
  - id: bugbot_documentation_updated
    type: fail_to_pass
    origin: pr_diff
    description: "BUGBOT.md updated with new breaking changes definition for config fields"

  # ---------------------------------------------------------------------------
  # Anti-stub (pass_to_pass, static)
  # ---------------------------------------------------------------------------
  - id: loss_function_not_stub
    type: pass_to_pass
    origin: static
    description: "default_loss_fn has meaningful implementation"

  - id: config_class_not_stub
    type: pass_to_pass
    origin: static
    description: "DefaultLossConfig has actual field definitions"

rubric:
  # AGENTS.md specifies keeping skills up to date when modifying code
  - rule: "When you make changes to the codebase, check if any skills need to be updated to stay accurate"
    source:
      path: "AGENTS.md"
      lines: "21-22"
      commit: "27645f39ab6f1550b2990ba4c5bb47be7f35402e"
