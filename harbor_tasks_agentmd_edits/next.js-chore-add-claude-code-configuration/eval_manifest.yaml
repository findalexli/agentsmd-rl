    '\n   ```\n\n   **Note:** For runs with >100 jobs, paginate:\n\n   ```bash\n \
    \  gh api \"repos/vercel/next.js/actions/runs/{run_id}/jobs?per_page=100&page=2\"\
    \n   ```\n\n5. Spawn parallel haiku subagents to analyze logs (limit to 3-4 to\
