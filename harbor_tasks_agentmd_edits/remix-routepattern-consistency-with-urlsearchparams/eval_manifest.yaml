  source:
    path: packages/route-pattern/README.md
    lines: '64'
    commit: ed39106b15827744b72c7f7416434668747b975d
  reference: "**Search params** narrow matches using `?key`, `?key=`, or `?key=value`.\
    \ Parsing and serialization follow `URLSearchParams` (`application/x-www-form-urlencoded`):\
    \ `?key` and `?key=` are the same constraint (stored as an empty `Set` in `ast.search`:\
    \ key must be present; empty value is OK), and spaces use `+` / `%20` like in\
    \ real query strings.\nnew RoutePattern('search?q') // same constraint as ?q=\
    \ \u2014 key must be present\n// More constrained search params = more specific\
    \ (`?q` and `?q=` tie)"
