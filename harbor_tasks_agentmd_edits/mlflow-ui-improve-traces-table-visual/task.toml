version = "1.0"
source_repo = "mlflow/mlflow"
source_pr = 20437

[metadata]
author_name = "Alex Li"
author_email = "alex@example.com"
difficulty = "medium"
category = "feature"
tags = ["mlflow", "uiux", "typescript", "react"]
expert_time_estimate_min = 20.0
junior_time_estimate_min = 45.0

[verifier]
env = { LLM_JUDGE = "${LLM_JUDGE:-0}", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}" }
timeout_sec = 180.0

[agent]
timeout_sec = 1800.0

[environment]
build_timeout_sec = 600.0
cpus = 2
memory_mb = 8192
storage_mb = 20480
allow_internet = true
