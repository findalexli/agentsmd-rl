  gold_added: "require access to the JavaScript isolate and context. By convention,\
    \ this argument is always named\n`js`.\n#### `js.error()`, `js.throwException()`,\
    \ and `JsExceptionThrown`\nWhen C++ code needs to throw a JavaScript exception:\n\
    1. Create the error object with `js.error(\"Error reason\")`\n2. Throw using `js.throwException()`\n\
    Under the hood, `js.throwException()` uses V8's lower level API, `isolate->ThrowException()`,\
    \ to\nthrow the exception in the V8 engine. It then throws a special C++ object\
    \ of type\n`JsExceptionThrown`, whose purpose is to unwind the C++ stack back\
    \ to the point where JavaScript\ncalled into C++. This C++ exception is caught\
    \ by JSG's callback glue before returning to V8. This\napproach is more ergonomic\
    \ than V8's convention of returning `v8::Maybe` values.\n\n#### `JSG_TRY` and\
    \ `JSG_CATCH`\n\nJSG provides `JSG_TRY` and `JSG_CATCH` macros which replace the\
    \ normal `try` and `catch` keywords\nwhen you need to catch exceptions as JavaScript\
    \ exceptions. Each take one argument: `JSG_TRY` takes\nthe `jsg::Lock&` reference,\
    \ and `JSG_CATCH` takes your desired variable name for the caught\nexception.\n\
    \n```cpp\nvoid someMethod(jsg::Lock& js) {\n  JSG_TRY(js) {\n    someThrowyCode();\n\
    \  }\n  JSG_CATCH(e) {\n    // Just rethrow.\n    js.throwException(kj::mv(e));\n\
    \  }\n}\n```\n\nThe example above actually illustrates a common, useful scenario\
    \ of coercing any exception thrown\ninto a JavaScript Error object. That is, if\
    \ `someThrowyCode()` in the example above throws a KJ C++\nexception, `JSG_CATCH(e)`\
    \ will catch it and convert it to a JavaScript error by calling\n`js.exceptionToJs()`."
  gold_removed: 'require access to the JavaScript isolate and context.

    #### `JsExceptionThrown`

    When C++ code needs to throw a JavaScript exception, it should:

    1. Call `isolate->ThrowException()` to set the JavaScript error value

    2. Throw `JsExceptionThrown()` as a C++ exception


    This C++ exception is caught by JSG''s callback glue before returning to V8. This
    approach is

    more ergonomic than V8''s convention of returning `v8::Maybe` values.'
