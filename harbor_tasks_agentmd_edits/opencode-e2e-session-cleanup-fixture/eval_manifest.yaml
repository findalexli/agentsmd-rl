config_edits:
- path: packages/app/e2e/AGENTS.md
  tier: 1
  gold_added: '- withProject(...) - Create temp project/workspace

    - trackSession(sessionID, directory?) - Register session for fixture cleanup

    - trackDirectory(directory) - Register directory for fixture cleanup

    Tests should clean up after themselves. Prefer fixture-managed cleanup:

    - Prefer withSession(...) for temp sessions

    - In withProject(...) tests that create sessions or extra workspaces, call trackSession(sessionID,
    directory?) and trackDirectory(directory)

    - This lets fixture teardown abort, wait for idle, and clean up safely under CI
    concurrency

    - Avoid calling sdk.session.delete(...) directly'
  gold_removed: 'Tests should clean up after themselves:'
distractors:
- rule: Prefer single word names for variables and functions. THIS RULE IS MANDATORY
    FOR AGENT WRITTEN CODE.
  collision_type: scope_ambiguity
  why_distracting: The PR explicitly requests adding specific multi-word functions
    like `cleanupSession`, `waitSessionIdle`, `trackSession`, and `trackDirectory`.
    An agent strictly following the mandatory single-word naming rule might name these
    `cleanup`, `wait`, or `track`, which would fail to match the expected behavior
    described in the prompt and be ambiguous in the context of e2e test fixtures.
  severity: high
  source:
    path: AGENTS.md
    lines: 21-34
- rule: Rely on type inference when possible; avoid explicit type annotations or interfaces
    unless necessary for exports or clarity
  collision_type: would_cause_bug
  why_distracting: The new helper functions (`status`, `stable`, `waitSessionIdle`,
    `cleanupSession`) require the `sdk` parameter to be explicitly typed as `ReturnType<typeof
    createSdk>`. If an agent relies entirely on type inference and omits the parameter
    type, TypeScript will throw an implicit `any` error, breaking the build.
  severity: high
  source:
    path: AGENTS.md
    lines: '17'
- rule: Keep things in one function unless composable or reusable
  collision_type: scope_ambiguity
  why_distracting: An agent might try to cram all the polling, status checking, and
    aborting logic directly into `cleanupSession` or `withSession` to avoid creating
    multiple functions. However, breaking it down into `status`, `stable`, and `waitSessionIdle`
    makes the complex polling logic readable and reusable.
  severity: medium
  source:
    path: AGENTS.md
    lines: '12'
hierarchy_analysis: The root `AGENTS.md` provides general TypeScript/style guidelines
  (single-word names, no try/catch, type inference), while `packages/app/e2e/AGENTS.md`
  provides specific e2e testing patterns. The agent must balance the strict root-level
  naming and typing rules with the practical requirements of Playwright e2e fixtures,
  where explicit types for parameters are often necessary and descriptive multi-word
  names (like `cleanupSession`) are required by the prompt.
