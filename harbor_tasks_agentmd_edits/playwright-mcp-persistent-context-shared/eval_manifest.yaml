  - rule: "Always add tests when removing features to verify behavior"
    source:
      path: "CLAUDE.md"
      lines: "108-120"
      commit: "114f3a296a78dfbc1eb6631bb358e9fe9b1677bb"
    collision_type: scope_ambiguity
