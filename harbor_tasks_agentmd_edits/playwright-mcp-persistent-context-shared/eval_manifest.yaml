  - rule: "CLI options should remain for backward compatibility even when deprecated"
    source:
      path: "CLAUDE.md"
      lines: "97-125"
      commit: "114f3a296a78dfbc1eb6631bb358e9fe9b1677bb"
    collision_type: would_cause_bug
