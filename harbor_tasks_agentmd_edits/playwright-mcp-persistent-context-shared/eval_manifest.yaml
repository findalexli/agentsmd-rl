      lines: "97-125"
      commit: "114f3a296a78dfbc1eb6631bb358e9fe9b1677bb"
    collision_type: rule_conflict
    why_distracting: "Directly contradicts the new rule added by the PR which explicitly forbids Co-Authored-By lines"
