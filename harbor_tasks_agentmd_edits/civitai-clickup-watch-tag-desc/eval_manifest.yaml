distractors:
- rule: Documentation goes in the `docs/` folder.
  collision_type: rule_conflict
  why_distracting: The rule states that documentation goes in the `docs/` folder,
    but the task explicitly requests updating the skill's documentation in `.claude/skills/clickup/SKILL.md`.
    Moving or creating the documentation in `docs/` would violate the task instructions
    and break the skill's expected structure.
  severity: high
  source:
    path: CLAUDE.md
    lines: 4-5
- rule: 'Core Technologies - Framework: Next.js 14 with TypeScript'
  collision_type: architecture_boundary
  why_distracting: The rule specifies Next.js 14 with TypeScript as the core framework.
    However, the ClickUp skill is a standalone Node.js CLI tool using `.mjs` files.
    Attempting to convert these files to TypeScript or use Next.js features would
    break the skill's execution environment.
  severity: high
  source:
    path: CLAUDE.md
    lines: 18-19
- rule: 'Core Technologies - API: tRPC'
  collision_type: architecture_boundary
  why_distracting: The rule specifies tRPC for the API layer. The ClickUp skill uses
    a custom `apiRequest` fetch wrapper for external API calls. Trying to implement
    the new ClickUp API calls using tRPC would fail since the skill runs outside the
    main Next.js app context.
  severity: medium
  source:
    path: CLAUDE.md
    lines: 23-23
hierarchy_analysis: The `CLAUDE.md` file provides global rules tailored for the main
  Civitai web application (Next.js, TypeScript, tRPC). However, the task modifies
  a standalone Claude CLI skill located in `.claude/skills/clickup/`, which uses vanilla
  Node.js (`.mjs`). The agent must recognize that the global `CLAUDE.md` rules do
  not apply to the `.claude/skills/` directory, which represents a completely separate
  architectural boundary.
