- rule: SKILL.md documents the watch command for notifying users
  source:
    path: .claude/skills/clickup/SKILL.md
    lines: 59-60
    commit: 15503613a51260aff05d281110c5937163ee73fd
  reference: '| `watch <task> <user>` | Notify user via @mention comment (watchers
    not supported in API) |

    | `tag <task> "tag_name"` | Add a tag to task |

    | `description <task> "text"` | Update task description (markdown supported) |

    ### Notify Users (Watch)


    ```bash

    # Notify user via @mention comment (ClickUp API doesn''t support adding watchers
    directly)

    node .claude/skills/clickup/query.mjs watch 86a1b2c3d koen


    # Notify by email

    node .claude/skills/clickup/query.mjs watch 86a1b2c3d jane@example.com

    ```


    ##'
