- rule: User-targeting ClickUp commands should resolve human-friendly user identifiers
    such as usernames and emails.
  source:
    path: .claude/skills/clickup/SKILL.md
    lines: 51-53,117-125
  source_text: '| `assign <task> <user>` | Assign task to a user (by name, email,
    or ID) |

    | `due <task> "date"` | Set due date (e.g., "tomorrow", "friday", "+3d") |

    | `priority <task> <level>` | Set priority (urgent, high, normal, low, none) |


    ### Assign Tasks


    ```bash

    # Assign by username

    node .claude/skills/clickup/query.mjs assign 86a1b2c3d justin


    # Assign by email

    node .claude/skills/clickup/query.mjs assign 86a1b2c3d jane@example.com

    ```'
  evidence: The new `watch` command resolves `<user>` through `findUser(teamId, arg2)`
    before posting the notification comment. The `create` path also keeps this convention
    by resolving `--assignee` with `findUser(teamId, assigneeArg)` and adds a `me`
    shortcut via `getUserId()` for the current authenticated user.
  category: user_resolution
  verification: llm_judge
- rule: Preserve markdown support when accepting rich text for ClickUp content fields.
  source:
    path: .claude/skills/clickup/SKILL.md
    lines: 44-44,191-200
  source_text: '| `comment <url|id> "message"` | Post a comment to a task (supports
    markdown) |


    ### Post a Comment


    ```bash

    node .claude/skills/clickup/query.mjs comment 86a1b2c3d "Starting work on this
    task"


    # Multi-line comment

    node .claude/skills/clickup/query.mjs comment 86a1b2c3d "Status update:

    - Completed initial review

    - Found 3 issues to address

    - Will submit PR by EOD"

    ```'
  evidence: The new `description` feature is documented as `Update task description
    (markdown supported)`, and the implementation uses `markdown_description` instead
    of plain `description` in both task creation and the new `description` command
    so ClickUp renders markdown correctly.
  category: content_formatting
  verification: llm_judge
