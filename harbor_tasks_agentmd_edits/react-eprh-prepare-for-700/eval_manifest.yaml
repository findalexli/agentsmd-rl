- rule: Modified files exist and are non-empty
  reference: '# packages/eslint-plugin-react-hooks/CHANGELOG.md

    ## 7.0.0


    This release slims down presets to just 2 configurations (`recommended` and `recommended-latest`),
    and all compiler rules are enabled by default.


    - **Breaking:** Removed `recommended-latest-legacy` and `flat/recommended` configs.
    The plugin now provides `recommended` (legacy and flat configs with all recommended
    rules),  and `recommended-latest` (legacy and flat configs with all recommended
    rules plus new bleeding edge experimental com'
