version: "2.0"

source:
  repo: "oven-sh/bun"
  pr: 26645
  base_commit: "a14a89ca953910e89697895dfdfb4cdf4c90a151"
  merge_commit: "6c119d608e4007530ec9d7b4c58e803e80f6e5b3"

checks:
  # Gate — cmake files must retain existing functionality
  - id: setupwebkit_retains_webkit_version
    type: pass_to_pass
    origin: static
    description: "SetupWebKit.cmake still defines WEBKIT_VERSION"

  # Code behavior — SetupWebKit.cmake JSC integration
  - id: setupwebkit_defines_jsc_build_target
    type: fail_to_pass
    origin: pr_diff
    description: "SetupWebKit.cmake defines a jsc custom build target for local builds"

  - id: setupwebkit_configures_jsc_cmake_args
    type: fail_to_pass
    origin: pr_diff
    description: "SetupWebKit.cmake configures JSC with PORT=JSCOnly and ENABLE_STATIC_JSC flags"

  - id: setupwebkit_webkit_build_type_option
    type: fail_to_pass
    origin: pr_diff
    description: "SetupWebKit.cmake supports WEBKIT_BUILD_TYPE option"

  # Code behavior — BuildBun.cmake changes
  - id: buildbun_jsc_dependency
    type: fail_to_pass
    origin: pr_diff
    description: "BuildBun.cmake adds jsc as a build dependency for local WebKit"

  - id: buildbun_system_icu_local
    type: fail_to_pass
    origin: pr_diff
    description: "BuildBun.cmake uses system ICU via find_package for local builds on Linux"

  # Config/doc updates
  - id: contributing_simplified_local_build
    type: fail_to_pass
    origin: pr_diff
    description: "CONTRIBUTING.md simplifies local JSC build instructions to single command"

  - id: contributing_mdx_simplified
    type: fail_to_pass
    origin: pr_diff
    description: "docs/project/contributing.mdx matches simplified build instructions"

rubric:
  - rule: "CMake changes follow existing code style and conventions in the cmake/ directory"
    source:
      path: "CLAUDE.md"
      lines: "203"
      commit: "a14a89ca953910e89697895dfdfb4cdf4c90a151"
  - rule: "Documentation updates are consistent with the style of existing CONTRIBUTING.md"
    source:
      path: "CONTRIBUTING.md"
      lines: "1-10"
      commit: "a14a89ca953910e89697895dfdfb4cdf4c90a151"
