- path: CONTRIBUTING.md
  tier: 2
  gold_added: '# Build bun with the local JSC build — this automatically configures
    and builds JSC

    `bun run build:local` handles everything: configuring JSC, building JSC, and building
    Bun. On subsequent runs, JSC will incrementally rebuild if any WebKit sources
    changed. `ninja -Cbuild/debug-local` also works after the first build, and will
    build Bun+JSC.


    The build output goes to `./build/debug-local` (instead of `./build/debug`), so
    you''ll need to update a couple of places:

    Note that if you make changes to our [WebKit fork](https://github.com/oven-sh/WebKit),
    you will also have to change [`SetupWebKit.cmake`](/cmake/tools/SetupWebKit.cmake)
    to point to the commit hash.'
  gold_removed: '# Make a debug build of JSC. This will output build artifacts in
    ./vendor/WebKit/WebKitBuild/Debug

    # Optionally, you can use `bun run jsc:build` for a release build

    $ bun run jsc:build:debug && rm vendor/WebKit/WebKitBuild/Debug/JavaScriptCore/DerivedSources/inspector/InspectorProtocolObjects.h


    # After an initial run of `make jsc-debug`, you can rebuild JSC with:

    $ cmake --build vendor/WebKit/WebKitBuild/Debug --target jsc && rm vendor/WebKit/WebKitBuild/Debug/JavaScriptCore/DerivedSources/inspector/InspectorProtocolObjects.h


    # Build bun with the local JSC build

    Using `bun run build:local` will build Bun in the `./build/debug-local` directory
