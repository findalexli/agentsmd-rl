version: "2.0"

source:
  repo: dotnet/maui
  pr: 33750
  base_commit: 62894e405b36c5b6cede44fdfe56832e26cdc8af
  merge_commit: 44a8f306c7d5649b96403e6227de359be6b18922

checks:
  # -------------------------------------------------------------------------
  # Gates (pass_to_pass, static)
  # -------------------------------------------------------------------------
  - id: scripts_exist
    type: pass_to_pass
    origin: static
    description: Both PowerShell scripts must exist

  - id: skill_md_exists
    type: pass_to_pass
    origin: static
    description: SKILL.md documentation must exist

  # -------------------------------------------------------------------------
  # Pass-to-pass (repo_tests) — CI/CD checks from the repo's own tests
  # -------------------------------------------------------------------------
  - id: test_powershell_scripts_syntax
    type: pass_to_pass
    origin: repo_tests
    description: All PowerShell scripts have valid syntax

  - id: test_skill_md_structure
    type: pass_to_pass
    origin: repo_tests
    description: SKILL.md has valid YAML frontmatter structure

  - id: test_skill_md_yaml_valid
    type: pass_to_pass
    origin: repo_tests
    description: SKILL.md YAML frontmatter is parseable with Python PyYAML

  - id: test_init_script_syntax
    type: pass_to_pass
    origin: repo_tests
    description: init-triage-session.ps1 has valid PowerShell syntax via Parser

  - id: test_query_script_syntax
    type: pass_to_pass
    origin: repo_tests
    description: query-issues.ps1 has valid PowerShell syntax via Parser

  - id: test_record_script_syntax
    type: pass_to_pass
    origin: repo_tests
    description: record-triage.ps1 has valid PowerShell syntax via Parser

  # -------------------------------------------------------------------------
  # Fail-to-pass (pr_diff) — core behavioral tests with subprocess execution
  # -------------------------------------------------------------------------
  - id: init_script_valid_powershell
    type: fail_to_pass
    origin: pr_diff
    description: init-triage-session.ps1 has valid PowerShell syntax

  - id: init_script_has_gh_check
    type: fail_to_pass
    origin: pr_diff
    description: init-triage-session.ps1 checks for gh CLI and exits if not found/authenticated

  - id: init_script_uses_invoke_restmethod
    type: fail_to_pass
    origin: pr_diff
    description: init-triage-session.ps1 uses Invoke-RestMethod for milestones instead of gh api

  - id: query_script_has_gh_check
    type: fail_to_pass
    origin: pr_diff
    description: query-issues.ps1 checks for gh CLI and exits if not found/authenticated

  - id: query_script_valid_powershell
    type: fail_to_pass
    origin: pr_diff
    description: query-issues.ps1 has valid PowerShell syntax

  # -------------------------------------------------------------------------
  # Fail-to-pass (agent_config) — SKILL.md documentation tests
  # -------------------------------------------------------------------------
  - id: skill_prerequisites_section
    type: fail_to_pass
    origin: agent_config
    description: SKILL.md has Prerequisites section with gh installation instructions
    source:
      path: .github/skills/issue-triage/SKILL.md
      lines: "19-41"
      commit: 44a8f306c7d5649b96403e6227de359be6b18922

  - id: skill_common_mistakes_section
    type: fail_to_pass
    origin: agent_config
    description: SKILL.md has Common Mistakes to Avoid section with table
    source:
      path: .github/skills/issue-triage/SKILL.md
      lines: "222-232"
      commit: 44a8f306c7d5649b96403e6227de359be6b18922

  - id: skill_critical_always_use_scripts
    type: fail_to_pass
    origin: agent_config
    description: SKILL.md has CRITICAL rule about always using skill scripts
    source:
      path: .github/skills/issue-triage/SKILL.md
      lines: "48-50"
      commit: 44a8f306c7d5649b96403e6227de359be6b18922

  - id: skill_step_6_batch_reload
    type: fail_to_pass
    origin: agent_config
    description: SKILL.md documents Step 6 automatic batch reload with -Skip parameter
    source:
      path: .github/skills/issue-triage/SKILL.md
      lines: "119-147"
      commit: 44a8f306c7d5649b96403e6227de359be6b18922

  - id: skill_version_updated
    type: fail_to_pass
    origin: agent_config
    description: SKILL.md version is updated to 2.3 to reflect changes
    source:
      path: .github/skills/issue-triage/SKILL.md
      lines: "6"
      commit: 44a8f306c7d5649b96403e6227de359be6b18922

rubric:
  - rule: PowerShell prerequisite checks provide actionable error messages with install instructions
    source:
      path: .github/copilot-instructions.md
      lines: "1-10"
      commit: 62894e405b36c5b6cede44fdfe56832e26cdc8af

  - rule: Config documentation updates are consistent with the style of the existing SKILL.md
    source:
      path: .github/skills/issue-triage/SKILL.md
      lines: "1-15"
      commit: 62894e405b36c5b6cede44fdfe56832e26cdc8af

  - rule: Milestone Suggestion Logic section uses clear examples from actual session output
    source:
      path: .github/skills/issue-triage/SKILL.md
      lines: "159-196"
      commit: 44a8f306c7d5649b96403e6227de359be6b18922
