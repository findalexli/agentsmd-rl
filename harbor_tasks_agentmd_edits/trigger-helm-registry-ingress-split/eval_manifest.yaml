version: '2.0'
source:
  repo: triggerdotdev/trigger.dev
  pr: 2212
  base_commit: dc568e7f3edc168defc0a7e9afab382eba770bf1
  merge_commit: aa24a9aae626a1f2ea34bd4930b158867f4a6ff8
checks:
- id: syntax_check
  type: pass_to_pass
  origin: static
  description: All modified YAML files must parse without errors
- id: values_webapp_origin
  type: fail_to_pass
  origin: pr_diff
  description: Origin config must move from top-level config to webapp section
- id: values_webapp_ingress
  type: fail_to_pass
  origin: pr_diff
  description: Ingress config must move from top-level to webapp.ingress
- id: values_registry_ingress
  type: fail_to_pass
  origin: pr_diff
  description: Registry must have its own separate ingress configuration
- id: registry_ingress_template
  type: fail_to_pass
  origin: pr_diff
  description: A separate registry-ingress.yaml template must exist
- id: webapp_ingress_template_uses_webapp_values
  type: fail_to_pass
  origin: pr_diff
  description: Webapp ingress template must reference .Values.webapp.ingress
- id: helpers_separate_ingress_annotations
  type: fail_to_pass
  origin: pr_diff
  description: Helpers must define separate webapp and registry annotation helpers
- id: webapp_template_uses_webapp_origin
  type: fail_to_pass
  origin: pr_diff
  description: webapp.yaml must use .Values.webapp.appOrigin not .Values.config.appOrigin
- id: validate_external_no_port_required
  type: fail_to_pass
  origin: pr_diff
  description: External registry validation must not require port
- id: values_production_example_valid
  type: pass_to_pass
  origin: static
  description: Production example values file must parse and have correct structure
rubric:
- rule: Documentation updates should be consistent with the style of the existing
    README
  source:
    path: hosting/k8s/helm/README.md
    lines: 1-20
    commit: dc568e7f3edc168defc0a7e9afab382eba770bf1
- rule: Helm README must document separate webapp and registry ingress
  source:
    path: hosting/k8s/helm/README.md
    lines: 161-199
    commit: aa24a9aae626a1f2ea34bd4930b158867f4a6ff8
  reference: "webapp:\n  # Application URLs\n  # Bootstrap mode (auto-creates worker\
    \ group)\n  deploy: false\n  deploy: false\n  deploy: true\n# Webapp ingress\n\
    webapp:\n  ingress:\n    enabled: true\n    className: \"nginx\"\n    annotations:\n\
    \      cert-manager.io/cluster-issuer: \"letsencrypt-prod\"\n    hosts:\n    \
    \  - host: trigger.example.com\n        paths:\n          - path: /\n        \
    \    pathType: Prefix\n    tls:\n      - secretName: trigger-tls\n        hosts:\n\
    \          - trigger.example.com\n\n# Registry ingress\nregistry:"
- rule: Helm README must show appOrigin under webapp, not config
  source:
    path: hosting/k8s/helm/README.md
    lines: 113-130
    commit: aa24a9aae626a1f2ea34bd4930b158867f4a6ff8
  reference: "webapp:\n  # Application URLs\n  # Bootstrap mode (auto-creates worker\
    \ group)\n  deploy: false\n  deploy: false\n  deploy: true\n# Webapp ingress\n\
    webapp:\n  ingress:\n    enabled: true\n    className: \"nginx\"\n    annotations:\n\
    \      cert-manager.io/cluster-issuer: \"letsencrypt-prod\"\n    hosts:\n    \
    \  - host: trigger.example.com\n        paths:\n          - path: /\n        \
    \    pathType: Prefix\n    tls:\n      - secretName: trigger-tls\n        hosts:\n\
    \          - trigger.example.com\n\n# Registry ingress\nregistry:"
