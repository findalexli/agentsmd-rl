version: "2.0"

source:
  repo: "oven-sh/bun"
  pr: 25830
  base_commit: "47af15f3f469b6325a01935b4373d36c98061cbd"
  merge_commit: "bf937f7294762d5e1a11a0d72f63fbeb00de9468"

checks:
  # ---------------------------------------------------------------------------
  # Gates (pass_to_pass, static) - syntax / compilation checks
  # ---------------------------------------------------------------------------

  - id: shared_ts_parses
    type: pass_to_pass
    origin: static
    description: "Modified shared.ts must parse without TypeScript errors and contain buildDefinedColumnsAndQuery function"

  - id: sqlite_ts_parses
    type: pass_to_pass
    origin: static
    description: "Modified sqlite.ts must parse without TypeScript errors and import/use buildDefinedColumnsAndQuery"

  - id: mysql_ts_parses
    type: pass_to_pass
    origin: static
    description: "Modified mysql.ts must parse without TypeScript errors and import/use buildDefinedColumnsAndQuery"

  - id: postgres_ts_parses
    type: pass_to_pass
    origin: static
    description: "Modified postgres.ts must parse without TypeScript errors and import/use buildDefinedColumnsAndQuery"

  # ---------------------------------------------------------------------------
  # Fail-to-pass (pr_diff) - core behavioral tests
  # ---------------------------------------------------------------------------

  - id: sqlite_insert_filters_undefined
    type: fail_to_pass
    origin: pr_diff
    description: "SQLite: sql() helper filters out undefined values in INSERT, allowing DEFAULT to be used"

  - id: sqlite_bulk_insert_no_data_loss
    type: fail_to_pass
    origin: pr_diff
    description: "SQLite: Bulk insert scans all items to determine columns with defined values, preventing data loss when first item has undefined"

  - id: sqlite_bulk_insert_middle_item_value
    type: fail_to_pass
    origin: pr_diff
    description: "SQLite: Bulk insert checks ALL items, not just first or last, preserving middle item values"

  - id: sqlite_all_undefined_throws
    type: fail_to_pass
    origin: pr_diff
    description: "SQLite: Insert with all undefined values throws SyntaxError with appropriate message"

  - id: sqlite_not_null_with_default_uses_default
    type: fail_to_pass
    origin: pr_diff
    description: "SQLite: Exact regression test for issue #25829 - NOT NULL columns with DEFAULT use default when undefined is passed"

  # ---------------------------------------------------------------------------
  # Pass-to-pass (repo_tests / static) - regression + anti-stub
  # ---------------------------------------------------------------------------

  - id: existing_sqlite_sql_tests_pass
    type: pass_to_pass
    origin: repo_tests
    description: "Upstream SQLite SQL tests should still pass after the change"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "Modified functions have real logic with column loops and hasDefinedValue checks, not just placeholder"

  # ---------------------------------------------------------------------------
  # Config-derived (agent_config) - rules from CLAUDE.md / AGENTS.md
  # ---------------------------------------------------------------------------

  - id: test_claude_md_object_equality_guidance
    type: pass_to_pass
    origin: agent_config
    description: "test/CLAUDE.md has nested object equality guidance added in this PR"
    source:
      path: "test/CLAUDE.md"
      lines: "161-183"
      commit: "bf937f7294762d5e1a11a0d72f63fbeb00de9468"

rubric:
  # Soft rules for LLM judge
  - rule: "Use `.toEqual` rather than many `.toBe` assertions for nested or complex objects."
    source:
      path: "test/CLAUDE.md"
      lines: "165-183"
      commit: "bf937f7294762d5e1a11a0d72f63fbeb00de9468"
