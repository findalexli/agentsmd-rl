config_edits:
- path: scripts/build/CLAUDE.md
  tier: 1
  gold_added: '**`rm -rf build/` doesn''t clear the cache locally.** `cfg.cacheDir`
    is machine-shared at `$BUN_INSTALL/build-cache` for non-CI builds (ccache, zig,
    tarballs, prebuilt WebKit). Everything there is content-addressed or version-stamped,
    so a stale entry can''t be hit — don''t reach for `bun run clean cache` as a debugging
    step. If a build misbehaves, the bug is in the inputs or the graph, not the cache;
    nuking it just costs you a cold rebuild. CI keeps `<buildDir>/cache` so `rm -rf
    build/` is still a full reset there.'
  gold_removed: ''
