config_edits:
- path: CONTRIBUTING.md
  tier: 2
  gold_added: '## Using Nix


    If you''re using the [Nix package manager](https://nixos.org/), you can quickly
    set up a development environment with all dependencies and build tools using:


    ```sh

    nix develop

    ```


    This will drop you into a shell with LLVM 19, Zig, and all other necessary dependencies
    to build Bun from source.


    Alternatively, if you don''t have flakes enabled, you can use:


    ```sh

    nix-shell

    ```


    To build with Nix (requires [nix flakes](https://nixos.wiki/wiki/Flakes)):


    ```sh

    nix build

    ```


    The Nix environment is particularly useful for reproducible builds and avoiding
    "works on my machine" issues.


    ## Manual Building'
  gold_removed: '## Building'
