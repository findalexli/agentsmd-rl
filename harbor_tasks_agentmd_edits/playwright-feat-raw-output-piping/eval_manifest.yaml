- path: packages/playwright-core/src/tools/cli-client/skill/SKILL.md
  tier: 1
  gold_added: '## Raw output


    The global `--raw` option strips page status, generated code, and snapshot sections
    from the output, returning only the result value. Use it to pipe command output
    into other tools. Commands that don''t produce output return nothing.


    ```bash

    playwright-cli --raw eval "JSON.stringify(performance.timing)" | jq ''.loadEventEnd
    - .navigationStart''

    playwright-cli --raw eval "JSON.stringify([...document.querySelectorAll(''a'')].map(a
    => a.href))" > links.json

    playwright-cli --raw snapshot > before.yml

    playwright-cli click e5

    playwright-cli --raw snapshot > after.yml

    diff before.yml after.yml

    TOKEN=$(playwright-cli --raw cookie-get session_id)

    playwright-cli --raw localstorage-get theme

    ```'
  gold_removed: ''
