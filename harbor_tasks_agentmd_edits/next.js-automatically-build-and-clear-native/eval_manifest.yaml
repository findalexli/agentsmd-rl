  - id: maybe_build_native_skips_in_ci
    type: fail_to_pass
    origin: pr_diff
    description: "maybe-build-native.mjs exits cleanly with skip message when CI=1"

  # F2P: script has Rust change detection logic
  - id: maybe_build_native_has_rust_detection
    type: fail_to_pass
    origin: pr_diff
    description: "maybe-build-native.mjs contains hasRustChanges and getVersionBumpCommit logic"

  # F2P: package.json wiring
  - id: package_json_build_script
    type: fail_to_pass
    origin: pr_diff
    description: "packages/next-swc/package.json has build script pointing to maybe-build-native"

  # F2P: turbo.json build task
  - id: turbo_json_build_task
    type: fail_to_pass
    origin: pr_diff
    description: "packages/next-swc/turbo.json defines build task with Rust inputs and CI env"

  # F2P: build-native.ts prettier refactor
  - id: build_native_uses_stdin_prettier
    type: fail_to_pass
    origin: pr_diff
    description: "scripts/build-native.ts uses prettier --stdin-filepath instead of --write"

  # F2P: config edit — AGENTS.md simplified
  - id: agents_md_simplified_rebuild
    type: fail_to_pass
    origin: pr_diff
    description: "AGENTS.md replaces separate Rust/both rebuild commands with unified pnpm build"

  # F2P: syntax gate (file doesn't exist on base)
  - id: maybe_build_native_syntax
    type: fail_to_pass
    origin: pr_diff
