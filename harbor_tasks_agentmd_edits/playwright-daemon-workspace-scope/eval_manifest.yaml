    origin: static
    description: "commands.ts exports commandsArray with valid command declarations"

  # Code behavior — fail_to_pass
  - id: session_kill_all_command_registered
    type: fail_to_pass
    origin: pr_diff
    description: "kill-all renamed to session-kill-all in command registry"

  - id: install_replaces_install_skills
    type: fail_to_pass
    origin: pr_diff
    description: "install-skills replaced by 'install' workspace init command"

  - id: find_workspace_dir_function
    type: fail_to_pass
    origin: pr_diff
    description: "findWorkspaceDir walks up directories looking for .playwright marker"

  - id: config_default_path_updated
    type: fail_to_pass
    origin: pr_diff
    description: "Default config path changed to .playwright/cli.config.json"

  - id: workspace_hash_replaces_installation_hash
    type: fail_to_pass
    origin: pr_diff
    description: "ClientInfo uses workspaceDirHash instead of installationDirHash"

  # Config/skill file updates — fail_to_pass
  - id: skill_md_session_kill_all
    type: fail_to_pass
    origin: agent_config
    description: "SKILL.md updated to reference session-kill-all command"
    source:
      path: "packages/playwright/src/skill/SKILL.md"
      lines: "190-195"
      commit: "08752e9a9be05e5d11173977c8651cf105c1aace"

  - id: skill_md_delete_data_in_config_section
    type: fail_to_pass
    origin: agent_config
    description: "SKILL.md Configuration section documents delete-data command"
    source:
      path: "packages/playwright/src/skill/SKILL.md"
      lines: "175-185"
      commit: "08752e9a9be05e5d11173977c8651cf105c1aace"

  - id: session_management_md_kill_all_renamed
    type: fail_to_pass
    origin: agent_config
    description: "session-management.md uses session-kill-all throughout"
    source:
      path: "packages/playwright/src/skill/references/session-management.md"
      lines: "42-48"
      commit: "08752e9a9be05e5d11173977c8651cf105c1aace"

  - id: session_management_md_config_path
    type: fail_to_pass
    origin: agent_config
    description: "session-management.md references .playwright/ config path"
    source:
      path: "packages/playwright/src/skill/references/session-management.md"
      lines: "120-130"
      commit: "08752e9a9be05e5d11173977c8651cf105c1aace"

rubric:
