distractors:
- rule: 'Variables: Prefer `let` for locals, `const` only at module scope'
  collision_type: rule_conflict
  why_distracting: The rule states 'const only at module scope', which an agent might
    interpret as forbidding `let` at the module level. However, the gold solution
    explicitly uses `export let` at the module scope for the custom registries (`customMimeTypeByExtension`,
    etc.) to allow lazy initialization while avoiding function call overhead in hot
    paths. An agent strictly following this rule might unnecessarily wrap the state
    in a `const` object or closure, degrading performance.
  severity: medium
  source:
    path: AGENTS.md
    lines: 19-20
- rule: 'Classes: Use native fields (omit `public`), `#private` for private members'
  collision_type: architecture_boundary
  why_distracting: An agent might read the class guidelines and decide to implement
    the custom MIME type registry as a singleton class with `#private` fields to encapsulate
    the state. However, the package's architecture relies on simple module-level variables
    and functions for performance and simplicity, making a class-based approach an
    architectural overcomplication.
  severity: medium
  source:
    path: AGENTS.md
    lines: 22-23
hierarchy_analysis: The repository uses a single root-level `AGENTS.md` file. The
  rules are generally straightforward, but the variable scoping rule ('const only
  at module scope') creates a direct conflict with the performance-oriented design
  of the MIME package, which requires mutable module-level exports for hot-path optimization.
