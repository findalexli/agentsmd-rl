- path: packages/mime/README.md
  tier: 2
  gold_added: "### `defineMimeType(definition)`\n\nRegisters or overrides a MIME type\
    \ for one or more file extensions.\n\n```ts\nimport { defineMimeType } from '@remix-run/mime'\n\
    \ndefineMimeType({\n  extensions: ['myformat'],\n  mimeType: 'application/x-myformat',\n\
    })\n```\n\nYou can also optionally configure the charset and whether the MIME\
    \ type is compressible:\n\n```ts\ndefineMimeType({\n  extensions: ['myformat'],\n\
    \  mimeType: 'application/x-myformat',\n  compressible: true,\n  charset: 'utf-8',\n\
    })\n```"
