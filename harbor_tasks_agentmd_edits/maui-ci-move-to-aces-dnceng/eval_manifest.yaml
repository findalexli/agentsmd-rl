version: "2.0"

source:
  repo: "dotnet/maui"
  pr: 34690
  base_commit: "bfe8e58dcab8b030d6d87edf30fbe3f53827795d"
  merge_commit: "3176108e30a0c7c3e84a82b6ab79c93ba8e2996d"

checks:
  - id: yaml_syntax_valid
    type: pass_to_pass
    origin: static
    description: "Modified YAML files must parse without errors"

  - id: ci_uitests_pools_split
    type: fail_to_pass
    origin: pr_diff
    description: "ci-uitests.yml has separate internal/public pool parameters with correct pool values"

  - id: ci_uitests_conditional_pool_selection
    type: fail_to_pass
    origin: pr_diff
    description: "ci-uitests.yml uses System.TeamProject conditional for pool selection with all pool mappings"

  - id: no_hardcoded_netcore_public
    type: fail_to_pass
    origin: pr_diff
    description: "Internal pool parameters do not use NetCore-Public pool which doesn't exist in dnceng/internal"

  - id: ci_device_tests_conditional_windows
    type: fail_to_pass
    origin: pr_diff
    description: "ci-device-tests.yml uses conditional pool selection for Windows Device Tests"

  - id: aces_shared_pool_for_public_android_ios
    type: fail_to_pass
    origin: pr_diff
    description: "AcesShared pool with ACES_VM_SharedPool_Tahoe image is used for public Android/iOS tests"

  - id: netcore1espool_internal_for_internal_windows
    type: fail_to_pass
    origin: pr_diff
    description: "Internal Windows pools use NetCore1ESPool-Internal with correct image demands"

  - id: not_stub
    type: pass_to_pass
    origin: static
    description: "Modified files contain actual changes, not just comments"

  - id: yaml_structure_valid
    type: pass_to_pass
    origin: static
    description: "YAML structure is valid and contains expected sections"

  - id: internal_public_pool_counts_match
    type: pass_to_pass
    origin: static
    description: "Number of internal and public pool parameters are equal and complete"

  - id: test_repo_template_files_exist
    type: pass_to_pass
    origin: repo_tests
    description: "All referenced template files exist in the repository"

  - id: test_repo_device_tests_yaml_valid
    type: pass_to_pass
    origin: repo_tests
    description: "ci-device-tests.yml is valid YAML with required sections"

  - id: test_repo_device_tests_windows_pool_params_exist
    type: pass_to_pass
    origin: repo_tests
    description: "ci-device-tests.yml has Windows pool parameters defined"

  - id: test_repo_common_templates_yaml_valid
    type: pass_to_pass
    origin: repo_tests
    description: "Common template YAML files are syntactically valid"

  - id: test_repo_no_duplicate_parameter_names
    type: pass_to_pass
    origin: repo_tests
    description: "All parameter names in ci-uitests.yml are unique"

  - id: test_repo_eng_common_templates_exist
    type: pass_to_pass
    origin: repo_tests
    description: "All eng/common template files referenced in variables exist"

  - id: test_repo_arcade_templates_exist
    type: pass_to_pass
    origin: repo_tests
    description: "All arcade template files exist in the repository"

  - id: test_repo_all_pipeline_templates_yaml_valid
