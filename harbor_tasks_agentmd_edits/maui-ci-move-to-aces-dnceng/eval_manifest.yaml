    origin: repo_tests
    description: "All YAML template files in eng/pipelines are syntactically valid"

  - id: test_repo_ci_uitests_has_stages
    type: pass_to_pass
    origin: repo_tests
    description: "ci-uitests.yml has a valid stages section with at least one stage"

  - id: test_repo_ci_device_tests_has_stages
    type: pass_to_pass
    origin: repo_tests
    description: "ci-device-tests.yml has a valid stages section with at least one stage"

  - id: test_repo_trigger_and_pr_sections_exist
    type: pass_to_pass
